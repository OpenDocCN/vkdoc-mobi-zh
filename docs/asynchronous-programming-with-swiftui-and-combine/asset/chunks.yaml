    # 8. Driving UI State with Combine


    Modern UIs have to respond to a multitude of input signals at the same time: users
    can communicate with an app using keyboard input, multitouch, physical gestures,
    and even voice commands. On top of this, applications might receive data from
    remote servers and local APIs.


    Juggling all these input sources and the plethora of events they’re sending is
    a challenging task for us developers, as we often find ourselves in situations
    that require us to combine several input sources, and making sure the app and
    its user interface always stay in sync.


    In this and the following chapters, we’re going to look at how Combine helps us
    build UIs that handle several event sources at the same time, such as the user’s
    input and results from local and remote validation logic, making sure the UI reflects
    the state of the app at all times.


    At the end of Chapter [6](#509862_1_En_6_Chapter.xhtml), you already saw how to
    use Combine to implement input validation for a single input field on an input
    form. Back then, we implemented validation logic for an ISBN field, both using
    `onChange(of:)` and Combine. To demonstrate the power of Combine, we are going
    to implement a more complex example with multiple event sources.'
  trans: '

    # 组合发布者


    构建应用时，我们常常需要观察多个事件。以披萨配送服务为例，为了不让配送员久等，我们会要求他们在订单实际下达且地址验证通过后再开始准备。


    更新订单状态和验证地址是两个不同的流程，因此我们需要为它们分别设置两个发布者：


    ```

    let orderStatusPublisher = NotificationCenter

    .default

    .publisher(for: .didUpdateOrderStatus, object: margheritaOrder)

    .compactMap { notification in

    notification.userInfo?["status"] as? OrderStatus

    }

    .eraseToAnyPublisher()

    let shippingAddressValidPublisher = NotificationCenter

    .default

    .publisher(for: .didValidateAddress,

    object: margheritaOrder)

    .compactMap { notification in  notification.userInfo?["addressStatus"] as? AddressStatus

    }

    .eraseToAnyPublisher()

    ```


    通过在管道的末尾调用 `.eraseToAnyPublisher()` 操作符，管道的类型会被擦除为 `AnyPublisher<Output, Never>`。该发布者未擦除前的类型是
    `Publishers.CompactMap<NotificationCenter.Publisher, OrderStatus>`，可读性更差。对于想要传递给代码另一部分的任何管道结果类型（例如作为函数或属性的返回类型），进行类型擦除是一个好习惯。


    要判断是否可以发货，我们需要评估这两个管道的结果。只有订单已下达且地址有效时，我们才会分配配送员。


    为此，我们需要创建一个新的发布者，它会订阅 `orderStatusPublisher` 和 `shippingAddressValidPublisher`，并在订单状态为
    `.placed` 且地址状态为 `.valid` 时返回 `true`。在 Combine 中，将多个管道合并为一个是非常常见的任务，我们可以选择以下几种发布者：


    *   `Zip`

    *   `Merge`

    *   `CombineLatest`

    *   …以及其他


    最适用于我们场景的是 `CombineLatest`——它会从每个上游发布者中获取最新的值。


    ```

    let readyToProducePublisher = Publishers

    .CombineLatest(orderStatusPublisher,

    shippingAddressValidPublisher)

    readyToProducePublisher

    .print()

    .map { (orderStatus, addressStatus) in

    orderStatus == .placed && addressStatus == .valid

    }

    .sink {

    print("- 准备发货订单: \($0)")

    }

    ```


    为了更清晰地看到事件流，我在管道中加入了 `.print()` 操作符。让我们发送一些事件来模拟披萨的订购流程：


    ```

    NotificationCenter

    .default

    .post(name: .didValidateAddress,

    object: margheritaOrder,

    userInfo: ["addressStatus": AddressStatus.invalid])

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: margheritaOrder,

    userInfo: ["status": OrderStatus.placed])

    NotificationCenter

    .default

    .post(name: .didValidateAddress,

    object: margheritaOrder,

    userInfo: ["addressStatus": AddressStatus.valid])

    ```


    一开始，地址尚未验证通过，而订单在地址验证完成前就已下达（我们可能使用了需要一些时间进行验证的第三方服务）。


    以下是输出结果：


    ```

    receive subscription: (CombineLatest)

    request unlimited

    receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.invalid))

    - 准备发货订单: false

    receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.valid))

    - 准备发货订单: true

    receive cancel

    ```


    不以短横线开头的行是 `.print()` 操作符的调试输出。你可以看到，只有当我们同时收到 `OrderStatus` 为 `.placed` 和 `AddressStatus`
    为 `.valid` 时，订单才被视为可以发货。


    ## 总结


    在本章中，你学习了 Combine 的基础知识：


    *   发布者会随时间发出值（例如用户在文本输入框中输入的文本）。

    *   订阅者可以接收值，并将其分配给变量（使用 `.assign` 订阅者），或进行进一步处理（使用 `.sink` 订阅者）。

    *   通常，你需要对值进行转换以使其对订阅者有用，这就是操作符发挥作用的地方。


    你学习了如何使用 Combine 的操作符来转换从上游发布者接收到的事件，以及这如何让订阅者更容易地消费事件。应用通常需要观察多个事件流（例如配送表单上各字段的状态），你学习了如何使用
    Combine 的操作符将多个事件流合并为一个。


    Combine 几乎就像是用于描述应用中事件处理流程的领域特定语言（DSL）。这种声明式方法使其与 SwiftUI 非常相似，这也是它们能良好协同工作的原因之一。


    在下一章中，我们将深入探讨如何结合 SwiftUI 和 Combine，以及在你的 SwiftUI 应用中使用 Combine 如何使实现面向用户的应用程序逻辑变得更加容易。


    # 8. 使用 Combine 驱动 UI 状态


    现代用户界面必须同时响应多种输入信号：用户可以通过键盘输入、多点触控、物理手势乃至语音命令与应用交互。除此之外，应用还可能从远程服务器和本地 API 接收数据。


    对我们开发者而言，协调所有这些输入源及其发出的海量事件是一项具有挑战性的任务，因为我们经常需要组合多个输入源，并确保应用及其用户界面始终同步。


    在本章及后续章节中，我们将探讨 Combine 如何帮助我们构建能够同时处理多个事件源的 UI，例如用户的输入以及来自本地和远程验证逻辑的结果，确保 UI
    始终反映应用的当前状态。


    在第六章的结尾，你已经看到如何使用 Combine 为输入表单上的单个输入字段实现输入验证。当时，我们使用 `onChange(of:)` 和 Combine
    为 ISBN 字段实现了验证逻辑。为了展示 Combine 的强大功能，我们将实现一个包含多个事件源的更复杂的示例。

    '
- fmt: "# Input Validation Using Combine\n\nLet’s assume that we’ve decided to add\
    \ some social features to our book tracking app. To do so, we will ask users to\
    \ sign up and create a user account. When signing up, users will need to choose\
    \ a username and a password:\n\n![](images/509862_1_En_8_Chapter/509862_1_En_8_Fig1_HTML.png)\n\
    \nAn illustration of a mobile screen with text signup. The fields given below\
    \ are username, password, repeat password etcetera.\n\nFigure 8-1\n\nA simple\
    \ sign-up form\n\nTo keep our users’ data safe and secure, there are a couple\
    \ of preconditions that need to be met:\n\n- The `username` should consist of\
    \ at least three characters. This is something we can check locally while the\
    \ user types in their desired username.\n- Usernames need to be unique, and we\
    \ need to ensure the chosen username isn’t already taken by any other user. This\
    \ is a check we need to perform on our backend—there needs to be some API endpoint\
    \ we can query to see if the name is still available.\n- The user’s password needs\
    \ to meet certain complexity criteria (i.e., it needs to be strong enough).\n\
    - And to make sure the user can recall their password, we will ask them to repeat\
    \ the password in a second password input field.\n\nOnly if all of these conditions\
    \ are met, we can create a new user account. The button for creating a new user\
    \ account should remain disabled until all conditions are met.\n\nAs you can see,\
    \ we have a number of events that we need to route:\n\n- The *Sign up* button\
    \ must only be enabled if the form is valid.\n- The *Username* input field needs\
    \ to display a warning if the username is too short, or if it is no longer available.\n\
    - The *Password* fields need to display a warning if the password isn’t strong\
    \ enough, or if they don’t match.\n\n## The Sign-Up Form View\n\nIn this chapter,\
    \ we will use a `Form` to handle all user input. To display any error messages\
    \ or warnings, we will use the header/footers of the respective form `Section`.\
    \ In Chapter [14](#509862_1_En_14_Chapter.xhtml), we will take it one step further\
    \ and build a reusable and configurable text input field with a floating label\
    \ that can display error messages inline.\n\n> ***Note*** *You will find the code\
    \ for the sample app in the Git-Hub repository*^([^(67)](#fn67)) *for this book,\
    \ in the folder* Chapter [8](#509862_1_En_8_Chapter.xhtml)—Driving UI State with\
    \ Combine. *The individual steps can be found in the* steps *folder, and the final\
    \ version in the* final *folder*.\n\n```\nstruct SignUpForm: View {\n    @StateObject\
    \ var viewModel = SignUpFormViewModel()\n    var body: some View {\n        Form\
    \ {\n            // Username\n            Section {\n                TextField(\"\
    Username\", text: $viewModel.username)\n                    .autocapitalization(.none)\n\
    \                    .disableAutocorrection(true)\n            } footer: {\n \
    \               Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
    \            }\n            // Password\n            Section {\n             \
    \   SecureField(\"Password\",\n                            text: $viewModel.password)\n\
    \                SecureField(\"Repeat password\",\n                          \
    \  text: $viewModel.passwordConfirmation)\n            } footer: {\n         \
    \       Text(viewModel.passwordMessage)\n                    .foregroundColor(.red)\n\
    \            }\n            // Submit button\n            Section {\n        \
    \        Button(\"Sign up\") {\n                    print(\"Signing up as \\(viewModel.username)\"\
    )\n                }\n                .disabled(!viewModel.isValid)\n        \
    \    }\n        }\n    }\n}\n```\n\nHandling all the input fields and making sure\
    \ all form elements display the correct information (or warnings) for all the\
    \ different states of the form usually require writing a lot of code, and it is\
    \ easy to get things wrong and miss an important condition—especially when having\
    \ to deal with asynchronous event sources like a remote API.\n\nBy using Combine\
    \ and functional reactive programming, it will be much easier to implement this\
    \ sign-up form.\n\nIn this chapter, we will focus on validating the username length\
    \ requirement and the password strength requirements. In the next chapter, we\
    \ will look at how to use Combine for networking and how we can use it to connect\
    \ to a server and find out the username the user chose is still available.\n\n\
    ## The View Model\n\nTo perform input validation, our code needs to react to any\
    \ changes the user makes to the sign-up form. In particular, we are interested\
    \ in observing changes to the `username`, `password`, and `passwordConfirmation`\
    \ text input fields. As we have already seen in the previous chapters, it is not\
    \ possible to manipulate SwiftUI views directly or ready their state by accessing\
    \ their properties. Instead, SwiftUI manages UI state outside of the view elements,\
    \ in what is called the *source of truth*.\n\nTo make this possible, SwiftUI provides\
    \ a number of property wrappers we can use to connect the source of truth to the\
    \ views of an application. In Chapter [4](#509862_1_En_4_Chapter.xhtml), we discussed\
    \ how those property wrappers work and which ones to use in which situation.\n\
    \nYou might recall that we can use `@State` to handle local state in a view, so\
    \ you might be tempted to use a local `@State` property to hold the username,\
    \ password, and password confirmation for the sign-up form. However, `@State`\
    \ is not a publisher, so we cannot use it to drive any Combine pipelines.\n\n\
    Instead, we will create a view model with `username`, `password`, and `passwordConfirmation`\
    \ published properties that we can bind to the respective UI views.\n\n```\nclass\
    \ SignUpFormViewModel: ObservableObject {\n    // Input\n    @Published var username:\
    \ String = \"\"\n    @Published var password: String = \"\"\n    @Published var\
    \ passwordConfirmation: String = \"\"\n    \n    // Output\n    @Published var\
    \ usernameMessage: String = \"\"\n    @Published var passwordMessage: String =\
    \ \"\"\n    @Published var isValid: Bool = false\n}\n```\n\nMarking a property\
    \ as `@Published` turns it into a Combine publisher. Not only does this allow\
    \ us to bind the property to a UI element—we can also attach a Combine pipeline\
    \ to it and run our validation logic inside the pipeline. We can then assign the\
    \ result of the pipeline to another published property, which allows us to drive\
    \ the UI with the result. For example, we can disable the *Submit* button as long\
    \ as the form input is invalid.\n\nBy conforming the view model to `ObservableObject`,\
    \ we make it observable. Whenever one of the published properties changes, the\
    \ view model will emit the changes values, telling SwiftUI to update all affected\
    \ views.\n\nUsing Combine in this way helps us to define the behavior of our application\
    \ in a functional way, making sure that the UI and the application state are always\
    \ in sync.\n\nOn a high level, the flow of information looks like this:\n\n- The\
    \ user types their preferred username into the username text input field.\n- Every\
    \ time the user types a character, the `TextField` view assigns the text entered\
    \ so far to the `username` published property of the `SignUpFormViewModel`.\n\
    - Since `username` is a publisher, it sends events for any change to all of its\
    \ subscribers.\n- One of those subscribers is a Combine pipeline that checks if\
    \ the length of the `username` is greater than three characters.\n- The result\
    \ of this pipeline is then used together with the result of other pipelines to\
    \ determine the overall validation result of the input form.\n\nThe basic version\
    \ of our view model is already connected to the views of the sign-up form, so\
    \ let’s now look at how to implement the validation logic using Combine."
  raw: '## Input Validation Using Combine


    Let’s assume that we’ve decided to add some social features to our book tracking
    app. To do so, we will ask users to sign up and create a user account. When signing
    up, users will need to choose a username and a password:


    ![](images/509862_1_En_8_Chapter/509862_1_En_8_Fig1_HTML.png)


    An illustration of a mobile screen with text signup. The fields given below are
    username, password, repeat password etcetera.


    Figure 8-1


    A simple sign-up form


    To keep our users’ data safe and secure, there are a couple of preconditions that
    need to be met:


    *   The username should consist of at least three characters. This is something
    we can check locally while the user types in their desired username.


    *   Usernames need to be unique, and we need to ensure the chosen username isn’t
    already taken by any other user. This is a check we need to perform on our backend—there
    needs to be some API endpoint we can query to see if the name is still available.


    *   The user’s password needs to meet certain complexity criteria (i.e., it needs
    to be strong enough).


    *   And to make sure the user can recall their password, we will ask them to repeat
    the password in a second password input field.


    Only if all of these conditions are met, we can create a new user account. The
    button for creating a new user account should remain disabled until all conditions
    are met.


    As you can see, we have a number of events that we need to route:


    *   The *Sign up* button must only be enabled if the form is valid.


    *   The *Username* input field needs to display a warning if the username is too
    short, or if it is no longer available.


    *   The *Password* fields need to display a warning if the password isn’t strong
    enough, or if they don’t match.


    ### The Sign-Up Form View


    In this chapter, we will use a `Form` to handle all user input. To display any
    error messages or warnings, we will use the header/footers of the respective form
    `Section`. In Chapter [14](#509862_1_En_14_Chapter.xhtml), we will take it one
    step further and build a reusable and configurable text input field with a floating
    label that can display error messages inline.


    > ***Note*** *You will find the code for the sample app in the Git- Hub repository*^([^(67)](#fn67))
    *for this book, in the folder* Chapter [8](#509862_1_En_8_Chapter.xhtml)—Driving
    UI State with Combine. *The individual steps can be found in the* steps *folder,
    and the final version in the* final *folder*.


    ```

    struct SignUpForm: View {

    @StateObject var viewModel = SignUpFormViewModel()

    var body: some View {

    Form {

    // Username

    Section {

    TextField("Username", text: $viewModel.username)

    .autocapitalization(.none)

    .disableAutocorrection(true)

    } footer: {

    Text(viewModel.usernameMessage)

    .foregroundColor(.red)

    }

    // Password

    Section {

    SecureField("Password",

    text: $viewModel.password)

    SecureField("Repeat password",

    text: $viewModel.passwordConfirmation)

    } footer: {

    Text(viewModel.passwordMessage)

    .foregroundColor(.red)

    }

    // Submit button

    Section {

    Button("Sign up") {

    print("Signing up as \(viewModel.username)")

    }

    .disabled(!viewModel.isValid)

    }

    }

    }

    }

    ```


    Handling all the input fields and making sure all form elements display the correct
    information (or warnings) for all the different states of the form usually require
    writing a lot of code, and it is easy to get things wrong and miss an important
    condition—especially when having to deal with asynchronous event sources like
    a remote API.


    By using Combine and functional reactive programming, it will be much easier to
    implement this sign-up form.


    In this chapter, we will focus on validating the username length requirement and
    the password strength requirements. In the next chapter, we will look at how to
    use Combine for networking and how we can use it to connect to a server and find
    out the username the user chose is still available.


    ### The View Model


    To perform input validation, our code needs to react to any changes the user makes
    to the sign-up form. In particular, we are interested in observing changes to
    the `username, password`, and `passwordConfirmation` text input fields. As we
    have already seen in the previous chapters, it is not possible to manipulate SwiftUI
    views directly or ready their state by accessing their properties. Instead, SwiftUI
    manages UI state outside of the view elements, in what is called the *source of
    truth*.


    To make this possible, SwiftUI provides a number of property wrappers we can use
    to connect the source of truth to the views of an application. In Chapter [4](#509862_1_En_4_Chapter.xhtml),
    we discussed how those property wrappers work and which ones to use in which situation.


    You might recall that we can use `@State` to handle local state in a view, so
    you might be tempted to use a local `@State` property to hold the username, password,
    and password confirmation for the sign-up form. However, `@State` is not a publisher,
    so we cannot use it to drive any Combine pipelines.


    Instead, we will create a view model with `username, password`, and `passwordConfirmation`
    published properties that we can bind to the respective UI views.


    ```

    class SignUpFormViewModel: ObservableObject {

    // Input

    @Published var username: String = ""

    @Published var password: String = ""

    @Published var passwordConfirmation: String = ""

    // Output

    @Published var usernameMessage: String = ""

    @Published var passwordMessage: String = ""

    @Published var isValid: Bool = false

    }

    ```


    Marking a property as `@Published` turns it into a Combine publisher. Not only
    does this allow us to bind the property to a UI element—we can also attach a Combine
    pipeline to it and run our validation logic inside the pipeline. We can then assign
    the result of the pipeline to another published property, which allows us to drive
    the UI with the result. For example, we can disable the *Submit* button as long
    as the form input is invalid.


    By conforming the view model to `ObservableObject`, we make it observable. Whenever
    one of the published properties changes, the view model will emit the changes
    values, telling SwiftUI to update all affected views.


    Using Combine in this way helps us to define the behavior of our application in
    a functional way, making sure that the UI and the application state are always
    in sync.


    On a high level, the flow of information looks like this:


    *   The user types their preferred username into the username text input field.


    *   Every time the user types a character, the `TextField` view assigns the text
    entered so far to the username published property of the `SignUpFormViewModel`.


    *   Since `username` is a publisher, it sends events for any change to all of
    its subscribers.


    *   One of those subscribers is a Combine pipeline that checks if the length of
    the `username` is greater than three characters.


    *   The result of this pipeline is then used together with the result of other
    pipelines to determine the overall validation result of the input form.


    The basic version of our view model is already connected to the views of the sign-up
    form, so let’s now look at how to implement the validation logic using Combine.'
  trans: "\n# 使用 Combine 实现输入验证\n\n假设我们决定为图书追踪应用添加一些社交功能。为此，我们需要让用户注册并创建账户。注册时，用户需要选择用户名和密码：\n\
    \n![](img/509862_1_En_8_Fig1_HTML.png)\n\n一张移动设备屏幕的示意图，显示文本“注册”。下方字段依次为：用户名、密码、重复密码等。\n\
    \n图 8-1\n\n简单的注册表单\n\n为了保障用户数据的安全，我们需要满足以下几个前提条件：\n\n- `username` 至少包含三个字符。这一点可以在用户输入期望用户名时进行本地校验。\n\
    - 用户名必须唯一，我们需要确保所选用户名未被其他用户使用。这需要在后端进行校验——我们需要查询某个 API 端点来确认该用户名是否仍可用。\n- 用户密码必须满足一定的复杂程度要求（即，密码需要足够强健）。\n\
    - 为确保用户能记住密码，我们会要求用户在第二个密码输入字段中重复输入密码。\n\n只有当所有这些条件都满足时，我们才能创建新用户账户。创建新账户的按钮应保持禁用状态，直到所有条件都满足。\n\
    \n如你所见，我们需要处理多个事件：\n\n- 仅当表单有效时，*注册*按钮才可启用。\n- 如果用户名太短或不可用，*用户名*输入字段需要显示警告。\n\
    - 如果密码不够强健或两次输入不匹配，*密码*字段需要显示警告。\n\n## 注册表单视图\n\n在本章中，我们将使用 `Form` 来处理所有用户输入。为了显示任何错误消息或警告，我们将使用相应表单\
    \ `Section` 的页眉/页脚。在第十四章中，我们将更进一步，构建一个可复用且可配置的文本输入字段，该字段带有浮动标签，并可以内联显示错误信息。\n\n\
    > ***注*** *你可以在本书的 Git-Hub 仓库*^(⁶⁷)*中找到示例应用的代码，位于第 8 章——使用 Combine 驱动 UI 状态文件夹中。各个步骤可以在*\
    \ steps *文件夹中找到，最终版本位于* final *文件夹中。*\n\n```\nstruct SignUpForm: View {\n    @StateObject\
    \ var viewModel = SignUpFormViewModel()\n    var body: some View {\n        Form\
    \ {\n            // 用户名\n            Section {\n                TextField(\"用户名\"\
    , text: $viewModel.username)\n                    .autocapitalization(.none)\n\
    \                    .disableAutocorrection(true)\n            } footer: {\n \
    \               Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
    \            }\n            // 密码\n            Section {\n                SecureField(\"\
    密码\",\n                            text: $viewModel.password)\n              \
    \  SecureField(\"重复密码\",\n                            text: $viewModel.passwordConfirmation)\n\
    \            } footer: {\n                Text(viewModel.passwordMessage)\n  \
    \                  .foregroundColor(.red)\n            }\n            // 提交按钮\n\
    \            Section {\n                Button(\"注册\") {\n                   \
    \ print(\"正在以用户名 \\(viewModel.username) 注册\")\n                }\n           \
    \     .disabled(!viewModel.isValid)\n            }\n        }\n    }\n}\n```\n\
    \n处理所有输入字段并确保所有表单元素针对表单的不同状态显示正确的信息（或警告）通常需要编写大量代码，并且很容易出错或遗漏重要条件——尤其是在需要处理像远程\
    \ API 这样的异步事件源时。\n\n通过使用 Combine 和函数式响应式编程，实现这个注册表单会变得容易得多。\n\n在本章中，我们将重点验证用户名的长度要求和密码强度要求。在下一章中，我们将探讨如何使用\
    \ Combine 进行网络请求，以及如何利用它连接服务器并检查用户选择的用户名是否仍然可用。\n\n## 视图模型\n\n为了执行输入验证，我们的代码需要响应用户对注册表单所做的任何更改。我们特别关注对\
    \ `username`、`password` 和 `passwordConfirmation` 文本输入字段的更改观察。正如我们在前几章中已经看到的，无法直接操作\
    \ SwiftUI 视图或通过访问其属性来获取其状态。相反，SwiftUI 在视图元素之外管理 UI 状态，这被称为*数据源*。\n\n为此，SwiftUI\
    \ 提供了许多属性包装器，我们可以用它们将数据源连接到应用的视图。在第四章中，我们讨论了这些属性包装器的工作原理以及在何种情况下使用它们。\n\n你可能还记得，我们可以使用\
    \ `@State` 来处理视图中的局部状态，因此你可能会想使用局部 `@State` 属性来保存注册表单的用户名、密码和密码确认。然而，`@State`\
    \ 并非发布者，因此我们无法用它来驱动任何 Combine 管道。\n\n相反，我们将创建一个视图模型，其中包含已发布属性 `username`、`password`\
    \ 和 `passwordConfirmation`，这些属性可以绑定到相应的 UI 视图。\n\n```\nclass SignUpFormViewModel:\
    \ ObservableObject {\n    // 输入\n    @Published var username: String = \"\"\n\
    \    @Published var password: String = \"\"\n    @Published var passwordConfirmation:\
    \ String = \"\"\n    \n    // 输出\n    @Published var usernameMessage: String =\
    \ \"\"\n    @Published var passwordMessage: String = \"\"\n    @Published var\
    \ isValid: Bool = false\n}\n```\n\n将属性标记为 `@Published` 会将其转换为 Combine 发布者。这不仅允许我们将属性绑定到\
    \ UI 元素，还可以将 Combine 管道附加到该属性，并在管道内部执行验证逻辑。然后，我们可以将管道的结果分配给另一个已发布属性，从而用结果驱动 UI。例如，只要表单输入无效，就可以禁用*提交*按钮。\n\
    \n通过使视图模型遵循 `ObservableObject` 协议，我们使其变得可观察。每当某个已发布属性发生变化时，视图模型将发出变化后的值，通知 SwiftUI\
    \ 更新所有受影响的视图。\n\n以这种方式使用 Combine 有助于我们以函数式的方式定义应用的行为，确保 UI 和应用状态始终保持同步。\n\n从高层次来看，信息流如下所示：\n\
    \n- 用户在用户名字段中输入偏好的用户名。\n- 每当用户键入一个字符，`TextField` 视图就会将当前输入的文本分配给 `SignUpFormViewModel`\
    \ 的已发布属性 `username`。\n- 由于 `username` 是一个发布者，它会对任何更改向其所有订阅者发送事件。\n- 其中一个订阅者是一个\
    \ Combine 管道，用于检查 `username` 的长度是否大于三个字符。\n- 该管道的结果将与其他管道的结果结合使用，以确定输入表单的整体验证结果。\n\
    \n视图模型的基本版本已经连接到注册表单的视图，因此现在让我们来看看如何使用 Combine 实现验证逻辑。\n"
- fmt: "### Validating the Username\n\nLet's start with a simple verification and\
    \ check the username length. We can access the publisher of a published property\
    \ using the `$propertyName` syntax. This will allow us to subscribe to any events\
    \ the publisher sends (e.g., when the underlying property is changed because the\
    \ user starts typing their username).\n\nThe input to our pipeline is a `String`,\
    \ but we want to return a `Bool` indicating whether the length of the username\
    \ is valid. For transformations like these, we can use Combine's `map` operator.\
    \ Inside its closure, we can operate on the elements it receives from the upstream\
    \ publisher and transform them into the required result.\n\nSo to verify if the\
    \ `username` has at least three characters, we can check whether the `count` property\
    \ of the input string is three or more. This check will either return `true` or\
    \ `false`:\n\n```\n$username\n.map { username in\n    return username.count >=\
    \ 3\n}\n```\n\nAnd since this check is the only statement we execute inside the\
    \ closure, we can use an implicit return to simplify the code:\n\n```\n$username\n\
    .map { username in\n    username.count >= 3\n}\n```\n\nOr, by using positional\
    \ arguments:\n\n```\n$username\n.map { $0.count >= 3 }\n```\n\nUltimately, the\
    \ result of this pipeline (and others) needs to be assigned to the `isValid` property\
    \ of the view model. As this currently is our only pipeline, we can do this in\
    \ the view model's initializer:\n\n```\nclass SignUpFormViewModel: ObservableObject\
    \ {\n    // Input\n    @Published var username: String = \"\"\n    @Published\
    \ var password: String = \"\"\n    @Published var passwordConfirmation: String\
    \ = \"\"\n    // Output\n    @Published var usernameMessage: String = \"\"\n \
    \   @Published var passwordMessage: String = \"\"\n    @Published var isValid:\
    \ Bool = false\n\n    init() {\n        $username\n            .map { $0.count\
    \ >= 3 }\n            .assign(to: &$isValid)\n    }\n}\n```\n\nAt the end of the\
    \ pipeline, we use the `assign(to:)` operator to assign the result of the pipeline\
    \ to the `isValid` property.\n\n**Figure 8-2** – The Combine pipeline for validating\
    \ the username length\n\nIf you run the app now, you will be able to see that\
    \ the *Submit* button is disabled until you enter a username that has at least\
    \ three characters. However, there is no feedback for the user, and they might\
    \ be wondering why the button is disabled, or what's the minimum username length.\n\
    \n### Displaying Validation Messages\n\nSo, before we move on to implementing\
    \ the password validation, let's make sure to provide some guidance for the user\
    \ and display a suitable validation message. The view model already has a property\
    \ `usernameMessage` that is bound to the footer of the form section that contains\
    \ the `username` input field. All that's left to do for us is to implement the\
    \ Combine pipeline that computes the validation message based on the length of\
    \ the `username`.\n\nA naive implementation might look like this:\n\n```\nclass\
    \ SignUpFormViewModel: ObservableObject {\n    // ...\n\n    init() {\n      \
    \  $username\n            .map { $0.count >= 3 }\n            .assign(to: &$isValid)\n\
    \n        $username\n            .map {\n                $0.count >= 3\n     \
    \               ? \"\"\n                    : \"Username must be at least three\
    \ characters!\"\n            }\n            .assign(to: &$usernameMessage)\n \
    \   }\n}\n```\n\nWhile this solution works fine, it has a number of drawbacks:\n\
    \n1.  It contains duplicate logic for checking the username length. This might\
    \ not be an issue now, but it might end up becoming a maintenance burden once\
    \ we add more pipelines that contain a hard-coded version of the requirement that\
    \ usernames must have at least three characters.\n2.  It is not scalable. At the\
    \ moment, there is just one rule, but what happens if we add another rule, such\
    \ as that usernames have to be unique, which will require us to communicate with\
    \ a backend system. Combining several rules will be very complicated or even impossible\
    \ with this approach.\n\nTo address these issues, we will make our Combine pipelines\
    \ reusable by encapsulating them in computed properties.\n\n### Encapsulating\
    \ Combine Pipelines in Computed Properties\n\nAn easy way to make Combine publishers\
    \ reusable is to encapsulate them in private computed properties.\n\nAs you have\
    \ learned in Chapter 7, a `Publisher` is a generic type that has two associated\
    \ types for specifying the result and error cases. In our case, the result is\
    \ of type `Bool`, and the pipeline will never fail, so the failure type is `Never`.\n\
    \nWhen putting together pipelines, the type of the pipeline will be a nested generic\
    \ type representing the return types of all the publishers and operators we assembled\
    \ along the way. In our case, this would be `Publishers.Map<Published<String>.Publisher,\
    \ Bool>`. To avoid having to deal with such a complicated type, we can use type\
    \ erasure. Combine provides an operator `eraseToAnyPublisher` that erases the\
    \ type of a pipeline to `AnyPublisher`, which allows us to wrap our pipeline in\
    \ a computed property like this:\n\n```\nprivate var isUsernameLengthValidPublisher:\
    \ AnyPublisher<Bool, Never> {\n    $username\n        .map { $0.count >= 3 }\n\
    \        .eraseToAnyPublisher()\n}\n```\n\nHaving moved the pipeline into a computed\
    \ property, we can now update the call site in the view model's initializer:\n\
    \n```\ninit() {\n    isUsernameLengthValidPublisher\n        .assign(to: &$isValid)\n\
    }\n```\n\nThe next step is to reuse the publisher to drive the pipeline for computing\
    \ the validation message:\n\n```\ninit() {\n    isUsernameLengthValidPublisher\n\
    \        .assign(to: &$isValid)\n\n    isUsernameLengthValidPublisher\n      \
    \  .map {\n            $0 ? \"\"\n                : \"Username too short. Needs\
    \ to be at least 3 characters.\"\n        }\n        .assign(to: &$usernameMessage)\n\
    }\n```\n\nBy refactoring our code like this, we have moved the business logic\
    \ (\"usernames must have at least three characters\") to one single location,\
    \ where it is easier to update. This also enables us to reuse the publisher for\
    \ composing more complex rules, as we will see shortly.\n\nBut before we do so,\
    \ I'd like to call your attention to a small, but potentially serious aspect:\
    \ the code we moved into the `isUsernameLengthValidPublisher` property will create\
    \ a new pipeline every time it gets called. When using this publisher in more\
    \ than one context—like we just did—we would end up not with one, but multiple\
    \ instances of the same pipeline. Not only would this waste memory, but it'd also\
    \ become a more serious issue once we build a pipeline that makes network calls\
    \ or accesses a database. Creating and using multiple instances of a pipeline\
    \ that performs a network access each time it processes an event would result\
    \ in duplicate network requests for each extra instance of the pipeline—definitely\
    \ not what we want.\n\nTo prevent this from happening, we need to convert the\
    \ computed property into a lazy property. Lazy properties are computed once, and\
    \ only the first time you access them. Converting a computed property into a lazy\
    \ property requires only a few changes:\n\n```\nprivate lazy var isUsernameLengthValidPublisher:\
    \ AnyPublisher<Bool, Never> = {\n    $username\n        .map { $0.count >= 3 }\n\
    \        .eraseToAnyPublisher()\n}()\n```\n\nThe great thing is that we can use\
    \ lazy properties just like any other property—no need to change the call site.\
    \ With this change in place, we've made sure that we only create the pipeline\
    \ once, when the view model is initialized."
  raw: '### Validating the Username


    Let’s start with a simple verification and check the username length. We can access
    the publisher of a published property using the `$propertyName syntax`^([^(68)](#fn68)).
    This will allow us to subscribe to any events the publisher sends (e.g., when
    the underlying property is changed because the user starts typing their username).


    The input to our pipeline is a `String`, but we want to return a `Bool` indicating
    whether the length of the username is valid. For transformations like these, we
    can use Combine’s `map` operator. Inside its closure, we can operate on the elements
    it receives from the upstream publisher and transform them into the required result.


    So to verify if the `username` has at least three characters, we can check whether
    the `count` property of the input string is three or more. This check will either
    return `true` or `false`:


    ```

    $username

    .map { username in

    return username.count >= 3

    }

    ```


    And since this check is the only statement^([^(69)](#fn69)) we execute inside
    the closure, we can use an implicit return to simplify the code:


    ```

    $username

    .map { username in

    username.count >= 3

    }

    ```


    Or, by using positional arguments:


    ```

    $username

    .map { $0.count >= 3 }

    ```


    Ultimately, the result of this pipeline (and others) needs to be assigned to the
    `isValid` property of the view model. As this currently is our only pipeline,
    we can do this in the view model’s initializer:


    ```

    class SignUpFormViewModel: ObservableObject {

    // Input

    @Published var username: String = ""

    @Published var password: String = ""

    @Published var passwordConfirmation: String = ""

    // Output

    @Published var usernameMessage: String = ""

    @Published var passwordMessage: String = ""

    @Published var isValid: Bool = false

    init() {

    $username

    .map { $0.count >= 3 }

    .assign(to: &$isValid)

    }

    }

    ```


    At the end of the pipeline, we use the `assign(to:)` operator to assign the result
    of the pipeline to the `isValid` property.


    ![](images/509862_1_En_8_Chapter/509862_1_En_8_Fig2_HTML.png)


    A block diagram to combine the pipeline. It has 3 blocks: 2 blocks at the top
    and 1 at the bottom. A dotted line connects the 3 blocks. Blocks are Peter Friese
    and 2 passwords, Published var username: string and Length of username validated.


    Figure 8-2


    The Combine pipeline for validating the username length


    If you run the app now, you will be able to see that the *Submit* button is disabled
    until you enter a username that has at least three characters.^([^(70)](#fn70))
    However, there is no feedback for the user, and they might be wondering why the
    button is disabled, or what’s the minimum username length.


    ### Displaying Validation Messages


    So, before we move on to implementing the password validation, let’s make sure
    to provide some guidance for the user and display a suitable validation message.
    The view model already has a property `usernameMessage` that is bound to the footer
    of the form section that contains the `username` input field. All that’s left
    to do for us is to implement the Combine pipeline that computes the validation
    message based on the length of the `username`.


    A naive implementation might look like this:


    ```

    class SignUpFormViewModel: ObservableObject {

    // ...

    init() {

    $username

    .map { $0.count >= 3 }

    .assign(to: &$isValid)

    $username

    .map {

    $0.count >= 3

    ? ""

    : "Username must be at least three characters!"

    }

    .assign(to: &$usernameMessage)

    }

    }

    ```


    While this solution works fine, it has a number of drawbacks:


    1.  It contains duplicate logic for checking the username length. This might not
    be an issue now, but it might end up becoming a maintenance burden once we add
    more pipelines that contain a hard-coded version of the requirement that usernames
    must have at least three characters.


    2.  It is not scalable. At the moment, there is just one rule, but what happens
    if we add another rule, such as that usernames have to be unique, which will require
    us to communicate with a backend system. Combining several rules will be very
    complicated or even impossible with this approach.


    To address these issues, we will make our Combine pipelines reusable by encapsulating
    them in computed properties.


    ### Encapsulating Combine Pipelines in Computed Properties


    An easy way to make Combine publishers reusable is to encapsulate them in private
    computed properties.


    As you have learned in Chapter [7](#509862_1_En_7_Chapter.xhtml), a  `Publisher`
    is a generic type that has two associated types for specifying the result and
    error cases. In our case, the result is of type  `Bool`, and the pipeline will
    never fail, so the failure type is  `Never`.


    When putting together pipelines, the type of the pipeline will be a nested generic
    type representing the return types of all the publishers and operators we assembled
    along the way. In our case, this would be `Publishers.` `Map<Published<String>.Publisher,
    Bool>`. To avoid having to deal with such a complicated type, we can use type
    erasure. Combine provides an operator `eraseToAnyPublisher` that erases the type
    of a pipeline to `AnyPublisher`, which allows us to wrap our pipeline in a computed
    property like this:


    ```

    private var isUsernameLengthValidPublisher:

    AnyPublisher

    {

    $username

    .map { $0.count >= 3 }

    .eraseToAnyPublisher()

    }

    ```


    Having moved the pipeline into a computed property, we can now update the call
    site in the view model’s initializer:


    ```

    init() {

    isUsernameLengthValidPublisher

    .assign(to: &$isValid)

    }

    ```


    The next step is to reuse the publisher to drive the pipeline for computing the
    validation message:


    ```

    init() {

    isUsernameLengthValidPublisher

    .assign(to: &$isValid)

    isUsernameLengthValidPublisher

    .map {

    $0 ? ""

    : "Username too short. Needs to be at least 3 characters."

    }

    .assign(to: &$usernameMessage)

    }

    ```


    By refactoring our code like this, we have moved the business logic (“usernames
    must have at least three characters”) to one single location, where it is easier
    to update. This also enables us to reuse the publisher for composing more complex
    rules, as we will see shortly.


    But before we do so, I’d like to call your attention to a small, but potentially
    serious aspect: the code we moved into the `isUsernameLengthValidPublisher` property
    will create a new pipeline every time it gets called. When using this publisher
    in more than one context—like we just did—we would end up not with one, but multiple
    instances of the same pipeline. Not only would this waste memory, but it’d also
    become a more serious issue once we build a pipeline that makes network calls
    or accesses a database. Creating and using multiple instances of a pipeline that
    performs a network access each time it processes an event would result in duplicate
    network requests for each extra instance of the pipeline—definitely not what we
    want.


    To prevent this from happening, we need to convert the computed property into
    a lazy property. Lazy properties are computed once, and only the first time you
    access them. Converting a computed property into a lazy property requires only
    a few changes:


    ```

    private lazy var isUsernameLengthValidPublisher:

    AnyPublisher =

    {

    $username

    .map { $0.count >= 3 }

    .eraseToAnyPublisher()

    }()

    ```


    The great thing is that we can use lazy properties just like any other property—no
    need to change the call site. With this change in place, we’ve made sure that
    we only create the pipeline once, when the view model is initialized.'
  trans: "\n### 验证用户名\n\n首先进行一个简单的验证，检查用户名字符长度。我们可以使用 `$propertyName` 语法来访问已发布属性的发布者。这样我们就能订阅该发布者发送的任何事件（例如，当用户开始输入用户名导致底层属性发生变化时）。\n\
    \n我们管道的输入类型是 `String`，但我们需要返回一个 `Bool` 值来指示用户名长度是否有效。对于此类转换，我们可以使用 Combine 的 `map`\
    \ 操作符。在其闭包内，我们可以对从上游发布者接收到的元素进行操作，并将其转换为所需的结果。\n\n因此，要验证 `username` 是否至少包含三个字符，我们可以检查输入字符串的\
    \ `count` 属性是否大于等于三。此检查将返回 `true` 或 `false`：\n\n```\n$username\n.map { username\
    \ in\n    return username.count >= 3\n}\n```\n\n由于此检查是我们在闭包中执行的唯一语句，我们可以使用隐式返回来简化代码：\n\
    \n```\n$username\n.map { username in\n    username.count >= 3\n}\n```\n\n或者，使用位置参数：\n\
    \n```\n$username\n.map { $0.count >= 3 }\n```\n\n最终，此管道（以及其他管道）的结果需要赋值给视图模型的 `isValid`\
    \ 属性。由于目前这是我们唯一的管道，我们可以在视图模型的初始化器中完成此操作：\n\n```\nclass SignUpFormViewModel: ObservableObject\
    \ {\n    // 输入\n    @Published var username: String = \"\"\n    @Published var\
    \ password: String = \"\"\n    @Published var passwordConfirmation: String = \"\
    \"\n    // 输出\n    @Published var usernameMessage: String = \"\"\n    @Published\
    \ var passwordMessage: String = \"\"\n    @Published var isValid: Bool = false\n\
    \n    init() {\n        $username\n            .map { $0.count >= 3 }\n      \
    \      .assign(to: &$isValid)\n    }\n}\n```\n\n在管道的末尾，我们使用 `assign(to:)` 操作符将管道的结果赋值给\
    \ `isValid` 属性。\n\n**图 8-2** – 用于验证用户名长度的 Combine 管道\n\n如果你现在运行应用，你会发现*提交*按钮将处于禁用状态，直到你输入至少包含三个字符的用户名。但是，用户没有任何反馈，他们可能会疑惑为什么按钮被禁用，或者想知道用户名的最大长度是多少。\n\
    \n### 显示验证消息\n\n因此，在继续实现密码验证之前，让我们确保为用户提供一些指导，并显示合适的验证消息。视图模型中已经有一个 `usernameMessage`\
    \ 属性，它绑定到包含 `username` 输入字段的表单部分的页脚。我们需要做的只是实现 Combine 管道，根据 `username` 的长度计算验证消息。\n\
    \n一个初级的实现可能如下所示：\n\n```\nclass SignUpFormViewModel: ObservableObject {\n    //\
    \ ...\n\n    init() {\n        $username\n            .map { $0.count >= 3 }\n\
    \            .assign(to: &$isValid)\n\n        $username\n            .map {\n\
    \                $0.count >= 3\n                    ? \"\"\n                 \
    \   : \"用户名必须至少包含三个字符！\"\n            }\n            .assign(to: &$usernameMessage)\n\
    \    }\n}\n```\n\n虽然这个解决方案运行良好，但它有一些缺点：\n\n1.  它包含了用于检查用户名的长度的重复逻辑。现在这可能不是问题，但一旦我们添加更多管道，其中包含硬编码的“用户名必须至少包含三个字符”的要求，这最终可能会成为维护负担。\n\
    2.  它不可扩展。目前只有一个规则，但如果添加另一个规则（例如用户名必须唯一），这需要与后端系统通信，会发生什么？使用这种方法，组合多个规则将非常复杂，甚至不可能。\n\
    \n为了解决这些问题，我们将通过将 Combine 管道封装在计算属性中，使其可重用。\n\n### 将 Combine 管道封装在计算属性中\n\n使 Combine\
    \ 发布者可重用的一种简单方法是将它们封装在私有计算属性中。\n\n正如你在第 7 章中学到的，`Publisher` 是一个泛型类型，它有两个关联类型用于指定结果和错误情况。在我们的例子中，结果是\
    \ `Bool` 类型，管道永远不会失败，因此失败类型是 `Never`。\n\n在组装管道时，管道的类型将是一个嵌套的泛型类型，表示我们沿途组装的所有发布者和操作符的返回类型。在我们的例子中，这将是\
    \ `Publishers.Map<Published<String>.Publisher, Bool>`。为了避免处理如此复杂的类型，我们可以使用类型擦除。Combine\
    \ 提供了一个 `eraseToAnyPublisher` 操作符，它将管道的类型擦除为 `AnyPublisher`，这使我们能够像这样将管道包装在计算属性中：\n\
    \n```\nprivate var isUsernameLengthValidPublisher: AnyPublisher<Bool, Never> {\n\
    \    $username\n        .map { $0.count >= 3 }\n        .eraseToAnyPublisher()\n\
    }\n```\n\n将管道移入计算属性后，我们现在可以更新视图模型初始化器中的调用点：\n\n```\ninit() {\n    isUsernameLengthValidPublisher\n\
    \        .assign(to: &$isValid)\n}\n```\n\n下一步是重用该发布者来驱动用于计算验证消息的管道：\n\n```\n\
    init() {\n    isUsernameLengthValidPublisher\n        .assign(to: &$isValid)\n\
    \n    isUsernameLengthValidPublisher\n        .map {\n            $0 ? \"\"\n\
    \                : \"用户名太短。至少需要 3 个字符。\"\n        }\n        .assign(to: &$usernameMessage)\n\
    }\n```\n\n通过像这样重构代码，我们将业务逻辑（“用户名必须至少包含三个字符”）移到了单个位置，从而更易于更新。这也使我们能够重用该发布者来组合更复杂的规则，我们稍后会看到。\n\
    \n但在那之前，我想提请您注意一个小但可能很严重的方面：我们移入 `isUsernameLengthValidPublisher` 属性的代码将在每次被调用时创建一个新的管道。当在多个上下文中使用此发布者时（就像我们刚做的那样），我们最终将得到同一个管道的多个实例，而不是一个实例。这不仅会浪费内存，而且一旦我们构建一个进行网络调用或访问数据库的管道，它就会成为一个更严重的问题。创建和使用管道的多个实例，每个实例在处理事件时都执行网络访问，将导致每个额外的管道实例产生重复的网络请求——这绝对不是我们想要的。\n\
    \n为了防止这种情况发生，我们需要将计算属性转换为惰性属性。惰性属性只计算一次，并且仅在第一次访问它们时计算。将计算属性转换为惰性属性只需要少量更改：\n\n\
    ```\nprivate lazy var isUsernameLengthValidPublisher: AnyPublisher<Bool, Never>\
    \ = {\n    $username\n        .map { $0.count >= 3 }\n        .eraseToAnyPublisher()\n\
    }()\n```\n\n好处在于，我们可以像使用任何其他属性一样使用惰性属性——无需更改调用点。通过这项更改，我们确保只在视图模型初始化时创建一次管道。\n"
- fmt: '### Validating the Password


    A valid username is just one requirement for being able to create a new user account
    in our app—providing a password is another one. In this section, we will build
    on what you’ve learned in the previous section to implement a Combine pipeline
    that allows us to implement a flexible and easily enhanceable mechanism for validating
    passwords.


    The first step is to make sure the password is not empty. We can implement this
    verification using a simple publisher, similar to how we implemented the username
    length check:


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map { $0.isEmpty }

    .eraseToAnyPublisher()

    }()

    ```


    Just like before, we’re using a lazy computed property to make sure we only create
    one instance of the pipeline.


    As a small optimization, we can access the `isEmpty` property of the password
    string using a key path. Combine includes an extension on `Publisher` with overloaded
    versions of the `map` function that allow us to address up to three key paths
    in the `map` operator.


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map(\.isEmpty)

    .eraseToAnyPublisher()

    }()

    ```


    In the next step, we will compare the password and the password confirmation field
    to make sure the user enters the same password twice. Both `$password` and `$passwordConfirmation`
    are published properties, so we can subscribe to them to receive events whenever
    the user types in their password.


    But how can we consume the latest password and the latest password confirmation?


    Combine provides a number of operators that allow us to combine several publishers
    in the same pipeline. `Publishers.CombineLatest` allows us to use the latest events
    sent by two upstream publishers. The following code snippet subscribes to `$password`
    and `$passwordConfirmation` and compares their latest output (which is the text
    the user entered into the password fields) using the equality operator `==`:


    ```

    private lazy var isPasswordMatching:

    AnyPublisher =

    {

    Publishers.CombineLatest($password, $passwordConfirmation)

    .map(==)

    .eraseToAnyPublisher()

    }()

    ```


    You will notice I used the key path version of the `map` operator—the closure
    version would look like this: `map { $0 == $1 }`. Which one you use is largely
    a matter of style and personal preference.


    Now that we can determine if the password is not empty and that both password
    and its confirmation match, we need to determine the overall password validity:
    the password is valid if it is not empty and if it matches the password confirmation.


    You might have guessed it: we will use `Publishers.CombineLatest` to combine the
    latest state of `isPasswordEmptyPublisher` and `isPasswordMatchingPublisher` into
    yet another publisher that we’re going to name `isPasswordValidPublisher`:


    ```

    private lazy var isPasswordValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { !$0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    By now, this code should look familiar to you. To display a meaningful validation
    message, add the following code to the initializer of your view model:


    ```

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "Password must not be empty"

    }

    else if !isPasswordMatching {

    return "Passwords do not match"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    ```


    ### Putting It All Together


    As a final step, we need to combine the username validation and password validation
    and assign the result to the `isValid` property of the view model. This will enable
    the submit button if the form is valid.


    Similar to how we computed the overall validation state of the password, we will
    use `Publishers.CombineLatest` to determine the overall state of the form based
    on `isUsernameLengthValidPublisher` and `isPasswordValidPublisher`:


    ```

    private lazy var isFormValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isUsernameLengthValidPublisher,

    isPasswordValidPublisher

    )

    .map { $0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    In the initializer of the view model, replace the first line (which uses just
    `isUsernameLengthValidPublisher`) and use `isFormValidPublisher` to drive the
    submit button state:


    ```

    init() {

    isFormValidPublisher

    .assign(to: &$isValid)

    isUsernameLengthValidPublisher

    .map {

    $0 ? ""

    : "Username too short. Needs to be at least 3 characters."

    }

    .assign(to: &$usernameMessage)

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "Password must not be empty"

    }

    else if !isPasswordMatching {

    return "Passwords do not match"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    }

    ```


    ## Exercises^([^(71)](#fn71))


    Choosing a strong password is not easy, and many sign-up forms provide a visual
    clue to help users pick a strong password. Our sign-up form is pretty lenient
    in this regard and allows users to pick anything as a password, which isn’t very
    secure. Use what you’ve learned so far to encourage users to pick a strong password:


    1.  Implement a password length requirement: make sure the user’s password has
    at least eight characters. If it has less than eight characters, display a warning
    in the footer of the password section of the form.


    2.  Verify the password strength and reject any passwords that aren’t strong enough.
    An easy way to do this is to use a library like *Navajo-Swift*,^([^(72)](#fn72))
    which computes the strength on a scale of `very weak`, `weak`, `reasonable`, `strong`,
    `very strong`. Make sure the sign-up form only becomes valid if the user picks
    password with at least `reasonable` strength.


    3.  Add a progress bar to the footer of the password section and display the password
    strength, coloring the progress bar in red, yellow, and green to indicate the
    password strength.'
