    \ to handle incoming request, resulting in HTTP `503` (*Service Unavailable*)\
    \ error messages.\n\nThis is why we need a way to handle asynchronicity in our\
    \ apps. In the following, we will take a look at how to implement asynchronous\
    \ code using different techniques. The example we will be using is a simple sandwich\
    \ store that produces artisanal sandwiches.^([^(113)](#fn113))\n\nThe general\
    \ algorithm looks like this:\n\n* Toast the bread.\n* Slice the other ingredients\
    \ (cucumbers, onions, tomatoes).\n* Once the bread has been toasted,\n  * spread\
    \ condiments on the bread.\n* Layer ingredients on top of one slice of bread.\n\
    * Put lettuce on top.\n* Put the second slice of bread on top.\n* Wrap it all\
    \ up and hand it to the customer.\n\nYou will notice that some of these need to\
    \ be sequential, while others can be performed in parallel. For example, we don’t\
    \ need to wait idly while the bread is toasted—we can use the time to slice the\
    \ vegetables in the meantime.\n\n*The code for this chapter can be found in the*\
    \ *GitHub repository*^([^(114)](#fn114)) *for the book, in the folder Chapter*\
