  raw: '## Bringing It All Together


    In the last chapter, we implemented a check to ensure usernames have at least
    three characters. To verify that the username has at least characters and is still
    available, we need to combine the `isUsernameLengthPublisher` and `isUsernameAvailablePublisher`.
    Just like we did before, we can use `Publishers.CombineLatest()` for this.


    Let’s create a new publisher, `isUsernameValidPublisher`, that combines the events
    that `isUsernameLengthValidPublisher` and `isUsernameAvailablePublisher` send:


    ```

    enum UserNameValid {

    case valid

    case tooShort

    case notAvailable

    }

    private lazy var isUsernameValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isUsernameLengthValidPublisher, isUsernameAvailablePublisher

    )

    .map { longEnough, available in

    if !longEnough {

    return .tooShort

    }

    if !available {

    return .notAvailable

    }

    return .valid

    }

    .share()

    .eraseToAnyPublisher()

    }()

    ```


    Introducing the `UserNameValid` enum helps us to return a semantically meaningful
    result to the subscribers of the pipeline.


    To use this new publisher, we need to update `isFormValidPublisher` accordingly:


    ```

    private lazy var isFormValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isUsernameValidPublisher,

    isPasswordValidPublisher

    )

    .map { ($0 == .valid) && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    ## Exercises


    1.  `isUsernameValidPublisher` is a bit inefficient: it will ping the server even
    if the username is too short. Try improving this by gating the pipeline on the
    length of the username.


    2.  Improve error handling. Instead of mapping a server error to the username
    not being available, return a Result from `checkUsernameAvailable`. In case of
    a success, the result should contain the `UserAvailableMessage`, otherwise the
    server error. Update the pipelines to inform the user that, because the server
    is not available, we cannot determine whether the username is available, and we’ll
    just assume it is available for now, and we will perform a final availability
    check once the user actually hits the submit button.


    ## Summary


    In this chapter, I showed you how to access the network using Combine and how
    this enables you to write straight-line code that should be easier to read and
    maintain than the respective callback-driven counterpart.


    We also looked at how to connect a Combine pipeline that makes network requests
    to SwiftUI by using a view model and attaching the pipeline to an `@Published`
    property.


    We also discussed how Combine can make communicating with a remote server (or
    any asynchronous API, in fact) more efficient.


    By using the `share` operator, we can attach multiple subscribers to a publisher/pipeline
    and avoid running expensive/time-consuming processing for each of those subscribers.
    This is particularly useful when accessing APIs with a higher latency than an
    in-process module, such as a remote server or anything involving I/O.


    The `debounce` operator allows us to deal more efficiently with any events that
    occur in short bursts, like user input. Instead of processing every single event
    coming down the pipeline, we wait for a pause and only operate on the most recent
    event.


    We can use the `removeDuplicates` operator to avoid processing duplicate events.
    As the name suggests, it removes any directly subsequent duplicate events, such
    as the user adding and then removing a character when we also use the `debounce`
    operator.


    Together, these operators can help us build clients that access remote servers
    and other asynchronous APIs more efficiently.


    One thing we need to spend more time on is how to properly deal with errors and
    other unexpected situations. In this chapter, we used `replaceError(with:)` to
    replace any errors with a `nil` value. This helped us to get unblocked, but in
    a real-world application, we need a more flexible way to handle errors. In the
    next chapter, we’re going to discuss a couple of options for doing this.


