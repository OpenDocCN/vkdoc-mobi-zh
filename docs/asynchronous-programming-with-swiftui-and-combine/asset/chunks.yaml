    ### Using Combine to Perform Form Validation


    In this final step, we’re going to use Combine to improve the validation logic.


    At the moment, the validation logic lives in a computed property in the view model:


    ```

    class BookEditViewModel: ObservableObject {

    @Published var book: Book

    var isISBNValid: Bool {

    checkISBN(isbn: book.isbn)

    }

    init(book: Book) {

    self.book = book

    }

    }

    ```


    While this does work, it is less than ideal: SwiftUI will only cause your views
    to be updated if it receives an event from the published properties the views
    are subscribed to.


    As `isISBNValid` is not an `@Published` property, it will not send any notifications
    when it is updated. So, why does the view update and reflect the correct state
    of this property anyway? Well, this is just by coincidence, actually: the view
    model will send an update event whenever the book (or any of its properties) is
    updated. It just so happens that the ISBN is a property of `Book` as well, so
    when you edit the ISBN of a book, the `book` will send an event which will cause
    SwiftUI to rerender. In the process of doing this, it will also rerender the `VStack`
    that conditionally shows an error message based on the state of the `isISBNValid`
    property.


    To make this more solid and less coincidental, let’s use Combine to compute the
    state of `isISBNValid`.


    Let’s first turn `isISBNValid` into a published property:


    ```

    class BookEditViewModel: ObservableObject {

    @Published var book: Book

    @Published var isISBNValid: Bool = true

    // ...

    }

    ```


    Then, in the initializer, we can subscribe to any changes that are sent by the
    `book` publisher. These events will contain the current value of the `book` property.
    To determine whether the current ISBN of a book is valid, we will then `map` over
    the `book` value, verify its ISBN, and assign the resulting `Bool` value to the
    `isISBNValid` property:


    ```

    init(book: Book) {

    self.book = book

    self.$book

    .map { book in

    return checkISBN(isbn: book.isbn)

    }

    .assign(to: &$isISBNValid)

    }

    ```


    We can condense the `map` closure even further thanks to implicit returns and
    implicit parameters:


    ```

    self.$book

    .map { checkISBN(isbn: $0.isbn) }

    .assign(to: &$isISBNValid)

    ```


    And with this, we’ve got a fully functional drill-down navigation for a data-driven
    application, including a simple Combine pipeline for validating form input.


    ## Summary


    In this chapter, you saw how easy it is to build form-based UIs in SwiftUI. By
    using the `Form` view, SwiftUI adapts regular views to match the look and feel
    we all know from the iOS settings screen. The SwiftUI DSL really comes into its
    own here, and you can see how the SwiftUI team harnesses the power of the DSL
    to allow developers to quickly build flexible and feature-rich UIs.


    After looking at static forms, we jumped in at the deep end and took a closer
    look at how to use SwiftUI’s state management tools to build drill-down navigation
    for a data-driven app—a UI pattern that you will find in many apps.


    And finally, we implemented a simple business logic for validating form input.
    By using a view model, we were able to encapsulate this logic and avoid polluting
    the view. Using a view model added some challenges to our drill-down navigation,
    which we were able to overcome by using `@Binding` and `@ObservableObject` together
    to allow users to edit data while giving them the flexibility to change their
    mind and cancel any changes they made. Thanks to using Combine, we were able to
    implement this in a SwiftUI-compatible way.


    This was quite a lot, but we’re only getting started! In the next chapter, we
    will look at Functional Reactive Programming, why it’s so cool, and how it relates
    to Combine!


    Footnotes [1](#509862_1_En_6_Chapter.xhtml#Fn1_source)


    # Part 2


    # 7. Getting Started with Combine


    Now, we have already used a bit of Combine in the previous chapters, and hopefully,
    they were easy enough to understand in the context of the SwiftUI UIs we used
    them with. But you might wonder how Combine really works and what goes on under
    the hood of SwiftUI’s reactive state management system. In this chapter, we’re
    going to dive into Combine, and you will learn about the underlying principles
    and why it works so well in combination with SwiftUI.


    > *The source code for the code snippets in this chapter can be found in the GitHub
    repository for the book.*^([^(51)](#fn51))'
