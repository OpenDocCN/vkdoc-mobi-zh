    \ Combine 操作符来获取用户输入、调用远程 API、接收结果，并将它们分配给一个连接到 UI 的已发布属性：\n\n1.  `debounce` 操作符只会将事件在两次事件之间间隔\
    \ 0.8 秒后才传递。这样，我们只有在用户输入完毕或短暂停顿时才会调用远程 API。\n\n2.  我们使用 `map` 操作符来调用 `searchBooks`\
