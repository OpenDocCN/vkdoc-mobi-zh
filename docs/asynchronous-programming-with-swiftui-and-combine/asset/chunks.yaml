  raw: '### Calling the API and Handling Errors


    Now that the API has a failure type, we need to update the caller as well. Once
    a publisher emits a failure, the pipeline will terminate—unless you capture the
    error. A typical approach to handling errors when using `flatMap` is to combine
    it with a `catch` operator:


    ```

    somePublisher

    .flatMap { value in

    callSomePotentiallyFailingPublisher()

    .catch { error in

    return Just(someDefaultValue)

    }

    }

    .eraseToAnyPublisher()

    ```


    Applying this strategy to the code in our view model results in the following
    code:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .removeDuplicates()

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailablePublisher(userName: username)

    .catch { error in // (1)

    return Just(false) // (2)

    }

    .eraseToAnyPublisher()

    }

    .receive(on: DispatchQueue.main)

    .share()

    .eraseToAnyPublisher()

    }()

    ```


    And just like that, we end up where we started! If the API emits a failure (e.g.,
    the username was too short), we catch the error (1) and replace it with `false`
    (2)—this is exactly the behavior we had before. Except, we wrote a lot more code…


    Seems like we’re getting nowhere with this approach, so let’s take a step back
    and look at the requirements for our solution:


    *   We want to use the emitted values of the pipeline to drive the state of the
    submit button and to display a warning message if the chosen username is not available.


    *   If the pipeline emits a failure, we want to disable the submit button and
    display the error message in the error label below the username input field.


    *   How exactly we handle the errors will depend on the type of failure, as we
    will discuss later in this chapter.


    This means


    *   We need to make sure we can receive both failures and successes


    *   We need to make sure the pipeline doesn’t terminate if we receive a failure


    To achieve all of this, we will map the result of the `checkUserNameAvailablePublisher`
    to a `Result` type. `Result` is an enum that can capture both `success` and `failure`
    states. Mapping the outcome of `checkUserNameAvailablePublisher`to `Result` also
    means the pipeline will no longer terminate in case it emits a failure.


    Let’s first define a typealias for the `Result` type to make our life a little
    easier:


    ```

    typealias Available = Result

    ```


    To turn the result of a publisher into a `Result` type, we can use the following
    operator that John Sundell implemented in his article “The power of extensions
    in Swift”^([^(77)](#fn77)):


    ```

    extension Publisher {

    func asResult() ->

    AnyPublisher, Never>

    {

    self

    .map(Result.success)

    .catch { error in

    Just(.failure(error))

    }

    .eraseToAnyPublisher()

    }

    }

    ```


    This allows us to update the `isUsernameAvailablePublisher` in our view model
    like this:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .removeDuplicates()

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailablePublisher(userName: username)

    .asResult()

    }

    .receive(on: DispatchQueue.main)

    .share()

    .eraseToAnyPublisher()

    }()

    ```


    With this basic plumbing in place, let’s look at how to handle the different error
    scenarios I outlined earlier.


    ### Handling Device/Network Offline Errors


    On mobile devices, it is pretty common to have spotty connectivity: especially
    when you’re on the move, you might be in an area with bad or no coverage.


    Whether or not you should show an error message depends on the situation:


    For our use case, we can assume that the user at least has intermittent connectivity.
    Telling the user that we cannot reach the server would be rather distracting while
    they’re filling out the form. Instead, we should ignore any connectivity errors
    for the form validation (and instead run our local form validation logic).


    Once the user has entered all their details and submits the form, we should show
    an error message if the device is still offline.


    Catching this type of error requires us to make changes at two different places.
    First, in `checkUserNameAvailablePublisher`, we use `mapError` to catch any upstream
    errors and turn them into an `APIError`:


    ```

    enum APIError: LocalizedError {

    /// Invalid request, e.g. invalid URL

    case invalidRequestError(String)

    /// Indicates an error on the transport layer,

    /// e.g. not being able to connect to the server

    case transportError(Error)

    }

    struct AuthenticationService {

    func checkUserNameAvailablePublisher(userName: String)

    -> AnyPublisher

    {

    guard let url = URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Fail(error: APIError.invalidRequestError("URL invalid"))

    .eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    .mapError { error -> Error in

    return APIError.transportError(error)

    }

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .eraseToAnyPublisher()

    }

    }

    ```


    Then, in our view model, we map the result to detect if it was a `failure` (1,
    2). If so, we extract the error and check if it is a network transport error.
    If that’s the case, we return an empty string (3) to suppress the error message:


    ```

    class SignUpScreenViewModel: ObservableObject {

    // ...

    init() {

    isUsernameAvailablePublisher

    .map { result in

    switch result {

    case .failure(let error): // (1)

    if case APIError.transportError(_) = error {

    return "" // (3)

    }

    else {

    return error.localizedDescription

    }

    case .success(let isAvailable):

    return isAvailable ? ""

    : "This username is not available"

    }

    }

    .assign(to: &$usernameMessage) // (4)

    isUsernameAvailablePublisher

    .map { result in

    if case .failure(let error) = result { // (2)

    if case APIError.transportError(_) = error {

    return true

    }

    return false

    }

    if case .success(let isAvailable) = result {

    return isAvailable

    }

    return true

    }

    .assign(to: &$isValid) // (5)

    }

    }

    ```


    In case `isUsernameAvailablePublisher` returned a `success`, we extract the `Bool`
    telling us whether or not the desired username is available and map this to an
    appropriate message.


    And finally, we assign the result of the pipeline to the `usernameMessage` (4)
    and `isValid` (5) published properties which drive the UI on our view.


    Keep in mind that ignoring the network error is a viable option for this kind
    of UI—it might be an entirely different story for your use case, so use your own
    judgment when applying this technique.


    So far, we haven’t exposed any errors to the user, so let’s move on to a category
    of errors that we actually want to make the user aware of.'
  trans: "\n### 调用 API 并处理错误\n\n既然 API 已经有了失败类型，我们也需要更新调用方。一旦发布者发出失败信号，管线的运行就会终止——除非你捕获了该错误。在使用\
    \ `flatMap` 时，处理错误的典型做法是将其与 `catch` 操作符结合使用：\n\n```\nsomePublisher\n.flatMap {\
    \ value in\n    callSomePotentiallyFailingPublisher()\n        .catch { error\
    \ in\n            return Just(someDefaultValue)\n        }\n}\n.eraseToAnyPublisher()\n\
    ```\n\n将这一策略应用于我们视图模型中的代码，会得到如下代码：\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
    \    AnyPublisher =\n{\n    $username\n        .debounce(for: 0.8, scheduler:\
    \ DispatchQueue.main)\n        .removeDuplicates()\n        .flatMap { username\
    \ -> AnyPublisher in\n            self.authenticationService\n               \
    \ .checkUserNameAvailablePublisher(userName: username)\n                .catch\
    \ { error in // (1)\n                    return Just(false) // (2)\n         \
    \       }\n                .eraseToAnyPublisher()\n        }\n        .receive(on:\
    \ DispatchQueue.main)\n        .share()\n        .eraseToAnyPublisher()\n}()\n\
    ```\n\n就这样，我们又回到了原点！如果 API 发出失败信号（例如，用户名太短），我们会捕获该错误（1），并将其替换为 `false`（2）——这和我们之前的行为完全一样。只不过，我们写了更多的代码……\n\
    \n这种方法似乎毫无进展，所以让我们退一步，重新审视一下我们对解决方案的需求：\n\n- 我们希望使用管线发出的值来控制提交按钮的状态，并在所选用户名不可用时显示警告消息。\n\
    - 如果管线发出失败信号，我们希望禁用提交按钮，并在用户名输入框下方的错误标签中显示错误消息。\n- 错误的具体处理方式将取决于失败的类型，我们将在本章后面讨论。\n\
    \n这意味着：\n- 我们需要确保既能接收失败信号，也能接收成功信号\n- 我们需要确保管线在接收到失败信号时不会终止\n\n为了实现这一切，我们将把 `checkUserNameAvailablePublisher`\
    \ 的结果映射为 `Result` 类型。`Result` 是一个枚举，可以同时捕获 `success` 和 `failure` 状态。将 `checkUserNameAvailablePublisher`\
    \ 的结果映射为 `Result`，也意味着管线在发出失败信号时不会再终止。\n\n我们先为 `Result` 类型定义一个类型别名，让生活更轻松一些：\n\
    \n```\ntypealias Available = Result\n```\n\n为了将发布者的结果转换为 `Result` 类型，我们可以使用 John\
    \ Sundell 在其文章 “The power of extensions in Swift”^((77)) 中实现的以下操作符：\n\n```\nextension\
    \ Publisher {\n    func asResult() ->\n        AnyPublisher, Never>\n    {\n \
    \       self\n            .map(Result.success)\n            .catch { error in\n\
    \                Just(.failure(error))\n            }\n            .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\n这使得我们可以像这样更新视图模型中的 `isUsernameAvailablePublisher`：\n\n```\n\
    private lazy var isUsernameAvailablePublisher:\n    AnyPublisher =\n{\n    $username\n\
    \        .debounce(for: 0.8, scheduler: DispatchQueue.main)\n        .removeDuplicates()\n\
    \        .flatMap { username -> AnyPublisher in\n            self.authenticationService\n\
    \                .checkUserNameAvailablePublisher(userName: username)\n      \
    \          .asResult()\n        }\n        .receive(on: DispatchQueue.main)\n\
    \        .share()\n        .eraseToAnyPublisher()\n}()\n```\n\n有了这些基本框架，让我们来看看如何处理我之前概述的不同错误场景。\n\
    \n### 处理设备/网络离线错误\n\n在移动设备上，连接不稳定是很常见的情况：尤其是当你移动时，可能会处于信号差或无信号的区域。\n\n是否应该显示错误消息取决于具体情况：\n\
    \n对于我们的用例，我们可以假设用户至少是间歇性联网的。在用户填写表单时，告诉他们无法连接到服务器可能会相当分散注意力。相反，对于表单验证，我们应该忽略任何连接错误（而是运行我们本地的表单验证逻辑）。\n\
    \n一旦用户输入了所有详细信息并提交表单，如果设备仍然离线，我们应该显示错误消息。\n\n捕获这种类型的错误需要我们在两个不同的地方进行修改。首先，在 `checkUserNameAvailablePublisher`\
    \ 中，我们使用 `mapError` 来捕获任何上游错误，并将其转换为 `APIError`：\n\n```\nenum APIError: LocalizedError\
    \ {\n    /// 无效请求，例如无效的 URL\n    case invalidRequestError(String)\n    /// 表示传输层错误，\n\
    \    /// 例如无法连接到服务器\n    case transportError(Error)\n}\n\nstruct AuthenticationService\
    \ {\n    func checkUserNameAvailablePublisher(userName: String)\n        -> AnyPublisher\n\
    \    {\n        guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
    (userName)\") else {\n            return Fail(error: APIError.invalidRequestError(\"\
    URL 无效\"))\n                .eraseToAnyPublisher()\n        }\n        return\
    \ URLSession.shared.dataTaskPublisher(for: url)\n            .mapError { error\
    \ -> Error in\n                return APIError.transportError(error)\n       \
    \     }\n            .map(\\.data)\n            .decode(type: UserNameAvailableMessage.self,\n\
    \                    decoder: JSONDecoder())\n            .map(\\.isAvailable)\n\
    \            .eraseToAnyPublisher()\n    }\n}\n```\n\n然后，在我们的视图模型中，我们映射结果以检测它是否为\
    \ `failure`（1, 2）。如果是，我们提取错误并检查它是否是网络传输错误。如果是这种情况，我们返回一个空字符串（3）来抑制错误消息：\n\n```\n\
    class SignUpScreenViewModel: ObservableObject {\n    // ...\n    init() {\n  \
    \      isUsernameAvailablePublisher\n            .map { result in\n          \
    \      switch result {\n                case .failure(let error): // (1)\n   \
    \                 if case APIError.transportError(_) = error {\n             \
    \           return \"\" // (3)\n                    }\n                    else\
    \ {\n                        return error.localizedDescription\n             \
    \       }\n                case .success(let isAvailable):\n                 \
    \   return isAvailable ? \"\"\n                        : \"此用户名不可用\"\n       \
    \         }\n            }\n            .assign(to: &$usernameMessage) // (4)\n\
    \n        isUsernameAvailablePublisher\n            .map { result in\n       \
    \         if case .failure(let error) = result { // (2)\n                    if\
    \ case APIError.transportError(_) = error {\n                        return true\n\
    \                    }\n                    return false\n                }\n\
    \                if case .success(let isAvailable) = result {\n              \
    \      return isAvailable\n                }\n                return true\n  \
    \          }\n            .assign(to: &$isValid) // (5)\n    }\n}\n```\n\n如果 `isUsernameAvailablePublisher`\
    \ 返回了 `success`，我们提取出表示所需用户名是否可用的 `Bool` 值，并将其映射为适当的消息。\n\n最后，我们将管线的结果分配给 `usernameMessage`（4）和\
    \ `isValid`（5）这两个已发布的属性，它们驱动视图上的 UI。\n\n请记住，对于这类 UI，忽略网络错误是一个可行的选择——但对你的用例来说，情况可能完全不同，因此在应用此技术时请自行判断。\n\
    \n到目前为止，我们还没有向用户暴露任何错误，所以让我们继续讨论一类我们实际希望让用户知道的错误。\n"
- fmt: '### Handling Validation Errors


    Most validation errors should be handled locally on the client, but sometimes
    we cannot avoid running some additional validation steps on the server. Ideally,
    the server should return a HTTP status code in the `4xx` range, and optionally
    a payload that provides more details.


    In our example app, the server requires a minimum username length of four characters,
    and we have a list of usernames that are forbidden (such as "admin" or "superuser").
    For these cases, we want to display a warning message and disable the submit button.


    Our backend implementation is based on Vapor and will respond with a HTTP status
    of `400` and an error payload for any validation errors. If you''re curious about
    the implementation, check out the code in `routes.swift` in the implementation
    of the server.


    Handling this error scenario requires us to make changes in two places: the service
    implementation and the view model. Let''s take a look at the service implementation
    first.


    Since we should handle any errors before even trying to extract the payload from
    the response, the code for handling server errors needs to run after checking
    for `URLErrors` and before mapping data:


    ```

    struct APIErrorMessage: Decodable {

    var error: Bool

    var reason: String

    }

    // ...

    struct AuthenticationService {

    func checkUserNameAvailablePublisher(userName: String) -> AnyPublisher {

    guard let url = URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Fail(error: APIError.invalidRequestError("URL invalid"))

    .eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    // handle URL errors (most likely not able to connect to the server)

    .mapError { error -> Error in

    return APIError.transportError(error)

    }

    // handle all other errors

    .tryMap { (data, response) -> (data: Data, response: URLResponse) in

    print("Received response from server, now checking status code")

    guard let urlResponse = response as? HTTPURLResponse else {

    throw APIError.invalidResponse // (1)

    }

    if (200..<300) ~= urlResponse.statusCode { // (2)

    }

    else {

    let decoder = JSONDecoder()

    let apiError = try decoder.decode(APIErrorMessage.self,

    from: data) // (3)

    if urlResponse.statusCode == 400 { // (4)

    throw APIError.validationError(apiError.reason)

    }

    }

    return (data, response)

    }

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    //      .replaceError(with: false)

    .eraseToAnyPublisher()

    }

    }

    ```


    Let''s take a closer look at what the code in this snippet does:


    1. If the response isn''t a `HTTPURLResonse`, we return `APIError.invalidResponse`.

    2. We use Swift''s pattern matching to detect if the request was executed successfully,
    that is, with a HTTP status code in the range of `200` to `299`.

    3. Otherwise, some error occurred on the server. Since we use Vapor, the server
    will return details about the error in a JSON payload ( `https://docs.vapor.codes/4.0/errors/`
    ), so we can now map this information to an `APIErrorMessage` struct and use it
    to create more meaningful error message in the following code.

    4. If the server returns a HTTP status of `400`, we know that this is a validation
    error (see the server implementation for details), and return an `APIError.validationError`
    including the detailed error message we received from the server.


    In the view model, we can now use this information to tell the user that their
    chosen username doesn''t meet the requirements:


    ```

    init() {

    isUsernameAvailablePublisher

    .map { result in

    switch result {

    case .failure(let error):

    if case APIError.transportError(_) = error {

    return ""

    }

    else if case APIError.validationError(let reason) = error {

    return reason

    }

    else {

    return error.localizedDescription

    }

    case .success(let isAvailable):

    return isAvailable ? "" : "This username is not available"

    }

    }

    .assign(to: &$usernameMessage)

    ```


    That''s right—just three lines of code. We''ve already done all the hard work,
    so it''s time to reap the benefits. ![](images/509862_1_En_10_Chapter/509862_1_En_10_Figa_HTML.gif)
    A black and white pixel art of an inverted cone with 3 filament-like thick extensions
    and dots around it.


    ### Handling Response Parsing Errors


    There are many situations in which the data sent by the server doesn''t match
    what the client expected:


    * The response includes additional data, or some fields were renamed.

    * The client is connecting via a captive portal (e.g., in a hotel).


    In these cases, the client receives data, but it''s in the wrong format. To help
    the user resolve the situation, we''ll need to analyze the response and then provide
    suitable guidance, for example:


    * Download the latest version of the app.

    * Sign in to the captive portal via the system browser.


    The current implementation uses the `decode` operator to decode the response payload
    and throw an error in case the payload couldn''t be mapped. This works well, and
    any decoding error will be caught and show on the UI. However, an error message
    like *The data couldn''t be read because it is missing* isn''t really user friendly.
    Instead, let''s try to show a message that is a little bit more meaningful for
    users and also suggest to upgrade to the latest version of the app (assuming the
    server is returning additional data that the new app will be able to leverage).


    To be able to provide more fine-grained information about decoding errors, we
    need to part ways with the `decode` operator and fall back to manually mapping
    the data (don''t worry, thanks to `JSONDecoder` and Swift''s `Codable` protocol,
    this is pretty straightforward):


    ```

    // ...

    .map(\.data)

    // .decode(type: UserNameAvailableMessage.self,

    //         decoder: JSONDecoder())

    .tryMap { data -> UserNameAvailableMessage in

    let decoder = JSONDecoder()

    do {

    return try decoder.decode(UserNameAvailableMessage.self,

    from: data)

    }

    catch {

    throw APIError.decodingError(error)

    }

    }

    .map(\.isAvailable)

    // ...

    ```


    By conforming `APIError` to `LocalizedError` and implementing the `errorDescription`
    property, we can provide a more user-friendly error message (I included custom
    messages for the other error conditions as well):


    ```

    enum APIError: LocalizedError {

    /// Invalid request, e.g. invalid URL

    case invalidRequestError(String)

    /// Indicates an error on the transport layer, e.g. not being able to connect
    to the server

    case transportError(Error)

    /// Received an invalid response, e.g. non-HTTP result

    case invalidResponse

    /// Server-side validation error

    case validationError(String)

    /// The server sent data in an unexpected format

    case decodingError(Error)

    var errorDescription: String? {

    switch self {

    case .invalidRequestError(let message):

    return "Invalid request: \(message)"

    case .transportError(let error):

    return "Transport error: \(error)"

    case .invalidResponse:

    return "Invalid response"

    case .validationError(let reason):

    return "Validation Error: \(reason)"

    case .decodingError:

    return "The server returned data in an unexpected format. Try updating the app."

    }

    }

    }

    ```


    Now, to make it abundantly clear to the user that they should update the app,
    we will also display an alert. Here is the code for the alert:


    ```

    struct SignUpScreen: View {

    @StateObject private var viewModel = SignUpScreenViewModel()

    var body: some View {

    Form {

    // ...

    }

    // show update dialog

    .alert("Please update", isPresented: $viewModel.showUpdateDialog, actions: {

    Button("Upgrade") {

    // open App Store listing page for the app

    }

    Button("Not now", role: .cancel) { }

    }, message: {

    Text("It looks like you''re using an older version of this app. Please update
    your app.")

    })

    }

    }

    ```


    You''ll notice that the presentation state of this alert is driven by a published
    property on the view model, `showUpdateDialog`. Let''s update the view model accordingly
    (1) and also add the Combine pipeline that maps the results of `isUsernameAvailablePublisher`
    to this new property.'
