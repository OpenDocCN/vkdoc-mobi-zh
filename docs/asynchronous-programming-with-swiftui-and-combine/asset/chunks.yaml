  raw: '## Switching Schedulers


    Using explicit calls to switch to the most appropriate `DispatchQueue` certainly
    works, but this approach will lead to rather verbose code.


    Wouldn’t it be much nicer if there was a declarative way to make sure the individual
    parts of your pipelines run on the appropriate thread?


    Combine provides a number of operators that allows us to switch between threads
    by declaring which scheduler to use.


    The most important one is `receive(on:)`, which you will find yourself using a
    lot, especially when accessing the network: it allows us to tell Combine which
    scheduler to use when receiving events in our subscribers, such as `sink` or `assign`.


    Another key operator for scheduling is `subscribe(on:)`—we can use it to specify
    which scheduler Combine should use when subscribing to an upstream publisher.


    Other operators that affect which schedulers are used in our pipelines include
    `debounce`, `throttle`, and `delay`.


    In the following sections, we’ll explore how those operators affect the progression
    of a Combine pipeline that receives an event from a SwiftUI event handler. We’ll
    use the following publisher to simulate a piece of code that performs a long-running
    computation^([^(103)](#fn103)):


    ```

    func performWork() -> AnyPublisher {

    print("[performWork:start] isMainThread: \(Thread.isMainThread)")

    return Deferred {

    Future { promise in

    print("[performWork:Future:start] isMainThread: \(Thread.isMainThread)")

    sleep(5)

    print("[performWork:Future:finished] isMainThread: \(Thread.isMainThread)")

    promise(.success(true))

    }

    }

    .eraseToAnyPublisher()

    }

    ```


    Since `Future`s will run their closure immediately without waiting for a subscriber
    to be attached, we need to wrap it inside a `Deferred` publisher. Doing so ensures
    the code in the closure will only be executed once we connect a subscriber, which
    allows us to influence which scheduler this publisher will use.


    ### Controlling Upstream Publishers Using **subscribe(on:)**


    By using the `subscribe(on:)` operator, you can control on which dispatch queue
    the upstream publisher runs on.


    This is useful if you want to make sure the publisher runs on a background thread.
    Instead of wrapping your code in a call to `DispatchQueue.global().async { }`,
    you can add a call to `receive(on:)`. This declarative approach will make your
    code easier to read and reason about.


    The `subscribe(on:)` operator specifies the scheduler that is used to perform
    the `subscribe`, `cancel`, and `request` operations of the upstream publisher.


    In the following code snippet,^([^(104)](#fn104)) we make sure the publisher in
    `performWork()` runs on a background thread by adding a call to `subscribe(on:
    DispatchQueue.global(qos: .background)` to the pipeline:


    ```

    func start() {

    print("[start:at beginning] isMainThread: \(Thread.isMainThread)")

    self.performWork()

    .handleEvents(receiveSubscription: { sub in

    print("[receiveSubscription] isMainThread: \(Thread.isMainThread)")

    }, receiveOutput: { value in

    print("[receiveOutput] isMainThread: \(Thread.isMainThread)")

    }, receiveCompletion: { completion in

    print("[receiveCompletion] isMainThread: \(Thread.isMainThread)")

    }, receiveCancel: {

    print("[receiveCancel] isMainThread: \(Thread.isMainThread)")

    }, receiveRequest: { demand in

    print("[receiveRequest] isMainThread: \(Thread.isMainThread)")

    })

    .map { value -> Bool in

    print("[map 1] isMainThread: \(Thread.isMainThread)")

    return value

    }

    .subscribe(on: DispatchQueue.global(qos: .background))

    .map { value -> Int in

    print("[map 2] isMainThread: \(Thread.isMainThread)")

    return self.times + 1

    }

    .sink { value in

    print("[sink] isMainThread: \(Thread.isMainThread)")

    self.times = value

    }

    .store(in: &self.cancellables)

    print("[start:at end] isMainThread: \(Thread.isMainThread)")

    }

    ```


    When calling this code from the main thread (e.g., from inside a `Button`’s action
    handler), you will see the following output on the console:


    ```

    [start:at beginning] isMainThread: true

    [performWork:start] isMainThread: true

    [start:at end] isMainThread: true

    [performWork:Future:start] isMainThread: false


    [performWork:Future:finished] isMainThread: false

    [receiveSubscription] isMainThread: false

    [receiveRequest] isMainThread: false

    [receiveOutput] isMainThread: false

    [map 1] isMainThread: false

    [map 2] isMainThread: false

    [sink] isMainThread: false

    2022-05-10 09:59:07.514607+0200 SwiftUICombineSchedulers[80945:27603444] [SwiftUI]
    Publishing changes from background threads is not allowed; make sure to publish
    values from the main thread (via operators like receive(on:)) on model updates.

    [receiveCompletion] isMainThread: false

    ```


    As you can see, the call originates on the main thread, but then execution switches
    to a background thread. As a result, the publisher will be executed on a background
    thread, freeing the main thread for other UI-related work.


    As mentioned before, calling `subscribe(on:)` will impact the upstream publisher.
    However, the rest of the pipeline will *also* be executed using the scheduler
    you specified, which is the reason why SwiftUI issues a runtime warning saying
    we shouldn’t update the UI from a background thread. Remember, all UI updates
    should be performed from the main thread.


    ### Controlling Downstream Subscribers Using **receive(on:)**


    By using the `receive(on:)` operator, you can influence which scheduler Combine
    will use for all downstream operators and subscribers.


    This is useful for making sure the subscribers of a Combine pipeline run on the
    main thread—for example, when assigning values to a published property that is
    connected to a SwiftUI view: making any changes to this property will result in
    a UI update and thus needs to happen on the main thread.


    Let’s update the previous code snippet by adding a call to `.receive(on: DispatchQueue.main)`
    right before the `sink` operator:


    ```

    override func start() {

    print("[start:at beginning] isMainThread: \(Thread.isMainThread)")

    self.performWork()

    .handleEvents(receiveSubscription: { sub in

    print("[receiveSubscription] isMainThread: \(Thread.isMainThread)")

    }, receiveOutput: { value in

    print("[receiveOutput] isMainThread: \(Thread.isMainThread)")

    }, receiveCompletion: { completion in

    print("[receiveCompletion] isMainThread: \(Thread.isMainThread)")

    }, receiveCancel: {

    print("[receiveCancel] isMainThread: \(Thread.isMainThread)")

    }, receiveRequest: { demand in

    print("[receiveRequest] isMainThread: \(Thread.isMainThread)")

    })

    .map { value -> Bool in

    print("[map 1] isMainThread: \(Thread.isMainThread)")

    return value

    }

    .subscribe(on: DispatchQueue.global(qos: .background))

    .map { value -> Int in

    print("[map 2] isMainThread: \(Thread.isMainThread)")

    return self.times + 1

    }

    .receive(on: DispatchQueue.main)

    .sink { value in

    print("[sink] isMainThread: \(Thread.isMainThread)")

    self.times = value

    }

    .store(in: &self.cancellables)

    print("[start:at end] isMainThread: \(Thread.isMainThread)")

    }

    ```


    This will tell Combine to use the `main` dispatch queue for any downstream operators
    and subscribers. In our case, this means that the `sink` subscriber will be executed
    on the main thread, as you can see in the resulting console output. You will also
    notice that SwiftUI no longer issues a warning about publishing model changes
    from the background:


    ```

    [start:at beginning] isMainThread: true

    [performWork:start] isMainThread: true

    [start:at end] isMainThread: true

    [performWork:Future:start] isMainThread: false


    [performWork:Future:finished] isMainThread: false

    [receiveSubscription] isMainThread: false

    [receiveRequest] isMainThread: false

    [receiveOutput] isMainThread: false

    [map 1] isMainThread: false

    [map 2] isMainThread: false

    [receiveCompletion] isMainThread: false

    [sink] isMainThread: true

    ```'
