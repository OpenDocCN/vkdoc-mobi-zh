- fmt: '### Using SwiftUI’s State Management to Keep UI and Model in Sync


    To whet your appetite for more SwiftUI, as a final step in this chapter, let’s
    make use of SwiftUI’s state management to update the greeting whenever the user
    enters their name.


    Here is the UI we want to achieve.


    ![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig13_HTML.png)


    A mobile screen displays a circular logo, and a rectangular box with the text
    enter your name here. The text hello, is displayed below it. Time, network, and
    Wi-Fi symbols are at the top.


    Figure 1-13 – Automatically updating greeting


    Let’s first update the existing UI:


    - Remove the `Button` from the source code—we don’t need it anymore, as we’ll
    be updating the UI whenever the user enters a text.

    - Open the *Library* (using either the *+* button or by pressing *Command+Shift+L*).

    - Find the *Text Field* view (by typing *Text* into the library’s search field).


    ![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig14_HTML.png)


    A dialog box has controls on the left side. The text field is selected under it.
    The syntax, 2 paragraphs, and a program are on the right side.


    Figure 1-14 – Filtering the list of views


    - Drag the *Text Field* view into the preview canvas, right above the label which
    reads *Hello, Peter!*.


    The `ContentView` source code should now look like this:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    TextField("Placeholder", text: Value)

    Text("Hello, Peter!")

    }

    .padding()

    }

    }

    ```


    Again, *Placeholder* and *Value* are highlighted to indicate these are just editor
    placeholders:


    - Replace the *“Placeholder”* text with `"Enter your name here"`.

    - Just above the line starting with `var body`, insert the following text: `@State
    var name = ""`. This will define an empty instance variable named *name* and tell
    SwiftUI to handle its state for you<sup>[17](#fn17)</sup>.

    - Replace the *Value* editor placeholder with `$name`—this will tell SwiftUI to
    bind the *name* variable to the `TextField`. Whenever the user enters some text,
    the value of the *name* variable will be updated. Vice versa, if the value of
    the variable is changed, SwiftUI will update the `TextField` instance and display
    the updated value. You have now essentially set up a two-way binding<sup>[18](#fn18)</sup>.

    - Change the content of the `Text` view to `"Hello, \(name)!"`. This is called
    *string interpolation*—Swift will replace `\(name)` with the current value of
    the `name` variable.


    To make the input field a bit more pleasing to the eye, let’s add some padding
    and a border:


    - Make sure the `TextField` is selected by placing the cursor somewhere within
    the line starting with `TextField`.

    - In the *SwiftUI Inspector*, click into the small circle at the right edge of
    the *Padding* section. This will add some padding around the text field.

    - At the bottom of the *SwiftUI Inspector*, place the cursor within the input
    field labelled *Add Modifier*.

    - Type *border*, and then click the *Border* drop-down menu item to add a border
    to your `TextField`. You can choose a color of your liking.

    - Finally, add some padding around the border by typing *padding* into the *Add
    Modifier* field once more. Click the *Padding* drop-down menu item to insert the
    padding.


    Your code should now look like this:<sup>[19](#fn19)</sup>


    ```

    struct ContentView: View {

    @State var name = ""

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    TextField("Enter your name here", text:$name)

    .padding(.all)

    .border(Color.pink, width: 1)

    .padding(.all)

    Text("Hello, \(name)!")

    .font(.title)

    .foregroundColor(Color.pink)

    }

    .padding()

    }

    }

    ```


    To see your code in action, click the *Live* button on the bottom toolbar of the
    preview canvas. After a short moment, you can start interacting with the live
    preview. Try typing your name and observe how the greeting is updated instantaneously
    with every single keystroke.


    ![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig15_HTML.png)


    A window selects content view dot swift on the left panel. A program code is in
    the center. A mobile screen for preview with a logo, rectangular box with text
    peter, and text hello, Peter! with preview buttons below. Text field, frame, etcetera
    are on the right.


    Figure 1-15 – Running the app in live preview


    To run the app on the iOS Simulator or a physical device, choose the device in
    the *run destination* dropdown in Xcode’s title bar, and then press the *Run*
    button.


    Congratulations! You’ve just implemented your first SwiftUI application driven
    by SwiftUI’s powerful state management.


    ### Exercises


    - Add a button to reset the `name` variable to an empty string.

    - When the `name` variable is empty, the greeting will read *Hello, !*, which
    looks a bit awkward. Using what you’ve learned in this chapter, can you try to
    think of a way to only show the comma if `name` contains at least one letter?


    ### Summary


    In this chapter, we looked at some of SwiftUI’s specific properties and why Apple
    launched a completely new UI toolkit in the first place. We learned what the differences
    are between declarative vs. imperative UI frameworks, that SwiftUI favors composition
    over inheritance, and that everything is a view. We talked about SwiftUI’s state
    management, and how this is the basis for SwiftUI’s premise that the UI is a function
    of an app’s state.


    Next, you experienced first-hand how easy it is to build a SwiftUI application.
    You learned how to use Xcode’s two-way tooling for building SwiftUI user interfaces,
    and started to develop an understanding of when to use the graphical tools, and
    when the source code editor might be more efficient.


    Finally, you dipped your toes into using SwiftUI’s state management, which hopefully
    got you excited about how much easier this is than having to wire up UI updates
    manually.


    With this under your belt, it is now time to take a closer look at SwiftUI and
    some of its key UI elements.


    Footnotes <sup>[1](#509862_1_En_1_Chapter.xhtml#Fn1_source)</sup> <sup>[2](#509862_1_En_1_Chapter.xhtml#Fn2_source)</sup>
    <sup>[3](#509862_1_En_1_Chapter.xhtml#Fn3_source)</sup> <sup>[4](#509862_1_En_1_Chapter.xhtml#Fn4_source)</sup>
    <sup>[5](#509862_1_En_1_Chapter.xhtml#Fn5_source)</sup> <sup>[6](#509862_1_En_1_Chapter.xhtml#Fn6_source)</sup>
    <sup>[7](#509862_1_En_1_Chapter.xhtml#Fn7_source)</sup> <sup>[8](#509862_1_En_1_Chapter.xhtml#Fn8_source)</sup>
    <sup>[9](#509862_1_En_1_Chapter.xhtml#Fn9_source)</sup> <sup>[10](#509862_1_En_1_Chapter.xhtml#Fn10_source)</sup>
    <sup>[11](#509862_1_En_1_Chapter.xhtml#Fn11_source)</sup> <sup>[12](#509862_1_En_1_Chapter.xhtml#Fn12_source)</sup>
    <sup>[13](#509862_1_En_1_Chapter.xhtml#Fn13_source)</sup> <sup>[14](#509862_1_En_1_Chapter.xhtml#Fn14_source)</sup>
    <sup>[15](#509862_1_En_1_Chapter.xhtml#Fn15_source)</sup>'
