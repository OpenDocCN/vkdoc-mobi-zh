  raw: '# 12. Wrapping Existing APIs in Combine


    Apple provides Combine publishers for many of their APIs, making it easy for us
    to integrate those APIs in our Combine pipelines. However, there are many APIs
    that don’t support Combine even though they produce events over time. Thankfully,
    Apple gives us the tools we need to wrap APIs in Combine publishers and make them
    accessible to Combine pipelines.


    In this chapter, I’m going to walk you through the process of wrapping existing
    APIs using Combine.


    ## A Case Study


    We’re going to use a Firebase API as a case study. Firebase is a backend as a
    service (BaaS) that provides a whole range of services that make developing apps
    easier. For example, it provides an authentication service (Firebase Authentication),
    a document-based NoSQL database (Cloud Firestore), a service for storing large
    files in the cloud (Cloud Storage), a crash reporting service (Crashlytics), and
    much more.^([^(82)](#fn82))


    Most of Firebase’s APIs are asynchronous, meaning that whenever you make a call,
    it will get sent to one of the Firebase backend services, where it will be processed.
    Once the result is ready, it will be returned to the client SDK, and your code
    will be called back. There are multiple ways to asynchronously call Firebase services:
    completion handlers, Combine, and async/await. I’ve written about this before
    in *Calling asynchronous Firebase APIs from Swift - Callbacks, Combine, and async/await*^([^(83)](#fn83))—and
    also published a video about this topic^([^(84)](#fn84)) as well.


    For this chapter, we will take two methods from Cloud Firestore and turn them
    into Combine publishers. Cloud Firestore is a horizontally scaling document-based
    NoSQL database in the cloud. Similar to CloudKit,^([^(85)](#fn85)) but as a truly
    cross-platform solution: you can access Cloud Firestore from iOS, Android, the
    Web, and via a REST API.^([^(86)](#fn86)) Data stored in Firestore is organized
    in documents—a document is like a Swift struct: it can have any number of fields
    of different data types. Documents are organized in collections, and documents
    can contain subcollections, allowing you to build nested data structures.


    The Firestore SDK provides methods to access data in single documents and collections.
    For example, here is a code snippet that shows how to fetch data from a collection
    of Firestore documents and map them to an array of Swift structs using Swift’s
    Codable API:


    ```

    db.collection("books").getDocuments { querySnapshot, error in

    guard let documents = querySnapshot?.documents else {

    return

    }

    let books = documents.compactMap { [weak self] queryDocumentSnapshot in

    let result = Result {

    try queryDocumentSnapshot.data(as: Book.self)

    }

    switch result {

    case .success(let book):

    return book

    case .failure(let error):

    return nil

    }

    }

    print(books.count)

    }

    ```


    In addition to being able to fetch data on demand, Firestore also supports real-time
    live sync. This means your app will receive updates for any document or collection
    of document it subscribes to in real time. This is a great feature for any app
    that allows users to share data with other users (e.g., a chat app), or with the
    user’s other devices (e.g., a to-do list app that you can use on your iPhone,
    iPad, an Mac and in a web application).


    To receive updates, you register a snapshot listener for a specific document or
    collection of documents. Whenever the document or one of the documents in the
    collection is updated or deleted, or a document is inserted into the collection,
    Firestore will trigger the snapshot listener, and you will receive the update
    in the closure of the listener. The following code snippet shows how to receive
    updates for any changes on a collection of books:


    ```

    db.collection("books")

    .addSnapshotListener { [weak self] (querySnapshot, error) in

    guard let documents = querySnapshot?.documents else {

    return

    }

    self?.books = documents.compactMap { queryDocumentSnapshot in

    let result = Result {

    try queryDocumentSnapshot.data(as: Book.self)

    }

    switch result {

    case .success(let book):

    return book

    case .failure(let error):

    return nil

    }

    }

    }

    ```


    The sample code for this chapter is an application that demonstrates how to use
    both the closure-based APIs and the Combine-based version that we build in this
    chapter. Note that the Firebase SDK for Apple platforms includes experimental
    support for Combine—you can use this in your own apps by importing the respective
    modules. This chapter is intended to explain how the Firebase team implemented
    this Combine support.


    In order to run the sample application, follow these steps:


    1.  Create a new Firebase projects via the Firebase console.^([^(87)](#fn87))


    2.  Add your Xcode project to the Firebase project.


    3.  Download the `GoogleService-Info.plist` file and add it to your project.


    4.  Install the local Firebase Emulator Suite.^([^(88)](#fn88))


    5.  Run the Firebase Emulator Suite by executing `start.sh` in the root of the
    sample project.


    6.  Launch the iOS app on a Simulator (so it can attach to the Emulator).


    The `start.sh` script will make sure to populate the Firebase Emulator with some
    seed data so you can fetch data from Firestore.


    Once the application has started, go into one of the menu items that use a snapshot
    listener for live syncing. Then, open the Emulator console at `http://localhost:4000/firestore`
    and make changes to the Firestore documents. Once you commit a change in the Emulator
    UI, observe how the data immediately updates in the app’s UI.


    ![](images/509862_1_En_12_Chapter/509862_1_En_12_Fig1_HTML.png)


    A screenshot of the firebase emulator suite has firestore selected from the taskbar
    below. It has panels for root, books, and file name with start collection and
    add field options under the data tab. The add field option has the value once
    upon a time and the save option highlighted, which points to an iPhone 14 Pro
    mobile screen on the right with the title fetch live collection and the value.


    Figure 12-1


    Making changes in the Firebase Emulator UI will reflect in the app’s UI as soon
    as you you click on Save


    ## Using Combine to Access Firestore


    Let’s now look at how we can make the data we receive from Firestore accessible
    from Combine. A common reason for doing this is to transform the data and combine
    it with events we receive from other Combine publishers, for example, the filter
    criteria on a search/filter dialog.'
  trans: "\n# 12. 在 Combine 中封装现有 API\n\nApple 为许多 API 提供了 Combine 发布者，这让我们可以轻松地将这些\
    \ API 集成到我们的 Combine 管道中。然而，还有许多 API 即使随时间产生事件，也并不支持 Combine。幸运的是，Apple 为我们提供了所需的工具，可以将\
    \ API 封装到 Combine 发布者中，使其能够被 Combine 管道访问。\n\n在本章中，我将引导你完成使用 Combine 封装现有 API\
    \ 的整个过程。\n\n## 案例研究\n\n我们将以 Firebase API 作为案例研究。Firebase 是一种后端即服务（BaaS），它提供了一系列服务，使开发应用变得更加容易。例如，它提供了身份验证服务（Firebase\
    \ Authentication）、基于文档的 NoSQL 数据库（Cloud Firestore）、云端大文件存储服务（Cloud Storage）、崩溃报告服务（Crashlytics）等等。^(⁸²)\n\
    \nFirebase 的大部分 API 都是异步的，这意味着每当你发起调用时，它会被发送到某个 Firebase 后端服务进行处理。一旦结果准备好，它会被返回到客户端\
    \ SDK，你的代码将收到回调。调用 Firebase 服务有多种异步方式：完成处理器（completion handlers）、Combine 以及 async/await。我之前在\
    \ *从 Swift 调用异步 Firebase API - Callbacks, Combine, and async/await*^(⁸³) 中提到过这一点——并且还发布了关于此主题的视频^(⁸⁴)。\n\
    \n在本章中，我们将从 Cloud Firestore 中选取两个方法，并将它们转换为 Combine 发布者。Cloud Firestore 是云端的一种水平扩展的基于文档的\
    \ NoSQL 数据库。类似于 CloudKit，^(⁸⁵) 但它是一个真正的跨平台解决方案：你可以从 iOS、Android、Web 以及通过 REST\
    \ API 访问 Cloud Firestore。^(⁸⁶) 存储在 Firestore 中的数据被组织成文档——文档类似于 Swift 结构体：它可以具有任意数量的不同类型字段。文档被组织成集合，而文档可以包含子集合，这使你能够构建嵌套的数据结构。\n\
    \nFirestore SDK 提供了访问单个文档和集合中数据的方法。例如，以下代码片段展示了如何从 Firestore 文档集合中获取数据，并使用 Swift\
    \ 的 `Codable` API 将其映射到 Swift 结构体数组：\n\n```\ndb.collection(\"books\").getDocuments\
    \ { querySnapshot, error in\n    guard let documents = querySnapshot?.documents\
    \ else {\n        return\n    }\n    let books = documents.compactMap { [weak\
    \ self] queryDocumentSnapshot in\n        let result = Result {\n            try\
    \ queryDocumentSnapshot.data(as: Book.self)\n        }\n        switch result\
    \ {\n        case .success(let book):\n            return book\n        case .failure(let\
    \ error):\n            return nil\n        }\n    }\n    print(books.count)\n\
    }\n```\n\n除了能够按需获取数据之外，Firestore 还支持实时同步。这意味着你的应用会实时接收它所订阅的任何文档或文档集合的更新。对于任何允许用户与其他用户共享数据（例如聊天应用），或与用户的其他设备共享数据（例如可在\
    \ iPhone、iPad、Mac 和 Web 应用上使用的待办事项列表应用）的应用来说，这都是一项很棒的功能。\n\n要接收更新，你需要为特定的文档或文档集合注册一个快照监听器。每当该文档或集合中的某个文档被更新或删除，或者有新文档被插入集合时，Firestore\
    \ 将触发快照监听器，你将在监听器的闭包中收到更新。以下代码片段展示了如何接收书籍集合的任何更改的更新：\n\n```\ndb.collection(\"\
    books\")\n    .addSnapshotListener { [weak self] (querySnapshot, error) in\n \
    \       guard let documents = querySnapshot?.documents else {\n            return\n\
    \        }\n        self?.books = documents.compactMap { queryDocumentSnapshot\
    \ in\n            let result = Result {\n                try queryDocumentSnapshot.data(as:\
    \ Book.self)\n            }\n            switch result {\n            case .success(let\
    \ book):\n                return book\n            case .failure(let error):\n\
    \                return nil\n            }\n        }\n    }\n```\n\n本章的示例代码是一个演示应用程序，展示了如何使用基于闭包的\
    \ API 以及我们在本章中构建的基于 Combine 的版本。请注意，适用于 Apple 平台的 Firebase SDK 包含对 Combine 的实验性支持——你可以通过导入相应模块在你的应用中使用它。本章旨在解释\
    \ Firebase 团队是如何实现这种 Combine 支持的。\n\n要运行示例应用程序，请遵循以下步骤：\n\n1.  通过 Firebase 控制台创建一个新的\
    \ Firebase 项目。^(⁸⁷)\n2.  将你的 Xcode 项目添加到 Firebase 项目。\n3.  下载 `GoogleService-Info.plist`\
    \ 文件并将其添加到你的项目中。\n4.  安装本地 Firebase 模拟器套件。^(⁸⁸)\n5.  通过在示例项目的根目录中执行 `start.sh`\
    \ 来运行 Firebase 模拟器套件。\n6.  在模拟器上启动 iOS 应用（这样它才能连接到模拟器）。\n\n`start.sh` 脚本将确保向 Firebase\
    \ 模拟器中填充一些种子数据，以便你可以从 Firestore 获取数据。\n\n应用程序启动后，进入使用快照监听器进行实时同步的菜单项之一。然后，在浏览器中打开模拟器控制台\
    \ `http://localhost:4000/firestore`，并对 Firestore 文档进行更改。一旦你在模拟器 UI 中提交更改，观察数据如何立即在应用的\
    \ UI 中更新。\n\n![](img/509862_1_En_12_Fig1_HTML.png)\n\n一张 Firebase 模拟器套件的截图，底部的任务栏选中了\
    \ firestore。在 data 标签页下，有 root、books 和文件名的面板，以及 start collection 和 add field 选项。add\
    \ field 选项的值为 once upon a time，并且 save 选项被高亮显示，指向右侧的 iPhone 14 Pro 手机屏幕，屏幕上显示标题“fetch\
    \ live collection”和该值。\n\n图 12-1\n\n在 Firebase 模拟器 UI 中进行的更改，只要你点击 Save，就会立即反映在应用\
    \ UI 中\n\n## 使用 Combine 访问 Firestore\n\n现在让我们看看如何使我们从 Firestore 接收的数据能够被 Combine\
    \ 访问。这样做的一个常见原因是转换数据，并将其与我们从其他 Combine 发布者接收的事件（例如，搜索/筛选对话框中的过滤条件）结合起来。\n"
- fmt: "### Using View Models and Published Properties\n\nAn easy and rather common\
    \ way to feed data into a Combine pipeline is to create a published property in\
    \ a view model. You might have seen this in many of the code samples on my blog^([^(89)](#fn89))\
    \ or in the Firebase Quick Starts.^([^(90)](#fn90))\n\n![](images/509862_1_En_12_Chapter/509862_1_En_12_Fig2_HTML.png)\n\
    \nA block diagram has 2 layers titled firebase backend and frontend. The frontend\
    \ has blocks of book list view and book list view model with options of subscribe\
    \ and unsubscribe connected via view model. It leads to the firebase backend via\
    \ snapshot listener. The firebase backend has firestore which leads to several\
    \ slash books.\n\nFigure 12-2: Conceptual overview of the app’s architecture\n\
    \nIn code, this looks as follows:\n\n```\nprivate class BookListViewModel: ObservableObject\
    \ {\n    @Published var books = [Book]()\n    @Published var errorMessage: String?\n\
    \    private var db = Firestore.firestore()\n    private var listenerRegistration:\
    \ ListenerRegistration?\n    \n    public func unsubscribe() {\n        if listenerRegistration\
    \ != nil {\n            listenerRegistration?.remove()\n            listenerRegistration\
    \ = nil\n        }\n    }\n    \n    func subscribe() {\n        if listenerRegistration\
    \ == nil {\n            listenerRegistration = db.collection(\"books\")\n    \
    \            .addSnapshotListener { [weak self] (querySnapshot, error) in\n  \
    \                  guard let documents = querySnapshot?.documents else {\n   \
    \                     self?.errorMessage = \"No documents in 'books' collection\"\
    \n                        return\n                    }\n                    self?.books\
    \ = documents.compactMap { queryDocumentSnapshot in\n                        let\
    \ result = Result {\n                            try queryDocumentSnapshot.data(as:\
    \ Book.self)\n                        }\n                        switch result\
    \ {\n                        case .success(let book):\n                      \
    \      self?.errorMessage = nil\n                            return book\n   \
    \                     case .failure(let error):\n                            self?.errorMessage\
    \ = \"\\(error.localizedDescription)\"\n                            return nil\n\
    \                        }\n                    }\n                }\n       \
    \ }\n    }\n}\n```\n\nBy conforming `BookListViewModel` to `ObservableObject`\
    \ and marking the `books` property with the `@Published` property wrapper, we\
    \ can connect a SwiftUI `List` view to the property and make sure the UI updates\
    \ whenever we receive an update.\n\n```\nstruct LiveBooksListViewWithClosures:\
    \ View {\n    @StateObject private var viewModel = BookListViewModel()\n    \n\
    \    var body: some View {\n        List(viewModel.books) { book in\n        \
    \    Text(book.title)\n        }\n        .onAppear {\n            viewModel.subscribe()\n\
    \        }\n        .onDisappear {\n            viewModel.unsubscribe()\n    \
    \    }\n    }\n}\n```\n\nWith just a few lines of code, we’ve built a UI that\
    \ will automatically refresh whenever someone makes a change to the data—no matter\
    \ if this change happens on the frontend or on the backend.\n\nBut we can do more!\
    \ For example, let’s say we wanted to display the number of books, making sure\
    \ this number is updated on the UI as people add new books to the `books` collection\
    \ in Cloud Firestore.\n\nRemember that a published property exposes a Combine\
    \ publisher. We can access this publisher via the property’s *projected value*—in\
    \ this case, `$books`. This allows us to create a Combine pipeline to determine\
    \ the number of books. Using the `assign(to:)` subscriber, we can then assign\
    \ the result to another publisher which we can connect to the UI to show an always-up-to-date\
    \ number. A good place to set up Combine pipelines like this is in the view model’s\
    \ initializer.\n\n```\nprivate class BookListViewModel: ObservableObject {\n \
    \   @Published var books = [Book]()\n    @Published var numberOfBooks = 0\n  \
    \  ...\n    init() {\n        $books.map { books in\n            books.count\n\
    \        }\n        .assign(to: &$numberOfBooks)\n    }\n    ...\n}\n```\n\n###\
    \ Using Combine to Wrap APIs\n\nThis is the most commonly used approach for integrating\
    \ data sources in SwiftUI apps that make use of Combine, and it works really well.\
    \ However, it is rather verbose and requires a lot of boilerplate.\n\nInstead\
    \ of explicitly setting up a snapshot listener, let’s see if we can wrap the code\
    \ in a Combine publisher so we can call it in a more declarative way.\n\nLooking\
    \ at the code we’ve discussed so far, we can see we’ve got two different kinds\
    \ of calls:\n\n- Fetching a single document, all documents of a collection, or\
    \ the results of a query are so-called single-shot calls: we make the call to\
    \ fetch a document (or all documents in a collection/query) and then use the callback\
    \ handler to receive the result of the call.\n\n- Listening to updates on a single\
    \ document, a collection, or a query is different: instead of receiving the result\
    \ of the call just once, we will receive a new snapshot every time there has been\
    \ an update. We’re receiving a stream of updates. This sounds very similar to\
    \ Combine’s definition:\n\n> *The Combine framework provides a declarative Swift\
    \ API for processing values over time.*^([^(91)](#fn91))\n\nLet’s see if we can\
    \ implement our own publishers to handle these streams of events!\n\nHowever,\
    \ Apple actively discourages developers from implementing their own publishers\
    \ using Combine’s low-level primitives (such as `Publisher`, `Subscription`, and\
    \ `Subscriber`).\n\n## Creating Your Own Publishers\n\nRather than implementing\
    \ the `Publisher`^([^(92)](#fn92)) protocol yourself, you can create your own\
    \ publisher by using one of several types provided by the Combine framework:\n\
    \n- Use a concrete subclass of `Subject`^([^(93)](#fn93)), such as `PassthroughSubject`^([^(94)](#fn94)),\
    \ to publish values on demand by calling its `send(_:)`^([^(95)](#fn95)) method.\n\
    \n- Use a `CurrentValueSubject`^([^(96)](#fn96)) to publish whenever you update\
    \ the subject’s underlying value.\n\n- Add the `@Published` annotation to a property\
    \ of one of your own types. In doing so, the property gains a publisher that emits\
    \ an event whenever the property’s value changes. See the `Published`^([^(97)](#fn97))\
    \ type for an example of this approach.\n\nSo instead of building publishers from\
    \ scratch, let’s follow Apple’s advice and create our custom publishers using\
    \ Combine’s higher-level building blocks like `PassthroughSubject` and `Future`."
  raw: '### Using View Models and Published Properties


    An easy and rather common way to feed data into a Combine pipeline is to create
    a published property in a view model. You might have seen this in many of the
    code samples on my blog^([^(89)](#fn89)) or in the Firebase Quick Starts.^([^(90)](#fn90))


    ![](images/509862_1_En_12_Chapter/509862_1_En_12_Fig2_HTML.png)


    A block diagram has 2 layers titled firebase backend and frontend. The frontend
    has blocks of book list view and book list view model with options of subscribe
    and unsubscribe connected via view model. It leads to the firebase backend via
    snapshot listener. The firebase backend has firestore which leads to several slash
    books.


    Figure 12-2


    Conceptual overview of the app’s architecture


    In code, this looks as follows:


    ```

    private class BookListViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var errorMessage: String?

    private var db = Firestore.firestore()

    private var listenerRegistration: ListenerRegistration?

    public func unsubscribe() {

    if listenerRegistration != nil {

    listenerRegistration?.remove()

    listenerRegistration = nil

    }

    }

    func subscribe() {

    if listenerRegistration == nil {

    listenerRegistration = db.collection("books")

    .addSnapshotListener { [weak self] (querySnapshot, error) in

    guard let documents = querySnapshot?.documents else {

    self?.errorMessage =

    "No documents in ''books'' collection"

    return

    }

    self?.books = documents.compactMap { queryDocumentSnapshot in

    let result = Result {

    try queryDocumentSnapshot.data(as: Book.self)

    }

    switch result {

    case .success(let book):

    // Value successfully initialized from // DocumentSnapshot

    self?.errorMessage = nil

    return book

    case .failure(let error):

    // Value could not be initialized from// DocumentSnapshot

    self?.errorMessage =

    "\(error.localizedDescription)"

    return nil

    }

    }

    }

    }

    }

    }

    ```


    By conforming `BookListViewModel` to `ObservableObject` and marking the `books`
    property with the `@Published` property wrapper, we can connect a SwiftUI List
    view to the property and make sure the UI updates whenever we receive an update.


    ```

    struct LiveBooksListViewWithClosures: View {

    @StateObject private var viewModel = BookListViewModel()

    var body: some View {

    List(viewModel.books) { book in

    Text(book.title)

    }

    .onAppear {

    viewModel.subscribe()

    }

    .onDisappear {

    viewModel.unsubscribe()

    }

    }

    }

    ```


    With just a few lines of code, we’ve build a UI that will automatically refresh
    whenever someone makes a change to the data—no matter if this change happens on
    the frontend or on the backend.


    But we can do more! For example, let’s say we wanted to display the number of
    books, making sure this number is updated on the UI as people add new books to
    the `books` collection in Cloud Firestore.


    Remember that a published property exposes a Combine publisher. We can access
    this publisher via the property’s *projected value*—in this case, `$books`. This
    allows us to create a Combine pipeline to determine the number of books. Using
    the `assign(to:)` subscriber, we can then assign the result to another publisher
    which we can connect to the UI to show an always-up-to-date number. A good place
    to set up Combine pipelines like this is in the view model’s initializer.


    ```

    private class BookListViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var numberOfBooks = 0

    ...

    init() {

    $books.map { books in

    books.count

    }

    .assign(to: &$numberOfBooks)

    }

    ...

    }

    ```


    ### Using Combine to Wrap APIs


    This is the most commonly used approach for integrating data sources in SwiftUI
    apps that make use of Combine, and it works really well. However, it is rather
    verbose and requires a lot of boilerplate.


    Instead of explicitly setting up a snapshot listener, let’s see if we can wrap
    the code in a Combine publisher so we can call it in a more declarative way.


    Looking at the code we’ve discussed so far, we can see we’ve got two different
    kinds of calls:


    *   Fetching a single document, all documents of a collection, or the results
    of a query are so-called single-shot calls: we make the call to fetch a document
    (or all documents in a collection/query) and then use the callback handler to
    receive the result of the call.


    *   Listening to updates on a single document, a collection, or a query is different:
    instead of receiving the result of the call just once, we will receive a new snapshot
    every time there has been an update. We’re receiving a stream of updates. This
    sounds very similar to Combine’s definition:


    > *The Combine framework provides a declarative Swift API for processing values
    over time.*^([^(91)](#fn91))


    Let’s see if we can implement our own publishers to handle these streams of events!


    However, Apple actively discourages developers from implementing their own publishers
    using Combine’s low-level primitives (such as `Publisher`, `Subscription`, and
    `Subscriber`).


    ## Creating Your Own Publishers


    Rather than implementing the `Publisher`^([^(92)](#fn92)) protocol yourself, you
    can create your own publisher by using one of several types provided by the Combine
    framework:


    *   Use a concrete subclass of `Subject`,^([^(93)](#fn93)) such as `PassthroughSubject`,^([^(94)](#fn94))
    to publish values on demand by calling its `send(_:)`^([^(95)](#fn95)) method.


    *   Use a `CurrentValueSubject`^([^(96)](#fn96)) to publish whenever you update
    the subject’s underlying value.


    *   Add the `@Published` annotation to a property of one of your own types. In
    doing so, the property gains a publisher that emits an event whenever the property’s
    value changes. See the `Published`^([^(97)](#fn97)) type for an example of this
    approach.


    So instead of building publishers from scratch, let’s follow Apple’s advice and
    create our custom publishers using Combine’s higher-level building blocks like
    `PassthroughSubject` and `Future`.'
  trans: "\n### 使用视图模型与已发布属性\n\n将数据输入 Combine 管道的一种简单且相当常见的方式是在视图模型中创建一个已发布属性。你可能在我的博客中的许多代码示例^(⁸⁹)或\
    \ Firebase 快速入门^(⁹⁰)中看到过这种方式。\n\n![](img/509862_1_En_12_Fig2_HTML.png)\n\n一个框图包含两个层级，分别标题为\
    \ firebase 后端和前端。前端包含图书列表视图和图书列表视图模型块，并通过视图模型连接了订阅与取消订阅选项。它通过快照监听器连接到 firebase\
    \ 后端。firebase 后端包含 firestore，firestore 连接到多个斜杠图书。\n\n图 12-2：应用程序架构的概念概览\n\n在代码中，这看起来如下所示：\n\
    \n```\nprivate class BookListViewModel: ObservableObject {\n    @Published var\
    \ books = [Book]()\n    @Published var errorMessage: String?\n    private var\
    \ db = Firestore.firestore()\n    private var listenerRegistration: ListenerRegistration?\n\
    \    \n    public func unsubscribe() {\n        if listenerRegistration != nil\
    \ {\n            listenerRegistration?.remove()\n            listenerRegistration\
    \ = nil\n        }\n    }\n    \n    func subscribe() {\n        if listenerRegistration\
    \ == nil {\n            listenerRegistration = db.collection(\"books\")\n    \
    \            .addSnapshotListener { [weak self] (querySnapshot, error) in\n  \
    \                  guard let documents = querySnapshot?.documents else {\n   \
    \                     self?.errorMessage = \"No documents in 'books' collection\"\
    \n                        return\n                    }\n                    self?.books\
    \ = documents.compactMap { queryDocumentSnapshot in\n                        let\
    \ result = Result {\n                            try queryDocumentSnapshot.data(as:\
    \ Book.self)\n                        }\n                        switch result\
