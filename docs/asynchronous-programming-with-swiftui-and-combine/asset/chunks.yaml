- fmt: '### Using `Future` to Implement One-Time Fetching from Firestore


    Effortless real-time sync is one of the key features of Firestore, but it’s not
    always necessary or appropriate to get real-time updates. Often, it is sufficient
    to fetch data on demand. Firestore supports fetching data (either a single document,
    a collection, or a query) once, and you saw an example for this in the beginning
    of this chapter.


    How can this be implemented in Combine? We essentially want to make a request,
    wait until it is finished, and then send the result into a Combine pipeline.


    This is exactly what `Future`s are there for. A `Future` is a `Publisher` that
    “eventually produces a single value and then finishes or fails.”


    Let’s use a `Future` to create a single-shot publisher to get a single document
    from Firestore. This time, we will create an extension on `DocumentReference`:


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    ...

    self.getDocument(source: source) { snapshot, error in

    ...

    }

    ...

    }

    }

    ```


    Just like every other publisher, `Future`s are generic over a value and an error
    type. In our case, the value type is a `DocumentSnapshot`. You might be wondering
    why we return a `Future` instead of an `AnyPublisher`. `Future`s have some special
    properties that set them apart from other publishers. For example, `Future`s will
    fire immediately. A normal publisher will only fire if there is a subscriber.
    To make this transparent to the caller, we explicitly return a `Future` instead
    of type erasing to `AnyPublisher`.


    Let’s now wrap the call to the closure-based `getDocument` method inside a `Future`:


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    Future { promise in

    self.getDocument(source: source) { snapshot, error in

    ...

    }

    }

    }

    }

    ```


    The code in the closure will be called when Firestore returns either an error
    or a document snapshot. The `promise` parameter of the `Future`’s closure can
    be used to communicate with the caller:


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    Future { promise in

    self.getDocument(source: source) { snapshot, error in

    if let error = error {

    promise(.failure(error))

    } else if let snapshot = snapshot {

    promise(.success(snapshot))

    }

    }

    }

    }

    }

    ```


    We check to see if we received a snapshot or an error and call the promise accordingly.
    This might look familiar, as it resembles the code we wrote for `snapshotPublisher`
    earlier, but I’d like to call out that the promise expects a `Result` type, so
    `.failure` and `.success` are cases on the `Result` type.


    And with that, we’ve successfully adapted the closure-based Firestore API for
    fetching a single document for Combine by wrapping it in a `Future`.


    Here is how you can call it to fetch a document and map it to a custom Swift struct
    using our new single-shot Combine publisher:


    ```

    private class BookListViewModel: ObservableObject {

    @Published var book = Book.empty

    private var db = Firestore.firestore()

    func fetchBook() {

    db.collection("books").document("hitchhiker").getDocument()

    .tryMap { documentSnapshot in

    try documentSnapshot.data(as: Book.self)

    }

    .replaceError(with: Book.empty)

    .assign(to: &$book)

    }

    }

    ```


    ## Summary


    Apple has done a great job providing Combine publishers for many of their own
    APIs, but for third-party APIs, we might need to do this work ourselves.


    In this chapter, we discussed a couple of approaches we can take to adapt existing
    imperative code to Combine:


    - You saw how you can implement an `ObservableObject` with a `@Published` property
    to expose data via a publisher. This not only allows us to connect SwiftUI views
    to the published property, but it also enables us to connect a Combine pipeline
    to the published property.

    - It’s also possible to create custom publishers using Combine’s low-level primitives
    (such as `Publisher`, `Subscription`, and `Subscriber`). However, Apple explicitly
    discourages developers from doing so, as this approach requires us to manage back
    pressure ourselves.

    - Instead, Apple recommends using convenience publishers like `PassthroughSubject`
    and `Future` to implement custom publishers, and we had an in-depth look at how
    to wrap an existing, closure-based API using this approach.


    Which approach you use depends on your use case—using a view model might be the
    most practical and efficient way in most situations. However, if you’re an SDK
    provider, you should definitely consider implementing Combine publishers for your
    API. This is what we did at Firebase: we implemented Combine publishers for most
    of the asynchronous Firebase APIs using `PassthroughSubject` and `Future`.


    # 13. Combine Schedulers and SwiftUI


    By default, any code that you run in response to a UI event in SwiftUI will run
    on the main thread. Since a lot of our code deals with updating other UI elements
    in response to some user interaction, this is fine in most cases. For example,
    you might want to validate the user’s input to make sure they filled out all required
    fields of a multistep form. This is a memory-bound process that runs fast enough
    to be executed on the main thread without causing any issues.


    However, once you want to perform more complex computations or need to access
    local storage, the network, or any API that has a higher latency than accessing
    the local memory, you risk blocking the UI if you execute this code on the main
    thread.


    Blocking the UI leads to all sorts of issues: the UI of your application becomes
    unresponsive, animations will start to stutter, and eventually your users will
    become unhappy and start leaving negative reviews on the App Store or start complaining
    about it on Twitter.


    This is why you should offload any long-running pieces of code to a background
    thread. While your code runs in the background, the main thread is free for handling
    UI events. The user can continue using the app until the background process eventually
    finishes. Some of these background processes might have a result that you might
    want to display on the UI. However, since UI updates need to happen on the main
    thread, you will need to switch back to the main thread before you can update
    the UI with the results you received on the background thread.


    Combine provides an elegant and declarative mechanism for controlling where the
    individual parts of a pipeline run. This mechanism is built on the concept of
    schedulers, which help us reason about where our code should be executed without
    having to directly deal with the intricacies of threads.


    In this chapter, you will learn how to use this mechanism effectively to help
    you build apps that make better use of the system’s resources so that your apps’
    UI stays responsive.'
