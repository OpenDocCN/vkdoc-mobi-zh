    \ `async/await` 时，这会稍微复杂一些。\n\n# …到 async/await 方法\n\n当使用 `async/await` 时，同样的代码会是什么样子呢？\n\
    \n要调用基于 `async/await` 的 `searchBooks` 版本，我们需要选择一种略有不同的方法。我们不直接订阅 `$searchTerm`\
