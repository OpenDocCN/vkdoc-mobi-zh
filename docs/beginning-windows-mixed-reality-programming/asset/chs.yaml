- "# 引言：混合现实的未来\n\n恭喜你！如果你正在阅读本书，这意味着你正走在成为先驱的路上，肩负着构建将主导下一个计算时代的混合现实未来的重任。几十年来，科幻小说向我们承诺了一个充满全息影像和虚拟体验的未来。我们终于站在了一场技术革命的边缘，数字世界将与物理现实交织在一起。这被称为*混合现实*。\n\
  \n让我们设想一个没有屏幕的未来场景。取而代之的是，当你坐下来看电视时，墙上会出现一个全息屏幕。由于屏幕是虚拟的，你可以随心所欲地将其调整到任意大小。你也可以把屏幕移到任何其他房间，或者让它跟着你在房子里移动。你坐在一张空桌子前，几个全息电脑显示器就会出现，旁边还有虚拟照片、日历和记事本。现在，你可以查看电子邮件、处理电子表格，开始一天的工作了。你将不再需要随身携带实体智能手机。取而代之的是，需要的时候，手掌中会出现一个全息屏幕。全息计算有潜力取代每一块屏幕，并且没有理由相信它做不到这一点。\n\
  \n> **注意**  \n> 本书中提到的全息影像是数字全息影像，不遵循传统全息术的光学原理。\n\n这听起来像是还要好几年才能实现的科幻技术吗？你可能会惊讶地发现，我刚才在这个“未来”场景中提到的所有事情，现如今用`HoloLens\
  \ 2`这样的设备完全可能实现（并且已经可用）。事实上，一些混合现实开发者已经使用一系列混合现实头戴式显示器沉浸在这项技术中好几年了。图 1 展示了我如何将`HoloLens`用作虚拟桌面。\n\
  \n![../images/441101_2_En_BookFrontmatter_Fig1_HTML.jpg](img/441101_2_En_BookFrontmatter_Fig1_HTML.jpg)\n\
  \n**图 1**  \n`HoloLens` 能将一张空桌子（左图）充满全息电脑显示器和桌面装饰物（右图）\n\n在我之前的“未来场景”示例中，你可能会注意到我只给出了全息二维屏幕的例子。对某些人来说，我的例子可能听起来令人惊叹或具有革命性。事实上，这些都是平淡无奇的例子，并没有充分展现`HoloLens`和其他全息头戴式显示器所能达到的效果。想象一下，办公室同事的全息影像用于远程会议、为工厂工人提供高级培训模拟、在复杂三维模型上进行协作工程设计，以及利用基于云的人工智能的力量来分析你周围的世界，并用有用的信息来增强它。这些只是混合现实技术所能提供的一小部分可能性。\n\
  \n为这些头戴式设备构建体验所面临的挑战和机遇，与科技行业迄今为止所遇到的任何情况都不同。到目前为止，绝大多数软件体验都是为平面的二维屏幕设计的。想想电视机、智能手机、平板电脑、笔记本电脑——甚至是你正在阅读本书的平面页面或屏幕。视频游戏、3D\
  \ 电影以及过去几年其他所谓的“3D”进步，不过是我们在扁平的矩形屏幕上观看的一种美化了的二维体验。Windows Mixed Reality 平台打破了这种现状，允许我们在现实世界中开发真正的三维应用。早期为`HoloLens`出现的应用，由于开发者“囿于思维定式”，创建的是二维体验，比如浮动的全息屏幕或用于导航的二维菜单和按钮。业内许多人认为，功能性且直观的三维用户体验仍有待发现和开发。当你跟随本书中的教程和示例项目进行学习时，我们将特别关注三维设计元素，同时讨论如何跳出思维定式、超越二维现状的方法。\n\
  \n现在成为混合现实开发者是一个激动人心的时刻。设备功能强大，计算范式新颖，优秀应用的想法似乎无穷无尽。我们，混合现实开发者，将是工程师、架构师和建设者，将构建即将到来的混合现实世界。\n\
  \n混合现实的未来是必然的。像所有高科技设备一样，`HoloLens`这类设备只会随着时间的推移变得更小、更强大。不难想象，在不久的将来，许多人（如果不是大多数人的话）无论是否需要处方眼镜，都会戴上一副混合现实眼镜。配备这些头戴式设备将使我们能够用相关信息增强物理现实，获得更沉浸的数字体验，并将我们从塞满桌面、墙壁、口袋和手提包的多余屏幕中解放出来。\n\
  \n全息设备在日常生活中的重要性将有多大？可以推测，在不久的将来，大多数人如果没有一副全息眼镜，可能就无法充分参与社会。乍听起来，这像是对我们未来的反乌托邦预测。但请思考一下我们今天如何使用计算机和智能手机。如果你没有电脑或不知道如何使用电脑，就很难充分参与当今的现代社会。美国绝大多数工作都要求使用电脑。我们将电子邮件和在线消息作为主要的沟通形式。当然，如果你在\
  \ 50 年前告诉某人，如果他们没有电脑或不知道如何使用电脑，他们将无法充分参与未来的社会，他们可能会对未来犹豫不决。然而，如今我们中的许多人可能无法想象没有可信赖的个人电脑或智能手机的日常生活。同样，20\
  \ 年后，我想我们会回首往事，想知道没有值得信赖的混合现实眼镜，我们过去是如何生活的。\n\n\n\n或许我已经让你窥见了未来的模样。更重要的是，我希望已经激发你开始思考那些将充满我们周围世界的全息应用和体验。我们所有人都指望着像你这样的人来构建我们的全息未来。我写这本书的动机，是希望能让尽可能多的人开始迈入混合现实开发领域。本书力求通俗易懂，无论你是一位经验丰富的软件开发者，还是编程世界的新手，都能轻松上手。本书旨在为你提供一切入门所需，助你在`HoloLens\
  \ 2`及其他混合现实头显上，开始开发令人惊叹的混合现实体验！\n\n全书共分为三部分，涵盖 12 个章节。在第一部分（包含第 1 章和第 2 章）中，我们将引导你安装并解释开发\
  \ Windows 混合现实应用所需的所有必要软件和工具。\n\n第 1 章包含了你入门所需的一切。你可以通过`HoloLens`以及在 PC 上通过模拟器，开始开发混合现实应用！\n\
  \n我们在第 1 章中将涵盖的内容包括：\n\n-   确保你的 PC 已为混合现实开发做好准备\n-   使用`HoloLens 2`和其他 Windows\
  \ 混合现实硬件\n-   下载并安装必需和可选的软件工具\n-   理解`HoloLens 2`及其他 Windows 混合现实硬件\n\n在第 2 章中，我们将深入探讨\
  \ Unity 的基础知识。Unity 是开发 Windows 混合现实体验的一个流行软件平台。我们在第 2 章中将涵盖的内容包括：\n\n-   理解 Unity\n\
  -   在 Unity 中创建你的第一个应用\n-   Unity 与 Windows 混合现实\n\n在第二部分，我们将开始构建全息体验。第二部分包含第 3\
  \ 章至第 9 章。你将在这里被引导学习创建一个功能完备的混合现实应用的基础知识。\n\n我们将在第 3 章学习如何创建数字全息图。我们将引导你创建可在`HoloLens\
  \ 2`中查看的基础全息图。\n\n以下是我们在第 3 章中将涵盖的内容：\n\n-   为 Windows 混合现实开发准备 Unity\n-   在 Unity\
  \ 中创建一个立方体\n-   构建 Unity 应用并将其部署到`HoloLens 2`\n-   查找并创建 3D 物体\n\n我们在第 4 章中讨论混合现实工具包（`MRTK`）。手动为`HoloLens`开发准备\
  \ Unity 可能既繁琐又容易出错。本章介绍`MRTK`以及如何利用这个社区资源。第 4 章涵盖：\n\n-   理解`MRTK`\n-   下载并使用`MRTK`\n\
  \n在第 5 章中，我们开始与全息图进行交互。我们将讨论手势、语音命令、眼球追踪以及其他与全息内容交互的方式。以下是我们在第 5 章中将涵盖的内容：\n\n-\
  \   语音命令\n-   手势与手部追踪\n-   控制器与输入配件\n-   眼球追踪\n\n到了第 6 章和第 7 章，事情开始变得有趣起来，我们将通过了解如何使用空间映射和空间音效，开始利用`HoloLens\
  \ 2`的强大功能。我将引导你了解空间映射和空间音效在混合现实应用中的技术、概念和运用。\n\n第 6 章涵盖：\n\n-   什么是空间映射？\n-   如何在项目中使用空间映射\n\
  -   将空间映射提升到新高度：场景理解\n\n第 7 章涵盖：\n\n-   什么是空间音效？它与“普通”音效有何不同？\n-   如何在项目中使用空间音效\n\
  -   空间音效的最佳实践\n-   其他音效资源\n\n在第 8 章中，我们专注于 Azure 空间定位点（`ASA`）。Azure 空间定位点利用云服务，当与混合现实应用集成时，能形成完美的应用组合。它允许用户锚定对象的位置并保存。\n\
  \n第 8 章涵盖：\n\n-   什么是 Azure 空间定位点？\n-   如何在项目中包含 Azure 空间定位点\n-   将场景连接到 Azure 资源\n\
  -   其他 Azure 空间定位点资源\n\n在第 9 章中，我们讨论共享体验。共享体验是混合现实体验的典范。它们让人们能够在本地和远程聚集到一起，共同体验和与虚拟对象互动。第\
  \ 9 章涵盖：\n\n-   共享体验介绍\n-   为共享体验设置 Photon\n-   构建共享的混合现实应用\n-   空间对齐与共享空间定位点\n\
  -   共享体验的进一步考量\n\n第三部分是关于成长为一名全息开发者。通读到本书的这个阶段，你将熟悉创建混合现实应用的基础知识。接下来的三章（第 10 章至第\
  \ 12 章）将介绍优化和增强你的体验、发布和盈利你的应用，以及加入更广泛的全息社区以获得支持和曝光度的方法。\n\n在第 10 章中，我们将讨论打造令人惊叹体验的技巧和诀窍。本章为你提供了一些基本要素的入门知识，这些要素能为全息体验增添额外的风采和魔力，例如颜色选择、环境元素、音乐、大小等等。以下是我们在第\
  \ 10 章中将涵盖的内容：\n\n-   优化与性能\n-   设计\n-   魔力\n\n让我们来赚点钱吧！在第 11 章中，我们将涵盖发布和盈利你的应用的细节。我们将为你介绍多种盈利策略，从在\
  \ Windows 商店发布你的应用，到成为一名独立的混合现实开发者进行自由职业。以下是我们在第 11 章中将涵盖的内容：\n\n-   通过 Windows\
  \ 商店盈利\n-   自由职业\n-   宏图大志：革命性机遇\n\n在第 12 章，也是最后一章中，我们将讨论面向全息开发者的社区资源和其他信息。本章将介绍你可用的资源，包括相关的社区论坛和在线群组、值得关注的活动以及在开发过程中有所帮助的其他信息。以下是我们将涵盖的内容：\n\
  \n-   为什么社区资源很重要？\n-   在线社区\n-   HoloDevelopers Slack 频道\n-   活动和本地群组\n-   更多信息\n\
  \n当你踏上成为先驱型混合现实开发者的旅程时，我鼓励你记住两点。首先，始终要跳出思维定势，或者说跳出迄今为止主导计算的“2D 矩形”。其次，要明白你肩负着建设一个新产业以及未来混合现实世界的责任。你是一位技术先驱。理解这一点将激励你达到新的高度，并探索创造非凡体验的新途径！\n\
  \n**致谢**\n\n\n\n我要感谢亚历山大·梅杰斯对本书的全面技术审阅。同时感谢杰西·麦卡洛克对独立混合现实开发者社区的无与伦比的支持，以及他建立的令人惊叹的\
  \ HoloLens 社区——我从中获得了大部分混合现实知识。特别感谢 VeeRuby Technologies 的朋友和宝贵团队成员，他们为本书第二版的更新做出了重大贡献。最后，我要感谢乔纳森·根尼克和吉尔·巴尔扎诺的友谊、坚持和编辑支持，使本书得以问世。\n\
  \n关于作者 关于技术审阅者\n\n"
- '# 第一部分 入门指南


  '
- "# 1. 准备就绪：必要的硬件和软件工具\n\n在本章中，你将了解混合现实开发所需的全部装备。我们将确保你的电脑已为开发做好准备，并介绍一些推荐的 PC 配置。我会简要讨论电脑硬件如何影响混合现实开发及性能。我们还将介绍在开发过程中用于测试应用的硬件和模拟器选项。此外，我们将概述\
  \ HoloLens 及其关键特性——这些是你开始开发应用前需要熟悉的重点。最后，我们将指导你安装进入混合现实体验世界所需的所有必要软件工具！\n\n> **提示**\n\
  > \n> 开始开发时并不需要 HoloLens 或混合现实设备！你只需一台电脑和必要的软件即可开始。\n\n## 确保电脑准备就绪\n\n在开始之前，你需要确认拥有一台能够胜任混合现实开发的电脑。本节将概述推荐的系统要求，并提供相关背景说明。幸运的是，制作\
  \ HoloLens 应用并不需要高端电脑配置。不出意外，微软推荐 Windows 10 作为首选操作系统。其他操作系统（包括 Windows 8.1、Windows\
  \ 8、Windows 7 等）也可使用。一些 HoloLens 开发者还报告称，在 Mac 设备上通过虚拟运行 Windows 系统同样可以成功开发。\n\n\
  以下是我推荐的混合现实开发系统规格：\n\n* 64 位 Windows 10\n* 8 GB 内存（使用模拟器的 PC 建议 16 GB）\n* 30 GB\
  \ 可用硬盘空间\n\n这份简要清单旨在说明入门并不需要太多配置。从技术上讲，即使使用更低的系统规格也能运作，但开发体验会非常痛苦和缓慢，我对此表示不推荐。\n\
  \n如果你对获取合适的设备特别感兴趣，以下我对各规格类别及其对开发体验的影响进行了深入讨论：\n\n* **内存**（RAM）是电脑快速存取数据的存储方式。如果你同时打开大量窗口、网站和应用程序，就需要更大的内存来提升多任务处理速度。我建议最低\
  \ 6 GB 内存。为获得最佳体验，应配置 12 GB 至 16 GB 内存。这样你可以同时打开 20 多个浏览器标签、多个窗口、Unity、Visual Studio、音乐应用程序，并保持后台任务运行而不影响系统速度。\n\
  \n* **处理器**（CPU）负责所有计算工作。当处理器高负荷运行时，你会立即感受到慢速处理器与快速处理器的差异。这些关键场景包括：*编译*应用（即电脑将你编写的代码转换为\
  \ HoloLens 可安装和理解的格式）、在 Unity 中加载和处理复杂 3D 对象，以及其他涉及大量 Unity 场景对象的处理工作。我推荐 Intel\
  \ Core i5 或 i7 处理器（或其他同速处理器）。\n\n* **操作系统**（OS）通常是 Windows、Mac OS 或 Linux。如前所述，你可以在多种\
  \ Windows 版本下开发（甚至在 Mac 上运行 Windows），但混合现实开发的首选系统是 Windows 10。微软正通过\"Windows 10\
  \ 创意者更新\"大力推广 Windows 平台上的 3D 应用。有线 Windows 混合现实头显也将依赖 Windows 10 工作。基于此，我认为购置 Windows\
  \ 10 电脑进行混合现实开发是值得的。\n\n* **图形处理器**（GPU）通常被误解且关注度低于上述其他组件。许多笔记本电脑和低中端 PC 没有独立显卡，而是依赖处理器内置的图形功能（即集成显卡）。在开发混合现实应用时，GPU\
  \ 并非必需，但能提升编辑性能——尤其是使用 Unity 全息仿真功能时，处理复杂场景和纹理效果更为明显。需要说明的是，任何在集成桌面显卡上运行吃力的 Unity\
  \ 应用，在 HoloLens 上表现可能更差，因为头显的图形处理能力有限。\n\n## 理解 HoloLens 及其他 Windows 混合现实硬件\n\n\
  本节将介绍 HoloLens 工作原理的基础知识。虽然可以为 HoloLens 的技术奇迹及其背后的科学原理写一整本书，但这里我仅提供足够的信息，帮助我们为此类及其他混合现实头显设计最佳应用体验。\n\
  \n\n### 由内向外追踪与空间映射\n\n`HoloLens`及其他 Windows 混合现实头戴设备与市面上其他流行头戴设备（截至撰写本文时）的关键区别在于其执行*由内向外追踪*的能力，即头戴设备无需外部传感器即可追踪自身环境的能力。由外向内追踪的头戴设备要求用户在房间或区域周围设置若干传感器，以便用户在移动时设备能知晓自身位置。而由内向外追踪则避免了设置外部传感器的繁琐，并且几乎能在所有环境中工作。一些你可能听说过的初级虚拟现实头戴设备（例如`Google\
  \ Cardboard`、`Samsung Gear VR`）不具备位置追踪功能，只能“环顾四周”。图 1-1 展示了 HoloLens 摄像头的示意图，其中多颗摄像头用于由内向外的空间追踪。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig1_HTML.jpg](img/441101_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1: HoloLens 2 摄像头及其功能示意图\n\n`HoloLens 2`头戴设备上共有八颗摄像头，其中五颗用于追踪其环境（四颗环境追踪摄像头，一颗深度摄像头），两颗眼球追踪摄像头，以及一颗用于录制视频或拍照的常规摄像头。`HoloLens`持续追踪其环境，并构建所处区域的\
  \ 3D 模型。这被称为*空间映射*。图 1-2 展示了`HoloLens`如何使用由三角形构成的网格来重建用户周围环境的数字版本。空间映射的重要性体现在以下几个方面：\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig2_HTML.jpg](img/441101_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2: HoloLens 使用空间映射追踪其环境的示意图\n\n- 它告诉`HoloLens`哪些全息图应当隐藏。例如，如果你将一个全息图放置在你的走廊里，然后走进另一个房间，那个房间墙壁的空间映射图会阻止你看到走廊里的全息图。`HoloLens`的这一特性被称为遮挡。这个简单的特性对全息图的感知自然度有着显著影响。如果没有空间映射图，你会看到全息图仿佛能穿透墙壁可见，从而造成不真实的体验。\n\
  - 它允许用户与空间映射图交互——例如，将物品固定到墙上，让角色坐在你的沙发上（如微软的“Fragments”应用所示！），或自动装饰你的周围环境。\n- 它实现了*全息图持久化*，即全息图能够保留在用户放置它们的位置——即使在关闭设备后也是如此。你的`HoloLens`将（令人惊叹地）能够记住你的空间，并恢复你之前放置在该空间中的任何全息图。\n\
  \n### 空间音效\n\n我们严重依赖耳朵来精确定位周围的物体。在混合现实的语境中，这被称为*空间音效*。`HoloLens`能够利用声波相位偏移技术向用户耳朵发送空间音效。这增强了沉浸感。即使看不到周围的物体（如果这些物体有意发出声音），用户仍然能够听到它们。这增强了用户对这些物体的感知，并使全息图感觉就像真实存在于用户所在区域一样。\n\
  \n### 透明式与沉浸式头戴设备\n\n一些 Windows 混合现实设备，如`HoloLens`，使用透明显示屏，允许你看到放置在你真实世界中的全息图。其他设备，例如联想的\
  \ Windows 混合现实头戴设备，是遮蔽式的，意味着你无法看到周围环境。相反，这些头戴设备让你沉浸在一个虚拟世界中。沉浸式头戴设备仍然具备由内向外追踪功能，这有助于让用户在佩戴头戴设备时感知到墙壁或其他障碍物。一些沉浸式头戴设备也可能利用空间映射，允许用户看到其周围环境的虚拟呈现。图\
  \ 1-3 展示了 Windows 混合现实头戴设备的几个示例。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig3_HTML.jpg](img/441101_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3: Windows 混合现实设备示例包括像 HoloLens 这样的透明头戴设备和遮蔽式头戴设备（来源：微软）\n\n截至撰写本文时，所有现有设备都存在*视场角*（FOV）限制，这意味着你无法在你的全部周边视野中看到全息图。如图\
  \ 1-4 所示，`HoloLens`的视场角限制导致全息图只能在一个有限的“窗口”内被看到。随着头戴设备显示技术的进步，我们可以预期分辨率会提高，视场角限制会随时间推移而减少。当今设备中的视场角限制意味着在设计应用时需要发挥创意，使其尽可能具有沉浸感。使用空间音效是增强用户对全息图感知的一个关键要素。其他的视觉线索（例如指向视场角外全息图的箭头）也是帮助用户的策略。我们将在第三部分更详细地讨论这些内容。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig4_HTML.jpg](img/441101_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4: 从设备后方拍摄的 HoloLens 视场角限制示例\n\n## 下载并安装所需的与可选的软件工具\n\n在本节中，将指导你安装开发 Windows\
  \ 混合现实应用所需的所有必要软件和工具。开始混合现实开发仅需要两个应用程序：`Unity`和`Visual Studio`。在本书中，我们将在混合现实开发的背景下定义和阐述所有内容。然而，这两个应用程序在软件和游戏行业中都已被广泛使用多年。以下是每个工具的简要说明：\n\
  \n- **Unity** 是开发 Windows 混合现实体验的首选软件平台。你所有的应用开发都在`Unity`内进行。正是在这里，你将编写程序让全息图执行各种操作。在混合现实世界之外，`Unity`\
  \ 被广泛用于游戏开发。这是个极好的消息，因为这意味着有丰富的教程、资源和论坛讨论可供参考，能够帮助你解答在开发混合现实应用时可能遇到的几乎所有问题。\n- **Visual\
  \ Studio** 主要负责编辑你的应用程序代码，也用于将你的应用*部署*到混合现实头戴设备上进行测试和调试。部署简单来说就是将应用安装到你的头戴设备上。当你的应用完成时，你也可以使用`Visual\
  \ Studio`将应用部署到 Windows 商店。截至撰写本文时，你还不能直接从`Unity`将应用部署到你的`HoloLens`（但如前所述，你可以将应用流式传输到你的`HoloLens`）。不过，`Unity`\
  \ 可能很快会允许用户直接部署到`HoloLens`，而无需经过`Visual Studio`。\n\n> **注意：** 本书中展示的工具会定期更新，屏幕截图可能与你当前使用的应用程序版本不完全一致。在你按照后续说明操作时请牢记这一点。本书中使用的版本如下：`Unity\
  \ Hub`版本 2.4.2 和`Visual Studio 2019`版本 16.8。\n\n除了安装`Unity`和`Visual Studio`，你还需要下载混合现实工具包。混合现实工具包不是一个应用程序，而是一组有用的混合现实脚本和功能，可以导入到`Unity`中。请放心，我会用整整一章来介绍混合现实工具包及其所提供的全部功能！\n\
  \n\n\n### 安装 Visual Studio\n\n在本节中，我们将逐步讲解如何下载和设置用于混合现实开发的 Visual Studio。在撰写本文时，混合现实开发所需的版本是\
  \ Visual Studio 2019；版本会定期更新，但不同版本的安装过程将非常相似。\n\n要查看用于混合现实开发的最新版 Visual Studio，请使用微软的安装清单，位于：\n\
  \n[`https://developer.microsoft.com/en-us/windows/Mixed-Reality/install_the_tools`](https://developer.microsoft.com/en-us/windows/Mixed-Reality/install_the_tools)\n\
  \n您将看到一个类似于图 1-5 所示的表格。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig5_HTML.jpg](img/441101_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\n\n请务必查看微软的安装清单以获取最新的工具版本。要下载 Visual Studio，请点击相应的标题（红色圆圈处）。\n\n您也可以通过以下链接下载\
  \ Visual Studio：\n\n[`https://developer.microsoft.com/en-us/windows/downloads`](https://developer.microsoft.com/en-us/windows/downloads)\n\
  \n如果您还没有 Visual Studio 订阅，可以下载免费版本的 Visual Studio，也称为“Visual Studio Community”。图\
  \ 1-6 展示了下载按钮可能的外观。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig6_HTML.png](img/441101_2_En_1_Fig6_HTML.png)\n\
  \n图 1-6\n\n点击 Visual Studio Community 的“免费下载”按钮，开始下载。\n\n将 Visual Studio 安装程序保存到您选择的位置。下载完成后，您可以运行\
  \ Visual Studio 安装程序来开始安装过程。图 1-7 展示了在 Microsoft Edge 浏览器中运行安装程序时的界面。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig7_HTML.jpg](img/441101_2_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\n在您的 PC 上运行 Visual Studio 安装程序。\n\n启动 Visual Studio 安装程序后，您会看到几秒钟的初始化过程，然后出现选择功能的选项，如图\
  \ 1-8 所示。\n\n在`Visual Studio 2019`的功能列表中，请务必勾选“通用 Windows 平台开发”复选框。同时勾选“使用 Unity\
  \ 的游戏开发”复选框。您可以在右侧面板中取消勾选“Unity 编辑器”复选框，因为您将在本章后面安装最新版本的 Unity。在做出适当选择后，点击“下一步”或“安装”。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig8_HTML.jpg](img/441101_2_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8\n\n对于`Visual Studio 2019`，请确保您选择了“通用 Windows 平台开发”和“使用 Unity 的游戏开发”。\n\n\
  点击“安装”后，Visual Studio 将开始下载并安装您选择的功能。Visual Studio 是一个非常庞大的应用程序，根据您的网络连接情况，下载和安装可能需要几个小时。请为安装过程预留一些时间！安装完成后，系统可能会提示您重启\
  \ PC。重启后，您可以通过打开 Visual Studio 来验证安装是否成功完成。当您首次打开 Visual Studio 时，根据您的 Visual Studio\
  \ 版本，它应该类似于图 1-9 所示的欢迎页面。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig9_HTML.jpg](img/441101_2_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9\n\n您可以选择在安装完成后启动 Visual Studio，以验证其是否正确安装。\n\n恭喜！您已成功安装 Visual Studio。目前您无需对\
  \ Visual Studio 进行任何操作。稍后，当我们通过 Visual Studio 将应用程序部署到 HoloLens 时，我们将经历一个初始配对过程。如果您尚未登录，可能需要使用您的\
  \ Microsoft 帐户登录 Visual Studio。Visual Studio 还可能为您的帐户应用使用 Visual Studio 的“许可证”。Visual\
  \ Studio 上的所有许可证都是基于用户的。获得许可的用户可以在任意数量的设备上访问其帐户进行设计和开发。可以在 Visual Studio 中访问多个用户帐户，从而进一步提高其灵活性。接下来，我们将安装\
  \ Unity。\n\n\n\n### 安装 Unity\n\n在本节中，我们将逐步介绍如何下载和设置用于混合现实开发的 `Unity`。截至撰写本文时，混合现实开发所需的版本为\
  \ `Unity 2019`。版本会定期更新，但不同版本的安装过程将非常相似。\n\n要查看用于混合现实开发的最新 `Unity` 版本，请使用微软的安装清单，地址位于：\n\
  [*https://developer.microsoft.com/zh-cn/windows/Mixed-Reality/install_the_tools*](https://developer.microsoft.com/zh-cn/windows/holographic/install_the_tools)\n\
  \n您也可以从以下链接下载 `Unity`：\n[*https://store.unity.com/download*](https://store.unity.com/download)\n\
  \n进入 `Unity` 的下载页面后，您会看到一个与图 1-10 类似的下载按钮。下载完成后，运行 `Unity Hub` 安装程序并将其安装到您的电脑上（图\
  \ 1-11）。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig11_HTML.jpg](img/441101_2_En_1_Fig11_HTML.jpg)\n\
  图 1-11\n\n下载完成后，运行 `Unity` 安装程序\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig10_HTML.jpg](img/441101_2_En_1_Fig10_HTML.jpg)\n\
  图 1-10\n\n从 `Unity` 官网下载最新版本的 `Unity Hub`\n\n启动 `Unity Hub` 安装程序后，您将看到如图 1-12 所示的下载助手界面。点击“同意”开始安装过程。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig12_HTML.jpg](img/441101_2_En_1_Fig12_HTML.jpg)\n\
  图 1-12\n\n接受许可协议\n\n接受协议后，请选择您希望安装 `Unity Hub` 的首选位置。默认情况下，程序文件将被选为目标文件夹。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig13_HTML.jpg](img/441101_2_En_1_Fig13_HTML.jpg)\n\
  图 1-13\n\n在目标文件夹中安装 `Unity Hub`\n\n在目标文件夹成功安装 `Unity Hub` 后，在“完成 Unity Hub 设置”菜单中点击\
  \ `完成` 以结束安装。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig14_HTML.jpg](img/441101_2_En_1_Fig14_HTML.jpg)\n\
  图 1-14\n\n完成安装\n\n打开 `Unity Hub` 软件，系统会要求您登录现有的 `Unity` 账号或创建一个新账号。如果您已有 `Unity`\
  \ 账号，请登录；否则，请创建一个新的 `Unity` 账号。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig15_HTML.jpg](img/441101_2_En_1_Fig15_HTML.jpg)\n\
  图 1-15\n\n登录您现有的 `Unity` 账号，如果没有账号则创建一个新账号\n\n当您选择创建新的 `Unity` 账号时，将打开一个新的网页要求您输入账户详细信息。填写所有详细信息，并创建您的\
  \ `Unity` 账号。在选择个人使用 `Unity` 时，我们会获得一份免费许可证。`Unity Personal` 是初学者上手的绝佳选择。它集成了所有关键的游戏功能、引擎功能、持续更新、测试版发布以及所有发布平台。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig16_HTML.jpg](img/441101_2_En_1_Fig16_HTML.jpg)\n\
  图 1-16\n\n`Unity` 将打开一个网页，您可以在其中注册新的 `Unity` 账号\n\n创建新账号或使用现有账号登录后，转到 `Unity Hub`\
  \ 中的`安装`部分，然后选择“添加”。将弹出一个包含各种 `Unity` 版本的新菜单。请选择最新版本，然后点击 `下一步` 开始 `Unity` 安装过程。\n\
  \n> **注意**  \n> 您也可以访问 `Unity` 下载存档以下载特定版本的 `Unity`。点击下载选项后，您将被重定向到 `Unity Hub`\
  \ 以进行后续步骤。本书全程使用 `Unity 2019.4.16`。\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig18_HTML.jpg](img/441101_2_En_1_Fig18_HTML.jpg)\n\
  图 1-18\n\n`Unity` 组件的下载和安装可能需要很长时间\n\n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig17_HTML.jpg](img/441101_2_En_1_Fig17_HTML.jpg)\n\
  图 1-17\n\n请务必选择此图中所示的必要组件。点击“下一步”继续\n\n如图 1-18 所示，`Unity` 将开始下载并安装所选组件。根据您的互联网连接速度，这可能需要数小时。请做好长时间等待的准备。安装完成后，点击“完成”按钮。\n\
  \n恭喜！您现在已经成功在电脑上安装了 `Unity`。您可以通过打开 `Unity Hub` 来访问新安装的 `Unity` 并创建新项目。如何创建新的 `Unity`\
  \ 项目将在下一课中讨论。\n\n\n\n### 下载混合现实工具包\n\n在本节中，我将引导你下载混合现实工具包，它并非一个独立程序，而是一组可导入 Unity\
  \ 的实用脚本和功能集合。要下载混合现实工具包的 Unity 资源包，请访问以下网址：\n\n[*https://github.com/microsoft/MixedRealityToolkit-Unity/releases/*](https://github.com/microsoft/MixedRealityToolkit-Unity/releases/)\n\
  \n请确保下载混合现实工具包的最新版本，通常位于页面顶部附近。本书使用的混合现实工具包版本为 2.5.3。请注意，你下载的混合现实工具包版本必须与你下载的 Unity\
  \ 版本兼容。通常，兼容性会在混合现实工具包版本的标题中注明，如图 1-19 所示。要下载混合现实工具包 Unity 资源包，请点击扩展名为`.unitypackage`的下载链接。例如，在图\
  \ 1-19 中，正确的下载链接（红色圆圈标出）名称为`Microsoft.MixedReality.Toolkit.Unity.Foundations.2.5.3.unitypackage`。\n\
  \n![../images/441101_2_En_1_Chapter/441101_2_En_1_Fig19_HTML.jpg](img/441101_2_En_1_Fig19_HTML.jpg)\n\
  \n**图 1-19** 浏览到混合现实工具包下载页面，并下载红色圆圈标出的混合现实工具包 Unity 资源包\n\n在图 1-19 中，你会看到五个不同的`.unitypackage`文件。这些资源包各有用途，均可添加到你的\
  \ Unity 项目中。让我们来了解这些资源包的用途：\n\n1.  **基础包（Foundation package）**：顾名思义，基础包为混合现实开发奠定了底层结构。它包含的代码可让你在不同混合现实平台的应用中支持标准功能。由于它是构建应用的重要资源包，你必须下载并导入它。\n\
  \n2.  **扩展包（Extensions package）**：扩展包是一个可选包，通过添加额外服务帮助我们扩展功能。此资源包需要依赖基础包才能运行。\n\n\
  3.  **工具包（Tools package）**：工具包也是一个可选包，包含能增强开发体验的实用工具。这些工具可以在 Unity 编辑器的**混合现实工具包\
  \ ➤ 实用工具**菜单中找到。工具包依赖于基础包，因此需要基础包才能正常运行。\n\n4.  **测试工具包（Test utilities package）**：可选测试工具包包含辅助脚本，使用户能够轻松创建“播放模式”测试。播放模式测试可以检查功能对手部或眼睛等不同输入源的反应。此资源包对开发混合现实工具包组件的开发者非常有用。\n\
  \n5.  **示例包（Examples package）**：示例包是另一个可选包，如果你是初学者，它将非常有益。它展示了混合现实工具包的各种功能。此资源包包含演示、示例场景和示例代码，这些示例运用了基础包中的功能。示例包需要依赖基础包才能正常运行。\n\
  \n如前所述，你可以根据自己的需求自由下载任何可选包。将混合现实工具包保存到你的电脑上。我们稍后会将此资源包导入 Unity。\n\n## 总结\n\n现在，你已经拥有了开始混合现实开发所需的一切！在接下来的章节中，我们将学习一些\
  \ Unity 基础知识，创建我们的第一个混合现实应用，然后深入探索如何打造令人惊叹的混合现实体验。让我们回顾一下本章所学内容：\n\n*   我们讨论了开发混合现实体验的推荐\
  \ PC 硬件规格。\n*   我们简要了解了 HoloLens 和其他 Windows 混合现实头戴式设备的硬件特性及其独特之处。\n*   最后，我们逐步完成了\
  \ Visual Studio、Unity 和混合现实工具包的安装指南。\n\n"
- "# 2. Unity 速成课程\n\n在本章中，我们将深入 Unity 的世界。Unity 是开发混合现实应用的首选软件平台。如果你想掌握混合现实开发，就意味着你首先需要掌握\
  \ Unity！我们将全面了解 Unity，并理解其用途。我还将引导你构建第一个 Unity 应用。\n\n## 什么是 Unity？\n\n在我们开始之前，你可能想知道\
  \ Unity 是什么以及人们如何使用它。*Unity 是一个构建 2D 和 3D 游戏与应用的强大程序*。它在游戏开发者中非常受欢迎，尤其是移动游戏开发者。Unity\
  \ 还支持广泛的平台。例如：iOS、Android、PlayStation、Nintendo、Xbox One、Windows、Mac、HoloLens、Oculus\
  \ 等等！\n\nUnity 中非常基础的混合现实工作流程如下：\n\n1.  将你的 3D 对象和其他项目（称为*资产*）导入 Unity。\n2.  编程设定你将如何与对象交互，以及对象将如何与你、其他对象及世界交互。\n\
  3.  测试你的应用。\n4.  导出你的应用，以便将其安装到设备上。\n\nUnity 是一个非常庞大且精密的平台。在本书中，我们将只覆盖混合现实开发所需的\
  \ Unity 核心部分。随着你作为一名 Windows 混合现实开发者不断成长，你将花费大量时间掌握 Unity 并为 Unity 进行编程。\n\n## Unity\
  \ 的免费与付费层级\n\nUnity 为开发者提供了几种定价层级。大多数想学习 Unity 的人可以从个人（免费）账户开始。然而，不同定价层级存在一些需要了解的限值与优势。在表\
  \ 2-1 中，我提供了对这些层级的说明。\n\n**表 2-1** Unity 定价层级\n\n| 定价层级 | 限值与优势 |\n| --- | --- |\n\
  | Unity Personal（免费） | 只有当你的公司年收入低于 10 万美元（含投资资金）时，才能使用此层级。你的应用在启动时强制显示 Unity 徽标（闪屏）。\
  \ |\n| Unity Plus（每月 40 美元/人） | 只有当你的公司年收入低于 20 万美元（含投资资金）时，才能使用此层级。你可以使用自定义（或无）闪屏。附加\
  \ Plus 服务。 |\n| Unity Pro（每月 150 美元/人） | 无收入/资金上限。你可以使用自定义（或无）闪屏。附加 Pro 服务。 |\n\n\
  ## 第一个 Unity 应用\n\n在本节中，我们将构建第一个 Unity 应用程序！我们将创建一个通过键盘控制小球滚动的游戏。在创建第一个 Unity 应用的过程中，我们还将熟悉一些基本的\
  \ Unity 组件，并了解 Unity 界面。由于本教程旨在让你熟悉 Unity，我们暂时不会制作混合现实应用（这将在下一章进行）。开始之前，请确保你已经按照第\
  \ 1 章的说明安装了 Unity 并设置了 Unity 账户。\n\n**提示** 这个基本的 Unity 教程被称为*滚球教程*。强烈推荐所有 Unity\
  \ 初学者学习。\n\n\n\n### 步骤 1：创建新的 Unity 项目\n\n每个 Unity（以及混合现实）项目都始于创建一个新的 Unity 项目。要开始新项目，请启动\
  \ Unity Hub，然后选择“新建”图标，如图 2-1 所示。如果尚未登录，您可能需要先输入账户信息（已在第 1 章创建），才能看到图 2-1 所示的屏幕。\n\
  \n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig1_HTML.jpg](img/441101_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\n点击“新建”图标开始创建新的 Unity 项目\n\n或者，如果您已经在某个 Unity 项目中，可以通过导航到 `文件 ➤ 新建项目`\
  \ 来创建一个新项目，如图 2-2 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig2_HTML.jpg](img/441101_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n\n您也可以通过导航到 `文件 ➤ 新建项目` 来启动新的 Unity 项目\n\n然后，Unity 将打开一个弹出窗口，您可以在其中设置新项目。如图\
  \ 2-3 所示，为您的项目命名。我选择了“`FirstApp`”。您还可以选择不同的位置来存储项目（可选）。项目应已为“3D”项目，但如果不是，请务必选择“3D”选项按钮。完成后，点击“创建”按钮。\n\
  \n> **警告**  \n> 避免将 Unity 项目存储在 SD 卡或 MicroSD 卡上。由于未知的错误，如果项目在 SD 卡上，Visual Studio\
  \ 将无法正确构建项目。您可以将 Unity 项目存储在外部硬盘上。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig3_HTML.jpg](img/441101_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\n告知 Unity 您的新项目信息。确保选择“3D”并为项目命名\n\n现在您将看到一个新的空项目！您应该能看到类似图 2-4 的内容。这被称为\
  \ Unity 编辑器，您的大部分项目编辑工作都将在此进行。在图 2-4 中，我还为编辑器内包含的重要面板提供了简要说明。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig4_HTML.jpg](img/441101_2_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n\nUnity 编辑器窗口包含几个重要面板。大部分项目编辑工作在此进行\n\n在场景面板中，您将看到类似蓝色天空和棕色或灰色地面的景象。这就是您的空*场景*。目前，它只包含一些照亮场景的光源（太阳图标），以及在操作游戏时用于观察世界的摄像机（摄像机图标）。\n\
  \n### 步骤 2：保存场景\n\n在开始编辑这个空场景之前，我们先保存它。右键单击场景并选择 `将场景另存为`。图 2-5 显示了保存场景选项的位置。将弹出一个对话框，允许您为场景命名并选择保存位置。将场景命名为“`MiniGame`”，您可以使用默认位置。您可以用任何名称命名场景，但我建议使用与我相同的名称，以便在后续教程中更容易跟随。\n\
  \n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig5_HTML.jpg](img/441101_2_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\n在编辑前保存您的场景\n\n现在场景已保存为 `Assets` 文件夹中的 `MiniGame`。在 `层级` 面板中，您应该能看到名为\
  \ `MiniGame` 的场景，其下有两个对象（`主摄像机` 和 `方向光`）。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig6_HTML.jpg](img/441101_2_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n您的新场景在 `层级` 面板下应有两个默认对象\n\n### 步骤 3：创建地面平面\n\n现在我们可以开始构建游戏场景。首先，我们需要创建一个地面平面，供球体在其上滚动。在层级面板中点击\
  \ `MiniGame` 场景，使其高亮显示（确保您没有选中 `主摄像机` 或 `方向光`）。导航到 `游戏对象 ➤ 3D 对象 ➤ 平面`。请参见图 2-7\
  \ 了解如何访问 `平面` 对象。`平面` 对象是一个大型平坦表面。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig7_HTML.jpg](img/441101_2_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\n创建一个新的 `平面` 作为地面\n\n您刚刚创建的 `平面` 将在场景面板中显示为地面上的灰色平面。它也会出现在 `层级` 面板中，如图\
  \ 2-8 所示。`层级` 中的对象被称为*游戏对象*。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig8_HTML.jpg](img/441101_2_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\n创建后的 `平面` 对象示意图\n\n### 步骤 4：重命名平面\n\n让我们将 `平面` 游戏对象重命名为“地面”。为此，在 `层级`\
  \ 中单击 `平面` 游戏对象一次以高亮显示它。等待一秒钟后，再次单击 `平面` 游戏对象。您现在就可以编辑游戏对象的名称了。您也可以通过右键单击并选择“重命名”来重命名对象。将其重命名为“地面”，如图\
  \ 2-9 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig9_HTML.jpg](img/441101_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\n将“`平面`”游戏对象重命名为“地面”\n\n### 步骤 5：重置地面平面位置\n\n接下来，让我们将 `地面` 游戏对象的位置重置为\
  \ 0, 0, 0。在 `检查器` 面板中，点击 `变换` 组件的齿轮图标。在上下文菜单打开后，选择 `重置`，如图 2-10 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig10_HTML.jpg](img/441101_2_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10\n\n重置 `地面` 游戏对象的位置\n\n### 步骤 6：缩放至地面平面\n\n在 `层级` 中，选中 `地面` 游戏对象，然后按键盘上的“`F`”键。这将激活*框选对象*命令，使场景窗口拉近或拉远，以将您选中的游戏对象填满场景窗口。\n\
  \n> **提示**  \n> 如果在场景中找不到对象，只需在 `层级` 中选中该游戏对象名称，然后按“`F`”键即可自动缩放至该对象。此命令也可用于快速缩放至场景中非常大或非常小的对象。\n\
  \n\n\n### 第 7 步：缩放地面\n\n接下来，我们将学习如何通过缩放地面来*缩放*游戏对象。缩放对象意味着调整其大小。有多种不同的方式可以缩放游戏对象。这里列出了一些常见方法：\n\
  \n-   点击缩放图标，然后在游戏对象上点击并拖动其中一个彩色轴。拖动红色轴可在`X`方向缩放，绿色轴对应`Y`方向，蓝色轴对应`Z`方向。\n-   按下键盘上的`R`键，作为点击缩放图标的快捷方式。\n\
  -   点击并拖动缩放字段的`X`、`Y`或`Z`标题。\n-   直接在缩放字段中输入您想要的缩放值。\n\n图 2-11 展示了这些缩放命令的位置。\n\n\
  ![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig11_HTML.jpg](img/441101_2_En_2_Fig11_HTML.jpg)\n\
  \n**图 2-11**  \n有多种方式可以缩放您的游戏对象\n\n缩放您的对象，将`X`、`Y`和`Z`轴的值都设置为`1`。\n\n> **注意：** \
  \ \n> `Plane`对象相对于其他对象来说是个例外，它看起来比其他对象大十倍。这只是为了让平面显得独特而做的随意决定，因为很多人将这个对象用作地板或墙面。因此，当您将`X`、`Y`和`Z`的值设置为`1`时，对于平面而言，这相当于十米。\n\
  \n### 第 8 步：创建球体\n\n请记住，我们正在创建一个名为*滚球*的游戏。您将在一个平面上控制一个滚动的球体。要创建球体，我们需要向场景中添加一个球体。添加球体与添加平面类似。点击我们的场景\
  \ `MiniGame`（以确保我们没有选中其他游戏对象），然后转到 **GameObject** ➤ **3D Object** ➤ **Sphere**。图\
  \ 2-12 展示了这个命令的位置。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig12_HTML.jpg](img/441101_2_En_2_Fig12_HTML.jpg)\n\
  \n**图 2-12**  \n为您的球体创建一个`Sphere`游戏对象\n\n### 第 9 步：重命名球体\n\n通过选中层级视图中的`Sphere`游戏对象，等待一秒钟后再次点击它来重命名您的球体，就像您在步骤\
  \ 4 中重命名`Plane`一样。将您的球体命名为`Player`。\n\n### 第 10 步：重置球体位置\n\n接下来，让我们将`Player`游戏对象（我们的球体）的位置重置为`0,\
  \ 0, 0`。在检视面板中，点击`Transform`组件的齿轮图标。打开上下文菜单后，选择**Reset**，就像我们在步骤 5 中所做的那样（参见图 2-10）。\n\
  \n### 第 11 步：聚焦球体\n\n在层级视图中，选中`Player`游戏对象，然后按下键盘上的`F`键进行缩放，使球体填满您的场景窗口。\n\n###\
  \ 第 12 步：抬高球体位置\n\n正如您在场景中看到的，球体有一半陷入了地面。移动游戏对象的位置类似于缩放它（参见步骤 7）。图 2-13 显示了几种移动对象位置的选项。将`Player`游戏对象抬高`0.5`单位。完成此操作后，球体将完美地停在地面表面，如图\
  \ 2-13 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig13_HTML.jpg](img/441101_2_En_2_Fig13_HTML.jpg)\n\
  \n**图 2-13**  \n在 Unity 中有多种定位游戏对象的方法\n\n### 第 13 步：将地面着色为蓝色\n\n到目前为止，您已经创建了地面和球体。您创建的对象的默认颜色是灰色。让我们更改一些颜色，以便更好地区分`Player`球体和地面。在\
  \ Unity 中，有许多修改对象外观的选项。纹理、材质和着色器构成一个复杂的世界，这将在第 4 章中讨论。现在，让我们为地面应用一个简单的材质。\n\n首先，创建一个文件夹来组织我们的材质。保持项目文件的良好组织始终是一个好习惯，这将有助于避免混淆并加快开发工作，特别是在非常庞大和复杂的项目中。要创建文件夹，请点击项目面板中的\
  \ **create** 下拉列表，然后选择 **Folder**，如图 2-14 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig14_HTML.jpg](img/441101_2_En_2_Fig14_HTML.jpg)\n\
  \n**图 2-14**  \n说明如何在 Unity 中创建新文件夹\n\n文件夹创建完成后，将其重命名为`Materials`，如图 2-15 所示。\n\n\
  ![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig15_HTML.jpg](img/441101_2_En_2_Fig15_HTML.jpg)\n\
  \n**图 2-15**  \n重命名后，您的项目列表中现在会有一个`Materials`文件夹\n\n接下来，我们将创建材质。选中您刚刚创建的`Materials`文件夹使其高亮。使用与创建`Materials`文件夹相同的\
  \ **create** 下拉菜单，创建一个新的材质，如图 2-16 所示。您创建的新材质现在应该位于`Materials`文件夹内（因为创建新材质时已选中了`Materials`文件夹）。按照本教程中重命名其他项的方式，将此材质重命名为`Background`。\n\
  \n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig16_HTML.jpg](img/441101_2_En_2_Fig16_HTML.jpg)\n\
  \n**图 2-16**  \n创建一个新的材质\n\n接着，选中您的新`Background`材质，并在检视面板中打开`Albedo`设置，如图 2-17 所示。要打开`Albedo`设置，请点击\
  \ `Albedo` 字样右侧的彩色框（默认颜色为白色）。不要点击`Albedo`左侧的吸管图标或灰色框。将会弹出一个窗口，您可以在其中为材质选择各种颜色选项，如图\
  \ 2-17 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig17_HTML.jpg](img/441101_2_En_2_Fig17_HTML.jpg)\n\
  \n**图 2-17**  \n选择`Background`材质的`Albedo`设置来更改其颜色\n\n在弹出的颜色窗口内，选择一种深蓝色。您可能需要将**色相**条拖动到蓝色区域，然后在方形颜色框中选择一种颜色，如图\
  \ 2-18 所示。当然，您可以选择任何您喜欢的颜色。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig18_HTML.jpg](img/441101_2_En_2_Fig18_HTML.jpg)\n\
  \n**图 2-18**  \n通过更改色相和亮度/饱和度设置来选择深蓝色。您也可以直接输入图示中的具体数值\n\n最后，通过将材质从项目窗口拖拽到地面上，将蓝色的`Background`材质应用到地面，如图\
  \ 2-19 所示。地面应该会变成蓝色，使球体更加突出。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig19_HTML.jpg](img/441101_2_En_2_Fig19_HTML.jpg)\n\
  \n**图 2-19**  \n将您蓝色的`Background`材质从项目面板拖拽并放置到地面上。地面将变为蓝色！\n\n\n\n### 步骤 14：为小球添加物理效果\n\
  \n由于本游戏将涉及让小球在地面上滚动，我们希望小球的行为与现实世界中的球类物体类似，因此需要使用物理引擎。要启用物理效果，请在层级视图中选中小球（即`Player`游戏对象），然后在检查器中点击“添加组件”按钮，并选择“物理”➤\
  \ `Rigidbody`。这些菜单项的位置如图 2-20 所示。*刚体*是 Unity 物理引擎的基础组件，负责存储运动方程所需的各类状态变量。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig20_HTML.jpg](img/441101_2_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20 — 为`Player`游戏对象添加`Rigidbody`组件以对小球应用物理效果\n\n### 步骤 15：启用键盘控制\n\n我们希望可以使用键盘作为游戏控制器来移动小球。为此，需要为小球编写一些代码！在\
  \ Unity 中，代码文档被称为*脚本*。让我们保持井井有条，创建一个新文件夹来存放脚本，就像之前在步骤 13 中创建存放材质的文件夹一样。\n\n1.  要创建新文件夹，请转到“项目”面板，点击“创建”\
  \ ➤ “文件夹”。请确保`Scripts`文件夹创建在`Assets`文件夹内，而不是`Materials`文件夹内部。\n2.  将新文件夹重命名为“Scripts”。接下来，我们要为小球添加一个新脚本。\n\
  3.  选中`Player`游戏对象。\n4.  在检查器中点击“添加组件”按钮。\n5.  滚动到列表底部，选择“新建脚本”。\n6.  在弹出的下一个窗口中，确保脚本语言设置为\
  \ C sharp（有时也称为 C#）。\n7.  将脚本命名为“PlayerController”。\n8.  点击“创建并添加”按钮。\n\n图 2-21\
  \ 演示了如何添加并命名新脚本。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig21_HTML.jpg](img/441101_2_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21 — 为`Player`游戏对象创建一个名为“PlayerController”的新脚本\n\n你会注意到，在“项目”面板中，刚创建的新脚本并未放置在`Scripts`文件夹内。将`PlayerController`脚本拖放到`Scripts`文件夹中，如图\
  \ 2-22 所示。养成保持条理清晰的习惯非常重要！\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig22_HTML.jpg](img/441101_2_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22 — 将`PlayerController`脚本拖拽到`Scripts`文件夹中以保持项目结构清晰\n\n接下来，我们将对`Player`游戏对象进行编程，使其响应键盘控制：\n\
  \n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig23_HTML.jpg](img/441101_2_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23 — 双击`PlayerController`脚本，在 Visual Studio 中打开进行编辑\n\n1.  在层级视图中选中`Player`游戏对象。\n\
  2.  如图 2-23 所示，在检查器中双击`PlayerController`脚本。Visual Studio 现在应该会自动启动，以便你开始编辑脚本。\n\n\
  你应该已经在第 1 章中下载、安装并配置好了 Visual Studio。一旦 Visual Studio 打开了你的`PlayerController`脚本，你应该会看到类似图\
  \ 2-24 所示的窗口。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig24_HTML.jpg](img/441101_2_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24 — Visual Studio 打开`PlayerController`脚本后应看到的示例界面\n\n在 Visual Studio 中，请删除所有现有代码，并将其替换为代码清单\
  \ 2-1 中提供的代码。\n\n```\nusing UnityEngine;\nusing System.Collections;\npublic class\
  \ PlayerController : MonoBehaviour {\npublic float speed;\nprivate Rigidbody rb;\n\
  void Start ()\n{\nrb = GetComponent();\n}\nvoid FixedUpdate ()\n{\nfloat moveHorizontal\
  \ = Input.GetAxis (\"Horizontal\");\nfloat moveVertical = Input.GetAxis (\"Vertical\"\
  );\nVector3 movement = new Vector3 (moveHorizontal, 0.0f, moveVertical);\nrb.AddForce\
  \ (movement * speed);\n}\n}\n```\n\n代码清单 2-1 — `PlayerController`脚本使你能够通过键盘控制小球滚动\n\
  \n此时你的 Visual Studio 窗口应类似于图 2-25。点击图中红色圆圈标注的“全部保存”图标来保存代码。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig25_HTML.jpg](img/441101_2_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25 — 用提供的代码替换`PlayerController`中的所有默认代码。点击红色圆圈标注的“全部保存”图标保存脚本\n\n本教程不会深入解释这段代码，因为本章的主要目的是让你熟悉\
  \ Unity 的工作流程。当我们开始开发混合现实应用程序时，我会详细讲解脚本，以便你理解代码的工作原理。\n\n### 步骤 16：测试应用程序\n\n接下来，我们将测试新应用程序，以确保一切按预期工作。回到\
  \ Unity 编辑器，在层级视图中选中`Player`游戏对象。你会注意到，在检查器的`Player Controller`组件下出现了一个新字段，如图 2-26\
  \ 所示。这是由于我们编写的新脚本导致的。为了让该字段显示在检查器面板中，你需要保存脚本，并等待 Unity 花几秒钟时间处理已保存的更改并更新检查器面板。将“Speed”的值改为\
  \ 10，然后点击播放按钮（位于场景面板上方），如图 2-26 所示。\n\n![../images/441101_2_En_2_Chapter/441101_2_En_2_Fig26_HTML.jpg](img/441101_2_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26 — 在检查器中将玩家速度设置为 10，然后点击播放按钮（位于顶部）测试新应用\n\n点击播放后，你将进入“游戏”模式，通过场景摄像头观看游戏。现在尝试按下键盘上的左、右、上、下箭头键，观察小球移动！如果小球掉出地面边缘，你可以再次点击播放按钮停止游戏，然后再次点击播放进入游戏来重置游戏。欢迎尝试改变`Player`的速度，探索其对游戏玩法的影响。\n\
  \n## 总结\n\n恭喜你！你已经成功完成了第一个 Unity 应用程序。以下是本章我们学到的一些内容：\n\n*   我们讨论了 Unity 的基本信息。\n\
  *   我们了解了 Unity 的定价等级。\n*   我们学习了 Unity 编辑器界面。\n*   我们学习了如何创建新的游戏对象。\n*   我们学习了如何缩放和移动游戏对象。\n\
  *   我们学习了如何为游戏对象应用材质。\n*   我们学习了如何为游戏对象应用物理效果。\n*   我们学习了如何创建脚本并将其应用于游戏对象。\n*  \
  \ 我们创建并测试了第一个 Unity 应用程序！\n\n现在你已经熟悉了 Unity 的基础知识，我们可以开始探索如何利用这个强大的平台创建混合现实体验。Unity\
  \ 是一个非常庞大且精细的工具，作为混合现实开发者，你将在提升 Unity 技能上投入大量时间。在后续章节中，随着我们逐步进行混合现实开发，我们将更深入地探讨各种\
  \ Unity 主题。\n\n"
- '# 第二部分

  ## 构建全息体验




  '
- "# 3. 创建你的第一个全息图\n\n在本章中，我们将构建首个全息体验！我们将首先使用混合现实工具包设置 Unity，为全息开发做好准备。创建第一个全息图后，我们将通过\
  \ Visual Studio 将应用直接部署到 HoloLens 上进行测试。在本章中，我还将讨论如何为你的项目创建或寻找自己的全息图（3D 模型）。\n\n\
  ## 让 Unity 为混合现实开发做好准备\n\n在开始创建第一个全息图之前，我们首先需要确保 Unity 已为混合现实开发做好准备。为了让我们的应用能在 HoloLens\
  \ 和其他混合现实设备上运行，需要更改 Unity 中的几项设置。例如，在第 2 章的 Unity 教程中，你可能注意到了场景中的灰/棕色地板和蓝色天空。我们通常不希望这种数字地板和天空出现在所有混合现实体验中，因此需要将背景调黑，使其不会显示在设备上；黑色背景有助于在\
  \ HoloLens 中获得透明背景。我们还需要调整摄像机设置，让每只眼睛从略微不同的视角观察场景，这样用户在佩戴头显时就能感知深度。这些只是需要更改的设置示例，以使\
  \ Unity 为混合现实开发做好准备。所有这些设置都可以手动更改，但每次创建新的混合现实项目时都这样做会非常繁琐且耗时。\n\n幸运的是，微软提供了一个名为混合现实工具包的社区资源，它将帮助我们自动设置\
  \ Unity，以便创建混合现实应用。我在本书中专门用了一整章来介绍混合现实工具包，因此本章不会涵盖它的所有功能。以下步骤将引导你为混合现实开发准备好场景。\n\
  \n> **注意：** 混合现实工具包会定期更新，自编写这些说明以来，某些元素可能已发生变化。如果你在本教程中找不到我提到的对象，请务必查看混合现实工具包文档以获取更新说明。你可以在以下网址找到混合现实工具包说明：[`https://microsoft.github.io/MixedRealityToolkit-Unity/Documentation/GettingStartedWithTheMRTK.html`](https://microsoft.github.io/MixedRealityToolkit-Unity/Documentation/GettingStartedWithTheMRTK.html)\n\
  \n### 步骤 1：将混合现实工具包导入新 Unity 项目\n\n在继续之前，请确保你已经按照第 1 章中的说明下载并保存了混合现实工具包 Unity 包。\n\
  \n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig1_HTML.jpg](img/441101_2_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** – 导入你在第 1 章中下载的混合现实工具包\n\n1. 创建一个新的 Unity 项目（如果需要复习如何操作，请参见第 2 章），并将其命名为\
  \ `\"Holo World\"`。\n\n    **重要提示：** 保存你的场景，并为其指定一个你喜欢的名称。如果不保存场景，你将无法在步骤 2 中应用\
  \ HoloLens 设置。有关如何保存场景的说明，请参见第 2 章。回顾该章以了解更多信息。\n\n2. 从菜单栏中，依次点击 `Assets` ➤ `Import\
  \ Package` ➤ `Custom Package`。在弹出的窗口中，浏览到你已在第 1 章中下载的混合现实工具包。有关这些菜单项的图示，请参见图 3-1。\n\
  \n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig2_HTML.jpg](img/441101_2_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** – 点击 `Import` 按钮以导入混合现实工具包\n\n3. Unity 将需要一分钟时间来准备你选择的包，然后会弹出另一个窗口，你可以在其中选择或取消选择包中的项目。请保持所有项目处于选中状态（默认情况下所有项目都应被选中），然后点击\
  \ `Import` 按钮，如图 3-2 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig3_HTML.jpg](img/441101_2_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** – 点击 `Apply` 按钮以应用设置（左图）。导入后，你的 Unity 环境将如下所示（右图）\n\n4. 导入后，你将看到 MRTK\
  \ 项目配置器窗口；在该窗口中，点击 `Apply`。参考图 3-3（左图）。点击 `Apply` 后，你最终的 Unity 环境应类似于图 3-3（右图）。\n\
  \n\n\n### 步骤 2：使用混合现实工具包为混合现实开发准备场景\n\n完成步骤 1 后，您应该会在菜单栏中看到一个“Mixed Reality Toolkit”菜单项，如图\
  \ 3-4 所示：\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig5_HTML.jpg](img/441101_2_En_3_Fig5_HTML.jpg)\
  \  \n图 3-5：删除“Main Camera”和“Directional Light”对象后，将 HoloLensCamera 插入场景\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig4_HTML.jpg](img/441101_2_En_3_Fig4_HTML.jpg)\
  \  \n图 3-4：您现在有了一个全新的“Mixed Reality Toolkit”菜单项！\n\n1.  从菜单栏中选择 `Mixed Reality Toolkit`\
  \ ➤ `Add to scene and configure settings`。请务必保存您的场景，因为后续操作会用到。\n2.  从菜单栏中选择 `Mixed\
  \ Reality Toolkit` ➤ `Utilities` ➤ `Configure Unity Project`。这会将 Unity 项目转换为 Windows\
  \ Direct 3D (D3D) 项目，优化质量，并启用虚拟现实支持。Unity 将要求您重新加载项目。*如果您未保存上一步的场景，您将丢失所有场景更改，需要重新应用场景设置。*\n\
  \n**提示** 选择从 `Mixed Reality Toolkit` 菜单应用设置后，会弹出一个窗口显示要应用的设置。点击每个项目以了解更多信息。\n\n\
  3.  从层级面板中，右键点击“Main Camera”和“Directional Light”游戏对象，并从上下文菜单中选择“Delete”以删除它们。\n\
  4.  保存您的场景。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig6_HTML.jpg](img/441101_2_En_3_Fig6_HTML.jpg)\
  \  \n图 3-6：将平台切换到 UWP\n\n- 为了开发针对 HoloLens 2 的应用，我们需要将平台切换到 UWP（通用 Windows 平台）。在\
  \ Unity 菜单中，选择 `File` ➤ `Build Settings` 打开构建设置窗口，然后点击 `UWP`，再点击 `Switch Platform`，如图\
  \ 3-6 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig7_HTML.jpg](img/441101_2_En_3_Fig7_HTML.jpg)\
  \  \n图 3-7：安装 XR 插件管理\n\n- 此外，我们还需要安装 XR 插件管理。当应用加载时，XR 插件管理会自动初始化并启动您的 XR 环境。在\
  \ Unity 菜单中，选择 `Edit` ➤ `Project Settings`，然后在 `Project Settings` 窗口中，点击左侧的 `XR\
  \ Plugin Management`，再点击 `Install XR Plugin Management`，如图 3-7 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig8_HTML.jpg](img/441101_2_En_3_Fig8_HTML.jpg)\
  \  \n图 3-8：勾选“Initialize XR on Startup”复选框\n\n- 确保您处于通用 Windows 平台设置中，并勾选 `Initialize\
  \ XR on Startup` 复选框，如图 3-8 所示。\n\n- 在 `Project Settings` 窗口中，选择 `Player` ➤ `XR\
  \ Settings`，确保勾选了 `Virtual Reality supported`。点击 `+` 图标，然后选择 `Windows Mixed Reality`\
  \ 以添加 Windows 混合现实 SDK。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig9_HTML.jpg](img/441101_2_En_3_Fig9_HTML.jpg)\
  \  \n图 3-9：勾选 `Virtual Reality Supported` 并添加 Windows 混合现实 SDK\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig10_HTML.jpg](img/441101_2_En_3_Fig10_HTML.jpg)\
  \  \n图 3-10：启用 MS HRTF Audio Spatializer\n\n- 在 `MRTK project configurator` 窗口中，使用\
  \ `Audio Spatializer` 下拉菜单选择 `MS HRTF Spatializer`，然后点击 `Apply` 按钮应用设置，如图 3-10 所示。设置\
  \ `Audio Spatializer` 属性是可选的，但可以改善您项目中的音频体验。如果您将其设置为 `MS HRTF Spatializer`，则当 Unity\
  \ 的 `AudioSource.spatialize` 属性启用时，将使用此 Spatializer 插件。\n\n- 在 `Project Settings`\
  \ 窗口中，选择 `Player` ➤ `XR Settings`，然后使用 `Depth Format` 下拉菜单选择 `16-bit depth`。将 `Depth\
  \ Format` 降低到 16 位是可选的，但可能有助于提高项目中的图形性能。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig11_HTML.jpg](img/441101_2_En_3_Fig11_HTML.jpg)\
  \  \n图 3-11：将 `Depth Format` 设置为 16 位\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig12_HTML.jpg](img/441101_2_En_3_Fig12_HTML.jpg)\
  \  \n图 3-12：启用 `DefaultHoloLens2ConfigurationProfile`\n\n- 混合现实工具包尽可能集中管理工具包所需的配置（除了真正的运行时“事物”）。MRTK\
  \ 配置文件是一个嵌套的配置文件树，构成了 MRTK 系统和功能应如何初始化的配置信息。\n\n- 在层级面板中，选择 `MixedRealityToolkit`\
  \ 对象；然后在检查器面板中，确认 `MixedRealityToolkit Configuration Profile` 已设置为 `DefaultHoloLens2ConfigurationProfile`，如图\
  \ 3-12 所示。\n\n恭喜，您的场景现已准备好用于全息图！在将来开始每个新的混合现实项目之前，您都需要重复这些基本准备说明。虽然您可以继续使用已下载的同一个混合现实工具包，但定期检查混合现实工具包的更新始终是个好主意。新功能不断添加，错误也在不断修复。您可以在以下网址探索混合现实工具包：[*https://github.com/Microsoft/Mixed\
  \ Reality Toolkit-Unity*](https://github.com/Microsoft/HoloToolkit-Unity)*.* 请务必浏览此页面，查找错误报告、最新修复、更新等信息。\n\
  \n## 您的第一个全息图\n\n在场景视图中，您仍然会看到地板网格和地平线。如果您将这个“应用”部署到您的 HoloLens 上，您将什么也看不到。在本节中，我们将创建一个简单的立方体对象，它将作为我们的第一个全息图。\n\
  \n**注意**  \n在 Windows 混合现实的上下文中，“全息图”指任何可见的游戏对象。为了与微软的命名约定保持一致，我通常将任何可见的游戏对象或 3D\
  \ 模型称为全息图，但在本书中可能会互换使用这些术语。\n\n### 步骤 1：创建立方体\n\n在第 2 章中，您在 Unity 中创建了一个平面和一个球体。使用相同的方法在您的场景中创建一个立方体游戏对象。除了在第\
  \ 2 章中学到的方法外，您还可以通过在层级面板的空白处右键点击，然后在弹出式上下文菜单中选择“3D Object”➤“Cube”来创建立方体，如图 3-13\
  \ 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig13_HTML.png](img/441101_2_En_3_Fig13_HTML.png)\
  \  \n图 3-13：在层级面板中创建立方体\n\n### 步骤 2：将视图聚焦到您的立方体\n\n如果您还没有切换，请务必切换到场景视图，以便查看场景中的对象。您可以通过点击可视化窗口上方的选项卡来切换视图，如图\
  \ 3-14 所示。在层级面板中选择立方体游戏对象，然后按 `F` 键，将视图聚焦到您的立方体。您的场景应该类似于图 3-14。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig14_HTML.jpg](img/441101_2_En_3_Fig14_HTML.jpg)\
  \  \n图 3-14：将视图聚焦到您的立方体\n\n\n\n### 步骤 3：将方块移离摄像机\n\n接下来，我们要将方块游戏对象移离摄像机。在 Unity\
  \ 中，可以把摄像机看作是你的眼睛，你通过摄像机来查看应用。你会在场景中注意到（见图 3-10），方块和摄像机处于同一位置。这意味着当你启动这个应用时，你将看不到方块，因为你的“眼睛”在方块内部！我们需要将方块移动到我们面前一小段距离。\n\
  \n**提示**  \n在 Unity 中摆放物体时，一个单位大约相当于现实世界中的一米（超过三英尺）。\n\n让我们将方块移动大约两个单位到我们面前，这大约相当于现实世界中的两米：\n\
  \n-   在层次面板中选择 Cube。\n-   在检查器中，将 `Position` 改为 2，如图 3-15 所示。\n\n如图 3-15 所示，方块现在位于摄像机前方两个单位处。\n\
  \n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig15_HTML.jpg](img/441101_2_En_3_Fig15_HTML.jpg)\
  \  \n图 3-15：将方块移动到摄像机前方两个单位处\n\n### 步骤 4：调整方块大小\n\n当前，我们方块的缩放比例为 1x1x1，这意味着它是一个边长大约为一米的立方体。让我们把它缩小，以便能在视野内看到整个方块。\n\
  \n使用第 2 章步骤 7 中的方法，将方块缩放（调整大小）至 0.2x0.2x0.2，如图 3-16 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig16_HTML.jpg](img/441101_2_En_3_Fig16_HTML.jpg)\
  \  \n图 3-16：缩小方块尺寸以便于观察\n\n### 步骤 5：测试你的应用\n\n在开发过程中定期测试你的应用非常重要，以确保它按预期运行。Unity\
  \ 提供了一种非常快捷的应用测试方法。首先，只需点击位于 Unity 编辑器顶部附近的播放按钮，如图 3-17 所示。点击播放后，你应该会看到方块周围是黑色背景。\n\
  \n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig17_HTML.jpg](img/441101_2_En_3_Fig17_HTML.jpg)\
  \  \n图 3-17：点击播放按钮快速测试你的应用\n\n`MRTK` 还支持在场景中“移动”。试试在游戏模式下按下键盘上的左/右/上/下方向键（你可能需要先点击游戏窗口，按键才能生效）。你也可以右键单击鼠标来拖动摄像机的视野。按按键时要小心，因为移动速度可能非常快，你可能会失去方块的视野！如果发生这种情况，只需重新启动你的应用测试即可。\n\
  \n再次点击播放按钮退出游戏模式。这是一种非常快速简便的测试应用的方法。\n\n### 步骤 6：在 HoloLens 上安装你的应用\n\n现在我们已经测试了方块应用，让我们把它安装到\
  \ HoloLens 上，亲身感受第一个全息影像！操作步骤如下：\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig18_HTML.jpg](img/441101_2_En_3_Fig18_HTML.jpg)\
  \  \n图 3-18：使用 Unity 中的构建设置窗口导出你的第一个混合现实应用\n\n1.  确保你已从上一部的游戏模式中退出。不在游戏模式时，播放按钮应为黑色；在游戏模式时则为蓝色。\n\
  2.  在菜单栏中，转到 **文件** ➤ **构建设置**。\n3.  将弹出一个窗口，如图 3-18 所示。\n4.  请务必点击“添加打开场景”按钮，将当前场景添加到待构建的场景列表中。\n\
  5.  如果你在本章开始时正确应用了所有 HoloLens 项目设置，那么其余设置应该无需修改。请检查确认 `Platform` 设置为 `Windows Store`，`SDK`\
  \ 设置为 `Windows 10`，`Target Device` 设置为 `HoloLens`，`UWP Build Type` 设置为 `D3D`，并且“Build\
  \ and Run on”设置为 `Local Machine`。这些设置的样例如图 3-18 所示。\n6.  点击“构建”按钮。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig19_HTML.jpg](img/441101_2_En_3_Fig19_HTML.jpg)\
  \  \n图 3-19：创建一个新文件夹来存放你的应用\n\n-   点击构建按钮后，会弹出另一个窗口。创建一个新文件夹并命名。我通常将文件夹命名为“App”。点击你新建的文件夹，然后点击“选择文件夹”，如图\
  \ 3-19 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig20_HTML.jpg](img/441101_2_En_3_Fig20_HTML.jpg)\
  \  \n图 3-20：在“设置”应用中，转到“更新和安全”菜单项\n\n-   Unity 将花费几分钟时间来构建你的新应用，并将项目文件放入你创建的新文件夹中。Unity\
  \ 构建完成后，会弹出一个窗口，显示你创建的新文件夹。打开此文件夹。\n-   双击 `Holo World.sln` 在 Visual Studio 中打开你的项目。如果你的项目名称不是“Holo\
  \ World”，那么文件名可能不同。\n-   我们将使用 Visual Studio 将应用部署（安装）到 HoloLens。在此之前，我们需要在 HoloLens\
  \ 上启用*开发人员模式*。打开你的 HoloLens，然后打开“设置”应用。选择 **更新和安全** 菜单项，如图 3-20 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig21_HTML.jpg](img/441101_2_En_3_Fig21_HTML.jpg)\
  \  \n图 3-21：导航到“面向开发人员”部分并启用开发人员模式\n\n-   进入“更新和安全”菜单后，导航到“面向开发人员”部分，确保开发人员模式已开启，如图\
  \ 3-21 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig22_HTML.jpg](img/441101_2_En_3_Fig22_HTML.jpg)\
  \  \n图 3-22：将配置设置为“Release”，平台设置为“ARM64”\n\n-   确保你的 HoloLens 与开发 PC 连接到同一个 Wi-Fi\
  \ 网络。\n-   在你的 PC 上，将配置设置为 *Release* 或 *Master*，平台设置为 `ARM64`，如图 3-22 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig23_HTML.jpg](img/441101_2_En_3_Fig23_HTML.jpg)\
  \  \n图 3-23：将目标设备设置为“Remote Machine”\n\n-   将你的 `Target Device` 设置为 `Remote Machine`，如图\
  \ 3-23 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig24_HTML.jpg](img/441101_2_En_3_Fig24_HTML.jpg)\
  \  \n图 3-24：在“设置”应用中查找 HoloLens IP 地址的图示\n\n\n\n*   前往**设置** ➤ **网络和 Internet**\
  \ ➤ **高级选项**。有关在 HoloLens 的设置应用中找到 IP 地址的指导，请参见图 3-24。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig25_HTML.png](img/441101_2_En_3_Fig25_HTML.png)\n\
  \n图 3-25：将 HoloLens IP 地址输入 Visual Studio\n\n*   知道 HoloLens IP 地址后，确保解决方案中已选中通用\
  \ Windows 项目，然后前往 **项目** ➤ **属性** ➤ **调试**，在 Visual Studio 中的 `machine name` 下输入\
  \ IP 地址，并点击**确定**按钮，如图 3-25 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig26_HTML.png](img/441101_2_En_3_Fig26_HTML.png)\n\
  \n图 3-26：前往 **调试** ➤ **开始执行(不调试)** 启动应用部署过程\n\n*   现在，你可以将应用部署到 HoloLens 了。在**调试**菜单中，选择**开始执行(不调试)**，如图\
  \ 3-26 所示。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig28_HTML.jpg](img/441101_2_En_3_Fig28_HTML.jpg)\n\
  \n图 3-28：点击**配对**按钮后，你的 HoloLens 将显示一个 PIN 码，供你输入到 PC 上的 Visual Studio 中。注意：你的 PIN\
  \ 码与本图所示不同。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig27_HTML.jpg](img/441101_2_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27：如果这是你首次从此 PC 部署到 HoloLens，Visual Studio 会提示你输入 PIN 码。\n\n*   如果这是你首次从此\
  \ PC 部署到 HoloLens，系统将提示你将 HoloLens 与 Visual Studio 配对，如图 3-27 所示。要配对 HoloLens，请返回\
  \ HoloLens 设置应用中的**面向开发人员**部分，并点击**配对**按钮，如图 3-21 所示。你将看到 HoloLens 上显示一串数字（参见图 3-28\
  \ 的示意），然后你可以将这些数字输入到 Visual Studio 的弹出窗口中。\n\n![../images/441101_2_En_3_Chapter/441101_2_En_3_Fig29_HTML.jpg](img/441101_2_En_3_Fig29_HTML.jpg)\n\
  \n图 3-29：Visual Studio 在成功部署到 HoloLens 时显示的文本示例。\n\n*   在 PC 上的 Visual Studio 中输入\
  \ HoloLens PIN 码后，你可以点击**完成**按钮来关闭 HoloLens 上的 PIN 码弹出窗口。\n\n*   Visual Studio 将开始将你的应用部署到\
  \ HoloLens！你会在 Visual Studio 中看到一些输出文本，指示你的应用已成功部署到 HoloLens，类似于图 3-29。如果你收到任何错误消息并且部署失败，请检查输出以查看错误消息内容。确认你已遵循本教程中的所有步骤。即使你已正确遵循所有步骤，也可能存在其他导致部署失败的原因。例如，如果驱动器磁盘空间不足，或者\
  \ Visual Studio 未正确安装。如果某个神秘的错误阻碍了成功部署，我发现重启电脑和 HoloLens 通常有助于解决问题。其他可能的解决方案包括重建应用文件夹（删除所有内容并从\
  \ Unity 重新构建）或在 Visual Studio 中重新输入 HoloLens 的 IP 地址。\n\n*   现在，你应该正在体验你的第一个混合现实应用。恭喜！你可以随意围绕你的全息图（立方体）走动，并从不同角度观察它。当你尝试触摸它时会发生什么？你的全息图是否位于电脑显示器或墙壁后面？如果是，请在面向开阔区域时重启你的应用。\n\
  \n*   你的应用现已安装在 HoloLens 上——这意味着你会在应用列表中看到它显示为 **Holo World**（如果你按照本教程中的做法将其命名为\
  \ Holo World）。\n\n## 总结\n\n恭喜！你已经创建了第一个全息图，正朝着成为混合现实开发者的道路大步前进。创建并看到你的第一个全息图是一种非常令人满足的体验！让我们回顾一下本章所学的内容：\n\
  \n*   你学习了如何使用混合现实工具包为全息开发准备 Unity。\n\n*   你学习了如何将全息图放置到场景中。\n\n*   你学习了如何通过使用 Visual\
  \ Studio 部署应用，将其安装到 HoloLens 上。\n\n本章中的教程是所有混合现实开发工作流程的基础构建块。\n\n"
- "# 4. 混合现实工具包简介\n\n在本章中，我们将进一步了解混合现实工具包及其对混合现实开发的重要性。我们将学习混合现实工具包中包含的各种组件和示例场景，以及如何利用这个社区资源进行开发。\n\
  \n## 什么是混合现实工具包？\n\n你可能会认为混合现实工具包是一个可选工具包，用于增强你的开发体验。实际上，混合现实工具包是混合现实开发的重要组成部分。混合现实工具包为开发者提供了开始开发混合现实应用所需的所有工具。本章中，我们将混合现实工具包简称为\
  \ `MRTK`。`MRTK` 提供了多平台输入系统、基础组件以及用于空间交互的通用组成部分，以便开发基于混合现实的应用。\n\n`MRTK` 是一个社区资源，由微软及其他受信任的个人/团体监督。它旨在打破障碍，让所有人都能开发混合现实应用并为社区做出贡献。任何人（包括你）都可以向\
  \ `MRTK` 贡献内容（在纳入之前需要先经过审核）。因此，`MRTK` 在不断更新和改进。事实上，从我刚开始撰写本书到你正在阅读本章的这段时间里，它已经有了巨大的改进。在学习了本章中一些有用的\
  \ `MRTK` 功能之后，我建议你探索在线的 `MRTK` 仓库，以了解任何额外的变化。在本章末尾，我将引导你浏览在线的 `MRTK` 仓库。\n\n###\
  \ 三个 MRTK 仓库\n\n实际上，线上有三个 `MRTK` 仓库。第一个叫做 `MixedRealityToolkit`，第二个叫做 `MixedRealityToolkit-Unity`，第三个叫做\
  \ `MixedRealityToolkit-Unreal`。你可以通过以下链接查看它们：\n\n*   `MixedRealityToolkit`：[`github.com/microsoft/MixedRealityToolkit`](https://github.com/microsoft/MixedRealityToolkit)\n\
  \n*   `MixedRealityToolkit-Unity`：[`github.com/microsoft/MixedRealityToolkit-Unity`](https://github.com/microsoft/MixedRealityToolkit-Unity)\n\
  \n*   `MixedRealityToolkit-Unreal`：[`github.com/microsoft/MixedRealityToolkit-Unreal`](https://github.com/microsoft/MixedRealityToolkit-Unreal)\n\
  \n`MixedRealityToolkit-Unity` 仓库拥有 Unity 特定的组件，这也是我们本书关注的重点。“常规”的 `MixedRealityToolkit`\
  \ 是一个通用版本，包含核心的 C++ 代码和 HTML 代码库，许多 Unity 工具包功能都构建于此基础之上，或者仅仅是其包装器。`MixedRealityToolkit-Unreal`\
  \ 提供了一系列功能和选项，以增强使用 Unreal 的开发流程。我们将在本章末尾详细介绍 GitHub。\n\n## 混合现实工具包设置\n\n在本节中，我将带你完成下载和安装\
  \ `MRTK` 的步骤。有两种方法可以将混合现实工具包导入到你的 Unity 项目中：\n\n*   通过导入混合现实工具包资源文件\n\n*   通过 Unity\
  \ 包管理器\n\n\n\n### 1. 导入 MRTK 资源文件\n\n要下载 MRTK Unity 包，请访问以下 URL：\n\n[`https://github.com/microsoft/MixedRealityToolkit-Unity/releases`](https://github.com/microsoft/MixedRealityToolkit-Unity/releases)\n\
  \n请确保下载 MRTK 的最新版本，通常位于页面顶部附近。确保你下载的 MRTK 版本与你下载的 Unity 版本兼容。向下滚动到页面的 **Assets**\
  \ 部分。要下载 MRTK Unity 包，请点击扩展名为 `.unitypackage` 的下载链接。例如，在图 4-1 中，合适的下载链接（用红圈标出）名为\
  \ `Microsoft.MixedReality.Toolkit.Unity.Foundation.2.5.3.unitypackage`。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig1_HTML.jpg](img/441101_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 – 浏览到 MRTK 下载页面并下载 MRTK Unity 包，用红圈标出。\n\n将 MRTK 保存到你的电脑上。使用适当的名称启动一个新项目；请参考前一章了解一些注意事项。在你的\
  \ Unity 项目的菜单栏中，转到 **Assets ➤ Import Package ➤ Custom Package**。在弹出的窗口中，浏览到你刚刚下载的\
  \ MRTK。有关这些菜单项的图示，请参见图 4-2。\n\nUnity 将花一点时间准备你选择的包，然后显示另一个弹出窗口，你可以在其中选择或取消选择包项。保持所有选项勾选（默认情况下应全部勾选），然后点击\
  \ **Import** 按钮，如图 4-3 所示。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig2_HTML.jpg](img/441101_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 – 导入你在第 1 章中下载的 MRTK 包。\n\n完成这些步骤后，MRTK 现在将安装到你的项目中。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig3_HTML.png](img/441101_2_En_4_Fig3_HTML.png)\n\
  \n图 4-3 – 点击 **Import** 按钮导入 MRTK 包。\n\n### 2. Unity 包管理器\n\n安装 Mixed Reality Toolkit\
  \ 的另一种方法是通过 Unity 包管理器。Unity 包管理器使用一个清单文件（`manifest.json`）来控制要安装哪些包以及从哪些服务器安装它们。对于每个使用\
  \ MRTK 的 Unity 项目，请确保 `manifest.json` 文件中添加了一个 Mixed Reality 作用域注册表。要添加 Mixed Reality\
  \ 作用域注册表，请遵循以下说明。\n\n首先，使用适当的名称创建一个新的 Unity 项目。打开你的项目文件夹，导航到 `Packages` 文件夹。在 `Packages`\
  \ 文件夹中，使用任意文本编辑器（如 Visual Studio 2019）打开 `manifest` 文件。在清单文件的开头，添加代码清单 4-1 中给出的代码，以将\
  \ Mixed Reality Server 包含到作用域注册表中（在包含包之前拥有服务器至关重要）。有关这些项的图示，请参见图 4-4。\n\n```\n{\n\
  \"scopedRegistries\": [\n{\n\"name\": \"Microsoft Mixed Reality\",\n\"url\": \"\
  https://pkgs.dev.azure.com/aipmr/MixedReality-Unity-Packages/_packaging/Unity-packages/npm/registry/\"\
  ,\n\"scopes\": [\n\"com.microsoft.mixedreality\",\n\"com.microsoft.spatialaudio\"\
  \n]\n}\n],\n代码清单 4-1 – 将 Mixed Reality Server 添加到作用域注册表的代码。\n```\n\n添加以下代码后，你的文件看起来应该类似于图\
  \ 4-4。将 Mixed Reality Server 添加到作用域注册表是一个关键步骤，因为只有在包含 Mixed Reality Server 之后，才能添加所需的包。\n\
  \n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig4_HTML.jpg](img/441101_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4 – 打开 `manifest` 文件并在文件开头添加给出的代码。\n\n一旦将 Mixed Reality Server 添加到文件中，你就可以开始添加所需的包。要将\
  \ MRTK 包添加到你的项目中，你需要修改 `manifest` 文件的依赖项部分。代码清单 4-2 中的代码允许你将基础、示例和工具包添加到你的 Unity\
  \ 项目中。标准资源包将作为基础的依赖项自动添加。图 4-5 展示了代码的图示。\n\n```\n\"dependencies\": {\n\"com.microsoft.mixedreality.toolkit.foundation\"\
  : \"2.5.3\",\n\"com.microsoft.mixedreality.toolkit.tools\": \"2.5.3\",\n\"com.microsoft.mixedreality.toolkit.examples\"\
  : \"2.5.3\",\n代码清单 4-2 – 将所需包添加到 Unity 项目的代码。\n```\n\n**注意：** 添加代码后，不要忘记保存你的 `manifest`\
  \ 文件。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig5_HTML.jpg](img/441101_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5 – 代码的图示。\n\n当你返回项目时，会看到一个 MRTK 配置器窗口弹出；你可以点击 **Apply** 将设置保存到项目。现在，你已经成功将包添加到\
  \ Unity 项目中；你可以通过 Unity 包管理器用户界面来管理它们。要打开 Unity 包管理器，请点击 Unity 项目菜单栏上的 `Windows`\
  \ 选项，然后选择 `Package Manager`。会弹出一个窗口，如图 4-6 所示。\n\n**注意：** 当有更新版本的 MRTK 包可用时，你也可以观察到\
  \ `Up to date`（最新）按钮变为活动状态。如果有可用的更新版本，请随意点击 `Up to date` 按钮来使用新版本。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig6_HTML.jpg](img/441101_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6 – Unity 包管理器显示通过 `manifest.json` 文件安装的包。\n\n在你保存了包含必要依赖项的清单文件后，MRTK 现在将安装到你的项目中。请随意遵循前面提到的两种方法中的任何一种来安装\
  \ MRTK。\n\n**注意：** 每次启动新的 Unity 项目时，你都需要导入 MRTK。\n\n\n\n## 混合现实工具包组件\n\n本章现在进入激动人心的部分，我将向您介绍\
  \ `MRTK` 的各个组件。`MRTK` 包含多个功能领域。表 4-1 列出了每个功能领域并提供了简要描述。\n\n表 4-1\n\n展示 `MRTK` 中可用的组件列表\n\
  \n| 功能领域 | 描述 |\n| --- | --- |\n| 输入系统 | 允许开发者通过多种输入源（例如六自由度控制器和语音）通过输入事件提供输入 |\n\
  | 手部追踪 | `MRTK` 中的手部追踪组件提供了一种全新的临场感，并增强了社交互动。该功能帮助用户获得与周围环境更自然交互的机会 |\n| 眼动追踪 |\
  \ 眼动追踪是 `HoloLens` 提供的另一突出功能；它使用户能够毫不费力地与人机界面中的全息影像进行交互。下一章将详细讨论 |\n| 解算器 | 允许开发者基于预构建算法计算对象的位置和方向\
  \ |\n| 多场景管理器 | 场景系统允许应用程序加载多个场景，为用户建立舒适体验 |\n| 空间感知 | 允许您的应用程序理解物理环境。例如，它可以区分椅子、桌子和其他常见结构\
  \ |\n| 诊断工具 | 在应用程序内部运行以检查应用程序问题的工具 |\n| 编辑器内模拟 | 允许用户通过 Unity 编辑器测试其应用程序功能，而无需将其部署到设备上\
  \ |\n| 边界系统 | 边界系统允许在混合现实应用中呈现虚拟现实边界 |\n| 用户体验控件 | 一组有用的实用工具，例如按钮、解算器、边界控制、滑块、用于配置\
  \ Unity 的指针等 |\n| 相机系统 | 相机系统允许 `MRTK` 自定义应用程序的相机，以包含在混合现实应用中 |\n| 配置文件 | 允许开发者使用基础包中提供的各种配置文件来配置\
  \ `MRTK` |\n| MRTK 标准着色器 | 着色系统利用一个灵活着色器，成功提供与 Unity 标准着色器相似的视觉效果 |\n| 语音与听写 | 允许用户通过关键词提供输入，这些关键词可以触发相应的事件。听写为用户提供了录制音频片段并获取书面文本的机会\
  \ |\n| 实验性功能 | 包含正在开发的功能以及具有较高初始价值的功能 |\n\n在接下来的小节中，我将讨论这十个功能类别中的重点内容。我们将在后续章节中更详细地介绍其中一些功能。有些功能甚至有专门的一章来介绍！\n\
  \n### MRTK：输入系统\n\n`MRTK` 的输入系统允许您通过输入事件从不同的输入源（如手势、六自由度控制器、手部和语音）获取输入。它甚至允许您包含菜单等理论操作，并将它们与不同的输入源关联起来。您可以为控制器设置指针，通过指针事件驱动场景中的对象。\n\
  \n输入数据提供程序将用户输入整合在一起。每个数据提供程序基于接收到的输入而不同，例如 Unity 触摸、Unity 摇杆、Windows 语音、Windows\
  \ 混合现实（`WMR`）等。这些提供程序通过“已注册的服务提供程序配置文件”包含在您的项目中，当输入源可用时，该配置文件会自动产生输入事件。\n\n有大量的示例场景，您可以在其中测试输入功能集中包含的各种功能。示例场景是探索\
  \ `MRTK` 功能并为自己的项目获取灵感的好方法！我经常将示例场景作为自己项目的模板。`MRTK` 的所有功能都有数十个示例场景。下面我们来看看如何探索其中一个示例场景。\n\
  \n提示\n\n示例场景是查看 `MRTK` 项目实际效果并学习如何实现它们的绝佳方式。您还可以将示例场景用作下一个项目的模板！\n\n#### 如何运行测试场景\n\
  \n示例场景通常位于名为“Scenes”的项目文件夹中。在输入功能区域内，您可以通过转到 `Assets` ➤ `MRTK` ➤ `Examples` ➤ `Demos`\
  \ 来找到场景文件夹，如图 4-7 所示。每个功能组的文件夹组织可能略有不同。`MRTK` 中的文件夹组织会随时间演变，因此如果您在您的 `MRTK` 版本中找不到测试场景，请务必探索项目文件夹或查看最新的\
  \ `MRTK` 文档。\n\n注意\n\n请确保导入 Unity 示例包，以便使用 `MRTK` 中提供的示例场景。请参考前一章，了解如何导入 Unity 包。\n\
  \n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig7_HTML.jpg](img/441101_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n导航到 `Demos` 文件夹，尝试与不同 `MRTK` 功能相关的各种示例场景\n\n项目面板中的资源名称可能被缩短（将显示部分名称，后跟“...”）。如果您希望查看完整名称，可以像图\
  \ 4-7 右下角所示，通过调整滑块来调整图标视图。\n\n在 Unity 编辑器中，导航到 `Assets` ➤ `MRTK` ➤ `Examples` ➤\
  \ `Demos` ➤ `Input` ➤ `Scenes`，选择您想尝试的场景（在本例中为 `InputActionExample` 场景），然后将其从项目面板拖到层级面板中的空白区域，如图\
  \ 4-8 所示。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig8_HTML.jpg](img/441101_2_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n要探索示例场景，请将其拖入层级面板中\n\n为避免冲突，请右键单击其他场景并从上下文菜单中选择“卸载场景”来禁用任何其他打开的场景。卸载场景将暂时禁用它，从而可以快速轻松地切换场景。如果您不再希望处理某个场景，也可以选择“移除场景”。如果您并非有意从\
  \ Unity 项目中移除该场景，仍可从项目面板中重新导入。\n\n现在您已加载示例场景，请通过点击播放按钮随意尝试。您也可以将其部署到 `HoloLens 2`，或使用全息仿真将其流式传输到您的设备。这是探索所用代码并了解测试项目工作原理的绝佳机会！`MRTK`\
  \ 中包含许多示例场景。我建议您尽可能多地尝试它们！\n\n\n\n### MRTK：手部追踪\n\nMRTK 提供的手部追踪功能旨在为用户带来更沉浸的体验，让用户能够运用双手与场景中的组件进行交互。MRTK\
  \ 的手部追踪特性可根据用户需求进行定制，只需在 `InputSystemProfile` 下的 `HandTrackingProfile` 中更改几项设置即可。你需要克隆\
  \ `InputSystemProfile` 和 `HandTrackingProfile` 才能访问部分设置。更多信息请参考图 4-9。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig9_HTML.jpg](img/441101_2_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n`HandTrackingProfile` 及其选项\n\n`Joint Prefab`、`Palm Prefab`、`Fingertip\
  \ Prefab` 和 `Hand Mesh Prefab` 有助于在屏幕交互过程中对手部进行可视化。你可以根据需要更改预制件，但建议保留默认设置，以防止未来出现错误。手部追踪可以通过\
  \ Leap Motion（由 Ultraleap 提供）实现。这种方法有助于在编辑器中快速构建应用程序原型。`Leap Motion Data Providers`\
  \ 授权了用于 VR 的铰接式手部追踪。可以将数据提供程序配置为使用连接到头显的 Leap 控制器，或将其面朝上放置在桌面上。\n\n### MRTK：解算器系统\n\
  \n解算器系统可帮助你为对象添加定位功能。它基于预置的算法帮你计算对象的位置和朝向。这是一系列脚本和动作的集合，使对象能够跟随你或屏幕上的其他对象。你也可以将对象附着在不同的位置，使你的应用程序更加自然。例如，你可以观察到\
  \ HoloLens 菜单跟随你的视线转动。这样做将使用户使用应用程序更加方便。\n\n解算器系统包含三种类型的脚本，如下所示：\n\n- `Solver`：这是一个基础的抽象类，负责管理状态跟踪、更新顺序、平滑参数及其实现，以及自动解算器系统集成。所有其他解算器都派生自此类。\n\
  - `SolverHandler`：`SolverHandler` 类处理附加到特定游戏对象上的所有解算器组件。此类还有助于按正确顺序更新和执行它们。\n\n\
  第三种类型包含解算器本身。以下解算器构成了各种行为的基础模块：\n\n- `RadialView`：`RadialView` 是一个伴随组件，负责将游戏对象的一部分保持在用户视野的截断区域（安全区）内。用户可以调整对象在视野中可见的部分。\n\
  - `Orbital`：`Orbital` 类也是一个伴随组件，其行为类似于原子中的电子。此类允许用户使附加的游戏对象围绕被追踪的变换（transform）进行轨道运动。开发者可以根据需要修改固定偏移量。开发者可以利用此功能制作菜单或其他场景组件，使其保持在视线高度或腰部高度。\n\
  - `InBetween`：`InBetween` 类将附加的游戏对象保持在两个被追踪的变换（transform）之间。该游戏对象拥有自己的 `SolverHandler`\
  \ 属性，用于定义两个变换的端点。\n- `SurfaceMagnetism`：`SurfaceMagnetism` 向表面发射射线，并使对象对齐以相应地撞击表面。用户在使用\
  \ `SurfaceMagnetism` 时必须注意添加到游戏对象上的碰撞体。\n- `DirectionalIndicator`：顾名思义，`DirectionalIndicator`\
  \ 帮助用户指向空间中的期望位置。这对用户非常有益，因为它有助于方便地导航对象。\n- `HandConstraint`：`HandConstraint` 提供了一个保持在安全区域的解算器。安全区域是指不与手部重叠的区域。存在不同的派生类，负责在安全区域内执行不同的解算器。\n\
  \n让我们尝试一下 Unity 示例包中包含的一个示例场景。首先，创建一个新的 Unity 项目并为其指定一个合适的名称。将 foundation 和 examples\
  \ Unity 包导入到你的项目中；有关导入 Unity 包的步骤，请参考前一章。导航至 `Assets ➤ MRTK ➤ Examples ➤ Demos ➤\
  \ Solvers ➤ Scenes`，如图 4-10 所示。将 `SolverExamples` 示例场景拖放到你的层级（Hierarchy）窗口中即可查看该场景。你可以卸载或移除层级窗口中存在的任何其他场景，以避免冲突。\n\
  \n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig10_HTML.jpg](img/441101_2_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n要探索 `SolverExamples` 示例场景，请将其拖入你的层级（Hierarchy）窗口\n\n加载示例场景后，你可以通过点击播放按钮来探索可用选项。此示例场景让你对不同解算器的工作方式有一个初步了解。你可以参考蓝色平面上显示的主菜单，以清晰了解示例场景的运行方式。\n\
  \n### MRTK：多场景管理器\n\n如果你想在不干扰 MixedRealityToolkit 实例的情况下运行多个场景，该怎么做？MRTK 为你提供了一种无需复杂操作的方案。它可以帮助你加载各种场景以增强体验。你可以通过\
  \ `SceneSystem` 提供的各种属性来监控场景的加载和卸载状态。`SceneOperationInProgress` 初始时会被设置为 0；一旦场景完全加载，`SceneOperationInProgress`\
  \ 将被设置为 1。这些属性仅受内容场景操作的影响。\n\n你可以通过在代码中包含 `using Unity.SceneManagement` 命名空间来在场景之间切换。包含命名空间后，使用\
  \ `SceneManager.LoadScene`，并添加场景索引值。场景索引值通常从第一个场景的 0 开始；你可以像图 4-11 所示那样，在“构建设置”（Build\
  \ Settings）窗口中，通过按你想要的顺序将场景拖放到“场景列表”（Scenes In Build）区域来验证场景索引值，具体如图 4-11 所示。\n\n\
  ![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig11_HTML.jpg](img/441101_2_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n在“构建设置”中验证场景索引值\n\n主要有三种场景：\n\n- **内容场景：** 内容场景是你经常处理的普通场景。可以加载和卸载任何内容及对象。\n\
  - **管理器场景：** 管理器场景是默认创建的场景。它可以包含在其下不应被销毁的对象，并作为 `DontDestroyOnLoad` 的替代方案。\n- **光照场景：**\
  \ 在多个场景之间调整和维护光照设置是一项繁琐且重复的任务。通过使用存储光照信息和光照对象的光照场景，可以克服这些缺点。光照场景确保无论加载或卸载哪个场景，跨多个场景的光照效果是一致的。\n\
  \n\n\n### MRTK：空间感知\n\nMRTK 的空间映射模块为您提供了在项目中集成空间映射能力所需的资源。空间映射利用混合现实头显上的传感器，创建物理环境的虚拟地图。MRTK\
  \ 提供的资源可用于利用此地图或网格来隐藏或遮挡网格后的对象、与网格进行交互以及进行可视化。我们将在第 6 章深入探讨空间映射。\n\n空间理解是 MRTK 附带的一项卓越能力，它使我们的混合现实体验能够理解空间环境。基于空间映射获取的精确测量数据，该模块会解读空间网格，并判断网格的哪些部分是墙壁、桌子、椅子等！混合现实应用可以通过多种方式使用此功能。例如，在游戏过程中，您可以让一个全息角色或虚拟化身坐在您房间的椅子上。要实现这一点，您需要空间理解模块来找出房间中可作为坐具表面的部分，如图\
  \ 4-12 所示。我们将在第 6 章介绍空间理解。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig12_HTML.jpg](img/441101_2_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n使用空间理解模块查找椅子坐具表面的示例\n\n### MRTK：诊断工具\n\nMRTK 提供了通过在应用程序中运行的诊断工具来分析应用程序的机会。强烈建议在开发初期启用诊断系统，并在部署过程中将其禁用。诊断工具对于监控系统性能非常有用；它们为您提供有关系统硬盘、RAM、CPU\
  \ 温度等信息。这些工具有助于您识别影响系统性能的一些问题。\n\n### MRTK：边界系统\n\n边界在沉浸式应用中扮演着重要角色，因为它定义了您可以安全移动的区域。在使用头显时，它还有助于您避开场景中隐藏的障碍物。MRTK\
  \ 中的边界系统为混合现实应用提供了边界可视化功能。通常，在虚拟现实平台中，会有一条白色线条叠加在虚拟世界上，以警告您边界所在。MRTK 的边界系统通过显示已追踪区域的轮廓和其他功能，将此便捷功能扩展到混合现实应用中，为您提供有关周围环境的额外数据。\n\
  \n### MRTK：UX 控件\n\nMRTK 的实用工具模块提供了多个可用于混合现实应用的有用工具。我建议您探索 MRTK 中的这个模块，并阅读在线文档以获取最新的工具列表，因为新工具会定期添加到该模块中。下文列出了并描述了\
  \ MRTK 中包含的一些最常用且最有用的工具。这远非一份详尽的清单，但可以让您初步了解此模块中包含的工具类型。\n\n*   **按钮：** 按钮作为一种用户界面，用于收集您的输入并执行即时操作。它是\
  \ MRTK 中最基础的组件。MRTK 提供了一系列按钮预制件，可供您在应用程序中使用。\n\n    以下为您列出了其中一些：\n    *   `PressableButtonUnityUI.prefab`\n\
  \    *   `PressableButtonUnityUICircular.prefab`\n    *   `PressableButtonHoloLens2UnityUI.prefab`\n\
  \    *   `UnityUIInteractableButton.prefab`\n\n*   **手部菜单：** 每次您抬起手时都能弹出一个菜单，这该有多酷？MRTK\
  \ 允许您将常用的 UI 菜单附着到您的手上。当您尝试使用应用程序中的其他选项时，可能会产生很多混淆，但手部菜单会一直弹出。有 “Require Flat Hand”\
  \ 和 “Use Gaze Activation” 等支持选项来避免误触。\n\n*   **滑动条：** 滑动条是 MRTK 中的 UI 组件，允许您连续地更改数值。滑动条在\
  \ AR 和 VR 中均可工作。目前，通过直接抓取或在一定距离外抓取滑动条来更改数值。您可以添加自己设定长度和尺寸的滑动条。\n\n*   **工具提示：**\
  \ 如果场景中的对象附带一些信息，它们会更有意义。要为背景中的任何对象添加额外的细节，您可以加入工具提示。工具提示可用于解释物理环境中的对象。\n\n*   **面板：**\
  \ `Slate` 预制件是在屏幕上显示 2D 内容的绝佳替代方案；它提供了一种薄窗样式的控件来显示文本或文章等 2D 内容。额外的功能，如 “Follow Me”（跟随我）和\
  \ “Close”（关闭），可帮助您轻松操作该预制件。\n\n### MRTK：相机系统\n\nMicrosoft 混合现实工具包中的相机系统允许您自定义和优化相机，以便在您的混合现实应用程序中使用。相机系统支持透明（AR）和不透明（VR）应用程序，而无需为每种应用编写不同的脚本。可以使用\
  \ `Near Clip`（近裁剪面）、`Far Clip`（远裁剪面）、`Clear Flags`（清除标志）、`Background Color`（背景颜色）、`Quality\
  \ Setting`（质量设置）等参数来配置相机系统。\n\n可以通过在层级窗口中找到的 `MixedRealityToolkit` 对象来访问相机系统。导航到检查器面板下的\
  \ “Camera”（相机）选项卡，确保已勾选 “Enable Camera System”（启用相机系统）复选框，如图 4-13 所示。您还可以自定义相机系统类型和使用的配置文件。\n\
  \n要提供特定于平台的相机配置，您可以在 “Camera Settings Providers”（相机设置提供程序）处进行配置。您可以在此部分添加和删除相机设置提供程序。并非所有应用程序都需要相机设置提供程序。如果没有与平台兼容的提供程序，则\
  \ MRTK 将应用默认设置。\n\n显示设置允许用户在运行时配置相机。它们还提供在不透明和透明背景之间切换的选项。场景中图形的质量可以使用图 4-13 中 “Display\
  \ Settings”（显示设置）下的 “Quality Setting”（质量设置）选项进行调整。\n\n> **注意**  \n> 您可能需要克隆一些配置文件才能配置上述设置。下一节将简要介绍如何克隆\
  \ MRTK 配置文件。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig13_HTML.jpg](img/441101_2_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\nMRTK 提供的相机系统设置\n\n\n\n### MRTK：配置文件\n\n`MRTK` 中的 `Profiles`（配置文件）允许你根据项目需求配置\
  \ `MRTK` 设置。层级窗口中的主 `MixedRealityToolkit` 对象会附加一个处于激活状态的配置文件，该配置文件是可脚本化的。顶层配置文件包含与每个核心系统相关联的子配置文件。这些子配置文件也是可脚本化对象，并且可能包含对其他配置文件的引用。一个完整的配置文件关联树规定了如何初始化及配置\
  \ `MRTK` 的子系统与功能。\n\n我们知道，某些数据提供者会处理跨多个平台的特定框架。通过这种方式，我们可以设计出与机器无关或平台无关的应用程序，从而提升应用的灵活性。配置文件有助于你以前述方式构建应用。`MRTK`\
  \ 提供了默认配置文件集，这些配置文件覆盖了 `MRTK` 所能支持的大多数平台和场景。例如，当你选择 `DefaultMixedRealityToolkitConfigurationProfile`\
  \ 时，可以在支持 VR 的平台和 `HoloLens`（一代或二代）上尝试各种场景。此配置文件适用于一般用途，并未针对特定用例进行优化。如果你希望专注于某个特定平台的特定实例，可以选择支持相应设置的配置文件。\n\
  \n例如，`DefaultHoloLens2ConfigurationProfile` 是另一个默认配置文件，它针对在 `HoloLens 2` 上进行部署和测试进行了优化。默认配置文件与\
  \ `HoloLens 2` 配置文件之间存在差异，旨在提供特定于该平台的更优设置和选项。要自定义不同配置文件提供的某些选项，你需要创建它们的副本。请按照以下说明创建\
  \ `MRTK` 配置文件的副本：\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig14_HTML.jpg](img/441101_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\n复制并自定义所选配置文件\n\n1.  点击层级窗口中的 `MixedRealityToolkit` 对象。\n2.  导航到检视面板，从下拉菜单中选择你需要的配置文件，如图\
  \ 4-14 所示。此处我选择了 `DefaultHoloLens2ConfigurationProfile`。\n3.  点击 `Copy & Customize`（复制并自定义）按钮。\n\
  \n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig15_HTML.jpg](img/441101_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15\n\n点击 `Clone`（克隆）按钮创建配置文件的副本\n\n1.  点击 `Copy & Customize` 按钮后，会弹出一个克隆配置文件（Clone\
  \ Profile）窗口。为新建的克隆配置文件指定一个合适的名称，然后点击图 4-15 中显示的 `Clone` 按钮。\n\n完成这些步骤后，你可能会发现克隆配置文件后某些选项变为可用状态。请参考图\
  \ 4-16 查看克隆后你的 Unity 环境。为进一步自定义某些功能，你还需要克隆子配置文件。点击这些子配置文件旁边的 `Clone` 按钮，即可调出克隆配置文件（Clone\
  \ Profile）窗口。\n\n![../images/441101_2_En_4_Chapter/441101_2_En_4_Fig16_HTML.jpg](img/441101_2_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n\n克隆后你可能会发现某些选项被激活\n\n### MRTK：标准着色器\n\n`MRTK Standard Shader`（MRTK 标准着色器）是一个单一的可工作着色器，能够生成与\
  \ Unity 的 `Standard Shader` 相似的视觉效果。它允许你根据材质属性自动生成特殊着色器。在性能方面，`MRTK Standard Shader`\
  \ 优于 Unity 的 `Standard Shader`。与 Unity 的 `Standard Shader` 相比，`MRTK Standard Shader`\
  \ 在产生类似效果时所需计算量更少。\n\n## MRTK 在线资源\n\n如前所述，`MRTK` 正由使用它的开发者社区持续更新和改进。在本节中，我们将了解在线的\
  \ `MRTK` 仓库，以便你能及时了解最新的更新、问题和改进。\n\n### 什么是 GitHub？\n\n如果你不熟悉 `GitHub`，它是开发者中常用的用于存储和共享软件项目文件的网站。它允许对项目文件的变更进行仔细的监控、批准或拒绝，这使其成为众多开发者同时使用和修改项目时的理想平台。\n\
  \n### MRTK 帮助与文档\n\n截至撰写本文时，寻找 `MRTK` 组件的所有文档确实颇具挑战性且略显分散。我在此提供了一些链接，以帮助你快速访问 `MRTK`\
  \ 的文档：\n\n-   [*https://github.com/microsoft/MixedRealityToolkit-Unity/blob/mrtk_development/README.md*](https://github.com/microsoft/MixedRealityToolkit-Unity/blob/mrtk_development/README.md)\
  \ – `MixedRealityToolkit-Unity` 的自述文件（readme）部分包含了 `MRTK` 中每个功能/模块的详细文档。\n-   [*https://github.com/Microsoft/MixedRealityToolkit-Unity/wiki*](https://github.com/Microsoft/MixedRealityToolkit-Unity/wiki)\
  \ – `MixedRealityToolkit-Unity` 的 Wiki 包含些功能的额外上下文和背景信息。我建议你在阅读自述部分的详细文档之前，先阅读此处的内容。`MRTK`\
  \ Wiki 的主页包含一些链接，Wiki 网页右侧的“Pages”（页面）栏中也有一些额外链接。\n-   [*https://github.com/microsoft/MixedRealityToolkit-Unity/issues*](https://github.com/microsoft/MixedRealityToolkit-Unity/issues)\
  \ – `MRTK` 的问题（issues）部分对于了解你在使用 `MRTK` 时可能遇到的任何未解决问题非常重要。如果你发现了任何新问题，也可以在此区域进行报告。\n\
  \n## 总结\n\n在本章中，我们熟悉了七个 `MRTK` 功能或模块。我们了解了什么是 `MRTK` 以及它在开发混合现实体验时的重要性。我们学习了如何下载和安装\
  \ `MRTK`，如何试用 `MRTK` 附带的测试场景，以及如何浏览在线仓库。\n\n`MRTK` 是一个活跃的社区资源，它不断变化和演进。新功能几乎每天都在添加，旧功能则会被弃用（删除或废弃）。因此，我建议你去探索\
  \ `MRTK`，发现可能添加的任何令人惊叹的新功能。并且，随着你在混合现实之旅中的不断前进，你很可能会为 `MRTK` 贡献出令人振奋的新内容，让其他用户也能从中受益！\n\
  \n"
- "# 5. 与全息影像交互\n\n在本章中，我们将学习混合现实开发中使用的输入机制。用户可以通过多种方式与应用程序中的全息影像及其他元素进行交互。这些方式包括手势、语音命令、注视和控制器。我们将逐一介绍每种输入方法，并学习如何使用\
  \ `MRTK` 中的输入资源。\n\n\n## 输入方式\n\n每种用于 Windows 混合现实的输入方式都有其优势和局限性。以下列表提供了各输入类别的说明：\n\
  \n- **视觉注视：** 在 Windows 混合现实中，视觉注视是用户聚焦全息图和物体的主要方式。视觉注视对混合现实的重要性，就如同鼠标对个人电脑一样。你用鼠标指向电脑屏幕上的对象。同样地，你用视觉注视（你看的方向）来指向三维空间中的对象。在电脑屏幕上，鼠标的位置由光标或箭头表示。视觉注视光标通常表现为一个小点或甜甜圈形状的物体。目前，视觉注视由头部运动控制，而非眼睛的实际注视。在混合现实中有多种使用视觉注视的方式，例如指向物体、指向远处位置（用于瞬移），以及让物体跟随你的视线。\n\
  \n    **注意：** 某些混合现实头戴设备可能没有支持手势的传感器，而是依赖运动控制器作为其主要输入方式。\n\n- **语音：** 语音输入是指使用语音命令来与混合现实体验进行交互。语音命令在开发混合现实应用时极其有用，因为它无需杂乱的用户界面即可实现高度控制和自定义。用户可以说出单个词或一系列词来选择物体、激活功能以及增强体验。语音还可用于听写单词和句子（语音转文本），以实现快速文本输入，而无需使用键盘。当设备连接到互联网时，语音识别会更准确。这是因为你的语音数据将被发送到微软基于云的语音识别技术。当在线语音识别设置关闭时，语音服务将仅限于使用基于设备的识别功能，如\
  \ Windows 语音识别应用。语音识别仍然有效，但微软不会收集任何语音数据。\n\n- **其他硬件：** 除了已列出的主要输入方式外，还有多种硬件选项可与\
  \ Windows 混合现实头戴设备配合使用。这些设备包括蓝牙键盘和鼠标、蓝牙游戏手柄、点击器及其他蓝牙配件。\n\n在本章的后续部分，我将带你了解如何在混合现实应用中使用每种输入方式。\n\
  \n## 视觉注视教程\n\n在本节中，我将带你了解与视觉注视输入方式相关的一些关键元素。我将展示如何使用光标来表示你的视觉注视，并概述视觉注视在代码中如何实现。视觉注视有两种形式：头部注视和眼部注视。头部注视基于相机/头部的朝向。当系统不支持眼部注视或眼部注视未启用时，会使用头部注视。它通常与\
  \ HoloLens 1 的交互方式相关联。眼部注视则基于用户看的方向。眼部注视仅在支持眼球追踪的系统中启用。以下是一个简单的示例场景，有助于你更好地理解眼部注视。\n\
  \n## 第 1 步：设置 Unity 场景\n\n在本教程中，我们将使用混合现实工具包中的一个测试场景。如果你还没有完成，请务必按照第 4 章所述将 Unity\
  \ 设置为用于混合现实开发。你也可以参考第 4 章，复习如何在 Unity 中运行 MRTK 测试场景。\n\n导航到 `Assets ➤ MRTK ➤ Examples\
  \ ➤ Demos ➤ Eye Tracking ➤ Scenes`。将 `EyeTrackingDemo-00-RootScene` 拖入你的层级视图中，如图\
  \ 5-1 所示。确保移除你可能打开的其他所有场景。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig1_HTML.jpg](img/441101_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** 从 MRTK 中打开 `EyeTrackingDemo-00-RootScene`\n\n`EyeTrackingDemo-00-RootScene`\
  \ 是基础场景，在尝试眼部注视的不同功能之前需要先加载该场景。该场景包含一个图形菜单，其中包含不同的眼部注视示例，你可以自由切换并体验！目前，我们先关注目标选择示例，看看它是如何工作的。\n\
  \n## 第 2 步：将场景添加到构建菜单\n\n要尝试此功能，你需要将其余场景添加到构建菜单中。首先将场景拖放到 `Build Settings ➤ Scenes\
  \ In Build` 菜单中，如图 5-2 所示。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig2_HTML.jpg](img/441101_2_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 显示正在将场景添加到 `Scenes In Build` 菜单\n\n在层级视图中导航到 `MixedRealityBasicSceneSetup`，并确保已勾选\
  \ `OnLoadStartScene` 脚本旁边的复选框，如图 5-3 所示。这有助于根场景了解先加载哪个演示场景。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig3_HTML.jpg](img/441101_2_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 确保 `OnLoadStartScene` 脚本已启用\n\n## 第 3 步：尝试场景！\n\n在示例场景中，你应该只会看到一个带有四个选项的图形菜单：选择、导航、定位和可视化。请点击播放按钮尝试该场景。你可以随时在\
  \ Unity 编辑器中测试，或将应用部署到你的设备上。\n\n让我们探索图形菜单中的“选择”选项；一旦你在菜单中选择了“选择”选项，你将看到几颗宝石出现，顶部菜单会显示演示场景的描述。当你的视觉注视击中场景中的一颗宝石时，它开始旋转，如图\
  \ 5-4 所示。进一步注视该宝石，它可能会被销毁，如图 5-5 所示。进入 Unity 编辑器的游戏视图后，你必须看到一个小的透明圆圈，作为你的视觉注视光标来模拟你的眼部注视。\n\
  \n**提示：** 默认情况下，该示例场景支持你使用鼠标和键盘轻松导航场景。如果你想在没有头戴设备的情况下进行快速测试，这非常有用。按住鼠标右键并移动鼠标来模拟用于视觉注视的眼部运动。按住\
  \ Shift 键或空格键来模拟将手放在 HoloLens 前面。左键单击以模拟空中点击手势（同时按住 Shift 或空格键）。使用键盘方向键在你的环境中行走。\n\
  \n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig5_HTML.jpg](img/441101_2_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** 左键单击注视光标下的物体时，该物体被销毁\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig4_HTML.jpg](img/441101_2_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** 播放场景时，你的注视光标会使宝石旋转\n\n当你完成场景测试后，请再次点击播放按钮停止模拟。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\
  \n\n### 步骤 4：理解场景\n\n现在你已经体验了示例场景并获得了一些乐趣，是时候了解这个场景是如何工作的，以及如何将场景中的元素应用到你的项目中了！让我们从层级面板开始，逐一了解所展示的元素。\n\
  \n要实现流畅且无错误的眼动追踪，你必须完成三项基本设置。首先是向你的 MRTK 配置文件添加一个 `Input Data Provider`。Mixed Reality\
  \ Toolkit 输入系统是一个可扩展的系统，能够支持各种输入设备。只需自定义一个 `Input Data Provider` 即可提供外部硬件支持。顾名思义，这些数据提供程序有助于将数据输入到\
  \ Mixed Reality Toolkit 服务中。要查看添加到场景中的数据提供程序，请点击层级窗口中的 `MixedRealityToolkit` 对象。然后，在检查器窗口中，点击输入选项卡并展开\
  \ `Input Data Providers` 部分。图 5-6 显示了添加到演示场景中的名为 `Windows Mixed Reality Eye Gaze\
  \ Provider` 的 `Input Data Provider`。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig6_HTML.jpg](img/441101_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6  \n添加到演示场景中的 `Windows Mixed Reality Eye Gaze Provider`\n\n其次，配置 `GazeProvider`。凝视是一种根据用户视线方向与周围环境交互的输入形式。`GazeProvider`\
  \ 在 MRTK 中提供了此功能。`GazeProvider` 可以在输入系统的指针部分进行配置。展开输入系统中的指针部分。在凝视设置下，你可以看到 `Is Eye\
  \ Tracking Enabled` 选项旁边的复选框已被勾选。此过程确保项目使用眼部注视而非头部注视。图 5-7 展示了前述功能。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig7_HTML.jpg](img/441101_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7  \n在输入系统的指针部分启用 `Is Eye Tracking Enabled` 选项\n\n由于凝视射线是不可见的，我们希望使用一个光标来表示用户正在注视的位置，以及凝视射线是否触碰到了用户前方的全息图。为此，我们可以看到\
  \ `EyeGazeCursor` 预制件，它在图 5-7 中被高亮显示。它用一个半透明的圆形来表示凝视射线的末端。示例可参见图 5-4 和 5-5。\n\n\
  在我们之前看到的演示场景中，当我们将光标悬停在宝石上时，我们注意到光标会立即吸附到宝石的中心。这是检查所有事件是否正常运行的好方法。\n\n最后，为了在 Unity\
  \ 编辑器中模拟眼动追踪输入，你需要将 `Default Eye Gaze Simulation Mode` 选择为 `Camera Forward Axis`。这有助于你在初始阶段（即部署到\
  \ HoloLens 2 之前）测试你的应用程序。眼部注视信号通过利用摄像机的位置作为眼部注视的原点，并将其向量作为眼部注视的方向来模拟。打开输入选项卡，导航到\
  \ `Input Data Providers` ➤ `Input Simulation Service`；在 `Eye Gaze Simulation` 下，你会注意到\
  \ `Default Eye Gaze Simulation Mode` 被设置为 `Camera Forward Axis`。此选项在图 5-8 中用红色圆圈标出。\n\
  \n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig8_HTML.jpg](img/441101_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8  \n设置模拟模式\n\n注意  \n`Eye Gaze Simulation` 无法很好地替代快速的眼球运动和无意识的眼球运动。因此，强烈建议你在\
  \ HoloLens 设备上测试你的应用程序，而不是在眼动追踪模拟选项的结果上妥协。\n\n### 步骤 5：在你的项目中使用注视\n\n现在你已经对注视输入方法和光标的重要组件有了高层次的理解，你知道了创建自己的注视和光标功能所需的设置。让我们回顾一下这些设置是什么：\n\
  \n-   添加一个 `Input Data Provider` 以向 Mixed Reality Toolkit 服务提供数据\n-   在指针部分启用 `Is\
  \ Eye Tracking Enabled`，以在你的项目上启用眼动追踪功能\n-   将 `Default Eye Gaze Simulation Mode`\
  \ 设置为 `Camera Forward Axis`，以帮助你在 Unity 编辑器中模拟眼部注视功能\n\n通常，从一个已经包含这些核心元素的现有场景开始，然后将该“模板场景”作为构建应用程序的基础，会高效得多。本节中使用的\
  \ `EyeTrackingDemo-00-RootScene` 不包含其他核心功能，因此过于局限，不能用作有效的模板。随着我们在本章中逐步介绍其他输入方法，我们将得到一个功能完备的示例场景，你可以在每次开始新项目时反复将其用作模板场景！\n\
  \n## 手势教程\n\n在本节中，我将带你了解如何在你的应用程序中使用手势。我们将探讨不同类别的手势以及每种手势适用的用例。我们将查看代码以了解手势是如何实现的。\n\
  \n### 步骤 1. 加载测试场景\n\n对于本教程，我们将加载 `HandInteractionExamples` 场景。与之前的测试场景一样，搜索或浏览\
  \ `HandInteractionExamples`，并将其拖入你的层级面板中，如图 5-9 所示。移除你可能已打开的任何其他场景。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig9_HTML.jpg](img/441101_2_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9  \n打开 `HandInteractionExamples` 场景。这个精彩的测试场景是一个用于尝试手势和输入的游乐场！\n\n如图 5-9\
  \ 所示，你会立即看到一个友好的展示，让人联想到一个有趣的科学展览。\n\n### 步骤 2. 试试看！\n\n继续尝试这个测试场景，你可以通过点击编辑器的播放按钮、远程连接到你的设备或直接部署到设备上来运行。此演示中突出显示的一些功能包括弹出菜单、光标功能、点击对象、拖拽/移动对象等等！\n\
  \n你是否想了解更多关于在演示中看到的内容？退出演示（再次点击播放按钮）后，你可以在场景窗口中选择感兴趣的对象，并查看检查器以探索哪些脚本和组件负责该对象的行为。在图\
  \ 5-10 中，我选择了咖啡杯以在右侧的检查器面板中查看该对象的组件。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig10_HTML.jpg](img/441101_2_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10  \n为了更好地了解此测试场景中每个对象和功能的工作原理，请高亮感兴趣的对象，并在右侧的检查器面板中探索其组件\n\n这个场景中有许多有趣的功能。我们已经在上一节中介绍了部分\
  \ MRTK 配置设置和与注视相关的主题。在接下来的几个步骤中，我们将介绍其他一些关键功能。\n\n\n\n### 步骤 3：边界控制\n\n`Bounds Control`\
  \ 允许您在混合现实中变换对象。您可以更改对象的大小和比例。它相当于缩放选项，但是在 3D 尺度上操作的。\n\n让我们在 `HandInteractionExamples`\
  \ 场景中尝试此功能，以探索该特性。如图 5-11 所示，在 `Bounds Control` 标题下有五个对象，它们将向您展示 `Bounds Control`\
  \ 在 HoloLens 1 和 2 中的工作方式。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig11_HTML.jpg](img/441101_2_En_5_Fig11_HTML.jpg)\n\
  \n*图 5-11*\n\n面板中的五个对象各自通过增大、减小或旋转来响应 `Bounds Control` 手势。\n\n角落处的控制柄可帮助您缩放、旋转和平移对象。`Bounds\
  \ Control` 也会响应用户的输入。例如，在 HoloLens 2 中，`Bounds Control` 会响应手指的靠近，并提供视觉反馈以估算对象的距离。如图\
  \ 5-12 所示，脚本在 `Inspector` 面板中包含几个可自定义的选项。让我们逐一了解：\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig12_HTML.jpg](img/441101_2_En_5_Fig12_HTML.jpg)\n\
  \n*图 5-12 — Bounds Control 脚本下的各种可自定义元素*\n\n- **Target Object（目标对象）：** `Target Object`\
  \ 指的是可以使用 `Bounds Control` 脚本进行操控的对象。如果此处未指定任何对象，则它将把所属对象作为目标对象。\n- **Behavior（行为）：**\
  \ `Behavior` 设置规定了 `Bounds Control` 在附加到对象时应如何表现。它包含用于激活 `Bounds Control`、控制是否在某个轴上扁平化控件等设置。\n\
  - **Smoothing（平滑处理）：** 它允许您在缩放或旋转对象时缩放平滑行为。\n- **Visuals（视觉效果）：** 您还可以通过配置 `Visuals`\
  \ 部分下的设置来更改 `Bounds Control` 的视觉效果。它们可以是链接的或内联的可脚本对象。\n- **Constraints（约束）：** 约束系统有助于控制对象的缩放、旋转和平移。通过配置这些设置，您将能够将移动限制在一定范围内。\n\
  - **Events（事件）：** 事件在激活后有助于提供音频反馈。有几个事件可以提供语音或音频反馈，例如 `Rotate Started()`（旋转开始）、`Rotate\
  \ Stopped()`（旋转停止）、`Scale Started()`（缩放开始）、`Scale Stopped()`（缩放停止）、`Translate Started()`（平移开始）和\
  \ `Translate Stopped()`（平移停止）。\n\n### 步骤 4：按下与触摸交互\n\nWindows Mixed Reality 设备最关键的手势是选择手势。对于\
  \ HoloLens 来说，这等同于空中点击与凝视对象的组合。它相当于在 PC 上单击鼠标。\n\n让我们探索测试场景中响应选择手势的其中一个对象。如图 5-13\
  \ 所示，中间面板有各种按钮和菜单。图 5-13 中高亮显示的较小立方体会改变其颜色，以显示按钮被点击或选中。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig13_HTML.jpg](img/441101_2_En_5_Fig13_HTML.jpg)\n\
  \n*图 5-13 — 在“按下交互”下，每次点击按钮时，顶部的小立方体都会改变颜色*\n\n当您选择任一对象时，您会注意到 `Inspector` 面板中的标准组件——`PressableButton.cs`\
  \ 脚本、`Interactable.cs` 脚本和 `NearInteractionTouchable.cs`，如图 5-14 所示。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig14_HTML.jpg](img/441101_2_En_5_Fig14_HTML.jpg)\n\
  \n*图 5-14 — 显示执行“按下交互”所需的一些核心组件*\n\n- **`PressableButton.cs`：** 接收来自用户的所有输入事件，并将其传递给\
  \ `PhysicalPressEventRouter`，后者将这些事件路由到 `Interactable.cs`。它执行手部按下按钮的连接逻辑。\n- **`Interactable.cs`：**\
  \ 该脚本帮助使对象响应用户输入；输入可以是任何形式。您可以通过向对象添加 `Interactable.cs` 脚本来使其成为可交互对象。\n- **`NearInteractionTouchable.cs`：**\
  \ 该脚本使任何对象都可触摸并准备好进行变换，这样当 `PokePointer` 触摸此对象时，您可以执行 `PointerUp` 和 `PointerDown`\
  \ 事件。\n\n您可以将上述脚本附加到您的对象上以执行按下交互。要实现触摸交互，您需要包含 `HandInteractionTouch.cs` 和 `Interactable.cs`\
  \ 脚本组件。\n\n### 步骤 5：对象操纵器\n\n您可以通过点击凝视的对象、按住手指并拖动手部来移动这些对象。请确保您正在编辑器中播放场景、远程连接到您的设备，或者应用程序已部署到您的设备。\n\
  \n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig15_HTML.jpg](img/441101_2_En_5_Fig15_HTML.jpg)\n\
  \n*图 5-15 — 可使用对象操纵器组件进行缩放、旋转和变换的对象*\n\n`Object Manipulator` 组件允许您使用单手或双手来缩放、旋转和变换对象。此功能以前由\
  \ `Manipulation Handler` 组件处理，现在已被 `Object Manipulator` 组件取代。您可以根据各种输入（如手部骨骼、手部射线、凝视和手势）来自定义\
  \ `Object Manipulator` 组件。\n\n如果您希望将此功能集成到您的对象中，则需要将 `Object Manipulator (script)`\
  \ 组件添加到相应的对象上。请确保您也在对象中包含碰撞体组件。为了使您的操作更真实，您可以在对象中包含 `RigidBody` 组件；这样做之后，您的数字对象的行为会像真实物体一样。它们会像自然物体一样与其他物体碰撞；如果没有\
  \ `RigidBody` 组件，物体将穿过另一个物体，使其看起来不真实。\n\n图 5-16 展示了 `Object Manipulator` 组件中包含的各种属性和字段。属性和字段的列表如下：\n\
  \n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig16_HTML.jpg](img/441101_2_En_5_Fig16_HTML.jpg)\n\
  \n*图 5-16 — Object Manipulator 脚本下包含的各种属性和字段*\n\n- **Host Transform（宿主变换）：** 包含需要被操控的对象变换。\n\
  - **Manipulation Type（操纵类型）：** 操纵模式可以是单手或双手。您可以在此字段中选择这两种设置。\n- **Allow Far Manipulation（允许远距离操纵）：**\
  \ 允许您使用指针进行远距离交互。\n- **One Handed Manipulation properties（单手操纵属性）：** 单手操纵属性负责管理由单只手执行的操作；可能是远距离或近距离交互。远距离交互使对象能够通过凝视、手部射线和运动控制器射线进行交互。顾名思义，用户可以远距离与对象交互。近距离交互以触摸和抓取的形式呈现。相应的触摸和抓取事件通过指针（如\
  \ `PokePointer` 和 `SpherePointer`）调用。\n- **Two Handed Manipulation properties（双手操纵属性）：**\
  \ 双手操纵属性负责管理由双手执行的操作，例如移动、旋转和缩放。\n- **Constraints（约束）：** 为对象添加约束有助于限制对象的移动。您可以选择附加到对象的任意约束管理器。\n\
  - **Physics（物理）：** 仅当附加了 `RigidBody` 组件时，此字段才会被激活。\n- **Manipulation Events（操纵事件）：**\
  \ 列出了一组事件，例如 `OnHoverStarted`（悬停开始）、`OnHoverEnded`（悬停结束）、`OnManipulationStarted`（操纵开始）和\
  \ `OnManipulationEnded`（操纵结束），这些事件在进行交互时按顺序发生。\n\n\n\n### 第 6 步：在应用中实现手势\n\n现在您已对手势输入方式有了高层理解，掌握了创建手势功能所需的脚本和对象。让我们回顾一下具体内容：\n\
  \n- **边界控制**：使您能够在混合现实中变换对象。您可以使用对象四角的操作柄来改变对象的大小和比例。\n- **`Pressable.cs`脚本**：将事件重定向到`PhysicalPressEventRouter`，同时充当手按压按钮的连接逻辑。\n\
  - **`Interactable.cs`脚本**：通过包含此组件使对象具备交互性，让对象能够响应用户输入。\n- **近交互抓取**：使对象可感知并准备好接受输入。\n\
  - **对象操纵器**：允许您通过缩放、旋转和变换来操纵对象。对象操纵器具有多种属性和字段供您自定义。\n\n您可能还想探索示例场景中附加的其他脚本和对象，以更精确地了解如何在场景中融入手势。我们在本节中一直在探索的`HandInteractionExamples`场景是启动新项目时极佳的模板场景。它包含前面列出的核心预制件，以及多个可供项目修改或扩展的独特示例。随着经验积累，您也可以考虑构建包含常用组件的模板场景。如果您希望从混合现实工具包提供的测试场景入手，修改后另存为模板场景，可以在`层级`中选择场景，然后通过菜单栏选择`文件`\
  \ ➤ `另存场景`。\n\n## 语音命令教程\n\n在本节中，我将带您了解在混合现实应用中启用语音命令所需的关键要素。语音命令在开发混合现实应用时极为有用，因为它无需杂乱的用户界面即可实现高度控制和自定义。用户可以说出一个或一系列词语来选中对象、激活功能并增强体验。\n\
  \n长时间使用手势时，我的手臂经常感到疲劳。这时我会改用语音命令说\"选择\"，而不使用手势。这就是语音命令强大能力的一个例证。在应用中深思熟虑地使用语音是打造良好用户体验的关键。\n\
  \n和之前一样，我们将从混合现实工具包示例场景开始，探索语音命令在 Windows 混合现实中的工作原理。\n\n### 第 1 步：加载示例场景\n\n本教程中，我们将加载`SpeechInputExamples`场景。按照之前测试场景的操作方式，搜索或浏览找到`SpeechInputExamples`，将其拖入层级，如图\
  \ 5-17 所示。别忘了卸载可能已打开的其他场景。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig17_HTML.jpg](img/441101_2_En_5_Fig17_HTML.jpg)\n\
  \n**图 5-17** 打开`SpeechInputExamples`示例场景，探索如何在应用中使用语音命令\n\n### 第 2 步：试试看！\n\n和之前一样，通过点击编辑器中的播放按钮、远程连接到设备或部署到设备来试用此测试场景。\n\
  \n**重要提示**\n\n使用语音命令时，请务必在应用中添加麦克风功能。在 Unity 中，您可以在`编辑` ➤ `项目设置` ➤ `播放器` ➤ `Windows\
  \ Store 设置` ➤ `发布设置` ➤ `功能`中勾选\"麦克风\"选项。\n\n启动示例场景后，您可以看到若干带有示例场景描述和需要遵循步骤的游戏对象。当您凝视顶部两个游戏对象中的任何一个并大声说出\"\
  选择\"时，相应对象会被选中。然后说\"更改颜色\"，即可更改所选游戏对象的颜色，如图 5-18 所示。在执行\"更改颜色\"操作之前需要先选中对象，因为该操作需要焦点，而`Speech\
  \ Handler`脚本是本地包含的。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig18_HTML.jpg](img/441101_2_En_5_Fig18_HTML.jpg)\n\
  \n**图 5-18** 播放示例场景后，您会看到四个对象。凝视顶部的某个对象并说\"选择\"来选中它，然后尝试大声说\"更改颜色\"\n\n说出\"关闭\"\
  和\"打开\"等命令时，您可以观察到底部的游戏对象会根据语音输入消失或出现。在发出命令前无需选中任何对象，因为`Speech Handler`脚本是全局放置的。如果您通过\
  \ Unity 编辑器测试，只要电脑连接了麦克风（或内置麦克风、集成在摄像头中的麦克风），语音命令即可正常工作。\n\n\n\n### 第三步：理解场景\n\n\
  在体验了语音指令的乐趣之后，现在让我们更深入地探究其背后的工作原理。如图 5-19 所示，`SpeechInputExamples` 示例场景的层级视图中包含了若干对象。\n\
  \n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig19_HTML.jpg](img/441101_2_En_5_Fig19_HTML.jpg)\n\
  \n**图 5-19** 通过在输入系统的语音部分配置一些设置，即可实现语音指令功能\n\n现在，您应该已经非常熟悉图中显示的一些对象，以及如何将输入数据提供程序添加到项目中。如前所述，这些数据提供程序使您能够向\
  \ Unity 项目提供各种数据或输入。\n\n选中层级视图中的 `Mixed Reality Toolkit` 对象，然后在检视面板中导航至“输入”选项卡 ➤\
  \ “语音”部分，如图 5-18 所示。展开“语音”部分可查看一些选项。在“语音指令”选项下，您将看到用于添加关键词的输入字段，以便在识别到关键词时触发语音输入事件，如图\
  \ 5-20 所示。将这些关键词集成到您的项目中是第一步，因为您的语音指令正是借助这些关键词来识别的。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig20_HTML.jpg](img/441101_2_En_5_Fig20_HTML.jpg)\n\
  \n**图 5-20** 每个语音指令提供的选项\n\n对于每个指令，您可以选择“输入操作”、指定“键码”，并添加用于 UWP 应用的“本地化键”。这些功能如图\
  \ 5-20 所示，已包含在您的 `SpeechInputExamples` 场景中。\n\n在 Unity 项目中添加了各种关键词后，我们需要为这些关键词附加一些功能或事件，以便在识别到时执行。这由\
  \ `Speech Input Handler`（语音输入处理程序）脚本来处理。在层级视图中，导航至 `SceneContent` ➤ `LocalSpeechHandlingExample`\
  \ ➤ `Platonic2`。在检视面板中，您可以看到与该游戏对象相关的若干项。其中之一是 `Speech Input Handler` 脚本，它负责识别关键词并处理语音输入事件。\n\
  \n您还可以通过包含 `SpeechConfirmationTooltip.prefab`（语音确认提示框预制件）来显示语音指令识别出的文本。此预制件可指定到“语音确认提示框预制件”字段，如图\
  \ 5-21 所示。您可以看到 `Color Changer`（颜色更改器）脚本，当识别到关键词“Change Color”时，它会执行颜色更改操作。\n\n\
  ![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig21_HTML.jpg](img/441101_2_En_5_Fig21_HTML.jpg)\n\
  \n**图 5-21** 分配给场景中名为“Platonic2”的物体的各项设置\n\n`Mesh Filter`（网格过滤器）和 `Mesh Renderer`（网格渲染器）协同工作，将资源呈现在场景中。`Mesh\
  \ Filter` 从资源中提取网格并将此信息传递给 `Mesh Renderer`。另一方面，`Mesh Renderer`从 `Mesh Filter` 接收几何图形并将其渲染到场景中。附加到对象上的\
  \ `Box Collider`（盒型碰撞器）组件使这些对象能够与场景中的其他物体发生碰撞。\n\n### 第四步：添加你自己的语音指令\n\n学习某事物如何工作的最佳方法就是亲自实践！让我们在现有指令集中添加另一个语音指令。当前，当您说“Change\
  \ Color”时，物体会改变颜色；当您说“Close”和“Open”时，物体会消失和重新出现。现在让我们添加一个“Move Up”语音指令，让物体向上移动。\n\
  \n选中层级视图中的 `Mixed Reality Toolkit` 对象；在检视面板中，导航至“输入”选项卡 ➤ “语音”部分 ➤ “语音指令”。点击顶部的“+Add\
  \ a New Speech Command”按钮，如图 5-22 所示。此时会添加一个新字段，其选项与之前的语音指令相同。按图 5-21 所示填写详细信息。现在，您已成功在\
  \ Unity 项目中添加了一个关键词“Move Up”。该关键词就是语音指令。注意不要在关键词前面添加空格，否则会导致代码无法识别您的语音指令。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig22_HTML.jpg](img/441101_2_En_5_Fig22_HTML.jpg)\n\
  \n**图 5-22** 添加新的语音指令\n\n下一步是通过 `Speech Input Handler Script`（语音输入处理程序脚本）为关键词添加一个事件。目前，让我们让“Platonic2”对象在您说出“Move\
  \ Up”时向上移动。现在，每当您说“Move Up”时，一条“OnMoveUp”消息将被发送到您正在注视的对象。然而，场景中的对象在接收到 `OnMoveUp`\
  \ 消息时并不知道该做什么。我们需要在游戏对象的脚本中添加一个名为 `OnMoveUp()` 的方法。让我们看看附加到游戏对象上的脚本。\n\n您可以通过在项目面板中搜索\
  \ `ColorChanger.cs` 来找到该脚本，或者通过层级视图中的“Platonic2”对象，然后在检视面板中双击已附加到该游戏对象的“ColorChanger”脚本来找到它。在\
  \ Visual Studio 或其他编辑器中打开该脚本。接着，输入以下代码来创建 `OnMoveUp()` 方法：\n\n```csharp\npublic\
  \ void OnMoveUp()\n{\n    transform.Translate(0.0f, 0.2f, 0.0f);\n}\n```\n\n这个简单的添加操作使物体向上（Y\
  \ 方向）移动 0.2 个单位。上一步骤如图 5-23 所示。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig23_HTML.jpg](img/441101_2_En_5_Fig23_HTML.jpg)\n\
  \n**图 5-23** 在编辑器中打开“ColorChanger”代码，并在末尾添加上面的代码\n\n点击层级窗口中的“Platonic2”对象；然后在检视面板中，展开\
  \ `Speech Input Handler` 脚本。点击小的“+”标记为您输入的关键词添加一个事件。按图 5-24 所示填写详细信息。确保您选择的响应事件为\
  \ `ColorChanger` ➤ `OnMoveUp()`。这一步将帮助您为关键词关联一个事件。\n\n![../images/441101_2_En_5_Chapter/441101_2_En_5_Fig24_HTML.jpg](img/441101_2_En_5_Fig24_HTML.jpg)\n\
  \n**图 5-24** 为新添加的关键词添加功能\n\n> **注意**  \n> 务必确保关键词匹配，否则将会遇到要求更正关键词的错误提示。\n\n现在就来试试您的新语音指令吧！注视每个对象并说出“Move\
  \ Up”。您将看到物体向上移动！\n\n### 第五步：在你自己的项目中使用语音指令\n\n恭喜！您已成功了解了语音指令如何在 Windows Mixed Reality\
  \ 中工作，以及如何将您自己的语音指令添加到现有的测试场景中。将语音指令添加到一个新场景或不同的场景是一个简单的过程。让我们回顾一下在您自己的项目中启用语音指令所需的步骤：\n\
  \n*   在 `Mixed Reality Toolkit` 的输入系统的“语音”部分添加所需的关键词。\n\n*   将 `SpeechInputHandler`\
  \ 脚本附加到您需要执行某些操作的对象上。\n\n*   确保为给定的关键词选择适当的事件。\n\n在 Windows Mixed Reality 中实现语音指令相对简单，但它将显著增强您应用程序的用户体验。语音输入也可以使用完整的句子，而不仅仅是单个关键词。下一步将讨论在应用程序中使用语音的一些最佳实践。\n\
  \n\n\n### 语音命令最佳实践\n\n语音命令是用户与混合现实应用进行交互的绝佳方式。以下是一些 HoloLens 特有的语音命令供您尝试。请尝试说出：\n\
  \n- `“What can I say?”`\n- `“Go to Start”`（可用于打开开始菜单）\n- `“Increase Volume”`\n-\
  \ `“Decrease Volume”`\n- `“How much battery do I have left”`\n- `“Increase Brightness”`\n\
  - `“Decrease Brightness”`\n- `“Start Recording”`\n- `“Stop Recording”`\n- `“Shut\
  \ down the device”`\n- `“Restart the device”`\n- `“What time is it”`\n- `“Go to\
  \ sleep”`\n\n以下是在应用中实现语音功能时需牢记的一些最佳实践：\n\n- 使用包含两个或更多音节的**关键词**。这有助于识别各种口音的语音。\n\
  - 在设计应用时，应考虑用户**误触发**语音命令的情况。在适当的情况下，允许用户撤销操作（例如，当意外删除一个对象时）。\n- 确保所有语音命令都是**独特的**。如果两个或多个命令听起来相似，语音识别器可能会激活错误的命令。\n\
  - 尽可能确保你的语音命令在各种口音下都能被**轻松识别**。\n- 语音命令是快速访问嵌套菜单或其他可能需要多种手势操作场景的绝佳方式。\n- 如果用户界面没有显示语音命令列表，请考虑为用户提供一份清单。\n\
  - 在可通过点击或语音命令激活的按钮旁边放置**麦克风图标**。如果可能，请使所有按钮和 UI 元素都支持语音启用。\n\n## 其他硬件输入\n\n有各种硬件选项可与\
  \ Windows Mixed Reality 头戴式设备配合使用。这些设备包括运动控制器、蓝牙键盘和鼠标、蓝牙游戏手柄、点击器等蓝牙配件。\n\n虽然最佳实践建议避免在混合现实体验中使用传统的\
  \ PC 硬件（键盘和鼠标），但在某些应用中，这些输入方法可能是合适的。\n\n对于可能涉及移动第三人称对象（如游戏角色、全息直升机或全息赛车）的应用，游戏手柄是一个绝佳选择。\n\
  \n## 总结\n\n恭喜！在本章中，我们了解了 Windows Mixed Reality 头戴式设备的主要输入形式。我们通过几个教程学习了凝视、手势和语音命令如何与混合现实配合工作。我们学习了如何在我们自己的应用中启用这些功能，以及如何利用\
  \ Mixed Reality Toolkit 轻松实现强大的输入功能。\n\n在你继续混合现实开发之旅时，请记住该行业仍处于成长阶段。大家普遍认为，混合现实设备的输入方法有时会有些笨拙和尴尬，缺乏精确性和优雅性。思考一下理想的输入体验会是什么样子，不要害怕尝试与虚拟环境互动的新方式！你永远不知道谁会引入一种像鼠标之于\
  \ PC 那样对混合现实至关重要的输入方法。\n\n"
- "# 6. 使用空间感知\n\n在本章中，我们将学习如何使用 Windows Mixed Reality 头戴式设备（如 HoloLens）最具特色的功能之一：空间感知。我们将学习如何在\
  \ Unity 中使用 Mixed Reality Toolkit 应用空间感知，并揭示一些你可以利用空间感知实现的巧妙技巧。\n\n## 什么是空间感知？\n\
  \n像 HoloLens 这样的设备会持续追踪其环境，并构建所处区域的 3D 模型。这被称为*空间感知*。如果没有空间感知，全息影像将无法放置在地板和桌面上，也无法固定在墙上。其他房间中的物体仍然可见，这会降低用户的体验。\n\
  \n空间感知之所以重要，有几个原因：\n\n- **遮挡（Occlusion）**：它告诉 HoloLens 哪些全息影像应该从视图中隐藏。例如，如果你将一个全息影像放在你的走廊里，然后走进另一个房间，那个房间墙壁的空间地图将阻止你看到走廊里的全息影像。如果没有空间地图，你会看到全息影像，就好像它可以透过墙壁被看到一样，导致不真实的体验。\n\
  - **放置（Placement）**：它允许用户与空间地图进行交互——例如，将物品固定在你的墙上，允许角色坐在你的沙发上（如微软的“Fragments”应用所示！），或自动装饰你的周围环境。\n\
  - **物理（Physics）**：它允许物体与你的墙壁、家具和地板发生碰撞或弹跳，从而产生更真实的体验。\n- **导航（Navigation）**：使用凝视让游戏角色和其他全息影像沿着映射的表面跟随移动。\n\
  - **持久性（Persistence）**：空间感知会存储有关物体在其环境中位置的信息。这在许多场景中都很有用。例如，你在将全息影像放置在所需位置后意外关闭了应用，由于物体的位置已被存储，当你再次打开应用时，可以在同一区域找到你的全息影像。\n\
  \n有关空间感知及相关传感器的更多信息，请参阅第 1 章。\n\n## 空间感知教程\n\n在本节中，我将指导您设置一些基本的空间感知功能。我将展示需要从 Mixed\
  \ Reality Toolkit 中使用哪些元素来启用空间感知，并提供一些获得良好体验的提示。\n\n### 步骤 1：设置 Unity 场景\n\n在本教程中，我们将使用\
  \ Mixed Reality Toolkit 中的一个示例场景。如果您还没有设置，请务必按照第 4 章所述为混合现实开发设置 Unity。您也可以参考第 4\
  \ 章，复习如何在 Unity 中运行 Mixed Reality Toolkit 的示例场景。\n\n在项目面板中，使用搜索栏或在文件夹结构中查找，找到 `“SpatialAwarenessMeshDemo”`\
  \ 示例场景（或 `SpatialAwarenessMeshDemo.unity`）。将该测试场景拖入层级面板，如图 6-1 所示。请确保卸载（禁用）您可能已打开的所有其他场景。\n\
  \n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig1_HTML.jpg](img/441101_2_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1**\n\n从 Mixed Reality Toolkit 打开 `SpatialAwarenessMeshDemo` 场景，探索空间感知的基本实现\n\
  \n### 步骤 2. 试试看！\n\n下一步是点击播放按钮进行尝试。\n\n我强烈建议使用您的 HoloLens 体验您周围的空间网格。通过使用 HoloLens，您可以观察到网格是如何放置在您周围和物体上的。如果您没有设备，或者不想在这次测试中使用它，请在您的\
  \ Unity 编辑器中尝试，以初步了解空间感知的工作原理。\n\n**注意**\n\n为了在 Unity 编辑器上测试您的应用，您需要按照图 6-5 所示更改设置。请参考步骤\
  \ 4 了解如何更改设置。\n\n如果佩戴 HoloLens，您将看到空间地图与您的物理环境完美对齐，如图 6-2 所示。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig2_HTML.jpg](img/441101_2_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2**\n\n通过 HoloLens 2 看到的空间地图视图\n\n如您所见，空间地图的渲染是一个由顶点、边和面组成的集合。顶点是两条或多条边相交形成一个角的点，边通常是直线段，而面是由边在顶点处相交形成的平面表面。它看起来像一张覆盖您周围环境的网（我们稍后将学习如何更改空间映射的外观）。由空间感知生成的\
  \ 3D 对象通常被称为*空间对象网格*。\n\n\n\n### 第 3 步：理解场景\n\n既然你已经体验了空间感知，让我们深入探究场景，了解实现空间映射的关键组件。\n\
  \n在 `Hierarchy` 窗口中选择 `Mixed Reality Toolkit` 对象，然后观察 `Inspector` 窗口，如图 6-3 所示。\
  \ `Mixed Reality Toolkit` 对象负责管理空间感知系统。在 `MixedRealityToolkit` 对象中有各种配置配置文件，你可以根据正在创建的应用程序进行更改和自定义。在配置文件中，只有部分会自动启用空间感知系统。其中一个是\
  \ `DefaultMixedRealityToolkitConfigurationProfile`。示例场景即使用此配置文件。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig3_HTML.jpg](img/441101_2_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3**\n\n只需进行空间感知设置即可在项目中启用空间感知！\n\n导航到 `Inspector` 窗口中的 `Spatial Awareness`\
  \ 选项卡。你应该会看到一个名为 `Enable Spatial Awareness System` 的复选框，并且它已被勾选。勾选此复选框，即可让你的应用程序访问空间感知系统。\n\
  \n> **注意**  \n> 设置可能不会像图 6-3 所示那样高亮显示。这是因为你无法直接自定义标准配置文件。你需要创建该配置文件的克隆来配置设置。我们将在下一节中进一步讨论此步骤。\n\
  \n在 `Spatial Awareness System Settings` 部分，你有一个 `Add Spatial Observer` 选项。默认情况下，`DefaultMixedRealityToolkitConfigurationProfile`\
  \ 会为 Windows Mixed Reality 平台预配置空间感知系统，该系统使用 `WindowsMixedRealitySpatialMeshObserver`\
  \ 类，如图 6-4 所示。此设置让你可以在设备上部署时可视化空间网格，但在 Unity 编辑器中无法实现。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig4_HTML.jpg](img/441101_2_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4**\n\n`WindowsMixedRealitySpatialMeshObserver` 类让你可以在设备上部署时可视化空间网格\n\n\
  为了在 Unity 编辑器中测试示例场景，你需要将 `Type` 字段更改为 `SpatialObjectMeshObserver` 类，如图 6-5 所示。\n\
  \n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig5_HTML.jpg](img/441101_2_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5**\n\n`SpatialObjectMeshObserver` 让你可以在 Unity 编辑器上测试时可视化空间网格\n\n在 `Hierarchy`\
  \ 窗口中点击球体对象。你可以在 `Inspector` 窗口中观察到球体对象上附加了两个脚本。它们是 `PointHandler.cs` 和 `ClearSpatialObservations.cs`\
  \ 脚本，这两个脚本让你能够通过轻触球体来开启或关闭创建的空间网格。\n\n### 第 4 步：在应用程序中使用空间映射\n\n为了在未来的项目中启用空间感知，你需要首先克隆标准的\
  \ Mixed Reality 配置文件。点击图 6-6 中高亮显示的 `Copy & Customize` 按钮，开始克隆过程。会弹出一个 `Clone Profile`\
  \ 窗口，你可以在其中为克隆的配置文件提供一个新名称，然后点击 `Clone` 按钮，如图 6-6 所示。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig6_HTML.jpg](img/441101_2_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6**\n\n克隆 `DefaultMixedRealityToolkitConfigurationProfile`\n\n克隆的配置文件会自动分配为你的配置文件。克隆后，你可以看到一些选项会高亮显示。现在点击\
  \ `Inspector` 窗口中的 `Spatial Awareness` 选项卡。勾选 `Enable Spatial Awareness System`\
  \ 复选框，如图 6-7 所示，以便在应用程序中有效使用空间感知系统。要配置 `Spatial Awareness System Settings`，你需要点击旁边的\
  \ `Clone` 按钮来克隆 `DefaultMixedRealitySpatialAwarenessSystem` 配置文件。会弹出一个 `Clone Profile`\
  \ 窗口，你可以在其中提供你的配置文件名称，然后点击图 6-7 中所示的 `Clone` 按钮。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig7_HTML.jpg](img/441101_2_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7**\n\n克隆 `DefaultMixedRealitySpatialAwarenessSystem` 以访问 `Spatial Awareness\
  \ System Settings`\n\n现在，你可以配置 `Spatial Awareness System Settings` 下的各种设置。展开 `Spatial\
  \ Awareness System Settings` 下的 `Window Mixed Reality Spatial Mesh Observer` 部分，并根据你想要测试应用程序的位置，将\
  \ `Type` 字段更改为所需的类。请参考图 6-4 和图 6-5 来更改 `Type` 字段。\n\n## 遮挡\n\n在本节中，我将引导你为空间感知网格实现遮挡效果。遮挡可以使完全或部分位于墙壁及其他表面后面的物体部分变得不可见——就像在物理世界中一样。这可以增强全息图的真实感，并改善用户体验。\n\
  \n### 第 1 步：应用遮挡\n\n要将遮挡包含在你的 Unity 项目中，首先按照前面所述配置配置文件。我们已经学习了如何在项目中启用空间感知系统，并克隆一些标准配置文件来自定义设置。在\
  \ `Spatial Awareness System Settings` 下，展开 `Windows Mixed Reality Spatial Mesh Observer`，如图\
  \ 6-8 所示。克隆 `DefaultMixedRealitySpatialMeshObserverProfile` 以配置其一些属性。请参考图 6-8。\n\
  \n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig8_HTML.jpg](img/441101_2_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8**\n\n克隆 `DefaultMixedRealitySpatialMeshObserverProfile` 以配置一些属性\n\n克隆后，一些属性和设置会高亮显示。向下滚动到\
  \ `Display` 设置，并将 `Display Option` 更改为 `Occlusion`，如图 6-9 所示。通过此操作，你便为项目启用了遮挡选项。这为应用程序提供了真实感。\n\
  \n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig9_HTML.jpg](img/441101_2_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9**\n\n将 `Display Option` 更改为 `Occlusion`\n\n### 第 2 步：动手试试！\n\n遮挡材质将被渲染。由于材质是透明的，你无法直接看到空间映射网格，但你会看到物体的一部分将被其环境遮挡！\n\
  \n正如你从我的测试中看到的，当我与球体之间没有障碍物时，球体完全可见；但当存在障碍物时，球体则部分可见（图 6-10）。\n\n![../images/441101_2_En_6_Chapter/441101_2_En_6_Fig10_HTML.jpg](img/441101_2_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10**\n\n当被遮挡时（此处为门把手），球体只有未被遮挡的部分可见\n\n遮挡是混合现实开发中的关键组成部分——尤其是对于利用空间感知的项目。没有遮挡，位于其他房间或物体后方的远处全息图仍然可见，这会导致体验令人困惑且不自然。\n\
  \n\n\n## 场景理解\n\nHoloLens 对其周围的空间有着卓越的理解能力。它会频繁地映射周围环境，并构建出一个用户可用于分析的 3D 网格。有时，用户可能更希望获得更高层次的抽象，以及关于环境的更详细信息。\n\
  \n许多应用程序在启动时会扫描场景，并将特定物体放置在地板、天花板或墙壁等首选位置。拥有环境的 3D 网格对于实现此功能非常有用。然而，为了区分不同的表面，仍需在网格上执行更多处理。这正是场景理解发挥作用的地方；它允许用户解锁设备的更多功能，以推理出场景中的物体，包括墙壁、天花板、地板、平台等。\n\
  \n以下是场景理解允许你执行的一些操作：\n\n*   将物体放置在地板、天花板和墙壁上。\n*   将物体放置在你附近或远处的空中，不接触墙壁。\n*   将物体放置在你附近或远处的地板上。\n\
  *   找到最大的墙壁并在其上放置物体。\n*   找到可坐的表面（这样你就可以让角色坐在任何人的椅子上！）。\n*   识别椅子和沙发。\n*   识别大型空置表面。\n\
  *   允许用户“绘制”他们的空间网格以限制扫描区域。\n*   平滑空间映射网格。\n\n如需深入了解场景理解，请参阅 `docs.microsoft.com/en-us/windows/mixed-reality/develop/platform-capabilities-and-apis/scene-understanding-sdk#developing-with-scene-understanding`。\n\
  \n## 总结\n\n恭喜！你现在已掌握了有关空间感知的核心知识，可以开始利用一些酷炫的空间感知工具了。让我们回顾一下本章学到的内容：\n\n*   我们了解了什么是空间感知。\n\
  *   我们学习了如何在应用程序中启用空间感知。\n*   我们学习了如何使用空间感知来遮挡物体以获得更逼真的效果。\n*   我们学习了如何使用场景理解来释放空间感知的力量，识别环境中的物体和表面，并将物体放置在环境中的关键表面上。\n\
  \n你可能没有想到，关于空间感知的一章竟然有这么多内容要讲！空间感知对于混合现实至关重要。头显对物理环境的理解保证了混合现实中的“混合”——使我们的应用程序能够融合虚拟世界和物理世界。\n\
  \n关于空间感知，我们仅仅触及到了冰山一角。还有无数未被开发的机会等待我们去探索和实现。以下是我听到过提及的一些关于空间感知想法的示例：\n\n*   扩展空间映射网格，使你的房间或区域看起来比实际更大\n\
  *   虚拟地粉刷你的墙壁和家具，以查看各种颜色选项的效果\n*   在墙上打洞，营造出可以看穿墙壁的感觉\n\n在你继续进行开发者之旅时，请思考利用空间感知及所有相关工具的创造性方法。务必跳出固有思维模式！请记住，你的空间映射网格不必像真实的墙壁和家具那样遵守物理定律。你能实现的目标是无限的！\n\
  \n"
- "# 7. 空间音效\n\n在本章中，我将向你介绍如何充分利用应用程序中的空间音效！我们非常依赖耳朵来精确定位周围真实物体的位置。我们的听觉系统能够检测到声波到达每只耳朵的微小差异，从而在\
  \ 3D 空间中定位声源的位置。\n\n在混合现实的背景下，这被称为*空间音效*。开发者可以利用执行复杂计算的混合现实音频工具来实现声音的空间化。这些工具确定应如何为每只耳朵修改和调整声波，以“欺骗”我们的大脑，让我们听到的声音仿佛来自\
  \ 3D 空间中的某个特定点，而不是来自扬声器本身！这极大地增强了沉浸感。即使看不到虚拟物体（如果这些物体本应发出声音），用户仍然能够听到它们。这对于像 HoloLens\
  \ 这样的设备尤其重要，因为它的视野有限，用户可能无法在完整的周边视觉中看到全息图。\n\n以下是开发者可以利用空间音效的不同方式：\n\n*   增强沉浸感。让用户感觉自己沉浸在体验中，仿佛全息图就在他们周围。\n\
  *   吸引用户对视野外全息图的注意。从用户看不到的全息图播放音频，以提示用户朝那个全息图的方向看去。\n*   提供更好的交互体验。当用户在混合现实应用中与全息图或用户界面元素交互时，来自交互点的空间音频提示或效果会增强真实感。想想听到开关“咔嗒”一声是多么令人满足。现在，你可以使用空间音效在应用中重现这种满足感！\n\
  *   背景支持。通过空间音频为场景提供背景支持，为用户在使用应用程序时提供更真实的感受。\n\n注意\n\n空间音效仅在 Windows 10 中有效。如果你在旧版本的\
  \ Windows 上开发混合现实应用程序，空间音效将无法工作。在受支持的平台上，Windows 桌面 (Win32) 应用程序和通用 Windows 平台 (UWP)\
  \ 应用程序都可以利用空间音效。\n\n## 空间音效教程\n\n在本节中，我将带你完成一个关于空间映射如何在混合现实应用中工作的教程。\n\n### 步骤 1：设置\
  \ Unity 场景\n\n在本教程中，我们将使用混合现实工具包中的一个测试场景。如果你尚未设置，请务必按照第 4 章的描述为混合现实开发设置 Unity。你也可以参考第\
  \ 4 章，了解如何在 Unity 中运行混合现实工具包测试场景。\n\n使用搜索栏或在文件夹结构中查找，在你的“项目”面板中找到 `AudioOcclusionExamples`\
  \ 测试场景。将测试场景拖入你的层级视图，如图 7-1 所示。确保卸载（禁用）你可能打开的所有其他场景。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig1_HTML.jpg](img/441101_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n通过将其拖入层级视图，从混合现实工具包加载 `AudioOcclusionTest` 场景\n\n在 Unity 中加载测试场景后，你会注意到一个蓝色方块（`SoundOccluder`），其后面有一个球体（`SoundEmitter`）。`SoundEmitter`\
  \ 负责发出你测试此场景时将听到的声音。蓝色的 `SoundOccluder` 负责遮挡音频。更多内容将在步骤 3 中介绍！\n\n\n\n### 第 2 步：试试看！\n\
  \n要体验此测试场景中的空间音效，请使用 Visual Studio 将应用程序部署到你的头戴式设备。\n\n准备就绪后，请点击“播放”按钮来测试应用程序。首次启动应用程序时，你会开始听到有些模糊的歌声。\n\
  \n当蓝色方块位于你与球体之间时，声音会变得模糊，如图 7-2 所示。当你移动到方块旁边，使其不再位于你和球体之间时（如图 7-3 所示），你会清晰地听到来自球体的响亮歌声。\n\
  \n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig3_HTML.jpg](img/441101_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n当你绕着蓝色方块走动时，你会注意到歌声的来源是一个蓝色球体。当蓝色方块没有阻挡声音时，你能更响亮、更清晰地听到歌声。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig2_HTML.jpg](img/441101_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\n当你首次模拟测试场景时，你会看到面前有一个蓝色方块，并听到模糊的歌声。\n\n尝试在房间或区域内的各个位置走动，并尝试向不同方向转动头部。你会惊奇地发现，你能听到歌声正是从球体的精确位置传来！\n\
  \n#### 有趣的实验\n\n在应用运行期间，尝试闭上眼睛，原地转几圈，然后将你的拳头精准放在你听到音频来源的位置。现在睁开眼。神奇的是，你的拳头正好在球体的同一位置！这表明大脑有惊人的空间化声音能力，即使没有视觉线索。这也展示了\
  \ HoloLens 在数字层面空间化声音，并将音频位置与全息图位置同步的惊人能力。\n\n### 第 3 步：理解场景\n\n现在你已经花时间体验了空间音效，让我们更深入地探索场景，了解使其运作的所有组件。层级面板中唯一两个关键对象是\
  \ `SoundEmitter` 对象和 `SoundOccluder` 对象，如图 7-4 所示。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig4_HTML.jpg](img/441101_2_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n\n`AudioOcclusionTest` 场景包含两个我们将在本教程中关注的对象：`SoundEmitter` 和 `SoundOccluder`。\n\
  \n首先，我们来看看 `SoundOccluder` 游戏对象。选中 `SoundOccluder` 后，你会在检视面板中看到一个名为 `AudioOccluder.cs`\
  \ 的脚本，如图 7-5 所示。`AudioOccluder.cs` 脚本是混合现实工具包中提供的一个实用脚本，允许对象遮挡空间化音频源。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig5_HTML.jpg](img/441101_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n`SoundOccluder` 对象包含 `AudioOccluder.cs` 脚本，使其能够“遮挡”其后的任何声源。\n\n让我们来探讨为什么音频遮挡是空间音效的一个有用特性。想象一个乐队在房间里演奏音乐。当你走出房间并关上门时，你可能仍能听到乐队演奏，但听到的声音会变得模糊并且音量稍小。当你再次打开房门时，声音又变得响亮而清脆。`AudioOccluder.cs`\
  \ 脚本允许开发者在混合现实应用中模拟此行为，以增强用户的真实感。\n\n当你将 `AudioOccluder.cs` 脚本附加到对象上时，如果该遮挡对象位于你（摄像机）和音频源或发射器之间，该对象将“模糊”并降低任何空间化音频源的音量。你可以通过检视面板调整脚本的几个参数：\n\
  \n- `Cutoff Frequency` 参数允许你调整被遮挡声音的“模糊”程度。这本质上是一个低通滤波器。\n- `Volume Pass Through`\
  \ 参数允许你调整允许通过遮挡物的音量大小。\n\n层级面板中的第二个关键对象是 `SoundEmitter`。`SoundEmitter` 游戏对象（蓝色球体）是该场景中最重要的对象，因为音频源附加在此对象上，并且声音在此处进行空间化。在层级面板中选中此对象后，你会注意到一个略显繁忙的检视面板，其中包含几个重要组件，如前文图\
  \ 7-4 所示。\n\n第一个关键组件是 `Audio Source` 组件。当此组件附加到游戏对象时，会使该对象表现得像一个音频源。它允许你选择音频文件、空间化音频源、调整音量以及为音频添加特效。让我们看看\
  \ `Audio Source` 的一些关键参数（如图 7-6 所示），你可以在检视面板中调整这些参数：\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig6_HTML.jpg](img/441101_2_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n在 Unity 编辑器的检视面板中可见的 `Audio Source` 组件的可调整参数。\n\n- `AudioClip`: 你可以指定音频文件或资源，例如，`.wav`\
  \ 或 `.mp3` 文件。\n- `Mute`: 勾选此框可使音频静音。在项目脚本中用于切换状态时很有用。\n- `Play On Awake`: 勾选此框可在场景加载时播放音频源。\n\
  - `Loop`: 勾选此框可无限循环播放音频。\n- `Priority`: 允许你设置音频文件的优先级。数字越大表示优先级越低，数字越小表示优先级越高。如果音频源过多，则只会听到最高优先级的源。\n\
  - `Volume`: 允许你设置音频源的音量。\n- `Pitch`: 允许你加快或减慢音频源的播放速度。\n- `Spatial Blend`: 允许你设置音频源被视为\
  \ 3D 空间音频源的程度。对于 HoloLens 的空间音效，请将此值设置为 1。\n\n附加到 `SoundEmitter` 游戏对象的第二个关键组件是 `AudioInfluencerController.cs`\
  \ 脚本。此脚本允许音频源受到场景中其他游戏对象的影响。例如，`SoundOccluder` 游戏对象（包含 `AudioOccluder.cs` 脚本）能够影响此音频源，正是因为\
  \ `AudioInfluencerController.cs` 脚本。让我们看看该脚本的一些参数（见图 7-7），这些参数可以在检视面板中调整：\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig7_HTML.jpg](img/441101_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n在 Unity 编辑器的检视面板中可见的 `AudioInfluencerController.cs` 脚本的可调整参数。\n\n- `Update\
  \ Interval`: 音频影响更新的时间间隔，以秒为单位。要每帧更新，请将值设置为 0。较长的时间间隔可提供更好的应用性能，但也会增加激活影响者的时间延迟。\n\
  - `Max Distance`: 此对象在查找用户或影响者时的最大距离，以米为单位。\n- `Max Objects`: 在查找影响者时要考虑的最大对象数量。\n\
  \n\n\n### 第 4 步：在应用程序中启用空间音效\n\n既然您已经了解了空间音效的一些关键要素，并通过混合现实工具包体验了一个可运行的示例，那么接下来让我们看看如何在您自己的应用程序中实现空间音效。\n\
  \n首先，您需要在 Unity 的设置中启用空间音效。请进入 `Edit` ➤ `Project Settings`。\n\n打开 `Project Settings`\
  \ 窗口后，选择 `Audio`，然后在 `Spatializer Plugin` 下拉菜单中选择 `Microsoft HRTF` 扩展，如图 7-8a 所示。将\
  \ `System Sample Rate` 设置为 `48000`。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig9_HTML.jpg](img/441101_2_En_7_Fig9_HTML.jpg)\n\
  \n图 7-8b\n\n在 Unity 的音频设置中启用 `Spatial Audio`。请务必选择 `MS HRTF Spatializer` 并将 `System\
  \ Sample Rate` 设置为 `48000`。\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig8_HTML.jpg](img/441101_2_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8a\n\n从编辑菜单选择 `Project Settings`\n\n其次，您需要为任何希望作为音频源的游戏对象附加一个 `Audio Source`\
  \ 组件。您可以通过选择游戏对象，点击其 `Inspector` 面板底部的 `“Add Component”` 按钮，然后搜索并附加 `Audio Source`\
  \ 组件来执行此操作，如图 7-9 所示。如图 7-9 所示，我在我们一直使用的 `AudioOcclusionExamples` 场景中创建了一个新的立方体游戏对象，用以演示如何在新游戏对象上创建空间音效。\n\
  \n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig10_HTML.jpg](img/441101_2_En_7_Fig10_HTML.jpg)\n\
  \n图 7-9\n\n将 `Audio Source` 组件附加到您希望作为音频源的游戏对象上。\n\n第三，您需要为空间音效配置 `Audio Source`\
  \ 组件。在 `Audio Source` 组件中有三个参数需要设置，如图 7-10 所示。您需要进行以下更改：\n\n![../images/441101_2_En_7_Chapter/441101_2_En_7_Fig11_HTML.jpg](img/441101_2_En_7_Fig11_HTML.jpg)\n\
  \n图 7-10\n\n修改 `Audio Source` 组件中显示的三个参数以使声音空间化\n\n*   启用 `Spatialize` 复选框。\n* \
  \  将 `Spatial Blend` 设置为 `1`。\n*   将 `Volume Rolloff` 设置为 `“Custom Rolloff”`。您可能需要展开\
  \ `“3D Sound Settings”` 项才能看到此参数。\n\n这就是在您的应用程序中启用空间音效所需的全部操作！您可以随意将资源中的音频文件拖放到\
  \ `AudioClip` 区域，并使用头戴显示设备进行体验。\n\n要将一个对象转变为音频遮挡器，只需将 `AudioInfluencerController.cs`\
  \ 脚本附加到包含音频源的游戏对象上，并将 `AudioOccluder.cs` 脚本附加到您希望作为音频遮挡器的对象上。请确保摄像机具有 `Audio Listener`\
  \ 组件。不过，该组件默认包含在 `HolographicCamera` 预制件中。这决定了音频的听音点位置，并对声音进行空间化处理，以在该点生成波形。\n\n\
  > **注意**\n>\n> 要使音频遮挡和空间音效正常工作，`“Audio Listener”` 组件也需要附加到摄像机上。默认情况下，它在混合现实工具包的\
  \ `HoloLensCamera` 预制件中已包含。\n\n### 空间音效设计注意事项\n\n在本节中，我们将讨论在应用程序中使用空间音效的一些设计注意事项和最佳实践。我们将探讨何时使用空间音效，以及在使用空间音效时应避免的事项。\n\
  \n#### 何时使用空间音效\n\n只要有可能，请使用空间音效来帮助*引导用户*。由于视野非常小，像 HoloLens 这样的设备常常会让试图寻找感兴趣对象的用户感到沮丧。虽然可以使用视觉箭头帮助用户找到要查看的全息图，但利用我们本能地朝着听到声音的方向看过去的能力会更好。\n\
  \n> **提示**\n>\n> 当使用空间音效引导用户或定位对象时，请使用低频或中频音频。您有没有试过通过蟋蟀的叫声来定位它？这非常困难，因为蟋蟀的叫声频率非常高。我们的大脑根据声波到达每只耳朵的方式来计算声音的位置。较大的声波（较低频率）比较小的声波（较高频率）更容易解读。\n\
  \n通过尽可能附加*适当的*空间音效来增加混合现实体验的*真实感*和*沉浸感*。我使用“适当的”这个词是因为错误使用空间音效可能会令人厌烦和刺耳。避免使用响亮、令人不悦的噪音。为碰撞的物体、被点击的按钮以及移动的全息图添加微妙的音频效果。可以把空间音效想象成影子。我们平时并不会真正留意影子，但当真实物体的影子被移除时，场景会变得奇怪且“不对劲”。同样，在虚拟环境中缺乏适当的音频效果会使其看起来不真实。空间音效的存在可能不会被注意到，但就像影子一样，它们对于完整体验是必要的。空间音效的意图不应是引起对声音本身的注意，而是让用户感到舒适并沉浸在其体验中。\n\
  \n只要有可能，您应该在混合现实应用程序中*将所有声音空间化*。在物理现实中，所有声音都是空间化的——来自一个或多个声源。混合现实应用程序应该让用户沉浸在 3D\
  \ 体验中——不仅仅是视觉上，听觉上也应如此。\n\n#### 使用空间音效应避免什么\n\n与数字全息图一样，您可以在 Unity 中使用空间音效做一些违背物理定律的事情。有时，这些效果可以为您的应用程序增添特殊优势。但是，如果没有经过仔细测试和考量，它们可能会给用户带来不自然甚至不舒服的体验。\n\
  \n*应极少使用*，甚至最好避免使用不可见的音频源*或发射器*。当将音频源附加到不可见的对象上时，我们的听觉能够精确定位音频的来源。然而，当用户看向声音传来的位置，却没有看到任何可见的物体时，这可能会成为一种令人不安的体验。\n\
  \n不要混合太多声音，并且*避免让 2D 声音盖过空间音效*。正如本章前面所述，设备通过对声波进行细微修改来实现空间音效效果。当这些效果被背景音乐等环境噪音掩盖或淹没时，空间音效体验就会下降。当需要混合多个声音源时，请确保空间音效的声音比任何环境声音都大。\n\
  \n*尽量少用合成或人工声音*。当声音不自然时，用户可能对声音的来源缺乏强烈的直觉。相反，应使用自然声音，如鸟鸣、按钮的咔哒声、人的说话声以及其他录制的声音。在设计空间音效体验时，*要利用人类的直觉或预期*。例如，人的声音很可能出现在正常人的身高范围内——因此，可以利用人声引导用户观看大致在视线水平的东西。对于用户上方的物体，可以使用树叶沙沙声或鸟鸣声。\n\
  \n\n## 总结\n\n恭喜！在本章中，你学习了混合现实开发中空间声音的工作原理。我们详细讲解了`HoloToolkit`中包含的一个可运行的空间声音示例，学习了如何在你的应用中实现空间声音，并掌握了一些在应用中设计空间声音的最佳实践。现在，你已经具备了在应用中开始实现出色空间音频体验所需的工具！\n\
  \n在开发应用时，声音设计很容易被忽视优先级，甚至完全被遗忘。然而，我无论如何强调在混合现实开发中优秀声音设计的重要性都不为过。我至今仍记得在一次视频编辑课程中，一位教授给我的中肯建议：\n\
  \n> *如果音频质量好，人们会原谅糟糕的视频。如果音频质量差，即使视频再出色，人们也不会原谅。*\n> \n> *——弗雷德·梅茨格*\n\n声音设计至关重要，应从应用设计之初就将其视为一部分，而非事后才考虑的因素。\n\
  \n"
- '# 第三部分：成长为全息开发者


  '
- "# 8. Azure Spatial Anchors\n\n在本章中，你将学习如何使用 Azure Spatial Anchors。我们将学习如何在混合现实中锚定对象以体验真实世界；你还将探索启动和停止\
  \ Azure Spatial Anchors 会话、以及在 HoloLens 2 上创建、上传和下载 Azure Spatial Anchors 所需的各个步骤。\n\
  \n## 什么是 Azure Spatial Anchors？\n\nAzure Spatial Anchors 是一个跨平台服务，允许开发者通过在不同设备上随时间保持其位置的对象来创建混合现实体验。该服务使开发者能够构建具有空间感知能力的混合现实应用。这些应用可支持\
  \ Microsoft HoloLens、基于 ARKit 的 iOS 设备以及基于 ARCore 的 Android 设备。开发者现在可以开发能够感知空间、指定有效兴趣点，并通过支持的设备回忆这些兴趣点的应用。这些兴趣点被称为空间锚点（Spatial\
  \ Anchors）。\n\nAzure Spatial Anchors 依赖于混合现实/增强现实追踪器。这些追踪器通过摄像头感知周围环境，并在设备穿越空间时以六自由度（6DoF）追踪设备位置。当创建一个空间锚点时，客户端\
  \ SDK 会收集锚点周围的环境信息并将其传输到服务端。如果任何其他设备在同一空间查找该锚点，类似的记录会被传输到服务端。该记录会与之前存储的环境数据进行匹配。然后，锚点相对于设备的位置会被发回，用于应用之中。\n\
  \n## Azure Spatial Anchors 教程\n\n### 第一步：创建新的 Unity 场景\n\n首先创建一个新的 Unity 项目（参考第\
  \ 2 章），将其命名为`\"Azure Spatial Anchors Tutorial\"`并保存场景，为其取一个你喜欢的名称，并确保按照第 3 章所述将\
  \ Unity 设置为混合现实开发环境。\n\n### 第二步：安装内置 Unity 包\n\n在这一步中，你将学习安装 Unity 内置包`AR Foundation`，因为\
  \ Azure Spatial Anchors 需要它。`AR Foundation`允许你在 Unity 中以跨平台方式使用增强现实平台。\n\n在 Unity\
  \ 菜单中，选择`Window ➤ Package Manager`打开`Package Manager`窗口，如图 8-1 所示。然后选择`AR Foundation`并点击`Install`按钮安装该包。请参考图\
  \ 8-2。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig2_HTML.jpg](img/441101_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n你会看到`AR Foundation`具有特定版本；点击安装按钮进行安装。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig1_HTML.jpg](img/441101_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n选择窗口按钮后，你会看到包管理器界面。\n\n### 第三步：下载并导入教程资源\n\n在这一步中，你将下载并导入一些用于测试项目的基本资源文件夹；你可以参考第\
  \ 3 章来重温如何导入 Unity 包。\n\n按列出的顺序下载并导入以下资源包：\n\n*   [AzureSpatialAnchors.unitypackage](https://github.com/Azure/azure-spatial-anchors-samples/releases/download/v2.2.1/AzureSpatialAnchors.unitypackage)（版本\
  \ 2.2.1）\n\n*   [MRTK.HoloLens2.Unity.Tutorials.Assets.GettingStarted.2.4.0.unitypackage](https://github.com/microsoft/MixedRealityLearning/releases/download/getting-started-v2.4.0/MRTK.HoloLens2.Unity.Tutorials.Assets.GettingStarted.2.4.0.unitypackage)\n\
  \n*   [MRTK.HoloLens2.Unity.Tutorials.Assets.AzureSpatialAnchors.2.4.0.unitypackage](https://github.com/microsoft/MixedRealityLearning/releases/download/azure-spatial-anchors-v2.4.0/MRTK.HoloLens2.Unity.Tutorials.Assets.AzureSpatialAnchors.2.4.0.unitypackage)\n\
  \n导入教程资源后，你的项目窗口应类似于图 8-3 所示。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig3_HTML.jpg](img/441101_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n在项目窗口中，导入 Unity 包后会添加三个额外的文件夹。\n\n### 第四步：准备场景\n\n在这一步中，你将通过添加上一步导入的一些预制件来配置场景，以测试\
  \ Azure Spatial Anchors 应用。\n\n在项目窗口中，导航到`Assets ➤ MRTK.Tutorials.AzureSpatialAnchors\
  \ ➤ Prefabs`文件夹，然后点击并拖动以下预制件到层级窗口中，以将它们添加到场景中：\n\n*   `ButtonParent` 预制件\n\n*  \
  \ `DebugWindow` 预制件\n\n*   `Instructions` 预制件\n\n*   `ParentAnchor` 预制件\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig4_HTML.jpg](img/441101_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n按住 Shift 键选中全部四个预制件，然后拖放到层级窗口中。\n\n\n\n### 第 5 步：配置按钮以操作场景\n\n在此步骤中，您将通过添加脚本配置按钮，以演示本地锚点和`Azure\
  \ Spatial Anchors`在应用程序中的基本行为。\n\n为了在屏幕上持久地布局全息图和对象，设备必须能够理解您的周围环境，然后允许您将对象放置在环境中。当您启动`Azure\
  \ Session`时，它会扫描您的环境并获取空间映射。通过这种方式，您可以确定锚点的位置。移动平台（iOS 和 Android）需要提示其摄像头扫描环境，而`HoloLens`则持续监控环境。要启动`Azure\
  \ Session`，请遵循以下说明。\n\n在`Hierarchy`窗口中，展开`ButtonParent`对象，并选择名为`StartAzureSession`的第一个子对象。然后，在`Inspector`窗口中导航到`Button\
  \ Config Helper (Script)`。按照图 8-5 所示，配置附加到该脚本的`OnClick()`事件。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig5_HTML.jpg](img/441101_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n在`Inspector`窗口中，我们可以在`Basic Events`下找到`On Click()`事件。\n\n现在，我们必须配置`StartAzureSession`按钮的`On\
  \ Click`事件。\n\n选择`ParentAnchor`对象，并将其拖放到`On Click`事件中的`None (Object)`字段。参考图 8-6。\n\
  \n从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `StartAzureSession()`，将此函数设置为事件触发时要执行的操作。参考图\
  \ 8-7。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig7_HTML.jpg](img/441101_2_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n在下拉列表中，选择`AnchorModuleScript` ➤ `StartAzureSession()`函数。\n\n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig6_HTML.jpg](img/441101_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\n将`ParentAnchor`拖放到`Basic Events`下`On Click`事件中的`None (Object)`字段。\n\n\
  要停止`Azure Session`，您可以点击`StopAzureSession`按钮，这将停止环境处理及所有观察程序。要配置`StopAzureSession`按钮，请遵循给定的说明。\n\
  \n在`Hierarchy`窗口中，选择下一个名为`StopAzureSession`的按钮；然后在`Inspector`窗口中，按如下方式配置`Button\
  \ Config Helper (Script)`组件的`OnClick()`事件：\n\n*   将`ParentAnchor`对象分配给`None (Object)`字段。\n\
  *   从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `StopAzureSession()`，将此函数设置为事件触发时要执行的操作。\n\
  \n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig8_HTML.jpg](img/441101_2_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\n配置`StopAzureSession`按钮的`On Click`事件。\n\n如果您希望在不同平台上将全息图或对象持久地放置在环境中，则需要创建可永久放置的锚点。您可以通过点击`CreateAzureAnchor`按钮来创建锚点。以下说明将指导您完成此过程。\n\
  \n在`Hierarchy`窗口中，选择名为`CreateAzureAnchor`的按钮；然后在`Inspector`窗口中，按如下方式配置`Button Config\
  \ Helper (Script)`组件的`OnClick()`事件：\n\n*   将`ParentAnchor`对象分配给`None (Object)`字段。\n\
  *   从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `CreateAzureAnchor()`，将此函数设置为事件触发时要执行的操作。\n\
  *   将`ParentAnchor`对象分配给空的`None (Game Object)`字段，使其作为`CreateAzureAnchor()`函数的参数。\n\
  \n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig9_HTML.jpg](img/441101_2_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n配置`CreateAzureAnchor`按钮的`On Click()`事件。\n\n如果您对已创建的锚点不满意，可以轻松地先将其移除，然后重新创建。要移除本地锚点，您可以点击`RemoveLocalAnchor`按钮。以下步骤将指导您如何配置`RemoveLocalAnchor`按钮。\n\
  \n同样，在`Hierarchy`窗口中，选择下一个名为`RemoveLocalAnchor`的按钮；然后在`Inspector`窗口中，按如下方式配置`Button\
  \ Config Helper (Script)`组件的`OnClick()`事件：\n\n*   将`ParentAnchor`对象分配给`None (Object)`字段。\n\
  *   从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `RemoveLocalAnchor()`，将此函数设置为事件触发时要执行的操作。\n\
  *   将`ParentAnchor`对象分配给空的`None (Game Object)`字段，使其作为`RemoveLocalAnchor()`函数的参数。\n\
  \n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig10_HTML.jpg](img/441101_2_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n\n配置`RemoveLocalAnchor`按钮的`On Click`事件。\n\n能够定位之前保存的锚点是使用`Azure Spatial\
  \ Anchors`的原因之一。`Azure Spatial Anchors`利用会话期间收集的信息来定位环境中先前保存的锚点。您可以使用`FindAzureAnchor`按钮执行此功能。请按照以下步骤配置`FindAzureAnchor`按钮。\n\
  \n在`Hierarchy`窗口中，选择名为`FindAzureAnchor`的按钮；然后在`Inspector`窗口中，按如下方式配置`Button Config\
  \ Helper (Script)`组件的`OnClick()`事件：\n\n*   将`ParentAnchor`对象分配给`None (Object)`字段。\n\
  *   从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `FindAzureAnchor()`，将此函数设置为事件触发时要执行的操作。\n\
  \n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig11_HTML.jpg](img/441101_2_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n\n配置`FindAzureAnchor`按钮的`On Click`事件。\n\n如果创建的锚点不再使用，在开发过程中删除这些锚点是一种良好的实践，因为它有助于保持资源整洁并避免将来的混淆。要删除您的锚点，您可以点击`DeleteAzureAnchor`按钮。以下步骤将指导您如何配置`DeleteAzureAnchor`按钮。\n\
  \n同样，在`Hierarchy`窗口中，选择下一个名为`DeleteAzureAnchor`的按钮；然后在`Inspector`窗口中，按如下方式配置`Button\
  \ Config Helper (Script)`组件的`OnClick()`事件：\n\n*   将`ParentAnchor`对象分配给`None (Object)`字段。\n\
  *   从`No Function`下拉菜单中，选择`AnchorModuleScript` ➤ `DeleteAzureAnchor()`，将此函数设置为事件触发时要执行的操作。\n\
  \n![../images/441101_2_En_8_Chapter/441101_2_En_8_Fig12_HTML.jpg](img/441101_2_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n配置`DeleteAzureAnchor`按钮的`On Click`事件。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n译文：\n\n\n### 步骤 6：将场景连接到 Azure 资源\n\n在此步骤中，我们将把已创建的场景连接到在 Azure 门户中创建的空间定位点（Azure\
  \ 资源）。创建 Azure 资源后，您将获得访问密钥和帐户 ID。\n\n**注意：**  \n请参考以下链接创建一个空间定位点资源，从中可以获取访问密钥和账户\
  \ ID：[`https://docs.microsoft.com/en-us/azure/spatial-anchors/quickstarts/get-started-unity-hololens?tabs=azure-portal#create-a-spatial-anchors-resource`](https://docs.microsoft.com/en-us/azure/spatial-anchors/quickstarts/get-started-unity-hololens%253Ftabs%253Dazure-portal%2523create-a-spatial-anchors-resource)\n\
  \n在 `Hierarchy` 窗口中，选择 `ParentAnchor` 对象；随后在 `Inspector` 窗口中，找到 `Spatial Anchor\
  \ Manager (Script)` 组件。在此处，您将找到两个空白字段：`Spatial Anchors Account Id` 字段和 `Spatial\
  \ Anchors Account Key` 字段。\n\n- 在 `Spatial Anchors Account Id` 字段中，粘贴来自 Azure 空间定位点帐户的帐户\
  \ ID。\n- 在 `Spatial Anchors Account Key` 字段中，粘贴来自 Azure 空间定位点帐户的主访问密钥或辅助访问密钥。\n\n\
  ![图 8-13](img/441101_2_En_8_Fig13_HTML.jpg)  \n*图 8-13*  \n为 `ParentAnchor` 对象添加相关的\
  \ Azure 空间定位点资源凭据。\n\n### 步骤 7：在设备上测试应用程序\n\n您无法在 Unity 编辑器中运行 Azure 空间定位点，因此要测试\
  \ Azure 空间定位点的功能，您需要构建项目并将应用部署到您的设备。\n\n当应用程序在设备上加载后，请遵循以下说明：\n\n- 将立方体移动到另一个位置。\n\
  - 启动 Azure 会话。\n- 创建 Azure 锚点（在立方体的位置创建一个锚点）。\n- 停止 Azure 会话。\n- 移除本地锚点（允许用户移动立方体）。\n\
  - 将立方体移动到其他位置。\n- 启动 Azure 会话。\n- 查找 Azure 锚点（将立方体定位到步骤 3 中的位置）。\n- 删除 Azure 锚点。\n\
  - 停止 Azure 会话。\n\n您也可以在 Unity 场景中的 `Instruction` 面板中找到这些说明。\n\n**注意：**  \nAzure\
  \ 空间定位点使用互联网来保存和加载锚点数据，因此请确保您的设备已连接到互联网。\n\n## 总结\n\n恭喜！在本章中，您学习了如何对锚点执行各种操作。我们逐步介绍了在场景中创建、移除、查找和删除空间定位点的方法。现在，您已经掌握了在应用程序中开始实现空间定位点所需的工具。\n\
  \n"
- "# 9. 共享体验\n\n在本章中，我们将学习使用 Photon Unity 网络（PUN）构建多用户体验的基础知识。PUN 是混合现实开发人员可用来创建共享体验的多种网络选项之一。\n\
  \n## 什么是共享体验？\n\n共享体验顾名思义，就是与他人看到、听到或做着相同的事情。在这里，您将使用 Photon 平台共享彼此的交互。\n\n共享体验能够创造归属感，无论大小如何，并提供机会将我们的关系提升到更高水平的信任和亲密度。\n\
  \n## 多用户功能教程\n\n在本节中，我将引导您完成一个教程，了解多用户功能在混合现实应用程序中的工作原理。\n\n## 设置 Photon Unity 网络\n\
  \n在本节中，您将为使用 Photon Unity 网络（PUN）创建共享体验做准备。您将学习如何创建 PUN 应用，将 PUN 资源导入到 Unity 项目中，以及将\
  \ Unity 项目连接到 PUN 应用。\n\n### 步骤 1：创建新的 Unity 场景\n\n我们将创建一个新的 Unity 项目（参考第 2 章），将其命名为\
  \ `MultiUserCapabilities`，保存您的场景，并为其指定一个您喜欢的名称，同时确保按照第 3 章所述，为混合现实开发设置好 Unity。\n\
  \n### 步骤 2：启用附加功能\n\n在此步骤中，您将学习启用 `Internet Client Server` 功能和 `Private Network\
  \ Client Server` 功能，这是共享彼此交互所必需的。在 Unity 菜单中，选择 `Edit ➤ Project Settings` 打开 `Player\
  \ Settings` 窗口，然后找到 `Player ➤ Publishing Settings` 部分（图 9-1）。\n\n![图 9-1](img/441101_2_En_9_Fig1_HTML.jpg)\
  \  \n*图 9-1*  \n启用 `Internet Client Server` 和 `Private Network Client Server` 功能。\n\
  \n在 `Publishing Settings` 中，向下滚动到 `Capabilities` 部分，并再次确认在早期配置 Unity 项目步骤中启用的 `InternetClient`、`Microphone`、`SpatialPerception`\
  \ 和 `GazeInput` 功能已启用。\n\n然后启用以下附加功能：\n\n- `InternetClientServer` 功能\n- `PrivateNetworkClientServer`\
  \ 功能\n\n### 步骤 3：安装 Unity 内置包\n\n在此步骤中，您将学习安装 Unity 内置包 `AR Foundation`。`AR Foundation`\
  \ 允许您在 Unity 中以跨平台的方式处理增强现实平台。在 Unity 菜单中，选择 `Window ➤ Package Manager` 打开 `Package\
  \ Manager` 窗口，然后选择 `AR Foundation`，并点击 `Install` 按钮来安装该包（图 9-2）。\n\n![图 9-2](img/441101_2_En_9_Fig2_HTML.jpg)\
  \  \n*图 9-2*  \n您将看到带有特定版本的 `AR Foundation`；点击 `Install` 按钮进行安装。\n\n\n\n### 步骤 4：导入教程资源\n\
  \n将 `AzureSpatialAnchors` SDK V2.7.1 添加到你的 Unity 项目中（你需要参阅第 3 章——Unity 包管理器使用清单文件\
  \ `manifest.json`）。在与 `Dependencies` 部分同级的文件顶部，添加清单 9-1 以将 Azure Spatial Anchors\
  \ 注册表包含到你的项目中。`scopedRegistries` 条目告诉 Unity 在哪里查找 Azure Spatial Anchors SDK 包。\n\
  \n```\n{\n\"scopedRegistries\": [\n{\n\"name\": \"Azure Mixed Reality Services\"\
  ,\n\"url\": \"https://api.bintray.com/npm/microsoft/AzureMixedReality-NPM\",\n\"\
  scopes\": [\n\"com.microsoft.azure.spatial-anchors-sdk\"\n]\n}\n],\n\"dependencies\"\
  : {\n\"com.microsoft.azure.spatial-anchors-sdk.android\": \"2.7.1\",\n\"com.microsoft.azure.spatial-anchors-sdk.ios\"\
  : \"2.7.1\",\n\"com.microsoft.azure.spatial-anchors-sdk.windows\": \"2.7.1\",\n\
  Listing 9-1.\n将 Azure Spatial Anchors 注册表包含到项目中的代码\n```\n\n（导入 `MultiUserCapabilities`\
  \ 教程资源包后，你会在控制台窗口中看到几个 `CS0246` 错误，提示类型或命名空间缺失。这是预期行为，将在下一节导入 PUN 资源时得到解决。）\n\n\
  要添加这些包，请按列出的顺序下载并导入以下 Unity 自定义包（如有需要，可参阅第 4 章了解操作方法）：\n\n- `MRTK.HoloLens2.Unity.Tutorials.Assets.GettingStarted.2.5.0.1.unitypackage`\n\
  - `MRTK.HoloLens2.Unity.Tutorials.Assets.MultiUserCapabilities.2.4.0.unitypackage`\n\
  \n导入教程资源后，你的项目窗口应类似于图 9-3 所示。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig3_HTML.jpg](img/441101_2_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n导入教程资源后，你的项目窗口应类似于这样\n\n### 步骤 5：导入 PUN 资源\n\nPUN 使你能够向网络添加多用户功能，并快速在全球范围内启动它们。在\
  \ Unity 菜单中，选择 `Window` ➤ `Asset Store` 打开资源商店窗口，搜索并选择 Exit Games 的 `PUN 2 - FREE`，然后点击下载按钮将资源包下载到你的\
  \ Unity 账户。下载完成后，点击导入按钮打开导入 Unity 包窗口（图 9-4）。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig4_HTML.jpg](img/441101_2_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\n将 PUN 资源导入到你的项目\n\n在导入 Unity 包窗口中，点击全部按钮确保所有资源都被选中，然后点击导入按钮导入资源。Unity\
  \ 完成导入过程后，PUN 向导窗口将出现并加载 PUN 设置菜单；你可以暂时忽略或关闭此窗口（图 9-5）。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig5_HTML.jpg](img/441101_2_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\nPUN 向导窗口\n\n### 步骤 6：创建 PUN 应用程序\n\n在本节中，如果你还没有 Photon 账户，你将创建一个，并创建一个新的\
  \ PUN 应用。导航到 Photon 仪表盘（`https://cutt.ly/4nUQsgb`），如果你已有想使用的账户，请登录；否则，点击“创建一个”链接，并按照说明注册一个新账户（图\
  \ 9-6）。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig6_HTML.jpg](img/441101_2_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n登录 PUN 应用程序\n\n登录后，点击“创建新应用”按钮。在“创建新应用程序”页面上，输入如图 9-7 所示的以下值：\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig7_HTML.png](img/441101_2_En_9_Fig7_HTML.png)\n\
  \n图 9-7\n\n创建 PUN 应用程序\n\n- 对于“Photon 类型”，选择 `Photon PUN`。\n- 对于“名称”，输入一个合适的名称，例如\
  \ `MRTK Tutorials`。\n- 对于“描述”，可选地输入一个合适的描述。\n- 对于“Url”，将该字段留空。\n\n然后点击“创建”按钮创建新应用。\n\
  \nPhoton 完成创建过程后，新的 PUN 应用将出现在你的仪表盘上。\n\n### 步骤 7：将 Unity 项目连接到 PUN 应用程序\n\n在本节中，你将把\
  \ Unity 项目连接到上一节中创建的 PUN 应用。在 Photon 仪表盘上，点击“App ID”字段以显示应用 ID，然后将其复制到剪贴板（图 9-8）。\n\
  \n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig8_HTML.jpg](img/441101_2_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\nPUN 应用程序 ID\n\n在 Unity 菜单中，选择 `Window` ➤ `Photon Unity Networking` ➤\
  \ `PUN Wizard` 打开 PUN 向导窗口，然后点击“设置项目”按钮打开 PUN 设置菜单。在 `AppId or Email` 字段中，粘贴上一步复制的\
  \ PUN 应用 ID。然后点击“设置项目”按钮应用该应用 ID（图 9-9）。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig9_HTML.jpg](img/441101_2_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n将 PUN 应用程序 ID 粘贴到“将 Unity 项目连接到 PUN 应用程序”\n\nUnity 完成 PUN 设置过程后，PUN 设置菜单将显示“完成！”消息，并自动在项目窗口中选择\
  \ `PhotonServerSettings` 资源，以便在检查器窗口中显示其属性（图 9-10）。\n\n**注意**\n\n设置可能已经显示，但要更新属性，你需要关闭它并重新打开。\n\
  \n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig10_HTML.jpg](img/441101_2_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n确认 Unity 项目与 PUN 应用程序已连接的消息\n\n## 连接多个用户\n\n在本节中，你将学习如何连接多个用户以进行实时共享体验。学完本节后，你将能够在多个设备上运行应用程序，并使每个用户看到其他用户的头像实时移动。\n\
  \n### 步骤 1：准备场景\n\n在项目窗口中，导航到 `Assets` ➤ `MRTK.Tutorials.MultiUserCapabilities`\
  \ ➤ `Prefabs` 文件夹，然后点击并将以下预制体拖入层级窗口以将它们添加到你的场景中：\n\n- `NetworkLobby` 预制体\n- `SharedPlayground`\
  \ 预制体\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig11_HTML.jpg](img/441101_2_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n将 `NetworkLobby` 和 `SharedPlayground` 预制体添加到场景中\n\n在项目窗口中，导航到 `Assets`\
  \ ➤ `MRTK.Tutorials.AzureSpatialAnchors` ➤ `Prefabs` 文件夹，然后点击并将 `DebugWindow` 预制体拖入层级窗口以将其添加到你的场景中（图\
  \ 9-12）。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig12_HTML.jpg](img/441101_2_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n将 `DebugWindow` 预制体添加到场景中\n\n\n### 第 2 步：创建并配置用户\n\n-   在`Hierarchy`窗口中，右键单击空白区域，选择`Create\
  \ Empty`（创建空对象）向场景中添加一个空对象，将其命名为`PhotonUser`，并按如下方式进行配置：\n\n确保`Transform Position`设置为`X\
  \ = 0, Y = 0, Z = 0`。\n\n![../images/441101_2_En_9_Chapter/441101_2_En_9_Fig13_HTML.jpg](img/441101_2_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n创建`PhotonUser`组件，并将`Photon User (Script)`（光子用户脚本）添加到该组件中。\n\n-   在`Hierarchy`窗口中，选中`PhotonUser`对象；然后在`Inspector`窗口中，使用`Add\
  \ Component`（添加组件）按钮将`Photon User (Script)`组件添加到`PhotonUser`对象上（图 9-13）。\n\n-  \
  \ 在`Inspector`窗口中，使用`Add Component`按钮将`Generic Net Sync (Script)`（通用网络同步脚本）组件添加到`PhotonUser`对象上，并按如下方式配置：\n\
