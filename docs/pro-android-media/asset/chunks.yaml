  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和格式要求，将给定的英文文本翻译成中文。\n\n\n当然，在此示例中，我们需要指定访问互联网和使用位置的权限。在添加了相应的\
    \ `uses-permission` 标签后，此示例的 `AndroidManifest.xml` 文件如下所示：\n\n```\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    package=\"com.apress.proandroidmedia.ch12.flickrjsonlocation\"\n    android:versionCode=\"\
    1\"\n    android:versionName=\"1.0\">\n\n    <application android:icon=\"@drawable/icon\"\
    \ android:label=\"@string/app_name\">\n        <activity android:name=\".FlickrJSONLocation\"\
    \n                  android:label=\"@string/app_name\">\n            <intent-filter>\n\
    \                <action android:name=\"android.intent.action.MAIN\" />\n    \
    \            <category android:name=\"android.intent.category.LAUNCHER\" />\n\
    \            </intent-filter>\n        </activity>\n    </application>\n\n   \
    \ <uses-sdk android:minSdkVersion=\"4\" />\n\n    <uses-permission android:name=\"\
    android.permission.ACCESS_COARSE_LOCATION\" />\n    <uses-permission android:name=\"\
    android.permission.INTERNET\" />\n\n</manifest>\n```\n\n正如我们所看到的，仅仅在应用程序中关注位置信息，就能让我们创建出非常动态的体验。在此例中，当用户四处移动时，他/她会看到通过\
    \ Flickr 提供的一系列全新的“狗，万圣节”照片，如图 12-2 所示。\n\n**图 12-2.** *显示来自 Flickr、在我当前位置附近拍摄并标记了“dog”和“halloween”的图像*\n\
    \n现在，让我们把注意力转回到网络服务协议上，讨论一下 REST。\n\n## REST\n\nREST 全称是 Representational State\
    \ Transfer（表述性状态转移）。它是一套用于设计客户端-服务器服务的架构原则。通常，一个网络服务在满足以下条件时，会被认为是“RESTful”的，即遵循\
    \ REST 原则：\n\n-   使用 HTTP 方法（`GET`、`POST`）\n-   是无状态的，这意味着每个事务都独立于其他事务\n-   使用目录风格的\
    \ URL 来传递数据，而不是查询字符串变量（使用 `www.afakeurl.com/shawn/van_every` 而不是 `www.afakeurl.com/?firstname=shawn&lastname=van_every`）\n\
    -   使用 XML（或 JSON）来传输数据\n\n要了解更多关于基于 REST 的网络服务架构，可以参阅 IBM developerWorks 上 Alex\
    \ Rodriguez 撰写的一篇文章，题为“RESTful Web Services: The Basics”：[www.ibm.com/developerworks/webservices/library/ws-restful/](http://www.ibm.com/developerworks/webservices/library/ws-restful/)\n\
    \n我们在这里讨论 REST 的原因是，它通常与 XML 结合使用来传输网络服务数据。尽管在 Flickr 的示例中我们没有使用 XML 选项，而是选择了\
    \ JSON，但我们本也可以那么做。待传输数据的 XML 表示结构无需遵循严格的文档类型定义（DTD）或 XML 模式，通常由构建网络服务的那些服务根据需求创建和记录。\n\
    \n### 在 XML 中表示数据\n\n以下是一个 XML 文档示例，它在理论上的网络服务中定义了一个“用户”。该文档是对一个使用 `user-id` 查询用户信息请求的响应。\n\
    \n```\n<?xml version=\"1.0\"?>\n<user>\n    <user-id>15</user-id>\n    <username>vanevery</username>\n\
    \    <firstname>Shawn</firstname>\n    <lastname>Van Every</lastname>\n</user>\n\
    ```\n\nAndroid 默认提供几种不同的 XML 解析方式。这些方式包括两种主要方法： SAX（Simple API for XML，XML 简单应用程序接口）和\
    \ DOM（Document Object Model，文档对象模型），以及其他方法。在移动设备上，SAX 通常比 DOM 更受青睐，因为它按顺序读取 XML，允许在读取\
    \ XML 的同时对其进行操作。\n"
- fmt: "# 排版后的内容\n\n使用 DOM 会在内存中以对象的形式创建 XML 的表示形式，如果 XML 很大，这可能会花费很长时间并占用大量内存。\n\n\
    ## SAX 解析\n\n要在 Android 上使用内置的 SAX 解析器，我们首先需要创建一个继承 `DefaultHandler` 的类。这个类包含的方法会在\
    \ XML 元素开始、结束以及读取内容时得到通知。以下是一个仅记录输出的极简版本：\n\n```java\nprivate class XMLHandler\
    \ extends DefaultHandler {\n\n    @Override\n    public void startDocument() throws\
    \ SAXException {\n        Log.v(\"SimpleXMLParser\",\"startDocument\");\n    }\n\
    \n    @Override\n    public void endDocument() throws SAXException {\n       \
    \ Log.v(\"SimpleXMLParser\",\"endDocument\");\n    }\n\n    @Override\n    public\
    \ void startElement(String uri, String localName, String qName, Attributes attributes)\
    \ throws SAXException {\n        Log.v(\"SimpleXMLParser\",\"startElement \" +\
    \ localName);\n    }\n\n    @Override\n    public void endElement(String uri,\
    \ String localName, String qName) throws SAXException {\n        Log.v(\"SimpleXMLParser\"\
    ,\"endElement \" + localName);\n    }\n\n    @Override\n    public void characters(char[]\
    \ ch, int start, int length) throws SAXException {\n        String stringChars\
    \ = new String(ch, start, length);\n        Log.v(\"SimpleXMLParser\",stringChars);\n\
    \    }\n}\n```\n\n有了这个类之后，我们可以创建一个 `SAXParserFactory` 实例，然后再创建一个 `SAXParser` 实例：\n\
