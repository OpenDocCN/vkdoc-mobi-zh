    \ = getContentResolver().insert(\n        Media.EXTERNAL_CONTENT_URI, new ContentValues());\n\
    \    try {\n        OutputStream imageFileOS = getContentResolver()\n        \
    \    .openOutputStream(imageFileUri);\n        imageFileOS.write(data);\n    \
    \    imageFileOS.flush();\n        imageFileOS.close();\n    } catch (FileNotFoundException\
    \ e) {\n    } catch (IOException e) {\n    }\n    camera.startPreview();\n}\n\
    ```\n\nIn the foregoing snippet, we are inserting a new record into the `MediaStore`\
    \ and given a URI in return. This URI is what we can subsequently use to obtain\
    \ an `OutputStream` to write the JPEG data to. This creates a file in the location\
    \ specified by the `MediaStore` and links it to the new record.\n\nIf we wanted\
    \ to update the metadata stored in the `MediaStore` record later, we can update\
