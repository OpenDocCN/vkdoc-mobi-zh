- fmt: "## Chapter 1: Introduction to Android Imaging\n\nHere is a method called `getBitmap`,\
    \ which encapsulates the image scaling and loading that we need to do in order\
    \ to display these images without running into memory problems as discussed earlier\
    \ in the chapter.\n\n```\nprivate Bitmap getBitmap(String imageFilePath)\n{\n\
    \    // Load up the image's dimensions not the image itself\n    BitmapFactory.Options\
    \ bmpFactoryOptions = new BitmapFactory.Options();\n    bmpFactoryOptions.inJustDecodeBounds\
    \ = true;\n    Bitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \n    int heightRatio = (int) Math.ceil(bmpFactoryOptions.outHeight\n        \
    \    / (float) DISPLAYHEIGHT);\n    int widthRatio = (int) Math.ceil(bmpFactoryOptions.outWidth\n\
    \            / (float) DISPLAYWIDTH);\n\n    Log.v(\"HEIGHTRATIO\", \"\" + heightRatio);\n\
    \    Log.v(\"WIDTHRATIO\", \"\" + widthRatio);\n\n    // If both of the ratios\
    \ are greater than 1, one of the sides of\n    // the image is greater than the\
    \ screen\n    if (heightRatio > 1 && widthRatio > 1) {\n        if (heightRatio\
    \ > widthRatio) {\n            // Height ratio is larger, scale according to it\n\
    \            bmpFactoryOptions.inSampleSize = heightRatio;\n        } else {\n\
    \            // Width ratio is larger, scale according to it\n            bmpFactoryOptions.inSampleSize\
    \ = widthRatio;\n        }\n    }\n\n    // Decode it for real\n    bmpFactoryOptions.inJustDecodeBounds\
    \ = false;\n    bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \    return bmp;\n}\n```\n\nThe following is the layout XML that goes along with\
    \ the foregoing activity. It should be put in the `res/layout/main.xml` file.\n\
    \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    \n    >\n    <ImageButton android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/ImageButton\"></ImageButton>\n    <TextView\n\
    \        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/TitleTextView\"\n        android:text=\"\
    Image Title\"/>\n</LinearLayout>\n```\n\n### Internal Metadata\n\nEXIF, which\
    \ stands for exchangeable image file format, is a standard way of saving metadata\
    \ within an image file. Many digital cameras and desktop applications support\
    \ the use of EXIF data. Since EXIF data is actually a part of the file, it shouldn’t\
    \ get lost in the transfer of the file from one place to another. For instance,\
    \ when copying a file from the SD card of the Android device to a home computer,\
    \ this data would remain intact. If you open the file in an application such as\
    \ iPhoto, the data will be present.\n\nIn general, EXIF data is very technically\
    \ orientated; most of the tags in the standard relate to data about the capturing\
    \ of the image itself, such as `ExposureTime` and `ShutterSpeedValue`.\n\nThere\
    \ are some tags, though, that make sense for us to consider filling in or modifying.\
    \ Some of these might include the following:\n\n- `UserComment`: A comment generated\
    \ by the user\n- `ImageDescription`: The title\n- `Artist`: Creator or taker of\
    \ image\n- `Copyright`: Copyright holder of image\n- `Software`: Software used\
    \ to create image\n\nFortunately, Android provides us a nice means to both read\
    \ and write EXIF data. The main class for doing so is `ExifInterface`.\n\nHere’s\
    \ how to use `ExifInterface` to read specific EXIF data from an image file:\n\n\
    ```\nExifInterface ei = new ExifInterface(imageFilePath);\nString imageDescription\
    \ = ei.getAttribute(\"ImageDescription\");\nif (imageDescription != null)\n{\n\
    \    Log.v(\"EXIF\", imageDescription);\n}\n```\n\nHere is how to save EXIF data\
    \ to an image file using `ExifInterface`:\n\n```\nExifInterface ei = new ExifInterface(imageFilePath);\n\
    ei.setAttribute(\"ImageDescription\",\"Something New\");\n```\n\n`ExifInterface`\
    \ includes a set of constants that define the typical set of data that is automatically\
    \ included in captured images by the Camera application.\n\nThe latest version\
    \ of the EXIF specification is version 2.3 from April 2010. It is available online\
    \ here: [www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf](http://www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf).\n\
    \n### Summary\n\nThroughout this chapter, we looked at the basics of image capture\
    \ and storage on Android. We saw how powerful using the built-in Camera application\
    \ on Android could be and how to effectively leverage its capabilities through\
    \ an intent. We saw that the Camera application offers a nice and consistent interface\
    \ for adding image capture capabilities into any Android application.\n\nWe also\
    \ looked at the need to be conscious of memory usage when dealing with large images.\
    \ We learned that the `BitmapFactory` class helps us load scaled versions of an\
    \ image in order to conserve memory. The need to pay attention to memory reminds\
    \ us that mobile phones are not desktop computers with seemingly limitless memory.\n\
    \nWe went over using Android’s built-in content provider for Images, the `MediaStore`.\
    \ We learned how to use it to save images to a standard location on the device\
    \ as well as how to query it to quickly build applications that leverage already\
    \ captured images.\n\nFinally we looked at how we can associate certain metadata\
    \ with images with a standard called EXIF, which is transportable and used in\
    \ a variety of devices and software applications.\n\nThis should give us a great\
    \ starting point for exploring what more we can do with media on Android.\n\n\
    I am looking forward to it!\n\n## Chapter 2: Building Custom Camera Applications\n\
    \nIn the last chapter, we looked at how we can leverage Android’s built-in Camera\
    \ application to provide a ready-made photo capture component in any other application.\
    \ While this provides a standard interface to the end user and is straightforward\
    \ for us the programmers, it doesn’t provide us with much in the way of flexibility.\
    \ For instance, if we wanted our photo capture application to support timelapse\
    \ photography, we couldn’t easily do that using the built-in application.\n\n\
    Fortunately, Android doesn’t limit us to just using the built-in applications\
    \ for accessing the hardware camera. We have as much access to the underlying\
    \ hardware and available methods as the Camera application itself, which allows\
    \ us to use those capabilities in any type of application we would like.\n\nIn\
    \ this chapter, we’ll explore building a photo-taking application utilizing the\
    \ underlying `Camera` class and learn how to exploit the capabilities we are given.\
    \ We’ll go through the steps required to build a few different applications:\n\
    \n- A straightforward point and shoot photo app\n- A countdown-style timer\n-\
    \ A timelapse photo-taking application\n\n### Using the Camera Class\n\nThe `Camera`\
    \ class in Android is what we use to access the camera hardware on the device.\
    \ It allows us to actually capture an image, and through its nested `Camera.Parameters`\
    \ class, we can change set various attributes, such as whether the flash should\
    \ be activated and what value the white balance should be set to.\n\n[http://developer.android.com/reference/android/hardware/Camera.html](http://developer.android.com/reference/android/hardware/Camera.html)"
