    \            AudioTrack.MODE_STREAM);\n\n            audioTrack.play();\n\n  \
    \          short[] buffer = {\n                8130,15752,22389,27625,31134,32695,32210,29711,25354,19410,12253,\n\
    \                4329,-3865,-11818,-19032,-25055,-29511,-32121,-32722,-31276,-27874,\n\
    \                -22728,-16160,-8582,-466\n            };\n\n            while\
    \ (keepGoing) {\n                audioTrack.write(buffer, 0, buffer.length);\n\
    \            }\n\n            return null;\n        }\n    }\n}\n```"
  raw: '### **Audio Synthesis**


    **and Analysis**


    At the end of the last chapter, we looked at a way to capture raw PCM audio and
    play it back using the AudioRecord and AudioTrack classes. In this chapter, we’ll
    continue using those classes to both algorithmically synthesize audio and analyze
    recorded audio.


    **Digital Audio Synthesis**


    Digital audio synthesis is a very broad topic with a great deal of theory, mathematics,
    engineering, and history behind it. Unfortunately, most of the topic overall is
    out of the scope of what can be covered in this book. What we will do is look
    at some basic


    examples on how we can harness a few built-in classes on Android to create audio
    from scratch.


    As you probably know, sound is formed by a repetitive change in pressure in air
    (or other substance) in the form of a wave. Certain frequencies of these oscillations,
    otherwise known as sound waves, are audible, meaning our ears are sensitive to
    that number of repetitions in a period of time. This range is somewhere between
    12 Hz (12 cycles per second), which is a very low sound such as a rumble, and
    20 kHz (20,000 cycles per


    second), which is a very high-pitched sound.


    To create audio, we need to cause the air to vibrate at the frequency desired
    for the sound we want. In the digital realm, this is generally done with a speaker
    that is driven by an analog electric signal. Digital audio systems contain a chip
    or board that performs a digital-to-analog conversion (DAC). A DAC will take in
    data in the form of a series of numbers that represent audio samples and convert
    that into an electrical voltage, which is translated into sound by the speaker.


    In order to synthesize audio, we simply need to synthesize the audio samples and
    feed them to the appropriate mechanism. In the case of Android, that mechanism
    is the


    AudioTrack class.


    **180**


    ## CHAPTER 8: Audio Synthesis and Analysis


    As we learned in the last chapter, the AudioTrack class allows us to play raw
    audio samples (such as those captured by the AudioRecord class).


    **Playing a Synthesized Sound**


    Here is a quick example showing how to construct an AudioTrack class and pass
    in data to play. For a full discussion of the parameters used to construct the
    AudioTrack object, please see the “Raw Audio Playback with AudioTrack” section
    of Chapter 7.


    This example uses an inner class that extends AsyncTask, AudioSynthesisTask.


    AsyncTask defines a method called doInBackground, which runs any code that is
    placed inside it in a thread that is separate from the main thread of the activity.
    This allows the activity and its UI to be responsive, as the loop that feeds the
    write method of our AudioTrack object would otherwise tie it up.


    package com.apress.proandroidmedia.ch08.audiosynthesis;


    import android.app.Activity;


    import android.media.AudioFormat;


    import android.media.AudioManager;


    import android.media.AudioTrack;


    import android.os.AsyncTask;


    import android.os.Bundle;


    import android.view.View;


    import android.view.View.OnClickListener;


    import android.widget.Button;


    public class AudioSynthesis extends Activity implements OnClickListener {


    Button startSound;


    Button endSound;


    AudioSynthesisTask audioSynth;


    boolean keepGoing = false;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    startSound = (Button) this.findViewById(R.id.StartSound);


    startSound.setOnClickListener(this);


    endSound = (Button) this.findViewById(R.id.EndSound);


    endSound.setOnClickListener(this);


    endSound.setEnabled(false);


    }


    @Override


    public void onPause() {


    super.onPause();


    keepGoing = false;


    **CHAPTER 8: Audio Synthesis and Analysis**


    **181**


    endSound.setEnabled(false);


    startSound.setEnabled(true);


    }


    public void onClick(View v) {


    if (v == startSound) {


    keepGoing = true;


    audioSynth = new AudioSynthesisTask();


    audioSynth.execute();


    endSound.setEnabled(true);


    startSound.setEnabled(false);


    } else if (v == endSound) {


    keepGoing = false;


    endSound.setEnabled(false);


    startSound.setEnabled(true);


    }


    }


    private class AudioSynthesisTask extends AsyncTask<Void, Void, Void>


    {


    @Override


    protected Void doInBackground(Void... params) {


    final int SAMPLE_RATE = 11025;


    int minSize = AudioTrack.getMinBufferSize(SAMPLE_RATE,


    AudioFormat.CHANNEL_CONFIGURATION_MONO,


    AudioFormat.ENCODING_PCM_16BIT);


    AudioTrack audioTrack = new AudioTrack(


    AudioManager.STREAM_MUSIC, SAMPLE_RATE,


    AudioFormat.CHANNEL_CONFIGURATION_MONO,


    AudioFormat.ENCODING_PCM_16BIT,


    minSize,


    AudioTrack.MODE_STREAM);


    audioTrack.play();


    short[] buffer = {


    8130,15752,22389,27625,31134,32695,32210,29711,25354,19410,12253,


    4329,-3865,-11818,-19032,-25055,-29511,-32121,-32722,-31276,-27874,


    -22728,-16160,-8582,-466


    };


    while (keepGoing) {


    audioTrack.write(buffer, 0, buffer.length);


    }


    return null;


    }


    }


    }


