    and go through the normal reading process.


    BufferedReader bufferedreader = new BufferedReader(new InputStreamReader(inputstream));
    We’ll use a StringBuilder to hold all of the data we read in.


    StringBuilder stringbuilder = new StringBuilder();


    And we will read line by line from the BufferedReader until it returns null.


    String currentline = null;


    while ((currentline = bufferedreader.readLine()) != null) {


    stringbuilder.append(currentline + "\n");


    }


    When we are done reading, we’ll convert the StringBuilder object to a normal String
    and output it to the log.


    String result = stringbuilder.toString();


    Log.v("HTTP UPLOAD REQUEST",result);


    **280**


    **CHAPTER 12: Media Consumption and Publishing Using Web Services**


    Finally, we’ll close the InputStream.


    inputstream.close();


    Of course, we’ll need to have permission to access the Internet in our application.


    Therefore we need to add the following uses-permission line to our


    AndroidManifest.xml file.


    <uses-permission android:name="android.permission.INTERNET"></uses-permission>
    Once we have the required libraries downloaded and imported, doing file uploads
    is not much more difficult than doing a normal HTTP request using the HttpClient
    class.


    **Uploading Video to Blip.TV**


    Blip.TV is a popular video sharing site that offers a REST-based file upload API
    that we can use to build a video sharing mechanism onto a capture application
    or even as a


    stand-alone application.


    The Blip.TV upload API is documented online at


    [http://wiki.blip.tv/index.php/REST_Upload_API. It details the various elements
    that](http://wiki.blip.tv/index.php/REST_Upload_API)


    may be included with the request. In particular, we’ll need the uploaded file
    element to be named “file”. To run the sample code, you will need a regular Blip.TV
    user login (username) and password (which, in an real-world application, should
    be supplied by the user). We’ll need a title, and we’ll need to include post with
    a value of “1” and skin with a value of api to get back a response in XML.


    Once a video is uploaded to Blip.TV through the API, they respond with XML something
    like the following:


    <response>


    <current_time>2010-10-30T00:13:00Z</current_time>


    <timestamp>1288397581081</timestamp>


    <status>OK</status>


