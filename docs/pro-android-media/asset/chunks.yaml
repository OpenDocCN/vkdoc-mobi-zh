  trans: "\n### 准备录制\n\n在设置好所有 `MediaRecorder` 的属性后，我们就可以使用 `prepare` 方法了。这个方法是必需的，它会执行所有内部功能，让\
    \ `MediaRecorder` 进入录制准备状态。\n\n```\nrecorder.prepare();\n```\n\n### 开始录制\n\n当\
    \ `MediaRecorder` 完成\"准备\"后，就可以开始录制了。`start` 方法正是用来开始录制的。\n\n```\nrecorder.start();\n\
    ```\n\n### 停止录制\n\n录制开始后，可以使用 `stop` 方法来停止录制。\n\n```\nrecorder.stop();\n```\n\n\
    ### 释放资源\n\n最后，当我们不再需要使用 `MediaRecorder` 时，应该调用 `release` 方法来释放其占用的资源。这一点很重要，因为许多底层资源（如硬件摄像头和麦克风）同一时间只能被一个应用程序使用。\n\
    \n```\nrecorder.release();\n```\n\n### 状态机\n\n就像刚才描述的那样，与 `MediaPlayer` 对象一样，`MediaRecorder`\
    \ 具有多种状态，并且某些方法只能在特定状态下调用。图 11-1 展示了可能的状态以及调用特定方法后进入的状态（此处为方便参考再次引用）。\n\n**图 11-1.**\
    \ *Android API 参考文档中的 MediaRecorder 状态图*\n\n### 权限\n\n使用 `MediaRecorder` 进行音频和视频捕捉，并将文件保存到\
    \ SD 卡上，需要在 `AndroidManifest.xml` 文件中设置以下权限。\n\n```\n<uses-permission android:name=\"\
    android.permission.RECORD_AUDIO\"></uses-permission>\n<uses-permission android:name=\"\
    android.permission.CAMERA\"></uses-permission>\n<uses-permission android:name=\"\
    android.permission.WRITE_EXTERNAL_STORAGE\">\n</uses-permission>\n```\n\n## 完整的自定义视频捕捉示例\n\
    \n以下是一个将上述所有步骤整合在一起的完整示例。它使用了 `CamcorderProfile`，因此需要 Android 2.2 或更高版本。\n\n```\n\
    package com.apress.proandroidmedia.ch11.videocapture;\n\nimport java.io.IOException;\n\
    import android.app.Activity;\nimport android.content.pm.ActivityInfo;\nimport\
    \ android.media.CamcorderProfile;\nimport android.media.MediaRecorder;\nimport\
    \ android.os.Bundle;\nimport android.util.Log;\nimport android.view.SurfaceHolder;\n\
    import android.view.SurfaceView;\nimport android.view.View;\nimport android.view.Window;\n\
    import android.view.WindowManager;\nimport android.view.View.OnClickListener;\n\
    ```\n\n在这个示例中，我们的 Activity 将实现 `OnClickListener`（以便用户可以点击开始和停止录制）和 `SurfaceHolder.Callback`（用于处理与\
    \ Surface 相关的事件）。\n\n```\npublic class VideoCapture extends Activity implements\
    \ OnClickListener,\n    SurfaceHolder.Callback {\n\n    MediaRecorder recorder;\n\
    \    SurfaceHolder holder;\n```\n\n这里有一个布尔值，表示我们当前是否正在录制。当未录制时为 `false`，录制时为 `true`。\n\
    \n```\n    boolean recording = false;\n    public static final String TAG = \"\
    VIDEOCAPTURE\";\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n```\n\n该 Activity 将全屏并以横屏模式运行，我们将通过以下方法进行设置。\n\
    \n```\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
    \                WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n\
    ```\n\n接下来，实例化我们的 `MediaRecorder` 对象。\n\n```\n        recorder = new MediaRecorder();\n\
    ```\n\n稍后定义的 `initRecorder` 方法将处理所有 `MediaRecorder` 的设置。\n\n```\n        initRecorder();\n\
    \        setContentView(R.layout.main);\n```\n\n继续往下，我们将获取 `SurfaceView` 和 `SurfaceHolder`\
    \ 的引用，并将我们的 Activity 注册为 `SurfaceHolder.Callback`。\n\n```\n        SurfaceView\
    \ cameraView = (SurfaceView) findViewById(R.id.CameraView);\n        holder =\
    \ cameraView.getHolder();\n        holder.addCallback(this);\n        holder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    ```\n\n我们将 `SurfaceView` 设置为可点击，并将我们的 Activity 注册为其 `OnClickListener`。这样，当触摸 `SurfaceView`\
    \ 时，就会调用我们的 `onClick` 方法。\n\n```\n        cameraView.setClickable(true);\n   \
    \     cameraView.setOnClickListener(this);\n    }\n```\n\n这里定义的 `initRecorder`\
    \ 方法负责处理所有 `MediaRecorder` 的设置。\n\n```\n    private void initRecorder() {\n```\n\
    \n我们将使用默认的音频和视频源。\n\n```\n        recorder.setAudioSource(MediaRecorder.AudioSource.DEFAULT);\n\
    \        recorder.setVideoSource(MediaRecorder.VideoSource.DEFAULT);\n```\n\n\
    为了简化操作，我们不逐一设置所有参数，而是使用内置的 `CamcorderProfile`——在本例中，使用由 `QUALITY_HIGH` 常量指定的配置。\n\
    \n```\n        CamcorderProfile cpHigh = CamcorderProfile.get(CamcorderProfile.QUALITY_HIGH);\n\
    \        recorder.setProfile(cpHigh);\n```\n\n我们指定录制文件的保存路径。在本例中，是直接保存在 SD 卡上的文件。\n\
    \n```\n        recorder.setOutputFile(\"/sdcard/videocapture_example.mp4\");\n\
    ```\n\n然后指定最大录制时长（以毫秒为单位）。\n\n```\n        recorder.setMaxDuration(50000); //\
