    \ method.\n\n```\npublic class SnapShot extends Activity implements\n    SurfaceHolder.Callback,\
    \ Camera.PictureCallback {\n    public void onPictureTaken(byte[] data, Camera\
    \ camera) {\n    }\n}\n```\n\n**CHAPTER 2: Building Custom Camera Applications**\
    \ **33**\n\nThe `onPictureTaken` method has two arguments; the first is a byte\
    \ array of the actual JPEG image data. The second is a reference to the `Camera`\
    \ object that captured the image.\n\nSince we are handed the actual JPEG data,\
    \ we simply need to write it to disk somewhere in order to save it. As we already\
    \ know, it is a good idea to leverage the `MediaStore` for specifying its location\
    \ and metadata.\n\nWhen our `onPictureTaken` method is called, we can call `startPreview`\
    \ on the `Camera` object. The preview had been automatically paused when the `takePicture`\
    \ method was called, and this method tells us that it is now safe to be restarted.\n\
