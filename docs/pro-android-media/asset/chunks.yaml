    As you can see, simply adding audio recording capabilities is straightforward.
    It doesn’t allow much in the way of control over the user interface or other aspects
    of the


    recording, but it does give a no-frills usable interface to the user without much
    work on our part.


    **Custom Audio Capture**


    Of course, using an intent to trigger the sound recorder isn’t the only way we
    can


    capture audio. The Android SDK includes a MediaRecorder class, which we can leverage
    **CHAPTER 7: Audio Capture**


    **155**


    to build our own audio recording functionality. Doing so enables a lot more flexibility,
    such as controlling the length of time audio is recorded for.


    The MediaRecorder class is used for both audio and video capture. After constructing
    a MediaRecorder object, to capture audio, the setAudioEncoder and setAudioSource


    methods must be called. If these methods are not called, audio will not be recorded.


    (The same goes for video. If setVideoEncoder and setVideoSource methods are not


    called, video will not be recorded. We won’t be dealing with video in this chapter;
    therefore we won’t use either of these methods.)


    Additionally, two other methods are generally called before having the MediaRecorder
    prepare to record. These are setOutputFormat and setOutputFile. setOutputFormat


    allows us to choose what file format should be used for the recording and


    setOutputFile allows us to specify the file that we will record to. It is important
    to note that the order of each of these calls matters quite a bit.


    **MediaRecorder Audio Sources**


    The first method that should be called after the MediaRecorder is instantiated
    is


    setAudioSource. setAudioSource takes in a constant that is defined in the AudioSource
    inner class. Generally we will want to use MediaRecorder.AudioSource.MIC, but
    it is interesting to note that MediaRecorder.AudioSource also contains constants
    for


    VOICE_CALL, VOICE_DOWNLINK, and VOICE_UPLINK. Unfortunately, it appears as though
    there aren’t any handsets or versions of Android where recording audio from the
    call actually works. Also of note, as of Froyo, Android version 2.2, there are
    constants for CAMCORDER


    and VOICE_RECOGNITION. These may be used if the device has more than one microphone.


    MediaRecorder recorder = new MediaRecorder();


    recorder.setAudioSource(MediaRecorder.AudioSource.MIC);


    **MediaRecorder Output Formats**


    The next method to be called in sequence is setOutputFormat. The values this takes
    in are specified as constants in the MediaRecorder.OutputFormat inner class.


    *MediaRecorder.OutputFormat.MPEG_4*: This specifies that the file


    written will be an MPEG-4 file. It may contain both audio and video


    tracks.


    *MediaRecorder.OutputFormat.RAW_AMR*: This represents a raw file


    without any type of container. This should be used only when


    capturing audio without video and when the audio encoder is


    AMR_NB.


    *MediaRecorder.OutputFormat.THREE_GPP*: This specifies that the file


    written will be a 3GPP file (extension .3gp). It may contain both audio


    and video tracks.


    recorder.setOutputFormat(MediaRecorder.OutputFormat.THREE_GPP);


    **156**


    ## CHAPTER 7: Audio Capture


    ### **MediaRecorder Audio Encoders**


    Following the setting of the output format, we can call setAudioEncoder to set
    the codec that should be used. The possible values are specified as constants
    in the


    MediaRecorder.AudioEncoder class and other than DEFAULT, only one other value
    exists: MediaRecorder.AudioEncoder.AMR_NB, which is the Adaptive Multi-Rate Narrow
    Band


    codec. This codec is tuned for speech and is therefore not a great choice for
    anything other than speech. By default it has a sample rate of 8 kHz and a bitrate
    between 4.75


    and 12.2 kbps, both of which are very low for recoding anything but speech.


    Unfortunately, this is our only choice for use with the MediaRecorder at the moment.


    recorder.setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB);


    **MediaRecorder Output and Recording**


    Last, we’ll want to call setOutputFile with the location of the file we want to
    record to.


    The following snippet of code creates a file using File.createTempFile in the
    preferred file location for applications that need to store files on the SD card.


    File path = new File(Environment.getExternalStorageDirectory().getAbsolutePath()
    +


    "/Android/data/com.apress.proandroidmedia.ch07.customrecorder*files*"); path.mkdirs();


    audioFile = File.createTempFile("recording", ".3gp", path);


    recorder.setOutputFile(audioFile.getAbsolutePath());


    Now we can actually call prepare, which signals the end of the configuration stage
    and tells the MediaRecorder to get ready to start recording. We call the start
    method to actually start recording.


    recorder.prepare();


    recorder.start();


    To stop recording, we call the stop method.


    recorder.stop();


    **MediaRecorder State Machine**


    The MediaRecorder, similar to the MediaPlayer, operates as a state machine. Figure
    7–2


    shows a diagram from the Android API reference page for MediaRecorder, which


    describes the various states and the methods that may be called from each state.


    **CHAPTER 7: Audio Capture**


    **157**


    **Figure 7–2.** *MediaRecorder state diagram from Android API Reference*


