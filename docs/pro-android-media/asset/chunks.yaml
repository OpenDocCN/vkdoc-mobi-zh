    That should cover the basics of building a custom camerabased application. Next,
    let’s look at how we can extend this application, implementing features that don’t
    exist in the built-in camera application.


    **Extending the Custom Camera Application**


    In my opinion, the built-in camera application on Android is missing a few essential
    features. One of those is the ability to take a picture after a smal amount of
    time, say 10


    or 30 seconds. This feature is general y useful with a camera that can be mounted
    on a tripod. One thing it enables is the ability for a photographer to set up
    a shot, set the timer, and then run into the shot.


    While this isn’t something you would often do with a mobile phone, I do think
    it would be useful in certain situations. For example, I would love to have this
    feature when want to take a picture of both someone I am with and myself. Currently
    when I try to do so, I have a difficult time, as I cannot see the touchscreen
    interface because it is facing away from me. I fumble around, pushing the screen
    in various spots, hoping that I hit the shutter button.


    **Building a Timer-Based Camera App**


    To rectify the situation just described, we can add a time delay to the taking
    of the picture. Let’s update our SnapShot example so that picture is taken ten
    seconds after Download from Wow! eBook <www.wowebook.com>


    pushing a button.


    In order to accomplish this, we’l need to use something like a java.util.Timer.


    Unfortunately, in Android, using a Timer creates some complications as it introduces
    a separate thread. To have separate threads interact with the UI, we need to use
    a


    Handler to cause an action to occur on the main thread.


    The other use of a Handler is to schedule something to happen in the future. This


    capability of a Handler makes using the Timer unnecessary.


    To create a Handler that wil execute something in the future, we simply construct
    a generic one:


    Handler timerHandler = new Handler();


    We then have to create a Runnable. This Runnable wil contain within its run method
    the action to happen later. In our case, we want this action to occur ten seconds
    later and trigger the taking of the picture:


    Runnable timerTask = new Runnable() {


    public void run() {


    camera.takePicture(null,null,null,TimerSnapShot.this);


