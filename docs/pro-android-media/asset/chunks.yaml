    In general, EXIF data is very technically orientated; most of the tags in the
    standard relate to data about the capturing of the image itself, such as ExposureTime
    and


    ShutterSpeedValue.


    There are some tags, though, that make sense for us to consider filling in or
    modifying.


    Some of these might include the following:


    *UserComment*: A comment generated by the user


    *ImageDescription*: The title


    *Artist*: Creator or taker of image


    *Copyright*: Copyright holder of image


    *Software*: Software used to create image


    Fortunately, Android provides us a nice means to both read and write EXIF data.
    The main class for doing so is ExifInterface.


    Here’s how to use ExifInterface to read specific EXIF data from an image file:


    ExifInterface ei = new ExifInterface(imageFilePath);


    String imageDescription = ei.getAttribute("ImageDescription");


    if (imageDescription != null)


    {


    Log.v("EXIF", imageDescription);


    }


    Here is how to save EXIF data to an image file using ExifInterface:


    ExifInterface ei = new ExifInterface(imageFilePath);


    ei.setAttribute("ImageDescription","Something New");


    ExifInterface includes a set of constants that define the typical set of data
    that is automatically included in captured images by the Camera application.


    The latest version of the EXIF specification is version 2.3 from April 2010\.
    It is available online here: [www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf.](http://www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf)


