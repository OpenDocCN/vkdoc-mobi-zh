  trans: "\n# 章节\n\n## 背景与网络音频\n\n在上一章中，我们探讨了 Android 的基本音频播放功能。虽然这些功能非常出色，但我们需要进一步挖掘，使其更具通用性。在本章中，我们将研究如何实现诸如后台播放音频文件之类的操作，这样播放音频的应用无需保持在前台运行。我们还将探讨如何合成声音，而不仅仅是播放音频文件，并了解如何利用互联网上的流媒体音频。\n\
    \n## 后台音频播放\n\n到目前为止，我们一直专注于构建以前台为中心的应用，这些应用的用户界面始终呈现在用户面前。在上一章中，我们学习了如何为这类应用添加音频播放功能。\n\
    \n然而，如果我们想要构建一个播放音乐或有声书的应用程序，同时希望用户在收听过程中能够使用手机执行其他操作，这时会发生什么呢？如果我们只局限于构建 Activity，可能会遇到一些困难。Android\
    \ 操作系统有权终止不在前台且未被用户使用的 Activity。这样做是为了释放内存，为其他应用程序的运行腾出空间。如果操作系统终止了正在播放音频的 Activity，音频就会停止播放，这会严重影响用户体验。\n\
    \n幸运的是，有一个解决方案。我们可以使用 Service，而不是在 Activity 中播放音频。\n\n## 服务\n\n为了确保当应用程序不再处于前台且其\
    \ Activity 未被使用时音频仍能继续播放，我们需要创建一个 Service。Service 是 Android 应用程序的一个组件，旨在后台运行任务，无需用户进行任何交互。\n\
    \n### 本地服务与远程服务\n\nAndroid 使用两种不同类型的 Service。第一种是我们将要探讨的**本地服务**。本地服务作为特定应用程序的一部分存在，仅由该应用程序访问和控制。另一种是**远程服务**。它们可以与其他应用程序通信、被访问和控制。如前所述，我们将专注于使用本地服务来实现音频播放功能。开发远程服务是一个非常大的主题，遗憾的是超出了本书的范围。\n\
    \n### 简单本地服务\n\n为了演示 Service，让我们通过这个非常简单的例子来了解。\n\n首先，我们需要一个包含界面的 Activity，该界面能让我们启动和停止\
    \ Service。\n\n```\npackage com.apress.proandroidmedia.ch06.simpleservice;\n\n\
    import android.app.Activity;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    \npublic class SimpleServiceActivity extends Activity implements OnClickListener\
    \ {\n```\n\n我们的 Activity 将包含两个按钮——一个用于启动 Service，另一个用于停止 Service。\n\n```\nButton\
    \ startServiceButton;\nButton stopServiceButton;\n```\n\n为了启动或停止 Service，我们使用标准的\
    \ intent。\n\n```\nIntent serviceIntent;\n\n@Override\npublic void onCreate(Bundle\
    \ savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    setContentView(R.layout.main);\n\
    ```\n\n我们的 Activity 实现了`OnClickListener`，因此我们将每个按钮的`OnClickListener`设置为`this`。\n\
    \n```\nstartServiceButton = (Button) this.findViewById(R.id.StartServiceButton);\n\
    stopServiceButton = (Button) this.findViewById(R.id.StopServiceButton);\nstartServiceButton.setOnClickListener(this);\n\
    stopServiceButton.setOnClickListener(this);\n```\n\n在实例化用于启动和停止 Service 的 intent\
    \ 时，我们将 Activity 作为`Context`传入，随后是 Service 的类。\n\n```\nserviceIntent = new Intent(this,\
    \ SimpleServiceService.class);\n}\n\npublic void onClick(View v) {\n    if (v\
    \ == startServiceButton) {\n```\n\n当点击`startServiceButton`时，我们调用`startService`方法，并传入刚刚创建好的用于引用我们\
    \ Service 的 intent。`startService`方法是`Context`类的一部分，而 Activity 是`Context`的子类。\n\
    \n```\nstartService(serviceIntent);\n    }\n    else if (v == stopServiceButton)\
    \ {\n```\n\n当点击`stopServiceButton`时，我们调用`stopService`方法，并传入同一个引用我们 Service 的 intent。与`startService`一样，`stopService`也是`Context`类的一部分。\n\
    \n```\nstopService(serviceIntent);\n    }\n}\n}\n```\n\n这是定义上述 Activity 布局的`main.xml`文件。它包含`StartService`和`StopService`按钮以及一个`TextView`。\n\
    \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    \n>\n    <TextView\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
    wrap_content\"\n        android:text=\"Simple Service\"\n    />\n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"\n        android:id=\"@+id/StartServiceButton\"\
    \ android:text=\"Start Service\"></Button>\n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"\n        android:text=\"\
    Stop Service\" android:id=\"@+id/StopServiceButton\"></Button>\n</LinearLayout>\n\
    ```\n\n现在我们可以继续编写 Service 本身的代码。在这个例子中，我们并没有在 Service 中完成任何实际任务，只是使用`Toast`来告诉我们\
    \ Service 何时启动和停止。\n\n```\npackage com.apress.proandroidmedia.ch06.simpleservice;\n\
    \nimport android.app.Service;\nimport android.content.Intent;\nimport android.os.IBinder;\n\
    import android.util.Log;\n```\n\nServices 继承自`android.app.Service`类。`Service`类是一个抽象类，因此要继承它，我们至少需要实现`onBind`方法。\n"
- fmt: "# CHAPTER 6: Background and Networked Audio\n\nIn this simple example, we\
    \ aren’t going to be “binding” to the `Service`. Therefore we’ll just return `null`\
    \ in our `onBind` method.\n\n```java\npublic class SimpleServiceService extends\
    \ Service {\n\n    @Override\n    public IBinder onBind(Intent intent) {\n   \
    \     return null;\n    }\n```\n\nThe next three methods represent the `Service`’s\
    \ life cycle. The `onCreate` method, as in the `Activity`, is called when the\
    \ `Service` is instantiated. It will be the first method called.\n\n```java\n\
    \    @Override\n    public void onCreate() {\n        Log.v(\"SIMPLESERVICE\"\
    , \"onCreate\");\n    }\n```\n\nThe `onStartCommand` method will be called whenever\
    \ `startService` is called with an intent that matches this `Service`. Therefore\
    \ it may be called more than once. The `onStartCommand` returns an integer value\
    \ that represents what the OS should do if it kills the `Service`. `START_STICKY`,\
    \ which we are using here, indicates that the `Service` will be restarted if killed.\n\
    \n```java\n    @Override\n    public int onStartCommand(Intent intent, int flags,\
    \ int startId) {\n        Log.v(\"SIMPLESERVICE\", \"onStartCommand\");\n    \
    \    return START_STICKY;\n    }\n```\n\n### `onStartCommand` vs. `onStart`\n\n\
    The `onStartCommand` method was introduced with Android 2.0 (API level 5). Previous\
    \ to that, the method used was `onStart`. `onStart`’s parameters are an `Intent`\
    \ and an `int` for `startId`. It does not include the `int flags` parameter and\
    \ doesn’t have a return. If you are targeting a phone that is running something\
    \ earlier than 2.0, you can use the `onStart` method.\n\n```java\n    @Override\n\
    \    public void onStart(Intent intent, int startid) {\n        Log.v(\"SIMPLESERVICE\"\
    , \"onStart\");\n    }\n```\n\nThe `onDestroy` method is called when the OS is\
    \ destroying a `Service`. In this example, it is triggered when the `stopService`\
    \ method is called by our activity. This method should be used to do any cleanup\
    \ that needs to be done when a `Service` is being shut down.\n\n```java\n    public\
    \ void onDestroy() {\n        Log.v(\"SIMPLESERVICE\", \"onDestroy\");\n    }\n\
    \n}\n```\n\nFinally, in order to make this example work, we need to add an entry\
    \ to our manifest file (`AndroidManifest.xml`) that specifies our `Service`.\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.proandroidmedia.ch06.simpleservice\"\
    \n    android:versionCode=\"1\"\n    android:versionName=\"1.0\">\n\n    <application\
    \ android:icon=\"@drawable/icon\" android:label=\"@string/app_name\">\n      \
    \  <activity android:name=\".SimpleServiceActivity\"\n            android:label=\"\
    @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
    android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n            </intent-filter>\n        </activity>\n\n        <service android:name=\"\
    .SimpleServiceService\" />\n    </application>\n\n    <uses-sdk android:minSdkVersion=\"\
    5\" />\n\n</manifest>\n```\n\nOf course, this example doesn’t do anything other\
    \ than output to the log indicating when the `Service` has been started and stopped.\
    \ Let’s move forward and have our `Service` actually do something.\n\n## Local\
    \ Service plus MediaPlayer\n\nNow that we have created an example `Service`, we\
    \ can use it as a template to create an application to play audio files in the\
    \ background. Here is a `Service`, and an activity to control the `Service` that\
    \ does just that, allows us to play audio files in the background. It works in\
    \ a similar manner to the custom audio player example from the last chapter, as\
    \ it is using the same underlying `MediaPlayer` class that Android makes available\
    \ to us.\n\n```java\npackage com.apress.proandroidmedia.ch06.backgroundaudio;\n\
    \nimport android.app.Service;\nimport android.content.Intent;\nimport android.media.MediaPlayer;\n\
    import android.media.MediaPlayer.OnCompletionListener;\nimport android.os.IBinder;\n\
    import android.util.Log;\n```\n\nThe `Service` implements `OnCompletionListener`\
    \ so that it can be notified when the `MediaPlayer` has finished playing an audio\
    \ file.\n\n```java\npublic class BackgroundAudioService extends Service implements\
    \ OnCompletionListener {\n\n    // We declare an object of type MediaPlayer.\n\
    \    // This object will handle the playback of the audio as shown\n    // in\
    \ the custom audio player example in the last chapter.\n    MediaPlayer mediaPlayer;\n\
    \n    @Override\n    public IBinder onBind(Intent intent) {\n        return null;\n\
    \    }\n\n    @Override\n```"
