    Generally, when adjusting brightness, it is easier to just use the final column
    in the matrix for each color. This is the amount that is simply added to the value
    of the color without any multiplication of the existing color values.


    Therefore, to reduce the brightness, we would use code for a matrix as follows.


    ```

    ColorMatrix cm = new ColorMatrix();

    float brightness = -25;

    cm.set(new float[] {

    1, 0, 0, 0, brightness,

    0, 1, 0, 0, brightness,

    0, 0, 1, 0, brightness,

    0, 0, 0, 1, 0 });

    paint.setColorFilter(new ColorMatrixColorFilter(cm));

    ```


    Putting these two transformations together would yield the following.


    ```

    ColorMatrix cm = new ColorMatrix();

    float contrast = 2;

    float brightness = -25;

    cm.set(new float[] {

    contrast, 0, 0, 0, brightness,

    ```


