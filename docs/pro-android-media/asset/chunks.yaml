  trans: "\n## 第 11 章：视频捕捉\n\n然后，我们在 `ContentResolver` 对象上调用 `update` 方法，传入捕获到的视频的\
    \ `Uri` 以及 `ContentValues` 对象。\n\n```\nif (getContentResolver().update(videoFileUri,\
    \ values, null, null) == 1) {\n```\n\n如果 `update` 方法的结果为 1，则表示操作成功；有一行数据被更新了，我们将通知用户。\n\
    \n```\nToast t = Toast.makeText(this, \"已更新 \" + titleEditText.getText().toString(),\
    \ Toast.LENGTH_SHORT);\nt.show();\n}\nelse {\n```\n\n如果结果不是 1，我们将告知用户发生了错误。\n\n\
    ```\nToast t = Toast.makeText(this, \"错误\", Toast.LENGTH_SHORT);\nt.show();\n\
    }\n}\n}\n```\n\n```\nprotected void onActivityResult (int requestCode, int resultCode,\
    \ Intent data) {\n    if (resultCode == RESULT_OK && requestCode == VIDEO_CAPTURED)\
    \ {\n        videoFileUri = data.getData();\n        playVideoButton.setEnabled(true);\n\
    \        saveVideoButton.setEnabled(true);\n        titleEditText.setEnabled(true);\n\
    \    }\n}\n}\n```\n\n以下是由前述 Activity 引用的布局 XML，位于 `res/layout/main.xml` 中。\n\n\
    ```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    \n>\n    <Button android:text=\"拍摄视频\" android:id=\"@+id/CaptureVideoButton\"\n\
    \        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></Button>\n    <Button android:text=\"播放视频\" android:id=\"@+id/PlayVideoButton\"\
    \n        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></Button>\n    <TextView android:text=\"标题:\" android:id=\"@+id/TitleTextView\"\
    \n        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></TextView>\n    <EditText android:text=\"\" android:id=\"@+id/TitleEditText\"\
    \n        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></EditText>\n    <Button android:text=\"保存元数据\" android:id=\"@+id/SaveVideoButton\"\
    \n        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></Button>\n</LinearLayout>\n```\n\n## 第 11 章：视频捕捉\n\n前面的示例展示了在 Android 中使用视频的许多方面是多么直接，尤其是当使用\
    \ Intent 进行视频捕获并依赖 `MediaStore` 处理元数据时。\n\n需要注意的是，当更新 `MediaStore` 中的元数据时，视频文件本身的数据并不会被更新；相反，数据仅存储在与该视频相关的\
    \ `MediaStore` 记录中。Android SDK 并未提供内置类来直接修改媒体文件的元数据。\n\n### 自定义视频捕捉\n\n对于图像和音频，有多种捕获方式。视频捕获也不例外；虽然我们没有像处理音频那样多的选项，但我们有能力使用\
    \ `MediaRecorder` 类创建一个自定义视频捕获示例。\n\n在许多方面，构建自定义视频捕获应用程序类似于构建自定义相机应用程序与自定义音频录制应用程序的结合。我们必须创建一个\
    \ `SurfaceView`，用于相机绘制预览或取景器图像，就像我们在第 2 章的自定义相机示例中所做的那样，同时我们将使用 `MediaRecorder`\
    \ 进行实际录制，就像我们在第 7 章音频捕获中所做的那样。\n\n#### 用于视频的 MediaRecorder\n\n要使用 `MediaRecorder`\
    \ 进行视频捕获，我们必须遵循音频捕获的所有步骤，并加上一些视频特有的步骤。此外，`MediaRecorder` 是一个状态机，因此我们必须遵循特定的步骤顺序，从实例化到录制。\n\
    \n首先，我们实例化它，然后按顺序执行这些步骤。\n\n```java\nMediaRecorder recorder = new MediaRecorder();\n\
    ```\n\n##### 音频和视频源\n\n实例化之后，我们可以设置音频和视频源。要设置音频源，我们使用 `setAudioSource` 方法，传入一个代表我们想要使用的源的常量。\n\
    \n```java\nrecorder.setAudioSource(MediaRecorder.AudioSource.DEFAULT);\n```\n\n\
    可能的音频源值是在 `MediaRecorder.AudioSource` 类中定义的常量：\n\n- `CAMCORDER`：如果设备为不同的摄像头（前置、后置）配备了不同的麦克风，使用此值将指定使用合适的麦克风（Android\
    \ 2.1/API 级别 7 或更高）。\n"
- fmt: '## CHAPTER 11: Video Capture


    - `DEFAULT`: This specifies that the default microphone on the device will be
    used.

    - `MIC`: This specifies that the normal microphone meant for use with video recording
    is used.

    - `VOICE_CALL`: This specifies that the audio should be taken from a call that
    is currently in progress. This is currently unsupported by most if not all handsets.

    - `VOICE_DOWNLINK`: This specifies that the audio should be taken from a call,
    specifically the incoming audio (the other party). This is currently unsupported
    by most if not all handsets.

    - `VOICE_UPLINK`: This specifies that the audio should be taken from a call, specifically
    the outgoing audio (the audio that the handset is sending). This is currently
    unsupported by most if not all handsets.

    - `VOICE_RECOGNITION`: This specifies that the audio should be taken from a microphone
    that is set for the voice recognition functions on the phone. If no such microphone
    is specified, the `DEFAULT` microphone will be used.


    The possible video source values are defined in the `MediaRecorder.VideoSource`
    class, which contains only two constants:


    - `CAMERA`

    - `DEFAULT`


    Both indicate the same thing, that the device''s main camera should be used for
    recording video.


    To set the video source, we use the `setVideoSource` method:


    ```java

    recorder.setVideoSource(MediaRecorder.VideoSource.DEFAULT);

    ```


    **NOTE:** It would make sense that using the `MediaRecorder.VideoSource.DEFAULT`
    in the `MediaRecorder`''s `setVideoSource` method or `MediaRecorder.AudioSource.DEFAULT`
    in the `MediaRecorder`''s `setAudioSource` method would be the same as not calling
    the methods. After all, they are the *default* values. Unfortunately, on the contrary,
    each method is required to be called for that specific data to be captured. In
    other words, if the audio source isn''t set, no audio will be recorded, and if
    the video source isn''t set, no video will be recorded.


    ### Output Format


    Following the setting of the audio and video sources, we can set the output format
    using the `MediaRecorder`''s `setOutputFormat` method, passing in the format to
    be used.


    ```java

    recorder.setOutputFormat(MediaRecorder.OutputFormat.DEFAULT);

    ```


    The possible formats are listed as constants in the `MediaRecorder.OutputFormat`
    class.


    - `DEFAULT`: Specifies that the default output format will be used. This *may*
    be different across devices. On a Nexus 1 running Android 2.2, it is MPEG-4, the
    same format used if the `MPEG_4` constant is used.

    - `MPEG_4`: Specifies that the audio and video will be captured to a file in the
    MPEG-4 file format. This file will be an `.mp4` file. MPEG-4 files typically contain
    H.264–, H.263–, or MPEG-4 Part 2–encoded video with AAC– or MP3–encoded audio
    (although other codecs may be used). MPEG-4 files are widely used in Flash with
    iPods and many other online video technologies and consumer electronics devices.

    - `RAW_AMR`: This setting is for audio recording only and does not work with video.

    - `THREE_GPP`: Specifies that the audio and video will be captured to a file in
    the 3GP file format. This file will be a `.3gp` file. 3GPP files typically contain
    video encoded with H.264, MPEG-4 Part 2, or H.263 codecs and audio encoded with
    AMR or AAC codecs.


    ### Audio and Video Encoders


    After we set the output format, we should specify the audio and video encoders
    that we would like used. Using the `MediaRecorder`''s `setVideoEncoder` method,
    we specify the video codecs that will be used:


    ```java

    recorder.setVideoEncoder(MediaRecorder.VideoEncoder.DEFAULT);

    ```


    The possible values that can be passed into `setVideoEncoder` are defined as constants
    in `MediaRecorder.VideoEncoder`:


    - `DEFAULT`: This is a device-dependent setting specifying that the codec used
    will be the default for the device. In many cases, this will be H.263 since it
    is the only codec that is required to be supported on Android.

    - `H263`: This specifies that the codec used will be H.263. H.263 is a codec that
    was released in 1995 and was developed specifically for low bitrate video transmission.
    It became the basis for many early Internet video technologies such as those used
    early on in Flash and the RealPlayer. It is required to be supported for encoding
    on Android and therefore can be counted on to be available.

    - `H264`: This specifies that the codec used will be H.264 (which also goes by
    the name MPEG-4 Part 10 or AVC, Advanced Video Coding). H.264 is a state-of-the-art
    codec used in a wide range of technologies from BluRay to Flash. It was released
    in 2003. Most Android devices support this codec for video playback. A smaller
    set of devices use it for video encoding.'
