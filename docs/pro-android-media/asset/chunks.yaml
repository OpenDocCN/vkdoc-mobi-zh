    ```\n\nFollowing that we call the `prepare` method and then the `start` method,\
    \ after which the audio should start playing.\n\n```\n    mediaPlayer.prepare();\n\
    \    mediaPlayer.start();\n} catch (IOException e) {\n    Log.v(\"AUDIOHTTPPLAYER\"\
    , e.getMessage());\n}\n```\n\nRunning this example, you will probably notice a\
    \ significant lag time from when the application loads to when the audio plays.\
    \ The length of the delay is due to the speed of the data network that the phone\
    \ is using for its Internet connection (among other variables).\n\nIf we add `Log`\
    \ or `Toast` messages throughout the code, we would see that this delay happens\
    \ between the call to the `prepare` method and the `start` method. During the\
    \ running of the `prepare` method, the `MediaPlayer` is filling up a buffer so\
    \ that the audio playback can run smoothly even if the network is slow.\n\nThe\
    \ `prepare` method actually blocks while it is doing this. This means that applications\
    \ that use this method will likely become unresponsive until the `prepare` method\
    \ is complete. Fortunately, there is a way around this, and that is to use the\
    \ `prepareAsync` method. This method returns immediately and does the buffering\
    \ and other work in the background, allowing the application to continue.\n\n\
    The issue then becomes one of paying attention to the state of the `MediaPlayer`\
    \ object and implementing various callbacks that help us keep track of its state.\n\
    \nTo get a handle on the various states that a `MediaPlayer` object may be in,\
    \ it is helpful to look over the diagram from the `MediaPlayer` page on the Android\
