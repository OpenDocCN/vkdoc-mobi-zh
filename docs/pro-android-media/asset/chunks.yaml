    **Figure 3–2.** *The view of the Gallery application when triggered by the ACTION_PICK
    intent prompting the user to* *choose an image; the UI of the Gallery application
    may vary per device.*


    When the Gallery application returns after the user has selected an image, our


    onActivityResult method is called. We get the URI to the selected image in the
    passed-in intent’s data.


    protected void onActivityResult(int requestCode, int resultCode,


    Intent intent) {


    super.onActivityResult(requestCode, resultCode, intent);


    if (resultCode == RESULT_OK) {


    Uri imageFileUri = intent.getData();


    Since the returned image is likely too big to load completely in memory, we’ll
    use the technique we went over in Chapter 1 to resize it as it is loaded. The
    dw int and the dh int will be the maximum width and height respectively. The maximum
    height will be less


    than half the screen height, as we will eventually be displaying two images, aligned
    vertically.


    Display currentDisplay = getWindowManager().getDefaultDisplay();


    int dw = currentDisplay.getWidth();


    int dh = currentDisplay.getHeight()/2 - 100;


    try {


    // Load up the image''s dimensions not the image itself


    BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();


    bmpFactoryOptions.inJustDecodeBounds = true;


