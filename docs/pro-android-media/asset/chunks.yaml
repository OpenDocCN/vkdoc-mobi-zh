    import android.media.MediaPlayer.OnVideoSizeChangedListener;\n```\n\n`SurfaceHolder`\
    \ 和 `SurfaceView` 将用于绘制视频。\n\n```\nimport android.view.SurfaceHolder;\nimport\
    \ android.view.SurfaceView;\n```\n\n我们的 Activity 将实现所有的 `MediaPlayer` 状态变化监听器，以及\
    \ `SurfaceHolder.Callback` 接口，这将使我们能够接收到 `SurfaceView` 变化的通知。\n\n```\npublic class\
    \ CustomVideoPlayer extends Activity\n        implements OnCompletionListener,\
    \ OnErrorListener, OnInfoListener,\n        OnPreparedListener, OnSeekCompleteListener,\
    \ OnVideoSizeChangedListener,\n        SurfaceHolder.Callback\n{\n    Display\
    \ currentDisplay;\n    SurfaceView surfaceView;\n    SurfaceHolder surfaceHolder;\n\
    ```\n\n我们应用程序的核心引擎将是这个 `MediaPlayer` 对象。\n\n```\n    MediaPlayer mediaPlayer;\n\
    \    int videoWidth = 0;\n    int videoHeight = 0;\n    boolean readyToPlay =\
    \ false;\n    public final static String LOGTAG = \"CUSTOM_VIDEO_PLAYER\";\n```\n\
    \n`@Override`\n\n### 203\n\n```\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    ```\n\n设置内容视图后，我们可以获取布局 XML 中定义的 `SurfaceView` 的引用，并获取 `SurfaceHolder` 的引用，它允许我们监控底层\
    \ `Surface` 的变化。\n\n```\n        surfaceView = (SurfaceView) this.findViewById(R.id.SurfaceView);\n\
