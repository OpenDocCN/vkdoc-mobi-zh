    **Summary**


    As with many things in Android, there are many different ways that a task can
    be


    accomplished. In this chapter, we looked at three different ways that we can play
    video files. Simply using the built-in application via an intent is the easiest
    but least flexible.


    Using a VideoView allows us to play video within our own activity but doesn’t
    offer much more in the way of control capabilities. The MediaPlayer allows for
    the greatest range of control but requires the most work.


