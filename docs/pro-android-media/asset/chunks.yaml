  raw: '## Chapter


    ### **Background and**


    **Networked Audio**


    In the last chapter, we explored Android’s basic audio playback capabilities.
    While those capabilities are fantastic, we need to push a bit further to make
    them generally useful. In this chapter, we’ll look at how we can do things like
    play audio files in the background so that the application playing the audio doesn’t
    need to be running. We’ll take a look at how we can synthesize sound rather than
    just playing sound files, and we’ll look at how to leverage streaming audio that
    is available on the Internet.


    **Background Audio Playback**


    So far we have concentrated on building applications that are centered around
    being in the foreground and have their user interface in front of the user. In
    the last chapter, we looked at how to add audio playback capabilities to those
    types of applications.


    What happens, though, if we want to build an application that plays music or audio


    books, but we would like the user to be able to do other things with the phone
    while continuing to listen? We might have some trouble making that happen if we
    limit


    ourselves to just building *activities*. The Android operating system reserves
    the right to kill activities that aren’t in the front and in use by the user.
    It does this in order to free up memory to make room for other applications to
    run. If the OS kills an activity that is playing audio, this would stop the audio
    from playing, making the user experience not so great.


    Fortunately, there is a solution. Instead of playing our audio in an activity,
    we can use a Service.


    **Services**


    In order to ensure that the audio continues to play when the application is no
    longer in the front and its activity is not in use, we need to create a Service.
    A Service is a


    **126**


    ## CHAPTER 6: Background and Networked Audio


    component of an Android application that is meant to run tasks in the background


    without requiring any interaction from the user.


    **Local vs. Remote Services**


    There are a couple of different classes of Services in use by Android. The first
    and what we’ll be exploring is called a Local Service. Local Services exist as
    part of a specific application and are accessed and controlled only by that application.
    Remote Services are the other type. They can communicate with, be accessed, and
    be controlled by


    other applications. As mentioned, we’ll be concentrating on using a Local Service
    to provide audio playback capabilities. Developing Remote Services is a very large
    topic and is unfortunately out of the scope of this book.


    **Simple Local Service**


    **To demonstrate a Service, let’s go through this very simple example.**


    First we’ll need an activity with an interface that allows us to start and stop
    the Service.


    package com.apress.proandroidmedia.ch06.simpleservice;


    import android.app.Activity;


    import android.content.Intent;


    import android.os.Bundle;


    import android.view.View;


    import android.view.View.OnClickListener;


    import android.widget.Button;


    public class SimpleServiceActivity extends Activity implements OnClickListener
    {


    Our activity will have two Buttons—one for starting the Service and one for stopping
    it.


    Button startServiceButton;


    Button stopServiceButton;


    In order to start or stop the Service, we use a standard intent.


    Intent serviceIntent;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    Our activity implements OnClickListener, so we set the OnClickListener for each
    of the Buttons to be “this”.


    startServiceButton = (Button) this.findViewById(R.id.StartServiceButton);


    stopServiceButton = (Button) this.findViewById(R.id.StopServiceButton);


    startServiceButton.setOnClickListener(this);


    stopServiceButton.setOnClickListener(this);


    When instantiating the intent that will be used to start and stop the Service,
    we pass in our activity as the Context followed by the Service’s class.


    **CHAPTER 6: Background and Networked Audio**


    **127**


    serviceIntent = new Intent(this, SimpleServiceService.class);


    }


    public void onClick(View v) {


    if (v == startServiceButton) {


    When the startServiceButton is clicked, we call the startService method, passing
    in the intent just created to refer to our Service. The startService method is
    a part of the Context class of which activity is a child.


    startService(serviceIntent);


    }


    else if (v == stopServiceButton) {


    When the stopServiceButton is clicked, we call the stopService method, passing
    in the same intent that refers to our Service. As with startService, stopService
    is part of the Context class.


    stopService(serviceIntent);


    }


    }


    }


