  trans: "\n### 相机权限\n\n为了使用`Camera`类来拍摄图像，我们需要在`AndroidManifest.xml`文件中声明我们要求`CAMERA`权限。\n\
    \n```xml\n<uses-permission android:name=\"android.permission.CAMERA\" />\n```\n\
    \n### 预览表面\n\n另外，在开始使用相机之前，我们需要创建某种类型的`Surface`，供`Camera`在其上绘制取景器或预览图像。`Surface`是\
