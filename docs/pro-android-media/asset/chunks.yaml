    files (.3gp) as well as H.264.


    H.264 is also referred to as MPEG-4 part 10 or AVC (Advanced Video Coding). It
    is one of the contenders for the video codec crown and probably offers the widest
    amount of support across software and hardware. H.264 is supported by Silverlight,
    Flash,


    iPhone/iPod, Blu-ray devices, and so on. Android supports H.264 encoded video
    in the MPEG-4 container format (.mp4).


