    ## 第十章：高级视频


    **图 10-2.** *缩略图尺寸相同的 VideoGallery 活动*


    ### 网络视频


    随着越来越多的媒体内容转移到互联网上，Android 提供良好的播放支持是合情合理的，事实上它也做到了。在本章的剩余部分，我们将探讨所支持的协议和视频格式的细节，以及如何利用网络视频。


    ### 支持的网络视频类型


    Android 目前支持两种不同的网络视频传输协议。


    #### HTTP


    第一种是通过标准 HTTP 传输的媒体。由于 HTTP 在网络中得到广泛支持，且通常不像其他流媒体协议那样会遇到防火墙问题，因此大量媒体都通过这种方式提供。通过
    HTTP 传输的媒体通常被称为渐进式下载。


    Android 支持通过标准 Web 服务器以 HTTP 方式传输的 MPEG-4 和 3GP 文件中的点播媒体。目前，它不支持使用 Apple、Microsoft
    或 Adobe 目前采用的新技术通过 HTTP 传输直播视频。


    在准备用于渐进式下载的视频时，需要牢记以下几点。首先，媒体必须使用 Android 支持的编解码器并以支持的格式进行编码（有关 Android 支持的格式和编解码器的详细信息，请参阅第九章）。


    有许多免费和商业工具可用于准备通过 HTTP 渐进式下载传输的媒体。以下是一些工具（排名不分先后）：QuickTime X、Adobe Media Encoder、HandBrake
    和 VLC。QuickTime X 具有适用于 iPhone 编码的预设，这些预设对 Android 也适用。Adobe Media Encoder 具有适用于
    iPod 的预设，似乎也同样有效。一般来说，如果某个软件具有适用于 iPhone 的预设，它们很可能也适用于 Android 设备。


    其次，视频的比特率应在能够承载该视频的网络传输能力范围内。例如，GPRS 带宽可能低至 20 kbps，因此音频和视频的编码需要考虑到这一点。通常，在通过
    HTTP 传输时，媒体会在设备上进行缓冲，当下载的数据量足以使播放能够直接进行到文件末尾而无需暂停等待更多媒体下载时，播放就会开始。如果媒体传输速度仅为 20
    kbps，而媒体的编码速度为 400 kbps，这意味着用户观看每 1 秒的视频就需要下载 20 秒。这大概不太理想。


    不过，如果用户使用的是 WiFi，那么 400 kbps 可能就足够了，并且与编码为 20 kbps 的视频相比，能提供画质更好的视频。通常，需要在所用网络的速度与视频质量之间进行权衡。使用
    HTTP 渐进式下载的一个好处是它可以做到这一点：媒体不需要像我们接下来要讨论的 RTSP 那样实时传输。


    最后，为了使视频能够边下载边播放，必须采用允许这样做的编码方式。具体来说，这意味着最终生成的文件应该在其开头包含所谓的 `moov` 原子。`moov` 原子包含了文件内容及其组织方式的索引。视频播放软件为了能够开始播放视频，需要知道这些信息。如果
    `moov` 原子位于文件末尾，那么播放软件必须等到整个文件下载完成后才能开始播放，以便获取 `moov` 原子。


    不幸的是，一些视频采集和编码工具不会自动执行此步骤。在某些情况下，这只是一个配置设置；在其他情况下，您可能需要手动执行此步骤。有一个名为 `qt-faststart`
    的命令行应用程序已被开发出来，并移植到了许多不同的操作系统上，它也是一些 GUI 应用程序的基础。您可以访问 [`multimedia.cx/eggs/improving-qt-faststart/`](http://multimedia.cx/eggs/improving-qt-faststart)
    了解相关信息并进行下载。


    #### RTSP


    Android 支持的第二种网络视频传输协议是 RTSP。RTSP 代表实时流媒体协议，从技术上讲，它并非媒体传输协议；相反，它是一种用于支持媒体传输的控制协议。

    '
- fmt: "# Advanced Video\n\n一种与 RTSP 一同在 Android 中受支持的媒体传输形式是 RTP (实时传输协议)，但仅在与 RTSP\
    \ 配对时使用。换句话说，Android 上的 RTP 不能独立于 RTSP 工作。\n\n`RTSP` 和 `RTP` 专用于实时流媒体，这与 HTTP\
    \ 渐进式下载有很大不同，因为媒体在通过网络接收的同时进行播放。\n\n这也意味着需要专门的服务器来传输媒体。市面上有多种 RTSP 服务器：Apple 的开源\
    \ Darwin Streaming Server、RealNetwork 的 Helix Server 以及 Wowza Media Server。遗憾的是，搭建和使用服务器超出了本书的讨论范围。幸运的是，存在一个通过\
    \ RTSP 传输媒体的高度可靠的服务可供我们测试（YouTube 的移动网站，可通过 [http://m.youtube.com](http://m.youtube.com)\
    \ 访问）。\n\n与渐进式下载类似，在准备通过 RTSP 传输的媒体时，需要考虑几件事。首先，媒体需要使用 Android 支持的编解码器和文件格式进行编码，并且该文件格式应能被\
    \ RTSP 服务器流式传输。通常，移动设备的流媒体被编码为 3GP 容器中的 MP4 视频和 AAC 音频，尽管也支持其他编解码器（`H.264`）和容器（`MP4`）。\n\
    \n**注意：** Android 目前有两个底层媒体框架，PacketVideo 的 `OpenCORE` 和 Android 特有的 `Stagefright`。`OpenCORE`\
    \ 是 Android 中一直使用的原始框架，并且在 Android 2.2（引入 `Stagefright` 时）之前一直独占使用。\n\n在 Android\
    \ 2.2（及所有先前版本）中，`OpenCORE` 是用于流媒体视频（RTSP）的框架，尽管未来可能会改变。哪个框架被使用将由手机制造商决定，并且两个框架在\
    \ API 层面应该是兼容的。由于这一切都在后台进行，幸运的是，作为开发者，我们不需要关心底层使用的是哪个框架。\n\n关于哪些协议、编解码器、容器格式和流媒体协议受支持，更多信息可以在\
    \ [www.opencore.net](http://www.opencore.net) 找到。具体来说，`OpenCORE` 多媒体框架能力文档可在 `www.opencore.net/files/opencore_framework_capabilities.pdf`\
    \ 获取。（遗憾的是，目前尚无关于 `Stagefright` 能力的公开文档。）\n\n最后，媒体的比特率必须能够根据用户的网络连接实时传输给最终用户。这些速度根据网络类型的不同而有很大差异。第二代网络（GPRS）提供的数据速度最高在\
    \ 50 到 100 kbps 范围内。要在此类网络上实时传输直播视频，需要将视频编码在 30 kbps 左右，以应对开销和变化的连接质量。升级到 EDGE\
    \ 网络应能可靠地传输 50 kbps 左右的视频，而目前 3G 网络的保守比特率大约在 100 kbps，许多网络能够支持更高的比特率。\n\n与 HTTP\
    \ 渐进式下载不同，RTSP 也可以用于直播流媒体，这是其相对于传统 HTTP 传输的主要优势之一。RTSP 还支持在点播媒体中定位搜索。这意味着用户可以直接跳转到视频的特定位置，而无需下载直到该位置之前的所有媒体。服务器只负责向播放器提供该文件位置处的媒体。\n\
    \n## 网络视频播放\n\nAndroid 在以第 9 章讨论的三种视频播放方式中支持 HTTP 和 RTSP 视频播放。通过 Intent 使用内置的\
