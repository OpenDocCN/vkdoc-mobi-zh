    is our constant for that.


    Next we list the View objects that will display the data from those columns. Since
    we just have one column, we need only one View object. It is android.R.id.text1\.
    This


    View is available to us, as it is part of the android.R.layout.simple_list_item_1
    layout that we’ll be using in the next step.


    Last we call the setListAdapter method, passing in a SimpleCursorAdapter, which
    we


    are creating inline. The SimpleCursorAdapter is a simple adapter from a Cursor
    object containing data to a ListActivity. In creating the SimpleCursoryAdapter,
    we pass in our activity (this) as the Context, a standard ListView layout that
    is already defined for us (android.R.layout.simple_list_item_1), the Cursor object
    containing the data, and the two arrays we just defined.


