    And, we’ll need to add these permissions to AndroidManifest.xml.


    <uses-permission android:name="android.permission.RECORD_AUDIO"></uses-permission>
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE">


    </uses-permission>


    **CHAPTER 7: Audio Capture**


    **177**


    As we have seen, using the AudioRecord and AudioTrack classes to create a capture
    and playback application is much more cumbersome than working with the MediaRecorder


    and MediaPlayer classes. But as we’ll see in the next chapter, it is worth the
    effort when we need to do any type of audio processing or want to synthesize audio.


    **Summary**


    In this chapter, we looked at three different methods for recording audio on Android.


    Each of them comes with their own plusses and minuses. Using the built-in sound


    recorder is great for no-fuss audio recordings, where little or no programmatic
    control is needed. Using the MediaRecorder allows us to take it a step further,
    allowing control over the length of time media is recorded and other aspects but
    leaving the interface up to us. Last we investigated the ability to record raw
    samples with AudioRecord. Using this we have the most control and flexibility
    but have to do the most work in order to capture and work with the audio.


    In the next chapter, we’ll look more at audio possibilities, investigating audio
    processing and synthesis.


