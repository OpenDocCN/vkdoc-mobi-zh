    **Finger Painting**


    Creating a static drawing on a Bitmap Canvas is all well and good, but let’s take
    this a bit further and explore how we can make an application that allows the
    user to create a drawing.


    **Touch Events**


    To start this application, we’ll need to understand how Android tells us when
    a user has touched the touchscreen. Being able to handle that, we can then allow
    the user create a drawing using his or her fingers on the touchscreen.


    As we know, many of the UI elements that we use in Android derive from the View
    class.


    Since we have been working with the Canvas from a Bitmap that is displayed in
    an


    ImageView, it makes sense to see if that can help us out with detecting where
    the user touches.


    As luck would have it, the View class is touch-capable. It has a method where
    we specify what class should receive any touch events that it gets. This method
    is


    setOnTouchListener, and it takes in an object that implements the OnTouchListener


    interface.


    We can make our activity implement OnTouchListener by declaring it and creating
    a


    method called onTouch.


    **94**


    ## CHAPTER 4: Graphics and Touch Events


    public class SimpleFingerDraw extends Activity **implements OnTouchListener**
    {


    ImageView imageView;


    Bitmap bitmap;


    Canvas canvas;


    Paint paint;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    imageView = (ImageView) this.findViewById(R.id.ImageView);


    Display currentDisplay = getWindowManager().getDefaultDisplay();


    float dw = currentDisplay.getWidth();


    float dh = currentDisplay.getHeight();


    bitmap = Bitmap.createBitmap((int)dw,(int)dh,Bitmap.Config.ARGB_8888);


    canvas = new Canvas(bitmap);


    paint = new Paint();


    paint.setColor(Color.GREEN);


    imageView.setImageBitmap(bitmap);


    **imageView.setOnTouchListener(this);**


    }


    **public boolean onTouch(View v, MotionEvent event) {**


    **return false;**


    }


    }


    Now whenever the ImageView is touched, the onTouch method in our activity will
    be


    called.


    We can determine what kind of touch occurred by looking at the MotionEvent object
    that is passed into our onTouch method. To do so, we call the getAction on that
    object. The getAction method will return one of four values that are defined as
    constants in the MotionEvent class.


    *MotionEvent.ACTION_DOWN*: This indicates that the view has received a


    touch.


    *MotionEvent.ACTION_UP*: This indicates that the view has stopped


    receiving a touch.


    *MotionEvent.ACTION_MOVE*: This indicates that after a touch down has


    occurred, some movement has taken place before the ACTION_UP


    event.


    *MotionEvent.ACTION_CANCEL*: This indicates that the touch has been


    cancelled and should be ignored.


    In addition, we can call the getX and getY methods on the MotionEvent object to


    determine where the touch event took place.


    **CHAPTER 4: Graphics and Touch Events**


    **95**


    Here is an update to our onTouch method, taking into account the different event


    possibilities and drawing a line between the touch down and touch up events:


    **float downx = 0;**


    **float downy = 0;**


    **float upx = 0;**


    **float upy = 0;**


    public boolean onTouch(View v, MotionEvent event) {


    **int action = event.getAction();**


    **switch (action)**


    {


    **case MotionEvent.ACTION_DOWN:**


    **downx = event.getX();**


    **downy = event.getY();**


    **break;**


    **case MotionEvent.ACTION_MOVE:**


    **break;**


    **case MotionEvent.ACTION_UP:**


    **upx = event.getX();**


    **upy = event.getY();**


    **canvas.drawLine(downx, downy, upx, upy, paint);**


    **imageView.invalidate();**


    **break;**


    **case MotionEvent.ACTION_CANCEL:**


    **break;**


    **default:**


    **break;**


    }


    **return true;**


    }


    You’ll notice several things about this code. First, we aren’t doing anything
    on


    ACTION_MOVE or ACTION_CANCEL. In ACTION_DOWN we are simply setting our downx and
    downy variables to be the X and Y position of the touch. In ACTION_UP we are setting
    upx and upy to be the X and Y position of the touch up event and then calling
    the drawLine


