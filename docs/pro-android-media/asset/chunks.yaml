    \n另外，`setRotation` 方法也可以传入旋转角度和旋转中心点的坐标。选择图像的中心点作为旋转中心，可能会得到更符合我们预期的结果，如图 3-9\
    \ 所示。\n\n```\nmatrix.setRotate(15, bmp.getWidth()/2, bmp.getHeight()/2);\n```\n\
    \n![](img/index-74_1.jpg)\n\n**图 3-9.** *绕图像中点旋转*\n\n### 缩放\n\n`Matrix` 的另一个实用方法是\
    \ `setScale` 方法。它接收两个浮点数，分别表示在每个轴向上的缩放量。第一个参数是 x 轴缩放比例，第二个参数是 y 轴缩放比例。图 3-10 显示了以下\
    \ `setScale` 方法调用的结果。\n\n```\nmatrix.setScale(1.5f, 1);\n```\n\n![](img/index-75_1.jpg)\n\
    \n**图 3-10.** *在 x 轴上应用 1.5 倍缩放*\n\n### 平移\n\n`Matrix` 最实用的方法之一是 `setTranslate`\
    \ 方法。平移操作只是将图像在 x 轴和 y 轴上移动。`setTranslate` 方法接收两个浮点数，分别表示在每个轴上的移动量。第一个参数是图像在 x\
    \ 轴上的移动量，第二个参数是图像在 y 轴上的移动量。x 轴上的正值将使图像向右移动，负值则向左移动。y 轴上的正值将使图像向下移动，负值则向上移动。\n\
    \n```\nmatrix.setTranslate(1.5f, -10);\n```\n\n### 前置与后置\n\n当然，这些只是冰山一角。还有更多方法可能对你有用。每个方法也都有对应的前置（pre）和后置（post）版本。这使你能够按顺序一次性执行多个变换。例如，你可以先执行\
