- fmt: "# CHAPTER 9: Introduction to Video\n\n`finish();`\n\n```\ncurrentDisplay =\
    \ getWindowManager().getDefaultDisplay();\n```\n\nSince our activity implements\
    \ `SurfaceHolder.Callback` and is assigned to be the callback listener, the following\
    \ three methods will get triggered.\n\n`surfaceCreated` will be called when the\
    \ underlying `Surface` in `SurfaceView` is created.\n\n```\npublic void surfaceCreated(SurfaceHolder\
    \ holder) {\n    Log.v(LOGTAG,\"surfaceCreated Called\");\n```\n\nWhen the `Surface`\
    \ is created, we can specify that the `MediaPlayer` use the `Surface` for playback\
    \ by calling its `setDisplay` method, passing in the `SurfaceHolder` object.\n\
    \n```\nmediaPlayer.setDisplay(holder);\n```\n\nFinally, after we specify the `Surface`,\
    \ we can call `prepare`. The `prepare` method blocks rather than doing the work\
    \ in the background. To have it do the work in the background, so as to not tie\
    \ up the application, we could use `prepareAsync` instead. Either way, since we\
    \ have implemented the `OnPreparedListener` and our activity is set to be the\
    \ listener, our `onPrepared` method will be called when it is done.\n\nThe `prepare`\
    \ method can throw a couple of extensions that we need to take care of. For brevity\
    \ we'll just log the error and quit. In your application, you'll probably want\
    \ to intelligently handle these exceptions.\n\n```\ntry {\n    mediaPlayer.prepare();\n\
    } catch (IllegalStateException e) {\n    Log.v(LOGTAG,e.getMessage());\n    finish();\n\
    } catch (IOException e) {\n    Log.v(LOGTAG,e.getMessage());\n    finish();\n\
    }\n```\n\n`surfaceChanged` will be called when the width, height, or other parameter\
    \ of the `Surface` underlying the `SurfaceView` changes. In this example, we don't\
    \ need to do anything in this case.\n\n```\npublic void surfaceChanged(SurfaceHolder\
    \ holder, int format, int width, int height){\n    Log.v(LOGTAG,\"surfaceChanged\
    \ Called\");\n}\n```\n\n`surfaceDestroyed` will be called when the underlying\
