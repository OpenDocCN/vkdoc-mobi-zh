    LOCAL ASSETS


    When placing assets in the res folder of an Android Developer Tools/Eclipse project,
    a couple of things have to be considered: the file extension and using Uris.


    **File Extensions**


    The extension is removed, so files with the same base name but different extensions
    will cause issues.


    You wouldn’t want to put a file named goodmorningandroid.mp3 and another file
    named goodmorningandroid.m4a in there. Instead, if you would like to provide the
    same audio in multiple formats, it would be better if you included the format
    as part of the file name so that you can differentiate between them and the Android
    Developer Tools doesn’t have problems generating the resource ID. If you name
    them goodmorningandroid_mp3.mp3 and goodmorningandroid_m4a.m4a, you will be able
    to reference them as R.raw.goodmorningandroid_mp3 and R.raw.goodmorningandroid_m4a


    respectively.


    **Uris for Resource Files**


    While resource IDs are great for some purposes, they don’t suit all. As we already
    know, many things in Android can be accomplished using a Uri. Fortunately, it
    is easy to construct a Uri for a file that has been placed in the resources. The
    resource ID can be appended to the end of a string, which can be used to construct
    the Uri. The string must start with android.resource://, followed by the package
    name of the application that the resources are local to, followed by the resource
    ID of the file.


    Here is an example:


    Uri fileUri = Uri.parse("android.resource://com.apress.proandroidmedia.ch5.customaudio/"


    + R.raw.goodmorningandroid);


    To use the MediaPlayer with a Uri instead of a resource ID, which we will have
    to do if the file isn’t part of the application, we can call a create method passing
    in the context and the Uri.


    MediaPlayer mediaPlayer = MediaPlayer.create(this, fileUri);


    **Controlling Playback**


    The MediaPlayer class has several nested classes that are interfaces for listening
    to events that the MediaPlayer sends. These events relate to state changes.


    For instance, the MediaPlayer will call the onCompletion method on a class that


    implements the OnCompletionListener and is registered via the


    setOnCompletionListener. This will be done when an audio file is done playing.


    Here is a full example of an activity that infinitely repeats, playing the same
    audio file by using the OnCompletionListener. The MediaPlayer object is initialized
    and playback


    started in the onStart method, with playback stopped and the MediaPlayer object


    released in the onStop method. This prevents the audio from playing when the activity
    is no longer in the front but restarts it when the activity is brought to the
    front again.


    **112**


    **CHAPTER 5: Introduction to Audio on Android**


    package com.apress.proandroidmedia.ch5.customaudio;


    import android.app.Activity;


    import android.media.MediaPlayer;


    import android.media.MediaPlayer.OnCompletionListener;


    import android.os.Bundle;


    public class CustomAudioPlayer extends Activity implements OnCompletionListener
    {


    MediaPlayer mediaPlayer;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    }


    public void onStart() {


    super.onStart();


    mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);


    mediaPlayer.setOnCompletionListener(this);


    mediaPlayer.start();


    }


    public void onStop() {


    super.onStop();


    mediaPlayer.stop();


    mediaPlayer.release();


    }


    public void onCompletion(MediaPlayer mp) {


    mediaPlayer.start();


    }


    }


    Of course, this could be done without the OnCompletionListener by simply setting
    the MediaPlayer to loop using the setLooping(true) method.


    Let’s take this a step further and make it so that the playback is controlled
    by touch events. This code might be a good starting point for making a DJ audio
    scratching


    application.


    package com.apress.proandroidmedia.ch5.customaudio;


    import android.app.Activity;


    import android.media.MediaPlayer;


    import android.media.MediaPlayer.OnCompletionListener;


    import android.os.Bundle;


    import android.util.Log;


