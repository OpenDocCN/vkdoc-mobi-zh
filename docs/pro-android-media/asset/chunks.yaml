    \ = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA));\n\
    \    newVVI.title = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.TITLE));\n\
    \    Log.v(\"VideoGallery\", \"Title \" + newVVI.title);\n    newVVI.mimeType\
    \ = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE));\n\
    \    Log.v(\"VideoGallery\", \"Mime \" + newVVI.mimeType);\n```\n\n最后，我们将 `VideoViewInfo`\
    \ 添加到 `videoRows` 这个 `ArrayList` 中。\n\n```\n    videoRows.add(newVVI);\n} while\
    \ (cursor.moveToNext());\n```\n\n一旦获取完所有视频，我们就可以继续后续操作。我们将 `ListView` 对象的适配器设置为\
    \ `VideoGalleryAdapter` 的一个新实例，该类是此处定义的一个内部类。我们还将此活动设置为 `ListView` 的 `OnItemClickListener`。\n\
    \n```\nlistView.setAdapter(new VideoGalleryAdapter(this, videoRows));\nlistView.setOnItemClickListener(this);\n\
    ```\n\n当点击 `ListView` 中的某一项时，`onItemClick` 方法会被调用。在该方法中，我们从 `Cursor` 中提取所需数据，并创建一个\
    \ `Intent` 来启动设备上的默认媒体播放器应用以播放该视频。我们本可以创建自己的 `MediaPlayer` 或在此处使用 `VideoView`\
    \ 类来替代。\n\n```\npublic void onItemClick(AdapterView<?> l, View v, int position,\
    \ long id) {\n    if (cursor.moveToPosition(position)) {\n        int fileColumn\
    \ = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA);\n        int mimeColumn\
    \ = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE);\n        String\
    \ videoFilePath = cursor.getString(fileColumn);\n        String mimeType = cursor.getString(mimeColumn);\n\
    \        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n   \
    \     File newFile = new File(videoFilePath);\n        intent.setDataAndType(Uri.fromFile(newFile),\
    \ mimeType);\n        startActivity(intent);\n    }\n}\n```\n\n接下来是一个非常基础的 `VideoViewInfo`\
    \ 类，用于保存关于每个返回视频的信息。\n\n```\nclass VideoViewInfo {\n    String filePath;\n   \
    \ String mimeType;\n    String thumbPath;\n    String title;\n}\n```\n\n由于我们在活动中使用\
    \ `ListView` 来显示从 `MediaStore` 查询返回的每个视频，我们将使用 `ListView` 来显示视频的标题和缩略图。为了将数据交给\
    \ `ListView`，我们需要构建一个适配器。接下来，我们创建一个继承自 `BaseAdapter` 的适配器 `VideoGalleryAdapter`。\n\
    \n当此类被构造时，它会接收到一个保存了所有从 `MediaStore` 查询返回视频的 `ArrayList`。\n\n`BaseAdapter` 是一个抽象类，因此要扩展它，我们需要实现几个方法。它们中的大多数都很简单，仅对传入的\
    \ `ArrayList` 进行操作，例如 `getCount` 和 `getItem`。最需要关注的方法是 `getView` 方法。\n\n```\n\
    class VideoGalleryAdapter extends BaseAdapter {\n    private Context context;\n\
    \    private List<VideoViewInfo> videoItems;\n    LayoutInflater inflater;\n\n\
    \    public VideoGalleryAdapter(Context context, ArrayList<VideoViewInfo> items)\
    \ {\n        context = context;\n        videoItems = items;\n        inflater\
    \ = (LayoutInflater) context.getSystemService(Context.LAYOUT_INFLATER_SERVICE);\n\
    \    }\n\n    public int getCount() {\n        return videoItems.size();\n   \
    \ }\n\n    public Object getItem(int position) {\n        return videoItems.get(position);\n\
    \    }\n\n    public long getItemId(int position) {\n        return position;\n\
    \    }\n```\n\n`getView` 方法用于返回 `ListView` 中每一行所代表的视图。它接收一个表示要返回行的位置参数（以及一个表示当前视图的\
    \ `View` 对象和一个表示父 `ViewGroup` 的对象）。\n\n```\n    public View getView(int position,\
    \ View convertView, ViewGroup parent) {\n```\n\n为了构造要返回的视图，我们需要对用于每一行的布局进行填充。本例中，我们使用的布局定义在\
    \ `list_item.xml` 中（此处已展示）。\n\n```\n        View videoRow = inflater.inflate(R.layout.list_item,\
    \ null);\n```\n\n布局填充完成后，我们可以获取其中定义的各个视图，并使用 `VideoViewInfo` 对象的 `ArrayList` 中的数据来定义显示内容。以下是针对用于显示每个视频缩略图的\
    \ `ImageView` 的处理方式。\n\n```\n        ImageView videoThumb = (ImageView) videoRow.findViewById(R.id.ImageView);\n\
    \        if (videoItems.get(position).thumbPath != null) {\n            videoThumb.setImageURI(Uri.parse(videoItems.get(position).thumbPath));\n\
    \        }\n```\n\n此处我们获取视频标题对应的 `TextView` 引用，并根据 `VideoViewInfo` 对象的 `ArrayList`\
    \ 中的数据设置其文本。\n\n```\n        TextView videoTitle = (TextView) videoRow.findViewById(R.id.TextView);\n\
    \        videoTitle.setText(videoItems.get(position).title);\n```\n\n最后，我们返回新构造的视图。\n\
    \n```\n        return videoRow;\n    }\n}\n```\n\n以下是定义活动布局的 `main.xml` 文件。\n\n\
    ```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    >\n    <ListView\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/ListView\"></ListView>\n</LinearLayout>\n\
    ```\n\n以下是 `list_item.xml` 文件，用于定义 `ListView` 每一行的布局。\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
    >\n    <ImageView\n        android:id=\"@+id/ImageView\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"></ImageView>\n\
    \    <TextView\n        android:text=\"@+id/TextView01\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:id=\"\
    @+id/TextView\"></TextView>\n</LinearLayout>\n```\n\n**图 10–1.** *VideoGallery\
    \ 活动界面*\n\n你会注意到，图 10–1 中我们示例显示的缩略图尺寸不同。它们是由 `MediaScanner` 服务创建的，大小与视频本身一致。为了以统一尺寸显示缩略图，我们可以调整\
    \ `list_item.xml` 中 `ImageView` 元素的参数。\n\n```xml\n<ImageView\n    android:id=\"\
    @+id/ImageView\"\n    android:layout_width=\"50dip\"\n    android:layout_height=\"\
    50dip\"></ImageView>\n```\n\n现在，每个视频缩略图都将以 50 dip 乘以 50 dip 的尺寸显示，如图 10–2 所示。（术语\
    \ *dip* 代表“密度无关像素”。无论屏幕像素的分辨率或密度如何，160 dip 在显示屏上相当于 1 英寸。）\n"
- fmt: '## CHAPTER 10: Advanced Video


    **Figure 10-2.** *VideoGallery activity with thumbnails the same size*


    ### Networked Video


    As more and more media moves onto the Internet, it makes sense for Android to
    have good support for playing it back, which it does. For the remainder of this
    chapter, we''ll explore the details of what is supported in terms of protocols
    and video formats, and how to harness network video.


    ### Supported Network Video Types


    Android currently supports two different protocols for network delivered video.


    #### HTTP


    The first is media delivered via standard HTTP. As HTTP is broadly supported across
    networks and doesn''t typically have problems with firewalls as other streaming
    protocols have had, a large amount of media is available in this manner. Media
    delivered via HTTP is commonly referred to as progressive download.


    Android supports on-demand media within MPEG-4 and 3GP files delivered from a
    standard web server via HTTP. At this time, it does not support the delivery of
    live video via HTTP using any of the new techniques now being used by Apple, Microsoft,
    or Adobe.


    There are several things to keep in mind when preparing video for delivery via
    progressive download. First, the media has to be encoded with a codec and in a
    format that Android supports (see Chapter 9 for details about the formats and
    codecs that Android supports).


    There are many free and commercial tools available to prepare media for delivery
    via HTTP progressive download. A few of them, in no particular order, are QuickTime
    X, Adobe Media Encoder, HandBrake, and VLC. QuickTime X has presets for iPhone
    encoding that work well with Android. Adobe Media Encoder has presets for iPod
    that seem to work as well. In general, if a piece of software has presets for
    the iPhone, they will likely work for Android devices.


    Second, the bitrate of the video should be in the range of what can be delivered
    over the network that will carry the video. For instance, GPRS bandwidth could
    be as low as 20 kbps, and therefore the audio and video should be encoded with
    that in mind. In general, when delivered via HTTP, the media will be buffered
    on the device, and playback will start when enough has been downloaded that the
    playback should be able to go straight through to the end of the file without
    having to pause while waiting for more media to download. If the delivery of the
    media is only 20 kbps and the media is encoded at 400 kbps, that means that for
    each second of video the user will have to be downloading for 20 seconds. This
    probably isn''t ideal.


    If, though, the user is on WiFi, 400 kbps is probably good and will provide nice-looking
    video as compared to video that is encoded at 20 kbps. In general, the speed of
    the network that will be used has to be weighed against the quality of the video.
    The nice thing about using HTTP progressive download is that this can be done:
    the media doesn''t have to be delivered in real time as it does with RTSP, which
    we''ll discuss next.


    Finally, in order for the video to be played back while it is downloading, it
    has to be encoded in a manner that allows this. Specifically this means that the
    resulting file should have what is called the `moov` atom at the front of the
    file. The `moov` atom contains an index of what is in the file and how it is organized.
    In order for the video playback software to be able to start playing back the
    video, it needs to know this information. If the `moov` atom is at the end of
    the file, the playback software can''t start playback until the entire file is
    downloaded so it can get the `moov` atom.


    Unfortunately, some video capture and encoding tools do not automatically perform
    this step. In some cases, it is simply a configuration setting; in other cases,
    you may need to do this step manually. A command-line application called `qt-faststart`
    has been developed and ported to many different operating systems and forms the
    basis for several GUI applications as well. It can be read about and downloaded
    from [http://multimedia.cx/eggs/improving-qt-faststart/](http://multimedia.cx/eggs/improving-qt-faststart).


    #### RTSP


    The second protocol that Android supports for network delivery of video is RTSP.
    RTSP stands for Real Time Streaming Protocol and is technically not a media delivery
    protocol; rather, it is a control protocol that is used in support of media delivery.'
