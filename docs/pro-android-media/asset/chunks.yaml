    stream.


    #EXTM3U


    #EXTINF:0,Live Stream Name


    [http://www.nostreamhere.org:8000/](http://www.nostreamhere.org:8000)


    The first line, #EXTM3U, is required and specifies that what follows is an Extended
    M3U


    file that can contain extra information. Extra information about a playlist entry
    is specified on the line above the entry and starts with #EXTINF:, followed by
    the duration in seconds, a comma, and then the name of the media.


