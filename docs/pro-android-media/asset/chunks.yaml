    Our onActivityResult method is triggered when the sound recorder activity is complete.


    The resultCode should equal the RESULT_OK constant, and the requestCode should
    equal the value we passed into the startActivityForResult method, RECORD_REQUEST.
    If both of those are true, then we can retrieve the Uri of the recorded audio
    file by getting it out of the intent that is passed back to us through its getData
    method. Once all of that is done, we enable the playRecording Button so that we
    can play the returned audio file.


    protected void onActivityResult (int requestCode, int resultCode, Intent data)
    {


    if (resultCode == RESULT_OK && requestCode == RECORD_REQUEST) {


    audioFileUri = data.getData();


    playRecording.setEnabled(true);


    }


    }


    Finally, in our onCompletion method, which is called when the MediaPlayer is done


    playing a file, we re-enable the playRecording Button so the user may listen to
    the audio file again if he or she so chooses.


    public void onCompletion(MediaPlayer mp) {


    playRecording.setEnabled(true);


    }


    }


