    Any smartphone worth its name these days has audio playback capabilities on par
    with dedicated portable media devices or MP3 players. Of course, Android-based
    devices


    are no different. These capabilities allow for the building of music player, audio
    book, podcast, or just about any other type of application that is centered around
    audio


    playback.


    In this chapter, we’ll explore what Android’s capabilities are in terms of format
    and codec support, and we’ll build a few different playback applications. Furthermore
    we’ll look at what Android supports in the way of audio formats and metadata.


    **Audio Playback**


    As mentioned, Android supports audio playback capabilities on par with MP3 players.
    In fact, it probably goes a step further since it supports a fairly wide range
    of audio formats, more than most hardware players. This is one of the benefits
    of smartphones that perform functions previously relegated to dedicated hardware,
    since they have


    good faculties for running a variety of software; like a computer, they can offer
    a wide range of support for different and changing technologies that are simply
    not practical to build into the firmware of hardware-centric devices.


    **106**


    **CHAPTER 5: Introduction to Audio on Android**


    **Supported Audio Formats**


    Android supports a variety of audio file formats and codecs for playback (it supports
    fewer for recording, which we’ll discuss when we go over recording).


    *AAC*: Advanced Audio Coding codec (as well as both profiles of HE—


    AAC, High Efficiency AAC), .m4a (audio/m4a) or.3gp (audio/3gpp) files.


    AAC is a popular standard that is used by the iPod and other portable


    media players. Android supports this audio format inside of MPEG-4


    audio files and inside of 3GP files (which are based on the MPEG-4


    format). Recent additions to the AAC specification, High Efficiency


    AAC are also supported.


    *MP3*: MPEG-1 Audio Layer 3, .mp3 (audio/mp3) files. MP3, probably


    the most widely used audio codec, is supported. This allows Android


    to utilize the vast majority of audio available online through various


    web sites and music stores.


    *AMR*: Adaptive Multi-Rate codec (both AMR Narrowband, AMR-NB,


    and AMR Wideband, AMR-WB), .3gp (audio/3gpp) or .amr (audio/amr)


    files. AMR is the audio codec that has been standardized as the


    primary voice audio codec in use by the 3GPP (3rd Generation


    Partnership Project). The 3GPP is a telecommunications industry


    organization that creates specifications for the partner companies to


    use. In other words, the AMR codec is what is primarily used for voice


    calling applications on modern mobile phones and generally


    supported across mobile handset manufacturers and carriers. As


    such, this codec is generally useful for voice encoding but doesn’t


    perform well for more complex types of audio such as music.


    *Ogg*: Ogg Vorbis, .ogg (application/ogg) files. Ogg Vorbis is an open


    source, patent-free audio codec with quality that is comparable to


    commercial and patent-encumbered codecs such as MP3 and AAC. It


    was developed by volunteers and is currently maintained by the


    Xiph.Org foundation.


    **CHAPTER 5: Introduction to Audio on Android**


    **107**


    *PCM*: Pulse Code Modulation commonly used in WAVE or WAV files


    (Waveform Audio Format), .wav (audio/x-wav) files. PCM is the


    technique used for storing audio on computers and other digital audio


    devices. It is generally an uncompressed audio file with data that


    represents the amplitude of a piece of audio over time. The “sample


    rate” is how often an amplitude reading is stored. The “bit-depth” is


    how many bits are used to represent an individual sample. A piece of


    audio data with a sample rate of 16kHz and a bit-depth of 32 bits


    means that it will contain 32 bits of data representing the amplitude of


    the audio and it will have 16,000 of these per second. The higher the


    sample rate and the higher the bit-depth, the more accurate the


    digitization of the audio is. Sample rate and bit-depth also determine


    how large the audio file will be when its length is taken into account.


    Android supports PCM audio data within WAV files. WAV is a long—


    standing standard audio format on PCs.


    **Using the Built-In Audio Player via an Intent**


    As with using the camera, the easiest way to provide the ability to play an audio
    file within an application is to leverage the capabilities of the built-in “Music”
    application.


    This application plays all of the formats that Android supports, has a familiar
    interface to the user, and can be triggered to play a specific file via an intent.


    The generic android.content.Intent.ACTION_VIEW intent with the data set to a Uri
    to the audio file and the MIME type specified allows Android to pick the appropriate


    application for playback. This should be the Music application, but the user may
    be presented with other options if he or she has other audio playback software
    installed.


    Intent intent = new Intent(android.content.Intent.ACTION_VIEW);


    intent.setDataAndType(audioFileUri, "audio/mp3");


    startActivity(intent);


    **NOTE:** MIME stands for Multipurpose Internet Mail Extensions. It was originally
    specified to help e-mail clients send and receive attachments. Its use, though,
    has extended greatly beyond e-mail to many other communication protocols, including
    HTTP or standard web serving. Android uses MIME types when resolving an intent,
    specifically to help determine which application should handle the intent.


    Each file type has a specific (sometimes more than one) MIME type. This type is
    specified using at least two parts with slashes between them. The first is the
    more generic type, such as “audio.” The second part is the more specific type,
    such as “mpeg.” A generic type “audio” and a more specific type “mpeg” would yield
    a MIME type string of “audio/mpeg,” which is the MIME


    type typically used for MP3 files.


