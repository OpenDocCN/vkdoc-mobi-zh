    ## Creating an Image Viewing Application\n\nWhat follows is a full example that\
    \ queries the `MediaStore` to find images and presents them to the user one after\
    \ the other in the form of a slideshow.\n\n```\npackage com.apress.proandroidmedia.ch1.mediastoregallery;\n\
    \nimport android.app.Activity;\nimport android.database.Cursor;\nimport android.graphics.Bitmap;\n\
    import android.graphics.BitmapFactory;\nimport android.os.Bundle;\nimport android.provider.MediaStore;\n\
    import android.provider.MediaStore.Images.Media;\nimport android.util.Log;\nimport\
    \ android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.ImageButton;\n\
    import android.widget.TextView;\n\npublic class MediaStoreGallery extends Activity\
    \ {\n\npublic final static int DISPLAYWIDTH = 200;\npublic final static int DISPLAYHEIGHT\
    \ = 200;\n```\n\nInstead of using the size of the screen to load and display the\
    \ images, we'll use the foregoing constants to decide how large to display them.\n\
    \n`TextView titleTextView;`\n`ImageButton imageButton;`\n\nIn this example, we\
    \ are using an `ImageButton` instead of an `ImageView`. This gives us both the\
    \ functionality of a `Button` (which can be clicked) and an `ImageView` (which\
    \ can display an image).\n\n`Cursor cursor;`\n`Bitmap bmp;`\n`String imageFilePath;`\n\
    `int fileColumn;`\n`int titleColumn;`\n`int displayColumn;`\n\n```\n@Override\n\
    public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setContentView(R.layout.main);\n\n    titleTextView = (TextView) this.findViewById(R.id.TitleTextView);\n\
    \    imageButton = (ImageButton) this.findViewById(R.id.ImageButton);\n```\n\n\
