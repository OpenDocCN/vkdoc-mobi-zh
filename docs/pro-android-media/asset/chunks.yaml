    \n![](img/index-213_1.jpg)\n\n## 第 9 章：视频简介\n\n### 199\n\n**图 9-2.** *VideoView\
    \ 示例*\n\n## 使用 MediaController 添加控制功能\n\n`VideoView` 对视频播放的控制能力相对有限，具体来说，它只提供了\
