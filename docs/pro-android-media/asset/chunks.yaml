  trans: "\n### **91**\n\n**图 4-13.** *应用斜体样式的衬线字体*\n\n**外部字体**\n\n在 Android 应用程序中，我们并不局限于仅使用内置字体。Android\
    \ 支持从任何 TrueType 字体文件创建 `Typeface` 对象。TrueType 字体是一种标准字体，可在多种平台上使用。这为我们的应用程序开辟了广阔的可能性。\n\
    \n互联网上许多网站提供免费字体，当然，也有一些字体公司，即创建字体并向您出售其字体使用许可的公司。\n\n我发现一种与 Android 内置字体完全不同的字体，是\
    \ Claude Pelletier 创作的 Chopin Script 字体。该字体属于公共领域，可从 fontspace.com（[www.fontspace.com/diogene/chopinscript](http://www.fontspace.com/diogene/chopinscript)）等多种来源免费下载。为了使用该字体，我下载了它，并将\
    \ `.ttf` 文件（`ChopinScript.ttf`）放入项目的 `assets` 文件夹中。\n\n`Typeface.createFromAsset`\
    \ 方法接收一个 `AssetManager` 对象（可以通过从 `Context` 调用 `getAssets` 获取）和文件名。它返回一个 `Typeface`\
    \ 对象，该对象可以传递给 `Paint.setTypeface` 方法。\n\n```\nTypeface chops = Typeface.createFromAsset(getAssets(),\
    \ \"ChopinScript.ttf\");\npaint.setTypeface(chops);\n```\n\n![](img/index-106_1.png)\n\
    \n**92**\n\n## 第 4 章：图形与触摸事件\n\n**图 4-14.** *Chopin Script 字体*\n\n**路径上的文本**\n\
    \n文本并不限于绘制在水平线上；它也可以绘制在 `Path` 上。\n\n以下是一个示例。\n\n```\nPaint paint = new Paint();\n\
    paint.setColor(Color.GREEN);\npaint.setTextSize(20);\npaint.setTypeface(Typeface.DEFAULT);\n\
    Path p = new Path();\np.moveTo(20, 20);\np.lineTo(100, 150);\np.lineTo(200, 220);\n\
    canvas.drawTextOnPath(\"Hello this is text on a path\", p, 0, 0, paint);\n```\n\
    \n![](img/index-107_1.png)\n\n## 第 4 章：图形与触摸事件\n\n### **93**\n\n**图 4-15.** *绘制在路径上的文本*\n\
    \n**手指绘画**\n\n在 `Bitmap Canvas` 上创建静态绘图固然很好，但让我们更进一步，探索如何制作一个允许用户创建绘图的应用程序。\n\n\
    **触摸事件**\n\n要开始这个应用程序，我们需要了解 Android 如何告诉我们用户已触摸触摸屏。能够处理此事件后，我们就可以允许用户使用手指在触摸屏上创建绘图。\n\
    \n众所周知，我们在 Android 中使用的许多 UI 元素都派生自 `View` 类。由于我们一直在使用显示在 `ImageView` 中的 `Bitmap`\
    \ 中的 `Canvas`，因此看看这是否有助于我们检测用户触摸的位置是合理的。\n\n幸运的是，`View` 类支持触摸。它有一个方法，我们可以指定哪个类应接收其获得的任何触摸事件。此方法是\
    \ `setOnTouchListener`，它接收一个实现了 `OnTouchListener` 接口的对象。\n\n我们可以通过声明我们的 Activity\
    \ 实现 `OnTouchListener` 并创建一个名为 `onTouch` 的方法来实现这一点。\n\n**94**\n\n## 第 4 章：图形与触摸事件\n\
    \n```\npublic class SimpleFingerDraw extends Activity implements OnTouchListener\
    \ {\n\n    ImageView imageView;\n    Bitmap bitmap;\n    Canvas canvas;\n    Paint\
    \ paint;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \        imageView = (ImageView) this.findViewById(R.id.ImageView);\n        Display\
    \ currentDisplay = getWindowManager().getDefaultDisplay();\n        float dw =\
    \ currentDisplay.getWidth();\n        float dh = currentDisplay.getHeight();\n\
    \        bitmap = Bitmap.createBitmap((int)dw,(int)dh,Bitmap.Config.ARGB_8888);\n\
    \        canvas = new Canvas(bitmap);\n        paint = new Paint();\n        paint.setColor(Color.GREEN);\n\
    \        imageView.setImageBitmap(bitmap);\n        imageView.setOnTouchListener(this);\n\
    \    }\n\n    public boolean onTouch(View v, MotionEvent event) {\n        return\
    \ false;\n    }\n}\n```\n\n现在，每当 `ImageView` 被触摸时，我们 Activity 中的 `onTouch` 方法就会被调用。\n\
    \n我们可以通过查看传递给 `onTouch` 方法的 `MotionEvent` 对象来确定发生了哪种触摸。为此，我们对该对象调用 `getAction`。`getAction`\
    \ 方法将返回四个值之一，这些值在 `MotionEvent` 类中定义为常量。\n\n- `MotionEvent.ACTION_DOWN`：表示视图已接收到触摸。\n\
    - `MotionEvent.ACTION_UP`：表示视图已停止接收触摸。\n- `MotionEvent.ACTION_MOVE`：表示在触摸按下发生后，在\
    \ `ACTION_UP` 事件之前发生了一些移动。\n- `MotionEvent.ACTION_CANCEL`：表示触摸已被取消，应被忽略。\n\n此外，我们可以调用\
    \ `MotionEvent` 对象的 `getX` 和 `getY` 方法来确定触摸事件发生的位置。\n\n**第 4 章：图形与触摸事件**\n\n**95**\n\
    \n以下是我们的 `onTouch` 方法的更新版本，考虑了不同的事件可能性，并在触摸按下和触摸抬起事件之间绘制一条线：\n\n```\nfloat downx\
    \ = 0;\nfloat downy = 0;\nfloat upx = 0;\nfloat upy = 0;\n\npublic boolean onTouch(View\
    \ v, MotionEvent event) {\n    int action = event.getAction();\n    switch (action)\
    \ {\n        case MotionEvent.ACTION_DOWN:\n            downx = event.getX();\n\
    \            downy = event.getY();\n            break;\n        case MotionEvent.ACTION_MOVE:\n\
    \            break;\n        case MotionEvent.ACTION_UP:\n            upx = event.getX();\n\
    \            upy = event.getY();\n            canvas.drawLine(downx, downy, upx,\
    \ upy, paint);\n            imageView.invalidate();\n            break;\n    \
    \    case MotionEvent.ACTION_CANCEL:\n            break;\n        default:\n \
    \           break;\n    }\n    return true;\n}\n```\n\n你会注意到这段代码的几点。首先，我们没有对 `ACTION_MOVE`\
    \ 或 `ACTION_CANCEL` 做任何处理。在 `ACTION_DOWN` 中，我们只是将 `downx` 和 `downy` 变量设置为触摸的 X\
    \ 和 Y 位置。在 `ACTION_UP` 中，我们将 `upx` 和 `upy` 设置为触摸抬起事件的 X 和 Y 位置，然后调用 `Canvas` 对象的\
    \ `drawLine` 函数。我们还需要调用 `ImageView` 的 `invalidate` 方法，以便它重新绘制到屏幕。如果不这样做，我们就不会看到在\
    \ `Bitmap Canvas` 对象上绘制的新线。最后，我们返回 `true` 而不是 `false`。这告诉 Android，一旦事件开始，我们希望继续接收触摸事件。\n\
    \n![](img/index-110_1.jpg)\n\n**96**\n\n## 第 4 章：图形与触摸事件\n\n**图 4-16.** *基于触摸事件的绘图*\n\
    \n如图 4-16 所示，这个绘图应用程序非常适合从你触摸的点到手指抬起的点画直线。如果我们希望能够在手指移动时绘制线条，我们还需要在 `ACTION_MOVE`\
    \ 分支中实现绘图代码。\n\n```\ncase MotionEvent.ACTION_MOVE:\n    upx = event.getX();\n\
    \    upy = event.getY();\n    canvas.drawLine(downx, downy, upx, upy, paint);\n\
    \    imageView.invalidate();\n    downx = upx;\n    downy = upy;\n    break;\n\
    ```\n\n在这个修改后的示例中，`upx` 和 `upy` 在 `ACTION_MOVE` 中被捕获，绘制线条，然后将 `downx` 和 `downy`\
    \ 变量设置为相同的位置（请记住，线条的起点由 `ACTION_DOWN` 事件中的 `downx` 和 `downy` 定义）。这使得线条绘制应用程序能够跟踪手指在屏幕上的移动。\n\
    \n![](img/index-111_1.jpg)\n\n## 第 4 章：图形与触摸事件\n"
- fmt: "### 97\n\n**Figure 4–17.** *Enhanced touch event–based drawing*\n\n**Drawing\
    \ on Existing Images**\n\nSince we are drawing on a `Canvas`, we can use techniques\
    \ described in the previous chapter to draw an image to the `Canvas` and then\
    \ draw on top of that image.\n\nLet’s go through a full example.\n\n```java\n\
    package com.apress.proandroidmedia.ch4.choosepicturedraw;\n\nimport java.io.FileNotFoundException;\n\
    \nimport android.app.Activity;\n\nimport android.content.Intent;\n\nimport android.graphics.Bitmap;\n\
    \nimport android.graphics.BitmapFactory;\n\nimport android.graphics.Canvas;\n\n\
    import android.graphics.Color;\n\nimport android.graphics.Matrix;\n\nimport android.graphics.Paint;\n\
    \nimport android.net.Uri;\n\nimport android.os.Bundle;\n\nimport android.util.Log;\n\
    \nimport android.view.Display;\n\nimport android.view.MotionEvent;\n\nimport android.view.View;\n\
    ```\n\n**98**\n\n## CHAPTER 4: Graphics and Touch Events\n\n```java\nimport android.view.View.OnClickListener;\n\
    \nimport android.view.View.OnTouchListener;\n\nimport android.widget.Button;\n\
    \nimport android.widget.ImageView;\n```\n\nOur activity will implement both `OnClickListener`\
    \ and `OnTouchListener`. The `OnClickListener` is so that our activity can respond\
    \ to a `Button` press. The `OnTouchListener` is so that we can draw on the `ImageView`\
    \ using the touchscreen.\n\n```java\npublic class ChoosePictureDraw extends Activity\
    \ implements OnClickListener,\n        OnTouchListener {\n```\n\nWe have two main\
    \ UI elements. The first one is the `ImageView`, which will display our `Bitmap`,\
    \ which we'll draw onto. The second is a `Button` that the user will press to\
    \ select an image from the Gallery application.\n\n```java\n    ImageView choosenImageView;\n\
    \    Button choosePicture;\n```\n\nWe need to have two `Bitmap` objects. The first\
    \ is the one that contains the scaled version of the selected image. The second\
    \ is the mutable version that we'll draw the first one into and draw on top of.\n\
    \n```java\n    Bitmap bmp;\n    Bitmap alteredBitmap;\n    Canvas canvas;\n  \
    \  Paint paint;\n    Matrix matrix;\n\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n\n        choosenImageView = (ImageView) this.findViewById(R.id.ChoosenImageView);\n\
    ```\n\nDownload from Wow! eBook <www.wowebook.com>\n\n```java\n        choosePicture\
    \ = (Button) this.findViewById(R.id.ChoosePictureButton);\n```\n\nAfter we obtain\
    \ references to the `ImageView` and `Button`, we set the listener for each of\
    \ the events, `OnClick` and `OnTouch`, to be our activity.\n\n```java\n      \
    \  choosePicture.setOnClickListener(this);\n        choosenImageView.setOnTouchListener(this);\n\
    \    }\n```\n\nOur `onClick` method follows. This uses the standard intent to\
    \ allow the user to pick an image from the Gallery application.\n\n```java\n \
    \   public void onClick(View v) {\n        Intent choosePictureIntent = new Intent(\n\
    \                Intent.ACTION_PICK,\n                android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n\
    \        startActivityForResult(choosePictureIntent, 0);\n    }\n```\n\nOur `onActivityResult`\
    \ method is called after the user selects the image. It loads the image selected\
    \ into a `Bitmap` that is scaled to the size of the screen.\n\n```java\n    protected\
    \ void onActivityResult(int requestCode, int resultCode, Intent intent) {\n```\n\
    \n**CHAPTER 4: Graphics and Touch Events**\n\n**99**\n\n```java\n        super.onActivityResult(requestCode,\
    \ resultCode, intent);\n\n        if (resultCode == RESULT_OK) {\n           \
    \ Uri imageFileUri = intent.getData();\n            Display currentDisplay = getWindowManager().getDefaultDisplay();\n\
    \            float dw = currentDisplay.getWidth();\n            float dh = currentDisplay.getHeight();\n\
    \n            try {\n                BitmapFactory.Options bmpFactoryOptions =\
    \ new BitmapFactory.Options();\n                bmpFactoryOptions.inJustDecodeBounds\
    \ = true;\n                bmp = BitmapFactory.decodeStream(\n               \
    \         getContentResolver().openInputStream(imageFileUri), null,\n        \
    \                bmpFactoryOptions);\n\n                int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/dh);\n\
    \                int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/dw);\n\
    \n                if (heightRatio > 1 && widthRatio > 1) {\n                 \
    \   if (heightRatio > widthRatio) {\n                        bmpFactoryOptions.inSampleSize\
    \ = heightRatio;\n                    }\n                    else {\n        \
    \                // Width ratio is larger, scale according to it\n           \
    \             bmpFactoryOptions.inSampleSize = widthRatio;\n                 \
    \   }\n                }\n\n                bmpFactoryOptions.inJustDecodeBounds\
    \ = false;\n                bmp = BitmapFactory.decodeStream(\n              \
    \          getContentResolver().openInputStream(imageFileUri), null,\n       \
    \                 bmpFactoryOptions);\n```\n\nAfter the `Bitmap` is loaded, we\
    \ create a mutable `Bitmap`, `alteredBitmap`, and draw our first `Bitmap` into\
