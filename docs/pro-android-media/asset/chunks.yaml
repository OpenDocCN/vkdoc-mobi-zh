    );\n            statusTextView.setText(\"setDataSource done\");\n            statusTextView.setText(\"\
    calling prepareAsync\");\n```\n\nLast, we'll call `prepareAsync`, which will start\
    \ the buffering of the audio file in the background and return. When the preparation\
    \ is complete, our activity's `onPrepared` method will be called due to our activity\
