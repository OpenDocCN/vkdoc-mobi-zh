- fmt: "### Image Editing and Processing\n\nAs handheld devices become more and more\
    \ powerful, many of the features that could exist only on a desktop computer are\
    \ now possible on a mobile device. Once the purview of desktop apps such as `Photoshop`\
    \ and the like, image editing and processing can now be accomplished on a phone.\n\
    \nIn this chapter, we’ll look at what we can do with images after they are captured.\
    \ We’ll go through how to alter them through rotation and scaling, how to adjust\
    \ brightness and contrast, as well as how we can composite two or more images\
    \ together.\n\n### Selecting Images Using the Built-In Gallery Application\n\n\
    As we know, using an `intent` is often the quickest way to harness a capability\
    \ that already exists in a pre-installed Android application. For the purposes\
    \ of the examples in this chapter, let’s look at how we can harness the built-in\
    \ Gallery application to select an image that we might want to work with.\n\n\
    The intent that we’ll want to use is a generic `Intent.ACTION_PICK` that signals\
    \ to Android that we want to select a piece of data. We also supply a URI for\
    \ the data that we want to pick from. In this case, we are using `android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI`,\
    \ which means that we’ll be selecting images that are stored using the `MediaStore`\
    \ on the SD card.\n\n```java\nIntent choosePictureIntent = new Intent(Intent.ACTION_PICK,\n\
    \        android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n```\n\
    \nWhen this intent is triggered, it launches the Gallery application in a mode\
    \ where the user is able to select an image.\n\nAs is usual with the return from\
    \ an intent, after the user has selected the image, our `onActivityResult` method\
    \ is triggered. The selected image’s URI is returned in the `data` of the returned\
    \ intent.\n\n```java\nprotected void onActivityResult(int requestCode, int resultCode,\
    \ Intent intent) {\n    super.onActivityResult(requestCode, resultCode, intent);\n\
    \    if (resultCode == RESULT_OK) {\n        Uri imageFileUri = intent.getData();\n\
    \    }\n}\n```\n\nHere is a full example:\n\n```java\npackage com.apress.proandroidmedia.ch3.choosepicture;\n\
    \nimport java.io.FileNotFoundException;\nimport android.app.Activity;\nimport\
    \ android.content.Intent;\nimport android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\n\
    import android.net.Uri;\nimport android.os.Bundle;\nimport android.util.Log;\n\
    import android.view.Display;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\nimport android.widget.ImageView;\n```\n\nOur activity\
    \ will be responding to click events fired by a button; we’ll therefore implement\
    \ `OnClickListener`. In the `onCreate` method, we use the normal `findViewById`\
    \ method to access the necessary UI elements that are defined in the Layout XML.\n\
    \n```java\npublic class ChoosePicture extends Activity implements OnClickListener\
    \ {\n\n    ImageView chosenImageView;\n    Button choosePicture;\n\n    @Override\n\
    \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        chosenImageView = (ImageView)\
    \ this.findViewById(R.id.ChosenImageView);\n        choosePicture = (Button) this.findViewById(R.id.ChoosePictureButton);\n\
    \        choosePicture.setOnClickListener(this);\n    }\n}\n```\n\n**Figure 3–1.**\
    \ *The `choosePicture` button, displayed when the app first launches*\n\nWhat\
    \ follows is the `onClick` method, which will respond to the pressing of the `choosePicture`\
    \ button which is displayed when the app starts as illustrated in Figure 3–1.\
    \ In this method, we create the intent that will trigger the Gallery application\
    \ to launch in a mode that allows the user to select a picture as shown in Figure\
    \ 3–2.\n\n```java\npublic void onClick(View v) {\n    Intent choosePictureIntent\
    \ = new Intent(Intent.ACTION_PICK,\n            android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n\
    \    startActivityForResult(choosePictureIntent, 0);\n}\n```\n\n**Figure 3–2.**\
    \ *The view of the Gallery application when triggered by the `ACTION_PICK` intent\
    \ prompting the user to choose an image; the UI of the Gallery application may\
    \ vary per device.*\n\nWhen the Gallery application returns after the user has\
    \ selected an image, our `onActivityResult` method is called. We get the URI to\
    \ the selected image in the passed-in intent’s data.\n\n```java\nprotected void\
    \ onActivityResult(int requestCode, int resultCode, Intent intent) {\n    super.onActivityResult(requestCode,\
    \ resultCode, intent);\n    if (resultCode == RESULT_OK) {\n        Uri imageFileUri\
    \ = intent.getData();\n```\n\nSince the returned image is likely too big to load\
    \ completely in memory, we’ll use the technique we went over in Chapter 1 to resize\
    \ it as it is loaded. The `dw` int and the `dh` int will be the maximum width\
    \ and height respectively. The maximum height will be less than half the screen\
    \ height, as we will eventually be displaying two images, aligned vertically.\n\
    \n```java\n        Display currentDisplay = getWindowManager().getDefaultDisplay();\n\
    \        int dw = currentDisplay.getWidth();\n        int dh = currentDisplay.getHeight()/2\
    \ - 100;\n\n        try {\n            // Load up the image's dimensions not the\
    \ image itself\n            BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();\n\
    \            bmpFactoryOptions.inJustDecodeBounds = true;\n\n            Bitmap\
    \ bmp = BitmapFactory.decodeStream(getContentResolver().\n                   \
    \ openInputStream(imageFileUri), null, bmpFactoryOptions);\n\n            int\
    \ heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n     \
    \       int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\
    \n            if (heightRatio > 1 && widthRatio > 1) {\n                if (heightRatio\
    \ > widthRatio) {\n                    bmpFactoryOptions.inSampleSize = heightRatio;\n\
    \                } else {\n                    bmpFactoryOptions.inSampleSize\
    \ = widthRatio;\n                }\n            }\n\n            bmpFactoryOptions.inJustDecodeBounds\
    \ = false;\n            bmp = BitmapFactory.decodeStream(getContentResolver().\n\
    \                    openInputStream(imageFileUri), null, bmpFactoryOptions);\n\
    \n            chosenImageView.setImageBitmap(bmp);\n        } catch (FileNotFoundException\
    \ e) {\n            Log.v(\"ERROR\", e.toString());\n        }\n    }\n}\n}\n\
    ```\n\nIt requires the following in the project’s `layout/main.xml` file:\n\n\
