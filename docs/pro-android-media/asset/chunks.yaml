  trans: "\n# 第 7 章：音频捕获\n\n`int audioSource = MediaRecorder.AudioSource.MIC;`\n\n\
    接下来需要指定的值是录音的采样率。该值应以 Hz 为单位指定。如我们所知，`MediaRecorder`以 8 kHz（即 8000 Hz）进行音频采样。\n\
    \nCD 音质的音频通常为 44.1 kHz（即 44100 Hz）。Hz（赫兹）是每秒的采样次数。不同的 Android 手机硬件能够支持不同的采样率。在我们的示例应用中，我们将使用\
    \ 11025 Hz 的采样率，这也是另一种常用的采样率。\n\n`int sampleRateInHz = 11025;`\n\n接下来，我们需要指定要捕获的音频通道数。该参数的常量在`AudioFormat`类中定义，且含义不言自明。\n\
    \n`AudioFormat.CHANNEL_CONFIGURATION_MONO`\n`AudioFormat.CHANNEL_CONFIGURATION_STEREO`\n\
    `AudioFormat.CHANNEL_CONFIGURATION_INVALID`\n`AudioFormat.CHANNEL_CONFIGURATION_DEFAULT`\n\
    \n这里我们暂时使用单声道配置。\n\n`int channelConfig = AudioFormat.CHANNEL_CONFIGURATION_MONO;`\n\
    \n随后，我们需要指定音频格式。相关选项同样在`AudioFormat`类中定义。\n\n`AudioFormat.ENCODING_DEFAULT`\n\
    `AudioFormat.ENCODING_INVALID`\n`AudioFormat.ENCODING_PCM_16BIT`\n`AudioFormat.ENCODING_PCM_8BIT`\n\
    \n在这四个选项中，我们的选择归结为 PCM 16 位和 PCM 8 位。PCM 代表脉冲编码调制，本质上就是原始音频采样。因此，我们可以将每个采样的分辨率设置为\
    \ 16 位或 8 位。16 位会占用更多空间和处理能力，但音频的还原度会更接近真实。在我们的示例中，将使用 16 位版本。\n\n`int audioFormat\
    \ = AudioFormat.ENCODING_PCM_16BIT;`\n\n最后，我们需要指定缓冲区大小。实际上，我们可以通过静态方法`getMinBufferSize`向`AudioRecord`类询问最小缓冲区大小，并传入采样率、通道配置和音频格式作为参数。\n\
    \n`int bufferSizeInBytes = AudioRecord.getMinBufferSize(sampleRateInHz, channelConfig,\
    \ audioFormat);`\n\n现在，我们可以构造实际的`AudioRecord`对象。\n\n`AudioRecord audioRecord =\
    \ new AudioRecord(audioSource, sampleRateInHz, channelConfig, audioFormat, bufferSizeInBytes);`\n\
    \n`AudioRecord`类实际上并不会自动保存捕获的音频。我们需要在音频数据传入时手动处理。我们首先可能需要做的是将其录制到文件中。为此，我们需要创建一个文件。\n\
    \n```\nFile recordingFile;\nFile path = new File(Environment.getExternalStorageDirectory()\n\
    \    .getAbsolutePath() + \"/Android/data/com.apress.proandroidmedia.ch07.altaudiorecorder/files/\"\
    );\npath.mkdirs();\ntry {\n    recordingFile = File.createTempFile(\"recording\"\
    , \".pcm\", path);\n} catch (IOException e1) {\n    throw new RuntimeException(\"\
    Couldn't create file on SD card\", e);\n}\n```\n\n接下来，我们创建一个指向该文件的`OutputStream`，具体而言，为了性能和便利性，我们会将其包装在`BufferedOutputStream`和`DataOutputStream`中。\n\
    \n```\nDataOutputStream dos = new DataOutputStream(new BufferedOutputStream(new\
    \ FileOutputStream(recordingFile)));\n```\n\n现在，我们可以开始捕获操作，并将音频采样写入文件。我们将使用一个短整型数组来存放从`AudioRecord`对象读取的音频数据。我们将数组大小设置得比`AudioRecord`对象的缓冲区更小，这样在我们读取数据之前缓冲区不会被填满。为了确保数组小于缓冲区大小，我们将其除以\
    \ 4。缓冲区大小以字节为单位，每个短整型占用 2 个字节，因此除以 2 是不够的。除以 4 后，该数组的大小将是`AudioRecord`对象内部缓冲区的一半。\n\
    \n`short[] buffer = new short[bufferSize/4];`\n\n我们只需调用`AudioRecord`对象的`startRecording`方法即可开始录制。\n\
    \n`audioRecord.startRecording();`\n\n录制开始后，我们可以构建一个循环，持续从`AudioRecord`对象读取数据到我们的短整型数组中，并将其写入文件的`DataOutputStream`。\n\
    \n```\nwhile (true) {\n    int bufferReadResult = audioRecord.read(buffer, 0,\
    \ bufferSize/4);\n    for (int i = 0; i < bufferReadResult; i++) {\n        dos.writeShort(buffer[i]);\n\
    \    }\n}\naudioRecord.stop();\ndos.close();\n```\n\n操作完成后，我们需要调用`AudioRecord`对象的`stop`方法以及`DataOutputStream`的`close`方法。\n"
- fmt: "# CHAPTER 7: Audio Capture\n\nOf course, in the real world, we wouldn't put\
    \ this in a `while (true)` loop as it will never complete. We also probably want\
    \ to run this in some kind of thread so that it doesn't tie up the user interface\
    \ and anything else we might want the application to do while recording.\n\nBefore\
    \ going through a full example, let's look at how we can play back audio as it\
    \ is captured using the `AudioRecord` class.\n\n## Raw Audio Playback with AudioTrack\n\
    \n`AudioTrack` is a class in Android that allows us to play raw audio samples.\
    \ This allows for the playback of audio captured with `AudioRecord` that otherwise\
    \ wouldn't be playable using a `MediaPlayer` object.\n\nTo construct an `AudioTrack`\
    \ object, we need to pass in a series of configuration variables describing the\
    \ audio to be played.\n\nThe first argument is the stream type. The possible values\
    \ are defined as constants in the `AudioManager` class. We'll be using `AudioManager.STREAM_MUSIC`,\
    \ which is the audio stream used for normal music playback.\n\nThe second argument\
    \ is the sample rate in hertz of the audio data that will be played back. In our\
    \ example, we'll be capturing audio at 11,025 Hz, and therefore, to play it back,\
    \ we need to specify the same value.\n\nThe third argument is the channel configuration.\
    \ The possible values, the same as those used when constructing an `AudioRecord`\
    \ object, are defined as constants in the `AudioFormat` class. Their names are\
    \ self-explanatory.\n\n- `AudioFormat.CHANNEL_CONFIGURATION_MONO`\n- `AudioFormat.CHANNEL_CONFIGURATION_STEREO`\n\
    - `AudioFormat.CHANNEL_CONFIGURATION_INVALID`\n- `AudioFormat.CHANNEL_CONFIGURATION_DEFAULT`\n\
    \nThe fourth argument is the format of the audio. The possible values are the\
    \ same as those used when constructing an `AudioRecord` object, and they are defined\
    \ in `AudioFormat` as constants. The value used should match the value of the\
    \ audio that will be passed in.\n\n- `AudioFormat.ENCODING_DEFAULT`\n- `AudioFormat.ENCODING_INVALID`\n\
    - `AudioFormat.ENCODING_PCM_16BIT`\n- `AudioFormat.ENCODING_PCM_8BIT`\n\nThe fifth\
    \ argument is the size of the buffer that will be used in the object to store\
    \ the audio. To determine the smallest buffer size to use, we can call `getMinBufferSize()`,\
    \ passing in the sample rate, the channel configuration, and audio format.\n\n\
    ```java\nint frequency = 11025;\nint channelConfiguration = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n\
    int audioEncoding = AudioFormat.ENCODING_PCM_16BIT;\nint bufferSize = AudioTrack.getMinBufferSize(frequency,\
    \ channelConfiguration,\n    audioEncoding);\n```\n\nThe last argument is the\
    \ mode. The possible values are defined as constants in the `AudioTrack` class.\n\
    \n- `AudioTrack.MODE_STATIC`: The audio data will all be transferred to the `AudioTrack`\
    \ object before playback occurs.\n- `AudioTrack.MODE_STREAM`: The audio data will\
    \ continue to be transferred to the `AudioTrack` object while playback is in progress.\n\
    \nHere is our `AudioTrack` configuration:\n\n```java\nAudioTrack audioTrack =\
    \ new AudioTrack(AudioManager.STREAM_MUSIC, frequency,\n    channelConfiguration,\
    \ audioEncoding, bufferSize,\n    AudioTrack.MODE_STREAM);\n```\n\nOnce the `AudioTrack`\
    \ is constructed, we need to open an audio source, read the audio data into a\
    \ buffer, and pass it to the `AudioTrack` object.\n\nWe'll construct a `DataInputStream`\
    \ from a file containing raw PCM data in the right format (11,025 Hz, 16 bit,\
    \ mono).\n\n```java\nDataInputStream dis = new DataInputStream(\n    new BufferedInputStream(new\
    \ FileInputStream(recordingFile)));\n```\n\nWe can then call `play()` on the `AudioTrack`\
    \ and start writing audio in from the `DataInputStream`.\n\n```java\naudioTrack.play();\n\
    \nwhile (isPlaying && dis.available() > 0) {\n    int i = 0;\n    while (dis.available()\
    \ > 0 && i < audiodata.length) {\n        audiodata[i] = dis.readShort();\n  \
    \      i++;\n    }\n    audioTrack.write(audiodata, 0, audiodata.length);\n}\n\
    \ndis.close();\n```\n\nThat covers the basics of using `AudioTrack` to play back\
    \ audio from a file as it is recorded from an `AudioRecorder`.\n\n# CHAPTER 7:\
    \ Audio Capture\n\n## Raw Audio Capture and Playback Example\n\nHere is a full\
    \ example that records using `AudioRecord` and plays back using `AudioTrack`.\
    \ Each of these operations lives in their own thread through the use of `AsyncTask`,\
    \ so that they don't make the application become unresponsive by running in the\
    \ main thread.\n\n```java\npackage com.apress.proandroidmedia.ch07.altaudiorecorder;\n\
    \nimport java.io.BufferedInputStream;\nimport java.io.BufferedOutputStream;\n\
    import java.io.DataInputStream;\nimport java.io.DataOutputStream;\nimport java.io.File;\n\
    import java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
    \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
    import android.media.AudioRecord;\nimport android.media.AudioTrack;\nimport android.media.MediaRecorder;\n\
    import android.os.AsyncTask;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
    import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\nimport android.widget.TextView;\n\npublic class\
    \ AltAudioRecorder extends Activity implements OnClickListener {\n```\n\nWe have\
    \ two inner classes defined—one for the recording and one for the playback. Each\
    \ one extends `AsyncTask`.\n\n```java\n    RecordAudio recordTask;\n    PlayAudio\
    \ playTask;\n\n    Button startRecordingButton, stopRecordingButton, startPlaybackButton,\n\
    \        stopPlaybackButton;\n    TextView statusText;\n    File recordingFile;\n\
    ```\n\nWe'll use `Booleans` to keep track of whether we should be recording and\
    \ playing. These will be used in the loops in recording and playback tasks.\n\n\
    ```java\n    boolean isRecording = false;\n    boolean isPlaying = false;\n```\n\
    \nHere are the variables that we'll use to define the configuration of both the\
    \ `AudioRecord` and `AudioTrack` objects.\n\n```java\n    // These should really\
    \ be constants themselves\n    int frequency = 11025;\n    int channelConfiguration\
    \ = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n    int audioEncoding = AudioFormat.ENCODING_PCM_16BIT;\n\
    \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n     \
    \   super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        statusText = (TextView) this.findViewById(R.id.StatusTextView);\n  \
    \      startRecordingButton = (Button) this.findViewById(R.id.StartRecordingButton);\n\
    \        stopRecordingButton = (Button) this.findViewById(R.id.StopRecordingButton);\n\
    \        startPlaybackButton = (Button) this.findViewById(R.id.StartPlaybackButton);\n\
    \        stopPlaybackButton = (Button) this.findViewById(R.id.StopPlaybackButton);\n\
    \n        startRecordingButton.setOnClickListener(this);\n        stopRecordingButton.setOnClickListener(this);\n\
    \        startPlaybackButton.setOnClickListener(this);\n        stopPlaybackButton.setOnClickListener(this);\n\
    \n        stopRecordingButton.setEnabled(false);\n        startPlaybackButton.setEnabled(false);\n\
    \        stopPlaybackButton.setEnabled(false);\n```\n\nThe last thing we'll do\
    \ in the constructor is create the file that we'll record to and play back from.\
    \ In this case, we are creating the file in the preferred location for files associated\
    \ with an application on the SD card.\n\n```java\n        File path = new File(Environment.getExternalStorageDirectory()\n\
    \            .getAbsolutePath() + \"/Android/data/com.apress.proandroidmedia.ch07\"\
    \n            + \".altaudiorecorder/files/\");\n        path.mkdirs();\n\n   \
    \     try {\n            recordingFile = File.createTempFile(\"recording\", \"\
    .pcm\", path);\n        } catch (IOException e) {\n            throw new RuntimeException(\"\
    Couldn't create file on SD card\", e);\n        }\n    }\n```\n\nThe `onClick()`\
    \ method handles the `Button` presses generated by the user. Each one corresponds\
    \ to a specific method.\n\n```java\n    public void onClick(View v) {\n      \
    \  if (v == startRecordingButton) {\n            record();\n        } else if\
    \ (v == stopRecordingButton) {\n            stopRecording();\n        } else if\
    \ (v == startPlaybackButton) {\n            play();\n        } else if (v == stopPlaybackButton)\
    \ {\n            stopPlaying();\n        }\n    }\n```\n\nTo start playback, we\
    \ construct a new `PlayAudio` object and call its `execute()` method, which is\
    \ inherited from `AsyncTask`.\n\n```java\n    public void play() {\n```"
