  trans: "\n# 进阶视频\n\n在第 9 章中，我们了解了 Android 如何播放放置在设备 SD 卡上的特定视频文件。本章将进一步探讨如何访问由 `MediaStore`\
    \ 提供的视频以及互联网上的视频。\n\n## 通过 MediaStore 检索视频\n\n如第 1 章所述，Android 提供了一种跨应用共享数据的标准方式。`ContentProvider`\
    \ 类是实现此功能的基类。同样，为媒体扩展 `ContentProvider` 概念的各种 `MediaStore` 类也是如此。我们之前了解了如何使用 `MediaStore`\
    \ 处理图像、音频及其相关元数据。用于视频的 `MediaStore` 工作方式与之类似。\n\n`MediaStore.Video` 是 `MediaStore`\
    \ 类中的嵌套类，专门用于处理视频文件。`MediaStore.Video` 中包含 `MediaStore.Video.Media`，后者定义了指定 `MediaStore`\
    \ 中与视频媒体本身相关列的常量，其中许多常量继承自其他类（例如 `MediaStore.MediaColumns`）。此外，还有 `MediaStore.Video.Thumbnails`，它定义了\
    \ `MediaStore` 中用于存储与视频文件相关的缩略图图像的列常量。\n\n要查询 `MediaStore` 以获取视频内容，我们使用常量 `MediaStore.Video.Media.EXTERNAL_CONTENT_URI`\
    \ 中指定的 `Uri` 作为查询的数据源。\n\n使用 `Activity` 类中提供的 `managedQuery` 方法时，我们还需要传入一个希望返回的列数组。此处指定的数组表示我们需要\
    \ `MediaStore` 中视频的唯一 ID，即 `MediaStore.Video.Media._ID`。接着是 `MediaStore.Video.Media.DATA`，即视频文件本身的路径。接下来的两列指定我们需要文件的标题和\
    \ MIME 类型。\n\n```java\nString[] mediaColumns = {\n    MediaStore.Video.Media._ID,\n\
    \    MediaStore.Video.Media.DATA,\n    MediaStore.Video.Media.TITLE,\n    MediaStore.Video.Media.MIME_TYPE\n\
    };\n```\n\n要查询 `MediaStore` 以获取视频内容，我们使用常量 `MediaStore.Video.Media.EXTERNAL_CONTENT_URI`\
    \ 中指定的 `Uri` 作为查询的数据源。\n\n```java\nCursor cursor = managedQuery(MediaStore.Video.Media.EXTERNAL_CONTENT_URI,\n\
    \    mediaColumns, null, null, null);\n```\n\n作为返回，我们得到一个可以循环遍历并提取数据的游标。\n\n```java\n\
    if (cursor.moveToFirst()) {\n    do {\n        Log.v(\"VideoGallery\",\n     \
    \       cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.DATA)));\n\
    \        Log.v(\"VideoGallery\",\n            cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.TITLE)));\n\
    \        Log.v(\"VideoGallery\",\n            cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.MIME_TYPE)));\n\
    \    } while (cursor.moveToNext());\n}\n```\n\n## 从 MediaStore 获取视频缩略图\n\n从 Android\
    \ 2.0（API 级别 5）开始，我们可以在循环中提取与每个视频文件关联的缩略图。我们需要选择列中视频文件的 ID（`MediaStore.Video.Media._ID`），然后将其用于\
    \ `managedQuery` 的“where”子句中。\n\n```java\nint id = cursor.getInt(cursor.getColumnIndex(MediaStore.Video.Media._ID));\n\
    \nString[] thumbColumns = { MediaStore.Video.Thumbnails.DATA,\n    MediaStore.Video.Thumbnails.VIDEO_ID\
    \ };\n\nCursor thumbCursor = managedQuery(MediaStore.Video.Thumbnails.EXTERNAL_CONTENT_URI,\n\
    \    thumbColumns, MediaStore.Video.Thumbnails.VIDEO_ID + \"=\" + id, null, null);\n\
    if (thumbCursor.moveToFirst()) {\n    Log.v(\"VideoGallery\", thumbCursor.getString(thumbCursor.getColumnIndex(MediaStore.Video.Thumbnails.DATA)));\n\
    }\n```\n\n## 完整的 MediaStore 视频示例\n\n以下是一个完整的示例，它从 `MediaStore` 中检索所有可用的视频文件，并显示每个文件的缩略图图像和标题。图\
    \ 10-1 显示了以下示例的运行情况。此示例使用 `MediaStore.Video.Thumbnails` 类，该类在 Android 2.0（API\
    \ 级别 5）及以上版本中可用。\n\n```java\npackage com.apress.proandroidmedia.ch10.videogallery;\n\
    \nimport java.io.File;\nimport java.util.ArrayList;\nimport java.util.List;\n\n\
    import android.app.Activity;\nimport android.content.Context;\nimport android.content.Intent;\n\
    import android.database.Cursor;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.provider.MediaStore;\nimport android.util.Log;\nimport android.view.LayoutInflater;\n\
    import android.view.View;\nimport android.view.ViewGroup;\nimport android.widget.AdapterView;\n\
    import android.widget.BaseAdapter;\nimport android.widget.ImageView;\nimport android.widget.ListView;\n\
    import android.widget.TextView;\nimport android.widget.AdapterView.OnItemClickListener;\n\
    \npublic class VideoGallery extends Activity implements OnItemClickListener {\n\
    \n    Cursor cursor;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        // 我们将使用 ListView 来显示视频列表。\n        ListView listView = (ListView) this.findViewById(R.id.ListView);\n\
    \n        // 接下来是我们要从 MediaStore.Video.Thumbnails 查询中获取的列列表。\n        String[]\
    \ thumbColumns = {\n            MediaStore.Video.Thumbnails.DATA,\n          \
    \  MediaStore.Video.Thumbnails.VIDEO_ID\n        };\n\n        // 然后是我们要从 MediaStore.Video.Media\
    \ 查询中获取的列列表。\n        String[] mediaColumns = {\n            MediaStore.Video.Media._ID,\n\
    \            MediaStore.Video.Media.DATA,\n            MediaStore.Video.Media.TITLE,\n\
    \            MediaStore.Video.Media.MIME_TYPE\n        };\n\n        // 在主查询中，我们将选择\
    \ MediaStore 中表示的所有视频。\n        cursor = managedQuery(MediaStore.Video.Media.EXTERNAL_CONTENT_URI,\n\
    \            mediaColumns, null, null, null);\n\n        // 查询返回的每一行都将在以下 ArrayList\
    \ 中创建一个项目。\n        // 每个项目都是一个 VideoViewInfo 对象，这是一个专门在此处定义的类，\n        // 用于保存视频信息，供此\
    \ Activity 使用。\n        ArrayList<VideoViewInfo> videoRows = new ArrayList<VideoViewInfo>();\n\
    \n        // 在这里我们循环遍历 Cursor 对象中包含的数据，\n        // 为每一行创建一个 VideoViewInfo 对象并将其添加到\
    \ ArrayList 中。\n        if (cursor.moveToFirst())\n        {\n            // ...（循环实现继续）\n\
    \        }\n    }\n}\n```\n"
- fmt: "# CHAPTER 10: Advanced Video\n\nWe are using a do while loop as we want it\
    \ to run through the first row of data before moving to the next row. The do portion\
    \ happens before the `while` clause is tested/executed. In our loop, we’ll create\
    \ a new `VideoViewInfo` object for each row of data returned.\n\n```\ndo {\n \
    \   VideoViewInfo newVVI = new VideoViewInfo();\n```\n\nWe can then pull out all\
    \ of the relevant data from the `Cursor`. As just described, we’ll also make another\
    \ query to pull out a thumbnail image for each video. Each of these pieces of\
    \ data will be stored in the `VideoViewInfo` object.\n\n```\n    int id = cursor.getInt(cursor.getColumnIndex(MediaStore.Video.Media._ID));\n\
    \    Cursor thumbCursor = managedQuery(MediaStore.Video.Thumbnails.EXTERNAL_CONTENT_URI,\n\
    \                                      thumbColumns,\n                       \
    \               MediaStore.Video.Thumbnails.VIDEO_ID + \"=\" + id,\n         \
    \                             null, null);\n    if (thumbCursor.moveToFirst())\
    \ {\n        newVVI.thumbPath = thumbCursor.getString(\n            thumbCursor.getColumnIndex(MediaStore.Video.Thumbnails.DATA));\n\
    \        Log.v(\"VideoGallery\", \"Thumb \" + newVVI.thumbPath);\n    }\n    newVVI.filePath\
    \ = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA));\n\
    \    newVVI.title = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.TITLE));\n\
    \    Log.v(\"VideoGallery\", \"Title \" + newVVI.title);\n    newVVI.mimeType\
    \ = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE));\n\
    \    Log.v(\"VideoGallery\", \"Mime \" + newVVI.mimeType);\n```\n\nFinally, we\
    \ add the `VideoViewInfo` to the `videoRows` ArrayList.\n\n```\n    videoRows.add(newVVI);\n\
    } while (cursor.moveToNext());\n```\n\nOnce we are done getting all of the videos,\
    \ we can continue on. We’ll set the adapter of the `ListView` object to be a new\
    \ instance of `VideoGalleryAdapter`, which is an inner class defined here. We’ll\
    \ also set this activity to be the `OnItemClickListener` for the `ListView`.\n\
    \n```\nlistView.setAdapter(new VideoGalleryAdapter(this, videoRows));\nlistView.setOnItemClickListener(this);\n\
    ```\n\nWhen an item in the `ListView` is clicked, the `onItemClick` method will\
    \ be called. In this method, we extract the data we need from the `Cursor` and\
    \ create an intent to launch the default media player application on the device\
    \ to play back the video. We could have created our own `MediaPlayer` or used\
    \ the `VideoView` class here instead.\n\n```\npublic void onItemClick(AdapterView<?>\
    \ l, View v, int position, long id) {\n    if (cursor.moveToPosition(position))\
    \ {\n        int fileColumn = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA);\n\
    \        int mimeColumn = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE);\n\
    \        String videoFilePath = cursor.getString(fileColumn);\n        String\
    \ mimeType = cursor.getString(mimeColumn);\n        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
    \        File newFile = new File(videoFilePath);\n        intent.setDataAndType(Uri.fromFile(newFile),\
    \ mimeType);\n        startActivity(intent);\n    }\n}\n```\n\nWhat follows is\
    \ the very basic `VideoViewInfo` class, which is used to hold information about\
    \ each video returned.\n\n```\nclass VideoViewInfo {\n    String filePath;\n \
    \   String mimeType;\n    String thumbPath;\n    String title;\n}\n```\n\nSince\
    \ we are using a `ListView` in our activity to display each of the videos returned\
    \ from the `MediaStore` query, we’ll be using the `ListView` to display both the\
    \ title of the video and a thumbnail. In order to hand the data to the `ListView`,\
    \ we need to construct an Adapter. Next, we create an Adapter, `VideoGalleryAdapter`,\
    \ which extends `BaseAdapter`.\n\nWhen this class is constructed, it gets passed\
    \ the `ArrayList` that holds all of the videos returned from the `MediaStore`\
    \ query.\n\n`BaseAdapter` is an abstract class, so in order to extend it, we need\
    \ to implement several methods. Most of them are straightforward and just operate\
    \ on the `ArrayList` we passed in, such as `getCount` and `getItem`. The method\
    \ that requires the most attention is the `getView` method.\n\n```\nclass VideoGalleryAdapter\
    \ extends BaseAdapter {\n    private Context context;\n    private List<VideoViewInfo>\
    \ videoItems;\n    LayoutInflater inflater;\n\n    public VideoGalleryAdapter(Context\
    \ context, ArrayList<VideoViewInfo> items) {\n        context = context;\n   \
    \     videoItems = items;\n        inflater = (LayoutInflater) context.getSystemService(Context.LAYOUT_INFLATER_SERVICE);\n\
    \    }\n\n    public int getCount() {\n        return videoItems.size();\n   \
    \ }\n\n    public Object getItem(int position) {\n        return videoItems.get(position);\n\
    \    }\n\n    public long getItemId(int position) {\n        return position;\n\
    \    }\n```\n\nThe `getView` method is used to return the view for each row represented\
    \ in the `ListView`. It is passed in the position that is meant to be returned\
    \ (along with a `View` object representing the current View and an object that\
    \ represents the parent `ViewGroup`).\n\n```\n    public View getView(int position,\
    \ View convertView, ViewGroup parent) {\n```\n\nTo construct the View to be returned,\
    \ we need to inflate the layout that we are using for each row. In this case,\
    \ we are using a layout defined in `list_item.xml` (shown here).\n\n```\n    \
    \    View videoRow = inflater.inflate(R.layout.list_item, null);\n```\n\nAfter\
    \ the layout is inflated, we can get at the individual Views that are defined\
    \ and use the data from the `ArrayList` of `VideoViewInfo` objects to define what\
    \ to display. Here is how that is done for the `ImageView` that is used to display\
    \ each video’s thumbnail.\n\n```\n        ImageView videoThumb = (ImageView) videoRow.findViewById(R.id.ImageView);\n\
    \        if (videoItems.get(position).thumbPath != null) {\n            videoThumb.setImageURI(Uri.parse(videoItems.get(position).thumbPath));\n\
    \        }\n```\n\nHere we obtain a reference to the `TextView` for the video\
    \ title and set the text according to the data in the `ArrayList` of `VideoViewInfo`\
    \ object.\n\n```\n        TextView videoTitle = (TextView) videoRow.findViewById(R.id.TextView);\n\
    \        videoTitle.setText(videoItems.get(position).title);\n```\n\nFinally,\
    \ we return the newly constructed View.\n\n```\n        return videoRow;\n   \
    \ }\n}\n```\n\nHere is the `main.xml` file defining the layout for the activity.\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    >\n    <ListView\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/ListView\"></ListView>\n</LinearLayout>\n\
    ```\n\nHere is the `list_item.xml` file that is used to define the layout for\
    \ each row of the `ListView`.\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<LinearLayout\n    xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
    >\n    <ImageView\n        android:id=\"@+id/ImageView\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"></ImageView>\n\
    \    <TextView\n        android:text=\"@+id/TextView01\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:id=\"\
    @+id/TextView\"></TextView>\n</LinearLayout>\n```\n\n**Figure 10–1.** *VideoGallery\
    \ activity*\n\nYou’ll notice that the thumbnails displayed in Figure 10–1 from\
    \ our example are different sizes. They are created by the `MediaScanner` service\
    \ to be the same size as the video itself. To display the thumbnails at the same\
    \ size, we can adjust the parameters in the `ImageView` item listed in `list_item.xml`.\n\
    \n```xml\n<ImageView\n    android:id=\"@+id/ImageView\"\n    android:layout_width=\"\
    50dip\"\n    android:layout_height=\"50dip\"></ImageView>\n```\n\nNow each of\
    \ the video thumbnails will be displayed at 50 dip by 50 dip, as shown in Figure\
    \ 10–2. (The term *dip* stands for “density independent pixel.” 160 dips equal\
    \ 1 inch on the display no matter what the resolution or density of the pixels\
    \ on the display is.)"
