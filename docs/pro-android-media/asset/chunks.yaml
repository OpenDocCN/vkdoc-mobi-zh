    **Supported Formats**


    Before we get into the specific mechanics of how to play video, we should look
    at the types of video that we can play. Although Android supports playing back
    a variety of video formats and the types it can play back is slowly increasing,
    it certainly doesn’t cover the wide range of video formats available.


    In general Android’s support is consistent with other mobile phones. It supports
    the 3GP


    (.3gp) and MPEG-4 (.mp4) file formats. 3GP is a video standard derived from MPEG-4


    specifically for use by mobile devices.


    As far as codecs go, Android supports H.263, a codec designed for low-latency
    and


