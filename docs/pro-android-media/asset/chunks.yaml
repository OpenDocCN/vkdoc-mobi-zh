    Button startButton;


    TextView countdownTextView;


    We’ll also need a Handler, in this case timerUpdateHandler, a Boolean to help
    us keep track of whether the timer has started (timerRunning), and we’ll have
    an integer


    (currentTime) that will keep track of the countdown.


    Handler timerUpdateHandler;


    boolean timerRunning = false;


    int currentTime = 10;


