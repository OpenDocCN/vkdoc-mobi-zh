    \ more. A good place to start is the Wikipedia Transformation Matrix article:\
    \ <http://en.wikipedia.org/wiki/Transformation_matrix>.\n\n## Matrix Methods\n\
    \nWhat we will do now, though, is explore the other methods of the `Matrix` class,\
    \ as they help us accomplish much of what we would want without having to resort\
    \ to relearning our high school and college math lessons.\n\nInstead of creating\
    \ our own Matrix numbers, we can simply call corresponding methods for the transformations\
    \ that we would like to use.\n\nEach of the snippets presented next can take the\
    \ place of the `canvas.drawBitmap` line in the \"Drawing a Bitmap onto a Bitmap\"\
    \ example.\n\n### Rotate\n\nOne of the built-in methods is the `setRotation` method.\
    \ It takes in a float representing the degrees of rotation. Positive values rotate\
    \ the image clockwise and negative values rotate it counter-clockwise around the\
    \ default point (0,0), which is the top left corner of the image as illustrated\
    \ in Figure 3–8.\n\n```\nMatrix matrix = new Matrix();\nmatrix.setRotate(15);\n\
    canvas.drawBitmap(bmp, matrix, paint);\n```\n\n![](index-73_1.jpg)\n\n**Figure\
