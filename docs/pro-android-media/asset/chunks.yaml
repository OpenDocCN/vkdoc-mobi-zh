- fmt: "## Chapter 4: Graphics and Touch Events\n\n`Button savePicture;`\n\nIn the\
    \ `onCreate` after obtaining a reference to the `choosePicture` button we'll obtain\
    \ a reference to the `savePicture` button:\n\n`savePicture = (Button) this.findViewById(R.id.SavePictureButton);`\n\
    \nFollowing that, we'll set its `onClickListener` to be our activity, the same\
    \ thing we are doing with the `choosePicture` Button.\n\n`savePicture.setOnClickListener(this);`\n\
    \nNow we'll need to modify our `onClick` method to take into account that two\
    \ different Buttons will be using it. The easiest way is to compare the `View`\
    \ that is passed in with the Buttons. If the `View` is equal to one of the Buttons,\
    \ that's the one that was clicked.\n\n```\npublic void onClick(View v) {\n   \
    \ if (v == choosePicture) {\n        Intent choosePictureIntent = new Intent(Intent.ACTION_PICK,\n\
    \            android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n\
    \        startActivityForResult(choosePictureIntent, 0);\n    }\n    else if (v\
    \ == savePicture) {\n```\n\nWe know the `savePicture` button was clicked. Now\
    \ we need to make sure the Bitmap we are drawing on has been defined.\n\n```\n\
    if (alteredBitmap != null) {\n```\n\nOnce we do that, we're all set to go about\
    \ saving it. Just like previous examples, we'll query the `MediaStore` to get\
    \ a `Uri` for our new image and create an `OutputStream` from that `Uri`.\n\n\
    ```\nUri imageFileUri = getContentResolver().insert(\n    Media.EXTERNAL_CONTENT_URI,\
    \ new ContentValues());\n\ntry {\n    OutputStream imageFileOS =\n        getContentResolver().openOutputStream(imageFileUri);\n\
    ```\n\nIn previous image saving examples, we actually already had the data in\
    \ JPEG form, and we would simply write it out to the `OutputStream`. In this case,\
    \ we have to use the `compress` method of the `Bitmap` object to convert it into\
    \ a JPEG (or PNG if we choose).\n\nThe `compress` method compresses the `Bitmap`\
    \ data and writes it out to an `OutputStream` for us. It takes in a constant defined\
    \ in `Bitmap.CompressFormat`, which is either `PNG` or `JPEG`. PNG is great for\
    \ line art and graphics. JPEG is great for full-color images with gradients, such\
    \ as photographs. Since we are working with a photograph here, we'll use JPEG.\n\
    \nThe next argument is the quality setting. The quality setting is useful only\
    \ when compressing as a JPEG, as PNG images will always keep all of the data,\
    \ making a quality setting useless. JPEG is what is considered a \"lossy\" codec,\
    \ which means that data will be thrown away. The quality has an inverse relationship\
    \ with the size. A quality setting of 0 will yield a small file size but not a\
    \ great-looking file; a quality setting of 100 will yield a large file size, and\
    \ the image will look pretty good. In this example and as illustrated in Figure\
    \ 4–19, we are using 90, which is somewhat of a compromise. Figure 4–20 shows\
    \ the same image with a quality setting of 10 for comparison.\n\nThe last argument\
    \ we need to pass in is the actual `OutputStream` to write the file to.\n\n`alteredBitmap.compress(CompressFormat.JPEG,\
    \ 90, imageFileOS);`\n\nThat's it—now we just tell the user that the image has\
    \ been saved through a Toast alert, and we continue on.\n\n```\nToast t = Toast.makeText(this,\
    \ \"Saved!\", Toast.LENGTH_SHORT);\nt.show();\n\n} catch (FileNotFoundException\
    \ e) {\n    Log.v(\"EXCEPTION\", e.getMessage());\n}\n```\n\n```\n    }\n}\n```\n\
