    \n## 使用 MediaStore 检索图像\n\n使用 Android 共享内容提供程序的一个强大之处在于，我们可以轻松地利用它们创建类似图库应用这样的功能。\n\
    \n由于内容提供程序（本例中为 `MediaStore`）在应用之间共享，我们无需实际创建相机应用和图像存储机制，就能构建自己的图像查看应用。由于大多数应用都会使用默认的\
    \ `MediaStore`，我们可以借此构建自己的图库应用。\n\n从 `MediaStore` 中选择记录非常直接。我们使用与创建新记录时相同的 URI\
