- fmt: '## CHAPTER 11: Video Capture


    `MPEG_4_SP`: This specifies that the codec used will be the MPEG-4 SP (Simple
    Profile) codec. MPEG-4 SP is technically the MPEG-4 Part 2 Simple Profile. It
    was released in 1999 and was developed for use by technologies that require low
    bitrate video without requiring a lot of processor power.


    Using the `MediaRecorder`’s `setAudioEncoder` method, we specify the audio codecs
    that will be used.


    ```

    recorder.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);

    ```


    The possible values that can be passed to `setAudioEncoder` are defined as constants
    in `MediaRecorder.AudioEncoder`.


    `MediaRecorder.AudioEncoder` contains only two constants:


    `AMR_NB`: This specifies that the audio codec that will be used for audio encoding
    is AMR-NB, which stands for Adaptive Multi-Rate Narrow Band. AMR-NB is a codec
    tuned for voice and is widely used in mobile phones.


    `DEFAULT`: Since AMR-NB is the only other choice, the `DEFAULT` constant specifies
    that AMR-NB will be the audio codec used.


    ### Audio and Video Bitrates


    Video encoding bitrates can be set using the `setVideoEncodingBitRate` method
    on the `MediaRecorder` and passing in the bitrate requested in bits per second.
    A low bitrate setting for video would be in the range of 256,000 bits per second
    (256 kbps), while a high bitrate for video would be in the range of 3,000,000
    bits per second (3 mbps).


    ```

    recorder.setVideoEncodingBitRate(150000);

    ```


    We can also specify the maximum bitrate that we would like used for the encoded
    audio data. We do so by passing the value as bits per second into the `setAudioEncodingBitRate`
    method on the `MediaRecorder`. For reference, 8,000 bits per second (8 kbps) is
    a very low bitrate that is appropriate for audio that needs to be delivered in
    real time over slow networks, while rates of 196,000 bits per second (196 kbps)
    and higher are not uncommon for music in MP3 files. Currently most Android devices
    support bitrates only on the low end of the spectrum, and the `MediaRecorder`
    will automatically select a bitrate within its supportable range should you choose
    one that is too high.


    ```

    recorder.setAudioEncodingBitRate(8000);

    ```


    ### Audio Sample Rate


    Along with bitrate, the audio sample rate is important in determining the quality
    of the audio that is captured and encoded. The `MediaPlayer` has a method, `setAudioSampleRate`,
    which allows us to request a specific sample rate. The sample rate passed in is
    in Hz (hertz), which stands for the number of samples per second. The higher the
    sample rate, the larger the range of audio frequencies that can be represented
    in the captured file. A sample rate on the low end, 8,000 Hz, is suitable for
    capturing low-quality voice, and on the high end, 48,000 Hz is used in DVD and
    many other high-quality video formats. Most Android devices support sample rates
    only in the low range (8,000 Hz).


    ```

    recorder.setAudioSamplingRate(8000);

    ```


    ### Audio Channels


    The number of audio channels to be captured can be specified by using the `setAudioChannels`
    method, passing in the number of channels. For the most part, incoming audio is
    currently limited to a single channel microphone on most Android devices, and
    therefore using more than one channel wouldn’t be beneficial. Generally the choice
    of the number of channels to use will be between one channel for mono and two
    channels for stereo.


    ```

    recorder.setAudioChannels(1);

    ```


    ### Video Frame Rate


    The number of frames of video captured per second can be controlled by using the
    `setVideoFrameRate` method by passing in the requested frame rate. A value between
    12 and 15 frames per second is generally adequate to represent motion. On the
    high end, television is 30 frames per second (29.97 in reality). The actual frame
    rate used will vary based on the capabilities of the device.


    ```

    recorder.setVideoFrameRate(15);

    ```


    ### Video Size


    The width and height of the video as it is captured can be controlled with the
    `setVideoSize` method by passing in an integer for the width and the height in
    pixels. Standard sizes range from 176x144 to 640x480, with many devices supporting
    even higher resolutions.


    **NOTE:** Many Android devices also support 720x480, but it should be noted that
    this isn’t the same pixel aspect ratio that would be captured by a DV camera,
    which captures *rectangular* pixels at 720x480. On Android devices, the pixels
    are generally *square*, and therefore if 720x480 video from an Android device
    is brought into video editing software, the software might make the wrong assumption
    about the video due to its resolution, causing the output to be distorted. To
    correct this, the software needs to be told that the pixel aspect ratio is square
    or 1.0.


    ```

    recorder.setVideoSize(640,480);

    ```'
