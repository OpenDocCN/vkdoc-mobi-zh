  trans: "  \n**华莱士·杰克逊**是一位经验丰富的多媒体制作人和 i3D 程序员，专注于 Acrobat3D PDF、Android 移动应用、iTV\
    \ 设计、JavaFX 和 JavaTV 领域。自 Atari ST1040 和 AMIGA 3000 时代起，他就开始设计富媒体内容，并且从近二十年前*《多媒体制片人》*杂志创刊以来，他一直为领先的多媒体出版物撰写关于新媒体内容开发的文章。您可以通过[www.wallacejackson.com](http://www.wallacejackson.com)与他联系。\n\
    \n## 致谢\n\n本书的构思源于我在纽约大学的教学工作。我要深深感谢纽约大学互动电信项目的全体教职员工和学生，他们不断给予我鼓励与支持，是我无尽的灵感源泉。感谢\
    \ Red Burns 创立、培育并持续改进互动电信项目。感谢 Dan O’Sullivan 不断挑战我。感谢 Tom Igoe 和 Dan Shiffman\
    \ 向我证明这是可行的。感谢 Rob Ryan 和 Marianne Petite 给予我的所有支持。感谢所有我曾合作过的其他教职员工和驻校学者。感谢我所有现任和前任学生，他们让我认识到教学并见证项目成真是一件多么有成就感的事；特别感谢\
    \ Nisma Zaman，她早期提供的反馈非常宝贵。\n\n如果没有 Apress 才华横溢且兢兢业业的员工，这本书根本不可能问世。感谢 Steve Anglin、Matthew\
    \ Moodie、Corbin Collins、Mary Ann Fugate、Adam Heath、Anne Collette 以及 Apress 的其他员工，感谢你们的非凡付出。\n\
    \n非常感谢 Steve Bull 和 Wallace Jackson，作为技术审稿人，你们测试了每一段代码，并在我遗漏之处填补了空白。你们的贡献是无可估量的！\n\
    \n下载自 Wow! eBook <www.wowebook.com>\n\n不言而喻，如果没有那些将 Android 带入现实的人们，这本书也无法写成。感谢他们，尤其感谢谷歌的\
    \ Dave Sparks，他不辞辛劳地为我提供了一些非常宝贵的事实核查和答疑解惑。\n\n感谢所有鼓励我的亲朋好友。\n\n最后，当然，如果没有我挚爱的妻子\
    \ Karen Van Every 的支持，这本书也不可能完成。谢谢你！\n\n## 前言\n\n在手机已经成为并正在演变为的诸多形态中，一个明确的趋势是其在媒体制作和消费能力方面的提升。这一趋势始于\
    \ 20 世纪 90 年代末拍照手机的出现，并在过去几年中随着智能手机的日益普及而蓬勃发展。就媒体功能而言，如今的手机同时是相机、相册、摄像机、电影播放器、音乐播放器、录音机，甚至可能具备更多功能。\n\
    \n特别是，Android SDK 中提供了丰富的媒体功能，本书旨在通过讨论和示例来阐述这些功能，以便您能快速起步，开发下一代媒体应用。本书将引导您完成一些示例，这些示例不仅展示了如何显示和播放媒体，还让您能够利用摄像头、麦克风和视频捕捉功能。本书大致分为四个部分：前四章涉及图像处理；中间四章处理音频；最后四章则关于视频以及利用\
    \ Web 服务来查找和分享媒体。\n\n随着本书内容的深入，给出的示例会逐渐增加难度，因为开发能够利用这些功能的应用程序所需的工作量也随之增加。无论如何，只要您对\
    \ Android 应用程序开发有一定了解，就可以直接跳到任何章节，利用相关讨论和示例代码来创建使用所介绍功能的应用程序。\n\n示例通常以完整类的形式呈现，该类继承自`Activity`，目标运行于\
    \ SDK 4 版（Android 1.6）或更高版本。示例还包括 XML 布局文件的内容，并且在许多情况下，还包括`AndroidManifest.xml`文件的内容。假设您将使用\
    \ Eclipse（Galileo 或更高版本）并安装`ADT`插件（0.9.9 或更高版本），以及使用 Android SDK（r7 或更高版本）。由于本书大部分内容涉及音频和视频，我建议您在真实手机（运行\
    \ Android 1.6 或更高版本）上运行示例，而不是在模拟器上，因为在许多情况下，示例在模拟器上无法正常工作。\n\n我很期待看到移动设备上媒体应用的未来。希望通过本书，我能帮助您创造和定义那个未来。我期待看到您的\
    \ Android 媒体应用大放异彩。\n\n说了这么多，让我们开始吧！\n\n## 第 1 章：Android 图像处理入门\n\n在本章中，我们将学习\
    \ Android 上图像捕获和存储的基础知识。我们将首先探索 Android 提供的内置功能，然后在后续章节中转向更多定制化的软件。图像捕获和存储的内置功能为全面了解\
    \ Android 上媒体功能提供了良好的入门介绍，并为我们后续章节中关于音频和视频的内容铺平了道路。\n\n基于此，我们将从如何利用内置的相机应用程序开始，然后转向使用`MediaStore`，即内置的媒体和元数据存储机制。在此过程中，我们将探讨减少内存使用的方法，并利用\
    \ EXIF——消费电子产品和图像处理软件领域中用于共享元数据的标准。\n\n### 使用内置相机应用程序捕获图像\n\n随着手机迅速演变为移动计算机，它们在许多方面已经取代了各种各样的消费电子产品。最早添加到手机上的非电话相关硬件功能之一是摄像头。目前，似乎很难买到一部不带摄像头的手机。当然，基于\
    \ Android 的手机也不例外；从一开始，Android SDK 就支持访问手机的内置硬件摄像头来捕获图像。\n\n在 Android 上完成许多事情最简单直接的方法是利用设备上现有的软件，即通过使用**intent**。intent\
    \ 是 Android 的一个核心组件，文档中将其描述为“要执行的动作的描述”。在实践中，intent 用于触发其他应用程序执行某些操作，或者在单个应用程序的各个\
    \ Activity 之间切换。\n\n所有具有相应硬件（摄像头）的纯正 Android 设备都预装了相机应用程序。相机应用程序包含一个 intent 过滤器，这允许开发者\n\
    \n![ ](img/index-16_1.png)\n\n**2**\n"
- fmt: "# CHAPTER 1: Introduction to Android Imaging\n\nOffer image capture capabilities\
    \ on a par with the `Camera` application without having to build their own custom\
    \ capture routines.\n\nAn intent filter is a means for a programmer of an application\
    \ to specify that their application offers a specific capability. Specifying an\
    \ intent filter in the `AndroidManifest.xml` file of an application tells Android\
    \ that this application and, in particular, the activity that contains the intent\
    \ filter will perform the specified task, on command.\n\nThe `Camera` application\
    \ has the following intent filter specified in its manifest file. The intent filter\
    \ shown here is contained within the “`Camera`” activity tags.\n\n```\n<intent-filter>\n\
    <action android:name=\"android.media.action.IMAGE_CAPTURE\" />\n<category android:name=\"\
    android.intent.category.DEFAULT\" />\n</intent-filter>\n```\n\nIn order to utilize\
    \ the `Camera` application via an intent, we simply have to construct an intent\
    \ that will be caught by the foregoing filter.\n\n```\nIntent i = new Intent(\"\
    android.media.action.IMAGE_CAPTURE\");\n```\n\nIn practice, we probably don’t\
    \ want to create the intent with that action string directly. In this case, a\
    \ constant is specified in the `MediaStore` class, `ACTION_IMAGE_CAPTURE`. The\
    \ reason we should use the constant rather than the string itself is that if the\
    \ string happens to change, it is likely that the constant will change as well,\
    \ thereby making our call a bit more future-proof than it would otherwise be.\n\
    \n```\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    startActivity(i);\n```\n\nUsing this intent in a basic Android activity will cause\
    \ the default `Camera` application to launch in still picture mode, as shown in\
    \ Figure 1–1.\n\n**Figure 1–1.** *The built-in Camera application as called from\
    \ an intent shown running in an emulator*\n\n## Returning Data from the Camera\
    \ App\n\nOf course, simply capturing an image using the built-in `Camera` application\
    \ won’t actually be useful without having the `Camera` application return the\
    \ picture to the calling activity when one is captured. This can be accomplished\
    \ by substituting the `startActivity` method in our activity with the `startActivityForResult`\
    \ method. Using this method allows us the ability to access the data returned\
    \ from the `Camera` application, which happens to be the image that was captured\
    \ by the user as a `Bitmap`.\n\nHere is a basic example:\n\n```java\npackage com.apress.proandroidmedia.ch1.cameraintent;\n\
    \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.graphics.Bitmap;\n\
    import android.os.Bundle;\nimport android.widget.ImageView;\n\npublic class CameraIntent\
    \ extends Activity {\n\n    final static int CAMERA_RESULT = 0;\n    ImageView\
    \ imv;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
    \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \        Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    \        startActivityForResult(i, CAMERA_RESULT);\n    }\n\n    protected void\
    \ onActivityResult(int requestCode, int resultCode, Intent intent) {\n       \
    \ super.onActivityResult(requestCode, resultCode, intent);\n        if (resultCode\
    \ == RESULT_OK) {\n            Bundle extras = intent.getExtras();\n         \
    \   Bitmap bmp = (Bitmap) extras.get(\"data\");\n            imv = (ImageView)\
    \ findViewById(R.id.ReturnedImageView);\n            imv.setImageBitmap(bmp);\n\
    \        }\n    }\n}\n```\n\nIt requires the following in the project’s `layout/main.xml`\
    \ file:\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    >\n    <ImageView android:id=\"@+id/ReturnedImageView\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"></ImageView>\n\
    </LinearLayout>\n```\n\nTo complete the foregoing example, here are the contents\
    \ of `AndroidManifest.xml`:\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\n \
    \   android:versionCode=\"1\"\n    android:versionName=\"1.0\"\n    package=\"\
    com.apress.proandroidmedia.ch1.cameraintent\">\n    <application android:icon=\"\
    @drawable/icon\" android:label=\"@string/app_name\">\n        <activity android:name=\"\
    .CameraIntent\"\n            android:label=\"@string/app_name\">\n           \
    \ <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
    \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n            </intent-filter>\n        </activity>\n    </application>\n\
    \    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n```\n\nIn this example,\
    \ the image is returned from the `Camera` application in an extra passed through\
    \ the intent that is sent to our calling activity in the `onActivityResult` method.\
    \ The name of the extra is `\"data\"` and it contains a `Bitmap` object, which\
    \ needs to be cast from a generic `Object`.\n\n```java\n// Get Extras from the\
    \ intent\nBundle extras = intent.getExtras();\n// Get the returned image from\
    \ that extra\nBitmap bmp = (Bitmap) extras.get(\"data\");\n```\n\nIn our layout\
    \ XML (`layout/main.xml`) file, we have an `ImageView`. An `ImageView` is an extension\
    \ of a generic `View`, which supports the display of images. Since we have an\
    \ `ImageView` with the id `ReturnedImageView` specified, in our activity we need\
    \ to obtain a reference to that and set its `Bitmap` through its `setImageBitmap`\
    \ method to be our returned image. This enables the user of our application to\
    \ view the image that was captured.\n\nTo get a reference to the `ImageView` object,\
    \ we use the standard `findViewById` method specified in the `Activity` class.\
    \ This method allows us to programmatically reference elements specified in the\
    \ layout XML file that we are using via `setContentView` by passing in the `id`\
    \ of the element. In the foregoing example, the `ImageView` object is specified\
    \ in the XML as follows:\n\n```xml\n<ImageView android:id=\"@+id/ReturnedImageView\"\
    \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
    ></ImageView>\n```\n\nTo reference the `ImageView` and tell it to display the\
    \ `Bitmap` from the `Camera`, we use the following code:\n\n```java\nimv = (ImageView)\
    \ findViewById(R.id.ReturnedImageView);\nimv.setImageBitmap(bmp);\n```\n\nWhen\
    \ you run this example, you’ll probably notice that the resulting image is small.\
    \ (On my phone, it is 121 pixels wide by 162 pixels tall. Other devices have different\
    \ default sizes.) This is not a bug—rather, it is by design. The `Camera` application,\
    \ when triggered via an intent, does not return the full-size image back to the\
    \ calling activity. In general, doing so would require quite a bit of memory,\
    \ and the mobile device is generally constrained in this respect. Instead the\
    \ `Camera` application returns a small thumbnail image in the returned intent,\
    \ as shown in Figure 1–2.\n\n**Figure 1–2.** *The resulting 121x162 pixel image\
    \ displayed in our ImageView*\n\n## Capturing Larger Images\n\nTo get around the\
    \ size limitation, starting with Android 1.5, on most devices we can pass an extra\
    \ into the intent that is used to trigger the `Camera` application. The name for\
    \ this extra is specified in the `MediaStore` class as a constant called `EXTRA_OUTPUT`.\
    \ The value (extras take the form of name-value pairs) for this extra indicates\
    \ to the `Camera` application where you would like the captured image saved in\
    \ the form of an URI.\n\nThe following code snippet specifies to the `Camera`\
    \ application that the image should be saved to the SD card on a device with a\
    \ file name of `myfavoritepicture.jpg`.\n\n```java\nString imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\n\
    \    + \"/myfavoritepicture.jpg\";\nFile imageFile = new File(imageFilePath);\n\
    Uri imageFileUri = Uri.fromFile(imageFile);\n\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\nstartActivityForResult(i,\
    \ CAMERA_RESULT);\n```"
  raw: '## CHAPTER 1: Introduction to Android Imaging


    offer image capture capabilities on a par with the Camera application without
    having to build their own custom capture routines.


    An intent filter is a means for a programmer of an application to specify that
    their application offers a specific capability. Specifying an intent filter in
    the


    AndroidManifest.xml file of an application tells Android that this application
    and, in particular, the activity that contains the intent filter will perform
    the specified task, on command.


    The Camera application has the following intent filter specified in its manifest
    file. The intent filter shown here is contained within the “Camera” activity tags.


    <intent-filter>


    <action android:name="android.media.action.IMAGE_CAPTURE" />


    <category android:name="android.intent.category.DEFAULT" />


    </intent-filter>


    In order to utilize the Camera application via an intent, we simply have to construct
    an intent that will be caught by the foregoing filter.


    Intent i = new Intent("android.media.action.IMAGE_CAPTURE");


    In practice, we probably don’t want to create the intent with that action string
    directly. In this case, a constant is specified in the MediaStore class, ACTION_IMAGE_CAPTURE.
    The reason we should use the constant rather than the string itself is that if
    the string happens to change, it is likely that the constant will change as well,
    thereby making our call a bit more future-proof than it would otherwise be.


    Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);


    startActivity(i);


    Using this intent in a basic Android activity will cause the default Camera application
    to launch in still picture mode, as shown in Figure 1–1.


    **Figure 1–1.** *The built-in Camera application as called from an intent shown
    running in an emulator* **CHAPTER 1: Introduction to Android Imaging**


    **3**


    **Returning Data from the Camera App**


    Of course, simply capturing an image using the built-in camera application won’t


    actually be useful without having the Camera application return the picture to
    the calling activity when one is captured. This can be accomplished by substituting
    the


    startActivity method in our activity with the startActivityForResult method. Using


    this method allows us the ability to access the data returned from the Camera


    application, which happens to be the image that was captured by the user as a
    Bitmap.


    Here is a basic example:


    package com.apress.proandroidmedia.ch1.cameraintent;


