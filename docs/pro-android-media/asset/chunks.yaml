- fmt: "# Maximum File Size\n\nThe maximum size of a file captured by `MediaRecorder`\
    \ can be specified by passing in the maximum size in bytes to the `setMaxFileSize`\
    \ method.\n\n```\nrecorder.setMaxFileSize(10000000); // 10 megabytes\n```\n\n\
    To determine when maximum file size has been reached, we need to implement the\
    \ `MediaRecorder.OnInfoListener` in our activity and register it with our `MediaRecorder`.\
    \ The `onInfo` method will then be called and the `what` parameter can be checked\
    \ against the `MediaRecorder.MEDIA_RECORDER_INFO_FILESIZE_REACHED` constant. If\
    \ they match, the maximum file size was reached.\n\nAccording to the documentation,\
    \ the `MediaRecorder` is supposed to stop when the maximum file size is reached,\
    \ but it seems that it does not do so reliably as of Android 2.2.1. Unfortunately\
    \ no methods exist for us to check whether it has stopped. In order to actually\
    \ stop the recording, we must explicitly call the `stop` method.\n\nHere is some\
    \ extremely abbreviated code to illustrate.\n\n```\npublic class VideoCapture\
    \ extends Activity implements MediaRecorder.OnInfoListener {\n\n    public void\
    \ onCreate(Bundle savedInstanceState) {\n        recorder.setOnInfoListener(this);\n\
    \    }\n\n    public void onInfo(MediaRecorder mr, int what, int extra) {\n  \
    \      if (what == MediaRecorder.MEDIA_RECORDER_INFO_MAX_FILESIZE_REACHED) {\n\
    \            Log.v(\"VIDEOCAPTURE\",\"Maximum Filesize Reached\");\n        }\n\
    \    }\n}\n```\n\n# Maximum Duration\n\nThe maximum duration of a file captured\
    \ by the `MediaRecorder` can be set by passing in the maximum duration in milliseconds\
    \ to the `setMaxDuration` method.\n\n```\nrecorder.setMaxDuration(10000); // 10\
    \ seconds\n```\n\nTo determine when the maximum duration has been reached, we\
    \ need to implement the `MediaRecorder.OnInfoListener` and register it with our\
    \ `MediaRecorder`. Then when the duration has been reached, our `onInfo` method\
    \ will be triggered, with the `what` integer being set to the constant `MediaRecorder.MEDIA_RECORDER_INFO_MAX_DURATION_REACHED`.\n\
    \nAccording to the documentation, the `MediaRecorder` is supposed to stop when\
    \ the maximum duration is reached, but it seems that it does not do so reliably\
    \ as of Android 2.2.1. Unfortunately no methods exist for us to check whether\
    \ it has stopped. In order to actually stop the recording, we must explicitly\
    \ call the `stop` method.\n\nHere is an abbreviated illustration.\n\n```\npublic\
    \ class VideoCapture extends Activity implements MediaRecorder.OnInfoListener\
    \ {\n\n    public void onCreate(Bundle savedInstanceState) {\n        recorder.setOnInfoListener(this);\n\
    \    }\n\n    public void onInfo(MediaRecorder mr, int what, int extra) {\n  \
    \      if (what == MediaRecorder.MEDIA_RECORDER_INFO_MAX_DURATION_REACHED) {\n\
    \            Log.v(\"VIDEOCAPTURE\",\"Maximum Duration Reached\");\n         \
    \   mr.stop();\n        }\n    }\n}\n```\n\n# Profile\n\nStarting with Android\
    \ 2.2 (API Level 8), `MediaRecorder` has a method, `setProfile`, which takes in\
    \ an instance of `CamcorderProfile`. `CamcorderProfile` has a static method, `CamcorderProfile.get`,\
    \ which takes in an integer with the possible values being defined as constants,\
    \ `CamcorderProfile.QUALITY_HIGH` or `CamcorderProfile.QUALITY_LOW`. Using this\
    \ method allows us to set an entire set of configuration variables according to\
    \ preset values. Of course, `QUALITY_HIGH` refers to settings for high-quality\
    \ video capture, and `QUALITY_LOW` refers to settings for low-quality video capture.\n\
    \n`QUALITY_HIGH` has the following settings:\n\n- **Audio Bit Rate**: 12,200 bits\
    \ per second\n- Audio Channels: 1\n- Audio Codec: AMR-NB\n- Audio Sample Rate:\
    \ 8000 Hz\n- **Duration**: 60 seconds\n- File Format: MP4\n- **Video Bit Rate**:\
    \ 3,000,000 bits per second\n- Video Codec: H.264\n- Video Frame Width: 720 pixels\n\
    - Video Frame Height: 480 pixels\n- **Video Frame Rate**: 24 frames per second\n\
    \nTake note that as described previously, many of the settings are maximum or\
    \ requested and the capabilities of the device will dictate the results. For instance,\
    \ a sample video captured using the `QUALITY_HIGH` settings on a Nexus 1 running\
    \ Android 2.2.1 yielded video at 12.6 frames per second and a total bitrate of\
    \ 1,617.34 kb/second.\n\nHere are the `QUALITY_LOW` settings:\n\n- **Audio Bit\
    \ Rate**: 12,200 bits per second\n- Audio Channels: 1\n- Audio Codec: AMR-NB\n\
    - Audio Sample Rate: 8000 Hz\n- **Duration**: 30 seconds\n- File Format: 3GPP\n\
    - **Video Bit Rate**: 256,000 bits per second\n- Video Codec: 3\n- Video Frame\
    \ Width: 176 pixels\n- Video Frame Height: 144 pixels\n- **Video Frame Rate**:\
    \ 15 frames per second\n\nAs with the `QUALITY_HIGH` version, these settings yield\
    \ slightly different results as well. The resulting video was captured at 16.06\
    \ frames per second with a bitrate of 207.96 kb/second.\n\n# Output File\n\nFollowing\
    \ all of that, we can set the location of the output file. We can pass in either\
    \ a `FileDescriptor` or a `String` representing the path to the file.\n\n```\n\
    recorder.setOutputFile(\"/sdcard/recorded_video.mp4\");\n```\n\n# Preview Surface\n\
    \nBefore we can move forward, we need to specify a `Surface` for the `MediaRecorder`\
    \ preview (viewfinder) images to draw. We’ll handle this in a similar manner to\
    \ how we handled the preview images in our custom camera examples in Chapter 2.\n\
    \nLet’s go through an abbreviated example. First, we’ll create a `Surface` in\
    \ our layout.\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\"\n>\n    <SurfaceView android:id=\"@+id/CameraView\" android:layout_width=\"\
    640px\"\n        android:layout_height=\"480px\"></SurfaceView>\n</LinearLayout>\n\
    ```\n\nIn our activity, we need to implement `SurfaceHolder.Callback` so that\
    \ we can be notified when the `Surface` is created, changed, or destroyed.\n\n\
    ```\n...\n\npublic class VideoCapture extends Activity implements SurfaceHolder.Callback{\n\
    \    MediaRecorder recorder;\n    SurfaceHolder holder;\n\n    @Override\n   \
    \ public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        recorder = new MediaRecorder();\n\n        // At this point in the code,\
    \ we would perform all of the normal setup\n        // of the MediaRecorder object,\
    \ such as setting the audio and video\n        // sources, the output file location,\
    \ and so on.\n        // We are leaving that out to illustrate just how to work\
    \ with the\n        // Surface in this code snippet.\n\n        setContentView(R.layout.main);\n\
    \n        // Following the setting of the content view, we can obtain a reference\n\
    \        // to our SurfaceView and get a reference to its SurfaceHolder.\n   \
    \     SurfaceView cameraView = (SurfaceView)\n            findViewById(R.id.CameraView);\n\
    \        holder = cameraView.getHolder();\n\n        // We'll add our activity\
    \ as its SurfaceHolder.Callback implementer.\n        holder.addCallback(this);\n\
    \n        // As with the camera examples in Chapter 2, the preview Surface will\n\
    \        // have its buffers managed externally by the Camera object that is\n\
    \        // underlying the MediaRecorder; therefore we need to set the type to\n\
    \        // be SURFACE_TYPE_PUSH_BUFFERS.\n        holder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \    }\n\n    // Because our activity has implemented and is registered as the\n\
    \    // SurfaceHolder.Callback, our surfaceCreated method will be called when\n\
    \    // the Surface is actually created. When this occurs, we can set the\n  \
    \  // Surface to be the preview display of the MediaRecorder object with the\n\
    \    // setPreviewDisplay method. We can't do this before the Surface is\n   \
    \ // created.\n    public void surfaceCreated(SurfaceHolder holder) {\n      \
    \  recorder.setPreviewDisplay(holder.getSurface());\n    }\n\n    // As we are\
    \ implementing SurfaceHolder.Callback, we also have to have\n    // methods for\
    \ surfaceChanged and surfaceDestroyed, which are named for\n    // when they are\
    \ called:\n    // surfaceChanged when a change occurs to the Surface, such as\
    \ its height\n    // and width are changed;\n    // surfaceDestroyed when it is\
    \ no longer used, such as when the activity\n    // is no longer visible.\n  \
    \  //\n    // When surfaceDestroyed is called, we should stop recording video,\
    \ as\n    // recording works only when a Surface is available to draw preview\
    \ images\n    // onto.\n    public void surfaceChanged(SurfaceHolder holder, int\
    \ format, int width,\n                               int height) {\n    }\n\n\
    \    public void surfaceDestroyed(SurfaceHolder holder) {\n        recorder.stop();\n\
    \    }\n}\n```"
