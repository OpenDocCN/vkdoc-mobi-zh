- fmt: "# JSON 解析示例\n\n该数组包含两个元素，每个元素都是一个由“{”和“}”包围的对象，对象之间用逗号分隔。每个元素都是一个包含名为`\"arrayelement\"\
    `的字符串的对象。\n\n让我们看看如何使用 Android 内置的 JSON 解析器来解析 JSON 数据。我们将从处理以下简单的 JSON 数据开始：\n\
    \n```json\n{\"results\":{\"aname\":\"value\", \"anumber\":1234, \"aboolean\":false,\
    \ \"anarray\":[{\"arrayelement\":\"Array Element 1\"}, {\"arrayelement\":\"Array\
    \ Element 2\"}]}}\n```\n\n为了使用 JSON 解析器，数据必须是一个字符串。为此，我们需要对双引号进行转义：\n\n```java\n\
    String JSONData = \"\" +\n    \"{\\\"results\\\":{\\\"aname\\\":\\\"value\\\"\
    , \\\"anumber\\\":1234, \\\"aboolean\\\":false, \" +\n    \"\\\"anarray\\\":[{\\\
    \"arrayelement\\\":\\\"Array Element 1\\\"}, {\\\"arrayelement\\\":\\\"Array Element\
    \ 2\\\"}]}}\";\n```\n\nAndroid 中的 JSON 包包含一个`JSONObject`类，可以通过传入 JSON 格式的数据（如`JSONData`字符串中的内容）来构建其实例：\n\
    \n```java\nJSONObject overallJSONObject = new JSONObject(JSONData);\n```\n\n拿到`JSONObject`对象后，我们可以从中提取任何\
    \ JSON 对象、JSON 数组或普通字段。由于`results`是直接位于外层对象内部的 JSON 对象，我们可以使用`getJSONObject`方法并传入要提取的对象名称来获取其引用：\n\
    \n```java\nJSONObject resultsObject = overallJSONObject.getJSONObject(\"results\"\
    );\n```\n\n获得`resultsObject`后，就可以提取其中包含的任何数据。每种数据类型都有不同的提取方法。\n\n要提取字符串，我们使用`getString`方法，并传入\
    \ JSON 数据中指定的名称：\n\n```java\nString aname = resultsObject.getString(\"aname\"\
    );\n```\n\n要提取整数，我们使用`getInt`方法，并传入 JSON 数据中指定的名称。相应地，我们可以使用`getDouble`提取 JSON\
    \ 数字为`double`类型，或使用`getLong`提取为`long`类型：\n\n```java\nint anumber = resultsObject.getInt(\"\
    anumber\");\n```\n\n要提取布尔值，我们使用`getBoolean`方法，并传入 JSON 数据中指定的名称：\n\n```java\n\
    boolean aboolean = resultsObject.getBoolean(\"aboolean\");\n```\n\n示例数据在`resultsObject`中还包含一个名为`anarray`的\
    \ JSON 对象数组。我们可以使用`getJSONArray`方法并传入数组名称来获取其引用：\n\n```java\nJSONArray anarray\
