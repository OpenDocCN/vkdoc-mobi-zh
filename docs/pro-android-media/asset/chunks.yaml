    ## CHAPTER 2: Building Custom Camera Applications


    ### **43**


    **Figure 2–5.** *Camera with countdown timer*


    **Building a TimeLapse Photography App**


    We have all seen beautiful examples of timelapse photography. It is the process
    of taking several pictures over an even course of time. It could be one per minute,
    one per hour, or even one per week. Looking through a series of timelapse photographs,
    we


    can see how something changes over time. One example might be watching a building


    being constructed, another might be documenting how a flower grows and blooms.


    Now that we have built a timer-based camera app, updating it to be a timelapse
    app is fairly straightforward.


    First we’ll change up some of the instance variables and add in a constant.


    ...


    public class TimelapseSnapShot extends Activity implements OnClickListener,


    SurfaceHolder.Callback, Camera.PictureCallback {


    SurfaceView cameraView;


    SurfaceHolder surfaceHolder;


    Camera camera;


    We’ll rename the Button to be startStopButton as it will now handle both actions
    and perform a few minor naming updates to the rest of the variables.


    Button startStopButton;


    TextView countdownTextView;


    **44**


    ## CHAPTER 2: Building Custom Camera Applications


    Handler timerUpdateHandler;


    boolean timelapseRunning = false;


    The currentTime integer will be used to count up to the amount of time between
    photos in seconds instead of down from the total delay, as in the previous example.
    A constant called SECONDS_BETWEEN_PHOTOS is set to 60\. As its name implies, this
    will be used to determine the time to wait between photos.


    int currentTime = 0;


    public static final int SECONDS_BETWEEN_PHOTOS = 60; // one minute


    The onCreate method will largely remain the same—only the new variable names will
    be referenced.


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    cameraView = (SurfaceView) this.findViewById(R.id.CameraView);


    surfaceHolder = cameraView.getHolder();


    surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);


    surfaceHolder.addCallback(this);


    countdownTextView = (TextView) findViewById(R.id.CountDownTextView);


    startStopButton = (Button) findViewById(R.id.CountDownButton);


    startStopButton.setOnClickListener(this);


    timerUpdateHandler = new Handler();


    }


    The bulk of the changes to make this into a timelapse application from a single
    timer-based application will come in the onClick method, which is what happens
    when the button is pressed and in the Runnable method that is scheduled by the
    Handler.


    The onClick method first checks to see if the timelapse processes are currently
    going (the Button has previously been pressed), and if not, it sets it to running
    and calls the Handler’s post method with the Runnable (described here) as the
    argument.


    If the timelapse process is going, the button press is meant to stop it, so the


    removeCallbacks method on the Handler, timerUpdateHandler, is called. This will
    clear any pending calls to the Runnable that are passed in as an argument.


    public void onClick(View v) {


    if (!timelapseRunning) {


    startStopButton.setText("Stop");


    timelapseRunning = true;


    timerUpdateHandler.post(timerUpdateTask);


    } else {


    startStopButton.setText("Start");


    timelapseRunning = false;


    timerUpdateHandler.removeCallbacks(timerUpdateTask);


    }


    }


    As we are dealing with a Handler to do the scheduling, we have a Runnable that
    the


    Handler calls upon when the time comes. In the run method of our Handler, we first


    check to see if the currentTime integer is less than the number of seconds we
    want to **CHAPTER 2: Building Custom Camera Applications**


    **45**


    wait between photos (SECONDS_BETWEEN_PHOTOS). If it is, we simply increment


    currentTime. If the currentTime isn’t less than the period to wait, we tell the
    Camera to take a picture and set currentTime back to 0 so it continues counting
    up.


    After each of these cases, we simply update our TextView with the currentTime
    and


    schedule a call back to ourselves in another second.


    private Runnable timerUpdateTask = new Runnable() {


    public void run() {


    if (currentTime < SECONDS_BETWEEN_PHOTOS)


    {


    currentTime++;


    }


    else


    {


    camera.takePicture(null,null,null,TimelapseSnapShot.this);


    currentTime = 0;


    }


    timerUpdateHandler.postDelayed(timerUpdateTask, 1000);


    countdownTextView.setText(""+currentTime);


    }


    };


    The res/layout/main.xml interface and, of course, AndroidManifest.xml for this


    example are the same as the single countdown timer version.


    **Summary**


    As you can see, there are myriad reasons that we might want to build our own camerabased
    application rather than just utilizing the built-in application in our own app.
    The sky is the limit with what you can accomplish, from simply creating an application
    that takes a picture after a countdown to building your own timelapse system and
    more.


    Moving forward, we’ll look at what we can do with these images now that they are


    captured.


