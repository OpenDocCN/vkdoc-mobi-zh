  raw: '## CHAPTER 10: Advanced Video


    form of media delivery that is supported along with RTSP in Android is RTP (the
    Real-time Transport Protocol) but only when paired with RTSP. In other words,
    RTP on Android doesn’t work independently of RTSP.


    RTSP and RTP are specific to real-time streaming. This is quite different from
    HTTP


    progressive download, in that the media is played as it is received over the network.


    It also means that a special server is required to deliver the media. There are
    several RTSP servers on the market: Apple’s Open Source Darwin Streaming Server,


    RealNetwork’s Helix Server, and the Wowza Media Server are a few. Unfortunately,


    setting up and working with a server is out of the scope of what can be covered
    in this book. Fortunately, a highly reliable service exists that serves media
    via RTSP that we can test with (YouTube’s mobile site, available at [http://m.youtube.com).](http://m.youtube.com)


    As with progressive download, a couple of things need to be kept in mind when


    preparing media for delivery via RTSP. First the media needs to be encoded with
    a


    codec and in a file format that Android supports and that is streamable by an
    RTSP


    server. In general, streaming media for mobile devices is encoded as MP4 video
    and


    AAC audio in a 3GP container, although other codecs (H.264) and containers (MP4)
    are also supported.


    **NOTE:** Android currently has two underlying media frameworks, PacketVideo’s
    OpenCORE and one particular to Android called Stagefright. OpenCORE is the original
    framework that has been used in Android, and it has been exclusive until Android
    2.2, when Stagefright was introduced.


    In Android 2.2 (and all previous versions), OpenCORE is the framework that is
    used for streaming video (RTSP), although down the road this may change. The choice
    of which framework is used will be in the hands of the handset manufacturer, and
    both frameworks should be compatible on the API level. As this is all happening
    behind the scenes, with luck, we as developers will not need to be concerned with
    which underlying framework is being used.


    More information about what protocols, codecs, container formats, and streaming
    protocols are [supported by OpenCORE can be found on www.opencore.net/. Specifically
    the OpenCORE](http://www.opencore.net)


    [Multimedia Framework Capabilities document is available at www.opencore.net*files*](http://www.opencore.net/files)


    opencore_framework_capabilities.pdf. (Unfortunately, at this time, no public


    documentation with regards to Stagefright’s capabilities exists.)


    Last, the bitrate of the media needs to be something that can be delivered in
    real time to the end user depending on his or her network connection. These speeds
    vary quite a bit depending on the network type. Second-generation networks (GPRS)
    offer data speeds


    that top out in the 50 to 100 kbps range. Encoding live video to be delivered
    in real time over this type of network requires that the video be encoded in the
    30 kbps range to account for overhead and varying connection qualities. Moving
    up to EDGE networks


    should allow video in the 50 kbps range to be delivered reliably, and a conservative
    bitrate for today’s current 3G networks would be in the 100 kbps range, with many


    networks capable of supporting significantly higher bitrates.


    **CHAPTER 10: Advanced Video**


    **221**


    Unlike HTTP progressive download, RTSP can be used for live streaming media as
    well.


    This is one of its main advantages over traditional HTTP delivery. RTSP also supports
    seeking within on-demand media. This means that users can seek to specific points
    in the video without having to download all of the media up to and including that
    point. The server takes care of only serving the media for that point in the file
    to the player.


    **Network Video Playback**


    Android supports HTTP and RTSP video playback in all three video playback methods


    discussed in Chapter 9\. Using either the built-in Media Player activity via an
    intent or the VideoView class to play either form of network video requires no
    source code changes.


    Simply use the HTTP or RTSP URL as the video Uri, and it will work as long as
    the


    format is supported.


