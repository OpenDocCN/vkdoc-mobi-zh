    ```\n\n**图 8–1.** *AudioProcessing 活动运行界面*\n\n**小结**\n\n在本章中，我们通过展示音频处理的灵活性，完成了对\
    \ Android 音频的全面介绍。尽管我们只触及了音频合成和分析的冰山一角，但这已充分展现了其潜力以及 Android 中 `AudioTrack` 和\
    \ `AudioRecord` 类的灵活性。接下来，我们将把注意力转向视频。\n\n---\n\n### 第 8 章：音频合成与分析\n\n---\n\n\
    ## 第 9 章：视频简介\n\n在继续探索 Android 媒体功能的旅程中，现在我们将把注意力转向视频。在本章中，我们将探讨在 Android 上可用的各种视频播放方式，以及所支持的格式。\n\
    \n**视频播放**\n\n从技术上讲，早在 2004 年之前，一些手机就已经具备了视频播放能力。但实际上，直到 2007 年 iPhone 推出后，手机视频才在美国真正流行起来。自此以后，几乎所有名副其实的智能手机都支持视频播放，甚至视频拍摄。正如我们将在本章中探讨的那样，Android\
    \ 也不例外。\n\n**支持的格式**\n\n在深入探讨具体的视频播放机制之前，我们先来了解可以播放的视频类型。虽然 Android 支持播放多种视频格式，并且支持的格式种类也在逐渐增加，但它当然无法涵盖所有可用的视频格式。\n\
    \n总体而言，Android 的支持范围与其他手机一致。它支持 3GP（`.3gp`）和 MPEG-4（`.mp4`）文件格式。3GP 是一种源自 MPEG-4、专为移动设备设计的视频标准。\n\
    \n在编解码方面，Android 支持 H.263，这是一种专为低延迟和低比特率视频会议应用设计的编解码器。H.263 视频可在 MPEG-4（`.mp4`）或\
    \ 3GP（`.3gp`）文件中使用。Android 还支持 3GP 文件（`.3gp`）中的 MPEG-4 Simple Profile 以及 H.264。\n\
    \nH.264 也称为 MPEG-4 part 10 或 AVC（高级视频编码）。它是最有希望成为视频编解码器标准的技术之一，并且可能在软件和硬件上提供最广泛的支持。H.264\
    \ 受到 Silverlight、Flash、iPhone/iPod、蓝光设备等的支持。Android 支持在 MPEG-4 容器格式（`.mp4`）中的\
    \ H.264 编码视频。\n\n根据您阅读本书的时间，Android 可能还支持 WebM（Android 3.0 及更高版本），这是一种开放且免版税的媒体容器，用于容纳\
    \ VP8 编码的视频和 Vorbis 编码的音频。WebM 是在 Google 收购 On2 Technologies 并将 VP8 编解码器发布到公共域后不久推出的。\n\
    \n大量的桌面视频转换工具可帮助将视频转换为适合 Android 设备使用的格式。难点在于设置正确的参数。通常，如果该工具预设有 Android 设备的配置，那就没问题。如果不是，该工具可能为\
    \ iPhone 提供的任何预设配置，也大概率适用于 Android 设备，因为两者支持的格式范围非常接近。\n\n**使用 Intent 进行播放**\n\
    \n正如我们在本书中探索的大多数 Android 功能一样，播放视频也可以轻松实现：使用一个 Intent 来触发内置 Media Player 应用的播放活动。\n\
    \n在这个例子中，我使用带有内置 iSight 摄像头的 Mac 笔记本电脑上的 QuickTime X 录制了一个视频。我使用 QuickTime X 的“另存为”命令导出了该视频，并选择“iPhone”作为格式。这创建了一个名为\
    \ `Test_Movie.m4v` 的视频。（`.m4v` 扩展名是由 QuickTime 赋予的。不幸的是，它不是标准扩展名，这可能表明该文件可能不是完全符合标准的\
    \ MPEG-4 文件。尽管如此，它在 Android 设备上似乎并没有出现任何问题。）该视频可在 [www.mobvcasting.com/android/video/Test_Movie.m4v](http://www.mobvcasting.com/android/video/Test_Movie.m4v)\
    \ 在线获取，如果您想用它进行测试，可以下载。\n\n以下代码要求将此视频放置在 Android 设备 SD 卡的根目录下。为此，您应该能够通过 USB 线将设备连接到计算机，然后在状态栏下拉菜单中选择显示“USB\
    \ 已连接。选择以复制文件到/从计算机”的菜单项。这应该会打开一个屏幕，允许您“打开 USB 存储设备”。执行此操作后，您的手机将作为可移动驱动器挂载到计算机上，然后就可以复制视频文件了。在尝试运行以下代码之前，请不要忘记卸载驱动器并“关闭\
    \ USB 存储设备”。否则，由于手机上的程序在计算机仍可访问 SD 卡时无法访问 SD 卡来读取视频文件，您将收到错误提示。\n\n为了创建将触发内置 Media\
    \ Player 应用播放活动的 Intent，我们将使用 `Intent.ACTION_VIEW` 常量构建一个 Activity，并通过 `setDataAndType`\
    \ 方法传入文件的 URI 和 MIME 类型。这允许 Android 选择首选的播放活动。图 9–1 显示了 Android 2.2 的内置 Media\
    \ Player 以这种方式播放视频。\n\n```java\npackage com.apress.proandroidmedia.ch09.videointent;\n\
    \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\n\
    import android.os.Bundle;\nimport android.os.Environment;\nimport android.view.View;\n\
    import android.view.View.OnClickListener;\nimport android.widget.Button;\n\npublic\
    \ class VideoPlayerIntent extends Activity implements OnClickListener {\n\n  \
    \  Button playButton;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        playButton = (Button) this.findViewById(R.id.PlayButton);\n        playButton.setOnClickListener(this);\n\
    \    }\n\n    public void onClick(View v) {\n        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
    \        Uri data = Uri.parse(Environment.getExternalStorageDirectory().getPath()\
    \ +\n                \"/Test_Movie.m4v\");\n        intent.setDataAndType(data,\
    \ \"video/mp4\");\n        startActivity(intent);\n    }\n}\n```\n\n**图 9–1.**\
    \ *内置 Media Player 应用播放通过 Intent 指定的视频*\n\n**使用 VideoView 进行播放**\n\n`VideoView`\
    \ 是一个具有视频播放功能的 `View`，可以直接在布局中使用。它的使用非常简单直接。\n\n以下布局 XML 文件 `main.xml` 在 `LinearLayout`\
    \ 内部指定了一个 `VideoView`。\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n \
    \   android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n\n    <!-- VideoView 将放置在这里 -->\n\
    \n</LinearLayout>\n```\n"
