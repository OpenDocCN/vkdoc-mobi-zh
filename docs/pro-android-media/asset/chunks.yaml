- fmt: "# Advanced Video\n\nIn Chapter 9, we looked at how Android can play back a\
    \ specific video file that is placed on the device's SD card. In this chapter,\
    \ we'll take that a step further and look at accessing video that is made available\
    \ by the `MediaStore` and video that is available on the Internet.\n\n## MediaStore\
    \ for Retrieving Video\n\nAs discussed in Chapter 1, Android provides a standard\
    \ means for sharing data across applications. The `ContentProvider` class is the\
    \ base class that enables this. Also as discussed, the classes that extend the\
    \ concept of a `ContentProvider` for media are the various `MediaStore` classes.\
    \ We previously looked at using the `MediaStore` for images and audio and their\
    \ related metadata. The `MediaStore` for use with video behaves in much the same\
    \ way.\n\n`MediaStore.Video` is the nested class within the `MediaStore` class\
    \ for use with video files in particular. Within `MediaStore.Video` is `MediaStore.Video.Media`,\
    \ which contains the constants that specify the columns available in the `MediaStore`\
    \ related to the video media itself, many of which are inherited from other classes,\
    \ such as `MediaStore.MediaColumns`. There is also a `MediaStore.Video.Thumbnails`,\
    \ which contains the constants that specify the columns available in the `MediaStore`\
    \ for thumbnail image storage that is related to video files.\n\nTo query the\
    \ `MediaStore` for video content, we utilize the `Uri` specified in the constant\
    \ `MediaStore.Video.Media.EXTERNAL_CONTENT_URI` as the data source for a query.\n\
    \nUsing the `managedQuery` method available in the `Activity` class, we also need\
    \ to pass in an array of columns that we would like returned. The array specified\
    \ here indicates that we want the unique ID for the video in the `MediaStore`,\
    \ `MediaStore.Video.Media._ID`. This is followed by `MediaStore.Video.Media.DATA`,\
    \ which is the path to the video file itself. The next two specify that we want\
    \ the title and the MIME-type of the file.\n\n```java\nString[] mediaColumns =\
    \ {\n    MediaStore.Video.Media._ID,\n    MediaStore.Video.Media.DATA,\n    MediaStore.Video.Media.TITLE,\n\
    \    MediaStore.Video.Media.MIME_TYPE\n};\n```\n\nTo query the `MediaStore` for\
    \ video content, we utilize the `Uri` specified in the constant `MediaStore.Video.Media.EXTERNAL_CONTENT_URI`\
    \ as the data source for a query.\n\n```java\nCursor cursor = managedQuery(MediaStore.Video.Media.EXTERNAL_CONTENT_URI,\n\
    \    mediaColumns, null, null, null);\n```\n\nIn return we get a cursor that we\
    \ can loop through and extract the data.\n\n```java\nif (cursor.moveToFirst())\
    \ {\n    do {\n        Log.v(\"VideoGallery\",\n            cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.DATA)));\n\
    \        Log.v(\"VideoGallery\",\n            cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.TITLE)));\n\
    \        Log.v(\"VideoGallery\",\n            cursor.getString(cursor.getColumnIndex(MediaStore.Video.Media.MIME_TYPE)));\n\
    \    } while (cursor.moveToNext());\n}\n```\n\n## Video Thumbnails from the MediaStore\n\
    \nWe could, starting with Android 2.0 (API Level 5), pull out the thumbnails associated\
    \ with each video file from within the loop. We need the ID of the video file\
    \ that is in our list of columns to select (`MediaStore.Video.Media._ID`), which\
    \ we can then use in the \"where\" clause of the `managedQuery`.\n\n```java\n\
    int id = cursor.getInt(cursor.getColumnIndex(MediaStore.Video.Media._ID));\n\n\
    String[] thumbColumns = { MediaStore.Video.Thumbnails.DATA,\n    MediaStore.Video.Thumbnails.VIDEO_ID\
    \ };\n\nCursor thumbCursor = managedQuery(MediaStore.Video.Thumbnails.EXTERNAL_CONTENT_URI,\n\
    \    thumbColumns, MediaStore.Video.Thumbnails.VIDEO_ID + \"=\" + id, null, null);\n\
    if (thumbCursor.moveToFirst()) {\n    Log.v(\"VideoGallery\", thumbCursor.getString(thumbCursor.getColumnIndex(MediaStore.Video.Thumbnails.DATA)));\n\
    }\n```\n\n## Full MediaStore Video Example\n\nHere is a full example that retrieves\
    \ all of the available video files from the `MediaStore` and displays each of\
    \ their thumbnail images and titles. Figure 10–1 shows the following example running.\
    \ This example uses the `MediaStore.Video.Thumbnails` class which is available\
    \ in Android 2.0 (API Level 5) and above.\n\n```java\npackage com.apress.proandroidmedia.ch10.videogallery;\n\
    \nimport java.io.File;\nimport java.util.ArrayList;\nimport java.util.List;\n\n\
