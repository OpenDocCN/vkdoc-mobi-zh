    *   `setMaxDuration()`: 允许我们指定以毫秒为单位的最大录制持续时间。此方法必须在`setOutputFormat()`方法之后、`prepare()`方法之前调用。\n\
    *   `setMaxFileSize()`: 允许我们指定录制的最大文件大小（以字节为单位）。与`setMaxDuration()`一样，此方法必须在`setOutputFormat()`方法之后、`prepare()`方法之前调用。\n\
