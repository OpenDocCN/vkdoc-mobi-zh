    \ startRecording, stopRecording, playRecording, finishButton;\n```\n\nWe’ll have\
    \ a `MediaRecorder` for recording the audio and a `MediaPlayer` for playing it\
    \ back.\n\n```java\nMediaRecorder recorder;\nMediaPlayer player;\n```\n\nFinally,\
    \ we have a `File` object called `audioFile`, which will reference the file that\
    \ is recorded to.\n\n```java\nFile audioFile;\n```\n\nDownload from Wow! eBook\
    \ <www.wowebook.com>\n\n```java\n@Override\npublic void onCreate(Bundle savedInstanceState)\
    \ {\n    super.onCreate(savedInstanceState);\n    setContentView(R.layout.main);\n\
    ```\n\nWhen the activity starts up, we’ll set the text of the `statusTextView`\
    \ to be “Ready.”\n\n```java\n    statusTextView = (TextView) this.findViewById(R.id.StatusTextView);\n\
    \    statusTextView.setText(\"Ready\");\n    \n    stopRecording = (Button) this.findViewById(R.id.StopRecording);\n\
    \    startRecording = (Button) this.findViewById(R.id.StartRecording);\n    playRecording\
    \ = (Button) this.findViewById(R.id.PlayRecording);\n    finishButton = (Button)\
    \ this.findViewById(R.id.FinishButton);\n```\n\nWe’ll set all of the Buttons’\
    \ `onClickListeners` to be `this` so that our `onClick` method is called when\
    \ any of them are pressed.\n\n```java\n    startRecording.setOnClickListener(this);\n\
    \    stopRecording.setOnClickListener(this);\n    playRecording.setOnClickListener(this);\n\
    \    finishButton.setOnClickListener(this);\n```\n\nFinally, in the `onCreate`\
    \ method, we’ll disable the `stopRecording` and `playRecording` Buttons since\
    \ they won’t work until we either start recording or finish recording respectively.\n\
    \n```java\n    stopRecording.setEnabled(false);\n    playRecording.setEnabled(false);\n\
    }\n```\n\nIn the following `onClick` method, we handle all of the Button presses.\n\
    \n```java\npublic void onClick(View v) {\n    if (v == finishButton) {\n```\n\n\
    If the `finishButton` is pressed, we finish the activity.\n\n```java\n       \
    \ finish();\n    } else if (v == stopRecording) {\n```\n\nIf the `stopRecording`\
    \ Button is pressed, we call `stop` and `release` on the `MediaRecorder` object.\n\
    \n```java\n        recorder.stop();\n        recorder.release();\n```\n\nWe then\
    \ construct a `MediaPlayer` object and have it prepare to play back the audio\
    \ file that we just recorded.\n\n```java\n        player = new MediaPlayer();\n\
    \        player.setOnCompletionListener(this);\n```\n\nThe following two methods\
    \ that we are using on the `MediaPlayer`, `setDataSource` and `prepare`, may throw\
    \ a variety of exceptions. In the following code, we are simply throwing them.\
    \ In your application development, you will probably want to catch and deal with\
    \ them more elegantly, such as alerting the user when a file doesn’t exist.\n\n\
    ```java\n        try {\n            player.setDataSource(audioFile.getAbsolutePath());\n\
    \        } catch (IllegalArgumentException e) {\n            throw new RuntimeException(\n\
    \                \"Illegal Argument to MediaPlayer.setDataSource\", e);\n    \
    \    } catch (IllegalStateException e) {\n            throw new RuntimeException(\n\
    \                \"Illegal State in MediaPlayer.setDataSource\", e);\n       \
    \ } catch (IOException e) {\n            throw new RuntimeException(\n       \
    \         \"IOException in MediaPalyer.setDataSource\", e);\n        }\n     \
    \   \n        try {\n            player.prepare();\n        } catch (IllegalStateException\
    \ e) {\n            throw new RuntimeException(\n                \"IllegalStateException\
    \ in MediaPlayer.prepare\", e);\n        } catch (IOException e) {\n         \
    \   throw new RuntimeException(\"IOException in MediaPlayer.prepare\", e);\n \
    \       }\n```\n\nWe set the `statusTextView` to indicate to the user that we\
    \ are ready to play the audio file."
