    \n    titleTextView = (TextView) this.findViewById(R.id.TitleTextView);\n    imageButton\
    \ = (ImageButton) this.findViewById(R.id.ImageButton);\n```\n\n这里我们指定希望返回的列。这必须以字符串数组的形式给出。在下一行中，我们将该数组传递给\
    \ `managedQuery` 方法。\n\n```\n    String[] columns = { Media.DATA, Media._ID, Media.TITLE,\
