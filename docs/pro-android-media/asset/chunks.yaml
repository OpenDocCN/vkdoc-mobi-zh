  trans: "  \n# 第 8 章：音频合成与分析  \n\n以下是前述活动所使用的布局 XML 文件。  \n\n```xml  \n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>  \n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \  \n    android:orientation=\"vertical\"  \n    android:layout_width=\"fill_parent\"\
    \  \n    android:layout_height=\"fill_parent\">  \n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"  \n        android:id=\"\
    @+id/StartSound\" android:text=\"开始播放\" />  \n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"  \n        android:id=\"\
    @+id/EndSound\" android:text=\"结束播放\" />  \n</LinearLayout>  \n```  \n\n上述代码的关键在于短整型数组。这些是持续通过`write`方法传入`AudioTrack`对象的音频样本。在此例中，样本值从\
    \ 8130 振荡到 32695，再下降到-32121，最后回升至-466。如果将这些值绘制成图表，这些样本将共同构建出一个波形。由于声音由振荡的压力产生，且每个样本代表一个压力值，因此这些样本必须表示波形才能生成声音。改变这一波形可以创建不同类型的音频。以下这组样本描述了一个短波形（仅十个样本），因此代表的是高频声音——每秒振荡次数较多的声音。而低频声音的波形在固定采样率下会跨越更多的样本。\
    \  \n\n```java  \nshort[] buffer = {  \n    8130, 15752, 32695, 12253, 4329, \
    \ \n    -3865, -19032, -32722, -16160, -466  \n};  \n```  \n\n## 生成样本  \n\n通过一些简单的数学运算，我们可以用算法生成这些样本。经典的**正弦波**可以被重现。这个示例生成了一个\
    \ 440 Hz 的正弦波。  \n\n```java  \npackage com.apress.proandroidmedia.ch08.audiosynthesis;\
    \  \n\nimport android.app.Activity;  \nimport android.media.AudioFormat;  \nimport\
    \ android.media.AudioManager;  \nimport android.media.AudioTrack;  \nimport android.os.AsyncTask;\
    \  \nimport android.os.Bundle;  \nimport android.util.Log;  \nimport android.view.View;\
    \  \nimport android.view.View.OnClickListener;  \nimport android.widget.Button;\
    \  \n\npublic class AudioSynthesis extends Activity implements OnClickListener\
    \ {  \n\n    Button startSound;  \n    Button endSound;  \n    AudioSynthesisTask\
    \ audioSynth;  \n    boolean keepGoing = false;  \n    float synth_frequency =\
    \ 440; // 440 Hz，中央 A 音  \n\n    @Override  \n    public void onCreate(Bundle\
    \ savedInstanceState) {  \n        super.onCreate(savedInstanceState);  \n   \
    \     setContentView(R.layout.main);  \n\n        startSound = (Button) this.findViewById(R.id.StartSound);\
    \  \n        startSound.setOnClickListener(this);  \n\n        endSound = (Button)\
    \ this.findViewById(R.id.EndSound);  \n        endSound.setOnClickListener(this);\
    \  \n        endSound.setEnabled(false);  \n    }  \n\n    @Override  \n    public\
    \ void onPause() {  \n        super.onPause();  \n        keepGoing = false; \
    \ \n        endSound.setEnabled(false);  \n        startSound.setEnabled(true);\
    \  \n    }  \n\n    public void onClick(View v) {  \n        if (v == startSound)\
    \ {  \n            keepGoing = true;  \n            audioSynth = new AudioSynthesisTask();\
    \  \n            audioSynth.execute();  \n            endSound.setEnabled(true);\
    \  \n            startSound.setEnabled(false);  \n        } else if (v == endSound)\
    \ {  \n            keepGoing = false;  \n            endSound.setEnabled(false);\
    \  \n            startSound.setEnabled(true);  \n        }  \n    }  \n\n    private\
    \ class AudioSynthesisTask extends AsyncTask<Void, Void, Void> {  \n        @Override\
    \  \n        protected Void doInBackground(Void... params) {  \n            final\
    \ int SAMPLE_RATE = 11025;  \n            int minSize = AudioTrack.getMinBufferSize(SAMPLE_RATE,\
    \  \n                AudioFormat.CHANNEL_CONFIGURATION_MONO,  \n             \
    \   AudioFormat.ENCODING_PCM_16BIT);  \n\n            AudioTrack audioTrack =\
    \ new AudioTrack(AudioManager.STREAM_MUSIC,  \n                SAMPLE_RATE,  \n\
    \                AudioFormat.CHANNEL_CONFIGURATION_MONO,  \n                AudioFormat.ENCODING_PCM_16BIT,\
    \  \n                minSize,  \n                AudioTrack.MODE_STREAM);  \n\n\
    \            audioTrack.play();  \n\n            short[] buffer = new short[minSize];\
    \  \n            float angular_frequency = (float)(2 * Math.PI) * synth_frequency\
    \ / SAMPLE_RATE;  \n            float angle = 0;  \n\n            while (keepGoing)\
    \ {  \n                for (int i = 0; i < buffer.length; i++) {  \n         \
    \           buffer[i] = (short)(Short.MAX_VALUE * ((float) Math.sin(angle)));\
    \  \n                    angle += angular_frequency;  \n                }  \n\
    \                audioTrack.write(buffer, 0, buffer.length);  \n            }\
    \  \n            return null;  \n        }  \n    }  \n}  \n```  \n\n以下是前述活动的布局\
    \ XML 文件：  \n\n```xml  \n<?xml version=\"1.0\" encoding=\"utf-8\"?>  \n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"  \n    android:orientation=\"\
    vertical\"  \n    android:layout_width=\"fill_parent\"  \n    android:layout_height=\"\
    fill_parent\">  \n    <Button android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"  \n        android:id=\"@+id/StartSound\" android:text=\"开始播放\"\
    \ />  \n    <Button android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"  \n        android:id=\"@+id/EndSound\" android:text=\"结束播放\" />\
    \  \n</LinearLayout>  \n```  \n\n改变`synth_frequency`变量可以重现我们想要的任何其他频率。当然，改变用于生成数值的函数也会改变声音效果。你或许可以尝试将样本限制在`Short.MAX_VALUE`或`Short.MIN_VALUE`，以便制作一个快速粗略的方波示例。\
    \  \n\n当然，这只是 Android 音频合成功能的冰山一角。由于`AudioTrack`允许我们播放原始 PCM 样本，几乎所有可用于生成数字音频的技术都能在\
    \ Android 上实现，只需考虑处理器速度和内存限制即可。  \n\n接下来是一个示例应用，它结合了第 4 章追踪触摸屏上手指位置的技术，以及前述生成音频的示例代码。在这个应用中，我们将生成音频，并根据用户手指在触摸屏\
    \ X 轴上的位置选择频率。  \n\n```java  \npackage com.apress.proandroidmedia.ch08.fingersynthesis;\
    \  \n\nimport android.app.Activity;  \nimport android.media.AudioFormat;  \nimport\
    \ android.media.AudioManager;  \nimport android.media.AudioTrack;  \nimport android.os.AsyncTask;\
