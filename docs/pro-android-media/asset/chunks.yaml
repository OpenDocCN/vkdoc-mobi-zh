  trans: "\n## 第 6 章：背景知识与网络音频\n\n**图 6-2.*** 音频播放列表播放器示例（音频开始播放后显示）* **RTSP 音频流式传输**\n\
    \nAndroid 通过 `MediaPlayer` 支持另一种用于流式传输音频的协议。这个协议称为实时流协议，简称 RTSP。RTSP 已经使用了相当长一段时间，并在\
    \ 20 世纪 90 年代中后期由 RealNetworks 公司推广开来，因为这是他们在其音频和视频流媒体软件中使用的协议。\n\n前面用于 HTTP 流式传输示例的相同代码也适用于\
    \ RTSP 音频流。我们将在第 10 章中更详细地介绍 RTSP 的具体细节。\n\n**总结**\n\n正如我们在本章中所看到的，Android 丰富的先进音频功能帮助它超越了单纯的播放设备。开箱即用，它拥有的能力使我们作为开发者可以利用在线提供的各种音频资源，从独立的\
    \ MP3 文件到实况广播流。\n\n在下一章中，我们还将探讨如何将 Android 用作音频制作设备。\n\n**151**\n\n# 7\n\n## 第七章\n\
    \n### 音频捕获\n\n开发音频播放应用程序并非在 Android 上处理音频的唯一方式。我们还可以编写涉及音频捕获的应用程序。在本章中，我们将探讨可用于音频捕获的三种不同方法。每种方法都有其相对的优点和缺点。第一种方法，使用意图（intent），是最简单但灵活性最低的；其次是使用\
    \ `MediaRecorder` 类的方法，这种方法使用起来稍难，但提供了更大的灵活性；最后一种方法使用 `AudioRecord` 类，提供了最大的灵活性，但也需要我们做最多的工作。\n\
    \n### 使用意图进行音频捕获\n\n在应用程序中实现音频录制功能的最简单方法是，通过一个提供录制功能的意图来利用现有的应用程序。对于音频而言，Android\
    \ 附带了一个录音器应用程序，可以通过这种方式触发。\n\n用于创建意图的动作在 `MediaStore.Audio.Media` 类中以常量 `RECORD_SOUND_ACTION`\
    \ 的形式提供。以下是触发内置录音器的基本代码。\n\n```\nIntent intent = new Intent(MediaStore.Audio.Media.RECORD_SOUND_ACTION);\n\
    startActivity(intent);\n```\n\n图 7-1 显示了由意图触发的内置音频录制应用程序。\n\n![](img/index-166_1.jpg)\n\
    \n**152**\n\n## 第 7 章：音频捕获\n\n**图 7-1.*** 通过意图触发的 Android 内置录音器*\n\n当然，为了检索用户创建的录音，我们应该使用\
    \ `startActivityForResult` 而不是仅仅使用 `startActivity`。\n\n下面是一个通过意图触发内置录音器的示例。当用户完成后，音频文件将使用\
    \ `MediaPlayer` 播放。\n\n```\npackage com.apress.proandroidmedia.ch07.intentaudiorecord;\n\
    \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.media.MediaPlayer;\n\
    import android.media.MediaPlayer.OnCompletionListener;\nimport android.net.Uri;\n\
    import android.os.Bundle;\nimport android.provider.MediaStore;\nimport android.view.View;\n\
    import android.view.View.OnClickListener;\nimport android.widget.Button;\n```\n\
    \n我们的 Activity 实现了 `OnClickListener` 以便响应按钮点击，并实现了 `OnCompletionListener`，以便在\
    \ `MediaPlayer` 中音频播放完成时得到通知。\n\n```\npublic class IntentAudioRecorder extends\
    \ Activity implements OnClickListener,\nOnCompletionListener {\n```\n\n**第 7 章：音频捕获**\n\
    \n**153**\n\n我们将创建一个名为 `RECORD_REQUEST` 的常量，并传入 `startActivityForResult` 函数，以便我们能够识别任何对\
    \ `onActivityResult` 调用的来源，当录音器完成时会调用该函数。\n\n任何由 `startActivityForResult` 函数触发的返回\
    \ Activity 都会调用 `onActivityResult` 方法。在意图中传递一个唯一的常量，使我们能够在 `onActivityResult`\
    \ 方法中对它们进行区分。\n\n```\npublic static int RECORD_REQUEST = 0;\n\nButton createRecording,\
    \ playRecording;\n```\n\n我们需要一个 `Uri` 对象，用于保存录音器 Activity 录制的音频文件的 Uri。\n\n```\n\
    Uri audioFileUri;\n\n@Override\npublic void onCreate(Bundle savedInstanceState)\
    \ {\n    super.onCreate(savedInstanceState);\n    setContentView(R.layout.main);\n\
    ```\n\n设置内容视图后，我们可以获取对按钮对象的引用。每个按钮的点击监听器都设置为 `this`，这样我们的 Activity 的 `onClick`\
    \ 方法就会被调用。另外，我们将 `playRecording` 按钮设置为在获得音频文件之前（即从录音器 Activity 得到结果之前）不可用。\n\n\
    ```\ncreateRecording = (Button) this.findViewById(R.id.RecordButton);\ncreateRecording.setOnClickListener(this);\n\
    playRecording = (Button) this.findViewById(R.id.PlayButton);\nplayRecording.setOnClickListener(this);\n\
    playRecording.setEnabled(false);\n}\n```\n\n当我们点击任何一个按钮时，我们的 `onClick` 方法就会被触发。如果点击的是\
    \ `createRecording` 按钮，我们会通过一个意图（其中包含 `MediaStore.Audio.Media.RECORD_SOUND_ACTION`\
    \ 动作）传入 `startActivityForResult` 来触发录音器 Activity。\n\n```\npublic void onClick(View\
    \ v) {\n    if (v == createRecording) {\n        Intent intent =\n           \
    \ new Intent(MediaStore.Audio.Media.RECORD_SOUND_ACTION);\n        startActivityForResult(intent,\
    \ RECORD_REQUEST);\n    } else if (v == playRecording) {\n```\n\n如果按下的是 `playRecording`\
    \ 按钮，我们创建一个 `MediaPlayer` 并将其设置为播放录音器 Activity 返回并保存在我们的 `audioFileUri` 对象中的 Uri\
    \ 所代表的音频文件。\n\n我们还将 `MediaPlayer` 的 `OnCompletionListener` 设置为自身，以便播放完成时会调用我们的\
    \ `OnCompletion` 方法，并禁用 `playRecording` 按钮，这样在我们的准备工作完成之前，用户无法再次触发播放。\n\n```\n\
    p\n```\n\n**154**\n"
- fmt: "# CHAPTER 7: Audio Capture\n\n`MediaPlayer mediaPlayer = MediaPlayer.create(this,\
    \ audioFileUri);`\n\n`mediaPlayer.setOnCompletionListener(this);`\n\n`mediaPlayer.start();`\n\
    \n`playRecording.setEnabled(false);`\n\n我们的`onActivityResult`方法在录音活动完成时被触发。`resultCode`应等于`RESULT_OK`常量，`requestCode`应等于我们传递给`startActivityForResult`方法的值`RECORD_REQUEST`。如果两者都成立，那么我们可以通过`getData`方法从返回的`intent`中检索录制的音频文件的`Uri`。完成所有这些操作后，我们启用`playRecording`按钮，以便播放返回的音频文件。\n\
    \n```\nprotected void onActivityResult (int requestCode, int resultCode, Intent\
    \ data) {\n    if (resultCode == RESULT_OK && requestCode == RECORD_REQUEST) {\n\
    \        audioFileUri = data.getData();\n        playRecording.setEnabled(true);\n\
    \    }\n}\n```\n\n最后，在我们的`onCompletion`方法中（当`MediaPlayer`播放完文件时调用），我们重新启用`playRecording`按钮，以便用户可以选择再次收听音频文件。\n\
    \n```\npublic void onCompletion(MediaPlayer mp) {\n    playRecording.setEnabled(true);\n\
    }\n```\n\n以下是我们的活动使用的布局XML。\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n \
    \   android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n    <Button android:text=\"Record\
    \ Audio\" android:id=\"@+id/RecordButton\"\n        android:layout_width=\"wrap_content\"\
    \ android:layout_height=\"wrap_content\" />\n    <Button android:text=\"Play Recording\"\
    \ android:id=\"@+id/PlayButton\"\n        android:layout_width=\"wrap_content\"\
    \ android:layout_height=\"wrap_content\" />\n</LinearLayout>\n```\n\n如您所见，仅仅添加音频录制功能是直接了当的。它没有提供太多对用户界面或录音其他方面的控制，但它确实为用户提供了一个简单易用的界面，而无需我们做太多工作。\n\
    \n## 自定义音频录制\n\n当然，使用`intent`触发录音机并不是我们捕获音频的唯一方法。Android SDK包含一个`MediaRecorder`类，我们可以利用它来构建自己的音频录制功能。这样做提供了更大的灵活性，例如控制录制音频的时间长度。\n\
    \n`MediaRecorder`类用于音频和视频捕获。在构造`MediaRecorder`对象后，为了捕获音频，必须调用`setAudioEncoder`和`setAudioSource`方法。如果不调用这些方法，则不会录制音频。（视频也是如此。如果不调用`setVideoEncoder`和`setVideoSource`方法，则不会录制视频。本章不会涉及视频；因此我们不会使用这些方法中的任何一个。）\n\
    \n此外，在让`MediaRecorder`准备录制之前，通常还会调用另外两个方法：`setOutputFormat`和`setOutputFile`。`setOutputFormat`允许我们选择录制时使用的文件格式，`setOutputFile`允许我们指定要录制到的文件。需要注意的是，这些调用的顺序非常重要。\n\
    \n### MediaRecorder 音频源\n\n在实例化`MediaRecorder`之后，应该调用的第一个方法是`setAudioSource`。`setAudioSource`接受一个在`AudioSource`内部类中定义的常量。通常我们会使用`MediaRecorder.AudioSource.MIC`，但值得注意的是，`MediaRecorder.AudioSource`也包含了`VOICE_CALL`、`VOICE_DOWNLINK`和`VOICE_UPLINK`的常量。不幸的是，目前似乎没有手机或Android版本能够成功录制通话音频。另外需要注意的是，自Froyo（Android\
    \ 2.2版本）起，增加了`CAMCORDER`和`VOICE_RECOGNITION`的常量。如果设备有多个麦克风，可以使用这些常量。\n\n```\n\
    MediaRecorder recorder = new MediaRecorder();\nrecorder.setAudioSource(MediaRecorder.AudioSource.MIC);\n\
    ```\n\n### MediaRecorder 输出格式\n\n接下来要按顺序调用的方法是`setOutputFormat`。它接受的值在`MediaRecorder.OutputFormat`内部类中定义为常量。\n\
    \n- `MediaRecorder.OutputFormat.MPEG_4`：指定写入的文件将是MPEG-4文件。它可以包含音频和视频轨道。\n- `MediaRecorder.OutputFormat.RAW_AMR`：表示没有容器的原始文件。仅应在捕获音频且音频编码器为`AMR_NB`时使用。\n\
    - `MediaRecorder.OutputFormat.THREE_GPP`：指定写入的文件将是3GPP文件（扩展名为`.3gp`）。它可以包含音频和视频轨道。\n\
    \n```\nrecorder.setOutputFormat(MediaRecorder.OutputFormat.THREE_GPP);\n```\n\n\
    ### MediaRecorder 音频编码器\n\n设置输出格式之后，我们可以调用`setAudioEncoder`来设置应使用的编解码器。可能的值在`MediaRecorder.AudioEncoder`类中指定为常量。除了`DEFAULT`之外，只有一个值存在：`MediaRecorder.AudioEncoder.AMR_NB`，即自适应多速率窄带编解码器。该编解码器专为语音调优，因此除语音外不适合其他任何用途。默认情况下，它的采样率为8\
    \ kHz，比特率在4.75到12.2 kbps之间，这两个参数对于录制除语音以外的内容都非常低。不幸的是，目前这是我们使用`MediaRecorder`的唯一选择。\n\
    \n```\nrecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB);\n```\n\n###\
    \ MediaRecorder 输出和录制\n\n最后，我们需要使用要录制到的文件位置调用`setOutputFile`。以下代码片段使用`File.createTempFile`在需要将文件存储到SD卡的应用程序的首选文件位置创建一个文件。\n\
    \n```\nFile path = new File(Environment.getExternalStorageDirectory().getAbsolutePath()\
    \ +\n    \"/Android/data/com.apress.proandroidmedia.ch07.customrecorder/files/\"\
    );\npath.mkdirs();\naudioFile = File.createTempFile(\"recording\", \".3gp\", path);\n\
    recorder.setOutputFile(audioFile.getAbsolutePath());\n```\n\n现在我们可以实际调用`prepare`，它标志着配置阶段的结束，并告诉`MediaRecorder`准备开始录制。我们调用`start`方法实际开始录制。\n\
    \n```\nrecorder.prepare();\nrecorder.start();\n```\n\n要停止录制，我们调用`stop`方法。\n\n\
    ```\nrecorder.stop();\n```\n\n### MediaRecorder 状态机\n\n`MediaRecorder`与`MediaPlayer`类似，以状态机方式运行。图7-2来自Android\
    \ API参考页面中关于`MediaRecorder`的图表，描述了各种状态以及可以从每个状态调用的方法。\n\n**图7-2.** *来自Android\
    \ API参考的MediaRecorder状态图*\n\n### MediaRecorder 示例\n\n以下是使用`MediaRecorder`类的完整自定义音频捕获和播放示例的代码。\n\
    \n```\npackage com.apress.proandroidmedia.ch07.customrecorder;\n\nimport java.io.File;\n\
    import java.io.IOException;\n\nimport android.app.Activity;\nimport android.media.MediaPlayer;\n\
    import android.media.MediaRecorder;\nimport android.media.MediaPlayer.OnCompletionListener;"
