  trans: "\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.proandroidmedia.ch12.blipuploader\"\
    \n    android:versionCode=\"1\"\n    android:versionName=\"1.0\">\n\n    <application\n\
    \        android:icon=\"@drawable/icon\"\n        android:label=\"@string/app_name\"\
    >\n        <activity\n            android:name=\".BlipTVUploader\"\n         \
    \   android:label=\"@string/app_name\">\n            <intent-filter>\n       \
    \         <action android:name=\"android.intent.action.MAIN\" />\n           \
    \     <category android:name=\"android.intent.category.LAUNCHER\" />\n       \
    \     </intent-filter>\n        </activity>\n    </application>\n\n    <uses-sdk\
    \ android:minSdkVersion=\"4\" />\n    <uses-permission android:name=\"android.permission.INTERNET\"\
    \ />\n</manifest>\n```\n\n最后，这是`AndroidManifest.xml`，其中包含`uses-permission`标签，指定了我们需要能够访问互联网。\n\
    \n这个示例展示了允许用户将其创作直接发布到在线视频分享平台的方法。类似的代码也可用于发布到其他分享平台，当然，并不仅限于视频。我们可以将图片上传到 Flickr\
    \ 或 Picasa，也可以将音频文件上传到音频分享网站。\n\n## 总结\n\n正如我们在本章中所见，利用在线服务来获取媒体以及允许用户发布媒体，为我们开启了广泛的可能性。我们发现，在\
    \ Android 中使用 HTTP、REST、JSON 和 XML 并不困难，并且能够让我们访问几乎任何网络服务。此外，将位置信息融入其中，又为我们的应用程序增添了新的动态维度。\n"
