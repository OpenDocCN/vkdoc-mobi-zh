    \ ASC\");\n```\n\n当然，如果你希望返回所有记录，可以将最后三个参数设为 `null`。\n\n```\nCursor cursor = managedQuery(Media.EXTERNAL_CONTENT_URI,\
    \ columns, null, null, null);\n```\n\n返回的游标可以告诉我们所选各列的索引。\n"
