- fmt: "当然，以下是根据您的要求对给定文本进行排版后的 Markdown 格式内容：\n\nOf course, we’ll need to specify\
    \ that we need permission to access the Internet and use location in this example.\
    \ After adding the appropriate `uses-permission` tags, the `AndroidManifest.xml`\
    \ file for this example will be as follows:\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    package=\"com.apress.proandroidmedia.ch12.flickrjsonlocation\"\n    android:versionCode=\"\
    1\"\n    android:versionName=\"1.0\">\n\n    <application android:icon=\"@drawable/icon\"\
    \ android:label=\"@string/app_name\">\n        <activity android:name=\".FlickrJSONLocation\"\
    \n                  android:label=\"@string/app_name\">\n            <intent-filter>\n\
    \                <action android:name=\"android.intent.action.MAIN\" />\n    \
    \            <category android:name=\"android.intent.category.LAUNCHER\" />\n\
    \            </intent-filter>\n        </activity>\n    </application>\n\n   \
    \ <uses-sdk android:minSdkVersion=\"4\" />\n\n    <uses-permission android:name=\"\
    android.permission.ACCESS_COARSE_LOCATION\" />\n    <uses-permission android:name=\"\
    android.permission.INTERNET\" />\n\n</manifest>\n```\n\nAs we can see, simply\
    \ paying attention to location in our applications offers us the ability to create\
    \ a very dynamic experience. In this case, as the user moves around, he or she\
    \ is presented with a whole new set of “dog, halloween” photographs delivered\
    \ via Flickr, as illustrated in Figure 12–2.\n\n**Figure 12–2.** *Displaying images\
    \ tagged with “dog” and “halloween” that were taken near my current location from\
    \ Flickr*\n\nNow let’s turn our attention back to web service protocols and talk\
    \ about REST.\n\n## REST\n\nREST stands for Representational State Transfer. It\
    \ is a set of architecture principles for design of client-server services. In\
    \ general, a web service is considered “RESTful,” meaning it follows REST principles,\
    \ under the following conditions:\n\n- When it uses HTTP methods (`GET`, `POST`)\n\
    - When it is stateless, meaning that each transaction is independent from other\
    \ transactions\n- When it uses directory-style URLs to pass data rather than query\
    \ string variables (`www.afakeurl.com/shawn/van_every` instead of `www.afakeurl.com/?firstname=shawn&lastname=van_every`)\n\
    - When it uses XML (or JSON) for the transfer of data\n\nA good place to learn\
    \ more about REST-based web service architecture is an article entitled “RESTful\
    \ Web Services: The Basics,” by Alex Rodriguez, from IBM developerWorks: [www.ibm.com/developerworks/webservices/library/ws-restful/](http://www.ibm.com/developerworks/webservices/library/ws-restful/)\n\
    \nThe reason we are discussing REST here is that it is very commonly used in combination\
    \ with XML for the transfer of web service data. While we didn’t use the XML options\
    \ in the Flickr example, choosing JSON instead, we could have. The structure of\
    \ the XML representation of the data to be transferred doesn’t have to follow\
    \ any strict Document Type Definitions (DTD) or XML Schemas and is often created\
    \ and documented as needed by those services that are building the web service.\n\
    \n### Representing Data in XML\n\nHere is an example of an XML document that defines\
    \ a “user” on a theoretical web service. This document would be the response to\
    \ a query for information about a user given the `user-id`.\n\n```\n<?xml version=\"\
    1.0\"?>\n<user>\n    <user-id>15</user-id>\n    <username>vanevery</username>\n\
    \    <firstname>Shawn</firstname>\n    <lastname>Van Every</lastname>\n</user>\n\
    ```\n\nThere are several different flavors of XML parsing available on Android\
    \ by default. These include the two main methods, SAX (Simple API for XML) and\
    \ DOM (Document Object Model), as well as others. On mobile devices, SAX is often\
    \ chosen over DOM, as it reads in the XML sequentially, allowing actions on the\
    \ XML to occur as it is being read."
