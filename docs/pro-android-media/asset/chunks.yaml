  trans: "\n# 背景与网络音频\n\nM3U 文件也可以包含多个条目，依次指定一个文件或流。\n\n```\n#EXTM3U\n#EXTINF:0,直播流名称\n\
    http://www.nostreamhere.org:8000/\n#EXTINF:0,其他直播流名称\nhttp://www.nostreamthere.org/\n\
    ```\n\n遗憾的是，Android 上的 `MediaPlayer` 并不会帮我们解析 M3U 文件。因此，要在 Android 上创建 HTTP 流式音频播放器，我们必须自行处理解析工作，并使用\
    \ `MediaPlayer` 进行实际的媒体播放。\n\n以下是一个示例 Activity，用于解析并播放来自网络电台或 URL 字段中输入的任何 M3U\
    \ 文件。\n\n```java\npackage com.apress.proandroidmedia.ch06.httpaudioplaylistplayer;\n\
    \nimport java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.io.InputStreamReader;\nimport java.util.Vector;\n\nimport org.apache.http.HttpResponse;\n\
    import org.apache.http.HttpStatus;\nimport org.apache.http.client.ClientProtocolException;\n\
    import org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
    import org.apache.http.impl.client.DefaultHttpClient;\n\nimport android.app.Activity;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
    import android.media.MediaPlayer.OnPreparedListener;\nimport android.os.Bundle;\n\
    import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\nimport android.widget.EditText;\n```\n\n与之前的示例一样，这个\
    \ Activity 会实现 `OnCompletionListener` 和 `OnPreparedListener` 来跟踪 `MediaPlayer`\
    \ 的状态。\n\n```java\npublic class HTTPAudioPlaylistPlayer extends Activity\n   \
    \     implements OnClickListener, OnCompletionListener, OnPreparedListener {\n\
    \n    Vector playlistItems;\n```\n\n我们将使用一个 `Vector` 来保存播放列表中的项目列表。每个项目都是一个 `PlaylistFile`\
    \ 对象，该类定义在本类末尾的一个内部类中。\n\n界面上会有几个 `Button` 以及一个 `EditText` 对象，用于包含 M3U 文件的 URL。\n\
    \n```java\n    Button parseButton;\n    Button playButton;\n    Button stopButton;\n\
    \    EditText editTextUrl;\n    String baseURL = \"\";\n    MediaPlayer mediaPlayer;\n\
    ```\n\n下面的整型变量用于跟踪我们当前正在处理 `playlistItems` 这个 `Vector` 中的哪一项。\n\n```java\n   \
    \ int currentPlaylistItemNumber = 0;\n\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n\n        parseButton = (Button) this.findViewById(R.id.ButtonParse);\n\
    \        playButton = (Button) this.findViewById(R.id.PlayButton);\n        stopButton\
    \ = (Button) this.findViewById(R.id.StopButton);\n```\n\n我们将 `editTextUrl` 对象的文本设置为某个网络电台的\
    \ M3U 文件 URL。第一个被注释掉的是俄勒冈州波特兰市社区电台 KBOO（[www.kboo.fm](http://www.kboo.fm)）的 URL。第二个未被注释掉的是德克萨斯州奥斯汀市古典音乐电台\
    \ KMFA（[www.kmfa.org](http://www.kmfa.org)）的 URL。用户可以编辑此字段，将其设置为互联网上可用的任何 M3U\
    \ 文件的 URL。\n\n```java\n        editTextUrl = (EditText) this.findViewById(R.id.EditTextURL);\n\
    \        //editTextUrl.setText(\"http://live.kboo.fm:8000/high.m3u\");\n     \
    \   editTextUrl.setText(\"http://pubint.ic.llnwd.net/stream/pubint_kmfa.m3u\"\
    );\n\n        parseButton.setOnClickListener(this);\n        playButton.setOnClickListener(this);\n\
    \        stopButton.setOnClickListener(this);\n```\n\n初始状态下，`playButton` 和 `stopButton`\
    \ 将不可用，用户无法点击它们。而 `parseButton` 则是可用的。在获取并解析 M3U 文件后，`playButton` 将变为可用；音频开始播放后，`stopButton`\
    \ 将变为可用。我们通过这种方式引导用户遵循应用的流程。\n\n```java\n        playButton.setEnabled(false);\n\
    \        stopButton.setEnabled(false);\n\n        mediaPlayer = new MediaPlayer();\n\
    \        mediaPlayer.setOnCompletionListener(this);\n        mediaPlayer.setOnPreparedListener(this);\n\
    \    }\n```\n\n每个 `Button` 的 `OnClickListener` 都设置为这个 Activity。因此，当其中任何一个按钮被点击时，都会调用下面的\
    \ `onClick` 方法。这驱动了应用的大部分流程。当 `parseButton` 被按下时，会调用 `parsePlaylistFile` 方法。当\
    \ `playButton` 被按下时，会调用 `playPlaylistItems` 方法。\n"
- fmt: "# CHAPTER 6: Background and Networked Audio\n\n`public void onClick(View view)\
    \ {\n\nif (view == parseButton) {\n\nparsePlaylistFile();\n\n} else if (view ==\
    \ playButton) {\n\nplayPlaylistItems();\n\n} else if (view == stopButton) {\n\n\
    stop();\n\n}\n\n}`\n\nThe first method that will be triggered is `parsePlaylistFile`.\
    \ This method downloads the M3U file that is specified by the URL in the `editTextUrl`\
    \ object and parses it. The act of parsing it picks out any lines that represent\
    \ files to play and creates a `PlaylistItem` object, which is added to the `playlistItems`\
    \ Vector.\n\n`private void parsePlaylistFile() {`\n\nWe’ll start out with an empty\
    \ Vector. If a new M3U file is parsed, anything previously in here will be thrown\
    \ away.\n\n`playlistItems = new Vector();`\n\nTo retrieve the M3U file off of\
    \ the Web, we can use the Apache Software Foundation’s HttpClient library, which\
    \ is included with Android.\n\nFirst we create an `HttpClient` object, which represents\
    \ something along the lines of a web browser, and then an `HttpGet` object, which\
    \ represents the specific request for a file. The HttpClient will execute the\
    \ `HttpGet` and return an `HttpResponse`.\n\n`HttpClient httpClient = new DefaultHttpClient();`\n\
    \n`HttpGet getRequest = new HttpGet(editTextUrl.getText().toString());`\n\n`Log.v(\"\
    URI\",getRequest.getURI().toString());`\n\n`try {\n\nHttpResponse httpResponse\
    \ = httpClient.execute(getRequest);\n\nif (httpResponse.getStatusLine().getStatusCode()\
    \ != HttpStatus.SC_OK) {\n\n// ERROR MESSAGE\n\nLog.v(\"HTTP ERROR\",httpResponse.getStatusLine().getReasonPhrase());\n\
    \n} else {`\n\nAfter we make the request, we can retrieve an `InputStream` from\
    \ the `HttpResponse`. This `InputStream` contains the contents of the file requested.\n\
    \n`InputStream inputStream = httpResponse.getEntity().getContent();\n\nBufferedReader\
    \ bufferedReader =\n\nnew BufferedReader(new InputStreamReader(inputStream));`\n\
    \nWith the aid of a `BufferedReader`, we can go through the file line by line.\n\
    \n`String line;\n\nwhile ((line = bufferedReader.readLine()) != null) {\n\nLog.v(\"\
    PLAYLISTLINE\",\"ORIG: \" + line);`\n\nIf the line starts with a “#”, we’ll ignore\
    \ it for now. As described earlier, these lines are metadata.\n\nCHAPTER 6: Background\
    \ and Networked Audio 147\n\n`if (line.startsWith(\"#\")) {\n\n// Metadata\n\n\
    // Could do more with this but not fo now`\n\nOtherwise, if it isn’t a blank line,\
    \ it has a length greater than 0, and we’ll assume that it is a playlist item.\n\
    \n`} else if (line.length() > 0) {`\n\nIf the line starts with “http://”, we treat\
    \ it as a full URL to the stream, otherwise we treat it as a relative URL and\
    \ tack on the URL of the original request for the M3U file.\n\n`String filePath\
    \ = \"\";\n\nif (line.startsWith(\"http://\")) {\n\n// Assume it's a full URL\n\
    \nfilePath = line;\n\n} else {\n\n// Assume it's relative\n\nfilePath = getRequest.getURI().resolve(line).toString();\n\
    \n}`\n\nWe then add it to our Vector of playlist items.\n\n`PlaylistFile playlistFile\
    \ = new PlaylistFile(filePath);\n\nplaylistItems.add(playlistFile);`\n\n`}\n\n\
    }\n\ninputStream.close();\n\n}\n\n} catch (ClientProtocolException e) {\n\ne.printStackTrace();\n\
    \n} catch (IOException e) {\n\ne.printStackTrace();\n\n}`\n\nLast, now that we\
    \ are done parsing the file, we enable the `playButton`.\n\n`playButton.setEnabled(true);`\n\
    \n`}`\n\nWhen the user clicks the `playButton`, the `playPlaylistItems` method\
    \ is called. This method takes the first item from the `playlistItems` Vector\
    \ and hands it to the MediaPlayer object for preparation.\n\n`private void playPlaylistItems()\
    \ {\n\nplayButton.setEnabled(false);\n\ncurrentPlaylistItemNumber = 0;\n\nif (playlistItems.size()\
    \ > 0)\n\n{\n\nString path =\n\n((PlaylistFile)playlistItems.get(currentPlaylistItemNumber)).getFilePath();\n\
    \ntry {`\n\nAfter extracting the path to the file or stream, we use that in a\
    \ `setDataSource` method call on the MediaPlayer.\n\n`mediaPlayer.setDataSource(path);`\n\
    \n148 CHAPTER 6: Background and Networked Audio\n\nThen we call `prepareAsync`,\
    \ which allows the MediaPlayer to buffer and prepare to play the audio in the\
    \ background. When the buffering and other preparation is done, the activity’s\
    \ `onPrepared` method will be called since the activity is registered as the `OnPreparedListener`.\n\
    \n`mediaPlayer.prepareAsync();\n\n} catch (IllegalArgumentException e) {\n\ne.printStackTrace();\n\
    \n} catch (IllegalStateException e) {\n\ne.printStackTrace();\n\n} catch (IOException\
    \ e) {\n\ne.printStackTrace();\n\n}\n\n}\n\n}`\n\nOnce the `onPrepared` method\
    \ has been called, the `stopButton` is enabled and the MediaPlayer object is triggered\
    \ to start playing the audio.\n\n`public void onPrepared(MediaPlayer _mediaPlayer)\
    \ {\n\nstopButton.setEnabled(true);\n\nLog.v(\"HTTPAUDIOPLAYLIST\",\"Playing\"\
    );\n\nmediaPlayer.start();\n\n}`\n\nWhen the audio playback is complete, the `onCompletion`\
    \ method is triggered in this activity since the activity extends and is registered\
    \ as the MediaPlayer’s `OnCompletionListener`.\n\nThe `onCompletion` method cues\
    \ up the next item in the `playlistItems` Vector.\n\n`public void onCompletion(MediaPlayer\
    \ mediaPlayer) {\n\nLog.v(\"ONCOMPLETE\",\"called\");\n\nmediaPlayer.stop();\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\nmediaPlayer.reset();\n\nif (playlistItems.size()\
    \ > currentPlaylistItemNumber + 1) {\n\ncurrentPlaylistItemNumber++;\n\nString\
    \ path =\n\n((PlaylistFile)playlistItems.get(currentPlaylistItemNumber)).getFilePath();\n\
    \ntry {\n\nmediaPlayer.setDataSource(path);\n\nmediaPlayer.prepareAsync();\n\n\
    } catch (IllegalArgumentException e) {\n\ne.printStackTrace();\n\n} catch (IllegalStateException\
    \ e) {\n\ne.printStackTrace();\n\n} catch (IOException e) {\n\ne.printStackTrace();\n\
    \n}\n\n}\n\n}`\n\nThe `stop` method is called when the user presses the `stopButton`.\
    \ This method causes the MediaPlayer to pause rather than stop. The MediaPlayer\
    \ has a `stop` method, but that puts the MediaPlayer in an unprepared state. The\
    \ `pause` method just pauses playback.\n\nCHAPTER 6: Background and Networked\
    \ Audio 149\n\n`private void stop() {\n\nmediaPlayer.pause();\n\nplayButton.setEnabled(true);\n\
    \nstopButton.setEnabled(false);\n\n}`\n\nLast, we have an inner class called `PlaylistFile`.\
    \ One `PlaylistFile` object is created for each file represented in the M3U file.\n\
    \n`class PlaylistFile {\n\nString filePath;\n\npublic PlaylistFile(String _filePath)\
    \ {\n\nfilePath = _filePath;\n\n}\n\npublic void setFilePath(String _filePath)\
    \ {\n\nfilePath = _filePath;\n\n}\n\npublic String getFilePath() {\n\nreturn filePath;\n\
    \n}\n\n}`\n\n`}`\n\nHere is the layout XML file (`main.xml`) for the foregoing\
    \ activity.\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\"\n>\n    <TextView android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"\n        android:text=\"Enter URL\" android:id=\"@+id/EnterURLTextView\"\
    ></TextView>\n    <EditText android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/EditTextURL\" android:text=\"http://www.mobvcasting.com/android/audio/test.m3u\"\
    ></EditText>\n    <Button android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/ButtonParse\" android:text=\"Parse\"\
    ></Button>\n    <TextView android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"\n        android:id=\"@+id/PlaylistTextView\"></TextView>\n   \
    \ <Button android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    \n        android:id=\"@+id/PlayButton\" android:text=\"Play\"></Button>\n   \
    \ <Button android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    \n        android:id=\"@+id/StopButton\" android:text=\"Stop\"></Button>\n</LinearLayout>\n\
    ```\n\nThis example requires that the following permission be added to the `AndroidManifest.xml`\
    \ file.\n\n```xml\n<uses-permission android:name=\"android.permission.INTERNET\"\
    \ />\n```\n\nAs you can see in the foregoing example, working with a live audio\
    \ stream via HTTP is as straightforward as working with a file delivered via HTTP.\
    \ Figure 6–2 shows the example in action.\n\n![](index-164_1.png)\n\n150"
