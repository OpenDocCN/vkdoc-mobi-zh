    @+id/ChoosePictureButton\"\n    />\n    <ImageView\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:id=\"\
    @+id/ChosenImageView\"\n    />\n</LinearLayout>\n```"
