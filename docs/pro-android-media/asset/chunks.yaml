    Our activity wil implement both OnClickListener and OnTouchListener. The


    OnClickListener is so that our activity can respond to a Button press. The


    OnTouchListener is so that we can draw on the ImageView using the touchscreen.


    public class ChoosePictureDraw extends Activity implements OnClickListener,


    OnTouchListener {


    We have two main UI elements. The first one is the ImageView, which wil display
    our Bitmap, which we’l draw onto. The second is a Button that the user wil press
    to select an image from the Gal ery application.


    ImageView choosenImageView;


    Button choosePicture;


    We need to have two Bitmap objects. The first is the one that contains the scaled
    version of the selected image. The second is the mutable version that we’l draw
    the first one into and draw on top of.


    Bitmap bmp;


    Bitmap alteredBitmap;


    Canvas canvas;


    Paint paint;


    Matrix matrix;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    choosenImageView = (ImageView) this.findViewById(R.id.ChoosenImageView);


    Download from Wow! eBook <www.wowebook.com>


    choosePicture = (Button) this.findViewById(R.id.ChoosePictureButton);


    After we obtain references to the ImageView and Button, we set the listener for
    each of the events, OnClick and OnTouch, to be our activity.


    choosePicture.setOnClickListener(this);


    choosenImageView.setOnTouchListener(this);


    }


    Our onClick method fol ows. This uses the standard intent to al ow the user to
    pick an image from the Gal ery application.


    public void onClick(View v) {


    Intent choosePictureIntent = new Intent(


    Intent.ACTION_PICK,


    android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);


    startActivityForResult(choosePictureIntent, 0);


    }


    Our onActivityResult method is cal ed after the user selects the image. It loads
    the image selected into a Bitmap that is scaled to the size of the screen.


    protected void onActivityResult(int requestCode, int resultCode, Intent intent)
    {


    **CHAPTER 4: Graphics and Touch Events**


    **99**


    super.onActivityResult(requestCode, resultCode, intent);


    if (resultCode == RESULT_OK) {


    Uri imageFileUri = intent.getData();


    Display currentDisplay = getWindowManager().getDefaultDisplay();


    float dw = currentDisplay.getWidth();


    float dh = currentDisplay.getHeight();


    try {


    BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();


    bmpFactoryOptions.inJustDecodeBounds = true;


    bmp = BitmapFactory.decodeStream(


    getContentResolver().openInputStream(imageFileUri), null,


    bmpFactoryOptions);


    int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/dh);


    int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/dw);


    if (heightRatio > 1 && widthRatio > 1) {


    if (heightRatio > widthRatio) {


    bmpFactoryOptions.inSampleSize = heightRatio;


    }


    else {


    // Width ratio is larger, scale according to it


    bmpFactoryOptions.inSampleSize = widthRatio;


    }


    }


    bmpFactoryOptions.inJustDecodeBounds = false;


    bmp = BitmapFactory.decodeStream(


    getContentResolver().openInputStream(imageFileUri), null,


    bmpFactoryOptions);


    After the Bitmap is loaded, we create a mutable Bitmap, alteredBitmap, and draw
    our first Bitmap into it.


    alteredBitmap = Bitmap.createBitmap(


    bmp.getWidth(),bmp.getHeight(),bmp.getConfig());


    canvas = new Canvas(alteredBitmap);


    paint = new Paint();


    paint.setColor(Color.GREEN);


    paint.setStrokeWidth(5);


    matrix = new Matrix();


    canvas.drawBitmap(bmp, matrix, paint);


    choosenImageView.setImageBitmap(alteredBitmap);


    choosenImageView.setOnTouchListener(this);


    }


    catch (FileNotFoundException e) {


    Log.v("ERROR",e.toString());


    }


    }


    }


