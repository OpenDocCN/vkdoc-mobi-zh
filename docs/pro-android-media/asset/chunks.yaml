    \ Audio Synthesis\n\nDigital audio synthesis is a very broad topic with a great\
    \ deal of theory, mathematics, engineering, and history behind it. Unfortunately,\
    \ most of the topic overall is out of the scope of what can be covered in this\
    \ book. What we will do is look at some basic examples on how we can harness a\
    \ few built-in classes on Android to create audio from scratch.\n\nAs you probably\
    \ know, sound is formed by a repetitive change in pressure in air (or other substance)\
    \ in the form of a wave. Certain frequencies of these oscillations, otherwise\
    \ known as sound waves, are audible, meaning our ears are sensitive to that number\
    \ of repetitions in a period of time. This range is somewhere between 12 Hz (12\
    \ cycles per second), which is a very low sound such as a rumble, and 20 kHz (20,000\
    \ cycles per second), which is a very high-pitched sound.\n\nTo create audio,\
    \ we need to cause the air to vibrate at the frequency desired for the sound we\
    \ want. In the digital realm, this is generally done with a speaker that is driven\
    \ by an analog electric signal. Digital audio systems contain a chip or board\
    \ that performs a digital-to-analog conversion (DAC). A DAC will take in data\
    \ in the form of a series of numbers that represent audio samples and convert\
    \ that into an electrical voltage, which is translated into sound by the speaker.\n\
    \nIn order to synthesize audio, we simply need to synthesize the audio samples\
    \ and feed them to the appropriate mechanism. In the case of Android, that mechanism\
    \ is the `AudioTrack` class.\n\n### Chapter 8: Audio Synthesis and Analysis\n\n\
    As we learned in the last chapter, the `AudioTrack` class allows us to play raw\
    \ audio samples (such as those captured by the `AudioRecord` class).\n\n#### Playing\
    \ a Synthesized Sound\n\nHere is a quick example showing how to construct an `AudioTrack`\
    \ class and pass in data to play. For a full discussion of the parameters used\
    \ to construct the `AudioTrack` object, please see the “Raw Audio Playback with\
    \ AudioTrack” section of Chapter 7.\n\nThis example uses an inner class that extends\
    \ `AsyncTask`, `AudioSynthesisTask`. `AsyncTask` defines a method called `doInBackground`,\
    \ which runs any code that is placed inside it in a thread that is separate from\
    \ the main thread of the activity. This allows the activity and its UI to be responsive,\
    \ as the loop that feeds the `write` method of our `AudioTrack` object would otherwise\
    \ tie it up.\n\n```java\npackage com.apress.proandroidmedia.ch08.audiosynthesis;\n\
    \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
    import android.media.AudioTrack;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
