    \            / (float) DISPLAYHEIGHT);\n    int widthRatio = (int) Math.ceil(bmpFactoryOptions.outWidth\n\
    \            / (float) DISPLAYWIDTH);\n\n    Log.v(\"HEIGHTRATIO\", \"\" + heightRatio);\n\
    \    Log.v(\"WIDTHRATIO\", \"\" + widthRatio);\n\n    // 如果两个比例都大于 1，说明图像的某一边大于屏幕\n\
    \    if (heightRatio > 1 && widthRatio > 1) {\n        if (heightRatio > widthRatio)\
    \ {\n            // 高度比例更大，按高度比例进行缩放\n            bmpFactoryOptions.inSampleSize\
    \ = heightRatio;\n        } else {\n            // 宽度比例更大，按宽度比例进行缩放\n        \
    \    bmpFactoryOptions.inSampleSize = widthRatio;\n        }\n    }\n\n    //\
    \ 真正地解码图像\n    bmpFactoryOptions.inJustDecodeBounds = false;\n    bmp = BitmapFactory.decodeFile(imageFilePath,\
    \ bmpFactoryOptions);\n    return bmp;\n}\n```\n\n以下是配合上述活动使用的布局 XML 文件。它应该放在\
    \ `res/layout/main.xml` 文件中。\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\"\n    >\n    <ImageButton android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"\n        android:id=\"@+id/ImageButton\"\
    ></ImageButton>\n    <TextView\n        android:layout_width=\"fill_parent\"\n\
    \        android:layout_height=\"wrap_content\"\n        android:id=\"@+id/TitleTextView\"\
    \n        android:text=\"Image Title\"/>\n</LinearLayout>\n```\n\n### 内部元数据\n\n\
    EXIF（可交换图像文件格式）是一种在图像文件中保存元数据的标准方式。许多数码相机和桌面应用程序都支持使用 EXIF 数据。由于 EXIF 数据实际上是文件的一部分，因此在文件从一个地方传输到另一个地方时，它不应丢失。例如，当将文件从\
    \ Android 设备的 SD 卡复制到家用电脑时，这些数据将保持完整。如果你在 iPhoto 等应用程序中打开该文件，这些数据也会存在。\n\n通常，EXIF\
    \ 数据具有很强的技术导向性；该标准中的大多数标签都与图像本身的捕获数据有关，例如 `ExposureTime` 和 `ShutterSpeedValue`。\n\
    \n不过，有些标签值得我们考虑填写或修改。其中可能包括以下内容：\n\n- `UserComment`：用户生成的评论\n- `ImageDescription`：标题\n\
    - `Artist`：图像的创作者或拍摄者\n- `Copyright`：图像的版权持有者\n- `Software`：用于创建图像的软件\n\n幸运的是，Android\
    \ 为我们提供了一种便捷的方式来读取和写入 EXIF 数据。实现这一功能的主要类是 `ExifInterface`。\n\n以下是使用 `ExifInterface`\
    \ 从图像文件中读取特定 EXIF 数据的方法：\n\n```\nExifInterface ei = new ExifInterface(imageFilePath);\n\
    String imageDescription = ei.getAttribute(\"ImageDescription\");\nif (imageDescription\
    \ != null)\n{\n    Log.v(\"EXIF\", imageDescription);\n}\n```\n\n以下是使用 `ExifInterface`\
    \ 将 EXIF 数据保存到图像文件的方法：\n\n```\nExifInterface ei = new ExifInterface(imageFilePath);\n\
    ei.setAttribute(\"ImageDescription\",\"Something New\");\n```\n\n`ExifInterface`\
    \ 包含一组常量，这些常量定义了相机应用程序自动包含在捕获图像中的典型数据集。\n\nEXIF 规范的最新版本是 2010 年 4 月发布的 2.3 版。可在此处在线获取：[www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf](http://www.cipa.jp/english/hyoujunka/kikaku/pdf/DC-008-2010_E.pdf)。\n\
    \n### 本章小结\n\n在本章中，我们了解了 Android 上图像捕获和存储的基础知识。我们看到了使用 Android 内置相机应用程序的强大之处，以及如何通过\
    \ Intent 有效利用其功能。我们发现，相机应用程序为在任何 Android 应用程序中添加图像捕获功能提供了一个出色且一致的接口。\n\n我们还讨论了在处理大图像时需要注意内存使用的问题。我们了解到\
    \ `BitmapFactory` 类可以帮助我们加载图像的缩放版本，以节省内存。对内存的重视提醒我们，手机并非拥有看似无限内存的台式电脑。\n\n我们介绍了如何使用\
    \ Android 内置的图像内容提供程序 `MediaStore`。我们学习了如何使用它将图像保存到设备的标准位置，以及如何查询它以快速构建利用已捕获图像的应用程序。\n\
    \n最后，我们探讨了如何通过名为 EXIF 的标准将某些元数据与图像关联起来。EXIF 是可移植的，并广泛应用于各种设备和软件应用程序中。\n\n这为我们探索如何在\
    \ Android 上对媒体做更多事情提供了一个很好的起点。\n\n我很期待！\n\n## 第二章：构建自定义相机应用程序\n\n在上一章中，我们了解了如何利用\
    \ Android 内置的相机应用程序，在任何其他应用程序中提供一个现成的照片捕获组件。虽然这为最终用户提供了一个标准接口，并且对我们程序员来说也很直接，但它并没有提供太多的灵活性。例如，如果我们希望照片捕获应用程序支持延时摄影，使用内置应用程序很难做到。\n\
    \n幸运的是，Android 并没有限制我们只能使用内置应用程序来访问硬件相机。我们对底层硬件和可用方法的访问权限与相机应用程序本身一样多，这使我们能够在我们想要的任何类型的应用程序中使用这些功能。\n\
    \n在本章中，我们将探索构建一个利用底层 `Camera` 类的拍照应用程序，并学习如何利用我们获得的能力。我们将逐步完成构建几个不同应用程序所需的步骤：\n\
    \n- 一个简单的即拍即得照片应用程序\n- 一个倒计时定时器\n- 一个延时摄影应用程序\n\n### 使用 Camera 类\n\nAndroid 中的\
    \ `Camera` 类是我们用来访问设备上相机硬件的工具。它允许我们实际捕获图像，并通过其嵌套的 `Camera.Parameters` 类，我们可以更改各种属性，例如是否应激活闪光灯以及白平衡应设置为何值。\n\
    \n[`developer.android.com/reference/android/hardware/Camera.html`](http://developer.android.com/reference/android/hardware/Camera.html)\n"
- fmt: "### Camera Permissions\n\nIn order to use the `Camera` class to capture an\
    \ image, we need to specify in our `AndroidManifest.xml` file that we require\
    \ the `CAMERA` permission.\n\n```xml\n<uses-permission android:name=\"android.permission.CAMERA\"\
    \ />\n```\n\n### Preview Surface\n\nAlso before we can get started using the camera,\
    \ we need to create some type of `Surface` for the `Camera` to draw viewfinder\
    \ or preview images on. A `Surface` is an abstract class in Android representing\
    \ a place to draw graphics or images. One straightforward way to provide a drawing\
    \ `Surface` is to use the `SurfaceView` class. `SurfaceView` is a concrete class\
    \ providing a `Surface` within a standard `View`.\n\nTo specify a `SurfaceView`\
    \ in our layout, we simply use the `<SurfaceView />` element within any normal\
    \ layout XML. Here is a basic layout that just implements a `SurfaceView` within\
    \ a `LinearLayout` for a camera preview.\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n    <SurfaceView \n        android:id=\"\
    @+id/CameraView\" \n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
    fill_parent\" />\n</LinearLayout>\n```\n\nIn our code, for the purposes of using\
    \ this `SurfaceView` with the `Camera` class, we’ll need to add a `SurfaceHolder`\
    \ to the mix. The `SurfaceHolder` class can act as a monitor on our `Surface`,\
    \ giving us an interface through callbacks to let us know when the `Surface` is\
    \ created, destroyed, or changed. The `SurfaceView` class conveniently gives us\
    \ a method, `getHolder()`, to obtain a `SurfaceHolder` for its `Surface`.\n\n\
    Here is a snippet of code that accesses the `SurfaceView` as declared in the layout\
    \ XML and obtains a `SurfaceHolder` from it. It also sets the `Surface` to be\
    \ a “push” type of `Surface`, which means that the drawing buffers are maintained\
    \ external to the `Surface` itself. In this case, the buffers are managed by the\
    \ `Camera` class. A “push” type of `Surface` is required for the `Camera` preview.\n\
    \n```java\nSurfaceView cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
    SurfaceHolder surfaceHolder = cameraView.getHolder();\nsurfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    ```\n\nAdditionally, we’ll want to implement `SurfaceHolder.Callback` in our activity.\
    \ This allows our activity to be notified when the `Surface` is created, when\
    \ it changes, and when it is destroyed. To implement the `Callback`, we’ll add\
    \ the following methods.\n\n```java\npublic void surfaceChanged(SurfaceHolder\
    \ holder, int format, int w, int h) {}\npublic void surfaceCreated(SurfaceHolder\
    \ holder) {}\npublic void surfaceDestroyed(SurfaceHolder holder) {}\n```\n\nTo\
    \ finish up, we’ll need to tell our `SurfaceHolder` to use this activity as the\
    \ `Callback` handler.\n\n```java\nsurfaceHolder.addCallback(this);\n```\n\nOur\
    \ activity should now look something like this.\n\n```java\npackage com.apress.proandroidmedia.ch2.snapshot;\n\
    \nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.view.SurfaceHolder;\n\
    import android.view.SurfaceView;\n\npublic class SnapShot extends Activity implements\
    \ SurfaceHolder.Callback {\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
    \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n     \
    \   super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n   \
    \     surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n    }\n\n    public void surfaceChanged(SurfaceHolder\
    \ holder, int format, int w, int h) {}\n\n    public void surfaceCreated(SurfaceHolder\
    \ holder) {}\n\n    public void surfaceDestroyed(SurfaceHolder holder) {}\n}\n\
    ```\n\n### Implementing the Camera\n\nNow that we have the activity and preview\
    \ `Surface` all set up, we are ready to start using the actual `Camera` object.\n\
    \nWhen the `Surface` is created, which will trigger calling the `surfaceCreated()`\
    \ method in our code due to the `SurfaceHolder.Callback`, we can obtain a `Camera`\
    \ object by calling the static `open()` method on the `Camera` class.\n\n```java\n\
    Camera camera;\n\npublic void surfaceCreated(SurfaceHolder holder) {\n    camera\
    \ = Camera.open();\n```\n\nWe’ll want to follow that up with setting the preview\
    \ display to the `SurfaceHolder` we are using, which is provided to our method\
    \ through the callback. This method needs to be wrapped in a `try`/`catch` block\
    \ as it can throw an `IOException`. If this happens, we’ll want to release the\
    \ camera as we could tie up the camera hardware resources for other applications\
    \ if we don’t.\n\n```java\ntry {\n    camera.setPreviewDisplay(holder);\n} catch\
    \ (IOException exception) {\n    camera.release();\n}\n```\n\nFinally, we’ll want\
    \ to start the camera preview.\n\n```java\ncamera.startPreview();\n}\n```\n\n\
    Likewise, in `surfaceDestroyed()`, we’ll want to release the camera as well. We’ll\
    \ first call `stopPreview()`, just to make sure everything cleans up as it should.\n\
    \n```java\npublic void surfaceDestroyed(SurfaceHolder holder) {\n    camera.stopPreview();\n\
    \    camera.release();\n}\n```\n\nRunning this code, you’ll probably notice something\
    \ strange with the preview. It is rotating the preview image 90 degrees counter-clockwise\
    \ as shown in Figure 2–1.\n\n**Figure 2–1.** *The camera preview rotated 90 degrees*\n\
    \nThe reason this rotation is happening is that the `Camera` assumes the orientation\
    \ to be horizontal or landscape. The easiest way to correct the rotation is to\
    \ make our activity appear in landscape mode. To do this, we can add the following\
    \ code in our activity's `onCreate()` method.\n\n```java\n@Override\npublic void\
    \ onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n```\n\
    \nNow our `Camera` preview appears correctly as illustrated in Figure 2–2. Unfortunately,\
    \ our application is now stuck in landscape mode.\n\n**Figure 2–2.** *The camera\
    \ preview in landscape*\n\n### Setting Camera Parameters\n\nAs previously mentioned,\
    \ the `Camera` class has a nested `Camera.Parameters` class. This class has a\
    \ series of important attributes or settings that can be used to change how the\
    \ `Camera` operates. One of these that would help us right now is a way to deal\
    \ with the rotation/landscape issue we have in the preview.\n\nThe `Parameters`\
    \ to be used by the `Camera` can be modified as follows:\n\n```java\nCamera.Parameters\
    \ parameters = camera.getParameters();\nparameters.set(\"some parameter\", \"\
    some value\");\n// or\nparameters.set(\"some parameter\", some_int);\ncamera.setParameters(parameters);\n\
    ```\n\nThere are two different generic `Parameters.set()` methods. The first takes\
    \ a string for the parameter name and value, and the second takes a string for\
    \ the name but the value is an integer."
  raw: '### **Camera Permissions**


    In order to use the Camera class to capture an image, we need to specify in our


    AndroidManifest.xml file that we require the CAMERA permission.


    <uses-permission android:name="android.permission.CAMERA" />


    **Preview Surface**


    Also before we can get started using the camera, we need to create some type of


    Surface for the Camera to draw viewfinder or preview images on. A Surface is an


    abstract class in Android representing a place to draw graphics or images. One


    straightforward way to provide a drawing Surface is to use the SurfaceView class.


    SurfaceView is a concrete class providing a Surface within a standard View.


    To specify a SurfaceView in our layout, we simply use the <SurfaceView /> element
    within any normal layout XML. Here is a basic layout that just implements a SurfaceView
    within a LinearLayout for a camera preview.


    <?xml version="1.0" encoding="utf-8"?>


    [<LinearLayout](http://schemas.android.com/apk/res/android)


    android:orientation="vertical"


    android:layout_width="fill_parent"


    android:layout_height="fill_parent"


    >


    <SurfaceView android:id="@+id/CameraView" android:layout_width="fill_parent"


    android:layout_height="fill_parent"></SurfaceView>


    </LinearLayout>


    In our code, for the purposes of using this SurfaceView with the Camera class,
    we’ll need to add a SurfaceHolder to the mix. The SurfaceHolder class can act
    as a monitor on our Surface, giving us an interface through callbacks to let us
    know when the Surface is created, destroyed, or changed. The SurfaceView class
    conveniently gives us a method, getHolder, to obtain a SurfaceHolder for its Surface.


    Here is a snippet of code that accesses the SurfaceView as declared in the layout
    XML


    and obtains a SurfaceHolder from it. It also sets the Surface to be a “push” type
    of Surface, which means that the drawing buffers are maintained external to the
    Surface itself. In this case, the buffers are managed by the Camera class. A “push”
    type of Surface is required for the Camera preview.


    SurfaceView cameraView = (CameraView) this.findViewById(R.id.CameraView);


    SurfaceHolder surfaceHolder = cameraView.getHolder();


    surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);


    Additionally, we’ll want to implement SurfaceHolder.Callback in our activity.
    This allows our activity to be notified when the Surface is created, when it changes
    and when it is destroyed. To implement the Callback, we’ll add the following methods.


    public void surfaceChanged(SurfaceHolder holder, int format, int w, int h) {}


    public void surfaceCreated(SurfaceHolder holder) {}


    public void surfaceDestroyed(SurfaceHolder holder) {}


    **CHAPTER 2: Building Custom Camera Applications**


    **25**


    To finish up, we’ll need to tell our SurfaceHolder to use this activity as the
    Callback handler.


    surfaceHolder.addCallback(this);


    Our activity should now look something this.


    package com.apress.proandroidmedia.ch2.snapshot;


    import android.app.Activity;


    import android.os.Bundle;


    import android.view.SurfaceHolder;


    import android.view.SurfaceView;


    public class SnapShot extends Activity implements SurfaceHolder.Callback {


    SurfaceView cameraView;


    SurfaceHolder surfaceHolder;


    @Override


    public void onCreate(Bundle savedInstanceState)


    {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    cameraView = (SurfaceView) this.findViewById(R.id.CameraView);


    surfaceHolder = cameraView.getHolder();


    surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);


    surfaceHolder.addCallback(this);


    }


    public void surfaceChanged(SurfaceHolder holder, int format, int w, int h) {


    }


    public void surfaceCreated(SurfaceHolder holder) {


    }


    public void surfaceDestroyed(SurfaceHolder holder) {


    }


    }


    **Implementing the Camera**


    Now that we have the activity and preview Surface all set up, we are ready to
    start using the actual Camera object.


    When the Surface is created, which will trigger calling the surfaceCreated method
    in our code due to the SurfaceHolder.Callback, we can obtain a Camera object by
    calling the static open method on the Camera class.


    Camera camera;


    public void surfaceCreated(SurfaceHolder holder) {


    camera = Camera.open();


    We’ll want to follow that up with setting the preview display to the SurfaceHolder
    we are using, which is provided to our method through the callback. This method
    needs to be wrapped in a try catch block as it can throw an IOException. If this
    happens, we’ll want ![](index-40_1.jpg)


    **26**


    ## CHAPTER 2: Building Custom Camera Applications


    to release the camera as we could tie up the camera hardware resources for other


    applications if we don’t.


    try


    {


    camera.setPreviewDisplay(holder);


    }


    catch (IOException exception)


    {


    camera.release();


    }


    Finally, we’ll want to start the camera preview.


    camera.startPreview();


    }


    Likewise, in surfaceDestroyed, we’ll want to release the camera as well. We’ll
    first call stopPreview, just to make sure everything cleans up as it should.


    public void surfaceDestroyed(SurfaceHolder holder) {


    camera.stopPreview();


    camera.release();


    }


    Running this code, you’ll probably notice something strange with the preview.
    It is rotating the preview image 90 degrees counter-clockwise as shown in Figure
    2–1.


    **Figure 2–1.** *The camera preview rotated 90 degrees*


    ![](index-41_1.jpg)


    ## CHAPTER 2: Building Custom Camera Applications


    ### **27**


    The reason this rotation is happening is that the Camera assumes the orientation
    to be horizontal or landscape. The easiest way to correct the rotation is to make
    our activity appear in landscape mode. To do this, we can add the following code
    in our activity’s onCreate method.


    @Override


    public void onCreate(Bundle savedInstanceState)


    {


    super.onCreate(savedInstanceState);


    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);


    Now our Camera preview appears correctly as illustrated in Figure 2–2\. Unfortunately,
    our application is now stuck in landscape mode.


    **Figure 2–2.** *The camera preview in landscape*


    **Setting Camera Parameters**


    As previously mentioned, the Camera class has a nested Camera.Parameters class.
    This class has a series of important attributes or settings that can be used to
    change how the Camera operates. One of these that would help us right now is a
    way to deal with the rotation/landscape issue we have in the preview.


    The Parameters to be used by the Camera can be modified as follows:


    Camera.Parameters parameters = camera.getParameters();


    parameters.set("some parameter", "some value");


    // or


    parameters.set("some parameter", some_int);


    camera.setParameters(parameters);


    There are two different generic Parameters.set methods. The first takes a string
    for the parameter name and value, and the second takes a string for the name but
    the value is an integer.


