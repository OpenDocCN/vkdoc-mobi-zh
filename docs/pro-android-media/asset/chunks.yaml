    import org.apache.http.client.ClientProtocolException;


    import org.apache.http.client.HttpClient;


    import org.apache.http.client.methods.HttpGet;


    import org.apache.http.impl.client.DefaultHttpClient;


    import android.app.Activity;


    import android.media.MediaPlayer;


    import android.media.MediaPlayer.OnCompletionListener;


    import android.media.MediaPlayer.OnPreparedListener;


    import android.os.Bundle;


    import android.util.Log;


    import android.view.View;


    import android.view.View.OnClickListener;


    import android.widget.Button;


    import android.widget.EditText;


    As in our previous example, this activity will extend OnCompletionListener and


    OnPreparedListener to track the state of the MediaPlayer.


    public class HTTPAudioPlaylistPlayer extends Activity


    implements OnClickListener, OnCompletionListener, OnPreparedListener {


    We’ll use a Vector to hold the list of items in the playlist. Each item will be
    a


    PlaylistFile object that is defined in an inner class at the end of this class.


    Vector playlistItems;


    We’ll have a few Buttons on the interface as well as an EditText object, which
    will contain the URL to the M3U file.


    Button parseButton;


    Button playButton;


    Button stopButton;


    k


    **CHAPTER 6: Background and Networked Audio**


    **145**


    EditText editTextUrl;


    String baseURL = "";


    MediaPlayer mediaPlayer;


    The following integer is used keep track of which item from the playlistItems
    Vector we are currently on.


    int currentPlaylistItemNumber = 0;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    parseButton = (Button) this.findViewById(R.id.ButtonParse);


    playButton = (Button) this.findViewById(R.id.PlayButton);


    stopButton = (Button) this.findViewById(R.id.StopButton);


    We are setting the text of the editTextUrl object to be the URL of an M3U file
    from an online radio station. The first one, which is commented out, is the URL
    for KBOO, a community radio station in Portland, Oregon ([www.kboo.fm/). The second,
    which is not](http://www.kboo.fm)


    commented out, is for KMFA, a classical station in Austin, Texas ([www.kmfa.org/).](http://www.kmfa.org)


