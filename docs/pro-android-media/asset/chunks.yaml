    \    }\n    camera.startPreview();\n}\n```\n\n上述代码首先通过调用 `Context.getResources().getConfiguration()`\
    \ 检查设备配置，以确定当前方向。如果方向不是横屏，则将 `Camera.Parameters` 中的“orientation”属性设置为“portrait”。此外，还调用了\
    \ `Camera.Parameters.setRotation` 方法，并传入 90 度。该方法适用于 API 级别 5（版本 2.0）及更高版本，实际上并不执行任何旋转操作；而是告诉相机在\
    \ EXIF 数据中指定图像显示时应旋转 90 度。如果不加此设置，当你在其他应用中查看此图像时，它很可能会以侧向显示。\n\n**注意：** 上述通过 `Camera.Parameters`\
    \ 修改相机旋转的方法适用于 Android 2.1 及更早版本。在 Android 2.2 中，引入了 `Camera` 类的新方法 `setDisplayOrientation(int\
    \ degrees)`。该方法接受一个表示图像旋转角度的整数，有效的角度值仅为 0、90、180、270。\n\n大多数可以或应该修改的参数都有与之关联的特定方法。正如我们在\
    \ `setRotation` 方法中看到的，它们遵循 Java 的 getter 和 setter 设计模式。例如，可以通过 `setFlashMode(Camera.Parameters.FLASH_MODE_AUTO)`\
    \ 设置相机的闪光灯模式，并通过 `getFlashMode()` 获取当前值，而不必通过通用的 `Parameters.set` 方法来实现。\n\n从\
    \ Android 2.0 开始，有一个有趣的参数可供演示使用，它可以让我们更改特效。其 getter 和 setter 分别是 `getColorEffect`\
    \ 和 `setColorEffect`。此外，还有一个 `getSupportedColorEffects` 方法，该方法返回一个包含 `String`\
    \ 对象的 `List`，列出了特定设备支持的各种特效。事实上，对于所有拥有 getter 和 setter 方法的参数，都存在类似的方法，并且应在使用前确保所请求的功能可用。\n\
    \n```\nCamera.Parameters parameters = camera.getParameters();\nList<String> colorEffects\
    \ = parameters.getSupportedColorEffects();\nIterator<String> cei = colorEffects.iterator();\n\
    while (cei.hasNext()) {\n    String currentEffect = cei.next();\n    Log.v(\"\
    SNAPSHOT\",\"Checking \" + currentEffect);\n    if (currentEffect.equals(Camera.Parameters.EFFECT_SOLARIZE))\
