    Following that, we’ll set its onClickListener to be our activity, the same thing
    we are doing with the choosePicture Button.


    savePicture.setOnClickListener(this);


    Now we’ll need to modify our onClick method to take into account that two different
    Buttons will be using it. The easiest way is to compare the View that is passed
    in with the Buttons. If the View is equal to one of the Buttons, that’s the one
    that was clicked.


    public void onClick(View v) {


    if (v == choosePicture)


    {


    Intent choosePictureIntent = new Intent(Intent.ACTION_PICK,


    android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);


    startActivityForResult(choosePictureIntent, 0);


    }


    else if (v == savePicture)


    {


    We know the savePicture button was clicked. Now we need to make sure the Bitmap


    we are drawing on has been defined.


    if (alteredBitmap != null)


    {


    Once we do that, we’re all set to go about saving it. Just like previous examples,
    we’ll query the MediaStore to get a Uri for our new image and create an OutputStream
    from that Uri.


    Uri imageFileUri = getContentResolver().insert(


    Media.EXTERNAL_CONTENT_URI, new ContentValues());


    try {


    OutputStream imageFileOS =


    getContentResolver().openOutputStream(imageFileUri);


    In previous image saving examples, we actually already had the data in JPEG form,
    and we would simply write it out to the OutputStream. In this case, we have to
    use the


    compress method of the Bitmap object to convert it into a JPEG (or PNG if we choose).


    The compress method compresses the Bitmap data and writes it out to an OutputStream
    for us. It takes in a constant defined in Bitmap.CompressFormat, which is either
    PNG or JPEG. PNG is great for line art and graphics. JPEG is great for full-color
    images with gradients, such as photographs. Since we are working with a photograph
    here, we’ll use JPEG.


    The next argument is the quality setting. The quality setting is useful only when


    compressing as a JPEG, as PNG images will always keep all of the data, making
    a


    quality setting useless. JPEG is what is considered a “lossy” codec, which means
    that data will be thrown away. The quality has an inverse relationship with the
    size. A quality **CHAPTER 4: Graphics and Touch Events**


