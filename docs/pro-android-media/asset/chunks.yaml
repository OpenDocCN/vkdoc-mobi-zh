- fmt: "# CHAPTER 8: Audio Synthesis and Analysis\n\nHere is the layout XML in use\
    \ by the preceding activity.\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"\n        android:id=\"@+id/StartSound\"\
    \ android:text=\"Start Sound\" />\n    <Button android:layout_width=\"wrap_content\"\
    \ android:layout_height=\"wrap_content\"\n        android:id=\"@+id/EndSound\"\
    \ android:text=\"End Sound\" />\n</LinearLayout>\n```\n\nThe key to the foregoing\
    \ code is the array of shorts. These are the audio samples that are continuously\
    \ being passed into the `AudioTrack` object through the `write` method. In this\
    \ case, the samples oscillate from 8,130 to 32,695, down to -32,121 and back up\
    \ to -466. If we plotted these values on a graph, these samples taken together\
    \ will construct a waveform. Since sound is created with oscillating pressure,\
    \ and each of the samples represents a pressure value, having these samples represent\
    \ a waveform is required to create sound. Varying this waveform allows us to create\
    \ different kinds of audio. The following set of samples describes a short waveform,\
    \ only ten samples, and therefore represents a high-frequency sound, one that\
    \ has many oscillations per second. Low-frequency sounds would have a waveform\
    \ that spans many more samples at a fixed sample rate.\n\n```\nshort[] buffer\
    \ = {\n    8130, 15752, 32695, 12253, 4329,\n    -3865, -19032, -32722, -16160,\
    \ -466\n};\n```\n\n## Generating Samples\n\nUsing a little bit of math, we can\
    \ algorithmically create these samples. The classic sine wave can be reproduced.\
    \ This example produces a sine wave at 440 Hz.\n\n```\npackage com.apress.proandroidmedia.ch08.audiosynthesis;\n\
    \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
    import android.media.AudioTrack;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
    import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\n\npublic class AudioSynthesis extends Activity\
    \ implements OnClickListener {\n\n    Button startSound;\n    Button endSound;\n\
    \    AudioSynthesisTask audioSynth;\n    boolean keepGoing = false;\n    float\
    \ synth_frequency = 440; // 440 Hz, Middle A\n\n    @Override\n    public void\
    \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        startSound = (Button) this.findViewById(R.id.StartSound);\n\
    \        startSound.setOnClickListener(this);\n\n        endSound = (Button) this.findViewById(R.id.EndSound);\n\
    \        endSound.setOnClickListener(this);\n        endSound.setEnabled(false);\n\
    \    }\n\n    @Override\n    public void onPause() {\n        super.onPause();\n\
    \        keepGoing = false;\n        endSound.setEnabled(false);\n        startSound.setEnabled(true);\n\
    \    }\n\n    public void onClick(View v) {\n        if (v == startSound) {\n\
    \            keepGoing = true;\n            audioSynth = new AudioSynthesisTask();\n\
    \            audioSynth.execute();\n            endSound.setEnabled(true);\n \
    \           startSound.setEnabled(false);\n        } else if (v == endSound) {\n\
    \            keepGoing = false;\n            endSound.setEnabled(false);\n   \
    \         startSound.setEnabled(true);\n        }\n    }\n\n    private class\
    \ AudioSynthesisTask extends AsyncTask<Void, Void, Void> {\n        @Override\n\
    \        protected Void doInBackground(Void... params) {\n            final int\
    \ SAMPLE_RATE = 11025;\n            int minSize = AudioTrack.getMinBufferSize(SAMPLE_RATE,\n\
    \                AudioFormat.CHANNEL_CONFIGURATION_MONO,\n                AudioFormat.ENCODING_PCM_16BIT);\n\
    \n            AudioTrack audioTrack = new AudioTrack(AudioManager.STREAM_MUSIC,\n\
    \                SAMPLE_RATE,\n                AudioFormat.CHANNEL_CONFIGURATION_MONO,\n\
    \                AudioFormat.ENCODING_PCM_16BIT,\n                minSize,\n \
    \               AudioTrack.MODE_STREAM);\n\n            audioTrack.play();\n\n\
    \            short[] buffer = new short[minSize];\n            float angular_frequency\
    \ = (float)(2 * Math.PI) * synth_frequency / SAMPLE_RATE;\n            float angle\
    \ = 0;\n\n            while (keepGoing) {\n                for (int i = 0; i <\
    \ buffer.length; i++) {\n                    buffer[i] = (short)(Short.MAX_VALUE\
    \ * ((float) Math.sin(angle)));\n                    angle += angular_frequency;\n\
    \                }\n                audioTrack.write(buffer, 0, buffer.length);\n\
    \            }\n            return null;\n        }\n    }\n}\n```\n\nHere is\
    \ the layout XML file for the foregoing activity:\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n    <Button android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"\n        android:id=\"@+id/StartSound\"\
    \ android:text=\"Start Sound\" />\n    <Button android:layout_width=\"wrap_content\"\
    \ android:layout_height=\"wrap_content\"\n        android:id=\"@+id/EndSound\"\
    \ android:text=\"End Sound\" />\n</LinearLayout>\n```\n\nChanging the `synth_frequency`\
    \ would allow us to reproduce any other frequency we would like. Of course, changing\
    \ the function used to generate the values would change the sound as well. You\
    \ may want to try clamping the samples to `Short.MAX_VALUE` or `Short.MIN_VALUE`\
    \ to do a quick and dirty square wave example.\n\nOf course, this just scratches\
    \ the surface of what can be done with audio synthesis on Android. Given `AudioTrack`\
    \ allows us to play raw PCM samples, almost any technique that can be used to\
    \ generate digital audio can be utilized on Android, taking into account processor\
    \ speed and memory limitations.\n\nWhat follows is an example application that\
    \ takes some techniques from Chapter 4 for tracking finger position on the touchscreen\
    \ and the foregoing example code for generating audio. In this application, we'll\
    \ generate audio and choose the frequency based upon the location of the user's\
    \ finger on the x axis of the touchscreen.\n\n```\npackage com.apress.proandroidmedia.ch08.fingersynthesis;\n\
    \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
    import android.media.AudioTrack;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
    import android.util.Log;\nimport android.view.MotionEvent;\nimport android.view.View;\n\
    import android.view.View.OnTouchListener;\n```\n\nOur activity will implement\
    \ `OnTouchListener` so that we can track the touch locations.\n\n```\npublic class\
    \ FingerSynthesis extends Activity implements OnTouchListener {\n```\n\nJust like\
    \ the previous example, we'll use an `AsyncTask` to provide a thread for generating\
    \ and playing the audio samples.\n\n```\n    AudioSynthesisTask audioSynth;\n\
    ```\n\nWe need a base audio frequency that will be played when the finger is at\
    \ the 0 position on the x axis. This will be the lowest frequency played.\n\n\
    ```\n    static final float BASE_FREQUENCY = 440;\n```\n\nWe'll be varying the\
    \ `synth_frequency` float as the finger moves. When we start the app, we'll set\
    \ it to the `BASE_FREQUENCY`.\n\n```\n    float synth_frequency = BASE_FREQUENCY;\n\
    ```\n\nWe'll use the `play` Boolean to determine when we should actually be playing\
    \ audio or not. It will be controlled by the touch events.\n\n```\n    boolean\
    \ play = false;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
