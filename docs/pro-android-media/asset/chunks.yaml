  trans: "\n# 第 11 章：视频捕获\n\n如前所述，如果只需录制视频，或希望为用户提供相机应用中的所有控制选项，使用 Intent 触发该功能是一种绝佳方式。\n\
    \n## 添加视频元数据\n\n如第 9 章所述，Android 的 `MediaStore` 内容提供器包含一个专门用于视频的模块 `MediaStore.Video`，此外还包括我们之前探讨过的图片和音频文件及其元数据模块。\n\
    \n通过 Intent 触发相机应用时，返回的新录制视频文件的 `Uri` 是 `content://` 风格的 `Uri`，需要与内容提供器（此处为 `MediaStore`）配合使用。要添加额外元数据，我们可以利用返回的\
    \ `Uri` 更新 `MediaStore` 中的视频记录。\n\n与其他内容提供器一样，我们通过从 `Context` 获取的 `ContentResolver`\
    \ 对象调用 `update` 方法。传入 `content://` 风格的 `Uri` 以及由 `ContentValues` 对象封装的新数据。由于我们已获取指向特定记录的\
    \ `Uri`，因此无需为最后两个参数（SQL 风格的 `WHERE` 子句及其参数）指定内容。\n\n`ContentValues` 对象包含键值对，其中键为\
    \ `MediaStore.Video` 专用的列名。可用列名以常量形式定义在 `MediaStore.Video.Media` 中，大部分继承自 `android.provider.BaseColumns`、`MediaStore.MediaColumns`\
    \ 和 `MediaStore.Video.VideoColumns`。\n\n```\nContentValues values = new ContentValues(1);\n\
    values.put(MediaStore.MediaColumns.TITLE, titleEditText.getText().toString());\n\
    int numRecordsUpdated = getContentResolver().update(videoFileUri, values, null,\
    \ null);\n```\n\n以下是对先前 `VideoCaptureIntent` 示例的改进，允许用户为新拍摄的视频关联标题。\n\n```\npackage\
    \ com.apress.proandroidmedia.ch11.videocaptureintent;\n\nimport android.app.Activity;\n\
    import android.content.ContentValues;\nimport android.content.Intent;\nimport\
    \ android.net.Uri;\nimport android.os.Bundle;\nimport android.provider.MediaStore;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    import android.widget.EditText;\nimport android.widget.Toast;\n\npublic class\
    \ VideoCaptureIntent extends Activity implements OnClickListener {\n\n    public\
    \ static int VIDEO_CAPTURED = 1;\n\n    Button captureVideoButton;\n    Button\
    \ playVideoButton;\n    Button saveVideoButton;\n```\n\n该版本将包含一个 `EditText` 对象，用于让用户输入视频标题。\n\
    \n```\n    EditText titleEditText;\n    Uri videoFileUri;\n\n    @Override\n \
    \   public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        captureVideoButton = (Button)\
    \ this.findViewById(R.id.CaptureVideoButton);\n        playVideoButton = (Button)\
    \ this.findViewById(R.id.PlayVideoButton);\n```\n\n我们还将添加一个 `saveVideoButton`，点击时会触发\
    \ `MediaStore` 中记录的更新。\n\n```\n        saveVideoButton = (Button) this.findViewById(R.id.SaveVideoButton);\n\
    \        titleEditText = (EditText) this.findViewById(R.id.TitleEditText);\n\n\
    \        captureVideoButton.setOnClickListener(this);\n        playVideoButton.setOnClickListener(this);\n\
    \        saveVideoButton.setOnClickListener(this);\n\n        playVideoButton.setEnabled(false);\n\
    \        saveVideoButton.setEnabled(false);\n        titleEditText.setEnabled(false);\n\
    \    }\n```\n\n当任意按钮被点击时触发的 `onClick` 方法执行了大部分操作。点击 `captureVideoButton` 时，通过\
    \ Intent 触发系统内置相机应用；点击 `playVideoButton` 时，通过 Intent 触发系统内置媒体播放器应用（而非像之前那样使用 `VideoView`）；最后点击\
    \ `saveVideoButton` 时，更新 `MediaStore` 中的视频文件记录。\n\n```\n    public void onClick(View\
    \ v) {\n        if (v == captureVideoButton) {\n            Intent captureVideoIntent\
    \ = new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\n          \
    \  startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);\n        } else\
    \ if (v == playVideoButton) {\n            Intent playVideoIntent = new Intent(Intent.ACTION_VIEW,\
    \ videoFileUri);\n            startActivity(playVideoIntent);\n        } else\
    \ if (v == saveVideoButton) {\n```\n\n首先，我们创建一个 `ContentValues` 对象，并用用户在 `EditText`\
    \ 中输入的文本填充它。\n\n```\n            ContentValues values = new ContentValues(1);\n\
    \            values.put(MediaStore.MediaColumns.TITLE, titleEditText.getText().toString());\n\
    ```\n"
- fmt: "## CHAPTER 11: Video Capture\n\nThen we call the `update` method on the `ContentResolver`\
    \ object, passing in the `Uri` to the captured video and the `ContentValues` object.\n\
    \n```\nif (getContentResolver().update(videoFileUri, values, null, null) == 1)\
    \ {\n```\n\nIf the result of the `update` method is 1, then we were successful;\
    \ one row was updated, and we’ll tell the user.\n\n```\nToast t = Toast.makeText(this,\
    \ \"Updated \" + titleEditText.getText().toString(), Toast.LENGTH_SHORT);\nt.show();\n\
    }\nelse {\n```\n\nIf the result was anything other than 1, we’ll tell the user\
    \ that an error occurred.\n\n```\nToast t = Toast.makeText(this, \"Error\", Toast.LENGTH_SHORT);\n\
    t.show();\n}\n}\n}\n```\n\n```\nprotected void onActivityResult (int requestCode,\
    \ int resultCode, Intent data) {\n    if (resultCode == RESULT_OK && requestCode\
    \ == VIDEO_CAPTURED) {\n        videoFileUri = data.getData();\n        playVideoButton.setEnabled(true);\n\
    \        saveVideoButton.setEnabled(true);\n        titleEditText.setEnabled(true);\n\
    \    }\n}\n}\n```\n\nHere is the layout XML contained in `res/layout/main.xml`\
    \ referenced by the foregoing activity.\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\"\n>\n    <Button android:text=\"Capture\
    \ Video\" android:id=\"@+id/CaptureVideoButton\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"></Button>\n    <Button android:text=\"\
    Play Video\" android:id=\"@+id/PlayVideoButton\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"></Button>\n    <TextView\
    \ android:text=\"Title:\" android:id=\"@+id/TitleTextView\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"></TextView>\n    <EditText\
    \ android:text=\"\" android:id=\"@+id/TitleEditText\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"></EditText>\n    <Button\
    \ android:text=\"Save Metadata\" android:id=\"@+id/SaveVideoButton\"\n       \
    \ android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></Button>\n</LinearLayout>\n```\n\n## CHAPTER 11: Video Capture\n\nThe preceding\
    \ example shows how straightforward many aspects of using video within Android\
    \ can be, especially so when using an intent to do the video capture and relying\
    \ upon the `MediaStore` to handle metadata.\n\nIt should be noted that when updating\
    \ the metadata in the `MediaStore`, the data is not updated within the video file\
    \ itself; rather, it is stored only in the `MediaStore` record that pertains to\
    \ the video. The Android SDK does not offer built-in classes to alter the media\
    \ file’s metadata directly.\n\n### Custom Video Capture\n\nWith images and audio\
    \ there are multiple ways to do capture. Video capture is no exception; we don’t\
    \ have quite as many options as we do with audio, but we do have the ability to\
    \ create a custom video capture example using the `MediaRecorder` class.\n\nIn\
    \ many ways, building a custom video capture application is a lot like building\
    \ a custom camera application combined with a custom audio recording application.\
    \ We have to create a `SurfaceView` for the camera to draw preview or viewfinder\
    \ images on, just like we did with our custom camera examples from Chapter 2,\
    \ and we’ll use a `MediaRecorder` for the actual recording, like we did in Chapter\
    \ 7 for audio capture.\n\n#### MediaRecorder for Video\n\nTo use the `MediaRecorder`\
    \ for video capture, we have to follow all of the same steps for audio capture\
    \ plus some video specific steps. In addition, the `MediaRecorder` is a state\
    \ machine, and we therefore have to follow a specific sequence of steps to go\
    \ from instantiation to recording.\n\nFirst we’ll instantiate it, and then go\
    \ through the steps in sequence.\n\n```java\nMediaRecorder recorder = new MediaRecorder();\n\
    ```\n\n##### Audio and Video Sources\n\nFollowing instantiation, we can set the\
    \ audio and video sources. To set the audio source, we use the `setAudioSource`\
    \ method, passing in a constant representing the source we would like to use.\n\
    \n```java\nrecorder.setAudioSource(MediaRecorder.AudioSource.DEFAULT);\n```\n\n\
    The possible audio source values are constants defined in the `MediaRecorder.AudioSource`\
    \ class:\n\n- `CAMCORDER`: If the device has different microphones for use with\
    \ different cameras (front-facing, rear-facing), using this value will specify\
    \ that the appropriate microphone is used (Android 2.1/API level 7 or later)."
