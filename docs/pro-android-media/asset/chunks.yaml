    onCreate\");\n```\n\n在实例化 `MediaPlayer` 对象后，我们将该活动注册为 `OnCompletionListener`、`OnErrorListener`、`OnBufferingUpdateListener`\
    \ 和 `OnPreparedListener`。\n\n```\n        mediaPlayer = new MediaPlayer();\n \
