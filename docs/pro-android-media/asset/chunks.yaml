    \n`AudioRecord`是这三种方法中最灵活的，因为它允许我们访问原始音频流，但内置功能最少，例如不会自动压缩音频。\n\n使用`AudioRecord`的基础知识很简单。我们只需要构造一个`AudioRecord`类型的对象，传入各种配置参数。\n\
    \n我们需要指定的第一个值是音频源。这里使用的值与我们在`MediaRecorder`中使用的相同，并在`MediaRecorder.AudioSource`中定义。本质上，这意味着我们可以使用`MediaRecorder.AudioSource.MIC`。\n"
- fmt: "# Chapter 7: Audio Capture\n\n`int audioSource = MediaRecorder.AudioSource.MIC;`\n\
    \nThe next value that we'll need to specify is the sample rate of the recording.\
    \ This should be specified in Hz. As we know, the `MediaRecorder` samples audio\
    \ at 8 kHz or 8,000 Hz.\n\nCD quality audio is typically 44.1 kHz or 44,100 Hz.\
    \ Hz or hertz is the number of samples per second. Different Android handset hardware\
    \ will be able to sample at different sample rates. For our example application,\
    \ we'll sample at 11,025 Hz, which is another commonly used sample rate.\n\n`int\
    \ sampleRateInHz = 11025;`\n\nNext, we need to specify the number of channels\
    \ of audio to capture. The constants for this parameter are specified in the `AudioFormat`\
    \ class and are self-explanatory.\n\n`AudioFormat.CHANNEL_CONFIGURATION_MONO`\n\
    `AudioFormat.CHANNEL_CONFIGURATION_STEREO`\n`AudioFormat.CHANNEL_CONFIGURATION_INVALID`\n\
    `AudioFormat.CHANNEL_CONFIGURATION_DEFAULT`\n\nWe'll use a mono configuration\
    \ for now.\n\n`int channelConfig = AudioFormat.CHANNEL_CONFIGURATION_MONO;`\n\n\
    Following that, we need to specify the audio format. The possibilities here are\
    \ also specified in the `AudioFormat` class.\n\n`AudioFormat.ENCODING_DEFAULT`\n\
    `AudioFormat.ENCODING_INVALID`\n`AudioFormat.ENCODING_PCM_16BIT`\n`AudioFormat.ENCODING_PCM_8BIT`\n\
    \nAmong these four, our choices boil down to PCM 16-bit and PCM 8-bit. PCM stands\
    \ for Pulse Code Modulation, which is essentially the raw audio samples. We can\
    \ therefore set the resolution of each sample to be 16 bits or 8 bits. Sixteen\
    \ bits will take up more space and processing power, while the representation\
    \ of the audio will be closer to reality. For our example, we'll use the 16-bit\
    \ version.\n\n`int audioFormat = AudioFormat.ENCODING_PCM_16BIT;`\n\nLast, we'll\
    \ need to specify the buffer size. We can actually ask the `AudioRecord` class\
    \ what the minimum buffer size should be with a static method call, `getMinBufferSize`,\
    \ passing in the sample rate, channel configuration, and audio format.\n\n`int\
    \ bufferSizeInBytes = AudioRecord.getMinBufferSize(sampleRateInHz, channelConfig,\
    \ audioFormat);`\n\nNow we can construct the actual `AudioRecord` object.\n\n\
    `AudioRecord audioRecord = new AudioRecord(audioSource, sampleRateInHz, channelConfig,\
    \ audioFormat, bufferSizeInBytes);`\n\nThe `AudioRecord` class doesn't actually\
    \ save the captured audio anywhere. We need to do that manually as the audio comes\
    \ in. The first thing we'll probably want to do is record it to a file. To do\
    \ that, we'll need to create a file.\n\n```\nFile recordingFile;\nFile path =\
    \ new File(Environment.getExternalStorageDirectory()\n    .getAbsolutePath() +\
    \ \"/Android/data/com.apress.proandroidmedia.ch07.altaudiorecorder/files/\");\n\
    path.mkdirs();\ntry {\n    recordingFile = File.createTempFile(\"recording\",\
    \ \".pcm\", path);\n} catch (IOException e1) {\n    throw new RuntimeException(\"\
    Couldn't create file on SD card\", e);\n}\n```\n\nNext we create an `OutputStream`\
    \ to that file, specifically one wrapped in a `BufferedOutputStream` and a `DataOutputStream`\
    \ for performance and convenience reasons.\n\n```\nDataOutputStream dos = new\
    \ DataOutputStream(new BufferedOutputStream(new FileOutputStream(recordingFile)));\n\
    ```\n\nNow we can start the capture and write the audio samples to the file. We'll\
    \ use an array of shorts to hold the audio we read from the `AudioRecord` object.\
    \ We'll make the array smaller than the buffer that the `AudioRecord` object has\
    \ so that buffer won't fill up before we read it out. To make sure this array\
    \ is smaller than the buffer size, we divide by 4. The size of the buffer is in\
    \ bytes and each short takes up 2 bytes, so dividing by 2 won't be enough. Dividing\
    \ by 4 will make it so that this array is half the size of the `AudioRecord` object's\
    \ internal buffer.\n\n`short[] buffer = new short[bufferSize/4];`\n\nWe simply\
    \ call the `startRecording` method on the `AudioRecord` object to kick things\
    \ off.\n\n`audioRecord.startRecording();`\n\nAfter recording has started, we can\
    \ construct a loop to continuously read from the `AudioRecord` object into our\
    \ array of shorts and write that to the `DataOutputStream` for the file.\n\n```\n\
    while (true) {\n    int bufferReadResult = audioRecord.read(buffer, 0, bufferSize/4);\n\
    \    for (int i = 0; i < bufferReadResult; i++) {\n        dos.writeShort(buffer[i]);\n\
    \    }\n}\naudioRecord.stop();\ndos.close();\n```\n\nWhen we are done, we call\
    \ `stop` on the `AudioRecord` object and `close` on the `DataOutputStream`."
