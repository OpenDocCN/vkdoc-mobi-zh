    ## Summary


    Throughout this chapter, we have learned that even though Android is primarily
    an operating system for devices that are constrained by size, memory, and processor
    power, it provides support for fairly sophisticated image processing. We covered
    many of the capabilities for processing existing images, but our exploration of
    imaging capabilities doesn’t end here. In the next chapter, we’ll look at some
    of the APIs that allow us to create images from scratch and do further manipulation
    while harnessing other sensors such as touchscreens.


    # Chapter 4: Graphics and Touch Events


    Thus far we have explored how we can capture and manipulate photographic images.
    Of course, that isn’t all that Android has to offer in terms of images. In this
    chapter, we’ll change up a bit and look at how we can create images by drawing
    graphical elements and textual elements on a `Canvas`. Related to this, we’ll
    explore the capabilities provided by Android for working with touchscreens. In
    particular we’ll build a touchscreen drawing application.


    ## Canvas Drawing


    We know from the last chapter that we can draw `Bitmap` images on a `Canvas` object.
    That’s not it for the `Canvas` class in Android, though. It also supports vector
    and text drawing. We can use a `Canvas` object either with `Bitmap` objects, as
    we did in the last chapter, or with `Views`. To start, we’ll use a `Canvas` to
    create or alter a `Bitmap` and then move on to doing some very simple `Canvas`-based
    animation using a `View`.


    ### Bitmap Creation


    In the same manner we used previously, we can construct a `Canvas` object from
    a mutable `Bitmap`. To create a mutable `Bitmap`, a `Bitmap` that can be modified,
    we have to supply a width, a height, and a configuration. The configuration is
    generally a constant value defined in the `Bitmap.Config` class.


    The following snippet of code creates a mutable `Bitmap` object with the dimensions
    of the display for the width and height and the `Bitmap.Config.ARGB_8888` constant
    as the configuration.


    ```java

    Bitmap bitmap = Bitmap.createBitmap((int)

    getWindowManager().getDefaultDisplay().getWidth(), (int)

    getWindowManager().getDefaultDisplay().getHeight(), Bitmap.Config.ARGB_8888);

    ```


    ### Bitmap Configuration


    The `ARGB_8888` configuration constant defines that the bitmap will be created
    with 8 bits of memory per color, 8 bits for the “A” or alpha channel, 8 bits for
    the “R” or red channel, 8 bits for the “G” or green channel, and 8 bits for the
    “B” or blue channel. This means that each pixel of the image will be represented
    by values between 0 and 255 for each color, including alpha. This means that each
    pixel will be represented by 32 bits and the total number of distinct colors that
    can be represented is more than 16.7 million.


    Other configuration constants are available that use less memory and are therefore
    faster to process at the expense of image quality.


    - `ALPHA_8`: Used for `Bitmap`s that function as alpha masks, 8 bits on alpha
    channel only. No other colors.

    - `ARGB_4444`: 4 bits per color channel including alpha. Allows for 4096 unique
    colors with 16 alpha values. Figure 4–1 illustrates this setting using a rainbow
    gradient.

    - `ARGB_8888`: 8 bits per color channel including alpha. Allows for 16.7 million
    unique colors with 256 alpha values. Figure 4–2 illustrates this setting using
    a rainbow gradient.

    - `RGB_565`: 5 bits for the red channel, 6 bits for green, and 5 for blue (no
    alpha). Allows for 65,535 distinct colors. As Figure 4–3 illustrates, this setting
    is almost as high-quality as `ARGB_8888` but takes up much less memory space.


    **Figure 4–1.** *Rainbow gradient displayed on `Bitmap` in `ARGB_4444` mode; notice
    the banding in the dark blue to light blue and yellow to orange portions. `ARGB_4444`
    can’t represent the required colors to make those transitions smooth.*


    **Figure 4–2.** *Rainbow gradient displayed on `Bitmap` in `ARGB_8888` mode*


    **Figure 4–3.** *Rainbow gradient displayed on `Bitmap` in `RGB_565` mode*


    ### Creating the Canvas


    Now that we have the `Bitmap` image that we’ll be drawing into created, we need
    to create the `Canvas` object that we’ll be using to actually draw. To do this,
    we simply construct a `Canvas` object by passing in our new `Bitmap` object.


    ```java

    Bitmap bitmap = Bitmap.createBitmap((int)

    getWindowManager().getDefaultDisplay().getWidth(), (int)

    getWindowManager().getDefaultDisplay().getHeight(), Bitmap.Config.ARGB_8888);

    Canvas canvas = new Canvas(bitmap);

    ```


    ### Working with Paint


    Before we can do any drawing, we need to construct a `Paint` object. The `Paint`
    object will allow us to define the color, size of the stroke, and style of the
    stroke used when drawing. We can therefore think of the `Paint` as both paint
    and brush.


    ```java

    Paint paint = new Paint();

    paint.setColor(Color.GREEN);

    paint.setStyle(Paint.Style.STROKE);

    paint.setStrokeWidth(10);

    ```


    The foregoing snippet of code creates a `Paint` object, sets its color to be green,
    defines that we want to draw the outline of shapes rather than fill them in, and
    sets the width of that stroke to be 10 pixels.


    Let’s examine each of these methods individually.


    #### Color


    Using the `setColor` method on the `Paint` object, we can pass in a `Color` object.
    The `Color` class defines a series of colors represented as 32-bit integers as
    constants:


    - `Color.BLACK`

    - `Color.BLUE`

    - `Color.RED`


    For the complete list, you can refer to the online reference for the `Color` class
    at [http://developer.android.com/reference/android/graphics/Color.html](http://developer.android.com/reference/android/graphics/Color.html).


    ```java

    Paint paint = new Paint();

    paint.setColor(Color.GREEN);

    ```


    We can also construct a specific color by calling the static method `Color.argb`,
    passing in a value between 0 and 255 for alpha, red, green, and blue. This method
    returns a 32-bit integer representing that color that we then pass to `setColor`.


    ```java

    Paint paint = new Paint();

    int myColor = Color.argb(255,128,64,32);

    paint.setColor(myColor);

    ```


    We can actually skip the color creation step completely if we are defining the
    exact values:


    ```java

    Paint paint = new Paint();

    paint.setARGB(255,128,64,32);

    ```


    #### Style


    When defining the style of the paint through the `setStyle` method, we are determining
    whether the shapes drawn will be filled or simply outlined. The possible styles
    are defined as constants in the `Paint.Style` class.


    - `Paint.Style.STROKE`: Only draw the outline of the shapes

    - `Paint.Style.FILL`: Only fill the shapes

    - `Paint.Style.FILL_AND_STROKE`: Fill and draw the outline of the shapes


    #### Stroke Width


    Last, we can use the `setStrokeWidth` method on the `Paint` object to specify
    the width of the stroke that will be used when outlining the shapes. Setting a
    value of 0 will still yield a 1-pixel stroke. To remove the stroke altogether,
    the `setStyle` method should be used, passing in `Paint.Style.FILL`.


    ### Drawing Shapes


    The `Canvas` class defines several drawing methods. Let’s go through a couple
    of these.


    #### Point


    The simplest of these is simply drawing a point. To draw a point, we use the `drawPoint`
    method on the `Canvas` object, passing in the x and y position as well as a `Paint`
    object.


    ```java

    canvas.drawPoint(199,201,paint);

    ```


    The size of the point that is drawn is dependent on the stroke width of the `Paint`
    object. The following code will render as shown in Figure 4–4.


    ```java

    Paint paint = new Paint();

    paint.setColor(Color.GREEN);

    paint.setStrokeWidth(100);

    canvas.drawPoint(199,201,paint);

    ```'
