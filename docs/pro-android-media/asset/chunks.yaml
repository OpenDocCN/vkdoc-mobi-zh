    [Uri.parse("file:///sdcard/myfavoritepicture.jpg");](file:///sdcard/myfavoritepicture.jpg)


    In practice, though, using the method shown will be more device-independent and
    future-proof should the SD card–naming conventions or the URI syntax for the local
    filesystem change.


    **Displaying Large Images**


    Loading and displaying an image has significant memory usage implications. For


    instance, the HTC G1 phone has a 3.2-megapixel camera. A 3.2-megapixel camera


    typically captures images at 2048 pixels by 1536 pixels. Displaying a 32-bit image
    of that size would take more than100663kb or approximately 13MB of memory. While
    this


    may not guarantee that our application will run out of memory, it will certainly
    make it more likely.


    Android offers us a utility class called BitmapFactory, which provides a series
    of static methods that allow the loading of Bitmap images from a variety of sources.
    For our


    needs, we’ll be loading it from a file to display in our original activity. Fortunately,
    the methods available in BitmapFactory take in a BitmapFactory.Options class,
    which


    allows us to define how the Bitmap is read into memory. Specifically, we can set
    the sample size that the BitmapFactory should use when loading an image. Indicating
    the inSampleSize parameter in BitmapFactory.Options indicates that the resulting
    Bitmap image will be that fraction of the size once loaded. For instance, setting
    the


    inSampleSize to 8 as I do here would yield an image that is 1/8 the size of the
    original image.


    BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();


    bmpFactoryOptions.inSampleSize = 8;


    Bitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);


    imv.setImageBitmap(bmp);


    This is a quick way to load up a large image but doesn’t really take into account
    the image’s original size nor the size of the screen. It would be better if we
    scaled the image to something that would fit nicely on our screen.


    The segments of code that follow illustrate how to use the dimensions of the display
    to determine the amount of down sampling that should occur when loading the image.


    When we use these methods, the image is assured of filling the bounds of the display
    as much as possible. If, however, the image is only going to be shown at 100 pixels
    in any one dimension, that value should be used instead of the display dimensions,
    which we obtain as follows.


    **CHAPTER 1: Introduction to Android Imaging**


    **7**


    Display currentDisplay = getWindowManager().getDefaultDisplay();


    int dw = currentDisplay.getWidth();


    int dh = currentDisplay.getHeight();


    To determine the overall dimensions of the image, which are needed for the calculation,
    we use the BitmapFactory and BitmapFactory.Options with the


    BitmapFactory.Options.inJustDecodeBounds variable set to true. This tells the


    BitmapFactory class to just give us the bounds of the image rather than attempting
    to decode the image itself. When we use this method, the


    BitmapFactory.Options.outHeight and BitmapFactory.Options.outWidth variables are


    filled in.


    // Load up the image''s dimensions not the image itself


    BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();


    bmpFactoryOptions.inJustDecodeBounds = true;


    Bitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);


    int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);


    int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);


    Log.v("HEIGHTRATIO",""+heightRatio);


    Log.v("WIDTHRATIO",""+widthRatio);


    Simple division of the dimensions of the image by the dimensions of the display
    tells us the ratio. We can then choose whether to use the height ratio or the
    width ratio,


    depending on which is greater. Simply using that ratio as the


    BitmapFactory.Options.inSampleSize variable will yield an image that should be
    loaded into memory with dimensions close to the same dimensions that we need—in
    this case, close to the dimensions of the display itself.


    // If both of the ratios are greater than 1,


    // one of the sides of the image is greater than the screen


    if (heightRatio > 1 && widthRatio > 1)


    {


    if (heightRatio > widthRatio)


    {


    // Height ratio is larger, scale according to it


    bmpFactoryOptions.inSampleSize = heightRatio;


    }


    else


    {


    // Width ratio is larger, scale according to it


    bmpFactoryOptions.inSampleSize = widthRatio;


    }


    }


    // Decode it for real


    bmpFactoryOptions.inJustDecodeBounds = false;


    bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);


    Here is the code for a full example that uses the built-in camera via an intent
    and displays the resulting picture. Figure 1–3 shows a resulting screen sized
    image as


    generated by this example.


