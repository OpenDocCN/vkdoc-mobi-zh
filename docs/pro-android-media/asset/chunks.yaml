    # 第 6 章：后台与网络音频


    ```

    public void onCreate() {

    Log.v("PLAYERSERVICE","onCreate");

    ```


    在`onCreate`方法中，我们实例化了`MediaPlayer`。我们将一个对名为`goodmorningandroid.mp3`的音频文件的特定引用传递给它，该文件应放置在我们项目的原始资源（`res/raw`）目录中。如果该目录不存在，则应创建它。将音频文件放在该位置，使我们能够通过生成的`R`类中的常量`R.raw.goodmorningandroid`来引用它。关于将音频放置在原始资源目录中的更多细节，请参见第
    5 章的“创建自定义音频播放应用程序”一节。


    ```

    mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);

    ```


    我们还设置了我们的 Service（即这个类）作为`MediaPlayer`对象的`OnCompletionListener`。


    ```

    mediaPlayer.setOnCompletionListener(this);

    }

    ```


    当对此 Service 发出`startService`命令时，将触发`onStartCommand`方法。在此方法中，我们首先检查`MediaPlayer`对象是否已经在播放，因为该方法可能会被多次调用，如果它没有播放，我们就启动它。由于我们使用的是`onStartCommand`方法而不是`onStart`方法，因此此示例仅在
    Android 2.0 及以上版本中运行。


    ```

    @Override

    public int onStartCommand(Intent intent, int flags, int startId) {

    Log.v("PLAYERSERVICE","onStartCommand");

    if (!mediaPlayer.isPlaying()) {

    mediaPlayer.start();

    }

    return START_STICKY;

    }

    ```


    当 Service 被销毁时，会触发`onDestroy`方法。由于这并不能保证`MediaPlayer`会停止播放，因此如果它正在播放，我们在此处调用其`stop`方法，并调用其`release`方法以释放所有内存占用和/或资源锁。


    ```

    public void onDestroy() {

    if (mediaPlayer.isPlaying())

    {

    mediaPlayer.stop();

    }

    mediaPlayer.release();

    Log.v("SIMPLESERVICE","onDestroy");

    }

    ```


    由于我们实现了`OnCompletionListener`，并且 Service 本身被设置为`MediaPlayer`的`OnCompletionListener`，因此当`MediaPlayer`播放完一个音频文件时，会调用下面的`onCompletion`方法。由于此
    Service 仅用于播放一首歌曲，因此我们调用`stopSelf`，这类似于在我们的 Activity 中调用`stopService`。


    ```

    public void onCompletion(MediaPlayer _mediaPlayer) {

    stopSelf();

    }

    }

    ```


