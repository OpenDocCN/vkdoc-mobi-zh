    public void onClick(View v) {

    if (v == startPlaybackButton) {

    startService(playbackServiceIntent);

    finish();

    } else if (v == stopPlaybackButton) {

    stopService(playbackServiceIntent);

    finish();

    }

    }

    }

    ```


