  trans: "\n# 第 2 章：构建自定义相机应用\n\n此外，我们还需要告诉相机预览界面的 `SurfaceView` 对象 `cameraView`，使其也按照该尺寸显示。如果不这样做，`SurfaceView`\
    \ 将不会更改尺寸，相机预览图像会出现变形或画质极低的情况。\n\n```\nif (bestHeight != 0 && bestWidth != 0)\
    \ {\n    Log.v(\"SNAPSHOT\", \"Using \" + bestWidth + \" x \" + bestHeight);\n\
    \    parameters.setPreviewSize(bestWidth, bestHeight);\n    cameraView.setLayoutParams(new\
    \ LinearLayout.LayoutParams(bestWidth, bestHeight));\n}\n```\n\n```\ncamera.setParameters(parameters);\n\
    ```\n\n设置完参数后，剩下要做的就是关闭 `surfaceCreated` 方法。\n\n```\n} catch (IOException exception)\
    \ {\n    camera.release();\n}\n```\n\n**图 2–4.** 预览尺寸较小的相机预览画面\n\n## 拍摄并保存图像\n\
    \n要使用 `Camera` 类拍摄图像，我们必须调用 `takePicture` 方法。该方法需要三个或四个参数，它们都是 `Callback` 方法。`takePicture`\
    \ 方法最简单的形式是将所有参数都设为 `null`。\n\n遗憾的是，虽然可以拍摄照片，但无法获得对其的任何引用。因此，至少应实现其中一个回调方法。最安全的是\
    \ `Camera.PictureCallback.onPictureTaken`。该方法保证会被调用，并且会在压缩图像可用时被调用。为了利用这一点，我们将让\
    \ Activity 实现 `Camera.PictureCallback` 并添加一个 `onPictureTaken` 方法。\n\n```\npublic\
    \ class SnapShot extends Activity implements\n    SurfaceHolder.Callback, Camera.PictureCallback\
    \ {\n    public void onPictureTaken(byte[] data, Camera camera) {\n    }\n}\n\
    ```\n\n**第 2 章：构建自定义相机应用** **33**\n\n`onPictureTaken` 方法有两个参数；第一个是实际 JPEG 图像数据的字节数组。第二个是对拍摄图像的\
    \ `Camera` 对象的引用。\n\n由于我们获得了实际的 JPEG 数据，因此只需将其写入磁盘上的某个位置即可保存。众所周知，利用 `MediaStore`\
    \ 来指定其位置和元数据是一个好主意。\n\n当我们的 `onPictureTaken` 方法被调用时，我们可以调用 `Camera` 对象的 `startPreview`\
    \ 方法。当调用 `takePicture` 方法时，预览已自动暂停，而该方法表明现在可以安全地重新启动预览。\n\n```\npublic void onPictureTaken(byte[]\
    \ data, Camera camera) {\n    Uri imageFileUri = getContentResolver().insert(\n\
    \        Media.EXTERNAL_CONTENT_URI, new ContentValues());\n    try {\n      \
    \  OutputStream imageFileOS = getContentResolver()\n            .openOutputStream(imageFileUri);\n\
    \        imageFileOS.write(data);\n        imageFileOS.flush();\n        imageFileOS.close();\n\
    \    } catch (FileNotFoundException e) {\n    } catch (IOException e) {\n    }\n\
    \    camera.startPreview();\n}\n```\n\n在上述代码片段中，我们向 `MediaStore` 插入了一条新记录，并返回了一个\
    \ URI。我们可以随后使用这个 URI 获取一个 `OutputStream`，用于写入 JPEG 数据。这会在 `MediaStore` 指定的位置创建一个文件，并将其链接到新记录。\n\
    \n如果我们希望稍后更新存储在 `MediaStore` 记录中的元数据，可以按照第 1 章所述，使用新的 `ContentValues` 对象来更新记录。\n\
    \n```\nContentValues contentValues = new ContentValues(3);\ncontentValues.put(Media.DISPLAY_NAME,\
    \ \"This is a test title\");\ncontentValues.put(Media.DESCRIPTION, \"This is a\
    \ test description\");\ngetContentResolver().update(imageFileUri, contentValues,\
    \ null, null);\n```\n\n最后，我们需要实际调用 `Camera.takePicture`。为此，我们让预览屏幕变得“可点击”，并在 `onClick`\
    \ 方法中拍照。\n\n我们将让 Activity 实现 `OnClickListener`，并将 `SurfaceView` 的 `onClickListener`\
    \ 设置为 Activity 本身。然后，我们使用 `setClickable(true)` 让 `SurfaceView` 变得“可点击”。此外，我们还需要使\
    \ `SurfaceView` 变得“可获得焦点”。默认情况下，`SurfaceView` 不可获得焦点，因此我们必须使用 `setFocusable(true)`\
    \ 进行显式设置。同样，在“触摸模式”下，焦点通常被禁用，因此我们还需要使用 `setFocusInTouchMode(true)` 显式地避免这种情况。\n\
    \n```\npublic class SnapShot extends Activity implements OnClickListener,\n  \
    \  SurfaceHolder.Callback, Camera.PictureCallback {\n    ...\n}\n```\n\n**34**\n"
- fmt: "# CHAPTER 2: Building Custom Camera Applications\n\n`public void onCreate(Bundle\
    \ savedInstanceState) {`\n\n```\n...\n\ncameraView.setFocusable(true);\n\ncameraView.setFocusableInTouchMode(true);\n\
    \ncameraView.setClickable(true);\n\ncameraView.setOnClickListener(this);\n\n}\n\
    ```\n\n`public void onClick(View v) {`\n\n```\ncamera.takePicture(null, null,\
    \ null, this);\n```\n\n`}`\n\n## Other Camera Callback Methods\n\nAside from `Camera.PictureCallback`,\
    \ there are a few others that are worth mentioning.\n\n`Camera.PreviewCallback`:\
    \ Defines a method, `onPreviewFrame(byte[] data, Camera camera)`, which is called\
    \ when preview frames are available. A byte array that holds the current pixels\
    \ of the image may be passed in. There are three different ways that this callback\
    \ can be used on a `Camera` object.\n\n- `setPreviewCallback(Camera.PreviewCallback)`:\
    \ Registering a `Camera.PreviewCallback` with this method ensures that the `onPreviewFrame`\
    \ method is called whenever a new preview frame is available and displayed on\
    \ the screen. The data byte array that is passed into the `onPreviewFrame` method\
    \ will most likely be in YUV format. Unfortunately Android 2.2 is the first version\
    \ to have a YUV format decoder (`YuvImage`); in previous versions, decoding has\
    \ to be done by hand.\n\n- `setOneShotPreviewCallback(Camera.PreviewCallback)`:\
    \ Registering a `Camera.PreviewCallback` with this method on the `Camera` object\
    \ causes the `onPreviewFrame` to be called once, when the next preview image is\
    \ available. Again, the preview image data passed to the `onPreviewFrame` method\
    \ will most likely be in the YUV format. This can be determined by checking the\
    \ result of `Camera.getParameters().getPreviewFormat()` with the constants in\
    \ `ImageFormat`.\n\n- `setPreviewCallbackWithBuffer(Camera.PreviewCallback)`:\
    \ Introduced in Android 2.2, this method works in the same manner as the normal\
    \ `setPreviewCallback` but requires us to specify a byte array that will be used\
    \ as a buffer for the preview image data. This is done to allow us the ability\
    \ to better manage the memory that will be used when dealing with preview images.\n\
    \n`Camera.AutoFocusCallback`: Defines a method, `onAutoFocus`, which is called\
    \ when an auto-focus activity has completed. Auto-focus may be triggered by calling\
    \ the `autoFocus` method on the `Camera` object, passing in an instance of this\
    \ callback interface.\n\n`Camera.ErrorCallback`: Defines an `onError` method,\
    \ which is called when a `Camera` error occurs. There are two constants that can\
    \ be compared with the passed-in error code: `CAMERA_ERROR_UNKNOWN` and `CAMERA_ERROR_SERVER_DIED`.\n\
    \n`Camera.OnZoomChangeListener`: Defines a method, `onZoomChange`, which is called\
    \ when a \"smooth zoom\" (slow zoom in or out) is in progress or completed. This\
    \ class and method were introduced in Android 2.2 (API level 8).\n\n`Camera.ShutterCallback`:\
    \ Defines a method, `onShutter`, which is called at the moment an image is captured.\n\
    \n## Putting It All Together\n\nLet's go through the entire example. The following\
    \ code is written to run on Android 2.2 and higher, but with minor changes, it\
    \ should run on versions 1.6 and higher. The sections that require higher than\
    \ 1.6 are noted with comments.\n\n```\npackage com.apress.proandroidmedia.ch2.snapshot;\n\
    \nimport java.io.FileNotFoundException;\nimport java.io.IOException;\nimport java.io.OutputStream;\n\
    import java.util.Iterator;\nimport java.util.List;\n\nimport android.app.Activity;\n\
    import android.content.ContentValues;\nimport android.content.res.Configuration;\n\
    import android.hardware.Camera;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.provider.MediaStore.Images.Media;\nimport android.util.Log;\nimport\
    \ android.view.SurfaceHolder;\nimport android.view.SurfaceView;\nimport android.view.View;\n\
    import android.view.View.OnClickListener;\nimport android.widget.Toast;\n\npublic\
    \ class SnapShot extends Activity implements OnClickListener,\n    SurfaceHolder.Callback,\
    \ Camera.PictureCallback {\n\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
    \    Camera camera;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n   \
    \     surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n\n        cameraView.setFocusable(true);\n\
    \        cameraView.setFocusableInTouchMode(true);\n        cameraView.setClickable(true);\n\
    \        cameraView.setOnClickListener(this);\n    }\n\n    public void onClick(View\
    \ v) {\n        camera.takePicture(null, null, this);\n    }\n```\n\nWe follow\
    \ this up with the `onPictureTaken` method as described earlier.\n\n```\n    public\
    \ void onPictureTaken(byte[] data, Camera camera) {\n        Uri imageFileUri\
    \ =\n                getContentResolver().insert(Media.EXTERNAL_CONTENT_URI, new\
    \ ContentValues());\n\n        try {\n            OutputStream imageFileOS =\n\
    \                    getContentResolver().openOutputStream(imageFileUri);\n  \
    \          imageFileOS.write(data);\n            imageFileOS.flush();\n      \
    \      imageFileOS.close();\n        } catch (FileNotFoundException e) {\n   \
    \         Toast t = Toast.makeText(this, e.getMessage(), Toast.LENGTH_SHORT);\n\
    \            t.show();\n        } catch (IOException e) {\n            Toast t\
    \ = Toast.makeText(this, e.getMessage(), Toast.LENGTH_SHORT);\n            t.show();\n\
    \        }\n\n        camera.startPreview();\n    }\n```\n\nLast, we need the\
    \ various `SurfaceHolder.Callback` methods in which we set up the `Camera` object.\n\
    \n```\n    public void surfaceChanged(SurfaceHolder holder, int format, int w,\
    \ int h) {\n        camera.startPreview();\n    }\n\n    public void surfaceCreated(SurfaceHolder\
    \ holder) {\n        camera = Camera.open();\n\n        try {\n            camera.setPreviewDisplay(holder);\n\
    \            Camera.Parameters parameters = camera.getParameters();\n\n      \
    \      if (this.getResources().getConfiguration().orientation !=\n           \
    \         Configuration.ORIENTATION_LANDSCAPE) {\n                parameters.set(\"\
    orientation\", \"portrait\");\n                // For Android Version 2.2 and\
    \ above\n                camera.setDisplayOrientation(90);\n                //\
    \ For Android Version 2.0 and above\n                parameters.setRotation(90);\n\
    \            }\n\n            // Effects are for Android Version 2.0 and higher\n\
    \            List<String> colorEffects = parameters.getSupportedColorEffects();\n\
    \            Iterator<String> cei = colorEffects.iterator();\n\n            while\
    \ (cei.hasNext()) {\n                String currentEffect = cei.next();\n    \
    \            if (currentEffect.equals(Camera.Parameters.EFFECT_SOLARIZE)) {\n\
    \                    parameters.setColorEffect(Camera.Parameters.EFFECT_SOLARIZE);\n\
    \                    break;\n                }\n            }\n            //\
    \ End Effects for Android Version 2.0 and higher\n\n            camera.setParameters(parameters);\n\
    \        } catch (IOException exception) {\n            camera.release();\n  \
    \      }\n    }\n\n    public void surfaceDestroyed(SurfaceHolder holder) {\n\
    \        camera.stopPreview();\n        camera.release();\n    }\n\n} // End the\
    \ Activity\n```\n\nThat takes care of our `SnapShot` activity. Here is the layout\
    \ XML that is in use by it. It belongs in `res/layout/main.xml`.\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n\n    <SurfaceView\n        android:id=\"\
    @+id/CameraView\"\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
    fill_parent\" />\n\n</LinearLayout>\n```\n\nLast, we need to add the `CAMERA`\
    \ permission to our `AndroidManifest.xml` file. Here is the entire manifest.\n\
    \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.proandroidmedia.ch2.snapshot\"\
    \n    android:versionCode=\"1\"\n    android:versionName=\"1.0\">\n\n    <application\n\
    \        android:icon=\"@drawable/icon\"\n        android:label=\"@string/app_name\"\
    >\n        <activity\n            android:name=\".SnapShot\"\n            android:label=\"\
    @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
    android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n            </intent-filter>\n        </activity>\n    </application>\n\n\
    </manifest>\n```"
