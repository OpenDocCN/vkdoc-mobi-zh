  trans: "\n# 第 9 章：视频简介\n\n`finish();`\n\n```\ncurrentDisplay = getWindowManager().getDefaultDisplay();\n\
    ```\n\n由于我们的活动实现了 `SurfaceHolder.Callback` 并已被指定为回调监听器，因此以下三个方法将被触发。\n\n当 `SurfaceView`\
    \ 底层的 `Surface` 被创建时，将调用 `surfaceCreated`。\n\n```\npublic void surfaceCreated(SurfaceHolder\
    \ holder) {\n    Log.v(LOGTAG,\"surfaceCreated Called\");\n```\n\n当 `Surface`\
    \ 创建完成后，我们可以通过调用 `MediaPlayer` 的 `setDisplay` 方法，并传入 `SurfaceHolder` 对象，来指定 `MediaPlayer`\
    \ 使用该 `Surface` 进行播放。\n\n```\nmediaPlayer.setDisplay(holder);\n```\n\n最后，在指定 `Surface`\
    \ 之后，我们可以调用 `prepare`。`prepare` 方法是阻塞式的，不会在后台执行工作。为了让它能在后台执行工作，从而不占用应用程序资源，我们可以改用\
    \ `prepareAsync`。无论使用哪种方式，由于我们实现了 `OnPreparedListener` 并且我们的活动被设置为监听器，因此当准备就绪时，我们的\
    \ `onPrepared` 方法将被调用。\n\n`prepare` 方法可能会抛出我们需要处理的几种异常。为简洁起见，我们仅记录错误并退出。在你的应用程序中，你可能需要妥善地处理这些异常。\n\
    \n```\ntry {\n    mediaPlayer.prepare();\n} catch (IllegalStateException e) {\n\
    \    Log.v(LOGTAG,e.getMessage());\n    finish();\n} catch (IOException e) {\n\
    \    Log.v(LOGTAG,e.getMessage());\n    finish();\n}\n```\n\n当 `SurfaceView` 底层的\
    \ `Surface` 的宽度、高度或其他参数发生变化时，将调用 `surfaceChanged`。在这个例子中，我们不需要对此进行任何处理。\n\n```\n\
    public void surfaceChanged(SurfaceHolder holder, int format, int width, int height){\n\
    \    Log.v(LOGTAG,\"surfaceChanged Called\");\n}\n```\n\n当我们的 `SurfaceView` 底层的\
    \ `Surface` 被销毁时，将调用 `surfaceDestroyed`。在这个例子中，我们对此不进行任何处理。\n\n```\npublic void\
    \ surfaceDestroyed(SurfaceHolder holder) {\n    Log.v(LOGTAG,\"surfaceDestroyed\
    \ Called\");\n}\n```\n\n由于我们实现了 `MediaPlayer.OnCompletionListener` 并注册了自身作为监听器，因此当\
    \ `MediaPlayer` 播放完一个文件时，我们的 `onCompletion` 方法将被调用。我们可以利用这一点来加载另一个视频或执行其他操作，例如加载另一个屏幕。在这个例子中，我们只需退出。\n\
    \n```\npublic void onCompletion(MediaPlayer mp) {\n    Log.v(LOGTAG,\"onCompletion\
    \ Called\");\n    finish();\n}\n```\n\n我们的活动实现了 `MediaPlayer.OnErrorListener`，并且它被注册为\
    \ `MediaPlayer` 对象的错误监听器，因此当发生错误时，将调用下面的 `onError` 方法。遗憾的是，可用的错误信息并不多，只有如下所示的两个常量。\n\
    \n```\npublic boolean onError(MediaPlayer mp, int whatError, int extra) {\n  \
    \  Log.v(LOGTAG,\"onError Called\");\n    if (whatError == MediaPlayer.MEDIA_ERROR_SERVER_DIED)\
    \ {\n        Log.v(LOGTAG,\"Media Error, Server Died \" + extra);\n    } else\
    \ if (whatError == MediaPlayer.MEDIA_ERROR_UNKNOWN) {\n        Log.v(LOGTAG,\"\
    Media Error, Error Unknown \" + extra);\n    }\n```\n\n从该方法返回 `false` 表示错误未被处理。如果已注册\
    \ `OnCompletionListener`，则会调用其 `onCompletion` 方法。`MediaPlayer` 对象将进入“错误”状态。可以通过调用\
    \ `reset` 方法将其恢复为“空闲”状态。\n\n```\nreturn false;\n}\n```\n\n`OnInfoListener` 中指定的\
    \ `onInfo` 方法在媒体播放的相关特定信息可用或需要发出警告时被调用。\n\n```\npublic boolean onInfo(MediaPlayer\
    \ mp, int whatInfo, int extra) {\n    if (whatInfo == MediaPlayer.MEDIA_INFO_BAD_INTERLEAVING)\
    \ {\n```\n\n如果文件中的音频和视频数据没有正确交错，则会触发此事件。一个正确交错的媒体文件，其音频和视频样本会按照使播放高效流畅的顺序排列。\n\
    \n```\nLog.v(LOGTAG,\"Media Info, Media Info Bad Interleaving \" + extra);\n \
    \   } else if (whatInfo == MediaPlayer.MEDIA_INFO_NOT_SEEKABLE) {\n```\n\n如果媒体无法进行定位（这意味着它可能是一个直播流），则会触发此事件。\n\
    \n```\nLog.v(LOGTAG,\"Media Info, Media Info Not Seekable \" + extra);\n    }\
    \ else if (whatInfo == MediaPlayer.MEDIA_INFO_UNKNOWN) {\n```\n\n这很好理解，即信息未明确指定或未知。\n\
    \n```\nLog.v(LOGTAG,\"Media Info, Media Info Unknown \" + extra);\n    } else\
    \ if (whatInfo == MediaPlayer.MEDIA_INFO_VIDEO_TRACK_LAGGING) {\n```\n\n如果设备在播放视频时遇到问题，则会触发此事件。可能出现的情况是音频正常播放，但视频过于复杂或比特率过高。\n\
    \n```\nLog.v(LOGTAG,\"MediaInfo, Media Info Video Track Lagging \" + extra);\n\
    }\n"
