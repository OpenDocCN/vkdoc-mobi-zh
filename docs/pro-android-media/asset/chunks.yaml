    - `EFFECT_AQUA`\n\n类似地，抗条纹、闪光灯模式、对焦模式、场景模式和白平衡等也都有相应的常量。\n\n## 更改相机预览大小\n\n`Camera.Parameters`\
    \ 中另一个特别有用的设置是更改预览大小。与其他设置一样，我们首先需要查询参数对象以获取支持的值。获得尺寸列表后，我们可以遍历该列表，以确保我们想要的尺寸受支持，然后再进行设置。\n\
    \n在此示例中，我们并不指定确切的目标尺寸，而是选择一个接近但不超过几个常量的尺寸。图 2–4 显示了此示例的输出。\n\n```\n...\npublic\
    \ static final int LARGEST_WIDTH = 200;\npublic static final int LARGEST_HEIGHT=\
