  trans: "\n### 音频合成与分析\n\n在上一章的结尾，我们研究了一种通过 `AudioRecord` 和 `AudioTrack` 类来捕获原始 PCM\
    \ 音频并播放的方法。在本章中，我们将继续使用这些类，以算法的方式合成音频，并对录制的音频进行分析。\n\n### 数字音频合成\n\n数字音频合成是一个非常广泛的课题，背后涉及众多理论、数学、工程学知识以及历史渊源。遗憾的是，本书涵盖的范围有限，无法深入探讨该课题的大部分内容。我们将会做的是，研究一些基础示例，看看如何利用\
    \ Android 中的几个内置类从零开始创建音频。\n\n你可能知道，声音是由空气（或其他介质）中压力的重复性变化（以波的形式）形成的。这些振荡的特定频率（即声波）是可听见的，这意味着我们的耳朵对一定时间内的这些重复次数很敏感。这个范围大致在\
    \ 12 Hz（即每秒 12 个周期，非常低沉的声音，如隆隆声）到 20 kHz（即每秒 20,000 个周期，非常高音调的声音）之间。\n\n要创建音频，我们需要让空气以我们想要的声音频率振动。在数字领域，这通常通过一个由模拟电信号驱动的扬声器来实现。数字音频系统包含一个执行数模转换（DAC）的芯片或板卡。DAC\
    \ 接收一系列代表音频样本的数字形式的数据，并将其转换为电压，再由扬声器将电压转化为声音。\n\n为了合成音频，我们只需合成音频样本，并将其输入到相应的机制中。在\
    \ Android 中，这个机制就是 `AudioTrack` 类。\n\n### 第 8 章：音频合成与分析\n\n正如我们在上一章中学到的，`AudioTrack`\
    \ 类允许我们播放原始的音频样本（例如由 `AudioRecord` 类捕获的样本）。\n\n#### 播放合成声音\n\n以下是一个快速示例，展示如何构造一个\
    \ `AudioTrack` 类并传入数据进行播放。关于构造 `AudioTrack` 对象所用参数的详细讨论，请参阅第 7 章的“使用 AudioTrack\
    \ 进行原始音频播放”部分。\n\n此示例使用了一个继承自 `AsyncTask` 的内部类 `AudioSynthesisTask`。`AsyncTask`\
    \ 定义了一个名为 `doInBackground` 的方法，该方法会在一个与 Activity 主线程分离的线程中运行其内部的任何代码。这保证了 Activity\
    \ 及其 UI 的响应性，否则，为 `AudioTrack` 对象提供数据的 `write` 方法循环会阻塞主线程。\n\n```java\npackage\
    \ com.apress.proandroidmedia.ch08.audiosynthesis;\n\nimport android.app.Activity;\n\
    import android.media.AudioFormat;\nimport android.media.AudioManager;\nimport\
    \ android.media.AudioTrack;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    \npublic class AudioSynthesis extends Activity implements OnClickListener {\n\n\
    \    Button startSound;\n    Button endSound;\n    AudioSynthesisTask audioSynth;\n\
    \    boolean keepGoing = false;\n\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n        startSound = (Button) this.findViewById(R.id.StartSound);\n\
    \        startSound.setOnClickListener(this);\n        endSound = (Button) this.findViewById(R.id.EndSound);\n\
    \        endSound.setOnClickListener(this);\n        endSound.setEnabled(false);\n\
    \    }\n\n    @Override\n    public void onPause() {\n        super.onPause();\n\
    \        keepGoing = false;\n        endSound.setEnabled(false);\n        startSound.setEnabled(true);\n\
    \    }\n\n    public void onClick(View v) {\n        if (v == startSound) {\n\
    \            keepGoing = true;\n            audioSynth = new AudioSynthesisTask();\n\
    \            audioSynth.execute();\n            endSound.setEnabled(true);\n \
    \           startSound.setEnabled(false);\n        } else if (v == endSound) {\n\
    \            keepGoing = false;\n            endSound.setEnabled(false);\n   \
