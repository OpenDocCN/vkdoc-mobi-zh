    \ above example.\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\">\n    \n    <ImageView android:id=\"@+id/ReturnedImageView\" \n\
    \        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\" />\n    \n    <TextView android:layout_width=\"wrap_content\" \n\
    \        android:layout_height=\"wrap_content\"\n        android:text=\"Title:\"\
    \ \n        android:id=\"@+id/TitleTextView\" />\n    \n    <EditText android:layout_height=\"\
    wrap_content\" \n        android:id=\"@+id/TitleEditText\"\n        android:layout_width=\"\
    fill_parent\" />\n    \n    <TextView android:layout_width=\"wrap_content\" \n\
    \        android:layout_height=\"wrap_content\"\n        android:text=\"Description\"\
    \ \n        android:id=\"@+id/DescriptionTextView\" />\n    \n    <EditText android:layout_height=\"\
    wrap_content\" \n        android:layout_width=\"fill_parent\"\n        android:id=\"\
    @+id/DescriptionEditText\" />\n    \n    <Button android:layout_width=\"wrap_content\"\
    \ \n        android:layout_height=\"wrap_content\"\n        android:id=\"@+id/TakePictureButton\"\
    \ \n        android:text=\"Take Picture\" />\n    \n    <Button android:layout_width=\"\
    wrap_content\" \n        android:layout_height=\"wrap_content\"\n        android:id=\"\
    @+id/SaveDataButton\" \n        android:text=\"Save Data\" />\n</LinearLayout>\n\
    ```\n\nAs in previous examples, the `onActivityResult` method is triggered when\
    \ the Camera application returns. The newly created image is decoded into a `Bitmap`\
    \ and displayed. In this version, the relevant user interface elements are also\
    \ managed.\n\n## Retrieving Images Using the MediaStore\n\nOne example that shows\
    \ the power of using shared content providers on Android is the ease with which\
    \ we can use them to create something like a gallery application.\n\nBecause the\
    \ content provider, in this case the `MediaStore`, is shared between applications,\
    \ we don't need to actually create a camera application and a means to store images\
    \ in order to make our own application to view images. Since most applications\
    \ will use the default `MediaStore`, we can leverage that to build our own gallery\
    \ application.\n\nSelecting from the `MediaStore` is very straightforward. We\
    \ use the same URI that we used to create a new record, to select records from\
    \ it.\n\n`Media.EXTERNAL_CONTENT_URI`\n\nThe `MediaStore` and, in fact, all content\
    \ providers operate in a similar manner to a database. We select records from\
    \ them and are given a `Cursor` object, which we can use to iterate over the results.\n\
    \nIn order to do the selection in the first place, we need to create a string\
    \ array of the columns we would like returned. The standard columns for images\
    \ in the `MediaStore` are represented in the `MediaStore.Images.Media` class.\n\
    \n```\nString[] columns = { Media.DATA, Media._ID, Media.TITLE, Media.DISPLAY_NAME\
    \ };\n```\n\nTo perform the actual query, we can use the activity `managedQuery`\
    \ method. The first argument is the URI, followed by the array of column names,\
    \ followed by a limiting `WHERE` clause, any arguments for the `WHERE` clause,\
    \ and, lastly, an `ORDER BY` clause.\n\nThe following would select records that\
    \ were created within the last hour and order them oldest to most recent.\n\n\
    First we create a variable called `oneHourAgo`, which holds the number of seconds\
    \ elapsed from January 1, 1970 as of one hour ago. `System.currentTimeMillis()`\
    \ returns the number of milliseconds from the same date, so dividing by 1000 gives\
    \ us the number of seconds. If we subtract 60 minutes * 60 seconds, we'll get\
    \ the value as of one hour ago.\n\n```\nlong oneHourAgo = System.currentTimeMillis()/1000\
    \ - (60 * 60);\n```\n\nWe then place that value in an array of strings that we\
    \ can use as the arguments for the `WHERE` clause.\n\n```\nString[] whereValues\
    \ = {\"\"+oneHourAgo};\n```\n\nThen we choose the columns we want returned.\n\n\
    ```\nString[] columns = { Media.DATA, Media._ID, Media.TITLE, Media.DISPLAY_NAME,\n\
    \    Media.DATE_ADDED };\n```\n\nAnd finally we perform the query. The `WHERE`\
    \ clause has a `?`, which will get substituted with the value in the next parameter.\
    \ If there are multiple `?`, there must be multiple values in the array passed\
    \ in. The `ORDER BY` clause used here specifies that the data returned will be\
    \ ordered by the date added in ascending order.\n\n```\ncursor = managedQuery(Media.EXTERNAL_CONTENT_URI,\
    \ columns, Media.DATE_ADDED + \" > ?\",\n    whereValues, Media.DATE_ADDED + \"\
    \ ASC\");\n```\n\nYou can, of course, pass in `null` for the last three arguments\
    \ if you want all records returned.\n\n```\nCursor cursor = managedQuery(Media.EXTERNAL_CONTENT_URI,\
    \ columns, null, null, null);\n```\n\nThe cursor returned can tell us the index\
    \ of each of the columns as selected."
