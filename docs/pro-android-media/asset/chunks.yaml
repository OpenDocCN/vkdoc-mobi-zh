    SimpleXMLParser\",\"endElement\");\n}\n```\n\n每当在开始和结束标签之间找到文本时，就会调用`characters`方法。在我们的实现中，会根据`state`变量所表示的当前在文档中的位置，获取数据并将其放入`XMLUser`对象。\n\
    \n```\n@Override\npublic void characters(char[] ch, int start, int length) throws\
    \ SAXException {\n    String stringChars = new String(ch, start, length);\n  \
    \  Log.v(\"SimpleXMLParser\",stringChars);\n\n    if (state == ID) {\n       \
    \ aUser.user_id += stringChars.trim();\n        Log.v(\"SimpleXMLParser\",\"user_id:\"\
    +aUser.user_id);\n    } else if (state == FIRSTNAME) {\n        aUser.firstname\
    \ += stringChars.trim();\n        Log.v(\"SimpleXMLParser\",\"firstname:\"+aUser.firstname);\n\
    \    } else if (state == LASTNAME) {\n        aUser.lastname += stringChars.trim();\n\
    \        Log.v(\"SimpleXMLParser\",\"lastname:\"+aUser.lastname);\n    }\n}\n\
    ```\n\n以下是`XMLUser`类，我们用它来保存 XML 提供给我们的数据。\n\n```\nclass XMLUser {\n    String\
    \ user_id;\n    String firstname;\n    String lastname;\n\n    public XMLUser()\
    \ {\n        user_id = \"\";\n        firstname = \"\";\n        lastname = \"\
    \";\n    }\n}\n```\n\n通过这个快速示例，我们可以将其作为任何 XML 的模板。\n"
- fmt: '### Android 的解析需求


    在 Android 上，我们可能需要执行一些解析操作，包括处理从 Web 服务请求中收到的数据。


    ### HTTP 文件上传


    我们可能希望允许用户分发由我们开发的应用程序所创建的媒体内容，一种方式是将它们发布到在线视频分享网站，如 YouTube、Vimeo 或 Blip.TV。


    为了将文件发布到这类服务，我们需要执行 HTTP 文件上传。在 Android 上完成 HTTP 文件上传有几种方法。能给我们最大灵活性的方法是引入并使用
    Apache HTTP Components（[http://hc.apache.org/](http://hc.apache.org)）中的库，这些库并未随
    Android 完全打包。


    我们需要 `httpmime-4.0.x.jar`，它包含在可从 [http://hc.apache.org/downloads.cgi](http://hc.apache.org/downloads.cgi)
    下载的 `HttpClient 4.0.x (GA)` 包中。（版本号中的“x”当前为 3；当你下载时可能更高。）我们还需要 Apache Mime4J 0.6
    版本（`apache-mime4j-0.6.jar`）或更高版本，可从 [http://james.apache.org/download.cgi](http://james.apache.org/download.cgi)
    下载。


    在构建应用时，只需将这些文件拖入 Eclipse 项目中的项目文件夹，即可将它们引入你的 Eclipse 项目。然后我们需要在项目属性中编辑 Java 构建路径。要将它们包含在构建路径中，请前往
    Java 构建路径对话框中的库（Libraries）选项卡，选择“添加 JARs”，最后选中它们。


    通过导入上述库，我们获得了一个 `MultipartEntity`，它可以用于 `HttpClient` 使用的 `HttpPost` 请求中。`MultipartEntity`
    允许向服务器发送 multipart/form-data 类型的 POST 请求。这与浏览器从允许用户选择文件的表单进行上传时使用的机制相同。


    ### 发起 HTTP 请求


    下面是一个如何使用它的简要说明。


    首先，我们通过实例化 `DefaultHttpClient` 来创建一个 `HttpClient` 对象。


    ```

    HttpClient httpclient = new DefaultHttpClient();

    ```


    接着，我们创建一个 `HttpPost` 对象，它代表一个指向特定 URL 的 POST 请求，我们将该 URL 传入。


    ```

    HttpPost httppost = new HttpPost("http://webserver/file-upload-app");

    ```


    然后，我们可以实例化 `MultipartEntity`。如前述，这种类型的实体可以包含多个部分。


    ```

    MultipartEntity multipartentity = new MultipartEntity();

    ```


    我们需要的主要部分是要上传的实际文件。为此，我们使用 `addPart` 方法，传入一个字符串作为名称，以及一个 `FileBody` 对象作为值。这个 `FileBody`
    对象接收一个 `File` 对象，该对象代表我们想要上传的实际文件——在本例中，是 SD 卡根目录下的一个视频文件。


    ```

    multipartentity.addPart("file", new FileBody(new File("/sdcard/video_h264_640x480.mp4")));

    ```


    如果需要添加其他元素，如用户名、密码等，我们使用相同的 `addPart` 方法，传入名称和值。在这种情况下，值应该是一个包含实际字符串值的 `StringBody`
    对象。


    ```

    multipartentity.addPart("username", new StringBody("myusername"));

    multipartentity.addPart("password", new StringBody("mypassword"));

    multipartentity.addPart("title", new StringBody("A Title"));

    ```


    一旦我们的 `MultipartEntity` 设置完毕，我们通过调用 `setEntity` 方法将它传递给 `HttpPost` 对象。


    ```

    httppost.setEntity(multipartentity);

    ```


    现在我们可以执行请求并获取响应。


    ```

    HttpResponse httpresponse = httpclient.execute(httppost);

    HttpEntity responseentity = httpresponse.getEntity();

    ```


    我们可以通过调用所得到的 `HttpEntity` 上的 `getContent` 方法获取一个 `InputStream`，从而读取响应。


    ```

    InputStream inputstream = responseentity.getContent();

    ```'
  raw: 'parsing we might need to do on Android, including dealing with data that we
    may


    receive in response to a request to a web service.


    **HTTP File Uploads**


    One way that we may wish to al ow the user to distribute media that is created
    by


    applications we develop is to al ow them to be posted to online video sharing
    sites, such as YouTube, Vimeo, or Blip.TV.


    In order to post files to services such as these, we need to do an HTTP file upload.


    There are several ways we might accomplish an HTTP file upload on Android. The
    way


    that gives us the most flexibility is to involve importing and using libraries
    from Apache’s HTTP Components ([http://hc.apache.org/) th](http://hc.apache.org)at
    were not ful y included with Android.


    We’l need httpmime-4.0.x.jar, which is provided within the HttpClient 4.0.x (GA)


    download available at [http://hc.apache.org/downloads.cgi.](http://hc.apache.org/downloads.cgi)
    (The “x” in the version numbers is currently at 3; it may be higher when you go
    to download it.) We’l also need Apache Mime4J version 0.6 (apache-mime4j-0.6.jar)
    or higher, which is downloadable from [http://james.apache.org/download.cgi.](http://james.apache.org/download.cgi)


    When you build an application, you wil simply bring these files into your Eclipse
    project by dragging them onto the project folder in the Eclipse Package Explorer.
    We then have Download from Wow! eBook <www.wowebook.com>


    to edit the Java Build Path in the Project Properties. To include them in the
    build path, go to the Libraries tab in the Java Build Path dialog, select “Add
    JARs,” and final y select them.


    What we gained from importing the foregoing libraries is a MultipartEntity that
    can be used within an HttpPost request as used by HttpClient. MultipartEntity
    al ows for the making of multipart/form-data style posts to servers. This is the
    same mechanism used by browsers to do uploads from forms that al ow the user to
    select a file.


    **Making an HTTP Request**


    Here is a quick sketch of how to use it.


    First we’l create an HttpClient object by instantiating DefaultHttpClient.


    HttpClient httpclient = new DefaultHttpClient();


    Fol owing that, we’l create an HttpPost object that represents a POST request
    to a specific URL that we’l pass in.


    **CHAPTER 12: Media Consumption and Publishing Using Web Services** **279**


    [HttpPost httppost = new HttpPost("http://webserver/file-upload-app");](http://webserver/file-upload-app)


    Following that, we can instantiate our MultipartEntity. As just described, we
    can have multiple parts in this type of entity.


    MultipartEntity multipartentity = new MultipartEntity();


    The main part that we’ll need is the actual file that will be uploaded. To do
    this, we’ll use the addPart method and pass in the name as a String and a FileBody
    object as the


    value. This FileBody object takes in a File object that represents the actual
    file we want uploaded—in this case, a video file on the root of the SD card.


    multipartentity.addPart("file", new FileBody(new File


    ("/sdcard/video_h264_640x480.mp4")));


    If we need to add other elements such as username, password, and the like, we
    use the same addPart method, passing in the name and value. In this case, the
    value should be a StringBody object that contains the actual value as a String.


    multipartentity.addPart("username", new StringBody("myusername")); multipartentity.addPart("password",
    new StringBody("mypassword")); multipartentity.addPart("title", new StringBody("A
    Title"));


    Once our MultipartEntity is all set, we pass it to the HttpPost object by calling
    the setEntity method.


    httppost.setEntity(multipartentity);


    Now we can execute the request and get the response.


    HttpResponse httpresponse = httpclient.execute(httppost);


    HttpEntity responseentity = httpresponse.getEntity();


    We can read the response by getting an InputStream through a call to getContent
    on the HttpEntity we were given.


    InputStream inputstream = responseentity.getContent();'
