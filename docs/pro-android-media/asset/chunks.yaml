  raw: '## CHAPTER 1: Introduction to Android Imaging


    **Figure 1–3.** *The resulting screen-sized image displayed in our ImageView*


    **Image Storage and Metadata**


    Android has a standard way to share data across applications. The classes responsible
    for this are called **content providers**. Content providers offer a standard
    interface for the storage and retrieval of various types of data.


    The standard content provider for images (as well as audio and video) is the MediaStore.


    The MediaStore allows the setting of the file in a standard location on the device
    and has facilities for storing and retrieving metadata about that file. Metadata
    is data about data; it could include information about the data in the file itself,
    such as its size and name, but the MediaStore also allows setting for a wide variety
    of additional data, such as title, description, latitude, and longitude.


    To start utilizing the MediaStore, let’s change our SizedCameraIntent activity
    so that it uses it for image storage and metadata association instead of storing
    the image in an arbitrary file on the SD card.


    **CHAPTER 1: Introduction to Android Imaging**


    **11**


    **Obtaining an URI for the Image**


    To obtain the standard location for storage of images, we first need to get a
    reference to the MediaStore. To do this, we use a **content resolver**. A content
    resolver is the means to access a content provider, which the MediaStore is.


    By passing a specific URI, the content resolver knows to provide an interface
    to the MediaStore as the content provider. Since we are inserting a new image,
    the method we are using is insert and the URI that we should use is contained
    in a constant in the android.provider.MediaStore.Images.Media class called EXTERNAL_CONTENT_URI.
    This


    means that we want to store the image on the primary external volume of the device,
    generally the SD card. If we wanted to store it instead in the internal memory
    of the device, we could use INTERNAL_CONTENT_URI. Generally, though, for media
    storage, as images, audio, and video can be rather large in size, you’ll want
    to use the


    EXTERNAL_CONTENT_URI.


    The insert call shown previously returns an URI, which we can use to write the
    image file’s binary data to. In our case, as we are doing in the CameraActivity,
    we want to simply pass that as an extra in the intent that triggers the Camera
    application.


    Uri imageFileUri = getContentResolver().insert(


    Media.EXTERNAL_CONTENT_URI, new ContentValues());


    Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);


    i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);


    startActivityForResult(i, CAMERA_RESULT);


    You’ll notice that we are also passing in a new ContentValues object. The ContentValues
    object is the metadata that we want to associate with the record when it is created.
    In the preceding example, we are passing in an empty ContentValues object.


    **Prepopulating Associated Metadata**


    If we wanted to pre-fill the metadata, we would use the put method to add some
    data into it. ContentValues takes data as name-value pairs. The names are standard
    and


    defined as constants in the android.provider.MediaStore.Images.Media class. (Some
    of the constants are actually located in the android.provider.MediaStore.MediaColumns


    interface, which the Media class implements.)


    // Save the name and description of an image in a ContentValues map.


    ContentValues contentValues = new ContentValues(3);


    contentValues.put(Media.DISPLAY_NAME, "This is a test title");


    contentValues.put(Media.DESCRIPTION, "This is a test description");


    contentValues.put(Media.MIME_TYPE, "image/jpeg");


    // Add a new record without the bitmap, but with some values set.


    // insert() returns the URI of the new record.


    Uri imageFileUri = getContentResolver().insert(Media.EXTERNAL_CONTENT_URI,


    contentValues);


    **12**


    ## CHAPTER 1: Introduction to Android Imaging


    Again, what is returned by this call is a URI that can be passed to the Camera


    application via the intent to specify the location that the image should be saved
    in.


    If you output this URI via a Log command, it should look something like this:


    content://media/external/images/media/16


    The first thing you might notice is that it looks like a regular URL, such as
    you would use in a web browser; but instead of starting with something like http,
    which is the protocol that delivers web pages, it starts with content. In Android,
    when a URI starts with content, it is one that is used with a content provider
    (such as MediaStore).


    **Retrieving the Saved Image**


    The same URI obtained previously for saving the image can be used as the means
    to


    access the image as well. Instead of passing in the full path to the file to our


    BitmapFactory, we can instead open an InputStream for the image via the content


    resolver and pass that to BitmapFactory.


    Bitmap bmp = BitmapFactory.decodeStream(


    getContentResolver().openInputStream(imageFileUri), null, bmpFactoryOptions);


    **Adding Metadata Later**


    If we want to associate more metadata with the image after we have captured it
    into the MediaStore, we can use the update method of our content resolver. This
    is very similar to the insert method we used previously, except we are accessing
    the image file directly with the URI to the image file.


    // Update the record with Title and Description


    ContentValues contentValues = new ContentValues(3);


    contentValues.put(Media.DISPLAY_NAME, "This is a test title");


    contentValues.put(Media.DESCRIPTION, "This is a test description");


    getContentResolver().update(imageFileUri,contentValues,null,null);


    **Updating Our CameraActivity to Use MediaStore for Image**


    **Storage and to Associate Metadata**


    The following is an update to our previous example, which saves our image in the


    MediaStore and then presents us with an opportunity to add a title and description.
    In addition, this version has several UI elements whose visibility is managed
    based upon the progress of the user in the application.


    package com.apress.proandroidmedia.ch1.mediastorecameraintent;


    import java.io.FileNotFoundException;


    import android.app.Activity;


    import android.content.Intent;


    import android.graphics.Bitmap;


    import android.graphics.BitmapFactory;


    import android.net.Uri;


    **CHAPTER 1: Introduction to Android Imaging**


    **13**


    import android.os.Bundle;


    import android.util.Log;


    import android.view.View;


    import android.view.View.OnClickListener;


    import android.widget.Button;


    import android.widget.EditText;


    import android.widget.ImageView;


    import android.widget.TextView;


    import android.widget.Toast;


    import android.provider.MediaStore.Images.Media;


    import android.content.ContentValues;


    public class MediaStoreCameraIntent extends Activity {


    final static int CAMERA_RESULT = 0;


    Uri imageFileUri;


    // User interface elements, specified in res/layout/main.xml


    ImageView returnedImageView;


    Button takePictureButton;


    Button saveDataButton;


    TextView titleTextView;


    TextView descriptionTextView;


    EditText titleEditText;


    EditText descriptionEditText;


    We are including a couple of user interface elements. They are specified as normal
    in layout/main.xml and their objects are declared in the foregoing code.


    @Override


    public void onCreate(Bundle savedInstanceState)


    {


    super.onCreate(savedInstanceState);


    // Set the content view to be what is defined in the res/layout/main.xml file


    setContentView(R.layout.main);


    // Get references to UI elements


    returnedImageView = (ImageView) findViewById(R.id.ReturnedImageView);


    takePictureButton = (Button) findViewById(R.id.TakePictureButton);


    saveDataButton = (Button) findViewById(R.id.SaveDataButton);


    titleTextView = (TextView) findViewById(R.id.TitleTextView);


    descriptionTextView = (TextView) findViewById(R.id.DescriptionTextView);


    titleEditText = (EditText) findViewById(R.id.TitleEditText);


    descriptionEditText = (EditText) findViewById(R.id.DescriptionEditText);'
  trans: "\n# 第一章：Android 成像入门\n\n**图 1–3.** *最终在 `ImageView` 中显示的全屏图像*\n\n## 图像存储与元数据\n\
    \nAndroid 提供了一种在应用间共享数据的标准方式。负责此功能的类称为**内容提供器**。内容提供器为存储和检索各类数据提供了标准接口。\n\n图像（以及音频和视频）的标准内容提供器是\
    \ `MediaStore`。\n\n`MediaStore` 允许将文件设置在设备的标准位置，并具备存储和检索文件元数据的功能。元数据是关于数据的数据；它可以包含文件本身的数据信息，例如文件大小和名称，但\
    \ `MediaStore` 还允许设置多种附加数据，例如标题、描述、经纬度等。\n\n要开始使用 `MediaStore`，让我们修改 `SizedCameraIntent`\
    \ 活动，使其使用 `MediaStore` 进行图像存储和元数据关联，而不是将图像存储在 SD 卡的任意文件中。\n\n### 获取图像的 URI\n\n\
    要获取图像存储的标准位置，首先需要获得对 `MediaStore` 的引用。为此，我们使用**内容解析器**。内容解析器是访问内容提供器（`MediaStore`\
    \ 即为此类提供器）的途径。\n\n通过传递特定的 URI，内容解析器即可知道将 `MediaStore` 作为内容提供器进行接口提供。由于我们要插入一张新图像，使用的是\
    \ `insert` 方法，而应使用的 URI 包含在 `android.provider.MediaStore.Images.Media` 类的一个常量中，名为\
    \ `EXTERNAL_CONTENT_URI`。这表示我们希望将图像存储在设备的主外部存储卷上，通常是 SD 卡。如果希望将其存储在设备的内部存储器中，可以使用\
    \ `INTERNAL_CONTENT_URI`。不过，通常对于图像、音频和视频等可能体积较大的媒体文件，建议使用 `EXTERNAL_CONTENT_URI`。\n\
    \n前面所示的 `insert` 调用会返回一个 URI，我们可以用它将图像文件的二进制数据写入。在我们的案例中，与在 `CameraActivity` 中所做的一致，我们只需将其作为附加信息传递给触发相机应用的\
    \ Intent。\n\n```\nUri imageFileUri = getContentResolver().insert(\n    Media.EXTERNAL_CONTENT_URI,\
    \ new ContentValues());\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\nstartActivityForResult(i,\
    \ CAMERA_RESULT);\n```\n\n你会注意到我们还传递了一个新的 `ContentValues` 对象。`ContentValues` 对象是我们希望在创建记录时关联的元数据。在上述示例中，我们传递了一个空的\
    \ `ContentValues` 对象。\n\n### 预填充关联元数据\n\n如果我们希望预填充元数据，可以使用 `put` 方法向其中添加一些数据。`ContentValues`\
    \ 以键值对的形式接收数据。这些键名是标准的，并在 `android.provider.MediaStore.Images.Media` 类中定义为常量。（部分常量实际上位于\
    \ `Media` 类所实现的 `android.provider.MediaStore.MediaColumns` 接口中。）\n\n```\n// 在\
    \ ContentValues 映射中保存图像的名称和描述。\nContentValues contentValues = new ContentValues(3);\n\
    contentValues.put(Media.DISPLAY_NAME, \"这是一个测试标题\");\ncontentValues.put(Media.DESCRIPTION,\
    \ \"这是一个测试描述\");\ncontentValues.put(Media.MIME_TYPE, \"image/jpeg\");\n\n// 添加一条不包含位图但设置了部分值的新记录。\n\
    // insert() 返回新记录的 URI。\nUri imageFileUri = getContentResolver().insert(Media.EXTERNAL_CONTENT_URI,\n\
    \    contentValues);\n```\n\n同样，此调用返回的 URI 可以传递给相机应用（通过 Intent），以指定图像保存的位置。\n\n\
    如果通过 `Log` 命令输出此 URI，它看起来会像这样：\n\n```\ncontent://media/external/images/media/16\n\
    ```\n\n你可能首先注意到它看起来像常规 URL（例如在浏览器中使用的 URL）；但不同于以用于传输网页的 `http` 等协议开头，它是以 `content`\
    \ 开头。在 Android 中，当 URI 以 `content` 开头时，表示该 URI 用于内容提供器（如 `MediaStore`）。\n\n###\
    \ 检索已保存的图像\n\n之前用于保存图像的同一 URI 也可以用作访问图像的途径。我们无需将文件的完整路径传递给 `BitmapFactory`，而是可以通过内容解析器为图像打开一个\
    \ `InputStream`，并将其传递给 `BitmapFactory`。\n\n```\nBitmap bmp = BitmapFactory.decodeStream(\n\
    \    getContentResolver().openInputStream(imageFileUri), null, bmpFactoryOptions);\n\
    ```\n\n### 后续添加元数据\n\n如果我们希望在将图像捕获到 `MediaStore` 后关联更多元数据，可以使用内容解析器的 `update`\
    \ 方法。这与之前使用的 `insert` 方法非常相似，只不过我们是直接通过图像的 URI 来访问图像文件。\n\n```\n// 更新记录的标题和描述\n\
