    LocationProvider that can be tested against the status variable which can be usedto
    determine what the change that happened is. They are AVAILABLE, which will get
    called should the provider become available after a period of time being unavailable,
    TEMPORARILY_UNAVAILABLE, which is just as its name implies, the provider is temporarily
    unable to be used as it was **266**


    **CHAPTER 12: Media Consumption and Publishing Using Web Services**


    unable to fetch the current location and lastly, OUT_OF_SERVICE, which means that
    the provider is unable to be used probably due to losing connectivity or signal.


    public void onStatusChanged(String provider, int status, Bundle extras) {


    Log.v("LOCATION", "onStatusChanged: " + provider + " status:" + status); if (status
    == LocationProvider.AVAILABLE) {


    Log.v("LOCATION","Provider Available");


    } else if (status == LocationProvider.TEMPORARILY_UNAVAILABLE) {


    Log.v("LOCATION","Provider Temporarily Unavailable");


    } else if (status == LocationProvider.OUT_OF_SERVICE) {


    Log.v("LOCATION","Provider Out of Service");


    }


    }


    }


