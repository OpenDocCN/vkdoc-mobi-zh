    ## Changing Saturation


    Fortunately, we don’t need to know the formula for each operation we might want
    to accomplish. For instance, the `ColorMatrix` has a method for changing saturation
    built in.


    ```

    ColorMatrix cm = new ColorMatrix();

    cm.setSaturation(.5f);

    paint.setColorFilter(new ColorMatrixColorFilter(cm));

    ```


    Passing in a number greater than 1 will increase saturation, and a number between
    0 and 1 decreases saturation. A value of 0 will yield a grayscale image.


    ## Image Compositing


    Compositing is the act of putting together two images, allowing features of both
    images to be seen.


    # 70


    ## CHAPTER 3: Image Editing and Processing


    In the Android SDK, we can accomplish compositing by first drawing one `Bitmap`
    to a `Canvas` and then drawing a second `Bitmap` to the same `Canvas`. The only
    difference is that we specify a transfermode (`Xfermode`) on the `Paint` when
    drawing the second image.


    The set of classes that can be used as a transfermode all derive from the `Xfermode`
    base class and include one called `PorterDuffXfermode`. The `PorterDuffXfermode`
    class is named for Thomas Porter and Tom Duff, who published a paper entitled
    "Compositing digital images" in the ACM SIGGRAPH Computer Graphics publication
    in 1984, detailing a series of different rules for drawing images on top of one
    another. These rules define which portions of which images will appear in the
    resulting output.


    The rules devised by Porter and Duff and more are enumerated in the `PorterDuff.Mode`
    class in Android.


    They include the following:


    - `android.graphics.PorterDuff.Mode.SRC`: This rule means that only the **source**,
    in our case, the paint that we are applying this to, will be drawn.

    - `android.graphics.PorterDuff.Mode.DST`: This rule means that only the **destination**,
    the original image, already on the canvas, will be shown.


    Following the `SRC` and `DST` rules, there is a set that works with them to determine
    which parts of each image will be drawn in the end. These generally apply when
    the images are different sizes or when they have transparent portions.


    - `android.graphics.PorterDuff.Mode.DST_OVER`: The destination image will be drawn
    over the top of the source image.

    - `android.graphics.PorterDuff.Mode.DST_IN`: The destination image will be drawn
    only where the source and destination images intersect.

    - `android.graphics.PorterDuff.Mode.DST_OUT`: The destination image will be drawn
    only where the source and destination images do not intersect.

    - `android.graphics.PorterDuff.Mode.DST_ATOP`: The destination image will be drawn
    where it intersects with the source; elsewhere the source will be drawn.

    - `android.graphics.PorterDuff.Mode.SRC_OVER`: The source image will be drawn
    over the top of the destination image.

    - `android.graphics.PorterDuff.Mode.SRC_IN`: The source image will be drawn only
    where the destination and source images intersect.

    - `android.graphics.PorterDuff.Mode.SRC_OUT`: The source image will be drawn only
    where the destination and source images do not intersect.

    - `android.graphics.PorterDuff.Mode.SRC_ATOP`: The source image will be drawn
    where it intersects with the destination; elsewhere the destination will be drawn.


    # 71


    ## CHAPTER 3: Image Editing and Processing


    - `android.graphics.PorterDuff.Mode.XOR`: The source and destination images will
    be drawn everywhere except where they overlap, where neither will be drawn.


    Four additional rules are defined that define how two images can be blended together
    when one is placed above the other.


    - `android.graphics.PorterDuff.Mode.LIGHTEN`: Takes the lightest pixel of the
    two images from each position and shows that.

    - `android.graphics.PorterDuff.Mode.DARKEN`: Takes the darkest pixel from the
    two images in each position and shows that.

    - `android.graphics.PorterDuff.Mode.MULTIPLY`: Multiplies the two pixels from
    each position, divides by 255, and uses that value to create a new pixel for display.
    Result Color = Top Color * Bottom Color / 255

    - `android.graphics.PorterDuff.Mode.SCREEN`: Inverts each of the colors, performs
    the same operation (multiplies them together and divides by 255), and then inverts
    once again. Result Color = 255 - (((255 - Top Color) * (255 - Bottom Color)) /
    255)


    Let’s illustrate how these rules may be used with an example application.


