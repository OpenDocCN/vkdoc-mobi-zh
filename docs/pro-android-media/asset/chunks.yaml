    \   <Button android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    \n        android:id=\"@+id/EndButton\" android:text=\"Stop\"></Button>\n</LinearLayout>\n\
    ```\n\n如上所示，`MediaPlayer`拥有一套出色的功能，用于处理通过 HTTP 在线获取的音频文件。\n\n## 通过 HTTP 流式传输音频\n\
    \n在线传输实时音频的一种常见方式是通过 HTTP 流式传输。有多种流媒体方法属于 HTTP 流媒体范畴，从服务器推送（历史上曾用于在浏览器中显示持续刷新的网络摄像头图像）到\
    \ Apple、Adobe 和 Microsoft 为其各自的媒体播放应用程序提出的一系列新方法。\n\n通过 HTTP 传输实时音频的主要方法是由一家名为\
    \ Nullsoft 的公司于 1999 年开发的，该公司随后被 AOL 收购。Nullsoft 是流行 MP3 播放器 WinAMP 的创建者，他们开发了一款使用\
    \ HTTP 的实时音频流服务器，名为 SHOUTcast。SHOUTcast 使用 ICY 协议，该协议扩展了 HTTP。目前，大量服务器和播放软件产品支持该协议，事实上数量如此之多，以至于它可能被视为网络电台的事实标准。\n\
    \n幸运的是，Android 上的 `MediaPlayer` 类能够播放 ICY 流，而无需我们开发人员费尽周折。不幸的是，网络电台通常不会公布其流的直接\
    \ URL。这是有充分理由的；遗憾的是，浏览器不支持直接播放 ICY 流，需要辅助应用程序或插件才能播放该流。为了知道要打开一个辅助应用程序，网络电台会提供一个具有特定\
    \ MIME 类型的中间文件，其中包含指向实际直播流的指针。对于 ICY 流，这通常是 PLS 文件或 M3U 文件。\n\nPLS 文件是一种多媒体播放列表文件，其\
    \ MIME 类型为 `audio/x-scpls`。M3U 文件也是存储多媒体播放列表的文件，但采用更基本的格式。其 MIME 类型为 `audio/x-mpegurl`。以下显示了一个指向虚假直播流的\
    \ M3U 文件的内容：\n\n```\n#EXTM3U\n#EXTINF:0,Live Stream Name\nhttp://www.nostreamhere.org:8000/\n\
    ```\n\n第一行 `#EXTM3U` 是必需的，用于指定后续内容为扩展 M3U 文件，可包含额外信息。播放列表条目的额外信息在该条目上方一行指定，以 `#EXTINF:`\
    \ 开头，后跟持续时间（秒）、逗号，然后是媒体名称。"
- fmt: "# Background and Networked Audio\n\nAn M3U file can have multiple entries\
    \ as well, specifying one file or stream after another.\n\n```\n#EXTM3U\n#EXTINF:0,Live\
    \ Stream Name\nhttp://www.nostreamhere.org:8000/\n#EXTINF:0,Other Live Stream\
    \ Name\nhttp://www.nostreamthere.org/\n```\n\nUnfortunately, the `MediaPlayer`\
    \ on Android doesn’t handle the parsing of M3U files for us. Therefore, to create\
    \ an HTTP streaming audio player on Android, we have to handle the parsing ourselves\
    \ and use the `MediaPlayer` for the actual media playback.\n\nHere is an example\
    \ activity that parses and plays an M3U file delivered from an online radio station\
    \ or any M3U file as entered in the URL field.\n\n```java\npackage com.apress.proandroidmedia.ch06.httpaudioplaylistplayer;\n\
    \nimport java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.io.InputStreamReader;\nimport java.util.Vector;\n\nimport org.apache.http.HttpResponse;\n\
    import org.apache.http.HttpStatus;\nimport org.apache.http.client.ClientProtocolException;\n\
    import org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
    import org.apache.http.impl.client.DefaultHttpClient;\n\nimport android.app.Activity;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
    import android.media.MediaPlayer.OnPreparedListener;\nimport android.os.Bundle;\n\
    import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\nimport android.widget.EditText;\n```\n\nAs in our\
    \ previous example, this activity will extend `OnCompletionListener` and `OnPreparedListener`\
    \ to track the state of the `MediaPlayer`.\n\n```java\npublic class HTTPAudioPlaylistPlayer\
    \ extends Activity\n        implements OnClickListener, OnCompletionListener,\
    \ OnPreparedListener {\n\n    Vector playlistItems;\n```\n\nWe’ll use a `Vector`\
    \ to hold the list of items in the playlist. Each item will be a `PlaylistFile`\
    \ object that is defined in an inner class at the end of this class.\n\nWe’ll\
    \ have a few `Button`s on the interface as well as an `EditText` object, which\
    \ will contain the URL to the M3U file.\n\n```java\n    Button parseButton;\n\
    \    Button playButton;\n    Button stopButton;\n    EditText editTextUrl;\n \
    \   String baseURL = \"\";\n    MediaPlayer mediaPlayer;\n```\n\nThe following\
    \ integer is used keep track of which item from the `playlistItems` `Vector` we\
    \ are currently on.\n\n```java\n    int currentPlaylistItemNumber = 0;\n\n   \
    \ @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        parseButton = (Button) this.findViewById(R.id.ButtonParse);\n\
    \        playButton = (Button) this.findViewById(R.id.PlayButton);\n        stopButton\
    \ = (Button) this.findViewById(R.id.StopButton);\n```\n\nWe are setting the text\
    \ of the `editTextUrl` object to be the URL of an M3U file from an online radio\
    \ station. The first one, which is commented out, is the URL for KBOO, a community\
    \ radio station in Portland, Oregon ([www.kboo.fm](http://www.kboo.fm)). The second,\
    \ which is not commented out, is for KMFA, a classical station in Austin, Texas\
    \ ([www.kmfa.org](http://www.kmfa.org)). The user can edit this to be the URL\
