    ```\n\n随后我们调用 `prepare` 方法，再调用 `start` 方法，之后音频应开始播放。\n\n```\n    mediaPlayer.prepare();\n\
    \    mediaPlayer.start();\n} catch (IOException e) {\n    Log.v(\"AUDIOHTTPPLAYER\"\
    , e.getMessage());\n}\n```\n\n运行此示例时，你可能会注意到从应用加载到音频播放之间存在明显的延迟时间。延迟的长短取决于手机用于联网的数据网络速度（以及其他变量）。\n\
    \n如果在代码中添加 `Log` 或 `Toast` 消息，我们会发现这个延迟发生在调用 `prepare` 方法和调用 `start` 方法之间。在 `prepare`\
    \ 方法运行期间，`MediaPlayer` 正在填充缓冲区，以便即使网络较慢也能流畅播放音频。\n\n`prepare` 方法在执行此操作时实际上会阻塞。这意味着使用此方法的应用程序在\
    \ `prepare` 方法完成之前可能会变得无响应。幸运的是，有一种解决方法，那就是使用 `prepareAsync` 方法。该方法会立即返回，并在后台进行缓冲和其他工作，使应用程序能够继续运行。\n\
    \n接下来要注意的是关注 `MediaPlayer` 对象的状态，并实现各种有助于我们追踪其状态的回调函数。\n\n为了掌握 `MediaPlayer` 对象可能处于的各种状态，查看\
    \ Android API 参考中 `MediaPlayer` 页面的状态图会很有帮助，如图 6-1 所示。\n\n**图 6-1.** *来自 Android\
    \ API 参考的 MediaPlayer 状态图*\n\n以下是一个完整的 `MediaPlayer` 示例，它使用了 `prepareAsync` 并实现了多个监听器来追踪其状态。\n\
