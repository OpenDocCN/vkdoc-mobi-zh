    \ 可能返回的状态值。我们将用这些常量来跟踪直接在下方定义的 `status` 整数中的状态值。\n\n```java\nint STATUS_UNKNOWN\
    \ = 0;\nint STATUS_OK = 1;\nint STATUS_ERROR = 2;\nint status = STATUS_UNKNOWN;\n\
    ```\n\n`message` 变量将用于保存 XML 返回的错误消息，或者在上传成功时保存视频的 URL。\n\n```java\nString message\
    \ = \"\";\n```\n\n当然，我们需要持有通过构造函数传入的 `BlipXMLParserListener` 实例。\n\n```java\n\
    BlipXMLParserListener listener;\n\npublic BlipResponseXMLHandler(BlipXMLParserListener\
    \ bxpl) {\n    super();\n    listener = bxpl;\n}\n\n@Override\npublic void startDocument()\
    \ throws SAXException {\n}\n\n@Override\npublic void endDocument() throws SAXException\
    \ {\n}\n```\n\n大部分工作将在 `startElement` 标签内完成。系统会检查包含 XML 标签名称的 `localName` 变量，看它是否与我们需要关注的任何标签匹配；如果匹配，我们会将\
    \ `state` 变量设置为相应的常量。\n\n```java\n@Override\npublic void startElement(String uri,\
    \ String localName, String qName,\n        Attributes attributes) throws SAXException\
    \ {\n    if (localName.equalsIgnoreCase(\"status\")) {\n        state = ONSTATUS;\n\
    \    } else if (localName.equalsIgnoreCase(\"file\")) {\n        state = ONFILE;\n\
    \    }\n```\n\n如果是 `file` 元素，我们会通知监听器，并提取 `src` 属性，该属性值等于上传后 Blip.TV 赋予的文件名。\n\
    \n```java\nlistener.parseResult(\"onFile\");\nmessage = attributes.getValue(\"\
    src\");\nlistener.parseResult(\"filemessage:\" + message);\n```\n\n然后，我们通过 `setVideoUrl`\
    \ 方法将其传递给 `BlipXMLParserListener`。\n\n```java\nlistener.setVideoUrl(message);\n\
    ```\n\n```java\n    } else if (localName.equalsIgnoreCase(\"message\")) {\n  \
    \      state = ONERRORMESSAGE;\n        listener.parseResult(\"onErrorMessage\"\
    );\n    }\n}\n\n@Override\npublic void endElement(String uri, String localName,\
    \ String qName)\n        throws SAXException {\n    if (localName.equalsIgnoreCase(\"\
    status\")) {\n        state = NONE;\n    } else if (localName.equalsIgnoreCase(\"\
    file\")) {\n        state = NONE;\n    } else if (localName.equalsIgnoreCase(\"\
    message\")) {\n        state = NONE;\n    }\n}\n```\n\n当在元素内发现任何内容时，会触发 `characters`\
    \ 方法。如果 `state` 变量指示我们正在读取一个需要关注的元素，我们将采取相应操作。\n\n```java\n@Override\npublic void\
    \ characters(char[] ch, int start, int length) throws SAXException {\n    String\
    \ stringChars = new String(ch, start, length);\n```\n\n如果正在读取 `status` 元素，我们会将\
    \ `status` 变量设置为相应的常量。\n\n```java\n    if (state == ONSTATUS) {\n        if (stringChars.equalsIgnoreCase(\"\
    OK\")) {\n            status = STATUS_OK;\n        } else if (stringChars.equalsIgnoreCase(\"\
    ERROR\")) {\n            status = STATUS_ERROR;\n        } else {\n          \
    \  status = STATUS_UNKNOWN;\n        }\n```\n\n如果正在读取错误消息元素，我们会获取文本内容，将其设置为 `message`\
    \ 变量，并将其发送给监听器。\n\n```java\n    } else if (state == ONERRORMESSAGE) {\n      \
    \  message += stringChars.trim();\n        listener.parseResult(message);\n  \
    \  }\n}\n```\n\n上述示例中用于跟踪上传进度的方法，基于用户 \"tuler\" 提供的答案，并由用户 ColinD 在 Stack Overflow\
