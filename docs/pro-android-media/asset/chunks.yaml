    \ scale, and the second is the y-axis scaling. Figure 3–10 shows the result of\
    \ the following `setScale` method call.\n\n```\nmatrix.setScale(1.5f, 1);\n```\n\
    \n![](index-75_1.jpg)\n\n**Figure 3–10.** *1.5 scale applied on the x axis*\n\n\
    ### Translate\n\nOne of the most useful methods of `Matrix` is the `setTranslate`\
    \ method. A translate simply moves the image on the x and y axes. The `setTranslate`\
    \ method takes in two floats representing the amount to move on each axis. The\
    \ first argument is the amount the image will move on the x axis, and the second\
    \ argument is the amount the image will move on the y axis. Translating with positive\
    \ values on the x axis will move the image to the right, while using negative\
    \ values will move the image to the left. Translating with positive values on\
    \ the y-axis will move the image downward and using negative values will move\
    \ the image upward.\n\n```\nmatrix.setTranslate(1.5f, -10);\n```\n\n### Pre and\
    \ Post\n\nOf course, these are just the tip of the iceberg. There are several\
    \ more that may prove to be useful to you. Each of them also has a pre and a post\
    \ version. These enable you to do more than one transformation at a time in sequence.\
    \ For instance, you could do a `preScale` and then `setRotate` or a `setScale`\
