    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    package=\"\
    com.apress.proandroidmedia.ch06.backgroundaudio\"\n    android:versionCode=\"\
    1\"\n    android:versionName=\"1.0\">\n    <application android:icon=\"@drawable/icon\"\
    \ android:label=\"@string/app_name\">\n        <activity android:name=\".BackgroundAudioActivity\"\
    \n            android:label=\"@string/app_name\">\n            <intent-filter>\n\
    \                <action android:name=\"android.intent.action.MAIN\" />\n    \
    \            <category android:name=\"android.intent.category.LAUNCHER\" />\n\
    \            </intent-filter>\n        </activity>\n        <service android:name=\"\
    .BackgroundAudioService\" />\n    </application>\n    <uses-sdk android:minSdkVersion=\"\
    5\" />\n</manifest>\n```\n\nAs shown, simply using the `MediaPlayer` to start\
    \ and stop audio playback within a `Service` is very straightforward. Let’s now\
    \ look at how we can take that a step further.\n\n## Controlling a MediaPlayer\
    \ in a Service\n\nUnfortunately, when using a `Service`, issuing commands to the\
    \ `MediaPlayer` from the user-facing activity becomes more complicated.\n\nIn\
    \ order to allow the `MediaPlayer` to be controlled, we need to bind the activity\
    \ and `Service` together. Once we do that, since the activity and `Service` are\
    \ running in the same process, we can call methods in the `Service` directly.\
    \ If we were creating a remote `Service`, we would have to take further steps.\n\
    \nLet’s add a `Button` labeled \"Have Fun\" to the foregoing activity. When this\
    \ `Button` is pressed, we’ll have the `MediaPlayer` seek back a few seconds and\
    \ continue playing the audio file.\n\nWe’ll start by adding the `Button` to the\
    \ layout XML:\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\"\n>\n    <TextView\n        android:layout_width=\"fill_parent\"\n\
    \        android:layout_height=\"wrap_content\"\n        android:text=\"Background\
    \ Audio Player\"\n    />\n    <Button android:text=\"Start Playback\" android:id=\"\
    @+id/StartPlaybackButton\"\n        android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"></Button>\n    <Button android:text=\"Stop Playback\" android:id=\"\
    @+id/StopPlaybackButton\"\n        android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"></Button>\n    <Button android:text=\"Have Fun\" android:id=\"\
    @+id/HaveFunButton\"\n        android:layout_width=\"wrap_content\" android:layout_height=\"\
    wrap_content\"></Button>\n</LinearLayout>\n```\n\nThen in the activity, we’ll\
    \ get a reference to it and set its `onClickListener` to be the activity itself,\
    \ just like the existing `Buttons`.\n\n```\npackage com.apress.proandroidmedia.ch06.backgroundaudiobind;\n\
    \nimport android.app.Activity;\nimport android.content.ComponentName;\nimport\
    \ android.content.Context;\nimport android.content.Intent;\nimport android.content.ServiceConnection;\n\
    import android.os.Bundle;\nimport android.os.IBinder;\nimport android.view.View;\n\
    import android.view.View.OnClickListener;\nimport android.widget.Button;\n\npublic\
    \ class BackgroundAudioActivity extends Activity implements OnClickListener {\n\
    \n    Button startPlaybackButton, stopPlaybackButton;\n    Button haveFunButton;\n\
    \    Intent playbackServiceIntent;\n\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n\n        startPlaybackButton = (Button) this.findViewById(R.id.StartPlaybackButton);\n\
    \        stopPlaybackButton = (Button) this.findViewById(R.id.StopPlaybackButton);\n\
    \        haveFunButton = (Button) this.findViewById(R.id.HaveFunButton);\n\n \
    \       startPlaybackButton.setOnClickListener(this);\n        stopPlaybackButton.setOnClickListener(this);\n\
    \        haveFunButton.setOnClickListener(this);\n\n        playbackServiceIntent\
    \ = new Intent(this, BackgroundAudioService.class);\n    }\n}\n```\n\nIn order\
    \ for us to have this `Button` interact with the `MediaPlayer` that is running\
    \ in the `Service`, we have to bind to the `Service`. The means to do this is\
    \ with the `bindService` method. This method takes in an `Intent`; in fact, we\
    \ can re-use the `playbackServiceIntent` that we are using to start the `Service`,\
    \ a `ServiceConnection` object, and some flags for what to do when the `Service`\
    \ isn’t running."
