    ## CHAPTER 1: Introduction to Android Imaging


    **<ImageView android:id="@+id/ReturnedImageView" android:layout_width="wrap_content"**


    **android:layout_height="wrap_content"></ImageView>**


    </LinearLayout>


    To complete the foregoing example, here are the contents of AndroidManifest.xml.


    <?xml version="1.0" encoding="utf-8"?>


    [<manifest](http://schemas.android.com/apk/res/android)


    android:versionCode="1"


    android:versionName="1.0" package="com.apress.proandroidmedia.ch1.cameraintent">
    <application android:icon="@drawable/icon" android:label="@string/app_name"> <activity
    android:name=".CameraIntent"


    android:label="@string/app_name">


    <intent-filter>


    <action android:name="android.intent.action.MAIN" />


    <category android:name="android.intent.category.LAUNCHER" />


    </intent-filter>


    </activity>


    </application>


    <uses-sdk android:minSdkVersion="4" />


    </manifest>


    In this example, the image is returned from the Camera application in an **extra**
    passed through the intent that is sent to our calling activity in the onActivityResult
    method. The name of the extra is "data" and it contains a Bitmap object, which
    needs to be cast from a generic Object.


    // Get Extras from the intent


    Bundle extras = intent.getExtras();


    // Get the returned image from that extra


    Bitmap bmp = (Bitmap) extras.get("data");


    In our layout XML (layout/main.xml) file, we have an ImageView. An ImageView is
    an


    extension of a generic View, which supports the display of images. Since we have
    an ImageView with the id ReturnedImageView specified, in our activity we need
    to obtain a reference to that and set its Bitmap through its setImageBitmap method
    to be our


    returned image. This enables the user of our application to view the image that
    was captured.


    To get a reference to the ImageView object, we use the standard findViewById method
    specified in the Activity class. This method allows us to programmatically reference
    elements specified in the layout XML file that we are using via setContentView
    by


    passing in the id of the element. In the foregoing example, the ImageView object
    is specified in the XML as follows:


    <ImageView android:id="@+id/ReturnedImageView" android:layout_width="wrap_content"


    android:layout_height="wrap_content"></ImageView>


    To reference the ImageView and tell it to display the Bitmap from the Camera,
    we use the following code.


    imv = (ImageView) findViewById(R.id.ReturnedImageView);imv.setImageBitmap(bmp);


