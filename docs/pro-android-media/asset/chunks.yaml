    **External Fonts**\n\nWe aren’t limited in our Android applications to just the\
    \ built-in fonts. Android supports the creation of `Typeface` objects from any\
    \ TrueType font file. TrueType fonts are a standard and work on a variety of platforms.\
    \ This opens up a wide range of possibilities for our applications.\n\nMany sites\
    \ on the Internet offer free fonts, and, of course, there are font foundries,\
    \ companies that create fonts that will sell you a license to use their fonts.\n\
    \nOne font that I found that was completely different from Android’s built-in\
    \ fonts is the Chopin Script font by Claude Pelletier. It is in the public domain\
    \ and available as a free download from a variety of sources such as fontspace.com\
    \ ([www.fontspace.com/diogene/chopinscript](http://www.fontspace.com/diogene/chopinscript)).\
    \ To use the font, I downloaded it and put the `.ttf` file (`ChopinScript.ttf`)\
    \ into my project’s `assets` folder.\n\nThe `Typeface.createFromAsset` method\
    \ takes in an `AssetManager`, which can be gotten through a call to `getAssets`\
    \ from the `Context` and the name of the file. It returns a `Typeface` object\
    \ that can be passed into the `Paint.setTypeface` method.\n\n```\nTypeface chops\
    \ = Typeface.createFromAsset(getAssets(), \"ChopinScript.ttf\");\npaint.setTypeface(chops);\n\
    ```\n\n![](index-106_1.png)\n\n**92**\n\n## CHAPTER 4: Graphics and Touch Events\n\
    \n**Figure 4–14.** *Chopin Script font*\n\n**Text on a Path**\n\nText isn’t limited\
    \ to being drawn on a horizontal line; it can be drawn on a `Path` as well.\n\n\
    Here is an example.\n\n```\nPaint paint = new Paint();\npaint.setColor(Color.GREEN);\n\
    paint.setTextSize(20);\npaint.setTypeface(Typeface.DEFAULT);\nPath p = new Path();\n\
    p.moveTo(20, 20);\np.lineTo(100, 150);\np.lineTo(200, 220);\ncanvas.drawTextOnPath(\"\
    Hello this is text on a path\", p, 0, 0, paint);\n```\n\n![](index-107_1.png)\n\
    \n## CHAPTER 4: Graphics and Touch Events\n\n### **93**\n\n**Figure 4–15.** *Text\
    \ drawn on a path*\n\n**Finger Painting**\n\nCreating a static drawing on a `Bitmap\
    \ Canvas` is all well and good, but let’s take this a bit further and explore\
    \ how we can make an application that allows the user to create a drawing.\n\n\
    **Touch Events**\n\nTo start this application, we’ll need to understand how Android\
    \ tells us when a user has touched the touchscreen. Being able to handle that,\
    \ we can then allow the user create a drawing using his or her fingers on the\
    \ touchscreen.\n\nAs we know, many of the UI elements that we use in Android derive\
    \ from the `View` class. Since we have been working with the `Canvas` from a `Bitmap`\
    \ that is displayed in an `ImageView`, it makes sense to see if that can help\
    \ us out with detecting where the user touches.\n\nAs luck would have it, the\
    \ `View` class is touch-capable. It has a method where we specify what class should\
    \ receive any touch events that it gets. This method is `setOnTouchListener`,\
    \ and it takes in an object that implements the `OnTouchListener` interface.\n\
    \nWe can make our activity implement `OnTouchListener` by declaring it and creating\
    \ a method called `onTouch`.\n\n**94**\n\n## CHAPTER 4: Graphics and Touch Events\n\
    \n```\npublic class SimpleFingerDraw extends Activity implements OnTouchListener\
    \ {\n\n    ImageView imageView;\n    Bitmap bitmap;\n    Canvas canvas;\n    Paint\
    \ paint;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \        imageView = (ImageView) this.findViewById(R.id.ImageView);\n        Display\
    \ currentDisplay = getWindowManager().getDefaultDisplay();\n        float dw =\
    \ currentDisplay.getWidth();\n        float dh = currentDisplay.getHeight();\n\
    \        bitmap = Bitmap.createBitmap((int)dw,(int)dh,Bitmap.Config.ARGB_8888);\n\
    \        canvas = new Canvas(bitmap);\n        paint = new Paint();\n        paint.setColor(Color.GREEN);\n\
    \        imageView.setImageBitmap(bitmap);\n        imageView.setOnTouchListener(this);\n\
    \    }\n\n    public boolean onTouch(View v, MotionEvent event) {\n        return\
    \ false;\n    }\n}\n```\n\nNow whenever the `ImageView` is touched, the `onTouch`\
    \ method in our activity will be called.\n\nWe can determine what kind of touch\
    \ occurred by looking at the `MotionEvent` object that is passed into our `onTouch`\
    \ method. To do so, we call the `getAction` on that object. The `getAction` method\
    \ will return one of four values that are defined as constants in the `MotionEvent`\
    \ class.\n\n- `MotionEvent.ACTION_DOWN`: This indicates that the view has received\
    \ a touch.\n- `MotionEvent.ACTION_UP`: This indicates that the view has stopped\
    \ receiving a touch.\n- `MotionEvent.ACTION_MOVE`: This indicates that after a\
    \ touch down has occurred, some movement has taken place before the `ACTION_UP`\
    \ event.\n- `MotionEvent.ACTION_CANCEL`: This indicates that the touch has been\
    \ cancelled and should be ignored.\n\nIn addition, we can call the `getX` and\
