    \ this chapter, we have concluded our coverage of audio on Android and have done\
    \ so by showing how flexible it can be. Although we only scratched the surface\
    \ of both audio synthesis and analysis, doing so shows the potential of what can\
    \ be done and how flexible the `AudioTrack` and `AudioRecord` classes in Android\
    \ are. Next we’ll turn our attention to video.\n\n---\n\n### CHAPTER 8: Audio\
    \ Synthesis and Analysis\n\n---\n\n## Chapter 9: Introduction to Video\n\nContinuing\
    \ on our journey through Android’s media capabilities, we’ll now turn our attention\
    \ to video. In this chapter, we’ll explore the various means we can use for video\
    \ playback on Android as well as what formats are supported.\n\n**Video Playback**\n\
    \nTechnically, some mobile phones have had video capabilities previous to 2004.\
    \ In reality, though, video on mobile phones didn’t really take off in the US\
    \ until the introduction of the iPhone in 2007. Since then, every smartphone worth\
    \ its name has supported video playback, if not video capture. As we’ll explore\
    \ throughout this chapter, Android is no exception.\n\n**Supported Formats**\n\
    \nBefore we get into the specific mechanics of how to play video, we should look\
    \ at the types of video that we can play. Although Android supports playing back\
    \ a variety of video formats and the types it can play back is slowly increasing,\
    \ it certainly doesn’t cover the wide range of video formats available.\n\nIn\
    \ general Android’s support is consistent with other mobile phones. It supports\
    \ the 3GP (`.3gp`) and MPEG-4 (`.mp4`) file formats. 3GP is a video standard derived\
    \ from MPEG-4 specifically for use by mobile devices.\n\nAs far as codecs go,\
    \ Android supports H.263, a codec designed for low-latency and low-bitrate videoconferencing\
    \ applications. H.263 video is supported in either MPEG-4 (`.mp4`) or 3GP (`.3gp`)\
    \ files. Android also supports MPEG-4 Simple Profile in 3GP files (`.3gp`) as\
    \ well as H.264.\n\nH.264 is also referred to as MPEG-4 part 10 or AVC (Advanced\
    \ Video Coding). It is one of the contenders for the video codec crown and probably\
    \ offers the widest amount of support across software and hardware. H.264 is supported\
    \ by Silverlight, Flash, iPhone/iPod, Blu-ray devices, and so on. Android supports\
    \ H.264 encoded video in the MPEG-4 container format (`.mp4`).\n\nDepending on\
    \ when you are reading this book, Android probably also supports WebM (Android\
    \ 3.0 and later), the open and royalty-free media container that holds VP8-encoded\
    \ video and Vorbis-encoded audio. WebM was introduced shortly after Google acquired\
    \ On2 Technologies and released the VP8 codec into the public domain.\n\nA large\
    \ number of desktop video conversion tools work to aid the conversion of video\
    \ for use with Android devices. The hard part is getting the settings correct.\
    \ In general, if the tool has a preset for Android devices, you are just fine.\
    \ If not, it is more than likely any presets that a tool might have for the iPhone\
    \ will also work with Android devices since the range of supported formats is\
    \ very close between the two.\n\n**Playback Using an Intent**\n\nAs with most\
    \ of Android’s capabilities that we have explored in this book, simply playing\
    \ back a video can be done easily, using an intent to trigger the built-in Media\
    \ Player application’s playback activity.\n\nFor this example, I captured a video\
    \ using QuickTime X on a Mac laptop with a built-in iSight. I exported this video\
    \ using QuickTime X’s Save As command and selected “iPhone” as the format. This\
    \ created a video that I named `Test_Movie.m4v`. (The `.m4v` extension was given\
    \ by QuickTime. Unfortunately, it isn’t standard, which may indicate that the\
    \ file may not be a fully standards-compliant MPEG-4 file. Nevertheless, it doesn’t\
    \ seem to present any issues on Android devices.) This video is available online\
    \ at [www.mobvcasting.com/android/video/Test_Movie.m4v](http://www.mobvcasting.com/android/video/Test_Movie.m4v)\
    \ for you to download if you would like to test with it.\n\nThe following code\
    \ requires that this video be on root of the SD card on your Android device. To\
    \ do this, you should be able to connect the device to your computer via a USB\
    \ cable and select the menu item in the status bar pull-down that states “USB\
    \ connected. Select to copy files to/from your computer.” This should bring up\
    \ a screen that allows you to “Turn on USB storage.” Doing so should cause your\
    \ phone to be mounted as a removable drive to your computer, and the video file\
    \ can then be copied over. Don’t forget to unmount the drive and “Turn off USB\
    \ storage” before attempting to run the following code. If you don’t, you’ll get\
    \ an error as the program running on the phone cannot access the SD card to read\
    \ the video file while your computer has access to it.\n\nTo create the intent\
    \ that will trigger the built-in Media Player application’s playback activity,\
    \ we’ll construct an activity using the `Intent.ACTION_VIEW` constant and pass\
    \ in the URI and the MIME-type of the file via the `setDataAndType` method. This\
    \ allows Android to choose the preferred activity for playback. Figure 9–1 shows\
    \ the built-in Media Player from Android 2.2 playing video specified in this manner.\n\
    \n```java\npackage com.apress.proandroidmedia.ch09.videointent;\n\nimport android.app.Activity;\n\
    import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.os.Environment;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\n\npublic class VideoPlayerIntent extends Activity\
