    For this example, we are using a class, `ProgressMultipartEntity`, which extends
    `MultipartEntity` but lets us track the upload progress. We pass ourselves in
    as the listener, which we can do since we implement `ProgressListener`.


    ```java

    ProgressMultipartEntity multipartentity = new ProgressMultipartEntity(this);

    ```


    We need to add several parts to the post as required by Blip.TV. Of course, we
    need the file, but we also need the user login (`username`), password, title,
    post with a value of `"1"` so that it actually gets posted, and skin with a value
    of `api` so that we get XML in response instead of a normal web page.


    ```java

    try {


    multipartentity.addPart("file", new FileBody(videoFile));


    multipartentity.addPart("userlogin", new StringBody(username));


    multipartentity.addPart("password", new StringBody(password));


    multipartentity.addPart("title", new StringBody(title));


    multipartentity.addPart("post", new StringBody("1"));


    multipartentity.addPart("skin", new StringBody("api"));


    httppost.setEntity(multipartentity);


    HttpResponse httpresponse = httpclient.execute(httppost);


    HttpEntity responseentity = httpresponse.getEntity();


    if (responseentity != null) {

    ```


