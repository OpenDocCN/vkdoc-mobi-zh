    Let’s look at how we can parse JSON data using Android’s built-in JSON parser.


    We’ll start by working with this simple JSON data:


    {"results":{"aname":"value", "anumber":1234, "aboolean":false, "anarray":


    [{"arrayelement":"Array Element 1"}, {"arrayelement":"Array Element 2"}]}}


    **CHAPTER 12: Media Consumption and Publishing Using Web Services** **255**


    It will have to be in a String in order to work with the JSON parser. To do that,
    we’ll have to escape the double quotes.


    String JSONData = "" +


    "{\"results\":{\"aname\":\"value\", \"anumber\":1234, \"aboolean\":false, " +


    "\"anarray\":[{\"arrayelement\":\"Array Element 1\"}, {\"arrayelement\":


    \"Array Element 2\"}]}}";


    The JSON package available in Android contains a JSONObject class, which can be


    constructed by passing in JSON-formatted data such as we have in the JSONData
    String.


    JSONObject overallJSONObject = new JSONObject(JSONData);


    Once we have a JSONObject, we can pull out any JSON objects, JSON arrays, or regular
    fields that it may contain. Since results is the JSON object that is directly
    inside the outer object, we can get a reference to that by using the getJSONObject
    method, passing in the name of the object we are attempting to pull out.


    JSONObject resultsObject = overallJSONObject.getJSONObject("results");


    Once we have that JSONObject, we can pull out any of the data that it contains.
    There are different methods for each data type.


    To pull out a String, we use the getString method, passing in the name as specified
    in the JSON data.


    String aname = resultsObject.getString("aname");


    To pull out an integer, we use the getInt method, passing in the name specified
    in the JSON data. Correspondingly we can pull out JSON numbers as a double, using


    getDouble, or as a long, using getLong.


    int anumber = resultsObject.getInt("anumber");


    To pull out a Boolean, we use the getBoolean method, passing in the name specified
    in the JSON data.


    boolean aboolean = resultsObject.getBoolean("aboolean");


    Our example data also has an array of JSON objects within the resultsObject called


    anarray. We can get a reference to that using the getJSONArray method, passing
    in the name of the array.


    JSONArray anarray = resultsObject.getJSONArray("anarray");


    We can loop through the JSONArray object and pull out the individual JSON object


    elements, using the getJSONObject method available for use on JSONArray and passing
    in the index number of the element.


    for (int i = 0; i < anarray.length(); i++) {


    JSONObject arrayElementObject = anarray.getJSONObject(i);


    String arrayelement = arrayElementObject.getString("arrayelement");


    }


    Here is a full example putting all of the foregoing together.


    package com.apress.proandroidmedia.ch12.simplejson;


    import org.json.JSONArray;


