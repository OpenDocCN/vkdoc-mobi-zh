    );\n    videoWidth = mp.getVideoWidth();\n    videoHeight = mp.getVideoHeight();\n\
    \    Log.v(LOGTAG, \"Width: \" + videoWidth);\n    Log.v(LOGTAG, \"Height: \"\
    \ + videoHeight);\n    if (videoWidth > currentDisplay.getWidth()\n        ||\
    \ videoHeight > currentDisplay.getHeight()) {\n        float heightRatio = (float)\
    \ videoHeight\n            / (float) currentDisplay.getHeight();\n        float\
    \ widthRatio = (float) videoWidth\n            / (float) currentDisplay.getWidth();\n\
    \        if (heightRatio > 1 || widthRatio > 1) {\n            if (heightRatio\
    \ > widthRatio) {\n                videoHeight = (int) Math.ceil((float) videoHeight\n\
    \                    / (float) heightRatio);\n                videoWidth = (int)\
    \ Math.ceil((float) videoWidth\n                    / (float) heightRatio);\n\
    \            } else {\n                videoHeight = (int) Math.ceil((float) videoHeight\n\
    \                    / (float) widthRatio);\n                videoWidth = (int)\
    \ Math.ceil((float) videoWidth\n                    / (float) widthRatio);\n \
    \           }\n        }\n    }\n    surfaceView.setLayoutParams(\n        new\
    \ LinearLayout.LayoutParams(videoWidth, videoHeight));\n}\n```\n\n由于我们的活动实现了 `OnBufferingUpdateListener`\
    \ 并注册为 `MediaPlayer` 的监听器，以下方法将在媒体下载和缓冲期间被定期调用。缓冲将发生在准备阶段（调用 `onPrepareAsync`\
    \ 或 `onPrepare` 之后）。\n\n```\npublic void onBufferingUpdate(MediaPlayer mp, int\
    \ bufferedPercent) {\n    statusView.setText(\"MediaPlayer Buffering: \" + bufferedPercent\
    \ + \"%\");\n    Log.v(LOGTAG, \"MediaPlayer Buffering: \" + bufferedPercent +\
    \ \"%\");\n}\n\npublic boolean canPause() {\n    return true;\n}\n\npublic boolean\
    \ canSeekBackward() {\n    return true;\n}\n\npublic boolean canSeekForward()\
    \ {\n    return true;\n}\n\npublic int getBufferPercentage() {\n    return 0;\n\
    }\n\npublic int getCurrentPosition() {\n    return mediaPlayer.getCurrentPosition();\n\
    }\n\npublic int getDuration() {\n    return mediaPlayer.getDuration();\n}\n\n\
    public boolean isPlaying() {\n    return mediaPlayer.isPlaying();\n}\n\npublic\
    \ void pause() {\n    if (mediaPlayer.isPlaying()) {\n        mediaPlayer.pause();\n\
    \    }\n}\n\npublic void seekTo(int pos) {\n    mediaPlayer.seekTo(pos);\n}\n\n\
    public void start() {\n    mediaPlayer.start();\n}\n\n@Override\npublic boolean\
    \ onTouchEvent(MotionEvent ev) {\n    if (controller.isShowing()) {\n        controller.hide();\n\
    \    } else {\n        controller.show();\n    }\n    return false;\n}\n```\n\n\
    ![图 10–3. 流式 MediaPlayer 活动播放来自 YouTube 的视频文件](img/index-242_1.jpg)\n\n## 总结\n\
    \n在本章中，我们探讨了 Android 上一些更进阶的视频播放和流媒体功能。正如我们所学到的，`MediaStore` 可以像之前用于图片和音频那样用于视频。它为我们开发者提供了一种真正全面的手段，用于在\
    \ Android 上进行媒体元数据的存储和检索。我们还了解到，媒体视频播放的三种方法也可用于实现网络视频播放，包括流媒体和基于网络的播放。\n"
- fmt: "### Video Capture\n\nIn previous chapters, we have covered image capture and\
    \ audio capture. Now we’ll turn our attention to video capture. In this chapter,\
    \ we’ll explore capturing video using Android’s built-in Camera application via\
    \ an intent. We’ll look at the formats and codecs that Android supports for video\
    \ capture, and finally we’ll build a custom video capture application.\n\n####\
    \ Recording Video Using an Intent\n\nIt is becoming cliché, but as previously\
    \ discussed, often the quickest and easiest way to perform some function on Android\
    \ is to leverage an existing application that can be triggered by an intent from\
    \ our application. Using the built-in Camera application to record video, triggered\
    \ by an intent, is no exception.\n\nWithin the `android.provider.MediaStore` class\
    \ is a constant named `ACTION_VIDEO_CAPTURE`, which contains the string `\"android.media.action.VIDEO_CAPTURE\"\
    `. This string is registered by the Camera application as an intent filter and\
    \ will therefore be activated by an intent sent via the `Content.startActivity`\
    \ or `Context.startActivityForResult` methods. Other applications may also register\
    \ the same string, which would result in the user being prompted to choose which\
    \ application he or she would like to use to perform the action.\n\n```\nIntent\
    \ captureVideoIntent = new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\n\
    startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);\n```\n\n`VIDEO_CAPTURED`\
    \ is a constant that should be defined as a class variable and is used to recognize\
    \ when the Camera application returns a result to our activity via a call to our\
    \ `onActivityResult` method:\n\n```\npublic static int VIDEO_CAPTURED = 1;\n```\n\
    \nThe intent that is passed back to our activity in the `onActivityResult` method\
    \ (`data` in the following code example) contains a `Uri` to the video file that\
    \ was created by the Camera application.\n\n```\nprotected void onActivityResult\
    \ (int requestCode, int resultCode, Intent data) {\n  if (resultCode == RESULT_OK\
    \ && requestCode == VIDEO_CAPTURED) {\n    Uri videoFileUri = data.getData();\n\
    \  }\n}\n```\n\nHere is a full example that uses an intent to trigger the built-in\
    \ Camera application for video capture.\n\n```\npackage com.apress.proandroidmedia.ch11.videocaptureintent;\n\
    \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\n\
    import android.os.Bundle;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
    import android.widget.Button;\nimport android.widget.VideoView;\n\npublic class\
    \ VideoCaptureIntent extends Activity implements OnClickListener {\n```\n\nThe\
    \ `VIDEO_CAPTURED` constant is created to the activity that is returning via a\
    \ call to `onActivityResult`.\n\n```\n  public static int VIDEO_CAPTURED = 1;\n\
    ```\n\nWe’ll use two buttons, one for triggering the sending of the intent, `captureVideoButton`,\
    \ and another for playing the video once it is captured, `playVideoButton`.\n\n\
    ```\n  Button captureVideoButton;\n  Button playVideoButton;\n```\n\nWe will be\
    \ using a standard `VideoView` object with a `Uri` to play back the video that\
    \ has been captured.\n\n```\n  VideoView videoView;\n  Uri videoFileUri;\n\n \
    \ @Override\n  public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setContentView(R.layout.main);\n\n    captureVideoButton = (Button) this.findViewById(R.id.CaptureVideoButton);\n\
    \    playVideoButton = (Button) this.findViewById(R.id.PlayVideoButton);\n\n \
    \   captureVideoButton.setOnClickListener(this);\n    playVideoButton.setOnClickListener(this);\n\
    ```\n\nThe `playVideoButton` will initially not be enabled, meaning it cannot\
    \ be clicked. We’ll set it to be enabled once we have captured the video.\n\n\
    ```\n    playVideoButton.setEnabled(false);\n\n    videoView = (VideoView) this.findViewById(R.id.VideoView);\n\
    \  }\n```\n\nOur activity implements `OnClickListener` and is registered as the\
    \ `OnClickListener` for each of the `Buttons`. Therefore when a button is pressed\
    \ or clicked, our `onClick` method will be called.\n\n```\n  public void onClick(View\
    \ v) {\n    if (v == captureVideoButton) {\n```\n\nIf the `captureVideoButton`\
    \ was pressed, we create the intent and pass it along with our `VIDEO_CAPTURED`\
    \ constant into the `startActivityForResult` method, which will kick off the built-in\
    \ Camera application.\n\n```\n      Intent captureVideoIntent = new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\n\
    \      startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);\n    } else\
    \ if (v == playVideoButton) {\n```\n\nIf the `playVideoButton` is pressed, we’ll\
    \ set the `Uri` to play and start the playback.\n\n```\n      videoView.setVideoURI(videoFileUri);\n\
    \      videoView.start();\n    }\n  }\n```\n\nWhen the Camera (or any triggered\
    \ application/activity) returns, the following `onActivityResult` method will\
    \ be called. We check that the `resultCode` is the constant `RESULT_OK` and the\
    \ `requestCode` is what we passed into the `startActivityForResult`, `VIDEO_CAPTURED`,\
    \ and then grab the `Uri` to the video file that was recorded. Following that,\
    \ we’ll enable the `playVideoButton` so the user can press it and trigger the\
    \ video to play.\n\n```\n  protected void onActivityResult (int requestCode, int\
    \ resultCode, Intent data) {\n    if (resultCode == RESULT_OK && requestCode ==\
    \ VIDEO_CAPTURED) {\n      videoFileUri = data.getData();\n      playVideoButton.setEnabled(true);\n\
    \    }\n  }\n}\n```\n\nHere is the layout XML contained in `res/layout/main.xml`\
    \ referenced by the foregoing activity.\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\"\n>\n    <Button android:text=\"Capture\
    \ Video\" android:id=\"@+id/CaptureVideoButton\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\">\n    </Button>\n    <Button\
    \ android:text=\"Play Video\" android:id=\"@+id/PlayVideoButton\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\">\n    </Button>\n    <VideoView\
    \ android:id=\"@+id/VideoView\" android:layout_width=\"wrap_content\"\n      \
    \  android:layout_height=\"wrap_content\">\n    </VideoView>\n</LinearLayout>\n\
    ```"
  raw: '### **Video Capture**


    In previous chapters, we have covered image capture and audio capture. Now we’ll
    turn our attention to video capture. In this chapter, we’ll explore capturing
    video using Android’s built-in Camera application via an intent. We’ll look at
    the formats and codecs that Android supports for video capture, and finally we’ll
    build a custom video capture application.


    **Recording Video Using an Intent**


    It is becoming cliché, but as previously discussed, often the quickest and easiest
    way to perform some function on Android is to leverage an existing application
    that can be triggered by an intent from our application. Using the built-in Camera
    application to record video, triggered by an intent, is no exception.


    Within the android.provider.MediaStore class is a constant named


    ACTION_VIDEO_CAPTURE, which contains the string “android.media.action.


    VIDEO_CAPTURE”. This string is registered by the Camera application as an intent
    filter and will therefore be activated by an intent sent via the Content.startActivity
    or


    Context.startActivityForResult methods. Other applications may also register the


    same string, which would result in the user being prompted to choose which application
    he or she would like to use to perform the action.


    Intent captureVideoIntent = new Intent(android.provider.MediaStore.


    ACTION_VIDEO_CAPTURE);


    startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);


    VIDEO_CAPTURED is a constant that should be defined as a class variable and is
    used to recognize when the Camera application returns a result to our activity
    via a call to our onActivityResult method:


    public static int VIDEO_CAPTURED = 1;


    The intent that is passed back to our activity in the onActivityResult method
    (data in the following code example) contains a Uri to the video file that was
    created by the Camera application.


    **230**


    ## CHAPTER 11: Video Capture


    protected void onActivityResult (int requestCode, int resultCode, Intent data)
    {


    if (resultCode == RESULT_OK && requestCode == VIDEO_CAPTURED) {


    Uri videoFileUri = data.getData();


    }


    }


    Here is a full example that uses an intent to trigger the built-in Camera application
    for video capture.


    package com.apress.proandroidmedia.ch11.videocaptureintent;


    import android.app.Activity;


    import android.content.Intent;


    import android.net.Uri;


    import android.os.Bundle;


    import android.view.View;


    import android.view.View.OnClickListener;


    import android.widget.Button;


    import android.widget.VideoView;


    public class VideoCaptureIntent extends Activity implements OnClickListener {


    The VIDEO_CAPTURED constant is created to the activity that is returning via a
    call to onActivityResult.


    public static int VIDEO_CAPTURED = 1;


    We’ll use two buttons, one for triggering the sending of the intent, captureVideoButton,
    and another for playing the video once it is captured, playVideoButton.


    Button captureVideoButton;


    Button playVideoButton;


    We will be using a standard VideoView object with a Uri to play back the video
    that has been captured.


    VideoView videoView;


    Uri videoFileUri;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    captureVideoButton = (Button) this.findViewById(R.id.CaptureVideoButton);


    playVideoButton = (Button) this.findViewById(R.id.PlayVideoButton);


    captureVideoButton.setOnClickListener(this);


    playVideoButton.setOnClickListener(this);


    The playVideoButton will initially not be enabled, meaning it cannot be clicked.
    We’ll set it to be enabled once we have captured the video.


    playVideoButton.setEnabled(false);


    videoView = (VideoView) this.findViewById(R.id.VideoView);


    }


    **CHAPTER 11: Video Capture**


    **231**


    Our activity implements OnClickListener and is registered as the OnClickListener
    for each of the Buttons. Therefore when a button is pressed or clicked, our onClick
    method will be called.


    public void onClick(View v) {


    if (v == captureVideoButton) {


    If the captureVideoButton was pressed, we create the intent and pass it along
    with our VIDEO_CAPTURED constant into the startActivityForResult method, which
    will kick off the built-in Camera application.


    Intent captureVideoIntent = new Intent(android.provider.


    MediaStore.ACTION_VIDEO_CAPTURE);


    startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);


    } else if (v == playVideoButton) {


    If the playVideoButton is pressed, we’ll set the Uri to play and start the playback.


    videoView.setVideoURI(videoFileUri);


    videoView.start();


    }


    }


    When the Camera (or any triggered application/activity) returns, the following


    onActivityResult method will be called. We check that the resultCode is the constant
    RESULT_OK and the requestCode is what we passed into the startActivityForResult,


    VIDEO_CAPTURED, and then grab the Uri to the video file that was recorded. Following
    that, we’ll enable the playVideoButton so the user can press it and trigger the
    video to play.


    protected void onActivityResult (int requestCode, int resultCode, Intent data)
    {


    if (resultCode == RESULT_OK && requestCode == VIDEO_CAPTURED) {


    videoFileUri = data.getData();


    playVideoButton.setEnabled(true);


    }


    }


    }


    Here is the layout XML contained in res/layout/main.xml referenced by the foregoing
    activity.


    <?xml version="1.0" encoding="utf-8"?>


    [<LinearLayout](http://schemas.android.com/apk/res/android)


    android:orientation="vertical"


    android:layout_width="fill_parent"


    android:layout_height="fill_parent"


    >


    <Button android:text="Capture Video" android:id="@+id/CaptureVideoButton"


    android:layout_width="wrap_content" android:layout_height="wrap_content"></Button>
    <Button android:text="Play Video" android:id="@+id/PlayVideoButton"


    android:layout_width="wrap_content" android:layout_height="wrap_content"></Button>
    <VideoView android:id="@+id/VideoView" android:layout_width="wrap_content"


    android:layout_height="wrap_content"></VideoView>


    </LinearLayout>


