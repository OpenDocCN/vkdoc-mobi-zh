  raw: '## CHAPTER 6: Background and Networked Audio


    An M3U file can have multiple entries as well, specifying one file or stream after
    another.


    #EXTM3U


    #EXTINF:0,Live Stream Name


    [http://www.nostreamhere.org:8000/](http://www.nostreamhere.org:8000)


    #EXTINF:0,Other Live Stream Name


    [http://www.nostreamthere.org/](http://www.nostreamthere.org)


    Unfortunately, the MediaPlayer on Android doesn’t handle the parsing of M3U files
    for us. Therefore, to create an HTTP streaming audio player on Android, we have
    to handle the parsing ourselves and use the MediaPlayer for the actual media playback.


    Here is an example activity that parses and plays an M3U file delivered from an
    online radio station or any M3U file as entered in the URL field.


    package com.apress.proandroidmedia.ch06.httpaudioplaylistplayer;


