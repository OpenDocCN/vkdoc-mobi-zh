    .SimpleServiceService\" />\n    </application>\n\n    <uses-sdk android:minSdkVersion=\"\
    5\" />\n\n</manifest>\n```\n\n当然，这个示例除了在日志中输出`Service`何时启动和停止外，并没有做其他任何事情。让我们继续前进，让我们的`Service`真正做一些事情。\n\
    \n## 本地服务加 MediaPlayer\n\n既然我们已经创建了一个简单的`Service`示例，就可以将其作为模板来创建一个在后台播放音频文件的应用程序。下面是一个`Service`和一个用于控制该`Service`的\
    \ Activity，它们共同实现了在后台播放音频文件的功能。其工作原理与上一章的自定义音频播放器示例类似，因为它使用了 Android 提供的同一个底层`MediaPlayer`类。\n\
