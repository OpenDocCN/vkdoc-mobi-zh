    XMLReader anXMLReader = aSAXParser.getXMLReader();

    ```


    We’ll be using a `BlipResponseXMLHandler`, defined here to deal specifically with
    the XML responses from Blip.TV after a file upload.


    ```java

    BlipResponseXMLHandler xmlHandler =


    new BlipResponseXMLHandler(this);


    anXMLReader.setContentHandler(xmlHandler);


    anXMLReader.parse(new InputSource(inputstream));


    } catch (ParserConfigurationException e) {


    e.printStackTrace();


    } catch (SAXException e) {


    e.printStackTrace();


    } catch (IOException e) {


    e.printStackTrace();


    }


    inputstream.close();


    }


    } catch (ClientProtocolException e) {


    e.printStackTrace();


