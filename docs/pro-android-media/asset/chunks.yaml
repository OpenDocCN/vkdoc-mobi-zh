    ```\n\n**Figure 2–4.** Camera preview with small preview size\n\n## Capturing\
    \ and Saving an Image\n\nTo capture an image with the `Camera` class, we have\
    \ to call the `takePicture` method. This method takes in three or four arguments,\
    \ all of which are `Callback` methods. The simplest form of the `takePicture`\
    \ method is to have all of the arguments be `null`.\n\nUnfortunately, while a\
    \ picture would be captured, no reference to it will be available. At the very\
    \ least, one of the callback methods should be implemented. The safest one is\
    \ `Camera.PictureCallback.onPictureTaken`. This is guaranteed to be called and\
