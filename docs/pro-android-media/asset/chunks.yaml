    acquired On2 Technologies and released the VP8 codec into the public domain.


    A large number of desktop video conversion tools work to aid the conversion of
    video for use with Android devices. The hard part is getting the settings correct.
    In general, if the tool has a preset for Android devices, you are just fine. If
    not, it is more than likely any presets that a tool might have for the iPhone
    will also work with Android devices since the range of supported formats is very
    close between the two.


    **Playback Using an Intent**


    As with most of Android’s capabilities that we have explored in this book, simply
    playing back a video can be done easily, using an intent to trigger the built-in
    Media Player application’s playback activity.


    For this example, I captured a video using QuickTime X on a Mac laptop with a
    built-in iSight. I exported this video using QuickTime X’s Save As command and
    selected


