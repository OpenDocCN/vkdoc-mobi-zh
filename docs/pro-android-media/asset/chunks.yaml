    \ to explicitly set that not to happen with `setFocusInTouchMode(true)`.\n\n```\n\
    public class SnapShot extends Activity implements OnClickListener,\n    SurfaceHolder.Callback,\
    \ Camera.PictureCallback {\n    ...\n}\n```\n\n**34**"
