- fmt: '### Media Consumption and Publishing Using Web Services


    It would be negligent to put out a book that didn’t cover the wide range of possibilities
    available for online media consumption from sites such as `Flickr`, which offers
    photos and videos, and `YouTube`, famous for its wide range of user-generated
    video.


    It also makes sense that since so much of this book has been about means and methods
    for building applications that allow users to create or produce media, we should
    cover methods for publishing that media to the same or similar places, such as
    `Blip.TV` for video and `Flickr` for images.


    Additionally, in the process of this media consuming and publishing, we’ll be
    doing two things: we’ll be learning about and using web services and web service
    protocols such as `REST` and `JSON`, and we’ll look at utilizing location. We’ll
    learn how we can query platforms such as `Flickr` for content that was created
    around the user.


    ### Web Services


    We are all familiar with web pages and the sites that encompass them, such as
    `Yahoo`, `Google`, `Hulu`, and `Apress.com`. What you may not be as familiar with
    is the concept of a “web service.” Simply put, a web service is a means to access
    the content and services offered by a web site in a programmatic fashion.


    Sites will enable their content to be accessed in this manner to allow third-party
    developers such as ourselves the ability to embed their content and functionality
    into applications. For instance, Android phones typically come with a `YouTube`
    application pre-installed. This application receives its data from `YouTube`’s
    site through a web service protocol and displays it within the application. This
    is different from accessing `YouTube`’s mobile web site, which we could do in
    a browser. In this case, we aren’t getting the layout and formatting data from
    `YouTube`’s web site; we are getting just the data—for instance, the list of most
    viewed and top-rated videos, which are then displayed within the application’s
    layout.


    There are several web service technologies that are used to do this kind of behind-the-scenes
    data delivery. We are going to cover two of them, `JSON` and `REST`. First, though,
    we need to cover one of the basics of working with web services, which is making
    a web or HTTP request in the first place.


    ### HTTP Requests


    A web service wouldn’t be a “web” service if we didn’t use HTTP to access it.
    Making an HTTP request on Android is straightforward using the Apache-provided
    `HttpClient` classes that are included with Android in the `org.apache.http` package.


    First we need to create an `HttpClient` object, which will actually be a `DefaultHttpClient`
    object.


    ```

    HttpClient httpclient = new DefaultHttpClient();

    ```


    Following that, we can construct the request. In this case, we’ll be making an
    HTTP GET request, which puts any parameters on the URL in the form of a query
    string. This is as opposed to an HTTP POST request, which sends additional data
    as the body of the request message, which is not part of the URL.


    To create an HTTP GET request, we’ll instantiate an `HttpGet` object, passing
    in a URL to the page that we would like to retrieve. In this case, we are passing
    in a URL to the page about this book on Apress’s site.


    ```

    HttpGet httpget = new HttpGet("http://www.apress.com/book/view/9781430232674");

    ```


    We’ll then execute the request by passing the `HttpGet` object to the `HttpClient`
    object via the `execute` method. This will return an `HttpResponse` object.


    ```

    HttpResponse response = httpclient.execute(httpget);

    ```


    The `HttpResponse` will contain an `HttpEntity`, which is basically an HTTP message.
    Both requests and responses contain entities.


    ```

    HttpEntity entity = response.getEntity();

    ```


    The `getContent` method on the `HttpEntity` returns an `InputStream` that we can
    use to read the actual content that was sent in response.


    ```

    InputStream inputstream = entity.getContent();

    ```


    Let’s go through a short example to illustrate.'
