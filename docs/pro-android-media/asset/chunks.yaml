  trans: "\n# 第 1 章：Android 图像处理入门\n\n**注意：** 上述用于创建图像文件 URI 的代码片段可简化为以下形式：\n```\n\
    imageFileUri = Uri.parse(\"file:///sdcard/myfavoritepicture.jpg\");\n```\n不过，在实际操作中，使用示例所示的方法将更具设备无关性，并且当\
    \ SD 卡的命名约定或本地文件系统的 URI 语法发生变化时，也能更好地适应未来。\n\n## 显示大图\n\n加载和显示图像会显著影响内存使用。例如，HTC\
    \ G1 手机配备了一颗 320 万像素的摄像头。一颗 320 万像素的摄像头通常拍摄 2048 像素 × 1536 像素的图像。显示该尺寸的 32 位图像将占用超过\
    \ 100663 kb（约 13 MB）的内存。虽然这不一定能保证我们的应用会耗尽内存，但无疑会大大增加这种可能性。\n\nAndroid 为我们提供了一个名为\
    \ `BitmapFactory` 的工具类，它提供了一系列静态方法，允许从各种来源加载 `Bitmap` 图像。根据我们的需求，需要从文件中加载图像以显示在我们的原始\
    \ Activity 中。幸运的是，`BitmapFactory` 中可用的方法接受一个 `BitmapFactory.Options` 类，该类允许我们定义如何将\
    \ `Bitmap` 读入内存。具体来说，我们可以设置 `BitmapFactory` 在加载图像时应使用的采样大小。在 `BitmapFactory.Options`\
    \ 中指定 `inSampleSize` 参数，意味着加载后生成的 `Bitmap` 图像大小将是原图的几分之一。例如，像这里将 `inSampleSize`\
    \ 设置为 8，将生成一个大小为原图 1/8 的图像。\n\n```\nBitmapFactory.Options bmpFactoryOptions =\
    \ new BitmapFactory.Options();\nbmpFactoryOptions.inSampleSize = 8;\nBitmap bmp\
    \ = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\nimv.setImageBitmap(bmp);\n\
    ```\n\n这是加载大图的一种快速方法，但并未真正考虑图像的原始尺寸或屏幕的尺寸。最好能将图像缩放到适合我们屏幕的大小。\n\n接下来的代码片段说明了如何使用显示器的尺寸来确定加载图像时应发生的降采样量。当我们使用这些方法时，可以确保图像尽可能填满显示器的边界。但是，如果图像在任何一个维度上只打算显示\
    \ 100 像素，则应使用该值来代替显示的尺寸（我们按如下方式获取显示尺寸）。\n\n```\nDisplay currentDisplay = getWindowManager().getDefaultDisplay();\n\
    int dw = currentDisplay.getWidth();\nint dh = currentDisplay.getHeight();\n```\n\
    \n为了确定计算所需的图像整体尺寸，我们使用 `BitmapFactory` 和 `BitmapFactory.Options`，并将 `BitmapFactory.Options.inJustDecodeBounds`\
    \ 变量设置为 `true`。这会告诉 `BitmapFactory` 类只返回图像的边界，而不是尝试解码图像本身。使用此方法时，`BitmapFactory.Options.outHeight`\
    \ 和 `BitmapFactory.Options.outWidth` 变量将被赋值。\n\n```\n// 仅加载图像的尺寸，而非图像本身\nBitmapFactory.Options\
    \ bmpFactoryOptions = new BitmapFactory.Options();\nbmpFactoryOptions.inJustDecodeBounds\
    \ = true;\nBitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \nint heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\nint\
    \ widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\nLog.v(\"\
    HEIGHTRATIO\",\"\"+heightRatio);\nLog.v(\"WIDTHRATIO\",\"\"+widthRatio);\n```\n\
    \n将图像的尺寸除以显示器的尺寸，就能得到比率。然后，我们可以根据哪个比率更大，选择使用高度比率还是宽度比率。简单地使用该比率作为 `BitmapFactory.Options.inSampleSize`\
    \ 变量，将生成一个加载到内存中尺寸与我们所需尺寸接近的图像——在这种情况下，就是接近显示器本身的尺寸。\n\n```\n// 如果两个比率都大于 1，\n\
    // 则图像的一边大于屏幕\nif (heightRatio > 1 && widthRatio > 1)\n{\n    if (heightRatio\
    \ > widthRatio)\n    {\n        // 高度比率更大，根据它进行缩放\n        bmpFactoryOptions.inSampleSize\
    \ = heightRatio;\n    }\n    else\n    {\n        // 宽度比率更大，根据它进行缩放\n        bmpFactoryOptions.inSampleSize\
    \ = widthRatio;\n    }\n}\n// 实际解码\nbmpFactoryOptions.inJustDecodeBounds = false;\n\
    bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n```\n\n以下是一个完整示例的代码，该示例通过\
    \ Intent 使用内置相机并显示结果图片。图 1-3 显示了此示例生成的屏幕尺寸图像。\n\n```\npackage com.apress.proandroidmedia.ch1.sizedcameraintent;\n\
    \nimport java.io.File;\n\nimport android.app.Activity;\nimport android.content.Intent;\n\
    import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
    \ android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
    import android.util.Log;\nimport android.view.Display;\nimport android.widget.ImageView;\n\
    \npublic class SizedCameraIntent extends Activity {\n\n    final static int CAMERA_RESULT\
    \ = 0;\n    ImageView imv;\n    String imageFilePath;\n\n    @Override\n    public\
    \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\
    \ +\n            \"/myfavoritepicture.jpg\";\n        File imageFile = new File(imageFilePath);\n\
    \        Uri imageFileUri = Uri.fromFile(imageFile);\n\n        Intent i = new\
    \ Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n        i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT,\
    \ imageFileUri);\n        startActivityForResult(i, CAMERA_RESULT);\n    }\n\n\
    \    protected void onActivityResult(int requestCode, int resultCode, Intent intent)\
    \ {\n        super.onActivityResult(requestCode, resultCode, intent);\n      \
    \  if (resultCode == RESULT_OK)\n        {\n            // 获取 ImageView 的引用\n\
    \            imv = (ImageView) findViewById(R.id.ReturnedImageView);\n\n     \
    \       Display currentDisplay = getWindowManager().getDefaultDisplay();\n   \
    \         int dw = currentDisplay.getWidth();\n            int dh = currentDisplay.getHeight();\n\
    \n            // 仅加载图像的尺寸，而非图像本身\n            BitmapFactory.Options bmpFactoryOptions\
    \ = new BitmapFactory.Options();\n            bmpFactoryOptions.inJustDecodeBounds\
    \ = true;\n            Bitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \n            int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n\
    \            int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\
    \n            Log.v(\"HEIGHTRATIO\",\"\"+heightRatio);\n            Log.v(\"WIDTHRATIO\"\
    ,\"\"+widthRatio);\n\n            // 如果两个比率都大于 1，\n            // 则图像的一边大于屏幕\n\
    \            if (heightRatio > 1 && widthRatio > 1)\n            {\n         \
    \       if (heightRatio > widthRatio)\n                {\n                   \
    \ // 高度比率更大，根据它进行缩放\n                    bmpFactoryOptions.inSampleSize = heightRatio;\n\
    \                }\n                else\n                {\n                \
    \    // 宽度比率更大，根据它进行缩放\n                    bmpFactoryOptions.inSampleSize = widthRatio;\n\
    \                }\n            }\n\n            // 实际解码\n            bmpFactoryOptions.inJustDecodeBounds\
    \ = false;\n            bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \n            // 显示它\n            imv.setImageBitmap(bmp);\n        }\n    }\n\
    }\n```\n\n上述代码需要以下 `layout/main.xml` 文件：\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\" >\n\n    <ImageView \n        android:id=\"\
    @+id/ReturnedImageView\" \n        android:layout_width=\"wrap_content\"\n   \
    \     android:layout_height=\"wrap_content\" />\n\n</LinearLayout>\n```\n\n![](img/index-24_1.jpg)\n"
- fmt: "# CHAPTER 1: Introduction to Android Imaging\n\n**Figure 1–3.** *The resulting\
    \ screen-sized image displayed in our `ImageView`*\n\n## Image Storage and Metadata\n\
    \nAndroid has a standard way to share data across applications. The classes responsible\
    \ for this are called **content providers**. Content providers offer a standard\
    \ interface for the storage and retrieval of various types of data.\n\nThe standard\
    \ content provider for images (as well as audio and video) is the `MediaStore`.\n\
    \nThe `MediaStore` allows the setting of the file in a standard location on the\
    \ device and has facilities for storing and retrieving metadata about that file.\
    \ Metadata is data about data; it could include information about the data in\
    \ the file itself, such as its size and name, but the `MediaStore` also allows\
    \ setting for a wide variety of additional data, such as title, description, latitude,\
    \ and longitude.\n\nTo start utilizing the `MediaStore`, let’s change our `SizedCameraIntent`\
    \ activity so that it uses it for image storage and metadata association instead\
    \ of storing the image in an arbitrary file on the SD card.\n\n### Obtaining an\
    \ URI for the Image\n\nTo obtain the standard location for storage of images,\
    \ we first need to get a reference to the `MediaStore`. To do this, we use a **content\
    \ resolver**. A content resolver is the means to access a content provider, which\
    \ the `MediaStore` is.\n\nBy passing a specific URI, the content resolver knows\
    \ to provide an interface to the `MediaStore` as the content provider. Since we\
    \ are inserting a new image, the method we are using is `insert` and the URI that\
    \ we should use is contained in a constant in the `android.provider.MediaStore.Images.Media`\
    \ class called `EXTERNAL_CONTENT_URI`. This means that we want to store the image\
    \ on the primary external volume of the device, generally the SD card. If we wanted\
    \ to store it instead in the internal memory of the device, we could use `INTERNAL_CONTENT_URI`.\
    \ Generally, though, for media storage, as images, audio, and video can be rather\
    \ large in size, you’ll want to use the `EXTERNAL_CONTENT_URI`.\n\nThe `insert`\
    \ call shown previously returns an URI, which we can use to write the image file’s\
    \ binary data to. In our case, as we are doing in the `CameraActivity`, we want\
    \ to simply pass that as an extra in the intent that triggers the Camera application.\n\
    \n```\nUri imageFileUri = getContentResolver().insert(\n    Media.EXTERNAL_CONTENT_URI,\
    \ new ContentValues());\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\nstartActivityForResult(i,\
    \ CAMERA_RESULT);\n```\n\nYou’ll notice that we are also passing in a new `ContentValues`\
    \ object. The `ContentValues` object is the metadata that we want to associate\
    \ with the record when it is created. In the preceding example, we are passing\
    \ in an empty `ContentValues` object.\n\n### Prepopulating Associated Metadata\n\
    \nIf we wanted to pre-fill the metadata, we would use the `put` method to add\
    \ some data into it. `ContentValues` takes data as name-value pairs. The names\
    \ are standard and defined as constants in the `android.provider.MediaStore.Images.Media`\
    \ class. (Some of the constants are actually located in the `android.provider.MediaStore.MediaColumns`\
    \ interface, which the `Media` class implements.)\n\n```\n// Save the name and\
    \ description of an image in a ContentValues map.\nContentValues contentValues\
    \ = new ContentValues(3);\ncontentValues.put(Media.DISPLAY_NAME, \"This is a test\
    \ title\");\ncontentValues.put(Media.DESCRIPTION, \"This is a test description\"\
    );\ncontentValues.put(Media.MIME_TYPE, \"image/jpeg\");\n\n// Add a new record\
    \ without the bitmap, but with some values set.\n// insert() returns the URI of\
    \ the new record.\nUri imageFileUri = getContentResolver().insert(Media.EXTERNAL_CONTENT_URI,\n\
    \    contentValues);\n```\n\nAgain, what is returned by this call is a URI that\
    \ can be passed to the Camera application via the intent to specify the location\
    \ that the image should be saved in.\n\nIf you output this URI via a `Log` command,\
    \ it should look something like this:\n\n```\ncontent://media/external/images/media/16\n\
    ```\n\nThe first thing you might notice is that it looks like a regular URL, such\
    \ as you would use in a web browser; but instead of starting with something like\
    \ `http`, which is the protocol that delivers web pages, it starts with `content`.\
    \ In Android, when a URI starts with `content`, it is one that is used with a\
    \ content provider (such as `MediaStore`).\n\n### Retrieving the Saved Image\n\
    \nThe same URI obtained previously for saving the image can be used as the means\
    \ to access the image as well. Instead of passing in the full path to the file\
    \ to our `BitmapFactory`, we can instead open an `InputStream` for the image via\
    \ the content resolver and pass that to `BitmapFactory`.\n\n```\nBitmap bmp =\
    \ BitmapFactory.decodeStream(\n    getContentResolver().openInputStream(imageFileUri),\
    \ null, bmpFactoryOptions);\n```\n\n### Adding Metadata Later\n\nIf we want to\
    \ associate more metadata with the image after we have captured it into the `MediaStore`,\
    \ we can use the `update` method of our content resolver. This is very similar\
    \ to the `insert` method we used previously, except we are accessing the image\
    \ file directly with the URI to the image file.\n\n```\n// Update the record with\
    \ Title and Description\nContentValues contentValues = new ContentValues(3);\n\
    contentValues.put(Media.DISPLAY_NAME, \"This is a test title\");\ncontentValues.put(Media.DESCRIPTION,\
    \ \"This is a test description\");\ngetContentResolver().update(imageFileUri,contentValues,null,null);\n\
    ```\n\n### Updating Our `CameraActivity` to Use `MediaStore` for Image Storage\
    \ and to Associate Metadata\n\nThe following is an update to our previous example,\
    \ which saves our image in the `MediaStore` and then presents us with an opportunity\
    \ to add a title and description. In addition, this version has several UI elements\
    \ whose visibility is managed based upon the progress of the user in the application.\n\
    \n```\npackage com.apress.proandroidmedia.ch1.mediastorecameraintent;\n\nimport\
    \ java.io.FileNotFoundException;\nimport android.app.Activity;\nimport android.content.Intent;\n\
    import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
    \ android.net.Uri;\nimport android.os.Bundle;\nimport android.util.Log;\nimport\
    \ android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    import android.widget.EditText;\nimport android.widget.ImageView;\nimport android.widget.TextView;\n\
    import android.widget.Toast;\nimport android.provider.MediaStore.Images.Media;\n\
    import android.content.ContentValues;\n\npublic class MediaStoreCameraIntent extends\
    \ Activity {\n\n    final static int CAMERA_RESULT = 0;\n    Uri imageFileUri;\n\
    \n    // User interface elements, specified in res/layout/main.xml\n    ImageView\
    \ returnedImageView;\n    Button takePictureButton;\n    Button saveDataButton;\n\
    \    TextView titleTextView;\n    TextView descriptionTextView;\n    EditText\
    \ titleEditText;\n    EditText descriptionEditText;\n```\n\nWe are including a\
    \ couple of user interface elements. They are specified as normal in `layout/main.xml`\
    \ and their objects are declared in the foregoing code.\n\n```\n    @Override\n\
    \    public void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
    \n        // Set the content view to be what is defined in the res/layout/main.xml\
    \ file\n        setContentView(R.layout.main);\n\n        // Get references to\
    \ UI elements\n        returnedImageView = (ImageView) findViewById(R.id.ReturnedImageView);\n\
    \        takePictureButton = (Button) findViewById(R.id.TakePictureButton);\n\
    \        saveDataButton = (Button) findViewById(R.id.SaveDataButton);\n      \
    \  titleTextView = (TextView) findViewById(R.id.TitleTextView);\n        descriptionTextView\
    \ = (TextView) findViewById(R.id.DescriptionTextView);\n        titleEditText\
    \ = (EditText) findViewById(R.id.TitleEditText);\n        descriptionEditText\
