    # Acknowledgments


    **About the Author**


    **Shawn Van Every** runs a mobile and streaming media consultancy to help companies
    better utilize emerging technologies related to audio and video with a focus on
    mobile and streaming applications. His clients have ranged from 19 Entertainment,
    MoMA, and Disney to Morgan Stanley, Lehman Brothers, and NYU Medical School, along
    with countless start-ups and other small clients.


    Additionally, Shawn is an Adjunct Assistant Professor of Communication in NYU''s
    Interactive Telecommunications Program. His teaching is varied and includes courses
    on participatory and social media, programming, mobile technologies, and interactive
    telephony. In 2008 he was honored with the David Payne Carter award for excellence
    in teaching.


    He has demonstrated, exhibited, and presented work at many conferences and technology
    demonstrations, including O''Reilly''s Emerging Telephony, O''Reilly''s Emerging
    Technology, ACM Multimedia, Vloggercon, and Strong Angel II. He was a co-organizer
    of the Open Media Developers Summit, Beyond Broadcast (2006), and iPhoneDevCamp
    NYC.


    Shawn holds a Master''s degree in Interactive Telecommunications from NYU and
    a Bachelor''s degree in Media Study from SUNY at Buffalo.


    **About the Technical Reviewer**


    **Steve Bull** has been coding and manipulating mobile devices since his days
    at Paul Allen''s Interval Research in Palo Alto. As a mixed-media technology artist
    and entrepreneur, for the last nine years Bull has created location-specific narratives
    and games that explore the social, technological and creative possibilities of
    cell phones. He can be reached at [www.stevebull.org](http://www.stevebull.org).'
