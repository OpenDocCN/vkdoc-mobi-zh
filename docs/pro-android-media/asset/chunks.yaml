    \ bmp.getWidth()/2, bmp.getHeight()/2);\n```\n\n![](index-74_1.jpg)\n\n**Figure\
    \ 3–9.** *Rotation around the midpoint of the image*\n\n### Scale\n\nAnother useful\
    \ method of `Matrix` is the `setScale` method. It takes in two floats representing\
