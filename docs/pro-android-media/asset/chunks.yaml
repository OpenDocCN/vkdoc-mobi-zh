    \            mediaPlayer.prepareAsync();\n        } catch (IOException e) {\n\
    \            Log.v(\"AUDIOHTTPPLAYER\", e.getMessage());\n        }\n    }\n```\n\
    \nWhat follows is the implementation of the `onClick` method for the two `Button`s.\
    \ When the `stopButton` is pressed, the `MediaPlayer`'s `pause` method will be\
    \ called. When the `startButton` is pressed, the `MediaPlayer`'s `start` method\
    \ is called.\n\n```\n    public void onClick(View v) {\n        if (v == stopButton)\
    \ {\n            mediaPlayer.pause();\n            statusTextView.setText(\"pause\
    \ called\");\n            startButton.setEnabled(true);\n        } else if (v\
    \ == startButton) {\n            mediaPlayer.start();\n            statusTextView.setText(\"\
    start called\");\n            startButton.setEnabled(false);\n            stopButton.setEnabled(true);\n\
    \        }\n    }\n```\n\nIf the `MediaPlayer` enters into an error state, the\
    \ `onError` method will be called on the object that is registered as the `MediaPlayer`'s\
    \ `OnErrorListener`. The following `onError` method shows the various constants\
