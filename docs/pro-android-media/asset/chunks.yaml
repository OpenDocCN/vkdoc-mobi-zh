    That wraps up our sample application, which allows us to browse and select songs
    to play by album using the MediaStore. Using very similar methods, we could build
    it out so that we could browse and select music based upon artist and genre as
    well.


    **Summary**


    As we have discovered throughout this chapter, Android provides a rich set of


    capabilities for working with audio files. The capabilities it offers are implemented
    in a manner similar to those we have used with the image capture capabilities;
    specifically, we can use the built-in applications through an intent or create
    our own custom


    playback application. Also, the MediaStore has special capabilities for audio
    beyond querying for individual audio files—we can use it to search and browse
    for audio based on artist, album, genre, and more.


    In the next chapter, we’ll take this a step further and look at the world opened
    up by harnessing audio not stored on the device, but rather available via the
    Internet.


