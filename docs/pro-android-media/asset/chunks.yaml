    \n要在布局中指定`SurfaceView`，我们只需在任何常规布局 XML 中使用`<SurfaceView />`元素。这是一个基本的布局，它只是在`LinearLayout`中实现了一个用于相机预览的`SurfaceView`。\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    >\n    <SurfaceView \n        android:id=\"@+id/CameraView\" \n        android:layout_width=\"\
    fill_parent\"\n        android:layout_height=\"fill_parent\" />\n</LinearLayout>\n\
    ```\n\n在我们的代码中，为了将此`SurfaceView`与`Camera`类配合使用，我们需要添加一个`SurfaceHolder`。`SurfaceHolder`类可以充当`Surface`的监视器，通过回调为我们提供一个接口，让我们知道`Surface`何时被创建、销毁或更改。`SurfaceView`类方便地为我们提供了一个方法`getHolder()`，用来获取其`Surface`对应的`SurfaceHolder`。\n\
    \n以下是一段代码片段，它访问了布局 XML 中声明的`SurfaceView`并从中获取了一个`SurfaceHolder`。它还将`Surface`设置为“推送”类型的`Surface`，这意味着绘图缓冲区由`Surface`本身外部维护。在本例中，缓冲区由`Camera`类管理。`Camera`预览需要使用“推送”类型的`Surface`。\n\
    \n```java\nSurfaceView cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
    SurfaceHolder surfaceHolder = cameraView.getHolder();\nsurfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    ```\n\n此外，我们还需要在我们的 Activity 中实现`SurfaceHolder.Callback`。这使得当`Surface`被创建、更改或销毁时，我们的\
    \ Activity 能够收到通知。为了实现`Callback`，我们将添加以下方法。\n\n```java\npublic void surfaceChanged(SurfaceHolder\
    \ holder, int format, int w, int h) {}\npublic void surfaceCreated(SurfaceHolder\
    \ holder) {}\npublic void surfaceDestroyed(SurfaceHolder holder) {}\n```\n\n最后，我们需要告诉我们的`SurfaceHolder`将此\
    \ Activity 用作`Callback`处理器。\n\n```java\nsurfaceHolder.addCallback(this);\n```\n\
    \n现在我们的 Activity 应该看起来像这样。\n\n```java\npackage com.apress.proandroidmedia.ch2.snapshot;\n\
    \nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.view.SurfaceHolder;\n\
    import android.view.SurfaceView;\n\npublic class SnapShot extends Activity implements\
    \ SurfaceHolder.Callback {\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
    \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n     \
    \   super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n   \
    \     surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n    }\n\n    public void surfaceChanged(SurfaceHolder\
    \ holder, int format, int w, int h) {}\n\n    public void surfaceCreated(SurfaceHolder\
    \ holder) {}\n\n    public void surfaceDestroyed(SurfaceHolder holder) {}\n}\n\
    ```\n\n### 实现相机\n\n现在我们已经设置好了 Activity 和预览`Surface`，可以开始使用实际的`Camera`对象了。\n\n\
    当`Surface`被创建时（由于`SurfaceHolder.Callback`，这会触发调用我们代码中的`surfaceCreated()`方法），我们可以通过调用`Camera`类的静态`open()`方法来获取一个`Camera`对象。\n\
    \n```java\nCamera camera;\n\npublic void surfaceCreated(SurfaceHolder holder)\
    \ {\n    camera = Camera.open();\n```\n\n接着，我们需要将预览显示设置为当前使用的`SurfaceHolder`（该`SurfaceHolder`通过回调提供给我们的方法）。这个方法需要包裹在`try`/`catch`块中，因为它可能会抛出`IOException`。如果出现这种情况，我们需要释放相机，否则可能会占用相机硬件资源，影响其他应用程序。\n\
    \n```java\ntry {\n    camera.setPreviewDisplay(holder);\n} catch (IOException\
    \ exception) {\n    camera.release();\n}\n```\n\n最后，我们需要启动相机预览。\n\n```java\ncamera.startPreview();\n\
    }\n```\n\n同样，在`surfaceDestroyed()`中，我们也需要释放相机。我们将首先调用`stopPreview()`，以确保一切按预期清理。\n\
    \n```java\npublic void surfaceDestroyed(SurfaceHolder holder) {\n    camera.stopPreview();\n\
    \    camera.release();\n}\n```\n\n运行这段代码，你可能会注意到预览画面有些奇怪。预览图像逆时针旋转了 90 度，如图 2-1\
    \ 所示。\n\n**图 2–1.** *相机预览旋转了 90 度*\n\n发生这种旋转的原因是`Camera`假设方向是水平的（横屏模式）。纠正旋转最简单的方法是将我们的\
    \ Activity 设置为横屏模式。为此，我们可以在 Activity 的`onCreate()`方法中添加以下代码。\n\n```java\n@Override\n\
    public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n```\n\
    \n现在，我们的`Camera`预览画面显示正确，如图 2-2 所示。遗憾的是，我们的应用程序现在被锁定在横屏模式。\n\n**图 2–2.** *横屏模式下的相机预览*\n\
    \n### 设置相机参数\n\n如前所述，`Camera`类有一个内嵌的`Camera.Parameters`类。此类包含一系列重要的属性或设置，可用于更改`Camera`的操作方式。其中一个能立刻帮到我们的设置是处理预览中遇到的旋转/横屏问题。\n\
    \n可以通过以下方式修改`Camera`要使用的`Parameters`：\n\n```java\nCamera.Parameters parameters\
    \ = camera.getParameters();\nparameters.set(\"some parameter\", \"some value\"\
    );\n// 或\nparameters.set(\"some parameter\", some_int);\ncamera.setParameters(parameters);\n\
    ```\n\n有两个不同的通用`Parameters.set()`方法。第一个方法接受两个字符串参数，分别为参数名称和值；第二个方法的参数名称是字符串，但值是整数。\n"
- fmt: "# CHAPTER 2: Building Custom Camera Applications\n\nSetting the Parameters\
    \ should be done in the `surfaceCreated` method right after the Camera is created\
    \ and its preview `Surface` specified. Here is how we can use `Parameters` to\
    \ request that the Camera be used with a portrait orientation rather than landscape.\n\
    \n```\npublic void surfaceCreated(SurfaceHolder holder) {\n    camera = Camera.open();\n\
    \    try {\n        Camera.Parameters parameters = camera.getParameters();\n \
    \       if (this.getResources().getConfiguration().orientation !=\n          \
    \  Configuration.ORIENTATION_LANDSCAPE) {\n            // This is an undocumented\
    \ although widely known feature\n            parameters.set(\"orientation\", \"\
    portrait\");\n            // For Android 2.2 and above\n            //camera.setDisplayOrientation(90);\n\
    \            // Uncomment for Android 2.0 and above\n            //parameters.setRotation(90);\n\
    \        } else {\n            // This is an undocumented although widely known\
    \ feature\n            parameters.set(\"orientation\", \"landscape\");\n     \
    \       // For Android 2.2 and above\n            //camera.setDisplayOrientation(0);\n\
    \            // Uncomment for Android 2.0 and above\n            //parameters.setRotation(0);\n\
    \        }\n        camera.setParameters(parameters);\n        camera.setPreviewDisplay(holder);\n\
    \    } catch (IOException exception) {\n        camera.release();\n        Log.v(LOGTAG,exception.getMessage());\n\
    \    }\n    camera.startPreview();\n}\n```\n\nThe foregoing code first checks\
    \ the device configuration (through a cal to `Context.getResources().getConfiguration()`)\
    \ to see what the current orientation is. If the orientation is not landscape,\
    \ it sets the `Camera.Parameters` “orientation” to be “portrait.” Additional y,\
    \ the `Camera.Parameters.setRotation` method is cal ed, and 90 degrees is passed\
    \ in. This method, which is available in API level 5 (version 2.0) and higher,\
    \ does not actual y do any rotation; rather, it tel s the Camera to specify in\
    \ the EXIF data that the image should be rotated 90 degrees on display. If this\
    \ isn’t included, when you view this image in other applications, it would likely\
    \ be displayed sideways.\n\n**NOTE:** The method shown for modifying the Camera’s\
    \ rotation by using `Camera.Parameters` is for use with Android version 2.1 and\
    \ earlier. In Android 2.2, a new method on the `Camera` class, `setDisplayOrientation(int\
    \ degrees)`, was introduced. This method takes in an integer representing the\
    \ degrees the image should be rotated. The only valid degrees are 0, 90, 180,\
    \ 270.\n\nMost parameters that can or should be modified have specific methods\
    \ associated with them. As we can see with the `setRotation` method, they follow\
    \ the Java getter and setter design pattern. For instance, the flash mode of the\
    \ `Camera` can be set with `setFlashMode(Camera.Parameters.FLASH_MODE_AUTO)` and\
    \ the current value can be gotten with `getFlashMode()` rather than having to\
    \ be done through the generic `Parameters.set` method.\n\nStarting with Android\
    \ 2.0, one fun parameter that we can use for demonstration allows us to change\
    \ effects. The getter and setter are `getColorEffect` and `setColorEffect`. There\
    \ is also a `getSupportedColorEffects` method, which returns a `List` of `String`\
    \ objects with the various effects that are supported on the specific device.\
    \ In fact, this method exists for all of the parameters that have getter and setter\
    \ methods and should be used to ensure that the capability requested is available\
    \ before being used.\n\n```\nCamera.Parameters parameters = camera.getParameters();\n\
    List<String> colorEffects = parameters.getSupportedColorEffects();\nIterator<String>\
    \ cei = colorEffects.iterator();\nwhile (cei.hasNext()) {\n    String currentEffect\
    \ = cei.next();\n    Log.v(\"SNAPSHOT\",\"Checking \" + currentEffect);\n    if\
    \ (currentEffect.equals(Camera.Parameters.EFFECT_SOLARIZE)) {\n        Log.v(\"\
    SNAPSHOT\",\"Using SOLARIZE\");\n        parameters.setColorEffect(Camera.Parameters.EFFECT_SOLARIZE);\n\
    \        break;\n    }\n}\nLog.v(\"SNAPSHOT\",\"Using Effect: \" + parameters.getColorEffect());\n\
    camera.setParameters(parameters);\n```\n\nIn the foregoing code, we first query\
    \ the `Camera.Parameters` object to see what effects are supported through the\
    \ `getSupportedColorEffect` method. We then use an `Iterator` to go through the\
    \ `List` of effects and see if any of them match the one we want, in this case\
    \ `Camera.Parameters.EFFECT_SOLARIZE`. If it appears in the list, it is supported\
    \ and we can go ahead and call `setColorEffect` on the `Camera.Parameters` object,\
    \ passing in the solarize constant. Figure 2–3 shows the `Camera.Parameters.EFFECT_SOLARIZE`\
    \ in action.\n\n![Figure 2–3](index-44_1.jpg)\n\nThe other possibilities are also\
    \ listed as constants within the `Camera.Parameters` class:\n- `EFFECT_NONE`\n\
    - `EFFECT_MONO`\n- `EFFECT_NEGATIVE`\n- `EFFECT_SOLARIZE`\n- `EFFECT_SEPIA`\n\
    - `EFFECT_POSTERIZE`\n- `EFFECT_WHITEBOARD`\n- `EFFECT_BLACKBOARD`\n- `EFFECT_AQUA`\n\
    \nSimilar constants exist for antibanding, flash mode, focus mode, scene mode,\
    \ and white balance.\n\n## Changing the Camera Preview Size\n\nAnother particularly\
    \ useful setting available in `Camera.Parameters` is the ability to set a preview\
    \ size. As with other settings, we’ll first want to query the parameters object\
    \ and get the supported values. Having gotten this list of sizes, we can go through\
    \ it to make sure the size we want is supported before we set it.\n\nIn this example,\
    \ we aren’t specifying an exact size that we want, rather choosing a size that\
    \ is close to but no larger than a couple of constants. Figure 2–4 shows the output\
    \ of this example.\n\n```\n...\npublic static final int LARGEST_WIDTH = 200;\n\
    public static final int LARGEST_HEIGHT= 200;\n...\n```\n\nAs with all `Camera.Parameters`,\
    \ we’ll want to get and set them in `surfaceCreated` after we have opened the\
    \ camera and set its preview display `Surface`.\n\n```\npublic void surfaceCreated(SurfaceHolder\
    \ holder) {\n    camera = Camera.open();\n    try {\n        camera.setPreviewDisplay(holder);\n\
    \        Camera.Parameters parameters = camera.getParameters();\n```\n\nWe’ll\
    \ keep track of the closest values that are under our constant in these two variables:\n\
    ```\n        int bestWidth = 0;\n        int bestHeight = 0;\n```\n\nThen we’ll\
    \ get the list of all of the supported sizes on our device. This returns a `List`\
    \ of `Camera.Size` objects that we can loop through.\n\n```\n        List<Camera.Size>\
    \ previewSizes = parameters.getSupportedPreviewSizes();\n        if (previewSizes.size()\
    \ > 1)\n        {\n            Iterator<Camera.Size> cei = previewSizes.iterator();\n\
    \            while (cei.hasNext())\n            {\n                Camera.Size\
    \ aSize = cei.next();\n```\n\nIf the current size in the list is larger than our\
    \ saved best sizes and smaller than or equal to our `LARGEST_WIDTH` and `LARGEST_HEIGHT`\
    \ constants, then we save that height and width in our `bestWidth` and `bestHeight`\
    \ variables and continue checking.\n\n```\n                Log.v(\"SNAPSHOT\"\
    ,\"Checking \" + aSize.width + \" x \" + aSize.height);\n                if (aSize.width\
    \ > bestWidth && aSize.width <= LARGEST_WIDTH\n                    && aSize.height\
    \ > bestHeight && aSize.height <= LARGEST_HEIGHT) {\n                    // So\
    \ far it is the biggest without going over the screen dimensions\n           \
    \         bestWidth = aSize.width;\n                    bestHeight = aSize.height;\n\
    \                }\n            }\n```\n\nAfter we have finished going through\
    \ the supported sizes, we make sure we got something out. If our `bestHeight`\
    \ and `bestWidth` variables are equal to 0, then we didn’t find anything that\
    \ matched our needs, or there is only one supported size and we shouldn’t take\
    \ any action. If, on the other-hand, they have values, we’ll call `setPreviewSize`\
    \ with the `bestWidth` and `bestHeight` variables on the `Camera.Parameters` object.\n\
    \n![Figure 2–4](index-46_1.jpg)"
