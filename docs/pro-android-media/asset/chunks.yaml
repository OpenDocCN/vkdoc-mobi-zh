    ### Location


    Since we are accessing these services on mobile devices whose location may change,
    it may be interesting to utilize location as part of the request. Searching for
    “waterfront” on Flickr in one place will then yield different results from searching
    in another place.


    Android provides us with a `LocationManager` class, which we can use to look up
    and track location changes in our applications.


    Here is a quick snippet of code illustrating how we can harness `LocationManager`
    and listen for location updates.


    ```java

