  trans: "\n# 第 2 章：构建自定义相机应用\n\n`<application>`\n\n`<uses-sdk android:minSdkVersion=\"\
    8\" />`\n\n`<uses-permission android:name=\"android.permission.CAMERA\"></uses-permission>`\
    \ `</manifest>`\n\n以上内容涵盖了构建自定义相机应用的基础知识。接下来，让我们看看如何扩展这个应用，实现内置相机应用中没有的功能。\n\n\
    ## 扩展自定义相机应用\n\n在我看来，Android 内置相机应用缺少一些基本功能。其中之一是在短时间内（例如 10 秒或 30 秒）拍摄照片的能力。这个功能对于可以安装在三脚架上的相机来说通常很有用。它允许摄影师先设置好拍摄场景，设定定时器，然后自己跑进画面中。\n\
    \n虽然这并非手机常用功能，但我认为在某些情况下它会非常有用。例如，当我想给自己和同行的人拍合影时，我就很需要这个功能。目前尝试这样做时，我会遇到困难，因为触摸屏朝向外面，我看不到界面。我只能手忙脚乱地到处点屏幕，希望能按到快门按钮。\n\
    \n## 构建基于定时器的相机应用\n\n为了改善上述情况，我们可以在拍照时添加一个时间延迟。让我们更新`SnapShot`示例，使得按下按钮十秒后拍摄照片。\n\
    \n为了实现这一点，我们需要使用类似`java.util.Timer`的东西。不幸的是，在 Android 中使用`Timer`会引入一个单独的线程，从而带来一些复杂性。为了让单独的线程与\
    \ UI 交互，我们需要使用`Handler`来让操作在主线程上执行。\n\n`Handler`的另一个用途是安排某些事情在将来发生。`Handler`的这一功能使得我们无需使用`Timer`。\n\
    \n要创建一个将在将来执行某操作的`Handler`，我们只需构造一个通用的`Handler`：\n\n```\nHandler timerHandler\
    \ = new Handler();\n```\n\n然后我们必须创建一个`Runnable`。这个`Runnable`的`run`方法将包含稍后要执行的操作。在我们的例子中，我们希望这个操作在十秒后触发拍照：\n\
    \n```\nRunnable timerTask = new Runnable() {\n    public void run() {\n      \
    \  camera.takePicture(null, null, null, TimerSnapShot.this);\n    }\n};\n```\n\
    \n这样就差不多了。现在，当我们按下按钮时，我们只需安排它：\n\n```\ntimerHandler.postDelayed(timerTask, 10000);\n\
    ```\n\n这告诉`timerHandler`在 10 秒（10000 毫秒）后调用我们的`timerTask`方法。\n\n在下面的示例中，我们将创建一个`Handler`，并让它每秒调用一次方法。这样，我们就可以在屏幕上向用户显示倒计时。\n\
    \n```\npackage com.apress.proandroidmedia.ch2.timersnapshot;\n\nimport java.io.FileNotFoundException;\n\
    import java.io.IOException;\nimport java.io.OutputStream;\nimport java.util.Iterator;\n\
    import java.util.List;\n\nimport android.app.Activity;\nimport android.content.ContentValues;\n\
    import android.content.res.Configuration;\nimport android.hardware.Camera;\nimport\
    \ android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Handler;\nimport\
    \ android.provider.MediaStore.Images.Media;\nimport android.util.Log;\nimport\
    \ android.view.SurfaceHolder;\nimport android.view.SurfaceView;\nimport android.view.View;\n\
    import android.view.View.OnClickListener;\nimport android.widget.Button;\nimport\
    \ android.widget.TextView;\nimport android.widget.Toast;\n\npublic class TimerSnapShot\
    \ extends Activity implements OnClickListener,\n        SurfaceHolder.Callback,\
    \ Camera.PictureCallback {\n\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
    \    Camera camera;\n```\n\n这个活动与我们的`SnapShot`活动非常相似。我们将添加一个`Button`来触发倒计时开始，以及一个`TextView`来显示倒计时。\n\
    \n```\n    Button startButton;\n    TextView countdownTextView;\n```\n\n我们还需要一个`Handler`，这里称为`timerUpdateHandler`，一个`Boolean`变量来帮助我们跟踪定时器是否已启动（`timerRunning`），以及一个整数（`currentTime`）来跟踪倒计时。\n\
    \n```\n    Handler timerUpdateHandler;\n    boolean timerRunning = false;\n  \
    \  int currentTime = 10;\n```\n\n```\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n\n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
    \        surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n```\n\n接下来，我们将获取对新的 UI 元素（在布局 XML 中定义）的引用，并让我们的活动成为该`Button`的`OnClickListener`。我们之所以能做到这一点，是因为我们的活动实现了`OnClickListener`。\n\
    \n```\n        countdownTextView = (TextView) findViewById(R.id.CountDownTextView);\n\
    \        startButton = (Button) findViewById(R.id.CountDownButton);\n        startButton.setOnClickListener(this);\n\
    ```\n\n在`onCreate`方法中，我们要做的最后一件事是实例化我们的`Handler`对象。\n\n```\n        timerUpdateHandler\
    \ = new Handler();\n    }\n```\n\n当`startButton`按钮被按下时，将调用我们的`onClick`方法。我们将通过检查`timerRunning`布尔变量来确保定时器例程尚未运行，如果未运行，我们将通过我们的`Handler`对象`timerUpdateHandler`立即调用`timerUpdateTask`\
    \ `Runnable`。\n\n```\n    public void onClick(View v) {\n        if (!timerRunning)\n\
    \        {\n            timerRunning = true;\n            timerUpdateHandler.post(timerUpdateTask);\n\
    \        }\n    }\n```\n\n这是我们的`Runnable`，名为`timerUpdateTask`。这个对象包含了将由我们的`timerUpdateHandler`对象触发的`run`方法。\n\
    \n```\n    private Runnable timerUpdateTask = new Runnable() {\n        public\
    \ void run()\n        {\n```\n\n如果保存倒计时的整数`currentTime`大于 1，我们将使其递减，并在 1 秒后再次调度`Handler`调用。\n\
    \n```\n            if (currentTime > 1)\n            {\n                currentTime--;\n\
    \                timerUpdateHandler.postDelayed(timerUpdateTask, 1000);\n    \
    \        }\n            else\n            {\n```\n\n如果`currentTime`不大于 1，我们将实际触发相机拍照，并重置所有跟踪变量。\n\
    \n```\n                camera.takePicture(null, null, TimerSnapShot.this);\n \
    \               timerRunning = false;\n                currentTime = 10;\n   \
    \         }\n```\n\n无论如何，我们都会更新`TextView`以显示拍照前剩余的当前时间。\n\n```\n            countdownTextView.setText(\"\
    \" + currentTime);\n        }\n    };\n```\n\n活动的其余部分与前面的`SnapShot`示例基本相同。\n\n\
    ```\n    public void surfaceChanged(SurfaceHolder holder, int format, int w, int\
    \ h) {\n        camera.startPreview();\n    }\n\n    public void surfaceCreated(SurfaceHolder\
    \ holder) {\n        camera = Camera.open();\n        try {\n            camera.setPreviewDisplay(holder);\n\
    \n            Camera.Parameters parameters = camera.getParameters();\n\n     \
    \       if (this.getResources().getConfiguration().orientation !=\n          \
    \          Configuration.ORIENTATION_LANDSCAPE)\n            {\n             \
    \   parameters.set(\"orientation\", \"portrait\");\n                // 适用于 Android\
    \ 2.2 及以上版本\n                camera.setDisplayOrientation(90);\n             \
    \   // 适用于 Android 2.0 及以上版本\n                parameters.setRotation(90);\n  \
    \          }\n\n            camera.setParameters(parameters);\n        }\n   \
    \     catch (IOException exception)\n        {\n            camera.release();\n\
    \        }\n    }\n\n    public void surfaceDestroyed(SurfaceHolder holder) {\n\
    \        camera.stopPreview();\n        camera.release();\n    }\n\n    public\
    \ void onPictureTaken(byte[] data, Camera camera) {\n        Uri imageFileUri\
    \ =\n                getContentResolver().insert(Media.EXTERNAL_CONTENT_URI, new\
    \ ContentValues());\n\n        try {\n            OutputStream imageFileOS =\n\
    \                    getContentResolver().openOutputStream(imageFileUri);\n  \
    \          imageFileOS.write(data);\n            imageFileOS.flush();\n      \
    \      imageFileOS.close();\n\n            Toast t = Toast.makeText(this, \"已保存\
    \ JPEG！\", Toast.LENGTH_SHORT);\n            t.show();\n        } catch (FileNotFoundException\
    \ e) {\n        }\n    }\n}\n```\n"
- fmt: "## CHAPTER 2: Building Custom Camera Applications\n\n`Toast t = Toast.makeText(this,\
    \ e.getMessage(), Toast.LENGTH_SHORT);`\n`t.show();`\n\n`} catch (IOException\
    \ e) {`\n`Toast t = Toast.makeText(this, e.getMessage(), Toast.LENGTH_SHORT);`\n\
    `t.show();`\n`}`\n`camera.startPreview();`\n`}`\n`}`\n\nThe layout XML is a bit\
    \ different. In this application, we are displaying the Camera preview `SurfaceView`\
    \ within a `FrameLayout` along with a `LinearLayout` that contains the `TextView`\
    \ for displaying the countdown and the `Button` for triggering the countdown.\
    \ The `FrameLayout` aligns all of its children to the top left and on top of each\
    \ other. This way the `TextView` and `Button` appear over top of the Camera preview.\n\
    \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
    \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
    >\n    <FrameLayout\n        android:id=\"@+id/FrameLayout01\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\">\n        <SurfaceView\n\
    \            android:id=\"@+id/CameraView\"\n            android:layout_width=\"\
    fill_parent\"\n            android:layout_height=\"fill_parent\"></SurfaceView>\n\
    \        <LinearLayout\n            android:id=\"@+id/LinearLayout01\"\n     \
    \       android:layout_width=\"wrap_content\"\n            android:layout_height=\"\
    wrap_content\">\n            <TextView\n                android:id=\"@+id/CountDownTextView\"\
    \n                android:text=\"10\"\n                android:textSize=\"100dip\"\
    \n                android:layout_width=\"fill_parent\"\n                android:layout_height=\"\
    wrap_content\"\n                android:layout_gravity=\"center_vertical|center_horizontal|center\"\
    ></TextView>\n            <Button\n                android:layout_width=\"wrap_content\"\
    \n                android:layout_height=\"wrap_content\"\n                android:id=\"\
    @+id/CountDownButton\"\n                android:text=\"Start Timer\"></Button>\n\
    \        </LinearLayout>\n    </FrameLayout>\n</LinearLayout>\n```\n\nLast, we\
    \ need to make sure our `AndroidManifest.xml` file contains the `CAMERA` permission.\n\
    \n```\n<uses-permission android:name=\"android.permission.CAMERA\"></uses-permission>\n\
    ```\n\n![Figure 2-5](index-57_1.jpg)\n\n**Figure 2–5.** Camera with countdown\
    \ timer\n\n## Building a TimeLapse Photography App\n\nWe have all seen beautiful\
    \ examples of timelapse photography. It is the process of taking several pictures\
    \ over an even course of time. It could be one per minute, one per hour, or even\
    \ one per week. Looking through a series of timelapse photographs, we can see\
    \ how something changes over time. One example might be watching a building being\
    \ constructed, another might be documenting how a flower grows and blooms.\n\n\
    Now that we have built a timer-based camera app, updating it to be a timelapse\
    \ app is fairly straightforward.\n\nFirst we'll change up some of the instance\
    \ variables and add in a constant.\n\n```java\npublic class TimelapseSnapShot\
    \ extends Activity implements OnClickListener,\n    SurfaceHolder.Callback, Camera.PictureCallback\
    \ {\n\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n    Camera\
    \ camera;\n```\n\nWe'll rename the `Button` to be `startStopButton` as it will\
    \ now handle both actions and perform a few minor naming updates to the rest of\
    \ the variables.\n\n```java\n    Button startStopButton;\n    TextView countdownTextView;\n\
    \    Handler timerUpdateHandler;\n    boolean timelapseRunning = false;\n```\n\
    \nThe `currentTime` integer will be used to count up to the amount of time between\
    \ photos in seconds instead of down from the total delay, as in the previous example.\
    \ A constant called `SECONDS_BETWEEN_PHOTOS` is set to `60`. As its name implies,\
    \ this will be used to determine the time to wait between photos.\n\n```java\n\
    \    int currentTime = 0;\n    public static final int SECONDS_BETWEEN_PHOTOS\
    \ = 60; // one minute\n```\n\nThe `onCreate` method will largely remain the same—only\
    \ the new variable names will be referenced.\n\n```java\n    @Override\n    public\
    \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
    \        surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n        countdownTextView = (TextView)\
    \ findViewById(R.id.CountDownTextView);\n        startStopButton = (Button) findViewById(R.id.CountDownButton);\n\
    \        startStopButton.setOnClickListener(this);\n        timerUpdateHandler\
    \ = new Handler();\n    }\n```\n\nThe bulk of the changes to make this into a\
    \ timelapse application from a single timer-based application will come in the\
    \ `onClick` method, which is what happens when the button is pressed and in the\
    \ `Runnable` method that is scheduled by the `Handler`.\n\nThe `onClick` method\
    \ first checks to see if the timelapse processes are currently going (the `Button`\
    \ has previously been pressed), and if not, it sets it to running and calls the\
    \ `Handler`'s `post` method with the `Runnable` (described here) as the argument.\n\
    \nIf the timelapse process is going, the button press is meant to stop it, so\
    \ the `removeCallbacks` method on the `Handler`, `timerUpdateHandler`, is called.\
    \ This will clear any pending calls to the `Runnable` that are passed in as an\
    \ argument.\n\n```java\n    public void onClick(View v) {\n        if (!timelapseRunning)\
    \ {\n            startStopButton.setText(\"Stop\");\n            timelapseRunning\
    \ = true;\n            timerUpdateHandler.post(timerUpdateTask);\n        } else\
    \ {\n            startStopButton.setText(\"Start\");\n            timelapseRunning\
    \ = false;\n            timerUpdateHandler.removeCallbacks(timerUpdateTask);\n\
    \        }\n    }\n```\n\nAs we are dealing with a `Handler` to do the scheduling,\
    \ we have a `Runnable` that the `Handler` calls upon when the time comes. In the\
    \ `run` method of our `Handler`, we first check to see if the `currentTime` integer\
    \ is less than the number of seconds we want to wait between photos (`SECONDS_BETWEEN_PHOTOS`).\
    \ If it is, we simply increment `currentTime`. If the `currentTime` isn't less\
    \ than the period to wait, we tell the `Camera` to take a picture and set `currentTime`\
    \ back to `0` so it continues counting up.\n\nAfter each of these cases, we simply\
    \ update our `TextView` with the `currentTime` and schedule a call back to ourselves\
    \ in another second.\n\n```java\n    private Runnable timerUpdateTask = new Runnable()\
    \ {\n        public void run() {\n            if (currentTime < SECONDS_BETWEEN_PHOTOS)\
    \ {\n                currentTime++;\n            } else {\n                camera.takePicture(null,\
    \ null, null, TimelapseSnapShot.this);\n                currentTime = 0;\n   \
    \         }\n            timerUpdateHandler.postDelayed(timerUpdateTask, 1000);\n\
    \            countdownTextView.setText(\"\" + currentTime);\n        }\n    };\n\
    }\n```\n\nThe `res/layout/main.xml` interface and, of course, `AndroidManifest.xml`\
    \ for this example are the same as the single countdown timer version.\n\n## Summary\n\
    \nAs you can see, there are myriad reasons that we might want to build our own\
    \ camera-based application rather than just utilizing the built-in application\
    \ in our own app. The sky is the limit with what you can accomplish, from simply\
    \ creating an application that takes a picture after a countdown to building your\
    \ own timelapse system and more.\n\nMoving forward, we'll look at what we can\
    \ do with these images now that they are captured."
