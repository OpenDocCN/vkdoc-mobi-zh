    further.


    **Controlling a MediaPlayer in a Service**


    Unfortunately, when using a Service, issuing commands to the MediaPlayer from
    the


    user-facing activity becomes more complicated.


    In order to allow the MediaPlayer to be controlled, we need to bind the activity
    and Service together. Once we do that, since the activity and Service are running
    in the same process, we can call methods in the Service directly. If we were creating
    a remote Service, we would have to take further steps.


