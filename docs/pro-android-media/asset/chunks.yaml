    \n## 第 4 章：图形与触摸事件\n\n**图 4-19.** 使用质量设置 90 保存为 JPEG 的图像\n\n**图 4-20.** 使用质量设置\
    \ 10 保存为 JPEG 的图像；其文件大小不到质量设置 90 所保存图像的六分之一。\n\n## 小结\n\n正如我们所探讨的，在 Android 上使用基于画布的绘图可以实现很多功能。这为我们的第一部分探索画上了句号，这部分主要处理静态图像。我们讨论的大部分内容仅仅触及了可能性的表面，但这为创建自己的应用程序提供了一个良好的起点，无论是利用相机、执行图像处理，还是具备绘图功能。\n\
    \n接下来，我们将把目光投向音频！\n\n---\n\n## 第 5 章：音频简介\n"
- fmt: "### **Android**\n\nAny smartphone worth its name these days has audio playback\
    \ capabilities on par with dedicated portable media devices or MP3 players. Of\
    \ course, Android-based devices are no different. These capabilities allow for\
    \ the building of music player, audio book, podcast, or just about any other type\
    \ of application that is centered around audio playback.\n\nIn this chapter, we’ll\
    \ explore what Android’s capabilities are in terms of format and codec support,\
    \ and we’ll build a few different playback applications. Furthermore we’ll look\
    \ at what Android supports in the way of audio formats and metadata.\n\n### Audio\
    \ Playback\n\nAs mentioned, Android supports audio playback capabilities on par\
    \ with MP3 players. In fact, it probably goes a step further since it supports\
    \ a fairly wide range of audio formats, more than most hardware players. This\
    \ is one of the benefits of smartphones that perform functions previously relegated\
    \ to dedicated hardware, since they have good faculties for running a variety\
    \ of software; like a computer, they can offer a wide range of support for different\
    \ and changing technologies that are simply not practical to build into the firmware\
    \ of hardware-centric devices.\n\n#### Supported Audio Formats\n\nAndroid supports\
    \ a variety of audio file formats and codecs for playback (it supports fewer for\
    \ recording, which we’ll discuss when we go over recording).\n\n*   **AAC**: Advanced\
    \ Audio Coding codec (as well as both profiles of HE—AAC, High Efficiency AAC),\
    \ `.m4a (audio/m4a)` or `.3gp (audio/3gpp)` files. AAC is a popular standard that\
    \ is used by the iPod and other portable media players. Android supports this\
    \ audio format inside of MPEG-4 audio files and inside of 3GP files (which are\
    \ based on the MPEG-4 format). Recent additions to the AAC specification, High\
    \ Efficiency AAC are also supported.\n*   **MP3**: MPEG-1 Audio Layer 3, `.mp3\
    \ (audio/mp3)` files. MP3, probably the most widely used audio codec, is supported.\
    \ This allows Android to utilize the vast majority of audio available online through\
    \ various web sites and music stores.\n*   **AMR**: Adaptive Multi-Rate codec\
    \ (both AMR Narrowband, AMR-NB, and AMR Wideband, AMR-WB), `.3gp (audio/3gpp)`\
    \ or `.amr (audio/amr)` files. AMR is the audio codec that has been standardized\
    \ as the primary voice audio codec in use by the 3GPP (3rd Generation Partnership\
    \ Project). The 3GPP is a telecommunications industry organization that creates\
    \ specifications for the partner companies to use. In other words, the AMR codec\
    \ is what is primarily used for voice calling applications on modern mobile phones\
    \ and generally supported across mobile handset manufacturers and carriers. As\
    \ such, this codec is generally useful for voice encoding but doesn’t perform\
    \ well for more complex types of audio such as music.\n*   **Ogg**: Ogg Vorbis,\
    \ `.ogg (application/ogg)` files. Ogg Vorbis is an open source, patent-free audio\
    \ codec with quality that is comparable to commercial and patent-encumbered codecs\
    \ such as MP3 and AAC. It was developed by volunteers and is currently maintained\
    \ by the Xiph.Org foundation.\n*   **PCM**: Pulse Code Modulation commonly used\
    \ in WAVE or WAV files (Waveform Audio Format), `.wav (audio/x-wav)` files. PCM\
    \ is the technique used for storing audio on computers and other digital audio\
    \ devices. It is generally an uncompressed audio file with data that represents\
    \ the amplitude of a piece of audio over time. The “sample rate” is how often\
    \ an amplitude reading is stored. The “bit-depth” is how many bits are used to\
    \ represent an individual sample. A piece of audio data with a sample rate of\
    \ 16kHz and a bit-depth of 32 bits means that it will contain 32 bits of data\
    \ representing the amplitude of the audio and it will have 16,000 of these per\
    \ second. The higher the sample rate and the higher the bit-depth, the more accurate\
    \ the digitization of the audio is. Sample rate and bit-depth also determine how\
    \ large the audio file will be when its length is taken into account. Android\
    \ supports PCM audio data within WAV files. WAV is a long-standing standard audio\
    \ format on PCs.\n\n### Using the Built-In Audio Player via an Intent\n\nAs with\
    \ using the camera, the easiest way to provide the ability to play an audio file\
    \ within an application is to leverage the capabilities of the built-in “Music”\
    \ application. This application plays all of the formats that Android supports,\
    \ has a familiar interface to the user, and can be triggered to play a specific\
    \ file via an intent.\n\nThe generic `android.content.Intent.ACTION_VIEW` intent\
    \ with the data set to a `Uri` to the audio file and the MIME type specified allows\
    \ Android to pick the appropriate application for playback. This should be the\
    \ Music application, but the user may be presented with other options if he or\
    \ she has other audio playback software installed.\n\n```java\nIntent intent =\
    \ new Intent(android.content.Intent.ACTION_VIEW);\nintent.setDataAndType(audioFileUri,\
    \ \"audio/mp3\");\nstartActivity(intent);\n```\n\n**NOTE:** MIME stands for Multipurpose\
    \ Internet Mail Extensions. It was originally specified to help e-mail clients\
    \ send and receive attachments. Its use, though, has extended greatly beyond e-mail\
    \ to many other communication protocols, including HTTP or standard web serving.\
    \ Android uses MIME types when resolving an intent, specifically to help determine\
    \ which application should handle the intent.\n\nEach file type has a specific\
    \ (sometimes more than one) MIME type. This type is specified using at least two\
    \ parts with slashes between them. The first is the more generic type, such as\
    \ “audio.” The second part is the more specific type, such as “mpeg.” A generic\
    \ type “audio” and a more specific type “mpeg” would yield a MIME type string\
    \ of `audio/mpeg`, which is the MIME type typically used for MP3 files.\n\nHere\
    \ is a full example of triggering the built-in audio player application through\
    \ an intent:\n\n```java\npackage com.apress.proandroidmedia.ch5.intentaudioplayer;\n\
    \nimport java.io.File;\n\nimport android.app.Activity;\nimport android.content.Intent;\n\
    import android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    \nOur activity wil be listening for a Button to be pressed before it triggers\
    \ the playback of the audio. It implements OnClickListener so that it can respond.\n\
    \npublic class AudioPlayer extends Activity implements OnClickListener {\n\n \
    \   Button playButton;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \nAfter we set the content view to our XML, we can get a reference to our Button\
    \ in code and set our activity (this) to be the OnClickListener.\n\n        playButton\
    \ = (Button) this.findViewById(R.id.Button01);\n        playButton.setOnClickListener(this);\n\
    \    }\n\nWhen our Button is clicked, the onClick method is cal ed. In this method,\
    \ we construct the intent with a generic android.content.Intent.ACTION_VIEW and\
    \ then create a File object that is a reference to an audio file that exists on\
    \ the SD card. In this case, the audio file is one that is manual y placed on\
    \ the SD card in the “Music” directory, which is the standard location for music-related\
    \ audio files.\n\n    public void onClick(View v) {\n        Intent intent = new\
    \ Intent(android.content.Intent.ACTION_VIEW);\n        File sdcard = Environment.getExternalStorageDirectory();\n\
    \        File audioFile = new File(sdcard.getPath() + \"/Music/goodmorningandroid.mp3\"\
    ); \n\n        Next, we set the data of the intent to be a Uri derived from the\
    \ audio file and the type to be its MIME type, audio/mp3\\. Final y, we trigger\
    \ the built-in application to launch via the startActivity cal passing in our\
    \ intent. Figure 5–1 shows the built-in application playing the audio file.\n\n\
    \        intent.setDataAndType(Uri.fromFile(audioFile), \"audio/mp3\");\n    \
    \    startActivity(intent);\n    }\n}\n```\n\nHere is a simple Layout XML file\
    \ specifying the Button with the text “Play Audio” to be used with the foregoing\
    \ activity.\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\"\n    >\n    <Button android:text=\"Play Audio\" android:id=\"@+id/Button01\"\
    \n        android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
    ></Button>\n</LinearLayout>\n```\n\n**Figure 5–1.** Android’s built-in music player\
    \ playing an audio file specified via an intent.\n\n### Creating a Custom Audio\
    \ Playing Application\n\nOf course, we aren’t limited to using Android’s built-in\
    \ application for audio playback. We can write our own application that offers\
    \ playback capabilities and more.\n\nTo enable this, Android includes a `MediaPlayer`\
    \ class. This class is used for the playback and control of both audio and video.\
    \ Right now we’ll just be using the audio playback capabilities.\n\nThe simplest\
    \ `MediaPlayer` example is to play back an audio file that is packaged with the\
    \ application itself. In order to do that, an audio file should be placed within\
    \ the application’s raw resources. To do this using the Android Developer Tools\
    \ on Eclipse, we need to create a new folder in our Project’s `res` folder called\
    \ `raw` as illustrated in Figure 5–2\\. The Android Developer Tools will generate\
    \ a resource id for this file in the `R.java` file (in the `gen` folder) with\
    \ the syntax `R.raw.file_name_without_extension`.\n\n**Figure 5–2.** Custom audio\
    \ player Eclipse Project layout showing audio file located in `raw` folder inside\
    \ `res` folder.\n\n#### Starting the Media Player\n\nCreating a `MediaPlayer`\
    \ for this audio file is straightforward. We instantiate a `MediaPlayer` object\
    \ using the static method `create`, passing in `this` as a `Context` (which `Activity`\
    \ is descended from) and the generated resource ID of the audio file.\n\n```java\n\
    MediaPlayer mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);\n\
    ```\n\nFollowing that, we simply call the `start` method on the `MediaPlayer`\
    \ object to play it.\n\n```java\nmediaPlayer.start();\n```\n\n##### LOCAL ASSETS\n\
    \nWhen placing assets in the `res` folder of an Android Developer Tools/Eclipse\
    \ project, a couple of things have to be considered: the file extension and using\
    \ `Uri`s.\n\n**File Extensions**\n\nThe extension is removed, so files with the\
    \ same base name but different extensions will cause issues.\n\nYou wouldn’t want\
    \ to put a file named `goodmorningandroid.mp3` and another file named `goodmorningandroid.m4a`\
    \ in there. Instead, if you would like to provide the same audio in multiple formats,\
    \ it would be better if you included the format as part of the file name so that\
    \ you can differentiate between them and the Android Developer Tools doesn’t have\
    \ problems generating the resource ID. If you name them `goodmorningandroid_mp3.mp3`\
    \ and `goodmorningandroid_m4a.m4a`, you will be able to reference them as `R.raw.goodmorningandroid_mp3`\
    \ and `R.raw.goodmorningandroid_m4a` respectively.\n\n**Uris for Resource Files**\n\
    \nWhile resource IDs are great for some purposes, they don’t suit all. As we already\
    \ know, many things in Android can be accomplished using a `Uri`. Fortunately,\
    \ it is easy to construct a `Uri` for a file that has been placed in the resources.\
    \ The resource ID can be appended to the end of a string, which can be used to\
    \ construct the `Uri`. The string must start with `android.resource://`, followed\
    \ by the package name of the application that the resources are local to, followed\
    \ by the resource ID of the file.\n\nHere is an example:\n\n```java\nUri fileUri\
    \ = Uri.parse(\"android.resource://com.apress.proandroidmedia.ch5.customaudio/\"\
    \n    + R.raw.goodmorningandroid);\n```\n\nTo use the `MediaPlayer` with a `Uri`\
    \ instead of a resource ID, which we will have to do if the file isn’t part of\
    \ the application, we can call a `create` method passing in the context and the\
    \ `Uri`.\n\n```java\nMediaPlayer mediaPlayer = MediaPlayer.create(this, fileUri);\n\
    ```\n\n#### Controlling Playback\n\nThe `MediaPlayer` class has several nested\
    \ classes that are interfaces for listening to events that the `MediaPlayer` sends.\
    \ These events relate to state changes.\n\nFor instance, the `MediaPlayer` will\
    \ call the `onCompletion` method on a class that implements the `OnCompletionListener`\
    \ and is registered via the `setOnCompletionListener`. This will be done when\
    \ an audio file is done playing.\n\nHere is a full example of an activity that\
    \ infinitely repeats, playing the same audio file by using the `OnCompletionListener`.\
    \ The `MediaPlayer` object is initialized and playback started in the `onStart`\
    \ method, with playback stopped and the `MediaPlayer` object released in the `onStop`\
    \ method. This prevents the audio from playing when the activity is no longer\
    \ in the front but restarts it when the activity is brought to the front again.\n\
    \n```java\npackage com.apress.proandroidmedia.ch5.customaudio;\n\nimport android.app.Activity;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
    import android.os.Bundle;\n\npublic class CustomAudioPlayer extends Activity implements\
    \ OnCompletionListener {\n\n    MediaPlayer mediaPlayer;\n\n    @Override\n  \
    \  public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
