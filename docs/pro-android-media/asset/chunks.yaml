    \ {`\n\n`MEDIA_INFO_METADATA_UPDATE` is available in Android 2.0 and higher. It\
    \ is triggered when new metadata is available.\n\n`Log.v(LOGTAG, \"MediaInfo,\
    \ Media Info Metadata Update \" + extra);`\n\n`}`\n\n`return false;`\n\n`}`\n\n\
    Following a successful preparation by the `MediaPlayer` to start playback, the\
    \ `onPrepared` method will be called. This is specified as part of the `OnPreparedListener`\
    \ interface that we are implementing. Once this method is called, the `MediaPlayer`\
    \ has entered the “prepared” state and is ready to play.\n\n```\npublic void onPrepared(MediaPlayer\
    \ mp) {\n    Log.v(LOGTAG, \"onPrepared Called\");\n```\n\nBefore we can play\
    \ the video, we should set the size of the `Surface` to match the video or the\
    \ display size, depending on which is smaller. First we get the dimensions of\
    \ the video using the `getVideoWidth` and `getVideoHeight` methods available on\
    \ the `MediaPlayer` object.\n\n```\nvideoWidth = mp.getVideoWidth();\nvideoHeight\
    \ = mp.getVideoHeight();\n```\n\nIf the width or height of the video is greater\
    \ than the display, then we’ll figure out the ratio we should use.\n\n```\nif\
    \ (videoWidth > currentDisplay.getWidth() ||\n    videoHeight > currentDisplay.getHeight())\
    \ {\n    float heightRatio = (float) videoHeight / (float) currentDisplay.getHeight();\n\
    \    float widthRatio = (float) videoWidth / (float) currentDisplay.getWidth();\n\
    \    if (heightRatio > 1 || widthRatio > 1) {\n```\n\nWe’ll use whichever ratio\
    \ is bigger and set the `videoHeight` and `videoWidth` by dividing the video size\
    \ by the larger ratio.\n\n```\n        if (heightRatio > widthRatio) {\n     \
    \       videoHeight = (int) Math.ceil((float) videoHeight / (float) heightRatio);\n\
    \            videoWidth = (int) Math.ceil((float) videoWidth / (float) heightRatio);\n\
    \        } else {\n            videoHeight = (int) Math.ceil((float) videoHeight\
    \ / (float) widthRatio);\n            videoWidth = (int) Math.ceil((float) videoWidth\
    \ / (float) widthRatio);\n        }\n    }\n}\n```\n\nWe can now set the size\
    \ of the `SurfaceView` we are displaying the video in to be either the actual\
    \ dimensions of the video or the resized dimensions if the video was bigger than\
    \ the display.\n\n```\nsurfaceView.setLayoutParams(\n    new LinearLayout.LayoutParams(videoWidth,\
    \ videoHeight));\n```\n\nFinally, we can start the playback of the video by calling\
    \ the `start` method on the `MediaPlayer` object.\n\n```\nmp.start();\n}\n```\n\
    \n`onSeekComplete` is specified as part of the `OnSeekListener` that we are implementing,\
    \ and our activity is the registered listener for our `MediaPlayer`. It is called\
    \ when a seek command has completed.\n\n```\npublic void onSeekComplete(MediaPlayer\
    \ mp) {\n    Log.v(LOGTAG, \"onSeekComplete Called\");\n}\n```\n\n`onVideoSizeChanged`\
    \ is specified as part of the `OnVideoSizeChangedListener` that we are implementing,\
    \ and our activity is the registered listener for our `MediaPlayer`. It is called\
    \ when a size change occurs. It will be called at least once after the data source\
    \ is specified and the video metadata is read.\n\n```\npublic void onVideoSizeChanged(MediaPlayer\
    \ mp, int width, int height) {\n    Log.v(LOGTAG, \"onVideoSizeChanged Called\"\
    );\n}\n}\n```\n\nHere is the layout XML file, `main.xml`, for use with the foregoing\
    \ activity.\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n\
    \    xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
    vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
    fill_parent\"\n    android:id=\"@+id/MainView\">\n    <SurfaceView\n        android:id=\"\
    @+id/SurfaceView\"\n        android:layout_height=\"wrap_content\"\n        android:layout_width=\"\
    wrap_content\" />\n</LinearLayout>\n```\n\n**Figure 9–5.** *Video playing in CustomVideoPlayer\
    \ activity*\n\n## MediaPlayer with MediaController\n\nThe `MediaController` view\
    \ that we used in our `VideoView` example can also be used with a `MediaPlayer`\
    \ as shown in Figure 9–6. Unfortunately, it takes significantly more work in order\
    \ to have it work correctly.\n\nFirst our class needs to implement `MediaController.MediaPlayerControl`\
    \ in addition to other classes it already implements.\n\n```\nimport android.widget.MediaController;\n\
    \npublic class CustomVideoPlayer extends Activity\n        implements OnCompletionListener,\
    \ OnErrorListener, OnInfoListener,\n        OnPreparedListener, OnSeekCompleteListener,\
    \ OnVideoSizeChangedListener,\n        SurfaceHolder.Callback, MediaController.MediaPlayerControl\
    \ {\n```\n\nThis interface defines a series of functions that the `MediaController`\
    \ uses to control the playback, and we need to implement them in our activity.\
    \ Here are the functions and their implementation in our `CustomVideoPlayer` example.\
    \ For several of the functions, we just return `true`, meaning the capability\
    \ is there. For the rest, we call the corresponding function on our `MediaPlayer`\
    \ object.\n\n```\n    public boolean canPause() {\n        return true;\n    }\n\
    \n    public boolean canSeekBackward() {\n        return true;\n    }\n\n    public\
    \ boolean canSeekForward() {\n        return true;\n    }\n\n    public int getBufferPercentage()\
    \ {\n        return 0;\n    }\n\n    public int getCurrentPosition() {\n     \
    \   return mediaPlayer.getCurrentPosition();\n    }\n\n    public int getDuration()\
    \ {\n        return mediaPlayer.getDuration();\n    }\n\n    public boolean isPlaying()\
    \ {\n        return mediaPlayer.isPlaying();\n    }\n\n    public void pause()\
    \ {\n        if (mediaPlayer.isPlaying()) {\n            mediaPlayer.pause();\n\
    \        }\n    }\n\n    public void seekTo(int pos) {\n        mediaPlayer.seekTo(pos);\n\
    \    }\n\n    public void start() {\n        mediaPlayer.start();\n    }\n}\n\
    ```\n\nNow we are free to add the actual `MediaController` object. We’ll declare\
    \ it with the rest of the instance variables.\n\n```\nMediaController controller;\n\
    ```\n\nIn the `onCreate` method, we’ll instantiate it.\n\n```\ncontroller = new\
    \ MediaController(this);\n```\n\nWe won’t actually set it up and use it until\
    \ after the `MediaPlayer` is prepared. At the end of the `onPrepared` method,\
    \ we can add the following. First we specify the object that implements `MediaController.MediaPlayerControl`\
    \ by calling the `setMediaPlayer` method. In this case, it is our activity, so\
    \ we pass in `this`. Then we set the root view of our activity so the `MediaController`\
    \ can determine how to display itself. In the foregoing layout XML, we gave the\
    \ root `LinearLayout` object an ID of `MainView` so we can reference it here.\
    \ Finally we enable it and show it.\n\n```\ncontroller.setMediaPlayer(this);\n\
    controller.setAnchorView(this.findViewById(R.id.MainView));\ncontroller.setEnabled(true);\n\
    controller.show();\n```\n\nIn order to bring the controller back up after it disappears\
    \ (the default behavior of the `MediaController` is to auto-hide after a timeout),\
    \ we can override `onTouchEvent` in our activity to show or hide it.\n\n```\n\
    @Override\npublic boolean onTouchEvent(MotionEvent ev) {\n    if (controller.isShowing())\
    \ {\n        controller.hide();\n    } else {\n        controller.show();\n  \
    \  }\n    return false;\n}\n```\n\n**Figure 9–6.** *CustomVideoPlayer activity\
    \ with MediaController*\n\n## Summary\n\nAs with many things in Android, there\
    \ are many different ways that a task can be accomplished. In this chapter, we\
    \ looked at three different ways that we can play video files. Simply using the\
    \ built-in application via an intent is the easiest but least flexible. Using\
    \ a `VideoView` allows us to play video within our own activity but doesn’t offer\
    \ much more in the way of control capabilities. The `MediaPlayer` allows for the\
    \ greatest range of control but requires the most work."
