  trans: '

    ## 第 11 章：视频捕获


    `MPEG_4_SP`：这指定所使用的编解码器将是 MPEG-4 SP（简单画质）编解码器。MPEG-4 SP 在技术上是 MPEG-4 第 2 部分简单画质。它于
    1999 年发布，是为需要低比特率视频且无需大量处理器功耗的技术而开发的。


    使用 `MediaRecorder` 的 `setAudioEncoder` 方法，我们可以指定将使用的音频编解码器。


    ```

    recorder.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);

    ```


    可以传递给 `setAudioEncoder` 的可能值在 `MediaRecorder.AudioEncoder` 中被定义为常量。


    `MediaRecorder.AudioEncoder` 仅包含两个常量：


    `AMR_NB`：这指定将用于音频编码的编解码器是 AMR-NB，即自适应多速率窄带（Adaptive Multi-Rate Narrow Band）。AMR-NB
    是一种针对语音调校的编解码器，广泛应用于手机中。


    `DEFAULT`：由于 AMR-NB 是仅有的另一个选择，`DEFAULT` 常量指定 AMR-NB 将是所使用的音频编解码器。


    ### 音视频比特率


    视频编码比特率可以通过在 `MediaRecorder` 上调用 `setVideoEncodingBitRate` 方法并传入以比特每秒为单位的请求比特率来设置。视频的低比特率设置范围约为每秒
    256,000 比特（256 kbps），而高比特率范围约为每秒 3,000,000 比特（3 mbps）。


    ```

    recorder.setVideoEncodingBitRate(150000);

    ```


    我们也可以指定希望用于编码音频数据的最大比特率。通过将以比特每秒为单位的数值传入 `MediaRecorder` 的 `setAudioEncodingBitRate`
    方法来实现。作为参考，每秒 8,000 比特（8 kbps）是非常低的比特率，适用于需要通过慢速网络实时传输的音频；而对于 MP3 文件中的音乐，每秒 196,000
    比特（196 kbps）及更高的速率并不罕见。目前大多数安卓设备仅支持较低端的比特率，如果你选择了一个过高的比特率，`MediaRecorder` 将自动在其可支持的范围内选择一个比特率。


    ```

    recorder.setAudioEncodingBitRate(8000);

    ```


    ### 音频采样率


    与比特率一样，音频采样率对于决定捕获和编码的音频质量至关重要。`MediaPlayer` 有一个 `setAudioSampleRate` 方法，允许我们请求特定的采样率。传入的采样率以
    Hz（赫兹）为单位，表示每秒的样本数。采样率越高，捕获文件中能表示的音频频率范围就越大。较低的采样率（如 8,000 Hz）适合捕获低质量语音，而较高的采样率（如
    48,000 Hz）则用于 DVD 和许多其他高质量视频格式。大多数安卓设备仅支持较低的采样率范围（8,000 Hz）。


    ```

    recorder.setAudioSamplingRate(8000);

    ```


    ### 音频声道数


    可以通过使用 `setAudioChannels` 方法并传入声道数来指定要捕获的音频声道数量。在大多数安卓设备上，输入音频目前主要限于单声道麦克风，因此使用超过一个声道并无益处。通常，声道数的选择在用于单声道的单声道和用于立体声的双声道之间。


    ```

    recorder.setAudioChannels(1);

    ```


    ### 视频帧率


    每秒捕获的视频帧数可以通过使用 `setVideoFrameRate` 方法并传入请求的帧率来控制。每秒 12 到 15 帧的值通常足以表现运动。较高标准则是电视采用的每秒
    30 帧（实际为 29.97）。实际使用的帧率会根据设备的性能而变化。


    ```

    recorder.setVideoFrameRate(15);

    ```


    ### 视频尺寸


    捕获视频的宽度和高度可以通过 `setVideoSize` 方法并传入以像素为单位的宽度和高度整数来控制。标准尺寸范围从 176x144 到 640x480，许多设备甚至支持更高分辨率。


    **注意：** 许多安卓设备也支持 720x480，但应注意，这与 DV 摄像机捕获的像素宽高比不同，后者捕获的是 *矩形* 像素的 720x480 视频。在安卓设备上，像素通常是
    *方形* 的，因此如果来自安卓设备的 720x480 视频被导入到视频编辑软件中，该软件可能因其分辨率而对视频做出错误假设，导致输出变形。要纠正这一点，需要告知软件像素宽高比是方形或
    1.0。


    ```

    recorder.setVideoSize(640,480);

    ```

