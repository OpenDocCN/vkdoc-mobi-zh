    import android.view.View;


    import android.view.View.OnClickListener;


    import android.view.View.OnTouchListener;


    import android.widget.Button;


    **CHAPTER 5: Introduction to Audio on Android**


    **113**


    Our activity will implement the OnCompletionListener, as did the previous example,
    but will also implement the OnTouchListener, so that it can respond to touch events,
    and the OnClickListener, so that it can respond when a user clicks a button.


    public class CustomAudioPlayer extends Activity implements OnCompletionListener,


    OnTouchListener, OnClickListener {


    Of course, we’ll need a reference to the MediaPlayer object. We need access to
    a View so that we can register that we want touch events, and we’ll need access
    to any buttons that we define in the Layout XML file—in this case, a button for
    stopping playback and a button for starting playback.


    MediaPlayer mediaPlayer;


    View theView;


    Button stopButton, startButton;


    We’ll declare a variable that will contain a saved position in the audio file.
    We’ll use this position later to determine where to start playing the audio file.


    int position = 0;


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    Using our normal findViewById function, we’ll get access to the Buttons and the
    View that are defined in the Layout XML.


    stopButton = (Button) this.findViewById(R.id.StopButton);


    startButton = (Button) this.findViewById(R.id.StartButton);


    Since our activity can respond to Click events, we’ll make it so that it is registered
    as the listener on both Buttons.


    startButton.setOnClickListener(this);


    stopButton.setOnClickListener(this);


    theView = this.findViewById(R.id.theview);


    Then we’ll make our activity (this) respond to the touch events.


    theView.setOnTouchListener(this);


    In this application, our audio file is called goodmorningandroid.mp3, and it has
    been placed in the res/raw folder of our project. We’ll create our MediaPlayer
    object using this file. Also, as in the previous example, we are setting our activity
    to be the


    OnCompletionListener for our MediaPlayer.


    mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);


    mediaPlayer.setOnCompletionListener(this);


    mediaPlayer.start();


    }


    Here our onCompletion method is defined. It gets called whenever the MediaPlayer
    has finished playing our audio file. In this case, we’ll call start first to make
    the audio play **114**


    **CHAPTER 5: Introduction to Audio on Android**


    and then call seek to the saved position. The audio needs to be playing before
    we can seek.


    public void onCompletion(MediaPlayer mp) {


    mediaPlayer.start();


    mediaPlayer.seekTo(position);


    }


    When the user triggers a touch event, the onTouch method is called. In this method,
    we are paying attention only to the ACTION_MOVE touch event, which is triggered
    when the user drags a finger across the surface of the View. In this case, we’ll
    make sure the MediaPlayer is playing and then calculate where we should seek to
    based upon where


    on the screen the touch event occurs. If it occurs toward the right boundary of
    the screen, we’ll seek toward the end of the file. If it occurs toward the left
    boundary of the screen, we’ll seek to near the beginning of the file. We save
    this value in the position variable, so that when the audio file finishes, it
    will seek back to that point when it starts playing again (in the onCompletion
    method).


    public boolean onTouch(View v, MotionEvent me) {


    if (me.getAction() == MotionEvent.ACTION_MOVE)


    {


    if (mediaPlayer.isPlaying()) {


    position = (int) (me.getX() *


    mediaPlayer.getDuration()/theView.getWidth());


    Log.v("SEEK",""+position);


    mediaPlayer.seekTo(position);


    }


    }


    return true;


    }


    Last we have an onClick method that responds to the Button clicks. These clicks
    pause and start the audio playback.


    public void onClick(View v) {


    if (v == stopButton) {


    mediaPlayer.pause();


    } else if (v == startButton) {


    mediaPlayer.start();


    }


    }


    }


