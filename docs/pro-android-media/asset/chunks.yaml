    ```\n\nAs just shown, the `MediaPlayer` has a nice set of capabilities for handling\
    \ audio files that are available online via HTTP.\n\n## Streaming Audio via HTTP\n\
    \nOne way that live audio is commonly delivered online is via HTTP streaming.\
    \ There are a variety of streaming methods that fall under the umbrella of HTTP\
    \ streaming from server push, which has historically been used for displaying\
    \ continually refreshing webcam images in browsers to a series of new methods\
    \ being put forth by Apple, Adobe, and Microsoft for use by their respective media\
    \ playback applications.\n\nThe main method for streaming live audio over HTTP\
    \ is one developed in 1999 by a company called Nullsoft, which was subsequently\
    \ purchased by AOL. Nullsoft was the creator of WinAMP, a popular MP3 player,\
    \ and they developed a live audio streaming server that used HTTP, called SHOUTcast.\
    \ SHOUTcast uses the ICY protocol, which extends HTTP. Currently, a large number\
    \ of servers and playback software products support this protocol, so many, in\
    \ fact, that it may be considered the de facto standard for online radio.\n\n\
    Fortunately, the `MediaPlayer` class on Android is capable of playing ICY streams\
    \ without requiring us developers to jump through hoops. Unfortunately for us,\
    \ Internet radio stations don't typically advertise the direct URL to their streams.\
    \ This is for good reason; unfortunately, browsers don't support ICY streams directly\
    \ and require a helper application or plug-in to play the stream. In order to\
    \ know to open a helper application, an intermediary file with a specific MIME-type\
    \ is delivered by the Internet radio station, which contains a pointer to the\
    \ actual live stream. In the case of ICY streams, this is typically either a PLS\
    \ file or an M3U file.\n\nA PLS file is a multimedia playlist file and has the\
    \ MIME-type `audio/x-scpls`. An M3U file is also a file that stores multimedia\
    \ playlists but in a more basic format. Its MIME-type is `audio/x-mpegurl`. The\
    \ following illustrates the contents of an M3U file that points to a fake live\
    \ stream:\n\n```\n#EXTM3U\n#EXTINF:0,Live Stream Name\nhttp://www.nostreamhere.org:8000/\n\
    ```\n\nThe first line, `#EXTM3U`, is required and specifies that what follows\
    \ is an Extended M3U file that can contain extra information. Extra information\
    \ about a playlist entry is specified on the line above the entry and starts with\
    \ `#EXTINF:`, followed by the duration in seconds, a comma, and then the name\
    \ of the media."
