    \ android:text=\"0%\" android:id=\"@+id/BufferValueTextView\"\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\"></TextView>\n    <Button\
    \ android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
