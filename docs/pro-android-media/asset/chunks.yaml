    **MediaStore for Audio**


    We explored using the MediaStore for images early on in this book. Much of what
    we


    learned can be leveraged for the storage and retrieval of other types of media,
    including audio. In order to provide a robust mechanism for browsing and searching
    for audio, Android includes a MediaStore.Audio package, which defines the standard
    content


    provider.


    **Accessing Audio from the MediaStore**


    Accessing audio files that are stored using the MediaStore provider is consistent
    with our previous uses of the MediaStore. In this case, we’ll be using the


    android.provider.MediaStore.Audio package.


    One of the easiest ways to illustrate the use of the MediaStore for audio is to
    go through a sample application. The following code creates an activity that queries
    the MediaStore for any audio file and simply plays the first one returned.


    package com.apress.proandroidmedia.ch5.audioplayer;


    import java.io.File;


    import android.app.Activity;


    import android.content.Intent;


    import android.database.Cursor;


    import android.net.Uri;


    import android.os.Bundle;


    import android.util.Log;


    import android.provider.MediaStore;


    public class AudioPlayer extends Activity {


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setContentView(R.layout.main);


    To use the MediaStore, we need to specify which data we want returned. We do


    this by creating an array of strings using the constants located in the


    android.provider.MediaStore.Audio.Media class. Those constants are all of the


    standard fields that are saved in the MediaStore for use with audio.


    **116**


    **CHAPTER 5: Introduction to Audio on Android**


    In this case, we are asking for the DATA column, which contains the path to the
    actual audio file. We are also asking for the internal ID, the Title, Display
    Name, MIME-Type, Artist, Album, and which type of audio file it is, alarm, music,
    ring tone, or notification type.


    Other columns such as date added (DATE_ADDED), date modified (DATE_MODIFIED),
    file size (SIZE), and so on are available as well.


    String[] columns = {


    MediaStore.Audio.Media.DATA,


    MediaStore.Audio.Media._ID,


    MediaStore.Audio.Media.TITLE,


    MediaStore.Audio.Media.DISPLAY_NAME,


    MediaStore.Audio.Media.MIME_TYPE,


    MediaStore.Audio.Media.ARTIST,


    MediaStore.Audio.Media.ALBUM,


    MediaStore.Audio.Media.IS_RINGTONE,


    MediaStore.Audio.Media.IS_ALARM,


    MediaStore.Audio.Media.IS_MUSIC,


    MediaStore.Audio.Media.IS_NOTIFICATION


    };


    We query the MediaStore by calling the managedQuery method in Activity. The


    managedQuery method takes in the Uri for the content provider, in this case, the
    audio MediaStore, android.provider.MediaStore.Audio.Media.EXTERNAL_CONTENT_URI.
    This Uri


    specifies that we want audio stored on the SD card. If we wanted audio files that
    are stored in the internal memory, we would use


    android.provider.MediaStore.Audio.Media.INTERNAL_CONTENT_URI.


    In addition to the Uri to the MediaStore, the managedQuery method takes in the
    array of columns that we want returned, an SQL WHERE clause, the values for the
    WHERE clause, and an SQL ORDER BY clause.


    In this example, we aren’t using the WHERE and ORDER BY clauses, so we’ll pass
    in null for those arguments.


    Cursor cursor = managedQuery(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,


    columns, null, null, null);


    The managedQuery method returns a Cursor object. The Cursor class allows interaction
    with a dataset returned from a database query.


    The first thing we’ll do is create a couple of variables to hold the column numbers
    for some of the columns we want to access from the results. This isn’t absolutely


    necessary, but it is nice to have the index around so we don’t have to call the
    method on the Cursor object each time we need them. The way we get them is to
    pass in the


    constant value for the column we want to the getColumnIndex method on the Cursor.


    int fileColumn = cursor.getColumnIndex (MediaStore.Audio.Media.DATA);


    The first one is the index of the column containing the path to the actual audio
    file. We got the foregoing index by passing in the constant that represents that
    column,


    android.provider.MediaStore.Audio.Media.DATA.


    Next we are getting a couple of other indexes, not all of which we are actually
    using, so the extras are here merely for illustration purposes.


    **CHAPTER 5: Introduction to Audio on Android**


    **117**


    int titleColumn = cursor.getColumnIndex (MediaStore.Audio.Media.TITLE);


    int displayColumn = cursor.getColumnIndex (MediaStore.Audio.Media.DISPLAY_NAME);


    int mimeTypeColumn = cursor.getColumnIndex (MediaStore.Audio.Media.MIME_TYPE);


    The data returned by the MediaStore available in the Cursor is organized in rows
    as well as by columns. We can get the first result returned by calling the moveToFirst
    method and retrieving the results from there. The method will return a Boolean
    false if no rows are returned, so we can wrap it in an if statement to make sure
    there is data.


    if (cursor.moveToFirst()) {


    To get the actual data, we call one of the “get” methods on the Cursor and pass
    in the index for the column we want to retrieve. If the data is expected to be
    a String, we call getString. If it is expected to be an integer, we call getInt.
    There are corresponding “get” methods for all of the primitive data types.


    String audioFilePath = cursor.getString(fileColumn);


    String mimeType = cursor.getString(mimeTypeColumn);


    Log.v("AUDIOPLAYER",audioFilePath);


    Log.v("AUDIOPLAYER",mimeType);


    Once we have the path to the file and the MIME type, we can use those to construct
    the intent to launch the built-in audio player application and play that file.
    (Alternatively we could use the MediaPlayer class as illustrated previously to
    play the audio file directly.) In order to turn the path to the audio file into
    a Uri that we can pass into the intent, we construct a File object and use the
    Uri.fromFile method to get the Uri. There are other ways to do the same, but this
    is probably the most straightforward.


    Intent intent = new Intent(android.content.Intent.ACTION_VIEW);


    File newFile = new File(audioFilePath);


    intent.setDataAndType(Uri.fromFile(newFile), mimeType);


    startActivity(intent);


    }


    }


    }


    That finishes off our basic illustration of using the MediaStore for audio.


    Now, let’s take it a step further and create an application that allows us to
    narrow down the results returned and browse them, allowing the user to select
    the audio file to play.


    **Browsing Audio in the MediaStore**


    Audio files, in particular music files, can be found by album, artist, and genre
    as well as directly in the MediaStore. Each of these has an Uri that can be used
    with a


    managedQuery to search with.


    *Album*:


    android.provider.MediaStore.Audio.Albums.EXTERNAL_CONTENT_URI


    *Artist*: android.provider.MediaStore.Artists.EXTERNAL_CONTENT_URI


    *Genre*: android.provider.MediaStore.Genres.EXTERNAL_CONTENT_URI


    **118**


    **CHAPTER 5: Introduction to Audio on Android**


    Here is how you would use the album Uri to query for al of the albums on the device:
    String[] columns = { android.provider.MediaStore.Audio.Albums._ID,


    android.provider.MediaStore.Audio.Albums.ALBUM};


    Cursor cursor = managedQuery(MediaStore.Audio.Albums.EXTERNAL_CONTENT_URI, columns,


    null, null, null);


    if (cursor != null) {


    while (cursor.moveToNext()) {


    Log.v("OUTPUT",


    cursor.getString(cursor.getColumnIndex(MediaStore.Audio.Albums.ALBUM)));


    }


    }


    In the foregoing code snippet, you see that we are asking the MediaStore to return
    the _ID and the ALBUM columns. The ALBUM constant indicates that we want the name
    of the album returned. Other columns available are listed in the


    android.provider.MediaStore.Audio.Albums class and are inherited from


    android.provider.BaseColumns and android.provider.MediaStore.Audio.AlbumColumns.


    We are cal ing the managedQuery method giving just the Uri and the list of columns,
    leaving the other parameters as null. This wil give us al of the albums available
    on the device.


    Final y, we are outputting the list of albums. To iterate through the list returned
    inside the Cursor object, we first check that the Cursor contains results (cursor
    != null) and then use the moveToNext method.


    **Album Browsing App Example**


    What fol ows is an example that uses the foregoing as a starting point to al ow
    the user to see the names of al of the albums. The user can indicate which album
    he or she


    would like to see the songs on. It wil then present the list of songs, and if
    the user Download from Wow! eBook <www.wowebook.com>


    selects one of those, it wil play that song.


