    \ from Wow! eBook <www.wowebook.com>\n\n![](index-213_1.jpg)\n\n## CHAPTER 9:\
    \ Introduction to Video\n\n### 199\n\n**Figure 9–2.** *VideoView example*\n\n\
    ## Adding Controls with MediaController\n\nThe `VideoView` has relatively few\
    \ capabilities for controlling the playback of video. Specifically it has a `start`\
    \ and a `pause` method. In order to provide more controls, we can instantiate\
    \ a `MediaController` and set it via `setMediaController` to be the controller\
    \ of the `VideoView`.\n\nThe default `MediaController` has rewind, pause, play,\
    \ and fast-forward buttons along with a scrubber and progress bar combination\
    \ that can be used to seek to any point in the video.\n\nHere is an update to\
    \ our `VideoView` example to include a `MediaController` within the `onCreate`\
    \ method after the content view is set by the `setContentView` method.\n\n```\n\
    vv = (VideoView) this.findViewById(R.id.VideoView);\nvv.setMediaController(new\
    \ MediaController(this));\nUri videoUri = Uri.parse(Environment.getExternalStorageDirectory().getPath()\
    \ +\n        \"/Test_Movie.m4v\");\nvv.setVideoURI(videoUri);\nvv.start();\n```\n\
    \n![](index-214_1.jpg)\n\n### 200\n\n## CHAPTER 9: Introduction to Video\n\n**Figure\
    \ 9–3.** *VideoView with a default MediaController*\n\n## Playback Using a MediaPlayer\n\
    \nIn Chapters 6 and 7, those dealing with audio and networked audio, we introduced\
