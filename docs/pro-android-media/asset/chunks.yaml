  trans: "\n# 第 1 章：Android 影像处理入门\n\n提供与`Camera`应用相媲美的图像拍摄功能，而无需自行构建自定义拍摄程序。\n\n\
    Intent 过滤器是应用开发者用来声明其应用提供特定功能的一种手段。在应用的`AndroidManifest.xml`文件中指定 Intent 过滤器，会告知\
    \ Android 系统：该应用（尤其是包含该过滤器的 Activity）将在收到指令时执行指定的任务。\n\n`Camera`应用在其清单文件中指定了以下\
    \ Intent 过滤器。此处显示的过滤器包含在\"`Camera`\"Activity 标签内。\n\n```\n<intent-filter>\n<action\
    \ android:name=\"android.media.action.IMAGE_CAPTURE\" />\n<category android:name=\"\
    android.intent.category.DEFAULT\" />\n</intent-filter>\n```\n\n为了通过 Intent 调用`Camera`应用，我们只需构造一个能被上述过滤器捕获的\
    \ Intent 即可。\n\n```\nIntent i = new Intent(\"android.media.action.IMAGE_CAPTURE\"\
    );\n```\n\n在实践中，我们可能不希望直接使用该动作字符串来创建 Intent。在这种情况下，`MediaStore`类中定义了一个常量`ACTION_IMAGE_CAPTURE`。我们应使用常量而非字符串本身的原因是，如果字符串发生变更，常量也极大概率会随之更新，从而使我们的调用更具前瞻性。\n\
    \n```\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    startActivity(i);\n```\n\n在一个基础 Android Activity 中使用此 Intent，将会启动默认的`Camera`应用并进入静态拍照模式，如图\
    \ 1–1 所示。\n\n**图 1–1.** *通过 Intent 调用的内置 Camera 应用在模拟器中的运行界面*\n\n## 从 Camera 应用返回数据\n\
    \n当然，如果拍摄照片后`Camera`应用无法将图片返回给调用它的 Activity，那么单纯使用内置`Camera`应用来拍照就没有实际意义。这可以通过将\
    \ Activity 中的`startActivity`方法替换为`startActivityForResult`方法来实现。使用此方法，我们就能访问`Camera`应用返回的数据，即用户拍摄的图像（以`Bitmap`形式呈现）。\n\
    \n以下是一个基本示例：\n\n```java\npackage com.apress.proandroidmedia.ch1.cameraintent;\n\
    \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.graphics.Bitmap;\n\
    import android.os.Bundle;\nimport android.widget.ImageView;\n\npublic class CameraIntent\
    \ extends Activity {\n\n    final static int CAMERA_RESULT = 0;\n    ImageView\
    \ imv;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
    \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
    \        Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    \        startActivityForResult(i, CAMERA_RESULT);\n    }\n\n    protected void\
    \ onActivityResult(int requestCode, int resultCode, Intent intent) {\n       \
    \ super.onActivityResult(requestCode, resultCode, intent);\n        if (resultCode\
    \ == RESULT_OK) {\n            Bundle extras = intent.getExtras();\n         \
    \   Bitmap bmp = (Bitmap) extras.get(\"data\");\n            imv = (ImageView)\
    \ findViewById(R.id.ReturnedImageView);\n            imv.setImageBitmap(bmp);\n\
    \        }\n    }\n}\n```\n\n该示例要求在项目的`layout/main.xml`文件中包含以下内容：\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
    \n    android:layout_height=\"fill_parent\">\n    <ImageView android:id=\"@+id/ReturnedImageView\"\
    \n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"></ImageView>\n</LinearLayout>\n```\n\n为了完善上述示例，以下是`AndroidManifest.xml`的内容：\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    android:versionCode=\"1\"\n\
    \    android:versionName=\"1.0\"\n    package=\"com.apress.proandroidmedia.ch1.cameraintent\"\
    >\n    <application android:icon=\"@drawable/icon\" android:label=\"@string/app_name\"\
    >\n        <activity android:name=\".CameraIntent\"\n            android:label=\"\
    @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
    android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n            </intent-filter>\n        </activity>\n    </application>\n\
    \    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n在这个例子中，图像是从`Camera`应用通过\
    \ Intent 传递的附加数据返回到我们调用 Activity 的`onActivityResult`方法中的。该附加数据的键名为`\"data\"`，包含一个`Bitmap`对象，需要从通用的`Object`类型进行转换。\n\
    \n```java\n// 从 Intent 中获取附加数据\nBundle extras = intent.getExtras();\n// 从附加数据中获取返回的图像\n\
    Bitmap bmp = (Bitmap) extras.get(\"data\");\n```\n\n在我们的布局 XML 文件（`layout/main.xml`）中，有一个`ImageView`。`ImageView`是通用`View`的扩展，支持图像显示。由于我们指定了一个\
    \ id 为`ReturnedImageView`的`ImageView`，因此在 Activity 中我们需要获取对它的引用，并通过其`setImageBitmap`方法将获取的`Bitmap`设置给它。这样，我们应用的用户就能查看拍摄的图像了。\n\
    \n要获取`ImageView`对象的引用，我们使用`Activity`类中标准的`findViewById`方法。该方法允许我们通过传递元素的`id`，以编程方式引用在布局\
    \ XML（通过`setContentView`加载）中定义的元素。在上述示例中，`ImageView`对象在 XML 中定义如下：\n\n```xml\n\
    <ImageView android:id=\"@+id/ReturnedImageView\"\n    android:layout_width=\"\
    wrap_content\"\n    android:layout_height=\"wrap_content\"></ImageView>\n```\n\
    \n为了引用`ImageView`并让它显示来自`Camera`的`Bitmap`，我们使用以下代码：\n\n```java\nimv = (ImageView)\
    \ findViewById(R.id.ReturnedImageView);\nimv.setImageBitmap(bmp);\n```\n\n运行此示例时，你可能会注意到生成的图像很小。（在我手机上，它宽\
    \ 121 像素，高 162 像素。其他设备有不同的默认尺寸。）这并非 bug，而是设计如此。通过 Intent 触发的`Camera`应用不会将全尺寸图像返回给调用\
    \ Activity。通常，这样做会占用大量内存，而移动设备在这方面通常受限。相反，`Camera`应用会在返回的 Intent 中附带一张小尺寸的缩略图，如图\
    \ 1–2 所示。\n\n**图 1–2.** *在 ImageView 中显示的 121x162 像素结果图像*\n\n## 拍摄更大尺寸的图像\n\n\
    为了克服尺寸限制，从 Android 1.5 开始，在大多数设备上，我们可以向启动`Camera`应用的 Intent 中添加一个附加数据。该附加数据的名称在`MediaStore`类中被定义为常量`EXTRA_OUTPUT`。该附加数据的值（附加数据采用键值对形式）会告知`Camera`应用，你希望将拍摄的图像保存到指定的\
    \ URI 路径。\n\n以下代码片段指示`Camera`应用将图像以`myfavoritepicture.jpg`的文件名保存到设备的 SD 卡上。\n\n\
    ```java\nString imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\n\
    \    + \"/myfavoritepicture.jpg\";\nFile imageFile = new File(imageFilePath);\n\
    Uri imageFileUri = Uri.fromFile(imageFile);\n\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
    i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\nstartActivityForResult(i,\
    \ CAMERA_RESULT);\n```\n"
- fmt: "# Chapter 1: Introduction to Android Imaging\n\n**NOTE:** The foregoing code\
    \ snippet for creating the URI to the image file could be simplified to the following:\n\
    ```\nimageFileUri = Uri.parse(\"file:///sdcard/myfavoritepicture.jpg\");\n```\n\
    In practice, though, using the method shown will be more device-independent and\
    \ future-proof should the SD card–naming conventions or the URI syntax for the\
    \ local filesystem change.\n\n## Displaying Large Images\n\nLoading and displaying\
    \ an image has significant memory usage implications. For instance, the HTC G1\
    \ phone has a 3.2-megapixel camera. A 3.2-megapixel camera typically captures\
    \ images at 2048 pixels by 1536 pixels. Displaying a 32-bit image of that size\
    \ would take more than 100663 kb or approximately 13 MB of memory. While this\
    \ may not guarantee that our application will run out of memory, it will certainly\
    \ make it more likely.\n\nAndroid offers us a utility class called `BitmapFactory`,\
    \ which provides a series of static methods that allow the loading of `Bitmap`\
    \ images from a variety of sources. For our needs, we’ll be loading it from a\
    \ file to display in our original activity. Fortunately, the methods available\
    \ in `BitmapFactory` take in a `BitmapFactory.Options` class, which allows us\
    \ to define how the `Bitmap` is read into memory. Specifically, we can set the\
    \ sample size that the `BitmapFactory` should use when loading an image. Indicating\
    \ the `inSampleSize` parameter in `BitmapFactory.Options` indicates that the resulting\
    \ `Bitmap` image will be that fraction of the size once loaded. For instance,\
    \ setting the `inSampleSize` to 8 as I do here would yield an image that is 1/8\
    \ the size of the original image.\n\n```\nBitmapFactory.Options bmpFactoryOptions\
    \ = new BitmapFactory.Options();\nbmpFactoryOptions.inSampleSize = 8;\nBitmap\
    \ bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\nimv.setImageBitmap(bmp);\n\
    ```\n\nThis is a quick way to load up a large image but doesn’t really take into\
    \ account the image’s original size nor the size of the screen. It would be better\
    \ if we scaled the image to something that would fit nicely on our screen.\n\n\
    The segments of code that follow illustrate how to use the dimensions of the display\
    \ to determine the amount of down sampling that should occur when loading the\
    \ image. When we use these methods, the image is assured of filling the bounds\
    \ of the display as much as possible. If, however, the image is only going to\
    \ be shown at 100 pixels in any one dimension, that value should be used instead\
    \ of the display dimensions, which we obtain as follows.\n\n```\nDisplay currentDisplay\
    \ = getWindowManager().getDefaultDisplay();\nint dw = currentDisplay.getWidth();\n\
    int dh = currentDisplay.getHeight();\n```\n\nTo determine the overall dimensions\
    \ of the image, which are needed for the calculation, we use the `BitmapFactory`\
    \ and `BitmapFactory.Options` with the `BitmapFactory.Options.inJustDecodeBounds`\
    \ variable set to `true`. This tells the `BitmapFactory` class to just give us\
    \ the bounds of the image rather than attempting to decode the image itself. When\
    \ we use this method, the `BitmapFactory.Options.outHeight` and `BitmapFactory.Options.outWidth`\
    \ variables are filled in.\n\n```\n// Load up the image's dimensions not the image\
    \ itself\nBitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();\n\
    bmpFactoryOptions.inJustDecodeBounds = true;\nBitmap bmp = BitmapFactory.decodeFile(imageFilePath,\
    \ bmpFactoryOptions);\n\nint heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n\
    int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\nLog.v(\"\
    HEIGHTRATIO\",\"\"+heightRatio);\nLog.v(\"WIDTHRATIO\",\"\"+widthRatio);\n```\n\
    \nSimple division of the dimensions of the image by the dimensions of the display\
    \ tells us the ratio. We can then choose whether to use the height ratio or the\
    \ width ratio, depending on which is greater. Simply using that ratio as the `BitmapFactory.Options.inSampleSize`\
    \ variable will yield an image that should be loaded into memory with dimensions\
    \ close to the same dimensions that we need—in this case, close to the dimensions\
    \ of the display itself.\n\n```\n// If both of the ratios are greater than 1,\n\
    // one of the sides of the image is greater than the screen\nif (heightRatio >\
    \ 1 && widthRatio > 1)\n{\n    if (heightRatio > widthRatio)\n    {\n        //\
    \ Height ratio is larger, scale according to it\n        bmpFactoryOptions.inSampleSize\
    \ = heightRatio;\n    }\n    else\n    {\n        // Width ratio is larger, scale\
    \ according to it\n        bmpFactoryOptions.inSampleSize = widthRatio;\n    }\n\
    }\n// Decode it for real\nbmpFactoryOptions.inJustDecodeBounds = false;\nbmp =\
    \ BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n```\n\nHere is\
    \ the code for a full example that uses the built-in camera via an intent and\
    \ displays the resulting picture. Figure 1–3 shows a resulting screen sized image\
    \ as generated by this example.\n\n```\npackage com.apress.proandroidmedia.ch1.sizedcameraintent;\n\
    \nimport java.io.File;\n\nimport android.app.Activity;\nimport android.content.Intent;\n\
    import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
    \ android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
    import android.util.Log;\nimport android.view.Display;\nimport android.widget.ImageView;\n\
    \npublic class SizedCameraIntent extends Activity {\n\n    final static int CAMERA_RESULT\
    \ = 0;\n    ImageView imv;\n    String imageFilePath;\n\n    @Override\n    public\
    \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.main);\n\n        imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\
    \ +\n            \"/myfavoritepicture.jpg\";\n        File imageFile = new File(imageFilePath);\n\
    \        Uri imageFileUri = Uri.fromFile(imageFile);\n\n        Intent i = new\
    \ Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n        i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT,\
    \ imageFileUri);\n        startActivityForResult(i, CAMERA_RESULT);\n    }\n\n\
    \    protected void onActivityResult(int requestCode, int resultCode, Intent intent)\
    \ {\n        super.onActivityResult(requestCode, resultCode, intent);\n      \
    \  if (resultCode == RESULT_OK)\n        {\n            // Get a reference to\
    \ the ImageView\n            imv = (ImageView) findViewById(R.id.ReturnedImageView);\n\
    \n            Display currentDisplay = getWindowManager().getDefaultDisplay();\n\
    \            int dw = currentDisplay.getWidth();\n            int dh = currentDisplay.getHeight();\n\
    \n            // Load up the image's dimensions not the image itself\n       \
    \     BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();\n\
    \            bmpFactoryOptions.inJustDecodeBounds = true;\n            Bitmap\
    \ bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\n      \
    \      int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n\
    \            int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\
    \n            Log.v(\"HEIGHTRATIO\",\"\"+heightRatio);\n            Log.v(\"WIDTHRATIO\"\
    ,\"\"+widthRatio);\n\n            // If both of the ratios are greater than 1,\n\
    \            // one of the sides of the image is greater than the screen\n   \
    \         if (heightRatio > 1 && widthRatio > 1)\n            {\n            \
    \    if (heightRatio > widthRatio)\n                {\n                    //\
    \ Height ratio is larger, scale according to it\n                    bmpFactoryOptions.inSampleSize\
    \ = heightRatio;\n                }\n                else\n                {\n\
    \                    // Width ratio is larger, scale according to it\n       \
    \             bmpFactoryOptions.inSampleSize = widthRatio;\n                }\n\
    \            }\n\n            // Decode it for real\n            bmpFactoryOptions.inJustDecodeBounds\
    \ = false;\n            bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
    \n            // Display it\n            imv.setImageBitmap(bmp);\n        }\n\
