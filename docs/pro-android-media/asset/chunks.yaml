- fmt: "# CHAPTER 2: Building Custom Camera Applications\n\n`<application>`\n\n`<uses-sdk\
    \ android:minSdkVersion=\"8\" />`\n\n`<uses-permission android:name=\"android.permission.CAMERA\"\
    ></uses-permission>` `</manifest>`\n\nThat should cover the basics of building\
    \ a custom camera-based application. Next, let's look at how we can extend this\
    \ application, implementing features that don't exist in the built-in camera application.\n\
    \n## Extending the Custom Camera Application\n\nIn my opinion, the built-in camera\
    \ application on Android is missing a few essential features. One of those is\
    \ the ability to take a picture after a small amount of time, say 10 or 30 seconds.\
    \ This feature is generally useful with a camera that can be mounted on a tripod.\
    \ One thing it enables is the ability for a photographer to set up a shot, set\
    \ the timer, and then run into the shot.\n\nWhile this isn't something you would\
    \ often do with a mobile phone, I do think it would be useful in certain situations.\
    \ For example, I would love to have this feature when I want to take a picture\
    \ of both someone I am with and myself. Currently when I try to do so, I have\
    \ a difficult time, as I cannot see the touchscreen interface because it is facing\
    \ away from me. I fumble around, pushing the screen in various spots, hoping that\
    \ I hit the shutter button.\n\n## Building a Timer-Based Camera App\n\nTo rectify\
    \ the situation just described, we can add a time delay to the taking of the picture.\
    \ Let's update our `SnapShot` example so that picture is taken ten seconds after\
    \ pushing a button.\n\nIn order to accomplish this, we'll need to use something\
    \ like a `java.util.Timer`. Unfortunately, in Android, using a `Timer` creates\
    \ some complications as it introduces a separate thread. To have separate threads\
    \ interact with the UI, we need to use a `Handler` to cause an action to occur\
    \ on the main thread.\n\nThe other use of a `Handler` is to schedule something\
    \ to happen in the future. This capability of a `Handler` makes using the `Timer`\
    \ unnecessary.\n\nTo create a `Handler` that will execute something in the future,\
    \ we simply construct a generic one:\n\n```\nHandler timerHandler = new Handler();\n\
    ```\n\nWe then have to create a `Runnable`. This `Runnable` will contain within\
    \ its `run` method the action to happen later. In our case, we want this action\
    \ to occur ten seconds later and trigger the taking of the picture:\n\n```\nRunnable\
    \ timerTask = new Runnable() {\n    public void run() {\n        camera.takePicture(null,\
    \ null, null, TimerSnapShot.this);\n    }\n};\n```\n\nThat should cover it. Now\
    \ when we push a button, we simply need to schedule it:\n\n```\ntimerHandler.postDelayed(timerTask,\
    \ 10000);\n```\n\nThis tells the `timerHandler` to call our `timerTask` method\
    \ 10 seconds (10000 milliseconds) in the future.\n\nIn the following example,\
    \ we are creating a `Handler` and having it call a method every second. In this\
    \ way, we can provide a countdown on the screen to the user.\n\n```\npackage com.apress.proandroidmedia.ch2.timersnapshot;\n\
    \nimport java.io.FileNotFoundException;\nimport java.io.IOException;\nimport java.io.OutputStream;\n\
    import java.util.Iterator;\nimport java.util.List;\n\nimport android.app.Activity;\n\
    import android.content.ContentValues;\nimport android.content.res.Configuration;\n\
    import android.hardware.Camera;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.os.Handler;\nimport android.provider.MediaStore.Images.Media;\n\
    import android.util.Log;\nimport android.view.SurfaceHolder;\nimport android.view.SurfaceView;\n\
    import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
    import android.widget.TextView;\nimport android.widget.Toast;\n\npublic class\
    \ TimerSnapShot extends Activity implements OnClickListener,\n        SurfaceHolder.Callback,\
    \ Camera.PictureCallback {\n\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
    \    Camera camera;\n```\n\nThis activity is very similar to our `SnapShot` activity.\
    \ We are going to add a `Button` to trigger the start of countdown and a `TextView`\
    \ to display the countdown.\n\n```\n    Button startButton;\n    TextView countdownTextView;\n\
    ```\n\nWe'll also need a `Handler`, in this case `timerUpdateHandler`, a `Boolean`\
    \ to help us keep track of whether the timer has started (`timerRunning`), and\
    \ we'll have an integer (`currentTime`) that will keep track of the countdown.\n\
    \n```\n    Handler timerUpdateHandler;\n    boolean timerRunning = false;\n  \
    \  int currentTime = 10;\n```\n\n```\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n\n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
    \        surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
    \        surfaceHolder.addCallback(this);\n```\n\nNext, we'll obtain references\
    \ to the new UI elements (defined in the layout XML) and make our activity be\
    \ the `OnClickListener` for the `Button`. We can do this because our activity\
    \ implements `OnClickListener`.\n\n```\n        countdownTextView = (TextView)\
    \ findViewById(R.id.CountDownTextView);\n        startButton = (Button) findViewById(R.id.CountDownButton);\n\
    \        startButton.setOnClickListener(this);\n```\n\nThe last thing we'll do\
    \ in our `onCreate` method is instantiate our `Handler` object.\n\n```\n     \
    \   timerUpdateHandler = new Handler();\n    }\n```\n\nOur `onClick` method will\
    \ be called when the `startButton` `Button` is pressed. We'll make sure the timer\
    \ routine isn't already running by checking our `timerRunning` `Boolean`, and\
    \ if it isn't, we'll call `timerUpdateTask` `Runnable` (described here) without\
    \ delay through our `Handler` object, `timerUpdateHandler`.\n\n```\n    public\
    \ void onClick(View v) {\n        if (!timerRunning)\n        {\n            timerRunning\
    \ = true;\n            timerUpdateHandler.post(timerUpdateTask);\n        }\n\
    \    }\n```\n\nHere is our `Runnable` called `timerUpdateTask`. This is the object\
    \ that contains the `run` method that will be triggered by our `timerUpdateHandler`\
    \ object.\n\n```\n    private Runnable timerUpdateTask = new Runnable() {\n  \
    \      public void run()\n        {\n```\n\nIf the `currentTime`, the integer\
    \ holding our countdown, is greater than 1, we'll decrement it and schedule the\
    \ `Handler` call again in 1 second.\n\n```\n            if (currentTime > 1)\n\
    \            {\n                currentTime--;\n                timerUpdateHandler.postDelayed(timerUpdateTask,\
    \ 1000);\n            }\n            else\n            {\n```\n\nIf `currentTime`\
    \ isn't greater than 1, we'll actually trigger the camera to take the picture\
    \ and reset all of our tracking variables.\n\n```\n                camera.takePicture(null,\
    \ null, TimerSnapShot.this);\n                timerRunning = false;\n        \
    \        currentTime = 10;\n            }\n```\n\nNo matter what, we'll update\
    \ the `TextView` to display the current time remaining before the picture is taken.\n\
    \n```\n            countdownTextView.setText(\"\" + currentTime);\n        }\n\
    \    };\n```\n\nThe rest of the activity is essentially the same as the foregoing\
    \ `SnapShot` example.\n\n```\n    public void surfaceChanged(SurfaceHolder holder,\
    \ int format, int w, int h) {\n        camera.startPreview();\n    }\n\n    public\
    \ void surfaceCreated(SurfaceHolder holder) {\n        camera = Camera.open();\n\
    \        try {\n            camera.setPreviewDisplay(holder);\n\n            Camera.Parameters\
    \ parameters = camera.getParameters();\n\n            if (this.getResources().getConfiguration().orientation\
    \ !=\n                    Configuration.ORIENTATION_LANDSCAPE)\n            {\n\
    \                parameters.set(\"orientation\", \"portrait\");\n            \
    \    // For Android Version 2.2 and above\n                camera.setDisplayOrientation(90);\n\
    \                // For Android Version 2.0 and above\n                parameters.setRotation(90);\n\
    \            }\n\n            camera.setParameters(parameters);\n        }\n \
    \       catch (IOException exception)\n        {\n            camera.release();\n\
    \        }\n    }\n\n    public void surfaceDestroyed(SurfaceHolder holder) {\n\
    \        camera.stopPreview();\n        camera.release();\n    }\n\n    public\
    \ void onPictureTaken(byte[] data, Camera camera) {\n        Uri imageFileUri\
