    In the `onCreate` method, we instantiate the `MediaPlayer`. We are passing it
    a specific reference to an audio file called `goodmorningandroid.mp3`, which should
    be placed in the raw resources (`res/raw`) directory of our project. If this directory
    doesn’t exist, it should be created. Putting the audio file in that location allows
    us to refer to it by a constant in the generated `R` class, `R.raw.goodmorningandroid`.
    More detail about placing audio in the raw resources directory is available in
    Chapter 5 in the “Creating a Custom AudioPlaying Application” section.


    ```

    mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);

    ```


    We also set our Service, this class, to be the `OnCompletionListener` for the
    `MediaPlayer` object.


    ```

    mediaPlayer.setOnCompletionListener(this);

    }

    ```


    When the `startService` command is issued on this Service, the `onStartCommand`
    method will be triggered. In this method, we first check that the `MediaPlayer`
    object isn’t already playing, as this method may be called multiple times, and
    if it isn’t, we start it. Since we are using the `onStartCommand` method rather
    than the `onStart` method, this example runs only in Android 2.0 and above.


    ```

    @Override

    public int onStartCommand(Intent intent, int flags, int startId) {

    Log.v("PLAYERSERVICE","onStartCommand");

    if (!mediaPlayer.isPlaying()) {

    mediaPlayer.start();

    }

    return START_STICKY;

    }

    ```


    When the Service is destroyed, the `onDestroy` method is triggered. Since this
    doesn’t guarantee that the `MediaPlayer` will stop playing, we invoke its `stop`
    method here if it is playing and also call its `release` method to get rid of
    any memory usage and or resource locks.


    ```

    public void onDestroy() {

    if (mediaPlayer.isPlaying())

    {

    mediaPlayer.stop();

    }

    mediaPlayer.release();

    Log.v("SIMPLESERVICE","onDestroy");

    }

    ```


    Because we are implementing `OnCompletionListener` and the Service itself is set
    to be the `MediaPlayer`’s `OnCompletionListener`, the following `onCompletion`
    method is called when the `MediaPlayer` has finished playing an audio file. Since
    this Service is only meant to play one song and that’s it, we call `stopSelf`,
    which is analogous to calling `stopService` in our activity.


    ```

    public void onCompletion(MediaPlayer _mediaPlayer) {

    stopSelf();

    }

    }

    ```


