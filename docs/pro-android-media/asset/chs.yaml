  matrix.setRotate(15,bmp.getWidth()/2,bmp.getHeight()/2);

  alteredBitmap = Bitmap.createBitmap(bmp, 0, 0, bmp.getWidth(), bmp.getHeight(),

  matrix, false);

  alteredImageView.setImageBitmap(alteredBitmap);

  ```


