  \        </LinearLayout>\n    </FrameLayout>\n</LinearLayout>\n```\n\n最后，我们需要确保我们的\
  \ `AndroidManifest.xml` 文件包含 `CAMERA` 权限。\n\n```\n<uses-permission android:name=\"\
  android.permission.CAMERA\"></uses-permission>\n```\n\n![图 2-5](img/index-57_1.jpg)\n\
  \n**图 2–5.** 带倒计时器的相机\n\n### 构建延时摄影应用\n\n我们都见过延时摄影的精彩范例。它是一个在均匀的时间间隔内拍摄多张照片的过程。可以是一分钟一张、一小时一张，甚至一周一张。浏览一系列延时摄影照片，我们可以看到事物如何随时间变化。一个例子可能是观看一栋建筑的建造过程，另一个例子可能是记录一朵花如何生长和绽放。\n\
  \n既然我们已经构建了一个基于定时器的相机应用，将其升级为延时摄影应用就相当直接了。\n\n首先，我们会更改一些实例变量并添加一个常量。\n\n```java\n\
  public class TimelapseSnapShot extends Activity implements OnClickListener,\n  \
  \  SurfaceHolder.Callback, Camera.PictureCallback {\n\n    SurfaceView cameraView;\n\
  \    SurfaceHolder surfaceHolder;\n    Camera camera;\n```\n\n我们将把 `Button` 重命名为\
  \ `startStopButton`，因为它现在将处理启动和停止两种操作，并对其余变量进行一些轻微的命名更新。\n\n```java\n    Button\
  \ startStopButton;\n    TextView countdownTextView;\n    Handler timerUpdateHandler;\n\
  \    boolean timelapseRunning = false;\n```\n\n与之前示例从总延迟时间向下倒计时不同，这里的 `currentTime`\
  \ 整数将用于向上计数到照片之间的间隔秒数。一个名为 `SECONDS_BETWEEN_PHOTOS` 的常量被设置为 `60`。顾名思义，它将用于确定照片之间的等待时间。\n\
  \n```java\n    int currentTime = 0;\n    public static final int SECONDS_BETWEEN_PHOTOS\
  \ = 60; // one minute\n```\n\n`onCreate` 方法将基本保持不变——只是引用了新的变量名。\n\n```java\n   \
  \ @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n\
  \        surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  \        surfaceHolder.addCallback(this);\n        countdownTextView = (TextView)\
  \ findViewById(R.id.CountDownTextView);\n        startStopButton = (Button) findViewById(R.id.CountDownButton);\n\
  \        startStopButton.setOnClickListener(this);\n        timerUpdateHandler =\
  \ new Handler();\n    }\n```\n\n将基于单个定时器的应用转变为延时摄影应用，其大部分改动将集中在 `onClick` 方法（即按下按钮时执行的操作）以及由\
  \ `Handler` 调度的 `Runnable` 方法中。\n\n`onClick` 方法首先检查延时摄影过程是否正在运行（`Button` 之前已被按下），如果未运行，则将其设置为运行状态，并调用\
  \ `Handler` 的 `post` 方法，将 `Runnable` 作为参数传入。\n\n如果延时摄影过程正在运行，则按钮按下意味着停止它，因此会调用 `Handler`\
  \ 上的 `removeCallbacks` 方法。这将清除所有待执行的、作为参数传入的 `Runnable` 调用。\n\n```java\n    public\
  \ void onClick(View v) {\n        if (!timelapseRunning) {\n            startStopButton.setText(\"\
  Stop\");\n            timelapseRunning = true;\n            timerUpdateHandler.post(timerUpdateTask);\n\
  \        } else {\n            startStopButton.setText(\"Start\");\n           \
  \ timelapseRunning = false;\n            timerUpdateHandler.removeCallbacks(timerUpdateTask);\n\
  \        }\n    }\n```\n\n由于我们使用 `Handler` 进行调度，因此有一个 `Runnable`，当时间到来时，`Handler`\
  \ 会调用它。在我们的 `Handler` 的 `run` 方法中，我们首先检查 `currentTime` 整数是否小于我们想要在照片之间等待的秒数（`SECONDS_BETWEEN_PHOTOS`）。如果是，我们就简单地递增\
  \ `currentTime`。如果 `currentTime` 不小于等待时间，我们就指示 `Camera` 拍照，并将 `currentTime` 重置为\
  \ `0`，以便它继续向上计数。\n\n在每种情况之后，我们只需用 `currentTime` 更新 `TextView`，并调度在一秒后再次调用自身。\n\n\
  ```java\n    private Runnable timerUpdateTask = new Runnable() {\n        public\
  \ void run() {\n            if (currentTime < SECONDS_BETWEEN_PHOTOS) {\n      \
  \          currentTime++;\n            } else {\n                camera.takePicture(null,\
  \ null, null, TimelapseSnapShot.this);\n                currentTime = 0;\n     \
  \       }\n            timerUpdateHandler.postDelayed(timerUpdateTask, 1000);\n\
  \            countdownTextView.setText(\"\" + currentTime);\n        }\n    };\n\
  }\n```\n\n此示例的 `res/layout/main.xml` 界面以及当然还有 `AndroidManifest.xml`，与单个倒计时版本的相同。\n\
  \n## 总结\n\n正如你所见，我们想要构建自己的基于相机的应用，而不是仅仅在我们自己的应用中使用内置相机应用，其理由数不胜数。从简单地创建一个在倒计时后拍照的应用，到构建你自己的延时摄影系统等等，你的能力是无限的。\n\
  \n接下来，我们将看看在捕获这些图像后，我们可以用它们做些什么。\n\n\n\n### 图像编辑与处理\n\n随着手持设备性能日益强大，许多以往只能在台式电脑上实现的功能如今已可在移动设备上完成。图像编辑与处理曾经是`Photoshop`等桌面应用的专属领域，但现在通过手机也能轻松实现。\n\
  \n本章将探讨图像捕获后能对其进行哪些操作。我们将介绍如何通过旋转和缩放改变图像，如何调整亮度和对比度，以及如何将两张或多张图像合成在一起。\n\n## 使用内置图库应用选择图像\n\
  \n众所周知，利用`intent`通常是调用 Android 预装应用现有功能的最快捷方式。为便于本章示例讲解，我们来了解如何调用内置图库应用，选择需要处理的图像。\n\
  \n我们将使用的 intent 是通用的`Intent.ACTION_PICK`，它向 Android 系统表明我们想要选择一条数据。同时还需提供要选择数据的\
  \ URI。此处我们使用`android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI`，即选择存储在\
  \ SD 卡上`MediaStore`中的图像。\n\n```java\nIntent choosePictureIntent = new Intent(Intent.ACTION_PICK,\n\
  \        android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n```\n\n\
  当该 intent 被触发时，图库应用会以允许用户选择图像的模式启动。\n\n与 intent 返回结果通常的处理方式一样，当用户选定图像后，我们的`onActivityResult`方法会被触发。所选图像的\
  \ URI 会通过返回 intent 的`data`参数传递回来。\n\n```java\nprotected void onActivityResult(int\
  \ requestCode, int resultCode, Intent intent) {\n    super.onActivityResult(requestCode,\
  \ resultCode, intent);\n    if (resultCode == RESULT_OK) {\n        Uri imageFileUri\
  \ = intent.getData();\n    }\n}\n```\n\n以下是一个完整示例：\n\n```java\npackage com.apress.proandroidmedia.ch3.choosepicture;\n\
  \nimport java.io.FileNotFoundException;\nimport android.app.Activity;\nimport android.content.Intent;\n\
  import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
  \ android.net.Uri;\nimport android.os.Bundle;\nimport android.util.Log;\nimport\
  \ android.view.Display;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
  import android.widget.Button;\nimport android.widget.ImageView;\n```\n\n我们的 activity\
  \ 需要响应按钮触发的点击事件，因此需实现`OnClickListener`接口。在`onCreate`方法中，使用常规的`findViewById`方法来访问布局\
  \ XML 中定义的必需 UI 元素。\n\n```java\npublic class ChoosePicture extends Activity implements\
  \ OnClickListener {\n\n    ImageView chosenImageView;\n    Button choosePicture;\n\
  \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n       \
  \ super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\n\
  \        chosenImageView = (ImageView) this.findViewById(R.id.ChosenImageView);\n\
  \        choosePicture = (Button) this.findViewById(R.id.ChoosePictureButton);\n\
  \        choosePicture.setOnClickListener(this);\n    }\n}\n```\n\n**图 3–1.** *应用首次启动时显示的\
  \ `choosePicture` 按钮*\n\n接下来是`onClick`方法，它将响应对`choosePicture`按钮的按下操作，该按钮如图 3–1 所示在应用启动时显示。在此方法中，我们创建\
  \ intent，该 intent 将触发图库应用以允许用户选择图片的模式启动，如图 3–2 所示。\n\n```java\npublic void onClick(View\
  \ v) {\n    Intent choosePictureIntent = new Intent(Intent.ACTION_PICK,\n      \
  \      android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);\n    startActivityForResult(choosePictureIntent,\
  \ 0);\n}\n```\n\n**图 3–2.** *图库应用被`ACTION_PICK` intent 触发后提示用户选择图片的视图；图库应用的 UI 可能因设备而异。*\n\
  \n当用户选择图像后图库应用返回时，我们的`onActivityResult`方法被调用。我们通过传入 intent 的 data 获取所选图像的 URI。\n\
  \n```java\nprotected void onActivityResult(int requestCode, int resultCode, Intent\
  \ intent) {\n    super.onActivityResult(requestCode, resultCode, intent);\n    if\
  \ (resultCode == RESULT_OK) {\n        Uri imageFileUri = intent.getData();\n```\n\
  \n由于返回的图像可能过大，无法完全加载到内存中，我们将采用第一章介绍的技术，在加载时调整其大小。`dw`和`dh`整数将分别代表最大宽度和最大高度。最大高度将小于屏幕高度的一半，因为我们最终将垂直显示两张图像。\n\
  \n```java\n        Display currentDisplay = getWindowManager().getDefaultDisplay();\n\
  \        int dw = currentDisplay.getWidth();\n        int dh = currentDisplay.getHeight()/2\
  \ - 100;\n\n        try {\n            // 仅加载图像的尺寸，而非图像本身\n            BitmapFactory.Options\
  \ bmpFactoryOptions = new BitmapFactory.Options();\n            bmpFactoryOptions.inJustDecodeBounds\
  \ = true;\n\n            Bitmap bmp = BitmapFactory.decodeStream(getContentResolver().\n\
  \                    openInputStream(imageFileUri), null, bmpFactoryOptions);\n\n\
  \            int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n\
  \            int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\
  \n            if (heightRatio > 1 && widthRatio > 1) {\n                if (heightRatio\
  \ > widthRatio) {\n                    bmpFactoryOptions.inSampleSize = heightRatio;\n\
  \                } else {\n                    bmpFactoryOptions.inSampleSize =\
  \ widthRatio;\n                }\n            }\n\n            bmpFactoryOptions.inJustDecodeBounds\
  \ = false;\n            bmp = BitmapFactory.decodeStream(getContentResolver().\n\
  \                    openInputStream(imageFileUri), null, bmpFactoryOptions);\n\n\
  \            chosenImageView.setImageBitmap(bmp);\n        } catch (FileNotFoundException\
  \ e) {\n            Log.v(\"ERROR\", e.toString());\n        }\n    }\n}\n}\n```\n\
  \n需要在项目的`layout/main.xml`文件中添加以下内容：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\"\n>\n    <Button\n        android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  选择图片\"\n        android:id=\"@+id/ChoosePictureButton\"\n    />\n    <ImageView\n\
  \        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:id=\"@+id/ChosenImageView\"\n    />\n</LinearLayout>\n\
  ```\n\n\n\n"
- '# 第 3 章：图像编辑与处理


  **图 3–3.** *用户选择图片后的应用程序界面*


  到此为止，我们现在已将用户选择的图像以`Bitmap`对象的形式显示给用户，如图 3-3 所示。接下来，我们将探讨如何以该`Bitmap`作为起点进行其他操作。


  ## 将位图绘制到位图上


  在深入探讨用于修改图像的具体机制之前，我们先来看看如何创建一个新的空`Bitmap`对象，并将现有的`Bitmap`绘制到其中。我们将通过这一流程来创建图像的修改版本。


  在前面的示例中，我们实例化了一个`Bitmap`对象，其中包含用户选定的图像。该对象通过调用`BitmapFactory`的`decodeStream`方法进行实例化，正如我们在第
  1 章中所学。


  ```java

  Bitmap bmp = BitmapFactory.decodeStream(getContentResolver().

  openInputStream(imageFileUri), null, bmpFactoryOptions);

  ```


  为了将该`Bitmap`作为图像编辑实验的源图像，我们需要能够将此`Bitmap`连同应用的效果一起绘制到屏幕上。此外，如果能够将其绘制到一个可用于保存结果图像的对象上，那就更好了。


  因此，创建一个与该`Bitmap`尺寸相同的空`Bitmap`对象，并将其用作修改后`Bitmap`的目标对象，是合理的做法。


  ```java

  Bitmap alteredBitmap = Bitmap.createBitmap(bmp.getWidth(),

  bmp.getHeight(),bmp.getConfig());

  ```


  这个`alteredBitmap`对象与源`Bitmap`（即`bmp`）具有相同的宽度、高度和色深。由于我们使用`Bitmap`类的`createBitmap`方法，并传入了宽度、高度和`Bitmap.Config`对象作为参数，因此我们得到的是一个可变的`Bitmap`对象。可变意味着我们可以修改此`Bitmap`所表示的像素值。如果得到的是一个不可变的`Bitmap`，我们将无法在其上进行绘制。此方法调用是实例化可变`Bitmap`对象的少数几种方式之一。


  接下来，我们需要一个`Canvas`对象。在 Android 中，`Canvas`正如其名，是用于绘制的工具。可以通过在其构造函数中传入一个`Bitmap`对象来创建`Canvas`，之后便可使用它进行绘制。


  ```java

  Canvas canvas = new Canvas(alteredBitmap);

  ```


  最后，我们需要一个`Paint`对象。在实际绘制时，`Paint`对象将发挥作用。具体来说，它允许我们修改颜色和对比度等参数，不过我们稍后会详细讨论。目前，我们将使用一个默认的`Paint`对象。


  ```java

  Paint paint = new Paint();

  ```


  现在，我们拥有将源`Bitmap`绘制到一个空的可变`Bitmap`对象所需的所有组件。以下是上述所有代码的整合。


  ```java

  Bitmap bmp = BitmapFactory.decodeStream(getContentResolver().

  openInputStream(imageFileUri), null, bmpFactoryOptions);

  Bitmap alteredBitmap = Bitmap.createBitmap(bmp.getWidth(),bmp.getHeight(),

  bmp.getConfig());

  Canvas canvas = new Canvas(alteredBitmap);

  Paint paint = new Paint();

  canvas.drawBitmap(bmp, 0, 0, paint);

  ImageView alteredImageView = (ImageView) this.findViewById(R.id.AlteredImageView);

  alteredImageView.setImageBitmap(alteredBitmap);

  ```


  我们使用的`Canvas`对象上的`drawBitmap`方法接受源`Bitmap`、x/y 偏移量以及我们的`Paint`对象。这将使我们的`alteredBitmap`对象包含与原始位图完全相同的信息。


  我们可以将所有这段代码插入到“选择图片”示例中。它应放在`onActivityResult`方法的末尾，紧跟`bmp = BitmapFactory.decodeStream`这一行之后。注意不要重复该行，如上代码片段所示。同时，不要忘记添加相应的导入语句。


  之后，我们希望显示`alteredBitmap`对象。为此，我们使用一个标准的`ImageView`，并调用`setImageBitmap`方法，传入我们的`alteredBitmap`。这要求我们在布局
  XML 中声明一个 id 为`AlteredImageView`的`ImageView`。


  以下是“选择图片”完整示例更新后的布局 XML，其中包含了原始的`ImageView`以及用于显示`alteredBitmap`的新`ImageView`，如图
  3-4 所示。


  ![](img/index-68_1.jpg)


  ```xml

  <?xml version="1.0" encoding="utf-8"?>

  <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"

  android:orientation="vertical"

  android:layout_width="fill_parent"

  android:layout_height="fill_parent"

  >

  <Button

  android:layout_width="fill_parent"

  android:layout_height="wrap_content"

  android:text="选择图片" android:id="@+id/ChoosePictureButton"/>

  <ImageView android:layout_width="wrap_content" android:layout_height="wrap_content"

  android:id="@+id/ChosenImageView"></ImageView>

  <ImageView android:layout_width="wrap_content" android:layout_height="wrap_content"

  android:id="@+id/AlteredImageView"></ImageView>

  </LinearLayout>

  ```


