  ```\n\n在之前的图片保存示例中，数据已经以 JPEG 格式存在，我们只需将其写入`OutputStream`即可。而在本例中，我们必须使用`Bitmap`对象的`compress`方法，将其转换为\
  \ JPEG（或 PNG，如果我们选择的话）。\n\n`compress`方法会压缩`Bitmap`数据并将其写入`OutputStream`。它接收一个定义在`Bitmap.CompressFormat`中的常量，可以是`PNG`或`JPEG`。PNG\
  \ 非常适合线条艺术和图形，JPEG 则非常适合具有渐变效果的彩色图片，比如照片。由于我们这里处理的是照片，因此使用 JPEG 格式。\n\n下一个参数是质量设置。质量设置仅在压缩为\
  \ JPEG 时有用，因为 PNG 图像会始终保留所有数据，质量设置对其无效。JPEG 是一种“有损”编码器，这意味着数据会被丢弃。质量与文件大小成反比。质量设置为\
  \ 0 将产生很小的文件体积，但图像质量不佳；质量设置为 100 将产生很大的文件体积，但图像效果会非常好。在本例中，如图 4-19 所示，我们使用了 90，这是一个折中的选择。图\
  \ 4-20 展示了相同图像在质量设置为 10 时的效果，以供对比。\n\n我们需要传入的最后一个参数是实际的`OutputStream`，用于写入文件。\n\n\
