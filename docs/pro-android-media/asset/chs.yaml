- "# 第 4 章：图形与触摸事件\n\n**图 4-19.** 使用质量设置 90 保存为 JPEG 的图像\n\n**图 4-20.** 使用质量设置 10\
  \ 保存为 JPEG 的图像；其文件大小不到质量设置 90 所保存图像的六分之一。\n\n## 小结\n\n正如我们所探讨的，在 Android 上使用基于画布的绘图可以实现很多功能。这为我们的第一部分探索画上了句号，这部分主要处理静态图像。我们讨论的大部分内容仅仅触及了可能性的表面，但这为创建自己的应用程序提供了一个良好的起点，无论是利用相机、执行图像处理，还是具备绘图功能。\n\
  \n接下来，我们将把目光投向音频！\n\n---\n\n## 第 5 章：音频简介\n\n\n\n### **Android**\n\n如今，任何名副其实的智能手机都具备与专用便携式媒体设备或\
  \ MP3 播放器相媲美的音频播放能力。当然，基于 Android 的设备也不例外。这些能力使我们能够构建音乐播放器、有声读物、播客，或者任何其他以音频播放为核心的应用程序。\n\
  \n在本章中，我们将探讨 Android 在格式和编解码器支持方面的能力，并构建几个不同的播放应用程序。此外，我们还将了解 Android 支持的音频格式和元数据。\n\
  \n## 音频播放\n\n如前所述，Android 支持与 MP3 播放器相媲美的音频播放能力。事实上，它可能更胜一筹，因为它支持相当广泛的音频格式，比大多数硬件播放器都要多。这是智能手机的优势之一，它执行了以前由专用硬件承担的功能，因为它们拥有运行各种软件的强大能力；就像电脑一样，它们可以为不同且不断变化的技术提供广泛的支持，而这些技术简单地集成到以硬件为中心的设备的固件中是不切实际的。\n\
  \n### 支持的音频格式\n\nAndroid 支持多种用于播放的音频文件格式和编解码器（它支持的录制格式较少，我们将在讲解录制时讨论）。\n\n*   **AAC**：高级音频编码（AAC）编解码器（以及高效率\
  \ AAC 的两种配置文件——HE-AAC），文件格式为 `.m4a (audio/m4a)` 或 `.3gp (audio/3gpp)`。AAC 是一种流行的标准，被\
  \ iPod 和其他便携式媒体播放器使用。Android 支持在 MPEG-4 音频文件和 3GP 文件（基于 MPEG-4 格式）中使用这种音频格式。AAC\
  \ 规范的最新补充——高效率 AAC 也得到支持。\n*   **MP3**：MPEG-1 音频层 3，文件格式为 `.mp3 (audio/mp3)`。Android\
  \ 支持 MP3，它可能是使用最广泛的音频编解码器。这使得 Android 能够利用通过各种网站和音乐商店提供的绝大多数在线音频资源。\n*   **AMR**：自适应多速率（AMR）编解码器（包括\
  \ AMR 窄带 AMR-NB 和 AMR 宽带 AMR-WB），文件格式为 `.3gp (audio/3gpp)` 或 `.amr (audio/amr)`。AMR\
  \ 是被 3GPP（第三代合作伙伴计划）标准化为主要语音音频编解码器的音频编解码器。3GPP 是一个电信行业组织，为其合作伙伴公司制定规范。换句话说，AMR 编解码器主要用于现代手机上的语音通话应用，并且普遍得到移动手机制造商和运营商的广泛支持。因此，该编解码器通常适用于语音编码，但对于音乐等更复杂的音频类型表现不佳。\n\
  *   **Ogg**：Ogg Vorbis，文件格式为 `.ogg (application/ogg)`。Ogg Vorbis 是一种开源、无专利的音频编解码器，其质量可与\
  \ MP3、AAC 等商业且受专利保护的编解码器相媲美。它由志愿者开发，目前由 Xiph.Org 基金会维护。\n*   **PCM**：脉冲编码调制（PCM），常用于\
  \ WAVE 或 WAV 文件（波形音频格式），文件格式为 `.wav (audio/x-wav)`。PCM 是用于在计算机和其他数字音频设备上存储音频的技术。它通常是一种未压缩的音频文件，其数据表示一段时间内音频的振幅。“采样率”是存储振幅读数的频率。“位深度”是用于表示单个样本的位数。例如，采样率为\
  \ 16kHz、位深度为 32 位的音频数据意味着它将包含 32 位数据来表示音频的振幅，并且每秒会有 16,000 个这样的数据。采样率越高，位深度越高，音频的数字化就越精确。采样率和位深度也决定了音频文件在考虑其长度后的大小。Android\
  \ 支持 WAV 文件中的 PCM 音频数据。WAV 是个人电脑上历史悠久的音频标准格式。\n\n## 通过 Intent 使用内置音频播放器\n\n与使用相机类似，在应用程序内提供播放音频文件能力的最简单方法是利用内置“音乐”应用程序的功能。这个应用程序可以播放\
  \ Android 支持的所有格式，拥有用户熟悉的界面，并且可以通过 Intent 触发播放特定文件。\n\n通用的 `android.content.Intent.ACTION_VIEW`\
  \ Intent，将其数据设置为音频文件的 `Uri` 并指定 MIME 类型，可以让 Android 选择合适的播放应用程序。这通常是音乐应用程序，但如果用户安装了其他音频播放软件，也可能会看到其他选项。\n\
  \n```java\nIntent intent = new Intent(android.content.Intent.ACTION_VIEW);\nintent.setDataAndType(audioFileUri,\
  \ \"audio/mp3\");\nstartActivity(intent);\n```\n\n**注意：** MIME 代表多用途互联网邮件扩展（Multipurpose\
  \ Internet Mail Extensions）。它最初是为了帮助电子邮件客户端发送和接收附件而制定的。然而，它的用途已远远超出了电子邮件，扩展到了许多其他通信协议，包括\
  \ HTTP 或标准 Web 服务。Android 在解析 Intent 时会使用 MIME 类型，特别是为了帮助确定哪个应用程序应该处理该 Intent。\n\
  \n每种文件类型都有一个特定（有时不止一个）的 MIME 类型。此类型至少使用两部分指定，中间用斜杠分隔。第一部分是更通用的类型，例如“audio”。第二部分是更具体的类型，例如“mpeg”。通用类型“audio”和更具体类型“mpeg”将产生\
  \ MIME 类型字符串 `audio/mpeg`，这通常是用于 MP3 文件的 MIME 类型。\n\n以下是通过 Intent 触发内置音频播放应用程序的完整示例：\n\
  \n```java\npackage com.apress.proandroidmedia.ch5.intentaudioplayer;\n\nimport java.io.File;\n\
  \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.os.Environment;\nimport android.view.View;\n\
  import android.view.View.OnClickListener;\nimport android.widget.Button;\n\n我们的\
  \ Activity 将监听按钮按下事件，然后才触发音频播放。它实现了 OnClickListener 接口以便做出响应。\n\npublic class AudioPlayer\
  \ extends Activity implements OnClickListener {\n\n    Button playButton;\n\n  \
  \  @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n将内容视图设置为我们 XML 布局后，我们可以在代码中获取 Button\
  \ 的引用，并将我们的 Activity（this）设置为 OnClickListener。\n\n        playButton = (Button)\
  \ this.findViewById(R.id.Button01);\n        playButton.setOnClickListener(this);\n\
  \    }\n\n当我们的按钮被点击时，onClick 方法被调用。在此方法中，我们使用通用的 android.content.Intent.ACTION_VIEW\
  \ 构造 Intent，然后创建一个 File 对象，该对象是对 SD 卡上存在的音频文件的引用。在这种情况下，音频文件是手动放置在 SD 卡“Music”目录中的文件，该目录是音乐相关音频文件的标准位置。\n\
  \n    public void onClick(View v) {\n        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
  \        File sdcard = Environment.getExternalStorageDirectory();\n        File\
  \ audioFile = new File(sdcard.getPath() + \"/Music/goodmorningandroid.mp3\"); \n\
  \n        接下来，我们将 Intent 的数据设置为从音频文件派生的 Uri，并将类型设置为其 MIME 类型 audio/mp3。最后，我们通过调用\
  \ startActivity 并传入我们的 Intent 来触发内置应用程序启动。图 5-1 显示了内置应用程序正在播放该音频文件。\n\n        intent.setDataAndType(Uri.fromFile(audioFile),\
  \ \"audio/mp3\");\n        startActivity(intent);\n    }\n}\n```\n\n这是一个简单的布局 XML\
  \ 文件，指定了文本为“Play Audio”的 Button，用于上述 Activity。\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\"\n    >\n    <Button android:text=\"\
  Play Audio\" android:id=\"@+id/Button01\"\n        android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\"></Button>\n</LinearLayout>\n```\n\n**图\
  \ 5–1.** Android 内置音乐播放器播放通过 Intent 指定的音频文件。\n\n## 创建自定义音频播放应用程序\n\n当然，我们并不局限于使用\
  \ Android 内置的音频播放应用程序。我们可以编写自己的应用程序，提供播放能力及更多功能。\n\n为此，Android 包含一个 `MediaPlayer`\
  \ 类。这个类用于播放和控制音频和视频。现在我们只使用其音频播放能力。\n\n最简单的 `MediaPlayer` 示例是回放与应用程序本身打包在一起的音频文件。为此，需要将音频文件放置在应用程序的原始资源文件夹中。要在\
  \ Eclipse 中使用 Android 开发者工具执行此操作，我们需要在项目的 `res` 文件夹中创建一个名为 `raw` 的新文件夹，如图 5-2 所示。Android\
  \ 开发者工具将在 `R.java` 文件（位于 `gen` 文件夹中）中为此文件生成一个资源 ID，语法为 `R.raw.file_name_without_extension`。\n\
  \n**图 5–2.** 自定义音频播放器的 Eclipse 项目布局，显示了位于 `res` 文件夹内 `raw` 文件夹中的音频文件。\n\n### 启动媒体播放器\n\
  \n为此音频文件创建一个 `MediaPlayer` 很简单。我们使用静态方法 `create` 实例化一个 `MediaPlayer` 对象，将 `this`\
  \ 作为 `Context`（`Activity` 继承自它）和音频文件生成的资源 ID 传递给它。\n\n```java\nMediaPlayer mediaPlayer\
  \ = MediaPlayer.create(this, R.raw.goodmorningandroid);\n```\n\n之后，我们只需在 `MediaPlayer`\
  \ 对象上调用 `start` 方法来播放它。\n\n```java\nmediaPlayer.start();\n```\n\n#### 本地资源\n\n在\
  \ Android 开发者工具 / Eclipse 项目的 `res` 文件夹中放置资源时，需要考虑两件事：文件扩展名和使用 `Uri`。\n\n**文件扩展名**\n\
  \n扩展名会被移除，因此基本名称相同但扩展名不同的文件会引起问题。\n\n你不应该将名为 `goodmorningandroid.mp3` 和另一个名为 `goodmorningandroid.m4a`\
  \ 的文件放在里面。相反，如果你想以多种格式提供相同的音频，最好将格式作为文件名的一部分包含在内，这样你就可以区分它们，并且 Android 开发者工具在生成资源\
  \ ID 时也不会出现问题。如果你将它们命名为 `goodmorningandroid_mp3.mp3` 和 `goodmorningandroid_m4a.m4a`，你就可以分别将它们引用为\
  \ `R.raw.goodmorningandroid_mp3` 和 `R.raw.goodmorningandroid_m4a`。\n\n**资源文件的 Uri**\n\
  \n虽然资源 ID 对某些目的来说很好，但它们并不适用于所有情况。正如我们已经知道的，Android 中的许多事情都可以使用 `Uri` 来完成。幸运的是，为放置在资源中的文件构造一个\
  \ `Uri` 很容易。资源 ID 可以附加到一个字符串的末尾，该字符串可用于构造 `Uri`。该字符串必须以 `android.resource://` 开头，后跟资源所在的应用程序的包名，再后跟文件的资源\
  \ ID。\n\n以下是一个示例：\n\n```java\nUri fileUri = Uri.parse(\"android.resource://com.apress.proandroidmedia.ch5.customaudio/\"\
  \n    + R.raw.goodmorningandroid);\n```\n\n要使用 `MediaPlayer` 与 `Uri` 而不是资源 ID（如果文件不是应用程序的一部分，我们将不得不这样做），我们可以调用一个\
  \ `create` 方法，传入上下文和 `Uri`。\n\n```java\nMediaPlayer mediaPlayer = MediaPlayer.create(this,\
  \ fileUri);\n```\n\n### 控制播放\n\n`MediaPlayer` 类有几个嵌套类，这些类是用于监听 `MediaPlayer` 发送的事件的接口。这些事件与状态变化有关。\n\
  \n例如，当音频文件播放完毕时，`MediaPlayer` 将在实现了 `OnCompletionListener` 并通过 `setOnCompletionListener`\
  \ 注册的类上调用 `onCompletion` 方法。\n\n以下是一个 Activity 的完整示例，它通过使用 `OnCompletionListener`\
  \ 无限重复播放同一个音频文件。`MediaPlayer` 对象在 `onStart` 方法中初始化并开始播放，在 `onStop` 方法中停止播放并释放 `MediaPlayer`\
  \ 对象。这可以防止当 Activity 不再在前台时播放音频，但在 Activity 再次被带到前台时重新开始播放。\n\n```java\npackage\
  \ com.apress.proandroidmedia.ch5.customaudio;\n\nimport android.app.Activity;\n\
  import android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
  import android.os.Bundle;\n\npublic class CustomAudioPlayer extends Activity implements\
  \ OnCompletionListener {\n\n    MediaPlayer mediaPlayer;\n\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n    }\n\n    public void onStart() {\n\
  \        super.onStart();\n        mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);\n\
  \        mediaPlayer.setOnCompletionListener(this);\n        mediaPlayer.start();\n\
  \    }\n\n    public void onStop() {\n        super.onStop();\n        mediaPlayer.stop();\n\
  \        mediaPlayer.release();\n    }\n\n    public void onCompletion(MediaPlayer\
  \ mp) {\n        mediaPlayer.start();\n    }\n}\n```\n\n当然，这也可以不使用 `OnCompletionListener`\
  \ 来实现，只需使用 `setLooping(true)` 方法将 `MediaPlayer` 设置为循环播放即可。\n\n让我们更进一步，让播放由触摸事件控制。这段代码可能是制作\
  \ DJ 音频搓盘应用程序的一个良好起点。\n\n```java\npackage com.apress.proandroidmedia.ch5.customaudio;\n\
  \nimport android.app.Activity;\nimport android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.MotionEvent;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.view.View.OnTouchListener;\n\
  import android.widget.Button;\n\n我们的 Activity 将像上一个例子一样实现 OnCompletionListener，但也会实现\
  \ OnTouchListener，以便响应触摸事件，以及 OnClickListener，以便在用户点击按钮时做出响应。\n\npublic class CustomAudioPlayer\
  \ extends Activity implements OnCompletionListener,\n        OnTouchListener, OnClickListener\
  \ {\n\n    当然，我们需要一个对 MediaPlayer 对象的引用。我们需要访问一个 View，以便注册我们想要触摸事件，并且我们需要访问我们在布局\
  \ XML 文件中定义的任何按钮——在本例中，是一个停止播放的按钮和一个开始播放的按钮。\n\n    MediaPlayer mediaPlayer;\n \
  \   View theView;\n    Button stopButton, startButton;\n\n    我们将声明一个变量，用于保存音频文件中的已保存位置。稍后我们将使用这个位置来确定从何处开始播放音频文件。\n\
  \n    int position = 0;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        使用我们通常的 findViewById 函数，我们将获得对布局 XML 中定义的按钮和视图的访问。\n\n        stopButton\
  \ = (Button) this.findViewById(R.id.StopButton);\n        startButton = (Button)\
  \ this.findViewById(R.id.StartButton);\n\n        由于我们的 Activity 可以响应点击事件，我们将让它被注册为两个按钮的监听器。\n\
  \n        startButton.setOnClickListener(this);\n        stopButton.setOnClickListener(this);\n\
  \n        theView = this.findViewById(R.id.theview);\n\n        然后，我们将让我们的 Activity（this）响应触摸事件。\n\
  \n        theView.setOnTouchListener(this);\n\n        在此应用程序中，我们的音频文件名为 goodmorningandroid.mp3，已放置在项目的\
  \ res/raw 文件夹中。我们将使用此文件创建我们的 MediaPlayer 对象。此外，与上一个示例一样，我们将我们的 Activity 设置为 MediaPlayer\
  \ 的 OnCompletionListener。\n\n        mediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);\n\
  \        mediaPlayer.setOnCompletionListener(this);\n        mediaPlayer.start();\n\
  \    }\n\n    这里定义了我们 的 onCompletion 方法。每当 MediaPlayer 播放完我们的音频文件时，它就会被调用。在这种情况下，我们将首先调用\
  \ start 来播放音频，然后调用 seek 到已保存的位置。音频需要先开始播放，我们才能进行 seek。\n\n    public void onCompletion(MediaPlayer\
  \ mp) {\n        mediaPlayer.start();\n        mediaPlayer.seekTo(position);\n \
  \   }\n\n    当用户触发触摸事件时，onTouch 方法被调用。在此方法中，我们只关注 ACTION_MOVE 触摸事件，该事件在用户将手指拖过视图表面时触发。在这种情况下，我们将确保\
  \ MediaPlayer 正在播放，然后根据触摸事件在屏幕上的位置计算我们应该 seek 到哪里。如果它发生在屏幕的右边界附近，我们将 seek 到文件末尾附近。如果它发生在屏幕的左边界附近，我们将\
  \ seek 到文件开头附近。我们将此值保存在 position 变量中，以便当音频文件播放完毕，重新开始播放时，它会跳回到那个点（在 onCompletion\
  \ 方法中）。\n\n    public boolean onTouch(View v, MotionEvent me) {\n        if (me.getAction()\
  \ == MotionEvent.ACTION_MOVE) {\n            if (mediaPlayer.isPlaying()) {\n  \
  \              position = (int) (me.getX() *\n                        mediaPlayer.getDuration()/theView.getWidth());\n\
  \                Log.v(\"SEEK\",\"\"+position);\n                mediaPlayer.seekTo(position);\n\
  \            }\n        }\n        return true;\n    }\n\n    最后，我们有一个 onClick 方法来响应按钮点击。这些点击用于暂停和开始音频播放。\n\
  \n    public void onClick(View v) {\n        if (v == stopButton) {\n          \
  \  mediaPlayer.pause();\n        } else if (v == startButton) {\n            mediaPlayer.start();\n\
  \        }\n    }\n}\n```\n\n以下是上述代码示例中引用的布局 XML 文件：\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\"\n    >\n    <Button android:text=\"\
  Start\" android:id=\"@+id/StartButton\"\n        android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\"></Button>\n    <Button android:text=\"\
  Stop\" android:id=\"@+id/StopButton\"\n        android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\"></Button>\n    <View android:layout_width=\"\
  fill_parent\" android:layout_height=\"fill_parent\"\n        android:id=\"@+id/theview\"\
  \ />\n</LinearLayout>\n```\n\n正如你所看到的，在 Android 上构建自定义音频播放器开辟了一些有趣的 possibilities。可以构建的应用程序不仅仅是直接播放音频。将其变成一个功能齐全的手机\
  \ DJ 应用程序可能会很有趣。\n\n## 用于音频的 MediaStore\n\n我们在本书前面探讨了如何使用 `MediaStore` 处理图像。我们学到的大部分知识都可以用于其他类型媒体（包括音频）的存储和检索。为了提供一种健壮的浏览和搜索音频的机制，Android\
  \ 包含一个 `MediaStore.Audio` 包，它定义了标准的内容提供器。\n\n### 从 MediaStore 访问音频\n\n访问使用 `MediaStore`\
  \ 提供器存储的音频文件与我们之前使用 `MediaStore` 的方式是一致的。在本例中，我们将使用 `android.provider.MediaStore.Audio`\
  \ 包。\n\n通过一个示例应用程序来说明 `MediaStore` 在音频方面的使用是最简单的方法之一。以下代码创建了一个 Activity，它查询 `MediaStore`\
  \ 获取任何音频文件，并简单地播放返回的第一个文件。\n\n```java\npackage com.apress.proandroidmedia.ch5.audioplayer;\n\
  \nimport java.io.File;\n\nimport android.app.Activity;\nimport android.content.Intent;\n\
  import android.database.Cursor;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.provider.MediaStore;\n\npublic class AudioPlayer\
  \ extends Activity {\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        要使用 MediaStore，我们需要指定要返回哪些数据。我们通过使用位于 android.provider.MediaStore.Audio.Media\
  \ 类中的常量创建一个字符串数组来实现这一点。这些常量是保存在 MediaStore 中用于音频的所有标准字段。\n\n        在本例中，我们请求 DATA\
  \ 列，该列包含实际音频文件的路径。我们还请求内部 ID、标题、显示名称、MIME 类型、艺术家、专辑以及音频文件的类型——是闹钟、音乐、铃声还是通知类型。\n\
  \n        其他列，例如添加日期（DATE_ADDED）、修改日期（DATE_MODIFIED）、文件大小（SIZE）等也可用。\n\n       \
  \ String[] columns = {\n            MediaStore.Audio.Media.DATA,\n            MediaStore.Audio.Media._ID,\n\
  \            MediaStore.Audio.Media.TITLE,\n            MediaStore.Audio.Media.DISPLAY_NAME,\n\
  \            MediaStore.Audio.Media.MIME_TYPE,\n            MediaStore.Audio.Media.ARTIST,\n\
  \            MediaStore.Audio.Media.ALBUM,\n            MediaStore.Audio.Media.IS_RINGTONE,\n\
  \            MediaStore.Audio.Media.IS_ALARM,\n            MediaStore.Audio.Media.IS_MUSIC,\n\
  \            MediaStore.Audio.Media.IS_NOTIFICATION\n        };\n\n        我们通过调用\
  \ Activity 中的 managedQuery 方法来查询 MediaStore。managedQuery 方法接受内容提供器的 Uri，在本例中是音频\
  \ MediaStore，即 android.provider.MediaStore.Audio.Media.EXTERNAL_CONTENT_URI。这个 Uri\
  \ 指定我们想要存储在 SD 卡上的音频。如果我们想要存储在内部存储器中的音频文件，我们将使用 android.provider.MediaStore.Audio.Media.INTERNAL_CONTENT_URI。\n\
  \n        除了 MediaStore 的 Uri，managedQuery 方法还接受我们想要返回的列数组、一个 SQL WHERE 子句、WHERE\
  \ 子句的值以及一个 SQL ORDER BY 子句。\n\n        在这个例子中，我们没有使用 WHERE 和 ORDER BY 子句，所以我们将为这些参数传递\
  \ null。\n\n        Cursor cursor = managedQuery(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,\n\
  \                columns, null, null, null);\n\n        managedQuery 方法返回一个 Cursor\
  \ 对象。Cursor 类允许与数据库查询返回的数据集进行交互。\n\n        我们要做的第一件事是创建几个变量来保存我们想要从结果中访问的一些列的列号。这不是绝对必要的，但拥有索引很方便，这样我们就不必在每次需要时都调用\
  \ Cursor 对象的方法。我们通过将要获取的列的常量值传递给 Cursor 的 getColumnIndex 方法来获取它们。\n\n        int\
  \ fileColumn = cursor.getColumnIndex (MediaStore.Audio.Media.DATA);\n\n        第一个是包含实际音频文件路径的列的索引。我们通过传递表示该列的常量\
  \ android.provider.MediaStore.Audio.Media.DATA 来获取上述索引。\n\n        接下来我们获取其他几个索引，并非所有索引我们都实际使用，所以额外的索引仅用于说明目的。\n\
  \n        int titleColumn = cursor.getColumnIndex (MediaStore.Audio.Media.TITLE);\n\
  \        int displayColumn = cursor.getColumnIndex (MediaStore.Audio.Media.DISPLAY_NAME);\n\
  \        int mimeTypeColumn = cursor.getColumnIndex (MediaStore.Audio.Media.MIME_TYPE);\n\
  \n        MediaStore 返回的数据在 Cursor 中按行和列组织。我们可以通过调用 moveToFirst 方法并从中检索结果来获取第一个返回的结果。如果没有返回任何行，该方法将返回布尔值\
  \ false，因此我们可以将其包装在 if 语句中以确保有数据。\n\n        if (cursor.moveToFirst()) {\n\n   \
  \         要获取实际数据，我们在 Cursor 上调用一个“get”方法，并传入我们要检索的列的索引。如果数据预期是 String，我们调用 getString。如果预期是整数，我们调用\
  \ getInt。对于所有原始数据类型，都有相应的“get”方法。\n\n            String audioFilePath = cursor.getString(fileColumn);\n\
  \            String mimeType = cursor.getString(mimeTypeColumn);\n\n           \
  \ Log.v(\"AUDIOPLAYER\",audioFilePath);\n            Log.v(\"AUDIOPLAYER\",mimeType);\n\
  \n            一旦我们有了文件的路径和 MIME 类型，我们就可以使用它们来构造 Intent 以启动内置音频播放应用程序并播放该文件。（或者，我们可以像前面说明的那样使用\
  \ MediaPlayer 类来直接播放音频文件。）为了将音频文件的路径转换为可以传递给 Intent 的 Uri，我们构造一个 File 对象并使用 Uri.fromFile\
  \ 方法来获取 Uri。还有其他方法可以做到同样的事情，但这可能是最直接的方法。\n\n            Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
  \            File newFile = new File(audioFilePath);\n            intent.setDataAndType(Uri.fromFile(newFile),\
  \ mimeType);\n            startActivity(intent);\n        }\n    }\n}\n```\n\n这完成了我们对使用\
  \ `MediaStore` 处理音频的基本说明。\n\n现在，让我们更进一步，创建一个允许我们缩小返回结果范围并浏览它们，从而允许用户选择要播放的音频文件的应用程序。\n\
  \n### 在 MediaStore 中浏览音频\n\n音频文件，尤其是音乐文件，可以通过专辑、艺术家和流派以及直接在 `MediaStore` 中找到。每一个都有一个可以与\
  \ `managedQuery` 一起使用的 `Uri` 来搜索。\n\n*   **专辑**：`android.provider.MediaStore.Audio.Albums.EXTERNAL_CONTENT_URI`\n\
