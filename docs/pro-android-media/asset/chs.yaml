  \n**第 2 章：构建自定义相机应用** **33**\n\n`onPictureTaken` 方法有两个参数；第一个是实际 JPEG 图像数据的字节数组。第二个是对拍摄图像的\
  \ `Camera` 对象的引用。\n\n由于我们获得了实际的 JPEG 数据，因此只需将其写入磁盘上的某个位置即可保存。众所周知，利用 `MediaStore`\
