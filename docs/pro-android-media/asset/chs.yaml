  \ `Cursor` 是否包含结果（`cursor != null`），然后使用 `moveToNext` 方法。\n\n#### 专辑浏览应用示例\n\n以下是一个示例，以上述内容为起点，允许用户查看所有专辑的名称。用户可以指示他想看哪张专辑上的歌曲。然后它将显示歌曲列表，如果用户选择了其中一首，它将播放该歌曲。\n\
