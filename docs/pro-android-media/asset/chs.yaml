  \n\n当然，在此示例中，我们需要指定访问互联网和使用位置的权限。在添加了相应的 `uses-permission` 标签后，此示例的 `AndroidManifest.xml`\
  \ 文件如下所示：\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
