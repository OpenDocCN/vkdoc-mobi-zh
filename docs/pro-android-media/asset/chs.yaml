  \ 格式的数据开始。\n\n## JSON\n\nJSON 代表 JavaScript 对象表示法。虽然最初是为 JavaScript 设计的，但作为一种数据交换格式，它是与语言无关的。此外，由于多种原因（其中之一是实现相对简单），许多\
  \ Web 服务将其作为基于 XML 的数据传输格式的替代方案。与 XML 相比，它更轻量、更紧凑，并且更易于机器解析。\n\nAndroid 在 `org.json`\
  \ 包中内置了一个 JSON 解析器。\n\n我们不会深入探讨 JSON 数据的具体语法，但这里是一个典型的 JSON 对象表示。\n\n```json\n{\"\
  result\":{\"aname\":\"value\", \"anumber\":1234, \"aboolean\":false}}\n```\n\n正如你在\
  \ JSON 表示中所见，整个表示由花括号 `{` 和 `}` 包围，对象名称首先出现，用引号括起来，后跟冒号：`\"result\":`。下一组花括号表示该对象所包含的所有数据。每条数据都类似地标注：名称用引号括起来，后跟冒号，然后是实际数据。引号用于表示字符串；不带引号的数字就是普通数字；布尔值用\
  \ `true` 或 `false` 表示；最后，数据数组是由方括号 `[` 和 `]` 包围的一系列对象，用逗号分隔。\n\n以下是一个名为 `anarray`\
  \ 的数组：\n\n```json\n{\"anarray\":[{\"arrayelement\":\"Array Element 1\"}, {\"arrayelement\"\
  :\"Array Element 2\"}]}\n```\n\n\n\n### JSON 解析示例\n\n该数组包含两个元素，每个元素都是一个由“{”和“}”包围的对象，对象之间用逗号分隔。每个元素都是一个包含名为`\"\
  arrayelement\"`的字符串的对象。\n\n让我们看看如何使用 Android 内置的 JSON 解析器来解析 JSON 数据。我们将从处理以下简单的\
  \ JSON 数据开始：\n\n```json\n{\"results\":{\"aname\":\"value\", \"anumber\":1234, \"\
  aboolean\":false, \"anarray\":[{\"arrayelement\":\"Array Element 1\"}, {\"arrayelement\"\
  :\"Array Element 2\"}]}}\n```\n\n为了使用 JSON 解析器，数据必须是一个字符串。为此，我们需要对双引号进行转义：\n\n```java\n\
  String JSONData = \"\" +\n    \"{\\\"results\\\":{\\\"aname\\\":\\\"value\\\", \\\
  \"anumber\\\":1234, \\\"aboolean\\\":false, \" +\n    \"\\\"anarray\\\":[{\\\"arrayelement\\\
  \":\\\"Array Element 1\\\"}, {\\\"arrayelement\\\":\\\"Array Element 2\\\"}]}}\"\
  ;\n```\n\nAndroid 中的 JSON 包包含一个`JSONObject`类，可以通过传入 JSON 格式的数据（如`JSONData`字符串中的内容）来构建其实例：\n\
  \n```java\nJSONObject overallJSONObject = new JSONObject(JSONData);\n```\n\n拿到`JSONObject`对象后，我们可以从中提取任何\
  \ JSON 对象、JSON 数组或普通字段。由于`results`是直接位于外层对象内部的 JSON 对象，我们可以使用`getJSONObject`方法并传入要提取的对象名称来获取其引用：\n\
  \n```java\nJSONObject resultsObject = overallJSONObject.getJSONObject(\"results\"\
  );\n```\n\n获得`resultsObject`后，就可以提取其中包含的任何数据。每种数据类型都有不同的提取方法。\n\n要提取字符串，我们使用`getString`方法，并传入\
  \ JSON 数据中指定的名称：\n\n```java\nString aname = resultsObject.getString(\"aname\");\n\
  ```\n\n要提取整数，我们使用`getInt`方法，并传入 JSON 数据中指定的名称。相应地，我们可以使用`getDouble`提取 JSON 数字为`double`类型，或使用`getLong`提取为`long`类型：\n\
  \n```java\nint anumber = resultsObject.getInt(\"anumber\");\n```\n\n要提取布尔值，我们使用`getBoolean`方法，并传入\
  \ JSON 数据中指定的名称：\n\n```java\nboolean aboolean = resultsObject.getBoolean(\"aboolean\"\
  );\n```\n\n示例数据在`resultsObject`中还包含一个名为`anarray`的 JSON 对象数组。我们可以使用`getJSONArray`方法并传入数组名称来获取其引用：\n\
  \n```java\nJSONArray anarray = resultsObject.getJSONArray(\"anarray\");\n```\n\n\
  我们可以遍历`JSONArray`对象，使用`JSONArray`提供的`getJSONObject`方法并传入元素的索引号来提取单个 JSON 对象元素：\n\
  \n```java\nfor (int i = 0; i < anarray.length(); i++) {\n    JSONObject arrayElementObject\
