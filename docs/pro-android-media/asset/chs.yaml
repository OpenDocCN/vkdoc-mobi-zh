  \ anumber);\n\n        } catch (JSONException e) {\n            // 处理异常\n      \
  \  }\n    }\n}\n```\n\n\n\n```java\nboolean aboolean = resultsObject.getBoolean(\"\
  aboolean\");\nLog.v(\"SIMPLEJSON\", \"\" + aboolean);\nJSONArray anarray = resultsObject.getJSONArray(\"\
