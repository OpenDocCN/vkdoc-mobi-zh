  wrap_content\" android:layout_height=\"wrap_content\">\n    </Button>\n    <Button\
  \ android:text=\"Play Video\" android:id=\"@+id/PlayVideoButton\"\n        android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\">\n    </Button>\n    <VideoView\
  \ android:id=\"@+id/VideoView\" android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\">\n    </VideoView>\n</LinearLayout>\n```\n\n\n\n"
