  \n**图 12-1.** *ListView 显示来自 Flickr 的、标记为“waterfront”的图片*\n\n## 位置服务\n\n由于我们是在位置可能会变化的移动设备上访问这些服务，因此将位置信息作为请求的一部分可能会很有趣。在一个地方搜索\
  \ Flickr 上的“waterfront”，与在另一个地方搜索的结果会截然不同。\n\nAndroid 为我们提供了 `LocationManager` 类，我们可以使用它在应用中查找和跟踪位置变化。\n\
  \n以下是一个简单的代码片段，演示了如何使用 `LocationManager` 并监听位置更新。\n\n```java\npackage com.apress.proandroidmedia.ch12.locationtracking;\n\
  \nimport android.app.Activity;\n\nimport android.content.Context;\n\nimport android.location.Location;\n\
  ```\n\n\n\n```java\nimport android.location.LocationListener;\nimport android.location.LocationManager;\n\
  import android.location.LocationProvider;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.widget.TextView;\n```\n\n为了从 `LocationManager` 接收位置更新，我们将让活动实现 `LocationListener`。\n\
  \n```java\npublic class LocationTracking extends Activity implements LocationListener\
  \ {\n\n    LocationManager lm;\n    TextView tv;\n\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \        tv = (TextView) this.findViewById(R.id.location);\n```\n\n我们通过使用 `Context`（`Activity`\
  \ 是其子类，因此我们可以直接使用）中提供的 `getSystemService` 方法来获取 `LocationManager` 的实例。\n\n```java\n\
  \        lm = (LocationManager) getSystemService(Context.LOCATION_SERVICE);\n```\n\
  \n`LocationManager` 允许我们指定希望 `LocationListener`（本例中即我们的活动）在位置相关变化时收到通知。我们通过将活动作为最后一个参数传递给\
  \ `requestLocationUpdates` 方法，将其注册为 `LocationListener`。\n\n该方法的第一个参数是我们要使用的位置提供器。`LocationManager`\
  \ 类中提供了两个位置提供器，以常量形式指定。\n\n我们这里使用的 `NETWORK_PROVIDER` 利用蜂窝基站定位或 WiFi 接入点定位等网络服务来确定位置。另一个可用的提供器是\
  \ `GPS_PROVIDER`，它利用 GPS（全球定位卫星）提供位置信息。`NETWORK_PROVIDER` 通常比 GPS 快得多，但定位精度可能较低。GPS\
  \ 可能需要较长时间才能获取卫星信号，并且在室内或天空视野不佳的区域（例如曼哈顿中城）可能完全无法工作。\n\n第二个参数是系统在两次“位置已更改”通知之间等待的最小时间间隔。它以\
  \ `long` 类型表示毫秒数。这里我们设置为 60,000 毫秒，即 1 分钟。\n\n第三个参数是位置必须变化的距离，超过此距离才会触发“位置已更改”通知。它以\
  \ `float` 类型表示米数。这里我们设置为 5 米。\n\n```java\n        lm.requestLocationUpdates(LocationManager.NETWORK_PROVIDER,\
  \ 60000l, 5.0f, this);\n    }\n```\n\n使用 `LocationManager` 时，尤其是在使用 GPS 作为提供器的情况下，当应用不再处于前台时，明智的做法是停止位置更新，以节省电池电量。为此，我们可以在活动中重写标准的\
  \ `onPause` 或 `onStop` 方法，并在 `LocationManager` 对象上调用 `removeUpdates` 方法。\n\n```java\n\
  \    public void onPause() {\n        super.onPause();\n        lm.removeUpdates(this);\n\
  \    }\n```\n\n当位置发生变化，且变化量大于 `requestLocationUpdates` 方法中指定的距离和时间参数时，已注册的 `LocationListener`\
  \ 上的 `onLocationChanged` 方法将被调用，并传入一个 `Location` 对象。\n\n传入的 `Location` 对象提供了获取纬度（`getLatitude`）、经度（`getLongitude`）、海拔（`getAltitude`）等方法，更多详细信息可参阅文档：\n\
  \n[`developer.android.com/reference/android/location/Location.html`](http://developer.android.com/reference/android/location/Location.html)\n\
  \n```java\n    public void onLocationChanged(Location location) {\n        tv.setText(location.getLatitude()\
  \ + \" \" + location.getLongitude());\n        Log.v(\"LOCATION\", \"onLocationChanged:\
  \ lat=\" + location.getLatitude() + \", lon=\" + location.getLongitude());\n   \
  \ }\n```\n\n如果用户禁用了被监控的提供器，已注册的 `LocationListener` 中的 `onProviderDisabled` 方法将被调用。\n\
  \n```java\n    public void onProviderDisabled(String provider) {\n        Log.v(\"\
  LOCATION\", \"onProviderDisabled: \" + provider);\n    }\n}\n```\n\n\n\n`onProviderEnabled`方法在已注册的`LocationListener`中，当被监控的提供者被用户启用时会被调用。\n\
  \n```\npublic void onProviderEnabled(String provider) {\n    Log.v(\"LOCATION\"\
  , \"onProviderEnabled: \" + provider);\n}\n```\n\n最后，已注册`LocationListener`中的`onStatusChanged`方法会在位置提供者的状态发生变化时被调用。`LocationProvider`中有三个常量可以与`status`变量进行比较，用于判断发生的更改。这些常量分别是：`AVAILABLE`（当提供者在不可用一段时间后恢复可用时调用）、`TEMPORARILY_UNAVAILABLE`（顾名思义，提供者暂时无法使用，因为它无法获取当前位置），以及`OUT_OF_SERVICE`（表示提供者可能因连接或信号丢失而无法使用）。\n\
  \n```\npublic void onStatusChanged(String provider, int status, Bundle extras) {\n\
  \    Log.v(\"LOCATION\", \"onStatusChanged: \" + provider + \" status:\" + status);\n\
  \    if (status == LocationProvider.AVAILABLE) {\n        Log.v(\"LOCATION\", \"\
  Provider Available\");\n    } else if (status == LocationProvider.TEMPORARILY_UNAVAILABLE)\
  \ {\n        Log.v(\"LOCATION\", \"Provider Temporarily Unavailable\");\n    } else\
  \ if (status == LocationProvider.OUT_OF_SERVICE) {\n        Log.v(\"LOCATION\",\
  \ \"Provider Out of Service\");\n    }\n}\n```\n\n以下是上述活动所需的布局 XML。\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\">\n    <TextView\n        android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  @string/hello\"\n        android:id=\"@+id/location\" />\n</LinearLayout>\n```\n\
  \n访问位置需要请求权限，因此我们需要在`AndroidManifest.xml`文件中添加以下`uses-permission`标签。请注意，以下标签用于`LocationManager.NETWORK_PROVIDER`提供者，它提供粗略位置。\n\
  \n```\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\"\
  >\n</uses-permission>\n```\n\n如果我们希望使用更精确的 GPS 定位，则需要使用`ACCESS_FINE_LOCATION`权限。\n\
  \n```\n<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\"\
  >\n</uses-permission>\n```\n\n### 使用 JSON 和位置拉取 Flickr 图片\n\n我们可以更新 Flickr JSON\
  \ 示例，通过请求`LocationManager`的位置变化，并在收到位置通知时执行请求，将位置信息整合进来。当然，我们还需要将位置信息添加到请求中，Flickr\
  \ 支持在请求的查询字符串中包含位置参数。\n\n```\npackage com.apress.proandroidmedia.ch12.flickrjsonlocation;\n\
  \nimport java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
  import java.io.InputStreamReader;\nimport java.net.HttpURLConnection;\nimport java.net.MalformedURLException;\n\
  import java.net.URL;\n\nimport org.apache.http.HttpEntity;\nimport org.apache.http.HttpResponse;\n\
  import org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\nimport org.json.JSONArray;\n\
  import org.json.JSONObject;\n\nimport android.app.Activity;\nimport android.content.Context;\n\
  import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
