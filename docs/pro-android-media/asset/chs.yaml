  \  }\n    }\n    surfaceView.setLayoutParams(\n        new LinearLayout.LayoutParams(videoWidth,\
  \ videoHeight));\n}\n```\n\n由于我们的活动实现了 `OnBufferingUpdateListener` 并注册为 `MediaPlayer`\
  \ 的监听器，以下方法将在媒体下载和缓冲期间被定期调用。缓冲将发生在准备阶段（调用 `onPrepareAsync` 或 `onPrepare` 之后）。\n\n\
