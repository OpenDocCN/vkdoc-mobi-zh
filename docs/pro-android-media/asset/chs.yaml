  android.permission.INTERNET\" />\n\n</manifest>\n```\n\n正如我们所看到的，仅仅在应用程序中关注位置信息，就能让我们创建出非常动态的体验。在此例中，当用户四处移动时，他/她会看到通过\
  \ Flickr 提供的一系列全新的“狗，万圣节”照片，如图 12-2 所示。\n\n**图 12-2.** *显示来自 Flickr、在我当前位置附近拍摄并标记了“dog”和“halloween”的图像*\n\
  \n现在，让我们把注意力转回到网络服务协议上，讨论一下 REST。\n\n## REST\n\nREST 全称是 Representational State\
  \ Transfer（表述性状态转移）。它是一套用于设计客户端-服务器服务的架构原则。通常，一个网络服务在满足以下条件时，会被认为是“RESTful”的，即遵循\
  \ REST 原则：\n\n-   使用 HTTP 方法（`GET`、`POST`）\n-   是无状态的，这意味着每个事务都独立于其他事务\n-   使用目录风格的\
  \ URL 来传递数据，而不是查询字符串变量（使用 `www.afakeurl.com/shawn/van_every` 而不是 `www.afakeurl.com/?firstname=shawn&lastname=van_every`）\n\
  -   使用 XML（或 JSON）来传输数据\n\n要了解更多关于基于 REST 的网络服务架构，可以参阅 IBM developerWorks 上 Alex\
  \ Rodriguez 撰写的一篇文章，题为“RESTful Web Services: The Basics”：[www.ibm.com/developerworks/webservices/library/ws-restful/](http://www.ibm.com/developerworks/webservices/library/ws-restful/)\n\
  \n我们在这里讨论 REST 的原因是，它通常与 XML 结合使用来传输网络服务数据。尽管在 Flickr 的示例中我们没有使用 XML 选项，而是选择了 JSON，但我们本也可以那么做。待传输数据的\
  \ XML 表示结构无需遵循严格的文档类型定义（DTD）或 XML 模式，通常由构建网络服务的那些服务根据需求创建和记录。\n\n### 在 XML 中表示数据\n\
  \n以下是一个 XML 文档示例，它在理论上的网络服务中定义了一个“用户”。该文档是对一个使用 `user-id` 查询用户信息请求的响应。\n\n```\n\
  <?xml version=\"1.0\"?>\n<user>\n    <user-id>15</user-id>\n    <username>vanevery</username>\n\
  \    <firstname>Shawn</firstname>\n    <lastname>Van Every</lastname>\n</user>\n\
  ```\n\nAndroid 默认提供几种不同的 XML 解析方式。这些方式包括两种主要方法： SAX（Simple API for XML，XML 简单应用程序接口）和\
  \ DOM（Document Object Model，文档对象模型），以及其他方法。在移动设备上，SAX 通常比 DOM 更受青睐，因为它按顺序读取 XML，允许在读取\
  \ XML 的同时对其进行操作。\n\n\n\n"
- "# 排版后的内容\n\n使用 DOM 会在内存中以对象的形式创建 XML 的表示形式，如果 XML 很大，这可能会花费很长时间并占用大量内存。\n\n###\
  \ SAX 解析\n\n要在 Android 上使用内置的 SAX 解析器，我们首先需要创建一个继承 `DefaultHandler` 的类。这个类包含的方法会在\
  \ XML 元素开始、结束以及读取内容时得到通知。以下是一个仅记录输出的极简版本：\n\n```java\nprivate class XMLHandler extends\
  \ DefaultHandler {\n\n    @Override\n    public void startDocument() throws SAXException\
  \ {\n        Log.v(\"SimpleXMLParser\",\"startDocument\");\n    }\n\n    @Override\n\
  \    public void endDocument() throws SAXException {\n        Log.v(\"SimpleXMLParser\"\
  ,\"endDocument\");\n    }\n\n    @Override\n    public void startElement(String\
  \ uri, String localName, String qName, Attributes attributes) throws SAXException\
  \ {\n        Log.v(\"SimpleXMLParser\",\"startElement \" + localName);\n    }\n\n\
  \    @Override\n    public void endElement(String uri, String localName, String\
  \ qName) throws SAXException {\n        Log.v(\"SimpleXMLParser\",\"endElement \"\
  \ + localName);\n    }\n\n    @Override\n    public void characters(char[] ch, int\
  \ start, int length) throws SAXException {\n        String stringChars = new String(ch,\
  \ start, length);\n        Log.v(\"SimpleXMLParser\",stringChars);\n    }\n}\n```\n\
  \n有了这个类之后，我们可以创建一个 `SAXParserFactory` 实例，然后再创建一个 `SAXParser` 实例：\n\n```java\nSAXParserFactory\
  \ aSAXParserFactory = SAXParserFactory.newInstance();\nSAXParser aSAXParser = aSAXParserFactory.newSAXParser();\n\
  ```\n\n通过 `SAXParser` 对象，我们可以获取一个 `XMLReader`，用它来决定解析过程中发生什么，并执行实际的解析：\n\n```java\n\
  XMLReader anXMLReader = aSAXParser.getXMLReader();\n```\n\n然后实例化我们的 `XMLHandler`，并将其传递给\
  \ `XMLReader` 的 `setContentHandler` 方法：\n\n```java\nXMLHandler anXMLHandler = new\
  \ XMLHandler();\nanXMLReader.setContentHandler(anXMLHandler);\n```\n\n最后，在 `XMLReader`\
  \ 上调用 `parse` 方法。这里我们假设有一个名为 `xmlInputStream` 的 `InputStream`，它包含我们要解析的 XML：\n\n\
  ```java\nanXMLReader.parse(new InputSource(xmlInputStream));\n```\n\n让我们看一个完整的示例，演示如何解析前面的“用户”XML：\n\
  \n```java\npackage com.apress.proandroidmedia.ch12.simplexmlparser;\n\nimport java.io.ByteArrayInputStream;\n\
  import java.io.IOException;\n\nimport javax.xml.parsers.ParserConfigurationException;\n\
  import javax.xml.parsers.SAXParser;\nimport javax.xml.parsers.SAXParserFactory;\n\
  \nimport org.xml.sax.Attributes;\nimport org.xml.sax.InputSource;\nimport org.xml.sax.SAXException;\n\
  import org.xml.sax.XMLReader;\nimport org.xml.sax.helpers.DefaultHandler;\n\nimport\
  \ android.app.Activity;\nimport android.os.Bundle;\nimport android.util.Log;\n\n\
  public class SimpleXMLParser extends Activity {\n```\n\n我们将把 XML 转换为一个名为 `XMLUser`\
  \ 的类的实例，该类位于代码末尾。这将是我们用 Java 表示的 XML 中定义的数据：\n\n```java\n    XMLUser aUser;\n\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n```\n\n在这个示例中，我们将要解析的 XML 作为一个名为 `xml`\
  \ 的 `String` 包含进来：\n\n```java\n        String xml = \"<?xml version=\\\"1.0\\\"\
  ?>\\n\"\n            + \"<user>\\n\"\n            + \"<user-id>15</user-id>\\n\"\
  \n            + \"<username>vanevery</username>\\n\"\n            + \"<firstname>Shawn</firstname>\\\
  n\"\n            + \"<lastname>Van Every</lastname>\\n\"\n            + \"</user>\\\
  n\";\n```\n\n在这里，我们按照前面描述的步骤创建一个 `SAXParserFactory`、一个 `SAXParser` 和一个 `XMLReader`：\n\
  \n```java\n        SAXParserFactory aSAXParserFactory = SAXParserFactory.newInstance();\n\
  \        try {\n            SAXParser aSAXParser = aSAXParserFactory.newSAXParser();\n\
  \            XMLReader anXMLReader = aSAXParser.getXMLReader();\n```\n\n我们将使用此处定义的\
  \ `UserXMLHandler` 实例作为我们的处理器，它决定了解析过程中发生的事情：\n\n```java\n            UserXMLHandler\
  \ aUserXMLHandler = new UserXMLHandler();\n            anXMLReader.setContentHandler(aUserXMLHandler);\n\
  ```\n\n\n\n最后，我们来执行实际的解析。需要额外做一些工作，将位于`xml` `String`中的 XML 转换为`InputStream`和`InputSource`，以便`XMLReader`使用。\n\
  \n```\nanXMLReader.parse(\n    new InputSource(new ByteArrayInputStream(xml.getBytes())));\n\
  } catch (ParserConfigurationException e) {\n    e.printStackTrace();\n} catch (SAXException\
  \ e) {\n    e.printStackTrace();\n} catch (IOException e) {\n    e.printStackTrace();\n\
  }\n```\n\n示例的核心是`UserXMLHandler`。它扩展了`DefaultHandler`，并将在解析 XML 时接收其中的数据。\n\n```\n\
  private class UserXMLHandler extends DefaultHandler {\n```\n\n我们将使用以下常量与`state`变量配合，来跟踪已读取的元素。\n\
  \n```\nstatic final int NONE = 0;\nstatic final int ID = 1;\nstatic final int FIRSTNAME\
  \ = 2;\nstatic final int LASTNAME = 3;\nint state = NONE;\n```\n\n我们将使用以下常量来匹配 XML\
  \ 中可能出现的元素名称。\n\n```\nstatic final String ID_ELEMENT = \"user-id\";\nstatic final\
  \ String FIRSTNAME_ELEMENT = \"firstname\";\nstatic final String LASTNAME_ELEMENT\
  \ = \"lsatname\";\n```\n\n当解析器识别到 XML 文档开始时，会调用`startDocument`方法。在此方法中，我们将实例化`XMLUser`对象，用于保存\
  \ XML 中表示的数据。\n\n```\n@Override\npublic void startDocument() throws SAXException\
  \ {\n    Log.v(\"SimpleXMLParser\",\"startDocument\");\n    aUser = new XMLUser();\n\
  }\n```\n\n当解析器识别到 XML 文档结束时，会调用`endDocument`方法。我们只需打印出`XMLUser`对象的内容。\n\n```\n@Override\n\
  public void endDocument() throws SAXException {\n    Log.v(\"SimpleXMLParser\",\"\
  endDocument\");\n    Log.v(\"SimpleXMLParser\",\"User Info: \" + aUser.user_id +\
  \ \" \" +\n          aUser.firstname + \" \" + aUser.lastname);\n}\n```\n\n当识别到新元素开始时，会调用`startElement`方法。换句话说，也就是找到了\
  \ XML 中的开始标签。元素名称通过`localName`变量传入。在此方法中，我们只需将该名称与之前定义的常量进行比较，并据此更改`state`变量。\n\n\
  ```\n@Override\npublic void startElement(String uri, String localName, String qName,\n\
  \                         Attributes attributes) throws SAXException {\n    Log.v(\"\
  SimpleXMLParser\",\"startElement\");\n\n    if (localName.equalsIgnoreCase(ID_ELEMENT))\
  \ {\n        state = ID;\n    } else if (localName.equalsIgnoreCase(FIRSTNAME_ELEMENT))\
  \ {\n        state = FIRSTNAME;\n    } else if (localName.equalsIgnoreCase(LASTNAME_ELEMENT))\
  \ {\n        state = LASTNAME;\n    } else {\n        state = NONE;\n    }\n}\n\
  ```\n\n当找到任何 XML 结束标签时，会调用`endElement`方法。\n\n```\n@Override\npublic void endElement(String\
  \ uri, String localName, String qName)\n       throws SAXException {\n    Log.v(\"\
  SimpleXMLParser\",\"endElement\");\n}\n```\n\n每当在开始和结束标签之间找到文本时，就会调用`characters`方法。在我们的实现中，会根据`state`变量所表示的当前在文档中的位置，获取数据并将其放入`XMLUser`对象。\n\
  \n```\n@Override\npublic void characters(char[] ch, int start, int length) throws\
  \ SAXException {\n    String stringChars = new String(ch, start, length);\n    Log.v(\"\
  SimpleXMLParser\",stringChars);\n\n    if (state == ID) {\n        aUser.user_id\
  \ += stringChars.trim();\n        Log.v(\"SimpleXMLParser\",\"user_id:\"+aUser.user_id);\n\
  \    } else if (state == FIRSTNAME) {\n        aUser.firstname += stringChars.trim();\n\
  \        Log.v(\"SimpleXMLParser\",\"firstname:\"+aUser.firstname);\n    } else\
  \ if (state == LASTNAME) {\n        aUser.lastname += stringChars.trim();\n    \
  \    Log.v(\"SimpleXMLParser\",\"lastname:\"+aUser.lastname);\n    }\n}\n```\n\n\
  以下是`XMLUser`类，我们用它来保存 XML 提供给我们的数据。\n\n```\nclass XMLUser {\n    String user_id;\n\
  \    String firstname;\n    String lastname;\n\n    public XMLUser() {\n       \
  \ user_id = \"\";\n        firstname = \"\";\n        lastname = \"\";\n    }\n\
  }\n```\n\n通过这个快速示例，我们可以将其作为任何 XML 的模板。\n\n\n\n### Android 的解析需求\n\n在 Android 上，我们可能需要执行一些解析操作，包括处理从\
  \ Web 服务请求中收到的数据。\n\n### HTTP 文件上传\n\n我们可能希望允许用户分发由我们开发的应用程序所创建的媒体内容，一种方式是将它们发布到在线视频分享网站，如\
  \ YouTube、Vimeo 或 Blip.TV。\n\n为了将文件发布到这类服务，我们需要执行 HTTP 文件上传。在 Android 上完成 HTTP 文件上传有几种方法。能给我们最大灵活性的方法是引入并使用\
  \ Apache HTTP Components（[`hc.apache.org/`](http://hc.apache.org)）中的库，这些库并未随 Android\
  \ 完全打包。\n\n我们需要 `httpmime-4.0.x.jar`，它包含在可从 [`hc.apache.org/downloads.cgi`](http://hc.apache.org/downloads.cgi)\
  \ 下载的 `HttpClient 4.0.x (GA)` 包中。（版本号中的“x”当前为 3；当你下载时可能更高。）我们还需要 Apache Mime4J 0.6\
  \ 版本（`apache-mime4j-0.6.jar`）或更高版本，可从 [`james.apache.org/download.cgi`](http://james.apache.org/download.cgi)\
  \ 下载。\n\n在构建应用时，只需将这些文件拖入 Eclipse 项目中的项目文件夹，即可将它们引入你的 Eclipse 项目。然后我们需要在项目属性中编辑\
  \ Java 构建路径。要将它们包含在构建路径中，请前往 Java 构建路径对话框中的**库**选项卡，选择“添加 JARs”，最后选中它们。\n\n通过导入上述库，我们获得了一个\
  \ `MultipartEntity`，它可以用于 `HttpClient` 使用的 `HttpPost` 请求中。`MultipartEntity` 允许向服务器发送\
  \ multipart/form-data 类型的 POST 请求。这与浏览器从允许用户选择文件的表单进行上传时使用的机制相同。\n\n### 发起 HTTP\
  \ 请求\n\n下面是一个如何使用它的简要说明。\n\n首先，我们通过实例化 `DefaultHttpClient` 来创建一个 `HttpClient` 对象。\n\
  \n```\nHttpClient httpclient = new DefaultHttpClient();\n```\n\n接着，我们创建一个 `HttpPost`\
  \ 对象，它代表一个指向特定 URL 的 POST 请求，我们将该 URL 传入。\n\n```\nHttpPost httppost = new HttpPost(\"\
  http://webserver/file-upload-app\");\n```\n\n然后，我们可以实例化 `MultipartEntity`。如前述，这种类型的实体可以包含多个部分。\n\
  \n```\nMultipartEntity multipartentity = new MultipartEntity();\n```\n\n我们需要的主要部分是要上传的实际文件。为此，我们使用\
  \ `addPart` 方法，传入一个字符串作为名称，以及一个 `FileBody` 对象作为值。这个 `FileBody` 对象接收一个 `File` 对象，该对象代表我们想要上传的实际文件——在本例中，是\
  \ SD 卡根目录下的一个视频文件。\n\n```\nmultipartentity.addPart(\"file\", new FileBody(new File(\"\
  /sdcard/video_h264_640x480.mp4\")));\n```\n\n如果需要添加其他元素，如用户名、密码等，我们使用相同的 `addPart`\
  \ 方法，传入名称和值。在这种情况下，值应该是一个包含实际字符串值的 `StringBody` 对象。\n\n```\nmultipartentity.addPart(\"\
  username\", new StringBody(\"myusername\"));\nmultipartentity.addPart(\"password\"\
  , new StringBody(\"mypassword\"));\nmultipartentity.addPart(\"title\", new StringBody(\"\
  A Title\"));\n```\n\n一旦我们的 `MultipartEntity` 设置完毕，我们通过调用 `setEntity` 方法将它传递给 `HttpPost`\
  \ 对象。\n\n```\nhttppost.setEntity(multipartentity);\n```\n\n现在我们可以执行请求并获取响应。\n\n\
  ```\nHttpResponse httpresponse = httpclient.execute(httppost);\nHttpEntity responseentity\
  \ = httpresponse.getEntity();\n```\n\n我们可以通过调用所得到的 `HttpEntity` 上的 `getContent`\
  \ 方法获取一个 `InputStream`，从而读取响应。\n\n```\nInputStream inputstream = responseentity.getContent();\n\
  ```\n\n\n\n为了从`InputStream`读取数据，我们会将其包装在`InputStreamReader`和`BufferedReader`中，然后执行常规的读取过程。\n\
  \n```java\nBufferedReader bufferedreader = new BufferedReader(new InputStreamReader(inputstream));\n\
  ```\n\n我们将使用`StringBuilder`来保存所有读取到的数据。\n\n```java\nStringBuilder stringbuilder\
  \ = new StringBuilder();\n```\n\n然后我们会逐行从`BufferedReader`读取，直到其返回`null`。\n\n```java\n\
  String currentline = null;\nwhile ((currentline = bufferedreader.readLine()) !=\
  \ null) {\n    stringbuilder.append(currentline + \"\\n\");\n}\n```\n\n读取完成后，我们会将`StringBuilder`对象转换为普通字符串并输出到日志中。\n\
  \n```java\nString result = stringbuilder.toString();\nLog.v(\"HTTP UPLOAD REQUEST\"\
  , result);\n```\n\n最后，我们会关闭`InputStream`。\n\n```java\ninputstream.close();\n```\n\
  \n当然，我们的应用需要拥有访问互联网的权限。因此，我们需要在`AndroidManifest.xml`文件中添加以下`uses-permission`行。\n\
  \n```xml\n<uses-permission android:name=\"android.permission.INTERNET\"></uses-permission>\n\
  ```\n\n一旦我们下载并导入了所需的库，使用`HttpClient`类进行文件上传并不比执行普通的 HTTP 请求困难多少。\n\n## 向 Blip.TV\
  \ 上传视频\n\nBlip.TV 是一个流行的视频分享网站，它提供了一个基于 REST 的文件上传 API，我们可以利用它来为采集应用甚至独立应用构建视频分享机制。\n\
  \nBlip.TV 的上传 API 文档可以在线查阅，地址为`http://wiki.blip.tv/index.php/REST_Upload_API`。该文档详细说明了请求中可以包含的各种元素。特别地，我们需要将上传的文件元素命名为`\"\
  file\"`。要运行示例代码，你需要一个常规的 Blip.TV 用户登录名（用户名）和密码（在真实应用中，这应由用户提供）。我们还需要一个标题，并且需要包含值为`\"\
  1\"`的`post`参数和值为`api`的`skin`参数，以便获得 XML 格式的响应。\n\n一旦通过 API 将视频上传到 Blip.TV，他们会返回类似如下的\
  \ XML 响应：\n\n```xml\n<response>\n    <current_time>2010-10-30T00:13:00Z</current_time>\n\
  \    <timestamp>1288397581081</timestamp>\n    <status>OK</status>\n    <payload>\n\
  \        <asset>\n            <timestamp>1288397580</timestamp>\n            <id>4332695</id>\n\
  \            <item_type>file</item_type>\n            <item_id>4314031</item_id>\n\
  \            <links>\n                <link rel=\"alternate\" type=\"text/html\"\
  \ href=\"http://blip.tv/file/4314031/\" />\n                <link rel=\"alternate\"\
  \ type=\"application/rss+xml\" href=\"http://blip.tv/rss/4332695\" />\n        \
  \        <link rel=\"alternate\" type=\"application/atom+xml\" href=\"http://blip.tv/file/4314031/?skin=atom\"\
  \ />\n                <link rel=\"service.edit\" type=\"text/html\" href=\"http://blip.tv/file/post/4314031/\"\
  \ />\n                <link rel=\"service.edit\" type=\"text/xml\" href=\"http://blip.tv/file/post/4314031/?skin=api\"\
  \ />\n            </links>\n            <files>\n                <file src=\"Username-AVideo562.3gp\"\
  \ submitted_as=\"VID_20101029_200900.3gp\" role='Source' />\n            </files>\n\
  \        </asset>\n    </payload>\n</response>\n```\n\n值得注意的是，如果上传成功，XML 会给出状态`OK`，并在`file`元素中提供原始文件的链接。我们可以使用\
  \ SAX 解析器解析这个 XML，查找这些项目，并将视频信息呈现给用户以验证上传是否成功。\n\n如果上传失败，XML 会给出状态`ERROR`，并包含一个包含代码和消息的错误标签。以下是用户名/密码组合输入错误的示例：\n\
  \n```xml\n<response>\n    <current_time>2010-10-30T00:38:32Z</current_time>\n  \
  \  <timestamp>1288399112662</timestamp>\n    <status>ERROR</status>\n    <error>\n\
  \        <code>AUTHENTICATION_REQUIRED</code>\n        <message>The operation you\
  \ attempted to perform require authentication,</message>\n    </error>\n</response>\n\
  ```\n\n\n\n### Blip.TV 上传代码解析\n\n但您的身份验证信息无效、缺失或不足以执行您尝试的操作。\n\n让我们完整地看一下用于捕获视频并上传到`Blip.TV`的完整代码：\n\
  \n```java\npackage com.apress.proandroidmedia.ch12.blipuploader;\n\nimport java.io.BufferedReader;\n\
  import java.io.ByteArrayInputStream;\nimport java.io.File;\nimport java.io.FilterOutputStream;\n\
  import java.io.IOException;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
  import java.io.OutputStream;\n\nimport javax.xml.parsers.ParserConfigurationException;\n\
  import javax.xml.parsers.SAXParser;\nimport javax.xml.parsers.SAXParserFactory;\n\
  \nimport org.apache.http.HttpEntity;\nimport org.apache.http.HttpResponse;\nimport\
  \ org.apache.http.client.ClientProtocolException;\nimport org.apache.http.client.HttpClient;\n\
  import org.apache.http.client.methods.HttpPost;\nimport org.apache.http.entity.mime.MultipartEntity;\n\
  import org.apache.http.entity.mime.content.FileBody;\nimport org.apache.http.entity.mime.content.StringBody;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\n\nimport org.xml.sax.Attributes;\n\
  import org.xml.sax.InputSource;\nimport org.xml.sax.SAXException;\nimport org.xml.sax.XMLReader;\n\
  import org.xml.sax.helpers.DefaultHandler;\n\nimport android.app.Activity;\nimport\
  \ android.content.Intent;\nimport android.database.Cursor;\nimport android.net.Uri;\n\
  import android.os.AsyncTask;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.widget.TextView;\n\npublic class BlipTVUploader extends Activity\
  \ {\n```\n\n我们的 Activity 将使用`Intent`来触发用于视频录制的`Camera Activity`和用于视频播放的默认 Activity，因此我们需要设置两个常量来识别返回的是哪个\
  \ Activity。\n\n```java\n    final static int VIDEO_CAPTURED = 0;\n    final static\
  \ int VIDEO_PLAYED = 1;\n```\n\n我们有几个变量：一个`File`对象用于表示 SD 卡上捕获的视频，一个`String title`将作为上传到`Blip.TV`时的标题，以及`Blip.TV`的用户名和密码。在实际应用程序中，标题、用户名和密码应从用户处获取。\n\
  \n```java\n    File videoFile;\n    String title = \"A Video\";\n    String username\
  \ = \"BLIPTV_USERNAME\";\n    String password = \"BLIPTV_PASSWORD\";\n```\n\n`postingResult`变量将包含上传后从`Blip.TV`返回的\
  \ XML 响应结果。\n\n```java\n    String postingResult = \"\";\n```\n\n`fileLength`变量将在视频录制完成后设置，以便我们跟踪上传进度。\n\
  \n```java\n    long fileLength = 0;\n```\n\n我们将使用`TextView`向用户显示上传进度和其他信息。\n\n```java\n\
  \    TextView textview;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        textview = (TextView) findViewById(R.id.textview);\n```\n\n在首次启动时，我们将使用`Intent`触发默认的视频捕获应用程序，通常是内置的`Camera\
  \ Activity`，以启动并允许用户捕获视频。\n\n我们将`VIDEO_CAPTURED`常量连同`Intent`一起传递给`startActivityForResult`，以便在`onActivityResult`中知道返回给我们的是什么内容。\n\
  \n```java\n        Intent captureVideoIntent =\n            new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\n\
  \        startActivityForResult(captureVideoIntent, VIDEO_CAPTURED);\n    }\n\n\
  \    protected void onActivityResult (int requestCode, int resultCode, Intent data)\
  \ {\n```\n\n当`Camera Activity`返回时，我们可以按照第 11 章中描述的方式获取视频文件的`Uri`。\n\n```java\n \
  \       if (resultCode == RESULT_OK && requestCode == VIDEO_CAPTURED) {\n      \
  \      Uri videoFileUri = data.getData();\n```\n\n为了获取 SD 卡上实际的视频文件，我们需要查询`MediaStore`，请求代表文件的`DATA`列。\n\
  \n```java\n            String[] columns = { android.provider.MediaStore.Video.Media.DATA\
  \ };\n            Cursor cursor = managedQuery(videoFileUri, columns, null, null,\
  \ null);\n            int fileColumn =\n```\n\n\n```java\ncursor.getColumnIndexOrThrow(android.provider.MediaStore.Video.Media.DATA);\n\
  \nif (cursor.moveToFirst()) {\n\nString videoFilePath = cursor.getString(fileColumn);\n\
  \nLog.v(\"VIDEO FILE PATH\",videoFilePath);\n```\n\n获取文件路径后，我们将构造一个`File`对象，获取其长度，并实例化一个`BlipTVFilePoster`对象。`BlipTVFilePoster`继承自`AsyncTask`，因此要启动其工作，只需调用它的`execute`方法。\n\
  \n```java\nvideoFile = new File(videoFilePath);\n\nfileLength = videoFile.length();\n\
  \nBlipTVFilePoster btvfp = new BlipTVFilePoster();\n\nbtvfp.execute();\n\n}\n```\n\
  \n如果是视频播放器活动返回给我们，我们将直接结束。至此，我们的任务已完成。\n\n```java\n} else if (requestCode == VIDEO_PLAYED)\
  \ {\n\nfinish();\n\n}\n\n}\n```\n\n如前所述，`BlipTVFilePoster`类继承自`AsyncTask`。这样它就能在后台线程中执行任务，而不会阻塞用户界面。同时，该类还将实现`ProgressListener`（我们为此设计的接口，用于处理上传类的进度回调）和`BlipXMLParserListener`（用于处理\
  \ XML 解析类的回调）。\n\n```java\nclass BlipTVFilePoster extends AsyncTask<Void, String,\
  \ Void> implements\n\nProgressListener, BlipXMLParserListener {\n```\n\n`videoUrl`变量将包含视频文件上传至\
  \ Blip.TV 后的网址。\n\n```java\nString videoUrl;\n\n@Override\n\nprotected Void doInBackground(Void...\
  \ params) {\n```\n\n如前所述，我们可以使用带`MultipartEntity`的`HttpClient`来执行 HTTP 文件上传。\n\n\
  ```java\nHttpClient httpclient = new DefaultHttpClient();\n\nHttpPost httppost =\
  \ new HttpPost(\"http://blip.tv/file/post\");\n```\n\n在本例中，我们使用了一个名为`ProgressMultipartEntity`的类，它继承自`MultipartEntity`，但允许我们跟踪上传进度。我们将自身作为监听器传入，这之所以可行，是因为我们实现了`ProgressListener`接口。\n\
  \n```java\nProgressMultipartEntity multipartentity = new ProgressMultipartEntity(this);\n\
  ```\n\n根据 Blip.TV 的要求，我们需要在 POST 请求中添加多个部分。当然，我们需要包含文件，此外还需提供用户登录名（`username`）、密码、标题，以及值为`\"\
  1\"`的`post`字段以确保实际发布内容，还有值为`api`的`skin`字段，这样服务器会返回 XML 响应而非普通网页。\n\n```java\ntry\
  \ {\n\nmultipartentity.addPart(\"file\", new FileBody(videoFile));\n\nmultipartentity.addPart(\"\
  userlogin\", new StringBody(username));\n\nmultipartentity.addPart(\"password\"\
  , new StringBody(password));\n\nmultipartentity.addPart(\"title\", new StringBody(title));\n\
  \nmultipartentity.addPart(\"post\", new StringBody(\"1\"));\n\nmultipartentity.addPart(\"\
  skin\", new StringBody(\"api\"));\n\nhttppost.setEntity(multipartentity);\n\nHttpResponse\
  \ httpresponse = httpclient.execute(httppost);\n\nHttpEntity responseentity = httpresponse.getEntity();\n\
  \nif (responseentity != null) {\n```\n\n执行 HTTP 文件上传后，我们可以获取一个`InputStream`来读取服务器的响应。在本例中，我们只需将这个`InputStream`交给\
  \ SAX 解析器实现，以便判断上传是否成功。\n\n```java\nInputStream inputstream = responseentity.getContent();\n\
  \nSAXParserFactory aSAXParserFactory = SAXParserFactory.newInstance();\n\ntry {\n\
  \nSAXParser aSAXParser = aSAXParserFactory.newSAXParser();\n\nXMLReader anXMLReader\
  \ = aSAXParser.getXMLReader();\n```\n\n我们将使用此处定义的`BlipResponseXMLHandler`，专门处理文件上传后\
  \ Blip.TV 返回的 XML 响应。\n\n```java\nBlipResponseXMLHandler xmlHandler =\n\nnew BlipResponseXMLHandler(this);\n\
  \nanXMLReader.setContentHandler(xmlHandler);\n\nanXMLReader.parse(new InputSource(inputstream));\n\
  \n} catch (ParserConfigurationException e) {\n\ne.printStackTrace();\n\n} catch\
  \ (SAXException e) {\n\ne.printStackTrace();\n\n} catch (IOException e) {\n\ne.printStackTrace();\n\
  \n}\n\ninputstream.close();\n\n}\n\n} catch (ClientProtocolException e) {\n\ne.printStackTrace();\n\
  \n} catch (IOException e) {\n\ne.printStackTrace();\n\n}\n\nreturn null;\n\n}\n\
  ```\n\n```java\nprotected void onProgressUpdate(String... textToDisplay) {\n   \
  \ textview.setText(textToDisplay[0]);\n}\n```\n\n`onPostExecute()`方法在`doInBackground()`方法完成时触发。此时，如果我们的`videoUrl`变量已被\
  \ XML 解析器填充，我们只需创建一个`Intent`，使用默认视频播放器 Activity 来播放已上传的文件。\n\n```java\nprotected\
  \ void onPostExecute(Void result) {\n    if (videoUrl != null) {\n        Intent\
  \ viewVideoIntent = new Intent(Intent.ACTION_VIEW);\n        Uri uri = Uri.parse(\"\
  http://blip.tv/file/get/\" + videoUrl);\n        viewVideoIntent.setDataAndType(uri,\
  \ \"video/3gpp\");\n        startActivityForResult(viewVideoIntent, VIDEO_PLAYED);\n\
  \    }\n}\n```\n\n此处定义的`transferred()`方法是`ProgressListener`接口实现的一部分。它将在文件上传过程中由`ProgressMultipartEntity`调用。该方法会调用`publishProgress()`方法，从而触发`onProgressUpdate()`方法来更新\
  \ UI。\n\n```java\npublic void transferred(long num) {\n    double percent = (double)num/(double)fileLength;\n\
  \    int percentInt = (int) (percent * 100);\n    publishProgress(\"\" + percentInt\
  \ + \"% Transferred\");\n}\n```\n\n`parseResult()`方法是`BlipXMLParserListener`接口实现的一部分。当解析需要报告给用户的\
  \ XML 进度时，将调用此方法。它只是调用`publishProgress()`，从而触发`onProgressUpdate()`将结果显示给用户。\n\n\
  ```java\npublic void parseResult(String result) {\n    publishProgress(result);\n\
  }\n```\n\n`setVideoUrl()`也是`BlipXMLParserListener`接口实现的一部分。它只是用上传后的视频 URL 填充`videoUrl`变量。\n\
  \n```java\npublic void setVideoUrl(String url) {\n    videoUrl = url;\n}\n```\n\n\
  以下是`ProgressMultipartEntity`，它扩展了`MultipartEntity`。此类托管`ProgressListener`以报告进度，并覆盖`writeTo()`方法，使用能够统计传出字节数的`OutputStream`。\n\
  \n```java\nclass ProgressMultipartEntity extends MultipartEntity {\n    ProgressListener\
  \ progressListener;\n\n    public ProgressMultipartEntity(ProgressListener pListener)\
  \ {\n        super();\n        this.progressListener = pListener;\n    }\n\n   \
  \ @Override\n    public void writeTo(OutputStream outstream) throws IOException\
  \ {\n        super.writeTo(new ProgressOutputStream(outstream, this.progressListener));\n\
  \    }\n}\n```\n\n`ProgressListener`接口非常简单——它只指定实现类中需要有一个`transferred()`方法。\n\n\
  ```java\ninterface ProgressListener {\n    void transferred(long num);\n}\n```\n\
  \n以下是`ProgressOutputStream`，它重写了`FilterOutputStream`中的`write()`方法，并跟踪已传输的字节数。\n\n\
  ```java\nstatic class ProgressOutputStream extends FilterOutputStream {\n    ProgressListener\
  \ listener;\n    int transferred;\n\n    public ProgressOutputStream(final OutputStream\
  \ out, ProgressListener listener) {\n        super(out);\n        this.listener\
  \ = listener;\n        this.transferred = 0;\n    }\n\n    public void write(byte[]\
  \ b, int off, int len) throws IOException {\n        out.write(b, off, len);\n \
  \       this.transferred += len;\n        this.listener.transferred(this.transferred);\n\
  \    }\n\n    public void write(int b) throws IOException {\n        out.write(b);\n\
  \        this.transferred++;\n        this.listener.transferred(this.transferred);\n\
  \    }\n}\n```\n\n最后，我们有`BlipXMLParserListener`接口和`BlipResponseXMLHandler`，它们处理\
  \ Blip.TV 响应文件上传时返回的 XML 数据。\n\n```java\ninterface BlipXMLParserListener {\n   \
  \ void parseResult(String result);\n    void setVideoUrl(String url);\n}\n\nclass\
  \ BlipResponseXMLHandler extends DefaultHandler {\n```\n\n以下常量与`state`变量结合使用，以跟踪我们在\
  \ XML 中的位置。\n\n```java\n    int NONE = 0;\n    int ONSTATUS = 1;\n    int ONFILE\
  \ = 2;\n}\n```\n\n```java\nint ONERRORMESSAGE = 3;\n\nint state = NONE;\n```\n\n\
  下一组常量定义了 XML 可能返回的状态值。我们将用这些常量来跟踪直接在下方定义的 `status` 整数中的状态值。\n\n```java\nint STATUS_UNKNOWN\
  \ = 0;\nint STATUS_OK = 1;\nint STATUS_ERROR = 2;\nint status = STATUS_UNKNOWN;\n\
  ```\n\n`message` 变量将用于保存 XML 返回的错误消息，或者在上传成功时保存视频的 URL。\n\n```java\nString message\
  \ = \"\";\n```\n\n当然，我们需要持有通过构造函数传入的 `BlipXMLParserListener` 实例。\n\n```java\nBlipXMLParserListener\
  \ listener;\n\npublic BlipResponseXMLHandler(BlipXMLParserListener bxpl) {\n   \
  \ super();\n    listener = bxpl;\n}\n\n@Override\npublic void startDocument() throws\
  \ SAXException {\n}\n\n@Override\npublic void endDocument() throws SAXException\
  \ {\n}\n```\n\n大部分工作将在 `startElement` 标签内完成。系统会检查包含 XML 标签名称的 `localName` 变量，看它是否与我们需要关注的任何标签匹配；如果匹配，我们会将\
  \ `state` 变量设置为相应的常量。\n\n```java\n@Override\npublic void startElement(String uri,\
  \ String localName, String qName,\n        Attributes attributes) throws SAXException\
  \ {\n    if (localName.equalsIgnoreCase(\"status\")) {\n        state = ONSTATUS;\n\
  \    } else if (localName.equalsIgnoreCase(\"file\")) {\n        state = ONFILE;\n\
  \    }\n```\n\n如果是 `file` 元素，我们会通知监听器，并提取 `src` 属性，该属性值等于上传后 Blip.TV 赋予的文件名。\n\n\
  ```java\nlistener.parseResult(\"onFile\");\nmessage = attributes.getValue(\"src\"\
  );\nlistener.parseResult(\"filemessage:\" + message);\n```\n\n然后，我们通过 `setVideoUrl`\
  \ 方法将其传递给 `BlipXMLParserListener`。\n\n```java\nlistener.setVideoUrl(message);\n\
  ```\n\n```java\n    } else if (localName.equalsIgnoreCase(\"message\")) {\n    \
  \    state = ONERRORMESSAGE;\n        listener.parseResult(\"onErrorMessage\");\n\
  \    }\n}\n\n@Override\npublic void endElement(String uri, String localName, String\
  \ qName)\n        throws SAXException {\n    if (localName.equalsIgnoreCase(\"status\"\
  )) {\n        state = NONE;\n    } else if (localName.equalsIgnoreCase(\"file\"\
  )) {\n        state = NONE;\n    } else if (localName.equalsIgnoreCase(\"message\"\
  )) {\n        state = NONE;\n    }\n}\n```\n\n当在元素内发现任何内容时，会触发 `characters` 方法。如果\
  \ `state` 变量指示我们正在读取一个需要关注的元素，我们将采取相应操作。\n\n```java\n@Override\npublic void characters(char[]\
  \ ch, int start, int length) throws SAXException {\n    String stringChars = new\
  \ String(ch, start, length);\n```\n\n如果正在读取 `status` 元素，我们会将 `status` 变量设置为相应的常量。\n\
  \n```java\n    if (state == ONSTATUS) {\n        if (stringChars.equalsIgnoreCase(\"\
  OK\")) {\n            status = STATUS_OK;\n        } else if (stringChars.equalsIgnoreCase(\"\
  ERROR\")) {\n            status = STATUS_ERROR;\n        } else {\n            status\
  \ = STATUS_UNKNOWN;\n        }\n```\n\n如果正在读取错误消息元素，我们会获取文本内容，将其设置为 `message` 变量，并将其发送给监听器。\n\
  \n```java\n    } else if (state == ONERRORMESSAGE) {\n        message += stringChars.trim();\n\
  \        listener.parseResult(message);\n    }\n}\n```\n\n上述示例中用于跟踪上传进度的方法，基于用户\
  \ \"tuler\" 提供的答案，并由用户 ColinD 在 Stack Overflow 上 SoaperGEM 提出的问题中进行了编辑，链接如下：\n\n\
  [`stackoverflow.com/questions/254719/file-upload-with-java-with-progress-bar/470047#470047`](http://stackoverflow.com/questions/254719/file-upload-with-java-with-progress-bar/470047#470047)\n\
  \n以下是上述活动所使用的布局 XML。\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
  \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    >\n    <TextView\n        android:id=\"@+id/textview\"\n    \
  \    android:layout_width=\"fill_parent\"\n        android:layout_height=\"wrap_content\"\
  \n        />\n</LinearLayout>\n```\n\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    package=\"com.apress.proandroidmedia.ch12.blipuploader\"\n    android:versionCode=\"\
  1\"\n    android:versionName=\"1.0\">\n\n    <application\n        android:icon=\"\
  @drawable/icon\"\n        android:label=\"@string/app_name\">\n        <activity\n\
  \            android:name=\".BlipTVUploader\"\n            android:label=\"@string/app_name\"\
  >\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
  \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n\n\
  \    <uses-sdk android:minSdkVersion=\"4\" />\n    <uses-permission android:name=\"\
  android.permission.INTERNET\" />\n</manifest>\n```\n\n最后，这是`AndroidManifest.xml`，其中包含`uses-permission`标签，指定了我们需要能够访问互联网。\n\
  \n这个示例展示了允许用户将其创作直接发布到在线视频分享平台的方法。类似的代码也可用于发布到其他分享平台，当然，并不仅限于视频。我们可以将图片上传到 Flickr\
  \ 或 Picasa，也可以将音频文件上传到音频分享网站。\n\n## 总结\n\n正如我们在本章中所见，利用在线服务来获取媒体以及允许用户发布媒体，为我们开启了广泛的可能性。我们发现，在\
  \ Android 中使用 HTTP、REST、JSON 和 XML 并不困难，并且能够让我们访问几乎任何网络服务。此外，将位置信息融入其中，又为我们的应用程序增添了新的动态维度。\n\
