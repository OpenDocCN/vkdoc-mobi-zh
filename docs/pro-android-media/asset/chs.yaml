  ```\n...\n\ncameraView.setFocusable(true);\n\ncameraView.setFocusableInTouchMode(true);\n\
  \ncameraView.setClickable(true);\n\ncameraView.setOnClickListener(this);\n\n}\n\
  ```\n\n`public void onClick(View v) {`\n\n```\ncamera.takePicture(null, null, null,\
  \ this);\n```\n\n`}`\n\n## 其他相机回调方法\n\n除了 `Camera.PictureCallback`，还有几个值得一提的回调方法。\n\
  \n`Camera.PreviewCallback`：定义了一个方法 `onPreviewFrame(byte[] data, Camera camera)`，当预览帧可用时被调用。可能会传入一个包含当前图像像素的字节数组。在\
  \ `Camera` 对象上，有三种不同的方式可以使用此回调。\n\n- `setPreviewCallback(Camera.PreviewCallback)`：通过此方法注册一个\
  \ `Camera.PreviewCallback`，可确保每当新的预览帧可用并显示在屏幕上时，都会调用 `onPreviewFrame` 方法。传入 `onPreviewFrame`\
  \ 方法的数据字节数组很可能采用 YUV 格式。不幸的是，Android 2.2 是第一个拥有 YUV 格式解码器（`YuvImage`）的版本；在之前的版本中，解码必须手动完成。\n\
  \n- `setOneShotPreviewCallback(Camera.PreviewCallback)`：在 `Camera` 对象上通过此方法注册 `Camera.PreviewCallback`，会导致\
  \ `onPreviewFrame` 在下一次预览图像可用时被调用一次。同样，传递给 `onPreviewFrame` 方法的预览图像数据很可能采用 YUV 格式。这可以通过将\
  \ `Camera.getParameters().getPreviewFormat()` 的结果与 `ImageFormat` 中的常量进行比较来确定。\n\n\
  - `setPreviewCallbackWithBuffer(Camera.PreviewCallback)`：此方法在 Android 2.2 中引入，其工作方式与普通的\
  \ `setPreviewCallback` 相同，但要求我们指定一个字节数组作为预览图像数据的缓冲区。这样做是为了让我们能够更好地管理处理预览图像时将要使用的内存。\n\
  \n`Camera.AutoFocusCallback`：定义了一个方法 `onAutoFocus`，当自动对焦活动完成时调用。自动对焦可以通过调用 `Camera`\
  \ 对象上的 `autoFocus` 方法来触发，并传入此回调接口的一个实例。\n\n`Camera.ErrorCallback`：定义了一个 `onError`\
  \ 方法，当发生 `Camera` 错误时调用。有两个常量可以与传入的错误码进行比较：`CAMERA_ERROR_UNKNOWN` 和 `CAMERA_ERROR_SERVER_DIED`。\n\
  \n`Camera.OnZoomChangeListener`：定义了一个方法 `onZoomChange`，当“平滑变焦”（缓慢放大或缩小）正在进行或完成时调用。这个类和方法是在\
  \ Android 2.2（API 级别 8）中引入的。\n\n`Camera.ShutterCallback`：定义了一个方法 `onShutter`，在图像被捕获的那一刻调用。\n\
  \n## 整合所有内容\n\n让我们完整地过一遍这个示例。以下代码是为在 Android 2.2 及更高版本上运行而编写的，但稍作修改，它也应该能在 1.6 及更高版本上运行。需要高于\
  \ 1.6 版本的章节已用注释标出。\n\n```\npackage com.apress.proandroidmedia.ch2.snapshot;\n\n\
  import java.io.FileNotFoundException;\nimport java.io.IOException;\nimport java.io.OutputStream;\n\
  import java.util.Iterator;\nimport java.util.List;\n\nimport android.app.Activity;\n\
  import android.content.ContentValues;\nimport android.content.res.Configuration;\n\
  import android.hardware.Camera;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.provider.MediaStore.Images.Media;\nimport android.util.Log;\nimport\
  \ android.view.SurfaceHolder;\nimport android.view.SurfaceView;\nimport android.view.View;\n\
  import android.view.View.OnClickListener;\nimport android.widget.Toast;\n\npublic\
  \ class SnapShot extends Activity implements OnClickListener,\n    SurfaceHolder.Callback,\
  \ Camera.PictureCallback {\n\n    SurfaceView cameraView;\n    SurfaceHolder surfaceHolder;\n\
  \    Camera camera;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n     \
  \   surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  \        surfaceHolder.addCallback(this);\n\n        cameraView.setFocusable(true);\n\
  \        cameraView.setFocusableInTouchMode(true);\n        cameraView.setClickable(true);\n\
  \        cameraView.setOnClickListener(this);\n    }\n\n    public void onClick(View\
  \ v) {\n        camera.takePicture(null, null, this);\n    }\n```\n\n接下来，我们按照前面描述的那样添加\
  \ `onPictureTaken` 方法。\n\n```\n    public void onPictureTaken(byte[] data, Camera\
  \ camera) {\n        Uri imageFileUri =\n                getContentResolver().insert(Media.EXTERNAL_CONTENT_URI,\
  \ new ContentValues());\n\n        try {\n            OutputStream imageFileOS =\n\
  \                    getContentResolver().openOutputStream(imageFileUri);\n    \
  \        imageFileOS.write(data);\n            imageFileOS.flush();\n          \
  \  imageFileOS.close();\n        } catch (FileNotFoundException e) {\n         \
  \   Toast t = Toast.makeText(this, e.getMessage(), Toast.LENGTH_SHORT);\n      \
  \      t.show();\n        } catch (IOException e) {\n            Toast t = Toast.makeText(this,\
  \ e.getMessage(), Toast.LENGTH_SHORT);\n            t.show();\n        }\n\n   \
  \     camera.startPreview();\n    }\n```\n\n最后，我们需要各种 `SurfaceHolder.Callback` 方法，在其中设置\
  \ `Camera` 对象。\n\n```\n    public void surfaceChanged(SurfaceHolder holder, int\
  \ format, int w, int h) {\n        camera.startPreview();\n    }\n\n    public void\
  \ surfaceCreated(SurfaceHolder holder) {\n        camera = Camera.open();\n\n  \
  \      try {\n            camera.setPreviewDisplay(holder);\n            Camera.Parameters\
  \ parameters = camera.getParameters();\n\n            if (this.getResources().getConfiguration().orientation\
  \ !=\n                    Configuration.ORIENTATION_LANDSCAPE) {\n             \
  \   parameters.set(\"orientation\", \"portrait\");\n                // 适用于 Android\
  \ 2.2 及以上版本\n                camera.setDisplayOrientation(90);\n               \
  \ // 适用于 Android 2.0 及以上版本\n                parameters.setRotation(90);\n      \
  \      }\n\n            // 特效适用于 Android 2.0 及以上版本\n            List<String> colorEffects\
  \ = parameters.getSupportedColorEffects();\n            Iterator<String> cei = colorEffects.iterator();\n\
  \n            while (cei.hasNext()) {\n                String currentEffect = cei.next();\n\
  \                if (currentEffect.equals(Camera.Parameters.EFFECT_SOLARIZE)) {\n\
  \                    parameters.setColorEffect(Camera.Parameters.EFFECT_SOLARIZE);\n\
  \                    break;\n                }\n            }\n            // 特效部分结束（适用于\
  \ Android 2.0 及以上版本）\n\n            camera.setParameters(parameters);\n        }\
  \ catch (IOException exception) {\n            camera.release();\n        }\n  \
  \  }\n\n    public void surfaceDestroyed(SurfaceHolder holder) {\n        camera.stopPreview();\n\
  \        camera.release();\n    }\n\n} // 活动结束\n```\n\n这样就完成了我们的 `SnapShot` 活动。以下是其所使用的布局\
  \ XML 文件。它应位于 `res/layout/main.xml`。\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n\
  \    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\n\
  \    android:layout_height=\"fill_parent\">\n\n    <SurfaceView\n        android:id=\"\
  @+id/CameraView\"\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\" />\n\n</LinearLayout>\n```\n\n最后，我们需要将 `CAMERA` 权限添加到 `AndroidManifest.xml`\
  \ 文件中。以下是完整的清单文件。\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\
  \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.proandroidmedia.ch2.snapshot\"\
  \n    android:versionCode=\"1\"\n    android:versionName=\"1.0\">\n\n    <application\n\
  \        android:icon=\"@drawable/icon\"\n        android:label=\"@string/app_name\"\
  >\n        <activity\n            android:name=\".SnapShot\"\n            android:label=\"\
  @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n\n\
  </manifest>\n```\n\n\n\n"
- "# 第 2 章：构建自定义相机应用\n\n`<application>`\n\n`<uses-sdk android:minSdkVersion=\"8\"\
  \ />`\n\n`<uses-permission android:name=\"android.permission.CAMERA\"></uses-permission>`\
  \ `</manifest>`\n\n以上内容涵盖了构建自定义相机应用的基础知识。接下来，让我们看看如何扩展这个应用，实现内置相机应用中没有的功能。\n\n##\
  \ 扩展自定义相机应用\n\n在我看来，Android 内置相机应用缺少一些基本功能。其中之一是在短时间内（例如 10 秒或 30 秒）拍摄照片的能力。这个功能对于可以安装在三脚架上的相机来说通常很有用。它允许摄影师先设置好拍摄场景，设定定时器，然后自己跑进画面中。\n\
  \n虽然这并非手机常用功能，但我认为在某些情况下它会非常有用。例如，当我想给自己和同行的人拍合影时，我就很需要这个功能。目前尝试这样做时，我会遇到困难，因为触摸屏朝向外面，我看不到界面。我只能手忙脚乱地到处点屏幕，希望能按到快门按钮。\n\
  \n### 构建基于定时器的相机应用\n\n为了改善上述情况，我们可以在拍照时添加一个时间延迟。让我们更新`SnapShot`示例，使得按下按钮十秒后拍摄照片。\n\
  \n为了实现这一点，我们需要使用类似`java.util.Timer`的东西。不幸的是，在 Android 中使用`Timer`会引入一个单独的线程，从而带来一些复杂性。为了让单独的线程与\
  \ UI 交互，我们需要使用`Handler`来让操作在主线程上执行。\n\n`Handler`的另一个用途是安排某些事情在将来发生。`Handler`的这一功能使得我们无需使用`Timer`。\n\
  \n要创建一个将在将来执行某操作的`Handler`，我们只需构造一个通用的`Handler`：\n\n```\nHandler timerHandler =\
  \ new Handler();\n```\n\n然后我们必须创建一个`Runnable`。这个`Runnable`的`run`方法将包含稍后要执行的操作。在我们的例子中，我们希望这个操作在十秒后触发拍照：\n\
  \n```\nRunnable timerTask = new Runnable() {\n    public void run() {\n        camera.takePicture(null,\
  \ null, null, TimerSnapShot.this);\n    }\n};\n```\n\n这样就差不多了。现在，当我们按下按钮时，我们只需安排它：\n\
  \n```\ntimerHandler.postDelayed(timerTask, 10000);\n```\n\n这告诉`timerHandler`在 10\
  \ 秒（10000 毫秒）后调用我们的`timerTask`方法。\n\n在下面的示例中，我们将创建一个`Handler`，并让它每秒调用一次方法。这样，我们就可以在屏幕上向用户显示倒计时。\n\
  \n```\npackage com.apress.proandroidmedia.ch2.timersnapshot;\n\nimport java.io.FileNotFoundException;\n\
  import java.io.IOException;\nimport java.io.OutputStream;\nimport java.util.Iterator;\n\
  import java.util.List;\n\nimport android.app.Activity;\nimport android.content.ContentValues;\n\
  import android.content.res.Configuration;\nimport android.hardware.Camera;\nimport\
  \ android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Handler;\nimport\
  \ android.provider.MediaStore.Images.Media;\nimport android.util.Log;\nimport android.view.SurfaceHolder;\n\
  import android.view.SurfaceView;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
  import android.widget.Button;\nimport android.widget.TextView;\nimport android.widget.Toast;\n\
  \npublic class TimerSnapShot extends Activity implements OnClickListener,\n    \
  \    SurfaceHolder.Callback, Camera.PictureCallback {\n\n    SurfaceView cameraView;\n\
  \    SurfaceHolder surfaceHolder;\n    Camera camera;\n```\n\n这个活动与我们的`SnapShot`活动非常相似。我们将添加一个`Button`来触发倒计时开始，以及一个`TextView`来显示倒计时。\n\
  \n```\n    Button startButton;\n    TextView countdownTextView;\n```\n\n我们还需要一个`Handler`，这里称为`timerUpdateHandler`，一个`Boolean`变量来帮助我们跟踪定时器是否已启动（`timerRunning`），以及一个整数（`currentTime`）来跟踪倒计时。\n\
  \n```\n    Handler timerUpdateHandler;\n    boolean timerRunning = false;\n    int\
  \ currentTime = 10;\n```\n\n```\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        cameraView = (SurfaceView) this.findViewById(R.id.CameraView);\n     \
  \   surfaceHolder = cameraView.getHolder();\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  \        surfaceHolder.addCallback(this);\n```\n\n接下来，我们将获取对新的 UI 元素（在布局 XML 中定义）的引用，并让我们的活动成为该`Button`的`OnClickListener`。我们之所以能做到这一点，是因为我们的活动实现了`OnClickListener`。\n\
  \n```\n        countdownTextView = (TextView) findViewById(R.id.CountDownTextView);\n\
  \        startButton = (Button) findViewById(R.id.CountDownButton);\n        startButton.setOnClickListener(this);\n\
  ```\n\n在`onCreate`方法中，我们要做的最后一件事是实例化我们的`Handler`对象。\n\n```\n        timerUpdateHandler\
  \ = new Handler();\n    }\n```\n\n当`startButton`按钮被按下时，将调用我们的`onClick`方法。我们将通过检查`timerRunning`布尔变量来确保定时器例程尚未运行，如果未运行，我们将通过我们的`Handler`对象`timerUpdateHandler`立即调用`timerUpdateTask`\
  \ `Runnable`。\n\n```\n    public void onClick(View v) {\n        if (!timerRunning)\n\
  \        {\n            timerRunning = true;\n            timerUpdateHandler.post(timerUpdateTask);\n\
  \        }\n    }\n```\n\n这是我们的`Runnable`，名为`timerUpdateTask`。这个对象包含了将由我们的`timerUpdateHandler`对象触发的`run`方法。\n\
  \n```\n    private Runnable timerUpdateTask = new Runnable() {\n        public void\
  \ run()\n        {\n```\n\n如果保存倒计时的整数`currentTime`大于 1，我们将使其递减，并在 1 秒后再次调度`Handler`调用。\n\
  \n```\n            if (currentTime > 1)\n            {\n                currentTime--;\n\
  \                timerUpdateHandler.postDelayed(timerUpdateTask, 1000);\n      \
  \      }\n            else\n            {\n```\n\n如果`currentTime`不大于 1，我们将实际触发相机拍照，并重置所有跟踪变量。\n\
  \n```\n                camera.takePicture(null, null, TimerSnapShot.this);\n   \
  \             timerRunning = false;\n                currentTime = 10;\n       \
  \     }\n```\n\n无论如何，我们都会更新`TextView`以显示拍照前剩余的当前时间。\n\n```\n            countdownTextView.setText(\"\
  \" + currentTime);\n        }\n    };\n```\n\n活动的其余部分与前面的`SnapShot`示例基本相同。\n\n```\n\
  \    public void surfaceChanged(SurfaceHolder holder, int format, int w, int h)\
  \ {\n        camera.startPreview();\n    }\n\n    public void surfaceCreated(SurfaceHolder\
