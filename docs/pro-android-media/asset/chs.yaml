  \            MediaStore.Video.Media.TITLE,\n            MediaStore.Video.Media.MIME_TYPE\n\
  \        };\n\n        // 在主查询中，我们将选择 MediaStore 中表示的所有视频。\n        cursor = managedQuery(MediaStore.Video.Media.EXTERNAL_CONTENT_URI,\n\
