- "# 第 12 章：使用 Web 服务进行媒体消费与发布\n\n查看返回的 JSON 数据后，我们可以确定需要借助 JSON 解析器执行哪些步骤来获取所需信息。通过分解数据可以发现，存在一个名为`photos`的顶层对象，其中包含一个名为`photo`的\
