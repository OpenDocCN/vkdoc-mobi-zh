  , Toast.LENGTH_SHORT);\n            t.show();\n        } catch (FileNotFoundException\
  \ e) {\n        }\n    }\n}\n```\n\n\n\n## 第二章：构建自定义相机应用\n\n`Toast t = Toast.makeText(this,\
  \ e.getMessage(), Toast.LENGTH_SHORT);`\n`t.show();`\n\n`} catch (IOException e)\
  \ {`\n`Toast t = Toast.makeText(this, e.getMessage(), Toast.LENGTH_SHORT);`\n`t.show();`\n\
  `}`\n`camera.startPreview();`\n`}`\n`}`\n\n布局 XML 稍有不同。在这个应用中，我们在 `FrameLayout`\
  \ 中显示相机预览 `SurfaceView`，同时还有一个包含用于显示倒计时的 `TextView` 和用于触发倒计时的 `Button` 的 `LinearLayout`。`FrameLayout`\
  \ 将其所有子视图对齐到左上角并叠放在一起。这样，`TextView` 和 `Button` 就会显示在相机预览之上。\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\">\n    <FrameLayout\n        android:id=\"\
