- "# 第三章：图像编辑与处理\n\n如图 3-5 所示，我们将图像在 x 轴上压缩 50%。第一个数值作用于源图像中的 x 坐标，以影响结果图像中的 x 坐标。\n\
  \n```\n.5 0 0\n0 1 0\n0 0 1\n```\n\n```\nMatrix matrix = new Matrix();\nmatrix.setValues(new\
  \ float[] {\n    .5f, 0, 0,\n    0, 1, 0,\n    0, 0, 1\n});\ncanvas.drawBitmap(bmp,\
  \ matrix, paint);\n```\n\n**图 3-5.** *应用自定义矩阵后显示的第二张图像，x 轴缩放 50%*\n\n如果我们修改矩阵，让\
  \ x 坐标也受到源图像 y 坐标的影响，就可以改变第二个数值。\n\n```\nMatrix matrix = new Matrix();\nmatrix.setValues(new\
  \ float[] {\n    1, .5f, 0,\n    0, 1, 0,\n    0, 0, 1\n});\ncanvas.drawBitmap(bmp,\
  \ matrix, paint);\n```\n\n![](img/index-71_1.jpg)\n\n**图 3-6.** *应用自定义矩阵后显示的第二张图像，发生了倾斜*\n\
  \n如图 3-6 所示，这会导致图像倾斜。这是因为第一行（作用于每个像素的 x 值）受到了每个像素 y 值的影响。随着 y 值增大（即向下移动图像），x 值也增大，从而导致图像倾斜。如果使用负值，则会向相反方向倾斜。你还会注意到，由于坐标变化，图像边缘被裁剪了。如果我们要执行此类操作，就需要增大结果位图的尺寸，如图\
  \ 3-7 所示。\n\n```\nalteredBitmap = Bitmap.createBitmap(bmp.getWidth()*2, bmp.getHeight(),\
  \ bmp.getConfig());\n```\n\n![](img/index-72_1.jpg)\n\n**图 3-7.** *应用相同自定义矩阵但宽度更大的第二张图像，图像不再被裁剪*\n\
  \n可以看出，这些矩阵变换功能非常强大。同时，手动操作也会很繁琐。不幸的是，要手动通过矩阵实现你想要的许多功能，所需的数学知识超出了本书的范围。不过，如果你有兴趣深入了解，网上有大量资源可供参考。一个不错的起点是维基百科的“变换矩阵”条目：<http://en.wikipedia.org/wiki/Transformation_matrix>。\n\
  \n## 矩阵方法\n\n接下来，我们将探索 `Matrix` 类的其他方法。它们能帮助我们实现大部分需求，而无需重新学习中学和大学的数学课程。\n\n我们无需手动创建矩阵数值，只需为所需的变换调用相应的方法即可。\n\
  \n以下每个代码片段都可替换“在位图上绘制位图”示例中的 `canvas.drawBitmap` 这一行。\n\n### 旋转\n\n内置方法之一就是 `setRotation`\
  \ 方法。它接收一个表示旋转角度的浮点数。正数使图像绕默认点 (0,0)（即图像的左上角）顺时针旋转，负数则使图像逆时针旋转，如图 3-8 所示。\n\n```\n\
  Matrix matrix = new Matrix();\nmatrix.setRotate(15);\ncanvas.drawBitmap(bmp, matrix,\
  \ paint);\n```\n\n![](img/index-73_1.jpg)\n\n**图 3-8.** *绕默认点 (0,0) 旋转*\n\n另外，`setRotation`\
  \ 方法也可以传入旋转角度和旋转中心点的坐标。选择图像的中心点作为旋转中心，可能会得到更符合我们预期的结果，如图 3-9 所示。\n\n```\nmatrix.setRotate(15,\
  \ bmp.getWidth()/2, bmp.getHeight()/2);\n```\n\n![](img/index-74_1.jpg)\n\n**图 3-9.**\
  \ *绕图像中点旋转*\n\n### 缩放\n\n`Matrix` 的另一个实用方法是 `setScale` 方法。它接收两个浮点数，分别表示在每个轴向上的缩放量。第一个参数是\
  \ x 轴缩放比例，第二个参数是 y 轴缩放比例。图 3-10 显示了以下 `setScale` 方法调用的结果。\n\n```\nmatrix.setScale(1.5f,\
  \ 1);\n```\n\n![](img/index-75_1.jpg)\n\n**图 3-10.** *在 x 轴上应用 1.5 倍缩放*\n\n### 平移\n\
  \n`Matrix` 最实用的方法之一是 `setTranslate` 方法。平移操作只是将图像在 x 轴和 y 轴上移动。`setTranslate` 方法接收两个浮点数，分别表示在每个轴上的移动量。第一个参数是图像在\
  \ x 轴上的移动量，第二个参数是图像在 y 轴上的移动量。x 轴上的正值将使图像向右移动，负值则向左移动。y 轴上的正值将使图像向下移动，负值则向上移动。\n\
