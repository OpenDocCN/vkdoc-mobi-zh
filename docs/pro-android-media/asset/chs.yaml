  ## 添加视频元数据\n\n如第 9 章所述，Android 的 `MediaStore` 内容提供器包含一个专门用于视频的模块 `MediaStore.Video`，此外还包括我们之前探讨过的图片和音频文件及其元数据模块。\n\
  \n通过 Intent 触发相机应用时，返回的新录制视频文件的 `Uri` 是 `content://` 风格的 `Uri`，需要与内容提供器（此处为 `MediaStore`）配合使用。要添加额外元数据，我们可以利用返回的\
  \ `Uri` 更新 `MediaStore` 中的视频记录。\n\n与其他内容提供器一样，我们通过从 `Context` 获取的 `ContentResolver`\
  \ 对象调用 `update` 方法。传入 `content://` 风格的 `Uri` 以及由 `ContentValues` 对象封装的新数据。由于我们已获取指向特定记录的\
  \ `Uri`，因此无需为最后两个参数（SQL 风格的 `WHERE` 子句及其参数）指定内容。\n\n`ContentValues` 对象包含键值对，其中键为\
  \ `MediaStore.Video` 专用的列名。可用列名以常量形式定义在 `MediaStore.Video.Media` 中，大部分继承自 `android.provider.BaseColumns`、`MediaStore.MediaColumns`\
  \ 和 `MediaStore.Video.VideoColumns`。\n\n```\nContentValues values = new ContentValues(1);\n\
