  \ HTTP 在线获取的音频文件。\n\n### 通过 HTTP 流式传输音频\n\n在线传输实时音频的一种常见方式是通过 HTTP 流式传输。有多种流媒体方法属于\
  \ HTTP 流媒体范畴，从服务器推送（历史上曾用于在浏览器中显示持续刷新的网络摄像头图像）到 Apple、Adobe 和 Microsoft 为其各自的媒体播放应用程序提出的一系列新方法。\n\
  \n通过 HTTP 传输实时音频的主要方法是由一家名为 Nullsoft 的公司于 1999 年开发的，该公司随后被 AOL 收购。Nullsoft 是流行 MP3\
  \ 播放器 WinAMP 的创建者，他们开发了一款使用 HTTP 的实时音频流服务器，名为 SHOUTcast。SHOUTcast 使用 ICY 协议，该协议扩展了\
  \ HTTP。目前，大量服务器和播放软件产品支持该协议，事实上数量如此之多，以至于它可能被视为网络电台的事实标准。\n\n幸运的是，Android 上的 `MediaPlayer`\
  \ 类能够播放 ICY 流，而无需我们开发人员费尽周折。不幸的是，网络电台通常不会公布其流的直接 URL。这是有充分理由的；遗憾的是，浏览器不支持直接播放 ICY\
  \ 流，需要辅助应用程序或插件才能播放该流。为了知道要打开一个辅助应用程序，网络电台会提供一个具有特定 MIME 类型的中间文件，其中包含指向实际直播流的指针。对于\
  \ ICY 流，这通常是 PLS 文件或 M3U 文件。\n\nPLS 文件是一种多媒体播放列表文件，其 MIME 类型为 `audio/x-scpls`。M3U\
  \ 文件也是存储多媒体播放列表的文件，但采用更基本的格式。其 MIME 类型为 `audio/x-mpegurl`。以下显示了一个指向虚假直播流的 M3U 文件的内容：\n\
  \n```\n#EXTM3U\n#EXTINF:0,Live Stream Name\nhttp://www.nostreamhere.org:8000/\n\
  ```\n\n第一行 `#EXTM3U` 是必需的，用于指定后续内容为扩展 M3U 文件，可包含额外信息。播放列表条目的额外信息在该条目上方一行指定，以 `#EXTINF:`\
  \ 开头，后跟持续时间（秒）、逗号，然后是媒体名称。\n\n\n# 背景与网络音频\n\nM3U 文件也可以包含多个条目，依次指定一个文件或流。\n\n```\n\
  #EXTM3U\n#EXTINF:0,直播流名称\nhttp://www.nostreamhere.org:8000/\n#EXTINF:0,其他直播流名称\n\
  http://www.nostreamthere.org/\n```\n\n遗憾的是，Android 上的 `MediaPlayer` 并不会帮我们解析 M3U\
  \ 文件。因此，要在 Android 上创建 HTTP 流式音频播放器，我们必须自行处理解析工作，并使用 `MediaPlayer` 进行实际的媒体播放。\n\n\
  以下是一个示例 Activity，用于解析并播放来自网络电台或 URL 字段中输入的任何 M3U 文件。\n\n```java\npackage com.apress.proandroidmedia.ch06.httpaudioplaylistplayer;\n\
  \nimport java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
