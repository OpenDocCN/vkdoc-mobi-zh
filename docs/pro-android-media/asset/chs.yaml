  在本章中，我们通过展示音频处理的灵活性，完成了对 Android 音频的全面介绍。尽管我们只触及了音频合成和分析的冰山一角，但这已充分展现了其潜力以及 Android\
  \ 中 `AudioTrack` 和 `AudioRecord` 类的灵活性。接下来，我们将把注意力转向视频。\n\n---\n\n# 第 8 章：音频合成与分析\n\
  \n---\n\n# 第 9 章：视频简介\n\n在继续探索 Android 媒体功能的旅程中，现在我们将把注意力转向视频。在本章中，我们将探讨在 Android\
  \ 上可用的各种视频播放方式，以及所支持的格式。\n\n**视频播放**\n\n从技术上讲，早在 2004 年之前，一些手机就已经具备了视频播放能力。但实际上，直到\
  \ 2007 年 iPhone 推出后，手机视频才在美国真正流行起来。自此以后，几乎所有名副其实的智能手机都支持视频播放，甚至视频拍摄。正如我们将在本章中探讨的那样，Android\
  \ 也不例外。\n\n**支持的格式**\n\n在深入探讨具体的视频播放机制之前，我们先来了解可以播放的视频类型。虽然 Android 支持播放多种视频格式，并且支持的格式种类也在逐渐增加，但它当然无法涵盖所有可用的视频格式。\n\
  \n总体而言，Android 的支持范围与其他手机一致。它支持 3GP（`.3gp`）和 MPEG-4（`.mp4`）文件格式。3GP 是一种源自 MPEG-4、专为移动设备设计的视频标准。\n\
  \n在编解码方面，Android 支持 H.263，这是一种专为低延迟和低比特率视频会议应用设计的编解码器。H.263 视频可在 MPEG-4（`.mp4`）或\
  \ 3GP（`.3gp`）文件中使用。Android 还支持 3GP 文件（`.3gp`）中的 MPEG-4 Simple Profile 以及 H.264。\n\
  \nH.264 也称为 MPEG-4 part 10 或 AVC（高级视频编码）。它是最有希望成为视频编解码器标准的技术之一，并且可能在软件和硬件上提供最广泛的支持。H.264\
  \ 受到 Silverlight、Flash、iPhone/iPod、蓝光设备等的支持。Android 支持在 MPEG-4 容器格式（`.mp4`）中的 H.264\
  \ 编码视频。\n\n根据您阅读本书的时间，Android 可能还支持 WebM（Android 3.0 及更高版本），这是一种开放且免版税的媒体容器，用于容纳\
  \ VP8 编码的视频和 Vorbis 编码的音频。WebM 是在 Google 收购 On2 Technologies 并将 VP8 编解码器发布到公共域后不久推出的。\n\
  \n大量的桌面视频转换工具可帮助将视频转换为适合 Android 设备使用的格式。难点在于设置正确的参数。通常，如果该工具预设有 Android 设备的配置，那就没问题。如果不是，该工具可能为\
  \ iPhone 提供的任何预设配置，也大概率适用于 Android 设备，因为两者支持的格式范围非常接近。\n\n**使用 Intent 进行播放**\n\n\
  正如我们在本书中探索的大多数 Android 功能一样，播放视频也可以轻松实现：使用一个 Intent 来触发内置 Media Player 应用的播放活动。\n\
  \n在这个例子中，我使用带有内置 iSight 摄像头的 Mac 笔记本电脑上的 QuickTime X 录制了一个视频。我使用 QuickTime X 的“另存为”命令导出了该视频，并选择“iPhone”作为格式。这创建了一个名为\
  \ `Test_Movie.m4v` 的视频。（`.m4v` 扩展名是由 QuickTime 赋予的。不幸的是，它不是标准扩展名，这可能表明该文件可能不是完全符合标准的\
  \ MPEG-4 文件。尽管如此，它在 Android 设备上似乎并没有出现任何问题。）该视频可在 [www.mobvcasting.com/android/video/Test_Movie.m4v](http://www.mobvcasting.com/android/video/Test_Movie.m4v)\
  \ 在线获取，如果您想用它进行测试，可以下载。\n\n以下代码要求将此视频放置在 Android 设备 SD 卡的根目录下。为此，您应该能够通过 USB 线将设备连接到计算机，然后在状态栏下拉菜单中选择显示“USB\
  \ 已连接。选择以复制文件到/从计算机”的菜单项。这应该会打开一个屏幕，允许您“打开 USB 存储设备”。执行此操作后，您的手机将作为可移动驱动器挂载到计算机上，然后就可以复制视频文件了。在尝试运行以下代码之前，请不要忘记卸载驱动器并“关闭\
  \ USB 存储设备”。否则，由于手机上的程序在计算机仍可访问 SD 卡时无法访问 SD 卡来读取视频文件，您将收到错误提示。\n\n为了创建将触发内置 Media\
  \ Player 应用播放活动的 Intent，我们将使用 `Intent.ACTION_VIEW` 常量构建一个 Activity，并通过 `setDataAndType`\
  \ 方法传入文件的 URI 和 MIME 类型。这允许 Android 选择首选的播放活动。图 9–1 显示了 Android 2.2 的内置 Media Player\
  \ 以这种方式播放视频。\n\n```java\npackage com.apress.proandroidmedia.ch09.videointent;\n\n\
  import android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.os.Environment;\nimport android.view.View;\n\
  import android.view.View.OnClickListener;\nimport android.widget.Button;\n\npublic\
  \ class VideoPlayerIntent extends Activity implements OnClickListener {\n\n    Button\
  \ playButton;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        playButton = (Button) this.findViewById(R.id.PlayButton);\n        playButton.setOnClickListener(this);\n\
  \    }\n\n    public void onClick(View v) {\n        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
  \        Uri data = Uri.parse(Environment.getExternalStorageDirectory().getPath()\
  \ +\n                \"/Test_Movie.m4v\");\n        intent.setDataAndType(data,\
  \ \"video/mp4\");\n        startActivity(intent);\n    }\n}\n```\n\n**图 9–1.** *内置\
  \ Media Player 应用播放通过 Intent 指定的视频*\n\n**使用 VideoView 进行播放**\n\n`VideoView` 是一个具有视频播放功能的\
  \ `View`，可以直接在布局中使用。它的使用非常简单直接。\n\n以下布局 XML 文件 `main.xml` 在 `LinearLayout` 内部指定了一个\
  \ `VideoView`。\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
  \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\">\n\n    <!-- VideoView 将放置在这里 -->\n\n</LinearLayout>\n```\n\n\n\n\
  # 第 9 章：视频简介\n\n`<VideoView android:layout_width=\"wrap_content\" android:layout_height=\"\
  wrap_content\" android:id=\"@+id/VideoView\"></VideoView>`\n\n`</LinearLayout>`\n\
  \n要使用这个 `VideoView`，我们只需按常规方式通过 `findViewById` 获取其引用，并传入 ID（`R.id.VideoView`）。获取对象后，我们可以通过\
  \ `setVideoURI` 设置视频文件的 `Uri`，然后调用 `start` 方法开始播放。\n\n```\npackage com.apress.proandroidmedia.ch09.videoview;\n\
  \nimport android.app.Activity;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.os.Environment;\nimport android.widget.VideoView;\n\npublic class\
  \ ViewTheVideo extends Activity {\n    VideoView vv;\n\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        vv = (VideoView) this.findViewById(R.id.VideoView);\n\
  \n        Uri videoUri = Uri.parse(Environment.getExternalStorageDirectory().getPath()\
  \ +\n                \"/Test_Movie.m4v\");\n\n        vv.setVideoURI(videoUri);\n\
  \        vv.start();\n    }\n}\n```\n\n图 9-2 展示了上述示例的运行效果。\n\n下载自 Wow! eBook <www.wowebook.com>\n\
  \n![](img/index-213_1.jpg)\n\n# 第 9 章：视频简介\n\n### 199\n\n**图 9-2.** *VideoView 示例*\n\
  \n## 使用 MediaController 添加控制功能\n\n`VideoView` 对视频播放的控制能力相对有限，具体来说，它只提供了 `start`\
  \ 和 `pause` 方法。为了提供更多控制功能，我们可以实例化一个 `MediaController`，并通过 `setMediaController` 将其设置为\
  \ `VideoView` 的控制器。\n\n默认的 `MediaController` 包含后退、暂停、播放和快进按钮，以及一个可拖动滑块和进度条的组合，用于跳转到视频中的任意位置。\n\
  \n以下是对 `VideoView` 示例的更新，在 `onCreate` 方法中通过 `setContentView` 设置内容视图后，添加了 `MediaController`。\n\
  \n```\nvv = (VideoView) this.findViewById(R.id.VideoView);\nvv.setMediaController(new\
  \ MediaController(this));\nUri videoUri = Uri.parse(Environment.getExternalStorageDirectory().getPath()\
  \ +\n        \"/Test_Movie.m4v\");\nvv.setVideoURI(videoUri);\nvv.start();\n```\n\
  \n![](img/index-214_1.jpg)\n\n### 200\n\n# 第 9 章：视频简介\n\n**图 9-3.** *带默认 MediaController\
  \ 的 VideoView*\n\n## 使用 MediaPlayer 播放\n\n在第 6 章和第 7 章（涉及音频和网络音频）中，我们介绍了 `MediaPlayer`\
  \ 类。同样的 `MediaPlayer` 类也可以以类似的方式用于视频播放。\n\n与使用 `VideoView` 或通过 intent 播放视频相比，使用\
  \ `MediaPlayer` 对象进行视频播放能为我们提供最大的播放控制灵活性。实际上，`VideoView` 内部以及通过 intent 触发的 activity\
  \ 中用于处理实际播放的机制正是 `MediaPlayer`。\n\n**注意：** 遗憾的是，没有任何视频播放类能像最灵活的音频播放类 `AudioTrack`\
  \ 那样灵活，后者允许我们动态生成要播放的数据。\n\n# 第 9 章：视频简介\n\n### 201\n\n### MediaPlayer 状态\n\n`MediaPlayer`\
  \ 对象以状态机的方式运行。这意味着操作需要按特定顺序执行，并且各种方法只能在对象处于正确的状态时才能调用。\n\n`MediaPlayer` 类定义了多个监听器，允许使用它的应用程序接收到各种状态变化的通知，并做出相应处理。\n\
  \n让我们通过一个完整的 `MediaPlayer` 示例来进一步探索。图 9-4 再次展示了状态图以供参考。\n\n**图 9-4.** *来自 MediaPlayer\
  \ 类参考文档的状态图*\n\n### 202\n\n# 第 9 章：视频简介\n\n### MediaPlayer 示例\n\n以下是一个使用 `MediaPlayer`\
  \ 创建自定义视频播放应用程序的完整示例。图 9-5 展示了该应用程序的运行情况。\n\n```\npackage com.apress.proandroidmedia.ch09.videoplayercustom;\n\
  \nimport java.io.IOException;\nimport android.app.Activity;\nimport android.os.Bundle;\n\
  import android.os.Environment;\nimport android.util.Log;\nimport android.view.Display;\n\
  import android.widget.LinearLayout;\n```\n\n我们正在导入 `MediaPlayer` 及其几个内部类，这些内部类是我们将要实现的接口。\n\
  \n```\nimport android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
  import android.media.MediaPlayer.OnErrorListener;\nimport android.media.MediaPlayer.OnInfoListener;\n\
  import android.media.MediaPlayer.OnPreparedListener;\nimport android.media.MediaPlayer.OnSeekCompleteListener;\n\
  import android.media.MediaPlayer.OnVideoSizeChangedListener;\n```\n\n`SurfaceHolder`\
  \ 和 `SurfaceView` 将用于绘制视频。\n\n```\nimport android.view.SurfaceHolder;\nimport android.view.SurfaceView;\n\
  ```\n\n我们的 Activity 将实现所有的 `MediaPlayer` 状态变化监听器，以及 `SurfaceHolder.Callback` 接口，这将使我们能够接收到\
  \ `SurfaceView` 变化的通知。\n\n```\npublic class CustomVideoPlayer extends Activity\n\
  \        implements OnCompletionListener, OnErrorListener, OnInfoListener,\n   \
  \     OnPreparedListener, OnSeekCompleteListener, OnVideoSizeChangedListener,\n\
  \        SurfaceHolder.Callback\n{\n    Display currentDisplay;\n    SurfaceView\
  \ surfaceView;\n    SurfaceHolder surfaceHolder;\n```\n\n我们应用程序的核心引擎将是这个 `MediaPlayer`\
  \ 对象。\n\n```\n    MediaPlayer mediaPlayer;\n    int videoWidth = 0;\n    int videoHeight\
  \ = 0;\n    boolean readyToPlay = false;\n    public final static String LOGTAG\
  \ = \"CUSTOM_VIDEO_PLAYER\";\n```\n\n`@Override`\n\n### 203\n\n```\n    public void\
  \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n```\n\n设置内容视图后，我们可以获取布局 XML 中定义的 `SurfaceView`\
  \ 的引用，并获取 `SurfaceHolder` 的引用，它允许我们监控底层 `Surface` 的变化。\n\n```\n        surfaceView\
  \ = (SurfaceView) this.findViewById(R.id.SurfaceView);\n        surfaceHolder =\
  \ surfaceView.getHolder();\n```\n\n由于我们的 Activity 实现了 `SurfaceHolder.Callback`，我们将其分配为回调监听器。\n\
  \n```\n        surfaceHolder.addCallback(this);\n```\n\n我们需要确保底层表面是一个推送缓冲区表面，这是当前视频播放和相机预览所必需的。\n\
  \n```\n        surfaceHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  ```\n\n现在我们开始构造实际的 `MediaPlayer` 对象。我们没有传入任何参数，获取了一个处于“空闲”状态的通用 `MediaPlayer`。\n\
  \n```\n        mediaPlayer = new MediaPlayer();\n```\n\n我们还会指定我们的 Activity 作为各种事件的监听器。\n\
  \n```\n        mediaPlayer.setOnCompletionListener(this);\n        mediaPlayer.setOnErrorListener(this);\n\
  \        mediaPlayer.setOnInfoListener(this);\n        mediaPlayer.setOnPreparedListener(this);\n\
  \        mediaPlayer.setOnSeekCompleteListener(this);\n        mediaPlayer.setOnVideoSizeChangedListener(this);\n\
  ```\n\n在完成 `onCreate` 方法之前，我们将告诉 `MediaPlayer` 对象要播放什么内容。在这个示例中，我们使用的是前面示例中相同的视频文件。你可以从\
  \ [www.mobvcasting.com/android/video/Test_Movie.m4v](http://www.mobvcasting.com/android/video/Test_Movie.m4v)\
  \ 下载，或者创建自己的文件。\n\n```\n        String filePath = Environment.getExternalStorageDirectory().getPath()\
  \ + \"/Test_Movie iPhone.m4v\";\n```\n\n`MediaPlayer` 上的 `setDataSource` 方法可能会抛出多个异常，我们应该妥善处理。这里我们只是退出程序。在你的应用程序中，你可能希望给用户提供选择其他文件的机会，或者解释哪里出了问题。\n\
  \n```\n        try {\n            mediaPlayer.setDataSource(filePath);\n       \
  \ } catch (IllegalArgumentException e) {\n            Log.v(LOGTAG, e.getMessage());\n\
  \            finish();\n        } catch (IllegalStateException e) {\n          \
  \  Log.v(LOGTAG, e.getMessage());\n            finish();\n        } catch (IOException\
  \ e) {\n            Log.v(LOGTAG, e.getMessage());\n```\n\n### 204\n\n\n\n# 第 9\
  \ 章：视频简介\n\n`finish();`\n\n```\ncurrentDisplay = getWindowManager().getDefaultDisplay();\n\
  ```\n\n由于我们的活动实现了 `SurfaceHolder.Callback` 并已被指定为回调监听器，因此以下三个方法将被触发。\n\n当 `SurfaceView`\
  \ 底层的 `Surface` 被创建时，将调用 `surfaceCreated`。\n\n```\npublic void surfaceCreated(SurfaceHolder\
  \ holder) {\n    Log.v(LOGTAG,\"surfaceCreated Called\");\n```\n\n当 `Surface` 创建完成后，我们可以通过调用\
  \ `MediaPlayer` 的 `setDisplay` 方法，并传入 `SurfaceHolder` 对象，来指定 `MediaPlayer` 使用该 `Surface`\
  \ 进行播放。\n\n```\nmediaPlayer.setDisplay(holder);\n```\n\n最后，在指定 `Surface` 之后，我们可以调用\
  \ `prepare`。`prepare` 方法是阻塞式的，不会在后台执行工作。为了让它能在后台执行工作，从而不占用应用程序资源，我们可以改用 `prepareAsync`。无论使用哪种方式，由于我们实现了\
  \ `OnPreparedListener` 并且我们的活动被设置为监听器，因此当准备就绪时，我们的 `onPrepared` 方法将被调用。\n\n`prepare`\
  \ 方法可能会抛出我们需要处理的几种异常。为简洁起见，我们仅记录错误并退出。在你的应用程序中，你可能需要妥善地处理这些异常。\n\n```\ntry {\n \
  \   mediaPlayer.prepare();\n} catch (IllegalStateException e) {\n    Log.v(LOGTAG,e.getMessage());\n\
  \    finish();\n} catch (IOException e) {\n    Log.v(LOGTAG,e.getMessage());\n \
  \   finish();\n}\n```\n\n当 `SurfaceView` 底层的 `Surface` 的宽度、高度或其他参数发生变化时，将调用 `surfaceChanged`。在这个例子中，我们不需要对此进行任何处理。\n\
  \n```\npublic void surfaceChanged(SurfaceHolder holder, int format, int width, int\
  \ height){\n    Log.v(LOGTAG,\"surfaceChanged Called\");\n}\n```\n\n当我们的 `SurfaceView`\
  \ 底层的 `Surface` 被销毁时，将调用 `surfaceDestroyed`。在这个例子中，我们对此不进行任何处理。\n\n```\npublic void\
  \ surfaceDestroyed(SurfaceHolder holder) {\n    Log.v(LOGTAG,\"surfaceDestroyed\
  \ Called\");\n}\n```\n\n由于我们实现了 `MediaPlayer.OnCompletionListener` 并注册了自身作为监听器，因此当\
  \ `MediaPlayer` 播放完一个文件时，我们的 `onCompletion` 方法将被调用。我们可以利用这一点来加载另一个视频或执行其他操作，例如加载另一个屏幕。在这个例子中，我们只需退出。\n\
  \n```\npublic void onCompletion(MediaPlayer mp) {\n    Log.v(LOGTAG,\"onCompletion\
  \ Called\");\n    finish();\n}\n```\n\n我们的活动实现了 `MediaPlayer.OnErrorListener`，并且它被注册为\
  \ `MediaPlayer` 对象的错误监听器，因此当发生错误时，将调用下面的 `onError` 方法。遗憾的是，可用的错误信息并不多，只有如下所示的两个常量。\n\
  \n```\npublic boolean onError(MediaPlayer mp, int whatError, int extra) {\n    Log.v(LOGTAG,\"\
  onError Called\");\n    if (whatError == MediaPlayer.MEDIA_ERROR_SERVER_DIED) {\n\
  \        Log.v(LOGTAG,\"Media Error, Server Died \" + extra);\n    } else if (whatError\
  \ == MediaPlayer.MEDIA_ERROR_UNKNOWN) {\n        Log.v(LOGTAG,\"Media Error, Error\
  \ Unknown \" + extra);\n    }\n```\n\n从该方法返回 `false` 表示错误未被处理。如果已注册 `OnCompletionListener`，则会调用其\
  \ `onCompletion` 方法。`MediaPlayer` 对象将进入“错误”状态。可以通过调用 `reset` 方法将其恢复为“空闲”状态。\n\n\
  ```\nreturn false;\n}\n```\n\n`OnInfoListener` 中指定的 `onInfo` 方法在媒体播放的相关特定信息可用或需要发出警告时被调用。\n\
  \n```\npublic boolean onInfo(MediaPlayer mp, int whatInfo, int extra) {\n    if\
  \ (whatInfo == MediaPlayer.MEDIA_INFO_BAD_INTERLEAVING) {\n```\n\n如果文件中的音频和视频数据没有正确交错，则会触发此事件。一个正确交错的媒体文件，其音频和视频样本会按照使播放高效流畅的顺序排列。\n\
  \n```\nLog.v(LOGTAG,\"Media Info, Media Info Bad Interleaving \" + extra);\n   \
  \ } else if (whatInfo == MediaPlayer.MEDIA_INFO_NOT_SEEKABLE) {\n```\n\n如果媒体无法进行定位（这意味着它可能是一个直播流），则会触发此事件。\n\
  \n```\nLog.v(LOGTAG,\"Media Info, Media Info Not Seekable \" + extra);\n    } else\
  \ if (whatInfo == MediaPlayer.MEDIA_INFO_UNKNOWN) {\n```\n\n这很好理解，即信息未明确指定或未知。\n\
  \n```\nLog.v(LOGTAG,\"Media Info, Media Info Unknown \" + extra);\n    } else if\
