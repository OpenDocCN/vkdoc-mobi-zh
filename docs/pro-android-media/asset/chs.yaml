- "# 第 1 章：Android 影像处理入门\n\n提供与`Camera`应用相媲美的图像拍摄功能，而无需自行构建自定义拍摄程序。\n\nIntent 过滤器是应用开发者用来声明其应用提供特定功能的一种手段。在应用的`AndroidManifest.xml`文件中指定\
  \ Intent 过滤器，会告知 Android 系统：该应用（尤其是包含该过滤器的 Activity）将在收到指令时执行指定的任务。\n\n`Camera`应用在其清单文件中指定了以下\
  \ Intent 过滤器。此处显示的过滤器包含在\"`Camera`\"Activity 标签内。\n\n```\n<intent-filter>\n<action\
  \ android:name=\"android.media.action.IMAGE_CAPTURE\" />\n<category android:name=\"\
  android.intent.category.DEFAULT\" />\n</intent-filter>\n```\n\n为了通过 Intent 调用`Camera`应用，我们只需构造一个能被上述过滤器捕获的\
  \ Intent 即可。\n\n```\nIntent i = new Intent(\"android.media.action.IMAGE_CAPTURE\"\
  );\n```\n\n在实践中，我们可能不希望直接使用该动作字符串来创建 Intent。在这种情况下，`MediaStore`类中定义了一个常量`ACTION_IMAGE_CAPTURE`。我们应使用常量而非字符串本身的原因是，如果字符串发生变更，常量也极大概率会随之更新，从而使我们的调用更具前瞻性。\n\
  \n```\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
  startActivity(i);\n```\n\n在一个基础 Android Activity 中使用此 Intent，将会启动默认的`Camera`应用并进入静态拍照模式，如图\
  \ 1–1 所示。\n\n**图 1–1.** *通过 Intent 调用的内置 Camera 应用在模拟器中的运行界面*\n\n## 从 Camera 应用返回数据\n\
  \n当然，如果拍摄照片后`Camera`应用无法将图片返回给调用它的 Activity，那么单纯使用内置`Camera`应用来拍照就没有实际意义。这可以通过将\
  \ Activity 中的`startActivity`方法替换为`startActivityForResult`方法来实现。使用此方法，我们就能访问`Camera`应用返回的数据，即用户拍摄的图像（以`Bitmap`形式呈现）。\n\
  \n以下是一个基本示例：\n\n```java\npackage com.apress.proandroidmedia.ch1.cameraintent;\n\n\
  import android.app.Activity;\nimport android.content.Intent;\nimport android.graphics.Bitmap;\n\
  import android.os.Bundle;\nimport android.widget.ImageView;\n\npublic class CameraIntent\
  \ extends Activity {\n\n    final static int CAMERA_RESULT = 0;\n    ImageView imv;\n\
  \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n       \
  \ super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \        Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
  \        startActivityForResult(i, CAMERA_RESULT);\n    }\n\n    protected void\
  \ onActivityResult(int requestCode, int resultCode, Intent intent) {\n        super.onActivityResult(requestCode,\
  \ resultCode, intent);\n        if (resultCode == RESULT_OK) {\n            Bundle\
  \ extras = intent.getExtras();\n            Bitmap bmp = (Bitmap) extras.get(\"\
  data\");\n            imv = (ImageView) findViewById(R.id.ReturnedImageView);\n\
  \            imv.setImageBitmap(bmp);\n        }\n    }\n}\n```\n\n该示例要求在项目的`layout/main.xml`文件中包含以下内容：\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
  http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  >\n    <ImageView android:id=\"@+id/ReturnedImageView\"\n        android:layout_width=\"\
  wrap_content\"\n        android:layout_height=\"wrap_content\"></ImageView>\n</LinearLayout>\n\
  ```\n\n为了完善上述示例，以下是`AndroidManifest.xml`的内容：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:versionCode=\"1\"\n    android:versionName=\"1.0\"\n    package=\"\
  com.apress.proandroidmedia.ch1.cameraintent\">\n    <application android:icon=\"\
  @drawable/icon\" android:label=\"@string/app_name\">\n        <activity android:name=\"\
  .CameraIntent\"\n            android:label=\"@string/app_name\">\n            <intent-filter>\n\
  \                <action android:name=\"android.intent.action.MAIN\" />\n      \
  \          <category android:name=\"android.intent.category.LAUNCHER\" />\n    \
  \        </intent-filter>\n        </activity>\n    </application>\n    <uses-sdk\
  \ android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n在这个例子中，图像是从`Camera`应用通过 Intent\
  \ 传递的附加数据返回到我们调用 Activity 的`onActivityResult`方法中的。该附加数据的键名为`\"data\"`，包含一个`Bitmap`对象，需要从通用的`Object`类型进行转换。\n\
  \n```java\n// 从 Intent 中获取附加数据\nBundle extras = intent.getExtras();\n// 从附加数据中获取返回的图像\n\
  Bitmap bmp = (Bitmap) extras.get(\"data\");\n```\n\n在我们的布局 XML 文件（`layout/main.xml`）中，有一个`ImageView`。`ImageView`是通用`View`的扩展，支持图像显示。由于我们指定了一个\
  \ id 为`ReturnedImageView`的`ImageView`，因此在 Activity 中我们需要获取对它的引用，并通过其`setImageBitmap`方法将获取的`Bitmap`设置给它。这样，我们应用的用户就能查看拍摄的图像了。\n\
  \n要获取`ImageView`对象的引用，我们使用`Activity`类中标准的`findViewById`方法。该方法允许我们通过传递元素的`id`，以编程方式引用在布局\
  \ XML（通过`setContentView`加载）中定义的元素。在上述示例中，`ImageView`对象在 XML 中定义如下：\n\n```xml\n<ImageView\
  \ android:id=\"@+id/ReturnedImageView\"\n    android:layout_width=\"wrap_content\"\
  \n    android:layout_height=\"wrap_content\"></ImageView>\n```\n\n为了引用`ImageView`并让它显示来自`Camera`的`Bitmap`，我们使用以下代码：\n\
  \n```java\nimv = (ImageView) findViewById(R.id.ReturnedImageView);\nimv.setImageBitmap(bmp);\n\
  ```\n\n运行此示例时，你可能会注意到生成的图像很小。（在我手机上，它宽 121 像素，高 162 像素。其他设备有不同的默认尺寸。）这并非 bug，而是设计如此。通过\
  \ Intent 触发的`Camera`应用不会将全尺寸图像返回给调用 Activity。通常，这样做会占用大量内存，而移动设备在这方面通常受限。相反，`Camera`应用会在返回的\
  \ Intent 中附带一张小尺寸的缩略图，如图 1–2 所示。\n\n**图 1–2.** *在 ImageView 中显示的 121x162 像素结果图像*\n\
  \n## 拍摄更大尺寸的图像\n\n为了克服尺寸限制，从 Android 1.5 开始，在大多数设备上，我们可以向启动`Camera`应用的 Intent 中添加一个附加数据。该附加数据的名称在`MediaStore`类中被定义为常量`EXTRA_OUTPUT`。该附加数据的值（附加数据采用键值对形式）会告知`Camera`应用，你希望将拍摄的图像保存到指定的\
  \ URI 路径。\n\n以下代码片段指示`Camera`应用将图像以`myfavoritepicture.jpg`的文件名保存到设备的 SD 卡上。\n\n\
  ```java\nString imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\n\
  \    + \"/myfavoritepicture.jpg\";\nFile imageFile = new File(imageFilePath);\n\
  Uri imageFileUri = Uri.fromFile(imageFile);\n\nIntent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
  i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\nstartActivityForResult(i,\
  \ CAMERA_RESULT);\n```\n\n\n\n"
- "# 第 1 章：Android 图像处理入门\n\n**注意：** 上述用于创建图像文件 URI 的代码片段可简化为以下形式：\n```\nimageFileUri\
  \ = Uri.parse(\"file:///sdcard/myfavoritepicture.jpg\");\n```\n不过，在实际操作中，使用示例所示的方法将更具设备无关性，并且当\
  \ SD 卡的命名约定或本地文件系统的 URI 语法发生变化时，也能更好地适应未来。\n\n## 显示大图\n\n加载和显示图像会显著影响内存使用。例如，HTC\
  \ G1 手机配备了一颗 320 万像素的摄像头。一颗 320 万像素的摄像头通常拍摄 2048 像素 × 1536 像素的图像。显示该尺寸的 32 位图像将占用超过\
  \ 100663 kb（约 13 MB）的内存。虽然这不一定能保证我们的应用会耗尽内存，但无疑会大大增加这种可能性。\n\nAndroid 为我们提供了一个名为\
  \ `BitmapFactory` 的工具类，它提供了一系列静态方法，允许从各种来源加载 `Bitmap` 图像。根据我们的需求，需要从文件中加载图像以显示在我们的原始\
  \ Activity 中。幸运的是，`BitmapFactory` 中可用的方法接受一个 `BitmapFactory.Options` 类，该类允许我们定义如何将\
  \ `Bitmap` 读入内存。具体来说，我们可以设置 `BitmapFactory` 在加载图像时应使用的采样大小。在 `BitmapFactory.Options`\
  \ 中指定 `inSampleSize` 参数，意味着加载后生成的 `Bitmap` 图像大小将是原图的几分之一。例如，像这里将 `inSampleSize`\
  \ 设置为 8，将生成一个大小为原图 1/8 的图像。\n\n```\nBitmapFactory.Options bmpFactoryOptions = new\
  \ BitmapFactory.Options();\nbmpFactoryOptions.inSampleSize = 8;\nBitmap bmp = BitmapFactory.decodeFile(imageFilePath,\
  \ bmpFactoryOptions);\nimv.setImageBitmap(bmp);\n```\n\n这是加载大图的一种快速方法，但并未真正考虑图像的原始尺寸或屏幕的尺寸。最好能将图像缩放到适合我们屏幕的大小。\n\
  \n接下来的代码片段说明了如何使用显示器的尺寸来确定加载图像时应发生的降采样量。当我们使用这些方法时，可以确保图像尽可能填满显示器的边界。但是，如果图像在任何一个维度上只打算显示\
  \ 100 像素，则应使用该值来代替显示的尺寸（我们按如下方式获取显示尺寸）。\n\n```\nDisplay currentDisplay = getWindowManager().getDefaultDisplay();\n\
  int dw = currentDisplay.getWidth();\nint dh = currentDisplay.getHeight();\n```\n\
  \n为了确定计算所需的图像整体尺寸，我们使用 `BitmapFactory` 和 `BitmapFactory.Options`，并将 `BitmapFactory.Options.inJustDecodeBounds`\
  \ 变量设置为 `true`。这会告诉 `BitmapFactory` 类只返回图像的边界，而不是尝试解码图像本身。使用此方法时，`BitmapFactory.Options.outHeight`\
  \ 和 `BitmapFactory.Options.outWidth` 变量将被赋值。\n\n```\n// 仅加载图像的尺寸，而非图像本身\nBitmapFactory.Options\
  \ bmpFactoryOptions = new BitmapFactory.Options();\nbmpFactoryOptions.inJustDecodeBounds\
  \ = true;\nBitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
  \nint heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\nint\
  \ widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\nLog.v(\"\
  HEIGHTRATIO\",\"\"+heightRatio);\nLog.v(\"WIDTHRATIO\",\"\"+widthRatio);\n```\n\n\
  将图像的尺寸除以显示器的尺寸，就能得到比率。然后，我们可以根据哪个比率更大，选择使用高度比率还是宽度比率。简单地使用该比率作为 `BitmapFactory.Options.inSampleSize`\
  \ 变量，将生成一个加载到内存中尺寸与我们所需尺寸接近的图像——在这种情况下，就是接近显示器本身的尺寸。\n\n```\n// 如果两个比率都大于 1，\n//\
  \ 则图像的一边大于屏幕\nif (heightRatio > 1 && widthRatio > 1)\n{\n    if (heightRatio > widthRatio)\n\
  \    {\n        // 高度比率更大，根据它进行缩放\n        bmpFactoryOptions.inSampleSize = heightRatio;\n\
  \    }\n    else\n    {\n        // 宽度比率更大，根据它进行缩放\n        bmpFactoryOptions.inSampleSize\
  \ = widthRatio;\n    }\n}\n// 实际解码\nbmpFactoryOptions.inJustDecodeBounds = false;\n\
  bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n```\n\n以下是一个完整示例的代码，该示例通过\
  \ Intent 使用内置相机并显示结果图片。图 1-3 显示了此示例生成的屏幕尺寸图像。\n\n```\npackage com.apress.proandroidmedia.ch1.sizedcameraintent;\n\
  \nimport java.io.File;\n\nimport android.app.Activity;\nimport android.content.Intent;\n\
  import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
  \ android.net.Uri;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
  import android.util.Log;\nimport android.view.Display;\nimport android.widget.ImageView;\n\
  \npublic class SizedCameraIntent extends Activity {\n\n    final static int CAMERA_RESULT\
  \ = 0;\n    ImageView imv;\n    String imageFilePath;\n\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        imageFilePath = Environment.getExternalStorageDirectory().getAbsolutePath()\
  \ +\n            \"/myfavoritepicture.jpg\";\n        File imageFile = new File(imageFilePath);\n\
  \        Uri imageFileUri = Uri.fromFile(imageFile);\n\n        Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\n\
  \        i.putExtra(android.provider.MediaStore.EXTRA_OUTPUT, imageFileUri);\n \
  \       startActivityForResult(i, CAMERA_RESULT);\n    }\n\n    protected void onActivityResult(int\
  \ requestCode, int resultCode, Intent intent) {\n        super.onActivityResult(requestCode,\
  \ resultCode, intent);\n        if (resultCode == RESULT_OK)\n        {\n      \
  \      // 获取 ImageView 的引用\n            imv = (ImageView) findViewById(R.id.ReturnedImageView);\n\
  \n            Display currentDisplay = getWindowManager().getDefaultDisplay();\n\
  \            int dw = currentDisplay.getWidth();\n            int dh = currentDisplay.getHeight();\n\
  \n            // 仅加载图像的尺寸，而非图像本身\n            BitmapFactory.Options bmpFactoryOptions\
  \ = new BitmapFactory.Options();\n            bmpFactoryOptions.inJustDecodeBounds\
  \ = true;\n            Bitmap bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
  \n            int heightRatio = (int)Math.ceil(bmpFactoryOptions.outHeight/(float)dh);\n\
  \            int widthRatio = (int)Math.ceil(bmpFactoryOptions.outWidth/(float)dw);\n\
  \n            Log.v(\"HEIGHTRATIO\",\"\"+heightRatio);\n            Log.v(\"WIDTHRATIO\"\
  ,\"\"+widthRatio);\n\n            // 如果两个比率都大于 1，\n            // 则图像的一边大于屏幕\n \
  \           if (heightRatio > 1 && widthRatio > 1)\n            {\n            \
  \    if (heightRatio > widthRatio)\n                {\n                    // 高度比率更大，根据它进行缩放\n\
  \                    bmpFactoryOptions.inSampleSize = heightRatio;\n           \
  \     }\n                else\n                {\n                    // 宽度比率更大，根据它进行缩放\n\
  \                    bmpFactoryOptions.inSampleSize = widthRatio;\n            \
  \    }\n            }\n\n            // 实际解码\n            bmpFactoryOptions.inJustDecodeBounds\
  \ = false;\n            bmp = BitmapFactory.decodeFile(imageFilePath, bmpFactoryOptions);\n\
  \n            // 显示它\n            imv.setImageBitmap(bmp);\n        }\n    }\n}\n\
  ```\n\n上述代码需要以下 `layout/main.xml` 文件：\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\" >\n\n    <ImageView \n        android:id=\"\
  @+id/ReturnedImageView\" \n        android:layout_width=\"wrap_content\"\n     \
  \   android:layout_height=\"wrap_content\" />\n\n</LinearLayout>\n```\n\n![](img/index-24_1.jpg)\n\
  \n\n\n"
- "# 第一章：Android 成像入门\n\n**图 1–3.** *最终在 `ImageView` 中显示的全屏图像*\n\n## 图像存储与元数据\n\n\
  Android 提供了一种在应用间共享数据的标准方式。负责此功能的类称为**内容提供器**。内容提供器为存储和检索各类数据提供了标准接口。\n\n图像（以及音频和视频）的标准内容提供器是\
  \ `MediaStore`。\n\n`MediaStore` 允许将文件设置在设备的标准位置，并具备存储和检索文件元数据的功能。元数据是关于数据的数据；它可以包含文件本身的数据信息，例如文件大小和名称，但\
  \ `MediaStore` 还允许设置多种附加数据，例如标题、描述、经纬度等。\n\n要开始使用 `MediaStore`，让我们修改 `SizedCameraIntent`\
  \ 活动，使其使用 `MediaStore` 进行图像存储和元数据关联，而不是将图像存储在 SD 卡的任意文件中。\n\n### 获取图像的 URI\n\n要获取图像存储的标准位置，首先需要获得对\
  \ `MediaStore` 的引用。为此，我们使用**内容解析器**。内容解析器是访问内容提供器（`MediaStore` 即为此类提供器）的途径。\n\n\
  通过传递特定的 URI，内容解析器即可知道将 `MediaStore` 作为内容提供器进行接口提供。由于我们要插入一张新图像，使用的是 `insert` 方法，而应使用的\
  \ URI 包含在 `android.provider.MediaStore.Images.Media` 类的一个常量中，名为 `EXTERNAL_CONTENT_URI`。这表示我们希望将图像存储在设备的主外部存储卷上，通常是\
  \ SD 卡。如果希望将其存储在设备的内部存储器中，可以使用 `INTERNAL_CONTENT_URI`。不过，通常对于图像、音频和视频等可能体积较大的媒体文件，建议使用\
  \ `EXTERNAL_CONTENT_URI`。\n\n前面所示的 `insert` 调用会返回一个 URI，我们可以用它将图像文件的二进制数据写入。在我们的案例中，与在\
  \ `CameraActivity` 中所做的一致，我们只需将其作为附加信息传递给触发相机应用的 Intent。\n\n```\nUri imageFileUri\
  \ = getContentResolver().insert(\n    Media.EXTERNAL_CONTENT_URI, new ContentValues());\n\
  Intent i = new Intent(android.provider.MediaStore.ACTION_IMAGE_CAPTURE);\ni.putExtra(android.provider.MediaStore.EXTRA_OUTPUT,\
  \ imageFileUri);\nstartActivityForResult(i, CAMERA_RESULT);\n```\n\n你会注意到我们还传递了一个新的\
  \ `ContentValues` 对象。`ContentValues` 对象是我们希望在创建记录时关联的元数据。在上述示例中，我们传递了一个空的 `ContentValues`\
  \ 对象。\n\n### 预填充关联元数据\n\n如果我们希望预填充元数据，可以使用 `put` 方法向其中添加一些数据。`ContentValues` 以键值对的形式接收数据。这些键名是标准的，并在\
  \ `android.provider.MediaStore.Images.Media` 类中定义为常量。（部分常量实际上位于 `Media` 类所实现的 `android.provider.MediaStore.MediaColumns`\
  \ 接口中。）\n\n```\n// 在 ContentValues 映射中保存图像的名称和描述。\nContentValues contentValues =\
  \ new ContentValues(3);\ncontentValues.put(Media.DISPLAY_NAME, \"这是一个测试标题\");\n\
  contentValues.put(Media.DESCRIPTION, \"这是一个测试描述\");\ncontentValues.put(Media.MIME_TYPE,\
  \ \"image/jpeg\");\n\n// 添加一条不包含位图但设置了部分值的新记录。\n// insert() 返回新记录的 URI。\nUri imageFileUri\
  \ = getContentResolver().insert(Media.EXTERNAL_CONTENT_URI,\n    contentValues);\n\
  ```\n\n同样，此调用返回的 URI 可以传递给相机应用（通过 Intent），以指定图像保存的位置。\n\n如果通过 `Log` 命令输出此 URI，它看起来会像这样：\n\
  \n```\ncontent://media/external/images/media/16\n```\n\n你可能首先注意到它看起来像常规 URL（例如在浏览器中使用的\
  \ URL）；但不同于以用于传输网页的 `http` 等协议开头，它是以 `content` 开头。在 Android 中，当 URI 以 `content`\
  \ 开头时，表示该 URI 用于内容提供器（如 `MediaStore`）。\n\n### 检索已保存的图像\n\n之前用于保存图像的同一 URI 也可以用作访问图像的途径。我们无需将文件的完整路径传递给\
  \ `BitmapFactory`，而是可以通过内容解析器为图像打开一个 `InputStream`，并将其传递给 `BitmapFactory`。\n\n```\n\
  Bitmap bmp = BitmapFactory.decodeStream(\n    getContentResolver().openInputStream(imageFileUri),\
  \ null, bmpFactoryOptions);\n```\n\n### 后续添加元数据\n\n如果我们希望在将图像捕获到 `MediaStore` 后关联更多元数据，可以使用内容解析器的\
  \ `update` 方法。这与之前使用的 `insert` 方法非常相似，只不过我们是直接通过图像的 URI 来访问图像文件。\n\n```\n// 更新记录的标题和描述\n\
  ContentValues contentValues = new ContentValues(3);\ncontentValues.put(Media.DISPLAY_NAME,\
  \ \"这是一个测试标题\");\ncontentValues.put(Media.DESCRIPTION, \"这是一个测试描述\");\ngetContentResolver().update(imageFileUri,contentValues,null,null);\n\
  ```\n\n### 更新我们的 `CameraActivity`，使用 `MediaStore` 进行图像存储并关联元数据\n\n以下是我们之前示例的更新版，它将图像保存到\
  \ `MediaStore` 中，并让我们有机会添加标题和描述。此外，此版本包含多个 UI 元素，其可见性会根据用户在应用中的进度进行管理。\n\n```\n\
  package com.apress.proandroidmedia.ch1.mediastorecameraintent;\n\nimport java.io.FileNotFoundException;\n\
  import android.app.Activity;\nimport android.content.Intent;\nimport android.graphics.Bitmap;\n\
