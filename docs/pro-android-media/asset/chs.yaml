  \n```\ne.printStackTrace();\n```\n\n## 第 12 章：使用 Web 服务消费和发布媒体\n\n如上所述，解析 JSON 数据的基础知识非常简单。现在，让我们来看一个实际示例，了解如何组合一个用于获取\
  \ JSON 数据的 HTTP 请求。\n\n### 使用 JSON 获取 Flickr 图片\n\nFlickr 是一个流行的在线照片和视频分享网站，它提供了一个功能非常完备的\
  \ Web 服务 API，并将 JSON 作为输出格式之一。\n\n与许多通过 Web 服务 API 提供功能的网站一样，Flickr 要求开发者注册并请求一个\
  \ API 密钥。API 密钥用于在 Flickr 系统中唯一标识应用程序，以便进行跟踪；如果应用程序造成问题，可以对其进行处理（例如禁用）。\n\n要向 Flickr\
  \ 请求 API 密钥，您必须登录并访问页面 [www.flickr.com/services/apps/create/apply/](http://www.flickr.com/services/apps/create/apply/?)。随后，系统会显示您的\
  \ API 密钥和一个额外的“Secret”字符串，某些功能（例如用户登录）需要用到该字符串。\n\n在下面的示例中，我们将使用 Flickr API 来搜索标记为“waterfront”的图片。为此，我们将使用\
  \ `flickr.photos.search` 方法。您可以在 [www.flickr.com/services/api/](http://www.flickr.com/services/api)\
  \ 在线查阅 Flickr API 中所有可用方法的文档。\n\n要调用此方法，我们只需构造一个 URL，并传入需要指定的参数。我们将指定 `flickr.photos.search`\
  \ 作为方法，`waterfront` 作为标签，`json` 作为格式，`5` 作为每页返回的图片数量（我们只查看一页，默认是第一页）。我们还需要传入 `nojsoncallback`\
