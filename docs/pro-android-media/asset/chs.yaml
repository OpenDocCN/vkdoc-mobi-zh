  \ 11 章：视频捕捉\n\n前面的示例展示了在 Android 中使用视频的许多方面是多么直接，尤其是当使用 Intent 进行视频捕获并依赖 `MediaStore`\
  \ 处理元数据时。\n\n需要注意的是，当更新 `MediaStore` 中的元数据时，视频文件本身的数据并不会被更新；相反，数据仅存储在与该视频相关的 `MediaStore`\
  \ 记录中。Android SDK 并未提供内置类来直接修改媒体文件的元数据。\n\n## 自定义视频捕捉\n\n对于图像和音频，有多种捕获方式。视频捕获也不例外；虽然我们没有像处理音频那样多的选项，但我们有能力使用\
  \ `MediaRecorder` 类创建一个自定义视频捕获示例。\n\n在许多方面，构建自定义视频捕获应用程序类似于构建自定义相机应用程序与自定义音频录制应用程序的结合。我们必须创建一个\
  \ `SurfaceView`，用于相机绘制预览或取景器图像，就像我们在第 2 章的自定义相机示例中所做的那样，同时我们将使用 `MediaRecorder`\
  \ 进行实际录制，就像我们在第 7 章音频捕获中所做的那样。\n\n### 用于视频的 MediaRecorder\n\n要使用 `MediaRecorder`\
  \ 进行视频捕获，我们必须遵循音频捕获的所有步骤，并加上一些视频特有的步骤。此外，`MediaRecorder` 是一个状态机，因此我们必须遵循特定的步骤顺序，从实例化到录制。\n\
  \n首先，我们实例化它，然后按顺序执行这些步骤。\n\n```java\nMediaRecorder recorder = new MediaRecorder();\n\
  ```\n\n#### 音频和视频源\n\n实例化之后，我们可以设置音频和视频源。要设置音频源，我们使用 `setAudioSource` 方法，传入一个代表我们想要使用的源的常量。\n\
  \n```java\nrecorder.setAudioSource(MediaRecorder.AudioSource.DEFAULT);\n```\n\n\
  可能的音频源值是在 `MediaRecorder.AudioSource` 类中定义的常量：\n\n- `CAMCORDER`：如果设备为不同的摄像头（前置、后置）配备了不同的麦克风，使用此值将指定使用合适的麦克风（Android\
  \ 2.1/API 级别 7 或更高）。\n\n\n\n## 第十一章：视频捕获\n\n- `DEFAULT`：指定使用设备上的默认麦克风。\n- `MIC`：指定使用专为视频录制设计的普通麦克风。\n\
  - `VOICE_CALL`：指定音频应来源于正在进行的通话。目前，大多数手机（甚至全部）均不支持此选项。\n- `VOICE_DOWNLINK`：指定音频应来源于通话，具体是传入的音频（对方的语音）。目前，大多数手机（甚至全部）均不支持此选项。\n\
  - `VOICE_UPLINK`：指定音频应来源于通话，具体是传出的音频（手机发送的语音）。目前，大多数手机（甚至全部）均不支持此选项。\n- `VOICE_RECOGNITION`：指定音频应来源于为手机语音识别功能设置的麦克风。如果未指定此类麦克风，则将使用`DEFAULT`麦克风。\n\
  \n可能的视频源值定义在`MediaRecorder.VideoSource`类中，该类仅包含两个常量：\n\n- `CAMERA`\n- `DEFAULT`\n\
  \n两者表示相同含义，即应使用设备的主摄像头进行视频录制。\n\n要设置视频源，我们使用`setVideoSource`方法：\n\n```java\nrecorder.setVideoSource(MediaRecorder.VideoSource.DEFAULT);\n\
  ```\n\n**注意：** 按理说，在`MediaRecorder`的`setVideoSource`方法中使用`MediaRecorder.VideoSource.DEFAULT`，或在`MediaRecorder`的`setAudioSource`方法中使用`MediaRecorder.AudioSource.DEFAULT`，与不调用这些方法的结果相同。毕竟它们都是*默认*值。然而事实恰恰相反，必须调用每个方法才能捕获相应数据。换句话说，如果未设置音频源，则不会录制音频；如果未设置视频源，则不会录制视频。\n\
  \n### 输出格式\n\n设置音频和视频源之后，我们可以使用`MediaRecorder`的`setOutputFormat`方法设置输出格式，并传入要使用的格式。\n\
  \n```java\nrecorder.setOutputFormat(MediaRecorder.OutputFormat.DEFAULT);\n```\n\n\
  可能的格式作为常量列在`MediaRecorder.OutputFormat`类中。\n\n- `DEFAULT`：指定使用默认输出格式。该格式*可能*因设备而异。在运行\
  \ Android 2.2 的 Nexus 1 上，默认格式为 MPEG-4，与使用`MPEG_4`常量时的格式相同。\n- `MPEG_4`：指定将音频和视频捕获为\
  \ MPEG-4 文件格式。该文件扩展名为`.mp4`。MPEG-4 文件通常包含 H.264、H.263 或 MPEG-4 Part 2 编码的视频，以及 AAC\
  \ 或 MP3 编码的音频（也可能使用其他编解码器）。MPEG-4 文件广泛用于 Flash、iPod 以及许多其他在线视频技术和消费电子设备中。\n- `RAW_AMR`：此设置仅用于音频录制，不适用于视频。\n\
  - `THREE_GPP`：指定将音频和视频捕获为 3GP 文件格式。该文件扩展名为`.3gp`。3GPP 文件通常包含 H.264、MPEG-4 Part 2\
  \ 或 H.263 编解码器编码的视频，以及 AMR 或 AAC 编解码器编码的音频。\n\n### 音频与视频编码器\n\n设置输出格式后，我们应指定要使用的音频和视频编码器。使用`MediaRecorder`的`setVideoEncoder`方法，我们可以指定要使用的视频编解码器：\n\
  \n```java\nrecorder.setVideoEncoder(MediaRecorder.VideoEncoder.DEFAULT);\n```\n\n\
  可传入`setVideoEncoder`的常量值定义在`MediaRecorder.VideoEncoder`中：\n\n- `DEFAULT`：这是一个设备相关的设置，指定使用设备默认的编解码器。在许多情况下，该编解码器为\
  \ H.263，因为它是 Android 唯一要求支持的编解码器。\n- `H263`：指定使用 H.263 编解码器。H.263 于 1995 年发布，专为低比特率视频传输而开发，是\
  \ Flash 和 RealPlayer 等许多早期互联网视频技术的基础。Android 要求支持该编解码器进行编码，因此可以确保其可用。\n- `H264`：指定使用\
  \ H.264 编解码器（也称为 MPEG-4 Part 10 或 AVC，Advanced Video Coding）。H.264 是一种先进的编解码器，广泛应用于从蓝光到\
  \ Flash 的各类技术中，于 2003 年发布。大多数 Android 设备支持该编解码器用于视频播放。支持将其用于视频编码的设备则较少。\n\n\n\n\
  ## 第 11 章：视频捕获\n\n`MPEG_4_SP`：这指定所使用的编解码器将是 MPEG-4 SP（简单画质）编解码器。MPEG-4 SP 在技术上是\
  \ MPEG-4 第 2 部分简单画质。它于 1999 年发布，是为需要低比特率视频且无需大量处理器功耗的技术而开发的。\n\n使用 `MediaRecorder`\
  \ 的 `setAudioEncoder` 方法，我们可以指定将使用的音频编解码器。\n\n```\nrecorder.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);\n\
  ```\n\n可以传递给 `setAudioEncoder` 的可能值在 `MediaRecorder.AudioEncoder` 中被定义为常量。\n\n`MediaRecorder.AudioEncoder`\
  \ 仅包含两个常量：\n\n`AMR_NB`：这指定将用于音频编码的编解码器是 AMR-NB，即自适应多速率窄带（Adaptive Multi-Rate Narrow\
  \ Band）。AMR-NB 是一种针对语音调校的编解码器，广泛应用于手机中。\n\n`DEFAULT`：由于 AMR-NB 是仅有的另一个选择，`DEFAULT`\
  \ 常量指定 AMR-NB 将是所使用的音频编解码器。\n\n### 音视频比特率\n\n视频编码比特率可以通过在 `MediaRecorder` 上调用 `setVideoEncodingBitRate`\
  \ 方法并传入以比特每秒为单位的请求比特率来设置。视频的低比特率设置范围约为每秒 256,000 比特（256 kbps），而高比特率范围约为每秒 3,000,000\
  \ 比特（3 mbps）。\n\n```\nrecorder.setVideoEncodingBitRate(150000);\n```\n\n我们也可以指定希望用于编码音频数据的最大比特率。通过将以比特每秒为单位的数值传入\
  \ `MediaRecorder` 的 `setAudioEncodingBitRate` 方法来实现。作为参考，每秒 8,000 比特（8 kbps）是非常低的比特率，适用于需要通过慢速网络实时传输的音频；而对于\
  \ MP3 文件中的音乐，每秒 196,000 比特（196 kbps）及更高的速率并不罕见。目前大多数安卓设备仅支持较低端的比特率，如果你选择了一个过高的比特率，`MediaRecorder`\
  \ 将自动在其可支持的范围内选择一个比特率。\n\n```\nrecorder.setAudioEncodingBitRate(8000);\n```\n\n\
  ### 音频采样率\n\n与比特率一样，音频采样率对于决定捕获和编码的音频质量至关重要。`MediaPlayer` 有一个 `setAudioSampleRate`\
  \ 方法，允许我们请求特定的采样率。传入的采样率以 Hz（赫兹）为单位，表示每秒的样本数。采样率越高，捕获文件中能表示的音频频率范围就越大。较低的采样率（如 8,000\
  \ Hz）适合捕获低质量语音，而较高的采样率（如 48,000 Hz）则用于 DVD 和许多其他高质量视频格式。大多数安卓设备仅支持较低的采样率范围（8,000\
  \ Hz）。\n\n```\nrecorder.setAudioSamplingRate(8000);\n```\n\n### 音频声道数\n\n可以通过使用\
  \ `setAudioChannels` 方法并传入声道数来指定要捕获的音频声道数量。在大多数安卓设备上，输入音频目前主要限于单声道麦克风，因此使用超过一个声道并无益处。通常，声道数的选择在用于单声道的单声道和用于立体声的双声道之间。\n\
  \n```\nrecorder.setAudioChannels(1);\n```\n\n### 视频帧率\n\n每秒捕获的视频帧数可以通过使用 `setVideoFrameRate`\
  \ 方法并传入请求的帧率来控制。每秒 12 到 15 帧的值通常足以表现运动。较高标准则是电视采用的每秒 30 帧（实际为 29.97）。实际使用的帧率会根据设备的性能而变化。\n\
  \n```\nrecorder.setVideoFrameRate(15);\n```\n\n### 视频尺寸\n\n捕获视频的宽度和高度可以通过 `setVideoSize`\
  \ 方法并传入以像素为单位的宽度和高度整数来控制。标准尺寸范围从 176x144 到 640x480，许多设备甚至支持更高分辨率。\n\n**注意：** 许多安卓设备也支持\
  \ 720x480，但应注意，这与 DV 摄像机捕获的像素宽高比不同，后者捕获的是 *矩形* 像素的 720x480 视频。在安卓设备上，像素通常是 *方形*\
  \ 的，因此如果来自安卓设备的 720x480 视频被导入到视频编辑软件中，该软件可能因其分辨率而对视频做出错误假设，导致输出变形。要纠正这一点，需要告知软件像素宽高比是方形或\
  \ 1.0。\n\n```\nrecorder.setVideoSize(640,480);\n```\n\n\n\n### 最大文件大小\n\n通过向`setMaxFileSize`方法传入以字节为单位的最大值，可以指定`MediaRecorder`捕获文件的最大大小。\n\
  \n```\nrecorder.setMaxFileSize(10000000); // 10 兆字节\n```\n\n要确定何时达到最大文件大小，我们需要在活动（Activity）中实现`MediaRecorder.OnInfoListener`接口并将其注册到`MediaRecorder`。之后，`onInfo`方法将被调用，并且可以将`what`参数与`MediaRecorder.MEDIA_RECORDER_INFO_FILESIZE_REACHED`常量进行比较。如果它们匹配，则表示达到了最大文件大小。\n\
  \n根据文档，当达到最大文件大小时，`MediaRecorder`应该停止录制，但似乎在 Android 2.2.1 上，它并不会可靠地停止。遗憾的是，我们没有办法检查它是否已经停止。为了真正停止录制，我们必须显式调用`stop`方法。\n\
  \n下面是一个非常简略的示例代码来说明这一点。\n\n```\npublic class VideoCapture extends Activity implements\
  \ MediaRecorder.OnInfoListener {\n\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        recorder.setOnInfoListener(this);\n    }\n\n    public void onInfo(MediaRecorder\
  \ mr, int what, int extra) {\n        if (what == MediaRecorder.MEDIA_RECORDER_INFO_MAX_FILESIZE_REACHED)\
  \ {\n            Log.v(\"VIDEOCAPTURE\",\"Maximum Filesize Reached\");\n       \
  \ }\n    }\n}\n```\n\n### 最大时长\n\n通过向`setMaxDuration`方法传入以毫秒为单位的最大时长，可以设置`MediaRecorder`捕获文件的最大时长。\n\
  \n```\nrecorder.setMaxDuration(10000); // 10 秒\n```\n\n要确定何时达到最大时长，我们需要实现`MediaRecorder.OnInfoListener`接口并将其注册到`MediaRecorder`。然后，当达到最大时长时，我们的`onInfo`方法将被触发，其中`what`整数被设置为`MediaRecorder.MEDIA_RECORDER_INFO_MAX_DURATION_REACHED`常量。\n\
  \n根据文档，当达到最大时长时，`MediaRecorder`应该停止录制，但似乎它在 Android 2.2.1 上并不能可靠地停止。遗憾的是，我们也没有办法检查它是否已经停止。为了真正停止录制，我们必须显式调用`stop`方法。\n\
  \n下面是一个简略的示例说明。\n\n```\npublic class VideoCapture extends Activity implements MediaRecorder.OnInfoListener\
  \ {\n\n    public void onCreate(Bundle savedInstanceState) {\n        recorder.setOnInfoListener(this);\n\
  \    }\n\n    public void onInfo(MediaRecorder mr, int what, int extra) {\n    \
  \    if (what == MediaRecorder.MEDIA_RECORDER_INFO_MAX_DURATION_REACHED) {\n   \
  \         Log.v(\"VIDEOCAPTURE\",\"Maximum Duration Reached\");\n            mr.stop();\n\
  \        }\n    }\n}\n```\n\n### 配置文件\n\n从 Android 2.2（API 级别 8）开始，`MediaRecorder`\
  \ 有一个名为 `setProfile` 的方法，它接收一个 `CamcorderProfile` 实例。`CamcorderProfile` 有一个静态方法\
  \ `CamcorderProfile.get`，它接收一个整数，该整数的可能值被定义为常量，即 `CamcorderProfile.QUALITY_HIGH`\
  \ 或 `CamcorderProfile.QUALITY_LOW`。使用此方法，我们可以根据预设值设置一整组配置变量。当然，`QUALITY_HIGH` 指的是高质量视频捕获的设置，而\
  \ `QUALITY_LOW` 指的是低质量视频捕获的设置。\n\n`QUALITY_HIGH` 具有以下设置：\n\n- **音频比特率**：每秒 12,200\
  \ 比特\n- 音频通道数：1\n- 音频编解码器：AMR-NB\n- 音频采样率：8000 Hz\n- **时长**：60 秒\n- 文件格式：MP4\n-\
  \ **视频比特率**：每秒 3,000,000 比特\n- 视频编解码器：H.264\n- 视频帧宽度：720 像素\n- 视频帧高度：480 像素\n- **视频帧率**：每秒\
  \ 24 帧\n\n请注意，如前所述，许多设置是最大值或请求值，实际结果将取决于设备的性能。例如，在运行 Android 2.2.1 的 Nexus 1 上使用\
  \ `QUALITY_HIGH` 设置捕获的示例视频，其帧率为每秒 12.6 帧，总比特率为 1,617.34 kb/秒。\n\n以下是 `QUALITY_LOW`\
  \ 的设置：\n\n- **音频比特率**：每秒 12,200 比特\n- 音频通道数：1\n- 音频编解码器：AMR-NB\n- 音频采样率：8000 Hz\n\
  - **时长**：30 秒\n- 文件格式：3GPP\n- **视频比特率**：每秒 256,000 比特\n- 视频编解码器：3\n- 视频帧宽度：176 像素\n\
  - 视频帧高度：144 像素\n- **视频帧率**：每秒 15 帧\n\n与 `QUALITY_HIGH` 版本一样，这些设置也会产生略有不同的结果。最终捕获的视频帧率为每秒\
  \ 16.06 帧，比特率为 207.96 kb/秒。\n\n### 输出文件\n\n完成上述所有设置后，我们可以设置输出文件的位置。我们可以传入一个 `FileDescriptor`\
  \ 或一个表示文件路径的 `String`。\n\n```\nrecorder.setOutputFile(\"/sdcard/recorded_video.mp4\"\
  );\n```\n\n### 预览表面\n\n在我们继续之前，我们需要为 `MediaRecorder` 预览（取景器）图像绘制指定一个 `Surface`。我们将以一种类似于第\
  \ 2 章中自定义相机示例中处理预览图像的方式来处理这个问题。\n\n让我们看一个简略的示例。首先，我们将在布局中创建一个 `Surface`。\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\"\n>\n    <SurfaceView android:id=\"@+id/CameraView\"\
  \ android:layout_width=\"640px\"\n        android:layout_height=\"480px\"></SurfaceView>\n\
  </LinearLayout>\n```\n\n在我们的活动（Activity）中，我们需要实现 `SurfaceHolder.Callback` 接口，以便在\
  \ `Surface` 被创建、更改或销毁时得到通知。\n\n```\n...\n\npublic class VideoCapture extends Activity\
  \ implements SurfaceHolder.Callback{\n    MediaRecorder recorder;\n    SurfaceHolder\
  \ holder;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        recorder = new MediaRecorder();\n\
  \n        // 在代码的此点，我们将执行 MediaRecorder 对象的所有常规设置，\n        // 例如设置音频和视频源、输出文件位置等。\n\
  \        // 我们在此省略这些部分，仅为了说明如何在此代码片段中处理 Surface。\n\n        setContentView(R.layout.main);\n\
  \n        // 设置内容视图后，我们可以获取对 SurfaceView 的引用，\n        // 并获取对其 SurfaceHolder 的引用。\n\
  \        SurfaceView cameraView = (SurfaceView)\n            findViewById(R.id.CameraView);\n\
  \        holder = cameraView.getHolder();\n\n        // 我们将添加我们的活动作为其 SurfaceHolder.Callback\
  \ 的实现者。\n        holder.addCallback(this);\n\n        // 与第 2 章中的相机示例一样，预览 Surface\
  \ 的缓冲区将由\n        // 底层的 MediaRecorder 所使用的 Camera 对象在外部管理；\n        // 因此我们需要将类型设置为\
  \ SURFACE_TYPE_PUSH_BUFFERS。\n        holder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  \    }\n\n    // 因为我们的活动已经实现了 SurfaceHolder.Callback 并被注册为该接口，\n    // 所以当 Surface\
  \ 实际创建时，我们的 surfaceCreated 方法将被调用。\n    // 当此情况发生时，我们可以使用 setPreviewDisplay 方法将\
  \ Surface\n    // 设置为 MediaRecorder 对象的预览显示。在 Surface 创建之前，\n    // 我们不能执行此操作。\n\
  \    public void surfaceCreated(SurfaceHolder holder) {\n        recorder.setPreviewDisplay(holder.getSurface());\n\
  \    }\n\n    // 由于我们实现了 SurfaceHolder.Callback，因此还必须拥有\n    // surfaceChanged 和\
  \ surfaceDestroyed 方法，它们的名称对应了\n    // 各自的调用时机：\n    // surfaceChanged 在 Surface\
  \ 发生更改时调用，例如其高度和宽度被改变时；\n    // surfaceDestroyed 在 Surface 不再使用时调用，例如当活动不再可见时。\n\
  \    //\n    // 当 surfaceDestroyed 被调用时，我们应该停止录制视频，因为录制\n    // 只有在有 Surface 可供绘制预览图像时才能工作。\n\
  \    public void surfaceChanged(SurfaceHolder holder, int format, int width,\n \
  \                              int height) {\n    }\n\n    public void surfaceDestroyed(SurfaceHolder\
  \ holder) {\n        recorder.stop();\n    }\n}\n```\n\n\n\n### 准备录制\n\n在设置好所有 `MediaRecorder`\
  \ 的属性后，我们就可以使用 `prepare` 方法了。这个方法是必需的，它会执行所有内部功能，让 `MediaRecorder` 进入录制准备状态。\n\n\
  ```\nrecorder.prepare();\n```\n\n### 开始录制\n\n当 `MediaRecorder` 完成\"准备\"后，就可以开始录制了。`start`\
  \ 方法正是用来开始录制的。\n\n```\nrecorder.start();\n```\n\n### 停止录制\n\n录制开始后，可以使用 `stop` 方法来停止录制。\n\
  \n```\nrecorder.stop();\n```\n\n### 释放资源\n\n最后，当我们不再需要使用 `MediaRecorder` 时，应该调用\
  \ `release` 方法来释放其占用的资源。这一点很重要，因为许多底层资源（如硬件摄像头和麦克风）同一时间只能被一个应用程序使用。\n\n```\nrecorder.release();\n\
  ```\n\n### 状态机\n\n就像刚才描述的那样，与 `MediaPlayer` 对象一样，`MediaRecorder` 具有多种状态，并且某些方法只能在特定状态下调用。图\
  \ 11-1 展示了可能的状态以及调用特定方法后进入的状态（此处为方便参考再次引用）。\n\n**图 11-1.** *Android API 参考文档中的 MediaRecorder\
  \ 状态图*\n\n### 权限\n\n使用 `MediaRecorder` 进行音频和视频捕捉，并将文件保存到 SD 卡上，需要在 `AndroidManifest.xml`\
  \ 文件中设置以下权限。\n\n```\n<uses-permission android:name=\"android.permission.RECORD_AUDIO\"\
  ></uses-permission>\n<uses-permission android:name=\"android.permission.CAMERA\"\
  ></uses-permission>\n<uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"\
  >\n</uses-permission>\n```\n\n## 完整的自定义视频捕捉示例\n\n以下是一个将上述所有步骤整合在一起的完整示例。它使用了 `CamcorderProfile`，因此需要\
  \ Android 2.2 或更高版本。\n\n```\npackage com.apress.proandroidmedia.ch11.videocapture;\n\
  \nimport java.io.IOException;\nimport android.app.Activity;\nimport android.content.pm.ActivityInfo;\n\
  import android.media.CamcorderProfile;\nimport android.media.MediaRecorder;\nimport\
  \ android.os.Bundle;\nimport android.util.Log;\nimport android.view.SurfaceHolder;\n\
  import android.view.SurfaceView;\nimport android.view.View;\nimport android.view.Window;\n\
  import android.view.WindowManager;\nimport android.view.View.OnClickListener;\n\
  ```\n\n在这个示例中，我们的 Activity 将实现 `OnClickListener`（以便用户可以点击开始和停止录制）和 `SurfaceHolder.Callback`（用于处理与\
  \ Surface 相关的事件）。\n\n```\npublic class VideoCapture extends Activity implements\
  \ OnClickListener,\n    SurfaceHolder.Callback {\n\n    MediaRecorder recorder;\n\
  \    SurfaceHolder holder;\n```\n\n这里有一个布尔值，表示我们当前是否正在录制。当未录制时为 `false`，录制时为 `true`。\n\
  \n```\n    boolean recording = false;\n    public static final String TAG = \"VIDEOCAPTURE\"\
  ;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n    \
  \    super.onCreate(savedInstanceState);\n```\n\n该 Activity 将全屏并以横屏模式运行，我们将通过以下方法进行设置。\n\
  \n```\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  \                WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n\
  ```\n\n接下来，实例化我们的 `MediaRecorder` 对象。\n\n```\n        recorder = new MediaRecorder();\n\
  ```\n\n稍后定义的 `initRecorder` 方法将处理所有 `MediaRecorder` 的设置。\n\n```\n        initRecorder();\n\
  \        setContentView(R.layout.main);\n```\n\n继续往下，我们将获取 `SurfaceView` 和 `SurfaceHolder`\
  \ 的引用，并将我们的 Activity 注册为 `SurfaceHolder.Callback`。\n\n```\n        SurfaceView cameraView\
  \ = (SurfaceView) findViewById(R.id.CameraView);\n        holder = cameraView.getHolder();\n\
  \        holder.addCallback(this);\n        holder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  ```\n\n我们将 `SurfaceView` 设置为可点击，并将我们的 Activity 注册为其 `OnClickListener`。这样，当触摸 `SurfaceView`\
  \ 时，就会调用我们的 `onClick` 方法。\n\n```\n        cameraView.setClickable(true);\n     \
  \   cameraView.setOnClickListener(this);\n    }\n```\n\n这里定义的 `initRecorder` 方法负责处理所有\
  \ `MediaRecorder` 的设置。\n\n```\n    private void initRecorder() {\n```\n\n我们将使用默认的音频和视频源。\n\
  \n```\n        recorder.setAudioSource(MediaRecorder.AudioSource.DEFAULT);\n   \
  \     recorder.setVideoSource(MediaRecorder.VideoSource.DEFAULT);\n```\n\n为了简化操作，我们不逐一设置所有参数，而是使用内置的\
  \ `CamcorderProfile`——在本例中，使用由 `QUALITY_HIGH` 常量指定的配置。\n\n```\n        CamcorderProfile\
  \ cpHigh = CamcorderProfile.get(CamcorderProfile.QUALITY_HIGH);\n        recorder.setProfile(cpHigh);\n\
  ```\n\n我们指定录制文件的保存路径。在本例中，是直接保存在 SD 卡上的文件。\n\n```\n        recorder.setOutputFile(\"\
  /sdcard/videocapture_example.mp4\");\n```\n\n然后指定最大录制时长（以毫秒为单位）。\n\n```\n      \
  \  recorder.setMaxDuration(50000); // 50 秒\n```\n\n最后指定最大文件大小（以字节为单位）。\n\n```\n\
  \        recorder.setMaxFileSize(5000000); // 大约 5 MB\n    }\n```\n\n以下 `prepareRecorder`\
  \ 方法的作用是将 `setPreviewDisplay` 方法与其他 `MediaRecorder` 方法区分开来。这样做是因为此步骤需要在 Surface\
  \ 创建之后执行，而其他步骤可以在 `MediaRecorder` 实例化之后或停止录制之后的任何时间执行。\n\n```\n    private void\
  \ prepareRecorder() {\n        recorder.setPreviewDisplay(holder.getSurface());\n\
  ```\n\n设置预览显示后，我们可以调用 `MediaRecorder` 对象的 `prepare` 方法。这一步让一切就绪以便开始捕捉。由于此方法会抛出一些异常，我们需要将其包裹在\
