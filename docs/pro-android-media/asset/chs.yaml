  \ MediaPlayer 活动播放来自 YouTube 的视频文件](img/index-242_1.jpg)\n\n## 总结\n\n在本章中，我们探讨了\
  \ Android 上一些更进阶的视频播放和流媒体功能。正如我们所学到的，`MediaStore` 可以像之前用于图片和音频那样用于视频。它为我们开发者提供了一种真正全面的手段，用于在\
  \ Android 上进行媒体元数据的存储和检索。我们还了解到，媒体视频播放的三种方法也可用于实现网络视频播放，包括流媒体和基于网络的播放。\n\n\n\n###\
  \ 视频捕获\n\n在前几章中，我们已经讨论了图像捕获和音频捕获。现在，我们将把注意力转向视频捕获。在本章中，我们将探讨如何通过 Intent 使用 Android\
  \ 内置的相机应用来捕获视频。我们将了解 Android 支持的视频捕获格式和编解码器，最后还会构建一个自定义的视频捕获应用。\n\n## 使用 Intent\
  \ 录制视频\n\n虽然有些老生常谈，但正如之前讨论的那样，在 Android 上执行某些功能最快捷、最简单的方法通常是利用已有的应用，通过从我们的应用发送 Intent\
  \ 来触发它。使用内置相机应用通过 Intent 触发来录制视频，也不例外。\n\n在 `android.provider.MediaStore` 类中，有一个名为\
  \ `ACTION_VIDEO_CAPTURE` 的常量，它包含字符串 `\"android.media.action.VIDEO_CAPTURE\"`。相机应用将此字符串注册为\
  \ Intent 过滤器，因此通过 `Content.startActivity` 或 `Context.startActivityForResult` 方法发送的\
  \ Intent 将激活它。其他应用也可能注册相同的字符串，这会导致提示用户选择他/她想要用来执行该操作的应用。\n\n```\nIntent captureVideoIntent\
  \ = new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\nstartActivityForResult(captureVideoIntent,\
  \ VIDEO_CAPTURED);\n```\n\n`VIDEO_CAPTURED` 是一个应定义为类变量的常量，用于识别相机应用何时通过调用我们的 `onActivityResult`\
  \ 方法将结果返回到我们的 Activity：\n\n```\npublic static int VIDEO_CAPTURED = 1;\n```\n\n在\
  \ `onActivityResult` 方法中返回给我们的 Activity 的 Intent（以下代码示例中的 `data`）包含一个指向相机应用创建的视频文件的\
  \ `Uri`。\n\n```\nprotected void onActivityResult (int requestCode, int resultCode,\
  \ Intent data) {\n  if (resultCode == RESULT_OK && requestCode == VIDEO_CAPTURED)\
  \ {\n    Uri videoFileUri = data.getData();\n  }\n}\n```\n\n以下是使用 Intent 触发内置相机应用进行视频捕获的完整示例。\n\
  \n```\npackage com.apress.proandroidmedia.ch11.videocaptureintent;\n\nimport android.app.Activity;\n\
  import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
  import android.widget.VideoView;\n\npublic class VideoCaptureIntent extends Activity\
  \ implements OnClickListener {\n```\n\n创建 `VIDEO_CAPTURED` 常量，用于标识通过调用 `onActivityResult`\
  \ 返回的 Activity。\n\n```\n  public static int VIDEO_CAPTURED = 1;\n```\n\n我们将使用两个按钮：一个用于触发发送\
  \ Intent，`captureVideoButton`；另一个用于在视频捕获后播放它，`playVideoButton`。\n\n```\n  Button\
  \ captureVideoButton;\n  Button playVideoButton;\n```\n\n我们将使用一个带有 `Uri` 的标准 `VideoView`\
  \ 对象来回放已捕获的视频。\n\n```\n  VideoView videoView;\n  Uri videoFileUri;\n\n  @Override\n\
  \  public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
  \    setContentView(R.layout.main);\n\n    captureVideoButton = (Button) this.findViewById(R.id.CaptureVideoButton);\n\
  \    playVideoButton = (Button) this.findViewById(R.id.PlayVideoButton);\n\n   \
  \ captureVideoButton.setOnClickListener(this);\n    playVideoButton.setOnClickListener(this);\n\
  ```\n\n`playVideoButton` 最初将不可用，这意味着它不能被点击。我们将在捕获视频后将其设置为可用。\n\n```\n    playVideoButton.setEnabled(false);\n\
  \n    videoView = (VideoView) this.findViewById(R.id.VideoView);\n  }\n```\n\n我们的\
  \ Activity 实现了 `OnClickListener`，并注册为每个 `Button` 的 `OnClickListener`。因此，当按下或点击按钮时，将调用我们的\
  \ `onClick` 方法。\n\n```\n  public void onClick(View v) {\n    if (v == captureVideoButton)\
  \ {\n```\n\n如果按下了 `captureVideoButton`，我们将创建 Intent 并将其连同我们的 `VIDEO_CAPTURED` 常量一起传递给\
  \ `startActivityForResult` 方法，该方法将启动内置的相机应用。\n\n```\n      Intent captureVideoIntent\
  \ = new Intent(android.provider.MediaStore.ACTION_VIDEO_CAPTURE);\n      startActivityForResult(captureVideoIntent,\
  \ VIDEO_CAPTURED);\n    } else if (v == playVideoButton) {\n```\n\n如果按下了 `playVideoButton`，我们将设置要播放的\
  \ `Uri` 并开始播放。\n\n```\n      videoView.setVideoURI(videoFileUri);\n      videoView.start();\n\
  \    }\n  }\n```\n\n当相机（或任何触发的应用/Activity）返回时，将调用以下 `onActivityResult` 方法。我们检查 `resultCode`\
  \ 是否为常量 `RESULT_OK`，并且 `requestCode` 是否为我们传递给 `startActivityForResult` 的 `VIDEO_CAPTURED`，然后获取录制视频文件的\
  \ `Uri`。之后，我们将启用 `playVideoButton`，以便用户可以按下它并触发视频播放。\n\n```\n  protected void onActivityResult\
  \ (int requestCode, int resultCode, Intent data) {\n    if (resultCode == RESULT_OK\
  \ && requestCode == VIDEO_CAPTURED) {\n      videoFileUri = data.getData();\n  \
  \    playVideoButton.setEnabled(true);\n    }\n  }\n}\n```\n\n以下是前述 Activity 引用的\
  \ `res/layout/main.xml` 中包含的布局 XML。\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n\
  \    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\n\
  \    android:layout_height=\"fill_parent\"\n>\n    <Button android:text=\"Capture\
