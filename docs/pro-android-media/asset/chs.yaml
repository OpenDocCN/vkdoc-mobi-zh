  wrap_content\" \n        android:id=\"@+id/FinishButton\" android:text=\"完成\" />\n\
  </LinearLayout>\n```\n\n如我们所见，使用`AsyncTask`定期执行某些操作是一种很好的方式，可以在其他进程进行时向用户自动更新信息。这为我们的`MediaRecorder`示例提供了更好的用户体验。使用`getMaxAmplitude`方法可以为用户提供有关当前录音的反馈。\n\
  \n在 Android 2.2（Froyo）中，提供了以下方法：\n\n- `setAudioChannels`：允许我们指定要录制的音频通道数。通常这将是单声道或双声道。此方法必须在`prepare`方法之前调用。\n\
  - `setAudioEncodingBitRate`：允许我们指定编码器在压缩音频时每秒使用的位数。此方法必须在`prepare`方法之前调用。\n- `setAudioSamplingRate`：允许我们指定音频在捕获和编码时的采样率。适用的速率取决于所使用的硬件和编解码器。此方法必须在`prepare`方法之前调用。\n\
  \n## 将音频插入 MediaStore\n\n音频录制可以放入`MediaStore`内容提供程序中，以便其他应用程序可以使用。这个过程与我们之前将图像添加到`MediaStore`的过程非常相似。但在这种情况下，我们将在创建后添加它们。\n\
  \n我们创建一个`ContentValues`对象来保存要插入到`MediaStore`中的数据。`ContentValues`对象由一系列键/值对组成。可以使用的键在`MediaStore.Audio.Media`类（及其继承的类）中定义为常量。\n\
  \n`MediaStore.Audio.Media.DATA`常量是录制文件路径的键。这是将文件插入`MediaStore`所需的唯一键值对。\n\n要在`MediaStore`中实际执行插入操作，我们使用`ContentResolver`对象的`insert`方法，传入指向\
  \ SD 卡上音频文件表的`Uri`以及包含数据的`ContentValues`对象。该`Uri`在`MediaStore.Audio.Media`中定义为常量，名为`EXTERNAL_CONTENT_URI`。\n\
  \n以下是一个可以插入到`CustomRecorder`示例中、位于`MediaRecorder`上调用`release`方法（`recorder.release()`）之后的代码片段。它将把录音插入到`MediaStore`中，并使其对使用`MediaStore`查找音频进行播放的其他应用程序可用。\n\
  \n```java\nContentValues contentValues = new ContentValues();\ncontentValues.put(MediaStore.MediaColumns.TITLE,\
  \ \"这不是音乐\");\ncontentValues.put(MediaStore.MediaColumns.DATE_ADDED, System.currentTimeMillis());\n\
  contentValues.put(MediaStore.Audio.Media.DATA, audioFile.getAbsolutePath());\n\n\
  Uri newUri =\n    getContentResolver().insert(\n        MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,\
  \ contentValues);\n```\n\n当然，为了使用上述代码段，我们需要添加以下导入：\n\n```java\nimport android.content.ContentValues;\n\
  import android.net.Uri;\nimport android.provider.MediaStore;\n```\n\n## 使用 AudioRecord\
  \ 进行原始音频录制\n\n除了使用 Intent 启动录音机和`MediaRecorder`之外，Android 还提供了第三种捕获音频的方法，即使用名为`AudioRecord`的类。\n\
  \n`AudioRecord`是这三种方法中最灵活的，因为它允许我们访问原始音频流，但内置功能最少，例如不会自动压缩音频。\n\n使用`AudioRecord`的基础知识很简单。我们只需要构造一个`AudioRecord`类型的对象，传入各种配置参数。\n\
  \n我们需要指定的第一个值是音频源。这里使用的值与我们在`MediaRecorder`中使用的相同，并在`MediaRecorder.AudioSource`中定义。本质上，这意味着我们可以使用`MediaRecorder.AudioSource.MIC`。\n\
  \n\n\n# 第 7 章：音频捕获\n\n`int audioSource = MediaRecorder.AudioSource.MIC;`\n\n接下来需要指定的值是录音的采样率。该值应以\
  \ Hz 为单位指定。如我们所知，`MediaRecorder`以 8 kHz（即 8000 Hz）进行音频采样。\n\nCD 音质的音频通常为 44.1 kHz（即\
  \ 44100 Hz）。Hz（赫兹）是每秒的采样次数。不同的 Android 手机硬件能够支持不同的采样率。在我们的示例应用中，我们将使用 11025 Hz 的采样率，这也是另一种常用的采样率。\n\
  \n`int sampleRateInHz = 11025;`\n\n接下来，我们需要指定要捕获的音频通道数。该参数的常量在`AudioFormat`类中定义，且含义不言自明。\n\
  \n`AudioFormat.CHANNEL_CONFIGURATION_MONO`\n`AudioFormat.CHANNEL_CONFIGURATION_STEREO`\n\
  `AudioFormat.CHANNEL_CONFIGURATION_INVALID`\n`AudioFormat.CHANNEL_CONFIGURATION_DEFAULT`\n\
  \n这里我们暂时使用单声道配置。\n\n`int channelConfig = AudioFormat.CHANNEL_CONFIGURATION_MONO;`\n\
  \n随后，我们需要指定音频格式。相关选项同样在`AudioFormat`类中定义。\n\n`AudioFormat.ENCODING_DEFAULT`\n`AudioFormat.ENCODING_INVALID`\n\
  `AudioFormat.ENCODING_PCM_16BIT`\n`AudioFormat.ENCODING_PCM_8BIT`\n\n在这四个选项中，我们的选择归结为\
  \ PCM 16 位和 PCM 8 位。PCM 代表脉冲编码调制，本质上就是原始音频采样。因此，我们可以将每个采样的分辨率设置为 16 位或 8 位。16 位会占用更多空间和处理能力，但音频的还原度会更接近真实。在我们的示例中，将使用\
  \ 16 位版本。\n\n`int audioFormat = AudioFormat.ENCODING_PCM_16BIT;`\n\n最后，我们需要指定缓冲区大小。实际上，我们可以通过静态方法`getMinBufferSize`向`AudioRecord`类询问最小缓冲区大小，并传入采样率、通道配置和音频格式作为参数。\n\
  \n`int bufferSizeInBytes = AudioRecord.getMinBufferSize(sampleRateInHz, channelConfig,\
  \ audioFormat);`\n\n现在，我们可以构造实际的`AudioRecord`对象。\n\n`AudioRecord audioRecord = new\
  \ AudioRecord(audioSource, sampleRateInHz, channelConfig, audioFormat, bufferSizeInBytes);`\n\
  \n`AudioRecord`类实际上并不会自动保存捕获的音频。我们需要在音频数据传入时手动处理。我们首先可能需要做的是将其录制到文件中。为此，我们需要创建一个文件。\n\
  \n```\nFile recordingFile;\nFile path = new File(Environment.getExternalStorageDirectory()\n\
  \    .getAbsolutePath() + \"/Android/data/com.apress.proandroidmedia.ch07.altaudiorecorder/files/\"\
  );\npath.mkdirs();\ntry {\n    recordingFile = File.createTempFile(\"recording\"\
  , \".pcm\", path);\n} catch (IOException e1) {\n    throw new RuntimeException(\"\
  Couldn't create file on SD card\", e);\n}\n```\n\n接下来，我们创建一个指向该文件的`OutputStream`，具体而言，为了性能和便利性，我们会将其包装在`BufferedOutputStream`和`DataOutputStream`中。\n\
  \n```\nDataOutputStream dos = new DataOutputStream(new BufferedOutputStream(new\
  \ FileOutputStream(recordingFile)));\n```\n\n现在，我们可以开始捕获操作，并将音频采样写入文件。我们将使用一个短整型数组来存放从`AudioRecord`对象读取的音频数据。我们将数组大小设置得比`AudioRecord`对象的缓冲区更小，这样在我们读取数据之前缓冲区不会被填满。为了确保数组小于缓冲区大小，我们将其除以\
  \ 4。缓冲区大小以字节为单位，每个短整型占用 2 个字节，因此除以 2 是不够的。除以 4 后，该数组的大小将是`AudioRecord`对象内部缓冲区的一半。\n\
  \n`short[] buffer = new short[bufferSize/4];`\n\n我们只需调用`AudioRecord`对象的`startRecording`方法即可开始录制。\n\
  \n`audioRecord.startRecording();`\n\n录制开始后，我们可以构建一个循环，持续从`AudioRecord`对象读取数据到我们的短整型数组中，并将其写入文件的`DataOutputStream`。\n\
  \n```\nwhile (true) {\n    int bufferReadResult = audioRecord.read(buffer, 0, bufferSize/4);\n\
  \    for (int i = 0; i < bufferReadResult; i++) {\n        dos.writeShort(buffer[i]);\n\
  \    }\n}\naudioRecord.stop();\ndos.close();\n```\n\n操作完成后，我们需要调用`AudioRecord`对象的`stop`方法以及`DataOutputStream`的`close`方法。\n\
  \n\n\n# 第 7 章：音频采集\n\n当然，在实际应用中，我们不会将其放入 `while (true)` 循环中，因为该循环永远不会结束。我们也可能希望将其放在某个线程中运行，以免在录制时占用用户界面以及应用程序可能需要执行的其他操作。\n\
  \n在介绍完整示例之前，先来看看如何使用 `AudioRecord` 类在采集音频的同时进行回放。\n\n## 使用 AudioTrack 进行原始音频回放\n\
  \n`AudioTrack` 是 Android 中用于播放原始音频样本的类。它可以播放通过 `AudioRecord` 采集的音频，而这类音频无法使用 `MediaPlayer`\
  \ 对象进行播放。\n\n要构造 `AudioTrack` 对象，需要传入一系列描述待播放音频的配置变量。\n\n第一个参数是流类型。可选值在 `AudioManager`\
  \ 类中定义为常量。我们将使用 `AudioManager.STREAM_MUSIC`，即用于普通音乐播放的音频流。\n\n第二个参数是待播放音频数据的采样率（以赫兹为单位）。在示例中，我们将以\
  \ 11,025 Hz 的频率采集音频，因此，为了回放，需要指定相同的值。\n\n第三个参数是声道配置。可选值与构造 `AudioRecord` 对象时使用的相同，在\
  \ `AudioFormat` 类中定义为常量。其名称的含义不言自明。\n\n- `AudioFormat.CHANNEL_CONFIGURATION_MONO`\n\
  - `AudioFormat.CHANNEL_CONFIGURATION_STEREO`\n- `AudioFormat.CHANNEL_CONFIGURATION_INVALID`\n\
  - `AudioFormat.CHANNEL_CONFIGURATION_DEFAULT`\n\n第四个参数是音频的格式。可选值与构造 `AudioRecord`\
  \ 对象时使用的相同，在 `AudioFormat` 中定义为常量。使用的值应与传入的音频值匹配。\n\n- `AudioFormat.ENCODING_DEFAULT`\n\
  - `AudioFormat.ENCODING_INVALID`\n- `AudioFormat.ENCODING_PCM_16BIT`\n- `AudioFormat.ENCODING_PCM_8BIT`\n\
  \n第五个参数是对象中用于存储音频的缓冲区大小。要确定最小缓冲区大小，可以调用 `getMinBufferSize()`，并传入采样率、声道配置和音频格式。\n\
  \n```java\nint frequency = 11025;\nint channelConfiguration = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n\
  int audioEncoding = AudioFormat.ENCODING_PCM_16BIT;\nint bufferSize = AudioTrack.getMinBufferSize(frequency,\
  \ channelConfiguration,\n    audioEncoding);\n```\n\n最后一个参数是模式。可选值在 `AudioTrack`\
  \ 类中定义为常量。\n\n- `AudioTrack.MODE_STATIC`：音频数据将在播放前全部传输到 `AudioTrack` 对象。\n- `AudioTrack.MODE_STREAM`：音频数据将在播放过程中持续传输到\
  \ `AudioTrack` 对象。\n\n以下是我们的 `AudioTrack` 配置：\n\n```java\nAudioTrack audioTrack\
  \ = new AudioTrack(AudioManager.STREAM_MUSIC, frequency,\n    channelConfiguration,\
  \ audioEncoding, bufferSize,\n    AudioTrack.MODE_STREAM);\n```\n\n构造 `AudioTrack`\
  \ 后，需要打开音频源，将音频数据读取到缓冲区，并将其传递给 `AudioTrack` 对象。\n\n我们将从一个包含正确格式（11,025 Hz、16 位、单声道）原始\
  \ PCM 数据的文件构造一个 `DataInputStream`。\n\n```java\nDataInputStream dis = new DataInputStream(\n\
  \    new BufferedInputStream(new FileInputStream(recordingFile)));\n```\n\n然后，可以在\
  \ `AudioTrack` 上调用 `play()`，并开始从 `DataInputStream` 写入音频。\n\n```java\naudioTrack.play();\n\
  \nwhile (isPlaying && dis.available() > 0) {\n    int i = 0;\n    while (dis.available()\
  \ > 0 && i < audiodata.length) {\n        audiodata[i] = dis.readShort();\n    \
  \    i++;\n    }\n    audioTrack.write(audiodata, 0, audiodata.length);\n}\n\ndis.close();\n\
  ```\n\n以上就是使用 `AudioTrack` 从文件回放音频的基本方法，该文件是通过 `AudioRecord` 录制生成的。\n\n# 第 7 章：音频采集\n\
  \n## 原始音频采集与回放示例\n\n以下是一个完整示例，展示了如何使用 `AudioRecord` 录制音频，并使用 `AudioTrack` 进行回放。每个操作都通过\
  \ `AsyncTask` 在各自的线程中运行，从而避免在主线程中运行导致应用程序无响应。\n\n```java\npackage com.apress.proandroidmedia.ch07.altaudiorecorder;\n\
  \nimport java.io.BufferedInputStream;\nimport java.io.BufferedOutputStream;\nimport\
  \ java.io.DataInputStream;\nimport java.io.DataOutputStream;\nimport java.io.File;\n\
  import java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
  \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
  import android.media.AudioRecord;\nimport android.media.AudioTrack;\nimport android.media.MediaRecorder;\n\
  import android.os.AsyncTask;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
  import android.widget.Button;\nimport android.widget.TextView;\n\npublic class AltAudioRecorder\
  \ extends Activity implements OnClickListener {\n```\n\n我们定义了两个内部类——一个用于录制，一个用于回放。每个类都继承自\
  \ `AsyncTask`。\n\n```java\n    RecordAudio recordTask;\n    PlayAudio playTask;\n\
  \n    Button startRecordingButton, stopRecordingButton, startPlaybackButton,\n \
  \       stopPlaybackButton;\n    TextView statusText;\n    File recordingFile;\n\
  ```\n\n我们将使用布尔值来跟踪是否应进行录制和回放。这些布尔值将在录制和回放任务的循环中使用。\n\n```java\n    boolean isRecording\
  \ = false;\n    boolean isPlaying = false;\n```\n\n以下是用于定义 `AudioRecord` 和 `AudioTrack`\
  \ 对象配置的变量。\n\n```java\n    // 这些实际上应该定义为常量\n    int frequency = 11025;\n    int\
  \ channelConfiguration = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n    int audioEncoding\
  \ = AudioFormat.ENCODING_PCM_16BIT;\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        statusText = (TextView) this.findViewById(R.id.StatusTextView);\n    \
  \    startRecordingButton = (Button) this.findViewById(R.id.StartRecordingButton);\n\
  \        stopRecordingButton = (Button) this.findViewById(R.id.StopRecordingButton);\n\
  \        startPlaybackButton = (Button) this.findViewById(R.id.StartPlaybackButton);\n\
  \        stopPlaybackButton = (Button) this.findViewById(R.id.StopPlaybackButton);\n\
  \n        startRecordingButton.setOnClickListener(this);\n        stopRecordingButton.setOnClickListener(this);\n\
  \        startPlaybackButton.setOnClickListener(this);\n        stopPlaybackButton.setOnClickListener(this);\n\
  \n        stopRecordingButton.setEnabled(false);\n        startPlaybackButton.setEnabled(false);\n\
  \        stopPlaybackButton.setEnabled(false);\n```\n\n在构造函数中，最后要做的是创建用于录制和回放的文件。在本例中，我们在\
  \ SD 卡上与应用关联文件的首选位置创建文件。\n\n```java\n        File path = new File(Environment.getExternalStorageDirectory()\n\
  \            .getAbsolutePath() + \"/Android/data/com.apress.proandroidmedia.ch07\"\
  \n            + \".altaudiorecorder/files/\");\n        path.mkdirs();\n\n     \
  \   try {\n            recordingFile = File.createTempFile(\"recording\", \".pcm\"\
  , path);\n        } catch (IOException e) {\n            throw new RuntimeException(\"\
  Couldn't create file on SD card\", e);\n        }\n    }\n```\n\n`onClick()` 方法处理用户生成的按钮点击事件。每个按钮对应一个具体的方法。\n\
  \n```java\n    public void onClick(View v) {\n        if (v == startRecordingButton)\
  \ {\n            record();\n        } else if (v == stopRecordingButton) {\n   \
  \         stopRecording();\n        } else if (v == startPlaybackButton) {\n   \
  \         play();\n        } else if (v == stopPlaybackButton) {\n            stopPlaying();\n\
  \        }\n    }\n```\n\n要开始回放，我们构造一个新的 `PlayAudio` 对象，并调用其从 `AsyncTask` 继承的 `execute()`\
  \ 方法。\n\n```java\n    public void play() {\n```\n\n\n\n## 第 7 章：音频捕获\n\n`startPlaybackButton.setEnabled(true);`\n\
  \n`playTask = new PlayAudio();`\n\n`playTask.execute();`\n\n`stopPlaybackButton.setEnabled(true);`\n\
  \n要停止播放，我们将`isPlaying`布尔值设为`false`即可。这将导致`PlayAudio`对象的循环结束。\n\n```\npublic void\
  \ stopPlaying() {\n    isPlaying = false;\n    stopPlaybackButton.setEnabled(false);\n\
  \    startPlaybackButton.setEnabled(true);\n}\n```\n\n要开始录制，我们构造一个`RecordAudio`对象并调用其`execute`方法。\n\
  \n```\npublic void record() {\n    startRecordingButton.setEnabled(false);\n   \
  \ stopRecordingButton.setEnabled(true);\n    // 仅供娱乐\n    startPlaybackButton.setEnabled(true);\n\
  \    recordTask = new RecordAudio();\n    recordTask.execute();\n}\n```\n\n要停止录制，我们只需将`isRecording`布尔值设为`false`。这允许`RecordAudio`对象停止循环并执行清理工作。\n\
  \n```\npublic void stopRecording() {\n    isRecording = false;\n}\n```\n\n以下是我们的内部类`PlayAudio`。该类继承自`AsyncTask`，并使用`AudioTrack`对象来播放音频。\n\
  \n```\nprivate class PlayAudio extends AsyncTask<Void, Integer, Void> {\n    @Override\n\
  \    protected Void doInBackground(Void... params) {\n        isPlaying = true;\n\
  \        int bufferSize = AudioTrack.getMinBufferSize(frequency,\n             \
  \   channelConfiguration, audioEncoding);\n        short[] audiodata = new short[bufferSize/4];\n\
  \        try {\n            DataInputStream dis = new DataInputStream(\n       \
  \             new BufferedInputStream(new FileInputStream(\n                   \
  \         recordingFile)));\n            AudioTrack audioTrack = new AudioTrack(\n\
  \                    AudioManager.STREAM_MUSIC, frequency,\n                   \
  \ channelConfiguration, audioEncoding, bufferSize,\n                    AudioTrack.MODE_STREAM);\n\
  \            audioTrack.play();\n            while (isPlaying && dis.available()\
  \ > 0) {\n                int i = 0;\n                while (dis.available() > 0\
  \ && i < audiodata.length) {\n                    audiodata[i] = dis.readShort();\n\
  \                    i++;\n                }\n                audioTrack.write(audiodata,\
  \ 0, audiodata.length);\n            }\n            dis.close();\n            startPlaybackButton.setEnabled(false);\n\
  \            stopPlaybackButton.setEnabled(true);\n        } catch (Throwable t)\
  \ {\n            Log.e(\"AudioTrack\", \"Playback Failed\");\n        }\n      \
  \  return null;\n    }\n}\n```\n\n最后是我们的`RecordAudio`类，它继承自`AsyncTask`。该类在后台运行一个`AudioRecord`对象，并调用`publishProgress`来更新\
  \ UI，以指示录制进度。\n\n```\nprivate class RecordAudio extends AsyncTask<Void, Integer,\
  \ Void> {\n    @Override\n    protected Void doInBackground(Void... params) {\n\
  \        isRecording = true;\n        try {\n            DataOutputStream dos =\
  \ new DataOutputStream(\n                    new BufferedOutputStream(new FileOutputStream(\n\
  \                            recordingFile)));\n            int bufferSize = AudioRecord.getMinBufferSize(frequency,\n\
  \                    channelConfiguration, audioEncoding);\n            AudioRecord\
  \ audioRecord = new AudioRecord(\n                    MediaRecorder.AudioSource.MIC,\
  \ frequency,\n                    channelConfiguration, audioEncoding, bufferSize);\n\
  \            short[] buffer = new short[bufferSize];\n            audioRecord.startRecording();\n\
  \            int r = 0;\n            while (isRecording) {\n                int\
  \ bufferReadResult = audioRecord.read(buffer, 0,\n                        bufferSize);\n\
  \                for (int i = 0; i < bufferReadResult; i++) {\n                \
  \    dos.writeShort(buffer[i]);\n                }\n                publishProgress(new\
  \ Integer(r));\n                r++;\n            }\n            audioRecord.stop();\n\
  \            dos.close();\n        } catch (Throwable t) {\n            Log.e(\"\
  AudioRecord\", \"Recording Failed\");\n        }\n        return null;\n    }\n\
  }\n```\n\n当调用`publishProgress`时，会调用`onProgressUpdate`方法。\n\n```\nprotected void\
  \ onProgressUpdate(Integer... progress) {\n    statusText.setText(progress[0].toString());\n\
  }\n```\n\n当`doInBackground`方法完成时，会调用以下的`onPostExecute`方法。\n\n```\nprotected void\
  \ onPostExecute(Void result) {\n    startRecordingButton.setEnabled(true);\n   \
  \ stopRecordingButton.setEnabled(false);\n    startPlaybackButton.setEnabled(true);\n\
  }\n```\n\n以下是前述示例的布局 XML：\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\
  \ xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n>\n    <TextView\n        android:layout_width=\"fill_parent\"\n\
  \        android:layout_height=\"wrap_content\"\n        android:text=\"Status\"\
  \n        android:id=\"@+id/StatusTextView\"/>\n    <Button\n        android:layout_width=\"\
  wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  Start Recording\"\n        android:id=\"@+id/StartRecordingButton\"/>\n    <Button\n\
  \        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"Stop Recording\"\n        android:id=\"@+id/StopRecordingButton\"\
  />\n    <Button\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"Start Playback\"\n        android:id=\"@+id/StartPlaybackButton\"\
  />\n    <Button\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"Stop Playback\"\n        android:id=\"@+id/StopPlaybackButton\"\
  />\n</LinearLayout>\n```\n\n并且，我们需要在`AndroidManifest.xml`中添加以下权限。\n\n```\n<uses-permission\
  \ android:name=\"android.permission.RECORD_AUDIO\"/>\n<uses-permission android:name=\"\
  android.permission.WRITE_EXTERNAL_STORAGE\"/>\n```\n\n正如我们所看到的，使用`AudioRecord`和`AudioTrack`类来创建捕获和播放应用程序，比使用`MediaRecorder`和`MediaPlayer`类要繁琐得多。但正如我们将在下一章中看到的，当我们需要进行任何类型的音频处理或想要合成音频时，这种努力是值得的。\n\
  \n## 总结\n\n在本章中，我们研究了在 Android 上录制音频的三种不同方法。每种方法都有各自的优缺点。使用内置录音机非常适合无需复杂操作的音频录制，几乎不需要或完全不需要程序化控制。使用`MediaRecorder`让我们更进一步，可以控制媒体录制的时间长度等方面，但界面需要我们自己实现。最后，我们探讨了使用`AudioRecord`录制原始样本的能力。使用这种方法，我们拥有最大的控制权和灵活性，但为了捕获和处理音频，需要做最多的工作。\n\
  \n在下一章中，我们将进一步探讨音频的可能性，研究音频处理和合成。\n\n\n### 音频合成与分析\n\n在上一章的结尾，我们研究了一种通过 `AudioRecord`\
  \ 和 `AudioTrack` 类来捕获原始 PCM 音频并播放的方法。在本章中，我们将继续使用这些类，以算法的方式合成音频，并对录制的音频进行分析。\n\n\
  ## 数字音频合成\n\n数字音频合成是一个非常广泛的课题，背后涉及众多理论、数学、工程学知识以及历史渊源。遗憾的是，本书涵盖的范围有限，无法深入探讨该课题的大部分内容。我们将会做的是，研究一些基础示例，看看如何利用\
  \ Android 中的几个内置类从零开始创建音频。\n\n你可能知道，声音是由空气（或其他介质）中压力的重复性变化（以波的形式）形成的。这些振荡的特定频率（即声波）是可听见的，这意味着我们的耳朵对一定时间内的这些重复次数很敏感。这个范围大致在\
  \ 12 Hz（即每秒 12 个周期，非常低沉的声音，如隆隆声）到 20 kHz（即每秒 20,000 个周期，非常高音调的声音）之间。\n\n要创建音频，我们需要让空气以我们想要的声音频率振动。在数字领域，这通常通过一个由模拟电信号驱动的扬声器来实现。数字音频系统包含一个执行数模转换（DAC）的芯片或板卡。DAC\
  \ 接收一系列代表音频样本的数字形式的数据，并将其转换为电压，再由扬声器将电压转化为声音。\n\n为了合成音频，我们只需合成音频样本，并将其输入到相应的机制中。在\
  \ Android 中，这个机制就是 `AudioTrack` 类。\n\n# 第 8 章：音频合成与分析\n\n正如我们在上一章中学到的，`AudioTrack`\
  \ 类允许我们播放原始的音频样本（例如由 `AudioRecord` 类捕获的样本）。\n\n## 播放合成声音\n\n以下是一个快速示例，展示如何构造一个 `AudioTrack`\
  \ 类并传入数据进行播放。关于构造 `AudioTrack` 对象所用参数的详细讨论，请参阅第 7 章的“使用 AudioTrack 进行原始音频播放”部分。\n\
  \n此示例使用了一个继承自 `AsyncTask` 的内部类 `AudioSynthesisTask`。`AsyncTask` 定义了一个名为 `doInBackground`\
  \ 的方法，该方法会在一个与 Activity 主线程分离的线程中运行其内部的任何代码。这保证了 Activity 及其 UI 的响应性，否则，为 `AudioTrack`\
  \ 对象提供数据的 `write` 方法循环会阻塞主线程。\n\n```java\npackage com.apress.proandroidmedia.ch08.audiosynthesis;\n\
  \nimport android.app.Activity;\nimport android.media.AudioFormat;\nimport android.media.AudioManager;\n\
  import android.media.AudioTrack;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
  \npublic class AudioSynthesis extends Activity implements OnClickListener {\n\n\
  \    Button startSound;\n    Button endSound;\n    AudioSynthesisTask audioSynth;\n\
  \    boolean keepGoing = false;\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \        startSound = (Button) this.findViewById(R.id.StartSound);\n        startSound.setOnClickListener(this);\n\
  \        endSound = (Button) this.findViewById(R.id.EndSound);\n        endSound.setOnClickListener(this);\n\
  \        endSound.setEnabled(false);\n    }\n\n    @Override\n    public void onPause()\
  \ {\n        super.onPause();\n        keepGoing = false;\n        endSound.setEnabled(false);\n\
  \        startSound.setEnabled(true);\n    }\n\n    public void onClick(View v)\
  \ {\n        if (v == startSound) {\n            keepGoing = true;\n           \
  \ audioSynth = new AudioSynthesisTask();\n            audioSynth.execute();\n  \
  \          endSound.setEnabled(true);\n            startSound.setEnabled(false);\n\
  \        } else if (v == endSound) {\n            keepGoing = false;\n         \
  \   endSound.setEnabled(false);\n            startSound.setEnabled(true);\n    \
  \    }\n    }\n\n    private class AudioSynthesisTask extends AsyncTask<Void, Void,\
  \ Void> {\n        @Override\n        protected Void doInBackground(Void... params)\
  \ {\n            final int SAMPLE_RATE = 11025;\n            int minSize = AudioTrack.getMinBufferSize(SAMPLE_RATE,\n\
  \                    AudioFormat.CHANNEL_CONFIGURATION_MONO,\n                 \
  \   AudioFormat.ENCODING_PCM_16BIT);\n\n            AudioTrack audioTrack = new\
  \ AudioTrack(\n                    AudioManager.STREAM_MUSIC, SAMPLE_RATE,\n   \
  \                 AudioFormat.CHANNEL_CONFIGURATION_MONO,\n                    AudioFormat.ENCODING_PCM_16BIT,\n\
  \                    minSize,\n                    AudioTrack.MODE_STREAM);\n\n\
  \            audioTrack.play();\n\n            short[] buffer = {\n            \
  \    8130,15752,22389,27625,31134,32695,32210,29711,25354,19410,12253,\n       \
  \         4329,-3865,-11818,-19032,-25055,-29511,-32121,-32722,-31276,-27874,\n\
  \                -22728,-16160,-8582,-466\n            };\n\n            while (keepGoing)\
  \ {\n                audioTrack.write(buffer, 0, buffer.length);\n            }\n\
  \n            return null;\n        }\n    }\n}\n```\n\n\n  \n# 第 8 章：音频合成与分析  \n\
  \n以下是前述活动所使用的布局 XML 文件。  \n\n```xml  \n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>  \n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \  \n    android:orientation=\"vertical\"  \n    android:layout_width=\"fill_parent\"\
  \  \n    android:layout_height=\"fill_parent\">  \n    <Button android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\"  \n        android:id=\"@+id/StartSound\"\
  \ android:text=\"开始播放\" />  \n    <Button android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\"  \n        android:id=\"@+id/EndSound\"\
  \ android:text=\"结束播放\" />  \n</LinearLayout>  \n```  \n\n上述代码的关键在于短整型数组。这些是持续通过`write`方法传入`AudioTrack`对象的音频样本。在此例中，样本值从\
  \ 8130 振荡到 32695，再下降到-32121，最后回升至-466。如果将这些值绘制成图表，这些样本将共同构建出一个波形。由于声音由振荡的压力产生，且每个样本代表一个压力值，因此这些样本必须表示波形才能生成声音。改变这一波形可以创建不同类型的音频。以下这组样本描述了一个短波形（仅十个样本），因此代表的是高频声音——每秒振荡次数较多的声音。而低频声音的波形在固定采样率下会跨越更多的样本。\
  \  \n\n```java  \nshort[] buffer = {  \n    8130, 15752, 32695, 12253, 4329,  \n\
  \    -3865, -19032, -32722, -16160, -466  \n};  \n```  \n\n## 生成样本  \n\n通过一些简单的数学运算，我们可以用算法生成这些样本。经典的**正弦波**可以被重现。这个示例生成了一个\
  \ 440 Hz 的正弦波。  \n\n```java  \npackage com.apress.proandroidmedia.ch08.audiosynthesis;\
  \  \n\nimport android.app.Activity;  \nimport android.media.AudioFormat;  \nimport\
  \ android.media.AudioManager;  \nimport android.media.AudioTrack;  \nimport android.os.AsyncTask;\
  \  \nimport android.os.Bundle;  \nimport android.util.Log;  \nimport android.view.View;\
  \  \nimport android.view.View.OnClickListener;  \nimport android.widget.Button;\
  \  \n\npublic class AudioSynthesis extends Activity implements OnClickListener {\
  \  \n\n    Button startSound;  \n    Button endSound;  \n    AudioSynthesisTask\
  \ audioSynth;  \n    boolean keepGoing = false;  \n    float synth_frequency = 440;\
  \ // 440 Hz，中央 A 音  \n\n    @Override  \n    public void onCreate(Bundle savedInstanceState)\
