  \ Activity 使用。\n        ArrayList<VideoViewInfo> videoRows = new ArrayList<VideoViewInfo>();\n\
  \n        // 在这里我们循环遍历 Cursor 对象中包含的数据，\n        // 为每一行创建一个 VideoViewInfo 对象并将其添加到\
  \ ArrayList 中。\n        if (cursor.moveToFirst())\n        {\n            // ...（循环实现继续）\n\
  \        }\n    }\n}\n```\n\n\n\n"
- "# 第十章：高级视频\n\n我们使用了一个 `do while` 循环，目的是让它在移动到下一行数据之前，先处理第一行数据。`do` 部分会在 `while`\
  \ 子句被测试/执行之前执行。在我们的循环中，会为返回的每一行数据创建一个新的 `VideoViewInfo` 对象。\n\n```\ndo {\n    VideoViewInfo\
  \ newVVI = new VideoViewInfo();\n```\n\n然后，我们可以从 `Cursor` 中提取所有相关数据。如上所述，我们还会发起另一个查询来获取每个视频的缩略图。这些数据中的每一项都将存储在\
  \ `VideoViewInfo` 对象中。\n\n```\n    int id = cursor.getInt(cursor.getColumnIndex(MediaStore.Video.Media._ID));\n\
  \    Cursor thumbCursor = managedQuery(MediaStore.Video.Thumbnails.EXTERNAL_CONTENT_URI,\n\
  \                                      thumbColumns,\n                         \
  \             MediaStore.Video.Thumbnails.VIDEO_ID + \"=\" + id,\n             \
  \                         null, null);\n    if (thumbCursor.moveToFirst()) {\n \
  \       newVVI.thumbPath = thumbCursor.getString(\n            thumbCursor.getColumnIndex(MediaStore.Video.Thumbnails.DATA));\n\
  \        Log.v(\"VideoGallery\", \"Thumb \" + newVVI.thumbPath);\n    }\n    newVVI.filePath\
  \ = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA));\n\
  \    newVVI.title = cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.TITLE));\n\
  \    Log.v(\"VideoGallery\", \"Title \" + newVVI.title);\n    newVVI.mimeType =\
  \ cursor.getString(\n        cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE));\n\
  \    Log.v(\"VideoGallery\", \"Mime \" + newVVI.mimeType);\n```\n\n最后，我们将 `VideoViewInfo`\
  \ 添加到 `videoRows` 这个 `ArrayList` 中。\n\n```\n    videoRows.add(newVVI);\n} while\
  \ (cursor.moveToNext());\n```\n\n一旦获取完所有视频，我们就可以继续后续操作。我们将 `ListView` 对象的适配器设置为\
  \ `VideoGalleryAdapter` 的一个新实例，该类是此处定义的一个内部类。我们还将此活动设置为 `ListView` 的 `OnItemClickListener`。\n\
  \n```\nlistView.setAdapter(new VideoGalleryAdapter(this, videoRows));\nlistView.setOnItemClickListener(this);\n\
  ```\n\n当点击 `ListView` 中的某一项时，`onItemClick` 方法会被调用。在该方法中，我们从 `Cursor` 中提取所需数据，并创建一个\
  \ `Intent` 来启动设备上的默认媒体播放器应用以播放该视频。我们本可以创建自己的 `MediaPlayer` 或在此处使用 `VideoView` 类来替代。\n\
  \n```\npublic void onItemClick(AdapterView<?> l, View v, int position, long id)\
  \ {\n    if (cursor.moveToPosition(position)) {\n        int fileColumn = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA);\n\
  \        int mimeColumn = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.MIME_TYPE);\n\
  \        String videoFilePath = cursor.getString(fileColumn);\n        String mimeType\
  \ = cursor.getString(mimeColumn);\n        Intent intent = new Intent(android.content.Intent.ACTION_VIEW);\n\
  \        File newFile = new File(videoFilePath);\n        intent.setDataAndType(Uri.fromFile(newFile),\
  \ mimeType);\n        startActivity(intent);\n    }\n}\n```\n\n接下来是一个非常基础的 `VideoViewInfo`\
  \ 类，用于保存关于每个返回视频的信息。\n\n```\nclass VideoViewInfo {\n    String filePath;\n    String\
  \ mimeType;\n    String thumbPath;\n    String title;\n}\n```\n\n由于我们在活动中使用 `ListView`\
  \ 来显示从 `MediaStore` 查询返回的每个视频，我们将使用 `ListView` 来显示视频的标题和缩略图。为了将数据交给 `ListView`，我们需要构建一个适配器。接下来，我们创建一个继承自\
