  \n## 音频分析\n\n既然我们已经介绍了 `AudioTrack` 更高级的使用方式，那么不妨看看通过 `AudioRecord` 对象输入音频时，我们还能做些什么？\n\
  \n**188** ## 第八章：音频合成与分析\n\n### 捕获声音以进行分析\n\n如前所述，声音是在物质中传播的振动。麦克风可以捕获这些振动。麦克风将空气中传播的振动转换为持续变化的电流。当计算机使用麦克风捕获声音时，这些声音会被数字化。具体来说，每秒会多次采集特定大小（样本大小）的振幅样本（采样率）。这些数据流称为\
  \ PCM（脉冲编码调制）流，它是数字音频的基础。总之，PCM 流中表示的样本数字化地代表了所捕获的音频波形。采样率越高，表示越精确，并且可以捕获的音频频率也越高。\n\
  \n正如我们在前一章学习 `AudioRecord` 类时所了解的，这些参数可以在创建对象时传递给 `AudioRecord` 类的构造函数。若要重新了解每个参数的含义，请参阅第\
  \ 7 章的“使用 AudioRecord 进行原始音频录制”部分。\n\n**注意：** 奈奎斯特采样定理以 20 世纪早期至中期贝尔实验室的工程师哈里·奈奎斯特的名字命名，它指出数字化系统能够捕获的最高频率是所用采样率的一半。因此，为了捕获\
  \ 440 Hz（中央 A）的音频，我们的系统需要以 880 Hz 或更高的频率捕获样本。\n\n以下是使用 `AudioRecord` 类型对象捕获音频所需步骤的快速回顾。\n\
  \n```\nint frequency = 8000;\nint channelConfiguration = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n\
  int audioEncoding = AudioFormat.ENCODING_PCM_16BIT;\nint bufferSize = AudioRecord.getMinBufferSize(frequency,\n\
  \        channelConfiguration, audioEncoding);\nAudioRecord audioRecord = new AudioRecord(\n\
  \        MediaRecorder.AudioSource.MIC, frequency,\n        channelConfiguration,\
  \ audioEncoding, bufferSize);\nshort[] buffer = new short[blockSize];\naudioRecord.startRecording();\n\
  while (started) {\n    int bufferReadResult = audioRecord.read(buffer, 0, blockSize);\n\
  }\naudioRecord.stop();\n```\n\n上述代码实际上并未对捕获的音频进行任何处理。通常，我们会希望将其写入文件或以其他方式进行分析。\n\
  \n**第八章：音频合成与分析** **189**\n\n### 可视化频率\n\n人们通常用来分析音频的一种常见方法是可视化其中存在的频率。通常，这些类型的可视化与均衡器一起使用，允许调整不同频率范围的音量。\n\
  \n将音频信号分解为分量频率的技术采用一种称为离散傅里叶变换（DFT）的数学变换。DFT 通常用于将数据从时域转换到频域。一种用于执行 DFT 的算法是快速傅里叶变换（FFT），它非常高效，但遗憾的是也很复杂。\n\
  \n幸运的是，存在许多公开领域或开源的 FFT 算法实现，我们可以加以利用。其中一个是 FFTPACK 库的 Java 移植版本，该库最初由美国国家大气研究中心的保罗·斯瓦茨特劳伯开发。该\
  \ Java 移植版本由加拿大莱斯布里奇大学的张宝社完成。各种实现可在 [www.netlib.org/fftpack/](http://www.netlib.org/fftpack)\
  \ 在线获取。我们将使用的版本归档在名为 `jfftpack.tgz` 的文件中，该文件位于该页面的链接中。可直接通过 [www.netlib.org/fftpack/jfftpack.tgz](http://www.netlib.org/fftpack/jfftpack.tgz)\
  \ 下载。\n\n要在 Eclipse Android 项目中使用此包或任何其他包含 Java 源代码的包，我们需要将源代码导入到我们的项目中。此归档文件包含包的正确目录结构，因此我们只需将\
  \ `javasource` 目录中的顶级文件夹（`ca`）拖拽到我们项目的 `src` 目录中即可。\n\n\n\n下面是一个绘制图形均衡器图形部分的示例。\n\
  \n```\npackage com.apress.proandroidmedia.ch08.audioprocessing;\n\nimport android.app.Activity;\n\
  import android.graphics.Bitmap;\nimport android.graphics.Canvas;\nimport android.graphics.Color;\n\
  import android.graphics.Paint;\nimport android.media.AudioFormat;\nimport android.media.AudioRecord;\n\
  import android.media.MediaRecorder;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
  import android.widget.Button;\nimport android.widget.ImageView;\n```\n\n我们将导入 `fftpack`\
  \ 包中的 `RealDoubleFFT` 类。\n\n```\nimport ca.uol.aig.fftpack.RealDoubleFFT;\n```\n\
  \n```\npublic class AudioProcessing extends Activity implements OnClickListener\
  \ {\n```\n\n我们将在 `AudioRecord` 对象中使用 8 kHz 的采样频率、单声道音频通道和 16 位采样精度。\n\n```\nint\
  \ frequency = 8000;\nint channelConfiguration = AudioFormat.CHANNEL_CONFIGURATION_MONO;\n\
  int audioEncoding = AudioFormat.ENCODING_PCM_16BIT;\n```\n\n`transformer` 将是我们的\
  \ FFT 对象，我们将通过 FFT 对象一次性处理来自 `AudioRecord` 对象的 256 个样本。我们使用的采样数量将对应于通过 FFT 对象运行后获得的频率分量数量。我们可以自由选择不同的大小，但需要考虑内存和性能问题，因为计算所需的数学运算对处理器来说是很密集的。\n\
  \n```\nprivate RealDoubleFFT transformer;\nint blockSize = 256;\nButton startStopButton;\n\
  boolean started = false;\n```\n\n`RecordAudio` 是此处定义的一个扩展了 `AsyncTask` 的内部类。\n\n\
  ```\nRecordAudio recordTask;\n```\n\n我们将使用一个 `ImageView` 来显示 `Bitmap` 图像。该图像表示当前音频流中各个频率的电平。为了绘制这些电平，我们将使用从\
  \ `Bitmap` 构建的 `Canvas` 和 `Paint` 对象。\n\n```\nImageView imageView;\nBitmap bitmap;\n\
  Canvas canvas;\nPaint paint;\n\n@Override\npublic void onCreate(Bundle savedInstanceState)\
  \ {\n    super.onCreate(savedInstanceState);\n    setContentView(R.layout.main);\n\
  \    \n    startStopButton = (Button) this.findViewById(R.id.StartStopButton);\n\
  \    startStopButton.setOnClickListener(this);\n    \n    // RealDoubleFFT 类的构造函数接收我们一次性处理的样本数量。\n\
  \    // 这也代表了将输出的不同频率范围的数量。\n    transformer = new RealDoubleFFT(blockSize);\n \
  \   \n    // 以下是用于绘图的 ImageView 和相关对象的设置。\n    imageView = (ImageView) this.findViewById(R.id.ImageView01);\n\
  \    bitmap = Bitmap.createBitmap((int)256,(int)100,Bitmap.Config.ARGB_8888);\n\
  \    canvas = new Canvas(bitmap);\n    paint = new Paint();\n    paint.setColor(Color.GREEN);\n\
  \    imageView.setImageBitmap(bitmap);\n}\n```\n\n此活动中的大部分工作都在以下类中完成，该类名为 `RecordAudio`，它扩展了\
  \ `AsyncTask`。通过使用 `AsyncTask`，我们将那些会阻塞用户界面的方法运行在一个单独的线程中。任何放在 `doInBackground`\
  \ 方法中的内容都将以这种方式执行。\n\n```\nprivate class RecordAudio extends AsyncTask<Void, double[],\
  \ Void> {\n    @Override\n    protected Void doInBackground(Void... params) {\n\
  \        try {\n            // 我们将以常规方式设置和使用 AudioRecord。\n            int bufferSize\
  \ = AudioRecord.getMinBufferSize(frequency,\n                channelConfiguration,\
  \ audioEncoding);\n            AudioRecord audioRecord = new AudioRecord(\n    \
  \            MediaRecorder.AudioSource.MIC, frequency,\n                channelConfiguration,\
  \ audioEncoding, bufferSize);\n            \n            // short 数组 buffer 将从 AudioRecord\
  \ 对象中接收原始 PCM 样本。\n            // double 数组 toTransform 将保存相同的数据，但以 double 格式表示，\n\
  \            // 因为这是 FFT 类所要求的。\n            short[] buffer = new short[blockSize];\n\
  \            double[] toTransform = new double[blockSize];\n            \n     \
  \       audioRecord.startRecording();\n            \n            while (started)\
  \ {\n                int bufferReadResult = audioRecord.read(buffer, 0, blockSize);\n\
  \                \n                // 在从 AudioRecord 对象读取数据后，我们遍历数据并将其从 short 值转换为\
  \ double 值。\n                // 我们不能直接通过强制类型转换来完成，因为期望的值应该在 -1.0 到 1.0 之间，而不是完整的范围。\n\
  \                // 将 short 除以 32,768.0 即可实现这一点，因为该值是 short 的最大值。\n            \
  \    // 注意：也可以使用常量 Short.MAX_VALUE 来代替。\n                for (int i = 0; i < blockSize\
  \ && i < bufferReadResult; i++) {\n                    toTransform[i] = (double)\
  \ buffer[i] * 32768.0;  // 有符号 16 位\n                }\n                \n     \
  \           // 接下来我们将 double 值数组传递给 FFT 对象。FFT 对象会重用同一个数组来保存输出值。\n             \
  \   // 包含的数据将是频域数据，而不是时域数据。\n                // 这意味着数组中的第一个元素不表示时间上的第一个样本，而是表示第一组频率的电平。\n\
  \                // 由于我们使用 256 个值（或范围），并且采样率为 8,000，我们可以确定数组中的每个元素大约覆盖 15.625 Hz。\n\
  \                // 我们通过将采样率除以一半（因为能捕获的最高频率是采样率的一半），然后再除以 256 得出这个数值。\n        \
  \        // 因此，数组第一个元素代表的数据表示 0 到 15.625 Hz 之间的音频电平。\n                transformer.ft(toTransform);\n\
  \                \n                // 调用 publishProgress 会触发 onProgressUpdate 方法。\n\
  \                publishProgress(toTransform);\n            }\n            \n  \
  \          audioRecord.stop();\n            \n        } catch (Throwable t) {\n\
  \            Log.e(\"AudioRecord\", \"录音失败\");\n        }\n        \n        return\
  \ null;\n    }\n    \n    // onProgressUpdate 在我们的活动的主线程上运行，因此可以无问题地与用户界面交互。\n \
  \   // 在本实现中，我们传入经过 FFT 对象处理后的数据。\n    // 此方法负责在屏幕上将数据绘制成一系列高度最多为 100 像素的线条。\n \
  \   // 每条线条代表数组中的一个元素，因此对应一个 15.625 Hz 的频率范围。\n    // 第一条线条代表从 0 到 15.625 Hz 的频率范围，最后一条线条代表从\
  \ 3,984.375 到 4,000 Hz 的频率范围。\n    protected void onProgressUpdate(double[]... toTransform)\
  \ {\n        canvas.drawColor(Color.BLACK);\n        \n        for (int i = 0; i\
  \ < toTransform[0].length; i++) {\n            int x = i;\n            int downy\
  \ = (int) (100 - (toTransform[0][i] * 10));\n            int upy = 100;\n      \
  \      canvas.drawLine(x, downy, x, upy, paint);\n        }\n        \n        imageView.invalidate();\n\
  \    }\n}\n\npublic void onClick(View v) {\n    if (started) {\n        started\
  \ = false;\n        startStopButton.setText(\"开始\");\n        recordTask.cancel(true);\n\
  \    } else {\n        started = true;\n        startStopButton.setText(\"停止\");\n\
  \        recordTask = new RecordAudio();\n        recordTask.execute();\n    }\n\
  }\n```\n\n下面是刚刚定义的 `AudioProcessing` 活动所使用的布局 XML 文件。\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"fill_parent\">\n</LinearLayout>\n```\n\n\n\n### 193\n\
