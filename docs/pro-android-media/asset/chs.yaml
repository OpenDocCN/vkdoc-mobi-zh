  \n\n\n# 章节\n\n## 背景与网络音频\n\n在上一章中，我们探讨了 Android 的基本音频播放功能。虽然这些功能非常出色，但我们需要进一步挖掘，使其更具通用性。在本章中，我们将研究如何实现诸如后台播放音频文件之类的操作，这样播放音频的应用无需保持在前台运行。我们还将探讨如何合成声音，而不仅仅是播放音频文件，并了解如何利用互联网上的流媒体音频。\n\
  \n## 后台音频播放\n\n到目前为止，我们一直专注于构建以前台为中心的应用，这些应用的用户界面始终呈现在用户面前。在上一章中，我们学习了如何为这类应用添加音频播放功能。\n\
  \n然而，如果我们想要构建一个播放音乐或有声书的应用程序，同时希望用户在收听过程中能够使用手机执行其他操作，这时会发生什么呢？如果我们只局限于构建 Activity，可能会遇到一些困难。Android\
  \ 操作系统有权终止不在前台且未被用户使用的 Activity。这样做是为了释放内存，为其他应用程序的运行腾出空间。如果操作系统终止了正在播放音频的 Activity，音频就会停止播放，这会严重影响用户体验。\n\
  \n幸运的是，有一个解决方案。我们可以使用 Service，而不是在 Activity 中播放音频。\n\n## 服务\n\n为了确保当应用程序不再处于前台且其\
  \ Activity 未被使用时音频仍能继续播放，我们需要创建一个 Service。Service 是 Android 应用程序的一个组件，旨在后台运行任务，无需用户进行任何交互。\n\
  \n### 本地服务与远程服务\n\nAndroid 使用两种不同类型的 Service。第一种是我们将要探讨的**本地服务**。本地服务作为特定应用程序的一部分存在，仅由该应用程序访问和控制。另一种是**远程服务**。它们可以与其他应用程序通信、被访问和控制。如前所述，我们将专注于使用本地服务来实现音频播放功能。开发远程服务是一个非常大的主题，遗憾的是超出了本书的范围。\n\
  \n### 简单本地服务\n\n为了演示 Service，让我们通过这个非常简单的例子来了解。\n\n首先，我们需要一个包含界面的 Activity，该界面能让我们启动和停止\
  \ Service。\n\n```\npackage com.apress.proandroidmedia.ch06.simpleservice;\n\nimport\
  \ android.app.Activity;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
  \npublic class SimpleServiceActivity extends Activity implements OnClickListener\
  \ {\n```\n\n我们的 Activity 将包含两个按钮——一个用于启动 Service，另一个用于停止 Service。\n\n```\nButton\
  \ startServiceButton;\nButton stopServiceButton;\n```\n\n为了启动或停止 Service，我们使用标准的\
  \ intent。\n\n```\nIntent serviceIntent;\n\n@Override\npublic void onCreate(Bundle\
  \ savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    setContentView(R.layout.main);\n\
  ```\n\n我们的 Activity 实现了`OnClickListener`，因此我们将每个按钮的`OnClickListener`设置为`this`。\n\
  \n```\nstartServiceButton = (Button) this.findViewById(R.id.StartServiceButton);\n\
  stopServiceButton = (Button) this.findViewById(R.id.StopServiceButton);\nstartServiceButton.setOnClickListener(this);\n\
  stopServiceButton.setOnClickListener(this);\n```\n\n在实例化用于启动和停止 Service 的 intent\
  \ 时，我们将 Activity 作为`Context`传入，随后是 Service 的类。\n\n```\nserviceIntent = new Intent(this,\
  \ SimpleServiceService.class);\n}\n\npublic void onClick(View v) {\n    if (v ==\
  \ startServiceButton) {\n```\n\n当点击`startServiceButton`时，我们调用`startService`方法，并传入刚刚创建好的用于引用我们\
  \ Service 的 intent。`startService`方法是`Context`类的一部分，而 Activity 是`Context`的子类。\n\n\
  ```\nstartService(serviceIntent);\n    }\n    else if (v == stopServiceButton) {\n\
  ```\n\n当点击`stopServiceButton`时，我们调用`stopService`方法，并传入同一个引用我们 Service 的 intent。与`startService`一样，`stopService`也是`Context`类的一部分。\n\
  \n```\nstopService(serviceIntent);\n    }\n}\n}\n```\n\n这是定义上述 Activity 布局的`main.xml`文件。它包含`StartService`和`StopService`按钮以及一个`TextView`。\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
  http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n>\n    <TextView\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"Simple Service\"\n    />\n    <Button android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\"\n        android:id=\"@+id/StartServiceButton\"\
  \ android:text=\"Start Service\"></Button>\n    <Button android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\"\n        android:text=\"Stop\
  \ Service\" android:id=\"@+id/StopServiceButton\"></Button>\n</LinearLayout>\n```\n\
  \n现在我们可以继续编写 Service 本身的代码。在这个例子中，我们并没有在 Service 中完成任何实际任务，只是使用`Toast`来告诉我们 Service\
  \ 何时启动和停止。\n\n```\npackage com.apress.proandroidmedia.ch06.simpleservice;\n\nimport\
  \ android.app.Service;\nimport android.content.Intent;\nimport android.os.IBinder;\n\
  import android.util.Log;\n```\n\nServices 继承自`android.app.Service`类。`Service`类是一个抽象类，因此要继承它，我们至少需要实现`onBind`方法。\n\
  \n\n\n# 第 6 章：背景与网络音频\n\n在这个简单示例中，我们不会“绑定”到`Service`。因此我们只需在`onBind`方法中返回`null`。\n\
  \n```java\npublic class SimpleServiceService extends Service {\n\n    @Override\n\
  \    public IBinder onBind(Intent intent) {\n        return null;\n    }\n```\n\n\
  接下来的三个方法代表了`Service`的生命周期。与`Activity`中的`onCreate`方法类似，该方法会在`Service`被实例化时调用。它将是第一个被调用的方法。\n\
  \n```java\n    @Override\n    public void onCreate() {\n        Log.v(\"SIMPLESERVICE\"\
  , \"onCreate\");\n    }\n```\n\n每当调用`startService`并传入匹配此`Service`的 intent 时，都会调用`onStartCommand`方法。因此它可能被多次调用。`onStartCommand`返回一个整数值，表示操作系统在杀死`Service`后应执行的操作。我们这里使用的`START_STICKY`表示如果`Service`被杀死，它会重新启动。\n\
  \n```java\n    @Override\n    public int onStartCommand(Intent intent, int flags,\
  \ int startId) {\n        Log.v(\"SIMPLESERVICE\", \"onStartCommand\");\n      \
  \  return START_STICKY;\n    }\n```\n\n### `onStartCommand` 与 `onStart` 的区别\n\n\
  `onStartCommand`方法是在 Android 2.0（API Level 5）中引入的。在此之前，使用的是`onStart`方法。`onStart`的参数是一个`Intent`和一个`startId`整型值。它不包含`int\
  \ flags`参数，也没有返回值。如果你的应用面向运行 2.0 之前版本系统的手机，可以使用`onStart`方法。\n\n```java\n    @Override\n\
  \    public void onStart(Intent intent, int startid) {\n        Log.v(\"SIMPLESERVICE\"\
  , \"onStart\");\n    }\n```\n\n当操作系统销毁`Service`时会调用`onDestroy`方法。在本例中，它由我们的 Activity\
  \ 调用`stopService`方法时触发。此方法应执行关闭`Service`时所需的任何清理工作。\n\n```java\n    public void\
  \ onDestroy() {\n        Log.v(\"SIMPLESERVICE\", \"onDestroy\");\n    }\n\n}\n\
  ```\n\n最后，为了让这个示例正常运行，我们需要在清单文件（`AndroidManifest.xml`）中添加一个声明`Service`的条目。\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    package=\"com.apress.proandroidmedia.ch06.simpleservice\"\n    android:versionCode=\"\
  1\"\n    android:versionName=\"1.0\">\n\n    <application android:icon=\"@drawable/icon\"\
  \ android:label=\"@string/app_name\">\n        <activity android:name=\".SimpleServiceActivity\"\
  \n            android:label=\"@string/app_name\">\n            <intent-filter>\n\
  \                <action android:name=\"android.intent.action.MAIN\" />\n      \
  \          <category android:name=\"android.intent.category.LAUNCHER\" />\n    \
  \        </intent-filter>\n        </activity>\n\n        <service android:name=\"\
  .SimpleServiceService\" />\n    </application>\n\n    <uses-sdk android:minSdkVersion=\"\
  5\" />\n\n</manifest>\n```\n\n当然，这个示例除了在日志中输出`Service`何时启动和停止外，并没有做其他任何事情。让我们继续前进，让我们的`Service`真正做一些事情。\n\
  \n## 本地服务加 MediaPlayer\n\n既然我们已经创建了一个简单的`Service`示例，就可以将其作为模板来创建一个在后台播放音频文件的应用程序。下面是一个`Service`和一个用于控制该`Service`的\
  \ Activity，它们共同实现了在后台播放音频文件的功能。其工作原理与上一章的自定义音频播放器示例类似，因为它使用了 Android 提供的同一个底层`MediaPlayer`类。\n\
  \n```java\npackage com.apress.proandroidmedia.ch06.backgroundaudio;\n\nimport android.app.Service;\n\
  import android.content.Intent;\nimport android.media.MediaPlayer;\nimport android.media.MediaPlayer.OnCompletionListener;\n\
  import android.os.IBinder;\nimport android.util.Log;\n```\n\n`Service`实现了`OnCompletionListener`接口，以便在`MediaPlayer`完成音频文件播放时得到通知。\n\
  \n```java\npublic class BackgroundAudioService extends Service implements OnCompletionListener\
  \ {\n\n    // 声明一个 MediaPlayer 类型的对象。\n    // 该对象将处理音频的播放，如上一章自定义音频播放器示例所示。\n  \
  \  MediaPlayer mediaPlayer;\n\n    @Override\n    public IBinder onBind(Intent intent)\
  \ {\n        return null;\n    }\n\n    @Override\n```\n\n\n\n# 第 6 章：后台与网络音频\n\n\
  ```\npublic void onCreate() {\nLog.v(\"PLAYERSERVICE\",\"onCreate\");\n```\n\n在`onCreate`方法中，我们实例化了`MediaPlayer`。我们将一个对名为`goodmorningandroid.mp3`的音频文件的特定引用传递给它，该文件应放置在我们项目的原始资源（`res/raw`）目录中。如果该目录不存在，则应创建它。将音频文件放在该位置，使我们能够通过生成的`R`类中的常量`R.raw.goodmorningandroid`来引用它。关于将音频放置在原始资源目录中的更多细节，请参见第\
  \ 5 章的“创建自定义音频播放应用程序”一节。\n\n```\nmediaPlayer = MediaPlayer.create(this, R.raw.goodmorningandroid);\n\
  ```\n\n我们还设置了我们的 Service（即这个类）作为`MediaPlayer`对象的`OnCompletionListener`。\n\n```\n\
  mediaPlayer.setOnCompletionListener(this);\n}\n```\n\n当对此 Service 发出`startService`命令时，将触发`onStartCommand`方法。在此方法中，我们首先检查`MediaPlayer`对象是否已经在播放，因为该方法可能会被多次调用，如果它没有播放，我们就启动它。由于我们使用的是`onStartCommand`方法而不是`onStart`方法，因此此示例仅在\
  \ Android 2.0 及以上版本中运行。\n\n```\n@Override\npublic int onStartCommand(Intent intent,\
  \ int flags, int startId) {\nLog.v(\"PLAYERSERVICE\",\"onStartCommand\");\nif (!mediaPlayer.isPlaying())\
  \ {\nmediaPlayer.start();\n}\nreturn START_STICKY;\n}\n```\n\n当 Service 被销毁时，会触发`onDestroy`方法。由于这并不能保证`MediaPlayer`会停止播放，因此如果它正在播放，我们在此处调用其`stop`方法，并调用其`release`方法以释放所有内存占用和/或资源锁。\n\
  \n```\npublic void onDestroy() {\nif (mediaPlayer.isPlaying())\n{\nmediaPlayer.stop();\n\
  }\nmediaPlayer.release();\nLog.v(\"SIMPLESERVICE\",\"onDestroy\");\n}\n```\n\n由于我们实现了`OnCompletionListener`，并且\
  \ Service 本身被设置为`MediaPlayer`的`OnCompletionListener`，因此当`MediaPlayer`播放完一个音频文件时，会调用下面的`onCompletion`方法。由于此\
  \ Service 仅用于播放一首歌曲，因此我们调用`stopSelf`，这类似于在我们的 Activity 中调用`stopService`。\n\n```\n\
  public void onCompletion(MediaPlayer _mediaPlayer) {\nstopSelf();\n}\n}\n```\n\n\
  以下是对应于上述 Service 的 Activity。它有一个非常简单的界面，包含两个按钮用于控制 Service 的启动和停止。在每种情况下，它都会立即调用`finish`，以说明\
  \ Service 不依赖于 Activity 并独立运行。\n\n```\npackage com.apress.proandroidmedia.ch06.backgroundaudio;\n\
  \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
  \npublic class BackgroundAudioActivity extends Activity implements OnClickListener\
  \ {\n\nButton startPlaybackButton, stopPlaybackButton;\nIntent playbackServiceIntent;\n\
  \n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  setContentView(R.layout.main);\n\nstartPlaybackButton = (Button) this.findViewById(R.id.StartPlaybackButton);\n\
  stopPlaybackButton = (Button) this.findViewById(R.id.StopPlaybackButton);\n\nstartPlaybackButton.setOnClickListener(this);\n\
  stopPlaybackButton.setOnClickListener(this);\n\nplaybackServiceIntent = new Intent(this,BackgroundAudioService.class);\n\
  }\n\npublic void onClick(View v) {\nif (v == startPlaybackButton) {\nstartService(playbackServiceIntent);\n\
  finish();\n} else if (v == stopPlaybackButton) {\nstopService(playbackServiceIntent);\n\
  finish();\n}\n}\n}\n```\n\n以下是上述 Activity 使用的`main.xml`布局 XML 文件。\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \nandroid:orientation=\"vertical\"\nandroid:layout_width=\"fill_parent\"\nandroid:layout_height=\"\
  fill_parent\"\n>\n<TextView\n```\n\n\n  \n# 第六章：后台音频与网络音频\n\n`android:layout_width=\"\
  fill_parent\"`\n\n`android:layout_height=\"wrap_content\"`\n\n`android:text=\"后台音频播放器\"\
  `\n\n`/>`\n\n`<Button android:text=\"开始播放\" android:id=\"@+id/StartPlaybackButton\"\
  `  \n`android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
  ></Button>`  \n`<Button android:text=\"停止播放\" android:id=\"@+id/StopPlaybackButton\"\
  `  \n`android:layout_width=\"wrap_content\" android:layout_height=\"wrap_content\"\
  ></Button>`  \n`</LinearLayout>`\n\n最后，这是该项目的 `AndroidManifest.xml`。\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    package=\"com.apress.proandroidmedia.ch06.backgroundaudio\"\n    android:versionCode=\"\
  1\"\n    android:versionName=\"1.0\">\n    <application android:icon=\"@drawable/icon\"\
  \ android:label=\"@string/app_name\">\n        <activity android:name=\".BackgroundAudioActivity\"\
  \n            android:label=\"@string/app_name\">\n            <intent-filter>\n\
