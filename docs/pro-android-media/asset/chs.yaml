  \                }\n            }\n        }\n    );\n}\n```\n\n\n\n## 第一章：Android\
  \ 图像处理入门\n\n下面是一个名为 `getBitmap` 的方法，它封装了图像缩放和加载所需的操作，这样我们就能在显示图像时避免本章前面讨论的内存问题。\n\
  \n```\nprivate Bitmap getBitmap(String imageFilePath)\n{\n    // 仅加载图像的尺寸，而非图像本身\n\
  \    BitmapFactory.Options bmpFactoryOptions = new BitmapFactory.Options();\n  \
  \  bmpFactoryOptions.inJustDecodeBounds = true;\n    Bitmap bmp = BitmapFactory.decodeFile(imageFilePath,\
  \ bmpFactoryOptions);\n\n    int heightRatio = (int) Math.ceil(bmpFactoryOptions.outHeight\n\
  \            / (float) DISPLAYHEIGHT);\n    int widthRatio = (int) Math.ceil(bmpFactoryOptions.outWidth\n\
  \            / (float) DISPLAYWIDTH);\n\n    Log.v(\"HEIGHTRATIO\", \"\" + heightRatio);\n\
  \    Log.v(\"WIDTHRATIO\", \"\" + widthRatio);\n\n    // 如果两个比例都大于 1，说明图像的某一边大于屏幕\n\
  \    if (heightRatio > 1 && widthRatio > 1) {\n        if (heightRatio > widthRatio)\
  \ {\n            // 高度比例更大，按高度比例进行缩放\n            bmpFactoryOptions.inSampleSize\
  \ = heightRatio;\n        } else {\n            // 宽度比例更大，按宽度比例进行缩放\n          \
  \  bmpFactoryOptions.inSampleSize = widthRatio;\n        }\n    }\n\n    // 真正地解码图像\n\
  \    bmpFactoryOptions.inJustDecodeBounds = false;\n    bmp = BitmapFactory.decodeFile(imageFilePath,\
  \ bmpFactoryOptions);\n    return bmp;\n}\n```\n\n以下是配合上述活动使用的布局 XML 文件。它应该放在 `res/layout/main.xml`\
