  **外部字体**


  在 Android 应用程序中，我们并不局限于仅使用内置字体。Android 支持从任何 TrueType 字体文件创建 `Typeface` 对象。TrueType
  字体是一种标准字体，可在多种平台上使用。这为我们的应用程序开辟了广阔的可能性。


  互联网上许多网站提供免费字体，当然，也有一些字体公司，即创建字体并向您出售其字体使用许可的公司。


  我发现一种与 Android 内置字体完全不同的字体，是 Claude Pelletier 创作的 Chopin Script 字体。该字体属于公共领域，可从
  fontspace.com（[www.fontspace.com/diogene/chopinscript](http://www.fontspace.com/diogene/chopinscript)）等多种来源免费下载。为了使用该字体，我下载了它，并将
  `.ttf` 文件（`ChopinScript.ttf`）放入项目的 `assets` 文件夹中。


  `Typeface.createFromAsset` 方法接收一个 `AssetManager` 对象（可以通过从 `Context` 调用 `getAssets`
  获取）和文件名。它返回一个 `Typeface` 对象，该对象可以传递给 `Paint.setTypeface` 方法。


  ```

  Typeface chops = Typeface.createFromAsset(getAssets(), "ChopinScript.ttf");

  paint.setTypeface(chops);

  ```


  ![](img/index-106_1.png)


