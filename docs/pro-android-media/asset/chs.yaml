  \ 的其他方法来添加更多功能。\n\n\n\n### MediaRecorder 的其他方法\n\n`MediaRecorder`还提供了多种其他方法，可用于音频捕获相关操作。\n\
  \n*   `getMaxAmplitude()`: 允许我们获取`MediaPlayer`已录制音频的最大振幅。每次调用该方法时，该值都会重置，因此每次调用都会返回自上次调用以来的最大振幅。可以通过定期调用此方法来实现音频电平表。\n\
