  \        {\n            camera.release();\n        }\n    }\n\n    public void surfaceDestroyed(SurfaceHolder\
  \ holder) {\n        camera.stopPreview();\n        camera.release();\n    }\n\n\
  \    public void onPictureTaken(byte[] data, Camera camera) {\n        Uri imageFileUri\
