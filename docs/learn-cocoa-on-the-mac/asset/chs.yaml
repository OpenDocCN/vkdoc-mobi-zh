  \ Villain”，而是使用 Cocoa 内置的图形图像之一，使其看起来像其他应用程序中的“添加”按钮。在按钮仍处于选中状态时，打开属性检查器，找到图像（Image）组合框。点击组合框右端的小三角形，开始输入`\"\
  nsaddtemplate\"`。当你看到它自动补全为`\"NSAddTemplate\"`时，按下 Enter 键，你会看到新按钮现在显示一个+号图像，覆盖在“Add\
  \ Villain”标签上。在图像组合框下方是另一个标记为“Alternate”的组合框。也将其设置为`NSAddTemplate`。再下方是一组标记为“Position”的按钮，指示图像（显示为正方形）相对于按钮标题（显示为一条线）的位置。选择仅显示正方形而没有文本的选项，按钮标题将消失。水平调整按钮大小，使其刚好能容纳图像，然后复制按钮（使用⌘D）制作另一个按钮。选中这第二个按钮，再次回到属性检查器中的图像组合框，开始输入`\"\
  nsremovetemplate\"`，这将在你的按钮中提供—号图像。同样，将备选图像也设置为`NSRemoveTemplate`。\n\n```\n\n\n\
  现在，请拿起`Add`按钮，将其拖拽至距离窗口底部边缘稍上方一点的位置，利用蓝色参考线使其左侧边缘与表格视图（Table View）的左侧边缘对齐，并使其底部边缘与窗口底部保持建议的距离。再将`Remove`按钮拖拽至`Add`按钮的正右侧——它会自动吸附到与`Add`按钮保持合适间距的位置。接着，调整表格视图（Table\
