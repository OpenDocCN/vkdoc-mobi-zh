  在了解一些理论之后，我们将构建一个应用程序。该应用将有一个包含标签、文本字段和滑块的单一窗口。当用户移动滑块时，文本字段会自动更新以显示滑块的值。在本章中，我们仍然不会编写任何代码；所有操作都将通过
  Interface Builder 完成——但请稍安勿躁，因为我们将在下一章启用 Objective-C 编译器。Cocoa 用户界面与应用代码交互的方式，就是
  Cocoa 控件彼此交互的方式。我们将首先将 Cocoa 控件相互连接，以了解其实现方法，然后在下一章中，我们将把它们连接到自己的代码上。


  这个应用很简单，但用来创建它的机制与你在 Cocoa 中几乎所有用户交互中使用的机制相同，因此理解本章内容至关重要。




  ## 框架，无处不在的框架


  在 Mac OS X 中，Apple 将代码和支持文件分组到名为 `framework` 的特殊文件夹（或包）中。`framework` 类似于大多数平台上使用的库，但它们更灵活，因为是文件夹而非平面文件。`framework`
  可以包含图像、声音和影片，甚至可以包含其他 `framework`。


  尽管 OS X 支持传统的 Unix 库，但操作系统的许多功能以及几乎所有使 OS X 独一无二的功能都包含在这些 `framework` 中。构成核心操作系统的
  `framework` 有数十个，通常按功能分组。


  **提示**：你可以通过查看 `/System/Library/Frameworks` 文件夹来了解构成 Mac OS X 的 `framework`。这些 `framework`
  绝对、永远不应该被触碰，所以只看一眼，然后悄悄退出文件夹，以免被它们“发现”。如果你触碰它们，它们可能会变成讨厌的小东西。你还可以通过查看 `/Library/Frameworks`
  来了解系统中安装的第三方和可选 `framework`。通常，你 Mac 上安装的程序所需的 `framework` 就位于此处。同样，只看不动，否则可能会搞乱一些重要的东西。事实上，如果你运行的是
  Mountain Lion，`/Library` 目录在 Finder 中默认是隐藏的。


  虽然有很多 `framework`，但在 Cocoa 编程中，绝大部分时间你只使用来自少数 `framework` 的对象。实际上，你将使用的大部分对象都来自一个单一的
  `framework`，名为 **Cocoa 框架**（这并不意外）。


  还记得我们说过 `framework` 可以包含其他 `framework` 吗？实际上，Cocoa 框架只是一个包装器，它封装了另外三个 `framework`，这些框架包含了编写
  Cocoa 应用程序时所需的大部分功能：**Foundation 框架**、**AppKit 框架**和 **Core Data 框架**。


  你会定期使用其他 `framework` 的功能。例如，你可能使用 Core Animation 框架为界面添加一些漂亮的动画，或使用 Core Image 框架进行复杂的图像处理。但绝大多数对象将来自构成
  Cocoa 的三个 `framework`。我们将从第 7 章开始讨论 Core Data 框架，但让我们先花点时间简要看看另外两个框架，本章将用到它们。


  ### Foundation 框架


  Foundation 框架名副其实。它包含了几乎所有其他部分赖以构建的对象。Foundation 框架在 Cocoa 和 Cocoa Touch 之间共享。尽管
  Foundation 框架已经进化，但其中许多对象自 NeXTStep 早期就已存在，且基本用法变化不大。Foundation 包含诸如 `NSString`（用于表示
  Cocoa 中文本的类）以及集合类（如 `NSArray` 和 `NSDictionary`）等对象。你从学习 Objective-C 开始就应该已经对 Foundation
  框架有一定了解。


  ### AppKit 框架


  看看你的 Mac 屏幕。你在那里看到的几乎所有内容都是 AppKit 的领域。这个框架包含用于创建或管理用户界面的所有对象。有创建按钮、窗口、文本字段、标签栏等对象。任何你在多个应用程序中见过的用户界面元素，很可能都是
  AppKit 框架的一部分。上一章中你免费获得的所有酷炫功能？是的，全是 AppKit 的功劳。本章我们将构建的应用程序，也完全基于 AppKit。


  ### Cocoa 之道：模型-视图-控制器


  在深入探讨如何使用这些框架之前，我们需要讨论一个非常重要的理论。Cocoa 的设计者遵循一个名为**模型-视图-控制器 (MVC)** 的概念，这是一种非常合理的方式来划分构成
  GUI 应用程序的代码。如今，几乎所有面向对象的应用程序框架都或多或少地向 MVC 致敬，但很少有像 Cocoa 这样忠于 MVC 模型，或使用它如此之久的。


  MVC 模型将所有功能划分为以下三个不同的类别：


  *   **模型**：持有应用程序数据的类。

  *   **视图**：用户可以看到并与之交互的窗口、控件和其他元素。

  *   **控制器**：将模型和视图绑定在一起，包含决定如何处理用户输入的应用程序逻辑的部分。


  MVC 的目标是使实现这三类代码的对象尽可能彼此区分开来。你编写的任何对象都应能明确识别为属于三个类别之一，并且其中几乎没有或完全没有可归类于其他两个类别的功能。例如，实现按钮的对象不应包含处理按钮点击时数据的代码，而实现银行账户的代码不应包含绘制表格以显示其交易的代码。


  MVC 有助于确保最大的可复用性。一个实现通用按钮的类可以在任何应用中使用。而一个实现特定计算按钮的类，只能在最初编写它的应用中使用。


  当你编写 Cocoa 应用程序时，你将主要使用 Interface Builder 创建视图组件，但有时也会通过代码修改界面，或者你可能子类化现有的视图和控件类来创建新的。


  模型将通过使用 Core Data 或设计 Objective-C 类来持有应用程序数据。在本章的应用程序中，我们不会创建任何模型对象，因为我们还不打算存储数据，但我们将在下一章介绍非常简单的模型对象，并在第
  8 章开始使用 Core Data 时，转向完整的模型对象。


  控制器组件通常由我们创建的、特定于应用程序的类组成。控制器可以是完全自定义的类（`NSObject` 子类），这是 Cocoa 中的传统做法。几年前，Apple
  开始向 AppKit 框架中引入通用控制器类，这些类为我们处理某些基本任务，例如处理要在列表中显示的对象数组。这对于最小化样板代码非常有用。


  随着我们深入了解 Cocoa，你会很快开始看到 AppKit 框架的类如何遵循 MVC 原则。如果在开发时把这一概念牢记在心，你将创建出更清晰、更易于维护的代码。


  ## Outlets、Actions 和控制器


  显然，如果无法从代码中获取数据、输出数据或更改其外观，用户界面就没多大用处。在 Cocoa 中，我们使用 `outlet` 和 `action` 来与我们在 Interface
  Builder 中设计的用户界面进行交互。


  *   **`Outlets`**：指向 nib 文件中对象的指针。`Outlets` 允许我们从代码访问 nib 中的对象。

  *   **`Actions`**：可以直接作为用户交互结果（例如点击按钮）执行的方法。它们是应用程序对象响应用户输入的方式，无论这些对象是框架类还是我们自己的代码。


  `Outlets` 和 `Actions` 通常包含在控制器类中（尽管有时也在其他地方使用）。在本章中，我们将使用 AppKit 的两个类（`NSSlider`
  和 `NSTextField`）暴露的 `outlet` 和 `action` 来演示如何操作。在下一章中，我们将编写自己的 `outlet` 和 `action`。




  ### 输出口（Outlets）


  输出口是使用特殊关键字 `IBOutlet` 声明的 Objective-C 实例变量。输出口本质上只是一个可以链接到用户界面中某个对象的对象指针。由于 Cocoa
  对象是 Objective-C 对象，因此它们拥有实例变量和方法。`IBOutlet` 关键字向 Xcode 的 Interface Builder 指明哪些实例变量是用于构建用户界面的。


  ### 动作（Actions）


  动作是可直接从应用程序用户界面调用的 Objective-C 方法。它们与我们编写过的其他 Objective-C 方法一样，是普通方法，但会在用户界面控件被使用时执行。例如，如果我们将一个按钮链接到某个动作方法，那么每当该按钮被点击时，动作方法中的代码就会被触发。如果我们将一个文本字段链接到某个动作，那么每当用户通过按
  Tab 键离开该文本字段或切换到其他控件时，其动作方法就会被触发。具体触发方法的条件取决于链接对象的类型，有时还取决于该对象属性的设置方式。例如，一个滑块可能仅在用户释放鼠标按钮后触发一次动作方法，也可能在滑块被拖动时反复触发该方法——具体取决于我们在
  Interface Builder 中如何配置滑块实例。本章中我们将尝试这两种操作模式。


  动作的创建方式与其他 Objective-C 方法完全相同，但必须使用特殊返回类型 `IBAction` 进行声明。动作必须接受一个参数（通常声明为 `id`
  类型）。该参数用于告知方法是哪个界面控件调用了它。


