  \ `MovingButton` 目标（见图 15-4）。\n\n![A978-1-4302-4543-8_15_Fig4_HTML.jpg](img/A978-1-4302-4543-8_15_Fig4_HTML.jpg)\n\
  \n图 15-4. 将现有文件添加到项目\n\n这次，我们不在控制器定义中设置指向此控件的绑定，而是添加一个出口属性，以便能够访问我们将要设置的 `CECurveView`。修改\
  \ `MBAppDelegate.h`，添加以下粗体行：\n\n\n\n"
