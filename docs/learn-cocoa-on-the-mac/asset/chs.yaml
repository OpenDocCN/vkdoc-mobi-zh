- "# 数据录入窗口\n\n数据模型就绪后，是时候开始构建图形用户界面了。本章主要介绍的\"搜索窗口\"是其中的亮点。但在有数据可供搜索之前，我们无法进行任何搜索，因此我们将从创建用于数据录入的\
  \ GUI 部分开始。为此，我们将制作一个非常基础的 GUI——在单个窗口中显示节目和引文，并且仅显示与当前选中节目关联的引文。\n\n## 分两部分的窗口\n\
  \n在 Xcode 项目中双击 `MainMenu.xib`，在 Interface Builder 窗格中打开它。这会打开之前使用过的标准空白应用程序 Nib\
  \ 文件。在主 Nib 窗口中选择 `NSWindow` 实例，然后使用大小调整控件使其变高（大约为原始高度的两倍）。我们需要这个空间，因为将在此放置两组视图，一组用于\
  \ `Show` 实体，另一组用于 `Quote` 实体。\n\n## 显示节目\n\n首先从 `Show` 的视图开始。从对象库中拖出一个 `NSTableView`，将其放置在窗口顶部附近。调整其大小以占据大部分空间。这次不必担心蓝色参考线；实际上，使其比参考线建议的尺寸稍小。我们将把它与一些其他控件一起分组到一个方框中，因此尺寸问题暂时不关键。打开属性检查器，将表格视图设置为基于视图的，并带有一列。调整列本身以占据表格视图的宽度，并将列名称设置为\"\
  名称\"。拖出一个按钮，将其放置在表格视图右下角的下方，并将其标签设置为\"添加\"。再拖出另一个相同类型的按钮，将其放置在\"添加\"按钮的左侧，并将其标签设置为\"\
  移除\"。选中这三个控件，然后将它们分组到一个方框中（选择\"编辑器\"➤\"嵌入到\"➤\"方框\"）。将方框的标题设置为\"节目\"。现在，我们可以根据窗口调整方框的大小，然后调整方框内的表格视图，以获得令人满意的布局。\n\
  \n现在我们已经有了一个列出节目的位置，需要将它们连接到 Core Data 模型，我们将使用 Cocoa 绑定和 `NSArrayController` 作为中间件。从对象库中拖出一个数组控制器，并将其标题设置为\"\
  Shows\"。在属性检查器中，将\"模式\"弹出菜单设置为\"实体名称\"，然后在\"实体名称\"字段中输入\"Show\"，以将其连接到模型编辑器中的 `Show`\
  \ 实体。勾选\"准备内容\"复选框，这将指示数组控制器在启动时加载所有 `Shows`。切换到绑定检查器。将\"托管对象上下文\"（位于绑定列表底部）绑定到\"\
  App Delegate\"，并将\"模型键路径\"设置为 `managedObjectContext`。\n\n对于绑定，我们从表格视图开始。选择表格视图，然后打开绑定检查器。展开\"\
  表格内容\"下的\"内容\"部分，勾选\"绑定到\"旁边的复选框。弹出菜单应显示\"Shows\"。默认的控制器键 `arrangedObjects` 正是我们需要的，且\"\
  模型键路径\"无需填写。我们还需要数组控制器知道选中的行，因此将\"选择索引\"绑定到\"Shows\"，并在此将控制器键设置为 `selectionIndexes`。然后，使用对象停靠栏，深入表格视图内的视图层次结构，找到\"\
  静态文本 - 表格视图单元格\"。在属性检查器中，将\"行为\"更改为\"可编辑\"。然后，在绑定检查器中，将\"值\"绑定到\"表格单元格视图\"，并将其\"\
  模型键路径\"设置为 `objectValue.name`。\n\n至此，表格视图的部分就完成了。要完成窗口中与 `Shows` 相关的部分，我们需要连接按钮。这类似于上一章的做法——结合目标-动作来处理点击，以及使用\
