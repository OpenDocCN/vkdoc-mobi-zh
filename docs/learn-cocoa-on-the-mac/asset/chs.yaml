  \    [result appendFormat:\n        @\"Allows Orc: %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedOrc]\
  \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Goblin: %@\\\
  n\",\n        [ud boolForKey:kMonsterTypeAllowedGoblin] ? @\"YES\" : @\"NO\"];\n\
  \    [result appendFormat:\n        @\"Allows Ogre: %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedOgre]\
  \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Skeleton:\
  \ %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedSkeleton] ? @\"YES\" : @\"\
  NO\"];\n    [result appendFormat:\n        @\"Allows Troll: %@\\n\",\n        [ud\
  \ boolForKey:kMonsterTypeAllowedTroll] ? @\"YES\" : @\"NO\"];\n}\n```\n\n\n\n`[result\
  \ appendFormat:`\n`@\"允许吸血鬼: %@\\n\"`,\n`[ud boolForKey:kMonsterTypeAllowedVampire]\
  \ ? @\"是\" : @\"否\"];`\n\n`[result appendFormat:`\n`@\"允许魅魔: %@\\n\"`,\n`[ud boolForKey:kMonsterTypeAllowedSuccubus]\
  \ ? @\"是\" : @\"否\"];`\n\n`[result appendFormat:`\n`@\"允许修格斯: %@\\n\"`,\n`[ud boolForKey:kMonsterTypeAllowedShoggoth]\
  \ ? @\"是\" : @\"否\"];`\n\n`[self.monsterLabel setStringValue:result];`\n`}`\n\n\
  `- (IBAction)createDungeon:(id)sender {`\n`NSUserDefaults *ud = [NSUserDefaults\
  \ standardUserDefaults];`\n`NSMutableString *result = [NSMutableString stringWithCapacity:1024];`\n\
  `[result appendString:@\"正在根据以下参数生成地下城：\\n-----------------\\n\"];`\n`[result appendFormat:`\n\
  `@\"隧道蜿蜒程度：%ld\\n\"`,\n`[ud integerForKey:kDungeonTunnelTwistiness]];`\n`[result\
  \ appendFormat:`\n`@\"怪物出现频率：%ld\\n\"`,\n`[ud integerForKey:kDungeonMonsterFrequency]];`\n\
  `[result appendFormat:`\n`@\"宝藏出现频率：%ld\\n\"`,\n`[ud integerForKey:kDungeonTreasureFrequency]];`\n\
  `[self.dungeonLabel setStringValue:result];`\n`}`\n\n有了这些方法，我们应该可以编译并运行`DungeonThing`，修改偏好设置窗口中每个选项卡下的所有值，并看到修改后的值反映在输出文本字段中。`DungeonThing`的第一个版本现在已经完成了！\n\
  \n**注意**\n\n我们使用`NSUserDefaults`对象来保存偏好设置窗口中的设置。几乎所有 Cocoa 应用都使用`NSUserDefaults`来保存用户设置。我们还没有讨论如何使用终端程序访问\
  \ Unix 命令行，但`NSUserDefaults`系统的特性之一就是支持命令行访问。如果你对此感兴趣，请打开`Terminal.app`（在 Finder\
  \ 中，你可以在应用程序的`实用工具`文件夹找到它），然后输入\n\n`defaults read com.learncocoa.DungeonThing`\n\
  \n如果你输入\n\n`defaults domains`\n\n你将获得所有将其默认设置存储在`NSUserDefaults`系统中的应用程序列表，并且你可以查看其中任何一个应用程序存储的所有设置。祝你探索愉快！\n\
  \n## 绑定到表格视图\n\n`DungeonThing`就其功能而言是不错的（当然，除了它实际上并未生成游戏对象这一点），但如果你“在生产环境中”使用这样的系统（例如在玩龙与地下城或类似游戏时），你会很快遇到一个主要问题：随机生成的游戏对象无法以任何方式保留！例如，一旦你点击创建新的随机角色，前一个角色就会被彻底抹去，而且你再也无法查看它。\n\
  \n对于`DungeonThing`的下一个迭代，我们将添加一些表格视图来展示所有已创建游戏对象的列表。在表格视图中点击一个游戏对象，将在相关文本字段中显示其值。与第\
  \ 6 章中我们展示如何在自己的代码中处理表格视图不同，这里我们将演示如何使用`NSArrayController`类——这是 Cocoa 自带的一个通用控制器类，借助\
  \ Cocoa 绑定，我们无需任何自定义代码即可管理这些表格视图的显示。我们需要向`DungeonThingAppDelegate`类添加一些输出口和其他实例变量，用于三个`NSArrayController`实例和三个数组（每种游戏对象类型对应一个数组）。我们还将移除刚才添加的`NSTextField`输出口，因为这些输出口也将通过绑定来配置以显示其内容。最后，我们只需稍微修改操作方法，将每个创建的对象插入到相应的数组中。完成后，源代码的大小将几乎相同，因为表格视图的所有配置都是在\
  \ nib 文件中完成的。\n\n我们将首先向`DungeonThingAppDelegate`添加一些属性，并修改我们的`create:`方法以使用这些新属性。在\
  \ Interface Builder 中使用绑定之前，我们需要先在代码中进行设置。然后我们将转到 Interface Builder 连接绑定，再回到代码进行一些清理工作。\n\
  \n### 使代码支持绑定\n\n让我们从修改头文件开始。为了维护已生成对象的列表，我们的`DungeonThingAppDelegate`需要三个新的`NSMutableArray`实例变量，每个实例变量对应一种游戏对象。这些实例变量无法从\
  \ Interface Builder 内部创建；我们需要显式声明它们。每个数组将由 nib 文件中的一个`NSArrayController`管理，稍后我们将在\
  \ Interface Builder 中创建和配置该控制器。我们将这三个`NSMutableArrays`声明为属性，以便`NSArrayControllers`能够方便地访问它们。我们需要在`DungeonThingAppDelegate.h`中进行的修改如下：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@interface DungeonThingAppDelegate : NSObject\
  \ <NSApplicationDelegate>\n\n// 添加以下三个属性：\n@property (strong) NSMutableDictionary\
  \ *characters;\n@property (strong) NSMutableDictionary *monsters;\n@property (strong)\
  \ NSMutableDictionary *dungeons;\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet NSTextField *characterLabel;\n@property (weak) IBOutlet\
  \ NSTextField *monsterLabel;\n@property (weak) IBOutlet NSTextField *dungeonLabel;\n\
  \n- (IBAction)createCharacter:(id)sender;\n- (IBAction)createMonster:(id)sender;\n\
  - (IBAction)createDungeon:(id)sender;\n\n@end\n```\n\n在添加完这三个属性声明后，我们需要在`DungeonThingAppDelegate.m`文件中完成`NSMutableArray`实例的设置。我们将初始化`NSMutableArray`实例本身，并修改操作方法，将创建的值推送到我们的数组中，而不是直接在文本字段中显示值。\n\
  \n首先，让我们实现一个新的`init`方法来包含数组的初始化。将以下代码放置在`.m`文件中`@implementation DungeonThingAppDelegate`部分靠近顶部的位置：\n\
  \n```\n- (id)init {\n    if ((self = [super init])) {\n        self.characters =\
  \ [NSMutableArray array];\n        self.monsters = [NSMutableArray array];\n   \
  \     self.dungeons = [NSMutableArray array];\n    }\n    return self;\n}\n```\n\
  \n### 规范的 init 方法\n\n前面的代码片段展示了一个`init`方法的示例，该方法为类的实例变量创建值。这种`init`方法的形式相当标准，你很可能在大多数遇到的\
  \ Objective-C 类中看到类似的写法，但它做了一些乍看起来很奇怪的事情，因此值得稍作解释。该方法以这个特殊的`if`语句开头：\n\n```\nif\
  \ ((self = [super init])) {\n```\n\n这个`if`语句实际上一石二鸟（或更多）。首先，它调用了父类的`init`实现，并将其返回值赋给特殊变量`self`。然后，它检查赋值的结果本身（即赋值后的`self`的值），并且仅当其不等于评估为`false`的值（例如\
  \ nil 指针值）时，才执行后面的代码块。\n\n这种对`self`的使用方式，即为其赋值，确实非常罕见。事实上，我们看到为`self`赋值的代码的唯一情况，就是在像这样的`init`方法中。这样做的原因是为了应对一种可能性（尽管很小），即父类的`init`方法可能返回与最初`self`所指向的值不同的值。一方面，父类可能因为某种原因无法正确初始化自身，并通过从`init`方法返回\
  \ nil 来发出信号，这是处理对象初始化失败的“标准”方式（而不是抛出异常）。在这种情况下，类会注意到 nil 值并跳过`if`语句后面的代码块，直接执行到方法末尾，并返回此时`self`所指向的值，而该值现在为\
  \ nil。\n\n\n\n父类的`init`方法可能返回的另一个替代值是一个完全不同的实例。这种设计思路是，父类可能拥有一个巧妙的方案，用于在私有池中回收对象，而不是不断地释放和创建新对象。该方案的一部分是，`init`方法有时会返回一个旧的、二手的对象，而不是我们刚刚试图创建的崭新对象。这种情况是否现实，在\
  \ Cocoa 程序员中偶尔会有争论。在这里，我们本着谨慎的原则编写`init`方法，以允许这种可能性。\n\n以上就是我们在 Interface Builder\
  \ 中开始连接事物所需的所有代码修改！请注意，与第 6 章中的示例不同，这里的代码完全不需要对表视图做任何处理。无需实现`delegate`或`dataSource`方法，无需指向表视图的`outlet`，什么都不用做。得益于绑定和`NSArrayController`，表视图将自行处理一切。\n\
  \n### 配置表视图和文本视图\n\n现在，我们可以开始操作 nib 文件了。我们将创建一些表视图，添加一些数组控制器对象，并为它们设置与添加到`DungeonThingAppDelegate`中的新数组之间的绑定。我们还会配置现有的文本字段，使其通过绑定获取数据。在\
  \ Xcode 中单击`MainMenu.xib`文件，即可返回 Interface Builder 画布。\n\n我们将从修改主应用程序窗口开始。第一步是在窗口中为新的表视图腾出空间。我们将在每组现有视图的下方创建三个“历史记录”表视图，因此需要让窗口变得更高（但可以保持当前宽度不变）。使用窗口右下角的调整大小控件，将窗口高度增加到当前高度的大约两倍。蓝色参考线将帮助我们保持当前宽度。\n\
  \n在对象库面板中，搜索“table”，然后将结果中的表视图拖入窗口。将其放置，使其左上角正好位于最左侧框的左下角下方，然后抓住表视图右下角的调整大小手柄，向下拖动，直到表格填满窗口底部的大部分可用空间，并且其左右边缘与上方框的边缘对齐，如图\
  \ 7-11 所示。\n\n![A978-1-4302-4543-8_7_Fig11_HTML.jpg](img/A978-1-4302-4543-8_7_Fig11_HTML.jpg)\n\
  \n图 7-11. 将表格添加到窗口中\n\n在我们的历史记录表中，我们只打算显示对象被创建的时间。用户随后可以点击某一行，以在上方的文本字段中查看相应的对象。这意味着我们只需要表格中有一列，因此请打开属性检查器（⌥⌘4）。选中表视图（它位于滚动视图内部，因此需要点击两次才能选中表视图本身）。在检查器中，将列数改为\
  \ 1，并将内容模式设置为基于视图，而非基于单元格。\n\n接下来，调整剩余列的宽度，使其填满整个表格。请点击表格标题，直到整个表格标题被选中。然后将鼠标悬停在表格列标题边缘的竖线上，向右拖动，直到该列填满整个表格。\n\
  \n最后，禁用剩余列的编辑功能，因为我们不希望用户更改已创建对象的时间戳。点击表格列，直到它被选中，然后打开属性检查器（⌥⌘4），并单击关闭“可编辑”复选框。接着，将调整大小方式从“两者”改为“随表格自动调整大小”，因为没有理由让用户调整表视图唯一列的宽度。\n\
  \n至此，表视图及其列的图形布局已完成，除了绑定之外，其他所有配置都已就绪。现在正是复制我们刚创建好的、用于显示角色的表格的绝佳时机，这样我们就可以对怪物和地下城使用完全相同的配置。点击窗口背景，然后点击一次表视图以将其选中（连同其包含的`NSScrollView`）。现在按下⌘D\
  \ 来复制该表视图，并将新表视图拖到中间视图组底部的位置。然后再次按下⌘D，并将最后一个表视图拖到窗口右下角的位置。对于这两个表视图，我们当然也会使用蓝色参考线来帮助正确对齐。图\
  \ 7-12 显示了最终的布局。\n\n![A978-1-4302-4543-8_7_Fig12_HTML.jpg](img/A978-1-4302-4543-8_7_Fig12_HTML.jpg)\n\
  \n图 7-12. 最终的 DungeonThing 窗口布局\n\n\n\n### 创建与配置数组控制器\n\n现在，我们需要添加一个`NSArrayController`，以便为第一组对象（角色）配置一些绑定。在对象库面板中，搜索“array”。请注意结果中出现的数组控制器；这是`NSArrayController`对象的一个实例。将其拖拽至界面构建器画布最左侧的对象停靠区。如果该停靠区尚未展开，请点击界面构建器画布左下角的展开三角形以展开它。`NSArrayController`需要一个更有意义的名称，因此请缓慢双击“Array\
  \ Controller”文本（就像在 Finder 中重命名文件一样）来编辑名称。我们将使用此控制器来提供对角色数组的访问，因此将其命名为“characters”。为这个顶级\
  \ nib 对象赋予一个独特的名称，稍后当我们向此 nib 添加另外两个数组控制器时会有所帮助。（请注意，在 Xcode 4.5 的初始版本中，更改名称后，对象停靠区中的名称可能不会刷新。如果发生这种情况，可以双击对象停靠区的展开三角形两次来使新名称显示出来。）\n\
  \n为了让我们的`DungeonThingAppDelegate`能够使用`NSArrayController`实例，我们需要向应用程序委托添加输出口。像之前一样，打开一个助理编辑器面板，并显示`DungeonThingAppDelegate.h`文件。从新的角色数组控制器按住\
  \ Control 键拖拽到`DungeonThingAppDelegate.h`文件中，并创建一个名为`characterArrayController`的新输出口。\n\
  \n接下来，再次点击数组控制器，并调出属性检查器（`⌥⌘4`）。我们会看到顶部有一些选项，可以用来微调数组控制器的行为，但现在我们保持它们不变。我们需要配置的是检查器下部，在对象控制器（Object\
  \ Controller）部分。确保模式（Mode）设置为类（Class），并且类名称为`NSMutableDictionary`。此配置告诉控制器，它处理的模型对象是`NSMutableDictionary`的实例，这是一个“普通”类（而不是实体，后者将在第\
  \ 7 章中作为 Core Data 的一部分进行介绍）。在此之下，我们会看到一个表格视图，列出了数组控制器应该能够在模型对象中访问的属性。点击表格视图下方的\
  \ + 按钮，输入`createdObject`，然后再次点击 + ，输入`timestamp`。图 7-13 展示了数组控制器的完整属性配置。\n\n![A978-1-4302-4543-8_7_Fig13_HTML.jpg](img/A978-1-4302-4543-8_7_Fig13_HTML.jpg)\n\
  \n图 7-13。  \n第一个`NSArrayController`的已配置属性\n\n是的，这些就是我们在代码中用于每次用户点击按钮时创建`NSMutableDictionary`所使用的键。我们现在将使用这些键为我们的\
  \ GUI 对象创建绑定。\n\n接下来，我们需要配置一个绑定，但这次不是针对 GUI 对象，而是针对数组控制器本身！实际上，`NSArrayController`不仅是一个提供绑定就绪的模型对象访问的提供者，它也是一个消费者，通过\
  \ Cocoa 绑定从另一个对象检索其内容数组。在我们的例子中，它将从`DungeonThingAppDelegate`的角色数组中获取内容。保持数组控制器被选中，调出绑定检查器（`⌥⌘7`）。点击内容数组（Content\
  \ Array）旁边的展开三角形以打开它，并通过从弹出列表中选择 Dungeon Thing App Delegate，在模型键路径（Model Key Path）字段中输入`characters`，然后按回车键来设置所需的绑定。请注意，我们的`DungeonThingAppDelegate`无需特殊准备即可支持绑定。我们所要做的就是将一个实例变量作为属性公开（就像我们对三个内容数组所做的那样），然后我们就可以立即用它来绑定其他对象了！\n\
  \n现在，我们已经添加了一个`NSArrayController`，并将其配置为从我们的`DungeonThingAppDelegate`访问正确的数据。接下来，是时候将一些\
  \ GUI 对象绑定到这个新控制器上了。\n\n### 通过数组控制器绑定表格显示\n\n首先，我们将为表格视图设置一个简单的绑定。我们将把表格视图的内容（Content）绑定到角色数组（通过数组控制器），然后让表格视图单元格从每个模型对象中获取`timestamp`属性。\n\
  \n操作方法如下：通过点击界面构建器画布左侧对象停靠区中的层级来选中表格视图，然后在绑定检查器（`⌥⌘7`）中打开值（Value）绑定配置部分。从弹出列表中选择\
  \ characters，然后在控制器键（Controller Key）组合框中选择`arrangedObjects`。这将表格视图连接到数组控制器，并且对于数组控制器管理的每个对象，它会在表格视图中创建一行，并设置该行的`objectValue`属性。我们之前提到过，控制器键组合框允许我们选择通过其进行绑定的控制器对象的不同方面。在这种情况下，通过`arrangedObjects`绑定意味着我们绑定到整个排序后的对象数组。这种绑定通常只适用于能够显示整个内容数组的视图对象，例如表格。\n\
  \n接下来，展开选择索引（Selection Indices）绑定配置部分（就在值部分下方）。再次从弹出列表中选择 characters，这次在控制器键组合框中输入`selectionIndices`。这告诉数组控制器表格视图中选择了哪一行（或哪些行），并将选择状态传递给绑定到该数组控制器的任何其他对象。特别是，当选择更改时，文本字段将通过这种方式得到更新。\n\
  \n现在，我们需要为表格视图中包含的每个子视图建立一个绑定，以便从`objectValue`中提取适当的信息。由于我们只有一个列和一个视图——一个`NSTableCellView`——这很简单。`NSTableCellView`有一个内嵌的`NSTextField`，这正是我们需要绑定的。在表格视图中选择表格单元格视图内的“Static\
  \ Text - Table View Cell”条目（从左侧展开的对象停靠区操作最容易）。在绑定检查器中，选择绑定到表格单元格视图（Table Cell View），然后在模型键路径（Model\
  \ Key Path）中输入`objectValue.timestamp`。这告诉`NSTextField`使用绑定到内嵌了该文本字段的`NSTableCellView`的对象的`timestamp`属性。\n\
  \n### 通过数组控制器的选择绑定文本字段\n\n角色部分需要完成的最后一个绑定是针对显示值的文本字段。这个绑定也将通过数组控制器完成，从控制器的选定对象中获取`createdObject`属性。\n\
  \n点击以选择左侧框中的文本字段。第一次点击可能会选中框本身，再次点击则会选中文本字段。现在再次查看绑定检查器，找到值（Value）绑定配置。从弹出列表中选择\
  \ characters，从控制器键组合框中选择`selection`，从模型键路径组合框中选择`createdObject`，然后点击以打开绑定（Bind）复选框。请注意，通过为控制器键选择`selection`，我们指定了数组控制器将只向此控件提供选定的对象，而不是像对表格列那样提供整个数组。\n\
  \n\n\n### 填充数组\n\n现在我们需要回到代码中。在编辑器中打开 `DungeonThingAppDelegate.m`。为了让表格视图显示内容，我们需要向\
  \ `NSArrayController` 中放入一些数据。为此，我们将在 `createCharacter:` 操作方法末尾修改一行代码。不再将由该方法生成的摘要文本直接放入文本字段，而是将每个摘要添加到一个数组中，并使用\
  \ `NSArrayController` 来完成此操作，这样所有依赖的视图（任何通过同一个 `NSArrayController` 进行绑定的视图）也会自动更新。我们不是将纯字符串插入数组，而是创建一个包含所创建对象和当前时间的\
  \ `NSMutableDictionary`，将该字典作为最简单的模型对象，包含两个带键值。在 `createCharacter:` 末尾实现此更改，将\n\n\
  `[self.characterLabel setStringValue:result];`\n\n修改为\n\n```\n[self.characterArrayController\
  \ addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n  result, @\"createdObject\"\
  ,\n  [NSDate date], @\"timestamp\",\n  nil]];\n```\n\n回想一下，我们在 Interface Builder\
  \ 中设置的 `NSArrayController` 里使用了 `createdObject` 和 `timestamp` 作为键，并且表格视图中的文本字段也使用了这些键进行绑定。通过使用这些键名将对象放入数组，我们就能让绑定将这些值再提取出来。\n\
  \n事实上，在处理代码的同时，我们还可以移除 `DungeonThingAppDelegate.h` 文件中的 `characterLabel` 的 `@property`\
  \ 声明。代码中已经没有任何地方引用这个属性了，保持代码整洁是一个好习惯。\n\n### 确保运行正常\n\n好了，准备工作已经做了很多。现在启动程序看看会发生什么；构建并运行应用程序。我们应该能够创建一个新角色，并看到它出现在文本字段中，同时在下面的表格中显示一个时间戳条目。修改一些偏好设置，然后创建另一个角色，观察文本字段中出现新的参数摘要，表格视图中也出现新的时间戳。点击行进行切换，查看文本字段中的值是否相应改变。\n\
  \n如果以上任何功能未能正常工作，请返回 nib 文件，仔细检查绑定的配置，以及 `DungeonThingAppDelegate` 与数组控制器的连接。\n\n\
  ### 重复操作\n\n现在我们已经完全通过绑定来处理角色，我们可以回过头来，对怪物和地下城做同样的操作。通过复制角色数组控制器（从而保留其现有配置，包括我们已经输入的键名）创建一个新的\
  \ `NSArrayController`，并将其命名为“monsters”以保持一致性。就像之前处理角色数组控制器一样，通过创建一个名为 `monsterArrayController`\
  \ 的新出口，将 monsters 连接到 `DungeonThingAppDelegate`，配置其 Content Array 和 Selected Indices\
  \ 绑定以连接到 `DungeonThingAppDelegate` 中的 `monsters` 属性，并通过 monsters 数组控制器配置两个相关的 GUI\
  \ 对象（表格列和文本字段），所有步骤如前所述。最后，通过将 `createMonster:` 操作方法的最后一行从\n\n`[self.monsterLabel\
  \ setStringValue:result];`\n\n修改为\n\n```\n[self.monsterArrayController addObject:[NSMutableDictionary\
  \ dictionaryWithObjectsAndKeys:\n  result, @\"createdObject\",\n  [NSDate date],\
  \ @\"timestamp\",\n  nil]];\n```\n\n构建并运行应用程序，确保一切正常，然后对地下城再重复一次全部操作。\n\n一旦创建了所有三个\
  \ `NSArrayController` 并设置了绑定，我们就可以移除 `DungeonThingAppDelegate.h` 中引用文本字段的 `monsterLabel`\
  \ 和 `dungeonLabel` 的 `@property` 声明，因为这些现在已通过绑定进行填充。\n\n## 好了，但这是如何实现的？\n\n现在你已经初步了解了\
  \ Cocoa 绑定，你可能会强烈感觉自己刚刚观看了一场魔术表演——并且想知道这些技巧到底是如何运作的！这种感觉完全可以理解。我们程序员习惯于需要详细说明数据的每一次移动和屏幕的每一次更新，而突然之间，我们发现在某处设置一个值就会导致某些看不见的力量将该值传播到屏幕上的其他视图。本节将尝试为你阐明这一过程，解释\
  \ Cocoa 中的键值编码和键值观察概念，以及 Cocoa 绑定如何利用它们来实现其魔法。\n\n### 键值编码\n\n首先，我们来谈谈键值编码（KVC）。KVC\
  \ 背后的理念是，允许我们通过使用与属性名或与某些 getter 和 setter 方法名相匹配的字符串来引用对象的属性。例如，假设我们有一个名为 `Person`\
  \ 的类，它包含一个 `firstName` 的概念，要么以名为 `firstName` 的实例变量的形式存在，要么以名为 `firstName` 和 `setFirstName:`\
  \ 的一对方法的形式存在。使用 KVC，我们可以通过以下咒语来访问一个人的 `firstName` 属性：\n\n```\n[myPerson setValue:@\"\
  Frodo\" forKey:@\"firstName\"];\n```\n\n给定键名 `firstName`，此方法调用首先检查该对象是否有一个名为 `setFirstName:`\
  \ 的方法，如果有，则调用它来设置值。如果这不起作用，它会检查是否存在名为 `firstName` 的实例变量，并尝试直接设置它。\n\n我们也可以类似地检索值：\n\
  \n```\nmyNameString = [myPerson valueForKey:@\"firstName\"];\n```\n\n这种情况下也会发生类似的查找过程。它首先查找名为\
  \ `firstName` 的方法，如果没有，则尝试查找同名的实例变量。\n\n所有这些的结果是，KVC 为我们提供了一种以极其通用的方式讨论对象属性的方法。不仅对象的属性存储对我们来说是透明的，甚至从外部访问属性的方式我们也不需要担心。它可能会改变，甚至可能在程序运行时改变，而我们都无法察觉到差异。\n\
  \n`setValue:forKey:` 和 `valueForKey:` 方法是在 `NSObject` 中定义的（并为 `NSArray` 和 `NSSet`\
  \ 等集合类提供了一些额外的扩展），以便在运行时根据键名确定访问值的最佳方式。这意味着它们可以在 Cocoa 中的每个类上随时使用。\n\n关于 KVC 的另一点补充是，用作键的字符串实际上可以作为一种路径来遍历对象之间的关系。例如，假设我们的\
  \ `Person` 类也包含一个名为 `mother` 的属性，它是指向另一个 `Person` 的指针。如果我们想设置 `myPerson` 的母亲的 `firstName`，在普通代码中我们可能会这样做之一：\n\
  \n```\nmyPerson.mother.firstName = @\"Anne\";\n[myPerson.mother setFirstName:@\"\
  Anne\"];\n[[myPerson mother] setFirstName:@\"Anne\"];\n```\n\n使用 KVC，我们有另一种方法来实现这一点：\n\
  \n```\n[myPerson setValue:@\"Anne\" forKeyPath:@\"mother.firstName\"];\n```\n\n\
  KVC 方法足够智能，可以查看键字符串，按路径进行拆分，并遍历路径中提到的任何对象关系，因此上一行最终会调用类似这样的内容：\n\n```\n[[myPerson\
  \ valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"firstName\"];\n```\n\n虽然这两种\
  \ KVC 选项在我们自己的代码中常规使用时都不太吸引人（因为“普通”版本读起来更优雅一些），但在需要更大灵活性的场景下，它们可以发挥巨大作用，例如，一个界面允许我们仅通过输入属性的路径名称，就能配置哪些值将显示在视图对象中，而无需编译任何源代码或其他内容。听起来很熟悉吧？\n\
  \n\n\n### 键值观察\n\n下一个关键概念是键值观察（KVO）。通过 KVO，一个对象可以向另一个对象注册，以便在发生变化时得到通知。例如，延续上一个示例，我们可以让\
  \ `myPerson` 在其 `firstName` 属性值发生变化时通知我们，具体操作如下：\n\n```\n[myPerson addObserver:self\
  \ forKeyPath:@\"firstName\" options:nil context:NULL];\n```\n\n作为回应，每当 `firstName`\
  \ 属性发生变化时——无论这种变化是通过 `setValue:forKey:` 方法，还是通过某人调用 `setFirstName:` 方法触发的——`myPerson`\
  \ 都会在观察者中调用一个名为 `observeValueForKeyPath:ofObject:change:context:` 的方法。这种实现方式非常巧妙，涉及\
  \ Cocoa 内部的一些元编程：在运行时创建一个 `Person` 的子类，重写 `setFirstName:` 方法，并在值变化后向所有观察者传递消息。整个过程如此流畅，以至于我们几乎不会察觉隐藏的\
  \ `Person` 子类的存在，除非我们刻意去寻找——并且在正确的位置深入挖掘。因此，我们其实并不需要了解这些实现细节。只需庆幸，我们是在这项技术已经相当成熟的时期进入\
  \ Cocoa 编程世界的，因为它最初问世时还有些粗糙！\n\n最终，我们可能完全不需要直接处理 KVO。几乎所有我们想通过 KVO 实现的功能，都可以通过构建在它之上的\
  \ Cocoa 绑定更简洁、更轻松地完成，Cocoa 绑定提供了更高层次的接口。这就是我们专注于 Cocoa 绑定的功能，而不进行任何直接 KVO 编程的原因。\n\
  \n### Cocoa 绑定：工作原理\n\n虽然对 Cocoa 绑定的实现进行全面而准确的描述超出了本书的范围，但更全面地了解它如何利用 KVC 和 KVO\
  \ 来工作，可能会有所帮助。现在我们已经对 KVC 和 KVO 有了简要了解，让我们来看看这些组件是如何协同工作的。\n\n当我们在 Interface Builder\
  \ 中建立绑定时（就像我们在本章中已经多次做过的那样），我们实际上是在定义一种契约。我们声明：当这个 nib 文件被加载并且这些对象被设置好后，一系列事件将会发生，以便在对象之间建立一些\
  \ KVO 关系。这些关系通过使用键路径字符串（利用 KVC）来定义每个绑定关注的属性，以及其他信息来标识“接收端”（通常是一个 GUI 控件）的哪个方面（例如显示的值、启用状态等）应受底层值变化的影响。在运行时，Cocoa\
  \ 会进行设置，使得控件（或我们已建立绑定的任何其他对象）能够根据相关键来观察控制器中的变化，同时控制器也会观察控件所选方面的变化。\n\n## 总结\n\n\
  绑定是一项非常强大的技术。回顾一下，你可能会发现，使用 Cocoa 绑定几乎可以实现前面几章展示的所有功能，从而创建一个几乎不需要任何自定义代码的应用程序！然而，这并不会削弱前几章所展示技术的实用性。事实上，有时你确实希望手动通过目标-动作调用的方法来访问\
  \ GUI 中的值。一个通用的经验法则是：如果你处于一种情况（一个简单的应用或一个大型应用的子组件），没有明显的模型对象可供操作，那么使用“传统方式”，即通过插座变量和目标/动作连接来处理，可能是最佳选择。但总的来说，从现在开始，Cocoa\
  \ 绑定是开发 Mac 应用的推荐方法。\n\n接下来的几章将演示如何使用 Core Data 进一步发挥绑定的作用。Core Data 的功能与 Cocoa\
  \ 绑定是正交的：Cocoa 绑定让你省去了一些乏味的控制器代码，而 Core Data 则处理了许多你原本需要为模型类编写的底层基础设施，为你提供了存储后端、内置的撤销/重做支持以及更多功能。Cocoa\
  \ 绑定和 Core Data 结合使用，能让你如此高效地构建大量软件，以至于会让其他人目瞪口呆！\n\n"
- '# 8. Core Data 基础


  **摘要**


  在前面的章节中，我们向你展示了 Cocoa 提供的各种在视图对象中显示数据的方式，从根据模型对象的内容手动获取和设置值，到使用 Cocoa 绑定让数据在模型和视图对象之间自动同步，从而省去了大量乏味的控制器代码。现在是时候了解
  Core Data 了，这是一个强大的框架，为我们的模型对象提供了一套完整的内置功能。我们将首先讨论 Core Data 是什么，以及它如何与 Cocoa 的其他部分协同工作。


  在前面的章节中，我们向你展示了 Cocoa 提供的各种在视图对象中显示数据的方式，从根据模型对象的内容手动获取和设置值，到使用 Cocoa 绑定让数据在模型和视图对象之间自动同步，从而省去了大量乏味的控制器代码。现在是时候了解
  Core Data 了，这是一个强大的框架，为我们的模型对象提供了一套完整的内置功能。我们将首先讨论 Core Data 是什么，以及它如何与 Cocoa 的其他部分协同工作。然后，我们将使用
  Core Data 创建一个名为 MythBase 的全功能数据库应用程序，包括一个允许我们创建、搜索、编辑和删除条目的 GUI，所有这一切都无需编写一行代码（参见图
  8-1，MythBase 的实际运行截图）。接着，我们将探索在创建 Core Data 项目时自动生成的一些代码资源，最后演示如何向模型对象添加功能（即“业务逻辑”）。




  ## 我们遗漏了什么


  前几章的所有示例中，我们都使用 `NSMutableDictionary` 的实例来代替真实的模型对象。所谓"真实模型对象"是什么意思呢？除了能够承载可通过字段名或键访问的数据（这点
  `NSMutableDictionary` 已经做得足够好）之外，真实的模型对象还应包含以下特性：


  ![A978-1-4302-4543-8_8_Fig1_HTML.jpg](img/A978-1-4302-4543-8_8_Fig1_HTML.jpg)


  图 8-1. 光彩夺目的 MythBase 应用


  - **归档（Archiving）**：模型对象应具备内置的磁盘存储与重新加载机制。

  - **业务逻辑（Business Logic）**：应能为模型对象提供针对输入值进行响应的自定义行为。

  - **验证（Validation）**：每个模型对象应能自动验证输入值。


  过去，遵循 MVC 原则的 Mac 应用开发者通常需要针对这些常见需求自行开发解决方案，但 Core Data 不仅提供了所有这些功能，还有更多。除了上述特性，Core
  Data 还提供了以下关键功能：


  - **撤销/重做支持（Undo/Redo Support）**：Core Data 的值处理机制与 Mac OS X 的标准撤销功能相集成。将这一能力内置到模型类中，能省去我们自行实现这一通用功能的工作量。

  - **与 Cocoa 绑定集成（Integration with Cocoa Bindings）**：结合 Cocoa 绑定，Core Data 通过通用控制器对象提供视图与模型的连接机制，从而消除大量繁琐的胶水代码。

  - **持久化（Persistence）**：Core Data 提供了多种将对象持久化到磁盘的方式，使我们能够跨运行周期保存和加载对象状态。


  综合来看，所有这些特性为应用核心提供了坚实的基础设施。我们可以使用 Core Data 构建 GUI 应用（无论是否使用 Cocoa 绑定）、命令行工具、游戏，或任何能够通过传统对象建模技术定义的软件系统。换言之，几乎适用于任何应用。


  ## 创建 MythBase


  现在，让我们开始创建 MythBase——一个用于维护神话人物数据库的 GUI 应用。我们将使用 Core Data 实现模型层，并借助 Cocoa 绑定处理大部分控制器功能。在这个过程中会遇到一些新概念和术语，我们会逐一讲解。


  在第一阶段，我们将使用 Xcode 中的特殊工具为应用定义模型，并利用 Xcode 的辅助工具创建简单 GUI。第二阶段，我们会优化 GUI 以提升用户体验。之后，在解释应用的其他方面后，我们将第三次推进功能开发，为应用模型层添加业务逻辑。


  首先创建新应用项目。在 Xcode 中选择 **File ➤ New Project**，在窗口左侧选择 **OS X/Application**，从项目模板列表中选取
  **Cocoa Application**，然后点击 **Next**。输入 `MythBase` 作为产品名称，`MB` 作为类前缀，勾选 **Use Core
  Data** 和 **Use Automatic Reference Counting** 复选框（见图 8-2），点击 **Next**。导航至合适目录保存项目，点击
  **Create**。


  ![A978-1-4302-4543-8_8_Fig2_HTML.jpg](img/A978-1-4302-4543-8_8_Fig2_HTML.jpg)


  图 8-2. 创建新应用项目并启用 Core Data 选项


  ### 定义模型


  此时我们获得了一个全新的项目，与之前创建的项目类似。选择使用 Core Data 后，Xcode 会使用略微不同的项目模板，因此这个项目会包含一些旧项目中没有的元素。Xcode
  导航面板中新增了名为 `MythBase.xcdatamodeld` 的文件，这是空的 Core Data 模型文件。模型文件包含应用模型层的元数据。我们通过
  Xcode 内置的图形工具创建模型文件，应用在运行时读取该文件。如果深入项目导航区查看，还会发现 `CoreData.framework` 已被添加至 **Frameworks/Other
  Frameworks** 下。


  #### 建模：是什么？


  接下来，我们假设你对对象建模或数据库建模有一定了解。但如果你对此完全困惑，这里有一个非常简短的总结。其核心思想是：应用所处理的"内容"（即应用所涉及的数据）可以被分割成独立模块，并通过建模技术组织成合理结构。使用
  Core Data 时，你需要按以下方式组织数据：


  - **实体（Entities）**：实体用于描述应用中可唯一标识的"事物"，这些事物能独立存在、描述和识别。实体通常是系统中的主要"名词"。人、公司和货币交易都是实体。而眼睛颜色、市值和交易金额则不是。

  - **属性（Attributes）**：任何描述实体特征且不涉及其他实体的内容，通常就是该实体的属性。眼睛颜色、市值和交易金额很可能是前面所述的人、公司和货币交易的属性。而某人的当前账户余额、公司
  CEO 的电话号码、交易接收者的电子邮件地址则不属于我们提到的实体的属性——这些更适合通过遍历与其他实体的关系来访问对应属性。

  - **关系（Relationships）**：使用关系建立实体间的连接。关系可以是一对多（一个人可能是多笔交易的接收者）、多对一（多人可受雇于同一家公司）、一对一（每人只能有一个配偶）或多对多（一家公司可以有多个客户，同时一个人也可以是多家公司的客户）。


  模型文件包含的信息对任何进行过对象建模、数据库建模或实体-关系建模的人来说都不陌生。首先，实体的概念大致对应对象建模中的类或数据库建模中的表。每个实体由多个属性组成，实体间可通过关系连接。在
  Xcode 和文档中，属性和关系统称为属性（properties），这与 Objective-C 2.0 中复用同一术语并非巧合。在模型对象中，每个属性和关系都可以通过同名
  Objective-C 属性（property）访问。在为 MythBase 构建的模型中，我们将创建包含多个属性的单个实体。关系将在第 9 章中讨论。




  #### 使用 Xcode 的模型编辑器


  首先，在 Xcode 的导航面板中单击 `MythBase.xcdatamodeld` 文件。这会在 Xcode 内置的模型编辑器中打开该模型文件，编辑器列出了三个表视图：属性、关系和获取属性，左侧还包含一个实体、获取请求和配置的概要视图。同时按下
  ⌥⌘3 打开数据模型检查器；由于我们尚未为实体定义任何结构，初始状态会显示“未选择”，如图 8-3 所示。模型编辑器有两种不同的视图样式：一种包含三个表视图的初始视图，另一种则类似于一张空白坐标纸。我们将使用图
  8-3 中所示的默认表视图样式，因为我们只需要一个模型类。当处理复杂模型时，坐标纸视图非常有助于概览所有不同实体及其相互关系。


  ![A978-1-4302-4543-8_8_Fig3_HTML.jpg](img/A978-1-4302-4543-8_8_Fig3_HTML.jpg)


  图 8-3. 创建任何实体之前的全新模型文件


  #### 创建实体


  对于 MythBase，我们将创建一个名为 `MythicalPerson` 的实体，并为其添加几个属性。首先，点击窗口底部附近的“添加实体”按钮来创建一个新实体。如您所料，这会在左侧的实体列表中创建一个名为“实体”的新实体。选中新实体后，其详细信息会显示在右侧的表视图中。将新实体的名称改为“MythicalPerson”，其余控件保持默认状态。我们的实体是一个名为
  `NSManagedObject` 的类的实例，这是 Core Data 中包含的一个通用类，为 Core Data 的模型对象提供了所有基本功能。稍后我们需要为该实体编写一些代码，届时我们将创建
  `NSManagedObject` 的自定义子类，不过现阶段使用这个通用类就足够了。


  现在让我们创建实体。我们进行了一些对象建模，并确定了神话人物可能具备的几个特征。


  `MythicalPerson` 实体将拥有六个属性。这些属性如表 8-1 所示，该表包含了每个属性的通用类型描述以及对应的 Core Data 存储类型。


  **表 8-1. MythicalPerson 属性**


  | 属性名称 | 通用类型 | Core Data 类型 |

  | --- | --- | --- |

  | name | 字符串 | String |

  | details | 字符串 | String |

  | divinity | 整数 (0-100) | Integer 16 |

  | goodness | 整数 (0-100) | Integer 16 |

  | power | 整数 (0-100) | Integer 16 |

  | depiction | 图片 | Transformable |


  Core Data 包含 `String` 和 `Date` 类型，以及一系列数值类型：`Integer 16`、`Integer 32`、`Integer 64`、`Float`、`Double`、`Decimal`
  和 `Bool`。此外，它还包含一个 `Binary` 类型，允许通用存储我们希望附加到实体上的任何类型的数据（我们自行将其打包成二进制块），以及一个特殊的 `Transformable`
  类型，允许将许多原本不支持的 Cocoa 类（例如 `NSImage`）与 Core Data 一起存储（稍后会详细介绍）。请注意，Core Data 存储类型与
  Cocoa 中的值类（如 `NSString`、`NSNumber` 等）名称不同。当 Core Data 属性被读入正在运行的应用程序时，它们会被转换为最接近的
  Cocoa 等价类型，这意味着，例如，所有数值类型在应用程序中都会变为 `NSNumber`，并在保存时转换回底层的存储格式。


  #### 创建属性


  让我们开始创建 `MythicalPerson` 的属性。在 Xcode 中打开 `MythBase.xcdatamodeld` 文件，点击选中 `MythicalPerson`
  实体，然后点击窗口顶部“属性”表视图左下角的小 + 号。表视图中会出现一个新属性。将其名称设置为“name”，类型设置为 String，然后按回车键。


  现在查看右侧检查器中的复选框，标记为“可选”、“瞬态”和“已索引”。默认情况下，“可选”被勾选，其他未勾选。“可选”的含义很清楚。勾选它意味着用户在创建或编辑对象时可以选择不为该属性输入值。至于其他选项，勾选“瞬态”会配置该属性不随其他数据一起保存（尽管
  Core Data 仍会跟踪对该属性的更改以提供撤销/重做支持），而勾选“已索引”会为该属性启用索引，从而基于该属性实现对 Core Data 存储后端的高速搜索。对于
  `name` 属性，请确保只勾选“已索引”，其他不勾选。


  在复选框下方，您可以通过一个弹出列表指定属性的类型（这与表视图中的弹出菜单设置相同）。如果在主表视图中将“name”指定为 String，则会在其下方区域看到一些额外选项。在这里，我们可以指定简单的验证规则，例如字符串的长度。我们还可以指定默认值，该值会在创建新的
  `MythicalPerson` 实例时出现。在默认值字段中输入“Name”，其他字段留空。


  接下来，我们来处理 `details` 属性，它用于保存所述 `MythicalPerson` 的文本描述。点击“属性”表视图下方的 + 按钮添加一个新属性，并将新属性名称改为“details”。我们将以与
  name 属性稍有不同的方式来配置它。它应该是一个 String（从弹出列表中选择），并且“已索引”复选框应被勾选，但在此情况下，“可选”复选框也应被勾选，以便用户可以根据需要选择将此字段留空。另外，我们将默认值留空。


  现在我们来处理 `MythicalPerson` 的数值属性：`divinity`、`goodness` 和 `power`。创建一个新属性并命名为“divinity”，将其类型设置为
  `Integer 16`，这是 Core Data 支持的最小的整数类型。这次配置复选框，使其为可选，但既不是瞬态也不是已索引（因为我们预计不需要通过神性值来搜索神话人物作为搜索参数）。显示界面会发生变化，显示一些适用于所选类型的额外配置。在这里，我们可以通过指定最小值和最大值来设置一些自动验证规则，也可以指定此属性的默认值。


  在表 8-1 中，我们将神性定义为一个从 0 到 100 的整数值，其理念是将角色置于从凡人到神性之间的某个尺度上。例如，希腊神祇宙斯的神性值为 100，他的儿子赫拉克勒斯（其母亲阿尔克墨涅是普通凡人）为
  50，而普通凡人（比如，再次以赫拉克勒斯的母亲为例）的神性值为 0。通过指定属性的最小值和最大值，我们可以让 Core Data 帮助我们确保无法保存这些属性的无效值。输入最小值
  0，最大值 100，默认值 50。请参见图 8-4，以了解正在进行的实体/属性编辑过程。


  ![A978-1-4302-4543-8_8_Fig4_HTML.jpg](img/A978-1-4302-4543-8_8_Fig4_HTML.jpg)


  图 8-4. 这是在 Core Data 模型文件中编辑实体的样子




  #### 为 `goodness` 和 `power` 创建数值属性


  接下来，我们要创建另外两个数值属性：`goodness` 和 `power`。这两个属性同样在 0 到 100 的范围内描述每个 `MythicalPerson`
  的特征，并且其配置将与 `divinity` 完全相同（当然，属性名称不同）。创建它们并赋予相同选项的最简单方法是：在表格视图中点击 `divinity` 属性将其选中，然后复制（⌘C），再粘贴（⌘V）两次，从而得到两个名为“divinity1”和“divinity2”的新属性。将这两个属性重命名为“goodness”和“power”即可。这两个新属性将与原始属性拥有相同的最小值和最大值。


  #### 不支持类型的属性


  最后一个需要配置的属性是 `depiction`。如前所述，`depiction` 属性用于存储图像，而 Core Data 对 Cocoa 中通常使用的 `NSImage`
  类一无所知。幸运的是，Core Data 的“可转换”（Transformable）类型提供了一种简单的方法来存储图像。创建一个新属性，将其命名为“depiction”，然后选择类型为“Transformable”。注意，检查器会发生变化，显示“可转换”类型的配置选项。在检查器中，选中“可选”复选框（并取消选中其他复选框）。“可转换”类型的配置选项非常简单：只有一个标记为“值转换器名称”的文本字段。不过，实际情况远不止表面所见。其思路是，“可转换”属性存储的是
  Core Data 并不真正理解的一堆数据；当 Core Data 从存储中读取这堆数据时，会将其放入一个 `NSData` 对象（一个能够挂接任意旧数据块，并作为其
  Objective-C“包装器”的对象）中，然后通过一个转换器（一种知道如何将一种对象转换为另一种对象的特殊类）进行处理。反过来，当要保存对象到存储时，Core
  Data 会获取新值并将其传递给同一个转换器，不过这次是进行反向转换。


  在这种情况下，我们将使用一个名为 `NSKeyedUnarchiveFromData` 的转换器，它知道如何根据包含对象键归档版本的 `NSData` 对象来生成任意类型的对象。什么是键归档？这里我们不详细讨论，但基本上，键归档是一种以类似字典的格式归档或序列化对象所有实例变量的方式，使得以后可以重建该对象。这项技术以多种方式用于
  Cocoa 中，并且所有 Cocoa 类都内置了此功能。这意味着我们可以获取一个 `NSImage` 或任何其他 Cocoa 类的实例，并使用 `NSKeyedUnarchiveFromData`
  的反向转换将其塞入 `NSData` 对象中。此外，如果我们在自己的类中实现 `NSCoding` 协议，并以键归档的方式保存和加载其实例变量，我们也可以用同样的方式归档自己的对象。


  回到 depiction 字段，思路是将转换器类的名称写入“值转换器名称”文本字段。事实证明，键归档非常普遍，以致于在 Xcode 建模工具中为属性指定转换器时，这会被用作默认值。如果我们将该字段留空，实体将配置为使用
  `NSKeyedUnarchiveFromData` 来转换模型属性值，以便在存储时与 `NSData` 之间进行转换。


  至此，我们已经为本章的 MythBase 应用定义了完整的模型，接下来我们将继续创建 GUI。


  ## 设计 GUI


  由于我们已经使用 Interface Builder 设计过几个用户界面，因此我们将快速过一下基础知识，并且不会为每个检查器提供键盘快捷键。这个应用将与第 6
  章中的 VillainTracker 应用类似。我们的用户界面将允许用户搜索神话人物数据库，添加和删除它们，并更改它们的特征。此外，我们将使用 Cocoa 绑定来建立连接。


  ### 自动生成 GUI


  Xcode 3 包含一个名为“Core Data 实体界面助手”的功能，用于根据 Core Data 模型自动布局一个具有基本 CRUD（增删改查）功能的 GUI。此功能在
  Xcode 4 中被移除，因此我们必须手动完成。事实证明，这非常简单，并且过程应该会让你感到熟悉，就像完成了之前的章节一样。不仅如此，Xcode 生成的 UI
  通常也需要大量清理工作。




  ### 创建 MythBase 显示界面


  首先，在 Xcode 中单击 `MainMenu.xib` 文件。在左侧的对象停靠区中，打开名为“Window - MythBase”的主窗口。我们将拖出一个表格视图和一组字段，以便创建和编辑数据库中管理的虚构人物的属性，因此我们先把窗口拉高一些。将其拖拽至
  500 像素高。接下来，在对象库中，在检查器底部的搜索字段中输入“search”。对象库应显示一个对象：搜索字段。将搜索字段从对象库拖出，放到 MythBase
  主窗口的右上角，让蓝色参考线指示放置位置。接着，在对象库搜索字段中输入“table”。将一个表格视图拖拽到 MythBase 窗口，使其与窗口左边缘对齐。将其拉伸至填满窗口宽度，直到与右侧的蓝色垂直参考线相接。将表格视图放置在搜索字段下方；它会自动对齐到搜索字段下方几个像素的位置。


  打开属性检查器，将表格视图的“内容模式”设置为“基于视图”。将“列宽调整”设置为“仅第一列”。在“内容模式”下方，将表格视图设置为五列。将表格视图设置为五列时，你可能会注意到表格视图下方闪现出一个水平滚动条。新增的列会超出表格视图的右侧，因此请单击第二列并将其调整得窄一些，直到所有五列都可见，如图
  8-5 所示。


  ![A978-1-4302-4543-8_8_Fig5_HTML.jpg](img/A978-1-4302-4543-8_8_Fig5_HTML.jpg)


  图 8-5.


  为 MythBase 布局表格视图


  该表格视图将显示我们为 `MythicalPerson` 实体定义的所有属性（`details` 除外），因此我们需要在列标题中设置标签。在表格视图中，单击第一列的标题，直到它变成可编辑的文本字段。在文本字段中输入“Name”以设置列标题。单击下一列，将其名称设置为“Divinity”。将接下来三列的标题分别设置为“Power”、“Goodness”和“Depiction”。


  接下来，我们将设置一个指示器，用于显示搜索时找到的结果数量。在对象库搜索字段中输入“Label”，将一个标签字段拖拽到窗口左侧，位于表格视图下方。与往常一样，蓝色参考线会指示放置位置。将标签标题设置为“#
  out of #”，并调整其大小以使所有文本可见。


  下一组控件将是用于搜索、添加和删除记录的按钮。在对象库搜索字段中输入“Button”。Cocoa 提供了多种按钮样式，因此我们会有丰富的选择。对于这个应用，我们使用渐变按钮。拖出一个按钮，将其放置在表格视图下方，并与上一步中的文本字段对齐。将其标题设置为“Fetch”。再拖出两个按钮，将它们放置在
  Fetch 按钮的右侧。将这些新按钮的标题分别设置为“Delete”和“Add”。设置好标题后，将它们放置在表格视图下方，并与窗口右侧边缘对齐。布局应与图 8-6
  一致。


  ![A978-1-4302-4543-8_8_Fig6_HTML.jpg](img/A978-1-4302-4543-8_8_Fig6_HTML.jpg)


  图 8-6.


  添加结果计数器和按钮


  ### 显示详细信息


  现在，我们需要布局控件以显示所选虚构人物的详细信息。我们的 Core Data 实体的属性包括 `name`、`divinity`、`power`、`goodness`、`depiction`
  和 `details`，这就是我们的用户界面将展示的内容。首先，找到并拖出一个标签，放置在按钮下方并靠近窗口中心线。双击它，将其标题设置为“Name:”。在对象库中，找到并拖出一个文本字段（在搜索字段中输入“field”），放在“Name:”标签旁边。将其拉伸至窗口宽度的大约三分之一，即
  200 像素左右。将其拖到按钮下方，并与屏幕右侧边缘对齐。蓝色参考线会指示如何对齐。将“Name:”标签拖到文本字段左侧，使其自动对齐。


  单击该标签一次以选中它，按 ⌘C 复制，然后按 ⌘V 在其下方粘贴一个新标签。粘贴的标签会出现在第一个标签的下方和右侧。将其拖到第一个标签的正下方；它会自动对齐到第一个标签下方适当的距离。再重复两次此操作，使第一个标签下方并排出现三个标签。选中全部四个标签，然后选择“编辑器”
  ➤ “对齐” ➤ “右边缘”（⌘]）。最后，将这些标签的标题分别设置为“Divinity:”、“Power:”和“Goodness:”。标签应自动调整大小以显示完整标题，但保持右边缘对齐。


  `divinity`、`power` 和 `goodness` 属性都是数值型，因此我们将使用滑块来设置它们。在对象库中搜索“slider”，然后将一个水平滑块拖到“Divinity:”标签旁边，并位于
  Name 的文本字段下方。将其拉伸至与文本字段相同的宽度。像往常一样，蓝色参考线会指示方向。在属性检查器中，确保滑块的最小值为 0，最大值为 100，默认值为
  50，与我们之前在 Mythical Person Core Data 实体上创建的 `divinity` 属性一致。同时，勾选属性检查器中的“连续”复选框。像处理标签一样，选中此滑块并按
  ⌘C 复制，然后按 ⌘V 在其下方粘贴一个新滑块。重新调整新滑块的位置，使其与 Divinity 滑块对齐，并与“Power:”标签对齐。再次按 ⌘V 粘贴另一个滑块，将其放置在前两个滑块下方，并与“Goodness:”标签对齐。窗口应如图
  8-7 所示。


  ![A978-1-4302-4543-8_8_Fig7_HTML.jpg](img/A978-1-4302-4543-8_8_Fig7_HTML.jpg)


  图 8-7.


  添加控件以管理神话详细信息


  尚未有显示控件的两个属性是 `depiction` 和 `details`。我们将使用图像框和文本框来处理它们。在对象库的搜索字段中输入“image”，然后将一个图像框拖到屏幕左下角，并让其紧贴角落的蓝色参考线。将其大小调整为
  150 像素高、200 像素宽。在属性检查器中，将图像框设置为可编辑。这将允许用户将图像拖入图像框。




  接下来，在对象库的搜索字段中输入“text”，然后将一个文本视图拖到右下角。将其大小调整为高 150 像素、宽 250 像素，这个宽度应足以在窗口边缘和图像框之间填充，并留出视觉上舒适的间隙。当您接近正确位置时，应该会看到蓝色参考线，并且文本视图会自动对齐。我们需要对其属性做一项重要更改。`NSTextView`默认能够显示富文本，这是一个很棒的功能，但也是有代价的：在
  Cocoa 中，富文本由 `NSAttributedString` 的实例表示，该类比 `NSString` 复杂得多，不是我们现在想深入讨论的内容。为了让文本视图能够将其显示值绑定到一个普通的旧字符串，我们必须关闭富文本处理。因此，在属性检查器中，单击关闭富文本复选框（如果您没有看到它，可能您选中了文本视图的父视图，即
  `NSScrollView`。再单击一次文本视图以选中内部的 `NSTextView`）。您还可以将查找设置更改为“使用栏”，并勾选“增量搜索”，以便文本搜索利用
  OS X 10.7 中引入的查找栏功能。


  这些控件需要标签，因此在对象库搜索字段中输入“label”，然后将一个标签拖到图像框上方，与图像框的左边缘对齐。将其文本更改为“图像”。再拖出另一个标签放在文本视图上方，并将其标题设置为“详情。”将“详情”标签对齐，使其右边缘与滑块标签对齐。


  最后要做的是配置表格视图的列。五列中有四列将显示文本或数字，因此默认配置就可以了。然而，对于“图像”列，我们希望显示一张图片，因此需要将当前在该列中的 `NSTextField`
  替换为一个图像框。通过左侧的对象停靠区，选择“图像”列表格视图单元格中包含的“静态文本”对象，如图 8-8 所示。选中后，按 Delete 键将其删除。在对象库的搜索字段中输入“image”，然后将一个图像框拖到表格视图的“图像”列中空的表格单元格视图中。该图像框会被裁剪到表格单元格视图的高度，因此将表格视图单元格的高度扩大到
  48 像素，足够显示整个图像。


  ![A978-1-4302-4543-8_8_Fig8_HTML.jpg](img/A978-1-4302-4543-8_8_Fig8_HTML.jpg)


  图 8-8.


  在对象停靠区中选择“图像”文本字段


  至此，GUI 布局就完成了。它很美，不是吗？现在我们需要将其连接到一个数据源以填充内容。我们将使用前一章讨论过的 Cocoa 绑定来完成这项工作。


