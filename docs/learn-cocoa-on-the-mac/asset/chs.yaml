  \n我们曾花费无数个夜晚和周末盯着电脑屏幕，而非陪伴妻子和孩子。本书谨献给他们。我是说，献给我们的妻子和孩子，而不是电脑屏幕。\n\n## 前言\n\n我第一次接触\
  \ Cocoa 是在 1989 年上大学的时候。当然，那是在 iPhone 之前，在 Mac OS X 之前，甚至是在它被命名为 Cocoa 之前。那时，今天\
  \ Cocoa 的种子是 NeXTStep 的一部分，即 NeXT 计算机核心的操作系统。NeXTStep 领先于时代多年，虽然那间装满 NeXT 工作站的实验室在计算机科学课程中利用率极低，但我的学生系统管理员工作让我每天都要使用它们。作为一名用户，我便深陷其中。在此我不赘述\
  \ NeXT 的用户体验，但我要说的是，Mac OS X 的许多最佳特性并非源自老 Mac，而是来自 NeXTStep。\n\n那时，还没有万维网，NeXTStep\
  \ 开发者社区也很小，除了 NeXT 随其早期机器附带的那些晦涩难懂的巨著之外，关于开发环境的文字资料少之又少。我时不时试图搞懂 Objective-C 和 AppKit，但身边没有专家，也缺少可供参考的示例代码（更不用说我实际的学习任务有时会分散我摆弄有趣项目的精力），所以我基本上是无从下手。\n\
  \n大学毕业后，发生了一件完全出乎意料的事。一位朋友向我介绍了我们市里一家咨询公司，该公司正在为一些相当大的客户构建定制的 NeXTStep 应用程序，我有幸加入了进来。突然间，我拥有了一群同事，他们不仅已经使用\
  \ NeXTStep 编程了一段时间，有些人甚至曾在 NeXT 工作过！其中一位就是彼得·克拉克。只需要他们一点专业的帮助就能让我起步，那些多年来一直神秘莫测的东西突然就讲得通了。短短几周内，我学到了很多，甚至能够开始领导一些\
  \ NeXTStep 开发的培训和指导工作。\n\n这里想说的重点不是我有多聪明或是学得快。而是，我们现在称之为 Cocoa 的这一系列技术确实非常强大——而且相当容易学习和使用——但在这个过程中你很可能需要一些帮助。我希望这本书能引导你走上正确的方向，并帮助你掌握\
  \ Cocoa 编程的精髓，这样当你读完它时，你将拥有足够的 Cocoa 知识，能够推动自己前进，编写出你梦寐以求的 Mac 应用程序。简而言之，这是一本我希望自己在\
  \ 20 年前就能找到的书。\n\n杰克·纳廷\n\n## 关于作者\n\n**杰克·纳廷** 从旧时代就开始使用 Cocoa，远早于它被命名为 Cocoa 的时候。他使用\
  \ Cocoa 及其前身为广泛的行业和应用开发软件，包括游戏、平面设计、在线数字发行、电信、金融、出版和旅行。当他不从事 Mac 或 iOS 项目、不用 Unity3D\
  \ 制作精彩游戏、或不在他的朋克摇滚乐队里尽情演奏时，他通常会与家人共度时光。杰克在 Twitter 上的账号是 `@jacknutting`，并偶尔在 [`www.nuthole.com`](http://www.nuthole.com)\
  \ 上写博客。（照片由艾莉森·德·玛尔斯·冯·布里森提供。）\n\n\n\n## 彼得·克拉克\n\n彼得·克拉克大约在 1990 年上大学时开始接触 NeXTStep。这段经历奠定了他职业生涯前半段的基调，当时他与杰克在双城的一家咨询公司共事。他曾为湾区、芝加哥和双城的公司开发\
  \ NeXTStep 和 WebObjects 项目，撰写了一本关于 OpenStep 开发的书籍，随后转向 Java、.NET、Ruby 和 Scala 开发以及管理工程团队。他很高兴\
  \ NeXTStep 的众多设计模式至今仍有用武之地，并发现 Cocoa 开发既令人感到熟悉又充满惊喜。彼得目前在明尼苏达大学担任一个研究项目的软件开发总监。他偶尔会在[`http://blog.pclark.net`](http://blog.pclark.net)上写博客，你可以在\
  \ Twitter 上通过`@pclark`找到他。彼得想让你知道，他至少比杰克早一两个月开始使用 NeXTStep。（照片由韦德·斯特宾斯提供。）\n\n##\
  \ 关于技术审阅者\n\n![A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg](img/A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg)\n\
  \n尼克·韦尼克在 IT 领域工作已超过十三年，从事过从网络管理到网络开发的各种工作。他在 SDK 首次发布时就开始编写 iOS 应用。此后，他创立了自己的公司，专注于\
  \ iOS 开发。他喜欢在空闲时间与妻子艾莉森和儿子普雷斯顿在一起，有时也会打打高尔夫。他在[`nickwaynik.com`](http://nickwaynik.com)上写博客，你可以在\
  \ Twitter 上通过`@n_dubbs`找到他。\n\n## 致谢\n\n将一本书从概念变成你正在阅读的纸质书（或电子书），需要感谢很多人。除了将文字和代码片段输入文本编辑器之外，还有很多工作要做。Apress\
  \ 的道格拉斯·庞迪克和吉尔·巴尔扎诺帮助将许多事情安排得井井有条，让作者们免于分心。当然，让作者们保持正轨也很重要，他们也一直让我们为此忙碌。我们的技术审阅者尼克·韦尼克发现了代码和文章中许多小问题（以及一些不小的问题），并且每次提出修改建议都有充分的理由。我们的文字编辑玛丽·贝尔非常出色地精炼了我们的文笔，润色了我们的语法，并确保你阅读的内容流畅连贯。在她的手下，许多别扭的句子被重构得更加出色。\n\
  \n我们想感谢苹果公司的开发者们，他们制作了值得书写的工具。[`www.swampfoetus.net`](http://www.swampfoetus.net)\
  \ 的作者为第一版的读者写了一篇很棒的文章，介绍了 Xcode 4 中处理 Core Data 的变化，该文章使用了第一版中的`MythicalPerson`示例应用。我要感谢他足够用心地写了那篇文章并公开发表。第一版的其他作者大卫·马克和杰夫·拉马什为我们留下了坚实的创作基础。谢谢各位先生！我们确信还遗漏了许多非常值得感谢的人，是他们的努力让这本书变得优秀。书中剩余的不佳之处，责任全在作者。\n\
  \n本书的大部分写作工作在明尼苏达州圣保罗市的 Shish Café 和 Kopplin’s Coffee 完成。如果你想品尝美味的咖啡，没有比 Kopplin’s\
  \ 更好的去处了。最后，也是最重要的，彼得要感谢他的妻子莫莉·麦克贝斯和孩子们劳雷尔 & 贝娅，杰克要感谢他的妻子维罗妮卡·梅耶和孩子们亨丽埃塔 & 多罗特娅。他们非常支持写书所需投入的时间，没有他们的帮助，这本书不可能完成。彼得和杰克将本书献给我们各自的家人。\n\
