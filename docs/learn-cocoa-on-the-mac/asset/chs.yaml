  \ nib 文件中免费获得 Mac 标准的“文件”、“编辑”、“格式”、“视图”、“窗口”和“帮助”菜单，但如有必要，我们可以添加更多菜单或修改默认菜单。停靠栏中看起来像下拉菜单的图标（从上数第四个）是代表主菜单的对象。在图\
  \ 2-5 中，它有一个高亮的边框，表示它已被选中。\n\n停靠栏中主菜单图标下方是一个看起来像窗口的图标，它实际上就是窗口。我们用于创建此项目的 Cocoa\
  \ 应用程序项目模板假设我们的应用程序至少有一个窗口，并且它为我们创建了该窗口。我们将使用这个窗口来布置程序启动时显示的窗口内容。选择窗口图标，我们应用程序的新的空主窗口将出现在方格纸上。\n\
  \n### 库\n\n右下角的库窗格充当一个调色板，其中包含可用于构建应用程序界面的对象集合。在 Mountain Lion 中，这里有 134 种不同的对象类型可供使用。库默认显示的是文件模板库，但这里有四种可以显示的资源类型：文件模板、代码片段、对象和媒体。我们将要使用的所有用户界面元素都在对象视图下。我们可以在库中滚动查找要使用的项目，然后将该项目拖放到合适的\
  \ Xcode 窗格中。选择代表对象库视图的图标，或按 ^⌥⌘3。屏幕应如图 2-6 所示。\n\n![A978-1-4302-4543-8_2_Fig6_HTML.jpg](img/A978-1-4302-4543-8_2_Fig6_HTML.jpg)\n\
  \n图 2-6. `MainMenu.xib` 显示了我们的新空窗口和对象库\n\n花点时间滚动浏览库中的不同 UI 对象：按钮、滑块、文本字段、标签、浏览器，甚至还有一个\
  \ OpenGL 视图！\n\n\n\n## 拖出标签\n\n对象库面板会显示一个列表，其中包含可拖拽至应用程序窗口以构建界面的各类项目。现在让我们拖一个出来试试。我们将使用一个名为\
  \ `Label` 的对象，它用于显示静态文本——即用户无法编辑的文本。将一个标签拖拽到窗口中。\n\n在对象库视图中，向下滚动大约十几个项目，找到名为 `Label`\
  \ 的那个。直接点击库中的 `Label`，并将其拖拽到应用程序的主窗口（标记为 `Chapter2` 的窗口）中。这样就会在应用程序窗口上添加一个新标签（图\
  \ 2-7）。\n\n![A978-1-4302-4543-8_2_Fig7_HTML.jpg](img/A978-1-4302-4543-8_2_Fig7_HTML.jpg)\n\
  \n图 2-7.\n\n将标签拖拽到窗口 提示\n\n除了像刚才那样在列表中向下滚动，你也可以直接在库面板底部的搜索框中输入“label”这个词。这样列表就会过滤，只显示名称或描述中包含“label”的对象。\n\
  \n现在我们已经有了一个标签，接下来修改它。双击该标签。它应该会变为可编辑状态并被选中。由于现有文本已被选中，我们只需输入新文本，它就会替换掉原来的内容。继续输入“Hello,\
  \ World!”，这可比“Label”有趣多了（如果你想要叛逆一点，也可以输入其他内容，但如果提基众神来找你麻烦，可别怪我们没提醒！）。\n\n### 使用蓝色参考线\n\
  \n完成标签编辑后，按下 `return` 键确认更改，这样标签就会退出编辑模式。接下来，点击并拖拽标签，使其靠近窗口左侧。当标签接近窗口左边缘时，文本左侧会出现一条蓝色的虚线（图\
  \ 2-8）。界面生成器使用这些蓝色参考线来指示拖拽的项目与周围项目对齐得当。在这个例子中，参考线表明标签与窗口左边缘的距离是合适的。\n\n![A978-1-4302-4543-8_2_Fig8_HTML.jpg](img/A978-1-4302-4543-8_2_Fig8_HTML.jpg)\n\
  \n图 2-8.\n\n当我们把对象移动到边缘附近时，会出现蓝色线条 注意\n\n多年来，让 Mac 使用体验如此愉悦的因素之一就是用户界面的一致性。在绝大多数\
  \ Mac 应用程序中，无论你使用的是哪个程序，都可以依靠 `⌘W` 来关闭窗口，`⌘S` 来保存，`⌘P` 来打印。如果你要为 Mac 编写软件，就应该了解这些“一致性规则”。苹果公司在他们的《人机界面指南》（也称为\
  \ `HIG`）中阐述了这些规则。界面生成器的小蓝线正是为了让你更容易地遵循《人机界面指南》而存在的。你可以在 [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines)\
  \ 找到 `HIG` 的副本。\n\n## 检查器\n\n库区域占据了 Xcode 窗口右侧实用工具区域下方大约三分之一的空间。另一个重要的界面生成器工具正好位于库上方，占据了右侧实用工具区域上方三分之二的空间。这被称为检查器。检查器是一个上下文相关的面板，会显示当前选定对象的信息。点击窗口，检查器会显示该窗口的信息（图\
  \ 2-9）。点击标签，检查器会显示该标签的信息。你应该明白意思了。\n\n![A978-1-4302-4543-8_2_Fig9_HTML.jpg](img/A978-1-4302-4543-8_2_Fig9_HTML.jpg)\n\
  \n图 2-9.\n\n检查器显示窗口的属性\n\n查看图 2-9 中所示的检查器面板。注意面板顶部横跨的八个图标。按下每个图标，面板就会切换为八种不同检查器类型之一。\n\
  \n每个检查器也有对应的键盘快捷键，从 `⌥⌘1`（最左侧的文件检查器）到 `⌥⌘8`（最右侧的检查器）。在界面生成器模式下，属性检查器和连接检查器将是我们最常用的两个。表\
  \ 2-1 列出了这八个检查器对应的快捷键。\n\n表 2-1.\n\n界面生成器检查器的快捷键\n\n| 快捷键 | 检查器 |\n| --- | --- |\n\
  | `⌥⌘1` | 文件检查器 |\n| `⌥⌘2` | 快速帮助检查器 |\n| `⌥⌘3` | 身份检查器 |\n| `⌥⌘4` | 属性检查器 |\n|\
  \ `⌥⌘5` | 尺寸检查器 |\n| `⌥⌘6` | 连接检查器 |\n| `⌥⌘7` | 绑定检查器 |\n| `⌥⌘8` | 视图效果检查器 |\n\n\
  \n\n### 属性检查器\n\n我们先来看看属性检查器。（如果看不到，请按 `⌥⌘4` 在实用工具区域显示该面板，然后单击你的标签。）检查器应如图 2-10\
  \ 所示。\n\n我们可以使用属性检查器来更改标签的外观。我们可以修改文本对齐、边框和滚动行为等属性。有趣的是，其中几个字段实际上不会产生任何效果。试试在“占位符”字段中输入内容。完全不会改变标签的外观，对吧？\n\
  \n这是怎么回事？当我们从库中拖出一个标签时，我们抓取的是 `NSTextField` 类的一个实例。`NSTextField` 类既用于静态文本字段，也用于可编辑文本字段。在可编辑文本字段中，占位符就是我们在某些空文本字段中看到的灰色文字，它提示该字段的作用。\n\
  \n![A978-1-4302-4543-8_2_Fig10_HTML.jpg](img/A978-1-4302-4543-8_2_Fig10_HTML.jpg)\n\
  图 2-10. 属性检查器显示了在 Interface Builder 中可以编辑的标签的所有属性\n\n当文本字段被配置为标签时，不需要占位符。提供一个占位符也无妨，但也无益。\n\
  \n本书记载不了所有与上下文相关的属性，但我们会逐一讲解那些不太明显的属性。随着您阅读本书的深入，您将熟悉大多常用的属性。\n\n我们来更改标签的大小。如果标签未被选中，单击它将其选中。标签两侧会出现圆点。这些圆点是大小调整手柄，允许我们更改所选项目的大小。Interface\
  \ Builder 中的大多数对象都有四个调整手柄，每个角一个，允许我们在四个方向上调整大小。但某些项目（如标签）只有两个调整手柄。标签的属性（特别是其字体的大小）决定了标签的垂直大小。我们不会通过调整大小来改变标签的高度。我们只使用调整手柄来更改标签的宽度。\n\
  \n我们来将标签居中。确保标签的左侧与窗口左边缘附近的蓝色参考线对齐。然后，抓住右侧的调整手柄，将标签拖至窗口右边缘附近的蓝色参考线处。完成操作后，标签应如图\
  \ 2-11 所示。\n\n![A978-1-4302-4543-8_2_Fig11_HTML.jpg](img/A978-1-4302-4543-8_2_Fig11_HTML.jpg)\n\
  图 2-11. 调整大小后，我们的应用程序窗口在 Interface Builder 中的显示效果\n\n现在，保持标签选中状态，在属性检查器中找到一行标有“对齐”的按钮，然后选择“居中对齐文本”按钮（图\
  \ 2-12）。另外，找到一个标有“行为”的弹出式菜单，将其设置为“可选”，这告诉 Cocoa 我们希望允许用户根据需要将此标签复制到剪贴板。默认情况下，标签是不可选的，但我们刚才更改了这一设置。\n\
  \n![A978-1-4302-4543-8_2_Fig12_HTML.jpg](img/A978-1-4302-4543-8_2_Fig12_HTML.jpg)\n\
  图 2-12. 标签的属性检查器中的对齐按钮，设置为居中对齐文本\n\n### 更改标签的颜色和字体\n\n我们对窗口内容进行最后一项更改：更改文本的字体、大小和颜色。如果查看属性检查器，我们大概能知道如何更改文本颜色，但设置字体和大小有些小窍门。\n\
  \n首先，设置颜色。在属性检查器中找到标有“文本颜色”的颜色井。单击它，将出现标准的 Mac OS X 颜色选择器（图 2-13），我们可以选择所需的文本颜色。现在就选择吧，挑选任意你喜欢的颜色。\n\
  \n![A978-1-4302-4543-8_2_Fig13_HTML.jpg](img/A978-1-4302-4543-8_2_Fig13_HTML.jpg)\n\
  图 2-13. 在 Cocoa 应用程序中，使用标准 Mac OS X 颜色选择器来选择颜色。我们正在 Interface Builder 中使用它来设置文本颜色\n\
  \nXcode 本身是用 Cocoa 构建的，并利用了许多内置的 Cocoa 功能，比如标准颜色选择器。Apple 工程师不希望像你一样重复发明轮子。当你编写自己的应用程序时，只需几行代码，甚至在某些情况下无需编写任何代码，就可以使用完全相同颜色选择器。\n\
  \n你可以在应用程序中使用的另一个内置 Mac OS X 功能是标准字体窗口，它允许你更改所选文本的字体、大小和属性。在创建分发给他人的应用程序时，重要的是要意识到你可能会选择用户没有安装的字体。通常，对于标准\
  \ GUI 组件，最好不要更改字体。一致的字体使用是 Mac 以 GUI 一致性著称的重要组成部分。大多数标签、按钮和其他控件默认使用 Lucida Grande\
  \ 字体。你可以更改某些标签的大小，并在粗体和常规之间切换以突出显示不同内容，但保留字体本身不变。Xcode 在属性检查器的“字体”字段中提供了指导，如图 2-14\
  \ 所示。尽管可以使用“字体”面板，但 Xcode 还提供了一个快速访问系统默认字体的标注窗口。如果你知道想要当前系统字体的粗体版本，可以轻松地从该标注窗口的“字体”下拉菜单中获取。通常，对于常见的用户界面元素，你会使用这种方法，而不是显式地设置字体。\n\
  \n![A978-1-4302-4543-8_2_Fig14_HTML.jpg](img/A978-1-4302-4543-8_2_Fig14_HTML.jpg)\n\
  图 2-14. Xcode 有一个专门的字体选择器标注窗口，方便快速访问默认字体\n\n按 `^⇧⌘T` 调出 Xcode 中的字体窗口。确保我们的标签仍被选中（查找调整手柄），并确保应用程序的主窗口仍是最前面的窗口。\n\
  \n一旦我们将标签调整到满意的样式，我们就会为应用程序进行最后的润色，然后运行它。我们就快完成了！\n\n\n\n### 创建应用程序图标\n\n所有应用程序都需要图标。Mac\
  \ OS X 使用一种特殊格式来保存图标，该格式将多张图片打包在一起，以便在缩放时以及配备 Retina 显示屏的设备上，能够提供多种尺寸和分辨率的图片。不过，Xcode\
  \ 会为我们准备好这种格式。我们只需恰当地命名图片，并将其放入一个扩展名为`.iconset`的文件夹中即可。\n\n命名约定非常直接。例如，图片名称可以是`icon_128x128@2x.png`。每张图片的名称以`icon_`开头，接着是分辨率，然后是一个可选的标记（用于指示高分辨率作品），最后是文件扩展名，例如`.png`。Cocoa\
  \ 使用的完整尺寸集包括 16×16、32×32、128×128、256×256 和 512×512。其中每种尺寸都可以选择添加`@2x`的高分辨率标记。请注意，尺寸单位是屏幕点，而不是像素；一个`512×512@2x`文件的实际像素尺寸为\
  \ 1024×1024。Cocoa 会判断我们的应用程序是否运行在配备 Retina 或其他高分辨率显示屏的 Mac 上，并根据屏幕的像素密度和所需尺寸，选择最佳的位图。如果我们没有提供\
  \ Cocoa 所需的图片，它会自动对我们提供的其中一张图片进行缩放。我们可以为配备 Retina 显示屏的 Mac 提供一张细节丰富的大图，但缩放后的效果可能并不完全符合我们的预期。支持多张图片意味着我们可以针对较小的尺寸，精心调整图标的外观。\n\
  \n我们需要在图像编辑程序中开始制作图标，例如 Photoshop、Pixelmator 或 GIMP。原始文件的尺寸应为 1024×1024 像素，并保存为支持\
  \ Alpha 通道（透明度）的标准图像格式，如 TIFF、PSD 或 PNG。在本例中，我们将使用`.png`文件。将其保存为`icon_512x512@2x.png`。然后，我们可以使用最适合的方法对图像进行等比缩小。通常的做法是使用图像编辑器的缩放功能，然后在必要时手动进行微调。\n\
  \n为了省去您自己创建图标的麻烦，我们提供了一个`hello world.iconset`文件夹，其中包含您可以添加到项目中的图片。您可以在第 2 章的下载项目文件中找到这个文件夹。如果您想自己动手制作，也完全可以，请按照`hello\
  \ world.iconset`文件夹中的命名规范来命名您的图片。\n\n### 向项目中添加图标\n\n无论您是自行创建了图标，还是使用我们提供的图标，现在需要将其添加到\
  \ Xcode 项目中。为此，请在屏幕左侧的导航器区域选择项目。它是项目导航器视图中的最顶部项；在我们的例子中，它标记为“Chapter2”。项目的概要信息将显示在窗口中央的编辑区域，并且应已选中\
  \ Chapter2 目标。将`hello world.iconset`文件夹从 Finder 拖拽到窗口中央的 Xcode 应用图标槽中，如图 2-15 所示。这告诉\
  \ Xcode 我们希望将此文件导入到项目中。\n\n![A978-1-4302-4543-8_2_Fig15_HTML.jpg](img/A978-1-4302-4543-8_2_Fig15_HTML.jpg)\n\
  \n图 2-15. 将文件拖拽到应用图标槽以将图标添加到 Xcode 项目\n\n松开鼠标按钮后，`.iconset`文件将被复制到项目目录中，并添加到文件列表中。我们也可以让\
  \ Xcode 使用项目目录之外的文件，但目前我们希望将所有内容都放在同一位置。\n\n### 属性列表\n\n`Info.plist`是一种特殊的文件，称为属性列表。属性列表在\
  \ OS X 中被广泛使用。虽然终端用户很少看到它们，但它们用于 Cocoa 开发的许多部分，因此您会经常遇到它们。\n\n属性列表文件由一系列条目组成。每个条目由一个键和一个值构成。图\
  \ 2-16 显示了 Xcode 内置的属性列表编辑器，正在编辑`Chapter2-Info.plist`文件。每一行代表一个单独的条目。如您所见，属性列表包含三列。左列标记为“键”，右列标记为“值”。中间列标记为“类型”，指示数据类型；大多数属性列表值是字符串，但偶尔也会看到其他类型。\n\
  \n> 注意：属性列表还能够在单个键下存储多个值。可以在一个键下存储一个项目数组（或列表），甚至可以在一个键下存储另一整套键值对。您暂时还不需要用到这个功能，但我们认为您应该知道它是可行的。\n\
  \n在图 2-16 中，键为`Icon file`的条目已被高亮显示。请注意，属性列表中的`Icon file`条目已被自动设置为我们导入的`iconset`目录。\n\
  \n![A978-1-4302-4543-8_2_Fig16_HTML.jpg](img/A978-1-4302-4543-8_2_Fig16_HTML.jpg)\n\
  \n图 2-16. 在编辑窗格中打开的`Chapter2-Info.plist`，以便我们查看此应用程序图标文件的名称\n\n准备好编写一些代码了吗？猜猜看？实际上无需编写任何代码。我们的应用程序已经完成了。\n\
  \n### 运行应用程序\n\n通过点击 Xcode 窗口左上角的“运行”按钮来构建并运行您的应用程序。Xcode 将构建我们的应用程序（可能需要一些时间），然后运行它。屏幕上应该会出现一个窗口，其中包含我们居中的彩色标签。如果我们查看\
  \ Mac 主屏幕底部的程序坞，会看到我们的应用程序以我们导入的图标显示在项目列表中。不过，等等：还有更多功能！\n\n从 Chapter2 菜单中选择“关于\
  \ Chapter2”，关于对话框就会出现（图 2-17）。我们不仅免费获得了一个关于对话框，而且它还包含我们的图标。\n\n![A978-1-4302-4543-8_2_Fig17_HTML.jpg](img/A978-1-4302-4543-8_2_Fig17_HTML.jpg)\n\
  \n图 2-17. 我们的应用程序在多个地方使用了我们的图标，包括关于对话框\n\n我们还没完。将鼠标移到应用程序主窗口中的“Hello, World!”文字上。光标应该会从箭头变为文本光标。因为我们使标签可选中，Cocoa\
  \ 会自动改变光标，以此提示用户他们可以选择这段文本。继续双击“Hello”这个词，它会被高亮显示。现在，如果我们选择“编辑”菜单，会看到“复制”菜单项不再是灰色不可用的。如果选择它，我们的程序会将“Hello”这个词复制到剪贴板，然后我们可以将其粘贴到任何其他接受文本的应用程序中。在“Hello”仍被选中的状态下，选择“编辑”菜单，然后选择“语音”子菜单，并选择“开始朗读”。应用程序将使用您\
  \ Mac 的文本转语音功能朗读“Hello”。\n\n无需编写任何代码，我们的应用程序就支持将文本复制到剪贴板和文本转语音功能。几乎不费吹灰之力，我们的应用程序就像真正的\
