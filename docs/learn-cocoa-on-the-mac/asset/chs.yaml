  \n**图 6-4.** 表格视图（Table View）正好位于我们想要的位置\n\n我们需要在刚添加的按钮与`VillainTrackerAppDelegate`对象之间建立一些连接，以便当用户点击按钮时，`VillainTrackerAppDelegate`对象能够收到通知。经过前面几章的学习，你大概已经猜到我们该如何操作了。选中带有加号的按钮，按住\
  \ Control 键并从该按钮拖出一条连接线，连接到 Interface Builder 区域左侧停靠栏中的`VillainTrackerAppDelegate`对象上。此时会弹出一个工具窗口，列出`VillainTrackerAppDelegate`暴露的所有可用操作。选择我们之前添加的`newVillain:`操作。接下来，选中带有减号的按钮，按住\
  \ Control 键并拖出一条连接线到`VillainTrackerAppDelegate`。这一次，选择`deleteVillain:`操作。\n\n我们还需要在`VillainTrackerAppDelegate`与表格视图（Table\
  \ View）之间建立连接。选中左侧停靠栏中的`VillainTrackerAppDelegate`，按住 Control 键并拖出一条连接线到表格视图（Table\
  \ View）上。当鼠标悬停在表格视图上方时，该视图会高亮显示。松开鼠标，会弹出一个可用出口（outlets）列表。选择`villainsTableView`。现在，我们需要在相反方向建立两个连接，即从表格视图（Table\
  \ View）到`VillainTrackerAppDelegate`。选中窗口中的表格视图（Table View）（需要点击两次才能穿透滚动视图）。按住 Control\
  \ 键从表格视图（Table View）拖出一条连接线到`VillainTrackerAppDelegate`，然后从选项列表中选择`dataSource`。接着重复此操作，这次选择`Delegate`。至此，所有连接就设置好了！\n\
  \n让我们看看运行时这一切是如何运作的。点击 Xcode 窗口左上角的`Run`按钮。尝试拖拽窗口的右下角来调整大小，看看会出现什么效果。请小心，因为接下来是……\n\
  \n## 一个棘手的缩放问题，或者说，约束来救场了！\n\n第一次运行重新组织过窗口的程序时，你可能会看到类似图 6-5 中那样相当丑陋的画面。这是通过缩放手柄将窗口垂直拉伸并水平收缩的结果。观察图片中的窗口，表格视图（Table\
  \ View）看起来还不错，“能力与特长”框和“主要动机”框也还算正常。“外观”框则向下扩展了。“备注”框水平方向缩小了，“基本信息”框也是如此。实际上，“基本信息”框已经有点乱了。你的布局可能以与图示不同的方式出现问题，但很可能没有完全按照你预期的方式运作。你可能希望使用本章提供的源代码来亲自尝试一下。\n\
  \n![A978-1-4302-4543-8_6_Fig5_HTML.jpg](img/A978-1-4302-4543-8_6_Fig5_HTML.jpg)\n\
  \n**图 6-5.** 唉！这太不美观了\n\n在修复这些问题之前，我们先来思考一下我们希望达到的效果。对于这个程序，我们希望上一章中的所有原始 UI 元素（即所有位于`NSBoxes`中的项目）保持大小不变，并且始终固定在窗口的右侧。两个新按钮应保持大小不变，彼此间距固定，并固定在窗口左侧表格视图的下方。新的表格视图应在窗口扩展时同时向垂直和水平方向扩展，紧贴窗口左侧，并且无论在任何方向上都不能缩小到当前尺寸以下。表格视图右侧的几个框则应保持与表格视图的间距不变。\n\
  \n要使这一切正常工作，我们必须了解 Cocoa 是如何处理缩放的。从 Mac OS X Lion 开始，缩放通过一个名为 Cocoa Auto Layout\
  \ 的系统进行。在 Auto Layout 中，缩放行为通过带有优先级的约束来指定，这意味着你可以声明视图的最小或最大尺寸、需要保持的子视图间关系、视图与其父视图之间的关系等。当用户缩放宽口时，一个约束求解引擎会根据优先级顺序，动态尝试确定在尽可能满足约束条件前提下的最佳布局。这些约束还处理用户界面在从右到左书写系统（如阿拉伯语和希伯来语）中的表现方式。\n\
  \n每个约束都表达一种关系，例如“等于”、“小于”或“大于”，并且涉及一对视图，或者一个视图和一个常量。一个非常简单的约束可能是“`myButton`的宽度 =\
  \ 87”。显然，这会将按钮的宽度固定为 87 点。约束不一定是等式；一个有效的约束可以是“`myButton`的高度 >= 32”，这表示按钮的高度不能小于\
  \ 32。系统会优先选择较小的尺寸而非较大的尺寸；一个宽度必须大于或等于 32 的按钮通常会被设置为 32（满足不等式的最小值）。\n\n一个更复杂的例子是下面这对约束：“`myButton`的左侧边缘与窗口左侧边缘之间的水平间距\
  \ = 10”以及“`myButton`的右侧边缘与窗口右侧边缘之间的水平间距 = 15”。为了在缩放过程中保持这两个约束成立，按钮需要随窗口一起伸缩。请注意，我们使用了“leading”和“trailing”而不是“left”和“right”。在从左到右的书写系统中，leading\
  \ 边缘是左侧。然而，在从右到左的书写系统中，leading 边缘是右侧。\n\n每个约束还有一个优先级，范围从 1 到 1000。优先级高的约束会优先于优先级低的约束得到满足，如果两个冲突的约束无法同时满足，则优先级高的约束会胜出，而优先级低的约束会被违反。例如：“`myButton`的宽度\
  \ >= 32，优先级为 1000”以及“`myButton`的宽度 = `someField`的宽度 - 40，优先级为 750”。只要`someField`的宽度大于\
  \ 72，那么两个约束都能满足，`myButton`会比`someField`小 40 点。但是，如果`someField`缩小到小于 72 点，优先级高的约束将胜出，`myButton`就不会再继续缩小了。\n\
  \n每个视图还具有内容拥抱优先级（Content Hugging Priority）和内容压缩阻力优先级（Content Compression Resistance\
  \ Priority）。这两个属性描述了视图相对于其最合适尺寸（即固有尺寸）的缩放方式。对于按钮而言，固有尺寸是显示其标签（以及图标，如果有的话）而不发生裁剪所需的大小。内容拥抱控制的是当视图被要求大于其固有尺寸时，它将如何缩放。压缩阻力控制的是当视图被要求小于其固有尺寸时，它将如何缩放。通常，这些优先级的默认值就是不错的选择，在本章中，我们将保持它们不变。\n\
  \n\n\n### 创建与编辑约束\n\n`Interface Builder` 允许我们指定控制每个视图缩放行为的约束。事实上，在我们拖拽新控件到窗口时，`Interface\
  \ Builder` 显示的蓝色虚线引导线一直就在执行这项操作。约束最初基于定位控件时高亮的蓝色引导线在 `Interface Builder` 中创建，且当控件被重新定位时可以改变。例如，当我们把表格视图拖拽到窗口右上角时，靠近边缘会出现一条垂直和一条水平的蓝色虚线。这表示表格视图应固定在那个角落，并创建了一对约束，表明表格视图应保持与窗口顶部和左侧边缘固定距离的位置。像我们这样的复杂窗口，可能包含数十个约束。\n\
  \n为了确定哪些约束是合适的，我们首先需要为窗口确定合适的缩放行为。对于我们的窗口，假设我们希望新的表格视图在窗口放大时能同时水平和垂直缩放。我们希望所有框保持尺寸不变，并在用户缩放窗口时向右弹性移动。最后，我们希望按钮彼此尺寸相同，并固定在窗口底部。我们需要设置新的约束来实现这一点，并可能移除一些非预期的约束。顺便提一下，处理缩放是一个迭代过程。结合在\
  \ `Interface Builder` 模式下测试窗口缩放以及使用 `Xcode` 中的 `Simulate Document` 功能进行试错，通常是打磨它的方式。投入一些时间尝试缩放并观察约束如何相互作用，会比任何书本阅读更能提升你的理解能力。\n\
  \n这些约束可以在 `Xcode` 中编辑；我们可以在屏幕上、`Utility` 区域的 `Size Inspector` 中，以及 `Interface Builder`\
  \ 面板左侧边缘的图标停靠栏中看到它们。选择隐藏在 `Interface Builder` 面板左下角的小展开三角形，图标停靠栏将展开，显示窗口中视图的完整层级。每个视图可以有一组关联的约束，而我们的窗口有很多视图。在\
  \ `Utility` 区域，选择 `Size Inspector`（`⌥⌘5`），然后选择标记为 `Appearance` 的框，并展开左侧的 `Constraints`\
  \ 项。选中该框时，`Interface Builder` 面板应如图 6-6 所示。\n\n![A978-1-4302-4543-8_6_Fig6_HTML.jpg](img/A978-1-4302-4543-8_6_Fig6_HTML.jpg)\
  \  \n*图 6-6. Appearance 框的缩放约束*\n\n在 `Size Inspector` 中，我们可以看到影响 `Appearance` 框的九个约束，至少按我们目前的布局是这样。（根据你布局窗口的方式，约束的顺序或常量值可能略有不同。）每条从框延伸出的蓝线也代表一个与另一个视图相关的缩放约束。并非所有约束都与其他视图相关，因此实际激活的约束比蓝线所可视化的要多。\n\
  \n`Appearance` 框的问题在于，当窗口在缩放过程中被拉长时，它会向下扩展，同时导致 `Image` 视图也随之扩展。查看 `Size Inspector`\
  \ 中的约束列表，其中一条显示“`Bottom Space to: Superview equals: 29`”。这个约束意味着 `Appearance` 框的底部应保持在窗口底部上方\
  \ 29 点处。另一个处理垂直尺寸的约束显示“`Top Space to: Box – Basic Information Equals: Default`”。这意味着框的顶部边缘应保持与\
  \ `Basic Information` 框底部的系统默认距离。约束左侧的紫色图标表示这些是系统创建的约束——即我们在 `Interface Builder`\
  \ 中定位框时设置的约束。当我们之前定位 `Appearance` 框以使其对齐窗口底部附近的蓝色引导线时，我们隐式创建了那个 `Bottom Space` 约束。然而，如果我们点击\
  \ `Bottom Space` 约束旁的齿轮图标，会发现 `Delete` 菜单项被禁用。为了移除它，我们需要换个思路。\n\n让我们稍微尝试一下。在 `Interface\
  \ Builder` 中，抓住窗口底部并向下拖拽放大。`Appearance` 框确实会在垂直方向放大。`Bottom Space` 约束导致框增长，以保持与窗口底部\
  \ 29 点的距离。将窗口重新调整回 364 点高度，使一切恢复原状（或松开鼠标，然后按 `Undo`（`⌘Z`）撤销缩放操作）。\n\n由于我们无法直接删除\
  \ `Appearance` 框上的约束，我们将改变导致系统最初创建它的条件，并通过利用蓝色引导线（或其缺失）来实现。最简单的方法是将 `Appearance`\
  \ 框移离窗口底部边缘。请按以下步骤操作。\n\n![A978-1-4302-4543-8_6_Fig7_HTML.jpg](img/A978-1-4302-4543-8_6_Fig7_HTML.jpg)\
  \  \n*图 6-7. 重新排列后的 Appearance 框约束*\n\n1. 创建一个新约束来固定 `Appearance` 框的当前尺寸。为此，选择该框，然后从菜单栏选择\
  \ `Editor` ➤ `Pin` ➤ `Height`。\n2. 将 `Appearance` 框移到窗口顶部附近，远离底部。这将移除将框底部固定到窗口底部的约束。\n\
  3. 向下缩放窗口以腾出更多空间。\n4. 将 `Appearance` 框放回原位，使框的标题与窗口底部区域的其他两个框对齐，并均匀分布。由于窗口底部距离更远，我们应避免创建该约束。窗口应看起来类似图\
  \ 6-7。\n5. 将窗口缩放回原状。\n\n在垂直缩放时，窗口的行为符合我们的预期。现在，在水平缩放方面我们需要处理两件事：表格视图没有弹性缩放，但最右侧的两个框（`Notes`\
  \ 和 `Powers and Abilities`）却在缩放。我们可以通过选择 `Editor` ➤ `Simulate Document` 并观察效果来检查这种情况是否发生。\n\
  \n让我们先检查表格视图。在 `Interface Builder` 中选择表格视图，并查看其约束。没有前导或尾随空间约束来固定尺寸，所以问题一定出在右侧的两个框上。由于我们希望它们保持尺寸不变，而不是在窗口缩放时变大，选择\
  \ `Powers and Abilities` 框，然后选择 `Editor` ➤ `Pin` ➤ `Width`。对其他所有框执行相同操作。\n\n\n\n\
  选择 `Editor` ➤ `Simulate Document` 并尝试水平调整大小。窗口将纹丝不动。我们发现存在一些约束固定了窗口，需要找到并移除它们。针对每个文本框，在尺寸检查器中查看列出的约束，找到值为任意数值且描述为“前置空间到：父视图”的约束。你可以通过选中文本框来确认是否存在这些约束——查看是否有从文本框左侧延伸至窗口边缘的蓝色条。删除所有可删除的约束：要么从该文本框尺寸检查器中约束项下方齿轮图标菜单里选择“删除”，要么选中蓝色条后按\
  \ Delete 键。\n\n移除所有约束后，再次选择 `Editor` ➤ `Simulate Document` 并尝试水平调整大小。此时窗口应该能按我们期望的方式调整大小，如图\
  \ 6-8 所示。\n\n![A978-1-4302-4543-8_6_Fig8_HTML.jpg](img/A978-1-4302-4543-8_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** 调整大小终于成功了！\n\n在继续实现代码之前，关于调整大小还有几点补充说明。调试调整大小问题几乎总是一个反复试错的迭代过程。我们已经介绍了一些使其正常工作的方法：\n\
  \n- 在界面生成器中调整窗口大小，观察各个元素如何相对于窗口进行调整。\n- 如果窗口设计已经演变，尝试重新排列用户界面元素以重置约束。\n- 使用“模拟文档”功能进行实验。\n\
  - 通过蓝色条和尺寸检查器，查看约束在界面生成器中的可视化效果。\n\n关于约束和 Cocoa 自动布局还有更多内容需要学习；以上只是基础知识。更多详情和调试技巧可查阅\
  \ Apple Developer Connection 网站上的《Cocoa 自动布局指南》以及 Xcode 文档。\n\n> **注**  \n> Cocoa\
  \ 自动布局是在 Mac OS X 10.7 中引入的。在此之前，调整大小是通过一种称为“弹簧和支柱”的机制控制的，该机制控制视图如何相对于其所在的窗口调整大小。在\
  \ 10.7 及更高版本中，旧的弹簧和支柱调整大小行为会在后台转换为约束；应用程序中可以同时存在使用约束的 nib 文件和使用弹簧和支柱的 nib 文件。但是，如果你遇到\
  \ 2011 年之前的 Cocoa 代码，几乎肯定会遇到不使用约束的 nib 文件。\n\n## 为表格视图让路：代码篇\n\n在连接建立完成且调整大小已受控后，我们可以将注意力转向驱动表格视图并响应“添加”和“移除”按钮点击所需的代码。为此，我们需要离开界面生成器模式，回到代码中。打开项目导航器（⌘1），如果尚未打开的话。单击\
  \ `VillainTrackerAppDelegate.m` 文件的条目，编辑器区域应从界面生成器切换为显示我们对象代码的代码窗口。\n\n由于已经在上一章打下了基础，为反派数组添加支持出奇地简单。基本上，我们需要创建一个数组，在希望表格视图显示其内容时（每当其内容发生变化时）通知它，实现几个\
  \ `dataSource` 方法为表格视图提供内容，并实现一个在表格视图选择发生更改时调用的 `delegate` 方法（以便更新所有其他视图以匹配所选反派）。接着，我们将添加一对方法，用于从数组中添加和删除反派，然后大功告成！\n\
  \n让我们从初始化一个用于存放反派的数组开始，并告知表格视图应该加载其内容。我们只需在 `applicationDidFinishLaunching:` 中添加几行代码，如下面代码中的粗体部分所示。首先，我们创建一个数组来存放所有反派（初始时仅包含之前我们在代码中创建的第一个反派），并将其赋值给我们的\
  \ `villains` 实例变量。然后，我们告诉表格视图加载其内容，并选中其第一行。\n\n告知表格视图选择哪一行比初看起来要复杂一些。我们使用的 `NSTableView`\
  \ 方法叫做 `selectRowIndices:byExtendingSelection:`。由于表格视图可以选择多行，且选中的行不必连续，因此表格视图期望在\
  \ `selectRowIndices:byExtendingSelection:` 方法中传入一个索引集合。在我们的场景中，我们只想选中一行，所以动态创建一个仅包含一个元素的集合。\n\
  \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
  \n    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n    \
  \                @\"Lex Luthor\", kName,\n                    @\"Smallville\", kLastKnownLocation,\n\
  \                    [NSDate date], kLastSeenDate,\n                    @\"Superman\"\
  , kSwornEnemy,\n                    @\"Revenge\", kPrimaryMotivation,\n        \
  \            [NSArray arrayWithObjects:@\"Evil Genius\", nil], kPowers,\n      \
  \              @\"Superhero action\", kPowerSource,\n                    @9, kEvilness,\n\
  \                    [NSImage imageNamed:@\"NSUser\"], kMugshot,\n             \
  \       @\"\", kNotes,\n                    nil];\n\n    /* 新代码从这里开始 */\n    self.villains\
  \ = [NSMutableArray arrayWithObject:self.villain];\n    [self.villainsTableView\
  \ reloadData];\n    [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:0]\
  \ byExtendingSelection:NO];\n    /* 新代码到这里结束 */\n\n    [self updateDetailViews];\n\
  }\n```\n\n我们还需要在 `takeName:`、`takeLastSeenDate:` 和 `takeMugshot:` 每个方法的末尾添加 `[villainsTableView\
  \ reloadData]` 调用，这样当用户编辑这些属性的控件时，表格视图将相应更新。只需复制该行代码并粘贴到每个方法的末尾即可。仅仅因为单个值被更改就调用一个看似要重新加载整个数据表的方法，可能显得有些过头，但别担心：`NSTableView`\
  \ 使用懒加载，通常只会在某一行即将显示时才请求该行的内容。你可能拥有百万行内容，但如果你从不滚动到前 30 行之后，那么表格视图很可能只加载前 30 行。同样，通知表格视图重新加载数据只会使其立即加载可见行；其余行只会在滚动进入显示区域时才会重新加载。\n\
  \n此时，我们应该能够编译并运行我们的应用程序，并且会看到与上一章结尾大致相同的内容，外加一个空白的大表格视图和两个不起作用的按钮。是时候用反派来填充那个表格视图了！\n\
  \n\n\n### 表格视图需要协助\n\n我们已经要求表格视图加载其内容，但在我们连接了表格视图的`dataSource`和`delegate`出口的对象——即`VillainTrackerAppDelegate`中，实现`NSTableDataSource`和`NSTableViewDelegate`协议中的某些方法之前，它无法执行任何操作。`NSTableDataSource`和`NSTableViewDelegate`是非正式协议，与大多数委托协议类似，这意味着我们无需声明自己的类符合该协议。因此，就\
  \ Objective-C 而言，实现`NSTableDataSource`和`NSTableViewDelegate`的方法是可选的。尽管如此，要让表格视图显示任何内容，实际上有几个方法是必需的：来自`NSTableViewDataSource`的`numberOfRowsInTableView:`和来自`NSTableViewDelegate`的`tableView:viewForTableColumn:row:`，表格视图会使用这两个方法来准备要显示的内容。以下是在`VillainTrackerAppDelegate.m`中实现这些方法的方式：\n\
  \n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView *)aTableView {\n    return\
  \ [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView *)aTableView\n\
  \       viewForTableColumn:(NSTableColumn *)tableColumn\n                      row:(NSInteger)row\
  \ {\n    NSMutableDictionary *thisVillain = [self.villains objectAtIndex:row];\n\
  \    NSString *thisColName = [tableColumn identifier];\n    NSView *result = nil;\n\
  \n    // 根据我们使用的列，需要执行不同的操作。\n    // 将 [tableColumn identifier] 传递给 makeViewWithIdentifier\
  \ 可以确保我们获得\n    // 已在 IB 中为该列配置好的视图，AppKit 会为我们管理这一点。\n    if ([thisColName isEqualToString:kName])\
  \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
  \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kName];\n\
  \        result = thisCell;\n    } else if ([thisColName isEqualToString:kLastSeenDate])\
  \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
  \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
  \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
  \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
  \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
  \        result = thisCell;\n    }\n\n    // 返回结果。\n    return result;\n}\n```\n\
  \n第一个方法不言自明：我们只需返回数组的大小，以便表格视图知道需要显示多少行。每当单元格即将在表格中显示时，表格视图都会调用第二个方法。表格视图会告诉我们它想要显示的列和行索引编号。行索引编号与内容数组中相关对象的索引编号相同，因此调用`[villains\
  \ objectAtIndex:rowIndex]`会从`villains`中返回相应的模型对象。你可能还记得，我们使用的模型对象实际上只是`NSMutableDictionary`实例，其所有值都可通过键访问。当我们在表格视图中配置每列的标识符属性时，我们使用了与模型对象相同的键名。根据列的标识符，我们要求表格视图使用`makeViewWithIdentifier:owner:`为该列创建适当的`NSView`子类实例。然后，我们根据模型对象中的相关值配置视图，并将其返回给表格视图。\n\
  \n例如，当`Name`列下顶行中的单元格即将显示时，系统会调用此方法，其中`rowIndex`为 0，`TableColumn`指向`Name NSTableColumn`。我们使用\
  \ 0 来指定从`villains`数组中抓取哪个反派，然后使用表列标识符方法返回的值`@\"name\"`，从选中的反派中检索一个值。我们要求表格视图为那列获取一个适当的`NSView`实例（我们在\
  \ Interface Builder 中配置了该实例），然后以适合该`NSView`的任何方式填充它。最后，我们返回该视图，表格视图将其绘制出来。\n\n现在，我们应该能够编译并运行`VillainTracker`，并看到默认反派既显示在控件中，也作为表格视图中的唯一一行显示。此外，如果我们在控件中编辑反派的名称、最后目击日期或头像，我们应该会在表格视图中看到这些新值的反映。然而，我们目前仍然只有一个反派，并且没有办法追踪更多。让我们现在就来改变这一点。\n\
  \n### 添加更多反派\n\n我们之前已经搭建了`newVillain:`方法的框架。现在我们来填充其实现。`newVillain:`方法会向我们的反派数组中添加一个新的“空”反派对象，通知表格重新加载，并告诉表格视图应选择哪一行（最后一行，因为这是我们刚刚添加的那一行）。\n\
  \n```\n- (IBAction)newVillain:(id)sender {\n    [_window endEditingFor:nil];\n \
  \   [self.villains addObject:[NSMutableDictionary\n        dictionaryWithObjectsAndKeys:\n\
  \            @\"\", kName,\n            @\"\", kLastKnownLocation,\n           \
  \ [NSDate date], kLastSeenDate,\n            @\"\", kSwornEnemy,\n            @\"\
  Greed\", kPrimaryMotivation,\n            [NSArray array], kPowers,\n          \
  \  @\"\", kPowerSource,\n            [NSNumber numberWithInt:0], kEvilness,\n  \
  \          [NSImage imageNamed:@\"NSUser\"], kMugshot,\n            @\"\", kNotes,\n\
  \            nil]];\n    [self.villainsTableView reloadData];\n    [self.villainsTableView\
  \ selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains count]-1]\n         \
  \           byExtendingSelection:NO];\n}\n```\n\n我们在这里可能看到的唯一新内容是第一个方法调用`[_window\
  \ endEditingFor:nil]`。我们来分析一下它的两个部分。首先，`_window`实例变量来自哪里？Xcode 根据它在`VillainTrackerAppDelegate.h`文件中生成的已声明属性，为我们构造了这个变量，并自动将其连接到窗口：\n\
  \n`@property (assign) IBOutlet NSWindow *window;`\n\n由于我们没有通过`@synthesize`声明给出显式名称，Xcode\
  \ 默认创建了一个带有前导下划线的新实例变量。其次是我们对窗口调用的方法`endEditingFor:`。这仅仅是告诉窗口，现在是时候结束用户当前正在进行的任何其他编辑行为（例如在文本字段中键入）。我们需要调用此方法，以便可以将编辑后的值“保存”到其底层的反派对象中，因为稍后在`newVillain:`中我们将更改表格视图的选择，这反过来会擦除各个控件中显示的值！\n\
  \n\n\n### 选择反派角色\n\n目前，我们应用详情部分只显示了列表中第一个反派角色。为了更新详情视图，我们需要实现一个委托方法，该方法会在表格视图的选择状态发生改变时被调用。这能使我们获知用户选中了哪一行，从而将我们的反派角色实例变量指向反派角色数组中对应的那一行，并重新显示所有其他控件以匹配新的选择。请将此方法添加到\
  \ `VillianTrackerAppDelegate.m` 文件的 `@implementation` 部分：\n\n```\n- (void)tableViewSelectionDidChange:(NSNotification\
  \ *)aNotification {\n    if ([self.villainsTableView selectedRow] > -1) {\n    \
  \    self.villain = [self.villains\n                       objectAtIndex:[self.villainsTableView\
  \ selectedRow]];\n        [self updateDetailViews];\n        NSLog(@\"current villain\
  \ properties: %@\", self.villain);\n    }\n}\n```\n\n请注意，此方法的核心代码被包裹在一个 `if` 子句中。之所以必须这么做，是因为表格视图可能会通知我们当前没有任何选中的行——其\
  \ `selectedRow` 方法会返回 –1 来表示这种情况。除此之外，你现在应该能够理解其中发生的事情了。\n\n现在编译并运行应用，可以看到 + 按钮现在确实能触发某种操作，如图\
  \ 6-9 所示。此外，我们应该能够在表格视图中点击切换不同的反派角色，并看到其他控件中的值随之改变。\n\n![A978-1-4302-4543-8_6_Fig9_HTML.jpg](img/A978-1-4302-4543-8_6_Fig9_HTML.jpg)\n\
  \n图 6-9.\n\n+ 按钮现在可以添加反派角色了\n\n### 停止你的邪恶行径！\n\n能够删除一个反派角色会很好。一旦我们的英雄说服了一个反派停止其邪恶行径，我们可能就想把他们从数据库中移除。或者，也可能只是我们输入有误。无论如何，让我们增加删除坏蛋的功能。我们已经有一个\
  \ `deleteVillain:` 方法的存根，下面就是这个方法应该完成的工作。（我们添加了注释来标明不同的部分，这些部分将在代码之后进行说明。）\n\n```\n\
  - (IBAction)deleteVillain:(id)sender {\n    //\n    // 第 1 部分：\n    //\n    [_window\
  \ endEditingFor:nil];\n    NSInteger selectedRow = [self.villainsTableView selectedRow];\n\
  \    //\n    // 第 2 部分：\n    //\n    [self.villains removeObjectIdenticalTo:self.villain];\n\
  \    [self.villainsTableView reloadData];\n    //\n    // 第 3 部分：\n    //\n    if\
  \ (selectedRow >= [self.villains count]) {\n        selectedRow = [self.villains\
  \ count]-1;\n    }\n    //\n    // 第 4 部分：\n    //\n    if (selectedRow > -1) {\n\
  \        // 取消所有行的选中状态，以确保表格视图认为选择发生了“变化”，\n        // 即使它可能仍然指向相同的行索引。\n      \
  \  //\n        // 第 5 部分：\n        //\n        [self.villainsTableView deselectAll:nil];\n\
  \        [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:selectedRow]\
  \ byExtendingSelection:NO];\n        [self updateDetailViews];\n    }\n}\n```\n\n\
  这个方法比我们本书迄今为止展示的大部分代码都要稍微复杂一些，因此有必要进行一些补充说明。\n\n在第 1 部分中，我们让窗口结束任何正在进行的编辑操作，然后获取表格当前选中行的索引——也就是即将被删除的那一行。请注意，我们已经知道哪个反派被选中了，因为它被存储在一个实例变量中，但拥有行索引对于确保删除后的选择逻辑正确至关重要（我们将在第\
  \ 4 部分处理这个问题）。\n\n在第 2 部分中，我们从反派角色数组中删除选中的对象（由 `villain` 属性指向的对象），然后告诉表格视图重新加载数据。请注意从数组中移除反派角色的方法是\
  \ `removeObjectIdenticalTo:`。这个方法会让 `NSMutableArray` 通过比较对象的实际内存地址与它所包含对象的内存地址来自我扫描，以便只找到并移除我们传入的那个确切对象。否则，如果我们使用更常用的\
  \ `removeObject:` 方法，它会通过发送 `isEqual:` 方法来比较对象，而后者会比较对象的值。在这种情况下，其他与选中反派属性完全相同的反派对象也存在被一并删除的风险。\n\
  \n在第 3 部分中，我们做一个小调整。如果之前选中的行索引是数组中的最后一个索引，那么在我们从数组中移除一个对象之后，该索引现在就越界了。在这种情况下，我们将其重置为指向当前最后一个对象。\n\
  \n接下来，第 4 部分检查 `selectedRow` 是否大于等于 0。这个检查很重要，因为第 3 部分有可能将其设置为 –1！考虑一下这种情况：数组中只有一个对象，我们点击了“删除”按钮：开始时，`selectedRow`\
  \ 会是 0（数组中唯一一行的索引），但在第 3 部分之后它变成了 –1，第 4 部分通过直接跳过方法的其余部分来处理这种情况。\n\n最后，第 5 部分取消表格视图中所有行的选中状态，然后选中我们当前想要的行，并最终根据当前选择更新所有视图。这看起来可能不明显，但首先取消表格视图中所有行的选中状态很重要，否则\
  \ `tableViewSelectionDidChange:` 委托方法可能不会被调用（因为通常在删除一行后，选中的行索引本身还是同一个数字，而表格视图无法知道我们已从内容数组中删除了一个对象，导致该行索引现在指向了一个不同的对象）。\n\
  \n现在编译并运行应用；我们现在可以删除选中的反派角色，并且控件中的值会随之改变以匹配新的选择。\n\n我们只剩下最后一个特性想要实现。我们的用户还不能直接在表格视图中编辑值。现在让我们来解决这个问题。\n\
  \n\n\n### 在表格视图中编辑\n\n用户应能编辑反派的名字，或将新头像拖入表格视图的任意一行，并更新相应的反派。由于表格视图的列是 `NSViews`，表格视图中的每个单元格都可以在\
  \ Interface Builder 中指定目标和动作；表格视图内的用户界面元素与其他视图的工作方式完全相同。当用户在表格视图内编辑某个值时，该动作可以连接回我们的代码，以通知我们这一更改。我们受到的限制是目标必须是表格视图的委托，但对于这个应用来说，这并不是问题。此外，我们现有的\
  \ `takeName:` 和 `takeMugshot:` 方法也可以使用，但它们需要做一些小改动。这些方法作用于选中的反派，但用户若不选中行（即选中反派）就无法编辑表格视图内的值。然而，这些方法目前预期只能从详情视图中的控件调用，但现在我们要添加从多个位置设置它的能力。对于这个应用，我们只允许在行内编辑名字和头像，并禁止编辑最后出现日期。\n\
  \n还有另一个小障碍需要解决。默认情况下，表格视图单元格是不可编辑的。在 Xcode 中可以轻松更改这一点。\n\n要进行连接，我们需要按住 Control 键，从每列中的视图拖出一条连接线到\
  \ `VillainTrackerAppDelegate` 实例。但是，表格视图单元格嵌套在窗口视图层次结构中的位置很深，因此我们将采用另一种方式来建立连接，以便更轻松地找到正确的用户界面组件。\n\
  \n回到 Xcode，打开 `MainMenu.xib` 文件，它会在 Interface Builder 画布中打开。点击屏幕左下角的小展开三角形，它会将屏幕左侧的对象停靠栏展开为窗口视图层次结构的轮廓图。同时，打开\
  \ Utility 区域中的属性检查器。\n\n在下钻到轮廓图中，找到名称列的文本字段；从外到内，路径是：窗口 – Villain Tracker ➤ 视图 ➤\
  \ 滚动视图 – 表格视图 ➤ 表格视图 ➤ 表格列 – 名称 ➤ 表格单元格视图 ➤ 静态文本 – 表格视图单元格 ➤ 文本字段单元格 – 表格视图单元格。在下钻时，您还会在编辑器画布上方的跳转栏中看到这条路径。点击“文本字段单元格\
  \ – 表格视图单元格”，然后按住 Control 键拖拽到停靠栏中更靠下的 Villain Tracker App Delegate 实例，如图 6-10 所示。当\
  \ Utility 窗口出现时，从动作列表中选择 `takeName:`。在继续之前，查看属性检查器（也如图 6-10 所示）。那里有一个标有“行为”(Behavior)\
  \ 的弹出菜单，当前值为“无”(None)。选择它并将其更改为“可编辑”(Editable)。\n\n![A978-1-4302-4543-8_6_Fig10_HTML.jpg](img/A978-1-4302-4543-8_6_Fig10_HTML.jpg)\n\
  \n图 6-10. 使用停靠栏进行 Control-拖拽\n\n最后，对图像井执行相同的操作。图像井的路径是：窗口 – Villain Tracker ➤ 视图\
  \ ➤ 滚动视图 – 表格视图 ➤ 表格视图 ➤ 表格列 – Mugshot ➤ 图像井 (Image Well) ➤ 图像单元格 (Image Cell)。按住\
  \ Control 键从“图像井”行（不是“图像单元格”行，而是其上一行）向下拖拽到 Villain Tracker App Delegate，然后选择 `takeMugshot:`。要使图像井可编辑，属性检查器顶部附近有一个复选框。如果您愿意，还可以启用“动画”(Animates)。如果您的反派头像包含动画信息或多个帧，例如来自反派\
  \ MySpace 页面的动画 GIF，那么这将在显示时播放动画。\n\n如前所述，`takeName:` 和 `takeMugshot:` 方法都期望从详情视图中执行更新的控件调用。之前，我们在每个方法的末尾添加了对\
  \ `[villainsTableView reloadData]` 的调用。现在我们需要在该调用之后添加另一个调用。在 `takeName:` 和 `takeMugshot:`\
  \ 中，在末尾添加对 `[self updateDetailViews]` 的调用。这确保了无论用户在何处进行编辑（在表格视图中还是在详情视图中），更改都会在两个地方反映出来。\n\
  \n是时候编译并再次运行应用，看看我们是否能在表格视图中编辑了。此时，我们应该能够添加一个新的反派、编辑其属性，然后删除他们。我们仍然无法保存任何关于反派的信息；这将是下一章的主题。\n\
  \n## 总结\n\n本章提供了一个简单演示，展示了如何维护一个项目列表，在表格视图中显示它们，并在另一组独立的控件中编辑所选项目的详细信息。我们了解了一些关于\
  \ `NSTableView` 如何使用其 `dataSource` 来访问项目以进行显示和编辑的知识，并看到了当选择发生更改时，它如何通知其委托，从而允许我们手动更新依赖于表格视图选择的视图中的内容。\n\
  \n如果您熟悉其他桌面 GUI 开发环境，其中一些内容可能对您来说有点陌生，但我们希望您能看到 Cocoa 所支持方法中的一些优势，例如在代码和 GUI 布局之间提供清晰的划分。然而，现在是时候承认了：我们迄今为止所采用的方式不一定是\
  \ Cocoa 中处理这类事情的最佳方式。尽管到目前为止一切都很简单，但我们实际上一直在向您展示解决某些问题的困难方法！在过去的几年里，一种新的 GUI 编程方法在\
  \ Cocoa 社区中扎根，并且变得越来越普遍。这项技术称为 Cocoa 绑定，它是第 7 章的主题。\n\n\n\n"
- "# 7. Cocoa 绑定\n\n## 摘要\n\n第 5 章和第 6 章介绍了如何将一个控制器对象连接到各种视图对象，以便显示值并在用户操作时获取新值。在我们的示例中，通常每个视图对应一个小型的操作方法（当用户编辑视图中显示的值时触发），再加上一个庞大的\
  \ `updateDetailViews` 方法，用于在选中项变化时一次性更新所有视图的内容。对于简单项目来说，这种方法尚可，但存在一些问题。首先，有扩展性问题。想象一下，不是十个视图，而是一百个视图。采用这种方法，控制器将包含一百个小型操作方法和一个用于向所有视图推送值的庞大方法！\n\
  \n此外，控制器与关联视图之间确实存在紧密耦合。例如，如果我们最初使用 `NSDatePicker` 来显示和编辑日期，但后来决定改用 `NSTextField`，该怎么办？除了修改图形界面，我们还需要修改输出口、相应的操作方法以及\
  \ `updateDetailViews` 方法。\n\n幸运的是，苹果公司早已意识到这个问题，自 Mac OS X 10.3 起便引入了一项名为 Cocoa\
  \ 绑定的技术，它解决了上述许多问题。Cocoa 绑定允许我们在 Interface Builder 中配置视图，使其能够自动获取值并将更改传回模型对象。我们只需告诉它应该与哪个控制器对象交互，以及使用哪个字符串作为键来获取和设置值。我们可以通过自定义的控制器类访问模型对象，也可以使用\
  \ Cocoa 中提供的通用控制器类。\n\n这种架构的结果是，我们自己的控制器类通常无需了解任何关于所用视图对象的具体信息。我们不需要有指向它们的实例变量，也不需要实现操作方法来获取它们的输入！控制器最终只相当于模型对象与一组视图对象之间的简单通道，从控制器的角度来看，十个视图还是一百个视图并无区别。\n\
  \n在本章中，我们将学习如何将 Cocoa 绑定用于简单的控件（如复选框、滑块和文本字段）以及复杂的控件（如表格视图）。我们将通过几个苹果内置的控制器类创建连接到模型对象的绑定。我们还将介绍如何使用\
  \ `NSUserDefaults` 及其支持绑定的伴侣 `NSUserDefaultsController` 来处理应用程序中的偏好设置。\n\n## 绑定到简单控件\n\
  \n本章的示例应用程序可用于角色扮演游戏中的游戏主持人，以随机创建角色、怪物和地下城。主窗口将包含按钮，用户点击这些按钮时可创建随机游戏对象，以及用于显示结果的文本字段。我们还将创建一个偏好设置窗口，用户可以在其中指定创建游戏对象的一些参数。我们不会实际“掷出”这些随机对象，而是每次用户点击按钮时显示所用参数的摘要。随机游戏对象的创建超出了本书的范围，但如果您有兴趣，这对读者来说可能是一个有趣的练习！\n\
  \n### 添加标签视图\n\n我们将把应用程序偏好设置分为三组，分别对应可创建的三个游戏对象。我们将把控件放在 `NSTabView` 中，用户可以通过顶部的标签列表在不同视图之间切换。在对象库窗格中，输入“tab”，然后将出现的标签视图拖入空白窗口，并调整其大小使其几乎填满窗口（如图\
  \ 7-1 所示），保留蓝色引导线显示的边距。\n\n![A978-1-4302-4543-8_7_Fig1_HTML.jpg](img/A978-1-4302-4543-8_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** 添加并命名标签后的 DungeonThing 偏好设置窗口\n\n从对象库拖出新的标签视图时，默认有两个标签，但我们希望有三个。点击标签视图，打开属性检查器（⌥⌘4）。注意“Tabs”字段，点击微小的向上箭头，将其值从\
  \ 2 改为 3，即可看到三个标签。双击每个标签的标题，分别改为“角色生成”、“怪物生成”和“地下城生成”。图 7-1 显示了此时窗口应有的样子。\n\n###\
  \ 绑定到 NSUserDefaultsController\n\n此时，窗口中已包含所有这些图形界面控件，但我们没有连接它们的输出口，也没有在用户点击时调用的操作方法。那么，接下来该做什么？现在是时候创建第一个绑定！我们将使用一个名为\
  \ `NSUserDefaultsController` 的类，它是 Cocoa 中一个支持绑定的通用控制器类。像这样的支持绑定的控制器允许我们在 Interface\
  \ Builder 中直接将视图对象绑定到底层模型对象。这个类的一个好处是，它通过 `NSUserDefaults` 来维护自己的存储，而 `NSUserDefaults`\
  \ 是 Cocoa 应用程序中用于保存和读取用户偏好设置的标准类。这使我们能够将每个视图对象的值绑定到应用程序偏好设置中一个唯一键对应的值。这些偏好设置在用户退出应用程序时自动保存，并在用户下次启动应用程序时重新加载。\n\
  \n\n\n### 角色生成界面的绑定\n\n前往我们正在构建的偏好设置窗口，切换回“角色生成”面板。点击滑块，然后调出绑定检查器(`⌥⌘7`)。在此检查器中，我们可以看到视图对象的所有属性，这些属性都可以绑定到模型对象中的某个值。通常，我们会将\
  \ `Value`(值) 绑定到某个内容，但每个视图类都提供了自己的一组可供绑定的属性。例如，滑块可以将其 `Max Value`(最大值) 和 `Min Value`(最小值)\
  \ 属性绑定到某个值，这使我们能够根据模型对象中的值来改变这些极值。其他一些视图对象可以将文本颜色和字体绑定到模型值，并且它们中的大多数都可以将其 `Hidden`(隐藏)\
  \ 和 `Enabled`(启用) 状态绑定到模型值。目前，我们要绑定这个滑块的 `Value` 属性，因此请点击 Value(值) 的展开三角形来查看其配置选项。图\
  \ 7-6 显示了默认设置。\n\n![A978-1-4302-4543-8_7_Fig6_HTML.jpg](img/A978-1-4302-4543-8_7_Fig6_HTML.jpg)\n\
  \n图 7-6. `NSSlider` 的 `Value` 绑定选项的默认“未绑定”状态\n\n要建立绑定，我们需要配置至少三项内容：要绑定的控制器对象、控制器键以及模型键路径（其余都是可选设置，用于在特殊情况下细化绑定的行为，我们将在后面介绍其中一些）。从“绑定到”弹出列表中选择控制器对象，该列表包含我们\
  \ nib 文件中存在的所有控制器对象，包括我们自己的任何控制器、从库中拖入的任何通用控制器，以及像 `NSUserDefaultsController` 这样的特殊控制器——它在每个\
  \ nib 文件中都自动可用（在弹出列表中显示为“共享用户默认控制器”）。控制器键让我们可以选择控制器所提供的一个或多个模型对象的不同“方面”。例如，`NSArrayController`\
  \ 提供了对对象数组的绑定访问，它具有不同的控制器键来提供对整个排序数组或仅当前选中的内容的访问。模型键路径是一个字符串，用作在模型对象中获取和设置值的键。\n\
  \n那么，对于我们的第一个绑定，首先从弹出列表中选择“共享用户默认控制器”。该控制器在任何 nib 文件中都是自动可用的，不过我们在将其用于绑定之前是看不到它的，一旦使用，它就会出现在主\
  \ nib 窗口中。现在检查“控制器键”组合框，确保它设置为 `values`。然后点击“模型键路径”组合框，并输入 `characterMaxNameLength`\
  \ 到该组合框中。此字符串定义了将用于把滑块的值存储到 `NSUserDefaults`（用户的应用程序偏好设置）中的键。按 Return 键或切换到其他字段，请注意检查器顶部的“绑定到”复选框被勾选了。就这样！我们现在无需担心任何剩余的控件；它们的默认值对我们来说已经足够。图\
  \ 7-7 显示了此绑定配置完成后检查器中相关配置部分应该呈现的样子。\n\n![A978-1-4302-4543-8_7_Fig7_HTML.jpg](img/A978-1-4302-4543-8_7_Fig7_HTML.jpg)\n\
  \n图 7-7. 第一个滑块完成的绑定\n\n现在选择滑块右侧的小文本字段，并配置与滑块完全相同的绑定：“共享用户默认控制器”、`values` 和 `characterMaxNameLength`。这将使其从同一个模型对象（用户的应用程序偏好设置）中的同一个位置（`characterMaxNameLength`\
  \ 的值）获取其显示值。要立即查看 Cocoa 绑定的魔力，请从菜单中选择“编辑器”➤“模拟界面”，点击并拖动滑块，观察小文本字段中的值同时更新。请注意，这与我们在第\
  \ 2 章中构建的功能相同，但机制不同：当我们拖动滑块时，它的值被 `NSUserDefaultsController` 推送到我们的应用程序偏好设置中，该控制器同时将值传递给绑定到同一个键的其他对象，也就是小文本字段。真是个巧妙的手段！但这并非什么戏法。它是\
  \ Cocoa 绑定动态特性的一个简单示例。利用这项技术，我们可以从控制器类中消除大量乏味的代码，有时甚至可以完全摆脱我们的控制器类——仅使用 Cocoa 自带的控制器类。\n\
  \n接下来我们看看下一个 GUI 控件，中间的单选按钮矩阵。点击该矩阵，然后查看绑定检查器，我们会发现没有 `Value` 选项。对于这个控件，我们不绑定 `Value`，而是绑定\
  \ `Selected Tag`(选中标签) 属性，这意味着当用户选择一个单元格时，该单元格的标签将被推送到模型中，并且下次打开偏好设置窗口时，保存的那个标签将决定选中哪个单选按钮。展开绑定检查器的“选中标签”部分，再次确保选中了“共享用户默认控制器”并且“控制器键”是\
  \ `values`，但这次在“模型键路径”中输入 `characterStatsGenerationPolicy` 并按 Return 键。\n\n接下来，我们来处理“允许的角色职业”复选框。对于每个复选框，我们都会创建一个新的键名，并用它将\
  \ `Selected`(选中) 状态绑定到用户应用程序偏好设置中的一个值。点击第一个单元格“圣骑士”。检查器标题应更改为“按钮单元格绑定”。如果没有，请再次点击该按钮直到标题改变。现在将这个按钮单元格的\
  \ `Value` 属性绑定到 `characterClassAllowedPaladin` 键。对剩下的每个按钮单元格重复这些步骤，通过“共享用户默认控制器”并使用相应的键名来绑定它们。“吟游诗人”应绑定到\
  \ `characterClassAllowedBard`，“战士”绑定到 `characterClassAllowedFighter`，依此类推。当处理到“魔法使用者”时，为了保持一致，请使用键名\
  \ `characterClassAllowedMagicUser`，省略掉 `-` 符号。\n\n### 怪物生成界面的绑定\n\n现在切换到“怪物生成”标签页。将滑块的\
  \ `Value` 绑定到 `monsterBootyFrequency`，右侧的小文本字段也同样绑定。然后，按照我们在“角色生成”标签页上的方式配置复选框。点击“兽人”复选框直到复选框本身被选中，并将其\
  \ `Value` 绑定到 `monsterTypeAllowedOrc`。继续处理其余的复选框，将每个复选框的 `Value` 绑定到相应的键名：`monsterTypeAllowedGoblin`、`monsterTypeAllowedOgre`，依此类推。\n\
  \n### 地牢生成界面的绑定\n\n最后，切换到“地牢生成”标签页，其中只包含三对滑块和文本字段。在“通道曲折度”标签右侧，配置滑块和文本字段的 `Value`\
  \ 绑定到 `dungeonTunnelTwistiness`。将两个“怪物频率”控件的 `Value` 都绑定到 `dungeonMonsterFrequency`，并将两个“宝藏频率”控件的\
  \ `Value` 都绑定到 `dungeonTreasureFrequency`。\n\n\n\n### 创建主窗口\n\n现在，该关注一下我们的主窗口了，它将包含用户可以点击的按钮以生成角色、怪物和地牢，以及用于显示结果的文本字段。点击主窗口的标题栏（如果窗口不可见，则双击主窗口中的图标），然后打开尺寸检查器（⌥⌘5）。将窗口大小更改为\
  \ 731 x 321，接着切换到属性检查器（⌥⌘4），并点击关闭 `Resize` 复选框，这样我们就少了一件需要操心的事。该应用程序显示有限的数据集，因此用户没有理由将窗口放大。接下来，我们将创建三组\
  \ GUI 组件，每组对应我们正在处理的三种数据类型之一。我们将手动布局第一组，然后将其复制到其他两组。\n\n首先，我们将在盒子内创建一个用于显示结果的文本字段。前往对象库面板，在搜索字段中输入“`nsbox`”。在结果中找到盒子，并将一个盒子拖拽到我们的窗口中。选中新盒子后，切换回尺寸检查器，将盒子的尺寸设置为宽\
  \ 227、高 247。同时，将其 `X` 和 `Y` 值均设置为 20。这会将盒子置于窗口的左下角，大致相当于将其拖拽到左下角并根据蓝色辅助线建议放置的位置。然后切换回属性检查器，将\
  \ `Title Position` 设置为 `None`，这样标题就不会显示。\n\n现在，返回对象库面板，在搜索框中输入“`label`”。搜索结果中有一个`Wrapping\
  \ Label`；选中它，将其拖拽到我们刚刚创建的盒子正上方，然后松开鼠标。这样操作会将其放入盒子内部。放置好后，通过先将其左下角拖拽到盒子的左下角，再将其右上角拖拽到盒子的右上角，将标签扩展到填满整个盒子。在两种情况下，当我们与盒子边缘的距离恰好合适时，蓝色辅助线就会出现。最后，三次点击文本字段中的文字（“`Multiline\
  \ Label`”）以选中它，然后按退格键或删除键清除文字。\n\n我们来为这个盒子收尾，添加一个按钮，该按钮最终会将一些文本放入我们刚刚创建的文本字段中。在对象库中找到一个按钮（推送按钮就很好用），并将其拖拽到盒子正上方的位置。拖拽过程中，蓝色线条会出现，显示与窗口顶部的正确距离，同时还会显示按钮何时与盒子中心正对齐。那就是我们想要放置的位置！双击按钮以编辑其标题，并将其更改为“`Generate\
  \ Character`”。根据缩放约束的设置方式，我们之后可能需要重置盒子的大小。图 7-8 显示了此时应该看到的效果。\n\n![A978-1-4302-4543-8_7_Fig8_HTML.jpg](img/A978-1-4302-4543-8_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n\n我们为主窗口创建了三组视图中的第一组。盒子内部的文本字段被高亮显示，以便我们能看到它的位置\n\n现在，点击窗口中的任意位置，然后按 ⌘A\
  \ 选中窗口中的所有对象，以选中我们刚刚创建的所有视图。按 ⌘D 复制它们，此时会显示一组新的相同对象，它们与原始对象重叠且位置略有偏移。将这组对象拖拽到窗口中央，使用蓝色辅助线确保它们与原始对象的垂直位置相同，并且盒子之间的水平间距恰到好处。然后再次按\
  \ ⌘D，将第三组对象拖拽到窗口右侧，再次使用蓝色辅助线帮助正确定位它们。最后，双击两个新按钮，分别将其标题更改为“`Generate Monster`”和“`Generate\
  \ Dungeon`”。同样，根据缩放约束的设置方式，我们可能需要将盒子大小重新设置为 227 x 247。图 7-9 显示了此时窗口应该呈现的样子。\n\n\
  ![A978-1-4302-4543-8_7_Fig9_HTML.jpg](img/A978-1-4302-4543-8_7_Fig9_HTML.jpg)\n\n\
  图 7-9.\n\nDungeonThing 完成后的主窗口\n\n### 设置 DungeonThingAppDelegate\n\n既然初始绑定工作已经完成，主窗口也已全部设置好，我们可以将各项连接到\
  \ `DungeonThingAppDelegate` 了。点击工具栏中 Editor 标签组里那个类似管家的图标（或使用键盘快捷键），打开一个辅助编辑器（⌥⌘↵）面板，并从跳转栏中选择\
  \ `DungeonThingAppDelegate.h`。逐个从位于 `Generate Character` 按钮下方盒子中的标签上按住 Control 键拖拽，直至辅助编辑器中的\
  \ `DungeonThingAppDelegate.h` 文件，拖到预定义的窗口 `@property` 下方。到达那里时，应该会出现一个小窗口，提示可以创建新的\
  \ Outlet 或 Action。松开鼠标，创建一个名为 `characterLabel` 的新 Outlet。对窗口中的其它两个盒子内的标签执行相同操作，分别创建名为\
  \ `monsterLabel` 和 `dungeonLabel` 的新 Outlet。\n\n然后，从三个按钮分别按住 Control 键拖拽回辅助编辑器中的\
  \ `DungeonThingAppDelegate.h` 文件，并创建名为 `createCharacter:`、`createMonster:` 和 `createDungeon:`\
  \ 的新 Action。至此，哪个 Action 对应哪个按钮应该很清楚了。除了将 Outlet 和 Action 添加到 `DungeonThingAppDelegate.h`\
  \ 文件外，这还会在 `DungeonThingAppDelegate.m` 文件中为这些 Action 添加方法存根。\n\n\n\n### 定义常量\n\n\
  此时，GUI 已完成，相关绑定也已全部配置完毕，因此偏好设置窗口中的控件值都将保存到用户的应用程序偏好设置中。剩下要做的就是编写操作方法来使用 `NSUserPreferences`\
  \ 检索偏好设置值并显示它们。如前所述，我们暂不实际使用这些值生成游戏物品描述，但如果你愿意，可以稍后自行增强此功能。\n\n让我们先定义一些常量，就像我们在之前的示例中所做的那样（如果你忘了，可以查看第\
  \ 4 章了解这样做的益处）。以下是匹配我们在 nib 文件中已设定的所有偏好设置键名的常量。将这些常量插入到 `DungeonThingAppDelegate.m`\
  \ 的顶部某处：\n\n```\n#define kCharacterMaxNameLength @\"characterMaxNameLength\"\n#define\
  \ kCharacterStatsGenerationPolicy \\\n  @\"characterStatsGenerationPolicy\"\n#define\
  \ kCharacterClassAllowedPaladin @\"characterClassAllowedPaladin\"\n#define kCharacterClassAllowedBard\
  \ @\"characterClassAllowedBard\"\n#define kCharacterClassAllowedFighter @\"characterClassAllowedFighter\"\
  \n#define kCharacterClassAllowedCleric @\"characterClassAllowedCleric\"\n#define\
  \ kCharacterClassAllowedRogue @\"characterClassAllowedRogue\"\n#define kCharacterClassAllowedMonk\
  \ @\"characterClassAllowedMonk\"\n#define kCharacterClassAllowedMagicUser \\\n \
  \ @\"characterClassAllowedMagicUser\"\n#define kCharacterClassAllowedThief @\"characterClassAllowedThief\"\
  \n#define kMonsterBootyFrequency @\"monsterBootyFrequency\"\n#define kMonsterTypeAllowedOrc\
  \ @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin @\"monsterTypeAllowedGoblin\"\
  \n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\n#define kMonsterTypeAllowedSkeleton\
  \ @\"monsterTypeAllowedSkeleton\"\n#define kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\
  \n#define kMonsterTypeAllowedVampire @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus\
  \ @\"monsterTypeAllowedSuccubus\"\n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\
  \n#define kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
  \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
  \n```\n\n> **注意：** 为了适应书籍格式的限制同时显示有效代码，我们在某些行的末尾添加了反斜杠作为换行符，这样 C 预处理器就会将下一行的内容拼接在一起，仿佛它们原本就在同一行。在你的代码中，可以省略这种手动换行，将每个\
  \ `#defines` 写成一行声明。\n\n### 创建操作方法\n\n现在我们可以开始实现操作方法了。我们从 `createCharacter:` 开始，它将显示与角色创建相关的所有偏好设置值的摘要。首先获取\
  \ `NSUserDefaults` 的共享实例，然后创建一个空字符串来保存摘要文本，接着逐一添加每条偏好设置来生成摘要。最后，将摘要文本放入相应的 `NSTextField`\
  \ 中。请注意，该方法开始时我们创建了一个指定容量的 `NSMutableString`，但这并不是大小上限；`NSMutableString` 足够智能，可以在必要时“增长”。该方法如下所示：\n\
  \n```\n- (IBAction)createCharacter:(id)sender {\n    NSUserDefaults *ud = [NSUserDefaults\
  \ standardUserDefaults];\n    NSMutableString *result = [NSMutableString stringWithCapacity:1024];\n\
  \    [result appendString:\n        @\"Generating a character within these parameters:\\\
  n\"\n        \"-----------------\\n\"];   // 提示：像这样跨行拆分字符串！\n    [result appendFormat:\n\
  \        @\"Maximum name length: %ld\\n\",\n        [ud integerForKey:kCharacterMaxNameLength]];\n\
  \    [result appendFormat:\n        @\"Stats generation policy: %ld\\n\",\n    \
  \    [ud integerForKey:kCharacterStatsGenerationPolicy]];\n    [result appendFormat:\n\
  \        @\"Allows Paladin: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedPaladin]\
  \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Bard: %@\\\
  n\",\n        [ud boolForKey:kCharacterClassAllowedBard] ? @\"YES\" : @\"NO\"];\n\
  \    [result appendFormat:\n        @\"Allows Fighter: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedFighter]\
  \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Cleric: %@\\\
  n\",\n        [ud boolForKey:kCharacterClassAllowedCleric] ? @\"YES\" : @\"NO\"\
  ];\n    [result appendFormat:\n        @\"Allows Rogue: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedRogue]\
  \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Monk: %@\\\
  n\",\n        [ud boolForKey:kCharacterClassAllowedMonk] ? @\"YES\" : @\"NO\"];\n\
  \    [result appendFormat:\n        @\"Allows Magic-User: %@\\n\",\n        [ud\
  \ boolForKey:kCharacterClassAllowedMagicUser] ? @\"YES\" : @\"NO\"];\n    [result\
  \ appendFormat:\n        @\"Allows Thief: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedThief]\
  \ ? @\"YES\" : @\"NO\"];\n    [self.characterLabel setStringValue:result];\n}\n\
  ```\n\n输入这段代码后，尝试编译并运行应用程序。如果一切顺利，我们应该能看到主窗口，按下**生成角色**按钮，并看到类似图 7-10 的结果。\n\n![图\
  \ 7-10：DungeonThing 首次运行](img/A978-1-4302-4543-8_7_Fig10_HTML.jpg)\n\n下一步是打开偏好设置窗口，并在**角色生成**选项卡中进行一些更改。禁用一些复选框，拖动滑块等。每次更改后，再次点击主窗口中的**生成角色**按钮，显示的参数应该会随之变化，以反映偏好设置窗口的内容。\n\
  \n既然这个功能已经生效，让我们按照如下所示填充 `createMonster:` 和 `createDungeon:` 方法的主体。这两个方法的工作方式与已展示的\
