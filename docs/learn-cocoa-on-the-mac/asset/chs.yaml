- "# 设置 Cocoa 绑定\n\n当我们告诉 Xcode 我们想创建一个 Core Data 应用程序时，它生成了一个应用程序委托类（名为 `MBAppDelegate`），该类包含了对使用\
  \ Core Data 的特殊支持。这种支持的一部分是生成的 `MBAppDelegate` 类现在有一个 `managedObjectContext` 属性。托管对象上下文是一个对象，它允许数组控制器（或者，就此而言，您自己的代码）通过\
  \ Core Data 接入模型对象（`NSManagedObject` 或子类的实例）的源。稍后当我们检查创建此项目时自动生成的控制器代码时，我们将看到应用控制器如何提供这个属性。就像前一章一样，我们将使用一个\
  \ `NSArrayController` 来管理数据，但这里创建的 `NSArrayController` 将通过 Core Data 访问数据，而不是通过\
  \ `NSMutableDictionary`。并且正如我们在上一章中所做的那样，我们将使用 Cocoa 绑定将其连接到用户界面。\n\n### 使用数组控制器进行绑定\n\
  \n首先，我们需要在应用中获取一个数组控制器。在对象库的搜索字段中搜索“array”。结果应该会显示一个数组控制器。将其中的一个拖到 Interface Builder\
  \ 画布上；它会被放到编辑器窗格的任何位置。无论我们把它放在哪里，它都会出现在 Interface Builder 画布左侧的对象停靠区中。在对象停靠区中选择它，并将其重命名为“Mythical\
  \ Person Array Controller”。打开属性检查器，并将其模式从“类”更改为“实体名称”。输入实体名称为“MythicalPerson”，这与我们在模型编辑器中使用的名称相同。最后，勾选“预置内容”复选框。这将触发数组控制器在应用启动时加载数据。\n\
  \n现在，我们将把数组控制器链接到 `managedObjectContext`。在对象停靠区中仍选中数组控制器的情况下，选中绑定检查器。展开“参数”部分，然后从弹出列表中选择“App\
  \ Delegate”。之后，勾选弹出列表旁边的“绑定到”复选框。接下来，在“模型键路径”字段中输入“managedObjectContext”。这将数组控制器连接到应用委托中的\
  \ Core Data 管道。\n\n既然我们已经连接好了数组控制器，我们需要开始设置 UI 控件的绑定。我们将从基本控件（文本字段和滑块）开始，然后处理更复杂的控件（图像和表格视图），最后通过连接按钮来完成。\n\
  \n第一个绑定将是名称文本字段的。选中名称文本框，然后打开绑定检查器。展开“值”部分，勾选“绑定到”复选框，然后从下拉菜单中选择“Mythical Person\
  \ Array Controller”。确保“控制器键”框中显示“selection”，并在“模型键路径”字段中输入“name”，如图 8-9 所示。这将文本字段连接到数组控制器选定对象的\
  \ name 属性。\n\n![A978-1-4302-4543-8_8_Fig9_HTML.jpg](img/A978-1-4302-4543-8_8_Fig9_HTML.jpg)\n\
  \n图 8-9.\n\n用于将名称文本字段连接到 Mythical Person Array Controller 的绑定检查器\n\n为滑块设置绑定将是类似的；我们将建立一个到\
  \ Mythical Person Array Controller 的 selection 的绑定，并根据控件的适当属性使用不同的模型键路径。对于这三个滑块中的每一个，这将是我们在模型文件中创建的\
  \ `divinity`、`power` 和 `goodness` 属性。要进行这些绑定，选中“神性”滑块并查看绑定检查器。展开“值”部分，勾选“绑定到”复选框，然后从下拉菜单中选择“Mythical\
  \ Person Array Controller”。确保“控制器键”框中显示“selection”，并在“模型键路径”字段中输入“divinity”。对“威力”和“善良”滑块重复此操作，并相应更改模型键路径。\n\
  \n为“图像”和“详情”区域设置绑定会稍微复杂一些。我们先处理“详情”。选中文本视图（请记住，文本视图嵌入在 `NSScrollView` 中；您需要点击穿过滚动视图才能到达文本视图本身）。在绑定检查器中，与名称文本框和滑块相比，有不同的选择。然而，仍然有一个“值”部分，这正是我们要使用的。展开“值”部分，勾选“绑定到”复选框，并使用“details”作为模型键路径。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n对于“描绘”字段，我们需要获取一个 `NSImage`\
  \ 供图片井显示。Core Data 并不知道 `NSImage`，但这不成问题。还记得之前关于转换器和 Core Data 使用的可转换类型的讨论吗？因为“描绘”是一个可转换属性，它的值需要在我们在\
  \ GUI 中看到的内容（一个 `NSImage`）和 Core Data 能够存储的内容（`NSData`）之间进行转换。我们将通过向此控件的 Cocoa 绑定配置添加\
  \ `NSKeyedUnarchiveFromData` 来实现这一点。选中图片井，并打开绑定检查器。与其他字段一样，展开“值”部分。勾选“绑定到”复选框，确保“控制器键”显示为“selection”，并将“模型键路径”设置为“depiction”。要完成从\
  \ `NSData` 到 `NSImage` 的转换，请点击“值转换器”弹出列表，然后选择 `NSKeyedUnarchiveFromData`。\n\n##\
  \ 为表格视图配置绑定\n\n现在是时候为表格视图进行绑定了。为基于视图的表格视图设置 Cocoa 绑定是一个两步过程。首先，我们必须为表格视图本身设置一个绑定。接下来，我们将为行中的每个视图设置绑定。表格视图通过一些魔法来为其子视图公开一个绑定源，该绑定源名为“Table\
  \ Cell View”。在该绑定中，有一个模型键路径“objectValue”，它代表该行的对象。\n\n开始，选中表格视图本身。最简单的方法是从左侧的对象停靠区中选择。在绑定检查器中，展开“内容”部分，勾选“绑定到”复选框，确保下拉菜单显示“Mythical\
  \ Person Array Controller”，并且“控制器键”显示“arrangedObjects”。对于表格视图本身，我们没有“模型键路径”设置。我们还希望表格视图中选中的行能够传回数组控制器。为此，展开绑定检查器的“选择索引”部分。在此处勾选“绑定到”复选框，将下拉菜单设置为“Mythical\
  \ Person Array Controller”，并将“控制器键”设置为“selectionIndexes”。您的绑定应该像图 8-10 所示。\n\n![A978-1-4302-4543-8_8_Fig10_HTML.jpg](img/A978-1-4302-4543-8_8_Fig10_HTML.jpg)\n\
  \n图 8-10. 为表格视图设置绑定\n\n表格中有五列：名称、神性、力量、善良和描绘。我们不直接在列上设置绑定；相反，我们将为每列中包含的视图设置绑定。对于前四列，视图是包含在\
  \ `NSTableCellView` 内的 `NSTextField`。对于描绘列，视图是包含在 `NSTableCellView` 内的 `NSImageWell`。不幸的是，Xcode\
  \ 将 `NSTableCellView` 中包含的文本字段的默认值设置为“Table View Cell”，这似乎是为了制造混乱而设计的。尽管有默认文本，但表格视图中的视图是\
  \ `NSTableCellView` 的实例。文本字段和图片井将绑定到表格单元格视图的 objectValue 属性。\n\n我们从名称列开始。选中名称列中的“Table\
