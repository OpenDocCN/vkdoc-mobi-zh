  ![A978-1-4302-4543-8_10_Fig3_HTML.jpg](img/A978-1-4302-4543-8_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 数据录入窗口的部分布局\n\n\n\n#### 引用引文\n\n现在，我们将在“显示”框的下方，为“引文”重复大部分相同的设置。与之前一样，拖拽出一个表格视图和两个按钮，将它们放置在窗口的下半部分，并按之前的步骤为按钮添加标题。不过，对于这个表格视图，我们将保留两列。像之前一样将其改为基于视图的模式，并勾选标记为“交替行”的复选框，这会使内容更易于阅读。将左列标题设为“引文文本”，右列标题设为“角色”，并调整它们的大小，为“引文文本”列留出更多空间。在“引文文本”列中，双击列内的“表格单元格视图”文本，并将其改为“引文”。对“角色”列中的“表格单元格视图”文本执行相同操作，将其改为“角色”。这将帮助我们稍后区分这两列。像之前一样，将这三个控件分组到一个框中，并将该框的标题设为“引文”。\n\
  \n窗口的这一部分也将使用一个`NSArrayController`，但其配置方式将与“显示”数组控制器略有不同。拖拽出一个控制器，并将其标题设为“引文”。在属性检查器中，将其模式设置为实体名称，然后将实体名称字段设置为\
  \ Quote（与我们在模型编辑器中定义的实体名称相同）。然后，切换到绑定检查器。默认情况下，每个数组控制器将获取对应实体的所有对象。我们将修改此设置，使其仅基于选中的“显示”来获取引文。打开内容集绑定，在下拉列表中选择“显示”，在控制器键组合框中选择“selection”，并在模型键路径组合框中输入“quotes”。最后，按\
  \ Return 键以启用该绑定。我们还需要将其连接到一个托管对象上下文，该上下文由应用委托提供。将托管对象上下文（位于绑定列表底部）绑定到应用委托，并将模型键路径设置为`managedObjectContext`。\n\
  \n现在，我们可以将此表格视图绑定到“引文”控制器。选择表格视图，然后打开绑定检查器。展开表格内容下的内容部分，并勾选绑定到旁边的复选框。下拉菜单应显示为“引文”。默认的控制器键`arrangedObjects`正是我们需要的。与之前一样，数组控制器应被通知所选行，因此将选择索引绑定到“引文”，并将此处的控制器键设置为`selectionIndexes`。\n\
  \n要绑定这两列，请使用对象停靠区在表格视图内的视图层次结构中向下钻取，直至“静态文本 – 引文”条目。在属性检查器中，将行为更改为可编辑。然后，在绑定检查器中，将值绑定到表格单元格视图，并将其模型键路径设置为`objectValue.quoteText`。切换到对象停靠区中的“静态文本\
  \ – 角色”条目，将其模式更改为可编辑，然后将其绑定到表格单元格视图，并将其模型键路径设置为`objectValue.character`。\n\n最后，我们需要连接按钮。从每个按钮控制拖拽到“引文”控制器，并根据情况将操作设置为`add:`或`remove:`。将每个按钮的启用绑定分别绑定到“引文”控制器上相应的`canAdd`或`canRemove`控制器键。\n\
  \n布局应类似于图 10-4。\n\n![A978-1-4302-4543-8_10_Fig4_HTML.jpg](img/A978-1-4302-4543-8_10_Fig4_HTML.jpg)\n\
  \n图 10-4.\n\n数据录入窗口的完整布局\n\n### 输入一些初始引文\n\n保存更改并点击运行。应用应启动并显示数据录入窗口。点击上方表格视图下方的“添加”按钮以添加一个节目，并在表格视图中高亮显示的区域双击以编辑节目名称。重复此操作几次以创建几个`Show`实例。现在，选中其中一个节目，在下方的表格中添加一条引文，直接编辑表格中的文本和任何角色的名称。如果您添加的引文包含两个或多个角色之间的对话，请在“角色”字段中输入所有涉及角色的名称。当我们稍后启用基于角色名称的搜索时，它将适用于您输入的所有名称。再添加几条引文，分布在几个不同的节目中。请注意，当您选择不同的节目时，引文列表会发生变化；如果您退出并重新启动\
  \ QuoteMonger，您应该会看到您输入的所有内容都已保存。\n\n另一方面，如果一切似乎都不起作用，请检查 Xcode 中的调试器日志，看应用程序是否抛出了异常。常见的问题包括：忘记在数组控制器上设置托管对象上下文的绑定，或者错误地键入了控制器键或模型键路径绑定的名称。\n\
  \n\n\n### 创建引用查找器窗口\n\n现在是为搜索窗口奠定基础的时候了。回到 Xcode 中的 Interface Builder 面板，从对象库中拖出一个新窗口，放到画布上。Xcode\
  \ 提供了多种窗口类型，但我们需要的只是一个普通的普通窗口。（你可能还想关闭 QuoteMonger 窗口，以免干扰工作——只需点击 Interface Builder\
  \ 画布上窗口左上角的小“x”即可。）\n\n选中这个新窗口，然后转到属性检查器。将新窗口的标题设置为“引用查找器”。这个窗口将有两个可见控件：一个表格视图和一个文本视图。表格视图会显示匹配的引用列表，而文本视图则会显示所选引用的具体内容。稍后，我们还会使用一个名为谓词编辑器的新控件来定义搜索条件。这个谓词编辑器在\
  \ `Mail.app` 中用于定义过滤规则，在 iTunes 中用于创建智能播放列表。它是一个通用的 Cocoa 组件，我们也可以用它来玩一玩。不过，我们现在还不会用到它。\n\
  \n让我们开始吧！从对象库中拖出一个表格视图，并将其放置在窗口顶部附近。在属性检查器中，将其设置为基于视图模式，并给它三列。分别将这三列的标题设置为“引用文本”、“角色”和“剧目”。此外，编辑每个字段中的文本以反映列的名称。我们还可以为此表格视图勾选“隔行变色”复选框，以便在搜索返回大量匹配结果时使用。这个表格视图不会放入框中，因此我们可以调整其大小以填满窗口宽度，让蓝色参考线告诉我们该在哪里停下。\n\
  \n现在，从对象库中拖出一个文本视图（在库区域底部的搜索字段中输入“文本视图”），并将其放置在表格视图下方。将其宽度扩展到与表格视图相同。在属性检查器中，关闭“可编辑”和“富文本”复选框。对于“查找”项，将弹出菜单设置为“使用搜索栏”，并勾选“增量搜索”复选框。这将允许大的文本视图使用\
  \ Mac OS/X 10.7 中引入的嵌入式搜索栏。窗口看起来应该像图 10-5 那样。\n\n![A978-1-4302-4543-8_10_Fig5_HTML.jpg](img/A978-1-4302-4543-8_10_Fig5_HTML.jpg)\n\
  \n图 10-5. 查询查找器窗口的初步设计\n\n接下来，拖出一个数组控制器，并将其命名为“FoundQuotes”。在属性检查器中，将其模式设置为“实体名称”，并将“Quote”作为要使用的实体名称。同时勾选“准备内容”复选框。在这些设置的上方，即属性检查器的数组控制器区块中，勾选“自动重新排列内容”复选框。这样，每当用户在引用控制器中进行更改时，它都会正确重新加载并重新过滤其内容。在绑定检查器中，将其托管对象上下文绑定到\
  \ App Delegate，并将模型键路径设置为 `managedObjectContext`。\n\n现在，我们需要为用户界面控件（表格视图和文本视图）设置绑定。和往常一样，我们从表格视图开始。将表格视图的“内容”和“选择索引”绑定绑定到\
  \ FoundQuotes 控制器。将“内容”绑定绑定到 `arrangedObjects` 控制器键，并将“选择索引”绑定绑定到 `selectionIndexes`\
  \ 控制器键。然后，深入表格视图中的“静态文本 - 引用文本”字段。将其值绑定配置为指向表格单元格视图，并使用 `objectValue.quoteText`\
  \ 作为模型键路径。将“静态文本 – 角色”字段的值绑定配置为指向表格单元格视图，并使用 `objectValue.character` 作为模型键路径。最后，选择表格视图中的“静态文本\
  \ – 剧目”字段，并将其值绑定设置为指向表格单元格视图，使用 `objectValue.show.name` 作为模型键路径。\n\n对于文本视图，操作稍微简单一些。选择文本视图，将其值绑定绑定到\
  \ FoundQuotes。使用 `selection` 作为控制器键，并使用 `quoteText` 作为模型键路径。\n\n现在点击“运行”，注意观察两个窗口。新的查询查找器窗口只是简单地显示了我们在数据录入窗口中输入的所有引用。本章的其余部分将介绍如何使用\
  \ `NSPredicate` 来改变这一点，以便只有用户搜索的引用才会显示在此窗口中。\n\n## 使用 `NSPredicate` 限制结果\n\n如前所述，我们可以通过使用\
  \ `NSPredicate` 来限制 `NSArrayController` 准备显示哪些记录。我们可以直接在 Interface Builder 中为数组控制器分配谓词；可以在应用程序代码初始化期间或当条件发生变化需要重新获取时进行分配；也可以通过\
  \ Cocoa 绑定来实现，这意味着对谓词的更改可以自动传播到控制器。本章我们将探讨所有这些选项。\n\n\n\n### 创建谓词\n\n创建 `NSPredicate`\
  \ 最简单的方法是使用包含属性名称、比较运算符和待比较值的格式字符串。谓词的定义看起来很像 SQL 中的 `WHERE` 子句，其用途也大致相同。谓词不仅限于\
  \ Core Data 使用，还可应用于 Mac OS X 的其他领域，例如 Spotlight。在其最基本的形式中，我们可以像这样定义一个 `NSPredicate`：\n\
  \n```\nNSPredicate *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd]\
  \ 'missed') OR \"\n     \"(character CONTAINS[cd] 'kramer') OR \"\n     \"(show.name\
  \ CONTAINS[cd] 'trek')\"];\n```\n\n> **注意：** 在 C 语言中，如果代码中有多个仅由空白字符（包括回车符）分隔的内联字符串常量，它们会被拼接成单个字符数组，这有助于格式化代码中的长字符串。这个技巧同样适用于内联的\
  \ `NSString` 常量——只需在第一个字符串前放一个 `@` 符号，如上所示。\n\n在这个例子中，我们实际上有三个条件，通过 `OR` 连接并用括号包裹，就像我们在应用代码中可能做的那样。每个条件都使用了\
  \ `CONTAINS` 比较运算符（其作用正如你所猜测的那样），并在方括号内指定了一些选项。`c` 使比较不区分大小写，而 `d` 使比较不区分变音符号。例如，同时指定这两者的相等性比较会将\
  \ `\"ramon\"` 和 `\"Ramón\"` 视为相等。\n\n`CONTAINS` 只是谓词中可用的几个比较运算符之一。所有属性都可以使用 `=`、`<`、`>`、`>=`、`<=`、`!=`\
  \ 和 `BETWEEN` 比较运算符。（注意 `==`、`=>`、`=<` 和 `<>` 分别等价于 `=`、`>=`、`<=` 和 `!=`。）字符串属性可以使用\
  \ `BEGINSWITH`、`CONTAINS`、`ENDSWITH`、`LIKE` 和 `MATCHES` 比较运算符。\n\n> **注意：** 这些大多应该不言自明，但有几点值得注意：`BETWEEN`\
  \ 允许我们指定一对上下界，因此其右侧的值应该用一个包含两个元素的 `NSArray` 来替代；`LIKE` 允许我们进行通配符匹配；`MATCHES` 允许我们使用正则表达式进行高级比较。然而，`MATCHES`\
  \ 无法与 SQLite 后端配合使用，因此从 Core Data 存储中获取值时作用不大。\n\n如果我们的应用确实需要一个用于特殊目的的固定查询，硬编码选项是可以的，但有时我们想根据用户输入或其他当前数据来创建查询。幸运的是，`NSPredicate`\
  \ 类提供了一种简单的方法，使用我们刚才看到的同一个 `predicateWithFormat:` 方法来插入值。例如：\n\n```\n// 假设这些变量存在并指向有效对象\n\
  NSString *quoteInput;\nNSString *characterInput;\nNSString *showNameInput;\n\nNSPredicate\
  \ *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd] %@) OR\
  \ \"\n     \"(character CONTAINS[cd] %@) OR \"\n     \"(show.name CONTAINS[cd] %@)\"\
  ,\n    quoteInput, characterInput, showNameInput];\n```\n\n当这段代码运行时，三个变量的值将被放入生成的谓词中。请注意，格式字符串中的\
  \ `%@` 标记没有被单引号包围，而在前面的例子中，裸值是被单引号包围的。\n\n### 在 Xcode 中指定 NSAppController 的谓词\n\n\
  让我们尝试一种最基础的谓词使用方法：直接在 Xcode 中将其附加到控制器上。回到 Xcode 中的 `MainMenu.xib` 文件，在主 nib 窗口中选择\
  \ `FoundQuotes` 控制器，然后打开属性检查器。底部有一个标有 **Fetch Predicate** 的文本视图，我们可以在此添加一些文本来定义一个谓词。尝试输入以下内容：\n\
  \n```\nshow.name CONTAINS[cd] 'trek'\n```\n\n然后保存更改，切换回 Xcode，点击 **Run**。现在搜索窗口不一定显示你输入的所有引语。如果你输入了一些《星际迷航》的引语，它将只显示这些；如果你没有输入任何《星际迷航》的引语，那么搜索窗口中将什么也看不到。当然，也有可能你只输入了《星际迷航》的引语，在这种情况下，这个视图将与之前完全相同。如果是这样，请输入来自其他剧集的一些引语，以验证谓词正在过滤掉它们（同时也是因为，说实话，电视节目远不止《星际迷航》这一部）。\n\
  \n### 用户自定义谓词\n\n在 nib 中定义的谓词适用于特殊用途，即 GUI 的某些部分应始终显示数据的特定子集，但我们的目标是让用户自己定义搜索参数。理想情况下，用户应该能够选择多个搜索参数、编辑要比较的值，甚至更改比较运算符本身（而不只是始终使用\
  \ `CONTAINS`）。幸运的是，Cocoa 提供了一个名为 `NSPredicateEditor` 的 GUI 控件，正好可以实现这一点！\n\n正如我们之前提到的，使用\
  \ `NSPredicateEditor`，我们可以制作一个类似于 iTunes 中的智能播放列表或 Mail 中的智能邮箱功能的 GUI。用户可以添加和删除搜索条件，结果会实时更新。见图\
  \ 10-6。\n\n![A978-1-4302-4543-8_10_Fig6_HTML.jpg](img/A978-1-4302-4543-8_10_Fig6_HTML.jpg)\n\
  \n**图 10-6.** QuoteMonger 的谓词编辑器实际效果\n\n`NSPredicateEditor` 和 `NSArrayController`\
  \ 都可以通过绑定来设置和获取其 `NSPredicate` 属性的值，因此我们要做的是将一个 `NSPredicate` 作为应用代理的一个属性，并建立适当的绑定。然后，当用户在谓词编辑器中做出任何更改时，更新后的谓词将自动传递给数组控制器。\n\
  \n\n\n"
- "# 在应用委托中添加谓词\n\n首先，在应用委托中添加一个新属性。打开 `QMAppDelegate.h` 文件，该文件看起来与为 MythBase 生成的默认应用委托头文件一致。添加一个新属性，名为\
  \ `searchPredicate`。现在的接口声明应如下所示（新代码行以粗体显示）：\n\n```\n@interface QMAppDelegate :\
  \ NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  @property (strong) NSPredicate *searchPredicate;\n\n- (IBAction)saveAction:(id)sender;\n\
  \n@end\n```\n\n现在切换到 `QMAppDelegate.m` 文件，并在靠近顶部的位置，紧跟在 Xcode 生成的 `@synthesize`\
  \ 指令之后，添加以下代码。新代码行以粗体显示。\n\n```\n@implementation QMAppDelegate\n\n@synthesize persistentStoreCoordinator\
  \ = _persistentStoreCoordinator;\n@synthesize managedObjectModel = _managedObjectModel;\n\
  @synthesize managedObjectContext = _managedObjectContext;\n\n#define DEFAULT_PREDICATE\
  \ @\"(quoteText CONTAINS[cd] 'space') OR \" \\\n                          \"(character\
  \ CONTAINS[cd] 'Knight')\"\n\n- (id)init\n{\n    if ((self = [super init])) {\n\
  \        self.searchPredicate = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];\n\
  \    }\n    return self;\n}\n```\n\n`init` 方法仅为 `searchPredicate` 属性创建了一个默认值。现在，让我们将控制器与这个新谓词关联起来。回到\
  \ Interface Builder 画布，选中 FoundQuotes 控制器，并打开属性检查器。选中“获取谓词”文本视图中的所有文本并删除，然后切换到绑定检查器。在“控制器内容参数”部分，展开“过滤谓词”绑定信息。在弹出的菜单中选择“应用委托”，在“模型键路径”组合框中输入\
  \ `searchPredicate`，然后按 Return 键启用绑定。\n\n保存工作，回到 Xcode，然后点击“运行”。现在你应该会看到一组不同的结果：由名为\
  \ `Knight` 的角色所说或包含单词 `space` 的引用。如果没有匹配的结果，请添加一条包含这些特征之一的引用，以测试搜索窗口。\n\n"
- '# 在搜索窗口中添加谓词编辑器


  现在，我们已让 FoundQuotes 控制器基于由应用委托“拥有”的谓词内容来获取值。下一步是在搜索窗口中添加一个 `NSPredicateEditor`，并配置它以允许用户编辑谓词。


  在 Xcode 中，调出引用查找窗口。将整个窗口拉高一些，然后将现有的表格视图和文本视图拖到底部。接着，在对象库中找到 `NSPredicateEditor`，将其拖入窗口顶部的空白区域，并调整大小使其填满可用空间。图
  10-7 展示了这一构思。


  ![A978-1-4302-4543-8_10_Fig7_HTML.jpg](img/A978-1-4302-4543-8_10_Fig7_HTML.jpg)


  **图 10-7.** 谓词编辑器已放置在搜索窗口中


  '
- '# 配置谓词编辑器


  现在是时候将编辑器绑定到应用委托的谓词实例上。选中 `NSPredicateEditor`（别忘了多点击一下以选中编辑器本身，而不是包含它的滚动视图），打开绑定检查器，然后查看“值”绑定信息。在弹出的菜单中选择“应用委托”，然后在“模型键路径”组合框中输入
  `searchPredicate`，并按 Return 键激活该绑定。


  至此，要启用此谓词编辑器的搜索功能，我们还需要做一件事：必须根据我们想要搜索的属性对其进行定制。`NSPredicateEditor` 是一个相当复杂的控件，幸运的是，它的大多数有趣功能都可以直接在
  Xcode 中进行配置。谓词编辑器会显示一个或多个 `NSPredicateEditorRowTemplate` 对象，每个对象都可以配置为以多种方式进行搜索。我们可以创建行模板，让用户指定要与对象值进行比较的数字或日期，或者从预定义字符串列表中选择。在我们的例子中，我们将配置一个行模板，让用户可以在文本字段中输入字符串，以搜索角色名称、剧集名称和引用内容。这个行模板可以被重复使用，允许用户同时指定多个搜索条件。此外，另一个行模板将让用户选择是必须满足所有搜索条件（布尔“与”运算），还是只要任意一个匹配成功（布尔“或”运算），即可在结果中显示某条引用。


  在 Interface Builder 画布中，点击两个可见行中下面的那个（包含显示“名称”和“包含”的弹出按钮的行），深入编辑谓词编辑器。选中该行模板后，打开属性检查器。注意，其中的复选框允许我们选择允许用户使用哪些比较器，而弹出按钮则允许我们选择比较器两侧表达式的性质（键路径、字符串、常量值等）。默认设置（左侧为键路径，右侧为字符串）非常符合我们的需求，但我们确实需要根据搜索需求调整键路径。


  编辑“左侧表达式”键路径下列出的三个默认值，将它们改为 `quoteText`、`character` 和 `show.name`。接下来，点击启用“忽略大小写”和“忽略变音符号”复选框（参见图
  10-8）。


  ![A978-1-4302-4543-8_10_Fig8_HTML.jpg](img/A978-1-4302-4543-8_10_Fig8_HTML.jpg)


  **图 10-8.** 配置 `NSPredicateEditorRowTemplate`


  然后，检查行模板中的弹出按钮。这将显示三个条目，其名称与我们刚才为键路径输入的内容相同。将它们更改为更易读的名称：*引用文字*、*角色名*和*剧集名*。


  现在点击上面的行模板，即显示“以下条件任意一条为真”的那个。其配置非常简单。复选框允许我们选择是否允许用户使用布尔“与”、“或”和“非”进行搜索。将所有选项都启用，以提供最大的实用性。


  现在，我们还需要进行最后一项配置。默认情况下，`NSPredicateEditor` 允许用户删除所有行，直至最后一行，此时将不再有添加新行的“+”按钮。要更改此设置，请选择谓词编辑器本身（而非某个行模板），然后在属性检查器中点击关闭“允许移除所有行”复选框。


  保存工作，在 Xcode 中点击“运行”，尽情享受 QuoteMonger 的强大功能吧！现在，我们可以使用在谓词编辑器中配置的三个条件，轻松地在所有已保存的引用中进行搜索。




  '
- "# 保存谓词\n\n在收工之前，让我们再添加最后一点润色，让用户使用 `QuoteMonger` 时拥有更友好的体验。目前，用户每次启动应用，它都会加载我们那个略显简陋的默认查询。如果它能显示上次运行时的最后查询，岂不是更好？实际上，这简直是小菜一碟。`NSPredicate`\
  \ 有一个很方便的方法叫 `predicateFormat`，它能以字符串形式返回谓词的值。因此，当用户退出应用时，我们可以使用 `NSUserDefaults`\
  \ 保存当前 `searchPredicate` 的字符串表示形式，并在应用启动时检查是否有已保存的字符串。打开 `QMAppDelegate.m`，对其实现的第一部分进行如下修改（只需添加所有加粗的行）：\n\
  \n```\n#import \"QMAppDelegate.h\"\n\n@implementation QMAppDelegate\n\n@synthesize\
  \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
  \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
  \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'missed') OR \" \\\n    \
  \                       \"(character CONTAINS[cd] 'kramer')\"\n#define STORED_PREDICATE_KEY\
  \ @\"storedPredicateFormat\"\n\n- init\n{\n  if ((self = [super init])) {\n    NSString\
  \ *format = [[NSUserDefaults standardUserDefaults]\n        objectForKey:STORED_PREDICATE_KEY];\n\
  \    if (format)\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
  \ format];\n    else\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
  \ DEFAULT_PREDICATE];\n  }\n  return self;\n}\n\n- (void)applicationWillTerminate:(NSNotification\
  \ *)aNotification\n{\n  NSString *format = [self.searchPredicate predicateFormat];\n\
  \  [[NSUserDefaults standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY];\n\
  }\n```\n\n我们首先定义一个字符串，它将用作键，通过 `NSUserDefaults` 在用户偏好设置中存储和检索谓词。然后，我们增强 `init` 方法，使其查找已存储的谓词。它首先检查是否存在已存储的谓词字符串，如果存在，则从该格式字符串创建新的谓词并填充到\
  \ `searchPredicate` 实例变量中。如果没有存储的谓词，则创建默认谓词。\n\n最后，我们实现了 `applicationWillTerminate:`\
  \ 方法。当用户退出应用时，该方法会被自动调用，给我们一个进行最终清理的机会。在这里，我们将当前的搜索参数（维护在 `searchPredicate` 实例变量中）转换为字符串，并将该字符串保存到用户的偏好设置中，以便下次用户运行应用时，相同的搜索会再次出现。\n\
  \n保存、运行，然后修改搜索条件。退出应用并再次运行，之前的搜索条件会再次显示出来。\n\n## 总结\n\n本章展示了如何使用 `NSPredicate` 来缩小\
  \ Core Data 结果集的基础知识。我们了解了如何通过代码、在 Xcode 中，或通过用户与 `NSPredicateEditor` 的交互来构建 `NSPredicate`。我们甚至还了解到了如何将这些谓词保存起来以备后用，就像\
  \ iTunes 和 Mail 的智能播放列表和智能文件夹那样。这些技巧可以帮助你轻松地为自己的应用带来新层次的功能。\n\n第 8 章到第 10 章介绍了启动和运行\
  \ Core Data 所需的主要概念。现在是时候转向其他话题了。不过，我们并不会就此离开 Core Data，它将在后续的一些练习中继续发挥作用，尽管程度不同。由于篇幅有限，我们无法将每个示例都变成一个完整的应用程序。但即使在不使用\
  \ Core Data 的情况下，你也可以思考一下它如何融入我们在后续章节中演示的内容。既然你已经掌握了 Core Data，那么在应用程序开发的某些方面，你可能会对之前用不同方式解决的问题产生全新的认识。说到认识，这正是我们将在第\
  \ 11 章中探讨的方向，我们将了解 Cocoa 以及其他框架中一些最突出、最广泛使用的视图组件：窗口、菜单和表单。\n\n"
- '# 11. 窗口、菜单和表单


  在过去的几章中，我们一直专注于 Cocoa 编程中所谓“后端”的部分，即那些帮助处理应用程序基础设施的模型和控制器类。现在，是时候将注意力转向 Cocoa 的“前端”，更多地关注
  MVC 架构中的视图部分了。


  在本章中，我们将重点讨论窗口（不是 Microsoft 那种）、菜单（不是餐厅那种）、面板（不是太阳能那种）和表单（不是床单那种），这些都是高级 GUI 对象，几乎任何
  Cocoa 应用程序都离不开它们。窗口为视图对象的绘制提供了基础。在 Cocoa 中，这些由 `NSWindow` 及其直接子类 `NSPanel` 以及几个专门的子类表示。菜单提供了大多数
  Mac 应用程序都有的、熟悉的屏幕顶部访问系统级和特定应用用户操作的方式，由 `NSMenu` 和 `NSMenuItem` 对象的层次结构表示。表单通过将模态窗口作为覆盖层附加到现有窗口上，为经典的浮动模态窗口提供了一种替代方案，为用户提供了更连贯的界面。


  我们将在一个“实验室”中探索这三个领域，这是一个没有实际用途的玩具应用程序，仅用于演示某些功能并让我们了解这些组件是如何工作的。




  '
- "# NSWindow 与 NSPanel\n\n首先，使用 Cocoa 应用程序模板创建一个新的 Xcode 项目，并将其命名为 `WindowLab`。我们将把这个项目作为演示各种窗口功能的测试平台。\n\
  \n在 Mac OS X 中，屏幕上几乎所有的内容都是通过窗口来呈现的。许多窗口很容易识别，它们顶部有标准控件，背后带有投影。\n\n但有些窗口并没有那么明显。例如，如果我们启动一个游戏，它占据了整个屏幕进行显示，即使它呈现的是自定义的、与\
  \ Cocoa 无关的控件，这一切也都是在某个窗口中发生的。屏幕底部的 Dock 毫无疑问也是一个窗口。而且，如果我们把一个文件图标从一个 Finder 窗口拖到另一个\
  \ Finder 窗口，我们拖动的图标实际上是被\"装\"在一个小小的透明窗口里！\n\n在所有这些情况下，我们看到的并与之交互的都是 `NSWindow` 及其子类的实例。`NSWindow`\
  \ 是一个非常通用的类，它允许我们开箱即用地配置多种行为，并且通过子类化实现更多功能。通常，如果我们想要改变窗口本身的外观，无论是其\"镀铬装饰\"（标题栏和左上角控件）、透明度还是形状，我们可能都需要对\
  \ `NSWindow` 进行子类化。但除此之外，我们几乎永远不需要这样做。在本书中，我们将只使用那些可以直接使用且符合苹果人机界面指南的窗口类型，并且不会对\
  \ `NSWindow` 进行子类化来改变其外观。\n\n**提示**\n\n人机界面指南（通常简称为 \"HIG\"）是苹果公司为应用程序开发者提供的一套建议。当你担心你的应用程序看起来有些\"\
  不对劲\"时，HIG 可以作为一种你可以参考的风格指南。它并不是一套严格的规则，也没有人会阻止你违反 HIG。事实上，许多应用程序，包括苹果自家的，都会以各种方式偏离指南。然而，它提供了一个良好的基线，描述了各种组件应该如何被使用。\n\
  \n我们已经在第 2 章提到了 HIG，但值得再次指出。你可以在网上找到 HIG，网址是 [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html)。\n\
  \n图 11-1 展示了当今大多数 Cocoa 应用程序中常见的主要窗口类型。`NSWindow` 有两种绘制风格：\"正常\"外观和\"纹理\"外观（有些类似于闪亮的金属片）。任何一种风格的\
  \ `NSWindow` 都可以配置为支持全屏模式，这会在标题栏的右端添加箭头。`NSPanel` 可以配置为实用工具模式（这种情况下，它的标题栏更小，投影更小，并且浮动在应用程序的其他窗口之上），或者看起来像一个普通的窗口，并且在这两种情况下，也适用正常与纹理的选择，就像\
  \ `NSWindow` 一样。`NSPanel` 还有一个额外的选项是运行在 HUD（即平视显示器 heads-up display 的缩写）模式下，在这种情况下，面板的配色方案会反转，其标题栏和底部边缘会被修改，并且整个窗口会变得略微透明。这种模式（没有纹理选项）旨在让用户能够透过界面的部分区域看到其背后的内容，并且在\
  \ iPhoto 等应用程序中得到了很好的应用，你可以调出一个包含可调节颜色设置的 HUD 面板，透过它，你正在查看的照片仍然可见。\n\n![A978-1-4302-4543-8_11_Fig1_HTML.jpg](img/A978-1-4302-4543-8_11_Fig1_HTML.jpg)\n\
  \n**图 11-1.** Cocoa 中可直接使用的主要窗口类型示例\n\n与其他一些 GUI 工具包（你在创建新应用程序时首先要做的事情之一就是对某种 Application\
  \ 类和某种 Window 类进行子类化）不同，Cocoa 允许真正分离你应用程序的模型、视图和控制器部分。窗口只需要知道如何显示自身并为它的视图提供图形上下文，因此它的作用仅限于此。任何处理应用程序运行时窗口所发生事件的代码（例如，从\
  \ nib 文件加载、被拖拽到屏幕另一侧、或被用户关闭）通常都可以由窗口的委托对象（即其控制器）来处理。\n\n## 处理输入\n\n除了为视图提供显示内容的框架，`NSWindow`\
  \ 还处理来自鼠标和键盘的用户输入。在 `NSWindow` 中的任何鼠标操作（点击、拖拽、移动、释放等）都会触发 `NSWindow` 中的一个方法，该方法会在其内容中找到合适的视图对象，并在该视图中调用相同的方法。这种对称性之所以有效，是因为\
  \ `NSWindow` 和 `NSView` 都继承自 `NSResponder`，而处理这些事件的方法正是在 `NSResponder` 中定义的。同样地，当用户在键盘上按下或释放一个键时，应用程序会调用该应用程序的\"\
  关键窗口\"（即当前拥有键盘焦点的窗口；通常是用户最后点击过的窗口）中的方法，该方法进而确定当前哪个视图拥有键盘焦点，并传递责任，在获得焦点的视图中调用相同的方法。\n\
  \n## 使用面板，还是不用面板\n\n由于我们不会修改窗口的基本外观，我们将使用 `NSWindow` 或其子类 `NSPanel` 来在我们的应用程序中显示控件和其他视图。我们应用程序的核心元素通常放在一个\
  \ `NSWindow` 中，而 `NSPanel` 则用于辅助窗口，例如 Finder 中的\"显示查看选项\"面板。从用户的角度来看，`NSWindow`\
  \ 和 `NSPanel` 之间仅有几个关键的区别：\n\n*   当另一个应用程序成为活动应用程序时，`NSPanel` 实例通常会变得不可见，并在其自己的应用程序再次变为活动状态时重新出现。\n\
  *   可以设置一个 `NSPanel` 使其\"浮动\"在其应用程序中的所有其他窗口（包括主窗口）之前。\n*   可以轻松地将一个 `NSPanel` 配置为不会不必要地成为关键窗口，这样用户可以在辅助面板中点击一个按钮，然后继续在主窗口中输入。\n\
  \n\n\n### Window Attributes\n\n在 Xcode 的 WindowLab 项目中，导航到 `MainMenu.xib` 文件并单击以在\
  \ Interface Builder 画布中打开它。应用程序 nib 文件中包含的对象之一，和往常一样，是一个窗口。在主要的 nib 窗口中点击选择它，然后打开\
  \ Attributes Inspector 以便我们进行一些探索（参见图 11-2）。在前面的章节中，我们使用这个 Inspector 来设置窗口的标题，但当然我们在这里可以做更多事情。\n\
  \n![A978-1-4302-4543-8_11_Fig2_HTML.jpg](img/A978-1-4302-4543-8_11_Fig2_HTML.jpg)\n\
  \n图 11-2. 针对 `NSWindow` 的 Attributes Inspector\n\n我们已经熟悉了 Title 文本字段。就在它下面的是 Autosave\
  \ 字段，它提供了一个非常好的功能：在此字段中输入一个文本字符串，窗口将使用该字符串作为 `NSUserDefaults` 系统中的键，并基于该键存储和检索窗口的位置和大小。这意味着，当用户重新排列我们应用程序中的窗口时，窗口位置会保存在用户的偏好设置中，并且下次用户运行我们的应用程序时，窗口将出现在相同的位置。而我们要做的，就是为应用程序中的每个窗口填写这个文本字段，并为每个窗口输入一个唯一的值。\n\
  \n接下来，有一些复选框允许我们关闭一些标准的窗口控件。请注意，关闭这些复选框并不会从窗口标题栏中移除相应的按钮；它只会让这些按钮在我们的应用程序运行时永久变灰并且不可用。在它们下面是一些用于微调窗口外观的复选框，包括启用纹理模式、禁用窗口背后的阴影等等。这里提到\
  \ Toolbar 的选项指的是可以附加到窗口的可选 `NSToolbar`，我们将在本章稍后解释这一点。我们还可以移除窗口的标题栏。这通常是一个坏主意，因为用户将无法重新定位窗口，但对于像游戏这样占据整个屏幕的应用程序来说，这可能是有用的。\n\
  \n下一组复选框让我们以多种方式微调窗口的行为，其中大部分是见名知义的。一个例外是 Auto Recalculates View Loop 复选框，其名称充其量令人费解。思路是这样的：每个窗口维护一个它包含的所有视图对象的列表，用户可以通过使用\
  \ Tab 键在这些视图之间切换。如果我们打开这个复选框，那么在应用程序运行时添加到窗口的任何视图都将自动插入到这个“循环”中的某个位置。另一个例外是 Restorable\
  \ 复选框。打开 Restorable 告诉 Cocoa 我们的窗口应该在应用程序启动之间尝试恢复到相同的状态。在我们的帮助下，我们的应用程序可以重新打开用户在退出时打开的窗口，甚至可以将它们恢复到用户退出时的滚动位置和选择状态。\n\
  \n在它下面，你会找到一系列关于窗口如何与桌面交互的菜单。Mac 桌面环境有一个名为 Mission Control 的功能（位于“系统偏好设置”应用程序中），它允许用户拥有多个桌面（或空间）并在它们之间移动窗口，以及显示所有窗口或单个应用程序的所有窗口。在\
  \ Mac OS/X 的早期版本中，Mission Control 是两个独立的功能，分别称为 Spaces 和 Exposé，在 Attributes Inspector\
  \ 中它们仍然以此称呼。\n\n一般来说，我们会将这些选项保留为 `Inferred Behavior`，这意味着窗口行为正常。对于 Spaces，其他选择是\
  \ `Can Join All Spaces`，这意味着窗口将始终可见；或者 `Move To Active Space`，这意味着窗口在变为活动状态时会移动到当前空间，而不是将活动桌面切换到窗口所在的桌面。对于\
  \ Exposé，`Inferred Behavior` 等同于 `Managed Behavior`，这意味着窗口会对 Exposé 操作做出正常响应。其他选择包括\
  \ `Transient`，这会导致窗口在 Exposé 被激活时隐藏（这是面板的默认行为）；以及 `Stationary`，这意味着窗口完全忽略 Exposé。下一个选项涉及此窗口是否应包含在用户可以通过\
  \ Window ➤ Cycle Through Windows（⌘-`）命令循环切换的窗口集合中。接下来是窗口是否支持全屏选项，其中窗口会扩展到自己的空间并占据整个显示器，就像\
  \ iOS 应用程序一样，包括隐藏菜单栏。如果将此设置为 `Primary Window`，则标题栏右侧会显示一个特殊控件来激活全屏模式。\n\n最后，有一些与窗口内存使用相关的选项。最好保持\
  \ `Deferred` 开启，因为这会跳过为窗口分配一些内部内存，直到窗口即将实际显示。此外，我们应该保持 `One Shot` 关闭。如果它开启，那么一旦窗口关闭，同一内部内存就会被释放，因此只有在相关窗口是每个会话只能显示一次的临时窗口时才应开启，例如启动画面。最后，弹出窗口为我们提供了将窗口的“后备存储”从\
  \ `Buffered` 切换为 `Retained` 或 `Unretained` 的能力。永远不要那样做！`Retained` 和 `Unretained`\
  \ 选项仅用于支持特定类型的遗留代码，所有新的 Cocoa 应用程序都应针对每个窗口将此设置保留为 `Buffered`。\n\n现在，从 Object Library\
  \ 窗口中拖出一个 `NSPanel`，再次查看 Attributes Inspector；注意 Style 弹出菜单以及我们在检查 `NSWindow` 时看到的一些额外复选框。这里的样式选项包括\
  \ `Utility`，如果选择，它会赋予面板独特的外观，并使其浮动在应用程序的其他窗口之上；以及 `HUD`，它赋予窗口更具特色的“平视”外观。尝试其中一些样式，看看它们如何影响面板的外观。面板的行为也可能与窗口不同。面板可以在全屏下拉菜单中标记为\
  \ `Auxiliary Window`，这意味着它在全屏模式下，会在同一空间中浮动于另一个窗口之上。这对于诸如影响另一个窗口中文档的“查找”或“信息”面板非常有用。探索完毕后，从\
  \ nib 文件中删除该面板。\n\n### 标准系统面板\n\n除了旨在让我们填充自己的视图和控件的通用窗口类之外，Cocoa 还包含一些专门化的窗口子类，供我们在应用程序中使用。这些子类旨在满足各种应用程序的需求，因此使用它们可以免费获得许多功能，同时为我们的用户提供他们可能在其他应用程序中使用过的熟悉界面。\n\
  \n\n\n### 颜色面板\n\n首先，让我们看一下 `NSColorPanel`。这个面板提供了一个让用户选择颜色的界面。我们将通过在我们的控制器类中实现一个方法，每当用户在颜色面板中选择一种颜色时，该方法就会被调用，从而使用颜色面板来设置屏幕上文本的颜色。\n\
  \n假设我们之前在 Xcode 中创建的 WindowLab 项目里的 `MainMenu.xib` 文件仍然处于打开状态，让我们看一下 nib 文件中的主窗口对象。从对象库中拖出一个换行标签（也称为多行标签），并将其放到窗口上。同时拖出一个按钮，放置在标签下方。将按钮标题设为“显示颜色面板”。布局应如图\
  \ 11-3 所示。\n\n![A978-1-4302-4543-8_11_Fig3_HTML.jpg](img/A978-1-4302-4543-8_11_Fig3_HTML.jpg)\n\
  \n图 11-3. 一个非常简单的窗口布局\n\nXcode 还会为我们创建一个 App Delegate 类。如果我们使用 WL 作为类前缀，那么它将被命名为\
  \ `WLAppDelegate`。在 Xcode 中，在 Interface Builder 面板旁边打开一个辅助编辑器面板（我们在第 5 章中讨论过辅助编辑器面板；点击\
  \ Xcode 工具栏中标记为“编辑器”的图标组里那个看起来像管家背心和领结的图标）。当我们打开这个面板时，`WLAppDelegate.h` 文件很可能会被预加载，但如果没有，请使用面板顶部的导航栏将其打开。我们将添加一个名为\
  \ `title` 的出口和一个名为 `showColorPanel:` 的动作。为此，从多行标签按住 Control 键拖拽到 `WLAppDelegate.h`\
  \ 文件中，目标位置是现有 `@property` 声明的正下方。添加一个新的出口并将其命名为 `title`。然后，从“显示颜色面板”按钮按住 Control\
  \ 键拖拽到刚刚添加的出口下方，并添加一个名为 `showColorPanel:` 的动作（我们需要将连接类型更改为“动作”）。\n\n完成后，`WLAppDelegate.h`\
  \ 文件应如下所示：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject\
  \ <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\n@property\
  \ (weak) IBOutlet NSTextField *title;\n\n- (IBAction)showColorPanel:(id)sender;\n\
  \n@end\n```\n\n现在切换到 `.m` 文件，并添加 `showColorPanel:` 方法的以下实现，以及一个名为 `changeColor:`\
  \ 的方法，如下所示：\n\n```\n#import \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\
  \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n   \
  \ // 在此处插入代码以初始化你的应用程序\n}\n\n- (IBAction)showColorPanel:(id)sender\n{\n    // 创建颜色面板\n\
  \    NSColorPanel *panel = [NSColorPanel sharedColorPanel];\n    // 将颜色面板带到屏幕最前方\n\
  \    [panel orderFront:nil];\n}\n\n- (void)changeColor:(id)sender\n{\n    // 在此方法中，\"\
  sender\" 参数就是 NSColorPanel\n    // 本身。我们只需向其请求颜色，并将其传递给\n    // \"title\" 对象。\n\
  \    [self.title setTextColor:[sender color]];\n}\n\n@end\n```\n\n**注：** 尽管我们之前已经见过，但请仔细观察\
  \ `WLAppDelegate.h` 文件中的 `@property` 声明。大多数情况下，当添加一个连接到用户界面元素的属性时，该属性会包含 `weak`\
  \ 注释。但对于窗口的引用来说并非如此。那个被标记为 `assign`。这有一个很好的理由：这些注释控制着自动引用计数如何处理这些引用。被标记为 `strong`\
  \ 的引用表示拥有该对象的所有权。被标记为 `weak` 的引用不表示所有权，并且当一个对象的所有强引用都被释放且该对象被解除分配时，弱引用会被清零。然而，ARC\
  \ 不能与重写了 `release` 和 `retain` 方法的类一起工作，这包括 `NSWindow`。由于 `NSWindow` 不支持 ARC，该属性被赋予了\
  \ `assign` 注释。这实际上与 `weak` 含义相同，但适用于非 ARC 启用的类。应用程序代理并不拥有窗口，因此应用程序代理对窗口的连接不应阻止窗口在适当时被释放和解除分配。\n\
  \n`showColorPanel:` 方法将通过我们 GUI 中的一个简单按钮点击来调用，Xcode 在我们从按钮进行 Control-拖拽时已经为我们建立了连接。但是，`changeColor:`\
  \ 方法将在用户点击颜色面板中的颜色时被调用，即使颜色面板和我们的代码之间没有任何直接连接。这种“神奇”的效果要归功于一个名为响应者链的 Cocoa 概念（见侧边栏）。\n\
  \n### 响应者链\n\n响应者链是一个临时的对象集合，在应用程序的生命周期中，当需要时会动态收集，可以查询它们是否实现了特定的动作。这允许某些动作以通用方式配置，以便在运行时在最有意义的对象上被调用。该链按照特异性顺序排列，从“最靠近”动作的对象开始，一直延续到最通用的对象。在\
  \ Interface Builder 中，通过将动作连接到 nib 文件中的“第一响应者”图标来配置对象以使用响应者链，该图标不过是响应者链中第一个对象的代理，该对象会在运行时被询问是否实现了某个特定方法时回答“是的，我能”。\n\
  \n每个窗口都有自己的“第一响应者”概念，这通常是用户最后与之交互的控件或视图（从而使其成为接收按键等操作的可能候选对象），这一事实让事情变得更加令人困惑。\n\
  \n让我们尝试通过一个例子来澄清这一点。考虑一个按钮，其目标/动作被配置为在第一响应者上调用一个名为 `showThing:` 的方法。当用户点击该按钮时，会按顺序询问一个对象列表中的每个对象是否实现了\
  \ `showThing:` 方法，直到其中一个对象回答 `YES`，此时该对象的 `showThing:` 方法被调用，响应者链的工作就完成了。以下是响应者链可能的样子示例：\n\
  \n-   窗口的“第一响应者”（当前处于焦点并接受键盘输入的视图）、其父视图、父视图的父视图，依此类推，向上遍历窗口内的视图层次结构\n-   窗口本身\n\
  -   窗口的委托\n-   应用程序对象 `NSApp`\n-   应用程序对象的委托\n\n响应者链还可能包含其他对象，特别是当我们处理基于文档的应用程序时，在这种情况下，已打开的文档及其控制器也会在链中占据一席之地。更多内容请参见第\
  \ 12 章。\n\n一旦这些对象中的任何一个声明它实现了 `showThing:`，那么该方法就会在该对象上被调用，并且搜索结束。\n\n\n\n现在保存工作并点击运行。我们的新应用将会出现，点击按钮会弹出颜色面板。在不同颜色上点击，所选文本的颜色会立即改变以反映新的选择。\n\
  \n那么，鉴于颜色面板与我们应用的委托没有直接联系，我们自然会好奇：这是如何工作的？应用委托中的`changeColor:`方法是如何被调用的？关键在于响应者链的运用，如前所述。`NSColorPanel`通过响应者链寻找实现了`changeColor:`方法的对象。作为应用委托，我们的小控制器对象是最后一个被查询是否实现该方法的对象之一，由于它确实实现了，因此被调用。请注意，如果窗口本身实现了该方法，或者它有实现了该方法的委托，那么这些方法中的其中一个会被调用。\n\
  \n现在我们需要用一个现实的检验来结束这一节。实际上，我们刚才所做的事情可以通过使用`NSColorWell`来更轻松（也更美观）地完成，这是一个特殊的控件，点击时会启动`NSColorPanel`。我们只需要编写代码在控制器类中声明一个属性来包含`NSColor`，然后使用\
  \ Cocoa 绑定将`NSColorWell`的 Value 属性和`NSTextField`的 Text Color 属性绑定到控制器中的属性。这个示例原样包含在此处，主要是为了向你展示如何从自己的代码中使用颜色面板，并让你初次了解响应者链的概念。\n\
  \n### 字体面板\n\n我们要看的下一个特殊面板是`NSFontPanel`。与颜色面板不同，字体面板没有关联的控件来启动它。但是，它可以相当容易地与系统**格式**菜单的内容集成，稍后我们将看到这一点。\n\
  \n我们要做的是在 WindowLab 窗口中添加一个按钮，该按钮将触发一个动作方法来打开字体面板，以及另一个更新文本字段的方法。首先，将 WindowLab\
  \ 窗口拉高一些。然后选择打开颜色面板的按钮，并复制它。将新按钮的标题改为 Show Font Panel。打开一个辅助编辑器窗格，显示`WLAppDelegate.h`文件，从按钮按住\
  \ Control 键拖拽到辅助编辑器窗格，目标定在现有动作方法下方。插入一个新的动作，并命名为`showFontPanel`。\n\n添加该动作将导致在`WLAppDelegate.h`文件的类`@interface`块内添加以下方法声明：\n\
  \n`- (IBAction)showFontPanel:(id)sender;`\n\n以下存根将添加到`WLAppDelegate.m`文件的`@implementation`中：\n\
  \n`- (IBAction)showFontPanel:(id)sender {`\n\n`}`\n\n切换到`.m`文件，并在`@implementation`部分填写以下代码：\n\
  \n`- (IBAction)showFontPanel:(id)sender`\n\n`{`\n\n  `NSFontPanel *panel = [NSFontPanel\
  \ sharedFontPanel];`\n\n  `NSFontManager *manager = [NSFontManager sharedFontManager];`\n\
  \n  `[manager setSelectedFont:[self.title font] isMultiple:NO];`\n\n  `[panel orderFront:nil];`\n\
  \n`}`\n\n`- (void)changeFont:(id)sender`\n\n`{`\n\n  `// 这里，'sender' 是共享的 NSFontManager\
  \ 实例`\n\n  `NSFont *oldFont = [self.title font];`\n\n  `NSFont *newFont = [sender\
  \ convertFont:oldFont];`\n\n  `[self.title setFont:newFont];`\n\n`}`\n\n这与颜色面板的使用模式相同。当用户点击字体时，字体面板使用响应者链寻找实现了`changeFont:`动作方法的对象，并成功在我们的应用委托中找到了它。这里的情况稍微复杂一些，因为在两个方法中我们都使用了`NSFontManager`类的共享实例。运行中应用关于选定或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它来间接告诉`NSFontPanel`应开始显示哪种字体，然后在`changeFont:`中再次使用它来获取新选定的字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态相结合（例如，如果旧字体是\
  \ Lucida Grande/Bold/36，而用户选择了 Times New Roman 并保持其他设置不变，转换后的字体将是 Times New Roman/Bold/36）。\n\
  \n现在，保存工作，回到 Xcode，并点击运行。我们现在可以同时更改显示文本的颜色和字体（见图 11-4）。\n\n![A978-1-4302-4543-8_11_Fig4_HTML.jpg](img/A978-1-4302-4543-8_11_Fig4_HTML.jpg)\n\
  \n**图 11-4.** 设置标签的颜色和字体\n\n## 拥有独立 Nib 的控制器\n\n接下来，我们将演示一个在 Cocoa 开发中常见的简单模式：创建一个加载自己\
  \ nib 文件的控制器类，成为文件中所有对象的“所有者”。到目前为止，我们创建的所有应用程序中，所有 GUI 元素都包含在应用的单个`.xib`文件中。这对于简单应用来说效果不错，但有其局限性。首先，我们在\
  \ nib 中只有每个窗口和每个控制器的一个实例。其次，整个主 nib 文件在应用程序启动时一次性加载，而 nib 中的内容越多，启动阶段的速度就会越慢，占用的内存也越多。诚然，在现代拥有数\
  \ GB RAM 的计算机上，这可能不是什么大问题，但作为程序员，始终不浪费 CPU 和 RAM 是个好习惯。最后，将过多的顶层对象（窗口、控制器等）放入一个\
  \ nib 文件中，会让程序员（你）的工作更加困难，因为很难看出哪些控制器和窗口属于同一组。\n\n这两个问题的解决方案是将一些 GUI 对象分发到其他 nib\
  \ 文件中，并通过加载这些 nib 的控制器类来管理它们的使用。许多 Cocoa 应用都使用了这种技术，通常将偏好设置、文档、工具等窗口拆分到独立的 nib 文件中。接下来的章节将以递增的复杂度演示两种实现此目的的不同方法。\n\
  \n\n\n### 使用 `NSWindowController` 加载 Nib 文件\n\n第一种也是最简单的方法是使用 Cocoa 的 `NSWindowController`\
  \ 类来加载 nib 文件并成为其所有者。我们将在主窗口中添加一个按钮，用于触发加载新的 nib 文件，并在 `WLAppDelegate` 中添加一个 `NSMutableArray`，用于持有对新加载\
  \ nib 文件的引用。如果没有东西持有对新加载 nib 文件的引用，ARC 系统将导致它们被立即释放。\n\n首先，打开 `WLAppDelegate.h`\
  \ 文件，并添加以下属性（以粗体显示）：\n\n```\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
  \ *title;\n@property (strong) NSMutableArray *subWindows;\n```\n\n然后在 `.m` 文件的 `applicationDidFinishLaunching:`\
  \ 方法中添加以下行：\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n\
  \n{\n\nself.subWindows = [[NSMutableArray alloc] init];\n\n}\n```\n\n接下来，打开 `MainMenu.xib`\
  \ 文件，并在主窗口中已有两个按钮的下方添加一个新按钮。将其标签设为“Load Easy Window”。打开助理编辑器窗格（如果尚未打开），并在其中打开 `WLAppDelegate.h`\
  \ 文件。从新按钮按住 Control 键拖向 `.h` 文件，并添加一个名为 `loadEasyWindow` 的新操作。然后，在 `.m` 文件中为 `WLAppDelegate`\
  \ 填充存根，实现如下内容：\n\n```\n- (IBAction)loadEasyWindow:(id)sender\n\n{\n\nNSWindowController\
  \ *easyController = [[NSWindowController alloc]\ninitWithWindowNibName:@\"EasyWindow\"\
  ];\n\n// 需要持有对此对象的引用\n[self.subWindows addObject:easyController];\n[easyController\
  \ window];\n\n}\n```\n\n在该方法中，我们首先初始化一个新的控制器，并告知它要使用的 nib 文件名。然后，我们在 `applicationDidFinishLaunching:`\
  \ 方法中创建的 `subWindows NSMutableArray` 中存储对该控制器的引用，这样新控制器就不会在方法结束时被释放。如果我们没有持有其引用，当它超出作用域时就会被释放，新加载的\
  \ nib 文件也会随之被释放。当然，在实际应用中，我们需要一种机制来适时地从该列表中移除对象，但我们暂时忽略这一点。接着，我们调用其 `window` 方法，该方法实际加载\
  \ nib 文件并显示窗口。当然，我们还没有创建 EasyWindow nib 文件，所以现在就来创建。\n\n在 Xcode 中创建一个全新的 nib 文件：选择\
  \ File ➤ New ➤ New File。在模板选择器中，选择 OS X 下的 User Interface，然后选择 Window 模板，该模板包含一个可直接使用的\
  \ `NSWindow`。将新文件命名为 EasyWindow，并在 Group 弹出菜单下选择 WindowLab 文件夹。Group 弹出菜单将显示五个项目，前三个分别是带有\
  \ Xcode 项目图标的 WindowLab、带有文件夹图标的 WindowLab 以及带有文件夹图标的 Supporting Files。这些对应于 Xcode\
  \ 导航区域中的文件组。选择带有文件夹图标的 WindowLab 条目，然后点击 Create。\n\n我们新创建的 xib 文件将在 Xcode 的导航区域中显示为一个新文件，因此请从此处打开该文件。选择\
  \ nib 文件中的 Window，然后打开属性检查器。将窗口标题设为“Easy Window”。\n\n在之前的章节中，我们创建的每个控制器都被作为顶级对象添加到\
  \ nib 文件中，但当你自己加载 nib 文件时，可以指定一个对象作为其“所有者”，在 Interface Builder 中，这由主 nib 窗口中的 File’s\
  \ Owner 对象表示。我们的控制器类 `NSWindowController` 在加载文件时已经将自己设置为 nib 文件的所有者，但我们仍需要在 Interface\
  \ Builder 中手动配置，以便能够使用它。为此，选择 File’s Owner 图标并打开标识检查器。在此检查器的顶部，我们可以设置希望成为文件所有者的对象的类。默认情况下，它设置为\
  \ `NSObject`，但通常我们希望它是 `NSWindowController` 本身或 `NSWindowController` 的自定义子类。现在，将其自定义类设置为\
  \ `NSWindowController`，如图 11-5 所示。最后，按住 Control 键从 File’s Owner 图标拖向窗口，并将其分配给 File’s\
  \ Owner 的 `window` 插座变量。我们需要这样做，以便 `NSWindowController` 知道众多可能的 `NSWindow` 对象中哪一个是该\
  \ nib 的“主”窗口。\n\n![A978-1-4302-4543-8_11_Fig5_HTML.jpg](img/A978-1-4302-4543-8_11_Fig5_HTML.jpg)\n\
  \n图 11-5.\n\n设置 File’s Owner 的类\n\n保存并点击 Run。应用的新按钮将允许我们每次按下按钮时创建新窗口（参见图 11-6）。\n\
  \n![A978-1-4302-4543-8_11_Fig6_HTML.jpg](img/A978-1-4302-4543-8_11_Fig6_HTML.jpg)\n\
  \n图 11-6.\n\n一些简易窗口\n\n每次它都会创建一个新的 `NSWindowController` 实例，该实例会加载一份全新的 nib 文件副本，包括其中的所有对象。在此例中，我们只有一个窗口，但你可以在这些\
  \ nib 文件中放置任何你喜欢的内容，例如用于访问 Core Data 的控制器对象。\n\n\n\n### 子类化 `NSWindowController`\n\
  \n当然，通常情况下你需要在自己的控制器类中编写部分代码。你也可以轻松地子类化 `NSWindowController` 以满足需求。接下来的步骤是创建一个子类，并为其新建一个\
  \ nib 文件供其加载，同时设置一种从主窗口和控制器中调用它的方法。\n\n在 Xcode 的 WindowLab 项目中创建一个新类，命名为 `NotSoEasyWindowController`：选择菜单中的\
  \ \"File\" ➤ \"New\" ➤ \"File\"，然后在模板选择器的 OS X 区域选择 \"Cocoa\"。接着选择 \"Objective-C\
  \ class\"，并指定我们要创建 `NSWindowController` 的子类。Xcode 会建议命名为 `WLWindowController`，但你应该将其改为\
  \ `WLNotSoEasyWindowController`。勾选 \"With XIB for user interface\" 复选框，Xcode 还会为我们生成一个\
  \ `WLNotSoEasyWindowController.xib` 文件，该文件的 File's Owner 设置为我们的新子类，并且窗口插座（window\
  \ outlet）已预先连接好。Xcode 会提示你保存 nib 文件，并询问将其添加到哪个组中。请使用与上面 Easy Window nib 文件相同的组，即\
  \ WindowLab 文件夹。Xcode 会生成 `WLNotSoEasyWindowController.h` 和 `WLNotSoEasyWindowController.m`\
  \ 文件，其中包含一些方法，但我们还需要对这些文件进行一些处理。\n\n我们在这里创建自己的类，并且它只管理一个 nib 文件。因此，我们可以将 nib 文件名内建到类中，这样任何使用此类的人只需知道类名，而无需了解\
  \ nib 文件名本身。我们还可以让调用者使用起来更简便：假设任何创建此类实例的人都希望加载 nib 文件，那么我们可以将对 `window` 的调用直接内建到\
  \ `init` 方法中。通过创建以下 `init` 方法来实现：\n\n```\n- init\n{\n    if ((self = [super initWithWindowNibName:@\"\
  WLNotSoEasyWindowController\"]))  {\n        [self window];\n    }\n    return self;\n\
  }\n```\n\n这是标准 `init` 方法的推荐形式：我们调用父类中的另一个 `init` 方法，如果成功则执行实例特定的操作，最后返回指向 `self`\
  \ 的指针。在此过程中，我们还要移除 Xcode 为我们生成的 `initWithWindow:` 方法，因为永远不需要调用它。\n\n现在切换到 `MainMenu.xib`。再次将窗口调高一些，复制最后一个按钮，并将其命名为\
  \ \"Not So Easy\"。然后在 Assistant Editor 中打开 `WLAppDelegate.h`，按住 Control 键从按钮拖拽到\
  \ `WLAppDelegate.h`，并添加一个名为 `loadNotSoEasyWindow` 的新操作（Action）。打开 `WLAppDelegate.m`\
  \ 文件，为该操作添加以下实现代码：\n\n```\n// 添加到 WLAppDelegate.m 中：\n- (IBAction)loadNotSoEasyWindow:(id)sender\n\
  {\n    WLNotSoEasyWindowController *notSoEasyController = [[WLNotSoEasyWindowController\
  \ alloc] init];\n    [self.subWindows addObject:notSoEasyController];\n}\n```\n\n\
  我们还需要在 `WLAppDelegate.m` 的顶部添加以下 `#import` 指令，以便编译器在编译应用委托（app delegate）时知道新类的存在：\n\
  \n```\n#import \"WLNotSoEasyWindowController.h\"\n```\n\n完成这些后，让我们为窗口控制器类添加一点功能，这样在\
  \ nib 文件创建后，我们可以确保窗口正确连接：一个简单的方法，当它被调用时让计算机发出蜂鸣声。遗憾的是，我们需要手动添加它，但这很容易做到。\n\n将以下方法声明添加到\
  \ `WLNotSoEasyWindowController.h` 中：\n\n```\n- (IBAction)beep:(id)sender;\n```\n\
  \n`WLNotSoEasyWindowController.m` 的完整内容应如下所示，并添加了新的 `beep:` 操作方法：\n\n```\n#import\
  \ \"WLNotSoEasyWindowController.h\"\n\n@interface WLNotSoEasyWindowController ()\n\
  @end\n\n@implementation WLNotSoEasyWindowController\n\n- init\n{\n    if ((self\
  \ = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"])) {\n       \
  \ [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad\n{\n    [super\
  \ windowDidLoad];\n    // 在此方法中处理窗口控制器从 nib 文件加载后的任何初始化操作。\n}\n\n- (IBAction)beep:(id)sender\n\
  {\n    NSBeep();\n}\n\n@end\n```\n\n在 Interface Builder 的画布中打开 `WLNotSoEasyWindowController.nib`\
  \ 文件，从对象库中拖出一个按钮，并将其标题设置为 \"Beep!\"。按住 Control 键从 \"Beep!\" 按钮拖拽到 Object Dock 中的\
  \ File's Owner 图标，并选择我们刚刚添加的 `beep:` 操作。Xcode 会自动检测到我们添加了新的操作，并使其可用。保存更改并点击运行；最新的按钮将允许我们创建窗口，当按下按钮时窗口会发出蜂鸣声，如图\
  \ 11-7 所示。\n\n![A978-1-4302-4543-8_11_Fig7_HTML.jpg](img/A978-1-4302-4543-8_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 这些窗口的按钮会向我们发出蜂鸣声\n\n### 模态窗口\n\n现在我们将介绍一种特殊的 GUI 元素：模态窗口。每个人都曾用过模态窗口，但如果你刚接触桌面\
  \ GUI 编程，这个术语可能对你来说比较陌生。基本上，模态窗口会将我们的应用程序置于特定的“模式”中。具体来说，在这种模式下，应用程序只接受通过模态窗口本身的控件进行输入，而在应用程序的其他地方点击只会发出蜂鸣声。由于模态窗口具有干扰性，应谨慎使用——仅在应用程序确实需要用户回答某些问题（例如，“有五个打开的文档包含未保存的更改。您确定要退出吗？”）后才能自行推进的情况下使用。如果应用程序需要用户提供的信息仅与单个窗口或文档相关，则最好使用表单（sheet），这将在本章后面介绍，它可以锁定单个窗口而不是整个应用程序。\n\
  \n\n\n### NSAlert 函数\n\nCocoa 中最简单的模态窗口是警报面板，它们通过单个函数调用来创建和运行。当用户点击其中一个按钮时，函数会返回，然后我们可以检查返回值以确定他们点击了哪个按钮。根据我们调用函数的方式，面板上可能会显示一个、两个或三个按钮。\n\
  \n最常用的模态警报函数是 `NSRunAlertPanel`。它还有几个变体，名为 `NSRunCriticalAlertPanel` 和 `NSRunInformationalAlertPanel`，它们用于\
  \ Apple 用户界面指南中概述的特定目的，但我们可以安全地使用 `NSRunAlertPanel`。这些函数中的每一个都接受五个或更多参数：首先是显示在面板顶部的标题，然后是显示的全文本（用于呈现某些信息或向用户提问），然后是三个包含按钮标题的字符串（可能为\
  \ `nil`）。设为 `nil` 的按钮标题将不会显示，除非它们全部为 `nil`，在这种情况下，面板上会包含一个单一的“确定”按钮。\n\n要查看一些警报面板的实际效果，请在一个\
  \ Interface Builder 窗格中打开 `MainMenu.xib`，然后在 Assistant Editor 窗格中打开 `WLAppDelegate.h`。向\
  \ WindowLab 窗口添加一个新按钮，并将其标题设为“运行模态警报”。从新按钮 Control-拖拽到 Assistant Editor 以添加一个新的操作。将新操作命名为\
  \ `runModalAlerts`。然后，在 Xcode 生成的存根内部的 `WLAppDelegate.m` 中实现以下方法：\n\n```\n- (IBAction)runModalAlerts:(id)sender\n\
  {\n  NSRunCriticalAlertPanel(@\"基本用法\", @\"这是一个普通的警报面板。\", nil, nil, nil);\n  NSRunAlertPanel(@\"\
  三个按钮\", @\"我们可以设置按钮标题：\",\n    @\"真的吗？\", @\"哦，太棒了！\", @\"随便。\");\n  NSRunAlertPanel(@\"\
  格式化字符串\", @\"我们也可以进行一些格式化，%@ %@\",\n    nil, nil, nil, @\"将需要插入的值放在末尾，\", @\"放在三个按钮值之后。\"\
  );\n  switch (NSRunAlertPanel(@\"注意选择\",\n            @\"当然，我们可以检测点击了哪个按钮。\",\n\
  \            @\"默认\", @\"备用\", @\"其他\")) {\n    case NSAlertDefaultReturn:\n   \
  \   NSRunInformationalAlertPanel(@\"结果：\", @\"你按下了默认按钮\",\n         nil, nil, nil);\n\
  \      break;\n    case NSAlertAlternateReturn:\n      NSRunInformationalAlertPanel(@\"\
  结果：\", @\"你按下了备用按钮\",\n        nil, nil, nil);\n      break;\n    case NSAlertOtherReturn:\n\
  \      NSRunInformationalAlertPanel(@\"结果：\", @\"你按下了其他按钮\",\n        nil, nil,\
  \ nil);\n      break;\n    default:\n      break;\n  }\n}\n```\n\n试试这些！保存，点击“运行”，然后试一试。\n\
  \n### 打开面板与保存面板\n\nCocoa 中其他最常用的模态面板可能是用于打开和保存文件的 `NSOpenPanel` 和 `NSSavePanel`。使用这些面板通常不仅仅是一行代码那么简单。我们首先需要在面板上配置各种选项（例如，是否允许用户选择多个文件打开，或者仅允许一个），然后运行面板，检查返回值（指示用户最终点击了“打开”或“保存”按钮，还是取消了），然后从面板获取生成的文件名。请注意，这些面板实际上并不执行任何文件\
  \ I/O 操作；它们只是提示用户输入文件名并返回结果。Cocoa 使用 `NSURL` 来表示文件路径，而不是 `NSString`，这使得“打开”和“保存”对话框能够引用本地文件系统之外的内容（例如\
  \ iCloud）。\n\n要了解如何实现这一点，请考虑以下方法，它模拟了复制文件的操作。此方法使用 `NSOpenPanel` 提示用户选择要复制的文件，然后使用\
  \ `NSSavePanel` 让用户指定文件的目标位置：\n\n```\n- (IBAction)copyFile:(id)sender\n{\n    NSOpenPanel\
  \ *openPanel = [NSOpenPanel openPanel];\n    [openPanel setTitle:@\"选择要复制的文件：\"\
  ];\n    if ([openPanel runModal] == NSOKButton) {\n        // 获取第一个（且唯一）选中的文件名\n\
  \        NSURL *openPath = [[openPanel URLs] objectAtIndex:0];\n        // 只提取文件名，不包含目录路径\n\
  \        NSString *openFilename = [openPath lastPathComponent];\n        NSSavePanel\
  \ *savePanel = [NSSavePanel savePanel];\n        [savePanel setTitle:@\"输入目标文件名：\"\
  ];\n        [savePanel setNameFieldStringValue:openFilename];\n        // 在默认目录下运行保存面板，并将打开的文件名作为建议。\n\
  \        if ([savePanel runModal] == NSOKButton) {\n            NSURL *savePath\
  \ = [savePanel URL];\n            NSString *message = [NSString stringWithFormat:\n\
  \                                 @\"你已打开此文件：\\n\\n%@\\n\\n 并将其保存到此处：\\n\\n%@\\\
  n\\n\",\n                                 openPath, savePath];\n            NSRunAlertPanel(@\"\
  复制文件（并非真的复制）\", message, nil, nil, nil);\n        }\n    }\n}\n```\n\n和之前一样，在主窗口中添加一个按钮（将其命名为“复制文件”），然后\
  \ Control-拖拽到 `WLAppDelegate.h` 文件以添加一个操作。将该操作命名为 `copyFile`。然后将上面的代码复制到 `WLAppDelegate.m`，替换\
  \ Xcode 生成的操作存根。保存更改，点击“运行”，然后尝试新按钮。标准的“打开”面板会出现，接着是标准的“保存”面板。请注意，“保存”面板甚至内置了在选中现有文件时发出警告并询问是否真的要覆盖的功能（请记住，在此示例中确认覆盖文件是完全安全的，因为我们实际上并没有复制任何内容）。\n\
  \n这里可能有必要提一下一个不那么显而易见的事实：`NSOpenPanel` 实际上是 `NSSavePanel` 的子类。这意味着，如果你在 `NSOpenPanel`\
  \ 的文档或头文件中找不到所需的功能，你可能还需要查看 `NSSavePanel`。\n\n## 系统菜单\n\n现在我们已经了解了 Cocoa 中窗口的一些基本用法，让我们花些时间讨论一下\
  \ Mac OS X 的另一个无处不在的功能：应用程序菜单。与大多数其他当前操作系统不同，Mac OS X 的菜单位于屏幕顶部，而不是每个窗口的顶部。这种布局有一些不错的优点：由于每个打开的窗口顶部不再需要一个水平条来占用空间，而只是在顶部有一个单一的水平条来显示活动应用程序的菜单，因此节省了屏幕空间。此外，用鼠标“点击”菜单更加容易和快捷，因为我们只需将鼠标向上甩动，就知道会碰到菜单，剩下的只需要精细地左右移动来找到想要选择的最顶部项目。\n\
  \n然而，这种布局并非没有复杂性。在典型的 Windows 应用程序中，可能会有多个不同的窗口，每个窗口都有自己的菜单，其中包含仅与该窗口内容相关的项目。虽然在技术上是可行的，可以在\
  \ Mac OS X 应用程序中做类似的事情，即当选择不同窗口时更改菜单结构，但这种用法是不受欢迎的，并且可能会困扰一些用户，因为 Mac 用户已经习惯了行为一致的应用程序。相反，我们可以实现一个完全受支持并被推荐的行为：根据当前选中的窗口（或者更确切地说，窗口内当前选中的对象）来启用或禁用菜单项。在本节中，我们将演示如何做到这一点，但首先我们将简要介绍一下\
  \ Cocoa 自带的、并且在大多数应用程序中都是标准的系统菜单。\n\n\n\n### 标准应用程序菜单项\n\n苹果的指南定义了一组应出现在大多数应用程序中的菜单和菜单项。在\
  \ Xcode 中创建一个新应用程序，并将其命名为 `MenuLab`，使用 `ML` 作为类前缀。我们将在此处对菜单项进行一些实验。打开新建的 `MainMenu.xib`\
  \ 文件，界面构建器画布将显示顶部预定义的菜单集。该集包含应用程序本身的顶层条目，其后依次是文件、编辑、格式、视图、窗口和帮助，每个菜单都包含各自的菜单项。打开连接检查器，以便我们检查其中一些项目，并查看它们的连接对象。只需依次点击各个不同的菜单项，并在每次点击后留意检查器。除了少数例外情况，例如“显示字体”菜单项，大多数项目都连接到我们之前讨论过的**第一响应者**代理。请注意，通过将菜单项连接到第一响应者，该*项目*不仅会在最相关的对象中调用其操作方法，还会根据响应者链的内容自动启用或禁用。\n\
  \n### 自定义菜单\n\n标准菜单包含大量功能：从调出应用程序的“关于”对话框，到编辑和格式化文本，再到处理窗口，所有功能都已预设。然而，许多应用程序需要一些额外的功能——有些功能不适合附加到窗口，或者会占用窗口过多空间。一种常见的解决方法是添加一个或多个额外的顶层菜单项，通常位于“视图”和“窗口”菜单之间。例如，访达中有一个“前往”菜单，而\
  \ Xcode 有三个额外的顶层菜单：“导航”、“编辑器”和“产品”。在我们的应用程序中，我们只需添加一个额外菜单，将其加入到 `MenuLab` 项目中即可。\n\
  \n### 通过绑定启用/禁用\n\n我们要做的第一件事是设置一对菜单项来控制应用委托中的布尔属性。我们可以用它们来控制某个影响应用程序全局设置的开关。在这里，我们将创建一个名为\
  \ `turbo` 的属性，它应该能让一切运行得更快（在 `MenuLab` 中很容易实现，因为它实际上不执行任何操作）。我们将创建两个菜单项，分别标记为“Turbo\
  \ 开”和“Turbo 关”，并将它们分别连接到应用委托中的一个操作方法，以执行实际的切换操作。然后，我们将使用绑定来适当地启用和禁用它们，这样当 `turbo`\
  \ 为 `YES` 时，只有“Turbo 关”项可点击；当 `turbo` 为 `NO` 时，只有“Turbo 开”项可点击。\n\n首先在 Xcode 中，将\
  \ `turbo` 属性添加到应用委托中，并添加一个操作方法用于切换该属性的值。我们需要对 `MLAppDelegate.h` 和 `MLAppDelegate.m`\
  \ 进行的更改如下所示，格式稍作简化并移除了空行。我们只需添加加粗显示的行。\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
  \ MLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
  \ NSWindow *window;\n\n@property (assign) BOOL turbo;\n\n- (IBAction)toggleTurbo:(id)sender;\n\
  \n@end\n```\n\n以及 `MLAppDelegate.m` 的内容：\n\n```\n#import \"MLAppDelegate.h\"\n\n\
  @implementation MLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification\n{\n    // 在此处插入代码以初始化应用程序\n}\n\n- (IBAction)toggleTurbo:(id)sender\
  \ {\n    self.turbo = !self.turbo;\n}\n\n@end\n```\n\n现在切换回界面构建器画布中的 `MainMenu.xib`。打开\
  \ nib 文件的空白窗口，将其标题更改为“Turbo 开关”，然后从对象库中拖入一个复选框，放置到位后将其标题更改为“Turbo!”。我们放置此复选框是为了直接查看应用委托的\
  \ `turbo` 属性中存储的值，从而方便地检查并确认我们的菜单项是否按预期工作。打开绑定检查器，配置复选框的“值”绑定，使用 `turbo` 键路径连接到\
  \ `MLAppDelegate`。\n\n接下来，是时候创建一些菜单项了（图 11-8 显示了完成后的效果）。为此，首先在对象库中搜索“菜单”，以限制显示内容。将一个“子菜单菜单项”拖入菜单中，放置在“视图”和“窗口”菜单之间。双击我们刚刚添加的新顶层菜单项，并将其标题更改为“工具”。再次点击它，会发现它已经包含一个项目（标题为“项目”）。点击选中它，然后按\
  \ ⌘-D 复制，会在其下方放置一个完全相同的项目。\n\n![A978-1-4302-4543-8_11_Fig8_HTML.jpg](img/A978-1-4302-4543-8_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 设置用于切换布尔属性的菜单项\n\n此时，两个新菜单项中的下方那个应处于选中状态。双击以选中标题文本，并将其重命名为“Turbo 关”。按住\
  \ Control 键从它拖拽到主窗口中的“应用委托”图标，并连接到 `toggleTurbo:` 动作。现在打开绑定检查器，配置菜单项的“启用”绑定，使用 `turbo`\
  \ 键路径连接到应用委托。这可以确保只有当应用委托的 `turbo` 属性值为 `YES` 时，该菜单才被启用。\n\n现在回到上方那个菜单项，将其重命名为“Turbo\
  \ 开”，并像对“Turbo 关”所做的那样，将其连接到应用委托的 `toggleTurbo:` 动作。由于此菜单项应启用或禁用的条件与“Turbo 关”菜单项的条件相反，因此绑定会略有不同。它的“启用”绑定也应该配置为应用委托和\
  \ `turbo` 键路径，但除此之外，还需要指定 `NSNegateBoolean` 作为值转换器。\n\n保存更改并点击“运行”。应该会出现一个包含复选框的“Turbo\
  \ 开关”窗口。我们的应用程序应该有一个包含“Turbo 开”和“Turbo 关”项目的“工具”菜单，每次只有一个应处于启用状态；点击启用的项目应该切换复选框的状态，并同时改变两个菜单项的状态，使得另一个项目变为启用状态。此外，点击复选框应该相应地影响每个菜单项的启用/禁用状态。\n\
  \n这是通过使用绑定来启用和禁用菜单项的一种简单方法，但我们需要指出，这种用法有些刻意，并不是处理菜单中应用程序范围布尔值的常规方式。在这种情况下，与其使用两个菜单项（其中一个始终被禁用），更常见的做法是使用一个带有复选框的菜单项来指示状态，就像我们窗口中的复选框那样。事实证明，这比我们已经完成的操作还要简单。返回\
  \ `MainMenu.xib`，在界面构建器画布中打开“工具”菜单，从对象库中将一个新的菜单项拖到“工具”菜单上。将此新菜单项命名为“Turbo”，并配置其“值”绑定，使用\
  \ `turbo` 键路径连接到应用委托。就这样！我们不需要通过 Control-拖拽来设置菜单项的动作；Cocoa 绑定会替我们处理所有事情。保存、运行并尝试一下。请注意，这种快速方法甚至不需要\
  \ `toggleTurbo:` 方法，因此如果需要，我们可以删除该方法以及“Turbo 开”和“Turbo 关”菜单项。\n\n\n\n### 通过第一响应者启用/禁用\n\
  \n接下来，我们将展示一种更常见的自动启用和禁用菜单项的方法，这种方法能提供更精细的控制，使得每个菜单项的启用状态可以根据选中的窗口、窗口中选中的文本字段或其他控件等自动更新。该方法依赖于响应者链，与本章前面描述的颜色面板寻找对象以传递选中颜色的方式有些类似。在此场景下，沿着响应者链查找的方法是\
  \ `validateUserInterfaceItem:`，其声明如下：\n\n```\n- (BOOL)validateUserInterfaceItem:(id\
  \ <NSValidatedUserInterfaceItem>)anItem;\n```\n\n如果该方法在响应者链的对象中实现了，它会在适当的时候被调用，用以判断用户界面项（此处即菜单项）是否应被启用。在实现此方法时，我们可以通过\
  \ `anItem` 获取将要被启用或禁用的对象的相关信息；我们可以询问它的 action（以便与我们自己的某个方法进行比较），也可以询问它的 tag（以便与我们设置在对象上的控件\
  \ tag 进行比较）。通常我们只需要使用 action。稍后我们将演示其工作原理，但首先需要澄清一下该方法在何时被调用。\n\n基本思路如下：每当 Cocoa\
  \ 即将绘制菜单时（通常是在用户点击菜单栏时），它会对每个菜单项进行检查，以决定是启用还是禁用。图 11-9 中的流程图大致勾勒了这一事件序列。\n\n![A978-1-4302-4543-8_11_Fig9_HTML.jpg](img/A978-1-4302-4543-8_11_Fig9_HTML.jpg)\n\
  \n图 11-9. 菜单系统如何决定菜单项是否应启用\n\n所有这些的要点是：无论是显式配置还是在响应者链中找到的菜单项目标对象，都由它来决定菜单项在当前时刻是否应被启用。这意味着我们可以对每个菜单项进行完全动态的控制。通过在包含由菜单项直接或通过响应者链调用的方法的各个类中实现\
  \ `validateUserInterfaceItem:`，我们可以定义一些逻辑，让菜单系统在适当的时候调用它，并根据我们的返回值自动启用或禁用每个菜单项。\n\
  \n让我们通过一个例子来说明这一点。我们将在 nib 文件中创建一个新窗口，并为其匹配一个新的委托类，该类将实现 `validateUserInterfaceItem:`\
  \ 来处理菜单项的状态。在实际应用中，你可能会基于模型对象的内容来进行判断，但为了简单起见，我们将根据窗口中选中的内容来启用或禁用菜单项。\n\n首先，在 Xcode\
  \ 中创建一个新类，一个普通的 `NSObject` 子类，命名为 `MLListWindowDelegate`。为此，选择 File ➤ New ➤ File，然后在左侧的\
  \ OS X 标题下选择 Cocoa。选择 Objective-C Class。将类名设置为 `MLListWindowDelegate`，并将其设为 `NSObject`\
  \ 的子类。在其头文件顶部添加一行 `#import <Cocoa/Cocoa.h>`，然后定义一个名为 `selectedTag` 的整型属性，稍后我们将把它绑定到一个\
  \ GUI 对象上（添加以粗体显示的行）：\n\n`// MLListWindowDelegate.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <Cocoa/Cocoa.h>\n\n@interface MLListWindowDelegate : NSObject\n@property\
  \ (assign) NSInteger selectedTag;\n@end\n```\n\n在对应的 `MLListWindowDelegate.m` 文件中，我们将实现\
  \ `specialAction:` 方法（菜单项将通过第一响应者代理以 target/action 方式连接到该方法），并实现 `validateUserInterfaceItem:`\
  \ 方法。Xcode 会自动为 `selectedTag` 属性合成 getter 和 setter 方法。\n\n`// MLListWindowDelegate.m`\n\
  \n```\n#import \"MLListWindowDelegate.h\"\n\n@implementation MLListWindowDelegate\n\
  \n- (BOOL)validateUserInterfaceItem:(id <NSValidatedUserInterfaceItem>)anItem\n\
  {\n    // 如果 action 不是我们关心的，则默认返回 YES\n    BOOL result = YES;\n    SEL theAction\
  \ = [anItem action];\n    if (theAction == @selector(specialAction:) ) {\n     \
  \   if (self.selectedTag != 13013) {\n            result = NO;\n        }\n    }\n\
  \    return result;\n}\n\n- (void)specialAction:(id)sender\n{\n    NSRunAlertPanel(@\"\
  哎呀呀！\",\n                    @\"你触发了相当特殊的操作！\",\n                    nil, nil, nil);\n\
  }\n\n@end\n```\n\n关于 `validateUserInterfaceItem:` 方法，有两点需要说明。首先，注意我们使用该项的 action\
  \ 来判断它被点击时会调用哪个方法。在代码中，一个 action（或任何类型的方法）可以通过 Objective-C 的 `SEL` 类型来引用。从技术上讲，`SEL`\
  \ 不是方法，而是一个“选择器”，它是对方法名称的一种哈希值（出于性能考虑稍作修改），Objective-C 运行时可以用它来查找方法的实际实现。除了查找方法，`SEL`\
  \ 还可以与另一个 `SEL` 进行比较，例如代码中由 `@selector(specialAction:)` 结构返回的那个。在我们的方法中，我们测试当前菜单项是否指向我们关心的\
  \ action 方法，如果是，则进行更深入的检查。如果 action 匹配，我们就对某个内部状态（即 `selectedTag` 属性）进行简单检查，以确定是否允许启用该菜单项。如果选择器不匹配，则默认返回\
  \ `YES`。\n\n现在，我们来创建一个 GUI 来使这段代码生效。打开 `MainMenu.xib` 文件到 Interface Builder 画布，从对象库中拖一个普通的\
  \ `NSObject` 到 nib 窗口（在对象库搜索框中搜索 `NSObject`）。它将出现在屏幕左侧的对象停靠栏中。使用身份检查器将其类改为 `MLListWindowDelegate`。然后从对象库中拖出一个新窗口，并将其\
  \ `delegate` 出口连接到我们刚设置的 `MLListWindowDelegate` 对象。接下来，在对象库中找到 Radio Group（单选按钮组），并将其拖入新窗口。将这个组件包含在窗口中，为窗口及其委托提供一种基础的选择机制。将单选按钮组的\
  \ Selected Tag 绑定到 `ListWindowDelegate` 的 `selectedTag` 属性。这样，每当有人点击某个单选按钮时，委托就会得到通知。现在，通过按住\
  \ Option 键并向下拖动按钮组的缩放控制柄，将单选按钮组展开，使其包含更多按钮，直到有七八个按钮。然后，点击中间附近的一个按钮，使用属性检查器将其标题改为“特殊选项”，并将其\
  \ tag 改为 `13013`，即我们将在代码中查找的“魔法数字”。\n\n剩下的工作就是配置一个新的菜单项，通过第一响应者来调用 `specialAction:`\
  \ 方法。首先，在 nib 窗口中选择 First Responder 项，并调出属性检查器。这里我们可以手动添加任何我们希望该代理对象知道的 action 方法。我们会看到一个用户定义\
  \ action 列表，初始为空。点击 + 按钮添加一个自定义 action，将其名称改为 `specialAction:`（别忘了冒号！）。然后是菜单项：在对象库中找到一个普通的\
  \ Menu Item（菜单项），将其拖入我们之前创建的 Tools 菜单中。将其标题设置为“特殊操作”，并通过按住 Control 键拖拽到 nib 窗口中的\
  \ First Responder 项上，然后从结果列表中选择 `specialAction:`，来配置其 target/action。\n\n\n\n现在来看看实际效果。保存工作并点击`Run`。应用现在会有一个新窗口，其中我们可以选择某个单选按钮。点击一些单选按钮，每次都点一下顶层的`Tools`菜单项，看看`Special\
  \ Action`项是否被启用。它应该仅在`Special Selection`按钮被选中时才启用。如果选中了其他单选按钮，或者应用的另一个窗口（带有`Turbo`复选框的旧窗口）被选中，则该菜单项应被禁用。\n\
  \n这个基本概念可以根据需要无限扩展。关键在于，启用和禁用菜单项实际上非常简单。你永远不需要在应用发生某些事件时手动启用或禁用单个菜单项；只需编写在菜单项即将显示时自动调用的代码，然后进行处理即可。\n\
  \n## 表单\n\n本章要介绍的最后一个主题是表单（sheet）的概念。表单就是一个临时依附于另一个窗口并以半模态方式运行的窗口，使得“另一个窗口”不会接收任何事件。其思想是，一个应用可以拥有多个窗口，而这些窗口不会因彼此需要用户关注而相互影响。例如，在\
  \ Mac OS X 自带的`TextEdit`应用中，你可以在一个文档上以表单形式显示`Save As`面板，在另一个文档上显示`Print`面板，同时在第三个文档中继续输入。\n\
  \n你可能不会在构建的每个 Cocoa 应用中都使用表单，但在应用需要某种与特定窗口相关的用户输入，而你又不希望使用会阻止应用其余部分输入的模态面板时，它们就很有用。例如，在刚刚展示的例子中，如果不使用表单，那个`Save`面板可能会以模态方式运行，在所有用户关闭它之前阻止对其他所有窗口的输入。而使用表单，用户可以在提交`Save`之前，暂时搁置正在进行的保存操作，并与应用进行其他交互。\n\
  \n在 Cocoa 中，表单并不由某个特定的类表示。相反，它们是以特殊方式使用的普通窗口。每个`NSWindow`都可以附加一个表单，通常以模态方式使用的每个窗口或面板也可以用作表单。\n\
  \n让我们通过在一个名为`SheetLab`的新应用中将`NSOpenPanel`附加到一个普通窗口，来了解一下使用表单的基本方法。在 Xcode 中创建一个新的\
  \ Cocoa 应用项目，使用`SL`作为类前缀，并将其保存为`SheetLab`。现在，编辑`SLAppDelegate.h`，添加一个`openDocument:`操作方法：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@interface SLAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n\n- (IBAction)openDocument:(id)sender;\n\
  \n@end\n```\n\n然后编辑`SLAppDelegate.m`，添加以下方法实现：\n\n```\n#import \"SLAppDelegate.h\"\
  \n\n@implementation SLAppDelegate\n\n- (IBAction)openDocument:(id)sender {\n   \
  \ NSOpenPanel *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n\
  \    [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"请选择一个要导入的文件。\"\
  ];\n\n    // 将面板附加到文档的窗口上显示。\n    [panel beginSheetModalForWindow:self.window completionHandler:^(NSInteger\
  \ result){\n        if (result == NSFileHandlingPanelOKButton) {\n            //\
  \ 将窗口标题设置为所选文件的文件名。\n            NSArray* urls = [panel URLs];\n            NSString\
  \ *selectedFile = [[urls lastObject] lastPathComponent];\n            [self.window\
  \ setTitle:selectedFile];\n        }\n    }];\n}\n\n@end\n```\n\n我们在这个类中声明了一个名为`openDocument:`的方法。`openDocument:`是`File`\
  \ ➤ `Open`菜单项使用的操作。当用户点击`File` ➤ `Open`（或`⌘-O`）时，会沿着响应者链查找，直到找到一个能响应`openDocument:`的对象。由于应用委托在响应者链中，而应用中没有其他对象响应`openDocument:`，因此我们的代码会被调用。`openDocument:`方法获取标准的打开面板，将其设置为只允许选择一个文件（不能是目录，也不能是多文件），并为面板添加一条消息。然后，它使用`beginSheetModalForWindow:completionHandler:`方法，让该面板以模态方式附加到一个窗口（使用`window`属性）上运行。该方法的第二个参数是一个\
  \ Objective-C 块，这是之前未见过的新概念。它指定了面板运行完成后应采取的操作。在本例中，如果用户选择了一个文件并点击`OK`，我们将获取所选文件的\
  \ URL，然后将窗口的`title`设置为路径的最后一部分，即文件名本身。\n\n**注意**\n\n块（block）是一段代码（除其他功能外）可以作为参数传递给方法。在其他语言中，它被称为闭包或\
  \ lambda。在 Cocoa 中，块的使用正变得越来越普遍，以取代传递指向回调函数的指针。块可以访问声明作用域内的所有变量，并且具有在使用点声明的优点。块是在\
  \ OS X 10.6 和 iOS 4 中引入的。你可以从 Xcode 中的 Apple Developer Documentation 阅读更多关于块的信息，或访问\
  \ [`https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html%23//apple_ref/doc/uid/TP40007502)。\n\
  \n保存更改，点击`Run`，应用将启动。按下`⌘-O`会弹出模态打开面板，作为表单附加在应用窗口之上。当我们选择一个文件时，窗口的名称会设置成该文件的名称！\n\
  \n## 总结\n\n本章介绍了 Cocoa GUI 体验的几个关键部分，以及响应者链如何使用的几个示例。这些特性对于制作专业质量的 Mac 应用至关重要。Mac\
  \ 用户在应用没有充分理由而使用非标准行为时往往相当苛刻，因此了解如何以用户能够识别的方式处理窗口和菜单非常重要。在下一章中，我们将基于这些知识，探索 Cocoa\
  \ 用于处理文档及其关联窗口的类。\n\n\n\n"
- "# 12. 基于文档的应用程序\n\n## 摘要\n\n到目前为止，我们在本书中构建的应用程序都有一个共同的重大缺陷：它们的行为方式都类似于\"全有或全无\"\
  。对于应用程序使用的某个特定数据（如果它确实使用了存储），要么它存在于唯一的后端存储中，要么它根本不存在于任何地方。这些应用程序都没有提供任何概念，允许我们将数据分割成我们称之为\"\
  文档\"的、离散且互不相关的存储单元。虽然将所有内容放在一个数据库中对某些目的有好处，但对其他目的而言却是一个巨大的障碍。如果我们想只与某人分享部分数据该怎么办？如果我们想能够并排地在多个窗口中查看同一种\
  \ Core Data 实体的多个详情，以便进行比较，该怎么办？大多数人都通过使用几乎任何支持同时打开多个文档、且对一个文档的操作不会影响其他文档的现代应用程序，熟悉了这些可能性。\n\
  \n事实证明，苹果公司的高管们多年前就考虑到了这一点，并将文档支持直接构建到了 Cocoa 中，其核心是 `NSDocument` 和 `NSDocumentController`\
  \ 类。Cocoa 的文档架构为我们提供了大量基础设施，否则我们不得不自行构建，例如管理窗口及其标题栏、处理打开面板和保存面板等等。如果你的应用程序使用了 Core\
  \ Data，它甚至会自行处理实际的打开和保存操作，因此你的应用程序代码甚至无需接触文档文件。\n\n本章将通过创建一个名为 `ColorMix` 的应用程序，介绍如何创建基于文档的\
  \ Cocoa 应用程序的基础知识，包括使用 Core Data。`ColorMix` 允许用户使用标准系统颜色面板选择两种颜色，然后显示一个色样网格，展示将这两种颜色混合在一起的不同方法。每组选定的两种颜色（以及其\
  \ 15 种混合颜色）都可以保存到一个文档中，该文档就像任何其他文件一样，可以保存到你喜欢的任何位置，并在以后重新打开。在学习 Cocoa 如何处理文档的同时，我们还将构建一个简单的视图类，用于绘制彩色矩形，并在代码中与\
  \ Core Data 交互。图 12-1 展示了 `ColorMix` 应用程序完成后的样子。\n\n![A978-1-4302-4543-8_12_Fig1_HTML.jpg](img/A978-1-4302-4543-8_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 完成后的 ColorMix 应用程序\n\n如果你使用过 Photoshop 或 Gimp 等图形软件，你可能已经熟悉其中一些混合模式。每种模式都使用特定的公式，取两种颜色的红、绿、蓝分量，并生成一种输出颜色。我们在此不描述混合模式，但你可以在\
  \ [`http://en.wikipedia.org/wiki/Blend_modes`](http://en.wikipedia.org/wiki/Blend_modes)\
  \ 和其他地方找到它们的详细描述和示例。我们在这里要做的是，展示如何构建一个应用程序，让用户以实践的方式探索所有这些模式，每次针对两种选定的颜色。\n\n我们将使用的混合模式都内置于\
  \ Core Graphics 中，这是 Cocoa 图形架构的重要组成部分，我们将在第 13 章中进一步讨论。使用这种内置功能让我们可以免去自行进行任何颜色计算；我们只需调用\
  \ Core Graphics 函数来设置混合模式并绘制矩形即可。\n\n## 创建 ColorMix 应用程序\n\n首先在 Xcode 中创建一个新应用程序，使用新建项目向导中\
  \ \"OS X / 应用程序\" 部分的 Cocoa 应用程序模板。点击 \"下一步\" 后，将新应用程序命名为 `ColorMix`，并将类前缀设置为 `CM`。这个新应用程序将同时使用\
  \ `NSDocument` 架构和 Core Data，因此我们需要在创建应用程序时正确配置项目。确保勾选了 **创建基于文档的应用程序** 和 **使用 Core\
  \ Data** 复选框。请注意，启用文档复选框也会激活 **文档扩展名** 文本字段。这允许我们设置应用程序在保存文件时将使用的默认文件名扩展名。在此处也输入\
  \ `ColorMix`，以便我们能够轻松识别创建的文档。\n\n`ColorMix` 应用程序将有一些我们之前未见过自动创建的内容。特别是，它将有一个名为 `CMDocument`\
  \ 的类（`NSPersistentDocument` 的子类，而 `NSPersistentDocument` 本身是 `NSDocument` 的子类，我们稍后会解释这两个类），以及一个对应的\
  \ `CMDocument.xib` 资源。这是我们扩展以定义文档行为和外观的两个关键元素。除此之外，我们还会看到一个模型文件，我们将在其中设置此应用程序的 Core\
  \ Data 实体和属性信息。\n\n### 检查默认的 Nib 文件\n\n在我们开始创建任何内容之前，请在 Interface Builder 中打开 `MainMenu.xib`\
  \ 文件。注意到这个 nib 文件与我们之前创建的所有其他 `MainMenu.xib` 文件有何不同吗？它不包含窗口！打开文件会显示各种代理对象、菜单本身，仅此而已。这是另一个提示，表明我们在创建基于文档的应用程序时面对的是不同类型的东西，因为这样的应用程序（例如\
  \ Xcode、Microsoft Office、Garage Band 等）通常没有\"主窗口\"的概念，而是将应用程序的主体放在一个或多个文档窗口中。\n\n\
  打开连接检查器，花一些时间点击一些菜单项，看看它们是如何连接的。文件菜单中的许多项都连接到第一响应者，调用名称中包含\"document\"（`newDocument:`、`openDocument:`\
  \ 等）的操作。事实证明，其中一些操作是在 `NSDocumentController` 类中实现的。这是一个特殊的类，在运行时有一个共享的实例，用于管理应用程序所有打开的文档。我们不会在这个\
  \ nib 文件或任何其他地方看到这个共享实例，甚至看不到它的代理。`NSApplication` 在应用程序启动期间创建此对象，并将其添加到响应者链中，以便它可以处理这些操作。\n\
  \n四处查看之后，我们基本上可以忘记这个应用程序的 `MainMenu.xib`，因为我们永远不需要再打开它。请记住，其中唯一的实际内容是菜单，并且大多数菜单项都连接到第一响应者上的操作，这意味着它们会在适当的时候找到通往相关窗口控制器或共享\
  \ `NSDocumentController` 的路。\n\n现在打开 `CMDocument.xib`，看看它提供了什么。一个 `NSWindow` 已准备好供我们填充一些内容，如果我们打开身份检查器，会发现文件所有者是\
  \ `CMDocument` 的一个实例。除此之外，它是一块白板，我们稍后将在其上留下我们的印记。\n\n\n\n### 定义模型\n\n在开始构建任何类型的图形界面之前，我们先创建用于表示文档的数据模型。这是一个极其简单的模型，包含一个实体和两个属性。我们将在每个文档中只创建该实体的一个实例，但你在本章学到的关于文档的所有知识，同样适用于大型复杂的数据模型。\n\
  \n打开 `CMDocument.xcdatamodeld` 文件。创建一个实体并将其命名为 `ColorSet`。保持新实体的选中状态，创建一个属性，命名为\
  \ `color1`，将其类型设置为 `Transformable`，然后点击关闭可选复选框。接着创建第二个属性，命名为 `color2`，并按第一个属性进行相同配置：类型为\
  \ `Transformable`，且可选选项应关闭。这些属性代表用户将为每个文档选择的两种颜色。它们各自包含一个 `NSColor` 实例，这不是 Core\
  \ Data 支持的标准类型之一，因此如第 8 章所述使用了 `Transformable` 类型。\n\n保存模型，我们的工作就完成了。这是一个极其简单的模型，不是吗？\n\
  \n### 设置两种颜色\n\n现在是时候开始组装图形界面了。请记住，这发生在文档窗口中，因此请切换回 Interface Builder 中的 `CMDocument.xib`\
  \ 文件。默认窗口包含一个 `NSTextField`（内容为\"Your document contents here\"），我们应在继续之前将其删除。接下来，我们将向\
  \ nib 文件添加一个 `NSObjectController`，用于将一些图形界面对象连接到底层文档。请按照以下步骤进行设置。\n\n使用库面板找到 `NSObjectController`，将其拖放到停靠栏中，它将与文件所有者、窗口以及其他顶层对象合并。保持这个新对象（现在标记为\"\
  Object Controller\"）的选中状态，打开属性检查器。检查器最顶部是模式弹出菜单。将其从类模式更改为实体名称模式，然后在下方出现的实体名称字段中输入\"\
  ColorSet\"。\n\n保持新对象控制器的选中状态，切换到绑定检查器。我们需要通过将其 `managedObjectContext` 绑定到一个合适的值来告知此控制器数据来源，因此在参数标题下找到托管对象上下文项。如果此绑定的详细信息不可见，请点击其展开三角形以显示它们。使用绑定到弹出菜单选择文件所有者，然后在模型键路径文本字段中输入\"\
  managedObjectContext\"，按回车键创建绑定。作为此对象控制器的最后优化步骤，在停靠栏中选中它并将其名称更改为\"colorset\"。这不会在应用程序运行时改变任何内容，但能为将来查看此\
  \ nib 文件的程序员（很可能就是你）增加清晰度（现在边做边记录文档，将来你会感谢自己的）。\n\n### 最简单的图形界面\n\n是时候构建一个简单的图形界面了，让我们能够查看\
  \ `ColorSet` 对象的核心细节，即它包含的两种颜色。使用库找到 `UILabel` 对象，将其拖入窗口。选中其文本，将其更改为 `混合颜色 1`。然后按\
  \ `⌘D` 复制标签，将其稍微移开，并将文本更改为 `混合颜色 2`。现在在库中找到 `NSColorWell`，将其拖到我们正在构建的文档窗口中。放置好后，按\
  \ `⌘D` 复制它，然后重新排列标签和颜色选择器，使其看起来类似于图 12-2。\n\n![A978-1-4302-4543-8_12_Fig2_HTML.jpg](img/A978-1-4302-4543-8_12_Fig2_HTML.jpg)\n\
  \n图 12-2 选择两种颜色的最简图形界面\n\n现在选中左侧的颜色选择器，打开绑定检查器，将其值绑定配置为使用 `colorset` 控制器，控制器键为 `selection`，模型键路径为\
  \ `color1`。选中右侧的颜色选择器，将其值绑定配置为使用 `colorset` 控制器，控制器键为 `selection`，这次模型键路径为 `color2`。保存工作，然后点击运行按钮。应用程序启动，出现一个新的空白\"\
  无标题\"文档窗口，但颜色选择器无法点击！由于急于在屏幕上显示内容，我们忽略了一个非常重要的步骤：创建一个模型对象！\n\n### 创建默认 ColorSet\n\
  \n我们需要编写一些代码，以便在创建新文档时向对象控制器插入一个新的 `ColorSet` 对象。我们将在 `CMDocument` 类中通过添加一些功能来实现这一点，这些功能用于访问我们在\
  \ nib 文件中添加的对象控制器，并跟踪文档是从头创建还是从文件加载的。选择将添加此新代码的 `CMDocument.m` 文件。首先，我们将添加一个属性，一个名为\
  \ `objectController` 的插座，用于指向我们刚才添加到 nib 文件中的 `NSObjectController`。与其将其添加到头文件中，我们可以使用类扩展在\
  \ `.m` 文件中声明此属性。类扩展看起来就像类别声明，但括号中没有类别名称。将以下代码添加到 `@implementation` 块之前：\n\n```\n\
  @interface CMDocument ()\n\n@property (weak) IBOutlet NSObjectController *objectController;\n\
  \n@end\n```\n\n任何我们可以在类的 `@interface` 块中声明的内容（实例变量、属性、方法等）都可以在类扩展中声明。这样做的好处是保持类接口的简洁。我们可以选择只公开其他类真正需要的那部分，而将剩余部分作为仅在类内部可用的私有\
  \ API。\n\n我们还将添加一个实例变量，一个名为 `isNew` 的 `BOOL` 类型变量，用于跟踪每个文档是刚创建的还是从文件加载的。沿着刚才使用类扩展时遵循的信息隐藏路径，我们将展示另一个巧妙技巧：实例变量可以在类的\
  \ `@implementation` 块中声明，而不是在头文件的 `@interface` 中。通过添加以下加粗代码来实现：\n\n```\n@implementation\
  \ CMDocument\n{\n    BOOL isNew;\n}\n```\n\n现在快速浏览一下此 `.m` 文件的其余部分。该文件包含一些现成的方法，并附有注释说明我们可以在何处扩展其行为。我们将在\
  \ `init` 和 `windowControllerDidLoadNib:` 方法中实现一些功能，同时实现 `initWithType:error:` 方法，稍后将对此进行说明。这里预定义的方法都来自\
  \ `NSDocument`，它为我们处理了大部分与文档相关的功能。然而，`CMDocument` 的直接父类是 `NSPersistentDocument`，它实现了将文档存储为\
  \ Core Data 存储后端所需的额外功能。首先添加以下方法：\n\n```\n- (id)initWithType:(NSString *)typeName\
  \ error:(NSError **)outError\n{\n    if (self = [super initWithType:typeName error:outError])\
  \ {\n        isNew = YES;\n    }\n    return self;\n}\n\n- (NSString *)windowNibName\n\
  {\n    return @\"CMDocument\";\n}\n```\n\n然后，将以加粗显示的行添加到 `windowControllerDidLoadNib:`\
  \ 方法中：\n\n```\n- (void)windowControllerDidLoadNib:(NSWindowController *)windowController\n\
  {\n    [super windowControllerDidLoadNib:windowController];\n    // 在此处添加需要在 windowController\
  \ 加载文档窗口后执行的任何代码。\n\n    if (isNew) {\n        id newObj = [_objectController newObject];\n\
  \        [newObj setValue:[NSColor redColor] forKey:@\"color1\"];\n        [newObj\
  \ setValue:[NSColor yellowColor] forKey:@\"color2\"];\n        [_objectController\
  \ addObject:newObj];\n    }\n}\n```\n\n\n\n## 排版后的文本\n\n加粗的代码段在创建新文档时执行。第一个方法 `initWithType:error:`\
  \ 仅在从头创建新文档时被调用。这是我们理想中初始化模型对象的地方，但对模型对象的所有访问都需通过位于 nib 文件中的 `NSObjectController`\
  \ 进行，而此时 nib 尚未加载。因此，我们仅将 `isNew` 标志设置为 `YES`，然后继续执行。稍后，在 nib 加载完成后，`CMDocument`\
  \ 会调用 `windowControllerDidLoadNib:`。在这里，我们使用 `objectController` 创建一个新的模型对象，为其两个属性设置值，并将新对象添加到控制器中。\n\
  \n完成上述设置后，剩下的工作就是将 `CMDocument` 的 `objectController` 插座连接到 `CMDocument.xib` 中。因此，切换回该文件，按住\
  \ Control 键从“文件所有者”拖拽到颜色集对象控制器，然后选择 `objectController` 插座。保存工作，然后点击运行按钮。两个颜色井中的红色和黄色应该可见，点击其中任意一个应会弹出颜色面板并允许我们更改颜色。\n\
  \n不仅如此，现在还可以通过菜单使用全套文档功能。我们可以保存文档、关闭文档、访问最近使用的文档、打开文档等。\n\n## 确定文件格式\n\n到达这一步后，您可能已经注意到，在保存文档时，一个弹出列表允许您选择将文件保存为二进制、SQLite\
  \ 或 XML 格式，并且文件扩展名会相应设置。尽管这种灵活性在开发过程中可能有用，但对于发布的产品，您最好只选择一种格式并坚持使用，以免混淆用户。通常，SQLite\
  \ 对于大多数应用来说可能是最佳选择。您还应该将文件扩展名更改为能体现应用用途的名称，而不是使用默认扩展名。所有这些选项都在 Xcode 的目标设置中配置。返回\
  \ Xcode，在导航窗格中选择最顶层的 `ColorMix` 组，点击 `ColorMix` 目标，然后点击视图顶部的“信息”标签以查看目标设置。展开“文档类型”组，会看到一个包含所有三种预配置文件格式的视图。删除二进制和\
  \ XML 选项（使用每个部分右上角的“x”按钮），仅保留 SQLite 选项。通过编辑“扩展名”列中显示的值，将此保留格式设置一个合适的文件名扩展名，将其更改为\
  \ `ColorMix`。现在保存工作，构建并运行，然后保存一个颜色集，验证我们现在已无法选择保存文件的格式类型。\n\n## 添加颜色\n\n现在文档功能已按预期工作，但我们拥有的是一个非常无聊的应用，它什么有趣的事情也做不了。让我们让应用实现本章开头承诺的功能：使用\
  \ Core Graphics 所有预定义的混合模式，显示通过混合两种选定颜色生成的一系列颜色。\n\n为此，我们将创建一个名为 `CMColorBlendView`\
  \ 的新类，它将直接成为 `NSView` 的子类。在 `NSView` 子类中，通常会做的主要事项之一是重写 `drawRect:` 方法，以精确指定应绘制的内容。我们将执行此操作，并用混合颜色填充每个视图。为了实现混合，`CMColorBlendView`\
  \ 的每个实例都需要知道要使用的混合模式以及要混合的两种颜色。我们将手动为每个 `CMColorBlendView` 设置混合模式，但两种颜色的值将通过 Cocoa\
  \ 绑定进行填充，这样一旦用户更改了其中一种选定颜色，窗口中所有的 `CMColorBlendView` 对象都会立即重绘。\n\n### CMColorBlendView\
  \ 类\n\n首先在我们的项目中创建一个新类。在“新建文件”向导中，从“OS X - Cocoa”部分选择“Objective-C 类”，然后点击“下一步”。将新类命名为\
  \ `CMColorBlendView.m`，并使其成为 `NSView` 的子类。\n\n现在编辑 `CMColorBlendView.h`，添加以下所示加粗的行：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@interface CMColorBlendView : NSView\n\n@property\
  \ (strong, nonatomic) NSColor *color1;\n@property (strong, nonatomic) NSColor *color2;\n\
  @property (assign, nonatomic) CGBlendMode blendMode;\n\n@end\n```\n\n这为我们的类提供了两个\
  \ `NSColor` 对象（将通过 Cocoa 绑定填充）和一个 `CGBlendMode`（将在 `MyController` 类加载 nib 文件时设置）。我们对所有这些属性使用了\
  \ `nonatomic` 关键字，这是一种声明方式，表示这些属性的 getter 和 setter 方法不会采取额外措施来保证线程安全。由于我们知道在这个简单应用中，所有代码都只会在主线程上使用，因此使用\
  \ `nonatomic` 足够安全，并且能带来略微更好的性能。\n\n现在切换到 `CMColorBlendView.m`，我们首先要做的是为已声明的属性定义方法。本书中之前声明的大多数属性，其方法都是通过显式的\
  \ `@synthesize` 行创建的，但这里情况有点特殊，因为我们希望视图在每次属性值更改时都重绘自身。因此，我们将为每个属性提供显式的 setter 方法。如果存在显式方法，它们总是会取代任何合成的方法。实际上，这也引出了我们在属性声明中使用\
  \ `nonatomic` 的另一个原因：如果没有它，编译器不允许我们将合成的 getter 与显式的 setter 混合使用，从而会产生警告。\n\n在我们进行所有这些新操作的同时，我们将介绍\
  \ LLVM 编译器中的一个漂亮的新功能。任何时候我们在接口中声明一个属性，实际上都可以完全省略 `@synthesize` 行！如果我们这样做，编译器仍然会为我们创建一个实例变量，其名称将是属性名前加下划线。我们可以在以下代码中看到这一点，这段代码应添加到我们类的\
  \ `@implementation` 部分：\n\n```\n// 将这些放在 @implementation 块的开始处\n\n- (void)setBlendMode:(CGBlendMode)bm\n\
  {\n    if (_blendMode != bm) {\n        _blendMode = bm;\n        [self setNeedsDisplay:YES];\n\
  \    }\n}\n\n- (void)setColor1:(NSColor *)c\n{\n    if (![c isEqual:_color1]) {\n\
  \        _color1 = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n\n- (void)setColor2:(NSColor\
  \ *)c\n{\n    if (![c isEqual:_color2]) {\n        _color2 = c;\n        [self setNeedsDisplay:YES];\n\
  \    }\n}\n```\n\n需要注意的一点是 `[self setNeedsDisplay:YES]` 调用。我们将在后面关于 Cocoa 绘图的章节中更详细地讨论这一点，但其基本思想是，当我们要在\
  \ `NSView` 中绘制一些内容时，会调用此方法，该方法会设置一个标志，而当我们的应用程序完成处理当前正在处理的任何事件后，它会遍历打开的窗口以检查是否有任何窗口被标记为需要重绘，这最终会导致调用\
  \ `drawRect:` 方法。\n\n说到这个，我们在这个类中需要实现的另一个方法就是 `drawRect:` 方法本身。\n\n```\n- (void)drawRect:(NSRect)dirtyRect\n\
  {\n    // 如果没有两个有效的颜色，则不绘制任何内容。\n    if (!self.color1 || !self.color2) return;\n\
  \n    CGColorRef cgColor1 = genericRGBWithNSColor(self.color1);\n    CGColorRef\
  \ cgColor2 = genericRGBWithNSColor(self.color2);\n\n    CGContextRef myContext =\
  \ [[NSGraphicsContext currentContext] graphicsPort];\n    CGContextSaveGState(myContext);\n\
  \n    CGContextSetFillColorWithColor(myContext, cgColor1);\n    CGContextSetBlendMode(myContext,\
  \ kCGBlendModeNormal);\n    CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
  \n    CGContextSetFillColorWithColor(myContext, cgColor2);\n    CGContextSetBlendMode(myContext,\
  \ self.blendMode);\n```\n\n\n```markdown\n\n```\nCGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
  ```\n\n```\nCGContextRestoreGState(myContext);\n```\n\n```\nCGColorRelease(cgColor1);\n\
  ```\n\n```\nCGColorRelease(cgColor2);\n```\n\n```\n}\n```\n\n请尽量别纠结于此处的细节。只要您阅读了注释并相信代码确实按照注释所述运行即可。在后续几章处理图形时，我们还会深入探讨。到那时，这些内容就会更容易理解。目前请注意，在完成下一步之前，这段代码会产生一些编译器错误。\n\
