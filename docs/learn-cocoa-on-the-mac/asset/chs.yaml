  \n## 关于撤销和重做\n\n在这一点上，我们应该提一下`NSUndoManager`，它负责处理 Cocoa 中的撤销/重做支持。请注意，我们在 ColorMix\
  \ 中执行的操作（实际上只是改变颜色）都可以通过“编辑”菜单中的项目进行撤销和重做。此外，这些撤销和重做操作是针对特定文档的；在一个文档中进行更改和撤销，与其他文档中发生的任何事情完全独立。然而，可能不太清楚的是，究竟是什么在启用这个功能；我们并没有编写任何处理撤销和重做的代码，但它确实存在。简而言之：在一个\
  \ Core Data 应用程序中，基本的撤销/重做通常由系统为我们处理，我们无需做任何事。处理模型对象的托管对象上下文能够在对象被编辑时察觉到变化，并向“撤销堆栈”添加一个逆操作。其结果是，对于大多数现代的\
  \ Cocoa 应用程序，我们可以免费获得撤销和重做功能。\n\n然而，这是一本关于编程的书，而不是罗列框架酷炫特性的书。至少，我们需要了解底层部件是如何工作的一些皮毛，这样我们在必要时才能知道在哪里进行调整。因此，这里是一个关于撤销/重做支持如何在\
  \ Cocoa 中工作，以及 Core Data 和`NSDocument`如何协同使其自动运行的速成课程。\n\n\n\n### 撤销栈\n\n许多程序员可能从未深入思考过应用程序中撤销和重做功能的典型实现方式。这已成为一种被普遍接受和期待的机制，以至于人们觉得它就像是自然秩序的一部分。基本前提如下：每次在应用中编辑内容时，都需要创建一个代表该编辑操作反向操作的条目。因此，如果用户在文本末尾添加了字母\"\
  X\"，就需要有一段代码来创建相反的操作，即一个能够删除这个\"X\"的操作。这个表示被放置在某处的同类条目栈中（即\"撤销栈\"）。执行\"撤销\"命令时，会从撤销栈顶部弹出最近的条目，并执行其所描述的操作。同时，执行撤销命令还会创建另一个条目，即撤销栈中反向操作的反向操作（实际上就是原始编辑操作），并将其放置在\"\
  重做栈\"上，以备用户之后想要撤销这次的撤销操作。\n\n这种架构存在多种变体，例如限制栈的大小，或根本不使用栈而只保留单个撤销条目，但在大多数平台上基本架构都非常相似。Cocoa\
  \ 实现这一功能的一个特别之处在于，它并非以某种特殊形式表示每个撤销条目（这种形式后续需要用特定方式解码），而是通过目标对象、要调用的方法选择器以及所需的任何参数来隐式构建每个撤销条目。当撤销命令被触发时，无需任何解码或查找操作，该方法就像其他\
  \ Objective-C 方法一样被直接调用。\n\n让我们看一个例子。假设以下方法位于一个包含可设置名称的类中：\n\n```\n- (void)setName:(NSString\
  \ *)newName {\n    if (![newName isEqual:name]) {\n        name = newName;\n   \
  \ }\n}\n```\n\n现在设想我们希望使设置名称这一操作变得可撤销。这可以通过添加以下加粗显示的行轻松实现：\n\n```\n- (void)setName:(NSString\
  \ *)newName {\n    if (![newName isEqual:name]) {\n        NSUndoManager *undoManager\
  \ = ...\n        [undoManager registerUndoWithTarget:self\n                selector:@selector(setName:)\n\
  \                object:name];\n        [undoManager setActionName:@\"Name Change\"\
  ];\n        name = newName;\n    }\n}\n```\n\n请注意，我们省略了实际获取撤销管理器的代码部分。在实际应用中，撤销管理器可能来自多个位置，具体取决于应用是否支持\
  \ Core Data 和 `NSDocument`。在 Core Data 应用中，我们可以随时向共享的 `NSManagedObjectContext` 对象请求一个撤销管理器；在同时支持\
  \ Core Data 和文档的应用中，每个文档都有自己的撤销管理器。\n\n这种模式的最终体现出现在 Core Data 应用中，它实际上替我们实现了类似上述的功能。注意上面的\
  \ `setName:` 方法相当公式化。Core Data 在幕后实现了一些魔法，使得我们不必实现那个 `setName:` 方法。一旦模型对象发生任何编辑，Core\
  \ Data 就会察觉并为我们设置好撤销操作。\n\n## 总结\n\n我们刚刚从头创建了第一个基于 `NSDocument` 的应用程序。我们还学习了一些关于向\
  \ `NSView` 绘图以及处理颜色的知识，这些对于各种应用领域都是有用的技能。在后续章节中，我们将进一步深化这些技能，尤其是那些 Cocoa 真正大放异彩的有趣图形编程。然而，在下一章中，我们得暂别这些乐趣，学习当应用中出现问题时会发生什么——以及如何使用\
  \ `NSError` 和 `NSException` 来处理它们。\n\n"
- "# 13. 异常、信号、错误与调试\n\n**摘要**\n\n任何做过编程的人都知道，事情有时并不会按计划进行。你忘记处理某个特定的边界情况，或者系统调用以一种你从未想到的方式失败，突然之间你的程序就在你面前崩溃了。每种编程语言和开发环境都有处理这些问题的方法，Cocoa\
  \ 也不例外。\n\n本章将涵盖 Cocoa 用于创建和处理异常与错误的机制——这两个系统听起来相似，但在概念上却截然不同。我们将了解它们各自不同的使用方式、如何处理它们，以及如何自行触发它们。我们还将学习某些内存滥用如何导致信号发生，通常会导致崩溃。最后，我们会简要了解一下\
  \ Xcode 内置的调试器，它可以帮助我们应对这些问题。\n\n## 异常处理\n\n让我们从异常处理开始。异常是一种特殊对象，可以在程序的一个部分创建，以告知另一部分发生了问题；这被称为\"\
  抛出\"异常，在代码中可能看起来像这样：\n\n```\n// 假设我们正在一个方法中，该方法有一个参数 \"index\"，\n// 其值不能为负数。\nif\
  \ (index < 0) {\n  [NSException raise:NSRangeException format:\n    @\"我无法承受这种负能量！（索引\
  \ == %d）\", index];\n}\n```\n\n在这个例子中，我们使用 `NSException` 类的类方法，在一步之内创建并抛出了一个异常。该方法的第一个参数是异常名称的字符串（这里使用的是\
  \ `NSRangeException`，它是 Cocoa 中预定义的异常名称），用于对异常进行通用分类。与许多其他异常处理环境不同，`NSException`\
  \ 很少被继承，因此其名称用于区分不同类型的异常。我们传入的第二个参数是异常\"原因\"的格式字符串，这是一个人类可读的描述性字符串。此格式与我们可以传递给 `NSLog`\
  \ 的参数列表类型相同，其中第一个是 `NSString`，其余参数根据字符串中的指定进行插值。\n\n\n\n### 捕获异常\n\n当上述代码执行时，如果\
  \ `index < 0`，程序的正常流程将被中断。程序不会继续执行该方法剩余部分，而是会沿着调用栈向下寻找一种被称为异常处理器的特殊代码结构。异常处理器会执行\
  \ `@try` 关键字后花括号内的所有代码，如果在执行过程中抛出了异常，执行流程将跳转到相邻的、以 `@catch` 关键字标记的代码块，并执行其中的代码。这被称为处理异常。最后，我们还可以选择性地包含一个以\
  \ `@finally` 关键字标记的第三个代码块，无论 `@try` 和 `@catch` 部分发生什么，它都会被执行，以执行任何必要的清理工作。\n\n以下示例抛出了与之前相同的异常，但这次是在\
  \ `@try` 代码块中。我们在 `@catch` 代码块中捕获它并输出一条错误信息，然后继续执行 `@finally` 部分，该部分无论发生什么都会执行。在这个简单的例子中，我们并不需要\
  \ `@finally` 部分，完全可以省略它，但在某些资源在 `@try` 块中初始化并需要被释放的情况下，它会非常有用。\n\n```\n@try {\n\
  \  if (index < 0) {\n    [NSException raise:NSRangeException format:\n      @\"\
  我无法承受这么多消极情绪！（索引 == %d）\", index];\n  }\n}\n@catch (NSException *e) {\n  NSLog(@\"\
  遇到了异常 %@，原因为 %@\",\n    [e name],\n    [e reason]);\n}\n@finally {\n  // 我们这里实际上无事可做。\n\
  }\n```\n\n这个例子在抛出异常的同一个方法内处理了异常，但实际上这种情况相当少见。更常见的是，本地找不到异常处理器，系统便会遍历调用栈来寻找异常处理器，首先在当前方法的调用者中查找，然后是该方法的调用者，以此类推。这种搜索会沿着调用栈一直向下进行，直到找到异常处理器为止。如果找不到，则可以配置一个特殊场景来处理未捕获的异常。默认情况下，遇到未捕获异常的\
  \ Cocoa 应用会向控制台日志打印一些关于该异常的信息，然后尝试继续照常运行。\n\n### 异常在 Cocoa 中的有限作用\n\n在 Cocoa 中，异常用于在程序运行时不应发生的严重问题出现时，使方法脱离其正常的操作流程。一般来说，如果你的代码导致了异常被抛出，那就说明存在一个\
  \ Bug。除极少数例外情况，一个正确编写的 Cocoa 程序应该能够永远运行下去，而不会抛出任何异常。\n\n如果你有 Java、Ruby、Python 或\
  \ C++ 的背景，这可能会显得有些限制性。在许多其他环境中，异常的使用更加自由，例如文件读取方法抛出异常来告诉调用者它已经读到了文件末尾（仔细想想，这根本就不是什么异常状态，因为每个文件都有结尾）。在\
  \ Python 中，一种遍历数组的常见写法是递增索引，尝试从数组中读取索引对应的值，并在读取越界时捕获由此产生的异常。然而，在 Cocoa 中，这种做法是不被提倡的，异常通常仅用于报告可能由程序\
  \ Bug 引起的意外结果。\n\n由于异常在 Cocoa 中的作用相当有限，你很少会在 Cocoa 应用中看到大量的异常处理代码。与 Java 不同，Objective-C\
  \ 不要求（甚至不允许）其方法指定它们可能抛出何种异常，并且理论上你根本不需要处理它们。默认情况下，你创建的每个 Cocoa 应用都会有一个顶层的异常处理器，它只是将有关异常的一些信息输出到系统日志，然后尽力让应用继续运行。不幸的是，这算不上什么好策略，因为应用在异常发生时正在做的事情，很可能是对上一次用户操作（点击按钮、按键等）的响应，而该操作之后应该做的其他事情就被直接跳过了，这可能会使应用处于未定义或不一致的状态！\n\
  \n某些应用会安装自己特殊的顶层异常处理器来处理这些情况。例如，Xcode 偶尔会遇到异常（是的，就连 Xcode 也有 Bug！），此时它通常会为用户提供退出应用的机会，因为它认识到某些东西可能已经乱套了。\n\
  \n\n\n### 创建测试平台\n\n让我们构建一个小型应用程序，演示 Cocoa 程序员可能遇到的几种异常。在 Xcode 中，创建一个新的 Cocoa 应用程序（这次不涉及\
  \ Core Data 或文档），命名为“ExceptionCity”，并将类前缀设为“EC”。我们创建的应用程序将自动包含一个名为 `ECAppDelegate`\
  \ 的类。\n\n我们的应用程序委托将是一个非常简单的类，包含 `applicationDidFinishLaunching:` 委托方法，该方法会调用三个不同的“工具”方法，每个方法都演示了一个常见的\
  \ Cocoa 陷阱，这些陷阱可能导致运行时引发异常。如果这三个方法都能成功执行并返回，我们将看到一个祝贺性的警告面板（这正是我们一直想要的）。然而，每个工具方法都存在一个会引发异常的问题。我们的目标是找到并修复每个问题。以下是\
  \ `ECAppDelegate.m` 文件的完整内容：\n\n```\n#import \"ECAppDelegate.h\"\n\n@implementation\
  \ ECAppDelegate\n\n- (void)invalidArgumentException_unrecognizedSelector {\n   \
  \ // 动态性的缺点在于偶尔会出现类型不匹配。\n    // 例如，有时很难确定从数组中取出的到底是什么。\n    // 想象这个数组是在某处创建的...\n\
  \    NSArray *nameComponents = @[@\"Thurston\",\n                              \
  \  @\"Howell\",\n                                [NSNumber numberWithInt:3]];\n\
  \    // ... 并在稍后被访问，而代码只是假设数组中的所有项都是字符串：\n    NSInteger nameComponentLength = 0;\n\
  \    for (NSString *component in nameComponents) {\n        nameComponentLength\
  \ += [component length];\n    }\n    NSLog(@\"所有名称组件的总长度：%ld\",\n          (long)nameComponentLength);\n\
  }\n\n- (void)invalidArgumentException_insertNil {\n    // 假设我们有一个用于存放内容的数组...\n\
  \    NSMutableArray *array = [NSMutableArray array];\n    // ... 我们可以向其中添加一个对象。\n\
  \    id object1 = @\"hello\";\n    [array addObject:object1];\n    // 但假设我们有一个方法参数或实例变量，\n\
  \    // 其值我们未检查以确保它不是 nil...\n    id object2 = nil;\n    // ... 然后尝试将其添加到数组中？\n\
  \    [array addObject:object2];\n    NSLog(@\"已插入我能插入的所有对象！\");\n}\n\n- (void)rangeException\
  \ {\n    // 假设我们有一个包含内容的数组...\n    NSArray *array = @[@\"one\", @\"two\", @\"three\"\
  ];\n    // ... 我们可以查询某个项的索引...\n    NSUInteger indexOfTwo = [array indexOfObject:@\"\
  two\"];\n    // ... 稍后我们可以使用相同的索引来检索该值。\n    NSLog(@\"找到了索引项 %@\", array[indexOfTwo]);\n\
  \    // 但是，如果我们尝试查找某个不存在的项的索引呢？\n    NSUInteger indexOfFive = [array indexOfObject:@\"\
  five\"];\n    // 并且我们忘记检查返回值以确保它不是 NSNotFound？\n    NSLog(@\"找到了索引项 %@\", array[indexOfFive]);\n\
  }\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n\
  \    [self invalidArgumentException_unrecognizedSelector];\n    [self invalidArgumentException_insertNil];\n\
  \    [self rangeException];\n    NSRunAlertPanel(@\"成功\", @\"太棒了，你修复了所有问题！\",\n\
  \                    nil, nil, nil);\n}\n\n@end\n```\n\n运行这段代码。之前承诺的警告面板不会出现（但默认\
  \ nib 文件中包含的空窗口会出现）。不过，Xcode 的调试输出中会出现类似以下的内容：\n\n`2013-02-07 00:25:12.756 ExceptionCity[43532:303]\
  \ -[__NSCFNumber length]: 向实例 0x387 发送了无法识别的选择器`\n\n如果你回头看 `invalidArgumentException_unrecognizedSelector`\
  \ 方法及其注释，你大概能看出问题出在哪里：我们的数组中包含一个 `NSNumber`，它没有 `length` 方法，因此引发了异常。我们没有做任何明确处理异常的操作，结果这个异常一直沿着调用栈向下传递，最终未被处理，导致了前面提到的默认行为：记录异常的一些信息（具体来说是它的\
  \ `reason`），并且应用程序跳过当前事件的剩余部分。在这种情况下，正在处理的事件是应用程序启动，而此时启动已经完成。\n\n如果我们没有特意向你指出那个方法，情况就不会这么清晰了。记录的异常信息没有告诉我们异常来自何处、异常的名称，或者任何有助于我们找到触发异常的代码部分的线索。这时，我们的新朋友——Xcode\
  \ 调试器——就派上用场了。调试器允许我们为所有异常设置断点，这样我们就可以在异常引发的那一刻暂停程序，并尝试定位问题。\n\n### 调试器\n\n大多数开发者可能都熟悉调试器的概念，它允许你在应用程序运行时检查其状态，以便诊断问题。如果你之前没有接触过调试器，下面是对一些关键概念的快速介绍：\n\
  \n*   断点允许你指定程序应暂停的位置，可以是源代码中的行号，也可以是方法或函数的名称。你当前设置的所有断点都会显示在项目窗口左侧的断点导航器中。当程序在断点处停止时，你可以检查程序执行到该点时所有\
  \ CPU 寄存器的状态。如果你有程序的源代码，你还可以访问在该点相关的所有变量（局部变量、实例变量或其他变量）。所有 CPU 寄存器和可用的变量都会显示在项目窗口底部\
  \ Xcode 调试区域的表格视图中。\n*   调用栈是某个时间点上所有正在运行的嵌套方法或函数的列表。这显示在项目窗口左侧 Xcode 调试导航器的表格视图中。当程序暂停时，当前的方法或函数显示在调用栈的顶部，调用它的方法或函数显示在其下方，以此类推。你可以选择调用栈中的特定项或“帧”来切换焦点，此时调试区域将显示当该方法或函数调用调用栈中上一级方法或函数时的\
  \ CPU 寄存器和变量状态。\n*   调试器包含一些按钮，允许你对当前高亮显示的代码行执行某些操作。你可以“单步跳过”当前行（执行当前行的剩余部分，然后在下一行暂停），“单步进入”下一个方法或函数（在调用的下一个方法或函数的开头暂停），“单步跳出”当前方法或函数（在刚返回的调用者处暂停），或者“继续”或“停止”程序。\n\
  *   调试器包含一个名为 `lldb` 的命令行界面（它是历史上大多数基于 UNIX 的操作系统上标准的 `gdb` 命令的一个现代分支/重写），它允许你使用前面提到的所有功能，还可以执行任意代码并检查结果。你可以像在源代码中一样输入\
  \ C 函数和 Objective-C 方法的名称来调用它们，并使用正在运行的程序的变量值作为消息接收者和参数。\n\n有关使用 Xcode 调试器的更多详细信息，请参阅\
  \ Xcode 文档中包含的《调试和优化你的应用》文档。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，为您翻译如下内容。\n\
  \n\n在 Xcode 中，通过选择 `View ➤ Navigators ➤ Show Breakpoint Navigator` 或按 `⌘6` 打开断点导航器。这会使导航面板显示所有当前断点（见图\
  \ 13-1）。\n\n![A978-1-4302-4543-8_13_Fig1_HTML.jpg](img/A978-1-4302-4543-8_13_Fig1_HTML.jpg)\n\
  \n图 13-1. Xcode 的断点导航器，显示了一些断点。第一次使用时，左侧列表为空。\n\n断点导航器显示了 Xcode 为项目配置的所有断点。因为我们刚创建了一个新项目，列表应该是空的！我们将通过添加异常断点来改变这一点，以捕获应用中抛出的任何异常。记住，每个抛出的异常都是\
  \ bug 的结果，很可能是我们的 bug，我们应该抓住每一个机会停下来查看异常来源。\n\n点击断点导航器左下角的 `+` 符号来创建新断点。会出现一个小弹出菜单，询问要创建哪种类型的断点。选择\
  \ `\"Add Exception Breakpoint\"`，然后会有一个更大的弹出视图显示新断点的选项。将 `Exception` 弹出菜单设置为 `Objective-C`，确保\
  \ `Break` 弹出菜单设置为 `On Throw`，然后点击 `Done`。\n\n现在我们有了一个断点，它会在任何 Objective-C 异常抛出时停止\
  \ Xcode。完美！通过从菜单中选择 `Product ➤ Run` 重新启动 `ExceptionCity` 应用，如果它仍在运行则先退出。这次，当应用遇到问题代码时，它会在异常抛出处停止执行。图\
  \ 13-2 大致展示了此时 Xcode 的样子。\n\n![A978-1-4302-4543-8_13_Fig2_HTML.jpg](img/A978-1-4302-4543-8_13_Fig2_HTML.jpg)\n\
  \n图 13-2. Xcode 在断点处停止\n\n左侧导航面板更改为调试导航器，并显示调用栈，顶部是我们断点位置（一个名为`objc_exception_throw`的函数，这是\
  \ Xcode 实际放置异常断点的地方），下方是所有调用者。注意，我们有源代码的帧以黑色文本显示，而封闭源代码库中的帧以灰色文本显示。灰色帧仍然可访问，但只能以汇编语言形式。通过查看左侧的帧编号序列，我们还可以看到并非所有帧都显示。默认情况下，Xcode\
  \ 显示我们有源代码的帧，其他帧则压缩成水平虚线。我们可以使用调试导航器底部的水平滑块来更改此设置，根据需要显示更多或更少的帧。\n\n项目窗口底部是调试区域，分为两部分。左侧显示所有可用变量和寄存器值，我们可以立即看到一些简单值。右侧显示\
  \ `lldb` 控制台界面，我们可以在其中查看程序输出（由 `NSLog` 等生成）并在 `lldb` 提示符下输入命令。如果您看不到底部视图，可以通过选择\
  \ `View ➤ Debug Area ➤ Activate Console` 使其显示。\n\n主编辑器视图显示所选栈帧的源代码或编译后的汇编代码，并用箭头和高亮标记停止的行。\n\
  \n此时，在异常被抛出的那一刻停止，看看异常是什么将会很有趣。但怎么做呢？当 Xcode 暂停时，它指向包含我们源代码的最上层栈帧。那是我们程序中问题所在的位置，但我们无法在那“看到”异常。也就是说，那里没有局部变量或任何可访问的全局结构来显示异常本身。\n\
  \n相反，我们需要关注程序真正停止的最上层栈帧，即 `objc_exception_throw` 函数。点击它以查看详情。它看起来应该像图 13-3。\n\n\
  ![A978-1-4302-4543-8_13_Fig3_HTML.jpg](img/A978-1-4302-4543-8_13_Fig3_HTML.jpg)\n\
  \n图 13-3. 源代码？谁需要它！\n\n我们只看到一堆汇编代码，没有变量名或其他任何东西来指导我们。幸运的是，有一个我们可以利用的调用约定。在为 Mac\
  \ OS X（64 位 Intel 硬件）编译的代码中，任何函数的返回值都临时存储在名为`rax`的 CPU 寄存器中，在 `lldb` 中可以通过名为`$rax`的特殊变量访问。当我们的程序在\
  \ `objc_exception_throw` 函数中停止时，`$rax` 寄存器恰好包含新的异常，所以我们准备好了！`lldb` 调试器包含 `po` 命令，用于以可读格式打印对象的值（它实际上调用对象的\
  \ `description` 方法，该方法返回一个 `NSString`，并打印该字符串值）。在 `lldb` 提示符下尝试以下操作：\n\n```\n(lldb)\
  \ po $rax\n$1 = 4296302928 -[__NSCFNumber length]: unrecognized selector sent to\
  \ instance 0x387\n```\n\n看起来熟悉吗？这基本上和我们之前在输出中看到的文本相同。知道我们可以在这里访问 `NSException`，我们可以利用\
  \ `lldb` 的实时 Objective-C 方法执行来询问更多信息：\n\n```\n(lldb) po [$rax name]\n$2 = 0x00007fff783e0a30\
  \ NSInvalidArgumentException\n(lldb) po [$rax reason]\n$3 = 0x0000000100136650 -[__NSCFNumber\
  \ length]: unrecognized selector sent to instance 0x387\n```\n\n这里我们看到 `reason`\
  \ 方法的返回值与 `description` 的返回值相同，但 `name` 方法返回的名称，你可能记得通常用作异常的类型或类别。在这种情况下，我们看到了 Cocoa\
  \ 中最常见的异常类型之一：`NSInvalidArgumentException`。\n\n\n\n### `NSInvalidArgumentException`\n\
  \n理论上，任何检测到参数无效的方法都可能抛出此异常。实际上，大多数 Cocoa 开发者迟早都会遇到两种典型情况，而我们现在就遇到了第一种。回顾一下，我们的代码遍历数组中的所有元素，并尝试对每个元素调用\
  \ `length` 方法，如下所示：\n\n```\nfor (NSString *component in nameComponents) {\n\nnameComponentLength\
  \ += [component length];\n\n}\n```\n\n在这种情况下，问题出现在尝试对一个没有 `length` 方法的对象调用该方法时。我们的代码尝试对\
  \ `NSCFNumber`（`NSNumber` 的具体子类，当我们以常规方式创建 `NSNumber` 时会用到它）调用 `length` 方法，而该类并未实现该方法，所有这些我们都可以从异常的\
  \ `reason` 中合理推断出来。我们当然可以吹毛求疵，抱怨 Apple 应该在这里使用不同的异常名称，明确告诉我们异常与方法名有关，但看样子我们只能接受现状了。\n\
  \n无论如何，我们可以使用 Xcode 的图形化调试器进一步探究。在显示调用堆栈的表中，点击标记为 “`-[ECAppDelegate invalidArgumentException_unrecognizedSelector]`”\
  \ 的行，切换回异常抛出前最后执行的代码。编辑器窗格会切换回相关的源代码文件，变量视图现在会显示该程序点可用的变量（参见图 13-4）。\n\n![A978-1-4302-4543-8_13_Fig4_HTML.jpg](img/A978-1-4302-4543-8_13_Fig4_HTML.jpg)\n\
  \n图 13-4.\n\n选择调用堆栈中的不同条目，可以访问正在运行程序的不同部分。请注意，底部的命令行界面显示了在调用堆栈顶层、`objc_exception_throw`\
  \ 内部执行的命令。如果我们聚焦当前堆栈帧并输入相同的命令，`$rax` 的值将会不同。\n\n根据我们对异常及其触发代码位置所获取的信息，我们应该能够找出问题所在。我们甚至还可以采取额外步骤来检查程序的当前状态，例如通过输入\
  \ `po component` 来打印 `for` 循环当前正查看的对象的摘要信息。我们也可以使用左下角的变量视图来检查可用的变量。例如，点击 `nameComponents`\
  \ 变量旁边的披露三角形查看其内容。本例中非常简单：我们的数组包含一个 `NSNumber`，而它没有 `length` 方法。\n\n此时，我们必须决定如何修复这个问题。我们仍然想实现相同的基本算法，即累加每个组件的字符串长度；我们只需要让\
  \ `NSNumber` 的值（本例中为 `3`）被转换为字符串（`@“3\"`）。这里我们可以利用 `description` 方法，该方法在 `NSObject`\
  \ 上定义，因此所有 Cocoa 对象都可使用。顺便提一句，当你发出 `po` 命令查看对象值时，lldb 使用的正是 `description` 方法。对于大多数类，调用\
  \ `description` 会得到 `NSObject` 实现所定义的结果（通常是类似 `<NameOfObjectClass: 0x10cdb0>` 这样的内容），但某些类（如\
  \ `NSString` 和 `NSNumber`）会重写此方法以返回其他内容。`NSString` 的实现仅返回 `NSString` 本身，而 `NSNumber`\
  \ 的实现则将数值转换为 `NSString` 并返回。\n\n因此，要使其正常工作，请编辑 `invalidArgumentException_unrecognizedSelector`\
  \ 方法，将 `for` 循环内的行修改为以下内容：\n\n```\nnameComponentLength += [[component description]\
  \ length];\n```\n\n因为我们知道 `NSObject`（因此每个对象）都实现了 `description` 方法并返回一个字符串，所以我们知道这个调用现在总能成功。即使有人混入了另一种对象，无法像\
  \ `NSString` 和 `NSNumber` 那样返回简洁紧凑的结果，至少我们知道这个方法存在且会被调用！\n\n因此，进行修复，重新运行应用，看看 Xcode\
  \ 输出控制台中显示的内容。\n\n```\n2013-02-10 23:51:08.291 ExceptionCity[71675:303] Total length\
  \ of all name components: 15\n\n(lldb)\n```\n\n糟了，又来了一个！我们的应用执行了一些代码，引发了另一个异常。由于我们已经设置了异常断点，程序会暂停并将我们带回\
  \ lldb 提示符。像之前一样，在调试导航器中选择顶部堆栈帧（`objc_exception_throw`），然后我们可以在 lldb 提示符处再次输入一些命令来获取异常信息：\n\
  \n```\n(lldb) po $rax\n$0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]:\
  \ object cannot be nil\n\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a30 NSInvalidArgumentException\n\
  ```\n\n如果我们往下扫视调用堆栈，寻找第一个显示为黑色而不是灰色的位置，我们会发现 `-[ECAppDelegate invalidArgumentException_insertNil]`，即触发异常的代码所在位置。点击该行，会看到代码编辑器窗口高亮显示了\
  \ `invalidArgumentException_insertNil` 中的这一行：\n\n```\n[array addObject:object2];\n\
  ```\n\n查看紧接其上的代码，问题就在那里：`object2` 是一个指向 `nil` 的指针，而 `NSMutableArray` 不允许我们向其中插入\
  \ `nil`。在复杂的应用中，你可能需要追根溯源（`nil` 指针从何而来，`nil` 对于该变量是否是有效值？），但在这个例子中，我们通过在添加对象之前添加安全检查来解决这个问题，如下所示：\n\
  \n```\nif (object2 != nil) {\n    [array addObject:object2];\n}\n```\n\n这样就解决了问题。`NSInvalidArgumentException`\
  \ 是 Cocoa 中最常遇到的异常之一，我们刚刚看到了触发它的两种最常见情况：在未实现该方法的类上调用方法，以及尝试向数组中插入 `nil`。\n\n再次运行应用，为下一个问题做好准备。\n\
  \n\n\n### NSRangeException\n\n之前的异常已经处理完毕，但看看现在发生了什么：\n\n```\n2009-09-16 23:44:33.038\
  \ ExceptionCity[8881:10b] Total length of all name components: 15\n2009-09-16 23:44:33.065\
  \ ExceptionCity[8881:10b] inserted all the objects I could!\n2009-09-16 23:44:33.066\
  \ ExceptionCity[8881:10b] found indexed item two\n2009-09-16 23:44:33.066 ExceptionCity[8881:10b]\
  \ *** -[NSCFArray objectAtIndex:]: index\n(2137483647( or possibly larger)) beyond\
  \ bounds (3)\n2013-02-10 23:57:55.575 ExceptionCity[71731:303] Total length of all\
  \ name components: 15\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] inserted\
  \ all the objects I could!\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] found\
  \ indexed item two\n(lldb)\n```\n\n由于另一个异常，我们再次中断了。和之前一样，在调试导航器中点击 `objc_exception_throw`\
  \ 这一行，检查异常以找出问题所在。\n\n```\n(lldb) po $rax\n$0 = 4300330528 *** -[__NSArrayI objectAtIndex:]:\
  \ index 9223372036854775807 beyond bounds [0 .. 2]\n(lldb) po [$rax name]\n$1 =\
  \ 0x00007fff783e0a10 NSRangeException\n```\n\n天哪！这个索引值也太大了。现在再看一下调用栈，点击我们代码中最顶层的条目：`-[ECAppDelegate\
  \ rangeException]`。这将在文本编辑器中高亮显示下面这一行：\n\n```\nNSLog(@\"found indexed item %@\"\
  , array[indexOfFive]);\n```\n\n这一行实际上进行了两次调用：首先调用 `objectAtIndex:` 方法（隐含在 Apple\
  \ 从 Xcode 4.5 开始引入的新的 Objective-C 数组访问器语法中），然后调用 `NSLog` 函数。快速查看调用栈会发现，`objectAtIndex:`\
  \ 方法正是报错的那个。显然它不喜欢 `indexOfFive` 中包含的值。如果我们查看变量视图，或者输入 `p indexOfFive`（注意对标准 C 类型使用\
  \ `p`，而对 Objective-C 对象则使用 `po`），我们将看到 `9223372036854775807`。这确实看起来有点高！如果我们查看设置该值的代码，就在上面两行处，会看到这行代码：\n\
  \n```\nNSUInteger indexOfFive = [array indexOfObject:@\"five\"];\n```\n\n这行代码正在向\
  \ `array` 请求一个它实际上并不包含的对象的索引。在这种情况下，`NSArray` 会返回一个名为 `NSNotFound` 的特殊整型值，该值被定义为可能的最大整数值。在运行于\
  \ 64 位模式的 Mac OS X 上，这个值就是 `9223372036854775807`。这个值用来告诉调用者：“嘿，你想要索引的那个对象？我这儿没有。”知道这一点非常有用！这样做的后果是，每当我们从\
  \ `indexOfObject:` 获取到一个值时，我们实际上都必须检查以确保它不是 `NSNotFound`。在我们的例子中，我们确切地知道问题出在哪里，所以可以只检查第二次调用，但养成总是检查该返回值的习惯是很好的，因此我们像这样更新整个方法：\n\
  \n```\n- (void)rangeException {\n    // 假设我们有一个对象数组...\n    NSArray *array = @[@\"\
  one\", @\"two\", @\"three\"];\n\n    // ... 我们可以请求某个条目的索引...\n    NSUInteger indexOfTwo\
  \ = [array indexOfObject:@\"two\"];\n    if (indexOfTwo != NSNotFound) {\n     \
  \   // ... 之后我们可以使用同一个索引来检索该值。\n        NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
  \    }\n\n    // 但是，如果我们试图查找一个不存在的对象的索引呢？\n    NSUInteger indexOfFive = [array indexOfObject:@\"\
  five\"];\n    if (indexOfFive != NSNotFound) {\n        // 并且我们忘记检查返回值以确保它不是 NSNotFound？\n\
  \        NSLog(@\"found indexed item %@\", array[indexOfFive]);\n    }\n}\n```\n\
  \n做出这些更改，运行应用程序，并注意观察祝贺性的提示面板作为奖励。哦，甜蜜的成功！\n\n解决了这些问题后，我们现在已经经历并修复了每个 Cocoa 程序员在某个时候都会遇到的主要运行时异常类型。就是这样！对于来自其他异常较多环境的开发者来说，这可能会令人惊讶，但正如我们所说，在\
  \ Cocoa 中，异常被很少使用，而且几乎总是用来指示程序员犯了错误。`NSRangeException` 和 `NSInvalidArgumentException`（针对上面显示的两种情况）实际上构成了你可能要处理的大部分异常。\n\
  \n### 其余异常\n\n好吧，在 Cocoa 应用程序中还可以引发更多异常。例如，`NSException.h` 中定义了更多的预定义异常名称，但你很可能不会遇到它们。`NSGenericException`\
  \ 有时会在使用 SQLite 或 Apple Events 时出现，而 `NSInternalInconsistencyException` 很少会在你覆盖了不该覆盖的方法时露出其丑陋的头部（例如文档警告你不要这样做的情况），但在实际开发中，这些情况的例子相当少见。\n\
  \n你最有可能看到异常发生的一种情况是，当你使用 Apple 的 Distributed Objects（DO）技术时，该技术使用异常的方式比 Cocoa 的其他部分要自由得多。例如，如果\
  \ DO 与连接到的进程失去连接，它会引发异常来警告你。实际上，Cocoa 定义的大多数预定义异常名称都是专门供 DO 使用的。本书不描述 DO 的使用，因此我们不再对这些异常多说什么，但如果你将来走上这条路，了解这一点是好的。\n\
  \n\n\n"
- "# 比异常更糟：信号致死\n\n既然我们已经了解了某些 bug 可以通过代码级操作（如捕获异常）来处理，那么是时候看看另一种因错误使用对象指针而引发的问题了。在\
  \ Cocoa 中，每个 Objective-C 对象都通过指向一种特定 C 结构体的指针来引用，该结构体定义了 Objective-C 对象的基本结构。如果指针没有指向包含有效对象的内存块，或者不是指向\
  \ `nil`，那么几乎必然会发生某种形式的内存访问错误，从而产生一个信号，最终导致应用崩溃。\n\nCocoa 程序员会无意中导致信号杀死应用的情况有两种。第一种是试图向未初始化的对象指针发送消息。默认情况下，当我们在\
  \ Objective-C 方法中将新指针声明为局部变量时，不能指望它会自动指向 `nil` 或其他无害的东西。事实上，我们常常会遇到它指向完全不恰当内容的情况，比如一个甚至未被映射到系统中的内存地址（但对于实例变量、静态局部变量和全局变量来说情况则不同，它们实际上会被初始化为\
  \ `nil` 值）。\n\n刻意用未初始化的指针触发此行为很困难，因为这类指针有可能恰好包含零值，而零值会被视为 `nil`，这当然是有效的消息接收者。不过，我们可以通过向应用委托添加以下方法来人为构造这种场景：\n\
  \n```\n- (void)uninitializedObject {\n    NSMutableString *string = (__bridge NSMutableString\
  \ *)(void *)0xdeadbeef;\n    [string appendFormat:@\"foo\"];\n}\n```\n\n由于我们使用的是\
  \ ARC，而它对此类操作非常敏感，所以必须绕点弯路才能将垃圾值插入指针：先将其转换为 `void*`，然后再转换为 `NSMutableString*`。添加\
  \ `__bridge` 限定符可以告诉编译器忽略这次赋值的内存管理影响。\n\n现在，我们有了一个指向垃圾内存位置的 `NSMutableString` 指针。因此，当它尝试调用\
  \ `appendFormat:` 方法时，接收者并不是一个有效的对象，这就会导致问题。要查看实际效果，请将下面这行代码添加到 `applicationDidFinishLaunching:`\
  \ 方法中：\n\n```\n[self uninitializedObject];\n```\n\n运行应用并进行观察。程序将会停止，并显示类似于图 13-5\
  \ 的内容。\n\n![A978-1-4302-4543-8_13_Fig5_HTML.jpg](img/A978-1-4302-4543-8_13_Fig5_HTML.jpg)\n\
  \n**图 13-5.** 程序在收到信号时停止运行\n\n根据这个垃圾指针所指向的具体内容，你可能会看到不同的信号名称，例如 `SIGSEGV` 或 `SIGILL`。更糟糕的可能性是，它甚至可能指向我们程序中的另一个有效对象，甚至可能是一个\
  \ `NSMutableString`，这使得追踪问题变得异常棘手。具体细节并不重要；关键是我们有一个未初始化的指针（或者在这个特定演示案例中，是一个指向错误内存位置的指针）。这个问题可以通过应用一个通用规则轻松解决：每当你在方法内部声明一个\
  \ Objective-C 对象指针时，立即为其赋值，即使只是赋值为 `nil`。\n\n因此，通过将字符串声明行改为以下内容来修复这个问题：\n\n```\n\
  NSMutableString *string = nil;\n```\n\n构建并运行应用，应用就能正常运行了。在 Objective-C 中向 `nil`\
  \ 指针发送消息是完全安全的（这基本上是一个空操作，向 nil 发送消息的返回值通常是 `nil`、`0` 或 `NO`），因此，虽然修复后的方法实际上不会执行任何操作，但它也不会导致崩溃。\n\
  \n现在，还有另一个内存问题的来源需要提及：向一个已经被释放的对象发送消息。在本书中，我们创建的所有应用都使用了 ARC，这几乎彻底消除了这类 bug。但如果你将来某个时候需要处理使用手动引用计数（使用\
  \ `retain` 和 `release`）的项目，了解这类问题的成因还是很有好处的。\n\n在没有 ARC 的情况下，Objective-C 对象的内存管理是通过手动引用计数来处理的。长话短说：任何时候我们通过\
  \ `alloc` 或 `copy` 方法创建一个对象，或者通过向对象发送 `retain` 消息将其标记为“正在使用”，其引用计数就会增加。在某个时刻（当我们不再需要该对象时），我们必须向对象发送\
  \ `release` 或 `autorelease` 消息，这两种消息都会减少其引用计数。当引用计数归零时，对象就会被释放。\n\n当我们使用 ARC 时，相同的\
  \ `retain` 和 `release` 调用会被内置到应用中，但并不是由我们将其写入源代码，而是由编译器替我们完成。事实证明，计算机比我们更擅长始终如一地遵循\
  \ `retain`/`release` 规则！\n\n如果不使用 ARC，可能出现的问题是：如果我们没有正确处理，可能会陷入这样一种情况——变量中包含一个指向内存空间的指针，该空间以前曾被一个“活跃”对象占据，但现在可能包含一个已释放的对象，或者已被重新用于其他目的。ARC\
  \ 处理这类问题的能力非常强，以至于很难在启用 ARC 的情况下构造出它发生的场景。因此，对于下面的演示，让我们暂时关闭 ARC。为此，选择项目导航器中的顶级\
  \ ExceptionCity 项，然后选择“构建设置”标签页。使用顶部的搜索字段搜索“automatic”，然后关闭 Objective-C 自动引用计数。图\
  \ 13-6 展示了操作后的界面。\n\n![A978-1-4302-4543-8_13_Fig6_HTML.jpg](img/A978-1-4302-4543-8_13_Fig6_HTML.jpg)\n\
  \n**图 13-6.** 修改构建设置。你知道你想这么做\n\n现在，向应用委托类添加以下方法。这展示一个简化的不良行为版本，在 ARC 出现之前，这种操作可能让我们陷入困境。\n\
  \n```\n- (void)freedObject {\n    NSString *object = [[NSString alloc] initWithCString:\"\
  hi there\"\n                                                encoding:NSUTF8StringEncoding];\n\
  \    [object release];\n    NSLog(@\"Where is my object? %@\", object);\n}\n```\n\
  \n然后在 `applicationDidFinishLaunching:` 方法中添加一行 `[self freedObject];`，运行应用，看看会发生什么。程序将会停止，并显示类似于图\
  \ 13-7 的内容。\n\n![A978-1-4302-4543-8_13_Fig7_HTML.jpg](img/A978-1-4302-4543-8_13_Fig7_HTML.jpg)\n\
  \n**图 13-7.** 绿色条显示了程序停止的位置。这没什么帮助！好在还有其他栈帧可供查看\n\n与之前产生信号的 bug 一样，程序收到的信号可能与这里显示的不同，但它肯定会收到某个信号。如果我们查看调用栈中最高层包含我们代码的栈帧，我们会看到它同时包含了\
  \ `freedObject` 方法和它调用的 `NSLog` 函数。\n\n与之前的情况一样，解决这个问题的方法也在于自律：任何时候我们向一个对象发送 `release`\
  \ 或 `autorelease` 消息后，如果变量中仍然存在指向该对象的指针，请立即将该变量指向 `nil`！发送 `release` 或 `autorelease`\
  \ 可能不会总是立即导致对象被释放（因为其他代码可能也增加了它的引用计数），但在每个方法内部，我们应该将任何已释放的对象视为不可用，并尽快清除所有指向它的悬垂指针。\n\
  \n在本例中，解决方案是在 `[object release];` 这行代码后面加上以下代码：\n\n```\nobject = nil;\n```\n\n\n\
  \n添加该行，重新运行应用，一切恢复正常！不过再次强调，这类错误只有在不使用 ARC 时才会出现。除了在释放对象后将指针设为`nil`这一相对简单的经验法则外，非\
  \ ARC 应用也可能因其他方式陷入类似困境，例如忘记保留需要长期使用的对象。这些错误是最难定位的，这也是尽可能使用 ARC 的最有力理由之一。\n\n继续之前，我们需要在项目中重新启用\
  \ ARC。再次在项目导航器中选择顶层项目项，在“Build Settings”选项卡中找到“Objective-C Automatic Reference Counting”并将其开启。我们还需要从应用代理的`freedObject`方法中删除`[object\
  \ release];`这行代码，因为 ARC 不允许我们显式调用`release`。\n\n## NSError\n\n现在我们了解到，Cocoa 中的异常通常不用于流程控制，而主要用于指出错误。如今使用的其他一些语言和框架会将异常用于各种并非错误、但可能是开发者无法直接控制的条件所产生的副作用，例如访问文件时的文件相关错误，或尝试从套接字读取数据时的网络错误。在\
  \ Cocoa 中，这类情况通常使用名为`NSError`的类来处理。在本节中，我们将学习`NSError`对象的内容、导致其创建的常见场景，以及在代码中如何处理它，包括让应用能够重试某些触发错误的操作。\n\
  \n### 域与代码\n\n传统上，每个操作系统都有自己报告系统错误的方式，通常提供一个整数值，我们可以与头文件中的预定义列表进行比较，以决定如何处理。例如，在基于\
  \ UNIX 的系统中，我们可以在每次系统调用（包括打开文件、读取文件、写入文件等函数）后检查`errno`的值（`errno`可能是全局变量，也可能是调用函数的符号，具体取决于多种因素，我们在此不深入讨论）。其思路是，如果任何系统函数遇到问题，它将把一个整数放入`errno`，以告知我们错误的性质。\n\
  \n在“经典 Mac OS”编程（所有早于 OS X 的系统）中，情况略有不同。许多系统函数不会填充全局变量，而是返回`OSStatus`类型，这同样归结为一个整数，我们应在调用每个函数后检查它，以确保没有意外情况发生。\n\
  \nOS X 是一种混合操作系统。其底层深深植根于 UNIX，并且如你所知，它包含了构成 Cocoa 的所有 Objective-C 框架。它还包含了 Carbon，这是一套从旧版\
  \ Mac OS 改编而来的庞大 API 和技术集。此外，还有完全用 C 编写的现代 API，同时适用于 OS X 和 iOS。这些“世界”中的每一个都包含需要以某种方式报告错误代码的函数和/或方法，并且由于这些世界是独立发展的，错误代码集之间当然存在一些重叠。在某个时刻，Apple\
  \ 意识到，用一种通用方式处理来自这些不同世界的错误消息可能带来一些好处，让它们各自继续使用一直以来的错误代码（确保与现有软件的二进制兼容性），同时通过用字符串标记每个错误的域来消除混淆风险。\n\
  \n这就是我们在`NSError`类中所拥有的，它基本上将系统级别的错误代码封装在一个 Objective-C 对象中。每个`NSError`实例都有一个`NSString`来指定其“域”的名称（通常指它来自哪个库或框架），一个整数来指定相关的错误代码，以及一个可选的`NSDictionary`，它可以包含关于该错误的额外信息。由于这些是普通的\
  \ Objective-C 对象，它们可以像任何其他对象一样被处理：传递、放入`NSArray`等等。\n\nCocoa 包含一些预定义的字符串常量，用于对 Cocoa\
  \ 框架中`NSError`对象的主要来源进行分类。作为 Cocoa 程序员，你最可能遇到的域如下：\n\n*   `NSPOSIXErrorDomain`：UNIX\
  \ 错误（属于 POSIX 标准的部分）。\n*   `NSOSStatusErrorDomain`：来自 Carbon 函数的错误（通常返回一个`OSStatus`）。\n\
  *   `NSCocoaErrorDomain`：直接源自 Cocoa 自身类的错误。\n\n每当一个 Cocoa 方法给我们一个`NSError`时，其域很可能就是其中之一。如果你开始在代码中创建自己的`NSError`实例，可能需要定义自己的域和错误代码，以便在应用程序中更容易处理它们。\n\
  \n每个预定义的错误域还关联了一个错误代码列表，定义在一个或多个头文件中。适用于`NSPOSIXErrorDomain`的错误代码位于`errno.h`中。`NSOSStatusErrorDomain`的错误代码位于`MacErrors.h`中；而`NSCocoaErrorDomain`使用的错误代码包含在`FoundationErrors.h`、`AppKitErrors.h`和`CoreDataErrors.h`中。在\
  \ Xcode 中，通过打开“Open Quickly”窗口（⌘⇧O）并输入文件名，可以轻松找到这些头文件。\n\n\n\n### 识别错误\n\n现在我们对\
  \ `NSError` 这个类有了一些了解。但是，`NSError` 实例从哪里来，它们又如何在应用运行期间影响我们的应用呢？与异常不同，`NSError` 对象不会改变我们代码的执行流程。通常情况下，`NSError`\
  \ 实例是通过方法调用返回给我们的，但不是作为返回值，而是通过引用我们传入的一个指针。这种参数修改的方式在 C 语言中并不罕见，但在 Objective-C 中却相当少见。其核心思想是，容易出错的方法应该接收一个指向\
  \ `NSError` 指针的指针作为参数。这意味着我们传入的不是一个指向 `NSError` 的指针，而是一个指向指针的指针（即我们指针的地址），这样接收方法就可以创建一个\
  \ `NSError` 实例，并将我们的指针指向它！（这听起来可能有些令人困惑，但一旦你看到这种模式，事情就会清晰起来。）\n\n举个例子，考虑一下 `NSFileManager`\
  \ 这个类。文件管理器允许我们执行某些磁盘操作，比如创建目录、访问文件属性等等。它有一个方法，其签名如下所示：\n\n```\n- (NSDictionary\
  \ *)attributesOfItemAtPath:(NSString *)path\nerror:(NSError **)error\n```\n\n我们可以使用这个方法来获取一个字典，其中包含关于\
  \ `path` 参数所指定的文件或目录的大量相关文件系统信息。请注意，第二个参数 `error` 的类型是 `NSError**`，这意味着我们传入的是一个指向变量的指针，而这个变量本身可以指向一个\
  \ `NSError` 对象。如果该方法确实遇到了错误情况，它会创建一个 `NSError` 对象，并将其地址存入 `error` 指定的位置。如果我们想忽略此类方法产生的任何错误，可以将特殊的\
  \ `NULL` 指针作为最后一个参数传入。\n\n下面的方法展示了从调用者角度来看这是什么样子的。我们创建一个用于指向 `NSError` 的变量，并将其初始化为指向\
  \ `nil`。然后，我们将该变量的地址传给一个可能产生错误的方法，之后再检查该变量，看它是否仍然指向 `nil`。如果不是，我们就知道该方法遇到了错误，于是请求应用向用户显示该错误。\n\
  \n```\n- (void)fileError {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
  \    // 声明一个变量并将其指向 nil\n    NSError *fileError = nil;\n    // 将 fileError 变量的地址传递给方法\n\
  \    NSDictionary *attributes = [fileManager\n        attributesOfItemAtPath:@\"\
  /tmp\" error:&fileError];\n    // 检查之前的方法调用是否给了我们一个 NSError 对象\n    if (fileError\
  \ == nil) {\n        // 显示属性\n        NSRunAlertPanel(@\"找到文件属性\",\n           \
  \ [attributes description], nil, nil, nil);\n    } else {\n        // 报告错误\n   \
  \     [NSApp presentError:fileError];\n    }\n}\n```\n\n为简单起见，在探索 `NSError` 的过程中，我们将继续在我们已有的项目基础上进行构建。将前面所示的\
  \ `fileError` 方法添加到应用委托类中，并在 `applicationDidFinishLaunching:` 方法中添加一行 `[self fileError];`。运行该应用，我们将看到类似于图\
  \ 13-8 所示的警告面板。\n\n![A978-1-4302-4543-8_13_Fig8_HTML.jpg](img/A978-1-4302-4543-8_13_Fig8_HTML.jpg)\n\
  \n**图 13-8. 这里没有错误！**\n\n现在，返回并编辑 `fileManager` 调用，将字符串参数从 `@\"/tmp\"` 改为 `@\"/tmpfoo\"\
  ` 或其它不存在的路径。这将导致 `fileManager` 遇到一个错误，并将其传回给我们，存储在 `fileError` 变量中（我们传入了该变量的地址）。它会注意到这个错误，并将其传递给\
  \ `NSApp`，最终显示如图 13-9 所示的警告面板。\n\n![A978-1-4302-4543-8_13_Fig9_HTML.jpg](img/A978-1-4302-4543-8_13_Fig9_HTML.jpg)\n\
  \n**图 13-9. 错误出现了**\n\n效果不错，但看看那个警告面板里的文字：“无法打开文件“tmpfoo”，因为不存在此文件。” 是不是感觉有点…… 不够技术化？我们是不是习惯了在计算机系统中看到一些更专业的术语？毕竟，这个错误是由一个底层系统例程触发的，它只报告了一个错误代码，别的什么都没有。这些文字是从哪来的呢？\n\
  \n原来，`NSError` 有一个叫做 `localizedDescription` 的方法，它能提供对错误的人性化、可读的解释。而 `reportError:`\
  \ 方法最终显示的就是这个描述。\n\n让我们通过调试器来进一步探索这一点。在 Xcode 中，点击文本编辑器中包含 `[NSApp presentError:fileError]`\
  \ 这一行左侧的边距（边距是显示行号的位置）来设置一个断点。这是在我们代码中设置断点最直接的方式。然后再次运行应用。应用会在选定的那一行暂停，我们可以在输出控制台中看到\
  \ lldb 提示符。让我们深入挖掘一下，通过在 lldb 提示符下执行命令来询问错误的域和错误代码：\n\n```\n(lldb) po [fileError\
  \ domain]\n$0 = 0x00007fff7cdab110 NSCocoaErrorDomain\n(lldb) p (int)[fileError\
  \ code]\n(int) $1 = 260\n(lldb) po [fileError localizedDescription]\n$2 = 0x0000000102327470\
  \ The file \"tmpfoo\" couldn't be opened because there is no such file.\n```\n\n\
  请注意，我们可以使用 `po` 命令打印 `NSString` 的值，使用 `p` 命令打印任何基本 C 类型的值。通常在使用 `p` 命令时，lldb 会抱怨不知道我们要显示的值类型，所以我们在方法调用前加了一个\
  \ `(int)` 来告诉 lldb 它期望的是什么类型。\n\n现在我们知道错误代码和域了。快速查看 `FoundationErrors.h` 文件，会发现如下信息：\n\
  \n```\nNSFileReadNoSuchFileError = 260,    // 读取错误（无此文件）\n```\n\n你可能仍然对这一切是如何联系起来的感到困惑。回想一下，当你创建一个\
  \ `NSError` 时，你需要指定一个域、一个代码，以及一个可选的包含附加信息的字典。这个字典是拼图的关键部分。如果你传递给这个方法的字典中有一个键为 `@\"\
  NSLocalizedDescriptionKey\"` 的值，那么每当调用 `localizedDescription` 时，就会返回该值。\n\n那么，我们来看看\
  \ `userInfo` 字典里包含了什么。\n\n```\n(lldb) po [fileError userInfo]\n$3 = 0x0000000102118850\
  \ {\n    NSFilePath = \"/tmpfoo\";\n    NSUnderlyingError = \"Error Domain=NSPOSIXErrorDomain\
  \ Code=2 \\\"The operation couldn\\U2019t be completed. No such file or directory\\\
  \"\";\n}\n```\n\n嗯，显然这不是答案。`userInfo` 字典没有指定本地化描述，但它确实包含了一些其他内容：我们试图访问的文件路径，以及看起来像是另一个\
  \ `NSError` 对象的东西。一个错误被包裹在另一个错误里面！让我们看看这个内部错误的 `domain`、`code`、`userInfo` 和 `localizedError`\
  \ 是什么。我们首先使用另一个 lldb 命令 `expression`，它只是执行该行后面的语句，就像执行源代码一样，但不会像 `po` 或 `p` 命令那样打印结果。在这个例子中，我们将内部错误对象的地址赋值给一个新变量，我们称它为\
  \ `$inner`。这是 lldb 的一个很好的特性，它允许我们保留所执行查询的结果，让值持续存在，并在之后节省一些打字时间。我们将从 `fileError`\
  \ 中获取 `userInfo` 字典，然后立即使用 Objective-C 的新字典查询语法来访问底层错误。\n\n```\n(lldb) expression\
  \ id $inner = [fileError userInfo][@\"NSUnderlyingError\"]\n(lldb) po $inner\n$inner\
  \ = 0x000000010210a9e0 Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn't\
  \ be completed. No such file or directory\"\n```\n\n\n\n将对象的地址赋给新变量后，使用 `po` 命令即可查看新变量的地址及其内容（即它所指向的对象）。从现在开始，我们可以将那个内部错误简称为\
  \ `$inner`，就像这样：\n\n```\n(lldb) po [$inner domain]\n$9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain\n\
  (lldb) p (int)[$inner code]\n(int) $10 = 2\n(lldb) po [$inner userInfo]\n$11 = 0x00000001001039d0\
  \ {\n}\n(lldb) po [$inner localizedDescription]\n$12 = 0x000000010011d2c0 操作无法完成。没有这样的文件或目录。\n\
  ```\n\n这又给我们带来了一个谜题。当我们查看底层错误时，它根本没有任何 `userInfo` 字典，却仍然提供了一个人类可读的 `localizedDescription`，而仅仅查看\
  \ domain 和 code 似乎并不能直接看出这个描述。事实上，我们可以像这样创建自己的内部错误和外部错误：\n\n```\nNSError *innerError\
  \ = [NSError errorWithDomain:NSPOSIXErrorDomain\ncode:2 userInfo:nil];\nNSDictionary\
  \ *outerInfo = @{NSUnderlyingErrorKey: innerError,\nNSFilePathErrorKey: @\"/tmpfoo\"\
  };\nNSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain\ncode:260\
  \ userInfo:outerInfo];\n```\n\n这些错误的行为将与 `NSFileManager` 生成的错误完全一致，包括显示我们并未在任何地方指定的人类可读文本！事实证明，这种神奇能力的源头似乎是\
  \ `NSError` 类本身。它显然内置了足够多的关于 Cocoa 错误域和错误代码的特定知识，能够为程序可能遇到的许多错误生成有意义的描述语句。这意味着，通常情况下，Cocoa\
  \ 方法调用提供给我们的错误无需额外美化，就可以直接展示给用户。\n\n### 呈现错误\n\n既然说到这个，我们该如何向用户展示错误呢？在这里，我们一直通过调用\
  \ `[NSApp presentError:e]` 来让应用程序显示一个模态窗口，但还有一些其他选择。实际上，`presentError:` 方法是在 `NSResponder`、`NSDocument`\
  \ 和 `NSDocumentController` 中实现的，这意味着无论何时发生错误，我们都可以将其传递给最近或最相关的对象，然后它就会沿着责任链向上传递（类似于响应者链），直到某个对象实际显示该错误。这为以不同方式显示错误信息（例如使用文档模态的弹出式警告）提供了可能性。\n\
  \n## 总结\n\n现在我们已经了解了 Cocoa 应用处理各种不良情况的主要方式、如何避免一些常见错误，以及如何使用 lldb 来帮助排查问题。我们还了解了方法如何利用\
  \ `NSError` 实例以可控的方式处理问题。在我们深入探究 Cocoa 编程的过程中，这些知识都将派上用场。\n\n"
- "# 14. Cocoa 中的绘图\n\n## 摘要\n\n到目前为止，我们已经学习了许多强大的 Cocoa 技术，用于处理数据、优化应用程序类的组织，以及使用\
  \ Cocoa 附带的丰富的屏幕控件和其他视图。现在，是时候开始学习如何利用 Cocoa 创建我们自己的视图类，从而完全掌控文本和图形的显示了。Mac 应用通常以其“视觉吸引力”而闻名——这不仅体现在绘制不必要的图形装饰上，更在于为用户创造更具沉浸感的交互体验。作为\
  \ Cocoa 程序员，我们可以利用图形技术，以令人惊讶的少量工作实现一些类似的效果。\n\nCore Graphics 提供了丰富的功能，用于渲染路径、操控坐标系统等等。Core\
  \ Graphics 的一个主要部分是被称为 Quartz 的一组 API。事实上，Quartz 在 Core Graphics 中占据了如此大的比重，以至于这两个术语有时会被混用。Core\
  \ Animation 则更进一步，让我们能以极其简单的方式对视图进行动画处理。\n\n本章将涵盖坐标系统和在 `NSView` 实例中绘图的一些基础知识，并演示如何将视图放入滚动视图中，以显示比窗口可用空间更大的视图。此外，还会简要介绍如何轻松地为我们的应用添加基本的打印支持。\n\
  \n## 基础\n\n在本节中，我们将介绍 Cocoa 绘图 API 中使用的一些基本概念。如果你做过任何形式的图形编程，那么对 Cocoa 中可用的绘图方式可能会相当熟悉。毕竟，计算机图形学的大多数基本概念在几十年前就已经定型了。Cocoa\
  \ 的突出之处在于其渲染质量（包括文本和图形基元的抗锯齿处理），以及为更复杂的概念提供的高层级抽象。\n\n在本章中，我们将统一使用“点（point）”而非“像素（pixel）”。Cocoa\
  \ 中的绘图通常是基于矢量且与分辨率无关的。随着高像素密度显示屏（也称为 HiDPI 或 Retina 显示屏）的出现，绘图模型中的一个点实际上可能由屏幕上的一个或四个像素表示。最好的做法是，尽可能让底层操作系统自行处理从绘图基元到实际像素的转换。这样一来，图形在高分辨率显示屏上也能自动呈现出色效果。如果你处理的是与像素相关的代码，那就不那么容易了，你需要关注点和像素之间的区别，以及如何适当地缩放位图。不过，就目前而言，我们只讨论“点”。\n\
  \n### 视图坐标系统\n\nCocoa 的绘图系统采用 x-y 坐标系统，在默认情况下，原点 (0,0) 位于左下角，x 轴指向右方（数值增大，位置向右移动），y\
  \ 轴指向上方（数值增大，位置在屏幕上向上移动）。这与数学中传统的作图方式类似，但与许多其他 y 轴指向下方（数值增大，位置在屏幕上下移）的计算机图形系统相反。虽然在\
  \ Cocoa 中翻转 y 轴是可行且有时是必要的，但在我们的示例中不会这样做。\n\n绘图通常由 `NSView` 子类的实例完成。视图存在于一个层级结构中。如果层级中的最顶层视图被设置为某个\
  \ `NSWindow` 的 `contentView`，那么该层级中的所有视图都会在该窗口内显示。窗口中的顶层视图（即 `contentView`）可以在整个窗口区域进行绘制。对于层级中的其他所有视图，绘图区域被限制在其\
  \ frame（框架）内，即其父视图坐标空间中的一个区域（见图 14-1）。\n\n![A978-1-4302-4543-8_14_Fig1_HTML.jpg](img/A978-1-4302-4543-8_14_Fig1_HTML.jpg)\n\
  \n**图 14-1.** 一个简单的视图层级结构。窗口的 `contentView` 包含一个 `NSBox`，该 `NSBox` 又包含一个包含单选按钮的\
  \ `NSMatrix`\n\n\n\n### 视图框（Frame Rectangle）与边界框（Bounds Rectangle）\n\n窗口中的每个视图都有两个重要的矩形（通常简称为\
  \ rects），它们定义了大量绘图特性：视图框和边界框。视图框仅指定视图在其父视图坐标空间中的位置和大小。例如，假设窗口中有个顶级视图，称为 A。如果 A 有一个子视图\
  \ B，其坐标从点 (10,20) 延伸到点 (40,60)，那么 B 的视图框原点为 (10,20)，大小为 (30,40)。\n\n除了决定其父视图中显示位置和范围的视图框外，每个视图还有一个边界框，用于定义其自身的内部坐标空间。例如，前面描述的视图\
  \ B 默认的边界框原点为 (0,0)，大小为 (30,40)。若需要，我们可以轻松更改这一点。例如，假设我们有一系列要绘制的点，其 x 和 y 值介于 0.0\
  \ 到 10.0 之间。通过将 B 的边界框大小改为 (10,10)，这些点将恰好填满 B 所占用的空间，无论 B 在屏幕上实际占据多大空间（见图 14-2）。\n\
  \n![A978-1-4302-4543-8_14_Fig2_HTML.jpg](img/A978-1-4302-4543-8_14_Fig2_HTML.jpg)\n\
  \n图 14-2.\n\n左侧：在默认边界的视图中绘制小范围点集；右侧：在较小边界的同一视图中绘制相同点集\n\n### 矩形、点与尺寸\n\n在 Cocoa\
  \ 中，矩形由 C 结构体 `NSRect` 表示，该结构体包含一个表示原点的 `NSPoint` 和一个表示尺寸的 `NSSize`。原点和尺寸各自包含两个\
  \ `CGFloat` 类型的值，`CGFloat` 是 Cocoa 绘图 API 中广泛使用的基本 C 类型；原点包含 x 和 y，尺寸包含宽度和高度。\n\n\
  更令人困惑的是，Core Graphics 中的许多函数使用了等效的结构体 `CGRect`、`CGPoint` 和 `CGSize`，它们具有相同的结构布局，且均由\
  \ `CGFloat` 元素组成。这种划分的历史原因并不值得深究，只要我们不处理 32 位遗留应用，这些 C 结构体就具有相同的布局，并且可以通过内联函数（例如\
  \ `NSRectToCGRect`、`NSSizeFromCGSize` 等，这些实际上只是类型转换）相互转换。本章我们将主要使用 NS 前缀的版本。\n\n\
  ### 路径基础\n\nCocoa 的绘图机制包含路径的概念，路径可以包含任意数量的直线或曲线段。每个路径不需要是连续的。我们可以在一个点“抬起笔”，在另一个点重新开始绘制。在实际绘制路径之前，我们可以指定线条粗细、颜色等值。这些设置将应用于路径的每个部分。路径各部分勾勒出的任何形状也都可以用单独的颜色或图案填充。\n\
  \n## 创建 NSView 子类\n\n让我们先创建一个能够绘制一张非常开心的笑脸的应用（见图 14-3），以此开始探索。在 Xcode 中，新建一个名为 MrSmiley\
  \ 的 Cocoa 项目。我们将为 Mr Smiley 应用使用 MS 作为类前缀，并保持自动引用计数处于开启状态。\n\n![A978-1-4302-4543-8_14_Fig3_HTML.jpg](img/A978-1-4302-4543-8_14_Fig3_HTML.jpg)\n\
  \n图 14-3.\n\nMr Smiley 非常非常开心\n\n现在创建一个新的 Objective-C 类，作为 `NSView` 的子类，并将其命名为 `MSSmileyView`。操作方法是：选择\
  \ File ➤ New ➤ File . . .（⌘-N），或者在 Xcode 窗口左侧的项目导航器窗格中右键单击，从弹出菜单中选择 New File . .\
  \ .。Xcode 将为我们创建类的文件，其中包括 `MSSmileyView.m`，本节的所有工作都将在此文件中进行。\n\n在开始编写代码之前，打开项目的\
  \ `MainMenu.xib` 文件。从 Library 窗口中抓取一个自定义视图，将其拖入默认创建的空白窗口中。使用标识检查器（Identity Inspector）将视图的类改为\
  \ `MSSmileyView`（在 Custom Class 标题下），然后使用大小检查器（Size Inspector）将其宽度和高度改为 100×100。最后，选中窗口并按\
  \ ⌘-= 让窗口自动调整大小以完美适配该视图。然后保存更改。\n\n### 基本绘图方法 drawRect:\n\n现在开始编写代码。Xcode 创建的 `MSSmileyView.m`\
  \ 文件包含一个空的 `drawRect:` 方法，我们将从这里开始编码。`drawRect:` 方法通常不会直接调用，除非我们正在实现某个现有视图的子类，并通过调用\
  \ `[super drawRect:rect]` 让父类完成其绘图工作。相反，当应用的主运行循环确定视图需要重绘时（通常是在视图被创建或调整大小之后，或者我们的代码在视图上调用了\
  \ `setNeedsDisplay:` 并传入 `YES` 作为参数时），系统会自动调用 `drawRect:` 方法。`drawRect:` 方法接受一个参数，即一个矩形，用于指示视图的哪个部分被视为“脏区”需要重绘。这可以用于优化复杂视图的绘制，但在我们的示例中，我们将忽略这一点，而是直接使用视图的边界矩形进行绘图。\n\
  \n### 图形状态\n\nCocoa 中的所有绘图都发生在特定上下文中，该上下文由 `NSGraphicsContext` 类表示。根据上下文的不同，我们可能直接绘制到窗口缓冲区，或绘制到一块离屏内存中供以后使用。除此之外，上下文还含有一系列会随时间变化的状态信息，例如当前用于所有绘图命令的颜色。当视图需要绘制自身时，它应确保绘图结束后图形状态恢复到绘图开始前的状态。\n\
  \n幸运的是，`NSGraphicsContext` 为我们提供了一种简便方法来实现这一点。其 `saveGraphicsState` 方法会将所有相关状态信息压入栈中，而\
  \ `restoreGraphicsState` 方法会将状态从栈中弹出。我们可以像下面的代码片段那样，用这两个方法调用将实际绘图代码“括起来”，从而确保不会让图形上下文处于意外的状态。\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect\n{\n  [NSGraphicsContext saveGraphicsState];\n\
  \  // 此处编写绘图代码。\n  [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n\n\n"
- "# 路径辅助工具\n\n为了绘制本节开头展示的视图，我们首先绘制背景，然后绘制脸部本身。对于这两个元素中的每一个，我们先填充背景，再绘制边缘。所有这些操作都通过\
  \ `NSBezierPath` 类完成。贝塞尔路径允许我们定义任意复杂度的路径，包括直线、点、曲线等。`NSBezierPath` 类的一个便利之处在于，它提供了创建表示常见形状（如矩形、椭圆等）的贝塞尔路径的便捷快捷方式。\n\
  \n让我们从创建一个定义视图可见边缘的路径开始，使用 `NSBezierPath` 的一个类方法来生成圆角矩形。下方以**粗体**显示的行创建了一个路径，用白色填充它，然后用黑色“描边”（绘制其边缘）：\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect\n{\n  [NSGraphicsContext saveGraphicsState];\n\
  \  NSRect bRect = CGRectInset([self bounds], 5, 5);\n  NSBezierPath *border = [NSBezierPath\
  \ bezierPathWithRoundedRect:bRect\n    xRadius:5 yRadius:5];\n  [[NSColor whiteColor]\
  \ set];\n  [border fill];\n  [border setLineWidth:3];\n  [[NSColor blackColor] set];\n\
  \  [border stroke];\n  [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n第一步使用\
  \ `CGRectInset` 函数将我们的边界矩形缩小一点，留出一些余量，以便我们可以绘制带有粗线条的圆角矩形，而不会被边缘裁剪。然后，我们创建一个表示圆角矩形的路径，指定矩形的基本几何形状以及两个定义用于圆角的椭圆曲线大小的数字。之后，我们发出简单的命令来设置颜色、线宽并进行一些绘制。\n\
  \n## 颜色与图形上下文\n\n请注意，指定绘图操作使用的颜色与绘图操作本身是分开的步骤，设置线宽也是如此。此外，虽然设置线宽是通过路径本身的方法完成的，但设置颜色看起来像是一种自由浮动操作。我们只需向任何颜色发送\
  \ `set` 消息，它立刻就变成了当前颜色！发生的情况是，`NSColor` 的 `set` 方法与底层图形上下文交互，设置将用于后续绘图操作的颜色。这带来的一个后果是，`NSColor`\
  \ 的 `set` 方法仅在存在当前图形上下文时（例如在 `drawRect:` 方法内部）才会执行有用的操作。另一个后果是，当前颜色是图形上下文的一个属性（在一般意义上，而非\
  \ Objective-C 语言意义上），因此无论之前设置了什么颜色，都会在方法开始时通过调用 `[NSGraphicsContext saveGraphicsState]`\
  \ 保存，并在方法结束时通过调用 `[NSGraphicsContext restoreGraphicsState]` 恢复，从而使一切恢复原状。\n\n此时，如果在\
  \ Xcode 中运行应用程序，我们会看到它绘制了一个带有黑色轮廓的白色矩形（图 14-4）。\n\n![A978-1-4302-4543-8_14_Fig4_HTML.jpg](img/A978-1-4302-4543-8_14_Fig4_HTML.jpg)\n\
  \n图 14-4.\n\n未来形状的雏形\n\n## 超越颜色\n\n现在让我们开始绘制头部。将以下行添加到 `drawRect:` 方法的末尾附近，但仍在 `[NSGraphicsContext\
  \ restoreGraphicsState]` 调用之前：\n\n```\nNSRect hRect = CGRectInset([self bounds],20,20);\n\
  NSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];\nNSGradient\
  \ *faceGradient = [[NSGradient alloc]\n  initWithStartingColor:[NSColor whiteColor]\n\
  \  endingColor:[NSColor lightGrayColor]];\n[faceGradient drawInBezierPath:head angle:45];\n\
  [head setLineWidth:3];\n[head stroke];\n```\n\n这里我们再次使用 `CGRectInset` 创建一个比边界矩形更小的新矩形，这次是为笑脸先生的头部创建一个椭圆形。在创建贝塞尔路径后，我们创建了一个新东西——`NSGradient`\
  \ 的实例，它知道如何获取两种或多种颜色并在它们之间绘制平滑渐变。在这个例子中，它可以在贝塞尔路径的内表面绘制自身。运行这段代码；视图现在包含一个带有渐变阴影的圆形“头部”（图\
  \ 14-5）。\n\n![A978-1-4302-4543-8_14_Fig5_HTML.jpg](img/A978-1-4302-4543-8_14_Fig5_HTML.jpg)\n\
  \n图 14-5.\n\n基本的头部特写\n\n## 手动路径构建\n\n现在剩下的就是绘制面部特征（一个简单的嘴巴和眼睛）。将以下行添加到 `drawRect:`\
  \ 的末尾（但在最终的 `[NSGraphicsContext restoreGraphicsState]` 调用之前）：\n\n```\nNSBezierPath\
  \ *features = [NSBezierPath bezierPath];\n[features moveToPoint:NSMakePoint(35,\
  \ 30)];\n[features lineToPoint:NSMakePoint(65, 30)];\n[features moveToPoint:NSMakePoint(40,\
  \ 40)];\n[features lineToPoint:NSMakePoint(40, 40)];\n[features moveToPoint:NSMakePoint(60,\
  \ 40)];\n[features lineToPoint:NSMakePoint(60, 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n\
  [features setLineWidth:3];\n[features stroke];\n```\n\n这里，我们没有使用 `NSBezierPath`\
  \ 的便捷类方法来直接获取一个完整的形状，而是使用一些更基本的方法从头构建一个路径。`moveToPoint:` 方法将虚拟的“笔”定位到指定点，而不绘制线条到该点。而\
  \ `lineToPoint:` 方法从路径的当前点绘制一条线到新点。实际上，这些方法并不执行任何绘制；它们只是构建贝塞尔路径结构，稍后由 `stroke` 方法绘制。\n\
  \n这里的一个额外技巧是设置了线条端点样式。此设置定义了线条末端的外观。这对于绘制为单个点的眼睛尤其重要。使用默认设置（精确地在线段末端截断所有内容），眼睛将完全不可见，但使用\
  \ `NSRoundLineCapStyle` 则为每只眼睛提供了完美的小圆点。点击运行查看最终结果（图 14-6）。\n\n![A978-1-4302-4543-8_14_Fig6_HTML.jpg](img/A978-1-4302-4543-8_14_Fig6_HTML.jpg)\n\
  \n图 14-6.\n\n笑脸先生。他真的很开心！\n\n\n\n### 突破界限\n\n既然 `MSSmileyView` 已经能完美绘制出一张笑脸，我们自然希望能调整其大小以适应不同位置。当窗口适配内容时，`MSSmileyView`\
  \ 自定义视图本应自动设置约束，以便视图随窗口大小变化。我们可以通过观察从自定义视图边缘延伸到窗口的蓝色线条来确认这一点，如图 14-7 所示。如果不是这种情况，我们可以使用边缘的调整手柄来调整\
  \ `MSSmileyView` 的大小，直到四条边都出现蓝色参考线。这样就将自定义视图定位在了距离窗口边框四周各 20 点的内嵌位置上。\n\n![A978-1-4302-4543-8_14_Fig7_HTML.jpg](img/A978-1-4302-4543-8_14_Fig7_HTML.jpg)\n\
  \n图 14-7. 调整大小约束已就位\n\n保存工作，点击运行，然后调整视图大小。它应该看起来像图 14-8 所示。\n\n![A978-1-4302-4543-8_14_Fig8_HTML.jpg](img/A978-1-4302-4543-8_14_Fig8_HTML.jpg)\n\
  \n图 14-8. 哎呀，头都大了！\n\n这看起来似乎不对劲，对吧？问题在于，在 `drawRect:` 方法中，我们指定路径几何图形时采用了一种混合搭配的方式。对于轮廓和头部形状，我们基于边界矩形来处理，但对于面部特征，我们却硬编码了数值化的像素宽度。当视图调整大小时，我们的边界矩形会自动随之调整。这导致轮廓和头部拉伸以适应新的边界，而面部特征却仍被困在它们僵化的小世界里。\n\
  \n另外，请注意，调整大小后线条的绝对粗细完全相同，这意味着相对于视图整体尺寸的相对粗细发生了变化。如果我们将此视图变得非常大，线条会显得异常纤细。\n\n幸运的是，有一个简单的方法可以解决所有这些问题。还记得本章前面我们提到视图的框架和边界矩形之间的区别吗？框架定义了视图在其父视图中的位置和大小。而边界则决定了视图内部坐标系的范围和位置。如果我们能配置好，使得视图的边界矩形永不改变，那么它总会绘制出完全相同的内容，但会完美拉伸以匹配其实际绘制所在的框架！\n\
  \n为此，我们只需在每次视图调整大小时，手动将边界设置回原始矩形即可。因此，让我们在 `MSSmileyView.h` 中添加一个属性（用于保存我们想要的边界），完善\
  \ `initWithFrame:` 方法，并实现 `setFrameSize:` 方法，如下所示：\n\n```\n// MSSmileyView.h 的一部分：\n\
  #import <Cocoa/Cocoa.h>\n@interface MSSmileyView : NSView\n@property NSRect preferredBounds;\n\
  @end\n\n// MSSmileyView.m 的一部分：\n- (id)initWithFrame:(NSRect)frame\n{\n    self\
  \ = [super initWithFrame:frame];\n    if (self) {\n        self.preferredBounds\
  \ = NSMakeRect(0, 0, 100, 100);\n    }\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize\n\
  {\n    [super setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n\
  }\n```\n\n`setFrameSize:` 方法是在用户调整窗口大小时，在实时拖拽过程中被调用的方法。我们在这里做的是，在每一步都重置视图的边界矩形，这样当需要绘制时，所有绘制操作都将基于原始边界进行。现在点击运行，调整窗口大小，见证奇迹的发生（图\
  \ 14-9）。\n\n![A978-1-4302-4543-8_14_Fig9_HTML.jpg](img/A978-1-4302-4543-8_14_Fig9_HTML.jpg)\n\
  \n图 14-9. 真正的拉伸\n\n如您所见，一切都会完美地拉伸，包括线条的宽度。此外，所有内容都会根据实际显示分辨率进行渲染。我们可以将其拉伸到任意大小，并且总能看到完美抗锯齿的曲线。我们为其边界指定的任何几何图形都会被调整以匹配当前的框架。我们在这里看到的，实际上是一个二维变换。\n\
  \n除了作为处理调整大小的好方法之外，这种内置变换能力意味着，我们只需设置边界矩形，就可以在我们感到舒适的任何比例下进行绘制。如果我们想以像素分辨率绘制图形，我们完全可以做到；但如果我们正在绘制一个范围从\
  \ 0.0 到 0.1 的数学曲线细节，我们可以相应地设置边界，而不必将所有显示值乘以一个系数来匹配屏幕坐标。\n\n## LOLmaker\n\n现在，我们对如何在\
  \ `NSView` 中绘图以及操作其几何图形有了基本了解，让我们进入一个新项目：LOLmaker。LOLmaker 是一个简单的应用程序，它让我们只需拖入一张图片并输入我们想要的文字，就能创建自己的\
  \ LOLcat 风格图像。这并非什么高科技，但它会向我们介绍一些关于在 `NSView` 中绘图的更多问题。\n\n关于 LOLCAT 的几句话\n\n如果你完全错过了\
  \ LOLcat 这个网络迷因，或者是在 LOLcat 已被遗忘的未来世界里读这本书，那么简单来说，LOLcat 就是一张带有幽默文字的猫咪（或其它动物）图片，其文字风格通常是模仿\
  \ 21 世纪早期的网络俚语。\n\n我们喜欢 LOLcat，仅仅是因为它们是能让我们开怀大笑的猫咪图片。请千万不要以为我们会为了多卖几本书而屈尊到在书中加入\
  \ LOLcat 内容的地步！众所周知，大多数 LOLcat 粉丝同时也是盗版者，他们只会以盗版 PDF 的形式阅读这本书。\n\n\n\n\n"
- "# LOL 入门第一步\n\n首先，在 Xcode 中创建一个启用了**自动引用计数**（Automatic Reference Counting）的基础 Cocoa\
  \ 项目，但本次无需支持文档或 Core Data。尽管这两项功能在项目中都能派上用场，但当前我们只专注于绘图部分。这个项目实际上不会保存任何内容。将项目命名为\
  \ `LOLmaker`，并使用 `LOL` 作为类前缀。\n\n现在，编辑 `LOLAppDelegate.h` 文件，添加以下粗体显示的行：\n\n```\n\
  #import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\n@interface LOLAppDelegate : NSObject\
  \ <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n@property\
  \ (weak) IBOutlet LOLView *lolView;\n@property (strong) NSImage *image;\n@property\
  \ (copy) NSString *text;\n@end\n```\n\n这些属性将配合 Cocoa Bindings 使用，让用户拖入图像并输入文本，这些内容会自动绑定到我们的控制器对象，进而更新视图。请注意（Xcode\
  \ 也会注意到）我们导入了 `LOLView.h` 头文件，并声明了一个 `LOLView*` 类型的属性，尽管 `LOLView` 类尚未完成。要立即解决这个问题，请创建另一组类文件，这次针对\
  \ `NSView` 的子类 `LOLView`。\n\n我们将很快实现 `LOLView`，但现在先配置图形用户界面（GUI）。点击 `MainMenu.xib`\
  \ 在 Interface Builder 画布中打开它，然后使用库（Library）将一个自定义视图、一个图像框（image well）和一个文本字段拖入空白窗口。使用身份检查器（Identity\
  \ Inspector）将自定义视图的类设置为 `LOLView`，并使用属性检查器（Attributes Inspector）为图像框勾选“可编辑”（Editable）复选框。最后，将应用委托的\
  \ `lolView` 出口连接到窗口中的 `LOLView`。布局完成后，窗口应如图 14-10 所示。\n\n![A978-1-4302-4543-8_14_Fig10_HTML.jpg](img/A978-1-4302-4543-8_14_Fig10_HTML.jpg)\n\
  \n图 14-10. LOLmaker 窗口布局\n\n此窗口允许用户拖入图像（到拖放区域），并输入将显示在图像上的文本。`LOLView` 会检测到拖入的图像和编辑后的文本，并通过\
  \ Cocoa Bindings 触发自身的重新显示。绑定配置的前半部分将在 Interface Builder 中完成，后半部分则在代码中实现。\n\n首先，选择图像框并切换到绑定检查器（Bindings\
  \ Inspector）。为 Value 属性创建一个绑定，在弹出列表中选择应用委托，并在“模型键路径”（Model Key Path）字段中输入 `self.image`。然后选择文本字段，为其\
  \ Value 属性创建绑定，同样在弹出列表中选择应用委托，这次在“模型键路径”字段中输入 `self.text`。\n\n这样就完成了控件的绑定设置。但由于\
  \ Interface Builder 不了解 `LOLView` 及其可绑定值，我们需要在代码中为其设置绑定。返回 Xcode，编辑 `LOLAppDelegate.m`，在\
  \ `@implementation` 部分添加以下方法：\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification\n{\n  [self.lolView bind:@\"image\" toObject:self withKeyPath:@\"\
  image\"\n    options:nil];\n  [self.lolView bind:@\"text\" toObject:self withKeyPath:@\"\
  text\"\n    options:nil];\n}\n```\n\n至此，应用程序中所有对象之间的基本通信已配置完成。用户在窗口控件中的编辑操作会传递到应用委托，再从那里通过\
  \ Cocoa Bindings 传递到 `LOLView`。我们的应用“管道”现已完成！\n\n"
- "# LOLView\n\n那么，`LOLView` 本身呢？首先，它将拥有一些属性，与应用委托的属性类似，用于存储来自用户的值。但在此情况下，每当某个值发生变化时，我们希望触发重新显示，以便\
  \ `LOLView` 能够重绘。因此，我们自行实现 setter 方法，而不是使用编译器生成的默认 setter。由于我们使用自定义 setter，但允许编译器生成\
  \ getter，因此必须将属性标记为 `nonatomic`。编译器生成的 getter 和 setter 包含同步代码，以确保这些方法永远不会返回未完全构造的对象。由于我们构建了自己的\
  \ setter，编译器无法提供这种保证，但在此应用中我们无需在意。按照指示将以下代码添加到 `LOLView.h` 和 `LOLView.m` 中：\n\n\
  ```\n// LOLView.h:\n#import <Cocoa/Cocoa.h>\n@interface LOLView : NSView\n@property\
  \ (strong, nonatomic) NSImage *image;\n@property (copy, nonatomic) NSString *text;\n\
  @end\n\n// LOLView.m:\n#import \"LOLView.h\"\n@implementation LOLView\n- (id)initWithFrame:(NSRect)frame\n\
  {\n    self = [super initWithFrame:frame];\n    if (self) {\n        // 此处添加初始化代码\n\
  \    }\n    return self;\n}\n- (void)drawRect:(NSRect)dirtyRect\n{\n    // 此处添加绘图代码\n\
  }\n- (void)setImage:(NSImage *)i {\n    if (![i isEqual:_image]) {\n        _image\
  \ = i;\n        [self setNeedsDisplay:YES];\n    }\n}\n- (void)setText:(NSString\
  \ *)t {\n    if (![t isEqual:_text]) {\n        _text = [t copy];\n        [self\
  \ setNeedsDisplay:YES];\n    }\n}\n```\n\n在两个 setter 方法中，我们直接使用了属性生成的实例变量。默认情况下，实例变量的名称是属性名前加下划线，但你可以根据需要控制名称，也可以控制是否自动合成实例变量。在\
  \ `setText:` 方法中，我们对传入的 `NSString` 进行了显式拷贝。这样做是因为我们在属性声明中承诺了这一点（注意它标记为 `copy` 而非\
  \ `strong` 或 `weak`）。通常，在接收 `NSString` 这类对象时这是一个好做法，因为调用者可能实际传递给你一个可变字符串，可能会被其他代码修改。\n\
  \n\n\n\n### 绘制位图\n\n现在，我们来进入`LOLView`类的“核心”部分：绘制图像并叠加一些文字。先从图像开始，只需在创建类时已经存在的`drawRect:`方法中添加几行代码，就能快速将图像复制到位：\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect {\n\n  NSRect srcImageRect = NSMakeRect(0,\
  \ 0, [self.image size].width,\n\n    [self.image size].height);\n\n  [self.image\
  \ drawAtPoint:[self bounds].origin fromRect:srcImageRect\n\n    operation:NSCompositeCopy\
  \ fraction:1.0];\n\n}\n```\n\n这里我们首先创建了一个名为`srcImageRect`的矩形，其原点为`(0,0)`，大小与图像尺寸相同。然后，我们向图像自身发送一条消息，指示它绘制由`srcImageRect`指定的图像部分（此处为整张图像），并将其绘制到当前图形上下文中，位置位于视图边界矩形的原点。简而言之，整张图像被复制，且其左下角将精确地位于视图的左下角。这里使用的绘制方法还允许我们指定一个操作（该操作决定了源图像与目标图像中透明度的合并方式），以及一个介于`0.0`和`1.0`之间的整数，用作整张图像的整体\
  \ Alpha 级别。任何低于`1.0`的值都会使图像部分透明；一直降到`0.0`则会使图像完全不可见。\n\n现在，运行应用程序，看看目前的成果。应用程序打开后，显示一个基本空白的窗口，底部有一个图像框和文本字段。在某处找一张适合\
  \ LOLcat 的图片（我们使用的是通过 Flickr 找到的美国国家档案馆的非版权图像），将其拖入图像框，效果应类似于图 14-11。\n\n![A978-1-4302-4543-8_14_Fig11_HTML.jpg](img/A978-1-4302-4543-8_14_Fig11_HTML.jpg)\n\
  \n图 14-11.\n\n这里可没什么 LOL 元素\n\n嘿，这可不尽如人意！我们看到的只是拖入图片的左下角！要是能有办法看到整张图片就好了……\n\n###\
  \ 让它滚动起来\n\n当然，办法是有的。Cocoa 中包含一个名为`NSScrollView`的类，它能帮上忙。通过将一个视图放入`NSScrollView`内部，我们就能获得水平和垂直滚动条，用户可以利用它们滑动视图。滚动视图处理了所有繁重的工作。放在其中的任何视图的绘制代码都完全无需修改！将`LOLView`放入`NSScrollView`出奇地简单。我们只需添加少量代码，并在\
  \ Interface Builder 中进行一些调整即可。\n\n首先，在 Xcode 中打开 nib 文件，准备滚动视图本身。选中`LOLView`，然后从菜单栏中选择\
  \ Editor ➤ Embed in ➤ Scroll View。现在，我们的`LOLView`被包裹在了滚动视图中，但定位和大小稍有偏差。移动滚动视图，直到蓝色参考线在窗口左上角闪烁，然后使用右下角的调整控件稍微调整大小，直到蓝色参考线在该侧闪烁。视图应几乎填满窗口宽度，边缘留有常规边框，并向下延伸至在其他控件上方留出合适的边距（参见图\
  \ 14-12）。\n\n我们还可以免费获得滚动视图的一些实用的缩放行为，这在用户可以通过捏合进行缩放的多点触控触控板上很有用。既然这是免费的，我们就利用一下。选中滚动视图后，打开属性检查器。其中一个选项是“Magnification（缩放）”。勾选旁边的“Allow（允许）”复选框，剩下的事情就是代码部分了。\n\
  \n![A978-1-4302-4543-8_14_Fig12_HTML.jpg](img/A978-1-4302-4543-8_14_Fig12_HTML.jpg)\n\
  \n图 14-12.\n\n为滚动调整后的 LOLmaker 窗口\n\n我们需要添加的代码实际上是`setImage:`方法的又一部分。我们要做的是，每次设置新图像时都调整`LOLView`的大小，使视图的尺寸与图像的尺寸匹配。之后，当`LOLView`被封装在`NSScrollView`中时，滚动视图会注意到新的视图大小，并自动重新渲染包括滚动条在内的所有内容。新代码如下所示：\n\
  \n```\n- (void)setImage:(NSImage *)i {\n\n  if (![i isEqual:_image]) {\n\n    if\
  \ (i) {\n\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n\n   \
  \     [i size].height);\n\n      [self setFrame:newImageFrame];\n\n    }\n\n   \
  \ _image = i;\n\n    [self setNeedsDisplay:YES];\n\n  }\n\n}\n```\n\n保存所有工作，点击运行，滚动视图就完成了！拖入一张大图，注意它最初位于左下方，但滚动条已经出现，我们可以拖拽到任何想要的位置，如果硬件支持，还可以捏合缩放！如图\
  \ 14-13 所示。\n\n![A978-1-4302-4543-8_14_Fig13_HTML.jpg](img/A978-1-4302-4543-8_14_Fig13_HTML.jpg)\n\
  \n图 14-13.\n\n滚动条：如此简单，连猫都会\n\n### 绘制文本\n\n好的，现在进入最后一步：绘制文本。在 LOLcats 社区中，传统做法是使用\
  \ Impact 字体的文本标题，白色文字配黑色阴影。Mountain Lion 系统已安装此字体，因此所有用户都应该拥有它。这应该是小菜一碟。唯一稍微有点棘手的是选择合适的字号。因为图像可能尺寸各异，我们需要动态选择字号，使标题能占据视图的适当部分，同时又不会延伸到边缘之外。我们将通过测试几种字号来实现：从`1`开始，每次将字号翻倍，直到文本的宽度会超出视图本身。然后，将字号稍微调小一点，再绘制文本。所有这些操作通过添加下面加粗显示的行来完成：\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect {\n\n  // Drawing code here.\n\n  NSRect\
  \ srcImageRect = NSMakeRect(0, 0, [self.image size].width,\n\n    [self.image size].height);\n\
  \n  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n\n    operation:NSCompositeCopy\
  \ fraction:1.0];\n\n  if (self.text != nil && [self.text length] > 0) {\n\n    NSPoint\
  \ textLocation = NSMakePoint(0,0);\n\n    NSShadow *textShadow = [[NSShadow alloc]\
  \ init];\n\n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n\n    [textShadow\
  \ setShadowColor:[NSColor blackColor]];\n\n    [textShadow setShadowBlurRadius:10];\n\
  \n    NSMutableDictionary *textAttributes =\n\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
  \n        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n\n  \
  \      [NSColor whiteColor], NSForegroundColorAttributeName,\n\n        textShadow,\
  \ NSShadowAttributeName,\n\n        nil];\n\n    // 找出最佳字号\n\n    CGFloat fontSize;\n\
  \n    NSSize testSize = NSMakeSize(0, 0);\n\n    for(fontSize=1; testSize.width\
  \ < [self.image size].width; fontSize*=2)\n\n    {\n\n      [textAttributes setObject:[NSFont\
  \ fontWithName:@\"Impact\"\n\n        size:fontSize]\n\n        forKey:NSFontAttributeName];\n\
  \n      testSize = [self.text sizeWithAttributes:textAttributes];\n\n    }\n\n \
  \   [textAttributes setObject:[NSFont fontWithName:@\"Impact\"\n\n      size:fontSize/4]\n\
  \n      forKey:NSFontAttributeName];\n\n    // 绘制文本\n\n    [self.text drawAtPoint:textLocation\n\
  \n      withAttributes:textAttributes];\n\n  }\n\n}\n```\n\n现在点击运行，将图像拖入图像框，然后输入一些文字。瞧！效果应该类似于图\
  \ 14-14。\n\n![A978-1-4302-4543-8_14_Fig14_HTML.jpg](img/A978-1-4302-4543-8_14_Fig14_HTML.jpg)\n\
  \n图 14-14.\n\n我能开新闻发布会吗？\n\n\n\n"
- '# 本章小结


  在本章中，我们对 `NSView`、`NSBezierPath` 以及其他一些用于绘图的类和数据结构的工作原理有了深入的了解。然而，Cocoa 的绘图功能远不止于此，我们还可以绘制更复杂的曲线、根据鼠标事件修改绘图内容，以及为视图添加动画效果——这些内容都将在下一章中介绍。


  '
- "# 15. 高级绘图主题\n\n## 摘要\n\n第 14 章介绍了 Cocoa 关键绘图概念的基础知识，例如使用路径描述形状、将图像复制到屏幕以及渲染文本。本章将在此基础上展开，展示一些让图形“活”起来的技巧。第一部分将介绍如何让视图响应鼠标事件，使用户能够与自定义视图交互。第二部分将简要介绍\
  \ Core Animation，这项令人兴奋的技术只需几行代码就能实现流畅的动画效果。\n\n## 编辑曲线\n\n第 14 章介绍了如何使用 `NSBezierPath`\
  \ 类绘制圆角矩形、椭圆、直线和点。如果你曾在 Photoshop 或其他应用中使用过贝塞尔绘图工具，你可能会好奇这些形状与贝塞尔曲线究竟有何关系！实际上，贝塞尔曲线本质上是由一系列描述路径的点，以及描述点之间曲线的控制点构成的。因此，任何能用笔（在现实世界中，或在计算机图形系统中虚拟地）绘制的形状，都可以被描述为贝塞尔曲线，包括直线和折线。\n\
  \n不过，对于普通人来说，“贝塞尔曲线”通常更接近于图 15-1 所示的形态。图中黑色曲线是一条贝塞尔曲线，由两个端点（左下角和右上角）以及两个控制点（图中较大的圆圈，位于杆的末端）定义。用户通过拖拽控制点可以改变曲线的形状。这种视图可以用作速度控制，用于确定某个值随时间变化的速率，例如物体从一个点到另一个点的运动。将曲线变为直线可以指定完全线性的过渡，而将其调整为\
  \ S 形则可以使值开始变化缓慢，中间快速上升，最后在接近目标值时逐渐放缓（有时称为“缓入/缓出”过渡）。本节我们将要实现的就是这种控制。\n\n![A978-1-4302-4543-8_15_Fig1_HTML.jpg](img/A978-1-4302-4543-8_15_Fig1_HTML.jpg)\n\
  \n**图 15-1.** 一条贝塞尔曲线\n\n### 准备工作\n\n在 Xcode 中创建一个新的 Cocoa 项目，并将其命名为 `CurveEdit`。确保勾选“自动引用计数”（Automatic\
  \ Reference Counting），并将此应用的类前缀设置为 `CE`。\n\n该应用的核心部分将全部位于视图对象中，但首先让我们处理好视图的基础架构。本项目将采用\
  \ MVC 架构，这有助于确保我们创建的视图能够作为独立组件使用。用于显示每个控制点 x 和 y 值的文本字段将通过 Cocoa 绑定连接到控制器对象，自定义视图本身也是如此。本应用中的模型将只是控制器类中的一组实例变量，但如果我们选择使用或创建真实的模型对象，所有视图也同样可以轻松绑定到该模型上。\n\
  \n创建一个名为 `CECurveView` 的新 `NSView` 子类，暂时保持其实现内容不变。我们稍后会回来处理它。打开 `MainMenu.xib`。从对象库中拖出一个自定义视图（Custom\
  \ View），然后使用身份检查器（Identity Inspector）将其类设置为 `CECurveView`。将其大小调整为大约 240 x 240。接下来，我们需要连接应用代理以及刚刚拖入窗口的视图。为此，在辅助编辑器中打开\
  \ `CEAppDelegate.h` 文件，按住 Control 键从 `CECurveView` 自定义视图拖拽到辅助编辑器窗口中的 `CEAppDelegate.h`\
  \ 代码区域。将拖拽点放到现有 `@property` 声明的正下方，此时应出现“插入输出口”（Insert Outlet）提示。将新输出口命名为 `curveView`。\n\
  \n我们还需要做几处修改。我们将添加一个导入语句，以引入 `CECurveView` 头文件，并添加一些稍后要通过 Cocoa 绑定使用的额外属性。请在 `.h`\
  \ 文件中添加以下内容：\n\n```\n#import <Cocoa/Cocoa.h>\n#import \"CECurveView.h\"\n\n@interface\
  \ CEAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
  \ NSWindow *window;\n@property (weak) IBOutlet CECurveView *curveView;\n@property\
  \ (assign) CGFloat cp1X;\n@property (assign) CGFloat cp1Y;\n@property (assign) CGFloat\
  \ cp2X;\n@property (assign) CGFloat cp2Y;\n\n@end\n```\n\n然后切换到 `.m` 文件，并添加以下代码行：\n\
  \n```\n#import \"CEAppDelegate.h\"\n\n@implementation CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // 使 CECurveView 注意到我的变化\n    [self.curveView bind:@\"\
  cp1X\" toObject:self withKeyPath:@\"cp1X\"\n                options:nil];\n    [self.curveView\
  \ bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n                options:nil];\n\
  \    [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"cp2X\"\n      \
  \          options:nil];\n    [self.curveView bind:@\"cp2Y\" toObject:self withKeyPath:@\"\
  cp2Y\"\n                options:nil];\n    \n    // 使我注意到 CECurveView 的变化\n    [self\
  \ bind:@\"cp1X\" toObject:self.curveView withKeyPath:@\"cp1X\"\n        options:nil];\n\
  \    [self bind:@\"cp1Y\" toObject:self.curveView withKeyPath:@\"cp1Y\"\n      \
  \  options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView withKeyPath:@\"\
  cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
  \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    \n    // 设置初始值\n    self.cp1X\
  \ = 0.5;\n    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y = 1.0;\n}\n\n\
  @end\n```\n\n如你所见，控制器类非常简单。它所做的仅仅是声明用于访问控制点 x 和 y 值的属性，一个用于连接到 `CECurveView` 本身的\
  \ `IBOutlet`，为我们的 `curveView` 建立一些绑定（因为无法在 Interface Builder 中完成这些操作），并设置控制点的一些默认起始值。由于我们是通过代码设置该对象的绑定，因此（就\
  \ nib 文件而言）`CECurveView` 实例现在已完全就绪。至此，我们可以关闭辅助编辑器了。\n\n\n\n返回对象库，拖出一个`Label`，将其放置在`CECurveView`下方。将标签的标题改为`X1:`。再拖出一个`文本字段`，放在标签旁边，直到蓝色辅助线显示对齐为止。同时选中标签和文本字段，然后按下`⌘D`复制它们。将复制的这组元素放在第一组下方，并将标签的标题改为`Y1:`。这个表单将显示贝塞尔曲线中第一个控制点的`x`和`y`值。为两个文本字段分别创建绑定。对于每个字段，我们都需要使用模型键路径`cp1X`和`cp1Y`，将其`Value`属性绑定到`CEAppDelegate`对象。\n\
  \n同时选中两个标签和两个文本字段，复制它们（`⌘-D`），并将新副本放在第一组元素的右侧。这些字段将显示第二个控制点的值，因此将标签重命名为`X2:`和`Y2:`，并设置与第一组类似的绑定，但使用`cp2X`和`cp2Y`作为键路径。\n\
  \n参考图 15-1 查看应有的效果，合理排列布局，并调整窗口大小以匹配新增内容。保存文件，运行项目，确保此时没有错误。生成的应用程序将只允许我们编辑四个文本字段的内容。它还会提示`CECurveView`不符合键`cp1X`的键值编码要求，这确实没错：我们尚未将其添加到`CECurveView`中，但即将进行修改！\n\
  \n### 贝塞尔曲线基础设施\n\n让我们从建立一些基础设施开始编写`CECurveView`类。`CECurveView`需要跟踪两个控制点，我们将它们设置为四个浮点数，每个浮点数通过一个属性访问，就像我们为控制器类所做的那样。我们还想使用类似于第\
  \ 14 章中为 MrSmiley 使用的技术，使 GUI 能够根据渲染大小自适应缩放。这次，我们将设置固定的边界，以便始终可以在平面上`(0,0)`到`(1,1)`之间的正方形内绘制曲线，并留出一些额外的周边空间。因此，我们将添加一些代码，将边界设置为`(-0.1,-0.1)`到`(1.1,1.1)`的正方形，并且无论视图如何调整大小，都保持这些边界不变。通过添加下面粗体显示的代码来完成所有这些操作：\n\
  \n```objc\n// CECurveView.h:\n\n#import <Cocoa/Cocoa.h>\n\n@interface CECurveView\
  \ : NSView {\n\n  NSRect myBounds;\n\n}\n\n@property (assign, nonatomic) CGFloat\
  \ cp1X;\n@property (assign, nonatomic) CGFloat cp1Y;\n@property (assign, nonatomic)\
  \ CGFloat cp2X;\n@property (assign, nonatomic) CGFloat cp2Y;\n\n@end\n```\n\n然后将这些代码添加到`.m`文件中：\n\
  \n```objc\n// CECurveView.m:\n\n#import \"CECurveView.h\"\n\n@implementation CECurveView\n\
  \n- (void)setCp1X:(CGFloat)f {\n  self.cp1X = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n\
  }\n\n- (void)setCp1Y:(CGFloat)f {\n  self.cp1Y = MAX(MIN(f, 1.0), 0.0);\n  [self\
  \ setNeedsDisplay:YES];\n}\n\n- (void)setCp2X:(CGFloat)f {\n  self.cp2X = MAX(MIN(f,\
  \ 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n- (void)setCp2Y:(CGFloat)f {\n\
  \  self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n- (id)initWithFrame:(NSRect)frame\
  \ {\n  self = [super initWithFrame:frame];\n  if (self) {\n    // 初始化代码写在这里。\n \
  \   myBounds = NSMakeRect(-0.1, -0.1, 1.2, 1.2);\n    [self setBounds:myBounds];\n\
  \  }\n  return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize {\n  [super setFrameSize:newSize];\n\
  \  [self setBounds:myBounds];\n}\n\n- (void)drawRect:(NSRect)rect {\n  // 绘制代码写在这里。\n\
  }\n\n@end\n```\n\n请注意，我们正在为这些属性实现自己的设置器，因此需要将属性标记为`nonatomic`。编译器会注意到我们没有实现自己的获取器，因此编译器仍会为我们生成这些获取器。在设置器中，我们将对输入值施加一个范围限制，使其限制在`0.0`到`1.0`之间。我们还将使用`setNeedsDisplay:`将窗口标记为“脏”，强制系统在属性发生变化时重绘窗口。\n\
  \n\n\n### 绘制曲线\n\n接下来进入有趣的部分：绘制曲线本身。我们将使用预处理器 `#defines` 来定义颜色和线宽的值，便于定位和调整外观。在\
  \ `CECurveView.m` 顶部附近添加以下代码：\n\n```\n#define CP_RADIUS 0.1\n#define CP_DIAMETER\
  \ (CP_RADIUS*2)\n#define BACKGROUND_COLOR [NSColor whiteColor]\n#define GRID_STROKE_COLOR\
  \ [NSColor lightGrayColor]\n#define GRID_FILL_COLOR [NSColor colorWithCalibratedWhite:0.9\
  \ alpha:1.0]\n#define CURVE_COLOR [NSColor blackColor]\n#define LINE_TO_CP_COLOR\
  \ [NSColor darkGrayColor]\n#define CP_GRADIENT_COLOR1 [NSColor lightGrayColor]\n\
  #define CP_GRADIENT_COLOR2 [NSColor darkGrayColor]\n```\n\n我们将按照以下示例实现 `drawControlPointAtX:y:`\
  \ 和 `drawRect:` 方法。绘制控制点的代码演示了 `NSGradient` 类的使用，该类可用于填充贝塞尔路径内部，而不仅仅是纯色填充。\n\n```\n\
  - (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y {\n    NSBezierPath *cp = [NSBezierPath\
  \ bezierPathWithOvalInRect:\n        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS,\n\
  \        CP_DIAMETER, CP_DIAMETER)];\n    NSGradient *g;\n    g = [[NSGradient alloc]\
  \ initWithStartingColor:CP_GRADIENT_COLOR1\n        endingColor:CP_GRADIENT_COLOR2];\n\
  \    [g drawInBezierPath:cp\n        relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n\
  }\n\n- (void)drawRect:(NSRect)rect {\n    [NSGraphicsContext saveGraphicsState];\n\
  \n    // 绘制背景\n    NSBezierPath *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n\
  \        xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR set];\n    [bg fill];\n\
  \n    // 绘制网格\n    NSBezierPath *grid1 = [NSBezierPath bezierPath];\n    [grid1\
  \ moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.0)];\n\
  \    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
  \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 moveToPoint:NSMakePoint(0.5,\
  \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
  \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR set];\n\
  \    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
  \    [grid1 stroke];\n\n    // 绘制指向控制点的连线\n    NSBezierPath *cpLines = [NSBezierPath\
  \ bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0, 0.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp1X,\
  \ self.cp1Y)];\n    [cpLines moveToPoint:NSMakePoint(1.0, 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X,\
  \ self.cp2Y)];\n    [LINE_TO_CP_COLOR set];\n    [cpLines setLineWidth:0.01];\n\
  \    [cpLines stroke];\n\n    // 绘制曲线本身\n    NSBezierPath *bp = [NSBezierPath bezierPath];\n\
  \    [bp moveToPoint:NSMakePoint(0.0, 0.0)];\n    [bp curveToPoint:NSMakePoint(1.0,\
  \ 1.0)\n        controlPoint1:NSMakePoint(self.cp1X, self.cp1Y)\n        controlPoint2:NSMakePoint(self.cp2X,\
  \ self.cp2Y)];\n    [CURVE_COLOR set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\
  \n    // 绘制控制点\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self\
  \ drawControlPointAtX:self.cp2X y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n\
  }\n```\n\n这种绘图代码可能会使方法变得相当冗长，但通常逻辑非常直接，正如前面展示的 `drawRect:` 方法。整个方法中没有一个循环或 `if`\
  \ 结构！注意，与第 14 章中的笑脸符号代码不同，此绘图代码完全未引用视图的边界矩形。因为我们知道边界始终被调整为包含从 (0,0) 到 (1,1) 的方形区域，所以直接使用简单的硬编码值在该单位方形内及其周围绘制图形。\n\
  \n点击“运行”按钮启动应用，其外观应类似于图 15-1。我们应当能够编辑文本框中的数值（0.0 到 1.0 之间的任意值均可正常工作），并看到控制点和曲线随之相应变化。\n\
  \n\n\n### 监听鼠标\n\n不过，在文本框中输入数值并非本练习的重点；我们的目标是拖拽那些控制点。事实证明，这一操作相当简单。`NSView` 包含了一些方法，当用户通过点击、拖拽等方式与视图交互时，这些方法会被自动调用。我们只需要重写几个方法，就能对每一次鼠标点击、拖拽和松开做出响应。\n\
  \n首先，在视图中添加一对 `BOOL` 类型的属性，用于追踪当前是否有控制点正在被拖拽。在 `CECurveView.h` 文件的 `@interface`\
  \ 声明中，添加以下两行代码：\n\n```\n@property (assign) BOOL draggingCp1;\n@property (assign)\
  \ BOOL draggingCp2;\n```\n\n现在，我们在 `CECurveView.m` 文件的 `@implementation` 部分添加一些方法，以便开始拦截我们想要监听的鼠标活动。第一个方法是\
  \ `mouseDown:`，当用户在视图中点击时，它会被调用。\n\n```\n- (void)mouseDown:(NSEvent *)theEvent {\n\
  \n    // 获取当前鼠标位置，并转换到我们的坐标空间\n    // （即由 bounds 表示的坐标空间）\n\n    NSPoint mouseLocation\
  \ = [theEvent locationInWindow];\n    NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
  \                                          fromView:nil];\n\n    // 检查点击是否发生在其中一个控制旋钮上\n\
  \    NSPoint cp1 = NSMakePoint(self.cp1X, self.cp1Y);\n    NSPoint cp2 = NSMakePoint(self.cp2X,\
  \ self.cp2Y);\n\n    if (pointsWithinDistance(self.cp1, convertedLocation, CP_RADIUS))\
  \ {\n        self.draggingCp1 = YES;\n    } else if (pointsWithinDistance(cp2, convertedLocation,\
  \ CP_RADIUS)){\n        self.draggingCp2 = YES;\n    }\n\n    [self setNeedsDisplay:YES];\n\
  }\n```\n\n在 `mouseDown:` 方法中，我们首先向窗口请求当前鼠标位置，然后使用内置的 `NSView` 方法将坐标从窗口的坐标系转换到我们自己的坐标系。这意味着，例如，在单位正方形右上角的点击（其初始值为距离窗口左下角的水平和垂直像素数），最终会被转换为\
  \ (1,1) 或附近的值。接着，我们进行两次测试，检查是否有控制点被点击。该测试使用了下面的函数，我们需要将它添加到 `CurveEdit.m` 文件的顶部，位于\
  \ `#defines` 组和 `@implementation` 部分之间：\n\n```\nstatic BOOL pointsWithinDistance(NSPoint\
  \ p1, NSPoint p2, CGFloat d) {\n    return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y),\
  \ 2) <= pow(d, 2);\n}\n```\n\n`pointsWithinDistance` 函数利用勾股定理来判断两点（在我们的场景中，即控制点的中心和鼠标位置）之间的距离是否小于我们传入的距离（控制点半径）。通过这种方式，我们能够检查用户是否点击了某个控制点，如果是，就将相应的标志位（`draggingCp1`\
  \ 或 `draggingCp2`）设置为 `YES`。\n\n接下来需要实现的方法是 `mouseDragged:`，当鼠标按钮被按住并移动时，该方法会被反复调用。请注意，该方法并非在鼠标滑过的每个视图中都被调用，它总是在最初发生鼠标点击的视图中被调用；从某种意义上说，接收点击的那个视图“拥有”之后所有的拖拽事件。在这个方法中，我们再次从事件中获取鼠标位置，将其转换到我们视图自身的坐标系，然后更新当前正在被拖拽的控制点的坐标。如果没有任何控制点正在被拖拽，则什么也不会发生。\n\
  \n```\n- (void)mouseDragged:(NSEvent *)theEvent {\n\n    NSPoint mouseLocation =\
  \ [theEvent locationInWindow];\n    NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
  \                                          fromView:nil];\n\n    if (self.draggingCp1)\
  \ {\n        self.cp1X = convertedLocation.x;\n        self.cp1Y = convertedLocation.y;\n\
  \    } else if (self.draggingCp2) {\n        self.cp2X = convertedLocation.x;\n\
  \        self.cp2Y = convertedLocation.y;\n    }\n\n    [self setNeedsDisplay:YES];\n\
  }\n```\n\n处理鼠标所需的最有一个方法是 `mouseUp:`，它让我们能够处理按钮松开的事件。与 `mouseDragged:` 类似，`mouseUp:`\
  \ 也总是在发起拖拽的原始视图上被调用，这意味着用户在我们的视图中点击后，无论在哪里松开鼠标按钮，我们都会收到这条消息。这里我们仅需设置标志位，以指示没有任何东西正在被拖拽。\n\
  \n```\n- (void)mouseUp:(NSEvent *)theEvent {\n    self.draggingCp1 = NO;\n    self.draggingCp2\
  \ = NO;\n}\n```\n\n完成以上所有设置后，运行应用程序。我们应该能够拖拽控制点，曲线会随之移动，并且文本框中显示的数值也会在我们拖拽时同步更新。\n\
  \n### 一点小改进\n\n这已经很酷了，但正如我们在尝试新的 GUI 设计时经常注意到的，随着使用的深入，一些改进会变得显而易见。首先，我们总是以相同的顺序绘制控制点，因此即使我们将控制点\
  \ 1 拖拽到控制点 2 的正上方，控制点 2 也始终位于最上层。这感觉很不自然。幸运的是，修复这个问题非常简单，这也是我们将控制点绘制拆分成两个独立方法的真正实用原因。在\
  \ `drawRect:` 方法的末尾，添加如下粗体所示的行：\n\n```\n// 绘制控制点\nif (self.draggingCp1) {\n    [self\
  \ drawControlPointAtX:self.cp2X y:self.cp2Y];\n    [self drawControlPointAtX:self.cp1X\
  \ y:self.cp1Y];\n} else {\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n\
  \    [self drawControlPointAtX:self.cp2X y:self.cp2Y];\n}\n```\n\n就是这样！点击运行。注意，当我们在拖拽第一个控制点时，它会显示在第二个控制点的前面。\n\
  \n如果能在拖拽过程中高亮显示当前被拖拽的控制点（例如使用不同的颜色绘制）也会很不错。这也是一项相当简单的修改，能为用户提供有用的视觉反馈。首先，为新的渐变定义一些高亮颜色，在文件顶部的其他\
  \ `#defines` 中添加以下代码行：\n\n```\n#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]\n\
  #define CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]\n```\n\n现在，修改 `drawControlPointAtX:y:`\
  \ 方法，通过添加以下粗体代码行，增加一个参数来指定是否绘制高亮版本：\n\n```\n- (void)drawControlPointAtX:(CGFloat)x\
  \ y:(CGFloat)y dragging:(BOOL)dragging {\n    NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n\
  \        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];\n\
  \    NSGradient *g;\n\n    if (dragging) {\n        g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
  \                                          endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n\
  \    } else {\n        g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n\
  \                                          endingColor:CP_GRADIENT_COLOR2];\n  \
  \  }\n\n    [g drawInBezierPath:cp\n       relativeCenterPosition:NSMakePoint(0.0,\
  \ 0.0)];\n}\n```\n\n由于我们给控制点绘制方法增加了一个参数，因此还需要相应修改 `drawRect:` 末尾调用它的方式，如下所示：\n\n\
  ```\n// 绘制控制点\nif (self.draggingCp1) {\n    [self drawControlPointAtX:self.cp2X\
  \ y:self.cp2Y dragging:self.draggingCp2];\n    [self drawControlPointAtX:self.cp1X\
  \ y:self.cp1Y dragging:self.draggingCp1];\n} else {\n    [self drawControlPointAtX:self.cp1X\
  \ y:cp1Y dragging:self.draggingCp1];\n    [self drawControlPointAtX:self.cp2X y:self.cp2Y\
  \ dragging:self.draggingCp2];\n}\n```\n\n现在点击运行，可以看到原本灰色的控制点在拖拽时会亮起红色，为用户提供了良好的视觉提示。同时请注意，如果我们松开鼠标，最近被拖拽的那个控制点会保持红色。要修复这个问题，请在\
  \ `mouseUp:` 方法的末尾添加：\n\n```\n[self setNeedsDisplay:YES];\n```\n\n\n\n\n"
- "# 核心动画：入门指南\n\n苹果在 Mac OS X 中包含的最激动人心的技术之一就是名为**Core Animation**的图形系统，它让我们能够在应用程序中轻松创建动画效果。我们可以让视图平滑而简便地滑动、淡入淡出、旋转和缩放，通常只需几行代码即可实现。本质上，Core\
  \ Animation 让我们能够指定对象的变化——例如将其位置改到窗口中的另一个位置——从而使得这种变化不再是瞬间完成，而是被自动分割成多个微小的动作，由 Core\
  \ Animation 随时间逐步渲染出来。我们可以指定转场效果的时长（以秒为单位），以及变化的时间或节奏。我们还可以将多个动画分组，使它们完美同步地执行。\n\
  \n## Core Animation 基础\n\n从技术角度来看，这一切的核心基础单元是一个名为 `CALayer` 的类（Core Animation 的预发布版本甚至曾被称作\
  \ Layer Kit）。每个 `NSView` 都可以选择性地附加一个 `CALayer`，这既可以在 Interface Builder 中通过一个开关来启用，也可以在代码中设置。将图层分配给视图的过程实际上会递归地遍历该视图的所有子视图，因此当一个视图拥有图层时，其所有子视图（以及它们的子视图，依此类推）也会获得图层。一旦图层就位，我们就可以开始对视图进行动画处理。\n\
  \n在底层，每个 `CALayer` 都与一些用于渲染其图形的 OpenGL 结构相关联。OpenGL 在快速将矩形绘制到屏幕上方面表现出色，即使是经过调整大小、旋转等操作的矩形也是如此，因此使用\
  \ `CALayer` 可以让我们的视图在屏幕上施展各种花招，而不会拖慢应用程序。Core Animation 的 API 将我们与 OpenGL 完全隔离开来，因此它会在后台静默工作，我们无需过多操心。唯一需要牢记的是，每个图层都会占用计算机图形硬件的一部分可用内存，因此我们最好仅对应用程序中实际需要执行动画的部分使用图层，而不是将其应用到每个窗口的每个视图中。\n\
  \n### 隐式动画\n\n任何支持图层的视图都可以通过其 **animator** 代理来生成动画。这是一个特殊对象，充当视图本身的替身，它会根据所接收的方法来设置动画，而不是立即进行更改。例如，如果我们想要动画化视图的移动，那么与其直接设置其\
  \ frame 属性：\n\n`[myView setFrame:newFrame];`\n\n我们可以这样设置：\n\n`[[myView animator]\
  \ setFrame:newFrame];`\n\n为了演示效果，创建一个新的 Cocoa 项目，将其命名为 **MovingButton**，并使用 **MB**\
  \ 作为类前缀。首先，我们来设置用户界面。在 Interface Builder 画布中打开 `MainMenu.xib`，打开 **MovingButton**\
  \ 窗口，并在空窗口中放置一个名为 **Move** 的按钮。接下来，打开助理编辑器，并在其中打开 `MBAppDelegate.h` 文件。从按钮控制拖拽到\
  \ `MBAppDelegate.h` 文件，在窗口的 `@property` 声明正下方添加一个操作。将这个新操作命名为 `move`。\n\n现在，我们来填写\
  \ `move:` 操作的实现，如下所示：\n\n```\n- (IBAction)move:(id)sender {\n\n  NSRect senderFrame\
  \ = [sender frame];\n\n  NSRect superBounds = [[sender superview] bounds];\n\n \
  \ senderFrame.origin.x = (superBounds.size.width -\n\n    senderFrame.size.width)\
  \ * drand48();\n\n  senderFrame.origin.y = (superBounds.size.height -\n\n    senderFrame.size.height)\
  \ * drand48();\n\n  [sender setFrame:senderFrame];\n\n}\n```\n\n这个简单的操作方法只是为 sender\
  \ 在其父视图中计算一个新的随机位置，并将其移动过去。保存更改，运行项目，你会看到每次点击 Move 按钮，它都会跳到窗口中的另一个位置。\n\n现在，让我们让移动过程动起来。我们只需编辑一行代码，将\n\
  \n`[sender setFrame:senderFrame];`\n\n改为\n\n`[[sender animator] setFrame:senderFrame];`\n\
  \n再次点击运行，点击 Move 按钮，看看会发生什么。现在，每次我们点击按钮，它都会平滑地滑动到新位置，而不是瞬间切换。`animator` 方法返回的对象是一个代理，它会响应\
  \ `NSView` 的每个 setter 方法，并调度动画来逐步应用更改。在幕后，Core Animation 负责完成所有工作，一点一点地修改相关值，直到达到调用\
  \ setter 时指定的目标值。\n\n每个线程都持有一个动画上下文，其形式为 `NSAnimationContext` 的实例。该上下文允许我们设置隐式动画的时长（以秒为单位），方法如下：\n\
  \n`[[NSAnimationContext currentContext] setDuration:1.0];`\n\n如果这就是我们对动画所需的全部控制，那么使用隐式动画就能走得很远。但如果我们需要更精细的调整，例如确保多个动画同步发生，或者在动画完成时触发某些活动，那么我们就需要更进一步，比如……\n\
  \n\n\n### 显式动画\n\nCore Animation 提供了一种在代码中显式设置动画的技术，而不是使用 `NSView` 的 `animator`\
  \ 方法那层“魔法”。我们创建的每个显式动画都由负责开始和结束动画代码段的方法界定，这让整个过程更加清晰。再加上显式动画所具备的额外功能，很明显，除了最简单的动画之外，所有动画都适合采用这种方法。\n\
  \n要使用 Core Animation，我们首先需要将 `QuartzCore` 框架添加到 Xcode 项目中。在 Xcode 中，在项目导航器窗格中选择\
  \ `MovingButton` 项目本身：这是项目导航器中的最顶层项。在“目标”部分下选择 `MovingButton`，如图 15-2 所示。在“已链接的框架和库”部分，点击表格视图底部的\
  \ + 按钮来添加一个新框架。在列表中找到 `QuartzCore.framework`（使用顶部的搜索字段），然后添加它。\n\n![A978-1-4302-4543-8_15_Fig2_HTML.jpg](img/A978-1-4302-4543-8_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 向项目中添加新框架\n\n然后，在 `MBAppDelegate.m` 的顶部添加以下行：\n\n`#import <QuartzCore/QuartzCore.h>`\n\
  \n现在，我们可以在自己的代码中引用 Core Animation 类了。让我们先修改之前的示例，用显式动画替代隐式动画。为此，我们需要创建一个名为 `CABasicAnimation`\
  \ 的 Core Animation 类实例，它可以对任何可动画化的 `CALayer` 属性的值进行动画处理。在我们的例子中，我们将对图层的 `position`\
  \ 属性进行动画处理，而不是对其 frame 进行动画处理。我们使用动画的 `toValue` 和 `fromValue` 属性显式设置位置的起点和终点。请注意，这些属性期望的是一个对象，而不仅仅是像\
  \ `NSPoint` 这样的结构体，因此我们必须将每个 `NSPoint` 值包装到 `NSValue` 实例中。创建动画后，我们将其连同键一起添加到视图的图层中。该键与我们正在动画处理的属性无关，它仅用于帮助我们在之后识别该动画。最后，我们在视图对象本身上更改其\
  \ frame，因为动画仅影响视图图层的绘制效果。我们希望视图实际也进行移动，因此我们必须手动设置其目标 frame。实现所有这些功能的代码如下：\n\n```\n\
  - (IBAction)move:(id)sender {\n\n    NSRect senderFrame = [sender frame];\n\n  \
  \  NSRect superBounds = [[sender superview] bounds];\n\n    CABasicAnimation *a\
  \ = [CABasicAnimation\n        animationWithKeyPath:@\"position\"];\n\n    a.fromValue\
  \ = [NSValue valueWithPoint:senderFrame.origin];\n\n    senderFrame.origin.x = (superBounds.size.width\
  \ -\n        senderFrame.size.width)*drand48();\n\n    senderFrame.origin.y = (superBounds.size.height\
  \ -\n        senderFrame.size.height)*drand48();\n\n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n\
  \n    [[sender layer] addAnimation:a forKey:@\"position\"];\n\n    [[sender animator]\
  \ setFrame:senderFrame];\n\n    [sender setFrame:senderFrame];\n\n}\n```\n\n请注意，我们还从这个方法中移除了\
  \ `[[sender animator] setFrame:senderFrame];` 这一行，因为这次我们不希望触发隐式动画。在这段代码工作之前，我们还需要完成隐式动画为我们处理好的一个步骤：为需要动画处理的视图建立图层。使用\
  \ animator 代理可以自动完成此操作，但现在我们必须为所有将要进行动画处理的视图（包括将要移动的视图的父视图）自行启用此功能。在我们的例子中，这意味着按钮的父视图（窗口的内容视图）需要被赋予一个图层，然后它反过来又会为其子视图层次结构（即按钮本身）建立图层。最简单的方法是返回\
  \ `MainMenu.xib`，选择窗口中的按钮，然后打开“视图特效检查器”（`⌘⌥8`）。该检查器的顶部有一个标题为“Core Animation 图层”的部分，其中显示了视图对象列表（见图\
  \ 15-3）。\n\n![A978-1-4302-4543-8_15_Fig3_HTML.jpg](img/A978-1-4302-4543-8_15_Fig3_HTML.jpg)\n\
  \n图 15-3. 建立动画图层\n\n选中的对象（按钮）位于底部，其所有父视图（本例中只有一个视图，即窗口的内容视图）堆叠在其上方。点击复选框为该视图启用图层。我们可以将按钮的复选框保持未选中状态，因为父视图会为其建立图层。\n\
  \n现在保存所有内容，运行应用程序，我们将看到完全一样的行为。因此，这个新版本以增加几行代码为代价实现了相同的结果。到目前为止，这似乎并没有多大优势。但是等等，还有更多！通过像\
  \ `CABasicAnimation` 这样的动画类实现的显式动画，让我们能够做几件使用隐式动画无法做到的关键事情。\n\n首先，我们可以设置动画的持续时间。在将动画添加到图层（使用\
  \ `[[sender layer] addAnimation:a forKey:@\"position\"]`）之前添加以下这行代码，可以使该动画运行得更慢一些：\n\
  \n`a.duration = 1.0;`\n\n将此代码放入后运行，我们会看到按钮的过渡变得更慢了。我们还可以更改动画的节奏，使其不严格按线性方式从一点移到另一点。让我们将其设置为“缓入、缓出”的运动，如下所示：\n\
  \n`a.timingFunction = [CAMediaTimingFunction functionWithName:`\n`kCAMediaTimingFunctionEaseInEaseOut];`\n\
  \n现在运行，我们会看到，当我们点击按钮时，它开始缓慢移动，然后逐渐加速，移动得更快，等到接近目标时速度又降下来。在底层，这些时间函数通过为从 `0.0` 到\
  \ `1.0` 的值变化提供一个简单的映射来工作，使用一对控制点来描述两者之间的曲线。这听起来是不是很耳熟？这似乎正是我们本章前半部分实现的曲线编辑控件用武之地！我们可以使用曲线编辑器来定义每次点击按钮时将应用于按钮移动的时间函数。\n\
