- '# 动画分组


  我们已经初步了解了 Core Animation 的工作原理，但上述示例略显滑稽——只是在屏幕上随机移动一个按钮。这并非我们推荐的 GUI 设计！在真实开发中，Core
  Animation 最常用于视图之间的过渡动画。你可能已经在 iPhone 上反复看到过这种用法（Core Animation 最初就是为了 iPhone 平台构建的，随后才“回溯”到
  Mac OS X）。iPhone 界面中所有流畅的滑动、缩放和淡入淡出效果都是用 Core Animation 实现的。在 Mac OS X 中，Core Animation
  虽不如此无处不在，但在“日历”应用的周视图切换和 Mission Control 中的屏幕切换等场景中得到了很好的应用。在本节中，我们将学习如何通过将动画分组，使其同时运行，来实现一些漂亮的过渡效果。


  在 Xcode 中，创建一个名为 `FlipIt` 的新 Cocoa 项目，类前缀设置为 `FI`。我们要做的是呈现一个 GUI，用户可以在多个“页面”之间翻转，而
  Core Animation 将负责它们之间的流畅动画。我们将在 nib 文件的空窗口中使用一个盒子来显示内容页面，这些页面本身将保存在一个 `NSTabView`
  中。我们不会显示选项卡视图本身，只是将其作为内容页面的便捷容器。


  我们将从在 `MainMenu.xib` 中布局视图开始，因此在 Interface Builder 画布中打开该文件。从对象库中拖一个按钮到 GUI 的空窗口底部。然后复制该按钮，并将两个按钮的标题分别设置为**上一页**和**下一页**。将两个按钮并排放置在窗口底部中央。打开
