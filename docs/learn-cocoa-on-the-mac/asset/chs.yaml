- "# Tab View 与 App Delegate 的实现\n\nTab view（或任何其他`NSView`子类）放置在 nib 文件的顶层时，加载 nib\
  \ 时不会显示，但只要我们有一个指向它的输出口，就能以任何方式访问和使用它，包括将其放入窗口的视图层次结构中。在我们的案例中，我们永远不会显示 tab view\
  \ 本身，只会显示它包含的内容视图。为了获取这些内容视图，我们需要将其连接到 App Delegate 类。从 Object Dock 中的 tab view\
  \ 按住 Control 键拖动到 Assistant Editor 中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便后续访问。\n\
  \n双击 Object Dock 中的 tab view 条目，可以看到 tab view 出现在没有窗口环绕的界面中，如图 15-8 中 Interface\
  \ Builder 画布的底部所示。它仍然带有调整大小的边框，我们可以在 Interface Builder 中像调整窗口一样调整它的大小。现在调整它的大小，使其与不久前我们放入主窗口的`NSBox`大致相同。\n\
  \n现在让我们向这个 tab view 添加一些内容，即我们可以在其间切换的“页面”。默认情况下，tab view 只包含两个内容视图，但我们增加这个数量（使用\
  \ Attributes Inspector），以便有更多视图可供切换。只要每个页面都有独特的内容以便能轻松看出页面之间的变化，实际内容并不那么重要。一个好的开始是从\
  \ Object Library 中抓取一个 Label，给它设置一个较大的字体，并将其文本改为单词“One”。然后复制这个标签并粘贴到其他每个视图中（我们可以像往常一样使用顶部的标签页在视图之间切换），每次相应地更改文本。为了有趣，还可以为每个页面添加一些独特的项目（这里的表格视图，那里的一组按钮），这样当应用完成时，在页面间切换时会看到更多动态效果。\n\
  \n现在是完善控制器类界面的时候了，我们将注意力转向`FIAppDelegate.h`文件。它目前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们要显示的视图的对象）和`box`（我们将显示这些视图的屏幕上的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用\
  \ tab view 包含所有可用视图的数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。\n\n将粗体行添加到`FIAppDelegate.h`中，以添加所有这些内容。\n\
  \n```objc\n@interface FIAppDelegate : NSObject <NSApplicationDelegate>\n\n@property\
  \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSBox *box;\n@property\
  \ (weak) IBOutlet NSTabView *tabView;\n@property (weak) NSView *leftView;\n@property\
  \ (weak) NSView *rightView;\n@property (weak) NSView *middleView;\n@property (strong)\
  \ NSArray *items;\n@property NSInteger currentTabIndex;\n\n- (IBAction)previous:(id)sender;\n\
  - (IBAction)next:(id)sender;\n\n@end\n```\n\n现在让我们开始在`FIAppDelegate.m`中实现我们的 app\
  \ delegate 类。这个类将包含多个方法，用于准备转换（通过将要显示的下一个视图设置在 box 的侧面），将新视图转换到位置，以及将当前视图转换到另一侧。因为我们需要根据是向右还是向左翻转来支持两个方向的转换，所以每个方法都存在两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动转换的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果你仍然同时打开了\
  \ Interface Builder 画布和 Assistant Editor，你可能想关闭它们，并将`FIAppDelegate.m`切换为 Xcode 中的主视图。\n\
  \n让我们首先创建一个预处理器定义`ANIM_DURATION`，用于定义我们将创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整这个设置直到找到我们喜欢的速度。像这样定义它：\n\
  \n```objc\n#define ANIM_DURATION 1.0\n```\n\n现在让我们转到`applicationDidFinishLaunching:`方法。这里我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是对数组本身的引用。这意味着我们的代码现在拥有由`tabViewItems`调用返回的`NSArray`的所有权。如果我们自己不将其放入`strong`引用中，那么数组副本将没有任何强引用，当自动引用计数清理时它将被释放。\n\
  \n我们还将`currentTabIndex`设置为指向数组的末尾，以便第一个项目能被对齐（更多细节将在后面说明）。然后我们调用第一个内部方法`prepareRightSide`，它将为显示在\
  \ box 右侧的下一个视图做准备。接着我们使用`ANIM_DURATION`值来指定当前动画上下文中创建的任何动画的持续时间。然后我们调用另一个内部方法`transitionInFromRight`，它将启动动画将下一个视图移动到正确位置。最后，我们将`currentTabIndex`设置为指向项目\
  \ 0（`items`数组中的第一个对象）。\n\n```objc\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    self.items = [self.tabView tabViewItems];\n    self.currentTabIndex\
  \ = [self.items count]-1;\n    [self prepareRightSide];\n    [[NSAnimationContext\
  \ currentContext] setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n\
  \    self.currentTabIndex = 0;\n    self.middleView = self.rightView;\n}\n```\n\n\
  当您输入这段代码时，Xcode 会抱怨找不到名为`prepareRightSide`和`transitionInFromRight`的方法。那么，现在让我们编写这两个内部方法的代码。我们不需要将这些方法放入单独的协议或其他东西中。在\
  \ Objective-C 中，代码可以自由调用同一`@implementation`块中声明的任何其他方法，即使这些方法没有在任何`@interface`中声明，所以我们只需将这些内部方法放在`@implementation`块中的某个位置——`applicationDidFinishLaunching:`的实现下方就是一个好位置。\n\
  \n第一个方法`prepareRightSide`首先确定要显示的下一个视图的索引。我们通过将`currentTabIndex`加 1 然后对新索引进行简单的边界检查来计算这个索引，如果索引过大则将其重置为零。然后我们使用该索引获取下一个视图，并将其帧大小设置为与`box`相同，但向右偏移正好`box`的宽度，使其刚好在视野之外。我们将其`alpha`值设置为`0.0`，使其实际上不可见，最后我们将该视图添加为`box`的子视图，这样它就能被实际显示出来。\n\
  \n\n```objc\n- (void)prepareRightSide {\n\n    NSInteger nextTabIndex = self.currentTabIndex\
  \ + 1;\n\n    if (nextTabIndex >= [self.items count])\n\n        nextTabIndex =\
  \ 0;\n\n    self.rightView = [[self.items objectAtIndex:nextTabIndex] view];\n\n\
  \    NSRect viewFrame = [self.box bounds];\n\n    viewFrame.origin.x += viewFrame.size.width;\n\
  \n    [self.rightView setFrame:viewFrame];\n\n    [self.rightView setAlphaValue:0.0];\n\
  \n    [self.box addSubview:self.rightView];\n\n}\n```\n\n下一个方法 `transitionInFromRight`\
  \ 接收 `rightView` 并将其滑入指定位置，使其完美适配 `box` 提供的空间。同时，它还将 alpha 值设置为 1.0，使其完全不透明。请注意，与上一个方法不同，这里使用了\
  \ `rightView` 的 `animator` 方法来访问视图的动画代理，这样设置这些值时就会自动为我们创建隐式动画。\n\n```objc\n- (void)transitionInFromRight\
  \ {\n\n    [[self.rightView animator] setFrame:[self.box bounds]];\n\n    [[self.rightView\
  \ animator] setAlphaValue:1.0];\n\n}\n```\n\n在继续之前，我们先检查一下。运行应用，会看到标签页视图的第一个条目滑入到位，同时从不可见渐变到完全不透明，如图\
  \ 15-9 所示。\n\n![A978-1-4302-4543-8_15_Fig9_HTML.jpg](img/A978-1-4302-4543-8_15_Fig9_HTML.jpg)\n\
  \n**图 15-9.** 第一个“页面”正在滑入视图。注意盒子中的对象呈现略微灰白的外观，此时它们的不透明度大约为 50%\n\n这是一个好的开始！现在让我们继续处理列表中的下一个条目：为\
  \ `next:` 方法提供实现。这段代码与我们在 `applicationDidFinishLaunching:` 方法中的代码有些相似。我们准备右侧视图，启动一些过渡动画（包括调用另一个新的内部方法\
  \ `transitionOutToLeft`，我们稍后会讲到），并在最后更新索引（包括另一次边界检查）和一些指针。\n\n这里最大的区别在于，执行动画的方法都包裹在\
  \ `[NSAnimationContext beginGrouping]` 和 `[NSAnimationContext endGrouping]` 调用之间，这两个调用共同形成了一种事务机制。在这两个调用之间，任何添加到默认动画上下文中的动画（包括所有隐式动画）都将被设置为同时运行。这意味着当我们在内部方法中创建隐式动画时，它们都会被设置为同时触发。如果没有这一步，我们创建的动画将按顺序依次运行，一个接一个地执行。通常情况下这不会有太大问题，但完全有可能在创建这些动画时发生意外事件，例如其他进程突然占用\
  \ CPU，导致这些动画以略微错开的方式运行，开始和结束时间不同。通过像这样将它们包裹在分组中，就消除了这个潜在问题。\n\n```objc\n- (IBAction)next:(id)sender\
  \ {\n\n    [self prepareRightSide];\n\n    [NSAnimationContext beginGrouping];\n\
  \n    [[NSAnimationContext currentContext] setDuration:ANIM_DURATION];\n\n    [self\
  \ transitionInFromRight];\n\n    [self transitionOutToLeft];\n\n    [NSAnimationContext\
  \ endGrouping];\n\n    self.currentTabIndex++;\n\n    if (self.currentTabIndex >=\
  \ [self.items count])\n\n        self.currentTabIndex = 0;\n\n    self.leftView\
  \ = self.middleView;\n\n    self.middleView = self.rightView;\n\n}\n```\n\n`next:`\
  \ 方法还调用了另一个内部方法 `transitionOutToLeft`，该方法会将当前视图向左移出。其实现如下：\n\n```objc\n- (void)transitionOutToLeft\
  \ {\n\n    NSRect newFrame = [self.middleView frame];\n\n    newFrame.origin.x -=\
  \ newFrame.size.width;\n\n    [[self.middleView animator] setFrame:newFrame];\n\n\
  \    [[self.middleView animator] setAlphaValue:0.0];\n\n}\n```\n\n完成这些之后，我们现在可以再次运行了。这次我们不仅能看到初始视图设置正常运作，还能点击“下一个”按钮过渡到下一个视图！非常流畅。见图\
  \ 15-10。\n\n![A978-1-4302-4543-8_15_Fig10_HTML.jpg](img/A978-1-4302-4543-8_15_Fig10_HTML.jpg)\n\
  \n**图 15-10.** 视图三正在退出，视图四已进入约一半\n\n现在剩下的工作就是实现向右过渡的对应方法。这些方法与之前的非常相似，在此不做进一步说明，但有一点要提醒：你可能会想复制粘贴现有方法并修改你能发现的不同之处，但请务必小心！有些差异虽然细微却至关重要。\n\
  \n```objc\n- (void)prepareLeftSide {\n\n    NSInteger previousTabIndex = self.currentTabIndex-1;\n\
  \n    if (previousTabIndex < 0)\n\n        previousTabIndex = [self.items count]-1;\n\
  \n    self.leftView = [[self.items objectAtIndex:previousTabIndex] view];\n\n  \
  \  NSRect viewFrame = [self.box bounds];\n\n    viewFrame.origin.x -= viewFrame.size.width;\n\
  \n    [self.leftView setFrame:viewFrame];\n\n    [self.leftView setAlphaValue:0.0];\n\
  \n    [self.box addSubview:self.leftView];\n\n}\n\n- (void)transitionInFromLeft\
  \ {\n\n    [[self.leftView animator] setFrame:[self.box bounds]];\n\n    [[self.leftView\
  \ animator] setAlphaValue:1.0];\n\n}\n\n- (void)transitionOutToRight {\n\n    NSRect\
  \ newFrame = [self.middleView frame];\n\n    newFrame.origin.x += [self.box bounds].size.width;\n\
  \n    [[self.middleView animator] setFrame:newFrame];\n\n    [[self.middleView animator]\
  \ setAlphaValue:0.0];\n\n}\n\n- (IBAction)previous:(id)sender {\n\n    [self prepareLeftSide];\n\
  \n    [NSAnimationContext beginGrouping];\n\n    [[NSAnimationContext currentContext]\
  \ setDuration:ANIM_DURATION];\n\n    [self transitionInFromLeft];\n\n    [self transitionOutToRight];\n\
  \n    [NSAnimationContext endGrouping];\n\n    self.currentTabIndex--;\n\n    if\
  \ (self.currentTabIndex < 0)\n\n        self.currentTabIndex = [self.items count]-1;\n\
  \n    self.rightView = self.middleView;\n\n    self.middleView = self.leftView;\n\
  \n}\n```\n\n现在点击运行；我们应该能够看到两个方向的动画过渡了。\n\n## 总结\n\n希望上一章和本章为你提供了多种 Cocoa 绘图技术的坚实基础，包括贝塞尔曲线的多种用法、通过鼠标使视图具有交互性，以及使用\
  \ Core Animation 实现轻松动画。由于本书篇幅所限，我们无法深入探讨这些主题，但请记住，尤其是在图形和动画方面，唯一的限制就是你的想象力！我们提供了基础工具。如果你想在图形方面做更多尝试，应该深入探索你最感兴趣的领域，看看能用\
  \ Cocoa 提供的 API 做些什么。这才是真正的乐趣所在！\n\n\n"
- "# 16. 文件操作\n\n## 摘要\n\n大多数应用程序都需要以某种方式处理存储在磁盘上的文件。到目前为止，本书中我们并没有太多涉及这个主题（除了对 Core\
  \ Data 及其数据存储的一些讨论），所以现在我们来弥补这一点。实际上，Cocoa 包含几个有用的类，可以通过多种方式处理文件。有些类提供了模仿用户在 Finder\
  \ 中通常能执行的操作的 API，而另一些类则以抽象方式表示文件。还有一些类内置了读写文件的功能。本章将概述这些机制的工作原理。\n\n## 隐式文件访问\n\n\
  Cocoa 中的几个类，例如 `NSString`、`NSData`、`NSArray` 和 `NSDictionary`，都提供了直接从文件读取数据或将内容直接写入文件的方法，只需使用包含相关文件完整路径的字符串即可。例如，如果我们想将文件的全部内容读取到一个字符串中，可以像下面这样简单地实现：\n\
  \n```\nNSError *myError;\nNSStringEncoding encoding;\nNSString *myString = [NSString\
  \ stringWithContentsOfFile:@\"/path/to/something\"\n                           \
  \                      usedEncoding:&encoding error:&myError];\n```\n\n这段代码将处理打开文件和读取内容的所有繁琐工作。它甚至能告诉我们用于将文件内容解释为字符串的文本编码，并告知发生的任何错误。但前提是我们为第二个和第三个参数传入非\
  \ `NULL` 的值。除了与文件相关的错误（例如权限不足无法访问文件）之外，该方法还能报告与将数据作为字符串处理相关的错误，例如如果文件包含二进制数据，则可能出现文本编码错误。本章后面部分我们将看到它的实际应用。\n\
  \n`NSArray` 和 `NSDictionary` 有类似的方法，但出于某种原因，它们没有像 `NSString` 那样包含错误报告功能，因此如果操作失败，它们只会返回一个\
  \ `nil` 指针，让你摸不着头脑。这些方法也更具有专用性，因为它们旨在从以 Apple 专有属性列表格式存储的文件中读取值。`NSDictionary` 的\
  \ `dictionaryWithContentsOfFile:` 类方法的一个常见用途是读取在文本编辑器或 Xcode 的 plist 编辑器中创建的配置文件中的数据。Cocoa\
  \ 还包含一个名为 `NSPropertyListSerialization` 的专用类来处理属性列表格式。如果我们需要以通用方式解析属性列表，并获得完整的错误报告和更多控制权，可以使用它的类方法\
  \ `propertyListWithData:options:format:error:`（试着连续说五遍）。\n\n在本节开头提到的类中，`NSData`\
  \ 提供了最通用的文件访问。它可以读取磁盘上任何类型的数据，并将其表示为字节数组供我们按需使用。这是处理二进制数据的理想方式。`NSData` 甚至提供了一个选项，用于提示文件应映射到虚拟内存中（以防我们知道文件太大，不想一次性全部加载到内存中），如下所示：\n\
  \n```\nNSData *myData = [NSData dataWithContentsOfFile:@\"/path/to/something\"\n\
  \                                          options:NSDataReadingMappedIfSafe error:\
  \ &myError];\n```\n\n这里提到的每个类还包含一个名为 `writeToFile:atomically:` 的方法，其第二个参数是一个 `BOOL`\
  \ 值，指定是否应先将数据写入一个辅助文件，待所有数据写入完成后，该辅助文件再替换原始文件。此方法的 `NSString` 版本实际上已被弃用，因此我们应改用\
  \ `writeToFile:atomically:encoding:error:`，这迫使我们指定要使用的文本编码，并让我们有机会检查可能发生的任何错误。`NSData`\
  \ 提供了类似的 `writeToFile:options:error:`，也让我们有机会查看写入文件时发生的任何错误。\n\n## 高级文件操作\n\n除了读写文件的基础功能外，Cocoa\
  \ 还提供了许多类，让我们能够以类似于 Finder 处理文件的方式来处理文件。我们可以访问文件系统属性、获取文件图标、查看哪个应用程序将默认打开此文件，以及更多功能。本章的剩余部分将在名为“这个文件怎么回事？”（见图\
  \ 16-1）的新应用程序的背景下，探讨其中一些功能。\n\n此应用程序允许用户选择一个文件，然后显示该文件的一些信息，以及以字符串形式显示的文件内容。如果文件包含无法表示为字符的数据，它会告知用户。否则，用户可以使用内置的弹出列表更改读取文件时使用的文本编码，并显示结果字符串。\n\
  \n![A978-1-4302-4543-8_16_Fig1_HTML.jpg](img/A978-1-4302-4543-8_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 完成的“这个文件怎么回事？”应用程序\n\n\n\n### 关于那个文件：代码部分\n\n使用 Xcode 创建一个新的 Cocoa 应用（这次不启用\
  \ Document 支持或 Core Data），命名为 `WhatAboutThatFile`，然后执行常规步骤，确保启用了 ARC，并为项目指定一个类前缀，此处为\
  \ `WAT`。这会创建一个简单的项目，仅包含一个 `WATAppDelegate` 类和一个名为 `MainMenu.xib` 的 xib 文件。在之前的章节中，我们一步步地构建应用程序，但既然我们已经走到了这一步，不如来接手更大的应用代码块。我们将展示应用的完整代码，并穿插一些注释说明，然后描述如何使用\
  \ Cocoa 绑定在 Interface Builder 中将所有内容连接起来。首先，这是应用委托的头文件，它声明了大量用于通过 Cocoa 绑定访问值的属性。它还声明了一个动作方法，让用户可以从菜单中打开一个文件。\n\
  \n```\n//\n//  WATAppDelegate.h\n//\n\n#import <Cocoa/Cocoa.h>\n\n@interface WATAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (strong) NSFileWrapper *fileWrapper;\n@property (strong) NSURL *fileURL;\n\
  @property (assign) NSStringEncoding chosenEncoding;\n@property (readonly) NSDictionary\
  \ *fileAttributes;\n@property (readonly) NSString *filename;\n@property (readonly)\
  \ NSImage *fileIcon;\n@property (readonly) NSImage *opensAppIcon;\n@property (readonly)\
  \ NSString *opensAppName;\n@property (weak) NSString *stringEncodingName;\n@property\
  \ (readonly) NSString *fileStringValue;\n@property (readonly) NSDictionary *encodingNames;\n\
  - (IBAction)chooseFile:(id)sender;\n\n@end\n```\n\n现在，我们来看一下 `.m` 文件。默认情况下，它包含了\
  \ `applicationDidFinishLaunching:` 方法，但我们在应用运行时不需要配置任何东西，所以可以忽略它，继续做我们自己的事情。\n\n\
  `chooseFile:` 方法使用 `NSOpenPanel` 类来让用户选择一个要检查的文件。如果用户确实选择了一个文件，我们会根据选择设置所有实例变量。`chosenEncoding`\
  \ 属性的类型是 `NSStringEncoding`（本质上就是一个无符号整数），被设置为 0。这不是一个有效的字符串编码类型，这样在后续阶段我们可以让系统尝试为我们推断字符串编码类型。之后，我们根据打开面板中的选择设置\
  \ `fileURL`，最后设置 `fileWrapper`，它是 `NSFileWrapper` 类的一个实例，只是简单地包装一个文件，让我们可以获取一些关于它的元数据，这些元数据基于\
  \ `fileURL` 的值。其中还包含一些错误处理逻辑，以防所选文件出现问题。\n\n```\n- (IBAction)chooseFile:(id)sender\n\
  {\n    NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n    [openPanel setCanChooseFiles:YES];\n\
  \    [openPanel setCanChooseDirectories:NO];\n    [openPanel setResolvesAliases:NO];\n\
  \    [openPanel setAllowsMultipleSelection:NO];\n\n    if ([openPanel runModal]\
  \ == NSFileHandlingPanelOKButton) {\n        self.chosenEncoding = 0;\n        self.fileURL\
  \ = [openPanel URL];\n        NSError *fileError;\n        self.fileWrapper = [[NSFileWrapper\
  \ alloc] initWithURL:self.fileURL\n                                            \
  \          options:0\n                                                        error:&fileError];\n\
  \        if (!self.fileWrapper) {\n            NSRunAlertPanel(@\"无法访问文件\",\n  \
  \                          [fileError localizedDescription], nil, nil, nil);\n \
  \       }\n    }\n}\n```\n\n接下来，我们有 `filename` 和 `fileIcon` 方法，它们将被窗口中最上层的 GUI 对象读取。请注意，这种读取是通过\
  \ Cocoa 绑定发生的，因此我们按照约定提供了名为 `keyPathsForValuesAffectingFilename` 和 `keyPathsForValuesAffectingFileIcon`\
  \ 的类方法，以确保对一个绑定友好值的更改会导致另一个值被重新获取。我们上次在 Core Data 模型类中使用了这种方法，但在这里它同样适用，确保每当 `fileURL`\
  \ 或 `fileWrapper` 值发生变化时，任何将内容绑定到 `filename` 或 `fileIcon` 的视图都会自动重新加载其内容。`filename`\
  \ 和 `fileIcon` 方法都使用之前创建的 `fileWrapper` 来获取要显示的值。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFilename\n\
  {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\n\
  - (NSString *)filename\n{\n    return [self.fileWrapper filename];\n}\n\n+ (NSSet\
  \ *)keyPathsForValuesAffectingFileIcon\n{\n    return [NSSet setWithObjects:@\"\
  fileURL\", @\"fileWrapper\", nil];\n}\n\n- (NSImage *)fileIcon\n{\n    return [self.fileWrapper\
  \ icon];\n}\n```\n\n我们提供了类似的功能来显示关于某个应用的信息，这个应用是用户在 Finder 中双击所选文件时会被启动的。这次，我们使用了\
  \ `NSWorkspace` 类，它代表类似 Finder 本身的东西。`NSWorkspace` 可以执行许多操作，例如启动应用程序和操作文件。在 `opensAppName`\
  \ 中，我们使用工作空间来获取作为所选文件默认“打开程序”的应用的名称。在 `opensAppIcon` 中，我们做同样的事情，然后向工作空间请求该应用的图标。再次，我们使用\
  \ `keyPathsForValuesAffectingXxx` 约定来确保这些值在选择新文件时被正确刷新。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingOpensAppName\n\
  {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\n\
  - (NSString *)opensAppName {\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
  \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path application:&appName\
  \ type:NULL];\n    return appName;\n}\n\n+ (NSSet *)keyPathsForValuesAffectingOpensAppIcon\n\
  {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\n\
  - (NSImage *)opensAppIcon\n{\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
  \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path application:&appName\
  \ type:NULL];\n    return appName ? [workspace iconForFile:appName] : nil;\n}\n\
  ```\n\n在接下来的代码片段中，`fileAttributes` 访问器返回一个字典，它从 `fileWrapper` 获取。这个字典包含十几个或更多的文件系统属性，并将通过使用\
  \ `NSDictionaryController` 在 GUI 的表格视图中显示。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFileAttributes\
  \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
  \n- (NSDictionary *)fileAttributes {\n    return [self.fileWrapper fileAttributes];\n\
  }\n```\n\n现在我们进入字符串编码这一比较棘手的问题。如前所述，`NSString` 提供了从文件读取字符串并猜测应使用哪种字符串编码的功能。大多数时候这可能是正确的，但有时换个角度看待字符串的内容可能会很有用。例如，看看一个现代的\
  \ UTF8 文档，如果在一个其他平台上不识别字符串编码且始终使用它唯一可用编码的古老应用中查看，会是什么样子，这可能会带来一些启发。\n\n\n\n我们首先定义`encodingNames`方法。这个方法将向\
  \ GUI 中的弹出按钮提供所有系统定义的编码名称列表，同时还将作为内部查找机制，用于在编码名称及其代码级表示（`NSStringEncoding`类型）之间进行映射。对于键，该字典使用每个编码的数值，并将其包装在`NSString`中。你可能会认为，鉴于这些值的数值性质，将它们包装在`NSNumber`对象中会更有意义，你是对的，但有一个小小的例外：如果你在键值观察（KVO）上下文中使用`NSDictionary`，例如\
  \ Cocoa Bindings，则必须使用字符串作为键！因为我们正通过 Cocoa Bindings 使用这个字典来填充对象，所以这就是我们这样做的原因。\n\
  \n```\n- (NSDictionary *)encodingNames\n\n{\n\nstatic NSDictionary *encodingNames\
  \ = nil;\n\nif (!encodingNames) {\n\nencodingNames = @{@\"1\" : @\"NSASCIIStringEncoding\"\
  ,\n\n@\"2\" : @\"NSNEXTSTEPStringEncoding\",\n\n@\"3\" : @\"NSJapaneseEUCStringEncoding\"\
  ,\n\n@\"4\" : @\"NSUTF8StringEncoding\",\n\n@\"5\" : @\"NSISOLatin1StringEncoding\"\
  ,\n\n@\"6\" : @\"NSSymbolStringEncoding\",\n\n@\"7\" : @\"NSNonLossyASCIIStringEncoding\"\
  ,\n\n@\"8\" : @\"NSShiftJISStringEncoding\",\n\n@\"9\" : @\"NSISOLatin2StringEncoding\"\
  ,\n\n@\"10\" : @\"NSUnicodeStringEncoding\",\n\n@\"11\" : @\"NSWindowsCP1251StringEncoding\"\
  ,\n\n@\"12\" : @\"NSWindowsCP1252StringEncoding\",\n\n@\"13\" : @\"NSWindowsCP1253StringEncoding\"\
  ,\n\n@\"14\" : @\"NSWindowsCP1254StringEncoding\",\n\n@\"15\" : @\"NSWindowsCP1250StringEncoding\"\
  ,\n\n@\"21\" : @\"NSISO2022JPStringEncoding\",\n\n@\"30\" : @\"NSMacOSRomanStringEncoding\"\
  ,\n\n@\"2415919360\" : @\"NSUTF16BigEndianStringEncoding\",\n\n@\"2483028224\" :\
  \ @\"NSUTF16LittleEndianStringEncoding\",\n\n@\"2348810496\" : @\"NSUTF32StringEncoding\"\
  ,\n\n@\"2550137088\" : @\"NSUTF32BigEndianStringEncoding\",\n\n@\"2617245952\" :\
  \ @\"NSUTF32LittleEndianStringEncoding\"};\n\n}\n\nreturn encodingNames;\n\n}\n\
  ```\n\n继续我们在字符串编码方面的工作，我们现在将定义`stringEncodingName`的存取器，这次在混合中增加了一个设置器（因为这个值可以通过弹出按钮设置）。和之前一样，我们实现了`keyPathsForValuesAffectingStringEncodingName`，这次将`chosenEncoding`添加为要监视的键之一。\n\
  \n`stringEncodingName`方法有两个主要执行路径。如果`chosenEncoding`已被设置（即用户从弹出列表中选择了编码的情况），我们只需在我们之前定义的字典中查找所选编码的名称。否则，我们实际上使用`stringWithContentsOfFile:usedEncoding:error:`来读取文件内容，并使用得到的编码来查找所发现编码的名称（如果未发现任何编码，则返回一个简短的问题描述）。\n\
  \n`setStringEncodingName:`方法非常简单。我们在字典中进行反向查找，以找到与所选编码对应的键（一个包含编码整数值的字符串）。当用户在弹出窗口中选择一个编码名称时，将调用此方法。\n\
  \n```\n+ (NSSet *)keyPathsForValuesAffectingStringEncodingName\n\n{\n\nreturn [NSSet\
  \ setWithObjects:@\"fileURL\", @\"fileWrapper\",\n\n@\"chosenEncoding\", nil];\n\
  \n}\n\n- (NSString *)stringEncodingName\n\n{\n\nif (!self.fileURL) return nil;\n\
  \nif (self.chosenEncoding != 0) {\n\nreturn [[self encodingNames] objectForKey:\n\
  \n@(self.chosenEncoding).stringValue];\n\n} else {\n\nNSStringEncoding encoding\
  \ = 0;\n\nNSError *err = nil;\n\n[NSString stringWithContentsOfFile:self.fileURL.path\n\
  \nusedEncoding:&encoding error:&err];\n\nif (encoding==0) {\n\nreturn @\"未检测到编码，可能是一个二进制文件？\"\
  ;\n\n}\n\nreturn [[self encodingNames] objectForKey:\n\n@(self.chosenEncoding).stringValue];\n\
  \n}\n\n}\n\n- (void)setStringEncodingName:(NSString *)name\n\n{\n\nNSString *key\
  \ = [[[self encodingNames] allKeysForObject:name]\n\nlastObject];\n\nself.chosenEncoding\
  \ = [key longLongValue];\n\n}\n```\n\n最后是`fileStringValue`及其匹配的`keyPathsForValuesAffectingFileStringValue`方法。这里我们也有两个主要的代码路径。在第一种情况下，当`chosenEncoding`已被设置时，我们尝试使用所选编码从所选文件中读取一个字符串值。在另一种情况下，当未选择编码时，我们尝试读取一个字符串值，但让系统尝试找出使用哪种编码。无论哪种情况，我们都会做一些错误检查，并在遇到特定字符串编码错误时显示一个警告面板。\n\
  \n```\n+ (NSSet *)keyPathsForValuesAffectingFileStringValue\n\n{\n\nreturn [NSSet\
  \ setWithObjects:@\"fileURL\", @\"fileWrapper\",\n\n@\"chosenEncoding\", nil];\n\
  \n}\n\n- (NSString *)fileStringValue\n\n{\n\nif (!self.fileURL) return nil;\n\n\
  NSError *err = nil;\n\nNSString *value = nil;\n\nif (self.chosenEncoding != 0) {\n\
  \nvalue = [NSString stringWithContentsOfFile:self.fileURL.path\n\nencoding:self.chosenEncoding\
  \ error:&err];\n\n} else {\n\nNSStringEncoding encoding = 0;\n\nvalue = [NSString\
  \ stringWithContentsOfFile:self.fileURL.path\n\nusedEncoding:&encoding error:&err];\n\
  \n}\n\nif (err)  {\n\nif ([err code]==NSFileReadInapplicableStringEncodingError\
  \ &&\n\n[[err domain] isEqual:NSCocoaErrorDomain]) {\n\nNSRunAlertPanel(@\"无效的字符串编码\"\
  ,\n\n[err localizedDescription], nil, nil, nil);\n\n}\n\nNSLog(@\"遇到错误: %@\", err);\n\
  \n}\n\nreturn value;\n\n}\n```\n\n\n### 关于那个文件：图形界面\n\n就代码层面而言，就是这样了。现在我们来设置图形界面。打开\
  \ `MainMenu.xib`，我们首先要建立一个连接，以便菜单项能调用我们应用委托的 `chooseFile:` 方法。在主 nib 编辑区内打开菜单，进入“文件”菜单，按住\
  \ Ctrl 键从“打开”项拖出一条连接线，指向主 nib 窗口中代表应用委托的图标。然后从弹出的小菜单中选择 `chooseFile:`。\n\n现在是时候处理窗口本身了，所以双击\
  \ dock 中的窗口图标，使其出现在编辑区。这个图形界面完全由 Cocoa 绑定驱动。我们的控制器没有任何插座指向此窗口中的任何对象，窗口中也没有任何对象调用我们控制器中的任何动作方法。我们将逐一讲解所有绑定，但首先，图\
  \ 16-2 展示了在 Interface Builder 中看到的完整窗口视图，所有对象均已选中。\n\n![A978-1-4302-4543-8_16_Fig2_HTML.jpg](img/A978-1-4302-4543-8_16_Fig2_HTML.jpg)\n\
  \n**图 16-2.** 我们所有的窗口组件，已高亮显示以便查看\n\n注意，在表视图和大的文本视图之间有一个小的“凹痕”。这实际上是 `NSSplitView`\
  \ 的可拖动控件，它允许我们垂直或水平堆叠两个视图，并通过一次拖拽同时调整两者的大小。它常在 Xcode 及其他地方使用，稍后我们将看到如何在这里设置它。\n\n\
  现在，让我们开始逐步创建这个窗口，一边创建一边连接所有绑定。前几个对象最终应看起来像图 16-3，因此可以提前查看以获得一些指导。在窗口顶部附近，放置几个标签，并将左侧标签的标题改为“所选文件：”。然后在其间放置一个\
  \ `NSImageView`。要找到此类，请在库中搜索“`NSImageView`”、“image well”或“image view”。通过选中左侧标签，然后从菜单中选择“编辑”➤“格式”➤“字体”➤“粗体”，使其以粗体显示，并将右侧标签拉宽，使其几乎延伸到窗口的右边缘。我们希望图像视图显示的文件图标看起来像是浮在窗口背景上，因此选中图像视图，并使用属性检查器，从“边框”弹出菜单中选择“无”来移除其边框。同时，将“缩放”弹出菜单改为“按比例上下缩放”，这样无论系统提供的是小图标还是大图标，它都会被缩放以适应可用空间。此时图形界面应如图\
  \ 16-3 所示。\n\n![A978-1-4302-4543-8_16_Fig3_HTML.jpg](img/A978-1-4302-4543-8_16_Fig3_HTML.jpg)\n\
  \n**图 16-3.** 用于显示所选文件图标和路径的图形界面。此截图选中了图像视图；否则它是不可见的\n\n现在是时候设置图像视图和右侧标签的绑定了。选中图像视图，打开绑定检查器，使用\
  \ `self.fileIcon` 键路径将其值绑定到应用委托。然后选中右侧的标签，使用 `self.filename` 键路径将其值绑定到应用委托。\n\n\
  窗口的下一部分看起来就像我们之前创建的一样。实际上，添加这些对象最快的方法是，拖一个框选中上面显示的三个对象，按 ⌘D 复制所选对象，然后将新对象拖下来，排列在其他对象下方。将新左侧标签的标题改为“打开应用：”，并根据需要调整其位置。图\
  \ 16-4 展示了效果。\n\n![A978-1-4302-4543-8_16_Fig4_HTML.jpg](img/A978-1-4302-4543-8_16_Fig4_HTML.jpg)\n\
  \n**图 16-4.** 图形界面的这一部分将让我们看到文件是用哪个应用打开的。此处两个图像视图都已显示，因为否则，就像之前一样，它们是不可见的\n\n重新配置新图像视图的绑定，使用\
  \ `self.opensAppIcon` 键路径将其值连接到应用委托，然后使用 `self.opensAppName` 键路径将右侧标签的值连接到应用委托。\n\
  \n接下来，我们继续处理表视图。从库中拖出一个表视图，并将其加宽，使其与图 16-5 相符。\n\n![A978-1-4302-4543-8_16_Fig5_HTML.jpg](img/A978-1-4302-4543-8_16_Fig5_HTML.jpg)\n\
  \n**图 16-5.** 我们将在此处显示文件的所有属性\n\n这个表视图将包含系统提供给我们的所有文件属性。这些属性以字典形式提供，这正好适合使用 Apple\
  \ 的 `NSDictionaryController` 类。使用 `NSDictionaryController`，只需通过 Cocoa 绑定进行连接，我们就能够在表视图中将所有选中文件的属性显示为键值对。\n\
  \n在库中搜索 `NSDictionaryController`，并将其拖到 Interface Builder 的 dock 中，以便将其添加到 nib 文件中。然后点击\
  \ dock 中其图标旁边的文本，将其重命名为 `attrDict`，以便稍后绑定时能轻松识别。与其他包含的控制器类一样，字典控制器类能够通过绑定获取其内容。使用绑定检查器，将其“内容字典”（位于“控制器内容”组中）绑定到应用委托的\
  \ `self.fileAttributes` 键路径。\n\n现在我们只需将表视图的列绑定到新的控制器。选中左列，使用绑定检查器，将其“值”列绑定到 `attrDict`，使用\
  \ `arrangedObjects` 作为控制器键，`key` 作为键路径。这将使得左列显示字典中每个键值对的键。现在选中右列，将其“值”列绑定到 `attrDict`，使用\
  \ `arrangedObjects` 作为控制器键，`value` 作为模型键路径。\n\n接下来，从库中选取一个 `NSTextView`，将其拖入我们正在创建的窗口中，放置在靠近底部的位置。我们的窗口开始变得有点拥挤了！同时减小表视图和文本视图的高度，使它们能够舒适地上下堆叠，并在下方留出相当大的空间，因为我们后面会用到。然后调整文本视图的大小，使其宽度与表视图相同。所有这些如图\
  \ 16-6 所示。\n\n![A978-1-4302-4543-8_16_Fig6_HTML.jpg](img/A978-1-4302-4543-8_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 将文本视图正确放置在表视图下方之后，窗口应呈现的样子\n\n当我们从库中拖出一个文本视图时，它实际上包含在一个滚动视图中，因此需要额外点击一下以选中滚动视图内部的文本视图。然后使用属性检查器取消选中“可编辑”复选框（我们只想在这里显示文件，而不是编辑它）以及“富文本”复选框。现在正是引入\
  \ `NSSplitView` 的好时机，正如之前所提示的那样。确保表视图和文本视图（实际上是包含它的滚动视图）大小大致相同，并将它们上下对齐。然后选中两者，从菜单中选择“编辑器”➤“嵌入”➤“分割视图”。这样做会将它们紧密排列，并在其间绘制出那个小凹痕。\n\
  \n现在再次只选中文本视图。请记住，我们可以通过按住 Shift-Ctrl 键并点击文本视图，然后从显示的对象堆栈中选择文本视图，来避免选择视图层次结构中正确对象时的歧义和额外步骤。切换到绑定检查器，将文本视图的值绑定到应用委托的\
  \ `self.fileStringValue` 键路径。\n\n\n好的，这是根据您的要求翻译的中文版本：\n\n\n最后，我们将为字符串编码列表提供一个图形界面，用于重新解释所选文件的内容。为此，我们需要从库中添加一个标签和一个弹出按钮。按照图示布局它们，包括一个特别宽的弹出按钮，因为列表中的某些条目会很长（见图\
  \ 16-7）。\n\n![A978-1-4302-4543-8_16_Fig7_HTML.jpg](img/A978-1-4302-4543-8_16_Fig7_HTML.jpg)\n\
  \n**图 16-7.**\n\n说真的，谁会不希望自己的弹出按钮宽到足以完整显示“NSUTF32LittleEndianStringEncoding”呢？\n\
  \n弹出列表的值将从应用委托的`encodingNames`方法中获取，因此我们无需在 Interface Builder 中输入它们。这里我们将再次使用`NSDictionaryController`，但这次仅显示`encodingNames`字典中的值。为此，我们需要先从库中拖拽另一个`NSDictionaryController`到\
  \ nib 窗口中，同时将其重命名为`strEncs`，并将其 Content Dictionary 绑定到应用委托的`self.encodingNames`键路径。然后，将弹出按钮的\
  \ Content 绑定到`strEncs`，使用`arrangedObjects`作为控制器键，`value`作为模型键路径。\n\n最后，我们需要建立一个绑定，以便用户在弹出按钮中设置的值能被应用委托感知，从而让应用委托使用所选编码重新显示文本。通过将弹出按钮的\
  \ Selected Object 绑定到应用委托，并使用`self.stringEncodingName`作为键路径来实现这一点。\n\n现在保存所有更改，并构建并运行（Build\
  \ & Run）应用。我们应该能看到构建好的 GUI，其中包含一个“文件 ➤ 打开”菜单项，允许我们选择文件，并显示文件的属性及其内容。从弹出列表中选择另一种编码将让应用使用所选编码在文本视图中重新显示数据。\n\
  \n## 总结\n\n在本章中，我们学习了如何使用 Cocoa 访问文件及其元数据。我们还了解了一些关于字符串编码的知识，以及 Cocoa 如何处理它们。更重要的是，我们看到了另一个由\
  \ Cocoa 绑定驱动的 GUI 示例。除了打开文件的菜单项外，这里发生的一切都是通过绑定实现的，包括在弹出列表中设置值，最终导致文本字段重新加载。这是一个相当复杂的交互过程，在你适应之前，它的工作原理并不明显，因为部分操作在幕后进行，这要归功于\
  \ Cocoa 绑定。如果你还不太理解它的工作方式，不妨重读本章，看看是否能更接近那个豁然开朗的“啊哈！”时刻。否则，请继续阅读下一章，学习如何使用并发来让我们的应用程序响应更迅速。\n\
  \n"
- '# 17. 并发


  **摘要**


  软件开发中最大的挑战之一，是编写能够同时执行多个任务的软件。几十年来，计算机通过高速在任务间切换来给人一种并发执行的假象，使其看似在同时做多件事（而实际上它们只是在不停地从一个任务切换到另一个任务，一次只“关注”一个任务）。如今的计算机通常包含两个或更多计算核心，因此它们确实可以同时执行多件事，在所有核心上同时执行指令。


  然而，即使计算机的硬件和操作系统能够与多核心协同工作，编写能够有效利用多核心的应用程序软件在技术上仍然具有挑战性。在大多数开发环境中，默认假设是我们编写的代码是顺序执行的，一个操作接着另一个操作，而将工作拆分以便可以并发执行可能是一项相当艰巨的任务。


  本章将展示一个常见场景的示例，在该场景中 Cocoa 应用程序可以从并发中受益，并演示如何实现。你一定熟悉 OS X 的旋转磁盘光标（有时称为“旋转沙滩球死亡之兆”），每当应用程序对用户操作无响应时就会出现。这通常出现在我们点击某个按钮或菜单项，触发了任何需要几秒钟以上时间的处理时。OS
  X 会注意到进程没有处理输入事件，并显示旋转磁盘光标以提醒用户。当应用程序完全停止响应并即将崩溃（或被用户强制关闭）时，也会发生这种情况。因此，当应用停止响应并开始显示旋转磁盘光标时，许多用户的即时反应是恐慌，怀疑应用即将崩溃！


  因此，为了我们的最佳利益，必须确保应用程序中任何长时间运行的操作都以这样一种方式处理：用户仍然可以与应用程序交互，并且不会看到旋转磁盘——即让操作在后台进行，同时让应用程序像平常一样处理用户输入事件。本章将演示两种以最少的麻烦向
  Cocoa 应用程序添加此类并发的方法。我们将使用 Foundation 框架中可用的`NSOperation`和`NSOperationQueue`类所体现的概念，还将看到如何使用
  Grand Central Dispatch（以下简称 GCD）来实现这一点，这是一个所有 OS X 应用程序（无论是否基于 Cocoa）都能使用的 C 语言
  API。




  '
- "# SlowWorker\n\n作为展示这些并发选项的平台，我们将创建一个名为 `SlowWorker` 的简单应用程序，它模拟执行一些长时间运行的操作，例如从服务器获取数据和执行计算。该应用为用户提供一个按钮来启动某项工作，并在文本视图中显示结果（见图\
  \ 17-1）。\n\n![A978-1-4302-4543-8_17_Fig1_HTML.jpg](img/A978-1-4302-4543-8_17_Fig1_HTML.jpg)\n\
  \n图 17-1. SlowWorker 的运行状态（或者说“静止状态”？）\n\n首先，在 Xcode 中创建一个新的 Cocoa 应用程序。将其命名为 `SlowWorker`，并使用\
  \ `SW` 作为类前缀。不需要 Core Data 或文档支持。完成后，将以下粗体代码添加到 `SWAppDelegate.h` 中：\n\n```\n#import\
  \ <Cocoa/Cocoa.h>\n\n@interface SWAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSButton\
  \ *startButton;\n@property (assign) IBOutlet NSTextView *resultsTextView;\n@property\
  \ (assign) BOOL isWorking;\n\n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n这定义了两个指向\
  \ GUI 中可见对象的输出口、一个名为 `isWorking` 的布尔标志（我们稍后将用它来跟踪后台是否有任务正在运行），以及一个将由按钮触发的操作方法。\n\
  \n**注意：** 目光敏锐的读者会发现 `resultsTextView` 属性使用了 `assign` 而非 `weak` 声明。这是因为 `NSTextView`\
  \ 禁止我们在弱引用上下文中使用它，就像第 11 章中讨论的 `NSWindow` 一样。在 OS X 中，没有多少类有这种限制，但你可以放心，当你尝试对不支持的类使用弱引用时，Xcode\
  \ 会给出令人困惑的“不允许合成弱引用不可用的属性”错误。这就是向后兼容的代价。\n\n现在，将以下代码块中的粗体方法添加到 `SWAppDelegate.m`\
  \ 中：\n\n```\n#import \"SWAppDelegate.h\"\n\n@implementation SWAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification\n{\n    // 在此处插入代码以初始化您的应用程序\n}\n\n- (NSString *)fetchSomethingFromServer\n\
  {\n    sleep(1);\n    return @\"Hi there\";\n}\n\n- (NSString *)processData:(NSString\
  \ *)data\n{\n    sleep(2);\n    return [data uppercaseString];\n}\n\n- (NSString\
  \ *)calculateFirstResult:(NSString *)data\n{\n    sleep(3);\n    return [NSString\
  \ stringWithFormat:@\"Number of chars: %ld\",\n            [data length]];\n}\n\n\
  - (NSString *)calculateSecondResult:(NSString *)data\n{\n    sleep(4);\n    return\
  \ [data stringByReplacingOccurrencesOfString:@\"E\"\n                          \
  \                withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\n{\n  \
  \  NSDate *startTime = [NSDate date];\n    NSString *fetchedData;\n    NSString\
  \ *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\n    self.isWorking\
  \ = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n    _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \      @\"Fetched: %@\\n\", fetchedData];\n\n    processed = [self processData:fetchedData];\n\
  \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                              @\"Processed: %@\\n\", processed];\n\n    firstResult\
  \ = [self calculateFirstResult:processed];\n    secondResult = [self calculateSecondResult:processed];\n\
  \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                              @\"First Result: [%@]\\nSecond Result: [%@]\\n\\\
  n\",\n                              firstResult, secondResult];\n\n    NSDate *endTime\
  \ = [NSDate date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime\
  \ timeIntervalSinceDate:startTime]);\n\n    self.isWorking = NO;\n}\n\n@end\n```\n\
  \n注意，这个类的工作（实际上就是这样）被拆分成若干小块。这段代码只是为了模拟一些缓慢的活动，这些方法本身实际上并没有耗费多少时间。所以，为了使其更有趣，每个方法都包含一个对\
  \ `sleep()` 函数的调用，这使得程序（具体来说是调用该函数的线程）在给定的秒数内暂停并什么都不做。`doWork:` 方法还在开头和结尾处包含了计算所有工作完成所需时间的代码。\n\
  \n现在，打开 `MainMenu.xib`，将一个 `NSButton` 和一个 `NSTextView` 放入空窗口中，按图 17-1 所示进行布局。将应用委托的两个输出口连接到相应的控件，并将按钮的动作连接回应用委托的\
  \ `doWork:` 方法。然后稍微配置一下 `NSTextView`，删除视图中的示例文本，并在属性检查器中取消选中 **Editable** 复选框。\n\
  \n现在保存工作，并在 Xcode 中点击 **Run**。应用程序应启动，点击按钮后，它将运行大约十秒钟（所有 sleep 时间的总和），然后才显示结果。大约五六秒后，鼠标光标将变成旋转的磁盘光标，并一直保持到工作完成。我们放置在窗口中的\
  \ `NSTextView` 直到最后都是空白的，尽管我们的代码偶尔会尝试更新其内容，这是因为需要重绘显示的主线程“卡住”了，正在处理所有后台任务。此外，在整个过程中，应用程序的菜单以及窗口控件都无法响应。实际上，除了通过\
  \ Mac OS X 的“强制退出”窗口来终止它之外，我们唯一能与应用程序交互的方式就是移动它的窗口，因为操作系统本身会处理这个操作。这正是我们要避免的状况！在这种特定情况下，情况并不算太糟，因为应用程序似乎只是挂起了几秒钟。但是，如果您的应用经常以这种“沙滩球”方式挂起远超过这个时间，那么您最终将招致一些不满的用户——甚至可能是一些前用户！\n\
  \n\n\n"
- "# 线程基础\n\n在开始实现解决方案之前，我们先来回顾一下并发编程中的一些基础知识。这远非 OS X 或通用线程技术的完整描述，如需深入了解，请参考其他资料。这里仅讲解足够理解本章内容所需的知识。\n\
  \n在大多数现代操作系统（当然包括 OS X）中，除了包含磁盘上程序运行实例的进程概念外，还有执行线程的概念。每个进程可由多个并发运行的线程组成。如果仅有一个处理器核心，操作系统会在多个线程间切换执行，就像在多个进程间切换一样。如果存在多个核心，线程会像进程一样分布在各个核心上。\n\
  \n进程内的所有线程共享相同的可执行程序代码和全局数据。每个线程还可以拥有自己独有的数据。线程可以使用一种称为互斥锁（mutex，mutual exclusion\
  \ 的缩写）或锁（lock）的特殊结构，它能确保某段代码不会同时被多个线程执行。当多个线程同时访问相同数据时，这种机制通过在某个线程更新值（即代码的\"临界区\"\
  ）时锁定其他线程，来确保结果的正确性。例如，假设我们的应用程序实现了一个银行系统，账户余额可以在交易中被修改。在多线程系统中，我们需要保护对账户余额进行加减操作的代码段，以消除两个线程同时修改余额的可能性。否则，两个线程可能会几乎同时读取旧余额，然后各自写回自己计算的新余额，而完全忽略对方所做的更改（即\"\
  竞态条件\"），最终导致状态错误：最后设置值的线程成为\"赢家\"，另一个线程对余额的更改就此丢失。\n\n处理线程时一个常见问题是代码的线程安全性。有些软件库在设计时就考虑了并发性，其所有临界区都恰当地用互斥锁保护。而有些代码库则没有这样做。例如，在\
  \ Cocoa 中，AppKit 框架（包含构建 GUI 应用程序专用的类，如 `NSApplication`、`NSView` 及其所有子类等）大部分都不是线程安全的。这意味着在运行的\
  \ Cocoa 应用程序中，所有涉及 AppKit 对象的方法调用都应在同一线程（通常称为主线程）中执行。如果从其他线程访问 AppKit 对象，后果不可预测，很可能会遇到看似无法解释的错误。默认情况下，Cocoa\
  \ 应用程序的所有操作（例如处理用户事件触发的操作）都在主线程中进行，因此对于简单应用无需担心。用户触发的操作方法本身就运行在主线程中。本书至此，我们的代码一直仅在主线程中运行，但这个情况即将改变。\n\
  \n## 工作单元\n\n刚才描述的线程模型的问题是，对于普通程序员而言，编写无错误的多线程代码几乎是不可能的。这并不是对我们行业或普通程序员能力的批判，而是一个客观观察。在多线程间同步数据和操作时，代码中需要考虑的复杂交互对大多数人来说实在太难应对。试想一下，在所有人群中只有\
  \ 5% 的人有能力编写软件。而这 5% 中仅有一小部分真正有能力编写高负载的多线程应用。即使是成功实现过多线程开发的人，也常常建议他人不要效仿他们的做法！\n\
  \n幸运的是，希望犹存。无需过多涉及底层线程操作，也能实现一定的并发性。就像我们无需直接操作视频 RAM 的位就能在屏幕显示数据，无需直接与磁盘控制器交互就能从磁盘读取数据一样，存在一些软件抽象层，让我们可以在多个线程上运行代码，而无需直接处理线程本身。Apple\
  \ 鼓励我们使用的解决方案，核心思想是将长时间运行的任务拆分为工作单元，并将这些单元放入队列中执行。系统为我们管理队列，在多个线程上执行工作单元。我们无需直接启动和管理后台线程，也无需处理通常实现并发应用时所需的许多\"\
  簿记\"工作。系统会替我们处理这些。\n\n## 操作队列\n\n自 OS X 10.5 发布以来，Apple 为我们提供了 `NSOperation` 和 `NSOperationQueue`\
  \ 这对类，它们协同工作以实现操作队列。其理念是将计算任务拆分为块或工作单元，将每个单元封装在 `NSOperation` 中，然后将每个操作放入 `NSOperationQueue`。我们还可以建立操作间的依赖关系，指定某个操作必须等另一个操作完成后才能开始执行。`NSOperationQueue`\
  \ 会尽其所能处理这些单元，根据操作添加到队列的顺序以及我们指定的依赖关系来决定执行方案。如果我们指定的依赖关系允许某些操作同时执行，且有足够的核心可用，操作队列将使用多个线程同时执行多个操作。\n\
  \n\n\n### 成为代码块高手\n\n无论是使用 `NSOperationQueue` 还是 GCD，利用 Apple 并发 API 最直接的方式之一就是使用代码块。代码块与\
  \ GCD 一同发布，是 Apple 添加到 C 语言本身（并由此扩展到 Objective-C 和 C++）的一种新语法。这种新语言特性（在其他一些语言中也称为闭包）对于充分发挥\
  \ GCD 的能力至关重要。\n\n代码块的核心思想是让一段特定的代码能够像其他 C 语言类型一样被处理。代码块可以赋值给变量，作为参数传递给函数或方法，并且通常可以像其他\
  \ Objective-C 对象一样被处理。与 C 语言中大多数其他类型不同，代码块还可以被执行。我们可以在一个对象中创建代码块，并将其传递给另一个对象，由后者稍后执行。通过这种方式，代码块可以作为\
  \ Objective-C 中委托模式或 C 语言中回调函数的一种替代方案。\n\n与方法或函数非常相似，代码块可以接受一个或多个参数，并指定一个返回值。为了声明一个代码块变量，我们使用脱字符号（`^`）以及一些额外的括号来声明参数和返回类型。要定义代码块本身，我们大致采用相同的方式，但随后要用花括号包裹的实际代码来定义它。以下是我们讨论的一些示例：\n\
  \n```\n// 声明一个名为 \"loggerBlock\" 的代码块变量，无参数，无返回值。\nvoid (^loggerBlock)(void);\n\n\
  // 为上面声明的变量赋值一个代码块。像这样一个没有参数且没有返回值的代码块，\n// 不需要像前面变量声明中那样使用 void 等“装饰”。\nloggerBlock\
  \ = ^{ NSLog(@\"我很高兴他们没把它叫做闭包\"); };\n\n// 执行代码块，就像调用函数一样。\nloggerBlock();  // 这会在控制台产生一些输出\n\
  ```\n\n如果你做过很多 C 语言编程，可能会意识到这类似于 C 语言中函数指针的概念。然而，两者之间存在一些关键区别。也许最大的区别在于，代码块可以在函数或方法体内联定义。我们可以在将代码块赋值给变量或传递给另一个方法或函数的地方直接定义它。另一个重要的区别是，代码块可以访问其创建时所在作用域中的变量。\n\
  \n默认情况下，代码块对我们通过这种方式访问的任何变量都会创建只读副本，保持原始变量不变。同时，它会自动增加从周围作用域使用的任何 Objective-C 对象的引用计数，并在代码块执行完毕后再次减少引用计数。然而，我们可以通过在外部变量的声明前加上\
  \ `__block`，使其变为可读写。\n\n```\n// 定义一个可以被代码块修改的变量\n__block int a = 0;\n\n// 定义一个试图修改其作用域内变量的代码块\n\
  void (^sillyBlock)(void) = ^{ a = 47; };\n\n// 在调用代码块前检查变量的值\nNSLog(@\"a == %d\"\
  , a); // 输出 \"a == 0\"\n\n// 执行代码块\nsillyBlock();\n\n// 在调用代码块后再次检查变量的值\nNSLog(@\"\
  a == %d\", a); // 输出 \"a == 47\"\n```\n\n如前所述，代码块与 GCD 结合使用时才能真正大放异彩。GCD 包含一组函数，这些函数可以完成与\
  \ `NSOperation` 和 `NSOperationQueue` 类似的任务，但采用了不同的思路。主要区别在于，GCD 无需显式创建一堆操作、可选地声明操作间依赖关系、然后将操作添加到队列中；我们只需调用一个函数，该函数接受一个代码块，并在单一步骤中将其添加到队列。我们稍后会讨论这一点，但首先，我们将展示如何使用操作队列来处理并发。\n\
  \n### 让 `SlowWorker` 焕发活力\n\n为了了解操作队列的工作原理，让我们在 `SlowWorker` 项目中对它们进行测试。在开始之前，请复制包含\
  \ `SlowWorker` 项目的整个文件夹。在本章后面，我们将使用 `SlowWorker` 的原始版本作为实现并发的另一种方式的起点，所以请保留一份副本。\n\
  \n回想一下，这个应用的问题在于，单一的动作方法按顺序调用了多个其他方法，这些方法的总耗时足以让应用感觉反应迟钝。我们要做的是将每个其他方法放入一个操作中，将所有操作放入一个队列，然后让队列自行处理这一切。\n\
  \n`doWork:` 方法是我们进行所有修改的地方。首先，我们为所有本地 `NSString` 变量添加 `__block` 存储限定符。然后，我们将每一小段工作封装在代码块内，声明一些依赖关系以确保它们按正确顺序执行，最后将它们传递给一个新队列执行。请看下面加粗的行（当然，也请将它们添加到我们的方法中），然后我们将更详细地讨论细节：\n\
  \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
  \    __block NSString *fetchedData;\n    __block NSString *processed;\n    __block\
  \ NSString *firstResult;\n    __block NSString *secondResult;\n\n    self.isWorking\
  \ = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        fetchedData = [self fetchSomethingFromServer];\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n            @\"已获取: %@\\\
  n\", fetchedData];\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation\
  \ blockOperationWithBlock:^{\n        processed = [self processData:fetchedData];\n\
  \        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \            @\"已处理: %@\\n\", processed];\n    }];\n\n    NSBlockOperation *calcFirst\
  \ = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult = [self calculateFirstResult:processed];\n\
  \    }];\n\n    NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        secondResult = [self calculateSecondResult:processed];\n    }];\n\n   \
  \ NSBlockOperation *showResults = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \            @\"第一个结果: [%@]\\n 第二个结果: [%@]\\n\\n\",\n            firstResult, secondResult];\n\
  \        NSDate *endTime = [NSDate date];\n        NSLog(@\"在 %f 秒内完成\",\n     \
  \       [endTime timeIntervalSinceDate:startTime]);\n        self.isWorking = YES;\n\
  \    }];\n\n    [process addDependency:fetch];\n    [calcFirst addDependency:process];\n\
  \    [calcSecond addDependency:process];\n    [showResults addDependency:calcFirst];\n\
  \    [showResults addDependency:calcSecond];\n\n    NSOperationQueue *queue = [[NSOperationQueue\
  \ alloc] init];\n    [queue addOperations:@[fetch, process, calcFirst, calcSecond,\
  \ showResults]\n        waitUntilFinished:NO];\n}\n```\n\n我们做的第一件事是为一些本地变量添加了 `__block`\
  \ 存储限定符。这样，每个 `NSString` 指针都保持为一个单一的、唯一的指针，每个代码块都可以对该指针进行读写操作。在此上下文中，“写入”意味着将指针赋值为指向一个不同的对象。如果没有\
  \ `__block`，每个代码块都会获得一个属于自己的新指针，所有指针都指向同一个初始对象，并且它们完全不可写！所以，`__block` 为我们提供了一种在代码块之间共享某些数据的方法。\n\
  \n接下来，我们创建了一些操作。现在不再直接执行每个工作方法，而是为每个方法创建一个 `NSBlockOperation`。`NSBlockOperation`\
  \ 只是 `NSOperation` 的一个子类，专门设计用于从代码块创建。\n\n然后，我们在这些操作之间定义了一组依赖关系，以便 `process` 仅在\
  \ `fetch` 完成后执行，`calcFirst` 和 `calcSecond` 仅在 `process` 完成后执行，而 `showResults` 仅在所有其他操作完成后执行。\n\
  \n\n\n最后，我们创建一个新的`NSOperationQueue`，并将包含所有操作的数组传递给它。该队列会检查这些操作之间的所有依赖关系，并确定如何以正确的顺序执行它们。\n\
  \n### 主线程需求\n\n然而，我们仍然没有完全准备好运行。请记住，`AppKit`类（例如所有窗口和视图类）通常不是线程安全的。对它们的所有访问都应在主线程上执行。但目前我们正在从几个操作中访问`NSTextView`。很可能，其中一些操作会在轮到它们时在其他线程上运行！尽管这在简单的测试应用中可能“有效”，但这不是一个真正安全的构建基础。我们需要调整每个操作，以确保所有对`NSTextView`的访问都发生在主线程上。\n\
  \n为此，我们将把每个这样的访问包装在另一个块中，该块将直接传递给一个始终在主线程上运行其操作的特殊队列。下面的粗体代码显示了我们需要对`doWork:`方法进行的最终修改：\n\
  \n```\n- (IBAction)doWork:(id)sender {\n\n    NSDate *startTime = [NSDate date];\n\
  \n    __block NSString *fetchedData;\n\n    __block NSString *processed;\n\n   \
  \ __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\n    self.isWorking\
  \ = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{\n\
  \n        fetchedData = [self fetchSomethingFromServer];\n\n        [[NSOperationQueue\
  \ mainQueue] addOperationWithBlock:^{\n\n            _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n\n                                        @\"Fetched:\
  \ %@\\n\", fetchedData];\n\n        }];\n\n    }];\n\n    NSBlockOperation *process\
  \ = [NSBlockOperation blockOperationWithBlock:^{\n\n        processed = [self processData:fetchedData];\n\
  \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n           \
  \ _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\n\
  \                                        @\"Processed: %@\\n\", processed];\n\n\
  \        }];\n\n    }];\n\n    NSBlockOperation *calcFirst = [NSBlockOperation blockOperationWithBlock:^{\n\
  \n        firstResult = [self calculateFirstResult:processed];\n\n    }];\n\n  \
  \  NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n\
  \n        secondResult = [self calculateSecondResult:processed];\n\n    }];\n\n\
  \    NSBlockOperation *showResults = [NSBlockOperation blockOperationWithBlock:^{\n\
  \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n           \
  \ _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\n\
  \                                        @\"First Result: [%@]\\nSecond Result:\
  \ [%@]\\n\\n\",\n\n                                        firstResult, secondResult];\n\
  \n            NSDate *endTime = [NSDate date];\n\n            NSLog(@\"Completed\
  \ in %f seconds\",\n\n                  [endTime timeIntervalSinceDate:startTime]);\n\
  \n            self.isWorking = NO;\n\n        }];\n\n    }];\n\n    [process addDependency:fetch];\n\
  \n    [calcFirst addDependency:process];\n\n    [calcSecond addDependency:process];\n\
  \n    [showResults addDependency:calcFirst];\n\n    [showResults addDependency:calcSecond];\n\
  \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue addOperations:@[fetch,\
  \ process, calcFirst, calcSecond, showResults]\n\n          waitUntilFinished:NO];\n\
  \n}\n```\n\n现在我们应该能够运行我们的应用了，点击开始按钮后，我们会注意到一些也许略有不同的现象：按钮立即恢复为非点击状态，菜单仍然可用。前两个操作在完成时将一些文本放入`NSTextView`中。大约七秒后（相比第一个版本使用的十秒有所减少，因为我们的一些工作方法现在正在同时运行），最终输出出现在文本视图中。这一切都很好，但我们还可以通过使用`Cocoa\
  \ Bindings`和我们一开始创建的`isWorking`属性来让事情变得更加响应。再次打开`MainMenu.xib`，使用对象库找到圆形进度指示器。然后将其添加到我们的窗口中，如图\
  \ 17-2 所示。\n\n![A978-1-4302-4543-8_17_Fig2_HTML.jpg](img/A978-1-4302-4543-8_17_Fig2_HTML.jpg)\n\
  \n图 17-2.\n\n添加进度指示器\n\n选中进度指示器后，使用属性检查器确保其“暂停时显示”复选框已关闭。然后切换到绑定检查器，展开其`Animate`参数的视图，并将其绑定到应用委托，将`isWorking`作为模型键路径。然后选择窗口中的开始按钮，进行类似的配置。将按钮的`Enabled`属性绑定到应用委托，键路径为`isWorking`，这次添加一个`NSNegateBoolean`作为值转换器。\n\
  \n保存更改，点击运行；当我们点击开始按钮时，它变为禁用状态，圆形进度指示器出现并开始旋转。当工作完成时，进度指示器消失，按钮恢复正常。\n\n现在让我们再进一步：添加一个水平进度指示器（一种水平移动，告诉我们事情正在发生，例如在软件安装程序中）。进度视图将从\
  \ 0 到 4，每个工作方法都会将数字增加一点。与圆形进度指示器一样，这将完全通过`Cocoa Bindings`配置。\n\n首先，在`SWAppDelegate.h`中添加一个名为`completed`的新属性：\n\
  \n```\n//  SWAppDelegate.h\n//  Insert this after the @interface line\n\n@property\
  \ (assign) NSInteger completed;\n```\n\n接下来，切换到`SWAppDelegate.m`。在`doWork:`方法的顶部附近添加以下内容，以便在用户点击开始按钮时重置此计数器：\n\
  \n```\nself.completed = 0;\n```\n\n现在，每个工作方法都需要在完成时递增此变量。我们可以在每个工作方法中添加以下行：\n\n\
  ```\nself.completed = self.completed + 1;\n```\n\n然而，这就是那些棘手的多线程问题出现的地方。在这行代码中，实际发生的是：它首先通过调用`[self\
  \ completed]`获取`completed`属性的当前值，然后加 1，然后通过调用`[self setCompleted:]`将结果存储回`completed`属性。在多线程环境中，这可能导致错误行为。例如，如果两个线程大约在同一时间执行这样一行代码会怎样？假设`completed`的起始值是\
  \ 2。如果两个线程在任何一个写出自己的结果之前读取了当前值，那么每个线程都会在自己的值副本上加 1，然后每个线程都会将它们的局部和（3）写回`completed`属性，最终该属性包含值\
  \ 3，而不是正确的值 4。\n\n解决这个问题的一种方法是使用`Objective-C`的`@synchronized`关键字，它允许我们指定一段代码一次只能由一个线程运行。在应用委托的`@implementation`部分中的某处输入以下方法：\n\
  \n```\n- (void)incrementCompleted {\n    @synchronized(self) {\n        self.completed\
  \ = self.completed + 1;\n    }\n}\n```\n\n我们在这里所做的是将之前想到的相同代码包裹在一种安全区域内。`@synchronized`关键字接受一个对象作为其参数，该对象将用于确定同步限制的范围。基本上，任何使用相同值的调用都会尝试获取相同的锁。如果其他线程已经占用了该锁，当前线程必须等待直到其他线程完成。在这种情况下，因为我们使用了`self`，对同一实例上的此方法的所有调用都将尝试获取相同的锁。我们只有一个应用委托实例，因此这实际上是一个全局锁，但对于我们的目的来说是可以的。\n\
  \n为了让其工作，我们需要进行的编码是：在每个工作方法的`return`之前添加以下一行：\n\n```\n[self incrementCompleted];\n\
  ```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n最后，我们需要配置 GUI。回到\
  \ Interface Builder 中的`MainMenu.xib`文件，在库中搜索进度指示器。除了我们已经使用过的圆形进度指示器之外，还有一个标有“不确定进度指示器”（Indeterminate\
  \ Progress Indicator）的水平进度指示器。将其拖拽到窗口中，并按图 17-3 所示进行布局。\n\n![A978-1-4302-4543-8_17_Fig3_HTML.jpg](img/A978-1-4302-4543-8_17_Fig3_HTML.jpg)\n\
  \n图 17-3.\n\n最终的 GUI 润色\n\n现在调出属性检查器。单击取消勾选“停止时显示”（Display When Stopped）和“不确定”（Indeterminate）两个复选框，然后将其“最小值”（Minimum）和“当前值”（Current）设置为\
  \ 0，将“最大值”（Maximum）设置为 4。现在切换到绑定检查器，我们将在此处配置两个绑定。首先，将其“动画”（Animate）属性绑定到应用程序委托的`isWorking`键，就像我们为圆形进度指示器所做的那样。然后，将其“值”（Value）属性绑定到应用程序委托的`completed`键。\n\
  \n保存工作，运行，并单击“开始”（Start）按钮。在圆形进度指示器旁边，会出现一个水平进度指示器，随着每个工作方法的完成，会有一条条在移动。\n\n就是这样：相对无痛的并发处理。诚然，这个精心设计的例子与大型应用程序相比不算什么，但这些概念可以扩展以处理更复杂的情况。我们所展示的内容在今天\
  \ OS X 和 iOS 应用程序中运行良好，但苹果并没有止步于此。从 Snow Leopard 开始，`NSOperation` 和 `NSOperationQueue`\
  \ 的大部分设计已经在操作系统底层被重新实现，从而诞生了一项名为 Grand Central Dispatch 的出色技术。\n\n## GCD：底层队列\n\n\
  这种将工作单元放入队列中，在后台执行，并由系统为我们管理线程的想法非常强大，并且极大地简化了许多需要并发的开发场景。似乎一旦这项技术以 `NSOperationQueue`\
  \ 的形式在 Leopard 中启动并运行，苹果就决定制作一个更通用的解决方案，使其不仅可以从 Objective-C 中使用，还可以从 C 和 C++ 中使用。从\
  \ Snow Leopard 开始，这个名为 Grand Central Dispatch（从现在开始我们称之为 GCD）的解决方案就可以使用了。GCD 将 `NSOperationQueue`\
  \ 的大部分核心概念——工作单元、无痛的后台处理、自动线程管理——放入了一个可以从所有基于 C 的语言中使用的 C 接口中。这意味着它不仅适用于 Cocoa 程序员。现在，即使是使用\
  \ C 编写的底层命令行工具也可以利用这些特性。`NSOperationQueue` 本身也是使用 GCD 为 Snow Leopard 重写的，更棒的是，苹果将其\
  \ GCD 的实现开源，以便它也可以移植到其他类 Unix 操作系统上。\n\n`NSOperationQueue` 和 GCD 中队列在设计上的主要区别在于，`NSOperationQueue`\
  \ 可以处理其 `NSOperation` 之间任意复杂的依赖关系，以确定它们的执行顺序，而 GCD 队列则是严格的 FIFO（先进先出）。添加到 GCD 队列中的工作单元将始终按照它们被放入队列的顺序启动。话虽如此，它们可能不会总是以相同的顺序完成，因为\
  \ GCD 队列会自动将其工作分配给多个线程。\n\n使用 GCD，每个队列都可以访问一个线程池，这些线程在应用程序的整个生命周期中被重复使用。GCD 将始终尝试维护一个适合机器架构的线程池，在有工作要做时自动利用更强大的机器，使用更多的处理器核心。\n\
  \n### 再次改进 SlowWorker\n\n为了了解其工作原理，让我们看一下 SlowWorker 的 `doWork:` 方法的原始形式。为此，请打开我们之前制作的原始\
  \ SlowWorker 项目目录的副本，并将其用于我们接下来要展示的其余更改。这是原始方法：\n\n```\n- (IBAction)doWork:(id)sender\
  \ {\n\n    NSDate *startTime = [NSDate date];\n\n    NSString *fetchedData;\n\n\
  \    NSString *processed;\n\n    NSString *firstResult;\n\n    NSString *secondResult;\n\
  \n    self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
  \n    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \n                                @\"Fetched: %@\\n\", fetchedData];\n\n    processed\
  \ = [self processData:fetchedData];\n\n    _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n\n                                @\"Processed: %@\\\
  n\", processed];\n\n    firstResult = [self calculateFirstResult:processed];\n\n\
  \    secondResult = [self calculateSecondResult:processed];\n\n    _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n\n                      \
  \          @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n\n            \
  \                    firstResult, secondResult];\n\n    NSDate *endTime = [NSDate\
  \ date];\n\n    NSLog(@\"Completed in %f seconds\",\n\n          [endTime timeIntervalSinceDate:startTime]);\n\
  \n    self.isWorking = NO;\n\n}\n```\n\n我们可以通过将所有代码包装在一个块中并将其传递给一个名为 `dispatch_async`\
  \ 的 GCD 函数，来使此方法完全在后台运行。此函数接受两个参数：一个 GCD 调度队列（概念上类似于 `NSOperationQueue`）和一个要分配给该队列的块。与另一种方法一样，我们也将为局部变量添加\
  \ `__block` 存储限定符。请看：\n\n```\n- (IBAction)doWork:(id)sender {\n\n    NSDate *startTime\
  \ = [NSDate date];\n\n    __block NSString *fetchedData;\n\n    __block NSString\
  \ *processed;\n\n    __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\
  \n    self.isWorking = YES;\n\n    dispatch_async(dispatch_get_global_queue(0, 0),\
  \ ^{\n\n        fetchedData = [self fetchSomethingFromServer];\n\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n\n                      \
  \              @\"Fetched: %@\\n\", fetchedData];\n\n        processed = [self processData:fetchedData];\n\
  \n        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \n                                    @\"Processed: %@\\n\", processed];\n\n   \
  \     firstResult = [self calculateFirstResult:processed];\n\n        secondResult\
  \ = [self calculateSecondResult:processed];\n\n        _resultsTextView.string =\
  \ [_resultsTextView.string stringByAppendingFormat:\n\n                        \
  \            @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n\n          \
  \                          firstResult, secondResult];\n\n        NSDate *endTime\
  \ = [NSDate date];\n\n        NSLog(@\"Completed in %f seconds\",\n\n          \
  \    [endTime timeIntervalSinceDate:startTime]);\n\n        self.isWorking = NO;\n\
  \n    });\n\n}\n```\n\n这种方法首先通过使用 `dispatch_get_global_queue()` 函数获取一个始终可用的预先存在的全局队列（与\
  \ `NSOperationQueue` 不同，使用 GCD 时，始终有一个可用的全局队列，可以随时将工作分派到后台线程）。该函数接受两个参数：第一个参数允许我们指定优先级，第二个参数当前未使用，应始终为\
  \ 0。如果在第一个参数中指定了不同的优先级，例如 `DISPATCH_QUEUE_PRIORITY_HIGH` 或 `DISPATCH_QUEUE_PRIORITY_LOW`（传递\
  \ 0 等同于传递 `DISPATCH_QUEUE_PRIORITY_DEFAULT`），我们实际上会获得一个不同的全局队列，系统会为其分配不同的优先级。现在，我们将坚持使用默认的全局队列。\n\
  \n然后，该队列与后面的代码块一起传递给 `dispatch_async()` 函数。接着，GCD 会获取整个块并将其交给一个后台线程，在那里它将一步一步地执行，就像它在主线程中运行时一样。\n\
  \n\n\n### 别忘记主线程\n\n这里存在一个问题：AppKit 的线程安全性。请记住，在后台线程中向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息是绝对不允许的。幸运的是，GCD\
  \ 也为我们提供了处理此问题的方法。在代码块内部，我们可以调用另一个调度函数，将工作传递回主线程！我们通过再次调用 `dispatch_async()` 来实现这一点，这次传入的是由\
  \ `dispatch_get_main_queue()` 函数返回的队列，该函数始终会返回驻留在主线程上的特殊队列，该队列随时准备执行需要使用主线程的代码块。添加以下粗体显示的代码行后，所有\
  \ AppKit 调用都将在主线程上执行：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
  \ = [NSDate date];\n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
  \    __block NSString *firstResult;\n    __block NSString *secondResult;\n    self.isWorking\
  \ = YES;\n    dispatch_async(dispatch_get_global_queue(0, 0), ^{\n        fetchedData\
  \ = [self fetchSomethingFromServer];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                                       @\"获取: %@\\n\", fetchedData];\n        });\n\
  \        processed = [self processData:fetchedData];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                                       @\"处理: %@\\n\", processed];\n        });\n\
  \        firstResult = [self calculateFirstResult:processed];\n        secondResult\
  \ = [self calculateSecondResult:processed];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                                       @\"结果一: [%@]\\n 结果二: [%@]\\n\\n\",\n   \
  \                                    firstResult, secondResult];\n        });\n\
  \        NSDate *endTime = [NSDate date];\n        NSLog(@\"完成时间为 %f 秒\",\n    \
  \          [endTime timeIntervalSinceDate:startTime]);\n        self.isWorking =\
  \ NO;\n    });\n}\n```\n\n### GCD 中的并发代码块\n\n我们还需要再做一处修改，才能使这个程序的行为与之前使用 `NSOperationQueue`\
  \ 的版本相同，且运行速度至少一样快。还记得吗？在设置队列中的操作时，我们通过使用依赖关系，让 `calculateFirstResult` 和 `calculateSecondResult`\
  \ 能同时运行？我们声明了它们各自都依赖于前面对 `processData` 的调用，而后续对 `finishWorking` 的调用又依赖于这两者。这样操作队列就能在可能的情况下同时运行这两个操作。而目前\
  \ GCD 版本的代码并非如此。代码会如同所示那样直接顺序执行，总是在 `calculateFirstResult:` 完成后才调用 `calculateSecondResult:`。\n\
  \n幸运的是，GCD 再次提供了实现相同功能的方法，即使用所谓的**调度组 (dispatch group)**。在组上下文中被异步调度的所有代码块都会尽快执行，如果可能，还会被分配到多个线程上并发执行。我们还可以使用\
  \ `dispatch_group_notify()` 来指定一个额外的代码块，该代码块会在组中所有代码块执行完毕后被调用。代码如下所示：\n\n```\n-\
  \ (IBAction)doWork:(id)sender {\n  NSDate *startTime = [NSDate date];\n  dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString\
  \ *processed = [self processData:fetchedData];\n    __block NSString *firstResult;\n\
  \    __block NSString *secondResult;\n    dispatch_group_t group = dispatch_group_create();\n\
  \    dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{\n      firstResult\
  \ = [self calculateFirstResult:processed];\n    });\n    dispatch_group_async(group,\
  \ dispatch_get_global_queue(0, 0), ^{\n      secondResult = [self calculateSecondResult:processed];\n\
  \    });\n    dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{\n\
  \      NSString *resultsSummary = [NSString stringWithFormat:\n        @\"结果一: [%@]\\\
  n 结果二: [%@]\", firstResult, secondResult];\n      dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n        [_resultsTextView setString:resultsSummary];\n      });\n      NSDate\
  \ *endTime = [NSDate date];\n      NSLog(@\"完成时间为 %f 秒\",\n        [endTime timeIntervalSinceDate:startTime]);\n\
  \    });\n  });\n}\n```\n\n完成所有这些修改后，我们应该可以运行应用并看到与第一轮改进后相同的行为和性能，但尚未包含使用 Cocoa\
  \ Bindings 在执行工作时改进 GUI 行为的那些额外变更。将那些修改应用到 GCD 增强版的 SlowWorker 应用，将作为练习留给读者完成。\n\
  \n## 一点并发，大有裨益\n\n现在我们看到了在应用中使用 `NSOperationQueue` 和 GCD 提供基本并发的具体示例。我们简单的示例项目并没有做什么有趣的事情，但这些技术可以应用于任何涉及耗时活动且不想让用户看到旋转的忙碌光标的情况。我们还学习了一些关于新代码块语法\
  \ (block syntax) 的知识，以及如何使用它来创建准备在后台线程中运行的工作单元。\n\n使用这些技术可以对你的应用的用户体验产生巨大影响，任何时候当你的用户等待应用处理某些事情时，你都应该使用它们！使用\
  \ `NSOperationQueue` 还是 GCD，由你来决定。请记住，自 OS X 10.6 起的每个版本中，`NSOperationQueue` 都是基于\
  \ GCD 实现的，因此无论采用哪种方式，你的应用都将具有相似的性能特性。具体选择哪一种，由你来决定。\n\n\n\n"
- "# 18. 未来路径\n\n## 摘要\n\n你现在已经读完了《在 Mac 上学习 Cocoa》的最后一章！希望你已经对 Cocoa 的工作原理以及如何利用其各个组件编写各种有趣的桌面应用有了良好的理解。然而，Cocoa\
  \ 框架其实非常庞大，我们仅仅触及了所涉及的大部分类和概念的皮毛。这本书从未打算成为一本百科全书式的 Cocoa 参考手册（你的电脑上已经随 Xcode 安装了这样的手册），而是旨在成为一本为你指引方向的指南。秉承这一精神，我们将通过概述一些额外的技巧和资源来结束本书，这些内容将帮助你在已学知识的基础上，将\
  \ Cocoa 开发工作提升到新的高度。\n\n我们将从详细阐释几个我们曾提及但值得更多关注的设计模式开始。接着，我们将探讨如何使用 Objective-C 以外的语言进行\
  \ Cocoa 编程。最后，我们将介绍一些方法，让你能将来之不易的 Cocoa 技能应用到 Mac OS X 桌面以外的领域。\n\n## 更多 Cocoa 特性\n\
  \n在本书中，我们花了大量篇幅讨论 MVC 模式，它帮助我们将应用程序划分为逻辑层；以及委托模式，它允许我们在控制器层内定义某些 GUI 对象的行为，而无需对\
  \ GUI 对象本身进行子类化。这些技术利用语言特性和约定来定义使用模式。沿着这个思路，Cocoa 还有更多锦囊妙计。其中之一是**通知**（在某些圈子中被称为*观察者模式*）的概念，它允许一个对象在发生某事件时通知一组其他对象。另一个是使用**块**来简化代码，特别是在使用完整的委托甚至单个方法都可能显得大材小用的时候。我们在本书的其他地方已经见过块的使用，但这里我们也将涉及一些其他有趣的用途。\n\
  \n### 通知\n\nCocoa 的`NSNotification`和`NSNotificationCenter`类提供了一种方法，让一个对象可以向一组其他对象发送消息，而无需这些对象之间互相了解。它们真正需要知道的只是通知的名称，这个名称可以是任何我们喜欢的字符串。想要被通知的对象会提前注册为特定通知名称的观察者，而想要广播通知的对象则使用该名称向任何正在监听的观察者发送其消息。\n\
  \n例如，假设我们应用程序的多个部分需要在某个特定事件发生时更新，比如一段网络代码读取来自 Web 服务器的响应。使用通知，我们的网络代码不需要知道其他每个想要该信息的对象。相反，我们可以为网络代码和观察者定义一个共同使用的通知名称，最好放在一个所有相关类都能包含的头文件中，如下所示：\n\
  \n```\n#define DATA_RECEIVED @\"dataReceived\"\n```\n\n观察者可以在任何时候注册接收通知，但通常这发生在对象的初始化过程中。\n\
  \n```\n- (id)init\n{\n    if ((self = [super init])) {\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \     selector:@selector(receiveNetworkData:)\n                                \
  \                     name:DATA_RECEIVED\n                                     \
  \              object:nil];\n    }\n    return self;\n}\n```\n\n这告诉应用程序唯一的`NSNotificationCenter`实例：当有人发布一个`DATA_RECEIVED`通知时，它应该通过调用调用者的`receiveNetworkData:`方法来通知它。注意最后一个参数我们传递的是`nil`：如果我们在此处指定了一个对象，那将会把通知观察限制为仅适用于该特定对象。其他任何发布相同通知的对象都不会产生任何效果。为了使它工作，观察者还需要实现注册时指定的方法。这个方法总是接收`NSNotification`本身作为参数。\n\
  \n```\n- (void)receiveNetworkData:(NSNotification *)notification\n{\n  NSLog(@\"\
  received notification: %@\", notification);\n}\n```\n\n最后，任何将自己设置为观察者的对象通常应在稍后将自己从观察者列表中移除。一个常见的做法是在任何注册为观察者的类的`dealloc`方法中执行类似以下操作：\n\
  \n```\n- (void)dealloc\n{\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
  }\n```\n\n那么，通知者本身呢？以我们的情况为例，就是那个将要广播其状态的网络读取对象。处理起来再简单不过了：\n\n```\nif (some condition\
  \ is met) {\n    [[NSNotificationCenter defaultCenter]\n        postNotificationName:DATA_RECEIVED\n\
  \                      object:self];\n}\n```\n\n其思想是通知者可以像这样抛出一个通知，而通知中心负责实际的传递。通知者还可以通过一个字典传递额外的信息，观察者可以获取这些信息，如下所示：\n\
  \n```\n// 在通知者中\nNSDictionary *info = @{@\"data\" : someData};\n[[NSNotificationCenter\
  \ defaultCenter]\n    postNotificationName:DATA_RECEIVED\n                  object:self\n\
  \                userInfo:info];\n\n// 在观察者中\nNSLog(@\"received data %@\", [[notification\
  \ userInfo] objectForKey:@\"data\"]);\n```\n\n通知是一种非常实用的方式，可以让应用程序的不同部分在不使用正式 API\
  \ 的情况下相互通信。我们只需要决定一些字符串来表示各种事件，然后开始观察和发布即可。\n\n### 块\n\n第 11 章和第 17 章介绍了**块**，这是苹果几年前为\
  \ C 语言添加的一个特性。我们主要将块与 Grand Central Dispatch 提供的并发特性一起使用，块在其中非常契合，但块还有许多其他用途。似乎在\
  \ OS X 的每个主要新版本中，苹果都会扩展几个 Cocoa 类，添加以块为参数的新方法。我们来看看其中的一些。\n\n\n\n### 枚举\n\n让我们从简单的开始：枚举。你可能已经熟悉了标准的基于\
  \ C 语言的遍历列表方式，也许也用过 `NSEnumerator`，甚至还有自 OS X 10.5 发布以来就提供的快速枚举（“for – in” 循环）。现在，Block\
  \ 提供了另一种实现相同功能的方式。\n\n```\nNSArray *array = @[@\"zero\", @\"one\", @\"two\", @\"\
  three\"];\n\n// C 风格枚举\nint i;\nfor (i = 0; i < [array count]; i++) {\n    NSLog(@\"\
  C 枚举访问对象：%@\", array[i]);\n}\n\n// NSEnumerator，经典的 Cocoa 枚举方式\nNSEnumerator *aEnum\
  \ = [array objectEnumerator];\nid classicEnumerated;\nwhile ((classicEnumerated\
  \ = [aEnum nextObject])) {\n    NSLog(@\"NSEnumerator 访问对象：%@\", classicEnumerated);\n\
  }\n\n// \"快速枚举\"，随 OS X 10.5 发布\nid fastEnumerated;\nfor (fastEnumerated in array)\
  \ {\n    NSLog(@\"快速枚举访问对象：%@\", fastEnumerated);\n}\n\n// \"Block 枚举\"，随 OS X 10.6\
  \ 发布\n[array enumerateObjectsUsingBlock:^(id blockEnumerated, NSUInteger i, BOOL\
  \ *stop) {\n    NSLog(@\"Block 枚举访问对象：%@\", blockEnumerated);\n}];\n```\n\n我们传递给\
  \ `enumerateObjectsUsingBlock:` 的 Block 接受三个参数且无返回值。这是该方法声明的 Block 签名，我们必须遵循。传入\
  \ Block 的三个参数分别是：数组中的一个对象、该对象在数组中索引的整数值，以及一个通过引用传递的 `BOOL` 值，通过将其设置为 `YES` 可终止枚举。\n\
  \n这样看来，一开始可能并不明显为什么 Block 版本比其他方式更好，但实际上它确实融合了其他所有枚举方式的优点。首先，它提供了当前对象的索引，这是之前基于\
  \ Objective-C 的其他方案所不具备的。如果我们想打印数组元素的编号列表，这个特性就非常有用。我们无法告诉你我们为了轻松获取每个对象的索引值而不得已使用\
  \ C 风格迭代的次数有多少！此外，该方法还有一个变体，允许我们指定控制枚举运行方式的选项，例如使其并发运行，如下所示：\n\n```\n[array enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
  \    usingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"\
  Block 枚举访问对象：%@\", blockEnumerated);\n}];\n```\n\n这个方法实际上使用了 GCD 将工作分配到所有可用的处理器核心上，这会使我们的应用运行得更快，并更好地利用系统资源。而且我们无需额外成本就能获得这一好处！\n\
  \n`NSSet` 类也存在类似的枚举方法，但没有索引参数（因为根据定义，集合中的对象是无序的）。`NSDictionary` 也通过一些新的方法（如 `enumerateKeysAndObjectsUsingBlock:`\
  \ 及其支持并发的带选项变体）获得了良好的 Block 支持，让我们可以指定一个同时获取键和值的 Block。这比之前遍历字典内容的枚举方式要好得多，后者通常需要遍历所有键并为每个键查找对应的值。\n\
  \n### 使用 Block 观察通知\n\n我们知道，我们在前几页才刚向你介绍了通知，但猜猜怎么着：苹果已经将 Block 概念应用到了 `NSNotification`\
  \ 类中，该类提供了一个方法，允许我们指定一个 Block 而不是选择器，如下所示：\n\n```\nid observe = [[NSNotificationCenter\
  \ defaultCenter] addObserverForName:DATA_RECEIVED\n  object:nil queue:nil usingBlock:^(NSNotification\
  \ *notification){\n  NSLog(@\"收到通知：%@\", notification);\n}];\n```\n\n这在几个方面都很酷。首先，它使我们无需为通知处理代码创建单独的方法，而是可以将处理逻辑内联到设置代码的位置，这可以使我们的代码更易于阅读。另一个很棒的地方（所有\
  \ Block 的共同特点）是，因为我们创建的 Block 会从其定义位置捕获上下文，所以它不仅可以访问实例变量，还可以访问在同一方法中更早定义的局部变量。这意味着我们可以在设置时使用一些值来创建\
  \ Block，并在稍后 Block 运行时使用这些值，而无需显式地将它们放入实例变量或通过其他手动方式传递。\n\n请注意，此版本返回一个 `id` 类型的值，我们将其赋给一个名为\
  \ `observe` 的变量。Block 通知观察者需要像其他观察者一样被移除，因此我们可以在适当的时候调用以下代码来利用这个返回值进行清理：\n\n```\n\
  [[NSNotificationCenter defaultCenter] removeObserver:observe];\n```\n\n以这种方式使用 Block\
  \ 时需要注意的一点是，在 `dealloc` 方法中进行清理可能不够好；如果 Block 显式或间接地使用了 `self` 指针，则会产生一种循环引用，导致对象永远无法被释放！这引出了我们的下一个\
  \ Block 话题。\n\n\n\n#### 弱化 Blocks 的指针\n\n回到上一个话题，假设我们有一个类，包含一个名为 `observation` 的实例变量，以及如下的\
  \ `init` 和 `dealloc` 方法：\n\n```\n@implementation MyController {\n    id observation;\n\
  }\n\n- (id)init {\n    if ((self = [super init])) {\n        observation = [[NSNotificationCenter\
  \ defaultCenter]\n            addObserverForName:@\"ESCHATON\"\n            object:nil\n\
  \            queue:nil\n            usingBlock: ^(NSNotification *notification){\n\
  \                NSLog(@\"notified observer: %@\", self);\n            }];\n   \
  \ }\n    return self;\n}\n\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:observation];\n}\n\n@end\n```\n\n乍一看这没问题，但其中隐藏着一个微妙的问题。这种设置会形成一种循环引用链，这意味着\
  \ `MyController` 实例和 `observation` 对象都将永远不会被释放！原因在于，当执行 `init` 并创建 block（我们将其传递给\
  \ `NSNotificationCenter`）时，会发生一系列特殊事件。在底层，ARC 会确保 block 内访问的所有变量都被设置为“block 就绪”状态。这意味着对于普通的\
  \ C 类型（`int`、`float` 等），会在 block 内准备一个新的只读变量槽；而对于 Objective-C 对象指针，则会发送一条 `retain`\
  \ 消息，从而在 block 的整个生命周期内增加其引用计数。\n\n与此同时，赋值给 `observation` 的返回值也会被 ARC 妥善处理，它也会收到一条\
  \ retain 消息，以确保其不会消失。最终的结果如下：\n\n-   `MyController` 实例持有对 `observation` 的强引用。\n\
  -   `observation` 对象持有对其 block 的强引用，因为它“拥有”该 block。\n-   block 持有对我们 `MyController`\
  \ 实例的强引用。\n\n打破这个循环的方法是将其中一个强引用转为弱引用。最好的做法是如下修改 `init`：\n\n```\n- (id)init {\n \
  \   if ((self = [super init])) {\n        __weak id weakSelf = self;\n        observation\
  \ = [[NSNotificationCenter defaultCenter]\n            addObserverForName:@\"ESCHATON\"\
  \n            object:nil\n            queue:nil\n            usingBlock: ^(NSNotification\
  \ *notification){\n                NSLog(@\"notified observer: %@\", self);\n  \
  \              NSLog(@\"notified observer: %@\", weakSelf);\n            }];\n \
  \   }\n    return self;\n}\n```\n\n这里我们声明了一个指向 `self` 的弱指针，存储在一个名为 `weakSelf` 的新变量中。这个新指针在\
  \ block 内部使用。当编译器看到这一点时，它会理解这是一个弱指针，因此不应被 block 保留。这意味着 `self` 永远不会收到额外的 `retain`\
  \ 消息，因此它可以在不再使用时被释放。当 `dealloc` 方法执行时，`observation` 对象被释放，它拥有的 block 也随之被释放。\n\n\
  还有一点很重要：一个 block 会捕获其代码中引用的任何对象，但在实例变量的情况下，被保留的并不是实例变量本身，而是 `self` 指针！这是因为实例变量是通过\
  \ C 风格的结构体访问的，尽管我们在代码中看不到这一点。实际上，\n\n```\n[tableView reloadData];\n```\n\n本质上是等同于\n\
  \n```\n[self->tableView reloadData];\n```\n\n鉴于此，编译器的 ARC 规则要求 `self` 必须被保留。\n\n\
  尽管我们可能不会每天都遇到这种情况，但理解这个机制的工作原理以及我们为何必须采用这种变通方法仍然很重要。那些会被立即执行并释放的 block（例如，与枚举器一起使用时）可能不需要如此细致的审视。然而，一旦我们将\
  \ block 传递给另一个对象，并且我们知道它可能是一个长期存在的对象，或者不确定其生命周期时，就应该格外小心地检查我们的 block，确保不会意外地给自己埋下隐患。\n\
  \n#### 过滤\n\nApple 添加到 Cocoa 中的另一个 block 用法是 `NSArray` 的 `indexesOfObjectsPassingTest:`\
  \ 方法。这个方法让我们声明一个 block，该 block 会检查一个对象，并根据我们定义的条件，决定该对象是否应被包含在输出的索引集合中（然后可以用于从原始数组中提取“符合条件”的对象）。例如，假设我们有一个人员数组，我们可以这样找出所有名为“Bob”的人：\n\
  \n```\nNSArray *people;  // <- 假设此数组已存在\n\nNSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:\n\
  \    BOOL ^(id obj, NSUInteger idx, BOOL *stop){\n        return [obj.firstName\
  \ isEqual:@\"Bob\"];\n}];\n\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n\
  ```\n\n尽管 block 的使用起初可能看起来有些棘手，但过一段时间后它们就会变得自然而然。一旦开始使用，你可能会发现越来越多的方式去运用它们。对于每一位\
  \ Cocoa 程序员来说，它们都是一个非常重要的工具。\n\n## 用其他语言开发 Cocoa\n\n尽管我们中的一些人热爱 Objective-C，但它并非唯一的选择，有些人更愿意使用其他语言来开发\
  \ Cocoa 应用。或许你有一个特定的代码库想要加以利用，或者你只是更喜欢其他某种语言。好消息是，存在一些语言能够很好地与 Objective-C 交互，通过使用该语言与\
  \ Objective-C 之间的所谓“桥接”，从而允许进行一定的 Cocoa 开发。\n\n而坏消息是（至少对某些人来说），两种最流行、最广泛使用的语言（C++\
  \ 和 Java）并不在此列。你可能会好奇这是为什么。简而言之：C++ 和 Java 过于僵化。它们缺乏与像 Cocoa 这样复杂的 Objective-C 类库进行完全交互所需的运行时内省能力。或许从技术角度看，Java\
  \ 具备这种能力。实际上，Apple 在 Mac OS X 的最初几个版本中包含了一个用于构建 Cocoa 应用的 Java 桥接。但程序员们并未趋之若鹜，再加上实现和维护该\
  \ Java 桥接所面临的技术挑战，使得这件事对他们来说得不偿失，因此 Apple 在几年前放弃了这个项目。而且，由于我们可以通过 Objective-C++\
  \ 的形式将 Objective-C 和 C++ 结合起来，对桥接的需求也因此有所降低。当然也存在一些实际限制。例如，我们无法以 C++ 类的形式实现一个 Objective-C\
  \ 的委托，因此需要创建一些“胶水类”，通常成对出现在边界两边（一个 C++ 类，一个 Objective-C 类），它们各自能够处理自己的世界，并为对方翻译内容。这种方法可行，但编写和维护这样的代码并不愉快。\n\
  \n再回到好消息方面，一批流行的脚本语言（Ruby、Python 和 JavaScript）拥有稳定且可用的桥接，让我们能够使用它们进行真正的 Cocoa 开发。\n\
  \n\n\n### PyObjC\n\n最早实现非 Objective-C 语言与 Cocoa 框架桥接的项目之一是 `PyObjC`，它让我们能够用 Python\
  \ 进行大量的 Cocoa 开发。正如你所知，Objective-C 的语法（尤其是方法名和参数的混合方式）有些特别，而大多数其他语言都没有与之对应的结构。`PyObjC`\
  \ 所做的是为 Cocoa 中包含的所有 Objective-C 类中的所有方法提供映射，以便我们可以从 Python 中调用它们。这些映射由一个相当简单的公式决定：整个\
  \ Objective-C 方法名被合并成一个符号，方法名中的每个冒号都被替换为下划线字符。所有方法参数都放在圆括号之间，就像标准 C 函数一样。所有对象都会被自动桥接，这样我们就可以直接从\
  \ Python 使用所有标准的 Cocoa 类。例如，让我们看一行关于通知的代码。这是 Objective-C 版本：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\n使用\
  \ `PyObjC` 的 Python 版本如下所示：\n\n```\ncenter = NSNotificationCenter.defaultCenter()\n\
  center.postNotificationName_object_(DATA_RECEIVED, self);\n```\n\n如你所见，缺少了混合的方法名部分和参数确实影响了可读性。此外，整体上它相当“不\
  \ Python 化”，所以虽然它在其功能上运行良好，但各方都会有些不满意的地方。\n\n`PyObjC` 似乎在几年前就达到了稳定状态，过去几个版本主要集中在错误修复上。可以从\
  \ `http://packages.python.org/pyobjc/` 获取的版本状态良好，并已用于实际项目。\n\n### MacRuby\n\n在 Ruby\
  \ 方面，有几种桥接到 Objective-C 的方法。多年来，一个名为 `RubyCocoa` 的项目一直可用，它在许多方面与 `PyObjC` 的工作方式类似。然而，`RubyCocoa`\
  \ 似乎已经停滞不前，大部分发展势头已经转向了一个名为 `MacRuby` 的较新项目。这个由苹果赞助的项目旨在以完全不同的方式将 Ruby 语法引入 Cocoa。`MacRuby`\
  \ 不是像 `RubyCocoa` 那样在相似类之间进行桥接，而是采取了一种不同的方法，基本上抛弃了所有现有的 Ruby 标准库类，转而使用等价的 Cocoa\
  \ 类，并且通常为它们提供名称与 Ruby 世界中等价类匹配的新方法。这意味着，经验丰富的 Ruby 开发者在接手 `MacRuby` 项目时，可能会发现他们喜爱的许多类和方法都缺失或略有不同。\n\
  \n`MacRuby` 与 `PyObjC` 和 `RubyCocoa` 的一个有趣区别是，`MacRuby` 会额外努力使方法调用的感觉更接近于它们在 Objective-C\
  \ 中的方式，同时仍然在 Ruby 语法中工作。这是通过巧妙地使用 Ruby 的关键字参数来实现的，即使用被调用的 Ruby 方法名和参数键来查找匹配的 Objective-C\
  \ 方法。回到之前的例子：\n\n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
  \ object:self];\n```\n\n在 `MacRuby` 中是这样写的：\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
  center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\n当 `MacRuby` 执行第二行时，它会使用方法名（`postNotificationName`）和参数键（`object`）在接收者（`center`）中查找一个名为\
  \ `postNotificationName:object:` 的 Objective-C 方法，找到它，并调用它。如果我们没有为 `object` 包含关键字参数，或者包含了其他不属于我们目标底层方法的关键字参数，那么这个方法调用将找不到匹配的\
  \ Objective-C 方法并失败。\n\n除此之外，`MacRuby` 还提供了一些其他有趣的功能，例如编译为本地代码，包括即时编译和提前编译。它也已经脱离了传统的\
  \ Ruby 虚拟机，转而采用基于 LLVM 构建的新运行时，你们中的一些人会认出这是 Xcode 可以使用的、最新式的编译器之一。\n\n在撰写本文时，`MacRuby`\
  \ 尚未发布 1.0 版本，但通过 `www.macruby.org` 关注它绝对值得。\n\n### Nu\n\n在这种背景下，另一个有趣的语言是 `Nu`。与\
  \ `PyObjC` 和 `MacRuby` 不同，这里并非是将现有语言与 Objective-C 对接的问题。相反，`Nu` 本质上是一种全新的语言（实际上是\
  \ Lisp 的一种变体），专为与 Objective-C 互操作而设计，因此它具备同样的交错方法和参数语法。让我们再看一次那个例子。Objective-C：\n\
  \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
  \ object:self];\n```\n\n`Nu`：\n\n```\n((NSNotificationCenter defaultCenter)\n  postNotificationName:DATA_RECEIVED\
  \ object:self)\n```\n\n如何！当然，它并非完全一致。即使忽略从方括号到圆括号的变化，在声明类、方法等方面还有许多其他语法变化，这通常源于\
  \ `Nu` 作为基于 Lisp 的语言的起源。然而，总的来说，这里有很多东西是 Objective-C 开发者一眼就能认出来的。\n\n除了语言本身，`Nu`\
  \ 还包括一个命令行 shell（`nush`）、一个类似 `make` 的工具（`nuke`）等等。这些工具组合成一个包，让我们可以启动一个 shell，并使用我们熟悉和喜爱的\
  \ Cocoa 类进行一些即兴脚本编写。我们可以与活动对象交互，并采用探索性方法使用 Cocoa 框架。前往 `http://programming.nu` 下载并了解更多关于这个\
  \ Cocoa 与 Lisp 之间的有趣结合。\n\n\n\n### JavaScript\n\n从某种意义上看，JavaScript 是这里的一个异类。众所周知，JavaScript\
  \ 可用于编写网页脚本，但你是否知道也可以用脚本来控制你的应用？Mac OS X 自带的 `WebKit` 框架虽然不允许我们完全用 JavaScript 创建整个应用，但它允许我们包含一个脚本层（无论是否带有网页视图），让熟悉\
  \ JavaScript 的人能够定义应用中的部分行为。\n\n这一点我们最有可能结合网页视图来使用。通过使用 WebKit 中的 `WebView` 类，我们可以“穿透”到\
  \ `WebScriptObject` 对象，这使我们能够从 Objective-C 调用 JavaScript 函数，同时也能将 Objective-C 对象暴露给\
  \ JavaScript 解释器，以便 JavaScript 代码可以通过类似 PyObjC 中所描述的方法到函数的映射机制来调用 Objective-C 方法。当我们希望使用\
  \ `WebView` 来布局图形用户界面（GUI），但又想在 GUI 中包含一些能够影响 JavaScript 环境之外事物的控件时，这一点尤为有用。\n\n\
  但别急，还有更多功能！除了 WebKit 提供的 JavaScript 支持外，还有一个名为 `JSCocoa` 的第三方方案，它使用与 WebKit 相同的\
  \ JavaScript 引擎（`JavaScriptCore`），将 JavaScript 与 Cocoa 完全桥接起来。这使我们能够用 JavaScript\
  \ 编写完整的 Cocoa 应用，就像用 Python 或 Ruby 一样。`JSCocoa` 的一个优良特性（与本章最后一节描述的 Cappuccino 共享此特性）在于，除了处理\
  \ JavaScript 风格函数名与 Objective-C 方法名之间的转换外，`JSCocoa` 实际上还允许我们使用一种与 Objective-C 惊人相似的语法来编写\
  \ JavaScript。\n\n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
  \ object:self];\n```\n\n`JSCocoa`:\n\n```\n[[NSNotificationCenter defaultCenter]\n\
  \  postNotificationName:DATA_RECEIVED object:self]\n```\n\n没错——唯一的区别就是缺少了分号，因为在一行\
  \ JavaScript 代码中，如果行尾本身就是一个有效的语句结束位置，我们就不需要在行末加分号。我们第一个承认这看起来像是一个 JavaScript 奇迹：我们不具备足够的\
  \ JavaScript 知识，丝毫不知道这个技巧是如何实现的，而且可能永远也不会知道，但这没关系。要了解更多信息，请访问 [`http://inexdo.com/JSCocoa`](http://inexdo.com/JSCocoa)。\n\
  \n### F-Script\n\n任何关于 Cocoa 编程中替代语言的讨论，如果不提及 F-Script 都是不完整的。与大多数最终旨在让我们用不同语言构建\
  \ Cocoa 应用的语言桥接方案不同，F-Script 似乎有几个互补的目的。首先，我们可以将 F-Script 嵌入到我们的应用中，为应用提供一种简单的方式来添加用户脚本功能，包括用于输入和试用基于\
  \ Smalltalk 语言（因此与 Objective-C 非常相似）的 F-Script 脚本的 GUI 组件。\n\nF-Script 的另一个，也许是更有用的特性，是它以交互式命令\
  \ shell 的形式为我们（开发者）提供的工具，让我们能够探索正在运行的应用。这包括一个图形浏览器，让我们可以在应用的对象之间导航，检查它们的属性，遍历它们与其他对象的关系等等。这就像是将\
  \ Xcode 调试器的交互性提升到了极致。\n\n不仅如此，我们还可以将 F-Script 注入到任何正在运行的 Cocoa 应用中，并使用相同的工具来探索其中的对象！虽然在没有目标应用源代码的情况下，此功能用处不大，但能够浏览其他应用的结构可能极具教育意义——同时也会很有趣。所有\
  \ Cocoa 开发者都应该对这个工具有所了解。请访问 [`http://www.fscript.org`](http://www.fscript.org) 亲自尝试。\n\
  \n## 移植的 Cocoa\n\n本书主要介绍制作 Mac 软件（标题中已明确指出），但如果我们不指出 Cocoa 及类似 Cocoa 技术可能应用于的其他领域，那对您来说将是一种损失。\n\
  \n### Cocoa Touch\n\n如今，随着 iPhone 开发的迅猛发展，想必阅读本书的每位读者都了解一些 iPhone 开发模式，并且知道它基于 Objective-C。事实上，很有把握地说，你在尝试\
  \ Mac 开发之前很可能已经做过一些 iPhone 开发。尽管如此，仍值得提及 iPhone 的 Cocoa Touch 框架以及它与我们一直在介绍的 Cocoa\
  \ 框架之间的区别。\n\nCocoa 的核心类分布在两个框架中：`Foundation` 包含所有在各种开发中都有用的基础类（如 `NSString`、`NSArray`\
  \ 等），而 `AppKit` 则包含所有专门用于桌面 GUI 应用开发的类（如 `NSApplication`、`NSView`、`NSWindow` 等）。在\
  \ iPhone 的 Cocoa Touch 中，`Foundation` 框架基本相同，但 `AppKit` 消失了，取而代之的是 `UIKit`。\n\n\
  `UIKit` 的许多基本概念与 AppKit 类似，但做了一些调整，使其能轻松运行在小尺寸、支持加速计、触摸屏的设备上。每个应用都有一个 `UIWindow`，所有绘制都在其中进行，并且该\
  \ `UIWindow` 包含一个 `UIView` 子类（如 `UIButton`、`UITextField` 等）的层级结构。虽然 AppKit 唯一的原生用户输入方法是鼠标和键盘，但\
  \ `UIKit` 也提供了类似的基于事件的处理，用于处理屏幕上的多点触摸以及设备的移动。\n\n在其他一些方面，`UIKit` 有点像是“AppKit 2.0”。苹果借机舍弃了一些可能在一二十年前看起来不错但现在已显得不必要的\
  \ API 和类。例如，将单元格类与视图区分开来的整个概念（如 `NSCell` 类所展示的）现在已经不复存在。`UIKit` 中唯一名称带有 cell 的类是\
  \ `UITableViewCell`，它实际上是一个 `UIView` 子类，用于绘制表格视图的一部分（因此得名）。此外，`UIKit` 在属性方面全面拥抱了\
  \ Objective-C 2.0，而 AppKit 从未做到，它为大多数可配置的属性提供了声明的属性。\n\n除此之外，Cocoa 中还有一些重要部分在 Cocoa\
  \ Touch 中不可用（至少在撰写本文时如此）。具体来说，就您在本书中阅读到的内容而言，缺失的最大一块是 Cocoa Bindings（Cocoa 绑定）。KVC\
  \ 和 KVO 仍然存在，所以如果您有雄心，构建自己的绑定技术的基础条件是具备的。如果不这样做，您会发现任何 iOS 应用中很大一部分都是胶水代码，用于将模型对象中的值推送到各种视图和控件中。\n\
  \n\n### GNUstep 与 Cocotron\n\n另一个可以运行类 Cocoa 应用的平台是 `GNUstep`，以及它较新的“战友”`Cocotron`。`GNUstep`\
  \ 项目已经存在了很长时间，其最初的目标是为 Linux 和其他 Unix 机器提供桌面应用程序编程环境。其开发库基于 `OpenStep` API，这是一个已发布的标准，列出了当今\
  \ `Foundation` 和 `AppKit` 框架子集中的类和 API。而这又源于 1990 年代中期 NeXT 与 Sun 的合作，当时 Sun 希望获得帮助，为其\
  \ Solaris 操作系统提供应用程序开发环境。所有这一切都早于苹果后来对 NeXT 的收购，而 NeXT 的操作系统和软件后来演变成了 Mac OS X。\n\
  \n所以时至今日，`GNUstep` 仍然“活跃在野外”。`GNUstep` 持续发展，通过志愿者重新实现苹果添加到 Mac OS X 中的最新功能来获取新的\
  \ API，但其主要目标始终是实现旧的 `OpenStep` API，新增内容只是锦上添花。目前，`GNUstep` 在知名项目方面还谈不上有什么值得炫耀的成果，但作为将\
  \ Cocoa 应用移植到其他 Unix 变体或 Windows 的一种方式，[`www.gnustep.org`](http://www.gnustep.org)\
  \ 上的 `GNUstep` 值得关注。\n\n几年前，出现了一个名为 `Cocotron` 的新替代品。`Cocotron` 的侧重点略有不同（力图跟上苹果所有最新类和\
  \ API 的变化），部署目标也不同（主要专注于 Windows 而非 Unix），但如果你打算将应用移植到 Windows，它也值得考虑。它的许可证也比 `GNUstep`\
  \ 更宽松，这意味着你可以自由地将 `Cocotron` 构建到自己的闭源应用程序中。`Cocotron` 的官方网站 [`www.cocotron.org`](http://www.cocotron.org)\
  \ 似乎已基本停止更新，但一些开发仍在进行，这可以从该项目在 Google Groups 上的讨论中得到证实，地址是 [`http://groups.google.com/group/cocotron-dev/`](http://groups.google.com/group/cocotron-dev/)。\n\
  \n### Cappuccino/Objective-J\n\n过去几年中另一个有趣的发展是 `Cappuccino` 开发环境。与我们提到的其他环境不同，`Cappuccino`\
  \ 完全是关于制作 Web 应用，而非桌面应用。因此，`Cappuccino` 应用并非在桌面上运行，而是托管在 Web 服务器上，在 Web 浏览器中运行。`Cappuccino`\
  \ 开发完全是关于在客户端运行软件，使用在单个 HTML 页面上下文中执行的 JavaScript，而不是像传统 Web 开发框架那样提供一页又一页的内容。\n\
  \n`Cappuccino` 包含的类库在名称和功能上模仿了 `Foundation` 和 `AppKit` 的许多内容，甚至能够实现将 Objective-C\
  \ 的许多语法在 JavaScript 中实现这一惊人技巧，就像我们在提到 `JSCocoa` 时描述的那样。使用 `Cappuccino` 创建的应用程序可以发布到任何\
  \ Web 服务器上，并在任何现代浏览器中运行，就像其他 Web 应用程序一样。这种在 JavaScript 中实现 Objective-C 的方式被称为 `Objective-J`，是使\
  \ `Cappuccino` 能够运行的关键部分。\n\n`Cappuccino` 最初以一种奇怪的混合体形式起步，包含一个包含 JavaScript 框架的开源核心，以及一个原本计划成为商业\
  \ IDE 的名为 `Atlas` 的工具，而 `Atlas` 本身就是一个 `Cappuccino` 应用程序。然而，在 `Atlas` 发布之前，支持这个想法的公司就被收购了。如今，这个开源项目已经扩展，包含了允许你直接在\
  \ Xcode 的 Interface Builder 中为你的 `Cappuccino` 应用构建图形用户界面的工具。请访问 [`www.cappuccino-project.org`](http://www.cappuccino-project.org)\
  \ 了解最新动态。\n\n## 在一切的终点\n\n以上结束了关于你在提升 Cocoa 技能过程中未来方向的讨论；这也为本书画上了句号。我们希望本书能带你到达你想去的地方，但请不要认为这个落脚点就是最终的目的地！请访问\
  \ Mac 版 Cocoa 学习网站，在那里你可以找到与其他 Cocoa 开发者交流的论坛、本书所有示例的源代码以及更多内容。并且一定要访问我们的网站 [`http://learncocoa.org`](http://learncocoa.org)，我们将尽最大努力帮助你学到更多知识！\n\
  \n\n\n"
