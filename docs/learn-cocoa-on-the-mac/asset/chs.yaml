  name\"`。切换到属性检查器（Attributes Inspector，⌥⌘4），在标题（Title）字段中输入`\"Name\"`；这将决定列标题中显示的文本。对第二列重复此过程，输入`\"\
  lastSeenDate\"`作为标识符，`\"Last Seen\"`作为标题；再对第三列重复此过程，输入`\"mugshot\"`作为标识符，`\"Mugshot\"\
  `作为标题。\n\n现在我们将添加一对按钮：一个用于向列表添加新反派，另一个用于删除选中的反派。回到对象库面板，在搜索字段中输入`\"button\"`；结果中会显示出数量惊人多的按钮列表。Apple\
