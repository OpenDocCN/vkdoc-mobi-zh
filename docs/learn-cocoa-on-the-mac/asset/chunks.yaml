    method and afterwards check the variable to see whether or not it’s still pointing
    at `nil`. If not, we know that the method encountered an error, and we ask the
    application to present the error to the user.


    `- (void)fileError {`


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    `// Declare a variable and point it at nil`


    `NSError *fileError = nil;`


    `// Pass the address of the fileError variable to the method`


    `NSDictionary *attributes = [fileManager`


    `attributesOfItemAtPath:@"/tmp" error:&fileError];`


    `// Check to see if the previous method call gave us an NSError`


    `if (fileError == nil) {`


    `// Show the attributes`


    `NSRunAlertPanel(@"Found file attributes"`,


    `[attributes description], nil, nil, nil);`


    `} else {`


    `// Report the error`


    `[NSApp presentError:fileError];`


    `}`


    `}`


    For simplicity’s sake, while exploring `NSError` we’ll continue building onto
    the project we’re already playing with. Add the `fileError` method shown previously
    to the app delegate class, and add a `[self fileError];` line to the `applicationDidFinishLaunching:`
    method. Run the app, and we’ll see something like the alert panel shown in Figure
    [13-8](#A978-1-4302-4543-8_13_Chapter.html#Fig8).


    ![A978-1-4302-4543-8_13_Fig8_HTML.jpg](A978-1-4302-4543-8_13_Fig8_HTML.jpg)


    Figure 13-8.


    No error here!


    Now go back and edit the `fileManager` call, changing the string parameter from
    `@`“`/tmp`” to `@`“`/tmpfoo`” or some other non-existent path. This will cause
    `fileManager` to encounter an error and give it back to us, in the `fileError`
    variable whose address we passed in. It will notice this error and pass it off
    to `NSApp`, resulting in the alert panel shown in [Figure 12-5](#A978-1-4302-4543-8_13_Chapter.html#Fig5).


    ![A978-1-4302-4543-8_13_Fig9_HTML.jpg](A978-1-4302-4543-8_13_Fig9_HTML.jpg)


    Figure 13-9.


    There’s the error


    That’s fine, but look at the text in that alert panel: “The file “tmpfoo” couldn’t
    be opened because there is no such file.” Doesn’t that seem a little… non-technical?
    Aren’t we used to a bit more jargony language in our computer systems? After all,
    the error was triggered by a low-level system routine that reported just an error
    number and nothing else. Where did that text come from?


    It turns out that `NSError` has a method called `localizedDescription`, which
    gives us a nice, human-readable explanation of the error. This description is
    what’s eventually displayed by the `reportError:` method.


    Let’s explore this a bit by using the debugger. In Xcode, set a breakpoint on
    the line containing `[NSApp presentError:fileError]` by clicking in the gutter
    to the left of the line in the text editor (the gutter is the space where the
    line numbers are shown). This is the most straightforward way to set a breakpoint
    in our code. Then run the app again. The app will halt at the chosen line, leaving
    us with the lldb prompt in the output console. Let’s dig in a bit, asking the
    error about its domain and error code by executing commands at the lldb prompt:


    `(lldb) po [fileError domain]`


    `$0 = 0x00007fff7cdab110 NSCocoaErrorDomain`


    `(lldb) p (int)[fileError code]`


    `(int) $1 = 260`


    `(lldb) po [fileError localizedDescription]`


    `$2 = 0x0000000102327470 The file "tmpfoo" couldn''t be opened because there is
    no such file.`


    Note that we can print the value of an `NSString` using the `po` command and the
    value of any basic C type using the `p` command. Often when using the `p` command,
    lldb will complain that it doesn’t know the type of the value we’re trying to
    display, so we put a little `(int)` just before the method call, which tells lldb
    what to expect.


    Now we know the error code and domain. A quick look in `FoundationErrors.h` turns
    up this info:


    `NSFileReadNoSuchFileError = 260,    // Read error (no such file)`


    That still might leave you wondering how this hangs together. As you recall, when
    you create an `NSError`, you specify a domain, a code, and optionally a dictionary
    containing additional info. This dictionary is a key piece of the puzzle. If the
    dictionary you pass into this method has a value for a key called `@`“`NSLocalizedDescriptionKey`”,
    then that value will be returned whenever `localizedDescription` is called.


    So, let’s see what the `userInfo` dictionary contains.


    `(lldb) po [fileError userInfo]`


    `$3 = 0x0000000102118850 {`


    `NSFilePath = "/tmpfoo";`


    `NSUnderlyingError = "Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn\U2019t
    be completed. No such file or directory\"";`


    `}`


    Um, apparently that’s not the answer. The `userInfo` dictionary doesn’t specify
    a localized description, but it does include a couple of other things: the path
    to the file we were trying to access, and what looks like another `NSError`. An
    error wrapped inside an error! Let’s see what that inner error’s `domain`, `code`,
    `userInfo`, and `localizedError` look like. We start off with another lldb command
    called `expression`, which simply executes the statements on the rest of the line
    just as if it were source code, but without printing a result like the `po` or
    `p` commands do. In this case, we’re assigning the address of the inner error
    object to a new variable we’re calling `$inner`. This is a nice feature of lldb
    that lets us hang on to the results of queries we execute, letting values stick
    around, and saving us some typing later on. We’ll grab the `userInfo` dictionary
    from the `fileError`, then immediately use Objective-C’s new dictionary look-up
    syntax to access the underlying error.


    `(lldb) expression id $inner = [fileError userInfo][@"NSUnderlyingError"]`


    `(lldb) po $inner`


    `$inner = 0x000000010210a9e0 Error Domain=NSPOSIXErrorDomain Code=2 "The operation
    couldn''t be completed. No such file or directory"`'
