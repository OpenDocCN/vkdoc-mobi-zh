    For each view in a window, there are a couple of important rectangles (or rects,
    as they are commonly called) that define a lot about its drawing characteristics:
    its frame rect and its bounds rect. The frame rect simply specifies the view’s
    location and size within its parent view’s coordinate space. For example, imagine
    the top-level view in a window. Let’s call it A. If A has a subview called B that
    extends from point (10,20) to point (40,60), then B’s frame rect has (10,20) as
    its origin and (30,40) as its size.


    Apart from its frame, which determines where and to what extent it appears in
    its superview, each view has a bounds rect, which defines its own inner coordinate
    space. For example, view B described previously will by default have a bounds
    rect whose origin is (0,0) and whose size is (30,40). We can easily change this
    if we want. For example, say we’ve got a bunch of points to plot with x and y
    values of between 0.0 and 10.0\. By changing the bounds rect of B, setting its
    size to (10,10), the points will exactly fill the space occupied by B, no matter
    how much space B actually takes on-screen (see Figure [14-2](#A978-1-4302-4543-8_14_Chapter.html#Fig2)).


    ![A978-1-4302-4543-8_14_Fig2_HTML.jpg](A978-1-4302-4543-8_14_Fig2_HTML.jpg)


    Figure 14-2.


    On the left, plotting points from a narrow range in a view with default bounds.
    On the right, the same points plotted in a view with smaller bounds


    ### Rects, Points, and Sizes


    In Cocoa, rectangles are represented by a C struct called `NSRect`, which is composed
    of an `NSPoint` containing the origin and an `NSSize` containing the size. Both
    the origin and size each contain two values of type `CGFloat`, a basic C type
    used throughout Cocoa’s drawing APIs; origin has x and y, size has width and height.


    To confuse matters somewhat, many functions in Core Graphics make use of equivalent
    structures `CGRect`, `CGPoint`, and `CGSize`, which have the same structural layout
    and are all composed of `CGFloat` elements. The historical reasons for this divide
    aren’t terribly interesting, and as long as we’re not working with a 32-bit legacy
    application, these C structs have identical layouts and can be converted back
    and forth with inline functions (for example, `NSRectToCGRect`, `NSSizeFromCGSize`,
    and so on) that are really little more than typecasts. In this chapter, we’ll
    mostly be using the NS-prefixed versions.


    ### Path Basics


    Cocoa’s drawing mechanism includes the concept of paths, which can contain any
    number of straight or curved-line segments. Each path doesn’t need to be contiguous.
    We can “pick up the pen” at one point and start drawing again at another. Before
    a path is actually drawn, we can specify values such as line thickness, color,
    and the like. Those settings will be applied to every part of the path. Any shapes
    outlined by parts of the path can also be filled with a separate color or pattern.


    ## Creating an NSView Subclass


    Let’s start exploring a bit by creating an application that’s able to draw a very
    happy smiley face (see Figure [14-3](#A978-1-4302-4543-8_14_Chapter.html#Fig3)).
    In Xcode, create a new Cocoa project named MrSmiley. We’ll be using a class prefix
    of MS for our Mr Smiley app, and we’ll want to leave Automatic Reference Counting
    turned on.


    ![A978-1-4302-4543-8_14_Fig3_HTML.jpg](A978-1-4302-4543-8_14_Fig3_HTML.jpg)


    Figure 14-3.


    Mr Smiley is very, very happy


    Now create a new Objective-C class, a subclass of `NSView`, and name it `MSSmileyView`.
    Do this by selecting File ➤ New ➤ File  .  .  .  (⌘-N), or by right-clicking in
    the Project Navigator pane on the left side of the Xcode window and selecting
    New File  .  .  .  from the pop-up menu. Xcode will create the class’s files for
    us, including `MSSmileyView.m`, where all this section’s work will take place.


    Before getting started on the code, open the project’s `MainMenu.xib` file. Grab
    a custom view from the Library window, and drag it into the blank window that
    is created by default. Use the Identity Inspector to change the view’s class to
    MSSmileyView (under the Custom Class heading), then use the Size Inspector to
    change its width and height to 100×100\. Finally, select the window and press
    ⌘-= to make the window resize itself to perfectly fit the view. Then save the
    changes.


    ### The Basic Drawing Method, drawRect:


    Now let’s get into the code. The `MSSmileyView.m` file created by Xcode contains
    an empty `drawRect:` method, which is where we’ll start writing our code. The
    `drawRect:` method is something we usually won’t call directly, except for cases
    where we’re implementing a subclass of an existing view and calling `[super drawRect:rect]`
    to let the superclass do its part of the drawing. Instead, the `drawRect:` method
    is called automatically whenever the application’s main run loop determines that
    the view needs to be redrawn (typically after a view has been created or resized,
    or our own code has called `setNeedsDisplay:` on our view, passing YES as the
    argument). The `drawRect:` method takes one argument, a rectangle that indicates
    which portion of the view is considered “dirty” and needs to be redrawn. This
    can be used to optimize drawing of complex views, but in our examples we’ll just
    ignore that, and instead make use of the view’s bounds rectangle for drawing.


    ### Graphics States


    All drawing in Cocoa occurs within a particular context, which is represented
    by the `NSGraphicsContext` class. Depending on the context, we may be drawing
    directly into a window buffer or drawing into a chunk of off-screen memory for
    later use. But apart from that, the context has some state information of its
    own that can change over time, such as the current color to be used for any drawing
    commands. When it’s time for our view to draw itself, it should do so in such
    a way that the graphics state is put back into the state it was in when drawing
    started.


    Fortunately, `NSGraphicsContext` provides us with an easy way to do just that.
    Its `saveGraphicsState` method will push all relevant state info onto a stack,
    and the `restoreGraphicsState` method will pop the state back off the stack. We
    can use these two method calls to “bracket” our actual drawing code like the following
    excerpt shows, so we know we aren’t leaving the graphics context in an unexpected
    state.


    `- (void)drawRect:(NSRect)dirtyRect`


    `{`


      `[NSGraphicsContext saveGraphicsState];`


      `// Drawing code here.`


      `[NSGraphicsContext restoreGraphicsState];`


    `}`'
  trans: "\n### 视图框（Frame Rectangle）与边界框（Bounds Rectangle）\n\n窗口中的每个视图都有两个重要的矩形（通常简称为\
    \ rects），它们定义了大量绘图特性：视图框和边界框。视图框仅指定视图在其父视图坐标空间中的位置和大小。例如，假设窗口中有个顶级视图，称为 A。如果 A\
    \ 有一个子视图 B，其坐标从点 (10,20) 延伸到点 (40,60)，那么 B 的视图框原点为 (10,20)，大小为 (30,40)。\n\n除了决定其父视图中显示位置和范围的视图框外，每个视图还有一个边界框，用于定义其自身的内部坐标空间。例如，前面描述的视图\
    \ B 默认的边界框原点为 (0,0)，大小为 (30,40)。若需要，我们可以轻松更改这一点。例如，假设我们有一系列要绘制的点，其 x 和 y 值介于 0.0\
    \ 到 10.0 之间。通过将 B 的边界框大小改为 (10,10)，这些点将恰好填满 B 所占用的空间，无论 B 在屏幕上实际占据多大空间（见图 14-2）。\n\
    \n![A978-1-4302-4543-8_14_Fig2_HTML.jpg](img/A978-1-4302-4543-8_14_Fig2_HTML.jpg)\n\
    \n图 14-2.\n\n左侧：在默认边界的视图中绘制小范围点集；右侧：在较小边界的同一视图中绘制相同点集\n\n### 矩形、点与尺寸\n\n在 Cocoa\
    \ 中，矩形由 C 结构体 `NSRect` 表示，该结构体包含一个表示原点的 `NSPoint` 和一个表示尺寸的 `NSSize`。原点和尺寸各自包含两个\
    \ `CGFloat` 类型的值，`CGFloat` 是 Cocoa 绘图 API 中广泛使用的基本 C 类型；原点包含 x 和 y，尺寸包含宽度和高度。\n\
    \n更令人困惑的是，Core Graphics 中的许多函数使用了等效的结构体 `CGRect`、`CGPoint` 和 `CGSize`，它们具有相同的结构布局，且均由\
    \ `CGFloat` 元素组成。这种划分的历史原因并不值得深究，只要我们不处理 32 位遗留应用，这些 C 结构体就具有相同的布局，并且可以通过内联函数（例如\
    \ `NSRectToCGRect`、`NSSizeFromCGSize` 等，这些实际上只是类型转换）相互转换。本章我们将主要使用 NS 前缀的版本。\n\
    \n### 路径基础\n\nCocoa 的绘图机制包含路径的概念，路径可以包含任意数量的直线或曲线段。每个路径不需要是连续的。我们可以在一个点“抬起笔”，在另一个点重新开始绘制。在实际绘制路径之前，我们可以指定线条粗细、颜色等值。这些设置将应用于路径的每个部分。路径各部分勾勒出的任何形状也都可以用单独的颜色或图案填充。\n\
    \n## 创建 NSView 子类\n\n让我们先创建一个能够绘制一张非常开心的笑脸的应用（见图 14-3），以此开始探索。在 Xcode 中，新建一个名为\
    \ MrSmiley 的 Cocoa 项目。我们将为 Mr Smiley 应用使用 MS 作为类前缀，并保持自动引用计数处于开启状态。\n\n![A978-1-4302-4543-8_14_Fig3_HTML.jpg](img/A978-1-4302-4543-8_14_Fig3_HTML.jpg)\n\
    \n图 14-3.\n\nMr Smiley 非常非常开心\n\n现在创建一个新的 Objective-C 类，作为 `NSView` 的子类，并将其命名为\
    \ `MSSmileyView`。操作方法是：选择 File ➤ New ➤ File . . .（⌘-N），或者在 Xcode 窗口左侧的项目导航器窗格中右键单击，从弹出菜单中选择\
    \ New File . . .。Xcode 将为我们创建类的文件，其中包括 `MSSmileyView.m`，本节的所有工作都将在此文件中进行。\n\n\
    在开始编写代码之前，打开项目的 `MainMenu.xib` 文件。从 Library 窗口中抓取一个自定义视图，将其拖入默认创建的空白窗口中。使用标识检查器（Identity\
    \ Inspector）将视图的类改为 `MSSmileyView`（在 Custom Class 标题下），然后使用大小检查器（Size Inspector）将其宽度和高度改为\
    \ 100×100。最后，选中窗口并按 ⌘-= 让窗口自动调整大小以完美适配该视图。然后保存更改。\n\n### 基本绘图方法 drawRect:\n\n\
    现在开始编写代码。Xcode 创建的 `MSSmileyView.m` 文件包含一个空的 `drawRect:` 方法，我们将从这里开始编码。`drawRect:`\
    \ 方法通常不会直接调用，除非我们正在实现某个现有视图的子类，并通过调用 `[super drawRect:rect]` 让父类完成其绘图工作。相反，当应用的主运行循环确定视图需要重绘时（通常是在视图被创建或调整大小之后，或者我们的代码在视图上调用了\
    \ `setNeedsDisplay:` 并传入 `YES` 作为参数时），系统会自动调用 `drawRect:` 方法。`drawRect:` 方法接受一个参数，即一个矩形，用于指示视图的哪个部分被视为“脏区”需要重绘。这可以用于优化复杂视图的绘制，但在我们的示例中，我们将忽略这一点，而是直接使用视图的边界矩形进行绘图。\n\
    \n### 图形状态\n\nCocoa 中的所有绘图都发生在特定上下文中，该上下文由 `NSGraphicsContext` 类表示。根据上下文的不同，我们可能直接绘制到窗口缓冲区，或绘制到一块离屏内存中供以后使用。除此之外，上下文还含有一系列会随时间变化的状态信息，例如当前用于所有绘图命令的颜色。当视图需要绘制自身时，它应确保绘图结束后图形状态恢复到绘图开始前的状态。\n\
    \n幸运的是，`NSGraphicsContext` 为我们提供了一种简便方法来实现这一点。其 `saveGraphicsState` 方法会将所有相关状态信息压入栈中，而\
    \ `restoreGraphicsState` 方法会将状态从栈中弹出。我们可以像下面的代码片段那样，用这两个方法调用将实际绘图代码“括起来”，从而确保不会让图形上下文处于意外的状态。\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect\n{\n  [NSGraphicsContext saveGraphicsState];\n\
    \  // 此处编写绘图代码。\n  [NSGraphicsContext restoreGraphicsState];\n}\n```\n"
- fmt: "# Path Helpers\n\nTo draw the view shown at the beginning of this section,\
    \ we’ll first draw the background, then the face itself. For each of those two\
    \ elements, we’ll first fill in the background, then draw the edge. All of this\
    \ is done using the `NSBezierPath` class. A Bezier path allows us to define paths\
    \ of arbitrary complexity, including straight lines, points, curves, and so on.\
    \ One of the niceties of the `NSBezierPath` class is that it provides nice shortcuts\
    \ for creating a Bezier path representing common shapes such as rectangles, ovals,\
    \ and the like.\n\nLet’s start by creating a path that defines the visible edge\
    \ of the view, using a class method on `NSBezierPath` that gives us a rounded\
    \ rect. The lines shown in bold below create a path, fill it with white, and then\
    \ “stroke” the path (draw its edge) in black:\n\n```\n- (void)drawRect:(NSRect)dirtyRect\n\
    {\n  [NSGraphicsContext saveGraphicsState];\n  NSRect bRect = CGRectInset([self\
    \ bounds], 5, 5);\n  NSBezierPath *border = [NSBezierPath bezierPathWithRoundedRect:bRect\n\
    \    xRadius:5 yRadius:5];\n  [[NSColor whiteColor] set];\n  [border fill];\n\
    \  [border setLineWidth:3];\n  [[NSColor blackColor] set];\n  [border stroke];\n\
    \  [NSGraphicsContext restoreGraphicsState];\n}\n```\n\nThe first step uses the\
    \ `CGRectInset` function to shrink our bounds rect a bit, giving us a little wiggle\
    \ room so that we can draw a rounded rect with thick lines without having them\
    \ clipped by our edges. Then we create a path representing a rounded rect, specifying\
    \ the basic geometry of the rect as well as two numbers defining the size of the\
    \ elliptical curves used for the rounded corners. After that, we issue simple\
    \ commands to set colors, a line width, and do some drawing.\n\n## Colors and\
    \ the Graphics Context\n\nNote that specifying which color to use for a drawing\
    \ operation is a separate step from the drawing operation itself, as is setting\
    \ the line width. Also, although setting the line width is done through a method\
    \ on the path itself, setting the color looks like a sort of free-floating operation.\
    \ We just send any color the `set` message, and suddenly it’s the current color!\
    \ What’s happening is that `NSColor`’s `set` method interacts with the underlying\
    \ graphics context, setting the color that will be used for subsequent drawing\
    \ operations. One consequence of this is that `NSColor`’s `set` method will only\
    \ do something useful while there is a current graphics context, such as within\
    \ a `drawRect:` method. Another consequence is that the current color is a property\
    \ (in a general sense, if not an Objective-C language sense) of the graphics context,\
    \ so whatever color was set before our method is saved at the beginning of our\
    \ method when `[NSGraphicsContext saveGraphicsState]` is called and is restored\
    \ at the end when `[NSGraphicsContext restoreGraphicsState]` is called, putting\
    \ everything back in order again.\n\nAt this point, if we Run the application\
    \ in Xcode, we’ll see that it draws a white rect with a black outline (Figure\
    \ [14-4](#A978-1-4302-4543-8_14_Chapter.html#Fig4)).\n\n![A978-1-4302-4543-8_14_Fig4_HTML.jpg](A978-1-4302-4543-8_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4.\n\nThe shape of things to come\n\n## Beyond Color\n\nNow let’s\
    \ start drawing the head. Add these lines to the `drawRect:` method, toward the\
    \ end but still before the `[NSGraphicsContext restoreGraphicsState]` call:\n\n\
    ```\nNSRect hRect = CGRectInset([self bounds],20,20);\nNSBezierPath *head = [NSBezierPath\
    \ bezierPathWithOvalInRect:hRect];\nNSGradient *faceGradient = [[NSGradient alloc]\n\
    \  initWithStartingColor:[NSColor whiteColor]\n  endingColor:[NSColor lightGrayColor]];\n\
    [faceGradient drawInBezierPath:head angle:45];\n[head setLineWidth:3];\n[head\
    \ stroke];\n```\n\nHere we are once again using `CGRectInset` to make a new rect\
    \ that is smaller than our bounds, this time to create an oval shape for Mr Smiley’s\
    \ head. After creating a Bezier path, we create something new, an instance of\
    \ `NSGradient`, which knows how to take two or more colors and draw a smooth gradient\
    \ between them. In this example, it can draw itself across the inner surface of\
    \ a Bezier path. Run this code; the view now contains a round “head” with a shaded\
    \ gradient (Figure [14-5](#A978-1-4302-4543-8_14_Chapter.html#Fig5)).\n\n![A978-1-4302-4543-8_14_Fig5_HTML.jpg](A978-1-4302-4543-8_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5.\n\nThe basic head shot\n\n## Manual Path Construction\n\nNow all\
    \ that’s left is to draw the facial features (a simple mouth and eyes). Add these\
    \ lines to the end of `drawRect:` (but before the final `[NSGraphicsContext restoreGraphicsState]`\
    \ call):\n\n```\nNSBezierPath *features = [NSBezierPath bezierPath];\n[features\
    \ moveToPoint:NSMakePoint(35, 30)];\n[features lineToPoint:NSMakePoint(65, 30)];\n\
    [features moveToPoint:NSMakePoint(40, 40)];\n[features lineToPoint:NSMakePoint(40,\
    \ 40)];\n[features moveToPoint:NSMakePoint(60, 40)];\n[features lineToPoint:NSMakePoint(60,\
    \ 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n[features setLineWidth:3];\n\
    [features stroke];\n```\n\nHere, instead of using one of the convenient class\
    \ methods on `NSBezierPath` to get a complete shape right away, we are using some\
    \ more basic methods to construct a path out of nothing. The `moveToPoint:` method\
    \ positions a virtual “pen” at the specified point, without drawing a line to\
    \ it. And `lineToPoint:` draws a line from the path’s current point to the new\
    \ point. In reality, these methods don’t do any drawing; they simply build up\
    \ the Bezier path structure that is later drawn by the `stroke` method.\n\nOne\
    \ additional finesse here is that we set the line cap style. This setting defines\
    \ what happens at the ends of lines. This is especially important for the eyes,\
    \ which are drawn as a single point. Using the default setting, which lops off\
    \ everything precisely where the line segment ends, the eyes were completely invisible,\
    \ but using `NSRoundLineCapStyle` gives us a perfect tiny circle for each eye.\
    \ Click Run to see the final result (Figure [14-6](#A978-1-4302-4543-8_14_Chapter.html#Fig6)).\n\
    \n![A978-1-4302-4543-8_14_Fig6_HTML.jpg](A978-1-4302-4543-8_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6.\n\nMr Smiley. He really is happy!"
  raw: '### Path Helpers


    To draw the view shown at the beginning of this section, we’ll first draw the
    background, then the face itself. For each of those two elements, we’ll first
    fill in the background, then draw the edge. All of this is done using the `NSBezierPath`
    class. A Bezier path allows us to define paths of arbitrary complexity, including
    straight lines, points, curves, and so on. One of the niceties of the `NSBezierPath`
    class is that it provides nice shortcuts for creating a Bezier path representing
    common shapes such as rectangles, ovals, and the like.


    Let’s start by creating a path that defines the visible edge of the view, using
    a class method on `NSBezierPath` that gives us a rounded rect. The lines shown
    in bold below create a path, fill it with white, and then “stroke” the path (draw
    its edge) in black:


    `- (void)drawRect:(NSRect)dirtyRect`


    `{`


      `[NSGraphicsContext saveGraphicsState];`


      `NSRect bRect = CGRectInset([self bounds], 5, 5);`


      `NSBezierPath *border = [NSBezierPath bezierPathWithRoundedRect:bRect`


        `xRadius:5 yRadius:5];`


      `[[NSColor whiteColor] set];`


      `[border fill];`


      `[border setLineWidth:3];`


      `[[NSColor blackColor] set];`


      `[border stroke];`


      `[NSGraphicsContext restoreGraphicsState];`


    `}`


    The first step uses the `CGRectInset` function to shrink our bounds rect a bit,
    giving us a little wiggle room so that we can draw a rounded rect with thick lines
    without having them clipped by our edges. Then we create a path representing a
    rounded rect, specifying the basic geometry of the rect as well as two numbers
    defining the size of the elliptical curves used for the rounded corners. After
    that, we issue simple commands to set colors, a line width, and do some drawing.


    ### Colors and the Graphics Context


    Note that specifying which color to use for a drawing operation is a separate
    step from the drawing operation itself, as is setting the line width. Also, although
    setting the line width is done through a method on the path itself, setting the
    color looks like a sort of free-floating operation. We just send any color the
    set message, and suddenly it’s the current color! What’s happening is that `NSColor`’s
    set method interacts with the underlying graphics context, setting the color that
    will be used for subsequent drawing operations. One consequence of this is that
    `NSColor`’s set method will only do something useful while there is a current
    graphics context, such as within a `drawRect:` method. Another consequence is
    that the current color is a property (in a general sense, if not an Objective-C
    language sense) of the graphics context, so whatever color was set before our
    method is saved at the beginning of our method when `[NSGraphicsContext saveGraphicsState]`
    is called and is restored at the end when `[NSGraphicsContext restoreGraphicsState]`
    is called, putting everything back in order again.


    At this point, if we Run the application in Xcode, we’ll see that it draws a white
    rect with a black outline (Figure [14-4](#A978-1-4302-4543-8_14_Chapter.html#Fig4)).


    ![A978-1-4302-4543-8_14_Fig4_HTML.jpg](A978-1-4302-4543-8_14_Fig4_HTML.jpg)


    Figure 14-4.


    The shape of things to come


    ### Beyond Color


    Now let’s start drawing the head. Add these lines to the `drawRect:` method, toward
    the end but still before the `[NSGraphicsContext restoreGraphicsState]` call:


    `NSRect hRect = CGRectInset([self bounds],20,20);`


    `NSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];`


    `NSGradient *faceGradient = [[NSGradient alloc]`


      `initWithStartingColor:[NSColor whiteColor]`


      `endingColor:[NSColor lightGrayColor]];`


    `[faceGradient drawInBezierPath:head angle:45];`


    `[head setLineWidth:3];`


    `[head stroke];`


    Here we are once again using `CGRectInset` to make a new rect that is smaller
    than our bounds, this time to create an oval shape for Mr Smiley’s head. After
    creating a Bezier path, we create something new, an instance of `NSGradient`,
    which knows how to take two or more colors and draw a smooth gradient between
    them. In this example, it can draw itself across the inner surface of a Bezier
    path. Run this code; the view now contains a round “head” with a shaded gradient
    (Figure [14-5](#A978-1-4302-4543-8_14_Chapter.html#Fig5)).


    ![A978-1-4302-4543-8_14_Fig5_HTML.jpg](A978-1-4302-4543-8_14_Fig5_HTML.jpg)


    Figure 14-5.


    The basic head shot


    ### Manual Path Construction


    Now all that’s left is to draw the facial features (a simple mouth and eyes).
    Add these lines to the end of `drawRect:` (but before the final `[NSGraphicsContext
    restoreGraphicsState]` call):


    `NSBezierPath *features = [NSBezierPath bezierPath];`


    `[features moveToPoint:NSMakePoint(35, 30)];`


    `[features lineToPoint:NSMakePoint(65, 30)];`


    `[features moveToPoint:NSMakePoint(40, 40)];`


    `[features lineToPoint:NSMakePoint(40, 40)];`


    `[features moveToPoint:NSMakePoint(60, 40)];`


    `[features lineToPoint:NSMakePoint(60, 40)];`


    `[features setLineCapStyle:NSRoundLineCapStyle];`


    `[features setLineWidth:3];`


    `[features stroke];`


    Here, instead of using one of the convenient class methods on `NSBezierPath` to
    get a complete shape right away, we are using some more basic methods to construct
    a path out of nothing. The `moveToPoint:` method positions a virtual “pen” at
    the specified point, without drawing a line to it. And `lineToPoint:` draws a
    line from the path’s current point to the new point. In reality, these methods
    don’t do any drawing; they simply build up the Bezier path structure that is later
    drawn by the stroke method.


    One additional finesse here is that we set the line cap style. This setting defines
    what happens at the ends of lines. This is especially important for the eyes,
    which are drawn as a single point. Using the default setting, which lops off everything
    precisely where the line segment ends, the eyes were completely invisible, but
    using `NSRoundLineCapStyle` gives us a perfect tiny circle for each eye. Click
    Run to see the final result (Figure [14-6](#A978-1-4302-4543-8_14_Chapter.html#Fig6)).


    ![A978-1-4302-4543-8_14_Fig6_HTML.jpg](A978-1-4302-4543-8_14_Fig6_HTML.jpg)


    Figure 14-6.


    Mr Smiley. He really is happy!'
  trans: "\n# 路径辅助工具\n\n为了绘制本节开头展示的视图，我们首先绘制背景，然后绘制脸部本身。对于这两个元素中的每一个，我们先填充背景，再绘制边缘。所有这些操作都通过\
    \ `NSBezierPath` 类完成。贝塞尔路径允许我们定义任意复杂度的路径，包括直线、点、曲线等。`NSBezierPath` 类的一个便利之处在于，它提供了创建表示常见形状（如矩形、椭圆等）的贝塞尔路径的便捷快捷方式。\n\
    \n让我们从创建一个定义视图可见边缘的路径开始，使用 `NSBezierPath` 的一个类方法来生成圆角矩形。下方以**粗体**显示的行创建了一个路径，用白色填充它，然后用黑色“描边”（绘制其边缘）：\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect\n{\n  [NSGraphicsContext saveGraphicsState];\n\
    \  NSRect bRect = CGRectInset([self bounds], 5, 5);\n  NSBezierPath *border =\
    \ [NSBezierPath bezierPathWithRoundedRect:bRect\n    xRadius:5 yRadius:5];\n \
    \ [[NSColor whiteColor] set];\n  [border fill];\n  [border setLineWidth:3];\n\
    \  [[NSColor blackColor] set];\n  [border stroke];\n  [NSGraphicsContext restoreGraphicsState];\n\
    }\n```\n\n第一步使用 `CGRectInset` 函数将我们的边界矩形缩小一点，留出一些余量，以便我们可以绘制带有粗线条的圆角矩形，而不会被边缘裁剪。然后，我们创建一个表示圆角矩形的路径，指定矩形的基本几何形状以及两个定义用于圆角的椭圆曲线大小的数字。之后，我们发出简单的命令来设置颜色、线宽并进行一些绘制。\n\
    \n## 颜色与图形上下文\n\n请注意，指定绘图操作使用的颜色与绘图操作本身是分开的步骤，设置线宽也是如此。此外，虽然设置线宽是通过路径本身的方法完成的，但设置颜色看起来像是一种自由浮动操作。我们只需向任何颜色发送\
    \ `set` 消息，它立刻就变成了当前颜色！发生的情况是，`NSColor` 的 `set` 方法与底层图形上下文交互，设置将用于后续绘图操作的颜色。这带来的一个后果是，`NSColor`\
    \ 的 `set` 方法仅在存在当前图形上下文时（例如在 `drawRect:` 方法内部）才会执行有用的操作。另一个后果是，当前颜色是图形上下文的一个属性（在一般意义上，而非\
    \ Objective-C 语言意义上），因此无论之前设置了什么颜色，都会在方法开始时通过调用 `[NSGraphicsContext saveGraphicsState]`\
    \ 保存，并在方法结束时通过调用 `[NSGraphicsContext restoreGraphicsState]` 恢复，从而使一切恢复原状。\n\n\
    此时，如果在 Xcode 中运行应用程序，我们会看到它绘制了一个带有黑色轮廓的白色矩形（图 14-4）。\n\n![A978-1-4302-4543-8_14_Fig4_HTML.jpg](img/A978-1-4302-4543-8_14_Fig4_HTML.jpg)\n\
    \n图 14-4.\n\n未来形状的雏形\n\n## 超越颜色\n\n现在让我们开始绘制头部。将以下行添加到 `drawRect:` 方法的末尾附近，但仍在\
    \ `[NSGraphicsContext restoreGraphicsState]` 调用之前：\n\n```\nNSRect hRect = CGRectInset([self\
    \ bounds],20,20);\nNSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];\n\
    NSGradient *faceGradient = [[NSGradient alloc]\n  initWithStartingColor:[NSColor\
    \ whiteColor]\n  endingColor:[NSColor lightGrayColor]];\n[faceGradient drawInBezierPath:head\
    \ angle:45];\n[head setLineWidth:3];\n[head stroke];\n```\n\n这里我们再次使用 `CGRectInset`\
    \ 创建一个比边界矩形更小的新矩形，这次是为笑脸先生的头部创建一个椭圆形。在创建贝塞尔路径后，我们创建了一个新东西——`NSGradient` 的实例，它知道如何获取两种或多种颜色并在它们之间绘制平滑渐变。在这个例子中，它可以在贝塞尔路径的内表面绘制自身。运行这段代码；视图现在包含一个带有渐变阴影的圆形“头部”（图\
    \ 14-5）。\n\n![A978-1-4302-4543-8_14_Fig5_HTML.jpg](img/A978-1-4302-4543-8_14_Fig5_HTML.jpg)\n\
    \n图 14-5.\n\n基本的头部特写\n\n## 手动路径构建\n\n现在剩下的就是绘制面部特征（一个简单的嘴巴和眼睛）。将以下行添加到 `drawRect:`\
    \ 的末尾（但在最终的 `[NSGraphicsContext restoreGraphicsState]` 调用之前）：\n\n```\nNSBezierPath\
    \ *features = [NSBezierPath bezierPath];\n[features moveToPoint:NSMakePoint(35,\
    \ 30)];\n[features lineToPoint:NSMakePoint(65, 30)];\n[features moveToPoint:NSMakePoint(40,\
    \ 40)];\n[features lineToPoint:NSMakePoint(40, 40)];\n[features moveToPoint:NSMakePoint(60,\
    \ 40)];\n[features lineToPoint:NSMakePoint(60, 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n\
    [features setLineWidth:3];\n[features stroke];\n```\n\n这里，我们没有使用 `NSBezierPath`\
    \ 的便捷类方法来直接获取一个完整的形状，而是使用一些更基本的方法从头构建一个路径。`moveToPoint:` 方法将虚拟的“笔”定位到指定点，而不绘制线条到该点。而\
    \ `lineToPoint:` 方法从路径的当前点绘制一条线到新点。实际上，这些方法并不执行任何绘制；它们只是构建贝塞尔路径结构，稍后由 `stroke`\
    \ 方法绘制。\n\n这里的一个额外技巧是设置了线条端点样式。此设置定义了线条末端的外观。这对于绘制为单个点的眼睛尤其重要。使用默认设置（精确地在线段末端截断所有内容），眼睛将完全不可见，但使用\
    \ `NSRoundLineCapStyle` 则为每只眼睛提供了完美的小圆点。点击运行查看最终结果（图 14-6）。\n\n![A978-1-4302-4543-8_14_Fig6_HTML.jpg](img/A978-1-4302-4543-8_14_Fig6_HTML.jpg)\n\
    \n图 14-6.\n\n笑脸先生。他真的很开心！\n"
- fmt: "### Pushing Boundaries\n\nNow that `MSSmileyView` is drawing a perfect happy\
    \ face, naturally we’ll want to be able to resize this to fit it into different\
    \ spots. When we fit the window to the contents, the `MSSmileyView` custom view\
    \ should have automatically set constraints to have the view change size with\
    \ the window. We can tell that this is the case by seeing blue lines extending\
    \ from the edges of the custom view out to the window, as shown in Figure [14-7](#A978-1-4302-4543-8_14_Chapter.html#Fig7).\
    \ If that isn’t the case, we can resize the `MSSmileyView` using the resize handles\
    \ on the edges until the blue guidelines appear on all four sides. This positions\
    \ the custom view at an inset of 20 points from the window borders all around.\n\
    \n![A978-1-4302-4543-8_14_Fig7_HTML.jpg](A978-1-4302-4543-8_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7. Resize constraints in place\n\nSave the work, click Run, and resize\
    \ the view. It should look like Figure [14-8](#A978-1-4302-4543-8_14_Chapter.html#Fig8).\n\
    \n![A978-1-4302-4543-8_14_Fig8_HTML.jpg](A978-1-4302-4543-8_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8. Oops upside your head!\n\nNow that doesn’t seem right, does it?\
    \ The problem is that in the `drawRect:` method, we have a bit of a mix ‘n’ match\
    \ approach when specifying path geometry. For the outline and the head shape,\
    \ we base everything on the bounds rect, but for the facial features we’re hard-coding\
    \ numeric pixel widths. When the view resizes, our bounds rect automatically resizes\
    \ along with it. This makes the outline and head stretch out to accommodate the\
    \ new bounds, while the facial features are still stuck in their rigid little\
    \ world.\n\nAlso, notice that the lines are the exact same thickness after resizing,\
    \ which means that their relative thickness, compared to the overall size of the\
    \ view, has changed. If we made this view really huge, the lines would seem extraordinarily\
    \ thin.\n\nFortunately, there’s an easy way to remedy all of this. Remember earlier\
    \ in this chapter when we mentioned the distinction between a view’s frame and\
    \ bounds rects? The frame defines the view’s position and size within its superview.\
    \ The bounds, however, determine the extent and position of the coordinate system\
    \ within the view. If we can configure things so that the view’s bounds rect never\
    \ changes, then it will always draw the exact same content, but perfectly stretched\
    \ to match the actual frame it’s drawing in!\n\nTo do this, we simply need to\
    \ manually set the bounds to that original rect every time the view is resized.\
    \ So, let’s add a property (for holding the bounds that we want) to `MSSmileyView.h`,\
    \ complete the `initWithFrame:` method and implement the `setFrameSize:` method\
    \ as shown here:\n\n```\n// A portion of MSSmileyView.h:\n#import <Cocoa/Cocoa.h>\n\
    @interface MSSmileyView : NSView\n@property NSRect preferredBounds;\n@end\n\n\
    // A portion of MSSmileyView.m:\n- (id)initWithFrame:(NSRect)frame\n{\n    self\
    \ = [super initWithFrame:frame];\n    if (self) {\n        self.preferredBounds\
    \ = NSMakeRect(0, 0, 100, 100);\n    }\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize\n\
    {\n    [super setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n\
    }\n```\n\nThe `setFrameSize:` method is one that gets called during live dragging\
    \ while the user is resizing a window. What we’re doing here is resetting the\
    \ view’s bounds rect every step of the way, so that when it comes time to draw,\
    \ all the drawing will occur based on the original bounds. Now click Run, resize\
    \ the window, and witness the magic (Figure [14-9](#A978-1-4302-4543-8_14_Chapter.html#Fig9)).\n\
    \n![A978-1-4302-4543-8_14_Fig9_HTML.jpg](A978-1-4302-4543-8_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9. A real stretch\n\nAs you can see, everything stretches perfectly\
    \ faithfully, including the widths of the lines. Also, everything is rendered\
    \ to match the actual display resolution. We can stretch that out as big as we\
    \ want, and we’ll always see perfectly anti-aliased curves. Whatever geometry\
    \ we specify for our bounds will be adjusted to match the frame we’re sitting\
    \ in. What we’re seeing here is, in fact, a two-dimensional transformation.\n\n\
    Apart from being a nice way to deal with resizing, this built-in transformation\
    \ possibility means that we can do our drawing at whatever scale we’re comfortable\
    \ with just by setting the bounds rect. If we want to do our graphics at pixel\
    \ resolution, we can do so, but if we’re plotting details of a mathematical curve\
    \ ranging from 0.0 to 0.1, we can set our bounds accordingly and don’t have to\
    \ multiply all our display values to make them match the screen coordinates.\n\
    \n## LOLmaker\n\nNow that we’ve got a basic understanding of drawing in an `NSView`\
    \ and manipulating its geometry, let’s move on to a new project: LOLmaker. LOLmaker\
    \ is a simple application that lets us create our own LOLcat-style imagery by\
    \ just dragging in an image and typing the text we want it to contain. It’s not\
    \ rocket science, but it will introduce us to a few more issues around drawing\
    \ in an `NSView`.\n\nA FEW WORDS ABOUT LOLCATS\n\nIn case you’ve missed out on\
    \ the whole LOLcat meme or are reading this book in a future world where LOLcats\
    \ have been forgotten, a LOLcat is basically a picture of a cat (or other animal)\
    \ with a humorous caption, typically written in a style mocking the Internet slang\
    \ of the early 21st century.\n\nWe like LOLcats simply because they are pictures\
    \ of cats that make us laugh out loud. Please don’t think that we’d stoop to the\
    \ level of including LOLcats content in our book just to sell more copies! It’s\
    \ a well-known fact that most LOLcats fans are also pirates and will only read\
    \ this book in the form of a stolen PDF."
  raw: '### Pushing Boundaries


    Now that `MSSmileyView` is drawing a perfect happy face, naturally we’ll want
    to be able to resize this to fit it into different spots. When we fit the window
    to the contents, the `MSSmileyView` custom view should have automatically set
    constraints to have the view change size with the window. We can tell that this
    is the case by seeing blue lines extending from the edges of the custom view out
    to the window, as shown in Figure [14-7](#A978-1-4302-4543-8_14_Chapter.html#Fig7).
    If that isn’t the case, we can resize the `MSSmileyView` using the resize handles
    on the edges until the blue guidelines appear on all four sides. This positions
    the custom view at an inset of 20 points from the window borders all around.


    ![A978-1-4302-4543-8_14_Fig7_HTML.jpg](A978-1-4302-4543-8_14_Fig7_HTML.jpg)


    Figure 14-7.


    Resize constraints in place


    Save the work, click Run, and resize the view. It should look like Figure [14-8](#A978-1-4302-4543-8_14_Chapter.html#Fig8).


    ![A978-1-4302-4543-8_14_Fig8_HTML.jpg](A978-1-4302-4543-8_14_Fig8_HTML.jpg)


    Figure 14-8.


    Oops upside your head!


    Now that doesn’t seem right, does it? The problem is that in the `drawRect:` method,
    we have a bit of a mix ‘n’ match approach when specifying path geometry. For the
    outline and the head shape, we base everything on the bounds rect, but for the
    facial features we’re hard-coding numeric pixel widths. When the view resizes,
    our bounds rect automatically resizes along with it. This makes the outline and
    head stretch out to accommodate the new bounds, while the facial features are
    still stuck in their rigid little world.


    Also, notice that the lines are the exact same thickness after resizing, which
    means that their relative thickness, compared to the overall size of the view,
    has changed. If we made this view really huge, the lines would seem extraordinarily
    thin.


    Fortunately, there’s an easy way to remedy all of this. Remember earlier in this
    chapter when we mentioned the distinction between a view’s frame and bounds rects?
    The frame defines the view’s position and size within its superview. The bounds,
    however, determine the extent and position of the coordinate system within the
    view. If we can configure things so that the view’s bounds rect never changes,
    then it will always draw the exact same content, but perfectly stretched to match
    the actual frame it’s drawing in!


    To do this, we simply need to manually set the bounds to that original rect every
    time the view is resized. So, let’s add a property (for holding the bounds that
    we want) to `MSSmileyView.h`, complete the `initWithFrame:` method and implement
    the `setFrameSize:` method as shown here:


    `// A portion of MSSmileyView.h:`


    `#import <Cocoa/Cocoa.h>`


    `@interface MSSmileyView : NSView`


    `@property NSRect preferredBounds;`


    `@end`


    `// A portion of MSSmileyView.m:`


    `- (id)initWithFrame:(NSRect)frame`


    `{`


    `self = [super initWithFrame:frame];`


    `if (self) {`


    `self.preferredBounds = NSMakeRect(0, 0, 100, 100);`


    `}`


    `return self;`


    `}`


    `- (void)setFrameSize:(NSSize)newSize`


    `{`


    `[super setFrameSize:newSize];`


    `[self setBounds:self.preferredBounds];`


    `}`


    The `setFrameSize:` method is one that gets called during live dragging while
    the user is resizing a window. What we’re doing here is resetting the view’s bounds
    rect every step of the way, so that when it comes time to draw, all the drawing
    will occur based on the original bounds. Now click Run, resize the window, and
    witness the magic (Figure [14-9](#A978-1-4302-4543-8_14_Chapter.html#Fig9)).


    ![A978-1-4302-4543-8_14_Fig9_HTML.jpg](A978-1-4302-4543-8_14_Fig9_HTML.jpg)


    Figure 14-9.


    A real stretch


    As you can see, everything stretches perfectly faithfully, including the widths
    of the lines. Also, everything is rendered to match the actual display resolution.
    We can stretch that out as big as we want, and we’ll always see perfectly anti-aliased
    curves. Whatever geometry we specify for our bounds will be adjusted to match
    the frame we’re sitting in. What we’re seeing here is, in fact, a two-dimensional
    transformation.


    Apart from being a nice way to deal with resizing, this built-in transformation
    possibility means that we can do our drawing at whatever scale we’re comfortable
    with just by setting the bounds rect. If we want to do our graphics at pixel resolution,
    we can do so, but if we’re plotting details of a mathematical curve ranging from
    0.0 to 0.1, we can set our bounds accordingly and don’t have to multiply all our
    display values to make them match the screen coordinates.


    ## LOLmaker


    Now that we’ve got a basic understanding of drawing in an `NSView` and manipulating
    its geometry, let’s move on to a new project: LOLmaker. LOLmaker is a simple application
    that lets us create our own LOLcat-style imagery by just dragging in an image
    and typing the text we want it to contain. It’s not rocket science, but it will
    introduce us to a few more issues around drawing in an `NSView`.


    A FEW WORDS ABOUT LOLCATS


    In case you’ve missed out on the whole LOLcat meme or are reading this book in
    a future world where LOLcats have been forgotten, a LOLcat is basically a picture
    of a cat (or other animal) with a humorous caption, typically written in a style
    mocking the Internet slang of the early 21st century.


    We like LOLcats simply because they are pictures of cats that make us laugh out
    loud. Please don’t think that we’d stoop to the level of including LOLcats content
    in our book just to sell more copies! It’s a well-known fact that most LOLcats
    fans are also pirates and will only read this book in the form of a stolen PDF.'
  trans: "\n### 突破界限\n\n既然 `MSSmileyView` 已经能完美绘制出一张笑脸，我们自然希望能调整其大小以适应不同位置。当窗口适配内容时，`MSSmileyView`\
    \ 自定义视图本应自动设置约束，以便视图随窗口大小变化。我们可以通过观察从自定义视图边缘延伸到窗口的蓝色线条来确认这一点，如图 14-7 所示。如果不是这种情况，我们可以使用边缘的调整手柄来调整\
    \ `MSSmileyView` 的大小，直到四条边都出现蓝色参考线。这样就将自定义视图定位在了距离窗口边框四周各 20 点的内嵌位置上。\n\n![A978-1-4302-4543-8_14_Fig7_HTML.jpg](img/A978-1-4302-4543-8_14_Fig7_HTML.jpg)\n\
    \n图 14-7. 调整大小约束已就位\n\n保存工作，点击运行，然后调整视图大小。它应该看起来像图 14-8 所示。\n\n![A978-1-4302-4543-8_14_Fig8_HTML.jpg](img/A978-1-4302-4543-8_14_Fig8_HTML.jpg)\n\
    \n图 14-8. 哎呀，头都大了！\n\n这看起来似乎不对劲，对吧？问题在于，在 `drawRect:` 方法中，我们指定路径几何图形时采用了一种混合搭配的方式。对于轮廓和头部形状，我们基于边界矩形来处理，但对于面部特征，我们却硬编码了数值化的像素宽度。当视图调整大小时，我们的边界矩形会自动随之调整。这导致轮廓和头部拉伸以适应新的边界，而面部特征却仍被困在它们僵化的小世界里。\n\
    \n另外，请注意，调整大小后线条的绝对粗细完全相同，这意味着相对于视图整体尺寸的相对粗细发生了变化。如果我们将此视图变得非常大，线条会显得异常纤细。\n\n\
    幸运的是，有一个简单的方法可以解决所有这些问题。还记得本章前面我们提到视图的框架和边界矩形之间的区别吗？框架定义了视图在其父视图中的位置和大小。而边界则决定了视图内部坐标系的范围和位置。如果我们能配置好，使得视图的边界矩形永不改变，那么它总会绘制出完全相同的内容，但会完美拉伸以匹配其实际绘制所在的框架！\n\
    \n为此，我们只需在每次视图调整大小时，手动将边界设置回原始矩形即可。因此，让我们在 `MSSmileyView.h` 中添加一个属性（用于保存我们想要的边界），完善\
    \ `initWithFrame:` 方法，并实现 `setFrameSize:` 方法，如下所示：\n\n```\n// MSSmileyView.h 的一部分：\n\
    #import <Cocoa/Cocoa.h>\n@interface MSSmileyView : NSView\n@property NSRect preferredBounds;\n\
    @end\n\n// MSSmileyView.m 的一部分：\n- (id)initWithFrame:(NSRect)frame\n{\n    self\
    \ = [super initWithFrame:frame];\n    if (self) {\n        self.preferredBounds\
    \ = NSMakeRect(0, 0, 100, 100);\n    }\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize\n\
    {\n    [super setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n\
    }\n```\n\n`setFrameSize:` 方法是在用户调整窗口大小时，在实时拖拽过程中被调用的方法。我们在这里做的是，在每一步都重置视图的边界矩形，这样当需要绘制时，所有绘制操作都将基于原始边界进行。现在点击运行，调整窗口大小，见证奇迹的发生（图\
    \ 14-9）。\n\n![A978-1-4302-4543-8_14_Fig9_HTML.jpg](img/A978-1-4302-4543-8_14_Fig9_HTML.jpg)\n\
    \n图 14-9. 真正的拉伸\n\n如您所见，一切都会完美地拉伸，包括线条的宽度。此外，所有内容都会根据实际显示分辨率进行渲染。我们可以将其拉伸到任意大小，并且总能看到完美抗锯齿的曲线。我们为其边界指定的任何几何图形都会被调整以匹配当前的框架。我们在这里看到的，实际上是一个二维变换。\n\
    \n除了作为处理调整大小的好方法之外，这种内置变换能力意味着，我们只需设置边界矩形，就可以在我们感到舒适的任何比例下进行绘制。如果我们想以像素分辨率绘制图形，我们完全可以做到；但如果我们正在绘制一个范围从\
    \ 0.0 到 0.1 的数学曲线细节，我们可以相应地设置边界，而不必将所有显示值乘以一个系数来匹配屏幕坐标。\n\n## LOLmaker\n\n现在，我们对如何在\
    \ `NSView` 中绘图以及操作其几何图形有了基本了解，让我们进入一个新项目：LOLmaker。LOLmaker 是一个简单的应用程序，它让我们只需拖入一张图片并输入我们想要的文字，就能创建自己的\
    \ LOLcat 风格图像。这并非什么高科技，但它会向我们介绍一些关于在 `NSView` 中绘图的更多问题。\n\n关于 LOLCAT 的几句话\n\n\
    如果你完全错过了 LOLcat 这个网络迷因，或者是在 LOLcat 已被遗忘的未来世界里读这本书，那么简单来说，LOLcat 就是一张带有幽默文字的猫咪（或其它动物）图片，其文字风格通常是模仿\
    \ 21 世纪早期的网络俚语。\n\n我们喜欢 LOLcat，仅仅是因为它们是能让我们开怀大笑的猫咪图片。请千万不要以为我们会为了多卖几本书而屈尊到在书中加入\
    \ LOLcat 内容的地步！众所周知，大多数 LOLcat 粉丝同时也是盗版者，他们只会以盗版 PDF 的形式阅读这本书。\n"
- fmt: "\n# First Steps to LOL\n\nStart by creating a new basic Cocoa project in Xcode,\
    \ with Automatic Reference Counting turned on, but there’s no need for Document\
    \ or Core Data support this time. Although both of those could be put to good\
    \ use in this project, for now we’re going to focus on just the drawing aspects.\
    \ This project won’t actually save anything. Name the project `LOLmaker`, and\
    \ use `LOL` as the class prefix.\n\nNow, edit the `LOLAppDelegate.h` file to add\
    \ the following lines in bold:\n\n```\n#import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\
    \n@interface LOLAppDelegate : NSObject <NSApplicationDelegate>\n@property (assign)\
    \ IBOutlet NSWindow *window;\n@property (weak) IBOutlet LOLView *lolView;\n@property\
    \ (strong) NSImage *image;\n@property (copy) NSString *text;\n@end\n```\n\nThese\
    \ properties will be used with Cocoa Bindings to let the user drag in an image\
    \ and type in some text that will be automatically attached to our controller\
    \ object, which in turn will update the view. Notice (as will Xcode) that we’re\
    \ importing a `LOLView.h` header file and declaring a property of type `LOLView*`,\
    \ even though the `LOLView` class hasn’t been completed yet. Solve that problem\
    \ right away by creating another new set of class files, this time for `LOLView`,\
    \ an `NSView` subclass.\n\nWe’ll implement `LOLView` in just a few minutes, but\
    \ for now let’s go configure the GUI. Click `MainMenu.xib` to bring it up in an\
    \ Interface Builder canvas, and use the Library to drag a custom view, an image\
    \ well, and a text field into the empty window. Use the Identity Inspector to\
    \ set the class of the custom view to `LOLView`, and use the Attributes Inspector\
    \ to turn on the Editable checkbox for the image well. Finally, connect the app\
    \ delegate’s `lolView` outlet to the `LOLView` in the window. When everything\
    \ is laid out, the window should resemble Figure [14-10](#A978-1-4302-4543-8_14_Chapter.html#Fig10).\n\
    \n![A978-1-4302-4543-8_14_Fig10_HTML.jpg](A978-1-4302-4543-8_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10. The layout of our LOLmaker window\n\nThis window will let the\
    \ user drag in an image (to the drag well) and type in a message that will be\
    \ displayed over the image. The `LOLView` will notice the dragged-in image and\
    \ edited text, and will trigger a redisplay of itself through the use of Cocoa\
    \ Bindings. The first half of the bindings will be configured in Interface Builder,\
    \ the second half in code.\n\nFirst, select the image well and switch to the Bindings\
    \ Inspector. Create a binding for the Value attribute, selecting the app delegate\
    \ in the pop-up list and typing `self.image` into the Model Key Path field. Then\
    \ select the text field, and create a binding for its Value attribute, again selecting\
    \ the app delegate in the pop-up list and this time typing `self.text` into the\
    \ Model Key Path field.\n\nThat takes care of the bindings for the controls, but\
    \ because Interface Builder doesn’t know about `LOLView` and what its bindable\
    \ values are, we have to set up its bindings in code. Go back to Xcode, and edit\
    \ `LOLAppDelegate.m`, adding the following method to the `@implementation` section:\n\
    \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n\
    {\n  [self.lolView bind:@\"image\" toObject:self withKeyPath:@\"image\"\n    options:nil];\n\
    \  [self.lolView bind:@\"text\" toObject:self withKeyPath:@\"text\"\n    options:nil];\n\
    }\n```\n\nThat takes care of the basic communications between all the objects\
    \ in this application. User edits to the controls in the window are passed along\
    \ to the app delegate, and from there they’ll be passed along to the `LOLView`,\
    \ all through Cocoa Bindings. The “plumbing” of our app is now complete!\n\n#\
    \ LOLView\n\nSo, how about the `LOLView` itself? For starters, it’s going to have\
    \ a couple of properties, just like the properties of the app delegate, to contain\
    \ the values that are coming from the user. In this case, however, we want to\
    \ trigger a redisplay every time one of the values changes so that the `LOLView`\
    \ will be redrawn. Therefore, we implement the setter methods ourselves, instead\
    \ of just using the default setters generated by the compiler. Because we’re using\
    \ our own setters but allowing the compiler to generate the getters, we have to\
    \ mark the properties as `nonatomic`. The compiler-generated getters and setters\
    \ include synchronization code to ensure that half-constructed objects are never\
    \ returned by these methods. Since we’re building our own setter, the compiler\
    \ can’t provide that guarantee, but we don’t need to care for this application.\
    \ Add the following to `LOLView.h` and `LOLView.m`, as indicated:\n\n```\n// LOLView.h:\n\
    #import <Cocoa/Cocoa.h>\n@interface LOLView : NSView\n@property (strong, nonatomic)\
    \ NSImage *image;\n@property (copy, nonatomic) NSString *text;\n@end\n\n// LOLView.m:\n\
    #import \"LOLView.h\"\n@implementation LOLView\n- (id)initWithFrame:(NSRect)frame\n\
    {\n    self = [super initWithFrame:frame];\n    if (self) {\n        // Initialization\
    \ code here.\n    }\n    return self;\n}\n- (void)drawRect:(NSRect)dirtyRect\n\
    {\n    // Drawing code here.\n}\n- (void)setImage:(NSImage *)i {\n    if (![i\
    \ isEqual:_image]) {\n        _image = i;\n        [self setNeedsDisplay:YES];\n\
    \    }\n}\n- (void)setText:(NSString *)t {\n    if (![t isEqual:_text]) {\n  \
    \      _text = [t copy];\n        [self setNeedsDisplay:YES];\n    }\n}\n```\n\
    \nIn the two setters, we’re making direct use of the instance variable generated\
    \ by the property. By default, the instance variable’s name is the name of the\
    \ property with a leading underscore, but you can control the name if you need\
    \ to, and you can control whether an instance variable is synthesized at all.\
    \ In the `setText:` method, we’re making an explicit copy of the `NSString` that’s\
    \ passed in to our code. We have to do this because we said we would in the property\
    \ declaration (note that it’s marked as `copy` rather than as `strong` or `weak`).\
    \ In general, this is a good idea when receiving an object such as `NSString`\
    \ because the caller may actually be passing you a mutable string that can be\
    \ changed by some other piece of code.\n"
  raw: '### First Steps to LOL


    Start by creating a new basic Cocoa project in Xcode, with Automatic Reference
    Counting turned on, but there’s no need for Document or Core Data support this
    time. Although both of those could be put to good use in this project, for now
    we’re going to focus on just the drawing aspects. This project won’t actually
    save anything. Name the project LOLmaker, and use LOL as the class prefix.


    Now, edit the `LOLAppDelegate.h` file to add the following lines in bold:


    `#import <Cocoa/Cocoa.h>`


    `#import "LOLView.h"`


    `@interface LOLAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet LOLView *lolView;`


    `@property (strong) NSImage *image;`


    `@property (copy) NSString *text;`


    `@end`


    These properties will be used with Cocoa Bindings to let the user drag in an image
    and type in some text that will be automatically attached to our controller object,
    which in turn will update the view. Notice (as will Xcode) that we’re importing
    a `LOLView.h` header file and declaring a property of type `LOLView*`, even though
    the `LOLView` class hasn’t been completed yet. Solve that problem right away by
    creating another new set of class files, this time for `LOLView`, an `NSView`
    subclass.


    We’ll implement `LOLView` in just a few minutes, but for now let’s go configure
    the GUI. Click `MainMenu.xib` to bring it up in an Interface Builder canvas, and
    use the Library to drag a custom view, an image well, and a text field into the
    empty window. Use the Identity Inspector to set the class of the custom view to
    LOLView, and use the Attributes Inspector to turn on the Editable checkbox for
    the image well. Finally, connect the app delegate’s lolView outlet to the `LOLView`
    in the window. When everything is laid out, the window should resemble Figure
    [14-10](#A978-1-4302-4543-8_14_Chapter.html#Fig10).


    ![A978-1-4302-4543-8_14_Fig10_HTML.jpg](A978-1-4302-4543-8_14_Fig10_HTML.jpg)


    Figure 14-10.


    The layout of our LOLmaker window


    This window will let the user drag in an image (to the drag well) and type in
    a message that will be displayed over the image. The `LOLView` will notice the
    dragged-in image and edited text, and will trigger a redisplay of itself through
    the use of Cocoa Bindings. The first half of the bindings will be configured in
    Interface Builder, the second half in code.


    First, select the image well and switch to the Bindings Inspector. Create a binding
    for the Value attribute, selecting the app delegate in the pop-up list and typing
    self.image into the Model Key Path field. Then select the text field, and create
    a binding for its Value attribute, again selecting the app delegate in the pop-up
    list and this time typing self.text into the Model Key Path field.


    That takes care of the bindings for the controls, but because Interface Builder
    doesn’t know about `LOLView` and what its bindable values are, we have to set
    up its bindings in code. Go back to Xcode, and edit `LOLAppDelegate.m`, adding
    the following method to the `@implementation` section:


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


      `[self.lolView bind:@"image" toObject:self withKeyPath:@"image"`


        `options:nil];`


      `[self.lolView bind:@"text" toObject:self withKeyPath:@"text"`


        `options:nil];`


    `}`


    That takes care of the basic communications between all the objects in this application.
    User edits to the controls in the window are passed along to the app delegate,
    and from there they’ll be passed along to the `LOLView`, all through Cocoa Bindings.
    The “plumbing” of our app is now complete!


    ### LOLView


    So, how about the `LOLView` itself? For starters, it’s going to have a couple
    of properties, just like the properties of the app delegate, to contain the values
    that are coming from the user. In this case, however, we want to trigger a redisplay
    every time one of the values changes so that the `LOLView` will be redrawn. Therefore,
    we implement the setter methods ourselves, instead of just using the default setters
    generated by the compiler. Because we’re using our own setters but allowing the
    compiler to generate the getters, we have to mark the properties as `nonatomic`.
    The compiler-generated getters and setters include synchronization code to ensure
    that half-constructed objects are never returned by these methods. Since we’re
    building our own setter, the compiler can’t provide that guarantee, but we don’t
    need to care for this application. Add the following to `LOLView.h` and `LOLView.m`,
    as indicated:


    `// LOLView.h:`


    `#import <Cocoa/Cocoa.h>`


    `@interface LOLView : NSView`


    `@property (strong, nonatomic) NSImage *image;`


    `@property (copy, nonatomic) NSString *text;`


    `@end`


    `// LOLView.m:`


    `#import "LOLView.h"`


    `@implementation LOLView`


    `- (id)initWithFrame:(NSRect)frame`


    `{`


        `self = [super initWithFrame:frame];`


        `if (self) {`


            `// Initialization code here.`


        `}`


        `return self;`


    `}`


    `- (void)drawRect:(NSRect)dirtyRect`


    `{`


        `// Drawing code here.`


    `}`


    `- (void)setImage:(NSImage *)i {`


        `if (![i isEqual:_image]) {`


            `_image = i;`


            `[self setNeedsDisplay:YES];`


        `}`


    `}`


    `- (void)setText:(NSString *)t {`


        `if (![t isEqual:_text]) {`


            `_text = [t copy];`


            `[self setNeedsDisplay:YES];`


        `}`


    `}`


    In the two setters, we’re making direct use of the instance variable generated
    by the property. By default, the instance variable’s name is the name of the property
    with a leading underscore, but you can control the name if you need to, and you
    can control whether an instance variable is synthesized at all. In the `setText:`
    method, we’re making an explicit copy of the `NSString` that’s passed in to our
    code. We have to do this because we said we would in the property declaration
    (note that it’s marked as `copy` rather than as `strong` or `weak`). In general,
    this is a good idea when receiving an object such as `NSString` because the caller
    may actually be passing you a mutable string that can be changed by some other
    piece of code.'
  trans: "\n\n# LOL 入门第一步\n\n首先，在 Xcode 中创建一个启用了**自动引用计数**（Automatic Reference Counting）的基础\
    \ Cocoa 项目，但本次无需支持文档或 Core Data。尽管这两项功能在项目中都能派上用场，但当前我们只专注于绘图部分。这个项目实际上不会保存任何内容。将项目命名为\
    \ `LOLmaker`，并使用 `LOL` 作为类前缀。\n\n现在，编辑 `LOLAppDelegate.h` 文件，添加以下粗体显示的行：\n\n```\n\
    #import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\n@interface LOLAppDelegate : NSObject\
    \ <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n@property\
    \ (weak) IBOutlet LOLView *lolView;\n@property (strong) NSImage *image;\n@property\
    \ (copy) NSString *text;\n@end\n```\n\n这些属性将配合 Cocoa Bindings 使用，让用户拖入图像并输入文本，这些内容会自动绑定到我们的控制器对象，进而更新视图。请注意（Xcode\
    \ 也会注意到）我们导入了 `LOLView.h` 头文件，并声明了一个 `LOLView*` 类型的属性，尽管 `LOLView` 类尚未完成。要立即解决这个问题，请创建另一组类文件，这次针对\
    \ `NSView` 的子类 `LOLView`。\n\n我们将很快实现 `LOLView`，但现在先配置图形用户界面（GUI）。点击 `MainMenu.xib`\
    \ 在 Interface Builder 画布中打开它，然后使用库（Library）将一个自定义视图、一个图像框（image well）和一个文本字段拖入空白窗口。使用身份检查器（Identity\
    \ Inspector）将自定义视图的类设置为 `LOLView`，并使用属性检查器（Attributes Inspector）为图像框勾选“可编辑”（Editable）复选框。最后，将应用委托的\
    \ `lolView` 出口连接到窗口中的 `LOLView`。布局完成后，窗口应如图 14-10 所示。\n\n![A978-1-4302-4543-8_14_Fig10_HTML.jpg](img/A978-1-4302-4543-8_14_Fig10_HTML.jpg)\n\
    \n图 14-10. LOLmaker 窗口布局\n\n此窗口允许用户拖入图像（到拖放区域），并输入将显示在图像上的文本。`LOLView` 会检测到拖入的图像和编辑后的文本，并通过\
    \ Cocoa Bindings 触发自身的重新显示。绑定配置的前半部分将在 Interface Builder 中完成，后半部分则在代码中实现。\n\n\
    首先，选择图像框并切换到绑定检查器（Bindings Inspector）。为 Value 属性创建一个绑定，在弹出列表中选择应用委托，并在“模型键路径”（Model\
    \ Key Path）字段中输入 `self.image`。然后选择文本字段，为其 Value 属性创建绑定，同样在弹出列表中选择应用委托，这次在“模型键路径”字段中输入\
    \ `self.text`。\n\n这样就完成了控件的绑定设置。但由于 Interface Builder 不了解 `LOLView` 及其可绑定值，我们需要在代码中为其设置绑定。返回\
    \ Xcode，编辑 `LOLAppDelegate.m`，在 `@implementation` 部分添加以下方法：\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n  [self.lolView bind:@\"image\" toObject:self withKeyPath:@\"\
    image\"\n    options:nil];\n  [self.lolView bind:@\"text\" toObject:self withKeyPath:@\"\
    text\"\n    options:nil];\n}\n```\n\n至此，应用程序中所有对象之间的基本通信已配置完成。用户在窗口控件中的编辑操作会传递到应用委托，再从那里通过\
    \ Cocoa Bindings 传递到 `LOLView`。我们的应用“管道”现已完成！\n\n# LOLView\n\n那么，`LOLView` 本身呢？首先，它将拥有一些属性，与应用委托的属性类似，用于存储来自用户的值。但在此情况下，每当某个值发生变化时，我们希望触发重新显示，以便\
    \ `LOLView` 能够重绘。因此，我们自行实现 setter 方法，而不是使用编译器生成的默认 setter。由于我们使用自定义 setter，但允许编译器生成\
    \ getter，因此必须将属性标记为 `nonatomic`。编译器生成的 getter 和 setter 包含同步代码，以确保这些方法永远不会返回未完全构造的对象。由于我们构建了自己的\
    \ setter，编译器无法提供这种保证，但在此应用中我们无需在意。按照指示将以下代码添加到 `LOLView.h` 和 `LOLView.m` 中：\n\n\
    ```\n// LOLView.h:\n#import <Cocoa/Cocoa.h>\n@interface LOLView : NSView\n@property\
    \ (strong, nonatomic) NSImage *image;\n@property (copy, nonatomic) NSString *text;\n\
    @end\n\n// LOLView.m:\n#import \"LOLView.h\"\n@implementation LOLView\n- (id)initWithFrame:(NSRect)frame\n\
    {\n    self = [super initWithFrame:frame];\n    if (self) {\n        // 此处添加初始化代码\n\
    \    }\n    return self;\n}\n- (void)drawRect:(NSRect)dirtyRect\n{\n    // 此处添加绘图代码\n\
    }\n- (void)setImage:(NSImage *)i {\n    if (![i isEqual:_image]) {\n        _image\
    \ = i;\n        [self setNeedsDisplay:YES];\n    }\n}\n- (void)setText:(NSString\
    \ *)t {\n    if (![t isEqual:_text]) {\n        _text = [t copy];\n        [self\
    \ setNeedsDisplay:YES];\n    }\n}\n```\n\n在两个 setter 方法中，我们直接使用了属性生成的实例变量。默认情况下，实例变量的名称是属性名前加下划线，但你可以根据需要控制名称，也可以控制是否自动合成实例变量。在\
    \ `setText:` 方法中，我们对传入的 `NSString` 进行了显式拷贝。这样做是因为我们在属性声明中承诺了这一点（注意它标记为 `copy`\
    \ 而非 `strong` 或 `weak`）。通常，在接收 `NSString` 这类对象时这是一个好做法，因为调用者可能实际传递给你一个可变字符串，可能会被其他代码修改。\n\
    \n"
- fmt: "### Drawing a Bitmap\n\nNow let’s move on to the “meat” of the `LOLView` class:\
    \ drawing the image and superimposing some text. Let’s start with the image, which\
    \ we can copy into place quite quickly by adding a few lines to the `drawRect:`\
    \ method that was put in place when we created the class:\n\n```\n- (void)drawRect:(NSRect)dirtyRect\
    \ {\n\n  NSRect srcImageRect = NSMakeRect(0, 0, [self.image size].width,\n\n \
    \   [self.image size].height);\n\n  [self.image drawAtPoint:[self bounds].origin\
    \ fromRect:srcImageRect\n\n    operation:NSCompositeCopy fraction:1.0];\n\n}\n\
    ```\n\nThe first thing we’re doing here is creating a rect called `srcImageRect`\
    \ with origin `(0,0)` and size equal to the image’s size. Then we send a message\
    \ to the image itself, telling it to draw the portion of the image specified by\
    \ `srcImageRect` (in this case, the entire image) into the current graphics context,\
    \ located at the origin of our view’s bounds rect. In short, the entire image\
    \ is copied, and its lower left-hand corner will be located precisely at the view’s\
    \ lower left-hand corner. The drawing method we’re using here also lets us specify\
    \ an operation, which determines how transparencies in the source and destination\
    \ images are merged, as well as an integer between `0.0` and `1.0` that acts as\
    \ an overall alpha level for the entire image. Any value below `1.0` makes the\
    \ image somewhat transparent; all the way down to `0.0` makes the image completely\
    \ invisible.\n\nNow, Run the app, and take a look at what we’ve got so far. The\
    \ app opens, showing a mostly blank window with the image well and text field\
    \ at the bottom. Find a nice LOLcat-friendly image somewhere (we’re using a non-copyright\
    \ image from the US National Archives, found via Flickr), and drag it into the\
    \ image well, which will look something like Figure [14-11](#A978-1-4302-4543-8_14_Chapter.html#Fig11).\n\
    \n![A978-1-4302-4543-8_14_Fig11_HTML.jpg](A978-1-4302-4543-8_14_Fig11_HTML.jpg)\n\
    \nFigure 14-11.\n\nNot much LOL here\n\nHey, that’s not very satisfying! All we’re\
    \ seeing is the lower left-hand corner of the picture we dragged in! If only there\
    \ were some way we could see the whole image  .  .  .\n\n### Let It Scroll\n\n\
    Well, of course there is. Cocoa includes a class called `NSScrollView` that will\
    \ help here. By putting a view inside of an `NSScrollView`, we get access to horizontal\
    \ and vertical scrollbars that the user can use to slide the view around. The\
    \ scroll view takes care of all the hard work. The drawing code for any views\
    \ we put in there doesn’t need to change at all! Putting the `LOLView` into an\
    \ `NSScrollView` is surprisingly simple. We just need to add a bit of code and\
    \ make a couple of adjustments in Interface Builder.\n\nFirst, open up the nib\
    \ file in Xcode to prepare the scroll view itself. Select the `LOLView`, then\
    \ select Editor ➤ Embed in ➤ Scroll View from the menu. Our `LOLView` is now wrapped\
    \ in a scroll view, but the positioning and sizing are a little off. Move the\
    \ scroll view until the blue guidelines flash in the upper left-hand corner of\
    \ the window, then resize a little with the lower-right resizing control until\
    \ the blue guidelines flash on that side. The view should nearly fill the width\
    \ of the window with the usual border around the edge, and extend it just far\
    \ enough down to leave a decent margin above the other controls (see Figure [14-12](#A978-1-4302-4543-8_14_Chapter.html#Fig12)).\n\
    \nWe also can get some helpful zooming behavior for free with the scroll view,\
    \ which is useful with multi-touch trackpads where the user can pinch to zoom.\
    \ Let’s make use of that, since it’s free. With the Scroll View selected, open\
    \ the Attributes Inspector. One of the options is \"Magnification.\" Check the\
    \ checkbox next to Allow, and we’re done, except for the code.\n\n![A978-1-4302-4543-8_14_Fig12_HTML.jpg](A978-1-4302-4543-8_14_Fig12_HTML.jpg)\n\
    \nFigure 14-12.\n\nThe LOLmaker window, adjusted for scrolling\n\nThe code we\
    \ need to add is actually one more piece of the `setImage:` method. What we’re\
    \ going to do is resize the `LOLView` each time a new image is set so that the\
    \ view’s size matches the image’s size. Later, when the `LOLView` is enclosed\
    \ in an `NSScrollView`, the scroll view will notice the new view size and automatically\
    \ rerender everything including the scrollbars. The new code looks like this:\n\
    \n```\n- (void)setImage:(NSImage *)i {\n\n  if (![i isEqual:_image]) {\n\n   \
    \ if (i) {\n\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n\n\
    \        [i size].height);\n\n      [self setFrame:newImageFrame];\n\n    }\n\n\
    \    _image = i;\n\n    [self setNeedsDisplay:YES];\n\n  }\n\n}\n```\n\nSave all\
    \ the work, click Run, and we are done with the scroll view! Drag in a large image,\
    \ and note that it starts off in the lower left, but scrollbars are present, and\
    \ we can drag around to wherever we want, and we can pinch and zoom if our hardware\
    \ supports it! See this in action in Figure [14-13](#A978-1-4302-4543-8_14_Chapter.html#Fig13).\n\
    \n![A978-1-4302-4543-8_14_Fig13_HTML.jpg](A978-1-4302-4543-8_14_Fig13_HTML.jpg)\n\
    \nFigure 14-13.\n\nScrollbars: so simple, even a cat can do it\n\n### Drawing\
    \ Text\n\nOkay, so let’s get to the final step, drawing the text. It is traditional\
    \ in the LOLcats community to use a text caption in the Impact font, using white\
    \ text with a black shadow. This font is installed with Mountain Lion, so all\
    \ our users should have it. This should be a piece of cake. The only mildly tricky\
    \ part is choosing a font size. Because images can be all sorts of sizes, we need\
    \ to dynamically choose the font size so that the caption fills up a decent portion\
    \ of the view without extending off the side. We’ll do this by testing several\
    \ font sizes, starting with `1` and working our way upwards by doubling the size\
    \ each time until we hit a point where the size of the text would be wider than\
    \ the view itself. That we ratchet the font size back down a bit, and draw the\
    \ text. This is all done by adding the bold lines shown below:\n\n```\n- (void)drawRect:(NSRect)dirtyRect\
    \ {\n\n  // Drawing code here.\n\n  NSRect srcImageRect = NSMakeRect(0, 0, [self.image\
    \ size].width,\n\n    [self.image size].height);\n\n  [self.image drawAtPoint:[self\
    \ bounds].origin fromRect:srcImageRect\n\n    operation:NSCompositeCopy fraction:1.0];\n\
    \n  if (self.text != nil && [self.text length] > 0) {\n\n    NSPoint textLocation\
    \ = NSMakePoint(0,0);\n\n    NSShadow *textShadow = [[NSShadow alloc] init];\n\
    \n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n\n    [textShadow setShadowColor:[NSColor\
    \ blackColor]];\n\n    [textShadow setShadowBlurRadius:10];\n\n    NSMutableDictionary\
    \ *textAttributes =\n\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \n        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n\n\
    \        [NSColor whiteColor], NSForegroundColorAttributeName,\n\n        textShadow,\
    \ NSShadowAttributeName,\n\n        nil];\n\n    // find the optimal size\n\n\
    \    CGFloat fontSize;\n\n    NSSize testSize = NSMakeSize(0, 0);\n\n    for(fontSize=1;\
    \ testSize.width < [self.image size].width; fontSize*=2)\n\n    {\n\n      [textAttributes\
    \ setObject:[NSFont fontWithName:@\"Impact\"\n\n        size:fontSize]\n\n   \
    \     forKey:NSFontAttributeName];\n\n      testSize = [self.text sizeWithAttributes:textAttributes];\n\
    \n    }\n\n    [textAttributes setObject:[NSFont fontWithName:@\"Impact\"\n\n\
    \      size:fontSize/4]\n\n      forKey:NSFontAttributeName];\n\n    // and draw\
    \ the text\n\n    [self.text drawAtPoint:textLocation\n\n      withAttributes:textAttributes];\n\
    \n  }\n\n}\n```\n\nNow click Run, drag in an image to the image well, and write\
    \ some text. Voila! It should look something like Figure [14-14](#A978-1-4302-4543-8_14_Chapter.html#Fig14).\n\
    \n![A978-1-4302-4543-8_14_Fig14_HTML.jpg](A978-1-4302-4543-8_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14.\n\nI can haz press conference?"
  raw: '### Drawing a Bitmap


    Now let’s move on to the “meat” of the `LOLView` class: drawing the image and
    superimposing some text. Let’s start with the image, which we can copy into place
    quite quickly by adding a few lines to the `drawRect:` method that was put in
    place when we created the class:


    `- (void)drawRect:(NSRect)dirtyRect {`


      `NSRect srcImageRect = NSMakeRect(0, 0, [self.image size].width`,


        `[self.image size].height);`


      `[self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect`


        `operation:NSCompositeCopy fraction:1.0];`


    `}`


    The first thing we’re doing here is creating a rect called `srcImageRect` with
    origin (0,0) and size equal to the image’s size. Then we send a message to the
    image itself, telling it to draw the portion of the image specified by `srcImageRect`
    (in this case, the entire image) into the current graphics context, located at
    the origin of our view’s bounds rect. In short, the entire image is copied, and
    its lower left-hand corner will be located precisely at the view’s lower left-hand
    corner. The drawing method we’re using here also lets us specify an operation,
    which determines how transparencies in the source and destination images are merged,
    as well as an integer between 0.0 and 1.0 that acts as an overall alpha level
    for the entire image. Any value below 1.0 makes the image somewhat transparent;
    all the way down to 0.0 makes the image completely invisible.


    Now, Run the app, and take a look at what we’ve got so far. The app opens, showing
    a mostly blank window with the image well and text field at the bottom. Find a
    nice LOLcat-friendly image somewhere (we’re using a non-copyright image from the
    US National Archives, found via Flickr), and drag it into the image well, which
    will look something like Figure [14-11](#A978-1-4302-4543-8_14_Chapter.html#Fig11).


    ![A978-1-4302-4543-8_14_Fig11_HTML.jpg](A978-1-4302-4543-8_14_Fig11_HTML.jpg)


    Figure 14-11.


    Not much LOL here


    Hey, that’s not very satisfying! All we’re seeing is the lower left-hand corner
    of the picture we dragged in! If only there were some way we could see the whole
    image  .  .  .


    ### Let It Scroll


    Well, of course there is. Cocoa includes a class called `NSScrollView` that will
    help here. By putting a view inside of an `NSScrollView`, we get access to horizontal
    and vertical scrollbars that the user can use to slide the view around. The scroll
    view takes care of all the hard work. The drawing code for any views we put in
    there doesn’t need to change at all! Putting the `LOLView` into an `NSScrollView`
    is surprisingly simple. We just need to add a bit of code and make a couple of
    adjustments in Interface Builder.


    First, open up the nib file in Xcode to prepare the scroll view itself. Select
    the `LOLView`, then select Editor ➤ Embed in ➤ Scroll View from the menu. Our
    `LOLView` is now wrapped in a scroll view, but the positioning and sizing are
    a little off. Move the scroll view until the blue guidelines flash in the upper
    left-hand corner of the window, then resize a little with the lower-right resizing
    control until the blue guidelines flash on that side. The view should nearly fill
    the width of the window with the usual border around the edge, and extend it just
    far enough down to leave a decent margin above the other controls (see Figure
    [14-12](#A978-1-4302-4543-8_14_Chapter.html#Fig12)).


    We also can get some helpful zooming behavior for free with the scroll view, which
    is useful with multi-touch trackpads where the user can pinch to zoom. Let’s make
    use of that, since it’s free. With the Scroll View selected, open the Attributes
    Inspector. One of the options is "Magnification." Check the checkbox next to Allow,
    and we’re done, except for the code.


    ![A978-1-4302-4543-8_14_Fig12_HTML.jpg](A978-1-4302-4543-8_14_Fig12_HTML.jpg)


    Figure 14-12.


    The LOLmaker window, adjusted for scrolling


    The code we need to add is actually one more piece of the `setImage:` method.
    What we’re going to do is resize the `LOLView` each time a new image is set so
    that the view’s size matches the image’s size. Later, when the `LOLView` is enclosed
    in an `NSScrollView`, the scroll view will notice the new view size and automatically
    rerender everything including the scrollbars. The new code looks like this:


    `- (void)setImage:(NSImage *)i {`


      `if (![i isEqual:_image]) {`


        `if (i) {`


          `NSRect newImageFrame = NSMakeRect(0, 0, [i size].width`,


            `[i size].height);`


          `[self setFrame:newImageFrame];`


        `}`


        `_image = i;`


        `[self setNeedsDisplay:YES];`


      `}`


    `}`


    Save all the work, click Run, and we are done with the scroll view! Drag in a
    large image, and note that it starts off in the lower left, but scrollbars are
    present, and we can drag around to wherever we want, and we can pinch and zoom
    if our hardware supports it! See this in action in Figure [14-13](#A978-1-4302-4543-8_14_Chapter.html#Fig13).


    ![A978-1-4302-4543-8_14_Fig13_HTML.jpg](A978-1-4302-4543-8_14_Fig13_HTML.jpg)


    Figure 14-13.


    Scrollbars: so simple, even a cat can do it


    ### Drawing Text


    Okay, so let’s get to the final step, drawing the text. It is traditional in the
    LOLcats community to use a text caption in the Impact font, using white text with
    a black shadow. This font is installed with Mountain Lion, so all our users should
    have it. This should be a piece of cake. The only mildly tricky part is choosing
    a font size. Because images can be all sorts of sizes, we need to dynamically
    choose the font size so that the caption fills up a decent portion of the view
    without extending off the side. We’ll do this by testing several font sizes, starting
    with 1 and working our way upwards by doubling the size each time until we hit
    a point where the size of the text would be wider than the view itself. That we
    ratchet the font size back down a bit, and draw the text. This is all done by
    adding the bold lines shown below:


    `- (void)drawRect:(NSRect)dirtyRect {`


      `// Drawing code here.`


      `NSRect srcImageRect = NSMakeRect(0, 0, [self.image size].width`,


        `[self.image size].height);`


      `[self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect`


        `operation:NSCompositeCopy fraction:1.0];`


      `if (self.text != nil && [self.text length] > 0) {`


        `NSPoint textLocation = NSMakePoint(0,0);`


        `NSShadow *textShadow = [[NSShadow alloc] init];`


        `[textShadow setShadowOffset:NSMakeSize(0,0)];`


        `[textShadow setShadowColor:[NSColor blackColor]];`


        `[textShadow setShadowBlurRadius:10];`


        `NSMutableDictionary *textAttributes =`


          `[NSMutableDictionary dictionaryWithObjectsAndKeys:`


            `[NSFont fontWithName:@"Impact" size:40], NSFontAttributeName`,


            `[NSColor whiteColor], NSForegroundColorAttributeName`,


            `textShadow, NSShadowAttributeName`,


            `nil];`


        `// find the optimal size`


        `CGFloat fontSize;`


        `NSSize testSize = NSMakeSize(0, 0);`


        `for(fontSize=1; testSize.width < [self.image size].width; fontSize*=2)`


        `{`


          `[textAttributes setObject:[NSFont fontWithName:@"Impact"`


            `size:fontSize]`


            `forKey:NSFontAttributeName];`


          `testSize = [self.text sizeWithAttributes:textAttributes];`


        `}`


        `[textAttributes setObject:[NSFont fontWithName:@"Impact"`


          `size:fontSize/4]`


          `forKey:NSFontAttributeName];`


        `// and draw the text`


        `[self.text drawAtPoint:textLocation`


          `withAttributes:textAttributes];`


      `}`


    `}`


    Now click Run, drag in an image to the image well, and write some text. Voila!
    It should look something like Figure [14-14](#A978-1-4302-4543-8_14_Chapter.html#Fig14).


    ![A978-1-4302-4543-8_14_Fig14_HTML.jpg](A978-1-4302-4543-8_14_Fig14_HTML.jpg)


    Figure 14-14.


    I can haz press conference?'
  trans: "\n### 绘制位图\n\n现在，我们来进入`LOLView`类的“核心”部分：绘制图像并叠加一些文字。先从图像开始，只需在创建类时已经存在的`drawRect:`方法中添加几行代码，就能快速将图像复制到位：\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n\n  NSRect srcImageRect = NSMakeRect(0,\
    \ 0, [self.image size].width,\n\n    [self.image size].height);\n\n  [self.image\
    \ drawAtPoint:[self bounds].origin fromRect:srcImageRect\n\n    operation:NSCompositeCopy\
    \ fraction:1.0];\n\n}\n```\n\n这里我们首先创建了一个名为`srcImageRect`的矩形，其原点为`(0,0)`，大小与图像尺寸相同。然后，我们向图像自身发送一条消息，指示它绘制由`srcImageRect`指定的图像部分（此处为整张图像），并将其绘制到当前图形上下文中，位置位于视图边界矩形的原点。简而言之，整张图像被复制，且其左下角将精确地位于视图的左下角。这里使用的绘制方法还允许我们指定一个操作（该操作决定了源图像与目标图像中透明度的合并方式），以及一个介于`0.0`和`1.0`之间的整数，用作整张图像的整体\
    \ Alpha 级别。任何低于`1.0`的值都会使图像部分透明；一直降到`0.0`则会使图像完全不可见。\n\n现在，运行应用程序，看看目前的成果。应用程序打开后，显示一个基本空白的窗口，底部有一个图像框和文本字段。在某处找一张适合\
    \ LOLcat 的图片（我们使用的是通过 Flickr 找到的美国国家档案馆的非版权图像），将其拖入图像框，效果应类似于图 14-11。\n\n![A978-1-4302-4543-8_14_Fig11_HTML.jpg](img/A978-1-4302-4543-8_14_Fig11_HTML.jpg)\n\
    \n图 14-11.\n\n这里可没什么 LOL 元素\n\n嘿，这可不尽如人意！我们看到的只是拖入图片的左下角！要是能有办法看到整张图片就好了……\n\n\
    ### 让它滚动起来\n\n当然，办法是有的。Cocoa 中包含一个名为`NSScrollView`的类，它能帮上忙。通过将一个视图放入`NSScrollView`内部，我们就能获得水平和垂直滚动条，用户可以利用它们滑动视图。滚动视图处理了所有繁重的工作。放在其中的任何视图的绘制代码都完全无需修改！将`LOLView`放入`NSScrollView`出奇地简单。我们只需添加少量代码，并在\
    \ Interface Builder 中进行一些调整即可。\n\n首先，在 Xcode 中打开 nib 文件，准备滚动视图本身。选中`LOLView`，然后从菜单栏中选择\
    \ Editor ➤ Embed in ➤ Scroll View。现在，我们的`LOLView`被包裹在了滚动视图中，但定位和大小稍有偏差。移动滚动视图，直到蓝色参考线在窗口左上角闪烁，然后使用右下角的调整控件稍微调整大小，直到蓝色参考线在该侧闪烁。视图应几乎填满窗口宽度，边缘留有常规边框，并向下延伸至在其他控件上方留出合适的边距（参见图\
    \ 14-12）。\n\n我们还可以免费获得滚动视图的一些实用的缩放行为，这在用户可以通过捏合进行缩放的多点触控触控板上很有用。既然这是免费的，我们就利用一下。选中滚动视图后，打开属性检查器。其中一个选项是“Magnification（缩放）”。勾选旁边的“Allow（允许）”复选框，剩下的事情就是代码部分了。\n\
    \n![A978-1-4302-4543-8_14_Fig12_HTML.jpg](img/A978-1-4302-4543-8_14_Fig12_HTML.jpg)\n\
    \n图 14-12.\n\n为滚动调整后的 LOLmaker 窗口\n\n我们需要添加的代码实际上是`setImage:`方法的又一部分。我们要做的是，每次设置新图像时都调整`LOLView`的大小，使视图的尺寸与图像的尺寸匹配。之后，当`LOLView`被封装在`NSScrollView`中时，滚动视图会注意到新的视图大小，并自动重新渲染包括滚动条在内的所有内容。新代码如下所示：\n\
    \n```\n- (void)setImage:(NSImage *)i {\n\n  if (![i isEqual:_image]) {\n\n   \
    \ if (i) {\n\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n\n\
    \        [i size].height);\n\n      [self setFrame:newImageFrame];\n\n    }\n\n\
    \    _image = i;\n\n    [self setNeedsDisplay:YES];\n\n  }\n\n}\n```\n\n保存所有工作，点击运行，滚动视图就完成了！拖入一张大图，注意它最初位于左下方，但滚动条已经出现，我们可以拖拽到任何想要的位置，如果硬件支持，还可以捏合缩放！如图\
    \ 14-13 所示。\n\n![A978-1-4302-4543-8_14_Fig13_HTML.jpg](img/A978-1-4302-4543-8_14_Fig13_HTML.jpg)\n\
    \n图 14-13.\n\n滚动条：如此简单，连猫都会\n\n### 绘制文本\n\n好的，现在进入最后一步：绘制文本。在 LOLcats 社区中，传统做法是使用\
    \ Impact 字体的文本标题，白色文字配黑色阴影。Mountain Lion 系统已安装此字体，因此所有用户都应该拥有它。这应该是小菜一碟。唯一稍微有点棘手的是选择合适的字号。因为图像可能尺寸各异，我们需要动态选择字号，使标题能占据视图的适当部分，同时又不会延伸到边缘之外。我们将通过测试几种字号来实现：从`1`开始，每次将字号翻倍，直到文本的宽度会超出视图本身。然后，将字号稍微调小一点，再绘制文本。所有这些操作通过添加下面加粗显示的行来完成：\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n\n  // Drawing code here.\n\n  NSRect\
    \ srcImageRect = NSMakeRect(0, 0, [self.image size].width,\n\n    [self.image\
    \ size].height);\n\n  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n\
    \n    operation:NSCompositeCopy fraction:1.0];\n\n  if (self.text != nil && [self.text\
    \ length] > 0) {\n\n    NSPoint textLocation = NSMakePoint(0,0);\n\n    NSShadow\
    \ *textShadow = [[NSShadow alloc] init];\n\n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n\
    \n    [textShadow setShadowColor:[NSColor blackColor]];\n\n    [textShadow setShadowBlurRadius:10];\n\
    \n    NSMutableDictionary *textAttributes =\n\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \n        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n\n\
    \        [NSColor whiteColor], NSForegroundColorAttributeName,\n\n        textShadow,\
    \ NSShadowAttributeName,\n\n        nil];\n\n    // 找出最佳字号\n\n    CGFloat fontSize;\n\
    \n    NSSize testSize = NSMakeSize(0, 0);\n\n    for(fontSize=1; testSize.width\
    \ < [self.image size].width; fontSize*=2)\n\n    {\n\n      [textAttributes setObject:[NSFont\
    \ fontWithName:@\"Impact\"\n\n        size:fontSize]\n\n        forKey:NSFontAttributeName];\n\
    \n      testSize = [self.text sizeWithAttributes:textAttributes];\n\n    }\n\n\
    \    [textAttributes setObject:[NSFont fontWithName:@\"Impact\"\n\n      size:fontSize/4]\n\
    \n      forKey:NSFontAttributeName];\n\n    // 绘制文本\n\n    [self.text drawAtPoint:textLocation\n\
    \n      withAttributes:textAttributes];\n\n  }\n\n}\n```\n\n现在点击运行，将图像拖入图像框，然后输入一些文字。瞧！效果应该类似于图\
    \ 14-14。\n\n![A978-1-4302-4543-8_14_Fig14_HTML.jpg](img/A978-1-4302-4543-8_14_Fig14_HTML.jpg)\n\
    \n图 14-14.\n\n我能开新闻发布会吗？\n"
- fmt: "# Wrap Up\n\nIn this chapter, we gained a lot of understanding of the workings\
    \ of `NSView`, `NSBezierPath`, and some other classes and data structures that\
    \ deal with drawing. However, there’s still lots more we can do with Cocoa’s drawing\
    \ facilities, including drawing more interesting curves, modifying our drawing\
    \ in response to mouse events, and animating our views, all of which will be covered\
    \ in the next chapter.\n\n# 15. Advanced Drawing Topics\n\n## Abstract\n\n[Chapter\
    \ 14](#A978-1-4302-4543-8_14_Chapter.html) provided some basic knowledge of Cocoa’s\
    \ key drawing concepts, such as using paths to describe shapes, copying images\
    \ to the screen, and rendering text. This chapter will expand upon this, demonstrating\
    \ a few techniques that will bring our graphics to life. The first section will\
    \ cover how to make a view respond to mouse events, letting users interact with\
    \ our customized views. The second section will provide a brief introduction to\
    \ Core Animation, an exciting technology that lets us create smooth animations\
    \ with just a few lines of code.\n\n## Editing a Curve\n\n[Chapter 14](#A978-1-4302-4543-8_14_Chapter.html)\
    \ introduced the `NSBezierPath` class for drawing rounded rectangles, ovals, straight\
    \ lines, and points. If you’ve used a Bezier drawing tool in Photoshop or other\
    \ applications, you may have wondered what those shapes have to do with Bezier\
    \ curves at all! A Bezier curve is essentially a series of points describing a\
    \ path and control points describing the curves between the points. As such, basically\
    \ any shape that can be drawn with a pen (in the real world, or virtually in a\
    \ computer graphics system) can be described as a Bezier curve, including straight\
    \ lines and jagged angles.\n\nHowever, as a layman’s term, Bezier curve usually\
    \ means something more along the lines of what’s shown in Figure [15-1](#A978-1-4302-4543-8_15_Chapter.html#Fig1).\
    \ In it, the black curve is a Bezier curve, defined by two endpoints (the lower-left\
    \ and upper-right corners) and two control points depicted by rather gigantic\
    \ circles at the end of sticks. By dragging the control points around, the user\
    \ can change the shape of the curve. A view like this can be useful as a pacing\
    \ control, determining the rate of change of some value over time, such as the\
    \ movement of object from one point to another. Make the curve into a straight\
    \ line to specify a perfectly linear transition, or make a sort of S-shape to\
    \ make a value start changing slowly, quickly ramp up halfway through, and then\
    \ slow down as it approaches the target value (sometimes known as an “ease-in/ease-out”\
    \ transition). This control is what we’re going to be implementing in this section.\n\
    \n![A978-1-4302-4543-8_15_Fig1_HTML.jpg](A978-1-4302-4543-8_15_Fig1_HTML.jpg)\n\
    \n**Figure 15-1.** A Bezier curve\n\n### Preparations\n\nCreate a new Cocoa project\
    \ in Xcode and name it `CurveEdit`. Ensure that Automatic Reference Counting is\
    \ checked, and use `CE` as the class prefix for this application.\n\nThe interesting\
    \ part of this application will all be in the view object, but first let’s take\
    \ care of the infrastructure surrounding the view. We’re going to stick with the\
    \ MVC architecture for this project, which will help us make sure that the view\
    \ we create will be usable as a standalone component. The text fields for displaying\
    \ each control point’s x and y values will be connected to our controller object\
    \ with Cocoa Bindings, as will the custom view itself. The model in this app will\
    \ just be a set of instance variables in our controller class, but all the views\
    \ could just as easily be bound to a real model object if we chose to use or create\
    \ one.\n\nMake a new `NSView` subclass called `CECurveView`, and leave its implementation\
    \ as-is for now. We’ll get back to it soon enough. Open `MainMenu.xib`. From the\
    \ Object Library, drag out a Custom View, and use the Identity Inspector to set\
    \ its class to `CECurveView`. Resize it to about 240 x 240. Next, we need to connect\
    \ the app delegate and the view that we just dropped into the window. To do this,\
    \ open up the `CEAppDelegate.h` file in an Assistant Editor, and control-drag\
    \ from the `CECurveView` custom view over to the `CEAppDelegate.h` code in the\
    \ Assistant Editor window. Drag to just under the existing `@property` declaration,\
    \ and an “Insert Outlet” message should appear. Title the new outlet `curveView`.\n\
    \nWe’ve got a few more changes to make. We’re going to add an import statement\
    \ to pull in the `CECurveView` header file and some additional properties that\
    \ we’ll soon be using through Cocoa Bindings. Put the following in the `.h` file:\n\
    \n```\n#import <Cocoa/Cocoa.h>\n#import \"CECurveView.h\"\n\n@interface CEAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet CECurveView *curveView;\n@property (assign) CGFloat\
    \ cp1X;\n@property (assign) CGFloat cp1Y;\n@property (assign) CGFloat cp2X;\n\
    @property (assign) CGFloat cp2Y;\n\n@end\n```\n\nThen switch to the `.m` file,\
    \ and add the following lines:\n\n```\n#import \"CEAppDelegate.h\"\n\n@implementation\
    \ CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n    // make the CECurveView notice my changes\n    [self.curveView bind:@\"\
    cp1X\" toObject:self withKeyPath:@\"cp1X\"\n                options:nil];\n  \
    \  [self.curveView bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n      \
    \          options:nil];\n    [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"\
    cp2X\"\n                options:nil];\n    [self.curveView bind:@\"cp2Y\" toObject:self\
    \ withKeyPath:@\"cp2Y\"\n                options:nil];\n    \n    // make me notice\
    \ the CECurveView's changes\n    [self bind:@\"cp1X\" toObject:self.curveView\
    \ withKeyPath:@\"cp1X\"\n        options:nil];\n    [self bind:@\"cp1Y\" toObject:self.curveView\
    \ withKeyPath:@\"cp1Y\"\n        options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView\
    \ withKeyPath:@\"cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
    \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    \n    // set initial values\n\
    \    self.cp1X = 0.5;\n    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y\
    \ = 1.0;\n}\n\n@end\n```\n\nAs you can see, the controller class is very simple.\
    \ All it does is declare properties for accessing the control points’ x and y\
    \ values and an `IBOutlet` to connect to the `CECurveView` itself, establish some\
    \ bindings on behalf of our `curveView` (because we can’t do those in Interface\
    \ Builder), and set some default starting values for the control points. Because\
    \ we’re setting this object’s bindings in code, the `CECurveView` instance is\
    \ now all set (as far as our nib is concerned). With that, we can close the Assistant\
    \ Editor."
  raw: '## Wrap Up


    In this chapter, we gained a lot of understanding of the workings of `NSView`,
    `NSBezierPath`, and some other classes and data structures that deal with drawing.
    However, there’s still lots more we can do with Cocoa’s drawing facilities, including
    drawing more interesting curves, modifying our drawing in response to mouse events,
    and animating our views, all of which will be covered in the next chapter.


    # 15. Advanced Drawing Topics


    Abstract


    [Chapter 14](#A978-1-4302-4543-8_14_Chapter.html) provided some basic knowledge
    of Cocoa’s key drawing concepts, such as using paths to describe shapes, copying
    images to the screen, and rendering text. This chapter will expand upon this,
    demonstrating a few techniques that will bring our graphics to life. The first
    section will cover how to make a view respond to mouse events, letting users interact
    with our customized views. The second section will provide a brief introduction
    to Core Animation, an exciting technology that lets us create smooth animations
    with just a few lines of code.


    [Chapter 14](#A978-1-4302-4543-8_14_Chapter.html) provided some basic knowledge
    of Cocoa’s key drawing concepts, such as using paths to describe shapes, copying
    images to the screen, and rendering text. This chapter will expand upon this,
    demonstrating a few techniques that will bring our graphics to life. The first
    section will cover how to make a view respond to mouse events, letting users interact
    with our customized views. The second section will provide a brief introduction
    to Core Animation, an exciting technology that lets us create smooth animations
    with just a few lines of code.


    ## Editing a Curve


    [Chapter 14](#A978-1-4302-4543-8_14_Chapter.html) introduced the `NSBezierPath`
    class for drawing rounded rectangles, ovals, straight lines, and points. If you’ve
    used a Bezier drawing tool in Photoshop or other applications, you may have wondered
    what those shapes have to do with Bezier curves at all! A Bezier curve is essentially
    a series of points describing a path and control points describing the curves
    between the points. As such, basically any shape that can be drawn with a pen
    (in the real world, or virtually in a computer graphics system) can be described
    as a Bezier curve, including straight lines and jagged angles.


    However, as a layman’s term, Bezier curve usually means something more along the
    lines of what’s shown in Figure [15-1](#A978-1-4302-4543-8_15_Chapter.html#Fig1).
    In it, the black curve is a Bezier curve, defined by two endpoints (the lower-left
    and upper-right corners) and two control points depicted by rather gigantic circles
    at the end of sticks. By dragging the control points around, the user can change
    the shape of the curve. A view like this can be useful as a pacing control, determining
    the rate of change of some value over time, such as the movement of object from
    one point to another. Make the curve into a straight line to specify a perfectly
    linear transition, or make a sort of S-shape to make a value start changing slowly,
    quickly ramp up halfway through, and then slow down as it approaches the target
    value (sometimes known as an “ease-in/ease-out” transition). This control is what
    we’re going to be implementing in this section.


    ![A978-1-4302-4543-8_15_Fig1_HTML.jpg](A978-1-4302-4543-8_15_Fig1_HTML.jpg)


    Figure 15-1.


    A Bezier curve


    ### Preparations


    Create a new Cocoa project in Xcode and name it CurveEdit. Ensure that Automatic
    Reference Counting is checked, and use CE as the class prefix for this application.


    The interesting part of this application will all be in the view object, but first
    let’s take care of the infrastructure surrounding the view. We’re going to stick
    with the MVC architecture for this project, which will help us make sure that
    the view we create will be usable as a standalone component. The text fields for
    displaying each control point’s x and y values will be connected to our controller
    object with Cocoa Bindings, as will the custom view itself. The model in this
    app will just be a set of instance variables in our controller class, but all
    the views could just as easily be bound to a real model object if we chose to
    use or create one.


    Make a new `NSView` subclass called `CECurveView`, and leave its implementation
    as-is for now. We’ll get back to it soon enough. Open `MainMenu.xib`. From the
    Object Library, drag out a Custom View, and use the Identity Inspector to set
    its class to `CECurveView`. Resize it to about 240 x 240\. Next, we need to connect
    the app delegate and the view that we just dropped into the window. To do this,
    open up the `CEAppDelegate.h` file in an Assistant Editor, and control-drag from
    the `CECurveView` custom view over to the `CEAppDelegate.h` code in the Assistant
    Editor window. Drag to just under the existing `@property` declaration, and an
    “Insert Outlet” message should appear. Title the new outlet `curveView`.


    We’ve got a few more changes to make. We’re going to add an import statement to
    pull in the `CECurveView` header file and some additional properties that we’ll
    soon be using through Cocoa Bindings. Put the following in the `.h` file:


    `#import <Cocoa/Cocoa.h>`


    `#import "CECurveView.h"`


    `@interface CEAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet CECurveView *curveView;`


    `@property (assign) CGFloat cp1X;`


    `@property (assign) CGFloat cp1Y;`


    `@property (assign) CGFloat cp2X;`


    `@property (assign) CGFloat cp2Y;`


    `@end`


    Then switch to the `.m` file, and add the following lines:


    `#import "CEAppDelegate.h"`


    `@implementation CEAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {`


    `// make the CECurveView notice my changes`


    `[self.curveView bind:@"cp1X" toObject:self withKeyPath:@"cp1X"`


    `options:nil];`


    `[self.curveView bind:@"cp1Y" toObject:self withKeyPath:@"cp1Y"`


    `options:nil];`


    `[self.curveView bind:@"cp2X" toObject:self withKeyPath:@"cp2X"`


    `options:nil];`


    `[self.curveView bind:@"cp2Y" toObject:self withKeyPath:@"cp2Y"`


    `options:nil];`


    `// make me notice the CECurveView''s changes`


    `[self bind:@"cp1X" toObject:self.curveView withKeyPath:@"cp1X"`


    `options:nil];`


    `[self bind:@"cp1Y" toObject:self.curveView withKeyPath:@"cp1Y"`


    `options:nil];`


    `[self bind:@"cp2X" toObject:self.curveView withKeyPath:@"cp2X"`


    `options:nil];`


    `[self bind:@"cp2Y" toObject:self.curveView withKeyPath:@"cp2Y"`


    `options:nil];`


    `// set initial values`


    `self.cp1X = 0.5;`


    `self.cp1Y = 0.0;`


    `self.cp2X = 0.5;`


    `self.cp2Y = 1.0;`


    `}`


    `@end`


    As you can see, the controller class is very simple. All it does is declare properties
    for accessing the control points’ x and y values and an `IBOutlet` to connect
    to the `CECurveView` itself, establish some bindings on behalf of our `curveView`
    (because we can’t do those in Interface Builder), and set some default starting
    values for the control points. Because we’re setting this object’s bindings in
    code, the `CECurveView` instance is now all set (as far as our nib is concerned).
    With that, we can close the Assistant Editor.'
  trans: "\n# 本章小结\n\n在本章中，我们对 `NSView`、`NSBezierPath` 以及其他一些用于绘图的类和数据结构的工作原理有了深入的了解。然而，Cocoa\
    \ 的绘图功能远不止于此，我们还可以绘制更复杂的曲线、根据鼠标事件修改绘图内容，以及为视图添加动画效果——这些内容都将在下一章中介绍。\n\n# 15. 高级绘图主题\n\
    \n## 摘要\n\n第 14 章介绍了 Cocoa 关键绘图概念的基础知识，例如使用路径描述形状、将图像复制到屏幕以及渲染文本。本章将在此基础上展开，展示一些让图形“活”起来的技巧。第一部分将介绍如何让视图响应鼠标事件，使用户能够与自定义视图交互。第二部分将简要介绍\
    \ Core Animation，这项令人兴奋的技术只需几行代码就能实现流畅的动画效果。\n\n## 编辑曲线\n\n第 14 章介绍了如何使用 `NSBezierPath`\
    \ 类绘制圆角矩形、椭圆、直线和点。如果你曾在 Photoshop 或其他应用中使用过贝塞尔绘图工具，你可能会好奇这些形状与贝塞尔曲线究竟有何关系！实际上，贝塞尔曲线本质上是由一系列描述路径的点，以及描述点之间曲线的控制点构成的。因此，任何能用笔（在现实世界中，或在计算机图形系统中虚拟地）绘制的形状，都可以被描述为贝塞尔曲线，包括直线和折线。\n\
    \n不过，对于普通人来说，“贝塞尔曲线”通常更接近于图 15-1 所示的形态。图中黑色曲线是一条贝塞尔曲线，由两个端点（左下角和右上角）以及两个控制点（图中较大的圆圈，位于杆的末端）定义。用户通过拖拽控制点可以改变曲线的形状。这种视图可以用作速度控制，用于确定某个值随时间变化的速率，例如物体从一个点到另一个点的运动。将曲线变为直线可以指定完全线性的过渡，而将其调整为\
    \ S 形则可以使值开始变化缓慢，中间快速上升，最后在接近目标值时逐渐放缓（有时称为“缓入/缓出”过渡）。本节我们将要实现的就是这种控制。\n\n![A978-1-4302-4543-8_15_Fig1_HTML.jpg](img/A978-1-4302-4543-8_15_Fig1_HTML.jpg)\n\
    \n**图 15-1.** 一条贝塞尔曲线\n\n### 准备工作\n\n在 Xcode 中创建一个新的 Cocoa 项目，并将其命名为 `CurveEdit`。确保勾选“自动引用计数”（Automatic\
    \ Reference Counting），并将此应用的类前缀设置为 `CE`。\n\n该应用的核心部分将全部位于视图对象中，但首先让我们处理好视图的基础架构。本项目将采用\
    \ MVC 架构，这有助于确保我们创建的视图能够作为独立组件使用。用于显示每个控制点 x 和 y 值的文本字段将通过 Cocoa 绑定连接到控制器对象，自定义视图本身也是如此。本应用中的模型将只是控制器类中的一组实例变量，但如果我们选择使用或创建真实的模型对象，所有视图也同样可以轻松绑定到该模型上。\n\
    \n创建一个名为 `CECurveView` 的新 `NSView` 子类，暂时保持其实现内容不变。我们稍后会回来处理它。打开 `MainMenu.xib`。从对象库中拖出一个自定义视图（Custom\
    \ View），然后使用身份检查器（Identity Inspector）将其类设置为 `CECurveView`。将其大小调整为大约 240 x 240。接下来，我们需要连接应用代理以及刚刚拖入窗口的视图。为此，在辅助编辑器中打开\
    \ `CEAppDelegate.h` 文件，按住 Control 键从 `CECurveView` 自定义视图拖拽到辅助编辑器窗口中的 `CEAppDelegate.h`\
    \ 代码区域。将拖拽点放到现有 `@property` 声明的正下方，此时应出现“插入输出口”（Insert Outlet）提示。将新输出口命名为 `curveView`。\n\
    \n我们还需要做几处修改。我们将添加一个导入语句，以引入 `CECurveView` 头文件，并添加一些稍后要通过 Cocoa 绑定使用的额外属性。请在 `.h`\
    \ 文件中添加以下内容：\n\n```\n#import <Cocoa/Cocoa.h>\n#import \"CECurveView.h\"\n\n@interface\
    \ CEAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n@property (weak) IBOutlet CECurveView *curveView;\n@property\
    \ (assign) CGFloat cp1X;\n@property (assign) CGFloat cp1Y;\n@property (assign)\
    \ CGFloat cp2X;\n@property (assign) CGFloat cp2Y;\n\n@end\n```\n\n然后切换到 `.m` 文件，并添加以下代码行：\n\
    \n```\n#import \"CEAppDelegate.h\"\n\n@implementation CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // 使 CECurveView 注意到我的变化\n    [self.curveView bind:@\"\
    cp1X\" toObject:self withKeyPath:@\"cp1X\"\n                options:nil];\n  \
    \  [self.curveView bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n      \
    \          options:nil];\n    [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"\
    cp2X\"\n                options:nil];\n    [self.curveView bind:@\"cp2Y\" toObject:self\
    \ withKeyPath:@\"cp2Y\"\n                options:nil];\n    \n    // 使我注意到 CECurveView\
    \ 的变化\n    [self bind:@\"cp1X\" toObject:self.curveView withKeyPath:@\"cp1X\"\n\
    \        options:nil];\n    [self bind:@\"cp1Y\" toObject:self.curveView withKeyPath:@\"\
    cp1Y\"\n        options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView\
    \ withKeyPath:@\"cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
    \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    \n    // 设置初始值\n    self.cp1X\
    \ = 0.5;\n    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y = 1.0;\n}\n\
    \n@end\n```\n\n如你所见，控制器类非常简单。它所做的仅仅是声明用于访问控制点 x 和 y 值的属性，一个用于连接到 `CECurveView`\
    \ 本身的 `IBOutlet`，为我们的 `curveView` 建立一些绑定（因为无法在 Interface Builder 中完成这些操作），并设置控制点的一些默认起始值。由于我们是通过代码设置该对象的绑定，因此（就\
    \ nib 文件而言）`CECurveView` 实例现在已完全就绪。至此，我们可以关闭辅助编辑器了。\n"
- fmt: "Go back to the Object Library and pull out a `Label`, dropping it below the\
    \ `CECurveView`. Change the title of the label to be `X1:`. Drag out a `Text Field`\
    \ as well, and drop it next to the label so that the blue guidelines indicate\
    \ good alignment. Select the label and the text field together, and then hit `⌘D`\
    \ to duplicate them. Position the new set below the first one, and change the\
    \ label’s title to read `Y1:`. This form will show us the `x` and `y` values for\
    \ the first control point in a Bezier curve. Create bindings for each of the two\
    \ text fields. For each, we want to bind its `Value` attribute to the `CEAppDelegate`\
    \ object using the model key paths `cp1X` and `cp1Y`, respectively.\n\nSelect\
    \ both labels and both text fields, duplicate them (`⌘-D`), and position the new\
    \ copies the right of the first set. These fields will show us the values for\
    \ the second control point, so rename the labels as `X2:` and `Y2:`, and set up\
    \ bindings similar to the first set, but using `cp2X` and `cp2Y` as the key paths\
    \ instead.\n\nRefer to Figure [15-1](#A978-1-4302-4543-8_15_Chapter.html#Fig1)\
    \ to see what it should look like, lay things out nicely, and resize the window\
    \ to match the added content. Save the files, and Run the project just to make\
    \ sure there are no errors at this point. The resulting app will only let us edit\
    \ the contents of the four text fields. It will also complain that `CECurveView`\
    \ isn’t key value coding compliant for the key `cp1X`, which is true: we haven’t\
    \ yet added that to the `CECurveView`, but we’re about to change that!\n\n###\
    \ Bezier Plumbing\n\nLet’s get started with the `CECurveView` class by establishing\
    \ some infrastructure. `CECurveView` needs to keep track of two control points,\
    \ which we’ll set up as four floats, each accessible through a property, just\
    \ like we did for the controller class. We also want to use a technique similar\
    \ to the one we used for MrSmiley in [Chapter 14](#A978-1-4302-4543-8_14_Chapter.html),\
    \ so that the GUI scales to match whatever size it’s rendered. This time, we’re\
    \ going to set up fixed bounds so that we can always draw a curve in a square\
    \ between `(0,0)` and `(1,1)` on the plane, leaving a little extra surrounding\
    \ space, so we’ll add some code that sets the bounds to a square between `(-0.1,-0.1)`\
    \ and `(1.1,1.1)`, and maintain those bounds no matter how the view is resized.\
    \ Take care of all that by adding the bold lines shown here:\n\n```objc\n// CECurveView.h:\n\
    \n#import <Cocoa/Cocoa.h>\n\n@interface CECurveView : NSView {\n\n  NSRect myBounds;\n\
    \n}\n\n@property (assign, nonatomic) CGFloat cp1X;\n@property (assign, nonatomic)\
    \ CGFloat cp1Y;\n@property (assign, nonatomic) CGFloat cp2X;\n@property (assign,\
    \ nonatomic) CGFloat cp2Y;\n\n@end\n```\n\nThen these lines to the `.m` file:\n\
    \n```objc\n// CECurveView.m:\n\n#import \"CECurveView.h\"\n\n@implementation CECurveView\n\
    \n- (void)setCp1X:(CGFloat)f {\n  self.cp1X = MAX(MIN(f, 1.0), 0.0);\n  [self\
    \ setNeedsDisplay:YES];\n}\n\n- (void)setCp1Y:(CGFloat)f {\n  self.cp1Y = MAX(MIN(f,\
    \ 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n- (void)setCp2X:(CGFloat)f\
    \ {\n  self.cp2X = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n\
    - (void)setCp2Y:(CGFloat)f {\n  self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n\
    }\n\n- (id)initWithFrame:(NSRect)frame {\n  self = [super initWithFrame:frame];\n\
    \  if (self) {\n    // Initialization code here.\n    myBounds = NSMakeRect(-0.1,\
    \ -0.1, 1.2, 1.2);\n    [self setBounds:myBounds];\n  }\n  return self;\n}\n\n\
    - (void)setFrameSize:(NSSize)newSize {\n  [super setFrameSize:newSize];\n  [self\
    \ setBounds:myBounds];\n}\n\n- (void)drawRect:(NSRect)rect {\n  // Drawing code\
    \ here.\n}\n\n@end\n```\n\nNote that we’re implementing our own setters for the\
    \ properties, so we’ll need to mark the properties as `nonatomic`. The compiler\
    \ will note that we’re not implementing our own getters, so the compiler will\
    \ still generate those for us. In the setters, we’ll enforce a limited range on\
    \ the input value, making it fit in the range from `0.0` to `1.0`. We’ll also\
    \ mark the window as “dirty” with `setNeedsDisplay:`, forcing the system to redraw\
    \ it whenever a property changes."
