- fmt: "### `NSInvalidArgumentException`\n\nThis exception can, in theory, be raised\
    \ by any method that determines that its parameters are invalid in some way. In\
    \ practice, there are two typical situations where most Cocoa developers will\
    \ encounter this at some point, and we’ve just hit the first. Remember that our\
    \ code loops through all the elements in an array, and tries to call the `length`\
    \ method on each, like so:\n\n```\nfor (NSString *component in nameComponents)\
    \ {\n\nnameComponentLength += [component length];\n\n}\n```\n\nIn this case, the\
    \ problem arises when trying to call `length` on an object that doesn’t have such\
    \ a method. Our code tries calling the `length` method on `NSCFNumber` (the concrete\
    \ subclass of `NSNumber` that happens to be used when we create an `NSNumber`\
    \ in the usual way), and that class doesn’t implement that method, all of which\
    \ we can reasonably deduce from the exception’s `reason`. We could split hairs\
    \ now and complain that Apple really should use a different exception name here\
    \ that would clearly tell us that the exception is related to a method name, but\
    \ this seems to be what we’re stuck with.\n\nIn any case, we can explore further\
    \ by using the graphical debugger in Xcode. In the table showing the call stack,\
    \ click on the line labeled “`-[ECAppDelegate invalidArgumentException_unrecognizedSelector]`”\
    \ to switch back to the last piece of code that was being executed before the\
    \ exception was raised. The Editor pane switches back to the relevant source code\
    \ file, and the variable view now shows the variables available to us at that\
    \ point in the program (see Figure [13-4](#A978-1-4302-4543-8_13_Chapter.html#Fig4)).\n\
    \n![A978-1-4302-4543-8_13_Fig4_HTML.jpg](A978-1-4302-4543-8_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4.\n\nChoosing a different entry in the call stack gives us access\
    \ to a different part of our running program. Note that the command-line interface\
    \ at the bottom shows commands that were executed at the top level of the call\
    \ stack, inside `objc_exception_throw`. If we entered the same commands with the\
    \ current stack frame in focus, `$rax` would have a different value.\n\nBased\
    \ on the information we’ve gotten about the exception and what part of our code\
    \ triggered it, we should be able to figure out the problem. We can even take\
    \ additional steps here to examine the current state of our program, such as printing\
    \ out summary information for the object that the `for` loop is currently looking\
    \ at, by typing `po component`. We can also use the variable view at the lower-left\
    \ to examine the variables that are available to us. For example, click the disclosure\
    \ triangle next to the `nameComponents` variable to see its contents. In this\
    \ case, it’s pretty simple: our array contains an `NSNumber`, which doesn’t have\
    \ a `length` method.\n\nAt this point, we have to decide how to fix the problem.\
    \ We still want to implement the same basic algorithm that adds the lengths of\
    \ the character strings for each component; we just want to make it so that the\
    \ value of the `NSNumber` (in this case, `3`) is converted to a string (`@“3\"\
    `). Here we can make use of the `description` method, defined on `NSObject` and\
    \ therefore available in all Cocoa objects. Incidentally, the `description` method\
    \ is what’s used by lldb whenever you issue a `po` command to see an object’s\
    \ value. For most classes, calling `description` will get the result defined by\
    \ `NSObject`’s implementation (typically something like `<NameOfObjectClass: 0x10cdb0>`),\
    \ but some classes, such as `NSString` and `NSNumber`, override this method to\
    \ return something else. `NSString`’s implementation just returns the `NSString`\
    \ itself, while `NSNumber`’s implementation converts the numeric value into an\
    \ `NSString` and returns it.\n\nSo, to make this work, edit the `invalidArgumentException_unrecognizedSelector`\
    \ method, changing the line inside the `for` loop to the following:\n\n```\nnameComponentLength\
    \ += [[component description] length];\n```\n\nBecause we know that `NSObject`,\
    \ and therefore every object, implements the `description` method and returns\
    \ a string, we know that this call will now always work. Even if someone slips\
    \ another kind of object in there that doesn’t give us a nice, compact result\
    \ like `NSString` and `NSNumber` do, at least we know the method is there and\
    \ will be called!\n\nSo do the fix, run the app again, and see what shows up in\
    \ the Xcode output console.\n\n```\n2013-02-10 23:51:08.291 ExceptionCity[71675:303]\
    \ Total length of all name components: 15\n\n(lldb)\n```\n\nDang, another one!\
    \ Our app has executed some code that raised another exception. Since we already\
    \ had an exception breakpoint set up, this halts the program and drops us back\
    \ at the lldb prompt. As before, select the top stack frame (`objc_exception_throw`)\
    \ in the debug navigator, and we can once again enter some commands at the lldb\
    \ prompt to get some info about the exception:\n\n```\n(lldb) po $rax\n$0 = 4327021824\
    \ *** -[__NSArrayM insertObject:atIndex:]: object cannot be nil\n\n(lldb) po [$rax\
    \ name]\n$1 = 0x00007fff783e0a30 NSInvalidArgumentException\n```\n\nAnd if we\
    \ scan back down the call stack looking for the first location that shows black\
    \ instead of grey, we’ll find `-[ECAppDelegate invalidArgumentException_insertNil]`,\
    \ the location of the piece of our code that triggered the exception. Click that\
    \ line, and see the code editor window highlight this line in `invalidArgumentException_insertNil`:\n\
    \n```\n[array addObject:object2];\n```\n\nTake a look at the code just above that,\
    \ and there’s the problem: `object2` is a pointer to `nil`, and `NSMutableArray`\
    \ won’t allow us to insert a `nil` into it. In a complex application, you may\
    \ want to track down the root cause (where did the nil pointer come from, and\
    \ is nil a valid value for that variable?), but in this case we’ll work around\
    \ the problem by putting a safety check before adding the object, like this:\n\
    \n```\nif (object2 != nil) {\n    [array addObject:object2];\n}\n```\n\nThis takes\
    \ care of that. `NSInvalidArgumentException` is one of the most frequently encountered\
    \ exceptions in Cocoa, and we’ve just seen the two most frequent situations that\
    \ trigger it: calling a method on a class that doesn’t implement that method,\
    \ and trying to insert `nil` into an array.\n\nRun the app again, and get ready\
    \ for the next problem."
  raw: '### NSInvalidArgumentException


    This exception can, in theory, be raised by any method that determines that its
    parameters are invalid in some way. In practice, there are two typical situations
    where most Cocoa developers will encounter this at some point, and we’ve just
    hit the first. Remember that our code loops through all the elements in an array,
    and tries to call the `length` method on each, like so:


    `for (NSString *component in nameComponents) {`


    `nameComponentLength += [component length];`


    `}`


    In this case, the problem arises when trying to call `length` on an object that
    doesn’t have such a method. Our code tries calling the `length` method on `NSCFNumber`
    (the concrete subclass of `NSNumber` that happens to be used when we create an
    `NSNumber` in the usual way), and that class doesn’t implement that method, all
    of which we can reasonably deduce from the exception’s `reason`. We could split
    hairs now and complain that Apple really should use a different exception name
    here that would clearly tell us that the exception is related to a method name,
    but this seems to be what we’re stuck with.


    In any case, we can explore further by using the graphical debugger in Xcode.
    In the table showing the call stack, click on the line labeled “-[ECAppDelegate
    invalidArgumentException_unrecognizedSelector]” to switch back to the last piece
    of code that was being executed before the exception was raised. The Editor pane
    switches back to the relevant source code file, and the variable view now shows
    the variables available to us at that point in the program (see Figure [13-4](#A978-1-4302-4543-8_13_Chapter.html#Fig4)).


    ![A978-1-4302-4543-8_13_Fig4_HTML.jpg](A978-1-4302-4543-8_13_Fig4_HTML.jpg)


    Figure 13-4.


    Choosing a different entry in the call stack gives us access to a different part
    of our running program. Note that the command-line interface at the bottom shows
    commands that were executed at the top level of the call stack, inside objc_exception_throw.
    If we entered the same commands with the current stack frame in focus, $rax would
    have a different value


    Based on the information we’ve gotten about the exception and what part of our
    code triggered it, we should be able to figure out the problem. We can even take
    additional steps here to examine the current state of our program, such as printing
    out summary information for the object that the `for` loop is currently looking
    at, by typing `po component`. We can also use the variable view at the lower-left
    to examine the variables that are available to us. For example, click the disclosure
    triangle next to the `nameComponents` variable to see its contents. In this case,
    it’s pretty simple: our array contains an `NSNumber`, which doesn’t have a `length`
    method.


    At this point, we have to decide how to fix the problem. We still want to implement
    the same basic algorithm that adds the lengths of the character strings for each
    component; we just want to make it so that the value of the `NSNumber` (in this
    case, `3`) is converted to a string (`@`“`3`”). Here we can make use of the `description`
    method, defined on `NSObject` and therefore available in all Cocoa objects. Incidentally,
    the `description` method is what’s used by lldb whenever you issue a `po` command
    to see an object’s value. For most classes, calling `description` will get the
    result defined by `NSObject`’s implementation (typically something like `<NameOfObjectClass:
    0x10cdb0>`), but some classes, such as `NSString` and `NSNumber`, override this
    method to return something else. `NSString`’s implementation just returns the
    `NSString` itself, while `NSNumber`’s implementation converts the numeric value
    into an `NSString` and returns it.


    So, to make this work, edit the `invalidArgumentException_unrecognizedSelector`
    method, changing the line inside the `for` loop to the following:


    `nameComponentLength += [[component description] length];`


    Because we know that `NSObject`, and therefore every object, implements the `description`
    method and returns a string, we know that this call will now always work. Even
    if someone slips another kind of object in there that doesn’t give us a nice,
    compact result like `NSString` and `NSNumber` do, at least we know the method
    is there and will be called!


    So do the fix, run the app again, and see what shows up in the Xcode output console.


    `2013-02-10 23:51:08.291 ExceptionCity[71675:303] Total length of all name components:
    15`


    `(lldb)`


    Dang, another one! Our app has executed some code that raised another exception.
    Since we already had an exception breakpoint set up, this halts the program and
    drops us back at the lldb prompt. As before, select the top stack frame (`objc_exception_throw`)
    in the debug navigator, and we can once again enter some commands at the lldb
    prompt to get some info about the exception:


    `(lldb) po $rax`


    `$0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]: object cannot be nil`


    `(lldb) po [$rax name]`


    `$1 = 0x00007fff783e0a30 NSInvalidArgumentException`


    And if we scan back down the call stack looking for the first location that shows
    black instead of grey, we’ll find `-[ECAppDelegate invalidArgumentException_insertNil]`,
    the location of the piece of our code that triggered the exception. Click that
    line, and see the code editor window highlight this line in `invalidArgumentException_insertNil`:


    `[array addObject:object2];`


    Take a look at the code just above that, and there’s the problem: `object2` is
    a pointer to `nil`, and `NSMutableArray` won’t allow us to insert a `nil` into
    it. In a complex application, you may want to track down the root cause (where
    did the nil pointer come from, and is nil a valid value for that variable?), but
    in this case we’ll work around the problem by putting a safety check before adding
    the object, like this:


    `if (object2 != nil) {`


    `[array addObject:object2];`


    `}`


    This takes care of that. `NSInvalidArgumentException` is one of the most frequently
    encountered exceptions in Cocoa, and we’ve just seen the two most frequent situations
    that trigger it: calling a method on a class that doesn’t implement that method,
    and trying to insert `nil` into an array.


    Run the app again, and get ready for the next problem.'
  trans: "\n### `NSInvalidArgumentException`\n\n理论上，任何检测到参数无效的方法都可能抛出此异常。实际上，大多数 Cocoa\
    \ 开发者迟早都会遇到两种典型情况，而我们现在就遇到了第一种。回顾一下，我们的代码遍历数组中的所有元素，并尝试对每个元素调用 `length` 方法，如下所示：\n\
    \n```\nfor (NSString *component in nameComponents) {\n\nnameComponentLength +=\
    \ [component length];\n\n}\n```\n\n在这种情况下，问题出现在尝试对一个没有 `length` 方法的对象调用该方法时。我们的代码尝试对\
    \ `NSCFNumber`（`NSNumber` 的具体子类，当我们以常规方式创建 `NSNumber` 时会用到它）调用 `length` 方法，而该类并未实现该方法，所有这些我们都可以从异常的\
    \ `reason` 中合理推断出来。我们当然可以吹毛求疵，抱怨 Apple 应该在这里使用不同的异常名称，明确告诉我们异常与方法名有关，但看样子我们只能接受现状了。\n\
    \n无论如何，我们可以使用 Xcode 的图形化调试器进一步探究。在显示调用堆栈的表中，点击标记为 “`-[ECAppDelegate invalidArgumentException_unrecognizedSelector]`”\
    \ 的行，切换回异常抛出前最后执行的代码。编辑器窗格会切换回相关的源代码文件，变量视图现在会显示该程序点可用的变量（参见图 13-4）。\n\n![A978-1-4302-4543-8_13_Fig4_HTML.jpg](img/A978-1-4302-4543-8_13_Fig4_HTML.jpg)\n\
    \n图 13-4.\n\n选择调用堆栈中的不同条目，可以访问正在运行程序的不同部分。请注意，底部的命令行界面显示了在调用堆栈顶层、`objc_exception_throw`\
    \ 内部执行的命令。如果我们聚焦当前堆栈帧并输入相同的命令，`$rax` 的值将会不同。\n\n根据我们对异常及其触发代码位置所获取的信息，我们应该能够找出问题所在。我们甚至还可以采取额外步骤来检查程序的当前状态，例如通过输入\
    \ `po component` 来打印 `for` 循环当前正查看的对象的摘要信息。我们也可以使用左下角的变量视图来检查可用的变量。例如，点击 `nameComponents`\
    \ 变量旁边的披露三角形查看其内容。本例中非常简单：我们的数组包含一个 `NSNumber`，而它没有 `length` 方法。\n\n此时，我们必须决定如何修复这个问题。我们仍然想实现相同的基本算法，即累加每个组件的字符串长度；我们只需要让\
    \ `NSNumber` 的值（本例中为 `3`）被转换为字符串（`@“3\"`）。这里我们可以利用 `description` 方法，该方法在 `NSObject`\
    \ 上定义，因此所有 Cocoa 对象都可使用。顺便提一句，当你发出 `po` 命令查看对象值时，lldb 使用的正是 `description` 方法。对于大多数类，调用\
    \ `description` 会得到 `NSObject` 实现所定义的结果（通常是类似 `<NameOfObjectClass: 0x10cdb0>`\
    \ 这样的内容），但某些类（如 `NSString` 和 `NSNumber`）会重写此方法以返回其他内容。`NSString` 的实现仅返回 `NSString`\
    \ 本身，而 `NSNumber` 的实现则将数值转换为 `NSString` 并返回。\n\n因此，要使其正常工作，请编辑 `invalidArgumentException_unrecognizedSelector`\
    \ 方法，将 `for` 循环内的行修改为以下内容：\n\n```\nnameComponentLength += [[component description]\
    \ length];\n```\n\n因为我们知道 `NSObject`（因此每个对象）都实现了 `description` 方法并返回一个字符串，所以我们知道这个调用现在总能成功。即使有人混入了另一种对象，无法像\
    \ `NSString` 和 `NSNumber` 那样返回简洁紧凑的结果，至少我们知道这个方法存在且会被调用！\n\n因此，进行修复，重新运行应用，看看\
    \ Xcode 输出控制台中显示的内容。\n\n```\n2013-02-10 23:51:08.291 ExceptionCity[71675:303]\
    \ Total length of all name components: 15\n\n(lldb)\n```\n\n糟了，又来了一个！我们的应用执行了一些代码，引发了另一个异常。由于我们已经设置了异常断点，程序会暂停并将我们带回\
    \ lldb 提示符。像之前一样，在调试导航器中选择顶部堆栈帧（`objc_exception_throw`），然后我们可以在 lldb 提示符处再次输入一些命令来获取异常信息：\n\
    \n```\n(lldb) po $rax\n$0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]:\
    \ object cannot be nil\n\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a30 NSInvalidArgumentException\n\
    ```\n\n如果我们往下扫视调用堆栈，寻找第一个显示为黑色而不是灰色的位置，我们会发现 `-[ECAppDelegate invalidArgumentException_insertNil]`，即触发异常的代码所在位置。点击该行，会看到代码编辑器窗口高亮显示了\
    \ `invalidArgumentException_insertNil` 中的这一行：\n\n```\n[array addObject:object2];\n\
    ```\n\n查看紧接其上的代码，问题就在那里：`object2` 是一个指向 `nil` 的指针，而 `NSMutableArray` 不允许我们向其中插入\
    \ `nil`。在复杂的应用中，你可能需要追根溯源（`nil` 指针从何而来，`nil` 对于该变量是否是有效值？），但在这个例子中，我们通过在添加对象之前添加安全检查来解决这个问题，如下所示：\n\
    \n```\nif (object2 != nil) {\n    [array addObject:object2];\n}\n```\n\n这样就解决了问题。`NSInvalidArgumentException`\
    \ 是 Cocoa 中最常遇到的异常之一，我们刚刚看到了触发它的两种最常见情况：在未实现该方法的类上调用方法，以及尝试向数组中插入 `nil`。\n\n再次运行应用，为下一个问题做好准备。\n"
- fmt: "### NSRangeException\n\nThe previous exceptions have been cleared up, but\
    \ look what happens now:\n\n```\n2009-09-16 23:44:33.038 ExceptionCity[8881:10b]\
    \ Total length of all name components: 15\n2009-09-16 23:44:33.065 ExceptionCity[8881:10b]\
    \ inserted all the objects I could!\n2009-09-16 23:44:33.066 ExceptionCity[8881:10b]\
    \ found indexed item two\n2009-09-16 23:44:33.066 ExceptionCity[8881:10b] ***\
    \ -[NSCFArray objectAtIndex:]: index\n(2137483647( or possibly larger)) beyond\
    \ bounds (3)\n2013-02-10 23:57:55.575 ExceptionCity[71731:303] Total length of\
    \ all name components: 15\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] inserted\
    \ all the objects I could!\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] found\
    \ indexed item two\n(lldb)\n```\n\nWe’ve halted once again, due to another exception.\
    \ Just like before, click the `objc_exception_throw` line in the Debug Navigator,\
    \ and examine the exception to find the problem.\n\n```\n(lldb) po $rax\n$0 =\
    \ 4300330528 *** -[__NSArrayI objectAtIndex:]: index 9223372036854775807 beyond\
    \ bounds [0 .. 2]\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a10 NSRangeException\n\
    ```\n\nCrikey! That’s one big index value. Now look at the call stack again, and\
    \ click on the uppermost item within our code: `-[ECAppDelegate rangeException]`.\
    \ This will highlight the following line in the text editor:\n\n```\nNSLog(@\"\
    found indexed item %@\", array[indexOfFive]);\n```\n\nThis line actually makes\
    \ two calls: first to the `objectAtIndex:` method (implicit in the new Objective-C\
    \ array accessor syntax that Apple includes starting with Xcode 4.5), then to\
    \ the `NSLog` function. A glance at the call stack shows that the `objectAtIndex:`\
    \ method is the one complaining. Apparently it doesn’t like the value contained\
    \ in `indexOfFive`. If we look in the variable view, or type `p indexOfFive` (note\
    \ the use of `p` for standard C types, as opposed to `po` for Objective-C objects),\
    \ we’ll see `9223372036854775807`. That does seem a bit high! If we look at the\
    \ code where it’s set, just two lines earlier, we’ll see this:\n\n```\nNSUInteger\
    \ indexOfFive = [array indexOfObject:@\"five\"];\n```\n\nThat line is asking `array`\
    \ for the index of an object that it doesn’t actually contain. In this case, `NSArray`\
    \ returns a special integer value called `NSNotFound`, which is defined to be\
    \ the maximum possible integer value. On Mac OS X running in 64-bit mode, that\
    \ turns out to be `9223372036854775807`. This value is used to tell the caller\
    \ that, “Hey, that object you want the index of? I don’t have it.” This is pretty\
    \ useful to know! A consequence of this is that whenever we get a value from `indexOfObject:`,\
    \ we really have to check to make sure that it’s not `NSNotFound`. In our case\
    \ we know exactly where the problem is, so we could just check that second time,\
    \ but it’s good to make a habit of always checking that return value, so we’ll\
    \ update the entire method like this:\n\n```\n- (void)rangeException {\n    //\
    \ Assuming we have an array of things...\n    NSArray *array = @[@\"one\", @\"\
    two\", @\"three\"];\n\n    // ... we can ask for the index of an item...\n   \
    \ NSUInteger indexOfTwo = [array indexOfObject:@\"two\"];\n    if (indexOfTwo\
    \ != NSNotFound) {\n        // ... and we can later retrieve that value using\
    \ the same index.\n        NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
    \    }\n\n    // But, what if we try to find the index for something that's not\n\
    \    // there?\n    NSUInteger indexOfFive = [array indexOfObject:@\"five\"];\n\
    \    if (indexOfFive != NSNotFound) {\n        // And we forget to check the return\
    \ value to make sure it's not\n        // NSNotFound?\n        NSLog(@\"found\
    \ indexed item %@\", array[indexOfFive]);\n    }\n}\n```\n\nMake those changes,\
    \ run the app, and note the reward of the congratulatory alert panel. Oh, sweet\
    \ success!\n\nHaving tackled those, we’ve now experienced and fixed the main types\
    \ of runtime exceptions that every Cocoa programmer gets at some point. That’s\
    \ it! This may come as a surprise to people come from other, more exception-heavy\
    \ environments, but like we said, in Cocoa exceptions are used sparingly and almost\
    \ always to signal that the programmer has made an error. `NSRangeException` and\
    \ `NSInvalidArgumentException` (for both of the causes shown above) really make\
    \ up the bulk of all exceptions you’re likely to deal with.\n\n### And the Rest\n\
    \nOkay, there are more exceptions that can be raised in a Cocoa app. There are\
    \ more predefined exception names in `NSException.h`, for example, but chances\
    \ are you won’t encounter any of them. `NSGenericException` seems to arise sometimes\
    \ when working with SQLite or Apple Events, and on rare occasions `NSInternalInconsistencyException`\
    \ can rear its ugly head if you override a method that you shouldn’t (such as\
    \ when the documentation warns you not to), but real-world examples of those are\
    \ pretty hard to come by.\n\nThe one instance where you’re likely to see any exceptions\
    \ occur is if you’re using Apple’s Distributed Objects (DO) technology, which\
    \ uses exceptions in a much more liberal fashion than the rest of Cocoa. For example,\
    \ DO will raise exceptions to warn you if it loses a connection to the process\
    \ you’re connected to. Most of the predefined exception names defined by Cocoa,\
    \ in fact, are specifically for DO’s use. We’re not describing the use of DO in\
    \ this book, so we won’t say anything more about these exceptions, but it’s good\
    \ to be aware of in case you go down that path at some point."
  raw: '### NSRangeException


    The previous exceptions have been cleared up, but look what happens now:


    `2009-09-16 23:44:33.038 ExceptionCity[8881:10b] Total length of all name components:
    15`


    `2009-09-16 23:44:33.065 ExceptionCity[8881:10b] inserted all the objects I could!`


    `2009-09-16 23:44:33.066 ExceptionCity[8881:10b] found indexed item two`


    `2009-09-16 23:44:33.066 ExceptionCity[8881:10b] *** -[NSCFArray objectAtIndex:]:
    index`


    `(2137483647( or possibly larger)) beyond bounds (3)`


    `2013-02-10 23:57:55.575 ExceptionCity[71731:303] Total length of all name components:
    15`


    `2013-02-10 23:57:55.576 ExceptionCity[71731:303] inserted all the objects I could!`


    `2013-02-10 23:57:55.576 ExceptionCity[71731:303] found indexed item two`


    `(lldb)`


    We’ve halted once again, due to another exception. Just like before, click the
    `objc_exception_throw` line in the Debug Navigator, and examine the exception
    to find the problem.


    `(lldb) po $rax`


    `$0 = 4300330528 *** -[__NSArrayI objectAtIndex:]: index 9223372036854775807 beyond
    bounds [0 .. 2]`


    `(lldb) po [$rax name]`


    `$1 = 0x00007fff783e0a10 NSRangeException`


    Crikey! That’s one big index value. Now look at the call stack again, and click
    on the uppermost item within our code: `-[ECAppDelegate rangeException]`. This
    will highlight the following line in the text editor:


    `NSLog(@"found indexed item %@", array[indexOfFive]);`


    This line actually makes two calls: first to the `objectAtIndex:` method (implicit
    in the new Objective-C array accessor syntax that Apple includes starting with
    Xcode 4.5), then to the `NSLog` function. A glance at the call stack shows that
    the `objectAtIndex:` method is the one complaining. Apparently it doesn’t like
    the value contained in `indexOfFive`. If we look in the variable view, or type
    `p indexOfFive` (note the use of `p` for standard C types, as opposed to `po`
    for Objective-C objects), we’ll see `9223372036854775807`. That does seem a bit
    high! If we look at the code where it’s set, just two lines earlier, we’ll see
    this:


    `NSUInteger indexOfFive = [array indexOfObject:@"five"];`


    That line is asking `array` for the index of an object that it doesn’t actually
    contain. In this case, `NSArray` returns a special integer value called `NSNotFound`,
    which is defined to be the maximum possible integer value. On Mac OS X running
    in 64-bit mode, that turns out to be `9223372036854775807`. This value is used
    to tell the caller that, “Hey, that object you want the index of? I don’t have
    it.” This is pretty useful to know! A consequence of this is that whenever we
    get a value from `indexOfObject:`, we really have to check to make sure that it’s
    not `NSNotFound`. In our case we know exactly where the problem is, so we could
    just check that second time, but it’s good to make a habit of always checking
    that return value, so we’ll update the entire method like this:


    `- (void)rangeException {`


    `// Assuming we have an array of things...`


    `NSArray *array = @[@"one", @"two", @"three"];`


    `// ... we can ask for the index of an item...`


    `NSUInteger indexOfTwo = [array indexOfObject:@"two"];`


    `if (indexOfTwo != NSNotFound) {`


    `// ... and we can later retrieve that value using the same index.`


    `NSLog(@"found indexed item %@", array[indexOfTwo]);`


    `}`


    `// But, what if we try to find the index for something that''s not`


    `// there?`


    `NSUInteger indexOfFive = [array indexOfObject:@"five"];`


    `if (indexOfFive != NSNotFound) {`


    `// And we forget to check the return value to make sure it''s not`


    `// NSNotFound?`


    `NSLog(@"found indexed item %@", array[indexOfFive]);`


    `}`


    `}`


    Make those changes, run the app, and note the reward of the congratulatory alert
    panel. Oh, sweet success!


    Having tackled those, we’ve now experienced and fixed the main types of runtime
    exceptions that every Cocoa programmer gets at some point. That’s it! This may
    come as a surprise to people come from other, more exception-heavy environments,
    but like we said, in Cocoa exceptions are used sparingly and almost always to
    signal that the programmer has made an error. `NSRangeException` and `NSInvalidArgumentException`
    (for both of the causes shown above) really make up the bulk of all exceptions
    you’re likely to deal with.


    ### And the Rest


    Okay, there are more exceptions that can be raised in a Cocoa app. There are more
    predefined exception names in NSException.h, for example, but chances are you
    won’t encounter any of them. `NSGenericException` seems to arise sometimes when
    working with SQLite or Apple Events, and on rare occasions `NSInternalInconsistencyException`
    can rear its ugly head if you override a method that you shouldn’t (such as when
    the documentation warns you not to), but real-world examples of those are pretty
    hard to come by.


    The one instance where you’re likely to see any exceptions occur is if you’re
    using Apple’s Distributed Objects (DO) technology, which uses exceptions in a
    much more liberal fashion than the rest of Cocoa. For example, DO will raise exceptions
    to warn you if it loses a connection to the process you’re connected to. Most
    of the predefined exception names defined by Cocoa, in fact, are specifically
    for DO’s use. We’re not describing the use of DO in this book, so we won’t say
    anything more about these exceptions, but it’s good to be aware of in case you
    go down that path at some point.'
  trans: "\n### NSRangeException\n\n之前的异常已经处理完毕，但看看现在发生了什么：\n\n```\n2009-09-16 23:44:33.038\
    \ ExceptionCity[8881:10b] Total length of all name components: 15\n2009-09-16\
    \ 23:44:33.065 ExceptionCity[8881:10b] inserted all the objects I could!\n2009-09-16\
