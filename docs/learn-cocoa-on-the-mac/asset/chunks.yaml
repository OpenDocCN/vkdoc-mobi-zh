- fmt: "# Project Window Overview\n\nOur project window features a toolbar across\
    \ the top, which gives us ready access to a bunch of commonly used commands. Below\
    \ the toolbar, the window is divided into three main sections, or panes.\n\nThe\
    \ pane that runs down the left side of the window is called the Navigator area.\
    \ All of the resources that make up our project are grouped here, as are a number\
    \ of relevant project settings. Clicking the little triangle to the left of an\
    \ item expands that item to show any available subitems. Clicking the triangle\
    \ to the left of an expanded item will hide its subitems.\n\nThe right pane is\
    \ called the Utility area, and it shows detailed information about items selected\
    \ in the Navigator area. For a source code file, for example, this area shows\
    \ identity and type information, the full path to the file in the file system,\
    \ localization information, plus the build targets that use the selected file,\
    \ encoding information, and version control info. Other files show information\
    \ appropriate to the file type. Depending on the type of file selected in the\
    \ Navigator pane, there may be a row of small icons atop this area that allow\
    \ us to select several different views of information to be shown here. Below\
    \ the information pane is the Library. We’ll be exploring more here in a moment.\n\
    \nThe center pane is called the Editor pane. If we select a file in the Navigator\
    \ pane, and Xcode knows how to display or edit that kind of file, the contents\
    \ of the file will be displayed in the Editor pane. This is where we will be writing\
    \ and editing all of the application’s source code.\n\n> **Note**  \n> Many developers\
    \ like to get rid of the Utility area when they are working in the Editor in order\
    \ to have more screen space devoted to editing code; we can toggle the Utility\
    \ area by pressing ⌥⌘0.\n\nLet’s now look at the Project Navigator area on the\
    \ left side of the Xcode window. There are a number of folders and three files\
    \ that were created automatically for us. We’ll ignore the folders and the first\
    \ two files for the moment (we’ll revisit them later). The third file is named\
    \ `MainMenu.xib`.\n\nClick `MainMenu.xib`. The Editor pane will change to Interface\
    \ Builder mode, the editor specifically designed to edit `.xib` files (Figure\
    \ [2-5](#A978-1-4302-4543-8_2_Chapter.html#Fig5)). Prior to Xcode 4, Interface\
    \ Builder was a separate application, but it’s been merged into Xcode, and this\
    \ brings a lot of benefits in wiring up the user interface to the underlying code.\
    \ The file `MainMenu.xib` is known as a “nib file.” Huh? A nib file? Why not a\
    \ xib file? Well, for starters, “xib” is awfully hard to pronounce. But more importantly,\
    \ the term “nib” is a holdover from an earlier, simpler time. The precursors to\
    \ Cocoa and the modern Xcode development tools were developed by NeXT, Inc., a\
    \ company started by Steve Jobs in 1985. The name “nib” originally stood for NeXT\
    \ Interface Builder. Over time, NeXT was acquired by Apple, and the nib format\
    \ evolved into a newer, XML-based format. This combination of XML and Interface\
    \ Builder yielded the new `.xib` extension. Nonetheless, the name “nib file” stuck,\
    \ and most developers still call their xib files “nib files.”\n\n> **Warning**\
    \  \n> You’ll find the file `MainMenu.xib` in every Cocoa project you create in\
    \ Xcode. This is a special file. Treat it as such. Do not move, rename, or otherwise\
    \ annoy the file. Unless we tell you to. When your application gets launched,\
    \ it will automatically load the contents of `MainMenu.xib` into memory. `MainMenu.xib`\
    \ contains critical information, including your application’s menu bar and main\
    \ window (if it has one). Over time, you’ll learn all there is to know about nib\
    \ files and will be rolling your very own. For the moment, patience—and hands\
    \ off.\n\n## Exploring the Nib File\n\nInterface Builder mode offers a lot of\
    \ power, so let’s take a moment to see how things are laid out. The Interface\
    \ Builder Editor area looks like a piece of graph paper, with the menu bar of\
    \ our application across the top (Figure [2-5](#A978-1-4302-4543-8_2_Chapter.html#Fig5)).\
    \ Along the left, off the edge of the graph paper are a series of icons in a dock.\
    \ These are the objects that make up our Cocoa application’s user interface. Near\
    \ the bottom is a Play button that expands the dock into an outline mode where\
    \ we can get more info about these objects.\n\n![A978-1-4302-4543-8_2_Fig5_HTML.jpg](A978-1-4302-4543-8_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. `MainMenu.xib` ready for editing\n\nNote that the row of icons across\
    \ the top of the Utility area, along the right side of the Xcode window, has expanded\
    \ from two to eight; these objects are more configurable than files are. Each\
    \ of these icons represents a different mode for the Inspector. We’ll have more\
    \ to say about the different types of information on display here shortly. Underneath\
    \ this is the Library, with a row of four small icons that shift the view to different\
    \ types of items. Hovering our mouse over each icon will display a tooltip describing\
    \ the kind of items that each view shows. The Inspector is used to set parameters\
    \ on the objects that make up our user interface, and the Library is where we’ll\
    \ go to add new objects to lay out the interface.\n\nThe menu bar across the top\
    \ of the Editor is for our application, and changes here will be reflected in\
    \ the menu bar that appears when our application is launched. We can click the\
    \ menu headings, and they’ll open up to show the menu items underneath; we get\
    \ the Mac-standard File, Edit, Format, View, Window, and Help menus for free with\
    \ the new nib file, but we can add more and modify the defaults if necessary.\
    \ The icon in the dock area that looks like a pull-down menu (the fourth one down)\
    \ is the object that represents the main menu. In Figure [2-5](#A978-1-4302-4543-8_2_Chapter.html#Fig5),\
    \ it has a highlighted border to indicate that it’s selected.\n\nBelow the main\
    \ menu icon in the dock is an icon that looks like a window, which is in fact\
    \ what it is. The Cocoa Application project template we used to create this project\
    \ assumed that we would have at least one window in our application, and it created\
    \ that window for us. We’ll use this window to lay out the contents of the window\
    \ that will be displayed when our program is launched. Select the window icon\
    \ and our application’s new, empty, main window will appear on the graph paper.\n\
    \n### The Library\n\nThe Library pane in the lower right-hand corner acts as a\
    \ palette, a collection of objects we can use to build our application’s interface.\
    \ In Mountain Lion, there are 134 different object types to play with here. The\
    \ Library starts off showing a File Template Library, but there are four kinds\
    \ of resources that can be shown here: File Templates, Code Snippets, Objects,\
    \ and Media. All the user-interface elements that we’ll want to use are under\
    \ the Objects view. We scroll through the library looking for the item we want\
    \ to use, then drag that item into the appropriate Xcode pane. Select the icon\
    \ that represents the Object Library view, or press ^⌥⌘3. The screen should look\
    \ like Figure [2-6](#A978-1-4302-4543-8_2_Chapter.html#Fig6).\n\n![A978-1-4302-4543-8_2_Fig6_HTML.jpg](A978-1-4302-4543-8_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6. `MainMenu.xib` showing our new, empty window and the Object Library\n\
    \nTake a minute to scroll through the different UI objects in the library: buttons,\
    \ sliders, text fields, labels, browsers, even an OpenGL view!"
