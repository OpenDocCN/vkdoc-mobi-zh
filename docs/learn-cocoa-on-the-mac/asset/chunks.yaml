- fmt: "### Defining Your Constants\n\nAt this point, the GUI is completed, and the\
    \ relevant bindings are all configured so that the controls in the Preferences\
    \ window will all have their values saved in the user’s application preferences.\
    \ All that’s left is for us to write the action methods that will use `NSUserPreferences`\
    \ to retrieve the preferences values and display them. As mentioned, we’re stopping\
    \ short of actually using the values to generate game item descriptions, but feel\
    \ free to make that enhancement later on if you’d like.\n\nLet’s start off by\
    \ defining some constants, just like we’ve done in previous examples (if it’s\
    \ slipped your mind, see [Chapter 4](#A978-1-4302-4543-8_4_Chapter.html) for a\
    \ discussion of the benefits of doing this). Here are the constants to match all\
    \ the values we’ve already set in for the preferences’ key names in the nib file.\
    \ Insert these somewhere at the top of `DungeonThingAppDelegate.m`:\n\n```\n#define\
    \ kCharacterMaxNameLength @\"characterMaxNameLength\"\n#define kCharacterStatsGenerationPolicy\
    \ \\\n  @\"characterStatsGenerationPolicy\"\n#define kCharacterClassAllowedPaladin\
    \ @\"characterClassAllowedPaladin\"\n#define kCharacterClassAllowedBard @\"characterClassAllowedBard\"\
    \n#define kCharacterClassAllowedFighter @\"characterClassAllowedFighter\"\n#define\
    \ kCharacterClassAllowedCleric @\"characterClassAllowedCleric\"\n#define kCharacterClassAllowedRogue\
    \ @\"characterClassAllowedRogue\"\n#define kCharacterClassAllowedMonk @\"characterClassAllowedMonk\"\
    \n#define kCharacterClassAllowedMagicUser \\\n  @\"characterClassAllowedMagicUser\"\
    \n#define kCharacterClassAllowedThief @\"characterClassAllowedThief\"\n#define\
    \ kMonsterBootyFrequency @\"monsterBootyFrequency\"\n#define kMonsterTypeAllowedOrc\
    \ @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin @\"monsterTypeAllowedGoblin\"\
    \n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\n#define kMonsterTypeAllowedSkeleton\
    \ @\"monsterTypeAllowedSkeleton\"\n#define kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\
    \n#define kMonsterTypeAllowedVampire @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus\
    \ @\"monsterTypeAllowedSuccubus\"\n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\
    \n#define kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
    \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
    \n```\n\n> **Note:** In order to fit the confines of the book format while still\
    \ showing valid code, we’ve wrapped some of these lines by putting a backslash\
    \ as the very last character of a line, which makes the C preprocessor just tack\
    \ on the content of the next line as if it were all on the same line to begin\
    \ with. Feel free to omit this manual wrapping in your own code, making each of\
    \ those `#defines` into a one-line declaration.\n\n### Creating the Action Methods\n\
    \nNow we can start implementing our action methods. Let’s start with `createCharacter:`,\
    \ which will display a summary of all the preferences values related to character\
    \ creation. We start off by grabbing the shared instance of `NSUserDefaults`,\
    \ then we create an empty string to hold the summary text, and then we actually\
    \ create the summary, one preferences entry at a time. At the end, we put the\
    \ summary text into the relevant `NSTextField`. Note that at the beginning of\
    \ this method, we create an `NSMutableString` with a particular capacity, but\
    \ this is not an upper size limit; `NSMutableString` is smart enough to “grow”\
    \ if necessary. The method looks like this:\n\n```\n- (IBAction)createCharacter:(id)sender\
    \ {\n    NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];\n    NSMutableString\
    \ *result = [NSMutableString stringWithCapacity:1024];\n    [result appendString:\n\
    \        @\"Generating a character within these parameters:\\n\"\n        \"-----------------\\\
    n\"];   // protip: split strings across lines like this!\n    [result appendFormat:\n\
    \        @\"Maximum name length: %ld\\n\",\n        [ud integerForKey:kCharacterMaxNameLength]];\n\
    \    [result appendFormat:\n        @\"Stats generation policy: %ld\\n\",\n  \
    \      [ud integerForKey:kCharacterStatsGenerationPolicy]];\n    [result appendFormat:\n\
    \        @\"Allows Paladin: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedPaladin]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Bard: %@\\\
    n\",\n        [ud boolForKey:kCharacterClassAllowedBard] ? @\"YES\" : @\"NO\"\
    ];\n    [result appendFormat:\n        @\"Allows Fighter: %@\\n\",\n        [ud\
    \ boolForKey:kCharacterClassAllowedFighter] ? @\"YES\" : @\"NO\"];\n    [result\
    \ appendFormat:\n        @\"Allows Cleric: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedCleric]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Rogue:\
    \ %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedRogue] ? @\"YES\" : @\"\
    NO\"];\n    [result appendFormat:\n        @\"Allows Monk: %@\\n\",\n        [ud\
    \ boolForKey:kCharacterClassAllowedMonk] ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n\
    \        @\"Allows Magic-User: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedMagicUser]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Thief:\
    \ %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedThief] ? @\"YES\" : @\"\
    NO\"];\n    [self.characterLabel setStringValue:result];\n}\n```\n\nAfter entering\
    \ that code, try compiling and running the application. If all goes well, we should\
    \ be able to see the main window, press the **Generate Character** button, and\
    \ see a result something like Figure 7-10.\n\n![Figure 7-10: The first run of\
    \ DungeonThing](A978-1-4302-4543-8_7_Fig10_HTML.jpg)\n\nThe next step is to open\
    \ the Preferences window, and start making some changes in the **Character Generation**\
    \ tab. Disable some checkboxes, drag the slider, etc. After each change, click\
    \ the **Generate Character** button in the main window again, and the displayed\
    \ parameters should change to reflect the contents of the Preferences window.\n\
    \nNow that that’s working, let’s fill in the method bodies for `createMonster:`\
    \ and `createDungeon:` as shown below. These methods both work just like the `createCharacter:`\
    \ method already shown.\n\n```\n- (IBAction)createMonster:(id)sender {\n    NSUserDefaults\
    \ *ud = [NSUserDefaults standardUserDefaults];\n    NSMutableString *result =\
    \ [NSMutableString stringWithCapacity:1024];\n    [result appendString:@\"Generating\
    \ a monster within these parameters:\\n-----------------\\n\"];\n    [result appendFormat:\n\
    \        @\"Booty frequency: %ld\\n\",\n        [ud integerForKey:kMonsterBootyFrequency]];\n\
    \    [result appendFormat:\n        @\"Allows Orc: %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedOrc]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Goblin:\
    \ %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedGoblin] ? @\"YES\" : @\"\
    NO\"];\n    [result appendFormat:\n        @\"Allows Ogre: %@\\n\",\n        [ud\
    \ boolForKey:kMonsterTypeAllowedOgre] ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n\
    \        @\"Allows Skeleton: %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedSkeleton]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Troll:\
    \ %@\\n\",\n        [ud boolForKey:kMonsterTypeAllowedTroll] ? @\"YES\" : @\"\
    NO\"];\n}\n```"
  raw: '#### Defining Your Constants


    At this point, the GUI is completed, and the relevant bindings are all configured
    so that the controls in the Preferences window will all have their values saved
    in the user’s application preferences. All that’s left is for us to write the
    action methods that will use `NSUserPreferences` to retrieve the preferences values
    and display them. As mentioned, we’re stopping short of actually using the values
    to generate game item descriptions, but feel free to make that enhancement later
    on if you’d like.


    Let’s start off by defining some constants, just like we’ve done in previous examples
    (if it’s slipped your mind, see [Chapter 4](#A978-1-4302-4543-8_4_Chapter.html)
    for a discussion of the benefits of doing this). Here are the constants to match
    all the values we’ve already set in for the preferences’ key names in the nib
    file. Insert these somewhere at the top of `DungeonThingAppDelegate.m`:


    `#define kCharacterMaxNameLength @"characterMaxNameLength"`


    `#define kCharacterStatsGenerationPolicy \`


      `@"characterStatsGenerationPolicy"`


    `#define kCharacterClassAllowedPaladin @"characterClassAllowedPaladin"`


    `#define kCharacterClassAllowedBard @"characterClassAllowedBard"`


    `#define kCharacterClassAllowedFighter @"characterClassAllowedFighter"`


    `#define kCharacterClassAllowedCleric @"characterClassAllowedCleric"`


    `#define kCharacterClassAllowedRogue @"characterClassAllowedRogue"`


    `#define kCharacterClassAllowedMonk @"characterClassAllowedMonk"`


