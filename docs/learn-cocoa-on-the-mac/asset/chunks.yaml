    ## Wrap Up


    This chapter contained a simple demonstration of how to maintain a list of items,
    display them in a table view, and edit the details for the selected item in a
    separate set of controls. We learned a bit about how `NSTableView` uses its `dataSource`
    to access items for display and editing, and saw how it informs its delegate when
    the selection changes, allowing us to manually update the content in views that
    are dependent on the table view’s selection.


    If you’re familiar with other desktop GUI development environments, some of this
    may have seemed a bit foreign to you, but we hope you can see some of the advantages
    included in the approach that Cocoa supports, such as providing a clean division
    between code and GUI layout. However, at this point it’s time for a confession:
    the way we’ve been doing things thus far isn’t necessarily the best way to do
    these sorts of things in Cocoa. As simple as it’s all been so far, we’ve actually
    been showing you the hard way to solve some of these problems! During the past
    few years, a new approach to GUI programming has taken root in the Cocoa community,
    and it’s becoming more prevalent all the time. It’s a technology called Cocoa
    bindings, and it’s the topic of [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html).'
  trans: '

    ### 在表格视图中编辑


    用户应能编辑反派的名字，或将新头像拖入表格视图的任意一行，并更新相应的反派。由于表格视图的列是 `NSViews`，表格视图中的每个单元格都可以在 Interface
    Builder 中指定目标和动作；表格视图内的用户界面元素与其他视图的工作方式完全相同。当用户在表格视图内编辑某个值时，该动作可以连接回我们的代码，以通知我们这一更改。我们受到的限制是目标必须是表格视图的委托，但对于这个应用来说，这并不是问题。此外，我们现有的
    `takeName:` 和 `takeMugshot:` 方法也可以使用，但它们需要做一些小改动。这些方法作用于选中的反派，但用户若不选中行（即选中反派）就无法编辑表格视图内的值。然而，这些方法目前预期只能从详情视图中的控件调用，但现在我们要添加从多个位置设置它的能力。对于这个应用，我们只允许在行内编辑名字和头像，并禁止编辑最后出现日期。


    还有另一个小障碍需要解决。默认情况下，表格视图单元格是不可编辑的。在 Xcode 中可以轻松更改这一点。


    要进行连接，我们需要按住 Control 键，从每列中的视图拖出一条连接线到 `VillainTrackerAppDelegate` 实例。但是，表格视图单元格嵌套在窗口视图层次结构中的位置很深，因此我们将采用另一种方式来建立连接，以便更轻松地找到正确的用户界面组件。


    回到 Xcode，打开 `MainMenu.xib` 文件，它会在 Interface Builder 画布中打开。点击屏幕左下角的小展开三角形，它会将屏幕左侧的对象停靠栏展开为窗口视图层次结构的轮廓图。同时，打开
    Utility 区域中的属性检查器。


    在下钻到轮廓图中，找到名称列的文本字段；从外到内，路径是：窗口 – Villain Tracker ➤ 视图 ➤ 滚动视图 – 表格视图 ➤ 表格视图 ➤
    表格列 – 名称 ➤ 表格单元格视图 ➤ 静态文本 – 表格视图单元格 ➤ 文本字段单元格 – 表格视图单元格。在下钻时，您还会在编辑器画布上方的跳转栏中看到这条路径。点击“文本字段单元格
    – 表格视图单元格”，然后按住 Control 键拖拽到停靠栏中更靠下的 Villain Tracker App Delegate 实例，如图 6-10 所示。当
    Utility 窗口出现时，从动作列表中选择 `takeName:`。在继续之前，查看属性检查器（也如图 6-10 所示）。那里有一个标有“行为”(Behavior)
    的弹出菜单，当前值为“无”(None)。选择它并将其更改为“可编辑”(Editable)。


    ![A978-1-4302-4543-8_6_Fig10_HTML.jpg](img/A978-1-4302-4543-8_6_Fig10_HTML.jpg)


    图 6-10. 使用停靠栏进行 Control-拖拽


    最后，对图像井执行相同的操作。图像井的路径是：窗口 – Villain Tracker ➤ 视图 ➤ 滚动视图 – 表格视图 ➤ 表格视图 ➤ 表格列 –
    Mugshot ➤ 图像井 (Image Well) ➤ 图像单元格 (Image Cell)。按住 Control 键从“图像井”行（不是“图像单元格”行，而是其上一行）向下拖拽到
    Villain Tracker App Delegate，然后选择 `takeMugshot:`。要使图像井可编辑，属性检查器顶部附近有一个复选框。如果您愿意，还可以启用“动画”(Animates)。如果您的反派头像包含动画信息或多个帧，例如来自反派
    MySpace 页面的动画 GIF，那么这将在显示时播放动画。


    如前所述，`takeName:` 和 `takeMugshot:` 方法都期望从详情视图中执行更新的控件调用。之前，我们在每个方法的末尾添加了对 `[villainsTableView
    reloadData]` 的调用。现在我们需要在该调用之后添加另一个调用。在 `takeName:` 和 `takeMugshot:` 中，在末尾添加对 `[self
    updateDetailViews]` 的调用。这确保了无论用户在何处进行编辑（在表格视图中还是在详情视图中），更改都会在两个地方反映出来。


    是时候编译并再次运行应用，看看我们是否能在表格视图中编辑了。此时，我们应该能够添加一个新的反派、编辑其属性，然后删除他们。我们仍然无法保存任何关于反派的信息；这将是下一章的主题。


    ### 总结


    本章提供了一个简单演示，展示了如何维护一个项目列表，在表格视图中显示它们，并在另一组独立的控件中编辑所选项目的详细信息。我们了解了一些关于 `NSTableView`
    如何使用其 `dataSource` 来访问项目以进行显示和编辑的知识，并看到了当选择发生更改时，它如何通知其委托，从而允许我们手动更新依赖于表格视图选择的视图中的内容。


    如果您熟悉其他桌面 GUI 开发环境，其中一些内容可能对您来说有点陌生，但我们希望您能看到 Cocoa 所支持方法中的一些优势，例如在代码和 GUI 布局之间提供清晰的划分。然而，现在是时候承认了：我们迄今为止所采用的方式不一定是
    Cocoa 中处理这类事情的最佳方式。尽管到目前为止一切都很简单，但我们实际上一直在向您展示解决某些问题的困难方法！在过去的几年里，一种新的 GUI 编程方法在
    Cocoa 社区中扎根，并且变得越来越普遍。这项技术称为 Cocoa 绑定，它是第 7 章的主题。

    '
- fmt: '# 7. Cocoa Bindings


    ## Abstract


    Chapters 5 and 6 covered how to connect a controller object to various kinds of
    view objects, both to display values and to retrieve new values in response to
    user actions. In our examples, we typically had one small action method for each
    view (triggered when the user edited the value displayed in the view), plus one
    large `updateDetailViews` method that updated the contents of all the views at
    once (called whenever the selection changed). That’s fine for a simple project,
    but there are some problems with that approach. First of all, there’s a scalability
    issue. Imagine having not ten but a hundred views. Following this approach, we’d
    end up with a controller having a hundred small action methods and one huge method
    to push values into all of the views!


    Plus, we really have some tight coupling between our controller and its associated
    views. For example, what if we start off with an `NSDatePicker` for displaying
    and editing a date, but later decide we want to use an `NSTextField`? Besides
    modifying the GUI, we’d also have to change the outlet, the corresponding action
    method, and the `updateDetailViews` method.


    Fortunately for us, Apple recognized this problem some time ago, and since Mac
    OS X 10.3 it has included a technology called Cocoa bindings that solves many
    of these problems. Cocoa bindings lets us use Interface Builder to configure a
    view so that it retrieves its value and passes changes back to a model object
    more or less automatically. All we do is tell it which controller object to deal
    with and which string it should use as a key for getting and setting a value.
    We can access model objects through our own controller classes or by using generic
    controller classes provided in Cocoa.


    This results in an architecture where our own controller class often doesn’t need
    to know anything specific about any of the view objects in use. We don’t need
    to have instance variables pointing at them, and we don’t need to implement action
    methods to get their input! Our controller ends up as little more than a simple
    channel between a model object and a bunch of view objects, and from the controller’s
    point of view it doesn’t make a difference if there are ten views or a hundred.


    In this chapter, we’ll learn how to use Cocoa bindings with simple controls such
    as checkboxes, sliders, and text fields, as well as with complex controls such
    as table views. We’ll create bindings that connect to model objects through a
    couple of Apple’s included controller classes. We’ll also get an introduction
    to using `NSUserDefaults` and its bindings-ready friend `NSUserDefaultsController`
    to deal with preferences in our application.


    ## Binding to Simple Controls


    The example application for this chapter is something that could be used by a
    Game Master in a role-playing game to randomly create characters, monsters, and
    dungeons. The main window will contain buttons that create random game objects
    when the user clicks them and text fields to display the result. We’ll also make
    a Preferences window where the user can specify some parameters for the creation
    of the game objects. We won’t do the actual “rolling” of these random objects.
    We’ll just display a summary of the parameters used each time the user clicks
    one of the buttons. The random game object creation is a bit too far afield for
    this book, but it could be a fun exercise for the reader if you are so inclined!


    ### Adding a Tab View


    We’re going to split up the application preferences into three different groups,
    one for each of the three game objects the user can create. We’ll separate the
    groups by placing the controls in an `NSTabView`, which lets the user switch between
    different views by selecting from a list of tabs along the top. In the Object
    Library pane, type in “tab,” then drag the resulting Tab view into our empty window.
    Resize it so that it nearly fills the window (as shown in Figure [7-1](#A978-1-4302-4543-8_7_Chapter.html#Fig1)),
    leaving the standard margin that the blue lines will happily show us.


    ![A978-1-4302-4543-8_7_Fig1_HTML.jpg](A978-1-4302-4543-8_7_Fig1_HTML.jpg)


    **Figure 7-1.** The preferences window for DungeonThing looks like this after
    adding and naming the tabs


    When we drag out a new tab view from the Object Library, by default it has two
    tabs, but we want ours to have three. Click the Tab view, and open the Attributes
    Inspector (⌥⌘4). Note the Tabs field. Click the tiny up-arrow to change its value
    from 2 to 3, and see three tabs. Double-click the title of each tab, and change
    their titles to “Character Generation,” “Monster Generation,” and “Dungeon Generation,”
    respectively. Figure [7-1](#A978-1-4302-4543-8_7_Chapter.html#Fig1) shows what
    the window should look like at this point.


    ### Binding to NSUserDefaultsController


    At this point, we have all these GUI controls in a window, but we have no outlets
    to connect to them and no action methods for them to call when the user clicks
    on them. So, now what? Now it’s time to create our first bindings! We’re going
    to use a class called `NSUserDefaultsController`, which is a bindings-ready generic
    controller class that is included in Cocoa. A bindings-ready controller like this
    lets us bind view objects to an underlying model object right within Interface
    Builder. One nice thing about this class is that it maintains its own storage
    in the form of `NSUserDefaults`, which is the standard class used in Cocoa applications
    for saving and retrieving a user’s application preferences. This will let us bind
    each view object’s value to a uniquely keyed value in the application’s preferences.
    These preferences are automatically saved before a user exits the application
    and reloaded the next time the user launches the application.'
  raw: '# 7. Cocoa Bindings


    Abstract


    Chapters 5 and 6 covered how to connect a controller object to various kinds of
    view objects, both to display values and to retrieve new values in response to
    user actions. In our examples, we typically had one small action method for each
    view (triggered when the user edited the value displayed in the view), plus one
    large `updateDetailViews` method that updated the contents of all the views at
    once (called whenever the selection changed). That’s fine for a simple project,
    but there are some problems with that approach. First of all, there’s a scalability
    issue. Imagine having not ten but a hundred views. Following this approach, we’d
    end up with a controller having a hundred small action methods and one huge method
    to push values into all of the views!


    Chapters 5 and 6 covered how to connect a controller object to various kinds of
    view objects, both to display values and to retrieve new values in response to
    user actions. In our examples, we typically had one small action method for each
    view (triggered when the user edited the value displayed in the view), plus one
    large `updateDetailViews` method that updated the contents of all the views at
    once (called whenever the selection changed). That’s fine for a simple project,
    but there are some problems with that approach. First of all, there’s a scalability
    issue. Imagine having not ten but a hundred views. Following this approach, we’d
    end up with a controller having a hundred small action methods and one huge method
    to push values into all of the views!


    Plus, we really have some tight coupling between our controller and its associated
    views. For example, what if we start off with an `NSDatePicker` for displaying
    and editing a date, but later decide we want to use an `NSTextField`? Besides
    modifying the GUI, we’d also have to change the outlet, the corresponding action
    method, and the `updateDetailViews` method.


    Fortunately for us, Apple recognized this problem some time ago, and since Mac
    OS X 10.3 it has included a technology called Cocoa bindings that solves many
    of these problems. Cocoa bindings lets us use Interface Builder to configure a
    view so that it retrieves its value and passes changes back to a model object
    more or less automatically. All we do is tell it which controller object to deal
    with and which string it should use as a key for getting and setting a value.
    We can access model objects through our own controller classes or by using generic
    controller classes provided in Cocoa.


    This results in an architecture where our own controller class often doesn’t need
    to know anything specific about any of the view objects in use. We don’t need
    to have instance variables pointing at them, and we don’t need to implement action
    methods to get their input! Our controller ends up as little more than a simple
    channel between a model object and a bunch of view objects, and from the controller’s
    point of view it doesn’t make a difference if there are ten views or a hundred.


    In this chapter, we’ll learn how to use Cocoa bindings with simple controls such
    as checkboxes, sliders, and text fields, as well as with complex controls such
    as table views. We’ll create bindings that connect to model objects through a
    couple of Apple’s included controller classes. We’ll also get an introduction
    to using `NSUserDefaults` and its bindings-ready friend `NSUserDefaultsController`
    to deal with preferences in our application.


