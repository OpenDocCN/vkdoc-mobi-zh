    \ 的文档架构负责处理实例化文档和文档控制器、加载 nib 文件、使用保存面板等细节。所有这些功能都可以由开发者进行增强（例如，我们可以通过多种方式自定义文档的保存过程），但即便只使用开箱即用的基本功能，我们也能完成很多工作。\n\
