  trans: '

    ### 输出口（Outlets）


    输出口是使用特殊关键字 `IBOutlet` 声明的 Objective-C 实例变量。输出口本质上只是一个可以链接到用户界面中某个对象的对象指针。由于 Cocoa
    对象是 Objective-C 对象，因此它们拥有实例变量和方法。`IBOutlet` 关键字向 Xcode 的 Interface Builder 指明哪些实例变量是用于构建用户界面的。


    ### 动作（Actions）


    动作是可直接从应用程序用户界面调用的 Objective-C 方法。它们与我们编写过的其他 Objective-C 方法一样，是普通方法，但会在用户界面控件被使用时执行。例如，如果我们将一个按钮链接到某个动作方法，那么每当该按钮被点击时，动作方法中的代码就会被触发。如果我们将一个文本字段链接到某个动作，那么每当用户通过按
    Tab 键离开该文本字段或切换到其他控件时，其动作方法就会被触发。具体触发方法的条件取决于链接对象的类型，有时还取决于该对象属性的设置方式。例如，一个滑块可能仅在用户释放鼠标按钮后触发一次动作方法，也可能在滑块被拖动时反复触发该方法——具体取决于我们在
    Interface Builder 中如何配置滑块实例。本章中我们将尝试这两种操作模式。


    动作的创建方式与其他 Objective-C 方法完全相同，但必须使用特殊返回类型 `IBAction` 进行声明。动作必须接受一个参数（通常声明为 `id`
    类型）。该参数用于告知方法是哪个界面控件调用了它。


    ## 输出口与动作的实际应用


    理论部分已经足够，现在让我们通过编写另一个 Cocoa 应用程序来动手实践。设置新项目的步骤与上一章相同，因此这应该会让你感到熟悉。如果你尚未打开 Xcode，请将其重新打开。现在，按下
    `⇧⌘N` 或从“文件”菜单选择“新建项目”。再次选择“Cocoa 应用程序”模板。确保“Core Data”和“基于文档的应用程序”复选框处于关闭状态，“使用自动引用计数”复选框处于打开状态，然后根据提示输入项目名称“Chapter3”（见图
    3-1）。在本示例中，我们使用“Book”作为类前缀设置。


    ![A978-1-4302-4543-8_3_Fig1_HTML.jpg](img/A978-1-4302-4543-8_3_Fig1_HTML.jpg)


    图 3-1. 在 Xcode 中为新 Cocoa 应用程序设置初始属性


    Xcode 将为您生成一个名为 `BookAppDelegate` 的应用程序委托类，以及一个 `MainMenu.xib` 文件，并停留在项目设置视图（图
    3-2）。


    ![A978-1-4302-4543-8_3_Fig2_HTML.jpg](img/A978-1-4302-4543-8_3_Fig2_HTML.jpg)


    图 3-2. 配置项目设置


    我们的所有工作都将在 `MainMenu.xib` 文件中进行，因此请在窗口左侧的导航器区域中单击该文件，它便会在 Interface Builder 模式下打开（图
    3-3）。如果双击，它会在新窗口中打开，这不是我们想要的。如果发生这种情况，请关闭新窗口并再次单击 `MainMenu.xib`。


    ![A978-1-4302-4543-8_3_Fig3_HTML.jpg](img/A978-1-4302-4543-8_3_Fig3_HTML.jpg)


    图 3-3. Xcode 中的 Interface Builder 模式


    单击 Interface Builder 编辑器窗格左侧的“主窗口”图标。这将打开一个名为“Chapter3”的空白窗口。由于本章不需要导航器区域，请通过单击“视图”组中最左侧的图标将其隐藏。这可以提供更多的屏幕工作空间，并减少一些干扰。我们可以随时通过单击工具栏“视图”部分最左侧的图标来恢复显示导航器。


    我们将重点关注右侧的“实用工具”区域。首先，查看 Xcode 窗口右侧底部的“对象库”窗格。滚动对象列表找到“标签”（它大约在列表顶部向下第十几个位置）。在对象库中单击“标签”，然后将其拖拽到窗口的左上角。当我们靠近左上角时，会出现蓝色对齐线，松开鼠标按钮后标签就会吸附到该位置（图
    3-4）。


    ![A978-1-4302-4543-8_3_Fig4_HTML.jpg](img/A978-1-4302-4543-8_3_Fig4_HTML.jpg)


    图 3-4. 向 第 3 章 窗口添加标签


    按下 `⌥⌘4` 或单击“实用工具”区域顶部的相应按钮，将检查器窗格切换为“属性检查器”。然后，双击我们刚刚拖拽的标签，它应该会变为可编辑状态。将标签的文本修改为“神奇数字是：”（图
    3-5）。


    ![A978-1-4302-4543-8_3_Fig5_HTML.jpg](img/A978-1-4302-4543-8_3_Fig5_HTML.jpg)


    图 3-5. 编辑标签文本

