      `NSFont *oldFont = [self.title font];`


      `NSFont *newFont = [sender convertFont:oldFont];`


      `[self.title setFont:newFont];`


    `}`


    这与颜色面板的使用模式相同。当用户点击字体时，字体面板使用响应者链寻找实现了`changeFont:`动作方法的对象，并成功在我们的应用委托中找到了它。这里的情况稍微复杂一些，因为在两个方法中我们都使用了`NSFontManager`类的共享实例。运行中应用关于选定或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它来间接告诉`NSFontPanel`应开始显示哪种字体，然后在`changeFont:`中再次使用它来获取新选定的字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态相结合（例如，如果旧字体是
    Lucida Grande/Bold/36，而用户选择了 Times New Roman 并保持其他设置不变，转换后的字体将是 Times New Roman/Bold/36）。


    现在，保存工作，回到 Xcode，并点击运行。我们现在可以同时更改显示文本的颜色和字体（见图 11-4）。


    ![A978-1-4302-4543-8_11_Fig4_HTML.jpg](img/A978-1-4302-4543-8_11_Fig4_HTML.jpg)


    **图 11-4.** 设置标签的颜色和字体


    ## 拥有独立 Nib 的控制器


    接下来，我们将演示一个在 Cocoa 开发中常见的简单模式：创建一个加载自己 nib 文件的控制器类，成为文件中所有对象的“所有者”。到目前为止，我们创建的所有应用程序中，所有
    GUI 元素都包含在应用的单个`.xib`文件中。这对于简单应用来说效果不错，但有其局限性。首先，我们在 nib 中只有每个窗口和每个控制器的一个实例。其次，整个主
    nib 文件在应用程序启动时一次性加载，而 nib 中的内容越多，启动阶段的速度就会越慢，占用的内存也越多。诚然，在现代拥有数 GB RAM 的计算机上，这可能不是什么大问题，但作为程序员，始终不浪费
    CPU 和 RAM 是个好习惯。最后，将过多的顶层对象（窗口、控制器等）放入一个 nib 文件中，会让程序员（你）的工作更加困难，因为很难看出哪些控制器和窗口属于同一组。


    这两个问题的解决方案是将一些 GUI 对象分发到其他 nib 文件中，并通过加载这些 nib 的控制器类来管理它们的使用。许多 Cocoa 应用都使用了这种技术，通常将偏好设置、文档、工具等窗口拆分到独立的
    nib 文件中。接下来的章节将以递增的复杂度演示两种实现此目的的不同方法。

    '
- fmt: '### Loading a Nib With `NSWindowController`


    The first and easiest way is to use Cocoa’s `NSWindowController` class to load
    the nib file and be its owner. We’ll add a button to our main window to trigger
    loading a new nib file and an `NSMutableArray` to our `WLAppDelegate` to hold
    onto references to the newly-loaded nibs. Without something to hold a reference
    to the newly-loaded nib, the ARC system will cause them to be freed immediately.


    Start by opening up the `WLAppDelegate.h` file, and add the following property
    (given in bold):


    ```

    @interface WLAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *title;

    @property (strong) NSMutableArray *subWindows;

    ```


    Then add this line to the `applicationDidFinishLaunching:` method in the `.m`
    file:


    ```

    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification


    {


    self.subWindows = [[NSMutableArray alloc] init];


    }

    ```


    Next, open up the `MainMenu.xib` file, and add a new button to the main window
    below the two that are already there. Label it “Load Easy Window.” Open up an
    Assistant Editor pane (if there isn’t one already open) and open the `WLAppDelegate.h`
    file there. Control-drag out from the new button to the `.h` file, and add a new
    action called `loadEasyWindow`. Then, fill out the stub in the `.m` file for `WLAppDelegate`
    with the following implementation:


    ```

    - (IBAction)loadEasyWindow:(id)sender


    {


    NSWindowController *easyController = [[NSWindowController alloc]

    initWithWindowNibName:@"EasyWindow"];


    // need to hold onto a reference to this object.

    [self.subWindows addObject:easyController];

    [easyController window];


    }

    ```


    In that method, we first initialize a new controller, telling it the name of the
    nib file to use. Then, we store a reference to that controller in the `subWindows
    NSMutableArray` that we created in the `applicationDidFinishLaunching:` method,
    so that the new controller doesn’t get released at the end of the method. If we
    didn’t keep a reference to it, it would be released when it went out of scope
    and the newly-loaded nib file would get released along with it. Of course, in
    a real application, we’d need to have a mechanism to remove objects from this
    list as appropriate, but we’ll ignore that for the moment. Then we call its `window`
    method, which is what actually loads the nib file and displays the window. Of
    course, we haven’t created the EasyWindow nib file yet, so we’ll do that now.


    Make a brand new nib file in Xcode by selecting File ➤ New ➤ New File. Select
    User Interface under OS X in the template chooser, and then choose the Window
    template, which contains a single `NSWindow` ready for us to use. Give the new
    file the name EasyWindow, and select the WindowLab folder under the Group pop-up
    menu. The Group pop-up menu will show five items, the top three of which are WindowLab
    with an Xcode Project icon, WindowLab with a Folder icon, and Supporting Files
    with a Folder icon. These correspond to the file groups in the Xcode Navigator
    area. Select the WindowLab entry with the folder icon, and click Create.


    Our newly-created xib file will show up as a new file in the Navigator area in
    Xcode, so open the file from there. Select the Window in the nib file, and open
    the Attributes Inspector. Give the window the title “Easy Window.”


    In previous chapters, every controller we’ve created has been added to a nib file
    as a top-level object, but when you’re loading a nib file yourself, you can specify
    an object to be its “owner,” which in Interface Builder is represented by the
    File’s Owner object in the main nib window. `NSWindowController`, our controller’s
    class, already sets itself up as the owner of the nib file when it loads the file,
    but we still have to manually configure that in Interface Builder so that we can
    make use of it. To do this, select the File’s Owner icon and open the Identity
    Inspector. At the top of this Inspector, we can set the class of the object that
    we want to be the file’s owner. By default it’s set to `NSObject`, but we’ll usually
    want it to be `NSWindowController` itself or a custom subclass of `NSWindowController`.
    For now, set its Custom Class to `NSWindowController`, as shown in Figure [11-5](#A978-1-4302-4543-8_11_Chapter.html#Fig5).
    Lastly, Control-drag from the File’s Owner icon to the window, and assign that
    to the `window` outlet of File’s Owner. We need to do this so that the `NSWindowController`
    knows which of potentially many `NSWindow` objects is the “main” window for the
    nib.


    ![A978-1-4302-4543-8_11_Fig5_HTML.jpg](A978-1-4302-4543-8_11_Fig5_HTML.jpg)


    Figure 11-5.


    Setting the class for File’s Owner


    Save and then click Run. The app’s new button will let us create new windows with
    each press of the button (see Figure [11-6](#A978-1-4302-4543-8_11_Chapter.html#Fig6)).


    ![A978-1-4302-4543-8_11_Fig6_HTML.jpg](A978-1-4302-4543-8_11_Fig6_HTML.jpg)


    Figure 11-6.


    Some easy windows


    Each time it’s actually creating a new `NSWindowController` instance, which loads
    a fresh copy of the nib file, including all objects inside of it. In this case
    all we have is a window, but you can put anything you like inside those nib files,
    including for example controller objects for accessing Core Data.'
