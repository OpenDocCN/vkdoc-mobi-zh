  trans: '

    # 创建项目及其数据模型


    首先在 Xcode 中创建一个新的 Core Data 项目，并将其命名为 `QuoteMonger`。然后编辑 `QuoteMonger.xcdatamodel`
    文件，添加两个名为 `Show` 和 `Quote` 的实体。我们在前两章中已经介绍过这些步骤，如果遇到困难，请翻阅前面几页复习。


    为 `Show` 设置一个名为 `name` 的属性，类型为 `String`。取消勾选"可选"复选框，然后勾选"索引"复选框。接着为 `Quote` 添加两个
    `String` 类型的属性：`quoteText` 和 `character`。对这两个属性都勾选"索引"复选框，但仅对 `quoteText` 取消勾选"可选"复选框，`character`
    则保留勾选（因为可以想象，有时你无法完全记住或确定某句话是谁说的，但仍想将其作为引文存储）。


    最后，从 `Show` 到 `Quote` 建立一对多关系（请记住，这意味着需要设置两个关系——一个是 `Show` 到 `Quote` 的多向关系，名为
    `quotes`；另一个是 `Quote` 到 `Show` 的单向关系，名为 `show`——并将它们配置为互逆关系）。最终的数据模型应类似图 10-2
    所示。


    ![A978-1-4302-4543-8_10_Fig2_HTML.jpg](img/A978-1-4302-4543-8_10_Fig2_HTML.jpg)


    图 10-2. QuoteMonger 的数据模型


    # 数据录入窗口


    数据模型就绪后，是时候开始构建图形用户界面了。本章主要介绍的"搜索窗口"是其中的亮点。但在有数据可供搜索之前，我们无法进行任何搜索，因此我们将从创建用于数据录入的
    GUI 部分开始。为此，我们将制作一个非常基础的 GUI——在单个窗口中显示节目和引文，并且仅显示与当前选中节目关联的引文。


    ## 分两部分的窗口


    在 Xcode 项目中双击 `MainMenu.xib`，在 Interface Builder 窗格中打开它。这会打开之前使用过的标准空白应用程序 Nib
    文件。在主 Nib 窗口中选择 `NSWindow` 实例，然后使用大小调整控件使其变高（大约为原始高度的两倍）。我们需要这个空间，因为将在此放置两组视图，一组用于
    `Show` 实体，另一组用于 `Quote` 实体。


    ## 显示节目


    首先从 `Show` 的视图开始。从对象库中拖出一个 `NSTableView`，将其放置在窗口顶部附近。调整其大小以占据大部分空间。这次不必担心蓝色参考线；实际上，使其比参考线建议的尺寸稍小。我们将把它与一些其他控件一起分组到一个方框中，因此尺寸问题暂时不关键。打开属性检查器，将表格视图设置为基于视图的，并带有一列。调整列本身以占据表格视图的宽度，并将列名称设置为"名称"。拖出一个按钮，将其放置在表格视图右下角的下方，并将其标签设置为"添加"。再拖出另一个相同类型的按钮，将其放置在"添加"按钮的左侧，并将其标签设置为"移除"。选中这三个控件，然后将它们分组到一个方框中（选择"编辑器"➤"嵌入到"➤"方框"）。将方框的标题设置为"节目"。现在，我们可以根据窗口调整方框的大小，然后调整方框内的表格视图，以获得令人满意的布局。


    现在我们已经有了一个列出节目的位置，需要将它们连接到 Core Data 模型，我们将使用 Cocoa 绑定和 `NSArrayController` 作为中间件。从对象库中拖出一个数组控制器，并将其标题设置为"Shows"。在属性检查器中，将"模式"弹出菜单设置为"实体名称"，然后在"实体名称"字段中输入"Show"，以将其连接到模型编辑器中的
    `Show` 实体。勾选"准备内容"复选框，这将指示数组控制器在启动时加载所有 `Shows`。切换到绑定检查器。将"托管对象上下文"（位于绑定列表底部）绑定到"App
    Delegate"，并将"模型键路径"设置为 `managedObjectContext`。


    对于绑定，我们从表格视图开始。选择表格视图，然后打开绑定检查器。展开"表格内容"下的"内容"部分，勾选"绑定到"旁边的复选框。弹出菜单应显示"Shows"。默认的控制器键
    `arrangedObjects` 正是我们需要的，且"模型键路径"无需填写。我们还需要数组控制器知道选中的行，因此将"选择索引"绑定到"Shows"，并在此将控制器键设置为
    `selectionIndexes`。然后，使用对象停靠栏，深入表格视图内的视图层次结构，找到"静态文本 - 表格视图单元格"。在属性检查器中，将"行为"更改为"可编辑"。然后，在绑定检查器中，将"值"绑定到"表格单元格视图"，并将其"模型键路径"设置为
    `objectValue.name`。


    至此，表格视图的部分就完成了。要完成窗口中与 `Shows` 相关的部分，我们需要连接按钮。这类似于上一章的做法——结合目标-动作来处理点击，以及使用 Cocoa
    绑定来适当启用或禁用按钮。我们先进行目标-动作设置。按住 Control 键从"添加"按钮拖拽到 Shows 数组控制器，然后选择 `add:` 作为接收的动作。对"移除"按钮重复相同操作，这次选择
    `remove:` 作为接收动作。再次选择"添加"按钮，转到绑定检查器。勾选"绑定到"复选框，将按钮连接到 Shows 控制器，并输入 `canAdd` 作为控制器键。对"移除"按钮重复操作，将其绑定到
    `canRemove` 控制器键。


    窗口应如图 10-3 所示。请注意实用工具区域中的"插座检查器"视图，它显示了数组控制器的绑定和目标-动作连接。当出现意料之外的问题时，这个视图对于故障排除非常有用！


    ![A978-1-4302-4543-8_10_Fig3_HTML.jpg](img/A978-1-4302-4543-8_10_Fig3_HTML.jpg)


    图 10-3. 数据录入窗口的部分布局

    '
- fmt: '#### Quoting Quotes


    Now we’re going to repeat most of that same setup below the Show box, for Quotes.
    As before, drag out a table view and two buttons, positioning them in the bottom
    half of the window and titling the buttons as done previously. For this table
    view, however, we’re going to leave it with two columns. Change it to view-based,
    as before, and check the checkbox labeled “Alternating Rows”, which will make
    the content somewhat easier to read. Title the left column “Quote Text” and the
    right column “Character,” and resize them to give the Quote Text column some more
    room. In the Quote Text column, double-click the “Table Cell View” text inside
    the column, and change it to “Quote”. Do the same thing to the “Table Cell View”
    text in the Character column, changing it to read “Character.” This will help
    us tell the two columns apart in just a moment. Group these three controls into
    a box, as before, and title the box “Quote.”


    This part of the window will also use an `NSArrayController`, but it’ll be configured
    a bit differently than the Shows array controller. Drag out a controller, and
    title it “Quotes.” In the Attributes Inspector, set its Mode to be Entity Name,
    and then set the Entity Name field to Quote (the same name as the entity that
    we defined in the Model Editor). Then, switch to the Bindings Inspector. By default,
    each array controller will fetch all objects for the corresponding entity. We’re
    going to change this one to only fetch quotes based on the selected Show. Open
    the Content Set binding, select “Shows” in the pop-up list, “selection” in the
    Controller Key combo box, and type in “quotes” in the Model Key Path combo box.
    Finally, press Return to turn on the binding. We also need to connect it to a
    managed object context, which is provided by the App Delegate. Bind the Managed
    Object Context (at the bottom of the bindings list) to App Delegate, and set the
    Model Key Path to `managedObjectContext`.


    Now we can bind this table view to the Quotes controller. Select the table view
    and then open the Bindings Inspector. Expand the Content section under Table Content,
    and check the checkbox next to Bind to. The pop-up menu should read “Quotes.”
    The default Controller Key of `arrangedObjects` is what we want. As before, the
    array controller should be told about the selected row, so bind the Selection
    Indexes binding to Quotes, and set the Controller Key here to `selectionIndexes`.


    To bind the two columns, drill down in the view hierarchy within the table view,
    using the object dock, down to the “Static Text – Quote” entry. In the Attributes
    Inspector, change the Behavior to Editable. Then, in the Bindings Inspector, bind
    the Value to the Table Cell View, and set its Model Key Path to `objectValue.quoteText`.
    Switch to the “Static Text – Character” entry in the object dock, change its Mode
    to Editable, and then bind it to the Table Cell View and set its Model Key Path
    to `objectValue.character`.


    Lastly, we need to wire up the buttons. From each of the buttons, control-drag
    out to the Quotes controller, setting the action to `add:` or `remove:` as appropriate.
    Bind the enabled binding of each button to the `canAdd` or `canRemove` Controller
    Key on the Quotes controller, as appropriate.


    The layout should be similar to that in Figure [10-4](#A978-1-4302-4543-8_10_Chapter.html#Fig4).


    ![A978-1-4302-4543-8_10_Fig4_HTML.jpg](A978-1-4302-4543-8_10_Fig4_HTML.jpg)


    Figure 10-4.


    Completed layout for the data entry window


    ### Entering Some Initial Quotes


    Save the changes and click Run. The app should start up and show the Data Entry
    window. Select the Add button below the upper table view to add a show, and double-click
    in the highlighted space in the table view to edit the show’s name. Do this a
    few times to create a few `Show` instances. Now, with one of the shows selected,
    add a quote in the lower table, editing the text and the names of any characters
    right into the table. If you add a quote that contains an exchange between two
    or more characters, enter the names of all involved characters in the Character
    field. When we later enable search based on character names, it will work with
    all the names you entered. Add a few more quotes, spread across a few different
    shows. Note that the list of quotes changes when you select a different show,
    and if you quit and restart QuoteMonger, you should see that everything you entered
    has been saved.


    If, on the other hand, nothing seems to work, check the debugger log in Xcode
    and see if the application raised an exception. Common problems are neglecting
    to set up the bindings for the Managed Object Context on the Array Controllers,
    or mistyping the name of a Controller Key or Model Key Path binding.'
