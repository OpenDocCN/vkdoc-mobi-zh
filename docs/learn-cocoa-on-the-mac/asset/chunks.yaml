    \        NSDate *endTime = [NSDate date];\n        NSLog(@\"完成时间为 %f 秒\",\n  \
    \            [endTime timeIntervalSinceDate:startTime]);\n        self.isWorking\
    \ = NO;\n    });\n}\n```\n\n### GCD 中的并发代码块\n\n我们还需要再做一处修改，才能使这个程序的行为与之前使用 `NSOperationQueue`\
    \ 的版本相同，且运行速度至少一样快。还记得吗？在设置队列中的操作时，我们通过使用依赖关系，让 `calculateFirstResult` 和 `calculateSecondResult`\
    \ 能同时运行？我们声明了它们各自都依赖于前面对 `processData` 的调用，而后续对 `finishWorking` 的调用又依赖于这两者。这样操作队列就能在可能的情况下同时运行这两个操作。而目前\
    \ GCD 版本的代码并非如此。代码会如同所示那样直接顺序执行，总是在 `calculateFirstResult:` 完成后才调用 `calculateSecondResult:`。\n\
    \n幸运的是，GCD 再次提供了实现相同功能的方法，即使用所谓的**调度组 (dispatch group)**。在组上下文中被异步调度的所有代码块都会尽快执行，如果可能，还会被分配到多个线程上并发执行。我们还可以使用\
    \ `dispatch_group_notify()` 来指定一个额外的代码块，该代码块会在组中所有代码块执行完毕后被调用。代码如下所示：\n\n```\n\
    - (IBAction)doWork:(id)sender {\n  NSDate *startTime = [NSDate date];\n  dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString\
    \ *processed = [self processData:fetchedData];\n    __block NSString *firstResult;\n\
    \    __block NSString *secondResult;\n    dispatch_group_t group = dispatch_group_create();\n\
    \    dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{\n      firstResult\
    \ = [self calculateFirstResult:processed];\n    });\n    dispatch_group_async(group,\
    \ dispatch_get_global_queue(0, 0), ^{\n      secondResult = [self calculateSecondResult:processed];\n\
    \    });\n    dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{\n\
    \      NSString *resultsSummary = [NSString stringWithFormat:\n        @\"结果一:\
    \ [%@]\\n 结果二: [%@]\", firstResult, secondResult];\n      dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n        [_resultsTextView setString:resultsSummary];\n      });\n      NSDate\
    \ *endTime = [NSDate date];\n      NSLog(@\"完成时间为 %f 秒\",\n        [endTime timeIntervalSinceDate:startTime]);\n\
    \    });\n  });\n}\n```\n\n完成所有这些修改后，我们应该可以运行应用并看到与第一轮改进后相同的行为和性能，但尚未包含使用 Cocoa\
    \ Bindings 在执行工作时改进 GUI 行为的那些额外变更。将那些修改应用到 GCD 增强版的 SlowWorker 应用，将作为练习留给读者完成。\n\
    \n## 一点并发，大有裨益\n\n现在我们看到了在应用中使用 `NSOperationQueue` 和 GCD 提供基本并发的具体示例。我们简单的示例项目并没有做什么有趣的事情，但这些技术可以应用于任何涉及耗时活动且不想让用户看到旋转的忙碌光标的情况。我们还学习了一些关于新代码块语法\
    \ (block syntax) 的知识，以及如何使用它来创建准备在后台线程中运行的工作单元。\n\n使用这些技术可以对你的应用的用户体验产生巨大影响，任何时候当你的用户等待应用处理某些事情时，你都应该使用它们！使用\
    \ `NSOperationQueue` 还是 GCD，由你来决定。请记住，自 OS X 10.6 起的每个版本中，`NSOperationQueue` 都是基于\
    \ GCD 实现的，因此无论采用哪种方式，你的应用都将具有相似的性能特性。具体选择哪一种，由你来决定。\n"
- fmt: "# 18. Future Paths\n\n## Abstract\n\nYou’ve now reached the final chapter\
    \ of *Learn Cocoa on the Mac*! Hopefully you now have a good feel for how Cocoa\
    \ works and how the various parts can be used to write all sorts of interesting\
    \ desktop applications. However, the Cocoa frameworks are really huge, and we’ve\
    \ only scratched the surface on most of the classes and concepts we’ve covered.\
    \ This book was never meant to be an encyclopedic Cocoa reference (you’ve already\
    \ got that on your computer, installed with Xcode), but rather a guide to help\
    \ you find your way. Continuing in that spirit, we’re going to wrap up the book\
    \ with an overview of additional techniques and resources that will help you take\
    \ your Cocoa development efforts above and beyond what we’ve covered so far.\n\
    \nWe’ll start off with a bit of expansion on a few design patterns that we’ve\
    \ mentioned but deserve a little more attention. We’ll also take a look at how\
    \ to use languages other than Objective-C to do Cocoa programming. Finally, we’ll\
    \ look at some ways take your hard-earned Cocoa skills and apply them to realms\
    \ other than just the Mac OS X desktop.\n\n## More Cocoa-isms\n\nWe’ve spent a\
    \ lot of time in this book dealing with the MVC pattern, which helps us partition\
    \ our application into logical layers, as well as the delegate pattern, which\
    \ lets us define the behavior of some GUI objects inside our controller layer,\
    \ instead of subclassing the GUI objects themselves. These techniques use language\
    \ features and conventions to define patterns of usage. Along those lines, Cocoa\
    \ has more tricks up its sleeve. One of them is the concept of notifications (referred\
    \ to as the observer pattern in some circles), which let an object notify a collection\
    \ of other objects when something happens. Another is the use of blocks to simplify\
    \ our code in spots where a full-blown delegate, or even a single method, might\
    \ be overkill. We’ve already seen blocks in use elsewhere in the book, but we’ll\
    \ touch on some other interesting uses here as well.\n\n### Notifications\n\n\
    Cocoa’s `NSNotification` and `NSNotificationCenter` classes provide a way to let\
    \ one object send a message to a bunch of other objects without any of the objects\
    \ needing to know anything about the others. All they really need to know is the\
    \ name of the notification, which can be anything we like. An object that wants\
    \ to be notified signs up as an observer of a particular notification name in\
    \ advance, and the object that wants to broadcast a notification uses that name\
    \ to send its message out to any observers that are listening.\n\nFor example,\
    \ let’s say we have several parts of our application that need to be updated whenever\
    \ a particular event occurs, such as a piece of networking code reading a response\
    \ from a web server. Using notifications, our networking code doesn’t need to\
    \ know about every other object that wants the information. Instead, we can define\
    \ a notification name for both the networking code and the observers to use, preferably\
    \ in a header file that can be included by all classes involved, like so:\n\n\
    ```\n#define DATA_RECEIVED @\"dataReceived\"\n```\n\nObservers can sign up to\
    \ receive notifications at any time, but typically this happens during an object’s\
    \ initialization.\n\n```\n- (id)init\n{\n    if ((self = [super init])) {\n  \
    \      [[NSNotificationCenter defaultCenter] addObserver:self\n              \
    \                                   selector:@selector(receiveNetworkData:)\n\
    \                                                     name:DATA_RECEIVED\n   \
    \                                                object:nil];\n    }\n    return\
    \ self;\n}\n```\n\nThis tells the application’s one and only instance of `NSNotificationCenter`\
    \ that it should notify the caller by calling its `receiveNetworkData:` method\
    \ whenever anyone posts a `DATA_RECEIVED` notification. Note the final parameter\
    \ where we’re passing a `nil`: if we instead specified an object there, that would\
    \ limit the notification-observing to only apply to that particular object. Any\
    \ other object posting the same notification wouldn’t have any effect. To make\
    \ this work, the observer also needs to implement the method it specified when\
    \ registering. This method always receives the `NSNotification` itself as a parameter.\n\
    \n```\n- (void)receiveNetworkData:(NSNotification *)notification\n{\n  NSLog(@\"\
    received notification: %@\", notification);\n}\n```\n\nFinally, any object that\
    \ sets itself up as observer should usually remove itself from the observer list\
    \ later on. A common idiom is to do something like the following in the `dealloc`\
    \ method of any class that ever registers as an observer:\n\n```\n- (void)dealloc\n\
    {\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n}\n```\n\n\
    Now, what about the notifier itself, in our case the network-reading object that’s\
    \ going to broadcast its status? That’s taken care of as simply as this:\n\n```\n\
    if (some condition is met) {\n    [[NSNotificationCenter defaultCenter]\n    \
    \    postNotificationName:DATA_RECEIVED\n                      object:self];\n\
    }\n```\n\nThe idea is that the notifier can fling out a notification like this,\
    \ and the notification center takes care of the actual delivery. The notifier\
    \ can also pass along additional information in the form of a dictionary that\
    \ can be retrieved by an observer, like this:\n\n```\n// in the notifier\nNSDictionary\
    \ *info = @{@\"data\" : someData};\n[[NSNotificationCenter defaultCenter]\n  \
    \  postNotificationName:DATA_RECEIVED\n                  object:self\n       \
    \         userInfo:info];\n\n// in the observer\nNSLog(@\"received data %@\",\
    \ [[notification userInfo] objectForKey:@\"data\"]);\n```\n\nNotifications can\
    \ be a really useful way to let separate parts of our application talk to each\
    \ other without using formal APIs. All we need to do is decide on some strings\
    \ to represent various events, and start observing and posting.\n\n### Blocks\n\
    \nChapters 11 and 17 introduced blocks, an addition to C that Apple came up with\
    \ a few years ago. We mostly used blocks with the concurrency features provided\
    \ by Grand Central Dispatch, where blocks fit in really well, but there are many\
    \ more uses for blocks. It seems that in each new major version of OS X, Apple\
    \ extends several Cocoa classes, adding new methods that take blocks as parameters.\
    \ Let’s take a look at some of them."
  raw: '# 18. Future Paths


    Abstract


    You’ve now reached the final chapter of Learn Cocoa on the Mac! Hopefully you
    now have a good feel for how Cocoa works and how the various parts can be used
    to write all sorts of interesting desktop applications. However, the Cocoa frameworks
    are really huge, and we’ve only scratched the surface on most of the classes and
    concepts we’ve covered. This book was never meant to be an encyclopedic Cocoa
    reference (you’ve already got that on your computer, installed with Xcode), but
    rather a guide to help you find your way. Continuing in that spirit, we’re going
    to wrap up the book with an overview of additional techniques and resources that
    will help you take your Cocoa development efforts above and beyond what we’ve
    covered so far.


    You’ve now reached the final chapter of Learn Cocoa on the Mac! Hopefully you
    now have a good feel for how Cocoa works and how the various parts can be used
    to write all sorts of interesting desktop applications. However, the Cocoa frameworks
    are really huge, and we’ve only scratched the surface on most of the classes and
    concepts we’ve covered. This book was never meant to be an encyclopedic Cocoa
    reference (you’ve already got that on your computer, installed with Xcode), but
    rather a guide to help you find your way. Continuing in that spirit, we’re going
    to wrap up the book with an overview of additional techniques and resources that
    will help you take your Cocoa development efforts above and beyond what we’ve
    covered so far.


    We’ll start off with a bit of expansion on a few design patterns that we’ve mentioned
    but deserve a little more attention. We’ll also take a look at how to use languages
    other than Objective-C to do Cocoa programming. Finally, we’ll look at some ways
    take your hard-earned Cocoa skills and apply them to realms other than just the
    Mac OS X desktop.


    ## More Cocoa-isms


    We’ve spent a lot of time in thisbook dealing with the MVC pattern, which helps
    us partition our application into logical layers, as well as the delegate pattern,
    which lets us define the behavior of some GUI objects inside our controller layer,
    instead of subclassing the GUI objects themselves. These techniques use language
    features and conventions to define patterns of usage. Along those lines, Cocoa
    has more tricks up its sleeve. One of them is the concept of notifications (referred
    to as the observer pattern in some circles), which let an object notify a collection
    of other objects when something happens. Another is the use of blocks to simplify
    our code in spots where a full-blown delegate, or even a single method, might
    be overkill. We’ve already seen blocks in use elsewhere in the book, but we’ll
    touch on some other interesting uses here as well.


    ### Notifications


    Cocoa’s `NSNotification` and `NSNotificationCenter` classes provide a way to let
    one object send a message to a bunch of other objects without any of the objects
    needing to know anything about the others. All they really need to know is the
    name of the notification, which can be anything we like. An object that wants
    to be notified signs up as an observer of a particular notification name in advance,
    and the object that wants to broadcast a notification uses that name to send its
    message out to any observers that are listening.


    For example, let’s say we have several parts of our application that need to be
    updated whenever a particular event occurs, such as a piece of networking code
    reading a response from a web server. Using notifications, our networking code
    doesn’t need to know about every other object that wants the information. Instead,
    we can define a notification name for both the networking code and the observers
    to use, preferably in a header file that can be included by all classes involved,
    like so:


    `#define DATA_RECEIVED @"dataReceived"`


    Observers can sign up to receive notifications at any time, but typically this
    happens during an object’s initialization.


    `- (id)init`


    `{`


        `if ((self = [super init])) {`


            `[[NSNotificationCenter defaultCenter] addObserver:self`


                                                     `selector:@selector(receiveNetworkData:)`


                                                         `name:DATA_RECEIVED`


                                                       `object:nil];`


        `}`


        `return self;`


    `}`


    This tells the application’s one and only instance of `NSNotificationCenter` that
    it should notify the caller by calling its `receiveNetworkData:` method whenever
    anyone posts a `DATA_RECEIVED` notification. Note the final parameter where we’re
    passing a `nil`: if we instead specified an object there, that would limit the
    notification-observing to only apply to that particular object. Any other object
    posting the same notification wouldn’t have any effect. To make this work, the
    observer also needs to implement the method it specified when registering. This
    method always receives the `NSNotification` itself as a parameter.


    `- (void)receiveNetworkData:(NSNotification *)notification`


    `{`


      `NSLog(@"received notification: %@", notification);`


    `}`


    Finally, any object that sets itself up as observer should usually remove itself
    from the observer list later on. A common idiom is to do something like the following
    in the `dealloc` method of any class that ever registers as an observer:


    `- (void)dealloc`


    `{`


        `[[NSNotificationCenter defaultCenter] removeObserver:self];`


    `}`


    Now, what about the notifier itself, in our case the network-reading object that’s
    going to broadcast its status? That’s taken care of as simply as this:


    `if (some condition is met) {`


        `[[NSNotificationCenter defaultCenter]`


            `postNotificationName:DATA_RECEIVED`


                          `object:self];`


    `}`


    The idea is that the notifier can fling out a notification like this, and the
    notification center takes care of the actual delivery. The notifier can also pass
    along additional information in the form of a dictionary that can be retrieved
    by an observer, like this:


    `// in the notifier`


    `NSDictionary *info = @{@"data" : someData};`


    `[[NSNotificationCenter defaultCenter]`


        `postNotificationName:DATA_RECEIVED`


                      `object:self`


                    `userInfo:info];`


    `// in the observer`


    `NSLog(@"received data %@", [[notification userInfo] objectForKey:@"data"]);`


    Notifications can be a really useful way to let separate parts of our application
    talk to each other without using formal APIs. All we need to do is decide on some
    strings to represent various events, and start observing and posting.


    ### Blocks


    Chapters 11 and 17 introduced blocks, an addition to C that Apple came up with
    a few years ago. We mostly used blocks with the concurrency features provided
    by Grand Central Dispatch, where blocks fit in really well, but there are many
    more uses for blocks. It seems that in each new major version of OS X, Apple extends
    several Cocoa classes, adding new methods that take blocks as parameters. Let’s
    take a look at some of them.'
  trans: "\n# 18. 未来路径\n\n## 摘要\n\n你现在已经读完了《在 Mac 上学习 Cocoa》的最后一章！希望你已经对 Cocoa 的工作原理以及如何利用其各个组件编写各种有趣的桌面应用有了良好的理解。然而，Cocoa\
    \ 框架其实非常庞大，我们仅仅触及了所涉及的大部分类和概念的皮毛。这本书从未打算成为一本百科全书式的 Cocoa 参考手册（你的电脑上已经随 Xcode 安装了这样的手册），而是旨在成为一本为你指引方向的指南。秉承这一精神，我们将通过概述一些额外的技巧和资源来结束本书，这些内容将帮助你在已学知识的基础上，将\
    \ Cocoa 开发工作提升到新的高度。\n\n我们将从详细阐释几个我们曾提及但值得更多关注的设计模式开始。接着，我们将探讨如何使用 Objective-C\
    \ 以外的语言进行 Cocoa 编程。最后，我们将介绍一些方法，让你能将来之不易的 Cocoa 技能应用到 Mac OS X 桌面以外的领域。\n\n##\
    \ 更多 Cocoa 特性\n\n在本书中，我们花了大量篇幅讨论 MVC 模式，它帮助我们将应用程序划分为逻辑层；以及委托模式，它允许我们在控制器层内定义某些\
    \ GUI 对象的行为，而无需对 GUI 对象本身进行子类化。这些技术利用语言特性和约定来定义使用模式。沿着这个思路，Cocoa 还有更多锦囊妙计。其中之一是**通知**（在某些圈子中被称为*观察者模式*）的概念，它允许一个对象在发生某事件时通知一组其他对象。另一个是使用**块**来简化代码，特别是在使用完整的委托甚至单个方法都可能显得大材小用的时候。我们在本书的其他地方已经见过块的使用，但这里我们也将涉及一些其他有趣的用途。\n\
    \n### 通知\n\nCocoa 的`NSNotification`和`NSNotificationCenter`类提供了一种方法，让一个对象可以向一组其他对象发送消息，而无需这些对象之间互相了解。它们真正需要知道的只是通知的名称，这个名称可以是任何我们喜欢的字符串。想要被通知的对象会提前注册为特定通知名称的观察者，而想要广播通知的对象则使用该名称向任何正在监听的观察者发送其消息。\n\
    \n例如，假设我们应用程序的多个部分需要在某个特定事件发生时更新，比如一段网络代码读取来自 Web 服务器的响应。使用通知，我们的网络代码不需要知道其他每个想要该信息的对象。相反，我们可以为网络代码和观察者定义一个共同使用的通知名称，最好放在一个所有相关类都能包含的头文件中，如下所示：\n\
    \n```\n#define DATA_RECEIVED @\"dataReceived\"\n```\n\n观察者可以在任何时候注册接收通知，但通常这发生在对象的初始化过程中。\n\
    \n```\n- (id)init\n{\n    if ((self = [super init])) {\n        [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \       selector:@selector(receiveNetworkData:)\n                            \
    \                         name:DATA_RECEIVED\n                               \
    \                    object:nil];\n    }\n    return self;\n}\n```\n\n这告诉应用程序唯一的`NSNotificationCenter`实例：当有人发布一个`DATA_RECEIVED`通知时，它应该通过调用调用者的`receiveNetworkData:`方法来通知它。注意最后一个参数我们传递的是`nil`：如果我们在此处指定了一个对象，那将会把通知观察限制为仅适用于该特定对象。其他任何发布相同通知的对象都不会产生任何效果。为了使它工作，观察者还需要实现注册时指定的方法。这个方法总是接收`NSNotification`本身作为参数。\n\
    \n```\n- (void)receiveNetworkData:(NSNotification *)notification\n{\n  NSLog(@\"\
    received notification: %@\", notification);\n}\n```\n\n最后，任何将自己设置为观察者的对象通常应在稍后将自己从观察者列表中移除。一个常见的做法是在任何注册为观察者的类的`dealloc`方法中执行类似以下操作：\n\
    \n```\n- (void)dealloc\n{\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
    }\n```\n\n那么，通知者本身呢？以我们的情况为例，就是那个将要广播其状态的网络读取对象。处理起来再简单不过了：\n\n```\nif (some condition\
    \ is met) {\n    [[NSNotificationCenter defaultCenter]\n        postNotificationName:DATA_RECEIVED\n\
    \                      object:self];\n}\n```\n\n其思想是通知者可以像这样抛出一个通知，而通知中心负责实际的传递。通知者还可以通过一个字典传递额外的信息，观察者可以获取这些信息，如下所示：\n\
    \n```\n// 在通知者中\nNSDictionary *info = @{@\"data\" : someData};\n[[NSNotificationCenter\
    \ defaultCenter]\n    postNotificationName:DATA_RECEIVED\n                  object:self\n\
    \                userInfo:info];\n\n// 在观察者中\nNSLog(@\"received data %@\", [[notification\
    \ userInfo] objectForKey:@\"data\"]);\n```\n\n通知是一种非常实用的方式，可以让应用程序的不同部分在不使用正式\
    \ API 的情况下相互通信。我们只需要决定一些字符串来表示各种事件，然后开始观察和发布即可。\n\n### 块\n\n第 11 章和第 17 章介绍了**块**，这是苹果几年前为\
    \ C 语言添加的一个特性。我们主要将块与 Grand Central Dispatch 提供的并发特性一起使用，块在其中非常契合，但块还有许多其他用途。似乎在\
    \ OS X 的每个主要新版本中，苹果都会扩展几个 Cocoa 类，添加以块为参数的新方法。我们来看看其中的一些。\n"
- fmt: "### Enumeration\n\nLet’s start with something simple: enumeration. You’re\
    \ probably familiar with the standard C-based ways of stepping through a list,\
    \ and perhaps the use of `NSEnumerator`, and even the new fast enumeration (“for\
    \ – in” loops) that’s been available since the release of OS X 10.5. Now, blocks\
    \ provide yet another way to do the same thing.\n\n```\nNSArray *array = @[@\"\
    zero\", @\"one\", @\"two\", @\"three\"];\n\n// C-style enumeration\nint i;\nfor\
    \ (i = 0; i < [array count]; i++) {\n    NSLog(@\"C enumeration accessing object:\
    \ %@\", array[i]);\n}\n\n// NSEnumerator, the \"classic\" Cocoa way to enumerate\n\
    NSEnumerator *aEnum = [array objectEnumerator];\nid classicEnumerated;\nwhile\
    \ ((classicEnumerated = [aEnum nextObject])) {\n    NSLog(@\"NSEnumerator accessing\
    \ object: %@\", classicEnumerated);\n}\n\n// \"Fast enumeration\", released with\
    \ OS X 10.5\nid fastEnumerated;\nfor (fastEnumerated in array) {\n    NSLog(@\"\
    Fast enumeration accessing object: %@\", fastEnumerated);\n}\n\n// \"Block enumeration\"\
    , released with OS X 10.6\n[array enumerateObjectsUsingBlock:^(id blockEnumerated,\
    \ NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration accessing object:\
    \ %@\", blockEnumerated);\n}];\n```\n\nThe block we pass in to `enumerateObjectsUsingBlock:`\
    \ takes three arguments and returns nothing. That’s the block signature declared\
    \ by the method, and that’s what we have to follow. The three arguments sent into\
    \ our block are an object from the array, an integer containing that object’s\
    \ index in the array, and a `BOOL` passed by reference that lets us halt the enumeration\
    \ by setting its value to `YES`.\n\nLooking at it that way, it may not be obvious\
    \ at first why the block version is any better than the others, but the fact is\
    \ that it really combines the best of all the other ways of enumerating. For one\
    \ thing, it gives us the index of the current object, which neither of the previous\
