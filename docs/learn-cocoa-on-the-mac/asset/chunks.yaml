    Figure 15-4.


    Adding existing files to a project


    This time, rather than setting up bindings to this control, let’s just add an
    outlet in our controller definition so that we can access the `CECurveView` we’re
    going to set up. Modify `MBAppDelegate.h`, adding the bold lines here:'
  trans: "\n### 显式动画\n\nCore Animation 提供了一种在代码中显式设置动画的技术，而不是使用 `NSView` 的 `animator`\
    \ 方法那层“魔法”。我们创建的每个显式动画都由负责开始和结束动画代码段的方法界定，这让整个过程更加清晰。再加上显式动画所具备的额外功能，很明显，除了最简单的动画之外，所有动画都适合采用这种方法。\n\
    \n要使用 Core Animation，我们首先需要将 `QuartzCore` 框架添加到 Xcode 项目中。在 Xcode 中，在项目导航器窗格中选择\
    \ `MovingButton` 项目本身：这是项目导航器中的最顶层项。在“目标”部分下选择 `MovingButton`，如图 15-2 所示。在“已链接的框架和库”部分，点击表格视图底部的\
    \ + 按钮来添加一个新框架。在列表中找到 `QuartzCore.framework`（使用顶部的搜索字段），然后添加它。\n\n![A978-1-4302-4543-8_15_Fig2_HTML.jpg](img/A978-1-4302-4543-8_15_Fig2_HTML.jpg)\n\
    \n图 15-2. 向项目中添加新框架\n\n然后，在 `MBAppDelegate.m` 的顶部添加以下行：\n\n`#import <QuartzCore/QuartzCore.h>`\n\
    \n现在，我们可以在自己的代码中引用 Core Animation 类了。让我们先修改之前的示例，用显式动画替代隐式动画。为此，我们需要创建一个名为 `CABasicAnimation`\
    \ 的 Core Animation 类实例，它可以对任何可动画化的 `CALayer` 属性的值进行动画处理。在我们的例子中，我们将对图层的 `position`\
    \ 属性进行动画处理，而不是对其 frame 进行动画处理。我们使用动画的 `toValue` 和 `fromValue` 属性显式设置位置的起点和终点。请注意，这些属性期望的是一个对象，而不仅仅是像\
    \ `NSPoint` 这样的结构体，因此我们必须将每个 `NSPoint` 值包装到 `NSValue` 实例中。创建动画后，我们将其连同键一起添加到视图的图层中。该键与我们正在动画处理的属性无关，它仅用于帮助我们在之后识别该动画。最后，我们在视图对象本身上更改其\
    \ frame，因为动画仅影响视图图层的绘制效果。我们希望视图实际也进行移动，因此我们必须手动设置其目标 frame。实现所有这些功能的代码如下：\n\n\
    ```\n- (IBAction)move:(id)sender {\n\n    NSRect senderFrame = [sender frame];\n\
    \n    NSRect superBounds = [[sender superview] bounds];\n\n    CABasicAnimation\
    \ *a = [CABasicAnimation\n        animationWithKeyPath:@\"position\"];\n\n   \
    \ a.fromValue = [NSValue valueWithPoint:senderFrame.origin];\n\n    senderFrame.origin.x\
    \ = (superBounds.size.width -\n        senderFrame.size.width)*drand48();\n\n\
    \    senderFrame.origin.y = (superBounds.size.height -\n        senderFrame.size.height)*drand48();\n\
    \n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n\n    [[sender\
    \ layer] addAnimation:a forKey:@\"position\"];\n\n    [[sender animator] setFrame:senderFrame];\n\
    \n    [sender setFrame:senderFrame];\n\n}\n```\n\n请注意，我们还从这个方法中移除了 `[[sender animator]\
    \ setFrame:senderFrame];` 这一行，因为这次我们不希望触发隐式动画。在这段代码工作之前，我们还需要完成隐式动画为我们处理好的一个步骤：为需要动画处理的视图建立图层。使用\
    \ animator 代理可以自动完成此操作，但现在我们必须为所有将要进行动画处理的视图（包括将要移动的视图的父视图）自行启用此功能。在我们的例子中，这意味着按钮的父视图（窗口的内容视图）需要被赋予一个图层，然后它反过来又会为其子视图层次结构（即按钮本身）建立图层。最简单的方法是返回\
    \ `MainMenu.xib`，选择窗口中的按钮，然后打开“视图特效检查器”（`⌘⌥8`）。该检查器的顶部有一个标题为“Core Animation 图层”的部分，其中显示了视图对象列表（见图\
    \ 15-3）。\n\n![A978-1-4302-4543-8_15_Fig3_HTML.jpg](img/A978-1-4302-4543-8_15_Fig3_HTML.jpg)\n\
    \n图 15-3. 建立动画图层\n\n选中的对象（按钮）位于底部，其所有父视图（本例中只有一个视图，即窗口的内容视图）堆叠在其上方。点击复选框为该视图启用图层。我们可以将按钮的复选框保持未选中状态，因为父视图会为其建立图层。\n\
    \n现在保存所有内容，运行应用程序，我们将看到完全一样的行为。因此，这个新版本以增加几行代码为代价实现了相同的结果。到目前为止，这似乎并没有多大优势。但是等等，还有更多！通过像\
    \ `CABasicAnimation` 这样的动画类实现的显式动画，让我们能够做几件使用隐式动画无法做到的关键事情。\n\n首先，我们可以设置动画的持续时间。在将动画添加到图层（使用\
    \ `[[sender layer] addAnimation:a forKey:@\"position\"]`）之前添加以下这行代码，可以使该动画运行得更慢一些：\n\
    \n`a.duration = 1.0;`\n\n将此代码放入后运行，我们会看到按钮的过渡变得更慢了。我们还可以更改动画的节奏，使其不严格按线性方式从一点移到另一点。让我们将其设置为“缓入、缓出”的运动，如下所示：\n\
    \n`a.timingFunction = [CAMediaTimingFunction functionWithName:`\n`kCAMediaTimingFunctionEaseInEaseOut];`\n\
    \n现在运行，我们会看到，当我们点击按钮时，它开始缓慢移动，然后逐渐加速，移动得更快，等到接近目标时速度又降下来。在底层，这些时间函数通过为从 `0.0`\
    \ 到 `1.0` 的值变化提供一个简单的映射来工作，使用一对控制点来描述两者之间的曲线。这听起来是不是很耳熟？这似乎正是我们本章前半部分实现的曲线编辑控件用武之地！我们可以使用曲线编辑器来定义每次点击按钮时将应用于按钮移动的时间函数。\n\
