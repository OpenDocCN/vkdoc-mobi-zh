    ## 彼得·克拉克


    彼得·克拉克大约在 1990 年上大学时开始接触 NeXTStep。这段经历奠定了他职业生涯前半段的基调，当时他与杰克在双城的一家咨询公司共事。他曾为湾区、芝加哥和双城的公司开发
    NeXTStep 和 WebObjects 项目，撰写了一本关于 OpenStep 开发的书籍，随后转向 Java、.NET、Ruby 和 Scala 开发以及管理工程团队。他很高兴
    NeXTStep 的众多设计模式至今仍有用武之地，并发现 Cocoa 开发既令人感到熟悉又充满惊喜。彼得目前在明尼苏达大学担任一个研究项目的软件开发总监。他偶尔会在[`http://blog.pclark.net`](http://blog.pclark.net)上写博客，你可以在
    Twitter 上通过`@pclark`找到他。彼得想让你知道，他至少比杰克早一两个月开始使用 NeXTStep。（照片由韦德·斯特宾斯提供。）


    ## 关于技术审阅者


    ![A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg](img/A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg)


    尼克·韦尼克在 IT 领域工作已超过十三年，从事过从网络管理到网络开发的各种工作。他在 SDK 首次发布时就开始编写 iOS 应用。此后，他创立了自己的公司，专注于
    iOS 开发。他喜欢在空闲时间与妻子艾莉森和儿子普雷斯顿在一起，有时也会打打高尔夫。他在[`nickwaynik.com`](http://nickwaynik.com)上写博客，你可以在
    Twitter 上通过`@n_dubbs`找到他。


    ## 致谢


    将一本书从概念变成你正在阅读的纸质书（或电子书），需要感谢很多人。除了将文字和代码片段输入文本编辑器之外，还有很多工作要做。Apress 的道格拉斯·庞迪克和吉尔·巴尔扎诺帮助将许多事情安排得井井有条，让作者们免于分心。当然，让作者们保持正轨也很重要，他们也一直让我们为此忙碌。我们的技术审阅者尼克·韦尼克发现了代码和文章中许多小问题（以及一些不小的问题），并且每次提出修改建议都有充分的理由。我们的文字编辑玛丽·贝尔非常出色地精炼了我们的文笔，润色了我们的语法，并确保你阅读的内容流畅连贯。在她的手下，许多别扭的句子被重构得更加出色。


    我们想感谢苹果公司的开发者们，他们制作了值得书写的工具。[`www.swampfoetus.net`](http://www.swampfoetus.net)
    的作者为第一版的读者写了一篇很棒的文章，介绍了 Xcode 4 中处理 Core Data 的变化，该文章使用了第一版中的`MythicalPerson`示例应用。我要感谢他足够用心地写了那篇文章并公开发表。第一版的其他作者大卫·马克和杰夫·拉马什为我们留下了坚实的创作基础。谢谢各位先生！我们确信还遗漏了许多非常值得感谢的人，是他们的努力让这本书变得优秀。书中剩余的不佳之处，责任全在作者。


    本书的大部分写作工作在明尼苏达州圣保罗市的 Shish Café 和 Kopplin’s Coffee 完成。如果你想品尝美味的咖啡，没有比 Kopplin’s
    更好的去处了。最后，也是最重要的，彼得要感谢他的妻子莫莉·麦克贝斯和孩子们劳雷尔 & 贝娅，杰克要感谢他的妻子维罗妮卡·梅耶和孩子们亨丽埃塔 & 多罗特娅。他们非常支持写书所需投入的时间，没有他们的帮助，这本书不可能完成。彼得和杰克将本书献给我们各自的家人。

