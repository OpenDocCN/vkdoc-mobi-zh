    THE CANONICAL INIT METHOD


    The preceding code snippet shows an example of an `init` method that creates values
    for our class’s instance variables. The form of this `init` method is fairly standard,
    and you’re likely to see something similar in most Objective-C classes you see,
    but it does some things that seem strange at first glance and so is worth explaining
    a bit. The method starts off with this peculiar `if` statement:


