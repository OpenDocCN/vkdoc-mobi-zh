    \n```\n[[NSNotificationCenter defaultCenter] removeObserver:observe];\n```\n\n\
    One thing to be aware of when using blocks this way is that cleaning up in the\
    \ `dealloc` method may not be good enough; if the block has made use of the `self`\
    \ pointer, either explicitly or indirectly, then a sort of circular reference\
