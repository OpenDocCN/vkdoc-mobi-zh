- fmt: 'Set the width of our window to 480 pixels and the height to 130 pixels. Set
    the `x` value of the window to 100, which indicates that we want the window’s
    initial position to be on the left side of the screen. The `y` value can be a
    little more problematic because of the geometry of the Mac’s display. The coordinate
    system on the Mac’s screen has 0 at the lower-left corner of the screen, with
    the `y` value getting higher as we move up toward the top of the screen. The problem
    here is that not everybody has the same size monitor, so any given `y` value will
    be different relative to the top of the screen on different size monitors.


    Fortunately, Cocoa will automatically adjust the window’s position so that the
    window always starts on the screen, even if the location we specify would otherwise
    place it off-screen somewhere, and because we gave the window an autosave name,
    every time the user launches the application after the first, the window will
    be where it was the last time we quit the application. But sometimes it’s important
    that a window start in a particular position relative to the top of the screen.


    Note the little diagram at the bottom of the Size Inspector; it gives us a visual
    representation of the window’s initial position based on our own screen’s size.
    The little white box represents the window, and the big box represents the screen
    minus the menu bar. The little red I-beams on all four sides of the white box
    let us control the relative positioning of the window relative to the sides of
    the screen. We can place the window where we want it on our screen, then use the
    I-beams to lock the position relative to the left and top of the screen. Clicking
    an I-beam will allow the window to move proportionally relative to that side of
    the screen. Clicking the bottom I-beam will let the window float from the bottom
    but maintain a fixed distance from the top of the screen. Clicking both the top
    and bottom I-beams will cause the window to be centered vertically on our screen.


    We need to set a `y` value that places the window near the menu bar, without abutting
    it. The easiest way to do this is to simply move the application’s main window
    to where we want it, using the representation of the display in the Size Inspector.
    We can then tweak the size and position numerically if necessary. Once we have
    the initial position of the window where we want it, click the I-beam on the bottom
    so that it turns striped. We can also make this change by selecting the bottom
    pop-up menu in the Initial Position section and changing it from `Proportional
    Vertical` to `Fixed from Top`.


    ## Designing the Window’s Interface


    In the Object Library, select the Object Library pull-down menu and select `Controls`.
    This will present us with a bunch of different buttons and text fields that we
    can use (Figure [4-6](#A978-1-4302-4543-8_4_Chapter.html#Fig6)). The first item
    in the bottom list should now be `Push Button`, which is a standard OS X button.


    ![A978-1-4302-4543-8_4_Fig6_HTML.jpg](A978-1-4302-4543-8_4_Fig6_HTML.jpg)


    Figure 4-6.


    Object Library view in the Utility area of Xcode


    Grab one of those and drag it over to the window’s interface. Blue guidelines
    will appear to show when the button is positioned in a good spot on the left edge,
    the right edge, or in the center. Use the blue guidelines to place the button
    in the lower right part of the window (Figure [4-7](#A978-1-4302-4543-8_4_Chapter.html#Fig7)).
    Once the button is in the right location, release the mouse, and we’ll have a
    button on our window. Double-click the button now, which will allow us to edit
    the button’s title. Change its title from “Button” to “Right.”


    ![A978-1-4302-4543-8_4_Fig7_HTML.jpg](A978-1-4302-4543-8_4_Fig7_HTML.jpg)


    Figure 4-7.


    Adding a button to the main window


    Drag a second button over from the library and place it on the lower left of the
    window, again using the blue guidelines. After placing this button, double-click
    it and change this button’s title to “Left.”


    Bring one more button over, and use the bottom blue guideline to place the button
    the correct distance from the bottom of the window. Place it in the horizontal
    center of the window, and again, there will be a blue guideline that appears to
    help us position it properly. Once it’s placed, double-click the third button
    and change its label to “Center.” The window should now look like Figure [4-8](#A978-1-4302-4543-8_4_Chapter.html#Fig8).


    ![A978-1-4302-4543-8_4_Fig8_HTML.jpg](A978-1-4302-4543-8_4_Fig8_HTML.jpg)


    Figure 4-8.


    The window should look like this, with all three buttons laid out


    Note that as we added controls to the window, the Objects display on the left
    of the Interface Builder pane expanded to show the addition of the controls and
    the set of constraints for the view, also visible in Figure [4-8](#A978-1-4302-4543-8_4_Chapter.html#Fig8).
    The constraints section governs how the layout of the controls responds to the
    window being resized.


    Next, we need a label so that we can tell the user which button was clicked. A
    label is a GUI object that can display a piece of text in the font and size of
    our choosing. From within our application code, we can programmatically change
    the label’s text any time we want. Grab a label from the library. You may need
    to scroll down a bit in the list of controls, or you can just use the search box.
    Drag the label to the upper left of the window, and use the guides to place it
    properly against the top and left margins.


    Click the resize handle on the right of the label, drag it to the right until
    you get to the blue guidelines on the right side of the window, and let go. With
    the label still selected, press `⌥⌘4` to bring up the Attribute Inspector in the
    Utility pane, and center the text using the Text Alignment button. Then click
    the small `T` icon on the right side of the Font setting. This will bring up a
    special font panel, as shown in Figure [4-9](#A978-1-4302-4543-8_4_Chapter.html#Fig9).
    Change the font size to 36, either by typing in the number directly or using the
    small arrow buttons to the right of the `Size` field. With that complete, all
    that’s left is to double-click the label, which will put it in editing mode, then
    hit the Delete key to delete the text. We don’t want this label to say anything
    until a button has been pressed.


    ![A978-1-4302-4543-8_4_Fig9_HTML.jpg](A978-1-4302-4543-8_4_Fig9_HTML.jpg)


    Figure 4-9.


    Changing the font for the label


    That winds up the user interface, so now we’re going to need to write some code
    to update the text in the label when one of the three buttons is pressed.'
