    `Exception` 弹出菜单设置为 `Objective-C`，确保 `Break` 弹出菜单设置为 `On Throw`，然后点击 `Done`。


    现在我们有了一个断点，它会在任何 Objective-C 异常抛出时停止 Xcode。完美！通过从菜单中选择 `Product ➤ Run` 重新启动 `ExceptionCity`
    应用，如果它仍在运行则先退出。这次，当应用遇到问题代码时，它会在异常抛出处停止执行。图 13-2 大致展示了此时 Xcode 的样子。


    ![A978-1-4302-4543-8_13_Fig2_HTML.jpg](img/A978-1-4302-4543-8_13_Fig2_HTML.jpg)


    图 13-2. Xcode 在断点处停止


    左侧导航面板更改为调试导航器，并显示调用栈，顶部是我们断点位置（一个名为`objc_exception_throw`的函数，这是 Xcode 实际放置异常断点的地方），下方是所有调用者。注意，我们有源代码的帧以黑色文本显示，而封闭源代码库中的帧以灰色文本显示。灰色帧仍然可访问，但只能以汇编语言形式。通过查看左侧的帧编号序列，我们还可以看到并非所有帧都显示。默认情况下，Xcode
    显示我们有源代码的帧，其他帧则压缩成水平虚线。我们可以使用调试导航器底部的水平滑块来更改此设置，根据需要显示更多或更少的帧。


    项目窗口底部是调试区域，分为两部分。左侧显示所有可用变量和寄存器值，我们可以立即看到一些简单值。右侧显示 `lldb` 控制台界面，我们可以在其中查看程序输出（由
    `NSLog` 等生成）并在 `lldb` 提示符下输入命令。如果您看不到底部视图，可以通过选择 `View ➤ Debug Area ➤ Activate
    Console` 使其显示。


    主编辑器视图显示所选栈帧的源代码或编译后的汇编代码，并用箭头和高亮标记停止的行。


    此时，在异常被抛出的那一刻停止，看看异常是什么将会很有趣。但怎么做呢？当 Xcode 暂停时，它指向包含我们源代码的最上层栈帧。那是我们程序中问题所在的位置，但我们无法在那“看到”异常。也就是说，那里没有局部变量或任何可访问的全局结构来显示异常本身。


    相反，我们需要关注程序真正停止的最上层栈帧，即 `objc_exception_throw` 函数。点击它以查看详情。它看起来应该像图 13-3。


    ![A978-1-4302-4543-8_13_Fig3_HTML.jpg](img/A978-1-4302-4543-8_13_Fig3_HTML.jpg)


    图 13-3. 源代码？谁需要它！


    我们只看到一堆汇编代码，没有变量名或其他任何东西来指导我们。幸运的是，有一个我们可以利用的调用约定。在为 Mac OS X（64 位 Intel 硬件）编译的代码中，任何函数的返回值都临时存储在名为`rax`的
    CPU 寄存器中，在 `lldb` 中可以通过名为`$rax`的特殊变量访问。当我们的程序在 `objc_exception_throw` 函数中停止时，`$rax`
    寄存器恰好包含新的异常，所以我们准备好了！`lldb` 调试器包含 `po` 命令，用于以可读格式打印对象的值（它实际上调用对象的 `description`
    方法，该方法返回一个 `NSString`，并打印该字符串值）。在 `lldb` 提示符下尝试以下操作：


    ```

    (lldb) po $rax

    $1 = 4296302928 -[__NSCFNumber length]: unrecognized selector sent to instance
    0x387

    ```


    看起来熟悉吗？这基本上和我们之前在输出中看到的文本相同。知道我们可以在这里访问 `NSException`，我们可以利用 `lldb` 的实时 Objective-C
    方法执行来询问更多信息：


    ```

    (lldb) po [$rax name]

    $2 = 0x00007fff783e0a30 NSInvalidArgumentException

    (lldb) po [$rax reason]

    $3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized selector sent to
    instance 0x387

    ```


    这里我们看到 `reason` 方法的返回值与 `description` 的返回值相同，但 `name` 方法返回的名称，你可能记得通常用作异常的类型或类别。在这种情况下，我们看到了
    Cocoa 中最常见的异常类型之一：`NSInvalidArgumentException`。

