    to demonstrate how to use the `NSArrayController` class, a generic controller
    class included with Cocoa to manage the display of these table views with no custom
    code of our own, thanks to Cocoa bindings. We’ll need to add a few outlets and
    other instance variables to our `DungeonThingAppDelegate` class for three instances
    of `NSArrayController` and three arrays (one for each type of game object). We’ll
    also remove the `NSTextField` outlets that we just put in because those will also
    be configured with bindings to display their contents. Finally, we’ll change the
    action methods just slightly to insert each created object into the relevant array.
    When we’re done, the source code will be almost identical in size because all
    configuration of the table views is done right in the nib file.


    We’re going to start by adding some properties to `DungeonThingAppDelegate` and
    modifying our `create:` methods to make use of these new properties. Before we
    can use bindings in Interface Builder, we need to set them up in the code first.
    We’ll then move over to Interface Builder to connect the bindings and then back
    to the code for some cleanup.


