    different, and if you like you can change it to match the version shown here:


    `#import <Cocoa/Cocoa.h>`


    `@interface MBAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;`


    `@property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;`


    `@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;`


    `- (IBAction)saveAction:(id)sender;`


    `@end`


    This code declares a simple class with four properties and one method. The `window`
    variable also features `IBOutlet` in its property declaration, which makes it
    into an outlet available for connecting to a window in Interface Builder. The
    other three properties are instances of some important Core Data classes:


    *   `NSPersistentStoreCoordinator` manages the back-storage, giving access to
    one or more instances of `NSPersistentStore`, each of which represents a storage
    location (in a file or in memory). The purpose of the coordinator is to let the
    application access several persistent stores as if they were one. Some applications
    may want to use this to partition application data across multiple stores. For
    example, you may want to distinguish between normal entities, whose objects that
    are saved to disk, and transient entities, whose objects that are only held in
    memory and will disappear when the user quits the app. Even though they’re not
    saved to disk, the transient objects will still benefit from the other features
    of Core Data (simple Undo support, integration with Cocoa bindings, and the like).

    *   `NSManagedObjectModel` loads information about entities and their properties
    from one or more model files (normally contained inside your application bundle),
    and acts as a sort of metadata repository containing the structure of the application’s
    managed objects. Many applications will never need to interact with this directly.

    *   `NSManagedObjectContext` is responsible for dealing with the lifecycle of
    all managed objects (the model objects that we’re storing via Core Data). It accesses
    the objects themselves through an `NSPersistentStoreCoordinator` and provides
    high-level functionality for creating, reading, updating, and deleting objects.
    Most applications will use an `NSManagedObjectContext` at some time or another
    for creating objects, saving changes, and so on.


    We’ll see how each of those objects is used when we look at the implementation
    file. The final declaration in the header file is for the `saveAction:` method,
    which is called when the user selects File ➤ Save from the MythBase menu. We’ll
    see how that works in the next section.


    ### The App Delegate Implementation


    Now let’s switch over to `MythBase_AppDelegate.m`, and see what it does. Besides
    implementing the `saveAction:` method declared in the interface, it also needs
    to make sure that the appropriate accessors for its declared properties are all
    implemented. That includes both a getter and a setter for window, and just a getter
    for the others (which were declared read-only). As with the header file, this
    code was auto-generated using Xcode 4.5 running on Mountain Lion. If you’re using
    something else, you might see slightly different code.


    #### The applicationSupportDirectory Method


    The file starts out like this:


    `#import "MBAppDelegate.h"`


    `@implementation MBAppDelegate`


    `@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;`


    `@synthesize managedObjectModel = _managedObjectModel;`


    `@synthesize managedObjectContext = _managedObjectContext;`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


        `// Insert code here to initialize your application`


    `}`


    `// Returns the directory the application uses to store the Core Data store file.
    This code uses a directory named "com.learncocoa.MythBase" in the user''s Application
    Support directory.`


    `- (NSURL *)applicationFilesDirectory`


    `{`


        `NSFileManager *fileManager = [NSFileManager defaultManager];`


        `NSURL *appSupportURL = [[fileManager URLsForDirectory:NSApplicationSupportDirectory
    inDomains:NSUserDomainMask] lastObject];`


        `return [appSupportURL URLByAppendingPathComponent:@"com.learncocoa.MythBase"];`


    `}`


    The first things shown in the class’s implementation are some `@synthesize` directives,
    which take care of the getters and setters for the properties declared in the
    header file. Next is the stub for the `applicationDidFinishLaunching:` method,
    which we’ve seen before and is standard for any application delegate class. After
    that comes the implementation of a method called `applicationFilesDirectory`,
    which returns an `NSURL` containing the name of a directory where the application
    can save its data (in our case, the location where Core Data should save its persistent
    store). Normally this method returns the full path of a subdirectory of the Application
    Support directory, which is located inside the Library directory in the user’s
    home directory (/`Users/somebody/Library/Application Support/MythBase`).


    The `applicationFilesDirectory:` method is a “helper” method, called elsewhere
    in the class’s implementation. Note that this method is neither declared in the
    header file nor in a private category or anything of the sort. In an Objective-C
    implementation block, code can call any methods that appear earlier in the same
    implementation block, even if they’re not declared anywhere. This is sometimes
    a handy shortcut when you want to refactor your code a bit, extracting some functionality
    into a method of its own, but don’t need to make it accessible anywhere outside
    the current class implementation.'
  trans: "\n### App Delegate 接口\n\n我们直接来看头文件 `MBAppDelegate.h`，如下所示。这是 Xcode 4.5 在\
    \ Mountain Lion 系统上自动生成的代码。不同版本的 Xcode 生成的代码可能略有不同，如果你愿意，也可以修改代码以匹配此处显示的版本：\n\n\
    ```\n#import <Cocoa/Cocoa.h>\n\n@interface MBAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n\n@property (readonly, strong,\
    \ nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\n\
    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    \n- (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n这段代码声明了一个包含四个属性和一个方法的简单类。`window`\
    \ 变量在其属性声明中还带有 `IBOutlet`，使其成为可在 Interface Builder 中连接窗口的出口。另外三个属性是一些重要的 Core\
    \ Data 类的实例：\n\n- `NSPersistentStoreCoordinator` 负责管理后端存储，提供对一个或多个 `NSPersistentStore`\
    \ 实例的访问，每个实例代表一个存储位置（在文件中或内存中）。协调器的目的是让应用程序像访问一个持久存储那样访问多个持久存储。有些应用程序可能希望利用这一点将应用程序数据分区到多个存储中。例如，你可能希望区分普通实体（其对象保存到磁盘）和临时实体（其对象仅保存在内存中，用户退出应用时消失）。即使不保存到磁盘，临时对象仍将受益于\
    \ Core Data 的其他功能（简单的撤销支持、与 Cocoa 绑定的集成等）。\n\n- `NSManagedObjectModel` 从一个或多个模型文件（通常包含在应用程序包中）加载实体及其属性的信息，并作为包含应用程序托管对象结构的元数据仓库。许多应用程序永远不需要直接与它交互。\n\
    \n- `NSManagedObjectContext` 负责处理所有托管对象（我们通过 Core Data 存储的模型对象）的生命周期。它通过 `NSPersistentStoreCoordinator`\
    \ 访问对象本身，并提供用于创建、读取、更新和删除对象的高级功能。大多数应用程序都会在某个时候使用 `NSManagedObjectContext` 来创建对象、保存更改等。\n\
    \n在查看实现文件时，我们将看到每个对象是如何使用的。头文件中的最后一个声明是 `saveAction:` 方法，当用户在 MythBase 菜单中选择“文件\
    \ ➤ 保存”时会调用该方法。我们将在下一节中了解它的工作原理。\n\n### App Delegate 实现\n\n现在让我们切换到 `MythBase_AppDelegate.m`，看看它做了什么。除了实现接口中声明的\
    \ `saveAction:` 方法外，它还需要确保为其声明的属性实现适当的访问器。这包括 `window` 的 getter 和 setter，以及其他属性（声明为只读）的\
    \ getter。与头文件一样，此代码是使用 Xcode 4.5 在 Mountain Lion 上自动生成的。如果你使用其他版本，可能会看到略有不同的代码。\n\
    \n#### `applicationSupportDirectory` 方法\n\n文件开头如下：\n\n```\n#import \"MBAppDelegate.h\"\
    \n\n@implementation MBAppDelegate\n\n@synthesize persistentStoreCoordinator =\
    \ _persistentStoreCoordinator;\n@synthesize managedObjectModel = _managedObjectModel;\n\
    @synthesize managedObjectContext = _managedObjectContext;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // 在此处插入代码以初始化您的应用程序\n}\n\n// 返回应用程序用于存储 Core Data 存储文件的目录。此代码在用户的\
    \ Application Support 目录中使用名为 \"com.learncocoa.MythBase\" 的目录。\n- (NSURL *)applicationFilesDirectory\n\
    {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSURL\
    \ *appSupportURL = [[fileManager URLsForDirectory:NSApplicationSupportDirectory\
    \ inDomains:NSUserDomainMask] lastObject];\n    return [appSupportURL URLByAppendingPathComponent:@\"\
    com.learncocoa.MythBase\"];\n}\n```\n\n类的实现中首先展示了一些 `@synthesize` 指令，它们负责处理头文件中声明的属性的\
    \ getter 和 setter。接下来是 `applicationDidFinishLaunching:` 方法的存根，我们之前见过，这是任何应用程序委托类的标准实现。之后是\
    \ `applicationFilesDirectory` 方法的实现，它返回一个 `NSURL`，其中包含应用程序可保存数据的目录名称（在我们的例子中，是\
    \ Core Data 应保存其持久存储的位置）。通常，此方法返回 Application Support 目录子目录的完整路径，该子目录位于用户主目录的\
    \ Library 目录中（`/Users/somebody/Library/Application Support/MythBase`）。\n\n`applicationFilesDirectory:`\
    \ 方法是一个“辅助”方法，在类的实现中其他地方调用。请注意，此方法既未在头文件中声明，也未在私有类别或类似结构中声明。在 Objective-C 的实现块中，代码可以调用同一实现块中较早出现的任何方法，即使它们未在任何地方声明。当你想要重构代码，将某些功能提取到自己的方法中，但又不需要在当前类实现之外访问它时，这有时是一个方便的快捷方式。\n"
- fmt: "### `managedObjectModel` 访问器方法\n\n接下来是 `managedObjectModel` 方法。该方法作为 `managedObjectModel`\
    \ 属性的 getter。\n\n```\n// Creates if necessary and returns the managed object model\
    \ for the application.\n- (NSManagedObjectModel *)managedObjectModel\n{\n    if\
    \ (_managedObjectModel) {\n        return _managedObjectModel;\n    }\n    NSURL\
    \ *modelURL = [[NSBundle mainBundle] URLForResource:@\"MythBase\" withExtension:@\"\
    momd\"];\n    _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
    \    return _managedObjectModel;\n}\n```\n\n该方法会检查 `managedObjectModel` 是否已被创建。如果已创建，则直接返回；否则，通过读取应用程序包中的\
    \ `MythBase.momd` 资源文件来创建它。该文件由 Xcode 根据我们在本章开头创建的模型文件生成。`managedObjectModel:`\
    \ 方法可被任何需要访问模型元数据的代码片段调用。特别地，在创建 `NSPersistentStoreCoordinator` 时会调用它，因为该协调器需要读取或为我们的模型创建存储，因此需要了解详细的模型信息。\n\
    \n### 使用 `NSError` 进行错误处理\n\n此处展示的部分代码使用了 `NSError` 对象来处理可能发生的错误。我们尚未涵盖 `NSError`，因此在此简要说明。\n\
    \n`NSError` 的基本思想是：某些方法需要能够向调用者告知可能发生的错误，而不使用返回值作为此用途。要实现这一点，你传入一个指向 `NSError`\
    \ 指针的指针（用 C 语言的术语有时称为“句柄”），这样方法可以创建一个 `NSError` 对象并让指针指向它，大致如下：\n\n```\nNSError\
    \ *error = nil;\n[someObject doSomething:&error];\nif (error) {\n  // handle the\
    \ error somehow!\n}\n```\n\n关于 `NSError` 的更多细节，请参阅[第14章](#A978-1-4302-4543-8_14_Chapter.html)。\n\
    \n### `persistentStoreCoordinator` 访问器方法\n\n接下来是相当长的 `persistentStoreCoordinator`\
    \ 方法：\n\n```\n// Returns the persistent store coordinator for the application.\
    \ This implementation creates and returns a coordinator, having added the store\
    \ for the application to it. (The directory for the store is created, if necessary.)\n\
    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\nif (_persistentStoreCoordinator)\
    \ {\nreturn _persistentStoreCoordinator;\n}\nNSManagedObjectModel *mom = [self\
    \ managedObjectModel];\nif (!mom) {\nNSLog(@\"%@:%@ No model to generate a store\
    \ from\", [self class], NSStringFromSelector(_cmd));\nreturn nil;\n}\nNSFileManager\
    \ *fileManager = [NSFileManager defaultManager];\nNSURL *applicationFilesDirectory\
    \ = [self applicationFilesDirectory];\nNSError *error = nil;\nNSDictionary *properties\
    \ = [applicationFilesDirectory resourceValuesForKeys:@[NSURLIsDirectoryKey] error:&error];\n\
    if (!properties) {\nBOOL ok = NO;\nif ([error code] == NSFileReadNoSuchFileError)\
    \ {\nok = [fileManager createDirectoryAtPath:[applicationFilesDirectory path]\
    \ withIntermediateDirectories:YES attributes:nil error:&error];\n}\nif (!ok) {\n\
    [[NSApplication sharedApplication] presentError:error];\nreturn nil;\n}\n} else\
    \ {\nif (![properties[NSURLIsDirectoryKey] boolValue]) {\n// Customize and localize\
    \ this error.\nNSString *failureDescription = [NSString stringWithFormat:@\"Expected\
    \ a folder to store application data, found a file (%@).\", [applicationFilesDirectory\
    \ path]];\nNSMutableDictionary *dict = [NSMutableDictionary dictionary];\n[dict\
    \ setValue:failureDescription forKey:NSLocalizedDescriptionKey];\nerror = [NSError\
    \ errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:101 userInfo:dict];\n[[NSApplication\
    \ sharedApplication] presentError:error];\nreturn nil;\n}\n}\nNSURL *url = [applicationFilesDirectory\
    \ URLByAppendingPathComponent:@\"MythBase.storedata\"];\nNSPersistentStoreCoordinator\
    \ *coordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:mom];\n\
    if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil\
    \ URL:url options:nil error:&error]) {\n[[NSApplication sharedApplication] presentError:error];\n\
    return nil;\n}\n_persistentStoreCoordinator = coordinator;\nreturn _persistentStoreCoordinator;\n\
    }\n```\n\n这个方法看起来有些吓人，但我们逐段分析。它首先检查 `persistentStoreCoordinator` 实例变量中是否已存在对象，有则返回。否则，需要自行初始化协调器，于是继续通过调用同名方法查找\
    \ `managedObjectModel`。如果该模型不存在，则应用程序不包含模型，此方法会记录错误，有效放弃并返回 `nil`。\n\n否则，继续检查应用\
    \ Core Data 存储应加载的目录（由 `applicationFilesDirectory` 方法的返回值指定）是否存在。它通过对 `applicationFilesDirectory`\
    \ 返回的 `NSURL` 调用 `resourceValuesForKeys:error:` 来实现，该方法返回一个包含请求属性信息的 `NSDictionary`。在此例中，我们请求\
    \ `NSURLIsDirectoryKey` 键对应的资源值，询问该 URL 是否代表一个目录（而非文件）。"
  raw: '#### The managedObjectModel Accessor Method


    Next is the `managedObjectModel` method. This method serves as the getter for
    the `managedObjectModel` property.


    `// Creates if necessary and returns the managed object model for the application.`


    `- (NSManagedObjectModel *)managedObjectModel`


    `{`


        `if (_managedObjectModel) {`


            `return _managedObjectModel;`


        `}`


        `NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"MythBase" withExtension:@"momd"];`


        `_managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];`


        `return _managedObjectModel;`


    `}`


    The method simply checks to see if the `managedObjectModel` has already been created.
    If so, it returns it, and if not, it creates it by reading the `MythBase.momd`
    resource file contained within the application bundle. This file is created by
    Xcode from the model file we created at the beginning of the chapter. The `managedObjectModel:`
    method may be called by any piece of code that needs access to metadata about
    the model. In particular, it’s called when we create the `NSPersistentStoreCoordinator`,
    which will need to either read from, or create storage for our model, so it needs
    the gritty details.


    ERROR HANDLING WITH NSERROR


    Some of the code shown here makes use of `NSError` objects to handle errors that
    may occur. We haven’t yet covered `NSError`,  so we’ll offer a brief explanation
    here.


    The basic idea behind `NSError` is that some methods need to be able to inform
    the caller about potential errors that may occur, without using the return value
    for this purpose. To make this work, you pass in a pointer to a pointer (sometimes
    called a “handle” in C parlance) to an `NSError`, so that the method may create
    an `NSError` object and point a pointer at it, something like this:


    `NSError *error = nil;`


    `[someObject doSomething:&error];`


    `if (error) {`


      `// handle the error somehow!`


    `}`


    For more details about `NSError`, see [Chapter 14](#A978-1-4302-4543-8_14_Chapter.html).


    #### The persistentStoreCoordinator Accessor Method


    Next up is the considerably longer `persistentStoreCoordinator` method:


    `// Returns the persistent store coordinator for the application. This implementation
    creates and returns a coordinator, having added the store for the application
    to it. (The directory for the store is created, if necessary.)`


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator`


    `{`


    `if (_persistentStoreCoordinator) {`


    `return _persistentStoreCoordinator;`


    `}`


    `NSManagedObjectModel *mom = [self managedObjectModel];`


    `if (!mom) {`


    `NSLog(@"%@:%@ No model to generate a store from", [self class], NSStringFromSelector(_cmd));`


    `return nil;`


    `}`


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    `NSURL *applicationFilesDirectory = [self applicationFilesDirectory];`


    `NSError *error = nil;`


    `NSDictionary *properties = [applicationFilesDirectory resourceValuesForKeys:@[NSURLIsDirectoryKey]
    error:&error];`


    `if (!properties) {`


    `BOOL ok = NO;`


    `if ([error code] == NSFileReadNoSuchFileError) {`


    `ok = [fileManager createDirectoryAtPath:[applicationFilesDirectory path] withIntermediateDirectories:YES
    attributes:nil error:&error];`


    `}`


    `if (!ok) {`


    `[[NSApplication sharedApplication] presentError:error];`


    `return nil;`


    `}`


    `} else {`


    `if (![properties[NSURLIsDirectoryKey] boolValue]) {`


    `// Customize and localize this error.`


    `NSString *failureDescription = [NSString stringWithFormat:@"Expected a folder
    to store application data, found a file (%@).", [applicationFilesDirectory path]];`


    `NSMutableDictionary *dict = [NSMutableDictionary dictionary];`


    `[dict setValue:failureDescription forKey:NSLocalizedDescriptionKey];`


    `error = [NSError errorWithDomain:@"YOUR_ERROR_DOMAIN" code:101 userInfo:dict];`


    `[[NSApplication sharedApplication] presentError:error];`


    `return nil;`


    `}`


    `}`


    `NSURL *url = [applicationFilesDirectory URLByAppendingPathComponent:@"MythBase.storedata"];`


    `NSPersistentStoreCoordinator *coordinator = [[NSPersistentStoreCoordinator alloc]
    initWithManagedObjectModel:mom];`


    `if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil
    URL:url options:nil error:&error]) {`


    `[[NSApplication sharedApplication] presentError:error];`


    `return nil;`


    `}`


    `_persistentStoreCoordinator = coordinator;`


    `return _persistentStoreCoordinator;`


    `}`


    This method looks a little intimidating, but we’ll go through it piece by piece.
    It starts by looking for an existing object in the `persistentStoreCoordinator`
    instance variable, returning it if there is one. Otherwise, it needs to initialize
    the coordinator itself, so it goes on to look for a `managedObjectModel` by calling
    the method of the same name. If it doesn’t exist, then the application contains
    no model, and this method logs an error, effectively giving up, and returns nil.


    Otherwise, it goes on to check for the existence of a directory (specified by
    the value returned by the `applicationFilesDirectory` method) where the app’s
    Core Data storage should be loaded. It does this by calling `resourceValuesForKeys:error:`
    on the `NSURL` returned by `applicationFilesDirectory`, which returns a `NSDictionary`
    containing information about the properties requested. In this case, we’re requesting
    the resource value for the `NSURLIsDirectoryKey` key, which asks the URL if it
    represents a directory (as opposed to a file).'
  trans: "\n### `managedObjectModel` 访问器方法\n\n接下来是 `managedObjectModel` 方法。该方法作为 `managedObjectModel`\
