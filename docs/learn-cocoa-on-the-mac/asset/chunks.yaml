    \n```\n#import <Cocoa/Cocoa.h>\n\n@interface CMColorBlendView : NSView\n\n@property\
    \ (strong, nonatomic) NSColor *color1;\n@property (strong, nonatomic) NSColor\
    \ *color2;\n@property (assign, nonatomic) CGBlendMode blendMode;\n\n@end\n```\n\
    \n这为我们的类提供了两个 `NSColor` 对象（将通过 Cocoa 绑定填充）和一个 `CGBlendMode`（将在 `MyController`\
    \ 类加载 nib 文件时设置）。我们对所有这些属性使用了 `nonatomic` 关键字，这是一种声明方式，表示这些属性的 getter 和 setter\
    \ 方法不会采取额外措施来保证线程安全。由于我们知道在这个简单应用中，所有代码都只会在主线程上使用，因此使用 `nonatomic` 足够安全，并且能带来略微更好的性能。\n\
    \n现在切换到 `CMColorBlendView.m`，我们首先要做的是为已声明的属性定义方法。本书中之前声明的大多数属性，其方法都是通过显式的 `@synthesize`\
    \ 行创建的，但这里情况有点特殊，因为我们希望视图在每次属性值更改时都重绘自身。因此，我们将为每个属性提供显式的 setter 方法。如果存在显式方法，它们总是会取代任何合成的方法。实际上，这也引出了我们在属性声明中使用\
    \ `nonatomic` 的另一个原因：如果没有它，编译器不允许我们将合成的 getter 与显式的 setter 混合使用，从而会产生警告。\n\n在我们进行所有这些新操作的同时，我们将介绍\
    \ LLVM 编译器中的一个漂亮的新功能。任何时候我们在接口中声明一个属性，实际上都可以完全省略 `@synthesize` 行！如果我们这样做，编译器仍然会为我们创建一个实例变量，其名称将是属性名前加下划线。我们可以在以下代码中看到这一点，这段代码应添加到我们类的\
