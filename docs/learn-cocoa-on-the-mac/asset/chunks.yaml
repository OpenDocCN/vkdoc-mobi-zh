  trans: "\n### 绘制曲线\n\n接下来进入有趣的部分：绘制曲线本身。我们将使用预处理器 `#defines` 来定义颜色和线宽的值，便于定位和调整外观。在\
    \ `CECurveView.m` 顶部附近添加以下代码：\n\n```\n#define CP_RADIUS 0.1\n#define CP_DIAMETER\
    \ (CP_RADIUS*2)\n#define BACKGROUND_COLOR [NSColor whiteColor]\n#define GRID_STROKE_COLOR\
    \ [NSColor lightGrayColor]\n#define GRID_FILL_COLOR [NSColor colorWithCalibratedWhite:0.9\
    \ alpha:1.0]\n#define CURVE_COLOR [NSColor blackColor]\n#define LINE_TO_CP_COLOR\
    \ [NSColor darkGrayColor]\n#define CP_GRADIENT_COLOR1 [NSColor lightGrayColor]\n\
    #define CP_GRADIENT_COLOR2 [NSColor darkGrayColor]\n```\n\n我们将按照以下示例实现 `drawControlPointAtX:y:`\
    \ 和 `drawRect:` 方法。绘制控制点的代码演示了 `NSGradient` 类的使用，该类可用于填充贝塞尔路径内部，而不仅仅是纯色填充。\n\n\
    ```\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y {\n    NSBezierPath *cp\
    \ = [NSBezierPath bezierPathWithOvalInRect:\n        NSMakeRect(x - CP_RADIUS,\
    \ y - CP_RADIUS,\n        CP_DIAMETER, CP_DIAMETER)];\n    NSGradient *g;\n  \
    \  g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n        endingColor:CP_GRADIENT_COLOR2];\n\
    \    [g drawInBezierPath:cp\n        relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n\
    }\n\n- (void)drawRect:(NSRect)rect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \n    // 绘制背景\n    NSBezierPath *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n\
    \        xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR set];\n    [bg fill];\n\
    \n    // 绘制网格\n    NSBezierPath *grid1 = [NSBezierPath bezierPath];\n    [grid1\
    \ moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
    \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 moveToPoint:NSMakePoint(0.5,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
    \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR\
    \ set];\n    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
    \    [grid1 stroke];\n\n    // 绘制指向控制点的连线\n    NSBezierPath *cpLines = [NSBezierPath\
    \ bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0, 0.0)];\n    [cpLines\
    \ lineToPoint:NSMakePoint(self.cp1X, self.cp1Y)];\n    [cpLines moveToPoint:NSMakePoint(1.0,\
    \ 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X, self.cp2Y)];\n    [LINE_TO_CP_COLOR\
    \ set];\n    [cpLines setLineWidth:0.01];\n    [cpLines stroke];\n\n    // 绘制曲线本身\n\
    \    NSBezierPath *bp = [NSBezierPath bezierPath];\n    [bp moveToPoint:NSMakePoint(0.0,\
    \ 0.0)];\n    [bp curveToPoint:NSMakePoint(1.0, 1.0)\n        controlPoint1:NSMakePoint(self.cp1X,\
    \ self.cp1Y)\n        controlPoint2:NSMakePoint(self.cp2X, self.cp2Y)];\n    [CURVE_COLOR\
    \ set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\n    // 绘制控制点\n    [self\
    \ drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n这种绘图代码可能会使方法变得相当冗长，但通常逻辑非常直接，正如前面展示的\
    \ `drawRect:` 方法。整个方法中没有一个循环或 `if` 结构！注意，与第 14 章中的笑脸符号代码不同，此绘图代码完全未引用视图的边界矩形。因为我们知道边界始终被调整为包含从\
    \ (0,0) 到 (1,1) 的方形区域，所以直接使用简单的硬编码值在该单位方形内及其周围绘制图形。\n\n点击“运行”按钮启动应用，其外观应类似于图 15-1。我们应当能够编辑文本框中的数值（0.0\
    \ 到 1.0 之间的任意值均可正常工作），并看到控制点和曲线随之相应变化。\n"
- fmt: "### Watching the Mouse\n\nBut entering numeric values into text fields isn't\
    \ the point of this exercise; we want to drag those control points around. As\
    \ it turns out, this is pretty simple to do. `NSView` contains methods that are\
    \ automatically called whenever a user interacts with the view by clicking, dragging,\
    \ and so on. All we have to do is override a few methods, and we can respond to\
    \ every click, drag, and release of the mouse.\n\nLet's start by adding a pair\
    \ of `BOOL` properties to our view to keep track of whether one of the control\
    \ points is currently being dragged. Add the following two lines to the `@interface`\
    \ declaration in `CECurveView.h`:\n\n```\n@property (assign) BOOL draggingCp1;\n\
    @property (assign) BOOL draggingCp2;\n```\n\nNow let's add some methods to the\
    \ `@implementation` section of `CECurveView.m` in order to start intercepting\
    \ the mouse activity we want to watch. The first method, `mouseDown:`, will be\
    \ called whenever a user clicks in our view.\n\n```\n- (void)mouseDown:(NSEvent\
    \ *)theEvent {\n\n    // get current mouse location, convert to our coordinate\
    \ space\n    // (the one expresed by our bounds)\n\n    NSPoint mouseLocation\
    \ = [theEvent locationInWindow];\n    NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
    \                                          fromView:nil];\n\n    // see if the\
    \ click was on one of our control knobs\n    NSPoint cp1 = NSMakePoint(self.cp1X,\
    \ self.cp1Y);\n    NSPoint cp2 = NSMakePoint(self.cp2X, self.cp2Y);\n\n    if\
    \ (pointsWithinDistance(self.cp1, convertedLocation, CP_RADIUS)) {\n        self.draggingCp1\
    \ = YES;\n    } else if (pointsWithinDistance(cp2, convertedLocation, CP_RADIUS)){\n\
    \        self.draggingCp2 = YES;\n    }\n\n    [self setNeedsDisplay:YES];\n}\n\
    ```\n\nIn the `mouseDown:` method, we first ask the window for the current mouse\
    \ location, then use a built-in `NSView` method to convert the coordinates from\
    \ the window's coordinate system to our own. This means that a click in the upper\
    \ right-hand corner of our unit square, for instance, which starts off being the\
    \ number of horizontal and vertical pixels from the window's lower left-hand corner,\
    \ will end up being converted to (1,1) or somewhere nearby. Then we do a pair\
    \ of tests to see if one of our control points is being clicked. This test is\
    \ done using the following function, which we should add to the top of `CurveEdit.m`,\
    \ between the group of `#defines` and the `@implementation` section:\n\n```\n\
    static BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d) {\n    return\
    \ pow((p1.x-p2.x), 2) + pow((p1.y - p2.y), 2) <= pow(d, 2);\n}\n```\n\nThe `pointsWithinDistance`\
    \ function makes use of the Pythagorean formula to determine whether the distance\
    \ between the two points (in our case, the center of a control point and the location\
    \ of the mouse) is less than the distance we pass in (the control point radius).\
    \ Using this, we are able to check to see whether the user clicked on a control\
    \ point, and if so, we set the corresponding flag (`draggingCp1` or `draggingCp2`)\
    \ to `YES`.\n\nThe next method to implement is `mouseDragged:`, which is called\
    \ every time the mouse is moved while the button is held down. Note that this\
    \ method is not called in every view the mouse is dragged over. It's always called\
    \ in the view where the original mouse click occurred; in a sense, whichever view\
    \ receives the click \"owns\" all subsequent dragging. In this method, we once\
    \ again grab the mouse location from the event, transform it into our view's own\
    \ coordinate system, and then update the coordinates for the control point that's\
    \ currently being dragged. If none of them are currently being dragged, then nothing\
    \ happens.\n\n```\n- (void)mouseDragged:(NSEvent *)theEvent {\n\n    NSPoint mouseLocation\
    \ = [theEvent locationInWindow];\n    NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
    \                                          fromView:nil];\n\n    if (self.draggingCp1)\
    \ {\n        self.cp1X = convertedLocation.x;\n        self.cp1Y = convertedLocation.y;\n\
    \    } else if (self.draggingCp2) {\n        self.cp2X = convertedLocation.x;\n\
    \        self.cp2Y = convertedLocation.y;\n    }\n\n    [self setNeedsDisplay:YES];\n\
    }\n```\n\nThe final method we need for dealing with the mouse is `mouseUp:`, which\
    \ lets us handle the release of the button. Like `mouseDragged:`, `mouseUp:` is\
    \ always called on the view that originated the drag, which means that after the\
    \ user clicks in our view, no matter where the user lets go of the mouse button,\
    \ we will receive this message. All we do here is simply set the flags to indicate\
    \ that nothing is being dragged.\n\n```\n- (void)mouseUp:(NSEvent *)theEvent {\n\
    \    self.draggingCp1 = NO;\n    self.draggingCp2 = NO;\n}\n```\n\nWith all that\
    \ in place, Run the app. We should be able to drag the controls around, with the\
    \ curve following every move, and the numbers in the text fields will change as\
    \ we drag.\n\n### A Little Polish\n\nThat's pretty cool, but as we've often noticed\
    \ when toying around with a new GUI design, some enhancements become self-evident\
    \ with a little use. For one thing, we're always drawing the control points in\
    \ the same order, so control point 2 is always on top, even if we're dragging\
    \ control point 1 right over it. This feels pretty unnatural. Fortunately, the\
    \ fix for this is extremely simple, and this is the real, practical reason we\
    \ split out the control point drawing into two separate methods. At the end of\
    \ the `drawRect:` method, add the bold lines shown here:\n\n```\n// draw the control\
    \ points\nif (self.draggingCp1) {\n    [self drawControlPointAtX:self.cp2X y:self.cp2Y];\n\
    \    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n} else {\n    [self drawControlPointAtX:self.cp1X\
    \ y:self.cp1Y];\n    [self drawControlPointAtX:self.cp2X y:self.cp2Y];\n}\n```\n\
    \nThat's it! Click Run. Note that whenever we're dragging the first control point,\
    \ it appears in front of the second.\n\nIt would also be nice to highlight the\
    \ control point that's currently being dragged, maybe by drawing it with a different\
    \ color. This is also a pretty easy change that gives the user some useful feedback.\
    \ Start by defining some highlight colors for a new gradient, adding these lines\
    \ among the other `#defines` at the top of the file:\n\n```\n#define CP_GRADIENT_HIGHLIGHT_COLOR1\
    \ [NSColor whiteColor]\n#define CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]\n\
    ```\n\nNow, modify the `drawControlPointAtX:y:` methods, adding an additional\
    \ parameter to specify whether or not do draw the highlighted variant, by adding\
    \ the following bold lines:\n\n```\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y\
    \ dragging:(BOOL)dragging {\n    NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n\
    \        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];\n\
    \    NSGradient *g;\n\n    if (dragging) {\n        g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
    \                                          endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n\
    \    } else {\n        g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n\
    \                                          endingColor:CP_GRADIENT_COLOR2];\n\
    \    }\n\n    [g drawInBezierPath:cp\n       relativeCenterPosition:NSMakePoint(0.0,\
    \ 0.0)];\n}\n```\n\nBecause we added a parameter to the control-point drawing\
    \ method, we need to also change the way it's called at the end of `drawRect:`,\
    \ like this:\n\n```\n// draw the control points\nif (self.draggingCp1) {\n   \
    \ [self drawControlPointAtX:self.cp2X y:self.cp2Y dragging:self.draggingCp2];\n\
    \    [self drawControlPointAtX:self.cp1X y:self.cp1Y dragging:self.draggingCp1];\n\
    } else {\n    [self drawControlPointAtX:self.cp1X y:cp1Y dragging:self.draggingCp1];\n\
    \    [self drawControlPointAtX:self.cp2X y:self.cp2Y dragging:self.draggingCp2];\n\
    }\n```\n\nNow click Run, and see that the otherwise gray control points now light\
    \ up red while dragging, giving the user a nice visual cue. Also note that the\
    \ control point that was most recently dragged stays red when we release. To fix\
    \ this, add\n\n```\n[self setNeedsDisplay:YES];\n```\n\nto the end of the `mouseUp:`\
    \ method."
  raw: '### Watching the Mouse


    But entering numeric values into text fields isn’t the point of this exercise;
    we want to drag those control points around. As it turns out, this is pretty simple
    to do. `NSView` contains methods that are automatically called whenever a user
    interacts with the view by clicking, dragging, and so on. All we have to do is
    override a few methods, and we can respond to every click, drag, and release of
    the mouse.


    Let’s start by adding a pair of `BOOL` properties to our view to keep track of
    whether one of the control points is currently being dragged. Add the following
    two lines to the `@interface` declaration in `CECurveView.h`:


    `@property (assign) BOOL draggingCp1;`


    `@property (assign) BOOL draggingCp2;`


    Now let’s add some methods to the `@implementation` section of `CECurveView.m`
    in order to start intercepting the mouse activity we want to watch. The first
    method, `mouseDown:`, will be called whenever a user clicks in our view.


    `- (void)mouseDown:(NSEvent *)theEvent {`


    `// get current mouse location, convert to our coordinate space`


    `// (the one expresed by our bounds)`


    `NSPoint mouseLocation = [theEvent locationInWindow];`


    `NSPoint convertedLocation = [self convertPoint:mouseLocation`


    `fromView:nil];`


    `// see if the click was on one of our control knobs`


    `NSPoint cp1 = NSMakePoint(self.cp1X, self.cp1Y);`


    `NSPoint cp2 = NSMakePoint(self.cp2X, self.cp2Y);`


    `if (pointsWithinDistance(self.cp1, convertedLocation, CP_RADIUS)) {`


    `self.draggingCp1 = YES;`


    `} else if (pointsWithinDistance(cp2, convertedLocation, CP_RADIUS)){`


    `self.draggingCp2 = YES;`


    `}`


    `[self setNeedsDisplay:YES];`


    `}`


    In the `mouseDown:` method, we first ask the window for the current mouse location,
    then use a built-in `NSView` method to convert the coordinates from the window’s
    coordinate system to our own. This means that a click in the upper right-hand
    corner of our unit square, for instance, which starts off being the number of
    horizontal and vertical pixels from the window’s lower left-hand corner, will
    end up being converted to (1,1) or somewhere nearby. Then we do a pair of tests
    to see if one of our control points is being clicked. This test is done using
    the following function, which we should add to the top of `CurveEdit.m`, between
    the group of `#defines` and the `@implementation` section:


    `static BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d) {`


    `return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y), 2) <= pow(d, 2);`


    `}`


    The `pointsWithinDistance` function makes use of the Pythagorean formula to determine
    whether the distance between the two points (in our case, the center of a control
    point and the location of the mouse) is less than the distance we pass in (the
    control point radius). Using this, we are able to check to see whether the user
    clicked on a control point, and if so, we set the corresponding flag (`draggingCp1`
    or `draggingCp2`) to `YES`.


    The next method to implement is `mouseDragged:`, which is called every time the
    mouse is moved while the button is held down. Note that this method is not called
    in every view the mouse is dragged over. It’s always called in the view where
    the original mouse click occurred; in a sense, whichever view receives the click
    “owns” all subsequent dragging. In this method, we once again grab the mouse location
    from the event, transform it into our view’s own coordinate system, and then update
    the coordinates for the control point that’s currently being dragged. If none
    of them are currently being dragged, then nothing happens.


    `- (void)mouseDragged:(NSEvent *)theEvent {`


    `NSPoint mouseLocation = [theEvent locationInWindow];`


    `NSPoint convertedLocation = [self convertPoint:mouseLocation`


    `fromView:nil];`


    `if (self.draggingCp1) {`


    `self.cp1X = convertedLocation.x;`


    `self.cp1Y = convertedLocation.y;`


    `} else if (self.draggingCp2) {`


    `self.cp2X = convertedLocation.x;`


    `self.cp2Y = convertedLocation.y;`


    `}`


    `[self setNeedsDisplay:YES];`


    `}`


    The final method we need for dealing with the mouse is `mouseUp:`, which lets
    us handle the release of the button. Like `mouseDragged:`, `mouseUp:` is always
    called on the view that originated the drag, which means that after the user clicks
    in our view, no matter where the user lets go of the mouse button, we will receive
    this message. All we do here is simply set the flags to indicate that nothing
    is being dragged.


    `- (void)mouseUp:(NSEvent *)theEvent {`


    `self.draggingCp1 = NO;`


    `self.draggingCp2 = NO;`


    `}`


    With all that in place, Run the app. We should be able to drag the controls around,
    with the curve following every move, and the numbers in the text fields will change
    as we drag.


    ### A Little Polish


    That’s pretty cool, but as we’ve often noticed when toying around with a new GUI
    design, some enhancements become self-evident with a little use. For one thing,
    we’re always drawing the control points in the same order, so control point 2
    is always on top, even if we’re dragging control point 1 right over it. This feels
    pretty unnatural. Fortunately, the fix for this is extremely simple, and this
    is the real, practical reason we split out the control point drawing into two
    separate methods. At the end of the `drawRect:` method, add the bold lines shown
    here:


    `// draw the control points`


    `if (self.draggingCp1) {`


      `[self drawControlPointAtX:self.cp2X y:self.cp2Y];`


      `[self drawControlPointAtX:self.cp1X y:self.cp1Y];`


    `} else {`


      `[self drawControlPointAtX:self.cp1X y:self.cp1Y];`


      `[self drawControlPointAtX:self.cp2X y:self.cp2Y];`


    `}`


    That’s it! Click Run. Note that whenever we’re dragging the first control point,
    it appears in front of the second.


    It would also be nice to highlight the control point that’s currently being dragged,
    maybe by drawing it with a different color. This is also a pretty easy change
    that gives the user some useful feedback. Start by defining some highlight colors
    for a new gradient, adding these lines among the other `#defines` at the top of
    the file:


    `#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]`


    `#define CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]`


    Now, modify the `drawControlPointAtX:y:` methods, adding an additional parameter
    to specify whether or not do draw the highlighted variant, by adding the following
    bold lines:


    `- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y dragging:(BOOL)dragging {`


      `NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:`


        `NSMakeRect(x - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];`


      `NSGradient *g;`


      `if (dragging) {`


        `g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1`


                                `endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];`


      `} else {`


        `g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1`


                                `endingColor:CP_GRADIENT_COLOR2];`


      `}`


      `[g drawInBezierPath:cp`


         `relativeCenterPosition:NSMakePoint(0.0, 0.0)];`


    `}`


    Because we added a parameter to the control-point drawing method, we need to also
    change the way it’s called at the end of `drawRect:`, like this:


    `// draw the control points`


    `if (self.draggingCp1) {`


      `[self drawControlPointAtX:self.cp2X y:self.cp2Y dragging:self.draggingCp2];`


      `[self drawControlPointAtX:self.cp1X y:self.cp1Y dragging:self.draggingCp1];`


    `} else {`


      `[self drawControlPointAtX:self.cp1X y:cp1Y dragging:self.draggingCp1];`


      `[self drawControlPointAtX:self.cp2X y:self.cp2Y dragging:self.draggingCp2];`


    `}`


    Now click Run, and see that the otherwise gray control points now light up red
    while dragging, giving the user a nice visual cue. Also note that the control
    point that was most recently dragged stays red when we release. To fix this, add


    `[self setNeedsDisplay:YES];`


    to the end of the `mouseUp:` method.'
  trans: "\n### 监听鼠标\n\n不过，在文本框中输入数值并非本练习的重点；我们的目标是拖拽那些控制点。事实证明，这一操作相当简单。`NSView`\
    \ 包含了一些方法，当用户通过点击、拖拽等方式与视图交互时，这些方法会被自动调用。我们只需要重写几个方法，就能对每一次鼠标点击、拖拽和松开做出响应。\n\n\
    首先，在视图中添加一对 `BOOL` 类型的属性，用于追踪当前是否有控制点正在被拖拽。在 `CECurveView.h` 文件的 `@interface`\
    \ 声明中，添加以下两行代码：\n\n```\n@property (assign) BOOL draggingCp1;\n@property (assign)\
    \ BOOL draggingCp2;\n```\n\n现在，我们在 `CECurveView.m` 文件的 `@implementation` 部分添加一些方法，以便开始拦截我们想要监听的鼠标活动。第一个方法是\
    \ `mouseDown:`，当用户在视图中点击时，它会被调用。\n\n```\n- (void)mouseDown:(NSEvent *)theEvent\
    \ {\n\n    // 获取当前鼠标位置，并转换到我们的坐标空间\n    // （即由 bounds 表示的坐标空间）\n\n    NSPoint\
    \ mouseLocation = [theEvent locationInWindow];\n    NSPoint convertedLocation\
    \ = [self convertPoint:mouseLocation\n                                       \
    \   fromView:nil];\n\n    // 检查点击是否发生在其中一个控制旋钮上\n    NSPoint cp1 = NSMakePoint(self.cp1X,\
    \ self.cp1Y);\n    NSPoint cp2 = NSMakePoint(self.cp2X, self.cp2Y);\n\n    if\
    \ (pointsWithinDistance(self.cp1, convertedLocation, CP_RADIUS)) {\n        self.draggingCp1\
    \ = YES;\n    } else if (pointsWithinDistance(cp2, convertedLocation, CP_RADIUS)){\n\
    \        self.draggingCp2 = YES;\n    }\n\n    [self setNeedsDisplay:YES];\n}\n\
    ```\n\n在 `mouseDown:` 方法中，我们首先向窗口请求当前鼠标位置，然后使用内置的 `NSView` 方法将坐标从窗口的坐标系转换到我们自己的坐标系。这意味着，例如，在单位正方形右上角的点击（其初始值为距离窗口左下角的水平和垂直像素数），最终会被转换为\
    \ (1,1) 或附近的值。接着，我们进行两次测试，检查是否有控制点被点击。该测试使用了下面的函数，我们需要将它添加到 `CurveEdit.m` 文件的顶部，位于\
    \ `#defines` 组和 `@implementation` 部分之间：\n\n```\nstatic BOOL pointsWithinDistance(NSPoint\
    \ p1, NSPoint p2, CGFloat d) {\n    return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y),\
    \ 2) <= pow(d, 2);\n}\n```\n\n`pointsWithinDistance` 函数利用勾股定理来判断两点（在我们的场景中，即控制点的中心和鼠标位置）之间的距离是否小于我们传入的距离（控制点半径）。通过这种方式，我们能够检查用户是否点击了某个控制点，如果是，就将相应的标志位（`draggingCp1`\
    \ 或 `draggingCp2`）设置为 `YES`。\n\n接下来需要实现的方法是 `mouseDragged:`，当鼠标按钮被按住并移动时，该方法会被反复调用。请注意，该方法并非在鼠标滑过的每个视图中都被调用，它总是在最初发生鼠标点击的视图中被调用；从某种意义上说，接收点击的那个视图“拥有”之后所有的拖拽事件。在这个方法中，我们再次从事件中获取鼠标位置，将其转换到我们视图自身的坐标系，然后更新当前正在被拖拽的控制点的坐标。如果没有任何控制点正在被拖拽，则什么也不会发生。\n\
    \n```\n- (void)mouseDragged:(NSEvent *)theEvent {\n\n    NSPoint mouseLocation\
    \ = [theEvent locationInWindow];\n    NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
    \                                          fromView:nil];\n\n    if (self.draggingCp1)\
    \ {\n        self.cp1X = convertedLocation.x;\n        self.cp1Y = convertedLocation.y;\n\
    \    } else if (self.draggingCp2) {\n        self.cp2X = convertedLocation.x;\n\
    \        self.cp2Y = convertedLocation.y;\n    }\n\n    [self setNeedsDisplay:YES];\n\
    }\n```\n\n处理鼠标所需的最有一个方法是 `mouseUp:`，它让我们能够处理按钮松开的事件。与 `mouseDragged:` 类似，`mouseUp:`\
    \ 也总是在发起拖拽的原始视图上被调用，这意味着用户在我们的视图中点击后，无论在哪里松开鼠标按钮，我们都会收到这条消息。这里我们仅需设置标志位，以指示没有任何东西正在被拖拽。\n\
    \n```\n- (void)mouseUp:(NSEvent *)theEvent {\n    self.draggingCp1 = NO;\n   \
    \ self.draggingCp2 = NO;\n}\n```\n\n完成以上所有设置后，运行应用程序。我们应该能够拖拽控制点，曲线会随之移动，并且文本框中显示的数值也会在我们拖拽时同步更新。\n\
    \n### 一点小改进\n\n这已经很酷了，但正如我们在尝试新的 GUI 设计时经常注意到的，随着使用的深入，一些改进会变得显而易见。首先，我们总是以相同的顺序绘制控制点，因此即使我们将控制点\
    \ 1 拖拽到控制点 2 的正上方，控制点 2 也始终位于最上层。这感觉很不自然。幸运的是，修复这个问题非常简单，这也是我们将控制点绘制拆分成两个独立方法的真正实用原因。在\
    \ `drawRect:` 方法的末尾，添加如下粗体所示的行：\n\n```\n// 绘制控制点\nif (self.draggingCp1) {\n  \
    \  [self drawControlPointAtX:self.cp2X y:self.cp2Y];\n    [self drawControlPointAtX:self.cp1X\
    \ y:self.cp1Y];\n} else {\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n\
    \    [self drawControlPointAtX:self.cp2X y:self.cp2Y];\n}\n```\n\n就是这样！点击运行。注意，当我们在拖拽第一个控制点时，它会显示在第二个控制点的前面。\n\
    \n如果能在拖拽过程中高亮显示当前被拖拽的控制点（例如使用不同的颜色绘制）也会很不错。这也是一项相当简单的修改，能为用户提供有用的视觉反馈。首先，为新的渐变定义一些高亮颜色，在文件顶部的其他\
    \ `#defines` 中添加以下代码行：\n\n```\n#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]\n\
    #define CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]\n```\n\n现在，修改 `drawControlPointAtX:y:`\
    \ 方法，通过添加以下粗体代码行，增加一个参数来指定是否绘制高亮版本：\n\n```\n- (void)drawControlPointAtX:(CGFloat)x\
    \ y:(CGFloat)y dragging:(BOOL)dragging {\n    NSBezierPath *cp = [NSBezierPath\
    \ bezierPathWithOvalInRect:\n        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS,\
    \ CP_DIAMETER, CP_DIAMETER)];\n    NSGradient *g;\n\n    if (dragging) {\n   \
    \     g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
    \                                          endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n\
    \    } else {\n        g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n\
    \                                          endingColor:CP_GRADIENT_COLOR2];\n\
    \    }\n\n    [g drawInBezierPath:cp\n       relativeCenterPosition:NSMakePoint(0.0,\
    \ 0.0)];\n}\n```\n\n由于我们给控制点绘制方法增加了一个参数，因此还需要相应修改 `drawRect:` 末尾调用它的方式，如下所示：\n\
    \n```\n// 绘制控制点\nif (self.draggingCp1) {\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y dragging:self.draggingCp2];\n    [self drawControlPointAtX:self.cp1X\
    \ y:self.cp1Y dragging:self.draggingCp1];\n} else {\n    [self drawControlPointAtX:self.cp1X\
    \ y:cp1Y dragging:self.draggingCp1];\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y dragging:self.draggingCp2];\n}\n```\n\n现在点击运行，可以看到原本灰色的控制点在拖拽时会亮起红色，为用户提供了良好的视觉提示。同时请注意，如果我们松开鼠标，最近被拖拽的那个控制点会保持红色。要修复这个问题，请在\
    \ `mouseUp:` 方法的末尾添加：\n\n```\n[self setNeedsDisplay:YES];\n```\n\n"
- fmt: "# Core Animation: A Primer\n\nOne of the most exciting technologies Apple\
    \ includes with Mac OS X is a graphics system called Core Animation, which lets\
    \ us easily create animated effects in our applications. We can make our views\
    \ slide, fade, rotate, and scale smoothly and easily, often with just a few lines\
    \ of code. In essence, Core Animation lets us specify a change in an object—such\
    \ as changing its location to a different spot in the window—in such a way that,\
    \ instead of the change happening instantaneously, it’s automatically split up\
    \ into several small movements that are rendered over time by Core Animation.\
    \ We can specify a transition’s length in seconds, as well as the timing or pacing\
    \ of the change. We can also group animations together so that they all execute\
    \ in perfect synchrony.\n\n## Core Animation Basics\n\nFrom a technical standpoint,\
    \ the basic unit at the heart of all this is a class called `CALayer` (a pre-release\
    \ version of Core Animation was even called Layer Kit). Each `NSView` can optionally\
    \ have a `CALayer` attached to it, either by flicking a switch in Interface Builder\
    \ or setting it up in code. The process of assigning a layer to a view actually\
    \ begins a recursive process through all the view’s subviews, so that when a view\
    \ has a layer, all its subviews (and all their subviews, and so on) also acquire\
    \ layers. Once a layer is in place, we can start animating the view.\n\nUnder\
    \ the hood, each `CALayer` is associated with some OpenGL structures for rendering\
    \ its graphics. OpenGL does a really great job of quickly drawing rectangles to\
    \ the screen, even rectangles that are resized, rotated, and the like, so using\
    \ `CALayer` lets us have views that do all sorts of on-screen tricks without slowing\
    \ our application down. The Core Animation APIs shield us completely from OpenGL\
    \ itself, so it will work away quietly without us having to think about it too\
    \ much. The only thing to bear in mind is that each layer uses some amount of\
    \ the memory available to the computer’s graphics hardware, so we’re better off\
    \ using layers only for those parts of our application where we actually want\
    \ to do some animation, instead of applying them to every view in every window.\n\
    \n### Implicit Animations\n\nAny layer-backed view can be animated by using its\
    \ animator proxy. This is a special object that acts as a substitute for the view\
    \ itself, setting up an animation corresponding to the method it’s sent instead\
    \ of making an immediate change. For instance, if we want to animate the movement\
    \ of a view, then instead of setting its frame like\n\n`[myView setFrame:newFrame];`\n\
    \nwe can set it like this:\n\n`[[myView animator] setFrame:newFrame];`\n\nTo see\
    \ this in action, create a new Cocoa project, name it MovingButton, and use MB\
    \ as the class prefix. First we’ll set up the user interface. Open `MainMenu.xib`\
    \ in an Interface Builder canvas, open up the MovingButton window, and put a button\
    \ called Move in the empty window. Next, open up an Assistant Editor, and open\
    \ up the `MBAppDelegate.h` file in the it. Control-drag from the button to the\
    \ `MBAppDelegate.h` file, adding an action right below the `@property` declaration\
    \ for the window. Call the new action `move`.\n\nNow, let’s fill in the implementation\
    \ of the `move:` action, as shown here:\n\n```\n- (IBAction)move:(id)sender {\n\
    \n  NSRect senderFrame = [sender frame];\n\n  NSRect superBounds = [[sender superview]\
    \ bounds];\n\n  senderFrame.origin.x = (superBounds.size.width -\n\n    senderFrame.size.width)\
    \ * drand48();\n\n  senderFrame.origin.y = (superBounds.size.height -\n\n    senderFrame.size.height)\
    \ * drand48();\n\n  [sender setFrame:senderFrame];\n\n}\n```\n\nThis simple action\
    \ method just calculates a new random location for sender within its superview\
    \ and moves it there. Save the changes, Run the project, and see that each time\
    \ we click the Move button, it hops to another location in the window.\n\nNow,\
    \ let’s animate the movement. We just need to edit a single line, changing\n\n\
    `[sender setFrame:senderFrame];`\n\nto\n\n`[[sender animator] setFrame:senderFrame];`\n\
