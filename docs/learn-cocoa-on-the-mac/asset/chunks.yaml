- fmt: '### Inserting a Text View


    Now it’s time for the final control, a text view for editing free-form notes about
    the villain in question. We’ll be using `NSTextView`, a powerful class for text
    display and editing that is used throughout the Mac OS X interface. Grab the resize
    handle on the outline of the window in the Interface Builder canvas, and drag
    down to make the window larger. Some of the fields might go with it; reposition
    them back where they should be after resizing. We can select multiple elements
    by shift-clicking or by dragging out a selection rectangle across the ones that
    we want to move.


    Once we’ve got some space, enter “text view” in the Object Library pane’s Search
    field, and drag the resulting text view into our window, below all the other elements.
    Resize it to fill most of the available space. The window layout should now look
    something like Figure 5-11.


    ![A978-1-4302-4543-8_5_Fig11_HTML.jpg](A978-1-4302-4543-8_5_Fig11_HTML.jpg)


    Figure 5-11. All the controls are now in the window


    ### Making Logical Groupings


    Now that all the controls we need are laid out in the window, let’s take a step
    back and see where we stand. Figure 5-11 probably looks similar to the interface
    we have right now.


    It may be functional, and clearly labeled, but it’s not going to win any design
    awards, that’s for sure. Our interface exposes a lot of functionality, but the
    controls are all sort of jammed together, and it’s hard to see any logical groupings
    of all these editable attributes. We can improve things a bit by grouping related
    controls inside of box views; Cocoa provides us with a class called `NSBox` that
    can contain several other objects and draws a nice border around them.


    Xcode contains a helpful shortcut that lets us put existing views into a box perfectly
    sized to contain them all precisely within its borders, so it’s really easy to
    add this enhancement to our interface. To start, select the first five controls
    (in the upper left-hand of the window) and all of their labels. The easiest way
    to do this is to click in the upper left corner of the window, just below the
    window’s close/minimize/maximize controls, and drag a selection box around all
    the views we want to select. Then choose Editor ➤ Embed In ➤ Box from the menu—a
    nice box will surround them, with a darker gray background color and rounded corners.
    At the top of the box is a text label (“Box”) that can be edited to something
    descriptive of the box’s contents. Double-click that text, and change it to “Basic
    Information.”


    Go on and do the same thing for the Primary Motivation section. First, delete
    the label by selecting it and pressing Backspace or Delete. Because there’s only
    one set of controls in the box we’re going to create, we can just use the box’s
    title instead. Now select the matrix of radio buttons, and once again select Editor
    ➤ Embed In ➤ Box from the menu. Our radio buttons are now contained within a box.
    Change the box’s label to “Primary Motivation.”


    Repeat those steps for the mugshot, once again deleting the existing label first,
    then creating the box via the menu, and finishing up by setting the box’s label
    to “Appearance.”


    Now move on to the powers and abilities. Select the Source of Powers pop-up button
    and its label, along with the matrix of checkboxes for Abilities. Once again,
    the easiest way to do this is probably to “draw a box” by clicking in the background
    near the window’s top-right corner, and dragging down and to the left until all
    the relevant items are selected. Use the menu to put these views in a box, and
    title the box “Powers and Abilities.”


    Finally, select the text view created for the villain’s notes property, and put
    that into a box of its own, entitled “Notes.”


    Now we’ve got a bunch of boxes created, but they’re probably overlapping and generally
    not very well positioned relative to each other (as shown in Figure 5-12).


    ![A978-1-4302-4543-8_5_Fig12_HTML.jpg](A978-1-4302-4543-8_5_Fig12_HTML.jpg)


    Figure 5-12. Not the prettiest box layout we’ve ever seen


    Don’t worry; Xcode’s blue guidelines will help us get this straightened out in
    no time. Start with the first box in the upper left-hand corner. Click anywhere
    in the dark background of the box (but not on a control or label) to start dragging
    the entire box. As we move it around a bit, the blue guidelines will appear. The
    guidelines can help us position the boxes, or any views, relative to one another
    or relative to the window itself. We can always tell what a guideline is lining
    up with by following it to its end and seeing what it connects with. When it runs
    all the way to the edge of the window, we know it’s setting us up for the recommended
    distance from the window’s edge.


    Now move on to the Primary Motivation box, lining it up with the left edge of
    the box above it and a few pixels below it, again using the guidelines to help
    get it just right. Then take the Appearance box and line it up vertically with
    the Primary Motivation box and horizontally with the right edge of the Basic Information
    box.


    Continue with the other boxes, lining up the Powers and Abilities box to the right
    of the ones we’ve already done, then the Notes box below everything else. If you
    run out of space during all this movement, or if your window is much larger than
    the combined size of all your other views, resize your window a bit in order to
    fit everything.


    Finish this step by moving the Notes box into the gap left in the lower right,
    and resizing the `NSTextView` inside of it to fit its new boundaries and margins,
    and perhaps tweaking the sizes of some of the other boxes to make them all fit
    together in a uniform way. Figure 5-13 shows the ideal result. If you haven’t
    done so already, be sure to save the nib file!


    ![A978-1-4302-4543-8_5_Fig13_HTML.jpg](A978-1-4302-4543-8_5_Fig13_HTML.jpg)


    Figure 5-13. Finally, a window layout to be proud of!


    ### Resizing


    We’ve got a nice-looking window now, but there’s a bit more work to be done here
    to make everything behave properly: we need to be able to handle when the user
    resizes a window. To understand why that’s even necessary, test the interface
    by selecting Simulate Document from the Editor menu. Now resize the window and
    see what happens. As we’ve laid out the window, all the controls will stay put
    as we resize the window vertically, but we can shrink the window vertically to
    the point where some controls aren’t visible, and we can’t resize the window horizontally
    at all. (Depending on how you laid out the controls as you’ve been following along,
    your resize behavior may vary from this.) We’ll explore resizing in more depth
    in the next chapter. For now, we’re going to make the window non-resizable by
    setting the minimum and maximum dimensions of the window to be the same size,
    and then we’re going to move on to coding.


    Xcode makes this easy. With the VillainTracker window highlighted in the Interface
    Builder Editor canvas, select the Size Inspector (`⌥⌘5`). The values given for
    the width and height for the current size, minimum size, and maximum size should
    all be the same. Check the checkboxes for both Minimum Size and Maximum Size constraints,
    as shown in Figure 5-14.


    ![A978-1-4302-4543-8_5_Fig14_HTML.jpg](A978-1-4302-4543-8_5_Fig14_HTML.jpg)


    Figure 5-14. Setting the window’s size constraints'
