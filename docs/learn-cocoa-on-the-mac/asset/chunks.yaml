    \ = [NSMutableArray array];\n        self.monsters = [NSMutableArray array];\n\
    \        self.dungeons = [NSMutableArray array];\n    }\n    return self;\n}\n\
    ```\n\n### 规范的 init 方法\n\n前面的代码片段展示了一个`init`方法的示例，该方法为类的实例变量创建值。这种`init`方法的形式相当标准，你很可能在大多数遇到的\
    \ Objective-C 类中看到类似的写法，但它做了一些乍看起来很奇怪的事情，因此值得稍作解释。该方法以这个特殊的`if`语句开头：\n\n```\n\
    if ((self = [super init])) {\n```\n\n这个`if`语句实际上一石二鸟（或更多）。首先，它调用了父类的`init`实现，并将其返回值赋给特殊变量`self`。然后，它检查赋值的结果本身（即赋值后的`self`的值），并且仅当其不等于评估为`false`的值（例如\
    \ nil 指针值）时，才执行后面的代码块。\n\n这种对`self`的使用方式，即为其赋值，确实非常罕见。事实上，我们看到为`self`赋值的代码的唯一情况，就是在像这样的`init`方法中。这样做的原因是为了应对一种可能性（尽管很小），即父类的`init`方法可能返回与最初`self`所指向的值不同的值。一方面，父类可能因为某种原因无法正确初始化自身，并通过从`init`方法返回\
    \ nil 来发出信号，这是处理对象初始化失败的“标准”方式（而不是抛出异常）。在这种情况下，类会注意到 nil 值并跳过`if`语句后面的代码块，直接执行到方法末尾，并返回此时`self`所指向的值，而该值现在为\
    \ nil。\n"
- fmt: '父类的`init`方法可能返回的另一个替代值是一个完全不同的实例。这种设计思路是，父类可能拥有一个巧妙的方案，用于在私有池中回收对象，而不是不断地释放和创建新对象。该方案的一部分是，`init`方法有时会返回一个旧的、二手的对象，而不是我们刚刚试图创建的崭新对象。这种情况是否现实，在Cocoa程序员中偶尔会有争论。在这里，我们本着谨慎的原则编写`init`方法，以允许这种可能性。


    以上就是我们在Interface Builder中开始连接事物所需的所有代码修改！请注意，与[第6章](#A978-1-4302-4543-8_6_Chapter.html)中的示例不同，这里的代码完全不需要对表视图做任何处理。无需实现`delegate`或`dataSource`方法，无需指向表视图的`outlet`，什么都不用做。得益于绑定和`NSArrayController`，表视图将自行处理一切。


    ### 配置表视图和文本视图


    现在，我们可以开始操作nib文件了。我们将创建一些表视图，添加一些数组控制器对象，并为它们设置与添加到`DungeonThingAppDelegate`中的新数组之间的绑定。我们还会配置现有的文本字段，使其通过绑定获取数据。在Xcode中单击`MainMenu.xib`文件，即可返回Interface
    Builder画布。


    我们将从修改主应用程序窗口开始。第一步是在窗口中为新的表视图腾出空间。我们将在每组现有视图的下方创建三个“历史记录”表视图，因此需要让窗口变得更高（但可以保持当前宽度不变）。使用窗口右下角的调整大小控件，将窗口高度增加到当前高度的大约两倍。蓝色参考线将帮助我们保持当前宽度。


    在对象库面板中，搜索“table”，然后将结果中的表视图拖入窗口。将其放置，使其左上角正好位于最左侧框的左下角下方，然后抓住表视图右下角的调整大小手柄，向下拖动，直到表格填满窗口底部的大部分可用空间，并且其左右边缘与上方框的边缘对齐，如图[7-11](#A978-1-4302-4543-8_7_Chapter.html#Fig11)所示。


    ![A978-1-4302-4543-8_7_Fig11_HTML.jpg](A978-1-4302-4543-8_7_Fig11_HTML.jpg)


    图7-11. 将表格添加到窗口中


    在我们的历史记录表中，我们只打算显示对象被创建的时间。用户随后可以点击某一行，以在上方的文本字段中查看相应的对象。这意味着我们只需要表格中有一列，因此请打开属性检查器（⌥⌘4）。选中表视图（它位于滚动视图内部，因此需要点击两次才能选中表视图本身）。在检查器中，将列数改为1，并将内容模式设置为基于视图，而非基于单元格。


    接下来，调整剩余列的宽度，使其填满整个表格。请点击表格标题，直到整个表格标题被选中。然后将鼠标悬停在表格列标题边缘的竖线上，向右拖动，直到该列填满整个表格。


    最后，禁用剩余列的编辑功能，因为我们不希望用户更改已创建对象的时间戳。点击表格列，直到它被选中，然后打开属性检查器（⌥⌘4），并单击关闭“可编辑”复选框。接着，将调整大小方式从“两者”改为“随表格自动调整大小”，因为没有理由让用户调整表视图唯一列的宽度。


    至此，表视图及其列的图形布局已完成，除了绑定之外，其他所有配置都已就绪。现在正是复制我们刚创建好的、用于显示角色的表格的绝佳时机，这样我们就可以对怪物和地下城使用完全相同的配置。点击窗口背景，然后点击一次表视图以将其选中（连同其包含的`NSScrollView`）。现在按下⌘D来复制该表视图，并将新表视图拖到中间视图组底部的位置。然后再次按下⌘D，并将最后一个表视图拖到窗口右下角的位置。对于这两个表视图，我们当然也会使用蓝色参考线来帮助正确对齐。图[7-12](#A978-1-4302-4543-8_7_Chapter.html#Fig12)显示了最终的布局。


    ![A978-1-4302-4543-8_7_Fig12_HTML.jpg](A978-1-4302-4543-8_7_Fig12_HTML.jpg)


    图7-12. 最终的DungeonThing窗口布局'
  raw: 'The other possible alternate return value for the superclass’s `init` method
    is a different instance altogether. The idea is that the superclass might have
    a smart scheme for recycling objects in a private pool instead of constantly deallocating
    and creating new ones, and a part of that scheme would be that the `init` method
    would sometimes return an old, second-hand object instead of the shiny new one
    we just tried to create. The question of whether or not this situation is a realistic
    one is a subject of occasional debate among Cocoa programmers. Here, we’re erring
    on the side of caution by writing our `init` method to allow for this possibility.


    There it is—all the code changes we need to make to start connecting things in
    Interface Builder! Note that unlike the example in [Chapter 6](#A978-1-4302-4543-8_6_Chapter.html),
    the code here doesn’t have to do anything at all regarding the table views. No
    `delegate` or `dataSource` methods to implement, no outlets pointing to the table
    views, nothing. Thanks to bindings and `NSArrayController`, the table views will
    really take care of themselves.


    ### Configuring the Table Views and Text Views


    We’ll now ready to move to the nib file. We’ll create some table views, add some
    array controller objects, and set up their bindings to the new arrays we added
    to `DungeonThingAppDelegate`. We’ll also configure the existing text fields to
    get their data through bindings. Single-click the `MainMenu.xib` file in Xcode
    to get back to the Interface Builder canvas.


    We’re going to start by making changes to the main application window. The first
    step is to make some room in the window for our new table views. We’re going to
    create three “history” table views, one below each of the existing sets of views,
    so we need to make the window taller (but we can keep the current width). Use
    the window’s resize control in the lower right to make the window about twice
    its current height. The blue guidelines will help us maintain the current width.


    In the Object Library pane, search for “table” and drag the resulting table view
    out into the window. Position it so that its upper left corner is just below the
    lower left corner of the left-most box, then grab the table view’s lower right
    resize handle, and drag it down until the table fills most of the available space
    down to the bottom of the window, with its left and right edges lined up with
    the edges of the box above it, as shown in Figure [7-11](#A978-1-4302-4543-8_7_Chapter.html#Fig11).


    ![A978-1-4302-4543-8_7_Fig11_HTML.jpg](A978-1-4302-4543-8_7_Fig11_HTML.jpg)


    Figure 7-11.


    Adding tables to the window


    In our history tables, we’re only going to display the time that the object was
    created. The user can then click on a row to see the relevant object displayed
    in the text field above the table. This means that we only want to have one column
    in the table, so open the Attributes Inspector (⌥⌘4). Select the table view (which
    is inside a scroll view, so click twice to get to the table view itself). In the
    Inspector, change the number of columns to 1 and set the Content Mode to be view-based
    rather than cell-based.


    Next, resize the remaining column so that it fills the width of the table. Do
    this by clicking in the table header until the entire table header is selected.
    Then mouse over the vertical line marking the edge of the table column header,
    and drag it to the right until the column fills the whole table.


    Finally, disable editing in the remaining column since we don’t want to let the
    user change the timestamp of a created object. Click the table column until it’s
    selected, then bring up the Attributes Inspector (⌥⌘4) and click to turn off the
    Editable checkbox. Next, change resizing from Both to Autoresizes with Table,
    as there’s no reason to let the user resize the table view’s only column.


    At this point, the table view and its column are graphically laid out and everything
    is configured except its bindings. This is a perfect time to duplicate the table
    we’ve just made for displaying characters so that we can use the exact same configuration
    for monsters and dungeons. Click the window background, then click once on the
    table view to select it (along with its enclosing `NSScrollView`). Now press ⌘D
    to duplicate the table view, and drag it the new one into place at the bottom
    of the center view group. Then press ⌘D once again, and drag the final table view
    into place in the window’s bottom right corner. For both of those, we’ll of course
    use the blue guidelines to help us line them up properly. Figure [7-12](#A978-1-4302-4543-8_7_Chapter.html#Fig12)
    shows the final layout.


    ![A978-1-4302-4543-8_7_Fig12_HTML.jpg](A978-1-4302-4543-8_7_Fig12_HTML.jpg)


    Figure 7-12.


    The final DungeonThing window layout'
