    \n### 重复操作\n\n现在我们已经完全通过绑定来处理角色，我们可以回过头来，对怪物和地下城做同样的操作。通过复制角色数组控制器（从而保留其现有配置，包括我们已经输入的键名）创建一个新的\
    \ `NSArrayController`，并将其命名为“monsters”以保持一致性。就像之前处理角色数组控制器一样，通过创建一个名为 `monsterArrayController`\
    \ 的新出口，将 monsters 连接到 `DungeonThingAppDelegate`，配置其 Content Array 和 Selected Indices\
    \ 绑定以连接到 `DungeonThingAppDelegate` 中的 `monsters` 属性，并通过 monsters 数组控制器配置两个相关的\
    \ GUI 对象（表格列和文本字段），所有步骤如前所述。最后，通过将 `createMonster:` 操作方法的最后一行从\n\n`[self.monsterLabel\
    \ setStringValue:result];`\n\n修改为\n\n```\n[self.monsterArrayController addObject:[NSMutableDictionary\
    \ dictionaryWithObjectsAndKeys:\n  result, @\"createdObject\",\n  [NSDate date],\
    \ @\"timestamp\",\n  nil]];\n```\n\n构建并运行应用程序，确保一切正常，然后对地下城再重复一次全部操作。\n\n一旦创建了所有三个\
    \ `NSArrayController` 并设置了绑定，我们就可以移除 `DungeonThingAppDelegate.h` 中引用文本字段的 `monsterLabel`\
    \ 和 `dungeonLabel` 的 `@property` 声明，因为这些现在已通过绑定进行填充。\n\n## 好了，但这是如何实现的？\n\n现在你已经初步了解了\
    \ Cocoa 绑定，你可能会强烈感觉自己刚刚观看了一场魔术表演——并且想知道这些技巧到底是如何运作的！这种感觉完全可以理解。我们程序员习惯于需要详细说明数据的每一次移动和屏幕的每一次更新，而突然之间，我们发现在某处设置一个值就会导致某些看不见的力量将该值传播到屏幕上的其他视图。本节将尝试为你阐明这一过程，解释\
    \ Cocoa 中的键值编码和键值观察概念，以及 Cocoa 绑定如何利用它们来实现其魔法。\n\n### 键值编码\n\n首先，我们来谈谈键值编码（KVC）。KVC\
    \ 背后的理念是，允许我们通过使用与属性名或与某些 getter 和 setter 方法名相匹配的字符串来引用对象的属性。例如，假设我们有一个名为 `Person`\
    \ 的类，它包含一个 `firstName` 的概念，要么以名为 `firstName` 的实例变量的形式存在，要么以名为 `firstName` 和 `setFirstName:`\
    \ 的一对方法的形式存在。使用 KVC，我们可以通过以下咒语来访问一个人的 `firstName` 属性：\n\n```\n[myPerson setValue:@\"\
    Frodo\" forKey:@\"firstName\"];\n```\n\n给定键名 `firstName`，此方法调用首先检查该对象是否有一个名为 `setFirstName:`\
    \ 的方法，如果有，则调用它来设置值。如果这不起作用，它会检查是否存在名为 `firstName` 的实例变量，并尝试直接设置它。\n\n我们也可以类似地检索值：\n\
    \n```\nmyNameString = [myPerson valueForKey:@\"firstName\"];\n```\n\n这种情况下也会发生类似的查找过程。它首先查找名为\
    \ `firstName` 的方法，如果没有，则尝试查找同名的实例变量。\n\n所有这些的结果是，KVC 为我们提供了一种以极其通用的方式讨论对象属性的方法。不仅对象的属性存储对我们来说是透明的，甚至从外部访问属性的方式我们也不需要担心。它可能会改变，甚至可能在程序运行时改变，而我们都无法察觉到差异。\n\
    \n`setValue:forKey:` 和 `valueForKey:` 方法是在 `NSObject` 中定义的（并为 `NSArray` 和 `NSSet`\
    \ 等集合类提供了一些额外的扩展），以便在运行时根据键名确定访问值的最佳方式。这意味着它们可以在 Cocoa 中的每个类上随时使用。\n\n关于 KVC 的另一点补充是，用作键的字符串实际上可以作为一种路径来遍历对象之间的关系。例如，假设我们的\
    \ `Person` 类也包含一个名为 `mother` 的属性，它是指向另一个 `Person` 的指针。如果我们想设置 `myPerson` 的母亲的\
    \ `firstName`，在普通代码中我们可能会这样做之一：\n\n```\nmyPerson.mother.firstName = @\"Anne\"\
    ;\n[myPerson.mother setFirstName:@\"Anne\"];\n[[myPerson mother] setFirstName:@\"\
    Anne\"];\n```\n\n使用 KVC，我们有另一种方法来实现这一点：\n\n```\n[myPerson setValue:@\"Anne\" forKeyPath:@\"\
    mother.firstName\"];\n```\n\nKVC 方法足够智能，可以查看键字符串，按路径进行拆分，并遍历路径中提到的任何对象关系，因此上一行最终会调用类似这样的内容：\n\
    \n```\n[[myPerson valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"firstName\"\
    ];\n```\n\n虽然这两种 KVC 选项在我们自己的代码中常规使用时都不太吸引人（因为“普通”版本读起来更优雅一些），但在需要更大灵活性的场景下，它们可以发挥巨大作用，例如，一个界面允许我们仅通过输入属性的路径名称，就能配置哪些值将显示在视图对象中，而无需编译任何源代码或其他内容。听起来很熟悉吧？\n"
- fmt: '### Key-Value Observing


    The next piece of the puzzle is key-value observing (KVO). With KVO, an object
    can register with another object to be informed of changes as they occur. For
    instance, continuing with the last example, we can tell`myPerson` to notify us
    whenever the value of its`firstName` attribute changes, like this:


    ```

    [myPerson addObserver:self forKeyPath:@"firstName" options:nil context:NULL];

    ```


    In return,`myPerson` will call a method called`observeValueForKeyPath:ofObject:change:context:`
    in the observer whenever the`firstName` attribute changes, whether that change
    occurs via the`setValue:forKey:` method or by someone calling the`setFirstName:`
    method. The way this is implemented is quite clever and involves some meta-programming
    deep inside Cocoa, creating a subclass of`Person` at runtime that overrides the`setFirstName:`
    method, and passing along a message to all observers after the value changes.
    This is done so smoothly that we would never suspect the existence of the hidden`Person`
    subclass unless we went looking for it—and really dug deep in just the right places.
    As a result, we don’t really need to know about these implementation details.
    Just be glad we’re entering into the world of Cocoa programming at a time when
    this particular technology has matured as much as it has, because it was a little
    rough around the edges when it first came out!


    At the end of the day, we probably won’t need to deal with KVO directly at all.
    Almost everything we’d ever want to do with KVO can be done more cleanly and easily
    with Cocoa bindings, which is built on top of it and provides a higher-level interface.
    That’s why we’ve focused on the functionality of Cocoa bindings and aren’t doing
    any direct programming with KVO.


    ### Cocoa Bindings: How It Works


    While a complete and accurate description of the implementation of Cocoa bindings
    is outside the scope of this book, it may be useful to get a fuller picture of
    how it uses KVC and KVO to do its work. Now that we’ve gotten a brief intro into
    KVC and KVO, let’s take a look at how these bits fit together.


    When we establish a binding in Interface Builder, like we’ve done numerous times
    in this chapter already, we’re actually defining a sort of contract. We’re declaring
    that when this nib is loaded and these objects are set up, a sequence of events
    will occur to establish some KVO relationships between the objects, using a key
    path string (using KVC) to define which attribute is in focus for each binding,
    along with other information to identify which aspect (such as the displayed value,
    the enabled state, and the like) of the “receiving end” (typically a GUI control)
    should be affected by changes in the underlying value. At runtime, Cocoa will
    set things up so that the control (or any other object we’ve established a binding
    on) will be set up to observe changes in the controller based on the relevant
    key and the controller will be set up to observe changes in the control’s chosen
    aspect.


    ## Wrap Up


    Bindings are a really powerful technology. In retrospect, you can probably see
    that’s it’s possible to implement nearly everything shown in the previous chapters
    using Cocoa bindings, creating an app with almost no custom code whatsoever! This
    doesn’t in any way diminish the usefulness of the techniques shown in previous
    chapters, however. The fact is that sometimes you will want to access values in
    the GUI manually in methods called by target-action. A general rule of thumb is
    that if you’re in a situation (a simple app or a subcomponent of a larger app)
    where you don’t have any apparent model objects to work with, you may be best
    served by doing things “the old way” with outlets and target/action connections,
    but, in general, Cocoa bindings are the preferred method for developing Mac apps
    from here on out.


    The next few chapters will demonstrate how to do even more with bindings using
    Core Data. Core Data’s functionality is orthogonal to Cocoa Binding’s; whereas
    Cocoa bindings lets you eliminate some boring controller code, Core Data takes
    care of a lot of the plumbing that you’d otherwise have to write for your model
    classes, giving you a storage back-end, built-in Undo/Redo support, and much more.
    Together, Cocoa bindings and Core Data can get you building so much software so
    effectively that you’ll be making other people’s heads spin!


    # 8. Core Data Basics


    **Abstract**


    In earlier chapters, we showed you various ways that Cocoa lets you display data
    in view objects, from manually getting and setting values based on the contents
    of model objects to having the data automatically synchronized between model and
    view objects using Cocoa Bindings, which eliminates the need for a lot of boring
    controller code. Now it’s time to learn about Core Data, a powerful framework
    that gives our model objects a complete set of built-in capabilities. We’ll start
    by talking about what Core Data is and how it fits in with the other parts of
    Cocoa.


    In earlier chapters, we showed you various ways that Cocoa lets you display data
    in view objects, from manually getting and setting values based on the contents
    of model objects to having the data automatically synchronized between model and
    view objects using Cocoa Bindings, which eliminates the need for a lot of boring
    controller code. Now it’s time to learn about Core Data, a powerful framework
    that gives our model objects a complete set of built-in capabilities. We’ll start
    by talking about what Core Data is and how it fits in with the other parts of
    Cocoa. Then we’ll use Core Data to create a full-featured database application
    called MythBase, including a GUI that allows us to create, search, edit, and delete
    entries, all without writing a single line of code (see Figure 8-1 for a shot
    of MythBase in action). Then we’ll explore some of the code resources that are
    created for us automatically when we create a Core Data project, and finally we’ll
    demonstrate how to add functionality (“business logic”) to our model objects.'
