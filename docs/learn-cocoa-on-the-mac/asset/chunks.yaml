    \ `ColorMix`。现在保存工作，构建并运行，然后保存一个颜色集，验证我们现在已无法选择保存文件的格式类型。\n\n## 添加颜色\n\n现在文档功能已按预期工作，但我们拥有的是一个非常无聊的应用，它什么有趣的事情也做不了。让我们让应用实现本章开头承诺的功能：使用\
    \ Core Graphics 所有预定义的混合模式，显示通过混合两种选定颜色生成的一系列颜色。\n\n为此，我们将创建一个名为 `CMColorBlendView`\
    \ 的新类，它将直接成为 `NSView` 的子类。在 `NSView` 子类中，通常会做的主要事项之一是重写 `drawRect:` 方法，以精确指定应绘制的内容。我们将执行此操作，并用混合颜色填充每个视图。为了实现混合，`CMColorBlendView`\
    \ 的每个实例都需要知道要使用的混合模式以及要混合的两种颜色。我们将手动为每个 `CMColorBlendView` 设置混合模式，但两种颜色的值将通过 Cocoa\
    \ 绑定进行填充，这样一旦用户更改了其中一种选定颜色，窗口中所有的 `CMColorBlendView` 对象都会立即重绘。\n\n### CMColorBlendView\
    \ 类\n\n首先在我们的项目中创建一个新类。在“新建文件”向导中，从“OS X - Cocoa”部分选择“Objective-C 类”，然后点击“下一步”。将新类命名为\
