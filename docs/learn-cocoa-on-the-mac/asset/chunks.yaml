- fmt: 'Since the slider doesn’t fill out the window, click once on the slider to
    reveal resize handles on each side of the slider. Drag out the slider from its
    right side, stretching it out to the blue guideline on the right margin of the
    window (Figure [3-11](#A978-1-4302-4543-8_3_Chapter.html#Fig11)).


    ![A978-1-4302-4543-8_3_Fig11_HTML.jpg](A978-1-4302-4543-8_3_Fig11_HTML.jpg)


    Figure 3-11. Resizing the slider to fill up the window


    Take a look at the Attributes Inspector for the Slider in the Utility area (see
    Figure [3-12](#A978-1-4302-4543-8_3_Chapter.html#Fig12)). By default, the slider
    values range from 0 to 100, but we can change these, if we wish, to any integer
    values. Under the Control section, check the checkbox labeled Continuous.


    ![A978-1-4302-4543-8_3_Fig12_HTML.jpg](A978-1-4302-4543-8_3_Fig12_HTML.jpg)


    Figure 3-12. Attribute Inspector for a slider


    Now we’re about to work some magic. We’re going to connect the slider to the text
    field. While holding down the Control key, click the slider. Hold down both the
    Control key and the mouse button, and move the cursor up towards the text field.
    A blue line will extend out from the slider to our mouse. Drag this line out to
    the text field. When we drag the mouse over the text field, the text field will
    highlight in blue (Figure [3-13](#A978-1-4302-4543-8_3_Chapter.html#Fig13)).


    ![A978-1-4302-4543-8_3_Fig13_HTML.jpg](A978-1-4302-4543-8_3_Fig13_HTML.jpg)


    Figure 3-13. Control-dragging from the slider to the text field to establish a
    connection


    With the text field highlighted, let go. A small gray window will appear, listing
    Outlets, Accessibility, and Received Actions (Figure [3-14](#A978-1-4302-4543-8_3_Chapter.html#Fig14)).
    Select `takeDoubleValueFrom:` and the text field will blink a couple times to
    confirm the connection. Then the blue line will disappear. Not surprisingly, this
    maneuver is called control-dragging, and it is the primary mechanism we use to
    connect outlets and actions in Interface Builder.


    ![A978-1-4302-4543-8_3_Fig14_HTML.jpg](A978-1-4302-4543-8_3_Fig14_HTML.jpg)


    Figure 3-14. Setting the action for the connection between the slider and the
    text field


    To see the connection that we just made, select the Connections Inspector in the
    Utility area. There will be an entry under Sent Actions showing that `takeDoubleValueFrom:`
    is connected to Text Field (Figure [3-15](#A978-1-4302-4543-8_3_Chapter.html#Fig15)).


    ![A978-1-4302-4543-8_3_Fig15_HTML.jpg](A978-1-4302-4543-8_3_Fig15_HTML.jpg)


    Figure 3-15. Connections Inspector for the slider, showing the action being called
    on the text field


    What did we just do? What we just did was to establish a connection between the
    slider and the text field. The text field is now the “target” of the slider. When
    the slider value changes, it calls the method on its target that we set. In this
    case, we had picked `takeDoubleValueFrom:`. This method tells the text field to
    ask the slider for its value (typed to a double), and then the text field sets
    its own value to the value it got from the slider and redraws itself. Selecting
    the Continuous checkbox for the slider means that the slider will repeatedly call
    the action method on its target as the slider gets dragged back and forth.


    It’s been a lot of setup to get here. Now, let’s see our action in action! Under
    the Editor menu in Xcode (not Edit, but Editor), select Simulate Document from
    the bottom. Xcode will run a program called Cocoa Simulator that loads the `.xib`
    file for our program and lets us play with it. Click the slider, and drag it back
    and forth. As we drag, the value in the text field should change to reflect the
    position of the slider, as shown in Figure [3-16](#A978-1-4302-4543-8_3_Chapter.html#Fig16).
    Since we told the text field to use the double value from the slider, the value
    displayed will have a decimal point. Note that we still haven’t written any code;
    all we’ve done is to wire two Cocoa controls together.


    ![A978-1-4302-4543-8_3_Fig16_HTML.jpg](A978-1-4302-4543-8_3_Fig16_HTML.jpg)


    Figure 3-16. When the slider moves, the text field updates automatically


    After playing with the slider, quit the Cocoa Simulator and go back to Xcode.
    Control-drag again from the slider up to the text field, and this time pick the
    `takeIntValueFrom:` action from the gray window (Figure [3-17](#A978-1-4302-4543-8_3_Chapter.html#Fig17)).
    Note that there are actually two actions with similar names, `takeIntValueFrom:`
    and `takeIntegerValueFrom:`. They differ in whether the text field asks the slider
    for its value as an `int`, or as an `NSInteger`. Either one will do for our purposes.
    This will replace the connection we made previously, as the slider can have only
    one target at a time.


    ![A978-1-4302-4543-8_3_Fig17_HTML.jpg](A978-1-4302-4543-8_3_Fig17_HTML.jpg)


    Figure 3-17. Changing the action from `takeDoubleValueFrom:` to `takeIntValueFrom:`


    Run Simulate Document again, and drag the slider around again. This time, the
    number displayed in the text field should just be an integer, with no decimal
    point, as shown in Figure [3-18](#A978-1-4302-4543-8_3_Chapter.html#Fig18). Quit
    the Cocoa Simulator, for we’re done!


    ![A978-1-4302-4543-8_3_Fig18_HTML.jpg](A978-1-4302-4543-8_3_Fig18_HTML.jpg)


    Figure 3-18. The slider updates the text field but now with only integral values


    ## Wrap Up


    In this chapter, we learned how to connect objects to each other using outlets
    and actions, some background about frameworks in OS X, and acquired more practice
    in laying out a user interface in Xcode. Outlets and actions are fundamental concepts
    for building Cocoa applications, and we’ll be doing a lot of control-dragging
    in the coming chapters. However, this probably doesn’t yet feel much like programming.
    Your patience is about to be rewarded because in the next chapter we’ll actually
    write some code, implementing our own action methods, and see how to connect Cocoa
    interface objects to our own code instead of just to each other.


    # 4. The First Call to Action


    It really is amazing all the stuff we get free with Cocoa, as we saw in the last
    two chapters. But there was something very important missing in the first two
    applications that most applications will need: the ability to interact with the
    user. When we were in Interface Builder in the last chapter, we saw that there
    was a whole library filled with objects like text fields and buttons that we can
    use to assemble our interface, but those user-interface objects are no good if
    we can’t tell when they’re used or change the data they contain. In this chapter,
    we’ll see how those objects can be used to let users interact with our application—via
    the object’s outlets and actions.


    ## Declaring Outlets and Actions


    To review from the last chapter, Cocoa uses things called outlets and actions
    to connect the objects in the user interface with the objects in our code. Outlets
    are pointers to objects in our nib file, which allow our code to access and manipulate
    objects in the nib. Actions are methods we write that can be executed directly
    as a result of user interaction, such as at the click of a button or a user selecting
    a menu item. Outlets and actions are typically contained in our controller classes
    (although they are sometimes used elsewhere).'
