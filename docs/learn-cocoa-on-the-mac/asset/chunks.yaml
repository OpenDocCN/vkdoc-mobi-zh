- fmt: '### Showing the Bands’ Members


    Now that we can add people to a band, how about being able to see a list of all
    the members in a band? Let’s add that to the Mythical Bands window. It’ll be easy:
    we’ll manually add a table view and an array controller and hook it all up.


    Start by grabbing an `NSArrayController` from the Object Library, and dragging
    it to the main nib window. Just like we’ve done with the other array controllers,
    we want to give this controller a name that is short but meaningful. This controller
    is going to handle a list of `MythicalPersons`, but we’ve already got an array
    controller called Mythical Persons, and anyway we want to make it easy to see
    that there’s some context to this (it will only show people that are members of
    the selected band), so let’s name this one “Band Members” in the main nib window.


    Then, with the new array controller still selected, open the Attributes Inspector,
    and in the Object Controller section set the Mode to “Entity” and the Entity Name
    to “MythicalPerson.” Click to turn on the Prepares Content checkbox. This ensures
    that the controller’s content is fetched automatically when the nib loads.


    Now switch to the Bindings Inspector where we’re going to configure two bindings
    that will let this controller automatically get its content based on the selected
    `MythicalBand`. First, at the very bottom, open up the configuration for Managed
    Object Context. Choose App Delegate in the pop-up and “managedObjectContext” for
    the Model Key Path, which should automatically turn on the Bind to checkbox. This
    configuration is the same as for all our array controllers and allows them to
    connect to the Core Data storage. Next, in the Controller Content section, open
    up the Content Set binding configuration, and choose Mythical Bands in the pop-up,
    “selection” for the Controller Key, and “members” for the Model Key Path. Doing
    so makes the controller’s content dependent on the selected band.


    Now, make room for the list of members. Bring up the Mythical Bands window, and
    make it a bit taller, almost twice as high, so that we can fit another table view
    beneath the current content. Then, drag over a table view from the Object Library,
    and click it to select the table view itself (instead of the scroll view containing
    it, which is what is selected by default just after the drag). We’re only going
    to show the names of the band members here, so we only need one column in this
    table. Bring up the Attributes Inspector, find the Content Mode setting at the
    top of the inspector, and change the Content Mode to view-based. Next, find the
    Columns setting just below Content Mode, and change it to 1. Then make the column
    heading nicer, as we’ve done in previous chapters, by setting its title to “Member
    Name” and making it fill the width of the table. Finally, top it all off with
    a Band Members label, so the users know what they’re looking at. Figure [9-11](#A978-1-4302-4543-8_9_Chapter.html#Fig11)
    shows the layout that you’re aiming for.


    All that’s left is to configure a binding for the Band Members table. We’ll bind
    the table to the `NSArrayController`, and then bind the column to the table. Start
    by selecting the table itself. In the Bindings Inspector, expand the Content section
    under Table Content. Then, set the Bind to checkbox and set the pull-down menu
    to Band Members. The default Controller Key, `arrangedObjects`, is just fine.
    Now for the column. Using the Object Dock outline view to the left, drill down
    to the “Static Text - Table View Cell” down inside the table view. In the Bindings
    Inspector, expand the Value section. The pull-down menu should read Table Cell
    View. Check the Bind to checkbox, and set the Model Key Path to be “objectValue.name”
    while leaving the Controller Key field blank. The Bindings Inspector on the right
    side of the window in Figure [9-11](#A978-1-4302-4543-8_9_Chapter.html#Fig11)
    shows what this looks like in Xcode.


    ![A978-1-4302-4543-8_9_Fig11_HTML.jpg](A978-1-4302-4543-8_9_Fig11_HTML.jpg)


    Figure 9-11.


    Adding band members to the Mythical Bands window


    All right, that should do it for this window. It’s time to save our work, hit
    Run in Xcode, and see the new functionality: specifying a band for a person will
    add that person to the band’s members array, which we’ll see when we select the
    band in the Mythical Band window.'
