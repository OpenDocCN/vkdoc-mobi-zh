  trans: '

    接下来，在对象库的搜索字段中输入“text”，然后将一个文本视图拖到右下角。将其大小调整为高 150 像素、宽 250 像素，这个宽度应足以在窗口边缘和图像框之间填充，并留出视觉上舒适的间隙。当您接近正确位置时，应该会看到蓝色参考线，并且文本视图会自动对齐。我们需要对其属性做一项重要更改。`NSTextView`默认能够显示富文本，这是一个很棒的功能，但也是有代价的：在
    Cocoa 中，富文本由 `NSAttributedString` 的实例表示，该类比 `NSString` 复杂得多，不是我们现在想深入讨论的内容。为了让文本视图能够将其显示值绑定到一个普通的旧字符串，我们必须关闭富文本处理。因此，在属性检查器中，单击关闭富文本复选框（如果您没有看到它，可能您选中了文本视图的父视图，即
    `NSScrollView`。再单击一次文本视图以选中内部的 `NSTextView`）。您还可以将查找设置更改为“使用栏”，并勾选“增量搜索”，以便文本搜索利用
    OS X 10.7 中引入的查找栏功能。


    这些控件需要标签，因此在对象库搜索字段中输入“label”，然后将一个标签拖到图像框上方，与图像框的左边缘对齐。将其文本更改为“图像”。再拖出另一个标签放在文本视图上方，并将其标题设置为“详情。”将“详情”标签对齐，使其右边缘与滑块标签对齐。


    最后要做的是配置表格视图的列。五列中有四列将显示文本或数字，因此默认配置就可以了。然而，对于“图像”列，我们希望显示一张图片，因此需要将当前在该列中的 `NSTextField`
    替换为一个图像框。通过左侧的对象停靠区，选择“图像”列表格视图单元格中包含的“静态文本”对象，如图 8-8 所示。选中后，按 Delete 键将其删除。在对象库的搜索字段中输入“image”，然后将一个图像框拖到表格视图的“图像”列中空的表格单元格视图中。该图像框会被裁剪到表格单元格视图的高度，因此将表格视图单元格的高度扩大到
    48 像素，足够显示整个图像。


    ![A978-1-4302-4543-8_8_Fig8_HTML.jpg](img/A978-1-4302-4543-8_8_Fig8_HTML.jpg)


    图 8-8.


    在对象停靠区中选择“图像”文本字段


    至此，GUI 布局就完成了。它很美，不是吗？现在我们需要将其连接到一个数据源以填充内容。我们将使用前一章讨论过的 Cocoa 绑定来完成这项工作。


    ## 设置 Cocoa 绑定


    当我们告诉 Xcode 我们想创建一个 Core Data 应用程序时，它生成了一个应用程序委托类（名为 `MBAppDelegate`），该类包含了对使用
    Core Data 的特殊支持。这种支持的一部分是生成的 `MBAppDelegate` 类现在有一个 `managedObjectContext` 属性。托管对象上下文是一个对象，它允许数组控制器（或者，就此而言，您自己的代码）通过
    Core Data 接入模型对象（`NSManagedObject` 或子类的实例）的源。稍后当我们检查创建此项目时自动生成的控制器代码时，我们将看到应用控制器如何提供这个属性。就像前一章一样，我们将使用一个
    `NSArrayController` 来管理数据，但这里创建的 `NSArrayController` 将通过 Core Data 访问数据，而不是通过
    `NSMutableDictionary`。并且正如我们在上一章中所做的那样，我们将使用 Cocoa 绑定将其连接到用户界面。


    ### 使用数组控制器进行绑定


    首先，我们需要在应用中获取一个数组控制器。在对象库的搜索字段中搜索“array”。结果应该会显示一个数组控制器。将其中的一个拖到 Interface Builder
    画布上；它会被放到编辑器窗格的任何位置。无论我们把它放在哪里，它都会出现在 Interface Builder 画布左侧的对象停靠区中。在对象停靠区中选择它，并将其重命名为“Mythical
    Person Array Controller”。打开属性检查器，并将其模式从“类”更改为“实体名称”。输入实体名称为“MythicalPerson”，这与我们在模型编辑器中使用的名称相同。最后，勾选“预置内容”复选框。这将触发数组控制器在应用启动时加载数据。


    现在，我们将把数组控制器链接到 `managedObjectContext`。在对象停靠区中仍选中数组控制器的情况下，选中绑定检查器。展开“参数”部分，然后从弹出列表中选择“App
    Delegate”。之后，勾选弹出列表旁边的“绑定到”复选框。接下来，在“模型键路径”字段中输入“managedObjectContext”。这将数组控制器连接到应用委托中的
    Core Data 管道。


    既然我们已经连接好了数组控制器，我们需要开始设置 UI 控件的绑定。我们将从基本控件（文本字段和滑块）开始，然后处理更复杂的控件（图像和表格视图），最后通过连接按钮来完成。


    第一个绑定将是名称文本字段的。选中名称文本框，然后打开绑定检查器。展开“值”部分，勾选“绑定到”复选框，然后从下拉菜单中选择“Mythical Person
    Array Controller”。确保“控制器键”框中显示“selection”，并在“模型键路径”字段中输入“name”，如图 8-9 所示。这将文本字段连接到数组控制器选定对象的
    name 属性。


    ![A978-1-4302-4543-8_8_Fig9_HTML.jpg](img/A978-1-4302-4543-8_8_Fig9_HTML.jpg)


    图 8-9.


    用于将名称文本字段连接到 Mythical Person Array Controller 的绑定检查器


    为滑块设置绑定将是类似的；我们将建立一个到 Mythical Person Array Controller 的 selection 的绑定，并根据控件的适当属性使用不同的模型键路径。对于这三个滑块中的每一个，这将是我们在模型文件中创建的
    `divinity`、`power` 和 `goodness` 属性。要进行这些绑定，选中“神性”滑块并查看绑定检查器。展开“值”部分，勾选“绑定到”复选框，然后从下拉菜单中选择“Mythical
    Person Array Controller”。确保“控制器键”框中显示“selection”，并在“模型键路径”字段中输入“divinity”。对“威力”和“善良”滑块重复此操作，并相应更改模型键路径。


    为“图像”和“详情”区域设置绑定会稍微复杂一些。我们先处理“详情”。选中文本视图（请记住，文本视图嵌入在 `NSScrollView` 中；您需要点击穿过滚动视图才能到达文本视图本身）。在绑定检查器中，与名称文本框和滑块相比，有不同的选择。然而，仍然有一个“值”部分，这正是我们要使用的。展开“值”部分，勾选“绑定到”复选框，并使用“details”作为模型键路径。

    '
- fmt: 'For the Depiction, we need to get an `NSImage` for the image well to display.
    Core Data doesn’t know about `NSImages`, but this isn’t a problem. Remember the
    earlier discussion about transformers and the Transformable type used by Core
    Data? Because depiction is a transformable attribute, its value needs to be converted
    between what we see in the GUI (an `NSImage`) and something that Core Data is
    capable of storing (`NSData`). We’ll do this by adding `NSKeyedUnarchiveFromData`
    to the Cocoa bindings configuration for this control. Select the image well and
    bring up the Bindings Inspector. As with the other fields, open the Value section.
    Check the Bind to checkbox, ensure that the Controller Key shows “selection,”
    and set the Model Key Path to be “depiction”. To make the conversion from `NSData`
    to `NSImage`, click on the Value Transformer pop-up list, and choose `NSKeyedUnarchiveFromData`.


    ## Configuring Bindings for the Table View


    It’s time to do the bindings for the table view. Setting up Cocoa bindings for
    a view-based table view is a two-step process. First, we have to set up a binding
    for the table view itself. Next, we’ll set up bindings for each view in the row.
    The table view works some magic to expose a bindings source to its subviews, titled
    Table Cell View. Within that binding is a Model Key Path of “objectValue” that
    represents the object for that row.


    To start, select the table view itself. This is most easily done from the Object
    Dock on the left. In the Bindings Inspector, expand the Content section, and check
    the Bind to checkbox, ensure that the pulldown menu shows Mythical Person Array
    Controller and Controller Key shows “arrangedObjects.” For the table view itself,
    we don’t have a Model Key Path setting. We also want to have the selected row
    in the table view get passed back to the array controller. To set this, expand
    the Selection Indices section of the Bindings Inspector. Check the Bind to checkbox
    here, set the pulldown menu to Mythical Person Array Controller, and set the Controller
    Key to “selectionIndexes.” Your binding should look like Figure [8-10](#A978-1-4302-4543-8_8_Chapter.html#Fig10).


    ![A978-1-4302-4543-8_8_Fig10_HTML.jpg](A978-1-4302-4543-8_8_Fig10_HTML.jpg)


    Figure 8-10. Setting bindings for the table view


    We’ve got five columns in the table: Name, Divinity, Power, Goodness, and Depiction.
    We don’t set bindings on the columns directly; instead, we’ll set up bindings
    to the views contained within each column. For the first four columns, the view
    is an `NSTextField` contained within an `NSTableCellView`. For the Depiction column,
    the view is an `NSImageWell` contained within an `NSTableCellView`. Unfortunately,
    Xcode sets the default value of the text field contained within an `NSTableCellView`
    to be “Table View Cell,” which seems almost designed to create confusion. The
    views in the table view are instances of `NSTableCellView`, despite their default
    text. The text field and image well will be bound to the objectValue property
    of the Table Cell View.


    We’ll start with the Name column. Select the Table View Cell in the Name column,
    which may take two clicks if you’re clicking in the UI itself, or by expanding
    the Table Column - Name entry in the Object Dock on the left and drilling down
    to the Static Text - Table View Cell entry within. In the Bindings Inspector,
    expand the Value section. Check the Bind to checkbox, ensure that the pulldown
    menu shows Table Cell View, and set the Model Key Path to be “objectValue.name.”
    The Controller Key should be blank.


    The Divinity, Power, and Goodness bindings will all be similar. Select each column
    in turn and drill down to the Static Text field within. Set the Value binding
    as we did for the Name column: open the Value section, check the Bind to checkbox,
    ensure that the pulldown menu shows Table Cell View, and set the Model Key Path
    to be “objectValue.divinity,” “objectValue.power,” or “objectValue.goodness” as
    appropriate.


    Now for the Depiction column. Select the image well inside the Table Cell View
    in the Depiction column. In the Bindings Inspector, open the Value section. As
    before, check the Bind to checkbox, ensure that the pulldown menu shows Table
    Cell View. Set the Model Key Path to “objectValue.depiction”. As we did with the
    Depiction view above, click on the Value Transformer pop-up list, and choose `NSKeyedUnarchiveFromData`,
    as shown in Figure [8-11](#A978-1-4302-4543-8_8_Chapter.html#Fig11). That wraps
    up the table view!


    ![A978-1-4302-4543-8_8_Fig11_HTML.jpg](A978-1-4302-4543-8_8_Fig11_HTML.jpg)


    Figure 8-11. Setting up bindings for the Depiction column


    For the text field below and to the left of the table view showing the number
    of matches, we’ll use a different binding method that will let us use a format
    string to build the contents of the text field. In this case, we’ll use Display
    Pattern Value1 rather than Value. Expand the Display Pattern Value1 section, and
    check the Bind to checkbox and set the pulldown menu to Mythical Person Array
    Controller as before. Enter “selection” as the Controller Key. This time, we’re
    going to use a different key path. Set the Model Key Path to “@count,” and the
    Display Pattern to “%{value1}@ out of %{value2}@.” There’s another binding available
    below Display Pattern Value1 now, titled Display Pattern Value2. Expand the Display
    Pattern Value2 section, and check the Bind to checkbox and set the pulldown menu
    to Mythical Person Array Controller as before. This time, enter “@count” as the
    Model Key Path, and enter “arrangedObjects” as the Controller Key instead of “selection.”
    The Display Pattern will auto-fill with the same value that we entered in the
    Display Pattern Value1 binding.


    Now, we need to wire up the Fetch, Delete, and Add buttons. For this, we’ll use
    a combination of target-action connections for responding to clicks and Cocoa
    bindings to enable or disable the buttons as appropriate. Let’s start with the
    target-action connections. Select the Fetch button and control-drag a connection
    out to the Mythical Person Array Controller. The array controller will be at the
    bottom of the list of objects in the Object Dock; if you can’t see it, hover your
    mouse at the bottom of the Object Dock and it will scroll down to reveal the array
    controller. Select the `fetch:` action. Do the same thing with the Delete and
    Add buttons, selecting the `remove:` and `add:` actions respectively.


    Next, we’ll establish bindings for the Enabled property of the Add and Remove
    buttons. Select the Add button and open the Bindings Inspector. Expand the Enabled
    section, shown under Availability. Can you guess the next step? That’s right;
    check the Bind to checkbox, ensure that the pulldown menu shows Mythical Person
    Array Controller. This time, however, change the Controller Key field to be “canAdd.”
    When you start typing in the Controller Key field, you’ll get a list of potential
    completions. Do the same thing for the Remove button, changing the Controller
    Key to “canRemove.”


    We’ve now built enough of the UI that we should try it out before going any further.
    Let’s try it out. Save the nib file and click Run. You should be able to click
    the Add button and get blank rows in the table view. You should also be able to
    edit the name and move the sliders, and have the changes reflected in the selected
    row in the table view. If that’s not the case, then check the bindings and connections
    in the nib file and see whether they match the instructions.'
