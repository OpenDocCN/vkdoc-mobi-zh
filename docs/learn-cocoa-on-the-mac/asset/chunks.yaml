    `result = thisCell;`


    `} else if ([thisColName isEqualToString:kLastSeenDate]) {`


    `NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];`


    `thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];`


    `result = thisCell;`


    `} else if ([thisColName isEqualToString:kMugshot]) {`


    `NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];`


    `[thisCell setImage:[thisVillain objectForKey:kMugshot]];`


    `result = thisCell;`


    `}`


    `// return the result.`


    `return result;`


    `}`


    The first method should be self-explanatory: we just return the size of the array
    so that the table view knows how many rows it needs to display. The second method
    is called by the table view each time a cell is going to be displayed in the table.
    The table view tells us the column and row index number that it wants to display.
    The row index number is the same as the index number for the relevant object in
    our content array, so calling `[villains objectAtIndex:rowIndex]` returns the
    relevant model object from villains. As you may recall, the model objects we’re
    using are in fact just `NSMutableDictionary` instances, with all their values
    accessible by keys. When we configured the identifier attribute of each column
    in our table view, we used the same key names that our model objects use. Based
    on the identifier of the column, we ask the table view to make an instance of
    the appropriate `NSView` subclass for the column using `makeViewWithIdentifier:owner:`.
    We then configure the view based on the relevant value from the model object and
    return the view to the table view.


    For example, when the cell in the top row under the `Name` column is about to
    be displayed, this method will be called with a `rowIndex` of 0 and a `TableColumn`
    pointing to the `Name NSTableColumn`. We use the 0 to specify which villain to
    grab from our villains array, then we use the value returned by the table column’s
    identifier method, `@"name"`, to retrieve a value from the chosen villain. We
    ask the table view to get an instance of the appropriate `NSView` for that column
    (which we configured in Interface Builder), and then populate it in whatever manner
    works for that `NSView`. Lastly, we return that view, and the table view draws
    it.


    Now we should be able to compile and run VillainTracker, and see that the default
    villain is displayed both in the controls and as the only row in the table view.
    Furthermore, if we edit the villain’s name, last seen date, or mugshot in the
    controls, we should see those new values reflected in the table view. However,
    we still only have one villain, and no way to track more. Let’s change that right
    now.


    ### Adding More Villains


    We stubbed out the `newVillain:` method earlier. Let’s fill in the implementation
    now. The `newVillain:` method adds a new “empty” villain object to our array of
    villains, tells the table to reload, and tells the table view which row to select
    (the last one, since that’s the one we just added).


    `- (IBAction)newVillain:(id)sender {`


     `[_window endEditingFor:nil];`


     `[self.villains addObject:[NSMutableDictionary`


      `dictionaryWithObjectsAndKeys:`


                `@"", kName`,


                `@"", kLastKnownLocation`,


                `[NSDate date], kLastSeenDate`,


                `@"", kSwornEnemy`,


                `@"Greed", kPrimaryMotivation`,


                `[NSArray array], kPowers`,


                `@"", kPowerSource`,


                `[NSNumber numberWithInt:0], kEvilness`,


                `[NSImage imageNamed:@"NSUser"], kMugshot`,


                `@"", kNotes`,


                `nil]];`


     `[self.villainsTableView reloadData];`


     `[self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains
    count]-1]`


      `byExtendingSelection:NO];`


    `}`


    The only new thing we might see in here is the very first method call, `[_window
    endEditingFor:nil]`. Let’s look at both parts of that. First, where did the `_window`
    instance variable come from? Xcode constructed this for us from a declared property
    that it generated in the `VillainTrackerAppDelegate.h` file, and automatically
    connected to the window:


    `@property (assign) IBOutlet NSWindow *window;`


    Since we didn’t give an explicit name via a `@synthesize` declaration, Xcode defaulted
    to creating a new instance variable with a leading underscore. Second is the method
    that we’re calling on the window, `endEditingFor:`. This simply tells the window
    that it’s time to end whatever other editing behavior the user is currently engaged
    in, such as typing in a text field. We need to call this method so that the edited
    value can be “saved” to its underlying villain object because later in `newVillain:`
    we’re going to change the table view’s selection, which would in turn wipe out
    the values shown in the various controls!'
  trans: "\n### 表格视图需要协助\n\n我们已经要求表格视图加载其内容，但在我们连接了表格视图的`dataSource`和`delegate`出口的对象——即`VillainTrackerAppDelegate`中，实现`NSTableDataSource`和`NSTableViewDelegate`协议中的某些方法之前，它无法执行任何操作。`NSTableDataSource`和`NSTableViewDelegate`是非正式协议，与大多数委托协议类似，这意味着我们无需声明自己的类符合该协议。因此，就\
    \ Objective-C 而言，实现`NSTableDataSource`和`NSTableViewDelegate`的方法是可选的。尽管如此，要让表格视图显示任何内容，实际上有几个方法是必需的：来自`NSTableViewDataSource`的`numberOfRowsInTableView:`和来自`NSTableViewDelegate`的`tableView:viewForTableColumn:row:`，表格视图会使用这两个方法来准备要显示的内容。以下是在`VillainTrackerAppDelegate.m`中实现这些方法的方式：\n\
    \n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView *)aTableView {\n    return\
    \ [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView *)aTableView\n\
    \       viewForTableColumn:(NSTableColumn *)tableColumn\n                    \
    \  row:(NSInteger)row {\n    NSMutableDictionary *thisVillain = [self.villains\
    \ objectAtIndex:row];\n    NSString *thisColName = [tableColumn identifier];\n\
    \    NSView *result = nil;\n\n    // 根据我们使用的列，需要执行不同的操作。\n    // 将 [tableColumn\
    \ identifier] 传递给 makeViewWithIdentifier 可以确保我们获得\n    // 已在 IB 中为该列配置好的视图，AppKit\
    \ 会为我们管理这一点。\n    if ([thisColName isEqualToString:kName]) {\n        NSTableCellView\
    \ *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];\n  \
    \      thisCell.textField.stringValue = [thisVillain objectForKey:kName];\n  \
    \      result = thisCell;\n    } else if ([thisColName isEqualToString:kLastSeenDate])\
    \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
    \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
    \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
    \        result = thisCell;\n    }\n\n    // 返回结果。\n    return result;\n}\n```\n\
    \n第一个方法不言自明：我们只需返回数组的大小，以便表格视图知道需要显示多少行。每当单元格即将在表格中显示时，表格视图都会调用第二个方法。表格视图会告诉我们它想要显示的列和行索引编号。行索引编号与内容数组中相关对象的索引编号相同，因此调用`[villains\
    \ objectAtIndex:rowIndex]`会从`villains`中返回相应的模型对象。你可能还记得，我们使用的模型对象实际上只是`NSMutableDictionary`实例，其所有值都可通过键访问。当我们在表格视图中配置每列的标识符属性时，我们使用了与模型对象相同的键名。根据列的标识符，我们要求表格视图使用`makeViewWithIdentifier:owner:`为该列创建适当的`NSView`子类实例。然后，我们根据模型对象中的相关值配置视图，并将其返回给表格视图。\n\
    \n例如，当`Name`列下顶行中的单元格即将显示时，系统会调用此方法，其中`rowIndex`为 0，`TableColumn`指向`Name NSTableColumn`。我们使用\
    \ 0 来指定从`villains`数组中抓取哪个反派，然后使用表列标识符方法返回的值`@\"name\"`，从选中的反派中检索一个值。我们要求表格视图为那列获取一个适当的`NSView`实例（我们在\
    \ Interface Builder 中配置了该实例），然后以适合该`NSView`的任何方式填充它。最后，我们返回该视图，表格视图将其绘制出来。\n\n\
    现在，我们应该能够编译并运行`VillainTracker`，并看到默认反派既显示在控件中，也作为表格视图中的唯一一行显示。此外，如果我们在控件中编辑反派的名称、最后目击日期或头像，我们应该会在表格视图中看到这些新值的反映。然而，我们目前仍然只有一个反派，并且没有办法追踪更多。让我们现在就来改变这一点。\n\
    \n### 添加更多反派\n\n我们之前已经搭建了`newVillain:`方法的框架。现在我们来填充其实现。`newVillain:`方法会向我们的反派数组中添加一个新的“空”反派对象，通知表格重新加载，并告诉表格视图应选择哪一行（最后一行，因为这是我们刚刚添加的那一行）。\n\
    \n```\n- (IBAction)newVillain:(id)sender {\n    [_window endEditingFor:nil];\n\
    \    [self.villains addObject:[NSMutableDictionary\n        dictionaryWithObjectsAndKeys:\n\
    \            @\"\", kName,\n            @\"\", kLastKnownLocation,\n         \
    \   [NSDate date], kLastSeenDate,\n            @\"\", kSwornEnemy,\n         \
    \   @\"Greed\", kPrimaryMotivation,\n            [NSArray array], kPowers,\n \
    \           @\"\", kPowerSource,\n            [NSNumber numberWithInt:0], kEvilness,\n\
    \            [NSImage imageNamed:@\"NSUser\"], kMugshot,\n            @\"\", kNotes,\n\
    \            nil]];\n    [self.villainsTableView reloadData];\n    [self.villainsTableView\
    \ selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains count]-1]\n       \
    \             byExtendingSelection:NO];\n}\n```\n\n我们在这里可能看到的唯一新内容是第一个方法调用`[_window\
    \ endEditingFor:nil]`。我们来分析一下它的两个部分。首先，`_window`实例变量来自哪里？Xcode 根据它在`VillainTrackerAppDelegate.h`文件中生成的已声明属性，为我们构造了这个变量，并自动将其连接到窗口：\n\
    \n`@property (assign) IBOutlet NSWindow *window;`\n\n由于我们没有通过`@synthesize`声明给出显式名称，Xcode\
    \ 默认创建了一个带有前导下划线的新实例变量。其次是我们对窗口调用的方法`endEditingFor:`。这仅仅是告诉窗口，现在是时候结束用户当前正在进行的任何其他编辑行为（例如在文本字段中键入）。我们需要调用此方法，以便可以将编辑后的值“保存”到其底层的反派对象中，因为稍后在`newVillain:`中我们将更改表格视图的选择，这反过来会擦除各个控件中显示的值！\n"
- fmt: "### Selecting A Villain\n\nThe details part of our application still shows\
    \ only the first villain in our list. In order to update the detail views, we\
    \ need to implement a delegate method that is called whenever the table view’s\
    \ selection changes. This lets us notice which row the user has selected, change\
    \ our villain instance variable to point at the relevant row in the villains array,\
    \ and redisplay all the other controls to match the new selection. Add this method\
    \ to the `@implementation` section in `VillianTrackerAppDelegate.m`:\n\n```\n\
    - (void)tableViewSelectionDidChange:(NSNotification *)aNotification {\n    if\
    \ ([self.villainsTableView selectedRow] > -1) {\n        self.villain = [self.villains\n\
    \                       objectAtIndex:[self.villainsTableView selectedRow]];\n\
    \        [self updateDetailViews];\n        NSLog(@\"current villain properties:\
    \ %@\", self.villain);\n    }\n}\n```\n\nNote that the meat of this method is\
    \ wrapped inside an `if` clause. That’s necessary because it’s possible for a\
    \ table view to tell us that it currently has no selected row at all, which it\
    \ does by returning –1 from its `selectedRow` method. Beyond that, you should\
    \ be able to understand what’s happening in there by now.\n\nNow compile and run\
    \ the app, and see that the + button now actually makes something happen, as shown\
    \ in Figure [6-9](#A978-1-4302-4543-8_6_Chapter.html#Fig9). Furthermore, we should\
    \ be able to click back and forth between all of the villains in the table view\
    \ and see the values in the other controls change accordingly.\n\n![A978-1-4302-4543-8_6_Fig9_HTML.jpg](A978-1-4302-4543-8_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9.\n\nThe + button now works to add villains\n\n### Stop Your Evil\
    \ Ways!\n\nIt’d be nice to be able to delete a villain. Once our hero has convinced\
    \ a villain to stop their evil ways, we might want to drop them from the database.\
    \ Or maybe we just made a typo. Either way, let’s add the ability to delete a\
    \ bad guy. We’ve got the `deleteVillain:` method stubbed out, and here’s what\
    \ that method should do. (We’ve added comments to show the different sections,\
    \ which will be described after the code.)\n\n```\n- (IBAction)deleteVillain:(id)sender\
    \ {\n    //\n    // Section 1:\n    //\n    [_window endEditingFor:nil];\n   \
    \ NSInteger selectedRow = [self.villainsTableView selectedRow];\n    //\n    //\
    \ Section 2:\n    //\n    [self.villains removeObjectIdenticalTo:self.villain];\n\
    \    [self.villainsTableView reloadData];\n    //\n    // Section 3:\n    //\n\
    \    if (selectedRow >= [self.villains count]) {\n        selectedRow = [self.villains\
    \ count]-1;\n    }\n    //\n    // Section 4:\n    //\n    if (selectedRow > -1)\
    \ {\n        // deselect all rows to ensure that the tableview sees the\n    \
    \    // selection as \"changed\", even though it might still have\n        //\
    \ the same row index.\n        //\n        // Section 5:\n        //\n       \
    \ [self.villainsTableView deselectAll:nil];\n        [self.villainsTableView selectRowIndexes:[NSIndexSet\
    \ indexSetWithIndex:selectedRow] byExtendingSelection:NO];\n        [self updateDetailViews];\n\
    \    }\n}\n```\n\nThis method is a bit more complicated than most of the code\
    \ we’ve shown you in this book so far, so a little additional explanation is in\
    \ order.\n\nIn Section 1, we tell the window to finish up any editing that’s going\
    \ on, then we grab the index of the table’s currently selected row—that is, the\
    \ row that’s going to be deleted. Note that we already know which villain is selected\
    \ because it’s stored in an instance variable, but having the row index is important\
    \ for making sure the post-delete selection makes sense (which we’ll tackle in\
    \ Section 4).\n\nIn Section 2, we delete the selected object (pointed at by the\
    \ villain property) from the villains array, then we tell the table view to reload.\
    \ Note the method for removing the villain from the array, `removeObjectIdenticalTo:`.\
    \ This method makes the `NSMutableArray` scan itself for the object by comparing\
    \ its actual memory address with the memory addresses of the objects it contains,\
    \ so that it finds and removes only the exact object we pass in. Otherwise, if\
    \ we had gone with the more commonly used `removeObject:` method, it would be\
    \ comparing objects by sending the `isEqual:` method, which in turn compares values.\
    \ In that case, any other villain objects we had entered with attributes identical\
    \ to those of the selected villain would run the risk of being deleted as well.\n\
    \nIn Section 3, we make a small adjustment. If the previous selected row index\
    \ was the last in the array, now that we’ve removed an object from the array,\
    \ that index is now out of bounds. In that case, we reset it to point at what\
    \ is now the last object.\n\nNext, Section 4 checks to see if `selectedRow` is\
    \ 0 or higher. This check is important because there’s a real chance that Section\
    \ 3 set it to –1! Consider the case where we only have one object in the array,\
    \ and click the Remove button: at the outset, `selectedRow` would be 0 (the index\
    \ of the only row in the array), but after Section 3 it would be –1, which Section\
    \ 4 handles by just skipping the rest of the method.\n\nFinally, Section 5 deselects\
    \ everything in the table view, then selects what we now want for the selected\
    \ row, and finally updates all the views based on the current selection. It may\
    \ not seem obvious, but it’s important to first deselect all rows in the table\
    \ view, otherwise the `tableViewSelectionDidChange:` delegate method may not always\
    \ be called (because often, after deleting a row, the selected row index itself\
    \ will be the same number, and the table view has no way of knowing that we’ve\
    \ deleted an object from our content array, making the row index number now refer\
    \ to a different object).\n\nNow compile and run the app; we can now delete the\
    \ selected villain and the values in the controls will change to match the new\
    \ selection.\n\nThere’s just one last feature we want to implement. Our users\
    \ can’t yet edit values directly in the table view. Let’s fix that now."
  raw: '### Selecting A Villain


    The details part of our application still shows only the first villain in our
    list. In order to update the detail views, we need to implement a delegate method
    that is called whenever the table view’s selection changes. This lets us notice
    which row the user has selected, change our villain instance variable to point
    at the relevant row in the villains array, and redisplay all the other controls
    to match the new selection. Add this method to the `@implementation` section in
    `VillianTrackerAppDelegate.m`:


    `- (void)tableViewSelectionDidChange:(NSNotification *)aNotification {`


     `if ([self.villainsTableView selectedRow] > -1) {`


      `self.villain = [self.villains`


               `objectAtIndex:[self.villainsTableView selectedRow]];`


      `[self updateDetailViews];`


      `NSLog(@"current villain properties: %@", self.villain);`


     `}`


    `}`


    Note that the meat of this method is wrapped inside an `if` clause. That’s necessary
    because it’s possible for a table view to tell us that it currently has no selected
    row at all, which it does by returning –1 from its `selectedRow` method. Beyond
    that, you should be able to understand what’s happening in there by now.


    Now compile and run the app, and see that the + button now actually makes something
    happen, as shown in Figure [6-9](#A978-1-4302-4543-8_6_Chapter.html#Fig9). Furthermore,
    we should be able to click back and forth between all of the villains in the table
    view and see the values in the other controls change accordingly.


    ![A978-1-4302-4543-8_6_Fig9_HTML.jpg](A978-1-4302-4543-8_6_Fig9_HTML.jpg)


    Figure 6-9.


    The + button now works to add villains


    ### Stop Your Evil Ways!


    It’d be nice to be able to delete a villain. Once our hero has convinced a villain
    to stop their evil ways, we might want to drop them from the database. Or maybe
    we just made a typo. Either way, let’s add the ability to delete a bad guy. We’ve
    got the `deleteVillain` `:` method stubbed out, and here’s what that method should
    do. (We’ve added comments to show the different sections, which will be described
    after the code.)


    `- (IBAction)deleteVillain:(id)sender {`


    `//`


    `// Section 1:`


    `//`


    `[_window endEditingFor:nil];`


    `NSInteger selectedRow = [self.villainsTableView selectedRow];`


    `//`


    `// Section 2:`


    `//`


    `[self.villains removeObjectIdenticalTo:self.villain];`


    `[self.villainsTableView reloadData];`


    `//`


    `// Section 3:`


    `//`


    `if (selectedRow >= [self.villains count]) {`


    `selectedRow = [self.villains count]-1;`


    `}`


    `//`


    `// Section 4:`


    `//`


    `if (selectedRow > -1) {`


    `// deselect all rows to ensure that the tableview sees the`


    `// selection as "changed", even though it might still have`


    `// the same row index.`


    `//`


    `// Section 5:`


    `//`


    `[self.villainsTableView deselectAll:nil];`


    `[self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:selectedRow]
    byExtendingSelection:NO];`


    `[self updateDetailViews];`


    `}`


    `}`


    This method is a bit more complicated than most of the code we’ve shown you in
    this book so far, so a little additional explanation is in order.


    In Section 1, we tell the window to finish up any editing that’s going on, then
    we grab the index of the table’s currently selected row—that is, the row that’s
    going to be deleted. Note that we already know which villain is selected because
    it’s stored in an instance variable, but having the row index is important for
    making sure the post-delete selection makes sense (which we’ll tackle in Section
    4).


    In Section 2, we delete the selected object (pointed at by the villain property)
    from the villains array, then we tell the table view to reload. Note the method
    for removing the villain from the array, `removeObjectIdenticalTo:`. This method
    makes the `NSMutableArray` scan itself for the object by comparing its actual
    memory address with the memory addresses of the objects it contains, so that it
    finds and removes only the exact object we pass in. Otherwise, if we had gone
    with the more commonly used `removeObject:` method, it would be comparing objects
    by sending the `isEqual:` method, which in turn compares values. In that case,
    any other villain objects we had entered with attributes identical to those of
    the selected villain would run the risk of being deleted as well.


    In Section 3, we make a small adjustment. If the previous selected row index was
    the last in the array, now that we’ve removed an object from the array, that index
    is now out of bounds. In that case, we reset it to point at what is now the last
    object.


    Next, Section 4 checks to see if `selectedRow` is 0 or higher. This check is important
    because there’s a real chance that Section 3 set it to –1! Consider the case where
    we only have one object in the array, and click the Remove button: at the outset,
    `selectedRow` would be 0 (the index of the only row in the array), but after Section
    3 it would be –1, which Section 4 handles by just skipping the rest of the method.


    Finally, Section 5 deselects everything in the table view, then selects what we
    now want for the selected row, and finally updates all the views based on the
    current selection. It may not seem obvious, but it’s important to first deselect
    all rows in the table view, otherwise the `tableViewSelectionDidChange:` delegate
    method may not always be called (because often, after deleting a row, the selected
    row index itself will be the same number, and the table view has no way of knowing
    that we’ve deleted an object from our content array, making the row index number
    now refer to a different object).


    Now compile and run the app; we can now delete the selected villain and the values
    in the controls will change to match the new selection.


    There’s just one last feature we want to implement. Our users can’t yet edit values
    directly in the table view. Let’s fix that now.'
  trans: "\n### 选择反派角色\n\n目前，我们应用详情部分只显示了列表中第一个反派角色。为了更新详情视图，我们需要实现一个委托方法，该方法会在表格视图的选择状态发生改变时被调用。这能使我们获知用户选中了哪一行，从而将我们的反派角色实例变量指向反派角色数组中对应的那一行，并重新显示所有其他控件以匹配新的选择。请将此方法添加到\
    \ `VillianTrackerAppDelegate.m` 文件的 `@implementation` 部分：\n\n```\n- (void)tableViewSelectionDidChange:(NSNotification\
    \ *)aNotification {\n    if ([self.villainsTableView selectedRow] > -1) {\n  \
    \      self.villain = [self.villains\n                       objectAtIndex:[self.villainsTableView\
    \ selectedRow]];\n        [self updateDetailViews];\n        NSLog(@\"current\
    \ villain properties: %@\", self.villain);\n    }\n}\n```\n\n请注意，此方法的核心代码被包裹在一个\
    \ `if` 子句中。之所以必须这么做，是因为表格视图可能会通知我们当前没有任何选中的行——其 `selectedRow` 方法会返回 –1 来表示这种情况。除此之外，你现在应该能够理解其中发生的事情了。\n\
    \n现在编译并运行应用，可以看到 + 按钮现在确实能触发某种操作，如图 6-9 所示。此外，我们应该能够在表格视图中点击切换不同的反派角色，并看到其他控件中的值随之改变。\n\
    \n![A978-1-4302-4543-8_6_Fig9_HTML.jpg](img/A978-1-4302-4543-8_6_Fig9_HTML.jpg)\n\
    \n图 6-9.\n\n+ 按钮现在可以添加反派角色了\n\n### 停止你的邪恶行径！\n\n能够删除一个反派角色会很好。一旦我们的英雄说服了一个反派停止其邪恶行径，我们可能就想把他们从数据库中移除。或者，也可能只是我们输入有误。无论如何，让我们增加删除坏蛋的功能。我们已经有一个\
    \ `deleteVillain:` 方法的存根，下面就是这个方法应该完成的工作。（我们添加了注释来标明不同的部分，这些部分将在代码之后进行说明。）\n\n\
    ```\n- (IBAction)deleteVillain:(id)sender {\n    //\n    // 第 1 部分：\n    //\n\
    \    [_window endEditingFor:nil];\n    NSInteger selectedRow = [self.villainsTableView\
    \ selectedRow];\n    //\n    // 第 2 部分：\n    //\n    [self.villains removeObjectIdenticalTo:self.villain];\n\
    \    [self.villainsTableView reloadData];\n    //\n    // 第 3 部分：\n    //\n  \
    \  if (selectedRow >= [self.villains count]) {\n        selectedRow = [self.villains\
    \ count]-1;\n    }\n    //\n    // 第 4 部分：\n    //\n    if (selectedRow > -1)\
    \ {\n        // 取消所有行的选中状态，以确保表格视图认为选择发生了“变化”，\n        // 即使它可能仍然指向相同的行索引。\n\
    \        //\n        // 第 5 部分：\n        //\n        [self.villainsTableView deselectAll:nil];\n\
    \        [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:selectedRow]\
    \ byExtendingSelection:NO];\n        [self updateDetailViews];\n    }\n}\n```\n\
    \n这个方法比我们本书迄今为止展示的大部分代码都要稍微复杂一些，因此有必要进行一些补充说明。\n\n在第 1 部分中，我们让窗口结束任何正在进行的编辑操作，然后获取表格当前选中行的索引——也就是即将被删除的那一行。请注意，我们已经知道哪个反派被选中了，因为它被存储在一个实例变量中，但拥有行索引对于确保删除后的选择逻辑正确至关重要（我们将在第\
    \ 4 部分处理这个问题）。\n\n在第 2 部分中，我们从反派角色数组中删除选中的对象（由 `villain` 属性指向的对象），然后告诉表格视图重新加载数据。请注意从数组中移除反派角色的方法是\
    \ `removeObjectIdenticalTo:`。这个方法会让 `NSMutableArray` 通过比较对象的实际内存地址与它所包含对象的内存地址来自我扫描，以便只找到并移除我们传入的那个确切对象。否则，如果我们使用更常用的\
    \ `removeObject:` 方法，它会通过发送 `isEqual:` 方法来比较对象，而后者会比较对象的值。在这种情况下，其他与选中反派属性完全相同的反派对象也存在被一并删除的风险。\n\
    \n在第 3 部分中，我们做一个小调整。如果之前选中的行索引是数组中的最后一个索引，那么在我们从数组中移除一个对象之后，该索引现在就越界了。在这种情况下，我们将其重置为指向当前最后一个对象。\n\
    \n接下来，第 4 部分检查 `selectedRow` 是否大于等于 0。这个检查很重要，因为第 3 部分有可能将其设置为 –1！考虑一下这种情况：数组中只有一个对象，我们点击了“删除”按钮：开始时，`selectedRow`\
    \ 会是 0（数组中唯一一行的索引），但在第 3 部分之后它变成了 –1，第 4 部分通过直接跳过方法的其余部分来处理这种情况。\n\n最后，第 5 部分取消表格视图中所有行的选中状态，然后选中我们当前想要的行，并最终根据当前选择更新所有视图。这看起来可能不明显，但首先取消表格视图中所有行的选中状态很重要，否则\
    \ `tableViewSelectionDidChange:` 委托方法可能不会被调用（因为通常在删除一行后，选中的行索引本身还是同一个数字，而表格视图无法知道我们已从内容数组中删除了一个对象，导致该行索引现在指向了一个不同的对象）。\n\
    \n现在编译并运行应用；我们现在可以删除选中的反派角色，并且控件中的值会随之改变以匹配新的选择。\n\n我们只剩下最后一个特性想要实现。我们的用户还不能直接在表格视图中编辑值。现在让我们来解决这个问题。\n"
- fmt: '### Editing in the Table View


    A user should be able to edit the name of a villain or drag in a new mugshot to
    any row in the table view and update the appropriate villain. Since the columns
    of the table view are `NSViews`, each cell in the table view can have a target
    and action specified in Interface Builder; user-interface elements inside of a
    table view work just like any other view. When the user edits a value inside the
    table view, the action can connect back to our code to inform us of the change.
    We''re limited in that the target must be the delegate of the table view, but
    that''s not a problem for this application. In addition, our existing `takeName:`
    and `takeMugshot:` methods are available, but they''ll need some minor changes.
    These methods work on the selected villain, but the user can''t edit a value inside
    the table view without selecting the row, which selects the villain. However,
    these methods currently expect to only be called from the control in the Details
    view, but now we''re adding the ability to set it from more than one place. For
    this app, we''ll only allow in-row editing of the name and the mugshot, and we''ll
    prohibit editing of the date last seen.


    There''s another small barrier that we''ll need to resolve. The table view cells
    are, by default, not editable. This is easy to change from within Xcode.


    To wire this up, we need to control-drag a connection from the view in each column
    into the `VillianTrackerAppDelegate` instance. However, the table view cells are
    buried pretty deep in the window''s view hierarchy, so we''ll look at a different
    way to set up the connection that makes it easier to get to the right user-interface
    component.


    Back in Xcode, open up the `MainMenu.xib` file, which will open up in an Interface
    Builder canvas. Click the small expansion triangle in the lower left-hand corner
    of the screen, which will expand the object dock along the left edge of the screen
    into an outline of the window''s view hierarchy. Also, open up the Attributes
    Inspector in the Utility area.


    Drill down into the outline to the Name column''s text field; from the outside
    in, the path is Window – Villain Tracker ➤ View ➤ Scroll View – Table View ➤ Table
    View ➤ Table Column – Name ➤ Table Cell View ➤ Static Text – Table View Cell ➤
    Text Field Cell – Table View Cell. As you drill in, you''ll also see this path
    laid out in the jump bar above the Editor canvas. Click the Text Field Cell –
    Table View Cell and control-drag to the Villain Tracker App Delegate instance
    further down in the dock, as shown in Figure [6-10](#A978-1-4302-4543-8_6_Chapter.html#Fig10).
    When the Utility window appears, select `takeName:` from the list of actions.
    Before moving on, look in the Attributes Inspector, also shown in Figure [6-10](#A978-1-4302-4543-8_6_Chapter.html#Fig10).
    There''s a pop-up menu labeled Behavior, with a current value of None. Select
    that and change it to Editable.


    ![A978-1-4302-4543-8_6_Fig10_HTML.jpg](A978-1-4302-4543-8_6_Fig10_HTML.jpg)


    Figure 6-10. Control-dragging using the dock


    Lastly, do the same thing from the Image Well. The path to the Image Well is Window
    – Villain Tracker ➤ View ➤ Scroll View – Table View ➤ Table View ➤ Table Column
    – Mugshot ➤ Image Well ➤ Image Cell. Control-drag from the `Image Well` row (not
    the `Image Cell` row, but the one above it) down to the Villain Tracker App Delegate,
    and select `takeMugshot:`. To make the Image Well editable, there''s a checkbox
    near the top of the Attributes Inspector. If you like, you can also enable Animates.
    If your villain''s mugshot includes animation information or multiple frames,
    for instance, an animated GIF from the villain''s MySpace page, then this will
    play the animation on display.


    As mentioned, the `takeName:` and `takeMugshot:` methods all expect to be called
    from the control doing the update in the Details view. Earlier, we added a call
    to `[villainsTableView reloadData]` to the end of each of these methods. We now
    need to add another call after that one. In both `takeName:` and `takeMugshot:`,
    add a call to `[self updateDetailViews]` at the end. This ensures that regardless
    of where a user makes an edit (in the table view or in the Details view) it''ll
    be reflected in both places.


    It''s time to compile and run the app again to see if we can edit within the table
    view. At this point, we should be able to add a new villain, edit their attributes,
    and then delete them. We still can''t save any information about the villain;
    that''ll be the topic of an upcoming chapter.


    ### Wrap Up


    This chapter contained a simple demonstration of how to maintain a list of items,
    display them in a table view, and edit the details for the selected item in a
    separate set of controls. We learned a bit about how `NSTableView` uses its `dataSource`
    to access items for display and editing, and saw how it informs its delegate when
    the selection changes, allowing us to manually update the content in views that
    are dependent on the table view''s selection.


    If you''re familiar with other desktop GUI development environments, some of this
    may have seemed a bit foreign to you, but we hope you can see some of the advantages
    included in the approach that Cocoa supports, such as providing a clean division
    between code and GUI layout. However, at this point it''s time for a confession:
    the way we''ve been doing things thus far isn''t necessarily the best way to do
    these sorts of things in Cocoa. As simple as it''s all been so far, we''ve actually
    been showing you the hard way to solve some of these problems! During the past
    few years, a new approach to GUI programming has taken root in the Cocoa community,
    and it''s becoming more prevalent all the time. It''s a technology called Cocoa
    bindings, and it''s the topic of [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html).'
