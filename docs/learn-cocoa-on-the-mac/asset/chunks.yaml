    \ = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n```\n\n需要注意的一点是 `[self\
    \ setNeedsDisplay:YES]` 调用。我们将在后面关于 Cocoa 绘图的章节中更详细地讨论这一点，但其基本思想是，当我们要在 `NSView`\
    \ 中绘制一些内容时，会调用此方法，该方法会设置一个标志，而当我们的应用程序完成处理当前正在处理的任何事件后，它会遍历打开的窗口以检查是否有任何窗口被标记为需要重绘，这最终会导致调用\
