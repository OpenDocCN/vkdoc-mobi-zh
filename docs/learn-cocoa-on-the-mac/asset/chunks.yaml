    ## 总结


    在本章中，我们学习了如何使用输出口和操作将对象彼此连接，了解了一些关于 OS X 框架的背景知识，并获得了更多在 Xcode 中布局用户界面的实践经验。输出口和操作是构建
    Cocoa 应用程序的基本概念，在接下来的章节中我们将进行大量的按住 Control 键拖动操作。然而，这可能还不太像编程。你的耐心即将得到回报，因为在下一章中，我们将实际编写一些代码，实现我们自己的操作方法，并了解如何将
    Cocoa 界面对象连接到我们自己的代码，而不仅仅是相互连接。


    # 4.  行动的号角


    正如我们在前两章中所见，Cocoa 提供给我们的一切免费功能实在令人惊叹。但前两个应用程序中缺少了一个大多数应用程序都需要的非常重要的东西：与用户交互的能力。在上一章使用
    Interface Builder 时，我们看到有一个完整的库，里面装满了诸如文本字段和按钮之类的对象，我们可以用它们来组装界面，但如果我们无法获知这些用户界面对象何时被使用或无法更改它们包含的数据，那么它们就毫无用处。在本章中，我们将了解如何使用这些对象让用户与我们的应用程序进行交互——通过对象的输出口和操作。


    ## 声明输出口和操作


    回顾上一章，Cocoa 使用称为输出口和操作的东西来连接用户界面中的对象与我们代码中的对象。输出口是指向我们 nib 文件中对象的指针，它允许我们的代码访问和操作
    nib 中的对象。操作是我们编写的方法，可以因用户交互（例如单击按钮或用户选择菜单项）而直接执行。输出口和操作通常包含在我们的控制器类中（尽管有时也用于其他地方）。

