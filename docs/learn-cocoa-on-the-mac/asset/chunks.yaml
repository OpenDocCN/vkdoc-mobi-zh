- fmt: "### Recognizing an Error\n\nSo now we know a little bit about the `NSError`\
    \ class. But, where do `NSError` instances come from, and how do they affect our\
    \ application while it’s running? Unlike exceptions, `NSError` objects don’t do\
    \ anything to change the flow of our code. Typically, an `NSError` instance is\
    \ returned to us from a method call, not as the return value but by referencing\
    \ a pointer we pass in. This form of parameter twiddling is not too uncommon in\
    \ C, but fairly unusual in Objective-C. The idea is that an error-prone method\
    \ should receive as a parameter a pointer to an `NSError` pointer. This means\
    \ we don’t pass in a pointer to an `NSError`, but rather a pointer to a pointer\
    \ (the address of our pointer) so that the receiving method can create an `NSError`\
    \ instance and assign our pointer to it! (This may sound confusing, but once you\
    \ see the pattern, things should clear up.)\n\nAs an example, consider the `NSFileManager`\
    \ class. The file manager lets us perform certain disk operations such as creating\
    \ directories, accessing file attributes, and so on. It has a method whose signature\
    \ looks like this:\n\n```\n- (NSDictionary *)attributesOfItemAtPath:(NSString\
    \ *)path\nerror:(NSError **)error\n```\n\nWe can use this method to access a dictionary\
    \ containing a whole lot of relevant file system information about the file or\
    \ directory specified in the `path` parameter. Note that the second parameter,\
    \ `error`, is of type `NSError**`, which means that we pass in a pointer to a\
    \ variable that can point at an `NSError`. If the method actually encounters an\
    \ error situation, it will create an `NSError` and stick its address in the location\
    \ specified by `error`. If we want to ignore any error that a method like this\
    \ produces, we can pass in the special `NULL` pointer as the last parameter.\n\
    \nThe following method shows what this looks like from the caller’s perspective.\
    \ We create a variable for pointing at an `NSError` and initialize it to point\
    \ at `nil`. Then we pass the address of that variable to a potentially error-generating\
    \ method and afterwards check the variable to see whether or not it’s still pointing\
    \ at `nil`. If not, we know that the method encountered an error, and we ask the\
    \ application to present the error to the user.\n\n```\n- (void)fileError {\n\
    \    NSFileManager *fileManager = [NSFileManager defaultManager];\n    // Declare\
    \ a variable and point it at nil\n    NSError *fileError = nil;\n    // Pass the\
    \ address of the fileError variable to the method\n    NSDictionary *attributes\
    \ = [fileManager\n        attributesOfItemAtPath:@\"/tmp\" error:&fileError];\n\
    \    // Check to see if the previous method call gave us an NSError\n    if (fileError\
    \ == nil) {\n        // Show the attributes\n        NSRunAlertPanel(@\"Found\
    \ file attributes\",\n            [attributes description], nil, nil, nil);\n\
    \    } else {\n        // Report the error\n        [NSApp presentError:fileError];\n\
    \    }\n}\n```\n\nFor simplicity’s sake, while exploring `NSError` we’ll continue\
    \ building onto the project we’re already playing with. Add the `fileError` method\
    \ shown previously to the app delegate class, and add a `[self fileError];` line\
    \ to the `applicationDidFinishLaunching:` method. Run the app, and we’ll see something\
    \ like the alert panel shown in Figure [13-8](#A978-1-4302-4543-8_13_Chapter.html#Fig8).\n\
    \n![A978-1-4302-4543-8_13_Fig8_HTML.jpg](A978-1-4302-4543-8_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8. No error here!\n\nNow go back and edit the `fileManager` call,\
    \ changing the string parameter from `@\"/tmp\"` to `@\"/tmpfoo\"` or some other\
    \ non-existent path. This will cause `fileManager` to encounter an error and give\
    \ it back to us, in the `fileError` variable whose address we passed in. It will\
    \ notice this error and pass it off to `NSApp`, resulting in the alert panel shown\
    \ in [Figure 12-5](#A978-1-4302-4543-8_13_Chapter.html#Fig5).\n\n![A978-1-4302-4543-8_13_Fig9_HTML.jpg](A978-1-4302-4543-8_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9. There’s the error\n\nThat’s fine, but look at the text in that\
    \ alert panel: “The file “tmpfoo” couldn’t be opened because there is no such\
    \ file.” Doesn’t that seem a little… non-technical? Aren’t we used to a bit more\
    \ jargony language in our computer systems? After all, the error was triggered\
    \ by a low-level system routine that reported just an error number and nothing\
    \ else. Where did that text come from?\n\nIt turns out that `NSError` has a method\
    \ called `localizedDescription`, which gives us a nice, human-readable explanation\
    \ of the error. This description is what’s eventually displayed by the `reportError:`\
    \ method.\n\nLet’s explore this a bit by using the debugger. In Xcode, set a breakpoint\
    \ on the line containing `[NSApp presentError:fileError]` by clicking in the gutter\
    \ to the left of the line in the text editor (the gutter is the space where the\
    \ line numbers are shown). This is the most straightforward way to set a breakpoint\
    \ in our code. Then run the app again. The app will halt at the chosen line, leaving\
    \ us with the lldb prompt in the output console. Let’s dig in a bit, asking the\
    \ error about its domain and error code by executing commands at the lldb prompt:\n\
    \n```\n(lldb) po [fileError domain]\n$0 = 0x00007fff7cdab110 NSCocoaErrorDomain\n\
    (lldb) p (int)[fileError code]\n(int) $1 = 260\n(lldb) po [fileError localizedDescription]\n\
    $2 = 0x0000000102327470 The file \"tmpfoo\" couldn't be opened because there is\
    \ no such file.\n```\n\nNote that we can print the value of an `NSString` using\
    \ the `po` command and the value of any basic C type using the `p` command. Often\
    \ when using the `p` command, lldb will complain that it doesn’t know the type\
    \ of the value we’re trying to display, so we put a little `(int)` just before\
    \ the method call, which tells lldb what to expect.\n\nNow we know the error code\
    \ and domain. A quick look in `FoundationErrors.h` turns up this info:\n\n```\n\
    NSFileReadNoSuchFileError = 260,    // Read error (no such file)\n```\n\nThat\
    \ still might leave you wondering how this hangs together. As you recall, when\
    \ you create an `NSError`, you specify a domain, a code, and optionally a dictionary\
    \ containing additional info. This dictionary is a key piece of the puzzle. If\
    \ the dictionary you pass into this method has a value for a key called `@\"NSLocalizedDescriptionKey\"\
    `, then that value will be returned whenever `localizedDescription` is called.\n\
    \nSo, let’s see what the `userInfo` dictionary contains.\n\n```\n(lldb) po [fileError\
    \ userInfo]\n$3 = 0x0000000102118850 {\n    NSFilePath = \"/tmpfoo\";\n    NSUnderlyingError\
    \ = \"Error Domain=NSPOSIXErrorDomain Code=2 \\\"The operation couldn\\U2019t\
    \ be completed. No such file or directory\\\"\";\n}\n```\n\nUm, apparently that’s\
    \ not the answer. The `userInfo` dictionary doesn’t specify a localized description,\
    \ but it does include a couple of other things: the path to the file we were trying\
    \ to access, and what looks like another `NSError`. An error wrapped inside an\
    \ error! Let’s see what that inner error’s `domain`, `code`, `userInfo`, and `localizedError`\
    \ look like. We start off with another lldb command called `expression`, which\
    \ simply executes the statements on the rest of the line just as if it were source\
    \ code, but without printing a result like the `po` or `p` commands do. In this\
    \ case, we’re assigning the address of the inner error object to a new variable\
    \ we’re calling `$inner`. This is a nice feature of lldb that lets us hang on\
    \ to the results of queries we execute, letting values stick around, and saving\
    \ us some typing later on. We’ll grab the `userInfo` dictionary from the `fileError`,\
    \ then immediately use Objective-C’s new dictionary look-up syntax to access the\
    \ underlying error.\n\n```\n(lldb) expression id $inner = [fileError userInfo][@\"\
    NSUnderlyingError\"]\n(lldb) po $inner\n$inner = 0x000000010210a9e0 Error Domain=NSPOSIXErrorDomain\
    \ Code=2 \"The operation couldn't be completed. No such file or directory\"\n\
    ```"
