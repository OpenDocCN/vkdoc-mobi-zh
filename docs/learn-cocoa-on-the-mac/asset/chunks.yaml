    然而，即使计算机的硬件和操作系统能够与多核心协同工作，编写能够有效利用多核心的应用程序软件在技术上仍然具有挑战性。在大多数开发环境中，默认假设是我们编写的代码是顺序执行的，一个操作接着另一个操作，而将工作拆分以便可以并发执行可能是一项相当艰巨的任务。


    本章将展示一个常见场景的示例，在该场景中 Cocoa 应用程序可以从并发中受益，并演示如何实现。你一定熟悉 OS X 的旋转磁盘光标（有时称为“旋转沙滩球死亡之兆”），每当应用程序对用户操作无响应时就会出现。这通常出现在我们点击某个按钮或菜单项，触发了任何需要几秒钟以上时间的处理时。OS
    X 会注意到进程没有处理输入事件，并显示旋转磁盘光标以提醒用户。当应用程序完全停止响应并即将崩溃（或被用户强制关闭）时，也会发生这种情况。因此，当应用停止响应并开始显示旋转磁盘光标时，许多用户的即时反应是恐慌，怀疑应用即将崩溃！


    因此，为了我们的最佳利益，必须确保应用程序中任何长时间运行的操作都以这样一种方式处理：用户仍然可以与应用程序交互，并且不会看到旋转磁盘——即让操作在后台进行，同时让应用程序像平常一样处理用户输入事件。本章将演示两种以最少的麻烦向
    Cocoa 应用程序添加此类并发的方法。我们将使用 Foundation 框架中可用的`NSOperation`和`NSOperationQueue`类所体现的概念，还将看到如何使用
    Grand Central Dispatch（以下简称 GCD）来实现这一点，这是一个所有 OS X 应用程序（无论是否基于 Cocoa）都能使用的 C 语言
    API。

    '
- fmt: "# SlowWorker\n\nAs a platform for demonstrating these concurrency options,\
    \ we’ll create a simple application called `SlowWorker`, which simulates doing\
    \ some long-running operations such as fetching data from a server and performing\
    \ some calculations. This app presents the user with a button to initiate some\
    \ work and shows the results in a text view (see Figure [17-1](#A978-1-4302-4543-8_17_Chapter.html#Fig1)).\n\
    \n![A978-1-4302-4543-8_17_Fig1_HTML.jpg](A978-1-4302-4543-8_17_Fig1_HTML.jpg)\n\
    \nFigure 17-1. The SlowWorker in action (inaction?)\n\nStart by making a new Cocoa\
    \ application in Xcode. Name it `SlowWorker`, and use `SW` as the class prefix.\
    \ No Core Data or Document support is necessary. Once that’s done, add the following\
    \ bold code to `SWAppDelegate.h`:\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ SWAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n@property (weak) IBOutlet NSButton *startButton;\n@property\
    \ (assign) IBOutlet NSTextView *resultsTextView;\n@property (assign) BOOL isWorking;\n\
    \n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\nThis defines a couple of outlets\
    \ to the two objects visible in our GUI, a Boolean flag called `isWorking` (which\
    \ we’ll use later to keep track of whether we have stuff going on in the background\
    \ or not), and an action method to be triggered by the button.\n\n**Note:** The\
    \ sharp-eyed will notice that the `resultsTextView` property is declared with\
    \ `assign` instead of `weak`. That’s because the `NSTextView` forbids us to use\
    \ it in a weak context, just like `NSWindow`, which was discussed in [Chapter\
    \ 11](#A978-1-4302-4543-8_11_Chapter.html). There aren’t many classes in OS X\
    \ that have this restriction, but you can take comfort in the fact that Xcode\
    \ will give you a confusing “synthesis of a weak-unavailable property is disallowed”\
    \ when you try to use weak with a class that doesn’t like it. This is the price\
    \ of backward compatibility.\n\nNow add the bold methods from the following code\
    \ block to `SWAppDelegate.m`:\n\n```\n#import \"SWAppDelegate.h\"\n\n@implementation\
    \ SWAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n\
    {\n    // Insert code here to initialize your application\n}\n\n- (NSString *)fetchSomethingFromServer\n\
    {\n    sleep(1);\n    return @\"Hi there\";\n}\n\n- (NSString *)processData:(NSString\
    \ *)data\n{\n    sleep(2);\n    return [data uppercaseString];\n}\n\n- (NSString\
    \ *)calculateFirstResult:(NSString *)data\n{\n    sleep(3);\n    return [NSString\
    \ stringWithFormat:@\"Number of chars: %ld\",\n            [data length]];\n}\n\
    \n- (NSString *)calculateSecondResult:(NSString *)data\n{\n    sleep(4);\n   \
    \ return [data stringByReplacingOccurrencesOfString:@\"E\"\n                 \
    \                         withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\n\
    {\n    NSDate *startTime = [NSDate date];\n    NSString *fetchedData;\n    NSString\
    \ *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\n   \
    \ self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                              @\"Fetched: %@\\n\", fetchedData];\n\n    processed\
    \ = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                              @\"Processed: %@\\n\"\
    , processed];\n\n    firstResult = [self calculateFirstResult:processed];\n  \
    \  secondResult = [self calculateSecondResult:processed];\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \        @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n              \
    \                firstResult, secondResult];\n\n    NSDate *endTime = [NSDate\
    \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
    \n    self.isWorking = NO;\n}\n\n@end\n```\n\nNote that the work of this class\
    \ (such as it is) is split up into a number of small chunks. This code is just\
    \ meant to simulate some slow activities, and none of these methods really does\
    \ anything time consuming at all. So, to make it interesting, each method contains\
    \ a call to the `sleep()` function, which simply makes the program (specifically,\
    \ the thread from which the function is called) effectively pause and do nothing\
    \ at all for the given number of seconds. The `doWork:` method also contains code\
    \ at the beginning and end to calculate the amount of time it took for all the\
    \ work to be done.\n\nNow, open up `MainMenu.xib`, and put an `NSButton` and an\
    \ `NSTextView` into the empty window, laying things out as shown in Figure [17-1](#A978-1-4302-4543-8_17_Chapter.html#Fig1).\
    \ Connect the app delegate’s two outlets to the relevant controls, and connect\
    \ the button’s action back to the app delegate’s `doWork:` method. Then configure\
    \ the `NSTextView` a bit, deleting the example text from the view, and turning\
    \ off the **Editable** checkbox in the Attributes Inspector.\n\nNow save the work,\
    \ and hit **Run** in Xcode. The app should start, and clicking the button will\
    \ make it work for about ten seconds (the sum of all those sleep amounts) before\
    \ showing the results. About five or six seconds in, the mouse cursor will change\
    \ to the spinning-disk cursor, and it stays that way until the work is complete.\
    \ The `NSTextView` we put in the window remains blank until the end, even though\
    \ our code tries to update its content occasionally, because the main thread that\
    \ needs to redraw the display is “stuck” doing all of our background processing.\
    \ Also, during the entire time, the application’s menu is unresponsive, along\
    \ with the window controls. In fact, the only way we can interact with our application\
    \ at all, besides killing it with Mac OS X’s Force Quit window, is to move its\
    \ window around because the OS itself handles that. This is exactly the state\
    \ of affairs we want to avoid! In this particular case, it’s not too bad because\
    \ the application appears to be hung for just a few seconds. However, if your\
    \ app regularly “beachballs” this way for much longer than that, you’ll end up\
    \ with some unhappy users—and maybe even some ex-users!"
  raw: '## SlowWorker


    As a platform for demonstrating these concurrency options, we’ll create a simple
    application called SlowWorker, which simulates doing some long-running operations
    such as fetching data from a server and performing some calculations. This app
    presents the user with a button to initiate some work and shows the results in
    a text view (see Figure [17-1](#A978-1-4302-4543-8_17_Chapter.html#Fig1)).


    ![A978-1-4302-4543-8_17_Fig1_HTML.jpg](A978-1-4302-4543-8_17_Fig1_HTML.jpg)


    Figure 17-1.


    The SlowWorker in action (inaction?)


    Start by making a new Cocoa application in Xcode. Name it SlowWorker, and use
    SW as the class prefix. No Core Data or Document support is necessary. Once that’s
    done, add the following bold code to SWAppDelegate.h :


    `#import <Cocoa/Cocoa.h>`


    `@interface SWAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet NSButton *startButton;`


    `@property (assign) IBOutlet NSTextView *resultsTextView;`


    `@property (assign) BOOL isWorking;`


    `- (IBAction)doWork:(id)sender;`


    `@end`


    This defines a couple of outlets to the two objects visible in our GUI, a Boolean
    flag called `isWorking` (which we’ll use later to keep track of whether we have
    stuff going on in the background or not), and an action method to be triggered
    by the button.


    Note


    The sharp-eyed will notice that the `resultsTextView` property is declared with
    `assign` instead of `weak`. That’s because the `NSTextView` forbids us to use
    it in a weak context, just like `NSWindow`, which was discussed in [Chapter 11](#A978-1-4302-4543-8_11_Chapter.html).
    There aren’t many classes in OS X that have this restriction, but you can take
    comfort in the fact that Xcode will give you a confusing “synthesis of a weak-unavailable
    property is disallowed” when you try to use weak with a class that doesn’t like
    it. This is the price of backward compatibility.


    Now add the bold methods from the following code block to SWAppDelegate.m :


    `#import "SWAppDelegate.h"`


    `@implementation SWAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `// Insert code here to initialize your application`


    `}`


    `- (NSString *)fetchSomethingFromServer`


    `{`


    `sleep(1);`


    `return @"Hi there";`


    `}`


    `- (NSString *)processData:(NSString *)data`


    `{`


    `sleep(2);`


    `return [data uppercaseString];`


    `}`


    `- (NSString *)calculateFirstResult:(NSString *)data`


    `{`


    `sleep(3);`


    `return [NSString stringWithFormat:@"Number of chars: %ld"`,


    `[data length]];`


    `}`


    `- (NSString *)calculateSecondResult:(NSString *)data`


    `{`


    `sleep(4);`


    `return [data stringByReplacingOccurrencesOfString:@"E"`


    `withString:@"e"];`


    `}`


    `- (IBAction)doWork:(id)sender`


    `{`


    `NSDate *startTime = [NSDate date];`


    `NSString *fetchedData;`


    `NSString *processed;`


    `NSString *firstResult;`


    `NSString *secondResult;`


    `self.isWorking = YES;`


    `fetchedData = [self fetchSomethingFromServer];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Fetched: %@\n", fetchedData];`


    `processed = [self processData:fetchedData];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Processed: %@\n", processed];`


    `firstResult = [self calculateFirstResult:processed];`


    `secondResult = [self calculateSecondResult:processed];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"First Result: [%@]\nSecond Result: [%@]\n\n"`,


    `firstResult, secondResult];`


    `NSDate *endTime = [NSDate date];`


    `NSLog(@"Completed in %f seconds"`,


    `[endTime timeIntervalSinceDate:startTime]);`


    `self.isWorking = NO;`


    `}`


    `@end`


    Note that the work of this class (such as it is) is split up into a number of
    small chunks. This code is just meant to simulate some slow activities, and none
    of these methods really does anything time consuming at all. So, to make it interesting,
    each method contains a call to the `sleep()` function, which simply makes the
    program (specifically, the thread from which the function is called) effectively
    pause and do nothing at all for the given number of seconds. The `doWork:` method
    also contains code at the beginning and end to calculate the amount of time it
    took for all the work to be done.


    Now, open up MainMenu.xib, and put an `NSButton` and an `NSTextView` into the
    empty window, laying things out as shown in Figure [17-1](#A978-1-4302-4543-8_17_Chapter.html#Fig1).
    Connect the app delegate’s two outlets to the relevant controls, and connect the
    button’s action back to the app delegate’s `doWork:` method. Then configure the
    `NSTextView` a bit, deleting the example text from the view, and turning off the
    Editable checkbox in the Attributes Inspector.


    Now save the work, and hit Run in Xcode. The app should start, and clicking the
    button will make it work for about ten seconds (the sum of all those sleep amounts)
    before showing the results. About five or six seconds in, the mouse cursor will
    change to the spinning-disk cursor, and it stays that way until the work is complete.
    The `NSTextView` we put in the window remains blank until the end, even though
    our code tries to update its content occasionally, because the main thread that
    needs to redraw the display is “stuck” doing all of our background processing.
    Also, during the entire time, the application’s menu is unresponsive, along with
    the window controls. In fact, the only way we can interact with our application
    at all, besides killing it with Mac OS X’s Force Quit window, is to move its window
    around because the OS itself handles that. This is exactly the state of affairs
    we want to avoid! In this particular case, it’s not too bad because the application
    appears to be hung for just a few seconds. However, if your app regularly “beachballs”
    this way for much longer than that, you’ll end up with some unhappy users—and
    maybe even some ex-users!'
  trans: "\n# SlowWorker\n\n作为展示这些并发选项的平台，我们将创建一个名为 `SlowWorker` 的简单应用程序，它模拟执行一些长时间运行的操作，例如从服务器获取数据和执行计算。该应用为用户提供一个按钮来启动某项工作，并在文本视图中显示结果（见图\
    \ 17-1）。\n\n![A978-1-4302-4543-8_17_Fig1_HTML.jpg](img/A978-1-4302-4543-8_17_Fig1_HTML.jpg)\n\
    \n图 17-1. SlowWorker 的运行状态（或者说“静止状态”？）\n\n首先，在 Xcode 中创建一个新的 Cocoa 应用程序。将其命名为\
    \ `SlowWorker`，并使用 `SW` 作为类前缀。不需要 Core Data 或文档支持。完成后，将以下粗体代码添加到 `SWAppDelegate.h`\
    \ 中：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface SWAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSButton\
    \ *startButton;\n@property (assign) IBOutlet NSTextView *resultsTextView;\n@property\
    \ (assign) BOOL isWorking;\n\n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n\
    这定义了两个指向 GUI 中可见对象的输出口、一个名为 `isWorking` 的布尔标志（我们稍后将用它来跟踪后台是否有任务正在运行），以及一个将由按钮触发的操作方法。\n\
    \n**注意：** 目光敏锐的读者会发现 `resultsTextView` 属性使用了 `assign` 而非 `weak` 声明。这是因为 `NSTextView`\
    \ 禁止我们在弱引用上下文中使用它，就像第 11 章中讨论的 `NSWindow` 一样。在 OS X 中，没有多少类有这种限制，但你可以放心，当你尝试对不支持的类使用弱引用时，Xcode\
    \ 会给出令人困惑的“不允许合成弱引用不可用的属性”错误。这就是向后兼容的代价。\n\n现在，将以下代码块中的粗体方法添加到 `SWAppDelegate.m`\
    \ 中：\n\n```\n#import \"SWAppDelegate.h\"\n\n@implementation SWAppDelegate\n\n\
    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n   \
    \ // 在此处插入代码以初始化您的应用程序\n}\n\n- (NSString *)fetchSomethingFromServer\n{\n    sleep(1);\n\
    \    return @\"Hi there\";\n}\n\n- (NSString *)processData:(NSString *)data\n\
    {\n    sleep(2);\n    return [data uppercaseString];\n}\n\n- (NSString *)calculateFirstResult:(NSString\
    \ *)data\n{\n    sleep(3);\n    return [NSString stringWithFormat:@\"Number of\
    \ chars: %ld\",\n            [data length]];\n}\n\n- (NSString *)calculateSecondResult:(NSString\
    \ *)data\n{\n    sleep(4);\n    return [data stringByReplacingOccurrencesOfString:@\"\
    E\"\n                                          withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\n\
    {\n    NSDate *startTime = [NSDate date];\n    NSString *fetchedData;\n    NSString\
    \ *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\n   \
    \ self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                              @\"Fetched: %@\\n\", fetchedData];\n\n    processed\
    \ = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                              @\"Processed: %@\\n\"\
    , processed];\n\n    firstResult = [self calculateFirstResult:processed];\n  \
    \  secondResult = [self calculateSecondResult:processed];\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \        @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n              \
    \                firstResult, secondResult];\n\n    NSDate *endTime = [NSDate\
    \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
    \n    self.isWorking = NO;\n}\n\n@end\n```\n\n注意，这个类的工作（实际上就是这样）被拆分成若干小块。这段代码只是为了模拟一些缓慢的活动，这些方法本身实际上并没有耗费多少时间。所以，为了使其更有趣，每个方法都包含一个对\
    \ `sleep()` 函数的调用，这使得程序（具体来说是调用该函数的线程）在给定的秒数内暂停并什么都不做。`doWork:` 方法还在开头和结尾处包含了计算所有工作完成所需时间的代码。\n\
    \n现在，打开 `MainMenu.xib`，将一个 `NSButton` 和一个 `NSTextView` 放入空窗口中，按图 17-1 所示进行布局。将应用委托的两个输出口连接到相应的控件，并将按钮的动作连接回应用委托的\
    \ `doWork:` 方法。然后稍微配置一下 `NSTextView`，删除视图中的示例文本，并在属性检查器中取消选中 **Editable** 复选框。\n\
    \n现在保存工作，并在 Xcode 中点击 **Run**。应用程序应启动，点击按钮后，它将运行大约十秒钟（所有 sleep 时间的总和），然后才显示结果。大约五六秒后，鼠标光标将变成旋转的磁盘光标，并一直保持到工作完成。我们放置在窗口中的\
    \ `NSTextView` 直到最后都是空白的，尽管我们的代码偶尔会尝试更新其内容，这是因为需要重绘显示的主线程“卡住”了，正在处理所有后台任务。此外，在整个过程中，应用程序的菜单以及窗口控件都无法响应。实际上，除了通过\
    \ Mac OS X 的“强制退出”窗口来终止它之外，我们唯一能与应用程序交互的方式就是移动它的窗口，因为操作系统本身会处理这个操作。这正是我们要避免的状况！在这种特定情况下，情况并不算太糟，因为应用程序似乎只是挂起了几秒钟。但是，如果您的应用经常以这种“沙滩球”方式挂起远超过这个时间，那么您最终将招致一些不满的用户——甚至可能是一些前用户！\n"
- fmt: '# Threading Basics


    Before we start implementing solutions, let’s go over some of the basics involved
    in concurrency. This is far from a complete description of threading in OS X or
    threading in general. For that, you’ll need to look elsewhere. We just want to
    explain enough for you to understand what we’re doing in this chapter.


    In most modern operating systems (including, of course, OS X), apart from the
    notion of a process, which contains a running instance of a program stored on
    disk, there’s also the notion of threads of execution. Each process can consist
    of multiple threads that all run concurrently. If there’s just one processor core,
    the OS will switch between executing multiple threads, much like it switches between
    executing multiple processes. If there’s more than one core available, the threads
    will be distributed among them just like processes are.


    All threads in a process share the same executable program code and the same global
    data. Each thread can also have some data that is exclusive to the thread. Threads
    can make use of a special structure called a mutex (short for mutual exclusion)
    or a lock, which can ensure that a particular chunk of code can’t be run by multiple
    threads at once. This is useful for ensuring correct outcomes when multiple threads
    access the same data simultaneously by locking out other threads when one thread
    is updating a value (in what’s called a “critical section” of the code). For example,
    let’s say our application implements a banking system where an account balance
    can be modified as part of a transaction. In a multi-threaded system, we need
    to protect the section of code that adds or subtracts from the account balance
    to eliminate the possibility that two threads are both messing with it at the
    exact same time. Otherwise, we might have both threads reading the old balance
    more or less simultaneously, and both threads later writing back their own ideas
    of the new balance, oblivious to the changes that the other was trying to make,
    leading to an incorrect final state; whichever sets the value last is the “winner,”
    and the other thread’s change to the balance is simply lost.


    A common concern when dealing with threads is the idea of code being thread-safe.
    Some software libraries are written with concurrency in mind and have all their
    critical sections properly protected with mutexes. Some code libraries simply
    don’t. For instance, in Cocoa, the AppKit framework (containing the classes specific
    to building GUI applications, such as `NSApplication`, `NSView` and all its subclasses,
    and the like) is for the most part not thread-safe. This means that in a running
    Cocoa application, all method calls that deal with any AppKit objects should be
    executed from within the same thread, which is commonly known as the main thread.
    If we access AppKit objects from another thread, all bets are off; we are likely
    to encounter seemingly inexplicable bugs. By default, the main thread is where
    all the action of our Cocoa app (such as dealing with actions triggered by user
    events) occurs, so for simple applications it’s nothing we need to worry about.
    Action methods triggered by a user are already running in the main thread. Up
    to this point in the book, our code has been running exclusively on the main thread,
    but that’s about to change.


    ## Units of Work


    The problem with the threading model just described is that for the average programmer,
    writing error-free, multi-threaded code is nearly impossible. This is not meant
    as a critique of our industry or of the average programmer’s abilities; it’s simply
    an observation. The complex interactions we have to account for in our code when
    synchronizing data and actions across multiple threads are really just too much
    for most people to tackle. Imagine that 5 percent of all people have the capacity
    to write software at all. Only a small fraction of those 5 percent are really
    up to the task of writing heavy-duty, multi-threaded applications. Even people
    who have done it successfully will often advise others to not follow their example!


    Fortunately, all hope is not yet lost. It is possible to implement some concurrency
    without too much low-level thread-twisting. Just like we have the ability to display
    data on the screen without directly poking bits into video RAM and to read data
    from disk without interfacing directly with disk controllers, software abstractions
    exist that let us run our code on multiple threads without requiring us to do
    much directly with the threads at all. The solutions that Apple encourages us
    to use are centered around the idea of splitting up long-running tasks into units
    of work and putting those units into queues for execution. The system manages
    the queues for us, executing units of work on multiple threads. We don’t need
    to start and manage the background threads directly and are freed from much of
    the “bookkeeping” that’s usually involved in implementing concurrent applications.
    The system takes care of that for us.


    ## Operation Queues


    Since the release of OS X 10.5, Apple has provided us with a pair of classes called
    `NSOperation` and `NSOperationQueue` that work together to provide operation queues.
    The idea is that we split our computational tasks into chunks or units of work,
    wrap each of them up in an `NSOperation`, and put each operation into an `NSOperationQueue`.
    We can also establish interoperation dependencies, specifying that an operation
    won’t begin executing until another one is complete. The `NSOperationQueue` then
    takes care of these units the best it can, using the order that operations were
    added to the queue, along with the dependencies we specified, to determine its
    course of action. If the dependencies we specify allow some operations to execute
    at the same time, and there are enough cores available to run them, the operation
    queue will use multiple threads to execute multiple operations simultaneously.'
  raw: '## Threading Basics


    Before we start implementing solutions, let’s go over some of the basics involved
    in concurrency. This is far from a complete description of threading in OS X or
    threading in general. For that, you’ll need to look elsewhere. We just want to
    explain enough for you to understand what we’re doing in this chapter.


    In most modern operating systems (including, of course, OS X), apart from the
    notion of a process, which contains a running instance of a program stored on
    disk, there’s also the notion of threads of execution. Each process can consist
    of multiple threads that all run concurrently. If there’s just one processor core,
    the OS will switch between executing multiple threads, much like it switches between
    executing multiple processes. If there’s more than one core available, the threads
    will be distributed among them just like processes are.


    All threads in a process share the same executable program code and the same global
    data. Each thread can also have some data that is exclusive to the thread. Threads
    can make use of a special structure called a mutex (short for mutual exclusion)
    or a lock, which can ensure that a particular chunk of code can’t be run by multiple
    threads at once. This is useful for ensuring correct outcomes when multiple threads
    access the same data simultaneously by locking out other threads when one thread
    is updating a value (in what’s called a “critical section” of the code). For example,
    let’s say our application implements a banking system where an account balance
    can be modified as part of a transaction. In a multi-threaded system, we need
    to protect the section of code that adds or subtracts from the account balance
    to eliminate the possibility that two threads are both messing with it at the
    exact same time. Otherwise, we might have both threads reading the old balance
    more or less simultaneously, and both threads later writing back their own ideas
    of the new balance, oblivious to the changes that the other was trying to make,
    leading to an incorrect final state; whichever sets the value last is the “winner,”
    and the other thread’s change to the balance is simply lost.


    A common concern when dealing with threads is the idea of code being thread-safe.
    Some software libraries are written with concurrency in mind and have all their
    critical sections properly protected with mutexes. Some code libraries simply
    don’t. For instance, in Cocoa, the AppKit framework (containing the classes specific
    to building GUI applications, such as `NSApplication`, `NSView` and all its subclasses,
    and the like) is for the most part not thread-safe. This means that in a running
    Cocoa application, all method calls that deal with any AppKit objects should be
    executed from within the same thread, which is commonly known as the main thread.
    If we access AppKit objects from another thread, all bets are off; we are likely
    to encounter seemingly inexplicable bugs. By default, the main thread is where
    all the action of our Cocoa app (such as dealing with actions triggered by user
    events) occurs, so for simple applications it’s nothing we need to worry about.
    Action methods triggered by a user are already running in the main thread. Up
    to this point in the book, our code has been running exclusively on the main thread,
    but that’s about to change.


    ### Units of Work


    The problem with the threading model just described is that for the average programmer,
    writing error-free, multi-threaded code is nearly impossible. This is not meant
    as a critique of our industry or of the average programmer’s abilities; it’s simply
    an observation. The complex interactions we have to account for in our code when
    synchronizing data and actions across multiple threads are really just too much
    for most people to tackle. Imagine that 5 percent of all people have the capacity
    to write software at all. Only a small fraction of those 5 percent are really
    up to the task of writing heavy-duty, multi-threaded applications. Even people
    who have done it successfully will often advise others to not follow their example!


    Fortunately, all hope is not yet lost. It is possible to implement some concurrency
    without too much low-level thread-twisting. Just like we have the ability to display
    data on the screen without directly poking bits into video RAM and to read data
    from disk without interfacing directly with disk controllers, software abstractions
    exist that let us run our code on multiple threads without requiring us to do
    much directly with the threads at all. The solutions that Apple encourages us
    to use are centered around the idea of splitting up long-running tasks into units
    of work and putting those units into queues for execution. The system manages
    the queues for us, executing units of work on multiple threads. We don’t need
    to start and manage the background threads directly and are freed from much of
    the “bookkeeping” that’s usually involved in implementing concurrent applications.
    The system takes care of that for us.


    ### Operation Queues


    Since the release of OS X 10.5, Apple has provided us with a pair of classes called
    `NSOperation` and `NSOperationQueue` that work together to provide operation queues.
    The idea is that we split our computational tasks into chunks or units of work,
    wrap each of them up in an `NSOperation`, and put each operation into an `NSOperationQueue`.
    We can also establish interoperation dependencies, specifying that an operation
    won’t begin executing until another one is complete. The `NSOperationQueue` then
    takes care of these units the best it can, using the order that operations were
    added to the queue, along with the dependencies we specified, to determine its
    course of action. If the dependencies we specify allow some operations to execute
    at the same time, and there are enough cores available to run them, the operation
    queue will use multiple threads to execute multiple operations simultaneously.'
  trans: '

    # 线程基础


    在开始实现解决方案之前，我们先来回顾一下并发编程中的一些基础知识。这远非 OS X 或通用线程技术的完整描述，如需深入了解，请参考其他资料。这里仅讲解足够理解本章内容所需的知识。


    在大多数现代操作系统（当然包括 OS X）中，除了包含磁盘上程序运行实例的进程概念外，还有执行线程的概念。每个进程可由多个并发运行的线程组成。如果仅有一个处理器核心，操作系统会在多个线程间切换执行，就像在多个进程间切换一样。如果存在多个核心，线程会像进程一样分布在各个核心上。


    进程内的所有线程共享相同的可执行程序代码和全局数据。每个线程还可以拥有自己独有的数据。线程可以使用一种称为互斥锁（mutex，mutual exclusion
    的缩写）或锁（lock）的特殊结构，它能确保某段代码不会同时被多个线程执行。当多个线程同时访问相同数据时，这种机制通过在某个线程更新值（即代码的"临界区"）时锁定其他线程，来确保结果的正确性。例如，假设我们的应用程序实现了一个银行系统，账户余额可以在交易中被修改。在多线程系统中，我们需要保护对账户余额进行加减操作的代码段，以消除两个线程同时修改余额的可能性。否则，两个线程可能会几乎同时读取旧余额，然后各自写回自己计算的新余额，而完全忽略对方所做的更改（即"竞态条件"），最终导致状态错误：最后设置值的线程成为"赢家"，另一个线程对余额的更改就此丢失。


    处理线程时一个常见问题是代码的线程安全性。有些软件库在设计时就考虑了并发性，其所有临界区都恰当地用互斥锁保护。而有些代码库则没有这样做。例如，在 Cocoa
    中，AppKit 框架（包含构建 GUI 应用程序专用的类，如 `NSApplication`、`NSView` 及其所有子类等）大部分都不是线程安全的。这意味着在运行的
    Cocoa 应用程序中，所有涉及 AppKit 对象的方法调用都应在同一线程（通常称为主线程）中执行。如果从其他线程访问 AppKit 对象，后果不可预测，很可能会遇到看似无法解释的错误。默认情况下，Cocoa
    应用程序的所有操作（例如处理用户事件触发的操作）都在主线程中进行，因此对于简单应用无需担心。用户触发的操作方法本身就运行在主线程中。本书至此，我们的代码一直仅在主线程中运行，但这个情况即将改变。


    ## 工作单元


    刚才描述的线程模型的问题是，对于普通程序员而言，编写无错误的多线程代码几乎是不可能的。这并不是对我们行业或普通程序员能力的批判，而是一个客观观察。在多线程间同步数据和操作时，代码中需要考虑的复杂交互对大多数人来说实在太难应对。试想一下，在所有人群中只有
    5% 的人有能力编写软件。而这 5% 中仅有一小部分真正有能力编写高负载的多线程应用。即使是成功实现过多线程开发的人，也常常建议他人不要效仿他们的做法！


    幸运的是，希望犹存。无需过多涉及底层线程操作，也能实现一定的并发性。就像我们无需直接操作视频 RAM 的位就能在屏幕显示数据，无需直接与磁盘控制器交互就能从磁盘读取数据一样，存在一些软件抽象层，让我们可以在多个线程上运行代码，而无需直接处理线程本身。Apple
    鼓励我们使用的解决方案，核心思想是将长时间运行的任务拆分为工作单元，并将这些单元放入队列中执行。系统为我们管理队列，在多个线程上执行工作单元。我们无需直接启动和管理后台线程，也无需处理通常实现并发应用时所需的许多"簿记"工作。系统会替我们处理这些。


    ## 操作队列


    自 OS X 10.5 发布以来，Apple 为我们提供了 `NSOperation` 和 `NSOperationQueue` 这对类，它们协同工作以实现操作队列。其理念是将计算任务拆分为块或工作单元，将每个单元封装在
    `NSOperation` 中，然后将每个操作放入 `NSOperationQueue`。我们还可以建立操作间的依赖关系，指定某个操作必须等另一个操作完成后才能开始执行。`NSOperationQueue`
    会尽其所能处理这些单元，根据操作添加到队列的顺序以及我们指定的依赖关系来决定执行方案。如果我们指定的依赖关系允许某些操作同时执行，且有足够的核心可用，操作队列将使用多个线程同时执行多个操作。

