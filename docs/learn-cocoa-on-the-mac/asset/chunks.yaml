    \ ExceptionCity[8881:10b] *** -[NSCFArray objectAtIndex:]: index\n(2137483647(\
    \ or possibly larger)) beyond bounds (3)\n2013-02-10 23:57:55.575 ExceptionCity[71731:303]\
    \ Total length of all name components: 15\n2013-02-10 23:57:55.576 ExceptionCity[71731:303]\
    \ inserted all the objects I could!\n2013-02-10 23:57:55.576 ExceptionCity[71731:303]\
    \ found indexed item two\n(lldb)\n```\n\n由于另一个异常，我们再次中断了。和之前一样，在调试导航器中点击 `objc_exception_throw`\
    \ 这一行，检查异常以找出问题所在。\n\n```\n(lldb) po $rax\n$0 = 4300330528 *** -[__NSArrayI objectAtIndex:]:\
    \ index 9223372036854775807 beyond bounds [0 .. 2]\n(lldb) po [$rax name]\n$1\
    \ = 0x00007fff783e0a10 NSRangeException\n```\n\n天哪！这个索引值也太大了。现在再看一下调用栈，点击我们代码中最顶层的条目：`-[ECAppDelegate\
    \ rangeException]`。这将在文本编辑器中高亮显示下面这一行：\n\n```\nNSLog(@\"found indexed item %@\"\
    , array[indexOfFive]);\n```\n\n这一行实际上进行了两次调用：首先调用 `objectAtIndex:` 方法（隐含在 Apple\
    \ 从 Xcode 4.5 开始引入的新的 Objective-C 数组访问器语法中），然后调用 `NSLog` 函数。快速查看调用栈会发现，`objectAtIndex:`\
    \ 方法正是报错的那个。显然它不喜欢 `indexOfFive` 中包含的值。如果我们查看变量视图，或者输入 `p indexOfFive`（注意对标准 C\
    \ 类型使用 `p`，而对 Objective-C 对象则使用 `po`），我们将看到 `9223372036854775807`。这确实看起来有点高！如果我们查看设置该值的代码，就在上面两行处，会看到这行代码：\n\
    \n```\nNSUInteger indexOfFive = [array indexOfObject:@\"five\"];\n```\n\n这行代码正在向\
    \ `array` 请求一个它实际上并不包含的对象的索引。在这种情况下，`NSArray` 会返回一个名为 `NSNotFound` 的特殊整型值，该值被定义为可能的最大整数值。在运行于\
    \ 64 位模式的 Mac OS X 上，这个值就是 `9223372036854775807`。这个值用来告诉调用者：“嘿，你想要索引的那个对象？我这儿没有。”知道这一点非常有用！这样做的后果是，每当我们从\
    \ `indexOfObject:` 获取到一个值时，我们实际上都必须检查以确保它不是 `NSNotFound`。在我们的例子中，我们确切地知道问题出在哪里，所以可以只检查第二次调用，但养成总是检查该返回值的习惯是很好的，因此我们像这样更新整个方法：\n\
    \n```\n- (void)rangeException {\n    // 假设我们有一个对象数组...\n    NSArray *array = @[@\"\
    one\", @\"two\", @\"three\"];\n\n    // ... 我们可以请求某个条目的索引...\n    NSUInteger indexOfTwo\
    \ = [array indexOfObject:@\"two\"];\n    if (indexOfTwo != NSNotFound) {\n   \
    \     // ... 之后我们可以使用同一个索引来检索该值。\n        NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
    \    }\n\n    // 但是，如果我们试图查找一个不存在的对象的索引呢？\n    NSUInteger indexOfFive = [array\
    \ indexOfObject:@\"five\"];\n    if (indexOfFive != NSNotFound) {\n        //\
    \ 并且我们忘记检查返回值以确保它不是 NSNotFound？\n        NSLog(@\"found indexed item %@\", array[indexOfFive]);\n\
    \    }\n}\n```\n\n做出这些更改，运行应用程序，并注意观察祝贺性的提示面板作为奖励。哦，甜蜜的成功！\n\n解决了这些问题后，我们现在已经经历并修复了每个\
    \ Cocoa 程序员在某个时候都会遇到的主要运行时异常类型。就是这样！对于来自其他异常较多环境的开发者来说，这可能会令人惊讶，但正如我们所说，在 Cocoa\
    \ 中，异常被很少使用，而且几乎总是用来指示程序员犯了错误。`NSRangeException` 和 `NSInvalidArgumentException`（针对上面显示的两种情况）实际上构成了你可能要处理的大部分异常。\n\
    \n### 其余异常\n\n好吧，在 Cocoa 应用程序中还可以引发更多异常。例如，`NSException.h` 中定义了更多的预定义异常名称，但你很可能不会遇到它们。`NSGenericException`\
    \ 有时会在使用 SQLite 或 Apple Events 时出现，而 `NSInternalInconsistencyException` 很少会在你覆盖了不该覆盖的方法时露出其丑陋的头部（例如文档警告你不要这样做的情况），但在实际开发中，这些情况的例子相当少见。\n\
    \n你最有可能看到异常发生的一种情况是，当你使用 Apple 的 Distributed Objects（DO）技术时，该技术使用异常的方式比 Cocoa\
    \ 的其他部分要自由得多。例如，如果 DO 与连接到的进程失去连接，它会引发异常来警告你。实际上，Cocoa 定义的大多数预定义异常名称都是专门供 DO 使用的。本书不描述\
    \ DO 的使用，因此我们不再对这些异常多说什么，但如果你将来走上这条路，了解这一点是好的。\n"
- fmt: "# Worse than Exceptions: Death by Signal\n\nNow that we’ve seen how some bugs\
    \ can be handled by code-level operations like catching an exception, it’s time\
    \ to look at another kind of problem that arises when object pointers are misused.\
    \ In Cocoa, every Objective-C object is referenced through a pointer to a specific\
    \ sort of C struct that defines the basic structure of an Objective-C object.\
    \ If the pointer isn’t pointing either at a chunk of memory containing a valid\
    \ object, or at `nil`, then some form of memory access error is almost certain\
    \ to occur, leading to the creation of a signal that ultimately kills our app.\n\
    \nThere are two ways that Cocoa programmers inadvertently cause a signal to kill\
    \ their app. The first way is to try to send a message to an uninitialized object\
    \ pointer. By default, when we declare a new pointer as a local variable in an\
    \ Objective-C method, we can’t count on it to automatically point at `nil` or\
    \ some other harmless thing. In fact, we can often count on it pointing at something\
    \ completely inappropriate, like a memory address that is not even mapped into\
    \ the system (the situation is different for instance variables, static local\
    \ variables, and global variables, which are in fact initialized with `nil` values).\n\
    \nIt’s hard to trigger this behavior intentionally with an uninitialized pointer,\
    \ since it’s always possible that such a pointer just happens to contain a zero,\
    \ which evaluates to `nil`, which is of course a valid message recipient. We can\
    \ set up the situation artificially, however, by adding the following method to\
    \ the app delegate:\n\n```\n- (void)uninitializedObject {\n    NSMutableString\
    \ *string = (__bridge NSMutableString *)(void *)0xdeadbeef;\n    [string appendFormat:@\"\
    foo\"];\n}\n```\n\nBecause we’re using ARC, which is very smart about these things,\
    \ we have to jump through some hoops to actually insert garbage into our pointer,\
    \ first casting it to `void*` and then to `NSMutableString*`. The addition of\
    \ the `__bridge` qualifier tells the compiler to ignore the memory-management\
    \ implications of this assignment.\n\nNow we have an `NSMutableString` pointer\
    \ that is pointing at a garbage memory location. So when it tries to call the\
    \ `appendFormat:` method, the receiver isn’t a valid object, which will lead to\
    \ trouble. To see the effect of this, add this line to the `applicationDidFinishLaunching:`\
    \ method:\n\n```\n[self uninitializedObject];\n```\n\nRun the app, and watch.\
    \ The program will halt, displaying something similar to Figure 13-5.\n\n![A978-1-4302-4543-8_13_Fig5_HTML.jpg](A978-1-4302-4543-8_13_Fig5_HTML.jpg)\n\
    \n**Figure 13-5.** The program stops upon receiving a signal\n\nDepending on exactly\
    \ what this garbage pointer is pointing at, you may see a different signal name,\
    \ such as `SIGSEGV` or `SIGILL`. As a bonus bit of wrongness, it’s even possible\
    \ that it could be pointing at some other, valid object in our program, perhaps\
    \ even an `NSMutableString`, making it extra-insidious to track down. The specifics\
    \ don’t really matter; the point is that we’ve got an uninitialized pointer (or\
    \ in this specific case, just for demonstration purposes, a pointer to a bad memory\
    \ location). This problem is easily solved by applying a general rule: whenever\
    \ you declare an Objective-C object pointer inside a method, immediately assign\
    \ it a value, even if it’s just `nil`.\n\nSo, fix this by changing the string\
    \ declaration line to this:\n\n```\nNSMutableString *string = nil;\n```\n\nBuild\
    \ and run the app, and off we go. It’s perfectly okay to send a message to a nil\
    \ pointer in Objective-C (it’s basically a non-operation, and the return value\
    \ from a nil message is typically `nil`, `0`, or `NO`), so, although the fixed\
    \ version of the method won’t actually do anything, it won’t cause a crash either.\n\
    \nNow, there’s one more source of memory problems that we should mention here:\
    \ sending a message to an object that’s already been freed. Throughout this book,\
    \ we’ve been using ARC for every app we’ve created, which virtually eliminates\
    \ this kind of bug entirely, but in case you’re working at some point on a project\
    \ with manual reference counting (using `retain` and `release`) it’s good to know\
    \ what causes this type of problem.\n\nWithout ARC, memory management for Objective-C\
    \ objects is handled with manual reference counting. To make a long story short:\
    \ any time we create an object with an `alloc` or `copy` method, or mark an object\
    \ as being “in use” by sending it a `retain`, its retain count is increased. We\
    \ must at some point (when we’re done with the object) send the object a `release`\
    \ or `autorelease` message, either of which will decrease its retain count. When\
    \ the retain count hits zero, the object is freed.\n\nWhen we’re using ARC, the\
    \ same `retain` and `release` calls are built into our app, but instead of us\
    \ putting it into our source code, the compiler does it for us. It turns out that\
    \ computers are better than we are at consistently following the `retain`/`release`\
    \ rules!\n\nIf we’re not using ARC, the problem that can arise is that if we don’t\
    \ do this quite right, we may end up in a situation where a variable contains\
    \ a pointer to a space in memory that was formerly occupied by a “live” object,\
    \ but now may contain a freed object, or may have been reused for some other purpose.\
    \ ARC is so good at dealing with this issue that it’s really quite difficult to\
    \ construct a situation where it occurs with ARC enabled. So for the next demonstration,\
    \ let’s switch ARC off temporarily. To do this, select the top-level ExceptionCity\
    \ item in the project navigator, then select the Build Settings tab. Use the search\
    \ field at the top to search for “automatic,” and then turn off Objective-C Automatic\
    \ Reference Counting. Figure 13-6 shows what this looks like.\n\n![A978-1-4302-4543-8_13_Fig6_HTML.jpg](A978-1-4302-4543-8_13_Fig6_HTML.jpg)\n\
    \n**Figure 13-6.** Messing with the build settings. You know you want to\n\nNow\
    \ add the following method to the app delegate class. This exhibits a simplified\
    \ version of some bad behavior that could have gotten us into trouble pre-ARC.\n\
    \n```\n- (void)freedObject {\n    NSString *object = [[NSString alloc] initWithCString:\"\
    hi there\"\n                                                encoding:NSUTF8StringEncoding];\n\
    \    [object release];\n    NSLog(@\"Where is my object? %@\", object);\n}\n```\n\
    \nThen add a `[self freedObject];` line to the `applicationDidFinishLaunching:`\
    \ method, run the app, and see what happens. The program will halt and show something\
    \ like that in Figure 13-7.\n\n![A978-1-4302-4543-8_13_Fig7_HTML.jpg](A978-1-4302-4543-8_13_Fig7_HTML.jpg)\n\
    \n**Figure 13-7.** The green bar shows the spot where the program halted. This\
    \ isn’t very helpful! Good thing we have other stack frames to look at, too\n\n\
    As with the previous signal-generating bug, the program may receive a different\
    \ signal than the one shown here, but it’ll certainly receive something, and if\
    \ we look in the call stack for the uppermost stack frame containing our code,\
    \ we’ll see that it contains both our `freedObject` method and the `NSLog` function\
    \ that it was calling.\n\nThe way to fix this is, as with the previous case, a\
    \ matter of self-discipline: any time we send an object a `release` or `autorelease`\
    \ message, if we still have a pointer to that object in a variable, immediately\
    \ point that variable at `nil`! Sending `release` or `autorelease` may not always\
    \ immediately cause the object to be freed (since some other code may have increased\
    \ its retain count as well), but locally within each method, we should consider\
    \ anything we’ve released to be off-limits, and get rid of any dangling pointers\
    \ to it as soon as we can.\n\nIn this case, the solution is to follow up the `[object\
    \ release];` line with this:\n\n```\nobject = nil;\n```"
  raw: '## Worse than Exceptions: Death by Signal


    Now that we’ve seen how some bugs can be handled by code-level operations like
    catching an exception, it’s time to look at another kind of problem that arises
    when object pointers are misused. In Cocoa, every Objective-C object is referenced
    through a pointer to a specific sort of C struct that defines the basic structure
    of an Objective-C object. If the pointer isn’t pointing either at a chunk of memory
    containing a valid object, or at nil, then some form of memory access error is
    almost certain to occur, leading to the creation of a signal that ultimately kills
    our app.


    There are two ways that Cocoa programmers inadvertently cause a signal to kill
    their app. The first way is to try to send a message to an uninitialized object
    pointer. By default, when we declare a new pointer as a local variable in an Objective-C
    method, we can’t count on it to automatically point at nil or some other harmless
    thing. In fact, we can often count on it pointing at something completely inappropriate,
    like a memory address that is not even mapped into the system (the situation is
    different for instance variables, static local variables, and global variables,
    which are in fact initialized with nil values).


    It’s hard to trigger this behavior intentionally with an uninitialized pointer,
    since it’s always possible that such a pointer just happens to contain a zero,
    which evaluates to nil, which is of course a valid message recipient. We can set
    up the situation artificially, however, by adding the following method to the
    app delegate:


    `- (void)uninitializedObject {`


    `NSMutableString *string = (__bridge NSMutableString *)(void *)0xdeadbeef;`


    `[string appendFormat:@"foo"];`


    `}`


    Because we’re using ARC, which is very smart about these things, we have to jump
    through some hoops to actually insert garbage into our pointer, first casting
    it to `void*` and then to `NSMutableString*`. The addition of the `__bridge` qualifier
    tells the compiler to ignore the memory-management implications of this assignment.


    Now we have an `NSMutableString` pointer that is pointing at a garbage memory
    location. So when it tries to call the `appendFormat:` method, the receiver isn’t
    a valid object, which will lead to trouble. To see the effect of this, add this
    line to the `applicationDidFinishLaunching:` method :


    `[self uninitializedObject];`


    Run the app, and watch. The program will halt, displaying something similar to
    Figure [13-5](#A978-1-4302-4543-8_13_Chapter.html#Fig5).


    ![A978-1-4302-4543-8_13_Fig5_HTML.jpg](A978-1-4302-4543-8_13_Fig5_HTML.jpg)


    Figure 13-5.


    The program stops upon receiving a signal


    Depending on exactly what this garbage pointer is pointing at, you may see a different
    signal name, such as `SIGSEGV` or `SIGILL`. As a bonus bit of wrongness, it’s
    even possible that it could be pointing at some other, valid object in our program,
    perhaps even an `NSMutableString`, making it extra-insidious to track down. The
    specifics don’t really matter; the point is that we’ve got an uninitialized pointer
    (or in this specific case, just for demonstration purposes, a pointer to a bad
    memory location). This problem is easily solved by applying a general rule: whenever
    you declare an Objective-C object pointer inside a method, immediately assign
    it a value, even if it’s just `nil`.


    So, fix this by changing the string declaration line to this:


    `NSMutableString *string = nil;`


    Build and run the app, and off we go. It’s perfectly okay to send a message to
    a nil pointer in Objective-C (it’s basically a non-operation, and the return value
    from a nil message is typically nil, 0, or NO), so, although the fixed version
    of the method won’t actually do anything, it won’t cause a crash either.


    Now, there’s one more source of memory problems that we should mention here: sending
    a message to an object that’s already been freed. Throughout this book, we’ve
    been using ARC for every app we’ve created, which virtually eliminates this kind
    of bug entirely, but in case you’re working at some point on a project with manual
    reference counting (using retain and release) it’s good to know what causes this
    type of problem.


    Without ARC, memory management for Objective-C objects is handled with manual
    reference counting. To make a long story short: any time we create an object with
    an `alloc` or `copy` method, or mark an object as being “in use” by sending it
    a `retain`, its retain count is increased. We must at some point (when we’re done
    with the object) send the object a `release` or `autorelease` message, either
    of which will decrease its retain count. When the retain count hits zero, the
    object is freed.


    When we’re using ARC, the same `retain` and `release` calls are built into our
    app, but instead of us putting it into our source code, the compiler does it for
    us. It turns out that computers are better than we are at consistently following
    the `retain`/`release` rules!


    If we’re not using ARC, the problem that can arise is that if we don’t do this
    quite right, we may end up in a situation where a variable contains a pointer
    to a space in memory that was formerly occupied by a “live” object, but now may
    contain a freed object, or may have been reused for some other purpose. ARC is
    so good at dealing with this issue that it’s really quite difficult to construct
    a situation where it occurs with ARC enabled. So for the next demonstration, let’s
    switch ARC off temporarily. To do this, select the top-level ExceptionCity item
    in the project navigator, then select the Build Settings tab. Use the search field
    at the top to search for “automatic,” and then turn off Objective-C Automatic
    Reference Counting. Figure [13-6](#A978-1-4302-4543-8_13_Chapter.html#Fig6) shows
    what this looks like.


    ![A978-1-4302-4543-8_13_Fig6_HTML.jpg](A978-1-4302-4543-8_13_Fig6_HTML.jpg)


    Figure 13-6.


    Messing with the build settings. You know you want to


    Now add the following method to the app delegate class. This exhibits a simplified
    version of some bad behavior that could have gotten us into trouble pre-ARC.


    `- (void)freedObject {`


    `NSString *object = [[NSString alloc] initWithCString:"hi there"`


    `encoding:NSUTF8StringEncoding];`


    `[object release];`


    `NSLog(@"Where is my object? %@", object);`


    `}`


    Then add a `[self freedObject];` line to the `applicationDidFinishLaunching:`
    method, run the app, and see what happens. The program will halt and show something
    like that in Figure [13-7](#A978-1-4302-4543-8_13_Chapter.html#Fig7).


    ![A978-1-4302-4543-8_13_Fig7_HTML.jpg](A978-1-4302-4543-8_13_Fig7_HTML.jpg)


    Figure 13-7.


    The green bar shows the spot where the program halted. This isn’t very helpful!
    Good thing we have other stack frames to look at, too


    As with the previous signal-generating bug, the program may receive a different
    signal than the one shown here, but it’ll certainly receive something, and if
    we look in the call stack for the uppermost stack frame containing our code, we’ll
    see that it contains both our `freedObject` method and the `NSLog` function that
    it was calling.


    The way to fix this is, as with the previous case, a matter of self-discipline:
    any time we send an object a `release` or `autorelease` message, if we still have
    a pointer to that object in a variable, immediately point that variable at `nil`!
    Sending `release` or `autorelease` may not always immediately cause the object
    to be freed (since some other code may have increased its retain count as well),
    but locally within each method, we should consider anything we’ve released to
    be off-limits, and get rid of any dangling pointers to it as soon as we can.


    In this case, the solution is to follow up the `[object release];` line with this:


    `object = nil;`'
  trans: "\n# 比异常更糟：信号致死\n\n既然我们已经了解了某些 bug 可以通过代码级操作（如捕获异常）来处理，那么是时候看看另一种因错误使用对象指针而引发的问题了。在\
    \ Cocoa 中，每个 Objective-C 对象都通过指向一种特定 C 结构体的指针来引用，该结构体定义了 Objective-C 对象的基本结构。如果指针没有指向包含有效对象的内存块，或者不是指向\
    \ `nil`，那么几乎必然会发生某种形式的内存访问错误，从而产生一个信号，最终导致应用崩溃。\n\nCocoa 程序员会无意中导致信号杀死应用的情况有两种。第一种是试图向未初始化的对象指针发送消息。默认情况下，当我们在\
    \ Objective-C 方法中将新指针声明为局部变量时，不能指望它会自动指向 `nil` 或其他无害的东西。事实上，我们常常会遇到它指向完全不恰当内容的情况，比如一个甚至未被映射到系统中的内存地址（但对于实例变量、静态局部变量和全局变量来说情况则不同，它们实际上会被初始化为\
    \ `nil` 值）。\n\n刻意用未初始化的指针触发此行为很困难，因为这类指针有可能恰好包含零值，而零值会被视为 `nil`，这当然是有效的消息接收者。不过，我们可以通过向应用委托添加以下方法来人为构造这种场景：\n\
    \n```\n- (void)uninitializedObject {\n    NSMutableString *string = (__bridge\
    \ NSMutableString *)(void *)0xdeadbeef;\n    [string appendFormat:@\"foo\"];\n\
    }\n```\n\n由于我们使用的是 ARC，而它对此类操作非常敏感，所以必须绕点弯路才能将垃圾值插入指针：先将其转换为 `void*`，然后再转换为 `NSMutableString*`。添加\
    \ `__bridge` 限定符可以告诉编译器忽略这次赋值的内存管理影响。\n\n现在，我们有了一个指向垃圾内存位置的 `NSMutableString`\
    \ 指针。因此，当它尝试调用 `appendFormat:` 方法时，接收者并不是一个有效的对象，这就会导致问题。要查看实际效果，请将下面这行代码添加到 `applicationDidFinishLaunching:`\
    \ 方法中：\n\n```\n[self uninitializedObject];\n```\n\n运行应用并进行观察。程序将会停止，并显示类似于图 13-5\
    \ 的内容。\n\n![A978-1-4302-4543-8_13_Fig5_HTML.jpg](img/A978-1-4302-4543-8_13_Fig5_HTML.jpg)\n\
    \n**图 13-5.** 程序在收到信号时停止运行\n\n根据这个垃圾指针所指向的具体内容，你可能会看到不同的信号名称，例如 `SIGSEGV` 或 `SIGILL`。更糟糕的可能性是，它甚至可能指向我们程序中的另一个有效对象，甚至可能是一个\
    \ `NSMutableString`，这使得追踪问题变得异常棘手。具体细节并不重要；关键是我们有一个未初始化的指针（或者在这个特定演示案例中，是一个指向错误内存位置的指针）。这个问题可以通过应用一个通用规则轻松解决：每当你在方法内部声明一个\
    \ Objective-C 对象指针时，立即为其赋值，即使只是赋值为 `nil`。\n\n因此，通过将字符串声明行改为以下内容来修复这个问题：\n\n```\n\
    NSMutableString *string = nil;\n```\n\n构建并运行应用，应用就能正常运行了。在 Objective-C 中向 `nil`\
