    This might be a good time to once again test the interface by selecting Simulate
    Document. We should be able to click anywhere along the line of stars and cause
    the control to highlight just that amount.


    #### Adding Radio Buttons in a Matrix


    Next, we’ll create the GUI for the `Primary Motivation` attribute. Years of careful
    study of comic books have taught us that every villain has a primary motivating
    factor that causes them to do their evil deeds, and this motivation can always
    be reduced to one of these five things: greed, revenge, bloodlust, nihilism, or
    insanity. Of course, some villains may have several of these evil-making forces
    at work, but we’ll settle for picking the main one for each villain we’re tracking.


    We’re going to use a set of radio buttons to let the user pick the primary motivation.
    Radio buttons are generally grouped in a set that works together, so that selecting
    one button simultaneously deselects all the other buttons. If “radio button” seems
    like a terribly obscure name for this, then perhaps you’re too young to remember
    the old car-radio tuner controls, prevalent up until the 1980s, that would let
    you select a radio station by pushing a mechanical button that would adjust the
    tuner to a particular station and at the same time cause the previously-pushed
    button to pop back to the “out” position. In any case, the term “radio buttons”
    is here to stay, and this control is a good choice when we have a small, predefined
    list of things to choose from and we’d like to keep the whole list onscreen at
    all times.


    In Cocoa, radio buttons are normally a group of `NSButtonCell` instances aligned
    inside an `NSMatrix`. We can find these preconfigured in the Object Library pane
    by typing “radio” into the Search field. It will bring up a Radio Group. Drag
    this out and drop it in the window, below the other controls. The default radio
    button matrix contains just two radio buttons but for this example we want five.
    Simply resizing the matrix by dragging one of the resize handles won’t help us
    here; that just stretches the existing buttons. Instead, try holding down the
    Option key while dragging the bottom-center resize handle downward. This will
    simultaneously resize the matrix and add new buttons inside to fill the empty
    space. Drag down until there are five buttons, then release the mouse button.


    Tip


    Note that many of Cocoa’s GUI classes seem to have a “shadow” in the form of a
    cell class  : `NSButton` has `NSButtonCell`, and so on. This division stems from
    performance issues in the past. In order to speed up drawing, some of the drawing
    duty was taken out of view classes and put into special cell classes instead.
    So in an `NSMatrix` full of buttons, instead of having a bunch of full-fledged
    `NSButton` instances, there are a bunch of simpler `NSButtonCell` instances.


    Now it’s time to fill in the values that will be displayed in each button’s title.
    Start with the top-most button; double-click to select the word “Radio,” then
    type in “Greed.” Do the same for the rest of the buttons, typing in “Revenge,”
    “Bloodlust,” “Nihilism,” and “Insanity,” as shown in Figure [5-7](#A978-1-4302-4543-8_5_Chapter.html#Fig7).
    Note that this view doesn’t expand horizontally to contain the text we typed,
    so we need to do it ourselves by dragging the center-right resize handle and dragging
    to the right until all the text we entered is visible. This is also a case where
    the Size to Fit Content command can come in handy.


    ![A978-1-4302-4543-8_5_Fig7_HTML.jpg](A978-1-4302-4543-8_5_Fig7_HTML.jpg)


    Figure 5-7.


    What’s your primary motivation in life?'
  trans: '

    ### 使用级别指示器显示评分


    接下来我们要创建的控件是 `NSLevelIndicator`，用于显示和指定任意反派的邪恶程度。我们将允许用户为这个值指定 0 到 10 的星级评分，而
    `NSLevelIndicator` 实际上会以一排星星的形式显示它。


    返回对象库面板，在底部的搜索栏中输入“level”。出现的类之一就是 `NSLevelIndicator`，将其拖出并放入窗口中，再次使用蓝色参考线使其与之前控件的左边缘对齐，正好位于上一步添加的组合框下方。


    现在我们需要对这个新对象进行一些配置。`NSLevelIndicator` 类有多种内置显示样式，适用于不同用途。在 Interface Builder 中创建的新实例，默认样式称为“离散”，但我们要将其更改为与显示内容（即某种评分）相匹配。调出属性检查器（`⌥⌘4`），我们会看到第一个选项之一是一个标记为“样式”的弹出按钮（见图
    5-6）。点击该弹出按钮，选择“评分”。级别指示器会立即变为显示几颗星星的视图。


    ![A978-1-4302-4543-8_5_Fig6_HTML.jpg](img/A978-1-4302-4543-8_5_Fig6_HTML.jpg)


    图 5-6. 将 `NSLevelIndicator` 配置为显示星级评分


    我们还需要指定此控件的有效最大值和最小值，以便它知道如何显示给定的值。仍在属性检查器中，找到标记为“值”的部分，其中包含用于设置最小值和最大值的控件。将最小值设为
    0，最大值设为 10，可以通过在这些字段中输入数字或使用微调按钮来实现。在这些文本字段稍下方，还有一个标记为“当前”的字段。将其设为 10，这样我们就可以看到控件中的全部星星范围。然后点击“可编辑”复选框，以便用户实际编辑这个值，而不仅仅是欣赏漂亮的星星。


    也许控件没有显示全部 10 颗星。在撰写本文时，从库中拖出的新 `NSLevelIndicator` 的默认宽度只能显示略多于 7 颗星，无法显示更多。幸运的是，Xcode
    提供了一个方便的快捷键，可以帮助我们调整视图大小，使其完美适应内容。从菜单中选择“编辑器”➤“使内容适配大小”，或按 `⌘=`，使级别指示器展开到刚好能显示全部
    10 颗星的大小。根据我们相对于其他字段布局 `NSLevelIndicator` 的方式，我们可能创建了约束，建立了 `NSLevelIndicator`
    与其他字段大小之间的关系。如果调整 `NSLevelIndicator` 大小时其他字段也同时调整大小，这没问题。我们可以按撤销（`⌘Z`）并将 `NSLevelIndicator`
    移离其他字段以打破约束，然后按照上述方法调整其大小，最后再将其重新定位对齐到其他字段的左边缘。


    **注意：** 对于此应用，我们可以忽略“警告”和“严重”值，因为它们对 `NSLevelIndicator` 的“评分”样式没有任何影响。这些值确实会影响
    `NSLevelIndicator` 在“离散”和“连续”样式下的绘制方式；我们也可以将 `NSLevelIndicator` 改回“离散”或“连续”样式，然后使用“模拟文档”看看效果，但在继续操作前需要将其改回“评分”。


    最后，又到了复制窗口中现有标签的时候了。将其拖放到级别指示器左侧，并将文本改为“邪恶程度：”。现在可能是个好时机，再次通过选择“模拟文档”来测试界面。我们应该能够点击星星行上的任意位置，使控件仅高亮显示相应数量的星星。


    ### 在矩阵中添加单选按钮


    接下来，我们将为“主要动机”属性创建图形用户界面。多年来对漫画书的仔细研究发现，每个反派都有一个主要动机因素驱使他们作恶，而这个动机总可以归结为以下五种之一：贪婪、复仇、嗜血、虚无主义或精神错乱。当然，有些反派可能同时具有多种邪恶因素在起作用，但我们将为每个追踪的反派确定其主要动机。


    我们将使用一组单选按钮让用户选择主要动机。单选按钮通常成组使用，组内按钮协同工作，选择其中一个按钮会自动取消选择其他所有按钮。如果“单选按钮”这个名称听起来非常晦涩，那么也许你太年轻了，不记得
    20 世纪 80 年代之前流行的老式车载收音机调谐器控件——按下机械按钮可以选择一个电台，同时将之前按下的按钮弹回“弹起”位置。无论如何，“单选按钮”这个术语会一直沿用下去，当我们有一个预定义的小列表可供选择，并且希望始终在屏幕上显示整个列表时，这个控件是个不错的选择。


    在 Cocoa 中，单选按钮通常是一组排列在 `NSMatrix` 中的 `NSButtonCell` 实例。我们可以在对象库面板的搜索栏中输入“radio”找到这些预配置好的控件。会出现一个“单选组”。将其拖出并放入窗口中，放在其他控件下方。默认的单选按钮矩阵只包含两个单选按钮，但对于这个示例，我们需要五个。简单地拖动调整手柄来调整矩阵大小在这里行不通；那只会拉伸现有按钮。相反，尝试在按住
    Option 键的同时向下拖动底部居中的调整手柄。这将同时调整矩阵大小并在内部添加新按钮以填充空白空间。一直向下拖动直到出现五个按钮，然后松开鼠标按钮。


    **提示：** 请注意，Cocoa 的许多 GUI 类似乎都有一个以单元格类形式存在的“影子”：`NSButton` 对应 `NSButtonCell`，以此类推。这种划分源于过去的性能问题。为了加速绘制，部分绘制职责从视图类中分离出来，放入了特殊的单元格类中。因此，在充满按钮的
    `NSMatrix` 中，没有大量的完整 `NSButton` 实例，而是有一堆更简单的 `NSButtonCell` 实例。


    现在该填写每个按钮标题中显示的值了。从最顶部的按钮开始；双击选中“Radio”这个词，然后输入“贪婪”。对其余按钮执行相同操作，依次输入“复仇”、“嗜血”、“虚无主义”和“精神错乱”，如图
    5-7 所示。请注意，此视图不会水平扩展以容纳我们输入的文本，因此我们需要自行操作：拖动中间右侧的调整手柄，向右拖动直到所有输入的文本可见。这也是“使内容适配大小”命令能够派上用场的情况。


    ![A978-1-4302-4543-8_5_Fig7_HTML.jpg](img/A978-1-4302-4543-8_5_Fig7_HTML.jpg)


    图 5-7. 你人生的主要动机是什么？

    '
- fmt: '在完成之前，我们需要为每个单元格分配一个标签。我们可以使用任意整数作为每个单元格的标签，从而能够通过包含该单元格的矩阵来引用它，而无需为每个单元格单独建立一个出口。我们希望为刚创建的矩阵中的每个单元格分配一个唯一的标签，为了方便起见，让顶部的单元格从0开始，然后依次向下递增1。这不仅是遵循一个简单的模式，而且之后我们还可以创建一个字符串数组，数组中的索引与其各自的单元格标签完美匹配（因为`NSArray`使用基于零的索引，其中第一个元素位于索引0，第二个位于索引1，以此类推）。


    从第一个按钮“Greed”开始。通常需要多次点击才能选中矩阵中的某个单元格。第一次点击选中矩阵，第二次点击告诉矩阵我们希望聚焦于其内部，第三次点击才真正选中单元格。一旦单元格最终被选中（你可以通过高亮显示来判断），打开工具区（Utility
    area）的属性检查器（Attributes Inspector）（⌥⌘4），在“Cell”属性最底部找到“Tag”字段，将其设置为`0`。现在选择“Revenge”按钮并将其标签设置为`1`。继续向下遍历整个矩阵，最后将“Insanity”的标签设置为`4`。


    至此，让用户指定反派主要动机的单选按钮就完成了！像我们之前做的那样，复制一个标签，将其拖拽下来，放在单选按钮组的上方并稍微靠左的位置，并将其标题改为“Primary
    Motivation:”。现在我们应该得到类似于图5-8所示的效果。


    ![A978-1-4302-4543-8_5_Fig8_HTML.jpg](A978-1-4302-4543-8_5_Fig8_HTML.jpg)


    **图5-8.** 比我们想象中还要多的反派属性！


    #### 添加图像视图


    没有一个反派追踪应用能少了显示反派凶残面孔的功能。在`VillainTracker`中，我们将使用`NSImageView`类的一个实例来显示反派的图片，并通过Mac的拖放机制接收图片输入。


    回到对象库（Object Library）窗格，在搜索框中输入“image”。其中一个结果被列为“Image Well”，这实际上是`NSImageView`的一个实例。将一个这样的控件拖拽到我们的窗口中，并把它放在上一节中单选按钮矩阵的右侧。


    这个图像控件现在非常小，所以我们把它放大一点。打开尺寸检查器（Size Inspector）（⌥⌘5）；请注意，图像控件的宽度和高度都是`48`。分别将它们修改为`96`，控件的大小就会在窗口中发生变化。我们希望用户能够将图片拖入此视图，所以我们还需要打开属性检查器（Attributes
    Inspector）（⌥⌘4），并选中“Editable”复选框。


    现在，通过在窗口内稍微拖拽图像控件来调整其位置。蓝色的对齐线会出现；请注意，此控件现在与其左侧的单选按钮矩阵具有相同的垂直高度。将它们并排放置，然后复制另一个标签，将其放在图像视图的上方并稍微靠左的位置，并将其标题改为“Appearance:”。目前布局的大致效果见图5-9。


    ![A978-1-4302-4543-8_5_Fig9_HTML.jpg](A978-1-4302-4543-8_5_Fig9_HTML.jpg)


    **图5-9.** 图像控件已经就位


    #### 在矩阵中添加复选框


    现在我们将添加一系列复选框，以便用户勾选每个反派的能力。与反派的主要动机类似，我们将创建一个分类系统，将所有类型的超级反派能力归入一个类别。我们将再次使用矩阵，但这次填充的是复选框而不是单选按钮。


    再次进入对象库（Object Library），在搜索框中输入“check”。其中一个结果将被标记为“Check Box”。抓取一个并将其拖入窗口。这将把一个配置为复选框功能的`NSButton`放置在窗口中。我们打算要四个这样的复选框，并排列成一个矩阵，但目前我们只有这一个。现在是时候学习Interface
    Builder中的一个便捷快捷键了，它允许我们自动将任何可以出现在`NSMatrix`中的对象（例如`NSButton`）替换为一个包含与原对象配置相同的单元格的新`NSMatrix`。只需选中该对象（复选框），然后在菜单中选择“Editor”➤“Embed
    In”➤“Matrix”。复选框现在被包裹在一个矩阵中，我们可以使用之前为包含单选按钮的矩阵学到的调整大小技巧：按住Option键，点击底部中央的调整手柄，然后向下拖拽，直到出现四个复选框。


    接下来，让我们配置这个新矩阵，使其能正确地与一组复选框协同工作。选中矩阵本身（而不是其内部的某个复选框），然后打开工具区（Utility area）的属性检查器（Attributes
    Inspector）（⌥⌘4）。通过查看检查器顶部显示的名称来确认我们选中了矩阵——它应该显示为“Matrix”，而不是“Button Cell”。在检查器窗口的顶部，有一个标记为“Mode”的弹出按钮。如果它尚未设置为“Highlight”，我们将其改为该模式，以获得正确的行为。


    现在，用以下（诚然不完整）的复选框标题来填充这些能力：“Evil Genius”、“Mind Reader”、“Nigh-invulnerable”、“Weather
    Control”。在点击设置这些值时，我们可能会无意中打开或关闭复选框。我们不必担心这一点；所有这些复选框的状态最终将由代码本身设置。


    与单选按钮矩阵一样，我们需要将矩阵稍微加宽，以便按钮的完整文本能够显示出来。将中间右侧的调整手柄向外拖拽，直到所有文本都可见。


    现在是为所有这些复选框设置标签的时候了，就像我们为选择主要动机的所有单选按钮设置标签一样。点击选中“Evil Genius”单元格，然后打开属性检查器（Attributes
    Inspector）（⌥⌘4），将标签设置为`0`。然后点击“Mind Reader”单元格，将其标签设置为`1`。继续遍历其余的复选框，最后给“Weather
    Control”复选框设置标签`3`。此时，我们应该得到类似于图5-10所示的效果。


    ![A978-1-4302-4543-8_5_Fig10_HTML.jpg](A978-1-4302-4543-8_5_Fig10_HTML.jpg)


    **图5-10.** 为最坏的情况做准备


    #### 配置弹出按钮


    现在我们将处理反派的能力来源，使用一个弹出按钮让用户从预定义的列表中选择，以指定反派是如何获得能力的。我们将再次提供几个选项：“Innate”（反派天生具备）、“Freak
    Accident”（某种“天灾”，如实验室爆炸、流星撞击或类似事件导致变异）、“Superhero Action”（超级英雄在行动过程中意外赋予他人能力）和“Other”。


    再次进入对象库（Object Library）窗口，在搜索框中输入“popup”。从搜索结果中抓取一个“Pop Up Button”，并将其拖入窗口，放置在上节中复选框矩阵的下方。通过单击然后双击这个新的弹出按钮，我们可以看到可供选择的默认值列表。双击第一个值来编辑其文本，将其改为“Innate”。继续编辑其余标题，输入上面提到的名称。输入第三个之后，我们就没有按钮值了；默认的弹出按钮只有三个值。点击这三个值中的一个，按`⌘D`复制它，然后输入最后一个值。现在，再拿一个标签，将其放在此弹出按钮的左侧，并将其标题改为“Source
    of Powers:”。'
  raw: 'Before we’re done, we need to assign a tag to each cell. We can use any integer
    as a tag for each cell, giving us a way to reference a cell through the matrix
    that contains it without needing to have an outlet for each individual cell. We
    want to give a unique tag to each cell in the matrix we just created, and for
    the sake of convenience let’s make them to start at zero for the uppermost cell
    and increment by one each step of the way down. Besides being a simple pattern
    to follow, this will also allow us to create an array of strings later on whose
    indexes in the array perfectly match their respective cell tags (since an `NSArray`
    uses zero-based indexing, where the first item is at index 0, the second at index
    1, and so on).


    Start with the first button, Greed. Selecting a cell in a matrix generally requires
    multiple clicks. The first click selects the matrix, then a second click tells
    the matrix that we want to focus on its insides, and the third click actually
    selects the cell. Once the cell is finally selected (you can tell by the highlighting),
    open the Attributes Inspector in the Utility area (⌥⌘4) and look for the Tag field
    at the very bottom in the Cell attributes. Set this to 0\. Now select the Revenge
    button and set its tag to 1\. Continue down the length of the matrix, ending with
    setting the tag for Insanity to 4.


    Now the radio buttons for letting the user specify a villain’s primary motivation
    are done! As we’ve done before, duplicate one of the labels, drag it down, place
    it above and slightly to the left of the radio button group, and change its title
    to “Primary Motivation:”. We should now have something similar to Figure [5-8](#A978-1-4302-4543-8_5_Chapter.html#Fig8).


    ![A978-1-4302-4543-8_5_Fig8_HTML.jpg](A978-1-4302-4543-8_5_Fig8_HTML.jpg)


    Figure 5-8.


    More villain attributes than we can shake a stick at!


    #### Adding an Image View


    No villain-tracking application would be complete without a way to display the
    villain’s cruel visage. In VillainTracker, we’ll use an instance of the `NSImageView`
    class both to display a picture of the villain and to receive a picture as input
    via the Mac’s drag-and-drop mechanism.


    Go back to the Object Library pane, and type “image” in the Search field. One
    of the results is listed as an Image Well, and this is in fact an instance of
    `NSImageView`. Drag one of these over to our window, and place it a bit to the
    right of the matrix of radio buttons from the last section.


    Now, that image well is pretty tiny, so let’s make it bigger. Bring up the Size
    Inspector (⌥⌘5); note that the image well’s width and height are both 48\. Edit
    each of those, changing them to 96, and the control’s size will change in the
    window change. We want to let the user drag an image into this view, so we also
    need to bring up the Attributes Inspector (⌥⌘4) and click to enable the Editable
    checkbox.


    Now adjust the position of the image well by dragging it a little within its window.
    The blue guidelines will pop up; note that this control is now the same vertical
    height as the matrix of radio buttons to its left. Put them side by side, then
    duplicate another label, put it a bit above and to the left of the image view,
    and change its title to “Appearance:”. See Figure [5-9](#A978-1-4302-4543-8_5_Chapter.html#Fig9)
    for a rough idea of the layout at this point.


    ![A978-1-4302-4543-8_5_Fig9_HTML.jpg](A978-1-4302-4543-8_5_Fig9_HTML.jpg)


    Figure 5-9.


    An image well is now in place


    #### Adding Checkboxes in a Matrix


    Now we’ll add a series of checkboxes to let the user check off each villain’s
    powers and abilities. As in the case of the villain’s primary motivation, we’ll
    create a classification system in which all types of supervillain powers can be
    pigeonholed into a category. Once again we will use a matrix, but this time filled
    with checkboxes instead of radio buttons.


    Go the Object Library again, and type “check” into the Search field. One of the
    results will be labeled Check Box. Grab one of those and pull it into the window.
    This places an `NSButton` configured to work as a checkbox into the window. We’re
    going to want four of these, lined up in a matrix, but right now we’ve only got
    this single one. Time to learn about a handy shortcut in Interface Builder mode
    that lets us automatically take any object that can appear in an `NSMatrix`, such
    as an `NSButton`, and replace it with a new `NSMatrix` containing a cell configured
    the same as the original object. Simply select the object (the checkbox), then
    in the menu choose Editor ➤ Embed In ➤ Matrix. The checkbox is now wrapped up
    in a matrix, and we can use the same resizing trick we learned for the matrix
    containing the radio buttons: hold down Option, click on the bottom-center resize
    handle, and drag downwards until there are four checkboxes.


    Next, let’s configure this new matrix to work correctly with a group of checkboxes.
    Select the matrix itself (not one of the checkboxes inside of it), and bring up
    the Attributes Inspector (⌥⌘4) in the Utility area. Verify that we’ve got the
    matrix selected by noting the name displayed at the top of the inspector—it should
    say Matrix, not Button Cell. At the top of the Inspector window is a pop-up button
    labeled Mode. If it isn’t already set to Highlight, we’ll change it to that so
    we get the correct behavior.


    Now fill the checkbox titles with the following (admittedly incomplete) list of
    abilities: “Evil Genius,” “Mind Reader,” “Nigh-invulnerable,” “Weather Control.”
    While clicking around to set these values, we may inadvertently turn checkboxes
    on and off. We don’t need to worry about that; the states of all those checkboxes
    will be set from the code itself.


    Just like with the matrix of radio buttons, we’ll need to make the matrix a little
    wider so that the full text of the buttons can be seen. Drag the center-right
    resize handle out until all the text is visible.


    Now it’s time to set tags for all of these checkboxes, just like we set tags for
    all the radio buttons for choosing the primary motivation. Click to select the
    Evil Genius cell, then open the Attributes Inspector (⌥⌘4), and set the tag to
    0\. Then click the Mind Reader cell, and set its tag to 1. Continue through the
    rest of the checkboxes, ending by giving the Weather Control checkbox a tag of
    3\. At this point, we should now have something similar to Figure [5-10](#A978-1-4302-4543-8_5_Chapter.html#Fig10).


    ![A978-1-4302-4543-8_5_Fig10_HTML.jpg](A978-1-4302-4543-8_5_Fig10_HTML.jpg)


    Figure 5-10.


    Preparing for the worst of the worst


    #### Configuring a Pop-up Button


    Now we’ll deal with the villain’s power source, using a pop-up button to let the
    user select from a predefined list in order to specify how the villain got his
    powers. Once again, we’ll supply a few choices: “Innate” (the villain was born
    with it), “Freak Accident” (some “act of God” such as a lab explosion, meteor
    strike, or similar caused a transformation), “Superhero Action” (a superhero in
    the course of their heroics accidentally empowers someone else), and “Other.”


    Go to the Object Library window again, and enter “popup” into the Search field.
    Grab a Pop Up Button from the Search results, and drag it into the window, placing
    it a bit below the checkbox matrix from the previous section. By clicking and
    then double-clicking the new pop-up button, we can see the default list of values
    that can be selected. Double-click the first one to edit its text, changing it
    to “Innate.” Continue for the rest of the titles, entering the names mentioned
    above. After entering the third one, we’re out of button values; the default pop-up
    button has only three values. Click one of the three values, duplicate it by pressing
    ⌘D, and then enter the final value. Now grab another label, put it in place to
    the left of this pop-up button, and change its title to “Source of Powers:”.'
  trans: '

    在完成之前，我们需要为每个单元格分配一个标签。我们可以使用任意整数作为每个单元格的标签，从而能够通过包含该单元格的矩阵来引用它，而无需为每个单元格单独建立一个出口。我们希望为刚创建的矩阵中的每个单元格分配一个唯一的标签，为了方便起见，让顶部的单元格从
    0 开始，然后依次向下递增 1。这不仅是遵循一个简单的模式，而且之后我们还可以创建一个字符串数组，数组中的索引与其各自的单元格标签完美匹配（因为`NSArray`使用基于零的索引，其中第一个元素位于索引
    0，第二个位于索引 1，以此类推）。


    从第一个按钮“Greed”开始。通常需要多次点击才能选中矩阵中的某个单元格。第一次点击选中矩阵，第二次点击告诉矩阵我们希望聚焦于其内部，第三次点击才真正选中单元格。一旦单元格最终被选中（你可以通过高亮显示来判断），打开工具区（Utility
    area）的属性检查器（Attributes Inspector）（⌥⌘4），在“Cell”属性最底部找到“Tag”字段，将其设置为`0`。现在选择“Revenge”按钮并将其标签设置为`1`。继续向下遍历整个矩阵，最后将“Insanity”的标签设置为`4`。


    至此，让用户指定反派主要动机的单选按钮就完成了！像我们之前做的那样，复制一个标签，将其拖拽下来，放在单选按钮组的上方并稍微靠左的位置，并将其标题改为“Primary
    Motivation:”。现在我们应该得到类似于图 5-8 所示的效果。


    ![A978-1-4302-4543-8_5_Fig8_HTML.jpg](img/A978-1-4302-4543-8_5_Fig8_HTML.jpg)


    **图 5-8.** 比我们想象中还要多的反派属性！


    #### 添加图像视图


    没有一个反派追踪应用能少了显示反派凶残面孔的功能。在`VillainTracker`中，我们将使用`NSImageView`类的一个实例来显示反派的图片，并通过
    Mac 的拖放机制接收图片输入。


    回到对象库（Object Library）窗格，在搜索框中输入“image”。其中一个结果被列为“Image Well”，这实际上是`NSImageView`的一个实例。将一个这样的控件拖拽到我们的窗口中，并把它放在上一节中单选按钮矩阵的右侧。


    这个图像控件现在非常小，所以我们把它放大一点。打开尺寸检查器（Size Inspector）（⌥⌘5）；请注意，图像控件的宽度和高度都是`48`。分别将它们修改为`96`，控件的大小就会在窗口中发生变化。我们希望用户能够将图片拖入此视图，所以我们还需要打开属性检查器（Attributes
    Inspector）（⌥⌘4），并选中“Editable”复选框。


    现在，通过在窗口内稍微拖拽图像控件来调整其位置。蓝色的对齐线会出现；请注意，此控件现在与其左侧的单选按钮矩阵具有相同的垂直高度。将它们并排放置，然后复制另一个标签，将其放在图像视图的上方并稍微靠左的位置，并将其标题改为“Appearance:”。目前布局的大致效果见图
    5-9。


    ![A978-1-4302-4543-8_5_Fig9_HTML.jpg](img/A978-1-4302-4543-8_5_Fig9_HTML.jpg)


    **图 5-9.** 图像控件已经就位


    #### 在矩阵中添加复选框


    现在我们将添加一系列复选框，以便用户勾选每个反派的能力。与反派的主要动机类似，我们将创建一个分类系统，将所有类型的超级反派能力归入一个类别。我们将再次使用矩阵，但这次填充的是复选框而不是单选按钮。


    再次进入对象库（Object Library），在搜索框中输入“check”。其中一个结果将被标记为“Check Box”。抓取一个并将其拖入窗口。这将把一个配置为复选框功能的`NSButton`放置在窗口中。我们打算要四个这样的复选框，并排列成一个矩阵，但目前我们只有这一个。现在是时候学习
    Interface Builder 中的一个便捷快捷键了，它允许我们自动将任何可以出现在`NSMatrix`中的对象（例如`NSButton`）替换为一个包含与原对象配置相同的单元格的新`NSMatrix`。只需选中该对象（复选框），然后在菜单中选择“Editor”➤“Embed
    In”➤“Matrix”。复选框现在被包裹在一个矩阵中，我们可以使用之前为包含单选按钮的矩阵学到的调整大小技巧：按住 Option 键，点击底部中央的调整手柄，然后向下拖拽，直到出现四个复选框。


    接下来，让我们配置这个新矩阵，使其能正确地与一组复选框协同工作。选中矩阵本身（而不是其内部的某个复选框），然后打开工具区（Utility area）的属性检查器（Attributes
    Inspector）（⌥⌘4）。通过查看检查器顶部显示的名称来确认我们选中了矩阵——它应该显示为“Matrix”，而不是“Button Cell”。在检查器窗口的顶部，有一个标记为“Mode”的弹出按钮。如果它尚未设置为“Highlight”，我们将其改为该模式，以获得正确的行为。


    现在，用以下（诚然不完整）的复选框标题来填充这些能力：“Evil Genius”、“Mind Reader”、“Nigh-invulnerable”、“Weather
    Control”。在点击设置这些值时，我们可能会无意中打开或关闭复选框。我们不必担心这一点；所有这些复选框的状态最终将由代码本身设置。


    与单选按钮矩阵一样，我们需要将矩阵稍微加宽，以便按钮的完整文本能够显示出来。将中间右侧的调整手柄向外拖拽，直到所有文本都可见。


    现在是为所有这些复选框设置标签的时候了，就像我们为选择主要动机的所有单选按钮设置标签一样。点击选中“Evil Genius”单元格，然后打开属性检查器（Attributes
    Inspector）（⌥⌘4），将标签设置为`0`。然后点击“Mind Reader”单元格，将其标签设置为`1`。继续遍历其余的复选框，最后给“Weather
    Control”复选框设置标签`3`。此时，我们应该得到类似于图 5-10 所示的效果。


    ![A978-1-4302-4543-8_5_Fig10_HTML.jpg](img/A978-1-4302-4543-8_5_Fig10_HTML.jpg)


    **图 5-10.** 为最坏的情况做准备


    #### 配置弹出按钮


    现在我们将处理反派的能力来源，使用一个弹出按钮让用户从预定义的列表中选择，以指定反派是如何获得能力的。我们将再次提供几个选项：“Innate”（反派天生具备）、“Freak
    Accident”（某种“天灾”，如实验室爆炸、流星撞击或类似事件导致变异）、“Superhero Action”（超级英雄在行动过程中意外赋予他人能力）和“Other”。


    再次进入对象库（Object Library）窗口，在搜索框中输入“popup”。从搜索结果中抓取一个“Pop Up Button”，并将其拖入窗口，放置在上节中复选框矩阵的下方。通过单击然后双击这个新的弹出按钮，我们可以看到可供选择的默认值列表。双击第一个值来编辑其文本，将其改为“Innate”。继续编辑其余标题，输入上面提到的名称。输入第三个之后，我们就没有按钮值了；默认的弹出按钮只有三个值。点击这三个值中的一个，按`⌘D`复制它，然后输入最后一个值。现在，再拿一个标签，将其放在此弹出按钮的左侧，并将其标题改为“Source
    of Powers:”。

