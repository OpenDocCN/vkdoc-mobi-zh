- fmt: "### Creating and Configuring an Array Controller\n\nNow it’s time to add an\
    \ `NSArrayController` so that we can configure some bindings for the first set\
    \ of objects, the characters. In the Object Library pane, search for “array.”\
    \ Note the Array Controller that appears in the results; this is an instance of\
    \ the `NSArrayController` object. Drag one of these out to the object dock on\
    \ the far left of the Interface Builder canvas. If the dock area isn’t already\
    \ expanded, click the disclosure triangle in the lower-left corner of the Interface\
    \ Builder canvas to expand it. The `NSArrayController` will need a more meaningful\
    \ name, so click the “Array Controller” text twice slowly (just like renaming\
    \ a file in Finder) to edit the name. We’ll be using this controller to provide\
    \ access to the characters array, so name it “characters.” Giving this top-level\
    \ nib object a unique name of its own will help a bit later on when we’ll be adding\
    \ two more array controllers to this nib. (Note that in the initial release of\
    \ Xcode 4.5, the name may not refresh in the Object Dock after we change it. If\
    \ so, we can get the new name to appear by clicking on the Object Dock’s disclosure\
    \ triangle twice.)\n\nIn order for our `DungeonThingAppDelegate` to make use of\
    \ the `NSArrayController` instances, we’ll need to add outlets to the app delegate.\
    \ Open an Assistant Editor pane, as we did above, with the `DungeonThingAppDelegate.h`\
    \ file displayed. Control-drag from the new characters array controller into the\
    \ `DungeonThingAppDelegate.h` file, and create a new outlet named `characterArrayController`.\n\
    \nNext, click the array controller again and bring up the Attributes Inspector\
    \ (`⌥⌘4`). We’ll see some options at the top that let us fine-tune the behavior\
    \ of the array controller, but for now we’ll leave them all as they are. What\
    \ we need to configure is the lower portion of the Inspector, in the Object Controller\
    \ section. Make sure that Mode is set to Class, and that Class Name is `NSMutableDictionary`.\
    \ This configuration tells the controller that the model objects it’s dealing\
    \ with are instances of `NSMutableDictionary`, a “normal” class (rather than an\
    \ Entity, which we’ll cover as a part of Core Data in [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html)).\
    \ Below that we’ll see a table view that lists the attributes that the array controller\
    \ should be able to access in the model objects. Click the + button below the\
    \ table view, and type in `createdObject`, then click + again, and type in `timestamp`.\
    \ Figure [7-13](#A978-1-4302-4543-8_7_Chapter.html#Fig13) shows the completed\
    \ attributes configuration for the array controller.\n\n![A978-1-4302-4543-8_7_Fig13_HTML.jpg](A978-1-4302-4543-8_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13.  \nThe configured attributes for your first `NSArrayController`\n\
    \nYes, these are the keys that we used in the code for creating an `NSMutableDictionary`\
    \ each time the user clicks a button. These keys are what we’ll now use to creating\
    \ bindings for our GUI objects.\n\nThe next thing we have to do is configure a\
    \ binding, not for a GUI object, but for the array controller itself! It just\
    \ so happens that `NSArrayController` is not only a provider of bindings-ready\
    \ access to model objects. It’s a consumer as well, retrieving its content array\
    \ from another object via Cocoa Bindings. In our case, it will get its content\
    \ from `DungeonThingAppDelegate`’s characters array. With the array controller\
    \ still selected, bring up the Bindings Inspector (`⌥⌘7`). Click the disclosure\
    \ triangle next to Content Array to open it up, and set up the desired binding\
    \ by choosing Dungeon Thing App Delegate from the pop-up list, typing `characters`\
    \ into the Model Key Path field, and pressing Enter. Note that our `DungeonThingAppDelegate`\
    \ requires no special preparation in order to be bindings-friendly. All we have\
    \ to do is expose an instance variable as a property (as we’ve done for our three\
    \ content arrays), and we can immediately use it to bind other objects to!\n\n\
    Now we’ve added an `NSArrayController` and configured it to access the right data\
    \ from our `DungeonThingAppDelegate`. It’s time to bind some GUI objects to this\
    \ new controller.\n\n### Binding the Table Display via the Array Controller\n\n\
    First, we’ll set up a single binding for the table view. We’re going to bind the\
    \ table view’s Content binding to the characters array (through the array controller),\
    \ and then have the table view cell grab the `timestamp` attribute from each model\
    \ object.\n\nHere’s how: click the table view by drilling down through the Object\
    \ Dock on the left side of the Interface Builder canvas, then open the Value binding\
    \ configuration section in the Bindings Inspector (`⌥⌘7`). Choose characters from\
    \ the pop-up list, then `arrangedObjects` in the Controller Key combo box. This\
    \ connects the table view to the array controller, and for each object managed\
    \ by the array controller, it creates a row in the table view and sets the `objectValue`\
    \ property of that row. We mentioned earlier that the Controller Key combo box\
    \ lets us choose different aspects of the controller object we’re binding through.\
    \ In this case, binding through `arrangedObjects` means that we’re binding to\
    \ the entire sorted array of objects. This sort of binding is usually only appropriate\
    \ for view objects that can display an entire array of content, such as a table.\n\
    \nNext, expand the Selection Indices binding configuration section (just below\
    \ the Value section). Again, choose characters from the pop-up list, and this\
    \ time enter `selectionIndices` in the Controller Key combo box. This tells the\
    \ array controller which row (or rows) are selected in the table view and passes\
    \ the selection status along to any other objects that are bound to the array\
    \ controller. In particular, this is how the text field will get updated when\
    \ the selection changes.\n\nNow we need to establish a binding for each subview\
    \ contained in the table view so we can pull out the appropriate information from\
    \ the `objectValue`. Since we only have one column with one view—an `NSTableCellView`—this\
    \ is straightforward. The `NSTableCellView` has an embedded `NSTextField`, and\
    \ that’s what we need to bind. Select the “Static Text - Table View Cell” entry\
    \ within the Table Cell View within the table view (this is easiest from the expanded\
    \ Object Dock on the left). In the Bindings Inspector, select Bind to the Table\
    \ Cell View, and then enter `objectValue.timestamp` in the Model Key Path. This\
    \ tells the `NSTextField` to use the `timestamp` property of the object bound\
    \ to the `NSTableCellView` in which the text field is embedded.\n\n### Binding\
    \ a Text Field via the Array Controller’s Selection\n\nThe final binding that\
    \ needs to be done for the characters section is for the text field that displays\
    \ the value. This binding will also be done through the array controller, grabbing\
    \ the `createdObject` attribute from the controller’s selected object.\n\nClick\
    \ to select the text field in the box on the left. The first click probably selects\
    \ the box itself, and clicking again will then select the text field. Now look\
    \ again at the Bindings Inspector, and find the Value binding configuration. Select\
    \ characters from the pop-up list, `selection` from the Controller Key combo box,\
    \ and `createdObject` from the Model Key Path combo box, and then click to turn\
    \ on the Bind checkbox. Note that by choosing `selection` for the Controller Key,\
    \ we specify that the array controller will only make the selected object available\
    \ to this control, rather than a whole array of them as it does with the table\
    \ column."
  raw: '### Creating and Configuring an Array Controller


    Now it’s time to add an `NSArrayController` so that we can configure some bindings
    for the first set of objects, the characters. In the Object Library pane, search
    for “array.” Note the Array Controller that appears in the results; this is an
    instance of the `NSArrayController` object. Drag one of these out to the object
    dock on the far left of the Interface Builder canvas. If the dock area isn’t already
    expanded, click the disclosure triangle in the lower-left corner of the Interface
    Builder canvas to expand it. The `NSArrayController` will need a more meaningful
    name, so click the “Array Controller” text twice slowly (just like renaming a
    file in Finder) to edit the name. We’ll be using this controller to provide access
    to the characters array, so name it “characters.” Giving this top-level nib object
    a unique name of its own will help a bit later on when we’ll be adding two more
    array controllers to this nib. (Note that in the initial release of Xcode 4.5,
    the name may not refresh in the Object Dock after we change it. If so, we can
    get the new name to appear by clicking on the Object Dock’s disclosure triangle
    twice.)


    In order for our `DungeonThingAppDelegate` to make use of the `NSArrayController`
    instances, we’ll need to add outlets to the app delegate. Open an Assistant Editor
    pane, as we did above, with the `DungeonThingAppDelegate.h` file displayed. Control-drag
    from the new characters array controller into the `DungeonthingAppDelegate.h`
    file, and create a new outlet named `characterArrayController`.


    Next, click the array controller again and bring up the Attributes Inspector (⌥⌘4).
    We’ll see some options at the top that let us fine-tune the behavior of the array
    controller, but for now we’ll leave them all as they are. What we need to configure
    is the lower portion of the Inspector, in the Object Controller section. Make
    sure that Mode is set to Class, and that Class Name is “NSMutableDictionary.”
    This configuration tells the controller that the model objects it’s dealing with
    are instances of `NSMutableDictionary`, a “normal” class (rather than an Entity,
    which we’ll cover as a part of Core Data in [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html)).
    Below that we’ll see a table view that lists the attributes that the array controller
    should be able to access in the model objects. Click the + button below the table
    view, and type in “createdObject,” then click + again, and type in “timestamp.”
    Figure [7-13](#A978-1-4302-4543-8_7_Chapter.html#Fig13) shows the completed attributes
    configuration for the array controller.


    ![A978-1-4302-4543-8_7_Fig13_HTML.jpg](A978-1-4302-4543-8_7_Fig13_HTML.jpg)


    Figure 7-13.


    The configured attributes for your first NSArrayController


    Yes, these are the keys that we used in the code for creating an `NSMutableDictionary`
    each time the user clicks a button. These keys are what we’ll now use to creating
    bindings for our GUI objects.


    The next thing we have to do is configure a binding, not for a GUI object, but
    for the array controller itself! It just so happens that `NSArrayController` is
    not only a provider of bindings-ready access to model objects. It’s a consumer
    as well, retrieving its content array from another object via Cocoa Bindings.
    In our case, it will get its content from `DungeonThingAppDelegate`’s characters
    array. With the array controller still selected, bring up the Bindings Inspector
    (⌥⌘7). Click the disclosure triangle next to Content Array to open it up, and
    set up the desired binding by choosing Dungeon Thing App Delegate from the pop-up
    list, typing “characters” into the Model Key Path field, and pressing Enter. Note
    that our `DungeonThingAppDelegate` requires no special preparation in order to
    be bindings-friendly. All we have to do is expose an instance variable as a property
    (as we’ve done for our three content arrays), and we can immediately use it to
    bind other objects to!


    Now we’ve added an `NSArrayController` and configured it to access the right data
    from our `DungeonThingAppDelegate`. It’s time to bind some GUI objects to this
    new controller.


    ### Binding the Table Display via the Array Controller


    First, we’ll set up a single binding for the table view. We’re going to bind the
    table view’s Content binding to the characters array (through the array controller),
    and then have the table view cell grab the timestamp attribute from each model
    object.


    Here’s how: click the table view by drilling down through the Object Dock on the
    left side of the Interface Builder canvas, then open the Value binding configuration
    section in the Bindings Inspector (⌥⌘7). Choose characters from the pop-up list,
    then arrangedObjects in the Controller Key combo box. This connects the table
    view to the array controller, and for each object managed by the array controller,
    it creates a row in the table view and sets the `objectValue` property of that
    row. We mentioned earlier that the Controller Key combo box lets us choose different
    aspects of the controller object we’re binding through. In this case, binding
    through arrangedObjects means that we’re binding to the entire sorted array of
    objects. This sort of binding is usually only appropriate for view objects that
    can display an entire array of content, such as a table.


    Next, expand the Selection Indices binding configuration section (just below the
    Value section). Again, choose characters from the pop-up list, and this time enter
    selection Indices in the Controller Key combo box. This tells the array controller
    which row (or rows) are selected in the table view and passes the selection status
    along to any other objects that are bound to the array controller. In particular,
    this is how the text field will get updated when the selection changes.


    Now we need to establish a binding for each subview contained in the table view
    so we can pull out the appropriate information from the `objectValue`. Since we
    only have one column with one view—an `NSTableCellView`—this is straightforward.
    The `NSTableCellView` has an embedded `NSTextField`, and that’s what we need to
    bind. Select the “Static Text - Table View Cell” entry within the Table Cell View
    within the table view (this is easiest from the expanded Object Dock on the left).
    In the Bindings Inspector, select Bind to the Table Cell View, and then enter
    `objectValue.timestamp` in the Model Key Path. This tells the `NSTextField` to
    use the `timestamp` property of the object bound to the `NSTableCellView` in which
    the text field is embedded.


    ### Binding a Text Field via the Array Controller’s Selection


    The final binding that needs to be done for the characters section is for the
    text field that displays the value. This binding will also be done through the
    array controller, grabbing the `createdObject` attribute from the controller’s
    selected object.


    Click to select the text field in the box on the left. The first click probably
    selects the box itself, and clicking again will then select the text field. Now
    look again at the Bindings Inspector, and find the Value binding configuration.
    Select characters from the pop-up list, selection from the Controller Key combo
    box, and createdObject from the Model Key Path combo box, and then click to turn
    on the Bind checkbox. Note that by choosing selection for the Controller Key,
    we specify that the array controller will only make the selected object available
    to this control, rather than a whole array of them as it does with the table column.'
  trans: "\n### 创建与配置数组控制器\n\n现在，我们需要添加一个`NSArrayController`，以便为第一组对象（角色）配置一些绑定。在对象库面板中，搜索“array”。请注意结果中出现的数组控制器；这是`NSArrayController`对象的一个实例。将其拖拽至界面构建器画布最左侧的对象停靠区。如果该停靠区尚未展开，请点击界面构建器画布左下角的展开三角形以展开它。`NSArrayController`需要一个更有意义的名称，因此请缓慢双击“Array\
    \ Controller”文本（就像在 Finder 中重命名文件一样）来编辑名称。我们将使用此控制器来提供对角色数组的访问，因此将其命名为“characters”。为这个顶级\
    \ nib 对象赋予一个独特的名称，稍后当我们向此 nib 添加另外两个数组控制器时会有所帮助。（请注意，在 Xcode 4.5 的初始版本中，更改名称后，对象停靠区中的名称可能不会刷新。如果发生这种情况，可以双击对象停靠区的展开三角形两次来使新名称显示出来。）\n\
    \n为了让我们的`DungeonThingAppDelegate`能够使用`NSArrayController`实例，我们需要向应用程序委托添加输出口。像之前一样，打开一个助理编辑器面板，并显示`DungeonThingAppDelegate.h`文件。从新的角色数组控制器按住\
    \ Control 键拖拽到`DungeonThingAppDelegate.h`文件中，并创建一个名为`characterArrayController`的新输出口。\n\
    \n接下来，再次点击数组控制器，并调出属性检查器（`⌥⌘4`）。我们会看到顶部有一些选项，可以用来微调数组控制器的行为，但现在我们保持它们不变。我们需要配置的是检查器下部，在对象控制器（Object\
    \ Controller）部分。确保模式（Mode）设置为类（Class），并且类名称为`NSMutableDictionary`。此配置告诉控制器，它处理的模型对象是`NSMutableDictionary`的实例，这是一个“普通”类（而不是实体，后者将在第\
    \ 7 章中作为 Core Data 的一部分进行介绍）。在此之下，我们会看到一个表格视图，列出了数组控制器应该能够在模型对象中访问的属性。点击表格视图下方的\
    \ + 按钮，输入`createdObject`，然后再次点击 + ，输入`timestamp`。图 7-13 展示了数组控制器的完整属性配置。\n\n![A978-1-4302-4543-8_7_Fig13_HTML.jpg](img/A978-1-4302-4543-8_7_Fig13_HTML.jpg)\n\
    \n图 7-13。  \n第一个`NSArrayController`的已配置属性\n\n是的，这些就是我们在代码中用于每次用户点击按钮时创建`NSMutableDictionary`所使用的键。我们现在将使用这些键为我们的\
    \ GUI 对象创建绑定。\n\n接下来，我们需要配置一个绑定，但这次不是针对 GUI 对象，而是针对数组控制器本身！实际上，`NSArrayController`不仅是一个提供绑定就绪的模型对象访问的提供者，它也是一个消费者，通过\
    \ Cocoa 绑定从另一个对象检索其内容数组。在我们的例子中，它将从`DungeonThingAppDelegate`的角色数组中获取内容。保持数组控制器被选中，调出绑定检查器（`⌥⌘7`）。点击内容数组（Content\
    \ Array）旁边的展开三角形以打开它，并通过从弹出列表中选择 Dungeon Thing App Delegate，在模型键路径（Model Key Path）字段中输入`characters`，然后按回车键来设置所需的绑定。请注意，我们的`DungeonThingAppDelegate`无需特殊准备即可支持绑定。我们所要做的就是将一个实例变量作为属性公开（就像我们对三个内容数组所做的那样），然后我们就可以立即用它来绑定其他对象了！\n\
    \n现在，我们已经添加了一个`NSArrayController`，并将其配置为从我们的`DungeonThingAppDelegate`访问正确的数据。接下来，是时候将一些\
    \ GUI 对象绑定到这个新控制器上了。\n\n### 通过数组控制器绑定表格显示\n\n首先，我们将为表格视图设置一个简单的绑定。我们将把表格视图的内容（Content）绑定到角色数组（通过数组控制器），然后让表格视图单元格从每个模型对象中获取`timestamp`属性。\n\
    \n操作方法如下：通过点击界面构建器画布左侧对象停靠区中的层级来选中表格视图，然后在绑定检查器（`⌥⌘7`）中打开值（Value）绑定配置部分。从弹出列表中选择\
    \ characters，然后在控制器键（Controller Key）组合框中选择`arrangedObjects`。这将表格视图连接到数组控制器，并且对于数组控制器管理的每个对象，它会在表格视图中创建一行，并设置该行的`objectValue`属性。我们之前提到过，控制器键组合框允许我们选择通过其进行绑定的控制器对象的不同方面。在这种情况下，通过`arrangedObjects`绑定意味着我们绑定到整个排序后的对象数组。这种绑定通常只适用于能够显示整个内容数组的视图对象，例如表格。\n\
    \n接下来，展开选择索引（Selection Indices）绑定配置部分（就在值部分下方）。再次从弹出列表中选择 characters，这次在控制器键组合框中输入`selectionIndices`。这告诉数组控制器表格视图中选择了哪一行（或哪些行），并将选择状态传递给绑定到该数组控制器的任何其他对象。特别是，当选择更改时，文本字段将通过这种方式得到更新。\n\
    \n现在，我们需要为表格视图中包含的每个子视图建立一个绑定，以便从`objectValue`中提取适当的信息。由于我们只有一个列和一个视图——一个`NSTableCellView`——这很简单。`NSTableCellView`有一个内嵌的`NSTextField`，这正是我们需要绑定的。在表格视图中选择表格单元格视图内的“Static\
    \ Text - Table View Cell”条目（从左侧展开的对象停靠区操作最容易）。在绑定检查器中，选择绑定到表格单元格视图（Table Cell\
    \ View），然后在模型键路径（Model Key Path）中输入`objectValue.timestamp`。这告诉`NSTextField`使用绑定到内嵌了该文本字段的`NSTableCellView`的对象的`timestamp`属性。\n\
    \n### 通过数组控制器的选择绑定文本字段\n\n角色部分需要完成的最后一个绑定是针对显示值的文本字段。这个绑定也将通过数组控制器完成，从控制器的选定对象中获取`createdObject`属性。\n\
    \n点击以选择左侧框中的文本字段。第一次点击可能会选中框本身，再次点击则会选中文本字段。现在再次查看绑定检查器，找到值（Value）绑定配置。从弹出列表中选择\
    \ characters，从控制器键组合框中选择`selection`，从模型键路径组合框中选择`createdObject`，然后点击以打开绑定（Bind）复选框。请注意，通过为控制器键选择`selection`，我们指定了数组控制器将只向此控件提供选定的对象，而不是像对表格列那样提供整个数组。\n"
- fmt: "### Populating the Array\n\nWe now need to go back to the code. Open up `DungeonThingAppDelegate.m`\
    \ in an editor pane. In order for the table view to display anything, we need\
    \ to put some data into the `NSArrayController`. To do this, we’re going to change\
    \ a single line at the end of the `createCharacter:` action method. Instead of\
    \ putting the summary text created by the method directly into a text field, we’ll\
    \ add each summary to an array, using `NSArrayController` to do this so that all\
    \ dependent views (any views that have bindings through the same `NSArrayController`)\
    \ will be automatically updated as well. Rather than inserting the bare string\
    \ into the array, we’re creating an `NSMutableDictionary` containing the created\
    \ object and the current time, using the dictionary as the simplest sort of model\
    \ object, containing two keyed values. Implement this change at the end of `createCharacter:`\
    \ by changing\n\n`[self.characterLabel setStringValue:result];`\n\nto\n\n```\n\
    [self.characterArrayController addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \  result, @\"createdObject\",\n  [NSDate date], @\"timestamp\",\n  nil]];\n```\n\
    \nRecall that we used `createdObject` and `timestamp` as keys in the `NSArrayController`\
    \ that we set up in Interface Builder, and for the binding for the text field\
    \ within the table view. By putting objects into the array using these key names,\
    \ we’re enabling the bindings to pull them back out.\n\nIn fact, while we’re in\
    \ the code, we can also remove the `@property` declaration for `characterLabel`\
    \ in the `DungeonThingAppDelegate.h` file. We don’t have any references to this\
    \ property anywhere in the code anymore, and keeping the code clean is a good\
    \ habit.\n\n### Making Sure it Works\n\nOK, that’s been a lot of prep work. Fire\
    \ it up and see what happens; go ahead and build and run the application. We should\
    \ be able to create a new character and see it appear in the text field along\
    \ with a timestamp entry in the table below. Modify some preferences, then make\
    \ another character, and see the new parameter summary in the text field and a\
    \ new timestamp in the table view. Switch between the rows by clicking on them\
    \ and watch the value in the text field change accordingly.\n\nIf any of those\
    \ things don’t work, go back to the nib and double-check the configuration of\
    \ our bindings, as well as `DungeonThingAppDelegate's` connection to the array\
    \ controller.\n\n### Rinse, Repeat, Rinse, Repeat\n\nNow that we’re dealing with\
    \ characters entirely via bindings, we can go back and do the same things for\
    \ monsters and dungeons. Create a new `NSArrayController` by duplicating the characters\
    \ array controller (thereby keeping its existing configuration, including the\
    \ key names we already entered) and name it “monsters” to keep it consistent.\
    \ As we did with the characters array controller before, connect monsters to the\
    \ `DungeonThingAppDelegate` by creating a new outlet called `monsterArrayController`,\
    \ configure its Content Array and Selected Indices bindings to connect to the\
    \ `monsters` attribute in `DungeonThingAppDelegate`, and configure the two relevant\
    \ GUI objects (the table column and the text field) through the monsters array\
    \ controller, all as described previously. Lastly, update the `createMonster:`\
    \ action method by changing the last line from\n\n`[self.monsterLabel setStringValue:result];`\n\
    \nto\n\n```\n[self.monsterArrayController addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \  result, @\"createdObject\",\n  [NSDate date], @\"timestamp\",\n  nil]];\n```\n\
    \nBuild and run the app and make sure it’s all working, then repeat all this once\
    \ more for dungeons.\n\nOnce all three `NSArrayController`s are created and the\
    \ bindings are set up, we can remove the `monsterLabel` and `dungeonLabel @property`\
    \ declarations in `DungeonThingAppDelegate.h` that referred to the text fields\
    \ since these are now being populated through the bindings.\n\n## Okay, But How\
    \ Did That Work?\n\nNow that you’ve gotten your feet wet with Cocoa bindings,\
    \ you may have the distinct feeling that you’ve just witnessed some sort of magic\
    \ show—and you’re wondering how the tricks actually work! That’s a completely\
    \ understandable feeling. We programmers are accustomed to being required to spell\
    \ out every movement of a chunk of data and every update to the screen in excruciating\
    \ detail, and suddenly we find that simply setting a value somewhere causes some\
    \ unseen forces to propagate the value to other views on the screen. This section\
    \ will attempt to clarify the process for you by explaining the Cocoa concepts\
    \ of key-value coding and key-value observing, and how Cocoa bindings uses them\
    \ to do its magic.\n\n### Key-Value Coding\n\nFirst let’s talk about key-value\
    \ coding (KVC). The idea behind KVC is to allow us to refer to an object’s attributes\
    \ by using strings that match attribute names or that match the names of some\
    \ getter and setter methods. Say, for instance, that we have a class called `Person`,\
    \ which has the concept of a `firstName`, either in the form of an instance variable\
    \ called `firstName`, or a pair of methods called `firstName` and `setFirstName:`.\
    \ Using KVC, we can access a person’s `firstName` attribute using the following\
    \ incantation:\n\n```\n[myPerson setValue:@\"Frodo\" forKey:@\"firstName\"];\n\
    ```\n\nGiven the key name `firstName`, this method call first checks to see whether\
    \ the object has a method called `setFirstName:`, and if so, invokes it to set\
    \ the value. If that doesn’t work, it checks to see if there’s an instance variable\
    \ called `firstName` and tries to set it directly.\n\nWe can also retrieve a value\
    \ in a similar manner:\n\n```\nmyNameString = [myPerson valueForKey:@\"firstName\"\
    ];\n```\n\nA similar sequence occurs in this case. It first looks for a method\
    \ called `firstName`, and if there isn’t one, it tries to find an instance variable\
    \ with the same name.\n\nThe result of all this is that KVC gives us a way to\
    \ talk about an object’s attributes in an extremely generic fashion. Not only\
    \ is the object’s storage of its attributes transparent to us, even the way to\
    \ access an attribute from the outside is something that we don’t need to worry\
    \ about. It could change, perhaps even inside a running a program, and we wouldn’t\
    \ notice the difference.\n\nThe `setValue:forKey:` and `valueForKey:` methods\
    \ are defined in `NSObject` (with some additional extensions for collection classes\
    \ like `NSArray` and `NSSet`) to try to determine, on the fly, the best way to\
    \ access the value based on the name of the key. This means that they are ready\
    \ to use on every class in Cocoa.\n\nOne additional point to make about KVC is\
    \ that the strings used as keys can actually be used as a sort of path to traverse\
    \ relationships between objects. For example, let’s imagine that our `Person`\
    \ class also contains a property called `mother`, which is a pointer to another\
    \ `Person`. If we want to set the `firstName` of `myPerson's` mother, in normal\
    \ code we would likely do it one of these ways:\n\n```\nmyPerson.mother.firstName\
    \ = @\"Anne\";\n[myPerson.mother setFirstName:@\"Anne\"];\n[[myPerson mother]\
    \ setFirstName:@\"Anne\"];\n```\n\nUsing KVC, we have an additional way to accomplish\
    \ this:\n\n```\n[myPerson setValue:@\"Anne\" forKeyPath:@\"mother.firstName\"\
    ];\n```\n\nThe KVC methods are smart enough to look at the key string, split it\
    \ apart by paths, and traverse any object relationships mentioned in the path,\
    \ so the previous line ends up calling something like this:\n\n```\n[[myPerson\
    \ valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"firstName\"];\n```\n\n\
    While neither of the KVC options are really appealing for regular use in our own\
    \ code (because the “normal” versions all read a bit more nicely), they can be\
    \ used to great advantage in situations requiring more flexibility, such as, say,\
    \ an interface that lets us configure which values will be displayed in a view\
    \ object just by typing in the name of the path to the attribute, without requiring\
    \ compilation of any source code or anything. Sound familiar?"
