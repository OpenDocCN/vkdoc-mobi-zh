    Xcode 中，通过打开“Open Quickly”窗口（⌘⇧O）并输入文件名，可以轻松找到这些头文件。'
  raw: 'Add that line, run the app again, and we’re back to smooth sailing! Again,
    this type of bug can really only occur if we’re not using ARC. And, apart from
    this relatively simple rule of thumb about setting pointers to `nil` after releasing
    objects, there are other ways that a non-ARC app can wind up in similar situations,
    such as forgetting to retain an object that we want to use for a while. These
    bugs can be some of the trickiest to track down, which is one of the strongest
    reasons for using ARC wherever possible.


    Before moving on, we need to re-enable ARC in our project. Once again, select
    the top-level project item in the project navigator, find the Objective-C Automatic
    Reference Counting item in the Build Settings tab, and turn it on. We’ll also
    need to delete the `[object release];` line from the `freedObject` method in the
    app delegate, since ARC doesn’t let us call release explicitly.


    ## NSError


    Now you know that exceptions in Cocoa aren’t typically used for flow control,
    instead being used primarily to point out bugs. Some other languages and frameworks
    in use today use exceptions for all sorts of things that aren’t bugs but can be
    side effects of conditions outside the developer’s direct control, such as file-related
    errors when trying to access a file, or network errors when trying to read data
    from a socket. In Cocoa, these types of situations are handled more often using
    a class called `NSError`. In this section, we’ll learn about the content of an
    `NSError` object, what kinds of situations lead to its creation, and how to deal
    with it in our code, including giving our application the ability to retry certain
    kinds of error-triggering operations.


    ### Domains and Codes


    Traditionally, every operating system has its own ways of reporting system errors,
    typically providing an integer value that we can compare with a predefined list
    in a header file to determine what to do. In UNIX-based systems, for example,
    we can (in fact, should) examine the value of `errno` (which is either a global
    variable, or a symbol that calls a function, depending on a number of factors
    we won’t get into here) after every system call, including functions to open a
    file, read from a file, write to a file, and the like. The idea is that if any
    system function encounters a problem, it will put an integer into `errno` to let
    us know the nature of the error.


    In “classic Mac OS” programming (everything predating OS X), things were a bit
    different. Instead of populating a global variable, many system functions have
    a return type of `OSStatus`, which again boils down to an integer that we should
    check after calling each function to make sure nothing unexpected happened.


    OS X is sort of a hybrid OS. Its underpinnings are firmly rooted in UNIX, and,
    as you know, it contains all of the Objective-C frameworks that make up Cocoa.
    It also includes Carbon, a large set of APIs and technologies adapted from older
    versions of Mac OS. Furthermore, there are modern APIs written entirely in C for
    both OS X and iOS. Each of these “worlds” contains functions and/or methods that
    need to report back error codes in one way or another, and since these worlds
    developed in a separate fashion, of course there is some overlap between the sets
    of error codes. At some point, Apple realized that there could be some benefit
    to dealing with error messages from these different worlds in a common way, letting
    each of them continue to use the same error codes they always have (ensuring binary
    compatibility with existing software) without any risk of confusion by tagging
    each error with a string specifying its domain.


    And that’s what we have in the `NSError` class, which basically wraps a system-level
    error code in an Objective-C object. Each `NSError` instance has an `NSString`
    to specify the name of its “domain” (generically, which library or framework it
    came from), an integer to specify the relevant error code, and an optional `NSDictionary`
    that can contain additional information about the error. Because these are normal
    Objective-C objects, they can be dealt with like any other object: passed around,
    put into an `NSArray`, and so on.


    Cocoa includes some predefined string constants to categorize the main sources
    of `NSError` objects in the Cocoa frameworks themselves. The domains you’re most
    likely to encounter as a Cocoa programmer are the following:


    *   NSPOSIXErrorDomain: UNIX errors (those that are part of the POSIX standard).

    *   NSOSStatusErrorDomain: Errors from Carbon functions (which typically return
    an OSStatus).

    *   NSCocoaErrorDomain: Errors arising directly within Cocoa’s own classes.


    Whenever a Cocoa method gives us an `NSError`, its domain will likely be one of
    these. If you start creating your own `NSError` instances in your code, you’ll
    probably want to define your own domains and error codes in order to make it easier
    for you to handle them in your application.


    Each of the predefined error domains also has an associated list of error codes,
    defined in one or more header files. The error codes applicable to `NSPOSIXErrorDomain`
    are found in errno.h. Those for `NSOSStatusErrorDomain` are in MacErrors.h; and
    the error codes in use for the `NSCocoaErrorDomain` are contained in FoundationErrors.h,
    AppKitErrors.h, and CoreDataErrors.h. Each of these headers can be found easily
    in Xcode by bringing up the Open Quickly window (⌘⇧O) and typing the name of the
    file.'
