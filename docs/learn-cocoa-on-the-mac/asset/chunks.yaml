- fmt: "### Frame Rectangle vs. Bounds Rectangle\n\nFor each view in a window, there\
    \ are a couple of important rectangles (or rects, as they are commonly called)\
    \ that define a lot about its drawing characteristics: its frame rect and its\
    \ bounds rect. The frame rect simply specifies the view’s location and size within\
    \ its parent view’s coordinate space. For example, imagine the top-level view\
    \ in a window. Let’s call it A. If A has a subview called B that extends from\
    \ point (10,20) to point (40,60), then B’s frame rect has (10,20) as its origin\
    \ and (30,40) as its size.\n\nApart from its frame, which determines where and\
    \ to what extent it appears in its superview, each view has a bounds rect, which\
    \ defines its own inner coordinate space. For example, view B described previously\
    \ will by default have a bounds rect whose origin is (0,0) and whose size is (30,40).\
    \ We can easily change this if we want. For example, say we’ve got a bunch of\
    \ points to plot with x and y values of between 0.0 and 10.0. By changing the\
    \ bounds rect of B, setting its size to (10,10), the points will exactly fill\
    \ the space occupied by B, no matter how much space B actually takes on-screen\
    \ (see Figure [14-2](#A978-1-4302-4543-8_14_Chapter.html#Fig2)).\n\n![A978-1-4302-4543-8_14_Fig2_HTML.jpg](A978-1-4302-4543-8_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2.\n\nOn the left, plotting points from a narrow range in a view with\
    \ default bounds. On the right, the same points plotted in a view with smaller\
    \ bounds\n\n### Rects, Points, and Sizes\n\nIn Cocoa, rectangles are represented\
    \ by a C struct called `NSRect`, which is composed of an `NSPoint` containing\
    \ the origin and an `NSSize` containing the size. Both the origin and size each\
    \ contain two values of type `CGFloat`, a basic C type used throughout Cocoa’s\
    \ drawing APIs; origin has x and y, size has width and height.\n\nTo confuse matters\
    \ somewhat, many functions in Core Graphics make use of equivalent structures\
    \ `CGRect`, `CGPoint`, and `CGSize`, which have the same structural layout and\
    \ are all composed of `CGFloat` elements. The historical reasons for this divide\
    \ aren’t terribly interesting, and as long as we’re not working with a 32-bit\
    \ legacy application, these C structs have identical layouts and can be converted\
    \ back and forth with inline functions (for example, `NSRectToCGRect`, `NSSizeFromCGSize`,\
    \ and so on) that are really little more than typecasts. In this chapter, we’ll\
    \ mostly be using the NS-prefixed versions.\n\n### Path Basics\n\nCocoa’s drawing\
    \ mechanism includes the concept of paths, which can contain any number of straight\
    \ or curved-line segments. Each path doesn’t need to be contiguous. We can “pick\
    \ up the pen” at one point and start drawing again at another. Before a path is\
    \ actually drawn, we can specify values such as line thickness, color, and the\
    \ like. Those settings will be applied to every part of the path. Any shapes outlined\
    \ by parts of the path can also be filled with a separate color or pattern.\n\n\
    ## Creating an NSView Subclass\n\nLet’s start exploring a bit by creating an application\
    \ that’s able to draw a very happy smiley face (see Figure [14-3](#A978-1-4302-4543-8_14_Chapter.html#Fig3)).\
    \ In Xcode, create a new Cocoa project named MrSmiley. We’ll be using a class\
    \ prefix of MS for our Mr Smiley app, and we’ll want to leave Automatic Reference\
    \ Counting turned on.\n\n![A978-1-4302-4543-8_14_Fig3_HTML.jpg](A978-1-4302-4543-8_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3.\n\nMr Smiley is very, very happy\n\nNow create a new Objective-C\
    \ class, a subclass of `NSView`, and name it `MSSmileyView`. Do this by selecting\
    \ File ➤ New ➤ File . . . (⌘-N), or by right-clicking in the Project Navigator\
    \ pane on the left side of the Xcode window and selecting New File . . . from\
    \ the pop-up menu. Xcode will create the class’s files for us, including `MSSmileyView.m`,\
    \ where all this section’s work will take place.\n\nBefore getting started on\
    \ the code, open the project’s `MainMenu.xib` file. Grab a custom view from the\
    \ Library window, and drag it into the blank window that is created by default.\
    \ Use the Identity Inspector to change the view’s class to `MSSmileyView` (under\
    \ the Custom Class heading), then use the Size Inspector to change its width and\
    \ height to 100×100. Finally, select the window and press ⌘-= to make the window\
    \ resize itself to perfectly fit the view. Then save the changes.\n\n### The Basic\
    \ Drawing Method, drawRect:\n\nNow let’s get into the code. The `MSSmileyView.m`\
    \ file created by Xcode contains an empty `drawRect:` method, which is where we’ll\
    \ start writing our code. The `drawRect:` method is something we usually won’t\
    \ call directly, except for cases where we’re implementing a subclass of an existing\
    \ view and calling `[super drawRect:rect]` to let the superclass do its part of\
    \ the drawing. Instead, the `drawRect:` method is called automatically whenever\
    \ the application’s main run loop determines that the view needs to be redrawn\
    \ (typically after a view has been created or resized, or our own code has called\
    \ `setNeedsDisplay:` on our view, passing `YES` as the argument). The `drawRect:`\
    \ method takes one argument, a rectangle that indicates which portion of the view\
    \ is considered “dirty” and needs to be redrawn. This can be used to optimize\
    \ drawing of complex views, but in our examples we’ll just ignore that, and instead\
    \ make use of the view’s bounds rectangle for drawing.\n\n### Graphics States\n\
    \nAll drawing in Cocoa occurs within a particular context, which is represented\
    \ by the `NSGraphicsContext` class. Depending on the context, we may be drawing\
    \ directly into a window buffer or drawing into a chunk of off-screen memory for\
    \ later use. But apart from that, the context has some state information of its\
    \ own that can change over time, such as the current color to be used for any\
    \ drawing commands. When it’s time for our view to draw itself, it should do so\
    \ in such a way that the graphics state is put back into the state it was in when\
    \ drawing started.\n\nFortunately, `NSGraphicsContext` provides us with an easy\
    \ way to do just that. Its `saveGraphicsState` method will push all relevant state\
    \ info onto a stack, and the `restoreGraphicsState` method will pop the state\
    \ back off the stack. We can use these two method calls to “bracket” our actual\
    \ drawing code like the following excerpt shows, so we know we aren’t leaving\
    \ the graphics context in an unexpected state.\n\n```\n- (void)drawRect:(NSRect)dirtyRect\n\
    {\n  [NSGraphicsContext saveGraphicsState];\n  // Drawing code here.\n  [NSGraphicsContext\
    \ restoreGraphicsState];\n}\n```"
