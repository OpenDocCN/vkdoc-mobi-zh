- fmt: "Now, we need to set up the details area below it. Start with the date display.\
    \ Drag out a date picker from the Object Library and position it below the table\
    \ view on the left side. In the Attributes Inspector, set the date picker to be\
    \ Textual with Stepper rather than Graphical, set the Elements to be Month, Day,\
    \ and Year, and check the checkbox next to Era (since it’s likely that some of\
    \ the gigs will be in the BC era). In the Bindings Inspector, expand the Value\
    \ section. Select `Gigs` from the pull-down menu, and check the Bind to checkbox.\
    \ The Controller Key default of selection is what we want. Enter `\"performanceDate\"\
    ` into the Model Key Path field.\n\nNext it’s time for the Venues menu. Drag out\
    \ a Popup Button from the Object Library and position it next to the date picker,\
    \ on the right below the table view. The bindings for this one are a bit more\
    \ complex. We’ll need to configure three bindings for the pop-up. First, bind\
    \ Content to the Mythical Venues controller’s `arrangedObjects`. Next, bind `ContentValues`\
    \ to the Mythical Venues controller’s `arrangedObjects`, this time specifying\
    \ `\"name\"` for the Model Key Path. And last but not least, bind the Selected\
    \ Object to the Gigs controller, using `\"venue\"` as the Model Key Path and leaving\
    \ the Controller Key as `\"selection\"`.\n\nLastly, let’s put these two fields\
    \ into a box to visually group them together. This won’t have any effect on how\
    \ they behave; it’s just for appearances. To do this, select both the date picker\
    \ and the pop-up button. From the `Editor` menu, select `Embed In` ➤ `Box` to\
    \ group the two fields together. Set the title of the box to be `\"Gig Details\"\
    `. Adjust the size of the box to be the same width as the Gigs table view. With\
    \ that done, we’ll probably need to adjust the sizes of the controls within the\
    \ box to make the best use of space. We’ll clean up the sizes as necessary, and\
    \ we’re done!\n\nNow save this work, press `Run` in Xcode, and behold! Assuming\
    \ that everything’s configured correctly, we should now be able to add gigs to\
    \ each band’s info.\n\n## Wrap Up\n\nIn this chapter, we expanded the old data\
    \ model, growing it from a single entity on its own to a full complement of entities\
    \ interrelated with relationships. We also saw how each of those relationships\
    \ can be expressed in a GUI (for example, using a pop-up list to choose the remote\
    \ end of a to-one relationship and a table view to show all the contents of a\
    \ to-many relationship), configured, and managed entirely with Cocoa bindings.\n\
    \nNot to beat a dead horse about this visual programming business, but it bears\
    \ repeating that everything in this chapter was done without a single line of\
    \ code on our part. Note that our use of the term “visual programming” has nothing\
    \ to do with Microsoft’s use of the word “visual” in its development tools. The\
    \ idea behind visual programming is to allow a program, or some portion of it,\
    \ to be constructed using graphical components that don’t require the sort of\
    \ textual, procedural programming that’s traditionally been used for writing software.\
    \ Cocoa embraces visual programming to some extent, letting you put together application\
    \ prototypes or even entire applications using just the Xcode data modeler and\
    \ Interface Builder. However, it’s not intended to comprise a complete visual\
    \ programming system, so for every Cocoa app you build, you will out of necessity\
    \ have to break down and write some code!\n\nFurthermore, these usage patterns\
    \ can be applied equally well to your own applications. Just the act of modeling\
    \ your problem domain, defining entities and relationships, can often start giving\
    \ you a sense of how to build your GUI. As you get farther along in the application\
    \ development process, you’re sure to find more ways to connect different kinds\
    \ of controls to your data using Cocoa bindings, and you will sometimes find a\
    \ need to supplement that by writing code to connect things and shuffle data between\
    \ objects.\n\nAs you work through the rest of this book, you’ll see several more\
    \ examples of applications that use Core Data and Cocoa bindings as core parts\
    \ of their architectures, so you’ll see even more approaches to using these technologies.\
    \ The next chapter is the last chapter dealing exclusively with Core Data, showing\
    \ you how to limit the extent of what you’re showing in your GUI, an absolute\
    \ necessity for any application work with a large set of data.\n\n# 10. Search\
    \ and Retrieve Core Data with Criteria\n\n## Abstract\n\nThe MythBase examples\
    \ in Chapters 8 and 9 demonstrated the basics of how Core Data works, letting\
    \ us create, retrieve, update, and delete objects from a backing store with a\
    \ minimum of fuss. So far, we’ve been working primarily with full data sets in\
    \ MythBase. For most of the entities we’ve used (`MythicalPerson`, `MythicalBand`,\
    \ and `MythicalVenue`), all the objects for each entity are loaded during application\
    \ startup and kept in memory for the entire life of the application. That’s okay\
    \ for an application like MythBase, which maintains a small database, but what\
    \ if one of our main entities consists of thousands or millions of instances in\
    \ a backing store? Our app would load everything from storage when the app launches,\
    \ which would probably lead to the app filling up all available memory, swapping\
    \ to disk, and so on. Apart from that problem, we’d also probably end up with\
    \ a bad user experience because a GUI that’s navigable when it’s displaying twenty\
    \ objects in a table view may become impossible to use effectively when there\
    \ are thousands of entries.\n\nThe solution to this problem involves an important\
    \ piece of functionality: a way to provide some search criteria so that we can\
    \ limit the objects pulled out of storage by a controller. This chapter will introduce\
    \ the use of `NSPredicate` to restrict searches to just a subset of all the objects\
    \ for a given `Entity`. We’ll specify a hard-coded `NSPredicate`, both in Interface\
    \ Builder and in our source code, and we’ll let our users define the values for\
    \ a predicate using `NSPredicateEditor`.\n\n## Creating QuoteMonger\n\nWe’ll demonstrate\
    \ the use of `NSPredicate` by creating an app called QuoteMonger, which allows\
    \ us to keep track of all our favorite shows and famous quotes from them. It will\
    \ consist of a Core Data application with two entities, plus a GUI that supports\
    \ both data entry and flexible querying. Figure [10-1](#A978-1-4302-4543-8_10_Chapter.html#Fig1)\
    \ shows a view of the completed application.\n\n![A978-1-4302-4543-8_10_Fig1_HTML.jpg](A978-1-4302-4543-8_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1. QuoteMonger’s data entry and search windows\n\n> Note  \n> By now\
    \ you should have experience with the basics of creating Xcode projects and files,\
    \ so we’re not going to continue giving exact click-by-click instructions for\
    \ some of the things you’ve already done several times, instead reserving the\
    \ highest level of detail for the new topics we’re covering in each chapter."
