    # 与世界分享我们的作品


    告别“你好，世界”。这是我们要介绍的最后一个内容。我们已经创建了应用程序，但它在哪里？如果我们想把应用程序赠送（或出售）给他人，让他们在自己的机器上运行，又该怎么做？


    首先，如果想让别人使用我们的应用程序，我们需要以稍微不同的方式编译它。在 Xcode 中，点击 `Product` 菜单，我们会看到 Xcode 构建应用的五种不同方式：`Run`（运行）、`Test`（测试）、`Profile`（分析）、`Analyze`（剖析）和
    `Archive`（归档）。要分发应用，我们需要进行 `Archive` 构建。现在选择 `Archive`，让 Xcode 再次编译应用。不过这一次，构建完成后，我们不会看到应用运行，而是会看到
    `Organizer` 窗口的 `Archives` 标签页（图 2-18）。


    ![A978-1-4302-4543-8_2_Fig18_HTML.jpg](img/A978-1-4302-4543-8_2_Fig18_HTML.jpg)


    图 2-18. Xcode 的归档窗口


    要准备分发应用程序，点击 `Distribute` 按钮，并选择导出为 `Application` 格式。其他选项（例如提交到 App Store 或导出为开发者
    ID 签名的应用）暂时可以忽略。点击 `Next`，Xcode 会提示我们选择 `Code Signing Identity`（代码签名身份）。选择 `Don’t
    Re-sign`（不重新签名），再次点击 `Next`。Xcode 会询问我们保存应用的位置。在 Finder 中打开该文件夹，就能看到我们的程序了。


    但这还不是全部。每次我们进行归档构建时，Xcode 都会保留该构建的副本，供我们日后参考。它不会在归档中保存源代码（源代码控制系统负责保存），但如果需要支持程序的多个发行版本，保留一份已分发版本的精确副本会非常有用。当然，当旧构建不再有用时，我们可以清理掉它们。


    在结束这个话题之前，你应该对构建配置有基本的了解。`Product` 菜单下的每个不同选项都与一种构建配置相关联。Xcode 为新建项目提供了两种配置：`Debug`（调试）和
    `Release`（发布）。默认情况下，我们在 Xcode 中工作时使用的是 `Debug` 配置。以这种方式构建应用时，Xcode 会加入额外的内容，方便我们对应用进行故障排查。例如，这些调试符号允许我们在程序运行时检查和更改不同变量的值，或者使用调试器逐行单步执行源代码。点击
    `Run` 按钮时，我们得到的就是 `Debug` 配置。


    而 `Archive` 构建过程则使用 `Release` 配置。`Release` 配置不包含调试信息，并且会对生成的程序进行更多优化。它还可以配置为进行多架构构建，以生成
    32 位和 64 位的 x86 二进制文件，这也会拖慢构建过程。在准备让其他人运行应用时，我们通常需要进行此操作，但在积极开发阶段则不必。必要时我们可以定义额外的配置，但当前应用不需要这样。


    恭喜！你现在是一名开发者了。你眼前的这是一个功能完整的应用程序，就像你 `Applications` 文件夹里的所有应用一样。你可以把它通过电子邮件发送给你的贝西姨妈或最好的朋友，向他们炫耀你已成为一名真正的
    Mac OS X 应用程序开发者。


    ## 再见，“你好，世界”


    在本章中，我们介绍了 Xcode，它是 Cocoa 软件开发工具的核心力量。我们在不编写一行代码的情况下，设计了一个功能完整的应用程序。我们学会了如何在应用的主窗口中添加文本标签、修改标签属性、为应用添加图标，甚至还了解了如何构建可分发的应用版本。


    在本章中，我们通过观察不写代码就能完成的事情，初次体验了 Cocoa 的强大功能。在接下来的章节中，当我们真正开始编写代码时，我们将见识到它有多么强大。


    # 3. 灯光，摄像……动作！（以及输出口）


    在了解一些理论之后，我们将构建一个应用程序。该应用将有一个包含标签、文本字段和滑块的单一窗口。当用户移动滑块时，文本字段会自动更新以显示滑块的值。在本章中，我们仍然不会编写任何代码；所有操作都将通过
    Interface Builder 完成——但请稍安勿躁，因为我们将在下一章启用 Objective-C 编译器。Cocoa 用户界面与应用代码交互的方式，就是
    Cocoa 控件彼此交互的方式。我们将首先将 Cocoa 控件相互连接，以了解其实现方法，然后在下一章中，我们将把它们连接到自己的代码上。


    这个应用很简单，但用来创建它的机制与你在 Cocoa 中几乎所有用户交互中使用的机制相同，因此理解本章内容至关重要。

    '
- fmt: '## Frameworks, Frameworks Everywhere


    在 Mac OS X 中，Apple 将代码和支持文件分组到称为`framework`的特殊文件夹（或包）中。`framework`类似于大多数平台上使用的库，但它们更灵活，因为是文件夹而非平面文件。`framework`可以包含图像、声音和影片，甚至可以包含其他`framework`。


    尽管 OS X 支持传统的 Unix 库，但操作系统的许多功能以及几乎所有使 OS X 独一无二的功能都包含在这些`framework`中。构成核心操作系统的`framework`有数十个，通常按功能分组。


    **提示**：你可以通过查看`/System/Library/Frameworks`文件夹来了解构成 Mac OS X 的`framework`。这些`framework`绝对、永远不应该被触碰，所以只看一眼，然后悄悄退出文件夹，以免被它们“发现”。如果你触碰它们，它们可能会变成讨厌的小东西。你还可以通过查看`/Library/Frameworks`来了解系统中安装的第三方和可选`framework`。通常，你
    Mac 上安装的程序所需的`framework`就位于此处。同样，只看不动，否则可能会搞乱一些重要的东西。事实上，如果你运行的是 Mountain Lion，`/Library`目录在
    Finder 中默认是隐藏的。


    虽然有很多`framework`，但在 Cocoa 编程中，绝大部分时间你只使用来自少数`framework`的对象。实际上，你将使用的大部分对象都来自一个单一的`framework`，名为
    Cocoa 框架（这并不意外）。


    还记得我们说过`framework`可以包含其他`framework`吗？实际上，Cocoa 框架只是一个包装器，它封装了另外三个`framework`，这些框架包含了编写
    Cocoa 应用程序时所需的大部分功能：Foundation 框架、AppKit 框架和 Core Data 框架。


    你会定期使用其他`framework`的功能。例如，你可能使用 Core Animation 框架为界面添加一些漂亮的动画，或使用 Core Image 框架进行复杂的图像处理。但绝大多数对象将来自构成
    Cocoa 的三个`framework`。我们将从[第 7 章](#A978-1-4302-4543-8_7_Chapter.html)开始讨论 Core
    Data 框架，但让我们先花点时间简要看看另外两个框架，本章将用到它们。


    ### Foundation 框架


    Foundation 框架名副其实。它包含了几乎所有其他部分赖以构建的对象。Foundation 框架在 Cocoa 和 Cocoa Touch 之间共享。尽管
    Foundation 框架已经进化，但其中许多对象自 NeXTStep 早期就已存在，且基本用法变化不大。Foundation 包含诸如`NSString`（用于表示
    Cocoa 中文本的类）以及集合类（如`NSArray`和`NSDictionary`）等对象。你从学习 Objective-C 开始就应该已经对 Foundation
    框架有一定了解。


    ### AppKit 框架


    看看你的 Mac 屏幕。你在那里看到的几乎所有内容都是 AppKit 的领域。这个框架包含用于创建或管理用户界面的所有对象。有创建按钮、窗口、文本字段、标签栏等对象。任何你在多个应用程序中见过的用户界面元素，很可能都是
    AppKit 框架的一部分。上一章中你免费获得的所有酷炫功能？是的，全是 AppKit 的功劳。本章我们将构建的应用程序，也完全基于 AppKit。


    ### Cocoa 之道：模型-视图-控制器


    在深入探讨如何使用这些框架之前，我们需要讨论一个非常重要的理论。Cocoa 的设计者遵循一个名为模型-视图-控制器(MVC)的概念，这是一种非常合理的方式来划分构成
    GUI 应用程序的代码。如今，几乎所有面向对象的应用程序框架都或多或少地向 MVC 致敬，但很少有像 Cocoa 这样忠于 MVC 模型，或使用它如此之久的。


    MVC 模型将所有功能划分为以下三个不同的类别：


    *   **模型**：持有应用程序数据的类。

    *   **视图**：用户可以看到并与之交互的窗口、控件和其他元素。

    *   **控制器**：将模型和视图绑定在一起，包含决定如何处理用户输入的应用程序逻辑的部分。


    MVC 的目标是使实现这三类代码的对象尽可能彼此区分开来。你编写的任何对象都应能明确识别为属于三个类别之一，并且其中几乎没有或完全没有可归类于其他两个类别的功能。例如，实现按钮的对象不应包含处理按钮点击时数据的代码，而实现银行账户的代码不应包含绘制表格以显示其交易的代码。


    MVC 有助于确保最大的可复用性。一个实现通用按钮的类可以在任何应用中使用。而一个实现特定计算按钮的类，只能在最初编写它的应用中使用。


    当你编写 Cocoa 应用程序时，你将主要使用 Interface Builder 创建视图组件，但有时也会通过代码修改界面，或者你可能子类化现有的视图和控件类来创建新的。


    模型将通过使用 Core Data 或设计 Objective-C 类来持有应用程序数据。在本章的应用程序中，我们不会创建任何模型对象，因为我们还不打算存储数据，但我们将在下一章介绍非常简单的模型对象，并在[第
    8 章](#A978-1-4302-4543-8_8_Chapter.html)开始使用 Core Data 时，转向完整的模型对象。


    控制器组件通常由我们创建的、特定于应用程序的类组成。控制器可以是完全自定义的类（`NSObject`子类），这是 Cocoa 中的传统做法。几年前，Apple
    开始向 AppKit 框架中引入通用控制器类，这些类为我们处理某些基本任务，例如处理要在列表中显示的对象数组。这对于最小化样板代码非常有用。


    随着我们深入了解 Cocoa，你会很快开始看到 AppKit 框架的类如何遵循 MVC 原则。如果在开发时把这一概念牢记在心，你将创建出更清晰、更易于维护的代码。


    ## Outlets、Actions 和控制器


    显然，如果无法从代码中获取数据、输出数据或更改其外观，用户界面就没多大用处。在 Cocoa 中，我们使用`outlet`和`action`来与我们在 Interface
    Builder 中设计的用户界面进行交互。


    *   **`Outlets`**：指向 nib 文件中对象的指针。`Outlets`允许我们从代码访问 nib 中的对象。

    *   **`Actions`**：可以直接作为用户交互结果（例如点击按钮）执行的方法。它们是应用程序对象响应用户输入的方式，无论这些对象是框架类还是我们自己的代码。


    `Outlets`和`Actions`通常包含在控制器类中（尽管有时也在其他地方使用）。在本章中，我们将使用 AppKit 的两个类（`NSSlider`和`NSTextField`）暴露的`outlet`和`action`来演示如何操作。在下一章中，我们将编写自己的`outlet`和`action`。'
  raw: '## Frameworks, Frameworks Everywhere


    In Mac OS X, Apple has grouped code and supporting files together in special folders
    (or bundles) called frameworks. Frameworks are like the libraries used on most
    platforms, but they are more flexible because they are folders rather than flat
    files. Frameworks can contain images, sounds, and movies. They can even contain
    other frameworks.


    Although OS X supports traditional Unix libraries, much of the functionality of
    the operating system, and nearly all of the functionality that makes OS X unique,
    is contained in these frameworks. There are literally dozens of frameworks that
    make up the core operating system, and these are generally grouped by function.


    Tip


    You can see the frameworks that make up Mac OS X by looking in the folder `/System/Library/Frameworks`.
    These frameworks should never, ever be touched, so look only, and then quietly
    back out of the folder so they don’t hear you. Frameworks can be nasty little
    buggers if you touch them. You can also see what third-party and optional frameworks
    have been installed in your system by looking in `/Library/Frameworks`. This is
    where the frameworks that are needed by programs you have installed on your Mac
    typically reside. Again, look, but don’t touch, or you could mess up something
    important. In fact, if you’re running Mountain Lion, the `/Library` directory
    is hidden by default in Finder.


    Although there are many frameworks, you’ll spend the vast majority of your programming
    time in Cocoa using objects from just a handful. In fact, most of the objects
    you’ll use come from a single framework called (surprise!) the Cocoa framework.


    Remember how we told you that frameworks can contain other frameworks? Well, the
    Cocoa framework is, in fact, just a wrapper around three other frameworks that
    hold the bulk of the functionality you will use when writing Cocoa applications:
    the Foundation framework, the AppKit framework, and the Core Data framework.


    You will periodically use functionality from other frameworks. For example, you
    might use the Core Animation framework to do some spiffy animation with your user
    interface, or you might use the Core Image framework to do some heavy-duty image
    manipulation. But the vast majority of the objects you will be using will be from
    the three frameworks that make up Cocoa. We’ll talk about the Core Data framework
    starting in [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html), but let’s take a
    second to briefly look at the other two, which we’ll be working with in this chapter.


    ### The Foundation Framework


    The Foundation framework is aptly named. It holds the objects that pretty much
    everything else is built upon. The Foundation framework is shared between Cocoa
    and Cocoa Touch. Although the Foundation framework has evolved, many of the objects
    it contains have been around since the early days of NeXTStep, and their basic
    usage hasn’t changed all that much. Foundation contains objects such as `NSString`,
    which is the class used to represent text in Cocoa, as well as collection classes
    like `NSArray` and `NSDictionary`. You should already have some familiarity with
    the Foundation framework from having learned Objective-C.


    ### The AppKit Framework


    Look at your Mac’s screen. Pretty much everything you see there is the domain
    of AppKit, which is an abbreviation of “application kit.” This framework contains
    all the objects used to create or manage a user interface. There are objects that
    create buttons, windows, text fields, tab bars, and more. Any user-interface element
    that you’ve seen in more than one application is probably part of the AppKit framework.
    All that cool stuff you got for free in the last chapter? Yep, all AppKit. The
    app we’ll be building in this chapter is all AppKit, too.


    ### The Cocoa Way: Model–View–Controller


    Before diving in and seeing how to use these frameworks, we need to discuss a
    very important bit of theory. The designers of Cocoa were guided by a concept
    called model–view–controller (MVC), which is a very logical way of dividing the
    code that makes up a GUI application. These days, almost all object-oriented application
    frameworks pay a certain amount of homage to MVC, but there are few that are as
    true to the MVC model as Cocoa, or that have been using it as long.


    The MVC model divides up all functionality into the following three distinct categories:


    *   Model: The classes that hold your application’s data.

    *   View: The windows, controls, and other elements that the user can see and
    interact with.

    *   Controller: The part that binds the model and view together and contains the
    application logic that determines how to handle the user’s inputs.


    The goal of MVC is to make the objects that implement these three types of code
    as distinct from one another as possible. Any object you write should be readily
    identifiable as belonging to one of the three categories, with little or no functionality
    within it that could be classified within either of the other two. An object that
    implements a button, for example, shouldn’t contain code to process data when
    that button is clicked, and code that implements a bank account shouldn’t contain
    code to draw a table to display its transactions.


    MVC helps ensure maximum reusability. A class that implements a generic button
    can be used in any application. A class that implements a button that does some
    particular calculation when it is clicked can only be used in the application
    for which it was originally written.


    When you write Cocoa applications, you will primarily create your view components
    using Interface Builder, although you will sometimes also modify your interface
    from code, or you might subclass existing view and control classes to create new
    ones.


    The model will be created using something called Core Data or crafting Objective-C
    classes to hold your application’s data. We won’t be creating any model objects
    in this chapter’s application because we’re not going to store any data yet, but
    we will introduce very simple model objects starting in the next chapter and will
    move on to full-fledged model objects when we start using Core Data in [Chapter
    8](#A978-1-4302-4543-8_8_Chapter.html).


    The controller component will typically comprise classes that we create and that
    are specific to our application. Controllers can be completely custom classes
    (`NSObject` subclasses), which was the traditional way of doing things in Cocoa.
    A few years ago, Apple began to introduce generic controller classes into the
    AppKit framework that handle certain basic tasks for us, such as handling an array
    of objects to be displayed in a list. These can be useful for minimizing boilerplate
    code.


    As we get deeper into Cocoa, you will quickly start to see how the classes of
    the AppKit framework follow the principles of MVC. If you keep this concept in
    the back of your head as you develop, you will create cleaner, more easily maintained
    code.


    ## Outlets, Actions, and Controllers


    Obviously, a user interface isn’t much use if you can’t get data in and out of
    it or change its appearance from code. In Cocoa, we use things called outlets
    and actions to interact with the user interfaces we design in Interface Builder.


    *   Outlets are pointers to objects in our nib file. Outlets allow us to access
    objects in the nib from our code.

    *   Actions are methods that can be executed directly as a result of user interaction,
    such as at the click of a button. They are the way the application objects respond
    to user input, regardless of whether the objects are framework classes or our
    own code.


    Outlets and actions are typically contained in the controller classes (although
    they are sometimes used elsewhere). In this chapter, we’ll be using outlets and
    actions that are exposed by two AppKit classes – `NSSlider` and `NSTextField`
    – to show how it’s done. In the next chapter, we’ll be writing our own.'
  trans: '

    ## 框架，无处不在的框架


    在 Mac OS X 中，Apple 将代码和支持文件分组到名为 `framework` 的特殊文件夹（或包）中。`framework` 类似于大多数平台上使用的库，但它们更灵活，因为是文件夹而非平面文件。`framework`
    可以包含图像、声音和影片，甚至可以包含其他 `framework`。


    尽管 OS X 支持传统的 Unix 库，但操作系统的许多功能以及几乎所有使 OS X 独一无二的功能都包含在这些 `framework` 中。构成核心操作系统的
    `framework` 有数十个，通常按功能分组。


    **提示**：你可以通过查看 `/System/Library/Frameworks` 文件夹来了解构成 Mac OS X 的 `framework`。这些
    `framework` 绝对、永远不应该被触碰，所以只看一眼，然后悄悄退出文件夹，以免被它们“发现”。如果你触碰它们，它们可能会变成讨厌的小东西。你还可以通过查看
    `/Library/Frameworks` 来了解系统中安装的第三方和可选 `framework`。通常，你 Mac 上安装的程序所需的 `framework`
    就位于此处。同样，只看不动，否则可能会搞乱一些重要的东西。事实上，如果你运行的是 Mountain Lion，`/Library` 目录在 Finder 中默认是隐藏的。


    虽然有很多 `framework`，但在 Cocoa 编程中，绝大部分时间你只使用来自少数 `framework` 的对象。实际上，你将使用的大部分对象都来自一个单一的
    `framework`，名为 **Cocoa 框架**（这并不意外）。


    还记得我们说过 `framework` 可以包含其他 `framework` 吗？实际上，Cocoa 框架只是一个包装器，它封装了另外三个 `framework`，这些框架包含了编写
    Cocoa 应用程序时所需的大部分功能：**Foundation 框架**、**AppKit 框架**和 **Core Data 框架**。


    你会定期使用其他 `framework` 的功能。例如，你可能使用 Core Animation 框架为界面添加一些漂亮的动画，或使用 Core Image
    框架进行复杂的图像处理。但绝大多数对象将来自构成 Cocoa 的三个 `framework`。我们将从第 7 章开始讨论 Core Data 框架，但让我们先花点时间简要看看另外两个框架，本章将用到它们。


    ### Foundation 框架


    Foundation 框架名副其实。它包含了几乎所有其他部分赖以构建的对象。Foundation 框架在 Cocoa 和 Cocoa Touch 之间共享。尽管
    Foundation 框架已经进化，但其中许多对象自 NeXTStep 早期就已存在，且基本用法变化不大。Foundation 包含诸如 `NSString`（用于表示
    Cocoa 中文本的类）以及集合类（如 `NSArray` 和 `NSDictionary`）等对象。你从学习 Objective-C 开始就应该已经对 Foundation
    框架有一定了解。


    ### AppKit 框架


    看看你的 Mac 屏幕。你在那里看到的几乎所有内容都是 AppKit 的领域。这个框架包含用于创建或管理用户界面的所有对象。有创建按钮、窗口、文本字段、标签栏等对象。任何你在多个应用程序中见过的用户界面元素，很可能都是
    AppKit 框架的一部分。上一章中你免费获得的所有酷炫功能？是的，全是 AppKit 的功劳。本章我们将构建的应用程序，也完全基于 AppKit。


    ### Cocoa 之道：模型-视图-控制器


    在深入探讨如何使用这些框架之前，我们需要讨论一个非常重要的理论。Cocoa 的设计者遵循一个名为**模型-视图-控制器 (MVC)** 的概念，这是一种非常合理的方式来划分构成
    GUI 应用程序的代码。如今，几乎所有面向对象的应用程序框架都或多或少地向 MVC 致敬，但很少有像 Cocoa 这样忠于 MVC 模型，或使用它如此之久的。


    MVC 模型将所有功能划分为以下三个不同的类别：


    *   **模型**：持有应用程序数据的类。

    *   **视图**：用户可以看到并与之交互的窗口、控件和其他元素。

    *   **控制器**：将模型和视图绑定在一起，包含决定如何处理用户输入的应用程序逻辑的部分。


    MVC 的目标是使实现这三类代码的对象尽可能彼此区分开来。你编写的任何对象都应能明确识别为属于三个类别之一，并且其中几乎没有或完全没有可归类于其他两个类别的功能。例如，实现按钮的对象不应包含处理按钮点击时数据的代码，而实现银行账户的代码不应包含绘制表格以显示其交易的代码。


    MVC 有助于确保最大的可复用性。一个实现通用按钮的类可以在任何应用中使用。而一个实现特定计算按钮的类，只能在最初编写它的应用中使用。


    当你编写 Cocoa 应用程序时，你将主要使用 Interface Builder 创建视图组件，但有时也会通过代码修改界面，或者你可能子类化现有的视图和控件类来创建新的。


    模型将通过使用 Core Data 或设计 Objective-C 类来持有应用程序数据。在本章的应用程序中，我们不会创建任何模型对象，因为我们还不打算存储数据，但我们将在下一章介绍非常简单的模型对象，并在第
    8 章开始使用 Core Data 时，转向完整的模型对象。


    控制器组件通常由我们创建的、特定于应用程序的类组成。控制器可以是完全自定义的类（`NSObject` 子类），这是 Cocoa 中的传统做法。几年前，Apple
    开始向 AppKit 框架中引入通用控制器类，这些类为我们处理某些基本任务，例如处理要在列表中显示的对象数组。这对于最小化样板代码非常有用。


    随着我们深入了解 Cocoa，你会很快开始看到 AppKit 框架的类如何遵循 MVC 原则。如果在开发时把这一概念牢记在心，你将创建出更清晰、更易于维护的代码。


    ## Outlets、Actions 和控制器


    显然，如果无法从代码中获取数据、输出数据或更改其外观，用户界面就没多大用处。在 Cocoa 中，我们使用 `outlet` 和 `action` 来与我们在
    Interface Builder 中设计的用户界面进行交互。


    *   **`Outlets`**：指向 nib 文件中对象的指针。`Outlets` 允许我们从代码访问 nib 中的对象。

    *   **`Actions`**：可以直接作为用户交互结果（例如点击按钮）执行的方法。它们是应用程序对象响应用户输入的方式，无论这些对象是框架类还是我们自己的代码。


    `Outlets` 和 `Actions` 通常包含在控制器类中（尽管有时也在其他地方使用）。在本章中，我们将使用 AppKit 的两个类（`NSSlider`
    和 `NSTextField`）暴露的 `outlet` 和 `action` 来演示如何操作。在下一章中，我们将编写自己的 `outlet` 和 `action`。

    '
- fmt: '### Outlets


    Outlets are Objective-C instance variables that are declared using a special keyword:
    `IBOutlet`. An outlet is really nothing more than an object pointer that can be
    linked to an object in the user interface. Since Cocoa objects are Objective-C
    objects, they have instance variables and methods. The `IBOutlet` keyword indicates
    to Xcode’s Interface Builder which instance variables are meant for use in constructing
    the user interface.


    ### Actions


    Actions are Objective-C methods that can be invoked directly from the application’s
    user interface. They are methods, just like any other Objective-C methods we’ve
    written, but they get executed when a user-interface item is utilized. If we link
    a button to an action method, for example, the code in our action method will
    fire any time that button is clicked. If we link a text field to an action, its
    action method will fire any time the user tabs out of that text field or otherwise
    moves to another control. Exactly what will cause the method to fire depends on
    the type of object that is linked to it and, sometimes, how the attributes of
    that object are set. A slider, for example, may cause our action method to fire
    once after the user releases the mouse button, or it may repeatedly cause our
    method to fire as the slider is used, depending on how we set up the slider instance
    in Interface Builder. We’ll be trying out both of these modes of operation in
    this chapter.


    Actions are created in exactly the same way as other Objective-C methods, except
    that they must be declared using a special return type: `IBAction`. Actions must
    take a single argument (typically declared as type `id`). This argument is used
    to tell the method which interface item is calling it.


    ## Outlets and Actions in Action


    That’s enough theory; let’s get our hands dirty by writing another Cocoa application.
    Setting up the new project will follow the same sequence of events as in the previous
    chapter, so this should feel familiar. If you’re not still in Xcode, open it back
    up. Now, press ⇧⌘N or select New Project from the File menu. Select the Cocoa
    Application template again. Make sure the checkboxes for Core Data and Document-Based
    Application are turned off, the checkbox for Use Automatic Reference Counting
    is turned on, and when prompted for a project name, enter “Chapter3” (see Figure
    [3-1](#A978-1-4302-4543-8_3_Chapter.html#Fig1)). For this example, we’re using
    “Book” as the class prefix setting.


    ![A978-1-4302-4543-8_3_Fig1_HTML.jpg](A978-1-4302-4543-8_3_Fig1_HTML.jpg)


    Figure 3-1.


    Setting initial properties for a new Cocoa application in Xcode


    Xcode will generate an application delegate class for you, called `BookAppDelegate`,
    as well as a `MainMenu.xib` file, and will land you in the Project Settings view
    (Figure [3-2](#A978-1-4302-4543-8_3_Chapter.html#Fig2)).


    ![A978-1-4302-4543-8_3_Fig2_HTML.jpg](A978-1-4302-4543-8_3_Fig2_HTML.jpg)


    Figure 3-2.


    Configuring project settings


    All of our work will take place in the `MainMenu.xib` file, so single-click it
    in the Navigator area in the left side of the window, and it should open up in
    Interface Builder mode (Figure [3-3](#A978-1-4302-4543-8_3_Chapter.html#Fig3)).
    If we double-click, it will open up in a new window, which isn’t what we want
    now. If that happens, close it and single-click `MainMenu.xib` again.


    ![A978-1-4302-4543-8_3_Fig3_HTML.jpg](A978-1-4302-4543-8_3_Fig3_HTML.jpg)


    Figure 3-3.


    Interface Builder mode in Xcode


    Single-click the Main Window icon on the left side of the Interface Builder Editor
    pane. This opens up an empty window already named Chapter3. Since the Navigator
    area is unnecessary for this chapter, hide it by clicking the leftmost icon in
    the group labeled View. This provides some more screen real estate in which to
    work—and a bit less clutter. We can always unhide it by clicking the leftmost
    icon in the View section of the toolbar.


    We’re going to be focusing on the Utility area on the right. To start with, look
    at the Object Library pane at the bottom of the right side of the Xcode window.
    Scroll through the list of objects to find Label; it should be about a dozen objects
    down from the top of the list. Click Label in the Object Library and then drag
    it out to the upper left-hand corner of the window. When we get close to the upper
    left-hand corner, the blue guidelines will appear and the label should snap into
    place when we let go of the mouse button (Figure [3-4](#A978-1-4302-4543-8_3_Chapter.html#Fig4)).


    ![A978-1-4302-4543-8_3_Fig4_HTML.jpg](A978-1-4302-4543-8_3_Fig4_HTML.jpg)


    Figure 3-4.


    Adding a label to the [Chapter 3](#A978-1-4302-4543-8_3_Chapter.html) window


    Change the Inspector pane to show the Attributes Inspector by pressing ⌥⌘4 or
    by clicking the appropriate button at the top of the Utility area. Then, double-click
    the label that we just dragged, and it should become editable. Change the label’s
    text to read “The Magic Number is:” (Figure [3-5](#A978-1-4302-4543-8_3_Chapter.html#Fig5)).


    ![A978-1-4302-4543-8_3_Fig5_HTML.jpg](A978-1-4302-4543-8_3_Fig5_HTML.jpg)


    Figure 3-5.


    Editing the label’s text'
