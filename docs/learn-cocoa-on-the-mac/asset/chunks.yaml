    将对象的地址赋给新变量后，使用 `po` 命令即可查看新变量的地址及其内容（即它所指向的对象）。从现在开始，我们可以将那个内部错误简称为 `$inner`，就像这样：


    ```

    (lldb) po [$inner domain]

    $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain

    (lldb) p (int)[$inner code]

    (int) $10 = 2

    (lldb) po [$inner userInfo]

    $11 = 0x00000001001039d0 {

    }

    (lldb) po [$inner localizedDescription]

    $12 = 0x000000010011d2c0 操作无法完成。没有这样的文件或目录。

    ```


    这又给我们带来了一个谜题。当我们查看底层错误时，它根本没有任何 `userInfo` 字典，却仍然提供了一个人类可读的 `localizedDescription`，而仅仅查看
    domain 和 code 似乎并不能直接看出这个描述。事实上，我们可以像这样创建自己的内部错误和外部错误：


    ```

    NSError *innerError = [NSError errorWithDomain:NSPOSIXErrorDomain

    code:2 userInfo:nil];

    NSDictionary *outerInfo = @{NSUnderlyingErrorKey: innerError,

    NSFilePathErrorKey: @"/tmpfoo"};

    NSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain

    code:260 userInfo:outerInfo];

    ```


    这些错误的行为将与 `NSFileManager` 生成的错误完全一致，包括显示我们并未在任何地方指定的人类可读文本！事实证明，这种神奇能力的源头似乎是 `NSError`
    类本身。它显然内置了足够多的关于 Cocoa 错误域和错误代码的特定知识，能够为程序可能遇到的许多错误生成有意义的描述语句。这意味着，通常情况下，Cocoa
    方法调用提供给我们的错误无需额外美化，就可以直接展示给用户。


    ### 呈现错误


    既然说到这个，我们该如何向用户展示错误呢？在这里，我们一直通过调用 `[NSApp presentError:e]` 来让应用程序显示一个模态窗口，但还有一些其他选择。实际上，`presentError:`
    方法是在 `NSResponder`、`NSDocument` 和 `NSDocumentController` 中实现的，这意味着无论何时发生错误，我们都可以将其传递给最近或最相关的对象，然后它就会沿着责任链向上传递（类似于响应者链），直到某个对象实际显示该错误。这为以不同方式显示错误信息（例如使用文档模态的弹出式警告）提供了可能性。


    ## 总结


    现在我们已经了解了 Cocoa 应用处理各种不良情况的主要方式、如何避免一些常见错误，以及如何使用 lldb 来帮助排查问题。我们还了解了方法如何利用 `NSError`
    实例以可控的方式处理问题。在我们深入探究 Cocoa 编程的过程中，这些知识都将派上用场。


    # 14. Cocoa 中的绘图


    ## 摘要


    到目前为止，我们已经学习了许多强大的 Cocoa 技术，用于处理数据、优化应用程序类的组织，以及使用 Cocoa 附带的丰富的屏幕控件和其他视图。现在，是时候开始学习如何利用
    Cocoa 创建我们自己的视图类，从而完全掌控文本和图形的显示了。Mac 应用通常以其“视觉吸引力”而闻名——这不仅体现在绘制不必要的图形装饰上，更在于为用户创造更具沉浸感的交互体验。作为
    Cocoa 程序员，我们可以利用图形技术，以令人惊讶的少量工作实现一些类似的效果。


    Core Graphics 提供了丰富的功能，用于渲染路径、操控坐标系统等等。Core Graphics 的一个主要部分是被称为 Quartz 的一组 API。事实上，Quartz
    在 Core Graphics 中占据了如此大的比重，以至于这两个术语有时会被混用。Core Animation 则更进一步，让我们能以极其简单的方式对视图进行动画处理。


    本章将涵盖坐标系统和在 `NSView` 实例中绘图的一些基础知识，并演示如何将视图放入滚动视图中，以显示比窗口可用空间更大的视图。此外，还会简要介绍如何轻松地为我们的应用添加基本的打印支持。


    ## 基础


    在本节中，我们将介绍 Cocoa 绘图 API 中使用的一些基本概念。如果你做过任何形式的图形编程，那么对 Cocoa 中可用的绘图方式可能会相当熟悉。毕竟，计算机图形学的大多数基本概念在几十年前就已经定型了。Cocoa
    的突出之处在于其渲染质量（包括文本和图形基元的抗锯齿处理），以及为更复杂的概念提供的高层级抽象。


    在本章中，我们将统一使用“点（point）”而非“像素（pixel）”。Cocoa 中的绘图通常是基于矢量且与分辨率无关的。随着高像素密度显示屏（也称为 HiDPI
    或 Retina 显示屏）的出现，绘图模型中的一个点实际上可能由屏幕上的一个或四个像素表示。最好的做法是，尽可能让底层操作系统自行处理从绘图基元到实际像素的转换。这样一来，图形在高分辨率显示屏上也能自动呈现出色效果。如果你处理的是与像素相关的代码，那就不那么容易了，你需要关注点和像素之间的区别，以及如何适当地缩放位图。不过，就目前而言，我们只讨论“点”。


    ### 视图坐标系统


    Cocoa 的绘图系统采用 x-y 坐标系统，在默认情况下，原点 (0,0) 位于左下角，x 轴指向右方（数值增大，位置向右移动），y 轴指向上方（数值增大，位置在屏幕上向上移动）。这与数学中传统的作图方式类似，但与许多其他
    y 轴指向下方（数值增大，位置在屏幕上下移）的计算机图形系统相反。虽然在 Cocoa 中翻转 y 轴是可行且有时是必要的，但在我们的示例中不会这样做。


    绘图通常由 `NSView` 子类的实例完成。视图存在于一个层级结构中。如果层级中的最顶层视图被设置为某个 `NSWindow` 的 `contentView`，那么该层级中的所有视图都会在该窗口内显示。窗口中的顶层视图（即
    `contentView`）可以在整个窗口区域进行绘制。对于层级中的其他所有视图，绘图区域被限制在其 frame（框架）内，即其父视图坐标空间中的一个区域（见图
    14-1）。


    ![A978-1-4302-4543-8_14_Fig1_HTML.jpg](img/A978-1-4302-4543-8_14_Fig1_HTML.jpg)


    **图 14-1.** 一个简单的视图层级结构。窗口的 `contentView` 包含一个 `NSBox`，该 `NSBox` 又包含一个包含单选按钮的
    `NSMatrix`

