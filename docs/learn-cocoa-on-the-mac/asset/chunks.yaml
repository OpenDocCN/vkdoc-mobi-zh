  trans: '

    # 我们遗漏了什么


    前几章的所有示例中，我们都使用 `NSMutableDictionary` 的实例来代替真实的模型对象。所谓"真实模型对象"是什么意思呢？除了能够承载可通过字段名或键访问的数据（这点
    `NSMutableDictionary` 已经做得足够好）之外，真实的模型对象还应包含以下特性：


    ![A978-1-4302-4543-8_8_Fig1_HTML.jpg](img/A978-1-4302-4543-8_8_Fig1_HTML.jpg)


    图 8-1. 光彩夺目的 MythBase 应用


    - **归档（Archiving）**：模型对象应具备内置的磁盘存储与重新加载机制。

    - **业务逻辑（Business Logic）**：应能为模型对象提供针对输入值进行响应的自定义行为。

    - **验证（Validation）**：每个模型对象应能自动验证输入值。


    过去，遵循 MVC 原则的 Mac 应用开发者通常需要针对这些常见需求自行开发解决方案，但 Core Data 不仅提供了所有这些功能，还有更多。除了上述特性，Core
    Data 还提供了以下关键功能：


    - **撤销/重做支持（Undo/Redo Support）**：Core Data 的值处理机制与 Mac OS X 的标准撤销功能相集成。将这一能力内置到模型类中，能省去我们自行实现这一通用功能的工作量。

    - **与 Cocoa 绑定集成（Integration with Cocoa Bindings）**：结合 Cocoa 绑定，Core Data 通过通用控制器对象提供视图与模型的连接机制，从而消除大量繁琐的胶水代码。

    - **持久化（Persistence）**：Core Data 提供了多种将对象持久化到磁盘的方式，使我们能够跨运行周期保存和加载对象状态。


    综合来看，所有这些特性为应用核心提供了坚实的基础设施。我们可以使用 Core Data 构建 GUI 应用（无论是否使用 Cocoa 绑定）、命令行工具、游戏，或任何能够通过传统对象建模技术定义的软件系统。换言之，几乎适用于任何应用。


    # 创建 MythBase


    现在，让我们开始创建 MythBase——一个用于维护神话人物数据库的 GUI 应用。我们将使用 Core Data 实现模型层，并借助 Cocoa 绑定处理大部分控制器功能。在这个过程中会遇到一些新概念和术语，我们会逐一讲解。


    在第一阶段，我们将使用 Xcode 中的特殊工具为应用定义模型，并利用 Xcode 的辅助工具创建简单 GUI。第二阶段，我们会优化 GUI 以提升用户体验。之后，在解释应用的其他方面后，我们将第三次推进功能开发，为应用模型层添加业务逻辑。


    首先创建新应用项目。在 Xcode 中选择 **File ➤ New Project**，在窗口左侧选择 **OS X/Application**，从项目模板列表中选取
    **Cocoa Application**，然后点击 **Next**。输入 `MythBase` 作为产品名称，`MB` 作为类前缀，勾选 **Use Core
    Data** 和 **Use Automatic Reference Counting** 复选框（见图 8-2），点击 **Next**。导航至合适目录保存项目，点击
    **Create**。


    ![A978-1-4302-4543-8_8_Fig2_HTML.jpg](img/A978-1-4302-4543-8_8_Fig2_HTML.jpg)


    图 8-2. 创建新应用项目并启用 Core Data 选项


    ## 定义模型


    此时我们获得了一个全新的项目，与之前创建的项目类似。选择使用 Core Data 后，Xcode 会使用略微不同的项目模板，因此这个项目会包含一些旧项目中没有的元素。Xcode
    导航面板中新增了名为 `MythBase.xcdatamodeld` 的文件，这是空的 Core Data 模型文件。模型文件包含应用模型层的元数据。我们通过
    Xcode 内置的图形工具创建模型文件，应用在运行时读取该文件。如果深入项目导航区查看，还会发现 `CoreData.framework` 已被添加至 **Frameworks/Other
    Frameworks** 下。


    ### 建模：是什么？


    接下来，我们假设你对对象建模或数据库建模有一定了解。但如果你对此完全困惑，这里有一个非常简短的总结。其核心思想是：应用所处理的"内容"（即应用所涉及的数据）可以被分割成独立模块，并通过建模技术组织成合理结构。使用
    Core Data 时，你需要按以下方式组织数据：


    - **实体（Entities）**：实体用于描述应用中可唯一标识的"事物"，这些事物能独立存在、描述和识别。实体通常是系统中的主要"名词"。人、公司和货币交易都是实体。而眼睛颜色、市值和交易金额则不是。

    - **属性（Attributes）**：任何描述实体特征且不涉及其他实体的内容，通常就是该实体的属性。眼睛颜色、市值和交易金额很可能是前面所述的人、公司和货币交易的属性。而某人的当前账户余额、公司
    CEO 的电话号码、交易接收者的电子邮件地址则不属于我们提到的实体的属性——这些更适合通过遍历与其他实体的关系来访问对应属性。

    - **关系（Relationships）**：使用关系建立实体间的连接。关系可以是一对多（一个人可能是多笔交易的接收者）、多对一（多人可受雇于同一家公司）、一对一（每人只能有一个配偶）或多对多（一家公司可以有多个客户，同时一个人也可以是多家公司的客户）。


    模型文件包含的信息对任何进行过对象建模、数据库建模或实体-关系建模的人来说都不陌生。首先，实体的概念大致对应对象建模中的类或数据库建模中的表。每个实体由多个属性组成，实体间可通过关系连接。在
    Xcode 和文档中，属性和关系统称为属性（properties），这与 Objective-C 2.0 中复用同一术语并非巧合。在模型对象中，每个属性和关系都可以通过同名
    Objective-C 属性（property）访问。在为 MythBase 构建的模型中，我们将创建包含多个属性的单个实体。关系将在第 9 章中讨论。

    '
- fmt: '### Using Xcode’s Model Editor


    Start by single-clicking the `MythBase.xcdatamodeld` file in Xcode’s navigation
    pane. This opens up the model file in Xcode’s built-in model editor, which lists
    three table views: Attributes, Relationships, and Fetched Properties, along with
    an outline view of Entities, Fetch Requests, and Configurations along the left.
    Press ⌥⌘3 to open the Data Model Inspector as well; since we haven’t yet defined
    any structure for our entity, it will initially show “No Selection,” as shown
    in Figure [8-3](#A978-1-4302-4543-8_8_Chapter.html#Fig3). The model editor has
    two different view styles: the initial view with three table views, and one that
    resembles a blank sheet of graph paper. We’ll be working with the default table-view
    style as seen in Figure [8-3](#A978-1-4302-4543-8_8_Chapter.html#Fig3) since we’ll
    only have one model class. When working with a complex model, the graph-paper
    view can be very useful for giving an overview of all the different entities and
    their interrelationships.


    ![A978-1-4302-4543-8_8_Fig3_HTML.jpg](A978-1-4302-4543-8_8_Fig3_HTML.jpg)


    Figure 8-3. A new model file, before creating any entities


    ### Creating an Entity


    For MythBase, we’re going to create a single entity called `MythicalPerson` with
    a handful of attributes. To start, create a new entity by clicking the Add Entity
    button that appears near the bottom of the window. As you would expect, this creates
    a new entity, called simply Entity, in the Entities list on the left. With the
    new entity selected, its details are visible in the table views to the right.
    Go change the new entity’s name to “MythicalPerson,” and leave the rest of the
    controls in their default states. Our entity is an instance of a class named `NSManagedObject`,
    a generic class included in Core Data that provides all the basic functionality
    for Core Data’s model objects. Later we’ll need to write some code for this entity,
    at which point we’ll create a custom subclass of `NSManagedObject`, but for now
    the generic class will do just fine.


    Now let’s create our entity. We’ve done some object modeling and have come up
    with a few characteristics that a mythical person may have.


    The `MythicalPerson` entity will have six attributes. These are shown in Table
    [8-1](#A978-1-4302-4543-8_8_Chapter.html#Tab1), which includes a general description
    of the type of each attribute and the corresponding Core Data storage type.


    **Table 8-1. MythicalPerson Attributes**


    | Attribute Name | General Type | Core Data Type |

    | --- | --- | --- |

    | Name | String | String |

    | Details | String | String |

    | Divinity | Integer (0-100) | Integer 16 |

    | Goodness | Integer (0-100) | Integer 16 |

    | Power | Integer (0-100) | Integer 16 |

    | Depiction | Image | Transformable |


    Core Data includes `String` and `Date` types, as well as a selection of numeric
    types: `Integer 16`, `Integer 32`, `Integer 64`, `Float`, `Double`, `Decimal`,
    and `Bool`. In addition, it includes a `Binary` type that allows generic storage
    of any sort of data we may want to attach to an entity (which we pack into a binary
    chunk on our own), and a special `Transformable` type that allows many otherwise
    unsupported Cocoa classes, such as `NSImage`, to be stored with Core Data (more
    on that later). Note that the Core Data storage types have different names from
    the value classes in Cocoa (`NSString`, `NSNumber`, and the like). When Core Data
    attributes are read into a running application, they are converted into the nearest
    Cocoa equivalent, which means, for example, that all the numeric types end up
    as `NSNumber` in an application and are converted back into the underlying storage
    format for saving.


    ### Creating Attributes


    Let’s start creating `MythicalPerson`’s attributes. With the `MythBase.xcdatamodeld`
    file open in Xcode, click to select the `MythicalPerson` entity, then click the
    small + sign in the lower-left-hand-corner of the Attributes table view at the
    top of the window. A new attribute will appear in the table view. Set its name
    to “name” and its type to String, then press Enter.


    Now look at the checkboxes in the inspector on the right, labeled Optional, Transient,
    and Indexed. By default, Optional is checked and the others are not. The meaning
    of Optional is clear enough. Having it checked means that users can choose to
    not enter a value for that attribute when creating or editing an object. As for
    the others, checking Transient configures things so that this attribute isn’t
    saved along with the other data (although Core Data will still track changes to
    the attribute to provide undo/redo support), while checking Indexed turns on indexing
    for the attribute, enabling speedy search of a Core Data storage back-end based
    on this attribute. For the `name` attribute, make sure that Indexed is checked
    and that the others are not.


    Below the checkboxes, you can specify the attribute’s type using a pop-up list
    (this is the same setting as the pop-up in the table view). If we specify “name”
    as a String in the main table view, then we’ll see some additional options appear
    in the space just below it. Here we can specify simple validation rules such as
    the string’s length. We can also specify the default value, which will appear
    whenever a new `MythicalPerson` instance is created. Enter “Name” for the default
    value, leaving the other fields blank.


    Now let’s move on to the `details` attribute, which is meant to hold a textual
    description of the `MythicalPerson` in question. Click the + button below the
    Attributes table view to add a new attribute and change the new attribute’s name
    to “details.” We’re going to configure this one a little differently than the
    name attribute. It should be a String (chosen from the pop-up list), and the Indexed
    checkbox should be checked, but in this case the Optional checkbox should also
    be checked so that users can choose to leave this field empty if they want. Also,
    we’ll leave the default value blank.


    Now we’ll tackle `MythicalPerson`’s numeric attributes: `divinity`, `goodness`,
    and `power`. Make a new attribute and name it “divinity,” and set its type to
    `Integer 16`, the smallest integer type supported by Core Data. This time configure
    the checkboxes so that it’s optional, but neither transient nor indexed (because
    we don’t anticipate any real need to search for MythicalPersons using the divinity
    value as a search parameter). The display will change to show some additional
    configuration that applies to the chosen type. Here we can set up some automatic
    validation rules by specifying min and max values, and also specifying the default
    value for this attribute.


    In Table [8-1](#A978-1-4302-4543-8_8_Chapter.html#Tab1), we defined divinity as
    an integer value from 0 to 100, the idea being to place the character somewhere
    on a scale between human and godlike. For example, the Greek god Zeus would have
    a divinity value of 100, his son Heracles (whose mother Alcmene was a normal human)
    would have 50, and a normal human (like, again, Heracles’ mother) would have 0
    divinity. By specifying min and max values for the attribute, we let Core Data
    help us out, ensuring that no invalid values for these attributes can be saved.
    Enter 0 for the min value, 100 for the max value, and 50 for the default value.
    See Figure [8-4](#A978-1-4302-4543-8_8_Chapter.html#Fig4) to see some entity/attribute
    editing in progress.


    ![A978-1-4302-4543-8_8_Fig4_HTML.jpg](A978-1-4302-4543-8_8_Fig4_HTML.jpg)


    Figure 8-4. This is what editing an entity in a Core Data model file looks like'
