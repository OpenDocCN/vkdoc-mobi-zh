  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。



    对于“描绘”字段，我们需要获取一个 `NSImage` 供图片井显示。Core Data 并不知道 `NSImage`，但这不成问题。还记得之前关于转换器和
    Core Data 使用的可转换类型的讨论吗？因为“描绘”是一个可转换属性，它的值需要在我们在 GUI 中看到的内容（一个 `NSImage`）和 Core
    Data 能够存储的内容（`NSData`）之间进行转换。我们将通过向此控件的 Cocoa 绑定配置添加 `NSKeyedUnarchiveFromData`
    来实现这一点。选中图片井，并打开绑定检查器。与其他字段一样，展开“值”部分。勾选“绑定到”复选框，确保“控制器键”显示为“selection”，并将“模型键路径”设置为“depiction”。要完成从
    `NSData` 到 `NSImage` 的转换，请点击“值转换器”弹出列表，然后选择 `NSKeyedUnarchiveFromData`。


    ## 为表格视图配置绑定


    现在是时候为表格视图进行绑定了。为基于视图的表格视图设置 Cocoa 绑定是一个两步过程。首先，我们必须为表格视图本身设置一个绑定。接下来，我们将为行中的每个视图设置绑定。表格视图通过一些魔法来为其子视图公开一个绑定源，该绑定源名为“Table
    Cell View”。在该绑定中，有一个模型键路径“objectValue”，它代表该行的对象。


    开始，选中表格视图本身。最简单的方法是从左侧的对象停靠区中选择。在绑定检查器中，展开“内容”部分，勾选“绑定到”复选框，确保下拉菜单显示“Mythical
    Person Array Controller”，并且“控制器键”显示“arrangedObjects”。对于表格视图本身，我们没有“模型键路径”设置。我们还希望表格视图中选中的行能够传回数组控制器。为此，展开绑定检查器的“选择索引”部分。在此处勾选“绑定到”复选框，将下拉菜单设置为“Mythical
    Person Array Controller”，并将“控制器键”设置为“selectionIndexes”。您的绑定应该像图 8-10 所示。


    ![A978-1-4302-4543-8_8_Fig10_HTML.jpg](img/A978-1-4302-4543-8_8_Fig10_HTML.jpg)


    图 8-10. 为表格视图设置绑定


    表格中有五列：名称、神性、力量、善良和描绘。我们不直接在列上设置绑定；相反，我们将为每列中包含的视图设置绑定。对于前四列，视图是包含在 `NSTableCellView`
    内的 `NSTextField`。对于描绘列，视图是包含在 `NSTableCellView` 内的 `NSImageWell`。不幸的是，Xcode 将
    `NSTableCellView` 中包含的文本字段的默认值设置为“Table View Cell”，这似乎是为了制造混乱而设计的。尽管有默认文本，但表格视图中的视图是
    `NSTableCellView` 的实例。文本字段和图片井将绑定到表格单元格视图的 objectValue 属性。


    我们从名称列开始。选中名称列中的“Table View Cell”，如果您在 UI 本身中单击，可能需要单击两次，或者通过展开左侧对象停靠区中的“Table
    Column - Name”条目并深入到其中的“Static Text - Table View Cell”条目来选择。在绑定检查器中，展开“值”部分。勾选“绑定到”复选框，确保下拉菜单显示“Table
    Cell View”，并将“模型键路径”设置为“objectValue.name”。“控制器键”应为空。


    神性、力量和善良的绑定将类似。依次选中每一列，并深入到其中的“Static Text”字段。像我们为名称列所做的那样设置值绑定：打开“值”部分，勾选“绑定到”复选框，确保下拉菜单显示“Table
    Cell View”，并根据需要将“模型键路径”设置为“objectValue.divinity”、“objectValue.power”或“objectValue.goodness”。


    现在来处理描绘列。选中描绘列中“Table Cell View”内的图片井。在绑定检查器中，打开“值”部分。和之前一样，勾选“绑定到”复选框，确保下拉菜单显示“Table
    Cell View”。将“模型键路径”设置为“objectValue.depiction”。就像我们上面处理描绘视图那样，点击“值转换器”弹出列表，选择 `NSKeyedUnarchiveFromData`，如图
    8-11 所示。表格视图设置完毕！


    ![A978-1-4302-4543-8_8_Fig11_HTML.jpg](img/A978-1-4302-4543-8_8_Fig11_HTML.jpg)


    图 8-11. 为描绘列设置绑定


    对于表格视图下方和左侧显示匹配数量的文本字段，我们将使用一种不同的绑定方法，该方法允许我们使用格式字符串来构建文本字段的内容。在这种情况下，我们将使用“显示模式值
    1”而不是“值”。展开“显示模式值 1”部分，勾选“绑定到”复选框，并像之前一样将下拉菜单设置为“Mythical Person Array Controller”。输入“selection”作为“控制器键”。这次，我们将使用一个不同的键路径。将“模型键路径”设置为“@count”，并将“显示模式”设置为“%{value1}@
    out of %{value2}@。”现在，在“显示模式值 1”下方出现了另一个可用的绑定，标题为“显示模式值 2”。展开“显示模式值 2”部分，勾选“绑定到”复选框，并像之前一样将下拉菜单设置为“Mythical
    Person Array Controller”。这次，输入“@count”作为“模型键路径”，并输入“arrangedObjects”作为“控制器键”，而不是“selection”。“显示模式”将自动填充我们在“显示模式值
    1”绑定中输入的值。


    现在，我们需要连接“获取”、“删除”和“添加”按钮。为此，我们将结合使用目标-动作连接来响应单击，以及使用 Cocoa 绑定来根据需要启用或禁用按钮。让我们从目标-动作连接开始。选中“获取”按钮，并按住
    Control 键拖出一条连接到“Mythical Person Array Controller”。数组控制器将位于对象停靠区中对象列表的底部；如果您看不到它，请将鼠标悬停在对象停靠区的底部，它会向下滚动以显示数组控制器。选择
    `fetch:` 动作。对“删除”和“添加”按钮执行相同操作，分别选择 `remove:` 和 `add:` 动作。


    接下来，我们将为“添加”和“删除”按钮的“已启用”属性建立绑定。选中“添加”按钮并打开绑定检查器。展开“可用性”下显示的“已启用”部分。你能猜到下一步是什么吗？没错；勾选“绑定到”复选框，确保下拉菜单显示“Mythical
    Person Array Controller”。不过这一次，将“控制器键”字段更改为“canAdd”。当您开始在“控制器键”字段中键入时，将出现一个可能履行的列表。对“删除”按钮执行相同操作，将“控制器键”更改为“canRemove”。


    我们已经构建了足够多的 UI，在继续之前应该测试一下。让我们试试看。保存 nib 文件，然后点击“运行”。您应该可以点击“添加”按钮并在表格视图中得到空行。您还应该可以编辑名称和移动滑块，并且这些更改会反映在表格视图的当前选中行中。如果不是这样，请检查
    nib 文件中的绑定和连接，看它们是否与说明匹配。

    '
- fmt: '### Finishing the Bindings: Save and Search


    Our application should be able to handle multiple records and allow creating and
    removing of mythical people. But we can’t save or search it, which makes it a
    pretty poor database. Let’s fix that now.


    Saving is easy. The Application Delegate class generated by `Xcode` manages that
    for us; we just need to tell it when to do so. In the Main Menu, there’s a File
    menu with a Save menu item. The Save menu item comes pre-bound to the `⌘S` key
    equivalent. We’ll use this for our app as well. In the Object Dock in Interface
    Builder, expand the Main Menu object, then expand the File menu and then the Menu
    Item – Save item. Note that we’re talking about objects in the Object Dock, not
    `Xcode`’s own menu! Control-drag a connection to the App Delegate in the Object
    Dock, and select the `saveAction` `:` action from the list. Done!


    Search isn’t quite as straightforward, and there’s a bit of terminology to cover
    first. Core Data search support is based on predicates. A predicate is made up
    of an attribute name, an operator, and a search value; and a search field can
    support many predicates. Two examples of predicates are `name contains Heracles`
    or `goodness greater than 75`. If you’re familiar with SQL, the `WHERE` clause
    of a SQL command is built up of predicates. For `MythBase`, all of the attributes
    of the `MythicalPerson` entity should be searchable with the exception of depiction,
    so we’ll need to define several predicates. We can’t search depiction, as binary
    and transformable attribute are inherently not searchable. The predicates can
    be defined in the Bindings Inspector, and that’s where we’re heading to next.


    We’ll start by defining a predicate to search on the `name` attribute. Select
    the Search field at the upper right corner of the screen, and open the Bindings
    Inspector. Near the bottom of the Bindings Inspector is a section titled Predicate.
    Open it up and check the Bind to checkbox, binding it to Mythical Person Array
    Controller. The Controller Key should say “`filterPredicate`”. Set the Display
    Name to “Name,” and the predicate format to “`name contains[c] $value`” where
    `$value` indicates the contents of the search box, and `name` indicates the `MythicalPerson`
    entity attribute that should be searched. The operator, `contains[c]`, indicates
    that we want to return any records where the `name` attribute contains the value
    represented in `$value`, using a case insensitive search—that’s what the `[c]`
    at the end means. Without the `[c]`, the search is case-sensitive.


    Note that a new binding has been created titled `Predicate2`. We’ll use that one
    to define a predicate to search on all the searchable fields in the entity. Open
    up `Predicate2` and, just like the first one, check the Bind to checkbox, binding
    it to Mythical Person Array Controller. The Controller Key should say “`filterPredicate`.”
    For `Predicate2`, set the Display Name to “All,” and the predicate format to the
    following mouthful: “`(name contains $value) or (divinity.description contains
    $value) or (power.description contains $value) or (goodness.description contains
    $value) or (details contains[c] $value)`.” Note that there’s now a new binding
    available called `Predicate3`.


    We’ve shown how to search on one attribute or many. If you’d like to be able to
    search on other specific fields, such as `name` or `details`, feel free to add
    more predicates by following the same pattern as described above, changing the
    field name in the predicate format value as appropriate. There are many more possibilities
    for constructing search predicates than we’ve discussed here, and Apple offers
    a Predicate Programming Guide section in the Xcode documentation that covers it
    in detail.


    Well, with all that behind us, it’s time to run the app. Press the Run button
    in the upper-left-hand corner of the Xcode window, and you should be able to create
    some Mythical Person records, drag an image into the large image well to show
    a picture, use the File ➤ Save menu item to save the records, and search the database.
    The question mark icon on the left edge of the search field should let you select
    which search predicate is operative. When you quit and rerun the app, the records
    should be preserved and reloaded on launch.


    We’ve now made a pretty cool-looking app entirely by defining a model and building
    a GUI. Notably, we haven’t written any code! This is a great example of the kind
    of visual programming model that Cocoa has always enabled, and with the addition
    of Cocoa bindings and Core Data in the past few years it’s become even more complete.
    Of course, underlying all this stuff are frameworks and APIs that enable all this
    “magic” to happen in Xcode, and there are times when you will want or need to
    access Core Data functionality from code. The rest of this chapter will introduce
    some aspects of programming (in the traditional, code-based sense) with Core Data,
    starting with a tour of the generated code in the Application Delegate class.


    ## Exploring the Template Code


    When we created the `MythBase` project, an application delegate class called `MBAppDelegate`
    was created for us. This class contains code to load the model information from
    the Core Data model files contained within our application. It also opens up the
    on-disk storage where Core Data reads and writes its model objects, or creates
    this storage if it doesn’t already exist. And finally, it provides access to the
    data storage via an `NSManagedObjectContext`, which other objects can in turn
    bind to (such as the array controller in our nib file) in order to read from and
    write to storage.


    All the code shown here has been reformatted to better fit the format of this
    book, so your version may look slightly different, but it should be syntactically
    identical.'
  raw: '### Finishing the Bindings: Save and Search


    Our application should be able to handle multiple records and allow creating and
    removing of mythical people. But we can’t save or search it, which makes it a
    pretty poor database. Let’s fix that now.


    Saving is easy. The Application Delegate class generated by Xcode manages that
    for us; we just need to tell it when to do so. In the Main Menu, there’s a File
    menu with a Save menu item. The Save menu item comes pre-bound to the ⌘S key equivalent.
    We’ll use this for our app as well. In the Object Dock in Interface Builder, expand
    the Main Menu object, then expand the File menu and then the Menu Item – Save
    item.  Note that we’re talking about objects in the Object Dock, not Xcode’s own
    menu! Control-drag a connection to the App Delegate in the Object Dock, and select
    the `saveAction` `:` action from the list. Done!


    Search isn’t quite as straightforward, and there’s a bit of terminology to cover
    first. Core Data search support is based on predicates. A predicate is made up
    of an attribute name, an operator, and a search value; and a search field can
    support many predicates. Two examples of predicates are `name contains Heracles`
    or `goodness greater than 75`. If you’re familiar with SQL, the `WHERE` clause
    of a SQL command is built up of predicates. For MythBase, all of the attributes
    of the MythicalPerson entity should be searchable with the exception of depiction,
    so we’ll need to define several predicates. We can’t search depiction, as binary
    and transformable attribute are inherently not searchable. The predicates can
    be defined in the Bindings Inspector, and that’s where we’re heading to next.


    We’ll start by defining a predicate to search on the name attribute. Select the
    Search field at the upper right corner of the screen, and open the Bindings Inspector.
    Near the bottom of the Bindings Inspector is a section titled Predicate. Open
    it up and check the Bind to checkbox, binding it to Mythical Person Array Controller.
    The Controller Key should say “filterPredicate”. Set the Display Name to “Name,”
    and the predicate format to “name contains[c] $value” where $value indicates the
    contents of the search box, and name indicates the MythicalPerson entity attribute
    that should be searched. The operator, contains[c], indicates that we want to
    return any records where the name attribute contains the value represented in
    $value, using a case insensitive search—that’s what the [c] at the end means.
    Without the [c], the search is case-sensitive.


    Note that a new binding has been created titled Predicate2\. We’ll use that one
    to define a predicate to search on all the searchable fields in the entity. Open
    up Predicate2 and, just like the first one, check the Bind to checkbox, binding
    it to Mythical Person Array Controller. The Controller Key should say “filterPredicate.”
    For Predicate2, set the Display Name to “All,” and the predicate format to the
    following mouthful: “(name contains $value) or (divinity.description contains
    $value) or (power.description contains $value) or (goodness.description contains
    $value) or (details contains[c] $value).” Note that there’s now a new binding
    available called Predicate3.


    We’ve shown how to search on one attribute or many. If you’d like to be able to
    search on other specific fields, such as name or details, feel free to add more
    predicates by following the same pattern as described above, changing the field
    name in the predicate format value as appropriate. There are many more possibilities
    for constructing search predicates than we’ve discussed here, and Apple offers
    a Predicate Programming Guide section in the Xcode documentation that covers it
    in detail.


    Well, with all that behind us, it’s time to run the app. Press the Run button
    in the upper-left-hand corner of the Xcode window, and you should be able to create
    some Mythical Person records, drag an image into the large image well to show
    a picture, use the File ➤ Save menu item to save the records, and search the database.
    The question mark icon on the left edge of the search field should let you select
    which search predicate is operative. When you quit and rerun the app, the records
    should be preserved and reloaded on launch.


    We’ve now made a pretty cool-looking app entirely by defining a model and building
    a GUI. Notably, we haven’t written any code! This is a great example of the kind
    of visual programming model that Cocoa has always enabled, and with the addition
    of Cocoa bindings and Core Data in the past few years it’s become even more complete.
    Of course, underlying all this stuff are frameworks and APIs that enable all this
    “magic” to happen in Xcode, and there are times when you will want or need to
    access Core Data functionality from code. The rest of this chapter will introduce
    some aspects of programming (in the traditional, code-based sense) with Core Data,
    starting with a tour of the generated code in the Application Delegate class.


    ## Exploring the Template Code


    When we created the MythBase project, an application delegate class called `MBAppDelegate`
    was created for us. This class contains code to load the model information from
    the Core Data model files contained within our application. It also opens up the
    on-disk storage where Core Data reads and writes its model objects, or creates
    this storage if it doesn’t already exist. And finally, it provides access to the
    data storage via an `NSManagedObjectContext`, which other objects can in turn
    bind to (such as the array controller in our nib file) in order to read from and
    write to storage.


    All the code shown here has been reformatted to better fit the format of this
    book, so your version may look slightly different, but it should be syntactically
    identical.'
  trans: '

    ### 完成绑定：保存与搜索


    我们的应用应该能够处理多条记录，并允许创建和删除神话人物。但目前无法保存或搜索，这使其成为一个相当糟糕的数据库。现在就来解决这个问题。


    保存很简单。由 `Xcode` 生成的**应用程序委托类**替我们管理保存操作；我们只需告诉它何时执行即可。在主菜单中，有一个“文件”菜单，其中包含“保存”菜单项。“保存”菜单项已预先绑定到
    `⌘S` 快捷键。我们也将在此应用中使用它。在 Interface Builder 的**对象停靠区**中，展开“主菜单”对象，然后展开“文件”菜单，再展开“菜单项
    – 保存”项。请注意，我们讨论的是对象停靠区中的对象，而不是 `Xcode` 自身的菜单！按住 Control 键从该对象拖出一条连接线，连接到对象停靠区中的“App
    委托”，然后从列表中选择 `saveAction` `:` 操作。搞定！


    搜索就不那么直接了，首先需要了解一些术语。Core Data 的搜索支持基于**谓词**。一个谓词由属性名称、运算符和搜索值组成；一个搜索字段可以支持多个谓词。谓词的两个例子是
    `name contains Heracles` 或 `goodness greater than 75`。如果你熟悉 SQL，SQL 命令中的 `WHERE`
    子句就是由谓词构成的。对于 `MythBase` 来说，`MythicalPerson` 实体的所有属性除了“描绘”字段外都应可搜索，因此我们需要定义多个谓词。我们不能搜索“描绘”字段，因为二进制属性和可转换属性本质上不可搜索。谓词可以在**绑定检查器**中定义，这也是我们接下来要操作的地方。


    我们将从定义一个搜索 `name` 属性的谓词开始。选择屏幕右上角的搜索字段，打开绑定检查器。在绑定检查器的底部附近有一个名为“谓词”的部分。展开它，勾选“绑定到”复选框，将其绑定到“Mythical
    Person Array Controller”。控制器键应设置为“`filterPredicate`”。将显示名称设置为“名称”，谓词格式设置为“`name
    contains[c] $value`”，其中 `$value` 表示搜索框的内容，`name` 表示要搜索的 `MythicalPerson` 实体属性。运算符
    `contains[c]` 表示我们希望返回 `name` 属性包含 `$value` 所表示值的所有记录，并采用**不区分大小写**的搜索——这就是末尾
    `[c]` 的含义。如果没有 `[c]`，搜索将区分大小写。


    请注意，已经创建了一个名为 `Predicate2` 的新绑定。我们将使用它来定义一个谓词，以搜索实体中所有可搜索的字段。展开 `Predicate2`，与第一个一样，勾选“绑定到”复选框，绑定到“Mythical
    Person Array Controller”。控制器键应设置为“`filterPredicate`”。对于 `Predicate2`，将显示名称设置为“全部”，谓词格式设置为以下较长的一串：“`(name
    contains $value) or (divinity.description contains $value) or (power.description
    contains $value) or (goodness.description contains $value) or (details contains[c]
    $value)`”。请注意，现在又多了一个名为 `Predicate3` 的新绑定可用。


    我们已经展示了如何搜索单个或多个属性。如果你希望能够搜索其他特定字段，例如 `name` 或 `details`，只需按照上述相同模式添加更多谓词，并适当更改谓词格式值中的字段名称即可。构建搜索谓词的可能性远超我们在此讨论的内容，苹果在
    Xcode 文档中提供了“谓词编程指南”部分，对其进行了详细说明。


    好了，完成所有这些设置后，是时候运行应用了。按下 Xcode 窗口左上角的“运行”按钮，你应该能够创建一些神话人物记录，将图像拖入大的图像框以显示图片，使用“文件
    ➤ 保存”菜单项保存记录，并搜索数据库。搜索字段左侧的问号图标应允许你选择哪个搜索谓词生效。当你退出并重新运行应用时，记录应被保留并在启动时重新加载。


    现在，我们仅通过定义模型和构建 GUI 就制作了一个非常酷的应用。值得注意的是，我们**没有编写任何代码**！这是 Cocoa 一直支持的可视化编程模式的一个绝佳示例，并且随着过去几年
    Cocoa 绑定和 Core Data 的加入，这种模式变得更加完善。当然，所有这些功能背后，是使得在 Xcode 中实现这些“魔法”成为可能的框架和 API，并且有时你会希望或需要从代码中访问
    Core Data 的功能。本章的其余部分将介绍使用 Core Data 进行编程（传统意义上的基于代码）的一些方面，首先从浏览应用程序委托类中生成的代码开始。


    ## 探索模板代码


    当我们创建 `MythBase` 项目时，系统自动为我们生成了一个名为 `MBAppDelegate` 的应用程序委托类。这个类包含从应用内的 Core Data
    模型文件中加载模型信息的代码。它还会打开 Core Data 读取和写入模型对象的磁盘存储，如果该存储尚不存在，则会创建它。最后，它通过一个 `NSManagedObjectContext`
    提供对数据存储的访问，其他对象可以绑定到该上下文（例如我们的 nib 文件中的数组控制器），以便从存储中读取数据和向其写入数据。


    此处显示的所有代码均已重新格式化，以便更好地适应本书的排版格式，因此你的版本可能看起来略有不同，但在语法上应该是相同的。

    '
- fmt: "### The App Delegate Interface\n\nLet’s jump right in and take a look at the\
    \ header file, `MBAppDelegate.h`, shown in the following listing. This is the\
    \ autogenerated code created by Xcode 4.5 for Mountain Lion. The version created\
    \ by different versions of Xcode may be slightly different, and if you like you\
    \ can change it to match the version shown here:\n\n```\n#import <Cocoa/Cocoa.h>\n\
    \n@interface MBAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
    \ *managedObjectModel;\n\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n\n- (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n\
    This code declares a simple class with four properties and one method. The `window`\
    \ variable also features `IBOutlet` in its property declaration, which makes it\
    \ into an outlet available for connecting to a window in Interface Builder. The\
    \ other three properties are instances of some important Core Data classes:\n\n\
    - `NSPersistentStoreCoordinator` manages the back-storage, giving access to one\
    \ or more instances of `NSPersistentStore`, each of which represents a storage\
    \ location (in a file or in memory). The purpose of the coordinator is to let\
    \ the application access several persistent stores as if they were one. Some applications\
    \ may want to use this to partition application data across multiple stores. For\
    \ example, you may want to distinguish between normal entities, whose objects\
    \ that are saved to disk, and transient entities, whose objects that are only\
    \ held in memory and will disappear when the user quits the app. Even though they’re\
    \ not saved to disk, the transient objects will still benefit from the other features\
    \ of Core Data (simple Undo support, integration with Cocoa bindings, and the\
    \ like).\n\n- `NSManagedObjectModel` loads information about entities and their\
    \ properties from one or more model files (normally contained inside your application\
    \ bundle), and acts as a sort of metadata repository containing the structure\
    \ of the application’s managed objects. Many applications will never need to interact\
    \ with this directly.\n\n- `NSManagedObjectContext` is responsible for dealing\
    \ with the lifecycle of all managed objects (the model objects that we’re storing\
    \ via Core Data). It accesses the objects themselves through an `NSPersistentStoreCoordinator`\
    \ and provides high-level functionality for creating, reading, updating, and deleting\
    \ objects. Most applications will use an `NSManagedObjectContext` at some time\
    \ or another for creating objects, saving changes, and so on.\n\nWe’ll see how\
    \ each of those objects is used when we look at the implementation file. The final\
    \ declaration in the header file is for the `saveAction:` method, which is called\
    \ when the user selects File ➤ Save from the MythBase menu. We’ll see how that\
    \ works in the next section.\n\n### The App Delegate Implementation\n\nNow let’s\
    \ switch over to `MythBase_AppDelegate.m`, and see what it does. Besides implementing\
    \ the `saveAction:` method declared in the interface, it also needs to make sure\
    \ that the appropriate accessors for its declared properties are all implemented.\
    \ That includes both a getter and a setter for `window`, and just a getter for\
    \ the others (which were declared read-only). As with the header file, this code\
    \ was auto-generated using Xcode 4.5 running on Mountain Lion. If you’re using\
    \ something else, you might see slightly different code.\n\n#### The `applicationSupportDirectory`\
    \ Method\n\nThe file starts out like this:\n\n```\n#import \"MBAppDelegate.h\"\
    \n\n@implementation MBAppDelegate\n\n@synthesize persistentStoreCoordinator =\
    \ _persistentStoreCoordinator;\n@synthesize managedObjectModel = _managedObjectModel;\n\
    @synthesize managedObjectContext = _managedObjectContext;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // Insert code here to initialize your application\n\
    }\n\n// Returns the directory the application uses to store the Core Data store\
    \ file. This code uses a directory named \"com.learncocoa.MythBase\" in the user's\
    \ Application Support directory.\n- (NSURL *)applicationFilesDirectory\n{\n  \
    \  NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSURL *appSupportURL\
    \ = [[fileManager URLsForDirectory:NSApplicationSupportDirectory inDomains:NSUserDomainMask]\
    \ lastObject];\n    return [appSupportURL URLByAppendingPathComponent:@\"com.learncocoa.MythBase\"\
    ];\n}\n```\n\nThe first things shown in the class’s implementation are some `@synthesize`\
    \ directives, which take care of the getters and setters for the properties declared\
    \ in the header file. Next is the stub for the `applicationDidFinishLaunching:`\
    \ method, which we’ve seen before and is standard for any application delegate\
    \ class. After that comes the implementation of a method called `applicationFilesDirectory`,\
    \ which returns an `NSURL` containing the name of a directory where the application\
    \ can save its data (in our case, the location where Core Data should save its\
    \ persistent store). Normally this method returns the full path of a subdirectory\
    \ of the Application Support directory, which is located inside the Library directory\
    \ in the user’s home directory (`/Users/somebody/Library/Application Support/MythBase`).\n\
    \nThe `applicationFilesDirectory:` method is a “helper” method, called elsewhere\
    \ in the class’s implementation. Note that this method is neither declared in\
    \ the header file nor in a private category or anything of the sort. In an Objective-C\
    \ implementation block, code can call any methods that appear earlier in the same\
    \ implementation block, even if they’re not declared anywhere. This is sometimes\
    \ a handy shortcut when you want to refactor your code a bit, extracting some\
    \ functionality into a method of its own, but don’t need to make it accessible\
    \ anywhere outside the current class implementation."
