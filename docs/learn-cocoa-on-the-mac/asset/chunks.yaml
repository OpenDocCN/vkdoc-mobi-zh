    \ options defining how the enumeration runs, such as make it run concurrently,\
    \ like so:\n\n```\n[array enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
    \    usingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"\
    Block enumeration accessing object: %@\", blockEnumerated);\n}];\n```\n\nThis\
    \ method actually uses GCD to spread the work around to all available processor\
    \ cores, which will make our app run more quickly and better utilize system resources.\
    \ And we get it for free!\n\nSimilar enumeration methods exist for the `NSSet`\
    \ class, but without the index parameter (because the objects in a set are, by\
    \ definition, unordered). `NSDictionary` has also gotten some good block action\
    \ with new methods such as `enumerateKeysAndObjectsUsingBlock:` (and its options-taking\
    \ variant that allows for concurrency), letting us specify a block that gets the\
    \ key and value together. This is much better than previous ways of enumerating\
    \ the contents of a dictionary, which typically involved stepping through all\
    \ the keys and looking up the value for each key.\n\n### Observing Notifications\
    \ Using Blocks\n\nWe realize that we just threw notifications at you a few pages\
    \ ago, but guess what: Apple’s already taken the block concept and applied it\
    \ to the `NSNotification` class as well, which boasts a method that lets us specify\
    \ a block rather than a selector, like this:\n\n```\nid observe = [[NSNotificationCenter\
    \ defaultCenter] addObserverForName:DATA_RECEIVED\n  object:nil queue:nil usingBlock:^(NSNotification\
    \ *notification){\n  NSLog(@\"received notification: %@\", notification);\n}];\n\
    ```\n\nThis is cool in a couple of ways. For one thing, it frees us from the burden\
    \ of creating a method for our notification-handling code, letting us instead\
    \ put it inline with the code that’s setting it up, which can make our code easier\
    \ to read. The other cool thing, which is true of all blocks, is that because\
    \ the block we create picks up its context from the location where it’s defined,\
    \ it has access to not only instance variables, but also local variables defined\
    \ earlier in the same method. That means that our block can be created with some\
