  trans: '

    # 为多个反派准备 VillainTrackerAppDelegate


    在 Xcode 中，打开我们在第 4 章创建的项目，并导航到 `VillainTrackerAppDelegate.h`，以便更新类的接口来适配即将进行的修改。首先，我们将添加所需的实例变量。因为我们要维护一个反派列表，所以需要创建一个名为
    `villains` 的 `NSMutableArray` 来容纳所有反派。我们还会添加一个名为 `villainsTableView` 的出口，以便访问用于展示反派列表的
    `NSTableView`。


    我们还将为两个新的操作方法 `newVillain:` 和 `deleteVillain:` 添加声明。以下代码展示了完成这些修改后 `VillainTrackerAppDelegate.h`
    的状态（新代码行以粗体显示）：


    ```

    #import <Cocoa/Cocoa.h>


    @interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *nameView;

    @property (weak) IBOutlet NSTextField *lastKnownLocationView;

    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;

    @property (weak) IBOutlet NSComboBox *swornEnemyView;

    @property (weak) IBOutlet NSLevelIndicator *evilnessView;

    @property (weak) IBOutlet NSMatrix *powersView;

    @property (weak) IBOutlet NSPopUpButton *powerSourceView;

    @property (weak) IBOutlet NSMatrix *primaryMotivationView;

    @property (weak) IBOutlet NSImageView *mugshotView;

    @property (unsafe_unretained) IBOutlet NSTextView *notesView;

    @property (weak) IBOutlet NSTableView *villainsTableView;

    @property (strong) NSMutableDictionary *villain;

    @property (strong) NSMutableArray *villains;


    - (IBAction)takeName:(id)sender;

    - (IBAction)takeLastKnownLocation:(id)sender;

    - (IBAction)takeLastSeenDate:(id)sender;

    - (IBAction)takeSwornEnemy:(id)sender;

    - (IBAction)takeEvilness:(id)sender;

    - (IBAction)takePowers:(id)sender;

    - (IBAction)takePowerSource:(id)sender;

    - (IBAction)takePrimaryMotivation:(id)sender;

    - (IBAction)takeMugshot:(id)sender;

    - (IBAction)newVillain:(id)sender;

    - (IBAction)deleteVillain:(id)sender;


    @end

    ```


    这些新的声明遵循与上一章中使用 control-拖拽到 `VillainTrackerAppDelegate` 类时 Xcode 生成的属性和方法相同的结构。Xcode
    会注意到这些代码已被添加，并且这些出口和操作与 Xcode 生成的一样有效。实际上，请注意代码编辑器左侧边距中出现的小圆点。这些圆点是我们可以进行 control-拖拽的连接点，表明
    Xcode 识别出我们创建了一个出口或操作。在布局用户界面时，通过 control-拖拽来创建这些元素非常方便，因为我们可以同时建立连接并生成存根。然而，在调整现有代码时，手动操作可能会更快。


    现在，我们将在 `VillainTrackerAppDelegate.m` 中为新的操作方法添加两个方法实现（目前只是空壳）。将这些行添加到 `@implementation
    VillainTrackerAppDelegate` 部分：


    ```

    - (IBAction)newVillain:(id)sender {}


    - (IBAction)deleteVillain:(id)sender {}

    ```


    现在，我们已经向 `VillainTrackerAppDelegate` 的接口和实现部分添加了所需的内容，包括一些空存根方法。点击“运行”按钮以确保能够干净编译，然后我们将继续调整
    GUI 以便为表格留出空间。


    ## 为表格视图腾出空间


    在 Xcode 的项目导航面板中，点击 `MainMenu.xib` 以在 Interface Builder 模式下打开它（我们也可以双击 `MainMenu.xib`
    文件以在新窗口中打开）。我们将使窗口变大，添加一个表格视图和几个按钮，重新组织布局，并调整所有 `NSBox` 的尺寸调整特性，使表格视图能在两个维度上完全调整大小，而其他框则相应移动。


    首先，调整窗口大小，使其宽度增加约 300 像素（约为初始宽度的 1.5 倍），但高度保持不变。我们遵循西方从左到右的惯例来安排布局，使得左侧的选项（在表格视图中）决定右侧显示的内容（所有其他视图），因此你还需要将所有现有视图拖拽到窗口的右侧。请参考图
    6-2 了解目标效果。选中窗口后，打开属性检查器（⌥⌘4），并勾选标记为“调整大小”的复选框。


    ![A978-1-4302-4543-8_6_Fig2_HTML.jpg](img/A978-1-4302-4543-8_6_Fig2_HTML.jpg)


    **图 6-2.** 使你的窗口与此图相似，为表格视图做准备


    现在，在实用工具区域（可能折叠在检查器面板下方）中打开对象库面板（⇧⌥⌘4），并在搜索字段中输入“table”。其中一个结果应该是表格视图，它是包含在 `NSScrollView`
    中的 `NSTableView` 类实例。将表格视图拖拽到窗口左上方区域，让蓝色参考线出现，将其定位到距窗口框架边缘的推荐距离。表格视图的默认大小比我们要放置它的空间小得多，但暂时不必调整它以填满可用空间，我们稍后会处理这个问题。


    首先，我们要对这个表格视图进行列配置。默认情况下，新的表格视图有两列，但我们希望它有三列，以便在列表中显示每个反派的姓名、最后目击日期和头像。要添加一列，我们需要逐层深入几个视图层级。打开属性检查器（⌥⌘4）以辅助操作；它始终会显示选中对象的一些信息，最关键的是类名。当我们第一次点击窗口中的表格视图时，会看到属性检查器顶部显示“滚动视图”。这是因为我们从库中拖拽出的表格视图实际上包含在
    `NSScrollView` 中。再次点击，检查器将显示“表格视图”。


    检查器中可见的一个属性是列数。将其从 2 改为 3。当列数改变时，表格视图中会短暂出现水平滚动条的闪光，但很容易忽略。除了这个闪光以及表格标题边缘的调整大小条提示外，表格视图实际上不会直观地反映出有三列存在；我们稍后会处理这个问题。同时，还需要对表格视图进行另外两项更改。第一项是将“列调整大小”行为从“仅调整最后一列大小”改为“仅调整第一列大小”。我们的第一列将显示反派的姓名，而反派的姓名宽度变化会比日期或头像更大，因此我们希望调整大小时扩展该列。默认情况下，用户将能够随意调整列宽。

