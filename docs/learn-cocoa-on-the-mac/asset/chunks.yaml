- fmt: '### Creating the Main Window


    Now it’s time to pay some attention to our main window, which will contain buttons
    the user can click to generate the characters, monsters, and dungeons, plus text
    fields to display the results. Click the main window’s title bar (or double-click
    its icon in the main window if it’s not already visible) and bring up the Size
    Inspector (⌥⌘5). Change the window size to 731 by 321, then switch to the Attributes
    Inspector (⌥⌘4) and click to turn off the `Resize` checkbox, which will give us
    one less thing to worry about. This application displays a limited data set, so
    there’s no reason for the user to make the window any bigger. We’re now going
    to create three sets of GUI components, one set for each of the three types of
    data we’re dealing with. We’ll manually lay out the first set, and then duplicate
    it for the other two.


    First, we’ll create a text field inside a box for displaying results. Go to the
    Object Library pane and enter “`nsbox`” into the Search field. Look for the box
    in the results, and drag one of these out to our window. While the new box is
    selected, switch back to the Size Inspector, and set the box’s size to width 227
    by height 247\. While we’re at it, go ahead and set each of its `X` and `Y` values
    to 20\. This puts the box in the lower-left corner of the window, about in the
    position it would be in if we dragged it to the lower left and let it sit where
    the blue guidelines recommend. Then switch back to the Attributes Inspector, and
    set the `Title Position` to `None` so that the title won’t be shown.


    Now, go back to the Object Library pane and enter “`label`” in the Search box.
    One of the results is `Wrapping Label`; grab that, drag it so that it is directly
    overlapping the box we created, and let go. Doing this puts it inside the box.
    Once it’s there, expand the label to fill the box, by first dragging its bottom
    left corner down to the lower left, then dragging its top right corner to the
    upper right. In both cases, the blue guidelines will show up when we’re just the
    right distance from the edge of the box. Finally, triple-click to select the text
    (“`Multiline Label`”) in the text field, and press Backspace or Delete to clear
    out the text.


    Let’s top this box off by adding the button that will eventually put some text
    into the text field we just created. Find a button in the Object Library (a push
    button will do nicely), and drag it out to a spot just above the box. During the
    drag, the blue lines will appear, showing us the correct distance from the top
    of the window, and also showing us when the button is lined up directly above
    the center of the box. That’s where we want to drop it! Double-click the button
    to edit its title, and change it to “`Generate Character`.” Depending on how the
    resizing constraints have been set up, we may need to reset the size of the box
    afterwards. Figure [7-8](#A978-1-4302-4543-8_7_Chapter.html#Fig8) shows what we
    should be seeing at this point.


    ![A978-1-4302-4543-8_7_Fig8_HTML.jpg](A978-1-4302-4543-8_7_Fig8_HTML.jpg)


    Figure 7-8.


    We’ve created the first of three sets of views for the main window. The text field
    inside the box is highlighted just so we can see where it is


    Now select all the views we just created by clicking anywhere in the window and
    then pressing ⌘A to select all objects in the window. Duplicate them by pressing
    ⌘D, which will show us a new set of identical objects, overlapping and slightly
    position-shifted from the originals. Drag this cluster to the center of the window,
    using the blue guidelines to make sure that they are at the same vertical position
    at the originals, and with just the right horizontal spacing between the boxes.
    Then press ⌘D again, and drag the third cluster of objects to the right side of
    the window, again using the blue guidelines to help position them properly. Finally,
    double-click on the two new buttons, changing their titles to “`Generate Monster`”
    and “`Generate Dungeon`,” respectively. Again, depending on how the resizing constraints
    have been set up, we may need to reset the size of the boxes back to 227 x 247\.
    Figure [7-9](#A978-1-4302-4543-8_7_Chapter.html#Fig9) shows what the window should
    look like now.


    ![A978-1-4302-4543-8_7_Fig9_HTML.jpg](A978-1-4302-4543-8_7_Fig9_HTML.jpg)


    Figure 7-9.


    The completed main window for DungeonThing


    ### Setting Up the DungeonThingAppDelegate


    Now that the initial set of bindings are out of the way and the main window is
    all set up, we can connect things to the `DungeonThingAppDelegate`. Open an Assistant
    Editor (⌥⌘↵) pane by clicking the small butler-like icon in the group of icons
    labeled Editor in the toolbar (or using the keyboard shortcut), and select `DungeonThingAppDelegate.h`
    from the Jump Bar. One at a time, Control-drag from the label in the box under
    the `Generate Character` button, and drag out to the `DungeonThingAppDelegate.h`
    file in the Assistant Editor, to just below the predefined `@property` for the
    window. When we get there, a small window should appear indicating the possibility
    to create a new outlet or action. Release the mouse and create a new outlet titled
    `characterLabel`. Do the same from the other two labels in boxes in the window,
    creating new outlets titled `monsterLabel` and `dungeonLabel`.


    Then Control-drag from each of the three buttons back to `DungeonThingAppDelegate.h`
    file in the Assistant Editor, and create new actions titled `createCharacter:`,
    `createMonster:`, and `createDungeon:`. At this point, it should be clear which
    action goes with which button. In addition to adding the outlets and actions to
    the `DungeonThingAppDelegate.h` file, this will also add method stubs for the
    actions in the `DungeonThingAppDelegate.m` file.'
