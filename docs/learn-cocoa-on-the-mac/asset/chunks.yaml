    lastSeenDate\"`作为标识符，`\"Last Seen\"`作为标题；再对第三列重复此过程，输入`\"mugshot\"`作为标识符，`\"Mugshot\"\
    `作为标题。\n\n现在我们将添加一对按钮：一个用于向列表添加新反派，另一个用于删除选中的反派。回到对象库面板，在搜索字段中输入`\"button\"`；结果中会显示出数量惊人多的按钮列表。Apple\
    \ 公司里有人真的很喜欢设计按钮！尽管它们外观各异，但这个列表中的几乎所有东西都只是一个`NSButton`，其核心功能始终相同。其中一些按钮被预配置为不同的模式，可以充当复选框或展开三角形（disclosure\
    \ triangle），但除此之外，它们的基本功能都一样：在被点击时调用目标对象中的操作方法（action method）。\n\n从列表中选择前几个按钮之一（可能是“Push\
    \ Button”或“Rounded Rect Button”），并将其拖到我们的窗口中，放在表格视图下方。这将是我们用于“添加反派”（Add Villain）的按钮。我们不会简单地将按钮标题设置为文本“Add\
    \ Villain”，而是使用 Cocoa 内置的图形图像之一，使其看起来像其他应用程序中的“添加”按钮。在按钮仍处于选中状态时，打开属性检查器，找到图像（Image）组合框。点击组合框右端的小三角形，开始输入`\"\
    nsaddtemplate\"`。当你看到它自动补全为`\"NSAddTemplate\"`时，按下 Enter 键，你会看到新按钮现在显示一个+号图像，覆盖在“Add\
    \ Villain”标签上。在图像组合框下方是另一个标记为“Alternate”的组合框。也将其设置为`NSAddTemplate`。再下方是一组标记为“Position”的按钮，指示图像（显示为正方形）相对于按钮标题（显示为一条线）的位置。选择仅显示正方形而没有文本的选项，按钮标题将消失。水平调整按钮大小，使其刚好能容纳图像，然后复制按钮（使用⌘D）制作另一个按钮。选中这第二个按钮，再次回到属性检查器中的图像组合框，开始输入`\"\
    nsremovetemplate\"`，这将在你的按钮中提供—号图像。同样，将备选图像也设置为`NSRemoveTemplate`。\n\n```"
- fmt: 'Now, take the `Add` button, and drag it to a point just above the bottom edge
    of the window, using the blue guidelines to make its left edge line up with the
    left edge of the Table View and its bottom edge the recommended distance from
    the bottom of the window. Drag the `Remove` button into location just to the right
    of the `Add` button—it will snap to a comfortable distance from the `Add` button.
    Resize the Table View to fill the remaining space in the window. The window should
    resemble Figure [6-4](#A978-1-4302-4543-8_6_Chapter.html#Fig4) at this point.


    ![A978-1-4302-4543-8_6_Fig4_HTML.jpg](A978-1-4302-4543-8_6_Fig4_HTML.jpg)


    **Figure 6-4.** The Table View is just where we want it


    We need to set up some connections between the buttons that we just added and
    the `VillainTrackerAppDelegate` object so that the `VillainTrackerAppDelegate`
    object gets notified when the user clicks on a button. After the last few chapters,
    you can probably guess how we’ll do it. Select the button with the plus sign,
    and control-drag a connection from the button to the `VillainTrackerAppDelegate`
    object in the dock on the left side of the Interface Builder area. A utility window
    will appear with the list of available actions exposed by `VillainTrackerAppDelegate`.
    Select the `newVillain:` action that we added earlier. Next, select the button
    with the minus sign, and control-drag a connection out to `VillainTrackerAppDelegate`.
    This time, select the `deleteVillain:` action.


    We also need to set up connections between the `VillainTrackerAppDelegate` and
    the table view. Select the `VillainTrackerAppDelegate` in the dock on the left,
    and control-drag a connection out to the Table View. The Table View will highlight
    when the mouse is over it. Release the mouse, and a list of available outlets
    will appear. Choose `villainsTableView`. Now we need to make two connections in
    the other direction, from the Table View to the `VillainTrackerAppDelegate`. Select
    the Table View in the window (which will take two clicks to drill down through
    the Scroll view). Control-drag from the Table View to the `VillainTrackerAppDelegate`,
    and select `dataSource` from the list of options. Then, do it again, and this
    time select `Delegate`. With that, the connections are in place!


    Let’s see how this all behaves at run time. Click on the `Run` button in the upper
    left-hand corner of the Xcode window. Try dragging the lower right corner of the
    window around to resize things and let’s see what we get. Be wary, because it’s
    time for…


    ## A Nasty Resize Surprise, or, Constraints To The Rescue!


    The first time running the program with the window reorganized, you’ll probably
    see something pretty ugly like Figure [6-5](#A978-1-4302-4543-8_6_Chapter.html#Fig5).
    This is the result of stretching the window vertically and shrinking it horizontally
    by using the resize handle. Looking at the window in the picture, the table view
    is in good shape, as are the Powers and Abilities box and the Primary Motivation
    box. The appearance box has expanded downward. The Notes box has shrunk horizontally,
    as has the Basic Information box. In fact, the Basic Information box is kind of
    a mess. Your layout may break in different ways than the illustration shows, but
    it probably doesn’t work exactly the way you expected it to. You may wish to work
    with the source code provided with the chapter in order to play along.


    ![A978-1-4302-4543-8_6_Fig5_HTML.jpg](A978-1-4302-4543-8_6_Fig5_HTML.jpg)


    **Figure 6-5.** Ugh! That’s not pretty


    Before we can fix any of this, let’s think about what we want to have happen.
    For this program, we want all of the original UI elements from the last chapter
    (all the items in `NSBoxes`) to stay the same size and stay pegged to the right
    side of the window. The two new buttons should stay the same size, stay the same
    distance from each other, and stay pegged to the left side of the window below
    the table view. The new table view should expand both vertically and horizontally
    as the window is expanded, it should stick to the left side of the window, and
    it should not shrink below the current size in either direction. The boxes just
    to the right of the table view should maintain their distance from it.


    In order to make this all work, we have to understand about how Cocoa deals with
    resizing. Starting in Mac OS X Lion, resizing happens through a system called
    Cocoa Auto Layout. Resizing behavior in Auto Layout is specified using prioritized
    constraints, which means that you declare the minimum or maximum size of a view,
    the relationships between subviews that need to be preserved, the relationships
    between a view and its parent, and so on. When the user resizes the window, a
    constraint satisfaction engine dynamically tries to determine the best layout
    that preserves the constraints as best as possible, based on the priority order.
    The constraints also handle how the user interface behaves in right-to-left writing
    systems like Arabic and Hebrew.


    Each constraint expresses a relationship, such as “equals,” “less than,” or “greater
    than,” and either a pair of views or a view and a constant. A very simple constraint
    would be “`myButton`’s width = 87.” This, obviously, should hold the button to
    be 87 points wide. Constraints do not need to be equalities; a valid constraint
    would be “`myButton`’s height >= 32,” which indicates that the button’s height
    can’t be any smaller than 32. The system will prefer smaller sizes over larger
    ones; a button that must have a width greater than or equal to 32 will generally
    be 32 (the smallest value that satisfies the inequality).


    A more complex one would be the following pair: “the horizontal space between
    `myButton`’s leading edge and the window’s leading edge = 10” and “the horizontal
    space between `myButton`’s trailing edge and the window’s trailing edge = 15.”
    For these two constraints to be held true during resizing, the button will need
    to grow and shrink with the window. Note that we used “leading” and “trailing”
    rather than “left” and “right.” In left-to-right writing systems, the leading
    edge is the left side. However, on right-to-left writing systems, the leading
    edge is the right side.


    Each constraint also has a priority, which ranges from 1 to 1000. Constraints
    with higher priorities are satisfied before constraints with lower priorities,
    and if two conflicting constraints can’t both be satisfied, the one with the higher
    priority will win and the one with the lower priority will be violated. An example
    of this would be “`myButton`’s width >= 32 at priority 1000” and “`myButton`’s
    width = `someField`’s width – 40 at priority 750.” As long as `someField`''s width
    is greater than 72, then both constraints can be satisfied and `myButton` will
    be 40 points smaller than `someField`. However, if `someField` shrinks to be smaller
    than 72 points, the higher-priority constraint will win and `myButton` won’t shrink
    any further.


    Each view has a Content Hugging Priority and a Content Compression Resistance
    Priority as well. These describe how the view resizes relative to the most appropriate
    size—its intrinsic size. For a button, the intrinsic size is the size required
    to display its label (and icon if appropriate) without clipping. Content Hugging
    controls how the view will resize if it’s asked to be larger than its intrinsic
    size. Compression Resistance controls how the view will resize if it’s asked to
    be smaller than its intrinsic size. Generally, the defaults for these priorities
    are good choices, and in this chapter, we’ll leave them alone.'
