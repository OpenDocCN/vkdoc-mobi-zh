    has acquired a small disclosure triangle to the left of the name.


    Click the triangle to open the contents, and note that it contains two versions
    of our model file: `MythBase.xcdatamodel` and `MythBase 2.xcdatamodel`. `MythBase.xcdatamodel`
    is the original data model, and it has a small green checkbox next to it in the
    navigation pane showing that it’s the one that Xcode considers to be current.
    The one with a “2” tacked onto the end of the filename is the new one where we’ll
    make some changes. First, we need to set MythBase 2 as the current version of
    the model. Select the `MythBase.xcdatamodeld` file (the parent row containing
    the disclosure triangle, not either of the two data models underneath). In the
    File Inspector, there’s a section titled Versioned Core Data Model, as shown in
    Figure [9-3](#A978-1-4302-4543-8_9_Chapter.html#Fig3). Set the Current Version
    to be MythBase 2\. When we do this, the green checkbox will move to the `MythBase
    2.xcdatamodel` file in the navigation pane. The next time we build MythBase, this
    new compound model containing multiple versions of the model will be copied into
    the app, and the app will try to use what we’ve set as the current version.


    ![A978-1-4302-4543-8_9_Fig3_HTML.jpg](A978-1-4302-4543-8_9_Fig3_HTML.jpg)


    Figure 9-3. 


    The Versioned Core Data Model controls in the File Inspector


    ### Adding New Entities


    We want to be able to keep track of not just the bands that some of our mythical
    people played in, but also the venues they played at, and even dates of specific
    gigs, so we’re going to add three new entities: `MythicalBand`, `MythicalVenue`,
    and `MythicalGig`. See Figure [9-4](#A978-1-4302-4543-8_9_Chapter.html#Fig4) for
    an overview.


    ![A978-1-4302-4543-8_9_Fig4_HTML.jpg](A978-1-4302-4543-8_9_Fig4_HTML.jpg)


    Figure 9-4. 


    Here are all the entities we’ll define, along with their attributes


    Make sure that the new model file is selected, then create a new entity and name
    it “MythicalBand.” Give this entity a new attribute called “name,” set its type
    to String, and click to turn off the Optional checkbox and to turn on the Indexed
    checkbox.


    Now create another new entity named “MythicalVenue,” also with a single String
    attribute called “name,” which should also be Indexed but not Optional.


    Finally, create an entity called “MythicalGig.” Unlike the other entities we’ve
    added, gigs don’t have names. The only distinguishing characteristics of a `MythicalGig`
    are its relationships to a band and a venue (which we’ll get to in a bit) and
    the date of the performance. Add a new attribute, name it “performanceDate,” and
    change its type to Date. We can leave the `performanceDate` set to Optional (since
    the exact dates of some ancient gigs may have gone down the memory hole), and
    there’s no need to turn on Indexing for it either.


    ### Adding Relationships


    Now it’s time to add relationships so that each object can be attached to other
    relevant objects. We’re going to define a one-to-many relationship from `MythicalBand`
    to `MythicalPerson`, a one-to-many relationship from `MythicalBand` to `MythicalGig`,
    and finally another one-to-many relationship from `MythicalVenue` to `MythicalGig`.
    See Figure [9-5](#A978-1-4302-4543-8_9_Chapter.html#Fig5) for an overview.


    ![A978-1-4302-4543-8_9_Fig5_HTML.jpg](A978-1-4302-4543-8_9_Fig5_HTML.jpg)


    Figure 9-5.


    The model will look like this after we add the relationships


    At this point we should clarify our terminology a bit. In Core Data, each relationship
    is actually a one-way affair, and they’re not defined in terms like “one-to-many,”
    “one-to-one,” “many-to-many,” and so on. Instead, each Core Data relationship
    is either to-one or to-many. In order to create what in normal usage (if you accept
    the notion that any form of computer programmer jargon is “normal”) is called
    a one-to-many relationship in Core Data, we actually have to create two relationships:
    a to-many relationship rooted at the first entity and ending at the second, and
    a to-one relationship rooted at the second entity and ending at the first. We
    then specify in our model that these two are inverse relationships, and Core Data
    then understands the bidirectional nature of what we’ve configured. This setup
    allows us, if we wish, to create a relationship that is truly unidirectional,
    though in practice it’s questionable whether that’s ever really desirable. The
    examples in this book all use bidirectional relationships.


    So, let’s create these relationships, starting with a one-to-many relationship
    from `MythicalBand` to `MythicalPerson`. Select `MythicalBand`, and click the
    small + button at the lower-left-hand corner of the Relationships table view.
    This creates a new relationship whose configuration options (see Figure [9-6](#A978-1-4302-4543-8_9_Chapter.html#Fig6))
    look a little different than what we’ve seen when creating attributes.


    ![A978-1-4302-4543-8_9_Fig6_HTML.jpg](A978-1-4302-4543-8_9_Fig6_HTML.jpg)


    Figure 9-6.


    Configuration options for a new relationship


    There’s a Name field and checkboxes for Optional and Transient, but otherwise
    it’s all different. The Destination pop-up lets us choose where the other end
    of the relationship goes, and after setting it, the Inverse pop-up lets us choose
    which other relationship (if any) should be used to create a bidirectional relationship.
    A checkbox lets us specify that this is a to-many relationship, and if that’s
    checked, two fields are enabled that let us put handy constraints and the minimum
    and maximum number of objects may be attached on the other end. Finally, the Delete
    Rule pop-up lets us decide what should happen to objects at the other end of the
    relationship if the “source” of the relationship is deleted. The most common choices
    are Nullify (which means that the source is removed from any inverse relationship
    in the destination element), Cascade (which means that the destination object
    or objects are also deleted), and Deny (which means that if this relationship
    is present, the source object will refuse to be deleted at all). A fourth alternative,
    No Action, leaves the inverse relationship intact, leaving the developer with
    the task of taking care of it (or risk ending up with data integrity problems).
    We won’t use that option at all.'
  trans: '

    ### 准备多个模型版本


    我们需要做的第一件事，是将当前模型转换为一种特殊的多版本格式。这将允许我们在 Xcode 项目中以及 `MythBase` 本身内部存储数据模型的多个版本。在
    Xcode 的导航窗格中，打开 `Models` 分组，然后选择 `MythBase.xcdatamodeld`。接下来，从菜单栏中选择 `Editor`
    ➤ `Add Model Version`。此时会出现一个对话框，要求您为新版本命名，默认名称为 `MythBase 2`。这个默认名称没问题，直接点击 Finish
    即可。Xcode 为我们创建了数据模型的一个副本，因此我们可以在保留旧模型的同时对其进行扩展。在导航窗格中，`MythBase.xcdatamodeld`
    的名称左侧会显示一个小披露三角形。


    点击该三角形展开内容，可以看到其中包含模型文件的两个版本：`MythBase.xcdatamodel` 和 `MythBase 2.xcdatamodel`。`MythBase.xcdatamodel`
    是原始数据模型，它在导航窗格中旁边有一个绿色的复选标记，表示 Xcode 认为它是当前版本。文件名末尾带有“2”的版本是我们将要进行修改的新模型。首先，我们需要将
    `MythBase 2` 设置为模型的当前版本。选中 `MythBase.xcdatamodeld` 文件（即包含披露三角形的父级行，而不是其下的两个数据模型之一）。在文件检查器中，有一个名为“版本化
    Core Data 模型”的章节，如图 9-3 所示。将“当前版本”设置为 `MythBase 2`。完成此操作后，导航窗格中的绿色复选标记将移至 `MythBase
    2.xcdatamodel` 文件。下次构建 `MythBase` 时，这个包含多个模型版本的新复合模型将被复制到应用中，并且应用会尝试使用我们已设置为当前版本的模型。


    ![A978-1-4302-4543-8_9_Fig3_HTML.jpg](img/A978-1-4302-4543-8_9_Fig3_HTML.jpg)


    图 9-3. 文件检查器中的版本化 Core Data 模型控制选项


    ### 添加新实体


    我们希望能够追踪的，不仅仅是一些虚构人物曾效力过的乐队，还包括他们演出过的场地，甚至具体演出的日期。因此，我们将添加三个新实体：`MythicalBand`、`MythicalVenue`
    和 `MythicalGig`。概览请参见图 9-4。


    ![A978-1-4302-4543-8_9_Fig4_HTML.jpg](img/A978-1-4302-4543-8_9_Fig4_HTML.jpg)


    图 9-4. 以下是我们将要定义的所有实体及其属性


    确保已选中新的模型文件，然后创建一个新实体并将其命名为 `MythicalBand`。为该实体添加一个名为 `name` 的属性，将其类型设置为 `String`，然后点击以关闭“可选”复选框，并开启“已索引”复选框。


    现在创建另一个名为 `MythicalVenue` 的新实体，它同样只有一个名为 `name` 的 `String` 类型属性，该属性也应为“已索引”但非“可选”。


    最后，创建一个名为 `MythicalGig` 的实体。与我们添加的其他实体不同，演出没有名称。`MythicalGig` 的唯一区别特征是其与乐队和场地的关系（我们稍后会讲到），以及表演的日期。添加一个新属性，命名为
    `performanceDate`，并将其类型更改为 `Date`。我们可以将 `performanceDate` 保留为“可选”（因为某些古老演出的确切日期可能已被遗忘），同样也无需为其开启“已索引”。


    ### 添加关系


    现在是时候添加关系了，以便每个对象都能关联到其他相关对象。我们将定义一个从 `MythicalBand` 到 `MythicalPerson` 的一对多关系，一个从
    `MythicalBand` 到 `MythicalGig` 的一对多关系，以及最后一个从 `MythicalVenue` 到 `MythicalGig`
    的一对多关系。概览请参见图 9-5。


    ![A978-1-4302-4543-8_9_Fig5_HTML.jpg](img/A978-1-4302-4543-8_9_Fig5_HTML.jpg)


    图 9-5. 添加关系后，模型将如下图所示


    此时，我们应该稍微澄清一下术语。在 Core Data 中，每个关系实际上都是单向的，并且它们不是用“一对多”、“一对一”、“多对多”等术语来定义的。相反，每个
    Core Data 关系要么是“对一”的，要么是“对多”的。为了创建通常所说的（如果您认为任何形式的计算机程序员行话都属于“正常”用法）Core Data
    中的一对多关系，我们实际上需要创建两个关系：一个根植于第一个实体并指向第二个实体的“对多”关系，以及一个根植于第二个实体并指向第一个实体的“对一”关系。然后，我们在模型中指定这两个关系互为反向关系，这样
    Core Data 就能理解我们所配置的双向性质。这种设置允许我们（如果需要的话）创建一个真正单向的关系，尽管在实践中，这样做是否真的可取尚存疑问。本书中的示例均使用双向关系。


    那么，让我们来创建这些关系，从 `MythicalBand` 到 `MythicalPerson` 的一对多关系开始。选择 `MythicalBand`，然后点击关系表视图左下角的小
    + 按钮。这会创建一个新关系，其配置选项（见图 9-6）与我们创建属性时看到的略有不同。


    ![A978-1-4302-4543-8_9_Fig6_HTML.jpg](img/A978-1-4302-4543-8_9_Fig6_HTML.jpg)


    图 9-6. 新关系的配置选项


    这里有一个“名称”字段，以及用于“可选”和“瞬态”的复选框，但其他方面都不同。“目标”弹出菜单让我们可以选择关系的另一端指向哪里，设置后，“反向”弹出菜单让我们可以选择应使用哪个其他关系（如果有的话）来创建双向关系。一个复选框允许我们指定这是一个“对多”关系，如果勾选，则会启用两个字段，让我们可以设置便利约束以及另一端可以关联的对象的最小和最大数量。最后，“删除规则”弹出菜单让我们决定，如果关系的“源”被删除，关系的另一端对象应如何处理。最常见的选项是
    `Nullify`（表示源对象将从目标元素中的任何反向关系中移除）、`Cascade`（表示目标对象也将被删除）和 `Deny`（表示如果存在此关系，源对象将完全拒绝被删除）。第四种选择是
    `No Action`，它会保持反向关系不变，将处理它的任务留给开发者（否则可能面临数据完整性问题）。我们不会使用这个选项。

