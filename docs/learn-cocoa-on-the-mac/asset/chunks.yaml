- fmt: "### The Color Panel\n\nFirst, let’s take a look at `NSColorPanel`. This panel\
    \ provides an interface that allows the user to select a color. We’re going to\
    \ use the color panel to set the color of a piece of on-screen text by implementing\
    \ a method in our controller class that’s called whenever the user selects a color\
    \ in the color panel.\n\nAssuming the `MainMenu.xib` file is still open in the\
    \ WindowLab project we created in Xcode, let’s look at the main Window object\
    \ in the nib file. Drag out a Wrapping Label (a.k.a. a Multiline Label) from the\
    \ Object Library, and drop it onto the window. Drag out a button as well, and\
    \ position it below the label. Use “Show Color Panel” as the title. The layout\
    \ should look like Figure [11-3](#A978-1-4302-4543-8_11_Chapter.html#Fig3).\n\n\
    ![A978-1-4302-4543-8_11_Fig3_HTML.jpg](A978-1-4302-4543-8_11_Fig3_HTML.jpg)\n\n\
    Figure 11-3. A very simple window layout\n\nXcode will also have created an App\
    \ Delegate class for us. If we used WL as the class prefix, then it will be named\
    \ `WLAppDelegate`. In Xcode, open up an Assistant Editor pane next to the Interface\
    \ Builder pane (we talked about the Assistant Editor panes back in [Chapter 5](#A978-1-4302-4543-8_5_Chapter.html);\
    \ click the icon that looks like a butler’s vest and bowtie in the block of icons\
    \ labeled Editor in the Xcode toolbar.) Odds are that the `WLAppDelegate.h` file\
    \ will be pre-loaded when we open this pane, but if not, use the nav bar in the\
    \ top of the pane to open it. We’re going to add an outlet called `title` and\
    \ an action called `showColorPanel:`. To do so, Control-drag from the Multiline\
    \ Label to the `WLAppDelegate.h` file, aiming for just below the existing `@property`\
    \ declaration. Add a new Outlet and title it `title`. Then, Control-drag from\
    \ the Show Color Panel Button to just below the newly-added outlet, and add an\
    \ Action named `showColorPanel:` (we’ll need to change the Connection type to\
    \ Action).\n\nWhen done, the `WLAppDelegate.h` file should read like this:\n\n\
    ```\n#import <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n\n@property (weak) IBOutlet NSTextField\
    \ *title;\n\n- (IBAction)showColorPanel:(id)sender;\n\n@end\n```\n\nNow switch\
    \ to the `.m` file, and add the following implementation for the `showColorPanel:`\
    \ method, along with a method called `changeColor:`, like this:\n\n```\n#import\
    \ \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // Insert code here to initialize your application\n\
    }\n\n- (IBAction)showColorPanel:(id)sender\n{\n    // create the color panel\n\
    \    NSColorPanel *panel = [NSColorPanel sharedColorPanel];\n    // bring the\
    \ color panel to the front of the screen\n    [panel orderFront:nil];\n}\n\n-\
    \ (void)changeColor:(id)sender\n{\n    // in this method, the \"sender\" parameter\
    \ is the NSColorPanel\n    // itself.  We just ask it for its color, and pass\
    \ it along to\n    // the \"title\" object.\n    [self.title setTextColor:[sender\
    \ color]];\n}\n\n@end\n```\n\n**Note:** Although we’ve seen it before, take a\
    \ close look at the `@property` declarations inside the `WLAppDelegate.h` file.\
    \ Most of the time, when adding a property connected to a user interface element,\
    \ the property includes the annotation `weak`. But that’s not the case for the\
    \ reference to the window. That one is marked `assign`. There’s a good reason\
    \ for this: the annotations control how Automatic Reference Counting (ARC) deals\
    \ with the references. A reference marked as `strong` indicates ownership of the\
    \ object. A reference marked as `weak` does not indicate ownership, and a weak\
    \ reference will be zeroed out when all of the strong references to an object\
    \ are released and the object is deallocated. However, ARC doesn’t work with classes\
    \ that override `release` and `retain`, which includes `NSWindow`. Since `NSWindow`\
    \ doesn’t support ARC, the property gets an `assign` annotation. This effectively\
    \ means the same thing as `weak` but for non-ARC-enabled classes. The app delegate\
    \ doesn’t own the window, and so the app delegate’s connection to the window shouldn’t\
    \ prevent the window from being released and deallocated when appropriate.\n\n\
    The `showColorPanel:` method will be called by a simple button click in our GUI,\
    \ and Xcode already wired that up for us when we Control-dragged from the button.\
    \ But the `changeColor:` method will be called whenever the user clicks on a color\
    \ in the color panel, even though there won’t be any direct connection between\
    \ the color panel and our code. This bit of “magic” works thanks to a Cocoa concept\
    \ called the responder chain (see sidebar).\n\n### The Responder Chain\n\nThe\
    \ responder chain is an ad hoc collection of objects, gathered on the fly when\
    \ necessary during the life of an application, that can be queried to see if they\
    \ implement a particular action. This lets certain actions be configured in a\
    \ generic way, so that at runtime they will be invoked on the object that makes\
    \ the most sense at the time. The chain is arranged in order of specificity, starting\
    \ with the object that is “nearest” to the action and continuing along toward\
    \ the most generic. Configuring an object to use the responder chain is done in\
    \ Interface Builder by connecting to an action on the nib’s First Responder icon,\
    \ which is nothing more than a proxy for the first object in the responder chain\
    \ that says, at runtime, “Yes I can” when asked if it implements a particular\
    \ method.\n\nThis is all made somewhat more confusing by the fact that each window\
    \ has its own notion of a “first responder,” which is typically the control or\
    \ view that the user last interacted with (thereby making it a likely candidate\
    \ for receiving key-presses and the like).\n\nLet’s try to clarify this with an\
    \ example. Consider the case of a button whose target/action is configured to\
    \ call a method called `showThing:` on the First Responder. When a user clicks\
    \ the button, each of a list of objects will be asked, in order, if they implement\
    \ a `showThing:` method, right up until one of them answers `YES`, at which point\
    \ that object’s `showThing:` method is called, and the responder chain’s work\
    \ is done. Here’s an example of what the responder chain can look like:\n\n- The\
    \ window’s “first responder” (the view that’s currently in focus and accepting\
    \ keyboard input), its superview, the superview’s superview, and so on, all the\
    \ way up the view hierarchy within the window  \n- The window itself  \n- The\
    \ window’s delegate  \n- The application object, `NSApp`  \n- The application\
    \ object’s delegate  \n\nThe responder chain may contain additional objects as\
    \ well, especially if we’re working on a document-based application, in which\
    \ case open documents and their controller’s will have a spot in the chain as\
    \ well. More on that in [Chapter 12](#A978-1-4302-4543-8_12_Chapter.html).  \n\
    \nAs soon as any one of those objects says it implements `showThing:`, then the\
    \ method is called on that object, and the search is over."
  raw: '#### The Color Panel


    First, let’s take a look at `NSColorPanel`. This panel provides an interface that
    allows the user to select a color. We’re going to use the color panel to set the
    color of a piece of on-screen text by implementing a method in our controller
    class that’s called whenever the user selects a color in the color panel.


    Assuming the `MainMenu.xib` file is still open in the WindowLab project we created
    in Xcode, let’s look at the main Window object in the nib file. Drag out a Wrapping
    Label (a.k.a. a Multiline Label) from the Object Library, and drop it onto the
    window. Drag out a button as well, and position it below the label. Use “Show
    Color Panel” as the title. The layout should look like Figure [11-3](#A978-1-4302-4543-8_11_Chapter.html#Fig3).


    ![A978-1-4302-4543-8_11_Fig3_HTML.jpg](A978-1-4302-4543-8_11_Fig3_HTML.jpg)


    Figure 11-3.


    A very simple window layout


    Xcode will also have created an App Delegate class for us. If we used WL as the
    class prefix, then it will be named `WLAppDelegate`. In Xcode, open up an Assistant
    Editor pane next to the Interface Builder pane (we talked about the Assistant
    Editor panes back in [Chapter 5](#A978-1-4302-4543-8_5_Chapter.html); click the
    icon that looks like a butler’s vest and bowtie in the block of icons labeled
    Editor in the Xcode toolbar.) Odds are that the `WLAppDelegate.h` file will be
    pre-loaded when we open this pane, but if not, use the nav bar in the top of the
    pane to open it. We’re going to add an outlet called `title` and an action called
    `showColorPanel:`. To do so, Control-drag from the Multiline Label to the `WLAppDelegate.h`
    file, aiming for just below the existing `@property` declaration. Add a new Outlet
    and title it `title`. Then, Control-drag from the Show Color Panel Button to just
    below the newly-added outlet, and add an Action named `showColorPanel:` (we’ll
    need to change the Connection type to Action).


    When done, the `WLAppDelegate.h` file should read like this:


    `#import <Cocoa/Cocoa.h>`


    `@interface WLAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet NSTextField *title;`


    `- (IBAction)showColorPanel:(id)sender;`


    `@end`


    Now switch to the `.m` file, and add the following implementation for the `showColorPanel:`
    method, along with a method called `changeColor:`, like this:


    `#import "WLAppDelegate.h"`


    `@implementation WLAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `// Insert code here to initialize your application`


    `}`


    `- (IBAction)showColorPanel:(id)sender`


    `{`


    `// create the color panel`


    `NSColorPanel *panel = [NSColorPanel sharedColorPanel];`


    `// bring the color panel to the front of the screen`


    `[panel orderFront:nil];`


    `}`


    `- (void)changeColor:(id)sender`


    `{`


    `// in this method, the "sender" parameter is the NSColorPanel`


    `// itself.  We just ask it for its color, and pass it along to`


    `// the "title" object.`


    `[self.title setTextColor:[sender color]];`


    `}`


    `@end`


    Note


    Although we’ve seen it before, take a close look at the `@property` declarations
    inside the `WLAppDelegate.h` file. Most of the time, when adding a property connected
    to a user interface element, the property includes the annotation `weak`. But
    that’s not the case for the reference to the window. That one is marked `assign`.
    There’s a good reason for this: the annotations control how Automatic Reference
    Counting  (ARC) deals with the references. A reference marked as `strong` indicates
    ownership of the object. A reference marked as `weak` does not indicate ownership,
    and a weak reference will be zeroed out when all of the strong references to an
    object are released and the object is deallocated. However, ARC doesn’t work with
    classes that override `release` and `retain`, which includes `NSWindow`. Since
    `NSWindow` doesn’t support ARC, the property gets an `assign` annotation. This
    effectively means the same thing as `weak` but for non-ARC-enabled classes. The
    app delegate doesn’t own the window, and so the app delegate’s connection to the
    window shouldn’t prevent the window from being released and deallocated when appropriate.


    The `showColorPanel:` method will be called by a simple button click in our GUI,
    and Xcode already wired that up for us when we Control-dragged from the button.
    But the `changeColor:` method will be called whenever the user clicks on a color
    in the color panel, even though there won’t be any direct connection between the
    color panel and our code. This bit of “magic” works thanks to a Cocoa concept
    called the responder chain (see sidebar).


    THE RESPONDER CHAIN


    The responder chain is an ad hoc collection of objects, gathered on the fly when
    necessary during the life of an application, that can be queried to see if they
    implement a particular action. This lets certain actions be configured in a generic
    way, so that at runtime they will be invoked on the object that makes the most
    sense at the time. The chain is arranged in order of specificity, starting with
    the object that is “nearest” to the action and continuing along toward the most
    generic. Configuring an object to use the responder chain is done in Interface
    Builder by connecting to an action on the nib’s First Responder icon, which is
    nothing more than a proxy for the first object in the responder chain that says,
    at runtime, “Yes I can” when asked if it implements a particular method.


    This is all made somewhat more confusing by the fact that each window has its
    own notion of a “first responder,” which is typically the control or view that
    the user last interacted with (thereby making it a likely candidate for receiving
    key-presses and the like).


    Let’s try to clarify this with an example. Consider the case of a button whose
    target/action is configured to call a method called `showThing:` on the First
    Responder. When a user clicks the button, each of a list of objects will be asked,
    in order, if they implement a `showThing:` method, right up until one of them
    answers `YES`, at which point that object’s `showThing:` method is called, and
    the responder chain’s work is done. Here’s an example of what the responder chain
    can look like:


    The window’s “first responder” (the view that’s currently in focus and accepting
    keyboard input), its superview, the superview’s superview, and so on, all the
    way up the view hierarchy within the window   The window itself   The window’s
    delegate   The application object, `NSApp`   The application object’s delegate


    The responder chain may contain additional objects as well, especially if we’re
    working on a document-based application, in which case open documents and their
    controller’s will have a spot in the chain as well. More on that in [Chapter 12](#A978-1-4302-4543-8_12_Chapter.html).


    As soon as any one of those objects says it implements `showThing:`, then the
    method is called on that object, and the search is over.'
  trans: "\n### 颜色面板\n\n首先，让我们看一下 `NSColorPanel`。这个面板提供了一个让用户选择颜色的界面。我们将通过在我们的控制器类中实现一个方法，每当用户在颜色面板中选择一种颜色时，该方法就会被调用，从而使用颜色面板来设置屏幕上文本的颜色。\n\
    \n假设我们之前在 Xcode 中创建的 WindowLab 项目里的 `MainMenu.xib` 文件仍然处于打开状态，让我们看一下 nib 文件中的主窗口对象。从对象库中拖出一个换行标签（也称为多行标签），并将其放到窗口上。同时拖出一个按钮，放置在标签下方。将按钮标题设为“显示颜色面板”。布局应如图\
    \ 11-3 所示。\n\n![A978-1-4302-4543-8_11_Fig3_HTML.jpg](img/A978-1-4302-4543-8_11_Fig3_HTML.jpg)\n\
    \n图 11-3. 一个非常简单的窗口布局\n\nXcode 还会为我们创建一个 App Delegate 类。如果我们使用 WL 作为类前缀，那么它将被命名为\
    \ `WLAppDelegate`。在 Xcode 中，在 Interface Builder 面板旁边打开一个辅助编辑器面板（我们在第 5 章中讨论过辅助编辑器面板；点击\
    \ Xcode 工具栏中标记为“编辑器”的图标组里那个看起来像管家背心和领结的图标）。当我们打开这个面板时，`WLAppDelegate.h` 文件很可能会被预加载，但如果没有，请使用面板顶部的导航栏将其打开。我们将添加一个名为\
    \ `title` 的出口和一个名为 `showColorPanel:` 的动作。为此，从多行标签按住 Control 键拖拽到 `WLAppDelegate.h`\
    \ 文件中，目标位置是现有 `@property` 声明的正下方。添加一个新的出口并将其命名为 `title`。然后，从“显示颜色面板”按钮按住 Control\
    \ 键拖拽到刚刚添加的出口下方，并添加一个名为 `showColorPanel:` 的动作（我们需要将连接类型更改为“动作”）。\n\n完成后，`WLAppDelegate.h`\
    \ 文件应如下所示：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject\
    \ <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\n\
    @property (weak) IBOutlet NSTextField *title;\n\n- (IBAction)showColorPanel:(id)sender;\n\
    \n@end\n```\n\n现在切换到 `.m` 文件，并添加 `showColorPanel:` 方法的以下实现，以及一个名为 `changeColor:`\
    \ 的方法，如下所示：\n\n```\n#import \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n \
    \   // 在此处插入代码以初始化你的应用程序\n}\n\n- (IBAction)showColorPanel:(id)sender\n{\n    //\
    \ 创建颜色面板\n    NSColorPanel *panel = [NSColorPanel sharedColorPanel];\n    // 将颜色面板带到屏幕最前方\n\
    \    [panel orderFront:nil];\n}\n\n- (void)changeColor:(id)sender\n{\n    // 在此方法中，\"\
    sender\" 参数就是 NSColorPanel\n    // 本身。我们只需向其请求颜色，并将其传递给\n    // \"title\" 对象。\n\
    \    [self.title setTextColor:[sender color]];\n}\n\n@end\n```\n\n**注：** 尽管我们之前已经见过，但请仔细观察\
    \ `WLAppDelegate.h` 文件中的 `@property` 声明。大多数情况下，当添加一个连接到用户界面元素的属性时，该属性会包含 `weak`\
    \ 注释。但对于窗口的引用来说并非如此。那个被标记为 `assign`。这有一个很好的理由：这些注释控制着自动引用计数如何处理这些引用。被标记为 `strong`\
    \ 的引用表示拥有该对象的所有权。被标记为 `weak` 的引用不表示所有权，并且当一个对象的所有强引用都被释放且该对象被解除分配时，弱引用会被清零。然而，ARC\
    \ 不能与重写了 `release` 和 `retain` 方法的类一起工作，这包括 `NSWindow`。由于 `NSWindow` 不支持 ARC，该属性被赋予了\
    \ `assign` 注释。这实际上与 `weak` 含义相同，但适用于非 ARC 启用的类。应用程序代理并不拥有窗口，因此应用程序代理对窗口的连接不应阻止窗口在适当时被释放和解除分配。\n\
    \n`showColorPanel:` 方法将通过我们 GUI 中的一个简单按钮点击来调用，Xcode 在我们从按钮进行 Control-拖拽时已经为我们建立了连接。但是，`changeColor:`\
    \ 方法将在用户点击颜色面板中的颜色时被调用，即使颜色面板和我们的代码之间没有任何直接连接。这种“神奇”的效果要归功于一个名为响应者链的 Cocoa 概念（见侧边栏）。\n\
    \n### 响应者链\n\n响应者链是一个临时的对象集合，在应用程序的生命周期中，当需要时会动态收集，可以查询它们是否实现了特定的动作。这允许某些动作以通用方式配置，以便在运行时在最有意义的对象上被调用。该链按照特异性顺序排列，从“最靠近”动作的对象开始，一直延续到最通用的对象。在\
    \ Interface Builder 中，通过将动作连接到 nib 文件中的“第一响应者”图标来配置对象以使用响应者链，该图标不过是响应者链中第一个对象的代理，该对象会在运行时被询问是否实现了某个特定方法时回答“是的，我能”。\n\
    \n每个窗口都有自己的“第一响应者”概念，这通常是用户最后与之交互的控件或视图（从而使其成为接收按键等操作的可能候选对象），这一事实让事情变得更加令人困惑。\n\
    \n让我们尝试通过一个例子来澄清这一点。考虑一个按钮，其目标/动作被配置为在第一响应者上调用一个名为 `showThing:` 的方法。当用户点击该按钮时，会按顺序询问一个对象列表中的每个对象是否实现了\
    \ `showThing:` 方法，直到其中一个对象回答 `YES`，此时该对象的 `showThing:` 方法被调用，响应者链的工作就完成了。以下是响应者链可能的样子示例：\n\
    \n-   窗口的“第一响应者”（当前处于焦点并接受键盘输入的视图）、其父视图、父视图的父视图，依此类推，向上遍历窗口内的视图层次结构\n-   窗口本身\n\
    -   窗口的委托\n-   应用程序对象 `NSApp`\n-   应用程序对象的委托\n\n响应者链还可能包含其他对象，特别是当我们处理基于文档的应用程序时，在这种情况下，已打开的文档及其控制器也会在链中占据一席之地。更多内容请参见第\
    \ 12 章。\n\n一旦这些对象中的任何一个声明它实现了 `showThing:`，那么该方法就会在该对象上被调用，并且搜索结束。\n"
- fmt: '现在保存工作并点击运行。我们的新应用将会出现，点击按钮会弹出颜色面板。在不同颜色上点击，所选文本的颜色会立即改变以反映新的选择。


    那么，鉴于颜色面板与我们应用的委托没有直接联系，我们自然会好奇：这是如何工作的？应用委托中的`changeColor:`方法是如何被调用的？关键在于响应者链的运用，如前所述。`NSColorPanel`通过响应者链寻找实现了`changeColor:`方法的对象。作为应用委托，我们的小控制器对象是最后一个被查询是否实现该方法的对象之一，由于它确实实现了，因此被调用。请注意，如果窗口本身实现了该方法，或者它有实现了该方法的委托，那么这些方法中的其中一个会被调用。


    现在我们需要用一个现实的检验来结束这一节。实际上，我们刚才所做的事情可以通过使用`NSColorWell`来更轻松（也更美观）地完成，这是一个特殊的控件，点击时会启动`NSColorPanel`。我们只需要编写代码在控制器类中声明一个属性来包含`NSColor`，然后使用
    Cocoa 绑定将`NSColorWell`的 Value 属性和`NSTextField`的 Text Color 属性绑定到控制器中的属性。这个示例原样包含在此处，主要是为了向你展示如何从自己的代码中使用颜色面板，并让你初次了解响应者链的概念。


    ### 字体面板


    我们要看的下一个特殊面板是`NSFontPanel`。与颜色面板不同，字体面板没有关联的控件来启动它。但是，它可以相当容易地与系统**格式**菜单的内容集成，稍后我们将看到这一点。


    我们要做的是在 WindowLab 窗口中添加一个按钮，该按钮将触发一个动作方法来打开字体面板，以及另一个更新文本字段的方法。首先，将 WindowLab
    窗口拉高一些。然后选择打开颜色面板的按钮，并复制它。将新按钮的标题改为 Show Font Panel。打开一个辅助编辑器窗格，显示`WLAppDelegate.h`文件，从按钮按住
    Control 键拖拽到辅助编辑器窗格，目标定在现有动作方法下方。插入一个新的动作，并命名为`showFontPanel`。


    添加该动作将导致在`WLAppDelegate.h`文件的类`@interface`块内添加以下方法声明：


    `- (IBAction)showFontPanel:(id)sender;`


    以下存根将添加到`WLAppDelegate.m`文件的`@implementation`中：


    `- (IBAction)showFontPanel:(id)sender {`


    `}`


    切换到`.m`文件，并在`@implementation`部分填写以下代码：


    `- (IBAction)showFontPanel:(id)sender`


    `{`


      `NSFontPanel *panel = [NSFontPanel sharedFontPanel];`


      `NSFontManager *manager = [NSFontManager sharedFontManager];`


      `[manager setSelectedFont:[self.title font] isMultiple:NO];`


      `[panel orderFront:nil];`


    `}`


    `- (void)changeFont:(id)sender`


    `{`


      `// here, ''sender'' is the shared NSFontManager instance`


      `NSFont *oldFont = [self.title font];`


      `NSFont *newFont = [sender convertFont:oldFont];`


      `[self.title setFont:newFont];`


    `}`


    这与颜色面板的使用模式相同。当用户点击字体时，字体面板使用响应者链寻找实现了`changeFont:`动作方法的对象，并成功在我们的应用委托中找到了它。这里的情况稍微复杂一些，因为在两个方法中我们都使用了`NSFontManager`类的共享实例。运行中应用关于选定或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它来间接告诉`NSFontPanel`应开始显示哪种字体，然后在`changeFont:`中再次使用它来获取新选定的字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态相结合（例如，如果旧字体是
    Lucida Grande/Bold/36，而用户选择了 Times New Roman 并保持其他设置不变，转换后的字体将是 Times New Roman/Bold/36）。


    现在，保存工作，回到 Xcode，并点击运行。我们现在可以同时更改显示文本的颜色和字体（见图 11-4）。


    ![A978-1-4302-4543-8_11_Fig4_HTML.jpg](A978-1-4302-4543-8_11_Fig4_HTML.jpg)


    **图 11-4.** 设置标签的颜色和字体


    ## 拥有独立 Nib 的控制器


    接下来，我们将演示一个在 Cocoa 开发中常见的简单模式：创建一个加载自己 nib 文件的控制器类，成为文件中所有对象的“所有者”。到目前为止，我们创建的所有应用程序中，所有
    GUI 元素都包含在应用的单个`.xib`文件中。这对于简单应用来说效果不错，但有其局限性。首先，我们在 nib 中只有每个窗口和每个控制器的一个实例。其次，整个主
    nib 文件在应用程序启动时一次性加载，而 nib 中的内容越多，启动阶段的速度就会越慢，占用的内存也越多。诚然，在现代拥有数 GB RAM 的计算机上，这可能不是什么大问题，但作为程序员，始终不浪费
    CPU 和 RAM 是个好习惯。最后，将过多的顶层对象（窗口、控制器等）放入一个 nib 文件中，会让程序员（你）的工作更加困难，因为很难看出哪些控制器和窗口属于同一组。


    这两个问题的解决方案是将一些 GUI 对象分发到其他 nib 文件中，并通过加载这些 nib 的控制器类来管理它们的使用。许多 Cocoa 应用都使用了这种技术，通常将偏好设置、文档、工具等窗口拆分到独立的
    nib 文件中。接下来的章节将以递增的复杂度演示两种实现此目的的不同方法。'
  raw: 'Now save the work and hit Run. Our new app will appear, and clicking the button
    will bring up the color panel. Click around on some different colors, and the
    color of the selected text will immediately change to reflect the new selection.


    So, considering that the color panel has no direct connection to our app delegate,
    it’s fair to wonder: how does that work? How does the `changeColor:` method in
    our app delegate get called? The key is the use of the responder chain, as described
    earlier. `NSColorPanel` uses the responder chain to find an object that implements
    the `changeColor:` method. As the application’s delegate, our little controller
    object is one of the last objects queried to see if it implements the method,
    and since it does, it gets called. Note that if the window implemented the method
    itself, or if it had a delegate that implemented the method, one of those methods
    would have been called instead.


    Now we need to end this section with a reality check. In reality, what we just
    did can be more easily (and more handsomely) accomplished by using an `NSColorWell`,
    a special control that launches the `NSColorPanel` when clicked. We’d only need
    to write code to declare a property in a controller class to contain an `NSColor`,
    and then use Cocoa Bindings to bind the `NSColorWell`’s Value attribute and the
    `NSTextField`’s Text Color attribute to the property in our controller. This example
    is included here, as-is, mainly to show you how to use the color panel from your
    own code, as well as give you a first look at the responder chain concept.


    #### The Font Panel


    The next special panel we’re going to look at is `NSFontPanel`. Unlike the color
    panel, the font panel does not have a matching control that launches it. However,
    it can be integrated fairly easily with the contents of the system’s Format menu,
    as we’ll see a little later.


    What we’re going to do here is add a button to our WindowLab window that will
    trigger an action method that opens the font panel and another method that will
    update the text field. Start by making the WindowLab window a little taller. Then
    select the button that opens up the Color panel, and duplicate it. Title the new
    button Show Font Panel. Open up an Assistant Editor pane showing the `WLAppDelegate.h`
    file, and Control-drag from the button to the Assistant Editor pane, aiming just
    below the existing action methods. Insert a new action, and name it `showFontPanel`.


    Adding the action will cause the following method declaration to be added inside
    the class’s `@interface` block, in the `WLAppDelegate.h` file:


    `- (IBAction)showFontPanel:(id)sender;`


    The following stub will be added to the `@implementation` in the `WLAppDelegate.m`
    file:


    `- (IBAction)showFontPanel:(id)sender {`


    `}`


    Switch to the `.m` file and fill in the following code in the `@implementation`
    section


    `- (IBAction)showFontPanel:(id)sender`


    `{`


      `NSFontPanel *panel = [NSFontPanel sharedFontPanel];`


      `NSFontManager *manager = [NSFontManager sharedFontManager];`


      `[manager setSelectedFont:[self.title font] isMultiple:NO];`


      `[panel orderFront:nil];`


    `}`


    `- (void)changeFont:(id)sender`


    `{`


      `// here, ''sender'' is the shared NSFontManager instance`


      `NSFont *oldFont = [self.title font];`


      `NSFont *newFont = [sender convertFont:oldFont];`


      `[self.title setFont:newFont];`


    `}`


    This follows the same usage pattern as the color panel. When the user clicks on
    a font, the font panel uses the responder chain to look for an object that implements
    the `changeFont:` action method, and it manages to find it in our app delegate.
    Here, things are slightly more complicated because in both of these methods we
    make use of a shared instance of the `NSFontManager` class. A running application’s
    notion of the selected or current font is held within this shared instance, which
    we use first in `showFontPanel:` to indirectly tell the `NSFontPanel` which font
    it should begin displaying, and then again in `changeFont:` to get the new selected
    font. We get the new font by passing the old font to the font manager’s `convertFont:`
    method, which combines characteristics of the old font with the state of the user’s
    selection in the font panel (for example, if the old font is Lucida Grande/Bold/36,
    and the user selects Times New Roman, leaving the rest alone, the converted font
    will be Times New Roman/Bold/36).


    Now, save the work, go back to Xcode, and hit Run. We can now change both the
    color and the font for the displayed text (see Figure [11-4](#A978-1-4302-4543-8_11_Chapter.html#Fig4)).


    ![A978-1-4302-4543-8_11_Fig4_HTML.jpg](A978-1-4302-4543-8_11_Fig4_HTML.jpg)


    Figure 11-4.


    Setting a label’s color and font


    ## A Controller With a Nib of Its Own


    Next, we’re going to demonstrate a simple pattern that occurs often in Cocoa development:
    making a controller class that loads its own nib file, becoming the “owner” of
    all the objects in the file. In every application we’ve created so far, all the
    GUI elements are contained inside the application’s single .xib file. This works
    well enough for simple applications, but it has its limits. For one thing, we
    only have one instance of each window and each controller in the nib. For another
    thing, the entire main nib file is loaded at once, when the application is starting
    up, and the more stuff you have in that nib, the slower and more memory-intensive
    the startup phase will be. Granted, on modern computers with several gigabytes
    of RAM, this may not be such a huge problem, but as a programmer it’s always good
    to try to not waste CPU and RAM recklessly. Finally, putting too many top-level
    objects (windows, controllers, and the like) into a single nib file makes life
    more difficult for you, the programmer, because it’s harder to see which controllers
    and windows belong together.


    The solution to both of these problems is to distribute some of the GUI objects
    into other nib files, and mediate their use with controller classes that load
    the nibs. This technique is used by many Cocoa applications, which commonly split
    windows for preferences, documents, tools, and so on into separate nib files.
    The following sections will demonstrate two different ways of doing this, with
    increasing complexity.'
