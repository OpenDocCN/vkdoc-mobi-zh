- fmt: '### The Attributes Inspector


    Let’s start off with a look at the Attributes Inspector. (If you don’t see it,
    press `⌥⌘4` to show that pane in the Utility area, then single-click your label.)
    The Inspector should look like Figure [2-10](#A978-1-4302-4543-8_2_Chapter.html#Fig10).


    We can use the Attributes Inspector to change the appearance of our label. We
    can change attributes like text alignment, border, and scrolling behavior. Interestingly,
    several of these fields will actually do nothing. Go ahead and type something
    into the Placeholder field. Doesn’t change the appearance of the label at all,
    does it?


    What’s going on here? When we pull a label out of the library, we are grabbing
    an instance of the `NSTextField` class. The `NSTextField` class is used for both
    static and editable text fields. In an editable text field, the placeholder is
    that gray text we see in some text fields when they are empty, which tells us
    what the field is for.


    ![A978-1-4302-4543-8_2_Fig10_HTML.jpg](A978-1-4302-4543-8_2_Fig10_HTML.jpg)

    Figure 2-10. The Attribute Inspector showing all the attributes of the label that
    can be edited in Interface Builder


    When a text field is configured as a label, there’s no need for a placeholder.
    It doesn’t hurt to provide one, but it doesn’t help, either.


    There are too many context-specific attributes to be able to enumerate them all
    in this book, but we will walk through the non-obvious ones. As you make your
    way through the book, you’ll become comfortable with most of the attributes that
    you find yourself using.


    Let’s change the size of the label. If the label is not selected, single-click
    it to select it. A dot should appear on either side of the label. These dots are
    resize handles, which allow us to change the size of the selected item. Most objects
    in Interface Builder have four resize handles, one in each corner, which allow
    us to adjust the size in all four directions. Certain items, like labels, have
    only two resize handles. The label’s attributes (the size of its font in particular)
    determine the vertical size of the label. We don’t change the height of the label
    by resizing it. We only use the resize handles to change the width of the label.


    Let’s center the label. Make sure the left side of the label is lined up with
    the blue guideline near the left edge of the window. Then, grab the right resize
    handle and drag out the label until we get to the blue guideline near the right
    edge of the window. When done, the label should look like Figure [2-11](#A978-1-4302-4543-8_2_Chapter.html#Fig11).


    ![A978-1-4302-4543-8_2_Fig11_HTML.jpg](A978-1-4302-4543-8_2_Fig11_HTML.jpg)

    Figure 2-11. Our application’s window in Interface Builder, after resizing the
    label


    Now, with the label still selected, look for a row of buttons labeled Alignment
    in the Attributes Inspector, and select the Center Text button (Figure [2-12](#A978-1-4302-4543-8_2_Chapter.html#Fig12)).
    Also, look for a pop-up menu labeled Behavior, and set it to be Selectable, which
    tells Cocoa that we want to allow the user to copy this label to the pasteboard
    if they want. By default, labels are not selectable, but we just changed that.


    ![A978-1-4302-4543-8_2_Fig12_HTML.jpg](A978-1-4302-4543-8_2_Fig12_HTML.jpg)

    Figure 2-12. The alignment buttons in the Attributes Inspector for the label,
    set to centered text


    ### Change the Label’s Color and Font


    Let’s make one final change to our window’s content: let’s change the font, size,
    and color of the text. If we look at the Attributes Inspector, we can probably
    figure out how to change the color of the text, but there are some wrinkles to
    setting the font and size.


    First, let’s set the color. Look in the Attributes Inspector for a color well
    labeled Text Color. If we click it, the standard Mac OS X color picker will appear
    (Figure [2-13](#A978-1-4302-4543-8_2_Chapter.html#Fig13)) and we can select the
    color we want for the text. Go ahead and do that now, picking whatever color strikes
    your fancy.


    ![A978-1-4302-4543-8_2_Fig13_HTML.jpg](A978-1-4302-4543-8_2_Fig13_HTML.jpg)

    Figure 2-13. The standard Mac OS X color picker is used to select colors in Cocoa
    applications. Here, we’re using it in Interface Builder to set the color of our
    text


    Xcode itself is built using Cocoa and leverages a lot of built-in Cocoa functionality,
    such as the standard color picker. The Apple engineers do not want to reinvent
    the wheel any more than you do. When you write your own applications, you’ll be
    able to use this exact same color picker with just a few lines of code or, in
    some situations, without writing any code at all.


    Another piece of built-in Mac OS X functionality that you’ll be able to use in
    your applications is the standard font window, which allows you to change the
    font, size, and attributes of selected text. When creating applications that will
    be distributed to others, it is important to realize that you could select fonts
    that your user won’t have installed. In general, for standard GUI components,
    you’re probably better not changing the fonts at all. Consistent font usage is
    an important part of the GUI consistency that the Mac is known for. Most labels,
    buttons, and other controls use the Lucida Grande font by default. You can change
    the size of some labels, and switch them between bold and regular to highlight
    different things, but leave the font itself as it is. Xcode provides guidance
    in the Font field of the Attributes Inspector, as shown in Figure [2-14](#A978-1-4302-4543-8_2_Chapter.html#Fig14).
    Although the Font panel is available, Xcode also offers a callout window with
    quick access to the system-default fonts. If you know that you want the bold version
    of whatever is currently the system font, you can get it easily from the Font
    pull-down menu in this callout. Generally, this is what you’ll want to use for
    common user-interface elements, rather than explicitly setting the font.


    ![A978-1-4302-4543-8_2_Fig14_HTML.jpg](A978-1-4302-4543-8_2_Fig14_HTML.jpg)

    Figure 2-14. Xcode has a special font-selector callout to give easy access to
    the default fonts


    Press `^⇧⌘T` to bring up the font window in Xcode. Make sure that our label is
    still selected (look for the resize handles), and also make sure that our application’s
    main window is still the front-most window.


    Once we have our label looking just the way we like, we’ll put some finishing
    touches to our application, then run it. We’re almost there!'
