- fmt: "## Creating the Controller Class\n\nWe’re going to add some code to the `ButtonAppDelegate`\
    \ class. This class will be the controller that handles the click action for all\
    \ three of our buttons. In the window we just laid out, we set up three buttons\
    \ and one text field. When the user presses one of the buttons, the value of the\
    \ text field should be updated. Because we need to change the text displayed by\
    \ the text field, we’ll need an outlet to it. We’ll also need an action method\
    \ for the buttons to trigger. Because action methods receive a pointer to the\
    \ object that triggered them, we can use a single action method for all three\
    \ buttons. Let’s set up the outlet and action now.\n\nTo do this, we need to make\
    \ some connections from the user interface elements to our code. In the last chapter,\
    \ we discussed how to control-drag from one UI element to another. We’re going\
    \ to do something similar here.\n\nWith the nib file editor still open, we also\
    \ need to get a pane up that has your code. Click the Assistant button (which\
    \ looks like a butler’s torso) in the Editor group in the right side of the toolbar\
    \ in the main Xcode window. We can also get an Assistant Editor by typing ⌥⌘⏎.\
    \ The pane can be positioned side-by-side or below the nib Editor pane by selecting\
    \ a different option under `View` ➤ `Assistant Editor`.\n\nThe Assistant Editor\
    \ pane will show the name of the current file in a jump bar above the Editor area.\
    \ Select the file name and a pop-up menu will show the names `ButtonsAppDelegate.h`\
    \ and `ButtonsAppDelegate.m`. Select `ButtonAppDelegate.h` if it isn’t already\
    \ selected. We’ll see the class interface that Xcode generated for us. The generated\
    \ code will look like this (ignoring the comment block at the top of the file):\n\
    \n```\n#import <Cocoa/Cocoa.h>\n@interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>\n\
    @property (assign) IBOutlet NSWindow *window;\n@end\n```\n\nIn the last chapter,\
    \ we control-dragged from one user interface object to another. This time, we’re\
    \ going to control-drag from the nib to our code. In the nib Editor pane, click\
    \ the label that we added to our window. Now, control-drag from the label to the\
    \ `.h` file, dragging down to the blank line below the `@property` line, where\
    \ a blue line will extend out in the text editor indicating Insert Outlet or Action,\
    \ as shown in Figure [4-10](#A978-1-4302-4543-8_4_Chapter.html#Fig10). Let go\
    \ of the mouse button, and a small pop-up window will appear where we can configure\
    \ this new connection.\n\n![A978-1-4302-4543-8_4_Fig10_HTML.jpg](A978-1-4302-4543-8_4_Fig10_HTML.jpg)\n\
    \n**Figure 4-10.** Control-dragging from a nib object into a code editor to connect\
    \ an outlet or action\n\nIn this pop-up window, mark the connection as an Outlet,\
    \ and set the name to be “label.” Leave the other fields at the default settings,\
    \ and click Connect. Xcode will add a new line to the `.h` file that reads:\n\n\
    ```\n@property (weak) IBOutlet NSTextField *label;\n```\n\nThe property declaration\
    \ creates a new property named `label` as part of our class. The declaration also\
    \ includes the `IBOutlet` keyword, which will allow Xcode to find our outlet and\
    \ make it available to us in Interface Builder. Xcode also added a line to the\
    \ class implementation, which we can see by clicking the file name in the jump\
    \ bar and selecting `ButtonsAppDelegate.m`. This file now looks like this:\n\n\
    ```\n#import \"ButtonsAppDelegate.h\"\n@implementation ButtonsAppDelegate\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // Insert code here to initialize your application\n\
    }\n@end\n```\n\nDepending on your version of Xcode, you might also see a line\
    \ here that reads `@synthesize label`. If you do see it, it instructs the compiler\
    \ to create getter and setter methods for the `label` property. The newest versions\
    \ of Xcode don’t generate this line at all because the compiler can now automatically\
    \ infer when a property needs to have getter and setter methods generated, but\
    \ you’ll see it in older code, including in many of Apple’s sample code projects.\
    \ Whether you see it or not, since we connected this outlet to the label in the\
    \ window, the `label` property will automatically be connected to the label `NSTextField`\
    \ object when the nib file is loaded.\n\n### Implementing the Action Method\n\n\
    We’re going to do the same thing to create an action in our class. The only task\
    \ remaining before we can try out our program is to actually write the code that\
    \ will get called when a button is clicked, and we’ll do that now. This code will\
    \ look at the sender argument to determine the title of the button that was called,\
    \ use that title to create a string, and then use our label outlet to display\
    \ that string.\n\nIn the jump bar, select `ButtonsAppDelegate.h` to be displayed.\
    \ Next, select the button that we titled “Left.” Control-drag from the Left button\
    \ to the code, to the line below the `@property` that we created before. This\
    \ time, choose a connection type of Action. Name the action `buttonPressed:` and\
    \ leave the other fields as the default. When we click Connect, Xcode will create\
    \ a new instance method for us, which follows the conventions for actions. Like\
    \ the property we added, this will also be automatically connected when the nib\
    \ file is loaded.\n\nIf we switch back to the `.m` file, we’ll see a new empty\
    \ method that looks like this:\n\n```\n- (IBAction)buttonPressed:(id)sender {\n\
    \n}\n```\n\nWe’re going to fill this in with code to show which button was pressed\
    \ in the label. Type the following code into the body of the method:\n\n```\n\
    - (IBAction)buttonPressed:(id)sender {\n    NSString *title = [sender title];\n\
    \    NSString *labelText = [NSString stringWithFormat:@\"%@ button pressed.\"\
    , title];\n    [self.label setStringValue:labelText];\n}\n```\n\nThis method first\
    \ grabs the title of the button that called it. It then uses that button to create\
    \ a new string, and then uses that string to update the label. The method refers\
    \ to the property using dot notation for property access, which is just shorthand\
    \ for saying `[self label]`.\n\n#### Nesting Messages\n\nSome Objective-C developers\
    \ nest their message calls pretty deeply. You may come across code like this in\
    \ your travels:\n\n```\n[self.label setStringValue:[NSString stringWithFormat:@\"\
    %@ button pressed.\",\n    [sender title]]];\n```\n\nThis one line of code will\
    \ function exactly the same as the three lines of code that make up our `buttonPressed:`\
    \ method. For the sake of clarity, we won’t generally nest Objective-C messages\
    \ so deeply in the code examples in this book, with the exception of calls to\
    \ `alloc` and `init`, which, by longstanding convention, are almost always nested.\n\
    \nIn the previous chapter, we used the Simulate Document command to work with\
    \ the controls and connections that we’d set up. It worked in that chapter because\
    \ we had no code. This time, we’ve got some code, so we need to actually compile\
    \ and link the app. Click the Run button in the upper left-hand corner of the\
    \ Xcode window, or press ⌘R. If this is the first time you’ve tried to run custom\
    \ code, you may get a window asking if you want to enable developer mode on this\
    \ Mac. Go ahead and click that you want to enable it; you’ll be prompted for your\
    \ password as a security measure. Your code should compile cleanly, and then you’ll\
    \ see the Press a Button window. If you click the Left button, the label should\
    \ update to read “Left button pressed.” If you click the center or right buttons,\
    \ nothing will happen, because you haven’t wired those buttons up yet. We’ll do\
    \ that in a moment, but for now, note that you’ve got a live Cocoa app running\
    \ with your own code in it!\n\nQuit the app and you should be returned to Xcode,\
    \ right where you left it. You should still have the nib Editor pane open on one\
    \ side of the window, and the Assistant Editor open to your `.m` file. We’re going\
    \ to set up the connections between the Center and Right buttons and the `buttonPressed:`\
    \ action. As it happens, we can make the connection to an existing action either\
    \ the `.h` or the `.m` file."
  raw: '## Creating the Controller Class


    We’re going to add some code to the `ButtonAppDelegate` class. This class will
    be the controller that handles the click action for all three of our buttons.
    In the window we just laid out, we set up three buttons and one text field. When
    the user presses one of the buttons, the value of the text field should be updated.
    Because we need to change the text displayed by the text field, we’ll need an
    outlet to it. We’ll also need an action method for the buttons to trigger. Because
    action methods receive a pointer to the object that triggered them, we can use
    a single action method for all three buttons. Let’s set up the outlet and action
    now.


    To do this, we need to make some connections from the user interface elements
    to our code. In the last chapter, we discussed how to control-drag from one UI
    element to another. We’re going to do something similar here.


    With the nib file editor still open, we also need to get a pane up that has your
    code. Click the Assistant button (which looks like a butler’s torso) in the Editor
    group in the right side of the toolbar in the main Xcode window. We can also get
    an Assistant Editor by typing ⌥⌘⏎. The pane can be positioned side-by-side or
    below the nib Editor pane by selecting a different option under `View` ➤ `Assistant
    Editor`.


    The Assistant Editor pane will show the name of the current file in a jump bar
    above the Editor area. Select the file name and a pop-up menu will show the names
    `ButtonsAppDelegate.h` and `ButtonsAppDelegate.m`. Select `ButtonAppDelegate.h`
    if it isn’t already selected. We’ll see the class interface that Xcode generated
    for us. The generated code will look like this (ignoring the comment block at
    the top of the file):


    `#import <Cocoa/Cocoa.h>`


    `@interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@end`


    In the last chapter, we control-dragged from one user interface object to another.
    This time, we’re going to control-drag from the nib to our code. In the nib Editor
    pane, click the label that we added to our window. Now, control-drag from the
    label to the `.h` file, dragging down to the blank line below the `@property`
    line, where a blue line will extend out in the text editor indicating Insert Outlet
    or Action, as shown in Figure [4-10](#A978-1-4302-4543-8_4_Chapter.html#Fig10)
    . Let go of the mouse button, and a small pop-up window will appear where we can
    configure this new connection.


    ![A978-1-4302-4543-8_4_Fig10_HTML.jpg](A978-1-4302-4543-8_4_Fig10_HTML.jpg)


    Figure 4-10.


    Control-dragging from a nib object into a code editor to connect an outlet or
    action


    In this pop-up window, mark the connection as an Outlet, and set the name to be
    “label.” Leave the other fields at the default settings, and click Connect. Xcode
    will add a new line to the `.h` file that reads


    `@property (weak) IBOutlet NSTextField *label;`


    The property declaration creates a new property named `label` as part of our class.
    The declaration also includes the `IBOutlet` keyword, which will allow Xcode to
    find our outlet and make it available to us in Interface Builder. Xcode also added
    a line to the class implementation, which we can see by clicking the file name
    in the jump bar and selecting `ButtonsAppDelegate.m`. This file now looks like
    this:


    `#import "ButtonsAppDelegate.h"`


    `@implementation ButtonsAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `// Insert code here to initialize your application`


    `}`


    `@end`


    Depending on your version of Xcode, you might also see a line here that reads
    `@synthesize label`. If you do see it, it instructs the compiler to create getter
    and setter methods for the `label` property. The newest versions of Xcode don’t
    generate this line at all because the compiler can now automatically infer when
    a property needs to have getter and setter methods generated, but you’ll see it
    in older code, including in many of Apple’s sample code projects. Whether you
    see it or not, since we connected this outlet to the label in the window, the
    `label` property will automatically be connected to the label `NSTextField` object
    when the nib file is loaded.


    ### Implementing the Action Method


    We’re going to do the same thing to create an action in our class. The only task
    remaining before we can try out our program is to actually write the code that
    will get called when a button is clicked, and we’ll do that now. This code will
    look at the sender argument to determine the title of the button that was called,
    use that title to create a string, and then use our label outlet to display that
    string.


    In the jump bar, select `ButtonsAppDelegate.h` to be displayed. Next, select the
    button that we titled “Left.” Control-drag from the Left button to the code, to
    the line below the `@property` that we created before. This time, choose a connection
    type of Action. Name the action “buttonPressed:” and leave the other fields as
    the default. When we click Connect, Xcode will create a new instance method for
    us, which follows the conventions for actions. Like the property we added, this
    will also be automatically connected when the nib file is loaded.


    If we switch back to the `.m` file, we’ll see a new empty method that looks like
    this:


    `- (IBAction)buttonPressed:(id)sender {`


    `}`


    We’re going to fill this in with code to show which button was pressed in the
    label. Type the following code into the body of the method:


    `- (IBAction)buttonPressed:(id)sender {`


    `NSString *title = [sender title];`


    `NSString *labelText = [NSString stringWithFormat:@"%@ button pressed.", title];`


    `[self.label setStringValue:labelText];`


    `}`


    This method first grabs the title of the button that called it. It then uses that
    button to create a new string, and then uses that string to update the label.
    The method refers to the property using dot notation for property access, which
    is just shorthand for saying `[self label]`.


    NESTING MESSAGES


    Some Objective-C developers nest their message calls pretty deeply. You may come
    across code like this in your travels:


    `[self.label setStringValue:[NSString stringWithFormat:@"%@ button pressed."`,


    `[sender title]]];`


    This one line of code will function exactly the same as the three lines of code
    that make up our `buttonPressed:` method. For the sake of clarity, we won’t generally
    nest Objective-C messages so deeply in the code examples in this book, with the
    exception of calls to `alloc` and `init`, which, by longstanding convention, are
    almost always nested.


    In the previous chapter, we used the Simulate Document command to work with the
    controls and connections that we’d set up. It worked in that chapter because we
    had no code. This time, we’ve got some code, so we need to actually compile and
    link the app. Click the Run button in the upper left-hand corner of the Xcode
    window, or press ⌘R. If this is the first time you’ve tried to run custom code,
    you may get a window asking if you want to enable developer mode on this Mac.
    Go ahead and click that you want to enable it; you’ll be prompted for your password
    as a security measure. Your code should compile cleanly, and then you’ll see the
    Press a Button window. If you click the Left button, the label should update to
    read “Left button pressed.” If you click the center or right buttons, nothing
    will happen, because you haven’t wired those buttons up yet. We’ll do that in
    a moment, but for now, note that you’ve got a live Cocoa app running with your
    own code in it!


    Quit the app and you should be returned to Xcode, right where you left it. You
    should still have the nib Editor pane open on one side of the window, and the
    Assistant Editor open to your `.m` file. We’re going to set up the connections
    between the Center and Right buttons and the `buttonPressed:` action. As it happens,
    we can make the connection to an existing action either the `.h` or the `.m` file.'
  trans: "\n## 创建控制器类\n\n我们将向 `ButtonAppDelegate` 类中添加一些代码。该类将作为控制器，负责处理我们三个按钮的点击操作。在我们刚刚布置好的窗口中，我们设置了三个按钮和一个文本字段。当用户按下某个按钮时，文本字段的值应随之更新。由于我们需要修改文本字段显示的内容，因此需要为其创建一个输出口。同时，我们还需要一个供按钮触发的操作方法。由于操作方法会接收指向触发对象的指针，因此我们可以为三个按钮使用同一个操作方法。现在，我们就来设置这个输出口和操作方法。\n\
    \n为此，我们需要将用户界面元素与代码建立一些连接。在上一章中，我们讨论了如何从一个 UI 元素按住 Control 键拖拽到另一个 UI 元素。这里我们将执行类似的操作。\n\
    \n在 nib 文件编辑器仍处于打开状态时，我们还需要调出一个包含代码的窗格。点击 Xcode 主窗口工具栏右侧编辑器组中的“助理”按钮（其图标类似管家的上半身）。我们也可以通过键入\
    \ ⌥⌘⏎ 来打开助理编辑器。通过选择 `View` ➤ `Assistant Editor` 下的不同选项，可以将该窗格放置在 nib 编辑器窗格的侧边或下方。\n\
    \n助理编辑器窗格会在编辑器区域上方的跳转栏中显示当前文件的名称。点击文件名，会弹出一个菜单，显示 `ButtonsAppDelegate.h` 和 `ButtonsAppDelegate.m`\
    \ 两个名称。如果未选中 `ButtonAppDelegate.h`，请选择它。我们会看到 Xcode 为我们生成的类接口。生成的代码如下所示（忽略文件顶部的注释块）：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n@interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>\n\
    @property (assign) IBOutlet NSWindow *window;\n@end\n```\n\n在上一章中，我们从一个用户界面对象按住\
    \ Control 键拖拽到另一个对象。这次，我们要从 nib 文件按住 Control 键拖拽到我们的代码中。在 nib 编辑器窗格中，点击我们添加到窗口中的那个标签。然后，从标签按住\
    \ Control 键拖拽到 `.h` 文件中，向下拖拽到 `@property` 行下方的空白行处，此时文本编辑器中会出现一条蓝色线条，显示“插入输出口或操作”，如图\
    \ 4-10 所示。松开鼠标按钮，会出现一个小弹出窗口，我们可以在其中配置这个新连接。\n\n![A978-1-4302-4543-8_4_Fig10_HTML.jpg](img/A978-1-4302-4543-8_4_Fig10_HTML.jpg)\n\
    \n**图 4-10.** 从 nib 对象按住 Control 键拖拽到代码编辑器以连接输出口或操作\n\n在此弹出窗口中，将连接类型标记为 Outlet，并将名称设置为“label”。其他字段保留默认设置，然后点击\
    \ Connect（连接）。Xcode 会在 `.h` 文件中添加一行新代码，内容如下：\n\n```\n@property (weak) IBOutlet\
    \ NSTextField *label;\n```\n\n属性声明在我们的类中创建了一个名为 `label` 的新属性。该声明还包含了 `IBOutlet`\
    \ 关键字，这将允许 Xcode 找到我们的输出口，并使其在 Interface Builder 中可用。Xcode 还在类实现中添加了一行代码，我们可以通过点击跳转栏中的文件名并选择\
    \ `ButtonsAppDelegate.m` 来查看。该文件现在看起来如下：\n\n```\n#import \"ButtonsAppDelegate.h\"\
    \n@implementation ButtonsAppDelegate\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // 在此处插入代码以初始化你的应用程序\n}\n@end\n```\n\n根据你的 Xcode 版本，你可能会在这里看到一行\
    \ `@synthesize label`。如果看到它，这行代码会指示编译器为 `label` 属性生成 getter 和 setter 方法。最新版本的\
    \ Xcode 根本不会生成这行代码，因为编译器现在可以自动推断何时需要为属性生成 getter 和 setter 方法，但你在旧代码（包括 Apple 的许多示例代码项目）中会看到它。无论你是否看到这行代码，因为我们已将此输出口连接到窗口中的标签，所以当\
    \ nib 文件加载时，`label` 属性将自动连接到 `NSTextField` 标签对象。\n\n### 实现操作方法\n\n我们将执行相同的操作为我们的类创建一个操作。在尝试运行程序之前，剩下的唯一任务就是实际编写在按钮被点击时将调用的代码，我们现在就来做这件事。这段代码将查看\
    \ sender 参数以确定被调用按钮的标题，使用该标题创建一个字符串，然后使用我们的标签输出口来显示该字符串。\n\n在跳转栏中，选择显示 `ButtonsAppDelegate.h`。接下来，选择我们标题为“Left”的按钮。从\
    \ Left 按钮按住 Control 键拖拽到代码中，位于我们之前创建的 `@property` 行下方。这次，选择连接类型为 Action。将操作命名为\
    \ `buttonPressed:`，其他字段保留默认设置。当我们点击 Connect（连接）时，Xcode 会为我们创建一个新的实例方法，该方法遵循操作的约定。与我们添加的属性类似，当\
    \ nib 文件加载时，此操作也将自动连接。\n\n如果我们切回 `.m` 文件，会看到一个如下所示的新空方法：\n\n```\n- (IBAction)buttonPressed:(id)sender\
    \ {\n\n}\n```\n\n我们将用代码填充此方法，以在标签中显示按下了哪个按钮。将以下代码输入到方法体中：\n\n```\n- (IBAction)buttonPressed:(id)sender\
    \ {\n    NSString *title = [sender title];\n    NSString *labelText = [NSString\
    \ stringWithFormat:@\"%@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n\
    }\n```\n\n此方法首先获取调用它的按钮的标题。然后使用该按钮创建一个新字符串，再使用该字符串更新标签。该方法使用点表示法来访问属性，这只是 `[self\
    \ label]` 的简写方式。\n\n#### 嵌套消息\n\n一些 Objective-C 开发者会非常深度地嵌套消息调用。你在开发过程中可能会遇到如下代码：\n\
    \n```\n[self.label setStringValue:[NSString stringWithFormat:@\"%@ button pressed.\"\
    ,\n    [sender title]]];\n```\n\n这行代码的功能完全等同于构成我们 `buttonPressed:` 方法的三个代码行。为了清晰起见，在本书的代码示例中，我们通常不会如此深度地嵌套\
    \ Objective-C 消息，除了对 `alloc` 和 `init` 的调用（根据长期以来的约定，这两者几乎总是被嵌套的）。\n\n在上一章中，我们使用“模拟文档”命令来操作我们设置好的控件和连接。当时这样操作是可行的，因为我们没有编写代码。这次，我们已有了一些代码，因此需要实际编译和链接应用程序。点击\
    \ Xcode 窗口左上角的“运行”按钮，或按下 ⌘R。如果这是你第一次尝试运行自定义代码，可能会出现一个窗口询问是否要在本 Mac 上启用开发者模式。请继续点击启用；系统会提示你输入密码作为安全措施。你的代码应该能顺利编译，然后你会看到“按下一个按钮”窗口。如果你点击\
    \ Left 按钮，标签应更新显示为“Left button pressed。”如果你点击中间或右侧按钮，什么也不会发生，因为你尚未连接这些按钮。稍后我们会处理这个连接，但现在请注意，你已经成功运行了一个包含自己代码的、活生生的\
    \ Cocoa 应用程序！\n\n退出该应用程序，你会返回 Xcode，并停留在你离开时的位置。你应该仍能看到窗口一侧打开着 nib 编辑器窗格，另一侧是已打开到\
    \ `.m` 文件的助理编辑器。接下来，我们将为 Center 和 Right 按钮与 `buttonPressed:` 操作建立连接。实际上，我们可以从\
    \ `.h` 或 `.m` 文件向现有操作建立连接。\n"
- fmt: "Select the `Center` button in the nib, and control-drag to the `buttonPressed:`\
    \ method in either the `.h` or the `.m` file. When the pointer reaches a valid\
    \ action, the action will highlight in a blue outline and a small window will\
    \ appear saying “Connect Action.” Let go, and the connection is in place. Do the\
    \ same with the `Right` button.\n\nAs before, click the `Run` button in the upper\
    \ left-hand corner of the Xcode window, and the app will compile and launch. This\
    \ time, clicking any of the three buttons will update the label. The one action\
    \ method handles all three buttons appropriately. Move the window to a new location\
    \ and quit the application. Press `⌘R` to launch the program again, and the window\
    \ should come up in exactly the same position it was in when we quit the program.\
    \ If we click the yellow `Minimize` button in the title, the window will shrink\
    \ down into our dock (click it in the dock to maximize it), and if we click `⌘W`\
    \ or click the red close button in the window, the window will close. Unfortunately,\
    \ the application is still running, but there’s no way to get the window back\
    \ open. Let’s address that now by configuring our application to quit when the\
    \ window is closed. To do this, we’ll have to use something called the application\
    \ delegate.\n\n## The Application Delegate\n\nEvery Cocoa application has one\
    \ and only one instance of a class called `NSApplication`. We don’t need to interact\
    \ with `NSApplication` directly very much. It’s created for us and handles the\
    \ event loop (the part of our application that notices user input from the mouse\
    \ and keyboard, and handles the input by sending messages to the appropriate objects)\
    \ and most of the lower-level stuff without us having to give it much thought.\n\
    \nExpand the `Supporting Files` folder in the Project Navigator pane, and single-click\
    \ `main.m`. In that file is our application’s `main()` function, which is the\
    \ function that gets called when our application is launched. This function contains\
    \ only one line of code, which calls a function named `NSApplicationMain()`. That\
    \ function, which is part of Cocoa, automatically creates an instance of `NSApplication`\
    \ for us. That instance of `NSApplication` goes into a loop and continuously polls\
    \ for events from the keyboard, mouse, operating system, and other applications,\
    \ and then responds to those events (don’t worry about the specifics for now;\
    \ we’ll learn more about events later in the book). When it detects an event that\
    \ signifies that the application should quit, the event loop stops and the application’s\
    \ execution ends.\n\n`NSApplication` allows us to specify an optional object to\
    \ act as its delegate. Simply put, a delegate is a class that handles certain\
    \ tasks on behalf of another class. The application delegate allows our application\
    \ to take actions at certain points in the lifecycle of the application so that\
    \ we can avoid the messiness of having to subclass `NSApplication`.\n\nThe application\
    \ delegate can be of any instance of any class, but only one object can be the\
    \ application delegate. Nearly every application will need an application delegate\
    \ object. Because this is a common pattern, the `ButtonsAppDelegate` class that\
    \ was created for us is already configured in the nib file to be the application\
    \ delegate. The `ButtonsAppDelegate` class declaration in the `ButtonsAppDelegate.h`\
    \ file declares that the class implements the `NSApplicationDelegate` protocol.\n\
    \n### Configuring the Application to Quit on Window Close\n\nSingle-click `ButtonsAppDelegate.m`\
    \ and add a method named `applicationShouldTerminateAfterLastWindowClosed:`, as\
    \ shown in bold below:\n\n```\n#import \"ButtonsAppDelegate.h\"\n\n@implementation\
    \ ButtonsAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // Insert code here to initialize your application\n\
    }\n\n- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication *)sender\
    \ {\n    return YES;\n}\n\n- (IBAction)buttonPressed:(id)sender {\n    NSString\
    \ *title = [sender title];\n    NSString *labelText = [NSString stringWithFormat:@\"\
    %@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n}\n\
    \n@end\n```\n\nThis new method is one of those special application delegate methods.\
    \ At certain predefined times during the application’s run, `NSApplication` will\
    \ look to see if its delegate has implemented a particular method. If the delegate\
    \ has, `NSApplication` will call that method. This method we just implemented\
    \ exists to let us change the behavior of `NSApplication` without subclassing\
    \ it. The default behavior is for `NSApplication` to keep running until it is\
    \ specifically told to quit, even if there are no windows open. It is acceptable\
    \ for applications to quit when their last (or only) window is closed, however,\
    \ and this method is provided specifically to let the delegate alter this behavior.\n\
    \nRun the application again, and close the application’s main window when it comes\
    \ up. The application should now quit because the application’s only window has\
    \ been closed.\n\n## Using the Documentation Browser\n\nSo how do we know what\
    \ these application delegate methods are? It’s hard to implement methods if we\
    \ don’t know what they are. Fortunately, they’re generally easy to find. If you\
    \ look at the method we just added, it takes one argument, which is a pointer,\
    \ to the `NSApplication` instance that called the method. Hold down the `Option`\
    \ key and double-click the word `NSApplication` in the Editing pane. This will\
    \ open up the Documentation Browser to the definition of the word we just clicked,\
    \ which is `NSApplication` (Figure [4-11](#A978-1-4302-4543-8_4_Chapter.html#Fig11)).\n\
    \n![A978-1-4302-4543-8_4_Fig11_HTML.jpg](A978-1-4302-4543-8_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11.\n\nThe Documentation Browser in Xcode, showing the `NSApplication`\
    \ Class Reference\n\nHowever, in this case, we won’t find the delegate methods\
    \ for `NSApplication` documented in this file. Beginning in OS X 10.6, Apple began\
    \ refactoring delegate methods into separate protocols and moved the documentation\
    \ about these methods into the documentation about the protocol. Many Cocoa classes\
    \ have associated delegate protocols—`NSApplication`, `NSBrowser`, `NSToolbar`,\
    \ `NSWindow`, to name a few. When reading the documentation on a class, it’s important\
    \ to also look for an associated delegate protocol with the same name: the delegate\
    \ protocol for `NSApplication` is named `NSApplicationDelegate`.\n\nTo browse\
    \ the documentation tree, right-click in the `NSApplication` Class Reference document,\
    \ and select `Reveal in Library`. This will show the documentation tree, with\
    \ `NSApplication` selected. Below the `NSApplication` Class Reference is the `NSApplicationDelegate`\
    \ Protocol Reference, which has the documentation we’re looking for.\n\nIt’s worth\
    \ your time to spend a few minutes looking over the application delegate methods\
