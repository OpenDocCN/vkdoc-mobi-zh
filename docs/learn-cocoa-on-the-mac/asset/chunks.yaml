  raw: '### Creating the Default Villain


    Now it’s time to create a new villain object containing all the attributes that
    users can edit in the application. As mentioned earlier, we’re not creating a
    “real” model class to contain a villain, instead going with the simpler option
    of using an `NSMutableDictionary`. We’ll create it inside an `NSApplication` delegate
    method called `applicationDidFinishLaunching:`. Nearly every Cocoa app needs to
    do some setup work at launch time, so Xcode generated the stub of this method
    for us when it generated the class. Now we’ll fill in an implementation.


    Here’s the code:


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {`


      `self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:`


                      `@"Lex Luthor", kName`,


                      `@"Smallville", kLastKnownLocation`,


                      `[NSDate date], kLastSeenDate`,


                      `@"Superman", kSwornEnemy`,


                      `@"Revenge", kPrimaryMotivation`,


                      `[NSArray arrayWithObjects:@"Evil Genius", nil], kPowers`,


                      `@"Superhero action", kPowerSource`,


                      `@9, kEvilness`,


                      `[NSImage imageNamed:@"NSUser"], kMugshot`,


                      `@"", kNotes`,


                      `nil];`


    `}`


    This code sets up all the attributes for a default villain that most people are
    familiar with. The `initWithObjectsAndKeys`: method fills the dictionary with
    a nil-terminated list of paired values and keys. For the sake of legibility, we’ve
    put each value/key pair on a line of its own. We’re already familiar with the
    `@"string"` syntax to make a new `NSString` literal, but the `@9` is new. This
    is shorthand for `[NSNumber numberWithInt:9]`. Note that the `mugshot` attribute
    is being set to a pre-existing `NSImage` instance, one of several that are included
    in Cocoa and are available for anyone to use in their applications. Now is a good
    time to once again compile the app in Xcode just to make sure we’ve got everything
    right so far, but there’s still no point in actually running the app just yet.
    The GUI has been created, but nothing’s actually working so far.


    Note


    You may be wondering why you’re putting initialization code for an `NSApplication`’s
    delegate into the `applicationDidFinishLaunching:` method, instead of into the
    `init` method. Objects that are loaded from the application’s main nib file are
    always in a special predicament: they are being initialized as a substep in the
    application’s own initialization routine, which means that at the time `init`
    is called on any object in the main nib file, the `NSApplication` itself may not
    be fully initialized! This has lots of repercussions, especially where the user
    interface is concerned, so often it’s best to postpone your initialization until
    everything is truly ready. Because the `VillainTrackerAppDelegate` is set up to
    be the delegate of `NSApplication`, you have a handy way to notice when the application
    is really ready by implementing the `applicationDidFinishLaunching:` method.


    ### Paying Attention to Detail


    The previous code created a villain object, but if we were to build and run our
    app right now, we wouldn’t see any sign of the villain. All the controls on the
    window would be blank because we haven’t populated any of them with values from
    our villain’s attributes. Now it’s time to change that. In the `VillainTrackerAppDelegate`
    class, we’re going to create a new private method called `updateDetailViews`,
    which sets up all the GUI objects to display the attributes of the current villain.
    We’re putting this functionality into a method of its own (as opposed to setting
    things up right inside of `applicationDidFinishLaunching:`) so that we can refresh
    our views whenever necessary, not just when the application launches. We’ll go
    through the process of displaying the villain’s attributes, and we’ll gain some
    familiarity with the basics of interacting with the various classes in our GUI.


    Let’s start off by creating a simple “stub” of the new method. We want this method
    to be accessible from anywhere in our class, but not from the outside. One way
    to do this is to simply not add it to the `@interface` declaration in the `.h`
    file. So, just above the `@end` declaration at the bottom of the `VillainTrackerAppDelegate.m`
    file, insert the following code:


    `- (void)updateDetailViews {`


    `}`


    Before we begin implementing the new method, we need to make sure we’re already
    set up to call it by inserting the following line at the end of `applicationDidFinishLaunching:`


    `// insert this at the end of applicationDidFinishLaunching:`


      `[self updateDetailViews];`


    Do a quick compile to make sure that what we have so far compiles cleanly. Now
    it’s time to start implementing the `updateDetailViews` method and finally see
    some villain data in our window!


    #### Setting Simple Values


    The first two controls we’re going to set up for display are the two `NSTextFields`
    containing the villain’s name and last known location. `NSTextField` can directly
    accept numbers and other sorts of input as well, but we’re just passing along
    a simple string for each of these using `setStringValue:`. Place these lines at
    the start of `updateDetailViews`, which we defined with an empty set of brackets
    just a few paragraphs ago:


    `[self.nameView setStringValue:[self.villain objectForKey:kName]];`


    `[self.lastKnownLocationView setStringValue:`


                      `[self.villain objectForKey:kLastKnownLocation]];`


    Note that we’re reusing the preprocessor macros we defined earlier, so we don’t
    have to worry about mistyping a string value. Now we should be able to compile
    the app, run it, and actually see some data in the window’s text fields!


    Next we’ll set the `NSDateView`’s value. Add this to the end of `updateDetailViews`:


     `[self.lastSeenDateView setDateValue:`


                      `[self.villain objectForKey:kLastSeenDate]];`


    This is obviously quite similar to what we did for the `NSTextFields`: similar
    use of preprocessor macros, calling the relevant method for the target object
    (`setDateValue:` in this case), and so on. Once again we should compile and run
    after entering this code to make sure that it works and that the correct date
    (today’s date) is shown in the date view.


    Now that we know the pattern here, let’s take a bigger step forward and see how
    to set values for all the remaining “simple” controls at once. We can either compile
    and run after each of these to check our work as we go, or if we’re feeling a
    little lucky, just enter all of them and then compile and run at the end. Add
    these lines to the end of the `updateDetailViews` method:


      `[self.evilnessView setIntegerValue:`


                      `[[self.villain objectForKey:kEvilness] integerValue]];`


      `[self.powerSourceView setTitle:[self.villain objectForKey:kPowerSource]];`


      `[self.mugshotView setImage:[self.villain objectForKey:kMugshot]];`


      `[self.notesView setString:[self.villain objectForKey:kNotes]];`


    The only complication here is for the `evilnessView`. The view expects an `NSInteger`
    with which to set its value, but our villain has its evilness value stored as
    an `NSNumber` inside a dictionary, so we have the added step of converting the
    object into an `NSInteger`.'
  trans: "\n### 创建默认反派\n\n现在，我们创建一个新的反派对象，包含用户在应用中可编辑的所有属性。如前所述，我们不会创建一个“真正的”模型类来容纳反派，而是选择使用\
    \ `NSMutableDictionary` 这一更简单的方案。我们将在名为 `applicationDidFinishLaunching:` 的 `NSApplication`\
    \ 委托方法中创建它。几乎所有 Cocoa 应用都需要在启动时做一些初始化工作，因此 Xcode 在生成该类时已为我们创建了该方法的存根。现在，我们将填充其实现。\n\
    \n代码如下：\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n\n  self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n\
    \n                  @\"Lex Luthor\", kName,\n\n                  @\"Smallville\"\
    , kLastKnownLocation,\n\n                  [NSDate date], kLastSeenDate,\n\n \
    \                 @\"Superman\", kSwornEnemy,\n\n                  @\"Revenge\"\
    , kPrimaryMotivation,\n\n                  [NSArray arrayWithObjects:@\"Evil Genius\"\
    , nil], kPowers,\n\n                  @\"Superhero action\", kPowerSource,\n\n\
    \                  @9, kEvilness,\n\n                  [NSImage imageNamed:@\"\
    NSUser\"], kMugshot,\n\n                  @\"\", kNotes,\n\n                 \
    \ nil];\n\n}\n```\n\n这段代码为大多数人都熟悉的默认反派设置了所有属性。`initWithObjectsAndKeys:` 方法通过一个以\
    \ nil 结尾的键值对列表来填充字典。为了便于阅读，我们将每个值/键对单独放在一行。我们熟悉用 `@\"string\"` 语法创建新的 `NSString`\
    \ 字面量，但 `@9` 是第一次出现。这是 `[NSNumber numberWithInt:9]` 的简写形式。请注意，`mugshot` 属性被设置为一个预先存在的\
    \ `NSImage` 实例，这是 Cocoa 内置且可免费用于任何应用的图像之一。现在适合再次在 Xcode 中编译应用，以确保到目前为止一切正确，但目前仍没必要实际运行应用。GUI\
    \ 已经创建，但尚未有任何功能实际生效。\n\n**注意**\n\n您可能会疑惑，为什么将 `NSApplication` 委托的初始化代码放入 `applicationDidFinishLaunching:`\
    \ 方法，而不是 `init` 方法。从应用主 nib 文件加载的对象始终处于一种特殊困境：它们作为应用自身初始化例程的一个子步骤被初始化，这意味着在调用主\
    \ nib 文件中任何对象的 `init` 方法时，`NSApplication` 本身可能尚未完全初始化！这会产生很多影响，尤其是在用户界面方面，因此最好将初始化推迟到一切就绪之后。因为\
    \ `VillainTrackerAppDelegate` 被设置为 `NSApplication` 的委托，所以通过实现 `applicationDidFinishLaunching:`\
    \ 方法，您就能方便地获知应用何时真正准备就绪。\n\n### 关注细节\n\n之前的代码创建了一个反派对象，但如果现在构建并运行我们的应用，我们看不到反派的任何迹象。窗口上的所有控件都是空白的，因为我们还没有用反派属性中的值填充它们。现在，我们来改变这一点。在\
    \ `VillainTrackerAppDelegate` 类中，我们将创建一个名为 `updateDetailViews` 的新私有方法，用于设置所有 GUI\
    \ 对象以显示当前反派的属性。我们将此功能封装到一个独立的方法中（而不是直接在 `applicationDidFinishLaunching:` 中设置），以便在需要时（不仅仅是应用启动时）能够刷新视图。我们将逐步完成反派属性的显示过程，并熟悉与\
    \ GUI 中各种类交互的基本知识。\n\n首先，创建新方法的简单“存根”。我们希望该方法在类内部可访问，但对外部不可见。实现方法之一是不在 `.h` 文件的\
    \ `@interface` 声明中添加该方法。因此，在 `VillainTrackerAppDelegate.m` 文件底部的 `@end` 声明之前，插入以下代码：\n\
    \n```\n- (void)updateDetailViews {\n\n}\n```\n\n在开始实现新方法之前，我们需要确保已经设置了调用它的位置，方法是在\
    \ `applicationDidFinishLaunching:` 的末尾插入以下代码行：\n\n```\n// 在 applicationDidFinishLaunching:\
    \ 末尾插入以下代码\n  [self updateDetailViews];\n```\n\n快速编译一下，确保到目前为止的代码能顺利通过编译。现在，开始实现\
    \ `updateDetailViews` 方法，终于可以在窗口中看到反派数据了！\n\n#### 设置简单值\n\n我们首先显示的两个控件是包含反派名字和最后已知地点的两个\
    \ `NSTextField`。`NSTextField` 可以直接接受数字和其他类型的输入，但这里我们只是使用 `setStringValue:` 为每个控件传递一个简单的字符串。将这几行代码放在\
    \ `updateDetailViews` 的开头部分（前面我们刚用空的花括号定义了该方法）：\n\n```\n[self.nameView setStringValue:[self.villain\
    \ objectForKey:kName]];\n[self.lastKnownLocationView setStringValue:\n       \
    \           [self.villain objectForKey:kLastKnownLocation]];\n```\n\n注意，我们复用了先前定义的预处理器宏，因此不必担心输入错误的字符串值。现在，我们应该能够编译应用、运行它，并在窗口的文本字段中看到实际数据了！\n\
    \n接下来，我们将设置 `NSDateView` 的值。将以下代码添加到 `updateDetailViews` 的末尾：\n\n```\n [self.lastSeenDateView\
    \ setDateValue:\n                  [self.villain objectForKey:kLastSeenDate]];\n\
    ```\n\n这显然与我们为 `NSTextField` 所做的非常相似：同样使用预处理器宏，调用目标对象的相关方法（此处为 `setDateValue:`）等等。输入这段代码后，再次编译并运行，确保它正常工作，并且日期视图显示正确的日期（今天的日期）。\n\
    \n既然我们已经掌握了规律，那就不妨更进一步，看看如何一次性为剩余的所有“简单”控件设置值。我们可以逐一编译运行来检查工作进度，或者如果觉得自己运气不错，也可以全部输入代码，然后在最后一起编译运行。将以下代码行添加到\
    \ `updateDetailViews` 方法的末尾：\n\n```\n  [self.evilnessView setIntegerValue:\n \
    \                 [[self.villain objectForKey:kEvilness] integerValue]];\n  [self.powerSourceView\
    \ setTitle:[self.villain objectForKey:kPowerSource]];\n  [self.mugshotView setImage:[self.villain\
    \ objectForKey:kMugshot]];\n  [self.notesView setString:[self.villain objectForKey:kNotes]];\n\
    ```\n\n这里唯一的复杂之处在于 `evilnessView`。该视图需要一个 `NSInteger` 来设置其值，但我们的反派对象将其邪恶值以 `NSNumber`\
    \ 的形式存储在字典中，因此我们需要多做一步：将对象转换为 `NSInteger`。\n"
- fmt: "### Values in Complex Controls\n\nOf the remaining attributes we’re going\
    \ to display, two of them are simple values (`swornEnemy` and `primaryMotivation`),\
    \ while the third, `powers`, is a “compound value;” an array of strings. All of\
    \ them are being displayed in more complex views than the previous attributes\
    \ were, so we’ll take a little more time with each of them.\n\nFirst, let’s tackle\
    \ the `swornEnemy` attribute, which is displayed in an `NSComboBox`. A combo box\
    \ maintains a list of items that we must manually edit if we want to add new values\
    \ to it. We’ll need to do that any time we’re displaying a villain whose `swornEnemy`\
    \ is someone we didn’t anticipate back when we were setting up the combo box in\
    \ Xcode. In the following code, we first check to see if the combo box contains\
    \ an item matching the name we want to display. If it doesn’t, add one. After\
    \ that, we tell the combo box to select the appropriate item. Add this to the\
    \ end of the `updateDetailViews` method:\n\n```\nif ([self.swornEnemyView indexOfItemWithObjectValue:\n\
    \        [self.villain objectForKey:kSwornEnemy]] == NSNotFound) {\n    [self.swornEnemyView\
    \ addItemWithObjectValue:\n        [self.villain objectForKey:kSwornEnemy]];\n\
    }\n[self.swornEnemyView selectItemWithObjectValue:\n    [self.villain objectForKey:kSwornEnemy]];\n\
    ```\n\nNow compile and run, and the combo box should show the correct value, in\
    \ this case “Superman.” We can verify that this will also work for items that\
    \ aren’t included in the combo box in the nib file by changing the relevant line\
    \ in the `applicationDidFinishLaunching:` method to refer to some other superhero\
    \ name that isn’t present in the nib, then compiling and running again.\n\nNext,\
    \ let’s deal with the `primaryMotivation` attribute displayed in a matrix of radio\
    \ buttons. The `NSMatrix` class lets us select a single cell by specifying its\
    \ tag, and because these are radio buttons, the others will be automatically deselected.\
    \ The first thing we’ll do is define a method that returns an array of strings\
    \ containing all the motivations we’re considering for our villains. These will\
    \ be arranged in the same order as the cells in the matrix of checkboxes in the\
    \ nib file, so that their index values match the tags specified for each cell.\
    \ This should be added after the `updateDetailViews:` method.\n\n```\n+ (NSArray\
    \ *)motivations {\n    static NSArray *motivations = nil;\n    if (!motivations)\
    \ {\n        motivations = [[NSArray alloc] initWithObjects:@\"Greed\",\n    \
    \        @\"Revenge\", @\"Bloodlust\", @\"Nihilism\", @\"Insanity\", nil];\n \
    \   }\n    return motivations;\n}\n```\n\nThere are a few noteworthy things about\
    \ this new method, each of which may provide some insight into the design patterns\
    \ and philosophies used throughout Cocoa.\n\n*   This is a class method instead\
    \ of an instance method (indicated by an initial `+` instead of `-`), so everything\
    \ that happens in here applies to the whole class, no matter how many instances\
    \ we may create. This is appropriate in many situations where the method doesn’t\
    \ deal with anything specific to an instance (for example, instance variables).\n\
    *   We are using a locally defined static variable to point to an object we create.\
    \ The initial assignment to `nil` occurs only the first time the method is called.\
    \ This is identical to the use of static local variables in standard C functions\
    \ and lets us define a chunk of code (everything inside the `if` clause) that\
    \ will be executed only the first time this method is called.\n*   We are following\
    \ a principle called lazy loading. Instead of creating the array when the class\
    \ is initialized, we create it only the first time it’s needed. That way, if no\
    \ one ever calls this method, the array is never created.\n\nAt first glance,\
    \ it may seem like overkill to be following these principles. After all, we’re\
    \ going to have only one instance of this controller class, so why make it a class\
    \ method? And we know we’re going to need to initialize that array, so why be\
    \ lazy about it?\n\nOf course, in our contrived example, we could choose to follow\
    \ the “simpler” route. We could just take the `NSArray` creation code and plop\
    \ that into our code wherever we need to see the list of motivations! However,\
    \ in the long run, doing things the “simple” way often backfires, and ends up\
    \ not being simple at all. In fact, seeing identical pieces of code repeated throughout\
    \ a program is almost always a red flag. Unless it’s unavoidable, Don’t Repeat\
    \ Yourself—keep your code DRY! Remember that the systems you build may grow and\
    \ be extended in the future—in ways you can’t always anticipate today. Doing things\
    \ the “right” way is a good way to future-proof your code so that someone looking\
    \ through the code later on (for example, trying to find where to add to the list\
    \ of motivations) can figure out what’s happening and find the one spot they need\
    \ to change, instead of doing a manual search and replace to find every spot where\
    \ an identical array is being created.\n\nWith our motivations method in place,\
    \ we’ll now be able to harvest from it an index number to identify the tag of\
    \ the cell we want to select in the GUI. Here’s one way to do this, ready to be\
    \ added to the end of `updateDetailViews:`:\n\n```\n[self.primaryMotivationView\
    \ selectCellWithTag:\n    [[[self class] motivations] indexOfObject:\n       \
    \ [self.villain objectForKey:kPrimaryMotivation]]];\n```\n\nOkay, we realize that\
    \ looks like a bit of a mess if you’re not used to it; it may even give some of\
    \ you flashbacks to the Lisp or Scheme you had to learn in your computer science\
    \ education and have spent years trying to forget (these feelings are normal and\
    \ will subside over time). For the sake of clarity, we’re going to unpack this\
    \ a bit and show an alternate version of the above, where some intermediate values\
    \ are assigned to variables.\n\n```\nNSArray *motivations = [[self class] motivations];\n\
    id primaryMotivation = [self.villain objectForKey:kPrimaryMotivation];\nint motivationIndex\
    \ = [motivations indexOfObject:primaryMotivation];\n[self.primaryMotivationView\
    \ selectCellWithTag:motivationIndex];\n```\n\nPretty straightforward, so you may\
    \ wonder why we showed you the first version where everything is all packed together.\
    \ Basically, the first version is a kind of Objective-C style that you’re likely\
    \ to encounter in the wild at some point, so it’s good to be able to try to eyeball\
    \ it a little. Not because it’s technically superior in some way (it’s not), but\
    \ simply because some people consider the highly nested version to be more readable\
    \ in some ways and just prefer to write their code that way. The position of the\
    \ brackets, combined with features of Xcode’s text editor, lets you easily do\
    \ some things with the former version that take a bit more time with the latter.\
    \ For example, double-clicking on a bracket in Xcode selects the entire bracketed\
    \ expression, including the brackets themselves, which means you can easily select\
    \ an entire method invocation, including the receiver, the method name, and all\
    \ arguments, in a single double-click. This can be a huge help both when editing\
    \ code and also browsing or reading code.\n\nOn the other hand, the second form\
    \ we showed you can be helpful when debugging your application. Just set a breakpoint\
    \ and you’ve got a full complement of intermediate variables ready to divulge\
    \ their contents to you. Ultimately, which style you lean toward is a matter of\
    \ personal taste and practicality. Use whatever works best for you in the situation\
    \ at hand. Until you’ve gotten a bit more Cocoa experience under your belt, you’re\
    \ probably better off sticking with the latter style, which shows more clearly\
    \ the sequence of execution. For now, either of the alternatives shown above should\
    \ work at the end of the `updateDetailViews` method. Compile and run, and verify\
    \ that the correct primary motivation, Revenge, is shown in the GUI."
  raw: '#### Values in Complex Controls


    Of the remaining attributes we’re going to display, two of them are simple values
    (`swornEnemy` and `primaryMotivation`), while the third, `powers`, is a “compound
    value;” an array of strings. All of them are being displayed in more complex views
    than the previous attributes were, so we’ll take a little more time with each
    of them.


    First, let’s tackle the `swornEnemy` attribute, which is displayed in an `NSComboBox`.
    A combo box maintains a list of items that we must manually edit if we want to
    add new values to it. We’ll need to do that any time we’re displaying a villain
    whose `swornEnemy` is someone we didn’t anticipate back when we were setting up
    the combo box in Xcode. In the following code, we first check to see if the combo
    box contains an item matching the name we want to display. If it doesn’t, add
    one. After that, we tell the combo box to select the appropriate item. Add this
    to the end of the `updateDetailViews` method:


    `if ([self.swornEnemyView indexOfItemWithObjectValue:`


    `[self.villain objectForKey:kSwornEnemy]] == NSNotFound) {`


    `[self.swornEnemyView addItemWithObjectValue:`


    `[self.villain objectForKey:kSwornEnemy]];`


    `}`


    `[self.swornEnemyView selectItemWithObjectValue:`


    `[self.villain objectForKey:kSwornEnemy]];`


    Now compile and run, and the combo box should show the correct value, in this
    case “Superman.” We can verify that this will also work for items that aren’t
    included in the combo box in the nib file by changing the relevant line in the
    `applicationDidFinishLaunching:` method to refer to some other superhero name
    that isn’t present in the nib, then compiling and running again.


    Next, let’s deal with the `primaryMotivation` attribute displayed in a matrix
    of radio buttons. The `NSMatrix` class lets us select a single cell by specifying
    its tag, and because these are radio buttons, the others will be automatically
    deselected. The first thing we’ll do is define a method that returns an array
    of strings containing all the motivations we’re considering for our villains.
    These will be arranged in the same order as the cells in the matrix of checkboxes
    in the nib file, so that their index values match the tags specified for each
    cell. This should be added after the `updateDetailViews:` method.


    `+ (NSArray *)motivations {`


    `static NSArray *motivations = nil;`


    `if (!motivations) {`


    `motivations = [[NSArray alloc] initWithObjects:@"Greed"`,


    `@"Revenge", @"Bloodlust", @"Nihilism", @"Insanity", nil];`


    `}`


    `return motivations;`


    `}`


    There are a few noteworthy things about this new method, each of which may provide
    some insight into the design patterns and philosophies used throughout Cocoa.


    *   This is a class method instead of an instance method (indicated by an initial
    + instead of –), so everything that happens in here applies to the whole class,
    no matter how many instances we may create. This is appropriate in many situations
    where the method doesn’t deal with anything specific to an instance (for example,
    instance variables).

    *   We are using a locally defined static variable to point to an object we create.
    The initial assignment to nil occurs only the first time the method is called.
    This is identical to the use of static local variables in standard C functions
    and lets us define a chunk of code (everything inside the `if` clause) that will
    be executed only the first time this method is called.

    *   We are following a principle called lazy loading. Instead of creating the
    array when the class is initialized, we create it only the first time it’s needed.
    That way, if no one ever calls this method, the array is never created.


    At first glance, it may seem like overkill to be following these principles. After
    all, we’re going to have only one instance of this controller class, so why make
    it a class method? And we know we’re going to need to initialize that array, so
    why be lazy about it?


    Of course, in our contrived example, we could choose to follow the “simpler” route.
    We could just take the `NSArray` creation code and plop that into our code wherever
    we need to see the list of motivations! However, in the long run, doing things
    the “simple” way often backfires, and ends up not being simple at all. In fact,
    seeing identical pieces of code repeated throughout a program is almost always
    a red flag. Unless it’s unavoidable, Don’t Repeat Yourself—keep your code DRY!
    Remember that the systems you build may grow and be extended in the future—in
    ways you can’t always anticipate today. Doing things the “right” way is a good
    way to future-proof your code so that someone looking through the code later on
    (for example, trying to find where to add to the list of motivations) can figure
    out what’s happening and find the one spot they need to change, instead of doing
    a manual search and replace to find every spot where an identical array is being
    created.


    With our motivations method in place, we’ll now be able to harvest from it an
    index number to identify the tag of the cell we want to select in the GUI. Here’s
    one way to do this, ready to be added to the end of `updateDetailViews:`


    `[self.primaryMotivationView selectCellWithTag:`


    `[[[self class] motivations] indexOfObject:`


    `[self.villain objectForKey:kPrimaryMotivation]]];`


    Okay, we realize that looks like a bit of a mess if you’re not used to it; it
    may even give some of you flashbacks to the Lisp or Scheme you had to learn in
    your computer science education and have spent years trying to forget (these feelings
    are normal and will subside over time). For the sake of clarity, we’re going to
    unpack this a bit and show an alternate version of the above, where some intermediate
    values are assigned to variables.


    `NSArray *motivations = [[self class] motivations];`


    `id primaryMotivation = [self.villain objectForKey:kPrimaryMotivation];`


    `int motivationIndex = [motivations indexOfObject:primaryMotivation];`


    `[self.primaryMotivationView selectCellWithTag:motivationIndex];`


    Pretty straightforward, so you may wonder why we showed you the first version
    where everything is all packed together. Basically, the first version is a kind
    of Objective-C style that you’re likely to encounter in the wild at some point,
    so it’s good to be able to try to eyeball it a little. Not because it’s technically
    superior in some way (it’s not), but simply because some people consider the highly
    nested version to be more readable in some ways and just prefer to write their
    code that way. The position of the brackets, combined with features of Xcode’s
    text editor, lets you easily do some things with the former version that take
    a bit more time with the latter. For example, double-clicking on a bracket in
    Xcode selects the entire bracketed expression, including the brackets themselves,
    which means you can easily select an entire method invocation, including the receiver,
    the method name, and all arguments, in a single double-click. This can be a huge
    help both when editing code and also browsing or reading code.


    On the other hand, the second form we showed you can be helpful when debugging
    your application. Just set a breakpoint and you’ve got a full complement of intermediate
    variables ready to divulge their contents to you. Ultimately, which style you
    lean toward is a matter of personal taste and practicality. Use whatever works
    best for you in the situation at hand. Until you’ve gotten a bit more Cocoa experience
    under your belt, you’re probably better off sticking with the latter style, which
    shows more clearly the sequence of execution. For now, either of the alternatives
    shown above should work at the end of the `updateDetailViews` method. Compile
    and run, and verify that the correct primary motivation, Revenge, is shown in
    the GUI.'
  trans: "\n### 复杂控件中的值\n\n在我们要显示的其余属性中，有两个是简单值（`swornEnemy` 和 `primaryMotivation`），而第三个属性\
    \ `powers` 是一个“复合值”，它是一个字符串数组。所有这些属性都将以比先前属性更复杂的视图显示，因此我们将花更多时间逐一处理它们。\n\n首先，我们来处理\
    \ `swornEnemy` 属性，它显示在一个 `NSComboBox` 中。组合框维护着一个项目列表，如果我们想向其中添加新值，需要手动编辑。每当我们要显示一个反派，且其\
    \ `swornEnemy` 是我们在 Xcode 中设置组合框时未预料到的角色时，都需要这样做。在以下代码中，我们首先检查组合框是否包含与我们要显示的名称匹配的项目。如果没有，则添加一个。之后，我们告诉组合框选中相应的项目。将此代码添加到\
    \ `updateDetailViews` 方法的末尾：\n\n```\nif ([self.swornEnemyView indexOfItemWithObjectValue:\n\
    \        [self.villain objectForKey:kSwornEnemy]] == NSNotFound) {\n    [self.swornEnemyView\
    \ addItemWithObjectValue:\n        [self.villain objectForKey:kSwornEnemy]];\n\
    }\n[self.swornEnemyView selectItemWithObjectValue:\n    [self.villain objectForKey:kSwornEnemy]];\n\
    ```\n\n现在编译并运行，组合框应显示正确的值，在此例中为“Superman”。我们可以通过修改 `applicationDidFinishLaunching:`\
    \ 方法中的相关行，将其指向 nib 文件中不存在的其他超级英雄名称，然后重新编译并运行，来验证即使对于 nib 文件中未包含的项目，此方法也能正常工作。\n\
    \n接下来，让我们处理显示在单选按钮矩阵中的 `primaryMotivation` 属性。`NSMatrix` 类允许我们通过指定标签来选择单个单元格，由于这些是单选按钮，其他单元格将自动取消选中。我们要做的第一件事是定义一个方法，该方法返回一个字符串数组，包含我们为反派考虑的所有动机。这些动机的顺序应与\
    \ nib 文件中复选框矩阵中单元格的顺序一致，这样它们的索引值就能匹配为每个单元格指定的标签。此方法应添加到 `updateDetailViews:` 方法之后。\n\
    \n```\n+ (NSArray *)motivations {\n    static NSArray *motivations = nil;\n  \
    \  if (!motivations) {\n        motivations = [[NSArray alloc] initWithObjects:@\"\
    Greed\",\n            @\"Revenge\", @\"Bloodlust\", @\"Nihilism\", @\"Insanity\"\
    , nil];\n    }\n    return motivations;\n}\n```\n\n关于这个新方法，有几点值得注意，每一点都可能让我们深入了解\
    \ Cocoa 中使用的设计模式和理念。\n\n*   这是一个类方法而非实例方法（由开头的 `+` 而非 `-` 表示），因此这里发生的所有事情都适用于整个类，无论我们创建多少个实例。这在方法不处理任何特定于实例（例如实例变量）的情况下是合适的。\n\
    *   我们使用一个局部定义的静态变量来指向我们创建的对象。首次赋值为 `nil` 只会在该方法第一次被调用时发生。这与标准 C 函数中静态局部变量的使用相同，并允许我们定义一段代码（`if`\
    \ 子句内的所有内容），该代码只在方法第一次被调用时执行。\n*   我们遵循一个称为**懒加载**的原则。我们不是在类初始化时创建数组，而是仅在第一次需要时才创建它。这样，如果没有人调用这个方法，数组就永远不会被创建。\n\
    \n乍一看，遵循这些原则可能显得有些矫枉过正。毕竟，我们只需要这个控制器类的一个实例，那为什么要把它做成一个类方法？而且我们知道需要初始化那个数组，为什么还要“懒”得去做？\n\
    \n当然，在我们这个精心设计的示例中，我们可以选择更“简单”的路径。我们可以直接把创建 `NSArray` 的代码，扔到任何需要查看动机列表的地方！然而，从长远来看，用“简单”的方式做事往往会适得其反，最终根本不会变得简单。事实上，在整个程序中看到重复的相同代码几乎总是一个危险信号。除非无法避免，否则**不要重复自己**——保持你的代码\
    \ **DRY**！请记住，你构建的系统未来可能会增长和扩展——以你今天无法预料的方式。用“正确”的方式做事，是让你的代码面向未来的好方法，这样以后查看代码的人（例如，试图找到在哪里添加动机列表的人）就能理解发生了什么，并找到唯一需要修改的地方，而不是手动搜索和替换，寻找创建相同数组的每一个位置。\n\
    \n有了我们的动机方法，我们现在就可以从中获取一个索引号，用来标识我们要在 GUI 中选择的单元格的标签。以下是实现此功能的一种方法，准备添加到 `updateDetailViews:`\
    \ 的末尾：\n\n```\n[self.primaryMotivationView selectCellWithTag:\n    [[[self class]\
    \ motivations] indexOfObject:\n        [self.villain objectForKey:kPrimaryMotivation]]];\n\
    ```\n\n好吧，我们意识到，如果你不习惯，这看起来有点乱；它甚至可能让一些人回想起在计算机科学教育中不得不学习、然后花了多年时间试图忘记的 Lisp 或\
    \ Scheme（这些感觉是正常的，会随着时间的推移而消退）。为了清晰起见，我们将稍微拆解一下，并展示上述代码的另一种版本，其中一些中间值被赋值给变量。\n\
    \n```\nNSArray *motivations = [[self class] motivations];\nid primaryMotivation\
    \ = [self.villain objectForKey:kPrimaryMotivation];\nint motivationIndex = [motivations\
    \ indexOfObject:primaryMotivation];\n[self.primaryMotivationView selectCellWithTag:motivationIndex];\n\
    ```\n\n这段代码相当直截了当，所以你可能会奇怪为什么我们要展示第一种将所有内容打包在一起的版本。基本上，第一种版本是一种你在实际工作中可能会遇到的 Objective-C\
    \ 风格，因此能够稍微目视解析一下是好的。不是因为它在技术上有某种优越性（它并没有），而仅仅是因为有些人认为高度嵌套的版本在某些方面更易读，并且更喜欢那样编写代码。括号的位置，结合\
    \ Xcode 文本编辑器的功能，让你可以轻松地对前一个版本做一些对后一个版本需要更多时间才能完成的操作。例如，在 Xcode 中双击一个括号会选择整个括号表达式，包括括号本身，这意味着你可以通过一次双击轻松选择一个完整的方法调用，包括接收者、方法名和所有参数。这在编辑代码以及浏览或阅读代码时都有很大帮助。\n\
    \n另一方面，我们展示的第二种形式在调试应用程序时可能很有用。只需设置一个断点，你就可以获得所有中间变量，它们会随时告诉你它们的内容。最终，你倾向于哪种风格是个人品味和实用性的问题。在当下情况中，使用最适合你的方式。在你获得更多\
    \ Cocoa 经验之前，最好坚持使用后一种风格，它更清晰地显示了执行的序列。现在，上述两种替代方案都应该能用在 `updateDetailViews` 方法的末尾。编译并运行，验证\
    \ GUI 中是否显示了正确的首要动机“Revenge”。"
- fmt: "Finally, it’s time to display the `powers` attribute. Like the `primaryMotivation`,\
    \ the villain’s powers are shown in a matrix of button cells. This time, however,\
    \ the button cells are checkboxes, and any number of them can be selected (or\
    \ “checked”). Instead of a single string, the `powers` attribute is an `NSArray`\
    \ containing all the relevant strings for the villain you’re looking at.\n\nWe’ll\
    \ start off with something very similar to what we added for the `primaryMotivation`\
    \ attribute: a new class method called `powers`:\n\n```\n+ (NSArray *)powers {\n\
    \    static NSArray *powers = nil;\n    if (!powers) {\n        powers = [[NSArray\
    \ alloc] initWithObjects:@\"Evil Genius\",\n                  @\"Mind Reader\"\
    , @\"Nigh-invulnerable\", @\"Weather Control\", nil];\n    }\n    return powers;\n\
    }\n```\n\nLike the `motivations` method, this method creates an array of strings\
    \ whose indexes in the array correspond to the tags defined in a matrix in the\
    \ nib file. Now we just have to add a bit of code to selectively “check” all the\
    \ appropriate checkboxes. Add this code to the end of the `updateDetailViews`\
    \ method:\n\n```\n[self.powersView deselectAllCells];\nfor (NSString *power in\
    \ [[self class] powers]) {\n    if ([[self.villain objectForKey:kPowers] containsObject:power])\
    \ {\n        [[self.powersView cellWithTag:\n          [[[self class] powers]\
    \ indexOfObject:power]]\n         setState:NSOnState];\n    }\n}\n```\n\nThis\
    \ bit of code should be pretty easy to grasp by now. First it deselects all the\
    \ cells, so we start off with a clean slate of unchecked checkboxes. Then it goes\
    \ through each named power from our master list of powers, checks to see if our\
    \ villain’s `powers` attribute contains a matching string, and if so, sets that\
    \ cell’s state to `NSOnState`, which means the checkbox is checked. The one new\
    \ thing to notice here is the special `for` construct. This is something called\
    \ fast enumeration, an addition to the latest version of Objective-C that works\
    \ unlike any form of `for` in C, but you may be familiar with it as a `foreach`\
    \ loop in Java or C#. It basically takes a collection (typically an `NSArray`)\
    \ on the right side of the `in`, and iterates through it, assigning each object\
    \ in the collection to the variable specified on the left side of the `in`, one\
    \ at a time, then executing the subsequent curly-brace-wrapped code.\n\nNow compile\
    \ and run the application, and the relevant checkbox should be selected in the\
    \ display (Evil Genius in the case of Lex Luthor).\n\n## Responding to Input\n\
    \nNow that we’re able to display all these villain attributes, it’s time to turn\
    \ things around and write the code that will let us notice changes the user makes\
    \ to these fields. We previously created empty action methods that are triggered\
    \ by the various GUI controls; now it’s time for us to fill up those methods and\
    \ make them do something useful! Also, we’ll implement a delegate method to let\
    \ us get the edited value for the one view in our window that doesn’t work with\
    \ target/action, the `NSTextView`.\n\nLet’s start off with the `NSTextField` for\
    \ displaying and editing the villain’s name, which triggers the `takeName:` method.\
    \ Change the method to look like this:\n\n```\n- (IBAction)takeName:(id)sender\
    \ {\n    [self.villain setObject:[sender stringValue] forKey:kName];\n    NSLog(@\"\
    current villain properties: %@\", self.villain);\n}\n```\n\nThis method starts\
    \ off by grabbing the string value from the sender, which is the text field itself,\
    \ and passing it along to the villain object to set its name. Because we included\
    \ the `@synthesize villain` directive, we can refer to `villain` directly, rather\
    \ than needing to type `self.villain`. We end up by doing a bit of logging to\
    \ show all the villain’s current attributes. This can help in debugging and also\
    \ serves as a bit of a test for our code at runtime so we can see that it’s actually\
    \ doing what it’s supposed to do. The `NSLog` function takes as its first parameter\
    \ an `NSString` used to define an output format, and one additional parameter\
    \ for each formatting tag (a special sequence starting with a `%` sign) in the\
    \ string. This is very similar to the standard `printf` function in C, with the\
    \ addition of the `%@` tag that prints a description of any Objective-C object.\
    \ The output from `NSLog` shows up in Xcode’s Console window, which normally appears\
    \ automatically when we launch an application from within Xcode.\n\n**Tip**\n\n\
    Action methods always pass along a `sender` object, which is normally the object\
    \ that the user clicked or edited, triggering the method call. If our action method\
    \ may be triggered by more than one GUI object, we can determine which object\
    \ it came from by examining `sender`, comparing it to our instance variables,\
    \ and so on.\n\nCompile and run the app, and then select the text field containing\
    \ Lex Luthor’s name. Change the name in some way, press tab (or click on another\
    \ control in the window), and the output specified in the code should be printed\
    \ to the output pane in Xcode. If you don’t see any output window in Xcode when\
    \ you run your app, switch to Xcode and open the Console window by pressing ⇧⌘C\
    \ (or selecting View ➤ Debug Area ➤ Activate Console). The villain dictionary\
    \ output is formatted so that you can see each key alongside its associated value.\
    \ You should be able to find the `Name` key and see that its value has changed\
    \ to the new value you entered.\n\nMost of the rest of our action methods are\
    \ similar to the `takeName:` method and should be self-explanatory. Each of them\
    \ simply does the inverse of the work we did in the `updateDetailViews` method,\
    \ taking values from the GUI and applying them to our model object. Here’s the\
    \ code for all the “simple” action methods:\n\n```\n- (IBAction)takeLastKnownLocation:(id)sender\
    \ {\n    [self.villain setObject:[sender stringValue] forKey:kLastKnownLocation];\n\
    \    NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeLastSeenDate:(id)sender\
    \ {\n    [self.villain setObject:[sender dateValue] forKey:kLastSeenDate];\n \
    \   NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeSwornEnemy:(id)sender\
    \ {\n    [self.villain setObject:[sender stringValue] forKey:kSwornEnemy];\n \
    \   NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takePrimaryMotivation:(id)sender\
    \ {\n    [self.villain setObject:[[sender selectedCell] title]\n             \
    \       forKey:kPrimaryMotivation];\n    NSLog(@\"current villain properties:\
    \ %@\", self.villain);\n}\n\n- (IBAction)takePowerSource:(id)sender {\n    [self.villain\
    \ setObject:[sender title] forKey:kPowerSource];\n```"
  raw: 'Finally, it’s time to display the powers attribute. Like the `primaryMotivation`,
    the villain’s powers are shown in a matrix of button cells. This time, however,
    the button cells are checkboxes, and any number of them can be selected (or “checked”).
    Instead of a single string, the powers attribute is an `NSArray` containing all
    the relevant strings for the villain you’re looking at.


    We’ll start off with something very similar to what we added for the `primaryMotivation`
    attribute: a new class method called `powers`:


    `+ (NSArray *)powers {`


    `static NSArray *powers = nil;`


    `if (!powers) {`


    `powers = [[NSArray alloc] initWithObjects:@"Evil Genius"`,


    `@"Mind Reader", @"Nigh-invulnerable", @"Weather Control", nil];`


    `}`


    `return powers;`


    `}`


    Like the motivations method, this method creates an array of strings whose indexes
    in the array correspond to the tags defined in a matrix in the nib file. Now we
    just have to add a bit of code to selectively “check” all the appropriate checkboxes.
    Add this code to the end of the `updateDetailViews` method:


    `[self.powersView deselectAllCells];`


    `for (NSString *power in [[self class] powers]) {`


    `if ([[self.villain objectForKey:kPowers] containsObject:power]) {`


    `[[self.powersView cellWithTag:`


    `[[[self class] powers] indexOfObject:power]]`


    `setState:NSOnState];`


    `}`


    `}`


    This bit of code should be pretty easy to grasp by now. First it deselects all
    the cells, so we start off with a clean slate of unchecked checkboxes. Then it
    goes through each named power from our master list of powers, checks to see if
    our villain’s powers attribute contains a matching string, and if so, sets that
    cell’s state to `NSOnState`, which means the checkbox is checked. The one new
    thing to notice here is the special `for` construct. This is something called
    fast enumeration, an addition to the latest version of Objective-C that works
    unlike any form of `for` in C, but you may be familiar with it as a `foreach`
    loop in Java or C#. It basically takes a collection (typically an `NSArray`) on
    the right side of the `in`, and iterates through it, assigning each object in
    the collection to the variable specified on the left side of the `in`, one at
    a time, then executing the subsequent curly-brace-wrapped code.


    Now compile and run the application, and the relevant checkbox should be selected
    in the display (Evil Genius in the case of Lex Luthor).


    ### Responding to Input


    Now that we’re able to display all these villain attributes, it’s time to turn
    things around and write the code that will let us notice changes the user makes
    to these fields. We previously created empty action methods that are triggered
    by the various GUI controls; now it’s time for us to fill up those methods and
    make them do something useful! Also, we’ll implement a delegate method to let
    us get the edited value for the one view in our window that doesn’t work with
    target/action, the `NSTextView`.


    Let’s start off with the `NSTextField` for displaying and editing the villain’s
    name, which triggers the `takeName`: method. Change the method to look like this:


    `- (IBAction)takeName:(id)sender {`


    `[self.villain setObject:[sender stringValue] forKey:kName];`


    `NSLog(@"current villain properties: %@", self.villain);`


    `}`


    This method starts off by grabbing the string value from the sender, which is
    the text field itself, and passing it along to the villain object to set its name.
    Because we included the `@synthesize villain` directive, we can refer to villain
    directly, rather than needing to type `self.villain`. We end up by doing a bit
    of logging to show all the villain’s current attributes. This can help in debugging
    and also serves as a bit of a test for our code at runtime so we can see that
