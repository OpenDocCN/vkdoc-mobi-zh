- fmt: "### Subclassing `NSWindowController`\n\nOf course, often you’ll need a bit\
    \ of your own code in your controller class. You can easily subclass `NSWindowController`\
    \ to suit your needs here as well. Our next steps will be to create a subclass\
    \ and create a new nib file for it to load, and set up a way to call it from our\
    \ main window and controller.\n\nIn Xcode, make a new class in the WindowLab project\
    \ called `NotSoEasyWindowController` by selecting File ➤ New File from the menu\
    \ and choosing Cocoa from the OS X section in the template selector. Choose Objective-C\
    \ class, and then specify that we want to make a subclass of `NSWindowController`.\
    \ Xcode will suggest `WLWindowController` as the name, but you should change it\
    \ to `WLNotSoEasyWindowController`. Check the \"With XIB for user interface\"\
    \ checkbox, and Xcode will also generate a `WLNotSoEasyWindowController.xib` file\
    \ for us, with the File’s Owner set to our new subclass, and with the window outlet\
    \ pre-connected. Xcode will prompt you to save the nib file, and ask which group\
    \ to add it to. Use the same group that we used with the Easy Window nib file\
    \ above, the WindowLab folder. Xcode generates `WLNotSoEasyWindowController.h`\
    \ and `WLNotSoEasyWindowController.m` files with some methods for us, but we’re\
    \ going to need to do some work on these files.\n\nWe’re making our own class\
    \ here, and there’s only one nib file that it’s intended to manage. Accordingly,\
    \ we can build in the name of the nib file so that anyone using this class only\
    \ needs to know about the class, not the name of the nib file itself. We can also\
    \ make things even easier for callers: assuming that anyone who creates an instance\
    \ of this class wants to load the nib file, let’s build the call to `window` right\
    \ into the `init` method. Do this by creating the following `init` method:\n\n\
    ```\n- init\n{\n    if ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"\
    ]))  {\n        [self window];\n    }\n    return self;\n}\n```\n\nThat’s the\
    \ recommended form of the standard `init` method, in which we call another `init`\
    \ method in the superclass, do work specific to our instance if it succeeds, and\
    \ finish up by returning a pointer to `self`. While we’re in here, let’s remove\
    \ the `initWithWindow:` method that Xcode generated for us because there’s no\
    \ need for it to ever be called.\n\nNow switch over to `MainMenu.xib`. Once again,\
    \ make the window a bit taller, duplicate the last button, and name it \"Not So\
    \ Easy.\" Then open `WLAppDelegate.h` in the Assistant Editor, and Control-drag\
    \ from the button over to `WLAppDelegate.h`, and add a new action called `loadNotSoEasyWindow`.\
    \ Open up the `WLAppDelegate.m` file, and add the following implementation for\
    \ that action:\n\n```\n// add this to WLAppDelegate.m:\n- (IBAction)loadNotSoEasyWindow:(id)sender\n\
    {\n    WLNotSoEasyWindowController *notSoEasyController = [[WLNotSoEasyWindowController\
    \ alloc] init];\n    [self.subWindows addObject:notSoEasyController];\n}\n```\n\
    \nWe’ll also need to add the following `#import` directive at the top of `WLAppDelegate.m`\
    \ so that the compiler knows about the new class when it’s compiling the app delegate:\n\
    \n```\n#import \"WLNotSoEasyWindowController.h\"\n```\n\nWith that in place, let’s\
    \ add a small bit of functionality to our window controller class, so that after\
    \ our nib file is created, we can make sure that our window is connecting up with\
    \ it as it should: a simple method that makes the computer beep when it’s called.\
    \ Unfortunately, we’ll need to add it by hand, but that’s easy to do.\n\nAdd the\
    \ following method declaration to `WLNotSoEasyWindowController.h`:\n\n```\n- (IBAction)beep:(id)sender;\n\
    ```\n\nThe whole contents of `WLNotSoEasyWindowController.m` should look like\
    \ this, with the new `beep:` action method added:\n\n```\n#import \"WLNotSoEasyWindowController.h\"\
    \n\n@interface WLNotSoEasyWindowController ()\n@end\n\n@implementation WLNotSoEasyWindowController\n\
    \n- init\n{\n    if ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"\
    ])) {\n        [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad\n\
    {\n    [super windowDidLoad];\n    // Implement this method to handle any initialization\
    \ after your window controller's window has been loaded from its nib file.\n}\n\
    \n- (IBAction)beep:(id)sender\n{\n    NSBeep();\n}\n\n@end\n```\n\nOpen the `WLNotSoEasyWindowController.nib`\
    \ file in an Interface Builder canvas, and drag out a button from the Object Library,\
    \ and title it \"Beep!\" Control-drag from the Beep! button to the File’s Owner\
    \ icon in the Object Dock, and select the `beep:` action that we just added. Xcode\
    \ will automatically note that we’ve added a new action and make it available\
    \ for use. Save the changes and select Run; the newest button will let us create\
    \ windows that beep when we press their buttons, as seen in Figure 11-7.\n\n![A978-1-4302-4543-8_11_Fig7_HTML.jpg](A978-1-4302-4543-8_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7. These windows’ buttons will beep at us\n\n### Modal Windows\n\n\
    Now we’re going to move on to a special kind of GUI item, the modal window. Everyone\
    \ has used modal windows at one time or another, but if you’re new to desktop\
    \ GUI programming, the term may be new to you. Basically, a modal window is one\
    \ that puts our application in a particular \"mode.\" Specifically, a mode where\
    \ it will only accept input through the controls on the modal window itself, and\
    \ clicking anywhere else in the application will just make it beep at us. Because\
    \ of their disruptive nature, modal windows should be used sparingly—in cases\
    \ where the application can’t really move forward on its own without the user\
    \ answering a question of some kinds (such as, \"There are five open documents\
    \ with unsaved changes. Are you sure you want to quit?\"). In cases where the\
    \ information the app needs from the user is related to just a single window or\
    \ document, it’s better to use a sheet, described later in this chapter, which\
    \ locks down a single window instead of the entire application."
  raw: '### Subclassing NSWindowController


    Of course, often you’ll need a bit of your own code in your controller class.
    You can easily subclass `NSWindowController` to suit your needs here as well.
    Our next steps will be to create a subclass and create a new nib file for it to
    load, and set up a way to call it from our main window and controller.


    In Xcode, make a new class in the WindowLab project called NotSoEasyWindowController
    by selecting File ➤ New File from the menu and choosing Cocoa from the OS X section
    in the template selector. Choose Objective-C class, and then specify that we want
    to make a subclass of NSWindowController. Xcode will suggest WLWindowController
    as the name, but you should change it to WLNotSoEasyWindowController. Check the
    With XIB for user interface checkbox, and Xcode will also generate a `WLNotSoEasyWindowController.xib`
    file for us, with the File’s Owner set to our new subclass, and with the window
    outlet pre-connected. Xcode will prompt you to save the nib file, and ask which
    group to add it to. Use the same group that we used with the Easy Window nib file
    above, the WindowLab folder. Xcode generates `WLNotSoEasyWindowController.h` and
    `WLNotSoEasyWindowController.m` files with some methods for us, but we’re going
    to need to do some work on these files.


    We’re making our own class here, and there’s only one nib file that it’s intended
    to manage. Accordingly, we can build in the name of the nib file so that anyone
    using this class only needs to know about the class, not the name of the nib file
    itself. We can also make things even easier for callers: assuming that anyone
    who creates an instance of this class wants to load the nib file, let’s build
    the call to `window` right into the `init` method. Do this by creating the following
    `init` method:


    `- init`


    `{`


    `if ((self = [super initWithWindowNibName:@"WLNotSoEasyWindowController"]))  {`


    `[self window];`


    `}`


    `return self;`


    `}`


    That’s the recommended form of the standard `init` method, in which we call another
    `init` method in the superclass, do work specific to our instance if it succeeds,
    and finish up by returning a pointer to `self`. While we’re in here, let’s remove
    the `initWithWindow:` method that Xcode generated for us because there’s no need
    for it to ever be called.


    Now switch over to `MainMenu.xib.` Once again, make the window a bit taller, duplicate
    the last button, and name it “Not So Easy.” Then open `WLAppDelegate.h` in the
    Assistant Editor, and Control-drag from the button over to `WLAppDelegate.h`,
    and add a new action called `loadNotSoEasyWindow`. Open up the `WLAppDelegate.m`
    file, and add the following implementation for that action:


    `// add this to WLAppDelegate.m:`


    `- (IBAction)loadNotSoEasyWindow:(id)sender`


    `{`


    `WLNotSoEasyWindowController *notSoEasyController = [[WLNotSoEasyWindowController
    alloc] init];`


    `[self.subWindows addObject:notSoEasyController];`


    `}`


    We’ll also need to add the following `#import` directive at the top of `WLAppDelegate.m`
    so that the compiler knows about the new class when it’s compiling the app delegate:


    `#import "WLNotSoEasyWindowController.h"`


    With that in place, let’s add a small bit of functionality to our window controller
    class, so that after our nib file is created, we can make sure that our window
    is connecting up with it as it should: a simple method that makes the computer
    beep when it’s called. Unfortunately, we’ll need to add it by hand, but that’s
    easy to do.


    Add the following method declaration to `WLNotSoEasyWindowController.h`:


    `- (IBAction)beep:(id)sender;`


    The whole contents of `WLNotSoEasyWindowController.m` should look like this, with
    the new `beep`: action method added: `#import "WLNotSoEasyWindowController.h"`


    `@interface WLNotSoEasyWindowController ()`


    `@end`


    `@implementation WLNotSoEasyWindowController`


    `- init`


    `{`


    `if ((self = [super initWithWindowNibName:@"WLNotSoEasyWindowController"])) {`


    `[self window];`


    `}`


    `return self;`


    `}`


    `- (void)windowDidLoad`


    `{`


    `[super windowDidLoad];`


    `// Implement this method to handle any initialization after your window controller''s
    window has been loaded from its nib file.`


    `}`


    `- (IBAction)beep:(id)sender`


    `{`


    `NSBeep();`


    `}`


    `@end`


    Open the `WLNotSoEasyWindowController.nib` file in an Interface Builder canvas,
    and drag out a button from the Object Library, and title it “Beep!” Control-drag
    from the Beep! button to the File’s Owner icon in the Object Dock, and select
    the `beep:` action that we just added. Xcode will automatically note that we’ve
    added a new action and make it available for use. Save the changes and select
    Run; the newest button will let us create windows that beep when we press their
    buttons, as seen in Figure [11-7](#A978-1-4302-4543-8_11_Chapter.html#Fig7).


    ![A978-1-4302-4543-8_11_Fig7_HTML.jpg](A978-1-4302-4543-8_11_Fig7_HTML.jpg)


    Figure 11-7.


    These windows’ buttons will beep at us


    ## Modal Windows


    Now we’re going to move on to a special kind of GUI item, the modal window. Everyone
    has used modal windows at one time or another, but if you’re new to desktop GUI
    programming, the term may be new to you. Basically, a modal window is one that
    puts our application in a particular “mode.” Specifically, a mode where it will
    only accept input through the controls on the modal window itself, and clicking
    anywhere else in the application will just make it beep at us. Because of their
    disruptive nature, modal windows should be used sparingly—in cases where the application
    can’t really move forward on its own without the user answering a question of
    some kinds (such as, “There are five open documents with unsaved changes. Are
    you sure you want to quit?”). In cases where the information the app needs from
    the user is related to just a single window or document, it’s better to use a
    sheet, described later in this chapter, which locks down a single window instead
    of the entire application.'
  trans: "\n### 子类化 `NSWindowController`\n\n当然，通常情况下你需要在自己的控制器类中编写部分代码。你也可以轻松地子类化\
    \ `NSWindowController` 以满足需求。接下来的步骤是创建一个子类，并为其新建一个 nib 文件供其加载，同时设置一种从主窗口和控制器中调用它的方法。\n\
    \n在 Xcode 的 WindowLab 项目中创建一个新类，命名为 `NotSoEasyWindowController`：选择菜单中的 \"File\"\
    \ ➤ \"New\" ➤ \"File\"，然后在模板选择器的 OS X 区域选择 \"Cocoa\"。接着选择 \"Objective-C class\"\
    ，并指定我们要创建 `NSWindowController` 的子类。Xcode 会建议命名为 `WLWindowController`，但你应该将其改为\
    \ `WLNotSoEasyWindowController`。勾选 \"With XIB for user interface\" 复选框，Xcode 还会为我们生成一个\
    \ `WLNotSoEasyWindowController.xib` 文件，该文件的 File's Owner 设置为我们的新子类，并且窗口插座（window\
    \ outlet）已预先连接好。Xcode 会提示你保存 nib 文件，并询问将其添加到哪个组中。请使用与上面 Easy Window nib 文件相同的组，即\
    \ WindowLab 文件夹。Xcode 会生成 `WLNotSoEasyWindowController.h` 和 `WLNotSoEasyWindowController.m`\
    \ 文件，其中包含一些方法，但我们还需要对这些文件进行一些处理。\n\n我们在这里创建自己的类，并且它只管理一个 nib 文件。因此，我们可以将 nib 文件名内建到类中，这样任何使用此类的人只需知道类名，而无需了解\
    \ nib 文件名本身。我们还可以让调用者使用起来更简便：假设任何创建此类实例的人都希望加载 nib 文件，那么我们可以将对 `window` 的调用直接内建到\
    \ `init` 方法中。通过创建以下 `init` 方法来实现：\n\n```\n- init\n{\n    if ((self = [super initWithWindowNibName:@\"\
    WLNotSoEasyWindowController\"]))  {\n        [self window];\n    }\n    return\
    \ self;\n}\n```\n\n这是标准 `init` 方法的推荐形式：我们调用父类中的另一个 `init` 方法，如果成功则执行实例特定的操作，最后返回指向\
    \ `self` 的指针。在此过程中，我们还要移除 Xcode 为我们生成的 `initWithWindow:` 方法，因为永远不需要调用它。\n\n现在切换到\
    \ `MainMenu.xib`。再次将窗口调高一些，复制最后一个按钮，并将其命名为 \"Not So Easy\"。然后在 Assistant Editor\
    \ 中打开 `WLAppDelegate.h`，按住 Control 键从按钮拖拽到 `WLAppDelegate.h`，并添加一个名为 `loadNotSoEasyWindow`\
    \ 的新操作（Action）。打开 `WLAppDelegate.m` 文件，为该操作添加以下实现代码：\n\n```\n// 添加到 WLAppDelegate.m\
    \ 中：\n- (IBAction)loadNotSoEasyWindow:(id)sender\n{\n    WLNotSoEasyWindowController\
    \ *notSoEasyController = [[WLNotSoEasyWindowController alloc] init];\n    [self.subWindows\
    \ addObject:notSoEasyController];\n}\n```\n\n我们还需要在 `WLAppDelegate.m` 的顶部添加以下\
    \ `#import` 指令，以便编译器在编译应用委托（app delegate）时知道新类的存在：\n\n```\n#import \"WLNotSoEasyWindowController.h\"\
    \n```\n\n完成这些后，让我们为窗口控制器类添加一点功能，这样在 nib 文件创建后，我们可以确保窗口正确连接：一个简单的方法，当它被调用时让计算机发出蜂鸣声。遗憾的是，我们需要手动添加它，但这很容易做到。\n\
    \n将以下方法声明添加到 `WLNotSoEasyWindowController.h` 中：\n\n```\n- (IBAction)beep:(id)sender;\n\
    ```\n\n`WLNotSoEasyWindowController.m` 的完整内容应如下所示，并添加了新的 `beep:` 操作方法：\n\n```\n\
    #import \"WLNotSoEasyWindowController.h\"\n\n@interface WLNotSoEasyWindowController\
    \ ()\n@end\n\n@implementation WLNotSoEasyWindowController\n\n- init\n{\n    if\
    \ ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"])) {\n\
    \        [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad\n\
    {\n    [super windowDidLoad];\n    // 在此方法中处理窗口控制器从 nib 文件加载后的任何初始化操作。\n}\n\n\
    - (IBAction)beep:(id)sender\n{\n    NSBeep();\n}\n\n@end\n```\n\n在 Interface Builder\
    \ 的画布中打开 `WLNotSoEasyWindowController.nib` 文件，从对象库中拖出一个按钮，并将其标题设置为 \"Beep!\"。按住\
    \ Control 键从 \"Beep!\" 按钮拖拽到 Object Dock 中的 File's Owner 图标，并选择我们刚刚添加的 `beep:`\
    \ 操作。Xcode 会自动检测到我们添加了新的操作，并使其可用。保存更改并点击运行；最新的按钮将允许我们创建窗口，当按下按钮时窗口会发出蜂鸣声，如图 11-7\
    \ 所示。\n\n![A978-1-4302-4543-8_11_Fig7_HTML.jpg](img/A978-1-4302-4543-8_11_Fig7_HTML.jpg)\n\
    \n图 11-7. 这些窗口的按钮会向我们发出蜂鸣声\n\n### 模态窗口\n\n现在我们将介绍一种特殊的 GUI 元素：模态窗口。每个人都曾用过模态窗口，但如果你刚接触桌面\
    \ GUI 编程，这个术语可能对你来说比较陌生。基本上，模态窗口会将我们的应用程序置于特定的“模式”中。具体来说，在这种模式下，应用程序只接受通过模态窗口本身的控件进行输入，而在应用程序的其他地方点击只会发出蜂鸣声。由于模态窗口具有干扰性，应谨慎使用——仅在应用程序确实需要用户回答某些问题（例如，“有五个打开的文档包含未保存的更改。您确定要退出吗？”）后才能自行推进的情况下使用。如果应用程序需要用户提供的信息仅与单个窗口或文档相关，则最好使用表单（sheet），这将在本章后面介绍，它可以锁定单个窗口而不是整个应用程序。\n"
- fmt: "### The NSAlert Functions\n\nThe simplest modal windows available in Cocoa\
    \ are the alert panels, which are created and run with a single function call.\
    \ The function returns when the user clicks one of the buttons, and we can then\
    \ check the return value to determine which of the buttons they clicked. Depending\
    \ on how we call the function, there may be one, two, or three buttons presented\
    \ for the user.\n\nThe most commonly used modal alert function is `NSRunAlertPanel`.\
    \ It has a few variants called `NSRunCriticalAlertPanel` and `NSRunInformationalAlertPanel`,\
    \ which are used for specific purposes outlined in Apple's user interface guidelines,\
    \ but we can safely stick with `NSRunAlertPanel`. Each of these functions takes\
    \ five or more parameters: first the title that appears at the top of the panel,\
    \ then the full text to display (which presents some information or asks the user\
    \ a question), then three strings (which may be `nil`) containing the button titles.\
    \ Button titles left as `nil` will simply won't be displayed, except for the case\
    \ where they're all `nil`, in which case a single OK button is included on the\
    \ panel.\n\nTo see some alert panels in action, open up `MainMenu.xib` in an Interface\
    \ Builder pane, and then open `WLAppDelegate.h` in an Assistant Editor pane. Add\
    \ a new button to the WindowLab window, and title it \"Run Modal Alerts.\" Control-drag\
    \ from the new button to the Assistant Editor to add a new action. Call the new\
    \ action `runModalAlerts`. Then, implement the following method in `WLAppDelegate.m`\
    \ inside the stub generated by Xcode:\n\n```\n- (IBAction)runModalAlerts:(id)sender\n\
    {\n  NSRunCriticalAlertPanel(@\"Basic Usage\", @\"This is a plain alert panel.\"\
    , nil, nil, nil);\n  NSRunAlertPanel(@\"Three Buttons\", @\"We can set button\
    \ titles:\",\n    @\"Really?\", @\"Oh, how delightful!\", @\"Whatever.\");\n \
    \ NSRunAlertPanel(@\"Formatting Strings\", @\"We can also do some formatting,\
    \ %@ %@\",\n    nil, nil, nil, @\"putting values for insertion at the end,\",\
    \ @\"after the three button values.\");\n  switch (NSRunAlertPanel(@\"Noticing\
    \ The Selection\",\n            @\"And of course, we can detect which button is\
    \ clicked.\",\n            @\"Default\", @\"Alternate\", @\"Other\")) {\n    case\
    \ NSAlertDefaultReturn:\n      NSRunInformationalAlertPanel(@\"Result:\", @\"\
    You pressed the default button\",\n         nil, nil, nil);\n      break;\n  \
    \  case NSAlertAlternateReturn:\n      NSRunInformationalAlertPanel(@\"Result:\"\
    , @\"You pressed the alternate button\",\n        nil, nil, nil);\n      break;\n\
    \    case NSAlertOtherReturn:\n      NSRunInformationalAlertPanel(@\"Result:\"\
    , @\"You pressed the other button\",\n        nil, nil, nil);\n      break;\n\
    \    default:\n      break;\n  }\n}\n```\n\nTry these out! Save, click Run, and\
    \ give it a whirl.\n\n### Open Panels and Save Panels\n\nThe other most commonly\
    \ used modal panels in Cocoa are probably the ones for opening and saving files,\
    \ `NSOpenPanel` and `NSSavePanel`. Using these panels is typically more than just\
    \ a one-liner. We first need to configure various options on the panel (for instance,\
    \ whether it should allow the user to select multiple files for opening, or just\
    \ one), then run the panel, check the return value (which indicates whether the\
    \ user eventually clicked the Open or Save button, or canceled out), and then\
    \ grab the resulting filenames from the panel. Note that these panels don't actually\
    \ do any file I/O; they just prompt the user for filenames and return the results.\
    \ Cocoa uses `NSURL`s for file paths instead of `NSStrings`, which allows Open\
    \ and Save dialogs to refer to things beyond just on the local file system (such\
    \ as iCloud).\n\nTo see an example of how this can work, consider the following\
    \ method, which pretends to copy a file. This method uses an `NSOpenPanel` to\
    \ prompt the user for the file to copy, and then uses an `NSSavePanel` to let\
    \ the user specify where the file should go:\n\n```\n- (IBAction)copyFile:(id)sender\n\
    {\n    NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n    [openPanel setTitle:@\"\
    Select file to copy:\"];\n    if ([openPanel runModal] == NSOKButton) {\n    \
    \    // get the first (and only) selected filename\n        NSURL *openPath =\
    \ [[openPanel URLs] objectAtIndex:0];\n        // pull out just the filename,\
    \ without directory path\n        NSString *openFilename = [openPath lastPathComponent];\n\
    \        NSSavePanel *savePanel = [NSSavePanel savePanel];\n        [savePanel\
    \ setTitle:@\"Enter destination filename:\"];\n        [savePanel setNameFieldStringValue:openFilename];\n\
    \        // run the save panel in its default directory, with the opened filename\n\
    \        // as a suggestion.\n        if ([savePanel runModal] == NSOKButton)\
    \ {\n            NSURL *savePath = [savePanel URL];\n            NSString *message\
    \ = [NSString stringWithFormat:\n                                 @\"You've opened\
    \ this file:\\n\\n%@\\n\\nand saved it here:\\n\\n%@\\n\\n\",\n              \
    \                   openPath, savePath];\n            NSRunAlertPanel(@\"Copying\
    \ file (not really)\", message, nil, nil, nil);\n        }\n    }\n}\n```\n\n\
    As before, add a button to the main window (call this one \"Copy File\") and then\
    \ Control-drag to the `WLAppDelegate.h` file to add an action. Name the action\
    \ `copyFile`. Then copy the code above into `WLAppDelegate.m` in place of the\
    \ action stub generated by Xcode. Save the changes, click Run, and try out the\
    \ new button. The standard Open panel will appear, followed by a standard Save\
    \ panel. Note that the Save panel even has built-in functionality to warn us when\
    \ we're selecting an existing file and ask us if we really want to overwrite it\
    \ (remember, it's perfectly safe to confirm overwriting the file in this example,\
    \ since we're not actually copying anything).\n\nIt's probably worth mentioning\
    \ here the not-so-obvious fact that `NSOpenPanel` is actually a subclass of `NSSavePanel`.\
    \ That means that if you can't seem to find the functionality you're expecting\
    \ in `NSOpenPanel`'s documentation or header file, you may need to check out `NSSavePanel`\
    \ as well.\n\n## System Menus\n\nNow that we've seen some of the basics of how\
    \ windows are used in Cocoa, let's spend some time dealing with another ever-present\
    \ feature of Mac OS X, the application menu. Unlike most other current operating\
    \ systems, Mac OS X presents its menu at the top of the screen instead of at the\
    \ top of each window. This arrangement has some nice upsides: screen real estate\
    \ is saved because instead of a horizontal strip taking space at the top of every\
    \ open window, there's just a single horizontal strip at the top showing the menu\
    \ for the active application. Also, the menu is easier and quicker to \"hit\"\
    \ with the mouse because we can just flick the mouse upwards and we know we'll\
    \ hit the menu, leaving us with just fine-tuning left and right to find the top\
    \ item we want to select.\n\nThis arrangement isn't without complications, however.\
    \ In a typical Windows application, there might be a number of different windows,\
    \ each with its own menu, containing items that are only relevant to that window's\
    \ contents. While it's technically possible to do something similar in a Mac OS\
    \ X application, changing the structure of the menu as different windows are selected,\
    \ this usage is frowned upon and will probably bother some users, who on the Mac\
    \ are quite accustomed to applications that behave in a consistent manner. Instead,\
    \ we can implement a behavior that is fully supported and recommended: enabling\
    \ and disabling menu items based on the currently selected window (or, indeed,\
    \ the currently selected object inside a window). In this section, we're going\
    \ to demonstrate how to do this, but first we're going to talk a bit about the\
    \ system menus that are included with Cocoa and standard across most applications."
  raw: '### The NSAlert Functions


    The simplest modal windows available in Cocoa are the alert panels, which are
    created and run with a single function call. The function returns when the user
    clicks one of the buttons, and we can then check the return value to determine
    which of the buttons they clicked. Depending on how we call the function, there
    may be one, two, or three buttons presented for the user.


    The most commonly used modal alert function is `NSRunAlertPanel`. It has a few
    variants called `NSRunCriticalAlertPanel` and `NSRunInformationalAlertPanel`,
    which are used for specific purposes outlined in Apple’s user interface guidelines,
    but we can safely stick with `NSRunAlertPanel`. Each of these functions takes
    five or more parameters: first the title that appears at the top of the panel,
    then the full text to display (which presents some information or asks the user
    a question), then three strings (which may be `nil`) containing the button titles.
    Button titles left as `nil` will simply won’t be displayed, except for the case
    where they’re all `nil`, in which case a single OK button is included on the panel.


    To see some alert panels in action, open up `MainMenu.xib` in an Interface Builder
    pane, and then open `WLAppDelegate.h` in an Assistant Editor pane. Add a new button
    to the WindowLab window, and title it “Run Modal Alerts.” Control-drag from the
    new button to the Assistant Editor to add a new action. Call the new action `runModalAlerts`.
    Then, implement the following method in `WLAppDelegate.m` inside the stub generated
    by Xcode:


    `- (IBAction)runModalAlerts:(id)sender`


    `{`


      `NSRunCriticalAlertPanel(@"Basic Usage", @"This is a plain alert panel.", nil,
    nil, nil);`


      `NSRunAlertPanel(@"Three Buttons", @"We can set button titles:"`,


        `@"Really?", @"Oh, how delightful!", @"Whatever.");`


      `NSRunAlertPanel(@"Formatting Strings", @"We can also do some formatting, %@
    %@"`,


        `nil, nil, nil, @"putting values for insertion at the end,", @"after the three
    button values.");`


      `switch (NSRunAlertPanel(@"Noticing The Selection"`,


                `@"And of course, we can detect which button is clicked."`,


                `@"Default", @"Alternate", @"Other")) {`


        `case NSAlertDefaultReturn:`


          `NSRunInformationalAlertPanel(@"Result:", @"You pressed the default button"`,


             `nil, nil, nil);`


          `break;`


        `case NSAlertAlternateReturn:`


          `NSRunInformationalAlertPanel(@"Result:", @"You pressed the alternate button"`,


            `nil, nil, nil);`


          `break;`


        `case NSAlertOtherReturn:`


          `NSRunInformationalAlertPanel(@"Result:", @"You pressed the other button"`,


            `nil, nil, nil);`


          `break;`


        `default:`


          `break;`


      `}`


    `}`


    Try these out! Save, click Run, and give it a whirl.


    ### Open Panels and Save Panels


    The other most commonly used modal panels in Cocoa are probably the ones for opening
    and saving files, `NSOpenPanel` and `NSSavePanel`. Using these panels is typically
    more than just a one-liner. We first need to configure various options on the
    panel (for instance, whether it should allow the user to select multiple files
    for opening, or just one), then run the panel, check the return value (which indicates
    whether the user eventually clicked the Open or Save button, or canceled out),
    and then grab the resulting filenames from the panel. Note that these panels don’t
    actually do any file I/O; they just prompt the user for filenames and return the
    results. Cocoa uses `NSURL`s for file paths instead of `NSStrings`, which allows
    Open and Save dialogs to refer to things beyond just on the local file system
    (such as iCloud).


    To see an example of how this can work, consider the following method, which pretends
    to copy a file. This method uses an `NSOpenPanel` to prompt the user for the file
    to copy, and then uses an `NSSavePanel` to let the user specify where the file
    should go:


    `- (IBAction)copyFile:(id)sender`


    `{`


        `NSOpenPanel *openPanel = [NSOpenPanel openPanel];`


        `[openPanel setTitle:@"Select file to copy:"];`


        `if ([openPanel runModal] == NSOKButton) {`


            `// get the first (and only) selected filename`


            `NSURL *openPath = [[openPanel URLs] objectAtIndex:0];`


            `// pull out just the filename, without directory path`


            `NSString *openFilename = [openPath lastPathComponent];`


            `NSSavePanel *savePanel = [NSSavePanel savePanel];`


            `[savePanel setTitle:@"Enter destination filename:"];`


            `[savePanel setNameFieldStringValue:openFilename];`


            `// run the save panel in its default directory, with the opened filename`


            `// as a suggestion.`


            `if ([savePanel runModal] == NSOKButton) {`


                `NSURL *savePath = [savePanel URL];`


                `NSString *message = [NSString stringWithFormat:`


                                     `@"You''ve opened this file:\n\n%@\n\nand saved
    it here:\n\n%@\n\n"`,


                                     `openPath, savePath];`


                `NSRunAlertPanel(@"Copying file (not really)", message, nil, nil,
    nil);`


            `}`


        `}`


    `}`


    As before, add a button to the main window (call this one “Copy File”) and then
    Control-drag to the `WLAppDelegate.h` file to add an action. Name the action `copyFile`.
    Then copy the code above into `WLAppDelegate.m` in place of the action stub generated
    by Xcode. Save the changes, click Run, and try out the new button. The standard
    Open panel will appear, followed by a standard Save panel. Note that the Save
    panel even has built-in functionality to warn us when we’re selecting an existing
    file and ask us if we really want to overwrite it (remember, it’s perfectly safe
    to confirm overwriting the file in this example, since we’re not actually copying
    anything).


    It’s probably worth mentioning here the not-so-obvious fact that `NSOpenPanel`
    is actually a subclass of `NSSavePanel`. That means that if you can’t seem to
    find the functionality you’re expecting in `NSOpenPanel`’s documentation or header
    file, you may need to check out `NSSavePanel` as well.


    ## System Menus


    Now that we’ve seen some of the basics of how windows are used in Cocoa, let’s
    spend some time dealing with another ever-present feature of Mac OS X, the application
    menu. Unlike most other current operating systems, Mac OS X presents its menu
    at the top of the screen instead of at the top of each window. This arrangement
    has some nice upsides: screen real estate is saved because instead of a horizontal
    strip taking space at the top of every open window, there’s just a single horizontal
    strip at the top showing the menu for the active application. Also, the menu is
    easier and quicker to “hit” with the mouse because we can just flick the mouse
    upwards and we know we’ll hit the menu, leaving us with just fine-tuning left
    and right to find the top item we want to select.


    This arrangement isn’t without complications, however. In a typical Windows application,
    there might be a number of different windows, each with its own menu, containing
    items that are only relevant to that window’s contents. While it’s technically
    possible to do something similar in a Mac OS X application, changing the structure
    of the menu as different windows are selected, this usage is frowned upon and
    will probably bother some users, who on the Mac are quite accustomed to applications
    that behave in a consistent manner. Instead, we can implement a behavior that
    is fully supported and recommended: enabling and disabling menu items based on
    the currently selected window (or, indeed, the currently selected object inside
    a window). In this section, we’re going to demonstrate how to do this, but first
    we’re going to talk a bit about the system menus that are included with Cocoa
    and standard across most applications.'
  trans: "\n### NSAlert 函数\n\nCocoa 中最简单的模态窗口是警报面板，它们通过单个函数调用来创建和运行。当用户点击其中一个按钮时，函数会返回，然后我们可以检查返回值以确定他们点击了哪个按钮。根据我们调用函数的方式，面板上可能会显示一个、两个或三个按钮。\n\
    \n最常用的模态警报函数是 `NSRunAlertPanel`。它还有几个变体，名为 `NSRunCriticalAlertPanel` 和 `NSRunInformationalAlertPanel`，它们用于\
    \ Apple 用户界面指南中概述的特定目的，但我们可以安全地使用 `NSRunAlertPanel`。这些函数中的每一个都接受五个或更多参数：首先是显示在面板顶部的标题，然后是显示的全文本（用于呈现某些信息或向用户提问），然后是三个包含按钮标题的字符串（可能为\
    \ `nil`）。设为 `nil` 的按钮标题将不会显示，除非它们全部为 `nil`，在这种情况下，面板上会包含一个单一的“确定”按钮。\n\n要查看一些警报面板的实际效果，请在一个\
    \ Interface Builder 窗格中打开 `MainMenu.xib`，然后在 Assistant Editor 窗格中打开 `WLAppDelegate.h`。向\
    \ WindowLab 窗口添加一个新按钮，并将其标题设为“运行模态警报”。从新按钮 Control-拖拽到 Assistant Editor 以添加一个新的操作。将新操作命名为\
    \ `runModalAlerts`。然后，在 Xcode 生成的存根内部的 `WLAppDelegate.m` 中实现以下方法：\n\n```\n- (IBAction)runModalAlerts:(id)sender\n\
    {\n  NSRunCriticalAlertPanel(@\"基本用法\", @\"这是一个普通的警报面板。\", nil, nil, nil);\n \
    \ NSRunAlertPanel(@\"三个按钮\", @\"我们可以设置按钮标题：\",\n    @\"真的吗？\", @\"哦，太棒了！\", @\"\
    随便。\");\n  NSRunAlertPanel(@\"格式化字符串\", @\"我们也可以进行一些格式化，%@ %@\",\n    nil, nil,\
    \ nil, @\"将需要插入的值放在末尾，\", @\"放在三个按钮值之后。\");\n  switch (NSRunAlertPanel(@\"注意选择\"\
    ,\n            @\"当然，我们可以检测点击了哪个按钮。\",\n            @\"默认\", @\"备用\", @\"其他\"\
    )) {\n    case NSAlertDefaultReturn:\n      NSRunInformationalAlertPanel(@\"结果：\"\
    , @\"你按下了默认按钮\",\n         nil, nil, nil);\n      break;\n    case NSAlertAlternateReturn:\n\
    \      NSRunInformationalAlertPanel(@\"结果：\", @\"你按下了备用按钮\",\n        nil, nil,\
    \ nil);\n      break;\n    case NSAlertOtherReturn:\n      NSRunInformationalAlertPanel(@\"\
    结果：\", @\"你按下了其他按钮\",\n        nil, nil, nil);\n      break;\n    default:\n \
    \     break;\n  }\n}\n```\n\n试试这些！保存，点击“运行”，然后试一试。\n\n### 打开面板与保存面板\n\nCocoa 中其他最常用的模态面板可能是用于打开和保存文件的\
    \ `NSOpenPanel` 和 `NSSavePanel`。使用这些面板通常不仅仅是一行代码那么简单。我们首先需要在面板上配置各种选项（例如，是否允许用户选择多个文件打开，或者仅允许一个），然后运行面板，检查返回值（指示用户最终点击了“打开”或“保存”按钮，还是取消了），然后从面板获取生成的文件名。请注意，这些面板实际上并不执行任何文件\
    \ I/O 操作；它们只是提示用户输入文件名并返回结果。Cocoa 使用 `NSURL` 来表示文件路径，而不是 `NSString`，这使得“打开”和“保存”对话框能够引用本地文件系统之外的内容（例如\
    \ iCloud）。\n\n要了解如何实现这一点，请考虑以下方法，它模拟了复制文件的操作。此方法使用 `NSOpenPanel` 提示用户选择要复制的文件，然后使用\
    \ `NSSavePanel` 让用户指定文件的目标位置：\n\n```\n- (IBAction)copyFile:(id)sender\n{\n   \
    \ NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n    [openPanel setTitle:@\"\
    选择要复制的文件：\"];\n    if ([openPanel runModal] == NSOKButton) {\n        // 获取第一个（且唯一）选中的文件名\n\
    \        NSURL *openPath = [[openPanel URLs] objectAtIndex:0];\n        // 只提取文件名，不包含目录路径\n\
    \        NSString *openFilename = [openPath lastPathComponent];\n        NSSavePanel\
    \ *savePanel = [NSSavePanel savePanel];\n        [savePanel setTitle:@\"输入目标文件名：\"\
    ];\n        [savePanel setNameFieldStringValue:openFilename];\n        // 在默认目录下运行保存面板，并将打开的文件名作为建议。\n\
    \        if ([savePanel runModal] == NSOKButton) {\n            NSURL *savePath\
    \ = [savePanel URL];\n            NSString *message = [NSString stringWithFormat:\n\
    \                                 @\"你已打开此文件：\\n\\n%@\\n\\n 并将其保存到此处：\\n\\n%@\\\
    n\\n\",\n                                 openPath, savePath];\n            NSRunAlertPanel(@\"\
    复制文件（并非真的复制）\", message, nil, nil, nil);\n        }\n    }\n}\n```\n\n和之前一样，在主窗口中添加一个按钮（将其命名为“复制文件”），然后\
    \ Control-拖拽到 `WLAppDelegate.h` 文件以添加一个操作。将该操作命名为 `copyFile`。然后将上面的代码复制到 `WLAppDelegate.m`，替换\
    \ Xcode 生成的操作存根。保存更改，点击“运行”，然后尝试新按钮。标准的“打开”面板会出现，接着是标准的“保存”面板。请注意，“保存”面板甚至内置了在选中现有文件时发出警告并询问是否真的要覆盖的功能（请记住，在此示例中确认覆盖文件是完全安全的，因为我们实际上并没有复制任何内容）。\n\
    \n这里可能有必要提一下一个不那么显而易见的事实：`NSOpenPanel` 实际上是 `NSSavePanel` 的子类。这意味着，如果你在 `NSOpenPanel`\
    \ 的文档或头文件中找不到所需的功能，你可能还需要查看 `NSSavePanel`。\n\n## 系统菜单\n\n现在我们已经了解了 Cocoa 中窗口的一些基本用法，让我们花些时间讨论一下\
    \ Mac OS X 的另一个无处不在的功能：应用程序菜单。与大多数其他当前操作系统不同，Mac OS X 的菜单位于屏幕顶部，而不是每个窗口的顶部。这种布局有一些不错的优点：由于每个打开的窗口顶部不再需要一个水平条来占用空间，而只是在顶部有一个单一的水平条来显示活动应用程序的菜单，因此节省了屏幕空间。此外，用鼠标“点击”菜单更加容易和快捷，因为我们只需将鼠标向上甩动，就知道会碰到菜单，剩下的只需要精细地左右移动来找到想要选择的最顶部项目。\n\
    \n然而，这种布局并非没有复杂性。在典型的 Windows 应用程序中，可能会有多个不同的窗口，每个窗口都有自己的菜单，其中包含仅与该窗口内容相关的项目。虽然在技术上是可行的，可以在\
    \ Mac OS X 应用程序中做类似的事情，即当选择不同窗口时更改菜单结构，但这种用法是不受欢迎的，并且可能会困扰一些用户，因为 Mac 用户已经习惯了行为一致的应用程序。相反，我们可以实现一个完全受支持并被推荐的行为：根据当前选中的窗口（或者更确切地说，窗口内当前选中的对象）来启用或禁用菜单项。在本节中，我们将演示如何做到这一点，但首先我们将简要介绍一下\
    \ Cocoa 自带的、并且在大多数应用程序中都是标准的系统菜单。\n"
- fmt: "### Standard Application Menu Items\n\nApple’s guidelines define a set of\
    \ menus and menu items that should appear in most applications. Create a new application\
    \ in Xcode, and name it `MenuLab`, and use `ML` as the class prefix. This is where\
    \ we’ll do some experimenting with menu items. Open the freshly created `MainMenu.xib`\
    \ file, and the Interface Builder canvas will show the predefined set of menus\
    \ at the top. This set contains top-level entries for the application itself,\
    \ followed by File, Edit, Format, View, Window, and Help, each of which contains\
    \ menu items of its own. Open up the Connections Inspector so that we can examine\
    \ some of these items and see what they’re connected to. Just click around on\
    \ each of the various menu items, and keep your eye on the Inspector after each\
    \ click. There are a few exceptions, such as the Show Fonts menu item, but most\
    \ of the items are connected to the First Responder proxy that we talked about\
    \ earlier. Note that by connecting a menu item to the First Responder, not only\
    \ will the item call its action method in the most relevant object, it will also\
    \ be automatically enabled and disabled based on the contents of the responder\
    \ chain.\n\n### Our Own Menus\n\nThe standard menus contain a lot of functionality;\
    \ everything from bringing up the app’s About Box, to editing and formatting text,\
    \ to dealing with windows is all set up. However, many applications need some\
    \ extra functionality—something that doesn’t seem right to attach to a window,\
    \ or just takes up too much space in a window. One common way to address this\
    \ is to add one or more additional top-level menu items, usually between the View\
    \ and Window menus. For instance, the Finder has a Go menu in there, and Xcode\
    \ has three additional top-level menus: Navigate, Editor, and Product. In our\
    \ application, we’ll get by with just one additional menu, which we’ll add to\
    \ our `MenuLab` project.\n\n### Enabling/Disabling With Bindings\n\nThe first\
    \ thing we’re going to do is set up a pair of menu items to control a Boolean\
    \ attribute in our app delegate. We could use these to control some sort of switch\
    \ that affects an application-wide setting. Here, we’ll create a property called\
    \ `turbo`, which presumably makes everything happen faster (easy enough in `MenuLab`\
    \ because it doesn’t actually do anything). We’ll have two menu items labeled\
    \ “Turbo On” and “Turbo Off,” and connect each of them to an action method in\
    \ our app delegate to do the actual toggling. Then we’ll use bindings to enable\
    \ and disable them as appropriate, so that when `turbo` is `YES`, only the “Turbo\
    \ Off” item is clickable, and when `turbo` is `NO`, only the “Turbo On” item is\
    \ clickable.\n\nStart off in Xcode by adding the `turbo` property to the app delegate,\
    \ along with an action method to toggle the value of the property. The changes\
    \ we need to make to both `MLAppDelegate.h` and `MLAppDelegate.m` are shown here,\
    \ in a somewhat compacted form, with blank lines removed. All we need to add are\
    \ the lines shown in bold.\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface MLAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    \n@property (assign) BOOL turbo;\n\n- (IBAction)toggleTurbo:(id)sender;\n\n@end\n\
    ```\n\nAnd for `MLAppDelegate.m`:\n\n```\n#import \"MLAppDelegate.h\"\n\n@implementation\
    \ MLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n\
    {\n    // Insert code here to initialize your application\n}\n\n- (IBAction)toggleTurbo:(id)sender\
    \ {\n    self.turbo = !self.turbo;\n}\n\n@end\n```\n\nNow switch back to `MainMenu.xib`\
    \ in an Interface Builder canvas. Open up the nib file’s empty window, change\
    \ its title to “Turbo Switch,” and drag in a checkbox from the Object Library,\
    \ changing its title to “Turbo!” once it’s in place. We put this checkbox there\
    \ to give us a direct view of the value stored in the app delegate’s `turbo` property,\
    \ so we can easily check and see that our menu items are doing the right thing.\
    \ Open the Bindings Inspector, and configure the checkbox’s Value binding, connecting\
    \ it to `MLAppDelegate` using the `turbo` key path.\n\nNext, it’s time to create\
    \ some menu items (Figure [11-8](#A978-1-4302-4543-8_11_Chapter.html#Fig8) shows\
    \ what it should look like when we’re done). To do this, first search for Menu\
    \ in the Object Library, which will limit the contents. Drag a Submenu Menu Item\
    \ up into the menu, placing it between the View and Window menus. Double-click\
    \ the new top-level menu item that we just added, and change its title to “Tools.”\
    \ Clicking it again will reveal that it already contains a single item (titled\
    \ “Item”). Click to select it, then press ⌘-D to duplicate it, which places an\
    \ identical item just below it.\n\n![A978-1-4302-4543-8_11_Fig8_HTML.jpg](A978-1-4302-4543-8_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8. Setting up menu items for toggling a Boolean attribute\n\nAt this\
    \ point, the lower of the two new menu items should be selected. Double-click\
    \ to select the title text, and rename it “Turbo Off.” Control-drag from it to\
    \ the App Delegate icon in the main window, and connect to the `toggleTurbo:`\
    \ action. Now bring up the Bindings Inspector, and configure the menu item’s Enabled\
    \ binding, connecting to the App Delegate using the `turbo` key path. This ensures\
    \ that the menu will only be enabled if the value of app delegate’s `turbo` property\
    \ is `YES`.\n\nNow go back to the upper menu item, renaming it “Turbo On,” and\
    \ connecting it to the app delegate’s `toggleTurbo:` action just like you did\
    \ for Turbo Off. Because the condition for whether this menu item should be enabled\
    \ or disabled is the opposite of the condition for the Turbo Off menu item, the\
    \ binding is going to be a little different. It should also have its Enabled binding\
    \ configured with App Delegate and the `turbo` key path, but below that you also\
    \ need to specify `NSNegateBoolean` as the Value Transformer.\n\nSave the changes\
    \ and click Run. The Turbo Switch window should appear, containing a checkbox.\
    \ Our app should have a Tools menu containing Turbo On and Turbo Off items, only\
    \ one of which should be enabled at a time; clicking the enabled item should toggle\
    \ the checkbox and change the state of both menu items, so that now only the other\
    \ item is enabled. Also, clicking the checkbox should affect the enabled/disabled\
    \ state of each menu item appropriately.\n\nThis is a simple way to enable and\
    \ disable menu items through the use of bindings, but we’d be remiss if we didn’t\
    \ point out that this usage is sort of artificial and not really the way that\
    \ you’d normally deal with application-wide Boolean values in a menu. In a case\
    \ like this, instead of two menu items, one of which is always disabled, you’re\
    \ more likely to use a single menu item showing a checkbox to indicate a state,\
    \ just like the checkbox in our window does. As it turns out, that’s even easier\
    \ to do than what we’ve already done. Go back to `MainMenu.xib`, open up the Tools\
    \ menu in the Interface Builder Canvas, and drag out a new Menu Item from the\
    \ Object Library onto the Tools menu. Name this new item “Turbo,” and configure\
    \ its Value binding, connecting to App Delegate using the `turbo` key path. That’s\
    \ it! We don’t need to Control-drag to set up the action for the menu item; Cocoa\
    \ Bindings manages it all for us. Save, Run, and try it out. Note that this quick\
    \ method doesn’t even need the `toggleTurbo:` method, so if we want, we can delete\
    \ that method along with the Turbo On and Turbo Off items."
  raw: '### Standard Application Menu Items


    Apple’s guidelines define a set of menus and menu items that should appear in
    most applications. Create a new application in Xcode, and name it MenuLab, and
    use ML as the class prefix. This is where we’ll do some experimenting with menu
    items. Open the freshly created `MainMenu.xib` file, and the Interface Builder
    canvas will show the predefined set of menus at the top. This set contains top-level
    entries for the application itself, followed by File, Edit, Format, View, Window,
    and Help, each of which contains menu items of its own. Open up the Connections
    Inspector so that we can examine some of these items and see what they’re connected
    to. Just click around on each of the various menu items, and keep your eye on
    the Inspector after each click. There are a few exceptions, such as the Show Fonts
    menu item, but most of the items are connected to the First Responder proxy that
    we talked about earlier. Note that by connecting a menu item to the First Responder,
    not only will the item call its action method in the most relevant object, it
    will also be automatically enabled and disabled based on the contents of the responder
    chain.


    ### Our Own Menus


    The standard menus contain a lot of functionality; everything from bringing up
    the app’s About Box, to editing and formatting text, to dealing with windows is
    all set up. However, many applications need some extra functionality—something
    that doesn’t seem right to attach to a window, or just takes up too much space
    in a window. One common way to address this is to add one or more additional top-level
    menu items, usually between the View and Window menus. For instance, the Finder
    has a Go menu in there, and Xcode has three additional top-level menus: Navigate,
    Editor, and Product. In our application, we’ll get by with just one additional
    menu, which we’ll add to our MenuLab project.


    ### Enabling/Disabling With Bindings


    The first thing we’re going to do is set up a pair of menu items to control a
    Boolean attribute in our app delegate. We could use these to control some sort
    of switch that affects an application-wide setting. Here, we’ll create a property
    called `turbo`, which presumably makes everything happen faster (easy enough in
    MenuLab because it doesn’t actually do anything). We’ll have two menu items labeled
    “Turbo On” and “Turbo Off,” and connect each of them to an action method in our
    app delegate to do the actual toggling. Then we’ll use bindings to enable and
    disable them as appropriate, so that when turbo is `YES`, only the “Turbo Off”
    item is clickable, and when turbo is `NO`, only the “Turbo On” item is clickable.


    Start off in Xcode by adding the `turbo` property to the app delegate, along with
    an action method to toggle the value of the property. The changes we need to make
    to both `MLAppDelegate.h` and `MLAppDelegate.m` are shown here, in a somewhat
    compacted form, with blank lines removed. All we need to add are the lines shown
    in bold.


    `#import <Cocoa/Cocoa.h>`


    `@interface MLAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (assign) BOOL turbo;`


    `- (IBAction)toggleTurbo:(id)sender;`


    `@end`


    And for `MLAppDelegate.m`:


    `#import "MLAppDelegate.h"`


    `@implementation MLAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `// Insert code here to initialize your application`


    `}`


    `- (IBAction)toggleTurbo:(id)sender {`


    `self.turbo = !self.turbo;`


    `}`


    `@end`


    Now switch back to `MainMenu.xib` in an Interface Builder canvas. Open up the
    nib file’s empty window, change its title to “Turbo Switch,” and drag in a checkbox
    from the Object Library, changing its title to “Turbo!” once it’s in place. We
    put this checkbox there to give us a direct view of the value stored in the app
    delegate’s `turbo` property, so we can easily check and see that our menu items
    are doing the right thing. Open the Bindings Inspector, and configure the checkbox’s
    Value binding, connecting it to MLAppDelegate using the turbo key path.


    Next, it’s time to create some menu items (Figure [11-8](#A978-1-4302-4543-8_11_Chapter.html#Fig8)
    shows what it should look like when we’re done). To do this, first search for
    Menu in the Object Library, which will limit the contents. Drag a Submenu Menu
    Item up into the menu, placing it between the View and Window menus. Double-click
    the new top-level menu item that we just added, and change its title to “Tools.”
    Clicking it again will reveal that it already contains a single item (titled “Item”).
    Click to select it, then press ⌘-D to duplicate it, which places an identical
    item just below it.


    ![A978-1-4302-4543-8_11_Fig8_HTML.jpg](A978-1-4302-4543-8_11_Fig8_HTML.jpg)


    Figure 11-8.


    Setting up menu items for toggling a Boolean attribute


    At this point, the lower of the two new menu items should be selected. Double-click
    to select the title text, and rename it “Turbo Off.” Control-drag from it to the
    App Delegate icon in the main window, and connect to the `toggleTurbo:` action.
    Now bring up the Bindings Inspector, and configure the menu item’s Enabled binding,
    connecting to the App Delegate using the turbo key path. This ensures that the
    menu will only be enabled if the value of app delegate’s turbo property is `YES`.


    Now go back to the upper menu item, renaming it “Turbo On,” and connecting it
    to the app delegate’s `toggleTurbo:` action just like you did for Turbo Off. Because
    the condition for whether this menu item should be enabled or disabled is the
    opposite of the condition for the Turbo Off menu item, the binding is going to
    be a little different. It should also have its Enabled binding configured with
    App Delegate and the turbo key path, but below that you also need to specify NSNegateBoolean
    as the Value Transformer.


    Save the changes and click Run. The Turbo Switch window should appear, containing
    a checkbox. Our app should have a Tools menu containing Turbo On and Turbo Off
    items, only one of which should be enabled at a time; clicking the enabled item
    should toggle the checkbox and change the state of both menu items, so that now
    only the other item is enabled. Also, clicking the checkbox should affect the
    enabled/disabled state of each menu item appropriately.


    This is a simple way to enable and disable menu items through the use of bindings,
    but we’d be remiss if we didn’t point out that this usage is sort of artificial
    and not really the way that you’d normally deal with application-wide Boolean
    values in a menu. In a case like this, instead of two menu items, one of which
    is always disabled, you’re more likely to use a single menu item showing a checkbox
    to indicate a state, just like the checkbox in our window does. As it turns out,
    that’s even easier to do than what we’ve already done. Go back to `MainMenu.xib`,
    open up the Tools menu in the Interface Builder Canvas, and drag out a new Menu
    Item from the Object Library onto the Tools menu. Name this new item “Turbo,”
    and configure its Value binding, connecting to App Delegate using the turbo key
    path. That’s it! We don’t need to Control-drag to set up the action for the menu
    item; Cocoa Bindings manages it all for us. Save, Run, and try it out. Note that
    this quick method doesn’t even need the `toggleTurbo:` method, so if we want,
    we can delete that method along with the Turbo On and Turbo Off items.'
  trans: "\n### 标准应用程序菜单项\n\n苹果的指南定义了一组应出现在大多数应用程序中的菜单和菜单项。在 Xcode 中创建一个新应用程序，并将其命名为\
    \ `MenuLab`，使用 `ML` 作为类前缀。我们将在此处对菜单项进行一些实验。打开新建的 `MainMenu.xib` 文件，界面构建器画布将显示顶部预定义的菜单集。该集包含应用程序本身的顶层条目，其后依次是文件、编辑、格式、视图、窗口和帮助，每个菜单都包含各自的菜单项。打开连接检查器，以便我们检查其中一些项目，并查看它们的连接对象。只需依次点击各个不同的菜单项，并在每次点击后留意检查器。除了少数例外情况，例如“显示字体”菜单项，大多数项目都连接到我们之前讨论过的**第一响应者**代理。请注意，通过将菜单项连接到第一响应者，该*项目*不仅会在最相关的对象中调用其操作方法，还会根据响应者链的内容自动启用或禁用。\n\
    \n### 自定义菜单\n\n标准菜单包含大量功能：从调出应用程序的“关于”对话框，到编辑和格式化文本，再到处理窗口，所有功能都已预设。然而，许多应用程序需要一些额外的功能——有些功能不适合附加到窗口，或者会占用窗口过多空间。一种常见的解决方法是添加一个或多个额外的顶层菜单项，通常位于“视图”和“窗口”菜单之间。例如，访达中有一个“前往”菜单，而\
    \ Xcode 有三个额外的顶层菜单：“导航”、“编辑器”和“产品”。在我们的应用程序中，我们只需添加一个额外菜单，将其加入到 `MenuLab` 项目中即可。\n\
    \n### 通过绑定启用/禁用\n\n我们要做的第一件事是设置一对菜单项来控制应用委托中的布尔属性。我们可以用它们来控制某个影响应用程序全局设置的开关。在这里，我们将创建一个名为\
    \ `turbo` 的属性，它应该能让一切运行得更快（在 `MenuLab` 中很容易实现，因为它实际上不执行任何操作）。我们将创建两个菜单项，分别标记为“Turbo\
    \ 开”和“Turbo 关”，并将它们分别连接到应用委托中的一个操作方法，以执行实际的切换操作。然后，我们将使用绑定来适当地启用和禁用它们，这样当 `turbo`\
    \ 为 `YES` 时，只有“Turbo 关”项可点击；当 `turbo` 为 `NO` 时，只有“Turbo 开”项可点击。\n\n首先在 Xcode 中，将\
    \ `turbo` 属性添加到应用委托中，并添加一个操作方法用于切换该属性的值。我们需要对 `MLAppDelegate.h` 和 `MLAppDelegate.m`\
    \ 进行的更改如下所示，格式稍作简化并移除了空行。我们只需添加加粗显示的行。\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ MLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n\n@property (assign) BOOL turbo;\n\n- (IBAction)toggleTurbo:(id)sender;\n\
    \n@end\n```\n\n以及 `MLAppDelegate.m` 的内容：\n\n```\n#import \"MLAppDelegate.h\"\n\
    \n@implementation MLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    // 在此处插入代码以初始化应用程序\n}\n\n- (IBAction)toggleTurbo:(id)sender\
    \ {\n    self.turbo = !self.turbo;\n}\n\n@end\n```\n\n现在切换回界面构建器画布中的 `MainMenu.xib`。打开\
    \ nib 文件的空白窗口，将其标题更改为“Turbo 开关”，然后从对象库中拖入一个复选框，放置到位后将其标题更改为“Turbo!”。我们放置此复选框是为了直接查看应用委托的\
    \ `turbo` 属性中存储的值，从而方便地检查并确认我们的菜单项是否按预期工作。打开绑定检查器，配置复选框的“值”绑定，使用 `turbo` 键路径连接到\
    \ `MLAppDelegate`。\n\n接下来，是时候创建一些菜单项了（图 11-8 显示了完成后的效果）。为此，首先在对象库中搜索“菜单”，以限制显示内容。将一个“子菜单菜单项”拖入菜单中，放置在“视图”和“窗口”菜单之间。双击我们刚刚添加的新顶层菜单项，并将其标题更改为“工具”。再次点击它，会发现它已经包含一个项目（标题为“项目”）。点击选中它，然后按\
    \ ⌘-D 复制，会在其下方放置一个完全相同的项目。\n\n![A978-1-4302-4543-8_11_Fig8_HTML.jpg](img/A978-1-4302-4543-8_11_Fig8_HTML.jpg)\n\
    \n图 11-8. 设置用于切换布尔属性的菜单项\n\n此时，两个新菜单项中的下方那个应处于选中状态。双击以选中标题文本，并将其重命名为“Turbo 关”。按住\
    \ Control 键从它拖拽到主窗口中的“应用委托”图标，并连接到 `toggleTurbo:` 动作。现在打开绑定检查器，配置菜单项的“启用”绑定，使用\
    \ `turbo` 键路径连接到应用委托。这可以确保只有当应用委托的 `turbo` 属性值为 `YES` 时，该菜单才被启用。\n\n现在回到上方那个菜单项，将其重命名为“Turbo\
    \ 开”，并像对“Turbo 关”所做的那样，将其连接到应用委托的 `toggleTurbo:` 动作。由于此菜单项应启用或禁用的条件与“Turbo 关”菜单项的条件相反，因此绑定会略有不同。它的“启用”绑定也应该配置为应用委托和\
    \ `turbo` 键路径，但除此之外，还需要指定 `NSNegateBoolean` 作为值转换器。\n\n保存更改并点击“运行”。应该会出现一个包含复选框的“Turbo\
    \ 开关”窗口。我们的应用程序应该有一个包含“Turbo 开”和“Turbo 关”项目的“工具”菜单，每次只有一个应处于启用状态；点击启用的项目应该切换复选框的状态，并同时改变两个菜单项的状态，使得另一个项目变为启用状态。此外，点击复选框应该相应地影响每个菜单项的启用/禁用状态。\n\
    \n这是通过使用绑定来启用和禁用菜单项的一种简单方法，但我们需要指出，这种用法有些刻意，并不是处理菜单中应用程序范围布尔值的常规方式。在这种情况下，与其使用两个菜单项（其中一个始终被禁用），更常见的做法是使用一个带有复选框的菜单项来指示状态，就像我们窗口中的复选框那样。事实证明，这比我们已经完成的操作还要简单。返回\
    \ `MainMenu.xib`，在界面构建器画布中打开“工具”菜单，从对象库中将一个新的菜单项拖到“工具”菜单上。将此新菜单项命名为“Turbo”，并配置其“值”绑定，使用\
    \ `turbo` 键路径连接到应用委托。就这样！我们不需要通过 Control-拖拽来设置菜单项的动作；Cocoa 绑定会替我们处理所有事情。保存、运行并尝试一下。请注意，这种快速方法甚至不需要\
    \ `toggleTurbo:` 方法，因此如果需要，我们可以删除该方法以及“Turbo 开”和“Turbo 关”菜单项。\n"
- fmt: "### Enabling/Disabling With First Responder\n\nNow we’re going to show a more\
    \ common way of automatically enabling and disabling menu items, which gives us\
    \ more fine-grained control so that the enabled state of each menu item can be\
    \ updated automatically depending on which window is selected, which text field\
    \ or other control in a window is selected, and so on. This method works using\
    \ the responder chain, somewhat similar to how the color panel finds an object\
    \ to pass a selected color to, as described earlier in this chapter. In this case,\
    \ the method that’s searched for along the responder chain is `validateUserInterfaceItem:`,\
    \ whose declaration looks like this:\n\n```\n- (BOOL)validateUserInterfaceItem:(id\
    \ <NSValidatedUserInterfaceItem>)anItem;\n```\n\nIf it’s implemented in the responder\
    \ chain’s objects, this method is called at the appropriate time to see if the\
    \ user interface item (in this case, a menu item) should be enabled or not. In\
    \ implementing this method, we can use `anItem` to get some information about\
    \ the object that’s going to be enabled or disabled; we can ask it for its action\
    \ (so we can compare with one of our own methods) and for its tag (in case we’d\
    \ rather compare against a control tag we’ve set on the object). Usually we’ll\
    \ just want to use the action. We’ll demonstrate how this works in just a bit,\
    \ but first we should probably clarify just when this method is called.\n\nHere’s\
    \ the basic idea: any time Cocoa is about to draw the menu, generally in response\
    \ to the user clicking on the menu bar, some checks are made for each menu item\
    \ to determine whether it should be enabled or disabled. The flowchart in Figure\
    \ [11-9](#A978-1-4302-4543-8_11_Chapter.html#Fig9) gives a rough outline of the\
    \ sequence of events.\n\n![A978-1-4302-4543-8_11_Fig9_HTML.jpg](A978-1-4302-4543-8_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9. How the menu system decides whether a menu item should be enabled\
    \ or not\n\nThe upshot of all this is that the menu item’s target object, whether\
    \ configured explicitly or found in the responder chain, is the one that decides\
    \ whether the menu item should be enabled (at the current time) or not. This means\
    \ that we have complete dynamic control over each menu item. By implementing `validateUserInterfaceItem:`\
    \ in each of our classes containing methods that are called by menu items, whether\
    \ directly or through the responder chain, we can define some logic that the menu\
    \ system calls at the right time, and automatically enables or disables each menu\
    \ item based on what we return.\n\nLet’s illustrate this with an example. We’ll\
    \ create a new window in our nib file, matched by a new delegate class just for\
    \ that window, which will implement `validateUserInterfaceItem:` to handle the\
    \ state of a menu item. In a real application, you would probably base it on the\
    \ content of a model object, but for simplicity’s sake, we’ll enable or disable\
    \ a menu item based on what’s selected in the window.\n\nStart by creating a new\
    \ class in Xcode, just a plain `NSObject` subclass called `MLListWindowDelegate`.\
    \ To do this, select File ➤ New ➤ File, and then select Cocoa under the OS X heading\
    \ on the left. Select Objective-C Class. Set the name of the class to be `MLListWindowDelegate`,\
    \ and set it as a Subclass of `NSObject`. In its header, add an `#import <Cocoa/Cocoa.h>`\
    \ line at the top, and then define an integer property called `selectedTag`, which\
    \ we’ll later bind to a GUI object (add the lines that are shown in bold):\n\n\
    `// MLListWindowDelegate.h`\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ <Cocoa/Cocoa.h>\n\n@interface MLListWindowDelegate : NSObject\n@property (assign)\
    \ NSInteger selectedTag;\n@end\n```\n\nIn the matching `MLListWindowDelegate.m`\
    \ file, we’re going to implement the `specialAction:` method that a menu item\
    \ will be connected to with target/action via the First Responder proxy, and implement\
    \ the `validateUserInterfaceItem:` method. Xcode will automatically synthesize\
    \ getters and setters for the `selectedTag` property for us.\n\n`// MLListWindowDelegate.m`\n\
    \n```\n#import \"MLListWindowDelegate.h\"\n\n@implementation MLListWindowDelegate\n\
    \n- (BOOL)validateUserInterfaceItem:(id <NSValidatedUserInterfaceItem>)anItem\n\
    {\n    // set the default response to YES, in case it's not the action we care\
    \ about\n    BOOL result = YES;\n    SEL theAction = [anItem action];\n    if\
    \ (theAction == @selector(specialAction:) ) {\n        if (self.selectedTag !=\
    \ 13013) {\n            result = NO;\n        }\n    }\n    return result;\n}\n\
    \n- (void)specialAction:(id)sender\n{\n    NSRunAlertPanel(@\"Boy Howdy!\",\n\
    \                    @\"That's some mighty special action you got there!\",\n\
    \                    nil, nil, nil);\n}\n\n@end\n```\n\nWe should point out a\
    \ thing or two about the `validateUserInterfaceItem:` method. First, note that\
    \ we’re using the item’s action to determine what method it would call if clicked.\
    \ In code, an action (or any kind of method for that matter) can be referred to\
    \ by the Objective-C `SEL` type. Technically, a `SEL` is not a method, but a “selector,”\
    \ which is a sort of hash of the method’s name, somewhat modified for performance\
    \ considerations, that the Objective-C runtime can use to look up the method’s\
    \ actual implementation. Besides looking up a method, a `SEL` can be compared\
    \ to another `SEL`, such as that returned by the `@selector(specialAction:)` construct\
    \ shown in the code. In our method, we test to see whether the menu item in question\
    \ is targeted at the action method we care about, in which case we go deeper.\
    \ If the actions match up, we then do a simple check against some internal state,\
    \ in the form of the `selectedTag` property, to see if we want to allow this menu\
    \ item to be enabled or not. If the selector doesn’t match, then we default to\
    \ returning `YES`.\n\nNow let’s create a GUI to put this code to work. Open the\
    \ `MainMenu.xib` file into an Interface Builder canvas and drag a plain `NSObject`\
    \ from the Object Library to the nib window (search for `NSObject` in the Object\
    \ Library Search box). It will appear in the Object Dock along the left side of\
    \ the screen. Use the Identity Inspector to change its class to `MLListWindowDelegate`.\
    \ Then drag out a new window from the Object Library, and connect its `delegate`\
    \ outlet to the `MLListWindowDelegate` object we just set up. Now find a Radio\
    \ Group in the Object Library, and drag it into the new window. Including this\
    \ in the window gives us a rudimentary way to provide a sort of selection for\
    \ the window and its delegate. Bind the group’s Selected Tag to the `ListWindowDelegate's`\
    \ `selectedTag` property. That way, the delegate is informed whenever someone\
    \ clicks one of the radio buttons. Now expand the radio group to contain more\
    \ radio buttons by option-dragging the lower resize handle until there are seven\
    \ or eight buttons. Then, click one of the buttons near the middle, and use the\
    \ Attributes Inspector to change its title to “Special Selection,” and its tag\
    \ to `13013`, the “magic number” that we’ll look for in the code.\n\nAll that’s\
    \ left is configuring a new menu item to call the `specialAction:` method via\
    \ the First Responder. Start by selecting the First Responder item in the nib\
    \ window and bringing up the Attributes Inspector. Here is where we can manually\
    \ add any action methods that we want this proxy object to know about. We’ll see\
    \ a list of user-defined actions, which starts out empty. Add one of our own by\
    \ clicking the + button, and changing its name to `specialAction:` (don’t forget\
    \ the colon!). Now for the menu item: find a plain Menu Item in the Object Library,\
    \ and drag it into the Tools menu we created earlier. Set its title to “Special\
    \ Action,” and configure its target/action by Control-dragging to the First Responder\
    \ item in the nib window and selecting `specialAction:` from the resulting list."
  raw: '### Enabling/Disabling With First Responder


    Now we’re going to show a more common way of automatically enabling and disabling
    menu items, which gives us more fine-grained control so that the enabled state
    of each menu item can be updated automatically depending on which window is selected,
    which text field or other control in a window is selected, and so on. This method
    works using the responder chain, somewhat similar to how the color panel finds
    an object to pass a selected color to, as described earlier in this chapter. In
    this case, the method that’s searched for along the responder chain is `validateUserInterfaceItem:`,
    whose declaration looks like this:


    `- (BOOL)validateUserInterfaceItem:`


    `(id <NSValidatedUserInterfaceItem>)anItem;`


    If it’s implemented in the responder chain’s objects, this method is called at
    the appropriate time to see if the user interface item (in this case, a menu item)
    should be enabled or not. In implementing this method, we can use `anItem` to
    get some information about the object that’s going to be enabled or disabled;
    we can ask it for its action (so we can compare with one of our own methods) and
    for its tag (in case we’d rather compare against a control tag we’ve set on the
    object). Usually we’ll just want to use the action. We’ll demonstrate how this
    works in just a bit, but first we should probably clarify just when this method
    is called.


    Here’s the basic idea: any time Cocoa is about to draw the menu, generally in
    response to the user clicking on the menu bar, some checks are made for each menu
    item to determine whether it should be enabled or disabled. The flowchart in Figure
    [11-9](#A978-1-4302-4543-8_11_Chapter.html#Fig9) gives a rough outline of the
    sequence of events.


    ![A978-1-4302-4543-8_11_Fig9_HTML.jpg](A978-1-4302-4543-8_11_Fig9_HTML.jpg)


    Figure 11-9.


    How the menu system decides whether a menu item should be enabled or not


    The upshot of all this is that the menu item’s target object, whether configured
    explicitly or found in the responder chain, is the one that decides whether the
    menu item should be enabled (at the current time) or not. This means that we have
    complete dynamic control over each menu item. By implementing `validateUserInterfaceItem:`
    in each of our classes containing methods that are called by menu items, whether
    directly or through the responder chain, we can define some logic that the menu
    system calls at the right time, and automatically enables or disables each menu
    item based on what we return.


    Let’s illustrate this with an example. We’ll create a new window in our nib file,
    matched by a new delegate class just for that window, which will implement `validateUserInterfaceItem:`
    to handle the state of a menu item. In a real application, you would probably
    base it on the content of a model object, but for simplicity’s sake, we’ll enable
    or disable a menu item based on what’s selected in the window.


    Start by creating a new class in Xcode, just a plain `NSObject` subclass called
    `MLListWindowDelegate`. To do this, select File ➤ New ➤ File, and then select
    Cocoa under the OS X heading on the left. Select Objective-C Class. Set the name
    of the class to be MLListWindowDelegate, and set it as a Subclass of NSObject.
    In its header, add an `#import <Cocoa/Cocoa.h>` line at the top, and then define
    an integer property called `selectedTag`, which we’ll later bind to a GUI object
    (add the lines that are shown in bold):


    `// MLListWindowDelegate.h`


    `#import <Foundation/Foundation.h>`


    `#import <Cocoa/Cocoa.h>`


    `@interface MLListWindowDelegate : NSObject`


    `@property (assign) NSInteger selectedTag;`


    `@end`


    In the matching `MLListWindowDelegate.m` file, we’re going to implement the `specialAction:`
    method that a menu item will be connected to with target/action via the First
    Responder proxy, and implement the `validateUserInterfaceItem:` method. Xcode
    will automatically synthesize getters and setters for the `selectedTag` property
    for us.


    `// MLListWindowDelegate.m`


    `#import "MLListWindowDelegate.h"`


    `@implementation MLListWindowDelegate`


    `- (BOOL)validateUserInterfaceItem:`


    `(id <NSValidatedUserInterfaceItem>)anItem`


    `{`


    `// set the default response to YES, in case it''s not the action we care about`


    `BOOL result = YES;`


    `SEL theAction = [anItem action];`


    `if (theAction == @selector(specialAction:) ) {`


    `if (self.selectedTag != 13013) {`


    `result = NO;`


    `}`


    `}`


    `return result;`


    `}`


    `- (void)specialAction:(id)sender`


    `{`


    `NSRunAlertPanel(@"Boy Howdy!"`,


    `@"That''s some mighty special action you got there!"`,


    `nil, nil, nil);`


    `}`


    `@end`


    We should point out a thing or two about the `validateUserInterfaceItem:` method.
    First, note that we’re using the item’s action to determine what method it would
    call if clicked. In code, an action (or any kind of method for that matter) can
    be referred to by the Objective-C `SEL` type. Technically, a `SEL` is not a method,
    but a “selector,” which is a sort of hash of the method’s name, somewhat modified
    for performance considerations, that the Objective-C runtime can use to look up
    the method’s actual implementation. Besides looking up a method, a `SEL` can be
    compared to another `SEL`, such as that returned by the `@selector(specialAction:)`
    construct shown in the code. In our method, we test to see whether the menu item
    in question is targeted at the action method we care about, in which case we go
    deeper. If the actions match up, we then do a simple check against some internal
    state, in the form of the `selectedTag` property, to see if we want to allow this
    menu item to be enabled or not. If the selector doesn’t match, then we default
    to returning `YES`.


    Now let’s create a GUI to put this code to work. Open the `MainMenu.xib` file
    into an Interface Builder canvas and drag a plain NSObject from the Object Library
    to the nib window (search for NSObject in the Object Library Search box). It will
    appear in the Object Dock along the left side of the screen. Use the Identity
    Inspector to change its class to `MLListWindowDelegate`. Then drag out a new window
    from the Object Library, and connect its `delegate` outlet to the `MLListWindowDelegate`
    object we just set up. Now find a Radio Group in the Object Library, and drag
    it into the new window. Including this in the window gives us a rudimentary way
    to provide a sort of selection for the window and its delegate. Bind the group’s
    Selected Tag to the `ListWindowDelegate''s` selectedTag property. That way, the
    delegate is informed whenever someone clicks one of the radio buttons. Now expand
    the radio group to contain more radio buttons by option-dragging the lower resize
    handle until there are seven or eight buttons. Then, click one of the buttons
    near the middle, and use the Attributes Inspector to change its title to “Special
    Selection,” and its tag to 13013, the “magic number” that we’ll look for in the
    code.


    All that’s left is configuring a new menu item to call the `specialAction:` method
    via the First Responder. Start by selecting the First Responder item in the nib
    window and bringing up the Attributes Inspector. Here is where we can manually
    add any action methods that we want this proxy object to know about. We’ll see
    a list of user-defined actions, which starts out empty. Add one of our own by
    clicking the + button, and changing its name to `specialAction:` (don’t forget
    the colon!). Now for the menu item: find a plain Menu Item in the Object Library,
    and drag it into the Tools menu we created earlier. Set its title to “Special
    Action,” and configure its target/action by Control-dragging to the First Responder
    item in the nib window and selecting `specialAction:` from the resulting list.'
  trans: "\n### 通过第一响应者启用/禁用\n\n接下来，我们将展示一种更常见的自动启用和禁用菜单项的方法，这种方法能提供更精细的控制，使得每个菜单项的启用状态可以根据选中的窗口、窗口中选中的文本字段或其他控件等自动更新。该方法依赖于响应者链，与本章前面描述的颜色面板寻找对象以传递选中颜色的方式有些类似。在此场景下，沿着响应者链查找的方法是\
    \ `validateUserInterfaceItem:`，其声明如下：\n\n```\n- (BOOL)validateUserInterfaceItem:(id\
    \ <NSValidatedUserInterfaceItem>)anItem;\n```\n\n如果该方法在响应者链的对象中实现了，它会在适当的时候被调用，用以判断用户界面项（此处即菜单项）是否应被启用。在实现此方法时，我们可以通过\
    \ `anItem` 获取将要被启用或禁用的对象的相关信息；我们可以询问它的 action（以便与我们自己的某个方法进行比较），也可以询问它的 tag（以便与我们设置在对象上的控件\
    \ tag 进行比较）。通常我们只需要使用 action。稍后我们将演示其工作原理，但首先需要澄清一下该方法在何时被调用。\n\n基本思路如下：每当 Cocoa\
    \ 即将绘制菜单时（通常是在用户点击菜单栏时），它会对每个菜单项进行检查，以决定是启用还是禁用。图 11-9 中的流程图大致勾勒了这一事件序列。\n\n![A978-1-4302-4543-8_11_Fig9_HTML.jpg](img/A978-1-4302-4543-8_11_Fig9_HTML.jpg)\n\
    \n图 11-9. 菜单系统如何决定菜单项是否应启用\n\n所有这些的要点是：无论是显式配置还是在响应者链中找到的菜单项目标对象，都由它来决定菜单项在当前时刻是否应被启用。这意味着我们可以对每个菜单项进行完全动态的控制。通过在包含由菜单项直接或通过响应者链调用的方法的各个类中实现\
    \ `validateUserInterfaceItem:`，我们可以定义一些逻辑，让菜单系统在适当的时候调用它，并根据我们的返回值自动启用或禁用每个菜单项。\n\
    \n让我们通过一个例子来说明这一点。我们将在 nib 文件中创建一个新窗口，并为其匹配一个新的委托类，该类将实现 `validateUserInterfaceItem:`\
    \ 来处理菜单项的状态。在实际应用中，你可能会基于模型对象的内容来进行判断，但为了简单起见，我们将根据窗口中选中的内容来启用或禁用菜单项。\n\n首先，在\
    \ Xcode 中创建一个新类，一个普通的 `NSObject` 子类，命名为 `MLListWindowDelegate`。为此，选择 File ➤ New\
    \ ➤ File，然后在左侧的 OS X 标题下选择 Cocoa。选择 Objective-C Class。将类名设置为 `MLListWindowDelegate`，并将其设为\
    \ `NSObject` 的子类。在其头文件顶部添加一行 `#import <Cocoa/Cocoa.h>`，然后定义一个名为 `selectedTag`\
    \ 的整型属性，稍后我们将把它绑定到一个 GUI 对象上（添加以粗体显示的行）：\n\n`// MLListWindowDelegate.h`\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <Cocoa/Cocoa.h>\n\n@interface MLListWindowDelegate\
    \ : NSObject\n@property (assign) NSInteger selectedTag;\n@end\n```\n\n在对应的 `MLListWindowDelegate.m`\
    \ 文件中，我们将实现 `specialAction:` 方法（菜单项将通过第一响应者代理以 target/action 方式连接到该方法），并实现 `validateUserInterfaceItem:`\
    \ 方法。Xcode 会自动为 `selectedTag` 属性合成 getter 和 setter 方法。\n\n`// MLListWindowDelegate.m`\n\
    \n```\n#import \"MLListWindowDelegate.h\"\n\n@implementation MLListWindowDelegate\n\
    \n- (BOOL)validateUserInterfaceItem:(id <NSValidatedUserInterfaceItem>)anItem\n\
    {\n    // 如果 action 不是我们关心的，则默认返回 YES\n    BOOL result = YES;\n    SEL theAction\
    \ = [anItem action];\n    if (theAction == @selector(specialAction:) ) {\n   \
    \     if (self.selectedTag != 13013) {\n            result = NO;\n        }\n\
    \    }\n    return result;\n}\n\n- (void)specialAction:(id)sender\n{\n    NSRunAlertPanel(@\"\
    哎呀呀！\",\n                    @\"你触发了相当特殊的操作！\",\n                    nil, nil,\
    \ nil);\n}\n\n@end\n```\n\n关于 `validateUserInterfaceItem:` 方法，有两点需要说明。首先，注意我们使用该项的\
    \ action 来判断它被点击时会调用哪个方法。在代码中，一个 action（或任何类型的方法）可以通过 Objective-C 的 `SEL` 类型来引用。从技术上讲，`SEL`\
    \ 不是方法，而是一个“选择器”，它是对方法名称的一种哈希值（出于性能考虑稍作修改），Objective-C 运行时可以用它来查找方法的实际实现。除了查找方法，`SEL`\
    \ 还可以与另一个 `SEL` 进行比较，例如代码中由 `@selector(specialAction:)` 结构返回的那个。在我们的方法中，我们测试当前菜单项是否指向我们关心的\
    \ action 方法，如果是，则进行更深入的检查。如果 action 匹配，我们就对某个内部状态（即 `selectedTag` 属性）进行简单检查，以确定是否允许启用该菜单项。如果选择器不匹配，则默认返回\
    \ `YES`。\n\n现在，我们来创建一个 GUI 来使这段代码生效。打开 `MainMenu.xib` 文件到 Interface Builder 画布，从对象库中拖一个普通的\
    \ `NSObject` 到 nib 窗口（在对象库搜索框中搜索 `NSObject`）。它将出现在屏幕左侧的对象停靠栏中。使用身份检查器将其类改为 `MLListWindowDelegate`。然后从对象库中拖出一个新窗口，并将其\
    \ `delegate` 出口连接到我们刚设置的 `MLListWindowDelegate` 对象。接下来，在对象库中找到 Radio Group（单选按钮组），并将其拖入新窗口。将这个组件包含在窗口中，为窗口及其委托提供一种基础的选择机制。将单选按钮组的\
    \ Selected Tag 绑定到 `ListWindowDelegate` 的 `selectedTag` 属性。这样，每当有人点击某个单选按钮时，委托就会得到通知。现在，通过按住\
    \ Option 键并向下拖动按钮组的缩放控制柄，将单选按钮组展开，使其包含更多按钮，直到有七八个按钮。然后，点击中间附近的一个按钮，使用属性检查器将其标题改为“特殊选项”，并将其\
    \ tag 改为 `13013`，即我们将在代码中查找的“魔法数字”。\n\n剩下的工作就是配置一个新的菜单项，通过第一响应者来调用 `specialAction:`\
    \ 方法。首先，在 nib 窗口中选择 First Responder 项，并调出属性检查器。这里我们可以手动添加任何我们希望该代理对象知道的 action\
    \ 方法。我们会看到一个用户定义 action 列表，初始为空。点击 + 按钮添加一个自定义 action，将其名称改为 `specialAction:`（别忘了冒号！）。然后是菜单项：在对象库中找到一个普通的\
    \ Menu Item（菜单项），将其拖入我们之前创建的 Tools 菜单中。将其标题设置为“特殊操作”，并通过按住 Control 键拖拽到 nib 窗口中的\
    \ First Responder 项上，然后从结果列表中选择 `specialAction:`，来配置其 target/action。\n"
- fmt: "Now it’s time to see this in action. Save the work and click `Run`. The app\
    \ now has a new window where we can select one of the radio buttons. Click around\
    \ on some of the radio buttons, each time clicking the `Tools` top-level menu\
    \ item to see if the `Special Action` item is enabled. It should only be enabled\
    \ if the `Special Selection` button is selected. If another radio button is selected,\
    \ or if the app’s other window (the old window with the `Turbo` checkbox) is selected,\
    \ the menu item should be disabled.\n\nThis basic concept can be extended as far\
    \ as you want. The point is that enabling and disabling menu items is really quite\
    \ simple. You never have to manually enable or disable individual menu items as\
    \ things happen in your app; you just write code that is called automatically\
    \ when a menu item is about to be displayed, and deal with it then.\n\n## Sheets\n\
    \nThe final topic we’re going to cover in this chapter is the concept of sheets.\
    \ A sheet is simply a window that is temporarily attached to another window and\
    \ run in a semi-modal way, such that the “other window” doesn’t receive any events.\
    \ The idea is that an application can have several windows that aren’t impacted\
    \ by each other’s demands for user attention. For example, in the `TextEdit` application\
    \ included with Mac OS X, you can have the `Save As` panel appearing as a sheet\
    \ on one document, the `Print` panel appearing as a sheet on another, and continue\
    \ typing in a third.\n\nChances are you won’t use sheets in every Cocoa app you\
    \ ever build, but they are useful in situations where your application needs some\
    \ sort of user input related to a particular window, and you’d rather not use\
    \ a modal panel that stops input to the rest of your application. In the example\
    \ just shown, for instance, without the use of sheets, that `Save` panel would\
    \ probably run in a modal fashion, blocking input to all other windows until the\
    \ user dismissed it. With the use of sheets, the user can temporarily leave the\
    \ ongoing `Save` operation and do some other interaction with the application\
    \ before committing the `Save`.\n\nSheets aren’t represented by a particular class\
    \ in Cocoa. Rather, they are normal windows used in a special way. Every `NSWindow`\
    \ can have a sheet attached to it, and every window or panel that’s normally used\
    \ in a modal way can be used as a sheet as well.\n\nLet’s see the basics of how\
    \ to use a sheet by attaching an `NSOpenPanel` to a normal window in a new application\
    \ that we’ll call `SheetLab`. Create a new Cocoa application project in Xcode,\
    \ using `SL` as the class prefix, and save it as `SheetLab`. Now, edit `SLAppDelegate.h`,\
    \ adding an `openDocument:` action method:\n\n```\n#import <Cocoa/Cocoa.h>\n\n\
    @interface SLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n\n- (IBAction)openDocument:(id)sender;\n\n@end\n\
    ```\n\nThen edit `SLAppDelegate.m`, adding the following method implementations:\n\
    \n```\n#import \"SLAppDelegate.h\"\n\n@implementation SLAppDelegate\n\n- (IBAction)openDocument:(id)sender\
    \ {\n    NSOpenPanel *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n\
    \    [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"Please pick\
    \ one file to import.\"];\n\n    // Display the panel attached to the document's\
    \ window.\n    [panel beginSheetModalForWindow:self.window completionHandler:^(NSInteger\
    \ result){\n        if (result == NSFileHandlingPanelOKButton) {\n           \
    \ // Set the window title to the filename of the selected file.\n            NSArray*\
    \ urls = [panel URLs];\n            NSString *selectedFile = [[urls lastObject]\
    \ lastPathComponent];\n            [self.window setTitle:selectedFile];\n    \
    \    }\n    }];\n}\n\n@end\n```\n\nWe declare a method called `openDocument:`\
    \ in this class. `openDocument:` is the action used by the `File` ➤ `Open` menu\
    \ item. When the user hits `File` ➤ `Open` (or `⌘-O`), the responder chain gets\
    \ followed until an object is found that responds to `openDocument:`. Since the\
    \ App Delegate is in the responder chain and there’s nothing else in the app that\
    \ responds to `openDocument:`, our code will get called. The `openDocument:` method\
    \ grabs the standard open panel, sets it to only allow selection of one file (not\
    \ directories, and not multiple files), and adds a message to the panel. It then\
    \ tells it to run modally attached to a window (using the `window` property),\
    \ using the `beginSheetModalForWindow:completionHandler:` method. The second argument\
    \ to this method is an Objective-C block, a new concept that we haven’t seen before.\
    \ It specifies the actions that should be taken when the panel is finished running.\
    \ In this case, if the user has selected a file and hit `OK`, we get the URL of\
    \ the selected file, and then set the `title` of the window to the last part of\
    \ the path, which should be the filename itself.\n\n**Note**\n\nA block represents\
    \ a piece of code that (among other things) can be passed as an argument to a\
    \ method. In other languages, it’s called a closure or a lambda. The use of blocks\
    \ is becoming more prevalent in Cocoa, rather than passing pointers to callback\
    \ functions. A block has access to all of the variables that are in-scope at the\
    \ point of declaration and has the benefit of being declared at the point of use.\
    \ Blocks were introduced in OS X 10.6 and iOS 4. You can read much more about\
    \ blocks in the Apple Developer Documentation in Xcode, or at [`https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html%23//apple_ref/doc/uid/TP40007502).\n\
    \nSave the changes, click `Run`, and the app will launch. Hitting `⌘-O` brings\
    \ up the modal open panel, attached as a sheet on top of the app’s window. When\
    \ we select a file, the name of the window gets set to the name of the file!\n\
    \n## Wrap Up\n\nThis chapter provided an introduction to several key parts of\
    \ the Cocoa GUI experience, as well as a few examples of how the responder chain\
    \ is used. These features are crucial to making a professional-quality Mac application.\
    \ Mac users tend to be pretty unforgiving when applications use non-standard behaviors\
    \ without a good reason, so it’s important to know how to deal with windows and\
    \ menus in ways that users will recognize. In the next chapter, we’ll build on\
    \ this knowledge as we explore Cocoa’s classes for dealing with documents and\
    \ their associated windows."
  raw: 'Now it’s time to see this in action. Save the work and click Run. The app
    now has a new window where we can select one of the radio buttons. Click around
    on some of the radio buttons, each time clicking the Tools top-level menu item
    to see if the Special Action item is enabled. It should only be enabled if the
    Special Selection button is selected. If another radio button is selected, or
    if the app’s other window (the old window with the Turbo checkbox) is selected,
    the menu item should be disabled.


    This basic concept can be extended as far as you want. The point is that enabling
    and disabling menu items is really quite simple. You never have to manually enable
    or disable individual menu items as things happen in your app; you just write
    code that is called automatically when a menu item is about to be displayed, and
    deal with it then.


    ## Sheets


    The final topic we’re going to cover in this chapter is the concept of sheets.
    A sheet is simply a window that is temporarily attached to another window and
    run in a semi-modal way, such that the “other window” doesn’t receive any events.
    The idea is that an application can have several windows that aren’t impacted
    by each other’s demands for user attention. For example, in the TextEdit application
    included with Mac OS X, you can have the Save As panel appearing as a sheet on
    one document, the Print panel appearing as a sheet on another, and continue typing
    in a third.


    Chances are you won’t use sheets in every Cocoa app you ever build, but they are
    useful in situations where your application needs some sort of user input related
    to a particular window, and you’d rather not use a modal panel that stops input
    to the rest of your application. In the example just shown, for instance, without
    the use of sheets, that Save panel would probably run in a modal fashion, blocking
    input to all other windows until the user dismissed it. With the use of sheets,
    the user can temporarily leave the ongoing Save operation and do some other interaction
    with the application before committing the Save.


    Sheets aren’t represented by a particular class in Cocoa. Rather, they are normal
    windows used in a special way. Every `NSWindow` can have a sheet attached to it,
    and every window or panel that’s normally used in a modal way can be used as a
    sheet as well.


    Let’s see the basics of how to use a sheet by attaching an `NSOpenPanel` to a
    normal window in a new application that we’ll call SheetLab. Create a new Cocoa
    application project in Xcode, using SL as the class prefix, and save it as SheetLab.
    Now, edit `SLAppDelegate.h`, adding an `openDocument:` action method:


    `#import <Cocoa/Cocoa.h>`


    `@interface SLAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `- (IBAction)openDocument:(id)sender;`


    `@end`


    Then edit `SLAppDelegate.m`, adding the following method implementations:


    `#import "SLAppDelegate.h"`


    `@implementation SLAppDelegate`


    `- (IBAction)openDocument:(id)sender {`


    `NSOpenPanel *panel = [NSOpenPanel openPanel];`


    `[panel setCanChooseDirectories:NO];`


    `[panel setAllowsMultipleSelection:NO];`


    `[panel setMessage:@"Please pick one file to import."];`


    `// Display the panel attached to the document''s window.`


    `[panel beginSheetModalForWindow:self.window completionHandler:^(NSInteger result){`


    `if (result == NSFileHandlingPanelOKButton) {`


    `// Set the window title to the filename of the selected file.`


    `NSArray* urls = [panel URLs];`


    `NSString *selectedFile = [[urls lastObject] lastPathComponent];`


    `[self.window setTitle:selectedFile];`


    `}`


    `}];`


    `}`


    `@end`


    We declare a method called `openDocument:` in this class. `openDocument:` is the
    action used by the File ➤ Open menu item. When the user hits File ➤ Open (or ⌘-O),
    the responder chain gets followed until an object is found that responds to `openDocument:`.
    Since the App Delegate is in the responder chain and there’s nothing else in the
    app that responds to `openDocument:`, our code will get called. The `openDocument:`
    method grabs the standard open panel, sets it to only allow selection of one file
    (not directories, and not multiple files), and adds a message to the panel. It
    then tells it to run modally attached to a window (using the `window` property),
    using the `beginSheetModalForWindow:completionHandler:` method. The second argument
    to this method is an Objective-C block, a new concept that we haven’t seen before.
    It specifies the actions that should be taken when the panel is finished running.
    In this case, if the user has selected a file and hit OK, we get the URL of the
    selected file, and then set the `title` of the window to the last part of the
    path, which should be the filename itself.


    Note


    A block represents a piece of code that (among other things) can be passed as
    an argument to a method. In other languages, it’s called a closure or a lambda.
    The use of blocks is becoming more prevalent in Cocoa, rather than passing pointers
    to callback functions. A block has access to all of the variables that are in-scope
    at the point of declaration and has the benefit of being declared at the point
    of use. Blocks were introduced in OS X 10.6 and iOS 4\. You can read much more
    about blocks in the Apple Developer Documentation in Xcode, or at [`https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html%23//apple_ref/doc/uid/TP40007502)
    .


    Save the changes, click Run, and the app will launch. Hitting ⌘-O brings up the
    modal open panel, attached as a sheet on top of the app’s window. When we select
    a file, the name of the window gets set to the name of the file!


    ## Wrap Up


    This chapter provided an introduction to several key parts of the Cocoa GUI experience,
    as well as a few examples of how the responder chain is used. These features are
    crucial to making a professional-quality Mac application. Mac users tend to be
    pretty unforgiving when applications use non-standard behaviors without a good
    reason, so it’s important to know how to deal with windows and menus in ways that
    users will recognize. In the next chapter, we’ll build on this knowledge as we
    explore Cocoa’s classes for dealing with documents and their associated windows.'
  trans: "\n现在来看看实际效果。保存工作并点击`Run`。应用现在会有一个新窗口，其中我们可以选择某个单选按钮。点击一些单选按钮，每次都点一下顶层的`Tools`菜单项，看看`Special\
    \ Action`项是否被启用。它应该仅在`Special Selection`按钮被选中时才启用。如果选中了其他单选按钮，或者应用的另一个窗口（带有`Turbo`复选框的旧窗口）被选中，则该菜单项应被禁用。\n\
    \n这个基本概念可以根据需要无限扩展。关键在于，启用和禁用菜单项实际上非常简单。你永远不需要在应用发生某些事件时手动启用或禁用单个菜单项；只需编写在菜单项即将显示时自动调用的代码，然后进行处理即可。\n\
    \n## 表单\n\n本章要介绍的最后一个主题是表单（sheet）的概念。表单就是一个临时依附于另一个窗口并以半模态方式运行的窗口，使得“另一个窗口”不会接收任何事件。其思想是，一个应用可以拥有多个窗口，而这些窗口不会因彼此需要用户关注而相互影响。例如，在\
    \ Mac OS X 自带的`TextEdit`应用中，你可以在一个文档上以表单形式显示`Save As`面板，在另一个文档上显示`Print`面板，同时在第三个文档中继续输入。\n\
    \n你可能不会在构建的每个 Cocoa 应用中都使用表单，但在应用需要某种与特定窗口相关的用户输入，而你又不希望使用会阻止应用其余部分输入的模态面板时，它们就很有用。例如，在刚刚展示的例子中，如果不使用表单，那个`Save`面板可能会以模态方式运行，在所有用户关闭它之前阻止对其他所有窗口的输入。而使用表单，用户可以在提交`Save`之前，暂时搁置正在进行的保存操作，并与应用进行其他交互。\n\
    \n在 Cocoa 中，表单并不由某个特定的类表示。相反，它们是以特殊方式使用的普通窗口。每个`NSWindow`都可以附加一个表单，通常以模态方式使用的每个窗口或面板也可以用作表单。\n\
    \n让我们通过在一个名为`SheetLab`的新应用中将`NSOpenPanel`附加到一个普通窗口，来了解一下使用表单的基本方法。在 Xcode 中创建一个新的\
    \ Cocoa 应用项目，使用`SL`作为类前缀，并将其保存为`SheetLab`。现在，编辑`SLAppDelegate.h`，添加一个`openDocument:`操作方法：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n\n@interface SLAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n\n- (IBAction)openDocument:(id)sender;\n\
    \n@end\n```\n\n然后编辑`SLAppDelegate.m`，添加以下方法实现：\n\n```\n#import \"SLAppDelegate.h\"\
    \n\n@implementation SLAppDelegate\n\n- (IBAction)openDocument:(id)sender {\n \
    \   NSOpenPanel *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n\
    \    [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"请选择一个要导入的文件。\"\
    ];\n\n    // 将面板附加到文档的窗口上显示。\n    [panel beginSheetModalForWindow:self.window\
    \ completionHandler:^(NSInteger result){\n        if (result == NSFileHandlingPanelOKButton)\
    \ {\n            // 将窗口标题设置为所选文件的文件名。\n            NSArray* urls = [panel URLs];\n\
    \            NSString *selectedFile = [[urls lastObject] lastPathComponent];\n\
    \            [self.window setTitle:selectedFile];\n        }\n    }];\n}\n\n@end\n\
    ```\n\n我们在这个类中声明了一个名为`openDocument:`的方法。`openDocument:`是`File` ➤ `Open`菜单项使用的操作。当用户点击`File`\
    \ ➤ `Open`（或`⌘-O`）时，会沿着响应者链查找，直到找到一个能响应`openDocument:`的对象。由于应用委托在响应者链中，而应用中没有其他对象响应`openDocument:`，因此我们的代码会被调用。`openDocument:`方法获取标准的打开面板，将其设置为只允许选择一个文件（不能是目录，也不能是多文件），并为面板添加一条消息。然后，它使用`beginSheetModalForWindow:completionHandler:`方法，让该面板以模态方式附加到一个窗口（使用`window`属性）上运行。该方法的第二个参数是一个\
    \ Objective-C 块，这是之前未见过的新概念。它指定了面板运行完成后应采取的操作。在本例中，如果用户选择了一个文件并点击`OK`，我们将获取所选文件的\
    \ URL，然后将窗口的`title`设置为路径的最后一部分，即文件名本身。\n\n**注意**\n\n块（block）是一段代码（除其他功能外）可以作为参数传递给方法。在其他语言中，它被称为闭包或\
    \ lambda。在 Cocoa 中，块的使用正变得越来越普遍，以取代传递指向回调函数的指针。块可以访问声明作用域内的所有变量，并且具有在使用点声明的优点。块是在\
    \ OS X 10.6 和 iOS 4 中引入的。你可以从 Xcode 中的 Apple Developer Documentation 阅读更多关于块的信息，或访问\
    \ [`https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html%23//apple_ref/doc/uid/TP40007502)。\n\
    \n保存更改，点击`Run`，应用将启动。按下`⌘-O`会弹出模态打开面板，作为表单附加在应用窗口之上。当我们选择一个文件时，窗口的名称会设置成该文件的名称！\n\
    \n## 总结\n\n本章介绍了 Cocoa GUI 体验的几个关键部分，以及响应者链如何使用的几个示例。这些特性对于制作专业质量的 Mac 应用至关重要。Mac\
    \ 用户在应用没有充分理由而使用非标准行为时往往相当苛刻，因此了解如何以用户能够识别的方式处理窗口和菜单非常重要。在下一章中，我们将基于这些知识，探索 Cocoa\
    \ 用于处理文档及其关联窗口的类。\n"
- fmt: '# 12. Document-Based Applications


    ## Abstract


    So far, the applications we’ve built in this book all have one major shortcoming
    in common: each of them acts in sort of an all-or-nothing way. We’ve either got
    a particular piece of data in the one backing store that the application is using
    (if it’s using one at all), or we don’t have it anywhere. None of them has any
    notion of letting us split our data into the discrete, unrelated storage units
    that we call “documents.” Although having everything in a single database is good
    for some purposes, for others it’s a huge hindrance. What if we want to share
    just a part of our data with someone else? What if we want to be able to view
    details for two or more of the same kind of Core Data entity, in multiple windows
    beside one another, to be able to compare them? Most people are familiar with
    these possibilities from using almost any modern application where multiple documents
    can be open simultaneously and where actions applied to one don’t affect the others.


    As it turns out, the good folks at Apple thought of this years ago and built document
    support right into Cocoa, centered around the `NSDocument` and `NSDocumentController`
    classes. Cocoa’s document architecture gives us access to a whole lot of infrastructure
    that we’d otherwise have to build ourselves, such as managing the window and its
    title bar, dealing with the open panels and save panels, and more. If you’re using
    Core Data in your application, it will even take care of the actual opening and
    saving all on its own, so your application code never even has to touch a document
    file.


    This chapter will cover the basics of how to create a document-based Cocoa application,
    including the use of Core Data, by creating an application called `ColorMix`.
    `ColorMix` lets the user choose two colors using the standard system color panel,
    and then presents a grid of color swatches demonstrating different methods of
    blending the two colors together. Each set of two chosen colors (and its 15 blended
    colors) can be saved in a document, which is just like any other file and can
    be saved anywhere you like and then reopened later on. Along with learning about
    how Cocoa does documents, we’ll also build a simple view class for drawing colored
    rectangles and interact with Core Data in our code. Figure 12-1 shows what the
    `ColorMix` application will look like when we’re all done.


    ![A978-1-4302-4543-8_12_Fig1_HTML.jpg](A978-1-4302-4543-8_12_Fig1_HTML.jpg)


    **Figure 12-1.** The completed ColorMix application


    If you’ve used graphics software such as Photoshop or Gimp, you’re probably familiar
    with some of these blend modes. Each of them uses a particular formula that takes
    the red, green, and blue components of each of the two colors and produces an
    output color. We won’t describe the blend modes here, but you can find detailed
    descriptions and examples of them at [`http://en.wikipedia.org/wiki/Blend_modes`](http://en.wikipedia.org/wiki/Blend_modes)
    and elsewhere. What we will do here is show how to build an application that gives
    the user a hands-on way to explore all of these modes, two chosen colors at a
    time.


    The blend modes we’ll be using are all built into Core Graphics, an important
    part of Cocoa’s graphics architecture that we’ll talk more about in Chapter 13.
    Using this built-in functionality lets us skip doing any sort of color computation
    on our own; all we do is call Core Graphics functions to set blend modes and draw
    rectangles.


    ## Creating the ColorMix Application


    Start by creating a new application in Xcode, using the Cocoa Application template
    in the OS X / Application section of the New Project assistant. After clicking
    Next, name the new application `ColorMix`, and set the class prefix to `CM`. The
    new application will use both `NSDocument` architecture and Core Data, so we’ll
    need to configure the project properly when creating the application. Make sure
    that the **Create Document-Based Application** and **Use Core Data** checkboxes
    are both checked. Note that enabling the document checkbox also activates the
    **Document Extension** text field. This lets us set the default filename extension
    that our application will use when saving files. Enter `ColorMix` here as well,
    so that we can easily recognize the documents we create.


    The `ColorMix` application will have a few things we haven’t seen created for
    us before. In particular, it has a class called `CMDocument` (a subclass of `NSPersistentDocument`,
    which is itself a subclass of `NSDocument`, both of which we’ll explain a little
    later), and a matching `CMDocument.xib` resource. These are the two key elements
    that we’ll extend to define the behavior and appearance of our documents. Apart
    from that, we’ll also see a model file where we’ll set up the Core Data entity
    and attribute information for this app.


    ### Examining the Default Nib Files


    Before we get to work on creating anything, open the `MainMenu.xib` file in Interface
    Builder. Notice something different about this nib file, compared to every other
    `MainMenu.xib` file that’s been created for us? It contains no window! Opening
    the file reveals various proxy objects, the menu itself, and that’s it. That’s
    another clue that we’re dealing with a different sort of creature when creating
    a document-based application, because such an application (such as Xcode, Microsoft
    Office, Garage Band, and the like) usually doesn’t have any notion of a “main
    window” and instead puts the bulk of the application into one or more document
    windows.


    Open the Connections Inspector, and take some time to click on some of the menu
    items and see how they’re hooked up. Many of the items in the File menu are connected
    to First Responder, calling actions whose names contain the word “document” (`newDocument:`,
    `openDocument:`, and so on). It turns out that several of these actions are implemented
    in the `NSDocumentController` class. This is a special class that has a single
    shared instance at runtime for managing all the application’s open documents.
    We won’t see this shared instance, or even a proxy for it, in this nib file or
    anywhere else. The `NSApplication` creates this object during application launch
    and adds it to the responder chain so that it can handle these actions.


    After taking a look around, we can basically forget about the `MainMenu.xib` for
    this application, since we’ll never need to open it again. Remember that the only
    real content in there is the menu, and most of the menu items are connected to
    actions on First Responder, which means they’ll find their way to the relevant
    window controller or the shared `NSDocumentController` when the time comes.


    Now open `CMDocument.xib` and see what it has to offer. An `NSWindow` is ready
    for us to fill in some content, and if we open the Identity Inspector, we’ll see
    that the File’s Owner is an instance of `CMDocument`. Apart from that, it’s a
    blank slate, which we’ll make our mark on just a little later.'
