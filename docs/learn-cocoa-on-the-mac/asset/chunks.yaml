- fmt: '## Wiring Up the `VillainTrackerAppDelegate` Class


    When we created the `VillainTracker` project, Xcode created a class called `VillainTrackerAppDelegate`.
    We’re going to add code into this class to connect it to the user interface controls,
    making it a “controller” in the model–view–controller sense. More intricate applications
    will likely have several controller classes, but for a simple app like this, which
    interacts with a single window and the application itself, one controller is all
    we need. Much of the code that we’ll be adding will take the form of outlets and
    actions, as discussed in the last chapter. This controller will have outlets to
    all the objects in our GUI (so that it can set and retrieve values in the view
    objects any time it needs to) and action methods for those objects to inform the
    controller every time a user edits a value.


    Remember, an outlet is nothing more than a specially-marked property or instance
    variable, and an action is simply any method that matches a specific signature,
    taking a single parameter of type `id` and returning void. Note that in the source
    code, the return type for an action is typically marked as `IBAction` instead
    of void. `IBAction` is actually defined to be the same as void, so as far as the
    compiler’s concerned it makes no difference. Now, let’s say we have some sort
    of design document that specifies several villain attributes and their types.
    Based on their types and usages, we could map each attribute to a suitable GUI
    class (see Table 5-1).


    **Table 5-1.** Villain Attributes Mapped to GUI Classes


    | Attribute Name | Type | View Class |

    | --- | --- | --- |

    | Name | string (freeform) | `NSTextField` |

    | `lastKnownLocation` | string (freeform) | `NSTextField` |

    | `lastSeenDate` | date | `NSDatePicker` |

    | `swornEnemy` | string (freeform, but with list to choose from existing) | `NSComboBox`
    |

    | `primaryMotivation` | string (from predefined list) | `NSMatrix` (containing
    radio buttons) |

    | Powers | array of strings (from predefined list) | `NSMatrix` (containing checkboxes)
    |

    | `powerSource` | string (from predefined list) | `NSPopUpButton` |

    | Evilness | number (0–10) | `NSLevelIndicator` |

    | Mugshot | image | `NSImageView` |

    | Notes | string (perhaps lengthy) | `NSTextView` |


    Based on this specification, we’ll add one outlet and one action in `VillainTrackerAppDelegate`
    for each GUI control. The outlet will let us access the control to set and retrieve
    its value whenever necessary, and each control will call the appropriate action
    method to inform us when its contents have changed. So that the code is easy to
    follow, we’ll use a specific naming convention for our outlets: the name of the
    attribute, with the string “View” as a suffix. For example, for the attribute
    named `lastSeenDate` we’ll have an outlet named `lastSeenDateView`. Similarly,
    for the actions, we’ll use the verb “take” as a prefix. For the attribute `lastSeenDate`,
    our action will be named `takeLastSeenDate`.


    Adding the outlets to our code could be done by manually creating properties or
    instance variables, but it’s easier to do it by control-dragging from the nib
    to the code window. To do this, we’ll first need a pane with our code in it. Click
    the Assistant button (which looks like a butler’s torso) in the Editor icon group
    in the right side of the toolbar in the main Xcode window. For this work, have
    the nib open on the left side of Xcode and the Code Editor open on the right,
    as shown in Figure 5-15. We can position the Assistant window in either location
    by selecting our preferred location under View ➤ Assistant Editor. If it isn’t
    already open, open the `VillainTrackerAppDelegate.h` file in the Assistant Editor
    pane. To do this, click the little butler icon at the top of the pane, and it
    should be one of the choices under Automatic.


    ![A978-1-4302-4543-8_5_Fig15_HTML.jpg](A978-1-4302-4543-8_5_Fig15_HTML.jpg)


    **Figure 5-15.**'
