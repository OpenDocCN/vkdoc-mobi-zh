    `_hueBlendView.blendMode = kCGBlendModeHue;`


    `_saturationBlendView.blendMode = kCGBlendModeSaturation;`


    `_colorBlendView.blendMode = kCGBlendModeColor;`


    `_luminosityBlendView.blendMode = kCGBlendModeLuminosity;`


    `NSArray *allBlendViews =`


    `@[_multiplyBlendView, _screenBlendView, _overlayBlendView`,


    `_darkenBlendView, _lightenBlendView, _colorDodgeBlendView`,


    `_colorBurnBlendView, _softLightBlendView, _hardLightBlendView`,


    `_differenceBlendView, _exclusionBlendView, _hueBlendView`,


    `_saturationBlendView, _colorBlendView, _luminosityBlendView];`


    `for (CMColorBlendView *cbv in allBlendViews) {`


    `[cbv bind:@"color1"`


    `toObject:_objectController`


    `withKeyPath:@"selection.color1"`


    `options:nil];`


    `[cbv bind:@"color2"`


    `toObject:_objectController`


    `withKeyPath:@"selection.color2"`


    `options:nil];`


    `}`


    `}`


    The first part of that chunk of code sets the blend mode for each view, one at
    a time. The second part configures bindings for each `CMColorBlendView`. Because
    the bindings are the same for all of them, we iterate through an array (created
    on the fly just before the `for` loop) of all the `ColorBlendView`s and do the
    bindings for each of them.


    This is really the first time we’ve asked you to do a lot of GUI configuration
    in code. With Cocoa’s included objects, you can configure a lot of things right
    in Interface Builder, but it’s not always so straightforward with your own classes.


    Note that the calls to `bind:toObject:withKeyPath:` accomplish the same thing
    as configuring bindings in Interface Builder. Each binding you configure in Interface
    Builder is, in fact, more a verb than a noun. When your application loads a nib
    file containing bindings, each saved binding triggers a call just like you see
    here. Note also that what’s represented in Interface Builder as a Controller Key
    and Model Key Path, at the end of the day, are merged into a single string for
    the `bind:toObject:withKeyPath:` call.


    Okay, enough theorizing for now. It’s time to save the work, hit Run, and you
    should see something like Figure [12-6](#A978-1-4302-4543-8_12_Chapter.html#Fig6).


    ![A978-1-4302-4543-8_12_Fig6_HTML.jpg](A978-1-4302-4543-8_12_Fig6_HTML.jpg)


    Figure 12-6.


    Finally, we see the blended colors. If you’re looking at a black and white print
    copy of this book, just imagine a dazzling array of colors here


    Click on one of the color wells to open the color panel and start sliding things
    around in there, and you’ll see that all 15 blended colors are updated right along
    with the color you’re setting. Pretty slick!


    Now that the application is up and running, we can use the standard menu items
    to create multiple documents, specify different colors for each document, save
    documents, close them, manage their windows, and so on. Cocoa’s document architecture
    takes care of the details of instantiating our documents and document controllers,
    loading nib files, using a Save panel, and more. All of these features can be
    enhanced by the developer (e.g., we can customize the process of saving documents
    in various ways), but we can also go quite a long way using just the basic functionally
    that works right out of the box.


    ## About Undo and Redo


    At this point, we should mention `NSUndoManager`, which handles undo/redo support
    in Cocoa. Note that the actions we perform in ColorMix (really just changing colors)
    are all undoable, and redoable, via items in the Edit menu. Also, note that these
    undo and redo actions are document-specific; making changes and undoing them in
    one document is completely separate from whatever happens in other documents.
    What’s probably not so clear, however, is just what’s enabling that functionality;
    we haven’t written any code to deal with undo and redo, and yet there it is. The
    short answer is this: in a Core Data application, basic undo/redo typically is
    taken care of for us, and we don’t have to do anything. The managed object context
    that deals with the model objects is able to notice when an object is edited and
    add an inverse operation to the “undo stack.” The upshot of this is that, for
    most modern Cocoa apps, we get undo and redo for free.


    However, this is a book about programming, not about listing cool features of
    the frameworks. At the very least, we need to know a bit about how the underlying
    pieces work, so we have some idea where to tweak things if necessary. So, here’s
    a crash course in how undo/redo support works in Cocoa, and how Core Data and
    `NSDocument` conspire to make it work automatically.'
