    ## Binding to a Table View


    DungeonThing is fine for what it does (aside from the fact that it doesn’t really
    generate the game objects, of course), but if you started using such a system
    “in production” (say, while playing Dungeons and Dragons or a similar game), you’d
    quickly encounter one major problem: the random game objects aren’t retained in
    any way! As soon as you click to create a new random character, for example, the
    previous character is just wiped out, and you have no way of ever seeing it again.


    For the next iteration of DungeonThing, we’re going to add some table views to
    show lists of all created game objects. Clicking a game object in a table view
    will show its values in the relevant text field. Unlike [Chapter 6](#A978-1-4302-4543-8_6_Chapter.html),
