    \ 处理这类问题的能力非常强，以至于很难在启用 ARC 的情况下构造出它发生的场景。因此，对于下面的演示，让我们暂时关闭 ARC。为此，选择项目导航器中的顶级\
    \ ExceptionCity 项，然后选择“构建设置”标签页。使用顶部的搜索字段搜索“automatic”，然后关闭 Objective-C 自动引用计数。图\
    \ 13-6 展示了操作后的界面。\n\n![A978-1-4302-4543-8_13_Fig6_HTML.jpg](img/A978-1-4302-4543-8_13_Fig6_HTML.jpg)\n\
    \n**图 13-6.** 修改构建设置。你知道你想这么做\n\n现在，向应用委托类添加以下方法。这展示一个简化的不良行为版本，在 ARC 出现之前，这种操作可能让我们陷入困境。\n\
    \n```\n- (void)freedObject {\n    NSString *object = [[NSString alloc] initWithCString:\"\
    hi there\"\n                                                encoding:NSUTF8StringEncoding];\n\
    \    [object release];\n    NSLog(@\"Where is my object? %@\", object);\n}\n```\n\
    \n然后在 `applicationDidFinishLaunching:` 方法中添加一行 `[self freedObject];`，运行应用，看看会发生什么。程序将会停止，并显示类似于图\
    \ 13-7 的内容。\n\n![A978-1-4302-4543-8_13_Fig7_HTML.jpg](img/A978-1-4302-4543-8_13_Fig7_HTML.jpg)\n\
    \n**图 13-7.** 绿色条显示了程序停止的位置。这没什么帮助！好在还有其他栈帧可供查看\n\n与之前产生信号的 bug 一样，程序收到的信号可能与这里显示的不同，但它肯定会收到某个信号。如果我们查看调用栈中最高层包含我们代码的栈帧，我们会看到它同时包含了\
    \ `freedObject` 方法和它调用的 `NSLog` 函数。\n\n与之前的情况一样，解决这个问题的方法也在于自律：任何时候我们向一个对象发送 `release`\
    \ 或 `autorelease` 消息后，如果变量中仍然存在指向该对象的指针，请立即将该变量指向 `nil`！发送 `release` 或 `autorelease`\
    \ 可能不会总是立即导致对象被释放（因为其他代码可能也增加了它的引用计数），但在每个方法内部，我们应该将任何已释放的对象视为不可用，并尽快清除所有指向它的悬垂指针。\n\
    \n在本例中，解决方案是在 `[object release];` 这行代码后面加上以下代码：\n\n```\nobject = nil;\n```\n"
- fmt: '添加该行，重新运行应用，一切恢复正常！不过再次强调，这类错误只有在不使用 ARC 时才会出现。除了在释放对象后将指针设为`nil`这一相对简单的经验法则外，非
    ARC 应用也可能因其他方式陷入类似困境，例如忘记保留需要长期使用的对象。这些错误是最难定位的，这也是尽可能使用 ARC 的最有力理由之一。


    继续之前，我们需要在项目中重新启用 ARC。再次在项目导航器中选择顶层项目项，在“Build Settings”选项卡中找到“Objective-C Automatic
    Reference Counting”并将其开启。我们还需要从应用代理的`freedObject`方法中删除`[object release];`这行代码，因为
    ARC 不允许我们显式调用`release`。


    ## NSError


    现在我们了解到，Cocoa 中的异常通常不用于流程控制，而主要用于指出错误。如今使用的其他一些语言和框架会将异常用于各种并非错误、但可能是开发者无法直接控制的条件所产生的副作用，例如访问文件时的文件相关错误，或尝试从套接字读取数据时的网络错误。在
    Cocoa 中，这类情况通常使用名为`NSError`的类来处理。在本节中，我们将学习`NSError`对象的内容、导致其创建的常见场景，以及在代码中如何处理它，包括让应用能够重试某些触发错误的操作。


    ### 域与代码


    传统上，每个操作系统都有自己报告系统错误的方式，通常提供一个整数值，我们可以与头文件中的预定义列表进行比较，以决定如何处理。例如，在基于 UNIX 的系统中，我们可以在每次系统调用（包括打开文件、读取文件、写入文件等函数）后检查`errno`的值（`errno`可能是全局变量，也可能是调用函数的符号，具体取决于多种因素，我们在此不深入讨论）。其思路是，如果任何系统函数遇到问题，它将把一个整数放入`errno`，以告知我们错误的性质。


    在“经典 Mac OS”编程（所有早于 OS X 的系统）中，情况略有不同。许多系统函数不会填充全局变量，而是返回`OSStatus`类型，这同样归结为一个整数，我们应在调用每个函数后检查它，以确保没有意外情况发生。


    OS X 是一种混合操作系统。其底层深深植根于 UNIX，并且如你所知，它包含了构成 Cocoa 的所有 Objective-C 框架。它还包含了 Carbon，这是一套从旧版
    Mac OS 改编而来的庞大 API 和技术集。此外，还有完全用 C 编写的现代 API，同时适用于 OS X 和 iOS。这些“世界”中的每一个都包含需要以某种方式报告错误代码的函数和/或方法，并且由于这些世界是独立发展的，错误代码集之间当然存在一些重叠。在某个时刻，Apple
    意识到，用一种通用方式处理来自这些不同世界的错误消息可能带来一些好处，让它们各自继续使用一直以来的错误代码（确保与现有软件的二进制兼容性），同时通过用字符串标记每个错误的域来消除混淆风险。


    这就是我们在`NSError`类中所拥有的，它基本上将系统级别的错误代码封装在一个 Objective-C 对象中。每个`NSError`实例都有一个`NSString`来指定其“域”的名称（通常指它来自哪个库或框架），一个整数来指定相关的错误代码，以及一个可选的`NSDictionary`，它可以包含关于该错误的额外信息。由于这些是普通的
    Objective-C 对象，它们可以像任何其他对象一样被处理：传递、放入`NSArray`等等。


    Cocoa 包含一些预定义的字符串常量，用于对 Cocoa 框架中`NSError`对象的主要来源进行分类。作为 Cocoa 程序员，你最可能遇到的域如下：


    *   `NSPOSIXErrorDomain`：UNIX 错误（属于 POSIX 标准的部分）。

    *   `NSOSStatusErrorDomain`：来自 Carbon 函数的错误（通常返回一个`OSStatus`）。

    *   `NSCocoaErrorDomain`：直接源自 Cocoa 自身类的错误。


