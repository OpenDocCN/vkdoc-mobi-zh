- fmt: 'Next, type “text” in the search field in the Object Library, and drag a Text
    View out to the lower right corner. Resize it to be 150 pixels high and 250 pixels
    wide, which should be wide enough to fill in the space between the edge of the
    window and the image well, with a visually pleasing gap. You should see blue guidelines
    when you’re close to the right position, and the text view should snap into place.
    We have one important change to make to its attributes. `NSTextView` is able,
    by default, to display rich text, which is a great feature but it comes at a price:
    In Cocoa, rich text is represented by instances of `NSAttributedString`, a class
    that’s a lot more complicated than `NSString`, and not something we want to get
    into here and now. In order for the text view to be able to bind its display value
    to a plain old string, we have to turn off rich text handling. So, in the Attributes
    Inspector, click to turn off the Rich Text checkbox (if you don’t see it, you’ve
    probably selected the text view’s superview, an `NSScrollView`. Click the text
    view once more to select the `NSTextView` inside). You can also change the Find
    settings to Uses Bar and check Incremental Search to have text searching utilize
    the Find Bar feature introduced in OS X 10.7.


    These controls will need labels, so enter “label” in the Object Library search
    field, and drag a Label out above the image well, in line with the image well’s
    left edge. Change its text to “Depiction”. Drag out another label above the text
    view, and title it “Details.” Line the Details label up so that the right edge
    is aligned with the labels for the sliders.


    The last thing to do is to configure the table view’s columns. Four of the five
    columns will display text or numbers, so the default configuration is fine. For
    the Depiction column, however, we want to display an image, so the `NSTextField`
    currently in that column needs to be replaced with an image well. Select the “Static
    Text” object contained within the table view cell for the Depiction column by
    using the object dock on the left, as shown in Figure [8-8](#A978-1-4302-4543-8_8_Chapter.html#Fig8).
    Once you’ve got it, press the Delete key to remove it. Enter “image” into the
    search field in the Object Library, and drag an Image Well into the empty table
    cell view in the Depiction column of the table view. The image well will get clipped
    to the height of the table cell view, so expand the height of the table view cell
    to be 48 pixels high, tall enough to show the whole image.


    ![A978-1-4302-4543-8_8_Fig8_HTML.jpg](A978-1-4302-4543-8_8_Fig8_HTML.jpg)


    Figure 8-8.


    Selecting the Depiction textfield in the Object Dock


    That completes the GUI layout. It’s a thing of beauty, isn’t it? Now we need to
    connect it to a data source to populate it. We’ll do that using Cocoa bindings,
    discussed in the previous chapter.


    ## Setting up Cocoa Bindings


    When we told Xcode that we wanted to make a Core Data application, it generated
    an application delegate class (called `MBAppDelegate`) that includes special support
    for working with Core Data. Part of this support is that the generated `MBAppDelegate`
    class now has a `managedObjectContext` property. The Managed Object Context is
    an object that lets an array controller (or, for that matter, your own code) tap
    into a source of model objects (instances of `NSManagedObject` or a subclass)
    through Core Data. We’ll see how the app controller provides this a little later
    when we examine the controller code that was put in place automatically when we
    created this project. Just like in the previous chapter, we’ll use an `NSArrayController`
    to manage the data, but the `NSArrayController` created here will access its data
    through Core Data instead of through an `NSMutableDictionary`. And as we did in
    the last chapter, we’ll connect it to the user interface using Cocoa bindings.


    ### Binding with an Array Controller


    To get started, we need to get an Array Controller into the app. In the Object
    Library search field, search for “array.” The results should show an Array Controller.
    Drag one of those out onto the Interface Builder canvas; it can get dropped anywhere
    in the editor pane. No matter where we drop it, it will show up in the Object
    Dock to the left side of the Interface Builder canvas. Select it in the Object
    Dock and rename it to be Mythical Person Array Controller. Open up the Attributes
    Inspector, and change its mode from Class to Entity Name. Enter an Entity Name
    of “MythicalPerson”, which is the same name we used in the Model Editor. Lastly,
    check the Prepares Content checkbox. This will trigger the array controller to
    load data when the app is launched.


    We’re going to link the array controller to the `managedObjectContext` now. With
    the array controller still selected in the Object Dock, select the Bindings Inspector.
    Expand the Parameters section, and select App Delegate from the pop-up list. After
    that, check the Bind to checkbox that’s just next to the pop-up list. Next, type
    “managedObjectContext” into the Model Key Path field. This connects the array
    controller to the Core Data plumbing present in the App Delegate.


    Now that we’ve got the array controller connected, we need to start setting up
    bindings with the UI controls. We’ll start with the basic controls (the text fields
    and sliders), and then deal with the more complex controls (the depiction and
    the table view), and then finish up by wiring up the buttons.


    The first binding will be for the Name textfield. Select the Name text box and
    then open the Bindings Inspector. Expand the Value section, check the Bind to
    checkbox, and then select Mythical Person Array Controller from the pulldown.
    Make sure that the Controller Key box shows “selection,” and enter “name” in the
    Model Key Path field, as shown in Figure [8-9](#A978-1-4302-4543-8_8_Chapter.html#Fig9).
    This connects the textfield to the name property of the array controller’s selected
    object.


    ![A978-1-4302-4543-8_8_Fig9_HTML.jpg](A978-1-4302-4543-8_8_Fig9_HTML.jpg)


    Figure 8-9.


    The Bindings Inspector for connecting the Name textfield to the Mythical Person
    Array Controller


    Setting up bindings for the sliders will be similar; we’ll establish a binding
    to the Mythical Person Array Controller’s selection, with a different Model Key
    Path depending on the appropriate property for the control. For each of the three
    sliders, this will be the `divinity`, `power`, and `goodness` attributes that
    we created in the model file. To make these bindings, select the Divinity slider
    and look at the Bindings Inspector. Expand the Value section, check the Bind to
    checkbox, and then select Mythical Person Array Controller from the pulldown.
    Make sure that the Controller Key box shows “selection,” and enter “divinity”
    in the Model Key Path field. Repeat this for the Power and Goodness sliders, changing
    the Model Key Path as appropriate.


    Setting up bindings for the Depiction and Details areas will be just slightly
    more complex. We’ll do the Details first. Select the Text view (remember that
    the Text view is embedded in an `NSScrollView`; you’ll need to click through the
    scroll view to get to the Text view itself). In the Bindings Inspector, there
    are different choices than with the Name text field and the sliders. However,
    there’s still a Value section, which is what we’ll be using. Expand the Value
    section, check the Bind to checkbox, and use “details” as the Model Key Path.'
