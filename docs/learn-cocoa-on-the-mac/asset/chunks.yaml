    # 必爱可可


    ## 摘要


    欢迎！你来到这里，想必是为了给 Mac 编写程序。没错，你绝对来对地方了。（来找普拉提？右边第三个门。）读完整本书，你将掌握创建快速、高效、美观的 Mac
    OS X 应用所需的一切知识。


    创建现代 Mac 应用的关键在于 Cocoa。根据苹果公司的说法，Cocoa 是一组面向对象的框架，为 Mac OS X 应用提供运行时环境。随着本书的深入，你将全面了解
    Cocoa 框架和运行时环境。现在，不妨把 Cocoa 想象成程序员的助理，它能处理 Mac 开发中的大部分日常事务。在使用 Cocoa 编写程序时，从绘制窗口到在文本字段中闪烁光标，Mac
    应用执行的几乎所有常见任务都由它代为处理，让你能专注于编写使应用独具特色的代码。


    Cocoa 几乎为你所有的开发需求都提供了对应的类。Mac OS X 用户界面的每个部分，从窗口到菜单、滚动条到按钮、图像到图标，都有对应的 Cocoa 类。只要你能想到一个想添加到应用中的用户界面元素，该元素极有可能已经作为
    Cocoa 类实现了。


    使用 Cocoa 的另一个好处是它与 Mac OS X 紧密结合。使用 Cocoa 构建应用，你的应用就能与其他应用良好协作，并无缝对接 Finder 和
    Dock 等 Mac OS X 元素。


    ### 25 年何止 25 年？


    Cocoa 自 1986 年以来就以某种形式存在了。我们称之为 Cocoa 的这些技术源于 NeXTStep 的 `AppKit`，这是为 NeXT 平台开发的应用程序构建工具。当苹果公司在
    1996 年收购 NeXT 时，他们开始构建新版本的 Mac OS（即我们现在所称的 OS X），新操作系统的大部分基础都源于从 NeXT 收购的技术。


    随着 OS X 的发展，Cocoa 也在不断演进。苹果公司加入了经典 Mac OS 的技术，如 QuickTime，以及全新的技术，如 Quartz 渲染系统，它实现了
    OS X 使用的所有炫目视觉效果和动画。他们还确保在此过程中保留了 Mac 著名的易用性。


    归根结底：Cocoa 在不断地发展和扩展。你在本书中将学到的开发工具、库和框架，是超过 25 年实验和精炼的成果。


    ## 准备一台 Mac 并下载工具


    在开始使用 Cocoa 创建应用之前，你需要一台 Mac。它不必是最新或最强的 Mac；事实上，过去四五年左右生产的几乎所有 Mac 都能很好地完成本书中的练习。当你编写软件的意愿变得更加强烈时，你可能会发现投资一台更新或更快的机器是值得的，但就目前而言，几乎任何基于
    Intel 的 Mac 都能很好地满足你学习所需的知识。最新的 Mac 目前最高可运行 OS X 10.8，而最老的基于 Intel 的 Mac 无法运行任何高于
    10.7 的 OS X 版本。但本书将使用的 Xcode 4.6 在 10.7 和 10.8 上都能良好运行。


    你还需要一个 Apple ID（可能与你已在 Mac 或 iOS App Store 或其他 iTunes 购买中使用的 ID 相同），并且强烈建议你加入苹果开发者关系组织——苹果开发者连接。其中有付费会员，但基本会员是免费的。要加入
    ADC，请打开网页浏览器并导航至 [`http://developer.apple.com/mac/`](http://developer.apple.com/mac/)。如果你已有
    Apple ID，请点击“登录”按钮并输入你的信息。如果你是苹果在线服务的新用户，请点击注册链接并创建你的账户。


    无论你是注册成为开发者，还是仅使用你的 Apple ID，获取苹果免费开发者工具集 Xcode 的最简单最佳方法是从你 Mac 上的 App Store 下载。只需启动
    App Store，搜索 Xcode，然后让它安装。与 App Store 上的大多数内容一样，安装过程基本是自解释的。Xcode 的安装时间可能比大多数其他应用长得多，因为它是一个相当大的下载包。


    > 注意：如果你已经为 iOS 开发安装了 Xcode，那么你已经准备好了。Xcode 包含了创建 OS X 应用和 iOS 应用所需的所有工具和框架。尽管框架存在重大差异，但工具基本相同，因此如果你做过任何
    iOS 开发，在创建 Cocoa 程序时应该会感到得心应手。


    ## 下载源代码


    除了下载和安装 Xcode，你还需要下载与本书配套的示例项目。你可以在 Apress 的《在 Mac 上学习 Cocoa》网页上找到代码存档，网址是 [`www.apress.com/9781430245421`](http://www.apress.com/9781430245421)。该页面包含了本书的所有元数据，包括代码存档、勘误表等。


    ## 获取帮助


    在阅读本书的过程中，你无疑会有一些问题需要解答。幸运的是，有一个专门为这套书创建的社区可以加入。请访问 [`http://learncocoa.org`](http://learncocoa.org)。在该网站注册，找到相应的书籍论坛并发布你的问题。你一定能找到能回答你问题的人，而且，谁知道呢，过一段时间你可能会发现自己也在为别人解答问题。[`learncocoa.org`](http://learncocoa.org)
    网站也是你找到其他资源以助你学习的地方，包括其他书籍、研讨会等等。快来加入我们吧！


    ## 开始前你需要了解的知识


    本书假定你已经具备一些基本的编程知识。你应该熟练掌握循环、变量、指针和链表等概念。本书还假定你理解面向对象编程的基础知识，并熟悉 Objective-C 编程语言。从
    Mac OS X Leopard 10.5 开始，该语言引入了新版本，称为 Objective-C 2.0。如果你不熟悉 Objective-C 语言较新的补充内容，不用担心。我们会特意强调所使用的
    2.0 语言特性，并解释它们的工作原理以及为何使用它们。


    ### 初次接触 Objective-C？


    以下资源可以帮助你入门。


    - 编程新手？请查阅《在 Mac 上学习 C 语言（第 4 版）》，由我们的好友 Dave Mark 编写（[`www.apress.com/9781430218098`](http://www.apress.com/9781430218098)）。

    - 刚接触 Objective-C？请查阅《在 Mac 上学习 Objective-C（第 2 版）》，这是 Mac 编程专家 Scott Knaster、Waqar
    Malik 和 Mark Dalrymple 编写的一本优秀且易于入门的 Objective-C 教程（[`www.apress.com/9781430241881`](http://www.apress.com/9781430241881)）。

    - 然后，前往苹果的 Mac 开发者库，下载一份《使用 Objective-C 进行编程》，这是对该语言非常详细和广泛的描述，也是一本极好的参考指南（[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ProgrammingWithObjectiveC`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ProgrammingWithObjectiveC)）。

    '
- fmt: '## Are You Ready?


    The Mac is a great computing platform, and Cocoa is the best tool to use to build
    your Mac applications. If you are coming to the Mac from another platform, you
    may find working with Cocoa and Objective-C a bit disorienting. Even though you
    might find it hard to get your bearings at first, as you make your way through
    this book, we’re confident that you’ll soon start to wrap your head around the
    “Cocoa way” of doing things. With a little perseverance, it will all start to
    make sense.


    One thing you should keep in mind is that the exercises in this book are not simply
    a checklist that, when completed, grant you Cocoa developer guru status. Every
    step of the way, make sure you understand what you just did before moving on to
    the next project. Don’t be afraid to make changes to the code. Experiment and
    observe the results. That’s one of the best ways to understand the complexities
    of coding in an environment like Cocoa.


    Also, remember that we’ve set up a message forum for readers to discuss the exercises
    and content of this book. So if you get stuck, or want to chat with us and other
    Cocoa developers about any Cocoa programming topics, head over to [`http://learncocoa.org`](http://learncocoa.org)
    and register for the discussion forum.


    That said, if you’ve got Xcode installed, turn the page. If not, get to it! Then
    let’s go!


    # 2. Hello, World


    **Abstract**


    As you’re probably well aware, it has become something of a tradition to call
    the first project in any book on programming “Hello, World.” Following the “if
    it ain’t broke, don’t fix it” guideline, we’ll stick with tradition.


    ## Building “Hello, World”


    By now, you should have Xcode installed on your machine. You should also have
    the `Learn Cocoa Projects` folder ensconced safely somewhere on your hard drive.
    If by some set of circumstances you don’t, go directly to [Chapter 1](#A978-1-4302-4543-8_1_Chapter.html)
    (do not pass Go, do not collect $200) and reread the appropriate sections.


    The first project we’ll be working with is located in the `Chapter02/Chapter2`
    folder. Launch Xcode, which is located in the `Applications` folder. Just in case
    you’ve never used Xcode before, we’re going to walk you through the process of
    creating a new project.


    Start by selecting New Project from the File menu, or by typing ⇧⌘N. When the
    New Project Assistant comes up (Figure [2-1](#A978-1-4302-4543-8_2_Chapter.html#Fig1)),
    select Application from under the Mac OS X heading in the left column, then select
    the Cocoa Application icon from the upper-right pane and click Next.


    ![A978-1-4302-4543-8_2_Fig1_HTML.jpg](A978-1-4302-4543-8_2_Fig1_HTML.jpg)


    **Figure 2-1.** Selecting the Cocoa Application project template from Xcode’s
    New Project Assistant


    A Project Options window offers a number of choices (Figure [2-2](#A978-1-4302-4543-8_2_Chapter.html#Fig2)).
    We need to specify a name for our application. “Chapter2” is a good choice. We
    also need to give a company identifier, which is formatted like a reversed domain
    name (much like a Java package name or C# namespace). If we live at the `megacorp.com`
    domain name, then `com.megacorp` would be our choice here. Mac OS X uses the combination
    of the product name and the company identifier as a unique name for our program
    across the system, as well as in the Mac App Store. However, since we won’t be
    distributing this app beyond our computer, we can pick anything we like. The last
    important field here is the class prefix. As we’ll see, many of the Cocoa classes
    start with the prefix `NS` or `CF`. In those classes, Xcode will generate some
    files for us as part of creating a new project, and it will use the prefix we
    give here. For now, enter `Book`. We won’t be using the other fields in this chapter,
    so they can be left at the default values. Click Next.


    ![A978-1-4302-4543-8_2_Fig2_HTML.jpg](A978-1-4302-4543-8_2_Fig2_HTML.jpg)


    **Figure 2-2.** Specifying options for a new Cocoa application from Xcode’s New
    Project Assistant


    We’ll be presented with the standard Save window to set the location for our project
    (Figure [2-3](#A978-1-4302-4543-8_2_Chapter.html#Fig3)). Xcode will create a new
    folder with the name of our project in the location we pick: our `Documents` folder
    or a newly-created separate folder to hold the Xcode projects that we build ourselves.
    It really doesn’t matter where we save an Xcode project, but it’ll be easier to
    find them later if we always save our projects in one place. We also have the
    choice to have Xcode configure our project for version control using Git, a powerful
    open-source distributed version control system. For right now, we can also leave
    this at the default setting.


    ![A978-1-4302-4543-8_2_Fig3_HTML.jpg](A978-1-4302-4543-8_2_Fig3_HTML.jpg)


