    it’s calling the superclass’s implementation of `init` and assigning its return
    value to the special variable `self`. Then it checks the value of the assignment
    itself (that is, the value of `self` after it’s been assigned) and only executes
    the following block of code if it’s not something that evaluates as `false`, such
