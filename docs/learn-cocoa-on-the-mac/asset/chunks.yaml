  raw: 'Select the Center button in the nib, and control-drag to the `buttonPressed:`
    method in either the `.h` or the `.m` file. When the pointer reaches a valid action,
    the action will highlight in a blue outline and a small window will appear saying
    “Connect Action.” Let go, and the connection is in place. Do the same with the
    Right button.


    As before, click the Run button in the upper left-hand corner of the Xcode window,
    and the app will compile and launch. This time, clicking any of the three buttons
    will update the label. The one action method handles all three buttons appropriately.
    Move the window to a new location and quit the application. Press ⌘R to launch
    the program again, and the window should come up in exactly the same position
    it was in when we quit the program. If we click the yellow Minimize button in
    the title, the window will shrink down into our dock (click it in the dock to
    maximize it), and if we click ⌘W or click the red close button in the window,
    the window will close. Unfortunately, the application is still running, but there’s
    no way to get the window back open. Let’s address that now by configuring our
    application to quit when the window is closed. To do this, we’ll have to use something
    called the application delegate.


    ## The Application Delegate


    Every Cocoa application has one and only one instance of a class called `NSApplication`.
    We don’t need to interact with `NSApplication` directly very much. It’s created
    for us and handles the event loop (the part of our application that notices user
    input from the mouse and keyboard, and handles the input by sending messages to
    the appropriate objects) and most of the lower-level stuff without us having to
    give it much thought.


    Expand the Supporting Files folder in the Project Navigator pane, and single-click
    `main.m`. In that file is our application’s `main()` function, which is the function
    that gets called when our application is launched. This function contains only
    one line of code, which calls a function named `NSApplicationMain()`. That function,
    which is part of Cocoa, automatically creates an instance of `NSApplication` for
    us. That instance of `NSApplication` goes into a loop and continuously polls for
    events from the keyboard, mouse, operating system, and other applications, and
    then responds to those events (don’t worry about the specifics for now; we’ll
    learn more about events later in the book). When it detects an event that signifies
    that the application should quit, the event loop stops and the application’s execution
    ends.


    `NSApplication` allows us to specify an optional object to act as its delegate.
    Simply put, a delegate is a class that handles certain tasks on behalf of another
    class. The application delegate allows our application to take actions at certain
    points in the lifecycle of the application so that we can avoid the messiness
    of having to subclass `NSApplication`.


    The application delegate can be of any instance of any class, but only one object
    can be the application delegate. Nearly every application will need an application
    delegate object. Because this is a common pattern, the `ButtonsAppDelegate` class
    that was created for us is already configured in the nib file to be the application
    delegate. The `ButtonsAppDelegate` class declaration in the `ButtonsAppDelegate`.`h`
    file declares that the class implements the `NSApplicationDelegate` protocol.


    ### Configuring the Application to Quit on Window Close


    Single-click `ButtonsAppDelegate.m` and add a method named `applicationShouldTerminateAfterLastWindowClosed:`,
    as shown in bold below:


    `#import "ButtonsAppDelegate.h"`


    `@implementation ButtonsAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


        `// Insert code here to initialize your application`


    `}`


    `- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication *)sender
    {`


        `return YES;`


    `}`


    `- (IBAction)buttonPressed:(id)sender {`


        `NSString *title = [sender title];`


        `NSString *labelText = [NSString stringWithFormat:@"%@ button pressed.", title];`


        `[self.label setStringValue:labelText];`


    `}`


    `@end`


    This new method is one of those special application delegate methods. At certain
    predefined times during the application’s run, `NSApplication` will look to see
    if its delegate has implemented a particular method. If the delegate has, `NSApplication`
    will call that method. This method we just implemented exists to let us change
    the behavior of `NSApplication` without subclassing it. The default behavior is
    for `NSApplication` to keep running until it is specifically told to quit, even
    if there are no windows open. It is acceptable for applications to quit when their
    last (or only) window is closed, however, and this method is provided specifically
    to let the delegate alter this behavior.


    Run the application again, and close the application’s main window when it comes
    up. The application should now quit because the application’s only window has
    been closed.


    ## Using the Documentation Browser


    So how do we know what these application delegate methods are? It’s hard to implement
    methods if we don’t know what they are. Fortunately, they’re generally easy to
    find. If you look at the method we just added, it takes one argument, which is
    a pointer, to the `NSApplication` instance that called the method. Hold down the
    Option key and double-click the word “NSApplication” in the Editing pane. This
    will open up the Documentation Browser to the definition of the word we just clicked,
    which is NSApplication (Figure [4-11](#A978-1-4302-4543-8_4_Chapter.html#Fig11)).


    ![A978-1-4302-4543-8_4_Fig11_HTML.jpg](A978-1-4302-4543-8_4_Fig11_HTML.jpg)


    Figure 4-11.


    The Documentation Browser in Xcode, showing the NSApplication Class Reference


    However, in this case, we won’t find the delegate methods for `NSApplication`
    documented in this file. Beginning in OS X 10.6, Apple began refactoring delegate
    methods into separate protocols and moved the documentation about these methods
    into the documentation about the protocol. Many Cocoa classes have associated
    delegate protocols—`NSApplication`, `NSBrowser`, `NSToolbar`, `NSWindow`, to name
    a few. When reading the documentation on a class, it’s important to also look
    for an associated delegate protocol with the same name: the delegate protocol
    for `NSApplication` is named `NSApplicationDelegate`.


    To browse the documentation tree, right-click in the NSApplication Class Reference
    document, and select Reveal in Library. This will show the documentation tree,
    with NSApplication selected. Below the NSApplication Class Reference is the NSApplicationDelegate
    Protocol Reference, which has the documentation we’re looking for.


    It’s worth your time to spend a few minutes looking over the application delegate
    methods so you’ll know what’s there. The Documentation Browser is your friend.
    You’re going to spend a lot of time in here as you learn Cocoa, so get comfortable
    with it. There’s also a more compact way to view documentation. Option-clicking
    a class or method name will bring up a small documentation pop-up that gives you
    a brief summary of what you clicked on plus links to related documentation. Altogether,
    the documentation contained within Xcode is the ultimate encyclopedic reference
    to Cocoa, Xcode, and all other Apple development technologies. RTFM! You’ll be
    glad you did.'
  trans: "\n在控件中选择`Center`按钮，然后按住 Control 键拖拽至`.h`或`.m`文件中的`buttonPressed:`方法。当指针触达有效操作时，该操作会以蓝色轮廓高亮显示，并出现一个显示“连接操作”的小窗口。松开鼠标，连接即告完成。对`Right`按钮执行相同操作。\n\
    \n与之前一样，点击 Xcode 窗口左上角的`Run`按钮，应用将编译并启动。这一次，点击任意三个按钮都会更新标签。这一个操作方法能妥善处理所有三个按钮。将窗口移动至新位置并退出应用。按下`⌘R`再次启动程序，窗口应会精确显示在我们退出程序时的同一位置。若点击标题栏中的黄色`Minimize`按钮，窗口将缩小至程序坞（点击程序坞中的图标可最大化窗口）；若按下`⌘W`或点击窗口中的红色关闭按钮，窗口将关闭。但遗憾的是，应用仍在运行，且无法重新打开窗口。现在我们通过配置应用在窗口关闭时退出，来解决这个问题。为此，我们需要使用一个名为**应用程序委托（Application\
    \ Delegate）**的机制。\n\n## 应用程序委托\n\n每个 Cocoa 应用都有且仅有一个名为`NSApplication`的类实例。我们无需频繁直接与`NSApplication`交互。它会自动创建，并为我们处理事件循环（即应用识别来自鼠标和键盘的用户输入，并通过向相应对象发送消息来处理输入的部分）以及大多数底层事务，无需我们过多操心。\n\
    \n展开项目导航器窗格中的`Supporting Files`文件夹，单击`main.m`文件。该文件中包含我们应用的`main()`函数，这个函数会在应用启动时被调用。此函数仅有一行代码，用于调用一个名为`NSApplicationMain()`的函数。该函数是\
    \ Cocoa 的一部分，会自动为我们创建`NSApplication`实例。这个`NSApplication`实例会进入一个循环，持续轮询来自键盘、鼠标、操作系统以及其他应用的事件，然后响应这些事件（暂时无需担心具体细节；我们将在本书后续章节中深入了解事件）。当它检测到表示应用应退出的事件时，事件循环停止，应用的执行随之结束。\n\
    \n`NSApplication`允许我们指定一个可选对象作为其委托。简单来说，委托是一个代表另一个类处理特定任务的类。应用程序委托允许我们的应用在生命周期的特定时刻执行操作，从而避免了对`NSApplication`进行子类化所带来的复杂性。\n\
    \n应用程序委托可以是任何类的任何实例，但只能有一个对象作为应用程序委托。几乎每个应用都需要一个应用程序委托对象。由于这是一种常见模式，系统已为我们创建的`ButtonsAppDelegate`类在\
    \ nib 文件中被配置为应用程序委托。`ButtonsAppDelegate.h`文件中的`ButtonsAppDelegate`类声明表明，该类实现了`NSApplicationDelegate`协议。\n\
    \n### 配置应用在窗口关闭时退出\n\n单击`ButtonsAppDelegate.m`文件，并添加一个名为`applicationShouldTerminateAfterLastWindowClosed:`的方法，如下方加粗部分所示：\n\
    \n```\n#import \"ButtonsAppDelegate.h\"\n\n@implementation ButtonsAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n \
    \   // 在此处插入初始化应用的代码\n}\n\n- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication\
    \ *)sender {\n    return YES;\n}\n\n- (IBAction)buttonPressed:(id)sender {\n \
    \   NSString *title = [sender title];\n    NSString *labelText = [NSString stringWithFormat:@\"\
    %@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n}\n\
    \n@end\n```\n\n这个新方法是那些特殊的应用程序委托方法之一。在应用运行的某些预定义时刻，`NSApplication`会检查其委托是否实现了某个特定方法。如果委托实现了，`NSApplication`就会调用该方法。我们刚刚实现的这个方法的存在，就是为了让我们在不进行子类化的情况下改变`NSApplication`的行为。默认行为是，即使没有窗口打开，`NSApplication`也会持续运行，直到被明确告知退出。然而，对于应用在最后一个（或唯一）窗口关闭时退出，也是可以接受的，而这个方法正是为了允许委托改变此行为而专门提供的。\n\
    \n再次运行应用，当应用主窗口出现时将其关闭。此时应用应会退出，因为应用的唯一窗口已被关闭。\n\n## 使用文档浏览器\n\n那么我们如何知道这些应用程序委托方法是什么呢？如果我们不知道这些方法，就很难去实现它们。幸运的是，它们通常很容易找到。查看我们刚添加的方法，它接受一个参数，该参数是指向调用该方法的`NSApplication`实例的指针。按住`Option`键，然后双击编辑窗格中的`NSApplication`一词。这将打开文档浏览器，并跳转到我们刚刚点击的单词的定义处，即`NSApplication`（图\
    \ 4-11）。\n\n![A978-1-4302-4543-8_4_Fig11_HTML.jpg](img/A978-1-4302-4543-8_4_Fig11_HTML.jpg)\n\
    \n图 4-11.\n\nXcode 中的文档浏览器，显示`NSApplication`类参考\n\n然而，在这种情况下，我们不会在此文件中找到`NSApplication`的委托方法文档。从\
    \ OS X 10.6 开始，苹果公司开始将委托方法重构到单独的协议中，并将这些方法的文档移至协议文档中。许多 Cocoa 类都有相关联的委托协议——例如`NSApplication`、`NSBrowser`、`NSToolbar`、`NSWindow`等。在阅读某个类的文档时，寻找同名的关联委托协议也很重要：`NSApplication`的委托协议名为`NSApplicationDelegate`。\n\
    \n要浏览文档树，请在`NSApplication`类参考文档中右键单击，然后选择`Reveal in Library`。这将会显示文档树，并选中`NSApplication`。在`NSApplication`类参考下方是`NSApplicationDelegate`协议参考，其中包含我们正在查找的文档。\n\
    \n花几分钟浏览一下应用程序委托方法是很值得的，这样你就能知道有哪些方法可用。文档浏览器是你的好帮手。在学习 Cocoa 的过程中，你会花很多时间在这里，所以要熟悉它。还有一种更紧凑的查看文档方式。按住\
    \ Option 键单击类名或方法名，会弹出一个小的文档弹出窗口，其中包含你点击内容的简要摘要以及相关文档的链接。总而言之，Xcode 中内置的文档是关于\
    \ Cocoa、Xcode 以及所有其他苹果开发技术的终极百科全书。RTFM（阅读手册）！你会庆幸自己这么做的。\n"
- fmt: '# Wrap Up


    This chapter built on what we covered in the previous two chapters. We saw how
    to make outlet and target/action connections between user interface elements in
    Interface Builder by control-dragging and how to implement actions in your own
    code. We built a full GUI application with less than a dozen lines of code. Admittedly,
    this app doesn’t do all that much, but these basic ideas underlie a lot of what
    Cocoa has to offer and what makes Cocoa such a productive development environment.
    In the next chapter, we’ll work with several additional user-interface elements
    beyond buttons and text fields, and we’ll see that we can configure and use them
    in exactly the same ways we used the buttons and text fields here.


    # 5. GUI Components


    In Chapters 3 and 4, we covered some of the basics involved in creating a user
    interface in Interface Builder and using a target/action to connect it to application
    code written in Xcode. We’ve really only scratched the surface so far, but you
    should be happy to know that the target/action system you learned to use in the
    last two chapters is used by almost all of the user interface objects in Cocoa.
    If you’re not quite sure what’s so great about that, you might want to review
    [Chapter 3](#A978-1-4302-4543-8_3_Chapter.html) just one more time to be sure
    you’ve grasped the target/action concept.


    By now, you’ve surely noticed the wide variety of user interface objects listed
    in Interface Builder’s Object Library pane. Now it’s time to dig deeper into Cocoa’s
    bag of tricks and explore some of these classes. The user interface classes available
    in Cocoa cover a wide range of uses and wherever possible provide consistent APIs
    for their functionality, so once you’ve learned how to do something with one class,
    you’ll often be able to quickly guess how to achieve similar results with another
    class. In particular, many of the classes that you’ll be using most often are
    subclasses of `NSControl`, and you’ll mostly work with methods that are declared
    there. The different subclasses interact with the user in different ways, but
    mostly interact with your own code the same way.


    This chapter will cover some of the most common user interface classes that Cocoa
    provides, showing their basic usage and how to tailor them to our needs where
    appropriate. Along the way, we’ll also learn about some of the auxiliary Cocoa
    classes that may not always have a tangible screen presence, but that still provide
    important services for our applications. We’ll be focusing on the following classes
    (see Figure [5-1](#A978-1-4302-4543-8_5_Chapter.html#Fig1) for a sampling of what
    these objects can look like onscreen):


    *   `NSTextField`: The basic text input method for many applications. Responds
    to key-presses and renders text. Allows a great deal of editing flexibility for
    the user.

    *   `NSButton`: The basic mouse-triggered GUI component. Despite their differences
    in operation and appearance, radio-buttons, checkboxes, and plain old buttons
    are all instances of `NSButton`.

    *   `NSPopUpButton`: When we have a set of strings we want the user to choose
    from, an `NSPopUpButton` is often the way to go.

    *   `NSComboBox`: Similar to an `NSPopUpButton`, but with the added advantage
    of allowing the user to enter a value that wasn’t already in the list.

    *   `NSMatrix`: An object that groups a series of similar controls into a single
    unit.

    *   `NSLevelIndicator`: Normally used for displaying a numeric value from a predefined
    range, but they are just as useful for entering data.

    *   `NSImageView`: Users can easily bring an image into the application by dragging
    any image from the Finder or another application and dropping it onto one of these.

    *   `NSTextView`: This is nearly a complete text editor rolled into a single object,
    letting the user edit text with multiple fonts, formatting, rulers, and more.


    Note


    Throughout this book, we will sometimes use Cocoa class names (e.g. `NSButton`)
    and other times their casual, common names (e.g. button). Normally we’ll use the
    class names when discussing the code and their casual names for most other situations,
    but in both cases we’re really talking about the same things.


    ![A978-1-4302-4543-8_5_Fig1_HTML.jpg](A978-1-4302-4543-8_5_Fig1_HTML.jpg)


    Figure 5-1. A sampling of Cocoa UI elements


    We’ll use these classes to create a simple application that pretends to be a sort
    of database application. The user will be able to edit and create some objects
    by using some simple GUI controls, but the results of the editing won’t be saved
    in any way (that’s where the pretending comes in). In later chapters, we’ll learn
    how to use Core Data to save our objects to disk, but for now we’re going to focus
    on the GUI.'
