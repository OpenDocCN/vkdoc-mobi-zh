  trans: '

    ### 显示乐队成员


    现在我们已经能把人添加到乐队了，那么如何查看乐队所有成员的列表呢？让我们把这个功能添加到“神秘乐队”窗口中。这很简单：我们将手动添加一个表格视图和一个数组控制器，然后将它们全部连接起来。


    首先，从对象库中拖拽一个 `NSArrayController` 到主 nib 窗口。就像我们处理其他数组控制器一样，我们需要给这个控制器起一个简短而有意义的名字。这个控制器将处理一个
    `MythicalPersons` 列表，但我们已经有名为“神秘人物”的数组控制器了，并且我们希望它能清晰地体现上下文（它只会显示所选乐队的成员），所以我们在主
    nib 窗口中将其命名为“乐队成员”。


    接着，保持新数组控制器的选中状态，打开属性检查器，在对象控制器部分将模式设置为“实体”，实体名称设置为“MythicalPerson”。点击选中“准备内容”复选框。这确保当
    nib 加载时，控制器的内容会被自动获取。


    现在切换到绑定检查器，我们将在此配置两个绑定，以便该控制器能根据所选 `MythicalBand` 自动获取其内容。首先，在最底部，展开“托管对象上下文”的配置。在弹出的菜单中选择“App
    Delegate”，并在模型键路径中选择“managedObjectContext”，这应该会自动开启“绑定到”复选框。此配置与我们所有数组控制器的配置相同，允许它们连接到
    Core Data 存储。接下来，在控制器内容部分，展开内容集绑定配置，在弹出的菜单中选择“Mythical Bands”，控制器键选择“selection”，模型键路径选择“members”。这样做会使控制器的内容依赖于所选的乐队。


    现在，为成员列表腾出空间。调出“神秘乐队”窗口，将其拉得更高一些，几乎是原来的两倍高，这样我们就能在当前内容下方再放一个表格视图。然后，从对象库中拖入一个表格视图，并点击以选中表格视图本身（而不是包含它的滚动视图，拖拽后默认选中的是滚动视图）。我们这里只显示乐队成员的名字，所以表格只需要一列。调出属性检查器，找到顶部的“内容模式”设置，将内容模式改为“基于视图”。接着，找到内容模式下方的“列”设置，将其改为
    1。然后，像之前章节那样优化列标题，将其标题设置为“成员姓名”，并使其填满表格的宽度。最后，为整个表格添加一个“乐队成员”标签，让用户知道他们在看什么。图
    9-11 展示了您需要实现的布局。


    剩下的就是为“乐队成员”表格配置绑定。我们将把表格绑定到 `NSArrayController`，然后将列绑定到表格。首先，选中表格本身。在绑定检查器中，展开表格内容下的“内容”部分。然后，勾选“绑定到”复选框，并将下拉菜单设置为“乐队成员”。默认的控制器键
    `arrangedObjects` 就可以了。接下来处理列。使用左侧的对象停靠栏大纲视图，向下展开到表格视图内部的“静态文本 - 表格视图单元格”。在绑定检查器中，展开“值”部分。下拉菜单应显示为“表格视图单元格”。勾选“绑定到”复选框，并将模型键路径设置为“objectValue.name”，同时保持控制器键字段为空。图
    9-11 窗口右侧的绑定检查器展示了这在 Xcode 中的样子。


    ![A978-1-4302-4543-8_9_Fig11_HTML.jpg](img/A978-1-4302-4543-8_9_Fig11_HTML.jpg)


    图 9-11.


    向“神秘乐队”窗口添加乐队成员


    好了，这个窗口就应该这样了。是时候保存我们的工作了，点击 Xcode 中的“运行”，然后看看新功能：为一个人指定乐队会将此人添加到该乐队的成员数组中，当我们选择“神秘乐队”窗口中的某个乐队时就能看到这些成员。

