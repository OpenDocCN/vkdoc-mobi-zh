  trans: '

    将窗口的宽度设为 480 像素，高度设为 130 像素。将窗口的 `x` 值设为 100，表示我们希望窗口的初始位置位于屏幕左侧。`y` 值可能会稍显棘手，原因在于
    Mac 显示器的几何特性。Mac 屏幕的坐标系以屏幕左下角为 0 点，随着我们向屏幕顶部移动，`y` 值会逐渐增大。这里的问题是，并非每个人的显示器尺寸都相同，因此对于不同尺寸的显示器，任何给定的
    `y` 值相对于屏幕顶部的位置都会有所不同。


    幸运的是，Cocoa 会自动调整窗口的位置，确保窗口始终显示在屏幕上，即使我们指定的位置会导致窗口部分位于屏幕之外也是如此。而且，因为我们为窗口指定了自动保存名称，用户在首次启动应用后，每次再次启动时，窗口都会显示在上次退出应用时的位置。但有时，让窗口从屏幕顶部开始的某个特定位置启动也很重要。


    请注意“大小检查器”底部的小示意图；它根据您自己屏幕的尺寸，直观地展示了窗口的初始位置。白色小框代表窗口，大框代表屏幕减去菜单栏后的区域。白色框四边上的红色
    I 形光标让我们可以控制窗口相对于屏幕边缘的相对位置。我们可以将窗口放置在屏幕上的理想位置，然后使用 I 形光标锁定相对于屏幕左侧和顶部的定位。点击某个 I
    形光标将允许窗口相对于屏幕的那一侧按比例移动。点击底部的 I 形光标会让窗口从底部浮动，但保持与屏幕顶部的固定距离。同时点击顶部和底部的 I 形光标将使窗口在屏幕上垂直居中。


    我们需要设置一个 `y` 值，使窗口靠近菜单栏，但又不紧贴它。最简单的方法是使用“大小检查器”中的屏幕表示，直接将应用的主窗口移动到我们想要的位置。然后，如有必要，我们可以通过数值微调其大小和位置。一旦窗口的初始位置符合要求，点击底部的
    I 形光标，使其变为条纹状。我们也可以通过选择“初始位置”部分的底部弹出菜单，并将其从`垂直比例`更改为`固定距顶部`来进行此更改。


    ## 设计窗口界面


    在对象库中，选择“对象库”下拉菜单，然后选择`Controls`。这将为我们提供一系列不同的按钮和文本字段供使用（图 4-6）。底部列表中的第一项应该是`Push
    Button`，这是一个标准的 OS X 按钮。


    ![A978-1-4302-4543-8_4_Fig6_HTML.jpg](img/A978-1-4302-4543-8_4_Fig6_HTML.jpg)


    图 4-6.


    Xcode 实用工具区域中的对象库视图


    抓取其中一个并将其拖到窗口界面中。会出现蓝色参考线，指示按钮何时位于左边缘、右边缘或中心位置的合适位置。使用蓝色参考线将按钮放置在窗口的右下部分（图 4-7）。一旦按钮位于正确的位置，松开鼠标，窗口上就会出现一个按钮。现在双击该按钮，就可以编辑按钮的标题。将其标题从“Button”改为“Right”。


    ![A978-1-4302-4543-8_4_Fig7_HTML.jpg](img/A978-1-4302-4543-8_4_Fig7_HTML.jpg)


    图 4-7.


    为主窗口添加一个按钮


    从库中再拖出第二个按钮，再次使用蓝色参考线将其放置在窗口的左下角。放置好这个按钮后，双击它并将其标题改为“Left”。


    再拖入一个按钮，使用底部的蓝色参考线将按钮与窗口底部保持适当的距离。将其放置在窗口的水平中心位置，同样，会出现一条蓝色参考线帮助我们正确定位。放置好后，双击第三个按钮并将其标签改为“Center”。此时窗口应如图
    4-8 所示。


    ![A978-1-4302-4543-8_4_Fig8_HTML.jpg](img/A978-1-4302-4543-8_4_Fig8_HTML.jpg)


    图 4-8.


    窗口应如图所示，三个按钮都已布局好


    请注意，当我们向窗口添加控件时，界面生成器窗格左侧的对象显示区会展开，显示新增的控件以及视图的约束集，这在图 4-8 中同样可见。约束部分控制着控件的布局如何响应窗口大小的调整。


    接下来，我们需要一个标签，以便告知用户按下了哪个按钮。标签是一种图形用户界面对象，可以用我们选择的字体和大小来显示一段文本。在我们的应用代码中，我们可以随时通过编程方式更改标签的文本。从库中抓取一个标签。您可能需要向下滚动控件列表，或者直接使用搜索框。将标签拖到窗口的左上角，并使用参考线使其与顶部和左边距正确对齐。


    点击标签右侧的调整大小手柄，向右拖动直至到达窗口右侧的蓝色参考线，然后松开。保持选中标签状态，按下 `⌥⌘4` 调出实用工具窗格中的属性检查器，并使用“文本对齐”按钮将文本居中。然后点击“字体”设置右侧的小
    `T` 图标。这将调出一个特殊的字体面板，如图 4-9 所示。将字号改为 36，可以直接输入数字，也可以使用 `Size` 字段右侧的小箭头按钮。完成后，剩下的就是双击标签（这会使标签进入编辑模式），然后按
    Delete 键删除文本。在按下按钮之前，我们不希望这个标签显示任何内容。


    ![A978-1-4302-4543-8_4_Fig9_HTML.jpg](img/A978-1-4302-4543-8_4_Fig9_HTML.jpg)


    图 4-9.


    更改标签的字体


    至此，用户界面就设计完成了，所以接下来我们需要编写一些代码，以便在按下三个按钮中的任意一个时更新标签中的文本。

