    \ Ruby 语法引入 Cocoa。`MacRuby` 不是像 `RubyCocoa` 那样在相似类之间进行桥接，而是采取了一种不同的方法，基本上抛弃了所有现有的\
    \ Ruby 标准库类，转而使用等价的 Cocoa 类，并且通常为它们提供名称与 Ruby 世界中等价类匹配的新方法。这意味着，经验丰富的 Ruby 开发者在接手\
    \ `MacRuby` 项目时，可能会发现他们喜爱的许多类和方法都缺失或略有不同。\n\n`MacRuby` 与 `PyObjC` 和 `RubyCocoa`\
    \ 的一个有趣区别是，`MacRuby` 会额外努力使方法调用的感觉更接近于它们在 Objective-C 中的方式，同时仍然在 Ruby 语法中工作。这是通过巧妙地使用\
    \ Ruby 的关键字参数来实现的，即使用被调用的 Ruby 方法名和参数键来查找匹配的 Objective-C 方法。回到之前的例子：\n\n```\n\
    [[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n\
    ```\n\n在 `MacRuby` 中是这样写的：\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
    center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\n当 `MacRuby` 执行第二行时，它会使用方法名（`postNotificationName`）和参数键（`object`）在接收者（`center`）中查找一个名为\
    \ `postNotificationName:object:` 的 Objective-C 方法，找到它，并调用它。如果我们没有为 `object` 包含关键字参数，或者包含了其他不属于我们目标底层方法的关键字参数，那么这个方法调用将找不到匹配的\
    \ Objective-C 方法并失败。\n\n除此之外，`MacRuby` 还提供了一些其他有趣的功能，例如编译为本地代码，包括即时编译和提前编译。它也已经脱离了传统的\
    \ Ruby 虚拟机，转而采用基于 LLVM 构建的新运行时，你们中的一些人会认出这是 Xcode 可以使用的、最新式的编译器之一。\n\n在撰写本文时，`MacRuby`\
    \ 尚未发布 1.0 版本，但通过 `www.macruby.org` 关注它绝对值得。\n\n### Nu\n\n在这种背景下，另一个有趣的语言是 `Nu`。与\
    \ `PyObjC` 和 `MacRuby` 不同，这里并非是将现有语言与 Objective-C 对接的问题。相反，`Nu` 本质上是一种全新的语言（实际上是\
    \ Lisp 的一种变体），专为与 Objective-C 互操作而设计，因此它具备同样的交错方法和参数语法。让我们再看一次那个例子。Objective-C：\n\
    \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\n`Nu`：\n\n```\n((NSNotificationCenter defaultCenter)\n\
    \  postNotificationName:DATA_RECEIVED object:self)\n```\n\n如何！当然，它并非完全一致。即使忽略从方括号到圆括号的变化，在声明类、方法等方面还有许多其他语法变化，这通常源于\
    \ `Nu` 作为基于 Lisp 的语言的起源。然而，总的来说，这里有很多东西是 Objective-C 开发者一眼就能认出来的。\n\n除了语言本身，`Nu`\
    \ 还包括一个命令行 shell（`nush`）、一个类似 `make` 的工具（`nuke`）等等。这些工具组合成一个包，让我们可以启动一个 shell，并使用我们熟悉和喜爱的\
    \ Cocoa 类进行一些即兴脚本编写。我们可以与活动对象交互，并采用探索性方法使用 Cocoa 框架。前往 `http://programming.nu`\
    \ 下载并了解更多关于这个 Cocoa 与 Lisp 之间的有趣结合。\n"
- fmt: "### JavaScript\n\nThe odd man out here, in some sense, is JavaScript. Everyone\
    \ knows that JavaScript can be used to script web pages, but did you know that\
    \ you can script your app with it? The `WebKit` framework included with Mac OS\
    \ X won’t let us create an entire app in JavaScript, but it does let us include\
    \ a scripting layer, with or without a web view, that lets someone familiar with\
    \ JavaScript define some of what happens in the application.\n\nThis is something\
    \ we’re most likely to use in conjunction with a web view. Using the `WebView`\
    \ class from WebKit, we can “reach through” to a `WebScriptObject`, which lets\
    \ us call JavaScript functions from Objective-C, and also lets us expose an Objective-C\
    \ object to the JavaScript interpreter so that the JavaScript code can call Objective-C\
    \ methods using a method-to-function mapping similar to what we described for\
    \ PyObjC. This is primarily useful if we want to use a `WebView` to lay out our\
    \ GUI but still include controls in our GUI that can affect things outside of\
    \ the JavaScript environment.\n\nBut wait, there’s more! Besides the JavaScript\
    \ support that WebKit gives us, there’s a third-party option called `JSCocoa`\
    \ that fully bridges JavaScript with Cocoa using the same JavaScript engine (`JavaScriptCore`)\
    \ that’s a part of WebKit. This lets us write complete Cocoa applications in JavaScript,\
    \ much like we can in Python or Ruby. One nice feature of `JSCocoa`, which it\
    \ shares with Cappuccino (described in the final section of this chapter) is that,\
    \ in addition to the translation between JavaScript-style function names and Objective-C\
    \ method names, `JSCocoa` actually lets us write our JavaScript in a syntax that\
    \ is hauntingly similar to Objective-C.\n\n```\n[[NSNotificationCenter defaultCenter]\n\
    \  postNotificationName:DATA_RECEIVED object:self];\n```\n\n`JSCocoa`:\n\n```\n\
    [[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self]\n\
    ```\n\nThat’s right—the only difference is the absent semicolon because we don’t\
    \ need a semicolon at the end of a line of JavaScript if the end of the line is\
    \ also a valid statement ending. We’re the first to admit that this seems like\
    \ a JavaScript miracle: we don’t have the JavaScript knowledge to have the slightest\
    \ idea how this trick was pulled off, and probably never will, but that’s okay.\
    \ To learn more about this, go to [`http://inexdo.com/JSCocoa`](http://inexdo.com/JSCocoa).\n\
    \n### F-Script\n\nNo discussion of alternate languages for programming in Cocoa\
    \ would be complete without mentioning F-Script. Unlike most of the language bridges,\
    \ which are ultimately meant to let us build Cocoa apps in a different language,\
    \ F-Script seems to have a couple of complementary purposes. First of all, we\
    \ can embed F-Script into our applications, providing an easy way to add user\
    \ scripting to our apps, including GUI components for entering and trying out\
    \ scripts written in the F-Script language, which is based on Smalltalk and is\
    \ therefore pretty similar to Objective-C.\n\nThe other, perhaps even more useful\
    \ features of F-Script are the tools it provides to us, the developers, in the\
    \ form of an interactive command shell that lets us explore our running application.\
    \ This includes a graphical browser that lets us navigate among the objects in\
    \ our application, inspecting their properties, traversing relationships to other\
    \ objects, and so on. It’s like taking the interactivity of Xcode’s debugger and\
    \ turning it up to 11.\n\nNot only that, we can also inject F-Script into any\
    \ running Cocoa application and use the same tools to explore its objects! Although\
    \ this functionality is not as useful without the target app’s source, being able\
    \ to browse the structure of other applications can be highly educational—and\
    \ fun as well. All Cocoa developers should have some familiarity with this tool.\
    \ Head over to [`http://www.fscript.org`](http://www.fscript.org) to try this\
    \ out for yourself.\n\n## Ported Cocoa\n\nThis book is primarily about making\
    \ Mac software (it’s right there in the title), but we’d be doing you a disservice\
    \ if we didn’t point out the other areas where Cocoa and Cocoa-ish technologies\
    \ may be applied.\n\n### Cocoa Touch\n\nThese days, with iPhone development growing\
    \ by leaps and bounds, presumably everyone reading this book knows a bit about\
    \ the iPhone development model and the fact that it’s based around Objective-C.\
    \ In fact, it’s a pretty safe bet that you probably did some iPhone development\
    \ before testing the Mac waters. In spite of that, it’s worth mentioning the iPhone’s\
    \ Cocoa Touch frameworks and how it differs from the Cocoa frameworks we’ve been\
    \ covering.\n\nCocoa’s core classes are split between two frameworks: Foundation\
    \ contains all the fundamental classes that can be useful in every type of development\
    \ (`NSString`, `NSArray`, and so on), and AppKit contains all the classes that\
    \ are specific to desktop GUI app development (`NSApplication`, `NSView`, `NSWindow`,\
    \ and so on). In Cocoa Touch on the iPhone, the Foundation framework is about\
    \ the same, but the AppKit is gone, and UIKit has taken its place.\n\nMany of\
    \ the fundamentals of UIKit are similar to AppKit, with a few twists to make it\
    \ work easily on a small, accelerometer-enabled, touch-screen device. Each application\
    \ has a single `UIWindow` where all drawing occurs, and that `UIWindow` contains\
    \ a hierarchy of `UIView` subclasses (such as `UIButton`, `UITextField`, and the\
    \ like). Although AppKit’s only native user input methods are mouse and keyboard,\
    \ UIKit also provides similar event-based input for handling multiple onscreen\
    \ touches as well as movement of the device.\n\nIn some other ways, UIKit is sort\
    \ of “AppKit 2.0.” Apple took the opportunity to toss out some baggage in the\
    \ form of APIs and classes that may have seemed like a good idea a decade or two\
    \ ago, but now seem unnecessary. For instance, the whole concept of cell classes\
    \ distinct from views (as exhibited by the `NSCell` classes) is now gone. The\
    \ only UIKit class with cell in its name is `UITableViewCell`, which is really\
    \ a `UIView` subclass used to draw a chunk of a table view (hence the name). Also,\
    \ UIKit embraces Objective-C 2.0’s properties in a way that AppKit never has,\
    \ providing declared properties for most of the configurable attributes.\n\nApart\
    \ from that, there are a few important parts of Cocoa that aren’t available in\
    \ Cocoa Touch (at least, not as of this writing). Specifically, in terms of what\
    \ you’ve read in this book, the biggest missing piece is Cocoa Bindings. KVC and\
    \ KVO are there, so, if you’re feeling ambitious, the underpinnings for building\
    \ your own binding technology are there. Without doing that, you’ll find that\
    \ a big chunk of any iOS app is glue code that’s pushing values from model objects\
    \ into various kinds of views and controls."
  raw: '### JavaScript


    The odd man out here, in some sense, is JavaScript. Everyone knows that JavaScript
    can be used to script web pages, but did you know that you can script your app
    with it? The WebKit framework included with Mac OS X won’t let us create an entire
    app in JavaScript, but it does let us include a scripting layer, with or without
    a web view, that lets someone familiar with JavaScript define some of what happens
    in the application.


    This is something we’re most likely to use in conjunction with a web view. Using
    the `WebView` class from WebKit, we can “reach through” to a `WebScriptObject`,
    which lets us call JavaScript functions from Objective-C, and also lets us expose
    an Objective-C object to the JavaScript interpreter so that the JavaScript code
    can call Objective-C methods using a method-to-function mapping similar to what
    we described for PyObjC. This is primarily useful if we want to use a `WebView`
    to lay out our GUI but still include controls in our GUI that can affect things
    outside of the JavaScript environment.


    But wait, there’s more! Besides the JavaScript support that WebKit gives us, there’s
    a third-party option called JSCocoa that fully bridges JavaScript with Cocoa using
    the same JavaScript engine (JavaScriptCore) that’s a part of WebKit. This lets
    us write complete Cocoa applications in JavaScript, much like we can in Python
    or Ruby. One nice feature of JSCocoa, which it shares with Cappuccino (described
    in the final section of this chapter) is that, in addition to the translation
    between JavaScript-style function names and Objective-C method names, JSCocoa
    actually lets us write our JavaScript in a syntax that is hauntingly similar to
    Objective-C.


    `[[NSNotificationCenter defaultCenter]`


      `postNotificationName:DATA_RECEIVED object:self];`


    JSCocoa:


    `[[NSNotificationCenter defaultCenter]`


      `postNotificationName:DATA_RECEIVED object:self]`


    That’s right—the only difference is the absent semicolon because we don’t need
    a semicolon at the end of a line of JavaScript if the end of the line is also
    a valid statement ending. We’re the first to admit that this seems like a JavaScript
    miracle: we don’t have the JavaScript knowledge to have the slightest idea how
    this trick was pulled off, and probably never will, but that’s okay. To learn
    more about this, go to   [`http://inexdo.com/JSCocoa`](http://inexdo.com/JSCocoa)
    .


    ### F-Script


    No discussion of alternate languages for programming in Cocoa would be complete
    without mentioning F-Script. Unlike most of the language bridges, which are ultimately
    meant to let us build Cocoa apps in a different language, F-Script seems to have
    a couple of complementary purposes. First of all, we can embed F-Script into our
    applications, providing an easy way to add user scripting to our apps, including
    GUI components for entering and trying out scripts written in the F-Script language,
    which is based on Smalltalk and is therefore pretty similar to Objective-C.


    The other, perhaps even more useful features of F-Script are the tools it provides
    to us, the developers, in the form of an interactive command shell that lets us
    explore our running application. This includes a graphical browser that lets us
    navigate among the objects in our application, inspecting their properties, traversing
    relationships to other objects, and so on. It’s like taking the interactivity
    of Xcode’s debugger and turning it up to 11.


    Not only that, we can also inject F-Script into any running Cocoa application
    and use the same tools to explore its objects! Although this functionality is
    not as useful without the target app’s source, being able to browse the structure
    of other applications can be highly educational—and fun as well. All Cocoa developers
    should have some familiarity with this tool. Head over to [`http://www.fscript.org`](http://www.fscript.org)
    to try this out for yourself.


    ## Ported Cocoa


    This book is primarily about making Mac software (it’s right there in the title),
    but we’d be doing you a disservice if we didn’t point out the other areas where
    Cocoa and Cocoa-ish technologies may be applied.


    ### Cocoa Touch


    These days, with iPhone development growing by leaps and bounds, presumably everyone
    reading this book knows a bit about the iPhone development model and the fact
    that it’s based around Objective-C. In fact, it’s a pretty safe bet that you probably
    did some iPhone development before testing the Mac waters. In spite of that, it’s
    worth mentioning the iPhone’s Cocoa Touch frameworks and how it differs from the
    Cocoa frameworks we’ve been covering.


    Cocoa’s core classes are split between two frameworks: Foundation contains all
    the fundamental classes that can be useful in every type of development (`NSString`,
    `NSArray`, and so on), and AppKit contains all the classes that are specific to
    desktop GUI app development (`NSApplication`, `NSView`, `NSWindow`, and so on).
    In Cocoa Touch on the iPhone, the Foundation framework is about the same, but
    the AppKit is gone, and UIKit has taken its place.


    Many of the fundamentals of UIKit are similar to AppKit, with a few twists to
    make it work easily on a small, accelerometer-enabled, touch-screen device. Each
    application has a single `UIWindow` where all drawing occurs, and that `UIWindow`
    contains a hierarchy of `UIView` subclasses (such as `UIButton`, `UITextField`,
    and the like). Although AppKit’s only native user input methods are mouse and
    keyboard, UIKit also provides similar event-based input for handling multiple
    onscreen touches as well as movement of the device.


    In some other ways, UIKit is sort of “AppKit 2.0.” Apple took the opportunity
    to toss out some baggage in the form of APIs and classes that may have seemed
    like a good idea a decade or two ago, but now seem unnecessary. For instance,
    the whole concept of cell classes distinct from views (as exhibited by the `NSCell`
    classes) is now gone. The only UIKit class with cell in its name is `UITableViewCell`,
    which is really a `UIView` subclass used to draw a chunk of a table view (hence
    the name). Also, UIKit embraces Objective-C 2.0’s properties in a way that AppKit
    never has, providing declared properties for most of the configurable attributes.


    Apart from that, there are a few important parts of Cocoa that aren’t available
    in Cocoa Touch (at least, not as of this writing). Specifically, in terms of what
    you’ve read in this book, the biggest missing piece is Cocoa Bindings. KVC and
    KVO are there, so, if you’re feeling ambitious, the underpinnings for building
    your own binding technology are there. Without doing that, you’ll find that a
    big chunk of any iOS app is glue code that’s pushing values from model objects
    into various kinds of views and controls.'
  trans: "\n### JavaScript\n\n从某种意义上看，JavaScript 是这里的一个异类。众所周知，JavaScript 可用于编写网页脚本，但你是否知道也可以用脚本来控制你的应用？Mac\
    \ OS X 自带的 `WebKit` 框架虽然不允许我们完全用 JavaScript 创建整个应用，但它允许我们包含一个脚本层（无论是否带有网页视图），让熟悉\
    \ JavaScript 的人能够定义应用中的部分行为。\n\n这一点我们最有可能结合网页视图来使用。通过使用 WebKit 中的 `WebView` 类，我们可以“穿透”到\
    \ `WebScriptObject` 对象，这使我们能够从 Objective-C 调用 JavaScript 函数，同时也能将 Objective-C\
    \ 对象暴露给 JavaScript 解释器，以便 JavaScript 代码可以通过类似 PyObjC 中所描述的方法到函数的映射机制来调用 Objective-C\
    \ 方法。当我们希望使用 `WebView` 来布局图形用户界面（GUI），但又想在 GUI 中包含一些能够影响 JavaScript 环境之外事物的控件时，这一点尤为有用。\n\
    \n但别急，还有更多功能！除了 WebKit 提供的 JavaScript 支持外，还有一个名为 `JSCocoa` 的第三方方案，它使用与 WebKit\
    \ 相同的 JavaScript 引擎（`JavaScriptCore`），将 JavaScript 与 Cocoa 完全桥接起来。这使我们能够用 JavaScript\
    \ 编写完整的 Cocoa 应用，就像用 Python 或 Ruby 一样。`JSCocoa` 的一个优良特性（与本章最后一节描述的 Cappuccino\
    \ 共享此特性）在于，除了处理 JavaScript 风格函数名与 Objective-C 方法名之间的转换外，`JSCocoa` 实际上还允许我们使用一种与\
    \ Objective-C 惊人相似的语法来编写 JavaScript。\n\n```\n[[NSNotificationCenter defaultCenter]\n\
    \  postNotificationName:DATA_RECEIVED object:self];\n```\n\n`JSCocoa`:\n\n```\n\
    [[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self]\n\
    ```\n\n没错——唯一的区别就是缺少了分号，因为在一行 JavaScript 代码中，如果行尾本身就是一个有效的语句结束位置，我们就不需要在行末加分号。我们第一个承认这看起来像是一个\
    \ JavaScript 奇迹：我们不具备足够的 JavaScript 知识，丝毫不知道这个技巧是如何实现的，而且可能永远也不会知道，但这没关系。要了解更多信息，请访问\
    \ [`http://inexdo.com/JSCocoa`](http://inexdo.com/JSCocoa)。\n\n### F-Script\n\n\
    任何关于 Cocoa 编程中替代语言的讨论，如果不提及 F-Script 都是不完整的。与大多数最终旨在让我们用不同语言构建 Cocoa 应用的语言桥接方案不同，F-Script\
    \ 似乎有几个互补的目的。首先，我们可以将 F-Script 嵌入到我们的应用中，为应用提供一种简单的方式来添加用户脚本功能，包括用于输入和试用基于 Smalltalk\
    \ 语言（因此与 Objective-C 非常相似）的 F-Script 脚本的 GUI 组件。\n\nF-Script 的另一个，也许是更有用的特性，是它以交互式命令\
    \ shell 的形式为我们（开发者）提供的工具，让我们能够探索正在运行的应用。这包括一个图形浏览器，让我们可以在应用的对象之间导航，检查它们的属性，遍历它们与其他对象的关系等等。这就像是将\
    \ Xcode 调试器的交互性提升到了极致。\n\n不仅如此，我们还可以将 F-Script 注入到任何正在运行的 Cocoa 应用中，并使用相同的工具来探索其中的对象！虽然在没有目标应用源代码的情况下，此功能用处不大，但能够浏览其他应用的结构可能极具教育意义——同时也会很有趣。所有\
    \ Cocoa 开发者都应该对这个工具有所了解。请访问 [`http://www.fscript.org`](http://www.fscript.org)\
    \ 亲自尝试。\n\n## 移植的 Cocoa\n\n本书主要介绍制作 Mac 软件（标题中已明确指出），但如果我们不指出 Cocoa 及类似 Cocoa\
    \ 技术可能应用于的其他领域，那对您来说将是一种损失。\n\n### Cocoa Touch\n\n如今，随着 iPhone 开发的迅猛发展，想必阅读本书的每位读者都了解一些\
    \ iPhone 开发模式，并且知道它基于 Objective-C。事实上，很有把握地说，你在尝试 Mac 开发之前很可能已经做过一些 iPhone 开发。尽管如此，仍值得提及\
    \ iPhone 的 Cocoa Touch 框架以及它与我们一直在介绍的 Cocoa 框架之间的区别。\n\nCocoa 的核心类分布在两个框架中：`Foundation`\
    \ 包含所有在各种开发中都有用的基础类（如 `NSString`、`NSArray` 等），而 `AppKit` 则包含所有专门用于桌面 GUI 应用开发的类（如\
    \ `NSApplication`、`NSView`、`NSWindow` 等）。在 iPhone 的 Cocoa Touch 中，`Foundation`\
    \ 框架基本相同，但 `AppKit` 消失了，取而代之的是 `UIKit`。\n\n`UIKit` 的许多基本概念与 AppKit 类似，但做了一些调整，使其能轻松运行在小尺寸、支持加速计、触摸屏的设备上。每个应用都有一个\
    \ `UIWindow`，所有绘制都在其中进行，并且该 `UIWindow` 包含一个 `UIView` 子类（如 `UIButton`、`UITextField`\
    \ 等）的层级结构。虽然 AppKit 唯一的原生用户输入方法是鼠标和键盘，但 `UIKit` 也提供了类似的基于事件的处理，用于处理屏幕上的多点触摸以及设备的移动。\n\
    \n在其他一些方面，`UIKit` 有点像是“AppKit 2.0”。苹果借机舍弃了一些可能在一二十年前看起来不错但现在已显得不必要的 API 和类。例如，将单元格类与视图区分开来的整个概念（如\
    \ `NSCell` 类所展示的）现在已经不复存在。`UIKit` 中唯一名称带有 cell 的类是 `UITableViewCell`，它实际上是一个 `UIView`\
    \ 子类，用于绘制表格视图的一部分（因此得名）。此外，`UIKit` 在属性方面全面拥抱了 Objective-C 2.0，而 AppKit 从未做到，它为大多数可配置的属性提供了声明的属性。\n\
    \n除此之外，Cocoa 中还有一些重要部分在 Cocoa Touch 中不可用（至少在撰写本文时如此）。具体来说，就您在本书中阅读到的内容而言，缺失的最大一块是\
    \ Cocoa Bindings（Cocoa 绑定）。KVC 和 KVO 仍然存在，所以如果您有雄心，构建自己的绑定技术的基础条件是具备的。如果不这样做，您会发现任何\
    \ iOS 应用中很大一部分都是胶水代码，用于将模型对象中的值推送到各种视图和控件中。"
- fmt: '### GNUstep and Cocotron


    Another platform that can run Cocoa-like apps is `GNUstep` and its more recent
    brother-in-arms, `Cocotron`. The `GNUstep` project has been around for a long
    time, and its original goals were centered on providing a desktop application
    programming environment for Linux and other Unix machines. The development libraries
    were based around the `OpenStep` API, a published standard that lists classes
    and APIs that are a subset of today’s `Foundation` and `AppKit` frameworks. That,
    in turn, came from a collaboration between NeXT and Sun in the mid-1990s when
    Sun wanted help providing an application development environment for their Solaris
    OS, all of which preceded Apple’s later acquisition of NeXT, whose OS and software
    later morphed into Mac OS X.


    So here we are today, and `GNUstep` is still out there in the wild. `GNUstep`
    continues to grow, acquiring new APIs as volunteers reimplement the latest things
    that Apple adds to Mac OS X, but its main goal has always been to implement the
    old `OpenStep` APIs, with the new additions being just a bonus. So far, there’s
    not much for `GNUstep` to shout about in terms of big-name projects, but as a
    way to port a Cocoa app to another Unix variant or to Windows, `GNUstep` at [`www.gnustep.org`](http://www.gnustep.org)
    is worth looking into.


    A few years ago, a new alternative called `Cocotron` turned up. `Cocotron` has
    a slightly different focus (trying to keep on top of all of Apple’s latest classes
    and API changes) and a different deployment target (it’s focused primarily on
    Windows instead of Unix), but it may also be worth thinking about if you want
    to port your app to Windows. It also has a less stringent license than `GNUstep`,
    which means you’re free to build `Cocotron` into your own closed-source applications.
    The official `Cocotron` web site at [`www.cocotron.org`](http://www.cocotron.org)
    seems to be nearly dead, but some development is still happening, as evidenced
    by the discussions at the project’s Google group at [`http://groups.google.com/group/cocotron-dev/`](http://groups.google.com/group/cocotron-dev/)
    .


    ### Cappuccino/Objective-J


    Another interesting development from the past few years is the `Cappuccino` development
    environment. Unlike the other environments we’ve mentioned, `Cappuccino` is all
    about making web apps, not desktop apps. So instead of running `Cappuccino` apps
    on the desktop, they’re hosted on a web server and run in a web browser. `Cappuccino`
    development is all about running software on the client side, using JavaScript
    running in the context of a single HTML page, rather serving up page after page
    of content like a traditional web development framework does.


    `Cappuccino` contains class libraries that mimic much of `Foundation` and `AppKit`
    in name and functionality, and even manages to pull off the amazing trick of implementing
    much of Objective-C’s syntax in JavaScript, as we described when we mentioned
    `JSCocoa`. The applications created using `Cappuccino` can then be published on
    any web server and run in any modern browser, just like any other web application.
    This implementing of Objective-C in JavaScript is called `Objective-J` and is
    a crucial part of what makes `Cappuccino` tick.


    `Cappuccino` started off as a strange hybrid, consisting of an open source core
    containing the JavaScript frameworks and what was meant to be a commercial IDE
    called `Atlas`, which was itself a `Cappuccino` app. The company behind this idea
    was bought out before `Atlas` was ever released, though. Nowadays, the open source
    project has expanded to include tools that let you build the GUI for your `Cappuccino`
    app directly in Xcode’s Interface Builder instead. Go to [`www.cappuccino-project.org`](http://www.cappuccino-project.org)
    to follow the action.


    ## Here at the End of All Things


    That wraps up the discussion of future paths for you to take as you develop your
    Cocoa skills; this also concludes this book. We hope this book has taken you to
    a place you wanted to get to, but let’s not assume that this stopping place is
    the final destination! Visit the Learn Cocoa on the Mac web site, where you’ll
    find forums for discussing with other Cocoa developers, source code for all the
    examples in this book, and more. And be sure to visit us at [`http://learncocoa.org`](http://learncocoa.org)
    where we’ll do our best to help you learn even more!'
