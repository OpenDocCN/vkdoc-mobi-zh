    请注意，对于 `swornEnemy` 组合框和 `primaryMotivation` 单选按钮矩阵，虽然设置值的过程略显复杂，但从它们那里获取值却非常简单，一行代码即可轻松搞定。\n\
    \n剩下的复杂视图，即 Powers 复选框矩阵，从中获取值也稍微复杂一些，因为我们必须找到所有被选中的复选框并获取它们关联的字符串。下面的代码应该可以解决这个问题：\n\
    \n```objc\n- (IBAction)takePowers:(id)sender {\n    NSMutableArray *powers = [NSMutableArray\
    \ array];\n    for (NSCell *cell in [sender cells]) {\n        if ([cell state]==NSOnState)\
    \ {\n            [powers addObject:[cell title]];\n        }\n    }\n    [self.villain\
    \ setObject:powers forKey:kPowers];\n    NSLog(@\"当前反派属性: %@\", self.villain);\n\
    }\n```\n\n编译并运行应用，在 Powers 矩阵中点击一下，输出日志应该会相应地更新。\n\n最后，我们需要实现一个方法来从 Notes 视图（一个\
    \ `NSTextView` 实例）中获取值。`NSTextView` 提供了许多代理方法，允许我们在用户编辑文本时执行各种不同的操作来响应其行为。我们将采用一种非常简单的方法：在用户每次编辑文本时获取一份值的副本，这意味着每次按键都会触发！对于一个可能会影响性能的大型文档视图来说，这样做是极端的（且效率极低）。但对于一个用来容纳简短笔记的小型文本视图来说，这种简单的方法不会给我们带来任何麻烦：\n\
    \n```objc\n- (void)textDidChange:(NSNotification *)aNotification {\n    [self.villain\
    \ setObject:[[self.notesView string] copy] forKey:kNotes];\n    NSLog(@\"当前反派属性:\
    \ %@\", self.villain);\n}\n```\n\n这里发生了一件不寻常的事情：我们创建了从 `notesView` 的 `string`\
    \ 方法获得结果的副本。原因在于，`NSTextView` 内部会为编辑和显示保留一个自己的字符串，而其 `string` 方法实际上返回的是指向那个内部字符串对象的指针。如果我们不创建副本，那么我们的\
    \ villain 对象最终将直接引用那个字符串，这会导致之后在这些 GUI 对象显示不同 villain 时出现混乱。结果可能是多个 villain 共享同一个字符串，编辑任意一个\
    \ villain 的备注会同时编辑所有 villain！`NSTextField` 不会引起这类问题，因为它的 `stringValue` 方法已经给了我们一个副本，而不是传递其内部的字符串对象。\n\
    \n另一点需要指出的是，我们实现的 `NSTextView` 代理方法有一个奇怪的函数签名，并且我们接收了一个 `NSNotification` 作为参数。这里我们可以看到\
    \ Cocoa 通用通知系统的一些端倪。通过使用名为 `NSNotificationCenter` 的类，可以配置任何对象在特定事件发生时接收来自其他对象的通知。当我们为\
    \ `NSTextView` 设置代理时（仅举一例；这种模式也出现在其他一些类中），我们可以选择实现的一些代理方法是特定于该代理的，只能在该代理中实现；但其中一些是这种通知方法，理论上也可以在有权访问\
    \ `NSTextView` 并配置好接收其通知的任何其他类中实现。我们将在本书后面部分详细介绍这个主题。\n\n## 总结\n\n本章我们涉及了很多内容。我们学习了一些对所有\
    \ Cocoa 应用都至关重要的基础知识：如何在应用启动时执行自己的初始化代码；如何使用 Xcode 的 Interface Builder 编辑器在窗口中布局视图，包括指定调整大小的行为；如何使用各种\
    \ Cocoa 的 GUI 类的基础知识等等。在下一章中，我们将基于目前已做的内容进行构建，扩展 VillainTracker 应用，使其能够处理列在表格中的一组反派角色。\n\
    \n# 6. 使用表格视图\n\n## 摘要\n\n第 4 章和第 5 章介绍了 Cocoa 中一些最常用的 GUI 组件，从按钮和简单的输入字段到功能完备的文本编辑器。我们还没有讨论过\
    \ Cocoa 最大、最复杂的视图类之一 `NSTableView`。本章将介绍如何使用 `NSTableView` 来显示整个组件集合的数据，如何响应用户通过点击行来更改表格选择的操作，以及如何直接在表格中编辑值。\n\
    \n我们将通过扩展第 5 章中的 VillainTracker 应用来学习如何使用表格视图。本章创建的新版 VillainTracker 将维护一个反派数组，在表格中显示所有反派，并允许用户在点击表格中的条目时编辑所选反派的所有属性。我们将首先使用\
    \ Xcode 扩展 `VillainTrackerAppDelegate` 类的接口，使其包含一个反派数组。既然我们已经在处理这些代码，我们还将探讨另一种手动添加一些新输出口（用于连接到新的表格视图和窗口本身）以及添加和删除反派的操作方法。然后，我们将在\
    \ Interface Builder 模式下扩展 nib 文件，添加一个表格视图并将其连接起来。接着，我们将返回 Xcode 更改控制器实现以处理表格。图\
    \ 6-1 显示了最终结果。\n\n![A978-1-4302-4543-8_6_Fig1_HTML.jpg](img/A978-1-4302-4543-8_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** 完成的应用窗口\n\n在前面的章节中，我们通过从 GUI 按住 Control 键拖拽到代码，并让 Xcode 生成相应的存根来创建新的输出口和操作。在本章中，由于我们要扩展现有代码，我们将手动创建这些存根。这两种方法都是完全有效的，了解这两种方式很好，这样你可以选择最方便的一种。\n"
- fmt: '# Preparing VillainTrackerAppDelegate for Multiple Villains


    In Xcode, open the project we created in [Chapter 4](#A978-1-4302-4543-8_4_Chapter.html),
    and navigate to `VillainTrackerAppDelegate.h` so we can update the class’s interface
    to accommodate our upcoming changes. First, we’ll add the new instance variables
    we need. Because we’re going to maintain a list of villains, we’ll create an `NSMutableArray`
    called `villains` to contain them all. We’ll also add an outlet called `villainsTableView`
    in order to access the `NSTableView` where we’re going to present the list of
    villains.


    We’ll also add declarations for `newVillain:` and `deleteVillain:`, our two new
    action methods. The following code shows the state of `VillainTrackerAppDelegate.h`
    after making these changes (new lines are in bold):


    ```

    #import <Cocoa/Cocoa.h>


    @interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *nameView;

    @property (weak) IBOutlet NSTextField *lastKnownLocationView;

    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;

    @property (weak) IBOutlet NSComboBox *swornEnemyView;

    @property (weak) IBOutlet NSLevelIndicator *evilnessView;

    @property (weak) IBOutlet NSMatrix *powersView;

    @property (weak) IBOutlet NSPopUpButton *powerSourceView;

    @property (weak) IBOutlet NSMatrix *primaryMotivationView;

    @property (weak) IBOutlet NSImageView *mugshotView;

    @property (unsafe_unretained) IBOutlet NSTextView *notesView;

    @property (weak) IBOutlet NSTableView *villainsTableView;

    @property (strong) NSMutableDictionary *villain;

    @property (strong) NSMutableArray *villains;


    - (IBAction)takeName:(id)sender;

    - (IBAction)takeLastKnownLocation:(id)sender;

    - (IBAction)takeLastSeenDate:(id)sender;

    - (IBAction)takeSwornEnemy:(id)sender;

    - (IBAction)takeEvilness:(id)sender;

    - (IBAction)takePowers:(id)sender;

    - (IBAction)takePowerSource:(id)sender;

    - (IBAction)takePrimaryMotivation:(id)sender;

    - (IBAction)takeMugshot:(id)sender;

    - (IBAction)newVillain:(id)sender;

    - (IBAction)deleteVillain:(id)sender;


    @end

    ```


    The new declarations follow the same structure as the properties and methods generated
    by Xcode when we control-dragged to the `VillainTrackerAppDelegate` class in the
    last chapter. Xcode will note that this code has been added, and these outlets
    and actions are just as valid as the ones that Xcode generated. In fact, note
    the small circles that appear in the left margin of the Code Editor pane. These
    circles are endpoints that we can control-drag to, showing that Xcode recognized
    what we did as creating an outlet or an action. When working on laying out a user
    interface, creating these via control-dragging is convenient because we can make
    the connections and create the stubs at the same time. However, when tweaking
    existing code, doing it by hand can be faster.


    Now we’ll add two new method implementations (just empty shells for now) for the
    new action methods in `VillainTrackerAppDelegate.m`. Add these lines to the `@implementation
    VillainTrackerAppDelegate` section:


    ```

    - (IBAction)newVillain:(id)sender {}


    - (IBAction)deleteVillain:(id)sender {}

    ```


    Now we’ve added all that we need to `VillainTrackerAppDelegate`’s interface and
    some empty stub methods to the implementation. Hit the Run button just to make
    sure it compiles cleanly, and then we’ll move on to adjusting the GUI to make
    room for the table.


    ## Making Way for the Table View


    In Xcode’s Project Navigator panel, click `MainMenu.xib` to open it in Interface
    Builder mode (we can also double-click the `MainMenu.xib` file to open it in a
    new window). We’re going to make the window bigger, add a table view and a few
    buttons, reorganize the layout, and adjust the resizing characteristics of all
    the `NSBoxes` so that the table view will resize fully in both dimensions, and
    the other boxes will move accordingly.


    Start by resizing the window, making it about 300 pixels wider (about half as
    wide again as it was to begin with), but the same height as before. We’re going
    to follow the conventions of the western, left-to-right world and arrange things
    so that the selection on the left (in the table view) determines what is presented
    on the right (all the other views), so you should also drag all the existing views
    to the right side of the window. See Figure [6-2](#A978-1-4302-4543-8_6_Chapter.html#Fig2)
    to get an idea of what to aim for. Open up the Attributes Inspector (⌥⌘4) with
    the Window selected, and check the box labeled Resize.


    ![A978-1-4302-4543-8_6_Fig2_HTML.jpg](A978-1-4302-4543-8_6_Fig2_HTML.jpg)


    **Figure 6-2.** Make your window look like this in preparation for the table view


    Now open up the Object Library pane (⇧⌥⌘4) in the Utility area (it might be collapsed
    below the Inspector pane), and type “table” into the Search field. One of the
    results should be a Table View, which is an instance of the `NSTableView` class
    contained in an `NSScrollView`. Drag the Table View into to the upper left part
    of the space in the window, letting the blue guidelines appear to position it
    the recommended distance from the edge of the window frame. The default size for
    the table view is quite a bit smaller than the space we’re putting it in, but
    don’t bother with resizing it to fill the available space just yet, we’ll get
    to that in a bit.


    The first thing we’re going to do with this table view is configure its columns.
    By default, a new table view has two columns, but we’d like it to have three,
    so that we can show the name, date of last sighting, and mugshot for each villain
    in our list. To add a column, we must sort of “drill down” through a few layers
    of views. Open the Attributes Inspector (⌥⌘4) to help guide the way; it will always
    show a bit of info about the selected object, most critically the class name.
    The first time we click on the table view in our window, we’ll see that the Attributes
    Inspector shows the Scroll View at the top. That’s because the table view we dragged
    out from the library is actually contained inside an `NSScrollView`. Click again,
    and the inspector will show Table View.


    One of the attributes visible in the Inspector is the number of columns. Change
    it from 2 to 3. When the number of columns is changed, there’s a brief flash of
    a horizontal scrollbar in the table view, but it’s easy to miss. Other than that
    flash and the hint of a resize bar at the edge of the table header, the table
    view won’t really visually reflect that there are actually three columns there;
    we’ll deal with that in a moment. In the meantime, there are two other changes
    to make to the table view. The first is to change the Column Sizing behavior from
    resizing Last Column Only to First Column Only. Our first column will hold the
    villain’s name, and the name of the villain will vary in width more than the date
    or mugshot, so we’ll want resizing to expand that column. By default, the user
    will be able to resize columns at will.'
