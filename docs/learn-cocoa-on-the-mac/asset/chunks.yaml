  trans: '

    # 12. 基于文档的应用程序


    ## 摘要


    到目前为止，我们在本书中构建的应用程序都有一个共同的重大缺陷：它们的行为方式都类似于"全有或全无"。对于应用程序使用的某个特定数据（如果它确实使用了存储），要么它存在于唯一的后端存储中，要么它根本不存在于任何地方。这些应用程序都没有提供任何概念，允许我们将数据分割成我们称之为"文档"的、离散且互不相关的存储单元。虽然将所有内容放在一个数据库中对某些目的有好处，但对其他目的而言却是一个巨大的障碍。如果我们想只与某人分享部分数据该怎么办？如果我们想能够并排地在多个窗口中查看同一种
    Core Data 实体的多个详情，以便进行比较，该怎么办？大多数人都通过使用几乎任何支持同时打开多个文档、且对一个文档的操作不会影响其他文档的现代应用程序，熟悉了这些可能性。


    事实证明，苹果公司的高管们多年前就考虑到了这一点，并将文档支持直接构建到了 Cocoa 中，其核心是 `NSDocument` 和 `NSDocumentController`
    类。Cocoa 的文档架构为我们提供了大量基础设施，否则我们不得不自行构建，例如管理窗口及其标题栏、处理打开面板和保存面板等等。如果你的应用程序使用了 Core
    Data，它甚至会自行处理实际的打开和保存操作，因此你的应用程序代码甚至无需接触文档文件。


    本章将通过创建一个名为 `ColorMix` 的应用程序，介绍如何创建基于文档的 Cocoa 应用程序的基础知识，包括使用 Core Data。`ColorMix`
    允许用户使用标准系统颜色面板选择两种颜色，然后显示一个色样网格，展示将这两种颜色混合在一起的不同方法。每组选定的两种颜色（以及其 15 种混合颜色）都可以保存到一个文档中，该文档就像任何其他文件一样，可以保存到你喜欢的任何位置，并在以后重新打开。在学习
    Cocoa 如何处理文档的同时，我们还将构建一个简单的视图类，用于绘制彩色矩形，并在代码中与 Core Data 交互。图 12-1 展示了 `ColorMix`
    应用程序完成后的样子。


    ![A978-1-4302-4543-8_12_Fig1_HTML.jpg](img/A978-1-4302-4543-8_12_Fig1_HTML.jpg)


    **图 12-1.** 完成后的 ColorMix 应用程序


    如果你使用过 Photoshop 或 Gimp 等图形软件，你可能已经熟悉其中一些混合模式。每种模式都使用特定的公式，取两种颜色的红、绿、蓝分量，并生成一种输出颜色。我们在此不描述混合模式，但你可以在
    [`http://en.wikipedia.org/wiki/Blend_modes`](http://en.wikipedia.org/wiki/Blend_modes)
    和其他地方找到它们的详细描述和示例。我们在这里要做的是，展示如何构建一个应用程序，让用户以实践的方式探索所有这些模式，每次针对两种选定的颜色。


    我们将使用的混合模式都内置于 Core Graphics 中，这是 Cocoa 图形架构的重要组成部分，我们将在第 13 章中进一步讨论。使用这种内置功能让我们可以免去自行进行任何颜色计算；我们只需调用
    Core Graphics 函数来设置混合模式并绘制矩形即可。


    ## 创建 ColorMix 应用程序


    首先在 Xcode 中创建一个新应用程序，使用新建项目向导中 "OS X / 应用程序" 部分的 Cocoa 应用程序模板。点击 "下一步" 后，将新应用程序命名为
    `ColorMix`，并将类前缀设置为 `CM`。这个新应用程序将同时使用 `NSDocument` 架构和 Core Data，因此我们需要在创建应用程序时正确配置项目。确保勾选了
    **创建基于文档的应用程序** 和 **使用 Core Data** 复选框。请注意，启用文档复选框也会激活 **文档扩展名** 文本字段。这允许我们设置应用程序在保存文件时将使用的默认文件名扩展名。在此处也输入
    `ColorMix`，以便我们能够轻松识别创建的文档。


    `ColorMix` 应用程序将有一些我们之前未见过自动创建的内容。特别是，它将有一个名为 `CMDocument` 的类（`NSPersistentDocument`
    的子类，而 `NSPersistentDocument` 本身是 `NSDocument` 的子类，我们稍后会解释这两个类），以及一个对应的 `CMDocument.xib`
    资源。这是我们扩展以定义文档行为和外观的两个关键元素。除此之外，我们还会看到一个模型文件，我们将在其中设置此应用程序的 Core Data 实体和属性信息。


    ### 检查默认的 Nib 文件


    在我们开始创建任何内容之前，请在 Interface Builder 中打开 `MainMenu.xib` 文件。注意到这个 nib 文件与我们之前创建的所有其他
    `MainMenu.xib` 文件有何不同吗？它不包含窗口！打开文件会显示各种代理对象、菜单本身，仅此而已。这是另一个提示，表明我们在创建基于文档的应用程序时面对的是不同类型的东西，因为这样的应用程序（例如
    Xcode、Microsoft Office、Garage Band 等）通常没有"主窗口"的概念，而是将应用程序的主体放在一个或多个文档窗口中。


    打开连接检查器，花一些时间点击一些菜单项，看看它们是如何连接的。文件菜单中的许多项都连接到第一响应者，调用名称中包含"document"（`newDocument:`、`openDocument:`
    等）的操作。事实证明，其中一些操作是在 `NSDocumentController` 类中实现的。这是一个特殊的类，在运行时有一个共享的实例，用于管理应用程序所有打开的文档。我们不会在这个
    nib 文件或任何其他地方看到这个共享实例，甚至看不到它的代理。`NSApplication` 在应用程序启动期间创建此对象，并将其添加到响应者链中，以便它可以处理这些操作。


    四处查看之后，我们基本上可以忘记这个应用程序的 `MainMenu.xib`，因为我们永远不需要再打开它。请记住，其中唯一的实际内容是菜单，并且大多数菜单项都连接到第一响应者上的操作，这意味着它们会在适当的时候找到通往相关窗口控制器或共享
    `NSDocumentController` 的路。


    现在打开 `CMDocument.xib`，看看它提供了什么。一个 `NSWindow` 已准备好供我们填充一些内容，如果我们打开身份检查器，会发现文件所有者是
    `CMDocument` 的一个实例。除此之外，它是一块白板，我们稍后将在其上留下我们的印记。

    '
- fmt: "### Defining the Model\n\nBefore we start building a GUI of any kind, let’s\
    \ create the data model that will be used to represent a document. This is an\
    \ extremely simple model containing a single entity with two attributes. We’ll\
    \ create just a single instance of that one entity in each document, but everything\
    \ you learn about documents in this chapter applies equally well to large, complex\
    \ data models.\n\nOpen the `CMDocument.xcdatamodeld`. Create an entity and name\
    \ it `ColorSet`. With the new entity still selected, create an attribute, name\
    \ it `color1`, set its type to `Transformable`, and click to turn off the Optional\
    \ checkbox. Then create a second attribute, name it `color2`, and configure it\
    \ just like the first: the type is `Transformable`, and Optional should be turned\
    \ off. These attributes represent the two colors that the user will choose for\
    \ each document. Each of them contains an instance of `NSColor`, which is not\
    \ one of the supported Core Data types, hence the use of `Transformable` as described\
    \ in [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html).\n\nSave the model, and we’re\
    \ done with it. That was an extremely simple model, wasn’t it!\n\n### Setting\
    \ Two Colors\n\nNow it’s time to start putting the GUI together. Remember that\
    \ this occurs in the document window, so switch back to `CMDocument.xib` in Interface\
    \ Builder. The default window contains an `NSTextField` (“Your document contents\
    \ here”), which we should delete before going on. Next we’re going to add an `NSObjectController`\
    \ to the nib file, which we’ll use to connect some GUI objects to the underlying\
    \ document. Follow these steps to set this up.\n\nUse the Library panel to find\
    \ an `NSObjectController`, and drag one over to the dock, where it will join the\
    \ File’s Owner, the Window, and other top-level objects. While this new object\
    \ (which is now labeled ”Object Controller”) is selected, open the Attributes\
    \ Inspector. At the very top of the Inspector is the Mode pop-up. Change it from\
    \ Class to Entity Name, then enter ”ColorSet” in the Entity Name field just below\
    \ it.\n\nWith the new Object Controller still selected, switch to the Bindings\
    \ Inspector. We need to tell this controller where it should get its data by binding\
    \ its `managedObjectContext` to a reasonable value, so find the Managed Object\
    \ Context item under the Parameters heading. If the details for this binding aren’t\
    \ visible, click its disclosure triangle to expose them. Use the Bind To pop-up\
    \ to select File’s Owner, then enter ”managedObjectContext” into the Model Key\
    \ Path text field, and press the Enter key to create the binding. As a final bonus\
    \ step for this object controller, select it in the dock and change its name to\
    \ ”colorset.” That won’t change anything in the application when it runs, but\
    \ it adds some clarity to the nib for some programmer in the future (probably\
    \ you; you’ll thank yourself later for documenting things as you go now).\n\n\
    ### The Simplest of GUIs\n\nIt’s time to build a simple GUI that lets us view\
    \ the core details of our `ColorSet` object, the two colors it contains. Use the\
    \ Library to find the `UILabel` object, and drag it into our Window. Select its\
    \ text, and change it to `Mix Color 1`. Then press `⌘D` to duplicate the label,\
    \ move it aside a bit, and change its text to `Mix Color 2`. Now find an `NSColorWell`\
    \ in the Library, and drag it to the document window we’re building. Once it’s\
    \ in place, duplicate it with `⌘D`, and then rearrange the labels and color wells\
    \ to look something like Figure [12-2](#A978-1-4302-4543-8_12_Chapter.html#Fig2).\n\
    \n![A978-1-4302-4543-8_12_Fig2_HTML.jpg](A978-1-4302-4543-8_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. The bare minimum GUI for selecting two colors\n\nNow select the\
    \ color well on the left, open the Bindings Inspector, and configure its Value\
    \ binding to use the `colorset` controller with the `selection` controller key\
    \ and the `color1` model key path. Select the color well on the right, and configure\
    \ its Value binding to use the `colorset` controller with the `selection` controller\
    \ key, this time with the `color2` model key path. Save the work, then click the\
    \ Run button. The app launches, and a new, empty “Untitled” document window appears,\
    \ but the color wells are unclickable! In our haste to get something onscreen,\
    \ we neglected to create something pretty important: a model object!\n\n### Creating\
    \ a Default ColorSet\n\nWhat we need to do is write some code that will insert\
    \ a new `ColorSet` object into the object controller whenever a new document is\
    \ created. We’ll do this in the `CMDocument` class by adding some facilities there\
    \ for accessing the object controller we added to the nib file and for keeping\
    \ track of whether the document was created from scratch or loaded from a file.\
    \ Select the `CMDocument.m` file where this new code will be added. For starters,\
    \ we’re going to add one property, an outlet called `objectController` for pointing\
    \ to the `NSObjectController` that we put into our nib file a page or two ago.\
    \ Instead of adding this to the header file, we can use a class extension to declare\
    \ this property in the `.m` file. A class extension looks just like a category\
    \ declaration, but with no category name in the parentheses. Add this code just\
    \ before the `@implementation` block:\n\n```\n@interface CMDocument ()\n\n@property\
    \ (weak) IBOutlet NSObjectController *objectController;\n\n@end\n```\n\nAnything\
    \ that we can declare in a class’s `@interface` block—instance variables, properties,\
    \ methods, etc.—can be declared in a class extension instead. The advantage of\
    \ doing so is that it keeps our class’s interface cleaner. We can choose to only\
    \ expose pieces of our class that are really needed by other classes and let the\
    \ rest be a sort of private API that is only usable within the class.\n\nWe’re\
    \ also going to add an instance variable, a `BOOL` called `isNew` that we’ll use\
    \ to keep track of whether each document has just been created or was loaded from\
    \ a file. Following the information-hiding trail we just followed with the class\
    \ extension, we’re going to reveal another nice trick: instance variables can\
    \ be declared in a class’s `@implementation` block instead of the `@interface`\
    \ in the header file. Do this by adding the bold code shown below:\n\n```\n@implementation\
    \ CMDocument\n{\n    BOOL isNew;\n}\n```\n\nNow take a glance at the rest of this\
    \ `.m` file. This file contains some ready-made methods, with comments showing\
    \ where we can extend their behaviors. We’re going to implement a bit of functionality\
    \ in the `init` and `windowControllerDidLoadNib:` methods, as well as implement\
    \ the `initWithType:error:` method, which we’ll explain in a bit. The predefined\
    \ methods in here all come from `NSDocument`, which handles most of the document-related\
    \ functionality for us. `CMDocument`’s direct superclass, however, is `NSPersistentDocument`,\
    \ which implements additional functionality for storing documents as Core Data\
    \ storage backends. Start off by adding this method:\n\n```\n- (id)initWithType:(NSString\
    \ *)typeName error:(NSError **)outError\n{\n    if (self = [super initWithType:typeName\
    \ error:outError]) {\n        isNew = YES;\n    }\n    return self;\n}\n\n- (NSString\
    \ *)windowNibName\n{\n    return @\"CMDocument\";\n}\n```\n\nThen, add the bold\
    \ lines shown here to the `windowControllerDidLoadNib:` method:\n\n```\n- (void)windowControllerDidLoadNib:(NSWindowController\
    \ *)windowController\n{\n    [super windowControllerDidLoadNib:windowController];\n\
    \    // Add any code here that needs to be executed once the windowController\
    \ has loaded\n    // the document's window.\n\n    if (isNew) {\n        id newObj\
    \ = [_objectController newObject];\n        [newObj setValue:[NSColor redColor]\
    \ forKey:@\"color1\"];\n        [newObj setValue:[NSColor yellowColor] forKey:@\"\
    color2\"];\n        [_objectController addObject:newObj];\n    }\n}\n```"
  raw: '### Defining the Model


    Before we start building a GUI of any kind, let’s create the data model that will
    be used to represent a document. This is an extremely simple model containing
    a single entity with two attributes. We’ll create just a single instance of that
    one entity in each document, but everything you learn about documents in this
    chapter applies equally well to large, complex data models.


    Open the CMDocument.xcdatamodeld. Create an entity and name it ColorSet. With
    the new entity still selected, create an attribute, name it color1, set its type
    to Transformable, and click to turn off the Optional checkbox. Then create a second
    attribute, name it color  2, and configure it just like the first: the type is
    Transformable, and Optional should be turned off. These attributes represent the
    two colors that the user will choose for each document. Each of them contains
    an instance of `NSColor`, which is not one of the supported Core Data types, hence
    the use of Transformable as described in [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html).


    Save the model, and we’re done with it. That was an extremely simple model, wasn’t
    it!


    ## Setting Two Colors


    Now it’s time to start putting the GUI together. Remember that this occurs in
    the document window, so switch back to CMDocument.xib in Interface Builder. The
    default window contains an `NSTextField` (“Your document contents here”), which
    we should delete before going on. Next we’re going to add an `NSObjectController`
    to the nib file, which we’ll use to connect some GUI objects to the underlying
    document. Follow these steps to set this up.


    Use the Library panel to find an `NSObjectController`, and drag one over to the
    dock, where it will join the File’s Owner, the Window, and other top-level objects.
    While this new object (which is now labeled ”Object Controller”) is selected,
    open the Attributes Inspector. At the very top of the Inspector is the Mode pop-up.
    Change it from Class to Entity Name, then enter ”ColorSet” in the Entity Name
    field just below it.


    With the new Object Controller still selected, switch to the Bindings Inspector.
    We need to tell this controller where it should get its data by binding its managedObjectContext
    to a reasonable value, so find the Managed Object Context item under the Parameters
    heading. If the details for this binding aren’t visible, click its disclosure
    triangle to expose them. Use the Bind To pop-up to select File’s Owner, then enter
    ”managedObjectContext” into the Model Key Path text field, and press the Enter
    key to create the binding. As a final bonus step for this object controller, select
    it in the dock and change its name to ”colorset.” That won’t change anything in
    the application when it runs, but it adds some clarity to the nib for some programmer
    in the future (probably you; you’ll thank yourself later for documenting things
    as you go now).


    ### The Simplest of GUIs


    It’s time to build a simple GUI that lets us view the core details of our ColorSet
    object, the two colors it contains. Use the Library to find the `UILabel` object,
    and drag it into our Window. Select its text, and change it to Mix Color 1\. Then
    press ⌘D to duplicate the label, move it aside a bit, and change its text to Mix
    Color 2. Now find an `NSColorWell` in the Library, and drag it to the document
    window we’re building. Once it’s in place, duplicate it with ⌘D, and then rearrange
    the labels and color wells to look something like Figure [12-2](#A978-1-4302-4543-8_12_Chapter.html#Fig2).


    ![A978-1-4302-4543-8_12_Fig2_HTML.jpg](A978-1-4302-4543-8_12_Fig2_HTML.jpg)


    Figure 12-2. 


    The bare minimum GUI for selecting two colors


    Now select the color well on the left, open the Bindings Inspector, and configure
    its Value binding to use the colorset controller with the selection controller
    key and the color1 model key path. Select the color well on the right, and configure
    its Value binding to use the colorset controller with the selection controller
    key, this time with the color2 model key path. Save the work, then click the Run
    button. The app launches, and a new, empty “Untitled” document window appears,
    but the color wells are unclickable! In our haste to get something onscreen, we
    neglected to create something pretty important: a model object!


    ### Creating a Default ColorSet


    What we need to do is write some code that will insert a new `ColorSet` object
    into the object controller whenever a new document is created. We’ll do this in
    the `CMDocument` class by adding some facilities there for accessing the object
    controller we added to the nib file and for keeping track of whether the document
    was created from scratch or loaded from a file. Select the CMDocument.m file where
    this new code will be added. For starters, we’re going to add one property, an
    outlet called `objectController` for pointing to the `NSObjectController` that
    we put into our nib file a page or two ago. Instead of adding this to the header
    file, we can use a class extension to declare this property in the .m file. A
    class extension looks just like a category declaration, but with no category name
    in the parentheses. Add this code just before the `@implementation` block:


    `@interface CMDocument ()`


    `@property (weak) IBOutlet NSObjectController *objectController;`


    `@end`


    Anything that we can declare in a class’s `@interface` block—instance variables,
    properties, methods, etc.—can be declared in a class extension instead. The advantage
    of doing so is that it keeps our class’s interface cleaner. We can choose to only
    expose pieces of our class that are really needed by other classes and let the
    rest be a sort of private API that is only usable within the class.


    We’re also going to add an instance variable, a `BOOL` called `isNew` that we’ll
    use to keep track of whether each document has just been created or was loaded
    from a file. Following the information-hiding trail we just followed with the
    class extension, we’re going to reveal another nice trick: instance variables
    can be declared in a class’s `@implementation` block instead of the `@interface`
    in the header file. Do this by adding the bold code shown below:


    `@implementation CMDocument`


    `{`


    `BOOL isNew;`


    `}`


    Now take a glance at the rest of this .m file. This file contains some ready-made
    methods, with comments showing where we can extend their behaviors. We’re going
    to implement a bit of functionality in the `init` and `windowControllerDidLoadNib:`
    methods, as well as implement the `initWithType:error:` method, which we’ll explain
    in a bit. The predefined methods in here all come from `NSDocument`, which handles
    most of the document-related functionality for us. `CMDocument`’s direct superclass,
    however, is `NSPersistentDocument`, which implements additional functionality
    for storing documents as Core Data storage backends. Start off by adding this
    method:


    `- (id)initWithType:(NSString *)typeName error:(NSError **)outError`


    `{`


    `if (self = [super initWithType:typeName error:outError]) {`


    `isNew = YES;`


    `}`


    `return self;`


    `}`


    `- (NSString *)windowNibName`


    `{`


    `return @"CMDocument";`


    `}`


    Then, add the bold lines shown here to the `windowControllerDidLoadNib:` method:


    `- (void)windowControllerDidLoadNib:(NSWindowController *)windowController`


    `{`


    `[super windowControllerDidLoadNib:windowController];`


    `// Add any code here that needs to be executed once the windowController has
    loaded`


    `// the document''s window.`


    `if (isNew) {`


    `id newObj = [_objectController newObject];`


    `[newObj setValue:[NSColor redColor] forKey:@"color1"];`


    `[newObj setValue:[NSColor yellowColor] forKey:@"color2"];`


    `[_objectController addObject:newObj];`


    `}`


    `}`'
  trans: "\n### 定义模型\n\n在开始构建任何类型的图形界面之前，我们先创建用于表示文档的数据模型。这是一个极其简单的模型，包含一个实体和两个属性。我们将在每个文档中只创建该实体的一个实例，但你在本章学到的关于文档的所有知识，同样适用于大型复杂的数据模型。\n\
    \n打开 `CMDocument.xcdatamodeld` 文件。创建一个实体并将其命名为 `ColorSet`。保持新实体的选中状态，创建一个属性，命名为\
    \ `color1`，将其类型设置为 `Transformable`，然后点击关闭可选复选框。接着创建第二个属性，命名为 `color2`，并按第一个属性进行相同配置：类型为\
    \ `Transformable`，且可选选项应关闭。这些属性代表用户将为每个文档选择的两种颜色。它们各自包含一个 `NSColor` 实例，这不是 Core\
    \ Data 支持的标准类型之一，因此如第 8 章所述使用了 `Transformable` 类型。\n\n保存模型，我们的工作就完成了。这是一个极其简单的模型，不是吗？\n\
    \n### 设置两种颜色\n\n现在是时候开始组装图形界面了。请记住，这发生在文档窗口中，因此请切换回 Interface Builder 中的 `CMDocument.xib`\
    \ 文件。默认窗口包含一个 `NSTextField`（内容为\"Your document contents here\"），我们应在继续之前将其删除。接下来，我们将向\
    \ nib 文件添加一个 `NSObjectController`，用于将一些图形界面对象连接到底层文档。请按照以下步骤进行设置。\n\n使用库面板找到 `NSObjectController`，将其拖放到停靠栏中，它将与文件所有者、窗口以及其他顶层对象合并。保持这个新对象（现在标记为\"\
    Object Controller\"）的选中状态，打开属性检查器。检查器最顶部是模式弹出菜单。将其从类模式更改为实体名称模式，然后在下方出现的实体名称字段中输入\"\
    ColorSet\"。\n\n保持新对象控制器的选中状态，切换到绑定检查器。我们需要通过将其 `managedObjectContext` 绑定到一个合适的值来告知此控制器数据来源，因此在参数标题下找到托管对象上下文项。如果此绑定的详细信息不可见，请点击其展开三角形以显示它们。使用绑定到弹出菜单选择文件所有者，然后在模型键路径文本字段中输入\"\
    managedObjectContext\"，按回车键创建绑定。作为此对象控制器的最后优化步骤，在停靠栏中选中它并将其名称更改为\"colorset\"。这不会在应用程序运行时改变任何内容，但能为将来查看此\
    \ nib 文件的程序员（很可能就是你）增加清晰度（现在边做边记录文档，将来你会感谢自己的）。\n\n### 最简单的图形界面\n\n是时候构建一个简单的图形界面了，让我们能够查看\
    \ `ColorSet` 对象的核心细节，即它包含的两种颜色。使用库找到 `UILabel` 对象，将其拖入窗口。选中其文本，将其更改为 `混合颜色 1`。然后按\
    \ `⌘D` 复制标签，将其稍微移开，并将文本更改为 `混合颜色 2`。现在在库中找到 `NSColorWell`，将其拖到我们正在构建的文档窗口中。放置好后，按\
    \ `⌘D` 复制它，然后重新排列标签和颜色选择器，使其看起来类似于图 12-2。\n\n![A978-1-4302-4543-8_12_Fig2_HTML.jpg](img/A978-1-4302-4543-8_12_Fig2_HTML.jpg)\n\
    \n图 12-2 选择两种颜色的最简图形界面\n\n现在选中左侧的颜色选择器，打开绑定检查器，将其值绑定配置为使用 `colorset` 控制器，控制器键为\
    \ `selection`，模型键路径为 `color1`。选中右侧的颜色选择器，将其值绑定配置为使用 `colorset` 控制器，控制器键为 `selection`，这次模型键路径为\
    \ `color2`。保存工作，然后点击运行按钮。应用程序启动，出现一个新的空白\"无标题\"文档窗口，但颜色选择器无法点击！由于急于在屏幕上显示内容，我们忽略了一个非常重要的步骤：创建一个模型对象！\n\
    \n### 创建默认 ColorSet\n\n我们需要编写一些代码，以便在创建新文档时向对象控制器插入一个新的 `ColorSet` 对象。我们将在 `CMDocument`\
    \ 类中通过添加一些功能来实现这一点，这些功能用于访问我们在 nib 文件中添加的对象控制器，并跟踪文档是从头创建还是从文件加载的。选择将添加此新代码的 `CMDocument.m`\
    \ 文件。首先，我们将添加一个属性，一个名为 `objectController` 的插座，用于指向我们刚才添加到 nib 文件中的 `NSObjectController`。与其将其添加到头文件中，我们可以使用类扩展在\
    \ `.m` 文件中声明此属性。类扩展看起来就像类别声明，但括号中没有类别名称。将以下代码添加到 `@implementation` 块之前：\n\n```\n\
    @interface CMDocument ()\n\n@property (weak) IBOutlet NSObjectController *objectController;\n\
    \n@end\n```\n\n任何我们可以在类的 `@interface` 块中声明的内容（实例变量、属性、方法等）都可以在类扩展中声明。这样做的好处是保持类接口的简洁。我们可以选择只公开其他类真正需要的那部分，而将剩余部分作为仅在类内部可用的私有\
    \ API。\n\n我们还将添加一个实例变量，一个名为 `isNew` 的 `BOOL` 类型变量，用于跟踪每个文档是刚创建的还是从文件加载的。沿着刚才使用类扩展时遵循的信息隐藏路径，我们将展示另一个巧妙技巧：实例变量可以在类的\
    \ `@implementation` 块中声明，而不是在头文件的 `@interface` 中。通过添加以下加粗代码来实现：\n\n```\n@implementation\
    \ CMDocument\n{\n    BOOL isNew;\n}\n```\n\n现在快速浏览一下此 `.m` 文件的其余部分。该文件包含一些现成的方法，并附有注释说明我们可以在何处扩展其行为。我们将在\
    \ `init` 和 `windowControllerDidLoadNib:` 方法中实现一些功能，同时实现 `initWithType:error:`\
    \ 方法，稍后将对此进行说明。这里预定义的方法都来自 `NSDocument`，它为我们处理了大部分与文档相关的功能。然而，`CMDocument` 的直接父类是\
    \ `NSPersistentDocument`，它实现了将文档存储为 Core Data 存储后端所需的额外功能。首先添加以下方法：\n\n```\n-\
    \ (id)initWithType:(NSString *)typeName error:(NSError **)outError\n{\n    if\
    \ (self = [super initWithType:typeName error:outError]) {\n        isNew = YES;\n\
    \    }\n    return self;\n}\n\n- (NSString *)windowNibName\n{\n    return @\"\
    CMDocument\";\n}\n```\n\n然后，将以加粗显示的行添加到 `windowControllerDidLoadNib:` 方法中：\n\n\
    ```\n- (void)windowControllerDidLoadNib:(NSWindowController *)windowController\n\
    {\n    [super windowControllerDidLoadNib:windowController];\n    // 在此处添加需要在 windowController\
    \ 加载文档窗口后执行的任何代码。\n\n    if (isNew) {\n        id newObj = [_objectController\
    \ newObject];\n        [newObj setValue:[NSColor redColor] forKey:@\"color1\"\
    ];\n        [newObj setValue:[NSColor yellowColor] forKey:@\"color2\"];\n    \
    \    [_objectController addObject:newObj];\n    }\n}\n```\n"
- fmt: "## 排版后的文本\n\nThe bits of bold code are executed when a new document is being\
    \ created. The first, `initWithType:error:`, is only called when a new document\
    \ is being created from scratch. This is where we’d ideally want to initialize\
    \ our model objects, but all access to the model objects is mediated through the\
    \ `NSObjectController`, which is in the nib file, which at this point hasn’t been\
    \ loaded yet. So we just set the `isNew` flag to `YES`, and move along. A little\
    \ later, `windowControllerDidLoadNib:` is called in `CMDocument` after its nib\
    \ has been loaded. Here we use the `objectController` to create a new model object,\
    \ set values for its two attributes, and add the new object to the controller.\n\
    \nWith that in place, all that’s left to do is to connect `CMDocument`’s `objectController`\
    \ outlet within `CMDocument.xib`. So switch back over there, Ctrl-drag from the\
    \ File’s Owner to the colorset object controller, and select the `objectController`\
    \ outlet. Save the work, then click the Run button. The red and yellow colors\
    \ in the two color wells should be visible, and clicking on one of them should\
    \ bring up the color panel and let us change the color.\n\nNot only that, but\
    \ a full complement of document functionality is now available through the menu.\
    \ We can save our documents, close them, access recent documents, open documents,\
    \ and so on.\n\n## Settling on a File Format\n\nHaving gotten to this point, you’ve\
    \ probably noticed that when you save a document, a pop-up list lets you choose\
    \ to save the file as Binary, SQLite, or XML, and the file extension is set accordingly.\
    \ While this level of flexibility may be of some use during development, for a\
    \ shipping product you should really just pick a format and stick with it to avoid\
    \ confusing your users. In general, SQLite is probably the best choice for most\
    \ applications. You should also change the file extension to something that suggests\
    \ the use of your app, instead of the default extension. All of these options\
    \ are configured in Xcode’s Target settings. Go back to Xcode, select the top-most\
    \ `ColorMix` group in the navigation pane, click the `ColorMix` target, and click\
    \ the Info tab at the top of the view to see the target settings. Expand the Document\
    \ Types group, and there will be a view containing all three pre-configured file\
    \ formats. Delete the Binary and XML options (by using the “x” button at the upper\
    \ right-hand corner of each of those sections), leaving only the SQLite option.\
    \ Give this remaining format a decent filename extension by editing the value\
    \ shown in the Extensions column, changing it to `ColorMix`. Now save the work,\
    \ Build & Run, and save a color set, verifying that we now have no choice about\
    \ what kind of file format to save it as.\n\n## Adding Color\n\nNow the document\
    \ stuff is all working as it should, but we’ve got a really boring application\
    \ that doesn’t do anything interesting at all. Let’s make our app do what we promised\
    \ in the beginning of this chapter: display a bunch of colors made by blending\
    \ the two chosen colors using all of Core Graphics’ predefined blending modes.\n\
    \nTo do this, we’re going to create a new class called `CMColorBlendView`, which\
    \ will be a direct subclass of `NSView`. One of the primary things you typically\
    \ do in an `NSView` subclass is override the `drawRect:` mode to specify exactly\
    \ what should be drawn. We’re going to do just that and fill each view with a\
    \ blended color. In order to do the blending, each instance of `CMColorBlendView`\
    \ needs to know which blending mode to use and which two colors to blend. We’ll\
    \ set up the blending mode for each `CMColorBlendView` by hand, but the values\
    \ for the two colors will be populated using Cocoa Bindings, so that as soon as\
    \ the user changes one of the chosen colors, all of the `CMColorBlendView` objects\
    \ in our window will be instantly redrawn.\n\n### The CMColorBlendView Class\n\
    \nStart by creating a new class in our project. In the New File assistant, choose\
    \ Objective-C class from the OS X - Cocoa section, then click Next. Name our new\
    \ class `CMColorBlendView.m`, and make it a subclass of `NSView`.\n\nNow edit\
    \ `CMColorBlendView.h`, adding the bold lines shown in the following:\n\n```\n\
    #import <Cocoa/Cocoa.h>\n\n@interface CMColorBlendView : NSView\n\n@property (strong,\
    \ nonatomic) NSColor *color1;\n@property (strong, nonatomic) NSColor *color2;\n\
    @property (assign, nonatomic) CGBlendMode blendMode;\n\n@end\n```\n\nThis gives\
    \ our class two `NSColor` objects, which will be populated by Cocoa Bindings,\
    \ and a `CGBlendMode`, which will be set by the `MyController` class when it’s\
    \ loading a nib file. We used the `nonatomic` keyword for all of these properties,\
    \ which is a way of declaring that the getters and setters for these properties\
    \ won’t take extra precautions to be thread-safe. Since we know that our code\
    \ in this simple app is all being used solely on the main thread, using `nonatomic`\
    \ is safe enough and gives slightly better performance.\n\nNow switch over to\
    \ `CMColorBlendView.m`, where the first thing we’ll do is define the methods for\
    \ the properties we’ve declared. Most of the properties we’ve declared previously\
    \ in this book have their methods created by an explicit `@synthesize` line, but\
    \ here we have a bit of a special case because we want our view to redraw itself\
    \ each time any of the property values changes. So we’ll provide explicit setter\
    \ methods for each of our properties. Explicit methods, if present, always take\
    \ the place of any synthesized methods. And actually, this brings us to one more\
    \ reason we used `nonatomic` in our property declarations: without it, the compiler\
    \ doesn’t really like letting us mix a synthesized getter with an explicit setter\
    \ and so would generate a warning.\n\nWhile we’re doing all this new stuff anyway,\
    \ we’re going to introduce a pretty new piece of functionality in the LLVM compiler.\
    \ Any time we declare a property in the interface, we can actually leave out the\
    \ `@synthesize` row entirely! If we do so, the compiler will still create an instance\
    \ variable for us, whose name will be the name of the property prefixed by an\
    \ underscore. We can see this in the following code, which should be added to\
    \ our class’s `@implementation` section:\n\n```\n// put these at the beginning\
    \ of the @implementation block\n\n- (void)setBlendMode:(CGBlendMode)bm\n{\n  \
    \  if (_blendMode != bm) {\n        _blendMode = bm;\n        [self setNeedsDisplay:YES];\n\
    \    }\n}\n\n- (void)setColor1:(NSColor *)c\n{\n    if (![c isEqual:_color1])\
    \ {\n        _color1 = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n\n-\
    \ (void)setColor2:(NSColor *)c\n{\n    if (![c isEqual:_color2]) {\n        _color2\
    \ = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n```\n\nOne thing to note\
    \ is the `[self setNeedsDisplay:YES]` call. We’ll get into this more in later\
    \ chapters covering drawing in Cocoa, but the basic idea is that when we want\
    \ to draw some content in an `NSView`, we call this method, which sets a flag,\
    \ and when our application is done processing whatever event it’s currently handling,\
