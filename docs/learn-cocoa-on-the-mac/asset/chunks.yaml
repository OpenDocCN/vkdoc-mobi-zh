    ## Grouping Animations


    We’ve now gotten a taste of how Core Animation works, but in the somewhat silly
    context of randomly moving a button around the screen. Not really a GUI design
    that we’d recommend! In the real world, Core Animation is most often used to animate
    transitions between different views. Chances are you’ve seen this used again and
    again on the iPhone (the platform that Core Animation was really built for, before
    being “backported” to Mac OS X). All the smooth slides, scales, and fades that
    occur throughout the iPhone interface are implemented with Core Animation. In
    Mac OS X, Core Animation isn’t quite so omnipresent, but it’s put to good use
    in places like Calendar’s week transitions and the transitions between screens
    in Mission Control. In this section, we’ll see how to implement some nice transitions
    by grouping animations together so that they run simultaneously.


    In Xcode, create a new Cocoa project called FlipIt, with FI as the class prefix.
    What we’re going to do is present a GUI where the user can flip between several
    “pages,” and Core Animation will animate nicely between them. We’ll use a box
    in the nib’s empty window to show the content pages, which themselves will be
