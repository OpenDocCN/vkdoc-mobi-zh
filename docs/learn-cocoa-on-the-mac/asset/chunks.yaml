- fmt: "### Creating Predicates\n\nThe simplest way to create an `NSPredicate` is\
    \ by using a format string containing attribute names, comparators, and values\
    \ to compare against. The definition of a predicate looks a lot like a `WHERE`\
    \ clause in SQL and serves much the same purpose. Predicates are not limited to\
    \ just Core Data usage and can be applied to other areas of Mac OS X such as Spotlight.\
    \ In its most basic form, we can define an `NSPredicate` like this:\n\n```\nNSPredicate\
    \ *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd] 'missed')\
    \ OR \"\n     \"(character CONTAINS[cd] 'kramer') OR \"\n     \"(show.name CONTAINS[cd]\
    \ 'trek')\"];\n```\n\n> **Note:** In C, if you have multiple inline string constants\
    \ in your code separated only by whitespace (including carriage returns) they\
    \ will all be concatenated together into a single character array, which can help\
    \ format long strings in your code. This trick works equally well for inline `NSString`\
    \ constants—just put a single `@` symbol before the first string, as shown previously.\n\
    \nIn this example, we actually have three conditions, joined together by `OR`s\
    \ and wrapped in parentheses just like we might do in application code. Each of\
    \ these conditions uses the `CONTAINS` comparator (which does exactly what you\
    \ might guess), with some options specified inside square brackets. The `c` makes\
    \ the comparison case-insensitive, while the `d` makes the comparison diacritic-insensitive.\
    \ An equality comparison specifying both, for example, will consider `\"ramon\"\
    ` and `\"Ramón\"` to be equal.\n\n`CONTAINS` is just one of several comparators\
    \ available within the predicate. All attributes can use the `=`, `<`, `>`, `>=`,\
    \ `<=`, `!=`, and `BETWEEN` comparators. (Note that `==`, `=>`, `=<`, and `<>`\
    \ are equivalent to `=`, `>=`, `<=`, and `!=`, respectively.) String attributes\
    \ can use the `BEGINSWITH`, `CONTAINS`, `ENDSWITH`, `LIKE`, and `MATCHES` comparators.\n\
    \n> **Note:** These should mostly be self-explanatory, with a couple of notable\
    \ exceptions: `BETWEEN` lets us specify a pair of lower and upper bounds, so the\
    \ value to the right of it should be substituted in with a two-item `NSArray`;\
    \ `LIKE` lets us do wildcard matching; and `MATCHES` lets us use regular expressions\
    \ to do advanced comparisons. However, `MATCHES` doesn’t work with an SQLite backend,\
    \ so it’s not much use when fetching values from a Core Data store.\n\nThe hard-coded\
    \ option is fine if we really need a fixed query for some special purpose in our\
    \ application, but sometimes we’ll want to create a query based on user input\
    \ or other current data. Fortunately, the `NSPredicate` class provides an easy\
    \ way to interpolate values using the same `predicateWithFormat:` method we just\
    \ saw. For example:\n\n```\n// Assume these variables exist and point at valid\
    \ objects\nNSString *quoteInput;\nNSString *characterInput;\nNSString *showNameInput;\n\
    \nNSPredicate *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd]\
    \ %@) OR \"\n     \"(character CONTAINS[cd] %@) OR \"\n     \"(show.name CONTAINS[cd]\
    \ %@)\",\n    quoteInput, characterInput, showNameInput];\n```\n\nWhen that code\
    \ runs, the values of the three variables will be put into the resulting predicate.\
    \ Note that the `%@` markers in the format string are not surrounded by single-quotes,\
    \ as the bare values were in the previous example.\n\n### Specifying an NSAppController’s\
    \ Predicate in Xcode\n\nLet’s try one of the most basic ways to put a predicate\
    \ to use: attaching it directly to a controller in Xcode. Go back to the `MainMenu.xib`\
    \ file in Xcode, select the `FoundQuotes` controller in the main nib window, and\
    \ bring up the Attributes Inspector. At the bottom is a text view labeled **Fetch\
    \ Predicate**, where we can simply add some text to define a predicate. Try entering\
    \ this:\n\n```\nshow.name CONTAINS[cd] 'trek'\n```\n\nThen save the changes, switch\
    \ back to Xcode, and click **Run**. Now the search window won’t necessarily show\
    \ all the quotes you’ve entered. If you’ve entered some Star Trek quotes, it will\
    \ show only those, but if you haven’t entered any Star Trek quotes, you’ll now\
    \ see nothing in the search window. Of course, it’s possible you’ve only entered\
    \ Star Trek quotes, in which case this view will be just the same as it was before.\
    \ In that case, enter some quotes from another show to verify that the predicate\
    \ is filtering them out (and also because, really, there’s more to television\
    \ than just Star Trek).\n\n### User-Defined Predicates\n\nThe nib-defined predicate\
    \ is fine for special uses, where some part of the GUI should always show a particular\
    \ subset of the data, but what we’re after is the ability to let the user define\
    \ the search parameters themselves. Ideally, they should be able to choose multiple\
    \ parameters to search on, edit the values to compare against, and even change\
    \ the comparator itself (instead of just using `CONTAINS` all the time). Fortunately,\
    \ Cocoa provides a GUI control called `NSPredicateEditor` that does just that!\n\
    \nAs we hinted at earlier, with `NSPredicateEditor`, we can make a GUI that works\
    \ a lot like the Smart Playlist feature in iTunes or the Smart Mailbox feature\
    \ in Mail. Users can add and remove search criteria, and the results will update\
    \ on the fly. See Figure 10-6.\n\n![A978-1-4302-4543-8_10_Fig6_HTML.jpg](A978-1-4302-4543-8_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6.** QuoteMonger’s predicate editor in action\n\nBoth `NSPredicateEditor`\
    \ and `NSArrayController` can set and retrieve the value of their `NSPredicate`\
    \ via a binding, so what we’ll do is add an `NSPredicate` as a property of the\
    \ app delegate and make the appropriate bindings. Then, when the user makes any\
    \ changes in the predicate editor, the updated predicate will automatically be\
    \ passed along to the array controller."
  raw: '### Creating Predicates


    The simplest way to create an `NSPredicate` is by using a format string containing
    attribute names, comparators, and values to compare against. The definition of
    a predicate looks a lot like a `WHERE` clause in SQL and serves much the same
    purpose. Predicates are not limited to just Core Data usage and can be applied
    to other areas of Mac OS X such as Spotlight. In its most basic form, we can define
    an `NSPredicate` like this:


    `NSPredicate *p = [NSPredicate predicateWithFormat:`


        `@"(quoteText CONTAINS[cd] ''missed'') OR "`


         `"(character CONTAINS[cd] ''kramer'') OR "`


         `"(show.name CONTAINS[cd] ''trek'')"];`


    Note


    In C, if you have multiple inline string constants in your code separated only
    by whitespace (including carriage returns) they will all be concatenated together
    into a single character array, which can help format long strings in your code.
    This trick works equally well for inline `NSString` constants—just put a single
    @ symbol before the first string, as shown previously.


    In this example, we actually have three conditions, joined together by `OR`s and
    wrapped in parentheses just like we might do in application code. Each of these
    conditions uses the `CONTAINS` comparator (which does exactly what you might guess),
    with some options specified inside square brackets. The `c` makes the comparison
    case-insensitive, while the `d` makes the comparison diacritic-insensitive. An
    equality comparison specifying both, for example, will consider “ramon” and “Ramón”
    to be equal.


    `CONTAINS` is just one of several comparators available within the predicate.
    All attributes can use the `=`, `<`, `>`, `>=`, `<=`, `!=`, and `BETWEEN` comparators.
    (Note that `==`, `=>`, `=<`, and `<>` are equivalent to `=`, `>=`, `<=`, and `!=`,
    respectively.) String attributes can use the `BEGINSWITH`, `CONTAINS`, `ENDSWITH`,
    `LIKE`, and `MATCHES` comparators.


    Note


    These should mostly be self-explanatory, with a couple of notable exceptions:
    `BETWEEN` lets us specify a pair of lower and upper bounds, so the value to the
    right of it should be substituted in with a two-item `NSArray`; `LIKE` lets us
    do wildcard matching; and `MATCHES` lets us use regular expressions to do advanced
    comparisons. However, `MATCHES` doesn’t work with an SQLite backend, so it’s not
    much use when fetching values from a Core Data store.


    The hard-coded option is fine if we really need a fixed query for some special
    purpose in our application, but sometimes we’ll want to create a query based on
    user input or other current data. Fortunately, the `NSPredicate` class provides
    an easy way to interpolate values using the same `predicateWithFormat:` method
    we just saw. For example,


    `// Assume these variables exist and point at valid objects`


    `NSString *quoteInput;`


    `NSString *characterInput;`


    `NSString *showNameInput;`


    `NSPredicate *p = [NSPredicate predicateWithFormat:`


        `@"(quoteText CONTAINS[cd] %@) OR "`


         `"(character CONTAINS[cd] %@) OR "`


         `"(show.name CONTAINS[cd] %@)"`,


        `quoteInput, characterInput, showNameInput];`


    When that code runs, the values of the three variables will be put into the resulting
    predicate. Note that the `%@` markers in the format string are not surrounded
    by single-quotes, as the bare values were in the previous example.


    ### Specifying an NSAppController’s Predicate in Xcode


    Let’s try one of the most basic ways to put a predicate to use: attaching it directly
    to a controller in Xcode. Go back to the `MainMenu.xib` file in Xcode, select
    the FoundQuotes controller in the main nib window, and bring up the Attributes
    Inspector. At the bottom is a text view labeled Fetch Predicate, where we can
    simply add some text to define a predicate. Try entering this:


    `show.name CONTAINS[cd] ''trek''`


    Then save the changes, switch back to Xcode, and click Run. Now the search window
    won’t necessarily show all the quotes you’ve entered. If you’ve entered some Star
    Trek quotes, it will show only those, but if you haven’t entered any Star Trek
    quotes, you’ll now see nothing in the search window. Of course, it’s possible
    you’ve only entered Star Trek quotes, in which case this view will be just the
    same as it was before. In that case, enter some quotes from another show to verify
    that the predicate is filtering them out (and also because, really, there’s more
    to television than just Star Trek).


    ### User-Defined Predicates


    The nib-defined predicate is fine for special uses, where some part of the GUI
    should always show a particular subset of the data, but what we’re after is the
    ability to let the user define the search parameters themselves. Ideally, they
    should be able to choose multiple parameters to search on, edit the values to
    compare against, and even change the comparator itself (instead of just using
    `CONTAINS` all the time). Fortunately, Cocoa provides a GUI control called `NSPredicateEditor`
    that does just that!


    As we hinted at earlier, with `NSPredicateEditor`, we can make a GUI that works
    a lot like the Smart Playlist feature in iTunes or the Smart Mailbox feature in
    Mail. Users can add and remove search criteria, and the results will update on
    the fly. See Figure [10-6](#A978-1-4302-4543-8_10_Chapter.html#Fig6).


    ![A978-1-4302-4543-8_10_Fig6_HTML.jpg](A978-1-4302-4543-8_10_Fig6_HTML.jpg)


    Figure 10-6.


    QuoteMonger’s predicate editor in action


    Both `NSPredicateEditor` and `NSArrayController` can set and retrieve the value
    of their `NSPredicate` via a binding, so what we’ll do is add an `NSPredicate`
    as a property of the app delegate and make the appropriate bindings. Then, when
    the user makes any changes in the predicate editor, the updated predicate will
    automatically be passed along to the array controller.'
  trans: "\n### 创建谓词\n\n创建 `NSPredicate` 最简单的方法是使用包含属性名称、比较运算符和待比较值的格式字符串。谓词的定义看起来很像\
    \ SQL 中的 `WHERE` 子句，其用途也大致相同。谓词不仅限于 Core Data 使用，还可应用于 Mac OS X 的其他领域，例如 Spotlight。在其最基本的形式中，我们可以像这样定义一个\
    \ `NSPredicate`：\n\n```\nNSPredicate *p = [NSPredicate predicateWithFormat:\n\
    \    @\"(quoteText CONTAINS[cd] 'missed') OR \"\n     \"(character CONTAINS[cd]\
    \ 'kramer') OR \"\n     \"(show.name CONTAINS[cd] 'trek')\"];\n```\n\n> **注意：**\
    \ 在 C 语言中，如果代码中有多个仅由空白字符（包括回车符）分隔的内联字符串常量，它们会被拼接成单个字符数组，这有助于格式化代码中的长字符串。这个技巧同样适用于内联的\
    \ `NSString` 常量——只需在第一个字符串前放一个 `@` 符号，如上所示。\n\n在这个例子中，我们实际上有三个条件，通过 `OR` 连接并用括号包裹，就像我们在应用代码中可能做的那样。每个条件都使用了\
    \ `CONTAINS` 比较运算符（其作用正如你所猜测的那样），并在方括号内指定了一些选项。`c` 使比较不区分大小写，而 `d` 使比较不区分变音符号。例如，同时指定这两者的相等性比较会将\
    \ `\"ramon\"` 和 `\"Ramón\"` 视为相等。\n\n`CONTAINS` 只是谓词中可用的几个比较运算符之一。所有属性都可以使用 `=`、`<`、`>`、`>=`、`<=`、`!=`\
    \ 和 `BETWEEN` 比较运算符。（注意 `==`、`=>`、`=<` 和 `<>` 分别等价于 `=`、`>=`、`<=` 和 `!=`。）字符串属性可以使用\
    \ `BEGINSWITH`、`CONTAINS`、`ENDSWITH`、`LIKE` 和 `MATCHES` 比较运算符。\n\n> **注意：** 这些大多应该不言自明，但有几点值得注意：`BETWEEN`\
    \ 允许我们指定一对上下界，因此其右侧的值应该用一个包含两个元素的 `NSArray` 来替代；`LIKE` 允许我们进行通配符匹配；`MATCHES` 允许我们使用正则表达式进行高级比较。然而，`MATCHES`\
    \ 无法与 SQLite 后端配合使用，因此从 Core Data 存储中获取值时作用不大。\n\n如果我们的应用确实需要一个用于特殊目的的固定查询，硬编码选项是可以的，但有时我们想根据用户输入或其他当前数据来创建查询。幸运的是，`NSPredicate`\
    \ 类提供了一种简单的方法，使用我们刚才看到的同一个 `predicateWithFormat:` 方法来插入值。例如：\n\n```\n// 假设这些变量存在并指向有效对象\n\
    NSString *quoteInput;\nNSString *characterInput;\nNSString *showNameInput;\n\n\
    NSPredicate *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd]\
    \ %@) OR \"\n     \"(character CONTAINS[cd] %@) OR \"\n     \"(show.name CONTAINS[cd]\
    \ %@)\",\n    quoteInput, characterInput, showNameInput];\n```\n\n当这段代码运行时，三个变量的值将被放入生成的谓词中。请注意，格式字符串中的\
    \ `%@` 标记没有被单引号包围，而在前面的例子中，裸值是被单引号包围的。\n\n### 在 Xcode 中指定 NSAppController 的谓词\n\
    \n让我们尝试一种最基础的谓词使用方法：直接在 Xcode 中将其附加到控制器上。回到 Xcode 中的 `MainMenu.xib` 文件，在主 nib\
    \ 窗口中选择 `FoundQuotes` 控制器，然后打开属性检查器。底部有一个标有 **Fetch Predicate** 的文本视图，我们可以在此添加一些文本来定义一个谓词。尝试输入以下内容：\n\
    \n```\nshow.name CONTAINS[cd] 'trek'\n```\n\n然后保存更改，切换回 Xcode，点击 **Run**。现在搜索窗口不一定显示你输入的所有引语。如果你输入了一些《星际迷航》的引语，它将只显示这些；如果你没有输入任何《星际迷航》的引语，那么搜索窗口中将什么也看不到。当然，也有可能你只输入了《星际迷航》的引语，在这种情况下，这个视图将与之前完全相同。如果是这样，请输入来自其他剧集的一些引语，以验证谓词正在过滤掉它们（同时也是因为，说实话，电视节目远不止《星际迷航》这一部）。\n\
    \n### 用户自定义谓词\n\n在 nib 中定义的谓词适用于特殊用途，即 GUI 的某些部分应始终显示数据的特定子集，但我们的目标是让用户自己定义搜索参数。理想情况下，用户应该能够选择多个搜索参数、编辑要比较的值，甚至更改比较运算符本身（而不只是始终使用\
    \ `CONTAINS`）。幸运的是，Cocoa 提供了一个名为 `NSPredicateEditor` 的 GUI 控件，正好可以实现这一点！\n\n正如我们之前提到的，使用\
    \ `NSPredicateEditor`，我们可以制作一个类似于 iTunes 中的智能播放列表或 Mail 中的智能邮箱功能的 GUI。用户可以添加和删除搜索条件，结果会实时更新。见图\
    \ 10-6。\n\n![A978-1-4302-4543-8_10_Fig6_HTML.jpg](img/A978-1-4302-4543-8_10_Fig6_HTML.jpg)\n\
    \n**图 10-6.** QuoteMonger 的谓词编辑器实际效果\n\n`NSPredicateEditor` 和 `NSArrayController`\
    \ 都可以通过绑定来设置和获取其 `NSPredicate` 属性的值，因此我们要做的是将一个 `NSPredicate` 作为应用代理的一个属性，并建立适当的绑定。然后，当用户在谓词编辑器中做出任何更改时，更新后的谓词将自动传递给数组控制器。\n"
- fmt: "# Adding a Predicate to the App Delegate\n\nStart by adding a new property\
    \ to the app delegate. Open the `QMAppDelegate.h` file, which looks just like\
    \ the default app delegate header that was generated for MythBase. Add a new property\
    \ called `searchPredicate`. The interface declaration should now look something\
    \ like this (new lines are in bold):\n\n```\n@interface QMAppDelegate : NSObject\
    \ <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n@property\
    \ (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (strong) NSPredicate *searchPredicate;\n\n- (IBAction)saveAction:(id)sender;\n\
    \n@end\n```\n\nNow switch over to `QMAppDelegate.m` and add the following code\
    \ near the top, just after the `@synthesize` directives generated by Xcode. The\
    \ new lines are in bold.\n\n```\n@implementation QMAppDelegate\n\n@synthesize\
    \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
    \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
    \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'space') OR \" \\\n   \
    \                       \"(character CONTAINS[cd] 'Knight')\"\n\n- (id)init\n\
    {\n    if ((self = [super init])) {\n        self.searchPredicate = [NSPredicate\
    \ predicateWithFormat:DEFAULT_PREDICATE];\n    }\n    return self;\n}\n```\n\n\
    The `init` method simply creates a default value for the `searchPredicate` property.\
    \ Now let’s hook up our controller to use this new predicate. Go back to the Interface\
    \ Builder canvas, select the FoundQuotes controller, and bring up the Attributes\
    \ Inspector. Select all the text in the Fetch Predicate text view and delete it,\
    \ then switch to the Bindings Inspector. In the Controller Content Parameters\
    \ section, open the Filter Predicate binding info. Select App Delegate in the\
    \ pop-up, type `searchPredicate` into the Model Key Path combo box, and press\
    \ Return to turn on the binding.\n\nSave the work, go back to Xcode, and click\
    \ Run. You should now see a different set of results: quotes spoken by a character\
    \ named `Knight` or containing the word `space`. If nothing is matching, add a\
    \ quote with one of these characteristics in order to test out the search window.\n\
    \n# Add a Predicate Editor to the Search Window\n\nWe now have the FoundQuotes\
    \ controller fetching values based on the contents of a predicate that is `owned`\
    \ by the app delegate. The next step is to add an `NSPredicateEditor` to the search\
    \ window and configure it to let the user edit the predicate.\n\nIn Xcode, bring\
    \ up the Quote Finder window. Make the whole window a bit taller, and drag the\
    \ existing table view and text view down to the bottom. Then find an `NSPredicateEditor`\
    \ in the Object Library, drag it into the empty space at the top of the window,\
    \ and resize it to make it fill the available space. Figure [10-7](#A978-1-4302-4543-8_10_Chapter.html#Fig7)\
    \ shows the idea.\n\n![A978-1-4302-4543-8_10_Fig7_HTML.jpg](A978-1-4302-4543-8_10_Fig7_HTML.jpg)\n\
    \n**Figure 10-7.** The predicate editor is in place in our Search window\n\n#\
    \ Configuring the Predicate Editor\n\nNow it’s time to bind the editor to the\
    \ app delegate’s predicate instance. Select the `NSPredicateEditor` (don’t forget\
    \ the extra click to select the editor itself, not the scroll view that contains\
    \ it), open the Bindings Inspector, and then examine the Value binding info. Select\
    \ App Delegate in the pop-up, then type `searchPredicate` in the Model Key Path\
    \ combo box, and press Return to activate this binding.\n\nAt this point, there’s\
    \ only one more thing we need to do in order to enable searching with this predicate\
    \ editor: we have to tailor it to the attributes we want to search on. `NSPredicateEditor`\
    \ is a quite complex control, and fortunately most of its interesting features\
    \ can be configured directly in Xcode. The predicate editor displays one or more\
    \ `NSPredicateEditorRowTemplate` objects, which can each be configured to do searching\
    \ in a variety of ways. We can make row templates that allow us to specify numbers\
    \ or dates to compare against object values, or to pick from a list of predefined\
    \ strings. In our case, we’re going to configure a row template that lets the\
    \ user type a string in a text field to search by character names, show names,\
    \ and quote contents. This row template can be reused, allowing the user to specify\
    \ multiple search criteria simultaneously. In addition, another row template will\
    \ let the user choose whether the search criteria must all be met (Boolean `AND`)\
    \ or whether it’s enough that any match succeeds (Boolean `OR`) for a quote to\
    \ appear in the results.\n\nIn the Interface Builder canvas, drill down into the\
    \ predicate editor by clicking on the lower of the two visible rows (the one containing\
    \ pop-up buttons showing name and contains). With that row template selected,\
    \ bring up the Attributes Inspector. Note the checkboxes that let us choose which\
    \ comparators we’ll allow the user to use, plus the pop-up buttons that let us\
    \ choose the nature of the expressions used on either side of the comparator (key\
    \ paths, strings, constant values, and the like). The default setup, with key\
    \ paths on the left and strings on the right, is perfect for our purposes, but\
    \ we do need to adjust the key paths for our searching needs.\n\nEdit the three\
    \ default values that are listed below Left Exprs key paths, changing them to\
    \ `quoteText`, `character`, and `show.name`. Next, click to turn on the Case Insensitive\
    \ and Diacritical Mark Insensitive checkboxes (see Figure [10-8](#A978-1-4302-4543-8_10_Chapter.html#Fig8)).\n\
    \n![A978-1-4302-4543-8_10_Fig8_HTML.jpg](A978-1-4302-4543-8_10_Fig8_HTML.jpg)\n\
    \n**Figure 10-8.** Configuring an `NSPredicateEditorRowTemplate`\n\nThen, examine\
    \ the pop-up button in the row template itself. This will show three entries with\
    \ names the same as what we just entered for key paths. Change these to more human-readable\
    \ names: *Quotation*, *Character Name*, and *Show Name*.\n\nNow click the upper\
    \ row template, the one showing *Any of the following are true.* The configuration\
    \ for this is very simple. Checkboxes let us choose to allow Boolean `AND`, `OR`,\
    \ and `NOT` for the user to search on. Enable all of those to allow the most utility.\n\
    \nNow there’s just one more piece of configuration that we need to do. By default,\
    \ `NSPredicateEditor` lets the user delete all the rows, right down to the last\
    \ one, at which point there is no longer a + button to add any back in. Change\
    \ this by selecting the predicate editor itself (not one of the row templates)\
    \ and clicking to turn off the Can Remove All Rows checkbox in the Attributes\
    \ Inspector.\n\nSave the work, hit Run in Xcode, and bask in the glory of QuoteMonger!\
    \ We can now easily search through all saved quotes, using the three criteria\
    \ we configured in the predicate editor."
  raw: '#### Adding a Predicate to the App Delegate


    Start by adding a new property to the app delegate. Open the `QMAppDelegate.h`
    file, which looks just like the default app delegate header that was generated
    for MythBase. Add a new property called `searchPredicate`. The interface declaration
    should now look something like this (new lines are in bold):


    `@interface QMAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;`


    `@property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;`


    `@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;`


    `@property (strong) NSPredicate *searchPredicate;`


    `- (IBAction)saveAction:(id)sender;`


    `@end`


    Now switch over to `QMAppDelegate.m` and add the following code near the top,
    just after the `@synthesize` directives generated by Xcode. The new lines are
    in bold.


    `@implementation QMAppDelegate`


    `@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;`


    `@synthesize managedObjectModel = _managedObjectModel;`


    `@synthesize managedObjectContext = _managedObjectContext;`


    `#define DEFAULT_PREDICATE @"(quoteText CONTAINS[cd] ''space'') OR " \`


                               `"(character CONTAINS[cd] ''Knight'')"`


    `- (id)init`


    `{`


        `if ((self = [super init])) {`


            `self.searchPredicate = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];`


        `}`


        `return self;`


    `}`


    The `init` method simply creates a default value for the `searchPredicate` property.
    Now let’s hook up our controller to use this new predicate. Go back to the Interface
    Builder canvas, select the FoundQuotes controller, and bring up the Attributes
    Inspector. Select all the text in the Fetch Predicate text view and delete it,
    then switch to the Bindings Inspector. In the Controller Content Parameters section,
    open the Filter Predicate binding info. Select App Delegate in the pop-up, type
    “searchPredicate” into the Model Key Path combo box, and press Return to turn
    on the binding.


    Save the work, go back to Xcode, and click Run. You should now see a different
    set of results: quotes spoken by a character named “Knight” or containing the
    word “space.” If nothing is matching, add a quote with one of these characteristics
    in order to test out the search window.


    #### Add a Predicate Editor to the Search Window


    We now have the FoundQuotes controller fetching values based on the contents of
    a predicate that is “owned” by the app delegate. The next step is to add an `NSPredicateEditor`
    to the search window and configure it to let the user edit the predicate.


    In Xcode, bring up the Quote Finder window. Make the whole window a bit taller,
    and drag the existing table view and text view down to the bottom. Then find an
    NSPredicateEditor in the Object Library, drag it into the empty space at the top
    of the window, and resize it to make it fill the available space. Figure [10-7](#A978-1-4302-4543-8_10_Chapter.html#Fig7)
    shows the idea.


    ![A978-1-4302-4543-8_10_Fig7_HTML.jpg](A978-1-4302-4543-8_10_Fig7_HTML.jpg)


    Figure 10-7.


    The predicate editor is in place in our Search window


    #### Configuring the Predicate Editor


    Now it’s time to bind the editor to the app delegate’s predicate instance. Select
    the `NSPredicateEditor` (don’t forget the extra click to select the editor itself,
    not the scroll view that contains it), open the Bindings Inspector, and then examine
    the Value binding info. Select App Delegate in the pop-up, then type in “searchPredicate”
    in the Model Key Path combo box, and press Return to activate this binding.


    At this point, there’s only one more thing we need to do in order to enable searching
    with this predicate editor: we have to tailor it to the attributes we want to
    search on. `NSPredicateEditor` is a quite complex control, and fortunately most
    of its interesting features can be configured directly in Xcode. The predicate
    editor displays one or more `NSPredicateEditorRowTemplate` objects, which can
    each be configured to do searching in a variety of ways. We can make row templates
    that allow us to specify numbers or dates to compare against object values, or
    to pick from a list of predefined strings. In our case, we’re going to configure
    a row template that lets the user type a string in a text field to search by character
    names, show names, and quote contents. This row template can be reused, allowing
    the user to specify multiple search criteria simultaneously. In addition, another
    row template will let the user choose whether the search criteria must all be
    met (Boolean `AND`) or whether it’s enough that any match succeeds (Boolean `OR`)
    for a quote to appear in the results.


    In the Interface Builder canvas, drill down into the predicate editor by clicking
    on the lower of the two visible rows (the one containing pop-up buttons showing
    name and contains). With that row template selected, bring up the Attributes Inspector.
    Note the checkboxes that let us choose which comparators we’ll allow the user
    to use, plus the pop-up buttons that let us choose the nature of the expressions
    used on either side of the comparator (key paths, strings, constant values, and
    the like). The default setup, with key paths on the left and strings on the right,
    is perfect for our purposes, but we do need to adjust the key paths for our searching
    needs.


    Edit the three default values that are listed below Left Exprs key paths, changing
    them to `quoteText`, `character`, and `show.name`. Next, click to turn on the
    Case Insensitive and Diacritical Mark Insensitive checkboxes (see Figure [10-8](#A978-1-4302-4543-8_10_Chapter.html#Fig8)).


    ![A978-1-4302-4543-8_10_Fig8_HTML.jpg](A978-1-4302-4543-8_10_Fig8_HTML.jpg)


    Figure 10-8.


    Configuring an NSPredicateEditorRowTemplate


    Then, examine the pop-up button in the row template itself. This will show three
    entries with names the same as what we just entered for key paths. Change these
    to more human-readable names: “Quotation,” “Character Name,” and “Show Name.”


    Now click the upper row template, the one showing “Any of the following are true.”
    The configuration for this is very simple. Checkboxes let us choose to allow Boolean
    `AND`, `OR`, and `NOT` for the user to search on. Enable all of those to allow
    the most utility.


    Now there’s just one more piece of configuration that we need to do. By default,
    `NSPredicateEditor` lets the user delete all the rows, right down to the last
    one, at which point there is no longer a + button to add any back in. Change this
    by selecting the predicate editor itself (not one of the row templates) and clicking
    to turn off the Can Remove All Rows checkbox in the Attributes Inspector.


    Save the work, hit Run in Xcode, and bask in the glory of QuoteMonger! We can
    now easily search through all saved quotes, using the three criteria we configured
    in the predicate editor.'
  trans: "\n# 在应用委托中添加谓词\n\n首先，在应用委托中添加一个新属性。打开 `QMAppDelegate.h` 文件，该文件看起来与为 MythBase\
    \ 生成的默认应用委托头文件一致。添加一个新属性，名为 `searchPredicate`。现在的接口声明应如下所示（新代码行以粗体显示）：\n\n```\n\
    @interface QMAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n@property (strong) NSPredicate *searchPredicate;\n\n\
    - (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n现在切换到 `QMAppDelegate.m` 文件，并在靠近顶部的位置，紧跟在\
    \ Xcode 生成的 `@synthesize` 指令之后，添加以下代码。新代码行以粗体显示。\n\n```\n@implementation QMAppDelegate\n\
    \n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize\
    \ managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd]\
    \ 'space') OR \" \\\n                          \"(character CONTAINS[cd] 'Knight')\"\
    \n\n- (id)init\n{\n    if ((self = [super init])) {\n        self.searchPredicate\
    \ = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];\n    }\n    return self;\n\
    }\n```\n\n`init` 方法仅为 `searchPredicate` 属性创建了一个默认值。现在，让我们将控制器与这个新谓词关联起来。回到 Interface\
    \ Builder 画布，选中 FoundQuotes 控制器，并打开属性检查器。选中“获取谓词”文本视图中的所有文本并删除，然后切换到绑定检查器。在“控制器内容参数”部分，展开“过滤谓词”绑定信息。在弹出的菜单中选择“应用委托”，在“模型键路径”组合框中输入\
    \ `searchPredicate`，然后按 Return 键启用绑定。\n\n保存工作，回到 Xcode，然后点击“运行”。现在你应该会看到一组不同的结果：由名为\
    \ `Knight` 的角色所说或包含单词 `space` 的引用。如果没有匹配的结果，请添加一条包含这些特征之一的引用，以测试搜索窗口。\n\n# 在搜索窗口中添加谓词编辑器\n\
    \n现在，我们已让 FoundQuotes 控制器基于由应用委托“拥有”的谓词内容来获取值。下一步是在搜索窗口中添加一个 `NSPredicateEditor`，并配置它以允许用户编辑谓词。\n\
    \n在 Xcode 中，调出引用查找窗口。将整个窗口拉高一些，然后将现有的表格视图和文本视图拖到底部。接着，在对象库中找到 `NSPredicateEditor`，将其拖入窗口顶部的空白区域，并调整大小使其填满可用空间。图\
    \ 10-7 展示了这一构思。\n\n![A978-1-4302-4543-8_10_Fig7_HTML.jpg](img/A978-1-4302-4543-8_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.** 谓词编辑器已放置在搜索窗口中\n\n# 配置谓词编辑器\n\n现在是时候将编辑器绑定到应用委托的谓词实例上。选中 `NSPredicateEditor`（别忘了多点击一下以选中编辑器本身，而不是包含它的滚动视图），打开绑定检查器，然后查看“值”绑定信息。在弹出的菜单中选择“应用委托”，然后在“模型键路径”组合框中输入\
    \ `searchPredicate`，并按 Return 键激活该绑定。\n\n至此，要启用此谓词编辑器的搜索功能，我们还需要做一件事：必须根据我们想要搜索的属性对其进行定制。`NSPredicateEditor`\
    \ 是一个相当复杂的控件，幸运的是，它的大多数有趣功能都可以直接在 Xcode 中进行配置。谓词编辑器会显示一个或多个 `NSPredicateEditorRowTemplate`\
    \ 对象，每个对象都可以配置为以多种方式进行搜索。我们可以创建行模板，让用户指定要与对象值进行比较的数字或日期，或者从预定义字符串列表中选择。在我们的例子中，我们将配置一个行模板，让用户可以在文本字段中输入字符串，以搜索角色名称、剧集名称和引用内容。这个行模板可以被重复使用，允许用户同时指定多个搜索条件。此外，另一个行模板将让用户选择是必须满足所有搜索条件（布尔“与”运算），还是只要任意一个匹配成功（布尔“或”运算），即可在结果中显示某条引用。\n\
    \n在 Interface Builder 画布中，点击两个可见行中下面的那个（包含显示“名称”和“包含”的弹出按钮的行），深入编辑谓词编辑器。选中该行模板后，打开属性检查器。注意，其中的复选框允许我们选择允许用户使用哪些比较器，而弹出按钮则允许我们选择比较器两侧表达式的性质（键路径、字符串、常量值等）。默认设置（左侧为键路径，右侧为字符串）非常符合我们的需求，但我们确实需要根据搜索需求调整键路径。\n\
    \n编辑“左侧表达式”键路径下列出的三个默认值，将它们改为 `quoteText`、`character` 和 `show.name`。接下来，点击启用“忽略大小写”和“忽略变音符号”复选框（参见图\
    \ 10-8）。\n\n![A978-1-4302-4543-8_10_Fig8_HTML.jpg](img/A978-1-4302-4543-8_10_Fig8_HTML.jpg)\n\
    \n**图 10-8.** 配置 `NSPredicateEditorRowTemplate`\n\n然后，检查行模板中的弹出按钮。这将显示三个条目，其名称与我们刚才为键路径输入的内容相同。将它们更改为更易读的名称：*引用文字*、*角色名*和*剧集名*。\n\
    \n现在点击上面的行模板，即显示“以下条件任意一条为真”的那个。其配置非常简单。复选框允许我们选择是否允许用户使用布尔“与”、“或”和“非”进行搜索。将所有选项都启用，以提供最大的实用性。\n\
    \n现在，我们还需要进行最后一项配置。默认情况下，`NSPredicateEditor` 允许用户删除所有行，直至最后一行，此时将不再有添加新行的“+”按钮。要更改此设置，请选择谓词编辑器本身（而非某个行模板），然后在属性检查器中点击关闭“允许移除所有行”复选框。\n\
    \n保存工作，在 Xcode 中点击“运行”，尽情享受 QuoteMonger 的强大功能吧！现在，我们可以使用在谓词编辑器中配置的三个条件，轻松地在所有已保存的引用中进行搜索。\n"
- fmt: "# Saving a Predicate\n\nBefore we call it a day, let’s add one final bit of\
    \ polish that will make using `QuoteMonger` a friendly experience for our users.\
    \ Right now, each time a user launches the app, it starts up with our silly default\
    \ query. Wouldn’t it be nice if it instead showed the last query from the previous\
    \ time it was running? It turns out that this is a piece of cake. `NSPredicate`\
    \ has a handy method called `predicateFormat` that returns the predicate’s value\
    \ in the form of a string. So, we can save the current `searchPredicate`’s string\
    \ representation using `NSUserDefaults` when the user quits the app and check\
    \ for a saved string when the app launches. Open up `QMAppDelegate.m`, and make\
    \ the following changes to the first part of its implementation (just add all\
    \ the lines that appear in bold):\n\n```\n#import \"QMAppDelegate.h\"\n\n@implementation\
    \ QMAppDelegate\n\n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n\
    @synthesize managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd]\
    \ 'missed') OR \" \\\n                           \"(character CONTAINS[cd] 'kramer')\"\
    \n#define STORED_PREDICATE_KEY @\"storedPredicateFormat\"\n\n- init\n{\n  if ((self\
    \ = [super init])) {\n    NSString *format = [[NSUserDefaults standardUserDefaults]\n\
    \        objectForKey:STORED_PREDICATE_KEY];\n    if (format)\n      self.searchPredicate\
    \ = [NSPredicate predicateWithFormat: format];\n    else\n      self.searchPredicate\
    \ = [NSPredicate predicateWithFormat: DEFAULT_PREDICATE];\n  }\n  return self;\n\
    }\n\n- (void)applicationWillTerminate:(NSNotification *)aNotification\n{\n  NSString\
    \ *format = [self.searchPredicate predicateFormat];\n  [[NSUserDefaults standardUserDefaults]\
    \ setObject:format forKey:STORED_PREDICATE_KEY];\n}\n```\n\nWe start by defining\
    \ a string, which will be used as a key to store and retrieve the predicate from\
    \ the user’s preferences using `NSUserDefaults`. Then, we enhance the `init` method\
    \ to look for a stored predicate. It first checks to see if a stored predicate\
    \ string exists, and if it does, it populates the `searchPredicate` instance variable\
    \ with a new predicate created from the format string. If there is no stored predicate,\
    \ the default predicate is created instead.\n\nFinally, we implement the `applicationWillTerminate:`\
    \ method. This method is called automatically when the user quits the application,\
    \ giving us a chance to do some final cleanup. Here, we convert the current search\
    \ parameters (maintained in the `searchPredicate` instance variable) into a string,\
    \ and save that string into the user’s preferences so that the same search will\
    \ pop up the next time the user runs the app.\n\nSave, run, and then modify the\
    \ search terms. Quit the app and run it again, and the previous search terms show\
    \ up again.\n\n## Wrap Up\n\nThis chapter showed the basics of how to use `NSPredicate`\
    \ to narrow down a Core Data result set. We saw how an `NSPredicate` can be constructed\
    \ in code, or in Xcode, or by user interaction with `NSPredicateEditor`. We even\
    \ got a hint of how these predicates can be saved for later use, much like iTunes\
    \ and Mail do with smart playlists and smart folders. These techniques can help\
    \ you easily bring new levels of functionality to your own apps.\n\nChapters 8\
    \ through 10 covered the main concepts you need to get up and running with Core\
    \ Data. Now it’s time to move on to other topics. We won’t be leaving Core Data\
    \ behind, however, as it will still play a role in some further exercises, though\
    \ not to the same extent. We don’t have enough space in this book to turn every\
    \ example into a full-fledged application. Even in cases where we’re not using\
    \ Core Data, however, you might want to think about where it could fit into what\
    \ we’re demonstrating in the coming chapters. Now that you’ve got Core Data at\
    \ your fingertips, you’ll probably have a whole new view on some aspects of application\
    \ development that you would have solved in a different way before. Speaking of\
    \ views, that’s where we’re headed in Chapter 11, with a look at some of the most\
    \ prominent and widely used view components in Cocoa and elsewhere: windows, menus,\
    \ and sheets.\n\n# 11. Windows and Menus and Sheets\n\nFor the past several chapters,\
    \ we’ve been focusing on what could be considered the “back end” of Cocoa programming,\
    \ the model and controller classes that provide functionality to help take care\
    \ of our application’s infrastructure. Now it’s time to turn our attention to\
    \ the “front end” of Cocoa and pay more attention to the view part of the MVC\
    \ architecture.\n\nIn this chapter, we’re going to focus on windows (not the Microsoft\
    \ kind), menus (not the restaurant kind), panels (not the solar kind), and sheets\
    \ (not the bed kind), all of which are high-level GUI objects that practically\
    \ no Cocoa application can do without. Windows provide the foundation for view\
    \ objects to do their drawing. In Cocoa, these are represented by `NSWindow`,\
    \ its direct subclass `NSPanel`, and several specialized subclasses. Menus provide\
    \ the familiar top-of-the-screen access to system-wide and application-specific\
    \ user actions that most Mac applications have, and are represented by a hierarchy\
    \ of `NSMenu` and `NSMenuItem` objects. Sheets provide an alternative to the classic\
    \ free-floating modal window by letting us attach a modal window as an overlay\
    \ on an existing window, giving the user a more coherent interface.\n\nWe’re going\
    \ to explore each of these three areas in a “lab,” a toy application that has\
    \ no real use and is only created for demonstrating some functionality and letting\
    \ us see how these things work."
  raw: '## Saving a Predicate


    Before we call it a day, let’s add one final bit of polish that will make using
    QuoteMonger a friendly experience for our users. Right now, each time a user launches
    the app, it starts up with our silly default query. Wouldn’t it be nice if it
    instead showed the last query from the previous time it was running? It turns
    out that this is a piece of cake. `NSPredicate` has a handy method called `predicateFormat`
    that returns the predicate’s value in the form of a string. So, we can save the
    current `searchPredicate`’s string representation using `NSUserDefaults` when
    the user quits the app and check for a saved string when the app launches. Open
    up `QMAppDelegate.m`, and make the following changes to the first part of its
    implementation (just add all the lines that appear in bold):


    `#import "QMAppDelegate.h"`


    `@implementation QMAppDelegate`


    `@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;`


    `@synthesize managedObjectModel = _managedObjectModel;`


    `@synthesize managedObjectContext = _managedObjectContext;`


    `#define DEFAULT_PREDICATE @"(quoteText CONTAINS[cd] ''missed'') OR " \`


                               `"(character CONTAINS[cd] ''kramer'')"`


    `#define STORED_PREDICATE_KEY @"storedPredicateFormat"`


    `- init`


    `{`


      `if ((self = [super init])) {`


        `NSString *format = [[NSUserDefaults standardUserDefaults]`


            `objectForKey:STORED_PREDICATE_KEY];`


        `if (format)`


          `self.searchPredicate = [NSPredicate predicateWithFormat: format];`


        `else`


          `self.searchPredicate = [NSPredicate predicateWithFormat: DEFAULT_PREDICATE];`


      `}`


      `return self;`


    `}`


    `- (void)applicationWillTerminate:(NSNotification *)aNotification`


    `{`


      `NSString *format = [self.searchPredicate predicateFormat];`


      `[[NSUserDefaults standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY];`


    `}`


    We start by defining a string, which will be used as a key to store and retrieve
    the predicate from the user’s preferences using `NSUserDefaults`. Then, we enhance
    the `init` method to look for a stored predicate. It first checks to see if a
    stored predicate string exists, and if it does, it populates the `searchPredicate`
    instance variable with a new predicate created from the format string. If there
    is no stored predicate, the default predicate is created instead.


    Finally, we implement the `applicationWillTerminate:` method. This method is called
    automatically when the user quits the application, giving us a chance to do some
    final cleanup. Here, we convert the current search parameters (maintained in the
    `searchPredicate` instance variable) into a string, and save that string into
    the user’s preferences so that the same search will pop up the next time the user
    runs the app.


    Save, run, and then modify the search terms. Quit the app and run it again, and
    the previous search terms show up again.


    ## Wrap Up


    This chapter showed the basics of how to use `NSPredicate` to narrow down a Core
    Data result set. We saw how an `NSPredicate` can be constructed in code, or in
    Xcode, or by user interaction with `NSPredicateEditor`. We even got a hint of
    how these predicates can be saved for later use, much like iTunes and Mail do
    with smart playlists and smart folders. These techniques can help you easily bring
    new levels of functionality to your own apps.


    Chapters 8 through 10 covered the main concepts you need to get up and running
    with Core Data. Now it’s time to move on to other topics. We won’t be leaving
    Core Data behind, however, as it will still play a role in some further exercises,
    though not to the same extent. We don’t have enough space in this book to turn
    every example into a full-fledged application. Even in cases where we’re not using
    Core Data, however, you might want to think about where it could fit into what
    we’re demonstrating in the coming chapters. Now that you’ve got Core Data at your
    fingertips, you’ll probably have a whole new view on some aspects of application
    development that you would have solved in a different way before. Speaking of
    views, that’s where we’re headed in [Chapter 11](#A978-1-4302-4543-8_11_Chapter.html),
    with a look at some of the most prominent and widely used view components in Cocoa
    and elsewhere: windows, menus, and sheets.


    # 11. Windows and Menus and Sheets


    Abstract


    For the past several chapters, we’ve been focusing on what could be considered
    the “back end” of Cocoa programming, the model and controller classes that provide
    functionality to help take care of our application’s infrastructure. Now it’s
    time to turn our attention to the “front end” of Cocoa and pay more attention
    to the view part of the MVC architecture.


    For the past several chapters, we’ve been focusing on what could be considered
    the “back end” of Cocoa programming, the model and controller classes that provide
    functionality to help take care of our application’s infrastructure. Now it’s
    time to turn our attention to the “front end” of Cocoa and pay more attention
    to the view part of the MVC architecture.


    In this chapter, we’re going to focus on windows (not the Microsoft kind), menus
    (not the restaurant kind), panels (not the solar kind), and sheets (not the bed
    kind), all of which are high-level GUI objects that practically no Cocoa application
    can do without. Windows provide the foundation for view objects to do their drawing.
    In Cocoa, these are represented by `NSWindow`, its direct subclass `NSPanel`,
    and several specialized subclasses. Menus provide the familiar top-of-the-screen
    access to system-wide and application-specific user actions that most Mac applications
    have, and are represented by a hierarchy of `NSMenu` and `NSMenuItem` objects.
    Sheets provide an alternative to the classic free-floating modal window by letting
    us attach a modal window as an overlay on an existing window, giving the user
    a more coherent interface.


    We’re going to explore each of these three areas in a “lab,” a toy application
    that has no real use and is only created for demonstrating some functionality
    and letting us see how these things work.'
  trans: "\n# 保存谓词\n\n在收工之前，让我们再添加最后一点润色，让用户使用 `QuoteMonger` 时拥有更友好的体验。目前，用户每次启动应用，它都会加载我们那个略显简陋的默认查询。如果它能显示上次运行时的最后查询，岂不是更好？实际上，这简直是小菜一碟。`NSPredicate`\
    \ 有一个很方便的方法叫 `predicateFormat`，它能以字符串形式返回谓词的值。因此，当用户退出应用时，我们可以使用 `NSUserDefaults`\
    \ 保存当前 `searchPredicate` 的字符串表示形式，并在应用启动时检查是否有已保存的字符串。打开 `QMAppDelegate.m`，对其实现的第一部分进行如下修改（只需添加所有加粗的行）：\n\
    \n```\n#import \"QMAppDelegate.h\"\n\n@implementation QMAppDelegate\n\n@synthesize\
    \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
    \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
    \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'missed') OR \" \\\n  \
    \                         \"(character CONTAINS[cd] 'kramer')\"\n#define STORED_PREDICATE_KEY\
    \ @\"storedPredicateFormat\"\n\n- init\n{\n  if ((self = [super init])) {\n  \
    \  NSString *format = [[NSUserDefaults standardUserDefaults]\n        objectForKey:STORED_PREDICATE_KEY];\n\
    \    if (format)\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
    \ format];\n    else\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
    \ DEFAULT_PREDICATE];\n  }\n  return self;\n}\n\n- (void)applicationWillTerminate:(NSNotification\
    \ *)aNotification\n{\n  NSString *format = [self.searchPredicate predicateFormat];\n\
    \  [[NSUserDefaults standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY];\n\
    }\n```\n\n我们首先定义一个字符串，它将用作键，通过 `NSUserDefaults` 在用户偏好设置中存储和检索谓词。然后，我们增强 `init`\
    \ 方法，使其查找已存储的谓词。它首先检查是否存在已存储的谓词字符串，如果存在，则从该格式字符串创建新的谓词并填充到 `searchPredicate` 实例变量中。如果没有存储的谓词，则创建默认谓词。\n\
    \n最后，我们实现了 `applicationWillTerminate:` 方法。当用户退出应用时，该方法会被自动调用，给我们一个进行最终清理的机会。在这里，我们将当前的搜索参数（维护在\
    \ `searchPredicate` 实例变量中）转换为字符串，并将该字符串保存到用户的偏好设置中，以便下次用户运行应用时，相同的搜索会再次出现。\n\n\
    保存、运行，然后修改搜索条件。退出应用并再次运行，之前的搜索条件会再次显示出来。\n\n## 总结\n\n本章展示了如何使用 `NSPredicate` 来缩小\
    \ Core Data 结果集的基础知识。我们了解了如何通过代码、在 Xcode 中，或通过用户与 `NSPredicateEditor` 的交互来构建 `NSPredicate`。我们甚至还了解到了如何将这些谓词保存起来以备后用，就像\
    \ iTunes 和 Mail 的智能播放列表和智能文件夹那样。这些技巧可以帮助你轻松地为自己的应用带来新层次的功能。\n\n第 8 章到第 10 章介绍了启动和运行\
    \ Core Data 所需的主要概念。现在是时候转向其他话题了。不过，我们并不会就此离开 Core Data，它将在后续的一些练习中继续发挥作用，尽管程度不同。由于篇幅有限，我们无法将每个示例都变成一个完整的应用程序。但即使在不使用\
    \ Core Data 的情况下，你也可以思考一下它如何融入我们在后续章节中演示的内容。既然你已经掌握了 Core Data，那么在应用程序开发的某些方面，你可能会对之前用不同方式解决的问题产生全新的认识。说到认识，这正是我们将在第\
    \ 11 章中探讨的方向，我们将了解 Cocoa 以及其他框架中一些最突出、最广泛使用的视图组件：窗口、菜单和表单。\n\n# 11. 窗口、菜单和表单\n\
    \n在过去的几章中，我们一直专注于 Cocoa 编程中所谓“后端”的部分，即那些帮助处理应用程序基础设施的模型和控制器类。现在，是时候将注意力转向 Cocoa\
    \ 的“前端”，更多地关注 MVC 架构中的视图部分了。\n\n在本章中，我们将重点讨论窗口（不是 Microsoft 那种）、菜单（不是餐厅那种）、面板（不是太阳能那种）和表单（不是床单那种），这些都是高级\
    \ GUI 对象，几乎任何 Cocoa 应用程序都离不开它们。窗口为视图对象的绘制提供了基础。在 Cocoa 中，这些由 `NSWindow` 及其直接子类\
    \ `NSPanel` 以及几个专门的子类表示。菜单提供了大多数 Mac 应用程序都有的、熟悉的屏幕顶部访问系统级和特定应用用户操作的方式，由 `NSMenu`\
    \ 和 `NSMenuItem` 对象的层次结构表示。表单通过将模态窗口作为覆盖层附加到现有窗口上，为经典的浮动模态窗口提供了一种替代方案，为用户提供了更连贯的界面。\n\
    \n我们将在一个“实验室”中探索这三个领域，这是一个没有实际用途的玩具应用程序，仅用于演示某些功能并让我们了解这些组件是如何工作的。\n"
- fmt: '# NSWindow and NSPanel


    Start by creating a new Xcode project using the Cocoa Application template, and
    name it `WindowLab`. We’ll use this project as a testbed for demonstrating a variety
    of window features.


    In Mac OS X, nearly everything seen on-screen is presented using windows. Many
    windows are easily recognizable, having the standard controls along the top and
    a drop-shadow behind.


    But some windows aren’t so obvious. For example, if we launch a game that takes
    over the whole screen for its display, even if it’s presenting custom controls
    of its own that have nothing to do with Cocoa, that’s all occurring in a window.
    The Dock at the bottom of the screen is surely a window. And if we drag a file
    icon from one Finder window to another, the icon we’re dragging is actually being
    “carried” inside a small, transparent window!


    In all of these cases, we’re seeing and interacting with instances of `NSWindow`
    and its subclasses. `NSWindow` is a very versatile class that lets us configure
    several behaviors right out of the box and lets us do even more by subclassing.
    In general, if we want to change the appearance of the window itself, either its
    “chrome” (the title bar and upper-left corner controls), its transparency, or
    its shape, we’ll probably need to subclass `NSWindow`, but otherwise, we almost
    never will. In this book, we’re going to stick to the kinds of windows that are
    ready to use directly and conform to Apple’s Human Interface Guidelines, and we
    won’t be subclassing `NSWindow` to change their appearance.


    **Tip**


    The Human Interface Guidelines (often shortened to “HIG”) are a set of recommendations
    that Apple provides for application developers. The HIG acts as a sort of style
    guide that you can refer to when you’re concerned that your application looks
    a little “off.” It’s not a strict set of rules, and no one is going to stop you
    from violating the HIG. In fact, many applications, including Apple’s own, stray
    from the guidelines in all kinds of ways. However, it provides a good baseline,
    describing how the various components are meant to be used.


    We mentioned the HIG in Chapter 2 already, but it’s worth pointing out again.
    You can find the HIG online at [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html).


    Figure 11-1 shows the main kinds of windows that are prevalent in most Cocoa applications
    today. There are two drawing styles included for `NSWindow`, the “normal” appearance
    and the “textured” appearance, which somewhat resembles a shiny piece of metal.
    Either style of `NSWindow` can be configured to support full-screen mode, which
    adds arrows to the right end of the title bar. `NSPanel`s can be configured to
    be in utility mode (in which case they have a smaller title bar, cast a smaller
    shadow, and float above the application’s other windows) or to look like a normal
    window, and in either case the choice of normal vs. textured also applies, just
    like `NSWindow`. One additional option for `NSPanel` is to run in HUD (short for
    heads-up display) mode, in which case the panel’s color scheme is inverted, its
    title bar and bottom edge are modified, and the whole window is made slightly
    transparent. This mode (which has no textured option) is intended to allow the
    user to see through a part of the interface to what’s behind it and is put to
    good use in applications like iPhoto, where you can bring up a HUD panel containing
    adjustable color settings, through which the photo you’re looking at can still
    be seen.


    ![A978-1-4302-4543-8_11_Fig1_HTML.jpg](A978-1-4302-4543-8_11_Fig1_HTML.jpg)


    **Figure 11-1.** A sampling of the main types of windows readily available in
    Cocoa


    Unlike some other GUI toolkits, where one of the first things you do when creating
    a new application is to subclass some sort of Application class and some sort
    of Window class, Cocoa allows for true separation of the model, view, and controller
    portions of your application. The window only needs to know how to display itself
    and provide a graphics context for its views, so that’s all it does. Any code
    that deals with what happens to a window while the application is running (e.g.,
    it gets loaded from a nib file, or gets dragged across the screen, or gets closed
    by the user) can typically be dealt with by the window’s delegate object (i.e.,
    its controller).


    ## Handling Input


    In addition to providing a frame for views to display their stuff, `NSWindow`
    also handles user input from the mouse and keyboard. Any mousing action (clicking,
    dragging, moving, releasing, and so on) in an `NSWindow` will trigger a method
    in `NSWindow` that finds the appropriate view object in its contents and calls
    the same method in the view. This symmetry works because `NSWindow` and `NSView`
    both inherit from `NSResponder`, where the methods for handling these events are
    defined. Likewise, when the user presses or releases a key on the keyboard, the
    application calls a method in the application’s “key window” (i.e., the window
    that currently has keyboard focus; usually the last window the user clicked in),
    which in turn determines which view currently has keyboard focus and passes off
    responsibility, calling the same method in the focused view.


    ## To Use a Panel, or Not to Use a Panel


    Since we’re not going to modify the basic appearance of windows, we’ll be using
    either `NSWindow` or its subclass `NSPanel` to display the controls and other
    views in our application. The core elements of our application will usually be
    in an `NSWindow`, while `NSPanel` is used for auxiliary windows, such as the Show
    View Options panel in Finder. From a user’s standpoint, there are just a few critical
    differences between `NSWindow` and `NSPanel`:


    * `NSPanel` instances normally become invisible when another application becomes
    the active application and reappears when its own application becomes active again.

    * An `NSPanel` can be made to “float” in front of all the other windows in its
    application, including the main window.

    * An `NSPanel` can be easily configured to not become the key window unnecessarily,
    so a user can click a button in an auxiliary panel and then continue typing in
    the main window.'
  raw: '## NSWindow and NSPanel


    Start by creating a new Xcode project using the Cocoa Application template, and
    name it WindowLab. We’ll use this project as a testbed for demonstrating a variety
    of window features.


    In Mac OS X, nearly everything seen on-screen is presented using windows. Many
    windows are easily recognizable, having the standard controls along the top and
    a drop-shadow behind.


    But some windows aren’t so obvious. For example, if we launch a game that takes
    over the whole screen for its display, even if it’s presenting custom controls
    of its own that have nothing to do with Cocoa, that’s all occurring in a window.
    The Dock at the bottom of the screen is surely a window. And if we drag a file
    icon from one Finder window to another, the icon we’re dragging is actually being
    “carried” inside a small, transparent window!


    In all of these cases, we’re seeing and interacting with instances of `NSWindow`
    and its subclasses. `NSWindow` is a very versatile class that lets us configure
    several behaviors right out of the box and lets us do even more by subclassing.
    In general, if we want to change the appearance of the window itself, either its
    “chrome” (the title bar and upper-left corner controls), its transparency, or
    its shape, we’ll probably need to subclass `NSWindow`, but otherwise, we almost
    never will. In this book, we’re going to stick to the kinds of windows that are
    ready to use directly and conform to Apple’s Human Interface Guidelines, and we
    won’t be subclassing `NSWindow` to change their appearance.


    Tip


    The Human Interface Guidelines (often shortened to “HIG”) are a set of recommendations
    that Apple provides for application developers. The HIG acts as a sort of style
    guide that you can refer to when you’re concerned that your application looks
    a little “off.” It’s not a strict set of rules, and no one is going to stop you
    from violating the HIG. In fact, many applications, including Apple’s own, stray
    from the guidelines in all kinds of ways. However, it provides a good baseline,
    describing how the various components are meant to be used.


    We mentioned the HIG in [Chapter 2](#A978-1-4302-4543-8_2_Chapter.html) already,
    but it’s worth pointing out again. You can find the HIG online at [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html)
    .


    Figure [11-1](#A978-1-4302-4543-8_11_Chapter.html#Fig1) shows the main kinds of
    windows that are prevalent in most Cocoa applications today. There are two drawing
    styles included for `NSWindow`, the “normal” appearance and the “textured” appearance,
    which somewhat resembles a shiny piece of metal. Either style of `NSWindow` can
    be configured to support full-screen mode, which adds arrows to the right end
    of the title bar. `NSPanel`s can be configured to be in utility mode (in which
    case they have a smaller title bar, cast a smaller shadow, and float above the
    application’s other windows) or to look like a normal window, and in either case
    the choice of normal vs. textured also applies, just like `NSWindow`. One additional
    option for `NSPanel` is to run in HUD (short for heads-up display) mode, in which
    case the panel’s color scheme is inverted, its title bar and bottom edge are modified,
    and the whole window is made slightly transparent. This mode (which has no textured
    option) is intended to allow the user to see through a part of the interface to
    what’s behind it and is put to good use in applications like iPhoto, where you
    can bring up a HUD panel containing adjustable color settings, through which the
    photo you’re looking at can still be seen.


    ![A978-1-4302-4543-8_11_Fig1_HTML.jpg](A978-1-4302-4543-8_11_Fig1_HTML.jpg)


    Figure 11-1.


    A sampling of the main types of windows readily available in Cocoa


    Unlike some other GUI toolkits, where one of the first things you do when creating
    a new application is to subclass some sort of Application class and some sort
    of Window class, Cocoa allows for true separation of the model, view, and controller
    portions of your application. The window only needs to know how to display itself
    and provide a graphics context for its views, so that’s all it does. Any code
    that deals with what happens to a window while the application is running (e.g.,
    it gets loaded from a nib file, or gets dragged across the screen, or gets closed
    by the user) can typically be dealt with by the window’s delegate object (i.e.,
    its controller).


    ### Handling Input


    In addition to providing a frame for views to display their stuff, `NSWindow`
    also handles user input from the mouse and keyboard. Any mousing action (clicking,
    dragging, moving, releasing, and so on) in an `NSWindow` will trigger a method
    in `NSWindow` that finds the appropriate view object in its contents and calls
    the same method in the view. This symmetry works because `NSWindow` and `NSView`
    both inherit from `NSResponder`, where the methods for handling these events are
    defined. Likewise, when the user presses or releases a key on the keyboard, the
    application calls a method in the application’s “key window” (i.e. the window
    that currently has keyboard focus; usually the last window the user clicked in),
    which in turn determines which view currently has keyboard focus and passes off
    responsibility, calling the same method in the focused view.


    ### To Use a Panel, or Not to Use a Panel


    Since we’re not going to modify the basic appearance of windows, we’ll be using
    either `NSWindow` or its subclass `NSPanel` to display the controls and other
    views in our application. The core elements of our application will usually be
    in an `NSWindow`, while `NSPanel` is used for auxiliary windows, such as the Show
    View Options panel in Finder. From a user’s standpoint, there are just a few critical
    differences between `NSWindow` and `NSPanel`:


    *   `NSPanel` instances normally become invisible when another application becomes
    the active application and reappears when its own application becomes active again.

    *   An `NSPanel` can be made to “float” in front of all the other windows in its
    application, including the main window.

    *   An `NSPanel` can be easily configured to not become the key window unnecessarily,
    so a user can click a button in an auxiliary panel and then continue typing in
    the main window.'
  trans: '

    # NSWindow 与 NSPanel


    首先，使用 Cocoa 应用程序模板创建一个新的 Xcode 项目，并将其命名为 `WindowLab`。我们将把这个项目作为演示各种窗口功能的测试平台。


    在 Mac OS X 中，屏幕上几乎所有的内容都是通过窗口来呈现的。许多窗口很容易识别，它们顶部有标准控件，背后带有投影。


    但有些窗口并没有那么明显。例如，如果我们启动一个游戏，它占据了整个屏幕进行显示，即使它呈现的是自定义的、与 Cocoa 无关的控件，这一切也都是在某个窗口中发生的。屏幕底部的
    Dock 毫无疑问也是一个窗口。而且，如果我们把一个文件图标从一个 Finder 窗口拖到另一个 Finder 窗口，我们拖动的图标实际上是被"装"在一个小小的透明窗口里！


    在所有这些情况下，我们看到的并与之交互的都是 `NSWindow` 及其子类的实例。`NSWindow` 是一个非常通用的类，它允许我们开箱即用地配置多种行为，并且通过子类化实现更多功能。通常，如果我们想要改变窗口本身的外观，无论是其"镀铬装饰"（标题栏和左上角控件）、透明度还是形状，我们可能都需要对
    `NSWindow` 进行子类化。但除此之外，我们几乎永远不需要这样做。在本书中，我们将只使用那些可以直接使用且符合苹果人机界面指南的窗口类型，并且不会对
    `NSWindow` 进行子类化来改变其外观。


    **提示**


    人机界面指南（通常简称为 "HIG"）是苹果公司为应用程序开发者提供的一套建议。当你担心你的应用程序看起来有些"不对劲"时，HIG 可以作为一种你可以参考的风格指南。它并不是一套严格的规则，也没有人会阻止你违反
    HIG。事实上，许多应用程序，包括苹果自家的，都会以各种方式偏离指南。然而，它提供了一个良好的基线，描述了各种组件应该如何被使用。


    我们已经在第 2 章提到了 HIG，但值得再次指出。你可以在网上找到 HIG，网址是 [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html)。


    图 11-1 展示了当今大多数 Cocoa 应用程序中常见的主要窗口类型。`NSWindow` 有两种绘制风格："正常"外观和"纹理"外观（有些类似于闪亮的金属片）。任何一种风格的
    `NSWindow` 都可以配置为支持全屏模式，这会在标题栏的右端添加箭头。`NSPanel` 可以配置为实用工具模式（这种情况下，它的标题栏更小，投影更小，并且浮动在应用程序的其他窗口之上），或者看起来像一个普通的窗口，并且在这两种情况下，也适用正常与纹理的选择，就像
    `NSWindow` 一样。`NSPanel` 还有一个额外的选项是运行在 HUD（即平视显示器 heads-up display 的缩写）模式下，在这种情况下，面板的配色方案会反转，其标题栏和底部边缘会被修改，并且整个窗口会变得略微透明。这种模式（没有纹理选项）旨在让用户能够透过界面的部分区域看到其背后的内容，并且在
    iPhoto 等应用程序中得到了很好的应用，你可以调出一个包含可调节颜色设置的 HUD 面板，透过它，你正在查看的照片仍然可见。


    ![A978-1-4302-4543-8_11_Fig1_HTML.jpg](img/A978-1-4302-4543-8_11_Fig1_HTML.jpg)


    **图 11-1.** Cocoa 中可直接使用的主要窗口类型示例


    与其他一些 GUI 工具包（你在创建新应用程序时首先要做的事情之一就是对某种 Application 类和某种 Window 类进行子类化）不同，Cocoa
    允许真正分离你应用程序的模型、视图和控制器部分。窗口只需要知道如何显示自身并为它的视图提供图形上下文，因此它的作用仅限于此。任何处理应用程序运行时窗口所发生事件的代码（例如，从
    nib 文件加载、被拖拽到屏幕另一侧、或被用户关闭）通常都可以由窗口的委托对象（即其控制器）来处理。


    ## 处理输入


    除了为视图提供显示内容的框架，`NSWindow` 还处理来自鼠标和键盘的用户输入。在 `NSWindow` 中的任何鼠标操作（点击、拖拽、移动、释放等）都会触发
    `NSWindow` 中的一个方法，该方法会在其内容中找到合适的视图对象，并在该视图中调用相同的方法。这种对称性之所以有效，是因为 `NSWindow` 和
    `NSView` 都继承自 `NSResponder`，而处理这些事件的方法正是在 `NSResponder` 中定义的。同样地，当用户在键盘上按下或释放一个键时，应用程序会调用该应用程序的"关键窗口"（即当前拥有键盘焦点的窗口；通常是用户最后点击过的窗口）中的方法，该方法进而确定当前哪个视图拥有键盘焦点，并传递责任，在获得焦点的视图中调用相同的方法。


    ## 使用面板，还是不用面板


    由于我们不会修改窗口的基本外观，我们将使用 `NSWindow` 或其子类 `NSPanel` 来在我们的应用程序中显示控件和其他视图。我们应用程序的核心元素通常放在一个
    `NSWindow` 中，而 `NSPanel` 则用于辅助窗口，例如 Finder 中的"显示查看选项"面板。从用户的角度来看，`NSWindow` 和
    `NSPanel` 之间仅有几个关键的区别：


    *   当另一个应用程序成为活动应用程序时，`NSPanel` 实例通常会变得不可见，并在其自己的应用程序再次变为活动状态时重新出现。

    *   可以设置一个 `NSPanel` 使其"浮动"在其应用程序中的所有其他窗口（包括主窗口）之前。

    *   可以轻松地将一个 `NSPanel` 配置为不会不必要地成为关键窗口，这样用户可以在辅助面板中点击一个按钮，然后继续在主窗口中输入。

    '
- fmt: '### Window Attributes


    在 Xcode 的 WindowLab 项目中，导航到 `MainMenu.xib` 文件并单击以在 Interface Builder 画布中打开它。应用程序
    nib 文件中包含的对象之一，和往常一样，是一个窗口。在主要的 nib 窗口中点击选择它，然后打开 Attributes Inspector 以便我们进行一些探索（参见图
    [11-2](#A978-1-4302-4543-8_11_Chapter.html#Fig2)）。在前面的章节中，我们使用这个 Inspector 来设置窗口的标题，但当然我们在这里可以做更多事情。


    ![A978-1-4302-4543-8_11_Fig2_HTML.jpg](A978-1-4302-4543-8_11_Fig2_HTML.jpg)


    图 11-2. 针对 `NSWindow` 的 Attributes Inspector


    我们已经熟悉了 Title 文本字段。就在它下面的是 Autosave 字段，它提供了一个非常好的功能：在此字段中输入一个文本字符串，窗口将使用该字符串作为
    `NSUserDefaults` 系统中的键，并基于该键存储和检索窗口的位置和大小。这意味着，当用户重新排列我们应用程序中的窗口时，窗口位置会保存在用户的偏好设置中，并且下次用户运行我们的应用程序时，窗口将出现在相同的位置。而我们要做的，就是为应用程序中的每个窗口填写这个文本字段，并为每个窗口输入一个唯一的值。


    接下来，有一些复选框允许我们关闭一些标准的窗口控件。请注意，关闭这些复选框并不会从窗口标题栏中移除相应的按钮；它只会让这些按钮在我们的应用程序运行时永久变灰并且不可用。在它们下面是一些用于微调窗口外观的复选框，包括启用纹理模式、禁用窗口背后的阴影等等。这里提到
    Toolbar 的选项指的是可以附加到窗口的可选 `NSToolbar`，我们将在本章稍后解释这一点。我们还可以移除窗口的标题栏。这通常是一个坏主意，因为用户将无法重新定位窗口，但对于像游戏这样占据整个屏幕的应用程序来说，这可能是有用的。


    下一组复选框让我们以多种方式微调窗口的行为，其中大部分是见名知义的。一个例外是 Auto Recalculates View Loop 复选框，其名称充其量令人费解。思路是这样的：每个窗口维护一个它包含的所有视图对象的列表，用户可以通过使用
    Tab 键在这些视图之间切换。如果我们打开这个复选框，那么在应用程序运行时添加到窗口的任何视图都将自动插入到这个“循环”中的某个位置。另一个例外是 Restorable
    复选框。打开 Restorable 告诉 Cocoa 我们的窗口应该在应用程序启动之间尝试恢复到相同的状态。在我们的帮助下，我们的应用程序可以重新打开用户在退出时打开的窗口，甚至可以将它们恢复到用户退出时的滚动位置和选择状态。


    在它下面，你会找到一系列关于窗口如何与桌面交互的菜单。Mac 桌面环境有一个名为 Mission Control 的功能（位于“系统偏好设置”应用程序中），它允许用户拥有多个桌面（或空间）并在它们之间移动窗口，以及显示所有窗口或单个应用程序的所有窗口。在
    Mac OS/X 的早期版本中，Mission Control 是两个独立的功能，分别称为 Spaces 和 Exposé，在 Attributes Inspector
    中它们仍然以此称呼。


    一般来说，我们会将这些选项保留为 `Inferred Behavior`，这意味着窗口行为正常。对于 Spaces，其他选择是 `Can Join All
    Spaces`，这意味着窗口将始终可见；或者 `Move To Active Space`，这意味着窗口在变为活动状态时会移动到当前空间，而不是将活动桌面切换到窗口所在的桌面。对于
    Exposé，`Inferred Behavior` 等同于 `Managed Behavior`，这意味着窗口会对 Exposé 操作做出正常响应。其他选择包括
    `Transient`，这会导致窗口在 Exposé 被激活时隐藏（这是面板的默认行为）；以及 `Stationary`，这意味着窗口完全忽略 Exposé。下一个选项涉及此窗口是否应包含在用户可以通过
    Window ➤ Cycle Through Windows（⌘-`）命令循环切换的窗口集合中。接下来是窗口是否支持全屏选项，其中窗口会扩展到自己的空间并占据整个显示器，就像
    iOS 应用程序一样，包括隐藏菜单栏。如果将此设置为 `Primary Window`，则标题栏右侧会显示一个特殊控件来激活全屏模式。


    最后，有一些与窗口内存使用相关的选项。最好保持 `Deferred` 开启，因为这会跳过为窗口分配一些内部内存，直到窗口即将实际显示。此外，我们应该保持 `One
    Shot` 关闭。如果它开启，那么一旦窗口关闭，同一内部内存就会被释放，因此只有在相关窗口是每个会话只能显示一次的临时窗口时才应开启，例如启动画面。最后，弹出窗口为我们提供了将窗口的“后备存储”从
    `Buffered` 切换为 `Retained` 或 `Unretained` 的能力。永远不要那样做！`Retained` 和 `Unretained`
    选项仅用于支持特定类型的遗留代码，所有新的 Cocoa 应用程序都应针对每个窗口将此设置保留为 `Buffered`。


    现在，从 Object Library 窗口中拖出一个 `NSPanel`，再次查看 Attributes Inspector；注意 Style 弹出菜单以及我们在检查
    `NSWindow` 时看到的一些额外复选框。这里的样式选项包括 `Utility`，如果选择，它会赋予面板独特的外观，并使其浮动在应用程序的其他窗口之上；以及
    `HUD`，它赋予窗口更具特色的“平视”外观。尝试其中一些样式，看看它们如何影响面板的外观。面板的行为也可能与窗口不同。面板可以在全屏下拉菜单中标记为 `Auxiliary
    Window`，这意味着它在全屏模式下，会在同一空间中浮动于另一个窗口之上。这对于诸如影响另一个窗口中文档的“查找”或“信息”面板非常有用。探索完毕后，从
    nib 文件中删除该面板。


    ### 标准系统面板


    除了旨在让我们填充自己的视图和控件的通用窗口类之外，Cocoa 还包含一些专门化的窗口子类，供我们在应用程序中使用。这些子类旨在满足各种应用程序的需求，因此使用它们可以免费获得许多功能，同时为我们的用户提供他们可能在其他应用程序中使用过的熟悉界面。'
  raw: '### Window Attributes


    In the WindowLab project in Xcode, navigate to the MainMenu.xib file and single-click
    to open it in an Interface Builder canvas. One of the objects included in the
    application nib file is, as always, a window. Click to select it in the main nib
    window, then open the Attributes Inspector so that we can explore it a bit (see
    Figure [11-2](#A978-1-4302-4543-8_11_Chapter.html#Fig2)). In earlier chapters,
    we used this Inspector for setting a window’s title, but of course there’s more
    we can do here.


    ![A978-1-4302-4543-8_11_Fig2_HTML.jpg](A978-1-4302-4543-8_11_Fig2_HTML.jpg)


    Figure 11-2.


    The Attributes Inspector for an NSWindow


    We’re already familiar with the Title text field. Just below that is the Autosave
    field, which provides a very nice bit of functionality: enter a text string in
    this field, and the window will use that string as a key in the `NSUserDefaults`
    system, storing and retrieving its position and location based on that key. That
    means that as a user rearranges the windows in our application, the window positions
    are saved in the user’s preferences, and the windows will appear in the same locations
    the next time they run our app. And all we have to do to make it happen is fill
    in this text field for each window in our app, entering a unique value for each
    window.


    Next, there are some checkboxes that let us turn off some of the standard window
    controls. Note that turning off these checkboxes won’t remove the corresponding
    buttons from the window’s title bar; it will just make them permanently grey and
    inactive while our app is running. Below that are some checkboxes that for tweaking
    a window’s appearance, including enabling textured mode, disabling the drop-shadow
    behind the window, and more. The options that mention Toolbar here are referring
    to the optional `NSToolbar` that can be attached to a window, which we’ll explain
    a little later in this chapter. We can also remove a window’s title bar. This
    is generally a bad idea, since the user won’t be able to reposition the window,
    but might be useful for an application like a game that takes over the whole screen.


    The next chunk of checkboxes lets us fine-tune the window’s behavior in a number
    of ways, most of them self-explanatory. One exception is the Auto Recalculates
    View Loop checkbox, whose name is puzzling at best. Here’s the idea: each window
    maintains a list of all the view objects it contains, which the user can shuffle
    between by using the Tab key. If we turn this checkbox on, then any views that
    are added to the window while the app is running will automatically be inserted
    somewhere into this “loop.” Another exception is the Restorable checkbox. Turning
    on Restorable tells Cocoa that our window should attempt to be restored to the
    same state between application launches. With some help from us, our app can reopen
    the windows that were open when the user quit, and even restore them to the same
    scroll position and selections that were in place when the user quit.


    Below that you’ll find a series of menus that deal with how the window interacts
    with the desktop. The Mac desktop environment has a feature called Mission Control
    (located in the System Preferences app) that allows users to have more than one
    desktop (or space) and move windows between them, and to reveal all the windows
    or all the windows for a single application. In prior versions of Mac OS/X, Mission
    Control was two separate features called Spaces and Exposé, and that’s still how
    they’re referred to in the Attributes Inspector.


    In general, we’ll want to leave these as Inferred Behavior, which means that the
    window behaves normally. For Spaces, the other choices are Can Join All Spaces,
    which means that the window will always be visible, or Move To Active Space, which
    means that the window will move to the current space on becoming active rather
    than shifting the active desktop to the one where the window is. For Exposé, Inferred
    Behavior is the same as Managed Behavior, which means that the window responds
    normally to Exposé actions. The other choices are Transient, which causes the
    window to be hidden when Exposé is activated (which is the default for panels),
    and Stationary, which means that the window ignores Exposé entirely. The next
    option deals with whether this window should be included in the set of windows
    that the user can rotate through using the Window ➤ Cycle Through Windows (⌘-`)
    command. Next up is whether the window supports a Full Screen option, where the
    window expands into its own space and takes up the whole display, like an iOS
    application, including hiding the menu bar. If this is set to Primary Window,
    a special control is shown in the right-hand side of the title bar to activate
    full screen mode.


    Finally, there are options related to a window’s memory usage. It’s best to leave
    Deferred on because this skips the allocation of some internal memory for the
    window until it’s about to actually display the window. Also, we should leave
    One Shot turned off. If it’s on, that same internal memory is freed as soon as
    the window is closed, so this should only be turned on in case the window in question
    is a temporary window that can only be shown once per session, such as a splash
    screen. Finally, a pop-up window offers us the ability to switch the window’s
    “backing store” from Buffered to Retained or Unretained. Never do that! The Retained
    and Unretained options are only there to support specific sorts of legacy code,
    and all new Cocoa applications should leave this set to Buffered for every window.


    Now pull an `NSPanel` out from the Object Library window, and look again at the
    Attributes Inspector; note the Style pop-up menu and a couple of added checkboxes
    in addition to the options we saw when inspecting an `NSWindow`. The style options
    here are Utility, which if chosen gives the panel a distinctive appearance, as
    well as making it float above the application’s other windows; and HUD, which
    gives the window the even more distinctive “heads-up” appearance. Try out some
    of these styles and see how they affect the panel’s appearance. The behavior of
    a panel can vary from a window, as well. A panel can be marked as an Auxiliary
    Window in the Full Screen pull-down, which means that it will float over a window
    in Full Screen mode in the same space. This is useful for things like Find or
    Info panels that affect a document in another window. After exploring, delete
    the panel from the nib file.


    ### Standard System Panels


    In addition to the generic window classes that are meant for us to fill with our
    own views and controls, Cocoa includes some specialized window subclasses for
    use in our applications. These are meant to meet the needs of a wide variety of
    applications, so using them provides a lot of functionality for free, and at the
    same time provides our users with familiar interfaces that they’ve probably used
    in other applications.'
  trans: '

    ### Window Attributes


    在 Xcode 的 WindowLab 项目中，导航到 `MainMenu.xib` 文件并单击以在 Interface Builder 画布中打开它。应用程序
    nib 文件中包含的对象之一，和往常一样，是一个窗口。在主要的 nib 窗口中点击选择它，然后打开 Attributes Inspector 以便我们进行一些探索（参见图
    11-2）。在前面的章节中，我们使用这个 Inspector 来设置窗口的标题，但当然我们在这里可以做更多事情。


    ![A978-1-4302-4543-8_11_Fig2_HTML.jpg](img/A978-1-4302-4543-8_11_Fig2_HTML.jpg)


    图 11-2. 针对 `NSWindow` 的 Attributes Inspector


    我们已经熟悉了 Title 文本字段。就在它下面的是 Autosave 字段，它提供了一个非常好的功能：在此字段中输入一个文本字符串，窗口将使用该字符串作为
    `NSUserDefaults` 系统中的键，并基于该键存储和检索窗口的位置和大小。这意味着，当用户重新排列我们应用程序中的窗口时，窗口位置会保存在用户的偏好设置中，并且下次用户运行我们的应用程序时，窗口将出现在相同的位置。而我们要做的，就是为应用程序中的每个窗口填写这个文本字段，并为每个窗口输入一个唯一的值。


    接下来，有一些复选框允许我们关闭一些标准的窗口控件。请注意，关闭这些复选框并不会从窗口标题栏中移除相应的按钮；它只会让这些按钮在我们的应用程序运行时永久变灰并且不可用。在它们下面是一些用于微调窗口外观的复选框，包括启用纹理模式、禁用窗口背后的阴影等等。这里提到
    Toolbar 的选项指的是可以附加到窗口的可选 `NSToolbar`，我们将在本章稍后解释这一点。我们还可以移除窗口的标题栏。这通常是一个坏主意，因为用户将无法重新定位窗口，但对于像游戏这样占据整个屏幕的应用程序来说，这可能是有用的。


    下一组复选框让我们以多种方式微调窗口的行为，其中大部分是见名知义的。一个例外是 Auto Recalculates View Loop 复选框，其名称充其量令人费解。思路是这样的：每个窗口维护一个它包含的所有视图对象的列表，用户可以通过使用
    Tab 键在这些视图之间切换。如果我们打开这个复选框，那么在应用程序运行时添加到窗口的任何视图都将自动插入到这个“循环”中的某个位置。另一个例外是 Restorable
    复选框。打开 Restorable 告诉 Cocoa 我们的窗口应该在应用程序启动之间尝试恢复到相同的状态。在我们的帮助下，我们的应用程序可以重新打开用户在退出时打开的窗口，甚至可以将它们恢复到用户退出时的滚动位置和选择状态。


    在它下面，你会找到一系列关于窗口如何与桌面交互的菜单。Mac 桌面环境有一个名为 Mission Control 的功能（位于“系统偏好设置”应用程序中），它允许用户拥有多个桌面（或空间）并在它们之间移动窗口，以及显示所有窗口或单个应用程序的所有窗口。在
    Mac OS/X 的早期版本中，Mission Control 是两个独立的功能，分别称为 Spaces 和 Exposé，在 Attributes Inspector
    中它们仍然以此称呼。


    一般来说，我们会将这些选项保留为 `Inferred Behavior`，这意味着窗口行为正常。对于 Spaces，其他选择是 `Can Join All
    Spaces`，这意味着窗口将始终可见；或者 `Move To Active Space`，这意味着窗口在变为活动状态时会移动到当前空间，而不是将活动桌面切换到窗口所在的桌面。对于
    Exposé，`Inferred Behavior` 等同于 `Managed Behavior`，这意味着窗口会对 Exposé 操作做出正常响应。其他选择包括
    `Transient`，这会导致窗口在 Exposé 被激活时隐藏（这是面板的默认行为）；以及 `Stationary`，这意味着窗口完全忽略 Exposé。下一个选项涉及此窗口是否应包含在用户可以通过
    Window ➤ Cycle Through Windows（⌘-`）命令循环切换的窗口集合中。接下来是窗口是否支持全屏选项，其中窗口会扩展到自己的空间并占据整个显示器，就像
    iOS 应用程序一样，包括隐藏菜单栏。如果将此设置为 `Primary Window`，则标题栏右侧会显示一个特殊控件来激活全屏模式。


    最后，有一些与窗口内存使用相关的选项。最好保持 `Deferred` 开启，因为这会跳过为窗口分配一些内部内存，直到窗口即将实际显示。此外，我们应该保持 `One
    Shot` 关闭。如果它开启，那么一旦窗口关闭，同一内部内存就会被释放，因此只有在相关窗口是每个会话只能显示一次的临时窗口时才应开启，例如启动画面。最后，弹出窗口为我们提供了将窗口的“后备存储”从
    `Buffered` 切换为 `Retained` 或 `Unretained` 的能力。永远不要那样做！`Retained` 和 `Unretained`
    选项仅用于支持特定类型的遗留代码，所有新的 Cocoa 应用程序都应针对每个窗口将此设置保留为 `Buffered`。


    现在，从 Object Library 窗口中拖出一个 `NSPanel`，再次查看 Attributes Inspector；注意 Style 弹出菜单以及我们在检查
    `NSWindow` 时看到的一些额外复选框。这里的样式选项包括 `Utility`，如果选择，它会赋予面板独特的外观，并使其浮动在应用程序的其他窗口之上；以及
    `HUD`，它赋予窗口更具特色的“平视”外观。尝试其中一些样式，看看它们如何影响面板的外观。面板的行为也可能与窗口不同。面板可以在全屏下拉菜单中标记为 `Auxiliary
    Window`，这意味着它在全屏模式下，会在同一空间中浮动于另一个窗口之上。这对于诸如影响另一个窗口中文档的“查找”或“信息”面板非常有用。探索完毕后，从
    nib 文件中删除该面板。


    ### 标准系统面板


    除了旨在让我们填充自己的视图和控件的通用窗口类之外，Cocoa 还包含一些专门化的窗口子类，供我们在应用程序中使用。这些子类旨在满足各种应用程序的需求，因此使用它们可以免费获得许多功能，同时为我们的用户提供他们可能在其他应用程序中使用过的熟悉界面。

