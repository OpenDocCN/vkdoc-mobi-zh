    Core Data 会首先寻找与磁盘上数据存储中编码的版本信息匹配的模型。如果找到匹配的模型，Core Data 就会在应用 bundle 内查找是否存在可以将数据存储从旧结构转换为新结构的映射模型。如果找不到这样的映射模型，它将尝试通过推断映射来执行轻量级迁移。如果无法推断出映射，则该过程将停止，方法会返回`nil`，并在`error`参数中返回错误信息。如果发生这种情况，下一行代码将是`[[NSApplication
    sharedApplication] presentError:error]`，这会导致应用弹出一个错误提示，内容为：“用于打开持久化存储的托管对象模型版本与用于创建该持久化存储的版本不兼容。”不过，在我们的案例中，MythBase
    确实有两个可用的模型，并且映射可以被推断出来，因此系统会自动执行轻量级迁移。旧的数据库文件会先备份，以防出现严重问题。得益于这一自动流程，我们的用户无需担心导入或转换数据。当他们运行新版本的应用时，之前存储的数据会自动完成转换，并且除非数据存储非常大，否则转换速度很快。


    ## 更新图形用户界面


    既然我们已经准备好了更新后的数据模型，接下来就该创建图形用户界面（GUI）了。我们将保留现有窗口几乎不变，并添加几个新窗口，一个专注于`MythicalBands`，另一个专注于`MythicalVenues`。


    ### 创建乐队窗口


    首先，我们将创建一个新窗口来显示`MythicalBands`的列表。与第 8 章中展示的过程类似，我们将使用一些`NSTableView`、一个`NSArrayController`以及
    Cocoa 绑定来连接所有元素。我们首先将一个表格视图连接到乐队列表，确保其能正常工作，然后再考虑将一些`MythicalPersons`连接到这些乐队上。


    首先，在 Xcode 中打开`MainMenu.xib`。从对象库中拖出一个新的`NSWindow`。使用属性检查器将此窗口命名为“Mythical Bands”。从对象库中拖出一个`NSTableView`，并将其放入窗口的左上角，让蓝色参考线指示放置位置。在属性检查器中，将其设置为基于视图（View-based）的表格视图，并且只有一列（而不是两列）。向右拉伸表格视图，直到其右边缘碰到窗口右侧的蓝色参考线，使其宽度几乎填满整个窗口。将其稍微向下移动，以便为即将添加的搜索字段留出空间。


    现在，将搜索字段拖到表格视图上方的空间中，靠近窗口的右边缘。定位它，使其底部边缘和右边缘出现蓝色参考线。这将设置好尺寸调整行为，使得搜索字段始终固定在窗口顶部，而表格视图则在其下方调整大小。


    接下来，我们需要“删除”和“添加”两个按钮。保持外观一致很重要，因此请使用与主窗口中相同的渐变按钮。将渐变按钮拖到表格视图正下方的空间中。将按钮的右边缘与表格视图的右边缘对齐。会出现蓝色参考线，将其定位在表格视图下方适当距离处，并与右边缘对齐。双击按钮内的文本，将标签更改为“Add”。在“添加”按钮左侧再拖出一个按钮。当它与“添加”按钮垂直对齐时，会出现一整套蓝色参考线，并会自动吸附到距左侧正确的距离位置。双击按钮内的文本，将其重新标记为“Remove”。


    这样我们就获得了足够操作乐队列表的 UI 元素，但还需要一个对象将所有内容串联起来，那就是`NSArrayController`。从对象库中拖出一个数组控制器（在搜索框中输入“array”以缩小列表范围），并将其放到乐队窗口下方的网格纸上。它会消失，并显示在
    Interface Builder 面板左侧的对象停靠栏中。缓慢双击新的数组控制器，将其重命名为“Mythical Bands”。选中“Mythical Bands”对象后，打开属性检查器。在“对象控制器”部分，将模式从“类”改为“实体名称”。在“实体名称”字段中输入字符串“MythicalBand”，并勾选“准备内容”复选框。完成后，Xcode
    窗口应该类似图 9-7 所示。


    ![A978-1-4302-4543-8_9_Fig7_HTML.jpg](img/A978-1-4302-4543-8_9_Fig7_HTML.jpg)


    图 9-7. 神话乐队窗口的初始形态

    '
- fmt: '# Setting Up Cocoa Bindings


    Now that we’ve got the objects laid out, we need to set up the appropriate Cocoa
    bindings to actually connect the UI controls with the Core Data-managed list of
    bands. We’ll start with the array controller because it’s already selected. Switch
    to the Bindings Inspector, and expand the Parameters section. Check the `Bind
    to` checkbox, and then select `App Delegate` from the pull-down menu. Then, enter
    `managedObjectContext` in the `Model Key Path` field. This connects the array
    controller to the Core Data machinery in the `App Delegate`.


    Now it’s time to tackle the bindings for the table view. Since this table view
    only has one column, it’ll be less hassle than the one in the Mythical Persons
    window. Start by selecting the table view itself. This is most easily done in
    the outline view of the Object Dock on the left. Once it’s selected, go over to
    the Bindings Inspector (which should still be open from the last paragraph) and
    expand the `Content` section within the `Table Content` heading. Check the `Bind
    to` checkbox, and ensure that the pull-down menu shows `Mythical Bands` and that
    `Controller Key` shows `arrangedObjects`. As before, we also want to have the
    selected row in the table view get passed back to the array controller. To set
    this, expand the `Selection Indices` section of the Bindings Inspector. Check
    the `Bind to` checkbox here, set the pull-down menu to `Mythical Bands`, and set
    the `Controller Key` to `selectionIndexes`. This will look a lot like Figure [8-10](#A978-1-4302-4543-8_9_Chapter.html#Fig10)
    in the previous chapter.


    With the binding for the table view itself in place, we can set up the binding
    for the column. In the Object Dock, expand the table view’s subviews until it
    shows the one labeled “Static Text – Table View Cell.” In the Bindings Inspector,
    expand the `Value` section and select the `Bind to` checkbox, set the pull-down
    menu to read `Table Cell View`, and set the `Model Key Path` to be `objectValue.name`.
    This should look like Figure [9-8](#A978-1-4302-4543-8_9_Chapter.html#Fig8). Then,
    switch to the Attributes Inspector, and change the `Behavior` pop-up menu from
    `None` to `Editable`. If we don’t make this change, we won’t be able to actually
    enter the name of a new band in the table view.


    Lastly, we’ll deal with the Search box. Select the Search field at the upper right
    corner of the screen, and open the Bindings Inspector. Near the bottom of the
    Bindings Inspector is a section titled `Predicate`. Open it up and check the `Bind
    to` checkbox, binding it to `Mythical Bands`. The `Controller Key` should say
    `filterPredicate`. Set the `Display Name` to `Name` and the predicate format to
    `name contains[c] $value` where `$value` indicates the contents of the search
    box, and `name` indicates the `MythicalBand` entity attribute that should be searched.
    This is just like the binding we did for the Search field in [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html).


    ![A978-1-4302-4543-8_9_Fig8_HTML.jpg](A978-1-4302-4543-8_9_Fig8_HTML.jpg)


    **Figure 9-8.** Setting bindings for the Mythical Bands table view


    For the buttons, we’ll use the same process as in the last chapter, using a combination
    of target-action and Cocoa bindings. We’ll use target-action for when a button
    is pressed, and Cocoa bindings to enable or disable the buttons as appropriate.
    We’ll start with the actions. Select the `Add` button, and control-drag to the
    `Mythical Bands` array controller. Select the `add:` action from the pop-up menu.
    Then, select the `Remove` button, and Control-drag to the same place. This time,
    select the `remove:` action. To enable and disable the buttons based on the selection
    in the table view, we need to use the Bindings Inspector. Select the `Add` button,
    open the Bindings Inspector, and expand the `Enabled` section under `Availability`.
    Check the `Bind to` checkbox, set the pull-down menu to `Mythical Bands`, and
    change the `Controller Key` field to read `canAdd`. For the `Remove` button, do
    the same thing, but use `canRemove` for the `Controller Key` field.


    Now save your changes, and run the app. The new window appears, and we can add
    some bands, edit their names directly in the table view, and save our changes.


    ## Giving Useful Names to Array Controllers


    There’s a change we want to recommend that you make in your nib file that will
    be helpful when configuring the new bindings we’re about to create. It won’t affect
    the behavior of the app, but you’ll probably be glad that you made the change,
    and the text going forward assumes that you’ve made this update.


    The connection between the Core Data infrastructure and the UI all runs through
    an `NSArrayController`. The `NSArrayController` that we set up in the last chapter
    is named `Mythical Person Array Controller`. This is a long name, and is a bit
    longer than what the Binding Inspector in Xcode is really designed to show. In
    fact, it barely fits into the pop-up buttons in the Bindings Inspector, and they
    make all of the summary info shown for each bound attribute overflow, with some
    of its text being replaced with ellipses. For the `Mythical Bands` array controller,
    we didn’t put the “Array Controller” in the name, which makes it much easier to
    work with.


    You can improve this situation by changing the name of the controller. Changing
    the names won’t modify any of the bindings you’ve configured or change anything
    for your application’s users. The only one who’ll see the change at all is you,
    but remember that you’re important, too. Just as it’s important to format your
    source code in such a way that it’s easy for you to scan through it and find what
    you need, doing what you can to streamline your editing experience in Interface
    Builder will save you time and frustration.


    So, if you want to make this change, go to the main nib window, make sure you’re
    looking at the Object Dock along the left, and find your `Mythical Person Array
    Controller`. Click on its name, and change it to just `Mythical Person`. Doing
    this will eliminate some words that don’t add any value (e.g., “Array” and “Controller”)
    and that might otherwise be spread pretty liberally throughout your nib file and
    code, and leave you with a display that’s hopefully easier for your eyes and brain
    to scan and comprehend quickly.'
