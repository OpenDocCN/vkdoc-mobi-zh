    ## 准备好了吗？


    Mac 是一个卓越的计算平台，而 Cocoa 是构建 Mac 应用程序的最佳工具。如果你从其他平台转向 Mac，可能会觉得 Cocoa 和 Objective-C
    有些令人摸不着头脑。尽管一开始可能会难以适应，但我们相信，随着你阅读本书的深入，你将很快掌握 Cocoa 的“做事方式”。只要稍加坚持，一切都会变得清晰明了。


    有一点需要牢记：本书中的练习并非一份做完就能让你成为 Cocoa 开发大师的清单。在每一步中，务必确保你理解了自己刚刚完成的操作，然后再进入下一个项目。不要害怕修改代码。大胆实验并观察结果。这是理解在
    Cocoa 这样的环境中编码复杂性的最佳方法之一。


    此外，请记住我们为读者设立了一个讨论本书练习和内容的留言论坛。因此，如果你遇到困难，或者想与我们以及其他 Cocoa 开发者探讨任何 Cocoa 编程话题，请访问
    [`http://learncocoa.org`](http://learncocoa.org) 并注册讨论论坛。


    好了，如果你已经安装了 Xcode，就请翻到下一页。如果还没装，赶紧去装吧！然后，我们开始吧！


    # 2. Hello, World


    **摘要**


    你可能很清楚，将任何编程书籍中的第一个项目称为“Hello, World”已经成为一种传统。遵循“如果没有坏，就不要去修它”的原则，我们将坚持这一传统。


    ## 构建“Hello, World”


    现在，你应该已经在你的机器上安装了 Xcode。你还应该将 `Learn Cocoa Projects` 文件夹安全地存放在硬盘的某个位置。如果出于某种原因你还没有这样做，请直接回到第
    1 章（不要跳过，也不要试图走捷径）并重新阅读相关章节。


    我们将处理的第一个项目位于 `Chapter02/Chapter2` 文件夹中。启动位于 `Applications` 文件夹中的 Xcode。以防你从未使用过
    Xcode，我们将引导你完成创建新项目的整个过程。


    首先从“文件”菜单中选择“新建项目”，或者输入 `⇧⌘N`。当新建项目助手出现时（图 2-1），在左栏的 Mac OS X 标题下选择“应用程序”，然后在右上方面板中选择
    Cocoa 应用程序图标，并点击“下一步”。


    ![A978-1-4302-4543-8_2_Fig1_HTML.jpg](img/A978-1-4302-4543-8_2_Fig1_HTML.jpg)


    **图 2-1.** 从 Xcode 的新建项目助手中选择 Cocoa 应用程序项目模板


    项目选项窗口提供了多个选择（图 2-2）。我们需要为应用程序指定一个名称。“Chapter2”是一个不错的选择。我们还需要提供一个公司标识符，其格式类似于反向域名（很像
    Java 包名或 C# 命名空间）。如果我们的域名是 `megacorp.com`，那么这里就选择 `com.megacorp`。Mac OS X 使用产品名称和公司标识符的组合作为我们程序在系统以及
    Mac App Store 中的唯一名称。不过，由于我们不会在本机之外分发这个应用，我们可以选择任何我们喜欢的名称。这里最后一个重要字段是类前缀。我们将看到，许多
    Cocoa 类都以 `NS` 或 `CF` 开头。对于这些类，Xcode 在创建新项目时会为我们生成一些文件，并使用我们在这里提供的前缀。现在，输入 `Book`。本章中我们不会用到其他字段，因此可以保留默认值。点击“下一步”。


    ![A978-1-4302-4543-8_2_Fig2_HTML.jpg](img/A978-1-4302-4543-8_2_Fig2_HTML.jpg)


    **图 2-2.** 从 Xcode 的新建项目助手中指定新 Cocoa 应用程序的选项


    接下来会弹出标准的保存窗口，用于设置项目的位置（图 2-3）。Xcode 会在我们选择的位置（例如我们的 `Documents` 文件夹或一个新创建的用于存放我们自己构建的
    Xcode 项目的独立文件夹）中创建一个以项目名称命名的新文件夹。将 Xcode 项目保存在哪里其实并不重要，但如果始终将项目保存在一个位置，以后会更容易找到。我们还可以选择让
    Xcode 使用 Git（一个强大的开源分布式版本控制系统）为项目配置版本控制。目前，我们也可以保留默认设置。


    ![A978-1-4302-4543-8_2_Fig3_HTML.jpg](img/A978-1-4302-4543-8_2_Fig3_HTML.jpg)


    **图 2-3.** 命名项目并选择保存位置


    选择位置后，会弹出一个新项目窗口（如图 2-4 所示）。尽管你可能已经熟悉 Xcode，但请花点时间看看这个项目窗口。我们将在这里度过大量时间，所以让我们确保大家都能理解。与许多为
    Mac OS X 10.7 Lion 及更新版本构建的应用程序一样，Xcode 包含一个全屏选项。由于 Xcode 是一个复杂的应用程序，它需要大量的屏幕空间才能发挥最佳效果，我们现在应该点击窗口右上角的箭头使其全屏显示。


    ![A978-1-4302-4543-8_2_Fig4_HTML.jpg](img/A978-1-4302-4543-8_2_Fig4_HTML.jpg)


    **图 2-4.** Xcode 中我们项目的主窗口

