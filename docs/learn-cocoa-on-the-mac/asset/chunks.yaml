- fmt: '# Creating a Venue Window


    Now it’s time to create one more window for displaying and editing `MythicalVenues`.
    The process of making this window will be a lot like what we did to make the Mythical
    Bands window—a window, a table view, a couple buttons, and an `NSArrayController`.
    Since there aren’t that many truly mythical venues, we’ll forego the Search box
    on this window. And, since we’ve done this once before, we’ll go a little faster.


    To get started, drag a window out from the Object Library onto the Interface Builder
    canvas. In the Attributes Inspector, title it “Mythical Venues.” It’s a bit bigger
    than we’ll need, so we can shrink it vertically to be about 2/3rds as tall and
    a bit narrower as well. Drag out a table view and position it in the upper-left
    hand corner of the screen, letting the blue guidelines inform us where to position
    it. Expand the table view to fill the window, as shown back in Figure [9-1](#A978-1-4302-4543-8_9_Chapter.html#Fig1).
    In the Attributes Inspector for the table view, change its Content Mode to be
    view-based, and change it to have one column. Expand the one column to fill out
    the table view’s width.


    Drag out a Gradient button to the window, and position it below the lower-right
    edge of the table view. This will be our Add button, so double-click it and change
    the title to “Add.” Drag out another and position it just to the left of the Add
    button, and title this one “Remove.” As always, the blue guidelines are our friends
    for getting the position right.


    The next thing we’ll need is an `NSArrayController`. Grab one of those from the
    Object Library and drag it out onto the Interface Builder canvas. In the Object
    Dock on the left, title it “Mythical Venues.” In the Attributes Inspector, set
    its Mode to “Entity Name,” set the entity name to “MythicalVenue,” and check the
    Prepares Content checkbox so that it will fetch all the venues when the nib is
    loaded. We also need to connect the Mythical Venues array controller to the managed
    object context provided by the App Delegate. In the Bindings Inspector, expand
    the Parameters section at the bottom. Check the Bind to checkbox, set the pull-down
    menu to App Delegate, and set the Model Key Path to “managedObjectContext.”


    We’ve now got to wire this all together. Let’s start with the table view. Select
    the table view (remember that it’s embedded within a scroll view). In the Bindings
    Inspector, expand the Content section under Table Content. Then, set the Bind
    to checkbox and set the pull-down menu to Mythical Venues. The default controller
    key, `arrangedObjects`, is just fine. Now for the column. Just as we did with
    the Band Members table view above, drill down to the “Static Text – Table View
    Cell” down inside the table view. In the Bindings Inspector, expand the Value
    section. The pull-down menu should read Table Cell View. Check the Bind to checkbox,
    and set the Model Key Path to be “objectValue.name” while leaving the Controller
    Key field blank. While we’re here, switch to the Attributes Inspector, and change
    the Behavior setting from None to Editable so that when we create a new Venue,
    we can set the name inside the table view.


    Next, we’ll tackle the buttons. Select the Add button, and control-drag to the
    Mythical Venues array controller. Select the `add:` action from the pop-up menu.
    Then, select the Remove button, and Control-drag to the same place. This time,
    select the `remove:` action. To enable and disable the buttons based on the selection
    in the table view, we need to use the Bindings Inspector. Select the Add button,
    open the Bindings Inspector, and expand the Enabled section under Availability.
    Check the Bind to checkbox, set the pull-down menu to Mythical Venues, and change
    the Controller Key field to read “canAdd.” For the Remove button, do the same
    thing, but use “canRemove” for the Controller Key field.


    Once again, it’s time to save our work, hit Run in Xcode, and see the new functionality:
    we can add and remove new Mythical Venues.


    # Adding a Gig List to the Band Window


    The final piece of functionality we need to add is the ability to create `MythicalGigs`.
    `MythicalGigs` sit between `MythicalBands` and `MythicalVenues`, each of which
    may have multiple gigs. Gigs, meanwhile, each have exactly one band and one venue.
    We’ll add another table view to contain the needed functionality, placed beside
    the members table view in the Mythical Band window. Each row of the table view
    will contain fields for displaying the gig’s `performanceDate` and venue. We’ll
    also be setting up a details area below the table view to allow editing these
    fields (see Figure [9-12](#A978-1-4302-4543-8_9_Chapter.html#Fig12)).


    ![A978-1-4302-4543-8_9_Fig12_HTML.jpg](A978-1-4302-4543-8_9_Fig12_HTML.jpg)


    Figure 9-12. This is what the final Mythical Bands window will look like


    Start by finding an `NSArrayController` in the Object Library. Drag it to the
    main nib window, and name it “Gigs.” Open the Attributes Inspector, set Mode to
    Entity and enter “MythicalGig” for the Entity Name, then click to turn on the
    Prepares Content checkbox. Now switch to the Bindings Inspector. Bind the new
    array controller’s Managed Object Context to App Delegate’s `managedObjectContext`,
    and bind its Content Set through Mythical Bands, with Controller Key set to “selection”
    and Model Key Path set to “gigs.”


    Next, we’re going to set up the GUI itself. Drag another table view from the Object
    Library to the Mythical Bands window, along with a Gigs label, and lay them out
    as shown in Figure [9-12](#A978-1-4302-4543-8_9_Chapter.html#Fig12). This table
    view is going to display one column of dates and one column with the name of the
    venue. The default table view cells will work just fine for this. First, set the
    table view’s Mode to be view-based in the Attributes Inspector. Then, switch over
    to the Bindings Inspector, and expand the Content area under Table Content. Bind
    it to Gigs, leaving the Controller Key set to “arrangedObjects” and the Model
    Key Path blank. We also need to bind the Selection Indices. Bind that one to Gigs
    as well, with the Controller Key set to “selectionIndices” and the Model Key Path
    blank.


    The headers of the table columns should have titles—“Date” for the left column
    and “Venue” for the right—so set those now. Then, expand the object hierarchy
    in the Object Dock and drill down to the “Static Text – Table View Cell” object
    for the Date column. In the Bindings Inspector, bind it to Table Cell View, with
    the Model Key Path set to “objectValue.performanceDate.” Then expand the object
    hierarchy below the Venue column down to the “Static Text – Table View Cell” in
    that column. In the Bindings Inspector, bind that one to `objectValue.venue.name`.
    This will cover all that we need to do for the table view!


    We also will need to have Add and Remove buttons so the user can create and delete
    gigs. Select and duplicate the two buttons in the upper part of the window, and
    drag the new ones down below the table view of gigs. Control-drag from the Add
    button to the Gigs controller and select the `add:` action, then Control-drag
    from the Remove button to the Gigs controller and select the `remove:` action.
    As a final touch, we can make these buttons automatically enable and disable themselves
    appropriately as the table view’s content and selection change by using some simple
    bindings. Select the Add button, open the Bindings Inspector, and bind its Enabled
    attribute to the Gigs controller’s `canAdd` controller key. Then select the Remove
    button, and bind it to the Gigs controller’s `canRemove` controller key.'
  raw: '### Creating a Venue Window


    Now it’s time to create one more window for displaying and editing `MythicalVenues`.
    The process of making this window will be a lot like what we did to make the Mythical
    Bands window—a window, a table view, a couple buttons, and an `NSArrayController`.
    Since there aren’t that many truly mythical venues, we’ll forego the Search box
    on this window. And, since we’ve done this once before, we’ll go a little faster.


    To get started, drag a window out from the Object Library onto the Interface Builder
    canvas. In the Attributes Inspector, title it “Mythical Venues.” It’s a bit bigger
    than we’ll need, so we can shrink it vertically to be about 2/3rds as tall and
    a bit narrower as well. Drag out a table view and position it in the upper-left
    hand corner of the screen, letting the blue guidelines inform us where to position
    it. Expand the table view to fill the window, as shown back in Figure [9-1](#A978-1-4302-4543-8_9_Chapter.html#Fig1).
    In the Attributes Inspector for the table view, change its Content Mode to be
    view-based, and change it to have one column. Expand the one column to fill out
    the table view’s width.


    Drag out a Gradient button to the window, and position it below the lower-right
    edge of the table view. This will be our Add button, so double-click it and change
    the title to “Add.” Drag out another and position it just to the left of the Add
    button, and title this one “Remove.” As always, the blue guidelines are our friends
    for getting the position right.


    The next thing we’ll need is an `NSArrayController`. Grab one of those from the
    Object Library and drag it out onto the Interface Builder canvas. In the Object
    Dock on the left, title it “Mythical Venues.” In the Attributes Inspector, set
    its Mode to “Entity Name,” set the entity name to “MythicalVenue,” and check the
    Prepares Content checkbox so that it will fetch all the venues when the nib is
    loaded. We also need to connect the Mythical Venues array controller to the managed
    object context provided by the App Delegate. In the Bindings Inspector, expand
    the Parameters section at the bottom. Check the Bind to checkbox, set the pull-down
    menu to App Delegate, and set the Model Key Path to “managedObjectContext.”


    We’ve now got to wire this all together. Let’s start with the table view. Select
    the table view (remember that it’s embedded within a scroll view). In the Bindings
    Inspector, expand the Content section under Table Content. Then, set the Bind
    to checkbox and set the pull-down menu to Mythical Venues. The default controller
    key, arrangedObjects, is just fine. Now for the column. Just as we did with the
    Band Members table view above, drill down to the “Static Text – Table View Cell”
    down inside the table view. In the Bindings Inspector, expand the Value section.
    The pull-down menu should read Table Cell View. Check the Bind to checkbox, and
    set the Model Key Path to be “objectValue.name” while leaving the Controller Key
    field blank. While we’re here, switch to the Attributes Inspector, and change
    the Behavior setting from None to Editable so that when we create a new Venue,
    we can set the name inside the table view.


    Next, we’ll tackle the buttons. Select the Add button, and control-drag to the
    Mythical Venues array controller. Select the `add:` action from the pop-up menu.
    Then, select the Remove button, and Control-drag to the same place. This time,
    select the `remove:` action. To enable and disable the buttons based on the selection
    in the table view, we need to use the Bindings Inspector. Select the Add button,
    open the Bindings Inspector, and expand the Enabled section under Availability.
    Check the Bind to checkbox, set the pull-down menu to Mythical Venues, and change
    the Controller Key field to read “canAdd.” For the Remove button, do the same
    thing, but use “canRemove” for the Controller Key field.


    Once again, it’s time to save our work, hit Run in Xcode, and see the new functionality:
    we can add and remove new Mythical Venues.


    ### Adding a Gig List to the Band Window


    The final piece of functionality we need to add is the ability to create `MythicalGigs`.
    `MythicalGigs` sit between `MythicalBands` and `MythicalVenues`, each of which
    may have multiple gigs. Gigs, meanwhile, each have exactly one band and one venue.
    We’ll add another table view to contain the needed functionality, placed beside
    the members table view in the Mythical Band window. Each row of the table view
    will contain fields for displaying the gig’s performanceDate and venue. We’ll
    also be setting up a details area below the table view to allow editing these
    fields (see Figure [9-12](#A978-1-4302-4543-8_9_Chapter.html#Fig12)).


    ![A978-1-4302-4543-8_9_Fig12_HTML.jpg](A978-1-4302-4543-8_9_Fig12_HTML.jpg)


    Figure 9-12.


    This is what the final Mythical Bands window will look like


    Start by finding an NSArrayController in the Object Library. Drag it to the main
    nib window, and name it “Gigs.” Open the Attributes Inspector, set Mode to Entity
    and enter “MythicalGig” for the Entity Name, then click to turn on the Prepares
    Content checkbox. Now switch to the Bindings Inspector. Bind the new array controller’s
    Managed Object Context to App Delegate’s `managedObjectContext`, and bind its
    Content Set through Mythical Bands, with Controller Key set to “selection” and
    Model Key Path set to “gigs.”


    Next, we’re going to set up the GUI itself. Drag another table view from the Object
    Library to the Mythical Bands window, along with a Gigs label, and lay them out
    as shown in Figure [9-12](#A978-1-4302-4543-8_9_Chapter.html#Fig12). This table
    view is going to display one column of dates and one column with the name of the
    venue. The default table view cells will work just fine for this. First, set the
    table view’s Mode to be view-based in the Attributes Inspector. Then, switch over
    to the Bindings Inspector, and expand the Content area under Table Content. Bind
    it to Gigs, leaving the Controller Key set to “arrangedObjects” and the Model
    Key Path blank. We also need to bind the Selection Indices. Bind that one to Gigs
    as well, with the Controller Key set to “selectionIndices” and the Model Key Path
    blank.


    The headers of the table columns should have titles—“Date” for the left column
    and “Venue” for the right—so set those now. Then, expand the object hierarchy
    in the Object Dock and drill down to the “Static Text – Table View Cell” object
    for the Date column. In the Bindings Inspector, bind it to Table Cell View, with
    the Model Key Path set to “objectValue.performanceDate.” Then expand the object
    hierarchy below the Venue column down to the “Static Text – Table View Cell” in
    that column. In the Bindings Inspector, bind that one to objectValue.venue.name.
    This will cover all that we need to do for the table view!


    We also will need to have Add and Remove buttons so the user can create and delete
    gigs. Select and duplicate the two buttons in the upper part of the window, and
    drag the new ones down below the table view of gigs. Control-drag from the Add
    button to the Gigs controller and select the `add:` action, then Control-drag
    from the Remove button to the Gigs controller and select the `remove:` action.
    As a final touch, we can make these buttons automatically enable and disable themselves
    appropriately as the table view’s content and selection change by using some simple
    bindings. Select the Add button, open the Bindings Inspector, and bind its Enabled
    attribute to the Gigs controller’s `canAdd` controller key. Then select the Remove
    button, and bind it to the Gigs controller’s `canRemove` controller key.'
  trans: '

    # 创建场馆窗口


    现在，我们需要再创建一个用于显示和编辑 `MythicalVenues` 的窗口。制作这个窗口的过程与创建 Mythical Bands 窗口非常相似——需要一个窗口、一个表格视图、几个按钮以及一个
    `NSArrayController`。由于真正具有神话色彩的场馆数量并不多，我们将省略此窗口中的搜索框。此外，由于我们已经做过一次类似的工作，这次可以加快进度。


    首先，从对象库中拖出一个窗口放到 Interface Builder 画布上。在属性检查器中，将其标题设置为“Mythical Venues”。这个窗口比我们需要的尺寸稍大，因此可以将其垂直缩小到大约三分之二的高度，并适当收窄宽度。拖出一个表格视图，将其放置在屏幕的左上角，让蓝色参考线提示我们具体位置。将表格视图扩展到填满窗口，如图
    9-1 所示。在表格视图的属性检查器中，将其内容模式更改为基于视图（view-based），并设置为只有一列。将这一列扩展到填满表格视图的宽度。


    向窗口中拖出一个渐变按钮（Gradient button），将其放置在表格视图右下边缘的下方。这将作为我们的“添加”按钮，因此双击它并将标题改为“Add”。再拖出另一个按钮，将其放置在“Add”按钮的左侧，并将这个按钮的标题改为“Remove”。一如既往，蓝色参考线能帮助我们精确地摆放位置。


    接下来，我们需要一个 `NSArrayController`。从对象库中抓取一个并将其拖到 Interface Builder 画布上。在左侧的对象停靠栏中，将其命名为“Mythical
    Venues”。在属性检查器中，将其模式设置为“Entity Name”，将实体名称设置为“MythicalVenue”，并勾选“Prepares Content”复选框，以便在加载
    nib 文件时获取所有场馆。我们还需要将 Mythical Venues 数组控制器连接到 App Delegate 提供的托管对象上下文。在绑定检查器中，展开底部的
    Parameters 部分。勾选“Bind to”复选框，将下拉菜单设置为“App Delegate”，并将模型键路径（Model Key Path）设置为“managedObjectContext”。


    现在，我们需要将所有部分连接起来。先从表格视图开始。选择表格视图（记住它内嵌在滚动视图中）。在绑定检查器中，展开“Table Content”下的“Content”部分。然后，勾选“Bind
    to”复选框，并将下拉菜单设置为“Mythical Venues”。默认的控制器键 `arrangedObjects` 就可以。接下来处理列。就像我们之前对
    Band Members 表格视图所做的操作一样，深入表格视图内部，找到“Static Text – Table View Cell”。在绑定检查器中，展开“Value”部分。下拉菜单应显示为“Table
    Cell View”。勾选“Bind to”复选框，将模型键路径（Model Key Path）设置为“objectValue.name”，同时将控制器键（Controller
    Key）字段留空。趁在此处，切换到属性检查器，将 Behavior 设置从“None”改为“Editable”，这样当我们创建新场馆时，就可以在表格视图内设置名称。


    接下来，处理按钮。选择“Add”按钮，按住 Control 键拖拽到 Mythical Venues 数组控制器上。从弹出菜单中选择 `add:` 操作。然后，选择“Remove”按钮，按住
    Control 键拖拽到同一个位置。这次，选择 `remove:` 操作。为了根据表格视图中的选择来启用或禁用按钮，我们需要使用绑定检查器。选择“Add”按钮，打开绑定检查器，展开“Availability”下的“Enabled”部分。勾选“Bind
    to”复选框，将下拉菜单设置为“Mythical Venues”，并将控制器键（Controller Key）字段改为“canAdd”。对于“Remove”按钮，执行相同操作，但控制器键字段使用“canRemove”。


    再次保存我们的工作，在 Xcode 中点击运行，查看新功能：我们可以添加和删除新的 Mythical Venues。


    # 为乐队窗口添加演出列表


    我们需要添加的最后一个功能是创建 `MythicalGigs` 的能力。`MythicalGigs` 位于 `MythicalBands` 和 `MythicalVenues`
    之间，每个乐队或场馆可能有多场演出。而每场演出则恰好对应一个乐队和一个场馆。我们将添加另一个包含所需功能的表格视图，放置在 Mythical Band 窗口中的成员表格视图旁边。该表格视图的每一行都将包含用于显示演出的
    `performanceDate` 和场馆的字段。我们还会在表格视图下方设置一个详细信息区域，用于编辑这些字段（参见图 9-12）。


    ![A978-1-4302-4543-8_9_Fig12_HTML.jpg](img/A978-1-4302-4543-8_9_Fig12_HTML.jpg)


    图 9-12. 最终 Mythical Bands 窗口的外观


    首先，在对象库中找到 `NSArrayController`。将其拖到主 nib 窗口中，并命名为“Gigs”。打开属性检查器，将模式设置为“Entity”，在“Entity
    Name”中输入“MythicalGig”，然后点击勾选“Prepares Content”复选框。现在切换到绑定检查器。将新数组控制器的托管对象上下文（Managed
    Object Context）绑定到 App Delegate 的 `managedObjectContext`，并将其内容集（Content Set）通过
    Mythical Bands 进行绑定，控制器键设置为“selection”，模型键路径设置为“gigs”。


    接下来，我们要设置 GUI 本身。从对象库中将另一个表格视图拖到 Mythical Bands 窗口，同时拖入一个“Gigs”标签，并按图 9-12 所示进行布局。这个表格视图将显示一列日期和一列场馆名称。默认的表格视图单元格就能很好地满足这一需求。首先，在属性检查器中将表格视图的模式设置为基于视图（view-based）。然后，切换到绑定检查器，展开“Table
    Content”下的“Content”区域。将其绑定到“Gigs”，控制器键保持为“arrangedObjects”，模型键路径留空。我们还需要绑定选择索引（Selection
    Indices）。同样将其绑定到“Gigs”，控制器键设置为“selectionIndices”，模型键路径留空。


    表格列的标题应该有文字——左侧列标题为“Date”，右侧列标题为“Venue”，现在就来设置它们。然后，在对象停靠栏中展开对象层级，深入找到“Date”列的“Static
    Text – Table View Cell”对象。在绑定检查器中，将其绑定到“Table Cell View”，模型键路径设置为“objectValue.performanceDate”。接着，展开“Venue”列下的对象层级，找到该列中的“Static
    Text – Table View Cell”。在绑定检查器中，将其绑定到 `objectValue.venue.name`。这样，我们就完成了表格视图所需的所有操作！


    我们还需要添加和删除按钮，以便用户创建和删除演出。选中窗口上部的两个按钮并进行复制，将新按钮拖到演出表格视图的下方。按住 Control 键从“Add”按钮拖拽到“Gigs”控制器，选择
    `add:` 操作；然后按住 Control 键从“Remove”按钮拖拽到“Gigs”控制器，选择 `remove:` 操作。最后，通过使用一些简单的绑定，我们可以让这些按钮根据表格视图内容和选择的变化自动启用或禁用。选择“Add”按钮，打开绑定检查器，将其
    Enabled 属性绑定到 Gigs 控制器的 `canAdd` 控制器键。然后选择“Remove”按钮，将其绑定到 Gigs 控制器的 `canRemove`
    控制器键。

