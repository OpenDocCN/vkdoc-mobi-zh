  raw: '### Creating a Custom Attribute


    Another common sort of simple “business logic” calls for the creation of custom
    attributes that are based on the values contained in an object’s attributes. For
    example, if we have an entity with `firstName` and `lastName` attributes, we might
    want to make a custom attribute called `fullName` that combines the two together.


    This sort of thing is a piece of cake with Core Data. In our case, let’s say we
    want to add an attribute to MythicalPerson called `awesomeness`, which will be
    calculated from the MythicalPerson’s `power`, `divinity`, and `goodness`. We start
    off by defining a method called `awesomeness` in MythicalPerson’s implementation:


    `- (int)awesomeness`


    `{`


      `int awesomeness = [[self valueForKey:@"divinity"] intValue] * 10 +`


        `[[self valueForKey:@"power"] intValue] * 5 +`


        `[[self valueForKey:@"goodness"] intValue];`


      `return awesomeness;`


    `}`


    With that in place, we can call the `awesomeness` method on any MythicalPerson
    and get the result. This also works with Cocoa bindings, of course, so we can
    easily bind a GUI control’s value to this new property. Go back to Xcode, make
    the window and box a little bigger, and add a label and a level indicator from
    the Library window, something similar to Figure [8-12](#A978-1-4302-4543-8_8_Chapter.html#Fig12).


    ![A978-1-4302-4543-8_8_Fig12_HTML.jpg](A978-1-4302-4543-8_8_Fig12_HTML.jpg)


    Figure 8-12.


    MythBase, now with added Awesomeness


    Now select the Awesomeness control, and bring up the Attributes Inspector. Set
    the Style to Continuous, and the Minimum and Maximum to 0 and 1600, respectively.
    Now switch to the Bindings Inspector, and bind the level indicator’s Value via
    the Mythical Person Array Controller, with the controller key “selection” and
    the model key “awesomeness”. Xcode doesn’t know anything about Awesomeness, so
    we’ll have to type it in ourselves instead of just picking it from the combo box;
    we’re sure you’ll agree that’s a small price to pay for awesomeness.


    Save the changes, switch back to Xcode, click Run, and off we go. Switch between
    different rows in the table view and see the bar of awesomeness change. Drag a
    slider and, now wait a minute; the Awesomeness value doesn’t change! The reason
    for this is that no part of Core Data—not our model file, not our `MythicalPerson`
    class, not the controller we’re using—knows that Awesomeness depends on other
    values and needs to be recalculated if they change. This is fixed by implementing
    one more small method in `MythicalPerson`:


    `+ (NSSet *)keyPathsForValuesAffectingAwesomeness {`


      `return [NSSet setWithObjects:@"divinity", @"power", @"goodness"`,


        `nil];`


    `}`


    This is another method name that’s constructed dynamically based on an accessor
    name. We saw this pattern when validating a single attribute as well. In this
    method, we return a set of attribute names that our `awesomeness` attribute is
    dependent on. With this in place, Core Data will automatically call this method
    at some point early on in the application’s lifecycle and sort things out so that
    changes made to any attributes in the set will also trigger controllers to update
    any objects with bindings to the `awesomeness` attribute. Note the plus sign rather
    than minus sign in the method signature—this indicates that `keyPathsForValuesAffectingAwesomeness`
    is a class method, not an instance method. This is part of the Cocoa key-value
    observing system. Cocoa KVO looks for methods of this structure and calls them
    if present.


    Build and run the app, and now the green bar changes when we drag one of the other
    sliders. Awesome!


    ## Wrap Up


    In this chapter, we covered a pretty wide range of material about Core Data. We
    learned about creating a model file in Xcode and about using the combo of Core
    Data and Cocoa bindings to quickly put together a decent GUI. We also got some
    idea of the underpinnings of how Core Data stores its data and learned some basics
    about implementing our own business logic. In [Chapter 9](#A978-1-4302-4543-8_9_Chapter.html),
    we’ll build on this knowledge, learning how to complete our data models by adding
    relationships.


    # 9. Core Data Relationships


    Abstract


    The last chapter covered a lot of the basics about how Core Data works, but we
    worked with an extremely simple data model that contained just a single entity.
    In this chapter, we’re going to extend our data model to contain multiple entities
    and define relationships between those entities. We’ll also create a GUI that
    shows these relationships and lets us edit them. Along the way, we’ll catch our
    first glimpse of how Core Data deals with multiple, incompatible versions of our
    data model and how it can migrate a data store from one model version to the next.


    The last chapter covered a lot of the basics about how Core Data works, but we
    worked with an extremely simple data model that contained just a single entity.
    In this chapter, we’re going to extend our data model to contain multiple entities
    and define relationships between those entities. We’ll also create a GUI that
    shows these relationships and lets us edit them. Along the way, we’ll catch our
    first glimpse of how Core Data deals with multiple, incompatible versions of our
    data model and how it can migrate a data store from one model version to the next.


    We’ll do all of this while extending the MythBase project from [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html)
    to include some data that’s often overlooked with discussing mythical heroes and
    gods: the legendary bands they performed in! The night that Achilles and the Grecian
    Formula shook the Old Parthenon Ballroom to the ground is the stuff of legends,
    and who could forget The Four Norsemen’s farewell concert at the Clontarf Supper
    Club? The enhancements we’ll make to MythBase in this chapter (see Figure [9-1](#A978-1-4302-4543-8_9_Chapter.html#Fig1))
    will help us keep track of this crucial information.


    We’ll start out by adding all the new entities and relationships we want to our
    data model, then go on to setting up the GUI that will let us edit everything.
    To prepare for the rest of this chapter, go to the Finder and make a copy of the
    last chapter’s final MythBase project directory, then go into the new directory
    and double-click `MythBase.xcodeproj` to open it in Xcode.


    ![A978-1-4302-4543-8_9_Fig1_HTML.jpg](A978-1-4302-4543-8_9_Fig1_HTML.jpg)


    Figure 9-1. 


    The new and improved MythBase application we’ll create in this chapter


    ## Modeling New Entities and Relationships


    We’re going to be adding three new entities to MythBase: `MythicalBand`, `MythicalGig`,
    and `MythicalVenue`. We’ll also add relationships between several of them. When
    we’re done, our data model will look like Figure [9-2](#A978-1-4302-4543-8_9_Chapter.html#Fig2).


    ![A978-1-4302-4543-8_9_Fig2_HTML.jpg](A978-1-4302-4543-8_9_Fig2_HTML.jpg)


    Figure 9-2. 


    The new data model


    ### Model Versioning and Migrations


    Before we start making changes to the data model, there’s one important issue
    that needs to be addressed: migration. We’re not talking about people moving from
    one country to the next or birds flying south for the winter; we’re talking about
    our data. If you’ve ever developed a database application, you’re familiar with
    the concept of “migrating” data from one deployment version to the next. This
    typically involves writing some sort of script that makes changes to the database
    structure itself (adding, deleting, or altering tables and columns) and populates
    new fields with appropriate values. With Core Data, you don’t exactly write a
    script, but the same idea is in use. In your data store, Core Data saves some
    metadata about the structure of the data model. When your app runs, Core Data
    tries to read from the data store. If it determines that the app has a new version
    of the data model with a different structure, it will automatically update the
    data store to match the latest data model. Let’s see how this works.'
