    \ `NSArrayController` 来完成此操作，这样所有依赖的视图（任何通过同一个 `NSArrayController` 进行绑定的视图）也会自动更新。我们不是将纯字符串插入数组，而是创建一个包含所创建对象和当前时间的\
    \ `NSMutableDictionary`，将该字典作为最简单的模型对象，包含两个带键值。在 `createCharacter:` 末尾实现此更改，将\n\
    \n`[self.characterLabel setStringValue:result];`\n\n修改为\n\n```\n[self.characterArrayController\
    \ addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n  result, @\"\
    createdObject\",\n  [NSDate date], @\"timestamp\",\n  nil]];\n```\n\n回想一下，我们在\
    \ Interface Builder 中设置的 `NSArrayController` 里使用了 `createdObject` 和 `timestamp`\
    \ 作为键，并且表格视图中的文本字段也使用了这些键进行绑定。通过使用这些键名将对象放入数组，我们就能让绑定将这些值再提取出来。\n\n事实上，在处理代码的同时，我们还可以移除\
    \ `DungeonThingAppDelegate.h` 文件中的 `characterLabel` 的 `@property` 声明。代码中已经没有任何地方引用这个属性了，保持代码整洁是一个好习惯。\n\
