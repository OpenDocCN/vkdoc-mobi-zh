    \ 中执行的操作（实际上只是改变颜色）都可以通过“编辑”菜单中的项目进行撤销和重做。此外，这些撤销和重做操作是针对特定文档的；在一个文档中进行更改和撤销，与其他文档中发生的任何事情完全独立。然而，可能不太清楚的是，究竟是什么在启用这个功能；我们并没有编写任何处理撤销和重做的代码，但它确实存在。简而言之：在一个\
    \ Core Data 应用程序中，基本的撤销/重做通常由系统为我们处理，我们无需做任何事。处理模型对象的托管对象上下文能够在对象被编辑时察觉到变化，并向“撤销堆栈”添加一个逆操作。其结果是，对于大多数现代的\
