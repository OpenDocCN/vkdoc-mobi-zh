    \ >= [self.items count])\n\n        self.currentTabIndex = 0;\n\n    self.leftView\
    \ = self.middleView;\n\n    self.middleView = self.rightView;\n\n}\n```\n\n`next:`\
    \ 方法还调用了另一个内部方法 `transitionOutToLeft`，该方法会将当前视图向左移出。其实现如下：\n\n```objc\n- (void)transitionOutToLeft\
    \ {\n\n    NSRect newFrame = [self.middleView frame];\n\n    newFrame.origin.x\
    \ -= newFrame.size.width;\n\n    [[self.middleView animator] setFrame:newFrame];\n\
    \n    [[self.middleView animator] setAlphaValue:0.0];\n\n}\n```\n\n完成这些之后，我们现在可以再次运行了。这次我们不仅能看到初始视图设置正常运作，还能点击“下一个”按钮过渡到下一个视图！非常流畅。见图\
    \ 15-10。\n\n![A978-1-4302-4543-8_15_Fig10_HTML.jpg](img/A978-1-4302-4543-8_15_Fig10_HTML.jpg)\n\
    \n**图 15-10.** 视图三正在退出，视图四已进入约一半\n\n现在剩下的工作就是实现向右过渡的对应方法。这些方法与之前的非常相似，在此不做进一步说明，但有一点要提醒：你可能会想复制粘贴现有方法并修改你能发现的不同之处，但请务必小心！有些差异虽然细微却至关重要。\n\
    \n```objc\n- (void)prepareLeftSide {\n\n    NSInteger previousTabIndex = self.currentTabIndex-1;\n\
    \n    if (previousTabIndex < 0)\n\n        previousTabIndex = [self.items count]-1;\n\
    \n    self.leftView = [[self.items objectAtIndex:previousTabIndex] view];\n\n\
    \    NSRect viewFrame = [self.box bounds];\n\n    viewFrame.origin.x -= viewFrame.size.width;\n\
    \n    [self.leftView setFrame:viewFrame];\n\n    [self.leftView setAlphaValue:0.0];\n\
    \n    [self.box addSubview:self.leftView];\n\n}\n\n- (void)transitionInFromLeft\
    \ {\n\n    [[self.leftView animator] setFrame:[self.box bounds]];\n\n    [[self.leftView\
    \ animator] setAlphaValue:1.0];\n\n}\n\n- (void)transitionOutToRight {\n\n   \
    \ NSRect newFrame = [self.middleView frame];\n\n    newFrame.origin.x += [self.box\
    \ bounds].size.width;\n\n    [[self.middleView animator] setFrame:newFrame];\n\
    \n    [[self.middleView animator] setAlphaValue:0.0];\n\n}\n\n- (IBAction)previous:(id)sender\
    \ {\n\n    [self prepareLeftSide];\n\n    [NSAnimationContext beginGrouping];\n\
    \n    [[NSAnimationContext currentContext] setDuration:ANIM_DURATION];\n\n   \
    \ [self transitionInFromLeft];\n\n    [self transitionOutToRight];\n\n    [NSAnimationContext\
    \ endGrouping];\n\n    self.currentTabIndex--;\n\n    if (self.currentTabIndex\
    \ < 0)\n\n        self.currentTabIndex = [self.items count]-1;\n\n    self.rightView\
    \ = self.middleView;\n\n    self.middleView = self.leftView;\n\n}\n```\n\n现在点击运行；我们应该能够看到两个方向的动画过渡了。\n\
    \n## 总结\n\n希望上一章和本章为你提供了多种 Cocoa 绘图技术的坚实基础，包括贝塞尔曲线的多种用法、通过鼠标使视图具有交互性，以及使用 Core\
    \ Animation 实现轻松动画。由于本书篇幅所限，我们无法深入探讨这些主题，但请记住，尤其是在图形和动画方面，唯一的限制就是你的想象力！我们提供了基础工具。如果你想在图形方面做更多尝试，应该深入探索你最感兴趣的领域，看看能用\
    \ Cocoa 提供的 API 做些什么。这才是真正的乐趣所在！"
- fmt: "# 16. Working with Files\n\n## Abstract\n\nMost applications will need to\
    \ deal with files stored on disk in one way or another. So far in this book, we\
    \ really haven't dealt much with this topic (except for a bit of discussion about\
    \ Core Data and its data stores), so let's remedy that right now. Cocoa actually\
    \ includes several useful classes for dealing with files in a number of ways.\
    \ There are classes that provide APIs mimicking operations the user can normally\
    \ do in the Finder and others that represent a file in an abstract way. Still\
    \ other classes have built-in functionality for reading and writing files. This\
    \ chapter will provide an overview of how these mechanisms work.\n\n## Implicit\
    \ File Access\n\nSeveral classes in Cocoa, such as `NSString`, `NSData`, `NSArray`,\
    \ and `NSDictionary`, provide methods for reading data directly from a file, or\
    \ writing their contents directly to a file, using just a string containing the\
    \ full path to the relevant file. For instance, if we want to read the entire\
    \ contents of a file into a string, we can do something as simple as this:\n\n\
    ```\nNSError *myError;\nNSStringEncoding encoding;\nNSString *myString = [NSString\
    \ stringWithContentsOfFile:@\"/path/to/something\"\n                         \
    \                        usedEncoding:&encoding error:&myError];\n```\n\nThis\
    \ code will take care of all the busy work of opening the file and reading its\
    \ contents. It will even tell us what text encoding it used to interpret the contents\
    \ of the file as a character string and tell us any errors that occur. But only\
    \ if we pass in non-`NULL` values for the second and third parameters. Apart from\
    \ file-related errors, such as insufficient permissions to access the file, this\
    \ method can also report back errors related to dealing with data as a character\
    \ string, such as text encoding errors if the file contains binary data. Later\
    \ in this chapter we'll see this in action.\n\n`NSArray` and `NSDictionary` have\
    \ similar methods, which for some reason don't include the sort of error reporting\
    \ that `NSString` does, so if they fail, they simply return a `nil` pointer and\
    \ leave you wondering. Those methods are also much more special-purpose, since\
    \ they are designed to read values from files stored in Apple's special property-list\
    \ format. One common use of `NSDictionary`'s `dictionaryWithContentsOfFile:` class\
    \ method is to read data from a configuration file created in a text editor or\
    \ in Xcode's plist editor. Cocoa also includes a special-purpose class called\
    \ `NSPropertyListSerialization` for dealing with the property-list format. If\
    \ we really need to parse a property-list in a general way, with complete error\
    \ reporting and more control, we can use its class method `propertyListWithData:options:format:error:`\
    \ (try saying that five times in a row).\n\nOf the classes mentioned at the start\
    \ of this section, `NSData` provides the most general file access. It can read\
    \ any sort of data from disk and represent it as an array of bytes for us to use\
    \ as we will. This is the ideal way of dealing with binary data. `NSData` even\
    \ provides an option for hinting that the file should be mapped into virtual memory\
    \ (in case we know it's such a large file, we don't want it all in memory at once),\
    \ like this:\n\n```\nNSData *myData = [NSData dataWithContentsOfFile:@\"/path/to/something\"\
    \n                                          options:NSDataReadingMappedIfSafe\
    \ error: &myError];\n```\n\nEach of the classes mentioned here also contains a\
    \ method called `writeToFile:atomically:` whose second parameter is a `BOOL` specifying\
    \ whether the data should first be written to an auxiliary file, which then replaces\
    \ the original after all data is written. The `NSString` version of this method\
    \ is actually deprecated, so we should use `writeToFile:atomically:encoding:error:`\
    \ instead, which forces us to specify which text encoding to use and gives us\
    \ the chance to inspect any errors that may occur. `NSData` provides the similar\
    \ `writeToFile:options:error:`, which also gives us a chance to see any errors\
    \ that occur when writing to a file.\n\n## High-Level File Operations\n\nBesides\
    \ the basics of reading and writing files, Cocoa provides a number of classes\
    \ that let us deal with files in ways similar to how the Finder deals with files.\
    \ We can get access to file-system attributes, get the file's icon, see which\
    \ application will open this file by default, and more. The rest of this chapter\
    \ will explore some of these capabilities in the context of a new application\
    \ called \"What About That File?\" (see Figure [16-1](#A978-1-4302-4543-8_16_Chapter.html#Fig1)).\n\
    \nThis application lets the user choose a file, at which point some information\
    \ about the file is shown, as well as the file's contents in the form of a string.\
    \ If the file contains data that can't be represented as a character string, it\
    \ will tell the user so. Otherwise, the user can use an included pop-up list to\
    \ change the text encoding that is used when reading the file from disk and show\
    \ the resulting string.\n\n![A978-1-4302-4543-8_16_Fig1_HTML.jpg](A978-1-4302-4543-8_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1. The completed \"What About That File?\" application"
  raw: '# 16. Working with Files


    Abstract


    Most applications will need to deal with files stored on disk in one way or another.
    So far in this book, we really haven’t dealt much with this topic (except for
    a bit of discussion about Core Data and its data stores), so let’s remedy that
    right now. Cocoa actually includes several useful classes for dealing with files
    in a number of ways. There are classes that provide APIs mimicking operations
    the user can normally do in the Finder and others that represent a file in an
    abstract way. Still other classes have built-in functionality for reading and
    writing files. This chapter will provide an overview of how these mechanisms work.


    Most applications will need to deal with files stored on disk in one way or another.
    So far in this book, we really haven’t dealt much with this topic (except for
    a bit of discussion about Core Data and its data stores), so let’s remedy that
    right now. Cocoa actually includes several useful classes for dealing with files
    in a number of ways. There are classes that provide APIs mimicking operations
    the user can normally do in the Finder and others that represent a file in an
    abstract way. Still other classes have built-in functionality for reading and
    writing files. This chapter will provide an overview of how these mechanisms work.


    ## Implicit File Access


    Several classes in Cocoa, such as `NSString`, `NSData`, `NSArray`, and `NSDictionary`,
    provide methods for reading data directly from a file, or writing their contents
    directly to a file, using just a string containing the full path to the relevant
    file. For instance, if we want to read the entire contents of a file into a string,
    we can do something as simple as this:


    `NSError *myError;`


    `NSStringEncoding encoding;`


    `NSString *myString = [NSString stringWithContentsOfFile:@"/path/to/something"`


     `usedEncoding:&encoding error:&myError];`


    This code will take care of all the busy work of opening the file and reading
    its contents. It will even tell us what text encoding it used to interpret the
    contents of the file as a character string and tell us any errors that occur.
    But only if we pass in non-`NULL` values for the second and third parameters.
    Apart from file-related errors, such as insufficient permissions to access the
    file, this method can also report back errors related to dealing with data as
    a character string, such as text encoding errors if the file contains binary data.
    Later in this chapter we’ll see this in action.


    `NSArray` and `NSDictionary` have similar methods, which for some reason don’t
    include the sort of error reporting that `NSString` does, so if they fail, they
    simply return a `nil` pointer and leave you wondering. Those methods are also
    much more special-purpose, since they are designed to read values from files stored
    in Apple’s special property-list format. One common use of `NSDictionary`’s `dictionaryWithContentsOfFile:`
    class method is to read data from a configuration file created in a text editor
    or in Xcode’s plist editor. Cocoa also includes a special-purpose class called
    `NSPropertyListSerialization` for dealing with the property-list format. If we
    really need to parse a property-list in a general way, with complete error reporting
    and more control, we can use its class method `propertyListWithData:options:format:error:`
    (try saying that five times in a row).


    Of the classes mentioned at the start of this section, `NSData` provides the most
    general file access. It can read any sort of data from disk and represent it as
    an array of bytes for us to use as we will. This is the ideal way of dealing with
    binary data. `NSData` even provides an option for hinting that the file should
    be mapped into virtual memory (in case we know it’s such a large file, we don’t
    want it all in memory at once), like this:


    `NSData *myData = [NSData dataWithContentsOfFile:@"/path/to/something"`


     `options:NSDataReadingMappedIfSafe error: &myError];`


    Each of the classes mentioned here also contains a method called `writeToFile`
    `:atomically:` whose second parameter is a `BOOL` specifying whether the data
    should first be written to an auxiliary file, which then replaces the original
    after all data is written. The `NSString` version of this method is actually deprecated,
    so we should use `writeToFile:atomically:encoding:error:` instead, which forces
    us to specify which text encoding to use and gives us the chance to inspect any
    errors that may occur. `NSData` provides the similar `writeToFile:options:error:`,
    which also gives us a chance to see any errors that occur when writing to a file.


    ## High-Level File Operations


    Besides the basics of reading and writing files, Cocoa provides a number of classes
    that let us deal with files in ways similar to how the Finder deals with files.
    We can get access to file-system attributes, get the file’s icon, see which application
    will open this file by default, and more. The rest of this chapter will explore
    some of these capabilities in the context of a new application called “What About
    That File?” (see Figure [16-1](#A978-1-4302-4543-8_16_Chapter.html#Fig1)).


    This application lets the user choose a file, at which point some information
    about the file is shown, as well as the file’s contents in the form of a string.
    If the file contains data that can’t be represented as a character string, it
    will tell the user so. Otherwise, the user can use an included pop-up list to
    change the text encoding that is used when reading the file from disk and show
    the resulting string.


    ![A978-1-4302-4543-8_16_Fig1_HTML.jpg](A978-1-4302-4543-8_16_Fig1_HTML.jpg)


    Figure 16-1. 


    The completed “What About That File?” application'
  trans: "\n# 16. 文件操作\n\n## 摘要\n\n大多数应用程序都需要以某种方式处理存储在磁盘上的文件。到目前为止，本书中我们并没有太多涉及这个主题（除了对\
    \ Core Data 及其数据存储的一些讨论），所以现在我们来弥补这一点。实际上，Cocoa 包含几个有用的类，可以通过多种方式处理文件。有些类提供了模仿用户在\
    \ Finder 中通常能执行的操作的 API，而另一些类则以抽象方式表示文件。还有一些类内置了读写文件的功能。本章将概述这些机制的工作原理。\n\n##\
    \ 隐式文件访问\n\nCocoa 中的几个类，例如 `NSString`、`NSData`、`NSArray` 和 `NSDictionary`，都提供了直接从文件读取数据或将内容直接写入文件的方法，只需使用包含相关文件完整路径的字符串即可。例如，如果我们想将文件的全部内容读取到一个字符串中，可以像下面这样简单地实现：\n\
    \n```\nNSError *myError;\nNSStringEncoding encoding;\nNSString *myString = [NSString\
    \ stringWithContentsOfFile:@\"/path/to/something\"\n                         \
    \                        usedEncoding:&encoding error:&myError];\n```\n\n这段代码将处理打开文件和读取内容的所有繁琐工作。它甚至能告诉我们用于将文件内容解释为字符串的文本编码，并告知发生的任何错误。但前提是我们为第二个和第三个参数传入非\
    \ `NULL` 的值。除了与文件相关的错误（例如权限不足无法访问文件）之外，该方法还能报告与将数据作为字符串处理相关的错误，例如如果文件包含二进制数据，则可能出现文本编码错误。本章后面部分我们将看到它的实际应用。\n\
    \n`NSArray` 和 `NSDictionary` 有类似的方法，但出于某种原因，它们没有像 `NSString` 那样包含错误报告功能，因此如果操作失败，它们只会返回一个\
    \ `nil` 指针，让你摸不着头脑。这些方法也更具有专用性，因为它们旨在从以 Apple 专有属性列表格式存储的文件中读取值。`NSDictionary`\
    \ 的 `dictionaryWithContentsOfFile:` 类方法的一个常见用途是读取在文本编辑器或 Xcode 的 plist 编辑器中创建的配置文件中的数据。Cocoa\
    \ 还包含一个名为 `NSPropertyListSerialization` 的专用类来处理属性列表格式。如果我们需要以通用方式解析属性列表，并获得完整的错误报告和更多控制权，可以使用它的类方法\
    \ `propertyListWithData:options:format:error:`（试着连续说五遍）。\n\n在本节开头提到的类中，`NSData`\
    \ 提供了最通用的文件访问。它可以读取磁盘上任何类型的数据，并将其表示为字节数组供我们按需使用。这是处理二进制数据的理想方式。`NSData` 甚至提供了一个选项，用于提示文件应映射到虚拟内存中（以防我们知道文件太大，不想一次性全部加载到内存中），如下所示：\n\
    \n```\nNSData *myData = [NSData dataWithContentsOfFile:@\"/path/to/something\"\
    \n                                          options:NSDataReadingMappedIfSafe\
    \ error: &myError];\n```\n\n这里提到的每个类还包含一个名为 `writeToFile:atomically:` 的方法，其第二个参数是一个\
    \ `BOOL` 值，指定是否应先将数据写入一个辅助文件，待所有数据写入完成后，该辅助文件再替换原始文件。此方法的 `NSString` 版本实际上已被弃用，因此我们应改用\
    \ `writeToFile:atomically:encoding:error:`，这迫使我们指定要使用的文本编码，并让我们有机会检查可能发生的任何错误。`NSData`\
    \ 提供了类似的 `writeToFile:options:error:`，也让我们有机会查看写入文件时发生的任何错误。\n\n## 高级文件操作\n\n\
    除了读写文件的基础功能外，Cocoa 还提供了许多类，让我们能够以类似于 Finder 处理文件的方式来处理文件。我们可以访问文件系统属性、获取文件图标、查看哪个应用程序将默认打开此文件，以及更多功能。本章的剩余部分将在名为“这个文件怎么回事？”（见图\
    \ 16-1）的新应用程序的背景下，探讨其中一些功能。\n\n此应用程序允许用户选择一个文件，然后显示该文件的一些信息，以及以字符串形式显示的文件内容。如果文件包含无法表示为字符的数据，它会告知用户。否则，用户可以使用内置的弹出列表更改读取文件时使用的文本编码，并显示结果字符串。\n\
    \n![A978-1-4302-4543-8_16_Fig1_HTML.jpg](img/A978-1-4302-4543-8_16_Fig1_HTML.jpg)\n\
    \n图 16-1. 完成的“这个文件怎么回事？”应用程序\n"
- fmt: "### What About That File: The Code\n\nUse Xcode to make a new Cocoa application\
    \ (no Document support or Core Data this time) named `WhatAboutThatFile`, and\
    \ do the usual steps of making sure ARC is enabled and assigning a class prefix\
    \ to the project, in this case `WAT`. This creates a simple project with nothing\
    \ more than a `WATAppDelegate` class and a xib file called `MainMenu.xib`. In\
    \ previous chapters, we’ve assembled applications one step at a time, but now\
    \ that we’re this far along, let’s take on bigger chunks of application code.\
    \ We’ll present the complete code of the application, with some commentary interspersed,\
    \ and then describe how to wire up everything in Interface Builder using Cocoa\
    \ bindings. For starters, here’s the header file of the app delegate, which declares\
    \ a large number of properties used for accessing values through Cocoa bindings.\
    \ It also declares an action method that will let the user open a file from the\
    \ menu.\n\n```\n//\n//  WATAppDelegate.h\n//\n\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ WATAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n@property (strong) NSFileWrapper *fileWrapper;\n@property\
    \ (strong) NSURL *fileURL;\n@property (assign) NSStringEncoding chosenEncoding;\n\
    @property (readonly) NSDictionary *fileAttributes;\n@property (readonly) NSString\
    \ *filename;\n@property (readonly) NSImage *fileIcon;\n@property (readonly) NSImage\
    \ *opensAppIcon;\n@property (readonly) NSString *opensAppName;\n@property (weak)\
    \ NSString *stringEncodingName;\n@property (readonly) NSString *fileStringValue;\n\
    @property (readonly) NSDictionary *encodingNames;\n- (IBAction)chooseFile:(id)sender;\n\
    \n@end\n```\n\nNow let’s move on to the `.m` file. By default, this contains the\
    \ `applicationDidFinishLaunching:` method, but we don’t need to configure anything\
    \ when the app runs, so we can just ignore that and go on with our own business.\n\
    \nThe `chooseFile:` method uses the `NSOpenPanel` class to ask the user to choose\
    \ a file to inspect. If the user actually picks a file, we set all of our instance\
    \ variables based on the selection. The `chosenEncoding` property of type `NSStringEncoding`\
    \ (which is at heart simply an unsigned integer) is set to 0. That isn’t a valid\
    \ string encoding type, so that at a later stage we can let the system try to\
    \ deduce the string encoding type for us. After that, we set `fileURL` based on\
    \ the selection in the open panel, and finally set `fileWrapper`, an instance\
    \ of the `NSFileWrapper` class, which simply wraps a file and lets us get some\
    \ metadata about it, based on the value of `fileURL`. We also have some error\
    \ handling in there in case there’s a problem with the chosen file.\n\n```\n-\
    \ (IBAction)chooseFile:(id)sender\n{\n    NSOpenPanel *openPanel = [NSOpenPanel\
    \ openPanel];\n    [openPanel setCanChooseFiles:YES];\n    [openPanel setCanChooseDirectories:NO];\n\
    \    [openPanel setResolvesAliases:NO];\n    [openPanel setAllowsMultipleSelection:NO];\n\
    \n    if ([openPanel runModal] == NSFileHandlingPanelOKButton) {\n        self.chosenEncoding\
    \ = 0;\n        self.fileURL = [openPanel URL];\n        NSError *fileError;\n\
    \        self.fileWrapper = [[NSFileWrapper alloc] initWithURL:self.fileURL\n\
    \                                                      options:0\n           \
    \                                             error:&fileError];\n        if (!self.fileWrapper)\
    \ {\n            NSRunAlertPanel(@\"Couldn't access file\",\n                \
    \            [fileError localizedDescription], nil, nil, nil);\n        }\n  \
    \  }\n}\n```\n\nNext, we have the `filename` and `fileIcon` methods, which will\
    \ be read by the uppermost GUI objects in our window. Note that this reading occurs\
    \ via Cocoa bindings, so we use the convention of providing class methods named\
    \ `keyPathsForValuesAffectingFilename` and `keyPathsForValuesAffectingFileIcon`\
    \ in order to ensure that changes made to one bindings-friendly value cause another\
    \ value to be refetched. We last used this in the context of a Core Data model\
    \ class, but it works equally well here, ensuring that any time the `fileURL`\
    \ or `fileWrapper` values are changed, any views binding their content to `filename`\
    \ or `fileIcon` will automatically reload their content. Both the `filename` and\
    \ `fileIcon` methods use the previously-created `fileWrapper` to access the values\
    \ for display.\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFilename\n{\n    return\
    \ [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\n- (NSString\
    \ *)filename\n{\n    return [self.fileWrapper filename];\n}\n\n+ (NSSet *)keyPathsForValuesAffectingFileIcon\n\
    {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
    \n- (NSImage *)fileIcon\n{\n    return [self.fileWrapper icon];\n}\n```\n\nWe\
    \ provide similar functionality in order to display info about the application\
    \ that will be launched if the user double-clicks the chosen file in the Finder.\
    \ This time, we’re using the `NSWorkspace` class, which represents something akin\
    \ to the Finder itself. `NSWorkspace` can do a number of things, such as launching\
    \ applications and manipulating files. In `opensAppName`, we use the workspace\
    \ to get the name of the application that is the default “opener” for the chosen\
    \ file. In `opensAppIcon` we do the same, then ask the workspace for the application’s\
    \ icon. Once again, we use the `keyPathsForValuesAffectingXxx` convention to make\
    \ sure these values are properly refreshed when a new file is selected.\n\n```\n\
    + (NSSet *)keyPathsForValuesAffectingOpensAppName\n{\n    return [NSSet setWithObjects:@\"\
    fileURL\", @\"fileWrapper\", nil];\n}\n\n- (NSString *)opensAppName {\n    NSWorkspace\
    \ *workspace = [NSWorkspace sharedWorkspace];\n    NSString *appName = nil;\n\
    \    [workspace getInfoForFile:self.fileURL.path application:&appName type:NULL];\n\
    \    return appName;\n}\n\n+ (NSSet *)keyPathsForValuesAffectingOpensAppIcon\n\
    {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
    \n- (NSImage *)opensAppIcon\n{\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
    \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path\
    \ application:&appName type:NULL];\n    return appName ? [workspace iconForFile:appName]\
    \ : nil;\n}\n```\n\nIn the next snippet, the `fileAttributes` accessor returns\
    \ a dictionary, which it gets from `fileWrapper`. This dictionary contains a dozen\
    \ or more filesystem attributes and will be displayed in a table view in the GUI\
    \ by using an `NSDictionaryController`.\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFileAttributes\
    \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n\
    }\n\n- (NSDictionary *)fileAttributes {\n    return [self.fileWrapper fileAttributes];\n\
    }\n```\n\nNow we get into the somewhat hairier issue of string encodings. As mentioned\
    \ earlier, `NSString` provides functionality for reading a string from a file\
    \ and guessing which string encoding it should use. This may be right most of\
    \ the time, but sometimes it can be useful to see the contents of a string through\
    \ a different set of goggles, so to speak. It may be enlightening, for instance,\
    \ to see how a modern UTF8 document may appear if viewed in an archaic application\
    \ on some other platform that doesn’t have any concept of string encodings and\
    \ always uses the one and only string encoding available to it."
  raw: '### What About That File: The Code


    Use Xcode to make a new Cocoa application (no Document support or Core Data this
    time) named WhatAboutThatFile, and do the usual steps of making sure ARC is enabled
    and assigning a class prefix to the project, in this case WAT. This creates a
    simple project with nothing more than a `WATAppDelegate` class and a xib file
    called MainMenu.xib. In previous chapters, we’ve assembled applications one step
    at a time, but now that we’re this far along, let’s take on bigger chunks of application
    code. We’ll present the complete code of the application, with some commentary
    interspersed, and then describe how to wire up everything in Interface Builder
    using Cocoa bindings. For starters, here’s the header file of the app delegate,
    which declares a large number of properties used for accessing values through
    Cocoa bindings. It also declares an action method that will let the user open
    a file from the menu.


    `//`


    `//  WATAppDelegate.h`


    `//`


    `#import <Cocoa/Cocoa.h>`


    `@interface WATAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (strong) NSFileWrapper *fileWrapper;`


    `@property (strong) NSURL *fileURL;`


    `@property (assign) NSStringEncoding chosenEncoding;`


    `@property (readonly) NSDictionary *fileAttributes;`


    `@property (readonly) NSString *filename;`


    `@property (readonly) NSImage *fileIcon;`


    `@property (readonly) NSImage *opensAppIcon;`


    `@property (readonly) NSString *opensAppName;`


    `@property (weak) NSString *stringEncodingName;`


    `@property (readonly) NSString *fileStringValue;`


    `@property (readonly) NSDictionary *encodingNames;`


    `- (IBAction)chooseFile:(id)sender;`


    `@end`


    Now let’s move on to the `.m` file. By default, this contains the `applicationDidFinishLaunching:`
    method, but we don’t need to configure anything when the app runs, so we can just
    ignore that and go on with our own business.


    The `chooseFile:` method uses the `NSOpenPanel` class to ask the user to choose
    a file to inspect. If the user actually picks a file, we set all of our instance
    variables based on the selection. The `chosenEncoding` property of type `NSStringEncoding`
    (which is at heart simply an unsigned integer) is set to 0\. That isn’t a valid
    string encoding type, so that at a later stage we can let the system try to deduce
    the string encoding type for us. After that, we set `fileURL` based on the selection
    in the open panel, and finally set `fileWrapper`, an instance of the `NSFileWrapper`
    class, which simply wraps a file and lets us get some metadata about it, based
    on the value of `fileURL`. We also have some error handling in there in case there’s
    a problem with the chosen file.


    `- (IBAction)chooseFile:(id)sender`


    `{`


    `NSOpenPanel *openPanel = [NSOpenPanel openPanel];`


    `[openPanel setCanChooseFiles:YES];`


    `[openPanel setCanChooseDirectories:NO];`


    `[openPanel setResolvesAliases:NO];`


    `[openPanel setAllowsMultipleSelection:NO];`


    `if ([openPanel runModal] == NSFileHandlingPanelOKButton) {`


    `self.chosenEncoding = 0;`


    `self.fileURL = [openPanel URL];`


    `NSError *fileError;`


    `self.fileWrapper = [[NSFileWrapper alloc] initWithURL:self.fileURL`


    `options:0`


    `error:&fileError];`


    `if (!self.fileWrapper) {`


    `NSRunAlertPanel(@"Couldn''t access file"`,


    `[fileError localizedDescription], nil, nil, nil);`


    `}`


    `}`


    `}`


    Next, we have the `filename` and `fileIcon` methods, which will be read by the
    uppermost GUI objects in our window. Note that this reading occurs via Cocoa bindings,
    so we use the convention of providing class methods named `keyPathsForValuesAffectingFilename`
    and `keyPathsForValuesAffectingFileIcon` in order to ensure that changes made
    to one bindings-friendly value cause another value to be refetched. We last used
    this in the context of a Core Data model class, but it works equally well here,
    ensuring that any time the `fileURL` or `fileWrapper` values are changed, any
    views binding their content to `filename` or `fileIcon` will automatically reload
    their content. Both the `filename` and `fileIcon` methods use the previously-created
    `fileWrapper` to access the values for display.


    `+ (NSSet *)keyPathsForValuesAffectingFilename`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper", nil];`


    `}`


    `- (NSString *)filename`


    `{`


    `return [self.fileWrapper filename];`


    `}`


    `+ (NSSet *)keyPathsForValuesAffectingFileIcon`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper", nil];`


    `}`


    `- (NSImage *)fileIcon`


    `{`


    `return [self.fileWrapper icon];`


    `}`


    We provide similar functionality in order to display info about the application
    that will be launched if the user double-clicks the chosen file in the Finder.
    This time, we’re using the `NSWorkspace` class, which represents something akin
    to the Finder itself. `NSWorkspace` can do a number of things, such as launching
    applications and manipulating files. In `opensAppName`, we use the workspace to
    get the name of the application that is the default “opener” for the chosen file.
    In `opensAppIcon` we do the same, then ask the workspace for the application’s
    icon. Once again, we use the `keyPathsForValuesAffectingXxx` convention to make
    sure these values are properly refreshed when a new file is selected.


    `+ (NSSet *)keyPathsForValuesAffectingOpensAppName`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper", nil];`


    `}`


    `- (NSString *)opensAppName {`


    `NSWorkspace *workspace = [NSWorkspace sharedWorkspace];`


    `NSString *appName = nil;`


    `[workspace getInfoForFile:self.fileURL.path application:&appName type:NULL];`


    `return appName;`


    `}`


    `+ (NSSet *)keyPathsForValuesAffectingOpensAppIcon`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper", nil];`


    `}`


    `- (NSImage *)opensAppIcon`


    `{`


    `NSWorkspace *workspace = [NSWorkspace sharedWorkspace];`


    `NSString *appName = nil;`


    `[workspace getInfoForFile:self.fileURL.path application:&appName type:NULL];`


    `return appName ? [workspace iconForFile:appName] : nil;`


    `}`


    In the next snippet, the `fileAttributes` accessor returns a dictionary, which
    it gets from `fileWrapper`. This dictionary contains a dozen or more filesystem
    attributes and will be displayed in a table view in the GUI by using an `NSDictionaryController`.


    `+ (NSSet *)keyPathsForValuesAffectingFileAttributes {`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper", nil];`


    `}`


    `- (NSDictionary *)fileAttributes {`


    `return [self.fileWrapper fileAttributes];`


    `}`


    Now we get into the somewhat hairier issue of string encodings. As mentioned earlier,
    `NSString` provides functionality for reading a string from a file and guessing
    which string encoding it should use. This may be right most of the time, but sometimes
    it can be useful to see the contents of a string through a different set of goggles,
    so to speak. It may be enlightening, for instance, to see how a modern UTF8 document
    may appear if viewed in an archaic application on some other platform that doesn’t
    have any concept of string encodings and always uses the one and only string encoding
    available to it.'
  trans: "\n### 关于那个文件：代码部分\n\n使用 Xcode 创建一个新的 Cocoa 应用（这次不启用 Document 支持或 Core Data），命名为\
    \ `WhatAboutThatFile`，然后执行常规步骤，确保启用了 ARC，并为项目指定一个类前缀，此处为 `WAT`。这会创建一个简单的项目，仅包含一个\
    \ `WATAppDelegate` 类和一个名为 `MainMenu.xib` 的 xib 文件。在之前的章节中，我们一步步地构建应用程序，但既然我们已经走到了这一步，不如来接手更大的应用代码块。我们将展示应用的完整代码，并穿插一些注释说明，然后描述如何使用\
    \ Cocoa 绑定在 Interface Builder 中将所有内容连接起来。首先，这是应用委托的头文件，它声明了大量用于通过 Cocoa 绑定访问值的属性。它还声明了一个动作方法，让用户可以从菜单中打开一个文件。\n\
    \n```\n//\n//  WATAppDelegate.h\n//\n\n#import <Cocoa/Cocoa.h>\n\n@interface WATAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (strong) NSFileWrapper *fileWrapper;\n@property (strong) NSURL *fileURL;\n\
    @property (assign) NSStringEncoding chosenEncoding;\n@property (readonly) NSDictionary\
    \ *fileAttributes;\n@property (readonly) NSString *filename;\n@property (readonly)\
    \ NSImage *fileIcon;\n@property (readonly) NSImage *opensAppIcon;\n@property (readonly)\
    \ NSString *opensAppName;\n@property (weak) NSString *stringEncodingName;\n@property\
    \ (readonly) NSString *fileStringValue;\n@property (readonly) NSDictionary *encodingNames;\n\
    - (IBAction)chooseFile:(id)sender;\n\n@end\n```\n\n现在，我们来看一下 `.m` 文件。默认情况下，它包含了\
    \ `applicationDidFinishLaunching:` 方法，但我们在应用运行时不需要配置任何东西，所以可以忽略它，继续做我们自己的事情。\n\
    \n`chooseFile:` 方法使用 `NSOpenPanel` 类来让用户选择一个要检查的文件。如果用户确实选择了一个文件，我们会根据选择设置所有实例变量。`chosenEncoding`\
    \ 属性的类型是 `NSStringEncoding`（本质上就是一个无符号整数），被设置为 0。这不是一个有效的字符串编码类型，这样在后续阶段我们可以让系统尝试为我们推断字符串编码类型。之后，我们根据打开面板中的选择设置\
    \ `fileURL`，最后设置 `fileWrapper`，它是 `NSFileWrapper` 类的一个实例，只是简单地包装一个文件，让我们可以获取一些关于它的元数据，这些元数据基于\
    \ `fileURL` 的值。其中还包含一些错误处理逻辑，以防所选文件出现问题。\n\n```\n- (IBAction)chooseFile:(id)sender\n\
    {\n    NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n    [openPanel setCanChooseFiles:YES];\n\
    \    [openPanel setCanChooseDirectories:NO];\n    [openPanel setResolvesAliases:NO];\n\
    \    [openPanel setAllowsMultipleSelection:NO];\n\n    if ([openPanel runModal]\
    \ == NSFileHandlingPanelOKButton) {\n        self.chosenEncoding = 0;\n      \
    \  self.fileURL = [openPanel URL];\n        NSError *fileError;\n        self.fileWrapper\
    \ = [[NSFileWrapper alloc] initWithURL:self.fileURL\n                        \
    \                              options:0\n                                   \
    \                     error:&fileError];\n        if (!self.fileWrapper) {\n \
    \           NSRunAlertPanel(@\"无法访问文件\",\n                            [fileError\
    \ localizedDescription], nil, nil, nil);\n        }\n    }\n}\n```\n\n接下来，我们有\
    \ `filename` 和 `fileIcon` 方法，它们将被窗口中最上层的 GUI 对象读取。请注意，这种读取是通过 Cocoa 绑定发生的，因此我们按照约定提供了名为\
    \ `keyPathsForValuesAffectingFilename` 和 `keyPathsForValuesAffectingFileIcon`\
    \ 的类方法，以确保对一个绑定友好值的更改会导致另一个值被重新获取。我们上次在 Core Data 模型类中使用了这种方法，但在这里它同样适用，确保每当 `fileURL`\
    \ 或 `fileWrapper` 值发生变化时，任何将内容绑定到 `filename` 或 `fileIcon` 的视图都会自动重新加载其内容。`filename`\
    \ 和 `fileIcon` 方法都使用之前创建的 `fileWrapper` 来获取要显示的值。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFilename\n\
    {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
    \n- (NSString *)filename\n{\n    return [self.fileWrapper filename];\n}\n\n+ (NSSet\
    \ *)keyPathsForValuesAffectingFileIcon\n{\n    return [NSSet setWithObjects:@\"\
    fileURL\", @\"fileWrapper\", nil];\n}\n\n- (NSImage *)fileIcon\n{\n    return\
    \ [self.fileWrapper icon];\n}\n```\n\n我们提供了类似的功能来显示关于某个应用的信息，这个应用是用户在 Finder 中双击所选文件时会被启动的。这次，我们使用了\
    \ `NSWorkspace` 类，它代表类似 Finder 本身的东西。`NSWorkspace` 可以执行许多操作，例如启动应用程序和操作文件。在 `opensAppName`\
    \ 中，我们使用工作空间来获取作为所选文件默认“打开程序”的应用的名称。在 `opensAppIcon` 中，我们做同样的事情，然后向工作空间请求该应用的图标。再次，我们使用\
    \ `keyPathsForValuesAffectingXxx` 约定来确保这些值在选择新文件时被正确刷新。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingOpensAppName\n\
    {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
    \n- (NSString *)opensAppName {\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
    \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path\
    \ application:&appName type:NULL];\n    return appName;\n}\n\n+ (NSSet *)keyPathsForValuesAffectingOpensAppIcon\n\
    {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
    \n- (NSImage *)opensAppIcon\n{\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
    \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path\
    \ application:&appName type:NULL];\n    return appName ? [workspace iconForFile:appName]\
    \ : nil;\n}\n```\n\n在接下来的代码片段中，`fileAttributes` 访问器返回一个字典，它从 `fileWrapper` 获取。这个字典包含十几个或更多的文件系统属性，并将通过使用\
    \ `NSDictionaryController` 在 GUI 的表格视图中显示。\n\n```\n+ (NSSet *)keyPathsForValuesAffectingFileAttributes\
    \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n\
    }\n\n- (NSDictionary *)fileAttributes {\n    return [self.fileWrapper fileAttributes];\n\
    }\n```\n\n现在我们进入字符串编码这一比较棘手的问题。如前所述，`NSString` 提供了从文件读取字符串并猜测应使用哪种字符串编码的功能。大多数时候这可能是正确的，但有时换个角度看待字符串的内容可能会很有用。例如，看看一个现代的\
    \ UTF8 文档，如果在一个其他平台上不识别字符串编码且始终使用它唯一可用编码的古老应用中查看，会是什么样子，这可能会带来一些启发。\n"
- fmt: '我们首先定义`encodingNames`方法。这个方法将向 GUI 中的弹出按钮提供所有系统定义的编码名称列表，同时还将作为内部查找机制，用于在编码名称及其代码级表示（`NSStringEncoding`类型）之间进行映射。对于键，该字典使用每个编码的数值，并将其包装在`NSString`中。你可能会认为，鉴于这些值的数值性质，将它们包装在`NSNumber`对象中会更有意义，你是对的，但有一个小小的例外：如果你在键值观察（KVO）上下文中使用`NSDictionary`，例如
    Cocoa Bindings，则必须使用字符串作为键！因为我们正通过 Cocoa Bindings 使用这个字典来填充对象，所以这就是我们这样做的原因。


    ```

    - (NSDictionary *)encodingNames


    {


    static NSDictionary *encodingNames = nil;


    if (!encodingNames) {


    encodingNames = @{@"1" : @"NSASCIIStringEncoding",


    @"2" : @"NSNEXTSTEPStringEncoding",


    @"3" : @"NSJapaneseEUCStringEncoding",


    @"4" : @"NSUTF8StringEncoding",


    @"5" : @"NSISOLatin1StringEncoding",


    @"6" : @"NSSymbolStringEncoding",


    @"7" : @"NSNonLossyASCIIStringEncoding",


    @"8" : @"NSShiftJISStringEncoding",


    @"9" : @"NSISOLatin2StringEncoding",


    @"10" : @"NSUnicodeStringEncoding",


    @"11" : @"NSWindowsCP1251StringEncoding",


    @"12" : @"NSWindowsCP1252StringEncoding",


    @"13" : @"NSWindowsCP1253StringEncoding",


    @"14" : @"NSWindowsCP1254StringEncoding",


    @"15" : @"NSWindowsCP1250StringEncoding",


    @"21" : @"NSISO2022JPStringEncoding",


    @"30" : @"NSMacOSRomanStringEncoding",


    @"2415919360" : @"NSUTF16BigEndianStringEncoding",


    @"2483028224" : @"NSUTF16LittleEndianStringEncoding",


    @"2348810496" : @"NSUTF32StringEncoding",


    @"2550137088" : @"NSUTF32BigEndianStringEncoding",


    @"2617245952" : @"NSUTF32LittleEndianStringEncoding"};


    }


    return encodingNames;


    }

    ```


    继续我们在字符串编码方面的工作，我们现在将定义`stringEncodingName`的存取器，这次在混合中增加了一个设置器（因为这个值可以通过弹出按钮设置）。和之前一样，我们实现了`keyPathsForValuesAffectingStringEncodingName`，这次将`chosenEncoding`添加为要监视的键之一。


    `stringEncodingName`方法有两个主要执行路径。如果`chosenEncoding`已被设置（即用户从弹出列表中选择了编码的情况），我们只需在我们之前定义的字典中查找所选编码的名称。否则，我们实际上使用`stringWithContentsOfFile:usedEncoding:error:`来读取文件内容，并使用得到的编码来查找所发现编码的名称（如果未发现任何编码，则返回一个简短的问题描述）。


    `setStringEncodingName:`方法非常简单。我们在字典中进行反向查找，以找到与所选编码对应的键（一个包含编码整数值的字符串）。当用户在弹出窗口中选择一个编码名称时，将调用此方法。


    ```

    + (NSSet *)keyPathsForValuesAffectingStringEncodingName


    {


    return [NSSet setWithObjects:@"fileURL", @"fileWrapper",


    @"chosenEncoding", nil];


    }


    - (NSString *)stringEncodingName


    {


    if (!self.fileURL) return nil;


    if (self.chosenEncoding != 0) {


    return [[self encodingNames] objectForKey:


    @(self.chosenEncoding).stringValue];


    } else {


    NSStringEncoding encoding = 0;


    NSError *err = nil;


    [NSString stringWithContentsOfFile:self.fileURL.path


    usedEncoding:&encoding error:&err];


    if (encoding==0) {


    return @"No encoding detected.  Perhaps a binary file?";


    }


    return [[self encodingNames] objectForKey:


    @(self.chosenEncoding).stringValue];


    }


    }


    - (void)setStringEncodingName:(NSString *)name


    {


    NSString *key = [[[self encodingNames] allKeysForObject:name]


    lastObject];


    self.chosenEncoding = [key longLongValue];


    }

    ```


    最后是`fileStringValue`及其匹配的`keyPathsForValuesAffectingFileStringValue`方法。这里我们也有两个主要的代码路径。在第一种情况下，当`chosenEncoding`已被设置时，我们尝试使用所选编码从所选文件中读取一个字符串值。在另一种情况下，当未选择编码时，我们尝试读取一个字符串值，但让系统尝试找出使用哪种编码。无论哪种情况，我们都会做一些错误检查，并在遇到特定字符串编码错误时显示一个警告面板。


    ```

    + (NSSet *)keyPathsForValuesAffectingFileStringValue


    {


    return [NSSet setWithObjects:@"fileURL", @"fileWrapper",


    @"chosenEncoding", nil];


    }


    - (NSString *)fileStringValue


    {


    if (!self.fileURL) return nil;


    NSError *err = nil;


    NSString *value = nil;


    if (self.chosenEncoding != 0) {


    value = [NSString stringWithContentsOfFile:self.fileURL.path


    encoding:self.chosenEncoding error:&err];


    } else {


    NSStringEncoding encoding = 0;


    value = [NSString stringWithContentsOfFile:self.fileURL.path


    usedEncoding:&encoding error:&err];


    }


    if (err)  {


    if ([err code]==NSFileReadInapplicableStringEncodingError &&


    [[err domain] isEqual:NSCocoaErrorDomain]) {


    NSRunAlertPanel(@"Invalid string encoding",


    [err localizedDescription], nil, nil, nil);


    }


    NSLog(@"encountered error: %@", err);


    }


    return value;


    }

    ```'
  raw: 'We start off by defining the `encodingNames` method. This method will provide
    a list of all system-defined encoding names to the pop-up button in our GUI and
    will also serve as an internal lookup mechanism for mapping between encoding names
    and their code-level representation, the `NSStringEncoding` type. For keys, this
    dictionary uses the numeric value of each encoding wrapped in an `NSString`. You
    might think that it would make more sense, given the numeric nature of these values,
    to wrap them in `NSNumber` objects instead, and you’d be right except for one
    small catch: if you’re using an `NSDictionary` in a key-value observer context,
    such as Cocoa Bindings, you have to use strings as keys! Because we’re using this
    dictionary to populate an object via Cocoa Bindings, that’s what we’re doing.


    `- (NSDictionary *)encodingNames`


    `{`


    `static NSDictionary *encodingNames = nil;`


    `if (!encodingNames) {`


    `encodingNames = @{@"1" : @"NSASCIIStringEncoding"`,


    `@"2" : @"NSNEXTSTEPStringEncoding"`,


    `@"3" : @"NSJapaneseEUCStringEncoding"`,


    `@"4" : @"NSUTF8StringEncoding"`,


    `@"5" : @"NSISOLatin1StringEncoding"`,


    `@"6" : @"NSSymbolStringEncoding"`,


    `@"7" : @"NSNonLossyASCIIStringEncoding"`,


    `@"8" : @"NSShiftJISStringEncoding"`,


    `@"9" : @"NSISOLatin2StringEncoding"`,


    `@"10" : @"NSUnicodeStringEncoding"`,


    `@"11" : @"NSWindowsCP1251StringEncoding"`,


    `@"12" : @"NSWindowsCP1252StringEncoding"`,


    `@"13" : @"NSWindowsCP1253StringEncoding"`,


    `@"14" : @"NSWindowsCP1254StringEncoding"`,


    `@"15" : @"NSWindowsCP1250StringEncoding"`,


    `@"21" : @"NSISO2022JPStringEncoding"`,


    `@"30" : @"NSMacOSRomanStringEncoding"`,


    `@"2415919360" : @"NSUTF16BigEndianStringEncoding"`,


    `@"2483028224" : @"NSUTF16LittleEndianStringEncoding"`,


    `@"2348810496" : @"NSUTF32StringEncoding"`,


    `@"2550137088" : @"NSUTF32BigEndianStringEncoding"`,


    `@"2617245952" : @"NSUTF32LittleEndianStringEncoding"};`


    `}`


    `return encodingNames;`


    `}`


    Continuing our efforts with string encodings, we’ll now define accessors for `stringEncodingName`,
    this time adding a setter into the mix (because this value will be settable from
    the pop-up button). As before, we implement `keyPathsForValuesAffectingStringEncodingName`,
    this time adding `chosenEncoding` as one of the keys to watch for.


    The `stringEncodingName` method has two main execution paths. If `chosenEncoding`
    has been set (which is the case if the user has picked an encoding from the pop-up
    list), we simply look up the name of the chosen encoding in the dictionary we
    defined earlier. Otherwise, we actually read the file’s contents with `stringWithContentsOfFile:usedEncoding:error:`
    and use the resulting encoding to look up the name of the discovered encoding
    (or return a brief problem description if no encoding could be discovered).


    The `setStringEncodingName:` method is quite simple. We do a reverse lookup in
    the dictionary to find the key (a string containing the integer value of the encoding)
    corresponding to the chosen encoding. This method is called when the user selects
    an encoding name in the pop-up.


    `+ (NSSet *)keyPathsForValuesAffectingStringEncodingName`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper"`,


    `@"chosenEncoding", nil];`


    `}`


    `- (NSString *)stringEncodingName`


    `{`


    `if (!self.fileURL) return nil;`


    `if (self.chosenEncoding != 0) {`


    `return [[self encodingNames] objectForKey:`


    `@(self.chosenEncoding).stringValue];`


    `} else {`


    `NSStringEncoding encoding = 0;`


    `NSError *err = nil;`


    `[NSString stringWithContentsOfFile:self.fileURL.path`


    `usedEncoding:&encoding error:&err];`


    `if (encoding==0) {`


    `return @"No encoding detected.  Perhaps a binary file?";`


    `}`


    `return [[self encodingNames] objectForKey:`


    `@(self.chosenEncoding).stringValue];`


    `}`


    `}`


    `- (void)setStringEncodingName:(NSString *)name`


    `{`


    `NSString *key = [[[self encodingNames] allKeysForObject:name]`


    `lastObject];`


    `self.chosenEncoding = [key longLongValue];`


    `}`


    Finally, `fileStringValue` and its matching `keyPathsForValuesAffectingFileStringValue`
    method. Here we also have a couple of primary code paths. In the first case, where
    `chosenEncoding` has been set, we attempt to read a string value from the chosen
    file using the chosen encoding. In the other case, where the no encoding has been
    chosen, we attempt to read a string value but let the system try to figure out
    which encoding to use. In either case, we do a bit of error checking and show
    an alert panel if a particular string encoding error is encountered.


    `+ (NSSet *)keyPathsForValuesAffectingFileStringValue`


    `{`


    `return [NSSet setWithObjects:@"fileURL", @"fileWrapper"`,


    `@"chosenEncoding", nil];`


    `}`


    `- (NSString *)fileStringValue`


    `{`


    `if (!self.fileURL) return nil;`


    `NSError *err = nil;`


    `NSString *value = nil;`


    `if (self.chosenEncoding != 0) {`


    `value = [NSString stringWithContentsOfFile:self.fileURL.path`


    `encoding:self.chosenEncoding error:&err];`


    `} else {`


    `NSStringEncoding encoding = 0;`


    `value = [NSString stringWithContentsOfFile:self.fileURL.path`


    `usedEncoding:&encoding error:&err];`


    `}`


    `if (err)  {`


    `if ([err code]==NSFileReadInapplicableStringEncodingError &&`


    `[[err domain] isEqual:NSCocoaErrorDomain]) {`


    `NSRunAlertPanel(@"Invalid string encoding"`,


    `[err localizedDescription], nil, nil, nil);`


    `}`


    `NSLog(@"encountered error: %@", err);`


    `}`


    `return value;`


    `}`'
