  trans: '

    ### 创建“反派追踪器”应用


    本章我们将创建一个名为 `VillainTracker` 的应用。这是一个简单的应用，用于追踪超级反派的最新行踪、特殊能力等信息。任何有实力的超级英雄团队都会在自己的计算机系统中安装这类应用，因此，对我们这样的英雄来说，这显然是一个入门级应用。我们将分两个迭代阶段来开发
    `VillainTracker`：在第一阶段，我们会创建一个可以编辑单个反派信息的简单应用；第二阶段（见第 6 章），我们将增加管理整个反派列表的功能。这能展示基于**模型-视图-控制器（MVC）**设计模式开发应用的基础知识——这一模式已被开发者沿用多年。无论你对此模式有经验还是初次接触，了解
    MVC 在 Cocoa 应用中的典型实现方式都很重要，因为它是 Cocoa 优秀应用设计的真正基石。


    与之前的应用一样，我们首先在 Xcode 中创建一个新的应用项目。我们将使用 Interface Builder 模式创建图形用户界面（GUI），然后通过**控件拖拽**的强大功能，在生成的类中创建出口（outlet）和动作（action），从而将其连接到生成的代码。接着，我们回到
    Xcode，学习如何编写代码来设置和获取值——这些值显示在 GUI 控件中——我们会逐个类地学习，以便了解每个控件的工作方式。通常，在构建 Cocoa 应用时，我们会在构建和修改
    GUI 与实现代码之间来回切换：布局一些 UI，编写其背后的代码，检查是否符合预期，然后迭代反复。由于这个应用相对简单，我们会先完成 GUI 布局，再实现其背后的功能。


    **注意**


    在讨论 GUI 问题时，“视图”（views）和“控件”（controls）这两个术语常常可以互换使用。从技术上讲，大多数 Cocoa 用户界面类既是视图也是控件，至少从
    Cocoa 的角度来看如此。`NSView` 是一个允许在屏幕上绘图的类；`NSControl` 是 `NSView` 的子类，它通过响应用户事件、在目标中触发动作等方式扩展了父类的功能。因此，应用中视图层的一大部分由“控件”对象组成，但我们当然不希望将其与控制器层混淆。如果这听起来令人困惑，只需记住：“控件”是一种特殊的“视图”，而“控制器”则是控制器层中协调视图与模型对象的对象。我们保证，过一段时间你就会完全理解其中的道理。


    那么，让我们创建一个新的应用项目吧。与之前章节一样，启动 Xcode（如果已运行则切换到它），按下 `⇧⌘N`，或者从“文件”菜单中选择“新建项目”。在新建项目助手中，左侧点击“OS
    X”下的“应用”，然后在右侧的大窗格中点击“Cocoa 应用”，再点击“下一步”。


    标准的 Xcode 新项目选项面板会提示我们输入应用的标识信息。在“产品名称”中输入“VillainTracker”，并在相应文本框中输入组织名称和公司标识符。本次示例的类前缀也使用字符串“VillainTracker”。确保勾选了“使用自动引用计数”，其他复选框保持未选中状态。点击“下一步”。


    接下来出现的标准保存面板让我们选择目录，并在其中创建新项目。使用控件导航到主目录或桌面上的合适位置，然后点击“创建”。Xcode 会在指定位置创建一个名为
    `VillainTracker` 的新文件夹，其中包含一些默认内容（包括 `VillainTracker.xcodeproj` 项目文件），并打开一个新窗口显示我们项目的设置。


    ### 构建界面


    我们首先使用 Interface Builder 编辑项目的主 nib 文件，来创建 `VillainTracker` 的 GUI。我们将添加 GUI 控件来收集每个反派的关键信息，学习如何将这些控件组织成逻辑分组，并确保窗口大小调整时它们能正确重新定位。我们还会将它们连接到控制器类，在控制器中创建出口，并将所有元素连接在一起。


    首先，在 Xcode 的导航器窗格（位于屏幕左侧的项目导航器窗格中）中找到`MainMenu.xib`。单击`MainMenu.xib`，它将在 Xcode
    中央窗格的 Interface Builder 模式下打开。我们会看到新应用的默认菜单集，以及 Interface Builder 编辑器区域左侧的停靠栏中的几个图标——三个占位对象（文件所有者、第一响应者和应用）和四个其他对象（主菜单、窗口
    - VillainTracker、VillainTrackerAppDelegate 和字体管理器）。单击“窗口 - VillainTracker”对象，编辑器区域中会打开一个空窗口。

    '
- fmt: '#### Bringing Out the Text Fields


    Now it’s time to start building the GUI. We’ll do this one little piece at a time,
    but refer to Figure [5-2](#A978-1-4302-4543-8_5_Chapter.html#Fig2) for the completed
    version of the window to get an idea of the layout.


    ![A978-1-4302-4543-8_5_Fig2_HTML.jpg](A978-1-4302-4543-8_5_Fig2_HTML.jpg)


    Figure 5-2.


    This is how the complete VillainTracker window will look


    The first controls we’re going to set up are a couple of `NSTextField`s. `NSTextField`
    is a marvelously useful class that provides text-editing capabilities worthy of
    a full-fledged text editor, even in spots where we are entering just a few characters.
    In the Object Library area in the Utility pane on the right side of the Xcode
    window, make sure the Objects tab is selected at the top, and inside that select
    either Object Library or its child, Cocoa. Then click in the Search field at the
    bottom of the window and type in “text field.” The list of available objects in
    the Library is whittled down to just a few, including one called Text Field. It’ll
    be near the top of the list. Drag one of those (`Text Field`, not `Text Field
    Cell`, which is a slightly different beast that we’ll encounter in Chapters 6
    and 7) over to our empty Window, and drop it somewhere in the upper-left portion
    of the window. We’re going to add an item to the left of the field, so leave some
    room between the field and the edge of the window. Now, while the new text field
    is selected, make a duplicate of it by pressing `⌘D`. A new text field appears,
    overlapping the previous one. Drag the new one down a bit, and some blue guidelines
    will appear in the window, helping guide it into alignment below the previous
    one. Let go of it when it looks roughly like Figure [5-3](#A978-1-4302-4543-8_5_Chapter.html#Fig3).


    ![A978-1-4302-4543-8_5_Fig3_HTML.jpg](A978-1-4302-4543-8_5_Fig3_HTML.jpg)


    Figure 5-3.


    VillainTracker’s first two text fields


    Now we need to label these objects so the user can see what they represent. Back
    in the Object Library pane, click on the Search field (deleting the text that
    was already there, if need be) and type in the word “label.” It should show an
    object called `Label`. Drag one of those out to the window, dropping it to the
    left of the first text field we created. Again, there will be blue lines that
    pop up when we drag near another object, helping us guide it into place; the guidelines
    help us align to the top, center, text baseline, or bottom of the text field next
    to the label. This label will resize horizontally to match its content when we
    edit it within Interface Builder. That’s fine—except that by default the text
    is centered horizontally, which means that while we are editing it will expand
    in both directions and start overlapping the `NSTextField` to its right. To counteract
    that, open the Attributes Inspector pane (`⌥⌘4`), and find and click the Align
    Right button under the `Text Field` settings (Hint: it looks just like the corresponding
    button found in most word processors). Doing so will make the label retain its
    right-side margin even when we change its content.


    Edit the text in the label to say “Name:” and then make a copy of this label by
    pressing `⌘D`. Drag the new label down a bit so that it lines up with the lower
    text field, edit it to say “Last Known Location:”, and we’re done! If you didn’t
    leave enough room for that much text in the label, it will overlap the text field.
    Feel free to move things around to make the layout neat.


    #### Letting Them Pick Dates


    The next GUI object we want to prepare is a date picker, which will let the user
    specify the date of the villain’s last sighting. A date picker overcomes the ambiguities
    and competing standards for date formatting that can be a chore to deal with when
    parsing and presenting dates, and we’ve got access to a great built-in one in
    Cocoa, so let’s roll with it.


    In the Object Library pane’s Search field, type “date” and see what comes up.
    There should be an entry called `Date Picker`. Grab that, drag it into our window,
    and drop it below the `NSTextField`s we created earlier, once again using the
    blue guidelines that pop up as we drag near the spot we’re looking for. The default
    width for this control is smaller than the default width for the `NSTextField`s
    above it, so it won’t take up the same amount of horizontal space, but that’s
    okay. Just make it line up with the left edge of the other controls. Now click
    one of the labels created earlier and make another copy of it by pressing `⌘D`.
    Drag it down to line up with the date picker, and change the text to “Last Seen:”.
    Figure [5-4](#A978-1-4302-4543-8_5_Chapter.html#Fig4) shows what the window should
    look like now.


    ![A978-1-4302-4543-8_5_Fig4_HTML.jpg](A978-1-4302-4543-8_5_Fig4_HTML.jpg)


    Figure 5-4.


    We’re off to a good start, adding controls and labels to our window


    #### Creating the Combo Box


    Now it’s time for a combo box. This control is great if we have a predefined set
    of valid string values to choose from but also want to allow the user to enter
    a value of their own. This is perfect for the villain’s `Sworn Enemy` property.
    We can provide some default superhero names to choose from while still allowing
    the user to enter one that we don’t anticipate.


    Go to the Object Library pane and type “combo” into the Search field, and see
    a `Combo Box` appear in the list. Drag it out into our window, below the `NSTextField`s
    and the `NSDatePicker`. Use the blue guidelines once again, lining it up with
    the left edge of the controls above it. Once more, make a copy of one of the existing
    labels, position it to the left of the combo box, and rename this one “Sworn Enemy:”.


    Now, let’s populate the combo box with some default values. We want the user to
    be able to specify any superhero at all, even ones we don’t know about (that’s
    why we chose the combo box), but for the sake of convenience we should preload
    this control with names of some popular superheroes, since the popular ones also
    seem to be the ones who attract the most enemies.


    Click the combo box we just added, and open the Attributes Inspector pane (`⌥⌘4`).
    In the upper section is a spot labeled `Items` where we can add items that will
    appear in the combo box. Figure [5-5](#A978-1-4302-4543-8_5_Chapter.html#Fig5)
    shows this part of the Inspector in action. Use the `+` button to add a new item,
    then double-click the “Item” text that appears, and change it to “Superman.” Now
    repeat this process, using the `+` button to add several items, each time editing
    the “Item” text and changing it to the name of one of your favorite superheroes.


    ![A978-1-4302-4543-8_5_Fig5_HTML.jpg](A978-1-4302-4543-8_5_Fig5_HTML.jpg)


    Figure 5-5.


    Configuring an NSComboBox in Interface Builder


    After adding a list of superheroes, test the interface by selecting Simulate Document
    from the Editor menu. Our window should appear, and we can verify that the items
    we created for the combo box appear when we click on it. We can also type text
    into any of the fields (including the combo box) and play with the date picker.
    When done, press `⌘Q` to return to Xcode.'
  raw: '#### Bringing Out the Text Fields


    Now it’s time to start building the GUI. We’ll do this one little piece at a time,
    but refer to Figure [5-2](#A978-1-4302-4543-8_5_Chapter.html#Fig2) for the completed
    version of the window to get an idea of the layout.


    ![A978-1-4302-4543-8_5_Fig2_HTML.jpg](A978-1-4302-4543-8_5_Fig2_HTML.jpg)


    Figure 5-2.


    This is how the complete VillainTracker window will look


    The first controls we’re going to set up are a couple of `NSTextField`s. `NSTextField`
    is a marvelously useful class that provides text-editing capabilities worthy of
    a full-fledged text editor, even in spots where we are entering just a few characters.
    In the Object Library area in the Utility pane on the right side of the Xcode
    window, make sure the Objects tab is selected at the top, and inside that select
    either Object Library or its child, Cocoa. Then click in the Search field at the
    bottom of the window and type in “text field.” The list of available objects in
    the Library is whittled down to just a few, including one called Text Field. It’ll
    be near the top of the list. Drag one of those (Text Field, not Text Field Cell,
    which is a slightly different beast that we’ll encounter in Chapters 6 and 7)
    over to our empty Window, and drop it somewhere in the upper-left portion of the
    window. We’re going to add an item to the left of the field, so leave some room
    between the field and the edge of the window. Now, while the new text field is
    selected, make a duplicate of it by pressing ⌘D. A new text field appears, overlapping
    the previous one. Drag the new one down a bit, and some blue guidelines will appear
    in the window, helping guide it into alignment below the previous one. Let go
    of it when it looks roughly like Figure [5-3](#A978-1-4302-4543-8_5_Chapter.html#Fig3).


    ![A978-1-4302-4543-8_5_Fig3_HTML.jpg](A978-1-4302-4543-8_5_Fig3_HTML.jpg)


    Figure 5-3.


    VillainTracker’s first two text fields


    Now we need to label these objects so the user can see what they represent. Back
    in the Object Library pane, click on the Search field (deleting the text that
    was already there, if need be) and type in the word “label.” It should show an
    object called Label. Drag one of those out to the window, dropping it to the left
    of the first text field we created. Again, there will be blue lines that pop up
    when we drag near another object, helping us guide it into place; the guidelines
    help us align to the top, center, text baseline, or bottom of the text field next
    to the label. This label will resize horizontally to match its content when we
    edit it within Interface Builder. That’s fine—except that by default the text
    is centered horizontally, which means that while we are editing it will expand
    in both directions and start overlapping the `NSTextField` to its right. To counteract
    that, open the Attributes Inspector pane (⌥⌘4), and find and click the Align Right
    button under the Text Field settings (Hint: it looks just like the corresponding
    button found in most word processors). Doing so will make the label retain its
    right-side margin even when we change its content.


    Edit the text in the label to say “Name:” and then make a copy of this label by
    pressing ⌘D. Drag the new label down a bit so that it lines up with the lower
    text field, edit it to say “Last Known Location:”, and we’re done! If you didn’t
    leave enough room for that much text in the label, it will overlap the text field.
    Feel free to move things around to make the layout neat.


    #### Letting Them Pick Dates


    The next GUI object we want to prepare is a date picker, which will let the user
    specify the date of the villain’s last sighting. A date picker overcomes the ambiguities
    and competing standards for date formatting that can be a chore to deal with when
    parsing and presenting dates, and we’ve got access to a great built-in one in
    Cocoa, so let’s roll with it.


    In the Object Library pane’s Search field, type “date” and see what comes up.
    There should be an entry called Date Picker. Grab that, drag it into our window,
    and drop it below the `NSTextFields` we created earlier, once again using the
    blue guidelines that pop up as we drag near the spot we’re looking for. The default
    width for this control is smaller than the default width for the `NSTextFields`
    above it, so it won’t take up the same amount of horizontal space, but that’s
    okay. Just make it line up with the left edge of the other controls. Now click
    one of the labels created earlier and make another copy of it by pressing ⌘D.
    Drag it down to line up with the date picker, and change the text to “Last Seen:”.
    Figure [5-4](#A978-1-4302-4543-8_5_Chapter.html#Fig4) shows what the window should
    look like now.


    ![A978-1-4302-4543-8_5_Fig4_HTML.jpg](A978-1-4302-4543-8_5_Fig4_HTML.jpg)


    Figure 5-4.


    We’re off to a good start, adding controls and labels to our window


    #### Creating the Combo Box


    Now it’s time for a combo box. This control is great if we have a predefined set
    of valid string values to choose from but also want to allow the user to enter
    a value of their own. This is perfect for the villain’s `Sworn Enemy` property.
    We can provide some default superhero names to choose from while still allowing
    the user to enter one that we don’t anticipate.


    Go to the Object Library pane and type “combo” into the Search field, and see
    a Combo Box appear in the list. Drag it out into our window, below the `NSTextFields`
    and the `NSDatePicker`. Use the blue guidelines once again, lining it up with
    the left edge of the controls above it. Once more, make a copy of one of the existing
    labels, position it to the left of the combo box, and rename this one “Sworn Enemy:”.


    Now, let’s populate the combo box with some default values. We want the user to
    be able to specify any superhero at all, even ones we don’t know about (that’s
    why we chose the combo box), but for the sake of convenience we should preload
    this control with names of some popular superheroes, since the popular ones also
    seem to be the ones who attract the most enemies.


    Click the combo box we just added, and open the Attributes Inspector pane (⌥⌘4).
    In the upper section is a spot labeled Items where we can add items that will
    appear in the combo box. Figure [5-5](#A978-1-4302-4543-8_5_Chapter.html#Fig5)
    shows this part of the Inspector in action. Use the + button to add a new item,
    then double-click the “Item” text that appears, and change it to “Superman.” Now
    repeat this process, using the + button to add several items, each time editing
    the “Item” text and changing it to the name of one of your favorite superheroes.


    ![A978-1-4302-4543-8_5_Fig5_HTML.jpg](A978-1-4302-4543-8_5_Fig5_HTML.jpg)


    Figure 5-5.


    Configuring an NSComboBox in Interface Builder


    After adding a list of superheroes, test the interface by selecting Simulate Document
    from the Editor menu. Our window should appear, and we can verify that the items
    we created for the combo box appear when we click on it. We can also type text
    into any of the fields (including the combo box) and play with the date picker.
    When done, press ⌘Q to return to Xcode.'
  trans: '

    #### 调出文本字段


    现在该开始构建图形用户界面了。我们将一次只处理一小部分，但可以参照图 5-2 中的完整窗口版本，以便了解布局。


    ![A978-1-4302-4543-8_5_Fig2_HTML.jpg](img/A978-1-4302-4543-8_5_Fig2_HTML.jpg)


    图 5-2.


    这是完整的“反派追踪器”窗口的最终外观


    我们要设置的第一批控件是一对 `NSTextField`。`NSTextField` 是一个非常实用的类，它提供了足以媲美全功能文本编辑器的文本编辑能力，即使在某些我们只需输入几个字符的场景中也是如此。在
    Xcode 窗口右侧实用工具面板的对象库区域中，确保顶部的“对象”选项卡已被选中，并在该选项卡内选择“对象库”或其子项“Cocoa”。然后点击窗口底部的搜索字段，输入“text
    field”。库中可用对象的列表会缩减到只剩少数几个，其中包括一个名为“Text Field”的选项。它会在列表顶部附近。将其中一个（`Text Field`，而不是
    `Text Field Cell`，后者稍有不同，我们将在第 6 章和第 7 章中遇到）拖到我们空白的窗口中，并放置在窗口左上角附近的某个位置。我们将在字段的左侧添加一个项目，所以在字段与窗口边缘之间留出一些空间。现在，在新文本字段选中的状态下，按
    `⌘D` 键复制一个。一个新的文本字段会出现，与之前的重叠。将新字段向下拖动一点，窗口中会出现一些蓝色参考线，帮助将其与下面的字段对齐。当它看起来大致如图
    5-3 所示时松开鼠标。


    ![A978-1-4302-4543-8_5_Fig3_HTML.jpg](img/A978-1-4302-4543-8_5_Fig3_HTML.jpg)


    图 5-3.


    “反派追踪器”的前两个文本字段


    现在我们需要为这些对象添加标签，以便用户了解它们代表什么。返回对象库面板，点击搜索字段（如有必要，删除已有的文本），输入单词“label”。应该会显示一个名为
    `Label` 的对象。将其中的一个拖到窗口中，放在我们创建的第一个文本字段的左侧。同样，当我们将标签拖到另一个对象附近时，会出现蓝色参考线，帮助我们对齐位置；这些参考线有助于我们相对于文本字段进行顶部、中心、文本基线或底部的对齐。当我们在
    Interface Builder 中编辑标签时，它会水平调整大小以匹配其内容。这没问题——只是默认情况下文本是水平居中的，这意味着在编辑时，它会向两侧扩展，并开始与右侧的
    `NSTextField` 重叠。为了解决这个问题，打开属性检查器面板（`⌥⌘4`），在 `Text Field` 设置下找到并点击“Align Right”按钮（提示：它看起来和大多数文字处理器中相应的按钮一样）。这样做会使标签在更改内容时保持其右边距。


    将标签中的文本编辑为“Name:”，然后按 `⌘D` 键复制此标签。将新标签向下拖动一点，使其与下方的文本字段对齐，将其编辑为“Last Known Location:”，这样就完成了！如果标签中没有为这么长的文本留出足够空间，它会与文本字段重叠。可以自由移动对象，使布局整洁。


    #### 让它们选择日期


    我们要准备的下一个 GUI 对象是日期选择器，它将允许用户指定反派最后一次被目击的日期。日期选择器克服了日期格式中的歧义和相互竞争的标准，这些标准在解析和呈现日期时处理起来可能很麻烦，而且我们可以使用
    Cocoa 中内置的出色选择器，所以让我们直接使用它。


    在对象库面板的搜索字段中，输入“date”并查看结果。应该有一个名为 `Date Picker` 的条目。选中它，将其拖到窗口中，放在我们之前创建的 `NSTextField`
    下方，同样利用我们拖到目标位置附近时出现的蓝色参考线。此控件的默认宽度比其上方的 `NSTextField` 的默认宽度要小，所以它不会占用相同的水平空间，但这没关系。只需让它与其他控件的左边缘对齐即可。现在点击之前创建的某个标签，按
    `⌘D` 键再复制一个。将其向下拖动，与日期选择器对齐，并将文本更改为“Last Seen:”。图 5-4 显示了窗口现在应该的样子。


    ![A978-1-4302-4543-8_5_Fig4_HTML.jpg](img/A978-1-4302-4543-8_5_Fig4_HTML.jpg)


    图 5-4.


    我们有了一个良好的开端，向窗口中添加了控件和标签


    #### 创建组合框


    现在轮到组合框了。如果我们有一组预定义的有效字符串值可供选择，但又希望允许用户输入他们自己的值，那么这个控件非常有用。这对于反派的 `Sworn Enemy`
    属性来说非常完美。我们可以提供一些默认的超级英雄名称供选择，同时仍然允许用户输入我们未预料到的名称。


    前往对象库面板，在搜索字段中输入“combo”，会看到一个 `Combo Box` 出现在列表中。将其拖到窗口中，放在 `NSTextField` 和 `NSDatePicker`
    的下方。再次使用蓝色参考线，使其与上方控件的左边缘对齐。然后，再次复制一个现有的标签，将其放在组合框的左侧，并将其重命名为“Sworn Enemy:”。


    现在，让我们为组合框填入一些默认值。我们希望用户能够指定任何超级英雄，甚至是我们不知道的（这就是我们选择组合框的原因），但为了方便起见，我们应该预先在这个控件中加载一些热门超级英雄的名字，因为热门的超级英雄似乎也最容易招致敌人。


    点击我们刚才添加的组合框，打开属性检查器面板（`⌥⌘4`）。在面板上半部分有一个名为 `Items` 的区域，我们可以在其中添加将显示在组合框中的项目。图
    5-5 展示了检查器面板的这一部分。使用 `+` 按钮添加一个新项目，然后双击出现的“Item”文字，将其改为“Superman。”现在重复此过程，使用 `+`
    按钮添加多个项目，每次都编辑“Item”文字，将其改为你最喜欢的超级英雄的名字。


    ![A978-1-4302-4543-8_5_Fig5_HTML.jpg](img/A978-1-4302-4543-8_5_Fig5_HTML.jpg)


    图 5-5.


    在 Interface Builder 中配置 NSComboBox


    添加完超级英雄列表后，通过从“Editor”菜单中选择“Simulate Document”来测试界面。我们的窗口应该会出现，并且我们可以验证点击组合框时，我们为其创建的项目是否会显示出来。我们还可以在任何字段（包括组合框）中键入文本，并操作日期选择器。完成后，按
    `⌘Q` 返回 Xcode。

    '
- fmt: '### Indicating a Rating with a Level Indicator


    The next control we’re going to create is an `NSLevelIndicator`, which we’ll use
    to display and specify the evilness of any villain. We’ll let the user specify
    a star rating from 0 to 10 for this value, and the `NSLevelIndicator` will actually
    display it as a row of stars.


    Go back to the Object Library pane, and type in “level” in the Search field at
    the bottom. One of the classes that comes up is `NSLevelIndicator`, which we should
    drag out and put into our window, once again using the blue guidelines to line
    it up with the left edge of the previous controls, just below the combo box we
    added in the previous step.


    Now we need to configure this new object a bit. The `NSLevelIndicator` class has
    a number of built-in display styles suited for different purposes. The default
    style for a new instance created in Interface Builder is called Discrete, but
    we’re going to change it to match what we’re displaying, which is a sort of a
    rating. Bring up the Attributes Inspector (`⌥⌘4`), and we’ll see that one of the
    first options is a pop-up labeled Style (see Figure 5-6). Click the pop-up and
    select Rating instead. The level indicator immediately changes to a view showing
    a few stars.


    ![A978-1-4302-4543-8_5_Fig6_HTML.jpg](A978-1-4302-4543-8_5_Fig6_HTML.jpg)


    Figure 5-6. Configuring an `NSLevelIndicator` to show a star rating


    We also need to specify the maximum and minimum values that are valid for this
    control so that it knows how to display the value it’s given. Still in the Attributes
    Inspector, find the section labeled Value containing controls to set the minimum
    and maximum values. Set the minimum to 0 and the maximum to 10, either by typing
    numbers into these fields or using the small up/down buttons. A bit below those
    text fields is another labeled Current. Set that to 10 so that we can see the
    full range of stars in our control, and click the Editable checkbox so that the
    user can actually edit this value themselves, not just look at the pretty stars.


    Perhaps the control isn’t showing all 10 stars. As of this writing, the default
    size of a new `NSLevelIndicator` dragged from the Library is wide enough to show
    just over 7 stars, and no more. Fortunately, Xcode provides a handy shortcut that
    can help us rightsize a view to make it snugly fit around its content. Select
    Editor ➤ Size To Fit Content from the menu or press `⌘=` to make the level indicator
    expand to just the right size to show all 10 stars. Depending on how we laid out
    the `NSLevelIndicator` relative to the other fields, we may have created constraints
    that set up relationships between the sizes of the `NSLevelIndicator` and the
    other fields. If the other fields also resize when we resize the `NSLevelIndicator`,
    that’s OK. We can hit Undo (`⌘Z`) and reposition the `NSLevelIndicator` away from
    the other fields to break the constraints, resize it as above, and then reposition
    it aligned with the left edges of the other fields.


    **Note:** For this app, we can ignore the Warning and Critical values, as they
    don’t have any effect on the Rating style of `NSLevelIndicator`. These values
    do have an effect on how the `NSLevelIndicator` is drawn in the Discrete and Continuous
    styles; we can also change the `NSLevelIndicator` back to Discrete or Continuous
    and then use Simulate Document to see what happens, but we need to set it back
    to Rating before we continue.


    Finally, it’s time once again to duplicate one of the existing labels in your
    window. Drag it into place to the left of the level indicator, and change the
    text to “Evilness:”. This might be a good time to once again test the interface
    by selecting Simulate Document. We should be able to click anywhere along the
    line of stars and cause the control to highlight just that amount.


    ### Adding Radio Buttons in a Matrix


    Next, we’ll create the GUI for the `Primary Motivation` attribute. Years of careful
    study of comic books have taught us that every villain has a primary motivating
    factor that causes them to do their evil deeds, and this motivation can always
    be reduced to one of these five things: greed, revenge, bloodlust, nihilism, or
    insanity. Of course, some villains may have several of these evil-making forces
    at work, but we’ll settle for picking the main one for each villain we’re tracking.


    We’re going to use a set of radio buttons to let the user pick the primary motivation.
    Radio buttons are generally grouped in a set that works together, so that selecting
    one button simultaneously deselects all the other buttons. If “radio button” seems
    like a terribly obscure name for this, then perhaps you’re too young to remember
    the old car-radio tuner controls, prevalent up until the 1980s, that would let
    you select a radio station by pushing a mechanical button that would adjust the
    tuner to a particular station and at the same time cause the previously-pushed
    button to pop back to the “out” position. In any case, the term “radio buttons”
    is here to stay, and this control is a good choice when we have a small, predefined
    list of things to choose from and we’d like to keep the whole list onscreen at
    all times.


    In Cocoa, radio buttons are normally a group of `NSButtonCell` instances aligned
    inside an `NSMatrix`. We can find these preconfigured in the Object Library pane
    by typing “radio” into the Search field. It will bring up a Radio Group. Drag
    this out and drop it in the window, below the other controls. The default radio
    button matrix contains just two radio buttons but for this example we want five.
    Simply resizing the matrix by dragging one of the resize handles won’t help us
    here; that just stretches the existing buttons. Instead, try holding down the
    Option key while dragging the bottom-center resize handle downward. This will
    simultaneously resize the matrix and add new buttons inside to fill the empty
    space. Drag down until there are five buttons, then release the mouse button.


    **Tip:** Note that many of Cocoa’s GUI classes seem to have a “shadow” in the
    form of a cell class: `NSButton` has `NSButtonCell`, and so on. This division
    stems from performance issues in the past. In order to speed up drawing, some
    of the drawing duty was taken out of view classes and put into special cell classes
    instead. So in an `NSMatrix` full of buttons, instead of having a bunch of full-fledged
    `NSButton` instances, there are a bunch of simpler `NSButtonCell` instances.


    Now it’s time to fill in the values that will be displayed in each button’s title.
    Start with the top-most button; double-click to select the word “Radio,” then
    type in “Greed.” Do the same for the rest of the buttons, typing in “Revenge,”
    “Bloodlust,” “Nihilism,” and “Insanity,” as shown in Figure 5-7. Note that this
    view doesn’t expand horizontally to contain the text we typed, so we need to do
    it ourselves by dragging the center-right resize handle and dragging to the right
    until all the text we entered is visible. This is also a case where the Size to
    Fit Content command can come in handy.


    ![A978-1-4302-4543-8_5_Fig7_HTML.jpg](A978-1-4302-4543-8_5_Fig7_HTML.jpg)


    Figure 5-7. What’s your primary motivation in life?'
