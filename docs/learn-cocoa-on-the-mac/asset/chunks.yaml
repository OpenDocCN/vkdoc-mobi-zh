- fmt: "### Creating the Default Villain\n\nNow it’s time to create a new villain\
    \ object containing all the attributes that users can edit in the application.\
    \ As mentioned earlier, we’re not creating a “real” model class to contain a villain,\
    \ instead going with the simpler option of using an `NSMutableDictionary`. We’ll\
    \ create it inside an `NSApplication` delegate method called `applicationDidFinishLaunching:`.\
    \ Nearly every Cocoa app needs to do some setup work at launch time, so Xcode\
    \ generated the stub of this method for us when it generated the class. Now we’ll\
    \ fill in an implementation.\n\nHere’s the code:\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n\n  self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n\
    \n                  @\"Lex Luthor\", kName,\n\n                  @\"Smallville\"\
    , kLastKnownLocation,\n\n                  [NSDate date], kLastSeenDate,\n\n \
    \                 @\"Superman\", kSwornEnemy,\n\n                  @\"Revenge\"\
    , kPrimaryMotivation,\n\n                  [NSArray arrayWithObjects:@\"Evil Genius\"\
    , nil], kPowers,\n\n                  @\"Superhero action\", kPowerSource,\n\n\
    \                  @9, kEvilness,\n\n                  [NSImage imageNamed:@\"\
    NSUser\"], kMugshot,\n\n                  @\"\", kNotes,\n\n                 \
    \ nil];\n\n}\n```\n\nThis code sets up all the attributes for a default villain\
    \ that most people are familiar with. The `initWithObjectsAndKeys:` method fills\
    \ the dictionary with a nil-terminated list of paired values and keys. For the\
    \ sake of legibility, we’ve put each value/key pair on a line of its own. We’re\
    \ already familiar with the `@\"string\"` syntax to make a new `NSString` literal,\
    \ but the `@9` is new. This is shorthand for `[NSNumber numberWithInt:9]`. Note\
    \ that the `mugshot` attribute is being set to a pre-existing `NSImage` instance,\
    \ one of several that are included in Cocoa and are available for anyone to use\
    \ in their applications. Now is a good time to once again compile the app in Xcode\
    \ just to make sure we’ve got everything right so far, but there’s still no point\
    \ in actually running the app just yet. The GUI has been created, but nothing’s\
    \ actually working so far.\n\n**Note**\n\nYou may be wondering why you’re putting\
    \ initialization code for an `NSApplication`’s delegate into the `applicationDidFinishLaunching:`\
    \ method, instead of into the `init` method. Objects that are loaded from the\
    \ application’s main nib file are always in a special predicament: they are being\
    \ initialized as a substep in the application’s own initialization routine, which\
    \ means that at the time `init` is called on any object in the main nib file,\
    \ the `NSApplication` itself may not be fully initialized! This has lots of repercussions,\
    \ especially where the user interface is concerned, so often it’s best to postpone\
    \ your initialization until everything is truly ready. Because the `VillainTrackerAppDelegate`\
    \ is set up to be the delegate of `NSApplication`, you have a handy way to notice\
    \ when the application is really ready by implementing the `applicationDidFinishLaunching:`\
    \ method.\n\n### Paying Attention to Detail\n\nThe previous code created a villain\
    \ object, but if we were to build and run our app right now, we wouldn’t see any\
    \ sign of the villain. All the controls on the window would be blank because we\
    \ haven’t populated any of them with values from our villain’s attributes. Now\
    \ it’s time to change that. In the `VillainTrackerAppDelegate` class, we’re going\
    \ to create a new private method called `updateDetailViews`, which sets up all\
    \ the GUI objects to display the attributes of the current villain. We’re putting\
    \ this functionality into a method of its own (as opposed to setting things up\
    \ right inside of `applicationDidFinishLaunching:`) so that we can refresh our\
    \ views whenever necessary, not just when the application launches. We’ll go through\
    \ the process of displaying the villain’s attributes, and we’ll gain some familiarity\
    \ with the basics of interacting with the various classes in our GUI.\n\nLet’s\
    \ start off by creating a simple “stub” of the new method. We want this method\
    \ to be accessible from anywhere in our class, but not from the outside. One way\
    \ to do this is to simply not add it to the `@interface` declaration in the `.h`\
    \ file. So, just above the `@end` declaration at the bottom of the `VillainTrackerAppDelegate.m`\
    \ file, insert the following code:\n\n```\n- (void)updateDetailViews {\n\n}\n\
    ```\n\nBefore we begin implementing the new method, we need to make sure we’re\
    \ already set up to call it by inserting the following line at the end of `applicationDidFinishLaunching:`\n\
    \n```\n// insert this at the end of applicationDidFinishLaunching:\n  [self updateDetailViews];\n\
    ```\n\nDo a quick compile to make sure that what we have so far compiles cleanly.\
    \ Now it’s time to start implementing the `updateDetailViews` method and finally\
