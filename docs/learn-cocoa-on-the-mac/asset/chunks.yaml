    `[result appendFormat:`


    `@"Allows Orc: %@\n"`,


    `[ud boolForKey:kMonsterTypeAllowedOrc] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Goblin: %@\n"`,


    `[ud boolForKey:kMonsterTypeAllowedGoblin] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Ogre: %@\n"`,


    `[ud boolForKey:kMonsterTypeAllowedOgre] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Skeleton: %@\n"`,


    `[ud boolForKey:kMonsterTypeAllowedSkeleton] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Troll: %@\n"`,


    `[ud boolForKey:kMonsterTypeAllowedTroll] ? @"YES" : @"NO"];`'
  trans: "\n### 定义常量\n\n此时，GUI 已完成，相关绑定也已全部配置完毕，因此偏好设置窗口中的控件值都将保存到用户的应用程序偏好设置中。剩下要做的就是编写操作方法来使用\
    \ `NSUserPreferences` 检索偏好设置值并显示它们。如前所述，我们暂不实际使用这些值生成游戏物品描述，但如果你愿意，可以稍后自行增强此功能。\n\
    \n让我们先定义一些常量，就像我们在之前的示例中所做的那样（如果你忘了，可以查看第 4 章了解这样做的益处）。以下是匹配我们在 nib 文件中已设定的所有偏好设置键名的常量。将这些常量插入到\
    \ `DungeonThingAppDelegate.m` 的顶部某处：\n\n```\n#define kCharacterMaxNameLength @\"\
    characterMaxNameLength\"\n#define kCharacterStatsGenerationPolicy \\\n  @\"characterStatsGenerationPolicy\"\
    \n#define kCharacterClassAllowedPaladin @\"characterClassAllowedPaladin\"\n#define\
    \ kCharacterClassAllowedBard @\"characterClassAllowedBard\"\n#define kCharacterClassAllowedFighter\
    \ @\"characterClassAllowedFighter\"\n#define kCharacterClassAllowedCleric @\"\
    characterClassAllowedCleric\"\n#define kCharacterClassAllowedRogue @\"characterClassAllowedRogue\"\
    \n#define kCharacterClassAllowedMonk @\"characterClassAllowedMonk\"\n#define kCharacterClassAllowedMagicUser\
    \ \\\n  @\"characterClassAllowedMagicUser\"\n#define kCharacterClassAllowedThief\
    \ @\"characterClassAllowedThief\"\n#define kMonsterBootyFrequency @\"monsterBootyFrequency\"\
    \n#define kMonsterTypeAllowedOrc @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin\
    \ @\"monsterTypeAllowedGoblin\"\n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\
    \n#define kMonsterTypeAllowedSkeleton @\"monsterTypeAllowedSkeleton\"\n#define\
    \ kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\n#define kMonsterTypeAllowedVampire\
    \ @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus @\"monsterTypeAllowedSuccubus\"\
    \n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\n#define\
    \ kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
    \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
    \n```\n\n> **注意：** 为了适应书籍格式的限制同时显示有效代码，我们在某些行的末尾添加了反斜杠作为换行符，这样 C 预处理器就会将下一行的内容拼接在一起，仿佛它们原本就在同一行。在你的代码中，可以省略这种手动换行，将每个\
    \ `#defines` 写成一行声明。\n\n### 创建操作方法\n\n现在我们可以开始实现操作方法了。我们从 `createCharacter:` 开始，它将显示与角色创建相关的所有偏好设置值的摘要。首先获取\
    \ `NSUserDefaults` 的共享实例，然后创建一个空字符串来保存摘要文本，接着逐一添加每条偏好设置来生成摘要。最后，将摘要文本放入相应的 `NSTextField`\
    \ 中。请注意，该方法开始时我们创建了一个指定容量的 `NSMutableString`，但这并不是大小上限；`NSMutableString` 足够智能，可以在必要时“增长”。该方法如下所示：\n\
    \n```\n- (IBAction)createCharacter:(id)sender {\n    NSUserDefaults *ud = [NSUserDefaults\
    \ standardUserDefaults];\n    NSMutableString *result = [NSMutableString stringWithCapacity:1024];\n\
    \    [result appendString:\n        @\"Generating a character within these parameters:\\\
    n\"\n        \"-----------------\\n\"];   // 提示：像这样跨行拆分字符串！\n    [result appendFormat:\n\
    \        @\"Maximum name length: %ld\\n\",\n        [ud integerForKey:kCharacterMaxNameLength]];\n\
    \    [result appendFormat:\n        @\"Stats generation policy: %ld\\n\",\n  \
    \      [ud integerForKey:kCharacterStatsGenerationPolicy]];\n    [result appendFormat:\n\
    \        @\"Allows Paladin: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedPaladin]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Bard: %@\\\
    n\",\n        [ud boolForKey:kCharacterClassAllowedBard] ? @\"YES\" : @\"NO\"\
    ];\n    [result appendFormat:\n        @\"Allows Fighter: %@\\n\",\n        [ud\
    \ boolForKey:kCharacterClassAllowedFighter] ? @\"YES\" : @\"NO\"];\n    [result\
    \ appendFormat:\n        @\"Allows Cleric: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedCleric]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Rogue:\
    \ %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedRogue] ? @\"YES\" : @\"\
    NO\"];\n    [result appendFormat:\n        @\"Allows Monk: %@\\n\",\n        [ud\
    \ boolForKey:kCharacterClassAllowedMonk] ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n\
    \        @\"Allows Magic-User: %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedMagicUser]\
    \ ? @\"YES\" : @\"NO\"];\n    [result appendFormat:\n        @\"Allows Thief:\
    \ %@\\n\",\n        [ud boolForKey:kCharacterClassAllowedThief] ? @\"YES\" : @\"\
    NO\"];\n    [self.characterLabel setStringValue:result];\n}\n```\n\n输入这段代码后，尝试编译并运行应用程序。如果一切顺利，我们应该能看到主窗口，按下**生成角色**按钮，并看到类似图\
