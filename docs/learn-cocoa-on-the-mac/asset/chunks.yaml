- fmt: '### Bindings for Character Generation


    Go to the Preferences window we’re building, and switch back to the Character
    Generation pane. Click on the slider, and then bring up the Bindings Inspector
    (`⌥⌘7`). In this Inspector, we can see all the attributes of a view object that
    can be bound to a value in a model object. Most often, we’ll be binding the `Value`
    to something, but each view class offers its own set of attributes available for
    binding. The slider, for instance, can have its `Max Value` and `Min Value` attributes
    bound to something, which would allow us to vary those extremities based on values
    in a model object. Some other view objects can bind text colors and fonts to model
    values, and most of them can have their `Hidden` and `Enabled` states bound to
    model values. For now, we’re going to bind this slider’s `Value` attribute, so
    click the Value disclosure triangle to see its configuration options. Figure [7-6](#A978-1-4302-4543-8_7_Chapter.html#Fig6)
    shows the default settings.


    ![A978-1-4302-4543-8_7_Fig6_HTML.jpg](A978-1-4302-4543-8_7_Fig6_HTML.jpg)


    Figure 7-6. The default “unbound” state for an `NSSlider`’s `Value` binding options


    To establish a binding, we need to configure at least three things: the controller
    object to bind to, the controller key, and model key path (all the rest are optional
    settings that allow us to refine the binding’s behavior in special situations,
    some of which we’ll cover later). Pick the controller object from the `Bind to`
    pop-up list, which contains all controller objects that are present in our nib
    file, including any controllers of our own, any generic controllers we’ve dragged
    over from the Library, and special controllers like `NSUserDefaultsController`,
    which is available automatically in every nib file (and shows up as `Shared User
    Defaults Controller` in the pop-up list). The controller key lets us choose different
    “aspects” of the model object or objects that a controller provides. For example,
    `NSArrayController`, which provides binding access to an array of objects, has
    different controller keys to provide access to the entire sorted array or just
    the current selection. The model key path is a string that is used as a key to
    get and set a value in the model object.


    So, for our first binding, start off by picking the `Shared User Defaults Controller`
    from the pop-up list. This controller is automatically available in any nib file,
    though we can’t see it anywhere until we use it in a binding, at which point it
    appears in the main nib window. Now check the `Controller Key` combo box, and
    make sure it’s set to `values`. Then click on the `Model Key Path` combo box,
    and type `characterMaxNameLength` into the combo box. This string defines the
    key that will be used to store the slider’s value in `NSUserDefaults` — the user’s
    application preferences. Press Enter or tab out of the field, and note that the
    `Bind to` checkbox at the top of the Inspector gets checked. That’s it! We don’t
    need to worry about any of the remaining controls for now; their default values
    are fine for our purposes. Figure [7-7](#A978-1-4302-4543-8_7_Chapter.html#Fig7)
    shows what the relevant configured bits in the Inspector should look like when
    this binding is configured.


    ![A978-1-4302-4543-8_7_Fig7_HTML.jpg](A978-1-4302-4543-8_7_Fig7_HTML.jpg)


    Figure 7-7. The completed binding for the first slider


    Now select the small text field to the right of the slider, and configure the
    exact same binding we did for the slider: `Shared User Defaults Controller`, `values`,
    and `characterMaxNameLength`. That will make it pull its display value from the
    same place (the value for `characterMaxNameLength`) in the same model object (the
    user’s application preferences). To see a little Cocoa bindings magic in action
    now, select Editor ➤ Simulate Interface from the menu, click and drag the slider,
    and watch the value in the small text field update simultaneously. Note that this
    is the same feature we built in [Chapter 2](#A978-1-4302-4543-8_2_Chapter.html)
    but with a different mechanism: while we’re dragging the slider, its value is
    being pushed into our application preferences by the `NSUserDefaultsController`,
    which also passes the value along to the other object that’s bound to the same
    key, the little text field. Pretty neat trick! But it’s not a trick at all. It’s
    a simple example of the dynamic nature of Cocoa bindings. Using this technology,
    we can eliminate a lot of boring code from our controller classes and sometimes
    get rid of our controller classes entirely — using only Cocoa’s included controller
    classes instead.


    Let’s move on to the next GUI control, the matrix of radio buttons in the middle.
    Click the matrix, and then look at the Bindings Inspector where we’ll see that
    there is no `Value` option. For this control, instead of binding a `Value`, we’ll
    be binding the `Selected Tag` attribute, which means that when a user selects
    a cell, that cell’s tag will be pushed down to the model, and when the Preferences
    window is brought up next time, that saved tag will determine which radio button
    is selected. Open up the `Selected Tag` section of the Bindings Inspector, and
    again make sure that `Shared User Defaults Controller` is selected and that the
    `Controller Key` is `values`, but this time type `characterStatsGenerationPolicy`
    into the `Model Key Path` and press Enter.


    Next, let’s tackle the Allowed Character Classes checkboxes. For each of these,
    we’ll make up a new key name and use it to bind the `Selected` status to a value
    in the user’s application preferences. Click the first cell, Paladin. The Inspector
    title should change to Button Cell Bindings. If not, click the button again until
    it does. Now bind this button cell’s `Value` attribute to the `characterClassAllowedPaladin`
    key. Repeat these steps for each of the remaining button cells, binding each of
    them via `Shared User Defaults Controller` with the appropriate key name. `Bard`
    should be bound with `characterClassAllowedBard`, `Fighter` with `characterClassAllowedFighter`,
    and so on. When we get to `Magic-User`, for the sake of consistency, use the key
    name `characterClassAllowedMagicUser`, leaving out the `-` symbol.


    ### Bindings for Monster Generation


    Now switch over to the Monster Generation tab. Bind the `Value` of the slider
    to `monsterBootyFrequency`, and do the same for the small text field to the right.
    Then configure the checkboxes the same way we did on the Character Generation
    tab. Click the `Orc` checkbox until the checkbox itself is selected, and bind
    its `Value` to `monsterTypeAllowedOrc`. Continue through the rest of the checkboxes,
    binding the `Value` for each of them to the appropriate key name: `monsterTypeAllowedGoblin`,
    `monsterTypeAllowedOgre`, and so on.


    ### Bindings for Dungeon Generation


    Finally, switch to the Dungeon Generation tab, which contains just three slider
    and text field pairs. To the right of the Tunnel Twistiness label, configure the
    `Value` bindings for both the slider and the text field to `dungeonTunnelTwistiness`.
    Bind both of the Monster Frequency controls’ `Value`s to `dungeonMonsterFrequency`
    and both of the Treasure Frequency controls’ `Value`s to `dungeonTreasureFrequency`.'
