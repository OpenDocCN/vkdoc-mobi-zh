    Finally, a window layout to be proud of!


    #### Resizing


    We’ve got a nice-looking window now, but there’s a bit more work to be done here
    to make everything behave properly: we need to be able to handle when the user
    resizes a window. To understand why that’s even necessary, test the interface
    by selecting Simulate Document from the Editor menu. Now resize the window and
    see what happens. As we’ve laid out the window, all the controls will stay put
    as we resize the window vertically, but we can shrink the window vertically to
    the point where some controls aren’t visible, and we can’t resize the window horizontally
    at all. (Depending on how you laid out the controls as you’ve been following along,
    your resize behavior may vary from this.) We’ll explore resizing in more depth
    in the next chapter. For now, we’re going to make the window non-resizable by
    setting the minimum and maximum dimensions of the window to be the same size,
    and then we’re going to move on to coding.


    Xcode makes this easy. With the VillainTracker window highlighted in the Interface
    Builder Editor canvas, select the Size Inspector (⌥⌘5). The values given for the
    width and height for the current size, minimum size, and maximum size should all
    be the same. Check the checkboxes for both Minimum Size and Maximum Size constraints,
    as shown in Figure [5-14](#A978-1-4302-4543-8_5_Chapter.html#Fig14).


    ![A978-1-4302-4543-8_5_Fig14_HTML.jpg](A978-1-4302-4543-8_5_Fig14_HTML.jpg)


    Figure 5-14.


    Setting the window’s size constraints'
  trans: '

    ### 插入文本视图


    现在轮到最后一个控件了，一个用于编辑反派角色相关自由格式笔记的文本视图。我们将使用 `NSTextView`，这是一个用于文本显示和编辑的强大的类，在整个
    Mac OS X 界面中都有应用。抓住界面生成器画布中窗口轮廓上的调整手柄，向下拖动使窗口变大。一些字段可能会随之移动；调整大小后，将它们重新定位到应处的位置。我们可以通过按住
    Shift 键点击，或者拖出一个选择矩形框住想要移动的多个元素来选中它们。


    腾出空间后，在对象库面板的搜索字段中输入“text view”，然后将搜索结果中的文本视图拖入窗口，放在所有其他元素的下方。调整其大小，使其填满大部分可用空间。此时的窗口布局应类似于图
    5-11。


    ![A978-1-4302-4543-8_5_Fig11_HTML.jpg](img/A978-1-4302-4543-8_5_Fig11_HTML.jpg)


    图 5-11. 所有控件现在都位于窗口中


    ### 进行逻辑分组


    现在所有需要的控件都已布置在窗口中，让我们退一步看看目前的状况。图 5-11 可能与你当前的操作界面相似。


    界面可能功能齐全、标签清晰，但肯定称不上设计佳作。我们的界面展现了大量功能，但控件都挤在一起，这些可编辑属性难以看出任何逻辑分组。我们可以通过将相关控件分组到框视图中来改善布局；Cocoa
    为我们提供了一个名为 `NSBox` 的类，它可以包含多个其他对象，并在其周围绘制出漂亮的边框。


    Xcode 包含一个便捷的快捷方式，可以将现有视图放入一个大小恰好能将其全部精确包含在边框内的框中，因此为界面添加这项改进非常容易。首先，选中前五个控件（位于窗口左上角）及其所有标签。最简单的方法是点击窗口左上角，就在窗口的关闭/最小化/最大化控件下方，然后拖出一个选择框，框住所有想要选中的视图。接着从菜单中选择
    Editor ➤ Embed In ➤ Box —— 一个漂亮的框会包裹住它们，带有深灰色背景和圆角。框的顶部有一个文本标签（“Box”），可以编辑为描述框内容的文字。双击该文本，将其改为“Basic
    Information”。


    接着对“Primary Motivation”部分执行相同操作。首先，选中标签并按 Backspace 或 Delete 键将其删除。因为我们要创建的框中只有一组控件，可以直接使用框的标题来代替。现在选中单选按钮矩阵，再次从菜单中选择
    Editor ➤ Embed In ➤ Box。我们的单选按钮现在被包含在一个框中。将框的标签改为“Primary Motivation”。


    对头像部分重复这些步骤，同样先删除现有标签，然后通过菜单创建框，最后将框的标签设置为“Appearance”。


    现在来处理能力和技能。选中“Source of Powers”弹出按钮及其标签，以及“Abilities”的复选框矩阵。同样，最简便的方法可能是“画一个框”：在窗口右上角附近的背景处点击，然后向左下方拖动，直到所有相关项目都被选中。使用菜单将这些视图放入一个框中，并将框命名为“Powers
    and Abilities”。


    最后，选中为反派角色笔记属性创建的文本视图，将其放入一个独立的框中，标题为“Notes”。


    现在我们已经创建了一堆框，但它们可能相互重叠，并且彼此之间的位置也不太理想（如图 5-12 所示）。


    ![A978-1-4302-4543-8_5_Fig12_HTML.jpg](img/A978-1-4302-4543-8_5_Fig12_HTML.jpg)


    图 5-12. 并非我们见过的最美观的框布局


    别担心；Xcode 的蓝色对齐线会帮助我们迅速将其整理好。从左上角的第一个框开始。点击框内深色背景的任意位置（但不要点击控件或标签），开始拖动整个框。当我们稍微移动它时，蓝色对齐线就会出现。这些对齐线可以帮助我们相对于彼此或相对于窗口本身来定位框或任何视图。我们总是可以通过沿着对齐线追踪到末端，看它连接了什么，来知道这条线是与什么对齐的。当它一直延伸到窗口边缘时，我们就知道它在建议我们离窗口边缘的推荐距离。


    接着处理“Primary Motivation”框，将其与上方框的左边缘对齐，并相隔几个像素，再次使用对齐线来帮助精确定位。然后取出“Appearance”框，使其在垂直方向上与“Primary
    Motivation”框对齐，在水平方向上与“Basic Information”框的右边缘对齐。


    继续处理其他框，将“Powers and Abilities”框对齐到已处理好框的右侧，然后将“Notes”框放在所有元素的下方。如果在移动过程中空间不足，或者窗口远大于所有其他视图的总体尺寸，请稍微调整窗口大小以容纳所有内容。


    最后，将“Notes”框移动到右下角留下的空隙中，并调整其内部的 `NSTextView` 大小以适配新的边界和边距，或许再微调一下其他框的大小，使它们都能整齐地组合在一起。图
    5-13 展示了理想的结果。如果还没保存，请务必保存 nib 文件！


    ![A978-1-4302-4543-8_5_Fig13_HTML.jpg](img/A978-1-4302-4543-8_5_Fig13_HTML.jpg)


    图 5-13. 终于，一个值得骄傲的窗口布局！


    ### 调整大小


    现在我们有了一个外观不错的窗口，但还有一些工作要做，以确保一切行为正常：我们需要能够处理用户调整窗口大小的情况。要理解为什么需要这样做，请通过从 Editor
    菜单中选择 Simulate Document 来测试界面。现在调整窗口大小，看看会发生什么。按照我们目前的布局，当垂直调整窗口大小时，所有控件会保持不动，但我们可以将窗口垂直缩小到某些控件不可见，而且根本不能水平调整窗口大小。（取决于你在操作过程中如何布局控件，调整大小的行为可能与此不同。）我们将在下一章更深入地探讨调整大小。现在，我们通过将窗口的最小和最大尺寸设置为相同大小，来使窗口不可调整大小，然后继续编写代码。


    Xcode 让这变得很容易。在界面生成器编辑画布中选中“VillainTracker”窗口，选择尺寸检查器（`⌥⌘5`）。当前尺寸、最小尺寸和最大尺寸的宽度和高度值应全部相同。勾选“Minimum
    Size”和“Maximum Size”约束的复选框，如图 5-14 所示。


    ![A978-1-4302-4543-8_5_Fig14_HTML.jpg](img/A978-1-4302-4543-8_5_Fig14_HTML.jpg)


    图 5-14. 设置窗口的尺寸约束

