    \n@end\n\n现在，在 Interface Builder 画布中重新打开 `MainMenu.xib`。我们将添加一个小的 `NSPanel`，作为按钮动画的一种检查器。从对象库中，拖出一个\
    \ `NSPanel`，然后将一个自定义视图拖入新面板中。将自定义视图的大小调整为 100×100，并将其类更改为 `CECurveView`。此时 Interface\
    \ Builder 中的 GUI 应如图 15-5 所示。\n\n![A978-1-4302-4543-8_15_Fig5_HTML.jpg](img/A978-1-4302-4543-8_15_Fig5_HTML.jpg)\n\
    \n图 15-5. 添加一个 `CECurveView` 用于配置我们的动画\n\n现在，将应用程序委托的 `curveView` 出口连接到我们刚刚创建的\
    \ `CECurveView` 实例，然后切换回 `MBAppDelegate.m` 文件。在应用程序委托实现文件的顶部某处导入 `CECurveView`\
    \ 头文件，添加以下代码行：\n\n`#import \"CECurveView.h\"`\n\n按如下方式更新 `move:` 方法：\n\n```\n\
    - (IBAction)move:(id)sender {\n    NSRect senderFrame = [sender frame];\n    NSRect\
    \ superBounds = [[sender superview] bounds];\n    CABasicAnimation *a = [CABasicAnimation\n\
    \                           animationWithKeyPath:@\"position\"];\n    a.fromValue\
    \ = [NSValue valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x = (superBounds.size.width\
    \ -\n                            senderFrame.size.width)*drand48();\n    senderFrame.origin.y\
    \ = (superBounds.size.height -\n                            senderFrame.size.height)*drand48();\n\
    \    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    a.duration\
    \ = 1.0;\n    a.timingFunction = [CAMediaTimingFunction\n                    \
    \    functionWithControlPoints:self.curveView.cp1X\n                        :self.curveView.cp1Y\n\
    \                        :self.curveView.cp2X\n                        :self.curveView.cp2Y];\n\
    \    // 将其添加到图层\n    [[sender layer] addAnimation:a forKey:@\"position\"];\n \
    \   [sender setFrame:senderFrame];\n}\n```\n\n现在，每次用户点击“移动”按钮时，生成的动画时间函数将由 `CECurveView`\
    \ 控件中的值决定。保存文件，运行应用程序，我们应该能看到实际效果。拖动控件手柄以创建不同的曲线形状，点击“移动”按钮，观察其移动方式。\n\n# 动画分组\n\
    \n我们已经初步了解了 Core Animation 的工作原理，但上述示例略显滑稽——只是在屏幕上随机移动一个按钮。这并非我们推荐的 GUI 设计！在真实开发中，Core\
    \ Animation 最常用于视图之间的过渡动画。你可能已经在 iPhone 上反复看到过这种用法（Core Animation 最初就是为了 iPhone\
    \ 平台构建的，随后才“回溯”到 Mac OS X）。iPhone 界面中所有流畅的滑动、缩放和淡入淡出效果都是用 Core Animation 实现的。在\
    \ Mac OS X 中，Core Animation 虽不如此无处不在，但在“日历”应用的周视图切换和 Mission Control 中的屏幕切换等场景中得到了很好的应用。在本节中，我们将学习如何通过将动画分组，使其同时运行，来实现一些漂亮的过渡效果。\n\
    \n在 Xcode 中，创建一个名为 `FlipIt` 的新 Cocoa 项目，类前缀设置为 `FI`。我们要做的是呈现一个 GUI，用户可以在多个“页面”之间翻转，而\
    \ Core Animation 将负责它们之间的流畅动画。我们将在 nib 文件的空窗口中使用一个盒子来显示内容页面，这些页面本身将保存在一个 `NSTabView`\
    \ 中。我们不会显示选项卡视图本身，只是将其作为内容页面的便捷容器。\n\n我们将从在 `MainMenu.xib` 中布局视图开始，因此在 Interface\
    \ Builder 画布中打开该文件。从对象库中拖一个按钮到 GUI 的空窗口底部。然后复制该按钮，并将两个按钮的标题分别设置为**上一页**和**下一页**。将两个按钮并排放置在窗口底部中央。打开\
    \ `FIAppDelegate.h` 文件的助手编辑器窗格。在接下来的几个步骤中，我们将使用此助手编辑器来连接各个部分。首先，按住 Control 键从每个按钮拖拽至助手编辑器窗口，创建名为\
    \ `next` 和 `previous` 的新动作，与两个按钮对应。最终结果应该如图 15-6 所示。\n\n![A978-1-4302-4543-8_15_Fig6_HTML.jpg](img/A978-1-4302-4543-8_15_Fig6_HTML.jpg)\n\
    \n图 15-6. 准备窗口\n\n现在，在对象库中找到 `NSBox`，并将其拖入空窗口，放置在按钮上方，调整大小以填满大部分屏幕。使用属性检查器移除盒子的标题，将标题位置弹出菜单设置为**无**（见图\
    \ 15-7）。然后，按住 Control 键从盒子拖拽至助手编辑器中的 `FIAppDelegate.h` 代码，创建一个名为 `box` 的新输出口，这样我们就可以从类中访问该盒子。\n\
    \n![A978-1-4302-4543-8_15_Fig7_HTML.jpg](img/A978-1-4302-4543-8_15_Fig7_HTML.jpg)\n\
    \n图 15-7. 显示窗口现已准备就绪\n\n我们的下一步操作是设置一组视图，用于在主视图中切换进出。我们将使用 `NSTabView` 来实现这一点，这仅仅是因为它提供了一种便捷的方式，让我们可以在\
    \ Xcode 中构建一系列视图，并在应用程序运行时将这些视图作为屏幕外视图的列表来维护。在对象库中找到 `NSTabView`，但将其一直拖到左侧，放入对象停靠栏中，位于应用程序委托和字体管理器对象下方。请注意，选项卡视图作为\
    \ nib 窗口中的顶级图标出现，与应用程序委托、窗口和其他项目并列（见图 15-8）。\n\n![A978-1-4302-4543-8_15_Fig8_HTML.jpg](img/A978-1-4302-4543-8_15_Fig8_HTML.jpg)\n\
    \n图 15-8. 在不太寻常的位置发现了一个选项卡视图，但它就在那里\n"
- fmt: "# Tab View与App Delegate的实现\n\nA tab view（或任何其他`NSView`子类）放置在nib文件的顶层时，加载nib时不会显示，但只要我们有一个指向它的输出口，就能以任何方式访问和使用它，包括将其放入窗口的视图层次结构中。在我们的案例中，我们永远不会显示tab\
    \ view本身，只会显示它包含的内容视图。为了获取这些内容视图，我们需要将其连接到App Delegate类。从Object Dock中的tab view按住Control键拖动到Assistant\
    \ Editor中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便后续访问。\n\n双击Object Dock中的tab\
    \ view条目，可以看到tab view出现在没有窗口环绕的界面中，如图[15-8](#A978-1-4302-4543-8_15_Chapter.html#Fig8)中Interface\
    \ Builder画布的底部所示。它仍然带有调整大小的边框，我们可以在Interface Builder中像调整窗口一样调整它的大小。现在调整它的大小，使其与不久前我们放入主窗口的`NSBox`大致相同。\n\
    \n现在让我们向这个tab view添加一些内容，即我们可以在其间切换的“页面”。默认情况下，tab view只包含两个内容视图，但我们增加这个数量（使用Attributes\
    \ Inspector），以便有更多视图可供切换。只要每个页面都有独特的内容以便能轻松看出页面之间的变化，实际内容并不那么重要。一个好的开始是从Object\
    \ Library中抓取一个Label，给它设置一个较大的字体，并将其文本改为单词“One”。然后复制这个标签并粘贴到其他每个视图中（我们可以像往常一样使用顶部的标签页在视图之间切换），每次相应地更改文本。为了有趣，还可以为每个页面添加一些独特的项目（这里的表格视图，那里的一组按钮），这样当应用完成时，在页面间切换时会看到更多动态效果。\n\
    \n现在是完善控制器类界面的时候了，我们将注意力转向`FIAppDelegate.h`文件。它目前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们要显示的视图的对象）和`box`（我们将显示这些视图的屏幕上的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用tab\
    \ view包含所有可用视图的数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。\n\n将粗体行添加到`FIAppDelegate.h`中，以添加所有这些内容。\n\
    \n```objc\n@interface FIAppDelegate : NSObject <NSApplicationDelegate>\n\n@property\
    \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSBox *box;\n\
    @property (weak) IBOutlet NSTabView *tabView;\n@property (weak) NSView *leftView;\n\
    @property (weak) NSView *rightView;\n@property (weak) NSView *middleView;\n@property\
    \ (strong) NSArray *items;\n@property NSInteger currentTabIndex;\n\n- (IBAction)previous:(id)sender;\n\
    - (IBAction)next:(id)sender;\n\n@end\n```\n\n现在让我们开始在`FIAppDelegate.m`中实现我们的app\
    \ delegate类。这个类将包含多个方法，用于准备转换（通过将要显示的下一个视图设置在box的侧面），将新视图转换到位置，以及将当前视图转换到另一侧。因为我们需要根据是向右还是向左翻转来支持两个方向的转换，所以每个方法都存在两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动转换的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果你仍然同时打开了Interface\
    \ Builder画布和Assistant Editor，你可能想关闭它们，并将`FIAppDelegate.m`切换为Xcode中的主视图。\n\n让我们首先创建一个预处理器定义`ANIM_DURATION`，用于定义我们将创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整这个设置直到找到我们喜欢的速度。像这样定义它：\n\
    \n```objc\n#define ANIM_DURATION 1.0\n```\n\n现在让我们转到`applicationDidFinishLaunching:`方法。这里我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是对数组本身的引用。这意味着我们的代码现在拥有由`tabViewItems`调用返回的`NSArray`的所有权。如果我们自己不将其放入`strong`引用中，那么数组副本将没有任何强引用，当自动引用计数清理时它将被释放。\n\
    \n我们还将`currentTabIndex`设置为指向数组的末尾，以便第一个项目能被对齐（更多细节将在后面说明）。然后我们调用第一个内部方法`prepareRightSide`，它将为显示在box右侧的下一个视图做准备。接着我们使用`ANIM_DURATION`值来指定当前动画上下文中创建的任何动画的持续时间。然后我们调用另一个内部方法`transitionInFromRight`，它将启动动画将下一个视图移动到正确位置。最后，我们将`currentTabIndex`设置为指向项目0（`items`数组中的第一个对象）。\n\
    \n```objc\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n    self.items = [self.tabView tabViewItems];\n    self.currentTabIndex =\
    \ [self.items count]-1;\n    [self prepareRightSide];\n    [[NSAnimationContext\
    \ currentContext] setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n\
    \    self.currentTabIndex = 0;\n    self.middleView = self.rightView;\n}\n```\n\
    \n当您输入这段代码时，Xcode会抱怨找不到名为`prepareRightSide`和`transitionInFromRight`的方法。那么，现在让我们编写这两个内部方法的代码。我们不需要将这些方法放入单独的协议或其他东西中。在Objective-C中，代码可以自由调用同一`@implementation`块中声明的任何其他方法，即使这些方法没有在任何`@interface`中声明，所以我们只需将这些内部方法放在`@implementation`块中的某个位置——`applicationDidFinishLaunching:`的实现下方就是一个好位置。\n\
    \n第一个方法`prepareRightSide`首先确定要显示的下一个视图的索引。我们通过将`currentTabIndex`加1然后对新索引进行简单的边界检查来计算这个索引，如果索引过大则将其重置为零。然后我们使用该索引获取下一个视图，并将其帧大小设置为与`box`相同，但向右偏移正好`box`的宽度，使其刚好在视野之外。我们将其`alpha`值设置为`0.0`，使其实际上不可见，最后我们将该视图添加为`box`的子视图，这样它就能被实际显示出来。"
  raw: 'A tab view (or any other `NSView` subclass) placed at the top level of a nib
    file won’t be displayed when the nib is loaded, but as long as we have an outlet
    pointing at it, we’ll be able to access it and make use of it in any way we like,
    including putting it into a window’s view hierarchy. In our case, we’ll never
    put the tab view itself on display, just the content views it contains. In order
    to get at the content views, we’ll need to wire it up to the App Delegate class.
    Control-drag from the tab view in the Object Dock to the `FIAppDelegate.h` file
    in the Assistant Editor, and create an outlet named `tabView` so that we can access
    it later.


    Double-click the tab view entry in the Object Dock, and see the tab view appear
    without a window around it, as shown in the bottom of the Interface Builder canvas
    in Figure [15-8](#A978-1-4302-4543-8_15_Chapter.html#Fig8). It still has the resizing
    frame around it, though, and we can resize it in Interface Builder just like we
    would resize a window. Resize it now, making it about the same size as the `NSBox`
    we put into the main window a little while ago.


    Now let’s put some content into this tab view, the “pages” that we’ll be able
    to flip between. By default, the tab view contains just two content views, but
    let’s increase that number (using the Attributes Inspector  ) so that we have
    even more views to switch between. The actual content isn’t that important as
    long as something is unique on each page so that we can easily see the content
    change from one page to the next. A good start is just to grab a Label from the
    Object Library, give it a nice big font, and change its text to the word “One.”
    Then copy this label and paste it into each of the other views (which we can switch
    between using the tabs at the top, just like otherwise), changing the text accordingly
    each time. Just for fun, add some unique items to each page as well (a table view
    here, a set of buttons there) so that when the app is done, we’ll see more things
    in motion while flipping between pages.


    It’s time to round out the interface for our controller class, so we’ll turn our
    attention to the `FIAppDelegate.h` file. It currently declares three properties.
    The first is connected to the main window. The other two are the ones we added
    for the two views we need to manage: `tabView`, the object containing the views
    we’re going to display, and `box`, the on-screen view where we’ll be displaying
    them. We need to add five additional properties. Three of these are `weak` properties
    for pointing at the views that are actively transitioning in and out of focus.
    We’ll also need to add a `strong` property to reference the tab view’s array containing
    all the available views, and an `NSInteger` scalar property to identify the current
    focused view.


    Add the lines in bold to `FIAppDelegate.h` to add all of these.


    `@interface FIAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet NSBox *box;`


    `@property (weak) IBOutlet NSTabView *tabView;`


    `@property (weak) NSView *leftView;`


    `@property (weak) NSView *rightView;`


    `@property (weak) NSView *middleView;`


    `@property (strong) NSArray *items;`


    `@property NSInteger currentTabIndex;`


    `- (IBAction)previous:(id)sender;`


    `- (IBAction)next:(id)sender;`


    `@end`


    Now let’s start implementing our app delegate class in `FIAppDelegate.m`. This
    class will have a number of methods for preparing a transition by setting up the
    next view to be displayed out to the side of the box, transitioning the new view
    into position, and transitioning the current view out to the other side. Because
    we want to be able to do transitions in two directions, depending on whether we’re
    flipping to the right or the left, each of those methods exists in two forms,
    setting things up and executing a rightward flip or leftward flip. In addition,
    we’ll implement our two action methods that start up the transitions and a startup
    method (`applicationDidFinishLaunching:`) that sets up the initial view. If you’ve
    still got both an Interface Builder canvas and an Assistant Editor open, you might
    want to close them and switch to `FIAppDelegate.m` as the main view in Xcode.


    Let’s start by creating a preprocessor definition, `ANIM_DURATION` to define the
    duration (in seconds) of the animations we’re going to create. By putting this
    in one place, at the top of the file, we can easily experiment, tweaking this
    setting until we find a speed we like. Define it like this:


    `#define ANIM_DURATION 1.0`


    Now let’s move on to the `applicationDidFinishLaunching:` method. Here we grab
    the list of views from the `tabView` and store it in our `items` property. The
    `items` property needs to be a `strong` reference because the `tabView` returns
    a copy of its internal array, not a reference to the array itself. This means
    that our code now owns the `NSArray` returned by the call to `tabViewItems`. If
    we don’t put it into a `strong` reference ourselves, there won’t be any strong
    references to the copy of the array and it will be deallocated when the automatic
    reference counting cleans it up.


    We also set up `currentTabIndex` to point at the end of the array so that the
    first item will be lined up (more on this later). Then we call the first of our
    internal methods, `prepareRightSide`, which will set up the next view for display
    on the right side of the box. Then we make use of the `ANIM_DURATION` value, using
    it to specify the duration of any animations we create within the current animation
    context. Then we call another internal method, `transitionInFromRight`, which
    will start up the animations to move the next view into the right position. Finally,
    we set `currentTabIndex` to point at item zero (the first object in the `items`
    array).


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {`


    `self.items = [self.tabView tabViewItems];`


    `self.currentTabIndex = [self.items count]-1;`


    `[self prepareRightSide];`


    `[[NSAnimationContext currentContext] setDuration:ANIM_DURATION];`


    `[self transitionInFromRight];`


    `self.currentTabIndex = 0;`


    `self.middleView = self.rightView;`


    `}`


    As you enter this code, Xcode will complain that it can’t find methods named `prepareRightSide`
    and `transitionInFromRight`. So, let’s write the code for these two internal methods
    now. We won’t bother putting these methods into a separate protocol or anything.
    In Objective-C, code can freely call any other methods declared in the same `@implementation`
    block, even if those methods aren’t declared in any `@interface`, so all we have
    to do is put these internal methods somewhere in the `@implementation` block—below
    the implementation of `applicationDidFinishLaunching:` is a good spot.


    The first of these, `prepareRightSide`, starts off by determining the index of
    the next view to display. We compute this index by adding one to `currentTabIndex`
    and then doing a simple bounds check on the new index, resetting it to zero if
    it’s gotten too high. Then we use that index to grab the next view and set its
    frame to be the same size as box, shifted off to the right by exactly the width
    of box so that it’s just out of sight. We set its alpha value to 0.0, making it
    effectively invisible, and finally we add the view as a subview of `box`, so that
    it will actually be displayed.'
  trans: "\n# Tab View 与 App Delegate 的实现\n\nTab view（或任何其他`NSView`子类）放置在 nib 文件的顶层时，加载\
    \ nib 时不会显示，但只要我们有一个指向它的输出口，就能以任何方式访问和使用它，包括将其放入窗口的视图层次结构中。在我们的案例中，我们永远不会显示 tab\
    \ view 本身，只会显示它包含的内容视图。为了获取这些内容视图，我们需要将其连接到 App Delegate 类。从 Object Dock 中的 tab\
    \ view 按住 Control 键拖动到 Assistant Editor 中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便后续访问。\n\
    \n双击 Object Dock 中的 tab view 条目，可以看到 tab view 出现在没有窗口环绕的界面中，如图 15-8 中 Interface\
    \ Builder 画布的底部所示。它仍然带有调整大小的边框，我们可以在 Interface Builder 中像调整窗口一样调整它的大小。现在调整它的大小，使其与不久前我们放入主窗口的`NSBox`大致相同。\n\
    \n现在让我们向这个 tab view 添加一些内容，即我们可以在其间切换的“页面”。默认情况下，tab view 只包含两个内容视图，但我们增加这个数量（使用\
    \ Attributes Inspector），以便有更多视图可供切换。只要每个页面都有独特的内容以便能轻松看出页面之间的变化，实际内容并不那么重要。一个好的开始是从\
    \ Object Library 中抓取一个 Label，给它设置一个较大的字体，并将其文本改为单词“One”。然后复制这个标签并粘贴到其他每个视图中（我们可以像往常一样使用顶部的标签页在视图之间切换），每次相应地更改文本。为了有趣，还可以为每个页面添加一些独特的项目（这里的表格视图，那里的一组按钮），这样当应用完成时，在页面间切换时会看到更多动态效果。\n\
    \n现在是完善控制器类界面的时候了，我们将注意力转向`FIAppDelegate.h`文件。它目前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们要显示的视图的对象）和`box`（我们将显示这些视图的屏幕上的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用\
    \ tab view 包含所有可用视图的数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。\n\n将粗体行添加到`FIAppDelegate.h`中，以添加所有这些内容。\n\
    \n```objc\n@interface FIAppDelegate : NSObject <NSApplicationDelegate>\n\n@property\
    \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSBox *box;\n\
    @property (weak) IBOutlet NSTabView *tabView;\n@property (weak) NSView *leftView;\n\
    @property (weak) NSView *rightView;\n@property (weak) NSView *middleView;\n@property\
    \ (strong) NSArray *items;\n@property NSInteger currentTabIndex;\n\n- (IBAction)previous:(id)sender;\n\
    - (IBAction)next:(id)sender;\n\n@end\n```\n\n现在让我们开始在`FIAppDelegate.m`中实现我们的 app\
    \ delegate 类。这个类将包含多个方法，用于准备转换（通过将要显示的下一个视图设置在 box 的侧面），将新视图转换到位置，以及将当前视图转换到另一侧。因为我们需要根据是向右还是向左翻转来支持两个方向的转换，所以每个方法都存在两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动转换的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果你仍然同时打开了\
    \ Interface Builder 画布和 Assistant Editor，你可能想关闭它们，并将`FIAppDelegate.m`切换为 Xcode\
    \ 中的主视图。\n\n让我们首先创建一个预处理器定义`ANIM_DURATION`，用于定义我们将创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整这个设置直到找到我们喜欢的速度。像这样定义它：\n\
    \n```objc\n#define ANIM_DURATION 1.0\n```\n\n现在让我们转到`applicationDidFinishLaunching:`方法。这里我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是对数组本身的引用。这意味着我们的代码现在拥有由`tabViewItems`调用返回的`NSArray`的所有权。如果我们自己不将其放入`strong`引用中，那么数组副本将没有任何强引用，当自动引用计数清理时它将被释放。\n\
    \n我们还将`currentTabIndex`设置为指向数组的末尾，以便第一个项目能被对齐（更多细节将在后面说明）。然后我们调用第一个内部方法`prepareRightSide`，它将为显示在\
    \ box 右侧的下一个视图做准备。接着我们使用`ANIM_DURATION`值来指定当前动画上下文中创建的任何动画的持续时间。然后我们调用另一个内部方法`transitionInFromRight`，它将启动动画将下一个视图移动到正确位置。最后，我们将`currentTabIndex`设置为指向项目\
    \ 0（`items`数组中的第一个对象）。\n\n```objc\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    self.items = [self.tabView tabViewItems];\n    self.currentTabIndex\
    \ = [self.items count]-1;\n    [self prepareRightSide];\n    [[NSAnimationContext\
    \ currentContext] setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n\
    \    self.currentTabIndex = 0;\n    self.middleView = self.rightView;\n}\n```\n\
    \n当您输入这段代码时，Xcode 会抱怨找不到名为`prepareRightSide`和`transitionInFromRight`的方法。那么，现在让我们编写这两个内部方法的代码。我们不需要将这些方法放入单独的协议或其他东西中。在\
    \ Objective-C 中，代码可以自由调用同一`@implementation`块中声明的任何其他方法，即使这些方法没有在任何`@interface`中声明，所以我们只需将这些内部方法放在`@implementation`块中的某个位置——`applicationDidFinishLaunching:`的实现下方就是一个好位置。\n\
    \n第一个方法`prepareRightSide`首先确定要显示的下一个视图的索引。我们通过将`currentTabIndex`加 1 然后对新索引进行简单的边界检查来计算这个索引，如果索引过大则将其重置为零。然后我们使用该索引获取下一个视图，并将其帧大小设置为与`box`相同，但向右偏移正好`box`的宽度，使其刚好在视野之外。我们将其`alpha`值设置为`0.0`，使其实际上不可见，最后我们将该视图添加为`box`的子视图，这样它就能被实际显示出来。\n"
- fmt: "```objc\n- (void)prepareRightSide {\n\n    NSInteger nextTabIndex = self.currentTabIndex\
    \ + 1;\n\n    if (nextTabIndex >= [self.items count])\n\n        nextTabIndex\
    \ = 0;\n\n    self.rightView = [[self.items objectAtIndex:nextTabIndex] view];\n\
    \n    NSRect viewFrame = [self.box bounds];\n\n    viewFrame.origin.x += viewFrame.size.width;\n\
    \n    [self.rightView setFrame:viewFrame];\n\n    [self.rightView setAlphaValue:0.0];\n\
    \n    [self.box addSubview:self.rightView];\n\n}\n```\n\nThe next method, `transitionInFromRight`,\
    \ takes `rightView` and slides it into place so that it fits perfectly into the\
    \ space provided by `box`. It also sets the alpha value to 1.0, making it fully\
    \ opaque. Note that unlike the previous method, this uses `rightView`’s `animator`\
    \ method to access the view’s animation proxy so that setting these values actually\
    \ creates implicit animations for us.\n\n```objc\n- (void)transitionInFromRight\
    \ {\n\n    [[self.rightView animator] setFrame:[self.box bounds]];\n\n    [[self.rightView\
    \ animator] setAlphaValue:1.0];\n\n}\n```\n\nBefore we go any further, let’s check\
    \ our work. Run the app, and see the first item from the tab view slide into place\
    \ and fade in from invisibility to full opacity at the same time, as shown in\
    \ Figure [15-9](#A978-1-4302-4543-8_15_Chapter.html#Fig9).\n\n![A978-1-4302-4543-8_15_Fig9_HTML.jpg](A978-1-4302-4543-8_15_Fig9_HTML.jpg)\n\
    \n**Figure 15-9.** The first “page” is sliding into view. Note the slightly grayed-out\
    \ appearance of the objects in the box, which are all at about 50 percent opacity\
    \ at this point\n\nThat’s a start! Now let’s move on to the next item in the list:\
    \ providing an implementation for the `next:` method. Some of this code is similar\
    \ to what we had in the `applicationDidFinishLaunching:` method. We prepare the\
    \ right side, start some transitions (including a call to another new internal\
    \ method, `transitionOutToLeft`, which we’ll get to soon), and update an index\
    \ (including another bounds check) and some pointers at the end.\n\nThe biggest\
    \ difference here is that the methods that are going to do animation are all sandwiched\
    \ between calls to `[NSAnimationContext beginGrouping]` and `[NSAnimationContext\
    \ endGrouping]`, which work together to form a sort of transaction. Between those\
    \ two calls, any animations that are added to the default animation context, including\
    \ all implicit animations, will be set up to run simultaneously. This means that\
    \ as we create implicit animations in our internal methods, they will all be set\
    \ up to fire off simultaneously. Without this step, the animations we create would\
    \ all start running in sequence, one after another as they’re created. Normally\
    \ this won’t make much of a difference, but it’s entirely possible that some unexpected\
    \ event could occur just as those animations are being created, such as another\
    \ process suddenly hogging the CPU, which could lead to these animations running\
    \ in a slightly staggered manner, starting and ending at different times. By wrapping\
    \ them in a grouping as shown here, that potential problem is eliminated.\n\n\
    ```objc\n- (IBAction)next:(id)sender {\n\n    [self prepareRightSide];\n\n   \
    \ [NSAnimationContext beginGrouping];\n\n    [[NSAnimationContext currentContext]\
    \ setDuration:ANIM_DURATION];\n\n    [self transitionInFromRight];\n\n    [self\
    \ transitionOutToLeft];\n\n    [NSAnimationContext endGrouping];\n\n    self.currentTabIndex++;\n\
    \n    if (self.currentTabIndex >= [self.items count])\n\n        self.currentTabIndex\
    \ = 0;\n\n    self.leftView = self.middleView;\n\n    self.middleView = self.rightView;\n\
    \n}\n```\n\nThe `next:` method also calls another internal method, `transitionOutToLeft`,\
    \ which will take the current view and shuffle it off to the left. Its implementation\
    \ looks like this:\n\n```objc\n- (void)transitionOutToLeft {\n\n    NSRect newFrame\
    \ = [self.middleView frame];\n\n    newFrame.origin.x -= newFrame.size.width;\n\
    \n    [[self.middleView animator] setFrame:newFrame];\n\n    [[self.middleView\
    \ animator] setAlphaValue:0.0];\n\n}\n```\n\nWith that in place, we’re now ready\
    \ to Run once again. This time we’ll see that not only does the initial view setup\
    \ work, but now we can also hit the Next button to transition to the next view!\
    \ Smooth. See Figure [15-10](#A978-1-4302-4543-8_15_Chapter.html#Fig10).\n\n![A978-1-4302-4543-8_15_Fig10_HTML.jpg](A978-1-4302-4543-8_15_Fig10_HTML.jpg)\n\
    \n**Figure 15-10.** View Three is on its way out, View Four is almost halfway\
    \ in\n\nNow all that’s left is to implement matching methods for rightward transitions.\
    \ These methods are all pretty similar to the others and are presented here without\
    \ further comment, except one: you may be tempted to copy and paste the existing\
    \ methods and make whatever you changes you can spot, but be careful! Some of\
    \ the differences are subtle but important.\n\n```objc\n- (void)prepareLeftSide\
    \ {\n\n    NSInteger previousTabIndex = self.currentTabIndex-1;\n\n    if (previousTabIndex\
    \ < 0)\n\n        previousTabIndex = [self.items count]-1;\n\n    self.leftView\
    \ = [[self.items objectAtIndex:previousTabIndex] view];\n\n    NSRect viewFrame\
    \ = [self.box bounds];\n\n    viewFrame.origin.x -= viewFrame.size.width;\n\n\
    \    [self.leftView setFrame:viewFrame];\n\n    [self.leftView setAlphaValue:0.0];\n\
    \n    [self.box addSubview:self.leftView];\n\n}\n\n- (void)transitionInFromLeft\
    \ {\n\n    [[self.leftView animator] setFrame:[self.box bounds]];\n\n    [[self.leftView\
    \ animator] setAlphaValue:1.0];\n\n}\n\n- (void)transitionOutToRight {\n\n   \
    \ NSRect newFrame = [self.middleView frame];\n\n    newFrame.origin.x += [self.box\
    \ bounds].size.width;\n\n    [[self.middleView animator] setFrame:newFrame];\n\
    \n    [[self.middleView animator] setAlphaValue:0.0];\n\n}\n\n- (IBAction)previous:(id)sender\
    \ {\n\n    [self prepareLeftSide];\n\n    [NSAnimationContext beginGrouping];\n\
    \n    [[NSAnimationContext currentContext] setDuration:ANIM_DURATION];\n\n   \
    \ [self transitionInFromLeft];\n\n    [self transitionOutToRight];\n\n    [NSAnimationContext\
    \ endGrouping];\n\n    self.currentTabIndex--;\n\n    if (self.currentTabIndex\
    \ < 0)\n\n        self.currentTabIndex = [self.items count]-1;\n\n    self.rightView\
    \ = self.middleView;\n\n    self.middleView = self.leftView;\n\n}\n```\n\nNow\
    \ click Run; we should be able to animate transitions in both directions.\n\n\
    ## Wrap Up\n\nHopefully the previous chapter and this one have provided a solid\
    \ footing in a variety of Cocoa drawing techniques, including several uses of\
    \ Bezier curves, making views interactive by using the mouse, and fairly painless\
    \ animation with Core Animation. The scope of this book doesn’t really allow us\
    \ to delve any further into these topics, but know that especially considering\
    \ that where graphics and animation are concerned, the only limit is your own\
    \ imagination! We’ve provided the basic tools. If you want to do more with graphics,\
    \ you should dig deeper into the areas that interest you most and see what you\
    \ can do with the APIs that Cocoa gives you. That’s where the fun really begins!"
