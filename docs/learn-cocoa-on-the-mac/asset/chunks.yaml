    ### 关于那个文件：图形界面


    就代码层面而言，就是这样了。现在我们来设置图形界面。打开 `MainMenu.xib`，我们首先要建立一个连接，以便菜单项能调用我们应用委托的 `chooseFile:`
    方法。在主 nib 编辑区内打开菜单，进入“文件”菜单，按住 Ctrl 键从“打开”项拖出一条连接线，指向主 nib 窗口中代表应用委托的图标。然后从弹出的小菜单中选择
    `chooseFile:`。


    现在是时候处理窗口本身了，所以双击 dock 中的窗口图标，使其出现在编辑区。这个图形界面完全由 Cocoa 绑定驱动。我们的控制器没有任何插座指向此窗口中的任何对象，窗口中也没有任何对象调用我们控制器中的任何动作方法。我们将逐一讲解所有绑定，但首先，图
    16-2 展示了在 Interface Builder 中看到的完整窗口视图，所有对象均已选中。


    ![A978-1-4302-4543-8_16_Fig2_HTML.jpg](img/A978-1-4302-4543-8_16_Fig2_HTML.jpg)


    **图 16-2.** 我们所有的窗口组件，已高亮显示以便查看


    注意，在表视图和大的文本视图之间有一个小的“凹痕”。这实际上是 `NSSplitView` 的可拖动控件，它允许我们垂直或水平堆叠两个视图，并通过一次拖拽同时调整两者的大小。它常在
    Xcode 及其他地方使用，稍后我们将看到如何在这里设置它。


    现在，让我们开始逐步创建这个窗口，一边创建一边连接所有绑定。前几个对象最终应看起来像图 16-3，因此可以提前查看以获得一些指导。在窗口顶部附近，放置几个标签，并将左侧标签的标题改为“所选文件：”。然后在其间放置一个
    `NSImageView`。要找到此类，请在库中搜索“`NSImageView`”、“image well”或“image view”。通过选中左侧标签，然后从菜单中选择“编辑”➤“格式”➤“字体”➤“粗体”，使其以粗体显示，并将右侧标签拉宽，使其几乎延伸到窗口的右边缘。我们希望图像视图显示的文件图标看起来像是浮在窗口背景上，因此选中图像视图，并使用属性检查器，从“边框”弹出菜单中选择“无”来移除其边框。同时，将“缩放”弹出菜单改为“按比例上下缩放”，这样无论系统提供的是小图标还是大图标，它都会被缩放以适应可用空间。此时图形界面应如图
    16-3 所示。


    ![A978-1-4302-4543-8_16_Fig3_HTML.jpg](img/A978-1-4302-4543-8_16_Fig3_HTML.jpg)


    **图 16-3.** 用于显示所选文件图标和路径的图形界面。此截图选中了图像视图；否则它是不可见的


    现在是时候设置图像视图和右侧标签的绑定了。选中图像视图，打开绑定检查器，使用 `self.fileIcon` 键路径将其值绑定到应用委托。然后选中右侧的标签，使用
    `self.filename` 键路径将其值绑定到应用委托。


    窗口的下一部分看起来就像我们之前创建的一样。实际上，添加这些对象最快的方法是，拖一个框选中上面显示的三个对象，按 ⌘D 复制所选对象，然后将新对象拖下来，排列在其他对象下方。将新左侧标签的标题改为“打开应用：”，并根据需要调整其位置。图
    16-4 展示了效果。


    ![A978-1-4302-4543-8_16_Fig4_HTML.jpg](img/A978-1-4302-4543-8_16_Fig4_HTML.jpg)


    **图 16-4.** 图形界面的这一部分将让我们看到文件是用哪个应用打开的。此处两个图像视图都已显示，因为否则，就像之前一样，它们是不可见的


    重新配置新图像视图的绑定，使用 `self.opensAppIcon` 键路径将其值连接到应用委托，然后使用 `self.opensAppName` 键路径将右侧标签的值连接到应用委托。


    接下来，我们继续处理表视图。从库中拖出一个表视图，并将其加宽，使其与图 16-5 相符。


    ![A978-1-4302-4543-8_16_Fig5_HTML.jpg](img/A978-1-4302-4543-8_16_Fig5_HTML.jpg)


    **图 16-5.** 我们将在此处显示文件的所有属性


    这个表视图将包含系统提供给我们的所有文件属性。这些属性以字典形式提供，这正好适合使用 Apple 的 `NSDictionaryController` 类。使用
    `NSDictionaryController`，只需通过 Cocoa 绑定进行连接，我们就能够在表视图中将所有选中文件的属性显示为键值对。


    在库中搜索 `NSDictionaryController`，并将其拖到 Interface Builder 的 dock 中，以便将其添加到 nib 文件中。然后点击
    dock 中其图标旁边的文本，将其重命名为 `attrDict`，以便稍后绑定时能轻松识别。与其他包含的控制器类一样，字典控制器类能够通过绑定获取其内容。使用绑定检查器，将其“内容字典”（位于“控制器内容”组中）绑定到应用委托的
    `self.fileAttributes` 键路径。


    现在我们只需将表视图的列绑定到新的控制器。选中左列，使用绑定检查器，将其“值”列绑定到 `attrDict`，使用 `arrangedObjects` 作为控制器键，`key`
    作为键路径。这将使得左列显示字典中每个键值对的键。现在选中右列，将其“值”列绑定到 `attrDict`，使用 `arrangedObjects` 作为控制器键，`value`
    作为模型键路径。


    接下来，从库中选取一个 `NSTextView`，将其拖入我们正在创建的窗口中，放置在靠近底部的位置。我们的窗口开始变得有点拥挤了！同时减小表视图和文本视图的高度，使它们能够舒适地上下堆叠，并在下方留出相当大的空间，因为我们后面会用到。然后调整文本视图的大小，使其宽度与表视图相同。所有这些如图
    16-6 所示。


    ![A978-1-4302-4543-8_16_Fig6_HTML.jpg](img/A978-1-4302-4543-8_16_Fig6_HTML.jpg)


    **图 16-6.** 将文本视图正确放置在表视图下方之后，窗口应呈现的样子


    当我们从库中拖出一个文本视图时，它实际上包含在一个滚动视图中，因此需要额外点击一下以选中滚动视图内部的文本视图。然后使用属性检查器取消选中“可编辑”复选框（我们只想在这里显示文件，而不是编辑它）以及“富文本”复选框。现在正是引入
    `NSSplitView` 的好时机，正如之前所提示的那样。确保表视图和文本视图（实际上是包含它的滚动视图）大小大致相同，并将它们上下对齐。然后选中两者，从菜单中选择“编辑器”➤“嵌入”➤“分割视图”。这样做会将它们紧密排列，并在其间绘制出那个小凹痕。


    现在再次只选中文本视图。请记住，我们可以通过按住 Shift-Ctrl 键并点击文本视图，然后从显示的对象堆栈中选择文本视图，来避免选择视图层次结构中正确对象时的歧义和额外步骤。切换到绑定检查器，将文本视图的值绑定到应用委托的
    `self.fileStringValue` 键路径。

