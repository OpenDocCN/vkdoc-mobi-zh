    be binding the `Selected Tag` attribute, which means that when a user selects
    a cell, that cell’s tag will be pushed down to the model, and when the Preferences
    window is brought up next time, that saved tag will determine which radio button
    is selected. Open up the Selected Tag section of the Bindings Inspector, and again
    make sure that Shared User Defaults Controller is selected and that the Controller
    Key is “values,” but this time type “characterStatsGenerationPolicy” into the
    Model Key Path and press Enter.


    Next, let’s tackle the Allowed Character Classes checkboxes. For each of these,
    we’ll make up a new key name and use it to bind the Selected status to a value
    in the user’s application preferences. Click the first cell, Paladin. The Inspector
    title should change to Button Cell Bindings. If not, click the button again until
    it does. Now bind this button cell’s `Value` attribute to the `characterClassAllowedPaladin`
    key. Repeat these steps for each of the remaining button cells, binding each of
    them via Shared User Defaults Controller with the appropriate key name. `Bard`
    should be bound with `characterClassAllowedBard`, `Fighter` with `characterClassAllowedFighter`,
    and so on. When we get to `Magic-User`, for the sake of consistency, use the key
    name `characterClassAllowedMagicUser`, leaving out the - symbol.


    #### Bindings for Monster Generation


    Now switch over to the Monster Generation tab. Bind the Value of the slider to
    `monsterBootyFrequency`, and do the same for the small text field to the right.
    Then configure the checkboxes the same way we did on the Character Generation
    tab. Click the Orc checkbox until the checkbox itself is selected, and bind its
    Value to `monsterTypeAllowedOrc`. Continue through the rest of the checkboxes,
    binding the Value for each of them to the appropriate key name: `monsterTypeAllowedGoblin`,
    `monsterTypeAllowedOgre`, and so on.


    #### Bindings for Dungeon Generation


    Finally, switch to the Dungeon Generation tab, which contains just three slider
    and text field pairs. To the right of the Tunnel Twistiness label, configure the
    Value bindings for both the slider and the text field to “dungeonTunnelTwistiness.”
    Bind both of the Monster Frequency controls’ Values to `dungeonMonsterFrequency`
    and both of the Treasure Frequency controls’ Values to `dungeonTreasureFrequency`.'
  trans: '

    ### 角色生成界面的绑定


    前往我们正在构建的偏好设置窗口，切换回“角色生成”面板。点击滑块，然后调出绑定检查器(`⌥⌘7`)。在此检查器中，我们可以看到视图对象的所有属性，这些属性都可以绑定到模型对象中的某个值。通常，我们会将
    `Value`(值) 绑定到某个内容，但每个视图类都提供了自己的一组可供绑定的属性。例如，滑块可以将其 `Max Value`(最大值) 和 `Min Value`(最小值)
    属性绑定到某个值，这使我们能够根据模型对象中的值来改变这些极值。其他一些视图对象可以将文本颜色和字体绑定到模型值，并且它们中的大多数都可以将其 `Hidden`(隐藏)
    和 `Enabled`(启用) 状态绑定到模型值。目前，我们要绑定这个滑块的 `Value` 属性，因此请点击 Value(值) 的展开三角形来查看其配置选项。图
    7-6 显示了默认设置。


    ![A978-1-4302-4543-8_7_Fig6_HTML.jpg](img/A978-1-4302-4543-8_7_Fig6_HTML.jpg)


    图 7-6. `NSSlider` 的 `Value` 绑定选项的默认“未绑定”状态


    要建立绑定，我们需要配置至少三项内容：要绑定的控制器对象、控制器键以及模型键路径（其余都是可选设置，用于在特殊情况下细化绑定的行为，我们将在后面介绍其中一些）。从“绑定到”弹出列表中选择控制器对象，该列表包含我们
    nib 文件中存在的所有控制器对象，包括我们自己的任何控制器、从库中拖入的任何通用控制器，以及像 `NSUserDefaultsController` 这样的特殊控制器——它在每个
    nib 文件中都自动可用（在弹出列表中显示为“共享用户默认控制器”）。控制器键让我们可以选择控制器所提供的一个或多个模型对象的不同“方面”。例如，`NSArrayController`
    提供了对对象数组的绑定访问，它具有不同的控制器键来提供对整个排序数组或仅当前选中的内容的访问。模型键路径是一个字符串，用作在模型对象中获取和设置值的键。


    那么，对于我们的第一个绑定，首先从弹出列表中选择“共享用户默认控制器”。该控制器在任何 nib 文件中都是自动可用的，不过我们在将其用于绑定之前是看不到它的，一旦使用，它就会出现在主
    nib 窗口中。现在检查“控制器键”组合框，确保它设置为 `values`。然后点击“模型键路径”组合框，并输入 `characterMaxNameLength`
    到该组合框中。此字符串定义了将用于把滑块的值存储到 `NSUserDefaults`（用户的应用程序偏好设置）中的键。按 Return 键或切换到其他字段，请注意检查器顶部的“绑定到”复选框被勾选了。就这样！我们现在无需担心任何剩余的控件；它们的默认值对我们来说已经足够。图
    7-7 显示了此绑定配置完成后检查器中相关配置部分应该呈现的样子。


    ![A978-1-4302-4543-8_7_Fig7_HTML.jpg](img/A978-1-4302-4543-8_7_Fig7_HTML.jpg)


    图 7-7. 第一个滑块完成的绑定


    现在选择滑块右侧的小文本字段，并配置与滑块完全相同的绑定：“共享用户默认控制器”、`values` 和 `characterMaxNameLength`。这将使其从同一个模型对象（用户的应用程序偏好设置）中的同一个位置（`characterMaxNameLength`
    的值）获取其显示值。要立即查看 Cocoa 绑定的魔力，请从菜单中选择“编辑器”➤“模拟界面”，点击并拖动滑块，观察小文本字段中的值同时更新。请注意，这与我们在第
    2 章中构建的功能相同，但机制不同：当我们拖动滑块时，它的值被 `NSUserDefaultsController` 推送到我们的应用程序偏好设置中，该控制器同时将值传递给绑定到同一个键的其他对象，也就是小文本字段。真是个巧妙的手段！但这并非什么戏法。它是
    Cocoa 绑定动态特性的一个简单示例。利用这项技术，我们可以从控制器类中消除大量乏味的代码，有时甚至可以完全摆脱我们的控制器类——仅使用 Cocoa 自带的控制器类。


    接下来我们看看下一个 GUI 控件，中间的单选按钮矩阵。点击该矩阵，然后查看绑定检查器，我们会发现没有 `Value` 选项。对于这个控件，我们不绑定 `Value`，而是绑定
    `Selected Tag`(选中标签) 属性，这意味着当用户选择一个单元格时，该单元格的标签将被推送到模型中，并且下次打开偏好设置窗口时，保存的那个标签将决定选中哪个单选按钮。展开绑定检查器的“选中标签”部分，再次确保选中了“共享用户默认控制器”并且“控制器键”是
    `values`，但这次在“模型键路径”中输入 `characterStatsGenerationPolicy` 并按 Return 键。


    接下来，我们来处理“允许的角色职业”复选框。对于每个复选框，我们都会创建一个新的键名，并用它将 `Selected`(选中) 状态绑定到用户应用程序偏好设置中的一个值。点击第一个单元格“圣骑士”。检查器标题应更改为“按钮单元格绑定”。如果没有，请再次点击该按钮直到标题改变。现在将这个按钮单元格的
    `Value` 属性绑定到 `characterClassAllowedPaladin` 键。对剩下的每个按钮单元格重复这些步骤，通过“共享用户默认控制器”并使用相应的键名来绑定它们。“吟游诗人”应绑定到
    `characterClassAllowedBard`，“战士”绑定到 `characterClassAllowedFighter`，依此类推。当处理到“魔法使用者”时，为了保持一致，请使用键名
    `characterClassAllowedMagicUser`，省略掉 `-` 符号。


    ### 怪物生成界面的绑定


    现在切换到“怪物生成”标签页。将滑块的 `Value` 绑定到 `monsterBootyFrequency`，右侧的小文本字段也同样绑定。然后，按照我们在“角色生成”标签页上的方式配置复选框。点击“兽人”复选框直到复选框本身被选中，并将其
    `Value` 绑定到 `monsterTypeAllowedOrc`。继续处理其余的复选框，将每个复选框的 `Value` 绑定到相应的键名：`monsterTypeAllowedGoblin`、`monsterTypeAllowedOgre`，依此类推。


    ### 地牢生成界面的绑定


    最后，切换到“地牢生成”标签页，其中只包含三对滑块和文本字段。在“通道曲折度”标签右侧，配置滑块和文本字段的 `Value` 绑定到 `dungeonTunnelTwistiness`。将两个“怪物频率”控件的
    `Value` 都绑定到 `dungeonMonsterFrequency`，并将两个“宝藏频率”控件的 `Value` 都绑定到 `dungeonTreasureFrequency`。

