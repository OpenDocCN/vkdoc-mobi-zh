    The last attribute left to configure is the `depiction` attribute. As mentioned
    earlier, the `depiction` attribute is meant to store an image, and Core Data doesn’t
    know anything about the `NSImage` class normally used in Cocoa. Fortunately, Core
    Data’s Transformable type provides a simple way to store an image anyway. Create
    a new attribute, naming it “depiction,” and then select Transformable as the type.
    Note that the Inspector changes to show the configuration options for Transformable.
    In the Inspector, turn the Optional checkbox on (and the others off). The configuration
    options for Transformable are pretty simple: a single text field labeled Value
    Transformer Name. However, there’s more here than meets the eye. The idea is that
    a Transformable attribute holds a chunk of data that Core Data doesn’t really
    understand; when Core Data reads this chunk of data from storage, it puts it into
    an `NSData` object (an object that can hang onto any old chunk of data, acting
    as an Objective-C “wrapper” for it), which it then passes through a transformer,
    a special class that knows how to take an object of one kind and transform it
    into something else. In the other direction, when an object is going to be saved
    to storage, Core Data takes the new value and passes it through the same transformer,
    however this time doing the transformation in the reverse direction.


    In this case, we’re going to use a transformer called `NSKeyedUnarchiveFromData`,
    which knows how to produce an object of any kind, given an `NSData` object containing
    a key-archived version of the object. What is keyed archiving? We won’t go into
    it in detail here, but basically keyed archiving is a way of archiving or serializing
    all of an object’s instance variables in a dictionary-like format, making it possible
    to reconstruct the object later. This technology is used in a variety of ways
    in Cocoa, and all of Cocoa’s classes have this functionality built in. This means
    that we can take an `NSImage`, or an instance of any other Cocoa class, and stuff
    it into an `NSData` object using `NSKeyedUnarchiveFromData`’s reverse transformation.
    And if we implement the `NSCoding` protocol in our own classes, saving and loading
    their instance variables in a keyed fashion, we can archive our own objects in
    the same way.


    Getting back to the depiction field, the idea is to write the name of the transformer
    class into the Value Transformer Name text field. As it turns out, keyed archiving
    is so widespread that in this situation, specifying a transformer for an attribute
    in Xcode’s modeling tool, it’s used as a default. If we just leave the field blank,
    the entity will be configured to use `NSKeyedUnarchiveFromData` to transform model
    attribute values to and from `NSData` for storage.


    We’ve now defined the entire model for this chapter’s MythBase application, so
    let’s move on to creating the GUI.


    ## Designing the GUI


    Since we’ve laid out several user interfaces using Interface Builder already,
    we’re going to go through the basics pretty quickly, and we won’t give the keyboard
    shortcuts for each inspector. This app will be similar to the VillainTracker app
    from [Chapter 6](#A978-1-4302-4543-8_6_Chapter.html). Our user interface will
    allow a user to search the database of mythical people, add and delete them, and
    change their characteristics. What’s more, we’ll be using Cocoa bindings to make
    the connections.


    AUTOMATIC GUI


    Xcode 3 included a feature called the Core Data Entity Interface Assistant for
    automatically laying out a GUI with basic CRUD features based on a Core Data model.
    This feature was removed in Xcode 4, so we have to do it by hand. As it turns
    out, this is really easy, and the process should feel familiar having worked through
    the previous chapters. Not only that, the UI generated by Xcode usually needed
    a bunch of cleanup anyway.'
  trans: '

    ### 为 `goodness` 和 `power` 创建数值属性


    接下来，我们要创建另外两个数值属性：`goodness` 和 `power`。这两个属性同样在 0 到 100 的范围内描述每个 `MythicalPerson`
    的特征，并且其配置将与 `divinity` 完全相同（当然，属性名称不同）。创建它们并赋予相同选项的最简单方法是：在表格视图中点击 `divinity`
    属性将其选中，然后复制（⌘C），再粘贴（⌘V）两次，从而得到两个名为“divinity1”和“divinity2”的新属性。将这两个属性重命名为“goodness”和“power”即可。这两个新属性将与原始属性拥有相同的最小值和最大值。


    ### 不支持类型的属性


    最后一个需要配置的属性是 `depiction`。如前所述，`depiction` 属性用于存储图像，而 Core Data 对 Cocoa 中通常使用的
    `NSImage` 类一无所知。幸运的是，Core Data 的“可转换”（Transformable）类型提供了一种简单的方法来存储图像。创建一个新属性，将其命名为“depiction”，然后选择类型为“Transformable”。注意，检查器会发生变化，显示“可转换”类型的配置选项。在检查器中，选中“可选”复选框（并取消选中其他复选框）。“可转换”类型的配置选项非常简单：只有一个标记为“值转换器名称”的文本字段。不过，实际情况远不止表面所见。其思路是，“可转换”属性存储的是
    Core Data 并不真正理解的一堆数据；当 Core Data 从存储中读取这堆数据时，会将其放入一个 `NSData` 对象（一个能够挂接任意旧数据块，并作为其
    Objective-C“包装器”的对象）中，然后通过一个转换器（一种知道如何将一种对象转换为另一种对象的特殊类）进行处理。反过来，当要保存对象到存储时，Core
    Data 会获取新值并将其传递给同一个转换器，不过这次是进行反向转换。


    在这种情况下，我们将使用一个名为 `NSKeyedUnarchiveFromData` 的转换器，它知道如何根据包含对象键归档版本的 `NSData` 对象来生成任意类型的对象。什么是键归档？这里我们不详细讨论，但基本上，键归档是一种以类似字典的格式归档或序列化对象所有实例变量的方式，使得以后可以重建该对象。这项技术以多种方式用于
    Cocoa 中，并且所有 Cocoa 类都内置了此功能。这意味着我们可以获取一个 `NSImage` 或任何其他 Cocoa 类的实例，并使用 `NSKeyedUnarchiveFromData`
    的反向转换将其塞入 `NSData` 对象中。此外，如果我们在自己的类中实现 `NSCoding` 协议，并以键归档的方式保存和加载其实例变量，我们也可以用同样的方式归档自己的对象。


    回到 depiction 字段，思路是将转换器类的名称写入“值转换器名称”文本字段。事实证明，键归档非常普遍，以致于在 Xcode 建模工具中为属性指定转换器时，这会被用作默认值。如果我们将该字段留空，实体将配置为使用
    `NSKeyedUnarchiveFromData` 来转换模型属性值，以便在存储时与 `NSData` 之间进行转换。


    至此，我们已经为本章的 MythBase 应用定义了完整的模型，接下来我们将继续创建 GUI。


    ## 设计 GUI


    由于我们已经使用 Interface Builder 设计过几个用户界面，因此我们将快速过一下基础知识，并且不会为每个检查器提供键盘快捷键。这个应用将与第
    6 章中的 VillainTracker 应用类似。我们的用户界面将允许用户搜索神话人物数据库，添加和删除它们，并更改它们的特征。此外，我们将使用 Cocoa
    绑定来建立连接。


    ### 自动生成 GUI


    Xcode 3 包含一个名为“Core Data 实体界面助手”的功能，用于根据 Core Data 模型自动布局一个具有基本 CRUD（增删改查）功能的
    GUI。此功能在 Xcode 4 中被移除，因此我们必须手动完成。事实证明，这非常简单，并且过程应该会让你感到熟悉，就像完成了之前的章节一样。不仅如此，Xcode
    生成的 UI 通常也需要大量清理工作。

    '
- fmt: '### Creating the MythBase display


    To start, in Xcode, single-click on the `MainMenu.xib` file. In the Object Dock
    on the left, open up the main window called “Window - MythBase.” We’re going to
    drag out a table view and a bunch of fields to allow us to create and edit the
    attributes of the mythical people managed by our database, so we’ll start by making
    the window taller. Drag it out to be 500 pixels high. Next, in the Object Library,
    type “search” in the search field in the bottom of the Inspector. The Object Library
    should show a single object, a Search Field. Drag the Search Field out of the
    Object Library and onto the main MythBase window, positioning it in the upper
    right-hand corner of the window, letting the blue guidelines indicate where to
    position it. Next, type “table” in the Object Library search field. Drag a Table
    View out to MythBase window, positioning it to the left edge of the window. Stretch
    it out to fill the width of the window, until it connects with the vertical blue
    guideline in the right. Position the table view below the search field; it will
    snap into place a few pixels below the search field.


    Open the Attributes Inspector, and set the table view’s Content Mode to be view-based.
    Set the Column Sizing to be “First Column Only.” Below the Content Mode, set the
    table view to have five columns. While setting the table view to five columns,
    you may note a horizontal scroll bar flashing underneath the table view. The added
    columns will be off the right side of the table view, so click on the second column
    and resize it to be narrower until all five columns are visible, as shown on Figure
    [8-5](#A978-1-4302-4543-8_8_Chapter.html#Fig5).


    ![A978-1-4302-4543-8_8_Fig5_HTML.jpg](A978-1-4302-4543-8_8_Fig5_HTML.jpg)


    Figure 8-5.


    Laying out the table view for MythBase


    The table view will show all of the attributes we’ve defined for the `MythicalPerson`
    entity except for `details`, so we’ll want to set labels in the column header.
    In the table view, click on the header of the first column until it turns into
    an editable text field. Type “Name” in the textfield to set the column title.
    Click in the next column, and set its name to “Divinity.” Set the titles of the
    next three columns to “Power,” “Goodness,” and “Depiction.”


    Next, we’ll set up an indicator to show how many results are found when doing
    a search. In the Object Library search field, type “Label” and drag out a Label
    field to the left of the window, just below the table view. As always, the blue
    guidelines will indicate where to put it. Set the title of the label to “# out
    of #” and resize it so that all the text is visible.


    Our next set of controls will be buttons to search, add, and delete records. In
    the Object Library search field, type “Button.” Cocoa has a variety of button
    styles, so we’ll get a healthy set of choices. For this app, let’s use Gradient
    buttons. Drag out one and position it underneath the table view, and parallel
    with the text field from the previous step. Title it “Fetch.” Drag out two more,
    positioning them to the right of the Fetch button. Title these new buttons “Delete”
    and “Add.” After titling them, position them underneath the table view and aligned
    with the right edge of the window. The layout should match that of Figure [8-6](#A978-1-4302-4543-8_8_Chapter.html#Fig6).


    ![A978-1-4302-4543-8_8_Fig6_HTML.jpg](A978-1-4302-4543-8_8_Fig6_HTML.jpg)


    Figure 8-6.


    Adding a result counter and buttons


    ### Displaying Details


    We now need to lay out controls to display the details of a selected Mythical
    Person. Our Core Data entity’s attributes are `name`, `divinity`, `power`, `goodness`,
    `depiction`, and `details`, and that’s what our user interface will show. Start
    by finding and dragging out a Label below the buttons and near the centerline
    of the window. Double-click in it to set its title to “Name:.” In the Object Library,
    find and drag out a Text Field (enter “field” in the search field) next to the
    Name: label. Stretch it out until it’s about a third of the width of the window,
    200 pixels or so. Drag it to be below the buttons and aligned with the right edge
    of the screen. The blue guidelines show to snap it into place. Drag the Name:
    label to have it snap into place to the left of the text field.


    Click the Label once to select it, hit ⌘C to copy it, and then ⌘V to paste a new
    one below it. The pasted label will appear below and to the right of the first
    one. Drag it into position directly below the first label; it will snap into place
    at the right distance below the first label. Do this two more times so that there
    are three labels lined up below the first one. Select all four of them and select
    Editor ➤ Align ➤ Right Edges (⌘]). Lastly, set the titles of these labels to be
    “Divinity:,” “Power:,” and “Goodness:.” The labels should automatically resize
    to show the whole title, but keeping the right edges aligned.


    The `divinity`, `power`, and `goodness` attributes are all numeric, so we’ll use
    a slider to set them. In the Object Library, search for slider, and then drag
    out a Horizontal Slider next to the Divinity: label and below the text field for
    Name. Stretch it out to be the same width as the text field. As always, the blue
    guidelines will show the way. In the Attributes Inspector, make sure that the
    slider has a min value of 0, a max value of 100, and a default value of 50, just
    like the `divinity` attribute that we created on the Mythical Person Core Data
    entity. Check the Continuous checkbox in the Attributes Inspector as well. As
    we did with the labels, select this slider and hit ⌘C to copy it, and then ⌘V
    to paste a new one below it. Reposition the new slider to line up with the Divinity
    slider and be aligned with the Power: label. Press ⌘V again to paste another slider,
    and position that one below the first two and aligned with the Goodness: label.
    The window should look like Figure [8-7](#A978-1-4302-4543-8_8_Chapter.html#Fig7).


    ![A978-1-4302-4543-8_8_Fig7_HTML.jpg](A978-1-4302-4543-8_8_Fig7_HTML.jpg)


    Figure 8-7.


    Adding controls to manage Mythical Details


    The two attributes that don’t yet have a display control are `depiction` and `details`.
    We’ll use an image well and a text box for these. In the search field in the Object
    Library, type in “image,” and then drag an Image Well out to the lower left corner
    of the screen and let it snap to the blue guidelines in the corner. Resize it
    to be 150 pixels high and 200 pixels wide. In the Attributes Inspector, set the
    image well to be editable. This will allow a user to drag an image into the image
    well.'
