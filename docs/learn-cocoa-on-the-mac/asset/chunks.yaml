    to see the address of our new variable and its content, the object it’s pointing
    at. From here on out, we can refer to that inner error as just `$inner`, like
    this:


    ```

    (lldb) po [$inner domain]

    $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain

    (lldb) p (int)[$inner code]

    (int) $10 = 2

    (lldb) po [$inner userInfo]

    $11 = 0x00000001001039d0 {

    }

    (lldb) po [$inner localizedDescription]

    $12 = 0x000000010011d2c0 The operation couldn''t be completed. No such file or
    directory

    ```


    This presents us with yet another riddle. When we look at the underlying error,
    which has no `userInfo` dictionary at all, it still presents a human-readable
    `localizedDescription` that doesn’t seem immediately apparent just by looking
    at the domain and code. In fact, we could make our own inner and outer errors
    like this:


    ```

    NSError *innerError = [NSError errorWithDomain:NSPOSIXErrorDomain

    code:2 userInfo:nil];

    NSDictionary *outerInfo = @{NSUnderlyingErrorKey: innerError,

    NSFilePathErrorKey: @"/tmpfoo"};

    NSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain

    code:260 userInfo:outerInfo];

    ```


    Those errors will behave exactly like the ones generated by `NSFileManager`, including
    displaying human-readable text that we’re not specifying anywhere! As it turns
    out, the source of this magic seems to be the `NSError` class itself. It apparently
    has enough built-in specific knowledge about Cocoa’s error domains and error codes
    to generate meaningful sentences about many of the errors that a program is likely
    to encounter. This means that, in general, the errors provided to us by Cocoa
    method calls won’t need to be prettied up in order to be shown to users.


    ### Presenting an Error


    And how about showing errors to users, while we’re at it? Here we’ve been calling
    `[NSApp presentError:e]` to make the application display a modal window, but there
    are some other choices. In truth, the `presentError:` method is implemented in
    `NSResponder`, `NSDocument`, and `NSDocumentController`, which means that whenever
    an error occurs, we can pass it along to the nearest or most relevant object around,
    at which point it is passed along a chain of responsibility, similar to the responder
    chain, until some object actually displays the error. This opens up possibilities
    for displaying error messages in a different fashion, such as with a document-modal
    sheet alert.


    ## Wrap Up


    We’ve now seen the primary ways that a Cocoa app can deal with various kinds of
    unpleasantness, how to avoid some common mistakes, and how to use lldb to help
    track down problems. We’ve also seen how methods can use `NSError` instances to
    deal with problems in a controlled manner. All of this will come in handy as we
    delve further into Cocoa programming.


    # 14. Drawing in Cocoa


    ## Abstract


    By now we’ve learned lots of powerful Cocoa techniques for dealing with data,
    optimally arranging our application’s classes, and using the wide range of on-screen
    controls and other views that are included with Cocoa. Now it’s time to start
    learning how to use Cocoa to make our own view classes, gaining complete control
    over the display of text and graphics. Mac applications are commonly known for
    including “eye candy”—not just for drawing needless graphical flourishes, but
    also for creating a more immersive interactive experience for the user. The graphics
    technologies available to us as Cocoa programmers can help us achieve some of
    the same kinds of effects with a surprisingly small amount of effort on our part.


    Core Graphics provides rich functionality for rendering paths, manipulating coordinate
    systems, and more. One major part of Core Graphics is a set of APIs known as Quartz.
    Quartz, in fact, makes up such a huge part of Core Graphics that the two terms
    are sometimes used interchangeably. Core Animation takes things even further,
    letting us animate our views in a remarkably simple way.


    This chapter will cover some of the basics of coordinate systems and drawing into
    an `NSView` instance, and demonstrate how to display a view larger than the space
    available to it in the window by putting it in a scrolling view. It will also
    touch on how to easily add basic printing support to our applications.


    ## Fundamentals


    In this section, we’ll go through some of the basic concepts used in Cocoa’s drawing
    APIs. If you’ve done any sort of graphics programming, some of what’s available
    for drawing in Cocoa will be pretty familiar. After all, most of the basic concepts
    of computer graphics were hammered out decades ago. Where Cocoa stands out is
    both in the quality of its rendering, including anti-aliasing for both text and
    graphics primitives, and the availability of high-level abstractions for more
    complex concepts.


    Throughout this chapter, we’ll be referring to points, not pixels. Drawing in
    Cocoa is generally vector-based and resolution-independent. With the introduction
    of high-pixel-density displays (also called HiDPI or Retina displays), a point
    in the drawing model might actually be represented by one or four pixels on the
    display. It’s best, where possible, to let the underlying operating system figure
    out how to convert from the drawing primitives to actual pixels. By doing so,
    it’ll automatically look great on a high-resolution display. If you’re dealing
    with pixel-specific code, then you don’t get off so easy and you’ll need to worry
    about the differences between points and pixels, and how to scale bitmaps appropriately.
    For now, though, we’ll only be talking about points.


    ### The View Coordinate System


    Cocoa’s drawing systems work with an x-y coordinate system where, by default,
    the origin point (0,0) is at the lower left, the x-axis points to the right (increasing
    values take us further to the right), and the y-axis points up (increasing values
    take us further up on the screen). This is similar to the way graphs are traditionally
    done in mathematics, but flipped from many other computer graphics systems where
    the y-axis points down (increasing values take us further down on the screen).
    Although it’s possible and sometimes desirable to flip the y-axis in Cocoa, we
    won’t be doing so in our examples.


    Drawing is normally done by instances of `NSView` subclasses. Views exist in a
    hierarchy. If the top-most view in the hierarchy is set to be the `contentView`
    of an `NSWindow`, then all the views in that hierarchy are displayed within that
    window. The top-level view in a window, the `contentView`, can draw across the
    entire area of the window. For every other view in the hierarchy, the drawing
    area is limited to its frame, a space within the coordinates of its parent view
    (see Figure [14-1](#A978-1-4302-4543-8_14_Chapter.html#Fig1)).


    ![A978-1-4302-4543-8_14_Fig1_HTML.jpg](A978-1-4302-4543-8_14_Fig1_HTML.jpg)


    **Figure 14-1.** A simple hierarchy of views. The window’s `contentView` contains
    an `NSBox`, which in turn contains an `NSMatrix` containing radio buttons'
