  trans: '

    ### 使用 Xcode 的模型编辑器


    首先，在 Xcode 的导航面板中单击 `MythBase.xcdatamodeld` 文件。这会在 Xcode 内置的模型编辑器中打开该模型文件，编辑器列出了三个表视图：属性、关系和获取属性，左侧还包含一个实体、获取请求和配置的概要视图。同时按下
    ⌥⌘3 打开数据模型检查器；由于我们尚未为实体定义任何结构，初始状态会显示“未选择”，如图 8-3 所示。模型编辑器有两种不同的视图样式：一种包含三个表视图的初始视图，另一种则类似于一张空白坐标纸。我们将使用图
    8-3 中所示的默认表视图样式，因为我们只需要一个模型类。当处理复杂模型时，坐标纸视图非常有助于概览所有不同实体及其相互关系。


    ![A978-1-4302-4543-8_8_Fig3_HTML.jpg](img/A978-1-4302-4543-8_8_Fig3_HTML.jpg)


    图 8-3. 创建任何实体之前的全新模型文件


    ### 创建实体


    对于 MythBase，我们将创建一个名为 `MythicalPerson` 的实体，并为其添加几个属性。首先，点击窗口底部附近的“添加实体”按钮来创建一个新实体。如您所料，这会在左侧的实体列表中创建一个名为“实体”的新实体。选中新实体后，其详细信息会显示在右侧的表视图中。将新实体的名称改为“MythicalPerson”，其余控件保持默认状态。我们的实体是一个名为
    `NSManagedObject` 的类的实例，这是 Core Data 中包含的一个通用类，为 Core Data 的模型对象提供了所有基本功能。稍后我们需要为该实体编写一些代码，届时我们将创建
    `NSManagedObject` 的自定义子类，不过现阶段使用这个通用类就足够了。


    现在让我们创建实体。我们进行了一些对象建模，并确定了神话人物可能具备的几个特征。


    `MythicalPerson` 实体将拥有六个属性。这些属性如表 8-1 所示，该表包含了每个属性的通用类型描述以及对应的 Core Data 存储类型。


    **表 8-1. MythicalPerson 属性**


    | 属性名称 | 通用类型 | Core Data 类型 |

    | --- | --- | --- |

    | name | 字符串 | String |

    | details | 字符串 | String |

    | divinity | 整数 (0-100) | Integer 16 |

    | goodness | 整数 (0-100) | Integer 16 |

    | power | 整数 (0-100) | Integer 16 |

    | depiction | 图片 | Transformable |


    Core Data 包含 `String` 和 `Date` 类型，以及一系列数值类型：`Integer 16`、`Integer 32`、`Integer
    64`、`Float`、`Double`、`Decimal` 和 `Bool`。此外，它还包含一个 `Binary` 类型，允许通用存储我们希望附加到实体上的任何类型的数据（我们自行将其打包成二进制块），以及一个特殊的
    `Transformable` 类型，允许将许多原本不支持的 Cocoa 类（例如 `NSImage`）与 Core Data 一起存储（稍后会详细介绍）。请注意，Core
    Data 存储类型与 Cocoa 中的值类（如 `NSString`、`NSNumber` 等）名称不同。当 Core Data 属性被读入正在运行的应用程序时，它们会被转换为最接近的
    Cocoa 等价类型，这意味着，例如，所有数值类型在应用程序中都会变为 `NSNumber`，并在保存时转换回底层的存储格式。


    ### 创建属性


    让我们开始创建 `MythicalPerson` 的属性。在 Xcode 中打开 `MythBase.xcdatamodeld` 文件，点击选中 `MythicalPerson`
    实体，然后点击窗口顶部“属性”表视图左下角的小 + 号。表视图中会出现一个新属性。将其名称设置为“name”，类型设置为 String，然后按回车键。


    现在查看右侧检查器中的复选框，标记为“可选”、“瞬态”和“已索引”。默认情况下，“可选”被勾选，其他未勾选。“可选”的含义很清楚。勾选它意味着用户在创建或编辑对象时可以选择不为该属性输入值。至于其他选项，勾选“瞬态”会配置该属性不随其他数据一起保存（尽管
    Core Data 仍会跟踪对该属性的更改以提供撤销/重做支持），而勾选“已索引”会为该属性启用索引，从而基于该属性实现对 Core Data 存储后端的高速搜索。对于
    `name` 属性，请确保只勾选“已索引”，其他不勾选。


    在复选框下方，您可以通过一个弹出列表指定属性的类型（这与表视图中的弹出菜单设置相同）。如果在主表视图中将“name”指定为 String，则会在其下方区域看到一些额外选项。在这里，我们可以指定简单的验证规则，例如字符串的长度。我们还可以指定默认值，该值会在创建新的
    `MythicalPerson` 实例时出现。在默认值字段中输入“Name”，其他字段留空。


    接下来，我们来处理 `details` 属性，它用于保存所述 `MythicalPerson` 的文本描述。点击“属性”表视图下方的 + 按钮添加一个新属性，并将新属性名称改为“details”。我们将以与
    name 属性稍有不同的方式来配置它。它应该是一个 String（从弹出列表中选择），并且“已索引”复选框应被勾选，但在此情况下，“可选”复选框也应被勾选，以便用户可以根据需要选择将此字段留空。另外，我们将默认值留空。


    现在我们来处理 `MythicalPerson` 的数值属性：`divinity`、`goodness` 和 `power`。创建一个新属性并命名为“divinity”，将其类型设置为
    `Integer 16`，这是 Core Data 支持的最小的整数类型。这次配置复选框，使其为可选，但既不是瞬态也不是已索引（因为我们预计不需要通过神性值来搜索神话人物作为搜索参数）。显示界面会发生变化，显示一些适用于所选类型的额外配置。在这里，我们可以通过指定最小值和最大值来设置一些自动验证规则，也可以指定此属性的默认值。


    在表 8-1 中，我们将神性定义为一个从 0 到 100 的整数值，其理念是将角色置于从凡人到神性之间的某个尺度上。例如，希腊神祇宙斯的神性值为 100，他的儿子赫拉克勒斯（其母亲阿尔克墨涅是普通凡人）为
    50，而普通凡人（比如，再次以赫拉克勒斯的母亲为例）的神性值为 0。通过指定属性的最小值和最大值，我们可以让 Core Data 帮助我们确保无法保存这些属性的无效值。输入最小值
    0，最大值 100，默认值 50。请参见图 8-4，以了解正在进行的实体/属性编辑过程。


    ![A978-1-4302-4543-8_8_Fig4_HTML.jpg](img/A978-1-4302-4543-8_8_Fig4_HTML.jpg)


    图 8-4. 这是在 Core Data 模型文件中编辑实体的样子

    '
- fmt: '### Creating Numeric Attributes for `goodness` and `power`


    Now we’re going to create the other two numeric values, `goodness` and `power`.
    These also express characteristics of each `MythicalPerson` on a scale from 0
    to 100 and will have the exact same configuration as `divinity` (except, of course,
    for the name of the attribute itself). The easiest way to make these, giving them
    the exact same options, is to select the `divinity` attribute by clicking on it
    in the table view, then copy it (⌘C), then paste it (⌘V) twice, resulting in two
    new attributes named “divinity1” and “divinity2.” Rename those “goodness” and
    “power,” and that’s it; those two new attributes will have the same min and max
    values as the original.


    ### Attributes for Unsupported Types


    The last attribute left to configure is the `depiction` attribute. As mentioned
    earlier, the `depiction` attribute is meant to store an image, and Core Data doesn’t
    know anything about the `NSImage` class normally used in Cocoa. Fortunately, Core
    Data’s Transformable type provides a simple way to store an image anyway. Create
    a new attribute, naming it “depiction,” and then select Transformable as the type.
    Note that the Inspector changes to show the configuration options for Transformable.
    In the Inspector, turn the Optional checkbox on (and the others off). The configuration
    options for Transformable are pretty simple: a single text field labeled Value
    Transformer Name. However, there’s more here than meets the eye. The idea is that
    a Transformable attribute holds a chunk of data that Core Data doesn’t really
    understand; when Core Data reads this chunk of data from storage, it puts it into
    an `NSData` object (an object that can hang onto any old chunk of data, acting
    as an Objective-C “wrapper” for it), which it then passes through a transformer,
    a special class that knows how to take an object of one kind and transform it
    into something else. In the other direction, when an object is going to be saved
    to storage, Core Data takes the new value and passes it through the same transformer,
    however this time doing the transformation in the reverse direction.


    In this case, we’re going to use a transformer called `NSKeyedUnarchiveFromData`,
    which knows how to produce an object of any kind, given an `NSData` object containing
    a key-archived version of the object. What is keyed archiving? We won’t go into
    it in detail here, but basically keyed archiving is a way of archiving or serializing
    all of an object’s instance variables in a dictionary-like format, making it possible
    to reconstruct the object later. This technology is used in a variety of ways
    in Cocoa, and all of Cocoa’s classes have this functionality built in. This means
    that we can take an `NSImage`, or an instance of any other Cocoa class, and stuff
    it into an `NSData` object using `NSKeyedUnarchiveFromData`’s reverse transformation.
    And if we implement the `NSCoding` protocol in our own classes, saving and loading
    their instance variables in a keyed fashion, we can archive our own objects in
    the same way.


    Getting back to the depiction field, the idea is to write the name of the transformer
    class into the Value Transformer Name text field. As it turns out, keyed archiving
    is so widespread that in this situation, specifying a transformer for an attribute
    in Xcode’s modeling tool, it’s used as a default. If we just leave the field blank,
    the entity will be configured to use `NSKeyedUnarchiveFromData` to transform model
    attribute values to and from `NSData` for storage.


    We’ve now defined the entire model for this chapter’s MythBase application, so
    let’s move on to creating the GUI.


    ## Designing the GUI


    Since we’ve laid out several user interfaces using Interface Builder already,
    we’re going to go through the basics pretty quickly, and we won’t give the keyboard
    shortcuts for each inspector. This app will be similar to the VillainTracker app
    from [Chapter 6](#A978-1-4302-4543-8_6_Chapter.html). Our user interface will
    allow a user to search the database of mythical people, add and delete them, and
    change their characteristics. What’s more, we’ll be using Cocoa bindings to make
    the connections.


    ### AUTOMATIC GUI


    Xcode 3 included a feature called the Core Data Entity Interface Assistant for
    automatically laying out a GUI with basic CRUD features based on a Core Data model.
    This feature was removed in Xcode 4, so we have to do it by hand. As it turns
    out, this is really easy, and the process should feel familiar having worked through
    the previous chapters. Not only that, the UI generated by Xcode usually needed
    a bunch of cleanup anyway.'
