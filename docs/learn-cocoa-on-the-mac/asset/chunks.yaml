    # 总结


    本章延续了前两章的内容。我们学习了如何通过按住 Control 键拖拽，在 Interface Builder 中建立用户界面元素与 `outlet` 及
    `target`/`action` 的关联，以及如何在代码中实现 `action`。我们用不到十几行代码就构建了一个完整的图形界面应用程序。诚然，这个应用的功能并不算多，但这些基本概念是众多
    Cocoa 功能的基础，也是 Cocoa 成为如此高效开发环境的原因。在下一章，我们将处理除按钮和文本字段之外的几个额外用户界面元素，并会看到，我们可以使用与处理按钮和文本字段完全相同的方式来配置和使用它们。


    # 5. GUI 组件


    在第 3 章和第 4 章中，我们介绍了在 Interface Builder 中创建用户界面以及使用 target/action 将其连接到 Xcode 中编写的应用程序代码的一些基础知识。到目前为止，我们仅仅触及了皮毛，但值得高兴的是，你在前两章中学到的
    target/action 系统几乎被 Cocoa 中所有的用户界面对象所使用。如果你还不十分清楚这有什么了不起，你可能想再多看一次第 3 章，以确保你已经掌握了
    target/action 的概念。


    到现在为止，你一定已经注意到 Interface Builder 的对象库窗格中列出的各种用户界面对象。现在是时候深入挖掘 Cocoa 的技巧宝库，探索其中的一些类了。Cocoa
    中可用的用户界面类涵盖了广泛的应用场景，并尽可能为其功能提供一致的 API，因此，一旦你学会了如何使用一个类完成某项功能，通常就能很快地推断出如何使用另一个类来实现类似的结果。特别是，你会最常使用的许多类都是
    `NSControl` 的子类，并且你将主要使用在该类中声明的方法。不同的子类以不同的方式与用户交互，但大多数情况下都以相同的方式与你的代码进行交互。


    本章将介绍 Cocoa 提供的一些最常用的用户界面类，展示它们的基本用法，以及如何在适当的时候根据我们的需求定制它们。在此过程中，我们还将了解一些不一定在屏幕上有形存在，但仍为我们的应用程序提供重要服务的辅助性
    Cocoa 类。我们将重点关注以下类（有关这些对象在屏幕上的效果示例，请参见图 5-1）：


    *   `NSTextField`：许多应用程序的基本文本输入方式。响应按键操作并渲染文本。为用户提供了极大的编辑灵活性。

    *   `NSButton`：基本的鼠标触发的 GUI 组件。尽管它们在操作方式和外观上存在差异，但单选按钮、复选框和普通的旧按钮都是 `NSButton`
    的实例。

    *   `NSPopUpButton`：当我们有一组字符串希望用户从中选择时，`NSPopUpButton` 通常是一个好选择。

    *   `NSComboBox`：类似于 `NSPopUpButton`，但其额外优势在于允许用户输入一个不在列表中的值。

    *   `NSMatrix`：将一系列相似的控件分组到一个单元中的对象。

    *   `NSLevelIndicator`：通常用于显示预定义范围内的数值，但它们在输入数据时也同样有用。

    *   `NSImageView`：用户可以轻松地通过将图片从 Finder 或其他应用程序拖放到此对象上，将图像引入应用程序。

    *   `NSTextView`：几乎是一个完整的文本编辑器集成在单个对象中，允许用户使用多种字体、格式、标尺等编辑文本。


    注意


    在本书中，我们有时会使用 Cocoa 的类名（例如 `NSButton`），其他时候则使用其通俗的通用名称（例如 button）。通常，在讨论代码时我们会使用类名，在其他大多数情况下会使用其通用名称，但两种情况下我们谈论的都是相同的东西。


    ![A978-1-4302-4543-8_5_Fig1_HTML.jpg](img/A978-1-4302-4543-8_5_Fig1_HTML.jpg)


    图 5-1. Cocoa UI 元素示例


    我们将使用这些类来创建一个简单的应用程序，模拟一种数据库应用程序。用户将能够通过使用一些简单的 GUI 控件来编辑和创建一些对象，但编辑的结果不会被保存（这就是“假装”的由来）。在后面的章节中，我们将学习如何使用
    Core Data 将我们的对象保存到磁盘，但现在我们将专注于 GUI。

    '
- fmt: '### Creating the VillainTracker Application


    The application we’ll be creating in this chapter is called `VillainTracker`.
    It’s a simple application for keeping track of super-villains, their last known
    whereabouts, special abilities, and so on. This is the sort of application that
    any superhero team worth its salt will have installed on their computer systems
    and is therefore an obvious first app for heroes such as ourselves. We’ll split
    the development of `VillainTracker` into two iterations: in the first iteration,
    we’ll create a simple app that enables us to edit information for a single villain,
    and in the second (in [Chapter 6](#A978-1-4302-4543-8_6_Chapter.html)), we’ll
    add the ability to manage a whole list of villains. This will demonstrate the
    basics of developing an application based on the model–view–controller (MVC) design
    pattern, one that developers have been using for years. Whether you have experience
    with this pattern or it’s new to you, it’s important that you get a sense of how
    MVC is typically implemented in Cocoa applications because it’s a really a cornerstone
    of good application design in Cocoa.


    As with the previous applications, we’ll start by creating a new application project
    in Xcode. We’ll create the GUI in Interface Builder mode, and then connect it
    to the generated code by creating outlets and actions in the generated class using
    the power of control-drag. Then we’ll go back to Xcode where we’ll learn how to
    write the code to set and retrieve values—the values shown in our GUI controls—one
    class at a time, so we can get a feel for how each of them works. Usually, when
    building Cocoa apps, we’ll move back and forth between constructing and modifying
    the GUI and implementing the code: lay out some UI, implement code behind it,
    see if it does what we expect, and iterate. Since this app is relatively simple,
    we’ll lay out the GUI first and then implement the functionality behind it.


    **Note**


    Often, when discussing GUI issues, the terms “views” and “controls” will be used
    almost interchangeably. Most of the Cocoa user interface classes are, technically,
    both views and controls, at least in the Cocoa sense. `NSView` is a class that
    allows drawing on the screen; `NSControl` is a subclass of `NSView` that extends
    it by responding to user events, triggering an action in a target, and so on.
    So, a large part of the view layer in our application will consist of objects
    that are “controls,” which of course we don’t want to confuse with the controller
    layer. If this seems puzzling, just try to remember that a “control” is a particular
    kind of view, whereas a “controller” is an object in the controller layer that
    coordinates between view and model objects. After a while, it will all make perfect
    sense, we promise.


    So, let’s create a new application project. As in previous chapters, launch Xcode,
    or switch to it if it’s already running, and press `⇧⌘N`, or select New Project
    from the File menu. In the New Project assistant, under OS X on the left, click
    Application; then in the large pane on the right, click Cocoa Application, then
    click Next.


    The standard Xcode new project Options panel will prompt us for identifying information
    for our application. Enter “VillainTracker” in the Product Name, and an organization
    name and company identifier of your choice in those two boxes. For the class prefix
    this time, our example will also use the string “VillainTracker.” Ensure that
    Use Automatic Reference Counting is checked, and that the other checkboxes are
    left unchecked. Click Next.


    The standard Save panel that we see next lets us navigate to a directory of our
    choice and create a new project there. Use the controls to navigate to a suitable
    spot in your home directory or your desktop, then click Create. Now Xcode creates
    a new folder called `VillainTracker` in the location specified, with some default
    content including the `VillainTracker.xcodeproj` project file, and opens a new
    window showing the settings for our project.


    ### Building the Interface


    We’ll start by creating the GUI for `VillainTracker`, using Interface Builder
    to edit the project’s main nib file. We’ll add GUI controls to capture what we
    need to know about each nemesis and see how to organize the controls into logical
    groupings and make them reposition themselves correctly when their window is resized.
    We’ll also connect them to the controller class, creating outlets in the controller
    and connecting everything together.


    Start by locating the `MainMenu.xib` in Xcode’s Navigator pane (it’ll be on the
    left side of the screen in the Project Navigator pane). Single-click `MainMenu.xib`,
    and it will open up in the central pane of Xcode in Interface Builder mode. We’ll
    see the default set of menus for our new application and several icons in a dock
    to the left of the Interface Builder Editor area—three placeholder objects (`File’s
    Owner`, `First Responder`, and Application) and four other objects (`Main Menu`,
    `Window - VillainTracker`, `VillainTrackerAppDelegate`, and `Font Manager`). Single-click
    the `Window - VillainTracker` object, and an empty window will open up in the
    Editor area.'
