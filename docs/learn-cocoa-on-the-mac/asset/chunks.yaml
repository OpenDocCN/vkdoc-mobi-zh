  trans: '

    #### 引用引文


    现在，我们将在“显示”框的下方，为“引文”重复大部分相同的设置。与之前一样，拖拽出一个表格视图和两个按钮，将它们放置在窗口的下半部分，并按之前的步骤为按钮添加标题。不过，对于这个表格视图，我们将保留两列。像之前一样将其改为基于视图的模式，并勾选标记为“交替行”的复选框，这会使内容更易于阅读。将左列标题设为“引文文本”，右列标题设为“角色”，并调整它们的大小，为“引文文本”列留出更多空间。在“引文文本”列中，双击列内的“表格单元格视图”文本，并将其改为“引文”。对“角色”列中的“表格单元格视图”文本执行相同操作，将其改为“角色”。这将帮助我们稍后区分这两列。像之前一样，将这三个控件分组到一个框中，并将该框的标题设为“引文”。


    窗口的这一部分也将使用一个`NSArrayController`，但其配置方式将与“显示”数组控制器略有不同。拖拽出一个控制器，并将其标题设为“引文”。在属性检查器中，将其模式设置为实体名称，然后将实体名称字段设置为
    Quote（与我们在模型编辑器中定义的实体名称相同）。然后，切换到绑定检查器。默认情况下，每个数组控制器将获取对应实体的所有对象。我们将修改此设置，使其仅基于选中的“显示”来获取引文。打开内容集绑定，在下拉列表中选择“显示”，在控制器键组合框中选择“selection”，并在模型键路径组合框中输入“quotes”。最后，按
    Return 键以启用该绑定。我们还需要将其连接到一个托管对象上下文，该上下文由应用委托提供。将托管对象上下文（位于绑定列表底部）绑定到应用委托，并将模型键路径设置为`managedObjectContext`。


    现在，我们可以将此表格视图绑定到“引文”控制器。选择表格视图，然后打开绑定检查器。展开表格内容下的内容部分，并勾选绑定到旁边的复选框。下拉菜单应显示为“引文”。默认的控制器键`arrangedObjects`正是我们需要的。与之前一样，数组控制器应被通知所选行，因此将选择索引绑定到“引文”，并将此处的控制器键设置为`selectionIndexes`。


    要绑定这两列，请使用对象停靠区在表格视图内的视图层次结构中向下钻取，直至“静态文本 – 引文”条目。在属性检查器中，将行为更改为可编辑。然后，在绑定检查器中，将值绑定到表格单元格视图，并将其模型键路径设置为`objectValue.quoteText`。切换到对象停靠区中的“静态文本
    – 角色”条目，将其模式更改为可编辑，然后将其绑定到表格单元格视图，并将其模型键路径设置为`objectValue.character`。


    最后，我们需要连接按钮。从每个按钮控制拖拽到“引文”控制器，并根据情况将操作设置为`add:`或`remove:`。将每个按钮的启用绑定分别绑定到“引文”控制器上相应的`canAdd`或`canRemove`控制器键。


    布局应类似于图 10-4。


    ![A978-1-4302-4543-8_10_Fig4_HTML.jpg](img/A978-1-4302-4543-8_10_Fig4_HTML.jpg)


    图 10-4.


    数据录入窗口的完整布局


    ### 输入一些初始引文


    保存更改并点击运行。应用应启动并显示数据录入窗口。点击上方表格视图下方的“添加”按钮以添加一个节目，并在表格视图中高亮显示的区域双击以编辑节目名称。重复此操作几次以创建几个`Show`实例。现在，选中其中一个节目，在下方的表格中添加一条引文，直接编辑表格中的文本和任何角色的名称。如果您添加的引文包含两个或多个角色之间的对话，请在“角色”字段中输入所有涉及角色的名称。当我们稍后启用基于角色名称的搜索时，它将适用于您输入的所有名称。再添加几条引文，分布在几个不同的节目中。请注意，当您选择不同的节目时，引文列表会发生变化；如果您退出并重新启动
    QuoteMonger，您应该会看到您输入的所有内容都已保存。


    另一方面，如果一切似乎都不起作用，请检查 Xcode 中的调试器日志，看应用程序是否抛出了异常。常见的问题包括：忘记在数组控制器上设置托管对象上下文的绑定，或者错误地键入了控制器键或模型键路径绑定的名称。

    '
- fmt: '### Creating the Quote Finder Window


    Now it’s time to lay the foundation for the search window. Back in the Interface
    Builder pane in Xcode, drag out a new window from the Object Library and drop
    it on the canvas. Xcode offers a variety of window types, but we want a normal
    plain window. (You’ll probably also want to close the QuoteMonger window to get
    it out of the way, and you can do this by clicking the little x just above the
    upper left corner of the window on the Interface Builder canvas.)


    Select the new window and go to the Attributes Inspector. Title the new window
    “Quote Finder.” This window will have two visible controls on it: a table view
    and a text view. The table view will display a list of matching quotes, and the
    text view will display the contents of a selected quote. Later on, we’ll also
    use a new one called a predicate editor to define the search criteria. The predicate
    editor is used when defining filtering rules in `Mail.app` and creating Smart
    Playlists in iTunes. It’s a general-purpose Cocoa component, and we can play with
    it too. However, we’re not going to use it just yet.


    Let’s get started! Drag out a Table View from the Object Library, and position
    it near the top of the window. In the Attributes Inspector, set it to be view-based
    and give it three columns. Title the three columns “Quote Text,” “Character,”
    and “Show,” respectively. In addition, edit the text in each field to reflect
    the name of the column. We can also set the Alternating Rows checkbox for this
    table view in case the search returns a lot of matches. This table view won’t
    be going into a box so we can resize it to fill out the width of the window, letting
    the blue guidelines tell us where to stop.


    Now, drag out a Text View from the Object Library (enter “text view” into the
    Search field at the bottom of the library area), and position it below the table
    view. Expand this one to be the same width as the table view. In the Attributes
    Inspector, turn off the Editable and Rich Text checkboxes. For Find, set the pop-up
    menu to Uses Bar and check the Incremental Searching checkbox. This will allow
    the big text view to use the embedded search bar that was introduced in Mac OS/X
    10.7. The window should look something like Figure [10-5](#A978-1-4302-4543-8_10_Chapter.html#Fig5).


    ![A978-1-4302-4543-8_10_Fig5_HTML.jpg](A978-1-4302-4543-8_10_Fig5_HTML.jpg)


    Figure 10-5. First pass at the Query Finder window


    Next, drag out an Array Controller and name it “FoundQuotes.” In the Attributes
    Inspector, set its Mode to be Entity Name and give “Quote” as the Entity Name
    to use. Check the checkbox by Prepares Content as well. Above these settings,
    in the Array Controller block of the Attributes Inspector, check the Auto Rearrange
    Content checkbox. This will cause it to correctly reload and refilter its contents
    whenever the user makes changes in the Quotes controller. In the Bindings Inspector,
    bind its Managed Object Context to the App Delegate and set the Model Key Path
    to `managedObjectContext`.


    Now we need to set up bindings for the user interface controls—the table view
    and the text view. We’ll start, as usual, with the table view. Bind the Content
    and Selection Indexes bindings on the table view to the FoundQuotes controller.
    Bind the Content binding to the `arrangedObjects` Controller Key, and bind the
    Selection Indexes binding to the `selectionIndexes` Controller Key. Then, drill
    down to the “Static Text - Quote Text” field inside the table view. Configure
    its Value binding to the Table Cell View, and use `objectValue.quoteText` as the
    Model Key Path. Configure the “Static Text – Character” field’s Value binding
    to the Table Cell View, and use `objectValue.character` as the Model Key Path.
    Lastly, select the “Static Text – Show” field within the table view, and set its
    Value binding to the Table Cell View, using `objectValue.show.name` as the Model
    Key Path.


    For the text view, it’s a bit simpler. Select the text view, and bind its Value
    binding to FoundQuotes. Use `selection` as the Controller Key, and `quoteText`
    as the Model Key Path.


    Now click Run, and note the two windows. The new Query Finder window simply shows
    all quotes we’ve entered with the data entry window. The rest of this chapter
    will cover how to change that using an `NSPredicate` so that only the quotes a
    user searches for show up in this window.


    ## Limiting Results with `NSPredicate`


    As mentioned, we can limit which records an `NSArrayController` prepares for display
    by using an `NSPredicate`. We can assign a predicate to an array controller directly
    in Interface Builder; from within our application code during initialization or
    whenever conditions change, warranting a refetch; or through Cocoa Bindings, which
    means that changes to a predicate can be automatically propagated to a controller.
    We’ll explore all of these options in this chapter.'
  raw: '### Creating the Quote Finder Window


    Now it’s time to lay the foundation for the search window. Back in the Interface
    Builder pane in Xcode, drag out a new window from the Object Library and drop
    it on the canvas. Xcode offers a variety of window types, but we want a normal
    plain window. (You’ll probably also want to close the QuoteMonger window to get
    it out of the way, and you can do this by clicking the little x just above the
    upper left corner of the window on the Interface Builder canvas.)


    Select the new window and go to the Attributes Inspector. Title the new window
    “Quote Finder.” This window will have two visible controls on it: a table view
    and a text view. The table view will display a list of matching quotes, and the
    text view will display the contents of a selected quote. Later on, we’ll also
    use a new one called a predicate editor to define the search criteria. The predicate
    editor is used when defining filtering rules in `Mail.app` and creating Smart
    Playlists in iTunes. It’s a general-purpose Cocoa component, and we can play with
    it too. However, we’re not going to use it just yet.


    Let’s get started! Drag out a Table View from the Object Library, and position
    it near the top of the window. In the Attributes Inspector, set it to be view-based
    and give it three columns. Title the three columns “Quote Text,” “Character,”
    and “Show,” respectively. In addition, edit the text in each field to reflect
    the name of the column. We can also set the Alternating Rows checkbox for this
    table view in case the search returns a lot of matches. This table view won’t
    be going into a box so we can resize it to fill out the width of the window, letting
    the blue guidelines tell us where to stop.


    Now, drag out a Text View from the Object Library (enter “text view” into the
    Search field at the bottom of the library area), and position it below the table
    view. Expand this one to be the same width as the table view. In the Attributes
    Inspector, turn off the Editable and Rich Text checkboxes. For Find, set the pop-up
    menu to Uses Bar and check the Incremental Searching checkbox. This will allow
    the big text view to use the embedded search bar that was introduced in Mac OS/X
    10.7\. The window should look something like Figure [10-5](#A978-1-4302-4543-8_10_Chapter.html#Fig5).


    ![A978-1-4302-4543-8_10_Fig5_HTML.jpg](A978-1-4302-4543-8_10_Fig5_HTML.jpg)


    Figure 10-5.


    First pass at the Query Finder window


    Next, drag out an Array Controller and name it “FoundQuotes.” In the Attributes
    Inspector, set its Mode to be Entity Name and give “Quote” as the Entity Name
    to use. Check the checkbox by Prepares Content as well. Above these settings,
    in the Array Controller block of the Attributes Inspector, check the Auto Rearrange
    Content checkbox. This will cause it to correctly reload and refilter its contents
    whenever the user makes changes in the Quotes controller. In the Bindings Inspector,
    bind its Managed Object Context to the App Delegate and set the Model Key Path
    to “managedObjectContext.”


    Now we need to set up bindings for the user interface controls—the table view
    and the text view. We’ll start, as usual, with the table view. Bind the Content
    and Selection Indexes bindings on the table view to the FoundQuotes controller.
    Bind the Content binding to the arrangedObjects Controller Key, and bind the Selection
    Indexes binding to the selectionIndexes Controller Key. Then, drill down to the
    “Static Text - Quote Text” field inside the table view. Configure its Value binding
    to the Table Cell View, and use “objectValue.quoteText” as the Model Key Path.
    Configure the “Static Text – Character” field’s Value binding to the Table Cell
    View, and use “objectValue.character” as the Model Key Path. Lastly, select the
    “Static Text – Show” field within the table view, and set its Value binding to
    the Table Cell View, using “objectValue.show.name” as the Model Key Path.


    For the text view, it’s a bit simpler. Select the text view, and bind its Value
    binding to FoundQuotes. Use “selection” as the Controller Key, and “quoteText”
    as the Model Key Path.


    Now click Run, and note the two windows. The new Query Finder window simply shows
    all quotes we’ve entered with the data entry window. The rest of this chapter
    will cover how to change that using an `NSPredicate` so that only the quotes a
    user searches for show up in this window.


    ## Limiting Results with NSPredicate


    As mentioned, we can limit which records an `NSArrayController` prepares for display
    by using an `NSPredicate`. We can assign a predicate to an array controller directly
    in Interface Builder; from within our application code during initialization or
    whenever conditions change, warranting a refetch; or through Cocoa Bindings, which
    means that changes to a predicate can be automatically propagated to a controller.
    We’ll explore all of these options in this chapter.'
  trans: '

    ### 创建引用查找器窗口


    现在是为搜索窗口奠定基础的时候了。回到 Xcode 中的 Interface Builder 面板，从对象库中拖出一个新窗口，放到画布上。Xcode 提供了多种窗口类型，但我们需要的只是一个普通的普通窗口。（你可能还想关闭
    QuoteMonger 窗口，以免干扰工作——只需点击 Interface Builder 画布上窗口左上角的小“x”即可。）


    选中这个新窗口，然后转到属性检查器。将新窗口的标题设置为“引用查找器”。这个窗口将有两个可见控件：一个表格视图和一个文本视图。表格视图会显示匹配的引用列表，而文本视图则会显示所选引用的具体内容。稍后，我们还会使用一个名为谓词编辑器的新控件来定义搜索条件。这个谓词编辑器在
    `Mail.app` 中用于定义过滤规则，在 iTunes 中用于创建智能播放列表。它是一个通用的 Cocoa 组件，我们也可以用它来玩一玩。不过，我们现在还不会用到它。


    让我们开始吧！从对象库中拖出一个表格视图，并将其放置在窗口顶部附近。在属性检查器中，将其设置为基于视图模式，并给它三列。分别将这三列的标题设置为“引用文本”、“角色”和“剧目”。此外，编辑每个字段中的文本以反映列的名称。我们还可以为此表格视图勾选“隔行变色”复选框，以便在搜索返回大量匹配结果时使用。这个表格视图不会放入框中，因此我们可以调整其大小以填满窗口宽度，让蓝色参考线告诉我们该在哪里停下。


    现在，从对象库中拖出一个文本视图（在库区域底部的搜索字段中输入“文本视图”），并将其放置在表格视图下方。将其宽度扩展到与表格视图相同。在属性检查器中，关闭“可编辑”和“富文本”复选框。对于“查找”项，将弹出菜单设置为“使用搜索栏”，并勾选“增量搜索”复选框。这将允许大的文本视图使用
    Mac OS/X 10.7 中引入的嵌入式搜索栏。窗口看起来应该像图 10-5 那样。


    ![A978-1-4302-4543-8_10_Fig5_HTML.jpg](img/A978-1-4302-4543-8_10_Fig5_HTML.jpg)


    图 10-5. 查询查找器窗口的初步设计


    接下来，拖出一个数组控制器，并将其命名为“FoundQuotes”。在属性检查器中，将其模式设置为“实体名称”，并将“Quote”作为要使用的实体名称。同时勾选“准备内容”复选框。在这些设置的上方，即属性检查器的数组控制器区块中，勾选“自动重新排列内容”复选框。这样，每当用户在引用控制器中进行更改时，它都会正确重新加载并重新过滤其内容。在绑定检查器中，将其托管对象上下文绑定到
    App Delegate，并将模型键路径设置为 `managedObjectContext`。


    现在，我们需要为用户界面控件（表格视图和文本视图）设置绑定。和往常一样，我们从表格视图开始。将表格视图的“内容”和“选择索引”绑定绑定到 FoundQuotes
    控制器。将“内容”绑定绑定到 `arrangedObjects` 控制器键，并将“选择索引”绑定绑定到 `selectionIndexes` 控制器键。然后，深入表格视图中的“静态文本
    - 引用文本”字段。将其值绑定配置为指向表格单元格视图，并使用 `objectValue.quoteText` 作为模型键路径。将“静态文本 – 角色”字段的值绑定配置为指向表格单元格视图，并使用
    `objectValue.character` 作为模型键路径。最后，选择表格视图中的“静态文本 – 剧目”字段，并将其值绑定设置为指向表格单元格视图，使用
    `objectValue.show.name` 作为模型键路径。


    对于文本视图，操作稍微简单一些。选择文本视图，将其值绑定绑定到 FoundQuotes。使用 `selection` 作为控制器键，并使用 `quoteText`
    作为模型键路径。


    现在点击“运行”，注意观察两个窗口。新的查询查找器窗口只是简单地显示了我们在数据录入窗口中输入的所有引用。本章的其余部分将介绍如何使用 `NSPredicate`
    来改变这一点，以便只有用户搜索的引用才会显示在此窗口中。


    ## 使用 `NSPredicate` 限制结果


    如前所述，我们可以通过使用 `NSPredicate` 来限制 `NSArrayController` 准备显示哪些记录。我们可以直接在 Interface
    Builder 中为数组控制器分配谓词；可以在应用程序代码初始化期间或当条件发生变化需要重新获取时进行分配；也可以通过 Cocoa 绑定来实现，这意味着对谓词的更改可以自动传播到控制器。本章我们将探讨所有这些选项。

