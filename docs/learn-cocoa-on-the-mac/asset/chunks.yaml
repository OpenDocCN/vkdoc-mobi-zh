    window (if it has one). Over time, you’ll learn all there is to know about nib
    files and will be rolling your very own. For the moment, patience—and hands off.


    ## Exploring the Nib File


    Interface Builder mode offers a lot of power, so let’s take a moment to see how
    things are laid out. The Interface Builder Editor area looks like a piece of graph
    paper, with the menu bar of our application across the top (Figure [2-5](#A978-1-4302-4543-8_2_Chapter.html#Fig5)).
    Along the left, off the edge of the graph paper are a series of icons in a dock.
    These are the objects that make up our Cocoa application’s user interface. Near
    the bottom is a Play button that expands the dock into an outline mode where we
    can get more info about these objects.


    ![A978-1-4302-4543-8_2_Fig5_HTML.jpg](A978-1-4302-4543-8_2_Fig5_HTML.jpg)


    Figure 2-5.


    MainMenu.xib ready for editing


    Note that the row of icons across the top of the Utility area, along the right
    side of the Xcode window, has expanded from two to eight; these objects are more
    configurable than files are. Each of these icons represents a different mode for
    the Inspector. We’ll have more to say about the different types of information
    on display here shortly. Underneath this is the Library, with a row of four small
    icons that shift the view to different types of items. Hovering our mouse over
    each icon will display a tooltip describing the kind of items that each view shows.
    The Inspector is used to set parameters on the objects that make up our user interface,
    and the Library is where we’ll go to add new objects to lay out the interface.


    The menu bar across the top of the Editor is for our application, and changes
    here will be reflected in the menu bar that appears when our application is launched.
    We can click the menu headings, and they’ll open up to show the menu items underneath;
    we get the Mac-standard File, Edit, Format, View, Window, and Help menus for free
    with the new nib file, but we can add more and modify the defaults if necessary.
    The icon in the dock area that looks like a pull-down menu (the fourth one down)
    is the object that represents the main menu. In Figure [2-5](#A978-1-4302-4543-8_2_Chapter.html#Fig5),
    it has a highlighted border to indicate that it’s selected.


    Below the main menu icon in the dock is an icon that looks like a window, which
    is in fact what it is. The Cocoa Application project template we used to create
    this project assumed that we would have at least one window in our application,
    and it created that window for us. We’ll use this window to lay out the contents
    of the window that will be displayed when our program is launched. Select the
    window icon and our application’s new, empty, main window will appear on the graph
    paper.


    ### The Library


    The Library pane in the lower right-hand corner acts as a palette, a collection
    of objects we can use to build our application’s interface. In Mountain Lion,
    there are 134 different object types to play with here. The Library starts off
    showing a File Template Library, but there are four kinds of resources that can
    be shown here: File Templates, Code Snippets, Objects, and Media. All the user-interface
    elements that we’ll want to use are under the Objects view. We scroll through
    the library looking for the item we want to use, then drag that item into the
    appropriate Xcode pane. Select the icon that represents the Object Library view,
    or press ^⌥⌘3. The screen should look like Figure [2-6](#A978-1-4302-4543-8_2_Chapter.html#Fig6).


    ![A978-1-4302-4543-8_2_Fig6_HTML.jpg](A978-1-4302-4543-8_2_Fig6_HTML.jpg)


    Figure 2-6.


    MainMenu.xib showing our new, empty window and the Object Library


    Take a minute to scroll through the different UI objects in the library: buttons,
    sliders, text fields, labels, browsers, even an OpenGL view!'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n# 项目窗口概览\n\n我们的项目窗口顶部有一个工具栏，可以方便地访问一系列常用命令。工具栏下方，窗口分为三个主要部分，或称窗格。\n\
    \n沿着窗口左侧向下延伸的窗格称为导航器区域。构成我们项目的所有资源以及许多相关的项目设置都分组在此处。点击项目左侧的小三角形可以展开该项目，显示所有可用的子项。点击已展开项目左侧的三角形将隐藏其子项。\n\
    \n右侧窗格称为实用工具区域，它显示在导航器区域中选中项目的详细信息。例如，对于源代码文件，此区域会显示标识和类型信息、文件在文件系统中的完整路径、本地化信息、使用所选文件的构建目标、编码信息以及版本控制信息。其他文件则会显示适合其文件类型的信息。根据在导航器窗格中选择的文件类型，此区域顶部可能会有一排小图标，允许我们选择要在此处显示的几种不同信息视图。信息窗格下方是库。稍后我们将对此进行更深入的探讨。\n\
    \n中央窗格称为编辑器窗格。如果我们在导航器窗格中选择了一个文件，并且 Xcode 知道如何显示或编辑该类型的文件，那么该文件的内容就会显示在编辑器窗格中。我们将在这里编写和编辑应用程序的所有源代码。\n\
    \n> **注意**  \n> 许多开发人员在编辑器模式下工作时，喜欢隐藏实用工具区域，以便获得更多屏幕空间来编写代码；我们可以通过按 ⌥⌘0 来切换实用工具区域的显示。\n\
    \n现在，让我们看看 Xcode 窗口左侧的项目导航器区域。这里会自动为我们创建一些文件夹和三个文件。我们先忽略这些文件夹和前两个文件（稍后会再介绍它们）。第三个文件名为`MainMenu.xib`。\n\
    \n点击`MainMenu.xib`。编辑器窗格将切换到 Interface Builder 模式，这是一种专门用于编辑`.xib`文件的编辑器（图 2-5）。在\
    \ Xcode 4 之前，Interface Builder 是一个单独的应用程序，但它已合并到 Xcode 中，这为将用户界面与底层代码连接起来带来了许多好处。文件`MainMenu.xib`被称为“nib\
    \ 文件”。嗯？nib 文件？为什么不是 xib 文件？首先，“xib”这个词非常难发音。但更重要的是，“nib”这个词是早期更简单时代的遗留物。Cocoa\
    \ 和现代 Xcode 开发工具的前身是由 NeXT 公司（一家由史蒂夫·乔布斯于 1985 年创立的公司）开发的。“nib”这个名称最初代表 NeXT Interface\
    \ Builder。随着时间的推移，NeXT 被苹果收购，nib 格式也演变成了一种更新的、基于 XML 的格式。这种 XML 和 Interface Builder\
    \ 的结合产生了新的`.xib`扩展名。尽管如此，“nib 文件”这个名称还是保留了下来，大多数开发者仍然称他们的 xib 文件为“nib 文件”。\n\n\
    > **警告**  \n> 你会在 Xcode 中创建的每个 Cocoa 项目中找到`MainMenu.xib`文件。这是一个特殊的文件。请如此对待它。不要移动、重命名或以其他方式惹恼它。除非我们告诉你这么做。当你的应用程序启动时，它会自动将`MainMenu.xib`的内容加载到内存中。`MainMenu.xib`包含关键信息，包括你的应用程序的菜单栏和主窗口（如果有的话）。随着时间的推移，你将了解所有关于\
    \ nib 文件的知识，并会创建你自己的 nib 文件。目前，请保持耐心——并且不要触碰它。\n\n## 探索 Nib 文件\n\nInterface Builder\
    \ 模式功能强大，所以让我们花点时间来了解其布局。Interface Builder 编辑器区域看起来像一张方格纸，顶部是我们应用程序的菜单栏（图 2-5）。沿着左侧，在方格纸边缘之外，有一系列停靠栏中的图标。这些是构成我们\
    \ Cocoa 应用程序用户界面的对象。靠近底部有一个“播放”按钮，可以将停靠栏展开为大纲模式，在此模式下我们可以获取有关这些对象的更多信息。\n\n![A978-1-4302-4543-8_2_Fig5_HTML.jpg](img/A978-1-4302-4543-8_2_Fig5_HTML.jpg)\n\
    \n图 2-5. 准备编辑的`MainMenu.xib`\n\n请注意，Xcode 窗口右侧实用工具区域顶部的一排图标已从两个扩展到八个；这些对象比文件具有更多的可配置性。每个图标都代表检查器的一种不同模式。我们稍后将详细介绍此处显示的不同类型的信息。其下方是库，有一排四个小图标，可以将视图切换到不同类型的项目。将鼠标悬停在每个图标上，会显示一个工具提示，描述每个视图显示的项目类型。检查器用于设置构成我们用户界面的对象的参数，而库则是我们为布局界面添加新对象的地方。\n\
    \n编辑器顶部的菜单栏是我们的应用程序的菜单栏，此处的更改将反映在应用程序启动时出现的菜单栏中。我们可以点击菜单标题，它们会展开以显示下方的菜单项；我们会在新的\
    \ nib 文件中免费获得 Mac 标准的“文件”、“编辑”、“格式”、“视图”、“窗口”和“帮助”菜单，但如有必要，我们可以添加更多菜单或修改默认菜单。停靠栏中看起来像下拉菜单的图标（从上数第四个）是代表主菜单的对象。在图\
    \ 2-5 中，它有一个高亮的边框，表示它已被选中。\n\n停靠栏中主菜单图标下方是一个看起来像窗口的图标，它实际上就是窗口。我们用于创建此项目的 Cocoa\
    \ 应用程序项目模板假设我们的应用程序至少有一个窗口，并且它为我们创建了该窗口。我们将使用这个窗口来布置程序启动时显示的窗口内容。选择窗口图标，我们应用程序的新的空主窗口将出现在方格纸上。\n\
    \n### 库\n\n右下角的库窗格充当一个调色板，其中包含可用于构建应用程序界面的对象集合。在 Mountain Lion 中，这里有 134 种不同的对象类型可供使用。库默认显示的是文件模板库，但这里有四种可以显示的资源类型：文件模板、代码片段、对象和媒体。我们将要使用的所有用户界面元素都在对象视图下。我们可以在库中滚动查找要使用的项目，然后将该项目拖放到合适的\
    \ Xcode 窗格中。选择代表对象库视图的图标，或按 ^⌥⌘3。屏幕应如图 2-6 所示。\n\n![A978-1-4302-4543-8_2_Fig6_HTML.jpg](img/A978-1-4302-4543-8_2_Fig6_HTML.jpg)\n\
    \n图 2-6. `MainMenu.xib` 显示了我们的新空窗口和对象库\n\n花点时间滚动浏览库中的不同 UI 对象：按钮、滑块、文本字段、标签、浏览器，甚至还有一个\
    \ OpenGL 视图！\n"
- fmt: '# Dragging Out a Label


    The Object Library pane will show a list of items that can be dragged to our application
    window to build our application’s interface. Let’s drag one over now. We’re going
    to use an object called `Label`, which is used to display static text—text that
    the user can’t edit. Drag a label over to the window.


    In the Object Library view, scroll down about a dozen items to one called `Label`.
    Click directly on the `Label` in the library and drag it over to the application’s
    main window (the window labeled `Chapter2`). Doing this will add a new label to
    our application’s window (Figure [2-7](#A978-1-4302-4543-8_2_Chapter.html#Fig7)).


    ![A978-1-4302-4543-8_2_Fig7_HTML.jpg](A978-1-4302-4543-8_2_Fig7_HTML.jpg)


    Figure 2-7.


    Dragging a label out to the window Tip


    Instead of scrolling down through the list as we did, we could have just typed
    the word “label” into the search field at the bottom of the Library pane. This
    would have filtered down the list to show only those objects in the library with
    the word “label” in their name or description.


    Now that we’ve got a label, let’s change it. Double-click the label. It should
    become editable and selected. Because the existing text is selected, we can just
    type our new text and it will replace what was there before. Go ahead and type
    “Hello, World!”, which is infinitely less boring than “Label.” (If you’re feeling
    rebellious, you could type something else, but don’t blame us if the Tiki Gods
    come after you!)


    ## Using the Blue Guidelines


    When you’re done editing the label, press `return` to commit the changes, which
    will take that label out of editing mode. Next, click and drag the label toward
    the left side of the window. As it gets near the left edge of the window, there
    will be a dashed blue line to the left of the text (Figure [2-8](#A978-1-4302-4543-8_2_Chapter.html#Fig8)).
    Interface Builder uses these blue guidelines to indicate that the dragged item
    is aligned properly with the items around it. In this case, the guideline is indicating
    that the label is the proper distance from the left edge of the window.


    ![A978-1-4302-4543-8_2_Fig8_HTML.jpg](A978-1-4302-4543-8_2_Fig8_HTML.jpg)


    Figure 2-8.


    When we move the object near the edges, blue lines appear Note


    One of the things that has made using the Mac such a pleasant experience over
    the years has been the consistency of the user interface. In the vast majority
    of Mac applications, you can count on the ability to press `⌘W` to close a window,
    `⌘S` to save, and `⌘P` to print, regardless of what program you are in. If you’re
    going to write software for the Mac, you should know these “rules of consistency.”
    Apple lays out these rules in their Human Interface Guidelines (also know as the
    `HIG`). Interface Builder’s little blue guidelines are there expressly to make
    it easier for you to conform to the Human Interface Guidelines. You can find a
    copy of the `HIG` at [`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines`](http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines).


    ## The Inspector


    The Library area takes up the bottom third or so of the Utility area on the right-hand
    side of the Xcode window. Another important Interface Builder tool is situated
    right above the Library, taking up the upper two-thirds of the Utility area on
    the right. This is called the Inspector. The Inspector is a context-sensitive
    pane that displays information about the currently selected object. Click a window
    and the Inspector displays information about that window (Figure [2-9](#A978-1-4302-4543-8_2_Chapter.html#Fig9)).
    Click the label and the Inspector displays information about that label. You get
    the idea.


    ![A978-1-4302-4543-8_2_Fig9_HTML.jpg](A978-1-4302-4543-8_2_Fig9_HTML.jpg)


    Figure 2-9.


    The Inspector showing attributes for the window


    Take a look at the Inspector panel shown in Figure [2-9](#A978-1-4302-4543-8_2_Chapter.html#Fig9).
    Notice the eight small icons that span the top of the panel. When pressed, each
    icon will turn the panel into one of eight different inspector types.


    There is also a keyboard shortcut for each of the Inspectors, starting with `⌥⌘1`
    to go to the left-most inspector (the File Inspector) through `⌥⌘8` for the right-most
    Inspector. When working in Interface Builder mode, the Attributes and Connections
    Inspectors will be the ones we use the most. Table [2-1](#A978-1-4302-4543-8_2_Chapter.html#Tab1)
    lists the command-key equivalents for each of the eight Inspectors.


    Table 2-1.


    Key Combination Shortcuts for Interface Builder’s Inspectors


    | Key Combination | Inspector |

    | --- | --- |

    | `⌥⌘1` | File Inspector |

    | `⌥⌘2` | Quick Help Inspector |

    | `⌥⌘3` | Identity Inspector |

    | `⌥⌘4` | Attributes Inspector |

    | `⌥⌘5` | Size Inspector |

    | `⌥⌘6` | Connections Inspector |

    | `⌥⌘7` | Bindings Inspector |

    | `⌥⌘8` | View Effects Inspector |'
