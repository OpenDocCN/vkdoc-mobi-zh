  raw: '## Core Animation: A Primer


    One of the most exciting technologies Apple includes with Mac OS X is a graphics
    system called Core Animation, which lets us easily create animated effects in
    our applications. We can make our views slide, fade, rotate, and scale smoothly
    and easily, often with just a few lines of code. In essence, Core Animation lets
    us specify a change in an object—such as changing its location to a different
    spot in the window—in such a way that, instead of the change happening instantaneously,
    it’s automatically split up into several small movements that are rendered over
    time by Core Animation. We can specify a transition’s length in seconds, as well
    as the timing or pacing of the change. We can also group animations together so
    that they all execute in perfect synchrony.


    ### Core Animation Basics


    From a technical standpoint, the basic unit at the heart of all this is a class
    called `CALayer` (a pre-release version of Core Animation was even called Layer
    Kit). Each `NSView` can optionally have a `CALayer` attached to it, either by
    flicking a switch in Interface Builder or setting it up in code. The process of
    assigning a layer to a view actually begins a recursive process through all the
    view’s subviews, so that when a view has a layer, all its subviews (and all their
    subviews, and so on) also acquire layers. Once a layer is in place, we can start
    animating the view.


    Under the hood, each `CALayer` is associated with some OpenGL structures for rendering
    its graphics. OpenGL does a really great job of quickly drawing rectangles to
    the screen, even rectangles that are resized, rotated, and the like, so using
    `CALayer` lets us have views that do all sorts of on-screen tricks without slowing
    our application down. The Core Animation APIs shield us completely from OpenGL
    itself, so it will work away quietly without us having to think about it too much.
    The only thing to bear in mind is that each layer uses some amount of the memory
    available to the computer’s graphics hardware, so we’re better off using layers
    only for those parts of our application where we actually want to do some animation,
    instead of applying them to every view in every window.


    ### Implicit Animations


    Any layer-backed view can be animated by using its animator proxy. This is a special
    object that acts as a substitute for the view itself, setting up an animation
    corresponding to the method it’s sent instead of making an immediate change. For
    instance, if we want to animate the movement of a view, then instead of setting
    its frame like


    `[myView setFrame:newFrame];`


    we can set it like this:


    `[[myView animator] setFrame:newFrame];`


    To see this in action, create a new Cocoa project, name it MovingButton, and use
    MB as the class prefix. First we’ll set up the user interface. Open `MainMenu.xib`
    in an Interface Builder canvas, open up the MovingButton window, and put a button
    called Move in the empty window. Next, open up an Assistant Editor, and open up
    the `MBAppDelegate.h` file in the it. Control-drag from the button to the `MBAppDelegate.h`
    file, adding an action right below the `@property` declaration for the window.
    Call the new action `move`.


    Now, let’s fill in the implementation of the `move:` action, as shown here:


    `- (IBAction)move:(id)sender {`


      `NSRect senderFrame = [sender frame];`


      `NSRect superBounds = [[sender superview] bounds];`


      `senderFrame.origin.x = (superBounds.size.width -`


        `senderFrame.size.width) * drand48();`


      `senderFrame.origin.y = (superBounds.size.height -`


        `senderFrame.size.height) * drand48();`


      `[sender setFrame:senderFrame];`


    `}`


    This simple action method just calculates a new random location for sender within
    its superview and moves it there. Save the changes, Run the project, and see that
    each time we click the Move button, it hops to another location in the window.


    Now, let’s animate the movement. We just need to edit a single line, changing


    `[sender setFrame:senderFrame];`


    to


    `[[sender animator] setFrame:senderFrame];`


    Click Run again, click the Move button, and see what happens. Now, each time we
    click the button, it slides smoothly into the new location instead of just switching
    instantaneously. The object returned by the animator method is a proxy that responds
    to each of `NSView`’s setter methods and schedules animations to apply the change
    gradually. Behind the scenes, Core Animation does all the work of modifying the
    relevant value bit by bit until it reaches the target value specified in the call
    to the setter.


    Each thread maintains an animation context in the form of an instance of `NSAnimationContext`,
    which among other things lets us set the length of time (in seconds) that an implicit
    animation will take by first setting a value like this:


    `[[NSAnimationContext currentContext] setDuration:1.0];`


    If that’s all the control we need over our animations, then we can get pretty
    far using implicit animations. If we need more fine-tuning, such as being able
    to ensure that several animations occur in a synchronized manner or trigger some
    activity when an animation completes, then we’ll need something more, such as…'
  trans: "\n# 核心动画：入门指南\n\n苹果在 Mac OS X 中包含的最激动人心的技术之一就是名为**Core Animation**的图形系统，它让我们能够在应用程序中轻松创建动画效果。我们可以让视图平滑而简便地滑动、淡入淡出、旋转和缩放，通常只需几行代码即可实现。本质上，Core\
    \ Animation 让我们能够指定对象的变化——例如将其位置改到窗口中的另一个位置——从而使得这种变化不再是瞬间完成，而是被自动分割成多个微小的动作，由\
    \ Core Animation 随时间逐步渲染出来。我们可以指定转场效果的时长（以秒为单位），以及变化的时间或节奏。我们还可以将多个动画分组，使它们完美同步地执行。\n\
    \n## Core Animation 基础\n\n从技术角度来看，这一切的核心基础单元是一个名为 `CALayer` 的类（Core Animation\
    \ 的预发布版本甚至曾被称作 Layer Kit）。每个 `NSView` 都可以选择性地附加一个 `CALayer`，这既可以在 Interface Builder\
    \ 中通过一个开关来启用，也可以在代码中设置。将图层分配给视图的过程实际上会递归地遍历该视图的所有子视图，因此当一个视图拥有图层时，其所有子视图（以及它们的子视图，依此类推）也会获得图层。一旦图层就位，我们就可以开始对视图进行动画处理。\n\
    \n在底层，每个 `CALayer` 都与一些用于渲染其图形的 OpenGL 结构相关联。OpenGL 在快速将矩形绘制到屏幕上方面表现出色，即使是经过调整大小、旋转等操作的矩形也是如此，因此使用\
    \ `CALayer` 可以让我们的视图在屏幕上施展各种花招，而不会拖慢应用程序。Core Animation 的 API 将我们与 OpenGL 完全隔离开来，因此它会在后台静默工作，我们无需过多操心。唯一需要牢记的是，每个图层都会占用计算机图形硬件的一部分可用内存，因此我们最好仅对应用程序中实际需要执行动画的部分使用图层，而不是将其应用到每个窗口的每个视图中。\n\
    \n### 隐式动画\n\n任何支持图层的视图都可以通过其 **animator** 代理来生成动画。这是一个特殊对象，充当视图本身的替身，它会根据所接收的方法来设置动画，而不是立即进行更改。例如，如果我们想要动画化视图的移动，那么与其直接设置其\
    \ frame 属性：\n\n`[myView setFrame:newFrame];`\n\n我们可以这样设置：\n\n`[[myView animator]\
    \ setFrame:newFrame];`\n\n为了演示效果，创建一个新的 Cocoa 项目，将其命名为 **MovingButton**，并使用 **MB**\
    \ 作为类前缀。首先，我们来设置用户界面。在 Interface Builder 画布中打开 `MainMenu.xib`，打开 **MovingButton**\
    \ 窗口，并在空窗口中放置一个名为 **Move** 的按钮。接下来，打开助理编辑器，并在其中打开 `MBAppDelegate.h` 文件。从按钮控制拖拽到\
    \ `MBAppDelegate.h` 文件，在窗口的 `@property` 声明正下方添加一个操作。将这个新操作命名为 `move`。\n\n现在，我们来填写\
    \ `move:` 操作的实现，如下所示：\n\n```\n- (IBAction)move:(id)sender {\n\n  NSRect senderFrame\
    \ = [sender frame];\n\n  NSRect superBounds = [[sender superview] bounds];\n\n\
    \  senderFrame.origin.x = (superBounds.size.width -\n\n    senderFrame.size.width)\
    \ * drand48();\n\n  senderFrame.origin.y = (superBounds.size.height -\n\n    senderFrame.size.height)\
    \ * drand48();\n\n  [sender setFrame:senderFrame];\n\n}\n```\n\n这个简单的操作方法只是为 sender\
    \ 在其父视图中计算一个新的随机位置，并将其移动过去。保存更改，运行项目，你会看到每次点击 Move 按钮，它都会跳到窗口中的另一个位置。\n\n现在，让我们让移动过程动起来。我们只需编辑一行代码，将\n\
    \n`[sender setFrame:senderFrame];`\n\n改为\n\n`[[sender animator] setFrame:senderFrame];`\n\
    \n再次点击运行，点击 Move 按钮，看看会发生什么。现在，每次我们点击按钮，它都会平滑地滑动到新位置，而不是瞬间切换。`animator` 方法返回的对象是一个代理，它会响应\
    \ `NSView` 的每个 setter 方法，并调度动画来逐步应用更改。在幕后，Core Animation 负责完成所有工作，一点一点地修改相关值，直到达到调用\
    \ setter 时指定的目标值。\n\n每个线程都持有一个动画上下文，其形式为 `NSAnimationContext` 的实例。该上下文允许我们设置隐式动画的时长（以秒为单位），方法如下：\n\
    \n`[[NSAnimationContext currentContext] setDuration:1.0];`\n\n如果这就是我们对动画所需的全部控制，那么使用隐式动画就能走得很远。但如果我们需要更精细的调整，例如确保多个动画同步发生，或者在动画完成时触发某些活动，那么我们就需要更进一步，比如……\n"
- fmt: "### Explicit Animations\n\nCore Animation provides a technique for setting\
    \ up animations explicitly in our code, instead of using the “magic” of `NSView`’s\
    \ `animator` method. Each animation we create explicitly is framed by methods\
    \ that start and stop a section of animation code, making everything a little\
    \ clearer. Combined with the added capabilities that explicit animations have,\
    \ it’s clear that this is the right approach for all but the simplest of animations.\n\
    \nIn order to use Core Animation, we first have to add the `QuartzCore` framework\
    \ to our Xcode project. In Xcode, select the `MovingButton` project itself in\
    \ the Project Navigator pane: this is the very top item in the Project Navigator.\
    \ Select `MovingButton` under the Targets section, as shown in Figure [15-2](#A978-1-4302-4543-8_15_Chapter.html#Fig2).\
    \ In the Linked Frameworks and Libraries section, hit the + button at the bottom\
    \ of the table view to add a new framework. Find `QuartzCore.framework` in the\
    \ list (use the search field at the top), and add it.\n\n![A978-1-4302-4543-8_15_Fig2_HTML.jpg](A978-1-4302-4543-8_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. Adding a new framework to the project\n\nThen, at the top of `MBAppDelegate.m`,\
    \ add the following line:\n\n`#import <QuartzCore/QuartzCore.h>`\n\nNow we’re\
    \ ready to refer to Core Animation classes in our own code. Let’s start by modifying\
    \ the previous example to use explicit animation instead of implicit. To do this,\
    \ we have to create an instance of a Core Animation class called `CABasicAnimation`,\
    \ which is capable of animating between values for any `CALayer` property that\
    \ can be animated. In our case, rather than animating the frame, we’ll animate\
    \ the layer’s `position` property. We explicitly set start and end locations for\
    \ the position using the animation’s `toValue` and `fromValue` properties. Note\
    \ that these properties expect a proper object, not just a struct like `NSPoint`,\
    \ so we have to wrap each `NSPoint` value inside an `NSValue` instance. After\
    \ creating the animation, we add it to the view’s layer, along with a key. This\
    \ key doesn’t have anything to do with the property we’re animating, it’s only\
    \ there to help us in case we later want to identify this animation. Finally,\
    \ we change the frame on the view object itself since the animation only affects\
    \ the drawing of the view’s layer. We want the view to actually move as well,\
    \ so we have to set its target frame manually. Here’s the code to do all of this:\n\
    \n```\n- (IBAction)move:(id)sender {\n\n    NSRect senderFrame = [sender frame];\n\
    \n    NSRect superBounds = [[sender superview] bounds];\n\n    CABasicAnimation\
    \ *a = [CABasicAnimation\n        animationWithKeyPath:@\"position\"];\n\n   \
    \ a.fromValue = [NSValue valueWithPoint:senderFrame.origin];\n\n    senderFrame.origin.x\
    \ = (superBounds.size.width -\n        senderFrame.size.width)*drand48();\n\n\
    \    senderFrame.origin.y = (superBounds.size.height -\n        senderFrame.size.height)*drand48();\n\
    \n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n\n    [[sender\
    \ layer] addAnimation:a forKey:@\"position\"];\n\n    [[sender animator] setFrame:senderFrame];\n\
    \n    [sender setFrame:senderFrame];\n\n}\n```\n\nNote that we also removed the\
    \ `[[sender animator] setFrame:senderFrame];` line from this method because we\
    \ don’t want to trigger an implicit animation this time. Before this will work,\
    \ we need to do one more step that the implicit animations took care of for us:\
    \ establish layers for the views that need to be animated. Using the animator\
    \ proxy made this happen automatically, but now we have to turn it on ourselves\
    \ for any views that are going to be animated, including the superview of any\
    \ view that’s going to be moving. In our case, this means that the button’s superview\
    \ (the window’s content view) needs to be given a layer, and it in turn will establish\
    \ layers for its subview hierarchy, which is just the button itself. The easiest\
    \ way to do this is to go back to `MainMenu.xib`, select the button in our window,\
    \ and open the View Effects Inspector (`⌘⌥8`). At the top of this Inspector is\
    \ a section titled Core Animation Layer, which shows a list of view objects (see\
    \ Figure [15-3](#A978-1-4302-4543-8_15_Chapter.html#Fig3)).\n\n![A978-1-4302-4543-8_15_Fig3_HTML.jpg](A978-1-4302-4543-8_15_Fig3_HTML.jpg)\n\
    \nFigure 15-3. Establishing animation layers\n\nThe selected object (the button)\
    \ is at the bottom, and all its superviews (in this case just one view, the window’s\
    \ content view) are stacked up above it. Click the checkbox to turn on a layer\
    \ for the view. We can leave the checkbox for the button unchecked, since the\
    \ superview will establish a layer for it.\n\nNow save everything, run the app,\
    \ and we’ll see the exact same behavior as we had before. So, this new version\
    \ achieves the same result at the expense of a few additional lines of code. So\
    \ far it doesn’t seem like much of a win. But wait, there’s more! Explicit animation\
    \ via the animation classes, such as `CABasicAnimation`, lets us do several more\
    \ key things that we couldn’t do with implicit animation.\n\nFor starters, we\
    \ can set the animation’s duration. Add the following line just before adding\
    \ the animation to the layer (with `[[sender layer] addAnimation:a forKey:@\"\
    position\"]`) to make this animation run a little more slowly:\n\n`a.duration\
    \ = 1.0;`\n\nRun with that in place, and we’ll see that the button transitions\
    \ more slowly. We can also change the pacing of the animation so that it doesn’t\
    \ go from one point to the next in a strictly linear fashion. Let’s set it to\
    \ an “ease-in, ease-out” motion like this:\n\n`a.timingFunction = [CAMediaTimingFunction\
    \ functionWithName:`\n`kCAMediaTimingFunctionEaseInEaseOut];`\n\nRun now, and\
    \ we’ll see that when we click the button, it starts moving slowly, then gradually\
    \ builds up steam and moves more quickly, only to taper off its speed as it reaches\
    \ its target. Under the hood, these timing functions work by providing a simple\
    \ mapping for a value shifting from `0.0` to `1.0`, using a pair of control points\
    \ to describe a curve between the two. Does that ring a bell? This seems like\
    \ the perfect use for the curve editing control we implemented in the first half\
    \ of this chapter! We can use the curve editor to define the timing that will\
    \ be applied to the button’s movement each time we click it.\n\nStart by adding\
    \ the `CECurveView` class files from the previous project. In the `MovingButton`\
    \ project, right-click the `MovingButton` folder, then select Add Files to “MovingButton”\
    \ from the context menu. Navigate to the location of `CECurveView.h` and `CECurveView.m`,\
    \ select them both, and click the Add button. In the sheet that appears, click\
    \ to turn on the `Copy items into destination group’s folder` checkbox, and make\
    \ sure the `MovingButton` target is checked in the lower part of the sheet (see\
    \ Figure [15-4](#A978-1-4302-4543-8_15_Chapter.html#Fig4)).\n\n![A978-1-4302-4543-8_15_Fig4_HTML.jpg](A978-1-4302-4543-8_15_Fig4_HTML.jpg)\n\
    \nFigure 15-4. Adding existing files to a project\n\nThis time, rather than setting\
    \ up bindings to this control, let’s just add an outlet in our controller definition\
    \ so that we can access the `CECurveView` we’re going to set up. Modify `MBAppDelegate.h`,\
    \ adding the bold lines here:"
