- fmt: "# Table View 内容模式与配置指南\n\n第二个步骤是使用列数上方的弹出菜单，将表格视图的“内容模式”（Content Mode）从基于单元格（cell-based）更改为基于视图（view-based）。请注意，表格中占位符的名称已从`text\
    \ cell`更改为`table view cell`。不幸的是，最初显示在`NSTableView`中的对象命名有些令人困惑。文本单元格（text cell）是一个`NSTextFieldCell`，它是`NSCell`的子类。然而，表格视图单元格（table\
    \ view cell）是`NSTableCellView`的实例，它是`NSView`的子类，而非`NSCell`，尽管默认标题中使用了“cell”一词。在本书中，我们对表格视图的所有操作都将使用基于视图的表格视图。\n\
    \n> **注意**  \n> 我们在前一章中简要提到了单元格。这里提供一些更深入的背景。在33MHz处理器被认为是快速的年代，AppKit的设计者发现，为矩阵或表格中的每个单元格使用单独的视图对象开销太大。为了解决这个问题，他们为这些用户界面部件发明了“单元格”对象的概念。单元格只是承载数据的对象，代表控件的状态，拥有自己的目标和动作出口（target\
    \ and action outlets），但没有用于绘制、文本或事件管理的开销。单元格不是`NSView`的子类，这使得它们是更轻量级的对象。这意味着基于单元格的用户界面控件必须处理视图（能够实际绘制到屏幕上并响应用户操作）与单元格（不能这样做）之间的状态协调。在iOS中，这种分离已经不存在，Apple似乎也在将Cocoa朝着这个方向推进；`NSTableView`现在支持使用单元格（像传统Cocoa）或使用视图（像iOS）作为其子视图。`NSMatrix`目前还不支持这一点，但也许在未来的版本中会实现。\n\
    \n让我们看看是否能找到那一列。点击表格视图之外的窗口区域以取消选中它，然后点击一次表格视图以选中包含它的滚动视图。Xcode中的Interface Builder面板应该类似于图[6-3](#A978-1-4302-4543-8_6_Chapter.html#Fig3)。点击表格视图的右边缘并稍微展开，以便所有三列都可见。继续展开，直到它卡入相邻的、包含我们反派基本信息的框旁。蓝色对齐线将出现，仅向下延伸到“基本信息”框的高度。\n\
    \n![A978-1-4302-4543-8_6_Fig3_HTML.jpg](A978-1-4302-4543-8_6_Fig3_HTML.jpg)\n\n\
    **图 6-3.** 我们已经选中了滚动视图\n\n最后一列需要一点额外的配置，因为它将显示图像而非文本。幸运的是，Cocoa提供了一个类使这变得容易。在工具区（Utility\
    \ area）中打开身份检查器（Identity Inspector，快捷键⌥⌘3），以便查看当前所在位置。点击最后一列，直到表格视图单元格被选中。这可能需要点击四次——经过滚动视图、表格视图、表格列，最后是表格单元格视图。到达后，我们将在身份检查器中看到`NSTableCellView`作为类名。然而，经过这么多努力点击到这里后，现在该删除它了。按下Delete键将其删除。我们将用一个图像井（image\
    \ well）来替换它。在对象库搜索框中输入“Image”，顶部选项应该是一个图像井。将其从对象库拖到表格视图的第三列。当光标悬停在可放置区域时，它会变成绿色加号，并且该列会以蓝色边框高亮。松开鼠标按钮，搞定！这一表格列现在可以显示图像了。\n\
    \n由于图像井比其他两列中的表格视图单元格视图更高，请将每个表格视图单元格调整为与图像井相同的高度。它们的高度都应设置为48点。要调整大小，请点击每列中显示“Table\
    \ View Cell”的文本，直到表格视图单元格本身变为蓝色，并在底部出现一个调整大小手柄。向下拖拽调整大小手柄，工具区将显示当前大小。\n\n在完成表格视图之前，我们需要配置这些表格列，使其对应于我们反派对象中的`name`、`lastSeenDate`和`mugshot`值。我们将通过为每一列提供一个与要显示属性的键名相同的标识符（identifier）来实现这一点。稍后，我们将看到如何在代码中使用这个标识符来轻松准备要显示的值。点击表格视图中“Table\
    \ View Cell”文本下方的区域，选中第一列。在身份检查器（⌥⌘3）中，类名应为`NSTableColumn`。在标识符（Identifier）字段中输入`\"\
    name\"`。切换到属性检查器（Attributes Inspector，⌥⌘4），在标题（Title）字段中输入`\"Name\"`；这将决定列标题中显示的文本。对第二列重复此过程，输入`\"\
    lastSeenDate\"`作为标识符，`\"Last Seen\"`作为标题；再对第三列重复此过程，输入`\"mugshot\"`作为标识符，`\"Mugshot\"\
    `作为标题。\n\n现在我们将添加一对按钮：一个用于向列表添加新反派，另一个用于删除选中的反派。回到对象库面板，在搜索字段中输入`\"button\"`；结果中会显示出数量惊人多的按钮列表。Apple公司里有人真的很喜欢设计按钮！尽管它们外观各异，但这个列表中的几乎所有东西都只是一个`NSButton`，其核心功能始终相同。其中一些按钮被预配置为不同的模式，可以充当复选框或展开三角形（disclosure\
    \ triangle），但除此之外，它们的基本功能都一样：在被点击时调用目标对象中的操作方法（action method）。\n\n从列表中选择前几个按钮之一（可能是“Push\
    \ Button”或“Rounded Rect Button”），并将其拖到我们的窗口中，放在表格视图下方。这将是我们用于“添加反派”（Add Villain）的按钮。我们不会简单地将按钮标题设置为文本“Add\
    \ Villain”，而是使用Cocoa内置的图形图像之一，使其看起来像其他应用程序中的“添加”按钮。在按钮仍处于选中状态时，打开属性检查器，找到图像（Image）组合框。点击组合框右端的小三角形，开始输入`\"\
    nsaddtemplate\"`。当你看到它自动补全为`\"NSAddTemplate\"`时，按下Enter键，你会看到新按钮现在显示一个+号图像，覆盖在“Add\
    \ Villain”标签上。在图像组合框下方是另一个标记为“Alternate”的组合框。也将其设置为`NSAddTemplate`。再下方是一组标记为“Position”的按钮，指示图像（显示为正方形）相对于按钮标题（显示为一条线）的位置。选择仅显示正方形而没有文本的选项，按钮标题将消失。水平调整按钮大小，使其刚好能容纳图像，然后复制按钮（使用⌘D）制作另一个按钮。选中这第二个按钮，再次回到属性检查器中的图像组合框，开始输入`\"\
    nsremovetemplate\"`，这将在你的按钮中提供—号图像。同样，将备选图像也设置为`NSRemoveTemplate`。"
  raw: 'The second is to change the table view’s Content Mode from being cell-based
    to view-based, using the pop-up menu just above the number of columns. Note that
    the name of the placeholders in the table has changed from text cell to table
    view cell. The naming of the objects that are initially displayed in the `NSTableView`
    is a little confusing, unfortunately. A text cell is an `NSTextFieldCell`, which
    is a subclass of `NSCell`. However, a table view cell is an instance of `NSTableCellView`,
    which is a subclass of `NSView`, not `NSCell`, despite the use of the word “cell”
    in the default title. For this book, everything we’ll do with table views will
    be using view-based table views.


    Note


    We touched on cells in the previous chapter. Here’s a bit more background. Back
    when a 33Mhz processor was considered speedy, the designers of the AppKit found
    that having individual view objects for every cell in a matrix or table was too
    expensive. To deal with this, they invented the idea of a “cell” object for these
    parts of the user interface. Cells are just data-bearing objects that represent
    the state of a control, with their own target and action outlets, but without
    any of the overhead for drawing or text and event management. Cells are not subclasses
    of `NSView`, which makes them lighter-weight objects. This means that a user-interface
    control based on cells has to deal with coordinating state between views, which
    can actually draw on the screen and respond to user actions, and cells, which
    can’t. In iOS, this split is gone, and Apple appears to be moving Cocoa in this
    direction as well; `NSTableView` now supports using cells (like traditional Cocoa)
    or using views (like iOS) for its subviews.  `NSMatrix` doesn’t do this yet, but
    perhaps it will in a future release.


    Let’s see if we can find that third column. Click in the window away from the
    table view to deselect it, and then click once on the table view to select the
    containing scroll view. Your Interface Builder pane in Xcode should look something
    like Figure [6-3](#A978-1-4302-4543-8_6_Chapter.html#Fig3). Click on the right
    edge of the table view and expand it a bit so that all three columns are visible.
    Expand it further until it snaps into place next to the adjoining box holding
    the basic information on our villains. The blue guideline will appear, extending
    down only as far as the size of the Basic Information box.


    ![A978-1-4302-4543-8_6_Fig3_HTML.jpg](A978-1-4302-4543-8_6_Fig3_HTML.jpg)


    Figure 6-3.


    We’ve got the scrollview selected


    That final column needs a little extra configuration because it’s going to display
    an image instead of text. Fortunately, Cocoa provides a class that makes this
    easy. Open the Identity Inspector (⌥⌘3) in the Utility area, so we can see where
    we are. Click the last column until the table view cell is selected. It might
    take four clicks to get there—through the Scroll view, the table view, the Table
    column, and then the table cell view. Once there, we’ll see `NSTableCellView`
    as the class name in the Identity Inspector. However, after all that work to click
    through to it, it’s time for it to go. Press the Delete key to delete it. We’re
    going to replace it with an image well. In the Object Library Search box, type
    Image and the top item should be an Image Well. Drag it out from the Object Library
    into the third column of the table view. The cursor should turn into a green plus
    sign and the column should highlight with a blue border when we’re over a drop-ready
    spot. Release the button, and voila! That table column is now ready to display
    an image.


    Since the image well is taller than the two table view cell views in the other
    two columns, resize each of the table view cells to be the same height as the
    image well. They should all have a height of 48 points. To resize them, click
    on the text that reads “Table View Cell” in each column until the table view cell
    itself is blue, with a resize handle at the bottom. Drag down on the resize handle
    and a Utility window will appear indicating the current size.


    Before we’re done with the table view, we need to configure these table columns
    to correspond to the name, lastSeenDate, and mugshot values in our villain objects,
    and we’ll do that by supplying each of them with an identifier that is the same
    as the key-name for the attribute we want to show. Later on, we’ll see how to
    use this identifier in our code to easily prepare values for display. Select the
    first column by clicking in the table view below the “Table View Cell” text. In
    the Identity Inspector (⌥⌘3), `NSTableColumn` should be the class name. Type “name”
    into the Identifier field. Switch to the Attributes Inspector (⌥⌘4), and type
    “Name” into the Title field; this determines what will appear in the text of the
    column’s header. Repeat this process for the second column, entering “lastSeenDate”
    as the identifier and “Last Seen” as the title, and again for the third title,
    entering “mugshot” for the identifier and “Mugshot” for the title.


    Now we’re going to add a pair of buttons, one for adding a new villain to the
    list and one for deleting the selected villain. Back in the Object Library pane,
    type “button” into the Search field; a surprisingly large list of buttons will
    show up in the results. Someone at Apple really likes to design buttons! Despite
    their differences in appearance, just about everything in this list is just an
    `NSButton`, which at its core always does the same basic thing. Some of them are
    preconfigured in different modes to work as a checkbox or disclosure triangle,
    but otherwise they all do the same basic thing: call an action method in a target
    object when clicked.


    Pick one of the first few buttons in the list (maybe Push Button or Rounded Rect
    Button) and drag it to our window, dropping it just below the Table View. This
    will be our “Add Villain” button. Instead of just titling the button with the
    text “Add Villain”, we’ll use one of Cocoa’s built-in graphic images to make it
    resemble Add buttons in other applications. While the button is still selected,
    bring up the Attributes Inspector, and locate the Image combo box. Click the small
    triangle at the right end of the combo box, and start typing “nsaddtemplate”.
    When you see that it’s filled in the full text as “NSAddTemplate”, press Enter
    and you’ll see that your new button now has a + image, overlaid on the “Add Villain”
    label. Underneath the Image combo box is another combo box labeled Alternate.
    Set that to NSAddTemplate also. Below that is a set of buttons labeled Position,
    indicating the position of the image (shown as a square) relative to the button
    title (shown as a line). Select the item that just shows a square with no text,
    and the Button title will disappear. Resize the button horizontally so that it
    is just wide enough to contain the image, then duplicate the button (with ⌘D)
    to make another one. Select this second button, go back to the Image combo box
    in the Attributes Inspector again, and begin typing “nsremovetemplate”, which
    will provide you with a – image in your button. As before, also set the Alternate
    image to be NSRemoveTemplate.'
