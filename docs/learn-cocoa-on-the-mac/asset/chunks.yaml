- fmt: '将我们刚刚创建的关系命名为“members”，并将其目标实体设置为`MythicalPerson`。点击打开“To-Many Relationship”复选框，并将删除规则保留为`Nullify`（默认值）。太好了，我们刚刚创建了第一个单向关系！完成这个简单的步骤后，`MythicalBand`实体就有了一个新的`members`属性，并且附带了一系列新功能。每个乐队现在都可以提供一个`MythicalPerson`对象数组，并且该数组将根据我们配置的选项自动维护。在图表纸视图中，有一条从`MythicalBand`指向`MythicalPerson`的、带有双箭头的单向箭头。


    现在，让我们创建这个关系的反向关系。选择`MythicalPerson`实体，并添加一个新关系。将其命名为“memberOf”，目标实体设置为`MythicalBand`，然后将其反向关系设置为`members`。其余默认值保持不变。现在，`MythicalPerson`和`MythicalBand`之间出现了一条双向箭头，在乐队端是单箭头。


    接下来，我们继续处理`MythicalBand`和`MythicalGig`之间的一对多关系。选择`MythicalBand`，创建一个名为“gigs”的新关系，目标实体设置为`MythicalGig`，并勾选“To-Many
    Relationship”。因为一场没有乐队的演出对我们毫无用处，所以将删除规则设置为`Cascade`。这样，如果一个乐队被删除，它所有的演出也都会被删除。现在，选择`MythicalGig`并创建一个名为“band”的新关系，目标实体设置为`MythicalBand`，并选择`gigs`作为其反向关系。在这里，我们可以将删除规则保留为默认值`Nullify`。这仅仅意味着，如果一场演出被删除，该演出在与乐队关系另一端的所有痕迹都会被清除，但乐队本身将保持不变。


    最后，我们来处理`MythicalVenue`和`MythicalGig`之间的一对多关系。选择`MythicalVenue`，创建一个名为“gigs”的新关系，目标实体设置为`MythicalGig`，并勾选“To-Many
    Relationship”。因为一场没有场地演出的演出与一场没有乐队的演出一样毫无意义，所以在这里我们也把删除规则设置为`Cascade`，这样删除一个场地也会删除其所有演出。现在，选择`MythicalGig`并创建一个名为“venue”的新关系，目标实体设置为`MythicalVenue`，并选择`gigs`作为其反向关系。


    我们现在已经创建了新版本 MythBase 所需的所有关系，我们的模型应该看起来与之前在[图 9-4](#A978-1-4302-4543-8_9_Chapter.html#Fig4)中看到的类似。


    ### 创建一个简单的迁移


    假设您之前已经学习了[第8章](#A978-1-4302-4543-8_8_Chapter.html)，并使用该版本的 MythBase 保存了一些数据，那么在此阶段直接运行新版本会遇到一些问题。启动时，您会看到一些关于数据存储版本不匹配的错误消息，并且在原本应该显示您之前创建的`MythicalPerson`对象的地方，您只会看到一个空白的表格视图。如果您尝试添加一些新对象并保存它们，您只会得到更多的错误！原因是当前版本应用程序的数据模型与之前用于保存数据的版本有较大差异；Core
    Data 足够智能，能够检测到这一点，通知应用程序委托，并阻止您用新数据覆盖旧版本。不仅如此，它还足够智能，可以自动“升级”现有的数据存储以适配您的新模型版本。这个过程称为迁移。


    Core Data 提供了两种迁移方式。第一种是轻量级迁移，由 Core Data 自动推断。Core Data 能够识别数据模型版本之间的许多常见更改（例如添加、删除或重命名属性、实体和关系），并能够自动找出向前迁移的方法。如果您使用
    iCloud 存储数据，这是唯一可用的迁移方式。对于更复杂的数据模型演变，Core Data 可能无法推断更改之间的映射关系，您需要创建一个映射模型，甚至可能需要编写一些
    Objective-C 代码来处理迁移。映射模型描述了旧模型中的实体和属性在新模型中是如何表示的，但如果进行了大幅度的更改，您可能还需要编写代码。在本例中，我们将采用轻量级迁移策略，无需任何额外配置。


    ### 运行时间


    在迁移发生之前，我们需要对应用程序的源代码做一个小改动。在当前版本中，应用程序会尝试从其数据存储中加载数据，如果存储数据的结构与应用数据模型最新版本描述的结构不匹配，就会出现问题，并且应用程序会向用户显示错误。要解决这个问题并使应用程序升级数据存储，我们只需要在加载数据存储的方法中传入一个配置选项即可。打开`MBAppDelegate.m`，找到`persistentStoreCoordinator`方法。在该方法的末尾附近，有以下一组代码行：


    ```

    if (![coordinator addPersistentStoreWithType:NSXMLStoreType

    configuration:nil

    URL:url

    options:nil

    error:&error]){

    ```


    我们要做的是创建一个选项字典，并将其传递给该方法调用。这个字典包含两个键值对，告诉存储协调器它应该尝试更新现有数据以匹配当前数据模型，并且应该尝试自动推断映射关系。将上面显示的代码行替换为以下内容：


    ```

    NSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:

    [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,

    [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];

    if (![coordinator addPersistentStoreWithType:NSXMLStoreType

    configuration:nil

    URL:url

    options:optionsDictionary

    error:&error]){

    ```


    有了这段代码，我们应该能够构建并运行我们的应用程序，它会正常工作！我们将看到之前使用[第8章](#A978-1-4302-4543-8_8_Chapter.html)版本
    MythBase 存储的旧数据现在已经转换为我们应用程序最新的数据模型。当然，我们不会看到我们创建的任何新实体——实际上，如果一切按计划进行，我们根本看不到与[第8章](#A978-1-4302-4543-8_8_Chapter.html)相比有任何不同，但底层结构已经被修改，以包含新的实体和关系。


    那么，这是如何发生的呢？您可能还记得[第8章](#A978-1-4302-4543-8_8_Chapter.html)中`MBAppDelegate`的`persistentStoreCoordinator`方法里的以下方法调用：


    ```

    [persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType

    configuration:nil

    URL:url

    options:optionsDictionary

    error:&error]

    ```


    可能不太明显，但正是这个方法调用触发了数据迁移。当上面显示的代码被执行时，通常会发生的情况是数据存储被打开并准备使用。然而，如果数据存储的结构与协调器的数据模型的结构（即您在
    Xcode 中指定的当前版本）不匹配，那么就会触发一套完全不同的事件链。'
  raw: 'Name the relationship we’ve just created “members,” and set its destination
    entity to MythicalPerson. Click to turn on the To-Many Relationship checkbox,
    and leave the Delete Rule set to Nullify (which is the default value). Hooray,
    we’ve just made our first unidirectional relationship! Doing this simple step
    gives the `MythicalBand` entity a new members property with a whole set of new
    features. Each band can now provide an array of `MythicalPerson` objects, and
    that array will be automatically maintained in line with the options we configured.
    In the graph paper view, there’s a unidirectional arrow with a sort of double
    head from `MythicalBand` to `MythicalPerson`.


    Now let’s create the inverse of this relationship. Select the `MythicalPerson`
    entity, and add a new relationship. Name it “memberOf,” set its destination entity
    to MythicalBand, and then set its inverse to members. The rest of the default
    values can be left as they are. There’s now a bidirectional arrow between `MythicalPerson`
    and `MythicalBand` with a single head at the band end.


    Let’s move on to the one-to-many relationship between `MythicalBand` and `MythicalGig`.
    Select `MythicalBand`, create a new relationship named “gigs,” with `MythicalGig`
    as its destination and the To-Many Relationship checked. Because a gig without
    a band doesn’t do us any good, set the Delete Rule to Cascade. That way, if a
    band is deleted, all its gigs will be deleted, too. Now select `MythicalGig` and
    make a new relationship called “band,” with `MythicalBand` as its destination
    and select gigs as its inverse relationship. Here, we can leave the Delete Rule
    set to its default value, Nullify. This simply means that if a gig is deleted,
    any trace of the gig on the remaining end of the relationship to the band will
    be wiped out, but the band itself will be left intact.


    Finally, it’s time for the one-to-many relationship between `MythicalVenue` and
    `MythicalGigs`. Select `MythicalVenue`, and create a new relationship named “gigs,”
    with `MythicalGig` as its destination and the To-Many Relationship checked. Because
    a gig without a venue is just as meaningless as a gig without a band, here we’ll
    also set the Delete Rule to Cascade, so deleting a venue will also delete all
    its gigs. Now select `MythicalGig` and make a new relationship called “venue,”
    with `MythicalVenue` as its destination and gigs as its inverse relationship.


    We’ve now created all the relationships we’re going to need for the new version
    of MythBase, and our model should look similar to what we saw previously in Figure
    [9-4](#A978-1-4302-4543-8_9_Chapter.html#Fig4).


    ### Creating a Simple Migration


    Assuming that you’ve previously gone through [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html)
    and used that version of MythBase to save some data, running the new version at
    this stage will give you some problems. You’ll see some error messages about mismatched
    data store versions when you start up, and you’ll get nothing but an empty table
    view where the `MythicalPerson` objects you created previously should be. And
    if you add some new objects and try to save them, you’ll just get more errors!
    The reason for this is that the current version of the app’s data model differs
    quite a bit from the version that was used to save the data previously; Core Data
    is smart enough to detect this, let the app delegate know about it, and prevent
    you from overwriting the old version with new data. Not only that, but it’s also
    smart enough to automatically “upgrade” an existing data store to work with your
    new model version. This is called a migration.


    Core Data offers two kinds of migrations. The first, lightweight migrations, are
    inferred by Core Data automatically. Core Data is able to recognize many common
    changes between versions of data models (such as adding, removing, or renaming
    attributes, entities, and relationships) and is able to automatically figure out
    how to roll forward. If you’re using iCloud to store your data, this is the only
    kind of migration available to you. For more complex evolutions of data models,
    Core Data may not be able to infer the mapping between the changes, and you’ll
    need to create a mapping model and perhaps write some Objective-C to handle the
    migration. The mapping model describes how entities and attributes in the old
    model are represented in the new one, but you might also need code if you’ve made
    drastic changes. In this example, we’ll get by with the lightweight migration
    strategy without any extra configuration at all.


    ### Time to Run


    Before we can have the migration happen, we need to make one small change to the
    application’s source code. In the current version, the app tries to load data
    from its data store, and if the structure of the stored data doesn’t match the
    structure described in the latest version of the data model, problems will occur,
    and the app will show the user an error. To fix this and make the application
    upgrade the data store, all we need to do is pass in a configuration option to
    the method that loads the data store. Open up `MBAppDelegate.m`, and locate the
    `persistentStoreCoordinator` method. Toward the end of that method are a group
    of lines that look like this:


    `if (![coordinator addPersistentStoreWithType:NSXMLStoreType`


    `configuration:nil`


    `URL:url`


    `options:nil`


    `error:&error]){`


    What we’re going to do is create a dictionary of options to pass along in that
    method call. This dictionary contains two key-value pairs that tell the store
    coordinator that it should try to update existing data to match the current data
    model and that it should try to infer the mapping automatically. Replace the lines
    shown above with the following:


    `NSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:`


    `[NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption`,


    `[NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];`


    `if (![coordinator addPersistentStoreWithType:NSXMLStoreType`


    `configuration:nil`


    `URL:url`


    `options:optionsDictionary`


    `error:&error]){`


    With this code now in place, we should be able to build and run our application,
    and it will just work! We’ll see the old data that we had previously stored with
    the [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html) version of MythBase now converted
    to our app’s newest data model. Of course, we won’t see any of the new entities
    we’ve created in the model—in fact, if all goes according to plan, we won’t see
    anything different from [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html) at all,
    but the underlying structure has now been modified to include the new entities
    and relationships.


    So how did that happen? You may recall from [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html)
    the following method call in `MBAppDelegate`’s `persistentStoreCoordinator` method:


    `[persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType`


    `configuration:nil`


    `URL:url`


    `options:optionsDictionary`


    `error:&error]`


    It may not be obvious, but that method call is what triggers the data migration
    to occur. When the code shown previously is executed, what normally happens is
    that the data store is opened up and prepared for use. However, if the structure
    of the data store doesn’t match the structure of the coordinator’s data model
    (which is the current version you specified in Xcode), then a whole different
    chain of events takes place.'
