    `self.isWorking = YES;`


    `}];`


    `[process addDependency:fetch];`


    `[calcFirst addDependency:process];`


    `[calcSecond addDependency:process];`


    `[showResults addDependency:calcFirst];`


    `[showResults addDependency:calcSecond];`


    `NSOperationQueue *queue = [[NSOperationQueue alloc] init];`


    `[queue addOperations:@[fetch, process, calcFirst, calcSecond, showResults]`


    `waitUntilFinished:NO];`


    `}`


    The first thing we did was add the `__block` storage qualifier to some local variables.
    That way, each of those `NSString` pointers remains a single, unique pointer that
    can be both read from and written to by each block. In this context, “writing”
    means assigning to the pointer to point at a different object. Without `__block`,
    each block would get a new pointer of its own, all pointing at the same initial
    object, and none of them writable at all! So `__block` gives us a way of sharing
    some data between blocks.


    Next, we create some operations. Instead of simply executing each worker method
    directly, it now creates an `NSBlockOperation` for each. `NSBlockOperation` is
    simply a class of `NSOperation` that is designed to be created from a block.


    Then we define a set of dependencies between these operations, so that `process`
    is only executed after `fetch` is done, `calcFirst` and `calcSecond` are only
    executed after `process` is done, and `showResults` is only executed after all
    the others are done.'
  trans: "\n### 成为代码块高手\n\n无论是使用 `NSOperationQueue` 还是 GCD，利用 Apple 并发 API 最直接的方式之一就是使用代码块。代码块与\
    \ GCD 一同发布，是 Apple 添加到 C 语言本身（并由此扩展到 Objective-C 和 C++）的一种新语法。这种新语言特性（在其他一些语言中也称为闭包）对于充分发挥\
    \ GCD 的能力至关重要。\n\n代码块的核心思想是让一段特定的代码能够像其他 C 语言类型一样被处理。代码块可以赋值给变量，作为参数传递给函数或方法，并且通常可以像其他\
    \ Objective-C 对象一样被处理。与 C 语言中大多数其他类型不同，代码块还可以被执行。我们可以在一个对象中创建代码块，并将其传递给另一个对象，由后者稍后执行。通过这种方式，代码块可以作为\
    \ Objective-C 中委托模式或 C 语言中回调函数的一种替代方案。\n\n与方法或函数非常相似，代码块可以接受一个或多个参数，并指定一个返回值。为了声明一个代码块变量，我们使用脱字符号（`^`）以及一些额外的括号来声明参数和返回类型。要定义代码块本身，我们大致采用相同的方式，但随后要用花括号包裹的实际代码来定义它。以下是我们讨论的一些示例：\n\
    \n```\n// 声明一个名为 \"loggerBlock\" 的代码块变量，无参数，无返回值。\nvoid (^loggerBlock)(void);\n\
    \n// 为上面声明的变量赋值一个代码块。像这样一个没有参数且没有返回值的代码块，\n// 不需要像前面变量声明中那样使用 void 等“装饰”。\nloggerBlock\
    \ = ^{ NSLog(@\"我很高兴他们没把它叫做闭包\"); };\n\n// 执行代码块，就像调用函数一样。\nloggerBlock();  //\
    \ 这会在控制台产生一些输出\n```\n\n如果你做过很多 C 语言编程，可能会意识到这类似于 C 语言中函数指针的概念。然而，两者之间存在一些关键区别。也许最大的区别在于，代码块可以在函数或方法体内联定义。我们可以在将代码块赋值给变量或传递给另一个方法或函数的地方直接定义它。另一个重要的区别是，代码块可以访问其创建时所在作用域中的变量。\n\
    \n默认情况下，代码块对我们通过这种方式访问的任何变量都会创建只读副本，保持原始变量不变。同时，它会自动增加从周围作用域使用的任何 Objective-C\
    \ 对象的引用计数，并在代码块执行完毕后再次减少引用计数。然而，我们可以通过在外部变量的声明前加上 `__block`，使其变为可读写。\n\n```\n\
    // 定义一个可以被代码块修改的变量\n__block int a = 0;\n\n// 定义一个试图修改其作用域内变量的代码块\nvoid (^sillyBlock)(void)\
    \ = ^{ a = 47; };\n\n// 在调用代码块前检查变量的值\nNSLog(@\"a == %d\", a); // 输出 \"a == 0\"\
    \n\n// 执行代码块\nsillyBlock();\n\n// 在调用代码块后再次检查变量的值\nNSLog(@\"a == %d\", a); //\
    \ 输出 \"a == 47\"\n```\n\n如前所述，代码块与 GCD 结合使用时才能真正大放异彩。GCD 包含一组函数，这些函数可以完成与 `NSOperation`\
    \ 和 `NSOperationQueue` 类似的任务，但采用了不同的思路。主要区别在于，GCD 无需显式创建一堆操作、可选地声明操作间依赖关系、然后将操作添加到队列中；我们只需调用一个函数，该函数接受一个代码块，并在单一步骤中将其添加到队列。我们稍后会讨论这一点，但首先，我们将展示如何使用操作队列来处理并发。\n\
    \n### 让 `SlowWorker` 焕发活力\n\n为了了解操作队列的工作原理，让我们在 `SlowWorker` 项目中对它们进行测试。在开始之前，请复制包含\
    \ `SlowWorker` 项目的整个文件夹。在本章后面，我们将使用 `SlowWorker` 的原始版本作为实现并发的另一种方式的起点，所以请保留一份副本。\n\
    \n回想一下，这个应用的问题在于，单一的动作方法按顺序调用了多个其他方法，这些方法的总耗时足以让应用感觉反应迟钝。我们要做的是将每个其他方法放入一个操作中，将所有操作放入一个队列，然后让队列自行处理这一切。\n\
    \n`doWork:` 方法是我们进行所有修改的地方。首先，我们为所有本地 `NSString` 变量添加 `__block` 存储限定符。然后，我们将每一小段工作封装在代码块内，声明一些依赖关系以确保它们按正确顺序执行，最后将它们传递给一个新队列执行。请看下面加粗的行（当然，也请将它们添加到我们的方法中），然后我们将更详细地讨论细节：\n\
    \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
    \    __block NSString *fetchedData;\n    __block NSString *processed;\n    __block\
    \ NSString *firstResult;\n    __block NSString *secondResult;\n\n    self.isWorking\
    \ = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{\n\
    \        fetchedData = [self fetchSomethingFromServer];\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n            @\"已获取: %@\\\
    n\", fetchedData];\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n        processed = [self processData:fetchedData];\n\
    \        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \            @\"已处理: %@\\n\", processed];\n    }];\n\n    NSBlockOperation *calcFirst\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult = [self\
    \ calculateFirstResult:processed];\n    }];\n\n    NSBlockOperation *calcSecond\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult = [self\
    \ calculateSecondResult:processed];\n    }];\n\n    NSBlockOperation *showResults\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n            @\"第一个结果: [%@]\\\
    n 第二个结果: [%@]\\n\\n\",\n            firstResult, secondResult];\n        NSDate\
    \ *endTime = [NSDate date];\n        NSLog(@\"在 %f 秒内完成\",\n            [endTime\
    \ timeIntervalSinceDate:startTime]);\n        self.isWorking = YES;\n    }];\n\
    \n    [process addDependency:fetch];\n    [calcFirst addDependency:process];\n\
    \    [calcSecond addDependency:process];\n    [showResults addDependency:calcFirst];\n\
    \    [showResults addDependency:calcSecond];\n\n    NSOperationQueue *queue =\
    \ [[NSOperationQueue alloc] init];\n    [queue addOperations:@[fetch, process,\
    \ calcFirst, calcSecond, showResults]\n        waitUntilFinished:NO];\n}\n```\n\
    \n我们做的第一件事是为一些本地变量添加了 `__block` 存储限定符。这样，每个 `NSString` 指针都保持为一个单一的、唯一的指针，每个代码块都可以对该指针进行读写操作。在此上下文中，“写入”意味着将指针赋值为指向一个不同的对象。如果没有\
    \ `__block`，每个代码块都会获得一个属于自己的新指针，所有指针都指向同一个初始对象，并且它们完全不可写！所以，`__block` 为我们提供了一种在代码块之间共享某些数据的方法。\n\
    \n接下来，我们创建了一些操作。现在不再直接执行每个工作方法，而是为每个方法创建一个 `NSBlockOperation`。`NSBlockOperation`\
    \ 只是 `NSOperation` 的一个子类，专门设计用于从代码块创建。\n\n然后，我们在这些操作之间定义了一组依赖关系，以便 `process` 仅在\
    \ `fetch` 完成后执行，`calcFirst` 和 `calcSecond` 仅在 `process` 完成后执行，而 `showResults`\
    \ 仅在所有其他操作完成后执行。\n"
- fmt: "最后，我们创建一个新的`NSOperationQueue`，并将包含所有操作的数组传递给它。该队列会检查这些操作之间的所有依赖关系，并确定如何以正确的顺序执行它们。\n\
    \n### 主线程需求\n\n然而，我们仍然没有完全准备好运行。请记住，`AppKit`类（例如所有窗口和视图类）通常不是线程安全的。对它们的所有访问都应在主线程上执行。但目前我们正在从几个操作中访问`NSTextView`。很可能，其中一些操作会在轮到它们时在其他线程上运行！尽管这在简单的测试应用中可能“有效”，但这不是一个真正安全的构建基础。我们需要调整每个操作，以确保所有对`NSTextView`的访问都发生在主线程上。\n\
    \n为此，我们将把每个这样的访问包装在另一个块中，该块将直接传递给一个始终在主线程上运行其操作的特殊队列。下面的粗体代码显示了我们需要对`doWork:`方法进行的最终修改：\n\
    \n```\n- (IBAction)doWork:(id)sender {\n\n    NSDate *startTime = [NSDate date];\n\
    \n    __block NSString *fetchedData;\n\n    __block NSString *processed;\n\n \
    \   __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\n\
    \    self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        fetchedData = [self fetchSomethingFromServer];\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"Fetched: %@\\n\", fetchedData];\n\
    \n        }];\n\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        processed = [self processData:fetchedData];\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"Processed: %@\\n\", processed];\n\
    \n        }];\n\n    }];\n\n    NSBlockOperation *calcFirst = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        firstResult = [self calculateFirstResult:processed];\n\
    \n    }];\n\n    NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n\
    \n        secondResult = [self calculateSecondResult:processed];\n\n    }];\n\n\
    \    NSBlockOperation *showResults = [NSBlockOperation blockOperationWithBlock:^{\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"First Result: [%@]\\nSecond Result:\
    \ [%@]\\n\\n\",\n\n                                        firstResult, secondResult];\n\
    \n            NSDate *endTime = [NSDate date];\n\n            NSLog(@\"Completed\
    \ in %f seconds\",\n\n                  [endTime timeIntervalSinceDate:startTime]);\n\
    \n            self.isWorking = NO;\n\n        }];\n\n    }];\n\n    [process addDependency:fetch];\n\
    \n    [calcFirst addDependency:process];\n\n    [calcSecond addDependency:process];\n\
    \n    [showResults addDependency:calcFirst];\n\n    [showResults addDependency:calcSecond];\n\
    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
    \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n\n    \
    \      waitUntilFinished:NO];\n\n}\n```\n\n现在我们应该能够运行我们的应用了，点击开始按钮后，我们会注意到一些也许略有不同的现象：按钮立即恢复为非点击状态，菜单仍然可用。前两个操作在完成时将一些文本放入`NSTextView`中。大约七秒后（相比第一个版本使用的十秒有所减少，因为我们的一些工作方法现在正在同时运行），最终输出出现在文本视图中。这一切都很好，但我们还可以通过使用`Cocoa\
    \ Bindings`和我们一开始创建的`isWorking`属性来让事情变得更加响应。再次打开`MainMenu.xib`，使用对象库找到圆形进度指示器。然后将其添加到我们的窗口中，如图\
    \ [17-2](#A978-1-4302-4543-8_17_Chapter.html#Fig2) 所示。\n\n![A978-1-4302-4543-8_17_Fig2_HTML.jpg](A978-1-4302-4543-8_17_Fig2_HTML.jpg)\n\
    \n图 17-2.\n\n添加进度指示器\n\n选中进度指示器后，使用属性检查器确保其“暂停时显示”复选框已关闭。然后切换到绑定检查器，展开其`Animate`参数的视图，并将其绑定到应用委托，将`isWorking`作为模型键路径。然后选择窗口中的开始按钮，进行类似的配置。将按钮的`Enabled`属性绑定到应用委托，键路径为`isWorking`，这次添加一个`NSNegateBoolean`作为值转换器。\n\
    \n保存更改，点击运行；当我们点击开始按钮时，它变为禁用状态，圆形进度指示器出现并开始旋转。当工作完成时，进度指示器消失，按钮恢复正常。\n\n现在让我们再进一步：添加一个水平进度指示器（一种水平移动，告诉我们事情正在发生，例如在软件安装程序中）。进度视图将从0到4，每个工作方法都会将数字增加一点。与圆形进度指示器一样，这将完全通过`Cocoa\
    \ Bindings`配置。\n\n首先，在`SWAppDelegate.h`中添加一个名为`completed`的新属性：\n\n```\n//  SWAppDelegate.h\n\
    //  Insert this after the @interface line\n\n@property (assign) NSInteger completed;\n\
    ```\n\n接下来，切换到`SWAppDelegate.m`。在`doWork:`方法的顶部附近添加以下内容，以便在用户点击开始按钮时重置此计数器：\n\n\
    ```\nself.completed = 0;\n```\n\n现在，每个工作方法都需要在完成时递增此变量。我们可以在每个工作方法中添加以下行：\n\n\
    ```\nself.completed = self.completed + 1;\n```\n\n然而，这就是那些棘手的多线程问题出现的地方。在这行代码中，实际发生的是：它首先通过调用`[self\
    \ completed]`获取`completed`属性的当前值，然后加1，然后通过调用`[self setCompleted:]`将结果存储回`completed`属性。在多线程环境中，这可能导致错误行为。例如，如果两个线程大约在同一时间执行这样一行代码会怎样？假设`completed`的起始值是2。如果两个线程在任何一个写出自己的结果之前读取了当前值，那么每个线程都会在自己的值副本上加1，然后每个线程都会将它们的局部和（3）写回`completed`属性，最终该属性包含值3，而不是正确的值4。\n\
    \n解决这个问题的一种方法是使用`Objective-C`的`@synchronized`关键字，它允许我们指定一段代码一次只能由一个线程运行。在应用委托的`@implementation`部分中的某处输入以下方法：\n\
    \n```\n- (void)incrementCompleted {\n    @synchronized(self) {\n        self.completed\
    \ = self.completed + 1;\n    }\n}\n```\n\n我们在这里所做的是将之前想到的相同代码包裹在一种安全区域内。`@synchronized`关键字接受一个对象作为其参数，该对象将用于确定同步限制的范围。基本上，任何使用相同值的调用都会尝试获取相同的锁。如果其他线程已经占用了该锁，当前线程必须等待直到其他线程完成。在这种情况下，因为我们使用了`self`，对同一实例上的此方法的所有调用都将尝试获取相同的锁。我们只有一个应用委托实例，因此这实际上是一个全局锁，但对于我们的目的来说是可以的。\n\
    \n为了让其工作，我们需要进行的编码是：在每个工作方法的`return`之前添加以下一行：\n\n```\n[self incrementCompleted];\n\
    ```"
  raw: 'Finally, we create a new `NSOperationQueue` and pass it an array containing
    all our operations. The queue will look at all the dependencies between these
    operations and figure out how to execute them in the correct order.


    ### Demanding the Main Thread


    However, we’re still not quite ready to roll. Remember that the AppKit classes
    (such as all the window and view classes) are generally not thread-safe. All access
    to them should be performed exclusively on the main thread. But right now we are
    accessing the `NSTextView` from several of our operations. In all likelihood,
    some of those operations will run on some other thread when its time comes! Even
    though this may “work” in this simple test app, it’s not a really a safe foundation
    to build upon. We need to adjust each of those operations so that all access to
    the `NSTextView` happens on the main thread.


    To do this, we’ll wrap each such access inside yet another block, which will be
    passed directly to a special queue that always runs its operations on the main
    thread. The bold code here shows the final changes we need to make to the `doWork:`
    method:


    `- (IBAction)doWork:(id)sender {`


    `NSDate *startTime = [NSDate date];`


    `__block NSString *fetchedData;`


    `__block NSString *processed;`


    `__block NSString *firstResult;`


    `__block NSString *secondResult;`


    `self.isWorking = YES;`


    `NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{`


    `fetchedData = [self fetchSomethingFromServer];`


    `[[NSOperationQueue mainQueue] addOperationWithBlock:^{`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Fetched: %@\n", fetchedData];`


    `}];`


    `}];`


    `NSBlockOperation *process = [NSBlockOperation blockOperationWithBlock:^{`


    `processed = [self processData:fetchedData];`


    `[[NSOperationQueue mainQueue] addOperationWithBlock:^{`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Processed: %@\n", processed];`


    `}];`


    `}];`


    `NSBlockOperation *calcFirst = [NSBlockOperation blockOperationWithBlock:^{`


    `firstResult = [self calculateFirstResult:processed];`


    `}];`


    `NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{`


    `secondResult = [self calculateSecondResult:processed];`


    `}];`


    `NSBlockOperation *showResults = [NSBlockOperation blockOperationWithBlock:^{`


    `[[NSOperationQueue mainQueue] addOperationWithBlock:^{`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"First Result: [%@]\nSecond Result: [%@]\n\n"`,


    `firstResult, secondResult];`


    `NSDate *endTime = [NSDate date];`


    `NSLog(@"Completed in %f seconds"`,


    `[endTime timeIntervalSinceDate:startTime]);`


    `self.isWorking = NO;`


    `}];`


    `}];`


    `[process addDependency:fetch];`


    `[calcFirst addDependency:process];`


    `[calcSecond addDependency:process];`


    `[showResults addDependency:calcFirst];`


    `[showResults addDependency:calcSecond];`


    `NSOperationQueue *queue = [[NSOperationQueue alloc] init];`


    `[queue addOperations:@[fetch, process, calcFirst, calcSecond, showResults]`


    `waitUntilFinished:NO];`


    `}`


    Now we should be able to run our app, and we’ll notice something perhaps a little
    different after pressing the Start button: the button immediately reverts back
    to its non-clicked state, and the menus still work. The first two operations put
    some text into the `NSTextView` as they finish. After about seven seconds (down
    from the ten seconds the first version used, since some of our work methods are
    running at the same time now), the final output appears in the text view. That’s
    all well and good, but we can easily make things even more responsive by using
    Cocoa Bindings and the `isWorking` property, which we created back at the start.
    Open up MainMenu.xib again, and use the Object Library to find a circular progress
    indicator. Then add it to our window as shown in Figure [17-2](#A978-1-4302-4543-8_17_Chapter.html#Fig2).


    ![A978-1-4302-4543-8_17_Fig2_HTML.jpg](A978-1-4302-4543-8_17_Fig2_HTML.jpg)


    Figure 17-2.


    Adding a progress indicator


    With the progress indicator selected, use the Attributes Inspector to make sure
    that its Display When Stopped checkbox is turned off. Then switch to the Bindings
    Inspector, expand the view for its Animate parameter, and bind it to the App Delegate
    after typing `isWorking` as the Model Key Path. Then select the Start button in
    the window, where we’ll make a similar configuration. Bind the button’s Enabled
    attribute to the app delegate with the `isWorking` key path, and this time add
    an `NSNegateBoolean` as a Value Transformer.


    Save the changes, and click Run; when we click the Start button, it becomes disabled,
    and the circular progress indicator appears and starts spinning. When the work
    is done, the progress indicator disappears, and the button goes back to normal.


    Now let’s take this just one step farther: add a horizontal progress indicator
    (a horizontal movement that tells us that things are happening, such as in a software
    installer). The progress view will go from 0 to 4, each work method upping the
    number a bit. Like the circular progress indicator, this will be configured entirely
    with Cocoa Bindings.


    Start off by adding a new property called `completed` to SWAppDelegate.h :


    `//  SWAppDelegate.h`


    `//  Insert this after the @interface line`


    `@property (assign) NSInteger completed;`


    Next, switch over to SWAppDelegate.m. Add the following near the top of the `doWork:`
    method to reset this counter as soon as the user hits the Start button:


    `self.completed = 0;`


    Each work method now needs to increment this variable when they’re done. We could
    add the following line to each work method:


    `self.completed = self.completed + 1;`


    However, this is where one of those sticky multi-threaded problems turns up. In
    this line of code, what really happens is that it first grabs the current value
    of the `completed` property by calling `[self completed]`, then adds one to it,
    and then stores the result back into the completed property by calling `[self
    setCompleted:]`. In a multi-threaded environment, this can lead to incorrect behavior.
    What if, for instance, two threads execute a line like this at about the same
    time? Suppose the starting value of `completed` is 2\. If both threads read the
    current value before either of them writes out their own result, each will add
    1 to their own copy of the value, then each of them will write their local sum
    (3) back into the completed property, which ends up containing the value 3 instead
    of the correct value, 4.


    A way around this is to use Objective-C’s `@synchronized` keyword, which lets
    us specify that a piece of code can only be run by one thread at a time. Enter
    the following method somewhere in the app delegate’s `@implementation` section:


    `- (void)incrementCompleted {`


    `@synchronized(self) {`


    `self.completed = self.completed + 1;`


    `}`


    `}`


    What we’re doing there is taking the same code we thought about earlier and wrapping
    it in a sort of a safe zone. The `@synchronized` keyword takes as its one argument
    an object that will be used to determine the scope of the synchronization limiting.
    Basically, any calls using the same value will each try to grab the same lock.
    If some other thread has already claimed it, the current thread has to wait until
    the other thread is done. In this case, because we’re using `self`, any calls
    made to this method on the same instance will all try to acquire the same lock.
    We only have one instance of our app delegate, so this is in practice a global
    lock, but for our purposes that’s okay.


    The coding we need to do in order for this to work is to just add this line to
    each of the work methods, just before the `return` in each of them:


    `[self incrementCompleted];`'
  trans: "\n最后，我们创建一个新的`NSOperationQueue`，并将包含所有操作的数组传递给它。该队列会检查这些操作之间的所有依赖关系，并确定如何以正确的顺序执行它们。\n\
    \n### 主线程需求\n\n然而，我们仍然没有完全准备好运行。请记住，`AppKit`类（例如所有窗口和视图类）通常不是线程安全的。对它们的所有访问都应在主线程上执行。但目前我们正在从几个操作中访问`NSTextView`。很可能，其中一些操作会在轮到它们时在其他线程上运行！尽管这在简单的测试应用中可能“有效”，但这不是一个真正安全的构建基础。我们需要调整每个操作，以确保所有对`NSTextView`的访问都发生在主线程上。\n\
    \n为此，我们将把每个这样的访问包装在另一个块中，该块将直接传递给一个始终在主线程上运行其操作的特殊队列。下面的粗体代码显示了我们需要对`doWork:`方法进行的最终修改：\n\
    \n```\n- (IBAction)doWork:(id)sender {\n\n    NSDate *startTime = [NSDate date];\n\
    \n    __block NSString *fetchedData;\n\n    __block NSString *processed;\n\n \
    \   __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\n\
    \    self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        fetchedData = [self fetchSomethingFromServer];\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"Fetched: %@\\n\", fetchedData];\n\
    \n        }];\n\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        processed = [self processData:fetchedData];\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"Processed: %@\\n\", processed];\n\
    \n        }];\n\n    }];\n\n    NSBlockOperation *calcFirst = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n\n        firstResult = [self calculateFirstResult:processed];\n\
    \n    }];\n\n    NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n\
    \n        secondResult = [self calculateSecondResult:processed];\n\n    }];\n\n\
    \    NSBlockOperation *showResults = [NSBlockOperation blockOperationWithBlock:^{\n\
    \n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\n         \
    \   _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                        @\"First Result: [%@]\\nSecond Result:\
    \ [%@]\\n\\n\",\n\n                                        firstResult, secondResult];\n\
    \n            NSDate *endTime = [NSDate date];\n\n            NSLog(@\"Completed\
    \ in %f seconds\",\n\n                  [endTime timeIntervalSinceDate:startTime]);\n\
    \n            self.isWorking = NO;\n\n        }];\n\n    }];\n\n    [process addDependency:fetch];\n\
    \n    [calcFirst addDependency:process];\n\n    [calcSecond addDependency:process];\n\
    \n    [showResults addDependency:calcFirst];\n\n    [showResults addDependency:calcSecond];\n\
    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
    \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n\n    \
    \      waitUntilFinished:NO];\n\n}\n```\n\n现在我们应该能够运行我们的应用了，点击开始按钮后，我们会注意到一些也许略有不同的现象：按钮立即恢复为非点击状态，菜单仍然可用。前两个操作在完成时将一些文本放入`NSTextView`中。大约七秒后（相比第一个版本使用的十秒有所减少，因为我们的一些工作方法现在正在同时运行），最终输出出现在文本视图中。这一切都很好，但我们还可以通过使用`Cocoa\
    \ Bindings`和我们一开始创建的`isWorking`属性来让事情变得更加响应。再次打开`MainMenu.xib`，使用对象库找到圆形进度指示器。然后将其添加到我们的窗口中，如图\
    \ 17-2 所示。\n\n![A978-1-4302-4543-8_17_Fig2_HTML.jpg](img/A978-1-4302-4543-8_17_Fig2_HTML.jpg)\n\
    \n图 17-2.\n\n添加进度指示器\n\n选中进度指示器后，使用属性检查器确保其“暂停时显示”复选框已关闭。然后切换到绑定检查器，展开其`Animate`参数的视图，并将其绑定到应用委托，将`isWorking`作为模型键路径。然后选择窗口中的开始按钮，进行类似的配置。将按钮的`Enabled`属性绑定到应用委托，键路径为`isWorking`，这次添加一个`NSNegateBoolean`作为值转换器。\n\
    \n保存更改，点击运行；当我们点击开始按钮时，它变为禁用状态，圆形进度指示器出现并开始旋转。当工作完成时，进度指示器消失，按钮恢复正常。\n\n现在让我们再进一步：添加一个水平进度指示器（一种水平移动，告诉我们事情正在发生，例如在软件安装程序中）。进度视图将从\
    \ 0 到 4，每个工作方法都会将数字增加一点。与圆形进度指示器一样，这将完全通过`Cocoa Bindings`配置。\n\n首先，在`SWAppDelegate.h`中添加一个名为`completed`的新属性：\n\
    \n```\n//  SWAppDelegate.h\n//  Insert this after the @interface line\n\n@property\
    \ (assign) NSInteger completed;\n```\n\n接下来，切换到`SWAppDelegate.m`。在`doWork:`方法的顶部附近添加以下内容，以便在用户点击开始按钮时重置此计数器：\n\
    \n```\nself.completed = 0;\n```\n\n现在，每个工作方法都需要在完成时递增此变量。我们可以在每个工作方法中添加以下行：\n\n\
    ```\nself.completed = self.completed + 1;\n```\n\n然而，这就是那些棘手的多线程问题出现的地方。在这行代码中，实际发生的是：它首先通过调用`[self\
    \ completed]`获取`completed`属性的当前值，然后加 1，然后通过调用`[self setCompleted:]`将结果存储回`completed`属性。在多线程环境中，这可能导致错误行为。例如，如果两个线程大约在同一时间执行这样一行代码会怎样？假设`completed`的起始值是\
    \ 2。如果两个线程在任何一个写出自己的结果之前读取了当前值，那么每个线程都会在自己的值副本上加 1，然后每个线程都会将它们的局部和（3）写回`completed`属性，最终该属性包含值\
    \ 3，而不是正确的值 4。\n\n解决这个问题的一种方法是使用`Objective-C`的`@synchronized`关键字，它允许我们指定一段代码一次只能由一个线程运行。在应用委托的`@implementation`部分中的某处输入以下方法：\n\
    \n```\n- (void)incrementCompleted {\n    @synchronized(self) {\n        self.completed\
    \ = self.completed + 1;\n    }\n}\n```\n\n我们在这里所做的是将之前想到的相同代码包裹在一种安全区域内。`@synchronized`关键字接受一个对象作为其参数，该对象将用于确定同步限制的范围。基本上，任何使用相同值的调用都会尝试获取相同的锁。如果其他线程已经占用了该锁，当前线程必须等待直到其他线程完成。在这种情况下，因为我们使用了`self`，对同一实例上的此方法的所有调用都将尝试获取相同的锁。我们只有一个应用委托实例，因此这实际上是一个全局锁，但对于我们的目的来说是可以的。\n\
    \n为了让其工作，我们需要进行的编码是：在每个工作方法的`return`之前添加以下一行：\n\n```\n[self incrementCompleted];\n\
    ```\n"
- fmt: "And finally, we need to configure the GUI. Go back to the `MainMenu.xib` file\
    \ in Interface Builder, and search the Library for a progress indicator. In addition\
    \ to the circular one we’ve already used, there’s a horizontal one labeled Indeterminate\
    \ Progress Indicator. Drag that to the window, and lay it out as shown in Figure\
    \ [17-3](#A978-1-4302-4543-8_17_Chapter.html#Fig3).\n\n![A978-1-4302-4543-8_17_Fig3_HTML.jpg](A978-1-4302-4543-8_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3.\n\nThe final GUI touch-up\n\nNow bring up the Attributes Inspector.\
    \ Click to turn off both the Display When Stopped and Indeterminate checkboxes,\
    \ then set its Minimum and Current values to 0 and its Maximum value to 4\\. Now\
    \ switch to the Bindings Inspector where we’ll configure two bindings. First,\
    \ bind its Animate attribute to the app delegate’s `isWorking` key, just like\
    \ we did for the circular progress indicator. Then, bind its Value attribute to\
    \ the app delegate’s `completed` key.\n\nSave the work, Run, and click the Start\
    \ button. Beside the circular progress indicator, a horizontal progress indicator\
    \ also appears, with a bar moving across as each of the work methods completes.\n\
    \nAnd there it is: relatively painless concurrency. Granted, this contrived example\
    \ isn’t much compared to a large application, but these concepts can scale up\
    \ to handle more complex situations as well. What we’ve shown works well in today’s\
    \ OS X and iOS applications, but Apple didn’t stop there. Starting with Snow Leopard,\
    \ most of the design of `NSOperation` and `NSOperationQueue` has been reimplemented\
    \ at a lower level in the OS, resulting in a nice piece of technology called Grand\
    \ Central Dispatch.\n\n## GCD: Low-Level Queuing\n\nThis idea of putting units\
    \ of work into queues that can be executed in the background, with the system\
    \ managing the threads for us, is really powerful and greatly simplifies many\
    \ development situations where concurrency is needed. It seems that once this\
    \ technology was up and running in the form of `NSOperationQueue` in Leopard,\
    \ Apple decided to make a more general solution that could work not only from\
    \ Objective-C, but also C and C++. Starting with Snow Leopard, this solution,\
    \ called Grand Central Dispatch (which we’ll call GCD from now on), is ready for\
    \ use. GCD puts most of the core concepts of `NSOperationQueue`—units of work,\
    \ painless background processing, automatic thread management—into a C interface\
    \ that can be used from all of the C-based languages. This means that it’s not\
    \ just for Cocoa programmers. Now even low-level command-line utilities written\
    \ in C can take advantage of these features. `NSOperationQueue` itself was rewritten\
    \ for Snow Leopard using GCD, and to top things off, Apple has made its implementation\
    \ of GCD open source so that it can be ported to other Unix-like operating systems\
    \ as well.\n\nThe main difference between the design of `NSOperationQueue` and\
    \ the queues in GCD is that while `NSOperationQueue` can deal with arbitrarily\
    \ complex dependency relationships between its `NSOperation`s to determine in\
    \ what order they should be executed, the GCD queues are strictly FIFO (first-in,\
    \ first-out). Units of work added to a GCD queue will always be started in the\
    \ order they were placed in the queue. That being said, they may not always finish\
    \ in the same order because a GCD queue will automatically distribute its work\
    \ among multiple threads.\n\nWith GCD, each queue has access to a pool of threads\
    \ that are reused throughout the lifetime of the application. GCD will always\
    \ try to maintain a pool of threads that is appropriate for the machine’s architecture,\
    \ automatically taking advantage of a more powerful machine by utilizing more\
    \ processor cores when it has work to do.\n\n### Improving SlowWorker a Second\
    \ Time\n\nTo see how this works, let’s take a look at the original form of SlowWorker’s\
    \ `doWork:` method. To get to it, open up the copy of the original SlowWorker\
    \ project directory we made earlier and use that for the rest of the changes we’re\
    \ going to show. Here’s the original method:\n\n```\n- (IBAction)doWork:(id)sender\
    \ {\n\n    NSDate *startTime = [NSDate date];\n\n    NSString *fetchedData;\n\n\
    \    NSString *processed;\n\n    NSString *firstResult;\n\n    NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \n    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                @\"Fetched: %@\\n\", fetchedData];\n\n    processed\
    \ = [self processData:fetchedData];\n\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n\n                                @\"Processed: %@\\\
    n\", processed];\n\n    firstResult = [self calculateFirstResult:processed];\n\
    \n    secondResult = [self calculateSecondResult:processed];\n\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n\n                    \
    \            @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n\n        \
    \                        firstResult, secondResult];\n\n    NSDate *endTime =\
    \ [NSDate date];\n\n    NSLog(@\"Completed in %f seconds\",\n\n          [endTime\
    \ timeIntervalSinceDate:startTime]);\n\n    self.isWorking = NO;\n\n}\n```\n\n\
    We can make this method run entirely in the background by wrapping all the code\
    \ in a block and passing it to a GCD function called `dispatch_async`. This function\
    \ takes two parameters: a GCD dispatch queue (conceptually similar to an `NSOperationQueue`)\
    \ and a block to assign to the queue. As with the other approach, we’ll give our\
    \ local variables the `__block` storage qualifier as well. Take a look:\n\n```\n\
    - (IBAction)doWork:(id)sender {\n\n    NSDate *startTime = [NSDate date];\n\n\
    \    __block NSString *fetchedData;\n\n    __block NSString *processed;\n\n  \
    \  __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\n \
    \   self.isWorking = YES;\n\n    dispatch_async(dispatch_get_global_queue(0, 0),\
    \ ^{\n\n        fetchedData = [self fetchSomethingFromServer];\n\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n\n                    \
    \                @\"Fetched: %@\\n\", fetchedData];\n\n        processed = [self\
    \ processData:fetchedData];\n\n        _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n\n                                    @\"Processed:\
    \ %@\\n\", processed];\n\n        firstResult = [self calculateFirstResult:processed];\n\
    \n        secondResult = [self calculateSecondResult:processed];\n\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n\n                    \
    \                @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n\n    \
    \                                firstResult, secondResult];\n\n        NSDate\
    \ *endTime = [NSDate date];\n\n        NSLog(@\"Completed in %f seconds\",\n\n\
    \              [endTime timeIntervalSinceDate:startTime]);\n\n        self.isWorking\
    \ = NO;\n\n    });\n\n}\n```\n\nThis approach starts off by grabbing a pre-existing\
    \ global queue that’s always available, using the `dispatch_get_global_queue()`\
    \ function (unlike `NSOperationQueue`, with GCD there’s always a global queue\
    \ available, ready to dispatch work to the background threads). That function\
    \ takes two arguments: the first lets us specify a priority, and the second is\
    \ currently unused and should always be 0\\. If we specify a different priority\
    \ in the first argument, such as `DISPATCH_QUEUE_PRIORITY_HIGH` or `DISPATCH_QUEUE_PRIORITY_LOW`\
    \ (passing a 0 is the same as passing `DISPATCH_QUEUE_PRIORITY_DEFAULT`), we will\
    \ actually get a different global queue, which the system will prioritize differently.\
    \ For now, we’ll stick with the default global queue.\n\nThe queue is then passed\
    \ to the `dispatch_async()` function, along with the block of code that comes\
    \ after. GCD then takes that entire block and passes it off to a background thread,\
    \ where it will be executed one step at a time, just like it when it was running\
    \ in the main thread."
  raw: 'And finally, we need to configure the GUI. Go back to the MainMenu.xib file
    in Interface Builder, and search the Library for a progress indicator. In addition
    to the circular one we’ve already used, there’s a horizontal one labeled Indeterminate
    Progress Indicator. Drag that to the window, and lay it out as shown in Figure
    [17-3](#A978-1-4302-4543-8_17_Chapter.html#Fig3).


    ![A978-1-4302-4543-8_17_Fig3_HTML.jpg](A978-1-4302-4543-8_17_Fig3_HTML.jpg)


    Figure 17-3.


    The final GUI touch-up


    Now bring up the Attributes Inspector. Click to turn off both the Display When
    Stopped and Indeterminate checkboxes, then set its Minimum and Current values
    to 0 and its Maximum value to 4\. Now switch to the Bindings Inspector where we’ll
    configure two bindings. First, bind its Animate attribute to the app delegate’s
    `isWorking` key, just like we did for the circular progress indicator. Then, bind
    its Value attribute to the app delegate’s `completed` key.


    Save the work, Run, and click the Start button. Beside the circular progress indicator,
    a horizontal progress indicator also appears, with a bar moving across as each
    of the work methods completes.


    And there it is: relatively painless concurrency. Granted, this contrived example
    isn’t much compared to a large application, but these concepts can scale up to
    handle more complex situations as well. What we’ve shown works well in today’s
    OS X and iOS applications, but Apple didn’t stop there. Starting with Snow Leopard,
    most of the design of `NSOperation` and `NSOperationQueue` has been reimplemented
    at a lower level in the OS, resulting in a nice piece of technology called Grand
    Central Dispatch.


    ## GCD: Low-Level Queuing


    This idea of putting units of work into queues that can be executed in the background,
    with the system managing the threads for us, is really powerful and greatly simplifies
    many development situations where concurrency is needed. It seems that once this
    technology was up and running in the form of `NSOperationQueue` in Leopard, Apple
    decided to make a more general solution that could work not only from Objective-C,
    but also C and C++. Starting with Snow Leopard, this solution, called Grand Central
    Dispatch (which we’ll call GCD from now on), is ready for use. GCD puts most of
    the core concepts of `NSOperationQueue`—units of work, painless background processing,
    automatic thread management—into a C interface that can be used from all of the
    C-based languages. This means that it’s not just for Cocoa programmers. Now even
    low-level command-line utilities written in C can take advantage of these features.
    `NSOperationQueue` itself was rewritten for Snow Leopard using GCD, and to top
    things off, Apple has made its implementation of GCD open source so that it can
    be ported to other Unix-like operating systems as well.


    The main difference between the design of `NSOperationQueue` and the queues in
    GCD is that while `NSOperationQueue` can deal with arbitrarily complex dependency
    relationships between its `NSOperation`s to determine in what order they should
    be executed, the GCD queues are strictly FIFO (first-in, first-out). Units of
    work added to a GCD queue will always be started in the order they were placed
    in the queue. That being said, they may not always finish in the same order because
    a GCD queue will automatically distribute its work among multiple threads.


    With GCD, each queue has access to a pool of threads that are reused throughout
    the lifetime of the application. GCD will always try to maintain a pool of threads
    that is appropriate for the machine’s architecture, automatically taking advantage
    of a more powerful machine by utilizing more processor cores when it has work
    to do.


    ### Improving SlowWorker a Second Time


    To see how this works, let’s take a look at the original form of SlowWorker’s
    `doWork:` method. To get to it, open up the copy of the original SlowWorker project
    directory we made earlier and use that for the rest of the changes we’re going
    to show. Here’s the original method:


    `- (IBAction)doWork:(id)sender {`


    `NSDate *startTime = [NSDate date];`


    `NSString *fetchedData;`


    `NSString *processed;`


    `NSString *firstResult;`


    `NSString *secondResult;`


    `self.isWorking = YES;`


    `fetchedData = [self fetchSomethingFromServer];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Fetched: %@\n", fetchedData];`


    `processed = [self processData:fetchedData];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Processed: %@\n", processed];`


    `firstResult = [self calculateFirstResult:processed];`


    `secondResult = [self calculateSecondResult:processed];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"First Result: [%@]\nSecond Result: [%@]\n\n"`,


    `firstResult, secondResult];`


    `NSDate *endTime = [NSDate date];`


    `NSLog(@"Completed in %f seconds"`,


    `[endTime timeIntervalSinceDate:startTime]);`


    `self.isWorking = NO;`


    `}`


    We can make this method run entirely in the background by wrapping all the code
    in a block and passing it to a GCD function called `dispatch_async`. This function
    takes two parameters: a GCD dispatch queue (conceptually similar to an `NSOperationQueue`)
    and a block to assign to the queue. As with the other approach, we’ll give our
    local variables the `__block` storage qualifier as well. Take a look:


    `- (IBAction)doWork:(id)sender {`


    `NSDate *startTime = [NSDate date];`


    `__block` `NSString *fetchedData;`


    `__block` `NSString *processed;`


    `__block` `NSString *firstResult;`


    `__block` `NSString *secondResult;`


    `self.isWorking = YES;`


    `dispatch_async(dispatch_get_global_queue(0, 0), ^{`


    `fetchedData = [self fetchSomethingFromServer];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Fetched: %@\n", fetchedData];`


    `processed = [self processData:fetchedData];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"Processed: %@\n", processed];`


    `firstResult = [self calculateFirstResult:processed];`


    `secondResult = [self calculateSecondResult:processed];`


    `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


    `@"First Result: [%@]\nSecond Result: [%@]\n\n"`,


    `firstResult, secondResult];`


    `NSDate *endTime = [NSDate date];`


    `NSLog(@"Completed in %f seconds"`,


    `[endTime timeIntervalSinceDate:startTime]);`


    `self.isWorking = NO;`


    `});`


    `}`


    This approach starts off by grabbing a pre-existing global queue that’s always
    available, using the `dispatch_get_global_queue()` function (unlike `NSOperationQueue`,
    with GCD there’s always a global queue available, ready to dispatch work to the
    background threads). That function takes two arguments: the first lets us specify
    a priority, and the second is currently unused and should always be 0\. If we
    specify a different priority in the first argument, such as `DISPATCH_QUEUE_PRIORITY_HIGH`
    or `DISPATCH_QUEUE_PRIORITY_LOW` (passing a 0 is the same as passing `DISPATCH_QUEUE_PRIORITY_DEFAULT`),
    we will actually get a different global queue, which the system will prioritize
    differently. For now, we’ll stick with the default global queue.


    The queue is then passed to the `dispatch_async()` function, along with the block
    of code that comes after. GCD then takes that entire block and passes it off to
    a background thread, where it will be executed one step at a time, just like it
    when it was running in the main thread.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n最后，我们需要配置 GUI。回到\
    \ Interface Builder 中的`MainMenu.xib`文件，在库中搜索进度指示器。除了我们已经使用过的圆形进度指示器之外，还有一个标有“不确定进度指示器”（Indeterminate\
    \ Progress Indicator）的水平进度指示器。将其拖拽到窗口中，并按图 17-3 所示进行布局。\n\n![A978-1-4302-4543-8_17_Fig3_HTML.jpg](img/A978-1-4302-4543-8_17_Fig3_HTML.jpg)\n\
    \n图 17-3.\n\n最终的 GUI 润色\n\n现在调出属性检查器。单击取消勾选“停止时显示”（Display When Stopped）和“不确定”（Indeterminate）两个复选框，然后将其“最小值”（Minimum）和“当前值”（Current）设置为\
    \ 0，将“最大值”（Maximum）设置为 4。现在切换到绑定检查器，我们将在此处配置两个绑定。首先，将其“动画”（Animate）属性绑定到应用程序委托的`isWorking`键，就像我们为圆形进度指示器所做的那样。然后，将其“值”（Value）属性绑定到应用程序委托的`completed`键。\n\
    \n保存工作，运行，并单击“开始”（Start）按钮。在圆形进度指示器旁边，会出现一个水平进度指示器，随着每个工作方法的完成，会有一条条在移动。\n\n就是这样：相对无痛的并发处理。诚然，这个精心设计的例子与大型应用程序相比不算什么，但这些概念可以扩展以处理更复杂的情况。我们所展示的内容在今天\
    \ OS X 和 iOS 应用程序中运行良好，但苹果并没有止步于此。从 Snow Leopard 开始，`NSOperation` 和 `NSOperationQueue`\
    \ 的大部分设计已经在操作系统底层被重新实现，从而诞生了一项名为 Grand Central Dispatch 的出色技术。\n\n## GCD：底层队列\n\
    \n这种将工作单元放入队列中，在后台执行，并由系统为我们管理线程的想法非常强大，并且极大地简化了许多需要并发的开发场景。似乎一旦这项技术以 `NSOperationQueue`\
    \ 的形式在 Leopard 中启动并运行，苹果就决定制作一个更通用的解决方案，使其不仅可以从 Objective-C 中使用，还可以从 C 和 C++ 中使用。从\
    \ Snow Leopard 开始，这个名为 Grand Central Dispatch（从现在开始我们称之为 GCD）的解决方案就可以使用了。GCD 将\
    \ `NSOperationQueue` 的大部分核心概念——工作单元、无痛的后台处理、自动线程管理——放入了一个可以从所有基于 C 的语言中使用的 C 接口中。这意味着它不仅适用于\
    \ Cocoa 程序员。现在，即使是使用 C 编写的底层命令行工具也可以利用这些特性。`NSOperationQueue` 本身也是使用 GCD 为 Snow\
    \ Leopard 重写的，更棒的是，苹果将其 GCD 的实现开源，以便它也可以移植到其他类 Unix 操作系统上。\n\n`NSOperationQueue`\
    \ 和 GCD 中队列在设计上的主要区别在于，`NSOperationQueue` 可以处理其 `NSOperation` 之间任意复杂的依赖关系，以确定它们的执行顺序，而\
    \ GCD 队列则是严格的 FIFO（先进先出）。添加到 GCD 队列中的工作单元将始终按照它们被放入队列的顺序启动。话虽如此，它们可能不会总是以相同的顺序完成，因为\
    \ GCD 队列会自动将其工作分配给多个线程。\n\n使用 GCD，每个队列都可以访问一个线程池，这些线程在应用程序的整个生命周期中被重复使用。GCD 将始终尝试维护一个适合机器架构的线程池，在有工作要做时自动利用更强大的机器，使用更多的处理器核心。\n\
    \n### 再次改进 SlowWorker\n\n为了了解其工作原理，让我们看一下 SlowWorker 的 `doWork:` 方法的原始形式。为此，请打开我们之前制作的原始\
    \ SlowWorker 项目目录的副本，并将其用于我们接下来要展示的其余更改。这是原始方法：\n\n```\n- (IBAction)doWork:(id)sender\
    \ {\n\n    NSDate *startTime = [NSDate date];\n\n    NSString *fetchedData;\n\n\
    \    NSString *processed;\n\n    NSString *firstResult;\n\n    NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \n    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                @\"Fetched: %@\\n\", fetchedData];\n\n    processed\
    \ = [self processData:fetchedData];\n\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n\n                                @\"Processed: %@\\\
    n\", processed];\n\n    firstResult = [self calculateFirstResult:processed];\n\
    \n    secondResult = [self calculateSecondResult:processed];\n\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n\n                    \
    \            @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n\n        \
    \                        firstResult, secondResult];\n\n    NSDate *endTime =\
    \ [NSDate date];\n\n    NSLog(@\"Completed in %f seconds\",\n\n          [endTime\
    \ timeIntervalSinceDate:startTime]);\n\n    self.isWorking = NO;\n\n}\n```\n\n\
    我们可以通过将所有代码包装在一个块中并将其传递给一个名为 `dispatch_async` 的 GCD 函数，来使此方法完全在后台运行。此函数接受两个参数：一个\
    \ GCD 调度队列（概念上类似于 `NSOperationQueue`）和一个要分配给该队列的块。与另一种方法一样，我们也将为局部变量添加 `__block`\
    \ 存储限定符。请看：\n\n```\n- (IBAction)doWork:(id)sender {\n\n    NSDate *startTime =\
    \ [NSDate date];\n\n    __block NSString *fetchedData;\n\n    __block NSString\
    \ *processed;\n\n    __block NSString *firstResult;\n\n    __block NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n\n        fetchedData = [self fetchSomethingFromServer];\n\n       \
    \ _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                    @\"Fetched: %@\\n\", fetchedData];\n\n \
    \       processed = [self processData:fetchedData];\n\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n\n                    \
    \                @\"Processed: %@\\n\", processed];\n\n        firstResult = [self\
    \ calculateFirstResult:processed];\n\n        secondResult = [self calculateSecondResult:processed];\n\
    \n        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \n                                    @\"First Result: [%@]\\nSecond Result: [%@]\\\
    n\\n\",\n\n                                    firstResult, secondResult];\n\n\
    \        NSDate *endTime = [NSDate date];\n\n        NSLog(@\"Completed in %f\
    \ seconds\",\n\n              [endTime timeIntervalSinceDate:startTime]);\n\n\
    \        self.isWorking = NO;\n\n    });\n\n}\n```\n\n这种方法首先通过使用 `dispatch_get_global_queue()`\
    \ 函数获取一个始终可用的预先存在的全局队列（与 `NSOperationQueue` 不同，使用 GCD 时，始终有一个可用的全局队列，可以随时将工作分派到后台线程）。该函数接受两个参数：第一个参数允许我们指定优先级，第二个参数当前未使用，应始终为\
    \ 0。如果在第一个参数中指定了不同的优先级，例如 `DISPATCH_QUEUE_PRIORITY_HIGH` 或 `DISPATCH_QUEUE_PRIORITY_LOW`（传递\
    \ 0 等同于传递 `DISPATCH_QUEUE_PRIORITY_DEFAULT`），我们实际上会获得一个不同的全局队列，系统会为其分配不同的优先级。现在，我们将坚持使用默认的全局队列。\n\
    \n然后，该队列与后面的代码块一起传递给 `dispatch_async()` 函数。接着，GCD 会获取整个块并将其交给一个后台线程，在那里它将一步一步地执行，就像它在主线程中运行时一样。\n"
- fmt: "### Don’t Forget That Main Thread\n\nThere’s one problem here: AppKit thread\
    \ safety. Remember, messaging any GUI object, including our `resultsTextView`,\
    \ from a background thread is a no-no. Fortunately, GCD provides us with a way\
    \ to deal with this, too. Inside the block, we can call another dispatching function,\
    \ passing work back to the main thread! We do this by once again calling `dispatch_async()`,\
    \ this time passing in the queue returned by the `dispatch_get_main_queue()` function,\
    \ which always gives us the special queue that lives on the main thread, ready\
    \ to execute blocks that require the use of the main thread. Adding the bold lines\
    \ shown here will make all of the AppKit calls happen on the main thread:\n\n\
    ```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
    \    __block NSString *fetchedData;\n    __block NSString *processed;\n    __block\
    \ NSString *firstResult;\n    __block NSString *secondResult;\n    self.isWorking\
    \ = YES;\n    dispatch_async(dispatch_get_global_queue(0, 0), ^{\n        fetchedData\
    \ = [self fetchSomethingFromServer];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"Fetched: %@\\n\", fetchedData];\n \
    \       });\n        processed = [self processData:fetchedData];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"Processed: %@\\n\", processed];\n \
    \       });\n        firstResult = [self calculateFirstResult:processed];\n  \
    \      secondResult = [self calculateSecondResult:processed];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"First Result: [%@]\\nSecond Result:\
    \ [%@]\\n\\n\",\n                                       firstResult, secondResult];\n\
    \        });\n        NSDate *endTime = [NSDate date];\n        NSLog(@\"Completed\
    \ in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
    \        self.isWorking = NO;\n    });\n}\n```\n\n### Concurrent Blocks in GCD\n\
    \nWe still have one more change to make in order for this program to behave the\
    \ same and run at least as fast as our previous version that used `NSOperationQueue`.\
    \ Remember that when we set up operations in the queue, we allowed `calculateFirstResult`\
    \ and `calculateSecondResult` to run at the same time through the use of dependencies?\
    \ We declared that each of them was dependent on the preceding call to `processData`,\
    \ and that in turn the following call to `finishWorking` was dependent on both\
    \ of them. That left it up to the operation queue to run both of those at the\
    \ same time, if possible. In what we currently have in our GCD version, that’s\
    \ not the case. The code runs straight through just as shown, always calling `calculateSecondResult:`\
    \ only after `calculateFirstResult:` has completed.\n\nFortunately, once again\
    \ GCD has a way to accomplish the same thing by using what’s called a dispatch\
    \ group. All blocks that are dispatched asynchronously within the context of a\
    \ group are set loose to execute as fast as they can, including being distributed\
    \ to multiple threads for concurrent execution if possible. We can also use `dispatch_group_notify()`\
    \ to specify an additional block that will be executed when all the blocks in\
    \ the group have been run. Here’s what it looks like:\n\n```\n- (IBAction)doWork:(id)sender\
    \ {\n  NSDate *startTime = [NSDate date];\n  dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString\
    \ *processed = [self processData:fetchedData];\n    __block NSString *firstResult;\n\
    \    __block NSString *secondResult;\n    dispatch_group_t group = dispatch_group_create();\n\
    \    dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{\n      firstResult\
    \ = [self calculateFirstResult:processed];\n    });\n    dispatch_group_async(group,\
    \ dispatch_get_global_queue(0, 0), ^{\n      secondResult = [self calculateSecondResult:processed];\n\
    \    });\n    dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{\n\
    \      NSString *resultsSummary = [NSString stringWithFormat:\n        @\"First:\
    \ [%@]\\nSecond: [%@]\", firstResult, secondResult];\n      dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n        [_resultsTextView setString:resultsSummary];\n      });\n      NSDate\
    \ *endTime = [NSDate date];\n      NSLog(@\"Completed in %f seconds\",\n     \
    \   [endTime timeIntervalSinceDate:startTime]);\n    });\n  });\n}\n```\n\nWith\
    \ all that in place, we should be able to Run our app and see the same behavior\
    \ and performance that we saw after the first set of improvements, but not the\
    \ additional changes we made where we used Cocoa Bindings to improve the GUI’s\
    \ behavior while the work is being performed. Applying the changes to the GCD-enhanced\
    \ version of SlowWorker is left as an exercise for the reader.\n\n## A Little\
    \ Concurrency Goes a Long Way\n\nWe’ve now seen some concrete examples of how\
    \ to provide basic concurrency in our applications using both `NSOperationQueue`\
    \ and GCD. Our simple example project doesn’t do anything interesting, but these\
    \ techniques can be applied to any situation where we have lengthy activities\
    \ going on and don’t want to expose our users to the spinning busy cursor. We’ve\
    \ also learned a bit about the new block syntax and how it can be used to create\
    \ work units ready for running in background threads.\n\nUsing these technologies\
    \ can have a huge impact on the user experience for your application, and you\
    \ should really use them any time your users are waiting around for your application\
    \ to do something! It’s up to you to decide whether to use `NSOperationQueue`\
    \ or GCD. Remember that in every release of OS X since 10.6, `NSOperationQueue`\
    \ has been implemented using GCD, so your app will have similar performance characteristics\
    \ either way. It’s up to you to decide which way you want to go."
  raw: '#### Don’t Forget That Main Thread


    There’s one problem here: AppKit thread safety. Remember, messaging any GUI object,
    including our `resultsTextView`, from a background thread is a no-no. Fortunately,
    GCD provides us with a way to deal with this, too. Inside the block, we can call
    another dispatching function, passing work back to the main thread! We do this
    by once again calling `dispatch_async()`, this time passing in the queue returned
    by the `dispatch_get_main_queue()` function, which always gives us the special
    queue that lives on the main thread, ready to execute blocks that require the
    use of the main thread. Adding the bold lines shown here will make all of the
    AppKit calls happen on the main thread:


    `- (IBAction)doWork:(id)sender {`


        `NSDate *startTime = [NSDate date];`


        `__block NSString *fetchedData;`


        `__block NSString *processed;`


        `__block NSString *firstResult;`


        `__block NSString *secondResult;`


        `self.isWorking = YES;`


        `dispatch_async(dispatch_get_global_queue(0, 0), ^{`


            `fetchedData = [self fetchSomethingFromServer];`


            `dispatch_async(dispatch_get_main_queue(), ^{`


                `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


                                           `@"Fetched: %@\n", fetchedData];`


            `});`


            `processed = [self processData:fetchedData];`


            `dispatch_async(dispatch_get_main_queue(), ^{`


                `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


                                           `@"Processed: %@\n", processed];`


            `});`


            `firstResult = [self calculateFirstResult:processed];`


            `secondResult = [self calculateSecondResult:processed];`


            `dispatch_async(dispatch_get_main_queue(), ^{`


                `_resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:`


                                           `@"First Result: [%@]\nSecond Result: [%@]\n\n"`,


                                           `firstResult, secondResult];`


            `});`


            `NSDate *endTime = [NSDate date];`


            `NSLog(@"Completed in %f seconds"`,


                  `[endTime timeIntervalSinceDate:startTime]);`


            `self.isWorking = NO;`


        `});`


    `}`


    #### Concurrent Blocks in GCD


    We still have one more change to make in order for this program to behave the
    same and run at least as fast as our previous version that used `NSOperationQueue`.
    Remember that when we set up operations in the queue, we allowed `calculateFirstResult`
    and `calculateSecondResult` to run at the same time through the use of dependencies?
    We declared that each of them was dependent on the preceding call to `processData`,
    and that in turn the following call to `finishWorking` was dependent on both of
    them. That left it up to the operation queue to run both of those at the same
    time, if possible. In what we currently have in our GCD version, that’s not the
    case. The code runs straight through just as shown, always calling `calculateSecondResult:`
    only after `calculateFirstResult:` has completed.


    Fortunately, once again GCD has a way to accomplish the same thing by using what’s
    called a dispatch group. All blocks that are dispatched asynchronously within
    the context of a group are set loose to execute as fast as they can, including
    being distributed to multiple threads for concurrent execution if possible. We
    can also use `dispatch_group_notify()` to specify an additional block that will
    be executed when all the blocks in the group have been run. Here’s what it looks
    like:


    `- (IBAction)doWork:(id)sender {`


      `NSDate *startTime = [NSDate date];`


      `dispatch_async(dispatch_get_global_queue(0, 0), ^{`


        `NSString *fetchedData = [self fetchSomethingFromServer];`


        `NSString *processed = [self processData:fetchedData];`


        `__block NSString *firstResult;`


        `__block NSString *secondResult;`


        `dispatch_group_t group = dispatch_group_create();`


        `dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{`


          `firstResult = [self calculateFirstResult:processed];`


        `});`


        `dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{`


          `secondResult = [self calculateSecondResult:processed];`


        `});`


        `dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{`


          `NSString *resultsSummary = [NSString stringWithFormat:`


            `@"First: [%@]\nSecond: [%@]", firstResult, secondResult];`


          `dispatch_async(dispatch_get_main_queue(), ^{`


            `[_resultsTextView setString:resultsSummary];`


          `});`


          `NSDate *endTime = [NSDate date];`


          `NSLog(@"Completed in %f seconds"`,


            `[endTime timeIntervalSinceDate:startTime]);`


        `});`


      `});`


    `}`


    With all that in place, we should be able to Run our app and see the same behavior
    and performance that we saw after the first set of improvements, but not the additional
    changes we made where we used Cocoa Bindings to improve the GUI’s behavior while
    the work is being performed. Applying the changes to the GCD-enhanced version
    of SlowWorker is left as an exercise for the reader.


    ## A Little Concurrency Goes a Long Way


    We’ve now seen some concrete examples of how to provide basic concurrency in our
    applications using both `NSOperationQueue` and GCD. Our simple example project
    doesn’t do anything interesting, but these techniques can be applied to any situation
    where we have lengthy activities going on and don’t want to expose our users to
    the spinning busy cursor. We’ve also learned a bit about the new block syntax
    and how it can be used to create work units ready for running in background threads.


    Using these technologies can have a huge impact on the user experience for your
    application, and you should really use them any time your users are waiting around
    for your application to do something! It’s up to you to decide whether to use
    `NSOperationQueue` or GCD. Remember that in every release of OS X since 10.6,
    `NSOperationQueue` has been implemented using GCD, so your app will have similar
    performance characteristics either way. It’s up to you to decide which way you
    want to go.'
  trans: "\n### 别忘记主线程\n\n这里存在一个问题：AppKit 的线程安全性。请记住，在后台线程中向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息是绝对不允许的。幸运的是，GCD\
    \ 也为我们提供了处理此问题的方法。在代码块内部，我们可以调用另一个调度函数，将工作传递回主线程！我们通过再次调用 `dispatch_async()` 来实现这一点，这次传入的是由\
    \ `dispatch_get_main_queue()` 函数返回的队列，该函数始终会返回驻留在主线程上的特殊队列，该队列随时准备执行需要使用主线程的代码块。添加以下粗体显示的代码行后，所有\
    \ AppKit 调用都将在主线程上执行：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
    \ = [NSDate date];\n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
    \    __block NSString *firstResult;\n    __block NSString *secondResult;\n   \
    \ self.isWorking = YES;\n    dispatch_async(dispatch_get_global_queue(0, 0), ^{\n\
    \        fetchedData = [self fetchSomethingFromServer];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"获取: %@\\n\", fetchedData];\n      \
    \  });\n        processed = [self processData:fetchedData];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"处理: %@\\n\", processed];\n        });\n\
    \        firstResult = [self calculateFirstResult:processed];\n        secondResult\
    \ = [self calculateSecondResult:processed];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"结果一: [%@]\\n 结果二: [%@]\\n\\n\",\n \
