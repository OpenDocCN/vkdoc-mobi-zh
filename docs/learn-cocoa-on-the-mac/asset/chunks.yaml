    ### 键值观察


    下一个关键概念是键值观察（KVO）。通过 KVO，一个对象可以向另一个对象注册，以便在发生变化时得到通知。例如，延续上一个示例，我们可以让 `myPerson`
    在其 `firstName` 属性值发生变化时通知我们，具体操作如下：


    ```

    [myPerson addObserver:self forKeyPath:@"firstName" options:nil context:NULL];

    ```


    作为回应，每当 `firstName` 属性发生变化时——无论这种变化是通过 `setValue:forKey:` 方法，还是通过某人调用 `setFirstName:`
    方法触发的——`myPerson` 都会在观察者中调用一个名为 `observeValueForKeyPath:ofObject:change:context:`
    的方法。这种实现方式非常巧妙，涉及 Cocoa 内部的一些元编程：在运行时创建一个 `Person` 的子类，重写 `setFirstName:` 方法，并在值变化后向所有观察者传递消息。整个过程如此流畅，以至于我们几乎不会察觉隐藏的
    `Person` 子类的存在，除非我们刻意去寻找——并且在正确的位置深入挖掘。因此，我们其实并不需要了解这些实现细节。只需庆幸，我们是在这项技术已经相当成熟的时期进入
    Cocoa 编程世界的，因为它最初问世时还有些粗糙！


    最终，我们可能完全不需要直接处理 KVO。几乎所有我们想通过 KVO 实现的功能，都可以通过构建在它之上的 Cocoa 绑定更简洁、更轻松地完成，Cocoa
    绑定提供了更高层次的接口。这就是我们专注于 Cocoa 绑定的功能，而不进行任何直接 KVO 编程的原因。


    ### Cocoa 绑定：工作原理


    虽然对 Cocoa 绑定的实现进行全面而准确的描述超出了本书的范围，但更全面地了解它如何利用 KVC 和 KVO 来工作，可能会有所帮助。现在我们已经对 KVC
    和 KVO 有了简要了解，让我们来看看这些组件是如何协同工作的。


    当我们在 Interface Builder 中建立绑定时（就像我们在本章中已经多次做过的那样），我们实际上是在定义一种契约。我们声明：当这个 nib 文件被加载并且这些对象被设置好后，一系列事件将会发生，以便在对象之间建立一些
    KVO 关系。这些关系通过使用键路径字符串（利用 KVC）来定义每个绑定关注的属性，以及其他信息来标识“接收端”（通常是一个 GUI 控件）的哪个方面（例如显示的值、启用状态等）应受底层值变化的影响。在运行时，Cocoa
    会进行设置，使得控件（或我们已建立绑定的任何其他对象）能够根据相关键来观察控制器中的变化，同时控制器也会观察控件所选方面的变化。


    ## 总结


    绑定是一项非常强大的技术。回顾一下，你可能会发现，使用 Cocoa 绑定几乎可以实现前面几章展示的所有功能，从而创建一个几乎不需要任何自定义代码的应用程序！然而，这并不会削弱前几章所展示技术的实用性。事实上，有时你确实希望手动通过目标-动作调用的方法来访问
    GUI 中的值。一个通用的经验法则是：如果你处于一种情况（一个简单的应用或一个大型应用的子组件），没有明显的模型对象可供操作，那么使用“传统方式”，即通过插座变量和目标/动作连接来处理，可能是最佳选择。但总的来说，从现在开始，Cocoa
    绑定是开发 Mac 应用的推荐方法。


    接下来的几章将演示如何使用 Core Data 进一步发挥绑定的作用。Core Data 的功能与 Cocoa 绑定是正交的：Cocoa 绑定让你省去了一些乏味的控制器代码，而
    Core Data 则处理了许多你原本需要为模型类编写的底层基础设施，为你提供了存储后端、内置的撤销/重做支持以及更多功能。Cocoa 绑定和 Core Data
    结合使用，能让你如此高效地构建大量软件，以至于会让其他人目瞪口呆！


    # 8. Core Data 基础


    **摘要**


    在前面的章节中，我们向你展示了 Cocoa 提供的各种在视图对象中显示数据的方式，从根据模型对象的内容手动获取和设置值，到使用 Cocoa 绑定让数据在模型和视图对象之间自动同步，从而省去了大量乏味的控制器代码。现在是时候了解
    Core Data 了，这是一个强大的框架，为我们的模型对象提供了一套完整的内置功能。我们将首先讨论 Core Data 是什么，以及它如何与 Cocoa
    的其他部分协同工作。


    在前面的章节中，我们向你展示了 Cocoa 提供的各种在视图对象中显示数据的方式，从根据模型对象的内容手动获取和设置值，到使用 Cocoa 绑定让数据在模型和视图对象之间自动同步，从而省去了大量乏味的控制器代码。现在是时候了解
    Core Data 了，这是一个强大的框架，为我们的模型对象提供了一套完整的内置功能。我们将首先讨论 Core Data 是什么，以及它如何与 Cocoa
    的其他部分协同工作。然后，我们将使用 Core Data 创建一个名为 MythBase 的全功能数据库应用程序，包括一个允许我们创建、搜索、编辑和删除条目的
    GUI，所有这一切都无需编写一行代码（参见图 8-1，MythBase 的实际运行截图）。接着，我们将探索在创建 Core Data 项目时自动生成的一些代码资源，最后演示如何向模型对象添加功能（即“业务逻辑”）。

