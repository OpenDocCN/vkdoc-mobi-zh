    我们首先定义`encodingNames`方法。这个方法将向 GUI 中的弹出按钮提供所有系统定义的编码名称列表，同时还将作为内部查找机制，用于在编码名称及其代码级表示（`NSStringEncoding`类型）之间进行映射。对于键，该字典使用每个编码的数值，并将其包装在`NSString`中。你可能会认为，鉴于这些值的数值性质，将它们包装在`NSNumber`对象中会更有意义，你是对的，但有一个小小的例外：如果你在键值观察（KVO）上下文中使用`NSDictionary`，例如
    Cocoa Bindings，则必须使用字符串作为键！因为我们正通过 Cocoa Bindings 使用这个字典来填充对象，所以这就是我们这样做的原因。


    ```

    - (NSDictionary *)encodingNames


    {


    static NSDictionary *encodingNames = nil;


    if (!encodingNames) {


    encodingNames = @{@"1" : @"NSASCIIStringEncoding",


    @"2" : @"NSNEXTSTEPStringEncoding",


    @"3" : @"NSJapaneseEUCStringEncoding",


    @"4" : @"NSUTF8StringEncoding",


    @"5" : @"NSISOLatin1StringEncoding",


    @"6" : @"NSSymbolStringEncoding",


    @"7" : @"NSNonLossyASCIIStringEncoding",


    @"8" : @"NSShiftJISStringEncoding",


    @"9" : @"NSISOLatin2StringEncoding",


    @"10" : @"NSUnicodeStringEncoding",


    @"11" : @"NSWindowsCP1251StringEncoding",


    @"12" : @"NSWindowsCP1252StringEncoding",


    @"13" : @"NSWindowsCP1253StringEncoding",


    @"14" : @"NSWindowsCP1254StringEncoding",


    @"15" : @"NSWindowsCP1250StringEncoding",


    @"21" : @"NSISO2022JPStringEncoding",


    @"30" : @"NSMacOSRomanStringEncoding",


    @"2415919360" : @"NSUTF16BigEndianStringEncoding",


    @"2483028224" : @"NSUTF16LittleEndianStringEncoding",


    @"2348810496" : @"NSUTF32StringEncoding",


    @"2550137088" : @"NSUTF32BigEndianStringEncoding",


    @"2617245952" : @"NSUTF32LittleEndianStringEncoding"};


    }


    return encodingNames;


    }

    ```


    继续我们在字符串编码方面的工作，我们现在将定义`stringEncodingName`的存取器，这次在混合中增加了一个设置器（因为这个值可以通过弹出按钮设置）。和之前一样，我们实现了`keyPathsForValuesAffectingStringEncodingName`，这次将`chosenEncoding`添加为要监视的键之一。


    `stringEncodingName`方法有两个主要执行路径。如果`chosenEncoding`已被设置（即用户从弹出列表中选择了编码的情况），我们只需在我们之前定义的字典中查找所选编码的名称。否则，我们实际上使用`stringWithContentsOfFile:usedEncoding:error:`来读取文件内容，并使用得到的编码来查找所发现编码的名称（如果未发现任何编码，则返回一个简短的问题描述）。


    `setStringEncodingName:`方法非常简单。我们在字典中进行反向查找，以找到与所选编码对应的键（一个包含编码整数值的字符串）。当用户在弹出窗口中选择一个编码名称时，将调用此方法。


    ```

    + (NSSet *)keyPathsForValuesAffectingStringEncodingName


    {


    return [NSSet setWithObjects:@"fileURL", @"fileWrapper",


    @"chosenEncoding", nil];


    }


    - (NSString *)stringEncodingName


    {


    if (!self.fileURL) return nil;


    if (self.chosenEncoding != 0) {


    return [[self encodingNames] objectForKey:


    @(self.chosenEncoding).stringValue];


    } else {


    NSStringEncoding encoding = 0;


    NSError *err = nil;


    [NSString stringWithContentsOfFile:self.fileURL.path


    usedEncoding:&encoding error:&err];


    if (encoding==0) {


    return @"未检测到编码，可能是一个二进制文件？";


    }


    return [[self encodingNames] objectForKey:


    @(self.chosenEncoding).stringValue];


    }


    }


    - (void)setStringEncodingName:(NSString *)name


    {


    NSString *key = [[[self encodingNames] allKeysForObject:name]


    lastObject];


    self.chosenEncoding = [key longLongValue];


    }

    ```


    最后是`fileStringValue`及其匹配的`keyPathsForValuesAffectingFileStringValue`方法。这里我们也有两个主要的代码路径。在第一种情况下，当`chosenEncoding`已被设置时，我们尝试使用所选编码从所选文件中读取一个字符串值。在另一种情况下，当未选择编码时，我们尝试读取一个字符串值，但让系统尝试找出使用哪种编码。无论哪种情况，我们都会做一些错误检查，并在遇到特定字符串编码错误时显示一个警告面板。


    ```

    + (NSSet *)keyPathsForValuesAffectingFileStringValue


    {


    return [NSSet setWithObjects:@"fileURL", @"fileWrapper",


    @"chosenEncoding", nil];


    }


    - (NSString *)fileStringValue


    {


    if (!self.fileURL) return nil;


    NSError *err = nil;


    NSString *value = nil;


    if (self.chosenEncoding != 0) {


    value = [NSString stringWithContentsOfFile:self.fileURL.path


    encoding:self.chosenEncoding error:&err];


    } else {


    NSStringEncoding encoding = 0;


    value = [NSString stringWithContentsOfFile:self.fileURL.path


    usedEncoding:&encoding error:&err];


    }


    if (err)  {


    if ([err code]==NSFileReadInapplicableStringEncodingError &&


    [[err domain] isEqual:NSCocoaErrorDomain]) {


    NSRunAlertPanel(@"无效的字符串编码",


    [err localizedDescription], nil, nil, nil);


    }


    NSLog(@"遇到错误: %@", err);


    }


    return value;


    }

    ```'
- fmt: '### What About That File: The GUI


    That’s all, as far as the code is concerned. Now let’s set up the GUI. Open up
    `MainMenu.xib`, where we’ll want to start off by making a connection so that a
    menu item can call our app delegate’s `chooseFile:` method. Open the menu inside
    the main nib editing area, go into the File menu, and Ctrl-drag a connection from
    the Open item to the icon representing the app delegate in the main nib window.
    Then select `chooseFile:` from the small menu that appears.


    Now it’s time to get started on the window itself, so double-click its icon in
    the dock to make it appear in the editing area. This GUI is completely powered
    by Cocoa Bindings. Our controller doesn’t have any outlets pointing at anything
    in this window, and nothing in this window calls any action methods in our controller.
    We’ll go through all the bindings piece by piece, but first, Figure 16-2 shows
    a view of the complete window, as seen in Interface Builder, with all objects
    selected.


    ![A978-1-4302-4543-8_16_Fig2_HTML.jpg](A978-1-4302-4543-8_16_Fig2_HTML.jpg)


    **Figure 16-2.** All our window components, highlighted for visibility


    Note that between the table view and the large text view there’s a small “dimple.”
    This is actually the draggable control of an `NSSplitView`, which lets us stack
    two views vertically or horizontally and resize both of them at once with a single
    drag. It’s often used in Xcode and elsewhere, and later we’ll see how to set it
    up here.


    For now, let’s start off creating this window one section at a time, hooking up
    all the bindings as we go. The first few objects should end up looking like Figure
    16-3, so peek ahead to get some guidance. Near the top of the window, put a couple
    of labels, and change the title of the one on the left to “Selected File:”. Then
    place an `NSImageView` between them. To find this class, search the Library for
    “`NSImageView`”, “image well,” or “image view.” Make the label on the left appear
    in bold text by selecting it and selecting Edit ➤ Format ➤ Font ➤ Bold from the
    menu, and stretch out the label on the right so that it extends almost to the
    right edge of the window. We want the file icon displayed by the image view to
    appear to float right over the window background, so select the image view and
    use the Attributes Inspector to remove its border by selecting None from the Border
    pop-up. Also, change the Scaling pop-up to Proportionally Up or Down as well,
    so that whether the system gives us a tiny icon or a huge one, it will be scaled
    to fit the available space. The GUI should look like Figure 16-3 at this point.


    ![A978-1-4302-4543-8_16_Fig3_HTML.jpg](A978-1-4302-4543-8_16_Fig3_HTML.jpg)


    **Figure 16-3.** GUI for displaying the selected file’s icon and path. The image
    view is selected for this screenshot; otherwise it would be invisible


    Now it’s time to set up the bindings for the image view and the right-hand label.
    Select the image view, open the Bindings Inspector, and bind its Value to the
    app delegate using the `self.fileIcon` key path. Then select the label on the
    right, and bind its Value to the app delegate using the `self.filename` key path.


    The next portion of the window looks just like what we created previously. In
    fact, the quickest way to add these objects is to select the three shown above
    by dragging a box over them, pressing ⌘D to duplicate the selected object, and
    then dragging the new ones down, lining them up below the others. Change the title
    of the new left-side label to “Opens Application:” and adjust its position if
    necessary. Figure 16-4 shows what this looks like.


    ![A978-1-4302-4543-8_16_Fig4_HTML.jpg](A978-1-4302-4543-8_16_Fig4_HTML.jpg)


    **Figure 16-4.** This portion of the GUI will let us see with which app the file
    will launch. Here both image views are shown because otherwise, just like before,
    they’d be invisible


    Reconfigure the new image view’s binding, connecting its Value to the app delegate
    with the `self.opensAppIcon` key path, and then the right-side label’s Value to
    the app delegate using the `self.opensAppName` key path.


    Next, let’s move on to the table view. Drag one out from the Library, and widen
    it to match Figure 16-5.


    ![A978-1-4302-4543-8_16_Fig5_HTML.jpg](A978-1-4302-4543-8_16_Fig5_HTML.jpg)


    **Figure 16-5.** Here we’ll display all the file’s attributes


    This table view is going to contain all the file attributes that the system gives
    us. Those attributes come to us in the form of a dictionary, which is a perfect
    use of Apple’s `NSDictionaryController` class. Using `NSDictionaryController`,
    we’ll be able to display all of the selected file’s attributes as key-value pairs
    in the table view just by hooking them up with Cocoa bindings.


    Search for `NSDictionaryController` in the Library, and drag one to the Interface
    Builder dock in order to add it to the nib. Then click the text next to its icon
    in the dock, and rename it `attrDict` so that we can easily identify it when binding
    to it later on. Like the other included controller classes, the dictionary controller
    class is able to get its content via a binding. Use the Bindings Inspector to
    bind its Content Dictionary (in the Controller Content group) to the app delegate’s
    `self.fileAttributes` key path.


    Now we just have to bind the table view’s columns to the new controller. Select
    the left column, and use the Bindings Inspector to bind its Value column to `attrDict`,
    using `arrangedObjects` as the controller key and `key` as the key path. That
    will make the left column show the keys for each key-value pair in the dictionary.
    Now select the right column, and bind its Value column to `attrDict`, using `arrangedObjects`
    as the Controller Key and `value` as the Model Key Path.


    Next, grab an `NSTextView` from the Library and drag it into the window we’ve
    been creating, placing it near the bottom. Our window is starting to get a little
    cramped now! Reduce the height of both the table view and the text view so that
    they fit comfortably on top of one another, leaving a fair chunk of space beneath
    as well since we’re going to need it. Then resize the text view so that it’s the
    same width as the table view. All this is shown in Figure 16-6.


    ![A978-1-4302-4543-8_16_Fig6_HTML.jpg](A978-1-4302-4543-8_16_Fig6_HTML.jpg)


    **Figure 16-6.** This is what the window should look like after we position the
    text view properly beneath the table view


    When we drag a text view from the Library, it’s actually contained within a scroll
    view, so give it an extra click to select the text view inside the scroll view.
    Then use the Attributes Inspector to turn off the Editable checkbox (we just want
    to display a file here, not edit it) as well as the Rich Text checkbox. Now is
    as good a time as any to bring the `NSSplitView` into play, as hinted at earlier.
    Make sure the table view and the text view (actually, the scroll view that contains
    it) are about the same size, and line them up one above the other. Then select
    both of them, and choose Editor ➤ Embed In ➤ Split View from the menu. Doing so
    will line them up tightly and draw the little dimple between them.


    Now select just the text view again. Remember, we can avoid the ambiguity and
    extra steps involved to select the correct object in the view hierarchy by Shift-Ctrl-clicking
    the text view and selecting the text view from the stack of objects that’s displayed.
    Switch to the Bindings Inspector, and bind the text view’s Value to the app delegate’s
    `self.fileStringValue` key path.'
