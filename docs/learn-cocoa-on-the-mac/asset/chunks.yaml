  trans: '

    ### 使用 `NSWindowController` 加载 Nib 文件


    第一种也是最简单的方法是使用 Cocoa 的 `NSWindowController` 类来加载 nib 文件并成为其所有者。我们将在主窗口中添加一个按钮，用于触发加载新的
    nib 文件，并在 `WLAppDelegate` 中添加一个 `NSMutableArray`，用于持有对新加载 nib 文件的引用。如果没有东西持有对新加载
    nib 文件的引用，ARC 系统将导致它们被立即释放。


    首先，打开 `WLAppDelegate.h` 文件，并添加以下属性（以粗体显示）：


    ```

    @interface WLAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *title;

    @property (strong) NSMutableArray *subWindows;

    ```


    然后在 `.m` 文件的 `applicationDidFinishLaunching:` 方法中添加以下行：


    ```

    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification


    {


    self.subWindows = [[NSMutableArray alloc] init];


    }

    ```


    接下来，打开 `MainMenu.xib` 文件，并在主窗口中已有两个按钮的下方添加一个新按钮。将其标签设为“Load Easy Window”。打开助理编辑器窗格（如果尚未打开），并在其中打开
    `WLAppDelegate.h` 文件。从新按钮按住 Control 键拖向 `.h` 文件，并添加一个名为 `loadEasyWindow` 的新操作。然后，在
    `.m` 文件中为 `WLAppDelegate` 填充存根，实现如下内容：


    ```

    - (IBAction)loadEasyWindow:(id)sender


    {


    NSWindowController *easyController = [[NSWindowController alloc]

    initWithWindowNibName:@"EasyWindow"];


    // 需要持有对此对象的引用

    [self.subWindows addObject:easyController];

    [easyController window];


    }

    ```


    在该方法中，我们首先初始化一个新的控制器，并告知它要使用的 nib 文件名。然后，我们在 `applicationDidFinishLaunching:`
    方法中创建的 `subWindows NSMutableArray` 中存储对该控制器的引用，这样新控制器就不会在方法结束时被释放。如果我们没有持有其引用，当它超出作用域时就会被释放，新加载的
    nib 文件也会随之被释放。当然，在实际应用中，我们需要一种机制来适时地从该列表中移除对象，但我们暂时忽略这一点。接着，我们调用其 `window` 方法，该方法实际加载
    nib 文件并显示窗口。当然，我们还没有创建 EasyWindow nib 文件，所以现在就来创建。


    在 Xcode 中创建一个全新的 nib 文件：选择 File ➤ New ➤ New File。在模板选择器中，选择 OS X 下的 User Interface，然后选择
    Window 模板，该模板包含一个可直接使用的 `NSWindow`。将新文件命名为 EasyWindow，并在 Group 弹出菜单下选择 WindowLab
    文件夹。Group 弹出菜单将显示五个项目，前三个分别是带有 Xcode 项目图标的 WindowLab、带有文件夹图标的 WindowLab 以及带有文件夹图标的
    Supporting Files。这些对应于 Xcode 导航区域中的文件组。选择带有文件夹图标的 WindowLab 条目，然后点击 Create。


    我们新创建的 xib 文件将在 Xcode 的导航区域中显示为一个新文件，因此请从此处打开该文件。选择 nib 文件中的 Window，然后打开属性检查器。将窗口标题设为“Easy
    Window”。


    在之前的章节中，我们创建的每个控制器都被作为顶级对象添加到 nib 文件中，但当你自己加载 nib 文件时，可以指定一个对象作为其“所有者”，在 Interface
    Builder 中，这由主 nib 窗口中的 File’s Owner 对象表示。我们的控制器类 `NSWindowController` 在加载文件时已经将自己设置为
    nib 文件的所有者，但我们仍需要在 Interface Builder 中手动配置，以便能够使用它。为此，选择 File’s Owner 图标并打开标识检查器。在此检查器的顶部，我们可以设置希望成为文件所有者的对象的类。默认情况下，它设置为
    `NSObject`，但通常我们希望它是 `NSWindowController` 本身或 `NSWindowController` 的自定义子类。现在，将其自定义类设置为
    `NSWindowController`，如图 11-5 所示。最后，按住 Control 键从 File’s Owner 图标拖向窗口，并将其分配给 File’s
    Owner 的 `window` 插座变量。我们需要这样做，以便 `NSWindowController` 知道众多可能的 `NSWindow` 对象中哪一个是该
    nib 的“主”窗口。


    ![A978-1-4302-4543-8_11_Fig5_HTML.jpg](img/A978-1-4302-4543-8_11_Fig5_HTML.jpg)


    图 11-5.


    设置 File’s Owner 的类


    保存并点击 Run。应用的新按钮将允许我们每次按下按钮时创建新窗口（参见图 11-6）。


    ![A978-1-4302-4543-8_11_Fig6_HTML.jpg](img/A978-1-4302-4543-8_11_Fig6_HTML.jpg)


    图 11-6.


    一些简易窗口


    每次它都会创建一个新的 `NSWindowController` 实例，该实例会加载一份全新的 nib 文件副本，包括其中的所有对象。在此例中，我们只有一个窗口，但你可以在这些
    nib 文件中放置任何你喜欢的内容，例如用于访问 Core Data 的控制器对象。

