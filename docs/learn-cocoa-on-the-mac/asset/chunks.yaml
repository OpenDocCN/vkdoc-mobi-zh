  raw: 'Select `Editor` ➤ `Simulate Document` and try to resize horizontally. The
    window won’t budge at all. We’ve got some constraints holding things in place
    that we need to identify and remove. For each box, look at the constraints listed
    in the Size Inspector and find ones that say “Leading Space to: Superview” with
    anything as the value. You can tell if these constraints exist by selecting the
    box and looking for a blue bar extending from the left edge of the box out to
    the edge of the window. Delete the ones that are deleteable, either by selecting
    Delete from the menu hiding under the gear icon in the Constraint’s entry in the
    Size Inspector for the box, or by selecting the blue bar and pressing the Delete
    key.


    After removing them all, again select `Editor` ➤ `Simulate Document` and try to
    resize horizontally. This time the window should resize the way we want it to,
    as shown in Figure [6-8](#A978-1-4302-4543-8_6_Chapter.html#Fig8).


    ![A978-1-4302-4543-8_6_Fig8_HTML.jpg](A978-1-4302-4543-8_6_Fig8_HTML.jpg)


    Figure 6-8.


    Finally, resizing works!


    Before we move on to implementing code, here are a few more words about resizing.
    Debugging resizing problems is almost always an iterative, trial-and-error process.
    We’ve touched on a few ways to make it work here:


    *   Resize the window in Interface Builder, and see how things resize in relation
    to the window.

    *   If the window design has evolved, try moving user-interface elements around
    to reset the constraints.

    *   Play with the Simulate Document feature and experiment.

    *   Look at how constraints are visualized in Interface Builder, via the blue
    bars and the Size Inspector.


    There’s more to learn about constraints and Cocoa Auto Layout; these are just
    the basics. Check out the Cocoa Auto Layout Guide on the Apple Developer Connection
    web site and in the Xcode documentation for more details and debugging tips.


    Note


    Cocoa Auto Layout was introduced in Mac OS X 10.7\. Prior to that, resizing was
    controlled using a mechanism called “springs and struts,” which controlled how
    views resized relative to the window that contained them. In 10.7 and beyond,
    the old springs and struts resizing behavior is translated into constraints behind
    the scenes; applications can have nib files using constraints and nib files using
    springs and struts that co-exist. However, if you come across pre-2011 Cocoa code,
    you’ll almost surely encounter nib files that don’t use constraints.


    ## Making Way for the Table View: Code Edition


    With the connections in place and resizing now under control, we can turn our
    attention to the code necessary to drive the table view and respond to clicks
    on the Add and Remove buttons. To do this, we need to leave Interface Builder
    mode and get back to our code. Open the Project Navigator (⌘1), if it isn’t already
    open. Single-click the entry for the `VillainTrackerAppDelegate.m` file and the
    Editor area should change from Interface Builder to a code window showing the
    code for our object.


    With the groundwork already laid in the last chapter, adding support for an array
    of villains is surprisingly simple. Basically, we have to create an array, tell
    the table view when we want it to display its content (whenever its content has
    changed), implement a few `dataSource` methods to give the table view its content,
    and implement a `delegate` method that will be called when the table view’s selection
    changes (so that we can update all the other views to match the selected villain).
    Then we’ll add a pair of methods to add and delete villains from the array, and
    we’ll be done!


    Let’s start off by initializing an array to hold our villains and telling the
    table view that it should load its content. We do this by adding just a few lines
    to `applicationDidFinishLaunching`:, as seen in bold in the following code. First
    we create an array to hold all villains (which initially contains just the first
    villain we created in code earlier) and assign it to our villains instance variable.
    Then we tell the table view to load its content, and then to select its first
    row.


    Telling the table view which row to select is more complicated than it might seem
    at first. The `NSTableView` method that we use is called `selectRowIndices` `:byExtendingSelection:`.
    Since a table view can have more than one selected row, and the selected rows
    need not be contiguous, the table view expects a set of indices to select in the
    `selectRowIndices:byExtendingSelection:` method. In our case, we want only one
    row selected, so we construct a set with just one element on the fly.


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {`


    `self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:`


    `@"Lex Luthor", kName`,


    `@"Smallville", kLastKnownLocation`,


    `[NSDate date], kLastSeenDate`,


    `@"Superman", kSwornEnemy`,


    `@"Revenge", kPrimaryMotivation`,


    `[NSArray arrayWithObjects:@"Evil Genius", nil], kPowers`,


    `@"Superhero action", kPowerSource`,


    `@9, kEvilness`,


    `[NSImage imageNamed:@"NSUser"], kMugshot`,


    `@"", kNotes`,


    `nil];`


    `/* new code is here */`


    `self.villains = [NSMutableArray arrayWithObject:self.villain];`


    `[self.villainsTableView reloadData];`


    `[self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:0] byExtendingSelection:NO];`


    `/* end of new code */`


    `[self updateDetailViews];`


    `}`


    We’ll also need to add the `[villainsTableView reloadData]` call to the end of
    each of the `takeName:`, `takeLastSeenDate:`, and `takeMugshot:` methods, so that
    when the user edits the controls for those attributes, the table view will be
    updated accordingly. Just copy that line and paste it into the end of each of
    those methods. It may seem like overkill to call a method that looks like it’s
    going to reload the entire table of data just because a single value has been
    changed, but don’t worry: `NSTableView` uses lazy loading, and normally only requests
    content for a given row when that row is about to be displayed. You might have
    a million rows of content, but if you never scroll past the first 30, no more
    than the first 30 are likely to be loaded by the table view. Likewise, telling
    a table view to reload its data will only make it load the visible rows immediately;
    the rest will only be reloaded when they scroll into display.


    At this point, we should be able to compile and run our app, and we should see
    roughly the same thing we saw at the end of the last chapter, plus a big empty
    table view and a couple of buttons that have no effect. Time to fill that table
    view with villains!'
  trans: "\n选择 `Editor` ➤ `Simulate Document` 并尝试水平调整大小。窗口将纹丝不动。我们发现存在一些约束固定了窗口，需要找到并移除它们。针对每个文本框，在尺寸检查器中查看列出的约束，找到值为任意数值且描述为“前置空间到：父视图”的约束。你可以通过选中文本框来确认是否存在这些约束——查看是否有从文本框左侧延伸至窗口边缘的蓝色条。删除所有可删除的约束：要么从该文本框尺寸检查器中约束项下方齿轮图标菜单里选择“删除”，要么选中蓝色条后按\
    \ Delete 键。\n\n移除所有约束后，再次选择 `Editor` ➤ `Simulate Document` 并尝试水平调整大小。此时窗口应该能按我们期望的方式调整大小，如图\
    \ 6-8 所示。\n\n![A978-1-4302-4543-8_6_Fig8_HTML.jpg](img/A978-1-4302-4543-8_6_Fig8_HTML.jpg)\n\
    \n**图 6-8.** 调整大小终于成功了！\n\n在继续实现代码之前，关于调整大小还有几点补充说明。调试调整大小问题几乎总是一个反复试错的迭代过程。我们已经介绍了一些使其正常工作的方法：\n\
    \n- 在界面生成器中调整窗口大小，观察各个元素如何相对于窗口进行调整。\n- 如果窗口设计已经演变，尝试重新排列用户界面元素以重置约束。\n- 使用“模拟文档”功能进行实验。\n\
    - 通过蓝色条和尺寸检查器，查看约束在界面生成器中的可视化效果。\n\n关于约束和 Cocoa 自动布局还有更多内容需要学习；以上只是基础知识。更多详情和调试技巧可查阅\
    \ Apple Developer Connection 网站上的《Cocoa 自动布局指南》以及 Xcode 文档。\n\n> **注**  \n> Cocoa\
    \ 自动布局是在 Mac OS X 10.7 中引入的。在此之前，调整大小是通过一种称为“弹簧和支柱”的机制控制的，该机制控制视图如何相对于其所在的窗口调整大小。在\
    \ 10.7 及更高版本中，旧的弹簧和支柱调整大小行为会在后台转换为约束；应用程序中可以同时存在使用约束的 nib 文件和使用弹簧和支柱的 nib 文件。但是，如果你遇到\
    \ 2011 年之前的 Cocoa 代码，几乎肯定会遇到不使用约束的 nib 文件。\n\n## 为表格视图让路：代码篇\n\n在连接建立完成且调整大小已受控后，我们可以将注意力转向驱动表格视图并响应“添加”和“移除”按钮点击所需的代码。为此，我们需要离开界面生成器模式，回到代码中。打开项目导航器（⌘1），如果尚未打开的话。单击\
    \ `VillainTrackerAppDelegate.m` 文件的条目，编辑器区域应从界面生成器切换为显示我们对象代码的代码窗口。\n\n由于已经在上一章打下了基础，为反派数组添加支持出奇地简单。基本上，我们需要创建一个数组，在希望表格视图显示其内容时（每当其内容发生变化时）通知它，实现几个\
    \ `dataSource` 方法为表格视图提供内容，并实现一个在表格视图选择发生更改时调用的 `delegate` 方法（以便更新所有其他视图以匹配所选反派）。接着，我们将添加一对方法，用于从数组中添加和删除反派，然后大功告成！\n\
    \n让我们从初始化一个用于存放反派的数组开始，并告知表格视图应该加载其内容。我们只需在 `applicationDidFinishLaunching:` 中添加几行代码，如下面代码中的粗体部分所示。首先，我们创建一个数组来存放所有反派（初始时仅包含之前我们在代码中创建的第一个反派），并将其赋值给我们的\
    \ `villains` 实例变量。然后，我们告诉表格视图加载其内容，并选中其第一行。\n\n告知表格视图选择哪一行比初看起来要复杂一些。我们使用的 `NSTableView`\
    \ 方法叫做 `selectRowIndices:byExtendingSelection:`。由于表格视图可以选择多行，且选中的行不必连续，因此表格视图期望在\
    \ `selectRowIndices:byExtendingSelection:` 方法中传入一个索引集合。在我们的场景中，我们只想选中一行，所以动态创建一个仅包含一个元素的集合。\n\
    \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
    \n    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n  \
    \                  @\"Lex Luthor\", kName,\n                    @\"Smallville\"\
    , kLastKnownLocation,\n                    [NSDate date], kLastSeenDate,\n   \
    \                 @\"Superman\", kSwornEnemy,\n                    @\"Revenge\"\
    , kPrimaryMotivation,\n                    [NSArray arrayWithObjects:@\"Evil Genius\"\
    , nil], kPowers,\n                    @\"Superhero action\", kPowerSource,\n \
    \                   @9, kEvilness,\n                    [NSImage imageNamed:@\"\
    NSUser\"], kMugshot,\n                    @\"\", kNotes,\n                   \
    \ nil];\n\n    /* 新代码从这里开始 */\n    self.villains = [NSMutableArray arrayWithObject:self.villain];\n\
    \    [self.villainsTableView reloadData];\n    [self.villainsTableView selectRowIndexes:[NSIndexSet\
    \ indexSetWithIndex:0] byExtendingSelection:NO];\n    /* 新代码到这里结束 */\n\n    [self\
    \ updateDetailViews];\n}\n```\n\n我们还需要在 `takeName:`、`takeLastSeenDate:` 和 `takeMugshot:`\
    \ 每个方法的末尾添加 `[villainsTableView reloadData]` 调用，这样当用户编辑这些属性的控件时，表格视图将相应更新。只需复制该行代码并粘贴到每个方法的末尾即可。仅仅因为单个值被更改就调用一个看似要重新加载整个数据表的方法，可能显得有些过头，但别担心：`NSTableView`\
    \ 使用懒加载，通常只会在某一行即将显示时才请求该行的内容。你可能拥有百万行内容，但如果你从不滚动到前 30 行之后，那么表格视图很可能只加载前 30 行。同样，通知表格视图重新加载数据只会使其立即加载可见行；其余行只会在滚动进入显示区域时才会重新加载。\n\
    \n此时，我们应该能够编译并运行我们的应用程序，并且会看到与上一章结尾大致相同的内容，外加一个空白的大表格视图和两个不起作用的按钮。是时候用反派来填充那个表格视图了！\n"
- fmt: "### The Table View Needs Help\n\nWe’ve told the table view to load its content,\
    \ but it can’t do anything until we implement some methods from the `NSTableDataSource`\
    \ and `NSTableViewDelegate` protocols in the object we connected to the table\
    \ view’s `dataSource` and `delegate` outlets: our `VillainTrackerAppDelegate`.\
    \ `NSTableDataSource` and `NSTableViewDelegate` are informal protocols, similar\
    \ to most delegate protocols, which means that we don’t have to declare that our\
    \ class conforms to the protocol. As a result, implementing the `NSTableDataSource`\
    \ and `NSTableViewDelegate` methods are, as far as Objective-C is concerned, optional.\
    \ In spite of that, there are a few methods that are in fact required for the\
    \ table view to display anything: `numberOfRowsInTableView:` from `NSTableViewDataSource`\
    \ and `tableView:viewForTableColumn:row:` from `NSTableViewDelegate`, both of\
    \ which are used by the table view to prepare content for display. Here’s how\
    \ these should be implemented in `VillainTrackerAppDelegate.m`:\n\n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView\
    \ *)aTableView {\n    return [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView\
    \ *)aTableView\n       viewForTableColumn:(NSTableColumn *)tableColumn\n     \
    \                 row:(NSInteger)row {\n    NSMutableDictionary *thisVillain =\
    \ [self.villains objectAtIndex:row];\n    NSString *thisColName = [tableColumn\
    \ identifier];\n    NSView *result = nil;\n\n    // Depending on which column\
    \ we’re using, we need to do different things.\n    // Passing [tableColumn identifier]\
    \ to makeViewWithIdentifier ensures that we get\n    // the view that’s already\
    \ been configured for the column in IB, and AppKit manages this for us.\n    if\
    \ ([thisColName isEqualToString:kName]) {\n        NSTableCellView *thisCell =\
    \ [aTableView makeViewWithIdentifier:thisColName owner:self];\n        thisCell.textField.stringValue\
    \ = [thisVillain objectForKey:kName];\n        result = thisCell;\n    } else\
    \ if ([thisColName isEqualToString:kLastSeenDate]) {\n        NSTableCellView\
    \ *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];\n  \
    \      thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
    \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
    \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
    \        result = thisCell;\n    }\n\n    // return the result.\n    return result;\n\
    }\n```\n\nThe first method should be self-explanatory: we just return the size\
    \ of the array so that the table view knows how many rows it needs to display.\
    \ The second method is called by the table view each time a cell is going to be\
    \ displayed in the table. The table view tells us the column and row index number\
    \ that it wants to display. The row index number is the same as the index number\
    \ for the relevant object in our content array, so calling `[villains objectAtIndex:rowIndex]`\
    \ returns the relevant model object from `villains`. As you may recall, the model\
    \ objects we’re using are in fact just `NSMutableDictionary` instances, with all\
    \ their values accessible by keys. When we configured the identifier attribute\
    \ of each column in our table view, we used the same key names that our model\
    \ objects use. Based on the identifier of the column, we ask the table view to\
    \ make an instance of the appropriate `NSView` subclass for the column using `makeViewWithIdentifier:owner:`.\
    \ We then configure the view based on the relevant value from the model object\
    \ and return the view to the table view.\n\nFor example, when the cell in the\
    \ top row under the `Name` column is about to be displayed, this method will be\
    \ called with a `rowIndex` of 0 and a `TableColumn` pointing to the `Name NSTableColumn`.\
    \ We use the 0 to specify which villain to grab from our `villains` array, then\
    \ we use the value returned by the table column’s identifier method, `@\"name\"\
    `, to retrieve a value from the chosen villain. We ask the table view to get an\
    \ instance of the appropriate `NSView` for that column (which we configured in\
    \ Interface Builder), and then populate it in whatever manner works for that `NSView`.\
    \ Lastly, we return that view, and the table view draws it.\n\nNow we should be\
    \ able to compile and run `VillainTracker`, and see that the default villain is\
    \ displayed both in the controls and as the only row in the table view. Furthermore,\
    \ if we edit the villain’s name, last seen date, or mugshot in the controls, we\
    \ should see those new values reflected in the table view. However, we still only\
    \ have one villain, and no way to track more. Let’s change that right now.\n\n\
    ### Adding More Villains\n\nWe stubbed out the `newVillain:` method earlier. Let’s\
    \ fill in the implementation now. The `newVillain:` method adds a new “empty”\
    \ villain object to our array of villains, tells the table to reload, and tells\
    \ the table view which row to select (the last one, since that’s the one we just\
    \ added).\n\n```\n- (IBAction)newVillain:(id)sender {\n    [_window endEditingFor:nil];\n\
    \    [self.villains addObject:[NSMutableDictionary\n        dictionaryWithObjectsAndKeys:\n\
    \            @\"\", kName,\n            @\"\", kLastKnownLocation,\n         \
    \   [NSDate date], kLastSeenDate,\n            @\"\", kSwornEnemy,\n         \
    \   @\"Greed\", kPrimaryMotivation,\n            [NSArray array], kPowers,\n \
    \           @\"\", kPowerSource,\n            [NSNumber numberWithInt:0], kEvilness,\n\
    \            [NSImage imageNamed:@\"NSUser\"], kMugshot,\n            @\"\", kNotes,\n\
    \            nil]];\n    [self.villainsTableView reloadData];\n    [self.villainsTableView\
    \ selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains count]-1]\n       \
    \             byExtendingSelection:NO];\n}\n```\n\nThe only new thing we might\
    \ see in here is the very first method call, `[_window endEditingFor:nil]`. Let’s\
    \ look at both parts of that. First, where did the `_window` instance variable\
    \ come from? Xcode constructed this for us from a declared property that it generated\
    \ in the `VillainTrackerAppDelegate.h` file, and automatically connected to the\
    \ window:\n\n`@property (assign) IBOutlet NSWindow *window;`\n\nSince we didn’t\
    \ give an explicit name via a `@synthesize` declaration, Xcode defaulted to creating\
    \ a new instance variable with a leading underscore. Second is the method that\
    \ we’re calling on the window, `endEditingFor:`. This simply tells the window\
    \ that it’s time to end whatever other editing behavior the user is currently\
    \ engaged in, such as typing in a text field. We need to call this method so that\
    \ the edited value can be “saved” to its underlying villain object because later\
    \ in `newVillain:` we’re going to change the table view’s selection, which would\
    \ in turn wipe out the values shown in the various controls!"
