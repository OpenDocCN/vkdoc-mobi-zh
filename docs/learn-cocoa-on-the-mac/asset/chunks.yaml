- fmt: "`resourceValuesForKeys:error:`方法可能会返回`nil`，如果目录根本不存在（例如应用程序首次运行时）。如果是这种情况，代码会检查`NSError`的内容以确认路径是否不存在。如果路径不存在，它会尝试创建该目录，然后检查目录创建是否成功。如果不成功，它会报告错误并返回`nil`。另一方面，如果`resourceValuesForKeys:error:`确实返回了一个属性对象，那么它会检查该属性对象的内容，以确认路径存在但不代表一个目录。如果存在同名文件，就可能出现这种情况。如果是这种情况，该方法会在查找本地化错误消息后报告错误并返回`nil`。\n\
    \n如果通过了所有这些边界情况（通常都会通过），该方法会构建一个指向存储文件应处位置的`URL`，创建一个`NSPersistentStoreCoordinator`，并告诉协调器在给定`URL`处添加一个新存储。协调器足够智能，它会查看`URL`，判断那里是否已有一个持久存储，如果没有则为我们创建一个。如果在过程中遇到任何错误，它会告知我们，应用程序会向用户报告错误。\n\
    \n关于此方法有几点值得注意：首先，这里是应用程序数据存储的实际文件名（当前为`MythBase.storedata`，尽管在早期版本的Mac OS/X中默认为`MythBase.xml`）的指定位置。如果你想为文件使用其他名称，可以在此处更改。\n\
    \n此外，后援存储的类型是在调用`addPersistentStoreWithType:configuration:URL:options:error:`方法时指定的。当前设置为`NSXMLStoreType`，这意味着存储的数据将采用XML格式文件。这种存储方式在开发应用程序时很方便，因为生成的文件易于使用其他工具解析，甚至可以用肉眼阅读。然而，在交付最终应用程序之前，你可能需要考虑为数据存储更改其他类型，以兼顾大小、速度等因素。\n\
    \n我们可用的其他选择包括`NSBinaryStoreType`（它以二进制格式保存数据，占用更少磁盘空间且读写更快）和`NSSQLiteStoreType`（除了具备`NSBinaryStoreType`的优势外，还使持久存储无需一次性在内存中保存整个对象图；它只在访问对象时加载它们）。这种差异在处理大数据集时变得至关重要。基于这一优势，我们建议在发布应用程序之前，将`NSXMLStoreType`更改为`NSSQLiteStoreType`。还有一种额外的存储类型`NSInMemoryStoreType`，可用于维护从未保存到磁盘的内存中对象图。\n\
    \n默认的Core Data应用程序模板很好地为你隐藏了数据存储，使你不必过多考虑它，但在发布应用程序之前的某个时刻，你必须决定为应用程序存储使用哪种格式。我们已给出建议，但你可能希望查阅Xcode中的文档（搜索\"\
    core data programming guide\"以获取更多理解），然后再决定如何处理此问题。\n\n关于`persistentStoreCoordinator`最后要指出的一点是：如果你希望将数据分区存储到不同的存储中（例如，一个存储在磁盘上，另一个仅在内存中，应用程序终止时消失），则需在此处进行更改，将每个持久存储添加到协调器中。\n\
    \n#### managedObjectContext访问器方法\n\n现在让我们来看`managedObjectContext`方法，它是同名只读属性的getter方法：\n\
    \n```\n// Returns the managed object context for the application (which is already\
    \ bound to the persistent store coordinator for the application.)\n- (NSManagedObjectContext\
    \ *)managedObjectContext\n{\n    if (_managedObjectContext) {\n        return\
    \ _managedObjectContext;\n    }\n    NSPersistentStoreCoordinator *coordinator\
    \ = [self persistentStoreCoordinator];\n    if (!coordinator) {\n        NSMutableDictionary\
    \ *dict = [NSMutableDictionary dictionary];\n        [dict setValue:@\"Failed\
    \ to initialize the store\" forKey:NSLocalizedDescriptionKey];\n        [dict\
    \ setValue:@\"There was an error building up the data file.\" forKey:NSLocalizedFailureReasonErrorKey];\n\
    \        NSError *error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999\
    \ userInfo:dict];\n        [[NSApplication sharedApplication] presentError:error];\n\
    \        return nil;\n    }\n    _managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    return _managedObjectContext;\n}\n```\n\n与我们见过的作为属性getter的其他方法类似，此方法首先检查实例变量是否已设置，如果已设置则返回它。否则，它会通过调用`persistentStoreCoordinator`方法来检查持久存储协调器是否存在。如果该方法返回`nil`，则此方法报告错误并返回`nil`。如果存在，它只需创建一个托管对象上下文，设置其持久存储协调器，然后返回该上下文。\n\
    \n这段代码相当直接，除了可能自定义错误报告外，你可能永远不会过多关注它。\n\n#### NSWindow委托方法\n\n接下来是一个名为`windowWillReturnUndoManager`的`NSWindow`委托方法。\n\
    \n```\n// Returns the NSUndoManager for the application. In this case, the manager\
    \ returned is that of the managed object context for the application.\n- (NSUndoManager\
    \ *)windowWillReturnUndoManager:(NSWindow *)window\n{\n    return [[self managedObjectContext]\
    \ undoManager];\n}\n```\n\n此方法允许我们指定处理包含GUI窗口的撤销/重做操作的对象。我们将在后续章节讨论撤销/重做系统，但目前你需要知道的是，此方法告诉系统使用通过托管对象上下文访问的Core\
    \ Data撤销管理器。\n\n#### saveAction: 操作方法\n\n接下来是`saveAction:`方法，当用户点击相关菜单项时调用。\n\n\
    ```\n// Performs the save action for the application, which is to send the save:\
    \ message to the application's managed object context. Any encountered errors\
    \ are presented to the user.\n- (IBAction)saveAction:(id)sender\n{\n    NSError\
    \ *error = nil;\n    if (![[self managedObjectContext] commitEditing]) {\n   \
    \     NSLog(@\"%@:%@ unable to commit editing before saving\", [self class], NSStringFromSelector(_cmd));\n\
    \    }\n    if (![[self managedObjectContext] save:&error]) {\n        [[NSApplication\
    \ sharedApplication] presentError:error];\n    }\n}\n```\n\n此方法相当直接。它首先告诉上下文确保任何待处理的编辑已提交到底层模型对象，并在提交失败时打印一条警告。无论提交成功还是失败，它随后会继续告诉上下文将所有模型对象保存到存储中。如果保存失败，它会向用户显示错误。"
  raw: 'The `resourceValuesForKeys:error:` method might return nil if the directory
    isn’t there at all—such as the first time the application is run. If this is the
    case, the code checks the contents of the `NSError` to see if the path isn’t there.
    If it’s not there, it tries to create the directory and then checks to see whether
    the directory creation succeeded. If not, it reports the error and returns nil.
    On the other hand, if `resourceValuesForKeys:error:` did return a properties object,
    then it checks the contents of the properties object to see if the path exists
    but doesn’t represent a directory. This might be the case if there’s a file with
    the same name already present. If this is the case, the method reports the error
    (after looking up a localized error message) and returns nil.


    If we get past all those edge cases (and we usually will), then the method builds
    a URL pointing at where the storage file should be located, creates an `NSPersistentStoreCoordinator`,
    and tells the coordinator to add a new store, given the URL. The coordinator is
    smart enough to look at the URL, figure out if there’s already a persistent store
    there, and if not, create one for us. If it encounters any error along the way,
    it tells us so, and the application reports an error to the user.


    A few points of interest about this method: for one thing, this is where the actual
    filename for our app’s data store (currently `MythBase.storedata`, though in an
    earlier version of Mac OS/X it defaulted to `MythBase.xml`) is specified. If you
    wanted to name your file something else, this is where you’d change it.


    Also, this is where the type of the backing store is specified, in the call to
    the `addPersistentStoreWithType:configuration:URL:options:error:` method. It’s
    currently set to `NSXMLStoreType`, which means that the stored data will be in
    an XML-formatted file. This sort of storage is nice while you’re developing your
    app, since the resulting file is easy to parse with other tools, or for that matter
    read with your own eyes. However, before delivering a final application, you may
    want to consider changing your data store to another type for the sake of size,
    speed, and other considerations.


    The other choices we have are `NSBinaryStoreType`, which saves its data in a binary
    format that takes less disk space and is faster to read and write, and `NSSQLiteStoreType`,
    which in addition to the advantages of `NSBinaryStoreType` also frees the persistent
    store from the burden of holding the entire object graph in memory at once; it
    only loads objects as they’re accessed. That difference becomes crucial when dealing
    with a large data set. Because of this advantage, we recommend changing from `NSXMLStoreType`
    to `NSSQLiteStoreType` before releasing your application. There’s an additional
    store type, `NSInMemoryStoreType`, which can be used for maintaining an in-memory
    object graph that’s never saved to disk.


    The default Core Data application template does a pretty good job of tucking away
    the data storage for you so that you don’t have to give it too much thought, but
    at some point before shipping your app you will have to decide which of these
    formats to use for your app’s storage. We’ve given our recommendations, but you
    might want to consult the documentation in Xcode (search for “core data programming
    guide” to gain more understanding before deciding how to tackle this issue.


    The final thing to point out about `persistentStoreCoordinator` is that if you
    want to partition your data into different stores (for example one that’s on disk
    and one that’s only in memory, disappearing when the app terminates) this is where
    you’d need to make the changes, adding each of your persistent stores to the coordinator.


    #### The managedObjectContext Accessor Method


    Now let’s look at the `managedObjectContext` method, which is the getter for the
    read-only property of the same name:


    `// Returns the managed object context for the application (which is already bound
    to the persistent store coordinator for the application.)`


    `- (NSManagedObjectContext *)managedObjectContext`


    `{`


        `if (_managedObjectContext) {`


            `return _managedObjectContext;`


        `}`


        `NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`


        `if (!coordinator) {`


            `NSMutableDictionary *dict = [NSMutableDictionary dictionary];`


            `[dict setValue:@"Failed to initialize the store" forKey:NSLocalizedDescriptionKey];`


            `[dict setValue:@"There was an error building up the data file." forKey:NSLocalizedFailureReasonErrorKey];`


            `NSError *error = [NSError errorWithDomain:@"YOUR_ERROR_DOMAIN" code:9999
    userInfo:dict];`


            `[[NSApplication sharedApplication] presentError:error];`


            `return nil;`


        `}`


        `_managedObjectContext = [[NSManagedObjectContext alloc] init];`


        `[_managedObjectContext setPersistentStoreCoordinator:coordinator];`


        `return _managedObjectContext;`


    `}`


    Like the other methods we’ve seen acting as a getter for a property, this method
    first checks to see if the instance variable has been set, and if so, returns
    it. Otherwise, it checks for the existence of a persistent store coordinator by
    calling the `persistentStoreCoordinator` method. If that returns nil, then the
    method reports an error and returns nil itself. If not, it simply creates a managed
    object context, sets its persistent store coordinator, and returns the context.


    This code is pretty straightforward and is probably nothing you’ll ever pay much
    attention to, except perhaps to customize the error reporting.


    #### An NSWindow Delegate Method


    Next up is an `NSWindow` delegate method called `windowWillReturnUndoManager`.


    `// Returns the NSUndoManager for the application. In this case, the manager returned
    is that of the managed object context for the application.`


    `- (NSUndoManager *)windowWillReturnUndoManager:(NSWindow *)window`


    `{`


        `return [[self managedObjectContext] undoManager];`


    `}`


    This method lets us specify the object that handles undo/redo actions for the
    window containing our GUI. We’ll discuss the undo/redo system in a later chapter,
    but for now what you need to know is that this method tells the system to use
    Core Data’s undo manager, which is accessed through the managed object context.


    #### The saveAction: Action Method


    Next up, the `saveAction:` method, which is called when the user clicks the relevant
    menu item.


    `// Performs the save action for the application, which is to send the save: message
    to the application''s managed object context. Any encountered errors are presented
    to the user.`


    `- (IBAction)saveAction:(id)sender`


    `{`


        `NSError *error = nil;`


        `if (![[self managedObjectContext] commitEditing]) {`


            `NSLog(@"%@:%@ unable to commit editing before saving", [self class],
    NSStringFromSelector(_cmd));`


        `}`


        `if (![[self managedObjectContext] save:&error]) {`


            `[[NSApplication sharedApplication] presentError:error];`


        `}`


    `}`


    This method is pretty straightforward. It first tells the context to ensure that
    any pending edits are committed to the underlying model objects and prints a warning
    in case the commit fails. Whether the commit succeeds or fails, it then proceeds
    to tell the context to save all model objects to storage. If that fails, it shows
    the user an error.'
