  raw: 'The bits of bold code are executed when a new document is being created. The
    first, `initWithType:error` `:`, is only called when a new document is being created
    from scratch. This is where we’d ideally want to initialize our model objects,
    but all access to the model objects is mediated through the `NSObjectController`,
    which is in the nib file, which at this point hasn’t been loaded yet. So we just
    set the `isNew` flag to `YES`, and move along. A little later, `windowControllerDidLoadNib:`
    is called in `CMDocument` after its nib has been loaded. Here we use the `objectController`
    to create a new model object, set values for its two attributes, and add the new
    object to the controller.


    With that in place, all that’s left to do is to connect `CMDocument`’s `objectController`
    outlet within CMDocument.xib. So switch back over there, Ctrl-drag from the File’s
    Owner to the colorset object controller, and select the `objectController` outlet.
    Save the work, then click the Run button. The red and yellow colors in the two
    color wells should be visible, and clicking on one of them should bring up the
    color panel and let us change the color.


    Not only that, but a full complement of document functionality is now available
    through the menu. We can save our documents, close them, access recent documents,
    open documents, and so on.


    ## Settling on a File Format


    Having gotten to this point, you’ve probably noticed that when you save a document,
    a pop-up list lets you choose to save the file as Binary, SQLite, or XML, and
    the file extension is set accordingly. While this level of flexibility may be
    of some use during development, for a shipping product you should really just
    pick a format and stick with it to avoid confusing your users. In general, SQLite
    is probably the best choice for most applications. You should also change the
    file extension to something that suggests the use of your app, instead of the
    default extension. All of these options are configured in Xcode’s Target settings.
    Go back to Xcode, select the top-most ColorMix group in the navigation pane, click
    the ColorMix target, and click the Info tab at the top of the view to see the
    target settings. Expand the Document Types group, and there will be a view containing
    all three pre-configured file formats. Delete the Binary and XML options (by using
    the “x” button at the upper right-hand corner of each of those sections), leaving
    only the SQLite option. Give this remaining format a decent filename extension
    by editing the value shown in the Extensions column, changing it to ColorMix.
    Now save the work, Build & Run, and save a color set, verifying that we now have
    no choice about what kind of file format to save it as.


    ## Adding Color


    Now the document stuff is all working as it should, but we’ve got a really boring
    application that doesn’t do anything interesting at all. Let’s make our app do
    what we promised in the beginning of this chapter: display a bunch of colors made
    by blending the two chosen colors using all of Core Graphics’ predefined blending
    modes.


    To do this, we’re going to create a new class called `CMColorBlendView`, which
    will be a direct subclass of `NSView`. One of the primary things you typically
    do in an `NSView` subclass is override the `drawRect:` mode to specify exactly
    what should be drawn. We’re going to do just that and fill each view with a blended
    color. In order to do the blending, each instance of `CMColorBlendView` needs
    to know which blending mode to use and which two colors to blend. We’ll set up
    the blending mode for each `CMColorBlendView` by hand, but the values for the
    two colors will be populated using Cocoa Bindings, so that as soon as the user
    changes one of the chosen colors, all of the `CMColorBlendView` objects in our
    window will be instantly redrawn.


    ### The CMColorBlendView Class


    Start by creating a new class in our project. In the New File assistant, choose
    Objective-C class from the OS X - Cocoa section, then click Next. Name our new
    class `CMColorBlendView.m`, and make it a subclass of `NSView`.


    Now edit CMColorBlendView.h, adding the bold lines shown in the following:


    `#import <Cocoa/Cocoa.h>`


    `@interface CMColorBlendView : NSView`


    `@property (strong, nonatomic) NSColor *color1;`


    `@property (strong, nonatomic) NSColor *color2;`


    `@property (assign, nonatomic) CGBlendMode blendMode;`


    `@end`


    This gives our class two `NSColor` objects, which will be populated by Cocoa Bindings,
    and a `CGBlendMode`, which will be set by the `MyController` class when it’s loading
    a nib file. We used the `nonatomic` keyword for all of these properties, which
    is a way of declaring that the getters and setters for these properties won’t
    take extra precautions to be thread-safe. Since we know that our code in this
    simple app is all being used solely on the main thread, using `nonatomic` is safe
    enough and gives slightly better performance.


    Now switch over to CMColorBlendView.m, where the first thing we’ll do is define
    the methods for the properties we’ve declared. Most of the properties we’ve declared
    previously in this book have their methods created by an explicit `@synthesize`
    line, but here we have a bit of a special case because we want our view to redraw
    itself each time any of the property values changes. So we’ll provide explicit
    setter methods for each of our properties. Explicit methods, if present, always
    take the place of any synthesized methods. And actually, this brings us to one
    more reason we used `nonatomic` in our property declarations: without it, the
    compiler doesn’t really like letting us mix a synthesized getter with an explicit
    setter and so would generate a warning.


    While we’re doing all this new stuff anyway, we’re going to introduce a pretty
    new piece of functionality in the LLVM compiler. Any time we declare a property
    in the interface, we can actually leave out the `@synthesize` row entirely! If
    we do so, the compiler will still create an instance variable for us, whose name
    will be the name of the property prefixed by an underscore. We can see this in
    the following code, which should be added to our class’s `@implementation` section:


    `// put these at the beginning of the @implementation block`


    `- (void)setBlendMode:(CGBlendMode)bm`


    `{`


    `if (_blendMode != bm) {`


    `_blendMode = bm;`


    `[self setNeedsDisplay:YES];`


    `}`


    `}`


    `- (void)setColor1:(NSColor *)c`


    `{`


    `if (![c isEqual:_color1]) {`


    `_color1 = c;`


    `[self setNeedsDisplay:YES];`


    `}`


    `}`


    `- (void)setColor2:(NSColor *)c`


    `{`


    `if (![c isEqual:_color2]) {`


    `_color2 = c;`


    `[self setNeedsDisplay:YES];`


    `}`


    `}`


    One thing to note is the `[self setNeedsDisplay:YES]` call. We’ll get into this
    more in later chapters covering drawing in Cocoa, but the basic idea is that when
    we want to draw some content in an `NSView`, we call this method, which sets a
    flag, and when our application is done processing whatever event it’s currently
    handling, it will look through the open windows to see if anyone has been flagged
    for redrawing, which leads to the eventual calling of the `drawRect:` method.


    Speaking of which, the only other method we need to implement in this class is
    the `drawRect:` method itself.


    `- (void)drawRect:(NSRect)dirtyRect`


    `{`


    `// don''t draw anything if we don''t have two valid colors.`


    `if (!self.color1 || !self.color2) return;`


    `CGColorRef cgColor1 = genericRGBWithNSColor(self.color1);`


    `CGColorRef cgColor2 = genericRGBWithNSColor(self.color2);`


    `CGContextRef myContext = [[NSGraphicsContext currentContext] graphicsPort];`


    `CGContextSaveGState(myContext);`


    `CGContextSetFillColorWithColor(myContext, cgColor1);`


    `CGContextSetBlendMode(myContext, kCGBlendModeNormal);`


    `CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));`


    `CGContextSetFillColorWithColor(myContext, cgColor2);`


    `CGContextSetBlendMode(myContext, self.blendMode);`'
