    `@property (weak) IBOutlet NSImageView *mugshotView;`


    `@property (weak) IBOutlet NSTextView *notesView;`


    `@end`


    That covers the outlets, so now let’s do the actions. The process will be much
    the same; we’ll start with the Name text field again. Control-drag from the Name
    text field out to the code, but this time when we release the mouse, change the
    first field in the contextual window from “Outlet” to “Action.” Once that’s done,
    drag out a connection for each of the remaining UI elements. Enter the action
    name with the prefix “take”: “takeName,” “takeLastKnownLocation, and so on. For
    the two matrices of buttons, Primary Motivation and Powers, make sure to connect
    from the matrix itself and not one of the button cells inside the matrix. The
    window should look like Figure [5-17](#A978-1-4302-4543-8_5_Chapter.html#Fig17).


    ![A978-1-4302-4543-8_5_Fig17_HTML.jpg](A978-1-4302-4543-8_5_Fig17_HTML.jpg)


    Figure 5-17.


    Adding the takeSwornEnemy action


    When done, the code in the Assistant Editor should now look like this:


    `#import <Cocoa/Cocoa.h>`


    `@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet NSTextField *nameView;`


    `@property (weak) IBOutlet NSTextField *lastKnownLocationView;`


    `@property (weak) IBOutlet NSDatePicker *lastSeenDateView;`


    `@property (weak) IBOutlet NSComboBox *swornEnemyView;`


    `@property (weak) IBOutlet NSLevelIndicator *evilnessView;`


    `@property (weak) IBOutlet NSMatrix *powersView;`


    `@property (weak) IBOutlet NSPopUpButton *powerSourceView;`


    `@property (weak) IBOutlet NSMatrix *primaryMotivationView;`


    `@property (weak) IBOutlet NSImageView *mugshotView;`


    `@property (weak) IBOutlet NSTextView *notesView;`


    `- (IBAction)takeName:(id)sender;`


    `- (IBAction)takeLastKnownLocation:(id)sender;`


    `- (IBAction)takeLastSeenDate:(id)sender;`


    `- (IBAction)takeSwornEnemy:(id)sender;`


    `- (IBAction)takeEvilness:(id)sender;`


    `- (IBAction)takePowers:(id)sender;`


    `- (IBAction)takePowerSource:(id)sender;`


    `- (IBAction)takePrimaryMotivation:(id)sender;`


    `- (IBAction)takeMugshot:(id)sender;`


    `@end`


    It’s OK if the properties and methods are in a different order than you see here,
    as long as they’re there. You may also notice that one thing seems to be missing
    here: there is no action method defined for the `NSTextView` used for editing
    the notes attribute. The reason for this is that `NSTextView` doesn’t actually
    work with the target/action paradigm. Instead, it informs its delegate when changes
    are made to its content. We’ll implement that delegate call later when we also
    implement all these action methods.


    Switch the Assistant Editor pane to the `VillainTrackerAppDelegate.m` file so
    that the class’s implementation is visible. Xcode has stubbed out empty methods
    for each of the actions.


    `#import "VillainTrackerAppDelegate.h"`


    `@implementation VillainTrackerAppDelegate`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `// Insert code here to initialize your application`


    `}`


    `- (IBAction)takeName:(id)sender {`


    `}`


    `- (IBAction)takeLastKnownLocation:(id)sender {`


    `}`


    `- (IBAction)takeLastSeenDate:(id)sender {`


    `}`


    `- (IBAction)takeSwornEnemy:(id)sender {`


    `}`


    `- (IBAction)takeEvilness:(id)sender {`


    `}`


    `- (IBAction)takePowers:(id)sender {`


    `}`


    `- (IBAction)takePowerSource:(id)sender {`


    `}`


    `- (IBAction)takePrimaryMotivation:(id)sender {`


    `}`


    `- (IBAction)takeMugshot:(id)sender {`


    `}`


    `@end`


    Note that if you had to do some editing in the `.h` file to get it right, such
    as deleting a misnamed property or an outlet that should have been an action,
    you might need to do the corresponding cleanup here, too.


    We’ve got two last connections to make, which don’t involve creating code. As
    noted above, the text view is somewhat of a different beast. Unlike the other
    editable objects in our window, `NSTextView` is not a subclass of `NSControl`,
    which means that it doesn’t know anything about the target/action pattern. However,
    it does expose a lot of functionality through calls to methods in its delegate.
    Later on, we’ll implement some delegate methods inside `VillainTrackerAppDelegate`
    in order to get updated when the value of the text view changes. For now, just
    connect the text view’s delegate outlet to our `VillainTrackerAppDelegate` object
    in the Object dock on the left side of the Interface Builder Editing canvas. As
    when we made the outlet, this is slightly complicated by the fact that the text
    view is automatically contained inside an `NSScrollView`, which in turn is contained
    in the `NSBox` we created earlier, so we may need to click and double-click once
    or twice in order to actually select the text view itself and be able to draw
    a connection from it.


    Finally, we’re going to make one additional connection for the sake of our controller
    class. We want to be notified when the nib is loaded and the application itself
    is initialized and ready to interact with the user, so that the initial display
    can be prepared. This is done through the use of `NSApplication`’s delegate methods,
    so drag a connection from the Application object in the Object dock window to
    the `VillainTrackerAppDelegate`, and select Delegate from the contextual menu.'
  trans: "\n准备开始创建输出口\n\n首先，点击标注为 `Name:` 的标签旁边的文本字段。按住 Control 键拖动到助理编辑器窗格中的代码处，拉出一条蓝色线，正好位于现有属性\
    \ `window` 下方。拖动时，任何可以作为有效连接端点的位置都会在我们的鼠标下高亮显示。当我们在助理编辑器窗格中到达正确位置时，应该会出现一个小标记，指示\
    \ `Insert Outlet` 或 `Action`，如图 5-16 所示。松开鼠标按钮，代码中的该点上会出现一个小型上下文窗口，我们可以在此处命名输出口，并在必要时修改一些默认参数。对于此应用的输出口，我们无需更改默认设置。使用上述命名约定来命名输出口：对于保存姓名字段的输出口，将其命名为\
    \ `nameView`。\n\n![A978-1-4302-4543-8_5_Fig16_HTML.jpg](img/A978-1-4302-4543-8_5_Fig16_HTML.jpg)\n\
    \n**图 5-16.** 为 `VillainTracker` 添加第一个输出口\n\n某些 UI 组件由多个元素组成：复选框矩阵、单选按钮和文本视图。对于矩阵，请确保选中整个矩阵，而不是矩阵内的某个单元格。对于文本视图，我们面临相反的问题。文本视图包含在滚动视图中。请点击文本区域内部，直到仅文本部分高亮显示，而不是边缘的滚动条。用于创建输出口的弹出窗口应指示类型为\
    \ `NSTextView`。如果显示为 `NSScrollView`，请点击取消，并在 `Notes` 框中再次点击 `NSTextView`。\n\n\
    完成后，助理编辑器中的代码应如下所示：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface VillainTrackerAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet NSTextField *nameView;\n@property (weak) IBOutlet NSTextField\
    \ *lastKnownLocationView;\n@property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n\
    @property (weak) IBOutlet NSComboBox *swornEnemyView;\n@property (weak) IBOutlet\
    \ NSLevelIndicator *evilnessView;\n@property (weak) IBOutlet NSMatrix *powersView;\n\
    @property (weak) IBOutlet NSPopUpButton *powerSourceView;\n@property (weak) IBOutlet\
    \ NSMatrix *primaryMotivationView;\n@property (weak) IBOutlet NSImageView *mugshotView;\n\
    @property (weak) IBOutlet NSTextView *notesView;\n\n@end\n```\n\n这涵盖了输出口，现在我们来处理操作。过程大致相同；我们将再次从姓名字段开始。按住\
    \ Control 键从姓名字段拖动到代码中，但这次在松开鼠标时，将上下文窗口中的第一个字段从 `Outlet` 更改为 `Action`。完成后，为其余每个\
    \ UI 元素拖出连接。输入带有前缀 `take` 的操作名称：`takeName`、`takeLastKnownLocation` 等。对于两个按钮矩阵（Primary\
    \ Motivation 和 Powers），请确保从矩阵本身连接，而不是矩阵内部的某个按钮单元格。窗口应如图 5-17 所示。\n\n![A978-1-4302-4543-8_5_Fig17_HTML.jpg](img/A978-1-4302-4543-8_5_Fig17_HTML.jpg)\n\
    \n**图 5-17.** 添加 `takeSwornEnemy` 操作\n\n完成后，助理编辑器中的代码现在应如下所示：\n\n```\n#import\
    \ <Cocoa/Cocoa.h>\n\n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n\
    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet\
    \ NSComboBox *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
    @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
    \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
    @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet\
    \ NSTextView *notesView;\n\n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
    - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
    - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
    - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
    \n@end\n```\n\n只要属性和方法都存在，它们的顺序与这里看到的不同也没关系。你可能还会注意到这里似乎缺少了一件事：没有为用于编辑备注属性的 `NSTextView`\
    \ 定义操作方法。原因是 `NSTextView` 实际上并不与目标/操作范式配合使用。相反，它会在其内容发生更改时通知其委托。我们将在稍后实现所有这些操作方法时，实现该委托调用。\n\
    \n将助理编辑器窗格切换到 `VillainTrackerAppDelegate.m` 文件，以便可以查看类的实现。Xcode 已为每个操作提供了空方法存根。\n\
    \n```\n#import \"VillainTrackerAppDelegate.h\"\n\n@implementation VillainTrackerAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n \
    \   // 在此处插入代码以初始化你的应用\n}\n\n- (IBAction)takeName:(id)sender {\n\n}\n\n- (IBAction)takeLastKnownLocation:(id)sender\
    \ {\n\n}\n\n- (IBAction)takeLastSeenDate:(id)sender {\n\n}\n\n- (IBAction)takeSwornEnemy:(id)sender\
    \ {\n\n}\n\n- (IBAction)takeEvilness:(id)sender {\n\n}\n\n- (IBAction)takePowers:(id)sender\
    \ {\n\n}\n\n- (IBAction)takePowerSource:(id)sender {\n\n}\n\n- (IBAction)takePrimaryMotivation:(id)sender\
    \ {\n\n}\n\n- (IBAction)takeMugshot:(id)sender {\n\n}\n\n@end\n```\n\n请注意，如果你必须在\
    \ `.h` 文件中进行一些编辑以使其正确，例如删除命名错误的属性或应该是操作但实际是输出口的内容，那么你可能也需要在此处进行相应的清理。\n\n我们还有最后两个连接要做，它们不涉及创建代码。如上所述，文本视图有点与众不同。与窗口中的其他可编辑对象不同，`NSTextView`\
    \ 不是 `NSControl` 的子类，这意味着它不了解目标/操作模式。然而，它确实通过对其委托的方法调用公开了许多功能。稍后，我们将在 `VillainTrackerAppDelegate`\
    \ 中实现一些委托方法，以便在文本视图的值更改时获得更新。现在，只需将文本视图的委托输出口连接到 Interface Builder 编辑画布左侧对象停靠栏中的\
    \ `VillainTrackerAppDelegate` 对象。与我们创建输出口时一样，这会稍微复杂一些，因为文本视图自动包含在 `NSScrollView`\
    \ 中，而 `NSScrollView` 又包含在我们之前创建的 `NSBox` 中，因此我们可能需要单击并双击一两次才能实际选中文本视图本身，并能够从中拖出连接。\n\
    \n最后，为了我们控制器类的需要，我们将建立另一个连接。我们希望在 nib 文件加载完成且应用程序本身初始化并准备好与用户交互时收到通知，以便可以准备初始显示。这是通过使用\
    \ `NSApplication` 的委托方法完成的，因此从对象停靠栏窗口中的 Application 对象拖动一个连接到 `VillainTrackerAppDelegate`，然后从上下文菜单中选择\
    \ Delegate。\n"
- fmt: '我们已经完成了大量的“Control-拖拽”操作，确保连接按预期设置是良好的实践。检查连接的最佳方式是在 Xcode 中查看“连接检查器”。在“Interface
    Builder 编辑器”左侧边缘的“对象”停靠栏中，选择悬停时显示名称 `Villain Tracker App Delegate` 的蓝色框。然后选择“连接检查器”（`⌥⌘6`）以在“实用工具”区域中显示。涉及应用程序代理的连接应类似于图
    [5-18](#A978-1-4302-4543-8_5_Chapter.html#Fig18) 中显示的内容。这显示了所有我们已连接的输出口（outlets）和动作（actions），以及引用应用代理的对象。如果建立连接时尝试了不止一次，或者创建输出口时本意是创建动作，你也可能会在这里看到一些需要删除的多余连接。你可以将鼠标悬停在此处列出的连接上，以在“Interface
    Builder 编辑器”窗格中高亮显示已连接的对象，也可以单击右列中的小“x”图标来断开连接。


    ![A978-1-4302-4543-8_5_Fig18_HTML.jpg](A978-1-4302-4543-8_5_Fig18_HTML.jpg)


    *图 5-18*. 与 `VillainTrackerAppDelegate` 之间的连接


    在开始实现动作之前，我们还需要拼图的最后一块。我们将开始为本应用将要使用的模型类铺平道路。在真实应用中，你会为反派对象拥有一个合适的模型类，比如包含从文件或数据库加载和保存的功能，在后续章节中，你将看到如何使用
    Core Data 来实现这一点。但对于这个应用，我们主要关注 GUI 组件是如何连接和使用的，因此我们将保持简单，使用 `NSMutableDictionary`
    来表示每个反派对象。`NSMutableDictionary` 非常适合这项任务，因为它使我们能够轻松地存储和检索任何类型的值，并且不需要为每个值预定义方法，因为值是使用简单的字符串作为键来访问的。


    为了将其添加到类中，我们将在 `notesView` 属性下方声明一个名为 `villain` 的新属性。由于我们将在类内部管理这个属性，因此必须将其标记为
    `strong` 而不是 `weak`。头文件应如下所示（我们现在添加的代码以粗体显示）：


    ```

    #import <Cocoa/Cocoa.h>


    @interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *nameView;

    @property (weak) IBOutlet NSTextField *lastKnownLocationView;

    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;

    @property (weak) IBOutlet NSComboBox *swornEnemyView;

    @property (weak) IBOutlet NSLevelIndicator *evilnessView;

    @property (weak) IBOutlet NSMatrix *powersView;

