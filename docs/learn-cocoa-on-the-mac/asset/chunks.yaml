    project directory and added to the list of files. We can also have Xcode utilize
    a file that lives outside the project directory, but for now we want to have everything
    in one place.


    ## Property Lists


    `Info.plist` is a special kind of file known as a property list. Property lists
    are used extensively throughout OS X. Although end users rarely see them, they
    are used in many parts of Cocoa development, so you will see them a lot.


    Property list files are made up of a list of entries. Each entry is made up of
    a key and a value. Figure [2-16](#A978-1-4302-4543-8_2_Chapter.html#Fig16) shows
    Xcode’s built-in Property List Editor, editing the file `Chapter2-Info.plist`.
    Each row represents a single entry. As you can see, the Property List consists
    of three columns. The left column is labeled Key and the right column is labeled
    Value. The middle column, labeled Type, indicates the data type; most property
    list values are Strings, but other types may be seen from time to time.


    Note


    Property lists also have the ability to store multiple values under a single key.
    It is possible to store either an array (or list) of items under a single key,
    or even to store another whole set of keys and values under one key. It’ll be
    a while before you need that functionality, but we figured you should know it
    was possible.


    In Figure [2-16](#A978-1-4302-4543-8_2_Chapter.html#Fig16), the entry with the
    key Icon file is highlighted. Note that the Icon file entry in the Property List
