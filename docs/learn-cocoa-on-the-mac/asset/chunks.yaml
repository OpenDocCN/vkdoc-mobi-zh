  trans: '

    ## 连接 `VillainTrackerAppDelegate` 类


    当我们创建 `VillainTracker` 项目时，Xcode 自动生成了一个名为 `VillainTrackerAppDelegate` 的类。我们将在这个类中添加代码，使其与用户界面控件建立连接，从而在模型-视图-控制器架构中成为“控制器”。更复杂的应用程序可能会有多个控制器类，但对于像这样与单个窗口及应用程序本身交互的简单应用，一个控制器就已足够。我们将添加的代码大部分会以输出口和操作的形式呈现，正如上一章所讨论的。这个控制器将包含指向
    GUI 中所有对象的输出口（以便在需要时随时设置和获取视图对象中的值），以及供这些对象在用户每次编辑值时通知控制器的操作方法。


    请记住，输出口不过是一个带有特殊标记的属性或实例变量，而操作则是任何符合特定签名的方法，该方法接受一个 `id` 类型的参数并返回 void。请注意，在源代码中，操作的返回类型通常标记为
    `IBAction` 而非 void。`IBAction` 实际上与 void 相同，因此对编译器而言并无区别。现在，假设我们有一份设计文档，其中指定了多个反派角色的属性及其类型。根据这些属性的类型和用途，我们可以将每个属性映射到合适的
    GUI 类（见表 5-1）。


    **表 5-1.** 反派角色属性与 GUI 类映射


    | 属性名称 | 类型 | 视图类 |

    | --- | --- | --- |

    | Name | 字符串（自由输入） | `NSTextField` |

    | `lastKnownLocation` | 字符串（自由输入） | `NSTextField` |

    | `lastSeenDate` | 日期 | `NSDatePicker` |

    | `swornEnemy` | 字符串（自由输入，但可从现有列表中选择） | `NSComboBox` |

    | `primaryMotivation` | 字符串（从预定义列表中选择） | `NSMatrix`（包含单选按钮） |

    | Powers | 字符串数组（从预定义列表中选择） | `NSMatrix`（包含复选框） |

    | `powerSource` | 字符串（从预定义列表中选择） | `NSPopUpButton` |

    | Evilness | 数字（0–10） | `NSLevelIndicator` |

    | Mugshot | 图像 | `NSImageView` |

    | Notes | 字符串（可能较长） | `NSTextView` |


    基于此规范，我们将为每个 GUI 控件在 `VillainTrackerAppDelegate` 中添加一个输出口和一个操作。输出口允许我们在必要时访问控件并设置或获取其值，而每个控件将调用相应的操作方法，在其内容发生变化时通知我们。为了使代码易于理解，我们将为输出口采用特定的命名约定：属性名称后加上字符串“View”作为后缀。例如，对于名为
    `lastSeenDate` 的属性，我们将有一个名为 `lastSeenDateView` 的输出口。同样，对于操作，我们将使用动词“take”作为前缀。对于属性
    `lastSeenDate`，我们的操作将命名为 `takeLastSeenDate`。


    将输出口添加到代码中可以通过手动创建属性或实例变量来实现，但更简单的方法是按住 Control 键从 nib 文件拖拽到代码窗口。为此，我们首先需要一个包含代码的窗格。点击主
    Xcode 窗口工具栏右侧编辑器图标组中的“助手”按钮（外观像一个管家躯干）。在此过程中，让 nib 文件在 Xcode 左侧打开，代码编辑器在右侧打开，如图
    5-15 所示。我们可以通过选择“视图”➤“助手编辑器”下的首选位置，将助手窗口放置在任意一侧。如果尚未打开，请在助手编辑器窗格中打开 `VillainTrackerAppDelegate.h`
    文件。为此，点击窗格顶部的小管家图标，它应出现在“自动”选项下。


    ![A978-1-4302-4543-8_5_Fig15_HTML.jpg](img/A978-1-4302-4543-8_5_Fig15_HTML.jpg)


    **图 5-15.**

    '
- fmt: "Ready to start creating outlets\n\nTo start, click the text field next to\
    \ the label that reads `Name:`. Control-drag over to the code in the Assistant\
    \ Editor pane, dragging out a blue line to just underneath the existing property\
    \ named `window`. As we drag, anything that could be a valid connection endpoint\
    \ will highlight under our mouse. When we get to the right spot in the Assistant\
    \ Editor pane, a small flag should appear indicating `Insert Outlet` or `Action`\
    \ as shown in Figure [5-16](#A978-1-4302-4543-8_5_Chapter.html#Fig16). Release\
    \ the mouse button and a small contextual window appears over that point in the\
    \ code where we can name the outlet and modify some of the default parameters\
    \ if necessary. We won’t need to change the defaults for the outlets for this\
    \ app. Name the outlets using the naming convention above: for the field holding\
    \ the name, name the outlet `nameView`.\n\n![A978-1-4302-4543-8_5_Fig16_HTML.jpg](A978-1-4302-4543-8_5_Fig16_HTML.jpg)\n\
    \n**Figure 5-16.** Adding the first outlet to `VillainTracker`\n\nSome of the\
    \ UI components are made up of several elements: the matrix of checkboxes, the\
    \ radio buttons, and the text view. For the matrices, make sure the whole matrix\
    \ is selected and not one of the cells within the matrix. For the text view, we\
    \ have the opposite problem. The text view is contained within a scroll view.\
    \ Click inside the text area until just the text part is highlighted, and not\
    \ the scroll bar on the edge. The pop-up window for creating the outlet should\
    \ indicate a type of `NSTextView`. If it says `NSScrollView`, hit Cancel and click\
    \ one more time on the `NSTextView` in the Notes box.\n\nWhen done, the code in\
    \ the Assistant Editor should look like this:\n\n```\n#import <Cocoa/Cocoa.h>\n\
    \n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\n\
    @property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n\
    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet\
    \ NSComboBox *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
    @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
    \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
    @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet\
    \ NSTextView *notesView;\n\n@end\n```\n\nThat covers the outlets, so now let’s\
    \ do the actions. The process will be much the same; we’ll start with the Name\
    \ text field again. Control-drag from the Name text field out to the code, but\
    \ this time when we release the mouse, change the first field in the contextual\
    \ window from `Outlet` to `Action`. Once that’s done, drag out a connection for\
    \ each of the remaining UI elements. Enter the action name with the prefix `take`:\
    \ `takeName`, `takeLastKnownLocation`, and so on. For the two matrices of buttons,\
    \ Primary Motivation and Powers, make sure to connect from the matrix itself and\
    \ not one of the button cells inside the matrix. The window should look like Figure\
    \ [5-17](#A978-1-4302-4543-8_5_Chapter.html#Fig17).\n\n![A978-1-4302-4543-8_5_Fig17_HTML.jpg](A978-1-4302-4543-8_5_Fig17_HTML.jpg)\n\
    \n**Figure 5-17.** Adding the `takeSwornEnemy` action\n\nWhen done, the code in\
    \ the Assistant Editor should now look like this:\n\n```\n#import <Cocoa/Cocoa.h>\n\
    \n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\n\
    @property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n\
    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet\
    \ NSComboBox *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
    @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
    \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
    @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet\
    \ NSTextView *notesView;\n\n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
    - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
    - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
    - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
    \n@end\n```\n\nIt’s OK if the properties and methods are in a different order\
    \ than you see here, as long as they’re there. You may also notice that one thing\
    \ seems to be missing here: there is no action method defined for the `NSTextView`\
    \ used for editing the notes attribute. The reason for this is that `NSTextView`\
    \ doesn’t actually work with the target/action paradigm. Instead, it informs its\
    \ delegate when changes are made to its content. We’ll implement that delegate\
    \ call later when we also implement all these action methods.\n\nSwitch the Assistant\
    \ Editor pane to the `VillainTrackerAppDelegate.m` file so that the class’s implementation\
    \ is visible. Xcode has stubbed out empty methods for each of the actions.\n\n\
    ```\n#import \"VillainTrackerAppDelegate.h\"\n\n@implementation VillainTrackerAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n \
    \   // Insert code here to initialize your application\n}\n\n- (IBAction)takeName:(id)sender\
    \ {\n\n}\n\n- (IBAction)takeLastKnownLocation:(id)sender {\n\n}\n\n- (IBAction)takeLastSeenDate:(id)sender\
    \ {\n\n}\n\n- (IBAction)takeSwornEnemy:(id)sender {\n\n}\n\n- (IBAction)takeEvilness:(id)sender\
    \ {\n\n}\n\n- (IBAction)takePowers:(id)sender {\n\n}\n\n- (IBAction)takePowerSource:(id)sender\
    \ {\n\n}\n\n- (IBAction)takePrimaryMotivation:(id)sender {\n\n}\n\n- (IBAction)takeMugshot:(id)sender\
    \ {\n\n}\n\n@end\n```\n\nNote that if you had to do some editing in the `.h` file\
    \ to get it right, such as deleting a misnamed property or an outlet that should\
    \ have been an action, you might need to do the corresponding cleanup here, too.\n\
    \nWe’ve got two last connections to make, which don’t involve creating code. As\
    \ noted above, the text view is somewhat of a different beast. Unlike the other\
    \ editable objects in our window, `NSTextView` is not a subclass of `NSControl`,\
    \ which means that it doesn’t know anything about the target/action pattern. However,\
    \ it does expose a lot of functionality through calls to methods in its delegate.\
    \ Later on, we’ll implement some delegate methods inside `VillainTrackerAppDelegate`\
    \ in order to get updated when the value of the text view changes. For now, just\
    \ connect the text view’s delegate outlet to our `VillainTrackerAppDelegate` object\
    \ in the Object dock on the left side of the Interface Builder Editing canvas.\
    \ As when we made the outlet, this is slightly complicated by the fact that the\
    \ text view is automatically contained inside an `NSScrollView`, which in turn\
    \ is contained in the `NSBox` we created earlier, so we may need to click and\
    \ double-click once or twice in order to actually select the text view itself\
    \ and be able to draw a connection from it.\n\nFinally, we’re going to make one\
    \ additional connection for the sake of our controller class. We want to be notified\
    \ when the nib is loaded and the application itself is initialized and ready to\
    \ interact with the user, so that the initial display can be prepared. This is\
    \ done through the use of `NSApplication`’s delegate methods, so drag a connection\
    \ from the Application object in the Object dock window to the `VillainTrackerAppDelegate`,\
    \ and select Delegate from the contextual menu."
  raw: 'Ready to start creating outlets


    To start, click the text field next to the label that reads Name:. Control-drag
    over to the code in the Assistant Editor pane, dragging out a blue line to just
    underneath the existing property named window. As we drag, anything that could
    be a valid connection endpoint will highlight under our mouse. When we get to
    the right spot in the Assistant Editor pane, a small flag should appear indicating
    Insert Outlet or Action as shown in Figure [5-16](#A978-1-4302-4543-8_5_Chapter.html#Fig16).
    Release the mouse button and a small contextual window appears over that point
    in the code where we can name the outlet and modify some of the default parameters
    if necessary. We won’t need to change the defaults for the outlets for this app.
    Name the outlets using the naming convention above: for the field holding the
    name, name the outlet “nameView.”


    ![A978-1-4302-4543-8_5_Fig16_HTML.jpg](A978-1-4302-4543-8_5_Fig16_HTML.jpg)


    Figure 5-16.


    Adding the first outlet to VillainTracker


    Some of the UI components are made up of several elements: the matrix of checkboxes,
    the radio buttons, and the text view. For the matrices, make sure the whole matrix
    is selected and not one of the cells within the matrix. For the text view, we
    have the opposite problem. The text view is contained within a scroll view. Click
    inside the text area until just the text part is highlighted, and not the scroll
    bar on the edge. The pop-up window for creating the outlet should indicate a type
    of `NSTextView`. If it says `NSScrollView`, hit Cancel and click one more time
    on the `NSTextView` in the Notes box


    When done, the code in the Assistant Editor should look like this:


    `#import <Cocoa/Cocoa.h>`


    `@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@property (weak) IBOutlet NSTextField *nameView;`


    `@property (weak) IBOutlet NSTextField *lastKnownLocationView;`


    `@property (weak) IBOutlet NSDatePicker *lastSeenDateView;`


    `@property (weak) IBOutlet NSComboBox *swornEnemyView;`


    `@property (weak) IBOutlet NSLevelIndicator *evilnessView;`


    `@property (weak) IBOutlet NSMatrix *powersView;`


