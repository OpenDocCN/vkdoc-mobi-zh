  trans: '

    ### GNUstep 与 Cocotron


    另一个可以运行类 Cocoa 应用的平台是 `GNUstep`，以及它较新的“战友”`Cocotron`。`GNUstep` 项目已经存在了很长时间，其最初的目标是为
    Linux 和其他 Unix 机器提供桌面应用程序编程环境。其开发库基于 `OpenStep` API，这是一个已发布的标准，列出了当今 `Foundation`
    和 `AppKit` 框架子集中的类和 API。而这又源于 1990 年代中期 NeXT 与 Sun 的合作，当时 Sun 希望获得帮助，为其 Solaris
    操作系统提供应用程序开发环境。所有这一切都早于苹果后来对 NeXT 的收购，而 NeXT 的操作系统和软件后来演变成了 Mac OS X。


    所以时至今日，`GNUstep` 仍然“活跃在野外”。`GNUstep` 持续发展，通过志愿者重新实现苹果添加到 Mac OS X 中的最新功能来获取新的
    API，但其主要目标始终是实现旧的 `OpenStep` API，新增内容只是锦上添花。目前，`GNUstep` 在知名项目方面还谈不上有什么值得炫耀的成果，但作为将
    Cocoa 应用移植到其他 Unix 变体或 Windows 的一种方式，[`www.gnustep.org`](http://www.gnustep.org)
    上的 `GNUstep` 值得关注。


    几年前，出现了一个名为 `Cocotron` 的新替代品。`Cocotron` 的侧重点略有不同（力图跟上苹果所有最新类和 API 的变化），部署目标也不同（主要专注于
    Windows 而非 Unix），但如果你打算将应用移植到 Windows，它也值得考虑。它的许可证也比 `GNUstep` 更宽松，这意味着你可以自由地将
    `Cocotron` 构建到自己的闭源应用程序中。`Cocotron` 的官方网站 [`www.cocotron.org`](http://www.cocotron.org)
    似乎已基本停止更新，但一些开发仍在进行，这可以从该项目在 Google Groups 上的讨论中得到证实，地址是 [`http://groups.google.com/group/cocotron-dev/`](http://groups.google.com/group/cocotron-dev/)。


    ### Cappuccino/Objective-J


    过去几年中另一个有趣的发展是 `Cappuccino` 开发环境。与我们提到的其他环境不同，`Cappuccino` 完全是关于制作 Web 应用，而非桌面应用。因此，`Cappuccino`
    应用并非在桌面上运行，而是托管在 Web 服务器上，在 Web 浏览器中运行。`Cappuccino` 开发完全是关于在客户端运行软件，使用在单个 HTML
    页面上下文中执行的 JavaScript，而不是像传统 Web 开发框架那样提供一页又一页的内容。


    `Cappuccino` 包含的类库在名称和功能上模仿了 `Foundation` 和 `AppKit` 的许多内容，甚至能够实现将 Objective-C
    的许多语法在 JavaScript 中实现这一惊人技巧，就像我们在提到 `JSCocoa` 时描述的那样。使用 `Cappuccino` 创建的应用程序可以发布到任何
    Web 服务器上，并在任何现代浏览器中运行，就像其他 Web 应用程序一样。这种在 JavaScript 中实现 Objective-C 的方式被称为 `Objective-J`，是使
    `Cappuccino` 能够运行的关键部分。


    `Cappuccino` 最初以一种奇怪的混合体形式起步，包含一个包含 JavaScript 框架的开源核心，以及一个原本计划成为商业 IDE 的名为 `Atlas`
    的工具，而 `Atlas` 本身就是一个 `Cappuccino` 应用程序。然而，在 `Atlas` 发布之前，支持这个想法的公司就被收购了。如今，这个开源项目已经扩展，包含了允许你直接在
    Xcode 的 Interface Builder 中为你的 `Cappuccino` 应用构建图形用户界面的工具。请访问 [`www.cappuccino-project.org`](http://www.cappuccino-project.org)
    了解最新动态。


    ## 在一切的终点


    以上结束了关于你在提升 Cocoa 技能过程中未来方向的讨论；这也为本书画上了句号。我们希望本书能带你到达你想去的地方，但请不要认为这个落脚点就是最终的目的地！请访问
    Mac 版 Cocoa 学习网站，在那里你可以找到与其他 Cocoa 开发者交流的论坛、本书所有示例的源代码以及更多内容。并且一定要访问我们的网站 [`http://learncocoa.org`](http://learncocoa.org)，我们将尽最大努力帮助你学到更多知识！

    '
