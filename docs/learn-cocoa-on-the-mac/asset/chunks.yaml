    \n`NSError` 的基本思想是：某些方法需要能够向调用者告知可能发生的错误，而不使用返回值作为此用途。要实现这一点，你传入一个指向 `NSError`\
    \ 指针的指针（用 C 语言的术语有时称为“句柄”），这样方法可以创建一个 `NSError` 对象并让指针指向它，大致如下：\n\n```\nNSError\
    \ *error = nil;\n[someObject doSomething:&error];\nif (error) {\n  // handle the\
    \ error somehow!\n}\n```\n\n关于 `NSError` 的更多细节，请参阅第 14 章。\n\n### `persistentStoreCoordinator`\
    \ 访问器方法\n\n接下来是相当长的 `persistentStoreCoordinator` 方法：\n\n```\n// Returns the persistent\
    \ store coordinator for the application. This implementation creates and returns\
    \ a coordinator, having added the store for the application to it. (The directory\
    \ for the store is created, if necessary.)\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\nif (_persistentStoreCoordinator) {\nreturn _persistentStoreCoordinator;\n}\n\
    NSManagedObjectModel *mom = [self managedObjectModel];\nif (!mom) {\nNSLog(@\"\
