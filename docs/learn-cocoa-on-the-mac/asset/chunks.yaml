    ### Standardizing Key Names


    Before we start writing actual code, it’s a good idea to come up with a way of
    standardizing the names of the keys that will be used for accessing attributes
    from the model objects. Whether in a case like ours, where the villain is stored
    in a dictionary whose attributes are accessible only by keys, or in a more complex
    situation using real model objects, standardizing key names is critical to ensure
    that we’re correctly accessing the attributes in our model objects.


    The technique we’re using here is a simple one: we use standard C preprocessor
    macros to define names that are replaced with `NSString` instances at compile
    time. This eliminates the potential problem of mistyping a key name and also adds
    the nice touch of working with the code-completion features in Xcode.


    The following code includes key names for all the villain attributes that we are
    using in our application. With these in place, instead of using an `NSString`
    literal in our code to reference an attribute by its key name, we can (and should)
    use the defined name instead. Put the following code somewhere at the top of the
    `VillainTrackerAppDelegate.m` file:


