    common key commands, like ⌘Q to quit. Our application’s main window can be moved
    around, minimized to the dock, and even closed. We can hide our application, or
    hide all the other applications. All of this functionality is ours for three easy
    payments of nothing, including shipping and handling. That is the power of Cocoa.
    If your computer already knows how to do something, you probably won’t have to
    write very much code to do that thing, and sometimes you won’t have to write any
    code at all.'
  trans: '

    ### 创建应用程序图标


    所有应用程序都需要图标。Mac OS X 使用一种特殊格式来保存图标，该格式将多张图片打包在一起，以便在缩放时以及配备 Retina 显示屏的设备上，能够提供多种尺寸和分辨率的图片。不过，Xcode
    会为我们准备好这种格式。我们只需恰当地命名图片，并将其放入一个扩展名为`.iconset`的文件夹中即可。


    命名约定非常直接。例如，图片名称可以是`icon_128x128@2x.png`。每张图片的名称以`icon_`开头，接着是分辨率，然后是一个可选的标记（用于指示高分辨率作品），最后是文件扩展名，例如`.png`。Cocoa
    使用的完整尺寸集包括 16×16、32×32、128×128、256×256 和 512×512。其中每种尺寸都可以选择添加`@2x`的高分辨率标记。请注意，尺寸单位是屏幕点，而不是像素；一个`512×512@2x`文件的实际像素尺寸为
    1024×1024。Cocoa 会判断我们的应用程序是否运行在配备 Retina 或其他高分辨率显示屏的 Mac 上，并根据屏幕的像素密度和所需尺寸，选择最佳的位图。如果我们没有提供
    Cocoa 所需的图片，它会自动对我们提供的其中一张图片进行缩放。我们可以为配备 Retina 显示屏的 Mac 提供一张细节丰富的大图，但缩放后的效果可能并不完全符合我们的预期。支持多张图片意味着我们可以针对较小的尺寸，精心调整图标的外观。


    我们需要在图像编辑程序中开始制作图标，例如 Photoshop、Pixelmator 或 GIMP。原始文件的尺寸应为 1024×1024 像素，并保存为支持
    Alpha 通道（透明度）的标准图像格式，如 TIFF、PSD 或 PNG。在本例中，我们将使用`.png`文件。将其保存为`icon_512x512@2x.png`。然后，我们可以使用最适合的方法对图像进行等比缩小。通常的做法是使用图像编辑器的缩放功能，然后在必要时手动进行微调。


    为了省去您自己创建图标的麻烦，我们提供了一个`hello world.iconset`文件夹，其中包含您可以添加到项目中的图片。您可以在第 2 章的下载项目文件中找到这个文件夹。如果您想自己动手制作，也完全可以，请按照`hello
    world.iconset`文件夹中的命名规范来命名您的图片。


    ### 向项目中添加图标


    无论您是自行创建了图标，还是使用我们提供的图标，现在需要将其添加到 Xcode 项目中。为此，请在屏幕左侧的导航器区域选择项目。它是项目导航器视图中的最顶部项；在我们的例子中，它标记为“Chapter2”。项目的概要信息将显示在窗口中央的编辑区域，并且应已选中
    Chapter2 目标。将`hello world.iconset`文件夹从 Finder 拖拽到窗口中央的 Xcode 应用图标槽中，如图 2-15 所示。这告诉
    Xcode 我们希望将此文件导入到项目中。


    ![A978-1-4302-4543-8_2_Fig15_HTML.jpg](img/A978-1-4302-4543-8_2_Fig15_HTML.jpg)


    图 2-15. 将文件拖拽到应用图标槽以将图标添加到 Xcode 项目


    松开鼠标按钮后，`.iconset`文件将被复制到项目目录中，并添加到文件列表中。我们也可以让 Xcode 使用项目目录之外的文件，但目前我们希望将所有内容都放在同一位置。


    ### 属性列表


    `Info.plist`是一种特殊的文件，称为属性列表。属性列表在 OS X 中被广泛使用。虽然终端用户很少看到它们，但它们用于 Cocoa 开发的许多部分，因此您会经常遇到它们。


    属性列表文件由一系列条目组成。每个条目由一个键和一个值构成。图 2-16 显示了 Xcode 内置的属性列表编辑器，正在编辑`Chapter2-Info.plist`文件。每一行代表一个单独的条目。如您所见，属性列表包含三列。左列标记为“键”，右列标记为“值”。中间列标记为“类型”，指示数据类型；大多数属性列表值是字符串，但偶尔也会看到其他类型。


    > 注意：属性列表还能够在单个键下存储多个值。可以在一个键下存储一个项目数组（或列表），甚至可以在一个键下存储另一整套键值对。您暂时还不需要用到这个功能，但我们认为您应该知道它是可行的。


    在图 2-16 中，键为`Icon file`的条目已被高亮显示。请注意，属性列表中的`Icon file`条目已被自动设置为我们导入的`iconset`目录。


    ![A978-1-4302-4543-8_2_Fig16_HTML.jpg](img/A978-1-4302-4543-8_2_Fig16_HTML.jpg)


    图 2-16. 在编辑窗格中打开的`Chapter2-Info.plist`，以便我们查看此应用程序图标文件的名称


    准备好编写一些代码了吗？猜猜看？实际上无需编写任何代码。我们的应用程序已经完成了。


    ### 运行应用程序


    通过点击 Xcode 窗口左上角的“运行”按钮来构建并运行您的应用程序。Xcode 将构建我们的应用程序（可能需要一些时间），然后运行它。屏幕上应该会出现一个窗口，其中包含我们居中的彩色标签。如果我们查看
    Mac 主屏幕底部的程序坞，会看到我们的应用程序以我们导入的图标显示在项目列表中。不过，等等：还有更多功能！


    从 Chapter2 菜单中选择“关于 Chapter2”，关于对话框就会出现（图 2-17）。我们不仅免费获得了一个关于对话框，而且它还包含我们的图标。


    ![A978-1-4302-4543-8_2_Fig17_HTML.jpg](img/A978-1-4302-4543-8_2_Fig17_HTML.jpg)


    图 2-17. 我们的应用程序在多个地方使用了我们的图标，包括关于对话框


    我们还没完。将鼠标移到应用程序主窗口中的“Hello, World!”文字上。光标应该会从箭头变为文本光标。因为我们使标签可选中，Cocoa 会自动改变光标，以此提示用户他们可以选择这段文本。继续双击“Hello”这个词，它会被高亮显示。现在，如果我们选择“编辑”菜单，会看到“复制”菜单项不再是灰色不可用的。如果选择它，我们的程序会将“Hello”这个词复制到剪贴板，然后我们可以将其粘贴到任何其他接受文本的应用程序中。在“Hello”仍被选中的状态下，选择“编辑”菜单，然后选择“语音”子菜单，并选择“开始朗读”。应用程序将使用您
    Mac 的文本转语音功能朗读“Hello”。


    无需编写任何代码，我们的应用程序就支持将文本复制到剪贴板和文本转语音功能。几乎不费吹灰之力，我们的应用程序就像真正的 Mac 应用程序一样运行，拥有窗口和菜单栏，并且能响应常见的键盘命令，例如⌘Q
    退出。我们的应用程序主窗口可以被移动、最小化到程序坞，甚至可以被关闭。我们可以隐藏我们的应用程序，或者隐藏所有其他应用程序。所有这些功能，我们都可以不费吹灰之力地获得，包括运输和手续费。这就是
    Cocoa 的强大之处。如果您的计算机已经知道如何做某件事，那么您很可能不需要编写很多代码就能实现它，有时甚至完全不需要编写任何代码。

    '
- fmt: '# Sharing Our Creation With the World


    Quit Hello, World. There’s one last thing we want to cover. We’ve now created
    the application, but where is it? What if we want to give (or sell) our application
    to others so they can run it on their machine?


    First of all, we need to compile our application a little differently if we want
    to let others use it. In Xcode, if we click the `Product` menu, we’ll see the
    five different ways that Xcode will build our app: `Run`, `Test`, `Profile`, `Analyze`,
    and `Archive`. To distribute the app, we’ll need to do an `Archive` build. Select
    `Archive` now, and we’ll let Xcode compile the app again. This time, however,
    instead of running the app, we’ll see the `Archives` tab of the `Organizer` window
    after the build is complete (Figure [2-18](#A978-1-4302-4543-8_2_Chapter.html#Fig18)).


    ![A978-1-4302-4543-8_2_Fig18_HTML.jpg](A978-1-4302-4543-8_2_Fig18_HTML.jpg)


    Figure 2-18. Xcode’s Archives window


    To prepare the application for distribution, click the `Distribute` button and
    indicate that we want to export as an `Application`. The other options, submitting
    to the App Store and exporting as a Developer ID-signed application, can be ignored
    for now. Click `Next` and Xcode will prompt us for a `Code Signing Identity`.
    Indicate `Don’t Re-sign` and hit `Next` again. Xcode will ask where we want to
    save the application. Open up that folder in Finder, and we’ll see our program.


    But that’s not all. Every time we do an archive build, Xcode will keep a copy
    of that build around for our future reference. It doesn’t keep the source in the
    archive (our source code control system does that), but if we have multiple releases
    of a program to support, it’s useful to have a copy of the exact bits that were
    distributed. We can, of course, clean this up when old builds are no longer useful.


    Before we leave this topic, you should understand a little bit about build configurations.
    Each of the different options under the `Product` menu is tied to a build configuration.
    Xcode starts with two configurations for new projects: `Debug` and `Release`.
    By default, when we’re working in Xcode, we’re working in the `Debug` configuration.
    When we build an application this way, Xcode builds it with extra stuff to make
    it easier to troubleshoot our application. These debug symbols allow us, for example,
    to examine and change the values of different variables while the program is running,
    or to step through the source code line by line using the debugger. When we click
    the `Run` button, we’re getting the `Debug` configuration.


    The `Archive` build process, on the other hand, uses the `Release` configuration.
    The `Release` configuration doesn’t include debugging information, and it does
    more optimization of the resulting program. It can also be configured to do multi-architecture
    builds for generating both 32-bit and 64-bit x86 binaries, which also slows down
    the build process. We’ll generally want to do this when preparing the app for
    someone else to run, but not when actively developing it. We can define additional
    configurations when necessary, but we don’t need to do that for this application.


    Congratulations! You’re a developer. That’s a full-fledged application you’re
    looking at, just like all the ones in your `Applications` folder. You can e-mail
    it to your Aunt Bessie or your best friend to show off the fact that you are now
    a bona fide Mac OS X application developer.


    ## Goodbye, Hello World


    In this chapter, we introduced to Xcode, the powerhouse of Cocoa software creation
    tools. We designed a full-fledged application without writing a single line of
    code. We learned how to add a text label to our application’s main window, changed
    the label attributes, gave our application an icon, and even saw how to build
    a distributable version of our application.


    In this chapter, we got our first taste of the power of Cocoa by seeing what we
    can do without writing any code. In the next chapters, we’ll see how powerful
    things start to get when we actually do write some code.


    # 3. Lights, Camera … Actions! (and Outlets, too)


    After we get through a bit of theory, we’re going to build an application. Our
    application will have a single window with a label, a text field, and a slider.
    When the user moves the slider, the text field will automatically update itself
    to reflect the value of the slider. In this chapter, we still won’t be writing
    any code; everything will be done using Interface Builder—but sit tight because
    we’ll be breaking out the Objective-C compiler in the next chapter. The way that
    Cocoa user interfaces interact with application code is the way that Cocoa controls
    interact with each other. We’ll start by wiring Cocoa controls to each other in
    order to see how it’s done, and in the next chapter we’ll start wiring them to
    our own code.


    The application is simple, but the mechanisms used to create it are the same ones
    that you will use in nearly all user interaction in Cocoa, so it’s important that
    you understand what we’re doing in this chapter.'
  raw: '## Sharing Our Creation With the World


    Quit Hello, World. There’s one last thing we want to cover. We’ve now created
    the application, but where is it? What if we want to give (or sell) our application
    to others so they can run it on their machine?


    First of all, we need to compile our application a little differently if we want
    to let others use it. In Xcode, if we click the Product menu, we’ll see the five
    different ways that Xcode will build our app: Run, Test, Profile, Analyze, and
    Archive. To distribute the app, we’ll need to do an Archive build. Select Archive
    now, and we’ll let Xcode compile the app again. This time, however, instead of
    running the app, we’ll see the Archives tab of the Organizer window after the
    build is complete (Figure [2-18](#A978-1-4302-4543-8_2_Chapter.html#Fig18)).


    ![A978-1-4302-4543-8_2_Fig18_HTML.jpg](A978-1-4302-4543-8_2_Fig18_HTML.jpg)


    Figure 2-18.


    Xcode’s Archives window


    To prepare the application for distribution, click the Distribute button and indicate
    that we want to export as an Application. The other options, submitting to the
    App Store and exporting as a Developer ID-signed application, can be ignored for
    now. Click Next and Xcode will prompt us for a Code Signing Identity. Indicate
    Don’t Re-sign and hit Next again. Xcode will ask where we want to save the application.
    Open up that folder in Finder, and we’ll see our program.


    But that’s not all. Every time we do an archive build, Xcode will keep a copy
    of that build around for our future reference. It doesn’t keep the source in the
    archive (our source code control system does that), but if we have multiple releases
    of a program to support, it’s useful to have a copy of the exact bits that were
    distributed. We can, of course, clean this up when old builds are no longer useful.


    Before we leave this topic, you should understand a little bit about build configurations.
    Each of the different options under the Product menu is tied to a build configuration.
    Xcode starts with two configurations for new projects: Debug and Release. By default,
    when we’re working in Xcode, we’re working in the Debug configuration. When we
    build an application this way, Xcode builds it with extra stuff to make it easier
    to troubleshoot our application. These debug symbols allow us, for example, to
    examine and change the values of different variables while the program is running,
    or to step through the source code line by line using the debugger. When we click
    the Run button, we’re getting the Debug configuration.


    The Archive build process, on the other hand, uses the Release configuration.
    The Release configuration doesn’t include debugging information, and it does more
    optimization of the resulting program. It can also be configured to do multi-architecture
    builds for generating both 32-bit and 64-bit x86 binaries, which also slows down
    the build process. We’ll generally want to do this when preparing the app for
    someone else to run, but not when actively developing it. We can define additional
    configurations when necessary, but we don’t need to do that for this application.


    Congratulations! You’re a developer. That’s a full-fledged application you’re
    looking at, just like all the ones in your Applications folder. You can e-mail
    it to your Aunt Bessie or your best friend to show off the fact that you are now
    a bona fide Mac OS X application developer.


    ## Goodbye, Hello World


    In this chapter, we introduced to Xcode, the powerhouse of Cocoa software creation
    tools. We designed a full-fledged application without writing a single line of
    code. We learned how to add a text label to our application’s main window, changed
    the label attributes, gave our application an icon, and even saw how to build
    a distributable version of our application.


    In this chapter, we got our first taste of the power of Cocoa by seeing what we
    can do without writing any code. In the next chapters, we’ll see how powerful
    things start to get when we actually do write some code.


    # 3. Lights, Camera … Actions! (and Outlets, too)


    Abstract


    After we get through a bit of theory, we’re going to build an application. Our
    application will have a single window with a label, a text field, and a slider.
    When the user moves the slider, the text field will automatically update itself
    to reflect the value of the slider. In this chapter, we still won’t be writing
    any code; everything will be done using Interface Builder—but sit tight because
    we’ll be breaking out the Objective-C compiler in the next chapter. The way that
    Cocoa user interfaces interact with application code is the way that Cocoa controls
    interact with each other. We’ll start by wiring Cocoa controls to each other in
    order to see how it’s done, and in the next chapter we’ll start wiring them to
    our own code.


    After we get through a bit of theory, we’re going to build an application. Our
    application will have a single window with a label, a text field, and a slider.
    When the user moves the slider, the text field will automatically update itself
    to reflect the value of the slider. In this chapter, we still won’t be writing
    any code; everything will be done using Interface Builder—but sit tight because
    we’ll be breaking out the Objective-C compiler in the next chapter. The way that
    Cocoa user interfaces interact with application code is the way that Cocoa controls
    interact with each other. We’ll start by wiring Cocoa controls to each other in
    order to see how it’s done, and in the next chapter we’ll start wiring them to
    our own code.


    The application is simple, but the mechanisms used to create it are the same ones
    that you will use in nearly all user interaction in Cocoa, so it’s important that
    you understand what we’re doing in this chapter.'
