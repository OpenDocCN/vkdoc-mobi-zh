    \n## 确定文件格式\n\n到达这一步后，您可能已经注意到，在保存文档时，一个弹出列表允许您选择将文件保存为二进制、SQLite 或 XML 格式，并且文件扩展名会相应设置。尽管这种灵活性在开发过程中可能有用，但对于发布的产品，您最好只选择一种格式并坚持使用，以免混淆用户。通常，SQLite\
    \ 对于大多数应用来说可能是最佳选择。您还应该将文件扩展名更改为能体现应用用途的名称，而不是使用默认扩展名。所有这些选项都在 Xcode 的目标设置中配置。返回\
