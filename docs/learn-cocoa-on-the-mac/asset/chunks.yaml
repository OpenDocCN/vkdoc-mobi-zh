    0.0 to 1.0\. We’ll also mark the window as “dirty” with `setNeedsDisplay:`, forcing
    the system to redraw it whenever a property changes.'
  trans: "\n返回对象库，拖出一个`Label`，将其放置在`CECurveView`下方。将标签的标题改为`X1:`。再拖出一个`文本字段`，放在标签旁边，直到蓝色辅助线显示对齐为止。同时选中标签和文本字段，然后按下`⌘D`复制它们。将复制的这组元素放在第一组下方，并将标签的标题改为`Y1:`。这个表单将显示贝塞尔曲线中第一个控制点的`x`和`y`值。为两个文本字段分别创建绑定。对于每个字段，我们都需要使用模型键路径`cp1X`和`cp1Y`，将其`Value`属性绑定到`CEAppDelegate`对象。\n\
    \n同时选中两个标签和两个文本字段，复制它们（`⌘-D`），并将新副本放在第一组元素的右侧。这些字段将显示第二个控制点的值，因此将标签重命名为`X2:`和`Y2:`，并设置与第一组类似的绑定，但使用`cp2X`和`cp2Y`作为键路径。\n\
    \n参考图 15-1 查看应有的效果，合理排列布局，并调整窗口大小以匹配新增内容。保存文件，运行项目，确保此时没有错误。生成的应用程序将只允许我们编辑四个文本字段的内容。它还会提示`CECurveView`不符合键`cp1X`的键值编码要求，这确实没错：我们尚未将其添加到`CECurveView`中，但即将进行修改！\n\
    \n### 贝塞尔曲线基础设施\n\n让我们从建立一些基础设施开始编写`CECurveView`类。`CECurveView`需要跟踪两个控制点，我们将它们设置为四个浮点数，每个浮点数通过一个属性访问，就像我们为控制器类所做的那样。我们还想使用类似于第\
    \ 14 章中为 MrSmiley 使用的技术，使 GUI 能够根据渲染大小自适应缩放。这次，我们将设置固定的边界，以便始终可以在平面上`(0,0)`到`(1,1)`之间的正方形内绘制曲线，并留出一些额外的周边空间。因此，我们将添加一些代码，将边界设置为`(-0.1,-0.1)`到`(1.1,1.1)`的正方形，并且无论视图如何调整大小，都保持这些边界不变。通过添加下面粗体显示的代码来完成所有这些操作：\n\
    \n```objc\n// CECurveView.h:\n\n#import <Cocoa/Cocoa.h>\n\n@interface CECurveView\
    \ : NSView {\n\n  NSRect myBounds;\n\n}\n\n@property (assign, nonatomic) CGFloat\
    \ cp1X;\n@property (assign, nonatomic) CGFloat cp1Y;\n@property (assign, nonatomic)\
    \ CGFloat cp2X;\n@property (assign, nonatomic) CGFloat cp2Y;\n\n@end\n```\n\n\
    然后将这些代码添加到`.m`文件中：\n\n```objc\n// CECurveView.m:\n\n#import \"CECurveView.h\"\n\
    \n@implementation CECurveView\n\n- (void)setCp1X:(CGFloat)f {\n  self.cp1X = MAX(MIN(f,\
    \ 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n- (void)setCp1Y:(CGFloat)f\
    \ {\n  self.cp1Y = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n}\n\n\
    - (void)setCp2X:(CGFloat)f {\n  self.cp2X = MAX(MIN(f, 1.0), 0.0);\n  [self setNeedsDisplay:YES];\n\
    }\n\n- (void)setCp2Y:(CGFloat)f {\n  self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n  [self\
    \ setNeedsDisplay:YES];\n}\n\n- (id)initWithFrame:(NSRect)frame {\n  self = [super\
    \ initWithFrame:frame];\n  if (self) {\n    // 初始化代码写在这里。\n    myBounds = NSMakeRect(-0.1,\
    \ -0.1, 1.2, 1.2);\n    [self setBounds:myBounds];\n  }\n  return self;\n}\n\n\
    - (void)setFrameSize:(NSSize)newSize {\n  [super setFrameSize:newSize];\n  [self\
    \ setBounds:myBounds];\n}\n\n- (void)drawRect:(NSRect)rect {\n  // 绘制代码写在这里。\n\
    }\n\n@end\n```\n\n请注意，我们正在为这些属性实现自己的设置器，因此需要将属性标记为`nonatomic`。编译器会注意到我们没有实现自己的获取器，因此编译器仍会为我们生成这些获取器。在设置器中，我们将对输入值施加一个范围限制，使其限制在`0.0`到`1.0`之间。我们还将使用`setNeedsDisplay:`将窗口标记为“脏”，强制系统在属性发生变化时重绘窗口。\n"
- fmt: "### Drawing a Curve\n\nNow let’s move on to the fun part: drawing the curve\
    \ itself. We’ll use preprocessor `#defines` to establish values for colors and\
    \ line widths, making it easier to spot them and change them in order to tweak\
    \ the appearance. Add these lines somewhere near the top of `CECurveView.m`:\n\
    \n```\n#define CP_RADIUS 0.1\n#define CP_DIAMETER (CP_RADIUS*2)\n#define BACKGROUND_COLOR\
    \ [NSColor whiteColor]\n#define GRID_STROKE_COLOR [NSColor lightGrayColor]\n#define\
    \ GRID_FILL_COLOR [NSColor colorWithCalibratedWhite:0.9 alpha:1.0]\n#define CURVE_COLOR\
    \ [NSColor blackColor]\n#define LINE_TO_CP_COLOR [NSColor darkGrayColor]\n#define\
    \ CP_GRADIENT_COLOR1 [NSColor lightGrayColor]\n#define CP_GRADIENT_COLOR2 [NSColor\
    \ darkGrayColor]\n```\n\nWe’ll implement the `drawControlPointAtX:y:` and `drawRect:`\
    \ methods as shown in the following example. The code for drawing the control\
    \ points demonstrates the use of the `NSGradient` class, which can be used to\
    \ fill the inside of a Bezier path instead of just a solid color fill.\n\n```\n\
    - (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y {\n    NSBezierPath *cp =\
    \ [NSBezierPath bezierPathWithOvalInRect:\n        NSMakeRect(x - CP_RADIUS, y\
    \ - CP_RADIUS,\n        CP_DIAMETER, CP_DIAMETER)];\n    NSGradient *g;\n    g\
    \ = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n        endingColor:CP_GRADIENT_COLOR2];\n\
    \    [g drawInBezierPath:cp\n        relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n\
    }\n\n- (void)drawRect:(NSRect)rect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \n    // draw the background\n    NSBezierPath *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n\
    \        xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR set];\n    [bg fill];\n\
    \n    // draw the grid\n    NSBezierPath *grid1 = [NSBezierPath bezierPath];\n\
    \    [grid1 moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
    \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 moveToPoint:NSMakePoint(0.5,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
    \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR\
    \ set];\n    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
    \    [grid1 stroke];\n\n    // draw the lines leading to the control points\n\
    \    NSBezierPath *cpLines = [NSBezierPath bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0,\
    \ 0.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp1X, self.cp1Y)];\n    [cpLines\
    \ moveToPoint:NSMakePoint(1.0, 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X,\
    \ self.cp2Y)];\n    [LINE_TO_CP_COLOR set];\n    [cpLines setLineWidth:0.01];\n\
    \    [cpLines stroke];\n\n    // draw the curve itself\n    NSBezierPath *bp =\
    \ [NSBezierPath bezierPath];\n    [bp moveToPoint:NSMakePoint(0.0, 0.0)];\n  \
    \  [bp curveToPoint:NSMakePoint(1.0, 1.0)\n        controlPoint1:NSMakePoint(self.cp1X,\
    \ self.cp1Y)\n        controlPoint2:NSMakePoint(self.cp2X, self.cp2Y)];\n    [CURVE_COLOR\
    \ set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\n    // draw the control\
    \ points\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\nThis\
    \ sort of drawing code can make for some pretty long methods, but it’s often pretty\
    \ straightforward, as in `drawRect:` shown previously. Not a single loop or `if`\
    \ construct in the whole method! Note that unlike the Mr. Smiley code in [Chapter\
    \ 14](#A978-1-4302-4543-8_14_Chapter.html), this drawing code doesn’t refer to\
    \ our view’s bounds rect at all. Because we know that the bounds are always adjusted\
    \ to contain a square from (0,0) to (1,1), we make use of simple hardcoded values\
    \ to draw our graphics in and around this unit square.\n\nClick Run to run the\
    \ app; it should look something like Figure [15-1](#A978-1-4302-4543-8_15_Chapter.html#Fig1).\
    \ We should be able to edit the values in the text fields (any values between\
    \ 0.0 and 1.0 work well) and see the control points and curve change accordingly."
