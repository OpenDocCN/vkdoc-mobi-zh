- fmt: "### Creating and Editing Constraints\n\n`Interface Builder` lets us specify\
    \ the constraints that govern each view’s resizing behavior. In fact, we’ve actually\
    \ been doing this all along via the dashed blue line guidelines that `Interface\
    \ Builder` shows us as we drag new controls onto the window. The constraints are\
    \ initially created in `Interface Builder` based on the blue guidelines that are\
    \ highlighted when a control is positioned and can change if the control is repositioned.\
    \ For example, when we drag the table view into the upper right-hand corner of\
    \ the window, a vertical and horizontal dashed blue line appear when we get close\
    \ to the edge. This indicates that the table view should stick to that corner\
    \ and creates a pair of constraints indicating that the table view should maintain\
    \ a position at a constant distance from the top and left edges of the window.\
    \ A complex window, like ours, might have a dozens of constraints.\n\nIn order\
    \ to determine what constraints are appropriate, we first need to decide the appropriate\
    \ resize behavior for the window. For our window, let’s say that we want the new\
    \ table view to resize both horizontally and vertically as the window is enlarged.\
    \ We want all the boxes to hold their sizes constant and flex to the right as\
    \ the user resizes the window. Lastly, we want the buttons to be the same size\
    \ as each other and to stick to the bottom of the window. We’ll need to set up\
    \ new constraints that make this happen and maybe remove some unintentional ones.\
    \ As a side note, dealing with resizing is an iterative process. Trial and error,\
    \ in combination with playing with resizing windows in `Interface Builder` mode\
    \ and using the `Simulate Document` feature in `Xcode`, are generally how it gets\
    \ polished. Investing some time in playing with resizing and seeing how the constraints\
    \ interact will advance your grasp of this more than anything you read in a book.\n\
    \nThese constraints are editable from within `Xcode`; we can see them both onscreen,\
    \ in the `Size Inspector` in the `Utility` area, and in the icon dock on the left\
    \ edge of the `Interface Builder` pane. Select the small expansion triangle hiding\
    \ in the lower left-hand corner of the `Interface Builder` pane, and the icon\
    \ dock will expand, showing the entire hierarchy of views in the window. Each\
    \ view can have a set of associated constraints, and our window has a lot of views.\
    \ In the `Utility` area, select the `Size Inspector` (`⌥⌘5`), and then select\
    \ the box that’s labeled `Appearance`, and expand the `Constraints` item on the\
    \ left. When the box is selected, the `Interface Builder` pane should look like\
    \ Figure 6-6.\n\n![A978-1-4302-4543-8_6_Fig6_HTML.jpg](A978-1-4302-4543-8_6_Fig6_HTML.jpg)\
    \  \n*Figure 6-6. Resizing constraints for the Appearance box*\n\nIn the `Size\
    \ Inspector`, we can see nine constraints that affect the `Appearance` box, at\
    \ least as we’ve laid it out so far. (Depending on how you laid out the window,\
    \ your constraints may be in a different order or with slightly different constants.)\
    \ Each of the blue lines extending off the box also represents a resizing constraint\
    \ that is in relationship with another view. Not all the constraints are in relation\
    \ to another view, so there are more constraints active than are visualized in\
    \ the blue lines.\n\nThe problem with the `Appearance` box is that it expanded\
    \ downward as the window was lengthened during resizing, expanding the `Image`\
    \ view along with it. Looking at the list of constraints in the `Size Inspector`,\
    \ one of them says “`Bottom Space to: Superview equals: 29`.” This constraint\
    \ means that the bottom of the `Appearance` box should stay 29 points above the\
    \ bottom of the window. Another constraint that deals with vertical size says\
    \ “`Top Space to: Box – Basic Information Equals: Default`.” This means that the\
    \ top edge of the box should maintain the system-default distance from the bottom\
    \ of the `Basic Information` box. The purple icon on the left of the constraints\
    \ indicates that these are system-created constraints—ones that were set up when\
    \ we positioned the box in `Interface Builder`. When we previously positioned\
    \ the `Appearance` box to snap to the blue guidelines that appear near the bottom\
    \ of the window, we implicitly created that `Bottom Space` constraint. However,\
    \ if we click the gear icon by the `Bottom Space` constraint, we can see that\
    \ the `Delete` menu item is disabled. In order to remove it, we’ll need to think\
    \ differently.\n\nLet’s play with this a bit. In `Interface Builder`, grab the\
    \ bottom of the window and enlarge it by dragging downward. The `Appearance` box\
    \ does indeed flex to be larger in the vertical direction. The `Bottom Space`\
    \ constraint is causing the box to grow to maintain a distance of 29 points from\
    \ the bottom of the window. Resize the window back to 364 points high to put everything\
    \ back (or release the mouse and then hit `Undo` (`⌘Z`) to undo the resize operation).\n\
    \nSince we can’t delete the constraint on the `Appearance` box outright, we’ll\
    \ change the circumstances that caused the system to create it in the first place,\
    \ and we’ll do that by making use of the blue guidelines (or lack thereof). The\
    \ easiest way to do this is move the `Appearance` box away from the bottom edge\
    \ of the window. Follow these steps.\n\n![A978-1-4302-4543-8_6_Fig7_HTML.jpg](A978-1-4302-4543-8_6_Fig7_HTML.jpg)\
    \  \n*Figure 6-7. The Appearance box constraints rearranged*\n\n1. Create a new\
    \ constraint to hold the `Appearance` box to its current size. To do this, select\
    \ the box, and then select `Editor` ➤ `Pin` ➤ `Height` from the menu bar.\n2.\
    \ Move the `Appearance` box near the top of the window, away from the bottom.\
    \ This will remove the constraint holding the bottom of the box to the bottom\
    \ of the window.\n3. Resize the window downward to make more room.\n4. Put the\
    \ `Appearance` box back, with the box title aligned with two other boxes in the\
    \ bottom area of the window and spaced evenly between them. Since the bottom of\
    \ the window is further away, we should avoid creating the constraint. The window\
    \ should look something like Figure 6-7.\n5. Resize the window back.\n\nWhen resizing\
    \ vertically, the window behaves the way that we want. We now have two things\
    \ to address in terms of horizontal resizing: the table view isn’t flexing but\
    \ the two rightmost boxes (`Notes`, and `Powers and Abilities`) are. We can check\
    \ that this is occurring by selecting `Editor` ➤ `Simulate Document` and seeing\
    \ what happens.\n\nLet’s check the table view first. Select the table view in\
    \ `Interface Builder`, and look at the constraints. There are no leading- or trailing-space\
    \ constraints that will hold the size fixed, so the problem must lie with the\
    \ two boxes on the right. Since we want them to hold their size, rather than enlarging\
    \ as the window is resized, select the `Powers and Abilities` box and then select\
    \ `Editor` ➤ `Pin` ➤ `Width`. Do the same for all the other boxes."
  raw: '### Creating and Editing Constraints


    Interface Builder lets us specify the constraints that govern each view’s resizing
    behavior. In fact, we’ve actually been doing this all along via the dashed blue
    line guidelines that Interface Builder shows us as we drag new controls onto the
    window. The constraints are initially created in Interface Builder based on the
    blue guidelines that are highlighted when a control is positioned and can change
    if the control is repositioned. For example, when we drag the table view into
    the upper right-hand corner of the window, a vertical and horizontal dashed blue
    line appear when we get close to the edge. This indicates that the table view
    should stick to that corner and creates a pair of constraints indicating that
    the table view should maintain a position at a constant distance from the top
    and left edges of the window. A complex window, like ours, might have a dozens
    of constraints.


    In order to determine what constraints are appropriate, we first need to decide
    the appropriate resize behavior for the window. For our window, let’s say that
    we want the new table view to resize both horizontally and vertically as the window
    is enlarged. We want all the boxes to hold their sizes constant and flex to the
    right as the user resizes the window. Lastly, we want the buttons to be the same
    size as each other and to stick to the bottom of the window. We’ll need to set
    up new constraints that make this happen and maybe remove some unintentional ones.
    As a side note, dealing with resizing is an iterative process. Trial and error,
    in combination with playing with resizing windows in Interface Builder mode and
    using the Simulate Document feature in Xcode, are generally how it gets polished.
    Investing some time in playing with resizing and seeing how the constraints interact
    will advance your grasp of this more than anything you read in a book.


    These constraints are editable from within Xcode; we can see them both onscreen,
    in the Size Inspector in the Utility area, and in the icon dock on the left edge
    of the Interface Builder pane. Select the small expansion triangle hiding in the
    lower left-hand corner of the Interface Builder pane, and the icon dock will expand,
    showing the entire hierarchy of views in the window. Each view can have a set
    of associated constraints, and our window has a lot of views. In the Utility area,
    select the Size Inspector (⌥⌘5), and then select the box that’s labeled Appearance,
    and expand the Constraints item on the left. When the box is selected, the Interface
    Builder pane should look like Figure [6-6](#A978-1-4302-4543-8_6_Chapter.html#Fig6).


    ![A978-1-4302-4543-8_6_Fig6_HTML.jpg](A978-1-4302-4543-8_6_Fig6_HTML.jpg)


    Figure 6-6.


    Resizing constraints for the Appearance box


    In the Size Inspector, we can see nine constraints that affect the Appearance
    box, at least as we’ve laid it out so far. (Depending on how you laid out the
    window, your constraints may be in a different order or with slightly different
    constants.) Each of the blue lines extending off the box also represents a resizing
    constraint that is in relationship with another view. Not all the constraints
    are in relation to another view, so there are more constraints active than are
    visualized in the blue lines.


    The problem with the Appearance box is that it expanded downward as the window
    was lengthened during resizing, expanding the Image view along with it. Looking
    at the list of constraints in the Size Inspector, one of them says “Bottom Space
    to: Superview equals: 29.” This constraint means that the bottom of the Appearance
    box should stay 29 points above the bottom of the window. Another constraint that
    deals with vertical size says “Top Space to: Box – Basic Information Equals: Default.”
    This means that the top edge of the box should maintain the system-default distance
    from the bottom of the Basic Information box. The purple icon on the left of the
    constraints indicates that these are system-created constraints—ones that were
    set up when we positioned the box in Interface Builder. When we previously positioned
    the Appearance box to snap to the blue guidelines that appear near the bottom
    of the window, we implicitly created that Bottom Space constraint. However, if
    we click the gear icon by the Bottom Space constraint, we can see that the Delete
    menu item is disabled. In order to remove it, we’ll need to think differently.


    Let’s play with this a bit. In Interface Builder, grab the bottom of the window
    and enlarge it by dragging downward. The Appearance box does indeed flex to be
    larger in the vertical direction. The Bottom Space constraint is causing the box
    to grow to maintain a distance of 29 points from the bottom of the window. Resize
    the window back to 364 points high to put everything back (or release the mouse
    and then hit Undo (⌘Z) to undo the resize operation).


    Since we can’t delete the constraint on the Appearance box outright, we’ll change
    the circumstances that caused the system to create it in the first place, and
    we’ll do that by making use of the blue guidelines (or lack thereof). The easiest
    way to do this is move the Appearance box away from the bottom edge of the window.
    Follow these steps.


    ![A978-1-4302-4543-8_6_Fig7_HTML.jpg](A978-1-4302-4543-8_6_Fig7_HTML.jpg)


    Figure 6-7.


    The Appearance box constraints rearranged Create a new constraint to hold the
    Appearance box to its current size. To do this, select the box, and then select
    `Editor` ➤ `Pin` ➤ `Height` from the menu bar.   Move the Appearance box near
    the top of the window, away from the bottom. This will remove the constraint holding
    the bottom of the box to the bottom of the window.   Resize the window downward
    to make more room.   Put the Appearance box back, with the box title aligned with
    two other boxes in the bottom area of the window and spaced evenly between them.
    Since the bottom of the window is further away, we should avoid creating the constraint.
    The window should look something like Figure [6-7](#A978-1-4302-4543-8_6_Chapter.html#Fig7).
      Resize the window back.


    When resizing vertically, the window behaves the way that we want. We now have
    two things to address in terms of horizontal resizing: the table view isn’t flexing
    but the two rightmost boxes (Notes, and Powers and Abilities) are. We can check
    that this is occurring by selecting `Editor` ➤ `Simulate Document` and seeing
    what happens.


    Let’s check the table view first. Select the table view in Interface Builder,
    and look at the constraints. There are no leading- or trailing-space constraints
    that will hold the size fixed, so the problem must lie with the two boxes on the
    right. Since we want them to hold their size, rather than enlarging as the window
    is resized, select the Powers and Abilities box and then select `Editor` ➤ `Pin`
    ➤ `Width`. Do the same for all the other boxes.'
  trans: "\n### 创建与编辑约束\n\n`Interface Builder` 允许我们指定控制每个视图缩放行为的约束。事实上，在我们拖拽新控件到窗口时，`Interface\
    \ Builder` 显示的蓝色虚线引导线一直就在执行这项操作。约束最初基于定位控件时高亮的蓝色引导线在 `Interface Builder` 中创建，且当控件被重新定位时可以改变。例如，当我们把表格视图拖拽到窗口右上角时，靠近边缘会出现一条垂直和一条水平的蓝色虚线。这表示表格视图应固定在那个角落，并创建了一对约束，表明表格视图应保持与窗口顶部和左侧边缘固定距离的位置。像我们这样的复杂窗口，可能包含数十个约束。\n\
    \n为了确定哪些约束是合适的，我们首先需要为窗口确定合适的缩放行为。对于我们的窗口，假设我们希望新的表格视图在窗口放大时能同时水平和垂直缩放。我们希望所有框保持尺寸不变，并在用户缩放窗口时向右弹性移动。最后，我们希望按钮彼此尺寸相同，并固定在窗口底部。我们需要设置新的约束来实现这一点，并可能移除一些非预期的约束。顺便提一下，处理缩放是一个迭代过程。结合在\
    \ `Interface Builder` 模式下测试窗口缩放以及使用 `Xcode` 中的 `Simulate Document` 功能进行试错，通常是打磨它的方式。投入一些时间尝试缩放并观察约束如何相互作用，会比任何书本阅读更能提升你的理解能力。\n\
    \n这些约束可以在 `Xcode` 中编辑；我们可以在屏幕上、`Utility` 区域的 `Size Inspector` 中，以及 `Interface\
    \ Builder` 面板左侧边缘的图标停靠栏中看到它们。选择隐藏在 `Interface Builder` 面板左下角的小展开三角形，图标停靠栏将展开，显示窗口中视图的完整层级。每个视图可以有一组关联的约束，而我们的窗口有很多视图。在\
    \ `Utility` 区域，选择 `Size Inspector`（`⌥⌘5`），然后选择标记为 `Appearance` 的框，并展开左侧的 `Constraints`\
    \ 项。选中该框时，`Interface Builder` 面板应如图 6-6 所示。\n\n![A978-1-4302-4543-8_6_Fig6_HTML.jpg](img/A978-1-4302-4543-8_6_Fig6_HTML.jpg)\
    \  \n*图 6-6. Appearance 框的缩放约束*\n\n在 `Size Inspector` 中，我们可以看到影响 `Appearance`\
    \ 框的九个约束，至少按我们目前的布局是这样。（根据你布局窗口的方式，约束的顺序或常量值可能略有不同。）每条从框延伸出的蓝线也代表一个与另一个视图相关的缩放约束。并非所有约束都与其他视图相关，因此实际激活的约束比蓝线所可视化的要多。\n\
    \n`Appearance` 框的问题在于，当窗口在缩放过程中被拉长时，它会向下扩展，同时导致 `Image` 视图也随之扩展。查看 `Size Inspector`\
    \ 中的约束列表，其中一条显示“`Bottom Space to: Superview equals: 29`”。这个约束意味着 `Appearance`\
    \ 框的底部应保持在窗口底部上方 29 点处。另一个处理垂直尺寸的约束显示“`Top Space to: Box – Basic Information Equals:\
    \ Default`”。这意味着框的顶部边缘应保持与 `Basic Information` 框底部的系统默认距离。约束左侧的紫色图标表示这些是系统创建的约束——即我们在\
    \ `Interface Builder` 中定位框时设置的约束。当我们之前定位 `Appearance` 框以使其对齐窗口底部附近的蓝色引导线时，我们隐式创建了那个\
    \ `Bottom Space` 约束。然而，如果我们点击 `Bottom Space` 约束旁的齿轮图标，会发现 `Delete` 菜单项被禁用。为了移除它，我们需要换个思路。\n\
    \n让我们稍微尝试一下。在 `Interface Builder` 中，抓住窗口底部并向下拖拽放大。`Appearance` 框确实会在垂直方向放大。`Bottom\
    \ Space` 约束导致框增长，以保持与窗口底部 29 点的距离。将窗口重新调整回 364 点高度，使一切恢复原状（或松开鼠标，然后按 `Undo`（`⌘Z`）撤销缩放操作）。\n\
    \n由于我们无法直接删除 `Appearance` 框上的约束，我们将改变导致系统最初创建它的条件，并通过利用蓝色引导线（或其缺失）来实现。最简单的方法是将\
    \ `Appearance` 框移离窗口底部边缘。请按以下步骤操作。\n\n![A978-1-4302-4543-8_6_Fig7_HTML.jpg](img/A978-1-4302-4543-8_6_Fig7_HTML.jpg)\
    \  \n*图 6-7. 重新排列后的 Appearance 框约束*\n\n1. 创建一个新约束来固定 `Appearance` 框的当前尺寸。为此，选择该框，然后从菜单栏选择\
    \ `Editor` ➤ `Pin` ➤ `Height`。\n2. 将 `Appearance` 框移到窗口顶部附近，远离底部。这将移除将框底部固定到窗口底部的约束。\n\
    3. 向下缩放窗口以腾出更多空间。\n4. 将 `Appearance` 框放回原位，使框的标题与窗口底部区域的其他两个框对齐，并均匀分布。由于窗口底部距离更远，我们应避免创建该约束。窗口应看起来类似图\
    \ 6-7。\n5. 将窗口缩放回原状。\n\n在垂直缩放时，窗口的行为符合我们的预期。现在，在水平缩放方面我们需要处理两件事：表格视图没有弹性缩放，但最右侧的两个框（`Notes`\
    \ 和 `Powers and Abilities`）却在缩放。我们可以通过选择 `Editor` ➤ `Simulate Document` 并观察效果来检查这种情况是否发生。\n\
    \n让我们先检查表格视图。在 `Interface Builder` 中选择表格视图，并查看其约束。没有前导或尾随空间约束来固定尺寸，所以问题一定出在右侧的两个框上。由于我们希望它们保持尺寸不变，而不是在窗口缩放时变大，选择\
    \ `Powers and Abilities` 框，然后选择 `Editor` ➤ `Pin` ➤ `Width`。对其他所有框执行相同操作。\n"
- fmt: "Select `Editor` ➤ `Simulate Document` and try to resize horizontally. The\
    \ window won’t budge at all. We’ve got some constraints holding things in place\
    \ that we need to identify and remove. For each box, look at the constraints listed\
    \ in the Size Inspector and find ones that say “Leading Space to: Superview” with\
    \ anything as the value. You can tell if these constraints exist by selecting\
    \ the box and looking for a blue bar extending from the left edge of the box out\
    \ to the edge of the window. Delete the ones that are deletable, either by selecting\
    \ Delete from the menu hiding under the gear icon in the Constraint’s entry in\
    \ the Size Inspector for the box, or by selecting the blue bar and pressing the\
    \ Delete key.\n\nAfter removing them all, again select `Editor` ➤ `Simulate Document`\
    \ and try to resize horizontally. This time the window should resize the way we\
    \ want it to, as shown in Figure [6-8](#A978-1-4302-4543-8_6_Chapter.html#Fig8).\n\
    \n![A978-1-4302-4543-8_6_Fig8_HTML.jpg](A978-1-4302-4543-8_6_Fig8_HTML.jpg)\n\n\
    **Figure 6-8.** Finally, resizing works!\n\nBefore we move on to implementing\
    \ code, here are a few more words about resizing. Debugging resizing problems\
    \ is almost always an iterative, trial-and-error process. We’ve touched on a few\
    \ ways to make it work here:\n\n- Resize the window in Interface Builder, and\
    \ see how things resize in relation to the window.\n- If the window design has\
    \ evolved, try moving user-interface elements around to reset the constraints.\n\
    - Play with the Simulate Document feature and experiment.\n- Look at how constraints\
    \ are visualized in Interface Builder, via the blue bars and the Size Inspector.\n\
    \nThere’s more to learn about constraints and Cocoa Auto Layout; these are just\
    \ the basics. Check out the Cocoa Auto Layout Guide on the Apple Developer Connection\
    \ web site and in the Xcode documentation for more details and debugging tips.\n\
    \n> **Note**  \n> Cocoa Auto Layout was introduced in Mac OS X 10.7. Prior to\
    \ that, resizing was controlled using a mechanism called “springs and struts,”\
    \ which controlled how views resized relative to the window that contained them.\
    \ In 10.7 and beyond, the old springs and struts resizing behavior is translated\
    \ into constraints behind the scenes; applications can have nib files using constraints\
    \ and nib files using springs and struts that co-exist. However, if you come across\
    \ pre-2011 Cocoa code, you’ll almost surely encounter nib files that don’t use\
    \ constraints.\n\n## Making Way for the Table View: Code Edition\n\nWith the connections\
    \ in place and resizing now under control, we can turn our attention to the code\
    \ necessary to drive the table view and respond to clicks on the Add and Remove\
    \ buttons. To do this, we need to leave Interface Builder mode and get back to\
    \ our code. Open the Project Navigator (⌘1), if it isn’t already open. Single-click\
    \ the entry for the `VillainTrackerAppDelegate.m` file and the Editor area should\
    \ change from Interface Builder to a code window showing the code for our object.\n\
    \nWith the groundwork already laid in the last chapter, adding support for an\
    \ array of villains is surprisingly simple. Basically, we have to create an array,\
    \ tell the table view when we want it to display its content (whenever its content\
    \ has changed), implement a few `dataSource` methods to give the table view its\
    \ content, and implement a `delegate` method that will be called when the table\
    \ view’s selection changes (so that we can update all the other views to match\
    \ the selected villain). Then we’ll add a pair of methods to add and delete villains\
    \ from the array, and we’ll be done!\n\nLet’s start off by initializing an array\
    \ to hold our villains and telling the table view that it should load its content.\
    \ We do this by adding just a few lines to `applicationDidFinishLaunching:`, as\
    \ seen in bold in the following code. First we create an array to hold all villains\
    \ (which initially contains just the first villain we created in code earlier)\
    \ and assign it to our `villains` instance variable. Then we tell the table view\
    \ to load its content, and then to select its first row.\n\nTelling the table\
    \ view which row to select is more complicated than it might seem at first. The\
