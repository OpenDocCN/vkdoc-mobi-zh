    \ topic."
  raw: '#### Enumeration


    Let’s start with something simple: enumeration. You’re probably familiar with
    the standard C-based ways of stepping through a list, and perhaps the use of `NSEnumerator`,
    and even the new fast enumeration (“for – in” loops) that’s been available since
    the release of OS X 10.5\. Now, blocks provide yet another way to do the same
    thing.


    `NSArray *array = @[@"zero", @"one", @"two", @"three"];`


    `// C-style enumeration`


    `int i;`


    `for (i = 0; i < [array count]; i++) {`


        `NSLog(@"C enumeration accessing object: %@", array[i]);`


    `}`


    `// NSEnumerator, the "classic" Cocoa way to enumerate`


    `NSEnumerator *aEnum = [array objectEnumerator];`


    `id classicEnumerated;`


    `while ((classicEnumerated = [aEnum nextObject])) {`


        `NSLog(@"NSEnumerator accessing object: %@", classicEnumerated );`


    `}`


    `// "Fast enumeration", released with OS X 10.5`


    `id fastEnumerated;`


    `for (fastEnumerated in array) {`


        `NSLog(@"Fast enumeration accessing object: %@", fastEnumerated );`


    `}`


    `// "Block enumeration", released with OS X 10.6`


    `[array enumerateObjectsUsingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop)
    {`


        `NSLog(@"Block enumeration accessing object: %@", blockEnumerated);`


    `}];`


    The block we pass in to `enumerateObjectsUsingBlock:` takes three arguments and
    returns nothing. That’s the block signature declared by the method, and that’s
    what we have to follow. The three arguments sent into our block are an object
    from the array, an integer containing that object’s index in the array, and a
    `BOOL` passed by reference that lets us halt the enumeration by setting its value
    to `YES`.


    Looking at it that way, it may not be obvious at first why the block version is
    any better than the others, but the fact is that it really combines the best of
    all the other ways of enumerating. For one thing, it gives us the index of the
    current object, which neither of the previous Objective-C-based alternatives did.
    This comes in handy if we want to do something like print out a numbered list
    of the items in an array. We can’t tell you how many times we’ve dropped down
    to C-style iteration just for easy access to each object’s index value! Also,
    there’s a variant of this method that lets us specify options defining how the
    enumeration runs, such as make it run concurrently, like so:


    `[array enumerateObjectsWithOptions:NSEnumerationConcurrent`


        `usingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop) {`


        `NSLog(@"Block enumeration accessing object: %@", blockEnumerated);`


    `}];`


    This method actually uses GCD to spread the work around to all available processor
    cores, which will make our app run more quickly and better utilize system resources.
    And we get it for free!


    Similar enumeration methods exist for the `NSSet` class, but without the index
    parameter (because the objects in a set are, by definition, unordered). `NSDictionary`
    has also gotten some good block action with new methods such as `enumerateKeysAndObjectsUsingBlock:`
    (and its options-taking variant that allows for concurrency), letting us specify
    a block that gets the key and value together. This is much better than previous
    ways of enumerating the contents of a dictionary, which typically involved stepping
    through all the keys and looking up the value for each key.


    #### Observing Notifications Using Blocks


    We realize that we just threw notifications at you a few pages ago, but guess
    what: Apple’s already taken the block concept and applied it to the `NSNotification`
    class as well, which boasts a method that lets us specify a block rather than
    a selector, like this:


    `id observe = [[NSNotificationCenter defaultCenter] addObserverForName:DATA_RECEIVED`


      `object:nil queue:nil usingBlock:^(NSNotification *notification){`


      `NSLog(@"received notification: %@", notification);`


    `}];`


    This is cool in a couple of ways. For one thing, it frees us from the burden of
    creating a method for our notification-handling code, letting us instead put it
    inline with the code that’s setting it up, which can make our code easier to read.
    The other cool thing, which is true of all blocks, is that because the block we
    create picks up its context from the location where it’s defined, it has access
    to not only instance variables, but also local variables defined earlier in the
    same method. That means that our block can be created with some values that are
    available at setup time and used later when the block is run, without needing
    to explicitly put them into instance variables or pass them along in some other
    manual way.


    Note that this version returns a value of type `id`, which we are stuffing into
    a variable called `observe`. The block notification observer needs to be removed
    just like any other observer, so we can use this return value to tidy up by calling
    this at the appropriate time:


    `[[NSNotificationCenter defaultCenter] removeObserver:observe];`


    One thing to be aware of when using blocks this way is that cleaning up in the
    `dealloc` method may not be good enough; if the block has made use of the `self`
    pointer, either explicitly or indirectly, then a sort of circular reference occurs
    and the object will never be freed! This brings us to our next block topic.'
  trans: "\n### 枚举\n\n让我们从简单的开始：枚举。你可能已经熟悉了标准的基于 C 语言的遍历列表方式，也许也用过 `NSEnumerator`，甚至还有自\
    \ OS X 10.5 发布以来就提供的快速枚举（“for – in” 循环）。现在，Block 提供了另一种实现相同功能的方式。\n\n```\nNSArray\
    \ *array = @[@\"zero\", @\"one\", @\"two\", @\"three\"];\n\n// C 风格枚举\nint i;\n\
    for (i = 0; i < [array count]; i++) {\n    NSLog(@\"C 枚举访问对象：%@\", array[i]);\n\
    }\n\n// NSEnumerator，经典的 Cocoa 枚举方式\nNSEnumerator *aEnum = [array objectEnumerator];\n\
    id classicEnumerated;\nwhile ((classicEnumerated = [aEnum nextObject])) {\n  \
    \  NSLog(@\"NSEnumerator 访问对象：%@\", classicEnumerated);\n}\n\n// \"快速枚举\"，随 OS\
    \ X 10.5 发布\nid fastEnumerated;\nfor (fastEnumerated in array) {\n    NSLog(@\"\
    快速枚举访问对象：%@\", fastEnumerated);\n}\n\n// \"Block 枚举\"，随 OS X 10.6 发布\n[array enumerateObjectsUsingBlock:^(id\
    \ blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block 枚举访问对象：%@\"\
    , blockEnumerated);\n}];\n```\n\n我们传递给 `enumerateObjectsUsingBlock:` 的 Block 接受三个参数且无返回值。这是该方法声明的\
    \ Block 签名，我们必须遵循。传入 Block 的三个参数分别是：数组中的一个对象、该对象在数组中索引的整数值，以及一个通过引用传递的 `BOOL`\
    \ 值，通过将其设置为 `YES` 可终止枚举。\n\n这样看来，一开始可能并不明显为什么 Block 版本比其他方式更好，但实际上它确实融合了其他所有枚举方式的优点。首先，它提供了当前对象的索引，这是之前基于\
    \ Objective-C 的其他方案所不具备的。如果我们想打印数组元素的编号列表，这个特性就非常有用。我们无法告诉你我们为了轻松获取每个对象的索引值而不得已使用\
    \ C 风格迭代的次数有多少！此外，该方法还有一个变体，允许我们指定控制枚举运行方式的选项，例如使其并发运行，如下所示：\n\n```\n[array enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
    \    usingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"\
    Block 枚举访问对象：%@\", blockEnumerated);\n}];\n```\n\n这个方法实际上使用了 GCD 将工作分配到所有可用的处理器核心上，这会使我们的应用运行得更快，并更好地利用系统资源。而且我们无需额外成本就能获得这一好处！\n\
    \n`NSSet` 类也存在类似的枚举方法，但没有索引参数（因为根据定义，集合中的对象是无序的）。`NSDictionary` 也通过一些新的方法（如 `enumerateKeysAndObjectsUsingBlock:`\
    \ 及其支持并发的带选项变体）获得了良好的 Block 支持，让我们可以指定一个同时获取键和值的 Block。这比之前遍历字典内容的枚举方式要好得多，后者通常需要遍历所有键并为每个键查找对应的值。\n\
    \n### 使用 Block 观察通知\n\n我们知道，我们在前几页才刚向你介绍了通知，但猜猜怎么着：苹果已经将 Block 概念应用到了 `NSNotification`\
    \ 类中，该类提供了一个方法，允许我们指定一个 Block 而不是选择器，如下所示：\n\n```\nid observe = [[NSNotificationCenter\
    \ defaultCenter] addObserverForName:DATA_RECEIVED\n  object:nil queue:nil usingBlock:^(NSNotification\
    \ *notification){\n  NSLog(@\"收到通知：%@\", notification);\n}];\n```\n\n这在几个方面都很酷。首先，它使我们无需为通知处理代码创建单独的方法，而是可以将处理逻辑内联到设置代码的位置，这可以使我们的代码更易于阅读。另一个很棒的地方（所有\
    \ Block 的共同特点）是，因为我们创建的 Block 会从其定义位置捕获上下文，所以它不仅可以访问实例变量，还可以访问在同一方法中更早定义的局部变量。这意味着我们可以在设置时使用一些值来创建\
    \ Block，并在稍后 Block 运行时使用这些值，而无需显式地将它们放入实例变量或通过其他手动方式传递。\n\n请注意，此版本返回一个 `id` 类型的值，我们将其赋给一个名为\
    \ `observe` 的变量。Block 通知观察者需要像其他观察者一样被移除，因此我们可以在适当的时候调用以下代码来利用这个返回值进行清理：\n\n```\n\
    [[NSNotificationCenter defaultCenter] removeObserver:observe];\n```\n\n以这种方式使用\
    \ Block 时需要注意的一点是，在 `dealloc` 方法中进行清理可能不够好；如果 Block 显式或间接地使用了 `self` 指针，则会产生一种循环引用，导致对象永远无法被释放！这引出了我们的下一个\
    \ Block 话题。\n"
- fmt: "#### Weakening Pointers for Blocks\n\nGoing back to the last topic, imagine\
    \ that we have a class with an instance variable called `observation` and the\
    \ following `init` and `dealloc` methods:\n\n```\n@implementation MyController\
    \ {\n    id observation;\n}\n\n- (id)init {\n    if ((self = [super init])) {\n\
    \        observation = [[NSNotificationCenter defaultCenter]\n            addObserverForName:@\"\
    ESCHATON\"\n            object:nil\n            queue:nil\n            usingBlock:\
    \ ^(NSNotification *notification){\n                NSLog(@\"notified observer:\
    \ %@\", self);\n            }];\n    }\n    return self;\n}\n\n- (void)dealloc\
    \ {\n    [[NSNotificationCenter defaultCenter] removeObserver:observation];\n\
    }\n\n@end\n```\n\nThis looks fine at first glance, but there’s a subtle problem.\
    \ This setup creates a sort of circular reference chain, which means that neither\
    \ the `MyController` instance nor the `observation` object will ever be released!\
    \ The reason is that when `init` is executed and the block (which we pass to `NSNotificationCenter`)\
    \ is created, a special series of events occurs. Behind the scenes, ARC makes\
    \ sure that any variables accessed inside the block are made “block-ready.” That\
    \ means that for normal C types (`int`, `float`, etc.), a new read-only variable\
    \ slot is prepared for use within the block, and that Objective-C object pointers\
    \ are sent a `retain` message, thereby increasing their reference count during\
    \ the entire lifetime of the block.\n\nMeanwhile, the return value that is assigned\
    \ to `observation` is also handled nicely by ARC, which sends it a retain message\
    \ so that it won’t disappear. The result is the following:\n\n- `MyController`\
    \ instance holds a strong reference to `observation`.\n- The `observation` object\
    \ holds a strong reference to its block, since it “owns” it.\n- The block holds\
    \ a strong reference to our `MyController` instance.\n\nThe way to break this\
    \ cycle is to turn one of those strong references into a weak one. The best way\
    \ to do this is by changing `init` as follows:\n\n```\n- (id)init {\n    if ((self\
    \ = [super init])) {\n        __weak id weakSelf = self;\n        observation\
    \ = [[NSNotificationCenter defaultCenter]\n            addObserverForName:@\"\
    ESCHATON\"\n            object:nil\n            queue:nil\n            usingBlock:\
    \ ^(NSNotification *notification){\n                NSLog(@\"notified observer:\
    \ %@\", self);\n                NSLog(@\"notified observer: %@\", weakSelf);\n\
    \            }];\n    }\n    return self;\n}\n```\n\nHere we declare a new weak\
    \ pointer to `self`, stored in a new variable called `weakSelf`. This new pointer\
    \ is used inside the block. When the compiler sees this, it understands that this\
    \ is a weak pointer and therefore should not be retained by the block. That means\
    \ that `self` never receives an extra `retain`, so it’s free to be released at\
    \ some point in time when it’s not being used. When that happens, the `dealloc`\
    \ method is executed, the `observation` object is released, and the block it owns\
    \ is then also released.\n\nIt’s also important to realize this: a block will\
    \ capture any object referred to in its code, but in the case of instance variables,\
    \ it’s not the instance variable itself that is retained, but instead the `self`\
    \ pointer! The reason for this is that instance variables are accessed through\
    \ a C-style struct, even though we don’t see this in our code. In effect,\n\n\
    ```\n[tableView reloadData];\n```\n\nis essentially the same as\n\n```\n[self->tableView\
    \ reloadData];\n```\n\nIn the face of that, the compiler’s ARC rules demand that\
    \ `self` be retained.\n\nEven though we may not see this every day, it’s important\
    \ to understand how this mechanism works and why we must resort to this sort of\
    \ workaround. Blocks that are going to be executed and released immediately (e.g.,\
    \ when being used with an enumerator) probably don’t need this sort of scrutiny.\
    \ However, as soon as we pass a block off to another object and we either know\
    \ it’s going to be a long-lived object or aren’t quite sure, we should take extra\
    \ care to check our blocks and make sure we’re not accidentally setting ourselves\
    \ up for trouble.\n\n#### Filtering\n\nAnother use of blocks that Apple has added\
    \ to Cocoa is `NSArray`’s `indexesOfObjectsPassingTest:` method. This method lets\
    \ us declare a block that will examine an object, and, based on our own criteria,\
    \ determine whether it should be included in the set of indexes that comes out\
    \ (which can in turn be used to extract the “successes” from the original array).\
    \ For example, assuming we have an array of people, we can find all the people\
    \ named “Bob” like this:\n\n```\nNSArray *people;  // <- assume this exists\n\n\
    NSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:\n    BOOL ^(id obj,\
    \ NSUInteger idx, BOOL *stop){\n        return [obj.firstName isEqual:@\"Bob\"\
    ];\n}];\n\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n```\n\nAlthough\
    \ the use of blocks may seem tricky at first, after a while they become second\
    \ nature, and once you get started, you’ll probably find more and more ways to\
    \ use them. They are a really important tool for every Cocoa programmer.\n\n##\
    \ Cocoa in a Foreign Language\n\nAs much as some of us love Objective-C, it’s\
    \ not the only game in town, and some people would rather use another language\
    \ for developing Cocoa apps. Maybe you have a particular code library you want\
    \ to make use of, or maybe you just prefer some other language. The good news\
    \ is that there are some languages out there that can interface with Objective-C\
    \ well enough to allow for some Cocoa development through the use of what’s called\
    \ a “bridge” between the other language and Objective-C.\n\nThe bad news, for\
    \ some people at least, is that two of the biggest, most popular languages (C++\
    \ and Java) aren’t among them. You may be wondering why not. Well, without getting\
    \ too deep: C++ and Java are just too inflexible. They don’t have the sort of\
    \ runtime introspection capability that’s required for fully interfacing with\
    \ complex Objective-C class libraries like Cocoa. Maybe, technically, Java has\
    \ got what it takes. In fact, Apple included a Java bridge for building Cocoa\
    \ apps in the first several versions of Mac OS X. But the fact that programmers\
    \ weren’t lining up at the gates to use it, combined with the technical challenge\
    \ of implementing and maintaining the Java bridge, made it not worthwhile for\
    \ them, so Apple abandoned the project several years ago. And because we can actually\
    \ combine Objective-C and C++ together in the form of Objective-C++, the need\
    \ for bridging there is somewhat reduced. There are some real limitations there.\
    \ We can’t, for instance, implement an Objective-C delegate in the form of a C++\
    \ class, so we need to create some “glue classes,” typically paired up across\
    \ the border (one C++, one Objective-C) that are each able to deal with their\
    \ own world and translate things for one another. It works, but that sort of code\
    \ is not much fun to write or maintain.\n\nBack on the good news side of things,\
    \ a batch of popular scripting languages (Ruby, Python, and JavaScript) have solid,\
    \ working bridges that let us do real Cocoa work with them."
  raw: '#### Weakening Pointers for Blocks


    Going back to the last topic, imagine that we have a class with an instance variable
    called `observation` and the following `init` and `dealloc` methods:


    `@implementation MyController {`


    `id observation;`


    `}`


    `- (id)init {`


    `if ((self = [super init])) {`


    `observation = [[NSNotificationCenter defaultCenter]`


    `addObserverForName:@"ESCHATON"`


    `object:nil`


    `queue:nil`


    `usingBlock: ^(NSNotification *notification){`


    `NSLog(@"notified observer: %@", self);`


    `}];`


    `}`


    `return self;`


    `}`


    `- (void)dealloc {`


    `[[NSNotificationCenter defaultCenter] removeObserver:observation];`


    `}`


    `@end`


    This looks fine at first glance, but there’s a subtle problem. This setup creates
    a sort of circular reference chain, which means that neither the `MyController`
    instance nor the `observation` object will ever be released! The reason is that
    when `init` is executed and the block (which we pass to `NSNotificationCenter`)
    is created, a special series of events occurs. Behind the scenes, ARC makes sure
    that any variables accessed inside the block are made “block-ready.” That means
    that for normal C types (`int`, `float`, etc.), a new read-only variable slot
    is prepared for use within the block, and that Objective-C object pointers are
    sent a `retain` message, thereby increasing their reference count during the entire
    lifetime of the block.


    Meanwhile, the return value that is assigned to `observation` is also handled
    nicely by ARC, which sends it a retain message so that it won’t disappear. The
    result is the following:


    *   `MyController` instance holds a strong reference to `observation`.

    *   The `observation` object holds a strong reference to its block, since it “owns”
    it.

    *   The block holds a strong reference to our `MyController` instance.


    The way to break this cycle is to turn one of those strong references into a weak
    one. The best way to do this is by changing `init` as follows:


    `- (id)init {`


    `if ((self = [super init])) {`


    `__weak id weakSelf = self;`


    `observation = [[NSNotificationCenter defaultCenter]`


    `addObserverForName:@"ESCHATON"`


    `object:nil`


    `queue:nil`


    `usingBlock: ^(NSNotification *notification){`


    `NSLog(@"notified observer: %@", self);`


    `NSLog(@"notified observer: %@", weakSelf);`


    `}];`


    `}`


    `return self;`


    `}`


    Here we declare a new weak pointer to `self`, stored in a new variable called
    `weakSelf`. This new pointer is used inside the block. When the compiler sees
    this, it understands that this is a weak pointer and therefore should not be retained
    by the block. That means that `self` never receives an extra `retain`, so it’s
    free to be released at some point in time when it’s not being used. When that
    happens, the `dealloc` method is executed, the `observation` object is released,
    and the block it owns is then also released.


    It’s also important to realize this: a block will capture any object referred
    to in its code, but in the case of instance variables, it’s not the instance variable
    itself that is retained, but instead the `self` pointer! The reason for this is
    that instance variables are accessed through a C-style struct, even though we
    don’t see this in our code. In effect,


    `[tableView reloadData];`


    is essentially the same as


    `[self->tableView reloadData];`


    In the face of that, the compiler’s ARC rules demand that `self` be retained.


    Even though we may not see this every day, it’s important to understand how this
    mechanism works and why we must resort to this sort of workaround. Blocks that
    are going to be executed and released immediately (e.g., when being used with
    an enumerator) probably don’t need this sort of scrutiny. However, as soon as
    we pass a block off to another object and we either know it’s going to be a long-lived
    object or aren’t quite sure, we should take extra care to check our blocks and
    make sure we’re not accidentally setting ourselves up for trouble.


    #### Filtering


    Another use of blocks that Apple has added to Cocoa is `NSArray`’s `indexesOfObjectsPassingTest:`
    method. This method lets us declare a block that will examine an object, and,
    based on our own criteria, determine whether it should be included in the set
    of indexes that comes out (which can in turn be used to extract the “successes”
    from the original array). For example, assuming we have an array of people, we
    can find all the people named “Bob” like this:


    `NSArray *people;  // <- assume this exists`


    `NSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:`


        `BOOL ^(id obj, NSUInteger idx, BOOL *stop){`


        `return [obj.firstName isEqual:@"Bob"];`


    `}];`


    `NSArray *bobs = [people objectsAtIndexes:bobIndexes];`


    Although the use of blocks may seem tricky at first, after a while they become
    second nature, and once you get started, you’ll probably find more and more ways
    to use them. They are a really important tool for every Cocoa programmer.


    ## Cocoa in a Foreign Language


    As much as some of us love Objective-C, it’s not the only game in town, and some
    people would rather use another language for developing Cocoa apps. Maybe you
    have a particular code library you want to make use of, or maybe you just prefer
    some other language. The good news is that there are some languages out there
    that can interface with Objective-C well enough to allow for some Cocoa development
    through the use of what’s called a “bridge” between the other language and Objective-C.


    The bad news, for some people at least, is that two of the biggest, most popular
    languages (C++ and Java) aren’t among them. You may be wondering why not. Well,
    without getting too deep: C++ and Java are just too inflexible. They don’t have
    the sort of runtime introspection capability that’s required for fully interfacing
    with complex Objective-C class libraries like Cocoa. Maybe, technically, Java
    has got what it takes. In fact, Apple included a Java bridge for building Cocoa
    apps in the first several versions of Mac OS X. But the fact that programmers
    weren’t lining up at the gates to use it, combined with the technical challenge
    of implementing and maintaining the Java bridge, made it not worthwhile for them,
    so Apple abandoned the project several years ago. And because we can actually
    combine Objective-C and C++ together in the form of Objective-C++, the need for
    bridging there is somewhat reduced. There are some real limitations there. We
    can’t, for instance, implement an Objective-C delegate in the form of a C++ class,
    so we need to create some “glue classes,” typically paired up across the border
    (one C++, one Objective-C) that are each able to deal with their own world and
    translate things for one another. It works, but that sort of code is not much
    fun to write or maintain.


    Back on the good news side of things, a batch of popular scripting languages (Ruby,
    Python, and JavaScript) have solid, working bridges that let us do real Cocoa
    work with them.'
  trans: "\n#### 弱化 Blocks 的指针\n\n回到上一个话题，假设我们有一个类，包含一个名为 `observation` 的实例变量，以及如下的\
    \ `init` 和 `dealloc` 方法：\n\n```\n@implementation MyController {\n    id observation;\n\
    }\n\n- (id)init {\n    if ((self = [super init])) {\n        observation = [[NSNotificationCenter\
    \ defaultCenter]\n            addObserverForName:@\"ESCHATON\"\n            object:nil\n\
    \            queue:nil\n            usingBlock: ^(NSNotification *notification){\n\
    \                NSLog(@\"notified observer: %@\", self);\n            }];\n \
    \   }\n    return self;\n}\n\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:observation];\n}\n\n@end\n```\n\n乍一看这没问题，但其中隐藏着一个微妙的问题。这种设置会形成一种循环引用链，这意味着\
    \ `MyController` 实例和 `observation` 对象都将永远不会被释放！原因在于，当执行 `init` 并创建 block（我们将其传递给\
    \ `NSNotificationCenter`）时，会发生一系列特殊事件。在底层，ARC 会确保 block 内访问的所有变量都被设置为“block 就绪”状态。这意味着对于普通的\
    \ C 类型（`int`、`float` 等），会在 block 内准备一个新的只读变量槽；而对于 Objective-C 对象指针，则会发送一条 `retain`\
    \ 消息，从而在 block 的整个生命周期内增加其引用计数。\n\n与此同时，赋值给 `observation` 的返回值也会被 ARC 妥善处理，它也会收到一条\
    \ retain 消息，以确保其不会消失。最终的结果如下：\n\n-   `MyController` 实例持有对 `observation` 的强引用。\n\
    -   `observation` 对象持有对其 block 的强引用，因为它“拥有”该 block。\n-   block 持有对我们 `MyController`\
    \ 实例的强引用。\n\n打破这个循环的方法是将其中一个强引用转为弱引用。最好的做法是如下修改 `init`：\n\n```\n- (id)init {\n\
    \    if ((self = [super init])) {\n        __weak id weakSelf = self;\n      \
    \  observation = [[NSNotificationCenter defaultCenter]\n            addObserverForName:@\"\
    ESCHATON\"\n            object:nil\n            queue:nil\n            usingBlock:\
    \ ^(NSNotification *notification){\n                NSLog(@\"notified observer:\
    \ %@\", self);\n                NSLog(@\"notified observer: %@\", weakSelf);\n\
    \            }];\n    }\n    return self;\n}\n```\n\n这里我们声明了一个指向 `self` 的弱指针，存储在一个名为\
    \ `weakSelf` 的新变量中。这个新指针在 block 内部使用。当编译器看到这一点时，它会理解这是一个弱指针，因此不应被 block 保留。这意味着\
    \ `self` 永远不会收到额外的 `retain` 消息，因此它可以在不再使用时被释放。当 `dealloc` 方法执行时，`observation`\
    \ 对象被释放，它拥有的 block 也随之被释放。\n\n还有一点很重要：一个 block 会捕获其代码中引用的任何对象，但在实例变量的情况下，被保留的并不是实例变量本身，而是\
    \ `self` 指针！这是因为实例变量是通过 C 风格的结构体访问的，尽管我们在代码中看不到这一点。实际上，\n\n```\n[tableView reloadData];\n\
    ```\n\n本质上是等同于\n\n```\n[self->tableView reloadData];\n```\n\n鉴于此，编译器的 ARC 规则要求\
    \ `self` 必须被保留。\n\n尽管我们可能不会每天都遇到这种情况，但理解这个机制的工作原理以及我们为何必须采用这种变通方法仍然很重要。那些会被立即执行并释放的\
    \ block（例如，与枚举器一起使用时）可能不需要如此细致的审视。然而，一旦我们将 block 传递给另一个对象，并且我们知道它可能是一个长期存在的对象，或者不确定其生命周期时，就应该格外小心地检查我们的\
    \ block，确保不会意外地给自己埋下隐患。\n\n#### 过滤\n\nApple 添加到 Cocoa 中的另一个 block 用法是 `NSArray`\
    \ 的 `indexesOfObjectsPassingTest:` 方法。这个方法让我们声明一个 block，该 block 会检查一个对象，并根据我们定义的条件，决定该对象是否应被包含在输出的索引集合中（然后可以用于从原始数组中提取“符合条件”的对象）。例如，假设我们有一个人员数组，我们可以这样找出所有名为“Bob”的人：\n\
    \n```\nNSArray *people;  // <- 假设此数组已存在\n\nNSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:\n\
    \    BOOL ^(id obj, NSUInteger idx, BOOL *stop){\n        return [obj.firstName\
    \ isEqual:@\"Bob\"];\n}];\n\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n\
    ```\n\n尽管 block 的使用起初可能看起来有些棘手，但过一段时间后它们就会变得自然而然。一旦开始使用，你可能会发现越来越多的方式去运用它们。对于每一位\
    \ Cocoa 程序员来说，它们都是一个非常重要的工具。\n\n## 用其他语言开发 Cocoa\n\n尽管我们中的一些人热爱 Objective-C，但它并非唯一的选择，有些人更愿意使用其他语言来开发\
    \ Cocoa 应用。或许你有一个特定的代码库想要加以利用，或者你只是更喜欢其他某种语言。好消息是，存在一些语言能够很好地与 Objective-C 交互，通过使用该语言与\
    \ Objective-C 之间的所谓“桥接”，从而允许进行一定的 Cocoa 开发。\n\n而坏消息是（至少对某些人来说），两种最流行、最广泛使用的语言（C++\
    \ 和 Java）并不在此列。你可能会好奇这是为什么。简而言之：C++ 和 Java 过于僵化。它们缺乏与像 Cocoa 这样复杂的 Objective-C\
    \ 类库进行完全交互所需的运行时内省能力。或许从技术角度看，Java 具备这种能力。实际上，Apple 在 Mac OS X 的最初几个版本中包含了一个用于构建\
    \ Cocoa 应用的 Java 桥接。但程序员们并未趋之若鹜，再加上实现和维护该 Java 桥接所面临的技术挑战，使得这件事对他们来说得不偿失，因此 Apple\
    \ 在几年前放弃了这个项目。而且，由于我们可以通过 Objective-C++ 的形式将 Objective-C 和 C++ 结合起来，对桥接的需求也因此有所降低。当然也存在一些实际限制。例如，我们无法以\
    \ C++ 类的形式实现一个 Objective-C 的委托，因此需要创建一些“胶水类”，通常成对出现在边界两边（一个 C++ 类，一个 Objective-C\
    \ 类），它们各自能够处理自己的世界，并为对方翻译内容。这种方法可行，但编写和维护这样的代码并不愉快。\n\n再回到好消息方面，一批流行的脚本语言（Ruby、Python\
    \ 和 JavaScript）拥有稳定且可用的桥接，让我们能够使用它们进行真正的 Cocoa 开发。\n"
- fmt: "### PyObjC\n\n最早实现非 Objective-C 语言与 Cocoa 框架桥接的项目之一是 `PyObjC`，它让我们能够用 Python\
    \ 进行大量的 Cocoa 开发。正如你所知，Objective-C 的语法（尤其是方法名和参数的混合方式）有些特别，而大多数其他语言都没有与之对应的结构。`PyObjC`\
    \ 所做的是为 Cocoa 中包含的所有 Objective-C 类中的所有方法提供映射，以便我们可以从 Python 中调用它们。这些映射由一个相当简单的公式决定：整个\
    \ Objective-C 方法名被合并成一个符号，方法名中的每个冒号都被替换为下划线字符。所有方法参数都放在圆括号之间，就像标准 C 函数一样。所有对象都会被自动桥接，这样我们就可以直接从\
    \ Python 使用所有标准的 Cocoa 类。例如，让我们看一行关于通知的代码。这是 Objective-C 版本：\n\n```\n[[NSNotificationCenter\
    \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\n\
    使用 `PyObjC` 的 Python 版本如下所示：\n\n```\ncenter = NSNotificationCenter.defaultCenter()\n\
    center.postNotificationName_object_(DATA_RECEIVED, self);\n```\n\n如你所见，缺少了混合的方法名部分和参数确实影响了可读性。此外，整体上它相当“不\
    \ Python 化”，所以虽然它在其功能上运行良好，但各方都会有些不满意的地方。\n\n`PyObjC` 似乎在几年前就达到了稳定状态，过去几个版本主要集中在错误修复上。可以从\
    \ `http://packages.python.org/pyobjc/` 获取的版本状态良好，并已用于实际项目。\n\n### MacRuby\n\n\
    在 Ruby 方面，有几种桥接到 Objective-C 的方法。多年来，一个名为 `RubyCocoa` 的项目一直可用，它在许多方面与 `PyObjC`\
    \ 的工作方式类似。然而，`RubyCocoa` 似乎已经停滞不前，大部分发展势头已经转向了一个名为 `MacRuby` 的较新项目。这个由苹果赞助的项目旨在以完全不同的方式将\
    \ Ruby 语法引入 Cocoa。`MacRuby` 不是像 `RubyCocoa` 那样在相似类之间进行桥接，而是采取了一种不同的方法，基本上抛弃了所有现有的\
    \ Ruby 标准库类，转而使用等价的 Cocoa 类，并且通常为它们提供名称与 Ruby 世界中等价类匹配的新方法。这意味着，经验丰富的 Ruby 开发者在接手\
    \ `MacRuby` 项目时，可能会发现他们喜爱的许多类和方法都缺失或略有不同。\n\n`MacRuby` 与 `PyObjC` 和 `RubyCocoa`\
    \ 的一个有趣区别是，`MacRuby` 会额外努力使方法调用的感觉更接近于它们在 Objective-C 中的方式，同时仍然在 Ruby 语法中工作。这是通过巧妙地使用\
    \ Ruby 的关键字参数来实现的，即使用被调用的 Ruby 方法名和参数键来查找匹配的 Objective-C 方法。回到之前的例子：\n\n```\n\
    [[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n\
    ```\n\n在 `MacRuby` 中是这样写的：\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
    center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\n当 `MacRuby` 执行第二行时，它会使用方法名（`postNotificationName`）和参数键（`object`）在接收者（`center`）中查找一个名为\
    \ `postNotificationName:object:` 的 Objective-C 方法，找到它，并调用它。如果我们没有为 `object` 包含关键字参数，或者包含了其他不属于我们目标底层方法的关键字参数，那么这个方法调用将找不到匹配的\
    \ Objective-C 方法并失败。\n\n除此之外，`MacRuby` 还提供了一些其他有趣的功能，例如编译为本地代码，包括即时编译和提前编译。它也已经脱离了传统的\
    \ Ruby 虚拟机，转而采用基于 LLVM 构建的新运行时，你们中的一些人会认出这是 Xcode 可以使用的、最新式的编译器之一。\n\n在撰写本文时，`MacRuby`\
    \ 尚未发布 1.0 版本，但通过 `www.macruby.org` 关注它绝对值得。\n\n### Nu\n\n在这种背景下，另一个有趣的语言是 `Nu`。与\
    \ `PyObjC` 和 `MacRuby` 不同，这里并非是将现有语言与 Objective-C 对接的问题。相反，`Nu` 本质上是一种全新的语言（实际上是\
    \ Lisp 的一种变体），专为与 Objective-C 互操作而设计，因此它具备同样的交错方法和参数语法。让我们再看一次那个例子。Objective-C：\n\
    \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\n`Nu`：\n\n```\n((NSNotificationCenter defaultCenter)\n\
    \  postNotificationName:DATA_RECEIVED object:self)\n```\n\n如何！当然，它并非完全一致。即使忽略从方括号到圆括号的变化，在声明类、方法等方面还有许多其他语法变化，这通常源于\
    \ `Nu` 作为基于 Lisp 的语言的起源。然而，总的来说，这里有很多东西是 Objective-C 开发者一眼就能认出来的。\n\n除了语言本身，`Nu`\
    \ 还包括一个命令行 shell（`nush`）、一个类似 `make` 的工具（`nuke`）等等。这些工具组合成一个包，让我们可以启动一个 shell，并使用我们熟悉和喜爱的\
    \ Cocoa 类进行一些即兴脚本编写。我们可以与活动对象交互，并采用探索性方法使用 Cocoa 框架。前往 `http://programming.nu`\
    \ 下载并了解更多关于这个 Cocoa 与 Lisp 之间的有趣结合。"
  raw: '### PyObjC


    One of the earliest projects to bridge a non-Objective-C language with the Cocoa
    frameworks is PyObjC, which lets us do a significant amount of Cocoa development
    in Python. As you’re well aware by this point, Objective-C’s syntax, in particular
    the intermixing of method names and arguments, is somewhat unusual, and most other
    languages don’t have any equivalent. What PyObjC does is provide mappings for
    all methods in all Objective-C classes included in Cocoa, so that we can call
    them from Python. The mappings are determined by a pretty simple formula: the
    entire Objective-C method name is pushed into a single symbol, with each colon
    in the method name replaced by an underscore character. All the method arguments
    are sent between parentheses, just like a standard C function. All objects are
    automatically bridged so that we can use all the standard Cocoa classes right
    from Python. For example, let’s look at a line of code talking about notifications.
    Here’s the Objective-C version:


    `[[NSNotificationCenter defaultCenter]`


      `postNotificationName:DATA_RECEIVED object:self];`


    The Python version, using PyObjC, looks something like this:


    `center = NSNotificationCenter.defaultCenter()`


    `center.postNotificationName_object_(DATA_RECEIVED, self);`


    As you can see, the lack of intermixed method name parts and arguments really
    impacts the readability. Also, on the whole it’s rather “un-Pythonic,” so, while
    it works well for what it does, there are things for all sides to be somewhat
    unhappy about.


    PyObjC seems to have reached a stable state a few years ago, with most of the
    past few releases focusing on bug fixes. The version available at [`http://packages.python.org/pyobjc/`](http://packages.python.org/pyobjc/)
    seems to be in good shape and is in use in real-world projects.


    ### MacRuby


    On the Ruby front, there are a couple of ways to bridge to Objective-C. For several
    years, a project called RubyCocoa has been available that works similarly to PyObjC
    in many ways. However, RubyCocoa seems to have stagnated, with most forward momentum
    having shifted to a newer project called MacRuby. This Apple-sponsored project
    aims to bring Ruby syntax to Cocoa in a whole different way. Instead of bridging
    between similar classes, MacRuby takes a different approach, basically jettisoning
    all the existing Ruby standard library classes and using the Cocoa equivalents
    instead, often giving them new methods whose names match their equivalents in
    the Ruby world. This means that experienced Ruby developers who jump on a MacRuby
    project may find that lots of their favorite classes and methods are missing or
    subtly different.


    One interesting difference between MacRuby and both PyObjC and RubyCocoa is that
    MacRuby goes the extra mile to make method calls feel similar to the way they
    do in Objective-C, while still working within Ruby syntax. This works by a smart
    use of Ruby’s keyed arguments, using the name of the Ruby method being called
    and the argument keys to look for a matching Objective-C method. Returning to
    the previous example,


    `[[NSNotificationCenter defaultCenter]`


      `postNotificationName:DATA_RECEIVED object:self];`


    is written like so in MacRuby:


    `center = NSNotificationCenter.defaultCenter`


    `center.postNotificationName(DATA_RECEIVED, object:self)`


    When MacRuby hits that second line, it uses the method name (`postNotificationName`)
    and the argument key (`object`) to look for an Objective-C method called `postNotificationName:object:`
    in the receiver (`center`), finds it, and calls it. If we didn’t include a keyed
    argument for `object`, or included other keyed arguments that aren’t part of the
    underlying method we’re shooting for, this method call wouldn’t find a matching
    Objective-C method and would fail.


    On top of all that, MacRuby offers some other interesting features, such as compilation
    to native code, both just in time and ahead of time. It has also moved away from
    the traditional Ruby VM, instead sporting a new runtime built atop of LLVM, which
    some of you will recognize as the most modern of the compilers that Xcode can
    use.


    At the time of writing, MacRuby hasn’t produced a 1.0 version yet, but it’s definitely
    something to keep an eye on via [`www.macruby.org`](http://www.macruby.org) .


    ### Nu


    Another interesting language in this context is Nu. Unlike PyObjC and MacRuby,
    here it’s not a matter of interfacing an existing language to Objective-C. Instead,
    Nu is essentially a whole new language (really a Lisp variant) that is designed
    specifically for interoperation with Objective-C, so it features the same interwoven
    method and argument syntax. Let’s bring back that example one more time. Objective-C:


    `[[NSNotificationCenter defaultCenter]`


      `postNotificationName:DATA_RECEIVED object:self];`


    Nu:


    `((NSNotificationCenter defaultCenter)`


      `postNotificationName:DATA_RECEIVED object:self)`


    How about that! Of course, it’s not completely identical. Even ignoring the change
    from square brackets to parentheses, there are lots of other syntax changes when
    declaring classes, methods, and so on, often stemming from Nu’s origins as a Lisp-based
    language. However, in general there’s a lot here that’s immediately recognizable
    to an Objective-C developer.


    Apart from the language itself, Nu also includes a command-line shell (nush),
    a make-like tool (nuke), and more. These tools add up to a package that lets us
    fire up a shell and do some ad-hoc scripting using the Cocoa classes we know and
    love. We can interact with live objects and take an exploratory approach to the
    Cocoa frameworks. Head on over to [`http://programming.nu`](http://programming.nu)
    to download it and see more about this interesting crossover between Cocoa and
    Lisp.'
