    \ Cocoa 中工作，以及 Core Data 和`NSDocument`如何协同使其自动运行的速成课程。\n"
- fmt: "### The Undo Stack\n\nMany programmers have probably never given much thought\
    \ to how undo and redo are typically implemented in an application. It’s one of\
    \ those things that has become so universally accepted and expected that it seems\
    \ like it’s just part of the natural order of things. The basic premise is this:\
    \ each time we edit something in our app, an item representing the reverse of\
    \ the editing needs to be created. So, if the user adds the letter “X” to the\
    \ end of a piece of text, a piece of code needs to create a representation of\
    \ the opposite, an operation that can delete that same “X.” That representation\
    \ is then placed on a stack of similar items somewhere (the “undo stack”). Invoking\
    \ an “undo” command consists of popping the most recent item from the top of the\
    \ undo stack and performing the action it describes. At the same time, invoking\
    \ an undo command ends up creating yet another item, the reverse of the reversed\
    \ item from the undo stack (the same as the original edit, in fact), and placing\
    \ it on a “redo stack” in case the user later wants to undo the undo.\n\nThis\
    \ architecture has variations, such as limited stack sizes, or just single undo\
    \ items without any stacks at all, but the basic architecture is pretty similar\
    \ across most platforms. One thing that’s pretty special about Cocoa’s way of\
    \ implementing this is that, instead of representing each undo item in a special\
    \ form that has to be later decoded in some way, each undo item is constructed\
    \ implicitly using the target object, the method selector to be called on it,\
    \ and whatever arguments are required. When the undo command is triggered, there’s\
    \ no decoding or lookups of any kind. The method is simply invoked just like any\
    \ other Objective-C method.\n\nLet’s take a look at an example. Imagine the following\
    \ method, placed in a class that has a settable name:\n\n```\n- (void)setName:(NSString\
    \ *)newName {\n    if (![newName isEqual:name]) {\n        name = newName;\n \
    \   }\n}\n```\n\nNow imagine that we want to make setting the name an action that\
    \ can be undone. This is easily accomplished by adding the lines shown in bold\
    \ below:\n\n```\n- (void)setName:(NSString *)newName {\n    if (![newName isEqual:name])\
    \ {\n        NSUndoManager *undoManager = ...\n        [undoManager registerUndoWithTarget:self\n\
    \                selector:@selector(setName:)\n                object:name];\n\
    \        [undoManager setActionName:@\"Name Change\"];\n        name = newName;\n\
    \    }\n}\n```\n\nNote that we left out the part of the code where we actually\
    \ acquire the undo manager. In an actual application, the undo manager can come\
    \ from one of several places, depending on whether or not the app has Core Data\
    \ and `NSDocument` support. In a Core Data app, we can always ask the shared `NSManagedObjectContext`\
    \ object for an undo manager, and in an app with both Core Data and Document support\
    \ each document has its own undo manager.\n\nThe ultimate expression of this occurs\
    \ in a Core Data application, which actually implements something like the above\
    \ on our behalf. Note that the `setName:` method above is pretty formulaic. Core\
    \ Data implements some magic behind the scenes so that we don’t have to implement\
    \ that `setName:` method. As soon as any edit occurs to a model object, Core Data\
    \ notices and sets up the undo for us.\n\n## Wrap Up\n\nWe just created our first\
    \ `NSDocument`-based application from the ground up. We also learned a bit about\
    \ drawing to an `NSView` and dealing with colors, all of which are useful skills\
    \ for a variety of application areas. In later chapters, we’ll build on those\
    \ skills even more, especially the fun graphics programming where Cocoa really\
    \ shines. However, in the next chapter, we have to take a break from the fun and\
    \ learn what happens when things go wrong in our apps—and how to deal with them\
    \ using `NSError` and `NSException`.\n\n# 13. Exceptions, Signals, Errors, and\
    \ Debugging\n\n**Abstract**\n\nAnyone who’s done any sort of programming knows\
    \ that sometimes things just don’t work out as planned. You forget to handle a\
    \ specific edge case, or a system call fails in a way that’s never occurred to\
    \ you, and suddenly your program blows up in your face. Every programming language\
    \ and development environment has ways of dealing with these problems, and Cocoa\
    \ is no exception.\n\nThis chapter will cover Cocoa’s mechanisms for creating\
    \ and handling exceptions and errors, two similar-sounding but conceptually very\
    \ different systems. We’ll learn the different ways that each of them is used,\
    \ how to handle them, and how to initiate them ourselves. We’ll also learn how\
    \ certain memory abuses can cause signals to occur, typically resulting in a crash.\
    \ And we’ll take a peek at the debugger built into Xcode, which can help us tackle\
    \ these problems.\n\n## Exception Handling\n\nLet’s start off with exception handling.\
    \ An exception is a special object that can be created in one part of a program\
    \ in order to tell another part that something has gone wrong; this is called\
    \ “raising” an exception, and in code it might look something like this:\n\n```\n\
    // imagine we're in a method that has a parameter \"index\", whose\n// value must\
    \ not be negative.\nif (index < 0) {\n  [NSException raise:NSRangeException format:\n\
    \    @\"I can't take all this negativity! (index == %d)\", index];\n}\n```\n\n\
    In this case, we’re creating and raising an exception in a single step, using\
    \ a class method of the `NSException` class. The first parameter to this method\
    \ is a string for the exception’s name (in this case `NSRangeException`, which\
    \ is a predefined exception name in Cocoa), which allows for general categorization\
    \ of exceptions. Unlike many other exception-handling environments, `NSException`\
    \ is seldom subclassed, and so its name is used to differentiate between different\
    \ types of exceptions. The second parameter we pass is a format for the exception’s\
    \ “reason,” a human-readable descriptive string. This format is the same sort\
    \ of list of items we can pass to `NSLog`, where the first is an `NSString` and\
    \ the others are interpolated as specified by the string."
  raw: '### The Undo Stack


    Many programmers have probably never given much thought to how undo and redo are
    typically implemented in an application. It’s one of those things that has become
    so universally accepted and expected that it seems like it’s just part of the
    natural order of things. The basic premise is this: each time we edit something
    in our app, an item representing the reverse of the editing needs to be created.
    So, if the user adds the letter “X” to the end of a piece of text, a piece of
    code needs to create a representation of the opposite, an operation that can delete
    that same “X.” That representation is then placed on a stack of similar items
    somewhere (the “undo stack”). Invoking an “undo” command consists of popping the
    most recent item from the top of the undo stack and performing the action it describes.
    At the same time, invoking an undo command ends up creating yet another item,
    the reverse of the reversed item from the undo stack (the same as the original
    edit, in fact), and placing it on a “redo stack” in case the user later wants
    to undo the undo.


    This architecture has variations, such as limited stack sizes, or just single
    undo items without any stacks at all, but the basic architecture is pretty similar
    across most platforms. One thing that’s pretty special about Cocoa’s way of implementing
    this is that, instead of representing each undo item in a special form that has
    to be later decoded in some way, each undo item is constructed implicitly using
    the target object, the method selector to be called on it, and whatever arguments
    are required. When the undo command is triggered, there’s no decoding or lookups
    of any kind. The method is simply invoked just like any other Objective-C method.


    Let’s take a look at an example. Imagine the following method, placed in a class
    that has a settable name:


    `- (void)setName:(NSString *)newName {`


        `if (![newName isEqual:name]) {`


            `name = newName;`


        `}`


    `}`


    Now imagine that we want to make setting the name an action that can be undone.
    This is easily accomplished by adding the lines shown in bold below:


    `- (void)setName:(NSString *)newName {`


        `if (![newName isEqual:name]) {`


            `NSUndoManager *undoManager = ...`


            `[undoManager registerUndoWithTarget:self`


                    `selector:@selector(setName:)`


                    `object:name];`


            `[undoManager setActionName:@"Name Change"];`


            `name = newName;`


        `}`


    `}`


    Note that we left out the part of the code where we actually acquire the undo
    manager. In an actual application, the undo manager can come from one of several
    places, depending on whether or not the app has Core Data and `NSDocument` support.
    In a Core Data app, we can always ask the shared `NSManagedObjectContext` object
    for an undo manager, and in an app with both Core Data and Document support each
    document has its own undo manager.


    The ultimate expression of this occurs in a Core Data application, which actually
    implements something like the above on our behalf. Note that the `setName:` method
    above is pretty formulaic. Core Data implements some magic behind the scenes so
    that we don’t have to implement that `setName:` method. As soon as any edit occurs
    to a model object, Core Data notices and sets up the undo for us.


    ## Wrap Up


    We just created our first `NSDocument`-based application from the ground up. We
    also learned a bit about drawing to an `NSView` and dealing with colors, all of
    which are useful skills for a variety of application areas. In later chapters,
    we’ll build on those skills even more, especially the fun graphics programming
    where Cocoa really shines. However, in the next chapter, we have to take a break
    from the fun and learn what happens when things go wrong in our apps—and how to
    deal with them using `NSError` and `NSException`.


    # 13. Exceptions, Signals, Errors, and Debugging


    Abstract


    Anyone who’s done any sort of programming knows that sometimes things just don’t
    work out as planned. You forget to handle a specific edge case, or a system call
    fails in a way that’s never occurred to you, and suddenly your program blows up
    in your face. Every programming language and development environment has ways
    of dealing with these problems, and Cocoa is no exception.


    Anyone who’s done any sort of programming knows that sometimes things just don’t
    work out as planned. You forget to handle a specific edge case, or a system call
    fails in a way that’s never occurred to you, and suddenly your program blows up
    in your face. Every programming language and development environment has ways
    of dealing with these problems, and Cocoa is no exception.


    This chapter will cover Cocoa’s mechanisms for creating and handling exceptions
    and errors, two similar-sounding but conceptually very different systems. We’ll
    learn the different ways that each of them is used, how to handle them, and how
    to initiate them ourselves. We’ll also learn how certain memory abuses can cause
    signals to occur, typically resulting in a crash. And we’ll take a peek at the
    debugger built into Xcode, which can help us tackle these problems.


    ## Exception Handling


    Let’s start off with exception handling. An exception is a special object that
    can be created in one part of a program in order to tell another part that something
    has gone wrong; this is called “raising” an exception, and in code it might look
    something like this:


    `// imagine we''re in a method that has a parameter "index", whose`


    `// value must not be negative.`


    `if (index < 0) {`


      `[NSException raise:NSRangeException format:`


        `@"I can''t take all this negativity! (index == %d)", index];`


    `}`


    In this case, we’re creating and raising an exception in a single step, using
    a class method of the `NSException` class. The first parameter to this method
    is a string for the exception’s name (in this case `NSRangeException`, which is
    a predefined exception name in Cocoa), which allows for general categorization
    of exceptions. Unlike many other exception-handling environments, `NSException`
    is seldom subclassed, and so its name is used to differentiate between different
    types of exceptions. The second parameter we pass is a format for the exception’s
    “reason,” a human-readable descriptive string. This format is the same sort of
    list of items we can pass to `NSLog`, where the first is an `NSString` and the
    others are interpolated as specified by the string.'
  trans: "\n### 撤销栈\n\n许多程序员可能从未深入思考过应用程序中撤销和重做功能的典型实现方式。这已成为一种被普遍接受和期待的机制，以至于人们觉得它就像是自然秩序的一部分。基本前提如下：每次在应用中编辑内容时，都需要创建一个代表该编辑操作反向操作的条目。因此，如果用户在文本末尾添加了字母\"\
    X\"，就需要有一段代码来创建相反的操作，即一个能够删除这个\"X\"的操作。这个表示被放置在某处的同类条目栈中（即\"撤销栈\"）。执行\"撤销\"命令时，会从撤销栈顶部弹出最近的条目，并执行其所描述的操作。同时，执行撤销命令还会创建另一个条目，即撤销栈中反向操作的反向操作（实际上就是原始编辑操作），并将其放置在\"\
    重做栈\"上，以备用户之后想要撤销这次的撤销操作。\n\n这种架构存在多种变体，例如限制栈的大小，或根本不使用栈而只保留单个撤销条目，但在大多数平台上基本架构都非常相似。Cocoa\
    \ 实现这一功能的一个特别之处在于，它并非以某种特殊形式表示每个撤销条目（这种形式后续需要用特定方式解码），而是通过目标对象、要调用的方法选择器以及所需的任何参数来隐式构建每个撤销条目。当撤销命令被触发时，无需任何解码或查找操作，该方法就像其他\
    \ Objective-C 方法一样被直接调用。\n\n让我们看一个例子。假设以下方法位于一个包含可设置名称的类中：\n\n```\n- (void)setName:(NSString\
    \ *)newName {\n    if (![newName isEqual:name]) {\n        name = newName;\n \
    \   }\n}\n```\n\n现在设想我们希望使设置名称这一操作变得可撤销。这可以通过添加以下加粗显示的行轻松实现：\n\n```\n- (void)setName:(NSString\
    \ *)newName {\n    if (![newName isEqual:name]) {\n        NSUndoManager *undoManager\
    \ = ...\n        [undoManager registerUndoWithTarget:self\n                selector:@selector(setName:)\n\
    \                object:name];\n        [undoManager setActionName:@\"Name Change\"\
    ];\n        name = newName;\n    }\n}\n```\n\n请注意，我们省略了实际获取撤销管理器的代码部分。在实际应用中，撤销管理器可能来自多个位置，具体取决于应用是否支持\
    \ Core Data 和 `NSDocument`。在 Core Data 应用中，我们可以随时向共享的 `NSManagedObjectContext`\
    \ 对象请求一个撤销管理器；在同时支持 Core Data 和文档的应用中，每个文档都有自己的撤销管理器。\n\n这种模式的最终体现出现在 Core Data\
    \ 应用中，它实际上替我们实现了类似上述的功能。注意上面的 `setName:` 方法相当公式化。Core Data 在幕后实现了一些魔法，使得我们不必实现那个\
    \ `setName:` 方法。一旦模型对象发生任何编辑，Core Data 就会察觉并为我们设置好撤销操作。\n\n## 总结\n\n我们刚刚从头创建了第一个基于\
    \ `NSDocument` 的应用程序。我们还学习了一些关于向 `NSView` 绘图以及处理颜色的知识，这些对于各种应用领域都是有用的技能。在后续章节中，我们将进一步深化这些技能，尤其是那些\
    \ Cocoa 真正大放异彩的有趣图形编程。然而，在下一章中，我们得暂别这些乐趣，学习当应用中出现问题时会发生什么——以及如何使用 `NSError` 和\
    \ `NSException` 来处理它们。\n\n# 13. 异常、信号、错误与调试\n\n**摘要**\n\n任何做过编程的人都知道，事情有时并不会按计划进行。你忘记处理某个特定的边界情况，或者系统调用以一种你从未想到的方式失败，突然之间你的程序就在你面前崩溃了。每种编程语言和开发环境都有处理这些问题的方法，Cocoa\
    \ 也不例外。\n\n本章将涵盖 Cocoa 用于创建和处理异常与错误的机制——这两个系统听起来相似，但在概念上却截然不同。我们将了解它们各自不同的使用方式、如何处理它们，以及如何自行触发它们。我们还将学习某些内存滥用如何导致信号发生，通常会导致崩溃。最后，我们会简要了解一下\
    \ Xcode 内置的调试器，它可以帮助我们应对这些问题。\n\n## 异常处理\n\n让我们从异常处理开始。异常是一种特殊对象，可以在程序的一个部分创建，以告知另一部分发生了问题；这被称为\"\
    抛出\"异常，在代码中可能看起来像这样：\n\n```\n// 假设我们正在一个方法中，该方法有一个参数 \"index\"，\n// 其值不能为负数。\n\
    if (index < 0) {\n  [NSException raise:NSRangeException format:\n    @\"我无法承受这种负能量！（索引\
    \ == %d）\", index];\n}\n```\n\n在这个例子中，我们使用 `NSException` 类的类方法，在一步之内创建并抛出了一个异常。该方法的第一个参数是异常名称的字符串（这里使用的是\
    \ `NSRangeException`，它是 Cocoa 中预定义的异常名称），用于对异常进行通用分类。与许多其他异常处理环境不同，`NSException`\
    \ 很少被继承，因此其名称用于区分不同类型的异常。我们传入的第二个参数是异常\"原因\"的格式字符串，这是一个人类可读的描述性字符串。此格式与我们可以传递给\
    \ `NSLog` 的参数列表类型相同，其中第一个是 `NSString`，其余参数根据字符串中的指定进行插值。\n"
- fmt: "### Catching Exceptions\n\nWhen that code is executed, if `index < 0`, the\
    \ program’s normal flow is interrupted. Instead of continuing with the rest of\
    \ the method, the program will start working its way down the call stack, looking\
    \ for a special code construct called an exception handler. An exception handler\
    \ will execute all code contained within a pair of curly-braces prefaced by the\
    \ `@try` keyword and, if an exception is raised during that execution, execution\
    \ will jump to an adjacent block marked with the `@catch` keyword and execute\
    \ the code contained there. This is called handling the exception. Finally, we\
    \ may optionally include a third block of code labeled with `@finally` keyword,\
    \ which will be executed no matter what happens in the `@try` and `@catch` section,\
    \ in order to perform any necessary cleanup.\n\nThe following example creates\
    \ the same exception as before, but now within a `@try` block. We catch it in\
    \ the `@catch` block and output an error message, then move on to the `@finally`\
    \ section, which is executed no matter what happens. In this simple case, we don’t\
    \ need the `@finally` section and could just omit it, but it can be useful in\
    \ situations where some resource is initialized in the `@try` block and needs\
    \ to be freed up.\n\n```\n@try {\n  if (index < 0) {\n    [NSException raise:NSRangeException\
    \ format:\n      @\"I can't take all this negativity! (index == %d)\", index];\n\
    \  }\n}\n@catch (NSException *e) {\n  NSLog(@\"Encountered exception %@ with reason\
    \ %@\",\n    [e name],\n    [e reason]);\n}\n@finally {\n  // we don't have anything\
    \ to do here, really.\n}\n```\n\nThis example handles the exception in the same\
    \ method where it was raised, but that’s actually pretty uncommon. More likely,\
    \ no local exception handler is found, so the system traverses the call stack\
    \ looking for an exception handler, first in the current method’s caller, then\
    \ that method’s caller, and so on. This search continues down the call stack until\
    \ an exception handler is found. If none is found, a special-case scenario can\
    \ be configured to handle the uncaught exception. By default, a Cocoa app that\
    \ encounters an uncaught exception will print some info about the exception to\
    \ the console log and then try to continue running as usual.\n\n### The Limited\
    \ Role of Exceptions in Cocoa\n\nIn Cocoa, exceptions are used to make a method\
    \ break out of its normal operating flow in case of a serious problem that should\
    \ not occur while the program is running. In general, if your code causes an exception\
    \ to be raised, you’ve got a bug. With few exceptions, a properly written Cocoa\
    \ program should be able to run forever without a single exception ever being\
    \ raised.\n\nIf you have a background in Java, Ruby, Python, or C++, this may\
    \ seem a little restrictive. In many other environments, exceptions are used a\
    \ little more freely, such as a file-reading method raising an exception to tell\
    \ the caller that it’s read to the end of the file (which, if you think about\
    \ it, is not an exceptional state at all, because every file has an end). In Python,\
    \ one common idiom for iterating through an array is to increment an index, try\
    \ to read the indexed value from the array, and catch the resulting exception\
    \ when you read past the end. In Cocoa, however, this sort of thing is frowned\
    \ upon, and exceptions are normally used only for reporting unexpected results\
    \ that are probably caused by a bug in the program.\n\nBecause of the rather limited\
    \ role of exceptions in Cocoa, you don’t often see a lot of exception-handling\
    \ code inside Cocoa apps. Unlike Java, Objective-C doesn’t require (or even allow)\
    \ its methods to specify what kinds of exceptions they may raise, and in theory\
    \ you don’t really have to handle them at all. By default, each Cocoa app you\
    \ create will have a sort of top-level exception handler that simply outputs some\
    \ information about the exception to the system log, and then lets the app continue\
    \ on its way as best it can. Unfortunately, this isn’t much of a strategy because\
    \ whatever the app was doing at the time of the exception was most likely happening\
    \ in response to the last user action (clicking a button, pressing a key, and\
    \ the like), and whatever else that action was supposed to be doing after that\
    \ is just skipped right over, potentially leaving the application in an undefined\
    \ or inconsistent state!\n\nSome applications install a special top-level exception\
    \ handler of their own to deal with these situations. Xcode, for instance, occasionally\
    \ hits an exception (yes, even Xcode has bugs!), at which point it typically gives\
    \ the user the opportunity to quit the app, recognizing the possibility that something\
    \ is mucked up."
  raw: '### Catching Exceptions


    When that code is executed, if `index < 0`, the program’s normal flow is interrupted.
    Instead of continuing with the rest of the method, the program will start working
    its way down the call stack, looking for a special code construct called an exception
    handler. An exception handler will execute all code contained within a pair of
    curly-braces prefaced by the `@try` keyword and, if an exception is raised during
    that execution, execution will jump to an adjacent block marked with the `@catch`
    keyword and execute the code contained there. This is called handling the exception.
    Finally, we may optionally include a third block of code labeled with `@finally`
    keyword, which will be executed no matter what happens in the `@try` and `@catch`
    section, in order to perform any necessary cleanup.


    The following example creates the same exception as before, but now within a `@try`
    block. We catch it in the `@catch` block and output an error message, then move
    on to the `@finally` section, which is executed no matter what happens. In this
    simple case, we don’t need the `@finally` section and could just omit it, but
    it can be useful in situations where some resource is initialized in the `@try`
    block and needs to be freed up.


    `@try {`


      `if (index < 0) {`


        `[NSException raise:NSRangeException format:`


          `@"I can''t take all this negativity! (index == %d)", index];`


      `}`


    `}`


    `@catch (NSException *e) {`


      `NSLog(@"Encountered exception %@ with reason %@"`,


        `[e name]`,


        `[e reason]);`


    `}`


    `@finally {`


      `// we don''t have anything to do here, really.`


    `}`


    This example handles the exception in the same method where it was raised, but
    that’s actually pretty uncommon. More likely, no local exception handler is found,
    so the system traverses the call stack looking for an exception handler, first
    in the current method’s caller, then that method’s caller, and so on. This search
    continues down the call stack until an exception handler is found. If none is
    found, a special-case scenario can be configured to handle the uncaught exception.
    By default, a Cocoa app that encounters an uncaught exception will print some
    info about the exception to the console log and then try to continue running as
    usual.


    ### The Limited Role of Exceptions in Cocoa


    In Cocoa, exceptions are used to make a method break out of its normal operating
    flow in case of a serious problem that should not occur while the program is running.
    In general, if your code causes an exception to be raised, you’ve got a bug. With
    few exceptions, a properly written Cocoa program should be able to run forever
    without a single exception ever being raised.


    If you have a background in Java, Ruby, Python, or C++, this may seem a little
    restrictive. In many other environments, exceptions are used a little more freely,
    such as a file-reading method raising an exception to tell the caller that it’s
    read to the end of the file (which, if you think about it, is not an exceptional
    state at all, because every file has an end). In Python, one common idiom for
    iterating through an array is to increment an index, try to read the indexed value
    from the array, and catch the resulting exception when you read past the end.
    In Cocoa, however, this sort of thing is frowned upon, and exceptions are normally
    used only for reporting unexpected results that are probably caused by a bug in
    the program.


    Because of the rather limited role of exceptions in Cocoa, you don’t often see
    a lot of exception-handling code inside Cocoa apps. Unlike Java, Objective-C doesn’t
    require (or even allow) its methods to specify what kinds of exceptions they may
    raise, and in theory you don’t really have to handle them at all. By default,
    each Cocoa app you create will have a sort of top-level exception handler that
    simply outputs some information about the exception to the system log, and then
    lets the app continue on its way as best it can. Unfortunately, this isn’t much
    of a strategy because whatever the app was doing at the time of the exception
    was most likely happening in response to the last user action (clicking a button,
    pressing a key, and the like), and whatever else that action was supposed to be
    doing after that is just skipped right over, potentially leaving the application
    in an undefined or inconsistent state!


    Some applications install a special top-level exception handler of their own to
    deal with these situations. Xcode, for instance, occasionally hits an exception
    (yes, even Xcode has bugs!), at which point it typically gives the user the opportunity
    to quit the app, recognizing the possibility that something is mucked up.'
  trans: "\n### 捕获异常\n\n当上述代码执行时，如果 `index < 0`，程序的正常流程将被中断。程序不会继续执行该方法剩余部分，而是会沿着调用栈向下寻找一种被称为异常处理器的特殊代码结构。异常处理器会执行\
    \ `@try` 关键字后花括号内的所有代码，如果在执行过程中抛出了异常，执行流程将跳转到相邻的、以 `@catch` 关键字标记的代码块，并执行其中的代码。这被称为处理异常。最后，我们还可以选择性地包含一个以\
    \ `@finally` 关键字标记的第三个代码块，无论 `@try` 和 `@catch` 部分发生什么，它都会被执行，以执行任何必要的清理工作。\n\n\
    以下示例抛出了与之前相同的异常，但这次是在 `@try` 代码块中。我们在 `@catch` 代码块中捕获它并输出一条错误信息，然后继续执行 `@finally`\
    \ 部分，该部分无论发生什么都会执行。在这个简单的例子中，我们并不需要 `@finally` 部分，完全可以省略它，但在某些资源在 `@try` 块中初始化并需要被释放的情况下，它会非常有用。\n\
    \n```\n@try {\n  if (index < 0) {\n    [NSException raise:NSRangeException format:\n\
    \      @\"我无法承受这么多消极情绪！（索引 == %d）\", index];\n  }\n}\n@catch (NSException *e)\
    \ {\n  NSLog(@\"遇到了异常 %@，原因为 %@\",\n    [e name],\n    [e reason]);\n}\n@finally\
    \ {\n  // 我们这里实际上无事可做。\n}\n```\n\n这个例子在抛出异常的同一个方法内处理了异常，但实际上这种情况相当少见。更常见的是，本地找不到异常处理器，系统便会遍历调用栈来寻找异常处理器，首先在当前方法的调用者中查找，然后是该方法的调用者，以此类推。这种搜索会沿着调用栈一直向下进行，直到找到异常处理器为止。如果找不到，则可以配置一个特殊场景来处理未捕获的异常。默认情况下，遇到未捕获异常的\
    \ Cocoa 应用会向控制台日志打印一些关于该异常的信息，然后尝试继续照常运行。\n\n### 异常在 Cocoa 中的有限作用\n\n在 Cocoa 中，异常用于在程序运行时不应发生的严重问题出现时，使方法脱离其正常的操作流程。一般来说，如果你的代码导致了异常被抛出，那就说明存在一个\
    \ Bug。除极少数例外情况，一个正确编写的 Cocoa 程序应该能够永远运行下去，而不会抛出任何异常。\n\n如果你有 Java、Ruby、Python\
    \ 或 C++ 的背景，这可能会显得有些限制性。在许多其他环境中，异常的使用更加自由，例如文件读取方法抛出异常来告诉调用者它已经读到了文件末尾（仔细想想，这根本就不是什么异常状态，因为每个文件都有结尾）。在\
    \ Python 中，一种遍历数组的常见写法是递增索引，尝试从数组中读取索引对应的值，并在读取越界时捕获由此产生的异常。然而，在 Cocoa 中，这种做法是不被提倡的，异常通常仅用于报告可能由程序\
    \ Bug 引起的意外结果。\n\n由于异常在 Cocoa 中的作用相当有限，你很少会在 Cocoa 应用中看到大量的异常处理代码。与 Java 不同，Objective-C\
    \ 不要求（甚至不允许）其方法指定它们可能抛出何种异常，并且理论上你根本不需要处理它们。默认情况下，你创建的每个 Cocoa 应用都会有一个顶层的异常处理器，它只是将有关异常的一些信息输出到系统日志，然后尽力让应用继续运行。不幸的是，这算不上什么好策略，因为应用在异常发生时正在做的事情，很可能是对上一次用户操作（点击按钮、按键等）的响应，而该操作之后应该做的其他事情就被直接跳过了，这可能会使应用处于未定义或不一致的状态！\n\
    \n某些应用会安装自己特殊的顶层异常处理器来处理这些情况。例如，Xcode 偶尔会遇到异常（是的，就连 Xcode 也有 Bug！），此时它通常会为用户提供退出应用的机会，因为它认识到某些东西可能已经乱套了。\n"
- fmt: "### Create a Testbed\n\nLet’s build a small application that demonstrates\
    \ some of the kinds of exceptions that Cocoa programmers are likely to encounter.\
    \ In Xcode, create a new Cocoa application (no Core Data or documents involved\
    \ this time) named “ExceptionCity” and give it “EC” as the class prefix. The application\
    \ we create will automatically have a class named `ECAppDelegate`.\n\nOur app\
    \ delegate is going to be a very simple class, containing the `applicationDidFinishLaunching:`\
    \ delegate method, which calls three different “utility” methods, each of which\
    \ demonstrates a common Cocoa pitfall that can result in exceptions being raised\
    \ at runtime. If all three methods manage to do their work and return, we’ll be\
    \ rewarded by the appearance of a congratulatory alert panel (just what we always\
    \ wanted). However, each utility method has a problem that will raise an exception.\
    \ Our goal is to find and fix each problem. Here’s the complete content of the\
    \ `ECAppDelegate.m` file:\n\n```\n#import \"ECAppDelegate.h\"\n\n@implementation\
    \ ECAppDelegate\n\n- (void)invalidArgumentException_unrecognizedSelector {\n \
    \   // The downside of dynamism is the occasional type mismatch.\n    // For instance,\
    \ it's sometimes hard to be sure what's coming\n    // out of an array.  Imagine\
    \ this array is created somewhere...\n    NSArray *nameComponents = @[@\"Thurston\"\
    ,\n                                @\"Howell\",\n                            \
    \    [NSNumber numberWithInt:3]];\n    // ... and accessed later on, by code that\
    \ just assumes all the\n    // array's items are strings:\n    NSInteger nameComponentLength\
    \ = 0;\n    for (NSString *component in nameComponents) {\n        nameComponentLength\
    \ += [component length];\n    }\n    NSLog(@\"Total length of all name components:\
    \ %ld\",\n          (long)nameComponentLength);\n}\n\n- (void)invalidArgumentException_insertNil\
    \ {\n    // Assuming we have an array to put things into...\n    NSMutableArray\
    \ *array = [NSMutableArray array];\n    // ... we can add an object to it.\n \
    \   id object1 = @\"hello\";\n    [array addObject:object1];\n    // But suppose\
    \ we take a method parameter or instance variable\n    // whose value we haven't\
    \ checked to make sure it wasn't nil...\n    id object2 = nil;\n    // ... and\
    \ try to add it to the array?\n    [array addObject:object2];\n    NSLog(@\"inserted\
    \ all the objects I could!\");\n}\n\n- (void)rangeException {\n    // Assuming\
    \ we have an array of things...\n    NSArray *array = @[@\"one\", @\"two\", @\"\
    three\"];\n    // ... we can ask for the index of an item...\n    NSUInteger indexOfTwo\
    \ = [array indexOfObject:@\"two\"];\n    // ... and we can later retrieve that\
    \ value using the same index.\n    NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
    \    // But, what if we try to find the index for something that's not\n    //\
    \ there?\n    NSUInteger indexOfFive = [array indexOfObject:@\"five\"];\n    //\
    \ And we forget to check the return value to make sure it's not\n    // NSNotFound?\n\
    \    NSLog(@\"found indexed item %@\", array[indexOfFive]);\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification\n{\n    [self invalidArgumentException_unrecognizedSelector];\n\
    \    [self invalidArgumentException_insertNil];\n    [self rangeException];\n\
    \    NSRunAlertPanel(@\"Success\", @\"Hooray, you fixed everything!\",\n     \
    \               nil, nil, nil);\n}\n\n@end\n```\n\nRun this code. The promised\
    \ alert panel won’t appear (but the empty window included in the default nib file\
    \ will). What will happen, though, is that something like the following will appear\
    \ in Xcode’s debug output:\n\n`2013-02-07 00:25:12.756 ExceptionCity[43532:303]\
    \ -[__NSCFNumber length]: unrecognized selector sent to instance 0x387`\n\nIf\
    \ you look back at the `invalidArgumentException_unrecognizedSelector` method\
    \ and its comments, you can probably see where this is coming from: our array\
    \ contains an `NSNumber`, which doesn’t have a `length` method, and as a result\
    \ an exception is raised. We’re not doing anything to explicitly deal with the\
    \ exception, and it ends up going all the way down the call stack without being\
    \ handled, which leads to the default behavior mentioned earlier: some info about\
    \ the exception (specifically, its `reason`) is logged, and the application skips\
    \ the rest of the current event. In this case, the event being processed is the\
    \ application launch, which is already done at this point.\n\nIf we hadn’t just\
    \ pointed out that method for you, things wouldn’t be so clear. The logged exception\
    \ info doesn’t tell us anything about where it came from, the name of the exception,\
    \ or anything else that might help us find what part of our code triggered the\
    \ exception. This is where our new friend, the Xcode debugger, comes in. The debugger\
    \ lets us set a breakpoint on all exceptions, so we can pause the program the\
    \ moment an exception is raised and try to spot the problem.\n\n### THE DEBUGGER\n\
    \nMost developers are probably familiar with the concept of a debugger, which\
    \ lets you inspect the state of your application while it’s running in order to\
    \ diagnose problems. If you haven’t encountered a debugger before, here’s a quick\
    \ rundown of some of the key concepts:\n\n*   A breakpoint lets you specify, either\
    \ with a line number in your source code or the name of a method or function,\
    \ a spot where the program should halt. All the breakpoints you’ve currently set\
    \ up are shown in the Breakpoint Navigator on the left side of the project window.\
    \ When your program stops at a breakpoint, you can examine all CPU registers at\
    \ that spot in the program’s execution. If you have the source code for the program,\
    \ you can also access any variables (local, instance, or otherwise) that are relevant\
    \ at that spot. All CPU registers and available variables are shown in a table\
    \ view in Xcode’s Debug Area at the bottom of the project window.\n*   The call\
    \ stack is the list of all the nested methods and functions that are in operation\
    \ at any point in time. This appears in a table view in Xcode’s Debug Navigator\
    \ on the left side of the project window. When your program is halted, the current\
    \ method or function appears at the top of the call stack, the method or function\
    \ that called it appears below it, and so on. You can choose a particular item\
    \ or “frame” in the call stack in order to switch focus, at which point the Debug\
    \ Area will display the CPU registers and variables as they were when that method\
    \ or function called the method or function above it in the call stack.\n*   The\
    \ debugger contains buttons that let you perform some actions relative to the\
    \ currently highlighted code line. You can step over the current line (which executes\
    \ the rest of what’s on the current line and then halts at the next line), step\
    \ into the next method or function (which will halt at the beginning of the next\
    \ method or function that’s called), step out of the current method or function,\
    \ halting in the caller just after returning, or continue or stop the program.\n\
    *   The debugger contains a command-line interface called `lldb` (a modern offshoot/rewrite\
    \ of the `gdb` command that has historically been standard on most UNIX-based\
    \ operating systems) which lets you use all the functionality mentioned before,\
    \ as well as execute arbitrary code and examine the results. You can call C functions\
    \ and Objective-C methods by typing their names just as you would in our source\
    \ code, and use values from the running program’s variables as message recipients\
    \ and parameters.\n\nFor more detailed information on using the Xcode debugger,\
    \ see the Debug and Tune Your App document included with the Xcode documentation."
  raw: '### Create a Testbed


    Let’s build a small application that demonstrates some of the kinds of exceptions
    that Cocoa programmers are likely to encounter. In Xcode, create a new Cocoa application
    (no Core Data or documents involved this time) named “ExceptionCity” and give
    it “EC” as the class prefix. The application we create will automatically have
    a class named `ECAppDelegate`.


    Our app delegate is going to be a very simple class, containing the `applicationDidFinishLaunching:`
    delegate method, which calls three different “utility” methods, each of which
    demonstrates a common Cocoa pitfall that can result in exceptions being raised
    at runtime. If all three methods manage to do their work and return, we’ll be
    rewarded by the appearance of a congratulatory alert panel (just what we always
    wanted). However, each utility method has a problem that will raise an exception.
    Our goal is to find and fix each problem. Here’s the complete content of the ECAppDelegate.m
    file:


    `#import "ECAppDelegate.h"`


    `@implementation ECAppDelegate`


    `- (void)invalidArgumentException_unrecognizedSelector {`


    `// The downside of dynamism is the occasional type mismatch.`


    `// For instance, it''s sometimes hard to be sure what''s coming`


    `// out of an array.  Imagine this array is created somewhere...`


    `NSArray *nameComponents = @[@"Thurston"`,


    `@"Howell"`,


    `[NSNumber numberWithInt:3]];`


    `// ... and accessed later on, by code that just assumes all the`


    `// array''s items are strings:`


    `NSInteger nameComponentLength = 0;`


    `for (NSString *component in nameComponents) {`


    `nameComponentLength += [component length];`


    `}`


    `NSLog(@"Total length of all name components: %ld"`,


    `(long)nameComponentLength);`


    `}`


    `- (void)invalidArgumentException_insertNil {`


    `// Assuming we have an array to put things into...`


    `NSMutableArray *array = [NSMutableArray array];`


    `// ... we can add an object to it.`


    `id object1 = @"hello";`


    `[array addObject:object1];`


    `// But suppose we take a method parameter or instance variable`


    `// whose value we haven''t checked to make sure it wasn''t nil...`


    `id object2 = nil;`


    `// ... and try to add it to the array?`


    `[array addObject:object2];`


    `NSLog(@"inserted all the objects I could!");`


    `}`


    `- (void)rangeException {`


    `// Assuming we have an array of things...`


    `NSArray *array = @[@"one", @"two", @"three"];`


    `// ... we can ask for the index of an item...`


    `NSUInteger indexOfTwo = [array indexOfObject:@"two"];`


    `// ... and we can later retrieve that value using the same index.`


    `NSLog(@"found indexed item %@", array[indexOfTwo]);`


    `// But, what if we try to find the index for something that''s not`


    `// there?`


    `NSUInteger indexOfFive = [array indexOfObject:@"five"];`


    `// And we forget to check the return value to make sure it''s not`


    `// NSNotFound?`


    `NSLog(@"found indexed item %@", array[indexOfFive]);`


    `}`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification`


    `{`


    `[self invalidArgumentException_unrecognizedSelector];`


    `[self invalidArgumentException_insertNil];`


    `[self rangeException];`


    `NSRunAlertPanel(@"Success", @"Hooray, you fixed everything!"`,


    `nil, nil, nil);`


    `}`


    `@end`


    Run this code. The promised alert panel won’t appear (but the empty window included
    in the default nib file will). What will happen, though, is that something like
    the following will appear in Xcode’s debug output:


    `2013-02-07 00:25:12.756 ExceptionCity[43532:303] -[__NSCFNumber length]: unrecognized
    selector sent to instance 0x387`


    If you look back at the `invalidArgumentException_unrecognizedSelector` method
    and its comments, you can probably see where this is coming from: our array contains
    an `NSNumber`, which doesn’t have a `length` method, and as a result an exception
    is raised. We’re not doing anything to explicitly deal with the exception, and
    it ends up going all the way down the call stack without being handled, which
    leads to the default behavior mentioned earlier: some info about the exception
    (specifically, its `reason`) is logged, and the application skips the rest of
    the current event. In this case, the event being processed is the application
    launch, which is already done at this point.


    If we hadn’t just pointed out that method for you, things wouldn’t be so clear.
    The logged exception info doesn’t tell us anything about where it came from, the
    name of the exception, or anything else that might help us find what part of our
    code triggered the exception. This is where our new friend, the Xcode debugger,
    comes in. The debugger lets us set a breakpoint on all exceptions, so we can pause
    the program the moment an exception is raised and try to spot the problem.


    THE DEBUGGER


    Most developers are probably familiar with the concept of a debugger, which lets
    you inspect the state of your application while it’s running in order to diagnose
    problems. If you haven’t encountered a debugger before, here’s a quick rundown
    of some of the key concepts:


    *   A breakpoint lets you specify, either with a line number in your source code
    or the name of a method or function, a spot where the program should halt. All
    the breakpoints you’ve currently set up are shown in the Breakpoint Navigator
    on the left side of the project window. When your program stops at a breakpoint,
    you can examine all CPU registers at that spot in the program’s execution. If
    you have the source code for the program, you can also access any variables (local,
    instance, or otherwise) that are relevant at that spot. All CPU registers and
    available variables are shown in a table view in Xcode’s Debug Area at the bottom
    of the project window.

    *   The call stack is the list of all the nested methods and functions that are
    in operation at any point in time. This appears in a table view in Xcode’s Debug
    Navigator on the left side of the project window. When your program is halted,
    the current method or function appears at the top of the call stack, the method
    or function that called it appears below it, and so on. You can choose a particular
    item or “frame” in the call stack in order to switch focus, at which point the
    Debug Area will display the CPU registers and variables as they were when that
    method or function called the method or function above it in the call stack.

    *   The debugger contains buttons that let you perform some actions relative to
    the currently highlighted code line. You can step over the current line (which
    executes the rest of what’s on the current line and then halts at the next line),
    step into the next method or function (which will halt at the beginning of the
    next method or function that’s called), step out of the current method or function,
    halting in the caller just after returning, or continue or stop the program.

    *   The debugger contains a command-line interface called `lldb` (a modern offshoot/rewrite
    of the `gdb` command that has historically been standard on most UNIX-based operating
    systems) which lets you use all the functionality mentioned before, as well as
    execute arbitrary code and examine the results. You can call C functions and Objective-C
    methods by typing their names just as you would in our source code, and use values
    from the running program’s variables as message recipients and parameters.


    For more detailed information on using the Xcode debugger, see the Debug and Tune
    Your App document included with the Xcode documentation.'
  trans: "\n### 创建测试平台\n\n让我们构建一个小型应用程序，演示 Cocoa 程序员可能遇到的几种异常。在 Xcode 中，创建一个新的 Cocoa\
    \ 应用程序（这次不涉及 Core Data 或文档），命名为“ExceptionCity”，并将类前缀设为“EC”。我们创建的应用程序将自动包含一个名为\
    \ `ECAppDelegate` 的类。\n\n我们的应用程序委托将是一个非常简单的类，包含 `applicationDidFinishLaunching:`\
    \ 委托方法，该方法会调用三个不同的“工具”方法，每个方法都演示了一个常见的 Cocoa 陷阱，这些陷阱可能导致运行时引发异常。如果这三个方法都能成功执行并返回，我们将看到一个祝贺性的警告面板（这正是我们一直想要的）。然而，每个工具方法都存在一个会引发异常的问题。我们的目标是找到并修复每个问题。以下是\
    \ `ECAppDelegate.m` 文件的完整内容：\n\n```\n#import \"ECAppDelegate.h\"\n\n@implementation\
    \ ECAppDelegate\n\n- (void)invalidArgumentException_unrecognizedSelector {\n \
    \   // 动态性的缺点在于偶尔会出现类型不匹配。\n    // 例如，有时很难确定从数组中取出的到底是什么。\n    // 想象这个数组是在某处创建的...\n\
    \    NSArray *nameComponents = @[@\"Thurston\",\n                            \
    \    @\"Howell\",\n                                [NSNumber numberWithInt:3]];\n\
    \    // ... 并在稍后被访问，而代码只是假设数组中的所有项都是字符串：\n    NSInteger nameComponentLength =\
    \ 0;\n    for (NSString *component in nameComponents) {\n        nameComponentLength\
    \ += [component length];\n    }\n    NSLog(@\"所有名称组件的总长度：%ld\",\n          (long)nameComponentLength);\n\
    }\n\n- (void)invalidArgumentException_insertNil {\n    // 假设我们有一个用于存放内容的数组...\n\
    \    NSMutableArray *array = [NSMutableArray array];\n    // ... 我们可以向其中添加一个对象。\n\
    \    id object1 = @\"hello\";\n    [array addObject:object1];\n    // 但假设我们有一个方法参数或实例变量，\n\
    \    // 其值我们未检查以确保它不是 nil...\n    id object2 = nil;\n    // ... 然后尝试将其添加到数组中？\n\
    \    [array addObject:object2];\n    NSLog(@\"已插入我能插入的所有对象！\");\n}\n\n- (void)rangeException\
    \ {\n    // 假设我们有一个包含内容的数组...\n    NSArray *array = @[@\"one\", @\"two\", @\"\
    three\"];\n    // ... 我们可以查询某个项的索引...\n    NSUInteger indexOfTwo = [array indexOfObject:@\"\
    two\"];\n    // ... 稍后我们可以使用相同的索引来检索该值。\n    NSLog(@\"找到了索引项 %@\", array[indexOfTwo]);\n\
    \    // 但是，如果我们尝试查找某个不存在的项的索引呢？\n    NSUInteger indexOfFive = [array indexOfObject:@\"\
    five\"];\n    // 并且我们忘记检查返回值以确保它不是 NSNotFound？\n    NSLog(@\"找到了索引项 %@\", array[indexOfFive]);\n\
    }\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\n{\n\
    \    [self invalidArgumentException_unrecognizedSelector];\n    [self invalidArgumentException_insertNil];\n\
    \    [self rangeException];\n    NSRunAlertPanel(@\"成功\", @\"太棒了，你修复了所有问题！\",\n\
    \                    nil, nil, nil);\n}\n\n@end\n```\n\n运行这段代码。之前承诺的警告面板不会出现（但默认\
    \ nib 文件中包含的空窗口会出现）。不过，Xcode 的调试输出中会出现类似以下的内容：\n\n`2013-02-07 00:25:12.756 ExceptionCity[43532:303]\
    \ -[__NSCFNumber length]: 向实例 0x387 发送了无法识别的选择器`\n\n如果你回头看 `invalidArgumentException_unrecognizedSelector`\
    \ 方法及其注释，你大概能看出问题出在哪里：我们的数组中包含一个 `NSNumber`，它没有 `length` 方法，因此引发了异常。我们没有做任何明确处理异常的操作，结果这个异常一直沿着调用栈向下传递，最终未被处理，导致了前面提到的默认行为：记录异常的一些信息（具体来说是它的\
    \ `reason`），并且应用程序跳过当前事件的剩余部分。在这种情况下，正在处理的事件是应用程序启动，而此时启动已经完成。\n\n如果我们没有特意向你指出那个方法，情况就不会这么清晰了。记录的异常信息没有告诉我们异常来自何处、异常的名称，或者任何有助于我们找到触发异常的代码部分的线索。这时，我们的新朋友——Xcode\
    \ 调试器——就派上用场了。调试器允许我们为所有异常设置断点，这样我们就可以在异常引发的那一刻暂停程序，并尝试定位问题。\n\n### 调试器\n\n大多数开发者可能都熟悉调试器的概念，它允许你在应用程序运行时检查其状态，以便诊断问题。如果你之前没有接触过调试器，下面是对一些关键概念的快速介绍：\n\
    \n*   断点允许你指定程序应暂停的位置，可以是源代码中的行号，也可以是方法或函数的名称。你当前设置的所有断点都会显示在项目窗口左侧的断点导航器中。当程序在断点处停止时，你可以检查程序执行到该点时所有\
    \ CPU 寄存器的状态。如果你有程序的源代码，你还可以访问在该点相关的所有变量（局部变量、实例变量或其他变量）。所有 CPU 寄存器和可用的变量都会显示在项目窗口底部\
    \ Xcode 调试区域的表格视图中。\n*   调用栈是某个时间点上所有正在运行的嵌套方法或函数的列表。这显示在项目窗口左侧 Xcode 调试导航器的表格视图中。当程序暂停时，当前的方法或函数显示在调用栈的顶部，调用它的方法或函数显示在其下方，以此类推。你可以选择调用栈中的特定项或“帧”来切换焦点，此时调试区域将显示当该方法或函数调用调用栈中上一级方法或函数时的\
    \ CPU 寄存器和变量状态。\n*   调试器包含一些按钮，允许你对当前高亮显示的代码行执行某些操作。你可以“单步跳过”当前行（执行当前行的剩余部分，然后在下一行暂停），“单步进入”下一个方法或函数（在调用的下一个方法或函数的开头暂停），“单步跳出”当前方法或函数（在刚返回的调用者处暂停），或者“继续”或“停止”程序。\n\
    *   调试器包含一个名为 `lldb` 的命令行界面（它是历史上大多数基于 UNIX 的操作系统上标准的 `gdb` 命令的一个现代分支/重写），它允许你使用前面提到的所有功能，还可以执行任意代码并检查结果。你可以像在源代码中一样输入\
    \ C 函数和 Objective-C 方法的名称来调用它们，并使用正在运行的程序的变量值作为消息接收者和参数。\n\n有关使用 Xcode 调试器的更多详细信息，请参阅\
    \ Xcode 文档中包含的《调试和优化你的应用》文档。\n"
- fmt: '在Xcode中，通过选择 `View ➤ Navigators ➤ Show Breakpoint Navigator` 或按 `⌘6` 打开断点导航器。这会使导航面板显示所有当前断点（见图
    [13-1](#A978-1-4302-4543-8_13_Chapter.html#Fig1)）。


    ![A978-1-4302-4543-8_13_Fig1_HTML.jpg](A978-1-4302-4543-8_13_Fig1_HTML.jpg)


    图 13-1. Xcode的断点导航器，显示了一些断点。第一次使用时，左侧列表为空。


    断点导航器显示了Xcode为项目配置的所有断点。因为我们刚创建了一个新项目，列表应该是空的！我们将通过添加异常断点来改变这一点，以捕获应用中抛出的任何异常。记住，每个抛出的异常都是bug的结果，很可能是我们的bug，我们应该抓住每一个机会停下来查看异常来源。


    点击断点导航器左下角的 `+` 符号来创建新断点。会出现一个小弹出菜单，询问要创建哪种类型的断点。选择 `"Add Exception Breakpoint"`，然后会有一个更大的弹出视图显示新断点的选项。将
    `Exception` 弹出菜单设置为 `Objective-C`，确保 `Break` 弹出菜单设置为 `On Throw`，然后点击 `Done`。


    现在我们有了一个断点，它会在任何 Objective-C 异常抛出时停止 Xcode。完美！通过从菜单中选择 `Product ➤ Run` 重新启动 `ExceptionCity`
    应用，如果它仍在运行则先退出。这次，当应用遇到问题代码时，它会在异常抛出处停止执行。图 [13-2](#A978-1-4302-4543-8_13_Chapter.html#Fig2)
    大致展示了此时 Xcode 的样子。


    ![A978-1-4302-4543-8_13_Fig2_HTML.jpg](A978-1-4302-4543-8_13_Fig2_HTML.jpg)


    图 13-2. Xcode 在断点处停止


    左侧导航面板更改为调试导航器，并显示调用栈，顶部是我们断点位置（一个名为`objc_exception_throw`的函数，这是Xcode实际放置异常断点的地方），下方是所有调用者。注意，我们有源代码的帧以黑色文本显示，而封闭源代码库中的帧以灰色文本显示。灰色帧仍然可访问，但只能以汇编语言形式。通过查看左侧的帧编号序列，我们还可以看到并非所有帧都显示。默认情况下，Xcode
    显示我们有源代码的帧，其他帧则压缩成水平虚线。我们可以使用调试导航器底部的水平滑块来更改此设置，根据需要显示更多或更少的帧。


    项目窗口底部是调试区域，分为两部分。左侧显示所有可用变量和寄存器值，我们可以立即看到一些简单值。右侧显示 `lldb` 控制台界面，我们可以在其中查看程序输出（由
    `NSLog` 等生成）并在 `lldb` 提示符下输入命令。如果您看不到底部视图，可以通过选择 `View ➤ Debug Area ➤ Activate
    Console` 使其显示。


    主编辑器视图显示所选栈帧的源代码或编译后的汇编代码，并用箭头和高亮标记停止的行。


    此时，在异常被抛出的那一刻停止，看看异常是什么将会很有趣。但怎么做呢？当 Xcode 暂停时，它指向包含我们源代码的最上层栈帧。那是我们程序中问题所在的位置，但我们无法在那“看到”异常。也就是说，那里没有局部变量或任何可访问的全局结构来显示异常本身。


    相反，我们需要关注程序真正停止的最上层栈帧，即 `objc_exception_throw` 函数。点击它以查看详情。它看起来应该像图 [13-3](#A978-1-4302-4543-8_13_Chapter.html#Fig3)。


    ![A978-1-4302-4543-8_13_Fig3_HTML.jpg](A978-1-4302-4543-8_13_Fig3_HTML.jpg)


    图 13-3. 源代码？谁需要它！


    我们只看到一堆汇编代码，没有变量名或其他任何东西来指导我们。幸运的是，有一个我们可以利用的调用约定。在为 Mac OS X（64位 Intel 硬件）编译的代码中，任何函数的返回值都临时存储在名为`rax`的
    CPU 寄存器中，在 `lldb` 中可以通过名为`$rax`的特殊变量访问。当我们的程序在 `objc_exception_throw` 函数中停止时，`$rax`
    寄存器恰好包含新的异常，所以我们准备好了！`lldb` 调试器包含 `po` 命令，用于以可读格式打印对象的值（它实际上调用对象的 `description`
    方法，该方法返回一个 `NSString`，并打印该字符串值）。在 `lldb` 提示符下尝试以下操作：


    ```

    (lldb) po $rax

    $1 = 4296302928 -[__NSCFNumber length]: unrecognized selector sent to instance
    0x387

    ```


    看起来熟悉吗？这基本上和我们之前在输出中看到的文本相同。知道我们可以在这里访问 `NSException`，我们可以利用 `lldb` 的实时 Objective-C
    方法执行来询问更多信息：


    ```

    (lldb) po [$rax name]

    $2 = 0x00007fff783e0a30 NSInvalidArgumentException

    (lldb) po [$rax reason]

    $3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized selector sent to
    instance 0x387

    ```


    这里我们看到 `reason` 方法的返回值与 `description` 的返回值相同，但 `name` 方法返回的名称，你可能记得通常用作异常的类型或类别。在这种情况下，我们看到了
    Cocoa 中最常见的异常类型之一：`NSInvalidArgumentException`。'
  raw: 'In Xcode, open the Breakpoint Navigator view by selecting View ➤ Navigators
    ➤ Show Breakpoint Navigator or by pressing ⌘6\. This makes the navigation panel
    show all the current breakpoints (see Figure [13-1](#A978-1-4302-4543-8_13_Chapter.html#Fig1)).


    ![A978-1-4302-4543-8_13_Fig1_HTML.jpg](A978-1-4302-4543-8_13_Fig1_HTML.jpg)


    Figure 13-1.


    Xcode’s Breakpoint Navigator, showing a couple of breakpoints. Your first time
    here, you’ll have an empty list on the left


    The Breakpoint Navigator shows all the breakpoints that Xcode currently has configured
    for our project. Since we’ve just created a brand-new project, this list should
    be empty! We’ll change that by adding an exception breakpoint to catch any exception
    that is raised in our app. Remember, every raised exception is the result of a
    bug, probably ours, and we’ll want to take every chance we get to stop and see
    where it’s coming from.


    Click the + symbol at the absolute bottom-left of the Breakpoint Navigator to
    create a new breakpoint. A small pop-up menu will appear and ask what kind of
    breakpoint to create. Choose “Add Exception Breakpoint”, and a larger pop-up view
    will appear above with some options for a new breakpoint. Set the Exception pop-up
    to Objective-C, and make sure the Break pop-up is set to On Throw, then click
    Done.


    Now we have a breakpoint that will stop Xcode for any Objective-C exception that
    is raised. Perfect! Restart the ExceptionCity application by choosing Product
    ➤ Run from the menu, first quitting it if it’s still running. This time, when
    the application hits the problematic code, it will halt execution where the exception
    is raised. Figure [13-2](#A978-1-4302-4543-8_13_Chapter.html#Fig2) shows roughly
    what Xcode looks like at this point.


    ![A978-1-4302-4543-8_13_Fig2_HTML.jpg](A978-1-4302-4543-8_13_Fig2_HTML.jpg)


    Figure 13-2.


    Xcode stops at a breakpoint


    The navigation panel on the left changes to the Debug Navigator and shows the
    call stack with the location of our breakpoint (a function called `objc_exception_throw`,
    which is where Xcode really places its exception breakpoints) at the top and all
    callers below. Note that the frames for which we have source code available are
    rendered with black text, while the frames that are stuck in closed-source libraries
    are shown with gray text. The grayed-out frames are still accessible, but only
    in the form of assembly language. We can also see, by looking at the sequence
    of frame numbers at the left, that not all frames are displayed. By default, Xcode
    shows the frames that we have the source code for, and little else—the rest being
    compacted into horizontal dotted lines. We can use the horizontal slider at the
    bottom of the Debug Navigator to change this, making Xcode show more or fewer
    frames if we wish.


    At the bottom of the project window is the Debug Area, which is divided into two
    parts. The left side shows all available variables and register values where we
    can see some simple values immediately. The right side shows the lldb console
    interface where we can both view our program’s output (generated by `NSLog`, etc.)
    and enter commands at the lldb prompt. If you’re not seeing that bottom view,
    you can make it appear by selecting View ➤ Debug Area ➤ Activate Console from
    the menu.


    The main editor view shows the source code or compiled assembly code for the chosen
    stack frame, with an arrow and a highlight pointing out the row where it’s halted.


    At this point, having halted right at the moment that an exception was raised,
    it would be interesting to see what the exception is. But how? When Xcode pauses,
    it points at the uppermost stack frame containing our source code. That’s the
    place in our program where the problem is, but we can’t “see” the exception there.
    That is, there’s no local variable or any globally available structure we can
    access from there that will show us the exception itself.


    Instead, we need to focus on the uppermost stack frame where the program is truly
    halted, in the `objc_exception_throw` function. Click on it to take a peek at
    things. It should look like Figure [13-3](#A978-1-4302-4543-8_13_Chapter.html#Fig3).


    ![A978-1-4302-4543-8_13_Fig3_HTML.jpg](A978-1-4302-4543-8_13_Fig3_HTML.jpg)


    Figure 13-3.


    Source code? Who needs it!


    All we see is a pile of assembly code, no variable names or anything else to guide
    our way. Fortunately, there is a calling convention that we can make use of. In
    code compiled for Mac OS X (on 64-bit Intel hardware), the return value of any
    function is stored temporarily in a CPU register called `rax`, which in lldb can
    be accessed with a special variable called `$rax`. When our program halts in the
    `objc_exception_throw` function, the `$rax` register happens to contain the new
    exception, so we are all set! The lldb debugger includes the `po` command for
    printing an object’s value in a readable format (what it actually does is call
    the object’s `description` method, which returns an `NSString`, and prints that
    string value). Try this at the lldb prompt:


    `(lldb) po $rax`


    `$1 = 4296302928 -[__NSCFNumber length]: unrecognized selector sent to instance
    0x387`


    Look familiar? That is basically the same text we saw in the output earlier. Knowing
    that we have access to the `NSException` here, we can make use of lldb’s live
    Objective-C method execution to ask it some more things:


    `(lldb) po [$rax name]`


    `$2 = 0x00007fff783e0a30 NSInvalidArgumentException`


    `(lldb) po [$rax reason]`


    `$3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized selector sent to
    instance 0x387`


    Here we see that the `reason` method’s return value is the same as the description
    return value, but the name method returns the name, which you may recall is typically
    used as a sort of type or category for the exception. In this case, we’re looking
    at one of the most frequently encountered exception types in Cocoa: `NSInvalidArgumentException`.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，为您翻译如下内容。



