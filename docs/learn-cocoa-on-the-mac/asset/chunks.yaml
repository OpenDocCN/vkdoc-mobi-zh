    The easiest way to do this is to go back to `MainMenu.xib`, select the button
    in our window, and open the View Effects Inspector (⌘⌥8). At the top of this Inspector
    is a section titled Core Animation Layer, which shows a list of view objects (see
    Figure [15-3](#A978-1-4302-4543-8_15_Chapter.html#Fig3)).


    ![A978-1-4302-4543-8_15_Fig3_HTML.jpg](A978-1-4302-4543-8_15_Fig3_HTML.jpg)


    Figure 15-3.


    Establishing animation layers


    The selected object (the button) is at the bottom, and all its superviews (in
    this case just one view, the window’s content view) are stacked up above it. Click
    the checkbox to turn on a layer for the view. We can leave the checkbox for the
    button unchecked, since the superview will establish a layer for it.


    Now save everything, run the app, and we’ll see the exact same behavior as we
    had before. So, this new version achieves the same result at the expense of a
    few additional lines of code. So far it doesn’t seem like much of a win. But wait,
    there’s more! Explicit animation via the animation classes, such as `CABasicAnimation`,
    lets us do several more key things that we couldn’t do with implicit animation.


    For starters, we can set the animation’s duration. Add the following line just
    before adding the animation to the layer (with `[[sender layer] addAnimation:a
    forKey:@"position"]`) to make this animation run a little more slowly:


    `a.duration = 1.0;`


    Run with that in place, and we’ll see that the button transitions more slowly.
    We can also change the pacing of the animation so that it doesn’t go from one
    point to the next in a strictly linear fashion. Let’s set it to an “ease-in, ease-out”
    motion like this:


    `a.timingFunction = [CAMediaTimingFunction functionWithName:`


    `kCAMediaTimingFunctionEaseInEaseOut];`


    Run now, and we’ll see that when we click the button, it starts moving slowly,
    then gradually builds up steam and moves more quickly, only to taper off its speed
    as it reaches its target. Under the hood, these timing functions work by providing
    a simple mapping for a value shifting from 0.0 to 1.0, using a pair of control
    points to describe a curve between the two. Does that ring a bell? This seems
    like the perfect use for the curve editing control we implemented in the first
    half of this chapter! We can use the curve editor to define the timing that will
    be applied to the button’s movement each time we click it.


    Start by adding the `CECurveView` class files from the previous project. In the
    MovingButton project, right-click the MovingButton folder, then select Add Files
    to “MovingButton” from the context menu. Navigate to the location of `CECurveView.h`
    and `CECurveView.m`, select them both, and click the Add button. In the sheet
    that appears, click to turn on the Copy items into destination group’s folder
    checkbox, and make sure the MovingButton target is checked in the lower part of
    the sheet (see Figure [15-4](#A978-1-4302-4543-8_15_Chapter.html#Fig4)).


