    \n这段代码的第一部分逐个为每个视图设置了混合模式。第二部分则为每个`CMColorBlendView`配置了绑定。由于所有视图的绑定方式相同，我们遍历一个包含所有`ColorBlendView`的数组（在`for`循环前临时创建），并为每个视图执行绑定操作。\n\
