  trans: '

    ### 属性检查器


    我们先来看看属性检查器。（如果看不到，请按 `⌥⌘4` 在实用工具区域显示该面板，然后单击你的标签。）检查器应如图 2-10 所示。


    我们可以使用属性检查器来更改标签的外观。我们可以修改文本对齐、边框和滚动行为等属性。有趣的是，其中几个字段实际上不会产生任何效果。试试在“占位符”字段中输入内容。完全不会改变标签的外观，对吧？


    这是怎么回事？当我们从库中拖出一个标签时，我们抓取的是 `NSTextField` 类的一个实例。`NSTextField` 类既用于静态文本字段，也用于可编辑文本字段。在可编辑文本字段中，占位符就是我们在某些空文本字段中看到的灰色文字，它提示该字段的作用。


    ![A978-1-4302-4543-8_2_Fig10_HTML.jpg](img/A978-1-4302-4543-8_2_Fig10_HTML.jpg)

    图 2-10. 属性检查器显示了在 Interface Builder 中可以编辑的标签的所有属性


    当文本字段被配置为标签时，不需要占位符。提供一个占位符也无妨，但也无益。


    本书记载不了所有与上下文相关的属性，但我们会逐一讲解那些不太明显的属性。随着您阅读本书的深入，您将熟悉大多常用的属性。


    我们来更改标签的大小。如果标签未被选中，单击它将其选中。标签两侧会出现圆点。这些圆点是大小调整手柄，允许我们更改所选项目的大小。Interface Builder
    中的大多数对象都有四个调整手柄，每个角一个，允许我们在四个方向上调整大小。但某些项目（如标签）只有两个调整手柄。标签的属性（特别是其字体的大小）决定了标签的垂直大小。我们不会通过调整大小来改变标签的高度。我们只使用调整手柄来更改标签的宽度。


    我们来将标签居中。确保标签的左侧与窗口左边缘附近的蓝色参考线对齐。然后，抓住右侧的调整手柄，将标签拖至窗口右边缘附近的蓝色参考线处。完成操作后，标签应如图
    2-11 所示。


    ![A978-1-4302-4543-8_2_Fig11_HTML.jpg](img/A978-1-4302-4543-8_2_Fig11_HTML.jpg)

    图 2-11. 调整大小后，我们的应用程序窗口在 Interface Builder 中的显示效果


    现在，保持标签选中状态，在属性检查器中找到一行标有“对齐”的按钮，然后选择“居中对齐文本”按钮（图 2-12）。另外，找到一个标有“行为”的弹出式菜单，将其设置为“可选”，这告诉
    Cocoa 我们希望允许用户根据需要将此标签复制到剪贴板。默认情况下，标签是不可选的，但我们刚才更改了这一设置。


    ![A978-1-4302-4543-8_2_Fig12_HTML.jpg](img/A978-1-4302-4543-8_2_Fig12_HTML.jpg)

    图 2-12. 标签的属性检查器中的对齐按钮，设置为居中对齐文本


    ### 更改标签的颜色和字体


    我们对窗口内容进行最后一项更改：更改文本的字体、大小和颜色。如果查看属性检查器，我们大概能知道如何更改文本颜色，但设置字体和大小有些小窍门。


    首先，设置颜色。在属性检查器中找到标有“文本颜色”的颜色井。单击它，将出现标准的 Mac OS X 颜色选择器（图 2-13），我们可以选择所需的文本颜色。现在就选择吧，挑选任意你喜欢的颜色。


    ![A978-1-4302-4543-8_2_Fig13_HTML.jpg](img/A978-1-4302-4543-8_2_Fig13_HTML.jpg)

    图 2-13. 在 Cocoa 应用程序中，使用标准 Mac OS X 颜色选择器来选择颜色。我们正在 Interface Builder 中使用它来设置文本颜色


    Xcode 本身是用 Cocoa 构建的，并利用了许多内置的 Cocoa 功能，比如标准颜色选择器。Apple 工程师不希望像你一样重复发明轮子。当你编写自己的应用程序时，只需几行代码，甚至在某些情况下无需编写任何代码，就可以使用完全相同颜色选择器。


    你可以在应用程序中使用的另一个内置 Mac OS X 功能是标准字体窗口，它允许你更改所选文本的字体、大小和属性。在创建分发给他人的应用程序时，重要的是要意识到你可能会选择用户没有安装的字体。通常，对于标准
    GUI 组件，最好不要更改字体。一致的字体使用是 Mac 以 GUI 一致性著称的重要组成部分。大多数标签、按钮和其他控件默认使用 Lucida Grande
    字体。你可以更改某些标签的大小，并在粗体和常规之间切换以突出显示不同内容，但保留字体本身不变。Xcode 在属性检查器的“字体”字段中提供了指导，如图 2-14
    所示。尽管可以使用“字体”面板，但 Xcode 还提供了一个快速访问系统默认字体的标注窗口。如果你知道想要当前系统字体的粗体版本，可以轻松地从该标注窗口的“字体”下拉菜单中获取。通常，对于常见的用户界面元素，你会使用这种方法，而不是显式地设置字体。


    ![A978-1-4302-4543-8_2_Fig14_HTML.jpg](img/A978-1-4302-4543-8_2_Fig14_HTML.jpg)

    图 2-14. Xcode 有一个专门的字体选择器标注窗口，方便快速访问默认字体


    按 `^⇧⌘T` 调出 Xcode 中的字体窗口。确保我们的标签仍被选中（查找调整手柄），并确保应用程序的主窗口仍是最前面的窗口。


    一旦我们将标签调整到满意的样式，我们就会为应用程序进行最后的润色，然后运行它。我们就快完成了！

    '
- fmt: '### Creating the Application Icon


    One thing that all applications need is an icon. Mac OS X uses a special format
    for icons that bundles multiple images together in order to provide images in
    multiple sizes and resolutions for use when zooming and for devices with Retina
    displays. However, Xcode will prepare this format for us. We just need to name
    our images appropriately and put them into a folder with a `.iconset` extension.


    The naming convention is pretty straightforward. An example image name is `icon_128x128@2x.png`.
    Each image’s name starts with `icon_`, followed by the resolution, followed by
    an optional marker to indicate high-resolution artwork, followed by the file extension,
    such as `.png`. The full set of sizes utilized by Cocoa is 16 × 16, 32 × 32, 128
    × 128, 256 × 256, and 512 × 512. Each of these can optionally have a high-resolution
    marker of `@2x`. Note that the sizes are in screen points, not pixels; a `512
    × 512@2x` file has a size of 1024 × 1024 pixels. Cocoa knows whether our app is
    running on a machine with a Retina or other high-resolution display and will choose
    the best bitmap to use given the screen’s pixel density and the needed size. If
    we don’t provide the image that Cocoa wants, it will scale one of the images that
    we did provide. We can provide a big image with incredible detail for when running
    on a Mac with a Retina display, but that might not look exactly the way we want.
    Support for multiple images means that we can tailor how the icon appears at smaller
    sizes.


    We need to start our icon in an image-editing program such as Photoshop, Pixelmator,
    or GIMP. The original file should be a size of 1024 × 1024 pixels and saved in
    a standard image format that supports alpha channels (transparency), such as TIFF,
    PSD, or PNG. For this example, we’re working with `.png` files. We’ll save it
    as `icon_512x512@2x.png`. We can then scale down the image in whatever method
    works best. This would typically be done by using our image editor’s resize functions
    and then cleaning it up by hand as necessary.


    To save you the trouble of creating your own icon, we’ve provided a `hello world.iconset`
    folder with images that you can add to your project. You’ll find this folder in
    the downloaded project files for [Chapter 2](#A978-1-4302-4543-8_2_Chapter.html).
    If you’d rather roll your own, go right ahead, using the same naming conventions
    in the `hello world.iconset` folder for your images.


    ### Adding an Icon to our Project


    Whether you created an icon yourself or you are using ours, it’s time to add the
    icon to the project in Xcode. To do this, select the Project in the Navigator
    area on the left side of the screen. It’ll be the top item in the Project Navigator
    view; in our case, it’s labeled “Chapter2.” The project summary info will show
    up in the Editor area in the middle of the window, and the Chapter2 Target should
    be selected. Drag the `hello world.iconset` folder from the Finder to Xcode’s
    App Icon well in the middle of the window, as shown in Figure [2-15](#A978-1-4302-4543-8_2_Chapter.html#Fig15).
    This tells Xcode that we want to import this file into our project.


    ![A978-1-4302-4543-8_2_Fig15_HTML.jpg](A978-1-4302-4543-8_2_Fig15_HTML.jpg)


    Figure 2-15. Dragging a file to the App Icon well to add the icon to the Xcode
    project


    When we let go of the mouse button, the `.iconset` file will be copied into the
    project directory and added to the list of files. We can also have Xcode utilize
    a file that lives outside the project directory, but for now we want to have everything
    in one place.


    ### Property Lists


    `Info.plist` is a special kind of file known as a property list. Property lists
    are used extensively throughout OS X. Although end users rarely see them, they
    are used in many parts of Cocoa development, so you will see them a lot.


    Property list files are made up of a list of entries. Each entry is made up of
    a key and a value. Figure [2-16](#A978-1-4302-4543-8_2_Chapter.html#Fig16) shows
    Xcode’s built-in Property List Editor, editing the file `Chapter2-Info.plist`.
    Each row represents a single entry. As you can see, the Property List consists
    of three columns. The left column is labeled Key and the right column is labeled
    Value. The middle column, labeled Type, indicates the data type; most property
    list values are Strings, but other types may be seen from time to time.


    > Note: Property lists also have the ability to store multiple values under a
    single key. It is possible to store either an array (or list) of items under a
    single key, or even to store another whole set of keys and values under one key.
    It’ll be a while before you need that functionality, but we figured you should
    know it was possible.


    In Figure [2-16](#A978-1-4302-4543-8_2_Chapter.html#Fig16), the entry with the
    key `Icon file` is highlighted. Note that the `Icon file` entry in the Property
    List has been automatically set to the `iconset` directory that we imported.


    ![A978-1-4302-4543-8_2_Fig16_HTML.jpg](A978-1-4302-4543-8_2_Fig16_HTML.jpg)


    Figure 2-16. `Chapter2-Info.plist` opened in the editing pane so we can see the
    name of this application’s icon file


    Are you ready to write some code? Well, guess what? There’s none to write. We’re
    done with our application.


    ### Running the Application


    Build and run your application by clicking Run in the upper left-hand corner of
    the Xcode window. Xcode will build our application, which may take a bit, then
    run our application. A window should appear containing our centered, colored label.
    If we look in the dock at the bottom of our Mac’s main screen, we’ll see our application
    represented by the icon we imported into our project. But wait: there’s more!


    Select About Chapter2 from the Chapter2 menu, and the About box will appear (Figure
    [2-17](#A978-1-4302-4543-8_2_Chapter.html#Fig17)). Not only do we get an About
    box for free, but it includes our icon.


    ![A978-1-4302-4543-8_2_Fig17_HTML.jpg](A978-1-4302-4543-8_2_Fig17_HTML.jpg)


    Figure 2-17. Our application uses our icon in a variety of places, including the
    About box


    We’re still not done. Move the mouse over the words “Hello, World!” in the application’s
    main window. The cursor should change from an arrow to a text cursor. Because
    we made the label selectable, Cocoa automatically changes the cursor as a hint
    to the user that they can select this text. Go ahead and double-click the word
    “Hello” and it will highlight. Now if we select the Edit menu, we’ll see that
    the Copy menu item is not grayed out. If we choose it, our program will copy the
    word “Hello” to the pasteboard and we can then paste it into any other application
    that accepts text. With “Hello” still selected, select the Edit menu, then select
    the Speech submenu, and select Start Speaking. The application will say “Hello”
    using your Mac’s text-to-speech capabilities.


    Without writing a single line of code, our application supports copying text to
    the pasteboard and text-to-speech. With almost no work, our application behaves
    like a real Mac application, with windows and a menu bar, and it responds to the
    common key commands, like ⌘Q to quit. Our application’s main window can be moved
    around, minimized to the dock, and even closed. We can hide our application, or
    hide all the other applications. All of this functionality is ours for three easy
    payments of nothing, including shipping and handling. That is the power of Cocoa.
    If your computer already knows how to do something, you probably won’t have to
    write very much code to do that thing, and sometimes you won’t have to write any
    code at all.'
  raw: '## Creating the Application Icon


    One thing that all applications need is an icon. Mac OS X uses a special format
    for icons that bundles multiple images together in order to provide images in
    multiple sizes and resolutions for use when zooming and for devices with Retina
    displays. However, Xcode will prepare this format for us. We just need to name
    our images appropriately and put them into a folder with a `.iconset` extension.


    The naming convention is pretty straightforward. An example image name is `icon_128x128@2x.png`.
    Each image’s name starts with `icon_`, followed by the resolution, followed by
    an optional marker to indicate high-resolution artwork, followed by the file extension,
    such as `.png`. The full set of sizes utilized by Cocoa is 16 × 16, 32 × 32, 128
    × 128, 256 × 256, and 512 × 512\. Each of these can optionally have a high-resolution
    marker of @2x. Note that the sizes are in screen points, not pixels; a 512 × 512@2x
    file has a size of 1024 ×1024 pixels. Cocoa knows whether our app is running on
    a machine with a Retina or other high-resolution display and will choose the best
    bitmap to use given the screen’s pixel density and the needed size. If we don’t
    provide the image that Cocoa wants, it will scale one of the images that we did
    provide. We can provide a big image with incredible detail for when running on
    a Mac with a Retina display, but that might not look exactly the way we want.
    Support for multiple images means that we can tailor how the icon appears at smaller
    sizes.


    We need to start our icon in an image-editing program such as Photoshop, Pixelmator,
    or GIMP. The original file should be a size of 1024 × 1024 pixels and saved in
    a standard image format that supports alpha channels (transparency), such as TIFF,
    PSD, or PNG. For this example, we’re working with `.png` files. We’ll save it
    as `icon_512x512@2x.png`. We can then scale down the image in whatever method
    works best. This would typically be done by using our image editor’s resize functions
    and then cleaning it up by hand as necessary.


    To save you the trouble of creating your own icon, we’ve provided a `hello world.iconset`
    folder with images that you can add to your project. You’ll find this folder in
    the downloaded project files for [Chapter 2](#A978-1-4302-4543-8_2_Chapter.html).
    If you’d rather roll your own, go right ahead, using the same naming conventions
    in the `hello world.iconset` folder for your images.


    ## Adding an Icon to our Project


    Whether you created an icon yourself or you are using ours, it’s time to add the
    icon to the project in Xcode. To do this, select the Project in the Navigator
    area on the left side of the screen. It’ll be the top item in the Project Navigator
    view; in our case, it’s labeled “Chapter2.” The project summary info will show
