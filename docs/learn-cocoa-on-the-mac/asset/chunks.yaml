- fmt: '这个标签有些误导性，因为页面上还没有显示任何神奇数字，所以我们需要添加一个用户界面组件来显示它。在对象库（Object Library）面板中，向下滚动一点找到文本字段（**Text
    Field**）；它应该直接位于标签（**Label**）对象的下方。如果我们在库中单击一个对象并悬停在其上，会弹出一个有用的小窗口，其中包含有关该控件的更多信息，包括该控件底层的`AppKit`类（见图[3-6](#A978-1-4302-4543-8_3_Chapter.html#Fig6)）。对于文本字段，该类是`NSTextField`。当这个小弹出窗口激活时，我们可以单击对象库中的其他组件以查看每个组件的信息。如果我们单击标签，会看到标签也是一个`NSTextField`实例，但具有不同的初始显示和可编辑性设置。在学习`AppKit`类时，了解对象库中哪个类对应哪个组件非常有用；许多类承担着双重职责。


    ![A978-1-4302-4543-8_3_Fig6_HTML.jpg](A978-1-4302-4543-8_3_Fig6_HTML.jpg)


    图 3-6. Xcode 可以显示关于对象库中对象的弹出信息


    重新单击文本字段，将一个文本字段实例拖到我们的窗口上。将其放置在标签右侧的对面，让蓝色引导线指引你，并在引导线希望它去的位置对齐（图[3-7](#A978-1-4302-4543-8_3_Chapter.html#Fig7)）。


    ![A978-1-4302-4543-8_3_Fig7_HTML.jpg](A978-1-4302-4543-8_3_Fig7_HTML.jpg)


    图 3-7. Xcode 引导线有助于布局用户界面控件


    看看这个文本字段的属性检查器（**Attributes Inspector**），位于实用工具区域（**Utility area**）（图[3-8](#A978-1-4302-4543-8_3_Chapter.html#Fig8)）。它显示了与之前拖出的标签检查器相同的控件——这是有道理的，因为它实际上是同一个`Cocoa`对象。不可编辑的标签和可编辑的文本字段都是`NSTextField`对象的实例，只是绘制对象的参数不同。我们可以根据应用程序的需求调整对象的行为。对于这个应用，我们要防止用户通过在字段中输入内容来更改神奇数字，因为那样它就不再神奇了。要进行更改，请单击行为（**Behavior**）下拉菜单，并将其从可编辑（**Editable**）更改为可选中（**Selectable**）。现在用户无法更改它，但他们可以用鼠标选中并复制它。


    ![A978-1-4302-4543-8_3_Fig8_HTML.jpg](A978-1-4302-4543-8_3_Fig8_HTML.jpg)


    图 3-8. 文本字段的属性检查器


    让我们把包含神奇数字的窗口缩小一点；在非必要的情况下，我们不想占用太多屏幕空间。窗口可通过透明边框外围的调整手柄进行调整大小，如图[3-9](#A978-1-4302-4543-8_3_Chapter.html#Fig9)所示。单击其中一个调整手柄并缩小窗口；我们会看到窗口的宽度和高度指示，并且在调整大小时会看到窗口重绘，以便我们了解调整大小对内容的影响。


    ![A978-1-4302-4543-8_3_Fig9_HTML.jpg](A978-1-4302-4543-8_3_Fig9_HTML.jpg)


    图 3-9. 在 Xcode 中调整应用程序主窗口的大小


    窗口稍微变小后，我们可以继续布局。下一个要添加的是水平滑块（**horizontal slider**）。在对象库中查找；我们可以向下滚动对象列表直到找到它，或者在对象库下方的搜索字段中输入几个字符。输入“hor”或“sli”可以很好地缩小范围，便于找到该控件。一旦列表中出现水平滑块，将滑块拖到窗口左中部（图[3-10](#A978-1-4302-4543-8_3_Chapter.html#Fig10)）。蓝色引导线会显示将其放置在哪里。


    ![A978-1-4302-4543-8_3_Fig10_HTML.jpg](A978-1-4302-4543-8_3_Fig10_HTML.jpg)


    图 3-10. 向应用程序窗口添加滑块'
  raw: 'This label is somewhat misleading since there’s no magic number on display
    yet, so we’ll need to add a user-interface component to show it. In the Object
    Library pane, scroll down a bit further to find Text Field; it should be directly
    below the Label object. If we single-click an object in the Library and hover
    over it, we’ll get a useful little pop-up window with more information about the
    control, including the AppKit class that underlies the control (see Figure [3-6](#A978-1-4302-4543-8_3_Chapter.html#Fig6)).
    For a Text Field, that class is `NSTextField`. With that little pop-up active,
    we can single-click other components in the Object Library to see information
    on each of them. If we click Label, we’ll see that a Label is also an `NSTextField`
    instance, but with different initial display and editability settings. As you’re
    learning the AppKit classes, it can be useful to see which class corresponds to
    a given component in the Object Library; many classes serve double duty.


    ![A978-1-4302-4543-8_3_Fig6_HTML.jpg](A978-1-4302-4543-8_3_Fig6_HTML.jpg)


    Figure 3-6.


    Xcode can show pop-up info about objects in the Object Library


    Click back on the Text Field, and drag out a Text Field instance onto our window.
    Position it on the right side across from the label, letting the blue lines guide
    you, and let it snap in place where the guides want it to go (Figure [3-7](#A978-1-4302-4543-8_3_Chapter.html#Fig7)).


    ![A978-1-4302-4543-8_3_Fig7_HTML.jpg](A978-1-4302-4543-8_3_Fig7_HTML.jpg)


    Figure 3-7.


    Xcode guidelines assist in laying out User Interface controls


    Take a look at the Attributes Inspector for this text field, in the Utility area
    (Figure [3-8](#A978-1-4302-4543-8_3_Chapter.html#Fig8)). It shows the same controls
    as the Inspector for the label that we dragged out previously—which makes sense,
    because it’s actually the same Cocoa object. Uneditable labels and editable text
    fields are both instances of the `NSTextField` object, just with different parameters
    for how the object is drawn. We can tune how the object behaves based on what
    our application needs. For this app, we’ll want to prevent the user from changing
    the magic number by typing in the field, because then it wouldn’t be magic anymore.
    To make this change, click the Behavior pull-down menu, and change it from Editable
    to Selectable. Now the user won’t be able to change it, but they’ll be able to
    select it with the mouse and copy it.


    ![A978-1-4302-4543-8_3_Fig8_HTML.jpg](A978-1-4302-4543-8_3_Fig8_HTML.jpg)


    Figure 3-8.


    Attribute Inspector for Text Fields


    Let’s make the window containing the magic number a bit smaller; we don’t want
    to take up too much screen real estate when it’s not necessary. The window is
    resizable via the resize handles in the transparent border just beyond the perimeter
    of the window itself, as seen in Figure [3-9](#A978-1-4302-4543-8_3_Chapter.html#Fig9).
    Click one of the resize handles and make the window smaller; we’ll see an indicator
    of the width and height of the window, and we’ll also see the window redraw as
    we resize it so we can see how the resizing affects the contents.


    ![A978-1-4302-4543-8_3_Fig9_HTML.jpg](A978-1-4302-4543-8_3_Fig9_HTML.jpg)


    Figure 3-9.


    Resizing the application’s main window in Xcode


    Once the window is somewhat smaller, we can continue laying it out. The next item
    to add is a horizontal slider. Look in the Object Library for this; we can scroll
    down in the list of objects until we find it, or we can type a few characters
    into the search field below the Object Library. Typing “hor” or “sli” will narrow
    it down nicely to make it easy to find the control. Once we’ve got Horizontal
    Slider in the list, drag the slider out onto the left middle of the window (Figure
    [3-10](#A978-1-4302-4543-8_3_Chapter.html#Fig10)). The blue guidelines will show
    us where to put it.


    ![A978-1-4302-4543-8_3_Fig10_HTML.jpg](A978-1-4302-4543-8_3_Fig10_HTML.jpg)


    Figure 3-10.


    Adding a slider to the application’s window'
