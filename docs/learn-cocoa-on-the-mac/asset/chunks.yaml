    familiar with Xcode, take a second to look at the project window. This is where
    we will be spending an awful lot of our time, so let’s make sure we’re all on
    the same page. Like many applications built for Mac OS X 10.7 Lion and newer,
    Xcode includes a full-screen option. Since Xcode is a complex application, it
    works best with a lot of screen real estate, and we should make it full-screen
    now by clicking the arrows in the upper right-hand corner of the window.


