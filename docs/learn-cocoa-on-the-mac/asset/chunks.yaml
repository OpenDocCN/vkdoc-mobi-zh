- fmt: 'Core Data will first look for a model that matches the version info encoded
    in the data store on disk. If it finds that, then Core Data will look for the
    existence (within the app’s bundle) of a mapping model that can convert the data
    store from the old structure to the new structure. If it can’t find one, it will
    attempt to do a lightweight migration by inferring the mapping. If a mapping can’t
    be inferred, the process will stop and the method will return `nil` with an error
    returned in the `error` parameter. If this happens, the next line of code is `[[NSApplication
    sharedApplication] presentError:error]`, which will cause the application to present
    an error that reads “The managed object model version used to open the persistent
    store is incompatible with the one that was used to create the persistent store.”
    In our case, however, MythBase does have two models available and the mapping
    can be inferred, so the lightweight migration is performed automatically, with
    the old data file first being backed up in case something goes terribly wrong.
    Thanks to this automatic procedure, our users don’t need to worry about importing
    or converting data. When they run a new version of our app, their previously stored
    data is converted automatically and, except in the case of a really huge data
    store, quickly.


    ## Updating the GUI


    Now that we have our updated data model ready to go, it’s time to create the GUI.
    We’re going to leave the existing window almost intact and add a couple of new
    windows, one focused on `MythicalBands` and one focused on `MythicalVenues`.


    ### Creating the Band Window


    First, we’ll create a new window to show a list of `MythicalBands`. Much like
    the process shown in [Chapter 8](#A978-1-4302-4543-8_8_Chapter.html), we’re going
    to use some `NSTableViews`, an `NSArrayController`, and Cocoa bindings to connect
    everything. We’re going to first connect a table view to the list of bands, make
    sure that that works, and then we’ll worry about connecting some `MythicalPersons`
    to the bands.


    To get started, open up `MainMenu.xib` in Xcode. Drag a new `NSWindow` out from
    the Object Library. Use the Attributes Inspector to name this window “Mythical
    Bands.” Drag an `NSTableView` out from the Object Library and drop it into the
    upper left-hand corner of the window, letting the blue guidelines indicate where
    to put it. In the Attributes Inspector, set it to be view-based and with one column
    instead of two. Resize it by expanding it to the right until we reach the blue
    guideline near the right edge of the window, so that the table view fills out
    nearly the width of the window. Move it down a bit so that there’ll be room for
    a search field, which is what we’re about to add.


    Now, drag a Search field out to the space above the table view, along the right
    edge of the window. Position it so that there’s a blue guideline along the bottom
    edge and the right edge of the field. This will set up resizing behavior such
    that the Search field stays tucked against the top of the window and the table
    view resizes below it.


    Next, we’ll need two buttons for Remove and Add. It’s important to be consistent
    with appearance, so use the same gradient buttons as in the main window. Drag
    out a gradient buttons to the space just below the table view. Position the right
    edge of the button so that it’s aligned with the right edge of the table view.
    Blue guidelines will appear to position it at the appropriate distance below the
    table view and aligned with the right edge. Double-click the text inside the button,
    and change the label to “Add.” Drag out another button to the left of the Add
    button. A whole bunch of blue guidelines will light up when it’s vertically aligned
    with the Add button, and it will snap into place at the correct distance to the
    left. Double-click the text inside the button, and relabel it “Remove.”


    That gets us enough UI to work with a list of bands, but we need one more object
    to tie it all together, and that’s an `NSArrayController`. Drag an Array Controller
    out from the Object Library (type “array” into the Search box to narrow down the
    list), and drop it onto the graph paper canvas below the Band window. It will
    disappear and show up in the Object Dock along the left of the Interface Builder
    pane. Double-click slowly on the new array controller, and rename it “Mythical
    Bands.” With the Mythical Bands object selected, open up the Attributes Inspector.
    In the Object Controller section, change the Mode from Class to Entity Name. Enter
    the string “MythicalBand” into the Entity Name field, and check the Prepares Content
    box. When done, our Xcode window should look something like Figure [9-7](#A978-1-4302-4543-8_9_Chapter.html#Fig7).


    ![A978-1-4302-4543-8_9_Fig7_HTML.jpg](A978-1-4302-4543-8_9_Fig7_HTML.jpg)


    Figure 9-7. 


    The beginnings of the Mythical Band window'
