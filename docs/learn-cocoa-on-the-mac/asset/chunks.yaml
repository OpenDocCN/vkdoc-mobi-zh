    Note


    In order to fit the confines of the book format while still showing valid code,
    we’ve wrapped some of these lines by putting a backslash as the very last character
    of a line, which makes the C preprocessor just tack on the content of the next
    line as if it were all on the same line to begin with. Feel free to omit this
    manual wrapping in your own code, making each of those `#defines` into a one-line
    declaration.


    #### Creating the Action Methods


    Now we can start implementing our action methods. Let’s start with `createCharacter:`,
    which will display a summary of all the preferences values related to character
    creation. We start off by grabbing the shared instance of `NSUserDefaults`, then
    we create an empty string to hold the summary text, and then we actually create
    the summary, one preferences entry at a time. At the end, we put the summary text
    into the relevant `NSTextField`. Note that at the beginning of this method, we
    create an `NSMutableString` with a particular capacity, but this is not an upper
    size limit; `NSMutableString` is smart enough to “grow” if necessary. The method
    looks like this:


    `- (IBAction)createCharacter:(id)sender {`


    `NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];`


    `NSMutableString *result = [NSMutableString stringWithCapacity:1024];`


    `[result appendString:`


    `@"Generating a character within these parameters:\n"`


    `"-----------------\n"];   // protip: split strings across lines like this!`


    `[result appendFormat:`


    `@"Maximum name length: %ld\n"`,


    `[ud integerForKey:kCharacterMaxNameLength]];`


    `[result appendFormat:`


    `@"Stats generation policy: %ld\n"`,


    `[ud integerForKey:kCharacterStatsGenerationPolicy]];`


    `[result appendFormat:`


    `@"Allows Paladin: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedPaladin] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Bard: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedBard] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Fighter: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedFighter] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Cleric: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedCleric] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Rogue: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedRogue] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Monk: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedMonk] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Magic-User: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedMagicUser] ? @"YES" : @"NO"];`


    `[result appendFormat:`


    `@"Allows Thief: %@\n"`,


    `[ud boolForKey:kCharacterClassAllowedThief] ? @"YES" : @"NO"];`


    `[self.characterLabel setStringValue:result];`


    `}`


    After entering that code, try compiling and running the application. If all goes
    well, we should be able to see the main window, press the Generate Character button,
    and see a result something like Figure [7-10](#A978-1-4302-4543-8_7_Chapter.html#Fig10).


    ![A978-1-4302-4543-8_7_Fig10_HTML.jpg](A978-1-4302-4543-8_7_Fig10_HTML.jpg)


    Figure 7-10.


    The first run of DungeonThing


    The next step is to open the Preferences window, and start making some changes
    in the Character Generation tab. Disable some checkboxes, drag the slider, etc.
    After each change, click the Generate Character button in the main window again,
    and the displayed parameters should change to reflect the contents of the Preferences
    window.


    Now that that’s working, let’s fill in the method bodies for `createMonster:`
    and `createDungeon:` as shown below. These methods both work just like the `createCharacter:`
    method already shown.


    `- (IBAction)createMonster:(id)sender {`


    `NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];`


    `NSMutableString *result = [NSMutableString stringWithCapacity:1024];`


    `[result appendString:@"Generating a monster within these parameters:\n-----------------\n"];`


    `[result appendFormat:`


