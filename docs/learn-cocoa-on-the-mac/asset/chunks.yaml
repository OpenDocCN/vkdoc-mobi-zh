  trans: '

    ### 占位对象


    不过，在此之前，请先花点时间看看 nib 文件中的前三个图标。这些图标在 Cocoa nib 文件中始终存在。我们无法删除它们，而且与其他图标不同，当 nib
    文件被加载时，它们并不会创建对象实例。这三个被称为占位对象，它们允许此 nib 文件中的对象与某些已经存在的对象建立连接。


    任何 nib 文件中的第一个图标都称为`File’s Owner`（文件所有者）。这个图标是一个占位符，指向从磁盘加载该 nib 文件的对象实例，换句话说，就是“拥有”该
    nib 文件的对象实例。在应用程序的`MainMenu.xib`文件中（就像我们这里这样），`File’s Owner`图标始终指向`NSApplication`的一个实例，这是一个代表整个应用程序的类，它接收输入，并确保根据输入调用相应的代码。对于其他
    nib 文件，`File’s Owner`可能是不同的类，例如文档类的实例，或者代表插件的类。


    这个 nib 文件以及任何其他 nib 文件中的第二个图标称为`First Responder`（第一响应者）。我们将在第 10 章中详细讨论响应者，但简单来说，第一响应者就是用户当前正在交互的对象。例如，如果光标正在文本字段中键入内容，那么该文本字段就是当前的
    first responder。当用户与界面交互时，first responder 会发生变化，而`First Responder`图标为我们提供了一种便捷的方式，可以与当前获得焦点的任何控件或视图进行交互，而无需编写代码来确定是哪个控件或视图。


    第三个图标称为`Application`（或应用程序占位符），它是 Cocoa nib 文件中相对较新的添加。此对象指向此应用程序唯一的`NSApplication`实例。在`MainMenu.xib`文件中，应用程序代理和`File’s
    Owner`占位符始终指向完全相同的内容。应用程序占位符使我们能够从任何 nib 文件访问我们应用程序的`NSApplication`实例，即使是那些`File’s
    Owner`不是`NSApplication`的 nib 文件。在本章中，我们可以忽略应用程序占位符，因为这个 nib 文件的`File’s Owner`已经让我们可以访问那个对象。


    ### 设置窗口


    现在我们可以开始布置窗口了。在“对象”部分，选择标记为`Window - Chapter4`的图标，窗口将显示在 Interface Builder 面板上，并带有蓝色边框表示已选中。实用工具区域中的“检查器”面板将显示窗口可调整的设置（图
    4-4）。我们将对默认设置进行一些更改。


    ![A978-1-4302-4543-8_4_Fig4_HTML.jpg](img/A978-1-4302-4543-8_4_Fig4_HTML.jpg)


    图 4-4.


    属性检查器显示了窗口可用的选项


    将窗口的标题从“Chapter4”更改为“Press a Button”。标题下方的字段标记为`Autosave`（自动保存）。如果我们在此字段中提供值，应用程序将自动在用户偏好设置中保存窗口的位置、大小和其他信息，这样当用户再次启动应用程序时，会发现窗口正好停留在上次关闭时的位置。我们在此处输入什么值并不重要，只要对应用程序中的每个窗口都是唯一的即可。如果我们对任意两个对象使用相同的自动保存名称，则其中一个将无法保存。在此处输入“mainWindow”。


    在`Autosave`字段正下方，有三个复选框，用于控制窗口的一些基本行为。`Close`（关闭）复选框用于启用或禁用关闭窗口的功能。在只有一个窗口的实用工具应用程序中，我们可以取消选中此框，这样窗口就无法关闭。如果此框未选中，则窗口标题栏中的红色“关闭”按钮和`Close`菜单项都将被禁用。如果我们允许关闭窗口，则应提供一种使窗口再次可见的方法。或者，如果我们的应用程序是仅由一个窗口组成的实用工具，那么当窗口关闭时让应用程序退出也是可以接受的。在本章后面，我们将配置应用程序在关闭此窗口时退出，因此暂时保持`Close`复选框的原样。在后续章节中，我们将学习如何使已关闭的窗口重新可见。


    `Minimize`（最小化）复选框控制窗口是否可以使用窗口标题栏中的黄色按钮或从`Window`菜单中选择`Minimize`来最小化到 Dock。一般来说，窗口应该能够被最小化。但也有例外，例如仅在应用程序位于最前面时才可见的实用工具窗口，但绝大多数情况下我们都应该保持此复选框处于选中状态。


    第三个复选框是`Resize`（调整大小），它控制用户是否可以通过拖动右下角来更改窗口的大小。对于此应用程序，我们将禁用此窗口的调整大小功能，因此取消选中`Resize`。我们将在本书后面学习如何处理可在调整大小时变化的窗口中的控件。


    暂时保持其余属性不变。代表窗口的类是一个非常灵活的类，其他属性让我们能够对应用程序的外观以及它如何响应 OS X 中一些更高级的用户功能（如 Expose、Spaces
    和全屏模式）拥有极大的控制权，但对于大多数窗口来说，默认设置就是我们想要的。


    现在，按下`⌥⌘5`调出“大小检查器”（图 4-5）。在这里，我们可以设置所选对象的大小以及与大小相关的属性。正如我们在上一章中看到的，可以使用鼠标移动和调整对象的大小，但此检查器让我们能够更精确地控制对象的大小和位置。


    ![A978-1-4302-4543-8_4_Fig5_HTML.jpg](img/A978-1-4302-4543-8_4_Fig5_HTML.jpg)


    图 4-5.


    应用程序窗口的“大小检查器”

