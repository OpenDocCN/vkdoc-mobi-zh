    performanceDate\"`。\n\n接下来是场馆菜单。从对象库中拖出一个弹出按钮，将其放置在日期选择器旁边，即表格视图下方的右侧。这个按钮的绑定稍微复杂一些。我们需要为弹出按钮配置三个绑定。首先，将“内容”绑定到神话场馆控制器的`arrangedObjects`。接着，将“内容值”绑定到神话场馆控制器的`arrangedObjects`，这次在“模型键路径”中指定`\"\
    name\"`。最后但同样重要的是，将“选定对象”绑定到演出控制器，使用`\"venue\"`作为模型键路径，并将控制器键保留为`\"selection\"\
    `。\n\n最后，将这两个字段放入一个框中，以便在视觉上将它们分组在一起。这不会影响它们的行为，纯粹是为了美观。为此，同时选中日期选择器和弹出按钮。从“编辑器”菜单中，选择“嵌入”\
    \ ➤ “框”将这两个字段组合在一起。将框的标题设置为`\"演出详情\"`。调整框的宽度，使其与演出表格视图的宽度一致。完成这一步后，我们可能需要调整框内控件的大小，以充分利用空间。根据需要对尺寸进行清理，这样就完成了！\n\
    \n现在保存这项工作，在 Xcode 中按下`运行`，然后等待结果！假设一切配置正确，我们现在应该能够为每个乐队的信息添加演出了。\n\n## 总结\n\n\
    在本章中，我们扩展了旧的数据模型，将其从一个单一的实体发展为一组通过关系相互关联的完整实体。我们还看到了这些关系如何通过 GUI 表达（例如，使用弹出列表选择对一关系的远程端，使用表格视图显示对多关系的所有内容），并通过\
    \ Cocoa 绑定进行配置和完全管理。\n\n尽管不想在这个可视化编程的话题上老调重弹，但仍需重申的是，本章中的所有操作都是在我们一行代码都没写的情况下完成的。请注意，我们使用的“可视化编程”一词与微软在其开发工具中使用“可视化”一词并无关联。可视化编程的理念是允许程序或其部分通过图形组件进行构建，而无需使用传统软件编写中那种文本化、程序化的编程方式。Cocoa\
    \ 在一定程度上拥抱了可视化编程，让你仅通过 Xcode 数据建模器和 Interface Builder 就能构建应用原型甚至整个应用。然而，它并不旨在构成一个完整的可视化编程系统，因此对于你构建的每个\
    \ Cocoa 应用，你最终都不可避免需要编写一些代码！\n\n此外，这些使用模式同样适用于你自己的应用程序。仅仅是建模问题域、定义实体和关系这一行为，往往就能让你开始对如何构建\
    \ GUI 有所感觉。随着你在应用开发过程中不断深入，你肯定会找到更多方法，利用 Cocoa 绑定将不同类型的控件连接到你的数据上，有时你也会发现需要通过编写代码来连接对象并在对象之间传递数据。\n\
    \n当你阅读本书后续章节时，你会看到更多将 Core Data 和 Cocoa 绑定作为架构核心部分的应用示例，因此你将看到更多使用这些技术的方法。下一章是最后一章专门讨论\
    \ Core Data 的章节，将展示如何限制 GUI 中显示的数据范围，这对于任何处理大量数据的应用程序来说都是绝对必要的。\n\n# 10. 使用条件进行搜索和检索\
    \ Core Data\n\n## 摘要\n\n第 8 章和第 9 章中的 MythBase 示例展示了 Core Data 工作原理的基础，让我们能够轻松地从后端存储中创建、检索、更新和删除对象。到目前为止，我们主要在\
    \ MythBase 中处理完整的数据集。对于我们使用的大多数实体（`MythicalPerson`、`MythicalBand` 和 `MythicalVenue`），每个实体的所有对象在应用启动时加载，并在应用的整个生命周期内保存在内存中。对于像\
    \ MythBase 这样维护小型数据库的应用来说，这没问题，但如果其中一个主要实体在后端存储中包含数千或数百万个实例呢？我们的应用在启动时会从存储中加载所有数据，这可能导致应用填满所有可用内存、使用磁盘交换等。除了这个问题，我们可能还会遇到糟糕的用户体验，因为一个在显示\
    \ 20 个对象时能够顺畅导航的 GUI，在有数千条条目时可能变得难以有效使用。\n\n此问题的解决方案涉及一个重要功能：提供搜索条件的方法，以便我们可以限制控制器从存储中拉取的对象。本章将介绍如何使用\
    \ `NSPredicate` 将搜索限制为给定 `Entity` 的所有对象中的子集。我们将在 Interface Builder 和源代码中指定硬编码的\
    \ `NSPredicate`，并让用户使用 `NSPredicateEditor` 定义谓词的值。\n\n## 创建 QuoteMonger\n\n我们将通过创建一个名为\
    \ QuoteMonger 的应用来演示 `NSPredicate` 的使用，该应用允许我们跟踪所有最喜欢的节目及其中的经典名言。它将包含一个带有两个实体的\
    \ Core Data 应用，以及一个支持数据输入和灵活查询的 GUI。图 10-1 展示了完成后的应用视图。\n\n![A978-1-4302-4543-8_10_Fig1_HTML.jpg](img/A978-1-4302-4543-8_10_Fig1_HTML.jpg)\n\
    \n图 10-1. QuoteMonger 的数据输入和搜索窗口\n\n> 注意  \n> 到现在为止，您应该已经掌握了创建 Xcode 项目和文件的基础知识，因此对于您已经重复多次的操作，我们将不再提供精确的逐步点击说明，而是将最详细的步骤保留给每章介绍的新主题。\n"
- fmt: '# Creating the Project and Its Data Model


    Start by creating a new Core Data project in Xcode and naming it `QuoteMonger`.
    Then edit the `QuoteMonger.xcdatamodel` file, and add two entities called `Show`
    and `Quote`. We walked through this in the previous two chapters, so please flip
    back a few pages to review if you get stuck.


    Give `Show` a single attribute called `name`, of type `String`. Turn off the Optional
    checkbox, and turn on the Indexed checkbox. Then give `Quote` two `String` attributes
    called `quoteText` and `character`. For each of those, turn on the Indexed checkbox,
    but only turn off the Optional checkbox for `quoteText`, leaving it on for `character`
    (because it’s conceivable that you can’t quite remember or determine who said
    something, but want to store it as a quote anyway).


    Finally, make a one-to-many relationship from `Show` to `Quote` (remember, that
    means making two relationships—a to-many from `Show` to `Quote` called `quotes`
    and a to-one from `Quote` to `Show` called `show`—and configuring them to be each
    other’s inverse). The resulting data model should look like something like Figure
    [10-2](#A978-1-4302-4543-8_10_Chapter.html#Fig2).


    ![A978-1-4302-4543-8_10_Fig2_HTML.jpg](A978-1-4302-4543-8_10_Fig2_HTML.jpg)


    Figure 10-2. The data model for QuoteMonger


    # The Data Entry Window


    With the data model in place, it’s time to start building the GUI. The interesting
    part, which this chapter is mostly about, is the search window. But we can’t do
    any searching until we have some data to search, so we’ll start by creating the
    portion of the GUI that lets us do data entry. We’re going to make a very basic
    GUI for this—displaying shows and quotes in a single window and where only quotes
    that are tied to the currently selected show are displayed.


    ## A Window in Two Parts


    Double-click `MainMenu.xib` in the Xcode project to open it in an Interface Builder
    pane. This brings up the standard empty application nib we’ve used previously.
    Select the `NSWindow` instance in the main nib window, and use the resizing control
    to make it taller (about twice as tall as it started out). We’ll need this space
    because we’re going to put two sets of views in here, one for the `Show` entity
    and one for the `Quote` entity.


    ## Showing Shows


    We’ll start with a view for the `Show`. Drag out an `NSTableView` from the Object
    Library and position it near the top of the window. Resize it to take up most
    of the space. Don’t worry about the blue guidelines this time; in fact, make it
    a bit smaller than the guidelines would suggest. We’re going to group it into
    a box with some other controls, so the sizing isn’t critical yet. Open up the
    Attributes Inspector, and make the table view view-based with one column. Resize
    the column itself to take up the width of the table view, and set the column’s
    name to “Name.” Drag out a button and position it below the lower-right-hand corner
    of the table view, and label it “Add.” Drag out another button of the same time
    and position it to the left of the Add button, and label that one “Remove.” Select
    all three of those controls, and group them into a Box (select Editor ➤ Embed
    In ➤ Box). Set the title of the Box to be “Show.” Now we can adjust the size of
    the Box relative to the window, and then adjust the table view inside the Box
    to get a pleasing arrangement.


    Now that we’ve got a place to list the shows, we need to connect them to the core
    data model, and we’ll use Cocoa bindings and an `NSArrayController` as the glue.
    Drag out an Array Controller from the Object Library, and title it “Shows.” In
    the Attribute Inspector, set the Mode to be “Entity Name” in the pop-up menu,
    and then enter “Show” in the Entity Name field to connect it to the `Show` entity
    in the Model Editor. Check the checkbox for Prepares Content, which will instruct
    the Array Controller to load all the `Shows` at launch time. Switch to the Bindings
    Inspector. Bind the Managed Object Context (at the bottom of the bindings list)
    to App Delegate, and set the Model Key Path to `managedObjectContext`.


    For the bindings, we’ll start with the table view. Select the table view and then
    open the Bindings Inspector. Expand the Content section under Table Content, and
    check the checkbox next to Bind to. The pop-up menu should read “Shows”. The default
    Controller Key of `arrangedObjects` is what we want, and there’s nothing to go
    in Model Key Path. We also want the array controller to know about the selected
    row, so bind the Selection Indexes binding to Shows and set the Controller Key
    here to `selectionIndexes`. Then drill down in the view hierarchy within the table
    view, using the object dock, down to the “Static Text - Table View Cell.” In the
    Attributes Inspector, change the Behavior to Editable. Then, in the Bindings Inspector,
    bind the Value to the Table Cell View and set its Model Key Path to `objectValue.name`.


    That covers the table view. To finish up the part of the window dealing with `Shows`,
    we need to wire up the buttons. This is done just like in the last chapter—with
    a combination of target-action for handling a click and Cocoa bindings for enabling
    or disabling the button as appropriate. We’ll do the target-action first. Control-drag
    from the Add button to the Shows array controller, and select `add:` as the received
    action. Do the same thing for the Remove button, this time selecting `remove:`
    as the received action. Select the Add button again, and go to the Bindings Inspector.
    Check the Bind to checkbox to connect the button to the Shows controller, and
    enter `canAdd` as the Controller Key. Repeat with the Remove button, binding it
    to the `canRemove` Controller Key.


    The window should look like Figure [10-3](#A978-1-4302-4543-8_10_Chapter.html#Fig3).
    Note the Outlets Inspector view in the utility area, showing the bindings and
    target-action connections for the Array Controller. This view can be really useful
    for troubleshooting when things don’t work as expected!


    ![A978-1-4302-4543-8_10_Fig3_HTML.jpg](A978-1-4302-4543-8_10_Fig3_HTML.jpg)


    Figure 10-3. Partial layout for the data entry window'
