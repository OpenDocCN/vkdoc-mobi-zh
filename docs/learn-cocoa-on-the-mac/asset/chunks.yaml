- fmt: "### `NSApplication` Delegate Method\n\nNow we come to this class’s last method,\
    \ the `NSApplication` delegate method `applicationShouldTerminate:`. This method\
    \ is called by the application when the user selects Quit from the menu, and gives\
    \ the delegate a chance to save changes, inspect its state, ask the user if they\
    \ really want to quit, and so on. The value returned by this method determines\
    \ whether the application will really terminate or not. Here’s the code:\n\n```\n\
    - (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication *)sender\n\
    \n{\n\n    // Save changes in the application's managed object context before\
    \ the application terminates.\n\n    if (!_managedObjectContext) {\n\n       \
    \ return NSTerminateNow;\n\n    }\n\n    if (![[self managedObjectContext] commitEditing])\
    \ {\n\n        NSLog(@\"%@:%@ unable to commit editing to terminate\", [self class],\
    \ NSStringFromSelector(_cmd));\n\n        return NSTerminateCancel;\n\n    }\n\
    \n    if (![[self managedObjectContext] hasChanges]) {\n\n        return NSTerminateNow;\n\
    \n    }\n\n    NSError *error = nil;\n\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n\n        // Customize this code block to include application-specific\
    \ recovery steps.\n\n        BOOL result = [sender presentError:error];\n\n  \
    \      if (result) {\n\n            return NSTerminateCancel;\n\n        }\n\n\
    \        NSString *question = NSLocalizedString(@\"Could not save changes while\
    \ quitting. Quit anyway?\", @\"Quit without saves error question message\");\n\
    \n        NSString *info = NSLocalizedString(@\"Quitting now will lose any changes\
    \ you have made since the last successful save\", @\"Quit without saves error\
    \ question info\");\n\n        NSString *quitButton = NSLocalizedString(@\"Quit\
    \ anyway\", @\"Quit anyway button title\");\n\n        NSString *cancelButton\
    \ = NSLocalizedString(@\"Cancel\", @\"Cancel button title\");\n\n        NSAlert\
    \ *alert = [[NSAlert alloc] init];\n\n        [alert setMessageText:question];\n\
    \n        [alert setInformativeText:info];\n\n        [alert addButtonWithTitle:quitButton];\n\
    \n        [alert addButtonWithTitle:cancelButton];\n\n        NSInteger answer\
    \ = [alert runModal];\n\n        if (answer == NSAlertAlternateReturn) {\n\n \
    \           return NSTerminateCancel;\n\n        }\n\n    }\n\n    return NSTerminateNow;\n\
    \n}\n```\n\nAs with the `persistentStoreCoordinator` method, we’ll go through\
    \ this one piece by piece. First, it checks to see whether there really is a `managedObjectContext`\
    \ to worry about. If not, it just returns `NSTerminateNow` immediately, and the\
    \ application terminates. If there is a `managedObjectContext`, it tells the context\
    \ to commit any pending changes. If that fails, it logs an error message and returns\
    \ `NSTerminateCancel`, which makes the application abort the current termination\
    \ procedure and just continue about its business. Then it checks to see whether\
    \ the `managedObjectContext` actually has any pending changes, and if it doesn’t,\
    \ it returns `NSTerminateNow`.\n\nFinally, it does the big step of telling the\
    \ context to save its changes. If the save fails, then the final big conditional\
    \ block is triggered. That block constructs an `NSAlert`, a special type of window\
    \ that appears in front of all other application windows and forces you to make\
    \ a choice by clicking a button (you’ll learn more about `NSAlert` and other windows\
    \ in [Chapter 11](#A978-1-4302-4543-8_11_Chapter.html)). In this case, it tells\
    \ the user that their changes were not saved, and asks them to choose whether\
    \ to quit the app anyway or cancel the termination and go back to normal. Depending\
    \ on the return value from this request, it either returns `NSTerminateCancel`\
    \ or “falls through” and returns `NSTerminateNow`.\n\nTime to point out a small\
    \ bug in this method: near the end, when the method checks to see if the Cancel\
    \ button was pressed, it’s actually comparing `answer` to the wrong value. It\
    \ should be `NSAlertSecondButtonReturn` instead of `NSAlertAlternateReturn`. Not\
    \ such a big deal perhaps, and we won’t bother to fix it for our sample app, but\
    \ this error in the logic makes it impossible to avoid quitting when the app is\
    \ in a particular invalid state. Oops!\n\nOne interesting thing to note is the\
    \ use of `NSLocalizedString` in this method. `NSLocalizedString` is a simple way\
    \ to let our code use localized resources if present. It’s a C function that takes\
    \ two arguments: a default string and a key used for looking up a localized string.\
    \ For instance, in a call like `NSLocalizedString(@\"Cancel\", @\"Cancel button\
    \ title\")`, `NSLocalizedString` will first check to see which language the user\
    \ prefers, then check to see if there exists a localized string for that language,\
    \ keyed off `@\"Cancel button title\"`, and if so, returns it. Otherwise, it will\
    \ just return the first parameter, `@\"Cancel\"`.\n\n## Adding Business Logic\n\
    \nNow that we’ve seen the basic idea of constructing an application with Core\
    \ Data, including defining the model, configuring the GUI, and knowing our way\
    \ around the template-provided code in our project, it’s time to learn a bit about\
    \ how to use Core Data to actually implement something “interesting” in our model\
    \ objects: our application’s “business logic.”\n\nSome amount of business logic\
    \ is specified right in the model file, such as an integer’s `min` and `max` size,\
    \ while some things require a bit of code. Fortunately, `NSManagedObject` provides\
    \ several “hooks” into spots where we can test our objects’ attributes to validate\
    \ them and make sure they’re okay. In order for us to make use of these, however,\
    \ we first need to make a subclass of `NSManagedObject` to represent our `MythicalPerson`\
    \ entity. Up until now, we’ve used `NSManagedObject` itself, but to add code we\
    \ need to make a subclass.\n\n### Making The `MythicalPerson` Class\n\nXcode will\
    \ merrily make a subclass of `NSManagedObject` for us. To do so, click on **File\
    \ ➤ New ➤ File** (or press `⌘N`). In the template selector, choose **Core Data**\
    \ from the **OS X** section on the left. Then, select **NSManagedObject subclass**\
    \ from the main window. Click **Next**. In the table view that appears, check\
    \ the checkbox for **MythBase**, which indicates that we’re making an `NSManagedObject`\
    \ subclass that will work with the entities described in the `MythBase` data model.\
    \ Click **Next**. The next choice is to indicate for which entity we’re making\
    \ an `NSManagedObject` class. Since we’ve only defined one entity, there’s only\
    \ one choice here, `MythicalPerson`. Check that, and click **Next**. Lastly, we’re\
    \ asked where to save the file. The file panel should default to the main directory\
    \ for `MythBase`, which is just where we want it. Leave the other options at their\
    \ default values, and click **Create**. We now have a `MythicalPerson.h` and `MythicalPerson.m`\
    \ file to work with.\n\nThe `MythicalPerson.h` file looks like this:\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@interface\
    \ MythicalPerson : NSManagedObject\n\n@property (nonatomic, retain) id depiction;\n\
    @property (nonatomic, retain) NSString * details;\n@property (nonatomic, retain)\
    \ NSNumber * divinity;\n@property (nonatomic, retain) NSNumber * goodness;\n@property\
    \ (nonatomic, retain) NSString * name;\n@property (nonatomic, retain) NSNumber\
    \ * power;\n\n@end\n```\n\nWe’ve got properties for each of the entity attributes\
    \ we defined in the model, which appropriate classes for their contents.\n\nIn\
    \ the `MythicalPerson.m` file, we find the following:\n\n```\n#import \"MythicalPerson.h\"\
    \n\n@implementation MythicalPerson\n\n@dynamic depiction;\n@dynamic details;\n\
    @dynamic divinity;\n@dynamic goodness;\n@dynamic name;\n@dynamic power;\n\n@end\n\
    ```\n\nWe haven’t seen the `@dynamic` directive before. This tells Xcode to suppress\
    \ warnings if it can’t find implementations of accessor methods, even though we\
    \ didn’t include a `@synthesize` directive, and not to synthesize them automatically.\
    \ Core Data will generate the appropriate accessors at runtime."
  raw: '#### An NSApplication Delegate Method


    Now we come to this class’s last method, the `NSApplication` delegate method `applicationShouldTerminate:`.
    This method is called by the application when the user selects Quit from the menu,
    and gives the delegate a chance to save changes, inspect its state, ask the user
    if they really want to quit, and so on. The value returned by this method determines
    whether the application will really terminate or not. Here’s the code:


    `- (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication *)sender`


    `{`


    `// Save changes in the application''s managed object context before the application
    terminates.`


    `if (!_managedObjectContext) {`


    `return NSTerminateNow;`


    `}`


    `if (![[self managedObjectContext] commitEditing]) {`


    `NSLog(@"%@:%@ unable to commit editing to terminate", [self class], NSStringFromSelector(_cmd));`


    `return NSTerminateCancel;`


    `}`


    `if (![[self managedObjectContext] hasChanges]) {`


    `return NSTerminateNow;`


    `}`


    `NSError *error = nil;`


    `if (![[self managedObjectContext] save:&error]) {`


    `// Customize this code block to include application-specific recovery steps.`


    `BOOL result = [sender presentError:error];`


    `if (result) {`


    `return NSTerminateCancel;`


    `}`


    `NSString *question = NSLocalizedString(@"Could not save changes while quitting.
    Quit anyway?", @"Quit without saves error question message");`


    `NSString *info = NSLocalizedString(@"Quitting now will lose any changes you have
    made since the last successful save", @"Quit without saves error question info");`


    `NSString *quitButton = NSLocalizedString(@"Quit anyway", @"Quit anyway button
    title");`


    `NSString *cancelButton = NSLocalizedString(@"Cancel", @"Cancel button title");`


    `NSAlert *alert = [[NSAlert alloc] init];`


    `[alert setMessageText:question];`


    `[alert setInformativeText:info];`


    `[alert addButtonWithTitle:quitButton];`


    `[alert addButtonWithTitle:cancelButton];`


    `NSInteger answer = [alert runModal];`


    `if (answer == NSAlertAlternateReturn) {`


    `return NSTerminateCancel;`


    `}`


    `}`


    `return NSTerminateNow;`


    `}`


    As with the `persistentStoreCoordinator` method, we’ll go through this one piece
    by piece. First, it checks to see whether there really is a `managedObjectContext`
    to worry about. If not, it just returns `NSTerminateNow` immediately, and the
    application terminates. If there is a `managedObjectContext`, it tells the context
    to commit any pending changes. If that fails, it logs an error message and returns
    `NSTerminateCancel`, which makes the application abort the current termination
    procedure and just continue about its business. Then it checks to see whether
    the `managedObjectContext` actually has any pending changes, and if it doesn’t,
    it returns `NSTerminateNow`.


    Finally, it does the big step of telling the context to save its changes. If the
    save fails, then the final big conditional block is triggered. That block constructs
    an `NSAlert`, a special type of window that appears in front of all other application
    windows and forces you to make a choice by clicking a button (you’ll learn more
    about `NSAlert` and other windows in [Chapter 11](#A978-1-4302-4543-8_11_Chapter.html)).
    In this case, it tells the user that their changes were not saved, and asks them
    to choose whether to quit the app anyway or cancel the termination and go back
    to normal. Depending on the return value from this request, it either returns
    `NSTerminateCancel` or “falls through” and returns `NSTerminateNow`.


    Time to point out a small bug in this method: near the end, when the method checks
    to see if the Cancel button was pressed, it’s actually comparing answer to the
    wrong value. It should be `NSAlertSecondButtonReturn` instead of `NSAlertAlternateReturn`.
    Not such a big deal perhaps, and we won’t bother to fix it for our sample app,
    but this error in the logic makes it impossible to avoid quitting when the app
    is in a particular invalid state. Oops!


    One interesting thing to note is the use of `NSLocalizedString` in this method.
    `NSLocalizedString` is a simple way to let our code use localized resources if
    present. It’s a C function that takes two arguments: a default string and a key
    used for looking up a localized string. For instance, in a call like `NSLocalizedString(@"Cancel",
    @"Cancel button title")`, `NSLocalizedString` will first check to see which language
    the user prefers, then check to see if there exists a localized string for that
    language, keyed off @“Cancel button title”, and if so, returns it. Otherwise,
    it will just return the first parameter, @”Cancel”.


    ## Adding Business Logic


    Now that we’ve seen the basic idea of constructing an application with Core Data,
    including defining the model, configuring the GUI, and knowing our way around
    the template-provided code in our project, it’s time to learn a bit about how
    to use Core Data to actually implement something “interesting” in our model objects:
    our application’s “business logic.”


    Some amount of business logic is specified right in the model file, such as an
    integer’s `min` and `max` size, while some things require a bit of code. Fortunately,
    `NSManagedObject` provides several “hooks” into spots where we can test our objects’
    attributes to validate them and make sure they’re okay. In order for us to make
    use of these, however, we first need to make a subclass of `NSManagedObject` to
    represent our MythicalPerson entity. Up until now, we’ve used `NSManagedObject`
    itself, but to add code we need to make a subclass.


    ### Making The MythicalPerson Class


    Xcode will merrily make a subclass of `NSManagedObject` for us. To do so, click
    on File ➤ New ➤ File (or press ⌘N). In the template selector, choose Core Data
    from the OS X section on the left. Then, select NSManagedObject subclass from
    the main window. Click Next. In the table view that appears, check the checkbox
    for MythBase, which indicates that we’re making an `NSManagedObject` subclass
    that will work with the entities described in the MythBase data model. Click Next.
    The next choice is to indicate for which entity we’re making an `NSManagedObject`
    class. Since we’ve only defined one entity, there’s only one choice here, MythicalPerson.
    Check that, and click Next. Lastly, we’re asked where to save the file. The file
    panel should default to the main directory for MythBase, which is just where we
    want it. Leave the other options at their default values, and click Create. We
    now have a `MythicalPerson.h` and `MythicalPerson.m` file to work with.


    The `MythicalPerson.h` file looks like this:


    `#import <Foundation/Foundation.h>`


    `#import <CoreData/CoreData.h>`


    `@interface MythicalPerson : NSManagedObject`


    `@property (nonatomic, retain) id depiction;`


    `@property (nonatomic, retain) NSString * details;`


    `@property (nonatomic, retain) NSNumber * divinity;`


    `@property (nonatomic, retain) NSNumber * goodness;`


    `@property (nonatomic, retain) NSString * name;`


    `@property (nonatomic, retain) NSNumber * power;`


    `@end`


    We’ve got properties for each of the entity attributes we defined in the model,
    which appropriate classes for their contents.


    In the `MythicalPerson.m` file, we find the following:


    `#import "MythicalPerson.h"`


    `@implementation MythicalPerson`


    `@dynamic depiction;`


    `@dynamic details;`


    `@dynamic divinity;`


    `@dynamic goodness;`


    `@dynamic name;`


    `@dynamic power;`


    `@end`


    We haven’t seen the `@dynamic` directive before. This tells Xcode to suppress
    warnings if it can’t find implementations of accessor methods, even though we
    didn’t include a `@synthesize` directive, and not to synthesize them automatically.
    Core Data will generate the appropriate accessors at runtime.'
  trans: "\n### `NSApplication` 代理方法\n\n现在我们来介绍这个类的最后一个方法，即 `NSApplication` 的代理方法\
    \ `applicationShouldTerminate:`。当用户从菜单中选择\"退出\"时，应用程序会调用此方法，给代理一个保存更改、检查状态、询问用户是否真的要退出等机会。此方法的返回值决定了应用程序是否真的会终止。代码如下：\n\
    \n```\n- (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication\
    \ *)sender\n\n{\n\n    // 在应用程序终止前，保存托管对象上下文中的更改。\n\n    if (!_managedObjectContext)\
    \ {\n\n        return NSTerminateNow;\n\n    }\n\n    if (![[self managedObjectContext]\
    \ commitEditing]) {\n\n        NSLog(@\"%@:%@ unable to commit editing to terminate\"\
    , [self class], NSStringFromSelector(_cmd));\n\n        return NSTerminateCancel;\n\
    \n    }\n\n    if (![[self managedObjectContext] hasChanges]) {\n\n        return\
    \ NSTerminateNow;\n\n    }\n\n    NSError *error = nil;\n\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n\n        // 自定义此代码块以包含特定于应用程序的恢复步骤。\n\n        BOOL result\
    \ = [sender presentError:error];\n\n        if (result) {\n\n            return\
    \ NSTerminateCancel;\n\n        }\n\n        NSString *question = NSLocalizedString(@\"\
    Could not save changes while quitting. Quit anyway?\", @\"Quit without saves error\
    \ question message\");\n\n        NSString *info = NSLocalizedString(@\"Quitting\
    \ now will lose any changes you have made since the last successful save\", @\"\
    Quit without saves error question info\");\n\n        NSString *quitButton = NSLocalizedString(@\"\
    Quit anyway\", @\"Quit anyway button title\");\n\n        NSString *cancelButton\
    \ = NSLocalizedString(@\"Cancel\", @\"Cancel button title\");\n\n        NSAlert\
    \ *alert = [[NSAlert alloc] init];\n\n        [alert setMessageText:question];\n\
    \n        [alert setInformativeText:info];\n\n        [alert addButtonWithTitle:quitButton];\n\
    \n        [alert addButtonWithTitle:cancelButton];\n\n        NSInteger answer\
    \ = [alert runModal];\n\n        if (answer == NSAlertAlternateReturn) {\n\n \
    \           return NSTerminateCancel;\n\n        }\n\n    }\n\n    return NSTerminateNow;\n\
    \n}\n```\n\n与 `persistentStoreCoordinator` 方法类似，我们将逐段分析此方法。首先，它检查是否真的存在需要处理的 `managedObjectContext`。如果不存在，它会立即返回\
    \ `NSTerminateNow`，应用程序终止。如果存在 `managedObjectContext`，它会通知上下文提交所有待处理的更改。如果提交失败，它会记录一条错误消息并返回\
    \ `NSTerminateCancel`，这会使应用程序中止当前的终止过程并继续正常运行。接着，它检查 `managedObjectContext` 是否确实有未保存的更改；如果没有，则返回\
    \ `NSTerminateNow`。\n\n最后，它执行关键步骤，即通知上下文保存更改。如果保存失败，则会触发最后一个大的条件判断块。该块构造了一个 `NSAlert`，这是一种特殊类型的窗口，会显示在所有其他应用程序窗口前面，强制用户通过点击按钮做出选择（你将在第\
    \ 11 章中了解更多关于 `NSAlert` 和其他窗口的内容）。在此情况下，它会告知用户更改未保存，并请用户选择是无论如何都要退出应用程序，还是取消终止并恢复正常状态。根据此请求的返回值，它要么返回\
    \ `NSTerminateCancel`，要么\"穿透\"并返回 `NSTerminateNow`。\n\n现在指出此方法中的一个微小错误：在接近末尾处，当方法检查是否按下了取消按钮时，它实际上将\
    \ `answer` 与错误的值进行了比较。应该使用 `NSAlertSecondButtonReturn` 而不是 `NSAlertAlternateReturn`。这也许不是什么大问题，我们也不会费心去修复示例应用程序中的这个错误，但此逻辑错误使得当应用程序处于特定无效状态时无法避免退出。哎呀！\n\
    \n一个值得注意的有趣点是此方法中使用了 `NSLocalizedString`。`NSLocalizedString` 是一种简单的方式，让我们的代码在资源存在时使用本地化资源。它是一个\
    \ C 函数，接受两个参数：一个默认字符串和一个用于查找本地化字符串的键。例如，在 `NSLocalizedString(@\"Cancel\", @\"\
    Cancel button title\")` 这样的调用中，`NSLocalizedString` 会首先检查用户偏好的语言，然后检查是否存在以 `@\"\
    Cancel button title\"` 为键的该语言本地化字符串；如果存在，则返回它。否则，它只会返回第一个参数 `@\"Cancel\"`。\n\n\
    ## 添加业务逻辑\n\n既然我们已经了解了使用 Core Data 构建应用程序的基本思路，包括定义模型、配置 GUI 以及熟悉项目中模板提供的代码，现在是时候学习如何利用\
    \ Core Data 在我们的模型对象中实际实现一些\"有趣\"的功能：即应用程序的\"业务逻辑\"。\n\n部分业务逻辑直接在模型文件中指定，例如整数的\
    \ `min` 和 `max` 值，而某些方面则需要一些代码。幸运的是，`NSManagedObject` 提供了多个\"钩子\"点，我们可以通过这些点来测试对象的属性以验证其正确性。然而，要使用这些钩子，我们首先需要创建一个\
    \ `NSManagedObject` 的子类来表示 `MythicalPerson` 实体。到目前为止，我们一直使用 `NSManagedObject`\
    \ 本身，但为了添加代码，我们需要创建子类。\n\n### 创建 `MythicalPerson` 类\n\nXcode 可以为我们方便地创建 `NSManagedObject`\
    \ 的子类。为此，请点击 **文件 ➤ 新建 ➤ 文件**（或按 `⌘N`）。在模板选择器中，从左侧 **OS X** 部分选择 **Core Data**。然后，在主窗口中选择\
    \ **NSManagedObject subclass**。点击 **下一步**。在出现的表格视图中，勾选 **MythBase** 的复选框，这表示我们正在创建一个\
    \ `NSManagedObject` 子类，该子类将用于 `MythBase` 数据模型中描述的实体。点击 **下一步**。接下来的选择是指定我们要为哪个实体创建\
    \ `NSManagedObject` 类。由于我们只定义了一个实体，这里只有一个选项：`MythicalPerson`。勾选它，然后点击 **下一步**。最后，系统会询问我们将文件保存在何处。文件面板应该默认指向\
    \ `MythBase` 的主目录，这正是我们想要的位置。保持其他选项为默认值，点击 **创建**。现在，我们有了可操作的 `MythicalPerson.h`\
    \ 和 `MythicalPerson.m` 文件。\n\n`MythicalPerson.h` 文件如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface MythicalPerson : NSManagedObject\n\
    \n@property (nonatomic, retain) id depiction;\n@property (nonatomic, retain) NSString\
    \ * details;\n@property (nonatomic, retain) NSNumber * divinity;\n@property (nonatomic,\
    \ retain) NSNumber * goodness;\n@property (nonatomic, retain) NSString * name;\n\
    @property (nonatomic, retain) NSNumber * power;\n\n@end\n```\n\n我们为在模型中定义的每个实体属性都设置了属性，并为其内容指定了合适的类。\n\
    \n在 `MythicalPerson.m` 文件中，我们发现如下内容：\n\n```\n#import \"MythicalPerson.h\"\n\n\
    @implementation MythicalPerson\n\n@dynamic depiction;\n@dynamic details;\n@dynamic\
    \ divinity;\n@dynamic goodness;\n@dynamic name;\n@dynamic power;\n\n@end\n```\n\
    \n我们之前没有见过 `@dynamic` 指令。该指令告诉 Xcode，即使我们没有包含 `@synthesize` 指令，也要抑制因找不到存取方法实现而产生的警告，并且不要自动合成这些方法。Core\
    \ Data 会在运行时生成适当的存取方法。\n"
- fmt: "### Validating Single Attributes\n\nLet’s say we want to add a special constraint\
    \ to `MythBase` to ensure that no `MythicalPerson` can be named \"Bob.\" To do\
    \ this, we just have to add the method shown here to the `@implementation` section\
    \ of `MythicalPerson.m`:\n\n```\n- (BOOL)validateName:(id *)ioValue error:(NSError\
    \ **)outError\n{\n  if (*ioValue == nil) {\n    return YES;\n  }\n  if ([*ioValue\
    \ isEqualToString:@\"Bob\"]) {\n    if (outError != NULL) {\n      NSString *errorStr\
    \ = NSLocalizedString(\n        @\"You're not allowed to name a mythical person\
    \ 'Bob'.  \"\n          \" 'Bob' is a real person, just like you and me.\",\n\
    \        @\"validation: invalid name error\");\n      NSDictionary *userInfoDict\
    \ = [NSDictionary dictionaryWithObject:errorStr\n        forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *error = [[NSError alloc] initWithDomain:@\"MythicalPersonErrorDomain\"\
    \n        code:13013 userInfo:userInfoDict];\n      *outError = error;\n    }\n\
    \    return NO;\n  }\n  return YES;\n}\n```\n\nNote the name of this method, `validateName:error:`.\
    \ This naming convention comes from the key-value coding model that’s pervasive\
    \ in Cocoa. Attribute validation in Core Data works through the use of methods\
    \ named `validate<Key>:error:`, which are called (if they exist) on each managed\
    \ object when it’s time to save changes to the data store. Within this method,\
    \ we should check the proposed value and return `YES` if it’s okay. If not, it\
    \ returns `NO` and should also create an `NSError` object describing the error,\
    \ setting the passed-in `NSError **` to point at it. Note that when creating the\
    \ error we need to specify a string identifying the error name and an integer\
    \ specifying just which error it was. In a larger application, it’s a good idea\
    \ to standardize these values in some way. Doing so can help us track down errors\
    \ that users may report and can also give us a way to catch some recurring errors\
    \ and handle them individually (for instance, in the app controller’s `saveAction:`\
    \ method). We’ll talk about this more in [Chapter 12](#A978-1-4302-4543-8_12_Chapter.html).\n\
    \nAt this point, we can compile and run `MythBase`, and everything should work\
    \ the same as before… up until when we change a `MythicalPerson`’s name to \"\
    Bob\" and try to save our changes, at which point we’ll be warned that it’s an\
    \ invalid value.\n\n### Validating Multiple Attributes\n\nSometimes we’ll need\
    \ to be able to validate several attributes at once, making sure that they make\
    \ sense together. For example, let’s say that we decide on a new constraint for\
    \ each `MythicalPerson`: the value of the `power` attribute can only exceed 50\
    \ if the value of the `divinity` attribute is 100 (meaning that only a person\
    \ operating in full \"god mode\" can have a `power` level above 50). Rather than\
    \ check for this condition in `validatePower:error:` or `validateDivinity:error:`,\
    \ the recommended procedure is to check for this in two other validation methods\
    \ that are called whenever a new managed object is created, or edited: `validateForInsert:`,\
    \ and `validateForUpdate:`. Because we’re going to check for the same internal\
    \ consistency problem (where `power > 50` and `divinity < 100`) in both spots,\
    \ we’ll put that check into a method of our own, `validateConsistency:`, which\
    \ is called by the other two. First, let’s implement the two Core Data validation\
    \ methods in `MythicalPerson.m`:\n\n```\n- (BOOL)validateForInsert:(NSError **)error\n\
    {\n  BOOL propertiesValid = [super validateForInsert:error];\n  BOOL consistencyValid\
    \ = [self validateConsistency:error];\n  return (propertiesValid && consistencyValid);\n\
    }\n\n- (BOOL)validateForUpdate:(NSError **)error\n{\n  BOOL propertiesValid =\
    \ [super validateForUpdate:error];\n  BOOL consistencyValid = [self validateConsistency:error];\n\
    \  return (propertiesValid && consistencyValid);\n}\n```\n\nThese methods both\
    \ work in the same way. First, they call the superclass’s version of the same\
    \ method; that’s very important because that’s the method that actually calls\
    \ all of the `validate<Key>:error:` methods for each changed attribute. Then our\
    \ own `validateConsistency:` method is called. If the return values for both of\
    \ these calls return `YES`, then the method itself returns `YES`; otherwise it\
    \ returns `NO`.\n\nNow let’s see what `validateConsistency:` looks like.\n\n```\n\
    - (BOOL)validateConsistency:(NSError **)error\n{\n  int divinity = [[self valueForKey:@\"\
    divinity\"] intValue];\n  int power = [[self valueForKey:@\"power\"] intValue];\n\
    \  if (divinity < 100 && power > 50) {\n    if (error != NULL) {\n      NSString\
    \ *errorStr = NSLocalizedString(\n        @\"Power cannot exceed 50 unless divinity\
    \ is 100\",\n        @\"validation: divinity / power error\");\n      NSDictionary\
    \ *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n        forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *divinityPowerError = [[NSError alloc]\n        initWithDomain:@\"\
    MythicalPersonErrorDomain\" code:182\n        userInfo:userInfoDict];\n      if\
    \ (*error == nil) {\n        // there was no previous error, return the new error\n\
    \        *error = divinityPowerError;\n      }\n      else {\n        // combine\
    \ previous error with the new one\n        *error = [self errorFromOriginalError:*error\n\
    \          error:divinityPowerError];\n      }\n    }\n    return NO;\n  }\n \
    \ return YES;\n}\n```\n\nThis method is a little more complicated than the single\
    \ attribute validation method. We do the same sort of checking for a problem,\
    \ returning `YES` if it’s okay, and otherwise constructing an `NSError`, setting\
    \ the error parameter to point at it, and returning `NO`. However, in order to\
    \ \"play nice\" with Core Data, we have to check for the existence of a pre-existing\
    \ error, and if there is one, combine it with our own into a special kind of error.\
    \ This lets Core Data eventually report back all the errors it finds when it tries\
    \ to save. This error combining is done using another method of our own, `errorFromOriginalError:error:`,\
    \ which we should add to our class.\n\n```\n- (NSError *)errorFromOriginalError:(NSError\
    \ *)originalError\n  error:(NSError *)secondError\n{\n  NSMutableDictionary *userInfo\
    \ = [NSMutableDictionary dictionary];\n  NSMutableArray *errors = [NSMutableArray\n\
    \    arrayWithObject:secondError];\n  if ([originalError code] == NSValidationMultipleErrorsError)\
    \ {\n    [userInfo addEntriesFromDictionary:[originalError userInfo]];\n    [errors\
    \ addObjectsFromArray:[userInfo\n      objectForKey:NSDetailedErrorsKey]];\n \
    \ }\n  else {\n    [errors addObject:originalError];\n  }\n  [userInfo setObject:errors\
    \ forKey:NSDetailedErrorsKey];\n  return [NSError errorWithDomain:NSCocoaErrorDomain\n\
    \    code:NSValidationMultipleErrorsError\n    userInfo:userInfo];\n}\n```\n\n\
    Basically, this method checks the `originalError` parameter to see if it already\
    \ contains multiple errors, and if so, just adds the new one to the list. Otherwise,\
    \ it combines the two single errors into a new multiple error object.\n\nWith\
    \ all that in place, we should now be able to compile and run, select a `MythicalPerson`,\
    \ set their `power` above 50, their `divinity` below 100, and try to save. We’ll\
    \ see an error telling us about the problem. We can also make sure that reporting\
    \ of multiple problems works by leaving this power/divinity inconsistency in place,\
    \ changing the name to \"Bob,\" and trying to save. We should see a warning panel\
    \ telling us that multiple validation errors occurred, but we won’t see details\
    \ about any of them. This suggests a good idea for a future expansion of the app\
    \ delegate’s `saveAction:` and `applicationShouldTerminate:` methods: come up\
    \ with a way to display multiple errors instead of just calling `presentError:`\
    \ as is currently done. There’s something to tackle on a rainy day!"
  raw: '### Validating Single Attributes


    Let’s say we want to add a special constraint to MythBase to ensure that no MythicalPerson
    can be named “Bob.” To do this, we just have to add the method shown here to the
    `@implementation` section of `MythicalPerson.m`:


    `- (BOOL)validateName:(id *)ioValue error:(NSError **)outError`


    `{`


      `if (*ioValue == nil) {`


        `return YES;`


      `}`


      `if ([*ioValue isEqualToString:@"Bob"]) {`


        `if (outError != NULL) {`


          `NSString *errorStr = NSLocalizedString(`


            `@"You''re not allowed to name a mythical person ''Bob''.  "`


              `" ''Bob'' is a real person, just like you and me."`,


            `@"validation: invalid name error");`


          `NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr`


            `forKey:NSLocalizedDescriptionKey];`


          `NSError *error = [[NSError alloc] initWithDomain:@"MythicalPersonErrorDomain"`


            `code:13013 userInfo:userInfoDict];`


          `*outError = error;`


        `}`


        `return NO;`


      `}`


      `return YES;`


    `}`


    Note the name of this method, `validateName:error:`. This naming convention comes
    from the key-value coding model that’s pervasive in Cocoa. Attribute validation
    in Core Data works through the use of methods named `validate``>:error:`, which
    are called (if they exist) on each managed object when it’s time to save changes
    to the data store. Within this method, we should check the proposed value and
    return `YES` if it’s okay. If not, it returns `NO` and should also create an `NSError`
    object describing the error, setting the passed-in `NSError`** to point at it.
    Note that when creating the error we need to specify a string identifying the
    error name and an integer specifying just which error it was. In a larger application,
    it’s a good idea to standardize these values in some way. Doing so can help us
    track down errors that users may report and can also give us a way to catch some
    recurring errors and handle them individually (for instance, in the app controller’s
    `saveAction:` method). We’ll talk about this more in [Chapter 12](#A978-1-4302-4543-8_12_Chapter.html).


    At this point, we can compile and run MythBase, and everything should work the
    same as before… up until when we change a MythicalPerson’s name to “Bob” and try
    to save our changes, at which point we’ll be warned that it’s an invalid value.


    ### Validating Multiple Attributes


    Sometimes we’ll need to be able to validate several attributes at once, making
    sure that they make sense together. For example, let’s say that we decide on a
    new constraint for each MythicalPerson: the value of the `power` attribute can
    only exceed 50 if the value of the `divinity` attribute is 100 (meaning that only
    a person operating in full “god mode” can have a `power` level above 50). Rather
    than check for this condition in `validatePower:error:` or `validateDivinity:error:`,
    the recommended procedure is to check for this in two other validation methods
    that are called whenever a new managed object is created, or edited: `validateForInsert:`,
    and `validateForUpdate:`. Because we’re going to check for the same internal consistency
    problem (where `power > 50` and `divinity < 100`) in both spots, we’ll put that
    check into a method of our own, `validateConsistency:`, which is called by the
    other two. First, let’s implement the two Core Data validation methods in `MythicalPerson.m`:


    `- (BOOL)validateForInsert:(NSError **)error`


    `{`


    `BOOL propertiesValid = [super validateForInsert:error];`


    `BOOL consistencyValid = [self validateConsistency:error];`


    `return (propertiesValid && consistencyValid);`


    `}`


    `- (BOOL)validateForUpdate:(NSError **)error`


    `{`


    `BOOL propertiesValid = [super validateForUpdate:error];`


    `BOOL consistencyValid = [self validateConsistency:error];`


    `return (propertiesValid && consistencyValid);`


    `}`


    These methods both work in the same way. First, they call the superclass’s version
    of the same method; that’s very important because that’s the method that actually
    calls all of the `validate``:error:` methods for each changed attribute. Then
    our own `validateConsistency:` method is called. If the return values for both
    of these calls return `YES`, then the method itself returns `YES`; otherwise it
    returns `NO`.


    Now let’s see what `validateConsistency:` looks like.


    `- (BOOL)validateConsistency:(NSError **)error`


    `{`


    `int divinity = [[self valueForKey:@"divinity"] intValue];`


    `int power = [[self valueForKey:@"power"] intValue];`


    `if (divinity < 100 && power > 50) {`


    `if (error != NULL) {`


    `NSString *errorStr = NSLocalizedString(`


    `@"Power cannot exceed 50 unless divinity is 100"`,


    `@"validation: divinity / power error");`


    `NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr`


    `forKey:NSLocalizedDescriptionKey];`


    `NSError *divinityPowerError = [[NSError alloc]`


    `initWithDomain:@"MythicalPersonErrorDomain" code:182`


    `userInfo:userInfoDict];`


    `if (*error == nil) {`


    `// there was no previous error, return the new error`


    `*error = divinityPowerError;`


    `}`


    `else {`


    `// combine previous error with the new one`


    `*error = [self errorFromOriginalError:*error`


    `error:divinityPowerError];`


    `}`


    `}`


    `return NO;`


    `}`


    `return YES;`


    `}`


    This method is a little more complicated than the single attribute validation
    method. We do the same sort of checking for a problem, returning `YES` if it’s
    okay, and otherwise constructing an `NSError`, setting the error parameter to
    point at it, and returning `NO`. However, in order to “play nice” with Core Data,
    we have to check for the existence of a pre-existing error, and if there is one,
    combine it with our own into a special kind of error. This lets Core Data eventually
    report back all the errors it finds when it tries to save. This error combining
    is done using another method of our own, `errorFromOriginalError:error:`, which
    we should add to our class.


    `- (NSError *)errorFromOriginalError:(NSError *)originalError`


    `error:(NSError *)secondError`


    `{`


    `NSMutableDictionary *userInfo = [NSMutableDictionary dictionary];`


    `NSMutableArray *errors = [NSMutableArray`


    `arrayWithObject:secondError];`


    `if ([originalError code] == NSValidationMultipleErrorsError) {`


    `[userInfo addEntriesFromDictionary:[originalError userInfo]];`


    `[errors addObjectsFromArray:[userInfo`


    `objectForKey:NSDetailedErrorsKey]];`


    `}`


    `else {`


    `[errors addObject:originalError];`


    `}`


    `[userInfo setObject:errors forKey:NSDetailedErrorsKey];`


    `return [NSError errorWithDomain:NSCocoaErrorDomain`


    `code:NSValidationMultipleErrorsError`


    `userInfo:userInfo];`


    `}`


    Basically, this method checks the `originalError` parameter to see if it already
    contains multiple errors, and if so, just adds the new one to the list. Otherwise,
    it combines the two single errors into a new multiple error object.


    With all that in place, we should now be able to compile and run, select a MythicalPerson,
    set their `power` above 50, their `divinity` below 100, and try to save. We’ll
    see an error telling us about the problem. We can also make sure that reporting
    of multiple problems works by leaving this power/divinity inconsistency in place,
    changing the name to “Bob,” and trying to save. We should see a warning panel
    telling us that multiple validation errors occurred, but we won’t see details
    about any of them. This suggests a good idea for a future expansion of the app
    delegate’s `saveAction:` and `applicationShouldTerminate:` methods: come up with
    a way to display multiple errors instead of just calling `presentError:` as is
    currently done. There’s something to tackle on a rainy day!'
  trans: "\n### 验证单个属性\n\n假设我们想为 `MythBase` 添加一个特殊约束，以确保没有 `MythicalPerson` 可以被命名为“Bob”。为此，我们只需在\
    \ `MythicalPerson.m` 的 `@implementation` 部分添加如下方法：\n\n```\n- (BOOL)validateName:(id\
    \ *)ioValue error:(NSError **)outError\n{\n  if (*ioValue == nil) {\n    return\
    \ YES;\n  }\n  if ([*ioValue isEqualToString:@\"Bob\"]) {\n    if (outError !=\
    \ NULL) {\n      NSString *errorStr = NSLocalizedString(\n        @\"You're not\
    \ allowed to name a mythical person 'Bob'.  \"\n          \" 'Bob' is a real person,\
    \ just like you and me.\",\n        @\"validation: invalid name error\");\n  \
    \    NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \        forKey:NSLocalizedDescriptionKey];\n      NSError *error = [[NSError\
    \ alloc] initWithDomain:@\"MythicalPersonErrorDomain\"\n        code:13013 userInfo:userInfoDict];\n\
    \      *outError = error;\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\
    \n请注意此方法的名称 `validateName:error:`。该命名约定源自 Cocoa 中普遍存在的键值编码模型。Core Data 中的属性验证通过使用名为\
    \ `validate<Key>:error:` 的方法实现，当需要将更改保存到数据存储时，系统会为每个托管对象调用这些方法（如果存在）。在此方法中，我们应检查提议的值，如果有效则返回\
    \ `YES`。如果无效，则返回 `NO`，同时应创建一个描述错误的 `NSError` 对象，并将传入的 `NSError **` 指向它。请注意，在创建错误时，我们需要指定一个字符串来标识错误名称，以及一个整数来指定具体是哪个错误。在大型应用程序中，最好以某种方式标准化这些值。这样做既可以帮助我们追踪用户可能报告的错误，也可以让我们捕获一些重复出现的错误并逐一处理（例如，在应用程序控制器的\
    \ `saveAction:` 方法中）。我们将在第 12 章中对此进行更多讨论。\n\n至此，我们可以编译并运行 `MythBase`，一切应该与之前相同……直到我们将某个\
    \ `MythicalPerson` 的名字改为“Bob”并尝试保存更改时，系统才会警告我们这是一个无效值。\n\n### 验证多个属性\n\n有时我们需要同时验证多个属性，确保它们彼此之间是合理的。例如，假设我们为每个\
    \ `MythicalPerson` 设定一个新约束：只有当 `divinity` 属性的值为 100 时，`power` 属性的值才能超过 50（这意味着只有完全处于“神模式”下的人，其\
    \ `power` 等级才能高于 50）。推荐的做法不是在 `validatePower:error:` 或 `validateDivinity:error:`\
    \ 中检查这一条件，而是在创建或编辑新托管对象时调用的另外两个验证方法中进行检查：`validateForInsert:` 和 `validateForUpdate:`。由于我们要在两个位置检查同一个内部一致性问题（即\
    \ `power > 50` 且 `divinity < 100`），我们将该检查放入一个自定义方法 `validateConsistency:` 中，并由另外两个方法调用。首先，我们在\
    \ `MythicalPerson.m` 中实现这两个 Core Data 验证方法：\n\n```\n- (BOOL)validateForInsert:(NSError\
    \ **)error\n{\n  BOOL propertiesValid = [super validateForInsert:error];\n  BOOL\
    \ consistencyValid = [self validateConsistency:error];\n  return (propertiesValid\
    \ && consistencyValid);\n}\n\n- (BOOL)validateForUpdate:(NSError **)error\n{\n\
    \  BOOL propertiesValid = [super validateForUpdate:error];\n  BOOL consistencyValid\
    \ = [self validateConsistency:error];\n  return (propertiesValid && consistencyValid);\n\
    }\n```\n\n这两个方法的工作方式相同。首先，它们调用父类的同名方法；这一点非常重要，因为正是这个方法实际调用了每个已更改属性的所有 `validate<Key>:error:`\
    \ 方法。然后，调用我们自己的 `validateConsistency:` 方法。如果这两个调用的返回值都是 `YES`，则该方法本身返回 `YES`；否则返回\
    \ `NO`。\n\n现在让我们看看 `validateConsistency:` 是什么样的。\n\n```\n- (BOOL)validateConsistency:(NSError\
    \ **)error\n{\n  int divinity = [[self valueForKey:@\"divinity\"] intValue];\n\
    \  int power = [[self valueForKey:@\"power\"] intValue];\n  if (divinity < 100\
    \ && power > 50) {\n    if (error != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
    \        @\"Power cannot exceed 50 unless divinity is 100\",\n        @\"validation:\
    \ divinity / power error\");\n      NSDictionary *userInfoDict = [NSDictionary\
    \ dictionaryWithObject:errorStr\n        forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *divinityPowerError = [[NSError alloc]\n        initWithDomain:@\"\
    MythicalPersonErrorDomain\" code:182\n        userInfo:userInfoDict];\n      if\
    \ (*error == nil) {\n        // 之前没有错误，返回新错误\n        *error = divinityPowerError;\n\
    \      }\n      else {\n        // 将之前的错误与新错误合并\n        *error = [self errorFromOriginalError:*error\n\
    \          error:divinityPowerError];\n      }\n    }\n    return NO;\n  }\n \
    \ return YES;\n}\n```\n\n此方法比单个属性验证方法稍微复杂一些。我们用类似的方式检查问题，如果有效则返回 `YES`，否则构造一个\
    \ `NSError`，将错误参数指向它，并返回 `NO`。然而，为了“友好地”与 Core Data 协作，我们必须检查是否存在预先存在的错误，如果存在，则将其与我们自己的错误合并成一种特殊类型的错误。这使得\
    \ Core Data 在尝试保存时能够最终报告它发现的所有错误。这种错误合并是通过我们自定义的另一个方法 `errorFromOriginalError:error:`\
    \ 完成的，我们应该将其添加到类中。\n\n```\n- (NSError *)errorFromOriginalError:(NSError *)originalError\n\
    \  error:(NSError *)secondError\n{\n  NSMutableDictionary *userInfo = [NSMutableDictionary\
    \ dictionary];\n  NSMutableArray *errors = [NSMutableArray\n    arrayWithObject:secondError];\n\
    \  if ([originalError code] == NSValidationMultipleErrorsError) {\n    [userInfo\
    \ addEntriesFromDictionary:[originalError userInfo]];\n    [errors addObjectsFromArray:[userInfo\n\
    \      objectForKey:NSDetailedErrorsKey]];\n  }\n  else {\n    [errors addObject:originalError];\n\
    \  }\n  [userInfo setObject:errors forKey:NSDetailedErrorsKey];\n  return [NSError\
    \ errorWithDomain:NSCocoaErrorDomain\n    code:NSValidationMultipleErrorsError\n\
    \    userInfo:userInfo];\n}\n```\n\n基本上，此方法检查 `originalError` 参数是否已包含多个错误，如果是，则仅将新错误添加到列表中。否则，它将两个单独的错误合并成一个新的多错误对象。\n\
    \n完成所有这些后，我们现在应该能够编译并运行，选中一个 `MythicalPerson`，将其 `power` 设为高于 50，`divinity` 设为低于\
    \ 100，然后尝试保存。我们会看到一个错误，告诉我们问题所在。我们还可以通过保持此 power/divinity 不一致状态，将名字改为“Bob”，并尝试保存，来确保多个错误的报告功能正常工作。此时应出现一个警告面板，告诉我们发生了多个验证错误，但我们不会看到其中任何一个错误的详细信息。这为将来扩展应用委托的\
    \ `saveAction:` 和 `applicationShouldTerminate:` 方法提供了一个好思路：设计一种方法来显示多个错误，而不是像当前这样仅调用\
    \ `presentError:`。这可是个值得在空闲时攻克的问题！\n"
- fmt: "### Creating a Custom Attribute\n\nAnother common sort of simple \"business\
    \ logic\" calls for the creation of custom attributes that are based on the values\
    \ contained in an object's attributes. For example, if we have an entity with\
    \ `firstName` and `lastName` attributes, we might want to make a custom attribute\
    \ called `fullName` that combines the two together.\n\nThis sort of thing is a\
    \ piece of cake with Core Data. In our case, let's say we want to add an attribute\
    \ to `MythicalPerson` called `awesomeness`, which will be calculated from the\
    \ `MythicalPerson`'s `power`, `divinity`, and `goodness`. We start off by defining\
    \ a method called `awesomeness` in `MythicalPerson`'s implementation:\n\n```\n\
    - (int)awesomeness\n{\n  int awesomeness = [[self valueForKey:@\"divinity\"] intValue]\
    \ * 10 +\n    [[self valueForKey:@\"power\"] intValue] * 5 +\n    [[self valueForKey:@\"\
    goodness\"] intValue];\n  return awesomeness;\n}\n```\n\nWith that in place, we\
    \ can call the `awesomeness` method on any `MythicalPerson` and get the result.\
    \ This also works with Cocoa bindings, of course, so we can easily bind a GUI\
    \ control's value to this new property. Go back to Xcode, make the window and\
    \ box a little bigger, and add a label and a level indicator from the Library\
    \ window, something similar to Figure [8-12](#A978-1-4302-4543-8_8_Chapter.html#Fig12).\n\
    \n![A978-1-4302-4543-8_8_Fig12_HTML.jpg](A978-1-4302-4543-8_8_Fig12_HTML.jpg)\n\
    \n**Figure 8-12.** MythBase, now with added Awesomeness\n\nNow select the Awesomeness\
    \ control, and bring up the Attributes Inspector. Set the Style to Continuous,\
    \ and the Minimum and Maximum to 0 and 1600, respectively. Now switch to the Bindings\
    \ Inspector, and bind the level indicator's Value via the Mythical Person Array\
    \ Controller, with the controller key `\"selection\"` and the model key `\"awesomeness\"\
    `. Xcode doesn't know anything about Awesomeness, so we'll have to type it in\
    \ ourselves instead of just picking it from the combo box; we're sure you'll agree\
    \ that's a small price to pay for awesomeness.\n\nSave the changes, switch back\
    \ to Xcode, click Run, and off we go. Switch between different rows in the table\
    \ view and see the bar of awesomeness change. Drag a slider and, now wait a minute;\
    \ the Awesomeness value doesn't change! The reason for this is that no part of\
    \ Core Data—not our model file, not our `MythicalPerson` class, not the controller\
    \ we're using—knows that Awesomeness depends on other values and needs to be recalculated\
    \ if they change. This is fixed by implementing one more small method in `MythicalPerson`:\n\
    \n```\n+ (NSSet *)keyPathsForValuesAffectingAwesomeness {\n  return [NSSet setWithObjects:@\"\
    divinity\", @\"power\", @\"goodness\",\n    nil];\n}\n```\n\nThis is another method\
    \ name that's constructed dynamically based on an accessor name. We saw this pattern\
    \ when validating a single attribute as well. In this method, we return a set\
    \ of attribute names that our `awesomeness` attribute is dependent on. With this\
    \ in place, Core Data will automatically call this method at some point early\
    \ on in the application's lifecycle and sort things out so that changes made to\
    \ any attributes in the set will also trigger controllers to update any objects\
    \ with bindings to the `awesomeness` attribute. Note the plus sign rather than\
    \ minus sign in the method signature—this indicates that `keyPathsForValuesAffectingAwesomeness`\
    \ is a class method, not an instance method. This is part of the Cocoa key-value\
    \ observing system. Cocoa KVO looks for methods of this structure and calls them\
    \ if present.\n\nBuild and run the app, and now the green bar changes when we\
    \ drag one of the other sliders. Awesome!\n\n## Wrap Up\n\nIn this chapter, we\
    \ covered a pretty wide range of material about Core Data. We learned about creating\
    \ a model file in Xcode and about using the combo of Core Data and Cocoa bindings\
    \ to quickly put together a decent GUI. We also got some idea of the underpinnings\
    \ of how Core Data stores its data and learned some basics about implementing\
    \ our own business logic. In [Chapter 9](#A978-1-4302-4543-8_9_Chapter.html),\
    \ we'll build on this knowledge, learning how to complete our data models by adding\
    \ relationships.\n\n# Core Data Relationships\n\n**Abstract** The last chapter\
    \ covered a lot of the basics about how Core Data works, but we worked with an\
    \ extremely simple data model that contained just a single entity. In this chapter,\
    \ we're going to extend our data model to contain multiple entities and define\
    \ relationships between those entities. We'll also create a GUI that shows these\
    \ relationships and lets us edit them. Along the way, we'll catch our first glimpse\
    \ of how Core Data deals with multiple, incompatible versions of our data model\
    \ and how it can migrate a data store from one model version to the next.\n\n\
    The last chapter covered a lot of the basics about how Core Data works, but we\
    \ worked with an extremely simple data model that contained just a single entity.\
    \ In this chapter, we're going to extend our data model to contain multiple entities\
    \ and define relationships between those entities. We'll also create a GUI that\
    \ shows these relationships and lets us edit them. Along the way, we'll catch\
    \ our first glimpse of how Core Data deals with multiple, incompatible versions\
    \ of our data model and how it can migrate a data store from one model version\
    \ to the next.\n\nWe'll do all of this while extending the MythBase project from\
    \ [Chapter 7](#A978-1-4302-4543-8_7_Chapter.html) to include some data that's\
    \ often overlooked with discussing mythical heroes and gods: the legendary bands\
    \ they performed in! The night that Achilles and the Grecian Formula shook the\
    \ Old Parthenon Ballroom to the ground is the stuff of legends, and who could\
    \ forget The Four Norsemen's farewell concert at the Clontarf Supper Club? The\
    \ enhancements we'll make to MythBase in this chapter (see Figure [9-1](#A978-1-4302-4543-8_9_Chapter.html#Fig1))\
    \ will help us keep track of this crucial information.\n\nWe'll start out by adding\
    \ all the new entities and relationships we want to our data model, then go on\
    \ to setting up the GUI that will let us edit everything. To prepare for the rest\
    \ of this chapter, go to the Finder and make a copy of the last chapter's final\
    \ MythBase project directory, then go into the new directory and double-click\
    \ `MythBase.xcodeproj` to open it in Xcode.\n\n![A978-1-4302-4543-8_9_Fig1_HTML.jpg](A978-1-4302-4543-8_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1.** The new and improved MythBase application we'll create in this\
    \ chapter\n\n## Modeling New Entities and Relationships\n\nWe're going to be adding\
    \ three new entities to MythBase: `MythicalBand`, `MythicalGig`, and `MythicalVenue`.\
    \ We'll also add relationships between several of them. When we're done, our data\
    \ model will look like Figure [9-2](#A978-1-4302-4543-8_9_Chapter.html#Fig2).\n\
    \n![A978-1-4302-4543-8_9_Fig2_HTML.jpg](A978-1-4302-4543-8_9_Fig2_HTML.jpg)\n\n\
    **Figure 9-2.** The new data model\n\n### Model Versioning and Migrations\n\n\
    Before we start making changes to the data model, there's one important issue\
    \ that needs to be addressed: migration. We're not talking about people moving\
    \ from one country to the next or birds flying south for the winter; we're talking\
    \ about our data. If you've ever developed a database application, you're familiar\
    \ with the concept of \"migrating\" data from one deployment version to the next.\
    \ This typically involves writing some sort of script that makes changes to the\
    \ database structure itself (adding, deleting, or altering tables and columns)\
    \ and populates new fields with appropriate values. With Core Data, you don't\
    \ exactly write a script, but the same idea is in use. In your data store, Core\
    \ Data saves some metadata about the structure of the data model. When your app\
    \ runs, Core Data tries to read from the data store. If it determines that the\
    \ app has a new version of the data model with a different structure, it will\
    \ automatically update the data store to match the latest data model. Let's see\
