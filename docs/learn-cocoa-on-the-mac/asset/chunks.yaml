  raw: 'Peter Clark started with NeXTStep in college, circa 1990\. That experience
    set the tone for the first half of his career when he worked with Jack at a consulting
    company in the Twin Cities. He worked with companies in the Bay Area, Chicago,
    and Twin Cities on NeXTStep and WebObjects projects, wrote a book on OpenStep
    development, and then moved on to Java, .NET, Ruby, and Scala development and
    managing engineering teams. He''s pleased that so many of the design patterns
    from NeXTStep are still useful today and finds that Cocoa development is a mix
    of comfort and pleasant surprises. Peter is currently the Director of Software
    Development for a research project at the University of Minnesota. He blogs occasionally
    at [`http://blog.pclark.net`](http://blog.pclark.net) and can be found on Twitter
    as `@pclark`. Peter wants you to know that he started using NeXTStep at least
    a month or two before Jack did. (Photograph courtesy of Wade Stebbings.)


