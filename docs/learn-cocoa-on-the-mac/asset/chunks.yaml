    \n我们曾花费无数个夜晚和周末盯着电脑屏幕，而非陪伴妻子和孩子。本书谨献给他们。我是说，献给我们的妻子和孩子，而不是电脑屏幕。\n\n## 前言\n\n我第一次接触\
    \ Cocoa 是在 1989 年上大学的时候。当然，那是在 iPhone 之前，在 Mac OS X 之前，甚至是在它被命名为 Cocoa 之前。那时，今天\
    \ Cocoa 的种子是 NeXTStep 的一部分，即 NeXT 计算机核心的操作系统。NeXTStep 领先于时代多年，虽然那间装满 NeXT 工作站的实验室在计算机科学课程中利用率极低，但我的学生系统管理员工作让我每天都要使用它们。作为一名用户，我便深陷其中。在此我不赘述\
    \ NeXT 的用户体验，但我要说的是，Mac OS X 的许多最佳特性并非源自老 Mac，而是来自 NeXTStep。\n\n那时，还没有万维网，NeXTStep\
    \ 开发者社区也很小，除了 NeXT 随其早期机器附带的那些晦涩难懂的巨著之外，关于开发环境的文字资料少之又少。我时不时试图搞懂 Objective-C 和\
    \ AppKit，但身边没有专家，也缺少可供参考的示例代码（更不用说我实际的学习任务有时会分散我摆弄有趣项目的精力），所以我基本上是无从下手。\n\n大学毕业后，发生了一件完全出乎意料的事。一位朋友向我介绍了我们市里一家咨询公司，该公司正在为一些相当大的客户构建定制的\
    \ NeXTStep 应用程序，我有幸加入了进来。突然间，我拥有了一群同事，他们不仅已经使用 NeXTStep 编程了一段时间，有些人甚至曾在 NeXT 工作过！其中一位就是彼得·克拉克。只需要他们一点专业的帮助就能让我起步，那些多年来一直神秘莫测的东西突然就讲得通了。短短几周内，我学到了很多，甚至能够开始领导一些\
    \ NeXTStep 开发的培训和指导工作。\n\n这里想说的重点不是我有多聪明或是学得快。而是，我们现在称之为 Cocoa 的这一系列技术确实非常强大——而且相当容易学习和使用——但在这个过程中你很可能需要一些帮助。我希望这本书能引导你走上正确的方向，并帮助你掌握\
    \ Cocoa 编程的精髓，这样当你读完它时，你将拥有足够的 Cocoa 知识，能够推动自己前进，编写出你梦寐以求的 Mac 应用程序。简而言之，这是一本我希望自己在\
    \ 20 年前就能找到的书。\n\n杰克·纳廷\n\n## 关于作者\n\n**杰克·纳廷** 从旧时代就开始使用 Cocoa，远早于它被命名为 Cocoa\
    \ 的时候。他使用 Cocoa 及其前身为广泛的行业和应用开发软件，包括游戏、平面设计、在线数字发行、电信、金融、出版和旅行。当他不从事 Mac 或 iOS\
    \ 项目、不用 Unity3D 制作精彩游戏、或不在他的朋克摇滚乐队里尽情演奏时，他通常会与家人共度时光。杰克在 Twitter 上的账号是 `@jacknutting`，并偶尔在\
    \ [`www.nuthole.com`](http://www.nuthole.com) 上写博客。（照片由艾莉森·德·玛尔斯·冯·布里森提供。）\n"
- fmt: '## Peter Clark


    Peter Clark started with NeXTStep in college, circa 1990. That experience set
    the tone for the first half of his career when he worked with Jack at a consulting
    company in the Twin Cities. He worked with companies in the Bay Area, Chicago,
    and Twin Cities on NeXTStep and WebObjects projects, wrote a book on OpenStep
    development, and then moved on to Java, .NET, Ruby, and Scala development and
    managing engineering teams. He''s pleased that so many of the design patterns
    from NeXTStep are still useful today and finds that Cocoa development is a mix
    of comfort and pleasant surprises. Peter is currently the Director of Software
    Development for a research project at the University of Minnesota. He blogs occasionally
    at [`http://blog.pclark.net`](http://blog.pclark.net) and can be found on Twitter
    as `@pclark`. Peter wants you to know that he started using NeXTStep at least
    a month or two before Jack did. (Photograph courtesy of Wade Stebbings.)


    ## About the Technical Reviewer


    ![A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg](A978-1-4302-4543-8_BookFrontmatter_Fig3_HTML.jpg)


    Nick Waynik has been working in the IT field for over thirteen years and has done
    everything from network administration to web development. He started writing
    iOS apps when the SDK was first released. Since then he has gone on to start his
    own business, focusing on iOS development. He loves spending his free time with
    his wife, Allison, and son, Preston, and sometimes playing golf. He blogs at [`nickwaynik.com`](http://nickwaynik.com)
    and can be found on Twitter as `@n_dubbs`.


    ## Acknowledgments


    There are many people to thank when getting a book from concept to the paper (or
    e-book) that you''re reading. There''s a lot to be done besides just getting words
    and code snippets into a text editor. Douglas Pundick and Jill Balzano at Apress
    have helped keep many of those things on track, out of sight from the authors.
    Of course, keeping the authors on track is also important, and we kept them busy
