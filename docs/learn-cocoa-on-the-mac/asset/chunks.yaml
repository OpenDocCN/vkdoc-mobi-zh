    图 13-1. Xcode 的断点导航器，显示了一些断点。第一次使用时，左侧列表为空。


    断点导航器显示了 Xcode 为项目配置的所有断点。因为我们刚创建了一个新项目，列表应该是空的！我们将通过添加异常断点来改变这一点，以捕获应用中抛出的任何异常。记住，每个抛出的异常都是
    bug 的结果，很可能是我们的 bug，我们应该抓住每一个机会停下来查看异常来源。


