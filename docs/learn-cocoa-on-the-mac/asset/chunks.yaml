    \ the code is doing what the comments claim it’s doing. After going through some\
    \ of the later chapters where we’ll be dealing with graphics, this will start\
    \ to make more sense. For now, note that this code produces some compiler errors\
    \ until we complete the next step.\n\nThe final piece we need to add for this\
    \ class to work is a conversion routine so that the `NSColor`s that are picked\
    \ by the user in the color panel can be converted to the `CGColorRef`s that are\
    \ necessary for the Core Graphics functions. For some reason, Cocoa doesn’t include\
    \ any one-line function or method calls that do this, but the following function\
    \ does the trick nicely. Insert this near the top of the `.m` file. Anywhere above\
    \ the `drawRect:` method is fine, but, for the sake of keeping things structured,\
    \ we’d recommend putting it just above the `@implementation` block to make it\
    \ clear that this function is not a part of the class.\n\n```\nstatic CGColorRef\
    \ genericRGBWithNSColor (NSColor *color)\n{\n    CGColorRef cgColor = NULL;\n\
    \    NSColorSpace *nsColorSpace = [NSColorSpace genericRGBColorSpace];\n    NSColor\
    \ *deviceRGBColor = [color colorUsingColorSpace: nsColorSpace];\n    if (deviceRGBColor\
    \ != nil) {\n        CGFloat components[4];\n        [deviceRGBColor getRed: &components[0]\
    \ green: &components[1]\n                          blue: &components[2] alpha:\
    \ &components[3]];\n        cgColor = CGColorCreate([nsColorSpace CGColorSpace],\
    \ components);\n    }\n    return cgColor;\n}\n```\n\nWith that in place, the\
    \ `CMColorBlendView` class is complete. Save the work and click Build, and it\
    \ should compile cleanly. We’re only asking you to click Build now to make sure\
    \ that no typos have crept in up to this point; we haven’t set up the GUI yet,\
    \ so there’s no point hitting Build & Run right now.\n\n## Adding Blended Colors\
    \ to the GUI\n\nNow it’s time to add the blended color swatches to our document\
    \ window. Let’s start by adding an outlet for each of them to the `CMDocument.h`\
    \ file. Each of the new outlets shown here will end up connected to an instance\
    \ of `CMColorBlendView`. We’re also adding a line near the top with an `@class`\
    \ declaration, which simply tells the compiler that the next token (`CMColorBlendView`)\
    \ is the name of a class. That’s just enough information to let the compiler deal\
    \ with instance variables and method arguments that are pointers to instances\
    \ of that class, without importing the class’s header itself. Using these forward\
    \ declarations instead of `#import`s consistently in our header files can give\
    \ us slightly better compile times, and also makes our header files less brittle,\
