  trans: '

    # 设置 Cocoa 绑定


    现在我们已经布局好了对象，需要设置相应的 Cocoa 绑定，以将 UI 控件与 Core Data 管理的乐队列表实际连接起来。我们将从数组控制器开始，因为它已经被选中了。切换到绑定检查器，展开“参数”部分。勾选“绑定到”复选框，然后从下拉菜单中选择“App
    Delegate”。接着，在“模型键路径”字段中输入 `managedObjectContext`。这样就将数组控制器连接到了“App Delegate”中的
    Core Data 机制。


    接下来是处理表视图的绑定。由于这个表视图只有一列，所以比“神话人物”窗口中的那个要省事一些。首先选中表视图本身。最简便的方法是在左侧对象停靠区的大纲视图中进行选择。选中后，转到绑定检查器（从上一步操作后应该仍处于打开状态），并展开“表格内容”标题下的“内容”部分。勾选“绑定到”复选框，确保下拉菜单显示为“Mythical
    Bands”，并且“控制器键”显示为 `arrangedObjects`。和之前一样，我们还需要将表视图中选中的行传回给数组控制器。为此，展开绑定检查器中的“选择索引”部分。在这里勾选“绑定到”复选框，将下拉菜单设置为“Mythical
    Bands”，并将“控制器键”设置为 `selectionIndexes`。这与上一章的图 8-10 非常相似。


    表视图本身的绑定设置好后，我们可以设置列的绑定。在对象停靠区中，展开表视图的子视图，直到看到标记为“静态文本 - 表格视图单元格”的视图。在绑定检查器中，展开“值”部分，勾选“绑定到”复选框，将下拉菜单设置为“Table
    Cell View”，并将“模型键路径”设置为 `objectValue.name`。这应该类似于图 9-8。然后，切换到属性检查器，将“行为”弹出菜单从“无”更改为“可编辑”。如果不做此更改，我们将无法在表视图中实际输入新乐队的名称。


    最后，我们来处理搜索框。选择屏幕右上角的搜索字段，并打开绑定检查器。在绑定检查器靠近底部的位置，有一个名为“谓词”的部分。展开它，勾选“绑定到”复选框，将其绑定到
    `Mythical Bands`。“控制器键”应设置为 `filterPredicate`。将“显示名称”设置为 `Name`，并将谓词格式设置为 `name
    contains[c] $value`，其中 `$value` 表示搜索框的内容，`name` 表示应被搜索的 `MythicalBand` 实体属性。这就像我们在第
    8 章中为搜索字段所做的绑定一样。


    ![A978-1-4302-4543-8_9_Fig8_HTML.jpg](img/A978-1-4302-4543-8_9_Fig8_HTML.jpg)


    **图 9-8.** 设置神话乐队表视图的绑定


    对于按钮，我们将使用与上一章相同的过程，结合使用目标-动作和 Cocoa 绑定。我们将使用目标-动作来处理按钮按下事件，并使用 Cocoa 绑定来适当地启用或禁用按钮。我们先从动作开始。选择“添加”按钮，按住
    Control 键拖拽到“Mythical Bands”数组控制器。从弹出菜单中选择 `add:` 动作。然后，选择“删除”按钮，按住 Control 键拖拽到同一位置。这次，选择
    `remove:` 动作。要根据表视图中的选择来启用或禁用按钮，我们需要使用绑定检查器。选择“添加”按钮，打开绑定检查器，并展开“可用性”下的“已启用”部分。勾选“绑定到”复选框，将下拉菜单设置为“Mythical
    Bands”，并将“控制器键”字段改为 `canAdd`。对于“删除”按钮，执行相同操作，但“控制器键”字段使用 `canRemove`。


    现在保存更改并运行应用程序。新窗口会出现，我们可以添加一些乐队，直接在表视图中编辑它们的名称，并保存更改。


    ## 为数组控制器赋予有用的名称


    我们建议您对 nib 文件做一处更改，这在配置我们即将创建的新绑定时会很有帮助。它不会影响应用程序的行为，但您很可能会庆幸做了这个更改，并且后续的文本将假定您已经进行了此更新。


    Core Data 基础设施与 UI 之间的连接都通过一个 `NSArrayController` 运行。我们在上一章中设置的 `NSArrayController`
    名为 `Mythical Person Array Controller`。这个名字很长，比 Xcode 中的绑定检查器实际设计用来显示的长度要长一些。事实上，它几乎无法完全放入绑定检查器的弹出按钮中，并导致每个绑定属性显示的摘要信息溢出，部分文本被省略号代替。而对于
    `Mythical Bands` 数组控制器，我们没有在名称中加入“Array Controller”，这使得它更容易使用。


    您可以通过更改控制器的名称来改善这种情况。更改名称不会修改您已配置的任何绑定，也不会为应用程序的用户更改任何内容。唯一能看到这个变化的人就是您自己，但请记住，您也很重要。正如以一种易于浏览和查找所需内容的方式格式化您的源代码很重要一样，尽您所能优化在
    Interface Builder 中的编辑体验将为您节省时间和避免挫折。


    因此，如果您想进行此更改，请转到主 nib 窗口，确保您正在查看左侧的对象停靠区，找到您的 `Mythical Person Array Controller`。点击其名称，将其改为仅
    `Mythical Person`。这样做将消除一些无实际价值的词语（例如，“Array”和“Controller”），这些词语原本可能会大量散布在您的 nib
    文件和代码中，从而让您得到一个希望更容易被眼睛和大脑快速扫描和理解的显示界面。

    '
- fmt: '### Putting People in Bands


    Now let’s make it possible to attach a person to a band by adding a simple pop-up
    button to the `MythicalPerson` display, which will let us pick a `MythicalBand`
    for the selected `MythicalPerson`. The pop-up button will be connected through
    Cocoa bindings, which means that besides always being automatically updated to
    show the correct value for the selected person (just like the other controls do),
    it will also be automatically updated to always show the current list of bands,
    changing its content automatically as the user makes changes in the Mythical Bands
    window. This will be done by configuring a few bindings on the pop-up button,
    using both the Mythical Persons and Mythical Bands controllers.


    Start off by making a change to the original window so that it better matches
    the new one. Open up the original window (the one with MythBase in the title),
    then select the window by clicking its title, and use the Attributes Inspector
    to rename it “Mythical People.” This way the two windows have the same general
    appearance. Each is centered around a particular entity, but neither of them has
    any distinction as the “main window.”


    Now, select all the views below the sliders and drag them all down a bit. In the
    space that we’ve opened up, drag out a label (name it “Member of Band:”) and a
    pop-up button from the Object Library. Line it all up so it looks roughly like
    Figure [9-9](#A978-1-4302-4543-8_9_Chapter.html#Fig9).


    ![A978-1-4302-4543-8_9_Fig9_HTML.jpg](A978-1-4302-4543-8_9_Fig9_HTML.jpg)


    Figure 9-9. The new and improved Mythical People window


    All that’s left now is to configure some bindings for the pop-up button. Unlike
    a text field or a slider, the pop-up button’s display needs several bindings in
    order to make it behave in a useful way. Consider that a pop-up button needs to
    have an array of strings to display (we’re going to display all available band
    names here), an array of underlying objects that those strings belong to (the
    bands themselves), and something to indicate which item in the list is selected
    (through the selected person’s band relationship). The first two of those will
    be bound via the Mythical Bands controller, through which we can easily bind to
    an array of all bands or all band names. The third will be bound via the Mythical
    Persons controller.


    Start by selecting the pop-up button and opening the Bindings Inspector. Open
    the configuration for the Content binding at the top of the list, select Mythical
    Bands in the pop-up list, select `arrangedObjects` for the Controller Key, and
    click the checkbox. This tells the pop-up button where to find the list of underlying
    objects.


    Next, open the configuration for the Content Values binding. Once again select
    Mythical Bands in the pop-up list and `arrangedObjects` for the Controller Key,
    but this time pick `name` for the Model Key Path. This tells the pop-up button
    that it should populate its displayed values by grabbing the same array (`arrangedObjects`)
    and using the result of asking each for its name.


    Finally, open the Selected Object binding configuration. Here, choose Mythical
    Persons from the pop-up list, `selection` for the Controller Key, and `memberOf`
    for the Model Key Path. The pop-up list will automatically connect things so that
    when the Mythical Persons controller’s selection changes, the pop-up will notice
    the new selection’s band, look that up in the array of `Content` (which it picks
    up from the Mythical Bands controller), and display the corresponding string from
    the `Content Values` array (also from the Mythical Bands controller). Verify that
    this works by saving the changes, pressing Run in Xcode, and trying it out. For
    each `MythicalPerson` we pick, we can select a `MythicalBand` to attach them to
    (see Figure [9-10](#A978-1-4302-4543-8_9_Chapter.html#Fig10)).


    ![A978-1-4302-4543-8_9_Fig10_HTML.jpg](A978-1-4302-4543-8_9_Fig10_HTML.jpg)


    Figure 9-10. Setting Hercules as a member of the band Grecian Formula'
