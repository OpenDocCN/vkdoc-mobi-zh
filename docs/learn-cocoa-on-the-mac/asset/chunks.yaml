    \ `retain` 和 `release`）的项目，了解这类问题的成因还是很有好处的。\n\n在没有 ARC 的情况下，Objective-C 对象的内存管理是通过手动引用计数来处理的。长话短说：任何时候我们通过\
    \ `alloc` 或 `copy` 方法创建一个对象，或者通过向对象发送 `retain` 消息将其标记为“正在使用”，其引用计数就会增加。在某个时刻（当我们不再需要该对象时），我们必须向对象发送\
