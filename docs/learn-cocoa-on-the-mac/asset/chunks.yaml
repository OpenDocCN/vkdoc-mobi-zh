- fmt: '最后，我们将为字符串编码列表提供一个图形界面，用于重新解释所选文件的内容。为此，我们需要从库中添加一个标签和一个弹出按钮。按照图示布局它们，包括一个特别宽的弹出按钮，因为列表中的某些条目会很长（见图
    16-7）。


    ![A978-1-4302-4543-8_16_Fig7_HTML.jpg](A978-1-4302-4543-8_16_Fig7_HTML.jpg)


    图 16-7.


    说真的，谁会不希望自己的弹出按钮宽到足以完整显示“NSUTF32LittleEndianStringEncoding”呢？


    弹出列表的值将从应用委托的`encodingNames`方法中获取，因此我们无需在 Interface Builder 中输入它们。这里我们将再次使用`NSDictionaryController`，但这次仅显示`encodingNames`字典中的值。为此，我们需要先从库中拖拽另一个`NSDictionaryController`到
    nib 窗口中，同时将其重命名为`strEncs`，并将其 Content Dictionary 绑定到应用委托的`self.encodingNames`键路径。然后，将弹出按钮的
    Content 绑定到`strEncs`，使用`arrangedObjects`作为控制器键，`value`作为模型键路径。


    最后，我们需要建立一个绑定，以便用户在弹出按钮中设置的值能被应用委托感知，从而让应用委托使用所选编码重新显示文本。通过将弹出按钮的 Selected Object
    绑定到应用委托，并使用`self.stringEncodingName`作为键路径来实现这一点。


    现在保存所有更改，并构建并运行（Build & Run）应用。我们应该能看到构建好的 GUI，其中包含一个“文件 ➤ 打开”菜单项，允许我们选择文件，并显示文件的属性及其内容。从弹出列表中选择另一种编码将让应用使用所选编码在文本视图中重新显示数据。


    ## 总结


    在本章中，我们学习了如何使用 Cocoa 访问文件及其元数据。我们还了解了一些关于字符串编码的知识，以及 Cocoa 如何处理它们。更重要的是，我们看到了另一个由
    Cocoa 绑定驱动的 GUI 示例。除了打开文件的菜单项外，这里发生的一切都是通过绑定实现的，包括在弹出列表中设置值，最终导致文本字段重新加载。这是一个相当复杂的交互过程，在你适应之前，它的工作原理并不明显，因为部分操作在幕后进行，这要归功于
    Cocoa 绑定。如果你还不太理解它的工作方式，不妨重读本章，看看是否能更接近那个豁然开朗的“啊哈！”时刻。否则，请继续阅读下一章，学习如何使用并发来让我们的应用程序响应更迅速。


    # 17. 并发


    摘要


    软件开发中最大的挑战之一，是编写能够同时执行多个任务的软件。几十年来，计算机通过高速在任务间切换来给人一种并发执行的假象，使其看似在同时做多件事（而实际上它们只是在不停地从一个任务切换到另一个任务，一次只“关注”一个任务）。如今的计算机通常包含两个或更多计算核心，因此它们确实可以同时执行多件事，在所有核心上同时执行指令。


    然而，即使计算机的硬件和操作系统能够与多核心协同工作，编写能够有效利用多核心的应用程序软件在技术上仍然具有挑战性。在大多数开发环境中，默认假设是我们编写的代码是顺序执行的，一个操作接着另一个操作，而将工作拆分以便可以并发执行可能是一项相当艰巨的任务。


    本章将展示一个常见场景的示例，在该场景中 Cocoa 应用程序可以从并发中受益，并演示如何实现。你一定熟悉 OS X 的旋转磁盘光标（有时称为“旋转沙滩球死亡之兆”），每当应用程序对用户操作无响应时就会出现。这通常出现在我们点击某个按钮或菜单项，触发了任何需要几秒钟以上时间的处理时。OS
    X 会注意到进程没有处理输入事件，并显示旋转磁盘光标以提醒用户。当应用程序完全停止响应并即将崩溃（或被用户强制关闭）时，也会发生这种情况。因此，当应用停止响应并开始显示旋转磁盘光标时，许多用户的即时反应是恐慌，怀疑应用即将崩溃！


    因此，为了我们的最佳利益，必须确保应用程序中任何长时间运行的操作都以这样一种方式处理：用户仍然可以与应用程序交互，并且不会看到旋转磁盘——即让操作在后台进行，同时让应用程序像平常一样处理用户输入事件。本章将演示两种以最少的麻烦向
    Cocoa 应用程序添加此类并发的方法。我们将使用 Foundation 框架中可用的`NSOperation`和`NSOperationQueue`类所体现的概念，还将看到如何使用
    Grand Central Dispatch（以下简称 GCD）来实现这一点，这是一个所有 OS X 应用程序（无论是否基于 Cocoa）都能使用的 C 语言
    API。'
  raw: 'Finally, let’s provide a GUI for the list of string encodings that will be
    used to let us reinterpret the contents of the selected file. For this, we’ll
    need a label and a pop-up button from the Library. Lay them out as shown, including
    the extra-wide pop-up button, since some of the entries in the list will be quite
    long (see Figure [16-7](#A978-1-4302-4543-8_16_Chapter.html#Fig7)).


    ![A978-1-4302-4543-8_16_Fig7_HTML.jpg](A978-1-4302-4543-8_16_Fig7_HTML.jpg)


    Figure 16-7.


    Really, who wouldn’t want their pop-up button wide enough to fully display “NSUTF32LittleEndianStringEncoding”?


    The values for the pop-up list will be retrieved from the app delegate’s `encodingNames`
    method, so we don’t need to enter them in Interface Builder. Here we’ll use `NSDictionaryController`
    again, this time to display just the values from the `encodingNames` dictionary.
    In order to do that, we need to first drag another `NSDictionaryController` from
    the Library to the nib window, renaming it strEncs while we’re at it, and bind
    its Content Dictionary to the app delegate’s `self.encodingNames` key path. Then,
    bind the pop-up button’s Content to strEncs, using arrangedObjects as the Controller
    Key and value as the Model Key Path.


    Finally, we need to establish a binding so that the value the user sets in the
    pop-up is noticed by the app delegate, making the app delegate redisplay the text
    using the selected encoding. Do this by binding the pop-up button’s Selected Object
    to the app delegate, using `self.stringEncodingName` as the key path.


    Now save all the changes, and Build & Run the app. We should see the GUI we’ve
    built, including a File ➤ Open menu item that lets us choose a file and will show
    us the file’s attributes as well as its content. Choosing another encoding from
    the pop-up list will make the app redisplay the data in the text view using the
    chosen encoding.


    ## Wrap Up


    In this chapter, we’ve seen how to use Cocoa to access files and their metadata.
    We’ve also learned a bit about string encodings, and how Cocoa deals with them.
    What’s more, we’ve seen another example of a GUI powered by Cocoa bindings. Except
    for the menu item that opens a file, everything that happens here does so through
    bindings, including setting a value in a pop-up list, which ends up causing the
    text field to reload. That’s a fairly complicated interaction, and until you’re
    used to it, it’s not really obvious how it works because parts of it occurs behind
    the scenes, thanks to Cocoa bindings. If you don’t quite understand how it’s working,
    consider rereading this chapter and see if it brings you any closer to the a-ha!
    moment where it suddenly all makes sense. Otherwise, proceed to the next chapter
    and learn how to use concurrency to make our application more responsive.


    # 17. Concurrency


    Abstract


    One of the biggest challenges in software development is writing software that
    will do more than one thing at a time. For decades, computers have been able to
    give an illusion of concurrency by quickly switching between tasks at a high rate,
    making it seem that they’re doing several things at once (when in reality they’re
    continuously flipping from one task to the next, only “paying attention” to one
    at a time). Today’s computers frequently contain two or more computation cores
    so they really can do multiple things at once, simultaneously executing instructions
    on all cores at the same time.


    One of the biggest challenges in software development is writing software that
    will do more than one thing at a time. For decades, computers have been able to
    give an illusion of concurrency by quickly switching between tasks at a high rate,
    making it seem that they’re doing several things at once (when in reality they’re
    continuously flipping from one task to the next, only “paying attention” to one
    at a time). Today’s computers frequently contain two or more computation cores
    so they really can do multiple things at once, simultaneously executing instructions
    on all cores at the same time.


    However, even if our computer’s hardware and OS are capable of working with a
    multitude of cores, writing application software that can effectively make use
    of multiple cores is still technically challenging. In most development environments,
    the default assumption is that the code we’re writing is performed sequentially,
    one operation after the other, and splitting things up so that work can be performed
    concurrently can be a pretty big task.


    This chapter will present an example of a common situation in which Cocoa applications
    can benefit from concurrency and show how it’s done. You’re surely familiar with
    OS X’s spinning disk cursor (sometimes called the “spinning beach ball of death”)
    that appears whenever an application isn’t responding to user actions. This typically
    appears after we click a button or menu item that triggers any sort of processing
    that takes more than a few seconds. OS X notices that the process isn’t handling
    input events and shows the spinning disk cursor to alert the user. This also happens
    whenever an application has really stopped responding entirely and is on its way
    to crashing (or being killed by the user). So when an app stops responding and
    starts showing the spinning disk cursor, the immediate reaction for many users
    is a moment of panic when they suspect that the app is about to crash!


    Therefore, it’s in our best interests to make sure that any sort of long-running
    operation in our application is handled in such a way that the user can still
    interact with our application and not get the spinning disk—by making the operation
    occur in the background and letting our application still handle user input events
    as it normally does. This chapter will demonstrate two ways to add this sort of
    concurrency to a Cocoa application with a minimum of fuss. We’ll use the concepts
    embodied by the `NSOperation` and `NSOperationQueue` classes available in the
    Foundation framework, and we’ll also see how it can be done using Grand Central
    Dispatch (GCD from here on out), which is a C-language API usable by all OS X
    applications, whether they are Cocoa-based or not.'
