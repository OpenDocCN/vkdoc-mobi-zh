    within Interface Builder; we need to declare them explicitly. Each array will
    be managed by an `NSArrayController` in the nib file, which we’ll create and configure
    within Interface Builder in a bit. We declare the three `NSMutableArrays` as properties
    so that they are readily available for the `NSArrayControllers` to access them.
    The changes we need to make in `DungeonThingAppDelegate.h` are as follows:


