    \n**图 9-2.** 新的数据模型\n\n### 模型版本控制与迁移\n\n在我们开始对数据模型进行更改之前，有一个重要问题需要解决：迁移。我们说的不是人们从一个国家搬到另一个国家，也不是鸟儿南飞过冬；我们说的是数据迁移。如果您开发过数据库应用程序，您应该熟悉将数据从一个部署版本“迁移”到下一个版本的概念。这通常涉及编写某种脚本，用于修改数据库结构本身（添加、删除或更改表和列），并用适当的值填充新字段。在\
