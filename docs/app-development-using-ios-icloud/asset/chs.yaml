  \   定义一个常量来保存 iCloud 表（记录类型）`profile` 的引用。\n*   将用户提供的值分配给 iCloud profile 的相应字段。需要注意的是，数据类型必须正确匹配，否则将导致运行时错误。例如，`personalprofile`\
