- "# 3. 类扩展\n\n扩展提供了一种强大的方式，可以为现有的类、结构体、枚举或协议添加新功能。添加后，该函数可作为被添加类或对象的自然扩展使用。扩展可以添加到用户定义的对象，也可以添加到系统定义的类。在本章中，我们将学习如何为系统定义的类添加扩展，而在专门讨论图像处理的第\
  \ 5 章中，我们将学习如何为用户定义的视图控制器添加扩展。\n\n一旦定义了扩展，我们就可以像在定义函数时所期望的那样做任何事情。例如，你可以：\n\n* \
  \  添加委托\n*   定义方法、结构体和类型\n*   定义初始化器\n*   遵循或确认某个协议\n\n## 示例代码说明\n\n在下面的例子中，我们将扩展系统定义的类\
  \ `String`，以添加一个当前不存在的字符串操作函数。我们将添加以下三个函数：\n\n*   获取字符串的最后一个索引\n*   检查用户提供的字符串输入是否是有效的电子邮件地址\n\
  *   检查用户提供的字符串输入是否是有效的 URL\n\n在我们的示例中，我们将在视图控制器类之上添加扩展。请注意，该扩展不在视图控制器类定义内部，并且一旦定义，它在整个项目范围内都是可见的。\n\
  \n### 字符串扩展\n\n```\nextension String {\n}\n```\n\n要定义扩展，我们需要使用系统定义的关键字 `extension`（注意区分大小写）。在关键字\
  \ `extension` 之后，我们需要提供扩展的名称。在我们的例子中，我们扩展的是系统定义的 `String` 类；因此我们使用相同的系统定义的类名。\n\n\
  #### 方法：查找最后一个索引\n\n```\nfunc lastIndex(of string: String) -> Int? {\n}\n```\n\n\
  函数的名称为 `lastIndex`。它将接受一个 `String` 字面量，并返回该字符串的最后一个索引号，该索引是一个整数。请注意，`lastIndex`\
  \ 将作为 `String` 函数的一个新增函数在整个项目中可用。\n\n```\nguard let index = range(of: string, options:\
  \ .backwards) else { return nil }\n```\n\n在这一行中，我们定义了一个变量 `index`。请注意，该变量被定义为 `let`，因为我们不会在函数作用域内重复使用它。此外，我们使用\
  \ `guard` 来确保如果用户提供的字符串有问题，不会导致抛出系统错误。\n\n系统定义的 `range` 函数会向后查找用户提供的字符串，如果找到则返回一个有效的范围给\
  \ `index` 变量；如果未找到或遇到错误，它将返回 `nil`（执行函数的 `else` 部分）。\n\n```\nreturn self.distance(from:\
  \ self.startIndex, to: index.lowerBound)\n```\n\n这行代码计算字符串开头与找到的子字符串起始位置之间的距离，并返回其位置。\n\
