  }\n}\n}\n})\n}\n}\n```\n\n\n\n`Profile` 模态类的完整代码如下：\n\n```swift\nimport UIKit\n\
  import CloudKit\n\nclass Profile: NSObject {\n    let group = DispatchGroup()\n\
