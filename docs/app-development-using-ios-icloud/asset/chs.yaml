  }\n}\n}\n}\n```\n\n### 会话模型类\n\n会话模型类模拟了 iCloud 仓库中的会话表。根据谁与谁在交谈，我们在仓库中会有唯一的聊天表名称。表名称由发起者（发起会话的一方）的名称和接收者（聊天内容发送给的一方）的名称组合而成。\n\
  \n定义了一个名为 `Conversation` 的类，类型为 `NSObject`，它继承了两个模块：`CloudKit`（用于 iCloud 操作）和 `UIKit`（用于\
  \ UI 定义）。\n\n```\nimport UIKit\nimport CloudKit\nclass Conversation: NSObject {\n\
  ```\n\n为 iCloud 的异步操作定义了队列和组。\n\n```\nlet group = DispatchGroup()\nlet syncQueue\
  \ = DispatchQueue(label: \"com.domain.app.sections\")\n```\n\n定义了描述会话表字段的类变量。它有两个主要变量：\n\
  \n*   `chattext`，用户提供的聊天文本\n*   `originatorid`，提供文本的用户 ID\n\n我们有两个 `init` 方法：一个接受用户提供的输入并将其赋值给类对象，另一个是空构造函数。空构造函数帮助我们创建类的对象，以便在无需提供任何输入值的情况下调用类的方法。\n\
  \n```\nvar record:CKRecord!\nvar chattext:String!\nvar originatorid:String!\ninit(chattext:String!,\
  \ originatorid:String!) {\nself.chattext = chattext\nself.originatorid = originatorid\n\
  }\noverride init() {\n}\n```\n\n\n\n#### 获取对话方法\n\n此函数用于检索聊天发起者与特定接收用户之间的所有聊天记录。该方法以发起者和接收者的名称作为输入，并带有一个完成处理程序，该处理程序返回一个\
  \ `Conversation` 类数组对象，以及在出现错误时返回的错误信息。\n\n```\nfunc getChats(receipentname:String,\
  \ originatorname:String, completion:@escaping ([Conversation], Error?) -> Void){\n\
  ```\n\n在下面的代码中，我们定义了一个名为 `chats` 的方法级变量，它是一个 `Conversation` 类型的数组。由于记录类型是动态的，我们通过组合发起者和接收者的名称来构建它。\n\
  \n```\nvar chats:[Conversation] = []\nvar recordType = \"\\(originatorname.replacingOccurrences(of:\
  \ \" \", with: \"\"))_\\(receipentname.replacingOccurrences(of: \" \", with: \"\"\
  ))\"\nrecordType = recordType.lowercased()\n```\n\n我们想要获取所有对话。这个虚拟变量在创建聊天时被设定，其值始终为\
  \ 1。这将帮助我们获取所有对话。我们按创建日期对结果进行排序。这样，最近创建的记录就会排在顶部，同时设置操作配置并将结果限制为前 2000 条聊天记录。\n\n\
  请注意，你也可以实现批量检索，即先检索固定数量的对话。当用户执行下拉手势等操作时，你可以检索下一批数据。在我们的代码中，我们只是简单地检索了前 2000 条记录。\n\
  \n```\nlet pred = NSPredicate(format: \"dummy == %@\", \"1\")\nlet query = CKQuery(recordType:\
  \ \"\\(recordType)\", predicate: pred)\nquery.sortDescriptors = [NSSortDescriptor(key:\
  \ \"datecreated\", ascending: true)]\nlet operation = CKQueryOperation(query: query)\n\
  CKContainer.default().publicCloudDatabase.add(operation)\nlet operationConfiguration\
  \ = CKOperation.Configuration()\noperationConfiguration.timeoutIntervalForRequest\
  \ = 10\noperationConfiguration.timeoutIntervalForResource = 10\noperation.configuration\
  \ = operationConfiguration\noperation.resultsLimit = 2000\n```\n\n`recordMatchedBlock`\
  \ 在操作完成时被调用。在 `success` 情况下，遍历 `enum` 对象，我们将聊天对象设置为检索到的值，并将其追加到函数级别的 `chats` 变量中。在\
  \ `failure` 情况下，我们将错误打印到控制台。\n\n```\noperation.recordMatchedBlock = { recordID,\
  \ result in\nswitch result {\ncase .success(let record):\nlet chat = Conversation(chattext:\
  \ record[\"chattext\"] as? String, originatorid: record[\"originatorid\"] as? String)\n\
  chat.record = record\nchats.append(chat)\ncase .failure(let error):\nprint(error.localizedDescription)\n\
  }\n}\n```\n\n最后，在 `queryResultBlock` 中，在成功的情况下，我们返回带有 `chats` 数组对象和 `nil` 的完成处理程序；在失败的情况下，返回\
  \ `nil` 和错误信息。\n\n```\noperation.queryResultBlock = { result in\nDispatchQueue.main.async\
  \ {\nswitch result {\ncase .failure(let error):\ndebugPrint(error)\nprint(error)\n\
  completion(nil, error)\ncase .success(_):\ncompletion(chats, nil)\n}\n}\n}\n}\n\
  ```\n\n#### 保存对话方法\n\n此方法在首次发起聊天时将对话保存到云端。它接收发起者名称、接收者名称、发起者和接收者的个人资料以及实际的聊天文本。\n\
  \n```\nfunc saveNewChatRecordsToCloud(receipentname:String, originatorname:String,\
  \ receipentprofile:CKAsset, originatorprofile:CKAsset, lastchat:String) {\n```\n\
  \n在此方法中，我们将保存两条记录到公共云数据库，以及一条记录到私有云数据库。下面的代码定义了数据库变量以及如前所述的对话表名。\n\n```\nlet container\
  \ = CKContainer.default()\nlet publicDatabase = container.publicCloudDatabase\n\
  let privateDatabase = container.privateCloudDatabase\nvar recordType = \"\\(originatorname.replacingOccurrences(of:\
  \ \" \", with: \"\"))_\\(receipentname.replacingOccurrences(of: \" \", with: \"\"\
  ))\"\nrecordType = recordType.lowercased()\n```\n\n下面的代码定义了以下三条记录：\n\n*   `businessChatRecord`：这是为每个用户业务动态定义的。表以业务名称命名。它存储聊天发起者的名称、发起者个人资料、便于查询检索的虚拟值\
  \ 1，以及最后一条聊天对话。此记录将存储在公共数据库中。\n\n*   `chatRecord`：这是对话表，存储两个用户（发起者和接收者）之间的所有对话。它有四个字段：发起者用户\
  \ ID、聊天文本、聊天创建日期，以及默认值为 1 的虚拟字段（便于检索记录）。此记录将存储在公共数据库中。\n\n*   `personalChatRecord`：此记录将存储在\
  \ `chattables` 中。它包含对话表名和接收者名称、个人资料图片、默认值为 1 的虚拟变量，以及聊天文本。此记录将存储在私有数据库中。\n\n为 `businessChatRecord`\
  \ 和 `personalChatRecord` 创建了一个公共云数据库的操作。\n\n```\nlet businessChatRecord = CKRecord(recordType:\
  \ \"\\(receipentname.replacingOccurrences(of: \" \", with: \"\").lowercased())\"\
  )\nbusinessChatRecord[\"chattablename\"] =  \"\\(recordType)\"\nbusinessChatRecord[\"\
  originatorname\"] = originatorname\nbusinessChatRecord[\"originatorprofile\"] =\
  \ CKAsset(fileURL: originatorprofile.fileURL!)\nbusinessChatRecord[\"dummy\"] =\
  \ \"1\"\nbusinessChatRecord[\"lastchat\"] = lastchat\nlet chatRecord = CKRecord(recordType:\
  \ \"\\(recordType)\")\nchatRecord[\"originatorid\"] = self.originatorid\nchatRecord[\"\
  chattext\"] = self.chattext\nchatRecord[\"datecreated\"] = Date()\nchatRecord[\"\
  dummy\"] = \"1\"\nlet personalChatRecord = CKRecord(recordType: \"chattables\")\n\
  personalChatRecord[\"chattablename\"] = \"\\(recordType)\"\npersonalChatRecord[\"\
  receipentprofile\"] = CKAsset(fileURL: receipentprofile.fileURL!)\npersonalChatRecord[\"\
  receipentname\"] = receipentname\npersonalChatRecord[\"dummy\"] = \"1\"\npersonalChatRecord[\"\
  lastchat\"] = lastchat\nlet publicSaveOperation = CKModifyRecordsOperation(recordsToSave:\
  \ [businessChatRecord, chatRecord])\npublicSaveOperation.savePolicy = .changedKeys\n\
  ```\n\n执行下面的代码来更新公共云端的 iCloud 仓库。成功时，我们为 `personalChatRecord` 数据创建一个私有云操作并执行它。成功时，我们退出组。失败时，我们将错误打印到控制台。\n\
  \n```\npublicSaveOperation.modifyRecordsResultBlock = { result in\nswitch result\
  \ {\ncase .success:\nself.syncQueue.async {\nlet privateSaveOperation = CKModifyRecordsOperation(recordsToSave:\
  \ [personalChatRecord])\nprivateSaveOperation.savePolicy = .changedKeys\nprivateSaveOperation.modifyRecordsResultBlock\
  \ = { result in\nswitch result {\ncase .success:\nself.syncQueue.async {\nself.group.leave()\n\
  }\n// 处理任何后续操作或 UI 更新\ncase .failure(let error):\nprint(\"保存记录到私有数据库时出错: \\(error.localizedDescription)\"\
  )\n// 处理错误情况\n}\n}\nprivateDatabase.add(privateSaveOperation)\n}\n// 处理任何后续操作或 UI\
  \ 更新\ncase .failure(let error):\nprint(\"保存记录时出错: \\(error.localizedDescription)\"\
  )\n// 处理错误情况\n}\n}\npublicDatabase.add(publicSaveOperation)\n}\n```\n\n\n\n#####\
  \ 保存对话的云端第二种方法\n\n当两个用户之间的聊天已经存在时，会调用此方法。它接收发起者和接收者的姓名作为参数。\n\n首先建立对公共云端的引用，并根据用户提供的输入动态创建记录类型。然后创建一条对话类型的记录，并使用发起者用户\
  \ ID、聊天文本以及一个文本值设置为 1 的虚拟变量来初始化其字段。\n\n```\nfunc saveNewChatToCloud(tablename: String,\
  \ receipentname:String, originatorname:String) {\n    let container = CKContainer.default()\n\
  \    let publicDatabase = container.publicCloudDatabase\n    var recordType = \"\
  \\(originatorname.replacingOccurrences(of: \" \", with: \"\"))_\\(receipentname.replacingOccurrences(of:\
  \ \" \", with: \"\"))\"\n    recordType = recordType.lowercased()\n    let chatRecord\
  \ = CKRecord(recordType: \"\\(recordType)\")\n    chatRecord[\"originatorid\"] =\
  \ self.originatorid\n    chatRecord[\"chattext\"] = self.chattext\n    chatRecord[\"\
  datecreated\"] = Date()\n    chatRecord[\"dummy\"] = \"1\"\n```\n\n在下面的代码中，我们将执行\
  \ `CKModifyRecordsOperation` 并将聊天记录保存到表中。如果成功，我们会调用一个自定义函数 `setSubscription`。这是为了通知接收者用户有新聊天被创建。如果失败，我们会在控制台打印错误信息。\n\
  \n```\nlet publicSaveOperation = CKModifyRecordsOperation(recordsToSave: [chatRecord])\n\
  publicSaveOperation.savePolicy = .changedKeys\npublicSaveOperation.modifyRecordsResultBlock\
  \ = { result in\n    switch result {\n    case .success:\n        self.syncQueue.async\
  \ {\n            self.setSubscription(tablename: recordType, chattext: self.chattext,\
  \ originatorname: originatorname)\n        }\n    case .failure(let error):\n  \
  \      print(\"保存记录时出错：\\(error.localizedDescription)\")\n    }\n}\npublicDatabase.add(publicSaveOperation)\n\
  }\n```\n\n##### 设置订阅方法\n\n此方法可以帮助接收者用户感知到对话中有新的聊天内容加入。我们获取对话表名、实际聊天内容以及发起者的名称。然后访问公共数据库，并创建一个\
  \ `CKQuerySubscription` 类型的 `subscription` 变量。构造函数需要表名、一个查询构造函数、订阅的名称以及我们想要的选项。在我们的示例代码中，我们设置了当用户为给定表创建或修改新记录时触发的选项。\n\
  \n接下来，我们创建一个通知信息变量，并将其提示文本设置为“你有一条新聊天”。然后将该通知信息添加到 `subscription` 变量中，并在公共数据库上执行保存操作。完成后，我们将线程返回主线程。\n\
  \n```\nfunc setSubscription(tablename: String, chattext:String,originatorname:String){\n\
  \    // 为数据库表设置一个 CKSubscription\n    let container = CKContainer.default()\n  \
  \  let publicDatabase = container.publicCloudDatabase\n    let subscription = CKQuerySubscription(\n\
  \        recordType: \"\\(tablename)\",\n        predicate: NSPredicate(value: true),\n\
  \        subscriptionID: \"mySubscription\",\n        options: [.firesOnRecordCreation,\
  \ .firesOnRecordUpdate]\n    )\n    let notificationInfo = CKSubscription.NotificationInfo()\n\
  \    notificationInfo.alertBody = \"你有一条新聊天\"\n    subscription.notificationInfo\
  \ = notificationInfo\n    publicDatabase.save(subscription) { (subscription, error)\
  \ in\n        if let error = error {\n            print(\"保存订阅时出错：\\(error.localizedDescription)\"\
  )\n            self.group.leave()\n        } else {\n            print(\"订阅保存成功！\"\
  )\n            self.group.leave()\n        }\n    }\n}\n```\n\n##### 检查聊天表是否存在方法\n\
  \n此方法可以帮助用户判断是否与某个其他用户存在聊天对话。它接收接收者和发起者名称作为输入，并有一个完成处理函数，该处理函数返回两个值：一个布尔值，用于指示聊天表是否存在；以及一个错误对象，用于在查询导致系统错误时提供信息。\n\
  \n```\nfunc chatTableExists(receipentname:String, originatorname:String, completion:@escaping\
