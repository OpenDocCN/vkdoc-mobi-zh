  \ chat.group.notify(queue: .main) { }\n                }\n            }\n      \
  \  }\n    }\n}\n```\n\n\n\n### `ChatViewController`\n\n以下代码定义了一个 `ChatViewController`\
  \ 类，用于显示用户已发起聊天的所有联系人。它继承自 `UIViewController`，并遵循 `UITabBarDelegate`、`UITableViewDelegate`\
  \ 和 `UITableViewDataSource` 协议。以下是该类的属性：\n\n- `profile`：当前用户的个人资料信息\n- `origniatorProfile`：聊天发起者的个人资料\n\
  - `receipentProfile`：聊天接收者的个人资料\n- `chattables`：用于存储所有聊天表名称的数组\n- `businesstables`：用于存储业务表的数组\n\
  \n```swift\nimport UIKit\nclass ChatViewController: UIViewController, UITabBarDelegate,\
  \ UITableViewDelegate, UITableViewDataSource {\nvar profile:Profile?\nvar origniatorProfile:Profile?\n\
  var receipentProfile:Profile?\nvar chattables:[Chattable] = []\nvar businesstables:[Businesstable]\
  \ = []\n```\n\n#### UI 对象定义\n\n以下代码定义了多个 UI 组件，用于构建一个带有标签栏导航的聊天界面。\n\n- `tabBar`：创建一个包含“个人资料”、“联系人”和“聊天”三个项目的标签栏\n\
  - `chatTableView`：创建一个用于显示聊天消息的表格视图\n- `businessTableView`：创建一个用于显示业务相关信息的表格视图（基于\
  \ `businesstables` 属性）\n- `headerView`：创建一个浅灰色背景的标题视图，用于显示额外信息或控件\n- `headerLabel`：创建一个标签，用于在\
  \ `headerView` 内显示聊天屏幕标题\n\n```swift\nprivate let tabBar:UITabBar = {\nlet tabbar\
  \ = UITabBar()\ntabbar.translatesAutoresizingMaskIntoConstraints = false\ntabbar.backgroundColor\
  \ = UIColor.init(red: 171/255, green: 189/255, blue: 217/255, alpha: 1)\nlet saveSymbolConfiguration\
  \ = UIImage.SymbolConfiguration(pointSize: 16, weight: .black)\nlet contact = UIImage(systemName:\
  \ \"doc.on.clipboard\", withConfiguration: saveSymbolConfiguration)\nlet contactbutton\
  \ = UITabBarItem(title: \"联系人\", image: contact, selectedImage: contact)\ncontactbutton.tag\
  \ = 1\nlet chat = UIImage(systemName: \"doc.plaintext\", withConfiguration: saveSymbolConfiguration)\n\
  let chatbutton = UITabBarItem(title: \"聊天\", image: chat, selectedImage: chat)\n\
  chatbutton.tag = 2\nlet profile = UIImage(systemName: \"person.fill\", withConfiguration:\
  \ saveSymbolConfiguration)\nlet profilebutton = UITabBarItem(title: \"个人资料\", image:\
  \ profile, selectedImage: profile)\nprofilebutton.tag = 0\ntabbar.setItems([profilebutton,\
  \ contactbutton, chatbutton], animated: false)\nreturn tabbar\n}()\nprivate let\
  \ chatTableView:UITableView = {\nlet tableView = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntableView.backgroundColor = .white\ntableView.isScrollEnabled = true\n\
  return tableView\n}()\nprivate let businessTableView:UITableView = {\nlet tableView\
  \ = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints = false\n\
  tableView.backgroundColor = .white\ntableView.isScrollEnabled = true\nreturn tableView\n\
  }()\nprivate let headerView: UIView = {\nlet view = UIView()\nview.translatesAutoresizingMaskIntoConstraints\
  \ = false\nview.backgroundColor = .systemGray6\nreturn view\n}()\nprivate let headerLabel:UILabel\
  \ = {\nlet label = UILabel()\nlabel.text = \"聊天\"\nlabel.translatesAutoresizingMaskIntoConstraints\
  \ = false\nlabel.textColor = UIColor(displayP3Red: 128/255, green: 0/255, blue:\
  \ 128/255, alpha: 1)\nlabel.textAlignment = .center\nlabel.font = UIFont.boldSystemFont(ofSize:\
  \ 35)\nreturn label\n}()\n```\n\n## 生命周期方法\n\n`viewDidLoad()` 方法是 `UIKit` 中的生命周期方法，当视图控制器的视图加载到内存时会被调用。在示例中，它用于启动获取聊天表的过程。以下是对代码的分解说明：\n\
  \n- `super.viewDidLoad()`：调用父类的 `viewDidLoad()` 实现，以确保正确的初始化\n- `getChatTables()`：调用一个名为\
  \ `getChatTables()` 的自定义方法，以获取聊天相关数据\n\n```swift\noverride func viewDidLoad() {\n\
  super.viewDidLoad()\ngetChatTables()\n}\n```\n\n#### 设置方法\n\n`setup()` 函数用于配置视图控制器的初始状态，包括设置代理、数据源和表格视图属性。以下是对代码的分解说明：\n\
  \n- `view.backgroundColor = .white`：将主视图的背景颜色设置为白色\n- `tabBar.delegate = self`：将当前视图控制器设置为标签栏的代理，以便处理标签选择事件\n\
  - `tabBar.selectedItem = tabBar.items![1]`：将第二个标签项设置为初始选中的标签\n- `chatTableView`\
  \ 配置：\n  - 将当前视图控制器设置为 `chatTableView` 的代理和数据源\n  - 注册 `ChatTableViewCell` 类，以便在\
  \ `chatTableView` 中复用\n  - 移除 `chatTableView` 的边框\n  - 将 `chatTableView` 的分隔线样式设置为单线\n\
  - `businessTableView` 配置：\n  - 将当前视图控制器设置为 `businessTableView` 的代理和数据源\n  - 注册 `ChatTableViewCell`\
  \ 类，以便在 `businessTableView` 中复用\n  - 移除 `businessTableView` 的边框\n  - 将 `businessTableView`\
  \ 的分隔线样式设置为单线\n\n```swift\nfunc setup(){\nview.backgroundColor = .white //\ntabBar.delegate\
  \ = self\ntabBar.selectedItem = tabBar.items![1]\nchatTableView.delegate = self\n\
  chatTableView.dataSource = self\nchatTableView.register(ChatTableViewCell.self,\
  \ forCellReuseIdentifier: \"聊天\")\nchatTableView.layer.borderWidth = 0\nchatTableView.layer.borderColor\
  \ = UIColor.white.cgColor\nchatTableView.separatorStyle = .singleLine\nbusinessTableView.delegate\
  \ = self\nbusinessTableView.dataSource = self\nbusinessTableView.register(ChatTableViewCell.self,\
  \ forCellReuseIdentifier: \"业务\")\nbusinessTableView.layer.borderWidth = 0\nbusinessTableView.layer.borderColor\
  \ = UIColor.white.cgColor\nbusinessTableView.separatorStyle = .singleLine\n}\n```\n\
  \n\n\n### `Draw Screen` 方法\n\n此函数负责设置视图控制器的初始布局，包括创建并定位头部视图、头部标签、聊天表格视图或业务表格视图，以及标签栏。以下是代码的详细分解：\n\
  \n**获取屏幕尺寸**\n\n- `let screensize: CGRect = UIScreen.main.bounds`：获取主屏幕的尺寸\n- `let\
  \ screenWidth = screensize.width`：提取屏幕宽度\n- `let screenHeight = screensize.height`：提取屏幕高度\n\
  \n**创建并定位头部视图**\n\n- `view.addSubview(headerView)`：将 `headerView` 作为子视图添加到主视图\n\
  - `NSLayoutConstraint.activate(constraints)`：对 `headerView` 应用约束，使其位于屏幕顶部，宽度为全宽，高度为\
  \ 100 点\n\n**创建并定位头部标签**\n\n- `headerView.addSubview(headerLabel)`：将 `headerLabel`\
  \ 作为子视图添加到 `headerView`\n- `NSLayoutConstraint.activate(constraints0)`：对 `headerLabel`\
  \ 应用约束，使其在 `headerView` 中具有特定的上边距、全宽和高度\n\n**条件显示表格视图**\n\n- `if(chattables.count\
  \ > 0)`：检查 `chattables` 数组是否包含元素。\n- 如果条件为真，则将 `chatTableView` 作为子视图添加，并设置其约束以填充\
  \ `headerView` 下方的区域。\n- 如果条件为假，则将 `businessTableView` 作为子视图添加，并设置其约束以填充 `headerView`\
  \ 下方的区域。\n\n**创建并定位标签栏**\n\n- `view.addSubview(tabBar)`：将 `tabBar` 作为子视图添加到主视图\n\
  - `NSLayoutConstraint.activate(constraints5)`：对 `tabBar` 应用约束，使其位于屏幕底部，并具有特定的高度\n\
  \n```swift\nfunc drawInitialScreen(){\n    let screensize: CGRect = UIScreen.main.bounds\n\
  \    let screenWidth = screensize.width\n    let screenHeight = screensize.height\n\
  \    view.addSubview(headerView)\n    let constraints = [\n        headerView.topAnchor.constraint(equalTo:\
  \ view.topAnchor, constant: 0),\n        headerView.leftAnchor.constraint(equalTo:\
  \ view.leftAnchor, constant: 0),\n        headerView.widthAnchor.constraint(equalToConstant:\
  \ screenWidth),\n        headerView.heightAnchor.constraint(equalToConstant: 100)\n\
  \    ]\n    NSLayoutConstraint.activate(constraints)\n    headerView.addSubview(headerLabel)\n\
  \    let constraints0 = [\n        headerLabel.topAnchor.constraint(equalTo: view.topAnchor,\
  \ constant: 50),\n        headerLabel.widthAnchor.constraint(equalToConstant: screenWidth),\n\
  \        headerLabel.heightAnchor.constraint(equalToConstant: 40)\n    ]\n    NSLayoutConstraint.activate(constraints0)\n\
  \    if(chattables.count > 0){\n        view.addSubview(chatTableView)\n       \
  \ let constraints4 = [\n            chatTableView.topAnchor.constraint(equalTo:\
  \ headerView.bottomAnchor, constant: 0),\n            chatTableView.leftAnchor.constraint(equalTo:\
  \ view.leftAnchor, constant: 5),\n            chatTableView.widthAnchor.constraint(equalToConstant:\
  \ screenWidth - 10),\n            chatTableView.heightAnchor.constraint(equalToConstant:\
  \ screenHeight - 50)\n        ]\n        NSLayoutConstraint.activate(constraints4)\n\
  \    }else{\n        view.addSubview(businessTableView)\n        let constraints4\
  \ = [\n            businessTableView.topAnchor.constraint(equalTo: headerView.bottomAnchor,\
  \ constant: 0),\n            businessTableView.leftAnchor.constraint(equalTo: view.leftAnchor,\
  \ constant: 5),\n            businessTableView.widthAnchor.constraint(equalToConstant:\
  \ screenWidth - 10),\n            businessTableView.heightAnchor.constraint(equalToConstant:\
  \ screenHeight - 50)\n        ]\n        NSLayoutConstraint.activate(constraints4)\n\
  \    }\n    view.addSubview(tabBar)\n    let constraints5 = [\n        tabBar.bottomAnchor.constraint(equalTo:\
  \ view.bottomAnchor, constant: 5),\n        tabBar.leftAnchor.constraint(equalTo:\
  \ view.leftAnchor, constant: 5),\n        tabBar.widthAnchor.constraint(equalToConstant:\
  \ screenWidth),\n        tabBar.heightAnchor.constraint(equalToConstant: 80)\n \
  \   ]\n    NSLayoutConstraint.activate(constraints5)\n}\n```\n\n### `Tab Bar` 方法\n\
  \n提供的代码实现了 `tabBar(_:didSelect:)` 代理方法，该方法处理标签栏项目的选中事件：\n\n- `Case 0`：触发 `popUpContact()`\
  \ 函数\n- `Case 2`：触发 `popUpChat()` 函数\n- `Default`：触发 `popUpMarket()` 函数（当前未实现）\n\
  \n**弹出函数**\n\n- `popUpContact()`：创建一个 `ContactViewController` 实例，传递相关的配置文件信息，并以模态方式呈现\n\
  - `popUpChat()`：当前为空，旨在呈现一个与聊天相关的视图\n- `popUpMarket()`：当前为空，旨在呈现一个与市场相关的视图。目前未实现\n\
  \n```swift\nfunc tabBar(_ tabBar: UITabBar, didSelect item: UITabBarItem) {\n  \
  \  switch item.tag {\n    case 0:\n        popUpContact()\n    case 2:\n       \
  \ popUpChat()\n    default:\n        popUpMarket()\n    }\n}\nfunc popUpContact(){\n\
  \    let viewController = ContactViewController()\n    viewController.profile =\
  \ profile\n    viewController.origniatorProfile = origniatorProfile\n    viewController.receipentProfile\
  \ = receipentProfile\n    viewController.modalPresentationStyle = .overCurrentContext\n\
  \    viewController.modalTransitionStyle = .crossDissolve\n    self.present(viewController,\
  \ animated: true, completion: nil)\n}\nfunc popUpChat(){\n}\nfunc popUpMarket(){\n\
  }\n```\n\n### `Get Chat Table` 方法\n\n`getChatTables()` 函数负责根据用户的配置文件信息获取与聊天表格相关的数据。该函数主要处理两种情况：\n\
  \n**没有商家名称的用户：**\n\n- 使用 `Chattable` 对象获取聊天表格。\n- 处理潜在的错误，并在失败时调用 `setup()` 和 `drawInitialScreen()`。\n\
  - 成功获取后，将聊天表格存储在 `chattables` 数组中，并调用 `getlastChatFromChatTable`，参数为 `\"Personal\"\
  `。\n\n**有商家名称的用户：**\n\n- 使用 `Businesstable` 对象获取业务表格。\n- 处理潜在的错误。\n- 如果发生错误，则回退到使用\
  \ `Chattable` 对象获取聊天表格。\n- 如果成功，则将业务表格存储在 `businesstables` 数组中，并调用 `getlastChatFromChatTable`，参数为\
  \ `\"Business\"`。\n\n```swift\nfunc getChatTables(){\n    if(profile?.businessname\
  \ == \"\"){\n        let chattable = Chattable()\n        chattable.gettableNames{\
  \ [self] (chattables, error) in\n            if let error = error {\n          \
  \      print(\"Error: \\(error)\")\n                setup()\n                drawInitialScreen()\n\
  \            }else{\n                self.chattables = chattables\n            \
  \    getlastChatFromChatTable(fromWhere: \"Personal\")\n            }\n        }\n\
  \    }else if(profile?.businessname != nil){\n        let businesstable = Businesstable()\n\
  \        businesstable.gettableNames(tablename: (profile?.businessname)!) { [self]\
  \ (businesstables, error) in\n            if let error = error {\n             \
  \   print(\"Error: \\(error)\")\n                let chattable = Chattable()\n \
  \               chattable.gettableNames{ [self] (chattables, error) in\n       \
  \             if let error = error {\n                        print(\"Error: \\\
  (error)\")\n                        setup()\n                        drawInitialScreen()\n\
  \                    }else{\n                        self.chattables = chattables\n\
  \                        getlastChatFromChatTable(fromWhere: \"Personal\")\n   \
  \                 }\n                }\n            }else{\n                self.businesstables\
  \ = businesstables\n                getlastChatFromChatTable(fromWhere: \"Business\"\
  )\n            }\n        }\n    }\n}\n```\n\n\n\n### 获取最后聊天消息方法\n\n此函数从每个聊天表（个人或企业）中检索最后一条聊天消息，并用该消息更新对应的\
  \ `Chattable` 或 `Businesstable` 对象。处理完所有聊天表后，会调用 `setup()` 和 `drawInitialScreen()`\
  \ 函数。以下是代码详情：\n\n- **创建对话对象：** 初始化一个 `Conversation` 对象以与聊天数据进行交互\n- **初始化计数器：**\
  \ 设置一个计数器变量来跟踪已处理的聊天表数量\n- **条件检查：** 根据 `fromWhere` 参数决定处理个人聊天表还是企业聊天表\n- **遍历聊天表：**\
  \ 根据 `fromWhere` 参数，遍历 `chattables` 或 `businesstables`\n  - 对于每个聊天表：\n    - 调用 `getlastChat`\
  \ 从当前聊天表检索最后一条聊天消息。\n    - 处理潜在的错误。\n    - 如果成功，则用检索到的聊天消息更新当前 `Chattable` 或 `Businesstable`\
  \ 对象的 `lastchat` 属性。\n    - 检查是否所有聊天表都已处理完毕：\n      - 如果当前计数器等于聊天表的总数，则调用 `setup()`\
  \ 和 `drawInitialScreen()`。\n      - 否则，递增计数器。\n\n```\nfunc getlastChatFromChatTable(fromWhere:\
  \ String){\nlet chat:Conversation = Conversation()\nvar counter:Int = 1\nif(fromWhere\
  \ == \"Personal\"){\nfor chattable in chattables{\nchat.getlastChat(chattablename:\
  \ chattable.chattablename) { [self] (chats, error) in\nif let error = error {\n\
  print(\"Error: \\(error)\")\n}else{\nif(chats.count > 0){\nchattable.lastchat =\
  \ chats[0].chattext\n}\nif(chattables.count == counter){\nsetup()\ndrawInitialScreen()\n\
  }else{\ncounter = counter + 1\n}\n}\n}\n}\n}else{\nfor chattable in businesstables{\n\
  chat.getlastChat(chattablename: chattable.chattablename) { [self] (chats, error)\
  \ in\nif let error = error {\nprint(\"Error: \\(error)\")\n}else{\nif(chats.count\
  \ > 0){\nchattable.lastchat = chats[0].chattext\n}\nif(businesstables.count == counter){\n\
  setup()\ndrawInitialScreen()\n}else{\ncounter = counter + 1\n}\n}\n}\n}\n}\n}\n\
  ```\n\n### 表视图方法\n\n下面的代码实现了 `UITableViewDataSource` 和 `UITableViewDelegate` 方法，用于管理\
  \ `chatTableView` 和 `businessTableView`。\n\n**`tableView(_:numberOfRowsInSection:)`**\n\
  \n- 根据 `chattables` 或 `businesstables` 数组的数量确定每个表视图的行数\n\n**`tableView(_:cellForRowAt:)`**\n\
  \n- 为指定的表视图出列一个可重用的单元格\n- 使用对应数组中的数据配置单元格\n- 根据 `chattables` 或 `businesstables`\
  \ 中的数据设置 `nameButton` 和 `titleButton` 的标题\n- 根据头像数据设置 `profileImageView` 图像\n- 为\
  \ `nameButton` 和 `titleButton` 添加目标动作以触发 `showChatsActionButton`\n- 为辅助功能设置按钮的辅助功能提示\n\
  - 返回配置好的单元格\n\n**`tableView(_:heightForRowAt:)`**\n\n- 为每个表视图单元格设置固定高度为 100 点\n\n\
  ```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int {\nif(tableView == chatTableView){\nreturn chattables.count\n}else{\nreturn\
  \ businesstables.count\n}\n}\nfunc tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\nif(tableView == chatTableView){\n\
  let cell = tableView.dequeueReusableCell(withIdentifier: \"chat\", for: indexPath)\
  \ as! ChatTableViewCell\ncell.nameButton.setTitle(chattables[indexPath.row].receipentname,\
  \ for: .normal)\ncell.titleButton.setTitle(chattables[indexPath.row].lastchat, for:\
  \ .normal)\ncell.selectionStyle = .none\nlet file = self.chattables[indexPath.row].receipentprofile.fileURL\n\
  if let data = NSData(contentsOf: file!) {\ncell.profileImageView.image = UIImage(data:\
  \ data as Data)\n}\ncell.profileImageView.layer.cornerRadius =  30\ncell.nameButton.addTarget(self,\
  \ action: #selector(showChatsActionButton), for: .touchUpInside)\ncell.titleButton.addTarget(self,\
  \ action: #selector(showChatsActionButton), for: .touchUpInside)\ncell.nameButton.tag\
  \ = indexPath.row\ncell.titleButton.tag = indexPath.row\ncell.nameButton.accessibilityHint\
  \ = \"Self\"\ncell.titleButton.accessibilityHint = \"Self\"\nreturn cell\n}else{\n\
  let cell = tableView.dequeueReusableCell(withIdentifier: \"business\", for: indexPath)\
  \ as! ChatTableViewCell\ncell.nameButton.setTitle(businesstables[indexPath.row].originatorname,\
  \ for: .normal)\ncell.titleButton.setTitle(businesstables[indexPath.row].lastchat,\
  \ for: .normal)\ncell.selectionStyle = .none\nlet file = self.businesstables[indexPath.row].originatorprofile.fileURL\n\
  if let data = NSData(contentsOf: file!) {\ncell.profileImageView.image = UIImage(data:\
  \ data as Data)\n}\ncell.profileImageView.layer.cornerRadius =  30\ncell.nameButton.addTarget(self,\
  \ action: #selector(showChatsActionButton), for: .touchUpInside)\ncell.titleButton.addTarget(self,\
  \ action: #selector(showChatsActionButton), for: .touchUpInside)\ncell.nameButton.tag\
  \ = indexPath.row\ncell.titleButton.tag = indexPath.row\ncell.nameButton.accessibilityHint\
  \ = \"Business\"\ncell.titleButton.accessibilityHint = \"Business\"\nreturn cell\n\
  }\n}\n/*\n单元格行高默认设置为 40 像素\n*/\nfunc tableView(_ tableView: UITableView, heightForRowAt\
  \ indexPath: IndexPath) -> CGFloat {\nreturn 100\n}\n```\n\n### 显示聊天按钮操作方法\n\n此函数处理表格视图单元格内的\
  \ `nameButton` 或 `titleButton` 被点击时的操作。它会根据被点击的按钮及其关联数据，展示一个包含相关数据的 `ChatDetailViewController`。代码详情如下：\n\
  \n- **移除约束：** 调用名为 `removeConstraints()` 的函数，负责移除与当前视图相关的约束\n- **创建 `ChatDetailViewController`：**\
  \ 实例化一个 `ChatDetailViewController` 实例\n- **设置呈现样式：** 设置视图控制器的呈现和过渡样式\n- **传递头像信息：**\
  \ 将 `profile`、`origniatorProfile` 和 `receipentProfile` 对象传递给新的视图控制器\n- **设置 `whichTab`\
  \ 属性：** 将 `whichTab` 属性设置为 1，指示 `ChatDetailViewController` 中的特定标签或视图\n- **确定聊天类型：**\
  \ 检查发送按钮的 `accessibilityHint`，以确定是“Self”聊天还是“Business”聊天\n  - **对于“Self”聊天：** 根据\
  \ `chattables` 数组和按钮的标记，设置视图控制器的 `businessname`、`originatorname` 和 `recipientProfileImage`\
  \ 属性\n  - **对于“Business”聊天：** 根据 `businesstables` 数组和按钮的标记，设置视图控制器的 `businessname`、`originatorname`\
  \ 和 `recipientProfileImage` 属性。此外，还要设置 `recipientProfileImageBanner` 属性\n- **呈现\
  \ `ChatDetailViewController`：** 在当前视图控制器之上以模态方式呈现 `ChatDetailViewController`。\n\n\
  ```\n@objc func showChatsActionButton(sender: UIButton){\nremoveConstraints()\n\
  let viewController = ChatDetailViewController()\nviewController.modalPresentationStyle\
  \ = .overCurrentContext\nviewController.modalTransitionStyle = .crossDissolve\n\
  viewController.profile = profile\nviewController.origniatorProfile = origniatorProfile\n\
  viewController.receipentProfile = receipentProfile\nviewController.whichTab = 1\n\
  if(sender.accessibilityHint == \"Self\"){\nviewController.businessname = chattables[sender.tag].receipentname\n\
  viewController.originatorname = (profile?.name)!\nviewController.recipientProfileImage\
  \ = chattables[sender.tag].receipentprofile\n}else{\nviewController.businessname\
