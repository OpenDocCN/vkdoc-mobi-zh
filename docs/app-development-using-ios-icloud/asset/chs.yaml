  \n\n\n#### 文本字段事件方法\n\n本节将定义如下三个事件，方法的详细说明如下：\n\n**开始编辑**\n\n当用户开始编辑`businessTypeTextField`时触发此函数。它会准备好用户界面，以便用户从表格视图中选择业务类型。方法的详细说明如下：\n\
  \n-   `@objc`：使该函数可被 Objective-C 调用。\n-   `businessTypeEditingDidBegin(sender: UITextField)`：定义一个带有\
  \ `UITextField` 参数的函数（虽然在本实现中未使用该参数）。\n-   `tempBusiness = business`：将 `business`\
  \ 数组复制到 `tempBusiness` 数组中。这是为了在筛选前存储原始的业务数据。\n-   `businessTypeTableView.isHidden\
  \ = false`：使 `businessTypeTableView` 可见。\n-   `saveButton.isHidden = true`：在用户选择业务类型时隐藏保存按钮。\n\
  \n```\n@objc func businessTypeEditingDidBegin(sender: UITextField){\ntempBusiness\
  \ = business\nbusinessTypeTableView.isHidden = false\nsaveButton.isHidden = true\n\
  }\n```\n\n**结束编辑方法**\n\n当用户完成对`businessTypeTextField`的编辑时触发此函数。它会恢复原始的业务数据，并隐藏表格视图和保存按钮。方法的详细说明如下：\n\
  \n-   `@objc`：使该函数可被 Objective-C 调用。\n-   `businessTypeEditingDidEnd(sender: UITextField)`：定义一个带有\
  \ `UITextField` 参数的函数（虽然在本实现中未使用该参数）。\n-   `business = tempBusiness`：从 `tempBusiness`\
  \ 数组中恢复原始的业务数组。\n-   `businessTypeTableView.isHidden = true`：隐藏 `businessTypeTableView`。\n\
  -   `saveButton.isHidden = false`：再次显示保存按钮。\n\n```\n@objc func businessTypeEditingDidEnd(sender:\
  \ UITextField){\nbusiness = tempBusiness\nbusinessTypeTableView.isHidden = true\n\
  saveButton.isHidden = false\n}\n```\n\n**编辑变动方法**\n\n此函数根据在`businessTypeTextField`中输入的文字筛选\
  \ `business` 数组，并重新加载表格视图。方法的详细说明如下：\n\n-   `@objc`：使该函数可被 Objective-C 调用。\n-  \
  \ `businessTypeEditingChanged(sender: UITextField)`：定义一个带有 `UITextField` 参数的函数。\n\
  -   `business = business.filter { ... }`：使用闭包筛选 `business` 数组。\n    -   该闭包会遍历每一个\
  \ `business` 元素。\n    -   它检查该元素中 `businesstype` 属性在去除空格并转换为小写后，是否包含发送者（文本字段）中文本的小写版本。\n\
  \    -   如果条件为真，则该 `business` 会被包含在筛选后的数组中。\n-   `if (sender.text == \"\")`：检查文本字段是否为空。\n\
  \    -   如果为空，则从 `tempBusiness` 恢复原始的 `business` 数组。\n-   `businessTypeTableView.reloadData()`：重新加载表格视图以显示筛选后的数据。\n\
  \n```\n@objc func businessTypeEditingChanged(sender: UITextField){\nbusiness = business.filter{\n\
  business in return business.businesstype.trimmingCharacters(in: .whitespaces).lowercased().contains(sender.text!.lowercased())\n\
  }\nif(sender.text == \"\"){\nbusiness = tempBusiness\n}\nbusinessTypeTableView.reloadData()\n\
  }\n```\n\n### 保存用户信息方法\n\n此函数似乎用于处理将用户个人资料信息（包括图像）保存到`CloudKit`。以下是对代码的详细分解：\n\n\
  **图像保存**\n\n-   `let personalData = personalProfileImageView.image?.pngData()`：从\
  \ `personalProfileImageView` 图像中提取 PNG 数据。\n-   `let personalFilename = getDocumentsDirectory().appendingPathComponent(\"\
  copy.png\")`：在文档目录下创建一个名为 \"copy.png\" 的文件路径。\n-   `try? personalData?.write(to:\
  \ personalFilename)`：尝试将图像数据写入该文件路径。\n\n**CloudKit 资源创建**\n\n-   `let personalProfile\
  \ : CKAsset? = CKAsset(fileURL: personalFilename)`：创建一个引用已保存图像文件的 `CKAsset` 对象。\n\
  \n**用户资料对象创建**\n\n-   `let profile:Profile = Profile(userid: userid, personalprofile:\
  \ personalProfile!, name: nameTextField.text!, businessname: businessNameTextField.text!,\
  \ businesstype: businessTypeTextField.text!)`：使用用户数据和 `CKAsset` 创建一个 `Profile` 对象。\n\
  \n**保存到 CloudKit（异步）**\n\n-   `profile.group.enter()`：启动一个 `CloudKit` 操作组。\n-  \
  \ `profile.saveProfile(profile: profile)`：调用一个方法（定义为模态类）将 profile 对象保存到 `CloudKit`。\n\
  -   `profile.group.notify(queue: .main) { ... }`：设置一个完成块，当操作组完成时在主队列上调用该块。\n-  \
  \ `self.profile = profile.profile`：用保存后的用户资料数据（包括 CloudKit 记录 ID）更新本地的 profile 变量。\n\
  -   `self.popUpContact()`：在成功保存后弹出联系人视图。\n\n```\nfunc profileSave(){\nlet personalData\
  \ = personalProfileImageView.image?.pngData()\nlet personalFilename = getDocumentsDirectory().appendingPathComponent(\"\
  copy.png\")\ntry? personalData?.write(to: personalFilename)\nlet personalProfile\
  \ : CKAsset?  = CKAsset(fileURL: personalFilename)\nlet profile:Profile = Profile(userid:\
  \ userid, personalprofile: personalProfile!, name: nameTextField.text!, businessname:\
  \ businessNameTextField.text!, businesstype: businessTypeTextField.text!)\nprofile.group.enter()\n\
  profile.saveProfile(profile: profile)\nprofile.group.notify(queue: .main) {\nself.profile\
  \ = profile.profile\nself.popUpContact()\n}\n}\n```\n\n### 获取文档目录方法\n\n此函数用于获取设备上用户文档目录的路径。以下是对代码的详细分解：\n\
  \n-   `func getDocumentsDirectory() -> URL`：定义一个返回 `URL` 的函数。\n-   `let paths =\
  \ FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)`：获取代表文档目录的\
  \ URL 数组。\n-   `return paths[0]`：返回数组中的第一个 URL，即文档目录路径。\n\n```\nfunc getDocumentsDirectory()\
  \ -> URL {\nlet paths = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)\n\
  return paths[0]\n}\n```\n\n\n\n### 图像增强功能的类扩展\n\n以下代码扩展了 `CreateProfileViewController`，以处理从相机或相册中选择图像的操作。代码详情如下所示：\n\
  \n`presentPhotoOptions()`\n\n- 创建一个 `UIAlertController`，用于显示拍照或从相册中选择的选项\n- 使用弱引用\
  \ （`weak self`） 避免强引用循环\n- 呈现操作列表\n\n`presentCamera()` 和 `presentPhoto()`\n\n- 创建\
  \ `UIImagePickerController` 实例，并指定相应的来源类型（相机或相册）\n- 将委托设置为 `self`，以处理图像选择结果\n- 呈现图像选择控制器\n\
  \n`imagePickerController(_:didFinishPickingMediaWithInfo:)`\n\n- 从信息字典中获取所选图像\n\
  - 将 `personalProfileImageView` 的图像设置为所选图像\n- 关闭图像选择控制器\n\n`imagePickerControllerDidCancel(_:)`\n\
  \n- 当用户取消选择时，关闭图像选择控制器\n\n```\nextension CreateProfileViewController:UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate{\nfunc presentPhotoOptions(){\nvar message:String\
  \ = \"\"\nmessage = \"个人资料图片\"\nlet actionSheet = UIAlertController(title: message,\
  \ message: \"选择您的选项\", preferredStyle: .actionSheet)\nactionSheet.addAction(UIAlertAction(title:\
  \ \"取消\", style: .cancel, handler: nil))\nactionSheet.addAction(UIAlertAction(title:\
  \ \"拍照\", style: .default, handler: { [weak self]_ in\nself?.presentCamera()\n}))\n\
  actionSheet.addAction(UIAlertAction(title: \"选择照片\", style: .default, handler: {[weak\
  \ self]_ in\nself?.presentPhoto()\n}))\npresent(actionSheet, animated: true)\n}\n\
  func presentCamera(){\nlet ip = UIImagePickerController()\nip.sourceType = .camera\n\
  ip.delegate = self\nip.allowsEditing = true\npresent(ip, animated: true)\n}\nfunc\
  \ presentPhoto(){\nlet ip = UIImagePickerController()\nip.sourceType = .photoLibrary\n\
  ip.delegate = self\nip.allowsEditing = true\npresent(ip, animated: true)\n}\nfunc\
  \ imagePickerController(_ picker: UIImagePickerController, didFinishPickingMediaWithInfo\
  \ info: [UIImagePickerController.InfoKey : Any]) {\nlet selectedImage  = info[UIImagePickerController.InfoKey.editedImage]\n\
  self.personalProfileImageView.image = selectedImage as? UIImage\npicker.dismiss(animated:\
  \ true)\n}\nfunc imagePickerControllerDidCancel(_ picker: UIImagePickerController)\
  \ {\npicker.dismiss(animated: true)\n}\n}\n```\n\n### 运行应用\n\n运行应用时，首次会显示“创建资料”屏幕，如下所示。\n\
