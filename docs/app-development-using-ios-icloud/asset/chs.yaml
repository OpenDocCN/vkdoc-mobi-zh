- "# 7. 创建可扩展的文本视图 UI 对象\n\nUI 文本视图默认具有固定大小，只能容纳几行文本。你可以根据应用需求设置高度和宽度来扩展文本视图的尺寸。在本章中，我们将学习如何根据文本长度动态扩展和收缩文本视图。当用户输入的文本长度可变时，此功能非常实用，你可以根据用户提供的输入文本量来合理利用有限的屏幕空间。\n\
  \n\n## 定义类与类对象\n\n在本节的代码块中，我们将定义用于创建可扩展文本字段功能的类和一些必要的 UI 对象。\n\n```swift\nclass\
  \ ChatDetailViewController: UIViewController, UITextViewDelegate {\n```\n\n在上述代码中，我们定义了一个\
  \ UI 视图控制器类，它继承了以下两个委托：\n\n- `UIViewController`：为类提供所有视图控制器的生命周期方法\n- `UITextViewDelegate`：添加\
  \ UI 文本视图的内置函数，用于操作文本视图\n\n```swift\nlet shellTextView: UITextView = {\nlet textView\
  \ = UITextView()\ntextView.translatesAutoresizingMaskIntoConstraints = false\ntextView.isScrollEnabled\
  \ = false\ntextView.font = UIFont.systemFont(ofSize: 17)\ntextView.layer.borderWidth\
  \ = 1\ntextView.layer.borderColor = UIColor.gray.cgColor\ntextView.layer.cornerRadius\
  \ = 10\nreturn textView\n}()\nlet shellSaveButton:UIButton = {\nlet uiButton  =\
  \ UIButton()\nuiButton.translatesAutoresizingMaskIntoConstraints = false\nuiButton.setTitleColor(UIColor.black,\
  \ for: .normal)\nuiButton.contentHorizontalAlignment = .left\nuiButton.contentVerticalAlignment\
  \ = .top\nuiButton.titleLabel?.font = UIFont.systemFont(ofSize: 16, weight: .semibold)\n\
  uiButton.isEnabled = false\nreturn uiButton\n}()\n```\n\n上述代码定义了一个 UI 文本视图和一个 UI\
  \ 按钮。从名称可以看出，这是一个外壳文本视图和外壳按钮，我们仅将其用于显示目的。后续会用通过代码实现展开/收缩的文本视图来替换它们。之所以必须这样做，是因为在保存内容后，我们无法将可展开的文本视图恢复为原始大小。这是\
  \ Xcode 中的一个技术显示问题，希望未来的 iOS 版本能解决这个问题。\n\n```swift\nlet chatTextView: UITextView\
  \ = {\nlet textView = UITextView()\ntextView.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntextView.isScrollEnabled = false\ntextView.font = UIFont.systemFont(ofSize:\
  \ 17)\ntextView.layer.borderWidth = 1\ntextView.layer.borderColor = UIColor.gray.cgColor\n\
  textView.layer.cornerRadius = 10\nreturn textView\n}()\nlet saveButton:UIButton\
  \ = {\nlet uiButton  = UIButton()\nuiButton.translatesAutoresizingMaskIntoConstraints\
  \ = false\nuiButton.setTitleColor(UIColor.black, for: .normal)\nuiButton.contentHorizontalAlignment\
  \ = .left\nuiButton.contentVerticalAlignment = .top\nuiButton.titleLabel?.font =\
  \ UIFont.systemFont(ofSize: 16, weight: .semibold)\nuiButton.isEnabled = false\n\
  return uiButton\n}()\n```\n\n上述代码定义了一个 UI 文本视图和一个 UI 按钮，我们将使用代码来展开或收缩它们。请注意，我们为文本视图定义了一些基本属性，例如字体大小、边框宽度、圆角半径（用于使文本视图的边角呈弧形）以及边框颜色。同样，对于按钮，我们设置了按钮标题颜色、按钮内文本的水平和垂直位置以及其字体。\n\
  \n虽然我们定义了一个按钮，但在本章的代码演示中并不会使用它，因为这与本章演示的功能无关。\n\n## 生命周期方法\n\n下面的代码块包含了 `viewDidLoad`\
  \ 生命周期方法和屏幕绘制的自定义方法。\n\n```swift\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  drawScreen ()\n}\n```\n\n当视图控制器首次加载时，`viewDidLoad()` 方法会被调用。在这个系统定义的方法中，我们调用了一个自定义方法\
  \ `drawScreen()`，该方法将在下一个代码块中描述。\n\n```swift\nfunc drawScreen(){\nlet screensize:\
  \ CGRect = UIScreen.main.bounds\nlet screenWidth = screensize.width\nlet screenHeight\
  \ = screensize.height\nshellTextView.delegate = self\nview.addSubview(shellTextView)\n\
  NSLayoutConstraint.activate([\nshellTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor,\
  \ constant: -40),\nshellTextView.leftAnchor.constraint(equalTo: view.leftAnchor,\
  \ constant: 5),\nshellTextView.widthAnchor.constraint(equalToConstant: screenWidth\
  \ - 40),\nshellTextView.heightAnchor.constraint(equalToConstant: 40)\n])\nview.addSubview(shellSaveButton)\n\
  let constraints3 = [\nshellSaveButton.topAnchor.constraint(equalTo: view.bottomAnchor,\
  \ constant: -70),\nshellSaveButton.leftAnchor.constraint(equalTo: shellTextView.rightAnchor,\
  \ constant: 5),\nshellSaveButton.rightAnchor.constraint(equalToSystemSpacingAfter:\
  \ shellTextView.rightAnchor, multiplier: 40),\nshellSaveButton.heightAnchor.constraint(equalToConstant:\
  \ 40)\n]\nNSLayoutConstraint.activate(constraints3)\nshellSaveButton.setImage(UIImage(systemName:\
  \ \"paperplane.fill\"), for: .normal)\n}\n```\n\n在上述代码中，我们在屏幕底部绘制了 `shellTextView`\
  \ 文本视图，并在 `shellTextView` 旁边绘制了保存按钮。\n\n\n\n#### `TextView` 方法\n\n本节包含两种方法。第一种在用户开始编辑文本视图时被调用，第二种则根据文本长度来展开和收缩文本视图。\n\
  \n```\nfunc textViewDidBeginEditing(_ textView: UITextView) {\nlet screensize: CGRect\
  \ = UIScreen.main.bounds\nlet screenWidth = screensize.width\nshellTextView.removeConstraints(shellTextView.constraints)\n\
  shellTextView.removeFromSuperview()\nshellSaveButton.removeConstraints(shellSaveButton.constraints)\n\
  shellSaveButton.removeFromSuperview()\nview.addSubview(chatTextView)\nNSLayoutConstraint.activate([\n\
  chatTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -340),\n\
  chatTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),\nchatTextView.widthAnchor.constraint(equalToConstant:\
  \ screenWidth - 40),\nchatTextView.heightAnchor.constraint(equalToConstant: 40)\n\
  ])\nchatTextView.becomeFirstResponder()\n// 设置一个通知观察者来处理文本变化\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(handleTextChange), name: UITextView.textDidChangeNotification,\
  \ object: chatTextView)\nview.addSubview(saveButton)\nlet constraints3 = [\nsaveButton.topAnchor.constraint(equalTo:\
  \ view.bottomAnchor, constant: -370),\nsaveButton.leftAnchor.constraint(equalTo:\
  \ chatTextView.rightAnchor, constant: 5),\nsaveButton.rightAnchor.constraint(equalToSystemSpacingAfter:\
  \ chatTextView.rightAnchor, multiplier: 40),\nsaveButton.heightAnchor.constraint(equalToConstant:\
  \ 40)\n]\nNSLayoutConstraint.activate(constraints3)\nsaveButton.setImage(UIImage(systemName:\
  \ \"paperplane.fill\"), for: .normal)\nsaveButton.addTarget(self, action: #selector(saveChatAction),\
  \ for: .touchUpInside)\n}\n```\n\n上述方法是系统定义的方法，当用户开始在文本视图中输入时会被调用。请注意，只有当类扩展了 `UITextViewDelegate`\
  \ 协议时才会被调用，这一点之前已解释过。以下是该函数的关键要点：\n\n- 我们移除了 `shellTextView` 和 `shellSaveButton`。\n\
  - 接下来，我们在 `shellTextView` 和 `shellSaveButton` 所在的确切位置绘制实际的文本视图和按钮，即 `chatTextView`\
  \ 和 `saveButton`。\n- 我们还为按钮定义了触摸内部事件，该事件将调用 `saveChatAction` 方法。\n\n```\n@objc private\
  \ func handleTextChange() {\nif(chatTextView.text.trimmingCharacters(in: .whitespaces).count\
  \ == 0){\nsaveButton.isEnabled = false\n}else{\nsaveButton.isEnabled = true\n}\n\
  let size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)\nlet\
  \ estimatedSize = chatTextView.sizeThatFits(size)\nchatTextView.constraints.forEach\
  \ { (constraint) in\nif constraint.firstAttribute == .height {\nconstraint.constant\
  \ = estimatedSize.height\n}\n}\n}\n```\n\n上述代码是系统定义的方法，每当用户添加或删除一个字符时都会被调用。这段代码中发生了以下几件事，如下所述：\n\
  \n- 如果用户输入了非空格的字符，保存按钮将被启用。如果用户输入后又通过退格键删除该字符，保存按钮将再次禁用。这样做是为了确保用户不会意外地保存空白字符串。\n\
  - 接下来，我们定义了一个尺寸对象，其宽度为屏幕宽度。减去三十像素，这是保存按钮的宽度。本质上，我们将初始尺寸定义为显示的文本视图的原始大小，该大小可以无限增长。\n\
  - 然后，我们根据用户提供的文本长度来估算新文本视图的大小。这是通过系统定义的函数 `sizeThatFits` 完成的，该函数适用于任何文本视图。\n- 最后，我们通过遍历所有约束并查找高度约束来动态更改\
  \ `chatTextView` 的高度约束。一旦找到，我们将 `chatTextView` 的高度设置为 `estimatedSize` 对象的高度。\n\n\
  #### 按钮方法\n\n这是系统定义的触摸内部事件。我们已将 `saveChatAction()` 设置为用户点击按钮时的目标函数。\n\n```\n@objc\
  \ func saveChatAction(sender: UIButton){\n}\n```\n\n此函数有意留空。你可以根据应用程序的需求来实现它，例如将文本保存到持久化数据库中。\n\
