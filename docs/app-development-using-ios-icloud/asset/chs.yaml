- '# 1. 引言


  感谢您阅读并喜爱我们的《使用 iOS iCloud 进行应用开发》一书。当我们在 2023 年撰写这本书时，iOS 版本是 15。自那以后，iOS 已经发布了两个主要版本和几个次要版本。本书是对前作的更新，旨在提供所有关键变更的详细信息，这些变更对于提升您的代码质量和体验至关重要。以下是本书将要涵盖的关键领域。


  ## 增强的异步 iCloud 数据库操作


  iOS 17 引入了几个新的块方法（`recordMatchedBlock` 和 `queryResultBlock`）以提高查询效率和效果。这些块方法极大地减少了代码行数，并具有定义清晰的闭包语法。查询完成后，返回块具有基于
  case 的返回语句，预定义了成功和失败等条件的默认定义。这些块还增强了其错误处理能力。


  本书将有一个专门章节来介绍这一点。我们将用新的基于块的查询结构更新前作中的所有查询。


  ## 类扩展


  类扩展对于 iOS 17 来说并不新鲜，但未在我们书的第一版中涉及。类扩展是一种属性工具。基于面向对象的原则，扩展为现有类添加新功能。


  第 3 章将侧重于创建类级别的过程、定义属性和声明类级别的协议。我们的示例将创建图像选择器控制器委托和 UI 导航控制器委托作为类扩展，允许用户为图像对象设置图像。


  ## 模型-视图-控制器设计框架


  模型-视图-控制器 (MVC) 是一种非常适合 Cocoa 应用程序的设计模式。MVC 设计模式使代码模块化，易于阅读。


  我们将有一个专门章节介绍在 Xcode 中的 MVC 架构实现。我们将使用模型类来持久化数据，使用控制器进行导航，使用视图进行屏幕显示和呈现。


  ## 图像处理


  iCloud 提供了一个选项来存储图像等二进制对象。本书将有一个专门章节介绍图像处理。


  我们将学习如何从照片库上传图像，或从手机相机拍照，并将图片二进制内容存储在 iCloud 存储库（资产类型）中。我们还将了解允许用户访问相机和照片库所需的配置更改（`info.plist`）。在本章中，我们还将学习图像处理。




  ## 下拉列表


  用户界面设计是 iPhone 应用设计中的关键要素。由于 iPhone 外形尺寸有限，开发人员需要明智且巧妙地利用可用空间。本章将重点介绍如何使用表视图创建一个包含预填充数据的下拉列表。它将允许用户从下拉列表中选择一个值，并在某个
  UI 对象（按钮、标签或文本字段 UI 对象）上显示所选值。


  ## 创建可扩展的文本字段 UI 对象


  本章将探讨如何根据文本长度扩展文本框的高度，以向用户显示完整的文本内容。当文本溢出时，它将允许文本按单词或字符进行换行。此外，它还会让文本框出现在键盘上方。


  ### 动画视图


  在本书的第一版中，我们学习了 UI 对象动画。我们将有一章专门介绍更多的 UI 对象动画。


  '
- '# 将记录保存到多个表


  iOS 17 允许在私有数据库和公共数据库之间保存多条记录。在本节中，我们将学习使用 `CKModifyRecordsOperation` 和 `modifyRecordsResultBlock`
  来实现这一点。


  ## 推送通知


  发送推送通知是 iOS 开发的一个重要功能。它是应用与用户通信的方式。本书中有一节将介绍推送通知、订阅提醒以及在特定日期和时间显示提醒。在发送任何通知之前，应用必须请求允许推送通知的权限；本节将提供实现此目的的详细信息。


  ## 用户之间的对话


  为了解释上述功能，我们将创建一个聊天应用。该聊天应用将允许用户相互通信。我们将使用 iCloud 公共数据库来存储所有聊天对话数据。


  '
- '# 2. 块方法


  您的由 iCloud 数据库驱动的 iPhone 应用需要查询数据库，主要目的是在应用屏幕上显示结果。iCloud 数据库有一个 `CKQueryOperation`
  对象，可用于执行查询。要执行查询，您需要执行以下操作：


  *   使用所需的搜索条件创建一个 `CKQuery` 对象。您还可以在设置查询和表所在的区域时设置数据排序选项。请注意，CloudKit 将查询限制在特定记录区域内。每个
  `CKQueryOperation` 仅限于单个区域。


  *   创建一个 `CKQueryOperation` 对象，并使用之前定义的 `CKQuery` 对象进行初始化。


  *   （可选）我们还可以配置参数，例如 `resultsLimit`（这将限制触发查询时要获取的记录数）和 `desiredKeys`（您可以指定希望查询返回的查询表的字段）。


  *   最后，我们可以将 `CKQueryOperation` 对象传递给目标数据库（公共、私有或共享）以执行操作。


  当为一个查询分配了完成块处理程序时，`CKQueryOperation` 会在查询执行完毕并返回任何结果后调用该处理程序。该处理程序可用于处理错误、失败和结果。


  在 iOS 15 中，我们使用了 `recordFetchedBlock` 和 `queryCompletionBlock`。虽然 `recordFetchedBlock`
  已被弃用，但 `queryCompletionBlock` 仍然可用。然而，在本章中，我们将重点介绍名为 `recordMatchedBlock` 和 `queryResultBlock`
  的完成块处理程序。下面是一个使用 `recordFetchedBlock` 和 `queryCompletionBlock` 的 `CKQuery` 示例。


  ## 示例代码说明


  在此示例代码中，我们查询当前用户的私有云数据库，以检索 iCloud 表 `chattables` 中的所有记录。代码完成后，一个类对象 `Chattable`（代表
  iCloud 表 `chattables`）会被填充并返回给调用函数。让我们来理解这段代码。


  ### 函数定义


  ```

  func gettableNames(completion:@escaping ([Chattable], Error?) -> Void){

  ```


  函数名为 `getTableNames`，其参数之一是一个特殊的关键字 `completion@escaping`。这个关键字意味着当函数执行完成时，闭包会被调用，在我们的示例中，该闭包传递了一个类对象
  `Chattable` 的实例。稍后您将看到我们如何以及何时调用 `completion`。


  当函数是异步操作时，`@escaping` 是一个重要的标记。异步操作可能需要一段时间才能被触发。它还让 Swift 编译器知道，当异步函数完成时，我们正在以一种合乎逻辑的方式退出该函数。在下面的示例中，我们调用了
  iCloud 查询函数，这是一个异步函数，因此 `completion@escaping` 非常适合实现我们的函数目标。


  ### 返回值描述


  ```

  var chattables:[Chattable] = []

  ```


  声明一个类类型为 `Chattable` 的对象数组 `chattables`。这个变量将保存查询执行后返回的所有表名，并通过 `completion@escaping`
  返回给调用函数。


  ### 查询定义


  ```

  let pred = NSPredicate(format: "dummy == %@", "1")

  ```


  使用 `NSPredicate` 定义查询谓词，并存储在变量 `pred` 中。条件设置为返回表字段 `dummy` 值为 1 的所有记录。


  ```

  let query = CKQuery(recordType: "chattables", predicate: pred)

  ```


  上面定义了一个名为 `query` 的对象，类型为 `CKQuery`。这里为 iCloud 对象类型 `chattables` 定义了查询，并且通过之前定义的
  `pred` 变量设置了检索条件。`CKQuery` 有两个输入：记录类型和谓词。


  ```

  let operation = CKQueryOperation(query: query)

  ```


  接下来，我们定义 `CKQueryOperation` 并将查询对象分配给它。


  ```

  let operationConfiguration = CKOperation.Configuration()

  ```


  定义 `CKOperation.Configuration` 是可选的。我们定义它是为了设置超时间隔，以便查询在特定时间后无响应时可以退出。


  ```

  operationConfiguration.timeoutIntervalForRequest = 10

  ```


  此属性确定查询完成的请求超时间隔（以秒为单位）。在我们的示例中，任务将在放弃之前等待 10 秒以等待额外的数据到达。


  ```

  operation.configuration = operationConfiguration

  ```


  我们创建的操作配置对象现在被分配给我们之前定义的 `operation` 对象。


  ```

  CKContainer.default().privateCloudDatabase.add(operation)

  ```


  该操作现在被分配给用户私有数据库以供执行。




  ### 查询匹配块


  ```

  operation.recordMatchedBlock = { recordID, result in }

  ```


  iCloud 数据库调用是异步的。查询执行后，结果会异步返回。`recordMatchedBlock` 是操作返回值时执行的代码块。`recordMatchedBlock`
  包含两个参数，如下所述：


  *   `recordID`，类型为 `CKRecord.ID`

  *   `result`，这是一个枚举类型，为 `Result<CKRecord, Error>`


  该代码块会遍历所有返回的记录。


  ```

  switch result {

  ```


  现在我们需要解包 `result` 枚举，对于每条记录，它包含两个数据元素——`success` 和 `failure`。上述语句将帮助我们在两个数据元素之间进行切换。


  ```

  case .success(let record):

  let chattable = Chattable(chattablename: record["chattablename"] as? String, receipentprofile:
  record["receipentprofile"] as? CKAsset, receipentname: record["receipentname"] as?
  String, lastchat: record["lastchat"] as? String)

  chattable.record = record

  chattables.append(chattable)

  ```


  这是第一种情况——`success`，意味着有一条记录被返回。我们将返回的结果捕获到变量 `record` 中。随后，我们将提取记录的必填字段，存储到 `Chattable`
  类的作用域级别局部变量中，然后将该变量追加到函数级别的 `Chattable` 数组对象中。由于这是迭代性质的，所有记录都会被追加到我们的函数级变量 `chattables`
  中。


  ```

  case .failure(let error):

  print(error.localizedDescription)

  }

  ```


  这是另一种情况——`failure`。如果记录无法检索，我们将在控制台上打印 `error` 对象的本地化描述。


  ### 查询结果块


  ```

  operation.queryResultBlock = { result in

  ```


  当 `recordMatchedBlock` 遍历完所有记录后，下一个被调用的块是 `queryResultBlock`。它有一个参数 result，是一个枚举类型，为
  `Result<CKQueryOperation.Cursor?, Error>`。


  `CKQueryOperation.Cursor` 包含记录和错误对象（如果存在错误）。


  ```

  DispatchQueue.main.async {

  ```


  我们定义了一个类级别的 `DispatchQueue` 对象，它将等待主线程上的异步作业完成。完成后，将执行 `DispatchQueue` 的主体。


  ```

  switch result {

  ```


  我们正在展开 `result` 枚举，处理其两个参数 `failure` 和 `success`。


  ```

  case .failure(let error):

  debugPrint(error)

  print(error)

  completion(chattables, error)

  ```


  如果出现失败，则执行此代码块，我们将在屏幕上打印错误信息。请注意，我们现在调用完成处理程序，传入 `chattables` 数组对象和报告的错误，以便调用函数采取适当的操作。


  ```

  case .success(_):

  completion(chattables, nil)

  }

  ```


  这是成功块。如果成功，则调用完成处理程序，传入 `chattables` 对象，错误标记为 nil。


  ### 完整代码


  ```

  func gettableNames(completion:@escaping ([Chattable], Error?) -> Void){

  var chattables:[Chattable] = []

  let pred = NSPredicate(format: "dummy == %@", "1")

  let query = CKQuery(recordType: "chattables", predicate: pred)

  let operation = CKQueryOperation(query: query)

  let operationConfiguration = CKOperation.Configuration()

  operationConfiguration.timeoutIntervalForRequest = 10

  operation.configuration = operationConfiguration

  CKContainer.default().privateCloudDatabase.add(operation)

  operation.recordMatchedBlock = { recordID, result in

  switch result {

  case .success(let record):

  let chattable = Chattable(chattablename: record["chattablename"] as? String, receipentprofile:
  record["receipentprofile"] as? CKAsset, receipentname: record["receipentname"] as?
  String, lastchat: record["lastchat"] as? String)

  chattable.record = record

  chattables.append(chattable)

  case .failure(let error):

  print(error.localizedDescription)

  }

  }

  operation.queryResultBlock = { result in

  DispatchQueue.main.async {

  switch result {

  case .failure(let error):

  debugPrint(error)

  print(error)

  completion(chattables, error)

  case .success(_):

  completion(chattables, nil)

  }

  }

  }

  }

  ```


