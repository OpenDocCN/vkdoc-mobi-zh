- "# 12. 用户之间的对话 – 模态定义\n\n## 定义模态类\n\n为了模拟上述表，我们的聊天应用需要创建相应的模态类。通常，模态类与 iCloud 表之间存在一对一的关系，但有时也会存在一对多的关系。我们将在以下部分详细探讨这一点。每个类都将拥有各自的\
  \ CRUD 函数，以实现 iCloud 操作，例如创建记录和检索记录。\n\n### `Profile` 模态类\n\n我们编写的第一个模态类是用户个人资料。以下代码确认了\
  \ `UIKit`（用于 UI 定义的默认框架）和 `CloudKit`（iCloud 操作所需）模块，并定义了一个自定义类名 `Profile`，其类型为 `NSObject`。\n\
  \n```swift\nimport UIKit\nimport CloudKit\nclass Profile: NSObject {\n```\n\n在此类中，我们将执行许多\
  \ iCloud 异步操作。为了在线程上运行代码并等待方法操作完成，我们定义了一个调度组和一个同步队列。\n\n我们还定义了一个名为 `profile` 的类级别对象，其类型为\
  \ `Profile`（注意区分大小写的定义）。\n\n```swift\nlet group = DispatchGroup()\nlet syncQueue\
  \ = DispatchQueue(label: \"com.domain.app.sections\")\nvar profile:Profile?\n```\n\
  \n下面定义的变量模拟了 iCloud 中的 `profile` 表。除了自定义变量外，我们还定义了一个名为 `record` 的变量，其类型为 `CKRecord`；实例化后，它将拥有对记录\
  \ ID 的引用。\n\n为自定义变量定义了一个 `init` 方法，用于初始化任何类对象，这将是实例化类变量所需的参数。`init` 方法将接收用户提供的参数，并将其赋值给\
  \ `Profile` 类的对象。\n\n```swift\nvar record:CKRecord!\nvar userid:String!\nvar personalprofile:CKAsset!\n\
  var name: String!\nvar businessname:String!\nvar businesstype:String!\ninit(userid:String,\
  \ personalprofile:CKAsset, name:String, businessname:String, businesstype:String)\
  \ {\nself.userid = userid\nself.personalprofile = personalprofile\nself.name = name\n\
  self.businessname = businessname\nself.businesstype = businesstype\n}\n```\n\n####\
  \ 保存个人资料方法\n\n此方法将用户个人资料保存到 iCloud 的 `profile` 表中。该方法接收一个 `profile` 对象作为输入。\n\n\
  ```swift\nfunc saveProfile(profile:Profile){\n```\n\n`profile` 表位于 iCloud 公共云数据库中。以下代码获取公共云数据库的引用，定义一个名为\
  \ `aRecord` 的记录类型（记录类型为 `profile`），并将用户提供的个人资料数据赋值给 `profile` 记录的相应字段（用户 ID、个人资料图片、用户名、业务名称、业务类型）。\n\
  \n```swift\nlet publicDatabase = CKContainer.default().publicCloudDatabase\nlet\
  \ aRecord = CKRecord(recordType: \"profile\")\naRecord[\"userid\"] = profile.userid\n\
  aRecord[\"personalprofile\"] = profile.personalprofile\naRecord[\"name\"] = profile.name\n\
  aRecord[\"businessname\"] = profile.businessname\naRecord[\"businesstype\"] = profile.businesstype\n\
  ```\n\n下面的代码现在尝试将记录持久化到 iCloud 存储库的 `profile` 表中。如果成功，它将返回保存的记录，该记录被存储到类级别变量 `profile`\
  \ 中。请注意，我们在主线程上等待，一旦收到记录作为返回值，我们就离开该线程并继续处理其他任务。如果无法保存记录，控制台将显示错误。\n\n你可能会想，为什么我们不能直接将用户提供的值赋值给\
  \ `profile` 对象，而要等待 iCloud 提供相同的值。这是因为一旦记录被保存，我们就能获得已保存记录的记录 ID，这对于执行其他 CRUD 操作（如更新、删除或查询）至关重要。\n\
  \n```swift\npublicDatabase.save(aRecord, completionHandler: { (record, error) ->\
  \ Void in\nDispatchQueue.main.async {\nif let error = error {\nprint(error)\n}\n\
  else {\nself.syncQueue.async {\nself.profile = Profile(userid: record!.object(forKey:\
  \ \"userid\")! as! String, personalprofile: record!.object(forKey: \"personalprofile\"\
