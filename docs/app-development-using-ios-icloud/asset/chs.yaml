  \ 类的两个变量。第一个变量 `profile` 将存储单个 profile 对象，第二个变量 `profiles` 将存储一个 profile 对象数组。后者非常重要，正如你将在后面看到的展示视图控制器中那样，它用于检索并显示用户拥有的所有联系人。\n\
  \n```\nfunc saveProfile(profile:Profile){\n```\n\n如果你还记得，`saveProfile` 是在“创建个人资料视图控制器”中使用\
  \ profile 对象调用的。这就是该方法的定义。你将在后续几行中看到我们如何将其保存到 iCloud 存储库。\n\n```\nlet publicDatabase\
  \ = CKContainer.default().publicCloudDatabase\nlet aRecord = CKRecord(recordType:\
