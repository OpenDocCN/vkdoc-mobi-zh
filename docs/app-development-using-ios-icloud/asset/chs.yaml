  \ \"name\")! as! String,\n                            businessname: record!.object(forKey:\
  \ \"businessname\")! as! String,\n                            businesstype: record!.object(forKey:\
  \ \"businesstype\")! as! String\n                        )\n                   \
  \     self.profile?.record = record\n                        self.group.leave()\n\
  \                    }\n                }\n            }\n        })\n    }\n}\n\
  ```\n\n## `Business` 模态类\n\n`Business` 模态类在我们的 iCloud 仓库中不代表一张表。定义该类是为了提供所有业务类型，作为\
  \ `Profile` 类中业务类型字段的输入。当前，我们将其作为类的一部分进行持久化（你将在程序的后续部分看到这一点）。在你的实现中，你可以选择将其持久化到\
  \ iCloud 表中，并将其作为输入辅助表来检索。\n\n该类包含三个字段：业务类型、业务描述，以及一个提供业务类型视觉描述的图像。`init` 方法将帮助初始化该类的对象。\n\
  \n```swift\nimport UIKit\n\nclass Business: NSObject {\n    var businesstype: String!\n\
  \    var businessdesc: String!\n    var imagename: String!\n\n    init(businesstype:\
  \ String, businessdesc: String, imagename: String) {\n        self.businesstype\
  \ = businesstype\n        self.businessdesc = businessdesc\n        self.imagename\
  \ = imagename\n    }\n}\n```\n\n## `Contact` 模态类\n\n`Contact` 模态类在我们的 iCloud 仓库中没有表表示。它提供了我们可以在\
  \ `Profile` 类对象上执行的所有 CRUD 函数。\n\n在下面的代码中，我们定义了 `Contact` 类，并除了默认的 `UIKit` 模块外，还导入了\
  \ `CloudKit` 以进行云操作。\n\n```swift\nimport UIKit\nimport CloudKit\n\nclass Contact:\
  \ NSObject {\n```\n\n由于我们将执行异步 iCloud 操作，因此定义了队列和组。下面还定义了三个类级别的变量：\n\n- `profiles`，一个\
  \ `Profile` 类型的数组\n- `profileExists`，一个布尔变量，指示 `Profile` 是否存在\n- `profile`，一个 `Profile`\
  \ 类型的对象\n\n```swift\nlet group = DispatchGroup()\nlet syncQueue = DispatchQueue(label:\
  \ \"com.domain.app.sections\")\nvar profiles: [Profile] = []\nvar profileExists\
  \ = false\nvar profile: Profile?\n```\n\n#### `getContacts` 方法\n\n此方法从 iCloud 仓库中检索所有具有相同业务类型的可用\
  \ `Profile`。该方法接受 `businessType` 作为输入，执行以下功能：\n\n```swift\nfunc getContacts(businessType:\
  \ String) {\n```\n\n该函数将所有 `Profile` 存储到之前定义的 `profiles` 数组中。我们清空该数组以避免在函数被调用两次时出现重复条目。我们通过设置条件来设置查询谓词，仅当字段\
  \ `businesstype` 等于用户提供的 `businessType` 值时，才检索数据。\n\n然后，将该查询分配给一个 `CKQueryOperation`\
  \ 类型的 `operation`，该操作将在公共云数据库（`profile` 表所在的位置）上执行。我们还设置了一些操作配置，如果请求耗时超过 10 秒，则超时。\n\
  \n```swift\nprofiles.removeAll()\nlet pred = NSPredicate(format: \"businesstype\
  \ == %@\", businessType)\nlet query = CKQuery(recordType: \"profile\", predicate:\
  \ pred)\nlet operation = CKQueryOperation(query: query)\nCKContainer.default().publicCloudDatabase.add(operation)\n\
  \nlet operationConfiguration = CKOperation.Configuration()\noperationConfiguration.timeoutIntervalForRequest\
  \ = 10\noperationConfiguration.timeoutIntervalForResource = 10\noperation.configuration\
  \ = operationConfiguration\n```\n\n`recordMatchedBlock` 在异步方法完成后被调用。它返回一个 `result`\
  \ 对象，该对象是一个枚举。我们现在需要解包 `result` 枚举，该枚举对于每条记录包含两个数据元素：`success` 和 `failure`。`case`\
  \ 语句将帮助我们在这两个数据元素之间切换。如果成功，我们将返回的对象值存储到类变量 `profile` 中，并将其追加到类级别定义的数组变量 `profiles`\
  \ 中。\n\n如果失败，我们将在控制台打印错误，并将 `profileExists` 变量设置为 `false`。\n\n```swift\noperation.recordMatchedBlock\
  \ = { recordID, result in\n    switch result {\n    case .success(let record):\n\
  \        let profile = Profile(\n            userid: record[\"userid\"] as! String,\n\
  \            personalprofile: record[\"personalprofile\"] as! CKAsset,\n       \
  \     name: record[\"name\"] as! String,\n            businessname: record[\"businessname\"\
  ] as! String,\n            businesstype: record[\"businesstype\"] as! String\n \
  \       )\n        profile.record = record\n        self.profiles.append(profile)\n\
  \    case .failure(let error):\n        print(error.localizedDescription)\n    \
  \    // 处理表不存在或存在错误的情况\n        // self.profileExists = false\n    }\n}\n```\n\n\
  在 `queryResultBlock` 中，我们再次对 `enum` 变量 `result` 进行切换。如果成功，我们返回主线程；如果失败，则将 `profileExists`\
  \ 变量设置为 `false` 并退出线程。\n\n```swift\noperation.queryResultBlock = { result in\n \
  \   DispatchQueue.main.async {\n        switch result {\n        case .failure(let\
  \ error):\n            debugPrint(error)\n            // 处理查询结果失败\n            //\
  \ self.profileExists = false\n            self.syncQueue.async {\n             \
  \   self.group.leave()\n            }\n        case .success(_):\n            //\
  \ 处理查询结果成功\n            self.syncQueue.async {\n                self.group.leave()\n\
  \            }\n        }\n    }\n}\n}\n```\n\n#### `getICloudUserID` 方法\n\niCloud\
  \ 中的每个用户都有一个唯一的云 ID。我们使用它来唯一标识我们聊天应用程序中的每个用户。下面的函数从默认容器中获取用户 ID。\n\n请注意，此方法中有一个完成处理器，带有两个输入变量：第一个接受一个字符串值（用户\
  \ ID），第二个接受一个错误（如果存在）。如果成功，我们将用户 ID 传递给完成处理器，并将错误变量设置为 `nil`，然后返回调用 `getICloudUserID`\
  \ 的方法。如果失败，我们将用户 ID 的输入提供为 `nil`，并将错误返回给调用方法。\n\n```swift\nfunc getICloudUserID(completion:\
  \ @escaping (String?, Error?) -> Void) {\n    let container = CKContainer.default()\n\
  \    container.fetchUserRecordID { (recordID, error) in\n        if let error =\
  \ error {\n            // 处理错误\n            completion(nil, error)\n        } else\
  \ if let recordID = recordID {\n            let userID = recordID.recordName\n \
  \           completion(userID, nil)\n        }\n    }\n}\n```\n\n\n\n##### 检查用户档案是否存在\n\
  \n此方法以用户 ID 作为输入，检查该用户是否存在于 `profile` iCloud 仓库中。根据 `userid` 字段等于方法提供的 `userID`\
  \ 变量输入这一条件，构建查询对象。然后，该查询对象被添加到 `CKQueryOperation` 类型的操作变量中。接着添加一些操作超时配置，最后将该操作添加到公共云数据库以执行。\n\
  \n```\nfunc checkProfileExist(userID:String) {\nlet pred = NSPredicate(format: \"\
  userid == %@\", userID)\nlet query = CKQuery(recordType: \"profile\", predicate:\
  \ pred)\nlet operation = CKQueryOperation(query: query)\nlet operationConfiguration\
  \ = CKOperation.Configuration()\noperationConfiguration.timeoutIntervalForRequest\
  \ = 10\noperationConfiguration.timeoutIntervalForResource = 10\noperation.configuration\
  \ = operationConfiguration\nCKContainer.default().publicCloudDatabase.add(operation)\n\
  ```\n\n`recordMatchedBlock` 代码块在操作异步完成后被触发。`enum` 对象被遍历以获取 `success` 或 `failure`\
  \ 结果。成功时，我们将类变量 `profileExists` 设置为 true，并将返回的记录赋值给类变量 `profile`。失败时，我们将 `profileExists`\
  \ 设置为 false。\n\n```\noperation.recordMatchedBlock = { recordID, result in\nswitch\
  \ result {\ncase .success(let record):\nself.profileExists = true\nself.profile\
  \ = Profile(userid: record[\"userid\"] as! String, personalprofile: record[\"personalprofile\"\
  ] as! CKAsset, name: record[\"name\"] as! String, businessname: record[\"businessname\"\
  ] as! String, businesstype: record[\"businesstype\"] as! String)\nself.profile!.record\
  \ = record\ncase .failure(let error):\nprint(error.localizedDescription)\n// 处理表不存在或出现错误的情况\n\
  self.profileExists = false\n}\n}\n```\n\n在 `queryResultBlock` 中，我们再次遍历 `enum` 结果对象。失败时，我们将\
  \ `profileExists` 设置为 false 并返回到主线程。成功时，我们让线程直接返回到主线程。\n\n```\noperation.queryResultBlock\
  \ = { result in\nDispatchQueue.main.async {\nswitch result {\ncase .failure(let\
  \ error):\ndebugPrint(error)\n// 处理查询结果失败\nself.profileExists = false\nself.syncQueue.async\
  \ {\nself.group.leave()\n}\ncase .success(_):\n// 处理查询结果成功\nself.syncQueue.async\
  \ {\nself.group.leave()\n}\n}\n}\n}\n}\n}\n```\n\n### 完整代码\n\n以下是 `Contact` 类的完整代码：\n\
