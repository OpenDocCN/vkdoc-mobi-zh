  \ = 10\noperationConfiguration.timeoutIntervalForResource = 10\noperation.configuration\
  \ = operationConfiguration\n```\n\n以下是这段代码块中的关键点：\n\n*   定义 `CKOperation.Configuration`\
  \ 是可选的。我们定义它是为了设置超时间隔，以便查询在特定时间后无响应时可以退出。\n*   `timeoutIntervalForRequest` 属性决定了查询完成的请求超时间隔（以秒为单位）。在我们的示例中，任务将等待\
