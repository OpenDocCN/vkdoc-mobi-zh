  \n*   构建并运行你的项目\n\n## 下拉列表\n\n下拉列表是 iOS 应用开发者在设计数据输入表单时非常实用的功能。在本章中，我们将设计一个具有以下功能的下拉列表：\n\
  \n*   定义一个文本输入框，并在其左侧添加一个图标。\n\n*   定义点击文本输入框内部的事件以触发下拉功能。\n\n*   当用户点击时，一个隐藏的表格会弹出，该表格对齐显示在文本输入框的正下方，并包含所有所需的值。\n\
  \n*   用户也可以直接在文本框中输入，输入内容将动态地缩短或扩展列表。\n\n*   当用户从列表中选择所需的值后，表格会隐藏，所选值会显示在文本输入框中。\n\
  \n在我们的示例中，我们假设有一个业务类型列表，用户可以在创建个人资料时从中选择以指明其业务类型。以下是关键元素：\n\n*   定义一个继承自 `NSObject`\
  \ 的 `Business` 类，该类将包含所有业务类型的属性和方法。\n\n*   定义一个名为 `CreateProfileViewController`\
  \ 的 UI 视图控制器来演示下拉列表功能。\n\n*   定义一个名为 `businessTypeTextField` 的文本输入框及其关联方法，用户可以在其中输入所需的业务类型，下拉列表将随之出现。\n\
  \n*   定义一个名为 `businessTypeTableView` 的表格视图及其关联方法，该表格将显示一个预填充的业务类型列表。\n\n### 定义 Business\
  \ 类\n\n`Business` 类将包含定义业务类型的所有属性，以及一个用于设置值的初始化方法。以下代码定义了该类及其初始化方法：\n\n```\nimport\
  \ UIKit\nclass Business: NSObject{\nvar businesstype:String!\nvar businessdesc:String!\n\
  var imagename:String!\ninit(businesstype:String, businessdesc:String, imagename:String)\
  \ {\nself.businesstype = businesstype\nself.businessdesc = businessdesc\nself.imagename\
  \ = imagename\n}\n}\n```\n\n该类名为 `Business`，包含三个属性：业务类型（`businesstype`）、业务描述（`businessdesc`）以及一个用于标识业务类型的图片名称（`imagename`）。\n\
  \n该类还定义了一个系统提供的 `init` 方法，用于初始化实例化对象的值。\n\n\n\n### 定义 `CreateProfileViewController`\n\
  \n该类将用于创建用户个人资料。虽然用户个人资料会包含许多属性，例如姓名、个人头像和电话号码，但在本例中，我们只专注于创建业务类型下拉列表。请跟随代码学习如何使用文本字段和表格视图创建动态下拉列表。\n\
  \n```\nclass CreateProfileViewController: UIViewController, UITableViewDelegate,\
  \ UITableViewDataSource, UITextFieldDelegate {\n```\n\n上述代码创建了一个名为 `CreateProfileViewController`\
  \ 的视图控制器类。我们扩展了以下委托：\n\n*   `UIViewController`：用于处理 UI 视图控制器的生命周期方法。\n*   `UITableViewDelegate`\
  \ 和 `UITableViewDataSource`：用于处理所有表格功能。用于展示包含所有业务类型值的表格。\n*   `UITextFieldDelegate`：用于处理所有\
  \ UI 文本字段事件函数，以便根据用户输入显示和填充业务类型。\n\n```\nlet businessTypeTextField:UITextField =\
  \ {\nlet textField = UITextField()\ntextField.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntextField.borderStyle = .roundedRect\ntextField.textColor = .black\n\
  textField.layer.borderColor  = UIColor.systemGray.cgColor\ntextField.layer.borderWidth\
  \ = 1\ntextField.layer.cornerRadius = 5\ntextField.placeholder = \"Select Business\
  \ Type\"\ntextField.textColor = .black\ntextField.isEnabled = true\ntextField.keyboardType\
  \ = .default\nreturn textField\n}()\n```\n\n上述代码定义了一个名为 `businessTypeTextField`\
  \ 的 UI 文本字段对象。该文本字段附加了某些属性，例如文本颜色设置为黑色，边框颜色设置为灰色且宽度为 1 点，以及使边角弯曲的效果（`cornerRadius`）。该文本字段还设置了初始占位符值，并使用默认的\
  \ QWERTY 键盘。\n\n```\nprivate let businessTypeTableView:UITableView = {\nlet tableView\
  \ = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints = false\n\
  tableView.backgroundColor = .white\ntableView.isScrollEnabled = true\nreturn tableView\n\
  }()\n```\n\n上述代码定义了一个名为 `businessTypeTableView` 的 `UITableView`。由于我们会拥有很多业务类型，因此启用了滚动（将\
  \ `isScrollEnabled` 设置为 true）。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  setup()\ndrawProfileCreationScreen()\n}\n```\n\n上述代码是 UI 视图控制器的生命周期方法。`viewDidLoad`\
  \ 是第一个被调用的函数。我们从该函数中调用了两个自定义函数：`setup()` 函数用于初始化一些变量并设置一些方法，以及用于绘制屏幕的 `drawProfileCreationScreen()`\
  \ 函数。\n\n```\nfunc setup(){\nview.backgroundColor = .black\nbusinessTypeTableView.delegate\
  \ = self\nbusinessTypeTableView.dataSource = self\nbusinessTypeTableView.register(UITableViewCell.self,\
  \ forCellReuseIdentifier: \"business\")\nbusinessTypeTableView.layer.borderWidth\
  \ = 0\nbusinessTypeTableView.layer.borderColor = UIColor.white.cgColor\nbusinessTypeTableView.separatorStyle\
  \ = .none\nbusinessTypeTableView.isHidden = true\nbusinessTypeTextField.delegate\
  \ = self\nbusinessTypeTextField.leftView = UIImageView(image: UIImage(systemName:\
  \ \"plus\"))\nbusinessTypeTextField.leftViewMode = .always\nbusinessTypeTextField.addTarget(self,\
  \ action: #selector(businessTypeEditingChanged), for: .editingChanged)\nbusinessTypeTextField.addTarget(self,\
  \ action: #selector(businessTypeEditingDidBegin), for: .editingDidBegin)\nbusinessTypeTextField.addTarget(self,\
  \ action: #selector(businessTypeEditingDidEnd), for: .editingDidEnd)\nsetBusiness()\n\
  }\n```\n\n上述代码是 `setup()` 方法。在该函数中，我们执行了以下操作：\n\n*   为业务类型表格视图设置委托和数据源。\n*   将表格单元格设置为名为\
  \ `\"business\"` 的默认表格视图单元格。\n*   设置表格的一些样式属性，例如边框宽度和颜色，并将表格显示状态设置为隐藏。\n*   我们还设置了业务类型输入文本字段的委托，以便能够调用文本字段函数。\n\
  *   在文本框左侧添加了一个系统图标 `\"+\"`，为用户提供视觉提示，表明点击文本字段将显示下拉列表。\n*   最后，我们添加了三个系统方法：第一个是\
  \ `businessTypeEditingChanged`，它将在用户编辑文本字段的值时被调用；第二个是 `editingDidBegin`，当用户首次开始在文本字段中输入内容时触发；第三个是\
  \ `editingDidEnd`，当焦点离开文本字段时执行。\n\n```\nvar business:[Business] = []\nvar tempBusiness:[Business]\
  \ = []\n```\n\n以上两个语句定义了 `Business` 类的数组。第一个数组将保存所有业务类型对象的详细信息，第二个数组是业务值的临时容器，用于根据用户搜索条件传递筛选后的业务类型列表。\n\
  \n```\nfunc setBusiness(){\nbusiness.append(Business(businesstype: \"Mortgage\"\
  , businessdesc: \"Provide Mortgage Solution\", imagename: \"scribble\"))\nbusiness.append(Business(businesstype:\
  \ \"Insurance\", businessdesc: \"Provide Life/Health/Car/P&C Insurance\", imagename:\
  \ \"folder\"))\nbusiness.append(Business(businesstype: \"Electrician\", businessdesc:\
  \ \"Provide Household electrical solution\", imagename: \"doc.text\"))\nbusiness.append(Business(businesstype:\
  \ \"Handyman\", businessdesc: \"Provide any household related work\", imagename:\
  \ \"book\"))\n}\n```\n\n上面的函数向之前定义的 `business` 数组对象设置了一些业务类型值。请注意，为了保持代码简洁，我们仅存储了四个业务类型对象。\n\
  \n```\nfunc drawProfileCreationScreen(){\nlet screensize: CGRect = UIScreen.main.bounds\n\
  let screenWidth = screensize.width\nview.addSubview(businessTypeTextField)\nlet\
  \ constraints5 = [\nbusinessTypeTextField.topAnchor.constraint(equalTo: view.topAnchor,\
  \ constant: 10),\nbusinessTypeTextField.leftAnchor.constraint(equalTo: view.leftAnchor,\
  \ constant: 5),\nbusinessTypeTextField.widthAnchor.constraint(equalToConstant: screenWidth\
  \ - 10),\nbusinessTypeTextField.heightAnchor.constraint(equalToConstant: 40)\n]\n\
  NSLayoutConstraint.activate(constraints5)\nview.addSubview(businessTypeTableView)\n\
  let constraints6 = [\nbusinessTypeTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,\
  \ constant: 0),\nbusinessTypeTableView.leftAnchor.constraint(equalTo: view.leftAnchor,\
  \ constant: 5),\nbusinessTypeTableView.widthAnchor.constraint(equalToConstant: screenWidth\
  \ - 10),\nbusinessTypeTableView.heightAnchor.constraint(equalToConstant: 300)\n\
  ]\nNSLayoutConstraint.activate(constraints6)\n}\n```\n\n上述方法在 `viewDidLoad()` 方法中调用\
  \ `setup()` 方法之后立即被调用。在此方法中，我们通过将文本字段放置在屏幕顶部，随后放置表格视图来绘制下拉屏幕，该表格视图在屏幕首次显示时将被隐藏。\n\
  \n\n\n### 表格视图方法\n\n接下来的四个方法涉及表格视图函数。\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\nreturn business.count\n}\n```\n\n\
  上述方法告知表格视图控制器 `business` 对象所拥有的记录数量。当用户将焦点移至输入文本字段时，这将帮助表格视图遍历所有业务类型以在表格中显示。\n\n\
  ```\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\nlet cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"business\", for: indexPath)\ncell.textLabel?.text = business[indexPath.row].businesstype\
  \ + \" \" + business[indexPath.row].businessdesc\nreturn cell\n}\n```\n\n上述代码通过遍历每个\
  \ `business` 对象来绘制表格。它使用默认的 UI 单元格表格视图，并将遍历到的 `business` 对象的业务类型和业务描述拼接在一起。\n\n\
  ```\nfunc tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)\
  \ -> CGFloat {\nreturn 40.0\n}\n```\n\n上述代码是表格视图的第三个方法，它将每行显示的行高定义为 40 像素。\n\n```\n\
  func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n\
  businessTypeTextField.text = business[indexPath.row].businesstype\nbusinessTypeTextField.resignFirstResponder()\n\
  }\n```\n\n上述代码是表格视图的最后一个代码块。当用户选择一行时，该函数会被调用。此时，我们将文本字段的值设置为用户选中的业务类型，并确保焦点从文本字段上移开。\n\
  \n#### 文本字段函数\n\n接下来的三个函数是文本字段事件函数。当在文本字段上执行特定操作时，这些方法会被触发。\n\n```\n@objc func businessTypeEditingDidBegin(sender:\
  \ UITextField){\ntempBusiness = business\nbusinessTypeTableView.isHidden = false\n\
  }\n```\n\n上述代码在用户开始输入时执行。此时，我们将整个 `business` 对象转移到一个名为 `tempBusiness` 的临时变量中。这是必要的，因为我们将对\
  \ `business` 对象进行筛选，使其仅包含与用户搜索条件匹配的对象。编辑完成后，我们会确保原始列表重新赋值给 `business` 对象，以便为下一次搜索做好准备。\n\
  \n同时，我们现在将业务类型表格视图设置为可见。\n\n```\n@objc func businessTypeEditingDidEnd(sender: UITextField){\n\
  business = tempBusiness\nbusinessTypeTableView.isHidden = true\n}\n```\n\n上述代码在编辑结束时执行。此时，我们将\
  \ `tempBusiness` 对象（包含业务类型对象的原始列表）转移回原始的 `business` 对象（以便为下一次搜索做好准备）。\n\n同时，我们现在将业务类型表格视图设置为隐藏。\n\
  \n```\n@objc func businessTypeEditingChanged(sender: UITextField){\nbusiness = business.filter{\n\
  business in return business.businesstype.trimmingCharacters(in: .whitespaces).lowercased().contains(sender.text!.lowercased())\n\
  }\nif(sender.text == \"\"){\nbusiness = tempBusiness\n}\nbusinessTypeTableView.reloadData()\n\
  }\n```\n\n上述代码在用户每次向文本字段输入内容时执行。根据用户的输入，我们对 `business` 对象进行筛选。我们移除空格并将所有字符转为小写，以实现不区分大小写的搜索。一旦搜索开始，匹配的对象就会被转移到\
  \ `business` 对象中。\n\n如果用户清空了所有文本，我们通过将 `tempBusiness` 对象的值赋给 `business` 对象，将原始列表重新赋值给\
  \ `business` 对象。\n\n最后，通过刷新业务类型表格视图，我们重新加载表格，使其仅显示 `business` 对象中存储的缩减后的列表（注意，表格是根据\
  \ `business` 对象的值绘制的）。\n\n### 下拉函数的完整代码\n\n以下是上文讨论的下拉函数的完整代码。\n\n\n\n```swift\n\
