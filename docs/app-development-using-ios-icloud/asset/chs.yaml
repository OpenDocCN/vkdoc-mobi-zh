  \    - `businessTypeTextField.text = business[indexPath.row].businesstype`：此行将 `businessTypeTextField`\
  \ 的文本设置为 `business` 数组中选中 `business` 对象的 `businesstype` 属性。\n    - `businessTypeTextField.resignFirstResponder()`：如果\
  \ `businessTypeTextField` 上当前有键盘处于活动状态，此行将关闭键盘。\n\n```swift\nfunc tableView(_ tableView:\
