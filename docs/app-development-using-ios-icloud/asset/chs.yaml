  \ `business` 数组的计数，该数组是将在表格视图中显示的数据数组。\n\n```swift\nfunc tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return business.count\n\
  }\n```\n\n#### 显示单元格方法\n\n以下代码定义了一个符合 `UITableViewDataSource` 协议的方法。其作用是为表格视图中给定的行提供一个已配置的表格视图单元格。方法详情如下：\n\
  \n- `func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell`：这是 `cellForRowAt` 委托方法的方法签名。\n    - `tableView`：请求单元格的表格视图。\n\
  \    - `indexPath`：要返回的单元格的索引路径。\n    - `-> UITableViewCell`：该方法返回一个已配置的表格视图单元格。\n\
  \    - `let cell = tableView.dequeueReusableCell(withIdentifier: \"business\", for:\
  \ indexPath)`：此行出列一个标识符为 `\"business\"` 的可重用单元格。如果没有可用的可重用单元格，则会创建一个新单元格。\n    -\
  \ `cell.textLabel?.text = business[indexPath.row].businesstype + \" \" + business[indexPath.row].businessdesc`：此行将单元格\
  \ `textLabel` 的文本设置为 `business` 数组中对应 `business` 对象的 `businesstype` 和 `businessdesc`\
  \ 属性的连接字符串。\n    - `return cell`：此行将配置好的单元格返回给表格视图。\n\n```swift\nfunc tableView(_\
  \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
  \ {\n    let cell = tableView.dequeueReusableCell(withIdentifier: \"business\",\
  \ for: indexPath)\n    cell.textLabel?.text = business[indexPath.row].businesstype\
  \ + \" \" + business[indexPath.row].businessdesc\n    return cell\n}\n```\n\n####\
  \ 行高方法\n\n以下 Swift 代码定义了一个符合 `UITableViewDelegate` 协议的方法。其作用是指定表格视图中行的高度。方法详情如下：\n\
  \n- `func tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)\
