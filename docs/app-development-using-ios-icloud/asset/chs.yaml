- "# 8. 动画视图\n\n动画是 iOS 编程的基础部分，有助于改善用户体验，让用户在应用内的不同视图之间切换。根据动画的类型，它还能通过向用户传达其操作信息，为用户提供清晰的指引。\n\
  \n在下面的示例中，我们将使用系统定义的函数 `animate` 来演示动画。我们将绘制一个带有按钮的视图控制器。当用户点击该按钮时，将打开另一个视图，该视图在屏幕上显示时会带有动画效果。\n\
  \n## 定义主视图控制器\n\n```swift\nclass firstViewController: UIViewController {\n```\n\n\
  上述代码定义了一个名为 `firstViewController` 的 `UIViewController`。\n\n## 定义 UI 对象\n\n```swift\n\
  private let animatedView: UIView = {\n    let view = UIView()\n    view.translatesAutoresizingMaskIntoConstraints\
  \ = false\n    view.backgroundColor = .systemGray6\n    view.alpha = 0.0\n    view.center\
  \ = view.center\n    return view\n}()\n```\n\n上述代码定义了一个自定义视图，该视图将被动画化以演示动画功能。我们将视图的背景设置为灰色，并将其放置在当前视图控制器的中心位置。\n\
  \n```swift\nlet viewButton:UIButton = {\n    let uiButton  = UIButton()\n    uiButton.translatesAutoresizingMaskIntoConstraints\
  \ = false\n    uiButton.setImage(UIImage(systemName: \"doc.viewfinder.fill\"), for:\
  \ .normal)\n    return uiButton\n}()\n```\n\n接下来，我们定义按钮。点击按钮后，我们将以动画方式打开自定义视图。该按钮使用系统定义的图像\
  \ `doc.viewfinder.fill` 来显示。\n\n## 定义生命周期方法\n\n```swift\noverride func viewWillAppear(_\
  \ animated: Bool) {\n    super.viewWillAppear(true)\n    setup()\n    drawAnimation()\n\
  }\n```\n\n上面定义的方法 `viewWillAppear` 是一个系统函数，被归类为 `UIViewController` 的生命周期方法。与每个应用会话仅调用一次的\
  \ `viewDidLoad` 不同，`viewWillAppear` 在每次视图控制器被调用时都会执行。\n\n我们在此方法中调用了两个自定义方法。第一个方法是\
  \ `setup()`，用于在视图控制器显示之前初始化一些元素；第二个是 `drawAnimation()` 函数，用于在屏幕上绘制按钮。\n\n```swift\n\
  setup(){\n    viewButton.addTarget(self, action: #selector(animateView), for: .touchUpInside)\n\
  }\n```\n\n在上述方法中，我们为按钮 `viewButton` 添加了一个名为 `animateView` 的自定义目标函数，该函数将在用户点击按钮（即\
  \ `touchUpInside` 事件）时被调用。\n\n```swift\nfunc drawAnimation(){\n    let screensize:\
  \ CGRect = UIScreen.main.bounds\n    let screenWidth = screensize.width\n    let\
  \ screenHeight = screensize.height\n    view.addSubview(viewButton)\n    let constraints\
  \ = [\n        viewButton.topAnchor.constraint(equalTo: view.topAnchor, constant:\
  \ 25),\n        viewButton.leftAnchor.constraint(equalTo: profileImageView.rightAnchor,\
  \ constant: 5),\n        viewButton.widthAnchor.constraint(equalToConstant: 80),\n\
  \        viewButton.heightAnchor.constraint(equalToConstant: 80)\n    ]\n    NSLayoutConstraint.activate(constraints)\n\
  }\n```\n\n上述代码在屏幕上绘制了按钮。按钮的目标操作已定义完毕。用户按下按钮时，动画视图将按照预设的动画效果打开。\n\n\n\n### 动画视图\n\
  \n```\n@objc func animateView(sender: UIButton) {\n    let screensize: CGRect =\
  \ UIScreen.main.bounds\n    let screenWidth = screensize.width\n    let screenHeight\
  \ = screensize.height\n    view.addSubview(animatedView)\n    let constraints =\
  \ [\n        animatedView.topAnchor.constraint(equalTo: view.topAnchor, constant:\
  \ 20),\n        animatedView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:\
  \ 20),\n        animatedView.widthAnchor.constraint(equalToConstant: screenWidth\
  \ - 20),\n        animatedView.heightAnchor.constraint(equalToConstant: screenHeight\
  \ - 20)\n    ]\n    NSLayoutConstraint.activate(constraints)\n    UIView.animate(withDuration:\
  \ 1.0, delay: 0.0, options: .curveEaseOut, animations: { [self] in\n        animatedView.alpha\
  \ = 1.0\n    }, completion: nil)\n}\n```\n\n当用户点击视图按钮时，会调用上述代码。该代码将执行以下操作：\n\n-\
  \ 在`UIViewController`上添加自定义的`UIView` `animatedView`。我们将`animatedView`的大小设置为与视图控制器大致相同，并从各边预留\
  \ 20 像素的间距。\n- 紧接着，我们调用系统在`UIView`上定义的动画方法。我们应用的效果是曲线缓出，持续时间为 1 秒且无延迟，在完成块中，我们将透明度设置为\
  \ 1.0。这将使`animatedView`以缩放效果呈现。要了解更多关于`UIView`动画方法的信息，请参考下一节。\n\n#### UIView.animate\
  \ 函数详解\n\n`UIView.animate`有多个属性，可用于控制并设置你期望的特定动画行为。关键属性如下所列。\n\n##### Duration (TimeInterval)\n\
  \n一个必需参数，指定动画持续的总时间（以秒为单位）。它是一个`TimeInterval`值，即一个表示时长的双精度浮点数。\n\n##### Animations\n\
  \n`@escaping () -> Void`：这也是一个必需的闭包，包含实际的动画代码。在此闭包内部，你可以修改要动画化的视图的属性。常见的可更改属性包括`frame`（位置和大小）、`alpha`（透明度）、`center`、`transform`（用于旋转和缩放）以及`background\
  \ color`。\n\n##### Delay (TimeInterval)\n\n这个可选参数指定动画开始前的延迟时间（以秒为单位）。它是一个`TimeInterval`值，即一个表示时长的双精度浮点数。\n\
  \n##### Options\n\n`UIView.AnimationOptions`：这个可选参数允许你配置动画的各个方面。它是一组来自`UIView.AnimationOptions`枚举的标志。以下是一些常用选项：\n\
  \n- `.curveEaseInOut`：为动画定义缓入缓出的曲线（平滑开始和结束）\n- `.curveEaseIn`：定义缓入曲线（开始慢，然后加速）\n\
  - `.curveEaseOut`：定义缓出曲线（开始快，然后减速）\n- `.repeat`：使动画重复一定次数（使用`repeatCount`指定次数）\n\
  - `.autoreverse`：动画完成后反向播放（从头到尾反向运行）\n- `.beginFromCurrentState`：从视图的当前状态开始动画，而不是从故事板中的初始状态开始\n\
  \n##### Completion: ((Bool) -> Void)?\n\n这个可选闭包会在动画完成时被调用。它接收一个`Bool`参数，指示动画是否成功完成或被中断。你可以使用此闭包执行任何所需的动画后操作。\n\
  \n### 完整代码\n\n```\nclass firstViewController: UIViewController {\n    private let\
  \ animatedView: UIView = {\n        let view = UIView()\n        view.translatesAutoresizingMaskIntoConstraints\
  \ = false\n        view.backgroundColor = .systemGray6\n        view.alpha = 0.0\n\
  \        view.center = view.center\n        return view\n    }()\n    let viewButton:\
  \ UIButton = {\n        let uiButton = UIButton()\n        uiButton.translatesAutoresizingMaskIntoConstraints\
  \ = false\n        uiButton.setImage(UIImage(systemName: \"doc.viewfinder.fill\"\
  ), for: .normal)\n        return uiButton\n    }()\n    override func viewWillAppear(_\
  \ animated: Bool) {\n        super.viewWillAppear(true)\n        setup()\n     \
  \   drawAnimation()\n    }\n    setup() {\n        viewButton.addTarget(self, action:\
  \ #selector(animateView), for: .touchUpInside)\n    }\n    func drawAnimation()\
  \ {\n        let screensize: CGRect = UIScreen.main.bounds\n        let screenWidth\
  \ = screensize.width\n        let screenHeight = screensize.height\n        view.addSubview(viewButton)\n\
  \        let constraints = [\n            viewButton.topAnchor.constraint(equalTo:\
  \ view.topAnchor, constant: 25),\n            viewButton.leftAnchor.constraint(equalTo:\
  \ profileImageView.rightAnchor, constant: 5),\n            viewButton.widthAnchor.constraint(equalToConstant:\
  \ 80),\n            viewButton.heightAnchor.constraint(equalToConstant: 80)\n  \
  \      ]\n        NSLayoutConstraint.activate(constraints)\n    }\n    @objc func\
  \ animateView(sender: UIButton) {\n        let screensize: CGRect = UIScreen.main.bounds\n\
  \        let screenWidth = screensize.width\n        let screenHeight = screensize.height\n\
  \        view.addSubview(animatedView)\n        let constraints = [\n          \
  \  animatedView.topAnchor.constraint(equalTo: view.topAnchor, constant: 20),\n \
  \           animatedView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:\
  \ 20),\n            animatedView.widthAnchor.constraint(equalToConstant: screenWidth\
  \ - 20),\n            animatedView.heightAnchor.constraint(equalToConstant: screenHeight\
  \ - 20)\n        ]\n        NSLayoutConstraint.activate(constraints)\n        UIView.animate(withDuration:\
  \ 1.0, delay: 0.0, options: .curveEaseOut, animations: { [self] in\n           \
  \ animatedView.alpha = 1.0\n        }, completion: nil)\n    }\n}\n```\n\n"
- "# 将记录保存到多个表\n\n通常，根据你的应用数据持久化设计，你必须在一次事务中将多条记录保存到多个表中。由于 iCloud 回调是异步的，如果一次只保存一条记录，过程会变得非常繁琐，因为你需要等待第一条保存操作完成，才能调用下一条。\n\
  \n幸运的是，iOS 提供了一种巧妙的方式来处理这个问题，你可以使用一个块语句来保存多对多关系中的多条记录。在下面的示例中，我们将进行保存。\n\n## 示例大纲\n\
  \n我们以一个多用户聊天为例，演示如何在多个 iCloud 表中持久化记录。我们的示例假设用户将有两种个人资料。第一种是对所有人可见的工作资料，第二种是仅用户本人可见的私人资料。此外，我们还会有一个所有用户均可使用的公共聊天表。我们将把用户的工作资料和聊天记录保存到两个不同的公共数据库中，而用户的个人资料则保存到私有数据库中。\n\
  \n请注意，此示例假设聊天创建的界面和所有逻辑都已存在（在第 11 章中，我们将学习一个双向聊天创建的示例），并且本示例仅关注多个 iCloud 表的持久化。该函数假设已提供必要的输入来执行保存操作。\n\
  \n#### 类定义\n\n在下面的代码中，我们定义了一个继承自`NSObject`的聊天类。它导入了`UIKit`和`CloudKit`库，以确保所有必要的函数都可用于执行该操作。\n\
  \n```\nimport UIKit\nimport CloudKit\nclass Chat: NSObject {\n```\n\n### 保存函数定义\n\
  \n我们现在定义一个名为`saveRecordsToCloud`的函数，该函数将把三条记录保存到三个不同的表中。该函数接收工作资料、个人资料和聊天对象作为输入。该函数假设这些自定义类已预先定义。\n\
  \n由于我们要将记录保存到 iCloud 持久化数据库中，该函数还会在`container`变量中初始化 iCloud 的默认容器，并分别在`publicDatabase`和`privateDatabase`变量中初始化公共和私有数据库。\n\
  \n```\nfunc saveRecordsToCloud(business: businessprofile, personal: personalProfile,\
  \ chat: chat) {\n    let container = CKContainer.default()\n    let publicDatabase\
  \ = container.publicCloudDatabase\n    let privateDatabase = container.privateCloudDatabase\n\
  ```\n\n\n\n### 表记录初始化\n\n在本节中，我们将用传递给函数的记录值来初始化记录类型。\n\n下面的代码使用用户提供的值初始化了 `businessprofile`\
  \ 记录类型。\n\n我们首先使用 CloudKit 的 `CKRecord` 函数定义记录类型。在此示例中，`businessprofile` 是记录类型。如果该记录类型不存在，操作将首次创建它；如果已存在，则会将新记录追加到表中。\n\
  \n该记录包含三个参数：企业名称（`businessname`）、企业图片（`businessprofile`）以及企业描述（`businessdesc`）。\n\
  \n请注意，为了将图片存储到数据库中，我们需要使用图片的 `fileURL` 函数提取二进制数据，并将其传递给 `CKAsset` 类型。\n\n```\nlet\
  \ businessRecord = CKRecord(recordType: \"businessproflle\")\nbusinessRecord[\"\
  businessname\"] = business.businessname\nbusinessRecord[\"businessprofile\"] = CKAsset(fileURL:\
  \ business.businessprofile.fileURL!)\nbusinessRecord[\"businessdesc\"] = business.businessdesc\n\
  ```\n\n接下来是定义聊天表记录为 `chat` 的代码块。该记录包含三个值：发起者 ID，用于标识谁创建了聊天（`originatorid`）；实际聊天文本（`chattext`）；以及创建日期（`datecreated`），默认为系统当前日期和时间。\n\
  \n```\nlet chatRecord = CKRecord(recordType: \"\\chat\")\nchatRecord[\"originatorid\"\
  ] = chat.originatorid\nchatRecord[\"chattext\"] = chat.chattext\nchatRecord[\"datecreated\"\
  ] = Date()\n```\n\n这是第三个也是最后一个记录定义块。记录类型为 `personalprofile`。此记录将存储在私有数据库中。记录被分配了三个值：用户的个人资料图片、用户名称以及聊天文本，该文本将是聊天记录中的最新聊天内容。\n\
  \n```\nlet personalRecord = CKRecord(recordType: \"personalprofile\")\npersonalRecord[\"\
  profile\"] = CKAsset(fileURL: personal.profile.fileURL!)\npersonalRecord[\"name\"\
  ] = personal.name\npersonalChatRecord[\"lastchat\"] = chat.chattext\n```\n\n###\
  \ 保存操作\n\n在下面的代码中，我们定义了公共数据库的保存操作。变量名为 `publicSaveOperation`（注意它是一个 `let` 变量，因为我们只使用它一次），它使用了\
  \ `CKModifyRecordsOperation` 系统函数。该方法接受一个待保存记录的数组作为其参数（标签为 `recordsToSave`）的输入。\n\
  \n我们将两个公共数据库记录 `businessRecord` 和 `chatRecord` 提供给此操作。\n\n```\nlet publicSaveOperation\
  \ = CKModifyRecordsOperation(recordsToSave: [businessRecord, chatRecord])\npublicSaveOperation.savePolicy\
  \ = .changedKeys\n```\n\n接下来，我们异步等待操作完成。`modifyRecordsResultBlock` 在最新的 iOS 版本中可用，它提供了一个结果\
  \ `enum`（请参阅第 2 章）。\n\n如果操作成功，我们现在希望将用户资料保存到用户的私有数据库中。请注意，`recordsToSave` 可以接受一个数组；但在我们的案例中，我们只提供\
  \ `personalRecord` 作为唯一要保存的记录。\n\n我们再次异步等待私有数据库操作完成。这次如果成功，我们将退出函数（`self.group.leave()`）。如果失败，我们将在控制台打印一条消息。\n\
  \n`privateDatabase.add(privateSaveOperation)` 和 `publicDatabase.add(publicSaveOperation)`\
  \ 会将函数排入队列以在后台执行。\n\n```\npublicSaveOperation.modifyRecordsResultBlock = { result\
  \ in\nswitch result {\ncase .success:\nself.syncQueue.async {\nlet privateSaveOperation\
  \ = CKModifyRecordsOperation(recordsToSave: [personalRecord])\nprivateSaveOperation.savePolicy\
  \ = .changedKeys\nprivateSaveOperation.modifyRecordsResultBlock = { result in\n\
  switch result {\ncase .success:\nself.syncQueue.async {\nself.group.leave()\n}\n\
  case .failure(let error):\nprint(\"将记录保存到私有数据库时出错：\\(error.localizedDescription)\"\
  )\n// 处理错误情况\n}\n}\nprivateDatabase.add(privateSaveOperation)\n}\n// 处理任何后续操作或界面更新\n\
  case .failure(let error):\nprint(\"保存记录时出错：\\(error.localizedDescription)\")\n//\
  \ 处理错误情况\n}\n}\npublicDatabase.add(publicSaveOperation)\n}\n```\n\n### 完整代码\n\n\
  ```\nimport UIKit\nimport CloudKit\nclass Chat: NSObject {\nfunc saveRecordsToCloud(business:businessprofile,\
  \ personal:personalProfile, chat:chat){\nlet container = CKContainer.default()\n\
  let publicDatabase = container.publicCloudDatabase\nlet privateDatabase = container.privateCloudDatabase\n\
  let businessRecord = CKRecord(recordType: \"businessproflle\")\nbusinessRecord[\"\
  businessname\"] = business.businessname\nbusinessRecord[\"businessprofile\"] = CKAsset(fileURL:\
  \ business.businessprofile.fileURL!)\nbusinessRecord[\"businessdesc\"] = business.businessdesc\n\
  let chatRecord = CKRecord(recordType: \"\\chat\")\nchatRecord[\"originatorid\"]\
  \ = chat.originatorid\nchatRecord[\"chattext\"] = chat.chattext\nchatRecord[\"datecreated\"\
  ] = Date()\nlet personalRecord = CKRecord(recordType: \"personalprofile\")\npersonalRecord[\"\
  profile\"] = CKAsset(fileURL: personal.profile.fileURL!)\npersonalRecord[\"name\"\
  ] = personal.name\npersonalChatRecord[\"lastchat\"] = chat.chattext\nlet publicSaveOperation\
  \ = CKModifyRecordsOperation(recordsToSave: [businessRecord, chatRecord])\npublicSaveOperation.savePolicy\
  \ = .changedKeys\npublicSaveOperation.modifyRecordsResultBlock = { result in\nswitch\
  \ result {\ncase .success:\nself.syncQueue.async {\nlet privateSaveOperation = CKModifyRecordsOperation(recordsToSave:\
  \ [personalRecord])\nprivateSaveOperation.savePolicy = .changedKeys\nprivateSaveOperation.modifyRecordsResultBlock\
  \ = { result in\nswitch result {\ncase .success:\nself.syncQueue.async {\nself.group.leave()\n\
  }\ncase .failure(let error):\nprint(\"将记录保存到私有数据库时出错：\\(error.localizedDescription)\"\
  )\n// 处理错误情况\n}\n}\nprivateDatabase.add(privateSaveOperation)\n}\n// 处理任何后续操作或界面更新\n\
  case .failure(let error):\nprint(\"保存记录时出错：\\(error.localizedDescription)\")\n//\
  \ 处理错误情况\n}\n}\npublicDatabase.add(publicSaveOperation)\n}\n}\n```\n\n"
- "# 10. 推送通知\n\n推送通知是应用程序的重要组成部分。当应用程序状态发生变化时，您通常希望通知用户，以便用户采取适当行动。在我们的聊天应用中，当用户向另一用户发送文本时，通知将帮助对方用户响应变化或采取适当行动。\n\
  \n\n\n## 应用委托注册\n\n实现推送通知的第一步是注册通知。iCloud iOS 工具包提供了一种数据库订阅方法，通过该方法我们可以使用唯一标识符进行订阅注册。一旦该订阅被持久化并允许发送通知，它就会为应用启用推送通知功能。\n\
  \n打开您的应用委托类，并添加以下函数。该方法执行以下操作：\n\n- 获取默认容器公共数据库的引用\n\n```\nlet container = CKContainer.default()\n\
  let publicDatabase = container.publicCloudDatabase\nlet subscription = CKDatabaseSubscription(subscriptionID:\
  \ \"mySubscription\")\n```\n\n- 创建一个类型为 `CKDatabaseSubscription`、名称为 `\"mySubscription\"\
  ` 的订阅变量\n\n```\nlet subscription = CKDatabaseSubscription(subscriptionID: \"mySubscription\"\
  )\n```\n\n- 创建一个通知信息对象，并将其属性 `shouldSendContentAvailable` 设置为 `true`\n\n```\nlet\
  \ notificationInfo = CKSubscription.NotificationInfo()\nnotificationInfo.shouldSendContentAvailable\
  \ = true\n```\n\n- 将通知信息对象赋值给订阅变量\n\n```\nsubscription.notificationInfo = notificationInfo\n\
  ```\n\n- 使用订阅对象更新数据库\n\n```\nlet operation = CKModifySubscriptionsOperation(subscriptionsToSave:\
  \ [subscription], subscriptionIDsToDelete: [])\noperation.modifySubscriptionsResultBlock\
  \ = { result in\n    switch result {\n    case .success:\n        print(\"Succesfully\
  \ Subscribed\")\n    case .failure(let error):\n        print(\"Error registering\
  \ for notifications: \\(error.localizedDescription)\")\n    }\n}\npublicDatabase.add(operation)\n\
  ```\n\n```\nfunc registerForNotifications() {\n    let container = CKContainer.default()\n\
  \    let publicDatabase = container.publicCloudDatabase\n    let subscription =\
  \ CKDatabaseSubscription(subscriptionID: \"mySubscription\")\n    let notificationInfo\
  \ = CKSubscription.NotificationInfo()\n    notificationInfo.shouldSendContentAvailable\
  \ = true\n    subscription.notificationInfo = notificationInfo\n    let operation\
  \ = CKModifySubscriptionsOperation(subscriptionsToSave: [subscription], subscriptionIDsToDelete:\
  \ [])\n    operation.modifySubscriptionsResultBlock = { result in\n        switch\
  \ result {\n        case .success:\n            print(\"Succesfully Subscribed\"\
  )\n        case .failure(let error):\n            print(\"Error registering for\
  \ notifications: \\(error.localizedDescription)\")\n        }\n    }\n    publicDatabase.add(operation)\n\
  }\n```\n\n### 设置订阅\n\n接下来，我们需要为变更设置一个订阅。您可以在记录更新或创建之后，将以下方法添加到任意模态类中。在我们的示例中，我们将把它添加到聊天模型类中。该功能执行以下操作：\n\
  \n- 访问 iCloud 环境中的容器和公共数据库。\n\n```\nlet container = CKContainer.default()\nlet publicDatabase\
  \ = container.publicCloudDatabase\n```\n\n- 创建一个查询订阅。请注意，查询订阅需要记录类型名称和订阅名称（名称必须与您之前创建的保持一致），以及用于告知系统需要在创建或更新该记录类型时提供通知的选项。此外，您还可以为查询提供条件。在我们的案例中，我们将其应用于所有记录，因此\
  \ `NSPredicate` 的值为 `True`。\n\n```\nlet subscription = CKQuerySubscription(\n  \
  \  recordType: \"\\(tablename)\",\n    predicate: NSPredicate(value: true),\n  \
  \  subscriptionID: \"mySubscription\",\n    options: [.firesOnRecordCreation, .firesOnRecordUpdate]\n\
  )\n```\n\n- 创建带有自定义文本的通知信息。此文本将显示在用户的屏幕上。\n\n```\nlet notificationInfo = CKSubscription.NotificationInfo()\n\
  notificationInfo.alertBody = \"You have a New Chat\"\nsubscription.notificationInfo\
  \ = notificationInfo\n```\n\n- 最后，保存订阅。\n\n```\npublicDatabase.save(subscription)\
  \ { (subscription, error) in\n    if let error = error {\n        print(\"Error\
  \ saving subscription: \\(error.localizedDescription)\")\n        self.group.leave()\n\
  \    } else {\n        print(\"Subscription saved successfully!\")\n        self.group.leave()\n\
  \    }\n}\n```\n\n这将触发通知流程。所有订阅了该记录类型的用户都将收到通知对象中指定的警报。\n\n```\nfunc setSubscription(tablename:\
  \ String, chattext: String, originatorname: String) {\n    // 为数据库表设置一个 CKSubscription\n\
  \    let container = CKContainer.default()\n    let publicDatabase = container.publicCloudDatabase\n\
  \    let subscription = CKQuerySubscription(\n        recordType: \"\\(tablename)\"\
  ,\n        predicate: NSPredicate(value: true),\n        subscriptionID: \"mySubscription\"\
  ,\n        options: [.firesOnRecordCreation, .firesOnRecordUpdate]\n    )\n    let\
  \ notificationInfo = CKSubscription.NotificationInfo()\n    notificationInfo.alertBody\
  \ = \"你有一条新聊天\"\n    subscription.notificationInfo = notificationInfo\n    publicDatabase.save(subscription)\
  \ { (subscription, error) in\n        if let error = error {\n            print(\"\
  保存订阅时出错: \\(error.localizedDescription)\")\n            self.group.leave()\n   \
  \     } else {\n            print(\"订阅保存成功！\")\n            self.group.leave()\n\
  \        }\n    }\n}\n```\n\n"
- '# 用户元数据间的对话


  在前面的章节中，我们学习了 MVC 架构、iCloud、用于管理异步调用的新 iOS 块例程、图像处理以及许多其他概念。在本章中，我们将整合所有这些概念，创建一个用户聊天应用。该聊天程序将具有以下功能：


  - 能够创建用户联系人。我们将能够创建联系人，将其存储在 iCloud 存储库中，并在应用屏幕上显示联系人。


  - 与特定联系人发起对话。我们将能够实时与联系人中的用户进行交流。将对话持久化到数据库中，并检索过去的对话。


  - 为保持程序简单，我们将所有对话保存在公共数据库中，并使用唯一的表名概念来找出需要检索哪些用户的对话。


  - 请注意，我们不执行端到端加密或建立用于隐私保护的安全通道。我们也不专注于显示和存储图片或视频。本程序的目的是展示如何将之前学到的概念应用于创建实际应用。


  ## iCloud 数据库


  我们需要在公共数据库中创建四个表，如下所述。


  ### 个人资料记录类型


  此记录类型将存储用户发起对话所需的所有联系人。该记录类型的定义如下：


  | 字段名 | 字段类型 | 描述 |

  | --- | --- | --- |

  | `userid` | String | 用于标识用户的唯一 ID |

  | `personalprofile` | CKAsset | 联系人头像图片 |

  | `name` | String | 联系人姓名 |

  | `businessname` | String | 用户企业名称 |

  | `businesstype` | String | 企业类型 |


  在 iCloud 存储库中，个人资料记录类型将如下图所示。


  ![](img/533539_2_En_11_Figa_HTML.jpg)




  ### `Chattable` 记录类型


  `Chattable` 记录类型将存储用户对话所在表的名称。请注意，在应用用户与选定联系人之间，对话存储在一个唯一的表中。此处将表名作为引用存储，以唯一标识该对话。


  | 字段名 | 字段类型 | 描述 |

  | --- | --- | --- |

  | `chattablename` | `String` | 唯一的聊天表，用于存储用户与联系人之间的对话 |

  | `receipentprofile` | `CKAsset` | 联系人的个人资料图片。请注意，我们本可以在此处存储引用，但为简单起见，我们直接复制了联系人的图片。此图片将显示在联系人对话旁边
  |

  | `receipentname` | `String` | 将显示其聊天的联系人姓名 |

  | `lastchat` | `String` | 最后一条聊天的文本详情。将显示在联系人姓名旁边 |


  在 iCloud 存储库中，`chattable` 记录类型将如下图所示。


  ![](img/533539_2_En_11_Figb_HTML.jpg)


  ### `Conversation` 记录类型


  此记录类型将存储应用用户与联系人之间的聊天对话。该表的名称存储在上述定义的 `chattable` 中。


  | 字段名 | 字段类型 | 描述 |

  | --- | --- | --- |

  | `chattext` | `String` | 此字段将存储聊天的文本内容 |

  | `originatorid` | `CKAsset` | 创建文本的用户 ID |


  在 iCloud 存储库中，`conversation` 记录类型将如下图所示。请注意，根据用户之间的唯一对话，将存在多个 `conversation` 记录类型。表名的命名规则基于聊天发起者的用户名
  + `"_"` + 目标聊天用户的“业务类型名称”。


  ![](img/533539_2_En_11_Figc_HTML.jpg)


  ### `Business` 记录类型


  每个用户业务都将有一个表，该表以业务名称唯一命名。此表将存储所有对话表的名称，而这些对话表又存储了业务与其他用户之间的唯一对话。


  | 字段名 | 字段类型 | 描述 |

  | --- | --- | --- |

  | `chattablename` | `String` | 唯一的聊天表，用于存储用户与联系人之间的对话 |

  | `originatorprofile` | `CKAsset` | 联系人的个人资料图片。请注意，我们本可以在此处存储引用，但为简单起见，我们直接复制了联系人的图片。此图片将显示在联系人对话旁边
  |

  | `originatorname` | `String` | 对话发起者的姓名 |

  | `lastchat` | `String` | 与为其创建了 `chattablename` 的用户进行的最后一次聊天对话 |


  在 iCloud 存储库中，`business` 记录类型将如下图所示。请注意，每个用户将有一个 `business` 记录类型。表名的命名规则基于用户的唯一业务名称。


  ![](img/533539_2_En_11_Figd_HTML.jpg)


  虽然你可以选择这样做，但你无需在 iCloud 存储库中手动创建这些表。一旦你在项目中完成 iCloud 配置（我们已在本书第一部分学习过此内容），这些表将在首次保存请求时自动创建。


