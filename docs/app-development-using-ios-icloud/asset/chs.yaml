- '# Businesstable 模态类


  该模态类代表每个用户的业务表。请注意，每个用户都会有一个名称与其业务名称相同的表。它是一个供所有已发起聊天的用户使用的参考表。我们还将发起人（originator）的个人资料信息存储在该表中，尽管它是对存储在个人资料中信息的重复，但有助于快速检索发起人信息，而无需浪费昂贵的查询资源。


  在下面的代码中，我们将 `Businesstable` 类定义为 `NSObject` 的子类，它继承了 `UIKit` 和 `CloudKit` 两个模块。定义了队列和组对象，它们将有助于调用
  iCloud 异步 CRUD 函数。该类将表的以下字段模拟为变量：用户与之发起对话的聊天表名称、用户的姓名和头像图片以及最后一条聊天文本。定义了一个 `init`
  方法来初始化这些变量。同时定义了一个空的 `init` 方法，以防我们需要在不初始化变量的情况下使用类函数。


  ```

  import UIKit

  import CloudKit

  class Businesstable: NSObject {

  let group = DispatchGroup()

