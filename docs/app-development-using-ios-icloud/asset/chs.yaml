  \ `true`，否则返回 `false`。）请注意，`isValidEmail` 将作为 `String` 函数的扩展方法在整个项目中可用。计算属性类似于方法，但行为像属性，当我们在任何字符串字面量上访问它们时会自动调用。\n\
  \n```\nlet regex = try! NSRegularExpression(pattern: \"^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@a-zA-Z0-9?(?:\\\
  \\.a-zA-Z0-9?)*$\", options: .caseInsensitive)\n```\n\n这行代码定义了一个名为 `regex` 的常量，并尝试使用\
  \ `NSRegularExpression` 创建一个正则表达式对象。所定义的模式是验证的核心，用于检查电子邮件地址格式。\n\n符号 `^` 定义了字符串的开始，并允许出现一次或多次字母（区分大小写）、数字和少数特殊字符。\n\
  \n符号 `@` 将用户名与域名分隔开，并允许出现一次或多次字母（区分大小写）和数字。\n\n符号 `?` 是非捕获组，允许可选的子域名。它匹配零到 61 次出现的字母、数字和连字符，后跟一个字母或数字。这部分可以通过\
