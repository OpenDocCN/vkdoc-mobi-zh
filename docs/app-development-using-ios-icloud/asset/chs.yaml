  \ CKRecordZone.default().zoneID\n```\n\n`queryResultBlock` 会异步等待，成功时，完成处理函数返回 `true`，否则返回\
  \ `false`。\n\n```\noperation.queryResultBlock = { result in\n    DispatchQueue.main.async\
  \ {\n        switch result {\n        case .failure(let error):\n            print(error)\n\
  \            debugPrint(error)\n            // 处理查询结果失败\n            //self.syncQueue.async\
  \ {\n            completion(false, error)\n            //  self.group.leave()\n\
  \            //}\n        case .success(_):\n            // 处理查询结果成功\n         \
