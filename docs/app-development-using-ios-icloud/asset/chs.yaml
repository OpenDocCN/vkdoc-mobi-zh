  \n\n\n### 完整代码\n\n`CreateProfileViewController` 的完整代码如下所示：\n\n```swift\n//\n// \
  \ CreateProfileViewController.swift\n//  Chat\n//\n//  Created by Shantanu Baruah\
  \ on 5/22/24.\n//\nimport UIKit\nimport CloudKit\nclass CreateProfileViewController:\
  \ UIViewController, UITableViewDelegate, UITableViewDataSource, UITabBarDelegate,\
  \ UITextFieldDelegate {\nvar profile:Profile?\nvar userid:String = \"\"\nprivate\
  \ let tabBar:UITabBar = {\nlet tabbar = UITabBar()\ntabbar.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntabbar.backgroundColor = UIColor.init(red: 171/255, green: 189/255, blue:\
  \ 217/255, alpha: 1)\nlet saveSymbolConfiguration = UIImage.SymbolConfiguration(pointSize:\
  \ 16, weight: .black)\nlet contact = UIImage(systemName: \"doc.on.clipboard\", withConfiguration:\
  \ saveSymbolConfiguration)\nlet contactbutton = UITabBarItem(title: \"Contacts\"\
  , image: contact, selectedImage: contact)\ncontactbutton.tag = 1\nlet chat = UIImage(systemName:\
  \ \"doc.plaintext\", withConfiguration: saveSymbolConfiguration)\nlet chatbutton\
  \ = UITabBarItem(title: \"Chats\", image: chat, selectedImage: chat)\nchatbutton.tag\
  \ = 2\nlet profile = UIImage(systemName: \"person.fill\", withConfiguration: saveSymbolConfiguration)\n\
  let profilebutton = UITabBarItem(title: \"Profile\", image: profile, selectedImage:\
  \ profile)\nprofilebutton.tag = 0\ntabbar.setItems([profilebutton, contactbutton,\
  \ chatbutton], animated: false)\nreturn tabbar\n}()\nprivate let headerLabel:UILabel\
  \ = {\nlet label = UILabel()\nlabel.text = \"Create Profile\"\nlabel.translatesAutoresizingMaskIntoConstraints\
  \ = false\nlabel.textColor = UIColor(displayP3Red: 128/255, green: 0/255, blue:\
  \ 128/255, alpha: 1)\nlabel.textAlignment = .center\nlabel.font = UIFont.boldSystemFont(ofSize:\
  \ 35)\nreturn label\n}()\n//Personal Section UI Object\nlet personalProfileImageView:\
  \ UIImageView = {\nlet theImageView = UIImageView()\ntheImageView.image = UIImage(systemName:\
  \ \"person.fill\")\ntheImageView.contentMode = .scaleAspectFit\ntheImageView.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntheImageView.layer.masksToBounds = true\ntheImageView.layer.borderWidth\
  \ = 1\ntheImageView.layer.borderColor = UIColor.systemGray.cgColor\nreturn theImageView\n\
  }()\nlet nameTextField:UITextField = {\nlet textField = UITextField()\ntextField.translatesAutoresizingMaskIntoConstraints\
  \ = false\ntextField.borderStyle = .roundedRect\ntextField.textColor = .black\n\
  textField.layer.borderColor  = UIColor.systemGray.cgColor\ntextField.layer.borderWidth\
  \ = 1\ntextField.layer.cornerRadius = 5\ntextField.placeholder = \"Enter Name\"\n\
  textField.textColor = .black\ntextField.isEnabled = true\ntextField.keyboardType\
