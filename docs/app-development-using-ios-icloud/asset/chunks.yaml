- fmt: '### Cancel Event Method


    The cancel function handles the action when the user taps the cancel button on
    the chat detail view. It dismisses the current chat view and presents the `ContactViewController`.
    The breakdown of the code snippet is given below:


    - **Remove constraints:** Calls a function named `removeChatDetailsConstraints()`,
    responsible for removing Auto Layout constraints related to the chat view elements

    - **Create ContactViewController:** Instantiates a `ContactViewController` instance

    - **Pass profile information:** Passes the `origniatorProfile`, `receipentProfile`,
    and `profile` objects to the new view controller

    - **Set presentation styles:** Sets the presentation and transition styles for
    the `ContactViewController`.

    - **Present ContactViewController:** Modally presents the `ContactViewController`
    over the current view controller


    ```

    @objc func cancel(tapGestureRecognizer: UITapGestureRecognizer){

    removeChatDetailsConstraints()

    let viewController = ContactViewController()

    viewController.origniatorProfile = origniatorProfile

    viewController.receipentProfile = receipentProfile

    viewController.profile = profile

    viewController.modalPresentationStyle = .overCurrentContext

    viewController.modalTransitionStyle = .crossDissolve

    self.present(viewController, animated: true, completion: nil)

    }

    ```


    ### Removing Constraints Method


    The `removeChatDetailsConstraints()` function is responsible for removing all
    constraints and `subviews` related to the chat detail view from the parent view.
    The code details are given below:


    - **Removes constraints:** Iterates through the constraints of each UI element
    (`topBar`, `profileImageView`, `topLabel`, `cancelImageView`, `shellTextView`,
    `shellSaveButton`, and `chatTableView`) and removes them

    - **Removes subviews:** Removes each UI element from its `superview`


    ```

    func removeChatDetailsConstraints(){

    topBar.removeConstraints(topBar.constraints)

    topBar.removeFromSuperview()

    profileImageView.removeConstraints(profileImageView.constraints)

    profileImageView.removeFromSuperview()

    topLabel.removeConstraints(topLabel.constraints)

    topLabel.removeFromSuperview()

    cancelImageView.removeConstraints(cancelImageView.constraints)

    cancelImageView.removeFromSuperview()

    shellTextView.removeConstraints(shellTextView.constraints)

    shellTextView.removeFromSuperview()

    shellSaveButton.removeConstraints(shellSaveButton.constraints)

    shellSaveButton.removeFromSuperview()

    chatTableView.removeConstraints(chatTableView.constraints)

    chatTableView.removeFromSuperview()

    }

    ```


    ### UI Table Methods


    The provided code implements the `UITableViewDataSource` and `UITableViewDelegate`
    methods to configure and manage the chat table view. The code breakdown is given
    below:


    **`tableView(_:numberOfRowsInSection:)`**


    - Returns the number of rows in the table view, which is equal to the count of
    the chats array


    **`tableView(_:cellForRowAt:)`**


    - Dequeues a reusable cell of type `ChatDetailsTableViewCell`

    - Removes constraints and `subviews` from the cell''s `profileImageView` and `chatButton`

    - Sets the cell''s selection style to none to prevent highlighting on selection

    - Creates an attributed string for the chat text with paragraph style for indentation

    - Determines the sender of the message based on the `originatorid` property

