    - **激活约束：** 激活创建的约束，将布局应用于 UI 元素。\n- **为保存按钮添加目标：** 为保存按钮添加一个目标动作，以便在按钮被点击时触发\
    \ `saveAction` 方法。\n\n请注意，对于具有类似约束的多个 UI 元素，你可以考虑使用辅助函数来更高效地创建约束。尝试在你的代码中创建一个辅助方法。\n\
    \n```swift\nfunc drawProfileCreationScreen(){\n    let screensize: CGRect = UIScreen.main.bounds\n\
    \    let screenWidth = screensize.width\n    view.addSubview(headerLabel)\n  \
    \  let constraints = [\n        headerLabel.topAnchor.constraint(equalTo: view.topAnchor,\
    \ constant: 30),\n        headerLabel.widthAnchor.constraint(equalToConstant:\
    \ screenWidth),\n        headerLabel.heightAnchor.constraint(equalToConstant:\
    \ 40)\n    ]\n    NSLayoutConstraint.activate(constraints)\n    view.addSubview(personalProfileImageView)\n\
    \    let constraints2 = [\n        personalProfileImageView.topAnchor.constraint(equalTo:\
    \ headerLabel.bottomAnchor, constant: 5),\n        personalProfileImageView.leftAnchor.constraint(equalTo:\
    \ view.leftAnchor, constant: 140),\n        personalProfileImageView.widthAnchor.constraint(equalToConstant:\
    \ 100),\n        personalProfileImageView.heightAnchor.constraint(equalToConstant:\
    \ 100)\n    ]\n    NSLayoutConstraint.activate(constraints2)\n    NSLayoutConstraint.activate(constraints2)\n\
    \    view.addSubview(nameTextField)\n    let constraints3 = [\n        nameTextField.topAnchor.constraint(equalTo:\
    \ personalProfileImageView.bottomAnchor, constant: 10),\n        nameTextField.leftAnchor.constraint(equalTo:\
    \ view.leftAnchor, constant: 5),\n        nameTextField.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 10),\n        nameTextField.heightAnchor.constraint(equalToConstant:\
    \ 40)\n    ]\n    NSLayoutConstraint.activate(constraints3)\n    view.addSubview(businessNameTextField)\n\
    \    let constraints4 = [\n        businessNameTextField.topAnchor.constraint(equalTo:\
    \ nameTextField.bottomAnchor, constant: 10),\n        businessNameTextField.leftAnchor.constraint(equalTo:\
    \ view.leftAnchor, constant: 5),\n        businessNameTextField.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 10),\n        businessNameTextField.heightAnchor.constraint(equalToConstant:\
    \ 40)\n    ]\n    NSLayoutConstraint.activate(constraints4)\n    view.addSubview(businessTypeTextField)\n\
    \    let constraints5 = [\n        businessTypeTextField.topAnchor.constraint(equalTo:\
    \ businessNameTextField.bottomAnchor, constant: 10),\n        businessTypeTextField.leftAnchor.constraint(equalTo:\
    \ view.leftAnchor, constant: 5),\n        businessTypeTextField.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 10),\n        businessTypeTextField.heightAnchor.constraint(equalToConstant:\
    \ 40)\n    ]\n    NSLayoutConstraint.activate(constraints5)\n    view.addSubview(businessTypeTableView)\n\
    \    let constraints6 = [\n        businessTypeTableView.topAnchor.constraint(equalTo:\
    \ businessTypeTextField.bottomAnchor, constant: 0),\n        businessTypeTableView.leftAnchor.constraint(equalTo:\
    \ view.leftAnchor, constant: 5),\n        businessTypeTableView.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 10),\n        businessTypeTableView.heightAnchor.constraint(equalToConstant:\
    \ 300)\n    ]\n    NSLayoutConstraint.activate(constraints6)\n    view.addSubview(saveButton)\n\
    \    let constraints7 = [\n        saveButton.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,\
    \ constant: 40),\n        saveButton.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 100),\n        saveButton.widthAnchor.constraint(equalToConstant:\
    \ 185),\n        saveButton.heightAnchor.constraint(equalToConstant: 40)\n   \
    \ ]\n    NSLayoutConstraint.activate(constraints7)\n    saveButton.addTarget(self,\
    \ action: #selector(saveAction), for: .touchUpInside)\n    view.addSubview(tabBar)\n\
    \    let constraints8 = [\n        tabBar.bottomAnchor.constraint(equalTo: view.bottomAnchor,\
    \ constant: 5),\n        tabBar.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 5),\n        tabBar.widthAnchor.constraint(equalToConstant: screenWidth),\n\
    \        tabBar.heightAnchor.constraint(equalToConstant: 80)\n    ]\n    NSLayoutConstraint.activate(constraints8)\n\
    }\n```\n\n### 图片事件方法\n\n此方法的主要目的是处理用户点击个人资料图片视图的操作。当用户点击图片时，会调用 `presentPhotoOptions()`\
    \ 函数，允许用户选择新的个人资料照片。该方法的关键元素如下：\n\n- **`@objc`：** 此属性使函数能够被 Objective-C 代码调用。这是将该函数与\
    \ `UITapGestureRecognizer` 一起使用的必要条件。\n- **`personalImageTapped(tapGestureRecognizer:\
    \ UITapGestureRecognizer)`：** 这是函数签名。它接受一个 `UITapGestureRecognizer` 作为参数，该参数提供了关于点击手势的信息。\n\
    - **`presentPhotoOptions()`：** 此行调用一个名为 `presentPhotoOptions()` 的函数，该函数在类扩展中定义（将在本节末尾介绍）。此函数负责向用户展示选择个人资料照片的选项（拍摄新照片、从照片库中选择）。\n\
    \n```swift\n@objc func personalImageTapped(tapGestureRecognizer: UITapGestureRecognizer){\n\
    \    presentPhotoOptions()\n}\n```\n\n### 保存操作方法\n\n此方法的主要目的是处理用户点击保存按钮的操作。当用户点击保存按钮时，会调用\
    \ `profileSave()` 函数，该函数将把个人资料数据保存到 iCloud 存储。该方法的关键元素如下：\n\n- **`@objc`：** 此属性使函数能够被\
    \ Objective-C 代码调用。这是将该函数与按钮的 `addTarget` 方法一起使用的必要条件。\n- **`saveAction(sender:\
    \ UIButton)`：** 这是函数签名。它接受一个 `UIButton` 作为参数，该参数代表触发操作的按钮。但在本例中，sender 参数并未被使用。\n\
    - **`profileSave()`：** 此行调用一个名为 `profileSave()` 的函数，该函数在代码后面定义。此函数负责保存个人资料数据。\n\
    \n```swift\n@objc func saveAction(sender: UIButton){\n    profileSave()\n}\n```\n"
- fmt: "### Tab Bar Method\n\nThe purpose of the code below is to handle the selection\
    \ of different tab bar items and perform corresponding actions. In this case,\
    \ the first tab bar item (with tag 0) or any other item will trigger the `popUpContact()`\
    \ function, while selecting the third tab bar item (with tag 2) will trigger the\
    \ `popUpChat()` function.\n\n- `tabBar(_:didSelect:)`: This is the method signature\
    \ for the `UITabBarDelegate` protocol. It takes two parameters: `tabBar`, the\
    \ tab bar object that triggered the event, and `item`, the selected tab bar item.\n\
    - `switch item.tag`: This switch statement checks the `tag` property of the selected\
    \ tab bar item to determine which action to perform: `case 0`, if the tag is 0,\
    \ call the `popUpContact()` function; `case 2`, if the tag is 2, call the `popUpChat()`\
    \ function; `default`: for any other tag value, call the `popUpContact()` function.\n\
    \n```swift\nfunc tabBar(_ tabBar: UITabBar, didSelect item: UITabBarItem) {\n\
    \    switch item.tag {\n    case 0:\n        popUpContact()\n    case 2:\n   \
    \     popUpChat()\n    default:\n        popUpContact()\n    }\n}\n```\n\n###\
    \ `popUpContact()`\n\nThis function creates a new instance of `ContactViewController`\
    \ and presents it modally over the current view controller. Here’s a breakdown:\n\
    \n- `viewController = ContactViewController()`: Creates a new instance of `ContactViewController`.\n\
    - `viewController.profile = profile`: Passes the profile data to the `ContactViewController`.\n\
    - `viewController.modalPresentationStyle = .overCurrentContext`: Sets the presentation\
    \ style to overlay the current view controller.\n- `viewController.modalTransitionStyle\
    \ = .crossDissolve`: Sets the transition style to a cross-dissolve effect.\n-\
    \ `self.present(viewController, animated: true, completion: nil)`: Presents the\
    \ `ContactViewController` modally with animation.\n\n### `popUpChat()` and `popUpMarket()`\n\
    \nThese functions are currently empty, as the create profile is only called once\
    \ when the profile doesn’t exist.\n\n```swift\nfunc popUpContact(){\n    let viewController\
    \ = ContactViewController()\n    viewController.profile = profile\n    viewController.modalPresentationStyle\
    \ = .overCurrentContext\n    viewController.modalTransitionStyle = .crossDissolve\n\
    \    self.present(viewController, animated: true, completion: nil)\n}\nfunc popUpChat(){\n\
    }\nfunc popUpMarket(){\n}\n```\n\n### Table View Methods\n\nIn this section, we\
    \ will define the table method.\n\n#### Number of Rows\n\nThis Swift code defines\
    \ a method that conforms to the `UITableViewDataSource` protocol. Its role is\
    \ to tell the table view how many rows to display in each section. The details\
    \ of the code are given below:\n\n- `func tableView(_ tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int`: This is the method signature for\
    \ the `numberOfRowsInSection` delegate method.\n    - `tableView`: The table view\
    \ that is requesting the information.\n    - `section`: The index of the section\
    \ for which the number of rows is being requested.\n    - `-> Int`: The method\
    \ returns an integer representing the number of rows.\n    - `return business.count`:\
    \ This line returns the count of the `business` array, which is an array of data\
    \ that will be displayed in the table view.\n\n```swift\nfunc tableView(_ tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return business.count\n\
    }\n```\n\n#### Display Cell Method\n\nThis code defines a method that conforms\
    \ to the `UITableViewDataSource` protocol. Its role is to provide a configured\
    \ table view cell for a given row in the table view. The details of the method\
    \ are explained below:\n\n- `func tableView(_ tableView: UITableView, cellForRowAt\
    \ indexPath: IndexPath) -> UITableViewCell`: This is the method signature for\
    \ the `cellForRowAt` delegate method.\n    - `tableView`: The table view that\
    \ is requesting the cell.\n    - `indexPath`: The index path of the cell to be\
    \ returned.\n    - `-> UITableViewCell`: The method returns a configured table\
    \ view cell.\n    - `let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"business\", for: indexPath)`: This line dequeues a reusable cell with the\
    \ identifier `\"business\"`. If no reusable cell is available, a new cell is created.\n\
    \    - `cell.textLabel?.text = business[indexPath.row].businesstype + \" \" +\
    \ business[indexPath.row].businessdesc`: This line sets the text of the cell’s\
    \ `textLabel` to a concatenation of the `businesstype` and `businessdesc` properties\
    \ of the corresponding `business` object in the `business` array.\n    - `return\
    \ cell`: This line returns the configured cell to the table view.\n\n```swift\n\
    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->\
    \ UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"business\", for: indexPath)\n    cell.textLabel?.text = business[indexPath.row].businesstype\
    \ + \" \" + business[indexPath.row].businessdesc\n    return cell\n}\n```\n\n\
    #### Row Height Method\n\nThis Swift code defines a method that conforms to the\
    \ `UITableViewDelegate` protocol. Its role is to specify the height of a row in\
    \ a table view. The details of the method are explained below:\n\n- `func tableView(_\
    \ tableView: UITableView, heightForRowAt indexPath: IndexPath) -> CGFloat`: This\
    \ is the method signature for the `heightForRowAt` delegate method.\n    - `tableView`:\
    \ The table view that is requesting the row height.\n    - `indexPath`: The index\
    \ path of the row for which the height is being requested.\n    - `-> CGFloat`:\
    \ The method returns a floating-point value representing the height of the row\
    \ in points.\n    - `return 40.0`: This line returns a fixed height of 40 points\
    \ for all rows in the table view.\n\n```swift\nfunc tableView(_ tableView: UITableView,\
    \ heightForRowAt indexPath: IndexPath) -> CGFloat {\n    return 40.0\n}\n```\n\
    \n#### Row Selection Method\n\nThis code defines a method that conforms to the\
    \ `UITableViewDelegate` protocol. Its role is to handle the event when a user\
    \ taps on a table view row. The details of the method are explained below:\n\n\
    - `func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)`:\
    \ This is the method signature for the `didSelectRowAt` delegate method.\n   \
    \ - `tableView`: The table view where the selection occurred.\n    - `indexPath`:\
    \ The index path of the selected row.\n    - `businessTypeTextField.text = business[indexPath.row].businesstype`:\
    \ This line sets the text of the `businessTypeTextField` to the `businesstype`\
    \ property of the selected `business` object from the `business` array.\n    -\
    \ `businessTypeTextField.resignFirstResponder()`: This line dismisses the keyboard\
    \ if it’s currently active on the `businessTypeTextField`.\n\n```swift\nfunc tableView(_\
    \ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n    businessTypeTextField.text\
    \ = business[indexPath.row].businesstype\n    businessTypeTextField.resignFirstResponder()\n\
    }\n```\n\n### Defining and Initializing the Business Object\n\nThe `setBusiness()`\
    \ function populates a `business` array with `Business` objects. Each `Business`\
    \ object has properties for `businesstype`, `businessdesc`, and `imagename`. The\
    \ details of the method are explained below:\n\n- `var business:[Business] = []`:\
    \ Initializes an empty array of `Business` objects.\n- `var tempBusiness:[Business]\
    \ = []`: Initializes an empty temporary array of `Business` objects. This array\
    \ is currently unused in the provided code.\n- `setBusiness()`: Defines a function\
    \ to populate the `business` array.\n- `Business(businesstype: ..., businessdesc:\
    \ ..., imagename: ...)`: Creates `Business` objects with specified properties.\n\
    - `business.append(...)`: Adds the created `Business` objects to the `business`\
    \ array."
