    \  \n本 Apress 印记由注册公司 APress Media, LLC（斯普林格自然旗下公司）出版。  \n注册公司地址为：1 New York Plaza,\
    \ New York, NY 10004, U.S.A.\n\n# 引言\n\n使用最新的 iCloud 功能构建尖端的 iOS 应用程序！这是我们之前所著《使用\
    \ iOS iCloud 进行应用开发》一书的第二版，全面涵盖了 iOS 17 的变更，使您能够创建高效、用户友好的应用。\n\n掌握增强的异步 iCloud\
    \ 数据库操作，利用类扩展以简化开发，并在代码中实施稳健的 MVC 架构原则。探索高级图像处理，创建引人入胜的下拉列表，设计可扩展的文本字段以优化用户体验。同时学习高级\
    \ UI 动画，并高效管理多个数据库记录。\n\n此外，构建一个真实的聊天应用程序来巩固所学知识，发现推送通知的强大功能。通过这本新版书籍，提升您的 iOS\
    \ 开发技能，保持领先地位。\n\n本版新增内容：深入探索 iOS 17 的最新功能、更新的代码示例以及现代应用开发的最佳实践。\n\n您将学到：\n\n\
    *   **掌握 iCloud 数据库操作：** 利用 iOS 17 增强的查询方法进行高效的数据管理。\n*   **构建稳健的应用架构：** 实施 MVC\
    \ 设计模式以实现模块化和可维护的代码。\n*   **提升用户体验：** 使用下拉列表、可扩展文本字段和高级动画创建视觉吸引力强的界面。\n*   **优化图像处理：**\
    \ 使用 iCloud 高效地存储、检索和处理图像。\n*   **利用 iOS 17 新特性：** 探索类扩展及其他工具以简化开发。\n*   **编写更简洁的代码：**\
    \ 受益于改进的错误处理和定义清晰的闭包语法。\n*   **开发功能丰富的应用：** 使用 iCloud 公共数据库构建聊天功能并实现推送通知。\n\n\
    ## 本书读者对象\n\n本书面向希望使用 iCloud 掌握高级应用开发技术的 iOS 开发者。无论您是希望基于现有 iOS 知识进行构建，还是寻求创建尖端应用，本书都为您提供了将技能提升到新水平所必需的基本工具和见解。\n\
    \n# 致谢\n\n> 撰写一本关于技术的书籍是一项相当耗时的工作，因为它不仅关乎将你的想法付诸笔端，还涉及编写代码并验证其完整性。我要感谢我的妻子 Kapila\
    \ Sood 和我的女儿 Nitara Baruah，感谢她们在我投入无数小时来促成这本书问世的过程中给予的坚定不移的支持和耐心。她们对作为本书核心部分的应用程序美学以及内容大纲提出的反馈意见，是无比宝贵的。\n\
    \n> 我还要感谢我的母亲 Meenu Baruah，她在我生命的早期就发现了我的写作冲动，并一直鼓励我坚持写作。尽管我时常感到不确定，但她从未怀疑过有一天我会成为一名出版作者。她也是我们家族中第一位出版作品的作者，我确信我的写作基因遗传自她。\n\
    \n> 我还要感谢我已故的父亲 Sailender Nath Baruah，他在计算机尚未普及的年代引领我进入了软件世界。\n\n> 我对我的 Apress\
    \ 团队的感激之情无以言表，感谢他们为这本书的成型所提供的所有帮助：感谢 Miriam Haidara，我向她推介了这本书的第二版；感谢 Sowmya Thodur\
    \ 在协调工作上的帮助；还要感谢 Massimo，他审阅了我的代码并确保其按预期工作，并在重新组织章节和内容方面提供了宝贵的建议。\n> \n> — Shantanu\
    \ Baruah\n\n# 关于作者  \n# 关于技术审校\n\n# 1. 引言\n\n感谢您阅读并喜爱我们的《使用 iOS iCloud 进行应用开发》一书。当我们在\
    \ 2023 年撰写这本书时，iOS 版本是 15。自那以后，iOS 已经发布了两个主要版本和几个次要版本。本书是对前作的更新，旨在提供所有关键变更的详细信息，这些变更对于提升您的代码质量和体验至关重要。以下是本书将要涵盖的关键领域。\n\
    \n## 增强的异步 iCloud 数据库操作\n\niOS 17 引入了几个新的块方法（`recordMatchedBlock` 和 `queryResultBlock`）以提高查询效率和效果。这些块方法极大地减少了代码行数，并具有定义清晰的闭包语法。查询完成后，返回块具有基于\
    \ case 的返回语句，预定义了成功和失败等条件的默认定义。这些块还增强了其错误处理能力。\n\n本书将有一个专门章节来介绍这一点。我们将用新的基于块的查询结构更新前作中的所有查询。\n\
    \n## 类扩展\n\n类扩展对于 iOS 17 来说并不新鲜，但未在我们书的第一版中涉及。类扩展是一种属性工具。基于面向对象的原则，扩展为现有类添加新功能。\n\
    \n第 3 章将侧重于创建类级别的过程、定义属性和声明类级别的协议。我们的示例将创建图像选择器控制器委托和 UI 导航控制器委托作为类扩展，允许用户为图像对象设置图像。\n\
    \n## 模型-视图-控制器设计框架\n\n模型-视图-控制器 (MVC) 是一种非常适合 Cocoa 应用程序的设计模式。MVC 设计模式使代码模块化，易于阅读。\n\
    \n我们将有一个专门章节介绍在 Xcode 中的 MVC 架构实现。我们将使用模型类来持久化数据，使用控制器进行导航，使用视图进行屏幕显示和呈现。\n\n\
    ## 图像处理\n\niCloud 提供了一个选项来存储图像等二进制对象。本书将有一个专门章节介绍图像处理。\n\n我们将学习如何从照片库上传图像，或从手机相机拍照，并将图片二进制内容存储在\
    \ iCloud 存储库（资产类型）中。我们还将了解允许用户访问相机和照片库所需的配置更改（`info.plist`）。在本章中，我们还将学习图像处理。\n"
- fmt: '# Drop-Down List


    User interface design is a critical element of iPhone app design. As the iPhone
    form factor is limited, developers need to use the available real estate wisely
    and smartly. This chapter will focus on creating a drop-down list with prepopulated
    data using table views. It will allow users to select a value from the drop-down
    and display the selected value on some UI object (button, label, or a text field
    UI object).


    # Create an Expanding Text Field UI Object


    This chapter will explore concepts on how to expand the height of a textbox based
    on the text length to show the entire text content to the user. As the text overflows,
    it will allow text to wrap text by word or characters. Also, it will make the
    textbox appear over the keyboard.


    # Animated View


    In the first version of the book, we learned about UI object animation. We will
    have a chapter dedicated to more UI object animation.


    # Saving Records to Multiple Tables


    iOS 17 allows saving of multiple records across private and public databases.
    In this section, we will learn to use `CKModifyRecordsOperation` and `modifyRecordsResultBlock`
    to achieve the same.


    # Push Notifications


    Sending push notifications is an important feature of iOS development. It is the
    way an app can communicate with the user. We have a section in this book where
    you will learn about push notifications, subscribe to an alert, and display reminders
    on a particular date and time. Before sending any notification, the app must seek
    permission to allow push notifications; this section will provide details on achieving
    the same.


    # Conversation Between Users


    To explain the abovementioned features, we will create a chat app. The chat app
    will allow users to communicate with each other. We will use the iCloud public
    database for storing all chat conversational data.


    # 2. Block Methods


    Your iPhone app powered by iCloud database would need to query the database primarily
    to display results on your application screen. The iCloud database has a `CKQueryOperation`
    object, which can be used to execute queries. To execute a query, you would need
    the following:


