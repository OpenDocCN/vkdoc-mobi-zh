- fmt: "# App Delegate Registration\n\nThe first step to implement push notifications\
    \ is to register for notifications. The iCloud iOS toolkit offers a database subscription\
    \ method, using which we can register for a subscription with a unique identifier.\
    \ Once persisted and permitted to provide notification, it will enable the push\
    \ notifications for the application.\n\nOpen your App Delegate class and add the\
    \ following function to the class. The method does the following:\n\n- Takes reference\
    \ of the default container public database\n\n```\nlet container = CKContainer.default()\n\
    let publicDatabase = container.publicCloudDatabase\nlet subscription = CKDatabaseSubscription(subscriptionID:\
    \ \"mySubscription\")\n```\n\n- Creates a subscription variable of type `CKDatabaseSubscription`\
    \ with a name `\"mySubscription\"`\n\n```\nlet subscription = CKDatabaseSubscription(subscriptionID:\
    \ \"mySubscription\")\n```\n\n- Create a notification info object and setting\
    \ the property `shouldSendContentAvailable` to true\n\n```\nlet notificationInfo\
    \ = CKSubscription.NotificationInfo()\nnotificationInfo.shouldSendContentAvailable\
    \ = true\n```\n\n- Assigning the notification info object to the subscription\
    \ variable\n\n```\nsubscription.notificationInfo = notificationInfo\n```\n\n-\
    \ Updating the database with the subscription object\n\n```\nlet operation = CKModifySubscriptionsOperation(subscriptionsToSave:\
    \ [subscription], subscriptionIDsToDelete: [])\noperation.modifySubscriptionsResultBlock\
    \ = { result in\n    switch result {\n    case .success:\n        print(\"Succesfully\
    \ Subscribed\")\n    case .failure(let error):\n        print(\"Error registering\
    \ for notifications: \\(error.localizedDescription)\")\n    }\n}\npublicDatabase.add(operation)\n\
    ```\n\n```\nfunc registerForNotifications() {\n    let container = CKContainer.default()\n\
    \    let publicDatabase = container.publicCloudDatabase\n    let subscription\
    \ = CKDatabaseSubscription(subscriptionID: \"mySubscription\")\n    let notificationInfo\
    \ = CKSubscription.NotificationInfo()\n    notificationInfo.shouldSendContentAvailable\
    \ = true\n    subscription.notificationInfo = notificationInfo\n    let operation\
    \ = CKModifySubscriptionsOperation(subscriptionsToSave: [subscription], subscriptionIDsToDelete:\
    \ [])\n    operation.modifySubscriptionsResultBlock = { result in\n        switch\
    \ result {\n        case .success:\n            print(\"Succesfully Subscribed\"\
    )\n        case .failure(let error):\n            print(\"Error registering for\
    \ notifications: \\(error.localizedDescription)\")\n        }\n    }\n    publicDatabase.add(operation)\n\
    }\n```\n\n## Setting Subscription\n\nNext, we need to set a subscription for the\
    \ change. You can add the below method to any modal class after the record update\
    \ or creation. In our example, we will add this to our chat model class. The function\
    \ performs the following:\n\n- Get access to the container and the public database\
    \ of the iCloud environment.\n\n```\nlet container = CKContainer.default()\nlet\
    \ publicDatabase = container.publicCloudDatabase\n```\n\n- Create a query subscription.\
    \ Notice that the query subscription needs the record type name and the subscription\
    \ name (the name must be like what you have created before and options which tells\
    \ the system that notification needs to be provided upon record creation or record\
    \ update on this record type). Also, note you can provide a condition to your\
    \ query as well. In our case, we are applying it to all records; hence, the `NSPredicate`\
    \ value is `True`.\n\n```\nlet subscription = CKQuerySubscription(\n    recordType:\
    \ \"\\(tablename)\",\n    predicate: NSPredicate(value: true),\n    subscriptionID:\
    \ \"mySubscription\",\n    options: [.firesOnRecordCreation, .firesOnRecordUpdate]\n\
    )\n```\n\n- Create notification info with customized text. This text will appear\
    \ on the user's screen.\n\n```\nlet notificationInfo = CKSubscription.NotificationInfo()\n\
    notificationInfo.alertBody = \"You have a New Chat\"\nsubscription.notificationInfo\
    \ = notificationInfo\n```\n\n- Finally, save the subscription.\n\n```\npublicDatabase.save(subscription)\
    \ { (subscription, error) in\n    if let error = error {\n        print(\"Error\
    \ saving subscription: \\(error.localizedDescription)\")\n        self.group.leave()\n\
    \    } else {\n        print(\"Subscription saved successfully!\")\n        self.group.leave()\n\
    \    }\n}\n```\n\nThis will trigger the notification process. All the users who\
    \ are subscribed to the record type will get an alert as specified in the notification\
    \ object.\n\n```\nfunc setSubscription(tablename: String, chattext: String, originatorname:\
    \ String) {\n    // set up a CKSubscription for the database table\n    let container\
    \ = CKContainer.default()\n    let publicDatabase = container.publicCloudDatabase\n\
    \    let subscription = CKQuerySubscription(\n        recordType: \"\\(tablename)\"\
    ,\n        predicate: NSPredicate(value: true),\n        subscriptionID: \"mySubscription\"\
    ,\n        options: [.firesOnRecordCreation, .firesOnRecordUpdate]\n    )\n  \
    \  let notificationInfo = CKSubscription.NotificationInfo()\n    notificationInfo.alertBody\
    \ = \"You have a New Chat\"\n    subscription.notificationInfo = notificationInfo\n\
    \    publicDatabase.save(subscription) { (subscription, error) in\n        if\
    \ let error = error {\n            print(\"Error saving subscription: \\(error.localizedDescription)\"\
    )\n            self.group.leave()\n        } else {\n            print(\"Subscription\
    \ saved successfully!\")\n            self.group.leave()\n        }\n    }\n}\n\
    ```\n\n# Conversation Between User Metadata\n\nWe have learned in the previous\
    \ chapters about MVC architecture, iCloud, new iOS block routines to manage asynchronous\
    \ calls, image manipulation, and many other concepts. In this chapter, we will\
    \ put all these concepts together to create a user chat app. The chat program\
    \ will have the following feature:\n\n- Ability to create user contact. We will\
    \ be able to create a contact, store it in iCloud repository, and display the\
    \ contact on the app screen.\n\n- Launch a conversation with a particular contact.\
    \ We will be able to converse with a user from our contact real time. Persist\
    \ conversations in a database, and retrieve past conversation.\n\n- For keeping\
    \ the program simple, we will keep all conversations in a public database and\
    \ use a unique table name as a concept to find out whose conversations we need\
    \ to retrieve.\n\n- Please note that we are not performing end-to-end encryption,\
    \ or secure channel for privacy. Neither are we focusing on displaying and storing\
    \ image or videos. The intent of the program is to show how the concepts learned\
    \ before can be applied to create real-life applications.\n\n## iCloud Database\n\
    \nThere are four tables we need to create in the public database as described\
    \ below.\n\n### Profile Record Type\n\nThis record type will store all contacts\
    \ a user will have to initiate conversations. The definition of the record type\
    \ is given below:\n\n| Field name | Field type | Description |\n| --- | --- |\
    \ --- |\n| `userid` | String | Unique ID to identify the user |\n| `personalprofile`\
    \ | CKAsset | Contact profile image |\n| `name` | String | Name of the contact\
    \ |\n| `businessname` | String | User business name |\n| `businesstype` | String\
    \ | Type of business |\n\nIn the iCloud repository, the profile record type will\
    \ look like the below screen.\n\n![](images/533539_2_En_11_Chapter/533539_2_En_11_Figa_HTML.jpg)"
