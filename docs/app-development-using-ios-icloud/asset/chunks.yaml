    # 下拉列表


    下拉列表是 iOS 应用开发者在设计数据输入表单时非常实用的功能。在本章中，我们将设计一个具有以下功能的下拉列表：


    *   定义一个文本输入框，并在其左侧添加一个图标。


    *   定义点击文本输入框内部的事件以触发下拉功能。


    *   当用户点击时，一个隐藏的表格会弹出，该表格对齐显示在文本输入框的正下方，并包含所有所需的值。


    *   用户也可以直接在文本框中输入，输入内容将动态地缩短或扩展列表。


    *   当用户从列表中选择所需的值后，表格会隐藏，所选值会显示在文本输入框中。


    在我们的示例中，我们假设有一个业务类型列表，用户可以在创建个人资料时从中选择以指明其业务类型。以下是关键元素：


    *   定义一个继承自 `NSObject` 的 `Business` 类，该类将包含所有业务类型的属性和方法。


    *   定义一个名为 `CreateProfileViewController` 的 UI 视图控制器来演示下拉列表功能。


    *   定义一个名为 `businessTypeTextField` 的文本输入框及其关联方法，用户可以在其中输入所需的业务类型，下拉列表将随之出现。


    *   定义一个名为 `businessTypeTableView` 的表格视图及其关联方法，该表格将显示一个预填充的业务类型列表。


    ## 定义 Business 类


    `Business` 类将包含定义业务类型的所有属性，以及一个用于设置值的初始化方法。以下代码定义了该类及其初始化方法：


    ```

    import UIKit

    class Business: NSObject{

    var businesstype:String!

    var businessdesc:String!

    var imagename:String!

    init(businesstype:String, businessdesc:String, imagename:String) {

    self.businesstype = businesstype

    self.businessdesc = businessdesc

    self.imagename = imagename

    }

    }

    ```


    该类名为 `Business`，包含三个属性：业务类型（`businesstype`）、业务描述（`businessdesc`）以及一个用于标识业务类型的图片名称（`imagename`）。


    该类还定义了一个系统提供的 `init` 方法，用于初始化实例化对象的值。

    '
- fmt: '## Define the `CreateProfileViewController`


    This class will create the user profile. While a user profile will have many properties
    like name, profile picture, and phone number, in this example, we will only focus
    on creating the business type drop-down list. Follow through the code to learn
    how to create a dynamic drop-down list using text field and a table view.


    ```

    class CreateProfileViewController: UIViewController, UITableViewDelegate, UITableViewDataSource,
    UITextFieldDelegate {

    ```


    The above code creates a view controller class with the name `CreateProfileViewController`.
    We are extending the following delegates:


    *   `UIViewController`: For UI view controller lifecycle methods.

    *   `UITableViewDelegate` and `UITableViewDataSource`: For all table functions.
    This is to show the table with all business type values.

    *   `UITextFieldDelegate`: For all UI text field event functions to show and populate
    the business type based on user input.


    ```

    let businessTypeTextField:UITextField = {

    let textField = UITextField()

    textField.translatesAutoresizingMaskIntoConstraints = false

    textField.borderStyle = .roundedRect

    textField.textColor = .black

    textField.layer.borderColor  = UIColor.systemGray.cgColor

    textField.layer.borderWidth = 1

    textField.layer.cornerRadius = 5

    textField.placeholder = "Select Business Type"

    textField.textColor = .black

    textField.isEnabled = true

    textField.keyboardType = .default

    return textField

    }()

    ```


    The above code defines a UI text field object with the name `businessTypeTextField`.
    There are certain properties which are attached to the text field, such as the
    text color is set to black, the border color is set to gray with a width of one
    point, and an effect to make the corner bend (`cornerRadius`). The text field
    is also given an initial placeholder value and with the default QWERTY keyboard.


    ```

    private let businessTypeTableView:UITableView = {

    let tableView = UITableView()

    tableView.translatesAutoresizingMaskIntoConstraints = false

    tableView.backgroundColor = .white

    tableView.isScrollEnabled = true

    return tableView

    }()

    ```


    The above code defines a `UITableView` with the name `businessTypeTableView`.
    We are enabling the scroll (`isScrollEnabled` is set to true) since we will have
    many business types.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    setup()

    drawProfileCreationScreen()

    }

    ```


    The above code is the UI view controller lifecycle method. `viewDidLoad` is the
    first function to be called. There are two custom functions we are calling from
    this function: the `setup()` function to initialize a few variables and set a
    few methods and the `drawProfileCreationScreen()` for drawing the screen.


    ```

    func setup(){

    view.backgroundColor = .black

    businessTypeTableView.delegate = self

    businessTypeTableView.dataSource = self

    businessTypeTableView.register(UITableViewCell.self, forCellReuseIdentifier: "business")

    businessTypeTableView.layer.borderWidth = 0

    businessTypeTableView.layer.borderColor = UIColor.white.cgColor

    businessTypeTableView.separatorStyle = .none

    businessTypeTableView.isHidden = true

    businessTypeTextField.delegate = self

    businessTypeTextField.leftView = UIImageView(image: UIImage(systemName: "plus"))

    businessTypeTextField.leftViewMode = .always

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingChanged),
    for: .editingChanged)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidBegin),
    for: .editingDidBegin)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidEnd),
    for: .editingDidEnd)

    setBusiness()

    }

    ```


    The above code is for the `setup()` method. In this function, we are doing the
    following:


    *   Setting the delegate and data source for the business type table view.

    *   Setting the table cell as the default table view cell with name `"business"`.

    *   Setting some style properties of the table such a border width and color and
    setting the table display value as hidden.

    *   We are also setting the business type input text field delegate so that we
    can invoke the text field functions.

    *   A system icon `"+"` is added to the left of the text box to give a visual
    reference to the user that clicking the text field will display the drop-down.

    *   Finally, we are adding three system methods: The first one is `businessTypeEditingChanged`,
    which will be invoked anytime when the user edits the value of the text field.
    The second one is `editingDidBegin`, which will be triggered when user for the
    first time starts typing something to the text field, and the third one is `editingDidEnd`,
    which is executed once the focus goes out of the text field.


    ```

    var business:[Business] = []

    var tempBusiness:[Business] = []

    ```


    The above two statements define arrays of class `Business`. The first one will
    hold all the business type object details and the second one is a temporary holder
    of business values, which is used to transfer the narrow list of business types
    based on user search criteria.


    ```

    func setBusiness(){

    business.append(Business(businesstype: "Mortgage", businessdesc: "Provide Mortgage
    Solution", imagename: "scribble"))

    business.append(Business(businesstype: "Insurance", businessdesc: "Provide Life/Health/Car/P&C
    Insurance", imagename: "folder"))

    business.append(Business(businesstype: "Electrician", businessdesc: "Provide Household
    electrical solution", imagename: "doc.text"))

    business.append(Business(businesstype: "Handyman", businessdesc: "Provide any
    household related work", imagename: "book"))

    }

    ```


    The function above sets some business type values to the `business` array object
    we defined above. Note that we are storing only four business type objects to
    keep the code simple.


    ```

    func drawProfileCreationScreen(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    view.addSubview(businessTypeTextField)

    let constraints5 = [

    businessTypeTextField.topAnchor.constraint(equalTo: view.topAnchor, constant:
    10),

    businessTypeTextField.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTextField.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTextField.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints5)

    view.addSubview(businessTypeTableView)

    let constraints6 = [

    businessTypeTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,
    constant: 0),

    businessTypeTableView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTableView.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTableView.heightAnchor.constraint(equalToConstant: 300)

    ]

    NSLayoutConstraint.activate(constraints6)

    }

    ```


    The above method is called right after the `setup()` method is called in the `viewDidLoad()`
    method. In this method, we are drawing our drop-down screen by placing the text
    field on the top of the screen, followed by the table view, which will be hidden
    when the screen is first displayed.'
