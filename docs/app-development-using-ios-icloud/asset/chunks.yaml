  raw: "#### Draw Screen\n\nThe **drawTabBar**() function is responsible for arranging\
    \ the UI elements within the **ContactViewController** using Auto Layout constraints.\
    \ The code is described below:\n\n*   **Screen size calculation:** Calculates\
    \ the screen width and height for layout purposes\n\n*   **Adding subviews:**\
    \ Adds the header label, business type text field, business type table view, contact\
    \ table view, and tab bar as **subviews** to the main view\n\n*   **Creating constraints:**\
    \ Defines constraints for each **subview** using **NSLayoutConstraint** to position\
    \ and size them within the view\n\n*   **Activating constraints:** Activates the\
    \ created constraints to apply the layout\n\n```\nfunc drawTabBar(){\nlet screensize:\
    \ CGRect = UIScreen.main.bounds\nlet screenWidth = screensize.width\nlet screenHeight\
    \ = screensize.height\nview.addSubview(headerLabel)\nlet constraints = [\nheaderLabel.topAnchor.constraint(equalTo:\
    \ view.topAnchor, constant: 45),\nheaderLabel.widthAnchor.constraint(equalToConstant:\
    \ screenWidth),\nheaderLabel.heightAnchor.constraint(equalToConstant: 40)\n]\n\
    NSLayoutConstraint.activate(constraints)\nview.addSubview(businessTypeTextField)\n\
    let constraints2 = [\nbusinessTypeTextField.topAnchor.constraint(equalTo: headerLabel.bottomAnchor,\
    \ constant: 10),\nbusinessTypeTextField.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 10),\nbusinessTypeTextField.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 20),\nbusinessTypeTextField.heightAnchor.constraint(equalToConstant:\
    \ 60)\n]\nNSLayoutConstraint.activate(constraints2)\nview.addSubview(businessTypeTableView)\n\
    let constraints3 = [\nbusinessTypeTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,\
    \ constant: 0),\nbusinessTypeTableView.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 5),\nbusinessTypeTableView.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 10),\nbusinessTypeTableView.heightAnchor.constraint(equalToConstant:\
    \ 300)\n]\nNSLayoutConstraint.activate(constraints3)\nview.addSubview(contactTableView)\n\
    let constraints4 = [\ncontactTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,\
    \ constant: 0),\ncontactTableView.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 5),\ncontactTableView.widthAnchor.constraint(equalToConstant: screenWidth\
    \ - 10),\ncontactTableView.heightAnchor.constraint(equalToConstant: screenHeight\
    \ - 50)\n]\nNSLayoutConstraint.activate(constraints4)\nview.addSubview(tabBar)\n\
    let constraints5 = [\ntabBar.bottomAnchor.constraint(equalTo: view.bottomAnchor,\
    \ constant: 5),\ntabBar.leftAnchor.constraint(equalTo: view.leftAnchor, constant:\
    \ 5),\ntabBar.widthAnchor.constraint(equalToConstant: screenWidth),\ntabBar.heightAnchor.constraint(equalToConstant:\
    \ 80)\n]\nNSLayoutConstraint.activate(constraints5)\n}\n```\n\n#### Table Methods\n\
    \nThere are two tables we will display on the user screen. The first one is to\
    \ show the business types for contact selection, and the second table shows the\
    \ contacts of a selected business type.\n\n**Number of rows**\n\nThis code defines\
    \ the **numberOfRowsInSection** delegate method for a table view, determining\
    \ the number of rows to display based on which table view is being queried.\n\n\
    *   **if(tableView == businessTypeTableView):** Checks if the current table view\
    \ is the businessTypeTableView\n    *   If true, it returns the count of the **business**\
    \ array\n\n*   If false, it returns the count of the **contact.profiles** array\n\
    \n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\nif(tableView == businessTypeTableView){\nreturn business.count\n\
    }else{\nreturn contact.profiles.count\n}\n}\n```\n\n**Displaying content in cell**\n\
    \nThis code defines the **cellForRowAt** delegate method, responsible for configuring\
    \ and returning table view cells based on the specified index path.\n\n*   **Conditional\
    \ check:** Determines which table view is being queried\n\n*   **BusinessTypeTableView:**\
    \ Dequeues a reusable cell with the identifier “**business**”, sets the cell’s\
    \ text label to a combination of **businesstype** and **businessdesc** from the\
    \ business array, and returns the cell\n\n*   **ContactTableView:** Dequeues a\
    \ reusable cell with the identifier “**contact**” and casts it to **ContactTableViewCell**\n\
    \    *   Sets the **nameButton** title to the contact’s name\n\n*   Retrieves\
    \ image data from the **personalprofile’s** file URL and sets it as the **profileImageView’s**\
    \ image\n\n*   Sets the corner radius of the **profileImageView**\n\n*   Adds\
    \ a target action for the **chatButton** to trigger the **chatAction** method\n\
    \n*   Sets the tag property of the **chatButton** to the index path row for later\
    \ identification\n\n*   Returns the configured cell\n\n```\nfunc tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\nif(tableView\
    \ == businessTypeTableView){\nlet cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"business\", for: indexPath)\ncell.textLabel?.text = business[indexPath.row].businesstype\
    \ + \" \" + business[indexPath.row].businessdesc\nreturn cell\n}else{\nlet cell\
    \ = tableView.dequeueReusableCell(withIdentifier: \"contact\", for: indexPath)\
    \ as! ContactTableViewCell\ncell.nameButton.setTitle(contact.profiles[indexPath.row].name,\
    \ for: .normal)\nlet file = contact.profiles[indexPath.row].personalprofile.fileURL\n\
    if let data = NSData(contentsOf: file!) {\ncell.profileImageView.image = UIImage(data:\
    \ data as Data)\n}\ncell.profileImageView.layer.cornerRadius =  60\ncell.chatButton.addTarget(self,\
    \ action: #selector(chatAction), for: .touchUpInside)\ncell.chatButton.tag = indexPath.row\n\
    return cell\n}\n}\n```\n\n**Row height method**\n\nThis code defines the **heightForRowAt**\
    \ delegate method, determining the height of each row in the specified table view.\n\
    \n*   **Conditional check:** Determines which table view is being queried\n\n\
    *   **BusinessTypeTableView:** Returns a fixed height of 40 points for each row\n\
    \n*   **ContactTableView:** Returns a fixed height of 155 points for each row\n\
    \n```\nfunc tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)\
    \ -> CGFloat {\nif(tableView == businessTypeTableView){\nreturn 40\n}else{\nreturn\
    \ 155\n}\n}\n```\n\n**Row selection method**\n\nThis code defines the **didSelectRowAt**\
    \ delegate method for the table view, handling user selection of a row in either\
    \ the business type or contact table view.\n\n*   **Conditional check:** Verifies\
    \ if the selected table view is **businessTypeTableView**\n\n*   **Clear contact\
    \ data:** Removes all elements from the **contact.profiles** array\n\n*   **Update\
    \ text field:** Sets the text field text to the selected business type from the\
    \ **business** array\n\n*   **Dismiss keyboard:** Calls **resignFirstResponder**\
    \ on the text field to hide the keyboard if it’s open\n\n*   **Enter group:**\
    \ Enters a group using **contact.group.enter()**\n\n*   **Get contacts:** Calls\
    \ contact.getContacts(businessType:) to retrieve contacts based on the selected\
    \ business type\n\n*   **Notify on main queue:** Uses a notification block with\
    \ **notify(queue: .main)** to execute code on the main thread after the **getContacts**\
    \ operation completes\n\n*   **Filter contacts:** Filters the **contact.profiles**\
    \ array to exclude the user’s own profile\n\n*   **Show contact table view:**\
    \ Sets **contactTableView.isHidden** to false to make it visible\n\n*   **Reload\
    \ contact table view:** Calls **contactTableView.reloadData()** to update the\
    \ table view with the filtered data\n\n```\nfunc tableView(_ tableView: UITableView,\
    \ didSelectRowAt indexPath: IndexPath) {\nif(tableView == businessTypeTableView){\n\
    contact.profiles.removeAll()\nbusinessTypeTextField.text = business[indexPath.row].businesstype\n\
    businessTypeTextField.resignFirstResponder()\nself.contact.group.enter()\nself.contact.getContacts(businessType:\
    \ businessTypeTextField.text!)\nself.contact.group.notify(queue: .main) { [self]\
    \ in\ncontact.profiles = contact.profiles.filter{\ncontact in return contact.userid\
    \ != profile?.userid\n}\ncontactTableView.isHidden = false\ncontactTableView.reloadData()\n\
    }\n}\n}\n```"
  trans: "\n### `drawTabBar()`\n\n`drawTabBar()` 函数负责使用 Auto Layout 约束在`ContactViewController`中排列\
    \ UI 元素。代码如下所述：\n\n- **屏幕尺寸计算：** 计算屏幕宽度和高度，用于布局\n- **添加子视图：** 将标题标签、业务类型文本字段、业务类型表格视图、联系人表格视图以及标签栏作为子视图添加到主视图中\n\
