    # 5. Image Management


    Xcode projects often contain images to create a great visual experience for your
    end consumers. We have learned about basic image creation and management in the
    first version of the book.


    In this chapter, we will learn the additional new concepts:


    *   Define an UIImageView to display images


    *   Add gesture to the image view to allow certain actions to be performed when
    the user touches the image


    *   Display the image view with user-defined constraints


    *   Define image picker as an extension and add functions to display an action
    sheet with options to either chose photos from photo library or activate the camera


    *   Understand all configuration changes required for allowing users to access
    the camera and photo library


    *   Manipulate image properties to give it an elegant look


    *   Manage images as CKAsset to save it to our iCloud database


    *   Retrieve the image from iCloud repository


    *   Display it on the user profile screen


    *   Implement these features using the MVC design pattern we have learned in the
    previous chapter


    In our example, we will have three view controllers as explained below:


    *   **ProfileCreationViewController:** This UIViewController will help in uploading
    the image from photo library or capture image directly from the camera (view).


    *   **Profile:** This NSObject class represents the profile table in our iCloud
    database.


    *   **ProfileDisplayViewController:** This UIViewController will display our stored
    image on the iOS screen.'
