- fmt: '# Profile Modal Class to Save and Retrieve User Profile Image


    In this modal class, we will save the user image as a `CKAsset` object in the
    iCloud repository. We will also retrieve all contacts for the user and store contact
    profile picture and name in an array of type `Profile` class.


    ```

    import UIKit

    import CloudKit

    class Profile: NSObject {

    ```


    We imported two Xcode toolkits: `UIKit` for all lifecycle and UI objects inclusion
    and `CloudKit` for all iCloud persistence and data storage. Next, we are defining
    `NSObject` class, `Profile`, which will define the profile object and all related
    database manipulation methods.


    ```

    let group = DispatchGroup()

    let syncQueue = DispatchQueue(label: "com.domain.app.sections")

    ```


    We are defining a constant called `group` which stores an instantiated object
    of a synchronization object called `DispatchGroup`.


    Next, we are instantiating an object of type `DispatchQueue` and storing it in
    a constant called `syncQueue`. The name of the queue is `com.domain.app.sections`.
    This will help us to serial process many asynchronous calls one after the other.


    ```

    class Profile:NSObject{

    var record:CKRecord!

    var userid:String!

    var personalprofile:CKAsset!

    var name: String!

    var personalphone:String!

    init(userid:String, personalprofile:CKAsset, name:String,  personalphone: String)
    {

    self.userid = userid

    self.personalprofile = personalprofile

    self.name = name

    self.personalphone = personalphone

    }

    }

    ```


    This is our custom `Profile` object. The properties of this class mimic the profile
    table in the iCloud repository. Besides the profile image, we have a few other
    attributes defined; for the simplicity of the code, we didn’t include those elements
    in our profile capture screen. Also, the `init` method allows the user to instantiate
    the object of the class `Profile` with default value. When we created the profile
    object in the Profile Creation View Controller, we used the `init` function to
    store all necessary data in the object, ready to be saved into the repository.


    ```

    var profile:Profile?

    var profiles:[Profile] = []

    ```


    We are defining two variables of our `Profile` class. The first one, `profile`,
    will store a single profile object, and the next one, `profiles`, will store an
    array of profile objects. The latter is important, as you will see the display
    view controller which will retrieve and display all contacts a user has.


    ```

    func saveProfile(profile:Profile){

    ```


    If you recall, `saveProfile` was called with the profile object from the Profile
    Creation View Controller. This is the definition of this method. You will see
    in the subsequent lines how we are saving this to the iCloud repository.


    ```

    let publicDatabase = CKContainer.default().publicCloudDatabase

    let aRecord = CKRecord(recordType: "profile")

    ```


    ```

    aRecord["userid"] = profile.userid

    aRecord["personalprofile"] = profile.personalprofile

    aRecord["name"] = profile.name

    aRecord["personalphone"] = profile.personalphone

    ```


    The following are the key elements in this block of code:


    *   Define a constant to hold reference of the public cloud database.

    *   Define a constant to hold the reference of the iCloud table (record type)
    `profile`.

    *   Assign the user-provided values to the respective fields of the iCloud profile.
    It is important to note that the data type should properly match, or otherwise,
    it will give run time error. For example, `personalprofile` is of type `CKAsset`.


    ```

    publicDatabase.save(aRecord, completionHandler: { (record, error) -> Void in

    DispatchQueue.main.async {

    if let error = error {

    print(error)

    }

    else {

    self.syncQueue.async {

    self.profile = Profile(userid: record!.object(forKey: "userid")! as! String, personalprofile:
    record!.object(forKey: "personalprofile")! as! CKAsset, name: record!.object(forKey:
    "name")! as! String, personalphone: record!.object(forKey: "personalphone")! as!
    String)

    self.profile?.record = record

    self.group.leave()

    }

    }

    }

    })

    }

    ```


    Now that we have the record defined, we will go ahead and attempt to save it.
    The following are the key points to note in this block of code:


    *   We are calling the `save` method on the public database constant; it takes
    reference to a `CKRecord` type (record to be stored) and has a completion handler
    returning the saved record or an error.

    *   All iCloud methods are asynchronous; hence, we run it on a main thread as
    an async process.

    *   Upon completion, if there is an error, it will print the error on the console.

    *   Or we are retrieving the stored record into our local variable `profile` and
    leave the thread to notify the calling function that the operation is successfully
    completed.


    ```

    func getContacts(businessType:String) {

    ```


    The `getContacts` retrieves all contacts of the current user. It takes a parameter
    called `businessType` to formulate a conditional boundary to retrieve the user
    contacts for a particular business type.


    ```

    profiles.removeAll()

    ```


    The variable `profiles` are defined before, which can store an array of contacts.
    We are removing all data to ensure the array object is empty.


    ```

    let pred = NSPredicate(format: "businessType == %@", businessType)

    let query = CKQuery(recordType: "profile", predicate: pred)

    let operation = CKQueryOperation(query: query)

    ```


    The following are the key elements in the above code block:


    *   `NSPredicate` helps to define a condition for our query. In our case, we are
    instructing it to get all contacts where business type is equal to the user-provided
    user business type.

    *   Next, we are defining a `CKQuery`, a query which takes our predicate as an
    input alongside a record type name against which the query needs to be executed.

    *   Then we are defining the `CKQueryOperation`, to execute our query.


    ```

    let operationConfiguration = CKOperation.Configuration()

    operationConfiguration.timeoutIntervalForRequest = 10

    operationConfiguration.timeoutIntervalForResource = 10

    operation.configuration = operationConfiguration

    ```


    The following are the key points in this block of code:


    *   Defining a `CKOperation.Configuration` is optional. We are defining for set
    timeout intervals, so that the query can exit if not responding after a particular
    set time.

    *   `timeoutIntervalForRequest` property determines the request timeout interval
    (in seconds) for the query to complete. In our example, the task will wait for
    10 sec for additional data to arrive before it gives up.

    *   `timeoutIntervalForResource` property determines the request timeout interval
    (in seconds) for the resource retrieval to complete. In our example, the task
    will wait for 10 sec for additional data to arrive before it gives up.

    *   The operation configuration object we created is now assigned to the `operation`
    object we have defined before.


    ```

    CKContainer.default().publicCloudDatabase.add(operation)

    ```


    We now added the operation to our public cloud. This will execute the query in
    asynchronous mode.


    ```

    operation.recordMatchedBlock = { recordID, result in

    switch result {

    case .success(let record):

    let profile = Profile(userid: record["userid"] as! String, personalprofile: record["personalprofile"]
    as! CKAsset, name: record["name"] as! String, personalphone: record["personalphone"]
    as! String)

    profile.record = record

    self.profiles.append(profile)

    case .failure(let error):

    print(error.localizedDescription)

    // Handle the case when the table doesn''t exist or there''s an error

    }

    }

    ```


    The following are the key elements of this block of code:


    *   The `recordMatchedBlock` is called when the query is completed. It has two
    parameters: the `recordID` and a result set.

    *   Result has a success and failure block, which is what we are next switching
    on to form a conditional block.

    *   If it is a success, we are retrieving the value and storing it in our `profiles`
    array. Note that this block will repeat like a cursor until all records are processed.

    *   In case of failure, we are printing the error on the console.'
