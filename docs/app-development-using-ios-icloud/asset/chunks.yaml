    # 4. Model-View-Controller Design Framework


    Model-View-Controller (MVC) architecture is one of the most popular design patterns
    used in software application development. Based on what function that code represents,
    MVC segregates the code into manageable components, thereby helping better readability,
    usability, and maintainability of written code. MVC design pattern assigns objects
    in the application of the following three roles:


    **Model**: Model objects are data that the application needs. This class would
    have all definitions of data objects and methods to manage data, including persisting
    them to a database. The data required is encapsulated in a model object and can
    have a one-to-many relationship with other model objects. From a typical design
    perspective, anything that needs to be persisted in a database should be in model
    objects.


    **View**: A view object has the screen and user interaction part of the application.
    The screen rendering and drawing function resides in view objects. A view object
    can utilize the data object to display or capture data for your application.


    **Controller**: A controller connects different view objects so that the application
    can interact and perform the desired function. It interprets user actions made
    in view objects and communicates data changes (new/updated/deleted) to the model
    objects.'
