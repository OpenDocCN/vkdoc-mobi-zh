  trans: '

    ## 定义 `CreateProfileViewController`


    该类将用于创建用户个人资料。虽然用户个人资料会包含许多属性，例如姓名、个人头像和电话号码，但在本例中，我们只专注于创建业务类型下拉列表。请跟随代码学习如何使用文本字段和表格视图创建动态下拉列表。


    ```

    class CreateProfileViewController: UIViewController, UITableViewDelegate, UITableViewDataSource,
    UITextFieldDelegate {

    ```


    上述代码创建了一个名为 `CreateProfileViewController` 的视图控制器类。我们扩展了以下委托：


    *   `UIViewController`：用于处理 UI 视图控制器的生命周期方法。

    *   `UITableViewDelegate` 和 `UITableViewDataSource`：用于处理所有表格功能。用于展示包含所有业务类型值的表格。

    *   `UITextFieldDelegate`：用于处理所有 UI 文本字段事件函数，以便根据用户输入显示和填充业务类型。


    ```

    let businessTypeTextField:UITextField = {

    let textField = UITextField()

    textField.translatesAutoresizingMaskIntoConstraints = false

    textField.borderStyle = .roundedRect

    textField.textColor = .black

    textField.layer.borderColor  = UIColor.systemGray.cgColor

    textField.layer.borderWidth = 1

    textField.layer.cornerRadius = 5

    textField.placeholder = "Select Business Type"

    textField.textColor = .black

    textField.isEnabled = true

    textField.keyboardType = .default

    return textField

    }()

    ```


    上述代码定义了一个名为 `businessTypeTextField` 的 UI 文本字段对象。该文本字段附加了某些属性，例如文本颜色设置为黑色，边框颜色设置为灰色且宽度为
    1 点，以及使边角弯曲的效果（`cornerRadius`）。该文本字段还设置了初始占位符值，并使用默认的 QWERTY 键盘。


    ```

    private let businessTypeTableView:UITableView = {

    let tableView = UITableView()

    tableView.translatesAutoresizingMaskIntoConstraints = false

    tableView.backgroundColor = .white

    tableView.isScrollEnabled = true

    return tableView

    }()

    ```


    上述代码定义了一个名为 `businessTypeTableView` 的 `UITableView`。由于我们会拥有很多业务类型，因此启用了滚动（将 `isScrollEnabled`
    设置为 true）。


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    setup()

    drawProfileCreationScreen()

    }

    ```


    上述代码是 UI 视图控制器的生命周期方法。`viewDidLoad` 是第一个被调用的函数。我们从该函数中调用了两个自定义函数：`setup()` 函数用于初始化一些变量并设置一些方法，以及用于绘制屏幕的
    `drawProfileCreationScreen()` 函数。


    ```

    func setup(){

    view.backgroundColor = .black

    businessTypeTableView.delegate = self

    businessTypeTableView.dataSource = self

    businessTypeTableView.register(UITableViewCell.self, forCellReuseIdentifier: "business")

    businessTypeTableView.layer.borderWidth = 0

    businessTypeTableView.layer.borderColor = UIColor.white.cgColor

    businessTypeTableView.separatorStyle = .none

    businessTypeTableView.isHidden = true

    businessTypeTextField.delegate = self

    businessTypeTextField.leftView = UIImageView(image: UIImage(systemName: "plus"))

    businessTypeTextField.leftViewMode = .always

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingChanged),
    for: .editingChanged)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidBegin),
    for: .editingDidBegin)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidEnd),
    for: .editingDidEnd)

    setBusiness()

    }

    ```


    上述代码是 `setup()` 方法。在该函数中，我们执行了以下操作：


    *   为业务类型表格视图设置委托和数据源。

    *   将表格单元格设置为名为 `"business"` 的默认表格视图单元格。

    *   设置表格的一些样式属性，例如边框宽度和颜色，并将表格显示状态设置为隐藏。

    *   我们还设置了业务类型输入文本字段的委托，以便能够调用文本字段函数。

    *   在文本框左侧添加了一个系统图标 `"+"`，为用户提供视觉提示，表明点击文本字段将显示下拉列表。

    *   最后，我们添加了三个系统方法：第一个是 `businessTypeEditingChanged`，它将在用户编辑文本字段的值时被调用；第二个是 `editingDidBegin`，当用户首次开始在文本字段中输入内容时触发；第三个是
    `editingDidEnd`，当焦点离开文本字段时执行。


    ```

    var business:[Business] = []

    var tempBusiness:[Business] = []

    ```


    以上两个语句定义了 `Business` 类的数组。第一个数组将保存所有业务类型对象的详细信息，第二个数组是业务值的临时容器，用于根据用户搜索条件传递筛选后的业务类型列表。


    ```

    func setBusiness(){

    business.append(Business(businesstype: "Mortgage", businessdesc: "Provide Mortgage
    Solution", imagename: "scribble"))

    business.append(Business(businesstype: "Insurance", businessdesc: "Provide Life/Health/Car/P&C
    Insurance", imagename: "folder"))

    business.append(Business(businesstype: "Electrician", businessdesc: "Provide Household
    electrical solution", imagename: "doc.text"))

    business.append(Business(businesstype: "Handyman", businessdesc: "Provide any
    household related work", imagename: "book"))

    }

    ```


    上面的函数向之前定义的 `business` 数组对象设置了一些业务类型值。请注意，为了保持代码简洁，我们仅存储了四个业务类型对象。


    ```

    func drawProfileCreationScreen(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    view.addSubview(businessTypeTextField)

    let constraints5 = [

    businessTypeTextField.topAnchor.constraint(equalTo: view.topAnchor, constant:
    10),

    businessTypeTextField.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTextField.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTextField.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints5)

    view.addSubview(businessTypeTableView)

    let constraints6 = [

    businessTypeTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,
    constant: 0),

    businessTypeTableView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTableView.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTableView.heightAnchor.constraint(equalToConstant: 300)

    ]

    NSLayoutConstraint.activate(constraints6)

    }

    ```


    上述方法在 `viewDidLoad()` 方法中调用 `setup()` 方法之后立即被调用。在此方法中，我们通过将文本字段放置在屏幕顶部，随后放置表格视图来绘制下拉屏幕，该表格视图在屏幕首次显示时将被隐藏。

    '
- fmt: '### Table View Methods


    The next four methods are about the table view functions.


    ```

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return business.count

    }

    ```


    The above method informs the table view controller about the number of records
    the `business` object has. This will help the table view to loop through all business
    types to be displayed in the table when the user brings the focus on the input
    text field.


    ```

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "business", for: indexPath)

    cell.textLabel?.text = business[indexPath.row].businesstype + " " + business[indexPath.row].businessdesc

    return cell

    }

    ```


    The above code is drawing the table by looping through each of the `business`
    objects. It uses the default UI cell table view and appends the business type
    and business description of the looped through `business` objects.


    ```

    func tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)
    -> CGFloat {

    return 40.0

    }

    ```


    This above code is the third method of the table view which defines the width
    of each displayed row as 40 pixels.


    ```

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    businessTypeTextField.text = business[indexPath.row].businesstype

    businessTypeTextField.resignFirstResponder()

    }

    ```


    The above code is the final block of code for the table view. This function is
    invoked when the user selects a row. At that moment, we are assigning the text
    field the business type value that the user selected and making sure the focus
    is away from the text field.


    ### Text Field Functions


    The next three functions are text field event functions. These methods are triggered
    when certain actions are performed on the text field.


    ```

    @objc func businessTypeEditingDidBegin(sender: UITextField){

    tempBusiness = business

    businessTypeTableView.isHidden = false

    }

    ```


    The above code is executed when the user begins texting. At this time, we are
    transferring the entire `business` object to a temporary variable called `tempBusiness`.
    This is required because we are going to manipulate the `business` object to contain
    only the objects that matched the user''s search criteria. Once the editing is
    done, we will make sure the original list is reset into the `business` object
    so that it is ready for the next search.


    We are also now making the business type table view visible.


    ```

    @objc func businessTypeEditingDidEnd(sender: UITextField){

    business = tempBusiness

    businessTypeTableView.isHidden = true

    }

    ```


    The above code is executed when the editing is over. Currently, we are transferring
    the `tempBusiness` object (which contains the original list of business type objects)
    to the original `business` object (so that it is ready for next search).


    We are also now making the business type table view hidden now.


    ```

    @objc func businessTypeEditingChanged(sender: UITextField){

    business = business.filter{

    business in return business.businesstype.trimmingCharacters(in: .whitespaces).lowercased().contains(sender.text!.lowercased())

    }

    if(sender.text == ""){

    business = tempBusiness

    }

    businessTypeTableView.reloadData()

    }

    ```


    The above code is executed every time a user is typing into the text field. Upon
    user typing, we are filtering the `business` object based on the current text
    in the text field. We are removing the white spaces and making everything lowercase
    to make case-insensitive search. Once the search is commenced, the searched objects
    are transferred to the `business` object.


    In case the user deletes all text, we are reassigning the original list to the
