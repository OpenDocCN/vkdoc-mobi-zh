- fmt: '# Defining Class and Class Objects


    In this section of the code blocks, we will define the class and some necessary
    UI objects to create our expanding text field functionalities.


    ```swift

    class ChatDetailViewController: UIViewController, UITextViewDelegate {

    ```


    In the code above, we are defining a UI view controller class, which extends the
    following two delegates:


    - `UIViewController` to provide all view controller lifecycle methods to the class

    - `UITextViewDelegate` to add UI text view built in functions to manipulate the
    text view


    ```swift

    let shellTextView: UITextView = {

    let textView = UITextView()

    textView.translatesAutoresizingMaskIntoConstraints = false

    textView.isScrollEnabled = false

    textView.font = UIFont.systemFont(ofSize: 17)

    textView.layer.borderWidth = 1

    textView.layer.borderColor = UIColor.gray.cgColor

    textView.layer.cornerRadius = 10

    return textView

    }()

    let shellSaveButton:UIButton = {

    let uiButton  = UIButton()

    uiButton.translatesAutoresizingMaskIntoConstraints = false

    uiButton.setTitleColor(UIColor.black, for: .normal)

    uiButton.contentHorizontalAlignment = .left

    uiButton.contentVerticalAlignment = .top

    uiButton.titleLabel?.font = UIFont.systemFont(ofSize: 16, weight: .semibold)

    uiButton.isEnabled = false

    return uiButton

    }()

    ```


    The above code defines a UI text view and a UI button. As you can see from the
    name, this is a shell text view and a shell button, which we are using just for
    display purposes. We will replace this with our programmatically expanding/contracting
    text view. The reason we must do this is because we cannot replace an expanding
    text view back to the original size post saving the content. This is a technical
    display glitch in Xcode, which I hope will be taken care of in the future iOS
    versions.


    ```swift

    let chatTextView: UITextView = {

    let textView = UITextView()

    textView.translatesAutoresizingMaskIntoConstraints = false

    textView.isScrollEnabled = false

    textView.font = UIFont.systemFont(ofSize: 17)

    textView.layer.borderWidth = 1

    textView.layer.borderColor = UIColor.gray.cgColor

    textView.layer.cornerRadius = 10

    return textView

    }()

    let saveButton:UIButton = {

    let uiButton  = UIButton()

    uiButton.translatesAutoresizingMaskIntoConstraints = false

    uiButton.setTitleColor(UIColor.black, for: .normal)

    uiButton.contentHorizontalAlignment = .left

    uiButton.contentVerticalAlignment = .top

    uiButton.titleLabel?.font = UIFont.systemFont(ofSize: 16, weight: .semibold)

    uiButton.isEnabled = false

    return uiButton

    }()

    ```


    The above code defines a UI text view and a UI button, which we will expand the
    contract using code. Note that we are defining some basic properties such as font
    size, border width, corner radius (to give a curve to the corners of the text
    view), and border color to the text view. And similarly, for the button, we are
    setting the button title color, the text within the button horizontal and vertical
    position, and its font.


    Although we are defining a button, we will not use the button in our code demonstration
    as it is not relevant for the functionality we are demonstrating in this chapter.


    ## Lifecycle Methods


    The code blocks below have the `viewDidLoad` lifecycle method and the screen drawing
    custom method.


    ```swift

    override func viewDidLoad() {

    super.viewDidLoad()

    drawScreen ()

    }

    ```


    `viewDidLoad()` is called when the view controller is first loaded. From this
    system-defined method, we are invoking a custom method `drawScreen()`, which is
    described in the next block.


    ```swift

    func drawScreen(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    let screenHeight = screensize.height

    shellTextView.delegate = self

    view.addSubview(shellTextView)

    NSLayoutConstraint.activate([

    shellTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -40),

    shellTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    shellTextView.widthAnchor.constraint(equalToConstant: screenWidth - 40),

    shellTextView.heightAnchor.constraint(equalToConstant: 40)

    ])

    view.addSubview(shellSaveButton)

    let constraints3 = [

    shellSaveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant: -70),

    shellSaveButton.leftAnchor.constraint(equalTo: shellTextView.rightAnchor, constant:
    5),

    shellSaveButton.rightAnchor.constraint(equalToSystemSpacingAfter: shellTextView.rightAnchor,
    multiplier: 40),

    shellSaveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    shellSaveButton.setImage(UIImage(systemName: "paperplane.fill"), for: .normal)

    }

    ```


    In the above code, we are drawing the `shellTextView` text view toward the bottom
    of the screen and the save button right next to the `shellTextView`.'
