    # 3. Class Extensions


    Extensions provide a powerful way to add new functionalities to an existing class,
    structure, enumeration, or a protocol. Once added, the function is available as
    a natural extension to the added class or the object. Extension can be added to
    user-defined objects or to a system-defined class. In this chapter, we will learn
    how to add extension to a system-defined class, and in Chapter [5](#533539_2_En_5_Chapter.xhtml)
    dedicated to image manipulation, we will learn how to add extension to user-defined
    view controller.


    Once the extension is defined, we can do everything as one can expect to in defining
    a function. You can, for example,


    *   Add delegates


    *   Define methods, structures, and types


    *   Define initializers


    *   Make or confirm to a protocol


    ## Example Code Description


    In the example below, we will extend the system-defined class String to add a
    new string manipulation function which currently doesn’t exist. We will add the
    following three functions:


    *   Get the last index of a string


    *   Check if a user-provided string input confirms to be a valid email address


    *   Check if a user-provided string input confirms to be a valid URL


    In our example, we will add the extension on top of a view controller class. Please
    note that the extension is not inside the view controller class definition, and
    once defined, it is visible across the project scope.


    ### String Extension


    ```

    extension String {

    }

    ```


    For defining an extension, we need to use the system-defined word extension (note
    that it is case sensitive). After the word extension, we need to provide the name
    of the extension. In our example, we are extending the system-defined ***String***
    class; hence, we have the same system-defined class name.


    #### Method: Find Last Index


    ```

    func lastIndex(of string: String) -> Int? {

    }

    ```


    The name of the function is ***lastIndex***. It will take in a ***String*** literal
    and return the last index number of the string, which is an integer. Note that
    ***lastIndex*** will be available across the project as an added function to the
    ***String*** function.


    ```

    guard let index = range(of: string, options: .backwards) else { return nil }

    ```


    In this line, we define a variable ***index***. Note that the variable is defined
    as **let** as we will not be reusing it within the scope of the function. Also,
    we are using guard to ensure if the user-provided string has issues it won’t result
    in throwing system error.


    The ***range*** system-defined functions look for the user-provided string backwards
    and if found return a valid range to the ***index*** variable; if not found or
    if it encounters an error, it will return nil (the else part of the function is
    executed).


    ```

    return self.distance(from: self.startIndex, to: index.lowerBound)

    ```


    This line of code calculates the distance between the beginning of the string
    and the found substring’s starting position and returns its position.


    The word self refers to the string in the current context (which is the string
    passed to the function), and distance is a system-defined method of the String
    class in Swift, which take two parameters as defined below:


    *   ***self.startIndex*** refers to the first character in the string.


    *   ***index.lowerBound*** refers to the index of the first character of the substring
    returned by the pervious range function.


    Here is the complete definition of the method:


    ```

    func lastIndex(of string: String) -> Int? {

    guard let index = range(of: string, options: .backwards) else { return nil }

    return self.distance(from: self.startIndex, to: index.lowerBound)

    }

