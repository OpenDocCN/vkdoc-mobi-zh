    \ 20)\n        ]\n        NSLayoutConstraint.activate(constraints1)\n\n      \
    \  contentView.addSubview(titleButton)\n        let constraints2 = [\n       \
    \     titleButton.topAnchor.constraint(equalTo: nameButton.bottomAnchor, constant:\
    \ 5),\n            titleButton.leftAnchor.constraint(equalTo: profileImageView.rightAnchor,\
    \ constant: 5),\n            titleButton.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 100),\n            titleButton.heightAnchor.constraint(equalToConstant:\
    \ 80)\n        ]\n        NSLayoutConstraint.activate(constraints2)\n    }\n}\n\
    ```\n\n# 15. 用户间对话 – 控制器定义\n\n## 控制器类\n\n在模型-视图-控制器（MVC）架构模式中，控制器是模型（Model）与视图（View）之间的中介。在我们的聊天应用中，当用户首次打开应用时，会将用户导航至创建个人资料的视图控制器。对于其他所有情况，则会显示\
    \ `ContactViewController`，用于添加联系人或与现有联系人发起聊天。以下为代码分解：\n\n**Import UIKit:**\n\n\
    - 此行导入 UIKit 框架，该框架对于在 iOS 应用中构建用户界面至关重要。\n\n**类声明:**\n\n- `class ControllerViewController:\
    \ UIViewController`: 定义了一个名为 `ControllerViewController` 的新类，该类继承自 `UIViewController`。这表明此类将管理一个视图及其交互。\n\
    \n**属性:**\n\n- `userid: String = \"\"`: 一个用于存储用户 ID 的字符串属性。初始化为空字符串。\n- `contact:\
    \ Contact = Contact()`: `Contact` 类的一个实例。\n- `profile: Profile?`: 一个可选的 profile\
    \ 对象。问号表示它可能为 `nil`。\n\n```\nimport UIKit\n\nclass ControllerViewController: UIViewController\
    \ {\n    var userid: String = \"\"\n    let contact: Contact = Contact()\n   \
    \ var profile: Profile?\n```\n\n## 生命周期方法\n\n此方法是 UIKit 中的一个生命周期方法，当视图控制器的视图被加载到内存中时会被调用。这是为视图控制器执行初始设置任务（例如设置用户界面、加载数据或注册通知）的常见位置。\n\
    \n我们在 `viewDidLoad()` 中调用了一个名为 `checkProfileExist()` 的自定义方法。该方法负责检查用户个人资料是否存在。\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    checkProfileExist()\n\
    }\n```\n"
- fmt: "# Check Profile Exist Method\n\nThis function handles checking for a user\
    \ profile’s existence and calls different view controller based on the outcome.\
    \ The following are the steps the code goes through:\n\n**Get iCloud user ID:**\n\
    \n-   Calls `contact.getICloudUserID { ... }` to retrieve the user’s iCloud user\
    \ ID using a completion handler.\n-   The completion handler receives two parameters:\n\
    \    -   `userID`: The retrieved iCloud user ID (optional `String`)\n    -   `error`:\
    \ Any error encountered during retrieval (optional `Error`)\n\n**Handle errors:**\n\
    \n-   If `error` is not nil, an error message is printed indicating an issue retrieving\
    \ the iCloud user ID.\n\n**Process user ID (if retrieved successfully):**\n\n\
    -   If `userID` has a value, it’s stored in the `self.userid` property.\n-   `self.contact.group.enter()`\
    \ enters a dispatch group to manage asynchronous tasks.\n-   `self.contact.checkProfileExist(userID:\
    \ userID)` checks if a user profile exists for the retrieved ID.\n-   `self.contact.group.notify(queue:\
    \ .main) { ... }` sets up a notification to be called on the main thread when\
    \ the dispatch group finishes all its tasks.\n\n**Handle profile existence:**\n\
    \n-   Inside the notification block, it checks `contact.profileExists` (a Boolean\
    \ property).\n-   If `contact.profileExists` is true:\n    -   Sets `self.profile`\
    \ to the retrieved `contact.profile` (assuming it’s populated)\n    -   Calls\
    \ `popUpContact()` (see below)\n-   If `contact.profileExists` is false:\n   \
    \ -   Calls `popUpProfile()` (see below)\n\n```\nfunc checkProfileExist(){\ncontact.getICloudUserID\
    \ { (userID, error) in\nif let error = error {\nprint(\"Error: \\(error)\")\n\
    } else if let userID = userID {\nself.userid = userID\nself.contact.group.enter()\n\
    self.contact.checkProfileExist(userID: userID)\nself.contact.group.notify(queue:\
    \ .main) { [self] in\nif(contact.profileExists){\nself.profile = contact.profile\n\
    popUpContact()\n}else{\npopUpProfile()\n}\n}\n}\n}\n}\n```\n\n## Navigating to\
    \ View Controllers\n\nThese functions handle the presentation of modal view controllers\
    \ based on whether a user profile exists. Code breakdown is given below:\n\n**popUpProfile()**\n\
    \n-   Creates an instance of `CreateProfileViewController`\n-   Passes the `userid`\
    \ to the new view controller\n-   Sets the presentation style and transition style\
    \ for the modal view controller\n-   Presents the `CreateProfileViewController`\
    \ modally\n\n**popUpContact()**\n\n-   Creates an instance of `ContactViewController`\n\
    -   Passes the `profile` and `userid` to the new view controller\n-   Sets the\
    \ presentation style and transition style for the modal view controller\n-   Presents\
    \ the `ContactViewController` modally\n\n```\nfunc popUpProfile(){\nlet viewController\
    \ = CreateProfileViewController()\nviewController.userid = userid\nviewController.modalPresentationStyle\
    \ = .overCurrentContext\nviewController.modalTransitionStyle = .crossDissolve\n\
    self.present(viewController, animated: true, completion: nil)\n}\nfunc popUpContact(){\n\
    let viewController = ContactViewController()\nviewController.profile = profile\n\
    viewController.userid = userid\nviewController.modalPresentationStyle = .overCurrentContext\n\
    viewController.modalTransitionStyle = .crossDissolve\nself.present(viewController,\
    \ animated: true, completion: nil)\n}\n```\n\n## Complete Code\n\n```\n//\n//\
    \  ControllerViewController.swift\n//  Chat\n//\n//  Created by Shantanu Baruah\
    \ on 6/15/24.\n//\nimport UIKit\nclass ControllerViewController: UIViewController\
    \ {\nvar userid:String = \"\"\nlet contact:Contact = Contact()\nvar profile:Profile?\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\ncheckProfileExist()\n}\nfunc\
    \ checkProfileExist(){\ncontact.getICloudUserID { (userID, error) in\nif let error\
    \ = error {\nprint(\"Error: \\(error)\")\n} else if let userID = userID {\nself.userid\
    \ = userID\nself.contact.group.enter()\nself.contact.checkProfileExist(userID:\
    \ userID)\nself.contact.group.notify(queue: .main) { [self] in\nif(contact.profileExists){\n\
    self.profile = contact.profile\npopUpContact()\n}else{\npopUpProfile()\n}\n}\n\
    }\n}\n}\nfunc popUpProfile(){\nlet viewController = CreateProfileViewController()\n\
    viewController.userid = userid\nviewController.modalPresentationStyle = .overCurrentContext\n\
    viewController.modalTransitionStyle = .crossDissolve\nself.present(viewController,\
    \ animated: true, completion: nil)\n}\nfunc popUpContact(){\nlet viewController\
    \ = ContactViewController()\nviewController.profile = profile\nviewController.userid\
    \ = userid\nviewController.modalPresentationStyle = .overCurrentContext\nviewController.modalTransitionStyle\
    \ = .crossDissolve\nself.present(viewController, animated: true, completion: nil)\n\
    }\n}\n```\n\n## In Summary\n\nThis brings an end to our basic chat application\
    \ building chapter. The provided code outlines a basic structure for a chat-based\
    \ application using the Model-View-Controller (MVC) pattern.\n\n**The following\
    \ are the key components of the application:**\n\n-   `ControllerViewController`:\
    \ This is the main controller class that manages the application’s flow. It handles\
    \ user authentication, profile management, and navigation between different views.\n\
    -   `ContactTableViewCell`: A custom table view cell designed for displaying contact\
    \ information, including profile picture, name, and potentially a chat preview.\n\
    -   `ChatDetailsTableViewCell`: Another custom table view cell specifically designed\
    \ for displaying individual chat messages with details like sender, message content,\
    \ and timestamps.\n\n**We also explored the following core functionalities:**\n\
    \n-   **User authentication:** Checks for a user profile and presents either a\
    \ profile creation screen or a contact list\n-   **Contact list:** Displays a\
    \ list of contacts with basic information using the `ContactTableViewCell`\n-\
    \   **Chat details:** Presents a detailed view of a chat conversation using the\
    \ `ChatDetailsTableViewCell`\n\n**In implementing MVC pattern, we accomplished\
    \ the following:**\n\n-   The code demonstrates basic MVC principles by separating\
    \ concerns between the controller, view, and model (implied through the `Contact`\
    \ class and potential data structures).\n-   The use of table view cells for displaying\
    \ data aligns with the MVC pattern.\n\n### Where You Can Go from Here\n\nThe following\
    \ are the areas you can strengthen further to take your learning process to the\
    \ next dimension.\n\n#### Modal Layer\n\n-   Consider using a networking layer\
    \ for fetching data from external sources.\n\n#### View Layer\n\n-   Enhance the\
    \ UI with animations, transitions, and visual cues.\n-   Improve accessibility\
    \ by providing appropriate labels and hints for UI elements.\n-   Optimize the\
    \ layout and performance for different screen sizes and devices.\n\n#### Controller\
    \ Logic\n\n-   Implement error handling and edge case scenarios.\n-   Improve\
    \ code organization and readability through refactoring.\n-   Consider using design\
    \ patterns like MVVM or VIPER for larger and more complex applications.\n\n####\
    \ Data Management\n\n-   Implement efficient data fetching and caching mechanisms.\n\
    \n### User Experience\n\n-   Focus on user-friendly interactions and intuitive\
    \ navigation.\n-   Provide clear feedback to the user during loading or processing\
    \ tasks.\n\nHappy learning."
