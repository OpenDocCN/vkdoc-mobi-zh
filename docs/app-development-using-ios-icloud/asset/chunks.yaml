    ## Enabling Access to Photo Library and Camera


    To access the photo library and the camera, our code needs to take permission
    from the user, and to achieve this, we need to set certain properties in the `info.plist`.
    Without this, the code won’t work. Follow along the following steps to achieve
    the same.


    *   In your Xcode navigator, locate `info.plist`.


    ![](images/533539_2_En_5_Chapter/533539_2_En_5_Figa_HTML.jpg)


    *   Add a property “Privacy - Camera Usage Description”.


    *   In the value field, add your message. In our example, I added the following
    text “The App utilizes the camera functionality to capture an image, which serves
    as the user''s profile picture and is visible to other users.”


    *   Build and run your project


    # Drop-Down List


    A drop-down list is quite a useful feature that an iOS app developer can use while
    designing data input forms. In this chapter, we will design a drop-down list with
    the following features:


    *   Define a UI text field with an add icon left aligned to the text field.


    *   Defining the tap inside event on the UI text field to invoke the drop-down
    function.


    *   Upon user tapping, a hidden table will pop up, which is aligned to appear
    right at the bottom of the text field with all required values.


    *   User can also type directly in the text box, which will dynamically shorten
    or broaden the list.


    *   Once user select the desired value from the list, the table is hidden, and
    the selected value is displayed in the UI text field.


    In our example, we will assume we have a list of business types that the user
    can select to indicate the type of business the user has as a part of his profile
    creation. The following are the key elements:


    *   Define a class `Business` of type `NSObject` which will have all business
    type properties and methods


    *   Define a UI view controller with the name `CreateProfileViewController` to
    demonstrate the drop-down list feature


    *   Define a UI text field with the name `businessTypeTextField` and its associated
    methods where user can type the desired business type and the drop-down list will
    appear


    *   Define a UI table view with the name `businessTypeTableView` and its associated
    methods which will show a prepopulated business type


    ## Define the Business Class


    The `Business` class will have all the properties that define the business type
    and an initialization method to set the values. The following code defines the
    class and the initialization method:


    ```

    import UIKit

    class Business: NSObject{

    var businesstype:String!

    var businessdesc:String!

    var imagename:String!

    init(businesstype:String, businessdesc:String, imagename:String) {

    self.businesstype = businesstype

    self.businessdesc = businessdesc

    self.imagename = imagename

    }

    }

    ```


    The class name is `Business`, and it has three properties: the type of the business
    (`businesstype`), description of the business (`businessdesc`), and an image that
    will give a pictorial identification of the business type (`imagename`).


    The class also has a system-defined `init` method to initialize the values for
    the instantiated objects.'
