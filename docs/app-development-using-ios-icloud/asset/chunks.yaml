    \ published by the registered company APress Media, LLC, part of Springer Nature.\
    \  \nThe registered company address is: 1 New York Plaza, New York, NY 10004,\
    \ U.S.A.\n\n# Introduction\n\nBuild cutting-edge iOS apps with the latest iCloud\
    \ features! This is the second version of our earlier book *App Development Using\
    \ iOS iCloud*, which offers comprehensive coverage of iOS 17’s changes, empowering\
    \ you to create efficient, user-friendly applications.\n\nMaster enhanced asynchronous\
    \ iCloud database operations, leverage class extensions for streamlined development,\
    \ and implement robust MVC architecture principles in your code. Explore advanced\
    \ image manipulation, create engaging drop-down lists, and design expanding text\
    \ fields for optimal user experience. Also learn about advanced UI animations\
    \ and efficiently manage multiple database records.\n\nAlso, build a real-world\
    \ chat app to solidify your learning and discover the power of push notifications.\
    \ Elevate your iOS development skills and stay ahead of the curve with this new\
    \ edition.\n\nNew to this edition: in-depth exploration of iOS 17’s latest features,\
    \ updated code examples, and best practices for modern app development.\n\nWhat\
    \ you’ll learn:\n\n* **Master iCloud database operations:** Utilize iOS 17’s enhanced\
    \ query methods for efficient data management.\n* **Build robust app architecture:**\
    \ Implement the MVC design pattern for modular and maintainable code.\n* **Enhance\
    \ user experience:** Create visually appealing interfaces with drop-down lists,\
    \ expanding text fields, and advanced animations.\n* **Optimize image handling:**\
    \ Store, retrieve, and manipulate images effectively using iCloud.\n* **Leverage\
    \ iOS 17’s new features:** Explore class extensions and other tools to streamline\
    \ development.\n* **Write cleaner code:** Benefit from improved error handling\
    \ and a well-defined closure syntax.\n* **Develop feature-rich apps:** Build chat\
    \ functionality with iCloud public databases and implement push notifications.\n\
    \n## Who This Book Is For\n\nThis book is for iOS developers looking to master\
    \ advanced app development techniques using iCloud. Whether you’re building on\
    \ existing iOS knowledge or seeking to create cutting-edge applications, this\
    \ book provides the essential tools and insights to take your skills to the next\
    \ level.\n\n# Acknowledgments\n\n> Writing a book on technology is quite a time-consuming\
    \ task, for it is not just about writing your thoughts on paper but also writing\
    \ code and validating its completeness. I would like to thank my wife Kapila Sood\
    \ and my daughter Nitara Baruah for their undeterred support and patience as I\
    \ put together endless hours to bring this book to life. Their feedback on the\
    \ aesthetics of the app, which is an integral part of the book, and the outline\
    \ of the book content is invaluable.\n\n> I would also like to thank my mother\
    \ Meenu Baruah who discovered the writing itch in me quite early in my life and\
    \ has always encouraged me to pursue writing. While at times I remained uncertain,\
    \ she never doubted that one day I will be a published author. She is also the\
    \ first published author in our family, and I am certain I got my writing genes\
    \ from her.\n\n> I would also like to thank my father, late Sailender Nath Baruah,\
    \ who introduced me to the world of software back in the day when computers were\
    \ not ubiquitously available.\n\n> I cannot thank enough my Apress team for all\
    \ their help in making this book a reality: Miriam Haidara, who I pitched the\
    \ second version of the book; Sowmya Thodur, in helping with all coordination;\
    \ and Massimo, for reviewing my code and making sure it works as expected and\
    \ for providing valuable comments in reorganizing the chapters and content.\n\
    > \n> —Shantanu Baruah\n\n# About the Authors  \n# About the Technical Reviewer\n\
    \n# 1. Introduction\n\nThank you for reading and liking our book *App Development\
    \ Using iOS iCloud*. When we wrote this book in 2023, the iOS version was at 15.\
    \ Since then, iOS has released two major versions and several minor versions.\
    \ This book is an update to our previous book to provide details on all the changes\
    \ that are pivotal to enhance your code quality and experience. The following\
    \ are the key areas we are going to cover in this book.\n\n## Enhanced Asynchronous\
    \ iCloud Database Operations\n\niOS 17 has introduced several new block methods\
    \ (`recordMatchedBlock` and `queryResultBlock`) to improve query efficiency and\
    \ effectiveness. These block methods dramatically reduce lines of code and have\
    \ a well-defined closure syntax. Once the query completes, the return block has\
    \ a case-based return statement default definition of conditions such as success\
    \ and failure. The blocks also have enhanced its error handling capabilities.\n\
    \nThe book will have a chapter dedicated to this. We will update all queries from\
    \ the previous book with the new block-based query structures.\n\n## Class Extension\n\
    \nClass extension is not new to iOS 17 but was not covered in our first version\
    \ of the book. Class extension is a property tool. Based on the object-oriented\
    \ principle, extensions add new functionality to an existing class.\n\nChapter\
    \ [3](#533539_2_En_3_Chapter.xhtml) will focus on creating class-level procedures,\
    \ defining properties, and declaring class-level protocols. Our example will create\
    \ an image picker controller delegate and a UI navigation controller delegate\
    \ as class extension, allowing users to set an image to an image object.\n\n##\
    \ Model-View-Controller Design Framework\n\nModel-View-Controller (MVC) is a design\
    \ pattern which fits well for Cocoa applications. MVC design patterns make the\
    \ code modular easy to read.\n\nWe will have a chapter dedicated to MVC architecture\
    \ implementation in Xcode. We will use a model class for persisting data, a controller\
    \ for navigation, and a view for screen display and presentation.\n\n## Image\
    \ Manipulation\n\niCloud provides an option to store binary objects such as images.\
    \ The book will have a chapter dedicated to image manipulation.\n\nWe will learn\
    \ about uploading an image from a photo library or taking pictures from the phone\
    \ camera and storing the picture binary content in iCloud repository (asset type).\
    \ We will also learn about the configuration changes (`info.plist`) required for\
    \ allowing users to access the camera and photo library. We will also learn about\
    \ image manipulation in this chapter."
