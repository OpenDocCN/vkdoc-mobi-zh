    # 8. Animated View


    Animations are a fundamental part of iOS programming and help improve user experience
    as within your app user transitions between views. Based on the type of animation,
    it would also provide clarity to the user by communicating the user about their
    action.


    In the example below, we will demonstrate animation using the system-defined function
    **animate**. We will draw a view controller with a button on it. When the user
    taps the button, it will open another view, which will animate as it displays
    on the screen.


    ## Define the Main View Controller


    ```

    class firstViewController: UIViewController {

    ```


    The code above defines a UIViewController with the name **firstViewController**


    ## Define the UI Objects


    ```

    private let animatedView: UIView = {

    let view = UIView()

    view.translatesAutoresizingMaskIntoConstraints = false

    view.backgroundColor = .systemGray6

    view.alpha = 0.0

    view.center = view.center

    return view

    }()

    ```


    The code above defines a custom view which will be animated to demonstrate the
    animated feature. We are making the background of the view gray and putting the
    view in the center of the current view controller.


    ```

    let viewButton:UIButton = {

    let uiButton  = UIButton()

    uiButton.translatesAutoresizingMaskIntoConstraints = false

    uiButton.setImage(UIImage(systemName: "doc.viewfinder.fill"), for: .normal)

    return uiButton

    }()

    ```


    Next, we are defining the button. Upon tapping the button, we will open the custom
    view with animation. Button is displayed as an image using a system-defined image
    called **doc.viewfinder.fill**.


    ## Define Lifecycle Methods


    ```

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(true)

    setup()

    drawAnimation()

    }

    ```


    The above-defined method **viewWillAppear** is a system function classified as
    a lifecycle method of **UIViewController**. Unlike **viewDidLoad**, which is only
    called once per app session, **viewWillAppear** is called every time whenever
    the view controller is invoked.


    We are calling two custom methods from this method. The first method is **setup**()
    to initialize a few elements before the view controller is displayed and the **drawAnimation**()
    function, which will draw the button on the screen.


    ```

    setup(){

    viewButton.addTarget(self, action: #selector(animateView), for: .touchUpInside)

    }

    ```


    In the above method, we are adding a custom target function to the button **viewButton**
    called **animateView**, which will be invoked when the user taps the button (
    **touchUpInside event**).


    ```

    func drawAnimation(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    let screenHeight = screensize.height

    view.addSubview(viewButton)

    let constraints = [

    viewButton.topAnchor.constraint(equalTo: view.topAnchor, constant: 25),

    viewButton.leftAnchor.constraint(equalTo: profileImageView.rightAnchor, constant:
    5),

    viewButton.widthAnchor.constraint(equalToConstant: 80),

    viewButton.heightAnchor.constraint(equalToConstant: 80)

    ]

    NSLayoutConstraint.activate(constraints)

    }

    ```


    The code above draws the button on the screen. The target action is already defined
    for the button. Upon user pressing on the button, the animated view would open
    with the preset animation.'
