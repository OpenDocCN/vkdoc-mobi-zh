    \    - `chatButton` 放置在`nameButton`下方，`profileImageView`的右侧。\n\n```swift\noverride\
    \ func awakeFromNib() {\nsuper.awakeFromNib()\n// 初始化代码\n}\noverride func setSelected(_\
    \ selected: Bool, animated: Bool) {\nsuper.setSelected(selected, animated: animated)\n\
    let screensize: CGRect = UIScreen.main.bounds\nlet screenWidth = screensize.width\n\
    contentView.addSubview(profileImageView)\nlet constraints = [\nprofileImageView.topAnchor.constraint(equalTo:\
    \ contentView.topAnchor, constant: 5),\nprofileImageView.leftAnchor.constraint(equalTo:\
    \ contentView.leftAnchor, constant: 5),\nprofileImageView.widthAnchor.constraint(equalToConstant:\
    \ 120),\nprofileImageView.heightAnchor.constraint(equalToConstant: 120)\n]\nNSLayoutConstraint.activate(constraints)\n\
    contentView.addSubview(nameButton)\nlet constraints1 = [\nnameButton.topAnchor.constraint(equalTo:\
    \ contentView.topAnchor, constant: 5),\nnameButton.leftAnchor.constraint(equalTo:\
    \ profileImageView.rightAnchor, constant: 5),\nnameButton.widthAnchor.constraint(equalToConstant:\
    \ screenWidth),\nnameButton.heightAnchor.constraint(equalToConstant: 20)\n]\n\
    NSLayoutConstraint.activate(constraints1)\ncontentView.addSubview(chatButton)\n\
    let constraints5 = [\nchatButton.topAnchor.constraint(equalTo: nameButton.bottomAnchor,\
    \ constant: 5),\nchatButton.leftAnchor.constraint(equalTo: profileImageView.rightAnchor,\
    \ constant: 10),\nchatButton.widthAnchor.constraint(equalToConstant: 80),\nchatButton.heightAnchor.constraint(equalToConstant:\
    \ 80)\n]\nNSLayoutConstraint.activate(constraints5)\n}\n}\n```\n"
