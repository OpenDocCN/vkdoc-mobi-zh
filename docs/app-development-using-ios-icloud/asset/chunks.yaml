- fmt: '### `TextView` Methods


    There are two methods we have in this section. The first one is called when the
    user starts editing the text view, and the second one expands and contracts the
    text view based on the text length.


    ```

    func textViewDidBeginEditing(_ textView: UITextView) {

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    shellTextView.removeConstraints(shellTextView.constraints)

    shellTextView.removeFromSuperview()

    shellSaveButton.removeConstraints(shellSaveButton.constraints)

    shellSaveButton.removeFromSuperview()

    view.addSubview(chatTextView)

    NSLayoutConstraint.activate([

    chatTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -340),

    chatTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    chatTextView.widthAnchor.constraint(equalToConstant: screenWidth - 40),

    chatTextView.heightAnchor.constraint(equalToConstant: 40)

    ])

    chatTextView.becomeFirstResponder()

    // Set up a notification observer to handle text changes

    NotificationCenter.default.addObserver(self, selector: #selector(handleTextChange),
    name: UITextView.textDidChangeNotification, object: chatTextView)

    view.addSubview(saveButton)

    let constraints3 = [

    saveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant: -370),

    saveButton.leftAnchor.constraint(equalTo: chatTextView.rightAnchor, constant:
    5),

    saveButton.rightAnchor.constraint(equalToSystemSpacingAfter: chatTextView.rightAnchor,
    multiplier: 40),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    saveButton.setImage(UIImage(systemName: "paperplane.fill"), for: .normal)

    saveButton.addTarget(self, action: #selector(saveChatAction), for: .touchUpInside)

    }

    ```


    The above method is a system-defined method, which will be invoked when the user
    begins typing into the text view. Please note that this will be only called when
    the class extends the `UITextViewDelegate`, as explained before. The following
    are the key call outs of this function:


    - We remove the `shellTextView` and the `shellSaveButton`.

    - Next, we are drawing the actual text view and the button, `chatTextView` and
    `saveButton` at the exact position where the `shellTextView` and the `shellSaveButton`
    are.

    - We are also defining the touch up inside event for the button, which will call
    the `saveChatAction` method.


    ```

    @objc private func handleTextChange() {

    if(chatTextView.text.trimmingCharacters(in: .whitespaces).count == 0){

    saveButton.isEnabled = false

    }else{

    saveButton.isEnabled = true

    }

    let size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)

    let estimatedSize = chatTextView.sizeThatFits(size)

    chatTextView.constraints.forEach { (constraint) in

    if constraint.firstAttribute == .height {

    constraint.constant = estimatedSize.height

    }

    }

    }

    ```


    The above code is a system-defined method, which is called every time a user adds
    or deletes a character. There are a few things happening in this block of code
    as explained below:


    - If a user has typed a character other than a blank space, the save button is
    enabled. If user types and backspace to delete the typed character, the save button
    is again disabled. This is done to make sure user doesn’t accidently save a blank
    string.

    - Next, we are defining a size object, which is the width of the screen. Thirty
    pixels are subtracted, which is the width of the save button. Essentially, we
    are defining initial size as the original size of the displayed text view, which
    can infinitely grow.

    - Next, we are defining the estimated size of the new text view based on the length
    of user-provided text. This is drawn from the system-defined function called `sizeThatFits`
    that is available for any text view.

    - Finally, we are dynamically changing the height constraint of our `chatTextView`
    by iterating through all constraints and looking for the height constraint. Once
    found, we are assigning the `chatTextView` height as the `estimatedSize` object
    height.


    ### Button Method


    This is the system-defined event touch up inside. We have already set `saveChatAction()`
    as the target function when user clicks on the button.


    ```

    @objc func saveChatAction(sender: UIButton){

    }

    ```


    This function is intentionally left blank. You can implement it based on your
    application needs, like saving the text to a persistent database.


    ### Complete Code of `TextView` Expand


    Below is the complete code of the text view expanding function as discussed in
    the section above.'
