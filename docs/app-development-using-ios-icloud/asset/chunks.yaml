    business in return business.businesstype.trimmingCharacters(in: .whitespaces).lowercased().contains(sender.text!.lowercased())

    }

    if(sender.text == ""){

    business = tempBusiness

    }

    businessTypeTableView.reloadData()

    }

    ```


