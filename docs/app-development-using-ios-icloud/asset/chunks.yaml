    This method is responsible for laying out the UI elements defined in the previous
    code snippets onto the main view using Auto Layout constraints. The detail of
    the code is given below:


    *   **Calculate screen size:** Gets the dimensions of the main screen.


    *   **Add Subviews**: Adds each UI element (header label, profile image, text
    fields, table view, save button, and tab bar) as a **subview** of the main view


    *   **Create constraints:** For each UI element, creates an array of **NSLayoutConstraints**
    to define its position and size relative to other elements or the view itself


    *   **Activate constraints:** Activates the created constraints to apply the layout
    to the UI elements


    *   **Add target for save button:** Adds a target action to the save button to
    trigger the **saveAction** method when the button is tapped


    Please note, for multiple UI elements with similar constraints, you can consider
    using a helper function to create constraints more efficiently. Try creating a
    helper method in your code.


    ```

    func drawProfileCreationScreen(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    view.addSubview(headerLabel)

    let constraints = [

    headerLabel.topAnchor.constraint(equalTo: view.topAnchor, constant: 30),

    headerLabel.widthAnchor.constraint(equalToConstant: screenWidth),

    headerLabel.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints)

    view.addSubview(personalProfileImageView)

    let constraints2 = [

    personalProfileImageView.topAnchor.constraint(equalTo: headerLabel.bottomAnchor,
    constant: 5),

    personalProfileImageView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    140),

    personalProfileImageView.widthAnchor.constraint(equalToConstant: 100),

    personalProfileImageView.heightAnchor.constraint(equalToConstant: 100)

    ]

    NSLayoutConstraint.activate(constraints2)

    NSLayoutConstraint.activate(constraints2)

    view.addSubview(nameTextField)

    let constraints3 = [

    nameTextField.topAnchor.constraint(equalTo: personalProfileImageView.bottomAnchor,
    constant: 10),

    nameTextField.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    nameTextField.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    nameTextField.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    view.addSubview(businessNameTextField)

    let constraints4 = [

    businessNameTextField.topAnchor.constraint(equalTo: nameTextField.bottomAnchor,
    constant: 10),

    businessNameTextField.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessNameTextField.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessNameTextField.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints4)

    view.addSubview(businessTypeTextField)

    let constraints5 = [

    businessTypeTextField.topAnchor.constraint(equalTo: businessNameTextField.bottomAnchor,
    constant: 10),

    businessTypeTextField.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTextField.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTextField.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints5)

    view.addSubview(businessTypeTableView)

    let constraints6 = [

    businessTypeTableView.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor,
    constant: 0),

    businessTypeTableView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    5),

    businessTypeTableView.widthAnchor.constraint(equalToConstant: screenWidth - 10),

    businessTypeTableView.heightAnchor.constraint(equalToConstant: 300)

    ]

    NSLayoutConstraint.activate(constraints6)

    view.addSubview(saveButton)

    let constraints7 = [

    saveButton.topAnchor.constraint(equalTo: businessTypeTextField.bottomAnchor, constant:
    40),

    saveButton.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 100),

    saveButton.widthAnchor.constraint(equalToConstant: 185),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints7)

    saveButton.addTarget(self, action: #selector(saveAction), for: .touchUpInside)

    view.addSubview(tabBar)

    let constraints8 = [

    tabBar.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: 5),

    tabBar.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    tabBar.widthAnchor.constraint(equalToConstant: screenWidth),

    tabBar.heightAnchor.constraint(equalToConstant: 80)

    ]

    NSLayoutConstraint.activate(constraints8)

    }

