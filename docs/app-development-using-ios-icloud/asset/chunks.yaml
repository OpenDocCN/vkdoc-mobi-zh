- fmt: "# Get Last Chat Method\n\nThis function retrieves the last chat message from\
    \ each chat table (either personal or business) and updates the corresponding\
    \ `Chattable` or `Businesstable` object with the last chat message. Once all chat\
    \ tables have been processed, it calls the `setup()` and `drawInitialScreen()`\
    \ functions. The following are the code details:\n\n- **Create conversation object:**\
    \ Initializes a `Conversation` object to interact with chat data\n- **Initialize\
    \ counter:** Sets a counter variable to track the number of processed chat tables\n\
    - **Conditional check:** Determines whether to process personal or business chat\
    \ tables based on the `fromWhere` parameter\n- **Iterate through chat tables:**\
    \ Iterates through either `chattables` or `businesstables` depending on the `fromWhere`\
    \ parameter\n  - For each chat table:\n    - Calls `getlastChat` to retrieve the\
    \ last chat message from the current chat table.\n    - Handles potential errors.\n\
    \    - If successful, it updates the `lastchat` property of the current `Chattable`\
    \ or `Businesstable` object with the retrieved chat message.\n    - Checks if\
    \ all chat tables have been processed:\n      - If the current counter equals\
    \ the total number of chat tables, it calls `setup()` and `drawInitialScreen()`.\n\
    \      - Otherwise, it increments the counter.\n\n```\nfunc getlastChatFromChatTable(fromWhere:\
    \ String){\nlet chat:Conversation = Conversation()\nvar counter:Int = 1\nif(fromWhere\
    \ == \"Personal\"){\nfor chattable in chattables{\nchat.getlastChat(chattablename:\
    \ chattable.chattablename) { [self] (chats, error) in\nif let error = error {\n\
    print(\"Error: \\(error)\")\n}else{\nif(chats.count > 0){\nchattable.lastchat\
    \ = chats[0].chattext\n}\nif(chattables.count == counter){\nsetup()\ndrawInitialScreen()\n\
    }else{\ncounter = counter + 1\n}\n}\n}\n}\n}else{\nfor chattable in businesstables{\n\
    chat.getlastChat(chattablename: chattable.chattablename) { [self] (chats, error)\
