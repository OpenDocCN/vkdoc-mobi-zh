- fmt: '### Text View Event Methods


    This function is triggered when the user starts editing the `shellTextView`. Its
    primary goal is to transition from the initial state (with placeholders) to an
    active chat input state. Please see the code breakdown below:


    - **Remove placeholder elements:** Removes constraints and subviews for the `shellTextView`
    and `shellSaveButton` to clear the placeholder area.

    - **Add chat text view:** Adds the `chatTextView` as a subview and sets its constraints
    to position it at the bottom of the view.

    - **Activate text input:** Makes the `chatTextView` the first responder to enable
    keyboard input.

    - **Set up notification observer:** Adds a notification observer to monitor text
    changes in the `chatTextView` using `UITextView.textDidChangeNotification`.

    - **Add save button:** Adds the `saveButton` as a subview and sets its constraints
    to position it to the right of the `chatTextView`.

    - **Configure save button:** Sets the image for the `saveButton` and adds a target
    action for the `saveChatAction` method.


    ```

    func textViewDidBeginEditing(_ textView: UITextView) {

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    shellTextView.removeConstraints(shellTextView.constraints)

    shellTextView.removeFromSuperview()

    shellSaveButton.removeConstraints(shellSaveButton.constraints)

    shellSaveButton.removeFromSuperview()

    view.addSubview(chatTextView)

    NSLayoutConstraint.activate([

    chatTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -340),

    chatTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    chatTextView.widthAnchor.constraint(equalToConstant: screenWidth - 40),

    chatTextView.heightAnchor.constraint(equalToConstant: 40)

    ])

    chatTextView.becomeFirstResponder()

    // Set up a notification observer to handle text changes

    NotificationCenter.default.addObserver(self, selector: #selector(handleTextChange),
    name: UITextView.textDidChangeNotification, object: chatTextView)

    view.addSubview(saveButton)

    let constraints3 = [

    saveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant: -370),

    saveButton.leftAnchor.constraint(equalTo: chatTextView.rightAnchor, constant:
    5),

    saveButton.rightAnchor.constraint(equalToSystemSpacingAfter: chatTextView.rightAnchor,
    multiplier: 40),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    saveButton.setImage(UIImage(systemName: "paperplane.fill"), for: .normal)

    saveButton.addTarget(self, action: #selector(saveChatAction), for: .touchUpInside)

    }

    ```


    ### Event Function handleTextChange()


    The `handleTextChange()` function is responsible for updating the UI in response
    to changes in the `chatTextView`''s text content. The code breakdown is given
    below:


    - **Enable/disable save button:** Checks if the trimmed text in the `chatTextView`
    is empty. If empty, it disables the `saveButton`; otherwise, it enables it.

    - **Calculate text view height:** Calculates the estimated size of the `chatTextView`
    based on its content to adjust its height dynamically.

    - **Update text view height constraint:** Iterates over the constraints of the
    `chatTextView` and updates the height constraint based on the calculated estimated
    size.


    ```

    @objc private func handleTextChange() {

    if(chatTextView.text.trimmingCharacters(in: .whitespaces).count == 0){

    saveButton.isEnabled = false

    }else{

    saveButton.isEnabled = true

    }

    let size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)

    let estimatedSize = chatTextView.sizeThatFits(size)

    chatTextView.constraints.forEach { (constraint) in

    if constraint.firstAttribute == .height {

    constraint.constant = estimatedSize.height

    }

    }

    }

    ```


    ### Save Chat Event Method


    This function handles the logic for saving a new chat message and updating the
    UI. The code breakdown is given below:


    **Create new chat object:** Creates a new conversation object with the entered
    text and originator ID.


    **Disable text input and save button:** Disables editing for the `chatTextView`
    and disables the `saveButton` to prevent accidental resubmission.


    **Reset chat text view:** Clears the text content, removes constraints, and removes
    the `chatTextView` from the superview.


    **Restore placeholder elements:** Adds the placeholder `shellTextView`, sets its
    constraints, and re-enables it.


    **Add new chat to array:** Appends the newly created chat object to the chats
    array.


    **Reload chat table view:** Reloads the data in the `chatTableView` to reflect
    the new message.


    **Re-enable text input and save button:** Enables editing for the `chatTextView`
    and re-enables the `saveButton`.


    **Restore placeholder save button:** Adds the placeholder `shellSaveButton`, sets
    its constraints, and re-configures it.


    **Determine originator name:** Sets the `on` variable based on the presence of
    `recipientProfileImageBanner` to display the appropriate originator name.


    **Scroll to last row:** Call `scrollToLastRow()` to ensure the new message is
    visible.


    **Check chat table existence (asynchronous):** Uses the `chatTableExists` method
    of the chat object to check if a conversation table exists in the cloud for the
    recipient and handles potential errors during the check. Based on the result:

    - **Record exists:** If a table exists, enter the chat group and call `saveNewChatToCloud`
    to create a new chat entry with basic information.

    - **Record doesn’t exist:** If the table doesn''t exist, enter the chat group
    and call `saveNewChatRecordsToCloud` to create the chat table and save the first
    message along with additional profile information.


    **Notification upon completion:** Uses a completion closure to print messages
    upon successful or unsuccessful operations.'
  raw: '#### Text View Event Methods


    This function is triggered when the user starts editing the **shellTextView**.
    Its primary goal is to transition from the initial state (with placeholders) to
    an active chat input state. Please see the code breakdown below:


    *   **Remove placeholder elements:** Removes constraints and **subviews** for
    the **shellTextView** and **shellSaveButton** to clear the placeholder area


    *   **Add chat text view:** Adds the **chatTextView** as a **subview** and sets
    its constraints to position it at the bottom of the view


    *   **Activate text input:** Makes the **chatTextView** the first responder to
    enable keyboard input


    *   **Set up notification observer:** Adds a notification observer to monitor
    text changes in the **chatTextView** using **UITextView.textDidChangeNotification**


    *   **Add save button:** Adds the **saveButton** as a **subview** and sets its
    constraints to position it to the right of the **chatTextView**


    *   **Configure save button:** Sets the image for the **saveButton** and adds
    a target action for the **saveChatAction** method


    ```

    func textViewDidBeginEditing(_ textView: UITextView) {

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    shellTextView.removeConstraints(shellTextView.constraints)

    shellTextView.removeFromSuperview()

    shellSaveButton.removeConstraints(shellSaveButton.constraints)

    shellSaveButton.removeFromSuperview()

    view.addSubview(chatTextView)

    NSLayoutConstraint.activate([

    chatTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -340),

    chatTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    chatTextView.widthAnchor.constraint(equalToConstant: screenWidth - 40),

    chatTextView.heightAnchor.constraint(equalToConstant: 40)

    ])

    chatTextView.becomeFirstResponder()

    // Set up a notification observer to handle text changes

    NotificationCenter.default.addObserver(self, selector: #selector(handleTextChange),
    name: UITextView.textDidChangeNotification, object: chatTextView)

    view.addSubview(saveButton)

    let constraints3 = [

    saveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant: -370),

    saveButton.leftAnchor.constraint(equalTo: chatTextView.rightAnchor, constant:
    5),

    saveButton.rightAnchor.constraint(equalToSystemSpacingAfter: chatTextView.rightAnchor,
    multiplier: 40),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    saveButton.setImage(UIImage(systemName: "paperplane.fill"), for: .normal)

    saveButton.addTarget(self, action: #selector(saveChatAction), for: .touchUpInside)

    }

    ```


    #### Event Function handleTextChange()


    The **handleTextChange**() function is responsible for updating the UI in response
    to changes in the **chatTextView’s** text content. The code breakdown is given
    below:


    *   **Enable/disable save button:** Checks if the trimmed text in the **chatTextView**
    is empty. If empty, it disables the **saveButton**; otherwise, it enables it.


    *   **Calculate text view height:** Calculates the estimated size of the **chatTextView**
    based on its content to adjust its height dynamically.


    *   **Update text view height constraint:** Iterates over the constraints of the
    **chatTextView** and updates the height constraint based on the calculated estimated
    size


    ```

    @objc private func handleTextChange() {

    if(chatTextView.text.trimmingCharacters(in: .whitespaces).count == 0){

    saveButton.isEnabled = false

    }else{

    saveButton.isEnabled = true

    }

    let size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)

    let estimatedSize = chatTextView.sizeThatFits(size)

    chatTextView.constraints.forEach { (constraint) in

    if constraint.firstAttribute == .height {

    constraint.constant = estimatedSize.height

    }

    }

    }

    ```


    #### Save Chat Event Method


    This function handles the logic for saving a new chat message and updating the
    UI. The code breakdown is given below:


    **Create new chat object:** Creates a new conversation object with the entered
    text and originator ID


    **Disable text input and save button:** Disables editing for the **chatTextView**
    and disables the **saveButton** to prevent accidental resubmission


    **Reset chat text view:** Clears the text content, removes constraints, and removes
    the **chatTextView** from the **superview**


    **Restore placeholder elements:** Adds the placeholder **shellTextView**, sets
    its constraints, and re-enables it


    **Add new chat to array:** Appends the newly created chat object to the chats
    array


    **Reload chat table view:** Reloads the data in the **chatTableView** to reflect
    the new message


    **Re-enable text input and save button:** Enables editing for the **chatTextView**
    and re-enables the **saveButton**


    **Restore placeholder save button:** Adds the placeholder **shellSaveButton**,
    sets its constraints, and re-configures it


    **Determine originator name:** Sets the on variable based on the presence of **recipientProfileImageBanner**
    to display the appropriate originator name


    **Scroll to last row:** Call **scrollToLastRow()** to ensure the new message is
    visible


    **Check chat table existence (asynchronous):** Uses the **chatTableExists** method
    of the chat object to check if a conversation table exists in the cloud for the
    recipient and handles potential errors during the check. And based on the result:


    *   **Record exists:** If a table exists, enter the chat group and call **saveNewChatToCloud**
    to create a new chat entry with basic information.


    *   **Record doesn’t exist:** If the table doesn’t exist, enter the chat group
    and call **saveNewChatRecordsToCloud** to create the chat table and save the first
    message along with additional profile information.


    **Notification upon completion:** Uses a completion closure to print messages
    upon successful or unsuccessful operations'
  trans: '

    ### 文本视图事件方法


    当用户开始编辑`shellTextView`时触发此功能。其主要目标是从初始状态（含占位符）过渡到活跃的聊天输入状态。请参阅下方代码分解：


    - **移除占位符元素：** 移除`shellTextView`和`shellSaveButton`的约束及子视图，以清除占位区域。

    - **添加聊天文本视图：** 将`chatTextView`添加为子视图并设置其约束，使其位于视图底部。

    - **激活文本输入：** 让`chatTextView`成为第一响应者以启用键盘输入。

    - **设置通知观察者：** 添加一个通知观察者，通过`UITextView.textDidChangeNotification`监控`chatTextView`中的文本变化。

    - **添加保存按钮：** 将`saveButton`添加为子视图并设置其约束，使其位于`chatTextView`右侧。

    - **配置保存按钮：** 为`saveButton`设置图像，并为`saveChatAction`方法添加目标动作。


    ```

    func textViewDidBeginEditing(_ textView: UITextView) {

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    shellTextView.removeConstraints(shellTextView.constraints)

    shellTextView.removeFromSuperview()

    shellSaveButton.removeConstraints(shellSaveButton.constraints)

    shellSaveButton.removeFromSuperview()

    view.addSubview(chatTextView)

    NSLayoutConstraint.activate([

    chatTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor, constant: -340),

    chatTextView.leftAnchor.constraint(equalTo: view.leftAnchor, constant: 5),

    chatTextView.widthAnchor.constraint(equalToConstant: screenWidth - 40),

    chatTextView.heightAnchor.constraint(equalToConstant: 40)

    ])

    chatTextView.becomeFirstResponder()

    // 设置通知观察者以处理文本变化

    NotificationCenter.default.addObserver(self, selector: #selector(handleTextChange),
    name: UITextView.textDidChangeNotification, object: chatTextView)

    view.addSubview(saveButton)

    let constraints3 = [

    saveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant: -370),

    saveButton.leftAnchor.constraint(equalTo: chatTextView.rightAnchor, constant:
    5),

    saveButton.rightAnchor.constraint(equalToSystemSpacingAfter: chatTextView.rightAnchor,
    multiplier: 40),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints3)

    saveButton.setImage(UIImage(systemName: "paperplane.fill"), for: .normal)

    saveButton.addTarget(self, action: #selector(saveChatAction), for: .touchUpInside)

    }

    ```


    ### 事件函数 handleTextChange()


    `handleTextChange()` 函数负责响应`chatTextView`文本内容的变化来更新界面。下方是代码分解：


    - **启用/禁用保存按钮：** 检查`chatTextView`中去除空白后的文本是否为空。如果为空，则禁用`saveButton`；否则，启用它。

    - **计算文本视图高度：** 根据`chatTextView`的内容计算其预估大小，以动态调整高度。

    - **更新文本视图高度约束：** 遍历`chatTextView`的约束，并根据计算出的预估大小更新高度约束。


    ```

    @objc private func handleTextChange() {

    if(chatTextView.text.trimmingCharacters(in: .whitespaces).count == 0){

    saveButton.isEnabled = false

    }else{

    saveButton.isEnabled = true

    }

    let size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)

    let estimatedSize = chatTextView.sizeThatFits(size)

    chatTextView.constraints.forEach { (constraint) in

    if constraint.firstAttribute == .height {

    constraint.constant = estimatedSize.height

    }

    }

    }

    ```


    ### 保存聊天事件方法


    此函数处理保存新聊天消息并更新界面的逻辑。下方是代码分解：


    **创建新聊天对象：** 使用输入的文本和发起者 ID 创建一个新的对话对象。


    **禁用文本输入和保存按钮：** 禁用`chatTextView`的编辑功能并禁用`saveButton`，以防止意外重复提交。


    **重置聊天文本视图：** 清除文本内容，移除约束，并将`chatTextView`从父视图中移除。


    **恢复占位符元素：** 添加占位符`shellTextView`，设置其约束，并重新启用它。


    **将新聊天添加到数组：** 将新创建的聊天对象追加到聊���数组中。


    **重新加载聊天表格视图：** 重新加载`chatTableView`中的数据以反映新消息。


    **重新启用文本输入和保存按钮：** 启用`chatTextView`的编辑功能并重新启用`saveButton`。


    **恢复占位符保存按钮：** 添加占位符`shellSaveButton`，设置其约束，并重新配置它。


    **确定发起者名称：** 根据是否存在`recipientProfileImageBanner`来设置`on`变量，以显示相应的发起者名称。


    **滚动到最后一行：** 调用`scrollToLastRow()`以确保新消息可见。


    **检查聊天表格是否存在（异步）：** 使用聊天对象的`chatTableExists`方法检查收件人云端是否存在对话表格，并处理检查过程中可能的错误。根据结果：

    - **记录存在：** 如果表格存在，则进入聊天组并调用`saveNewChatToCloud`创建包含基本信息的新聊天条目。

    - **记录不存在：** 如果表格不存在，则进入聊天组并调用`saveNewChatRecordsToCloud`创建聊天表格，保存第一条消息并附上额外的个人资料信息。


    **完成通知：** 使用完成闭包在操作成功或失败时打印消息。

