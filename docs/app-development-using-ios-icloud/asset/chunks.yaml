    \ 40)\n        ])\n        chatTextView.becomeFirstResponder()\n\n        NotificationCenter.default.addObserver(self,\
    \ selector: #selector(handleTextChange), name: UITextView.textDidChangeNotification,\
    \ object: chatTextView)\n\n        view.addSubview(saveButton)\n        let constraints3\
    \ = [\n            saveButton.topAnchor.constraint(equalTo: view.bottomAnchor,\
    \ constant: -370),\n            saveButton.leftAnchor.constraint(equalTo: chatTextView.rightAnchor,\
    \ constant: 5),\n            saveButton.rightAnchor.constraint(equalToSystemSpacingAfter:\
    \ chatTextView.rightAnchor, multiplier: 40),\n            saveButton.heightAnchor.constraint(equalToConstant:\
    \ 40)\n        ]\n        NSLayoutConstraint.activate(constraints3)\n        saveButton.setImage(UIImage(systemName:\
    \ \"paperplane.fill\"), for: .normal)\n        saveButton.addTarget(self, action:\
    \ #selector(saveChatAction), for: .touchUpInside)\n    }\n\n    @objc private\
    \ func handleTextChange() {\n        if chatTextView.text.trimmingCharacters(in:\
    \ .whitespaces).count == 0 {\n            saveButton.isEnabled = false\n     \
    \   } else {\n            saveButton.isEnabled = true\n        }\n        let\
    \ size = CGSize(width: UIScreen.main.bounds.width - 30, height: .infinity)\n \
    \       let estimatedSize = chatTextView.sizeThatFits(size)\n        chatTextView.constraints.forEach\
    \ { constraint in\n            if constraint.firstAttribute == .height {\n   \
    \             constraint.constant = estimatedSize.height\n            }\n    \
    \    }\n    }\n\n    @objc func saveChatAction(sender: UIButton) {\n        let\
    \ chat = Conversation(chattext: chatTextView.text, originatorid: profile?.userid)\n\
    \        chatTextView.isEditable = false\n        saveButton.isEnabled = false\n\
    \        let screensize: CGRect = UIScreen.main.bounds\n        let screenWidth\
    \ = screensize.width\n\n        chatTextView.resignFirstResponder()\n        chatTextView.text\
    \ = \"\"\n        chatTextView.removeConstraints(chatTextView.constraints)\n \
    \       chatTextView.removeFromSuperview()\n        saveButton.removeConstraints(saveButton.constraints)\n\
    \        saveButton.removeFromSuperview()\n\n        shellTextView.delegate =\
    \ self\n        view.addSubview(shellTextView)\n        NSLayoutConstraint.activate([\n\
    \            shellTextView.bottomAnchor.constraint(equalTo: view.bottomAnchor,\
    \ constant: -40),\n            shellTextView.leftAnchor.constraint(equalTo: view.leftAnchor,\
    \ constant: 5),\n            shellTextView.widthAnchor.constraint(equalToConstant:\
    \ screenWidth - 40),\n            shellTextView.heightAnchor.constraint(equalToConstant:\
    \ 40)\n        ])\n\n        chats.append(chat)\n        chatTableView.reloadData()\n\
    \        chatTextView.isEditable = true\n        saveButton.isEnabled = true\n\
    \n        view.addSubview(shellSaveButton)\n        let constraints3 = [\n   \
    \         shellSaveButton.topAnchor.constraint(equalTo: view.bottomAnchor, constant:\
    \ -70),\n            shellSaveButton.leftAnchor.constraint(equalTo: shellTextView.rightAnchor,\
    \ constant: 5),\n            shellSaveButton.rightAnchor.constraint(equalToSystemSpacingAfter:\
    \ shellTextView.rightAnchor, multiplier: 40),\n            shellSaveButton.heightAnchor.constraint(equalToConstant:\
    \ 40)\n        ]\n        NSLayoutConstraint.activate(constraints3)\n        shellSaveButton.setImage(UIImage(systemName:\
    \ \"paperplane.fill\"), for: .normal)\n\n        var on: String = \"\"\n     \
    \   if recipientProfileImageBanner != nil {\n            on = originatorname\n\
    \        } else {\n            on = (profile?.name)!\n        }\n        scrollToLastRow()\n\
    \n        chat.chatTableExists(receipentname: businessname, originatorname: on)\
    \ { [self] (recordExists, error) in\n            if let error = error {\n    \
    \            print(error.localizedDescription)\n                chat.group.enter()\n\
    \                if recipientProfileImageBanner != nil {\n                   \
    \ chat.saveNewChatRecordsToCloud(receipentname: businessname, originatorname:\
    \ originatorname, receipentprofile: recipientProfileImage!, originatorprofile:\
    \ (profile?.personalprofile)!, lastchat: chatTextView.text)\n                }\
    \ else {\n                    chat.saveNewChatRecordsToCloud(receipentname: businessname,\
    \ originatorname: (profile?.name)!, receipentprofile: recipientProfileImage!,\
    \ originatorprofile: (profile?.personalprofile)!, lastchat: chatTextView.text)\n\
    \                }\n                chat.group.notify(queue: .main) { }\n    \
    \        } else {\n                if recordExists {\n                    chat.group.enter()\n\
    \                    if recipientProfileImageBanner != nil {\n               \
    \         chat.saveNewChatToCloud(tablename: businessname, receipentname: businessname,\
    \ originatorname: originatorname)\n                    } else {\n            \
    \            chat.saveNewChatToCloud(tablename: businessname, receipentname: businessname,\
    \ originatorname: (profile?.name)!)\n                    }\n                 \
    \   chat.group.notify(queue: .main) { }\n                }\n            }\n  \
    \      }\n    }\n}\n```\n"
- fmt: "### `ChatViewController`\n\nThe below code defines a `ChatViewController`\
    \ class that displays all contacts with whom the user has initiated chat. It inherits\
    \ from `UIViewController` and conforms to `UITabBarDelegate`, `UITableViewDelegate`,\
    \ and `UITableViewDataSource` protocols. The following are the class properties:\n\
    \n- `profile`: The current user’s profile information\n- `origniatorProfile`:\
    \ The profile of the chat initiator\n- `receipentProfile`: The profile of the\
    \ chat recipient\n- `chattables`: An array to store all chat table names\n- `businesstables`:\
    \ An array to store business tables\n\n```swift\nimport UIKit\nclass ChatViewController:\
    \ UIViewController, UITabBarDelegate, UITableViewDelegate, UITableViewDataSource\
    \ {\nvar profile:Profile?\nvar origniatorProfile:Profile?\nvar receipentProfile:Profile?\n\
    var chattables:[Chattable] = []\nvar businesstables:[Businesstable] = []\n```\n\
    \n#### UI Object Definition\n\nThe below code defines several UI components that\
    \ will be used to construct a chat interface with a tab bar for navigation.\n\n\
    - `tabBar`: Creates a tab bar with three items: “Profile”, “Contacts”, and “Chats”\n\
    - `chatTableView`: Creates a table view for displaying chat messages\n- `businessTableView`:\
    \ Creates a table view, for displaying business-related information (based on\
    \ the `businesstables` property)\n- `headerView`: Creates a header view with a\
    \ light gray background, for displaying additional information or controls\n-\
    \ `headerLabel`: Creates a label to be used within the `headerView`, for displaying\
    \ the chat screen title\n\n```swift\nprivate let tabBar:UITabBar = {\nlet tabbar\
    \ = UITabBar()\ntabbar.translatesAutoresizingMaskIntoConstraints = false\ntabbar.backgroundColor\
    \ = UIColor.init(red: 171/255, green: 189/255, blue: 217/255, alpha: 1)\nlet saveSymbolConfiguration\
    \ = UIImage.SymbolConfiguration(pointSize: 16, weight: .black)\nlet contact =\
    \ UIImage(systemName: \"doc.on.clipboard\", withConfiguration: saveSymbolConfiguration)\n\
    let contactbutton = UITabBarItem(title: \"Contacts\", image: contact, selectedImage:\
    \ contact)\ncontactbutton.tag = 1\nlet chat = UIImage(systemName: \"doc.plaintext\"\
    , withConfiguration: saveSymbolConfiguration)\nlet chatbutton = UITabBarItem(title:\
    \ \"Chats\", image: chat, selectedImage: chat)\nchatbutton.tag = 2\nlet profile\
    \ = UIImage(systemName: \"person.fill\", withConfiguration: saveSymbolConfiguration)\n\
    let profilebutton = UITabBarItem(title: \"Profile\", image: profile, selectedImage:\
    \ profile)\nprofilebutton.tag = 0\ntabbar.setItems([profilebutton, contactbutton,\
    \ chatbutton], animated: false)\nreturn tabbar\n}()\nprivate let chatTableView:UITableView\
    \ = {\nlet tableView = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints\
    \ = false\ntableView.backgroundColor = .white\ntableView.isScrollEnabled = true\n\
    return tableView\n}()\nprivate let businessTableView:UITableView = {\nlet tableView\
    \ = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints = false\n\
    tableView.backgroundColor = .white\ntableView.isScrollEnabled = true\nreturn tableView\n\
    }()\nprivate let headerView: UIView = {\nlet view = UIView()\nview.translatesAutoresizingMaskIntoConstraints\
    \ = false\nview.backgroundColor = .systemGray6\nreturn view\n}()\nprivate let\
    \ headerLabel:UILabel = {\nlet label = UILabel()\nlabel.text = \"Chats\"\nlabel.translatesAutoresizingMaskIntoConstraints\
    \ = false\nlabel.textColor = UIColor(displayP3Red: 128/255, green: 0/255, blue:\
    \ 128/255, alpha: 1)\nlabel.textAlignment = .center\nlabel.font = UIFont.boldSystemFont(ofSize:\
    \ 35)\nreturn label\n}()\n```\n\n#### Lifecycle Method\n\nThe `viewDidLoad()`\
    \ method is a lifecycle method in `UIKit` that is called when the view controller’s\
    \ view is loaded into memory. In this case, it’s used to initiate the process\
    \ of fetching chat tables. The breakdown of the code is given below:\n\n- `super.viewDidLoad()`:\
    \ Calls the parent class's implementation of `viewDidLoad()` to ensure proper\
    \ initialization\n- `getChatTables()`: Calls a custom method named `getChatTables()`\
    \ to retrieve chat-related data\n\n```swift\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
    getChatTables()\n}\n```\n\n#### Setup Method\n\nThe `setup()` function configures\
    \ the initial state of the view controller, including setting up delegates, data\
    \ sources, and table view properties. The breakdown code is given below:\n\n-\
    \ `view.backgroundColor = .white`: Sets the background color of the main view\
    \ to white\n- `tabBar.delegate = self`: Sets the current view controller as the\
    \ delegate for the tab bar, allowing it to handle tab selection events\n- `tabBar.selectedItem\
    \ = tabBar.items![1]`: Sets the second tab item as the initially selected tab\n\
    - `chatTableView` Configuration:\n  - Sets the current view controller as the\
    \ delegate and data source for the `chatTableView`\n  - Registers the `ChatTableViewCell`\
    \ class for reuse in the `chatTableView`\n  - Removes the border from the `chatTableView`\n\
    \  - Sets the separator style for the `chatTableView` to single line\n- `businessTableView`\
    \ Configuration:\n  - Sets the current view controller as the delegate and data\
    \ source for the `businessTableView`\n  - Registers the `ChatTableViewCell` class\
    \ for reuse in the `businessTableView`\n  - Removes the border from the `businessTableView`\n\
    \  - Sets the separator style for the `businessTableView` to single line\n\n```swift\n\
    func setup(){\nview.backgroundColor = .white //\ntabBar.delegate = self\ntabBar.selectedItem\
    \ = tabBar.items![1]\nchatTableView.delegate = self\nchatTableView.dataSource\
    \ = self\nchatTableView.register(ChatTableViewCell.self, forCellReuseIdentifier:\
    \ \"chat\")\nchatTableView.layer.borderWidth = 0\nchatTableView.layer.borderColor\
    \ = UIColor.white.cgColor\nchatTableView.separatorStyle = .singleLine\nbusinessTableView.delegate\
    \ = self\nbusinessTableView.dataSource = self\nbusinessTableView.register(ChatTableViewCell.self,\
    \ forCellReuseIdentifier: \"business\")\nbusinessTableView.layer.borderWidth =\
    \ 0\nbusinessTableView.layer.borderColor = UIColor.white.cgColor\nbusinessTableView.separatorStyle\
    \ = .singleLine\n}\n```"
