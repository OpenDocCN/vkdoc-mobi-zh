- fmt: '# Chattable Modal Class


    This class mimics the `chattables` iCloud repository. The code below defines the
    class `Chattable` as `NSObject`; it inherits the `UIKit` and the `CloudKit` modules.
    It also defines the group and the queue for asynchronous iCloud method management.


    The class has a chat table name, recipient profile and name, and chat text as
    its variables. An `init` method is defined to initialize the objects of the class
    with the value provided by the user. An empty `init` is also defined to invoke
    the class without initializing the variables (usually, this is done to access
    the method).


    ```

    import UIKit

    import CloudKit

    class Chattable: NSObject {

    let group = DispatchGroup()

    let syncQueue = DispatchQueue(label: "com.domain.app.sections")

    var chattablename:String!

    var receipentprofile:CKAsset!

    var receipentname:String!

    var lastchat:String!

    var record:CKRecord!

    init(chattablename: String!, receipentprofile: CKAsset!, receipentname: String!,
    lastchat: String!) {

    self.chattablename = chattablename

    self.receipentprofile = receipentprofile

    self.receipentname = receipentname

    self.lastchat = lastchat

    }

    override init(){

    }

    ```


    ## Get Table Name Method


    This method gets all the table names for the current user and returns it using
    the completion handler.


    An array variable of the class is defined as `chattables`. A `CKQuery` object
    is created for the `chattables` iCloud repository and added to the operation,
    which is executed on a public database.


    ```

    func gettableNames(completion:@escaping ([Chattable], Error?) -> Void){

    var chattables:[Chattable] = []

    let pred = NSPredicate(format: "dummy == %@", "1")

    let query = CKQuery(recordType: "chattables", predicate: pred)

    let operation = CKQueryOperation(query: query)

    let operationConfiguration = CKOperation.Configuration()

    operationConfiguration.timeoutIntervalForRequest = 10

    operationConfiguration.timeoutIntervalForResource = 10

    operation.configuration = operationConfiguration

    CKContainer.default().privateCloudDatabase.add(operation)

    ```


    In the `recordMatchedBlock`, we iterate and switch on the `enum` object result
    and on success appends the found chattable to the `chattables` array object. Upon
    failure, we print the error on the console.


    ```

    operation.recordMatchedBlock = { recordID, result in

    switch result {

    case .success(let record):

    let chattable = Chattable(chattablename: record["chattablename"] as? String, receipentprofile:
    record["receipentprofile"] as? CKAsset, receipentname: record["receipentname"]
    as? String, lastchat: record["lastchat"] as? String)

    chattable.record = record

    chattables.append(chattable)

    case .failure(let error):

    print(error.localizedDescription)

    }

    }

    ```


    In the `queryResultBlock`, we complete our completion handler. Upon success, the
    handler returns the `chattables`, and in case of failure, it returns the error
    to the calling method.


    ```

    operation.queryResultBlock = { result in

    DispatchQueue.main.async {

    switch result {

    case .failure(let error):

    debugPrint(error)

    print(error)

    completion(nil, error)

    case .success(_):

    completion(chattables, nil)

    }

    }

    }

    }

    }

    ```


