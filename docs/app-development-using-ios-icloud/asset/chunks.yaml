    \n```\n@objc func businessTypeEditingDidBegin(sender: UITextField){\ntempBusiness\
    \ = business\nbusinessTypeTableView.isHidden = false\nsaveButton.isHidden = true\n\
    }\n```\n\n**结束编辑方法**\n\n当用户完成对`businessTypeTextField`的编辑时触发此函数。它会恢复原始的业务数据，并隐藏表格视图和保存按钮。方法的详细说明如下：\n\
    \n-   `@objc`：使该函数可被 Objective-C 调用。\n-   `businessTypeEditingDidEnd(sender: UITextField)`：定义一个带有\
    \ `UITextField` 参数的函数（虽然在本实现中未使用该参数）。\n-   `business = tempBusiness`：从 `tempBusiness`\
    \ 数组中恢复原始的业务数组。\n-   `businessTypeTableView.isHidden = true`：隐藏 `businessTypeTableView`。\n\
    -   `saveButton.isHidden = false`：再次显示保存按钮。\n\n```\n@objc func businessTypeEditingDidEnd(sender:\
    \ UITextField){\nbusiness = tempBusiness\nbusinessTypeTableView.isHidden = true\n\
    saveButton.isHidden = false\n}\n```\n\n**编辑变动方法**\n\n此函数根据在`businessTypeTextField`中输入的文字筛选\
    \ `business` 数组，并重新加载表格视图。方法的详细说明如下：\n\n-   `@objc`：使该函数可被 Objective-C 调用。\n-\
    \   `businessTypeEditingChanged(sender: UITextField)`：定义一个带有 `UITextField` 参数的函数。\n\
    -   `business = business.filter { ... }`：使用闭包筛选 `business` 数组。\n    -   该闭包会遍历每一个\
    \ `business` 元素。\n    -   它检查该元素中 `businesstype` 属性在去除空格并转换为小写后，是否包含发送者（文本字段）中文本的小写版本。\n\
    \    -   如果条件为真，则该 `business` 会被包含在筛选后的数组中。\n-   `if (sender.text == \"\")`：检查文本字段是否为空。\n\
    \    -   如果为空，则从 `tempBusiness` 恢复原始的 `business` 数组。\n-   `businessTypeTableView.reloadData()`：重新加载表格视图以显示筛选后的数据。\n\
    \n```\n@objc func businessTypeEditingChanged(sender: UITextField){\nbusiness =\
    \ business.filter{\nbusiness in return business.businesstype.trimmingCharacters(in:\
    \ .whitespaces).lowercased().contains(sender.text!.lowercased())\n}\nif(sender.text\
    \ == \"\"){\nbusiness = tempBusiness\n}\nbusinessTypeTableView.reloadData()\n\
    }\n```\n\n### 保存用户信息方法\n\n此函数似乎用于处理将用户个人资料信息（包括图像）保存到`CloudKit`。以下是对代码的详细分解：\n\
    \n**图像保存**\n\n-   `let personalData = personalProfileImageView.image?.pngData()`：从\
    \ `personalProfileImageView` 图像中提取 PNG 数据。\n-   `let personalFilename = getDocumentsDirectory().appendingPathComponent(\"\
    copy.png\")`：在文档目录下创建一个名为 \"copy.png\" 的文件路径。\n-   `try? personalData?.write(to:\
    \ personalFilename)`：尝试将图像数据写入该文件路径。\n\n**CloudKit 资源创建**\n\n-   `let personalProfile\
    \ : CKAsset? = CKAsset(fileURL: personalFilename)`：创建一个引用已保存图像文件的 `CKAsset` 对象。\n\
    \n**用户资料对象创建**\n\n-   `let profile:Profile = Profile(userid: userid, personalprofile:\
    \ personalProfile!, name: nameTextField.text!, businessname: businessNameTextField.text!,\
    \ businesstype: businessTypeTextField.text!)`：使用用户数据和 `CKAsset` 创建一个 `Profile`\
    \ 对象。\n\n**保存到 CloudKit（异步）**\n\n-   `profile.group.enter()`：启动一个 `CloudKit` 操作组。\n\
    -   `profile.saveProfile(profile: profile)`：调用一个方法（定义为模态类）将 profile 对象保存到 `CloudKit`。\n\
    -   `profile.group.notify(queue: .main) { ... }`：设置一个完成块，当操作组完成时在主队列上调用该块。\n-\
    \   `self.profile = profile.profile`：用保存后的用户资料数据（包括 CloudKit 记录 ID）更新本地的 profile\
    \ 变量。\n-   `self.popUpContact()`：在成功保存后弹出联系人视图。\n\n```\nfunc profileSave(){\n\
    let personalData = personalProfileImageView.image?.pngData()\nlet personalFilename\
    \ = getDocumentsDirectory().appendingPathComponent(\"copy.png\")\ntry? personalData?.write(to:\
    \ personalFilename)\nlet personalProfile : CKAsset?  = CKAsset(fileURL: personalFilename)\n\
    let profile:Profile = Profile(userid: userid, personalprofile: personalProfile!,\
    \ name: nameTextField.text!, businessname: businessNameTextField.text!, businesstype:\
    \ businessTypeTextField.text!)\nprofile.group.enter()\nprofile.saveProfile(profile:\
    \ profile)\nprofile.group.notify(queue: .main) {\nself.profile = profile.profile\n\
    self.popUpContact()\n}\n}\n```\n\n### 获取文档目录方法\n\n此函数用于获取设备上用户文档目录的路径。以下是对代码的详细分解：\n\
    \n-   `func getDocumentsDirectory() -> URL`：定义一个返回 `URL` 的函数。\n-   `let paths\
    \ = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)`：获取代表文档目录的\
    \ URL 数组。\n-   `return paths[0]`：返回数组中的第一个 URL，即文档目录路径。\n\n```\nfunc getDocumentsDirectory()\
    \ -> URL {\nlet paths = FileManager.default.urls(for: .documentDirectory, in:\
    \ .userDomainMask)\nreturn paths[0]\n}\n```\n"
- fmt: '# Class Extension for Image-Enhanced Functions


    The provided code extends the `CreateProfileViewController` to handle image selection
    from the camera or photo library. The detail of the code is given below:


    `presentPhotoOptions()`


    - Creates an `UIAlertController` to present options for taking a photo or choosing
    one from the library

    - Uses weak self to prevent strong reference cycles

    - Presents the action sheet


    `presentCamera()` and `presentPhoto()`


    - Create `UIImagePickerController` instances with the appropriate source type
    (camera or photo library)

    - Set the delegate to self to handle image selection results

    - Present the image picker controller


    `imagePickerController(_:didFinishPickingMediaWithInfo:)`


    - Retrieves the selected image from the info dictionary

    - Sets the `personalProfileImageView`''s image to the selected image

    - Dismisses the image picker controller


    `imagePickerControllerDidCancel(_:)`


    - Dismisses the image picker controller when the user cancels the selection


    ```

    extension CreateProfileViewController:UIImagePickerControllerDelegate, UINavigationControllerDelegate{

    func presentPhotoOptions(){

    var message:String = ""

    message = "Personal Profile Picture"

    let actionSheet = UIAlertController(title: message, message: "Select your Option",
    preferredStyle: .actionSheet)

    actionSheet.addAction(UIAlertAction(title: "cancel", style: .cancel, handler:
    nil))

    actionSheet.addAction(UIAlertAction(title: "Take Photo", style: .default, handler:
    { [weak self]_ in

    self?.presentCamera()

    }))

    actionSheet.addAction(UIAlertAction(title: "Choose Photo", style: .default, handler:
    {[weak self]_ in

    self?.presentPhoto()

    }))

    present(actionSheet, animated: true)

    }

    func presentCamera(){

    let ip = UIImagePickerController()

    ip.sourceType = .camera

    ip.delegate = self

    ip.allowsEditing = true

    present(ip, animated: true)

    }

    func presentPhoto(){

    let ip = UIImagePickerController()

    ip.sourceType = .photoLibrary

    ip.delegate = self

    ip.allowsEditing = true

    present(ip, animated: true)

    }

    func imagePickerController(_ picker: UIImagePickerController, didFinishPickingMediaWithInfo
    info: [UIImagePickerController.InfoKey : Any]) {

    let selectedImage  = info[UIImagePickerController.InfoKey.editedImage]

    self.personalProfileImageView.image = selectedImage as? UIImage

    picker.dismiss(animated: true)

    }

    func imagePickerControllerDidCancel(_ picker: UIImagePickerController) {

    picker.dismiss(animated: true)

    }

    }

    ```


    ## Run the App


    As you run the app, for the first time, the Create Profile screen appears as shown
    below.


    ![](images/533539_2_En_13_Chapter/533539_2_En_13_Figa_HTML.jpg)


    Users can select an image from the photo library or take a picture from the camera,
    enter user and business name, and select a business type from the drop-down list
    as soon below. The business list will filter based on user inputs. For our example,
    we will use two users. First user is Shantanu (shown below), who is a tutor, and
    our other user is Shaurya (not shown in the screen captures), who will initiate
    the chat conversation.


    ![](images/533539_2_En_13_Chapter/533539_2_En_13_Figb_HTML.jpg)


    Once the profile information is entered, then the user can save the profile using
    the save and exit button as shown in the screen below.


    ![](images/533539_2_En_13_Chapter/533539_2_En_13_Figc_HTML.jpg)'
