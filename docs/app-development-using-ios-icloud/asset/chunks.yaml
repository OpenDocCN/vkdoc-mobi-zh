- fmt: '### Table Record Initialization


    In this section, we will initialize the record types with record values as provided
    to the function.


    Below code initializes the `businessprofile` record type with the user provided
    values.


    We are first defining the record type using the `CKRecord` CloudKit function.
    In this example, `businessprofile` is the record type. If the record type doesn’t
    exist, the operation will create it for the first time, and if it exists, it will
    append the new record to the table.


    The record has three parameters: name of the business (`businessname`), an image
    of the business (`businessprofile`), and the description of the business (`businessdesc`).


    Please note for the image to be stored in the database we need to extract the
    binaries using `fileURL` function of the image and pass it to the `CKAsset` type.


    ```

    let businessRecord = CKRecord(recordType: "businessproflle")

    businessRecord["businessname"] = business.businessname

    businessRecord["businessprofile"] = CKAsset(fileURL: business.businessprofile.fileURL!)

    businessRecord["businessdesc"] = business.businessdesc

    ```


    This is the next block of code for defining the chat table record as chat. The
    record has three values: an originator ID indicating who created the chat (`originatorid`),
    the actual chat text (`chattext`), and the date of creation (`datecreated`), which
    is the default system date and time.


    ```

    let chatRecord = CKRecord(recordType: "\chat")

    chatRecord["originatorid"] = chat.originatorid

    chatRecord["chattext"] = chat.chattext

    chatRecord["datecreated"] = Date()

    ```


    This is the third and final block of record definition. The record type is `personalprofile`.
    This record will be stored in a private database. Three values are assigned to
    the record: the profile image of the user, the name of the user, and the chat
    text, which will be the latest chat in the chat trail.


    ```

    let personalRecord = CKRecord(recordType: "personalprofile")

    personalRecord["profile"] = CKAsset(fileURL: personal.profile.fileURL!)

    personalRecord["name"] = personal.name

    personalChatRecord["lastchat"] = chat.chattext

    ```


    ### Save Operation


    In the below code, we are defining our public database save operation. The variable
    name is `publicSaveOperation` (notice it is a `let` variable as we are only going
    to use it once), which uses the `CKModifyRecordsOperation` system function. The
    method takes an array of records to be saved as input for its parameter labeled
    as `recordsToSave`.


    We are providing both public database records to this operation, `businessRecord`
    and `chatRecord`.


    ```

    let publicSaveOperation = CKModifyRecordsOperation(recordsToSave: [businessRecord,
    chatRecord])

    publicSaveOperation.savePolicy = .changedKeys

    ```


    Next, we are asynchronously waiting for the operations to complete. `modifyRecordsResultBlock`
    is available in the new iOS release, which provides a result `enum` (refer to
    Chapter [2](#533539_2_En_2_Chapter.xhtml)).


    If the operation is a success, we now want to save the user profile to the user’s
    private database. Notice that `recordsToSave` can take an array; however, in our
    case, we are only providing `personalRecord` as the only record to be saved.


    We are asynchronously waiting again for the private database operation to complete.
    This time if it is a success, we are exiting the function (`self.group.leave()`).
    In case of failure, we are printing a message on the console.


    `privateDatabase.add(privateSaveOperation)` and `publicDatabase.add(publicSaveOperation)`
    will queue the function to execute in the background.


    ```

    publicSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    let privateSaveOperation = CKModifyRecordsOperation(recordsToSave: [personalRecord])

    privateSaveOperation.savePolicy = .changedKeys

    privateSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    self.group.leave()

    }

    case .failure(let error):

    print("Error saving record to private database: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    privateDatabase.add(privateSaveOperation)

    }

    // Handle any further actions or UI updates

    case .failure(let error):

    print("Error saving records: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    publicDatabase.add(publicSaveOperation)

    }

    ```


    ## Complete Code


    ```

    import UIKit

    import CloudKit

    class Chat: NSObject {

    func saveRecordsToCloud(business:businessprofile, personal:personalProfile, chat:chat){

    let container = CKContainer.default()

    let publicDatabase = container.publicCloudDatabase

    let privateDatabase = container.privateCloudDatabase

    let businessRecord = CKRecord(recordType: "businessproflle")

    businessRecord["businessname"] = business.businessname

    businessRecord["businessprofile"] = CKAsset(fileURL: business.businessprofile.fileURL!)

    businessRecord["businessdesc"] = business.businessdesc

    let chatRecord = CKRecord(recordType: "\chat")

    chatRecord["originatorid"] = chat.originatorid

    chatRecord["chattext"] = chat.chattext

    chatRecord["datecreated"] = Date()

    let personalRecord = CKRecord(recordType: "personalprofile")

    personalRecord["profile"] = CKAsset(fileURL: personal.profile.fileURL!)

    personalRecord["name"] = personal.name

    personalChatRecord["lastchat"] = chat.chattext

    let publicSaveOperation = CKModifyRecordsOperation(recordsToSave: [businessRecord,
    chatRecord])

    publicSaveOperation.savePolicy = .changedKeys

    publicSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    let privateSaveOperation = CKModifyRecordsOperation(recordsToSave: [personalRecord])

    privateSaveOperation.savePolicy = .changedKeys

    privateSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    self.group.leave()

    }

    case .failure(let error):

    print("Error saving record to private database: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    privateDatabase.add(privateSaveOperation)

    }

    // Handle any further actions or UI updates

    case .failure(let error):

    print("Error saving records: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    publicDatabase.add(publicSaveOperation)

    }

    }

    ```


    # 10. Push Notifications


    Push notifications are an essential part of your application. At times when the
    state of your application changes, you would like to notify the user on the change
    so that the user can take appropriate action. In our chat application, when a
    user sends a text to another user, notification will help the other user to respond
    to the change or take appropriate action.'
