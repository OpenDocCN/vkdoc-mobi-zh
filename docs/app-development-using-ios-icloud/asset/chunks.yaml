  trans: "\n### `ContactViewController`\n\n`ContactViewController` 为用户提供基于业务类型搜索联系人的界面。找到联系人后，用户可选择将其保存到\
    \ iCloud 存储库。\n\n#### 类定义\n\n以下代码定义了一个 `ContactViewController` 类，作为应用程序中管理联系人的视图控制器。代码分解如下：\n\
    \n- **导入：** 导入了用于构建用户界面的 `UIKit` 框架\n- **类定义：** 定义 `ContactViewController` 类，继承自\
    \ `UIViewController` 并遵循多个协议：\n  - `UITabBarDelegate`：用于处理标签栏交互\n  - `UITableViewDelegate`\
    \ 和 `UITableViewDataSource`：用于管理表格视图的数据和交互\n  - `UITextFieldDelegate`：用于处理文本字段交互\n\
    \n**类变量**\n\n- `contact`：一个 `Contact` 类的实例，如 Modal 部分所定义\n- `profile`：当前用户档案的引用\n\
    - `userid`：用户的 ID\n- `origniatorProfile`：联系人发起者的档案\n- `receipentProfile`：联系人接收者的档案\n\
    \n```swift\nimport UIKit\nclass ContactViewController: UIViewController, UITabBarDelegate,\
    \ UITableViewDelegate, UITableViewDataSource, UITextFieldDelegate {\nvar contact\
    \ = Contact()\nvar profile:Profile?\nvar userid:String = \"\"\nvar origniatorProfile:Profile?\n\
    var receipentProfile:Profile?\n```\n\n#### UI 对象定义\n\n以下代码定义了 `ContactViewController`\
    \ 中用于创建管理联系人用户界面的几个 UI 元素。这些元素包括一个标签栏、一个标题标签、一个用于搜索联系人的文本字段，以及两个用于显示业务类型和联系人的表格视图。\n\
    \n**标签栏**\n\n- 创建一个具有特定背景颜色的 `UITabBar`\n- 设置三个 `UITabBarItem` 实例，分别对应“Profile”、“Contacts”和“Chats”，并带有相应的图像和标签\n\
    \n**标题标签**\n\n- 创建一个用于显示标题文本“Chat”的 `UILabel`\n- 设置文本颜色、对齐方式和字体\n\n**业务类型文本字段**\n\
    \n- 创建一个用于基于业务类型搜索联系人的 `UITextField`\n- 设置占位符文本、边框样式和其他外观属性\n\n**业务类型表格视图**\n\n\
    - 创建一个用于显示业务类型的 `UITableView`\n- 设置背景颜色并启用滚动\n\n**联系人表格视图**\n\n- 创建一个用于显示联系人的\
    \ `UITableView`\n- 设置背景颜色并启用滚动\n\n这些定义中需要注意的几个要点：\n\n- **懒加载：** 使用带闭包的 `private\
    \ let` 创建懒加载属性，意味着这些对象仅在被首次访问时才会创建。\n- **自动布局：** 所有 UI 元素均使用 `translatesAutoresizingMaskIntoConstraints`\
    \ = false 属性，表示将使用自动布局进行定位和大小设置。\n- **UI 自定义：** 代码设置了各种属性来自定义 UI 元素的外观，例如颜色、字体和边框样式。\n\
    \n```swift\nprivate let tabBar:UITabBar = {\nlet tabbar = UITabBar()\ntabbar.translatesAutoresizingMaskIntoConstraints\
    \ = false\ntabbar.backgroundColor = UIColor.init(red: 171/255, green: 189/255,\
    \ blue: 217/255, alpha: 1)\nlet saveSymbolConfiguration = UIImage.SymbolConfiguration(pointSize:\
    \ 16, weight: .black)\nlet contact = UIImage(systemName: \"doc.on.clipboard\"\
    , withConfiguration: saveSymbolConfiguration)\nlet contactbutton = UITabBarItem(title:\
    \ \"Contacts\", image: contact, selectedImage: contact)\ncontactbutton.tag = 1\n\
    let chat = UIImage(systemName: \"doc.plaintext\", withConfiguration: saveSymbolConfiguration)\n\
    let chatbutton = UITabBarItem(title: \"Chats\", image: chat, selectedImage: chat)\n\
    chatbutton.tag = 2\nlet profile = UIImage(systemName: \"person.fill\", withConfiguration:\
    \ saveSymbolConfiguration)\nlet profilebutton = UITabBarItem(title: \"Profile\"\
    , image: profile, selectedImage: profile)\nprofilebutton.tag = 0\ntabbar.setItems([profilebutton,\
    \ contactbutton, chatbutton], animated: false)\nreturn tabbar\n}()\nprivate let\
    \ headerLabel:UILabel = {\nlet label = UILabel()\nlabel.text = \"Chat\"\nlabel.translatesAutoresizingMaskIntoConstraints\
    \ = false\nlabel.textColor = UIColor(displayP3Red: 128/255, green: 0/255, blue:\
    \ 128/255, alpha: 1)\nlabel.textAlignment = .center\nlabel.font = UIFont.boldSystemFont(ofSize:\
    \ 35)\nreturn label\n}()\nlet businessTypeTextField:UITextField = {\nlet textField\
    \ = UITextField()\ntextField.translatesAutoresizingMaskIntoConstraints = false\n\
    textField.borderStyle = .roundedRect\ntextField.textColor = .black\ntextField.layer.borderColor\
    \  = UIColor.systemGray4.cgColor\ntextField.layer.borderWidth = 1\ntextField.layer.cornerRadius\
    \ = 10\ntextField.placeholder = \"Select Business Type to Search Contacts\"\n\
    textField.textColor = .black\ntextField.isEnabled = true\ntextField.keyboardType\
    \ = .default\nreturn textField\n}()\nprivate let businessTypeTableView:UITableView\
    \ = {\nlet tableView = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints\
    \ = false\ntableView.backgroundColor = .white\ntableView.isScrollEnabled = true\n\
    return tableView\n}()\nprivate let contactTableView:UITableView = {\nlet tableView\
