    cell.textLabel?.text = business[indexPath.row].businesstype + " " + business[indexPath.row].businessdesc

    return cell

    }

    ```


    The above code is drawing the table by looping through each of the business objects.
    It uses the default UI cell table view and appends the business type and business
    description of the looped through **business** objects.


    ```

    func tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)
