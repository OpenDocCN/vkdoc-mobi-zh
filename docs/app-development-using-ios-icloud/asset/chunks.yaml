  raw: '#### Setup Method


    The **setup**() method performs initial configurations for the **ContactViewController**.
    It sets up delegates, data sources, and initial states for UI elements. Key code
    elements are defined below:


    *   **view.backgroundColor = .white:** Sets the background color of the view to
    white


    *   **tabBar.delegate = self:** Sets the current view controller as the delegate
    for the tab bar


    *   **tabBar.selectedItem = tabBar.items![1]:** Sets the second tab bar item as
    the selected one


    *   **businessTypeTextField.delegate = self:** Sets the current view controller
    as the delegate for the business type text field


    *   **businessTypeTextField.leftView = UIImageView(image: UIImage(systemName:
    “plus”)):** Adds a plus icon to the left of the text field


    *   **businessTypeTextField.leftViewMode = .always:** Ensures the plus icon is
    always visible


    *   **businessTypeTextField.addTarget(...):** Adds target action methods for text
    field editing events


    *   **businessTypeTableView.delegate = self:** Sets the current view controller
    as the delegate for the business type table view


    *   **businessTypeTableView.dataSource = self:** Sets the current view controller
    as the data source for the business type table view


    *   **businessTypeTableView.register(UITableViewCell.self, forCellReuseIdentifier:
    “business”):** Registers a cell for reuse in the business type table view


    *   **businessTypeTableView.layer.borderWidth = 0:** Removes the border from the
    business type table view


    *   **businessTypeTableView.layer.borderColor = UIColor.white.cgColor:** Sets
    the border color to white (though it’s not visible due to the border width being
    0)


    *   **businessTypeTableView.separatorStyle = .none:** Removes separator lines
    from the business type table view


    *   **businessTypeTableView.isHidden = true:** Initially hides the business type
    table view


    *   **contactTableView.delegate = self:** Sets the current view controller as
    the delegate for the contact table view


    *   **contactTableView.dataSource = self:** Sets the current view controller as
    the data source for the contact table view


    *   **contactTableView.register(ContactTableViewCell.self, forCellReuseIdentifier:
    “contact”):** Registers a custom cell class (**ContactTableViewCell**) for reuse
    in the contact table view


    *   **contactTableView.layer.borderWidth = 0:** Removes the border from the contact
    table view


    *   **contactTableView.layer.borderColor = UIColor.white.cgColor:** Sets the border
    color to white (though it’s not visible due to the border width being 0)


    *   **contactTableView.separatorStyle = .singleLine:** Adds single-line separators
    between contact table view cells


    *   **contactTableView.isHidden = true:** Initially hides the contact table view


    *   **setBusiness():** Calls a method to populate the business array with data


    ```

    func setup(){

    view.backgroundColor = .white

    tabBar.delegate = self

    tabBar.selectedItem = tabBar.items![1]

    businessTypeTextField.delegate = self

    businessTypeTextField.leftView = UIImageView(image: UIImage(systemName: "plus"))

    businessTypeTextField.leftViewMode = .always

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingChanged),
    for: .editingChanged)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidBegin),
    for: .editingDidBegin)

    businessTypeTextField.addTarget(self, action: #selector(businessTypeEditingDidEnd),
    for: .editingDidEnd)

    businessTypeTableView.delegate = self

    businessTypeTableView.dataSource = self

    businessTypeTableView.register(UITableViewCell.self, forCellReuseIdentifier: "business")

    businessTypeTableView.layer.borderWidth = 0

    businessTypeTableView.layer.borderColor = UIColor.white.cgColor

    businessTypeTableView.separatorStyle = .none

    businessTypeTableView.isHidden = true

    contactTableView.delegate = self

    contactTableView.dataSource = self

    contactTableView.register(ContactTableViewCell.self, forCellReuseIdentifier: "contact")

    contactTableView.layer.borderWidth = 0

    contactTableView.layer.borderColor = UIColor.white.cgColor

    contactTableView.separatorStyle = .singleLine

    contactTableView.isHidden = true

    setBusiness()

    }

    ```


    #### Tab Bar Method


    The **tabBar(_:didSelect:)** method handles the selection of tab bar items:


    *   **Case 0:** Triggers the **popUpContact**() function


    *   **Case 2:** Triggers the **popUpChat**() function


    *   **Default:** Triggers the **popUpMarket**() function (currently not implemented)


    **Pop-up functions**


    *   **popUpContact**(): Currently empty, as it is the current view


    *   **popUpChat**(): Creates a **ChatViewController** instance, passes relevant
    profile information, and presents it modally


    *   **popUpMarket():** Currently empty and not implemented


    ```

    func tabBar(_ tabBar: UITabBar, didSelect item: UITabBarItem) {

    switch item.tag {

    case 0:

    popUpContact()

    case 2:

    popUpChat()

    default:

    popUpMarket()

    }

    }

    func popUpContact(){

    }

    func popUpChat(){

    let viewController = ChatViewController()

    viewController.profile = profile

    viewController.origniatorProfile = origniatorProfile

    viewController.receipentProfile = receipentProfile

    viewController.modalPresentationStyle = .overCurrentContext

    viewController.modalTransitionStyle = .crossDissolve

    self.present(viewController, animated: true, completion: nil)

    }

    func popUpMarket(){

    }

    ```'
