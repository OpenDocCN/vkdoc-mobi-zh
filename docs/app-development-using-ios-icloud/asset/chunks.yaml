    # 图像增强功能的类扩展


    以下代码扩展了 `CreateProfileViewController`，以处理从相机或相册中选择图像的操作。代码详情如下所示：


    `presentPhotoOptions()`


    - 创建一个 `UIAlertController`，用于显示拍照或从相册中选择的选项

    - 使用弱引用 （`weak self`） 避免强引用循环

    - 呈现操作列表


    `presentCamera()` 和 `presentPhoto()`


    - 创建 `UIImagePickerController` 实例，并指定相应的来源类型（相机或相册）

    - 将委托设置为 `self`，以处理图像选择结果

    - 呈现图像选择控制器


    `imagePickerController(_:didFinishPickingMediaWithInfo:)`


    - 从信息字典中获取所选图像

    - 将 `personalProfileImageView` 的图像设置为所选图像

    - 关闭图像选择控制器


    `imagePickerControllerDidCancel(_:)`


    - 当用户取消选择时，关闭图像选择控制器


    ```

    extension CreateProfileViewController:UIImagePickerControllerDelegate, UINavigationControllerDelegate{

    func presentPhotoOptions(){

    var message:String = ""

    message = "个人资料图片"

    let actionSheet = UIAlertController(title: message, message: "选择您的选项", preferredStyle:
    .actionSheet)

    actionSheet.addAction(UIAlertAction(title: "取消", style: .cancel, handler: nil))

    actionSheet.addAction(UIAlertAction(title: "拍照", style: .default, handler: { [weak
    self]_ in

    self?.presentCamera()

    }))

    actionSheet.addAction(UIAlertAction(title: "选择照片", style: .default, handler: {[weak
    self]_ in

    self?.presentPhoto()

    }))

    present(actionSheet, animated: true)

    }

    func presentCamera(){

    let ip = UIImagePickerController()

    ip.sourceType = .camera

    ip.delegate = self

    ip.allowsEditing = true

    present(ip, animated: true)

    }

    func presentPhoto(){

    let ip = UIImagePickerController()

    ip.sourceType = .photoLibrary

