    The `queryChats()` function is responsible for fetching chat data for the current
    conversation and setting up the UI elements. Find below the breakdown of the code:


    - **Create conversation object:** Creates a conversation object (a custom modal
    class representing a chat conversation).

    - **Enter group:** Enters a group using `chat.group.enter()`. This involves managing
    data access or synchronization within CloudKit.

    - **Get chats:** Calls the `getChats` method on the `Conversation` object. It
    takes recipient name (`businessname`), originator name (`originatorname`), and
    a completion handler.


    **Completion handler:** The completion handler receives two parameters:


    - `Chats`: An array of conversation objects.

    - `Error`: An error object if there’s a problem fetching data.


    The following are actions within completion handler:


    - **Update chats array:** Updates the `self.chats` property with the retrieved
    chat data.

    - **Call setup function:** Calls a method named `setup()`, responsible for setting
    up the chat table view and other UI elements based on the chat data.

    - **Call draw top bar function:** Calls a method named `drawTopBar()`, responsible
    for setting up the UI elements for the chat window.


