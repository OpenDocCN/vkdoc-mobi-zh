    ```

    operation.recordMatchedBlock = { recordID, result in }

    ```


    iCloud database calls are asynchronous. After the query is executed, the results
    are returned asynchronously. `recordMatchedBlock` is the block that is executed
    once the operation returns a value. The `recordMatchedBlock` has two parameters
    as described below:


    *   `recordID` of type `CKRecord.ID`

    *   `result`, which is an Enum of type `Result<CKRecord, Error>`


    The block iterates through all the return record.


    ```

    switch result {

    ```


    We need to now unwrap the `result` Enum, which has two data elements – `success`
    and `failure` – for each record. The above statement will help us switch between
    the two data elements.


    ```

    case .success(let record):

    let chattable = Chattable(chattablename: record["chattablename"] as? String, receipentprofile:
    record["receipentprofile"] as? CKAsset, receipentname: record["receipentname"]
    as? String, lastchat: record["lastchat"] as? String)

    chattable.record = record

    chattables.append(chattable)

    ```


    This is the first case – `success` – which means there is a record returned. We
    will capture the returned result in the variable `record`. Subsequently, we will
    extract the required fields of the record, store in scope-level local variables
    of type `Chattable` class, and after that, append the variable to the function-level
    `Chattable` array object. As this is iterative in nature, all records will be
    appended to our function-level variable `chattables`.


    ```

    case .failure(let error):

    print(error.localizedDescription)

    }

    ```


    This is the other case – `failure`. In case the record couldn’t be retrieved,
    we will print the localized description of the `error` object on the console.


    ### Query Result Block


    ```

    operation.queryResultBlock = { result in

    ```


    Once the `recordMatchedBlock` iterates through all records, the next block is
    called the `queryResultBlock`. It has one parameter result, which is an Enum of
    type `Result<CKQueryOperation.Cursor?, Error>`.


    The `CKQueryOperation.Cursor` has the records and error object in case there is
    an error.


    ```

    DispatchQueue.main.async {

    ```


    We have defined a class-level `DispatchQueue` object which will wait at the main
    thread for the async job to finish. Once done, the body of the `DispatchQueue`
    will be executed.


    ```

    switch result {

    ```


    We are expanding the `result` Enum on its two parameters `failure` and `success`.


    ```

    case .failure(let error):

    debugPrint(error)

    print(error)

    completion(chattables, error)

    ```


    If there is failure, this block of code is executed, where we are printing the
    error on screen. Notice we are now calling the completion handler with the chattables
    array object and the error reported for the calling function to take appropriate
    action.


    ```

    case .success(_):

    completion(chattables, nil)

    }

    ```


    This is the success block. If there is a success, the completion handler is called
    with the chattables object and error is marked as nil.


    ## Complete Code


    ```

    func gettableNames(completion:@escaping ([Chattable], Error?) -> Void){

    var chattables:[Chattable] = []

    let pred = NSPredicate(format: "dummy == %@", "1")

    let query = CKQuery(recordType: "chattables", predicate: pred)

    let operation = CKQueryOperation(query: query)

    let operationConfiguration = CKOperation.Configuration()

    operationConfiguration.timeoutIntervalForRequest = 10

    operation.configuration = operationConfiguration

    CKContainer.default().privateCloudDatabase.add(operation)

    operation.recordMatchedBlock = { recordID, result in

    switch result {

    case .success(let record):

    let chattable = Chattable(chattablename: record["chattablename"] as? String, receipentprofile:
    record["receipentprofile"] as? CKAsset, receipentname: record["receipentname"]
    as? String, lastchat: record["lastchat"] as? String)

    chattable.record = record

    chattables.append(chattable)

    case .failure(let error):

    print(error.localizedDescription)

    }

    }

    operation.queryResultBlock = { result in

    DispatchQueue.main.async {

    switch result {

    case .failure(let error):

    debugPrint(error)

    print(error)

    completion(chattables, error)

    case .success(_):

    completion(chattables, nil)

    }

    }

    }

    }

    ```


    # 3. Class Extensions


    Extensions provide a powerful way to add new functionalities to an existing class,
    structure, enumeration, or a protocol. Once added, the function is available as
    a natural extension to the added class or the object. Extension can be added to
    user-defined objects or to a system-defined class. In this chapter, we will learn
    how to add extension to a system-defined class, and in Chapter [5](#533539_2_En_5_Chapter.xhtml)
    dedicated to image manipulation, we will learn how to add extension to user-defined
    view controller.


    Once the extension is defined, we can do everything as one can expect to in defining
    a function. You can, for example,


    *   Add delegates

    *   Define methods, structures, and types

    *   Define initializers

    *   Make or confirm to a protocol


    ## Example Code Description


    In the example below, we will extend the system-defined class `String` to add
    a new string manipulation function which currently doesn’t exist. We will add
    the following three functions:


    *   Get the last index of a string

    *   Check if a user-provided string input confirms to be a valid email address

    *   Check if a user-provided string input confirms to be a valid URL


    In our example, we will add the extension on top of a view controller class. Please
    note that the extension is not inside the view controller class definition, and
    once defined, it is visible across the project scope.


    ### String Extension


    ```

    extension String {

    }

    ```


    For defining an extension, we need to use the system-defined word `extension`
    (note that it is case sensitive). After the word `extension`, we need to provide
    the name of the extension. In our example, we are extending the system-defined
    `String` class; hence, we have the same system-defined class name.


    #### Method: Find Last Index


    ```

    func lastIndex(of string: String) -> Int? {

    }

    ```


    The name of the function is `lastIndex`. It will take in a `String` literal and
    return the last index number of the string, which is an integer. Note that `lastIndex`
    will be available across the project as an added function to the `String` function.


    ```

    guard let index = range(of: string, options: .backwards) else { return nil }

    ```


    In this line, we define a variable `index`. Note that the variable is defined
    as `let` as we will not be reusing it within the scope of the function. Also,
    we are using guard to ensure if the user-provided string has issues it won’t result
    in throwing system error.


    The `range` system-defined functions look for the user-provided string backwards
    and if found return a valid range to the `index` variable; if not found or if
    it encounters an error, it will return `nil` (the `else` part of the function
    is executed).


    ```

    return self.distance(from: self.startIndex, to: index.lowerBound)

    ```


    This line of code calculates the distance between the beginning of the string
    and the found substring’s starting position and returns its position.


    The word `self` refers to the string in the current context (which is the string
    passed to the function), and `distance` is a system-defined method of the `String`
    class in Swift, which take two parameters as defined below:


    *   `self.startIndex` refers to the first character in the string.

    *   `index.lowerBound` refers to the index of the first character of the substring
    returned by the previous `range` function.


    Here is the complete definition of the method:


    ```

    func lastIndex(of string: String) -> Int? {

    guard let index = range(of: string, options: .backwards) else { return nil }

    return self.distance(from: self.startIndex, to: index.lowerBound)

    }

    ```'
