- fmt: "### `ContactViewController`\n\n`ContactViewController` provides the user an\
    \ interface to search for contact based on a business type. Once found, the user\
    \ may choose to save it to the iCloud repository.\n\n#### Class Definition\n\n\
    The provided code defines a `ContactViewController` class, which serves as a view\
    \ controller for managing contacts within an application. The breakdown of the\
    \ code is given below:\n\n- **Imports:** Imports the `UIKit` framework, essential\
    \ for building user interfaces\n- **Class definition:** Defines the `ContactViewController`\
    \ class, inheriting from `UIViewController` and conforming to several protocols:\n\
    \  - `UITabBarDelegate`: For handling tab bar interactions\n  - `UITableViewDelegate`\
    \ and `UITableViewDataSource`: For managing table view data and interactions\n\
    \  - `UITextFieldDelegate`: For handling text field interactions\n\n**Class variable**\n\
    \n- `contact`: An instance of a `Contact` class as defined in the Modal section\n\
    - `profile`: A reference to the current user’s profile\n- `userid`: The user’s\
    \ ID\n- `origniatorProfile`: The profile of the contact initiator\n- `receipentProfile`:\
    \ The profile of the contact recipient\n\n```swift\nimport UIKit\nclass ContactViewController:\
    \ UIViewController, UITabBarDelegate, UITableViewDelegate, UITableViewDataSource,\
    \ UITextFieldDelegate {\nvar contact = Contact()\nvar profile:Profile?\nvar userid:String\
    \ = \"\"\nvar origniatorProfile:Profile?\nvar receipentProfile:Profile?\n```\n\
    \n#### UI Object Definition\n\nThe below provided code defines several UI elements\
    \ that will be used in the `ContactViewController` to create a user interface\
    \ for managing contacts. These elements include a tab bar, a header label, a text\
    \ field for searching contacts, and two table views for displaying business types\
    \ and contacts.\n\n**Tab bar**\n\n- Creates a `UITabBar` with a specific background\
    \ color\n- Sets up three `UITabBarItem` instances for “Profile”, “Contacts”, and\
    \ “Chats” with corresponding images and tags\n\n**Header label**\n\n- Creates\
    \ a `UILabel` for displaying the header text “Chat”\n- Sets text color, alignment,\
    \ and font\n\n**Business type text field**\n\n- Creates a `UITextField` for searching\
    \ contacts based on business type\n- Sets placeholder text, border style, and\
    \ other appearance properties\n\n**Business type table view**\n\n- Creates a `UITableView`\
    \ for displaying business types\n- Sets background color and enables scrolling\n\
    \n**Contact table view**\n\n- Creates a `UITableView` for displaying contacts\n\
    - Sets background color and enables scrolling\n\nSome key points to note in these\
    \ definitions are:\n\n- **Lazy loading:** The use of `private let` with closures\
    \ creates lazy-loaded properties, meaning the objects are only created when first\
    \ accessed.\n- **Auto Layout:** The `translatesAutoresizingMaskIntoConstraints`\
    \ = false property is used for all UI elements, indicating that Auto Layout will\
    \ be used for positioning and sizing.\n- **UI Customization:** The code sets various\
    \ properties to customize the appearance of the UI elements, such as colors, fonts,\
    \ and border styles.\n\n```swift\nprivate let tabBar:UITabBar = {\nlet tabbar\
    \ = UITabBar()\ntabbar.translatesAutoresizingMaskIntoConstraints = false\ntabbar.backgroundColor\
    \ = UIColor.init(red: 171/255, green: 189/255, blue: 217/255, alpha: 1)\nlet saveSymbolConfiguration\
    \ = UIImage.SymbolConfiguration(pointSize: 16, weight: .black)\nlet contact =\
    \ UIImage(systemName: \"doc.on.clipboard\", withConfiguration: saveSymbolConfiguration)\n\
    let contactbutton = UITabBarItem(title: \"Contacts\", image: contact, selectedImage:\
    \ contact)\ncontactbutton.tag = 1\nlet chat = UIImage(systemName: \"doc.plaintext\"\
    , withConfiguration: saveSymbolConfiguration)\nlet chatbutton = UITabBarItem(title:\
    \ \"Chats\", image: chat, selectedImage: chat)\nchatbutton.tag = 2\nlet profile\
    \ = UIImage(systemName: \"person.fill\", withConfiguration: saveSymbolConfiguration)\n\
    let profilebutton = UITabBarItem(title: \"Profile\", image: profile, selectedImage:\
    \ profile)\nprofilebutton.tag = 0\ntabbar.setItems([profilebutton, contactbutton,\
    \ chatbutton], animated: false)\nreturn tabbar\n}()\nprivate let headerLabel:UILabel\
    \ = {\nlet label = UILabel()\nlabel.text = \"Chat\"\nlabel.translatesAutoresizingMaskIntoConstraints\
    \ = false\nlabel.textColor = UIColor(displayP3Red: 128/255, green: 0/255, blue:\
    \ 128/255, alpha: 1)\nlabel.textAlignment = .center\nlabel.font = UIFont.boldSystemFont(ofSize:\
    \ 35)\nreturn label\n}()\nlet businessTypeTextField:UITextField = {\nlet textField\
    \ = UITextField()\ntextField.translatesAutoresizingMaskIntoConstraints = false\n\
    textField.borderStyle = .roundedRect\ntextField.textColor = .black\ntextField.layer.borderColor\
    \  = UIColor.systemGray4.cgColor\ntextField.layer.borderWidth = 1\ntextField.layer.cornerRadius\
    \ = 10\ntextField.placeholder = \"Select Business Type to Search Contacts\"\n\
    textField.textColor = .black\ntextField.isEnabled = true\ntextField.keyboardType\
    \ = .default\nreturn textField\n}()\nprivate let businessTypeTableView:UITableView\
    \ = {\nlet tableView = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints\
    \ = false\ntableView.backgroundColor = .white\ntableView.isScrollEnabled = true\n\
    return tableView\n}()\nprivate let contactTableView:UITableView = {\nlet tableView\
    \ = UITableView()\ntableView.translatesAutoresizingMaskIntoConstraints = false\n\
    tableView.backgroundColor = .white\ntableView.isScrollEnabled = true\nreturn tableView\n\
    }()\n```\n\n#### Lifecycle Method\n\nThis code defines the `viewDidLoad()` method,\
    \ which is a lifecycle method called when the view controller’s view is loaded\
    \ into memory. The key element of the code is defined below:\n\n- `super.viewDidLoad()`:\
    \ Calls the `viewDidLoad()` method of the superclass to ensure proper initialization\n\
    - `setup()`: Calls a custom method named `setup()`, to perform initial setup tasks\
    \ for the view controller\n- `drawTabBar()`: Calls a custom method named `drawTabBar()`\
    \ and adds and positions the UI objects within the view\n\n```swift\noverride\
    \ func viewDidLoad() {\nsuper.viewDidLoad()\nsetup()\ndrawTabBar()\n}\n```"
