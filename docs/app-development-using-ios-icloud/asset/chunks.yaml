    `String` 类；因此我们使用相同的系统定义的类名。


    #### 方法：查找最后一个索引


    ```

    func lastIndex(of string: String) -> Int? {

    }

    ```


    函数的名称为 `lastIndex`。它将接受一个 `String` 字面量，并返回该字符串的最后一个索引号，该索引是一个整数。请注意，`lastIndex`
    将作为 `String` 函数的一个新增函数在整个项目中可用。


    ```

    guard let index = range(of: string, options: .backwards) else { return nil }

    ```


    在这一行中，我们定义了一个变量 `index`。请注意，该变量被定义为 `let`，因为我们不会在函数作用域内重复使用它。此外，我们使用 `guard` 来确保如果用户提供的字符串有问题，不会导致抛出系统错误。


    系统定义的 `range` 函数会向后查找用户提供的字符串，如果找到则返回一个有效的范围给 `index` 变量；如果未找到或遇到错误，它将返回 `nil`（执行函数的
