    We will explain this concept with an example as described below.


    In our application, the system will check if the user already exists, and if it
    doesn’t, then the user will be considered a first-time user and they will be prompted
    to create a new login profile. In case if it is an existing user, then the user
    will be redirected to the user home screen. To achieve this function, do the following:


    **Model**


    * Create a `Model UIViewController` class, and find the iCloud user ID details.

    * In the **Model** `UIViewController` class, we will call the iCloud database
    to check if the user ID exists as a record in the profile database. If the record
    exists, a `true` Boolean value is returned or a `false` Boolean value is returned
    to the calling function.


    **View**


    * Create a **View** `UIViewController` class to display the new profile creation
    screen. We will show a simple header label to show the concept.

    * Create a **View** `UIViewController` class to display the user home screen.


    **Controller**


    * Create a **Controller** `UIViewController` class and get the iCloud user ID
    by calling a respective model method defined in a user-defined method.

    * In the **Controller** `UIViewController` class, this class will have a method
    that will call a function to check the iCloud database for an existing user ID
    (the definition of the function will be in our model `UIViewController` as explained
    in the next bullet point).

    * In the **Controller** `UIViewController` class, we will check the return Boolean
    value of the user''s existence, and if `false`, call a function to display a new
    profile screen. If the return value is `true`, it will call a different function
    to display the user''s home screen.


