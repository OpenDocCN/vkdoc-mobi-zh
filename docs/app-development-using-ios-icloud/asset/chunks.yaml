    #### Save Conversation Method


    This method saves the conversation to cloud when the chat is initiated for the
    first time. It takes the originator name, recipient name, the profiles of both
    originator and recipient, and the actual chat text.


    ```

    func saveNewChatRecordsToCloud(receipentname:String, originatorname:String, receipentprofile:CKAsset,
    originatorprofile:CKAsset, lastchat:String) {

    ```


    In this method, we will save two records to a public cloud database and one to
    the private cloud. The code below defines the database variables and also the
    conversation table name as explained before.


    ```

    let container = CKContainer.default()

    let publicDatabase = container.publicCloudDatabase

    let privateDatabase = container.privateCloudDatabase

    var recordType = "\(originatorname.replacingOccurrences(of: " ", with: ""))_\(receipentname.replacingOccurrences(of:
    " ", with: ""))"

    recordType = recordType.lowercased()

    ```


    The code below defines the following three record:


    *   **businessChatRecord**: This is defined dynamically one per user business.
    The table is names after the business name. It stores the originator of the chat
    name, the originator profile, a dummy value 1 for easy query retrieval, and the
    last chat conversation. This record will be stored in a public database.


    *   **chatRecord**: This is the conversation table which stores all conversation
    between two users (originator and recipient). It has four fields, originator user
    ID, chat text, date of chat creation, and dummy field with default value 1, for
    easy retrieval of records. This record will be stored in a public database.


    *   **personalChatRecord**: This record will be stored in chattables. It contains
    the conversation table name and recipient name, profile image, a dummy variable
    with default value 1, and the chat text. This record will be stored in a private
    database.


    An operation for the public cloud database is created for the **businessChatRecord**
    and the **personalChatRecord**.


    ```

    let businessChatRecord = CKRecord(recordType: "\(receipentname.replacingOccurrences(of:
    " ", with: "").lowercased())")

    businessChatRecord["chattablename"] =  "\(recordType)"

    businessChatRecord["originatorname"] = originatorname

    businessChatRecord["originatorprofile"] = CKAsset(fileURL: originatorprofile.fileURL!)

    businessChatRecord["dummy"] = "1"

    businessChatRecord["lastchat"] = lastchat

    let chatRecord = CKRecord(recordType: "\(recordType)")

    chatRecord["originatorid"] = self.originatorid

    chatRecord["chattext"] = self.chattext

    chatRecord["datecreated"] = Date()

    chatRecord["dummy"] = "1"

    let personalChatRecord = CKRecord(recordType: "chattables")

    personalChatRecord["chattablename"] = "\(recordType)"

    personalChatRecord["receipentprofile"] = CKAsset(fileURL: receipentprofile.fileURL!)

    personalChatRecord["receipentname"] = receipentname

    personalChatRecord["dummy"] = "1"

    personalChatRecord["lastchat"] = lastchat

    let publicSaveOperation = CKModifyRecordsOperation(recordsToSave: [businessChatRecord,
    chatRecord])

    publicSaveOperation.savePolicy = .changedKeys

    ```


    The code below is executed to update the iCloud repository for the public cloud.
    Upon success, we are creating a private cloud operation for our **personalChatRecord**
    data and executing it. Upon success, we are leaving the group. In case of failure,
    we are printing errors to the console.


    ```

    publicSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    let privateSaveOperation = CKModifyRecordsOperation(recordsToSave: [personalChatRecord])

    privateSaveOperation.savePolicy = .changedKeys

    privateSaveOperation.modifyRecordsResultBlock = { result in

    switch result {

    case .success:

    self.syncQueue.async {

    self.group.leave()

    }

    // Handle any further actions or UI updates

    case .failure(let error):

    print("Error saving record to private database: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    privateDatabase.add(privateSaveOperation)

    }

    // Handle any further actions or UI updates

    case .failure(let error):

    print("Error saving records: \(error.localizedDescription)")

    // Handle the error case

    }

    }

    publicDatabase.add(publicSaveOperation)

    }

    ```'
