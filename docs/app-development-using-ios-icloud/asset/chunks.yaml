    and has a completion handler, which returns a **Conversation** class array object
    and error, if any.


    ```

    func getChats(receipentname:String, originatorname:String, completion:@escaping
    ([Conversation], Error?) -> Void){

    ```


    In the code below, we are defining a method level variable with the name **chats**,
    which is an array of type **Conversation**. As the recordtype is dynamic, we are
    constructing that by combining the originator and recipient names.


    ```

    var chats:[Conversation] = []

    var recordType = "\(originatorname.replacingOccurrences(of: " ", with: ""))_\(receipentname.replacingOccurrences(of:
    " ", with: ""))"

    recordType = recordType.lowercased()

    ```


    We want to get all conversation. The dummy variable is set during creation of
    the chat with the value set to 1 always. This will help us to get all conversations.
    We are sorting the result by creation date. This way we will have all recently
    created records at the top, setting the operation configuration and limiting the
    result to the top 2000 chat records.


    Note that you can also implement batch retrieval, whereby a fixed number of conversations
    are retrieved first. Upon user action such as pull-down gesture, you can retrieve
    the next set. In our code, we are simply retrieving the top 2000 records.


    ```

    let pred = NSPredicate(format: "dummy == %@", "1")

    let query = CKQuery(recordType: "\(recordType)", predicate: pred)

    query.sortDescriptors = [NSSortDescriptor(key: "datecreated", ascending: true)]

    let operation = CKQueryOperation(query: query)

    CKContainer.default().publicCloudDatabase.add(operation)

    let operationConfiguration = CKOperation.Configuration()

    operationConfiguration.timeoutIntervalForRequest = 10

    operationConfiguration.timeoutIntervalForResource = 10

    operation.configuration = operationConfiguration

    operation.resultsLimit = 2000

    ```


    The **recordMatchedBlock** is called when the operation is complete. Iterating
    through the **enum** object upon **success**, we are setting our chat object to
    the retrieved value and appending it to the function level **chats** variable.
    On **failure**, we are printing the error on the console.


    ```

    operation.recordMatchedBlock = { recordID, result in

    switch result {

    case .success(let record):

    let chat = Conversation(chattext: record["chattext"] as? String, originatorid:
    record["originatorid"] as? String)

    chat.record = record

    chats.append(chat)

    case .failure(let error):

    print(error.localizedDescription)

    }

    }

    ```


    Finally, in the queryResultBlock, we are returning the completing handler with
    chats array object and nil in case of success and nil and error in case of failure.


    ```

    operation.queryResultBlock = { result in

    DispatchQueue.main.async {

    switch result {

    case .failure(let error):

    debugPrint(error)

    print(error)

    completion(nil, error)

    case .success(_):

    completion(chats, nil)

    }

    }

    }

    }

