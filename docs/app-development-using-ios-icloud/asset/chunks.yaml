    # 7. Create an Expanding Text View UI Object


    UI text view by default has a fixed size, which can fit a few rows of texts. One
    can extend the text view size by setting the height and the width according to
    your app requirement. In this chapter, we will learn how to dynamically expand
    and contract a text view based on the text length. This feature can come handy
    when the text that the user will input is of variable length and you want to occupy
    the limited screen space based on how much the user provides as input text.'
