    ```


    The above code is the final block of code for the table view. This function is
    invoked when the user selects a row. At that moment, we are assigning the text
    field the business type value that the user selected and making sure the focus
    is away from the text field.


    ### Text Field Functions


    The next three functions are text field event functions. These methods are triggered
    when certain actions are performed on the text field.


    ```

    @objc func businessTypeEditingDidBegin(sender: UITextField){

    tempBusiness = business

    businessTypeTableView.isHidden = false

    }

    ```


    The above code is executed when the user begins texting. At this time, we are
    transferring the entire **business** object to a temporary variable called **tempBusiness**.
    This is required because we are going to manipulate the **business** object to
    contain only the objects that matched the user''s search criteria. Once the editing
    is done, we will make sure the original list is reset into the **business** object
    so that it is ready for the next search.


    We are also now making the business type table view visible.


    ```

    @objc func businessTypeEditingDidEnd(sender: UITextField){

    business = tempBusiness

    businessTypeTableView.isHidden = true

    }

    ```


    The above code is executed when the editing is over. Currently, we are transferring
    the **tempBusiness** object (which contains the original list of business type
    objects) to the original business object (so that it is ready for next search).


    We are also now making the business type table view hidden now.


    ```

    @objc func businessTypeEditingChanged(sender: UITextField){

    business = business.filter{

    business in return business.businesstype.trimmingCharacters(in: .whitespaces).lowercased().contains(sender.text!.lowercased())

    }

    if(sender.text == ""){

    business = tempBusiness

    }

    businessTypeTableView.reloadData()

    }

    ```


    The above code is executed every time a user is typing into the text field. Upon
    user typing, we are filtering the **business** object based on the current text
    in the text field. We are removing the white spaces and making everything lowercase
    to make case-insensitive search. Once the search is commenced, the searched objects
    are transferred to the **business** object.


    In case the user deletes all text, we are reassigning the original list to the
    **business** object by transferring values from **tempBusiness** object to business
    object.


    At the end, by refreshing the **business** type table view, we are reloading the
    table to only show the retracted list of **business** object as stored in the
    business object (notice table is drawn based on the **business** object value).


