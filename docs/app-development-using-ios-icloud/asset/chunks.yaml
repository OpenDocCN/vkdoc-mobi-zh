- fmt: '### ChatDetailViewController


    `ChatDetailViewController` shows the conversation between the user and another
    person from the contact list. It inherits from `UIViewController` and conforms
    to `UITableViewDelegate`, `UITableViewDataSource`, and `UITextViewDelegate` protocols.
    The key properties are defined below:


    - `profile`: The current user’s profile

    - `origniatorProfile`: The profile of the chat initiator

    - `receipentProfile`: The profile of the chat recipient

