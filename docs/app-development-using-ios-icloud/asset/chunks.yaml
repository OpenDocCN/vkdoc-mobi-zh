    class ProfileCreationViewController: UIViewController{

    ```


    We imported two Xcode toolkits: `UIKit` for all lifecycle and UI objects inclusion
    and `Cloudkit` for all iCloud persistence and data storage. Next, we are defining
    our UI view controller, `ProfileCreationViewController`, to create our profile
    image picker.


    ```

    let personalProfileImageView: UIImageView = {

    let theImageView = UIImageView()

    theImageView.image = UIImage(systemName: "person.fill")

    theImageView.contentMode = .scaleAspectFit

    theImageView.translatesAutoresizingMaskIntoConstraints = false

    theImageView.layer.masksToBounds = true

    theImageView.layer.borderWidth = 1

    theImageView.layer.borderColor = UIColor.systemGray.cgColor

    return theImageView

    }()

    ```


    Our view controller will have an `UIImageView` object. This object will allow
    interaction, and clicking on the image view will offer the user an action sheet
    to either choose an image from the user photo library or take a picture from the
    camera. Note that to enable this, we need to set the application to prompt the
    user with a permission dialogue to access the photo library and the camera. Refer
    to the section at the end of this chapter to learn how to configure these properties.


    Also, note our image view has an image object, which is by default displaying
    a system-defined person image with gray background.


    ```

    let saveButton:UIButton = {

    let button = UIButton()

    button.translatesAutoresizingMaskIntoConstraints = false

    button.contentHorizontalAlignment = .center

    button.setTitleColor(.white, for: .normal)

    button.titleLabel?.font = UIFont.boldSystemFont(ofSize: 14)

    button.titleLabel?.textAlignment = .center

    button.setTitle("Save and Exit", for: .normal)

    button.layer.cornerRadius = 5

    button.backgroundColor = UIColor(displayP3Red: 128/255, green: 0/255, blue: 128/255,
    alpha: 1)

    button.isEnabled = true

    return button

    }()

    ```


    Beside the image view, we are also defining a save button, and clicking the button
    will allow the user to save the image to iCloud. We are giving a blue background
    color to the button.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    let personalProfileGestureRecognizer = UITapGestureRecognizer(target: self, action:
    #selector(personalImageTapped(tapGestureRecognizer:)))

    personalProfileImageView.isUserInteractionEnabled = true

    personalProfileImageView.addGestureRecognizer(personalProfileGestureRecognizer)

    personalProfileImageView.layer.cornerRadius =  50

    drawPersonalScreen()

    }

    ```


    Now that we have defined the objects, next, we are going to define our lifecycle
    method `viewDidLoad()`. This method is evoked as soon as the user instantiates
    the `ProfileCreationViewController`. In this function, we are doing a few operations
    as described below:


    - Image view controller doesn''t have predefined events like a UI button or a
    UI text field, so we need to manually define it. `UITapGestureRecognizer` is an
    event that we are defining to achieve the tap event on the image. We are defining
    the action on tap to call a method `personalImageTapped` which takes the tap gesture
    as a default input parameter.

    - We are then making sure that the `UIImageView` object that we defined before
    (`personalProfileImageView`) its user interaction property is set to `true`. This
    will allow the gesture to capture event.

    - Finally, we are attaching our user-defined gesture event to our UI image object.

    - We are also setting a value of `50` to the corner radius of our image view.
    This will make the image view appear as a circle.

    - We are at the end calling a method called `drawPersonalScreen`, which will draw
    the image view and the button on the screen.


    ```

    func drawPersonalScreen(){

    let screensize: CGRect = UIScreen.main.bounds

    let screenWidth = screensize.width

    ```


    This is our `drawPersonalScreen` method. We are getting the iPhone screen width,
    which we will need to calculate the positioning of the UI objects on the screen.
    As there are various form factors of the iPhone, it is recommended to dynamically
    calculate the layout for better display of objects. Although in the below code
    we will not use it, it is a good feature to learn as you start creating complex
    screens.


    ```

    view.addSubview(personalProfileImageView)

    let constraints2 = [

    personalProfileImageView.topAnchor.constraint(equalTo: view.topAnchor, constant:
    5),

    personalProfileImageView.leftAnchor.constraint(equalTo: view.leftAnchor, constant:
    140),

    personalProfileImageView.widthAnchor.constraint(equalToConstant: 100),

    personalProfileImageView.heightAnchor.constraint(equalToConstant: 100)

    ]

    NSLayoutConstraint.activate(constraints2)

    ```


    This part of the code adds the `UIImageView` to the screen. As the image needs
    to be circular, it is important that the height and the width are the same. We
    are also leaving `5` spaces from the top and `140` spaces from the left.


    ```

    view.addSubview(saveButton)

    let constraints = [

    saveButton.topAnchor.constraint(equalTo: personalProfileImageView.bottomAnchor,
    constant: 40),

    saveButton.leftAnchor.constraint(equalTo: view.rightAnchor, constant: 5),

    saveButton.widthAnchor.constraint(equalToConstant: 185),

    saveButton.heightAnchor.constraint(equalToConstant: 40)

    ]

    NSLayoutConstraint.activate(constraints)

    saveButton.addTarget(self, action: #selector(saveAction), for: .touchUpInside)

    }

    ```


    Now, we are adding the save button to the screen. Notice how the top anchor of
    the button is taking reference from the `UIImageView` and drawing it `40` pixels
    after the image.


    Notice that we are also adding the touch up inside the event and calling a method
    `saveAction`. So, when the user taps the save button, it will call this method
    to save the image to the iCloud database.


    ```

    @objc func personalImageTapped(tapGestureRecognizer: UITapGestureRecognizer){

    presentPhotoOptions()

    }

    ```


    This method is invoked when the user taps the image view. The method in turn calls
    our custom method `presentPhotoOptions`.


    ```

    @objc func saveAction(sender: UIButton){

    profileSave()

    }

    ```


    This method is called when the user taps the save button, which in turn calls
    the `profileSave` function defined in the next section.


    ```

    func profileSave(){

    ```


    This is the `profileSave` which will save the image and some other profile data
    (not captured in our screen to keep the code simple) to the iCloud repository.


    ```

    let personalData = personalProfileImageView.image?.pngData()

    let personalFilename = commonFunctions.getDocumentsDirectory().appendingPathComponent("copy.png")

    try? personalData?.write(to: personalFilename)

    let personalProfile : CKAsset?  = CKAsset(fileURL: personalFilename)

    ```


    Data in an iCloud is stored as a `CKAsset` type object. This object stores the
    image as a binary object. In the code defined above, we are doing the following:


    - From the UI image object, we are getting the data in `png` format by using the
    system-defined method `pngData()` on the image and storing it in a local constant
    `personalData`.

    - Next, we are creating a dumpy object `copy.png` in the current workspace of
    the user. The path to the file is stored in a local constant `personalFilename`.

    - Then we are overwriting the `copy.png` file with the `png` data of the user
    uploaded profile image.

    - And finally, we are creating a `CKAsset` object giving the path to the local
    directory and the filename.


    This `CKAsset` can now be stored in an iCloud repository.


    ```

    let profile:Contact.Profile = Contact.Profile(userid: userid, personalprofile:
    personalProfile!, name: nameTextField.text!, personalphone: personalPhone)

