  trans: "\n# 应用委托注册\n\n实现推送通知的第一步是注册通知。iCloud iOS 工具包提供了一种数据库订阅方法，通过该方法我们可以使用唯一标识符进行订阅注册。一旦该订阅被持久化并允许发送通知，它就会为应用启用推送通知功能。\n\
    \n打开您的应用委托类，并添加以下函数。该方法执行以下操作：\n\n- 获取默认容器公共数据库的引用\n\n```\nlet container = CKContainer.default()\n\
    let publicDatabase = container.publicCloudDatabase\nlet subscription = CKDatabaseSubscription(subscriptionID:\
    \ \"mySubscription\")\n```\n\n- 创建一个类型为 `CKDatabaseSubscription`、名称为 `\"mySubscription\"\
    ` 的订阅变量\n\n```\nlet subscription = CKDatabaseSubscription(subscriptionID: \"mySubscription\"\
    )\n```\n\n- 创建一个通知信息对象，并将其属性 `shouldSendContentAvailable` 设置为 `true`\n\n```\n\
    let notificationInfo = CKSubscription.NotificationInfo()\nnotificationInfo.shouldSendContentAvailable\
    \ = true\n```\n\n- 将通知信息对象赋值给订阅变量\n\n```\nsubscription.notificationInfo = notificationInfo\n\
    ```\n\n- 使用订阅对象更新数据库\n\n```\nlet operation = CKModifySubscriptionsOperation(subscriptionsToSave:\
    \ [subscription], subscriptionIDsToDelete: [])\noperation.modifySubscriptionsResultBlock\
    \ = { result in\n    switch result {\n    case .success:\n        print(\"Succesfully\
    \ Subscribed\")\n    case .failure(let error):\n        print(\"Error registering\
    \ for notifications: \\(error.localizedDescription)\")\n    }\n}\npublicDatabase.add(operation)\n\
    ```\n\n```\nfunc registerForNotifications() {\n    let container = CKContainer.default()\n\
    \    let publicDatabase = container.publicCloudDatabase\n    let subscription\
    \ = CKDatabaseSubscription(subscriptionID: \"mySubscription\")\n    let notificationInfo\
    \ = CKSubscription.NotificationInfo()\n    notificationInfo.shouldSendContentAvailable\
    \ = true\n    subscription.notificationInfo = notificationInfo\n    let operation\
    \ = CKModifySubscriptionsOperation(subscriptionsToSave: [subscription], subscriptionIDsToDelete:\
    \ [])\n    operation.modifySubscriptionsResultBlock = { result in\n        switch\
    \ result {\n        case .success:\n            print(\"Succesfully Subscribed\"\
    )\n        case .failure(let error):\n            print(\"Error registering for\
    \ notifications: \\(error.localizedDescription)\")\n        }\n    }\n    publicDatabase.add(operation)\n\
    }\n```\n\n## 设置订阅\n\n接下来，我们需要为变更设置一个订阅。您可以在记录更新或创建之后，将以下方法添加到任意模态类中。在我们的示例中，我们将把它添加到聊天模型类中。该功能执行以下操作：\n\
    \n- 访问 iCloud 环境中的容器和公共数据库。\n\n```\nlet container = CKContainer.default()\nlet\
    \ publicDatabase = container.publicCloudDatabase\n```\n\n- 创建一个查询订阅。请注意，查询订阅需要记录类型名称和订阅名称（名称必须与您之前创建的保持一致），以及用于告知系统需要在创建或更新该记录类型时提供通知的选项。此外，您还可以为查询提供条件。在我们的案例中，我们将其应用于所有记录，因此\
    \ `NSPredicate` 的值为 `True`。\n\n```\nlet subscription = CKQuerySubscription(\n\
    \    recordType: \"\\(tablename)\",\n    predicate: NSPredicate(value: true),\n\
    \    subscriptionID: \"mySubscription\",\n    options: [.firesOnRecordCreation,\
    \ .firesOnRecordUpdate]\n)\n```\n\n- 创建带有自定义文本的通知信息。此文本将显示在用户的屏幕上。\n\n```\nlet\
    \ notificationInfo = CKSubscription.NotificationInfo()\nnotificationInfo.alertBody\
    \ = \"You have a New Chat\"\nsubscription.notificationInfo = notificationInfo\n\
    ```\n\n- 最后，保存订阅。\n\n```\npublicDatabase.save(subscription) { (subscription, error)\
    \ in\n    if let error = error {\n        print(\"Error saving subscription: \\\
    (error.localizedDescription)\")\n        self.group.leave()\n    } else {\n  \
    \      print(\"Subscription saved successfully!\")\n        self.group.leave()\n\
    \    }\n}\n```\n\n这将触发通知流程。所有订阅了该记录类型的用户都将收到通知对象中指定的警报。\n\n```\nfunc setSubscription(tablename:\
    \ String, chattext: String, originatorname: String) {\n    // 为数据库表设置一个 CKSubscription\n\
    \    let container = CKContainer.default()\n    let publicDatabase = container.publicCloudDatabase\n\
    \    let subscription = CKQuerySubscription(\n        recordType: \"\\(tablename)\"\
    ,\n        predicate: NSPredicate(value: true),\n        subscriptionID: \"mySubscription\"\
    ,\n        options: [.firesOnRecordCreation, .firesOnRecordUpdate]\n    )\n  \
    \  let notificationInfo = CKSubscription.NotificationInfo()\n    notificationInfo.alertBody\
    \ = \"你有一条新聊天\"\n    subscription.notificationInfo = notificationInfo\n    publicDatabase.save(subscription)\
    \ { (subscription, error) in\n        if let error = error {\n            print(\"\
    保存订阅时出错: \\(error.localizedDescription)\")\n            self.group.leave()\n \
    \       } else {\n            print(\"订阅保存成功！\")\n            self.group.leave()\n\
    \        }\n    }\n}\n```\n\n# 用户元数据间的对话\n\n在前面的章节中，我们学习了 MVC 架构、iCloud、用于管理异步调用的新\
    \ iOS 块例程、图像处理以及许多其他概念。在本章中，我们将整合所有这些概念，创建一个用户聊天应用。该聊天程序将具有以下功能：\n\n- 能够创建用户联系人。我们将能够创建联系人，将其存储在\
    \ iCloud 存储库中，并在应用屏幕上显示联系人。\n\n- 与特定联系人发起对话。我们将能够实时与联系人中的用户进行交流。将对话持久化到数据库中，并检索过去的对话。\n\
    \n- 为保持程序简单，我们将所有对话保存在公共数据库中，并使用唯一的表名概念来找出需要检索哪些用户的对话。\n\n- 请注意，我们不执行端到端加密或建立用于隐私保护的安全通道。我们也不专注于显示和存储图片或视频。本程序的目的是展示如何将之前学到的概念应用于创建实际应用。\n\
    \n## iCloud 数据库\n\n我们需要在公共数据库中创建四个表，如下所述。\n\n### 个人资料记录类型\n\n此记录类型将存储用户发起对话所需的所有联系人。该记录类型的定义如下：\n\
    \n| 字段名 | 字段类型 | 描述 |\n| --- | --- | --- |\n| `userid` | String | 用于标识用户的唯一 ID\
    \ |\n| `personalprofile` | CKAsset | 联系人头像图片 |\n| `name` | String | 联系人姓名 |\n\
    | `businessname` | String | 用户企业名称 |\n| `businesstype` | String | 企业类型 |\n\n在\
    \ iCloud 存储库中，个人资料记录类型将如下图所示。\n\n![](img/533539_2_En_11_Figa_HTML.jpg)\n"
- fmt: '### `Chattable` Record Type


    `Chattable` record type will store the name of the table where user conversation
    is stored. Please note that between the app user and the selected contact, the
    conversation is stored in a unique table. The name of the table is stored as a
    reference here to uniquely identify the conversation.


    | Field name | Field type | Description |

    | --- | --- | --- |

    | `chattablename` | `String` | Unique chat table which will store the conversation
    between the user and a contact |

    | `receipentprofile` | `CKAsset` | Profile image of the contact. Note that we
    could have stored the reference here, but for simplicity, we are duplicating the
    image of the contact. This will be shown next to the contact conversation |

    | `receipentname` | `String` | Name of the contact whose chat will be displayed
    |

    | `lastchat` | `String` | The last chat text details. This will be shown next
    to the contact’s name |


    In the iCloud repository, the `chattable` record type will look like the below
    screen.


    ![](images/533539_2_En_11_Chapter/533539_2_En_11_Figb_HTML.jpg)


    ### `Conversation` Record Type


    This record type will store the chat conversation between the app user and a contact.
    The name of this table is stored in the `chattable` defined above.


    | Field name | Field type | Description |

    | --- | --- | --- |

    | `chattext` | `String` | This field will store the chat texts |

    | `originatorid` | `CKAsset` | The ID of the user who created the text |


    In the iCloud repository, the `conversation` record type will look like the below
    screen. Note that there will be multiple `conversation` record types based on
    the unique conversation between users. The nomenclature of the table name is based
    on the username of the chat initiator + `"_"` + "the name of the business type"
    of the target chat user.


    ![](images/533539_2_En_11_Chapter/533539_2_En_11_Figc_HTML.jpg)


    ### `Business` Record Type


    Every user business will have one table, uniquely named after the business name.
    This table will store all the conversation table name, which in turn stores the
    unique conversation between the business and the other user.


    | Field name | Field type | Description |

    | --- | --- | --- |

    | `chattablename` | `String` | Unique chat table which will store the conversation
    between the user and a contact |

    | `originatorprofile` | `CKAsset` | Profile image of the contact. Note that we
    could have stored the reference here, but for simplicity, we are duplicating the
    image of the contact. This will be shown next to the contact conversation |

    | `originatorname` | `String` | Name of the originator of conversation |

    | `lastchat` | `String` | The last chat conversation with the user for whom we
    have the `chattablename` created |


    In the iCloud repository, the `business` record type will look like the below
    screen. Note that there will be one `business` record type per user. The nomenclature
    of the table name is based on unique business name of the user.


    ![](images/533539_2_En_11_Chapter/533539_2_En_11_Figd_HTML.jpg)


    Although you can choose to do it, you don’t have to create the tables manually
    in the iCloud repository. Once you do your iCloud configuration on your project
    (we have learned this in the Part I of this book), the tables are created automatically
    upon the first save request.


    # 12. Conversation Between Users – Modal Definition


    ## Define the Modal Classes


    To mimic the above tables, we would need our conversational app to create the
    respective modal class. Often the modal class has a one-to-one relationship with
    an iCloud table, but at times, we have also had a one-to-many relationship. We
    will explore this in detail in the section below. Each class will have respective
    CRUD functions to achieve the iCloud operations such as creation of records and
    retrieval of records.


    ### `Profile` Modal Class


    The first modal class we are coding is the user profile. The code below confirms
    the `UIKit` (default framework for UI definition) and the `CloudKit` (this is
    required for iCloud operations) modules and defines a custom class name `Profile`
    of type `NSObject`.


    ```swift

    import UIKit

    import CloudKit

    class Profile: NSObject {

    ```


    In this class, we will perform many iCloud asynchronous operations. To run the
