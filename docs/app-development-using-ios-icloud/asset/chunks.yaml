- fmt: "### Text Field Event Methods\n\nThere are three events we will define in this\
    \ section as described below. The details of the method are explained below:\n\
    \n**Did editing begin**\n\nThis function is triggered when the user begins editing\
    \ the `businessTypeTextField`. It prepares the UI for selecting a business type\
    \ from the table view. The details of the method are explained below:\n\n- `@objc`:\
    \ Makes the function callable from Objective-C.\n- `businessTypeEditingDidBegin(sender:\
    \ UITextField)`: Defines the function with a `UITextField` parameter (although\
    \ not used in this implementation).\n- `tempBusiness = business`: Creates a copy\
    \ of the business array into the `tempBusiness` array. This is to store the original\
    \ business data before filtering.\n- `businessTypeTableView.isHidden = false`:\
    \ Makes the `businessTypeTableView` visible.\n- `saveButton.isHidden = true`:\
    \ Hides the save button while the user is selecting a business type.\n\n```\n\
    @objc func businessTypeEditingDidBegin(sender: UITextField){\ntempBusiness = business\n\
    businessTypeTableView.isHidden = false\nsaveButton.isHidden = true\n}\n```\n\n\
    **Editing did end method**\n\nThis function is triggered when the user finishes\
    \ editing the `businessTypeTextField`. It restores the original business data\
    \ and hides the table view and save button. The details of the method are explained\
    \ below:\n\n- `@objc`: Makes the function callable from Objective-C.\n- `businessTypeEditingDidEnd(sender:\
    \ UITextField)`: Defines the function with a `UITextField` parameter (although\
    \ not used in this implementation).\n- `business = tempBusiness`: Restores the\
    \ original business array from the `tempBusiness` array.\n- `businessTypeTableView.isHidden\
    \ = true`: Hides the `businessTypeTableView`.\n- `saveButton.isHidden = false`:\
    \ Shows the save button again.\n\n```\n@objc func businessTypeEditingDidEnd(sender:\
    \ UITextField){\nbusiness = tempBusiness\nbusinessTypeTableView.isHidden = true\n\
    saveButton.isHidden = false\n}\n```\n\n**When editing changed method**\n\nThis\
    \ function filters the business array based on the text entered in the `businessTypeTextField`\
    \ and reloads the table view. The details of the method are explained below:\n\
    \n- `@objc`: Makes the function callable from Objective-C.\n- `businessTypeEditingChanged(sender:\
    \ UITextField)`: Defines the function with a `UITextField` parameter.\n- `business\
    \ = business.filter { ... }`: Filters the business array using a closure.\n  \
    \  - The closure iterates over each business element.\n    - It checks if the\
    \ `businesstype` property, after trimming whitespace and converting to lowercase,\
    \ contains the lowercase version of the text in the sender (text field).\n   \
    \ - If the condition is true, the business is included in the filtered array.\n\
    - `if (sender.text == \"\")`: Checks if the text field is empty.\n    - If empty,\
    \ it restores the original business array from `tempBusiness`.\n- `businessTypeTableView.reloadData()`:\
    \ Reloads the table view to reflect the filtered data.\n\n```\n@objc func businessTypeEditingChanged(sender:\
    \ UITextField){\nbusiness = business.filter{\nbusiness in return business.businesstype.trimmingCharacters(in:\
    \ .whitespaces).lowercased().contains(sender.text!.lowercased())\n}\nif(sender.text\
    \ == \"\"){\nbusiness = tempBusiness\n}\nbusinessTypeTableView.reloadData()\n\
    }\n```\n\n### Saving Provide Method\n\nThis function appears to handle saving\
    \ user profile information, including an image, to `CloudKit`. A detail breakdown\
    \ of the code is given below:\n\n**Image saving**\n\n- `let personalData = personalProfileImageView.image?.pngData()`:\
    \ Extracts PNG data from the `personalProfileImageView` image.\n- `let personalFilename\
