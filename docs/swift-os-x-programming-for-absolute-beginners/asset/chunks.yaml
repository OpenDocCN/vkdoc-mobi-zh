    \ ThingTwo.myColor\n        ObjectTwo.drawsBackground = true\n        ObjectTwo.backgroundColor\
    \ = ThingTwo.myBackground\n    }\n\n}\n```\n\n要查看此程序的工作原理，请按照以下步骤操作：\n\n选择 InheritProgram\
    \ ➤ 退出 InheritProgram。\n\n![A978-1-4842-1233-2_12_Fig17_HTML.jpg](img/A978-1-4842-1233-2_12_Fig17_HTML.jpg)\n\
    \n**图 12-17.** 点击 Change 按钮会使用相同的方法名称修改两个不同的对象\n\n选择 Product ➤ Run。Xcode 会运行你的\
    \ InheritProgram 项目。注意两个标签看起来一模一样。点击 Change 按钮。Object 1 标签仅改变了其文本颜色，因为它代表的是一个只有一个属性（`myColor`）的类。Object\
    \ 2 标签同时改变了其文本颜色和背景颜色，因为它拥有两个属性（`myColor` 和 `myBackground`）。尽管 `change()` 方法名称在两个类中相同，但它在第二个类中被重写了，以修改\
    \ `myBackground` 属性。\n\n## 总结\n\n类让你能够将相关代码组织在一起，使数据（属性）和操作这些数据的函数（方法）存储在同一位置。扩展类功能最直接的方式是通过继承来创建子类。\n\
    \n继承允许你继承另一个类的所有属性和方法。一个类只能继承自一个其他类，但那个其他类也可以继承自另一个类，从而形成类之间相互继承的链式效果。Cocoa 框架正是基于这种类继承链的理念构建的。\n\
    \n要阻止继承，你可以使用 `final` 关键字。要标识你正在重写一个属性或方法，你需要使用 `override` 关键字。\n\n除了继承之外，你还可以通过扩展和协议来扩展类的功能。协议通常与\
    \ Cocoa 框架一起使用，以扩展类的功能。通过继承、扩展和协议，你可以扩展任何类的功能，从而轻松地重用现有代码。\n\n# 13. 创建用户界面\n\n\
    虽然可以创建完全不需要与用户交互的程序（例如控制交通信号灯的程序），但更常见的是创建显示某种用户界面的程序。通常这意味着显示一个窗口，其中包含各种项目，例如用于显示文本的标签、允许用户输入内容的文本字段，以及用于让用户控制程序的按钮或下拉菜单。\n\
    \n创建有效的用户界面完全取决于程序的目的。商业程序通常遵循带有下拉菜单和按钮的标准规范，但视频游戏可能会创建自定义界面，看起来可能与标准的 OS X 程序完全不同。归根结底，用户界面需要满足用户的需求。如果在遵循标准用户界面设计规范和让用户界面更易于用户使用之间做出选择，请始终将用户放在首位。\n\
    \n为了帮助你更好地理解用户界面设计，Apple 提供了一份名为《OS X 人机界面指南》的免费文档。这份文档简要概述了典型的 OS X 用户界面如何有效地工作，并特别强调了利用\
    \ OS X 最新特性。通过这样做，你的 OS X 程序将呈现出现代和与时俱进的外观。未能利用 OS X 的最新特性意味着你的程序即使是全新的，也可能看起来过时。\n\
    \n在前面的章节中，你已经使用 Xcode 设计了简单的用户界面。在本章中，我们将更深入地探讨 Xcode 中专注于帮助你设计用户界面的不同部分。\n\n\
    记住，没有“完美”的用户界面设计。“完美”的用户界面是那种使任务尽可能简单、不费吹灰之力，以至于用户甚至感觉不到与任何用户界面交互的界面。用户界面充当着你与程序之间的中间人或翻译者。任何用户界面的目标都是让用户感觉他们是在直接与程序进行沟通和操作。\n"
- fmt: '# Understanding User Interface Files


    The Cocoa framework defines classes for creating every possible user interface
    item from a button (the `NSButton` class) and a text field (`NSTextField`) to
    a slider (`NSSlider`) or a date picker (`NSDatePicker`). Theoretically, it’s possible
    to create an entire user interface using nothing but Swift code. However, this
    can be tedious because you can’t see how your user interface looks until you actually
    run your program. This can be as clumsy as trying to paint a picture by describing
    exactly where you need to put a paintbrush on a canvas and the specific angle
    and direction to move your hand.


    Rather than force you to write Swift code to define your user interface, Xcode
    offers a feature called Interface Builder. The idea behind Interface Builder is
    that you can design your user interface by dragging and dropping items on to a
    window.


    The advantage of dragging and dropping items to create a user interface means
    you can see how your user interface looks so you can rapidly adjust and modify
    it. In addition, by separating the design of your user interface from your Swift
    code, you can now make changes to your user interface without affecting your Swift
    code and vice versa.


    In the old days when programmers had to write code to create a user interface,
    modifying the user interface code risked affecting the code that made the program
    work (and vice versa). That meant modifying a program went slowly because you
    had to constantly test to make sure your changes didn’t affect another part of
    your program.


    By keeping your user interface isolated from your Swift code, Xcode lets you create
    reliable programs faster than before. Now you can swap out one user interface
    and replace it with another one without affecting your code, or you can modify
    your code without affecting your user interface.


    Xcode gives you two choices for how to store your user interface:


    *   In an `.xib` file

    *   In a `.storyboard` file


    An `.xib` file (which stands for Xcode Interface Builder) typically contains a
    single window or view of your user interface. A simple program might have one
    `.xib` file for its user interface, but a more sophisticated program would likely
    need several `.xib` files to store different windows.


    A `.storyboard` file consists of one or more views and segues where a view typically
    represents a window that appears on the screen and a segue defines the transition
    from one view to the next.


    You can actually combine both `.xib` and `.storyboard` files in a single project
    to create your program’s user interface. Since `.storyboard` files are used to
    create iOS apps, `.storyboard` files are becoming more common for creating OS
    X user interfaces as well. ([Chapter 14](#A978-1-4842-1233-2_14_Chapter.html)
    explains more about storyboards and segues.)


    The basic component of a user interface is a view, which displays information
    on the screen. A view can be an entire window or just a box that can display information
    such as a table, a scrolling list of text, or a picture. Whether you’re using
    `.xib` or `.storyboard` files, user interfaces always consist of one or more views
    containing other user interface items, such as buttons and text fields.


    # Searching the Object Library


    To display your program’s user interface, you need to click on the `.xib` or `.storyboard`
    file in the Project Navigator pane. Once you’ve selected a user interface file
    to modify, you can then drag items from the Object Library (in the bottom right
    corner of the Xcode window) and place it anywhere on your user interface. To view
    the Object Library, choose View ➤ Utilities ➤ Show Object Library.


    There are two ways to search the Object Library. One way is to simply scroll up
    and down until you find the item you want. Since the Object Library lists every
    possible user interface item available, scrolling can be clumsy and slow.


    A faster method is to use the search field at the bottom of the Object Library
    pane as shown in Figure [13-1](#A978-1-4842-1233-2_13_Chapter.html#Fig1). Just
    type part of the name of the user interface item you want to use and the Object
    Library filters out every item that doesn’t match what you typed.


    ![A978-1-4842-1233-2_13_Fig1_HTML.jpg](A978-1-4842-1233-2_13_Fig1_HTML.jpg)


    Figure 13-1.


    The search field lets you quickly find user interface items in the Object Library


    To see how to search the Object Library, follow these steps:


    1.  From within Xcode choose File ➤ New ➤ Project.

    2.  Click Application under the OS X category.

    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    4.  Click in the Product Name text field and type `UIProgram`.

    5.  Make sure the Language pop-up menu displays Swift and that no check boxes
    are selected. Notice at this point you could choose to use storyboards by selecting
    the “Use Storyboards” check box as shown in Figure [13-2](#A978-1-4842-1233-2_13_Chapter.html#Fig2).
    Keep the “Use Storyboards” check box clear for now.

    6.  Click the Next button. Xcode asks where you want to store the project.

    7.  Choose a folder to store your project and click the Create button.

    8.  Click the `MainMenu.xib` file in the Project Navigator. Your program’s user
    interface appears.

    9.  Click the UIProgram icon, as shown in Figure [13-3](#A978-1-4842-1233-2_13_Chapter.html#Fig3),
    to display the window of your program’s user interface.

    10. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears
    in the bottom right corner of the Xcode window.

    11. Scroll up and down through the Object Library. Notice the names and variety
    of different items you can add to your user interface.

    12. Click in the search field at the bottom of the Object Library and type `text`.
    Notice that the Object Library now only shows those items that have “text” in
    their names or descriptions as shown in Figure [13-4](#A978-1-4842-1233-2_13_Chapter.html#Fig4).

    13. Click in the search field at the bottom of the Object Library and click the
    close icon (the X inside the gray circle on the far right of the search field)
    to clear the search field.

    14. Type `button`. Notice that the Object Library now only shows those items that
    have “button” in their names or descriptions. If you know all or even part of
    the name or purpose of the item you want, it’s far faster to search for it in
    the Object Library than scrolling through the lengthy list of every user interface
    item available.


    ![A978-1-4842-1233-2_13_Fig2_HTML.jpg](A978-1-4842-1233-2_13_Fig2_HTML.jpg)


    Figure 13-2.


    When creating a new project, you have the option of using storyboards for your
    user interface


    ![A978-1-4842-1233-2_13_Fig3_HTML.jpg](A978-1-4842-1233-2_13_Fig3_HTML.jpg)


    Figure 13-3.


    The UIProgram icon represents your user interface window


    ![A978-1-4842-1233-2_13_Fig4_HTML.jpg](A978-1-4842-1233-2_13_Fig4_HTML.jpg)


    Figure 13-4.


    Searching the Object Library for “text”'
  raw: '## Understanding User Interface Files


    The Cocoa framework defines classes for creating every possible user interface
    item from a button (the NSButton class) and a text field (NSTextField) to a slider
    (NSSlider) or a date picker (NSDatePicker). Theoretically, it’s possible to create
    an entire user interface using nothing but Swift code. However, this can be tedious
    because you can’t see how your user interface looks until you actually run your
    program. This can be as clumsy as trying to paint a picture by describing exactly
    where you need to put a paintbrush on a canvas and the specific angle and direction
    to move your hand.


    Rather than force you to write Swift code to define your user interface, Xcode
    offers a feature called Interface Builder. The idea behind Interface Builder is
    that you can design your user interface by dragging and dropping items on to a
    window.


    The advantage of dragging and dropping items to create a user interface means
    you can see how your user interface looks so you can rapidly adjust and modify
    it. In addition, by separating the design of your user interface from your Swift
    code, you can now make changes to your user interface without affecting your Swift
    code and vice versa.


    In the old days when programmers had to write code to create a user interface,
    modifying the user interface code risked affecting the code that made the program
    work (and vice versa). That meant modifying a program went slowly because you
    had to constantly test to make sure your changes didn’t affect another part of
    your program.


    By keeping your user interface isolated from your Swift code, Xcode lets you create
    reliable programs faster than before. Now you can swap out one user interface
    and replace it with another one without affecting your code, or you can modify
    your code without affecting your user interface.


