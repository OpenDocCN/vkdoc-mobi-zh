  trans: "\n在上面的例子中，`copyCat` 类从 `firstClass` 继承了三个属性（`speed`、`locationX` 和 `locationY`）以及一个方法（`move`）。由于\
    \ `copyCat` 类没有定义自己的任何属性或方法，因此 `copyCat` 类与 `firstClass` 基本相同。\n\n在实际使用中，一个类没有理由完全照搬另一个类的内容来继承。更常见的做法是一个类（称为子类）从另一个类（称为超类）继承，然后添加自己的额外属性和方法。\n\
    \n这样一来，子类只需包含这些新属性和方法的代码，同时仍能访问超类的所有属性和方法。例如，考虑下面的类：\n\n```\nclass copyDog : copyCat\
    \ {\n    var name : String = \"\"\n}\n```\n\n这个类继承了 `copyCat` 类的所有代码，并添加了它自己的一个新属性，名为“name”，该属性可以存储一个字符串。上述定义了\
    \ `name` 属性并继承 `copyCat` 类代码的类定义，等价于下面这样：\n\n```\nclass copyDog {\n    var speed\
    \ : Int = 0\n    var locationX : Int = 3\n    var locationY : Int = 5\n    func\
    \ move (X: Int, Y: Int) {\n        locationX += X\n        locationY += Y\n  \
    \  }\n    var name : String = \"\"\n}\n```\n\n请记住，`copyCat` 类继承了 `firstClass`\
    \ 的所有内容，而 `firstClass` 定义了 `speed`、`locationX` 和 `locationY` 属性以及 `move` 方法。相比之下，从\
    \ `copyCat` 类继承代码的 `copyDog` 类要简短得多。\n\n继承像一条链条一样运作。如果类 A 继承自类 B，但类 B 继承自类 C 的所有内容，那么类\
    \ A 就继承了类 B 和类 C 的所有内容。例如，`copyDog` 类继承了 `copyCat` 类的所有内容。而 `copyCat` 类又继承了 `firstClass`\
    \ 的所有内容。这意味着 `copyDog` 类最终继承了 `copyCat` 类和 `firstClass` 的所有内容，如图 12-2 所示。\n\n\
    ![A978-1-4842-1233-2_12_Fig2_HTML.jpg](img/A978-1-4842-1233-2_12_Fig2_HTML.jpg)\n\
    \n图 12-2. 类继承前一个类的所有内容\n\n这种继承的链条效应正是 Cocoa 框架的设计方式。在最简单的层面上，有一个名为 `NSObject`\
    \ 的基本类。像 `NSResponder` 这样的类继承了 `NSObject` 的所有内容，并添加了自己的新属性和方法。另一个类如 `NSView` 则继承了\
    \ `NSResponder` 和 `NSObject` 的所有内容。当你在 Xcode 的文档窗口中查阅 Cocoa 框架中的类时，可以看到由“继承自：”标签标识的这个类的链条链接，如图\
    \ 12-3 所示。\n\n![A978-1-4842-1233-2_12_Fig3_HTML.jpg](img/A978-1-4842-1233-2_12_Fig3_HTML.jpg)\n\
    \n图 12-3. 文档窗口标识了当前显示的类所继承的超类\n\n要了解如何在多个类之间使用继承，请按照以下步骤操作：\n\n确保 Xcode 中已加载 `InheritPlayground`\
    \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass animal {\n    var legs : Int = 0\n\
    }\n\nclass packAnimal : animal {\n    var strength : Int = 100\n}\n\nclass biped\
    \ : packAnimal {\n    var IQ : Int = 75\n}\n\nvar snake = animal()\nprint (snake.legs)\n\
    \nvar mule = packAnimal()\nmule.legs = 4\nmule.strength = 120\n\nvar relative\
    \ = biped()\nrelative.legs = 2\nrelative.strength = 55\nrelative.IQ = 10\n```\n\
    \n这段代码创建了三个类：`animal`（`legs` 属性）、`packAnimal`（`strength` 属性）和 `biped`（`IQ` 属性）。然后，它基于这些类创建了三个对象。第一个对象\
    \ `snake` 基于 `animal` 类。第二个对象 `mule` 基于 `packAnimal` 类。第三个对象 `relative` 基于 `biped`\
    \ 类。\n\n最终，`relative` 对象包含了来自所有三个类的属性，`mule` 对象只包含来自 `animal` 和 `packAnimal` 类的属性，而\
    \ `snake` 对象只包含来自 `animal` 类的属性，如下所示：\n\n| 对象 | 基于这些类 | 包含这些属性 |\n| --- | ---\
    \ | --- |\n| `snake` | `animal` | `legs` |\n| `mule` | `packAnimal`、`animal` |\
    \ `legs`、`strength` |\n| `relative` | `biped`、`packAnimal`、`animal` | `legs`、`strength`、`IQ`\
    \ |\n\n`snake`、`mule` 和 `relative` 对象基于它们不同的类以及它们所继承的类而包含不同的属性，如图 12-4 所示。\n\n\
    ![A978-1-4842-1233-2_12_Fig4_HTML.jpg](img/A978-1-4842-1233-2_12_Fig4_HTML.jpg)\n\
    \n图 12-4. 查看继承如何在不同类存储的属性之间运作\n"
- fmt: "# Understanding Polymorphism\n\nWhen one class (subclass) inherits from another\
    \ class (superclass), it contains all the properties and methods stored in the\
    \ superclass. Although a subclass inherits all properties and methods from a superclass,\
    \ those properties and methods aren’t displayed inside the subclass. The only\
    \ code that appears in each class are properties and methods unique to that class.\n\
    \nProperties inherited from another class retain the same name and data type.\
    \ Methods inherited from another class retain the same method name and code that\
    \ makes it do something useful.\n\nThe problem with inheriting methods is that\
    \ you may want to modify the code in an inherited method. For example, suppose\
    \ you had a video game where you have dogs running on the ground and birds flying\
    \ in the air. You could create a basic class like this:\n\n```\nclass gameObject\
    \ {\n    var speed : Int = 0\n    var locationX : Int = 3\n    var locationY :\
    \ Int = 3\n\n    func move (X: Int, Y: Int) {\n        locationX += X + speed\n\
    \        locationY += Y + speed\n    }\n}\n\nvar dog = gameObject()\n```\n\nNow\
    \ the `dog` object, created from the `gameObject` class, has three properties\
    \ (`speed`, `locationX`, and `locationY`) and one method (`move`) that change\
    \ the `locationX` and `locationY` properties.\n\nA dog can only run on the ground,\
    \ but a bird can move in two dimensions, so it needs an additional `height` property.\
    \ To move a flying object, the `move` method needs to change the `height` property.\
    \ That means the `move` method needs to be different.\n\nOne clumsy way around\
    \ this problem is to create a different name for the `move` method such as changing\
    \ its name from `\"move\"` to `\"fly\"`:\n\n```\nclass flyingObject : gameObject\
    \ {\n    var height : Int = 0\n\n    func fly (X: Int, Y: Int) {\n        locationX\
    \ += X + speed\n        locationY += Y + speed\n        height += (X + Y) / 2\n\
    \    }\n}\n\nvar bird = flyingObject()\n```\n\nThe problem with this solution\
    \ is that the `bird` object, created from the `flyingObject` class, now has two\
    \ methods: the `move` method inherited from `gameObject` and the new `fly` method\
    \ defined in `flyingObject`.\n\nYou could simply ignore the `move` method and\
    \ use the `fly` method, but that risks creating errors if you accidentally use\
    \ the `move` method to change the position of a bird instead of the correct `fly`\
    \ method that moves a bird in two dimensions instead of one.\n\nThat’s why polymorphism\
    \ exists. Polymorphism basically lets you reuse a method name (such as `move`)\
    \ but replace it with completely different code to make it work. To identify when\
    \ you’re using polymorphism to reuse a method name but modify its code, you must\
    \ use the `\"override\"` keyword in front of the method you’re changing such as:\n\
    \n```\noverride func move (X: Int, Y: Int) {\n    locationX += X + speed\n   \
    \ locationY += Y + speed\n    height += (X + Y) / 2\n}\n```\n\nWhen you override\
    \ a method (use polymorphism), you essentially have two identically named methods,\
    \ but one version is defined in one class and the second version is defined in\
    \ another class. The computer never gets confused because you can only run each\
    \ method by specifying both the object name and the method name. Even though the\
    \ method names are identical, the object names are not.\n\nTo see how polymorphism\
    \ works, follow these steps:\n\nMake sure your `InheritPlayground` file is loaded\
    \ into Xcode. Edit the code as follows:\n\n```\nimport Cocoa\n\nclass gameObject\
    \ {\n    var speed : Int = 0\n    var locationX : Int = 3\n    var locationY :\
    \ Int = 3\n\n    func move (X: Int, Y: Int) {\n        locationX += X + speed\n\
    \        locationY += Y + speed\n    }\n}\n\nvar dog = gameObject()\n\nclass flyingObject\
    \ : gameObject {\n    var height : Int = 0\n\n    override func move (X: Int,\
    \ Y: Int) {\n        locationX += X + speed\n        locationY += Y + speed\n\
    \        height += (X + Y) / 2\n    }\n}\n\nvar bird = flyingObject()\n\ndog.move(4,\
    \ Y: 7)\nbird.move(4, Y: 7)\n```\n\nTo override a method, the `flyingObject` class\
    \ must first inherit from another class. In this case `flyingObject` inherits\
    \ from `gameObject`. Now the `flyingObject` class can use the `\"override\"` keyword\
    \ to specify that it’s changing the code that makes the `move` method work. In\
    \ this case, the only change was adding code to modify the `height` property,\
    \ but we could have added completely different code inside the overridden `move`\
    \ method.\n\nNotice that when you run the `move` method for the `dog` object (`dog.move`),\
    \ the `move` method only changes the values of `locationX` and `locationY`, but\
    \ when you run the `move` method for the `bird` object (`bird.move`), the overridden\
    \ method runs and also changes the `height` property as shown in Figure [12-5](#A978-1-4842-1233-2_12_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1233-2_12_Fig5_HTML.jpg](A978-1-4842-1233-2_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** Overridden methods can behave differently\n\nWhen overriding\
    \ methods, you can only change the code inside the method. You cannot change the\
    \ parameter list of the method. For example, consider this class:\n\n```\nclass\
    \ basicDesign {\n    var location : Int = 0\n\n    func moveMe (X : Int) {\n \
    \       location += X\n    }\n}\n```\n\nTo override the `moveMe` method, this\
    \ next class needs to inherit from the `basicDesign` class and change only the\
    \ code inside the overridden method. The following would not work:\n\n```\nclass\
    \ newDesign : basicDesign {\n    override func moveMe (X: Int, Y: Int) { // Does\
    \ NOT work\n    }\n}\n```\n\nNotice that the original `moveMe` method only has\
    \ one parameter (`X : Int`), but the `moveMe` method in the `newDesign` class\
    \ has two parameters (`X: Int`, `Y: Int`). Despite having the same name, this\
    \ method has a different parameter list so it won’t work. When overriding methods,\
    \ you can only change the code, not the parameter list."
  raw: '### Understanding Polymorphism


    When one class (subclass) inherits from another class (superclass), it contains
    all the properties and methods stored in the superclass. Although a subclass inherits
    all properties and methods from a superclass, those properties and methods aren’t
    displayed inside the subclass. The only code that appears in each class are properties
    and methods unique to that class.


    Properties inherited from another class retain the same name and data type. Methods
    inherited from another class retain the same method name and code that makes it
    do something useful.


    The problem with inheriting methods is that you may want to modify the code in
    an inherited method. For example, suppose you had a video game where you have
    dogs running on the ground and birds flying in the air. You could create a basic
    class like this:


    `class gameObject {`


    `var speed : Int = 0`


    `var locationX : Int = 3`


    `var locationY : Int = 3`


    `func move (X: Int, Y: Int) {`


    `locationX += X + speed`


    `locationY += Y + speed`


    `}`


    `}`


    `var dog = gameObject()`


    Now the dog object, created from the gameObject class, has three properties (speed,
    locationX, and locationY) and one method (move) that change the locationX and
    locationY properties.


    A dog can only run on the ground, but a bird can move in two dimensions, so it
    needs an additional height property. To move a flying object, the move method
    needs to change the height property. That means the move method needs to be different.


    One clumsy way around this problem is to create a different name for the move
    method such as changing its name form “move” to “fly”:


    `class flyingObject : gameObject {`


    `var height : Int = 0`


    `func fly (X: Int, Y: Int) {`


    `locationX += X + speed`


    `locationY += Y + speed`


    `height += (X + Y) / 2`


    `}`


    `}`


    `var bird = flyingObject()`


    The problem with this solution is that the bird object, created from the flyingObject
    class, now has two methods: the move method inherited from gameObject and the
    new fly method defined in flyingObject.


    You could simply ignore the move method and use the fly method, but that risks
    creating errors if you accidentally use the move method to change the position
    of a bird instead of the correct fly method that moves a bird in two dimensions
    instead of one.


    That’s why polymorphism exists. Polymorphism basically lets you reuse a method
    name (such as move) but replace it with completely different code to make it work.
    To identify when you’re using polymorphism to reuse a method name but modify its
    code, you must use the “override” keyword in front of the method you’re changing
    such as:


    `override func move (X: Int, Y: Int) {`


    `locationX += X + speed`


    `locationY += Y + speed`


    `height += (X + Y) / 2`


    `}`


    When you override a method (use polymorphism), you essentially have two identically
    named methods, but one version is defined in one class and the second version
    is defined in another class. The computer never gets confused because you can
    only run each method by specifying both the object name and the method name. Even
    though the method names are identical, the object names are not.


    To see how polymorphism works, follow these steps:


    Make sure your InheritPlayground file is loaded into Xcode.   Edit the code as
    follows:


    `import Cocoa`


    `class gameObject {`


    `var speed : Int = 0`


    `var locationX : Int = 3`


    `var locationY : Int = 3`


    `func move (X: Int, Y: Int) {`


    `locationX += X + speed`


    `locationY += Y + speed`


    `}`


    `}`


    `var dog = gameObject()`


    `class flyingObject : gameObject {`


    `var height : Int = 0`


    `override func move (X: Int, Y: Int) {`


    `locationX += X + speed`


    `locationY += Y + speed`


    `height += (X + Y) / 2`


    `}`


    `}`


    `var bird = flyingObject()`


    `dog.move (4, Y: 7)`


    `bird.move (4, Y: 7)`


    To override a method, the flying Object class must first inherit from another
    class. In this case flyingObject inherits from gameObject. Now the flyingObject
    class can use the “override” keyword to specify that it’s changing the code that
    makes the move method work. In this case, the only change was adding code to modify
    the height property, but we could have added completely different code inside
    the overridden move method.


    Notice that when you run the move method for the dog object (dog.move), the move
    method only changes the values of locationX and locationY, but when you run the
    move method for the bird object (bird.move), the overridden method runs and also
    changes the height property as shown in Figure [12-5](#A978-1-4842-1233-2_12_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_12_Fig5_HTML.jpg](A978-1-4842-1233-2_12_Fig5_HTML.jpg)


    Figure 12-5.


    Overridden methods can behave differently


    When overriding methods, you can only change the code inside the method. You cannot
    change the parameter list of the method. For example, consider this class:


    `class basicDesign {`


    `var location : Int = 0`


    `func moveMe (X : Int) {`


    `location += X`


    `}`


    `}`


    To override the moveMe method, this next class needs to inherit from the basicDesign
    class and change only the code inside the overridden method. The following would
    not work:


    `class newDesign : basicDesign {`


    `override func moveMe (X: Int, Y: Int) { // Does NOT work`


    `}`


    `}`


    Notice that the original moveMe method only has one parameter (X : Int), but the
    moveMe method in the newDesign class has two parameters (X: Int, Y: Int). Despite
    having the same name, this method has a different parameter list so it won’t work.
    When overriding methods, you can only change the code, not the parameter list.'
  trans: "\n# 理解多态\n\n当一个类（子类）继承自另一个类（超类）时，它会包含超类中存储的所有属性和方法。尽管子类继承了超类的所有属性和方法，但这些属性和方法并不会显示在子类内部。每个类中出现的代码，仅是该类所特有的属性和方法。\n\
    \n从其他类继承来的属性会保持相同的名称和数据类型。从其他类继承来的方法也会保持相同的名称和实现其功能的代码。\n\n继承方法的问题在于，你可能想要修改继承来的方法中的代码。例如，假设你有一个视频游戏，里面有在地上跑的狗和在空中飞的鸟。你可以创建一个像这样的基础类：\n\
    \n```\nclass gameObject {\n    var speed : Int = 0\n    var locationX : Int =\
    \ 3\n    var locationY : Int = 3\n\n    func move (X: Int, Y: Int) {\n       \
    \ locationX += X + speed\n        locationY += Y + speed\n    }\n}\n\nvar dog\
    \ = gameObject()\n```\n\n现在，从 `gameObject` 类创建的 `dog` 对象，拥有三个属性（`speed`、`locationX`\
    \ 和 `locationY`）和一个方法（`move`），该方法用于改变 `locationX` 和 `locationY` 属性。\n\n狗只能在地上跑，但鸟可以在二维空间中移动，因此它需要一个额外的\
    \ `height` 属性。要移动一个飞行物体，`move` 方法需要能改变 `height` 属性。这意味着 `move` 方法需要有所不同。\n\n解决这个问题的一个笨办法是为\
    \ `move` 方法起一个不同的名称，比如将其名称从 `\"move\"` 改为 `\"fly\"`：\n\n```\nclass flyingObject\
    \ : gameObject {\n    var height : Int = 0\n\n    func fly (X: Int, Y: Int) {\n\
    \        locationX += X + speed\n        locationY += Y + speed\n        height\
    \ += (X + Y) / 2\n    }\n}\n\nvar bird = flyingObject()\n```\n\n这个解决方案的问题在于，从\
    \ `flyingObject` 类创建的 `bird` 对象现在有两个方法：从 `gameObject` 继承来的 `move` 方法，以及在 `flyingObject`\
    \ 中新定义的 `fly` 方法。\n\n你可以简单地忽略 `move` 方法而使用 `fly` 方法，但如果你意外地使用了 `move` 方法（而不是正确的、能让鸟在二维空间中移动的\
    \ `fly` 方法）来改变鸟的位置，这就有产生错误的风险。\n\n这就是多态存在的意义了。多态基本上允许你重复使用一个方法名（比如 `move`），但用完全不同的代码来替换它，使其正常工作。为了表明你在使用多态来重用方法名但修改其代码，必须在你要修改的方法前加上\
    \ `\"override\"` 关键字，例如：\n\n```\noverride func move (X: Int, Y: Int) {\n    locationX\
    \ += X + speed\n    locationY += Y + speed\n    height += (X + Y) / 2\n}\n```\n\
    \n当你覆盖一个方法（使用多态）时，你实际上拥有了两个同名的方法，但一个版本定义在某个类中，第二个版本定义在另一个类中。计算机永远不会搞混，因为你只能通过同时指定对象名和方法名来运行每个方法。尽管方法名相同，但对象名是不同的。\n\
    \n要了解多态如何工作，请遵循以下步骤：\n\n确保你的 `InheritPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n\
    ```\nimport Cocoa\n\nclass gameObject {\n    var speed : Int = 0\n    var locationX\
    \ : Int = 3\n    var locationY : Int = 3\n\n    func move (X: Int, Y: Int) {\n\
    \        locationX += X + speed\n        locationY += Y + speed\n    }\n}\n\n\
    var dog = gameObject()\n\nclass flyingObject : gameObject {\n    var height :\
    \ Int = 0\n\n    override func move (X: Int, Y: Int) {\n        locationX += X\
    \ + speed\n        locationY += Y + speed\n        height += (X + Y) / 2\n   \
    \ }\n}\n\nvar bird = flyingObject()\n\ndog.move(4, Y: 7)\nbird.move(4, Y: 7)\n\
    ```\n\n要覆盖一个方法，`flyingObject` 类必须首先继承自另一个类。在这个例子中，`flyingObject` 继承自 `gameObject`。现在\
    \ `flyingObject` 类可以使用 `\"override\"` 关键字来指定它正在修改使 `move` 方法工作的代码。在这个例子中，唯一的改动是添加了修改\
    \ `height` 属性的代码，但我们完全可以在这个被覆盖的 `move` 方法中添加完全不同的代码。\n\n请注意，当你对 `dog` 对象运行 `move`\
    \ 方法（`dog.move`）时，`move` 方法只改变 `locationX` 和 `locationY` 的值；但当你对 `bird` 对象运行 `move`\
    \ 方法（`bird.move`）时，覆盖后的方法会运行，并且也会改变 `height` 属性，如图 12-5 所示。\n\n![A978-1-4842-1233-2_12_Fig5_HTML.jpg](img/A978-1-4842-1233-2_12_Fig5_HTML.jpg)\n\
    \n**图 12-5.** 被覆盖的方法可以有不同的行为\n\n当覆盖方法时，你只能修改方法内部的代码。你不能修改方法的参数列表。例如，考虑这个类：\n\n\
    ```\nclass basicDesign {\n    var location : Int = 0\n\n    func moveMe (X : Int)\
    \ {\n        location += X\n    }\n}\n```\n\n要覆盖 `moveMe` 方法，下一个类需要继承 `basicDesign`\
    \ 类，并且只修改被覆盖方法内部的代码。以下做法是行不通的：\n\n```\nclass newDesign : basicDesign {\n    override\
    \ func moveMe (X: Int, Y: Int) { // 不起作用\n    }\n}\n```\n\n注意，原始的 `moveMe` 方法只有一个参数（`X\
    \ : Int`），但 `newDesign` 类中的 `moveMe` 方法有两个参数（`X: Int`, `Y: Int`）。尽管方法名相同，但这个方法的参数列表不同，所以它是行不通的。当覆盖方法时，你只能修改代码，而不能修改参数列表。\n"
- fmt: "### Overriding Properties\n\nBesides overriding methods, Swift also lets you\
    \ override properties. When you override properties, you must keep the same property\
    \ name and data type. What you can change are the getters and setters along with\
    \ the property observers of a variable.\n\nAt the simplest level, a getter simply\
    \ returns a value of a variable. On a more sophisticated level, a getter calculates\
    \ a value. Consider the following:\n\n```\nclass basicDesign {\n    var location:\
    \ Int {\n        get {\n            return 4\n        }\n    }\n}\n```\n\nThis\
    \ `basicDesign` class defines a single property called `location` with a getter\
    \ that returns the value `4` in the `location` property. To override this property,\
    \ you need to retain the variable name and data type (`Int`), but you can change\
    \ the getter code such as:\n\n```\nclass newDesign : basicDesign {\n    override\
    \ var location: Int {\n        get {\n            return 7\n        }\n    }\n\
    }\n```\n\nThis `newDesign` class inherits the `location` property from the `basicDesign`\
    \ class. However it overrides the `location` property with a new getter that returns\
    \ a value of `7`.\n\nTo see how overriding properties work, follow these steps:\n\
    \nMake sure your `InheritPlayground` file is loaded into Xcode. Edit the code\
    \ as follows:\n\n```\nimport Cocoa\n\nclass basicDesign {\n    var location: Int\
    \ {\n        get {\n            return 4\n        }\n    }\n}\n\nclass newDesign\
    \ : basicDesign {\n    override var location: Int {\n        get {\n         \
    \   return 7\n        }\n    }\n}\n\nvar ant = basicDesign()\nvar fly = newDesign()\n\
    \nant.location\nfly.location\n```\n\nIn this example, the `ant` object is based\
    \ on the `basicDesign` class, which defines the `location` property with a value\
    \ of `4`. The `fly` object is based on the `newDesign` class, which inherits the\
    \ `location` property. However, the `newDesign` class overrides the `location`\
    \ property’s getter code so instead of storing a value of `4` in the `location`\
    \ property, it stores a value of `7`, instead, as shown in Figure [12-6](#A978-1-4842-1233-2_12_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1233-2_12_Fig6_HTML.jpg](A978-1-4842-1233-2_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6. Overriding properties with new getter code\n\nRemember, when overriding\
    \ methods and properties, you can only change:\n\n- code in the method\n- code\
    \ in the property’s getter/setter or property observer\n\nYou can never change\
    \ the:\n\n- method name\n- method parameter list\n- property name\n- property\
    \ data type\n\n### Preventing Polymorphism\n\nIn some cases, you may want to prevent\
    \ a method, property, or even an entire class from being modified through polymorphism.\
    \ To do this, you just need to insert the “final” keyword. If you wanted to prevent\
    \ an entire class from being inherited, just put the “final” keyword in front\
    \ of the class name like this:\n\n```\nfinal class className {\n    var propertyName\
    \ = initialValue\n    func methodName() {\n    }\n}\n```\n\n> **Note**  \n> If\
    \ you place “final” in front of a class name, it automatically prevents that class’s\
    \ properties and methods from being overridden so you don’t need to place “final”\
    \ in front of each property or method name.\n\nIf you wanted to prevent an individual\
    \ property or method from being overridden, just place the “final” keyword in\
    \ front of the property or method like this:\n\n```\nclass className {\n    final\
    \ var propertyName = initialValue\n    func methodName() {\n    }\n}\n```\n\n\
    The “final” keyword in the above example prevents the property from being overridden\
    \ while allowing the method to be overridden. If you wanted to prevent the method\
    \ from being overridden while allowing the property to be overridden, you would\
    \ place the “final” keyword in front of the method like this:\n\n```\nclass className\
    \ {\n    var propertyName = initialValue\n    final func methodName() {\n    }\n\
    }\n```\n\n## Using Extensions\n\nIf there’s a class that contains the properties\
    \ and methods you need, the object-oriented approach is to inherit from that class\
    \ (create a subclass). The problem with constantly creating subclasses is that\
    \ it can get awkward to create objects from slightly different class files.\n\n\
    This can be especially true when you want to extend the features of classes that\
    \ are part of the Cocoa framework. For example, if you’re working with `String`\
    \ data types, you probably don’t want to create a subclass of the `String` data\
    \ type and then create objects based on this new subclass. Ideally, you want to\
    \ continue using `String` data types but have added features as well.\n\nThat’s\
    \ why Swift offers extensions. Extensions essentially let you add code to an existing\
    \ class without creating a subclass. That way you can still get to use the original\
    \ class but you also get to add new features to that class without going through\
    \ inheritance, polymorphism, or subclasses. The structure of an extension looks\
    \ like this:\n\n```\nextension className {\n}\n```\n\nExtensions can define methods\
    \ along with properties that contain code such as:\n\n- getters and setters\n\
    - initializers\n- property observers\n\nWhile extensions add new properties methods\
    \ to a class without inheritance, extensions cannot override existing methods\
    \ or properties in a class. Extensions also can’t create properties assigned an\
    \ initial value such as:\n\n```\nvar temperature : Int = 100        // Cannot\
    \ be used in an extension\n```\n\nTo see how to an extension can add properties\
    \ and methods to a class, create a new playground by following these steps:\n\n\
    Start Xcode. Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,\
    \ you can also click on Get started with a playground.) Xcode asks for a playground\
    \ name and platform. Click in the Name text field and type `ExtensionPlayground`.\
    \ Click in the Platform pop-up menu and choose OS X. Xcode asks where you want\
    \ to save your playground file. Click on a folder where you want to save your\
    \ playground file and click the Create button. Xcode displays the playground file.\
    \ Edit the code as follows:\n\n```\nimport Cocoa\n\nclass emptyClass {\n}\n\n\
    extension emptyClass {\n    var age : Int {\n        get {\n            return\
    \ 50\n        }\n    }\n\n    func retire (testAge : Int) -> String {\n      \
    \  if testAge < 62 {\n            return \"Keep working\"\n        } else {\n\
    \            return \"Time to retire\"\n        }\n    }\n}\n\nvar aWorker = emptyClass\
    \ ()\naWorker.retire(65)\naWorker.age\n```\n\nThis code creates a completely empty\
    \ class, then creates an extension that adds an “age” property and a “retire”\
    \ method to the empty class. Finally, it creates an object from that empty class,\
    \ calls the “retire” method (defined in the extension) and displays the value\
    \ stored in the “age” property as shown in Figure [12-7](#A978-1-4842-1233-2_12_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1233-2_12_Fig7_HTML.jpg](A978-1-4842-1233-2_12_Fig7_HTML.jpg)\n\
