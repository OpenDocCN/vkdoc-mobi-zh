- fmt: '### Adding Items to an Array


    Whether an array is empty or already filled with data, you can always add more
    items to an array by using the `append` command like this:


    `arrayName.append(data)`


    You must specify the array name to add data to and put the actual data in parentheses.
    Make sure the data you add is of the proper data type. So if you want to add data
    to an array that can only hold integers, you can only add another integer to that
    array.


    Instead of using the `append` command, you can use the addition compound assignment
    operator to add items to the end of an array like this:


    `arrayName3 += [data1, data2, data3, ... dataN]`


    The `+=` compound assignment operator can add multiple items to the end of an
    array while the `append` command only adds one item at a time to the end of an
    array.


    The `append` command always adds new items to the end of an array. If you want
    to add a new item to a specific location in an array, you can use the `insert`
    and `atIndex` commands like this:


    `arrayName.insert(data, atIndex: index)`


    With the `insert` command, you must add data that’s the proper data type for that
    array. Then you must also specify the index number. If you choose an index number
    larger than the array size, the `insert` command won''t work.


    To see how to create an array and add data to it, create a new playground by following
    these steps:


    - Start Xcode.

    - Choose **File** ➤ **New** ➤ **Playground**. (If you see the Xcode welcome screen,
    you can also click on **Get started with a playground**.) Xcode asks for a playground
    name and platform.

    - Click in the **Name** text field and type `ArrayPlayground`.

    - Click in the **Platform** pop-up menu and choose **OS X**. Xcode asks where
    you want to save your playground file.

    - Click on a folder where you want to save your playground file and click the
    **Create** button. Xcode displays the playground file.

    - Edit the code as follows:


    ```

    import Cocoa

    var arrayName = Array<Int>(arrayLiteral: 34, 89, 70, 1, -24)

    var arrayName2 = [Int](arrayLiteral: 34, 89, 70, 1, -24)

    arrayName.append(2)

    arrayName2.append(2)

    arrayName.insert(-37, atIndex: 2)

    arrayName2.insert(-37, atIndex: 2)

    ```


    Notice how the `append` and `insert` commands work differently as shown in Figure
    [9-2](#A978-1-4842-1233-2_9_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_9_Fig2_HTML.jpg](A978-1-4842-1233-2_9_Fig2_HTML.jpg)


    Figure 9-2. Creating arrays in a playground


    ### Deleting Items From an Array


    Just as you can add items to an array, so can you also delete items from an array.
    To remove the last item in an array, you can use the `removeLast` command like
    this:


    `arrayName.removeLast()`


    Not only will this delete the last item in an array, but it will also return that
    value. If you want to save the last item of an array in a variable, you could
    do something like this:


    `var item = arrayName.removeLast()`


    If you want to remove a specific item from an array, you can identify the index
    number of that item with the `removeAtIndex` command like this:


    `arrayName.removeAtIndex(number)`


    So if you wanted to remove the second item in an array, you would specify an index
    of 1. Like the `removeLast` command, the `removeAtIndex` command also returns
    a value that you could store in a variable like this:


    `var item = arrayName.removeAtIndex(1)`


    If you wanted to remove all items from an array, you can use the `removeAll` command
    like this:


    `arrayName.removeAll()`


    To see how to delete items from an array, follow these steps:


    - Make sure the `ArrayPlayground` file is loaded in Xcode.

    - Edit the code as follows:


    ```

    import Cocoa

    var arrayName = [Int](arrayLiteral: 3, 8, 9, 21)

    var item = arrayName.removeLast()

    print (arrayName)

    print (item)

    item = arrayName.removeAtIndex(1)

    print (arrayName)

    print (item)

    arrayName.removeAll()

    ```


    Notice how the different commands work when deleting items from an array as shown
    in Figure [9-3](#A978-1-4842-1233-2_9_Chapter.html#Fig3). When specifying index
    values, you must make sure your index number exists. That means if an array consists
    of three items, the first item is at index 0, the second is at index 1, and the
    third is at index 2. So you can remove an item from this array at index values
    0, 1, or 2, but any other index number will not work.


    ![A978-1-4842-1233-2_9_Fig3_HTML.jpg](A978-1-4842-1233-2_9_Fig3_HTML.jpg)


    Figure 9-3. Deleting items from an array


    Deleting items from an array physically removes that item from that array. Rather
    than delete an item from an array, you can also replace an existing item with
    a new value. All you have to do is specify the index value of the array item you
    want to replace and assign new data to it like this:


    `arrayName[index] = newData`


    So if you wanted to replace the second item in an array (at index value 1) with
    new data, you could do the following:


    `arrayName[1] = 91`


    Whatever existing value was stored in the array at index value 1 gets replaced
    with the number 91. When replacing data, the new data must be of the same data
    type as the rest of the items in the array such as integers or strings.


    ### Querying Arrays


    When you have an array, you might want to know if the array is empty (has zero
    items stored in it), or if the array does have items, how many items it contains.
    To determine if an array is empty or not, you can use the `isEmpty` command that
    returns a Boolean value like this:


    `arrayName.isEmpty`


    If you want to store this Boolean value in a variable, you could do this:


    `var flag = arrayName.isEmpty`


    If you want to know how many items are stored in an array, you can use the `count`
    command like this:


    `arrayName.count`


    If you want to store this integer value in a variable, you could do this:


    `var total = arrayName.count`


    If you just want to access an individual array item, you can copy it from an array
    and store its value in a variable like this:


    `var item = arrayName[index]`


    This lets you retrieve an item out of an array from a specific index location
    and store that value in a variable. When retrieving data from an array, make sure
    you specify a valid index value. So if the array contains three items, the index
    values would be 0, 1, and 2. That means if you wanted to retrieve the second item
    in an array (at index 1), you could use this code:


    `var item = arrayName[1]`


    ### Manipulating Arrays


    Two common ways to manipulate an array is to reverse the order of all the items
    or rearrange the items in ascending or descending order. This simply reverses
    the order of all items in an array without regard to their actual values such
    as:


    `arrayName.reverse()`


    When you sort an array in ascending order, the lowest value gets stored in the
    first item of the array, and the highest value gets stored in the last item of
    the array. When you sort strings, Swift sorts them in alphabetical order. To sort
    an array in ascending order, you have two choices:


    `myArray.sort { $0 < $1 }`


    or


    `myArray.sort ()`


    When you sort an array in descending order, the highest value gets stored in the
    first item of the array, and the lowest value gets stored in the last item of
    the array. When you sort strings, Swift sorts them in reverse alphabetical order.
    To sort an array in descending order, use this:


    `myArray.sort { $1 < $0 }`


    To see how sorting an array works, follow these steps:


    - Make sure the `ArrayPlayground` file is loaded in Xcode.

    - Edit the code as follows:


    ```

    import Cocoa

    var myArray = ["Bob", "Fred", "Jane", "Mary"]

    print (myArray.sort())

    var sortedArray = myArray.sort() { $1 < $0 }

    print (sortedArray)

    ```


    Notice that sorting an array changes the position of items based on their content
    as shown in Figure [9-4](#A978-1-4842-1233-2_9_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_9_Fig4_HTML.jpg](A978-1-4842-1233-2_9_Fig4_HTML.jpg)


    Figure 9-4. Sorting an array'
