- fmt: '### Looking Up Class Files with the Help Menu


    Xcode’s menu bar and pull-down menus are usually the most straightforward way
    to find any command. So the first step is to open Xcode’s documentation window,
    as shown in Figure [4-4](#A978-1-4842-1233-2_4_Chapter.html#Fig4), in one of two
    ways:


    ![A978-1-4842-1233-2_4_Fig4_HTML.jpg](A978-1-4842-1233-2_4_Fig4_HTML.jpg)


    Figure 4-4. The Xcode Documentation window


    - Choose Help ➤ Documentation and API Reference

    - Press `Shift+Command+0` (the number zero)


    **Note:** To make the Documentation window less cluttered, click on the Show/Hide
    Navigator icon.


    Click in the Search documentation text field at the top of the Documentation window,
    type `NSTextField`, and press Return. The Documentation window displays information
    about the `NSTextField` class. Scroll through the Table of Contents pane to view
    information about the `NSTextField` class. If you click on a topic in the Table
    of Contents pane, the Documentation window displays additional information as
    shown in Figure [4-5](#A978-1-4842-1233-2_4_Chapter.html#Fig5). However, there’s
    nothing in the `NSTextField` documentation that explains how it stores text. To
    find that answer, we need to next look in the class that `NSTextField` inherits
    from, which is `NSControl`.


    ![A978-1-4842-1233-2_4_Fig5_HTML.jpg](A978-1-4842-1233-2_4_Fig5_HTML.jpg)


    Figure 4-5. Selecting an item in the Table of Contents pane displays information
    in the right pane


    Click `NSControl` that appears to the right of the Inherits from: label. Notice
    that `NSTextField` inherits from `NSControl`, which inherits from `NSView`, which
    inherits from `NSResponder`, which inherits from `NSObject`. To find every property
    and method available to a label or text field (both based on the `NSTextField`
    class), we could exhaustively search each of these class files as well.


    Click on the Getting and Setting the Control’s Value in the Table of Contents
    pane of `NSControl` as shown in Figure [4-6](#A978-1-4842-1233-2_4_Chapter.html#Fig6).
    Notice that the property that stores text data in the `NSControl` class is called
    `stringValue`.


    ![A978-1-4842-1233-2_4_Fig6_HTML.jpg](A978-1-4842-1233-2_4_Fig6_HTML.jpg)


    Figure 4-6. The Documentation window lists all the properties in `NSControl` that
    stores data


    Once we know that we can use the `stringValue` property to hold text data in the
    `NSControl` class, we also know that we can use the `stringValue` property to
    hold text data in the `NSTextField` class. Since both our label and text field
    are based on the `NSTextField` class (which we discovered by clicking on them
    in the Object Library), we know we can access the text data of both the label
    and text field using the `stringValue` property.


    ### Looking Up Class Files with Quick Help


    Using the Documentation window to look up class files can be handy, but Xcode
    offers another method called Quick Help. To use Quick Help, you need to move the
    cursor or mouse pointer over a class file name in a file containing Swift code,
    then choose one of the following methods:


    - Choose Help ➤ Quick Help for Selected Item

    - Press `Control+Command+Shift+?`

    - Hold down the Option key and click on a class file name


    Quick Help then displays a pop-up window containing a brief description of the
    selected class file, giving you the option to view the full description in the
    Documentation window if you choose. To see how Quick Help works using the Option
    key and the mouse, follow these steps:


    1. Make sure the `MyFirstProgram` is loaded into Xcode.

    2. Click the `AppDelegate.swift` file in the Project Navigator. Xcode displays
    the contents of the `AppDelegate.swift` file in the middle pane.

    3. Hold down the Option key and move the mouse over the `NSTextField` word in
    the `IBOutlet`. The mouse pointer turns into a question mark as shown in Figure
    [4-7](#A978-1-4842-1233-2_4_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_4_Fig7_HTML.jpg](A978-1-4842-1233-2_4_Fig7_HTML.jpg)


    Figure 4-7. Holding down the Option key turns the mouse pointer into a question
    mark when hovering over a class file name


    4. While holding down the Option key with the mouse pointer over `NSTextField`,
    click the mouse. Xcode displays a pop-up window briefly describing the features
    of the `NSTextField` class as shown in Figure [4-8](#A978-1-4842-1233-2_4_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_4_Fig8_HTML.jpg](A978-1-4842-1233-2_4_Fig8_HTML.jpg)


    Figure 4-8. Option+clicking on a class file name displays a pop-up window describing
    that class file


    5. Click on `NSTextField Class Reference` at the bottom of the pop-up window next
    to the Reference label. Xcode displays the Documentation window listing the `NSTextField`
    class file (see Figure [4-5](#A978-1-4842-1233-2_4_Chapter.html#Fig5)).


    Option+clicking is just a way to open the Documentation window without going through
    the Help ➤ Documentation and Reference API command and typing a class file name.'
