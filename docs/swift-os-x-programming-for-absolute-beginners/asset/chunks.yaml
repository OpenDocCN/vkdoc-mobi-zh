- fmt: '# 2. Getting to Know Xcode


    To write programs in Swift for the Macintosh, you need to use Xcode. Apple developed
    Xcode as a professional programming tool that they give away free to encourage
    everyone to write software for OS X and iOS. Despite being a free program, Xcode
    is a powerful program used by major companies including Microsoft, Adobe, Google,
    and even Apple. With Xcode on a Macintosh, you have one of the most powerful programming
    tools for creating OS X programs and iOS apps.


    Although Xcode contains dozens of features specifically for professional programmers,
    anyone can learn to use Xcode. Xcode’s sheer number of features may seem confusing
    and intimidating at first glance, but relax. To use Xcode, you never need to learn
    every possible feature. Instead, you can just learn the handful of features you
    need and ignore all the rest. As you get more experienced, you can gradually learn
    Xcode’s other features. In many cases, you may never use some of Xcode’s features
    at all.


    Xcode lets you create an OS X program or an iOS app from start to finish without
    ever needing another program. Within Xcode you can do the following:


    - Create a new project

    - Write and edit Swift code

    - Design and modify user interfaces

    - Manage files that make up a single project

    - Run and test your project

    - Debug your Swift code


    You can download and install Xcode for free through the Mac App Store. On your
    Macintosh, just click the Apple menu and choose App Store. When the App Store
    window appears, click in the Search text field in the upper right corner, type
    `Xcode`, and press Return. Now you can click the button underneath the Xcode icon
    to download it as shown in Figure [2-1](#A978-1-4842-1233-2_2_Chapter.html#Fig1).
    Since Xcode is a fairly large file, you’ll need a fast Internet connection and
    plenty of space to install it on your Macintosh.


    ![A978-1-4842-1233-2_2_Fig1_HTML.jpg](A978-1-4842-1233-2_2_Fig1_HTML.jpg)


    **Figure 2-1.** When you search for Xcode, it will likely appear in the upper
    left corner of the App Store window


    The four most common parts of Xcode you’ll use regularly are:


    - The project manager

    - The editor

    - Interface Builder

    - The compiler


    A project represents a single OS X or iOS program. In the old days when programs
    were simple, you could store code in a single file. Now with programs being much
    larger and complicated, it’s far more common to store code in separate files.
    A collection of files that work together form a single project so the Xcode project
    manager lets you create, rearrange, and delete the files within a project.


    One of the most common types of files every project will contain is a code file,
    identified by the `.swift` file extension. Code files are where you can store,
    edit, and type Swift code. By using Xcode’s editor, you can open a code file,
    copy and paste code, delete code, and write new code to save in that file. An
    editor basically acts like a simple word processor designed just for helping you
    write code in the Swift programming language.


    Besides code files containing Swift code, every project will also contain a user
    interface stored in a separate file identified by either the `.xib` or `.storyboard`
    file extension. A simple program might only have a single file containing its
    user interface, but a more complicated program might have several files containing
    different parts of the user interface. The feature in Xcode that let you design,
    create, and modify user interfaces is called Interface Builder.


    After you’ve written Swift code and designed your user interface, you’ll need
    to convert all the files in your project into an actual working program. The process
    of translating Swift code into a language that the computer can understand (called
    machine code) is called compiling, so the part of Xcode that does this is called
    a compiler.


    You’ll often use these four main parts of Xcode in different order. For example,
    you may create a project and modify its files using the project manager feature.
    Then you may use the editor to write Swift code and Interface Builder to design
    your user interface. Finally, you’ll test your program using the compiler. If
    problems occur, you’ll likely go back to the editor or Interface Builder as many
    times as necessary until your program works right. You may even create new files
    and rearrange them in the project manager.


    Ultimately, there is no single “best” or “right” way to use Xcode. Xcode offers
    features for you to use whenever you need them.


    ## Giving Commands to Xcode


    Like many programs, Xcode offers multiple ways to do the exact same task. For
    example, to open a project, you can choose File ➤ Open or press `Command+O`. In
    general, Xcode typically offers three ways to perform common types of commands:


    - Use the pull-down menus from the menu bar that appears at the top of the screen

    - Press a unique keystroke combination such as `Command+O`

    - Click on an icon that represents a command


    Pull-down menus can be convenient to help you find specific commands, but they
    can be slower and clumsier to use because you have to click on a menu title to
    pull-down a menu, then you have to click on a command that appears on that menu.


    Keystroke combinations are faster and easier, but they force you to memorize cryptic
    keystroke combinations for commonly used commands. To help you learn which commands
    have keystroke combinations, look on each pull-down menu, and you’ll see keystroke
    combinations displayed to the right of different commands as shown in Figure [2-2](#A978-1-4842-1233-2_2_Chapter.html#Fig2).
    (Note: Not all commands have keystroke combinations.)


    ![A978-1-4842-1233-2_2_Fig2_HTML.jpg](A978-1-4842-1233-2_2_Fig2_HTML.jpg)


    **Figure 2-2.** Keystroke combinations appear to the right of commands on pull-down
    menus


    Keystroke combinations usually include a modifier key plus a letter or function
    key. The four modifier keys include Command, Control, Option, and Shift as shown
    in Figure [2-3](#A978-1-4842-1233-2_2_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_2_Fig3_HTML.jpg](A978-1-4842-1233-2_2_Fig3_HTML.jpg)


    **Figure 2-3.** Symbols used to represent common modifier keys


    Clicking on icons to choose a command may be the fastest method of all, but you
    have to know the command that each icon represents. To help you understand what
    an icon does, just move the mouse pointer over an icon and wait a few seconds.
    A tiny window will appear, briefly describing the purpose of that icon as shown
    in Figure [2-4](#A978-1-4842-1233-2_2_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_2_Fig4_HTML.jpg](A978-1-4842-1233-2_2_Fig4_HTML.jpg)


    **Figure 2-4.** Hovering the mouse pointer over an icon displays a brief description
    of that icon’s function


    Some people only use pull-down menus, others rely more on icons and keystroke
    shortcuts, and others use a mix of all three methods. Generally people start with
    pull-down menus, but when they start using the same commands often, they’ll gradually
    switch to icons and keystroke shortcuts.


    Choose whatever method you like but be aware that you almost always have other
    alternatives. The main point is to get comfortable using Xcode using your preferred
    method so you can spend more time being creative and less time trying to find
    the commands you need.'
