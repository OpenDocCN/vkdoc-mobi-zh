    ### 对用户界面项施加约束


    为窗口定义最小尺寸可以防止用户将窗口缩得太小，以至于切断了显示在用户界面上的项目。但是，如果用户放大了窗口会发生什么呢？理想情况下，窗口内的项目应该调整它们的位置以适应放大后的窗口尺寸。


    `Constraints`（约束）定义了两个项目之间的距离，例如按钮与窗口边缘之间，或者两个按钮之间。Xcode 提供了三种方式来对用户界面项施加约束：


    *   按住 Control 键并从用户界面项拖拽到另一个项目或窗口边缘

    *   选择 Editor（编辑器）➤ Pin（固定）或 Resolve Auto Layout Issues（解决自动布局问题）

    *   点击右下角的 Pin（固定）或 Resolve Auto Layout Issues（解决自动布局问题）图标，如下图所示 13-18


    ![A978-1-4842-1233-2_13_Fig18_HTML.jpg](img/A978-1-4842-1233-2_13_Fig18_HTML.jpg)


    图 13-18. Align（对齐）、Pin（固定）和 Resolve Auto Layout Issues（解决自动布局问题）图标


    要使用 Control-拖拽方式来放置约束，请遵循以下步骤：


    将鼠标指针移到你想要约束的用户界面项上。按住 Control 键，并向另一个用户界面项或窗口边缘方向拖拽鼠标。当鼠标指针出现在另一个用户界面项或窗口边缘附近时，松开
    Control 键和鼠标按钮。此时会弹出一个窗口，如图 13-19 所示。


    ![A978-1-4842-1233-2_13_Fig19_HTML.jpg](img/A978-1-4842-1233-2_13_Fig19_HTML.jpg)


    图 13-19. 松开 Control 键和鼠标会显示一个弹出窗口


    根据你 Control-拖拽鼠标的方向，弹出窗口中将显示不同的选项。


    | 朝向窗口边缘的方向 | 约束选项 |

    | --- | --- |

    | 向上 | 容器顶部间距 |

    | 向下 | 容器底部间距 |

    | 向右 | 容器尾部间距 |

    | 向左 | 容器前导间距 |


    除了 Control-拖拽到窗口边缘，你还可以从一个用户界面项 Control-拖拽到另一个用户界面项上。这样做可以让你定义用户界面上两个项目之间的距离，例如两个按钮之间，或一个按钮与一个文本字段之间的距离。


    当你将鼠标 Control-拖拽到另一个用户界面项上时，会弹出一个窗口。如果你定义的是两个并排项目之间的距离，弹出窗口将显示 Horizontal Spacing（水平间距）选项。如果你定义的是两个上下堆叠项目之间的距离，弹出窗口将显示
    Vertical Spacing（垂直间距）选项。


    | 朝向另一项的方向 | 约束选项 |

    | --- | --- |

    | 左/右 | 水平间距 |

    | 上/下 | 垂直间距 |


    Control-拖拽方法可以让你直观地在不同的用户界面项上放置约束。另一种定义约束的方法是点击你想要约束的用户界面项，然后点击 Pin（固定）图标以显示弹出窗口。要通过
    Pin 图标定义约束，请遵循以下步骤：


    点击你想要约束的用户界面项。点击 Pin（固定）图标。此时会出现一个弹出窗口，显示上、下、左、右四个方向的约束，如图 13-20 所示。


    ![A978-1-4842-1233-2_13_Fig20_HTML.jpg](img/A978-1-4842-1233-2_13_Fig20_HTML.jpg)


    图 13-20. Pin（固定）图标显示了一个包含约束的弹出窗口


    点击一个约束以将其选中（在图 13-20 中，左边和右边的约束被选中，因此显示为红色，但上边和下边的约束未选中，所以显示为虚线）。勾选任何额外的复选框。点击弹出窗口底部的
    Add X Constraints（添加 X 个约束）按钮以定义约束。


    Pin（固定）弹出窗口允许你为所选用户界面项定义其他类型的约束：


    *   Width（宽度）或 Height（高度）—— 这将使所选用户界面项保持固定尺寸

    *   Equal Widths（等宽）或 Heights（等高）—— 这使两个或多个所选用户界面项保持相同的固定尺寸

    *   Aspect Ratio（宽高比）—— 如果所选用户界面项被调整大小，这将保持其宽高比正确

    *   Align（对齐）—— 这将对齐两个或多个所选用户界面项


    第三种定义约束的方法是让 Xcode 为你选择约束。这可以让你快速添加约束，但存在 Xcode 可能无法正确定义约束的风险。幸运的是，你之后始终可以编辑约束。


    要让 Xcode 选择约束，请遵循以下步骤：


    点击你想要约束的用户界面项。点击 Resolve Auto Layout Issues（解决自动布局问题）图标以显示弹出窗口，如图 13-21 所示（或选择
    Editor（编辑器）➤ Resolve Auto Layout Issues（解决自动布局问题））。


    ![A978-1-4842-1233-2_13_Fig21_HTML.jpg](img/A978-1-4842-1233-2_13_Fig21_HTML.jpg)


    图 13-21. Resolve Auto Layout Issues（解决自动布局问题）弹出窗口


    选择 Add Missing Constraints（添加缺失约束）或 Reset to Suggested Constraints（重置为建议约束）。


    如果你选择窗口上半部分的选项，将只影响所选的用户界面项。如果你选择窗口下半部分的选项，则无论你是否选择了它们，都将影响当前显示窗口上的所有用户界面项。


    请记住，添加约束可能是一个反复试验的过程：先定义一个约束，观察其效果，然后修改或完全删除它。当你添加约束时，Xcode 会在你的用户界面项周围显示约束线。如果
    Xcode 认为约束不足，该项上的所有约束将显示为橙色。一旦 Xcode 认为你对某个项施加了足够的约束，约束将显示为蓝色。


    要查看约束如何与用户界面项配合使用，请遵循以下步骤：


    确保你的 WindowProgram 项目已加载到 Xcode 中。在 Project Navigator（项目导航器）窗格中点击 MainMenu.xib。点击
    Window（窗口）图标以使用户界面窗口可见。选择 View（视图）➤ Utilities（实用工具）➤ Show Object Library（显示对象库）。对象库会出现在
    Xcode 窗口的右下角。从对象库中拖拽一个 Push Button（按钮）项，并将其放在窗口的任何位置。将鼠标指针移到刚刚放在窗口上的按钮上。按住 Control
    键，并向右拖拽鼠标，直到整个窗口变为蓝色。然后松开 Control 键和鼠标。此时会弹出一个菜单（见图 13-19）。选择 Trailing Space to
    Container（容器尾部间距）。Xcode 会在窗口边缘和按钮的右边缘之间显示一条约束，如图 13-22 所示。


    ![A978-1-4842-1233-2_13_Fig22_HTML.jpg](img/A978-1-4842-1233-2_13_Fig22_HTML.jpg)


    图 13-22. 将约束连接到窗口边缘


    选择 Product（产品）➤ Run（运行）。你的窗口会出现在你之前定义的初始位置。将窗口移到屏幕中央，并调整其右边缘。请注意，当你调整窗口右边缘时，按钮会同时移动其位置。选择
    WindowProgram（窗口程序）➤ Quit WindowProgram（退出窗口程序）。

