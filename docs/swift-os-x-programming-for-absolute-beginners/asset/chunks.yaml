    display multiple options but only let the user select one at a time. The moment
    the user selects another radio button, the currently selected radio button gets
    cleared.


    Radio buttons are defined by the NSMatrix class in the Cocoa frameworks. That
    means when you create a group of radio buttons, you need to define how many you
    want by defining the number of rows and columns as shown in Figure [16-3](#A978-1-4842-1233-2_16_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_16_Fig3_HTML.jpg](A978-1-4842-1233-2_16_Fig3_HTML.jpg)


