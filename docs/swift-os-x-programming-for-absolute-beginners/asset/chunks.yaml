    ## Using Combo Boxes


    A text field lets the user type in anything while a pop-up button displays a fixed
    range of options. When you want to display a fixed range of options and let the
    user type in text, that’s when you can use a combo box.


    A combo box is based on the NSComboBox class, which is based on the NSTextField
    class that defines all text fields. As a result, you can retrieve values from
    a combo box using the intValue, floatValue, doubleValue, or stringValue properties.


    When using a combo box, you have two ways to fill its pop-up list of options.
