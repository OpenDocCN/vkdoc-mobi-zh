    \n图 7-20.\n\n定义`IBAction`方法。点击 Connect 按钮。Xcode 会创建一个空白`IBAction`方法。按如下方式修改`checkPassword`\
    \ `IBAction`方法：\n\n```swift\n@IBAction func checkPassword(sender: NSButton) {\n\
    \    let validPassword = \"password\"\n    var ID : Int\n    ID = IDfield.integerValue\n\
    \    var myAlert = NSAlert()\n    switch ID {\n    case 100...150: if (Passwordfield.stringValue\
    \ == validPassword) {\n        myAlert.messageText = \"Access granted\"\n    }\
    \ else {\n        myAlert.messageText = \"No access\"\n        }\n    default:\n\
    \        myAlert.messageText = \"No access\"\n    }\n    myAlert.runModal()\n\
    }\n```\n\n这个`IBAction`方法使用`switch`语句来检查用户输入的 ID 是否在`100...150`范围内。如果是，则检查用户在密码文本字段中是否输入了\
    \ \"password\"。如果条件也成立，则`switch`语句会在 Alert 对话框中显示 \"Access granted\"。如果 ID 不在`100...150`范围内，或者密码文本字段不包含\
    \ \"password\"，则 Alert 对话框会显示 \"No access\"。\n\n**注意**\n\n你可能想知道上述代码中的`stringValue`和`integerValue`是从哪里来的。查看你的`IBOutlet`，会发现每个文本字段`IBOutlet`都基于`NSTextField`类。在\
    \ Xcode 的文档中查找`NSTextField`，会看到`NSTextField`基于`NSControl`类。`NSControl`类包含`stringValue`和`integerValue`等属性，这意味着任何基于`NSTextField`的类（例如代表用户界面上文本字段的`IBOutlet`）也可以使用这些`stringValue`和`integerValue`属性。\n\
    \n选择 Product ➤ Run。Xcode 会运行你的`BranchingProgram`项目。点击`BranchingProgram`用户界面的 ID\
    \ 文本字段，输入 120。点击`BranchingProgram`用户界面的密码文本字段，输入`password`。点击 Check Password 按钮。会出现一个\
    \ Alert 对话框，如图 7-21 所示。\n\n![A978-1-4842-1233-2_7_Fig21_HTML.jpg](img/A978-1-4842-1233-2_7_Fig21_HTML.jpg)\n\
    \n图 7-21.\n\n显示 Alert 对话框。点击 Alert 对话框中的 OK 按钮使其消失。点击`BranchingProgram`用户界面的 ID\
    \ 文本字段，输入 1。点击 Check Password 按钮。注意，现在 Alert 对话框显示 \"No access\"。点击 Alert 对话框中的\
    \ OK 按钮使其消失。选择 BranchingProgram ➤ Quit BranchingProgram。\n\n## 小结\n\n为了智能地响应用户，每个程序都需要一种决策方式。做出决策的第一步是定义一个**布尔**值，其值为`true`或`false`。可以通过比较运算符或逻辑运算符来计算布尔值。\n\
    \n一旦能确定一个布尔值，就可以使用该布尔值来决定在分支语句中执行哪段代码。最简单的分支是`if`语句，它可以执行一组代码，或者什么都不做。\n\n另一种分支是`if-else`语句，它提供恰好两组可执行的代码。如果布尔值为`true`，则执行第一组代码，否则执行第二组代码。\n\
    \n如果需要在三组或更多代码中选择执行，可以使用`if-else if`语句。不过，通常使用`switch`语句会更简单。在使用`switch`语句时，必须考虑到所有可能的值。\n\
    \n`switch`语句可以匹配精确值、一个数值范围（包含起始和结束数字），或者一个半开范围（仅包含起始数字，不包含结束数字）。\n\n分支语句与布尔值相结合，使你的程序能够根据接收到的数据做出决策并执行不同的代码。分支语句本质上让你的程序能够智能地响应外部数据。\n\
    \n# 8. 用循环重复执行代码\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1233-2_8](http://dx.doi.org/10.1007/978-1-4842-1233-2_8)）包含补充材料，可供授权用户使用。\n\
    \n编程的基本目标是编写尽可能少的代码，却完成尽可能多的功能。编写的代码越少，程序将来就越容易理解和修改。代码完成的功能越多，程序就越强大。\n\n减少代码编写量的一种方法是重用存储在函数中的代码。第二种重用代码的方式是通过循环。循环可以多次运行一行或多行代码，从而无需编写多行冗余代码。\n\
    \n例如，如果你想打印五遍消息，可以编写如下代码：\n\n```swift\nprint (\"Hello\")\nprint (\"Hello\")\n\
    print (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\n```\n\n这种做法很繁琐，但能生效。然而，如果你突然决定需要打印一千遍消息，那就得把这条命令写一千次。反复输入相同命令不仅枯燥，还增加了在某条命令中出错的可能性。\n\
    \n更简单的方法是使用循环。循环允许你只编写一次一条或多条命令，然后按需运行多次，例如：\n\n```swift\nvar counter : Int =\
    \ 1\nwhile counter <= 5 {\n    print (\"Hello\")\n    counter++\n}\n```\n\n上述循环运行了五次，并打印出五遍\
    \ \"Hello\"。如果我们想打印一千遍 \"Hello\"，只需将数字 5 替换为 1000。循环让代码更易于编写和修改，同时能完成更多工作。\n"
- fmt: "# The `while` Loop\n\nThe simplest loop in Swift is called the `while` loop,\
    \ which looks like this:\n\n```\nwhile BooleanValue {\n\n}\n```\n\nBefore the\
    \ `while` loop does anything, it first checks if a Boolean value is `true` or\
    \ `false`. If it’s `true`, then it runs the code inside its curly brackets once.\
    \ Then it checks its Boolean value again to see if it’s changed to `false` or\
    \ if it’s still `true`. The moment this Boolean value becomes `false`, the `while`\
    \ loop stops.\n\nBecause the `while` loop checks a Boolean value before doing\
    \ anything, it’s possible that the `while` loop may never run any of its code.\
    \ More importantly, the `while` loop only runs if its Boolean value is `true`.\
    \ That means somewhere inside the `while` loop’s curly brackets, there must be\
    \ code that eventually changes this Boolean value to `false`.\n\nIf a `while`\
    \ loop fails to change its Boolean value from `true` to `false`, then the loop\
    \ will run forever, which is known as an endless loop. An endless loop may crash\
    \ or freeze your program so it no longer responds to the user or works.\n\nAt\
    \ the simplest level, a `while` loop’s Boolean value can just be `true` or `false`\
    \ such as:\n\n```\nwhile true {\n\n}\n```\n\nMore commonly, `while` loops use\
    \ comparison operators to determine a Boolean value such as:\n\n```\nwhile counter\
    \ <= 5 {\n\n}\n```\n\nAs long as `counter <= 5` remains `true`, the `while` loop\
    \ will run. The moment `counter <= 5` is no longer `true`, the `while` loop will\
    \ stop.\n\nWhen using `while` loops, you need to define the Boolean value before\
    \ the loop begins (to make sure it’s either `true` or `false`), and then you must\
    \ change the Boolean value somewhere inside the `while` loop (to make sure the\
    \ `while` loop eventually stops).\n\nTo see how Boolean values work with a `while`\
    \ loop, create a new playground by following these steps:\n\n- Start Xcode.\n\
    - Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen, you can\
    \ also click on Get started with a playground.) Xcode asks for a playground name\
    \ and platform.\n- Click in the Name text field and type `LoopingPlayground`.\n\
    - Click in the Platform pop-up menu and choose OS X. Xcode asks where you want\
    \ to save your playground file.\n- Click on a folder where you want to save your\
    \ playground file and click the Create button. Xcode displays the playground file.\n\
    - Edit the code as follows:\n\n```\nimport Cocoa\nvar counter = 1\nwhile counter\
    \ <= 10 {\n    print (\"Hello\")\n    counter++\n}\n```\n\nNote that the `var\
    \ counter : Int = 1` line defines the variable that the `while` loop uses to determine\
    \ a Boolean value (`true` or `false`). Also note the `counter++` line inside the\
    \ `while` loop. This constantly changes the variable used by the `while` loop\
    \ to determine when to stop. By changing the Boolean comparison (`counter <= 10`),\
    \ you can change how many times the `while` loop runs as shown in Figure 8-1.\n\
    \n![A978-1-4842-1233-2_8_Fig1_HTML.jpg](A978-1-4842-1233-2_8_Fig1_HTML.jpg)\n\n\
    Figure 8-1. Running a `while` loop in a playground\n\nWhen using a `while` loop,\
    \ keep in mind the following:\n\n- Before the `while` loop, make sure to define\
    \ any variables used by the `while` loop’s Boolean value\n- A `while` loop may\
    \ run zero or more times\n- Inside the `while` loop, make sure the Boolean value\
    \ used by the `while` loop can change to `false` eventually to avoid creating\
    \ an endless loop\n\n## The `repeat-while` Loop\n\nAs an alternative to the `while`\
    \ loop, Swift also offers a `repeat-while` loop that works almost the same. The\
    \ only difference is that instead of checking a Boolean value before running,\
    \ the `repeat-while` loop checks its Boolean value after it runs.\n\nThat means\
    \ the `repeat-while` loop will always run at least once. The structure of a `repeat-while`\
    \ loop looks like this:\n\n```\nrepeat {\n\n} while BooleanValue\n```\n\nLike\
    \ the `while` loop, the `repeat-while` loop also needs code inside its loop that\
    \ can change its Boolean value from `true` to `false`, and it also needs code\
    \ before the `repeat-while` loop to initialize any variables that are used to\
    \ calculate the `repeat-while` loop’s Boolean value.\n\nTo see how Boolean values\
    \ work with a `repeat-while` loop, follow these steps:\n\n- Make sure the `LoopingPlayground`\
    \ file is loaded in Xcode.\n- Edit the code as follows:\n\n```\nimport Cocoa\n\
    var counter = 1\nrepeat {\n    print (\"Goodbye\")\n    counter++\n} while counter\
    \ <= 10\n```\n\nNotice that the Boolean value (`counter <= 10`) determines how\
    \ many times the `repeat-while` loop runs as shown in Figure 8-2. Also note that\
    \ `counter++` is equivalent to `counter = counter + 1`.\n\n![A978-1-4842-1233-2_8_Fig2_HTML.jpg](A978-1-4842-1233-2_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2. Running a `repeat-while` loop in a playground\n\nRemember, the main\
    \ difference between the `while` loop and the `repeat-while` loop is that the\
    \ `repeat-while` loop always runs at least once while the `while` loop can run\
    \ zero times."
  raw: '## The while Loop


    The simplest loop in Swift is called the while loop, which looks like this:


    `while BooleanValue {`


    `}`


    Before the while loop does anything, it first checks if a Boolean value is true
    or false. If it’s true, then it runs the code inside its curly brackets once.
    Then it checks its Boolean value again to see if it’s changed to false or if it’s
    still true. The moment this Boolean value becomes false, the while loop stops.


    Because the while loop checks a Boolean value before doing anything, it’s possible
    that the while loop may never run any of its code. More importantly, the while
    loop only runs if its Boolean value is true. That means somewhere inside the while
    loop’s curly brackets, there must be code that eventually changes this Boolean
    value to false.


    If a while loop fails to change its Boolean value from true to false, then the
    loop will run forever, which is known as an endless loop. An endless loop may
    crash or freeze your program so it no longer responds to the user or works.


    At the simplest level, a while loop’s Boolean value can just be true or false
    such as:


    `while true {`


    `}`


    More commonly, while loops use comparison operators to determine a Boolean value
    such as:


    `while counter <= 5 {`


    `}`


    As long as “counter <=5” remains true, the while loop will run. The moment “counter
    <= 5” is no longer true, the while loop will stop.


    When using while loops, you need to define the Boolean value before the loop begins
    (to make sure it’s either true or false), and then you must change the Boolean
    value somewhere inside the while loop (to make sure the while loop eventually
    stops).


    To see how Boolean values work with a while loop, create a new playground by following
    these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type LoopingPlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file.
      Edit the code as follows: `import Cocoa` `var counter = 1` `while counter <=
    10 {`     `print ("Hello")`     `counter++` `}`  


    Note that the “var counter : Int = 1” line defines the variable that the while
    loop uses to determine a Boolean value (true or false). Also note the “counter++”
    line inside the while loop. This constantly changes the variable used by the while
    loop to determine when to stop. By changing the Boolean comparison (counter <=10),
    you can change how many times the while loop runs as shown in Figure [8-1](#A978-1-4842-1233-2_8_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_8_Fig1_HTML.jpg](A978-1-4842-1233-2_8_Fig1_HTML.jpg)


    Figure 8-1.


    Running a while loop in a playground


    When using a while loop, keep in mind the following:


    *   Before the while loop, make sure to define any variables used by the while
    loop’s Boolean value

    *   A while loop may run zero or more times

    *   Inside the while loop, make sure the Boolean value used by the while loop
    can change to false eventually to avoid creating an endless loop


    ## The repeat-while Loop


    As an alternative to the while loop, Swift also offers a repeat-while loop that
    works almost the same. The only difference is that instead of checking a Boolean
    value before running, the repeat-while loop checks its Boolean value after it
    runs.


    That means the do-while loop will always run at least once. The structure of a
    do-while loop looks like this:


    `repeat {`


    `} while BooleanValue`


    Like the while loop, the repeat-while loop also needs code inside its loop that
    can change its Boolean value from true to false, and it also needs code before
    the repeat-while loop to initialize any variables that are used to calculate the
    repeat-while loop’s Boolean value.


    To see how Boolean values work with a repeat-while loop, follow these steps:


    Make sure the LoopingPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var counter = 1` `repeat {`     `print ("Goodbye")`     `counter++`
    `} while counter <= 10`  


    Notice that the Boolean value (counter <= 10) determines how many times the do-while
    loop runs as shown in Figure [8-2](#A978-1-4842-1233-2_8_Chapter.html#Fig2). Also
    note that “counter++” is equivalent to “counter = counter + 1”.


    ![A978-1-4842-1233-2_8_Fig2_HTML.jpg](A978-1-4842-1233-2_8_Fig2_HTML.jpg)


    Figure 8-2.


    Running a repeat-while in a playground


    Remember, the main difference between the while loop and the repeat-while loop
    is that the repeat-while loop always runs at least once while the while loop can
    run zero times.'
  trans: "\n# `while` 循环\n\nSwift 中最简单的循环称为 `while` 循环，其结构如下：\n\n```\nwhile 布尔值 {\n\
    \n}\n```\n\n在 `while` 循环执行任何操作之前，它首先检查一个布尔值是 `true` 还是 `false`。如果为 `true`，则运行其花括号内的代码一次。然后它会再次检查该布尔值，判断其是否已变为\
    \ `false`，或者仍为 `true`。当该布尔值变为 `false` 的那一刻，`while` 循环就会停止。\n\n由于 `while` 循环在执行任何操作前会检查一个布尔值，因此\
    \ `while` 循环有可能永远不会运行其任何代码。更重要的是，`while` 循环仅在其布尔值为 `true` 时才会运行。这意味着 `while` 循环的花括号内，必须存在一段能够最终将该布尔值变为\
    \ `false` 的代码。\n\n如果 `while` 循环未能将其布尔值从 `true` 变为 `false`，那么循环将永远运行下去，这被称为**无限循环**。无限循环可能导致程序崩溃或冻结，使其不再响应用户或正常工作。\n\
    \n在最简单的层面上，`while` 循环的布尔值可以直接是 `true` 或 `false`，例如：\n\n```\nwhile true {\n\n}\n\
    ```\n\n更常见的是，`while` 循环使用比较运算符来确定一个布尔值，例如：\n\n```\nwhile counter <= 5 {\n\n}\n\
    ```\n\n只要 `counter <= 5` 保持为 `true`，`while` 循环就会运行。当 `counter <= 5` 不再为 `true`\
    \ 时，`while` 循环就会停止。\n\n在使用 `while` 循环时，你需要在循环开始前定义好布尔值（以确保它是 `true` 或 `false`），然后必须在\
    \ `while` 循环内部的某个地方改变这个布尔值（以确保 `while` 循环最终会停止）。\n\n要了解布尔值如何与 `while` 循环配合使用，请按照以下步骤创建一个新的\
    \ playground：\n\n- 启动 Xcode。\n- 选择文件 ➤ 新建 ➤ Playground。（如果你看到了 Xcode 欢迎屏幕，也可以点击“开始使用\
    \ playground”。）Xcode 会要求输入 playground 名称和平台。\n- 点击“名称”文本框，输入 `LoopingPlayground`。\n\
    - 点击“平台”弹出菜单，选择 OS X。Xcode 会询问你想将 playground 文件保存在哪里。\n- 点击一个你想保存 playground 文件的文件夹，然后点击“创建”按钮。Xcode\
    \ 会显示该 playground 文件。\n- 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar counter = 1\nwhile\
    \ counter <= 10 {\n    print (\"Hello\")\n    counter++\n}\n```\n\n请注意，`var counter\
    \ : Int = 1` 这一行定义了变量，`while` 循环使用该变量来确定一个布尔值（`true` 或 `false`）。同时注意 `while` 循环内部的\
    \ `counter++` 这一行。它不断地改变 `while` 循环用来确定何时停止的变量。通过更改布尔比较条件（`counter <= 10`），可以改变\
    \ `while` 循环运行的次数，如图 8-1 所示。\n\n![A978-1-4842-1233-2_8_Fig1_HTML.jpg](img/A978-1-4842-1233-2_8_Fig1_HTML.jpg)\n\
    \n图 8-1. 在 playground 中运行 `while` 循环\n\n使用 `while` 循环时，请记住以下几点：\n\n- 在 `while`\
    \ 循环之前，确保定义好 `while` 循环的布尔值所使用的所有变量。\n- `while` 循环可能运行零次或多次。\n- 在 `while` 循环内部，确保所使用的布尔值最终能够变为\
    \ `false`，以避免造成无限循环。\n\n## `repeat-while` 循环\n\n作为 `while` 循环的替代方案，Swift 还提供了一种\
    \ `repeat-while` 循环，其工作方式几乎相同。唯一的区别在于，`repeat-while` 循环不是在运行前检查布尔值，而是在运行后检查布尔值。\n\
    \n这意味着 `repeat-while` 循环**至少会运行一次**。`repeat-while` 循环的结构如下：\n\n```\nrepeat {\n\
    \n} while 布尔值\n```\n\n与 `while` 循环类似，`repeat-while` 循环也需要在其循环内部有能够将其布尔值从 `true`\
    \ 变为 `false` 的代码，并且还需要在 `repeat-while` 循环之前有代码来初始化用于计算其布尔值的所有变量。\n\n要了解布尔值如何与\
    \ `repeat-while` 循环配合使用，请按照以下步骤操作：\n\n- 确保 `LoopingPlayground` 文件已在 Xcode 中加载。\n\
    - 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar counter = 1\nrepeat {\n    print (\"Goodbye\"\
    )\n    counter++\n} while counter <= 10\n```\n\n请注意，布尔值（`counter <= 10`）决定了 `repeat-while`\
    \ 循环的运行次数，如图 8-2 所示。同时注意 `counter++` 等同于 `counter = counter + 1`。\n\n![A978-1-4842-1233-2_8_Fig2_HTML.jpg](img/A978-1-4842-1233-2_8_Fig2_HTML.jpg)\n\
    \n图 8-2. 在 playground 中运行 `repeat-while` 循环\n\n请记住，`while` 循环和 `repeat-while`\
    \ 循环的主要区别在于：`repeat-while` 循环至少会运行一次，而 `while` 循环可以运行零次。\n"
- fmt: "# The `for` Loop That Counts\n\nDepending on the Boolean value, both the `while`\
    \ and `repeat-while` loop can run multiple times. If your code counts like the\
    \ previous `while` and `repeat-while` loop examples did, then you can specify\
    \ how many times the loop repeats. However, a `while` or `repeat-while` loop could\
    \ possibly run a different number of times depending on its Boolean value.\n\n\
    For example, a `while` or `repeat-while` loop might ask a user to type in a password.\
    \ If the password is invalid, the loop will ask for a valid password again. Since\
    \ you never know how many times a user might need to try until typing a correct\
    \ password, you have no idea beforehand how many times a `while` or `repeat-while`\
    \ loop will run.\n\nThat’s the purpose of the `for` loop: to run a fixed number\
    \ of times. With a `for` loop you need to define the following:\n\n* A counting\
    \ variable\n* The initial value of the counting variable\n* The ending value of\
    \ the counting variable often defined by a comparison operator\n* The increment/decrement\
    \ value for counting up or down\n\nThe structure of the `for` loop looks like\
    \ this:\n\n```\nfor var startingValue; BooleanValue; incrementValue {\n\n}\n```\n\
    \nThe `startingValue` needs to define a variable name for counting and an initial\
    \ value such as `i = 1`.\n\nThe `BooleanValue` needs to evaluate to a `true` or\
    \ `false` value that uses the variable used for counting, often using a comparison\
    \ operator.\n\nThe `incrementValue` defines how to count. Counting usually occurs\
    \ by adding 1, but you can count by larger increments such as by 5 or 10, or even\
    \ by negative numbers to count backwards. Counting typically uses the increment/decrement\
    \ operators (such as `i++`) or the compound assignment operator (such as `i +=\
    \ 15`).\n\nA typical `for` loop might look like this:\n\n```\nfor var i = 1; i\
    \ <= 10; i++ {\n\n}\n```\n\nIn this `for` loop example, the starting value defines\
    \ a variable called `i` and sets its initial value to 1.\n\nThen the Boolean value\
    \ is defined by `i <= 10` that uses the counting variable `i`.\n\nThe increment\
    \ value is `i++`, which simply adds 1 to the value of the `i` variable.\n\nNow\
    \ this `for` loop starts counting at 1, keeps repeating the loop and adding 1\
    \ to the `i` variable, and stops only when the Boolean value `i <= 10` is no longer\
    \ true, which occurs when the `i` variable equals 11.\n\nTo see how Boolean values\
    \ work with a `for` loop, follow these steps:\n\nMake sure the `LoopingPlayground`\
    \ file is loaded in Xcode. Edit the code as follows:\n\n```\nimport Cocoa\nfor\
    \ var i = 1; i <= 10; i++ {\n    print (\"Greetings\")\n}\nfor var i = 21; i <=\
    \ 120; i += 10 {\n    print (\"Greetings\")\n}\n```\n\nNotice that in the second\
    \ `for` loop, the initial starting value is not 1 and the increment counter does\
    \ not add by 1. Yet it still produces the exact same result as the first `for`\
    \ loop. You can get as creative as you want with your `for` loops in choosing\
    \ a starting value, a Boolean value to stop the loop, and an increment counter.\
    \ However, it’s best to keep `for` loops as simple as possible so they’ll be easy\
    \ to understand and modify. Figure 8-3 shows the results of the two `for` loops\
    \ running.\n\n![A978-1-4842-1233-2_8_Fig3_HTML.jpg](A978-1-4842-1233-2_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3.** Running two identical `for` loops\n\n## The `for-in` Statement\n\
    \nA `for` loop always runs a fixed number of times based on its starting value,\
    \ its Boolean value, and its increment counter. However, you must specify the\
    \ Boolean value to make the `for` loop eventually stop.\n\nSince you may not always\
    \ know when a `for` loop should stop based on different data, Swift also offers\
    \ a `for-in` loop. The main advantage is that the `for-in` loop automatically\
    \ knows how to count so you don’t have to specify when to stop.\n\nThe structure\
    \ of a `for-in` loop looks like this:\n\n```\nfor countingVariable in listOfItems\
    \ {\n\n}\n```\n\nThe `countingVariable` counts each item in a list of some kind.\
    \ That list can be a string or an array (which you’ll learn about later). The\
    \ main idea is that a `for-in` loop automatically knows how to count how many\
    \ items are in a list.\n\nFor example, if you wanted to run a `for` loop a fixed\
    \ number of times based on the length of a string, you could do the following:\n\
    \n```\nlet name = \"Oscar\"\nvar nameLength = count(name)\nfor var i = 0; i <\
    \ nameLength; i++ {\n    print (\"Hello\")\n}\n```\n\nIn this example, `name`\
    \ holds the five-character string `\"Oscar\"`. The `nameLength` variable counts\
    \ the number of characters in the `name` variable (which is 5). Now the `for`\
    \ loop uses the length of the `\"Oscar\"` string (5) to determine how many times\
    \ to run the `for` loop.\n\nHere’s how the equivalent `for-in` loop looks:\n\n\
    ```\nfor name in \"Oscar\" {\n    print (\"Hello\")\n}\n```\n\nNotice how much\
    \ simpler the `for-in` loop looks. This `for-in` loop keeps running based on the\
    \ number of characters stored in the `\"Oscar\"` string, which is 5. Since the\
    \ `for-in` loop can automatically count by itself, it reduces the amount of code\
    \ you need to write while increasing accuracy at the same time.\n\nThe `for-in`\
    \ loop is especially handy for working with arrays (which you’ll learn about later).\
    \ To see how `for-in` loops can work, follow these steps:\n\nMake sure the `LoopingPlayground`\
    \ file is loaded in Xcode. Edit the code as follows:\n\n```\nimport Cocoa\nlet\
    \ names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names {\n\
    \    print (person)\n}\n```\n\nFigure 8-4 shows how the `for-in` loop runs four\
    \ times because the `names` array contains four items. If you add or subtract\
    \ a name from this array, the `for-in` loop automatically counts the new number\
    \ of items in the array.\n\n![A978-1-4842-1233-2_8_Fig4_HTML.jpg](A978-1-4842-1233-2_8_Fig4_HTML.jpg)\n\
    \n**Figure 8-4.** Counting with a `for-in` loop\n\n## Exiting Loops Prematurely\n\
    \nNormally loops run until a Boolean value changes. However, you can prematurely\
    \ exit out of a loop by using the `break` command. Normally this loop would run\
    \ four times:\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"\
    ]\nfor person in names {\n    print (person)\n}\n```\n\nIf you inserted a `break`\
    \ command, you could make this loop exit after running only once like this:\n\n\
    ```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names\
    \ {\n    print (person)\n    break\n}\n```\n\nThis `for-in` loop would run once,\
    \ print the name `\"Oscar\"`, hit the `break` command, and exit out of the `for-in`\
    \ loop. Of course it’s rather pointless to put a `break` command inside a `for-in`\
    \ loop to stop it prematurely all the time, so it’s more common to use the `break`\
    \ command with a branching statement. That way if a certain Boolean value is true,\
    \ the loop exits prematurely. Otherwise the loop keeps running.\n\nTo see how\
    \ to exit out of the loop prematurely, follow these steps:\n\nMake sure the `LoopingPlayground`\
    \ file is loaded in Xcode. Edit the code as follows:\n\n```\nimport Cocoa\nlet\
    \ employees = [\"Fred\", \"Jane\", \"Sam\", \"Kelly\"]\nfor person in employees\
    \ {\n    if person == \"Sam\" {\n        print (person)\n        break\n    }\n\
    \    print (person)\n}\n```\n\nThis `for-in` loop would normally run four times\
    \ because the `employees` array contains four names. However, as soon as the `for-in`\
    \ loop finds the name `\"Sam\"`, it prints that name, hits the `break` command,\
    \ and prematurely exits out of the `for-in` loop so it only runs twice as shown\
    \ in Figure 8-5.\n\n![A978-1-4842-1233-2_8_Fig5_HTML.jpg](A978-1-4842-1233-2_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5.** Using the `break` command to exit out of a loop prematurely"
  raw: '## The for Loop That Counts


    Depending on the Boolean value, both the while and repeat-while loop can run multiple
    times. If your code counts like the previous while and repeat-while loop examples
    did, then you can specify how many times the loop repeats. However, a while or
    repeat-while loop could possibly run a different number of times depending in
    its Boolean value.


    For example, a while or repeat-while loop might ask a user to type in a password.
    If the password is invalid, the loop will ask for a valid password again. Since
    you never know how many times a user might need to try until typing a correct
    password, you have no idea beforehand how many times a while or repeat-while loop
    will run.


    That’s the purpose of the for loop: to run a fixed number of times. With a for
    loop you need to define the following:


    *   A counting variable

    *   The initial value of the counting variable

    *   The ending value of the counting variable often defined by a comparison operator

    *   The increment/decrement value for counting up or down


    The structure of the for loop looks like this:


    `for var startingValue; BooleanValue; incrementValue {`


    `}`


    The startingValue needs to define a variable name for counting and an initial
    value such as I = 1.


    The BooleanValue needs to evaluate to a true or false value that uses the variable
    used for counting, often using a comparison operator.


    The incrementValue defines how to count. Counting usually occurs by adding 1,
    but you can count by larger increments such as by 5 or 10, or even by negative
    numbers to count backwards. Counting typically uses the increment/decrement operators
    (such as i++) or the compound assignment operator (such as i += 15).


    A typical for loop might look like this:


    `for var i = 1; i <= 10; i++ {`


    `}`


    In this for loop example, the starting value defines a variable called “i” and
    sets its initial value to 1.


    Then the Boolean value is defined by “i <= 10” that uses the counting variable
    “i”.


    The increment value is “i++,” which simply adds 1 to the value of the “i” variable.


    Now this for loop starts counting at 1, keeps repeating the loop and adding 1
    to the “i” variable, and stops only when the Boolean value “i <= 10” is no longer
    true, which occurs when the “i” variable equals 11.


    To see how Boolean values work with a for loop, follow these steps:


    Make sure the LoopingPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `for var i = 1; i <= 10; i++ {`     `print ("Greetings")` `}` `for
    var i = 21; i <= 120; i += 10 {`     `print ("Greetings")` `}`  


    Notice that in the second for loop, the initial starting value is not 1 and the
    increment counter does not add by 1\. Yet it still produces the exact same result
    as the first for loop. You can get as creative as you want with your for loops
    in choosing a starting value, a Boolean value to stop the loop, and an increment
    counter. However, it’s best to keep for loops as simple as possible so they’ll
    be easy to understand and modify. Figure [8-3](#A978-1-4842-1233-2_8_Chapter.html#Fig3)
    shows the results of the two for loops running.


    ![A978-1-4842-1233-2_8_Fig3_HTML.jpg](A978-1-4842-1233-2_8_Fig3_HTML.jpg)


    Figure 8-3.


    Running two identical for loops


    ## The for-in Statement


    A for loop always runs a fixed number of times based on its starting value, its
    Boolean value, and its increment counter. However, you must specify the Boolean
    value to make the for loop eventually stop.


    Since you may not always know when a for loop should stop based on different data,
    Swift also offers a for-in loop. The main advantage is that the for-in loop automatically
    knows how to count so you don’t have to specify when to stop.


    The structure of a for-in loop looks like this:


    `for countingVariable in listOfItems {`


    `}`


    The countingVariable counts each item in a list of some kind. That list can be
    a string or an array (which you’ll learn about later). The main idea is that a
    for-in loop automatically knows how to count how many items are in a list.


    For example, if you wanted to run a for loop a fixed number of times based on
    the length of a string, you could do the following:


    `let name = "Oscar"`


    `var nameLength = count(name)`


    `for var i = 0; i < nameLength; i++ {`


        `print ("Hello")`


    `}`


    In this example, “name” holds the five-character string “Oscar.” The “nameLength”
    variable counts the number of characters in the “name” variable (which is 5).
    Now the for loop uses the length of the “Oscar” string (5) to determine how many
    times to run the for loop.


    Here’s how the equivalent for-in loop looks:


    `for name in "Oscar" {`


        `print ("Hello")`


    `}`


    Notice how much simpler the for-in loop looks. This for-in loop keeps running
    based on the number of characters stored in the “Oscar” string, which is 5\. Since
    the for-in loop can automatically count by itself, it reduces the amount of code
    you need to write while increasing accuracy at the same time.


    The for-in loop is especially handy for working with arrays (which you’ll learn
    about later). To see how for-in loops can work, follow these steps:


    Make sure the LoopingPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `let names = ["Oscar", "Sally", "Marty", "Louis"]` `for person
    in names {`     `print (person)` `}`  


    Figure [8-4](#A978-1-4842-1233-2_8_Chapter.html#Fig4) shows how the for-in loop
    runs four times because the “names” array contains four items. If you add or subtract
    a name from this array, the for-in loop automatically counts the new number of
    items in the array.


    ![A978-1-4842-1233-2_8_Fig4_HTML.jpg](A978-1-4842-1233-2_8_Fig4_HTML.jpg)


    Figure 8-4.


    Counting with a for-in loop


    ## Exiting Loops Prematurely


    Normally loops run until a Boolean value changes. However, you can prematurely
    exit out of a loop by using the break command. Normally this loop would run four
    times:


    `let names = ["Oscar", "Sally", "Marty", "Louis"]`


    `for person in names {`


        `print (person)`


    `}`


    If you inserted a break command, you could make this loop exit after running only
    once like this:


    `let names = ["Oscar", "Sally", "Marty", "Louis"]`


    `for person in names {`


        `print (person)`


        `break`


    `}`


    This for-in loop would run once, print the name “Oscar,” hit the break command,
    and exit out of the for-in loop. Of course it’s rather pointless to put a break
    command inside a for-in loop to stop it prematurely all the time, so it’s more
    common to use the break command with a branching statement. That way if a certain
    Boolean value is true, the loop exits prematurely. Otherwise the loop keeps running.


    To see how to exit out of the loop prematurely, follow these steps:


    Make sure the LoopingPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `let employees = ["Fred", "Jane", "Sam", "Kelly"]` `for person
    in employees {`     `if person == "Sam" {`         `print (person)`         `break`
        `}`     `print (person)` `}`  


    This for-in loop would normally run four times because the “employees” array contains
    four names. However, as soon as the for-in loop finds the name “Sam,” it prints
    that name, hits the break command, and prematurely exits out of the for-in loop
    so it only runs twice as shown in Figure [8-5](#A978-1-4842-1233-2_8_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_8_Fig5_HTML.jpg](A978-1-4842-1233-2_8_Fig5_HTML.jpg)


    Figure 8-5.


    Using the break command to exit out of a loop prematurely'
  trans: "\n# 用于计数的 `for` 循环\n\n根据布尔值的不同，`while` 和 `repeat-while` 循环可以运行多次。如果你的代码像之前的\
    \ `while` 和 `repeat-while` 循环示例那样进行计数，那么你可以指定循环重复的次数。然而，`while` 或 `repeat-while`\
    \ 循环的运行次数可能会根据其布尔值而有所不同。\n\n例如，一个 `while` 或 `repeat-while` 循环可能会要求用户输入密码。如果密码无效，循环会再次要求输入有效密码。由于你永远无法预知用户需要尝试多少次才能输入正确的密码，因此你事先无法知道一个\
    \ `while` 或 `repeat-while` 循环会运行多少次。\n\n这就是 `for` 循环的用途：按固定的次数运行。使用 `for` 循环，你需要定义以下内容：\n\
    \n*   一个计数变量\n*   计数变量的初始值\n*   计数变量的结束值，通常由比较运算符定义\n*   用于递增或递减的增量/减量值\n\n`for`\
    \ 循环的结构如下所示：\n\n```\nfor var 起始值; 布尔值; 增量值 {\n\n}\n```\n\n`起始值` 需要定义一个用于计数的变量名和一个初始值，例如\
    \ `i = 1`。\n\n`布尔值` 需要计算出一个 `true` 或 `false` 值，该值使用用于计数的变量，通常使用比较运算符。\n\n`增量值`\
    \ 定义如何计数。计数通常是通过加 1 实现的，但你可以使用更大的增量来计数，例如 5 或 10，甚至可以使用负数来逆向计数。计数通常使用递增/递减运算符（例如\
    \ `i++`）或复合赋值运算符（例如 `i += 15`）。\n\n一个典型的 `for` 循环可能如下所示：\n\n```\nfor var i = 1;\
    \ i <= 10; i++ {\n\n}\n```\n\n在这个 `for` 循环示例中，起始值定义了一个名为 `i` 的变量，并将其初始值设置为 1。\n\
    \n然后，布尔值由 `i <= 10` 定义，该值使用了计数变量 `i`。\n\n增量值是 `i++`，它简单地将 `i` 变量的值加 1。\n\n现在，这个\
    \ `for` 循环从 1 开始计数，不断重复循环并将 `i` 变量加 1，只有当布尔值 `i <= 10` 不再为真时才会停止，当 `i` 变量等于 11\
    \ 时就会发生这种情况。\n\n要了解布尔值如何与 `for` 循环配合使用，请按照以下步骤操作：\n\n确保 `LoopingPlayground` 文件已加载到\
    \ Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\nfor var i = 1; i <= 10; i++ {\n   \
    \ print (\"问候语\")\n}\nfor var i = 21; i <= 120; i += 10 {\n    print (\"问候语\"\
    )\n}\n```\n\n注意，在第二个 `for` 循环中，初始起始值不是 1，并且增量计数器不是每次加 1。然而，它仍然产生与第一个 `for` 循环完全相同的结果。在选择起始值、停止循环的布尔值以及增量计数器时，你可以根据自己的意愿随意发挥创意。不过，最好让\
    \ `for` 循环尽可能保持简单，这样它们才易于理解和修改。图 8-3 显示了这两个 `for` 循环运行的结果。\n\n![A978-1-4842-1233-2_8_Fig3_HTML.jpg](img/A978-1-4842-1233-2_8_Fig3_HTML.jpg)\n\
    \n**图 8-3.** 运行两个相同的 `for` 循环\n\n## `for-in` 语句\n\n`for` 循环根据其起始值、布尔值和增量计数器，总是按固定的次数运行。然而，你必须指定布尔值才能使\
    \ `for` 循环最终停止。\n\n由于你可能并不总是知道 `for` 循环应根据不同的数据在何时停止，Swift 还提供了 `for-in` 循环。其主要优势在于\
    \ `for-in` 循环自动知道如何计数，因此你无需指定何时停止。\n\n`for-in` 循环的结构如下所示：\n\n```\nfor 计数变量 in\
    \ 列表项 {\n\n}\n```\n\n`计数变量` 对某种列表中的每一项进行计数。该列表可以是字符串或数组（你将在后面了解到）。主要思想是 `for-in`\
    \ 循环自动知道如何计算列表中有多少项。\n\n例如，如果你想根据字符串的长度按固定次数运行一个 `for` 循环，可以这样做：\n\n```\nlet name\
    \ = \"Oscar\"\nvar nameLength = count(name)\nfor var i = 0; i < nameLength; i++\
    \ {\n    print (\"你好\")\n}\n```\n\n在这个例子中，`name` 保存了包含五个字符的字符串 `\"Oscar\"`。`nameLength`\
    \ 变量统计了 `name` 变量中的字符数（即 5）。现在 `for` 循环使用 `\"Oscar\"` 字符串的长度（5）来确定运行 `for` 循环的次数。\n\
    \n以下是等效的 `for-in` 循环的样子：\n\n```\nfor name in \"Oscar\" {\n    print (\"你好\")\n\
    }\n```\n\n注意 `for-in` 循环看起来要简洁得多。这个 `for-in` 循环根据存储在 `\"Oscar\"` 字符串中的字符数（即 5）持续运行。由于\
    \ `for-in` 循环可以自动自行计数，它减少了你需要编写的代码量，同时提高了准确性。\n\n`for-in` 循环在处理数组（你将在后面了解到）时特别方便。要了解\
    \ `for-in` 循环如何工作，请按照以下步骤操作：\n\n确保 `LoopingPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\n\
    for person in names {\n    print (person)\n}\n```\n\n图 8-4 显示了 `for-in` 循环如何运行四次，因为\
    \ `names` 数组包含四个项。如果从该数组中添加或删除一个名字，`for-in` 循环会自动计算数组中新项的数量。\n\n![A978-1-4842-1233-2_8_Fig4_HTML.jpg](img/A978-1-4842-1233-2_8_Fig4_HTML.jpg)\n\
    \n**图 8-4.** 使用 `for-in` 循环进行计数\n\n## 提前退出循环\n\n通常情况下，循环会一直运行直到布尔值发生变化。然而，你可以使用\
    \ `break` 命令提前退出循环。通常这个循环会运行四次：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"\
    Marty\", \"Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\n如果你插入一个\
    \ `break` 命令，可以让这个循环只运行一次后退出，如下所示：\n\n```\nlet names = [\"Oscar\", \"Sally\",\
    \ \"Marty\", \"Louis\"]\nfor person in names {\n    print (person)\n    break\n\
    }\n```\n\n这个 `for-in` 循环将运行一次，打印名字 `\"Oscar\"`，遇到 `break` 命令，然后退出 `for-in` 循环。当然，在\
    \ `for-in` 循环中总是放置一个 `break` 命令来提前停止它是毫无意义的，因此更常见的是将 `break` 命令与分支语句结合使用。这样，如果某个布尔值为真，循环就会提前退出。否则，循环会继续运行。\n\
    \n要了解如何提前退出循环，请按照以下步骤操作：\n\n确保 `LoopingPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nlet employees = [\"Fred\", \"Jane\", \"Sam\", \"Kelly\"]\n\
    for person in employees {\n    if person == \"Sam\" {\n        print (person)\n\
    \        break\n    }\n    print (person)\n}\n```\n\n这个 `for-in` 循环通常会运行四次，因为\
    \ `employees` 数组包含四个名字。然而，一旦 `for-in` 循环找到名字 `\"Sam\"`，它就会打印该名字，遇到 `break` 命令，并提前退出\
    \ `for-in` 循环，因此它只运行了两次，如图 8-5 所示。\n\n![A978-1-4842-1233-2_8_Fig5_HTML.jpg](img/A978-1-4842-1233-2_8_Fig5_HTML.jpg)\n\
    \n**图 8-5.** 使用 `break` 命令提前退出循环\n"
- fmt: "# Using Loops in an OS X Program\n\nIn this sample program, the computer picks\
    \ a random number between 1 and 10\\. Now the user must guess that number as the\
    \ computer. To keep the user from guessing a number outside the range of 1 and\
    \ 10, the user interface will let the user choose a value from a slider.\n\nEach\
    \ time the user guesses incorrectly, a label will display a message that the guess\
    \ is too high or too low. When the user correctly guesses the number, a loop will\
    \ print a list of each guess and display it in an alert dialog.\n\nCreate a new\
    \ OS X project by following these steps:\n\nFrom within Xcode choose **File**\
    \ ➤ **New** ➤ **Project**. Click **Application** under the OS X category. Click\
    \ **Cocoa Application** and click the **Next** button. Xcode now asks for a product\
    \ name. Click in the **Product Name** text field and type `LoopingProgram`. Make\
    \ sure the **Language** pop-up menu displays **Swift** and that no check boxes\
    \ are selected. Click the **Next** button. Xcode asks where you want to store\
    \ the project. Choose a folder to store your project and click the **Create**\
    \ button. Click the `MainMenu.xib` file in the **Project Navigator**. Click on\
    \ the `LoopingProgram` icon to make the window of the user interface appear as\
    \ shown in Figure 8-6.\n\n![A978-1-4842-1233-2_8_Fig6_HTML.jpg](A978-1-4842-1233-2_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6.\n\nMaking the window of the user interface visible. Choose **View**\
    \ ➤ **Utilities** ➤ **Show Object Library** to make the **Object Library** appear\
    \ in the bottom right corner of the Xcode window. Drag a **Horizontal Slider**,\
    \ two **Labels**, and a **Push Button** on the user interface and resize them\
    \ so the user interface looks similar to Figure 8-7.\n\n![A978-1-4842-1233-2_8_Fig7_HTML.jpg](A978-1-4842-1233-2_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7.\n\nCreating a basic user interface with two labels, a horizontal\
    \ slider, and a push button. Click on the top label to select it. Then choose\
    \ **View** ➤ **Utilities** ➤ **Show Attributes Inspector**. The **Attributes Inspector**\
    \ pane appears in the upper right corner of the Xcode window. Click in the **Title**\
    \ text field and type `Guess a number`. Click the **Center** alignment icon as\
    \ shown in Figure 8-8.\n\n![A978-1-4842-1233-2_8_Fig8_HTML.jpg](A978-1-4842-1233-2_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8.\n\nThe **Attributes Inspector** pane for a label. Double-click on\
    \ the bottom label and type `Your guesses =` and then press **Return**. Double-click\
    \ on the **Push Button**, type `Guess`, and then press **Return**. Your user interface\
    \ should look like Figure 8-9.\n\n![A978-1-4842-1233-2_8_Fig9_HTML.jpg](A978-1-4842-1233-2_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9.\n\nThe completed user interface. Click on the **Horizontal Slider**\
    \ to select it and choose **View** ➤ **Utilities** ➤ **Show Attributes Inspector**.\
    \ The **Attributes Inspector** pane appears in the upper right corner of the Xcode\
    \ window. Select the **“Only stop on tick marks”** check box. Click in the text\
    \ field directly above the **“Only stop on tick marks”** check box and type `10`.\
    \ Click in the **Minimum** text field and type `1`. Click in the **Maximum** text\
    \ field and type `10`. Click in the **Current** text field and type `5` as shown\
    \ in Figure 8-10.\n\n![A978-1-4842-1233-2_8_Fig10_HTML.jpg](A978-1-4842-1233-2_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10.\n\nChanging the Horizontal Slider attributes\n\nWith this user\
    \ interface, the user will use the horizontal slider to choose a number between\
    \ 1 and 10\\. If the user guesses a number too high, the label will display \"\
    Too High.\" If the user guesses a number too low, the label will display \"Too\
    \ Low.\"\n\nEach time the user guesses wrong, the bottom label displays the incorrect\
    \ guess. When the user guesses the correct number, the top label will display\
    \ \"You got it!\"\n\nIn this example, we'll need two `IBOutlet` variables to connect\
    \ to each label so we can display information on each label. Then we'll need one\
    \ `IBAction` method to connect to the **Guess** button. That way when the user\
    \ clicks on the **Guess** button, the `IBAction` method can check if the user\
    \ picked the correct number using the horizontal slider.\n\nWe'll need to write\
    \ Swift code that chooses a random number between 1 and 10\\. Then we'll use a\
    \ loop to list all the guesses the user made and display those results in an alert\
    \ dialog.\n\nTo connect Swift code to your user interface, follow these steps:\n\
    \nWith your user interface still visible in the Xcode window, choose **View**\
    \ ➤ **Assistant Editor** ➤ **Show Assistant Editor**. The `AppDelegate.swift`\
    \ file appears next to the user interface. Move the mouse over the top label,\
    \ hold down the **Control** key, and drag from the top text field to underneath\
    \ the existing `@IBOutlet` line in the `AppDelegate.swift` file as shown in Figure\
    \ 8-11.\n\n![A978-1-4842-1233-2_8_Fig11_HTML.jpg](A978-1-4842-1233-2_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11.\n\nControl-dragging from the top label to the `AppDelegate.swift`\
    \ file. Release the mouse and the **Control** key. A pop-up window appears as\
    \ shown in Figure 8-12.\n\n![A978-1-4842-1233-2_8_Fig12_HTML.jpg](A978-1-4842-1233-2_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12.\n\nThe pop-up window for defining an `IBOutlet`. Click in the **Name**\
    \ text field and type `messageLabel` and click the **Connect** button. Xcode creates\
    \ an `IBOutlet`. Move the mouse over the bottom label, hold down the **Control**\
    \ key, and drag the mouse underneath the `@IBOutlet` line in the `AppDelegate.swift`\
    \ file. Release the mouse and the **Control** key. A pop-up window appears. Click\
    \ in the **Name** text field and type `guessLabel` and click the **Connect** button.\
    \ Xcode creates another `IBOutlet`. Move the mouse over the horizontal slider,\
    \ hold down the **Control** key, and drag the mouse underneath the `@IBOutlet`\
    \ line in the `AppDelegate.swift` file. Release the mouse and the **Control**\
    \ key. A pop-up window appears. Click in the **Name** text field and type `guessSlider`\
    \ and click the **Connect** button. Xcode creates another `IBOutlet`. You should\
    \ now have three `IBOutlet`s that represent the two text fields on your user interface:\n\
    \n```\n@IBOutlet weak var messageLabel: NSTextField!\n@IBOutlet weak var guessLabel:\
    \ NSTextField!\n@IBOutlet weak var guessSlider: NSSlider!\n```\n\nEdit the underneath\
    \ the `IBOutlet`s so it looks like this:\n\n```\nimport Cocoa\n\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var\
    \ window: NSWindow!\n    @IBOutlet weak var messageLabel: NSTextField!\n    @IBOutlet\
    \ weak var guessLabel: NSTextField!\n    @IBOutlet weak var guessSlider: NSSlider!\n\
    \n    var randomNumber : Int\n    var guessHistory : String\n    var guessNumber\
    \ : Int\n    var guessArray = [Int]()\n    var arrayTotal : Int\n\n    override\
    \ init () {\n        self.guessHistory = \"\"\n        self.guessNumber = 0\n\
    \        self.guessArray = []\n        self.arrayTotal = 0\n        self.randomNumber\
    \ = 1 + Int(arc4random_uniform(10))\n        // Int(arc4random_uniform(10)) chooses\
    \ a random number between 0 and 9, so we need to add 1 so it chooses a random\
    \ number from 1 to 10\n    }\n\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n        // Insert code here to initialize your application\n\
    \    }\n\n    func applicationWillTerminate(aNotification: NSNotification) {\n\
    \        // Insert code here to tear down your application\n    }\n```\n\nThe\
    \ `IBOutlet` variables connect to the items on your user interface.\n\n```\n@IBOutlet\
    \ weak var window: NSWindow!\n\n@IBOutlet weak var messageLabel: NSTextField!\n\
    \n@IBOutlet weak var guessLabel: NSTextField!\n\n@IBOutlet weak var guessSlider:\
    \ NSSlider!\n```\n\nThe next five lines declare variables the entire class `AppDelegate`\
    \ can use.\n\n```\nvar guessHistory : String\n\nvar guessNumber : Int\n\nvar guessArray\
    \ = [Int]()\n\nvar arrayTotal : Int\n\nvar randomNumber : Int\n```"
  raw: '## Using Loops in an OS X Program


