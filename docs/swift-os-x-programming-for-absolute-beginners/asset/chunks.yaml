    window. Make sure you resize Wrapping Text Field and all the check box widths
    so it looks like Figure [16-2](#A978-1-4842-1233-2_16_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_16_Fig2_HTML.jpg](A978-1-4842-1233-2_16_Fig2_HTML.jpg)


    Figure 16-2.


    The user interface of the CheckProgram.


