    ## Summary


    When you create a Cocoa Application project, Xcode automatically creates pull-down
    menus for your program. You can add, delete, or rearrange menu titles on the menu
    bar or menu commands on the pull-down menus. For the user’s convenience, you can
    even assign keystroke shortcuts to menu commands.


    To edit a pull-down menu, you can either edit it directly on the pull-down menu
    or open the `Document Outline`. You can Control-drag from either the pull-down
    menu commands or the `Document Outline` to connect menu commands to `IBAction`
    methods.


    When working with `.storyboard` files, you typically connect menu commands to
    the `First Responder` icon. Then you can implement the `IBAction` method in the
    correct Swift file to make that menu command work. When working with `.xib` files,
    you can directly connect menu commands to `IBAction` methods.


    When Xcode creates pull-down menus for your Cocoa Application, many of those menu
    commands already know how to work such as `Window` ➤ `Zoom` and `File` ➤ `Close`.
    However, most of the menu commands won’t do anything at all until you write Swift
    code of your own to make them work properly in your particular program.


    Menu commands on pull-down menus give you one more way to connect commands to
    `IBAction` methods. Since most OS X programs rely on pull-down menus, focus first
    on organizing your program commands into pull-down menus, then write the Swift
    code to make each menu command actually work.


    # 20. Protocol-Oriented Programming


    When Apple introduced Swift during their Worldwide Developer’s conference in 2014,
    they promoted it as an easier, safer, and faster programming language for iOS,
    OS X, and watchOS development than Objective-C. While both Swift and Objective-C
    allow object-oriented programming, Swift goes one step further and offers protocol-oriented
    programming as well.


    One of the biggest problems with pure object-oriented programming languages is
    that extending the capabilities of a class means creating additional subclasses.
    Then you have to create objects based on those new subclasses. This can be a clumsy
    solution since you now have to keep track of one or more subclasses where each
    subclass has a different name and may only offer only minor differences between
    them.


    Even worse, Swift (unlike some object-oriented programming languages) only allows
    single inheritance. That means a class can only inherit from exactly one other
    class. If you’d really like to inherit properties and methods from two different
    classes, you can’t.


    To get around this problem of inheritance and multiple subclasses, Swift offers
    protocols. Protocols work much like object-oriented programming but with some
    additional advantages:


    - Protocols can extend features of classes, structs, and enums. Inheritance can
    only extend features of classes.

    - A single class, struct, or enum can be extended by one or more protocols. Inheritance
    can only extend a single class.


    This means that protocols are more flexible and versatile than classes while giving
    you the advantages of object-oriented programming without its disadvantages. Instead
    of using classes (object-oriented programming), you can use protocols (protocol-oriented
    programming), or mix both object-oriented programming and protocol-oriented programming
    so you can get the best of both worlds.'
