  trans: '

    # 在 OS X 程序中做决策


    使用 playground 文件测试 Swift 代码既有趣又简单，因为它让你能专注于学习 Swift 的工作方式，而不受编写程序其他部分的干扰。但最终，你需要了解
    Swift 代码在 playground 文件之外是如何运行的。


    在这个示例程序中，用户需要输入员工 ID 编号和密码。员工 ID 编号必须在 100 到 150 之间才有效，密码则必须与字符串 `"password"`（这并不是一个安全的密码）完全匹配。


    这意味着我们将使用两个比较运算符来检查 ID 和密码是否有效，然后使用一个逻辑运算符来确保两者都有效。


    按照以下步骤创建一个新的 OS X 项目：


    在 Xcode 中选择 **File ➤ New ➤ Project**。在 OS X 类别下点击 **Application**。点击 **Cocoa Application**，然后点击
    **Next** 按钮。Xcode 现在会询问产品名称。点击 **Product Name** 文本字段，输入 `BranchingProgram`。确保
    **Language** 弹出菜单显示为 Swift，并且没有选中任何复选框。点击 **Next** 按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存储项目，然后点击
    **Create** 按钮。在项目导航器中点击 `MainMenu.xib` 文件。点击 `BranchingProgram` 图标，使用户界面窗口如图 7-9
    所示。


    ![A978-1-4842-1233-2_7_Fig9_HTML.jpg](img/A978-1-4842-1233-2_7_Fig9_HTML.jpg)


    **图 7-9.** 让用户界面窗口可见


    选择 **View ➤ Utilities ➤ Show Object Library**，使对象库显示在 Xcode 窗口的右下角。将两个标签、两个文本字段和一个按钮拖放到用户界面上，使其看起来类似于图
    7-10。


    ![A978-1-4842-1233-2_7_Fig10_HTML.jpg](img/A978-1-4842-1233-2_7_Fig10_HTML.jpg)


    **图 7-10.** 使用标签、文本字段和按钮创建基本用户界面


