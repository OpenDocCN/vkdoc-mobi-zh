    `}`


    To see how variable parameters work, follow these steps:


    Make sure your FunctionPlayground file is loaded in Xcode.   Edit the code as
    follows: `import Cocoa` `func internalChange (var name : String) {`     `name
    = name.uppercaseString`     `print ("Hello " + name)` `}` `internalChange ("Tasha")`
     


    Within the internalChange function, the name parameter changes. The first line
    in the internalChange function changes the name parameter into uppercase. However,
    any changes the internalChange function makes to the name parameter has no effect
    in any other part of your program. All changes stay isolated within the internalChange
    function.


    If you want to change a parameter and have those changes take effect outside a
    function, then you need to use inout parameters instead.


    ### Using Inout Parameters


    There are two ways to pass data to a function. One is to pass a fixed value such
    as:


    `sqrt(5)`


    A second way is to pass a variable that represents a value such as:


    `var z : Double = 45.0`


    `var answer : Double`


    `answer = sqrt(z)`


    In this Swift code, the value of z is 45.0 and is passed to the sqrt function.
    No matter what the sqrt function does, the value of z still remains 45.0.


    If you want a function to change the value of its parameters, you can create what’s
    called in-out parameters. That means when you pass a variable to a function, that
    function changes that variable.


    To define a parameter that a function can change, you just have to identify that
    parameter using the inout keyword such as:


    `func functionName (inout parameter: dataType) {`


    `}`


    If a function has two or more parameters, you can designate one or more parameters
    as inout parameters. When you identify a parameter as an inout parameter, then
    the function must change that inout parameter. When you call a function and pass
    it an inout parameter, you must use the & symbol to identify an inout parameter
    such as:


    `functionName (&variable)`


    To see how inout parameters work, follow these steps:


    Make sure your FunctionPlayground file is loaded in Xcode.   Edit the code as
    follows: `import Cocoa` `func changeMe (inout name: String, age: Int) {`     `print
    (name + " is \(age) years old")`     `name = name.uppercaseString` `}` `var animal
    : String = "Oscar the cat"` `changeMe (&animal, age: 2)` `print (animal)`  


    The changeMe function defines two parameters:


    *   A string parameter called name and identified as an inout parameter

    *   An integer parameter called age


    The changeMe function must modify the inout parameter somehow, which it does by
    changing the name parameter to uppercase as shown in Figure [6-13](#A978-1-4842-1233-2_6_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_6_Fig13_HTML.jpg](A978-1-4842-1233-2_6_Fig13_HTML.jpg)


    Figure 6-13.


    Using inout parameters


    Calling the changeMe function sends it a String variable called “animal,” which
    holds the string “Oscar the cat.” The changeMe function expects two parameters
    where the first one is an inout parameter. That means calling the changeMe function
    must meet the following criteria:


    *   The changeMe function expects two parameters, a string and an integer in that
    order

    *   Since the string parameter is an inout parameter, the first parameter must
    be a variable identified with the & symbol


    Before calling the changeMe function, the “animal” variable contains the string
    “Oscar the cat.” After calling the changeMe function, the “animal” variable now
    contains the string “OSCAR THE CAT.” That’s because the inout parameter in the
    changeMe function modified it.


    ### Understanding IBAction Methods


    If you remember in [Chapter 5](#A978-1-4842-1233-2_5_Chapter.html), you linked
    a button from the user interface to your Swift code to create an IBAction method,
    which is nothing more than a function that looks like this:


        `@IBAction func changeCase(sender: NSButton) {`


            `labelText.stringValue = messageText.stringValue.uppercaseString`


            `let warning = labelText.stringValue`


        `}`


