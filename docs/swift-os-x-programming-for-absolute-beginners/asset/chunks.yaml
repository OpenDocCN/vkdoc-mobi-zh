    按钮会显示当前存储在字典中的项目总数以及键和值的列表。


    每个文本字段都需要一个单独的`IBOutlet`，每个按钮都需要一个单独的`IBAction`方法，你需要通过按住 Control 键将每个项目从用户界面拖拽到你的`AppDelegate.swift`文件中来创建：


