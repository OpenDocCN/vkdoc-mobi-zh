    ![A978-1-4842-1233-2_3_Fig9_HTML.jpg](A978-1-4842-1233-2_3_Fig9_HTML.jpg)


    Figure 3-9.


    The Attributes Inspector pane lets you customize the appearance of items   Click
    in the Title text field that currently displays “Button.” Delete any existing
