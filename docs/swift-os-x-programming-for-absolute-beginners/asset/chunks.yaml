- fmt: "### Manipulating Sets\n\nWhen you have two or more sets, you can perform operations\
    \ on both of sets that creates a third set. Some common set operations include:\n\
    \n- `union` – combines all items from two sets into a new set\n- `subtract` –\
    \ removes the items of a second set from a first set to form a new set\n- `intersect`\
    \ – finds the common items in both sets and stores them in a new set\n- `exclusiveOr`\
    \ – finds items contained in one set or another, but not items in both sets\n\n\
    Think of the `union` command like adding two sets together and the `subtract`\
    \ command like subtracting one set from another. The `union` command specifies\
    \ two set names like this:\n\n`firstSet.union(secondSet)`\n\nThink of this as\
    \ equivalent to `firstSet + secondSet` where all items from both sets get combined\
    \ into a third set.\n\nThe `subtract` command specifies two set names, but the\
    \ order makes a difference such as:\n\n`thirdSet.subtract(firstSet)`\n\n`firstSet.subtract(thirdSet)`\n\
    \nThese two commands can give different results depending on the contents of each\
    \ set. Suppose `thirdSet` contains `{1, 2, 3, 4, 5}` and `firstSet` contains `[1,\
    \ 3, 5, 7]`. The `thirdSet.subtract(firstSet)` command works like this:\n\n`{1,\
    \ 2, 3, 4, 5} thirdSet`\n\n`[1, 3, 5, 7} firstSet`\n\nBoth sets contain 1, 3,\
    \ and 5 so those numbers get eliminated. Take 1, 3, and 5 out of `thirdSet` and\
    \ you’re left with `{2, 4}`.\n\nThe `firstSet.subtract(thirdSet)` command works\
    \ like this:\n\n`[1, 3, 5, 7] firstSet`\n\n`{1, 2, 3, 4, 5} thirdSet`\n\nBoth\
    \ sets contain 1, 3, and 5 so those numbers get eliminated. Take 1, 3, and 5 out\
    \ of `firstSet` and you’re left with `{7}`.\n\nThe `intersect` command finds items\
    \ in common between two sets. The `exclusiveOr` command finds items that are not\
    \ in both sets. Think of the `exclusiveOr` command as the opposite of the `intersect`\
    \ command.\n\nTo see how these four different ways to manipulate sets work, follow\
    \ these steps:\n\nMake sure the `SetPlayground` file is loaded in Xcode. Edit\
    \ the code as follows:\n\n```\nimport Cocoa\nvar firstSet = Set([1, 3, 5, 7])\n\
    var secondSet = Set([2, 4, 6, 8])\nvar thirdSet = Set ([1, 2, 3, 4, 5])\nfirstSet.union(secondSet)\n\
    secondSet.subtract(firstSet)\nfirstSet.subtract(secondSet)\nfirstSet.subtract(thirdSet)\n\
    thirdSet.subtract(firstSet)\nfirstSet.intersect(thirdSet)\nfirstSet.exclusiveOr(thirdSet)\n\
    ```\n\nNotice how the `subtract` command works differently depending on the order\
    \ you list the two sets as shown in Figure [10-4](#A978-1-4842-1233-2_10_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1233-2_10_Fig4_HTML.jpg](A978-1-4842-1233-2_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. Manipulating sets\n\n## Using Structures\n\nBoth tuples and sets\
    \ are built-in features of Swift. Structures are a unique way for you to group\
    \ different types of data in a single place. With a traditional variable, you\
    \ can only store one chunk of data at a time. With a structure, you can define\
    \ two or more chunks of data to store in a single variable. Variables declared\
    \ inside a structure are called properties.\n\nA structure that stores two chunks\
    \ of data would look like this:\n\n```\nstruct structureName {\n    var variableName1\
    \ : dataType\n    var variableName2 : dataType\n}\n```\n\nRemember, the data type\
    \ of each variable can be simple data types such as `Int`, `String`, or `Double`,\
    \ or they can be more complicated data types such as arrays, tuples, sets, or\
    \ dictionaries.\n\nYou can define two or more variables inside a structure where\
    \ each variable can contain different data types such as a string or an integer.\
    \ No matter how many properties a structure holds, you must initialize the properties\
    \ before you can store data in them.\n\nSwift provides three ways to initialize\
    \ properties. First, you can define an initial value for each property like this:\n\
    \n```\nstruct structureName {\n    var variableName1 : dataType = initialValue\n\
    \    var variableName2 : dataType = initialValue\n}\n```\n\nTo simplify the property\
    \ declaration, a second way is to omit the data type and let Swift infer the data\
    \ type like this:\n\n```\nstruct structureName {\n    var variableName1 = initialValue\n\
    \    var variableName2 = initialValue\n}\n```\n\nWhen you assign an initial value\
    \ to properties, you can create a variable to represent that structure like this:\n\
    \n`var variableName = structureName()`\n\nA third way to initialize structure\
    \ properties is to create an `init` function. This means you must create a list\
    \ of property names and their data types. Then assign values to those properties\
    \ when you create a variable to represent that structure.\n\nFor example, suppose\
    \ you wanted to store information about a person such as his or her name, e-mail\
    \ address, and phone number. Instead of creating three separate variables, you\
    \ could create a single structure like this:\n\n```\nstruct person {\n    var\
    \ name : String\n    var email : String\n    var phone : String\n}\n```\n\nWhen\
    \ you create a variable based on this structure, you need to include initial values\
    \ such as:\n\n`var workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone:\
    \ \"555-1234\")`\n\nCreating a structure involves two parts:\n\n- Create a structure\
    \ with two or more variables (properties)\n- Create a variable to represent that\
    \ structure and assign initial values to those properties\n\n### Storing and Retrieving\
    \ Items from a Structure\n\nA structure lets you define the type of related data\
    \ to store. Then you need to create a variable name to represent that structure.\
    \ Finally, to store in a structure, you need to specify the structure name and\
    \ the variable name separated by a period like this:\n\n`structureVariable.variableName\
    \ = value`\n\nTo retrieve data from a structure, you can assign a variable to\
    \ a structure’s variable like this:\n\n`var variableName = structureVariable.variableName`\n\
    \nTo see how to create a structure, initialize its properties, and add and retrieve\
    \ data, create a new playground by following these steps:\n\nStart Xcode. Choose\
    \ **File** ➤ **New** ➤ **Playground**. (If you see the Xcode welcome screen, you\
    \ can also click on **Get started with a playground**.) Xcode asks for a playground\
    \ name and platform. Click in the **Name** text field and type `StructurePlayground`.\
    \ Click in the **Platform** pop-up menu and choose **OS X**. Xcode asks where\
    \ you want to save your playground file. Click on a folder where you want to save\
    \ your playground file and click the **Create** button. Xcode displays the playground\
    \ file. Edit the code as follows:\n\n```\nimport Cocoa\nstruct pet {\n    var\
    \ name : String = \"\"\n    var age : Int = 0\n}\nvar dog = pet()\ndog.name =\
    \ \"Fido\"\ndog.age = 4\nprint (dog.name)\nprint (dog.age)\nstruct person {\n\
    \    var name : String\n    var email : String\n    var phone : String\n}\nvar\
    \ workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
    )\nlet boss = workers.name\nprint (boss)\nworkers.name = \"Bo\"\nprint (workers.email)\n\
    print (workers.phone)\n```\n\nThe first structure defines initial values for its\
    \ properties so there’s no need for an `init` function. That’s why you can create\
    \ a variable with empty parentheses like this:\n\n`var dog = pet()`\n\nThe second\
    \ structure does not define initial values for its properties, so when you create\
    \ a variable to represent that structure, you must define initial values.\n\n\
    `var workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
    )`\n\nTo store data in a structure, you need to specify the variable name representing\
    \ the structure followed by the property name as shown in Figure [10-5](#A978-1-4842-1233-2_10_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1233-2_10_Fig5_HTML.jpg](A978-1-4842-1233-2_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5. Creating a structure and retrieving data"
  raw: '### Manipulating Sets


    When you have two or more sets, you can perform operations on both of sets that
    creates a third set. Some common set operations include:


    *   union – combines all items from two sets into a new set

    *   subtract – removes the items of a second set from a first set to form a new
    set

    *   intersect – finds the common items in both sets and stores them in a new set

    *   exclusiveOr – finds items contained in one set or another, but not items in
    both sets


    Think of the union command like adding two sets together and the subtract command
    like subtracting one set from another. The union command specifies two set names
    like this:


    `firstSet.union(secondSet)`


    Think of this as equivalent to firstSet + secondSet where all items from both
    sets get combined into a third set.


    The subtract command specifies two set names, but the order makes a difference
    such as:


    `thirdSet.subtract(firstSet)`


    `firstSet.subtract(thirdSet)`


    These two commands can give different results depending on the contents of each
    set. Suppose thirdSet contains {1, 2, 3, 4, 5} and firstSet contains [1, 3, 5,
    7}. The thirdSet.subtract(firstSet) command works like this:


    `{1, 2, 3, 4, 5}  thirdSet`


    `[1, 3, 5, 7}     firstSet`


    Both sets contain 1, 3, and 5 so those numbers get eliminated. Take 1, 3, and
    5 out of thirdSet and you’re left with {2, 4}.


    The firstSet.subtract(thirdSet) command works like this:


    `[1, 3, 5, 7}     firstSet`


    `{1, 2, 3, 4, 5}  thirdSet`


    Both sets contain 1, 3, and 5 so those numbers get eliminated. Take 1, 3, and
    5 out of firstSet and you’re left with {7}.


    The intersect command finds items in common between two sets. The exclusiveOr
    command finds items that are not in both sets. Think of the exclusiveOr command
    as the opposite of the intersect command.


    To see how these four different ways to manipulate sets work, follow these steps:


    Make sure the SetPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var firstSet = Set([1, 3, 5, 7])` `var secondSet = Set([2, 4,
    6, 8])` `var thirdSet = Set ([1, 2, 3, 4, 5])` `firstSet.union(secondSet)` `secondSet.subtract(firstSet)`
    `firstSet.subtract(secondSet)` `firstSet.subtract(thirdSet)` `thirdSet.subtract(firstSet)`
    `firstSet.intersect(thirdSet)` `firstSet.exclusiveOr(thirdSet)`  


    Notice how the subtract command works differently depending on the order you list
    the two sets as shown in Figure [10-4](#A978-1-4842-1233-2_10_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_10_Fig4_HTML.jpg](A978-1-4842-1233-2_10_Fig4_HTML.jpg)


