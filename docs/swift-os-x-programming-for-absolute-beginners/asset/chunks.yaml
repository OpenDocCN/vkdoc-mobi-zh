  trans: "\n### 在协议中定义可选属性和方法\n\n当你创建协议时，你定义的每个属性和方法都必须被任何采用该协议的类所实现。但是，你也可以让一个或多个属性和方法成为可选的，这样它们就可以被忽略。要定义可选属性或方法，你需要使用\
    \ `@objc` 关键字标记协议，并同样使用 `optional` 关键字标记单个属性或方法，例如：\n\n```\n@objc protocol 协议名称\
    \ {\n    var 必需属性 : 数据类型 { get }\n    optional var 可选属性 : 数据类型 { get }\n    optional\
    \ func 可选方法 ()\n}\n```\n\n要采用或遵循此协议，一个类只需要实现任何未被 `optional` 关键字标记的属性或方法。要实现必需的属性或方法，你需要使用\
    \ `@objc` 关键字标记它们，例如：\n\n```\nclass 类名称 : 协议名称 {\n    @objc var 必需属性 : 数据类型 =\
    \ 初始值\n}\n```\n\n然而，如果你想实现一个可选的属性或方法，你可以省略 `@objc` 关键字，像这样：\n\n```\nclass 类名称\
    \ : 协议名称 {\n    @objc var 必需属性 : 数据类型 = 初始值\n    var 可选属性 : 数据类型 = 初始值\n}\n```\n\
    \n要了解如何在协议中创建可选属性和方法，请按照以下步骤操作：\n\n确保 `ExtensionPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
    \n```\nimport Cocoa\n\n@objc protocol 人 {\n    var 姓名 : String { get }\n    optional\
    \ var 年龄 : Int { get }\n    optional func 移动 (X: Int) -> Int\n}\n\nclass 政治家 :\
    \ 人 {\n    @objc var 姓名 : String = \"\"\n}\n\nvar 候选人 = 政治家 ()\n候选人.姓名 = \"约翰·多伊\"\
    \n```\n\n请注意，上面 `人` 协议中唯一必需的项目是属性 `姓名`。这就是为什么 `政治家` 类只需要实现 `姓名` 属性，但必须使用 `@objc`\
    \ 关键字来标记它。\n\n尝试将不同的属性和方法设置为可选，这样你就能看到它们如何影响你在类中实现它们的方式。\n\n### 将继承与协议结合使用\n\n\
    协议甚至可以从其他协议继承属性和方法。这使得一个协议可以从多个协议中继承属性和方法。现在，一个类必须采用或遵循所有协议中定义的所有属性和方法。\n\n要了解如何从多个协议中继承属性和方法，请按照以下步骤操作：\n\
    \n确保 `ExtensionPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\n\
    protocol 第一个 {\n    var 姓名 : String { get }\n}\n\nprotocol 第二个 {\n    var ID :\
    \ Int { get }\n}\n\nprotocol 第三个: 第一个, 第二个 {\n    var 电子邮件 : String { get }\n\
    }\n\nclass 继承协议 : 第三个 {\n    var 姓名 : String = \"\"\n    var ID : Int = 0\n  \
    \  var 电子邮件 : String = \"\"\n}\n\nvar 朋友 = 继承协议()\n朋友.姓名 = \"辛迪·史密斯\"\n朋友.ID =\
    \ 12\n朋友.电子邮件 = \"cindysmith@isp.com\"\n```\n\n在这个例子中，`姓名`、`ID` 和 `电子邮件` 属性定义在三个不同的协议中。`第三个`\
    \ 协议继承了 `第一个` 和 `第二个` 协议。\n\n现在，当某个类采用最后一个协议时，它必须实现所有协议中存储的属性和方法。尽管 `姓名`、`ID`\
    \ 和 `电子邮件` 属性都在不同的协议中声明，但 `继承协议` 类可以访问它们全部，如图 12-9 所示。\n\n![A978-1-4842-1233-2_12_Fig9_HTML.jpg](img/A978-1-4842-1233-2_12_Fig9_HTML.jpg)\n\
    \n**图 12-9.** 从多个协议继承属性和方法\n\n## 使用委托\n\n协议与委托密切相关。委托背后的主要思想是让一个类将责任移交或委托给存储在另一个类中的代码。因此，与其创建新的子类来添加新功能，你可以使用包含额外功能的委托。\n\
    \n使用委托的一种常见方式是允许视图（用户界面）与控制器通信。通常，控制器通过 `IBOutlet` 与视图通信，这些 `IBOutlet` 允许控制器在用户界面上显示数据或从用户界面检索数据。\n\
    \n然而，视图也可以通过协议与控制器通信。协议文件定义了方法，并将实现这些方法的责任委托给控制器。控制器实现的最常见的方法类型包括名称中包含 `will`、`should`\
    \ 和 `did` 的方法，例如 `applicationDidFinishLaunching` 或 `applicationWillTerminate`。\n\
    \n图 12-10 展示了控制器如何通过 `IBOutlet` 与视图通信，以及视图如何通过协议与控制器通信。\n\n![A978-1-4842-1233-2_12_Fig10_HTML.jpg](img/A978-1-4842-1233-2_12_Fig10_HTML.jpg)\n\
    \n**图 12-10.** 视图可以通过协议与控制器通信\n\n要了解视图如何使用委托与控制器通信，请按照以下步骤操作：\n\n在 Xcode 内，选择\
    \ **文件 ➤ 新建 ➤ 项目**。在 OS X 类别下点击 **应用程序**。点击 **Cocoa 应用程序**，然后点击 **下一步** 按钮。Xcode\
    \ 现在会询问产品名称。在 **产品名称** 文本字段中点击并输入 `DelegateProgram`。确保 **语言** 弹出菜单显示 `Swift`，并且没有勾选任何复选框。点击\
    \ **下一步** 按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存储你的项目，然后点击 **创建** 按钮。在项目导航器中点击 `AppDelegate.swift`\
    \ 文件。`AppDelegate.swift` 文件的内容会出现在 Xcode 窗口的中间。查找以下代码行：\n\n```\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n```\n\n这一行定义了一个名为 `AppDelegate` 的类，该类继承了\
    \ `NSObject` 类的属性和方法。此外，它还采用了 `NSApplicationDelegate` 文件定义的任何属性和方法。\n\n点击文档窗口左上角的关闭按钮（红点）将其关闭。Xcode\
    \ 窗口再次出现。请注意，`AppDelegate.swift` 文件包含两个空函数，分别名为 `applicationDidFinishLaunching`\
    \ 和 `applicationWillTerminate`。这些函数由 `NSApplicationDelegate` 协议文件定义，但在 `AppDelegate.swift`\
    \ 文件中实现。按如下方式修改这两个函数：\n\n松开 **Option** 键，然后在弹出窗口底部的 **NSApplicationDelegate Protocol\
    \ Reference** 上点击鼠标。文档窗口出现，显示关于 `NSApplicationDelegate` 协议的详细信息，如图 12-14 所示。注意\
    \ `NSApplicationDelegate` 协议定义的两个方法分别名为 `applicationDidFinishLaunching` 和 `applicationWillTerminate`。\n\
    \n![A978-1-4842-1233-2_12_Fig14_HTML.jpg](img/A978-1-4842-1233-2_12_Fig14_HTML.jpg)\n\
    \n**图 12-14.** 在文档窗口中查看 `NSApplicationDelegate` 协议\n\n点击文档窗口左上角的关闭按钮（红点）将其关闭。按住\
    \ **Option** 键，在 `NSApplicationDelegate` 上点击鼠标。当鼠标指针变为问号时，在 `NSApplicationDelegate`\
    \ 上点击，使弹出窗口出现，如图 12-13 所示。\n\n![A978-1-4842-1233-2_12_Fig13_HTML.jpg](img/A978-1-4842-1233-2_12_Fig13_HTML.jpg)\n\
    \n**图 12-13.**\n"
- fmt: "Option-clicking displays information about the `NSApplication` protocol. Release\
    \ the Option key and click the mouse over `NSObject Class Reference` at the bottom\
    \ of the pop-up window. The Documentation window appears, showing details about\
    \ the different properties and methods available in the `NSObject` class as shown\
    \ in Figure [12-12](#A978-1-4842-1233-2_12_Chapter.html#Fig12). All those properties\
    \ and methods are also available in your `AppDelegate` class as well.\n\n![A978-1-4842-1233-2_12_Fig12_HTML.jpg](A978-1-4842-1233-2_12_Fig12_HTML.jpg)\n\
    \nFigure 12-12.\n\nThe Documentation window displaying information about the `NSObject`\
    \ class. Hold down the Option key and click the mouse over `NSObject`. When the\
    \ mouse pointer turns into a question mark, click over `NSObject` to make a pop-up\
    \ window appear as shown in Figure [12-11](#A978-1-4842-1233-2_12_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1233-2_12_Fig11_HTML.jpg](A978-1-4842-1233-2_12_Fig11_HTML.jpg)\n\
    \nFigure 12-11.\n\nOption-clicking on a class name displays information about\
    \ that class.\n\n```\nfunc applicationDidFinishLaunching(aNotification: NSNotification)\
    \ {\n    print (\"This line should print after the program runs\")\n}\n\nfunc\
    \ applicationWillTerminate(aNotification: NSNotification) {\n    print (\"This\
    \ line should print before your program stops\")\n}\n```\n\nChoose Product ➤ Run.\
    \ Xcode runs your `DelegateProgram` project and displays an empty user interface.\
    \ Choose DelegateProgram ➤ Quit DelegateProgram. The Xcode window appears. The\
    \ Debug Area at the bottom of the Xcode window now displays the text that the\
    \ two `println` commands printed. Notice that the `println` command inside the\
    \ `applicationDidFinishLaunching` function ran first as shown in Figure [12-15](#A978-1-4842-1233-2_12_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1233-2_12_Fig15_HTML.jpg](A978-1-4842-1233-2_12_Fig15_HTML.jpg)\n\
    \nFigure 12-15.\n\nThe methods defined by the `NSApplicationDelegate` file tell\
    \ the program what the user interface is doing.\n\n## Using Inheritance in an\
    \ OS X Program\n\nInheritance lets you create method names that remain the same\
    \ while the underlying code changes between two classes. In this sample program,\
    \ you’ll define one class and then inherit properties and methods for a second\
    \ class. This second class will also override a method and add code to make that\
    \ overridden method behave slightly differently.\n\nTo create the sample program\
    \ that shows how inheritance works, follow these steps:\n\n1. From within Xcode\
    \ choose File ➤ New ➤ Project.\n2. Click Application under the OS X category.\n\
    3. Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4. Click in the Product Name text field and type `InheritProgram`.\n\
    5. Make sure the Language pop-up menu displays Swift and that no check boxes are\
    \ selected.\n6. Click the Next button. Xcode asks where you want to store the\
    \ project.\n7. Choose a folder to store your project and click the Create button.\n\
    8. Click the `MainMenu.xib` file in the Project Navigator.\n9. Click on the `StructureProgram`\
    \ icon to make the window of the user interface appear.\n10. Choose View ➤ Utilities\
    \ ➤ Show Object Library to make the Object Library appear in the bottom right\
    \ corner of the Xcode window.\n11. Drag one Push Button and two Labels on the\
    \ user interface and double-click on the push buttons and labels to change the\
    \ text that appears on them so that it looks similar to Figure [12-16](#A978-1-4842-1233-2_12_Chapter.html#Fig16).\n\
    \n![A978-1-4842-1233-2_12_Fig16_HTML.jpg](A978-1-4842-1233-2_12_Fig16_HTML.jpg)\n\
    \nFigure 12-16.\n\nThe user interface of the `InheritProgram`.\n\nThis user interface\
    \ displays two labels that represent two different objects. Object 1 only contains\
    \ one property and a method to alter that property. Object 2 inherits from Object\
    \ 1 and contains one additional property along with overriding the method defined\
    \ in Object 1.\n\nWhen you click the Change button, both labels will change their\
    \ appearance based on the properties and method defined by each object. To connect\
    \ your user interface to your Swift code, follow these steps:\n\n1. With your\
    \ user interface still visible in the Xcode window, choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor. The `AppDelegate.swift` file appears next to the user\
    \ interface.\n2. Move the mouse over the Change button, hold down the Control\
    \ key, and drag just above the last curly bracket at the bottom of the `AppDelegate.swift`\
    \ file.\n3. Release the mouse and the Control key. A pop-up window appears.\n\
    4. Click in the Connection pop-up menu and choose Action.\n5. Click in the Name\
    \ text field and type `changeButton`.\n6. Click in the Type pop-up menu and choose\
    \ `NSButton`. Then click the Connect button. Xcode creates an empty `IBAction`\
    \ method called `changeButton`.\n7. Move the mouse over the Object 1 label, hold\
    \ down the Control key, and drag below the `@IBOutlet` line in the `AppDelegate.swift`\
    \ file.\n8. Release the mouse and the Control key. A pop-up window appears.\n\
    9. Click in the Name text field and type `ObjectOne` and click the Connect button.\n\
    10. Move the mouse over the Object 2 label, hold down the Control key, and drag\
    \ below the `@IBOutlet` line in the `AppDelegate.swift` file.\n11. Release the\
    \ mouse and the Control key. A pop-up window appears.\n12. Click in the Name text\
    \ field and type `ObjectTwo` and click the Connect button. You should now have\
    \ the following `IBOutlets` that represent all the labels on your user interface:\n\
    \n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var ObjectOne: NSTextField!\n\
    @IBOutlet weak var ObjectTwo: NSTextField!\n```\n\nType the following directly\
    \ underneath the `IBOutlet` lines of code:\n\n```\nclass one {\n    var myColor\
    \ : NSColor = NSColor.blackColor ()\n    func change () {\n        myColor = NSColor.redColor()\n\
    \    }\n}\n\nclass two : one {\n    var myBackground : NSColor = NSColor.whiteColor()\n\
    \    override func change() {\n        myColor = NSColor.blueColor()\n       \
    \ myBackground = NSColor.greenColor()\n    }\n}\n\nvar ThingOne = one ()\nvar\
    \ ThingTwo = two()\n```\n\nModify the `IBAction` `changeButton` method as follows:\n\
    \n```\n@IBAction func changeButton(sender: NSButton) {\n```"
