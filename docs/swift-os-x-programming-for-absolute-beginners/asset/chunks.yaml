    you get a warning. Clicking on that warning icon in the left margin displays an
    error message as shown in Figure [5-5](#A978-1-4842-1233-2_5_Chapter.html#Fig5).


    Modify the Swift code in the playground file as follows:


    ![A978-1-4842-1233-2_5_Fig5_HTML.jpg](A978-1-4842-1233-2_5_Fig5_HTML.jpg)


    Figure 5-5.


