    Make sure your StoryProgram project is loaded in Xcode and click on the Main.storyboard
    file in the Project Navigator pane.   Click on the segue that you want to modify.
    Xcode highlights your chosen segue.   Choose View ➤ Utilities ➤ Show Attributes
