- fmt: "## Using String Functions\n\nJust as the Cocoa framework provides dozens of\
    \ math functions, so does it also contain a handful of string manipulation functions.\
    \ Some common string functions include:\n\n*   `+` -- Concatenates or combines\
    \ two strings together such as \"Hello\" + \"world\", which creates the string\
    \ \"Hello world\"\n*   `capitalizedString` – Capitalizes the first letter of each\
    \ word\n*   `lowercaseString` – Converts an entire string to lowercase letters\n\
    *   `uppercaseString` – Converts an entire string to uppercase letters\n*   `doubleValue`\
    \ – Converts a string holding a numeric value to a `Double` data type\n*   `isEmpty`\
    \ – Checks if a string is empty or has at least one character\n*   `hasPrefix`\
    \ – Checks if certain text appears at the beginning of a string\n*   `hasSuffix`\
    \ – Checks if certain text appears at the end of a string\n\nWhen using the `+`\
    \ operator to append or combine strings, be careful of spaces. If you omit spaces,\
    \ then you might get unwanted results. For example, \"Hello\" + \"world\" would\
    \ create the string \"Helloworld\" without any spaces. That's why you need to\
    \ make sure you put a space in between words such as \"Hello\" + \"world\" to\
    \ create \"Hello world.\"\n\nTo see how these different string functions work,\
    \ follow these steps:\n\nMake sure your `MathPlayground` is loaded in Xcode. Edit\
    \ the code as follows:\n\n```\nimport Cocoa\nvar text : String = \"Hello everyone!\"\
    \nprint (text.capitalizedString)\nprint (text.lowercaseString)\nprint (text.uppercaseString)\n\
    print (text.isEmpty)\nprint (text.hasPrefix (\"Hello\"))\nprint (text.hasSuffix\
    \ (\"world\"))\nvar dog : Double\ndog = \"23.79\".doubleValue\n```\n\nNotice how\
    \ each type of string function works differently as shown in Figure [6-9](#A978-1-4842-1233-2_6_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_6_Fig9_HTML.jpg](A978-1-4842-1233-2_6_Fig9_HTML.jpg)\n\n\
    Figure 6-9.\n\nSeeing how different string functions work\n\n## Creating Functions\n\
    \nUp until now, all of the functions you've been using to manipulate numbers or\
    \ strings have been created for you in the Cocoa framework. The basic idea behind\
    \ a function is that you can use it without knowing how it works. All you need\
    \ to know is the function name (to call it and make it run) along with any data\
    \ you might need to pass to the function so it can do something with it (such\
    \ as capitalizing all the text in a string).\n\nYou should always strive to use\
    \ the built-in functions of the Cocoa framework as much as possible because this\
    \ lets you create programs by using pretested, reliable code. Of course, the Cocoa\
    \ framework can't provide every possible function that you may need so you'll\
    \ eventually need to create your own functions.\n\nThe purpose of functions is\
    \ to simplify code. Rather than include multiple lines of code to calculate the\
    \ square root of a number, it's much simpler to hide that code in a function and\
    \ just run or call that function by name. Functions basically replace multiple\
    \ lines of code with a single line of code known as a function call.\n\nThe three\
    \ types of functions you can create are:\n\n*   Functions that do the same thing\
    \ without accepting any data\n*   Functions that accept data\n*   Functions that\
    \ return values\n\nRemember, functions that accept data can also return values.\n\
    \n### Simple Functions Without Parameters or Return Values\n\nThe simplest function\
    \ just consists of a function name such as this:\n\n```\nfunc functionName ()\
    \ {\n\n}\n```\n\nBy inserting one or more lines of code in between the curly brackets,\
    \ you can make the function do something such as:\n\n```\nfunc simpleFunction\
    \ () {\n    print (\"Hello\")\n    print (\"there\")\n}\n```\n\nTo run the code\
    \ inside a function, you just need to call that function by name such as:\n\n\
    ```\nsimpleFunction()\n```\n\nTo see how this function works, follow these steps:\n\
    \nStart Xcode. Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,\
    \ you can also click on Get started with a playground.) Xcode asks for a playground\
    \ name and platform. Click in the Name text field and type `FunctionPlayground`.\
    \ Click in the Platform pop-up menu and choose OS X. Xcode asks where you want\
    \ to save your playground file. Click on a folder where you want to save your\
    \ playground file and click the Create button. Xcode displays the playground file.\
    \ Edit the code as follows:\n\n```\nimport Cocoa\nfunc simpleFunction () {\n \
    \   print (\"Hello\")\n    print (\"there\")\n}\nvar i = 1\nwhile i <= 5 {\n \
    \   simpleFunction()\n    i = i + 1\n}\n```\n\nThis code defines a simple function\
    \ that does nothing but print \"Hello\" and \"there.\" Then it uses a loop (which\
    \ you'll learn about later) that runs five times and runs or calls the `simpleFunction`\
    \ five times as shown in Figure [6-10](#A978-1-4842-1233-2_6_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1233-2_6_Fig10_HTML.jpg](A978-1-4842-1233-2_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10.\n\nDefining and calling a simple function\n\nWithout a function,\
    \ the same Swift code might look like this:\n\n```\nimport Cocoa\nvar i = 1\n\
    while i <= 5 {\n    print (\"Hello\")\n    print (\"there\")\n    i = i + 1\n\
    }\n```\n\nWhile this looks simpler, the problem is if you need to reuse this code\
    \ in multiple parts of a program. That means you'd need to copy and paste the\
    \ same code in multiple locations. Now if you need to change the code, you'll\
    \ need to make sure you change that code throughout your program. Miss one copy\
    \ of your code, and your program may no longer work right.\n\nBy storing commonly\
    \ used code in a function, you store it in one place but can use it in multiple\
    \ parts of your program. Now if you need to change the code, you just change it\
    \ in one place and those changes automatically affect multiple parts of your program\
    \ where you call that function."
  raw: '## Using String Functions


    Just as the Cocoa framework provides dozens of math functions, so does it also
    contain a handful of string manipulation functions. Some common string functions
    include:


    *   + -- Concatenates or combines two strings together such as “Hello” + “world,”
    which creates the string “Hello world”

    *   capitalizedString – Capitalizes the first letter of each word

    *   lowercaseString – Converts an entire string to lowercase letters

    *   uppercaseString – Converts an entire string to uppercase letters

    *   doubleValue – Converts a string holding a numeric value to a Double data type

    *   isEmpty – Checks if a string is empty or has at least one character

    *   hasPrefix – Checks if certain text appears at the beginning of a string

    *   hasSuffix – Checks if certain text appears at the end of a string


    When using the + operator to append or combine strings, be careful of spaces.
    If you omit spaces, then you might get unwanted results. For example, “Hello”
    + “world” would create the string “Helloworld” without any spaces. That’s why
    you need to make sure you put a space in between words such as “Hello” + “world”
    to create “Hello world.”


    To see how these different string functions work, follow these steps:


    Make sure your MathPlayground is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var text : String = "Hello everyone!"` `print (text.capitalizedString)`
    `print (text.lowercaseString)` `print (text.uppercaseString)` `print (text.isEmpty)`
    `print (text.hasPrefix ("Hello"))` `print (text.hasSuffix ("world"))` `var dog
    : Double` `dog = "23.79".doubleValue`  


    Notice how each type of string function works differently as shown in Figure [6-9](#A978-1-4842-1233-2_6_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_6_Fig9_HTML.jpg](A978-1-4842-1233-2_6_Fig9_HTML.jpg)


    Figure 6-9.


    Seeing how different string functions work


    ## Creating Functions


    Up until now, all of the functions you’ve been using to manipulate numbers or
    strings have been created for you in the Cocoa framework. The basic idea behind
    a function is that you can use it without knowing how it works. All you need to
    know is the function name (to call it and make it run) along with any data you
    might need to pass to the function so it can do something with it (such as capitalizing
    all the text in a string).


    You should always strive to use the built-in functions of the Cocoa framework
    as much as possible because this lets you create programs by using pretested,
    reliable code. Of course, the Cocoa framework can’t provide every possible function
    that you may need so you’ll eventually need to create your own functions.


    The purpose of functions is to simplify code. Rather than include multiple lines
    of code to calculate the square root of a number, it’s much simpler to hide that
    code in a function and just run or call that function by name. Functions basically
    replace multiple lines of code with a single line of code known as a function
    call.


    The three types of functions you can create are:


    *   Functions that do the same thing without accepting any data

    *   Functions that accept data

    *   Functions that return values


    Remember, functions that accept data can also return values.


    ### Simple Functions Without Parameters or Return Values


    The simplest function just consists of a function name such as this:


    `func functionName () {`


    `}`


    By inserting one or more lines of code in between the curly brackets, you can
    make the function do something such as:


    `func simpleFunction () {`


        `print ("Hello")`


        `print ("there")`


    `}`


    To run the code inside a function, you just need to call that function by name
    such as:


    `simpleFunction()`


    To see how this function works, follow these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type FunctionPlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file.
      Edit the code as follows: `import Cocoa` `func simpleFunction () {`     `print
    ("Hello")`     `print ("there")` `}` `var i = 1` `while i <= 5 {`     `simpleFunction()`
        `i = i + 1` `}`  


    This code defines a simple function that does nothing but print “Hello” and “there.”
    Then it uses a loop (which you’ll learn about later) that runs five times and
    runs or calls the simpleFunction five times as shown in Figure [6-10](#A978-1-4842-1233-2_6_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_6_Fig10_HTML.jpg](A978-1-4842-1233-2_6_Fig10_HTML.jpg)


    Figure 6-10.


    Defining and calling a simple function


    Without a function, the same Swift code might look like this:


    `import Cocoa`


    `var i = 1`


    `while i <= 5 {`


        `print ("Hello")`


        `print ("there")`


            `i = i + 1`


    `}`


    While this looks simpler, the problem is if you need to reuse this code in multiple
    parts of a program. That means you’d need to copy and paste the same code in multiple
    locations. Now if you need to change the code, you’ll need to make sure you change
    that code throughout your program. Miss one copy of your code, and your program
    may no longer work right.


    By storing commonly used code in a function, you store it in one place but can
    use it in multiple parts of your program. Now if you need to change the code,
    you just change it in one place and those changes automatically affect multiple
    parts of your program where you call that function.'
  trans: "\n## 使用字符串函数\n\n正如 Cocoa 框架提供了数十种数学函数一样，它也包含了一些字符串操作函数。一些常见的字符串函数包括：\n\n\
    *   `+` —— 将两个字符串连接或组合在一起，例如 \"Hello\" + \"world\"，会生成字符串 \"Hello world\"\n* \
    \  `capitalizedString` —— 将每个单词的首字母大写\n*   `lowercaseString` —— 将整个字符串转换为小写字母\n\
    *   `uppercaseString` —— 将整个字符串转换为大写字母\n*   `doubleValue` —— 将包含数值的字符串转换为 `Double`\
    \ 数据类型\n*   `isEmpty` —— 检查字符串是否为空或至少有一个字符\n*   `hasPrefix` —— 检查特定文本是否出现在字符串的开头\n\
    *   `hasSuffix` —— 检查特定文本是否出现在字符串的结尾\n\n使用 `+` 运算符追加或组合字符串时，要注意空格。如果省略空格，可能会得到不想要的结果。例如，\"\
    Hello\" + \"world\" 会生成没有任何空格的字符串 \"Helloworld\"。这就是为什么你需要确保在单词之间加上空格，例如 \"Hello\"\
    \ + \"world\" 才能生成 \"Hello world\"。\n\n要了解这些不同的字符串函数如何工作，请遵循以下步骤：\n\n确保你的 `MathPlayground`\
    \ 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar text : String = \"Hello everyone!\"\
    \nprint (text.capitalizedString)\nprint (text.lowercaseString)\nprint (text.uppercaseString)\n\
    print (text.isEmpty)\nprint (text.hasPrefix (\"Hello\"))\nprint (text.hasSuffix\
    \ (\"world\"))\nvar dog : Double\ndog = \"23.79\".doubleValue\n```\n\n注意每种字符串类型函数的工作方式不同，如图\
    \ 6-9 所示。\n\n![A978-1-4842-1233-2_6_Fig9_HTML.jpg](img/A978-1-4842-1233-2_6_Fig9_HTML.jpg)\n\
    \n图 6-9.\n\n观察不同字符串函数的工作方式\n\n## 创建函数\n\n到目前为止，你用来操作数字或字符串的所有函数，都是 Cocoa 框架为你创建好的。函数的基本思想是，你无需了解其工作原理即可使用它。你只需要知道函数名（用来调用并执行它）以及可能需要传递给函数的任何数据，以便它能够利用这些数据执行操作（例如，将字符串中的所有文本转换为大写）。\n\
    \n你应该始终尽可能多地使用 Cocoa 框架的内置函数，因为这能让你使用经过预测试、可靠的代码来创建程序。当然，Cocoa 框架无法提供你可能需要的所有函数，所以你最终需要创建自己的函数。\n\
    \n函数的目的是简化代码。与其编写多行代码来计算一个数的平方根，不如将该代码隐藏在一个函数中，并通过名称调用或执行该函数，这样要简单得多。函数基本上是用单行代码（即函数调用）来替代多行代码。\n\
    \n你可以创建的三种函数类型是：\n\n*   不接受任何数据且执行相同操作的函数\n*   接受数据的函数\n*   返回值的函数\n\n请记住，接受数据的函数也可以返回值。\n\
    \n### 不带参数或返回值的简单函数\n\n最简单的函数只包含一个函数名，如下所示：\n\n```\nfunc functionName () {\n\n\
    }\n```\n\n通过在花括号之间插入一行或多行代码，你可以让函数执行某些操作，例如：\n\n```\nfunc simpleFunction () {\n\
    \    print (\"Hello\")\n    print (\"there\")\n}\n```\n\n要运行函数内的代码，你只需按名称调用该函数，例如：\n\
    \n```\nsimpleFunction()\n```\n\n要了解此函数的工作方式，请遵循以下步骤：\n\n启动 Xcode。选择 文件 ➤ 新建 ➤\
    \ Playground。（如果你看到 Xcode 欢迎屏幕，也可以点击“开始使用 playground”）。Xcode 会要求输入 playground\
    \ 的名称和平台。点击“名称”文本框，输入 `FunctionPlayground`。点击“平台”弹出菜单，选择 OS X。Xcode 会询问你想将 playground\
    \ 文件保存在哪里。点击一个文件夹来保存你的 playground 文件，然后点击“创建”按钮。Xcode 会显示该 playground 文件。按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nfunc simpleFunction () {\n    print (\"Hello\")\n    print\
    \ (\"there\")\n}\nvar i = 1\nwhile i <= 5 {\n    simpleFunction()\n    i = i +\
    \ 1\n}\n```\n\n这段代码定义了一个简单的函数，该函数只打印 \"Hello\" 和 \"there\"。然后它使用一个循环（稍后你会学到）运行五次，并运行或调用\
    \ `simpleFunction` 五次，如图 6-10 所示。\n\n![A978-1-4842-1233-2_6_Fig10_HTML.jpg](img/A978-1-4842-1233-2_6_Fig10_HTML.jpg)\n\
    \n图 6-10.\n\n定义并调用一个简单的函数\n\n如果不使用函数，同样的 Swift 代码可能如下所示：\n\n```\nimport Cocoa\n\
    var i = 1\nwhile i <= 5 {\n    print (\"Hello\")\n    print (\"there\")\n    i\
    \ = i + 1\n}\n```\n\n虽然这看起来更简单，但问题在于，如果你需要在程序的多个部分重用这段代码。这意味着你需要在多个位置复制粘贴相同的代码。现在，如果你需要修改这段代码，你必须确保在整个程序中修改它。如果遗漏了某一个代码副本，你的程序可能就无法正常运行了。\n\
    \n通过将常用代码存储在函数中，你将其存储在一个地方，但可以在程序的多个部分使用它。现在，如果你需要修改代码，只需在一个地方更改，这些更改会自动影响程序中调用该函数的多个部分。\n"
- fmt: "### Simple Functions With Parameters\n\nSimple functions without parameters\
    \ can only do the same thing over and over again. Parameters let functions accept\
    \ data and use that data to calculate a different result. To define a parameter,\
    \ you just need to define a descriptive name and its data type, much like declaring\
    \ a variable but without using the `var` keyword such as:\n\n```\nfunc functionName\
    \ (parameter: dataType) {\n\n}\n```\n\nTo call a function that defines a parameter,\
    \ you just need to type the function name followed by the correct number of parameters\
    \ such as:\n\n```\nfunctionName (parameter)\n```\n\nWhen calling functions with\
    \ parameters, you need to make sure you pass the correct number of parameters\
    \ and each parameter is of the correct data type. So if you had a function that\
    \ accepted one string parameter like this:\n\n```\nfunc parameterFunction (name\
    \ : String) {\n\n}\n```\n\nYou could call this function by its name and with one\
    \ (and only one) string inside parentheses like this:\n\n```\nparameterFunction(\"\
    Oscar\")\n```\n\nThere are three ways a function call can fail:\n\n- If you type\
    \ the function name wrong\n- If you don’t list or pass the correct number of parameters\n\
    - If you don’t list or pass parameters of the correct data type\n\nIn this example,\
    \ the `parameterFunction` expects one parameter that must be a `String` data type.\
    \ If you give `parameterFunction` zero or two parameters, it won’t work. Likewise,\
    \ if you give `parameterFunction` one parameter but it’s not a `String` data type,\
    \ it also won’t work.\n\nTo see how a function with parameters works, follow these\
    \ steps:\n\nMake sure your `FunctionPlayground` file is loaded in Xcode. Edit\
    \ the code as follows:\n\n```\nimport Cocoa\nfunc parameterFunction (name : String)\
    \ {\n    print (\"Hello, \" + name)\n}\nparameterFunction(\"Oscar\")\n```\n\n\
    This Swift program calls `parameterFunction` and passes it one string parameter\
    \ (`\"Oscar\"`). When the `parameterFunction` receives this parameter (`\"Oscar\"\
    `), it stores it in its `name` variable. Then it prints \"Hello, Oscar\" as shown\
    \ in Figure [6-11](#A978-1-4842-1233-2_6_Chapter.html#Fig11).\n\n![A978-1-4842-1233-2_6_Fig11_HTML.jpg](A978-1-4842-1233-2_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11. Passing a string parameter to a function\n\nAlthough this example\
    \ uses one parameter, there’s no limit to the number of parameters a function\
    \ can accept. To accept more parameters, you would just need to define additional\
    \ variable names and data types like this:\n\n```\nfunc functionName (parameter:\
    \ dataType, parameter2 : dataType) {\n\n}\n```\n\nEach parameter can accept different\
    \ data types so you can pass a function a string and an integer such as:\n\n```\n\
    func functionName (parameter: String, parameter2 : Int) {\n\n}\n```\n\nTo call\
    \ this function, you would specify the function name and its two parameters of\
    \ the proper data type:\n\n```\nfunctionName (\"Hello\", 48)\n```\n\nIf you pass\
    \ the parameters in the wrong order, the function call won’t work such as:\n\n\
    ```\nfunctionName (48, \"Hello\")\n```\n\nWhen passing parameters, always make\
    \ sure you pass the correct number of parameters and the proper data types in\
    \ the right order as well.\n\n### Functions With Parameters That Return Values\n\
    \nThe most versatile functions are those that use parameters to accept data and\
    \ then return a value based on that data. The basic structure of a function that\
    \ returns a value looks like this:\n\n```\nfunc functionName (parameter: ParameterDataType)\
    \ -> DataType {\n        return someValue\n}\n```\n\nThe function name is any\
    \ arbitrary name you want to use. Ideally, make the function name descriptive\
    \ of its purpose.\n\nThe parameter is much like declaring a variable by specifying\
    \ the parameter name and its data type that it can accept. Parameters are optional\
    \ but functions without parameters aren’t generally useful since they perform\
    \ the same tasks over and over.\n\nThe `->` symbol defines the data type that\
    \ the function name represents.\n\nThe `return` keyword must be followed by a\
    \ value or commands that calculate a value. This value must be of the same data\
    \ type that follows the `->` symbols.\n\nSuppose you had a function defined as\
    \ follows:\n\n```\nfunc salesTax (amount: Double) -> Double {\n    let currentTax\
    \ = 0.075 // 7.5% sales tax\n    return amount * currentTax\n}\n```\n\nThis function\
    \ name is `salesTax`, it accepts one parameter called `amount`, which can store\
    \ a `Double` data type. When it calculates a result, that result is also a `Double`\
    \ data type as identified by `Double` after the `->` symbol. The `return` keyword\
    \ identifies how the function calculates a value to return.\n\nTo see how this\
    \ function works, follow these steps:\n\nMake sure your `FunctionPlayground` file\
    \ is loaded in Xcode. Edit the code as follows:\n\n```\nimport Cocoa\nfunc salesTax\
    \ (amount: Double) -> Double {\n    let currentTax = 0.075\n    return amount\
    \ * currentTax\n}\nlet purchasePrice = 59.95\nvar total : Double\ntotal = purchasePrice\
    \ + salesTax(purchasePrice)\nprint (\"Including sales tax, your total is =  \\\
    (total)\")\n```\n\nNotice that this code calls the `salesTax` function by passing\
    \ it the value stored in `purchasePrice`. When you type this code in playground,\
    \ you’ll see the results displayed in the right margin as shown in Figure [6-12](#A978-1-4842-1233-2_6_Chapter.html#Fig12).\
    \ Try changing the values stored in `purchasePrice` and `currentTax` to see how\
    \ it affects the results that this Swift code calculates.\n\n![A978-1-4842-1233-2_6_Fig12_HTML.jpg](A978-1-4842-1233-2_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12. Defining and calling a function\n\nWhen a function returns a value,\
    \ make sure you specify:\n\n- The data type the function represents (`-> dataType`)\n\
    - The value the function name represents (`return`)\n\nWhen calling a function\
    \ that returns a value, make sure the data types match. In the above example,\
    \ the `salesTax` function returns a `Double` data type so in the Swift code, this\
    \ `salesTax` function value gets stored in the `total` variable, which is also\
    \ a `Double` data type.\n\n### Defining External Parameter Names\n\nWhen a function\
    \ uses one or more parameters to accept data, you just need to define the parameter\
    \ name followed by its data type such as:\n\n```\nfunc storeContact (name: String,\
    \ age : Int) {\n\n}\n```\n\nTo call this function, you just have to use the function\
    \ name and give it a string and integer such as:\n\n```\nstoreContact (\"Fred\"\
    , 58)\n```\n\nThe problem when passing parameters is that you can only see the\
    \ data you’re passing but may not fully understand what it represents. To solve\
    \ this problem, Swift lets you create external parameter names that force you\
    \ to identify the data you’re passing to a function.\n\nOne way to do this is\
    \ to create an external parameter name such as:\n\n```\nfunc functionName (externalName\
    \ internalName: dataType) {\n\n}\n```\n\nWhen you define both an external and\
    \ internal name for a parameter, you use the external parameter name when passing\
    \ parameters to a function, but you use the internal parameter name within the\
    \ function itself. To see how to use external and internal parameter names, follow\
    \ these steps:\n\nMake sure your `FunctionPlayground` file is loaded in Xcode.\
    \ Edit the code as follows:\n\n```\nimport Cocoa\nfunc greeting (person name :\
    \ String) -> String {\n    return \"Hello \" + name\n}\nvar message : String\n\
    message = greeting (person: \"Bob\")\nprint (message)\n```\n\nThis function has\
    \ an external parameter name of `\"person\"` and an internal parameter name of\
    \ `\"name\"`. To call this function, you must include the external parameter name\
    \ `\"person\"`:\n\n```\ngreeting (person: \"Bob\")\n```\n\nExternal parameter\
    \ names simply make calling a function and passing parameters more understandable."
  raw: '### Simple Functions With Parameters


    Simple functions without parameters can only do the same thing over and over again.
    Parameters let functions accept data and use that data to calculate a different
    result. To define a parameter, you just need to define a descriptive name and
    its data type, much like declaring a variable but without using the “var” keyword
    such as:


    `func functionName (parameter: dataType) {`


    `}`


    To call a function that defines a parameter, you just need to type the function
    name followed by the correct number of parameters such as:


    `functionName (parameter)`


    When calling functions with parameters, you need to make sure you pass the correct
    number of parameters and each parameter is of the correct data type. So if you
    had a function that accepted a one string parameter like this:


    `func parameterFunction (name : String) {`


    `}`


    You could call this parameter by its name and with one (and only one) string inside
    parentheses like this:


    `parameterFunction("Oscar")`


    There are three ways a function call can fail:


    *   If you type the function name wrong

    *   If you don’t list or pass the correct number of parameters

    *   If you don’t list or pass parameters of the correct data type


    In this example, the parameterFunction expects one parameter that must be a String
    data type. If you give parameterFunction zero or two parameters, it won’t work.
    Likewise, if you give parameterFunction one parameter but it’s not a String data
    type, it also won’t work.


    To see how a function with parameters works, follow these steps:


    Make sure your FunctionPlayground file is loaded in Xcode   Edit the code as follows:
    `import Cocoa` `func parameterFunction (name : String) {`     `print ("Hello,
    " + name)` `}` `parameterFunction("Oscar")`  


    This Swift program calls parameterFunction and passes it one string parameter
    (“Oscar”). When the parameterFunction receives this parameter (“Oscar”), it stores
    it in its name variable. Then it prints “Hello, Oscar” as shown in Figure [6-11](#A978-1-4842-1233-2_6_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_6_Fig11_HTML.jpg](A978-1-4842-1233-2_6_Fig11_HTML.jpg)


    Figure 6-11.


    Passing a string parameter to a function


    Although this example uses one parameter, there’s no limit to the number of parameters
    a function can accept. To accept more parameters, you would just need to define
    additional variable names and data types like this:


    `func functionName (parameter: dataType, parameter2 : dataType) {`


    `}`


    Each parameter can accept different data types so you can pass a function a string
    and an integer such as:


    `func functionName (parameter: String, parameter2 : Int) {`


    `}`


    To call this function, you would specify the function name and its two parameters
    of the proper data type:


    `functionName ("Hello", 48)`


    If you pass the parameters in the wrong order, the function call won’t work such
    as:


    `functionName (48, "Hello")`


    When passing parameters, always make sure you pass the correct number of parameters
    and the proper data types in the right order as well.


    ### Functions With Parameters That Return Values


    The most versatile functions are those that use parameters to accept data and
    then return a value based on that data. The basic structure of a function that
    returns a value looks like this:


    `func functionName (parameter: ParameterDataType) -> DataType {`


            `return someValue`


    `}`


    The function name is any arbitrary name you want to use. Ideally, make the function
    name descriptive of its purpose.


    The parameter is much like declaring a variable by specifying the parameter name
    and its data type that it can accept. Parameters are optional but functions without
    parameters aren’t generally useful since they perform the same tasks over and
    over.


    The -> symbol defines the data type that the function name represents.


    The return keyword must be followed by a value or commands that calculate a value.
    This value must be of the same data type that follows the -> symbols.


    Suppose you had a function defined as follows:


    `func salesTax (amount: Double) -> Double {`


        `let currentTax = 0.075 // 7.5% sales tax`


        `return amount * currentTax`


    `}`


    This function name is salesTax, it accepts one parameter called amount, which
    can store a Double data type. When it calculates a result, that result is also
    a Double data type as identified by Double after the -> symbol. The return keyword
    identifies how the function calculates a value to return.


    To see how this function works, follow these steps:


    Make sure your FunctionPlayground file is loaded in Xcode.   Edit the code as
    follows: `import Cocoa` `func salesTax (amount: Double) -> Double {`     `let
    currentTax = 0.075`     `return amount * currentTax` `}` `let purchasePrice =
    59.95` `var total : Double` `total = purchasePrice + salesTax(purchasePrice)`
    `print ("Including sales tax, your total is =  \(total)")`  


    Notice that this code calls the salesTax function by passing it the value stored
    in purchasePrice. When you type this code in playground, you’ll see the results
    displayed in the right margin as shown in Figure [6-12](#A978-1-4842-1233-2_6_Chapter.html#Fig12).
    Try changing the values stored in purchasePrice and currentTax to see how it affects
    the results that this Swift code calculates.


    ![A978-1-4842-1233-2_6_Fig12_HTML.jpg](A978-1-4842-1233-2_6_Fig12_HTML.jpg)


    Figure 6-12.


    Defining and calling a function


    When a function returns a value, make sure you specify:


    *   The data type the function represents (-> dataType)

    *   The value the function name represents (return)


    When calling a function that returns a value, make sure the data types match.
    In the above example, the salesTax function returns a Double data type so in the
    Swift code, this salesTax function value gets stored in the “total” variable,
    which is also a Double data type.


    ### Defining External Parameter Names


    When a function uses one or more parameters to accept data, you just need to define
    the parameter name followed by its data type such as:


    `func storeContact (name: String, age : Int) {`


    `}`


    To call this function, you just have to use the function name and give it a string
    and integer such as:


    `storeContact ("Fred", 58)`


    The problem when passing parameters is that you can only see the data you’re passing
    but may not fully understand what it represents. To solve this problem, Swift
    lets you create external parameter names that force you to identify the data you’re
    passing to a function.


    One way to do this is to create an external parameter name such as:


    `func functionName (externalName internalName: dataType) {`


    `}`


    When you define both an external and internal name for a parameter, you use the
    external parameter name when passing parameters to a function, but you use the
    internal parameter name within the function itself. To see how to use external
    and internal parameter names, follow these steps:


    Make sure your FunctionPlayground file is loaded in Xcode.   Edit the code as
    follows: `import Cocoa` `func greeting (person name : String) -> String {`     `return
    "Hello " + name` `}` `var message : String` `message = greeting (person: "Bob")`
    `print (message)`  


    This function has an external parameter name of “person” and an internal parameter
    name of “name.” To call this function, you must include the external parameter
    name “person”:


    `greeting (person: "Bob")`


    External parameter names simply make calling a function and passing parameters
    more understandable.'
  trans: "\n### 带参数的简单函数\n\n不带参数的简单函数只能重复执行相同的操作。而参数允许函数接收数据，并利用这些数据计算出不同的结果。要定义一个参数，你只需定义一个描述性的名称及其数据类型，这很像声明一个变量，但不需要使用\
    \ `var` 关键字，例如：\n\n```\nfunc functionName (parameter: dataType) {\n\n}\n```\n\n\
    要调用一个定义了参数的函数，你只需输入函数名，后跟正确数量的参数，例如：\n\n```\nfunctionName (parameter)\n```\n\n\
    调用带参数的函数时，需要确保传递了正确数量的参数，并且每个参数的数据类型都是正确的。因此，如果你有一个接受一个字符串参数的函数，像这样：\n\n```\n\
    func parameterFunction (name : String) {\n\n}\n```\n\n你可以通过函数名并传入一个（且仅一个）字符串来调用它，像这样：\n\
    \n```\nparameterFunction(\"Oscar\")\n```\n\n函数调用失败的方式有三种：\n\n- 如果你把函数名写错了\n- 如果你没有列出或传递正确数量的参数\n\
    - 如果你没有列出或传递正确数据类型的参数\n\n在这个例子中，`parameterFunction` 期望接收一个参数，且该参数必须是 `String`\
    \ 数据类型。如果你给 `parameterFunction` 传递零个或两个参数，它都将无法工作。同样，如果你给 `parameterFunction`\
    \ 传递一个参数，但其数据类型不是 `String`，它也无法工作。\n\n要了解带参数的函数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground`\
    \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc parameterFunction (name\
    \ : String) {\n    print (\"Hello, \" + name)\n}\nparameterFunction(\"Oscar\"\
    )\n```\n\n这个 Swift 程序调用了 `parameterFunction`，并向其传递了一个字符串参数 (`\"Oscar\"`)。当 `parameterFunction`\
    \ 接收到这个参数 (`\"Oscar\"`) 时，会将其存储在其 `name` 变量中。然后它会打印出 \"Hello, Oscar\"，如图 6-11\
    \ 所示。\n\n![A978-1-4842-1233-2_6_Fig11_HTML.jpg](img/A978-1-4842-1233-2_6_Fig11_HTML.jpg)\n\
    \n图 6-11. 向函数传递一个字符串参数\n\n尽管这个示例只使用了一个参数，但一个函数可以接受的参数数量没有限制。要接受更多参数，你只需定义额外的变量名称和数据类型，像这样：\n\
    \n```\nfunc functionName (parameter: dataType, parameter2 : dataType) {\n\n}\n\
    ```\n\n每个参数可以接受不同的数据类型，因此你可以向函数传递一个字符串和一个整数，例如：\n\n```\nfunc functionName (parameter:\
    \ String, parameter2 : Int) {\n\n}\n```\n\n要调用这个函数，你需要指定函数名以及它的两个具有正确数据类型的参数：\n\
    \n```\nfunctionName (\"Hello\", 48)\n```\n\n如果你以错误的顺序传递参数，函数调用将无法工作，例如：\n\n```\n\
    functionName (48, \"Hello\")\n```\n\n传递参数时，始终要确保传递正确数量的参数、正确的数据类型以及正确的顺序。\n\n\
    ### 带参数并返回值的函数\n\n最通用的函数是那些使用参数接收数据，然后根据这些数据返回一个值的函数。一个返回值函数的基本结构如下：\n\n```\n\
    func functionName (parameter: ParameterDataType) -> DataType {\n        return\
    \ someValue\n}\n```\n\n函数名可以是您想用的任意名称。理想情况下，函数名应能描述其用途。\n\n参数很像声明一个变量，通过指定参数名称及其可以接受的数据类型。参数是可选的，但不带参数的函数通常用处不大，因为它们会重复执行相同的任务。\n\
    \n`->` 符号定义了函数名所代表的数据类型。\n\n`return` 关键字后面必须跟着一个值或可以计算出值的命令。这个值的数据类型必须与 `->` 符号后面的数据类型相同。\n\
    \n假设你定义了一个如下的函数：\n\n```\nfunc salesTax (amount: Double) -> Double {\n    let currentTax\
    \ = 0.075 // 7.5% 销售税\n    return amount * currentTax\n}\n```\n\n这个函数名为 `salesTax`，它接受一个名为\
    \ `amount` 的参数，该参数可以存储 `Double` 数据类型。当它计算结果时，该结果也是一个 `Double` 数据类型，由 `->` 符号后的\
    \ `Double` 标识。`return` 关键字标识了函数如何计算要返回的值。\n\n要了解这个函数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground`\
    \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc salesTax (amount: Double)\
    \ -> Double {\n    let currentTax = 0.075\n    return amount * currentTax\n}\n\
    let purchasePrice = 59.95\nvar total : Double\ntotal = purchasePrice + salesTax(purchasePrice)\n\
    print (\"包含销售税，您的总金额是 =  \\(total)\")\n```\n\n请注意，这段代码通过向 `salesTax` 函数传递存储在 `purchasePrice`\
    \ 中的值来调用它。当你在 playground 中输入此代码时，你会在右侧边栏看到显示的结果，如图 6-12 所示。尝试更改 `purchasePrice`\
    \ 和 `currentTax` 中存储的值，看看它们如何影响此 Swift 代码计算出的结果。\n\n![A978-1-4842-1233-2_6_Fig12_HTML.jpg](img/A978-1-4842-1233-2_6_Fig12_HTML.jpg)\n\
    \n图 6-12. 定义和调用函数\n\n当一个函数返回一个值时，请确保指定：\n\n- 函数所代表的数据类型 (`-> dataType`)\n- 函数名所代表的值\
    \ (`return`)\n\n调用一个返回值的函数时，请确保数据类型匹配。在上面的例子中，`salesTax` 函数返回一个 `Double` 数据类型，因此在\
    \ Swift 代码中，这个 `salesTax` 函数值被存储在 `total` 变量中，该变量也是一个 `Double` 数据类型。\n\n### 定义外部参数名\n\
    \n当一个函数使用一个或多个参数来接收数据时，你只需定义参数名及其数据类型，例如：\n\n```\nfunc storeContact (name: String,\
    \ age : Int) {\n\n}\n```\n\n要调用此函数，你只需使用函数名，并为其提供一个字符串和一个整数，例如：\n\n```\nstoreContact\
    \ (\"Fred\", 58)\n```\n\n传递参数时的问题是，你只能看到你传递的数据，但可能不完全理解它所代表的内容。为了解决这个问题，Swift\
    \ 允许你创建外部参数名，强制你在向函数传递数据时进行标识。\n\n一种方法是创建一个外部参数名，例如：\n\n```\nfunc functionName\
    \ (externalName internalName: dataType) {\n\n}\n```\n\n当你为一个参数同时定义了外部名称和内部名称时，在向函数传递参数时使用外部参数名，而在函数内部则使用内部参数名。要了解如何使用外部和内部参数名，请按照以下步骤操作：\n\
    \n确保你的 `FunctionPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc\
    \ greeting (person name : String) -> String {\n    return \"Hello \" + name\n\
    }\nvar message : String\nmessage = greeting (person: \"Bob\")\nprint (message)\n\
    ```\n\n此函数有一个外部参数名 `\"person\"` 和一个内部参数名 `\"name\"`。要调用此函数，你必须包含外部参数名 `\"person\"\
    `：\n\n```\ngreeting (person: \"Bob\")\n```\n\n外部参数名只是让调用函数和传递参数变得更加易于理解。\n"
- fmt: "### Using Variable Parameters\n\nWhen a function accepts parameters, it treats\
    \ that parameter like a constant. That means within the function, Swift code cannot\
    \ modify that parameter. If you want to modify a parameter within a function,\
    \ then you need to create a variable parameter by identifying the parameter with\
    \ the `var` keyword as follows:\n\n```\nfunc functionName (var parameter: dataType)\
    \ {\n\n}\n```\n\nTo see how variable parameters work, follow these steps:\n\n\
    Make sure your `FunctionPlayground` file is loaded in Xcode. Edit the code as\
    \ follows:\n\n```swift\nimport Cocoa\nfunc internalChange (var name : String)\
    \ {\n    name = name.uppercaseString\n    print (\"Hello \" + name)\n}\ninternalChange\
    \ (\"Tasha\")\n```\n\nWithin the `internalChange` function, the `name` parameter\
    \ changes. The first line in the `internalChange` function changes the `name`\
    \ parameter into uppercase. However, any changes the `internalChange` function\
    \ makes to the `name` parameter has no effect in any other part of your program.\
    \ All changes stay isolated within the `internalChange` function.\n\nIf you want\
    \ to change a parameter and have those changes take effect outside a function,\
    \ then you need to use `inout` parameters instead.\n\n### Using Inout Parameters\n\
    \nThere are two ways to pass data to a function. One is to pass a fixed value\
    \ such as:\n\n```swift\nsqrt(5)\n```\n\nA second way is to pass a variable that\
    \ represents a value such as:\n\n```swift\nvar z : Double = 45.0\nvar answer :\
    \ Double\nanswer = sqrt(z)\n```\n\nIn this Swift code, the value of `z` is `45.0`\
    \ and is passed to the `sqrt` function. No matter what the `sqrt` function does,\
    \ the value of `z` still remains `45.0`.\n\nIf you want a function to change the\
    \ value of its parameters, you can create what’s called in-out parameters. That\
    \ means when you pass a variable to a function, that function changes that variable.\n\
    \nTo define a parameter that a function can change, you just have to identify\
    \ that parameter using the `inout` keyword such as:\n\n```\nfunc functionName\
    \ (inout parameter: dataType) {\n\n}\n```\n\nIf a function has two or more parameters,\
    \ you can designate one or more parameters as `inout` parameters. When you identify\
    \ a parameter as an `inout` parameter, then the function must change that `inout`\
    \ parameter. When you call a function and pass it an `inout` parameter, you must\
    \ use the `&` symbol to identify an `inout` parameter such as:\n\n```\nfunctionName\
    \ (&variable)\n```\n\nTo see how `inout` parameters work, follow these steps:\n\
    \nMake sure your `FunctionPlayground` file is loaded in Xcode. Edit the code as\
    \ follows:\n\n```swift\nimport Cocoa\nfunc changeMe (inout name: String, age:\
    \ Int) {\n    print (name + \" is \\(age) years old\")\n    name = name.uppercaseString\n\
    }\nvar animal : String = \"Oscar the cat\"\nchangeMe (&animal, age: 2)\nprint\
    \ (animal)\n```\n\nThe `changeMe` function defines two parameters:\n\n*   A string\
    \ parameter called `name` and identified as an `inout` parameter\n*   An integer\
    \ parameter called `age`\n\nThe `changeMe` function must modify the `inout` parameter\
    \ somehow, which it does by changing the `name` parameter to uppercase as shown\
    \ in Figure [6-13](#A978-1-4842-1233-2_6_Chapter.html#Fig13).\n\n![A978-1-4842-1233-2_6_Fig13_HTML.jpg](A978-1-4842-1233-2_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13. Using `inout` parameters\n\nCalling the `changeMe` function sends\
    \ it a `String` variable called `animal`, which holds the string `\"Oscar the\
    \ cat\"`. The `changeMe` function expects two parameters where the first one is\
    \ an `inout` parameter. That means calling the `changeMe` function must meet the\
    \ following criteria:\n\n*   The `changeMe` function expects two parameters, a\
    \ string and an integer in that order\n*   Since the string parameter is an `inout`\
    \ parameter, the first parameter must be a variable identified with the `&` symbol\n\
    \nBefore calling the `changeMe` function, the `animal` variable contains the string\
    \ `\"Oscar the cat\"`. After calling the `changeMe` function, the `animal` variable\
    \ now contains the string `\"OSCAR THE CAT\"`. That’s because the `inout` parameter\
    \ in the `changeMe` function modified it.\n\n### Understanding IBAction Methods\n\
    \nIf you remember in [Chapter 5](#A978-1-4842-1233-2_5_Chapter.html), you linked\
    \ a button from the user interface to your Swift code to create an `IBAction`\
    \ method, which is nothing more than a function that looks like this:\n\n```swift\n\
    @IBAction func changeCase(sender: NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercaseString\n\
    \    let warning = labelText.stringValue\n}\n```\n\nNow that you understand how\
    \ functions work, let’s dissect this line by line. First, `@IBAction` identifies\
    \ a function that only runs when the user does something to a user interface item.\
    \ If you look at the parameter list, you’ll see `(sender: NSButton)`, which tells\
    \ you that when the user clicks on a button, the `changeCase` function will run\
    \ the Swift code enclosed within the curly brackets.\n\nThe Swift code stored\
    \ in any `IBAction` method typically manipulates data somehow. In this case, it\
    \ converts text from a text field (represented by the `IBOutlet` variable `messageText`),\
    \ converts it to uppercase, and then displays that uppercase text in a label (represented\
    \ by the `IBOutlet` variable `labelText`).\n\nSince it’s possible for two or more\
    \ user interface items to connect to the same `IBAction` method, the `sender`\
    \ parameter identifies which button the user clicked on. Since this `IBAction`\
    \ method only connects to one button, the `sender` parameter is ignored.\n\n`IBAction`\
    \ methods are nothing more than special functions linked to items on your user\
    \ interface. Within any program, you’ll likely have multiple `IBAction` methods\
    \ (functions) along with any additional functions you may have defined.\n\nIn\
    \ addition, you’ll likely use functions defined in the Cocoa framework even if\
    \ you never see the actual code that makes those functions work. When creating\
    \ any program, you’ll use functions in one form or another."
