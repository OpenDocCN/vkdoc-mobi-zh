    Dragging is a fast way to select multiple items  


    By using a stack view, you can keep grouped items together and only use one set
    of constraints for the entire group rather than exhaustively place constraints
    on each item individually.


    ## Fixing Constraint Conflicts


    Ideally, constraints should keep items a specific distance from the edge of the
    window or the edge of another user interface item. However if you shrink or expand
    a window, it’s possible for constraints to create unexpected problems.


    Let’s see how setting two constraints on a user interface item can create a problem:


    Make sure the StackViewProgram project is loaded in Xcode.   Click on the MainMenu.xib
    file in the Project Navigator pane.   Click on the window icon in the pane that
    appears to the right of the Project Navigator pane. Your program’s user interface
    appears.   Choose Edit ➤ Select All (or press Command+A). Xcode selects your stack
    view that’s currently on the user interface window.   Press the Delete key on
    your keyboard, or choose Edit ➤ Delete to delete all user interface items from
    the window.   Choose View ➤ Utilities ➤ Show Object Library.   Drag a single text
    field in the middle of the user interface window. (Don’t worry about the exact
    positioning.)   Move the mouse pointer over the text field, hold down the Control
    key, and drag the mouse to the right edge of the window.   Release the Control
    key and the mouse. A pop-up window appears.   Choose Trailing Space to Container.
    Xcode creates a constraint from the right edge of the text field to the right
    edge of the window.   Move the mouse pointer over the text field, hold down the
    Control key, and drag the mouse to the left edge of the window.   Release the
    Control key and the mouse. A pop-up window appears.   Choose Leading Space to
    Container. Xcode creates a constraint from the left edge of the text field to
    the left edge of the window.   Choose Product ➤ Run. The user interface window
    appears.   Move the mouse pointer over the right edge of the window and expand
    the window width by dragging the mouse to the right. Notice that the text field
    expands to the right.   Move the mouse pointer over the right edge of the window
    and shrink the window width by dragging the mouse to the left. Notice that the
    text field shrinks. If you keep shrinking the window width, the text field eventually
    disappears altogether, which is probably not what you want.   Choose StackViewProgram
    ➤ Quit StackViewProgram.


    Right now we have two constraints that keep the text field a fixed distance from
    the two window edges, but they do nothing to keep the text field from disappearing
    if the window shrinks too much. One way to fix this is to create a compression
    constraint.


    A compression constraint keeps a user interface item from shrinking or expanding
    too much. To create a compression constraint, you hold down the Control key and
    drag the mouse within the boundaries of that user interface element.


    Choose Product ➤ Run. The user interface window appears.   Move the mouse pointer
    over the right edge of the window and try dragging the window to expand or shrink
    its width. Notice that you can’t do that because of the compression constraint.
      Choose StackViewProgram ➤ Quit StackViewProgram.   Choose Width. Xcode displays
    a compression constraint underneath the text field as shown in Figure [22-4](#A978-1-4842-1233-2_22_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_22_Fig4_HTML.jpg](A978-1-4842-1233-2_22_Fig4_HTML.jpg)


    Figure 22-4.


    A compression constraint appears underneath a user interface item   Make sure
    the StackViewProgram project is loaded in Xcode.   Click on the MainMenu.xib file
    in the Project Navigator pane.   Move the mouse pointer over the text field.  
    Hold down the Control key and drag the mouse to the left or right, keeping the
    mouse pointer within the boundary of the text field.   Release the Control key
    and the mouse. A pop-up menu appears as shown in Figure [22-3](#A978-1-4842-1233-2_22_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_22_Fig3_HTML.jpg](A978-1-4842-1233-2_22_Fig3_HTML.jpg)


    Figure 22-3.


    Defining a compression constraint'
