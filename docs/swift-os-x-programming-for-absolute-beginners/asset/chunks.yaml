    An alert dialog showing the last structure added to the array   Click OK to make
    the alert dialog go away.   Choose StructureProgram ➤ Quit StructureProgram.


    ## Summary


    Tuples are a way to store different data types in a single variable. Like arrays
    and dictionaries, sets can store lists of the same data type. While arrays are
    best for storing ordered information and dictionaries are best for fast retrieval
    of data, sets are best for checking if items belong in a set or not as well as
    making it easy to manipulate two or more sets.


    If you need to store large groups of related data, you could use a tuple, but
    a tuple gets clumsy with large numbers of data. As an alternative, you can create
    a structure that lets you define different types of data to hold. Beyond the basic
    data types (Int, String, Float, and Double), structures also let you hold other
    data structures such as arrays, dictionaries, or sets. For greater flexibility,
    you can even put structures in arrays, dictionaries, or sets as well.


    In the sample OS X program that you created, you learned how to create a structure
    and store its data in an array. By now you should be getting comfortable using
    IBOutlets to display or retrieve data from a user interface, along with creating
    IBAction methods to make your program actually work.


    With tuples, sets, and structures along with arrays and dictionaries, you can
    combine data structures in a variety of ways to store data in the most flexible
    way for your particular needs.'
