- fmt: '# Summary


    Loops let you repeat one or more lines of code by running code until a Boolean
    value becomes false. A `while` loop checks a Boolean value first, which means
    it can run zero or more times. A `repeat-while` loop checks a Boolean value last,
    which means it can run one or more times.


    A `for` loop lets you specify how many times the loop can run based on a starting
    value, a Boolean value, and an increment counting operator. A `for-in` loop can
    count items in a list automatically.


    When creating a loop, always make sure the loop has a way to end. If a loop never
    ends, it becomes an endless loop, which will make your program appear to freeze
    and be unresponsive.


    Each type of loop has its advantages and disadvantages, but you can always make
    each loop duplicate the features of the other loops. If you need to exit out of
    a loop prematurely, you can use the `break` command along with an `if` statement.


    Loops give your program the power to do repetitive tasks without requiring you
    to write duplicate commands. Just make sure that your loops always end eventually
    and that they run the proper number of times before stopping.


    # 9. Arrays and Dictionaries


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​9](http://dx.doi.org/10.1007/978-1-4842-1233-2_9))
    contains supplementary material, which is available to authorized users.


    Almost every program needs to accept data so it can manipulate that data and calculate
    a useful result. The simplest way to store data temporarily is through variables
    that can store numbers or text strings. However, what if you need to store multiple
    chunks of data such as a list of names or a list of product numbers? You could
    create multiple variables like this:


    `var employee001, employee002, employee003 : String`


    Unfortunately, creating separate variables to store related data can be clumsy.
    What if you don’t know how many items you need to store? Then you may create too
    many or not enough variables. Even worse, storing related data in separate variables
    means it’s easy to overlook the relationship between data.


    For example, if you stored the names of three employees in three different variables,
    how do you know if there isn’t a fourth, fifth, or sixth variable containing additional
    employee names? Unless you keep variables together in your code, it’s easy to
    lose track of related data stored in separate variables.


    That’s why Swift offers two additional ways to store data: arrays and dictionaries.
    The main idea behind both data structures is that you create a single variable
    that can hold multiple items. Now you can store related data in one location and
    easily find and retrieve it again.


    Both arrays and dictionaries are designed to store multiple copies of the same
    data type such as a list of names (`String`) or a list of numbers (`Int`). If
    you wanted to store a list consisting of different data types such as integers,
    decimal numbers, and strings, you can declare the array or dictionary to hold
    `AnyObject` data types, which can store any type of data.


    ## Using Arrays


    You can think of an array as an endless series of buckets that can hold exactly
    one chunk of data. To help you find data stored in an array, each array element
    (bucket) is identified by a number called an index. The first item in an array
    is defined at index 0, the second item is defined at index 1, the third item is
    defined at index 2, and so on as shown in Figure [9-1](#A978-1-4842-1233-2_9_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_9_Fig1_HTML.gif](A978-1-4842-1233-2_9_Fig1_HTML.gif)


    Figure 9-1. The structure of an array


    To create an array, you must define the name of the array and the type of data
    the array can hold. One way to create an array is like this:


    `var arrayName = Array<DataType>()>()`


    The array name can be anything you wish, although it’s best to choose a descriptive
    name that identifies the type of data the array holds, such as `employeeArray`.
    The data type can be `Int` (integer), `String` (strings), `Float` or `Double`
    (decimal numbers), or even the name of another data structure. (It’s possible
    to have an array that holds other arrays.)


    A second way to create an array is like this:


    `var arrayName = [DataType]()`


    Both of these methods create an empty array. At that point, you’ll need to start
    adding items into that array. If you want to create an array and store it with
    items at the same time, you’ll need to use the `arrayLiteral` keyword such as:


    `var arrayName = Array<Int>(arrayLiteral: 34, 89, 70, 1, -24)`


    or


    `var arrayName = [Int](arrayLiteral: 34, 89, 70, 1, -24)`


    Both of these commands create an array called `arrayName` that can only hold integers.
    Then the `arrayLiteral` keyword followed by the list of integers fills up the
    array with data. Since you have to define the data type, both of these methods
    will work with `AnyObject` so you can store different types of data in an array.


    A shorter and much simpler way to create an array is to define an array name and
    set it equal to a list of items of the same data type like this:


    `var myArrray = [34, 89, 70, 1, -24]`


    Swift then infers the data type of the array based on the data. This method only
    works if all items in the array are of the same data type such as all integers
    or all decimal numbers.


    **Note**


    When you declare an array with the `var` keyword, you can add and delete items
    in that array. If you don’t want an array to change, declare it with the `let`
    keyword like this: `let arrayName = [34, 89, 70, 1, -24]`. An array declared with
    the `let` keyword can never be modified.


    In the previous examples of arrays holding integers, the first number (34) is
    at index 0, the second number (89) is at index 1, the third number (70) is at
    index 2, the fourth number (1) is at index 3, and the fifth number (-24) is at
    index 4. Because arrays count the index numbers starting with 0, Swift arrays
    are known as zero-based arrays. (Some programming languages count the index of
    arrays starting with 1 so they’re called one-based arrays.)'
  raw: '## Summary


    Loops let you repeat one or more lines of code by running code until a Boolean
    value becomes false. A while loop checks a Boolean value first, which means it
    can run zero or more times. A repeat-while loop checks a Boolean value last, which
    means it can run one or more times.


    A for loop lets you specify how many times the loop can run based on a starting
    value, a Boolean value, and an increment counting operator. A for-in loop can
    count items in a list automatically.


    When creating a loop, always make sure the loop has a way to end. If a loop never
    ends, it becomes an endless loop, which will make your program appear to freeze
    and be unresponsive.


    Each type of loop has its advantages and disadvantages, but you can always make
    each loop duplicate the features of the other loops. If you need to exit out of
    a loop prematurely, you can use the break command along with an if statement.


    Loops give your program the power to do repetitive tasks without requiring you
    to write duplicate commands. Just make sure that your loops always end eventually
    and that they run the proper number of times before stopping.


