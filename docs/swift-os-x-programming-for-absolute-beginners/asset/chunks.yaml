    \n## Summary\n\nTo respond intelligently to the user, every program needs a way\
    \ to make decisions. The first step to making a decision is to define a Boolean\
    \ value, which is either `true` or `false`. Boolean values can be calculated through\
    \ comparison operators or logical operators.\n\nOnce you can determine a Boolean\
    \ value, then you can use that Boolean value to decide which code to follow in\
    \ a branching statement. The simplest branch is an `if` statement that either\
