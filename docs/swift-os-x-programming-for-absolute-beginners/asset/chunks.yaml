    `}`


    Within this protocol declaration you can define properties and methods without
    implementing any Swift code like this:


    `protocol protocolName {`


    `var property1 : datatype { get }        // read-only`


    `var property2 : datatype { get set }    // read-write`


    `func methodName (parameters) -> datatype`


    `}`


    When a protocol defines a property or method, any class that adopts that protocol
    must implement that property or method exactly as its defined in the protocol.
    In the above example, property1 is defined with a getter and property2 is defined
    with a getter and a setter.


    That means when a class implements those two properties, it must define a getter
    only for property1 and both a getter and a setter for property2.


    Likewise, the method defined in the protocol must be exact when adopted in the
    class file. That means if the method is defined in the protocol with two integer
    parameters, then the implementation of that method must also have the exact same
    two integer parameters.


    Protocols are generally used when working with common user interface items that
    require specific types of methods to manipulate them, but can’t define exactly
    how to manipulate them because the data may differ from one program to another.


    For example, table views are a user interface item that displays a list of data
    in rows. The table view needs to know how many rows of data to hold and what type
    of data to display in each row. Since every table view needs to know this information,
    it makes sense to create standard methods to do this, but since every table view
    needs to contain different information, it also makes sense to avoid writing Swift
    code to actually fill a table view with data.


    Any program that includes a table view can take advantage of predefined method
    names stored in a protocol for manipulating data. All you need to do is add Swift
    code to fill the table view with data.


    By using protocols, you can manipulate table views using identical method names
    from one program to another. Without table view protocols, you’d be forced to
    make up your own method names for adding and displaying data in a table view.
    Thus protocols are typically used in the Cocoa framework to provide a consistent
    list of methods for performing common tasks.


    To see how protocols work, follow these steps:


    Make sure the ExtensionPlayground file is loaded into Xcode.   Edit the code as
    follows:


    `import Cocoa`


    `protocol testMe {`


    `var cash : Int { get }`


    `var creditCheck : Int { get set }`


    `func purchase (price : Int) -> String`


    `}`


    `class windowShopper : testMe {`


    `var tempValue : Int = 0`


    `var cash : Int = 0`


    `var creditCheck : Int {`


    `get {`


    `return tempValue`


    `}`


    `set (newValue) {`


    `tempValue = newValue`


    `cash -= 10`


    `}`


    `}`


    `func purchase (price : Int) -> String {`


    `cash -= price`


    `return "Bought something!"`


    `}`


    `}`


    `var shopper = windowShopper ()`


    `shopper.cash = 450`


    `shopper.purchase (129)`


    `shopper.cash`


    Notice that the testMe protocol defines two properties and a method. The “cash”
    property is defined only with a getter. The “creditCheck” property is defined
    with both a getter and a setter. The “purchase” method only lists its parameters
    (“price” as an integer) and its return value, which is a String. Notice that the
    protocol doesn’t actually implement any of the necessary Swift code.


    When the windowShopper class is created, it adopts or conforms to the testMe protocol.
    That means it must provide Swift code to define the getter for the “cash” property
    and the getter and setter for the “creditCheck” property. It will also need to
    implement the Swift code for the “purchase” method.


    If you fail to write Swift code for all the properties and methods defined in
    the testMe protocol, Xcode will give an error saying the windowShopper class failed
    to conform to the protocol. When adopting a protocol, make sure you implement
    all the necessary properties and methods.


    Running the above code displays the results as shown in Figure [12-8](#A978-1-4842-1233-2_12_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_12_Fig8_HTML.jpg](A978-1-4842-1233-2_12_Fig8_HTML.jpg)


    Figure 12-8.


    A class conforming to a protocol'
  trans: "\n# 使用协议\n\n在本章开头，你首次接触了为了学习各章基本原理而创建的 `AppDelegate.swift` 文件中出现的内容。这个 `AppDelegate`\
    \ 类的声明如下：\n\n`class AppDelegate: NSObject, NSApplicationDelegate {`\n\n这行代码创建了一个名为\
    \ `AppDelegate` 的类，它继承了 Cocoa 框架中 `NSObject` 类的属性和方法。然而，`NSApplicationDelegate`\
    \ 是另一个文件的名称，用于在不通过继承或子类化的情况下扩展类。\n\n`NSApplicationDelegate` 文件是一个协议文件。上述 Swift\
    \ 代码创建了一个名为 `AppDelegate` 的类，它从 `NSObject` 类继承属性和方法，同时也从 `NSApplicationDelegate`\
    \ 文件继承代码。（你可以在 Xcode 文档窗口中查看 `NSApplicationDelegate` 协议的更多细节。）\n\n类（如 `NSObject`）与协议（如\
    \ `NSApplicationDelegate`）之间的主要区别在于：类定义了属性和方法，而协议仅定义了属性和方法的名称，并不包含实际实现它们的任何代码。协议有时被称为空类，因为它从不定义任何使事物实际运行的\
    \ Swift 代码。\n\n协议定义了一组用于解决特定类型问题的属性和方法名称。采用或遵循此协议的类需要提供实际的 Swift 代码来实现每个方法或属性的声明。\n\
    \n协议的声明看起来与类或结构体的声明相同。唯一的区别在于协议声明使用“protocol”关键字：\n\n```\nprotocol 协议名称 {\n\n\
    }\n```\n\n在这个协议声明中，你可以定义属性和方法，但不实现任何 Swift 代码，如下所示：\n\n```\nprotocol 协议名称 {\n\
    \    var 属性 1 : 数据类型 { get }        // 只读\n    var 属性 2 : 数据类型 { get set }   \
    \ // 读写\n    func 方法名 (参数) -> 数据类型\n}\n```\n\n当协议定义了一个属性或方法时，任何采用该协议的类都必须按照协议中的定义精确实现该属性或方法。在上述示例中，`属性\
    \ 1` 定义为仅有 getter，而 `属性 2` 定义为同时有 getter 和 setter。\n\n这意味着当一个类实现这两个属性时，它必须仅为 `属性\
    \ 1` 定义 getter，而为 `属性 2` 同时定义 getter 和 setter。\n\n同样，协议中定义的方法在类文件中采用时必须完全一致。也就是说，如果协议中定义的方法带有两个整数参数，那么该方法的实现也必须具有完全相同的两个整数参数。\n\
    \n协议通常用于处理常见的用户界面元素，这些元素需要特定类型的方法来操作它们，但由于不同程序的数据可能不同，因此无法精确定义如何操作它们。\n\n例如，表格视图是一种用户界面元素，它以行的形式显示数据列表。表格视图需要知道要容纳多少行数据以及每行显示什么类型的数据。由于每个表格视图都需要知道这些信息，因此创建标准方法来处理这一需求是合理的；同时，由于每个表格视图需要包含不同的信息，因此避免编写实际的\
    \ Swift 代码来填充表格视图数据也是合理的。\n\n任何包含表格视图的程序都可以利用存储在协议中的预定义方法名称来操作数据。你只需添加 Swift 代码来用数据填充表格视图即可。\n\
    \n通过使用协议，你可以在不同程序之间使用相同的方法名称来操作表格视图。如果没有表格视图协议，你将被迫自己发明在表格视图中添加和显示数据的方法名称。因此，协议在\
    \ Cocoa 框架中通常用于提供一致的方法列表来执行常见任务。\n\n要了解协议的工作原理，请按照以下步骤操作：\n\n确保 `ExtensionPlayground`\
    \ 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nprotocol testMe {\n    var\
    \ cash : Int { get }\n    var creditCheck : Int { get set }\n    func purchase\
    \ (price : Int) -> String\n}\n\nclass windowShopper : testMe {\n    var tempValue\
    \ : Int = 0\n    var cash : Int = 0\n    \n    var creditCheck : Int {\n     \
    \   get {\n            return tempValue\n        }\n        set (newValue) {\n\
    \            tempValue = newValue\n            cash -= 10\n        }\n    }\n\
    \    \n    func purchase (price : Int) -> String {\n        cash -= price\n  \
    \      return \"买到了东西！\"\n    }\n}\n\nvar shopper = windowShopper()\nshopper.cash\
    \ = 450\nshopper.purchase(129)\nshopper.cash\n```\n\n注意，`testMe` 协议定义了两个属性和一个方法。`cash`\
    \ 属性仅定义了 getter。`creditCheck` 属性同时定义了 getter 和 setter。`purchase` 方法只列出了它的参数（`price`\
    \ 为整数）及其返回值，返回值是一个 `String`。注意，协议实际上并没有实现任何必要的 Swift 代码。\n\n当创建 `windowShopper`\
    \ 类时，它采用或遵循了 `testMe` 协议。这意味着它必须提供 Swift 代码来定义 `cash` 属性的 getter，以及 `creditCheck`\
    \ 属性的 getter 和 setter。它还需要实现 `purchase` 方法的 Swift 代码。\n\n如果你未能为 `testMe` 协议中定义的所有属性和方法编写\
    \ Swift 代码，Xcode 将给出错误提示，指出 `windowShopper` 类未能遵循该协议。在采用协议时，请务必实现所有必要的属性和方法。\n\
    \n运行上述代码会显示结果，如图 12-8 所示。\n\n![A978-1-4842-1233-2_12_Fig8_HTML.jpg](img/A978-1-4842-1233-2_12_Fig8_HTML.jpg)\n\
    \n图 12-8. 符合协议的类\n"
- fmt: "### Defining Optional Methods and Properties in Protocols\n\nWhen you create\
    \ a protocol, every property and method you define must be implemented by any\
    \ class that adopts that protocol. However, you can also make one or more properties\
    \ and methods optional so they can be ignored. To define optional properties or\
    \ methods, you need to identify the protocol with the `@objc` keyword and identify\
    \ individual properties or methods with the `optional` keyword as well such as:\n\
    \n```\n@objc protocol protocolName {\n    var requiredProperty : dataType { get\
    \ }\n    optional var optionalProperty : dataType { get }\n    optional func optionalMethod\
    \ ()\n}\n```\n\nTo adopt or conform to this protocol, a class only needs to implement\
    \ any property or method that is not identified by the `optional` keyword. To\
    \ implement required properties or methods, you need to identify them with the\
    \ `@objc` keyword such as:\n\n```\nclass className : protocolName {\n    @objc\
    \ var requiredProperty : dataType = initialValue\n}\n```\n\nHowever, if you want\
    \ to implement an optional property or method, you can omit the `@objc` keyword\
    \ like this:\n\n```\nclass className : protocolName {\n    @objc var requiredProperty\
    \ : dataType = initialValue\n    var optionalProperty : dataType = initialValue\n\
    }\n```\n\nTo see how to create optional properties and methods in a protocol,\
    \ follow these steps:\n\nMake sure the `ExtensionPlayground` file is loaded into\
    \ Xcode. Edit the code as follows:\n\n```\nimport Cocoa\n\n@objc protocol person\
    \ {\n    var name : String { get }\n    optional var age : Int { get }\n    optional\
    \ func move (X: Int) -> Int\n}\n\nclass politician : person {\n    @objc var name\
    \ : String = \"\"\n}\n\nvar candidate = politician ()\ncandidate.name = \"John\
    \ Doe\"\n```\n\nNotice that the only required item in the `person` protocol defined\
    \ above is the property `name`. That’s why the `politician` class only needs to\
    \ implement the `name` property, but it must identify it with the `@objc` keyword.\n\
    \nTry experimenting with making different properties and methods optional so you\
    \ can see how they affect how you need to implement them in the class.\n\n###\
    \ Using Inheritance with Protocols\n\nProtocols can even inherit properties and\
    \ methods from other protocols. This lets one protocol inherit properties and\
    \ methods from multiple protocols. Now a class must adopt or conform to all the\
    \ properties and methods defined in all the protocols.\n\nTo see how to inherit\
    \ properties and methods from multiple protocols, follow these steps:\n\nMake\
    \ sure the `ExtensionPlayground` file is loaded into Xcode. Edit the code as follows:\n\
    \n```\nimport Cocoa\n\nprotocol first {\n    var name : String { get }\n}\n\n\
    protocol second {\n    var ID : Int { get }\n}\n\nprotocol third: first, second\
    \ {\n    var email : String { get }\n}\n\nclass inheritProtocols : third {\n \
    \   var name : String = \"\"\n    var ID : Int = 0\n    var email : String = \"\
    \"\n}\n\nvar friend = inheritProtocols()\nfriend.name = \"Cindy Smith\"\nfriend.ID\
    \ = 12\nfriend.email = \"cindysmith@isp.com\"\n```\n\nIn this example, the `name`,\
    \ `ID`, and `email` properties are defined in three different protocols. The `third`\
    \ protocol inherits from the `first` and `second` protocol.\n\nNow when a class\
    \ adopts the last protocol, it must implement the properties and methods stored\
    \ in all the protocols. Even though the `name`, `ID`, and `email` properties were\
    \ all declared in different protocols, the `inheritProtocols` class can access\
    \ them all as shown in Figure [12-9](#A978-1-4842-1233-2_12_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_12_Fig9_HTML.jpg](A978-1-4842-1233-2_12_Fig9_HTML.jpg)\n\
    \n**Figure 12-9.** Inheriting properties and methods from multiple protocols\n\
    \n## Using Delegates\n\nProtocols are closely related to delegation. The main\
    \ idea behind delegation is for a class to hand off or delegate responsibility\
    \ to code stored in another class. So rather than create a new subclass to add\
    \ new features, you can use a delegate that contains additional features.\n\n\
    One common way to use delegates is to allow the view (the user interface) to communicate\
    \ to the controller. Normally the controller communicates to the view through\
    \ `IBOutlets` that allow the controller to display data on the user interface\
    \ or retrieve data from the user interface.\n\nHowever, the view can also communicate\
    \ back to the controller through protocols. The protocol file defines methods\
    \ and delegates the responsibility to the controller for implementing those methods.\
    \ The most common types of methods the controller implements involve method names\
    \ that include `will`, `should`, and `did` such as `applicationDidFinishLaunching`\
    \ or `applicationWillTerminate`.\n\nFigure [12-10](#A978-1-4842-1233-2_12_Chapter.html#Fig10)\
    \ shows how the controller communicates to the view through `IBOutlets` and the\
    \ view communicates with the controller through protocols.\n\n![A978-1-4842-1233-2_12_Fig10_HTML.jpg](A978-1-4842-1233-2_12_Fig10_HTML.jpg)\n\
    \n**Figure 12-10.** Views can communicate to controllers through protocols\n\n\
    To see how a view uses delegates to communicate with the controller, follow these\
    \ steps:\n\nFrom within Xcode choose **File ➤ New ➤ Project**. Click **Application**\
    \ under the OS X category. Click **Cocoa Application** and click the **Next**\
    \ button. Xcode now asks for a product name. Click in the **Product Name** text\
    \ field and type `DelegateProgram`. Make sure the **Language** pop-up menu displays\
    \ `Swift` and that no check boxes are selected. Click the **Next** button. Xcode\
    \ asks where you want to store the project. Choose a folder to store your project\
    \ and click the **Create** button. Click the `AppDelegate.swift` file in the Project\
    \ Navigator. The contents of the `AppDelegate.swift` file appears in the middle\
    \ of the Xcode window. Look for the following line of code:\n\n```\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n```\n\nThis line defines a class called `AppDelegate`\
    \ that inherits properties and methods from the `NSObject` class. In addition,\
    \ it also adopts any properties and methods defined by the `NSApplicationDelegate`\
    \ file.\n\nClick the close button (the red dot) in the upper left corner of the\
    \ Documentation window to make it go away. The Xcode window appears again. Notice\
    \ that the `AppDelegate.swift` file contains two empty functions called `applicationDidFinishLaunching`\
    \ and `applicationWillTerminate`. These are defined by the `NSApplicationDelegate`\
    \ protocol file but implemented in the `AppDelegate.swift` file. Modify both of\
    \ these functions as follows:\n\nRelease the **Option** key and click the mouse\
    \ over **NSApplicationDelegate Protocol Reference** at the bottom of the pop-up\
    \ window. The Documentation window appears, showing details about the `NSApplicationDelegate`\
    \ Protocol as shown in Figure [12-14](#A978-1-4842-1233-2_12_Chapter.html#Fig14).\
    \ Notice that two methods that the `NSApplicationDelegate` protocol defines are\
    \ called `applicationDidFinishLaunching` and `applicationWillTerminate`.\n\n![A978-1-4842-1233-2_12_Fig14_HTML.jpg](A978-1-4842-1233-2_12_Fig14_HTML.jpg)\n\
    \n**Figure 12-14.** Viewing the `NSApplicationDelegate` protocol in the Documentation\
    \ window\n\nClick the close button (the red dot) in the upper left corner of the\
    \ Documentation window to make it go away. Hold down the **Option** key and click\
    \ the mouse over `NSApplicationDelegate`. When the mouse pointer turns into a\
    \ question mark, click over `NSApplicationDelegate` to make a pop-up window appear\
    \ as shown in Figure [12-13](#A978-1-4842-1233-2_12_Chapter.html#Fig13).\n\n![A978-1-4842-1233-2_12_Fig13_HTML.jpg](A978-1-4842-1233-2_12_Fig13_HTML.jpg)\n\
    \n**Figure 12-13.**"
  raw: '### Defining Optional Methods and Properties in Protocols


    When you create a protocol, every property and method you define must be implemented
    by any class that adopts that protocol. However, you can also make one or more
    properties and methods optional so they can be ignored. To define optional properties
    or methods, you need to identify the protocol with the @objc keyword and identify
    individual properties or methods with the “optional” keyword as well such as:


    `@objc protocol protocolName {`


        `var requiredProperty : dataType { get }`


        `optional var optionalProperty : dataType { get }`


        `optional func optionalMethod ()`


    `}`


    To adopt or conform to this protocol, a class only needs to implement any property
    or method that is not identified by the “optional” keyword. To implement required
    properties or methods, you need to identify them with the @objc keyword such as:


    `class className : protocolName {`


        `@objc var requiredProperty : dataType = initialValue`


    `}`


    However, if you want to implement an optional property or method, you can omit
    the @objc keyword like this:


    `class className : protocolName {`


        `@objc var requiredProperty : dataType = initialValue`


            `var optionalProperty : dataType = initialValue`


    `}`


    To see how to create optional properties and methods in a protocol, follow these
    steps:


    Make sure the ExtensionPlayground file is loaded into Xcode.   Edit the code as
    follows:  


    `import Cocoa`


    `@objc protocol person {`


        `var name : String { get }`


        `optional var age : Int { get }`


        `optional func move (X: Int) -> Int`


    `}`


    `class politician : person {`


        `@objc var name : String = ""`


    `}`


    `var candidate = politician ()`


    `candidate.name = "John Doe"`


    Notice that the only required item in the person protocol defined above is the
    property “name.” That’s why the politician class only needs to implement the “name”
    property, but it must identify it with the @objc keyword.


    Try experimenting with making different properties and methods optional so you
    can see how they affect how you need to implement them in the class.


    ### Using Inheritance withProtocols


    Protocols can even inherit properties and methods from other protocols. This lets
    one protocol inherit properties and methods from multiple protocols. Now a class
    must adopt or conform to all the properties and methods defined in all the protocols.


    To see how to inherit properties and methods from multiple protocols, follow these
    steps:


    Make sure the ExtensionPlayground file is loaded into Xcode.   Edit the code as
    follows:  


    `import Cocoa`


    `protocol first {`


        `var name : String { get }`


    `}`


    `protocol second {`


        `var ID : Int { get }`


    `}`


    `protocol third: first, second {`


        `var email : String { get }`


    `}`


    `class inheritProtocols : third {`


        `var name : String = ""`


        `var ID : Int = 0`


        `var email : String = ""`


    `}`


    `var friend = inheritProtocols()`


    `friend.name = "Cindy Smith"`


    `friend.ID = 12`


    `friend.email = "cindysmith@isp.com"`


    In this example, the “name,” “ID,” and “email” properties are defined in three
    different protocols. The third protocol inherits from the first and second protocol.


    Now when a class adopts the last protocol, it must implement the properties and
    methods stored in all the protocols. Even though the “name,” “ID,” and “email”
    properties were all declared in different protocols, the inheritProtocols class
    can access them all as shown in Figure [12-9](#A978-1-4842-1233-2_12_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_12_Fig9_HTML.jpg](A978-1-4842-1233-2_12_Fig9_HTML.jpg)


    Figure 12-9.


    Inheriting properties and methods from multiple protocols


    ## Using Delegates


    Protocols are closely related to delegation. The main idea behind delegation is
    for a class to hand off or delegate responsibility to code stored in another class.
    So rather than create a new subclass to add new features, you can use a delegate
    that contains additional features.


    One common way to use delegates is to allow the view (the user interface) to communicate
    to the controller. Normally the controller communicates to the view through IBOutlets
