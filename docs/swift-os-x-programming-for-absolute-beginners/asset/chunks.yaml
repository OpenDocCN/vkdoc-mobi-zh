  trans: '

    # 理解 OS X 程序的工作原理


    为了帮助您更好地理解 Xcode 帮助文档中的全部含义，您需要了解 OS X 程序的工作原理。在过去，当程序还很小时，程序员会将所有程序命令存储在一个文件中。然后计算机从文件顶部的第一条命令开始，逐行向下执行，直到到达文件末尾才停止。


    如今程序规模要大得多，因此它们通常被分割成多个文件。无论您将程序分割成多少个文件，Xcode 都会将所有内容视为存储在一个文件中。将程序分割成多个文件是为了方便您管理。


    让我们逐行分析您的 `MyFirstProgram`，以便您理解其运行机制。当您在 Xcode 中查看 Swift 代码时，会注意到 Xcode 编辑器对不同文本进行了颜色编码。这些颜色有助于您识别不同文本的用途，如下所示：


    -   **绿色** – 注释，Xcode 会完全忽略它们。注释旨在解释附近代码的相关信息。

    -   **紫色** – Swift 语言的关键字。

    -   **红色** – 文本字符串。

    -   **蓝色** – 类文件名。

    -   **黑色** – 命令。


    第一行代码告诉 Xcode 导入或包含 Cocoa 框架中的所有代码，作为您程序的一部分。这行代码如下所示：


    ```

    import Cocoa

    ```


    下一行运行一个 Swift 函数，该函数加载您的用户界面（`MainMenu.xib`）并从您的 `AppDelegate` 类创建一个对象。这基本上让您的整个程序作为一个通用的
    Macintosh 程序运行。这行代码如下所示：


    ```

    @NSApplicationMain

    ```


    下一行定义了一个名为 `AppDelegate` 的类，该类基于 `NSObject` 类，并使用 `NSApplicationDelegate` 协议（您很快会了解到）。这行代码如下所示：


    ```

    class AppDelegate: NSObject, NSApplicationDelegate {

    ```


    接下来的三行定义了 `IBOutlet`s，用于将此 Swift 代码连接到用户界面元素：用户界面的窗口以及标签和文本字段。窗口基于 `NSWindow`
    类（在 Cocoa 框架中定义），而标签和文本字段基于 `NSTextField` 类。这些行代码如下所示：


    ```

    @IBOutlet weak var window: NSWindow!

    ```


    ```

    @IBOutlet weak var labelText: NSTextField!

    ```


    ```

    @IBOutlet weak var messageText: NSTextField!

    ```


    接下来的三行定义了一个连接到用户界面按钮的 `IBAction` 方法。该代码获取存储在 `messageText`（文本字段）中的文本并将其转换为大写。然后，它将大写文本存储到
    `labelText`（标签）中。标签和文本字段都基于 `NSTextField` 类（在 Cocoa 框架中定义）。这些行代码如下所示：


    ```

    @IBAction func changeCase(sender: NSButton) {

    ```


    ```

    labelText.stringValue = messageText.stringValue.uppercaseString

    ```


    ```

    }

    ```


    剩下的代码定义了两个空函数，因此它们不执行任何操作。如果您在这些函数内部键入代码，该代码将在您的程序启动后立即运行（`applicationDidFinishLaunching`），或者在您的程序结束时立即运行（`applicationWillTerminate`）。


    当 `MyFirstProgram` 运行时，它会导入 Cocoa 框架并运行，在屏幕上显示一个包含您用户界面的通用 Macintosh 程序。`applicationDidFinishLaunching`
    函数会执行，但由于它不包含任何代码，因此什么也不会发生。此时程序停止并等待某些事情发生。


    如果用户退出程序，`applicationWillTerminate` 函数将会执行，但由于它不包含任何代码，因此什么也不会发生。


    当用户单击“Change Case”按钮时，它会运行 `IBAction` 方法 `changeCase`。此 `IBAction` 方法中唯一的 Swift
    命令获取文本字段中的文本（存储在 `messageText` 的 `stringValue` 属性中），将其转换为大写，并将大写文本存储在标签中（由 `labelText`
    的 `stringValue` 属性显示）。


    现在您已经了解了 `MyFirstProgram` 的工作原理，让我们从更理论的角度来看看 OS X 编程。首先，创建一个程序涉及使用 Cocoa 框架定义的类文件。当您在用户界面上放置元素时，您使用的是
    Cocoa 框架类文件（例如 `NSTextField` 和 `NSButton`）。


    当您在 `AppDelegate.swift` 文件中定义一个类时，您同样在使用 Cocoa 框架文件（`NSObject`）中的一个类。


    一个典型的 OS X 程序会从 Cocoa 框架中的类文件以及您可能在 Swift 文件中定义的任何类文件创建对象。对象现在通过以下两种方式之一相互通信：


    -   在其他对象的属性中存储或检索数据

    -   调用其他对象中存储的方法


    要将数据存储到对象的属性中，您需要在等号左侧指定对象名称及其属性，在右侧指定一个值，如下所示：


    ```

    labelText.stringValue = "Hello, world!"

    ```


    要从对象的属性中检索数据，您需要在等号左侧指定一个变量来保存数据，在右侧指定对象名称及其属性，如下所示：


    ```

    let warning = labelText.stringValue

    ```


    要调用另一个对象中存储的方法，您需要指定对象的名称和要使用的方法，如下所示：


    ```

    messageText.stringValue.uppercaseString

    ```


    此命令告诉 Xcode 对存储在 `messageText` 对象中的 `stringValue` 属性运行 `uppercaseString` 方法。


    设置属性值、检索属性值以及调用方法运行，是对象相互通信的三种方式。


    当您创建一个类时，必须指定要使用的类文件，例如：


    ```

    class AppDelegate: NSObject

    ```


    这行代码告诉 Xcode 定义一个名为 `AppDelegate` 的类，并将其基于名为 `NSObject` 的类文件（在 Cocoa 框架中定义）。


    当您基于现有类创建一个新类时，该类会自动包含该现有类定义的所有属性和方法。因此，在上述定义 `AppDelegate` 类的代码行中，任何从 `AppDelegate`
    类创建的对象都会自动拥有 `NSObject` 类定义的所有属性和方法。


    有时，一个类文件可能不具备您需要的所有方法。为了解决这个问题，您可以从现有类继承，然后在您的类中定义一个新方法。然而，如果您创建了一个希望其他类也能使用的方法名，另一种替代方案是定义一个称为“协议”的东西。


    协议只不过是一组相关方法名的列表，但不包含任何使这些方法实际执行操作的 Swift 代码。在下面的代码中，`AppDelegate` 类不仅基于 `NSObject`
    类文件，还使用了 `NSApplicationDelegate` 协议定义的方法。


    如果您打开“文档”窗口并搜索 `NSApplicationDelegate` 协议，您会看到由 `NSApplicationDelegate` 协议定义的一系列方法名，例如
    `applicationDidFinishLaunching` 或 `applicationWillTerminate`，如图 4-18 所示。


    ![A978-1-4842-1233-2_4_Fig18_HTML.jpg](img/A978-1-4842-1233-2_4_Fig18_HTML.jpg)


    **图 4-18.** “文档”窗口中的 `NSApplicationDelegate` 协议


    `AppDelegate` 类从 `NSObject` 类继承属性和方法，并使用 `NSApplicationDelegate` 协议定义的方法名。任何基于某个协议的类都必须编写
    Swift 代码，以使这些协议方法实际执行某些操作。用技术术语来说，这被称为“实现或遵循一个协议”。


    因此，Cocoa 框架实际上由类和协议组成。类定义对象，而协议定义不同类可能需要的常用方法名。


    当您编写 OS X 程序时，您经常会同时使用 Cocoa 框架类和协议。当您使用 Cocoa 框架类时，您可以使用已经知道如何工作的现成方法，例如知道如何将文本转换为大写的
    `uppercaseString` 方法。

    '
- fmt: '当您使用 Cocoa 框架的协议时，需要编写 Swift 代码来使该方法实际生效。在浏览 Xcode 文档时，请留意类与协议之间的这种差异。


    我们来看一个在 Xcode 文档窗口中同时展示类与协议的示例：


    确保您的 `MyFirstProgram` 已在 Xcode 中加载。单击项目导航器中的 `AppDelegate.swift` 文件。Xcode 的中间窗格会显示该
    `.swift` 文件的内容。将光标移动到 `NSApplicationDelegate` 上。选择“帮助”>“为选中项快速查看”，或按住 Option 键并单击
    `NSApplicationDelegate`。此时会弹出一个快速帮助窗口，如图 [4-19] 所示，解释 `NSApplicationDelegate`
    是一个协议。


    ![A978-1-4842-1233-2_4_Fig19_HTML.jpg](A978-1-4842-1233-2_4_Fig19_HTML.jpg)


    图 4-19.  `NSApplicationDelegate` 快速帮助弹出窗口


    单击 `NSApplicationDelegate Protocol Reference`。该协议参考文档会出现在文档窗口中（见图 [4-18]）。在文档窗口的“搜索文档”字段中输入
    `NSTextField` 并按下 Return 键。注意，文档窗口会说明 `NSTextField` 继承自哪些类（标签为 `Inherits from:`），以及处理用户界面项时哪些协议可能有用（标签为
    `Conforms to:`），如图 [4-20] 所示。


    ![A978-1-4842-1233-2_4_Fig20_HTML.jpg](A978-1-4842-1233-2_4_Fig20_HTML.jpg)


    图 4-20.  查看相关类与协议


    协议可以向类添加方法，而无需创建新类，但您并不一定要使用协议。当您在 Xcode 中编写程序时，会用到 Cocoa 框架的类与协议。随后，根据您程序的特定需求，您很可能也会创建自己的类与协议。


    在浏览 Xcode 文档时，请在编写自己的代码之前，先查看类中的属性和方法。如果您在一个类中没有找到所需的属性和方法，可以查看 `Inherits from:`
    标签旁边列出的其他类。


    如果您需要一些有用的方法，可以查看 `Conforms to:` 标签旁边列出的不同协议。只有当您确定相关类或协议中不存在某个属性或方法时，才应该编写您自己的
    Swift 代码来实现功能。


    例如，在 `MyFirstProgram` 项目中，我们本可以编写 Swift 代码来将文本字段中输入的文字转换为大写。然而，直接使用现有的 `uppercaseString`
    方法要简单得多。这样节省了我们编写和调试代码的时间，因为我们直接使用了 Cocoa 框架中经过验证的代码。


    您对 Cocoa 框架了解得越多，编写自己的程序时要做的工作就越少。请利用 Xcode 的文档来帮助您更好地理解构成整个 Cocoa 框架的所有类与协议。


    由于 Cocoa 框架非常庞大，不要试图一次性学习所有内容。只需学习您需要的部分，忽略其余部分。随着您越来越多地使用 Xcode 并编写程序，您很可能逐渐需要并学习
    Cocoa 框架的其他部分。


    总体思路是尽可能依赖 Cocoa 框架，只有在必要时才编写 Swift 代码。这样，您就能以更少的精力快速编写出可靠的软件。


    ## 总结


    学习 Xcode 可能令人望而生畏，因此请慢慢来，依靠 Xcode 的文档学习。如果您急需帮助，请使用“快速查看”来查找有关 Cocoa 框架类的信息。如果您需要某个特定主题的帮助，请搜索文档。


    当您只是出于好奇时，可以浏览 Xcode 针对 iOS、OS X 和 Xcode 本身提供的文档，从而了解其海量可用功能。通过随机浏览，您常常能了解到关于
    Xcode 或为 iOS 与 OS X 编写程序的有趣信息。


    如您所见，学习编写程序需要学习 Xcode、学习 Cocoa 框架以及学习 Swift 编程语言。放轻松，只学习您需要了解的内容，并逐步扩展您的知识。通过稳步前进，您将学到越来越多，直到有一天您会发现自己实际上已经掌握了如此多的知识。


    学习使用 Xcode 为 iOS 和 OS X 编写程序不是一蹴而就的事，但您会惊讶于通过日积月累的稳步进步能学到多少东西。只需坚持练习编写程序，并依赖“帮助”菜单中的
    Xcode 文档。在您意识到这一点之前，您将能够自信地编写小型程序，并最终编写更大、更复杂的程序。'
  raw: 'When you use a Cocoa framework protocol, you’ll need to write Swift code to
    make that method actually work. When browsing through Xcode’s documentation, keep
    your eye out for this difference between classes and protocols.


    Let’s see an example of both classes and protocols in the Xcode documentation
    window:


    Make sure your MyFirstProgram is loaded in Xcode.   Click on the AppDelegate.swift
    file in the Project Navigator. Xcode’s middle pane displays the contents of that
    .swift file.   Move the cursor in NSApplicationDelegate.   Choose Help ➤ Quick
    Help for Selected Item, or hold down the Option key and click on NSApplicationDelegate.
    A quick help pop-up window appears as shown in Figure [4-19](#A978-1-4842-1233-2_4_Chapter.html#Fig19),
    explaining how NSApplicationDelegate is a protocol.


    ![A978-1-4842-1233-2_4_Fig19_HTML.jpg](A978-1-4842-1233-2_4_Fig19_HTML.jpg)


    Figure 4-19.


    The NSApplicationDelegate Quick Help pop-up window   Click NSApplicationDelegate
    Protocol Reference. The NSApplicationDelegate protocol reference appears in the
    Documentation window (see Figure [4-18](#A978-1-4842-1233-2_4_Chapter.html#Fig18)).
      Type NSTextField in the Search documentation field of the Documentation window
    and press Return. Notice that the Documentation window explains which classes
    NSTextField inherits from (the Inherits from: label) and which protocols might
    be useful when dealing with user interface items (the Conforms to: label) as shown
    in Figure [4-20](#A978-1-4842-1233-2_4_Chapter.html#Fig20).


    ![A978-1-4842-1233-2_4_Fig20_HTML.jpg](A978-1-4842-1233-2_4_Fig20_HTML.jpg)


    Figure 4-20.


    Seeing related classes and protocols


    Protocols add methods to a class without the need to create a new class, but you
    never need to use protocols. When you write programs in Xcode, you’ll use Cocoa
    framework classes and protocols. Then for the unique purposes of your program,
    you’ll likely create your own classes and protocols as well.


    When browsing through Xcode’s documentation, look for properties and methods in
    classes before writing your own code. If you don’t find the properties and methods
    you need in one class, look in other classes listed next to the Inherits from:
    label.


    If you need some useful methods, look in the different protocols listed next to
    the Conforms to: label. Only after you’ve determined that a property or method
    doesn’t exist in a related class or protocol should you write your own Swift code
    to do something.


    For example, in the MyFirstProgram project, we could have written Swift code to
    capitalize text typed into the text field. However, it was much easier to just
    use the existing uppercaseString method instead. That saved us time writing code
    and debugging it when we could just use proven code in the Cocoa framework instead.


    The more you know about the Cocoa framework, the less work you’ll have to do writing
    your own programs. Use Xcode’s documentation to help you better understand all
    the classes and protocols that make up the entire Cocoa framework.


    Since the Cocoa framework is so large, don’t bother trying to learn everything
    at once. Just learn what you need and ignore the rest. Gradually the more you
    use Xcode and write programs, the more likely you’ll need and learn the other
    parts of the Cocoa framework.


    The general idea is to rely on the Cocoa framework as much as possible and only
    write Swift code when you have to. This makes it easy to write reliable software
    quickly with less effort.


    ## Summary


    Learning Xcode can be daunting, so learn it slowly by relying on Xcode’s documentation.
    If you need help in a hurry, use Quick Help to find information about the Cocoa
    framework classes. If need help on a particular topic, search the documentation.


    For those times when you’re just curious, browse through Xcode’s documentation
    for iOS, OS X, and Xcode so you can see the vast amount of features available.
    Through random browsing, you can often learn interesting information about Xcode
    or writing programs for iOS and OS X.


    As you can see, learning to write programs involves learning about Xcode, learning
    about the Cocoa framework, and learning the Swift programming language. Just take
    it easy, learn only what you need to know, and gradually keep expanding your knowledge.
    Through steady progress, you’ll learn more and more until one day you’ll realize
    how much you actually know.


    Learning to write iOS and OS X programs with Xcode won’t happen overnight, but
    you’ll be surprised how much you can learn through steady progress over time.
    Just practice writing programs and rely on Xcode’s documentation available from
    the Help menu. Before you know it, you’ll be capable of writing small programs
    with confidence, and eventually larger and more complicated ones.'
