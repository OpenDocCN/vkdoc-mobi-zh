    按照以下步骤创建一个新的 OS X 项目：


    在 Xcode 中选择 **File** ➤ **New** ➤ **Project**。在 OS X 类别下点击 **Application**。点击 **Cocoa
    Application**，然后点击 **Next** 按钮。Xcode 现在会要求输入产品名称。点击 **Product Name** 文本字段，输入 `DictionaryProgram`。确保
    **Language** 弹出菜单显示 **Swift**，且没有选中任何复选框。点击 **Next** 按钮。Xcode 会询问你希望将项目存储在何处。选择一个文件夹来存储你的项目，然后点击
    **Create** 按钮。


