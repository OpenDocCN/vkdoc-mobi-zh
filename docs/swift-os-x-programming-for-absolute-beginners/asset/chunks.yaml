    Figure 7-8.


    Running a switch statement that checks for multiple values'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n这个 `switch` 语句的示例尝试将一个值/变量/表达式与一个确切的值进行匹配。然而，`switch`\
    \ 语句也可以尝试匹配多个值。`switch` 语句有三种方式可以检查一个值的范围：\n\n*   显式地列出所有可能的值，用逗号分隔\n*   用三个点号（`...`）定义数字范围的起点和终点\n\
    *   用两个点号和一个小于号（`..<`）定义起始数字和结束范围\n\n当一个 `case` 语句列出所有用逗号分隔的值时，只有当 `switch` 的值/变量/表达式与这些值中的一个完全匹配时，其代码才会执行。例如，考虑下面的\
    \ `case` 语句：\n\n    switch whatNumber {\n        case 1, 2, 3: print(\"The number\
    \ is 1, 2, or 3\")\n        default: print(\"The number is undefined\")\n    }\n\
    \n只有当 `whatNumber` 的值是 1、2 或 3 时，它的代码才会打印 “The number is 1, 2, or 3。”\n\n对于少量数字，显式列出所有可能的值还可以接受，但对于多个数字，写出每一个可能的数字就会变得繁琐。作为一种快捷方式，Swift\
    \ 允许你指定一个范围。如果你想匹配 4 到 20 之间的数字，`switch` 语句的 `case` 部分可能如下所示：\n\n    switch whatNumber\
    \ {\n        case 4...20: print(\"The number is between 4 and 20\")\n        default:\
    \ print(\"The number is undefined\")\n    }\n\n在这种情况下，`whatNumber` 可以是 4、20 或介于它们之间的任何数字。三个点号表示一个范围，该范围包含起始和结束数字（4\
    \ 和 20）。\n\nSwift 还可以检查一个半开范围，它由两个点号和一个小于号组成，例如：\n\n    switch whatNumber {\n\
    \        case 20..<49: print(\"The number is between 20 and 48\")\n        default:\
    \ print(\"The number is undefined\")\n    }\n\n这个 `20..<49` 的半开范围仅在 `whatNumber`\
    \ 是 20、48 或介于它们之间的任何数字时才匹配。注意，如果 `whatNumber` 是 49，它将不匹配这个半开范围，但如果 `whatNumber`\
    \ 是 20，则会匹配。\n\n要了解多值匹配的这三种变体是如何工作的，请按照以下步骤操作：\n\n确保在 Xcode 中加载了 `BooleanPlayground`\
    \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar whatNumber: Int = 49\nswitch whatNumber\
    \ {\n    case 1, 2, 3: print(\"The number is 1\")\n        print(\"Isn’t this\
    \ amazing?\")\n    case 4...20: print(\"The number is between 4 and 20\")\n  \
    \  case 20..<49: print(\"The number is between 20 and 48\")\n    default: print(\"\
    The number is undefined\")\n}\n```\n\n当值为 49 时，`switch` 语句未匹配任何内容，因此它使用了 `switch`\
    \ 语句的 `default` 部分，如图 7-7 所示。\n\n![A978-1-4842-1233-2_7_Fig7_HTML.jpg](img/A978-1-4842-1233-2_7_Fig7_HTML.jpg)\n\
    \n**图 7-7.** 运行检查多个值的 switch 语句\n\n将 `whatNumber` 变量的值更改为 2、12 和 48，以查看 `switch`\
    \ 语句如何匹配不同的值。\n\n## 在枚举数据结构中使用 switch 语句\n\n`switch` 语句通常用于检查特定的值，例如字符串或数字。然而，`switch`\
    \ 语句的一个常见用途是与一种称为 `enum`（“enumeration”的缩写）的数据结构一起使用。`enum` 数据结构允许你创建一个由不同数据组成的列表，并为其赋予描述性名称，例如：\n\
    \n    enum dog {\n        case poodle\n        case collie\n        case terrier\n\
    \        case mutt\n    }\n\n上面的 `enum` 数据结构创建了一个名为 “dog” 的数据类型，它只能保存四个值之一：`poodle`、`collie`、`terrier`\
    \ 或 `mutt`。要使用 `enum` 数据结构，你需要创建一个变量或常量，例如：\n\n    var myPet = dog.collie\n\n\
    上面的代码定义了一个名为 “myPet” 的变量，并为其赋值为 `dog.collie`。如果你想检查 `myPet` 变量的值，你可以使用像这样的 `switch`\
    \ 语句：\n\n    switch myPet {\n        case .poodle:\n            print(\"Poodle\"\
    )\n        case .collie:\n            print(\"Collie\")\n        case .terrier:\n\
    \            print(\"Terrier\")\n        case .mutt:\n            print(\"Mutt\"\
    )\n    }\n\n要了解 `switch` 语句如何与 `enum` 数据结构一起工作，请按照以下步骤操作：\n\n确保在 Xcode 中加载了 `BooleanPlayground`\
    \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nenum dog {\n    case poodle\n    case collie\n\
    \    case terrier\n    case mutt\n}\nvar myPet = dog.collie\nswitch myPet {\n\
    \    case .poodle:\n        print(\"Poodle\")\n    case .collie:\n        print(\"\
    Collie\")\n    case .terrier:\n        print(\"Terrier\")\n    case .mutt:\n \
    \       print(\"Mutt\")\n}\n```\n\n`switch` 语句仅查看 `myPet` 变量持有的是由 `enum` 数据结构指定的哪一个可能的值。由于该值是\
    \ `.collie`，因此 `switch` 语句打印出 “Collie”，如图 7-8 所示。\n\n![A978-1-4842-1233-2_7_Fig8_HTML.jpg](img/A978-1-4842-1233-2_7_Fig8_HTML.jpg)\n\
    \n**图 7-8.** 运行检查多个值的 switch 语句\n"
- fmt: '# Making Decisions in an OS X Program


    Using playground files to test out Swift code can be fun and simple because it
    lets you focus solely on learning how Swift works without the interference of
    other parts of writing a program. However, eventually you’ll need to see how Swift
    code works outside of your playground file.


    In this sample program, the user needs to type an employee ID number and password.
    The employee ID number must fall within a range of 100 to 150 to be valid. The
    password must exactly match the string `"password"` (which isn’t a very secure
    password).


    That means we’ll be using two comparison operators to check if the name and password
    are valid. Then we’ll use a logical operator to make sure that both are valid.


    Create a new OS X project by following these steps:


    From within Xcode choose **File ➤ New ➤ Project**. Click **Application** under
    the OS X category. Click **Cocoa Application** and click the **Next** button.
    Xcode now asks for a product name. Click in the **Product Name** text field and
    type `BranchingProgram`. Make sure the **Language** pop-up menu displays Swift
    and that no check boxes are selected. Click the **Next** button. Xcode asks where
    you want to store the project. Choose a folder to store your project and click
    the **Create** button. Click the `MainMenu.xib` file in the Project Navigator.
    Click on the `BranchingProgram` icon to make the window of the user interface
    appear as shown in Figure 7-9.


    ![A978-1-4842-1233-2_7_Fig9_HTML.jpg](A978-1-4842-1233-2_7_Fig9_HTML.jpg)


    **Figure 7-9.** Making the window of the user interface visible


    Choose **View ➤ Utilities ➤ Show Object Library** to make the Object Library appear
    in the bottom right corner of the Xcode window. Drag two Labels, two Text Fields,
    and a Push Button on the user interface so it looks similar to Figure 7-10.


    ![A978-1-4842-1233-2_7_Fig10_HTML.jpg](A978-1-4842-1233-2_7_Fig10_HTML.jpg)


    **Figure 7-10.** Creating a basic user interface with labels, text fields, and
    a push button


    Click on the top label to select it. Then choose **View ➤ Utilities ➤ Show Attributes
    Inspector**. The Attributes Inspector pane appears in the upper right corner of
    the Xcode window as shown in Figure 7-11.


    ![A978-1-4842-1233-2_7_Fig11_HTML.jpg](A978-1-4842-1233-2_7_Fig11_HTML.jpg)


    **Figure 7-11.** The Attributes Inspector pane for a label


    Click in the **Title** text field and replace “Label” with “ID.” Press Return.
    Notice that the top label now displays the text “ID.” When you change a label’s
    Title property, you change the text that appears on that label. Let’s see a second
    and faster way to change the text on a label. Double-click on the second label.
    Xcode highlights your chosen label as shown in Figure 7-12.


    ![A978-1-4842-1233-2_7_Fig12_HTML.jpg](A978-1-4842-1233-2_7_Fig12_HTML.jpg)


    **Figure 7-12.** Double-clicking on a label lets you change the text without using
    the Attributes Inspector pane


    Type `Password` and press Return. Notice that the second label now displays Password.
    By double-clicking on a label, you can change text on that label without opening
    the Attributes Inspector pane. Click on the top text field and choose **View ➤
    Utilities ➤ Show Size Inspector**. The Size Inspector pane appears in the upper
    right corner of the Xcode window as shown in Figure 7-13.


    ![A978-1-4842-1233-2_7_Fig13_HTML.jpg](A978-1-4842-1233-2_7_Fig13_HTML.jpg)


    **Figure 7-13.** The Size Inspector pane


    Click in the **Width** text field and type `250`. Then press Return. Xcode expands
    the width of the text field. Click on the second text field so handles appear
    around it. Now drag the far right handle to the right until it aligns with the
    top text field as shown in Figure 7-14.


    ![A978-1-4842-1233-2_7_Fig14_HTML.jpg](A978-1-4842-1233-2_7_Fig14_HTML.jpg)


    **Figure 7-14.** Aligning a text field using the mouse


    Release the mouse button. Just as you can modify text on a label by using either
    the Attributes Inspector pane or double-clicking directly on that label, so can
    you modify the size of an item through the Size Inspector pane or by resizing
    that item with the mouse. Double-click on the Push Button to select it and type
    `Check Password`. Then press Return. Your completed interface should look similar
    to Figure 7-15.


    ![A978-1-4842-1233-2_7_Fig15_HTML.jpg](A978-1-4842-1233-2_7_Fig15_HTML.jpg)


    **Figure 7-15.** The completed user interface


    With this user interface, the user will type an ID (an integer) into the ID text
    field, a password (string) in the Password text field, and then click the Check
    Password button to see if the ID and password are valid. Once we have a user interface,
    the next step is to connect the user interface to Swift code using `IBOutlet`
    and `IBAction` methods.


    Remember, `IBOutlet` lets you retrieve or display information to a user interface.
    `IBAction` methods let the user interface make your program do something.


    In this example, we’ll need two `IBOutlet` variables to connect to each text field
    so we can retrieve the data the user types in. Then we’ll need one `IBAction`
    method to connect to the Check Password button. That way when the user clicks
    on the Check Password button, the `IBAction` method can verify the ID and password.


    To connect Swift code to your user interface, follow these steps:


    With your user interface still visible in the Xcode window, choose **View ➤ Assistant
    Editor ➤ Show Assistant Editor**. The `AppDelegate.swift` file appears next to
    the user interface as shown in Figure 7-16.


    ![A978-1-4842-1233-2_7_Fig16_HTML.jpg](A978-1-4842-1233-2_7_Fig16_HTML.jpg)


    **Figure 7-16.** The Assistant editor displays the user interface next to the
    `AppDelegate.swift` file


    Move the mouse over the top text field, hold down the Control key, and drag from
    the top text field to underneath the existing `@IBOutlet` line in the `AppDelegate.swift`
    file as shown in Figure 7-17.


    ![A978-1-4842-1233-2_7_Fig17_HTML.jpg](A978-1-4842-1233-2_7_Fig17_HTML.jpg)


    **Figure 7-17.** Control-dragging from the top text field to the `AppDelegate.swift`
    file


    Release the mouse and the Control key. A pop-up window appears as shown in Figure
    7-18.


    ![A978-1-4842-1233-2_7_Fig18_HTML.jpg](A978-1-4842-1233-2_7_Fig18_HTML.jpg)


    **Figure 7-18.** The pop-up window for defining an `IBOutlet`


    Click in the **Name** text field and type `IDfield` and click the **Connect**
    button. Xcode creates an `IBOutlet`. Move the mouse over the bottom text field,
    hold down the Control key, and drag the mouse underneath the `@IBOutlet` line
    in the `AppDelegate.swift` file. Release the mouse and the Control key. A pop-up
    window appears. Click in the **Name** text field and type `Passwordfield` and
    click the **Connect** button. Xcode creates another `IBOutlet`. You should now
    have two `IBOutlet`s that represent the two text fields on your user interface:


    ```swift

    @IBOutlet weak var IDfield: NSTextField!

    @IBOutlet weak var Passwordfield: NSTextField!

    ```


    Move the mouse over the Check Password push button, hold down the Control key,
    and drag the mouse above the last curly bracket in the `AppDelegate.swift` file
    as shown in Figure 7-19.


    ![A978-1-4842-1233-2_7_Fig19_HTML.jpg](A978-1-4842-1233-2_7_Fig19_HTML.jpg)


    **Figure 7-19.** Control-dragging from the push button to the `AppDelegate.swift`
    file


    Release the mouse and the Control key. A pop-up window appears. Click in the **Connection**
    pop-up menu and choose Action to create an `IBAction` method. Click in the **Name**
    text field and type `checkPassword`. Click in the **Type** pop-up menu and choose
    `NSButton` as shown in Figure 7-20.


    ![A978-1-4842-1233-2_7_Fig20_HTML.jpg](A978-1-4842-1233-2_7_Fig20_HTML.jpg)'
