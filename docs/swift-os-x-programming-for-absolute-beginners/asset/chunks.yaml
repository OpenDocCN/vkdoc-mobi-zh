    The following example defines two key:value pairs of data in a dictionary. Then
    it uses the 87 key to retrieve the value from the dictionary, which is the string
    “Valeria” as shown in Figure [9-6](#A978-1-4842-1233-2_9_Chapter.html#Fig6):


    ![A978-1-4842-1233-2_9_Fig6_HTML.jpg](A978-1-4842-1233-2_9_Fig6_HTML.jpg)


    Figure 9-6.


    Retrieving a value with a key and updating an existing key with new data


    `var DictionaryName = [102: "Fred", 87: "Valerie"]`


    `var name : String`


    `name = DictionaryName [87]!`


    `print (name)`


    Once you’ve stored a key:value pair in a dictionary, you can always assign a new
    value to an existing key using the updateValue command like this:


    `DictionaryName.updateValue(value, forKey: key)`


    So if you wanted to update the value stored with the 87 key, you could do the
    following:


    `DictionaryName.updateValue("Sam", forKey: 87)`


    To see how to retrieve a value from a dictionary using a key and then update a
    value for an existing key, follow these steps:


    Make sure the LoopingPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var DictionaryName = [102: "Fred", 87: "Valerie"]` `DictionaryName
    [120] = "John"` `DictionaryName [96] = "Jane"` `print (DictionaryName)` `var name
    : String` `name = DictionaryName [87]!` `print (name)` `DictionaryName.updateValue("Sam",
    forKey: 87)` `name = DictionaryName [87]!` `print (name)`  


    Notice that the first time the dictionary retrieves the value associated with
    the 87 key, it returns the string “Valerie.” Then the updateValue command replaces
    “Valerie” with “Sam” so the next time the dictionary retrieves the value associated
    with the 87 key, it returns the string “Sam” (see Figure [9-6](#A978-1-4842-1233-2_9_Chapter.html#Fig6)).


    ### Deleting Data in a Dictionary


    Once a dictionary contains key:value pairs, you can delete the value associated
    with a specific key by using the removeValueForKey command like this:


    `DictionaryName.removeValueForKey(key)`


    The removeValueForKey command removes both the key and the value associated with
    that key. Note that if you specify a key that doesn’t exist in the dictionary,
    the removeValueForKey command does nothing.


    If you want to delete all the key:value pairs in a dictionary, you can just use
    the removeAll command like this:


    `DictionaryName.removeAll()`'
