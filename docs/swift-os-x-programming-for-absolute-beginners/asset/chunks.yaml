    # 为什么要学习 Swift 并为 Macintosh 编程？


    无论你是一个完全零基础、想要踏入编程世界的新手，一位对编程有所了解但渴望深入学习的人，还是一位精通其他编程语言但不熟悉 Macintosh 编程的资深程序员，这本书都适合你。无论你的技能水平如何，本书都将帮助每个人理解如何使用苹果最新的编程语言
    `Swift` 来为 Macintosh 创建 OS X 程序。


    现在你可能会想，为什么要学习 `Swift`，又为什么要为 Macintosh 编程？答案很简单。


    首先，`Swift` 是苹果最新的编程语言，旨在比以往更快、更简单、更可靠地创建 OS X 和 iOS 程序。以前，你必须使用 `Objective-C`
    来创建 OS X 和 iOS 应用。虽然 `Objective-C` 功能强大，但它更难学习；读写起来更复杂；而且由于其复杂性，更容易在程序中引入错误或缺陷。


    另一方面，`Swift` 与 `Objective-C` 同样强大（实际上，你很快就会看到它更强大），更容易学习，读写起来也简单得多，同时还能最大程度地减少常见的编程错误。`Swift`
    为你提供了 `Objective-C` 的所有优点，而没有任何缺点。此外，`Swift` 还提供了 `Objective-C` 所不具备的特性，这使得 `Swift`
    在现在和将来都是更值得学习和使用的编程语言。由于 `Swift` 是苹果的官方编程语言，你可以肯定学习 `Swift` 将在现在和未来带来更大的机遇。


    其次，你可能会想为什么要学习创建 Macintosh 程序？毕竟，当前的热门趋势是学习为 iPhone、iPad 和 Apple Watch 创建 iOS
    应用。如果你计划开发软件，你肯定想使用 `Swift` 来创建 iOS 应用。


    然而，学习 `Swift` 意味着理解以下内容：


    - 编程原理，特别是面向对象编程

    - `Swift` 编程语言的语法

    - `Xcode` 的特性

    - 构成每一个 OS X 和 iOS 程序基础的苹果软件开发框架（称为 `Cocoa`）

    - 用户界面设计的原则


    听起来是不是要学很多东西？别担心。我们将一步步地讲解每个过程，这样你就不会感到迷茫。关键在于，要创建 OS X 程序和 iOS 应用，你需要学习多个主题，但创建
    iOS 应用会带来额外的挑战。


    例如，一个 iOS 应用除了要适应用户将 iPhone 或 iPad 向左、向右、上下颠倒或正向放置时的变化外，还需要响应单指、双指、滑动、摇晃和运动等触摸手势。


    相比之下，Macintosh 程序只需要响应键盘和鼠标输入。这意味着 OS X 程序创建和理解起来要简单得多，这也意味着学习用 `Swift` 创建 OS
    X 程序远比为 iOS 应用学习 `Swift` 要容易。


    最棒的是，其原理是完全相同的。你在创建 OS X 程序时学到的技能，与创建 iOS 应用所需的技能完全一样。区别在于，创建 OS X 程序比创建 iOS 应用要容易得多，不那么令人困惑，也远没有那么令人生畏。


    如果你一开始就尝试创建 iOS 应用，就像在你还不知道如何在水中屏住呼吸时就试图游过英吉利海峡一样。


    你不想不必要地让自己受挫。这就是为什么通过先学习 OS X 编程来掌握 iOS 应用编程的原理要容易得多。一旦你熟悉了 OS X 编程，你会发现将你的编程技能迁移到创建
    iOS 应用上是非常简单的。通过学习用 `Swift` 创建 OS X 程序，你将学到用 `Swift` 创建 iOS 应用所需的一切知识，同时你还将懂得如何创建
    OS X 程序，从而也能开拓日益增长的 Macintosh 市场。


    ## 追随有利可图的编程趋势


    新计算机平台的出现，总是为程序员带来了一个有利可图的时期。在 80 年代早期，最热门的平台是 Apple II 计算机。如果你想通过编写程序赚钱，你就为 Apple
    II 电脑用户编写程序来销售，就像当时的 MBA 研究生 Dan Bricklin 所做的那样，他编写了第一个电子表格程序 `VisiCalc`。


    随后，在 80 年代中期，随着 IBM PC 和 MS-DOS 的出现，下一个重大的计算平台转变发生了。许多人凭借 IBM PC 发家致富，包括比尔·盖茨和微软，后者从一家小型初创公司一跃成为全球最占主导地位的计算机公司。IBM
    PC 造就了成百上千的百万富翁，其中包括宝洁公司前营销总监 Scott Cook，他开发了广受欢迎的理财程序 `Quicken`。


    当微软从 MS-DOS 转向 Windows，并为 IBM PC 带来了友好的图形用户界面时，它帮助迎来了下一个计算机平台。编写 Windows 程序再次成为程序员和非程序员通过编写和销售自己的
    Windows 程序来发家致富的首要途径。微软利用向 Windows 的转型，发布了多款仅在 Windows 上运行的程序，如 Outlook、Access
    和 Excel，这些程序已成为商业世界的固定组成部分。


    如今，世界正转向由运行 OS X 和 iOS 的苹果产品组成的新计算平台。成千上万像你一样的人，正渴望开始编写程序，以利用 Macintosh 不断增长的市场份额，以及
    iPhone 和 iPad 在智能手机和平板电脑领域的统治地位，还有 Apple Watch 在可穿戴计算机市场中的机会。


    除了经验丰富的开发者之外，其他领域的业余爱好者、发烧友和专业人士也对编写自己特定领域的游戏、实用工具和商业软件感兴趣。


    许多程序员从对编程一无所知，到通过创建 iPhone/iPad 应用或 Macintosh 程序每天赚取数千美元。随着 Macintosh、iPhone、iPad
    以及现在的 Apple Watch 在全球范围内持续获得市场份额，越来越多的人将使用其中一种或多种产品，这为你增加了潜在的市场。


    这一切都意味着，现在正是你开始学习如何为你的 Macintosh 编程的绝佳时机，因为你越早理解 Macintosh 编程的基础知识，就能越早开始创建你自己的
    Macintosh 程序以及 iPhone/iPad/Apple Watch 应用。'
- fmt: '## What to Expect From This Book


    Whether you’re a complete novice or a seasoned programmer coming from another
    programming environment, this book will minimize technical jargon and focus on
    helping you understand what to do and why.


    If you just want to get started and learn the basics of programming in Swift,
    this book is for you. If you’re already an experienced Windows programmer and
    want to get started programming the Macintosh, this book can be especially helpful
    in teaching you the basics in a hurry.


    If you’ve never programmed before in your life, or if you’re already familiar
    with programming but not with Macintosh programming, then this book is for you.
    Even if you’re experienced with Macintosh programming, you may still find this
    book handy as a reference to help you achieve certain results without having to
    wade through several books to find an answer.


    You won’t learn everything you need to create your own super-sophisticated programs,
    but you’ll learn just enough to get started, feel comfortable using `Xcode`, and
    be able to tackle other programming books with more confidence and understanding.
    Fair enough? If so, then turn the page and let’s get started.


    **Note**


    All code in this book was tested using Swift 2 in `Xcode 7`. If you’re using `Xcode
    6`, some features in this book won’t work.


    ## Acknowledgments


    Thanks go to all the wonderful people at APress for giving me a chance to write
    about Swift, my latest favorite programming language for the `Macintosh`, `iPhone`,
    `iPad`, and `Apple Watch`.


    Additional thanks go to Dane Henderson and Elizabeth Lee ( [`www.echoludo.com`](http://www.echoludo.com)
    ) who share the airwaves with me on our radio show “Notes From the Underground”
    ( [`http://notesfromtheu.com`](http://notesfromtheu.com) ) on `KNSJ.org`. More
    thanks go to Chris Clobber, Diane Jean, Ikaika Patria and Robert Weems for letting
    me share their friendship and lunacy on another `KNSJ` radio show called “Laugh
    in Your Face,” ( [`http://www.laughinyourfaceradio.com`](http://www.laughinyourfaceradio.com)
    ) which combines comedy with political activism and commentary.


    A special mention goes towards Michael Montijo and his indomitable spirit that
    has him driving from Phoenix to Los Angeles once a month for the past fifteen
    years to meet with Hollywood executives. His cartoon show ideas, “Life of Mikey”
    and “Pachuko Boy,” will one day make it to television because he never gave up
    despite all the obstacles in his way.


    Thanks also go to my wife, Cassandra, and son, Jordan, for putting up with a house
    filled with more gadgets than actual living people. Final thanks go to my cats,
    Oscar and Mayer, for walking over the keyboard, knocking over laptops, and chewing
    on power cords at the most inconvenient times of the day.'
