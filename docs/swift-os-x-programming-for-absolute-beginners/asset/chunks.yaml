- fmt: "# 1. Understanding Programming\n\nProgramming is nothing more than writing\
    \ step-by-step instructions for a computer to follow. If you’ve ever written down\
    \ the steps for a recipe or scribbled directions for taking care of your pets\
    \ while you’re on vacation, you’ve already gone through the basic steps of writing\
    \ a program. The key is simply knowing what you want to accomplish and then making\
    \ sure you write the correct instructions that will tell someone how to achieve\
    \ that goal.\n\nAlthough programming is theoretically simple, it’s the details\
    \ that can trip you up. First, you need to know exactly what you want. If you\
    \ wanted a recipe for cooking chicken chow mein, following a recipe for cooking\
    \ baked salmon won’t do you any good.\n\nSecond, you need to write down every\
    \ instruction necessary to get you from your starting point to your desired result.\
    \ If you skip a step or write steps out of order, you won’t get the same result.\
    \ Try driving to a restaurant where your list of driving instructions omits telling\
    \ you when to turn on a specific road. It doesn’t matter if 99 percent of the\
    \ instructions are right; if just one instruction is wrong, you won’t get to your\
    \ desired goal.\n\nThe simpler your goal, the easier it will be to achieve it.\
    \ Writing a program that displays a calculator on the screen is far simpler than\
    \ writing a program to monitor the safety systems of a nuclear power plant. The\
    \ more complex your program, the more instructions you’ll need to write, and the\
    \ more instructions you need to write, the greater the chance you’ll forget an\
    \ instruction, write an instruction incorrectly, or write instructions in the\
    \ wrong order.\n\nProgramming is nothing more than a way to control a computer\
    \ to solve a problem, whether that computer is a laptop, smart phone, tablet,\
    \ or wearable watch. Before you can start writing your own programs, you need\
    \ to understand the basic principles of programming in the first place.\n\n**Note**:\
    \ Don’t get confused between learning programming and learning a particular programming\
    \ language. You can actually learn the principles of programming without touching\
    \ a computer at all. Once you understand the principles of programming, you can\
    \ easily learn any particular programming language such as `Swift`.\n\n## Programming\
    \ Principles\n\nTo write a program, you have to write instructions that the computer\
    \ can follow. No matter what a program does or how big it may be, every program\
    \ in the world consists of nothing more than step-by-step instructions for the\
    \ computer to follow, one at a time. The simplest program can consist of a single\
    \ line such as:\n\n`print (\"Hello, world\"!)`\n\nObviously, a program that consists\
    \ of a single line won’t be able to do much, so most programs consist of multiples\
    \ lines of instructions (or code) such as:\n\n`print (\"Hello, world!\")`\n`print\
    \ (\"Now the program is done.\")`\n\nThis two-line program starts with the first\
    \ line, follows the instructions on the second line, and then stops. Of course,\
    \ you can keep adding more instructions to a program until you have a million\
    \ instructions that the computer can follow sequentially, one at a time.\n\nListing\
    \ instructions sequentially is the basis for programming. Unfortunately, it’s\
    \ also limiting. For example, if you wanted to print the same message five times,\
    \ you could use the following:\n\n`print (\"Hello, world!\")`\n`print (\"Hello,\
    \ world!\")`\n`print (\"Hello, world!\")`\n`print (\"Hello, world!\")`\n`print\
    \ (\"Hello, world!\")`\n\nWriting the same five instructions is tedious and redundant,\
    \ but it works. What happens if you want to print this same message a thousand\
    \ times? Then you’d have to write the same instruction a thousand times.\n\nWriting\
    \ the same instruction multiple times is clumsy. To make programming easier, the\
    \ goal is to write the least number of instructions to get the most work done.\
    \ One way to avoid writing the same instruction multiple times is to organize\
    \ your instructions using a second basic principle of programming, which is called\
    \ a **loop**.\n\nThe idea behind a loop is to repeat one or more instructions\
    \ multiple times, but only by writing those instructions down once. A typical\
    \ loop might look like this:\n\n```\nfor i in 1...5 {\n    print (\"Hello, world!\"\
    )\n}\n```\n\nThe first line tells the computer to repeat the loop five times.\
    \ The second line tells the computer to print the message “Hello, world” on the\
    \ screen. The third line just defines the end of the loop.\n\nNow if you wanted\
    \ to make the computer print a message one thousand times, you don’t need to write\
    \ the same instruction a thousand times. Instead, you just need to modify how\
    \ many times the loop repeats such as:\n\n```\nfor i in 1...1000 {\n    print\
    \ (\"Hello, world!\")\n}\n```\n\nAlthough loops are slightly more confusing to\
    \ read and understand than a sequential series of instructions, loops make it\
    \ easier to repeat instructions without writing the same instructions multiple\
    \ times.\n\nMost programs don’t exclusively list instructions sequentially or\
    \ in loops, but use a combination of both such as:\n\n```\nprint (\"Hello, world!\"\
    )\nprint (\"Now the program is starting.\")\nfor i in 1...1000 {\n    print (\"\
    Hello, world!\")\n}\n```\n\nIn this example, the computer follows the first two\
    \ lines sequentially and then follows the last three lines repetitively in a loop.\
    \ Generally, listing instructions sequentially is fine when you only need the\
    \ computer to follow those instructions once. When you need the computer to run\
    \ instructions multiple times, that’s when you need to use a loop.\n\nWhat makes\
    \ computers powerful isn’t just the ability to follow instructions sequentially\
    \ or in a loop, but in making decisions. Decisions mean that the computer needs\
    \ to evaluate some condition and then, based on that condition, decide what to\
    \ do next.\n\nFor example, you might write a program that locks someone out of\
    \ a computer until that person types in the correct password. If the person types\
    \ the correct password, then the program needs to give that person access. However,\
    \ if the person types an incorrect password, then the program needs to block access\
    \ to the computer. An example of this type of decision making might look like\
    \ this:\n\n```\nif password == \"secret\" {\n    print (\"Access granted!\")\n\
    } else {\n    print (\"Login denied!\")\n}\n```"
  raw: '# 1. Understanding Programming


    Programming is nothing more than writing step-by-step instructions for a computer
    to follow. If you’ve ever written down the steps for a recipe or scribbled directions
    for taking care of your pets while you’re on vacation, you’ve already gone through
    the basic steps of writing a program. The key is simply knowing what you want
    to accomplish and then making sure you write the correct instructions that will
    tell someone how to achieve that goal.


    Although programming is theoretically simple, it’s the details that can trip you
    up. First, you need to know exactly what you want. If you wanted a recipe for
    cooking chicken chow mein, following a recipe for cooking baked salmon won’t do
    you any good.


    Second, you need to write down every instruction necessary to get you from your
    starting point to your desired result. If you skip a step or write steps out of
    order, you won’t get the same result. Try driving to a restaurant where your list
    of driving instructions omits telling you when to turn on a specific road. It
    doesn’t matter if 99 percent of the instructions are right; if just one instruction
    is wrong, you won’t get to your desired goal.


    The simpler your goal, the easier it will be to achieve it. Writing a program
    that displays a calculator on the screen is far simpler than writing a program
    to monitor the safety systems of a nuclear power plant. The more complex your
    program, the more instructions you’ll need to write, and the more instructions
    you need to write, the greater the chance you’ll forget an instruction, write
    an instruction incorrectly, or write instructions in the wrong order.


    Programming is nothing more than a way to control a computer to solve a problem,
    whether that computer is a laptop, smart phone, tablet, or wearable watch. Before
    you can start writing your own programs, you need to understand the basic principles
    of programming in the first place.


    Note


    Don’t get confused between learning programming and learning a particular programming
    language. You can actually learn the principles of programming without touching
    a computer at all. Once you understand the principles of programming, you can
    easily learn any particular programming language such as Swift.


    ## Programming Principles


    To write a program, you have to write instructions that the computer can follow.
    No matter what a program does or how big it may be, every program in the world
    consists of nothing more than step-by-step instructions for the computer to follow,
    one at a time. The simplest program can consist of a single line such as:


    `print ("Hello, world"!)`


    Obviously, a program that consists of a single line won’t be able to do much,
    so most programs consist of multiples lines of instructions (or code) such as:


    `print ("Hello, world!")`


    `print ("Now the program is done.")`


    This two-line program starts with the first line, follows the instructions on
    the second line, and then stops. Of course, you can keep adding more instructions
    to a program until you have a million instructions that the computer can follow
    sequentially, one at a time.


    Listing instructions sequentially is the basis for programming. Unfortunately,
    it’s also limiting. For example, if you wanted to print the same message five
    times, you could use the following:


    `print ("Hello, world!")`


    `print ("Hello, world!")`


    `print ("Hello, world!")`


    `print ("Hello, world!")`


    `print ("Hello, world!")`


    Writing the same five instructions is tedious and redundant, but it works. What
    happens if you want to print this same message a thousand times? Then you’d have
    to write the same instruction a thousand times.


    Writing the same instruction multiple times is clumsy. To make programming easier,
    the goal is to write the least number of instructions to get the most work done.
    One way to avoid writing the same instruction multiple times is to organize your
    instructions using a second basic principle of programming, which is called a
    loop.


    The idea behind a loop is to repeat one or more instructions multiple times, but
    only by writing those instructions down once. A typical loop might look like this:


    `for i in 1...5 {`


    `print ("Hello, world!")`


    `}`


    The first line tells the computer to repeat the loop five times. The second line
    tells the computer to print the message “Hello, world” on the screen. The third
    line just defines the end of the loop.


    Now if you wanted to make the computer print a message one thousand times, you
    don’t need to write the same instruction a thousand times. Instead, you just need
    to modify how many times the loop repeats such as:


    `for i in 1...1000 {`


    `print ("Hello, world!")`


    `}`


    Although loops are slightly more confusing to read and understand than a sequential
    series of instructions, loops make it easier to repeat instructions without writing
    the same instructions multiple times.


    Most programs don’t exclusively list instructions sequentially or in loops, but
    use a combination of both such as:


    `print ("Hello, world!")`


    `print ("Now the program is starting.")`


    `for i in 1...1000 {`


    `print ("Hello, world!")`


    `}`


    In this example, the computer follows the first two lines sequentially and then
    follows the last three lines repetitively in a loop. Generally, listing instructions
    sequentially is fine when you only need the computer to follow those instructions
    once. When you need the computer to run instructions multiple times, that’s when
    you need to use a loop.


    What makes computers powerful isn’t just the ability to follow instructions sequentially
    or in a loop, but in making decisions. Decisions mean that the computer needs
    to evaluate some condition and then, based on that condition, decide what to do
    next.


    For example, you might write a program that locks someone out of a computer until
    that person types in the correct password. If the person types the correct password,
    then the program needs to give that person access. However, if the person types
    an incorrect password, then the program needs to block access to the computer.
    An example of this type of decision making might look like this:


    `if password == "secret" {`


    `print ("Access granted!")`


    `} else {`


    `print ("Login denied!")`


    `}`'
  trans: "\n# 1. 理解编程\n\n编程无非就是为计算机编写其需遵循的逐步指令。如果你曾写下烹饪食谱的步骤，或草拟了度假期间照顾宠物的指南，那么你已经完成了编写程序的基本流程。关键在于，明确自己想要实现的目标，然后确保写出正确的指令，告诉他人如何实现该目标。\n\
    \n尽管编程在理论上很简单，但细节之处可能让人犯错。首先，你需要明确自己想要什么。如果你想要一道炒鸡丁的食谱，却照着烤三文鱼的指南操作，显然无济于事。\n\n\
    其次，你需要写出从起点到期望结果的每一步必要指令。如果跳过某个步骤或顺序写错，结果就会不同。试试看，开车去一家餐厅，但你的驾车指南里漏掉了在某个路口转弯的指示。即便\
    \ 99%的指令都正确，只要有一个错误，就无法到达目的地。\n\n目标越简单，实现起来就越容易。编写一个在屏幕上显示计算器的程序，远比编写一个监控核电站安全系统的程序简单。程序越复杂，需要编写的指令就越多；指令越多，就越容易遗漏、写错指令或搞错顺序。\n\
    \n编程不过是一种控制计算机解决问题的方式，无论这台计算机是笔记本电脑、智能手机、平板电脑还是智能手表。在开始编写自己的程序之前，你首先需要理解编程的基本原理。\n\
    \n**注意**：不要混淆学习编程和学习特定编程语言。实际上，你完全可以在不接触电脑的情况下学习编程原理。一旦理解了编程原理，你就能轻松学习任何特定编程语言，例如\
    \ `Swift`。\n\n## 编程原理\n\n要编写程序，你必须写出计算机能遵循的指令。无论程序做什么或有多大，世界上每一个程序都不过是计算机需要依次逐步遵循的指令集。最简单的程序可以只有一行，例如：\n\
    \n`print (\"Hello, world!\")`\n\n显然，只有一行的程序做不了太多事，因此大多数程序都包含多行指令（或称代码），例如：\n\n\
    `print (\"Hello, world!\")`\n`print (\"Now the program is done.\")`\n\n这个两行程序从第一行开始，执行第二行的指令后停止。当然，你可以不断向程序添加更多指令，直到拥有百万条计算机能依次执行的指令。\n\
    \n顺序列出指令是编程的基础。不幸的是，这也带来了局限性。例如，如果你想将同一消息打印五次，可以使用以下代码：\n\n`print (\"Hello, world!\"\
    )`\n`print (\"Hello, world!\")`\n`print (\"Hello, world!\")`\n`print (\"Hello,\
    \ world!\")`\n`print (\"Hello, world!\")`\n\n编写相同的五条指令既繁琐又多余，但确实有效。如果你想将同一消息打印一千次呢？那你必须将同一指令写上一千次。\n\
    \n多次编写相同的指令显得笨拙。为了让编程更简单，目标是以最少的指令完成最多的工作。避免重复编写指令的一种方法，是利用编程的第二个基本原则——**循环**。\n\
    \n循环的思想是重复执行一条或多条指令多次，但只需书写一次。一个典型的循环可能如下所示：\n\n```\nfor i in 1...5 {\n    print\
    \ (\"Hello, world!\")\n}\n```\n\n第一行告诉计算机重复该循环五次。第二行让计算机在屏幕上打印消息“Hello, world”。第三行定义循环的结束。\n\
    \n现在，如果你想让计算机打印消息一千次，无需写一千次相同指令，只需修改循环的重复次数即可，例如：\n\n```\nfor i in 1...1000 {\n\
    \    print (\"Hello, world!\")\n}\n```\n\n尽管循环在阅读和理解上比顺序指令略复杂，但它能让你无需重复编写相同指令即可轻松实现重复任务。\n\
    \n大多数程序并非仅使用顺序指令或循环，而是两者结合，例如：\n\n```\nprint (\"Hello, world!\")\nprint (\"Now\
    \ the program is starting.\")\nfor i in 1...1000 {\n    print (\"Hello, world!\"\
    )\n}\n```\n\n在此示例中，计算机先顺序执行前两行指令，然后通过循环重复执行最后三行指令。通常，当只需计算机执行一次指令时，顺序列出即可；当需要计算机重复执行指令时，就需要使用循环。\n\
    \n计算机的强大之处不仅在于能顺序执行或循环执行指令，更在于能够做出决策。决策意味着计算机需要评估某些条件，然后根据该条件决定下一步操作。\n\n例如，你可能编写一个程序，在用户输入正确密码前锁定计算机。如果用户输入了正确密码，程序需授予访问权限；但如果用户输入了错误密码，程序则应阻止其访问。这种决策的示例如下：\n\
    \n```\nif password == \"secret\" {\n    print (\"Access granted!\")\n} else {\n\
    \    print (\"Login denied!\")\n}\n```\n"
- fmt: '在这个例子中，计算机要求输入一个密码，当用户输入密码后，计算机会检查是否与单词“secret”匹配。如果匹配，则允许该用户访问计算机；如果用户没有输入“secret”，则拒绝访问。


    决策正是编程灵活性的体现。如果你编写一系列顺序指令，计算机每次都会以完全相同的方式执行这些指令。然而，如果你加入决策指令（也称为分支指令），计算机就可以根据用户的操作做出响应。


    以电子游戏为例。完全由顺序组织的指令编写的游戏是不可能的，因为那样游戏每次运行方式都完全相同。相反，电子游戏需要随时适应玩家的行为。如果玩家将物体向左移动，游戏需要做出与向右移动或角色被击败时不同的反应。使用分支指令赋予了计算机灵活应变的能力，使得程序永远不会以完全相同的方式运行两次。


    要编写计算机程序，你需要以下三种方式之一来组织指令，如图[1-1](#A978-1-4842-1233-2_1_Chapter.html#Fig1)所示：


    ![A978-1-4842-1233-2_1_Fig1_HTML.gif](A978-1-4842-1233-2_1_Fig1_HTML.gif)


    图 1-1. 编程的三种基本构建块


    - **顺序执行** – 计算机一条接一条地执行指令

    - **循环** – 计算机重复执行一条或多条指令

    - **分支** – 计算机根据外部数据选择执行一组或多组指令


    虽然简单的程序可能只采用顺序结构，但每个大型程序都会结合顺序、循环和分支来组织指令。编程更像是一门艺术而非科学的原因在于，编写程序没有唯一的最佳方法。事实上，完全有可能编写出两个行为完全相同的不同程序。


    由于没有唯一的“正确”方法来编写程序，所以只有一些指导原则能帮助你更轻松地编写程序。最终唯一重要的是你编写出一个能正常工作的程序。


    在编写任何程序时，通常存在两个常常相互排斥的目标。首先，程序员力求编写易于阅读、理解和修改的程序。这通常意味着编写多条指令来清晰地定义解决特定问题所需的步骤。


    其次，程序员试图编写能够高效执行任务、让程序运行尽可能快的程序。这通常意味着尽可能压缩多条指令，使用一些技巧或利用鲜为人知的特性，这些特性往往难以理解，甚至会让大多数其他程序员感到困惑。


    刚开始时，应努力让你的程序尽可能清晰、符合逻辑且易于理解，即使为此需要编写更多指令或更长的指令。随着你编程经验的不断丰富，你可以致力于创建最小、最快、最高效的程序，但请记住，你的最终目标是编写出能正常工作的程序。


    ## 结构化编程


    小程序指令较少，因此更容易阅读、理解和修改。不幸的是，小程序只能解决小问题。要解决复杂问题，你需要编写包含更多指令的大型程序。编写的指令越多，犯错（称为“bug”）的几率就越大。更糟糕的是，程序越大，就越难理解其工作原理，也就越难对其进行后续修改。


    为了避免编写单个庞大的程序，程序员通常将大型程序分解成较小的部分，称为子程序或函数。其核心理念是每个子程序只解决一个单一任务。这使得编写和确保其正确工作变得容易。


    一旦所有独立的函数都能正常工作，你就可以将它们连接在一起，构成一个大型程序，如图[1-2](#A978-1-4842-1233-2_1_Chapter.html#Fig2)所示。这就像用砖块盖房子，而不是试图从一块巨石中凿出整个房子。


    ![A978-1-4842-1233-2_1_Fig2_HTML.gif](A978-1-4842-1233-2_1_Fig2_HTML.gif)


    图 1-2. 将大型程序划分为多个子程序或函数有助于提高编程的可靠性


    将大型程序划分为多个小程序有许多好处。首先，编写较小的子程序快速且容易，并且小的子程序使得指令易于阅读、理解和修改。


    其次，子程序就像可以协同工作的构建块，因此多个程序员可以并行开发不同的子程序，然后将各自独立的子程序组合起来创建大型程序。


    第三，如果你想修改一个大型程序，只需要抽出、重写并替换一个或多个子程序即可。没有子程序的话，修改大型程序意味着要在庞大程序的所有指令中费力搜索，并试图找到需要修改的指令。


    子程序的第四个好处是，如果你编写了一个有用的子程序，你可以将其复用到其他程序中。通过创建一个经过测试的有用子程序库，你可以通过重用现有代码快速轻松地创建其他程序，从而减少从头编写一切的需要。


    当你将大型程序划分为多个子程序时，你有一个选择：你可以将所有子程序存储在一个文件中，也可以将每个子程序存储在单独的文件中，如图[1-3](#A978-1-4842-1233-2_1_Chapter.html#Fig3)所示。通过将子程序存储在单独的文件中，多个程序员可以同时处理不同的文件而互不影响。


    ![A978-1-4842-1233-2_1_Fig3_HTML.gif](A978-1-4842-1233-2_1_Fig3_HTML.gif)


    图 1-3. 你可以将子程序存储在一个文件或多个文件中


    将所有子程序存储在一个文件中，使得查找和修改程序的任何部分都很方便。然而，程序越大，你需要编写的指令就越多，这会使得在单个大文件中搜索变得像翻阅字典一样笨拙。


    将所有子程序存储在单独文件中意味着你需要跟踪哪个文件包含哪个子程序。但好处是，修改一个子程序要容易得多，因为一旦你打开了正确的文件，你看到的只是单个子程序的指令，而不是十几个或更多其他子程序的指令。


    鉴于当今的程序规模庞大，将其各个子程序分散存储在单独的文件中是常见的做法。'
  raw: 'In this example, the computer asks for a password and when the user types
    in a password, the computer checks to see if it matches the word “secret.” If
    so, then the computer grants that person access to the computer. If the user did
    not type “secret,” then the computer denies access.


    Making decisions is what makes programming flexible. If you write a sequential
    series of instructions, the computer will follow those lists of instructions exactly
    the same, every time. However, if you include decision-making instructions, also
    known as branching instructions, then the computer can respond according to what
    the user does.


    Consider a video game. No video game could be written entirely with instructions
    organized sequentially because then the game would play exactly the same way every
    time. Instead, a video game needs to adapt to the player’s actions at all times.
    If the player moves an object to the left, the video game needs to respond differently
    than if the player moves an object to the right or gets killed. Using branching
    instructions gives computers the ability to react differently so the program never
    runs exactly the same.


    To write a computer program, you need to organize instructions in one of the following
    three ways as graphically show in Figure [1-1](#A978-1-4842-1233-2_1_Chapter.html#Fig1):


    ![A978-1-4842-1233-2_1_Fig1_HTML.gif](A978-1-4842-1233-2_1_Fig1_HTML.gif)


    Figure 1-1.


    The three basic building blocks of programming


    *   Sequentially – the computer follows instructions one after another

    *   Loop – the computer repetitively follows one or more instructions

    *   Branching – the computer chooses to follow one or more group of instructions
    based on outside data


    While simple programs may only organize instructions sequentially, every large
    program organizes instructions sequentially, in loops, and in branches. What makes
    programming more of an art and less of a science is that there is no single best
    way to write a program. In fact, it’s perfectly possible to write two different
    programs that behave exactly the same.


    Because there is no single “right” way to write a program, there are only guidelines
    to help you write programs easily. Ultimately what only matters is that you write
    a program that works.


    When writing any program, there are two, often mutually exclusive goals. First,
    programmers strive to write programs that are easy to read, understand, and modify.
    This often means writing multiple instructions that clearly define the steps needed
    to solve a particular problem.


    Second, programmers try to write programs that perform tasks efficiently, making
    the program run as fast as possible. This often means condensing multiple instructions
    as much as possible, using tricks or exploiting little-known features that are
    difficult to understand and confusing even to most other programmers.


    In the beginning, strive toward making your programs as clear, logical, and understandable
    as possible, even if you have to write more instructions or type longer instructions
    to do it. Later as you gain more experience in programming, you can work on creating
    the smallest, fastest, most efficient programs possible, but remember that your
    ultimate goal is to write programs that just work.


    ## Structured Programming


    Small programs have fewer instructions so they are much easier to read, understand,
    and modify. Unfortunately, small programs can only solve small problems. To solve
    complicated problems, you need to write bigger programs with more instructions.
    The more instructions you type, the greater the chance you’ll make a mistake (called
    a “bug”). Even worse is that the larger a program gets, the harder it can be to
    understand how it works so that you can modify it later.


    To avoid writing a single, massive program, programmers simply divide a large
    program into smaller parts called subprograms or functions. The idea is that each
    subprogram solves a single task. This makes it easy to write and ensure that it
    works correctly.


    Once all of your separate functions work, then you can connect them all together
    to create a single large program as shown in Figure [1-2](#A978-1-4842-1233-2_1_Chapter.html#Fig2).
    This is like building a house out of bricks rather than trying to carve an entire
    house out of one massive rock.


    ![A978-1-4842-1233-2_1_Fig2_HTML.gif](A978-1-4842-1233-2_1_Fig2_HTML.gif)


    Figure 1-2.


    Dividing a large program into multiple subprograms or functions helps make programming
    more reliable


    Dividing a large program into smaller programs provides several benefits. First,
    writing smaller subprograms is fast and easy, and small subprograms make it easy
    to read, understand, and modify the instructions.


    Second, subprograms act like building blocks that work together, so multiple programmers
    can work on different subprograms, then combine their separate subprograms together
    to create a large program.


    Third, if you want to modify a large program, you just need to yank out, rewrite,
    and replace one or more subprograms. Without subprograms, modifying a large program
    means wading through all the instructions stored in a large program and trying
    to find which instructions you need to change.


    A fourth benefit of subprograms is that if you write a useful subprogram, you
    can plug that subprogram into other programs. By creating a library of tested,
    useful subprograms, you can create other programs quickly and easily by reusing
    existing code, thereby reducing the need to write everything from scratch.


    When you divide a large program into multiple subprograms, you have a choice.
    You can store all your programs in a single file, or you can store each subprogram
    in a separate file as shown in Figure [1-3](#A978-1-4842-1233-2_1_Chapter.html#Fig3).
    By storing subprograms in separate files, multiple programmers can work on different
    files without affecting anyone else.


    ![A978-1-4842-1233-2_1_Fig3_HTML.gif](A978-1-4842-1233-2_1_Fig3_HTML.gif)


    Figure 1-3.


    You can store subprograms in a single file or in multiple files


    Storing all your subprograms in a single file makes it easy to find and modify
    any part of your program. However, the larger your program, the more instructions
    you’ll need to write, which can make searching through a single large file as
    clumsy as flipping through the pages of a dictionary.


    Storing all of your subprograms in separate files means that you need to keep
    track of which files contain which subprogram. However, the benefit is that modifying
    a subprogram is much easier because once you open the correct file, you only see
    the instructions for a single subprogram, not for a dozen or more other subprograms.


    Because today’s programs can get so large, it’s common to divide its various subprograms
    in separate files.'
