    selected user interface item. If you choose the options in the bottom half of
    the window, you’ll affect all user interface items whether on the currently displayed
    window whether you selected them or not.


    Remember, adding constraints can be a trial and error process of defining a constraint
    and seeing how it works before modifying or deleting it altogether. As you add
    constraints, Xcode displays constraint lines around your user interface item.
    If Xcode doesn’t think you have enough constraints, all constraints on that item
    will appear as orange. The moment Xcode thinks you have enough constraints on
    an item, the constraints will appear in blue.


    To see how constraints work with user interface items, follow these steps:


    Make sure your WindowProgram project is loaded in Xcode.   Click the MainMenu.xib
    in the Project Navigator pane.   Click the Window icon to make the user interface
    window visible.   Choose View ➤ Utilites ➤ Show Object Library. The Object Library
    appears in the bottom right corner of the Xcode window.   Drag a Push Button item
    from the Object Library and place it anywhere on your window.   Move the mouse
    pointer over the Push Button that you just placed on the window.   Hold down the
    Control key and drag the mouse to the right until the entire window turns blue.
    Then let go of the Control key and the mouse. A pop-up menu appears (see Figure
    [13-19](#A978-1-4842-1233-2_13_Chapter.html#Fig19)).   Choose Trailing Space to
    Container. Xcode displays a constraint between the edge of the window and the
    right edge of the push button as shown in Figure [13-22](#A978-1-4842-1233-2_13_Chapter.html#Fig22).


    ![A978-1-4842-1233-2_13_Fig22_HTML.jpg](A978-1-4842-1233-2_13_Fig22_HTML.jpg)


    Figure 13-22.


    Connecting a constraint to a window edge  Choose Product ➤ Run. Your window appears
    in the initial position you defined earlier.   Move the window to the center of
    the screen and resize the right edge. Notice that when you resize the right edge
    of the window, the button moves its position at the same time.   Choose WindowProgram
    ➤ Quit WindowProgram.'
