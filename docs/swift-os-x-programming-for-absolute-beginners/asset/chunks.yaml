- fmt: '### Join Social Networks


    Giving away free, useful information in your blog or as PDF files can help establish
    you as an authority in your field. However, a blog requires that someone visits
    your site and a PDF file requires someone download that file. Another way to share
    useful information for free is to stay in constant contact with popular social
    networks.


    Find out which social networks your potential customers visit and join those networks.
    Now as people post questions, jump in and answer them with useful advice. The
    purpose is to answer people’s questions and establish yourself as trustworthy.
    Then make sure each post you make includes a link back to your web site or blog.


    Visiting social networks lets you reach potential customers far faster than hoping
    they’ll visit your blog or find your PDF file. Just make sure you provide useful
    information instead of thinly disguised advertising copy that will simply annoy
    others. The more people learn to trust you on a social network, the more likely
    they’ll also visit your web site/blog.


    With all of these techniques, the goal isn’t to get someone to buy your product
    right away (although that’s always nice). The real goal is to draw them one step
    closer toward learning more about you and your product. The more people know about
    your product, the more likely they’ll buy from you.


    Advertising and marketing is basically a numbers game. Keep helping others for
    free in ways that don’t take up much time or money, and you’ll eventually find
    that others will find you and buy your software. The more you help others, the
    more others will trust and buy from you.


    The old way of marketing and advertising involves trying to force people to listen
    to ads and buy against their will (which is why so many people dislike marketing
    and advertising). The new way of marketing and advertising is to give potential
    customers something of value before you ask them to buy from you.


    ## Summary


    Most programmers focus on increasing their technical knowledge of programming.
    While knowing as much as possible about Swift’s features and the Cocoa framework
    can always be helpful, technical knowledge alone is rarely enough.


    Programming involves more than just writing code. Before you even start writing
    Swift code, you need to make sure there’s a market for your program. Rather than
    try to compete against big companies, look for niche markets that big companies
    are ignoring, or look for ways your program can supplement programs offered by
    a big company. Big companies have far more resources that they can use to crush
    any direct competitors, so by targeting a niche market or a way to supplement
    their own products, you can avoid directly competing with a much bigger company.


    Before you start writing Swift code, create prototypes of your software’s user
    interface. Although user interface design may not sound as appealing to programmers
    as digging into the intricacies of writing code, it’s a vital part of any software
    project. The user interface determines how people view your program. A well-designed
    user interface can make your program easier to use. A poorly designed user interface
    can make a program seem harder to use, despite any technical features it may offer.


    Test your user interface designs as quickly and cheaply as possible using paper
    and pencil. When you need to create an interactive version of your user interface,
    create simple mock-ups using presentation software such as Keynote or PowerPoint,
    or consider buying special mock-up construction software.


    When you have a final user interface design, create it in Xcode. Just remember
    that as your program continues to evolve, you’ll likely still need to make changes
    to your user interface.


    Finally, when your program is complete, your work still isn’t done. You’ll still
    need to advertise and market your software. Rather than spend money buying ads,
    it’s far less expensive and often more effective to pursue free options instead.


    Start a blog, give away free information, and provide something of value to others.
    The more you give to others, the more likely others will be attracted to your
    product and buy from you.


    As you can see, coding is just one stage of creating and marketing software. Technical
    knowledge can create software, but you still need additional skills before and
    after coding to properly design your program and successfully sell it afterwards.'
