    \ like this:\n\n`setOne.isEmpty`\n\nThe `isSubsetOf` command checks if one set\
    \ contains items that are also contained in a second set. Only if this second\
    \ set contains every item from the first set is it considered a subset.\n\nThe\
    \ `isSupersetOf` command checks if one set is larger and contains all the same\
    \ items as a smaller set. Only if this first set is larger and has all its items\
    \ stored in the second set is it considered a superset.\n\nThe `isDisjointWith`\
    \ command compares two sets. If they have no items in common, then this command\
    \ returns `true`. Otherwise it returns `false`.\n\nTo see how to query a set,\
    \ follow these steps:\n\n1. Make sure the `SetPlayground` file is loaded in Xcode.\
    \  \n2. Edit the code as follows:\n\n```swift\nimport Cocoa\nvar mySet = Set([\"\
    Fred\", \"Cindy\", \"Jody\", \"Grant\"])\nprint (mySet.isEmpty)\nmySet.count\n\
    mySet.removeAll()\nprint (mySet.isEmpty)\nvar myNewSet = Set([\"John\", \"Oscar\"\
    ])\nvar myOtherSet = Set([\"John\", \"Oscar\", \"Sally\"])\nvar myThirdSet = Set([\"\
    Rick\", \"Vinny\"])\nmyNewSet.isSubsetOf(myOtherSet)\nmyOtherSet.isSupersetOf(myNewSet)\n\
    myNewSet.isDisjointWith(myThirdSet)\n```\n\nThis code creates a set that holds\
    \ four strings. It uses the `isEmpty` command to check if the set is empty (`false`).\
    \ Then it counts the set (it has 4 items). Finally, it removes all the items from\
