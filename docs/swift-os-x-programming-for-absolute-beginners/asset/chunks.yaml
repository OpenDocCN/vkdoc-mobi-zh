    This guard statement would do nothing if the Boolean condition (myAge > 21) is
    true. Otherwise it would throw the ageError.underAge error where “ageError” is
    the name of the enum that lists different errors to identify and “underAge” is
    one of the possible errors likely to occur.


    The guard statement always defines acceptable behavior (myAge > 21) or else it
    identifies an error with the throw keyword. A function (identified with the throws
    keyword) can have one or more guard statements.


    ### Handling the Error


    When you’ve identified one or more functions with the throws keyword where it
    uses one or more guard statements to identify possible errors, you finally need
    a way to handle those errors. In Swift you do that using a do-try-catch statement
    like this:


    `do {`


        `try callFunctionThatThrows`


    `} catch enumName.descriptiveError {`


        `// Code to handle the error`


    `}`


    The do-try-catch statement tries to run a function that can identify errors using
    the throws keyword. If the function doesn’t identify any errors with one or more
    guard statements, then the do-try-catch statement works exactly like a normal
    function call.


    However if the function identifies an error, the do-try-catch statement is where
    you need to write code to handle that error. How you handle this error can be
    as simple as printing a message to let you know of a problem or as complicated
    as running an entirely new set of code just to deal with the problem.


    The point is that if you anticipate possible errors and write code to handle those
    errors, your program will be less likely to crash. If your program does crash,
    simply find out why (which may not be easy), create a new descriptive error name
    to identify it, and then create a new catch statement to deal with that error.


    Let’s see how error handling works:


    Make sure the DefensePlayground is loaded into Xcode.   Edit the playground code
    as follows: `import Cocoa` `enum ageError : ErrorType {`     `case negativeAge
    // Negative numbers`     `case unrealAge   // Numbers > 140`     `case underAge    //
    Under 21` `}` `func checkAge(myAge : Int) throws {`     `print (myAge)`     `guard
    myAge > 0 else {`         `throw ageError.negativeAge`     `}`     `guard myAge
    <= 140 else {`         `throw ageError.unrealAge`     `}`     `guard myAge > 21
    else {`         `throw ageError.underAge`     `}` `}` `var oldAge = -9` `do {`
        `try checkAge (oldAge)` `} catch ageError.negativeAge {`     `print ("An age
    can’t be a negative number")` `} catch ageError.unrealAge {`     `print ("An age
    can’t be greater than 140")` `} catch ageError.underAge {`     `print ("Sorry,
    you have to be 21 or older")` `}` `print (oldAge)`  


    Notice how a negative number gets identified and handled with a simple message
    as shown in Figure [21-8](#A978-1-4842-1233-2_21_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_21_Fig8_HTML.jpg](A978-1-4842-1233-2_21_Fig8_HTML.jpg)


    Figure 21-8.


    Error handling involves an enum, a function with guard statements, and a do-try-catch
    statement


    Change the value of the oldAge variable to 250 to see how the do-try-catch statement
    catches that number as higher than 140, which makes it unrealistic. Change the
    value of the oldAge variable to 15 to see how the do-try-catch statement identifies
    an age under 21.


    To use error handling in your programs, you must first identify possible problems,
    then you need to decide how to handle these problems. Error handling can only
    identify errors you already know about, but it can make your programs less fragile
    when confronted with common types of problems your program may face.


    ## Summary


    No matter how talented, skilled, or educated you may be as a programmer, you will
    make mistakes occasionally. Sometimes those mistakes will be simple errors you
    can easily correct, but sometimes you’ll make mistakes that cause a variety of
    subtle problems that will challenge and frustrate you to find and fix. That’s
    just the nature of programming.


    However, any problems you accidentally create are also problems you can learn
    to discover and fix. Once you learn how one mistake works, you’ll likely remember
    how to fix those types of mistakes in the future if you or someone else makes
    them again. That frees you up to make new mistakes you’ll likely never have experience
    facing again.


    The best way to reduce errors in your program is to examine your code carefully
    and assume nothing will go right. Then look for every possible way to make sure
    it can’t go wrong. The more you code with a defensive mindset, the more likely
    you’ll prevent problems before they occur.


    Programming is more of an art than a science, so learn the best ways that work
    for you to reduce introducing errors in your programs. When experimenting with
    new code, it’s usually safer to test it out in a Swift playground or in a simple
    program separate from your real program.


    That way you can isolate and test your code safely. When it works, then you can
    copy and paste it into your program.


    Errors are a way of life in the world of programming. Ideally you want to spend
    more time writing code and less time debugging it.


    # 22. Simplifying User Interface Design


    Designing a user interface can be challenging. Not only do you need to design
    a user interface that’s easy to use, but you also need to design an adaptive user
    interface that can respond to any changes the user might make to a window’s size.
    If the user shrinks a window, your user interface must shrink accordingly without
    cutting any items off. If the user enlarges a window, your user interface must
    expand accordingly to maintain a consistent appearance.


    To help create adaptive user interfaces, Xcode provides constraints that fix the
    edges of various user interface items to a window’s edge or the edge of other
    user interface items. In this chapter, you’ll learn more about constraints and
    storyboards to help make user interface design easier than ever before.'
  trans: "\n### 创建错误识别函数\n\n在创建描述性错误类型列表后，现在需要创建一个或多个你认为可能发生错误的函数。通常你会像下面这样定义一个函数：\n\
    \n```\nfunc functionName () {\n    // 代码写在这里\n}\n```\n\n为了让函数能够识别错误，你需要像这样插入 `throws`\
    \ 关键字：\n\n```\nfunc functionName () throws {\n    // 代码写在这里\n}\n```\n\n如果函数有返回值，`throws`\
    \ 关键字应放在返回值数据类型之前，如下所示：\n\n```\nfunc functionName () throws -> dataType {\n  \
    \  // 代码写在这里\n}\n```\n\n`throws` 关键字意味着该函数会“抛出”错误，交由代码的其他部分来处理。在包含 `throws` 关键字的函数内部，你需要使用一个或多个\
    \ `guard` 语句。\n\n`guard` 语句用于识别允许的情况，其工作原理类似于 `if-else` 语句。如果 `guard` 语句的布尔条件为\
    \ `true`，则不执行任何操作。但如果 `guard` 语句的条件为 `false`，则 `guard` 语句可以使用 `throw` 关键字来识别特定类型的错误，如下所示：\n\
    \n```\nguard 布尔条件 else {\n    throw 枚举名称.描述性错误\n}\n```\n\n如果只想允许大于 21 的值，你可以创建如下的\
    \ `guard` 语句：\n\n```\nguard myAge > 21 else {\n    throw ageError.underAge\n}\n\
    ```\n\n如果布尔条件 (`myAge > 21`) 为 `true`，该 `guard` 语句不会执行任何操作。否则，它会抛出 `ageError.underAge`\
    \ 错误，其中 `ageError` 是用于列出不同错误的枚举名称，而 `underAge` 是可能发生的错误之一。\n\n`guard` 语句总是定义可接受的行为\
    \ (`myAge > 21`)，否则它会通过 `throw` 关键字识别错误。一个带有 `throws` 关键字的函数可以包含一个或多个 `guard`\
    \ 语句。\n\n### 处理错误\n\n在识别出一个或多个带有 `throws` 关键字的函数，并且这些函数使用了一个或多个 `guard` 语句来识别可能的错误之后，最后还需要一种方法来处理这些错误。在\
    \ Swift 中，你可以使用 `do-try-catch` 语句来实现，如下所示：\n\n```\ndo {\n    try 调用会抛出错误的函数\n\
    } catch 枚举名称.描述性错误 {\n    // 处理错误的代码\n}\n```\n\n`do-try-catch` 语句会尝试运行一个可以使用 `throws`\
    \ 关键字识别错误的函数。如果该函数没有通过 `guard` 语句识别出任何错误，那么 `do-try-catch` 语句的执行效果就与普通函数调用完全一样。\n\
    \n但是，如果函数识别出了错误，你就需要在 `do-try-catch` 语句中编写代码来处理该错误。处理错误的方式可以很简单，比如打印一条消息来提示问题，也可以很复杂，比如运行一整套全新的代码来处理问题。\n\
    \n关键在于，如果你能预判可能的错误并编写代码加以处理，你的程序就不太可能崩溃。如果程序确实崩溃了，只需找出原因（这可能并不容易），创建一个新的描述性错误名称来标识它，然后创建一个新的\
    \ `catch` 语句来处理该错误。\n\n让我们看看错误处理如何工作：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑\
    \ playground 代码：\n\n```\nimport Cocoa\n\nenum ageError : ErrorType {\n    case\
    \ negativeAge // 负数\n    case unrealAge   // 大于 140 的数\n    case underAge    //\
    \ 小于 21 岁\n}\n\nfunc checkAge(myAge : Int) throws {\n    print (myAge)\n    guard\
    \ myAge > 0 else {\n        throw ageError.negativeAge\n    }\n    guard myAge\
    \ <= 140 else {\n        throw ageError.unrealAge\n    }\n    guard myAge > 21\
    \ else {\n        throw ageError.underAge\n    }\n}\n\nvar oldAge = -9\n\ndo {\n\
    \    try checkAge (oldAge)\n} catch ageError.negativeAge {\n    print (\"年龄不能是负数\"\
    )\n} catch ageError.unrealAge {\n    print (\"年龄不能大于 140\")\n} catch ageError.underAge\
    \ {\n    print (\"抱歉，你必须年满 21 岁或以上\")\n}\n\nprint (oldAge)\n```\n\n注意，如图 21-8\
    \ 所示，负数是如何被识别并通过一条简单消息处理的。\n\n![A978-1-4842-1233-2_21_Fig8_HTML.jpg](img/A978-1-4842-1233-2_21_Fig8_HTML.jpg)\n\
    \n**图 21-8.** 错误处理包含一个枚举、一个带有 guard 语句的函数以及一个 do-try-catch 语句\n\n将 `oldAge` 变量的值改为\
    \ 250，观察 `do-try-catch` 语句如何将该数字捕获为大于 140（这意味着不现实）。将 `oldAge` 变量的值改为 15，观察 `do-try-catch`\
    \ 语句如何识别出小于 21 的年龄。\n\n要在程序中使用错误处理，首先必须识别可能的问题，然后需要决定如何处理这些问题。错误处理只能识别你已经知道的错误，但它可以使你的程序在面对可能遇到的常见问题时更不易出错。\n\
    \n## 总结\n\n无论你作为程序员多么有天赋、有技巧或受过多少教育，偶尔总会犯错。有时这些错误是很容易纠正的简单错误，但有时你犯的错误会导致各种细微的问题，这些问题会给你的查找和修复带来挑战和挫败感。这本身就是编程的本质。\n\
    \n然而，你无意中造成的任何问题，也是你可以学会发现和修复的问题。一旦你学会了某种错误的产生机制，你很可能就会记住将来如何修复这类错误，无论将来是你自己还是其他人再次犯下这些错误。这样你就能腾出手来，去犯那些你可能从未遇到过的新错误。\n\
    \n减少程序错误的最佳方法是仔细检查代码，并且假定任何事情都不会一帆风顺。然后，寻找所有可能的方法，确保它不可能出错。你越是以防御性思维编写代码，就越有可能在问题发生之前就将其预防。\n\
    \n编程更像是一门艺术而非科学，所以请学习最适合你的方法，以减少在程序中引入错误。在尝试新代码时，通常更安全的做法是在 Swift playground 或一个独立于你实际程序的简单程序中对其进行测试。\n\
    \n这样，你就可以安全地隔离和测试代码。当代码正常工作后，再将其复制粘贴到你的程序中。\n\n错误是编程世界中的常态。理想情况下，你希望花更多时间编写代码，而花更少时间调试代码。\n\
    \n# 简化用户界面设计\n\n设计用户界面可能具有挑战性。你不仅需要设计一个易于使用的用户界面，还需要设计一个自适应用户界面，能够响应用户对窗口大小所做的任何更改。如果用户缩小窗口，你的用户界面必须相应缩小，且不裁剪任何元素。如果用户放大窗口，你的用户界面必须相应扩展，以保持外观的一致。\n\
    \n为了帮助创建自适应用户界面，Xcode 提供了约束，可以将各种用户界面元素的边缘固定到窗口边缘或其他用户界面元素的边缘。在本章中，你将了解更多关于约束和\
    \ storyboard 的知识，这将帮助用户界面设计变得比以往任何时候都更加简单。\n"
- fmt: '# Using Stack View


    If your user interface contains a handful of items such as a text field, a button,
    and a label, it’s fairly straightforward to place constraints on these items so
    they stay in the correct place. However, if your user interface contains multiple
    items, then it can get messy to place so many constraints on each item. Change
    one constraint and your entire user interface can fail to adapt properly, which
    often means wasting time trying to get your multiple constraints working. Figure
    [22-1](#A978-1-4842-1233-2_22_Chapter.html#Fig1) shows how messy multiple constraints
    can look on a crowded user interface.


    ![A978-1-4842-1233-2_22_Fig1_HTML.jpg](A978-1-4842-1233-2_22_Fig1_HTML.jpg)


    Figure 22-1. Multiple constraints make it hard to correctly lay out a user interface


    To solve this problem, Xcode offers a feature called Stack View. The idea behind
    stack view is that groups of user interface items often need to stay together.
    Rather than set constraints for each item individually, you group them together
    in a stack view, then set constraints for that single stack view.


    To see how to create and use a stack view, follow these steps:


    - Choose `Editor` ➤ `Embed In` ➤ `Stack View` (or click the Stack View icon in
    the bottom right corner of the middle Xcode pane). Xcode groups your selected
    items inside a single stack view.

    - Move the mouse pointer over the stack view of three check boxes, hold down the
    `Control` key, and drag the mouse toward the right edge of the window.

    - Release the `Control` key and the mouse button. A pop-up window appears.

    - Choose `Trailing Space to Container`. Xcode displays the constraint for the
    entire stack view.

    - Move the mouse pointer over the stack view of three check boxes, hold down the
    `Control` key, and drag the mouse toward the bottom edge of the window.

    - Release the `Control` key and the mouse button. A pop-up window appears.

    - Choose `Bottom Space to Container`. Xcode displays the constraint for the entire
    stack view.

    - Choose `Product` ➤ `Run`. The program’s user interface appears.

    - Drag the bottom right corner of the window to shrink and enlarge the window.
    Notice that as you change the width and height of the window, the stack of three
    check boxes all move together as a group.

    - Choose `StackViewProgram` ➤ `Quit StackViewProgram`.

    - From within Xcode choose `File` ➤ `New` ➤ `Project`.

    - Click `Application` under the `OS X` category.

    - Click `Cocoa Application` and click the `Next` button. Xcode now asks for a
    product name.

    - Click in the `Product Name` text field and type `StackViewProgram`.

    - Make sure the `Language` pop-up menu displays `Swift` and that no check boxes
    are selected.

    - Click the `Next` button. Xcode asks where you want to store the project.

    - Choose a folder to store your project and click the `Create` button.

    - Click the `MainMenu.xib` file in the Project Navigator.

    - Click on the window icon in the pane that appears to the right of the Project
    Navigator pane. Your program’s user interface appears.

    - Choose `View` ➤ `Utilities` ➤ `Show Object Library`. The Object Library appears
    in the bottom right corner of the Xcode window.

    - Drag three check boxes on to the user interface window so they appear stacked
    on top of each other. Notice that unless you precisely align each check box, they
    won’t appear organized.

    - Drag the mouse to select all three check boxes as shown in Figure [22-2](#A978-1-4842-1233-2_22_Chapter.html#Fig2).
    (Another way to select multiple items is to hold down the `Shift` key and click
    on each item you want to select.)


    ![A978-1-4842-1233-2_22_Fig2_HTML.jpg](A978-1-4842-1233-2_22_Fig2_HTML.jpg)


    Figure 22-2. Dragging is a fast way to select multiple items


    By using a stack view, you can keep grouped items together and only use one set
    of constraints for the entire group rather than exhaustively place constraints
    on each item individually.


    # Fixing Constraint Conflicts


    Ideally, constraints should keep items a specific distance from the edge of the
    window or the edge of another user interface item. However if you shrink or expand
    a window, it’s possible for constraints to create unexpected problems.


    Let’s see how setting two constraints on a user interface item can create a problem:


    - Make sure the `StackViewProgram` project is loaded in Xcode.

    - Click on the `MainMenu.xib` file in the Project Navigator pane.

    - Click on the window icon in the pane that appears to the right of the Project
    Navigator pane. Your program’s user interface appears.

    - Choose `Edit` ➤ `Select All` (or press `Command+A`). Xcode selects your stack
    view that’s currently on the user interface window.

    - Press the `Delete` key on your keyboard, or choose `Edit` ➤ `Delete` to delete
    all user interface items from the window.

    - Choose `View` ➤ `Utilities` ➤ `Show Object Library`.

    - Drag a single text field in the middle of the user interface window. (Don’t
    worry about the exact positioning.)

    - Move the mouse pointer over the text field, hold down the `Control` key, and
    drag the mouse to the right edge of the window.

    - Release the `Control` key and the mouse. A pop-up window appears.

    - Choose `Trailing Space to Container`. Xcode creates a constraint from the right
    edge of the text field to the right edge of the window.

    - Move the mouse pointer over the text field, hold down the `Control` key, and
    drag the mouse to the left edge of the window.

    - Release the `Control` key and the mouse. A pop-up window appears.

    - Choose `Leading Space to Container`. Xcode creates a constraint from the left
    edge of the text field to the left edge of the window.

    - Choose `Product` ➤ `Run`. The user interface window appears.

    - Move the mouse pointer over the right edge of the window and expand the window
    width by dragging the mouse to the right. Notice that the text field expands to
    the right.

    - Move the mouse pointer over the right edge of the window and shrink the window
    width by dragging the mouse to the left. Notice that the text field shrinks. If
    you keep shrinking the window width, the text field eventually disappears altogether,
    which is probably not what you want.

    - Choose `StackViewProgram` ➤ `Quit StackViewProgram`.


    Right now we have two constraints that keep the text field a fixed distance from
    the two window edges, but they do nothing to keep the text field from disappearing
    if the window shrinks too much. One way to fix this is to create a compression
    constraint.


    A compression constraint keeps a user interface item from shrinking or expanding
    too much. To create a compression constraint, you hold down the `Control` key
    and drag the mouse within the boundaries of that user interface element.


    - Choose `Product` ➤ `Run`. The user interface window appears.

    - Move the mouse pointer over the right edge of the window and try dragging the
    window to expand or shrink its width. Notice that you can’t do that because of
    the compression constraint.

    - Choose `StackViewProgram` ➤ `Quit StackViewProgram`.

    - Choose `Width`. Xcode displays a compression constraint underneath the text
    field as shown in Figure [22-4](#A978-1-4842-1233-2_22_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_22_Fig4_HTML.jpg](A978-1-4842-1233-2_22_Fig4_HTML.jpg)


    Figure 22-4. A compression constraint appears underneath a user interface item


    - Make sure the `StackViewProgram` project is loaded in Xcode.

    - Click on the `MainMenu.xib` file in the Project Navigator pane.

    - Move the mouse pointer over the text field.

    - Hold down the `Control` key and drag the mouse to the left or right, keeping
    the mouse pointer within the boundary of the text field.

    - Release the `Control` key and the mouse. A pop-up menu appears as shown in Figure
    [22-3](#A978-1-4842-1233-2_22_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_22_Fig3_HTML.jpg](A978-1-4842-1233-2_22_Fig3_HTML.jpg)


    Figure 22-3. Defining a compression constraint'
