  trans: '

    # 19. 创建下拉菜单


    电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1233-2_19](http://dx.doi.org/10.1007/978-1-4842-1233-2_19)）包含补充材料，仅供授权用户使用。


    下拉菜单是与 OS X 程序交互的标准方式。虽然你的程序可以显示按钮来表示命令，但按钮过多会使屏幕显得杂乱。为了避免在屏幕上挤入过多按钮，可以将相关命令分组到多个下拉菜单中。默认情况下，Xcode
    为每个 OS X 项目创建以下下拉菜单标题：


    - **文件** – 显示用于打开、保存、创建和打印的命令。

    - **编辑** – 显示用于复制、剪切、粘贴、撤销和重做命令的命令。

    - **格式** – 显示用于修改文本或图形的命令，例如更改字体或对齐文本。

    - **视图** – 显示用于更改数据在窗口中显示方式的命令，例如缩放或显示其他用户界面项（如工具栏）。

    - **窗口** – 显示用于操作文档窗口的命令，例如在多个打开的窗口之间切换。

    - **帮助** – 显示用于获取程序使用帮助的命令。


    除了使用标准下拉菜单标题外，你还可以添加自己的标题或删除现有标题。为了组织下拉菜单中的命令，你可以使用水平线将相似命令分组，或将它们存储在子菜单中。为了方便用户，你还可以为命令分配快捷键。


    下拉菜单是用户控制程序的标准方式。通过为你自己的程序创建下拉菜单，你可以构建一个熟悉的用户界面，让其他人无需额外培训或经过很少培训就能快速学习和使用你的程序。


    ## 编辑下拉菜单


    每次创建 Cocoa 应用程序项目时，Xcode 都会创建一个包含常用菜单标题和命令的默认下拉菜单。无需编写一行 Swift 代码，其中许多命令就能正常工作。例如，应用程序菜单（你的程序名称，例如
    `MenuProgram`）下的“退出”命令知道如何退出程序，而“窗口”菜单标题下的“缩放”和“最小化”命令知道如何缩放和最小化用户界面窗口。


    在大多数情况下，你需要通过编辑现有命令、添加新命令和删除现有命令来自定义这些下拉菜单。要修改程序的下拉菜单，你有两个选择：


    - 直接编辑下拉菜单

    - 打开文档大纲并编辑菜单


    要直接编辑下拉菜单，请单击项目导航器窗格中的 `.xib` 或 `.storyboard` 文件，然后直接单击程序的下拉菜单，如图 19-1 所示。


    ![A978-1-4842-1233-2_19_Fig1_HTML.jpg](img/A978-1-4842-1233-2_19_Fig1_HTML.jpg)


    图 19-1。你可以直接单击程序的下拉菜单来选择单个项目


    编辑下拉菜单的第二种方法是单击“显示文档大纲”图标打开文档大纲，如图 19-2 所示。


    ![A978-1-4842-1233-2_19_Fig2_HTML.jpg](img/A978-1-4842-1233-2_19_Fig2_HTML.jpg)


    图 19-2。“显示文档大纲”图标


    打开文档大纲后，你可以单击展开三角形来查看不同的下拉菜单及其命令，如图 19-3 所示。


    ![A978-1-4842-1233-2_19_Fig3_HTML.jpg](img/A978-1-4842-1233-2_19_Fig3_HTML.jpg)


    图 19-3。在文档大纲窗格中查看菜单


    要删除菜单项，请单击选中它（通过直接单击下拉菜单项或在文档大纲窗格中单击菜单项），然后按退格键或删除键。这样可以删除单个菜单项或整个菜单标题，例如“文件”或“编辑”下拉菜单标题。


    注意：如果不小心删除了菜单项或整个下拉菜单标题，只需选择**编辑 ➤ 撤销**或按下 `Command+Z` 即可立即恢复。


    要向程序的下拉菜单添加项目，你有两个选择：


    - 向现有的下拉菜单标题（如“文件”或“编辑”）添加新菜单项

    - 添加一个新的下拉菜单标题，该标题包含自己的命令


    ### 向菜单栏添加新的下拉菜单标题


    你可以直接在下拉菜单上或文档大纲内添加菜单项和下拉菜单标题。


    对象库显示以下下拉菜单标题，你可以将它们添加到程序的菜单栏中，如图 19-4 所示：


    ![A978-1-4842-1233-2_19_Fig4_HTML.jpg](img/A978-1-4842-1233-2_19_Fig4_HTML.jpg)


    图 19-4。可以添加到程序菜单栏的下拉菜单标题


    - **应用程序菜单项** – 包含应用程序下拉菜单标题中的典型命令，例如“关于”、“偏好设置”和“服务”。

    - **文件菜单项** – 包含文件下拉菜单标题中的典型命令，例如“打开”、“新建”和“保存”。

    - **编辑菜单项** – 包含编辑下拉菜单标题中的典型命令，例如“剪切”、“复制”和“粘贴”。

    - **字体菜单项** – 包含字体下拉菜单标题中的典型命令，例如“粗体”、“放大”和“复制样式”。

    - **格式菜单项** – 包含格式下拉菜单标题中的典型命令，例如“字体”和“文本”。

    - **文本菜单项** – 包含文本下拉菜单标题中的典型命令，例如“居中”、“书写方向”和“显示标尺”。

    - **查找菜单项** – 包含查找下拉菜单标题中的典型命令，例如“查找”、“查找与替换”和“查找下一个”。

    - **窗口菜单项** – 包含窗口下拉菜单标题中的典型命令，例如“最小化”、“置于顶层”和“缩放”。

    - **帮助菜单项** – 包含帮助下拉菜单标题中的典型命令，例如“应用程序帮助”。


    要将下拉菜单标题添加到程序的菜单栏，请执行以下步骤：


    单击项目导航器窗格中的 `.xib` 或 `.storyboard` 文件。选择**视图 ➤ 工具 ➤ 显示对象库**以在 Xcode 窗口的右下角显示对象库。从对象库中拖拽一个下拉菜单项（参见图
    19-4），将鼠标移动到程序的菜单栏上方，直到出现一条蓝色竖线，显示下拉菜单标题将出现的位置，如图 19-5 所示。


    ![A978-1-4842-1233-2_19_Fig5_HTML.jpg](img/A978-1-4842-1233-2_19_Fig5_HTML.jpg)


    图 19-5。向菜单栏添加新的下拉菜单标题


    除了将鼠标拖拽到程序的菜单栏上，你也可以将鼠标拖拽到文档大纲中的下拉菜单标题之间，直到出现一条蓝色横线，显示菜单标题将出现的位置，如图 19-6 所示。


    释放鼠标。新的下拉菜单标题就会出现在菜单栏上。


    ![A978-1-4842-1233-2_19_Fig6_HTML.jpg](img/A978-1-4842-1233-2_19_Fig6_HTML.jpg)


    图 19-6。使用文档大纲向菜单栏添加新的下拉菜单标题


    要重新排列下拉菜单标题，请将鼠标指针移动到要移动的菜单标题上（位于菜单栏或文档大纲中），然后拖拽鼠标将菜单标题移动到新位置。

    '
- fmt: '### Adding New Commands to a Pull-Down Menu


    You can always delete, rearrange, and add commands on any pull-down menu. To delete
    a command, simply select it and press the `Backspace` or `Delete` key. To rearrange
    a command, drag and drop it to a new location.


    To add a new command to a pull-down menu, you need to use the following three
    items from the `Object Library` as shown in Figure [19-7](#A978-1-4842-1233-2_19_Chapter.html#Fig7):


    ![A978-1-4842-1233-2_19_Fig7_HTML.jpg](A978-1-4842-1233-2_19_Fig7_HTML.jpg)


    Figure 19-7. Three items for modifying commands on a pull-down menu


    - `Menu Item` – Represents a single command.

    - `Submenu Menu Item` – Represents a submenu of additional commands.

    - `Separate Menu Item` – Displays a horizontal line to separate commands on a
    pull-down menu.


    To add a new command to a pull-down menu, follow these steps:


    1. Release the mouse. `Xcode` adds your new menu item to the pull-down menu. If
    you added a `Submenu Menu Item`, you can now edit the commands stored on its submenu.

    2. Drag a menu item (see Figure [19-7](#A978-1-4842-1233-2_19_Chapter.html#Fig7))
    from the `Object Library` and move the mouse in the pull-down menu list until
    a horizontal blue line appears to show you where the command will appear as shown
    in Figure [19-9](#A978-1-4842-1233-2_19_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_19_Fig9_HTML.jpg](A978-1-4842-1233-2_19_Fig9_HTML.jpg)


    Figure 19-9. Dragging and dropping a new command in a pull-down menu list


    3. Click on the `.xib` or `.storyboard` file in the `Project Navigator` pane.

    4. Choose `View` ➤ `Utilities` ➤ `Show Object Library` to display the `Object
    Library` in the bottom right corner of the `Xcode` window.

    5. Click on the pull-down menu where you want to add a new command. You can either
    click directly on the pull-down menu title on the menu bar or click on a disclosure
    triangle to open a pull-down menu title in the `Document Outline` as shown in
    Figure [19-8](#A978-1-4842-1233-2_19_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_19_Fig8_HTML.jpg](A978-1-4842-1233-2_19_Fig8_HTML.jpg)


    Figure 19-8. You can add a new command directly on a pull-down menu or through
    the `Document Outline`


    ### Editing Commands


    Once you’ve modified the pull-down menu titles that appear on a menu bar and modified
    the commands that appear on each pull-down menu, you may want to further edit
    each individual command using the `Inspector` pane. The `Inspector` pane can be
    useful to modify the following properties:


    - `Title` – Displays the text of the menu command.

    - `Key Equivalent` – Defines a keystroke shortcut for a command.


    To edit a command (or a pull-down menu title), follow these steps:


    1. Click in the `Title` text field in the `Inspector` pane to edit the text of
    the command.

    2. Click in the `Key Equivalent` text field and press (not type) the keystroke
    shortcut you want to assign to your command. Make sure this keystroke shortcut
    isn’t used by another command (such as `Command+X` for the `Cut` command). `Xcode`
    displays your keystroke shortcut to the right of the command on the pull-down
    menu.

    3. Click on the `.xib` or `.storyboard` file in the `Project Navigator` pane.

    4. Click on the pull-down menu command (or pull-down menu title) that you want
    to edit either in the `Document Outline` or directly on the pull-down menu itself.

    5. Choose `View` ➤ `Utilities` ➤ `Show Attributes Inspector`. The `Show Attributes
    Inspector` pane appears as shown in Figure [19-10](#A978-1-4842-1233-2_19_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_19_Fig10_HTML.jpg](A978-1-4842-1233-2_19_Fig10_HTML.jpg)


    Figure 19-10. Dragging and dropping a new command in a pull-down menu list


    ### Connecting Menu Commands to Swift Code


    Once you’ve modified your pull-down menu titles and filled them with the proper
    commands, you’ll eventually need to make those commands actually do something.
    That means linking your menu commands to `IBAction` methods much like connecting
    buttons or other user interface items to a file containing Swift code. You can
    `Control-drag` from either the menu command on the pull-down menu itself or from
    the menu command displayed in the `Document Outline`.


    When you create a Cocoa Application project, you’ll find that many menu commands
    already work such as the `File` ➤ `Print`, `Window` ➤ `Minimize`, and application
    name ➤ `About` commands. These features are provided by the `NSApplication`, `NSWindow`,
    `NSView`, and `NSResponder` classes in the Cocoa framework.


    If you click on a menu command in a Cocoa Application project, and then choose
    `View` ➤ `Utilities` ➤ `Show Connections Inspector`, you’ll see the `Connections
    Inspector` pane in the upper right corner of the `Xcode` window.


    The `Connections Inspector` pane lets you see what the selected user interface
    item (such as a command on a pull-down menu) is connected to as shown in Figure
    [19-11](#A978-1-4842-1233-2_19_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_19_Fig11_HTML.jpg](A978-1-4842-1233-2_19_Fig11_HTML.jpg)


    Figure 19-11. The `Connections Inspector` pane shows what `IBAction` method a
    user interface is connected to


    Normally when you view the `Connections Inspector` for a user interface item,
    you’ll see the name of the `IBAction` method on the left side (such as `print`)
    with a line connecting it to the file where the `IBAction` method is actually
    stored (such as `AppDelegate`).


    In Figure [19-11](#A978-1-4842-1233-2_19_Chapter.html#Fig11), the `Print` menu
    command on the `File` menu is connected to the `print` `IBAction` method, but
    this `IBAction` method isn’t stored in a specific file. Instead, it’s connected
    to something called `First Responder`, which is defined by the `NSResponder` class.


    A user interface consists of several objects based on `NSApplication`, `NSWindow`,
    and `NSView` so `First Responder` simply points to the first object that should
    respond to the user clicking on a user interface item (such as the `Print` command
    on the `File` menu). If this first object doesn’t have a `print` `IBAction` method,
    then it searches for this `IBAction` method in the next object.


    So if you had a text field on a window and clicked the `Print` command on the
    `File` menu, the `Print` command would look for the `print` `IBAction` method
    in the text field (based on `NSTextfield`, which is based on `NSView`) first.
    If it fails to find the `print` `IBAction` method in the `NSTextfield` class,
    it would look next in the window (based on `NSWindow`) or the application itself
    (based on `NSApplication`).


    If you click on the `First Responder` icon and then choose `View` ➤ `Utilities`
    ➤ `Show Connections Inspector`, you can see the `Connections Inspector` pane for
    the `First Responder`, which identifies all the `IBAction` methods connected to
    the default pull-down menus of a typical Cocoa Application project as shown in
    Figure [19-12](#A978-1-4842-1233-2_19_Chapter.html#Fig12).


    ![A978-1-4842-1233-2_19_Fig12_HTML.jpg](A978-1-4842-1233-2_19_Fig12_HTML.jpg)


    Figure 19-12. The `First Responder` `Connections Inspector` pane lists all the
    `IBAction` methods connected to the default pull-down menus of a Cocoa Application
    project


    > **Note:** Another way to view the `Connections Inspector` is to right-click
    on the `First Responder` icon.


    Although the Cocoa Application template creates standard pull-down menus and commands,
    you’ll still need to write Swift code to make many of these commands actually
    work. For example, the `Save` command doesn’t know what to save or how to save
    it and the `New` command doesn’t know what type of document to create.


    To see how menu commands work with `IBAction` methods like other user interface
    items, follow these steps.'
