  trans: '

    # 创建和自定义用户界面


    `Utilities`面板最常用于创建和自定义项目的用户界面。在 OS X 程序中，用户界面文件可以是以下两种类型之一：


    - `.xib`文件

    - `.storyboard`文件


    创建项目时，你可以选择要使用的类型。通常，`.xib`文件用于单窗口用户界面，而`.storyboard`文件则用于需要按特定顺序链接显示的多个窗口。你也可以混合使用`.xib`和`.storyboard`文件来创建用户界面，或者仅使用`.xib`或`.storyboard`文件。


    无论你使用`.xib`文件还是`.storyboard`文件，都需要借助`Utilities`面板实现两个目的。首先，你需要将按钮、文本字段和图片等元素拖放到用户界面上。其次，你需要通过更改这些用户界面元素的名称、颜色或大小来自定义它们。


    要设计用户界面，你需从`对象库`开始，该库位于`Utilities`面板底部，如图 2-15 所示。要打开`对象库`，可以执行以下操作：


    ![A978-1-4842-1233-2_2_Fig15_HTML.jpg](img/A978-1-4842-1233-2_2_Fig15_HTML.jpg)


    图 2-15. 对象库包含不同的用户界面元素


    - 选择 视图 ➤ 实用工具 ➤ 显示对象库

    - 按 Control+Option+Command+3

    - 点击显示对象库图标


    要在`对象库`中查找某个用户界面元素，只需上下滚动列表即可。但如果你知道所需元素的名称，更快捷的方式是点击`对象库`窗口底部的`搜索`字段，输入全部或部分元素名称，然后按`Return`键。`对象库`将仅显示与你输入内容匹配的元素。例如，如果你输入"Button"，则`对象库`只会显示可以添加到用户界面的各种按钮。


    在用户界面上放置一个或多个元素后，第二步是使用`检查器`面板自定义这些元素。`检查器`面板可以显示多种类型的窗格，但自定义用户界面元素最常用的是以下两种：


    - 属性检查器

    - 大小检查器


    `属性检查器`允许你修改元素的外观。`大小检查器`允许你修改元素在用户界面上的大小和位置。


    要打开`属性检查器`，可以执行以下任一操作：


    - 选择 视图 ➤ 实用工具 ➤ 显示属性检查器

    - 按 Option+Command+4

    - 点击显示属性检查器，如图 2-16 所示


    ![A978-1-4842-1233-2_2_Fig16_HTML.jpg](img/A978-1-4842-1233-2_2_Fig16_HTML.jpg)


    图 2-16. 显示属性检查器和显示大小检查器图标。


    要打开`大小检查器`，可以执行以下任一操作：


    - 选择 视图 ➤ 实用工具 ➤ 显示大小检查器

    - 按 Option+Command+5

    - 点击显示大小检查器，如图 2-16 所示


    打开`属性检查器`或`大小检查器`后，你可以点击一个用户界面元素（如按钮或文本字段）进行修改，然后输入或选择不同的选项来更改该元素的外观。


    # 标准编辑器和辅助编辑器


    你大部分时间将使用编辑器或 Interface Builder。编辑器类似于文字处理器，允许你输入和编辑 Swift 代码。Interface Builder
    类似于绘图程序，允许你拖放、调整大小和移动用户界面上的元素，如按钮、文本字段和图形。


    要编辑 Swift 代码，只需在`项目导航器`面板中点击任何扩展名为`.swift`的文件。当你点击一个`.swift`文件时，该文件的内容会显示在 Xcode
    的中间窗格中，如图 2-17 所示。


    ![A978-1-4842-1233-2_2_Fig17_HTML.jpg](img/A978-1-4842-1233-2_2_Fig17_HTML.jpg)


    图 2-17. 点击`.swift`文件会显示该文件中存储的 Swift 代码


    要编辑你的用户界面，只需在`项目导航器`面板中点击任何扩展名为`.xib`或`.storyboard`的文件。这会将该用户界面的内容显示在 Xcode 的中间窗格中，如图
    2-18 所示。


    ![A978-1-4842-1233-2_2_Fig18_HTML.jpg](img/A978-1-4842-1233-2_2_Fig18_HTML.jpg)


    图 2-18. 点击`.xib`或`.storyboard`文件会显示该文件中存储的用户界面


    每次你在`项目导航器`面板中点击不同的文件，Xcode 都会在窗口的中间窗格中显示该新文件的内容。


    当 Xcode 在中间窗格中显示单个文件的内容时，这被称为`标准编辑器`。然而，并排查看两个文件的内容通常也很有用。当 Xcode 并排显示两个文件内容时，第二个文件窗格被称为`辅助编辑器`。


    打开`辅助编辑器`最常见的原因是，如图 2-19 所示，左侧窗格显示用户界面，右侧窗格显示 Swift 文件。这样做的目的是让你能够将用户界面与 Swift
    代码连接起来。


    ![A978-1-4842-1233-2_2_Fig19_HTML.jpg](img/A978-1-4842-1233-2_2_Fig19_HTML.jpg)


    图 2-19. 辅助编辑器并排显示两个文件的内容


    当你创建用户界面时，它完全独立于你的 Swift 代码（反之亦然）。这让你可以自由地用新用户界面替换旧用户界面，而不会影响 Swift 代码的行为。同样，这也允许你修改
    Swift 代码而无需担心影响到用户界面。


    在过去，程序员必须使用代码创建用户界面，这意味着修改代码往往会影响到用户界面，增加了程序出错或出现 bug 的风险。通过将用户界面与代码分离，Xcode 消除了这个问题，并帮助你创建更可靠的软件。


    最初创建用户界面时，它什么也做不了。这就是为什么你需要将一些用户界面元素连接到使用户界面真正工作的 Swift 代码上。例如，如果用户界面显示一个按钮，点击该按钮不会发生任何事情。你必须编写
    Swift 代码来告诉该按钮该做什么。然后你必须将按钮连接到你的 Swift 代码。


    这就是`辅助编辑器`的用途。通过将用户界面显示在 Swift 代码文件旁边，`辅助编辑器`让你可以轻松地从用户界面拖拽鼠标到 Swift 代码文件中，并在用户界面和
    Swift 代码之间建立连接。


    要打开`辅助编辑器`，可以选择以下任一方式：


    - 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器

    - 按 Option+Command+Return

    - 点击辅助编辑器图标，如图 2-20 所示


    ![A978-1-4842-1233-2_2_Fig20_HTML.jpg](img/A978-1-4842-1233-2_2_Fig20_HTML.jpg)


    图 2-20. 标准编辑器和辅助编辑器图标


    要关闭`辅助编辑器`，需要通过以下方式之一打开`标准编辑器`：

