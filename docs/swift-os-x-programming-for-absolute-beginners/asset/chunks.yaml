- fmt: "# Removing a Scene After a Segue\n\nA segue works in one direction from one\
    \ scene to a second scene. When you create a second scene using the Modal, Sheet,\
    \ Popover, or Custom segue, you can close this second scene using Swift code.\
    \ To do this, you need to create a Swift controller file for your scene. Then\
    \ connect a user interface item from that scene (such as a button) to define an\
    \ `IBAction` method where you can use Swift code to close a scene.\n\nIf you open\
    \ a scene using a Show segue, then the user can close the scene by clicking the\
    \ close button, which doesn’t require you to write any Swift code at all.\n\n\
    To remove a scene after a Modal, Sheet, Popover, or Custom segue, follow these\
    \ steps:\n\n1. Drag a push button on to this second scene and change its label\
    \ to **Close Scene**.\n2. Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ The Assistant Editor displays the `secondView.swift` file you just created.\n\
    3. Move the mouse pointer over the push button on this second scene, hold down\
    \ the **Control** key, and drag the mouse just above the last curly bracket in\
    \ the bottom of the `secondView.swift` file. A pop-up window appears.\n4. Click\
    \ in the **Connection** pop-up menu and choose **Action**.\n5. Click in the **Name**\
    \ text field and type `closeScene`.\n6. Click in the **Type** pop-up menu and\
    \ choose `NSButton`. Then click the **Connect** button. Xcode displays an empty\
    \ `IBAction` method.\n7. Modify the `IBAction` method as follows:\n8. Choose a\
    \ folder and click the **Create** button. Xcode displays your Swift class in the\
    \ **Project Navigator** pane. At this point, the Swift class and the scene aren’t\
    \ connected so we have to fix this by making the scene’s view controller a class\
    \ of the Swift file we just created.\n9. Click on the `Main.storyboard` file to\
    \ display your user interface.\n10. Click on the blue **View Controller** icon\
    \ on the scene that has a segue pointing to it. This should be the scene that\
    \ you want to go away.\n11. Choose View ➤ Utilities ➤ Show Identity Inspector.\n\
    12. Click in the **Class** pop-up menu and choose `secondView`, the view controller\
    \ you created earlier as shown in Figure 14-21.\n\n![A978-1-4842-1233-2_14_Fig21_HTML.jpg](A978-1-4842-1233-2_14_Fig21_HTML.jpg)\n\
    \n**Figure 14-21.** Connecting a scene to a Swift view controller file\n\nMake\
    \ sure your `StoryProgram` project is loaded in Xcode and click on the `Main.storyboard`\
    \ file in the **Project Navigator** pane.\n\n- Place a button on the first scene\
    \ and change the button's label to **Open Scene**.\n- Click on the segue, choose\
    \ View ➤ Utilities ➤ Show Attributes Inspector, and make sure the **Style** pop-up\
    \ menu displays Modal, Sheet, Popover, or Custom.\n- Choose File ➤ New ➤ File.\
    \ Xcode displays different templates you can use.\n- Choose **Source** under **OS\
    \ X** and click the **Cocoa Class** icon. Then click the **Next** button. Another\
    \ dialog appears, asking for a name and a subclass.\n- Click in the **Name** text\
    \ field and type a descriptive name for your class to control your scene.\n- Click\
    \ in the **Subclass of:** pop-up menu and choose `NSViewController`.\n- Clear\
    \ the \"Also create XIB file for user interface\" check box.\n- Make sure the\
    \ **Language** pop-up menu displays **Swift** as shown in Figure 14-20. Click\
    \ the **Next** button. Xcode asks where you want to save your new Swift class.\n\
    \n![A978-1-4842-1233-2_14_Fig20_HTML.jpg](A978-1-4842-1233-2_14_Fig20_HTML.jpg)\n\
    \n**Figure 14-20.** Creating a Swift class to control a scene in a storyboard\n\
    \n```\n@IBAction func closeScene(sender: NSButton) {\n    self.dismissController(self)\n\
    }\n```\n\n- Choose Product ➤ Run. Your program’s initial scene appears with the\
    \ button **Open Scene**.\n- Click the **Open Scene**. Your second scene appears\
    \ in the way you defined the segue such as Modal, Sheet, Popover, or Custom.\n\
    - Click the **Close Scene** button on this second scene. The second scene goes\
    \ away.\n- Choose StoryProgram ➤ Quit StoryProgram.\n\n# Passing Data Between\
    \ Scenes\n\nWhen you make changes on one scene and then open another scene, you\
    \ may want that second scene to know of any changes you made earlier on the previous\
    \ scene. To do this, you need to do the following:\n\n- In the first scene, create\
    \ a `prepareForSegue` method that uses the `segue.destinationViewController` command\
    \ to identify the name of the second scene’s view controller and assign a value\
    \ to the `representedObject` property.\n- In the second scene’s view controller,\
    \ declare a variable to hold the data you want to receive from the first scene\
    \ and unwrap the value from `representedObject`.\n\nTo see how to pass data from\
    \ one scene to another, follow these steps:\n\n1. Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor to display the `ViewController.swift` file that controls\
    \ the initial scene.\n2. Move the mouse pointer over the text field, hold down\
    \ the **Control** key, and drag the mouse from the text field to under the `class\
    \ ViewController` line.\n3. Release the **Control** key and mouse. A pop-up menu\
    \ appears.\n4. Click in the **Name** text field, type `passedText`, and click\
    \ the **Connect** button. Xcode creates an `IBOutlet` like this:\n\nMake sure\
    \ your `StoryProgram` project is loaded in Xcode and click on the `Main.storyboard`\
    \ file in the **Project Navigator** pane.\n\nDrag a text field and widen it on\
    \ the scene that contains the **Open Scene** button as shown in Figure 14-22.\n\
    \n![A978-1-4842-1233-2_14_Fig22_HTML.jpg](A978-1-4842-1233-2_14_Fig22_HTML.jpg)\n\
    \n**Figure 14-22.** The user interface of the initial scene\n\n```\n@IBOutlet\
    \ weak var passedText: NSTextField!\n```\n\nWrite a `prepareForSegue` method so\
    \ the entire code in the `ViewController.swift` file looks like this:\n\n```\n\
    import Cocoa\n\nclass ViewController: NSViewController {\n\n    @IBOutlet weak\
    \ var passedText: NSTextField!\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view.\n    }\n\n    override\
    \ func prepareForSegue(segue: NSStoryboardSegue, sender: AnyObject?) {\n     \
    \   let secondScene = segue.destinationController as! secondView\n        secondScene.representedObject\
    \ = passedText.stringValue\n    }\n\n    override var representedObject: AnyObject?\
    \ {\n        didSet {\n            // Update the view, if already loaded.\n  \
    \      }\n    }\n\n}\n```\n\nThe `passedText` `IBOutlet` retrieves the text that\
    \ the user types into the text field. Then the `prepareForSegue` method creates\
    \ a constant called `secondScene` that represents the segue’s destination, which\
    \ is the `secondView` class. Then it takes the text from the `passedText` `IBOutlet`\
    \ and stores it into the `representedObject` property.\n\nChoose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. If the assistant editor does not display the\
    \ `secondView.swift` file, click **Automatic** in the upper left corner of the\
    \ assistant editor to display a menu. From this menu, choose Manual ➤ StoryProgram\
    \ ➤ StoryProgram and then click on the `secondView.swift` file.\n\n- Move the\
    \ mouse pointer over the label, hold down the **Control** key, and drag the mouse\
    \ from the label to under the `class secondView` line.\n- Release the **Control**\
    \ key and mouse. A pop-up menu appears.\n- Click in the **Name** text field, type\
    \ `receivedText`, and click the **Connect** button. Xcode creates an `IBOutlet`\
    \ like this:\n\nClick on the second scene in your storyboard, place a **Label**\
    \ on there and make it wider as shown in Figure 14-23.\n\n![A978-1-4842-1233-2_14_Fig23_HTML.jpg](A978-1-4842-1233-2_14_Fig23_HTML.jpg)\n\
    \n**Figure 14-23.** The user interface of the second scene\n\n```\n@IBOutlet weak\
    \ var receivedText: NSTextField!\n```\n\nModify the `viewDidLoad` method so the\
    \ entire code in the `secondView.swift` file looks like this:\n\n```\nimport Cocoa\n\
    \nclass secondView: NSViewController {\n\n    @IBOutlet weak var receivedText:\
    \ NSTextField!\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do view setup here.\n        receivedText.stringValue = self.representedObject!\
    \ as! String\n    }\n\n    @IBAction func closeScene(sender: NSButton) {\n   \
    \     self.dismissController(self)\n    }\n\n}\n```"
