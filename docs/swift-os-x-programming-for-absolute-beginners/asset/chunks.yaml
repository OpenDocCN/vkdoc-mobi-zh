    ## Using Structures


    Both tuples and sets are built-in features of Swift. Structures are a unique way
    for you to group different types of data in a single place. With a traditional
    variable, you can only store one chunk of data at a time. With a structure, you
    can define two or more chunks of data to store in a single variable. Variables
    declared inside a structure are called properties.


    A structure that stores two chunks of data would look like this:


    `struct structureName {`


        `var variableName1 : dataType`


        `var variableName2 : dataType`


    `}`


    Remember, the data type of each variable can be simple data types such as Int,
    String, or Double, or they can be more complicated data types such as arrays,
    tuples, sets, or dictionaries.


    You can define two or more variables inside a structure where each variable can
    contain different data types such as a string or an integer. No matter how many
    properties a structure holds, you must initialize the properties before you can
    store data in them.


    Swift provides three ways to initialize properties. First, you can define an initial
    value for each property like this:


    `struct structureName {`


        `var variableName1 : dataType = initialValue`


        `var variableName2 : dataType = initialValue`


    `}`


    To simplify the property declaration, a second way is to omit the data type and
    let Swift infer the data type like this:


    `struct structureName {`


        `var variableName1 = initialValue`


        `var variableName2 = initialValue`


    `}`


    When you assign an initial value to properties, you can create a variable to represent
    that structure like this:


    `var variableName = structureName()`


    A third way to initialize structure properties is to create an init function.
    This means you must create a list of property names and their data types. Then
    assign values to those properties when you create a variable to represent that
    structure.


    For example, suppose you wanted to store information about a person such as his
    or her name, e-mail address, and phone number. Instead of creating three separate
    variables, you could create a single structure like this:


    `struct person {`


        `var name : String`


        `var email : String`


        `var phone : String`


    `}`


    When you create a variable based on this structure, you need to include initial
    values such as:


    `var workers = person(name: "Sue", email: "sdk@aol.com", phone: "555-1234")`


    Creating a structure involves two parts:


    *   Create a structure with two or more variables (properties)

    *   Create a variable to represent that structure and assign initial values to
    those properties


    ### Storing and Retrieving Items from a Structure


    A structure lets you define the type of related data to store. Then you need to
    create a variable name to represent that structure. Finally, to store in a structure,
    you need to specify the structure name and the variable name separated by a period
    like this:


    `structureVariable.variableName = value`


    To retrieve data from a structure, you can assign a variable to a structure’s
    variable like this:


    `var variableName = structureVariable.variableName`


    To see how to create a structure, initialize its properties, and add and retrieve
    data, create a new playground by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type StructurePlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file.
      Edit the code as follows: `import Cocoa` `struct pet {`     `var name : String
    = ""`     `var age : Int = 0` `}` `var dog = pet()` `dog.name = "Fido"` `dog.age
    = 4` `print (dog.name)` `print (dog.age)` `struct person {`     `var name : String`
        `var email : String`     `var phone : String` `}` `var workers = person(name:
    "Sue", email: "sdk@aol.com", phone: "555-1234")` `let boss = workers.name` `print
    (boss)` `workers.name = "Bo"` `print (workers.email)` `print (workers.phone)`
     


    The first structure defines initial values for its properties so there’s no need
    for an init function. That’s why you can create a variable with empty parentheses
    like this:


    `var dog = pet()`


    The second structure does not define initial values for its properties, so when
    you create a variable to represent that structure, you must define initial values.


    `var workers = person(name: "Sue", email: "sdk@aol.com", phone: "555-1234")`


    To store data in a structure, you need to specify the variable name representing
    the structure followed by the property name as shown in Figure [10-5](#A978-1-4842-1233-2_10_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_10_Fig5_HTML.jpg](A978-1-4842-1233-2_10_Fig5_HTML.jpg)


    Figure 10-5.


    Creating a structure and retrieving data'
  trans: "\n### 操作集合\n\n当你拥有两个或多个集合时，可以对它们执行操作以创建第三个集合。一些常见的集合操作包括：\n\n- `union` –\
    \ 将两个集合中的所有项目合并到一个新集合中\n- `subtract` – 从第一个集合中移除第二个集合的项目，以形成新集合\n- `intersect`\
    \ – 找出两个集合中共同的项目，并将它们存储在新集合中\n- `exclusiveOr` – 找出仅存在于其中一个集合（而非两者）中的项目\n\n可以把\
    \ `union` 命令想象成将两个集合相加，而 `subtract` 命令则像从一个集合中减去另一个集合。`union` 命令指定两个集合名称的方式如下：\n\
    \n`firstSet.union(secondSet)`\n\n可以将其视为等价于 `firstSet + secondSet`，即两个集合中的所有项目都会合并到第三个集合中。\n\
    \n`subtract` 命令也会指定两个集合名称，但顺序会产生影响，例如：\n\n`thirdSet.subtract(firstSet)`\n\n`firstSet.subtract(thirdSet)`\n\
    \n根据每个集合的内容，这两个命令可能会产生不同的结果。假设 `thirdSet` 包含 `{1, 2, 3, 4, 5}`，而 `firstSet` 包含\
    \ `[1, 3, 5, 7]`。`thirdSet.subtract(firstSet)` 命令的工作方式如下：\n\n`{1, 2, 3, 4, 5}\
    \ thirdSet`\n\n`[1, 3, 5, 7} firstSet`\n\n两个集合都包含 1、3 和 5，因此这些数字会被消除。从 `thirdSet`\
    \ 中移除 1、3 和 5，剩下 `{2, 4}`。\n\n`firstSet.subtract(thirdSet)` 命令的工作方式如下：\n\n`[1,\
    \ 3, 5, 7] firstSet`\n\n`{1, 2, 3, 4, 5} thirdSet`\n\n两个集合都包含 1、3 和 5，因此这些数字会被消除。从\
    \ `firstSet` 中移除 1、3 和 5，剩下 `{7}`。\n\n`intersect` 命令找出两个集合中的共同项目。`exclusiveOr`\
    \ 命令找出不存于两个集合中的项目。可以将 `exclusiveOr` 命令视为 `intersect` 命令的反向操作。\n\n要了解这四种不同的集合操作方式如何工作，请遵循以下步骤：\n\
    \n确保 `SetPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar firstSet\
    \ = Set([1, 3, 5, 7])\nvar secondSet = Set([2, 4, 6, 8])\nvar thirdSet = Set ([1,\
    \ 2, 3, 4, 5])\nfirstSet.union(secondSet)\nsecondSet.subtract(firstSet)\nfirstSet.subtract(secondSet)\n\
    firstSet.subtract(thirdSet)\nthirdSet.subtract(firstSet)\nfirstSet.intersect(thirdSet)\n\
    firstSet.exclusiveOr(thirdSet)\n```\n\n注意 `subtract` 命令如何因两个集合的列出顺序不同而产生不同结果，如图\
    \ 10-4 所示。\n\n![A978-1-4842-1233-2_10_Fig4_HTML.jpg](img/A978-1-4842-1233-2_10_Fig4_HTML.jpg)\n\
    \n图 10-4. 操作集合\n\n## 使用结构体\n\n元组和集合都是 Swift 的内置特性。而结构体是一种独特的方式，允许你将不同类型的数据组合在一个地方。使用传统的变量，你一次只能存储一块数据。而使用结构体，你可以定义两块或更多数据，并存储在单个变量中。在结构体内声明的变量被称为属性。\n\
    \n一个存储两块数据的结构体看起来像这样：\n\n```\nstruct structureName {\n    var variableName1 :\
    \ dataType\n    var variableName2 : dataType\n}\n```\n\n请记住，每个变量的数据类型可以是简单数据类型，如\
    \ `Int`、`String` 或 `Double`；也可以是更复杂的数据类型，如数组、元组、集合或字典。\n\n你可以在结构体内定义两个或更多变量，每个变量可以包含不同的数据类型，例如字符串或整数。无论结构体持有多少个属性，都必须先初始化这些属性，然后才能向其中存储数据。\n\
    \nSwift 提供了三种初始化属性的方式。首先，你可以像这样为每个属性定义一个初始值：\n\n```\nstruct structureName {\n\
    \    var variableName1 : dataType = initialValue\n    var variableName2 : dataType\
    \ = initialValue\n}\n```\n\n为了简化属性声明，第二种方式是省略数据类型，让 Swift 推断数据类型，如下所示：\n\n```\n\
    struct structureName {\n    var variableName1 = initialValue\n    var variableName2\
    \ = initialValue\n}\n```\n\n当你为属性分配初始值后，可以像这样创建一个变量来表示该结构体：\n\n`var variableName\
    \ = structureName()`\n\n初始化结构体属性的第三种方式是创建一个 `init` 函数。这意味着你必须创建一个属性名称及其数据类型的列表。然后在创建表示该结构体的变量时，为这些属性赋值。\n\
    \n例如，假设你想存储关于一个人的信息，比如他或她的姓名、电子邮件地址和电话号码。你可以创建一个单独的结构体，而不是创建三个独立的变量，如下所示：\n\n\
    ```\nstruct person {\n    var name : String\n    var email : String\n    var phone\
    \ : String\n}\n```\n\n当你基于这个结构体创建变量时，需要包含初始值，例如：\n\n`var workers = person(name:\
    \ \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")`\n\n创建结构体包含两个部分：\n\n-\
    \   创建一个包含两个或更多变量（属性）的结构体\n-   创建一个表示该结构体的变量，并为这些属性分配初始值\n\n### 从结构体中存储和检索项目\n\
    \n结构体让你定义要存储的相关数据类型。然后你需要创建一个变量名来表示该结构体。最后，要向结构体中存储数据，你需要用点号分隔指定结构体变量名和属性名，如下所示：\n\
    \n`structureVariable.variableName = value`\n\n要从结构体中检索数据，你可以将变量赋值给结构体的某个变量，如下所示：\n\
    \n`var variableName = structureVariable.variableName`\n\n要了解如何创建结构体、初始化其属性以及添加和检索数据，请按照以下步骤创建一个新的\
    \ playground：\n\n启动 Xcode。选择 **File** ➤ **New** ➤ **Playground**。（如果你看到 Xcode\
    \ 欢迎屏幕，也可以点击 **Get started with a playground**。）Xcode 会询问 playground 名称和平台。在 **Name**\
    \ 文本字段中点击并输入 `StructurePlayground`。点击 **Platform** 弹出菜单并选择 **OS X**。Xcode 会询问你想将\
    \ playground 文件保存到哪里。点击一个文件夹以保存 playground 文件，然后点击 **Create** 按钮。Xcode 会显示 playground\
    \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nstruct pet {\n    var name : String = \"\
    \"\n    var age : Int = 0\n}\nvar dog = pet()\ndog.name = \"Fido\"\ndog.age =\
    \ 4\nprint (dog.name)\nprint (dog.age)\nstruct person {\n    var name : String\n\
    \    var email : String\n    var phone : String\n}\nvar workers = person(name:\
    \ \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")\nlet boss = workers.name\n\
    print (boss)\nworkers.name = \"Bo\"\nprint (workers.email)\nprint (workers.phone)\n\
    ```\n\n第一个结构体为其属性定义了初始值，因此不需要 `init` 函数。这就是为什么你可以用空括号创建一个变量的原因：\n\n`var dog =\
    \ pet()`\n\n第二个结构体没有为其属性定义初始值，因此当你创建一个变量来表示该结构体时，必须定义初始值。\n\n`var workers = person(name:\
    \ \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")`\n\n要向结构体中存储数据，你需要指定表示该结构体的变量名，后跟属性名，如图\
    \ 10-5 所示。\n\n![A978-1-4842-1233-2_10_Fig5_HTML.jpg](img/A978-1-4842-1233-2_10_Fig5_HTML.jpg)\n\
    \n图 10-5. 创建结构体并检索数据\n"
- fmt: '# Using Structures in an OS X Program


    By themselves, structures can only hold a limited number of data. For more flexibility,
    structures are often combined with other data structures such as arrays. That
    way you can create an array of structures, which you’ll use in this sample program.
    The program will let you type in multiple names, addresses, and phone numbers,
    then delete data as well.


    From within Xcode choose **File** ➤ **New** ➤ **Project**. Click **Application**
    under the **OS X** category. Click **Cocoa Application** and click the **Next**
    button. Xcode now asks for a product name. Click in the **Product Name** text
    field and type `StructureProgram`. Make sure the **Language** pop-up menu displays
    `Swift` and that no check boxes are selected. Click the **Next** button. Xcode
    asks where you want to store the project. Choose a folder to store your project
    and click the **Create** button. Click the `MainMenu.xib` file in the **Project
    Navigator**. Click on the `StructureProgram` icon to make the window of the user
    interface appear. Choose **View** ➤ **Utilities** ➤ **Show Object Library** to
    make the **Object Library** appear in the bottom right corner of the Xcode window.
    Drag two **Push Buttons**, four **Labels**, and four **Text Fields** on the user
    interface and double-click on the push buttons and labels to change the text that
    appears on them so that it looks similar to Figure [10-6](#A978-1-4842-1233-2_10_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_10_Fig6_HTML.jpg](A978-1-4842-1233-2_10_Fig6_HTML.jpg)


    **Figure 10-6.** The user interface of the `StructureProgram`


    After you type a name, address, and phone number in the appropriate text fields,
    the **Add** button will store this information in a structure, and then store
    this structure in an array. Each time you add another name, address, and phone
    number, you’ll be adding another structure to the array while the **Total Names**
    text field constantly lists the total number of structures stored in the array.


    The **View** button removes the last item from the array and displays its contents
    in an alert dialog so you can verify its contents. Then it displays the new total
    number of structures in the array.


    Each text field will need a separate `IBOutlet` and each push button will need
    a separate `IBAction` method, which you’ll need to create by Control-dragging
    each item from the user interface to your `AppDelegate.swift` file:


    With your user interface still visible in the Xcode window, choose **View** ➤
    **Assistant Editor** ➤ **Show Assistant Editor**. The `AppDelegate.swift` file
    appears next to the user interface. Move the mouse over the **Add** button, hold
    down the **Control** key, and drag just above the last curly bracket at the bottom
    of the `AppDelegate.swift` file. Release the mouse and the **Control** key. A
    pop-up window appears. Click in the **Connection** pop-up menu and choose **Action**.
    Click in the **Name** text field and type `addData`. Click in the **Type** pop-up
    menu and choose `NSButton`. Then click the **Connect** button. Move the mouse
    over the **View** button, hold down the **Control** key, and drag just above the
    last curly bracket at the bottom of the `AppDelegate.swift` file. Release the
    mouse and the **Control** key. A pop-up window appears. Click in the **Connection**
    pop-up menu and choose **Action**. Click in the **Name** text field and type `viewButton`.
    Click in the **Type** pop-up menu and choose `NSButton`. Then click the **Connect**
    button. The bottom of the `AppDelegate.swift` file should look like this:

    ```

    @IBAction func viewData(sender: NSButton) {

    }

    @IBAction func addData(sender: NSButton) {

    }

    ```

    Move the mouse over the **Name** text field that appears to the right of the **Add**
    button, hold down the **Control** key, and drag below the `@IBOutlet` line in
    the `AppDelegate.swift` file. Release the mouse and the **Control** key. A pop-up
    window appears. Click in the **Name** text field and type `nameField` and click
    the **Connect** button. Move the mouse over the **Address** text field that appears
    to the right of the **Add** button, hold down the **Control** key, and drag below
    the `@IBOutlet` line in the `AppDelegate.swift` file. Release the mouse and the
    **Control** key. A pop-up window appears. Click in the **Name** text field and
    type `addressField` and click the **Connect** button. Move the mouse over the
    **Phone** text field that appears to the right of the **Delete** button, hold
    down the **Control** key, and drag below the `@IBOutlet` line in the `AppDelegate.swift`
    file. Release the mouse and the **Control** key. A pop-up window appears. Click
    in the **Name** text field and type `phoneField` and click the **Connect** button.
    Move the mouse over the **Total Names** text field that appears to the right of
    the **Query** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `totalField`
    and click the **Connect** button. You should now have the following `IBOutlet`s
    that represent all the text fields on your user interface:

    ```

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var nameField: NSTextField!

    @IBOutlet weak var addressField: NSTextField!

    @IBOutlet weak var phoneField: NSTextField!

    @IBOutlet weak var totalField: NSTextField!

    ```

    At this point we’ve connected the user interface to our Swift code so we can use
    the `IBOutlet`s to retrieve and display data on the user interface. We’ve also
    created the `IBAction` methods so the push buttons on the user interface will
    make the program actually work. Now we just need to write Swift code to create
    an initial dictionary and then write more Swift code in each `IBAction` method
    to add, delete, or query the dictionary.'
