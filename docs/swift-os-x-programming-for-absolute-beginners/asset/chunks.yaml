    \ var outlawHitPoints: NSTextField!\nvar sheriff = person ()\nvar outlaw = person\
    \ ()\n```\n\n修改 `applicationDidFinishLaunching` 方法，使其在用户界面的文本字段中显示 `sheriff` 和\
    \ `outlaw` 对象的 `hitPoints` 属性的初始值。这两个 `IBOutlet` 分别名为 `sheriffHitPoints` 和 `outlawHitPoints`：\n\
    \n```\nfunc applicationDidFinishLaunching(aNotification: NSNotification) {\n \
    \   // Insert code here to initialize your application\n    sheriffHitPoints.integerValue\
    \ = sheriff.hitPoints\n    outlawHitPoints.integerValue = outlaw.hitPoints\n}\n\
    ```\n\n修改 `shootButton` IBAction 方法，如下所示：\n\n```\n@IBAction func shootButton(sender:\
    \ NSButton) {\n    if sender.tag == 0 {    // 警长射击\n        outlaw.hitPoints -=\
    \ sheriff.shoot()\n    } else {    // 歹徒射击\n        sheriff.hitPoints -= outlaw.shoot()\n\
    \    }\n    sheriffHitPoints.integerValue = sheriff.hitPoints\n    outlawHitPoints.integerValue\
    \ = outlaw.hitPoints\n    if sheriffHitPoints.integerValue <= 0 {\n        var\
    \ myAlert = NSAlert()\n        myAlert.messageText = \"警长阵亡。\"\n        myAlert.runModal()\n\
