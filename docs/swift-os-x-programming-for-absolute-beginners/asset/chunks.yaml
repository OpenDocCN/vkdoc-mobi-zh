    ## Typealiases


    Declaring variables as data types such as Int, Double, or String only tells you
    what type of data it can hold, but it doesn’t tell you the meaning of that data.
    For example, if you declared two variables as Int data types, each could hold
    integers but one variable might represent ages and the other variable might represent
    Employee ID numbers.


    To make the purpose of data types clearer, Swift lets you use something called
    typealiases. A typealias lets you give a descriptive name to a generic data type
    name such as:


    `typealias EmployeeID = Int`


    Now instead of declaring a variable as an integer (Int) data type, you could declare
    it as an EmployeeID data type such as:


    `typealias EmployeeID = Int`


    `var employee : EmployeeID`


    `employee = 192`


    This is equivalent to:


    `var employee : Int`


    `employee = 192`


    ## Using Unicode Characters as Names


    In most programming languages, variables and constants are limited to a fixed
    range of characters, often excluding foreign language characters. To help make
    Swift more accessible to programmers comfortable with other languages, Swift lets
    you use Unicode characters for your variable and constant names.


    Unicode is a new universal standard that represents different characters. If you
    choose Edit ➤ Emoji & Symbols, you can choose from a limited number of characters
    that you can use instead of or in addition to ordinary letters and numbers as
    shown in Figure [5-7](#A978-1-4842-1233-2_5_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_5_Fig7_HTML.jpg](A978-1-4842-1233-2_5_Fig7_HTML.jpg)


    Figure 5-7.


    Xcode lets you use special characters as variable or constant names


    To see how to use special characters in variable names, follow these steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Delete all the
    code in your playground except for the “import Cocoa” line.   Underneath the “import
    Cocoa” line, type let and press the spacebar.   Choose Edit ➤ Emoji & Symbols.
    A pop-up window appears as shown in Figure [5-8](#A978-1-4842-1233-2_5_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_5_Fig8_HTML.jpg](A978-1-4842-1233-2_5_Fig8_HTML.jpg)


    Figure 5-8.


    A pop-up window with different categories of special characters   Click on any
    character that looks interesting. Xcode types that character as your constant
    name.   Type = “Funny symbol here” and press Return.   Copy the character and
    paste it in between the parentheses of the print command. Notice that the right
    margin of the playground window displays the contents of your constant variable
    as shown in Figure [5-9](#A978-1-4842-1233-2_5_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_5_Fig9_HTML.jpg](A978-1-4842-1233-2_5_Fig9_HTML.jpg)


    Figure 5-9.


    Using a special character as a constant name in Swift code  


    Special characters can come in handy for displaying actual mathematical symbols
    instead of spelling them out, or typing variable or constant names in a foreign
    language. By making variable and constant names more versatile, Swift makes programming
    understandable for more people.


    ## Converting Data Types


    If you have a number stored as an integer and need to convert it to a decimal,
    or if you have a decimal and need to convert it to an integer, what can you do?
    The answer is that you can convert one number data type to another just by specifying
    the data type you want such as:


    `Int(decimal)`


    The Int data type in front tells Swift to convert the number inside the parentheses
    to an integer. If the number is a decimal, converting it to an integer basically
    means dropping all numbers after the decimal point, so a number such as 4.9 would
    be turned into the integer 4.


    When Swift converts an integer to a decimal number, it simply tacks on a decimal
    point with zeroes. So if you converted the integer 75 to a floating-point number,
    Swift would now store it as 75.0\. To see how converting integers to decimals
    (and vice versa) works, follow these steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    in the playground file as follows: `import Cocoa` `var whole : Int = 4` `var decimal
    : Double = 4.902` `print (Int(decimal))` `print (Double(whole))`  


    Notice how Swift turns an integer into a decimal (changing 4 to 4.0) and how it
    turns a decimal into an integer by dropping every value to the right of the decimal
    point (changing 4.902 to 4) as shown in Figure [5-10](#A978-1-4842-1233-2_5_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_5_Fig10_HTML.jpg](A978-1-4842-1233-2_5_Fig10_HTML.jpg)


    Figure 5-10.


    Changing integers to decimals and vice versa'
  trans: "\n# Swift 变量与常量声明\n\n第二种方法允许你显式声明数据类型，并将数据存储到该变量或常量中。虽然这可能会更冗长，但它清楚地表明了你要存储的数据类型。\n\
    \n第三种方法需要两行代码。第一行定义数据类型，第二行实际存储属性类型的数据。这对于可能在程序不同部分被赋予不同数据的变量来说非常方便。你可以在文件顶部附近声明变量以便于查找，然后在需要时再为其赋值。\n\
    \n要了解如何在 Swift 中声明变量和常量，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到 Xcode\
    \ 中。\n2.  将 playground 文件中的 Swift 代码修改如下：\n\n    ```\n    import Cocoa\n    let\
    \ cat: String\n    cat = \"Oscar\"\n    cat = \"Bo\"\n    ```\n\n    请注意，当你尝试向已包含数据的常量分配新数据时，会收到一条错误消息。点击左边距中的警告图标会显示一条错误消息，如图\
    \ 5-4 所示。\n\n    ![A978-1-4842-1233-2_5_Fig4_HTML.jpg](img/A978-1-4842-1233-2_5_Fig4_HTML.jpg)\n\
    \n    图 5-4。一条错误消息警告你不能多次将数据存储到常量中。\n\n    **注意**\n\n    常量也被称为“不可变的”，因为一旦你向其中存储了数据，就不能更改。变量被称为“可变的”，因为你可以不断更改它们存储的数据。请记住，变量一次只能保存一块数据。当你向变量中存储新数据时，该变量中任何现有的数据都会被清除。\n\
    \n3.  将 playground 文件中的 Swift 代码修改为将常量更改为变量（将`let`替换为`var`），如下所示：\n\n    ```\n\
    \    import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    cat = 42.7\n\
    \    ```\n\n    请注意，当你尝试向一个只能保存字符串的变量分配数字时，会收到一条警告。点击左边距中的警告图标会显示一条错误消息，如图 5-5\
    \ 所示。\n\n    ![A978-1-4842-1233-2_5_Fig5_HTML.jpg](img/A978-1-4842-1233-2_5_Fig5_HTML.jpg)\n\
    \n    图 5-5。一条错误消息警告你不能存储错误类型的数据。\n\n4.  将 playground 文件中的 Swift 代码修改如下：\n\n \
    \   ```\n    import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    var greeting\
    \ = \"Hello, \"\n    var period : String = \".\"\n    print (greeting + cat +\
    \ period)\n    ```\n\n    请注意，playground 会在右边距显示 Swift 代码的结果，如图 5-6 所示。\n\n  \
    \  ![A978-1-4842-1233-2_5_Fig6_HTML.jpg](img/A978-1-4842-1233-2_5_Fig6_HTML.jpg)\n\
    \n    图 5-6。playground 窗口的右边距会持续显示代码的结果。\n\n## 类型别名\n\n将变量声明为`Int`、`Double`或`String`等数据类型，只告诉你可以保存哪种类型的数据，但并不说明该数据的含义。例如，如果你将两个变量声明为`Int`数据类型，每个变量都可以保存整数，但一个变量可能代表年龄，另一个变量可能代表员工\
    \ ID 号。\n\n为了使数据类型的目的更清晰，Swift 允许你使用一种叫做类型别名的东西。类型别名允许你为泛型数据类型名称提供一个描述性名称，例如：\n\
    \n```\ntypealias EmployeeID = Int\n```\n\n现在，你不是将变量声明为整数（`Int`）数据类型，而是可以将其声明为`EmployeeID`数据类型，例如：\n\
    \n```\ntypealias EmployeeID = Int\nvar employee : EmployeeID\nemployee = 192\n\
    ```\n\n这等价于：\n\n```\nvar employee : Int\nemployee = 192\n```\n\n## 使用 Unicode\
    \ 字符作为名称\n\n在大多数编程语言中，变量和常量被限制在固定的字符范围内，通常排除外语字符。为了帮助其他语言的程序员更方便地使用 Swift，Swift\
    \ 允许你使用 Unicode 字符作为变量和常量名称。\n\nUnicode 是一种新的通用标准，代表不同的字符。如果你选择“编辑”->“表情与符号”，你可以从中选择有限数量的字符，用于替代或补充普通的字母和数字，如图\
    \ 5-7 所示。\n\n![A978-1-4842-1233-2_5_Fig7_HTML.jpg](img/A978-1-4842-1233-2_5_Fig7_HTML.jpg)\n\
    \n图 5-7。Xcode 允许你使用特殊字符作为变量或常量名称。\n\n要了解如何在变量名称中使用特殊字符，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到\
    \ Xcode 中。\n2.  删除 playground 中除`import Cocoa`行之外的所有代码。\n3.  在`import Cocoa`行下方，输入`let`并按下空格键。\n\
    4.  选择“编辑”->“表情与符号”。会弹出一个窗口，如图 5-8 所示。\n\n    ![A978-1-4842-1233-2_5_Fig8_HTML.jpg](img/A978-1-4842-1233-2_5_Fig8_HTML.jpg)\n\
    \n    图 5-8。一个包含不同类别特殊字符的弹出窗口。\n5.  点击任何看起来有趣的字符。Xcode 会将该字符作为常量名称输入。\n6.  输入`=\
    \ \"Funny symbol here\"`并按下回车键。\n7.  复制该字符并将其粘贴到`print`命令的括号之间。请注意，playground\
    \ 窗口的右边距会显示常量变量的内容，如图 5-9 所示。\n\n    ![A978-1-4842-1233-2_5_Fig9_HTML.jpg](img/A978-1-4842-1233-2_5_Fig9_HTML.jpg)\n\
    \n    图 5-9。在 Swift 代码中使用特殊字符作为常量名称。\n\n特殊字符对于显示实际的数学符号（而不是拼写出来）或以外语输入变量/常量名称非常有用。通过使变量和常量名称更加通用，Swift\
    \ 使编程对更多人来说更易理解。\n\n## 转换数据类型\n\n如果你有一个存储为整数的数字，需要将其转换为小数，或者你有一个小数，需要将其转换为整数，该怎么办？答案是，你可以通过指定你想要的数据类型来将一种数字数据类型转换为另一种，例如：\n\
    \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉 Swift 将括号内的数字转换为整数。如果这个数字是小数，将其转换为整数基本上意味着丢弃小数点后的所有数字，因此像`4.9`这样的数字将被转换为整数`4`。\n\
    \n当 Swift 将整数转换为小数时，它只是简单地添加一个小数点和零。因此，如果你将整数`75`转换为浮点数，Swift 现在会将其存储为`75.0`。要了解如何将整数转换为小数（反之亦然），请遵循以下步骤：\n\
    \n1.  确保你的`IntroductoryPlayground`文件已加载到 Xcode 中。\n2.  将 playground 文件中的代码修改如下：\n\
    \n    ```\n    import Cocoa\n    var whole : Int = 4\n    var decimal : Double\
    \ = 4.902\n    print (Int(decimal))\n    print (Double(whole))\n    ```\n\n3.\
    \  请注意 Swift 如何将整数转换为小数（将`4`更改为`4.0`），以及如何通过丢弃小数点右侧的所有值来将小数转换为整数（将`4.902`更改为`4`），如图\
    \ 5-10 所示。\n\n    ![A978-1-4842-1233-2_5_Fig10_HTML.jpg](img/A978-1-4842-1233-2_5_Fig10_HTML.jpg)\n\
    \n    图 5-10。将整数更改为小数，反之亦然。\n"
- fmt: "# Computed Properties\n\nUp until this point, declaring variables and constants,\
    \ then assigning data to those variables or constants is little different than\
    \ other programming languages. If you have one variable related to another one,\
    \ you could do something like this:\n\n```\nvar cats = 4\nvar dogs: Int\ndogs\
    \ = cats + 2\nprint (dogs)\n```\n\nUnfortunately, this separates the variable\
    \ declaration for `dogs` from the actual setting of the value of the `dogs` variable.\
    \ To keep a variable declaration linked with the code that defines it, Swift offers\
    \ something called computed properties.\n\nWith a computed property, you don’t\
    \ store data directly into a variable. Instead, you define the data type a variable\
    \ can hold and then use other variables or constants to calculate a new value\
    \ to store in that variable. This calculation is known as a getter with code that\
    \ looks like this:\n\n```\nvar dogs : Int {\n    get {\n        return cats +\
    \ 2 // Code to calculate a value\n    }\n}\n```\n\nThe above code declares a variable\
    \ called `dogs` that can only hold integer (`Int`) data types. Then it encloses\
    \ code in curly brackets known as a getter (defined by the keyword `get`).\n\n\
    You can actually have any amount of Swift code inside the getter’s curly brackets,\
    \ but this example only includes the most important line, which uses the `return`\
    \ keyword to return a value that gets stored in the `dogs` variable.\n\nIn this\
    \ case, it takes the value stored in the `cats` variable (which must be defined\
    \ with a value elsewhere in your program), adds 2 to that value, and stores that\
    \ new value in the `dogs` variable. Change the code in the getter and you change\
    \ the computed value that gets stored in the `dogs` variable.\n\nLet’s see how\
    \ that works by following these steps:\n\nMake sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode. Modify the code in the playground file as follows:\n\
    \n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\n    get {\n        return\
    \ cats + 2 // Code to calculate a value\n    }\n}\nprint (dogs)\n```\n\nNotice\
    \ that the right margin of the playground window shows the value of `dogs` as\
    \ shown in Figure [5-11](#A978-1-4842-1233-2_5_Chapter.html#Fig11).\n\n![A978-1-4842-1233-2_5_Fig11_HTML.jpg](A978-1-4842-1233-2_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11.\n\nThe right margin of the playground window shows how the getter\
    \ portion works\n\nGetters use code to calculate the value of a variable. A second\
    \ type of computed property is known as a setter, which runs code that calculates\
    \ the value of a different variable.\n\nA setter runs every time its variable\
    \ gets assigned a value. To see how getters and setters work, follow these steps:\n\
    \nMake sure your `IntroductoryPlayground` file is loaded in Xcode. Modify the\
    \ code in the playground file as follows:\n\n```\nimport Cocoa\nvar cats = 4\n\
    var dogs : Int {\n    get {\n        return cats + 2 // Code to calculate a value\n\
    \    }\n    set(newValue) {\n        cats = 3 * newValue\n    }\n}\nprint (dogs)\n\
    print (cats)\ndogs = 5\nprint (dogs)\nprint (cats)\n```\n\nNote\n\nIn the above\
    \ setter code, `newValue` is actually a default variable that you can omit such\
    \ as:\n\n```\nset {\n    cats = 3 * newValue\n}\n```\n\nIf you want to define\
    \ your own variable name (instead of using the default `newValue` variable), then\
    \ you must put that new name within the parentheses like this:\n\n```\nset (myOwnVariable){\n\
    \    cats = 3 * myOwnVariable\n}\n```\n\nNotice how the value of the `cats` and\
    \ `dogs` variables change when you assign a different value to the `dogs` variable\
    \ as shown in Figure [5-12](#A978-1-4842-1233-2_5_Chapter.html#Fig12).\n\n![A978-1-4842-1233-2_5_Fig12_HTML.jpg](A978-1-4842-1233-2_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12.\n\nThe right margin of the playground window shows how the getter\
    \ and setter code works\n\nLet’s go through this code line by line. First, the\
    \ number 4 gets stored in the `cats` variable. Using the `cats` variable (4) in\
    \ the getter returns `cats + 2` or `4 + 2` (6). So the first `print (dogs)` command\
    \ prints 6.\n\nThe second `print (cats)` prints the value of the `cats` variable,\
    \ which is still 4.\n\nWhen the `dogs` variable gets assigned the number 5, it\
    \ runs the setter. The temporary variable `newValue` gets assigned the number\
    \ 5, which calculates a new value for `cats` as `3 * newValue`, which is `3 *\
    \ 5` or 15. The value of the `cats` variable is now set to 15.\n\nNow the next\
    \ `print (dogs)` command runs, using the value of `dogs`, which is calculated\
    \ by the getter. Since the value of `cats` is 15, the getter calculates `cats\
    \ + 2` or `15 + 2`, which is 17. So the next `print (dogs)` command prints 17\
    \ and the last `print (cats)` command prints 15.\n\nNote\n\nComputed properties\
    \ can run code when assigning a value to a variable. However, use computed properties\
    \ sparingly since they can make your code harder to understand. Computed properties\
    \ are most often used for class properties in object-oriented programming. For\
    \ example, if an object represents a square drawn on the screen, changing the\
    \ width of the square must also change the height of that square at the same time\
    \ (and vice versa)."
  raw: '## Computed Properties


    Up until this point, declaring variables and constants, then assigning data to
    those variable or constants is little different than other programming languages.
    If you have one variable related to another one, you could do something like this:


    `var cats = 4`


    `var dogs: Int`


    `dogs = cats + 2`


    `print (dogs)`


    Unfortunately, this separates the variable declaration for “dogs” from the actual
    setting of the value of the “dogs” variable. To keep a variable declaration linked
    with the code that defines it, Swift offers something called computed properties.


    With a computed property, you don’t store data directly into a variable. Instead,
    you define the data type a variable can hold and then use other variables or constants
    to calculate a new value to store in that variable. This calculation is known
    as a getter with code that looks like this:


    `var dogs : Int {`


    `get {`


    `return cats + 2 // Code to calculate a value`


    `}`


    `}`


    The above code declares a variable called “dogs” that called only hold integer
    (Int) data types. Then it encloses code in curly brackets known as a getter (defined
    by the keyword “get”).


    You can actually have any amount of Swift code inside the getter’s curly brackets,
    but this example only includes the most important line, which uses the “return”
    keyword to return a value that gets stored in the “dogs” variable.


    In this case, it takes the value stored in the “cats” variable (which must be
    defined with a value elsewhere in your program), adds 2 to that value, and stores
    that new value in the “dogs” variable. Change the code in the getter and you change
    the computed value that gets stored in the “dogs” variable.


    Let’s see how that works by following these steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    in the playground file as follows: `import Cocoa` `var cats = 4` `var dogs : Int
    {`     `get {`         `return cats + 2 // Code to calculate a value`     `}`
    `}` `print (dogs)`


    Notice that the right margin of the playground window shows the value of dogs
    as shown in Figure [5-11](#A978-1-4842-1233-2_5_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_5_Fig11_HTML.jpg](A978-1-4842-1233-2_5_Fig11_HTML.jpg)


    Figure 5-11.


    The right margin of the playground window shows how the getter portion works


    Getters use code to calculate the value of a variable. A second type of computed
    property is known as a setter, which runs code that calculates the value of a
    different variable.


    A setter runs every time its variable gets assigned a value. To see how getters
    and setters work, follow these steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    in the playground file as follows: `import Cocoa` `var cats = 4` `var dogs : Int
    {`     `get {`         `return cats + 2 // Code to calculate a value`     `}`
        `set(newValue) {`         `cats = 3 * newValue`     `}` `}` `print (dogs)`
    `print (cats)` `dogs = 5` `print (dogs)` `print (cats)`   Note


    In the above setter code, “newValue” is actually a default variable that you can
    omit such as:


    `set {`


    `cats = 3 * newValue`


    `}`


    If you want to define your own variable name (instead of using the default newValue
    variable), then you must put that new name within the parentheses like this:


    `set (myOwnVariable){`


    `cats = 3 * myOwnVariable`


    `}`


    Notice how the value of the cats and dogs variables change when you assign a different
    value to the dogs variable as shown in Figure [5-12](#A978-1-4842-1233-2_5_Chapter.html#Fig12).


    ![A978-1-4842-1233-2_5_Fig12_HTML.jpg](A978-1-4842-1233-2_5_Fig12_HTML.jpg)


    Figure 5-12.


    The right margin of the playground window shows how the getter and setter code
    works


    Let’s go through this code line by line. First, the number 4 gets stored in the
    “cats” variable. Using the “cats” variable (4) in the getter returns cats + 2
    or 4 + 2 (6). So the first print (dogs) command prints 6.


    The second print (cats) prints the value of the “cats” variable, which is still
    4.


    When the “dogs” variable gets assigned the number 5, it runs the setter. The temporary
    variable “newValue” gets assigned the number 5, which calculates a new value for
    “cats” as 3 * newValue, which is 3 * 5 or 15. The value of the “cats” variable
    is now set to 15.


    Now the next print (dogs) command runs, using the value of “dogs,” which is calculated
    by the getter. Since the value of “cats” is 15, the getter calculates cats + 2
    or 15 + 2, which is 17\. So the next print (dogs) command prints 17 and the last
    print (cats) command prints 15.


    Note


    Computed properties can run code when assigning a value to a variable. However,
    use computed properties sparingly since they can make your code harder to understand.
    Computed properties are most often used for class properties in object-oriented
    programming. For example, if an object represents a square drawn on the screen,
    changing the width of the square must also change the height of that square at
    the same time (and vice versa).'
  trans: "\n# 计算属性\n\n到目前为止，声明变量和常量，然后将数据赋值给这些变量或常量的方式，与其他编程语言差别不大。如果你有一个变量与另一个变量相关，可以这样操作：\n\
    \n```\nvar cats = 4\nvar dogs: Int\ndogs = cats + 2\nprint(dogs)\n```\n\n遗憾的是，这种方式将\
    \ `dogs` 变量的声明与 `dogs` 变量实际值的赋值分离开来。为了让变量声明与其定义代码保持关联，Swift 提供了名为计算属性（computed\
    \ properties）的功能。\n\n使用计算属性时，你不会直接将数据存入变量。相反，你定义变量可以持有的数据类型，然后利用其他变量或常量计算新值，再存储到该变量中。这种计算被称为\
    \ getter（取值器），其代码示例如下：\n\n```\nvar dogs : Int {\n    get {\n        return cats\
    \ + 2 // 用于计算值的代码\n    }\n}\n```\n\n上述代码声明了一个名为 `dogs` 的变量，该变量只能持有整数（`Int`）数据类型。然后，它在大括号内包含了称为\
    \ getter 的代码（由关键字 `get` 定义）。\n\n实际上，你可以在 getter 的大括号内放置任意数量的 Swift 代码，但此示例只包含了最关键的一行，即使用\
    \ `return` 关键字返回一个值，该值会被存储到 `dogs` 变量中。\n\n在此例中，它会获取 `cats` 变量（该变量必须在程序的其他地方被赋值）中存储的值，将其加\
    \ 2，然后将这个新值存入 `dogs` 变量。修改 getter 中的代码，就会改变计算后存入 `dogs` 变量的值。\n\n让我们按照以下步骤来看看这是如何工作的：\n\
    \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按照如下方式修改 playground 文件中的代码：\n\n\
    ```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\n    get {\n        return cats\
    \ + 2 // 用于计算值的代码\n    }\n}\nprint(dogs)\n```\n\n注意，playground 窗口的右侧栏显示了 `dogs`\
    \ 的值，如图 5-11 所示。\n\n![A978-1-4842-1233-2_5_Fig11_HTML.jpg](img/A978-1-4842-1233-2_5_Fig11_HTML.jpg)\n\
    \n图 5-11.\n\nplayground 窗口右侧栏展示了 getter 部分的运行方式\n\nGetter 通过代码来计算一个变量的值。第二种计算属性被称为\
    \ setter（设置器），它会运行代码来计算另一个变量的值。\n\n每次给变量赋值时，setter 都会运行。要了解 getter 和 setter 如何工作，请按以下步骤操作：\n\
    \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按照如下方式修改 playground 文件中的代码：\n\n\
    ```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\n    get {\n        return cats\
    \ + 2 // 用于计算值的代码\n    }\n    set(newValue) {\n        cats = 3 * newValue\n \
    \   }\n}\nprint(dogs)\nprint(cats)\ndogs = 5\nprint(dogs)\nprint(cats)\n```\n\n\
    注意\n\n在上述 setter 代码中，`newValue` 实际上是一个可以省略的默认变量，例如：\n\n```\nset {\n    cats =\
    \ 3 * newValue\n}\n```\n\n如果你想定义自己的变量名（而不是使用默认的 `newValue` 变量），那么必须将该新名称放在括号内，如下所示：\n\
    \n```\nset (myOwnVariable){\n    cats = 3 * myOwnVariable\n}\n```\n\n注意，当你给 `dogs`\
    \ 变量赋予不同值时，`cats` 和 `dogs` 变量的值会如何变化，如图 5-12 所示。\n\n![A978-1-4842-1233-2_5_Fig12_HTML.jpg](img/A978-1-4842-1233-2_5_Fig12_HTML.jpg)\n\
    \n图 5-12.\n\nplayground 窗口右侧栏展示了 getter 和 setter 代码的运行方式\n\n让我们逐行解析这段代码。首先，数字\
    \ 4 被存入 `cats` 变量。在 getter 中使用 `cats` 变量（值为 4）会返回 `cats + 2` 即 `4 + 2`（结果为 6）。因此第一个\
    \ `print(dogs)` 命令打印出 6。\n\n第二个 `print(cats)` 打印出 `cats` 变量的值，该值仍为 4。\n\n当 `dogs`\
    \ 变量被赋值为数字 5 时，setter 会运行。临时变量 `newValue` 被赋值为 5，并据此计算 `cats` 的新值为 `3 * newValue`，即\
    \ `3 * 5` 等于 15。此时 `cats` 变量的值被设为 15。\n\n接下来运行 `print(dogs)` 命令，使用由 getter 计算出的\
    \ `dogs` 的值。由于 `cats` 的值是 15，getter 计算出 `cats + 2` 即 `15 + 2`，结果为 17。因此下一个 `print(dogs)`\
    \ 命令打印出 17，而最后一个 `print(cats)` 命令打印出 15。\n\n注意\n\n计算属性可以在给变量赋值时运行代码。但是，请谨慎使用计算属性，因为它们可能使代码更难以理解。计算属性最常用于面向对象编程中的类属性。例如，如果一个对象代表屏幕上绘制的一个正方形，改变正方形的宽度必须同时改变其高度（反之亦然）。\n"
- fmt: "# Using Optional Variables\n\nThe biggest flaw when you declare a variable\
    \ is that you can’t use that variable until you store data in it. If you try using\
    \ a variable before it stores any data, your program will fail and crash. To avoid\
    \ this problem, many programmers initially store “dummy” data in a variable. Unfortunately,\
    \ such “dummy” data can still be used by a program and cause errors.\n\nTo avoid\
    \ this problem, Swift offers something called optional variables. An optional\
    \ variable can store data or nothing at all. If an optional variable contains\
    \ nothing, it’s considered to hold a value called `nil`. By using optional variables,\
    \ you avoid crashing a program if a variable doesn’t contain any data.\n\nTo create\
    \ an optional variable, you just declare a variable and its data type with a question\
    \ mark like this:\n\n```\nvar fish : String?\n```\n\nThe question mark identifies\
    \ a variable as an optional. You can use optional variables exactly like ordinary\
    \ variables to store data in them such as:\n\n```\nfish = \"goldfish\"\n```\n\n\
    Although storing data in an optional variable is no different than storing data\
    \ in an ordinary variable, retrieving data from an optional variable requires\
    \ extra steps. First, you must check if the optional variable even has data in\
    \ it or not. Once you know that an optional variable contains data, you have to\
    \ unwrap that optional to get to the actual data by using an exclamation mark\
    \ such as:\n\n```\nprint (fish!)\n```\n\nTo see how optional variables work, try\
    \ the following:\n\nMake sure your `IntroductoryPlayground` file is loaded in\
    \ Xcode. Modify the code as follows:\n\n```\nimport Cocoa\nvar fish : String?\n\
    fish = \"goldfish\"\nprint (fish)\nprint (fish!)\n```\n\nNotice that `fish` by\
    \ itself is actually an optional variable, but when you use the exclamation mark\
    \ to unwrap it, you access the actual data inside the optional as shown in Figure\
    \ 5-13.\n\nType two additional lines of code underneath:\n\n```\nvar str : String\n\
    str = fish\n```\n\n![A978-1-4842-1233-2_5_Fig13_HTML.jpg](A978-1-4842-1233-2_5_Fig13_HTML.jpg)\n\
    \n**Figure 5-13.** Seeing the difference between an optional and the unwrapped\
    \ data inside an optional\n\nNotice that you can’t assign the optional variable\
    \ `fish` to `str` because `str` can only hold `String` data types. Instead, you\
    \ must unwrap the optional variable `fish` and retrieve its actual string content\
    \ by using the exclamation mark like this:\n\n```\nvar str : String\nstr = fish!\n\
    ```\n\nBefore unwrapping optional variables to get to their data, always check\
    \ to see if the optional variable contains a `nil` value or a variable. If you\
    \ try to use an optional variable when it contains a `nil` value, your program\
    \ will crash.\n\nTo check if an optional variable holds a `nil` value or not,\
    \ you have two options. First, you can explicitly check for a `nil` value like\
    \ this:\n\n```\nif fish != nil {\n    print (\"The optional variable is not nil\"\
    )\n}\n```\n\nThis code checks if the `fish` optional variable is not equal to\
    \ (`!=`) `nil`. If an optional variable is not `nil`, then it must hold a value\
    \ so then it’s safe to retrieve it.\n\nA second way to check if an optional variable\
    \ has a value or not is to assign it to a constant like this:\n\n```\nif let food\
    \ = fish {\n    print (\"The optional variable has a value\")\n    print (food)\n\
    }\n```\n\nIf the optional variable has a value, it stores that value in a constant\
    \ (or another variable). Now you can access that value through the constant or\
    \ variable. To see how this works, follow these steps:\n\nMake sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode. Modify the code as follows:\n\n```\nimport Cocoa\n\
    var fish : String?\nfish = \"goldfish\"\nif fish != nil {\n    print (\"The optional\
    \ variable is not nil\")\n    var str : String\n    str = fish!\n    print (str)\n\
    }\nif let food = fish {\n    print (\"The optional variable has a value\")\n \
    \   print (food)\n}\n```\n\nNotice that you can retrieve the value in an optional\
    \ variable by unwrapping it with an exclamation mark or storing it in a constant\
    \ and then using that constant as shown in Figure 5-14.\n\n![A978-1-4842-1233-2_5_Fig14_HTML.jpg](A978-1-4842-1233-2_5_Fig14_HTML.jpg)\n\
    \n**Figure 5-14.** Two ways to access a value stored in an optional variable"
  raw: '## Using Optional Variables


    The biggest flaw when you declare a variable is that you can’t use that variable
    until you store data in it. If you try using a variable before it stores any data,
    your program will fail and crash. To avoid this problem, many programmers initially
    store “dummy” data in a variable. Unfortunately, such “dummy” data can still be
    used by a program and cause errors.


    To avoid this problem, Swift offers something called optional variables. An optional
    variable can store data or nothing at all. If an optional variable contains nothing,
    it’s considered to hold a value called nil. By using optional variables, you avoid
    crashing a program if a variable doesn’t contain any data.


    To create an optional variable, you just declare a variable and its data type
    with a question mark like this:


    `var fish : String?`


    The question mark identifies a variable as an optional. You can use optional variables
    exactly like ordinary variables to store data in them such as:


    `fish = "goldfish"`


    Although storing data in an optional variable is no different than storing data
    in an ordinary variable, retrieving data from an optional variable requires extra
    steps. First, you must check if the optional variable even has data in it or not.
    Once you know that an optional variable contains data, you have to unwrap that
    optional to get to the actual data by using an exclamation mark such as:


    `print (fish!)`


    To see how optional variables work, try the following:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    as follows: `import Cocoa` `var fish : String?` `fish = "goldfish"` `print (fish)`
    `print (fish!)`


    Notice that “fish” by itself is actually an optional variable, but when you use
    the exclamation mark to unwrap it, you access the actual data inside the optional
    as shown in Figure [5-13](#A978-1-4842-1233-2_5_Chapter.html#Fig13).


    Type two additional lines of code underneath: `var str : String` `str = fish`


    ![A978-1-4842-1233-2_5_Fig13_HTML.jpg](A978-1-4842-1233-2_5_Fig13_HTML.jpg)


    Figure 5-13.


    Seeing the difference between an optional and the unwrapped data inside an optional


    Notice that you can’t assign the optional variable “fish” to “str” because “str”
    can only hold String data types. Instead, you must unwrap the optional variable
    “fish” and retrieve its actual string content by using the exclamation mark like
    this:


    `var str : String`


    `str = fish!`


    Before unwrapping optional variables to get to their data, always check to see
    if the optional variable contains a nil value or a variable. If you try to use
    an optional variable when it contains a nil value, your program will crash.


    To check if an optional variable holds a nil value or not, you have two options.
    First, you can explicitly check for a nil value like this:


    `if fish != nil {`


    `print ("The optional variable is not nil")`


    `}`


    This code checks if the “fish” optional variable is not equal to (!=) nil. If
    an optional variable is not nil, then it must hold a value so then it’s safe to
    retrieve it.


    A second way to check if an optional variable has a value or not is to assign
    it to a constant like this:


    `if let food = fish {`


    `print ("The optional variable has a value")`


    `print (food)`


    `}`


    If the optional variable has a value, it stores that value in a constant (or another
    variable). Now you can access that value through the constant or variable. To
    see how this works, follow these steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    as follows: `import Cocoa` `var fish : String?` `fish = "goldfish"` `if fish !=
    nil {`     `print ("The optional variable is not nil")`     `var str : String`
        `str = fish!`     `print (str)` `}` `if let food = fish {`     `print ("The
    optional variable has a value")`     `print (food)` `}`


    Notice that you can retrieve the value in an optional variable by unwrapping it
    with an exclamation mark or storing it in a constant and then using that constant
    as shown in Figure [5-14](#A978-1-4842-1233-2_5_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_5_Fig14_HTML.jpg](A978-1-4842-1233-2_5_Fig14_HTML.jpg)


    Figure 5-14.


    Two ways to access a value stored in an optional variable'
  trans: "\n# 使用可选变量\n\n声明变量时最大的缺陷在于，在存储数据之前你无法使用该变量。如果在存储任何数据之前就尝试使用变量，程序将会运行失败并崩溃。为避免此问题，许多程序员会先在变量中存储“虚拟”数据。遗憾的是，程序仍可能使用这种“虚拟”数据并引发错误。\n\
    \n为了解决这个问题，Swift 提供了一种称为可选变量的机制。可选变量可以存储数据，也可以不存储任何内容。如果可选变量不包含任何内容，则视为它持有名为 `nil`\
    \ 的值。通过使用可选变量，当变量不包含任何数据时，可以避免程序崩溃。\n\n要创建可选变量，只需声明变量及其数据类型，并在末尾加上问号，如下所示：\n\n\
    ```\nvar fish : String?\n```\n\n问号将变量标识为可选类型。你可以像使用普通变量一样，使用可选变量来存储数据，例如：\n\n\
    ```\nfish = \"goldfish\"\n```\n\n虽然在可选变量中存储数据与在普通变量中存储数据并无区别，但从可选变量中检索数据则需要额外的步骤。首先，你必须检查该可选变量是否包含数据。一旦确认可选变量包含数据，你就需要使用感叹号来解包该可选变量，以获取实际数据，例如：\n\
    \n```\nprint (fish!)\n```\n\n要了解可选变量如何工作，请尝试以下步骤：\n\n确保你的 `IntroductoryPlayground`\
    \ 文件已在 Xcode 中加载。按如下方式修改代码：\n\n```\nimport Cocoa\nvar fish : String?\nfish = \"\
    goldfish\"\nprint (fish)\nprint (fish!)\n```\n\n请注意，`fish` 本身实际上是一个可选变量，但当你使用感叹号解包它时，你就能访问可选变量内部的真实数据，如图\
    \ 5-13 所示。\n\n在下方再输入两行代码：\n\n```\nvar str : String\nstr = fish\n```\n\n![A978-1-4842-1233-2_5_Fig13_HTML.jpg](img/A978-1-4842-1233-2_5_Fig13_HTML.jpg)\n\
    \n**图 5-13.** 查看可选变量与解包后数据的区别\n\n请注意，你不能将可选变量 `fish` 赋值给 `str`，因为 `str` 只能存储 `String`\
    \ 类型的数据。相反，你必须使用感叹号解包可选变量 `fish` 并检索其实际的字符串内容，如下所示：\n\n```\nvar str : String\n\
    str = fish!\n```\n\n在解包可选变量以获取其数据之前，务必检查该可选变量包含的是 `nil` 值还是变量。如果尝试在可选变量包含 `nil`\
    \ 值时使用它，程序将会崩溃。\n\n要检查可选变量是否持有 `nil` 值，有两种选择。首先，你可以像这样显式检查 `nil` 值：\n\n```\nif\
    \ fish != nil {\n    print (\"The optional variable is not nil\")\n}\n```\n\n\
    这段代码检查 `fish` 可选变量是否不等于（`!=`）`nil`。如果可选变量不是 `nil`，那么它一定持有某个值，因此安全地检索它是安全的。\n\n\
    检查可选变量是否有值的第二种方法是将其赋值给一个常量，如下所示：\n\n```\nif let food = fish {\n    print (\"The\
    \ optional variable has a value\")\n    print (food)\n}\n```\n\n如果可选变量有值，它会将该值存储在一个常量（或另一个变量）中。现在你可以通过该常量或变量来访问该值。要了解其工作原理，请按照以下步骤操作：\n\
    \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按如下方式修改代码：\n\n```\nimport Cocoa\n\
    var fish : String?\nfish = \"goldfish\"\nif fish != nil {\n    print (\"The optional\
    \ variable is not nil\")\n    var str : String\n    str = fish!\n    print (str)\n\
    }\nif let food = fish {\n    print (\"The optional variable has a value\")\n \
    \   print (food)\n}\n```\n\n请注意，你可以通过使用感叹号解包可选变量，或将其存储在常量中然后使用该常量，来检索可选变量中的值，如图\
    \ 5-14 所示。\n\n![A978-1-4842-1233-2_5_Fig14_HTML.jpg](img/A978-1-4842-1233-2_5_Fig14_HTML.jpg)\n\
    \n**图 5-14.** 访问可选变量中存储值的两种方法\n"
- fmt: "## Linking Swift Code to a User Interface\n\nEvery program needs to store\
    \ data, and one of the most common ways to store data in a variable is to retrieve\
    \ data from a user interface. To link a user interface item to Swift code, you\
    \ need to create an `IBOutlet` variable.\n\nIf you had a text field connected\
    \ to an `IBOutlet` variable, anything the user typed in the text field would automatically\
    \ get stored in the `IBOutlet` variable. Likewise, anything you store in the `IBOutlet`\
    \ variable would suddenly appear in the text field. `IBOutlet` variables act like\
    \ a link between your Swift code and your user interface as shown in Figure [5-15](#A978-1-4842-1233-2_5_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1233-2_5_Fig15_HTML.gif](A978-1-4842-1233-2_5_Fig15_HTML.gif)\n\
    \nFigure 5-15. `IBOutlet` variables link your user interface items with Swift\
    \ code\n\nSince user interface items such as text fields may initially be empty,\
    \ `IBOutlet` variables are defined as implicitly unwrapped optional variables\
    \ defined by an exclamation mark like this:\n\n```\n@IBOutlet weak var labelText:\
    \ NSTextField!\n```\n\nIf an `IBOutlet` were a regular variable and connected\
    \ to an empty text field, your program would risk crashing without any data in\
    \ the `IBOutlet` variable.\n\nIf an `IBOutlet` were an optional variable, you\
    \ could define it with a question mark like this:\n\n```\n@IBOutlet weak var labelText:\
    \ NSTextField?\n```\n\nUnfortunately, every time you wanted to access the data\
    \ stored in this optional variable, you would have to type an exclamation mark.\
    \ If you accessed this `IBOutlet` variable multiple times, each time you would\
    \ have to type an exclamation mark, which can get annoying while making your code\
    \ look harder to read.\n\nTo let you access an `IBOutlet` variable without typing\
    \ exclamation marks all the time, it’s easier to create an `IBOutlet` variable\
    \ as an implicitly unwrapped optional variable, which means that if it holds a\
    \ value, you can access it without typing the unwrapping exclamation mark.\n\n\
    To see how Xcode creates `IBOutlet`s as implicitly unwrapped optional variables,\
    \ open the `MyFirstProgram` project that you created earlier:\n\nMake sure your\
    \ `MyFirstProgram` is loaded in Xcode. Click on the `AppDelegate.swift` file in\
    \ the Project Navigator. Xcode’s middle pane displays the contents of that `.swift`\
    \ file. Notice that all the `IBOutlet` variables are declared with an exclamation\
    \ mark, meaning they’re implicitly unwrapped optional variables: `@IBOutlet weak\
    \ var labelText: NSTextField!` and `@IBOutlet weak var messageText: NSTextField!`\n\
    \nAlso notice that the `IBAction changeCase` method lets you access the contents\
    \ of these implicitly unwrapped optional variables without using an exclamation\
    \ mark.\n\n```\n@IBOutlet weak var labelText: NSTextField!\n@IBOutlet weak var\
    \ messageText: NSTextField!\n@IBAction func changeCase(sender: NSButton) {\n \
    \   labelText.stringValue = messageText.stringValue.uppercaseString\n    let warning\
    \ = labelText.stringValue\n}\n```\n\nReplace the exclamation marks at the end\
    \ of each `IBOutlet` variable with a question mark like this: `@IBOutlet weak\
    \ var labelText: NSTextField?` and `@IBOutlet weak var messageText: NSTextField?`\n\
    \nNotice that Xcode now displays error messages each time you use an `IBOutlet`\
    \ variable. That’s because you need to unwrap each optional variable with an exclamation\
    \ mark like this:\n\n```\n@IBAction func changeCase(sender: NSButton) {\n    labelText!.stringValue\
    \ = messageText!.stringValue.uppercaseString\n    let warning = labelText!.stringValue\n\
    }\n```\n\nIf you define your `IBOutlet`s as regular optional variables (defined\
    \ by a question mark), then you must unwrap each optional variable with an exclamation\
    \ mark to access its value.\n\nIf you simply define your `IBOutlet`s as implicitly\
    \ unwrapped optional variables (which Xcode does for you), then you don’t need\
    \ to type an exclamation mark to unwrap the optional variables.\n\nBasically,\
    \ let Xcode create your `IBOutlet`s as implicitly unwrapped variables (with an\
    \ exclamation mark) to make typing Swift code easier.\n\nNow you may wonder when\
    \ should you use an optional variable (defined by a question mark `?`) and when\
    \ should you use an implicitly unwrapped optional variable defined by an exclamation\
    \ mark `!`)?\n\nIn general, use implicitly unwrapped optional variables for `IBOutlet`s\
    \ to make it easy to write Swift code without typing exclamation marks all over.\
    \ If you use implicitly unwrapped optional variables any other time, your variable\
    \ could contain a `nil` value and Xcode won’t catch any potential errors if you\
    \ try to use it.\n\nTo see the danger of using implicitly unwrapped optional variables,\
    \ follow these steps:\n\nMake sure your `IntroductoryPlayground` file is loaded\
    \ in Xcode. Modify the code as follows:\n```\nimport Cocoa\nvar safe : Int?  //\
    \ optional variable\nvar danger : Int!// implicitly unwrapped optional variable\n\
    print (danger * 2)\nprint (safe * 2)\n```\n\nNotice that neither integer variable\
    \ has a value in it, but Xcode cheerfully lets you perform a calculation with\
    \ a `nil` value in an implicitly unwrapped optional but flags a possible error\
    \ with a regular optional variable as shown in Figure [5-16](#A978-1-4842-1233-2_5_Chapter.html#Fig16).\n\
    \n![A978-1-4842-1233-2_5_Fig16_HTML.jpg](A978-1-4842-1233-2_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16. Xcode can identify possible problems with undefined optional variables\
    \ but not undefined implicitly unwrapped optional variables\n\nBy making you unwrap\
    \ optional variables with an exclamation mark (`!`), Xcode forces you to acknowledge\
    \ you’re using an optional variable so you can remember to check if it has a `nil`\
    \ value or not.\n\nSince implicitly unwrapped optional variables let you type\
    \ the variable name without typing additional symbols, it’s much easier to forget\
    \ you’re working with optional variables and check for a possible `nil` value\
    \ before trying to use it. Optional variables can’t prevent problems, but they\
    \ can force you to remember you’re working with potentially `nil` values.\n\n\
    ## Summary\n\nIf you’re coming from another programming environment, you’ve already\
    \ seen numerous ways that Swift differs from other languages. Swift’s playground\
    \ interpreter lets you test your code in a safe environment before copying and\
    \ pasting it into an actual program. Playgrounds give you the freedom to experiment\
    \ freely with Swift commands.\n\nYou can create single line comments by using\
    \ the `//` symbols. You can create multiple line comments by marking the beginning\
    \ of a comment with the `/*` symbols and the end of a comment with the `*/` symbols.\n\
    \nThe three most common data types are integers (`Int`), decimal numbers (`Float`\
    \ or `Double`), and text strings (`String`). If you need absolute precision with\
    \ decimal numbers, use `Double` data types. Otherwise just use `Float`.\n\nTo\
    \ make data types easier to understand, you can use `typealias`es, which let you\
    \ substitute a descriptive name to represent a common data type. To make variable\
    \ names more flexible, you can use Unicode characters that can represent symbols\
    \ or foreign language characters.\n\nStoring data in a variable can be as simple\
    \ as assigning it to a value. Swift also offers computed properties that let you\
    \ modify a variable or another variable when assigned a new value. Computed properties\
    \ are far more useful when working with classes and object-oriented programming.\n\
    \nEven more important are optional variables that let you handle `nil` values\
    \ without crashing your program. Optional variables are especially important when\
    \ using `IBOutlet`s to connect Swift code to user interface items such as labels\
    \ and text fields.\n\nWhen you create an optional variable (with a question mark),\
    \ you need to unwrap it to access its actual data (using an exclamation mark).\n\
    \nVariables are crucial for storing data temporarily so you’ll use them often.\
    \ When you start learning about classes and object-oriented programming, you’ll\
    \ use variables for defining properties. Essentially, any time you need to store\
    \ one chunk of data, you’ll declare a variable to hold it."
