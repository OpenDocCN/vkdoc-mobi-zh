    ## Using Inheritance in an OS X Program


    Inheritance lets you create method names that remain the same while the underlying
    code changes between two classes. In this sample program, you’ll define one class
    and then inherit properties and methods for a second class. This second class
    will also override a method and add code to make that overridden method behave
    slightly differently.


    To create the sample program that shows how inheritance works, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type InheritProgram.
