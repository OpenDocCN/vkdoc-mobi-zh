    Swift 文件。


    设计程序用户界面涉及使用 `.xib` 或 `.storyboard` 文件，或两者的组合。故事板减少了编写 Swift 代码的需求，但无论使用哪种类型的文件，你仍然需要编写
    Swift 代码来使你的用户界面完全正常工作。


    # 15. 用按钮选择命令


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​15](http://dx.doi.org/10.1007/978-1-4842-1233-2_15))
    包含补充材料，可供授权用户使用。


    每个程序都需要为用户提供控制计算机的方式。在过去，这意味着要知道如何输入正确的命令来使程序运行，但在今天的图形用户界面中，控制程序更简单的方式是从可用命令列表中进行选择。向程序发出命令最简单的方法是通过按钮。


    通过在屏幕上显示多个按钮，用户界面随时为用户提供多种选择。用户不需要记忆晦涩的命令，只需通过鼠标指向并点击来选择命令即可。


    Xcode 提供了多种不同类型的按钮，你可以将其放置在用户界面上，但它们的工作方式都是相同的。一个按钮代表一个命令，点击该按钮会运行存储在`IBAction`方法中的
    Swift 代码。


    要使用按钮，只需将它们放置在用户界面（可以是 `.xib` 或 `.storyboard` 文件）上，修改标签以显示你希望按钮代表的命令，然后通过`IBAction`方法将按钮连接到
    Swift 代码。


    所有按钮都基于 Cocoa 框架中定义的`NSButton`类。虽然大多数按钮显示可以包含按钮所代表命令的文本，但有些按钮根本不显示文本。尽管外观上存在差异，但所有按钮的工作方式相同，并且可以随时更改为另一种按钮类型。可用的不同按钮类型如图
