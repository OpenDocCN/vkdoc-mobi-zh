    Click on the .storyboard file in the Project Navigator pane.   Choose View ➤ Utilities\
    \ ➤ Show Object Library.   Drag any blue controller from the Object Library (see\
    \ Figure [14-11](#A978-1-4842-1233-2_14_Chapter.html#Fig11)) anywhere on the storyboard.\
    \  \n\nThe five types of controllers you can place on a storyboard include:\n\n\
    *   View Controller – Controls an .xib file so you can include it with a storyboard\n\
    *   Window Controller – Controls a single window or view\n*   Page Controller\
    \ – Defines the animation between views\n*   Vertical/Horizontal Split View Controller\
    \ – Displays two views side by side or stacked on top of each other\n*   Tab View\
    \ Controller – Displays a tabbed interface that controls two or more views\n\n\
    You can think of a Window Controller as a window that contains a view. The view\
    \ displayed inside the window is identified by an arrow pointing from the Window\
    \ Controller to the view as shown in Figure [14-13](#A978-1-4842-1233-2_14_Chapter.html#Fig13).\n\
    \n![A978-1-4842-1233-2_14_Fig13_HTML.jpg](A978-1-4842-1233-2_14_Fig13_HTML.jpg)\n\
    \nFigure 14-13.\n\nA Window Controller contains a single view\n\nOn the other\
    \ hand, a Vertical/Horizontal Split View Controller acts like a window that holds\
    \ two views either side by side or stacked on top of each other as shown in Figure\
    \ [14-14](#A978-1-4842-1233-2_14_Chapter.html#Fig14).\n\n![A978-1-4842-1233-2_14_Fig14_HTML.jpg](A978-1-4842-1233-2_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14.\n\nA Split View Controller contains two views\n\nThe Tab View\
    \ Controller also consists of a single window that can contain two or more views.\
    \ The difference is that it can display tabs where each tab represents a different\
    \ view as shown in Figure [14-15](#A978-1-4842-1233-2_14_Chapter.html#Fig15).\
    \ You can also add more than two views to a Tab View Controller.\n\n![A978-1-4842-1233-2_14_Fig15_HTML.jpg](A978-1-4842-1233-2_14_Fig15_HTML.jpg)\n\
    \nFigure 14-15.\n\nA Tab View Controller displays two or more views in one window\
    \ identified by tabs"
  trans: "\n![A978-1-4842-1233-2_14_Fig8_HTML.jpg](img/A978-1-4842-1233-2_14_Fig8_HTML.jpg)\n\
    \n图 14-8. 为“打开窗口”按钮创建 `IBAction` 方法\n\n`var windowController = secondView(windowNibName:\
    \ \"secondView\")`\n\n按如下方式修改 `IBAction` 方法：\n\n```\n@IBAction func openWindow(sender:\
    \ NSButton) {\n    windowController.showWindow(sender)\n}\n```\n\n单击 `secondView.xib`\
    \ 文件。保持助理编辑器打开，并在右侧显示 `secondView.swift` 文件。将一个“下压按钮”拖拽到 `secondView.xib` 文件的窗口中，并将此按钮标记为“返回”。将鼠标移到刚创建的“返回”按钮上，按住\
    \ Control 键，然后将鼠标拖拽到 `secondView.swift` 文件最后一个大括号的上方。松开 Control 键和鼠标。此时会弹出一个窗口。单击“连接”弹出菜单，选择“操作”。在“名称”文本框中单击，输入\
    \ `closeWindow`。在“类型”弹出菜单中单击，选择 `NSButton`。单击“连接”按钮。按如下方式修改 `IBAction` 方法 `closeWindow`：\n\
    \n```\n@IBAction func closeWindow(sender: NSButton) {\n    self.close()\n}\n```\n\
    \n单击“返回”按钮，关闭由 `secondView.xib` 文件定义的第二个窗口。选择 XIBProgram ➤ 退出 XIBProgram。选择 产品\
    \ ➤ 运行。你的程序将会出现。单击“打开窗口”按钮。第二个窗口出现，如图 14-9 所示。\n\n![A978-1-4842-1233-2_14_Fig9_HTML.jpg](img/A978-1-4842-1233-2_14_Fig9_HTML.jpg)\n\
    \n图 14-9. 运行 XIBProgram\n\n你所做的是用视图控制器创建了第二个 `.xib` 文件。然后，你在 `AppDelegate.swift`\
    \ 文件中创建了一个名为 `windowController` 的对象，该对象基于加载 `secondView.xib` 文件的 `secondView`\
    \ 类。\n\n在 `openWindow` 这个 `IBAction` 方法内部，你使用了 `showWindow` 方法来打开存储在 `windowController`\
    \ 对象中的 `.xib` 文件，该对象属于 `secondView` 类。\n\n当这个第二个窗口出现时，你点击了“返回”按钮，该按钮执行了用于关闭窗口的\
    \ `self.close()` 命令。\n\n如你所见，打开和关闭多个 `.xib` 文件需要 Swift 代码。为了使窗口之间的转换更加容易，Xcode\
    \ 还提供了故事板。\n\n## 使用故事板\n\n故事板由两部分组成：\n\n- **场景** – 显示用户界面的窗口\n- **连线** – 定义场景之间的过渡\n\
    \n你可以创建场景，并在场景上放置按钮和文本字段等控件。然后，你使用连线连接场景。通过这种方式，你可以定义用户界面如何在屏幕上显示信息。\n\n要尝试使用故事板，你需要按照以下步骤创建一个使用故事板的项目：\n\
    \n在 Xcode 中，选择 文件 ➤ 新建 ➤ 项目。在 OS X 类别下，单击“应用程序”。单击“Cocoa 应用程序”，然后单击“下一步”按钮。Xcode\
    \ 现在会要求输入产品名称。在“产品名称”文本框中单击，输入 `StoryProgram`。确保“语言”弹出菜单显示为 Swift，并且仅选中“使用故事板”复选框。单击“下一步”按钮。Xcode\
    \ 会询问你想要在哪里存储项目。选择一个文件夹来存储你的项目，然后单击“创建”按钮。\n\n当你创建一个使用故事板的项目时，你会看到两个框，其中一个框代表你的窗口或视图（标有“窗口控制器”），第二个框代表该窗口的内容（其标题栏中标有“视图控制器”），如图\
    \ 14-10 所示。第二个框（带有一个指向它的箭头）是你可以放置其他用户界面元素（如按钮、文本字段和标签）的地方。\n\n![A978-1-4842-1233-2_14_Fig10_HTML.jpg](img/A978-1-4842-1233-2_14_Fig10_HTML.jpg)\n\
    \n图 14-10. 故事板中的视图控制器和视图\n\n你可以将对象库中的元素放到底部窗口（标有“视图控制器”）上。要向故事板添加额外的窗口，你可以使用对象库并将不同的控制器对象拖入你的故事板，如图\
    \ 14-11 所示。\n\n![A978-1-4842-1233-2_14_Fig11_HTML.jpg](img/A978-1-4842-1233-2_14_Fig11_HTML.jpg)\n\
    \n图 14-11. 可以添加到故事板的控制器\n\n### 缩放故事板\n\n当你在项目导航器窗格中单击一个 `.storyboard` 文件时，Xcode\
    \ 会显示你的故事板。故事板的一个问题是它们往往包含多个场景和连线，你很难一目了然。\n\n为了帮助你查看整个故事板或其中的一部分，你可以进行缩放。Xcode\
    \ 提供了两种缩放方式：\n\n-   双击故事板上任何元素之外的空白区域（这会在放大和缩小故事板之间切换）。\n-   在故事板的空白区域上右键单击，然后从弹出菜单中选择一个缩放级别，如图\
    \ 14-12 所示。\n\n    ![A978-1-4842-1233-2_14_Fig12_HTML.jpg](img/A978-1-4842-1233-2_14_Fig12_HTML.jpg)\n\
    \n    图 14-12. 右键单击会显示一个缩放弹出菜单\n\n缩放级别越低，你能看到的故事板越多，因此 25% 的缩放级别比 50% 的缩放级别能显示更多的故事板。\n\
    \n**注意：** 当你想要在用户界面上放置不同的元素（如按钮或文本字段）时，需要将故事板缩放级别更改为 100%。\n\n### 向故事板添加场景\n\n\
    你可以在任何缩放级别下向故事板添加场景。较低的缩放级别（例如 25% 或 50%）只是让你更容易看到故事板中各个场景是如何连接的。要在故事板上放置一个新场景，请按照以下步骤操作：\n\
    \n在项目导航器窗格中单击 `.storyboard` 文件。选择 视图 ➤ 工具 ➤ 显示对象库。将对象库中的任何蓝色控制器（参见图 14-11）拖到故事板的任意位置。\n\
    \n你可以放置在故事板上的五种控制器包括：\n\n- **视图控制器** – 控制一个 `.xib` 文件，以便你可以将其包含在故事板中\n- **窗口控制器**\
    \ – 控制单个窗口或视图\n- **页面控制器** – 定义视图之间的动画\n- **垂直/水平分割视图控制器** – 并排显示两个视图，或将它们上下堆叠显示\n\
    - **标签视图控制器** – 显示一个带有标签的界面，用于控制两个或更多视图\n\n你可以将窗口控制器视为一个包含视图的窗口。窗口中显示的视图由从窗口控制器指向视图的箭头标识，如图\
    \ 14-13 所示。\n\n![A978-1-4842-1233-2_14_Fig13_HTML.jpg](img/A978-1-4842-1233-2_14_Fig13_HTML.jpg)\n\
    \n图 14-13. 窗口控制器包含单个视图\n\n另一方面，垂直/水平分割视图控制器的作用就像一个包含两个视图的窗口，这两个视图可以并排放置，也可以上下堆叠，如图\
    \ 14-14 所示。\n\n![A978-1-4842-1233-2_14_Fig14_HTML.jpg](img/A978-1-4842-1233-2_14_Fig14_HTML.jpg)\n\
    \n图 14-14. 分割视图控制器包含两个视图\n\n标签视图控制器也由一个可以包含两个或更多视图的窗口组成。不同之处在于它可以显示标签，每个标签代表一个不同的视图，如图\
    \ 14-15 所示。你也可以向标签视图控制器添加两个以上的视图。\n\n![A978-1-4842-1233-2_14_Fig15_HTML.jpg](img/A978-1-4842-1233-2_14_Fig15_HTML.jpg)\n\
    \n图 14-15. 标签视图控制器在一个窗口中显示两个或更多视图，并通过标签标识\n"
- fmt: '### Defining the Initial Scene in a Storyboard


    In every storyboard, one scene must be designated as the initial scene, which
    is the first window or view that appears when your program runs. `Xcode` identifies
    the initial scene with an arrow pointing to the right.


    Another way to identify the initial scene is to click on the blue icon in the
    top middle part of the controller and open the `Show Attributes Inspector` pane.
    If the `Is Initial Controller` check box is selected, then the currently selected
    window is the initial scene as shown in Figure 14-16.


    ![A978-1-4842-1233-2_14_Fig16_HTML.jpg](A978-1-4842-1233-2_14_Fig16_HTML.jpg)


    Figure 14-16. An arrow and the `Is Initial Controller` check box identifies the
    initial scene


    To change the initial scene, you can do one of the following:

    - Drag the initial scene arrow and make it point to a different scene

    - Select the `Is Initial Controller` check box for a different scene


    **Note:** There can only be one initial scene at a time.


    ### Connecting Scenes with Segues


    When a storyboard consists of two or more scenes, you need a way to display those
    other scenes. First, you need a way to switch from one scene to another. Second,
    you need a way to go back. Third, you may need to pass data from one scene to
    another.


    Moving from one scene to another involves creating a segue between scenes. To
    create a segue between scenes, follow these steps:


    1. Make sure your `StoryProgram` project is loaded in `Xcode` and click on the
    `Main.storyboard` file in the `Project Navigator` pane.

    2. Place a button on the first scene.

    3. Move the mouse pointer over this button, hold down the `Control` key, and drag
    the mouse from this button over the second scene. `Xcode` highlights the second
    scene as shown in Figure 14-17.


    ![A978-1-4842-1233-2_14_Fig17_HTML.jpg](A978-1-4842-1233-2_14_Fig17_HTML.jpg)


    Figure 14-17. Control-dragging the mouse from a button to another scene creates
    a segue


    4. Release the `Control` key and the mouse. `Xcode` displays a pop-up menu as
    shown in Figure 14-18.


    ![A978-1-4842-1233-2_14_Fig18_HTML.jpg](A978-1-4842-1233-2_14_Fig18_HTML.jpg)


    Figure 14-18. A pop-up menu lets you define how to display the scene


    5. Choose an option such as `popover` or `sheet`. `Xcode` creates a segue between
    the two scenes. If you click on a segue, `Xcode` highlights the button that runs
    the segue. If you open the `Show Attributes Inspector` pane, you can give the
    segue an identifying name and also change the segue style as shown in Figure 14-19.


    ![A978-1-4842-1233-2_14_Fig19_HTML.jpg](A978-1-4842-1233-2_14_Fig19_HTML.jpg)


    Figure 14-19. Clicking on a segue lets you edit its attributes and identify the
    user interface item that runs that segue


    ### Displaying Scenes From a Segue


    A segue not only connects one scene to another scene, but also defines how that
    second scene appears. The five different ways a scene can appear include:

    - **Popover** – Displays a scene as a window that pops up over or under the button
    connected to the segue

    - **Show** – Displays a scene as a separate window that can be moved and resized

    - **Custom** – Lets you create a custom appearance for the scene

    - **Modal** – Displays a scene as a dialog that won’t let the user do anything
    else until dismissing this scene

    - **Sheet** – Displays a scene that slides down from the title bar of the window


    When you first create a segue, you can define how the segue should display the
    scene. However, you can always change this by following these steps:


    1. Make sure your `StoryProgram` project is loaded in `Xcode` and click on the
    `Main.storyboard` file in the `Project Navigator` pane.

    2. Click on the segue that you want to modify. `Xcode` highlights your chosen
    segue.

    3. Choose `View` ➤ `Utilities` ➤ `Show Attributes Inspector`. The `Attributes
    Inspector` pane lets you modify the `Identifier` and `Style` properties (see Figure
    14-19).

    4. Click in the `Style` pop-up menu in the `Show Attributes Inspector` pane and
    choose a different style such as `Modal` or `Sheet`.'
