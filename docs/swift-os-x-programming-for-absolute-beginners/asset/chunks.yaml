    @IBAction func queryButton(sender: NSButton) {

    }

    ```


    - 将鼠标移到 **Key** 文本字段上（该字段出现在 **Add** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `addKeyField`，然后点击
    **Connect** 按钮。


    - 将鼠标移到 **Value** 文本字段上（该字段出现在 **Add** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `addValueField`，然后点击
    **Connect** 按钮。


    - 将鼠标移到 **Key** 文本字段上（该字段出现在 **Delete** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `deleteKeyField`，然后点击
