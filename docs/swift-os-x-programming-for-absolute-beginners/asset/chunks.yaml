- fmt: "# 5. Learning Swift\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​5](http://dx.doi.org/10.1007/978-1-4842-1233-2_5))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    To write any program, you need to choose a programming language. A programming\
    \ language lets you define commands for the computer to follow. There’s no one\
    \ “best” programming language because every programming language is meant to solve\
    \ a specific problem. That means that a programming language may be great at solving\
    \ certain types of problems, but horrible at solving other types of programs.\n\
    \nWith most programming languages, there’s a tradeoff between ease of use and\
    \ efficiency. For example, the `BASIC` programming language is meant to be easy\
    \ to learn and use while the `C` programming language is meant to give you complete\
    \ control over the computer. By maximizing computer efficiency, the `C` language\
    \ is great for creating complicated programs such as operating systems or hard\
    \ disk utility programs.\n\nSince `BASIC` was never designed for maximum control\
    \ over a computer, `BASIC` would never be used to create an operating system or\
    \ a hard disk utility program. Since `C` was designed for maximum computer efficiency,\
    \ it’s difficult for novices to learn and even difficult for experienced programmers\
    \ to use. The majority of errors or bugs in many programs are due solely to the\
    \ complexity of the `C` programming language that confounds even professional\
    \ programmers with decades of experience.\n\nIn the world of Xcode, Apple’s official\
    \ programming language used to be `Objective-C`, which was a superset of the `C`\
    \ programming language and an alternative to the object-oriented `C++` language.\
    \ Unfortunately, `Objective-C` can still be difficult to learn and even harder\
    \ to master. By making programming harder than it needs to be, `Objective-C` makes\
    \ creating OS X and iOS software difficult for novices and experienced programmers\
    \ alike.\n\nThat’s why in 2014, Apple introduced a new programming language called\
    \ `Swift`. `Swift` is meant to be just as powerful as `Objective-C` while also\
    \ being much easier to learn. Because Apple will use `Swift` for both OS X and\
    \ iOS programming, `Swift` is now the future programming language for the Macintosh,\
    \ iPhone, iPad, Apple Watch, Apple TV, CarPlay, and any other future products\
    \ from Apple.\n\nSince so many people have written programs using `Objective-C`,\
    \ there will always be a need for programmers to modify existing `Objective-C`\
    \ programs. However, you can always mix `Objective-C` and `Swift` in a program.\
    \ That means over time, there will be less of a need for `Objective-C` programmers\
    \ and more of a need for `Swift` programmers. If you want to learn the most powerful\
    \ programming language for writing OS X and iOS programs, you want to learn `Swift`.\n\
    \n**Note**  \nIf you’re already familiar with `Objective-C`, you’ll notice several\
    \ ways that `Swift` makes coding far easier. First, `Swift` doesn’t require a\
    \ semicolon to end each line. Second, `Swift` doesn’t need asterisks to represent\
    \ pointers or square brackets to represent method calls to objects. Third, `Swift`\
    \ stores everything in a single `.swift` file in comparison to `Objective-C` that\
    \ needs to create an `.h` header file and an `.m` implementation file. If you\
    \ know nothing about `Objective-C`, just look at any program written in `Objective-C`\
    \ and see how confusing the code can be. One look at `Objective-C` code will make\
    \ you realize how much easier learning and using `Swift` can be.\n\n## Using Playgrounds\n\
    \nIn the old days, programmers had two types of tools to help them learn programming.\
    \ The first is called an interpreter. An interpreter let you type in a command\
    \ and then would immediately show you the results. That way you could see exactly\
    \ what you were doing right or wrong.\n\nThe drawback with interpreters was that\
    \ they were slow and that you couldn’t use them to create programs you could sell.\
    \ To run a program in an interpreter, you needed both the interpreter and the\
    \ file (called the source code) that contained all your commands written in a\
    \ particular programming language. Because you had to give away your source code\
    \ to run programs in an interpreter, others could easily copy your program and\
    \ steal it. As a result, interpreters were only useful for learning a language\
    \ but weren’t practical for selling software.\n\nThe second tool that programmers\
    \ use to learn programming is called a compiler. A compiler takes a list of commands,\
    \ stored in a file, and converts them to machine language so the computer can\
    \ understand them. The advantage of a compiler is that it keeps others from seeing\
    \ the source code of your program.\n\nThe problem with using a compiler is that\
    \ you have to write a complete program and compile it just to see if your commands\
    \ work or not. If your commands don’t work, now you have to go back and fix the\
    \ problem. Unlike the interactive nature of an interpreter, a compiler makes learning\
