  trans: '

    ### 向下拉菜单添加新命令


    你可以随时在任何下拉菜单上删除、重新排列和添加命令。要删除命令，只需选中它并按 `Backspace` 或 `Delete` 键。要重新排列命令，将其拖放到新位置即可。


    要向下拉菜单添加新命令，你需要使用来自 `Object Library` 的以下三个项目，如图 19-7 所示：


    ![A978-1-4842-1233-2_19_Fig7_HTML.jpg](img/A978-1-4842-1233-2_19_Fig7_HTML.jpg)


    图 19-7. 用于修改下拉菜单上命令的三个项目


    - `Menu Item` – 表示单个命令。

    - `Submenu Menu Item` – 表示一个包含附加命令的子菜单。

    - `Separate Menu Item` – 显示一条水平线，用于分隔下拉菜单上的命令。


    要向下拉菜单添加新命令，请遵循以下步骤：


    1.  释放鼠标。`Xcode` 会将你的新菜单项添加到下拉菜单中。如果你添加的是 `Submenu Menu Item`，现在即可编辑其子菜单中存储的命令。

    2.  从 `Object Library` 中拖动一个菜单项（见图 19-7），并将鼠标移动到下拉菜单列表中，直到出现一条水平蓝色线，指示该命令将出现的位置，如图
    19-9 所示。


    ![A978-1-4842-1233-2_19_Fig9_HTML.jpg](img/A978-1-4842-1233-2_19_Fig9_HTML.jpg)


    图 19-9. 在下拉菜单列表中拖放新命令


    3.  在 `Project Navigator` 窗格中点击 `.xib` 或 `.storyboard` 文件。

    4.  选择 `View` ➤ `Utilities` ➤ `Show Object Library`，以在 `Xcode` 窗口的右下角显示 `Object
    Library`。

    5.  点击你想要添加新命令的下拉菜单。你可以直接点击菜单栏上的下拉菜单标题，或者点击展开三角形以打开 `Document Outline` 中的下拉菜单标题，如图
    19-8 所示。


    ![A978-1-4842-1233-2_19_Fig8_HTML.jpg](img/A978-1-4842-1233-2_19_Fig8_HTML.jpg)


    图 19-8. 你可以直接在下拉菜单上或通过 `Document Outline` 添加新命令


    ### 编辑命令


    一旦你修改了菜单栏上出现的下拉菜单标题以及每个下拉菜单上出现的命令，你或许还想使用 `Inspector` 窗格进一步编辑每个命令。`Inspector`
    窗格对于修改以下属性非常有用：


    - `Title` – 显示菜单命令的文本。

    - `Key Equivalent` – 为命令定义快捷键。


    要编辑命令（或下拉菜单标题），请遵循以下步骤：


    1.  在 `Inspector` 窗格中点击 `Title` 文本字段以编辑命令的文本。

    2.  点击 `Key Equivalent` 文本字段，然后按下（而非输入）你想要分配给命令的快捷键。确保此快捷键未被其他命令占用（例如用于 `Cut`
    命令的 `Command+X`）。`Xcode` 会在下拉菜单中该命令的右侧显示你的快捷键。

    3.  在 `Project Navigator` 窗格中点击 `.xib` 或 `.storyboard` 文件。

    4.  点击你想要编辑的下拉菜单命令（或下拉菜单标题）。可以在 `Document Outline` 中点击，也可以直接点击下拉菜单本身。

    5.  选择 `View` ➤ `Utilities` ➤ `Show Attributes Inspector`。此时将显示 `Show Attributes
    Inspector` 窗格，如图 19-10 所示。


    ![A978-1-4842-1233-2_19_Fig10_HTML.jpg](img/A978-1-4842-1233-2_19_Fig10_HTML.jpg)


    图 19-10. 在下拉菜单列表中拖放新命令


    ### 将菜单命令连接到 Swift 代码


    一旦你修改了下拉菜单标题并用适当的命令填充了它们，你最终需要让这些命令实际执行操作。这意味着将你的菜单命令链接到 `IBAction` 方法，就像将按钮或其他用户界面项连接到包含
    Swift 代码的文件一样。你可以从下拉菜单上的菜单命令本身，或者从 `Document Outline` 中显示的菜单命令进行 `Control-drag`
    操作。


    当你创建一个 Cocoa 应用程序项目时，你会发现许多菜单命令已经可以工作，例如 `File` ➤ `Print`、`Window` ➤ `Minimize`
    以及应用程序名称 ➤ `About` 命令。这些功能由 Cocoa 框架中的 `NSApplication`、`NSWindow`、`NSView` 和 `NSResponder`
    类提供。


    如果你点击 Cocoa 应用程序项目中的某个菜单命令，然后选择 `View` ➤ `Utilities` ➤ `Show Connections Inspector`，你会在
    `Xcode` 窗口的右上角看到 `Connections Inspector` 窗格。


    `Connections Inspector` 窗格让你可以看到选中的用户界面项（如下拉菜单上的命令）连接到了什么，如图 19-11 所示。


    ![A978-1-4842-1233-2_19_Fig11_HTML.jpg](img/A978-1-4842-1233-2_19_Fig11_HTML.jpg)


    图 19-11. `Connections Inspector` 窗格显示用户界面连接到了哪个 `IBAction` 方法


    通常，当你查看用户界面项的 `Connections Inspector` 时，你会在左侧看到 `IBAction` 方法的名称（例如 `print`），并且有一条线将其连接到实际存储该
    `IBAction` 方法的文件（例如 `AppDelegate`）。


    在图 19-11 中，`File` 菜单上的 `Print` 菜单命令连接到了 `print` `IBAction` 方法，但此 `IBAction` 方法并未存储在特定文件中。相反，它连接到了名为
    `First Responder` 的对象，该对象由 `NSResponder` 类定义。


    用户界面由多个基于 `NSApplication`、`NSWindow` 和 `NSView` 的对象组成，因此 `First Responder` 仅指向应首先响应用户点击用户界面项（例如
    `File` 菜单上的 `Print` 命令）的对象。如果这个第一个对象没有 `print` `IBAction` 方法，那么它会搜索下一个对象中的这个 `IBAction`
    方法。


    因此，如果你在窗口上有一个文本字段，并点击 `File` 菜单上的 `Print` 命令，`Print` 命令会首先在该文本字段中查找 `print` `IBAction`
    方法（文本字段基于 `NSTextfield`，而 `NSTextfield` 又基于 `NSView`）。如果在 `NSTextfield` 类中找不到
    `print` `IBAction` 方法，它会接着在窗口（基于 `NSWindow`）或应用程序本身（基于 `NSApplication`）中查找。


    如果你点击 `First Responder` 图标，然后选择 `View` ➤ `Utilities` ➤ `Show Connections Inspector`，你可以看到
    `First Responder` 的 `Connections Inspector` 窗格，其中标识了连接到典型 Cocoa 应用程序项目默认下拉菜单的所有
    `IBAction` 方法，如图 19-12 所示。


    ![A978-1-4842-1233-2_19_Fig12_HTML.jpg](img/A978-1-4842-1233-2_19_Fig12_HTML.jpg)


    图 19-12. `First Responder` 的 `Connections Inspector` 窗格列出了连接到 Cocoa 应用程序项目默认下拉菜单的所有
    `IBAction` 方法


    > **注:** 查看 `Connections Inspector` 的另一种方法是右键点击 `First Responder` 图标。


    尽管 Cocoa 应用程序模板创建了标准的下拉菜单和命令，你仍然需要编写 Swift 代码才能使其中许多命令实际工作。例如，`Save` 命令不知道要保存什么或如何保存，而
    `New` 命令不知道要创建哪种类型的文档。


    要了解菜单命令如何像其他用户界面项一样与 `IBAction` 方法配合使用，请遵循以下步骤。

    '
- fmt: "选择“View ➤ Assistant Editor ➤ Show Assistant Editor”。`AppDelegate.swift`文件会出现在用户界面旁边。将鼠标指针悬停在文本字段上，按住`Control`键，然后拖动鼠标到`AppDelegate.swift`文件中`IBOutlet`行的下方。松开`Control`键和鼠标按钮，会出现一个弹出窗口。在“Name”文本字段中点击，输入`textResult`，然后点击“Connect”按钮，这样你的`IBOutlet`应如下所示：\n\
    \n在Xcode中选择“File ➤ New ➤ Project”。  \n点击“OS X”类别下的“Application”。  \n点击“Cocoa Application”，然后点击“Next”按钮。Xcode会要求输入产品名称。\
    \  \n点击“Product Name”文本字段，输入`MenuProgram`。  \n确保“Language”弹出菜单显示为“Swift”，并且没有勾选任何复选框。\
    \  \n点击“Next”按钮。Xcode会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击“Create”按钮。  \n\n点击项目导航器中的`MainMenu.xib`文件。程序用户界面会显示出来。\
    \  \n点击`MenuProgram`图标以显示程序用户界面的窗口。  \n选择“View ➤ Utilities ➤ Show Object Library”。对象库会出现在Xcode窗口的右下角。\
    \  \n将一个文本字段拖拽到用户界面窗口上。你可能需要加宽文本字段的宽度。  \n将一个菜单项从对象库拖拽到“File”菜单的底部。你可以将菜单项拖拽到“File”下拉菜单中，或者拖拽到文档大纲中，如图[19-13](#A978-1-4842-1233-2_19_Chapter.html#Fig13)所示。\n\
    \n![A978-1-4842-1233-2_19_Fig13_HTML.jpg](A978-1-4842-1233-2_19_Fig13_HTML.jpg)\n\
    \n**图 19-13.** 将菜单项拖拽到“File”下拉菜单的底部\n\n`@IBOutlet weak var textResult: NSTextField!`\n\
    \n将鼠标指针悬停在你刚刚添加到“File”下拉菜单底部的菜单项上（无论是在下拉菜单中还是在文档大纲中），按住`Control`键，然后拖动鼠标到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标按钮，会出现一个弹出窗口。点击“Connection”弹出菜单，选择“Action”。在“Name”文本字段中点击，输入`myMenu`。点击“Type”弹出菜单，选择`NSMenuItem`，然后点击“Connect”按钮。Xcode会创建一个空的`IBAction`方法。按如下方式修改`IBAction`方法：\n\
    \n```\n@IBAction func myMenu(sender: NSMenuItem) {\n\n    textResult.stringValue\
    \ = \"Clicked on = \" + sender.title    \n}\n```\n\n松开`Control`键和鼠标按钮。Xcode将“Save”命令连接到`myMenu\
    \ IBAction`方法。  \n选择“Product ➤ Run”。用户界面会显示出来。  \n点击“File”菜单标题。注意，你添加的菜单项（标签为“Item”）会出现在“File”下拉菜单的底部。\
    \  \n点击“Save”命令。文本字段会显示“Clicked on = Save…”。  \n点击“File”菜单标题，然后点击你添加的菜单项“Item”。文本字段会显示“Clicked\
    \ on = Item.”。  \n选择“MenuProgram ➤ Quit MenuProgram”。  \n点击出现在“First Responder”左侧的关闭图标（X）。这会切断“Save”命令与`saveDocument\
    \ IBAction`方法之间的连接。  \n将鼠标指针悬停在“File”下拉菜单中的“Save”命令上，按住`Control`键，然后拖动鼠标到你第22步创建的`myMenu\
    \ IBAction`方法上。确保Xcode高亮了整个`IBAction`方法，并显示“Connect Action”，如图[19-15](#A978-1-4842-1233-2_19_Chapter.html#Fig15)所示。\n\
    \n![A978-1-4842-1233-2_19_Fig15_HTML.jpg](A978-1-4842-1233-2_19_Fig15_HTML.jpg)\n\
    \n**图 19-15.** 将“Save”命令连接到现有的`IBAction`方法\n\n点击“File”下拉菜单中的“Save”命令。  \n选择“View\
    \ ➤ Utilities ➤ Show Connections Inspector”。“Connections Inspector”面板会显示“Save”命令已连接到“First\
    \ Responder”中的`saveDocument IBAction`方法，如图[19-14](#A978-1-4842-1233-2_19_Chapter.html#Fig14)所示。\n\
    \n![A978-1-4842-1233-2_19_Fig14_HTML.jpg](A978-1-4842-1233-2_19_Fig14_HTML.jpg)\n\
    \n**图 19-14.** “File”下拉菜单中“Save”命令的“Connections Inspector”\n\n`MenuProgram`项目演示了如何将菜单命令连接到文本字段，以便文本字段显示用户点击的菜单命令名称。但是，在使用故事板时，连接菜单命令的方式略有不同。\n\
    \n主要区别在于，在故事板中，下拉菜单存储在与实际用户界面不同的场景中，如图[19-16](#A978-1-4842-1233-2_19_Chapter.html#Fig16)所示。\n\
    \n![A978-1-4842-1233-2_19_Fig16_HTML.jpg](A978-1-4842-1233-2_19_Fig16_HTML.jpg)\n\
    \n**图 19-16.** 在故事板中，下拉菜单出现在与用户界面不同的场景中\n\n这意味着，当你按住`Control`键拖拽下拉菜单命令时，Xcode会将你的Swift代码存储在`AppDelegate.swift`文件中；但如果你按住`Control`键拖拽用户界面元素（如文本字段），Xcode会将你的Swift代码存储在`ViewController.swift`文件中。\n\
    \n本质上，这意味着如果你为文本字段创建了一个`IBOutlet`，它会存储在`ViewController.swift`文件中，而你的下拉菜单命令的`IBAction`方法存储在`AppDelegate.swift`文件中，因此`IBOutlet`不知道`IBAction`方法的存在（反之亦然）。\n\
    \n解决此问题的方法是将下拉菜单命令连接到“First Responder”图标。这意味着你的程序将首先在其`AppDelegate.swift`文件中查找`IBAction`方法，但随后也会在其他文件中查找相同的`IBAction`方法。\n\
    \n诀窍是在`AppDelegate.swift`文件中创建一个空的`IBAction`方法，并在`ViewController.swift`文件中创建一个完全相同的`IBAction`方法，不同之处在于你需要填写第二个`IBAction`方法中的Swift代码，使其能够检索所选菜单命令的标题。\n\
    \n要了解菜单命令如何与故事板配合使用，请按照以下步骤操作：\n\n在Xcode中选择“File ➤ New ➤ Project”。  \n点击“OS X”类别下的“Application”。\
    \  \n点击“Cocoa Application”，然后点击“Next”按钮。Xcode会要求输入产品名称。  \n点击“Product Name”文本字段，输入`StoryMenu`。\
    \  \n确保“Language”弹出菜单显示为“Swift”，并且只勾选了“Use storyboards”复选框。  \n点击“Next”按钮。Xcode会询问项目存储位置。\
    \  \n选择一个文件夹来存储项目，然后点击“Create”按钮。  \n\n点击项目导航器中的`Main.storyboard`文件。程序用户界面会显示出来。\
    \  \n选择“View ➤ Utilities ➤ Show Object Library”，将一个文本字段拖拽到用户界面（由标题栏中的“View Controller”标识）上。你可能需要加宽文本字段的宽度。\
    \  \n选择“View ➤ Assistant Editor ➤ Show Assistant Editor”。Xcode会在用户界面旁边显示`ViewController.swift`文件。\
    \  \n将鼠标指针悬停在文本字段上，按住`Control`键，然后拖动鼠标到`class ViewController`行的下方。  \n松开`Control`键和鼠标。会出现一个弹出窗口。在“Name”文本字段中点击，输入`textResult`，然后点击“Connect”按钮。Xcode会创建以下`IBOutlet`：\n\
    \n```\n@IBOutlet weak var textResult: NSTextField!\n```"
