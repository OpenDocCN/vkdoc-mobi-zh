    \nYou must specify the array name to add data to and put the actual data in parentheses.\
    \ Make sure the data you add is of the proper data type. So if you want to add\
    \ data to a set that currently holds only integers, you can only add another integer\
    \ to that set.\n\nIf you try to add data that already exists in the set, nothing\
    \ will happen. That means if a set contains the number 53, you can’t add another\
    \ copy of 53 into that set.\n\nTo remove data from a set, you just specify the\
    \ set name, the `remove` command, and the data you want to remove enclosed in\
    \ parentheses like this:\n\n`setName.remove(data)`\n\nIf you try to remove data\
    \ that doesn’t exist in the set, then the `remove` command returns a `nil` value.\
    \ However if the `remove` command succeeds in removing data from a set, it returns\
    \ an optional variable. So if you remove data from a set and store it in a variable\
    \ like this:\n\n`var variableName = setName.remove(data)`\n\nThe value stored\
    \ in the variable can be accessed by using an exclamation mark like this:\n\n\
    `print (variableName!)`\n\nIf you want to remove all items in a set, specify the\
    \ set name and the `removeAll` command like this:\n\n`setName.removeAll()`\n\n\
    To see how to create a set and add and remove data from it, create a new playground\
    \ by following these steps:\n\n1. Start Xcode.  \n2. Choose **File ➤ New ➤ Playground**.\
    \ (If you see the Xcode welcome screen, you can also click on **Get started with\
    \ a playground**.) Xcode asks for a playground name and platform.  \n3. Click\
    \ in the **Name** text field and type `SetPlayground`.  \n4. Click in the **Platform**\
    \ pop-up menu and choose **OS X**. Xcode asks where you want to save your playground\
    \ file.  \n5. Click on a folder where you want to save your playground file and\
    \ click the **Create** button. Xcode displays the playground file.  \n6. Edit\
    \ the code as follows:\n\n```swift\nimport Cocoa\nvar setOne = Set([2, 45, -9,\
    \ 8, -34])\nvar setTwo = Set<Int>()\nsetTwo = [34, 90, -83]\nsetOne.insert(65)\n\
    setTwo.insert(-381)\nvar temp = setOne.remove(45)\nprint (temp)\nprint (temp!)\n\
    setOne.removeAll()\n```\n\nThis Swift code creates a set called `setOne` by storing\
    \ data directly and letting Swift infer the data types, which are integers. Then\
    \ it creates a second set called `setTwo`, defined as holding only integers (`Int`).\n\
    \nAfter creating `setTwo`, the next line stores three integers in that set. The\
    \ two `insert` commands store different integers into both `setOne` and `setTwo`.\
    \ When the code removes the number 45 from `setOne`, it stores 45 as an optional\
    \ variable in the `temp` variable. To access the actual value, you have to unwrap\
    \ the optional variable using the exclamation mark (`!`).\n\nFinally, the `removeAll`\
    \ command empties `setOne` so it contains nothing as shown in Figure [10-2](#A978-1-4842-1233-2_10_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1233-2_10_Fig2_HTML.jpg](A978-1-4842-1233-2_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2.** Creating sets, inserting data in a set, and removing data from\
    \ a set\n\n### Querying a Set\n\nOnce you have a set, you can use the following\
    \ commands to get information about that set:\n\n*   `count` – counts the number\
    \ of items in a set\n*   `isEmpty` – checks if a set is empty (contains 0 items)\n\
    *   `isSubsetOf` – checks if one set is wholly contained within another set\n\
    *   `isSupersetOf` – checks if one set contains all the items of another set\n\
    *   `isDisjointWith` – checks if two sets have no items in common\n\nWhatever\
    \ the result of these commands, they never affect the data stored in a set.\n\n\
    The `count` command returns an integer value and just requires the set name and\
    \ the `count` command like this:\n\n`setName.count`\n\nYou can also assign this\
    \ value to a variable such as:\n\n`var total = setName.count`\n\nThe `isEmpty`\
    \ command returns a Boolean value of `true` if a set has zero items in it. Otherwise\
