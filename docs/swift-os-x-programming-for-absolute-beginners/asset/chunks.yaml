    in every copy of your code. Miss one copy of the faulty code and your program
    won’t work.


    Creating multiple copies of the same code causes two problems. First, it wastes
    space. Second, it makes modifying the code harder with multiple copies of code
    scattered all over a program. Inheritance fixes both problems.


    First, inheritance never makes a copy of code so it never wastes space. Second,
    since inheritance only keeps one copy of code, you just need to modify one copy
    of code to have your changes automatically affect every part of your program that
    relies on that code.


    Instead of physically copying code, inheritance basically creates pointers or
    references to one copy of code. When you create a class, you can simply state
    its name like this:


    `class className {`


    `}`


    To inherit code from another class, name that other class like this:


    `class className : superClass {`


    `}`


    This code defines a class called “className,” which inherits code from another
    class called “superClass.” That means any properties and methods defined in “superClass”
    automatically work in “className” as well, even though the “className” class is
    completely empty.


    If you peek at any of the OS X sample programs you created in earlier chapters,
    you may see code that looks like this:


    `class AppDelegate: NSObject, NSApplicationDelegate {`


    This defines a class called AppDelegate, which inherits code from another class
    called NSObject. (This code also adds additional code to the AppDelegate class
    through another file called NSApplicationDelegate, which is a file that you’ll
    learn more about later in this chapter.)


    To see how to use inheritance with classes, create a new playground by following
    these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type InheritPlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file.
      Edit the code as follows:


    `import Cocoa`


    `class firstClass {`


    `var speed : Int = 0`


    `var locationX : Int = 3`


    `var locationY : Int = 5`


    `func move (X: Int, Y: Int) {`


    `locationX += X`


    `locationY += Y`


    `}`


    `}`


    `class copyCat : firstClass {`


    `}`


    `var kitten = copyCat ()`


    `kitten.speed = 4`


    `kitten.move(4, Y: 8)`


    `print (kitten.locationX)`


    `print (kitten.locationY)`


    This Swift code defines two classes. First, it defines a class (called firstClass)
    that has three properties (speed, locationX, and locationY) and one method (move).
    Then it defines a second class (called copycat) that’s completely empty, but it
    inherits all the code from firstClass.


    To show that the copyCat class inherits code from firstClass, the Swift code next
    creates an object called “kitten,” which is based on the copyCat class. The kitten
    object can store data in a speed property and use the move method to change its
    locationX and locationY properties, yet the copyCat class is completely empty.
    Figure [12-1](#A978-1-4842-1233-2_12_Chapter.html#Fig1) shows the results of running
    this Swift code in a playground.


    ![A978-1-4842-1233-2_12_Fig1_HTML.gif](A978-1-4842-1233-2_12_Fig1_HTML.gif)


    Figure 12-1.


    Showing how inheritance works Note


    Some programming languages, such as C++, allow one class to inherit from two or
    more classes, which is known as multiple inheritance. However in Swift, a class
    can only inherit from only one other class, which is known as single inheritance.'
  trans: "\n# 12\\. 继承、多态与类的扩展\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​12](http://dx.doi.org/10.1007/978-1-4842-1233-2_12)）包含补充材料，仅供授权用户使用。\n\
    \n在第 11 章中，你学习了如何通过类创建对象，以及类如何定义属性和方法。为了保护自身的数据和方法不受程序其他部分的影响，对象会隔离或封装其代码。封装是面向对象编程的一大优势，因为它能创建自包含的代码，你可以轻松修改或替换这些代码，而不会影响程序的任何其他部分。\n\
    \n通过让代码尽可能独立于程序的其他部分，对象提高了可靠性。想象一座用纸牌搭成的房子：抽掉一张牌，整个房子就会倒塌——在面向对象编程出现之前，大多数软件的工作方式正是如此。\n\
    \n对象就像纸牌一样，你可以抽走或替换它，而不会影响其他任何牌。除了封装之外，面向对象编程还包含另外两个特性，称为继承和多态。\n\n继承背后的思想是重用现有代码，而无需实际复制另一份代码。多态背后的思想是，你可以在不修改原始代码的情况下替换继承而来的代码。通过继承和多态，即使不了解原始代码的工作原理，你也能重用现有代码。\n\
    \n事实上，每次在 Xcode 中创建项目时，查看你的 Swift 文件顶部，你应该会看到一行类似这样的代码：\n\n`import Cocoa`\n\n\
    这行代码告诉 Xcode 使用苹果为你创建并存储在 Cocoa 框架中的所有类。在我们之前的示例程序中，你使用了 Cocoa 框架来操作数组、集合和字典。如果没有\
    \ Cocoa 框架，你就得自己编写 Swift 代码来实现这些常用功能。这不仅耗时，而且容易出错，因为你需要编写代码并测试以确保其正常工作。\n\n只需依赖\
    \ Cocoa 框架中的类，你就能在几乎不写代码的情况下为程序增加功能。随着你在编写自己的类方面经验越来越丰富，你可以创建自己的实用库，并轻松地将其插入其他项目中，从而重用你所有的辛勤成果。\n\
    \n## 理解继承\n\n继承的主要目的是让代码重用变得简单。在过去，人们通过简单地复制代码来重用代码。但如果代码中发现错误（bug）该怎么办？这意味着你需要修复每一份代码副本中的那个\
    \ bug。只要漏掉一份有问题的代码副本，你的程序就无法运行。\n\n创建同一代码的多个副本会引发两个问题。首先，它浪费空间。其次，由于代码的多个副本散布在整个程序中，修改代码变得更加困难。继承解决了这两个问题。\n\
    \n首先，继承从不复制代码，因此从不浪费空间。其次，由于继承只保留一份代码，你只需修改这一份代码，就能让修改自动影响程序中所有依赖该代码的部分。\n\n继承并非实际复制代码，而是创建指向一份代码的指针或引用。当你创建一个类时，你可以这样简单地声明它的名称：\n\
    \n```\nclass className {\n\n}\n```\n\n要从另一个类继承代码，则像这样命名那个类：\n\n```\nclass className\
    \ : superClass {\n\n}\n```\n\n这段代码定义了一个名为`className`的类，它从另一个名为`superClass`的类中继承代码。这意味着在`superClass`中定义的任何属性和方法也会自动在`className`中生效，即使`className`类完全是空的。\n\
    \n如果你查看之前在章节中创建的任何 OS X 示例程序，你可能会看到类似这样的代码：\n\n```\nclass AppDelegate: NSObject,\
    \ NSApplicationDelegate {\n\n}\n```\n\n这定义了一个名为`AppDelegate`的类，它从另一个名为`NSObject`的类中继承代码。（这段代码还通过另一个名为`NSApplicationDelegate`的文件向`AppDelegate`类添加了额外代码，你将在本章后面了解更多关于这个文件的内容。）\n\
    \n要了解如何在类中使用继承，请按照以下步骤创建一个新的 playground：\n\n启动 Xcode。选择“文件”>“新建”>“Playground”。（如果你看到\
    \ Xcode 欢迎屏幕，也可以点击“开始使用 playground”。）Xcode 会要求你输入 playground 名称和平台。在“名称”文本字段中点击，输入`InheritPlayground`。在“平台”弹出菜单中选择“OS\
    \ X”。Xcode 会询问你希望将 playground 文件保存到哪里。点击一个文件夹以保存 playground 文件，然后点击“创建”按钮。Xcode\
    \ 会显示该 playground 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass firstClass {\n\n\
    \    var speed : Int = 0\n    var locationX : Int = 3\n    var locationY : Int\
    \ = 5\n\n    func move (X: Int, Y: Int) {\n        locationX += X\n        locationY\
    \ += Y\n    }\n}\n\nclass copyCat : firstClass {\n\n}\n\nvar kitten = copyCat\
    \ ()\nkitten.speed = 4\nkitten.move(4, Y: 8)\nprint (kitten.locationX)\nprint\
    \ (kitten.locationY)\n```\n\n这段 Swift 代码定义了两个类。首先，它定义了一个类（名为`firstClass`），该类拥有三个属性（`speed`、`locationX`和`locationY`）和一个方法（`move`）。然后，它定义了第二个类（名为`copyCat`），这个类完全是空的，但它继承了`firstClass`中的所有代码。\n\
    \n为了证明`copyCat`类确实继承了`firstClass`的代码，这段 Swift 代码接下来创建了一个名为`kitten`的对象，该对象基于`copyCat`类。`kitten`对象可以在`speed`属性中存储数据，并使用`move`方法来修改其`locationX`和`locationY`属性，然而`copyCat`类本身完全是空的。图\
    \ 12-1 显示了在 playground 中运行这段 Swift 代码的结果。\n\n![A978-1-4842-1233-2_12_Fig1_HTML.gif](img/A978-1-4842-1233-2_12_Fig1_HTML.gif)\n\
    \n图 12-1. 展示继承的工作原理\n\n注意\n\n某些编程语言（如 C++）允许一个类从两个或多个类继承，这称为多重继承。然而在 Swift 中，一个类只能从另一个类继承，这称为单继承。\n"
- fmt: "In the above example, the `copyCat` class inherits three properties (`speed`,\
    \ `locationX`, and `locationY`) and one method (`move`) from `firstClass`. Since\
    \ the `copyCat` class didn’t define any properties or methods of its own, the\
    \ `copyCat` class is basically identical to `firstClass`.\n\nIn actual use, there’s\
    \ no reason for a class to inherit from another class as an exact duplicate. Instead,\
    \ it’s more common for one class (known as the subclass) to inherit from another\
    \ class (known as the superclass) and then add additional properties and methods\
    \ of its own.\n\nIn this way, the subclass only needs to include the code for\
    \ these new properties and methods while still having access to all the properties\
    \ and methods of the superclass. For example, consider the following class:\n\n\
    ```\nclass copyDog : copyCat {\n    var name : String = \"\"\n}\n```\n\nThis class\
    \ inherits all the code from the `copyCat` class and adds one new property of\
    \ its own called “name” that can hold a string. The above class definition that\
    \ defines a `name` property and inherits code from the `copyCat` class is equivalent\
    \ to the following:\n\n```\nclass copyDog {\n    var speed : Int = 0\n    var\
    \ locationX : Int = 3\n    var locationY : Int = 5\n    func move (X: Int, Y:\
    \ Int) {\n        locationX += X\n        locationY += Y\n    }\n    var name\
    \ : String = \"\"\n}\n```\n\nRemember, the `copyCat` class inherited everything\
    \ from `firstClass`, which defined the `speed`, `locationX`, and `locationY` properties\
    \ along with the `move` method. In comparison, the `copyDog` class that inherits\
    \ code from the `copyCat` class is much shorter and simpler.\n\nInheritance works\
    \ like a daisy chain. If class A inherits from class B, but class B inherits everything\
    \ from class C, then class A inherits everything from both class B and class C.\
    \ For example, the `copyDog` class inherits everything from the `copyCat` class.\
    \ The `copyCat` class, in turn, inherits everything from `firstClass`. That means\
    \ the `copyDog` class ultimately inherits everything from both the `copyCat` class\
    \ and `firstClass` as shown in Figure [12-2](#A978-1-4842-1233-2_12_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1233-2_12_Fig2_HTML.jpg](A978-1-4842-1233-2_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. Classes inherit everything from previous classes\n\nThis daisy\
    \ chain effect of inheritance is how the Cocoa framework is designed. At its simplest\
    \ level, there’s a basic class called `NSObject`. A class such as `NSResponder`\
    \ inherits everything from `NSObject` and adds new properties and methods of its\
    \ own. Another class such as `NSView` inherits everything from `NSResponder` and\
    \ `NSObject`. When you look up classes in the Cocoa framework in Xcode’s Documentation\
    \ window, you can see this daisy chain link of classes identified by the “Inherits\
    \ from:” label as shown in Figure [12-3](#A978-1-4842-1233-2_12_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1233-2_12_Fig3_HTML.jpg](A978-1-4842-1233-2_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. The Documentation window identifies the superclasses that the currently\
    \ displayed class inherits from\n\nTo see how to use inheritance works between\
    \ multiple classes, follow these steps:\n\nMake sure the `InheritPlayground` file\
    \ is loaded in Xcode. Edit the code as follows:\n\n```\nimport Cocoa\n\nclass\
    \ animal {\n    var legs : Int = 0\n}\n\nclass packAnimal : animal {\n    var\
    \ strength : Int = 100\n}\n\nclass biped : packAnimal {\n    var IQ : Int = 75\n\
    }\n\nvar snake = animal()\nprint (snake.legs)\n\nvar mule = packAnimal()\nmule.legs\
    \ = 4\nmule.strength = 120\n\nvar relative = biped()\nrelative.legs = 2\nrelative.strength\
    \ = 55\nrelative.IQ = 10\n```\n\nThis code creates three classes: `animal` (`legs`\
    \ property), `packAnimal` (`strength` property), and `biped` (`IQ` property).\
    \ Then it creates three objects based on these classes. The first object, `snake`,\
    \ is based on the `animal` class. The second object, `mule`, is based on the `packAnimal`\
    \ class. The third object, `relative`, is based on the `biped` class.\n\nUltimately\
    \ the `relative` object contains properties from all three classes, the `mule`\
    \ object only contains properties from the `animal` and `packAnimal` class, and\
    \ the `snake` object only contains properties from the `animal` class as follows:\n\
    \n| Object | Based on these classes | Contains these properties |\n| --- | ---\
    \ | --- |\n| `snake` | `animal` | `legs` |\n| `mule` | `packAnimal`, `animal`\
    \ | `legs`, `strength` |\n| `relative` | `biped`, `packAnimal`, `animal` | `legs`,\
    \ `strength`, `IQ` |\n\nThe `snake`, `mule`, and `relative` objects contain different\
    \ properties based on their different classes and the classes that they inherit\
    \ from as shown in Figure [12-4](#A978-1-4842-1233-2_12_Chapter.html#Fig4).\n\n\
    ![A978-1-4842-1233-2_12_Fig4_HTML.jpg](A978-1-4842-1233-2_12_Fig4_HTML.jpg)\n\n\
    Figure 12-4. Seeing how inheritance works among properties stored in different\
    \ classes"
