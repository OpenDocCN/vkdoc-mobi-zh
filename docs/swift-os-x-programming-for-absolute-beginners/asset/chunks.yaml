    defined by the NSApplicationDelegate file.


    Click the close button (the red dot) in the upper left corner of the Documentation
    window to make it go away. The Xcode window appears again. Notice that the AppDelegate.swift
    file contains two empty functions called applicationDidFinishLaunching and applicationWillTerminate.
    These are defined by the NSApplicationDelegate protocol file but implemented in
    the AppDelegate.swift file.   Modify both of these functions as follows:   Release
    the Option key and click the mouse over NSApplicationDelegate Protocol Reference
    at the bottom of the pop-up window. The Documentation window appears, showing
    details about the NSApplicationDelegate Protocol as shown in Figure [12-14](#A978-1-4842-1233-2_12_Chapter.html#Fig14).
    Notice that two methods that the NSApplicationDelegate protocol defines are called
