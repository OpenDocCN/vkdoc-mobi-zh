    `var name : String { return "Frank" }`


    `}`


    `struct pet : Cat {`


    `var name : String = "Max"`


    `var age : Int = 2`


    `}`


    `var animal = pet()`


    `print (animal.name)`


    `print (animal.age)`


    `animal.name = "Joey"`


    `animal.age = 13`


    `print (animal.name)`


    `print (animal.age)`


    `// New structure that adopts two protocols`


    `struct wild : Cat, CatType {`


    `var age : Int = 2`


    `var species : String = "Lion"`


    `}`


    `var beast = wild()`


    `print (beast.name)`


    `print (beast.age)`


    `print (beast.species)`


    Notice that pet structure adopts the Cat protocol but since it doesn’t adopt the
    CatType protocol as well, you can assign an initial value of “Max” to its name
    property, and you can later assign “Joey” to that same name property.


    However the wild structure adopts both the Cat and CatType protocols, so it also
    adopts the protocol extension, which assigns “Frank” as a default value to the
    wild structure’s name property as shown in Figure [20-6](#A978-1-4842-1233-2_20_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_20_Fig6_HTML.jpg](A978-1-4842-1233-2_20_Fig6_HTML.jpg)


    Figure 20-6.


    Protocol extensions can selectively assign default values to a structure that
    adopts a specific protocol'
