  trans: "\n# 使用单选按钮\n\n与允许用户选择多个选项的复选框不同，单选按钮会显示多个选项，但一次只允许用户选择一项。当用户选择另一个单选按钮时，当前选中的单选按钮会自动取消选中。\n\
    \n在 Cocoa 框架中，单选按钮由 `NSMatrix` 类定义。这意味着当你创建一组单选按钮时，需要通过定义行数和列数来确定所需的数量，如图 16-3\
    \ 所示。\n\n![A978-1-4842-1233-2_16_Fig3_HTML.jpg](img/A978-1-4842-1233-2_16_Fig3_HTML.jpg)\n\
    \n图 16-3.\n\n单选组（Radio Group）的“显示属性检查器”（Show Attributes Inspector）面板允许你定义显示单选按钮的行数和列数。\n\
    \n要添加或移除单选按钮，只需调整“显示属性检查器”面板中“矩阵”（Matrix）类别下的行数和列数即可。如果需要创建奇数个单选按钮，选择你不想要的单选按钮，并选中其“透明”（Transparent）属性，如图\
    \ 16-4 所示。\n\n![A978-1-4842-1233-2_16_Fig4_HTML.jpg](img/A978-1-4842-1233-2_16_Fig4_HTML.jpg)\n\
    \n图 16-4.\n\n“透明”属性允许你隐藏组中的某个单选按钮。\n\n要确定用户选择了哪个单选按钮，你需要单独更改每个单选按钮的“标签”（Tag）属性。然后，你可以使用\
    \ `selectedTag()` 方法来获取选中的单选按钮。\n\n要了解如何使用单选按钮，请按照以下步骤操作：\n\n1.  在“显示属性检查器”面板的“按钮单元”（Button\
    \ Cell）类别下，选中“透明”复选框（见图 16-4）。你选择的单选按钮会消失。\n2.  点击左上角的顶部单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为\
    \ 0。\n3.  点击左列的中间单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为 1。\n4.  点击左列的底部单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为\
    \ 2。\n5.  点击右列的顶部单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为 3。\n6.  点击右列的中间单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为\
    \ 4。\n7.  选择“视图”（View）➤“助理编辑器”（Assistant Editor）➤“显示助理编辑器”（Show Assistant Editor）。`AppDelegate.swift`\
    \ 文件会出现在你的用户界面旁边。\n8.  将鼠标指针移到单选组上，按住 Control 键，然后拖拽到 `IBOutlet` 行的下方。\n9.  松开\
    \ Control 键和鼠标。会弹出一个窗口。\n10. 点击“名称”（Name）文本字段，输入 `radioMatrix`。会生成一个 `IBOutlet`，如下所示：\n\
    \    ```\n    @IBOutlet weak var radioMatrix: NSMatrix!\n    ```\n11. 点击单选组右下角的那个单选按钮。Xcode\
    \ 会高亮显示你选择的单选按钮，如图 16-6 所示。\n\n![A978-1-4842-1233-2_16_Fig6_HTML.jpg](img/A978-1-4842-1233-2_16_Fig6_HTML.jpg)\n\
    \n图 16-6.\n\n选择要修改的单选按钮。\n\n12. 在 Xcode 中，选择“文件”（File）➤“新建”（New）➤“项目”（Project）。\n\
    13. 在 OS X 类别下点击“应用程序”（Application）。\n14. 点击“Cocoa 应用程序”（Cocoa Application），然后点击“下一步”（Next）按钮。Xcode\
    \ 会要求输入产品名称。\n15. 在“产品名称”（Product Name）文本字段中，输入 `RadioProgram`。\n16. 确保“语言”（Language）弹出菜单显示为\
    \ Swift，并且没有复选框被选中。\n17. 点击“下一步”按钮。Xcode 会询问你希望将项目存储在何处。\n18. 选择一个文件夹来存储你的项目，然后点击“创建”（Create）按钮。\n\
    19. 在项目导航器中点击 `MainMenu.xib` 文件。你的程序用户界面会显示出来。\n20. 点击 RadioProgram 图标，显示程序用户界面的窗口。\n\
    21. 选择“视图”➤“工具”（Utilities）➤“显示对象库”（Show Object Library）。对象库会出现在 Xcode 窗口的右下角。\n\
    22. 将一个“下压按钮”（Push Button）和一个“单选组”（Radio Group）拖拽到用户界面窗口上。\n23. 点击单选组，然后选择“视图”➤“工具”➤“显示属性检查器”，在\
    \ Xcode 窗口的右上角打开“显示属性检查器”面板。\n24. 修改“行数”和“列数”，将其设置为 3 行和 2 列，使其看起来像图 16-5 所示。\n\
    \n![A978-1-4842-1233-2_16_Fig5_HTML.jpg](img/A978-1-4842-1233-2_16_Fig5_HTML.jpg)\n\
    \n图 16-5.\n\n`RadioProgram` 的用户界面。\n\n25. 将鼠标指针移到下压按钮上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
    \ 文件底部的最后一个花括号上。\n26. 松开 Control 键和鼠标。会弹出一个窗口。\n27. 点击“连接”（Connect）弹出菜单，选择“动作”（Action）。\n\
    28. 在“名称”文本字段中，输入 `whichButton`。\n29. 在“类型”（Type）弹出菜单中，选择 `NSButton`。Xcode 会创建一个空的\
    \ `IBAction` 方法。\n30. 按如下方式修改 `IBAction` 方法：\n\n    ```\n    @IBAction func whichButton(sender:\
    \ NSButton) {\n    \n    var myAlert = NSAlert()\n    \n    myAlert.messageText\
    \ = \"你点击了标签为 \\(radioMatrix.selectedTag()) 的单选按钮\"\n    \n    myAlert.runModal()\n\
    \    \n    }\n    ```\n\n31. 选择“产品”（Product）➤“运行”（Run）。你的用户界面会显示出来。\n32. 点击一个单选按钮，然后点击下压按钮。会弹出一个提示对话框，显示你选择的单选按钮的标签编号。\n\
    33. 点击“确定”（OK）按钮，关闭提示对话框。\n34. 选择“RadioProgram”➤“退出 RadioProgram”（Quit RadioProgram）。\n"
- fmt: "# Using a Date Picker\n\nA Date Picker makes it easy for users to choose a\
    \ date and/or time in a proper format. The three types of date picker appearances\
    \ are shown in Figure [16-7](#A978-1-4842-1233-2_16_Chapter.html#Fig7):\n\n![A978-1-4842-1233-2_16_Fig7_HTML.jpg](A978-1-4842-1233-2_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7.\nThe three variations of a date picker\n\n*   Textual – Displays\
    \ a date in a text field that requires the user to type in a proper date.\n* \
    \  Textual with Stepper – Displays a date in a text field that the user can change\
    \ by clicking on a stepper to modify the currently selected part of the date.\n\
    *   Graphical – Displays a calendar so the user can click on a date.\n\nSome of\
    \ the properties to modify in a date picker are shown in Figure [16-8](#A978-1-4842-1233-2_16_Chapter.html#Fig8):\n\
    \n![A978-1-4842-1233-2_16_Fig8_HTML.jpg](A978-1-4842-1233-2_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8.\nThe date picker properties in the Show Attributes Inspector pane\n\
    \n*   Style – Determines the date picker’s appearance.\n*   Selects – Determines\
    \ whether the user can select a single date or a range of dates.\n*   Elements\
    \ – Determines what date and time elements to display such as Month, Day, Year,\
    \ Hour, Minute, and Second.\n*   Minimum Date – Defines the earliest date possible.\n\
    *   Maximum Date – Defines the latest date possible.\n*   Date – Defines the currently\
    \ displayed date and/or time.\n\nTo retrieve the user’s chosen date from a date\
    \ picker, you need to access the `dateValue` property, which represents an `NSDate`\
    \ type.\n\nTo see how to use a date picker, follow these steps:\n\n1.  Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `AppDelegate.swift`\
    \ file next to the user interface.\n2.  Move the mouse pointer over the date picker,\
    \ hold down the Control key, and drag the mouse under the `IBOutlet` line in the\
    \ `AppDelegate.swift` file.\n3.  Release the Control key and the mouse button.\
    \ A pop-up window appears.\n4.  Click in the Name text field, type `chooseDate`,\
    \ and click the Connect button. Xcode creates an `IBOutlet` like this:\n    ```\n\
    \    @IBOutlet weak var chooseDate: NSDatePicker!\n    ```\n5.  From within Xcode\
    \ choose File ➤ New ➤ Project.\n6.  Click Application under the OS X category.\n\
    7.  Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n8.  Click in the Product Name text field and type `DateProgram`.\n9.\
    \  Make sure the Language pop-up menu displays Swift and that all check boxes\
    \ are clear and not selected.\n10. Click the Next button. Xcode asks where you\
    \ want to store the project.\n11. Choose a folder to store your project and click\
    \ the Create button.\n12. Click on the `MainMenu.xib` file in the Project Navigator\
    \ Pane.\n13. Click on the `DateProgram` icon to make the window of the user interface\
    \ appear.\n14. Drag a Push Button and Date Picker on to the user interface.\n\
    15. Click on the Date Picker and choose View ➤ Utilities ➤ Show Attributes Inspector.\n\
    16. Click in the Style pop-up menu and choose Graphical to make the date picker\
    \ look like a monthly calendar as shown in Figure [16-9](#A978-1-4842-1233-2_16_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_16_Fig9_HTML.jpg](A978-1-4842-1233-2_16_Fig9_HTML.jpg)\n\
    \nFigure 16-9.\nThe user interface of the `DateProgram`\n\n17. Move the mouse\
    \ pointer over the Push Button, hold down the Control key, and drag the mouse\
    \ over the last curly bracket in the bottom of the `AppDelegate.swift` file.\n\
    18. Release the Control key and the mouse. A pop-up window appears.\n19. Click\
    \ in the Connect pop-up menu and choose Action.\n20. Click in the Name text field\
    \ and type `showDate`.\n21. Click in the Type pop-up menu and choose `NSButton`.\
    \ Then click the Connect button. Xcode creates an IBAction method.\n22. Modify\
    \ this IBAction method as follows:\n    ```\n    @IBAction func showDate(sender:\
    \ NSButton) {\n        var myAlert = NSAlert()\n        myAlert.messageText =\
    \ \"You chose this date =  \\(chooseDate.dateValue)\"\n        myAlert.runModal()\n\
    \    }\n    ```\n23. Choose Product ➤ Run. Your user interface appears.\n24. Choose\
    \ a date on the date picker and click the push button. An alert dialog appears,\
    \ displaying the date you chose.\n25. Click the OK button to make this alert dialog\
    \ go away.\n26. Choose DateProgram ➤ Quit DateProgram.\n\n# Using Sliders\n\n\
    A slider can appear vertically or horizontally. Sliders visually represent a range\
    \ of values that the user can select by dragging the slider back and forth (or\
    \ up and down). One end represents the minimum value (left or bottom) while the\
    \ other end represents the maximum value (right or top). To help users understand\
    \ the different values a slider represents, you can also choose to display tick\
    \ marks as shown in Figure [16-10](#A978-1-4842-1233-2_16_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1233-2_16_Fig10_HTML.jpg](A978-1-4842-1233-2_16_Fig10_HTML.jpg)\n\
    \nFigure 16-10.\nThe appearance of a slider with and without tick marks\n\nSome\
    \ of the more important properties to define on a slider include:\n\n*   Tick\
    \ Marks – Defines the position of tick marks and how many tick marks to display.\n\
    *   Minimum – Defines the smallest value possible.\n*   Maximum – Defines the\
    \ largest value possible.\n*   Current – Identifies the initial value of the slider\
    \ when it first appears on the user interface.\n\nYou can use the `integerValue`\
    \ property to retrieve the current value of the slider and display this value\
    \ in another user interface item such as a text field. To see how to do this,\
    \ follow these steps:\n\n1.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ Xcode shows the `AppDelegate.swift` file next to the user interface.\n2.  Move\
    \ the mouse pointer over the Horizontal Slider, hold down the Control key, and\
    \ drag the mouse under the `IBOutlet` line in the `AppDelegate.swift` file.\n\
    3.  Release the Control key and the mouse. A pop-up window appears.\n4.  Click\
    \ in the Name text field, type `mySlider`, and click the Connect button.\n5. \
    \ Move the mouse pointer over the text field, hold down the Control key, and drag\
    \ the mouse under the `IBOutlet` line in the `AppDelegate.swift` file.\n6.  Release\
    \ the Control key and the mouse. A pop-up window appears.\n7.  Click in the Name\
    \ text field, type `sliderValue`, and click the Connect button. You should now\
    \ have these two `IBOutlet`s:\n    ```\n    @IBOutlet weak var mySlider: NSSlider!\n\
    \    @IBOutlet weak var sliderValue: NSTextField!\n    ```\n8.  From within Xcode\
    \ choose File ➤ New ➤ Project.\n9.  Click Application under the OS X category.\n\
    10. Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n11. Click in the Product Name text field and type `SliderProgram`.\n\
    12. Make sure the Language pop-up menu displays Swift and that all check boxes\
    \ are clear and not selected.\n13. Click the Next button. Xcode asks where you\
    \ want to store the project.\n14. Choose a folder to store your project and click\
    \ the Create button.\n15. Click on the `MainMenu.xib` file in the Project Navigator\
    \ Pane.\n16. Click on the `SliderProgram` icon to make the window of the user\
    \ interface appear.\n17. Drag a Horizontal Slider and a Text Field on to the user\
    \ interface so it looks like Figure [16-11](#A978-1-4842-1233-2_16_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1233-2_16_Fig11_HTML.jpg](A978-1-4842-1233-2_16_Fig11_HTML.jpg)\n\
    \nFigure 16-11.\nThe user interface of the `SliderProgram`\n\n18. Move the mouse\
    \ pointer over the Horizontal Slider, hold down the Control key, and drag the\
    \ mouse just above the last curly bracket at the bottom of the `AppDelegate.swift`\
    \ file.\n19. Release the Control key and the mouse. A pop-up window appears.\n\
    20. Click in the Connection pop-up menu and choose Action.\n21. Click in the Name\
    \ text field and type `getValue`.\n22. Click in the Type pop-up menu and choose\
    \ `NSSlider`. Then click the Connect button. Xcode creates an empty IBAction method.\n\
    23. Modify this IBAction method as follows:\n    ```\n    @IBAction func getValue(sender:\
    \ NSSlider) {\n        sliderValue.integerValue = mySlider.integerValue\n    }\n\
    \    ```\n24. Choose Product ➤ Run. Your user interface appears.\n25. Drag the\
    \ slider left and right. Notice that each time you drag the slider and release\
    \ the mouse button, the slider’s current value appears in the text box.\n26. Choose\
    \ SliderProgram ➤ Quit SliderProgram."
  raw: '## Using a Date Picker


    A Date Picker makes it easy for users to choose a date and/or time in a proper
    format. The three types of date picker appearances are shown in Figure [16-7](#A978-1-4842-1233-2_16_Chapter.html#Fig7):


    ![A978-1-4842-1233-2_16_Fig7_HTML.jpg](A978-1-4842-1233-2_16_Fig7_HTML.jpg)


    Figure 16-7.


    The three variations of a date picker


    *   Textual – Displays a date in a text field that requires the user to type in
    a proper date.

    *   Textual with Stepper – Displays a date in a text field that the user can change
    by clicking on a stepper to modify the currently selected part of the date.

    *   Graphical – Displays a calendar so the user can click on a date.


    Some of the properties to modify in a date picker are shown in Figure [16-8](#A978-1-4842-1233-2_16_Chapter.html#Fig8):


    ![A978-1-4842-1233-2_16_Fig8_HTML.jpg](A978-1-4842-1233-2_16_Fig8_HTML.jpg)


    Figure 16-8.


    The date picker properties in the Show Attributes Inspector pane


    *   Style – Determines the date picker’s appearance.

    *   Selects – Determines whether the user can select a single date or a range
    of dates.

    *   Elements – Determines what date and time elements to display such as Month,
    Day, Year, Hour, Minute, and Second.

    *   Minimum Date – Defines the earliest date possible.

    *   Maximum Date – Defines the latest date possible.

    *   Date – Defines the currently displayed date and/or time.


    To retrieve the user’s chosen date from a date picker, you need to access the
    dateValue property, which represents an NSDate type.


    To see how to use a date picker, follow these steps:


    Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the AppDelegate.swift
    file next to the user interface.   Move the mouse pointer over the date picker,
    hold down the Control key, and drag the mouse under the IBOutlet line in the AppDelegate.swift
    file.   Release the Control key and the mouse button. A pop-up window appears.
      Click in the Name text field, type chooseDate, and click the Connect button.
    Xcode creates an IBOutlet like this:   From within Xcode choose File ➤ New ➤ Project.
      Click Application under the OS X category.   Click Cocoa Application and click
    the Next button. Xcode now asks for a product name.   Click in the Product Name
    text field and type DateProgram.   Make sure the Language pop-up menu displays
    Swift and that all check boxes are clear and not selected.   Click the Next button.
    Xcode asks where you want to store the project.   Choose a folder to store your
    project and click the Create button.   Click on the MainMenu.xib file in the Project
    Navigator Pane.   Click on the DateProgram icon to make the window of the user
    interface appear.   Drag a Push Button and Date Picker on to the user interface.
      Click on the Date Picker and choose View ➤ Utilities ➤ Show Attributes Inspector.
      Click in the Style pop-up menu and choose Graphical to make the date picker
    look like a monthly calendar as shown in Figure [16-9](#A978-1-4842-1233-2_16_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_16_Fig9_HTML.jpg](A978-1-4842-1233-2_16_Fig9_HTML.jpg)


    Figure 16-9.


    The user interface of the DateProgram


    `@IBOutlet weak var chooseDate: NSDatePicker!`


    Move the mouse pointer over the Push Button, hold down the Control key, and drag
    the mouse over the last curly bracket in the bottom of the AppDelegate.swift file.
      Release the Control key and the mouse. A pop-up window appears.   Click in the
    Connect pop-up menu and choose Action.   Click in the Name text field and type
    showDate.   Click in the Type pop-up menu and choose NSButton. Then click the
    Connect button. Xcode creates an IBAction method.   Modify this IBAction method
    as follows:


    `@IBAction func showDate(sender: NSButton) {`


    `var myAlert = NSAlert()`


    `myAlert.messageText = "You chose this date =  \(chooseDate.dateValue)"`


    `myAlert.runModal()`


    `}`


    Choose Product ➤ Run. Your user interface appears.   Choose a date on the date
    picker and click the push button. An alert dialog appears, displaying the date
    you chose.   Click the OK button to make this alert dialog go away.   Choose DateProgram
    ➤ Quit DateProgram.


    ## Using Sliders


    A slider can appear vertically or horizontally. Sliders visually represent a range
    of values that the user can select by dragging the slider back and forth (or up
    and down). One end represents the minimum value (left or bottom) while the other
    end represents the maximum value (right or top). To help users understand the
    different values a slider represents, you can also choose to display tick marks
    as shown in Figure [16-10](#A978-1-4842-1233-2_16_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_16_Fig10_HTML.jpg](A978-1-4842-1233-2_16_Fig10_HTML.jpg)


    Figure 16-10.


    The appearance of a slider with and without tick marks


    Some of the more important properties to define on a slider include:


    *   Tick Marks – Defines the position of tick marks and how many tick marks to
    display.

    *   Minimum – Defines the smallest value possible.

    *   Maximum – Defines the largest value possible.

    *   Current – Identifies the initial value of the slider when it first appears
    on the user interface.


    You can use the integerValue property to retrieve the current value of the slider
    and display this value in another user interface item such as a text field. To
    see how to do this, follow these steps:


    Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode shows the AppDelegate.swift
    file next to the user interface.   Move the mouse pointer over the Horizontal
    Slider, hold down the Control key, and drag the mouse under the IBOutlet line
    in the AppDelegate.swift file.   Release the Control key and the mouse. A pop-up
    window appears.   Click in the Name text field, type mySlider, and click the Connect
    button.   Move the mouse pointer over the text field, hold down the Control key,
    and drag the mouse under the IBOutlet line in the AppDelegate.swift file.   Release
    the Control key and the mouse. A pop-up window appears.   Click in the Name text
    field, type sliderValue, and click the Connect button. You should now have these
    two IBOutlets:   From within Xcode choose File ➤ New ➤ Project.   Click Application
    under the OS X category.   Click Cocoa Application and click the Next button.
    Xcode now asks for a product name.   Click in the Product Name text field and
    type SliderProgram.   Make sure the Language pop-up menu displays Swift and that
    all check boxes are clear and not selected.   Click the Next button. Xcode asks
    where you want to store the project.   Choose a folder to store your project and
    click the Create button.   Click on the MainMenu.xib file in the Project Navigator
    Pane.   Click on the SliderProgram icon to make the window of the user interface
    appear.   Drag a Horizontal Slider and a Text Field on to the user interface so
    it looks like Figure [16-11](#A978-1-4842-1233-2_16_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_16_Fig11_HTML.jpg](A978-1-4842-1233-2_16_Fig11_HTML.jpg)


    Figure 16-11.


    The user interface of the SliderProgram  


    `@IBOutlet weak var mySlider: NSSlider!`


    `@IBOutlet weak var sliderValue: NSTextField!`


    Move the mouse pointer over the Horizontal Slider, hold down the Control key,
    and drag the mouse just above the last curly bracket at the bottom of the AppDelegate.swift
    file.   Release the Control key and the mouse. A pop-up window appears.   Click
    in the Connection pop-up menu and choose Action.   Click in the Name text field
    and type getValue.   Click in the Type pop-up menu and choose NSSlider. Then click
    the Connect button. Xcode creates an empty IBAction method.   Modify this IBAction
    method as follows:  


    `@IBAction func getValue(sender: NSSlider) {`


        `sliderValue.integerValue = mySlider.integerValue`


    `}`


    Choose Product ➤ Run. Your user interface appears.   Drag the slider left and
    right. Notice that each time you drag the slider and release the mouse button,
    the slider’s current value appears in the text box.   Choose SliderProgram ➤ Quit
    SliderProgram.'
  trans: "\n# 使用日期选择器\n\n日期选择器能让用户以规范的格式轻松选择日期和/或时间。三种日期选择器外观类型如图 16-7 所示：\n\n![A978-1-4842-1233-2_16_Fig7_HTML.jpg](img/A978-1-4842-1233-2_16_Fig7_HTML.jpg)\n\
    \n图 16-7.\n日期选择器的三种变体\n\n*   **文本型** – 在一个文本字段中显示日期，要求用户手动输入正确的日期。\n*   **带步进器的文本型**\
    \ – 在一个文本字段中显示日期，用户可以通过点击步进器来修改当前选中的日期部分。\n*   **图形型** – 显示一个日历，用户可以直接点击选择日期。\n\
    \n可在日期选择器中修改的部分属性如图 16-8 所示：\n\n![A978-1-4842-1233-2_16_Fig8_HTML.jpg](img/A978-1-4842-1233-2_16_Fig8_HTML.jpg)\n\
    \n图 16-8.\n显示在“属性检查器”面板中的日期选择器属性\n\n*   **样式** – 决定日期选择器的外观。\n*   **选择** – 决定用户是选择单个日期还是一个日期范围。\n\
    *   **元素** – 决定要显示的日期和时间元素，例如月、日、年、时、分和秒。\n*   **最小日期** – 定义最早可能的日期。\n*   **最大日期**\
    \ – 定义最晚可能的日期。\n*   **日期** – 定义当前显示的日期和/或时间。\n\n要从日期选择器中获取用户选择的日期，你需要访问 `dateValue`\
    \ 属性，它代表一个 `NSDate` 类型。\n\n要了解如何使用日期选择器，请遵循以下步骤：\n\n1.  选择“视图” ➤ “助手编辑器” ➤ “显示助手编辑器”。Xcode\
    \ 会在用户界面旁边显示 `AppDelegate.swift` 文件。\n2.  将鼠标指针移到日期选择器上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
    \ 文件中的 `IBOutlet` 行下方。\n3.  松开 Control 键和鼠标按钮。会弹出一个窗口。\n4.  点击“名称”文本字段，输入 `chooseDate`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `IBOutlet`，如下所示：\n    ```\n    @IBOutlet weak var chooseDate: NSDatePicker!\n\
    \    ```\n5.  在 Xcode 中，选择“文件” ➤ “新建” ➤ “项目”。\n6.  在 OS X 类别下点击“应用程序”。\n7.  点击“Cocoa\
    \ 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n8.  点击“产品名称”文本字段，输入 `DateProgram`。\n9.\
    \  确保“语言”弹出菜单显示为 Swift，并且所有复选框都处于未选中状态。\n10. 点击“下一步”按钮。Xcode 会询问你想要存储项目的位置。\n\
    11. 选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n12. 在项目导航器面板中点击 `MainMenu.xib` 文件。\n13. 点击 `DateProgram`\
    \ 图标，使用户界面窗口出现。\n14. 将一个“按钮”和一个“日期选择器”拖拽到用户界面上。\n15. 点击日期选择器，然后选择“视图” ➤ “实用工具”\
    \ ➤ “显示属性检查器”。\n16. 点击“样式”弹出菜单，选择“图形型”，使日期选择器看起来像月历，如图 16-9 所示。\n\n![A978-1-4842-1233-2_16_Fig9_HTML.jpg](img/A978-1-4842-1233-2_16_Fig9_HTML.jpg)\n\
    \n图 16-9.\n`DateProgram` 的用户界面\n\n17. 将鼠标指针移到按钮上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
    \ 文件底部最后一个大括号的上方。\n18. 松开 Control 键和鼠标。会弹出一个窗口。\n19. 点击“连接”弹出菜单，选择“动作”。\n20. 点击“名称”文本字段，输入\
    \ `showDate`。\n21. 点击“类型”弹出菜单，选择 `NSButton`。然后点击“连接”按钮。Xcode 会创建一个 IBAction 方法。\n\
    22. 按如下方式修改此 IBAction 方法：\n    ```\n    @IBAction func showDate(sender: NSButton)\
    \ {\n        var myAlert = NSAlert()\n        myAlert.messageText = \"你选择的日期是\
    \ =  \\(chooseDate.dateValue)\"\n        myAlert.runModal()\n    }\n    ```\n\
    23. 选择“产品” ➤ “运行”。你的用户界面会出现。\n24. 在日期选择器上选择一个日期，然后点击按钮。会弹出一个警告对话框，显示你选择的日期。\n\
    25. 点击“确定”按钮关闭此警告对话框。\n26. 选择“DateProgram” ➤ “退出 DateProgram”。\n\n# 使用滑块\n\n滑块可以垂直或水平显示。滑块通过视觉方式表示一个值范围，用户可以通过前后（或上下）拖动滑块来选择其中某个值。一端代表最小值（左侧或底部），另一端代表最大值（右侧或顶部）。为了帮助用户理解滑块代表的不同值，你也可以选择显示刻度线，如图\
    \ 16-10 所示。\n\n![A978-1-4842-1233-2_16_Fig10_HTML.jpg](img/A978-1-4842-1233-2_16_Fig10_HTML.jpg)\n\
    \n图 16-10.\n带刻度线和不带刻度线的滑块外观\n\n需要在滑块上定义的一些比较重要的属性包括：\n\n*   **刻度线** – 定义刻度线的位置以及要显示的刻度线数量。\n\
    *   **最小值** – 定义可能的最小值。\n*   **最大值** – 定义可能的最大值。\n*   **当前值** – 标识滑块首次出现在用户界面时的初始值。\n\
    \n你可以使用 `integerValue` 属性来获取滑块的当前值，并将其显示在其他用户界面元素（如文本字段）中。要了解如何操作，请遵循以下步骤：\n\n\
    1.  选择“视图” ➤ “助手编辑器” ➤ “显示助手编辑器”。Xcode 会在用户界面旁边显示 `AppDelegate.swift` 文件。\n2.\
    \  将鼠标指针移到水平滑块上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。\n\
    3.  松开 Control 键和鼠标。会弹出一个窗口。\n4.  点击“名称”文本字段，输入 `mySlider`，然后点击“连接”按钮。\n5.  将鼠标指针移到文本字段上，按住\
    \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。\n6.  松开 Control 键和鼠标。会弹出一个窗口。\n\
    7.  点击“名称”文本字段，输入 `sliderValue`，然后点击“连接”按钮。你现在应该有以下两个 `IBOutlet`：\n    ```\n \
    \   @IBOutlet weak var mySlider: NSSlider!\n    @IBOutlet weak var sliderValue:\
    \ NSTextField!\n    ```\n8.  在 Xcode 中，选择“文件” ➤ “新建” ➤ “项目”。\n9.  在 OS X 类别下点击“应用程序”。\n\
    10. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n11. 点击“产品名称”文本字段，输入 `SliderProgram`。\n\
    12. 确保“语言”弹出菜单显示为 Swift，并且所有复选框都处于未选中状态。\n13. 点击“下一步”按钮。Xcode 会询问你想要存储项目的位置。\n\
    14. 选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n15. 在项目导航器面板中点击 `MainMenu.xib` 文件。\n16. 点击 `SliderProgram`\
    \ 图标，使用户界面窗口出现。\n17. 将一个“水平滑块”和一个“文本字段”拖拽到用户界面上，使其看起来如图 16-11 所示。\n\n![A978-1-4842-1233-2_16_Fig11_HTML.jpg](img/A978-1-4842-1233-2_16_Fig11_HTML.jpg)\n\
    \n图 16-11.\n`SliderProgram` 的用户界面\n\n18. 将鼠标指针移到水平滑块上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
    \ 文件底部最后一个大括号的正上方。\n19. 松开 Control 键和鼠标。会弹出一个窗口。\n20. 点击“连接”弹出菜单，选择“动作”。\n21.\
    \ 点击“名称”文本字段，输入 `getValue`。\n22. 点击“类型”弹出菜单，选择 `NSSlider`。然后点击“连接”按钮。Xcode 会创建一个空的\
    \ IBAction 方法。\n23. 按如下方式修改此 IBAction 方法：\n    ```\n    @IBAction func getValue(sender:\
    \ NSSlider) {\n        sliderValue.integerValue = mySlider.integerValue\n    }\n\
    \    ```\n24. 选择“产品” ➤ “运行”。你的用户界面会出现。\n25. 向左和向右拖动滑块。请注意，每次拖动滑块并松开鼠标按钮时，滑块的当前值会显示在文本框中。\n\
    26. 选择“SliderProgram” ➤ “退出 SliderProgram”。\n"
- fmt: '# Summary


    Check boxes, radio buttons, and date pickers let you provide the user with a range
    of valid options to select. This ensures that the user can’t give a program invalid
    data by mistake (or deliberately).


    Check boxes allow the user to choose zero or more options. A group of radio buttons
    only allow the user to choose one option. A date picker allows the user to choose
    a correctly formatted date.


    To identify which check boxes a user selected, examine the `State` property of
    each check box. If the `State` value is 1, the check box is selected. If the `State`
    value is 0, the check box is clear.


    It’s possible to display alternate text on a check box and radio button. That
    way one text appears when the check box or radio button is selected, and different
    text appears when the check box or radio button is clear.


    To identify which radio button a user may have selected, you need to use the `Tag`
    property. Each radio button needs a unique `Tag` value, which can be an integer.
    By identifying the `Tag` value, you can identify the radio button that the user
    selected.


    The date picker makes it easy for the user to choose a date and/or a time. The
    date picker stores the selected date/time in a special `NSDate` format that you
    can access through the `dateValue` property of the date picker.


    Sliders let users choose from a range of valid numeric values. By using check
    boxes, radio buttons, date pickers, and sliders, a program ensures that users
    can only choose from a range of valid options.


    # 17. Using Text with Labels, Text Fields, and Combo Boxes


    Electronic supplementary material The online version of this chapter (doi:10.1007/978-1-4842-1233-2_17)
    contains supplementary material, which is available to authorized users.


    When a program can offer a limited range of valid options to the user, that’s
    when you want to use check boxes, radio buttons, date pickers, or sliders. However,
    sometimes a program needs to allow the user to type in data that can never be
    predicted ahead of time, such as a person’s name. When a program needs to allow
    the user to type in data, that’s when you need to use a text field or a combo
    box.


    A text field lets the user type in anything he or she wants including numbers,
    unusual characters, or ordinary letters. That means a program needs to verify
    that the user typed in valid data.


    Sometimes a program can offer the user both the option of choosing from a limited
    selection of valid options or typing in data instead. For example, a program might
    ask the user to choose a country. Then the program can offer a limited range of
    likely options or give the user the freedom to type something else.


    This ability to either choose from a limited range of options or type something
    in is the main advantage of a combo box. The combo box gets its name because it
    combines the features of a pop-up button (displaying a list of valid options)
    with the freedom to type anything in (like a text field).


    While text fields and combo boxes are used to accept data from the user, labels
    are used to display information to the user. When you just need to display information
    such as displaying instructions or identifying the purpose of a text field (such
    as telling a user to type a name or address), you’ll want to use a label. Together,
    labels, text fields, and combo boxes work to accept and display text on a user
    interface.


    ## Using Text Fields


    Since a user can type anything into a text field, a text field stores data as
    a string, which you can retrieve using the `stringValue` property. However, since
    users can type in integer or decimal numbers, a text field is versatile enough
    to recognize such numbers.


    If the user types in an integer, you can retrieve that value by accessing the
    `intValue` property. If the user types in a decimal number, you can retrieve that
    value by accessing either the `floatValue` or `doubleValue` properties.


    No matter what the user types into a text field, you can retrieve the proper value.
    Since text fields can accept strings or numbers, your program can retrieve the
    proper value by accessing one of the following properties:


    - `intValue` – Retrieves an integer value. If the user types a string, this property
    stores 0. If the user types a decimal number such as 10.9, it stores only the
    integer value such as 10.

    - `floatValue` or `doubleValue` – Retrieves a floating-point or double value.
    If the user types a string, this property stores 0.0. If the user types an integer
    such as 4, the `floatValue` and `doubleValue` properties store it as a decimal
    such as 4.0.

    - `stringValue` – Retrieves a string value. If the user types a number, it stores
    that number as a string (such as “4.305”).


    Note


    When the user types text into a text field, that typed text gets stored in all
    four properties: `intValue`, `floatValue`, `doubleValue`, and `stringValue`.


    Beyond the standard text field, Xcode offers several text field variations for
    handling different types of text entry:


    - **Text Field with Number Formatter** – Defines the type of numbers that can
    be typed in

    - **Secure Text Field** – Masks typed text

    - **Search Field** – Stores a list of previously entered text

    - **Token Field** – Allows the user to enter tokens of content in addition to
    typing ordinary text'
