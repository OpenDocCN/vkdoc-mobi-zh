    \ = \"\"\n        phoneField.stringValue = \"\"\n    }\n}\n```\n\n要了解此程序的工作原理，请按照以下步骤操作：\n\
    \n1. 选择 **Product** ➤ **Run**。Xcode 运行您的 `DictionaryProgram` 项目。\n2. 点击“姓名”文本字段并输入\
    \ `Bob`。\n3. 点击“地址”文本字段并输入 `123 Main`。\n4. 点击“电话”文本字段并输入 `555-1234`。\n5. 点击“添加”按钮。程序在“总人数”文本字段中显示数组中的项目数\
    \ (1)。\n6. 重复步骤 2-5，但输入姓名 `Jane`、地址 `90 Oak Lane` 和电话号码 `555-9874`。 “总人数”文本字段中显示数字\
    \ 2。\n7. 点击“查看”按钮。出现一个警报对话框，显示 `Jane`、`90 Oak Lane` 和 `555-9874`，如图 10-7 所示。\n\
    \n![A978-1-4842-1233-2_10_Fig7_HTML.jpg](img/A978-1-4842-1233-2_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.** 显示添加到数组中的最后一个结构体的警报对话框\n\n8. 点击“确定”关闭警报对话框。\n9. 选择 **StructureProgram**\
    \ ➤ **Quit StructureProgram**。\n\n## 总结\n\n元组是一种在单个变量中存储不同数据类型的方式。与数组和字典类似，集合可以存储相同数据类型的列表。数组最适合存储有序信息，字典最适合快速检索数据，而集合最适合检查项目是否属于集合，以及便于操作两个或多个集合。\n\
    \n如果需要存储大量相关数据，可以使用元组，但元组在处理大量数据时会变得笨拙。另一种选择是创建结构体，它允许您定义要存储的不同数据类型。除了基本数据类型（`Int`、`String`、`Float`\
    \ 和 `Double`）之外，结构体还可以包含其他数据结构，例如数组、字典或集合。为了获得更大的灵活性，您甚至可以将结构体放入数组、字典或集合中。\n\n\
    在您创建的示例 OS X 程序中，您学习了如何创建结构体并将其数据存储在数组中。到现在为止，您应该已经熟悉了如何使用 `IBOutlet` 从用户界面显示或检索数据，以及如何创建\
    \ `IBAction` 方法使程序实际运行。\n\n通过元组、集合、结构体以及数组和字典，您可以以多种方式组合数据结构，从而以最灵活的方式存储数据，满足特定需求。\n"
- fmt: "# 11. Creating Classes and Objects\n\nElectronic supplementary material The\
    \ online version of this chapter (doi:[10.1007/978-1-4842-1233-2_11](http://dx.doi.org/10.1007/978-1-4842-1233-2_11))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The heart of programming in Swift using Xcode is object-oriented programming.\
    \ The main idea is to divide a large program into separate objects where each\
    \ object ideally represents a physical entity. For example, if you were creating\
    \ a program to control a car, one object might represent the car's engine, a second\
    \ object might represent the car's entertainment system, and a third object might\
    \ represent the car's heating and cooling system.\n\nNow if you want to update\
    \ the part of a program that controls the car's engine, you just have to modify\
    \ or replace the object that controls that car engine. Objects not only help you\
    \ better understand how different parts of a program work together, but also isolate\
    \ code so you can create building blocks to put together larger, more sophisticated\
    \ programs.\n\nObjects help you visualize your program as separate building blocks\
    \ that are independent from each other. Before object-oriented programming, programmers\
    \ divided programs into subprograms, which also acted like miniature building\
    \ blocks. The main difference between subprograms and objects is that subprograms\
    \ could access data used by other subprograms. That meant that if you modified\
    \ one subprogram, you often inadvertently affected other parts of the program.\
    \ That made fixing errors or bugs difficult and also made modifying programs difficult\
    \ as well.\n\nWith objects, the main idea is to create separate, independent building\
    \ blocks that work together without affecting each other's data. To keep data\
    \ isolated, objects use encapsulation. That means an object has its own variables\
    \ (called properties) and functions (called methods).\n\nObjects can communicate\
    \ with each other in two ways:\n\n* By storing new values in another object's\
    \ properties\n* By calling another object's methods\n\nIdeally, a program should\
    \ consist of multiple objects that perform tasks completely independent from each\
    \ other. That makes it easy to modify a program by replacing one object with an\
    \ improved version of that object.\n\n## Creating Classes\n\nThere are two steps\
    \ to creating an object. First, you have to create a class. Second, you create\
    \ an object based on that class.\n\nA class looks and works much like a structure\
    \ (see [Chapter 10](#A978-1-4842-1233-2_10_Chapter.html)) where you define a name.\
    \ Once you've defined a class, you can create one or more objects based on that\
    \ class. Think of a class as a cookie cutter that defines the shape of cookies,\
    \ and objects as different type of dough you can define based on the class.\n\n\
    The simplest type of class you can define looks like this:\n\n```\nclass className\
    \ {\n\n}\n```\n\nTo create an object from this class, you just declare a variable,\
    \ but instead of defining a data type such as `Int` or `String`, you define the\
    \ class name such as:\n\n```\nvar myObject = className()\n```\n\nOf course, a\
    \ class that contains no code is useless, so the two types of code you can include\
    \ in a class are variables (known as properties) and functions for manipulate\
    \ data (known as methods). Creating properties in a class involves creating one\
    \ or more variables and defining a data type and an initial value such as:\n\n\
    ```\nclass className {\n    var name : String = \"\"\n    var ID : Int = 0\n \
    \   var salary : Double = 0\n}\n```\n\nInitial values are important because when\
    \ you create an object based on a class, you don't want uninitialized values that\
    \ could cause problems if you try to use them.\n\nTo define a property, you declare\
    \ a variable name, a data type, and an initial value. Since Swift can infer data\
    \ types, you could omit the data type declaration and just assign initial values\
    \ like this:\n\n```\nclass className {\n    var name = \"\"\n    var ID  = 0\n\
    \    var salary = 0.0\n}\n```\n\nWhether you define class properties with a data\
    \ type or not, you can create an object from this class by just creating a variable\
    \ name, setting it equal to the class name, and following it with an empty set\
    \ of parentheses like this:\n\n```\nvar myObject = className()\n```\n\nBoth of\
    \ the previous methods create the same initial values for the class properties.\
    \ For more flexibility, you can create an initializer method called `init`. This\
    \ lets you define initial values each time you create an object from a class.\
    \ An initializer in a class might look like this:\n\n```\nclass secondClass {\n\
    \    var name : String\n    var ID : Int\n    var salary : Double\n    init (name:\
    \ String, ID: Int, salary: Double) {\n        self.name = name\n        self.ID\
    \ = ID\n        self.salary = salary\n    }\n}\n```\n\nThis initializer method\
    \ (`init`) defines a parameter list that accepts three items: a string, an integer,\
    \ and a double value. Then it stores this information in the `name`, `ID`, and\
    \ `salary` properties respectively. When a class has an initializer, you must\
    \ create an object from that class by including the proper number and data type\
    \ to match the initializer parameter list.\n\nThat means creating an object that\
    \ includes a string, an integer, and a double value in parentheses like this:\n\
    \n```\nvar secondObject = secondClass (name: \"Joe\", ID: 102, salary: 120000)\n\
    ```\n\nNotice that when you include data in the parameter list, you must label\
    \ each data chunk with the variable name defined in the initializer parameter\
    \ list. In this case, the three parameter names are `name`, `ID`, and `salary`,\
    \ so creating an object means identifying the data with those same parameter names."
  raw: '# 11. Creating Classes and Objects


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​11](http://dx.doi.org/10.1007/978-1-4842-1233-2_11))
    contains supplementary material, which is available to authorized users.


    The heart of programming in Swift using Xcode is object-oriented programming.
    The main idea is to divide a large program into separate objects where each object
    ideally represents a physical entity. For example, if you were creating a program
    to control a car, one object might represent the car’s engine, a second object
    might represent the car’s entertainment system, and a third object might represent
    the car’s heating and cooling system.


    Now if you want to update the part of a program that controls the car’s engine,
    you just have to modify or replace the object that controls that car engine. Objects
    not only help you better understand how different parts of a program work together,
    but also isolate code so you can create building blocks to put together larger,
    more sophisticated programs.


    Objects help you visualize your program as separate building blocks that are independent
    from each other. Before object-oriented programming, programmers divided programs
    into subprograms, which also acted like miniature building blocks. The main difference
    between subprograms and objects is that subprograms could access data used by
    other subprograms. That meant that if you modified one subprogram, you often inadvertently
    affected other parts of the program. That made fixing errors or bugs difficult
    and also made modifying programs difficult as well.


    With objects, the main idea is to create separate, independent building blocks
    that work together without affecting each other’s data. To keep data isolated,
    objects use encapsulation. That means an object has its own variables (called
    properties) and functions (called methods).


    Objects can communicate with each other in two ways:


    *   By storing new values in another object’s properties

    *   By calling another object’s methods


    Ideally, a program should consist of multiple objects that perform tasks completely
    independent from each other. That makes it easy to modify a program by replacing
    one object with an improved version of that object.


    ## Creating Classes


    There are two steps to creating an object. First, you have to create a class.
    Second, you create an object based on that class.


    A class looks and works much like a structure (see [Chapter 10](#A978-1-4842-1233-2_10_Chapter.html))
    where you define a name. Once you’ve defined a class, you can create one or more
    objects based on that class. Think of a class as a cookie cutter that defines
    the shape of cookies, and objects as different type of dough you can define based
    on the class.


    The simplest type of class you can define looks like this:


    `class className {`


    `}`


    To create an object from this class, you just declare a variable, but instead
    of defining a data type such as Int or String, you define the class name such
    as:


    `var myObject = className()`


    Of course, a class that contains no code is useless, so the two types of code
    you can include in a class are variables (known as properties) and functions for
    manipulate data (known as methods). Creating properties in a class involves creating
    one or more variables and defining a data type and an initial value such as:


    class className {


        `var name : String = ""`


        `var ID : Int = 0`


        `var salary : Double = 0`


    `}`


    Initial values are important because when you create an object based on a class,
    you don’t want uninitialized values that could cause problems if you try to use
    them.


    To define a property, you declare a variable name, a data type, and an initial
    value. Since Swift can infer data types, you could omit the data type declaration
    and just assign initial values like this:


    `class className {`


        `var name = ""`


        `var ID  = 0`


        `var salary = 0.0`


    }


    Whether you define class properties with a data type or not, you can create an
    object from this class by just creating a variable name, setting it equal to the
    class name, and following it with an empty set of parentheses like this:


    `var myObject = className()`


    Both of the previous methods create the same initial values for the class properties.
    For more flexibility, you can create an initializer method called init. This lets
    you define initial values each time you create an object from a class. An initializer
    in a class might look like this:


    `class secondClass {`


        `var name : String`


        `var ID : Int`


        `var salary : Double`


        `init (name: String, ID: Int, salary: Double) {`


            `self.name = name`


            `self.ID = ID`


            `self.salary = salary`


        `}`


    `}`


    This initializer method (init) defines a parameter list that accepts three items:
    a string, an integer, and a double value. Then it stores this information in the
    name, ID, and salary properties respectively. When a class has an initializer,
    you must create an object from that class by including the proper number and data
    type to match the initializer parameter list.


    That means creating an object that includes a string, an integer, and a double
    value in parentheses like this:


    `var secondObject = secondClass (name: "Joe", ID: 102, salary: 120000)`


    Notice that when you include data in the parameter list, you must label each data
    chunk with the variable name defined in the initializer parameter list. In this
    case, the three parameter names are name, ID, and salary, so creating an object
    means identifying the data with those same parameter names.'
  trans: "\n# 11. 创建类与对象\n\n电子补充材料：本章在线版本 (doi:[10.1007/978-1-4842-1233-2_11](http://dx.doi.org/10.1007/978-1-4842-1233-2_11))\
    \ 包含补充材料，仅供授权用户使用。\n\n使用 Xcode 进行 Swift 编程的核心是面向对象编程。其主要思想是将一个大型程序划分为独立的对象，每个对象理想情况下代表一个物理实体。例如，如果你正在创建一个控制汽车的程序，一个对象可以代表汽车的发动机，第二个对象可以代表汽车的娱乐系统，第三个对象则可以代表汽车的加热与冷却系统。\n\
    \n现在，如果你想要更新程序中控制汽车发动机的部分，你只需修改或替换控制该发动机的对象即可。对象不仅帮助你更好地理解程序不同部分如何协同工作，还能隔离代码，从而让你能够构建模块，组合成更大、更复杂的程序。\n\
    \n对象帮助你以相互独立的独立构建块的方式来看待程序。在面向对象编程出现之前，程序员将程序划分为子程序，这些子程序也类似于微型构建块。子程序和对象的主要区别在于，子程序可以访问由其他子程序使用的数据。这意味着，如果你修改了一个子程序，常常会无意中影响到程序的其他部分。这使得修复错误（Bug）变得困难，同样也使修改程序变得困难。\n\
    \n而对于对象，其主要思想是创建独立、互不影响的构建块，它们协同工作，同时不干扰彼此的数据。为了保持数据的隔离，对象使用了**封装**。这意味着对象拥有自己的变量（称为**属性**）和函数（称为**方法**）。\n\
    \n对象之间可以通过两种方式通信：\n\n*   在另一个对象的属性中存储新值\n*   调用另一个对象的方法\n\n理想情况下，一个程序应由多个完全独立执行任务的对象组成。这使得通过用改进版的对象替换旧对象来修改程序变得简单。\n\
    \n## 创建类\n\n创建对象分为两步。首先，你必须创建一个类。其次，你基于该类创建一个对象。\n\n类的外观和工作方式与结构体非常相似（参见第 10 章），你需要为其定义一个名称。一旦你定义了一个类，就可以基于该类创建一个或多个对象。可以将类想象成一个决定饼干形状的模具，而对象则是你可以基于该类定义的不同类型的面团。\n\
    \n你可以定义的最简单的类如下所示：\n\n```\nclass className {\n\n}\n```\n\n要从这个类创建一个对象，你只需声明一个变量，但不要定义像\
    \ `Int` 或 `String` 这样的数据类型，而是定义类名，例如：\n\n```\nvar myObject = className()\n```\n\
    \n当然，一个不包含任何代码的类是无用的，因此你可以在类中包含的两种代码是：变量（称为属性）和用于操作数据的函数（称为方法）。在类中创建属性涉及创建一个或多个变量，并定义数据类型和初始值，例如：\n\
    \n```\nclass className {\n    var name : String = \"\"\n    var ID : Int = 0\n\
    \    var salary : Double = 0\n}\n```\n\n初始值非常重要，因为当你基于一个类创建对象时，你不希望存在未初始化的值，这些值在你试图使用时可能会导致问题。\n\
    \n要定义一个属性，你需要声明一个变量名、一个数据类型和一个初始值。由于 Swift 可以推断数据类型，你可以省略数据类型声明，仅像这样赋予初始值：\n\n\
    ```\nclass className {\n    var name = \"\"\n    var ID  = 0\n    var salary =\
    \ 0.0\n}\n```\n\n无论你是否使用数据类型定义类属性，你都可以通过创建一个变量名，将其设置为类名，并在其后加上一对空圆括号来从此类创建对象，如下所示：\n\
    \n```\nvar myObject = className()\n```\n\n以上两种方法都会为类的属性创建相同的初始值。为了获得更大的灵活性，你可以创建一个名为\
    \ `init` 的初始化方法。这允许你每次从类创建对象时定义初始值。类中的初始化器可能如下所示：\n\n```\nclass secondClass {\n\
    \    var name : String\n    var ID : Int\n    var salary : Double\n    init (name:\
    \ String, ID: Int, salary: Double) {\n        self.name = name\n        self.ID\
    \ = ID\n        self.salary = salary\n    }\n}\n```\n\n这个初始化方法 (`init`) 定义了一个参数列表，接受三个项目：一个字符串、一个整数和一个双精度浮点数值。然后它将这些信息分别存储在\
    \ `name`、`ID` 和 `salary` 属性中。当一个类具有初始化器时，你必须通过包含与初始化器参数列表匹配的正确数量和数据类型来创建该类的对象。\n\
    \n这意味着创建一个对象时需要在圆括号中包含一个字符串、一个整数和一个双精度浮点数值，如下所示：\n\n```\nvar secondObject = secondClass\
    \ (name: \"Joe\", ID: 102, salary: 120000)\n```\n\n请注意，当你在参数列表中包含数据时，必须使用初始化器参数列表中定义的变量名来标记每个数据块。在本例中，三个参数名是\
    \ `name`、`ID` 和 `salary`，因此创建对象意味着使用这些相同的参数名来标识数据。\n"
- fmt: "### Accessing Properties in an Object\n\nTo access an object’s properties,\
    \ you must specify the object name followed by a period and the property name\
    \ such as:\n\n`objectName.propertyName = data`\n\nYou can also assign an object’s\
    \ property values to a variable like this:\n\n`var person = myObject.name`\n\n\
    To access properties, you need to specify the object name, a period, and the property\
    \ name that you want to access such as:\n\n`print (person.name)`\n\n**Note** \
    \ \nWhen accessing values stored in properties, make sure you specify the object\
    \ name, not the class name. If you created a “person” object from the “className”\
    \ class, then you would access properties by specifying the object name (`person`)\
    \ and the property name (`name`, `ID`, `salary`) such as `person.name` or `person.ID`.\
    \ You would not access the property value by using the class name such as `className.name`\
    \ or `className.ID`. If you try this, your code will not work.\n\nJust like ordinary\
    \ variables, an object’s properties can only hold one chunk of data at a time.\
    \ The moment you store new data in a property, it wipes out the previous data.\n\
    \nTo see how to create a class and work with an object’s properties, create a\
    \ new playground by following these steps:\n\n1. Start Xcode.\n2. Choose **File\
    \ ➤ New ➤ Playground**. (If you see the Xcode welcome screen, you can also click\
    \ on “Get started with a playground.”) Xcode asks for a playground name and platform.\n\
    3. Click in the Name text field and type `ClassPlayground`.\n4. Click in the Platform\
    \ pop-up menu and choose **OS X**. Xcode asks where you want to save your playground\
    \ file.\n5. Click on a folder where you want to save your playground file and\
    \ click the **Create** button. Xcode displays the playground file.\n6. Edit the\
    \ code as follows:\n\n```\nimport Cocoa\n\nclass className {\n    var name = \"\
    \"\n    var ID  = 0\n    var salary = 0\n}\n\nvar worker = className()\nworker.name\
    \ = \"Bob\"\nworker.ID = 102\nworker.salary = 10\n\nvar executive = className()\n\
    executive.name = \"Robert\"\nexecutive.ID = 1\nexecutive.salary = worker.salary\
    \ * 100\n\nclass secondClass {\n    var name : String\n    var ID : Int\n    var\
    \ salary : Double\n    init (name: String, ID: Int, salary: Double) {\n      \
    \  self.name = name\n        self.ID = ID\n        self.salary = salary\n    }\n\
    }\n\nvar consultant = secondClass (name: \"Joe\", ID: 17, salary: 50000)\n```\n\
    \nThe first class initializes its properties when they’re declared. Then it creates\
    \ an object (`worker`) based on the class (`className`). To store data in the\
    \ `worker` object, the code specifies the object name (`worker`) and property\
    \ name and assigns it a value.\n\nThe second class example uses an initializer\
    \ to define the property values. The `init` method accepts three chunks of data,\
    \ a string, an integer, and a decimal (`Double`) value in that order.\n\nTo create\
    \ an object (`consultant`) from this second class (`secondClass`), the parentheses\
    \ need to include the right number of data in the right order along with the proper\
    \ data types in addition to displaying a label to identify what the data means\
    \ as shown in Figure [11-1](#A978-1-4842-1233-2_11_Chapter.html#Fig1).\n\n![A978-1-4842-1233-2_11_Fig1_HTML.jpg](A978-1-4842-1233-2_11_Fig1_HTML.jpg)\n\
    \n*Figure 11-1. Creating a class file and accessing properties*\n\n### Computed\
    \ Properties in an Object\n\nAs an alternative to defining fixed values for properties,\
    \ you can also use computed properties where one property’s initial value depends\
    \ on the value of another property. The simplest way to create a computed property\
    \ is to define a property name, a data type, and then in curly brackets write\
    \ code that calculates a value. Finally, use the `return` keyword to define the\
    \ value to store in the property like this:\n\n```\nclass shape {\n    var height\
    \ : Int = 5\n    var width : Int {\n      return height * 2\n    }\n}\n\nvar rectangle\
    \ = shape()\nprint (rectangle.height)\nprint (rectangle.width)\n```\n\nThis computed\
    \ property simply takes the value stored in the `height` property, multiplies\
    \ it by 2, and stores that result in the `width` property. When you create an\
    \ object based on the `shape` class, the initial value of 5 gets stored in the\
    \ `height` property and the computed property multiplies the `height` value (5)\
    \ by 2 to get 10, which it stores in the `width` property as shown in Figure [11-2](#A978-1-4842-1233-2_11_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1233-2_11_Fig2_HTML.jpg](A978-1-4842-1233-2_11_Fig2_HTML.jpg)\n\
    \n*Figure 11-2. Using computed properties to determine a property’s initial value*\n\
    \nIn this example of a computed property, the value of one property (`width`)\
    \ gets the value of another property (`height`) to determine its own value. In\
    \ technical terms, this is known as a getter."
  raw: '### Accessing Properties in an Object


    To access an object’s properties, you must specify the object name followed by
    a period and the property name such as:


    `objectName.propertyName = data`


    You can also assign an object’s property values to a variable like this:


    `var person = myObject.name`


    To access properties, you need to specify the object name, a period, and the property
    name that you want to access such as:


    `print (person.name)`


    Note


    When accessing values stored in properties, make sure you specify the object name,
    not the class name. If you created a “person” object from the “className” class,
    then you would access properties by specifying the object name (person) and the
    property name (name, ID, salary) such as person.name or person.ID. You would not
    access the property value by using the class name such as className.name or className.ID.
    If you try this, your code will not work.


    Just like ordinary variables, an object’s properties can only hold one chunk of
    data at a time. The moment you store new data in a property, it wipes out the
    previous data.


    To see how to create a class and work with an object’s properties, create a new
    playground by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type ClassPlayground.  
    Click in the Platform pop-up menu and choose OS X. Xcode asks where you want to
    save your playground file.   Click on a folder where you want to save your playground
    file and click the Create button. Xcode displays the playground file.   Edit the
    code as follows:  


    `import Cocoa`


    `class className {`


        `var name = ""`


        `var ID  = 0`


        `var salary = 0`


    `}`


    `var worker = className()`


    `worker.name = "Bob"`


    `worker.ID = 102`


    `worker.salary = 10`


    `var executive = className()`


    `executive.name = "Robert"`


    `executive.ID = 1`


    `executive.salary = worker.salary * 100`


    `class secondClass {`


        `var name : String`


        `var ID : Int`


        `var salary : Double`


        `init (name: String, ID: Int, salary: Double) {`


            `self.name = name`


            `self.ID = ID`


            `self.salary = salary`


        `}`


    `}`


    `var consultant = secondClass (name: "Joe", ID: 17, salary: 50000)`


    The first class initializes its properties when they’re declared. Then it creates
    an object (worker) based on the class (className). To store data in the worker
    object, the code specifies the object name (worker) and property name and assigns
    it a value.


    The second class example uses an initializer to define the property values. The
    init method accepts three chunks of data, a string, an integer, and a decimal
    (Double) value in that order.


    To create an object (consultant) from this second class (secondClass), the parentheses
    need to include the right number of data in the right order along with the proper
    data types in addition to displaying a label to identify what the data means as
    shown in Figure [11-1](#A978-1-4842-1233-2_11_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_11_Fig1_HTML.jpg](A978-1-4842-1233-2_11_Fig1_HTML.jpg)


    Figure 11-1.


    Creating a class file and accessing properties


    ### Computed Properties in an Object


    As an alternative to defining fixed values for properties, you can also use computed
    properties where one property’s initial value depends on the value of another
    property. The simplest way to create a computed property is to define a property
    name, a data type, and then in curly brackets write code that calculates a value.
    Finally, use the “return” keyword to define the value to store in the property
    like this:


    `class shape {`


        `var height : Int = 5`


        `var width : Int {`


          `return height * 2`


        `}`


    `}`


    `var rectangle = shape()`


    `print (rectangle.height)`


    `print (rectangle.width)`


    This computed property simply takes the value stored in the height property, multiples
    it by 2, and stores that result in the width property. When you create an object
    based on the shape class, the initial value of 5 gets stored in the height property
    and the computed property multiples the height value (5) by 2 to get 10, which
    it stores in the width property as shown in Figure [11-2](#A978-1-4842-1233-2_11_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_11_Fig2_HTML.jpg](A978-1-4842-1233-2_11_Fig2_HTML.jpg)


    Figure 11-2.


    Using computed properties to determine a property’s initial value


    In this example of a computed property, the value of one property (width) gets
    the value of another property (height) to determine its own value. In technical
    terms, this is known as a getter.'
  trans: "\n### 访问对象中的属性\n\n要访问对象的属性，您必须指定对象名称，后跟句点和属性名称，例如：\n\n`objectName.propertyName\
    \ = data`\n\n您也可以将对象的属性值赋值给变量，如下所示：\n\n`var person = myObject.name`\n\n要访问属性，您需要指定对象名称、句点以及要访问的属性名称，例如：\n\
    \n`print (person.name)`\n\n**注意**  \n访问存储在属性中的值时，请确保指定的是对象名称，而不是类名称。如果您是从“className”类创建了一个“person”对象，那么您应该通过指定对象名称（`person`）和属性名称（`name`、`ID`、`salary`）来访问属性，例如\
    \ `person.name` 或 `person.ID`。您不应使用类名称来访问属性值，例如 `className.name` 或 `className.ID`。如果尝试这样做，您的代码将无法运行。\n\
    \n就像普通变量一样，对象的属性一次只能保存一块数据。当你将新数据存入属性时，它会覆盖之前的数据。\n\n要了解如何创建类以及操作对象的属性，请按照以下步骤创建一个新的\
    \ playground：\n\n1. 启动 Xcode。\n2. 选择 **文件 ➤ 新建 ➤ Playground**。（如果您看到 Xcode 欢迎屏幕，也可以点击“开始使用\
    \ playground”。）Xcode 会要求您输入 playground 名称并选择平台。\n3. 在“名称”文本框中点击并输入 `ClassPlayground`。\n\
    4. 在“平台”弹出菜单中点击并选择 **OS X**。Xcode 会询问您希望将 playground 文件保存在哪里。\n5. 点击您要保存 playground\
    \ 文件的文件夹，然后点击 **创建** 按钮。Xcode 会显示该 playground 文件。\n6. 按如下方式编辑代码：\n\n```\nimport\
    \ Cocoa\n\nclass className {\n    var name = \"\"\n    var ID  = 0\n    var salary\
    \ = 0\n}\n\nvar worker = className()\nworker.name = \"Bob\"\nworker.ID = 102\n\
    worker.salary = 10\n\nvar executive = className()\nexecutive.name = \"Robert\"\
    \nexecutive.ID = 1\nexecutive.salary = worker.salary * 100\n\nclass secondClass\
    \ {\n    var name : String\n    var ID : Int\n    var salary : Double\n    init\
    \ (name: String, ID: Int, salary: Double) {\n        self.name = name\n      \
    \  self.ID = ID\n        self.salary = salary\n    }\n}\n\nvar consultant = secondClass\
    \ (name: \"Joe\", ID: 17, salary: 50000)\n```\n\n第一个类在声明属性时对其进行了初始化。然后，它基于该类（`className`）创建了一个对象（`worker`）。为了将数据存入\
    \ `worker` 对象，代码指定了对象名称（`worker`）和属性名称，并为其赋值。\n\n第二个类示例使用初始化器来定义属性值。`init` 方法按顺序接受三块数据：一个字符串、一个整数和一个十进制（`Double`）值。\n\
    \n要从这第二个类（`secondClass`）创建一个对象（`consultant`），括号内需要包含正确顺序、正确数量的数据，以及正确的数据类型，此外还需要显示一个标签来标识数据的含义，如图\
    \ 11-1 所示。\n\n![A978-1-4842-1233-2_11_Fig1_HTML.jpg](img/A978-1-4842-1233-2_11_Fig1_HTML.jpg)\n\
    \n*图 11-1. 创建类文件并访问属性*\n\n### 对象中的计算属性\n\n除了为属性定义固定值之外，您还可以使用计算属性，其中一个属性的初始值取决于另一个属性的值。创建计算属性的最简单方法是定义一个属性名称、数据类型，然后在花括号中编写计算值的代码。最后，使用\
    \ `return` 关键字定义要存储在属性中的值，如下所示：\n\n```\nclass shape {\n    var height : Int =\
    \ 5\n    var width : Int {\n      return height * 2\n    }\n}\n\nvar rectangle\
    \ = shape()\nprint (rectangle.height)\nprint (rectangle.width)\n```\n\n这个计算属性只是获取存储在\
    \ `height` 属性中的值，将其乘以 2，然后将结果存储在 `width` 属性中。当您基于 `shape` 类创建对象时，初始值 5 会被存储在 `height`\
    \ 属性中，然后计算属性将 `height` 值（5）乘以 2 得到 10，并将其存储在 `width` 属性中，如图 11-2 所示。\n\n![A978-1-4842-1233-2_11_Fig2_HTML.jpg](img/A978-1-4842-1233-2_11_Fig2_HTML.jpg)\n\
    \n*图 11-2. 使用计算属性来确定属性的初始值*\n\n在这个计算属性的例子中，一个属性（`width`）的值依赖于另一个属性（`height`）的值来确定其自身的值。用技术术语来说，这被称为\
    \ getter（获取方法）。\n"
- fmt: "### Setting Other Properties\n\nAnother option is to use what’s called a setter.\
    \ With a setter, defining one property sets the value of another property. Since\
    \ getters and setters are so similar, they’re often used within the same property.\
    \ That way one property uses a getter to calculate its value from another property,\
    \ then if you set that property with a value, it can change another property.\
    \ Defining getters and setters looks like this:\n\n```\nclass blob {\n    var\
    \ property1 : dataType = value\n    var property2 : dataType {\n        get {\n\
    \            return valueHere\n        }\n        set {\n            property1\
    \ = valueHere\n        }\n    }\n}\n```\n\nIn the getter, you always need a `return`\
    \ keyword to return a value to the property that has the getter. In the setter,\
    \ you must assign a property to a value. This value can be a fixed value or a\
    \ calculation that returns a value.\n\n**Note:** You don’t need both a getter\
    \ and a setter. You can just have a getter, which you can shorten by eliminating\
    \ the `get` keyword and just enclose code in curly brackets as in the class shape\
    \ example in the beginning of this section. You can also have just a setter, but\
    \ you’ll need to use the `set` keyword.\n\nIn the above example, every time `property2`\
    \ gets assigned a new value, it uses its setter to define a new value for `property1`.\n\
    \nA setter can also accept a value and use that value to calculate a new result\
    \ for a different property. To accept a value for a setter, you just need to create\
    \ a variable enclosed in parentheses and use that value to calculate a result\
    \ for another property. If you don’t create a variable enclosed in parentheses,\
    \ you can just use the default parameter name of `newValue`. The following example\
    \ shows how to use a setter:\n\n```\nclass blob {\n    var property1 : dataType\
    \ = value\n    var property2 : dataType {\n        get {\n            return valueHere\n\
    \        }\n        set (newValue) {\n            property1 = valueHere based\
    \ on newValue\n        }\n    }\n}\n```\n\nTo see how getters and setters work,\
    \ follow these steps:\n\nMake sure your `ClassPlayground` file is loaded into\
    \ Xcode. Edit the code as follows:\n\n```\nimport Cocoa\n\nclass shape {\n   \
    \ var height : Int = 5\n    var width : Int {\n        return height * 2\n   \
    \ }\n}\n\nvar rectangle = shape()\nprint (rectangle.height)\nprint (rectangle.width)\n\
    \nrectangle.height = 20\nprint (rectangle.width)\n\nclass blob {\n    var height\
    \ : Int = 5\n    var width : Int = 10\n    var area : Int {\n        get {\n \
    \           return height * width\n        }\n        set {\n            height\
    \ = 24\n            width = 45\n        }\n    }\n}\n\nvar cat = blob()\ncat.area\n\
    cat.area = 129\n\nclass anotherBlob {\n    var height : Int = 5\n    var width\
    \ : Int = 10\n    var area : Int {\n        get {\n            return height *\
    \ width\n        }\n        set (newValue) {\n            height = newValue +\
    \ 10\n            width = newValue - 5\n        }\n    }\n}\n\nvar CEO = anotherBlob()\n\
    print (CEO.area)\nCEO.area = 247\nprint (CEO.height)\nprint (CEO.width)\n```\n\
    \nYou can think of a getter and setter as a function that changes other properties.\
    \ Be careful when using getters and setters, though, since they could cause unexpected\
    \ behavior if you aren’t aware of their existence or how they work. Figure 11-3\
    \ shows the result of the above code so you can see how the getters and setters\
    \ affect properties.\n\n![A978-1-4842-1233-2_11_Fig3_HTML.jpg](A978-1-4842-1233-2_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3.** Using getters and setters to modify properties\n\n### Using\
    \ Property Observers\n\nSwift provides two property observers called `willSet`\
    \ and `didSet`. The `willSet` property observer runs code before a property receives\
    \ a value. The `didSet` property observer runs code after a property receives\
    \ a value.\n\nLike getters and setters, property observers essentially are functions\
    \ that run when a property gets a new value. The basic structure for a `willSet`\
    \ and `didSet` property observer is identical to the structure for a getter and\
    \ setter like this:\n\n```\nvar property : dataType = initialValue {\n    willSet\
    \ {\n    }\n    didSet {\n    }\n}\n```\n\nThe `willSet` property observer runs\
    \ code before the property gets a new value. The `didSet` property observer runs\
    \ code after the property gets a new value. To see how property observers work,\
    \ follow these steps:\n\nMake sure your `ClassPlayground` file is loaded into\
    \ Xcode. Edit the code as follows:\n\n```\nimport Cocoa\n\nclass animal {\n  \
    \  var IQ : Int = 0\n    var legs : Int = 0 {\n        willSet {\n           \
    \ IQ += 10\n        }\n        didSet {\n            IQ -= 5\n        }\n    }\n\
    }\n\nvar pet = animal()\nprint (pet.IQ)\npet.legs = 4\nprint (pet.IQ)\n```\n\n\
    In this example, the `IQ` property has an initial value of 0. Notice that when\
    \ you set the `legs` property to 4, it immediately runs the `willSet` property\
    \ observer code, which increases the `IQ` property by 10. Then it immediately\
    \ runs the code in the `didSet` property observer, which subtracts 3 as shown\
    \ in Figure 11-4.\n\n![A978-1-4842-1233-2_11_Fig4_HTML.jpg](A978-1-4842-1233-2_11_Fig4_HTML.jpg)\n\
    \n**Figure 11-4.** Using property observers"
