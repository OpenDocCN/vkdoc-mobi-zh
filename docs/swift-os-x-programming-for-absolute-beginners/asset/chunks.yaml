    # 10. 元组、集合与结构体


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​10](http://dx.doi.org/10.1007/978-1-4842-1233-2_10))
    包含补充材料，仅供授权用户使用。


    变量适合存储单个数据块，而数组和字典则适合存储同一数据类型的列表。为了提供更大的灵活性，Swift 还提供了另外两种数据结构，称为**元组**和**集合**。


    元组允许你将相关数据（可能包含不同的数据类型，例如表示人名的字符串和表示员工 ID 的整数）存储在一个地方。集合与数组或字典类似，允许你存储两个或更多由相同数据类型（例如字符串或整数）组成的数据块。


    为了将相关数据组合在一起，Swift 还提供了结构体。通过结构体，你可以自由定义要组合在一起的数据类型，例如两个字符串和一个浮点值。结构体是将不同数据类型组合在一起的一种方式。


    元组和结构体最大的优势或许在于将它们与其他数据结构结合使用时。与其创建一个整数数组，不如创建一个元组数组或结构体数组。这为你提供了灵活性，既可以将不同的数据类型存储在一起，也可以存储相似数据的多个副本。


    ## 使用元组


    假设你想要存储某人的姓名和年龄。你可以创建两个独立的变量，如下所示：


    ```

    var name : String

    var age : Int

    name = "Janice Parker"

    age = 47

    ```


    创建两个或多个独立的变量来存储相关数据可能会很麻烦，因为这两个变量之间没有任何联系来表明它们的关系。为了解决这个问题，Swift 提供了一种独特的数据结构，称为**元组**。


    元组可以将两个或多个数据块存储在一个变量中，这些单独的数据块甚至可以完全不同，例如字符串和整数。声明元组就像声明变量一样。主要区别在于，你无需定义单一数据类型，而是可以在括号内定义多种数据类型，如下所示：


    `var tupleName : (DataType1, DataType2)`


    就像声明变量一样，你必须为元组声明一个唯一的名称。然后，你需要定义要容纳多少个不同的数据块以及它们的数据类型。元组可以容纳两个或更多数据块，但元组容纳的数据越多，理解和检索数据就可能越笨拙。


    创建元组的一种方法是声明元组名称及其可以容纳的数据类型。所列出的数据类型数量也定义了该元组可以存储的数据块数量。因此，如果你想在元组中存储一个字符串和一个整数，可以使用以下
    Swift 代码：


    `var person : (String, Int)`


    然后，你可以像这样将数据存储到该元组中：


    `person = ("Janice Parker", 47)`


    向元组赋值时，请确保数据块既具有正确的数据类型，又有正确的数量。因此，下面的代码会失败，因为 `person` 元组期望先是一个字符串，然后是一个整数，而不是先整数后字符串：


    `person = (47, "Janice Parker") // 这将会失败`


    定义元组的第二种方法是简单地为其提供数据，并让 Swift 推断数据类型，例如：


    `var person = ("Janice Parker", 47)`


    如果你通过列出其数据类型来定义元组，或者让 Swift 根据你存储的数据类型来推断数据类型，那么每个数据块代表什么并不总是很清楚。为了更容易识别不同的数据块，Swift
    还允许你命名你的数据类型，例如：


    `var person : (name: String, age: Int)`


    或者，如果你想通过直接将数据赋给元组来让 Swift 推断数据类型：


    `var person = (name: "Janice Parker", age: 47)`


    命名元组有助于阐明每个数据块代表什么。在这种情况下，字符串代表姓名，整数代表年龄。

    '
- fmt: "### Accessing Data in a Tuple\n\nOnce you’ve created a tuple and stored data\
    \ in it, you’ll need to retrieve that data eventually. Since a tuple contains\
    \ two or more chunks of data, Swift offers three ways to retrieve the data you\
    \ want.\n\nFirst, you can create multiple variables to access the tuple data as\
    \ follows:\n\n```\nvar petInfo = (\"Rover\", 38, true)\nvar (dog, number, yesValue)\
    \ = petInfo\nprint (dog)\nprint (number)\nprint (yesValue)\n```\n\nIn the first\
    \ line of code, `petInfo` is a tuple that contains three chunks of data: a string\
    \ (`\"Rover\"`), an integer (`38`), and a Boolean value (`true`).\n\nThe second\
    \ line of code creates three variables (`dog`, `number`, `yesValue`) and assigns\
    \ their values to the corresponding data stored in the `petInfo` tuple. That means\
    \ `dog` stores `\"Rover\"`, `number` stores `38`, and `yesValue` stores `true`.\
    \ The `print` commands simply print this data out to verify that it retrieved\
    \ information from the tuple.\n\nTo access data from a tuple, you must know the\
    \ order that the tuple stores data. So if you wanted to retrieve a string from\
    \ the `petInfo` tuple, you’d have to know that the `petInfo` tuple stores names\
    \ as its first chunk of data, a number as its second chunk of data, and a Boolean\
    \ value as its third chunk of data.\n\nIf you don’t want to retrieve all the values\
    \ stored in a tuple, you can just create a variable to store the data you want\
    \ and use the underscore character (`_`) as an empty placeholder to represent\
    \ each additional value in the tuple that you want to ignore.\n\nThat means you\
    \ still need to know the number of data chunks the tuple holds so you can identify\
    \ the one chunk of data that you want to retrieve. For example, if a tuple contains\
    \ three items, you can retrieve the first item like this:\n\n```\nvar petInfo\
    \ = (\"Rover\", 38, true)\nvar (pet,_,_) = petInfo\nprint (pet)\n```\n\nThis would\
    \ store `\"Rover\"` in the `pet` variable so the `print` command would print `\"\
    Rover.\"`.\n\nIf you just wanted to retrieve the middle value, you could type\
    \ the following:\n\n```\nvar petInfo = (\"Rover\", 38, true)\nvar (_,aValue,_)\
    \ = petInfo\nprint (aValue)\n```\n\nThis would store the number `38` into the\
    \ `aValue` variable and then the `print` command would print `38`.\n\nThe underscore\
    \ characters act as placeholders that identify data in a tuple that you want to\
    \ ignore. If you omit the underscore characters, Swift won’t know which particular\
    \ data you want out of a tuple. To retrieve data from a tuple, you must know the\
    \ number and order of the items that the tuple stores.\n\nA second way to retrieve\
    \ values from a tuple is to use index numbers where the first element is assigned\
    \ index number `0`, the second element is assigned index number `1`, and so on.\
    \ For example, you might store data in a tuple like this:\n\n```\nvar petInfo\
    \ = (\"Rover\", 38, true)\nprint (petInfo.0)\nprint (petInfo.1)\nprint (petInfo.2)\n\
    ```\n\nThe first item in the tuple is assigned index number `0` so the combination\
    \ of the tuple name (such as `petInfo`) followed by the index number lets you\
    \ directly retrieve a specific tuple value. So `petInfo.0` retrieves `\"Rover\"\
    `, `petInfo.1` retrieves `38`, and `petInfo.2` retrieves `true`.\n\nA third method\
    \ for accessing data in a tuple involves using names. To use this method, you\
    \ must first assign names to each tuple data. For example, the following Swift\
    \ code defines two names called `\"name\"` and `\"age\"`:\n\n```\nvar tupleName\
    \ = (name: \"Bridget\", age: 31)\n```\n\nNow you can access the tuple data by\
    \ referencing the tuple name followed by the identifying name for each data like\
    \ this:\n\n```\nprint (tupleName.name)  // Prints \"Bridget\"\nprint (tupleName.age)\
    \   // Prints 31\n```\n\nAll three methods give you different ways to access data\
    \ stored in tuples so just use the method you like best. For clarity, naming the\
    \ specific elements of a tuple makes your code easier to understand but at the\
    \ sacrifice of forcing you to name your tuple data. The index number method and\
    \ the multiple variable method may be simpler, but can be less clear and requires\
    \ you to know the exact order of the data you want to retrieve.\n\nTo see how\
    \ to work with tuples, create a new playground by following these steps:\n\nStart\
    \ Xcode. Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,\
    \ you can also click on Get started with a playground.) Xcode asks for a playground\
    \ name and platform. Click in the Name text field and type `TuplePlayground`.\
    \ Click in the Platform pop-up menu and choose OS X. Xcode asks where you want\
    \ to save your playground file. Click on a folder where you want to save your\
    \ playground file and click the Create button. Xcode displays the playground file.\
    \ Edit the code as follows: \n\n```\nimport Cocoa\nvar tupleName = (greeting:\
    \ \"Happy Birthday\", age: 58, happy: true)\n// Method #1\nvar (message, howOld,\
    \ mood) = tupleName\nprint (message)\nprint (howOld)\nprint (mood)\nvar (_,stuff,_)\
    \ = tupleName\nprint (stuff)\n// Method #2\nprint (tupleName.0)\nprint (tupleName.1)\n\
    print (tupleName.2)\n// Method #3\nprint (tupleName.greeting)\nprint (tupleName.age)\n\
    print (tupleName.happy)\n```\n\nWhen you try all three methods for accessing values\
    \ from a tuple, you can see how they all work alike. Tuples make it easy to group\
    \ related data together in a single variable so you can easily keep related information\
    \ organized. Then you can choose to retrieve data from a tuple using one of three\
    \ different methods as shown in Figure [10-1](#A978-1-4842-1233-2_10_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1233-2_10_Fig1_HTML.jpg](A978-1-4842-1233-2_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1. Three different ways to retrieve data from a tuple\n\n## Using\
    \ Sets\n\nArrays and dictionaries are designed to store lists of the same data\
    \ types such as a list of strings or a list of integers. The difference between\
    \ arrays and dictionaries is how you retrieve data. Arrays force you to retrieve\
    \ data by location using index values. Dictionaries let you retrieve data using\
    \ a key, but you must define a unique key for each chunk of data you store.\n\n\
    Sets represent another way to store lists of identical data types such as strings\
    \ or floating-point numbers. One speed advantage of a set is determining if something\
    \ is stored or not. If you store data in an array, you’d have to exhaustively\
    \ search throughout the entire array to determine if an array stores a particular\
    \ item. If you store data in a dictionary, you have to know the key stored with\
    \ that value, or you have to exhaustively search through the dictionary’s list\
    \ of values.\n\nSets let you quickly determine the following far faster than arrays\
    \ or dictionaries:\n\n- If an item is stored in a set or not\n- If a set contains\
    \ exactly the same items as another set\n- If a set is a subset of another set\
    \ (contains the same items as a larger set)\n- If a set is a superset of another\
    \ set (contains the same items and more than a smaller set)\n- If two sets contain\
    \ the same items or not\n\nSets make it easy to compare two different groups of\
    \ data in ways that arrays and dictionaries can’t do as easily.\n\n### Creating\
