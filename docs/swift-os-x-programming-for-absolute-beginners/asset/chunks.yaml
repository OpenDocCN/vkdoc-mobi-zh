    This lets you group related files together and tuck them out of sight so they
    don’t clutter the Project Navigator. To create a folder, click on a file or folder
    in the Project Navigator and then choose one of the following:


    *   Choose File ➤ New ➤ Group (or Group from Selection to store one or more selected
    files in a folder)

    *   Press Option+Command+N

    *   Right-click on any file or folder in the Project Navigator, and when a pop-up
    menu appears, choose New Group (or New Group from Selection to store one or more
    selected files in a folder)


    To delete a file or folder, select a file or folder and then choose one of the
    following:


    *   Choose Edit ➤ Delete

    *   Press the Delete key or Command+Backspace

    *   Right-click on any file or folder in the Project Navigator, and when a pop-up
    menu appears, choose Delete


    Note


    When you delete a file or folder, you’ll have the option of Remove Reference (which
    removes a file/folder from a project but does not physically delete it from your
    Macintosh) or Move to Trash (which removes a file/folder from a project and physically
    deletes it from your Macintosh).


    Perhaps the most important use for the Project Navigator is to let you edit a
    file in a project. When you click on a file in the Project Navigator, the middle
    pane of the Xcode window displays the contents of your selected file, which will
    either hold Swift code or your user interface as shown in Figure [2-14](#A978-1-4842-1233-2_2_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_2_Fig14_HTML.jpg](A978-1-4842-1233-2_2_Fig14_HTML.jpg)


    Figure 2-14.


    Selecting a file in the Navigator pane displays the contents of that file'
  trans: "\n# 创建与管理文件\n\n每当需要创建项目（代表全新的程序）或文件（添加到现有项目）时，你有三种选择：\n\n*   按下 `Command+N`\n\
    *   选择“文件”➜“新建”以显示如图 2-9 所示的子菜单\n\n![A978-1-4842-1233-2_2_Fig9_HTML.jpg](img/A978-1-4842-1233-2_2_Fig9_HTML.jpg)\n\
    \n图 2-9. “文件”➜“新建”命令会显示一个子菜单，允许你选择创建文件或项目\n\n*   右键点击导航器面板中的任意文件，显示如图 2-10 所示的弹出菜单\n\
    \n![A978-1-4842-1233-2_2_Fig10_HTML.jpg](img/A978-1-4842-1233-2_2_Fig10_HTML.jpg)\n\
    \n图 2-10. 在导航器面板中右键点击文件会显示一个弹出菜单，允许你选择创建文件或项目\n\n> **注意**  \n> 在某些 Macintosh 电脑上右键点击可能被禁用。你可以按住\
    \ `Control` 键的同时点击来模拟右键点击。若要启用右键点击，点击苹果菜单，选择“系统偏好设置”，然后点击“鼠标”或“触控板”图标。接着选中“辅助点击”复选框以开启右键点击功能。\n\
    \n创建新文件时，你可以选择为 OS X 项目还是 iOS 项目创建文件。就本书而言，你始终为 OS X 创建文件。\n\n除了选择为 OS X 创建文件，你还需要选择要创建的文件类型。最常见的两种文件类型是：存放\
    \ Swift 代码的文件（归类在“源”类别下，如图 2-11 所示），或存放用户界面的文件（归类在“用户界面”类别下，如图 2-12 所示）。\n\n![A978-1-4842-1233-2_2_Fig12_HTML.jpg](img/A978-1-4842-1233-2_2_Fig12_HTML.jpg)\n\
    \n图 2-12. 你可以创建的第二种文件类型用于存放程序用户界面的部分\n\n![A978-1-4842-1233-2_2_Fig11_HTML.jpg](img/A978-1-4842-1233-2_2_Fig11_HTML.jpg)\n\
    \n图 2-11. 你可以创建的一种文件类型用于存放 Swift 代码\n\n创建文件后，该文件会出现在项目导航器中。导航器面板实际上可以显示多种不同类型的信息，但最常见的是项目导航器，它列出了构成项目的所有文件。要在导航器面板中打开项目导航器，你有三种选择：\n\
    \n*   选择“视图”➜“导航器”➜“显示项目导航器”\n*   按下 `Command+1`\n*   点击“显示项目导航器”图标，如图 2-13 所示\n\
    \n![A978-1-4842-1233-2_2_Fig13_HTML.jpg](img/A978-1-4842-1233-2_2_Fig13_HTML.jpg)\n\
    \n图 2-13. 项目导航器面板列出了构成项目的所有文件\n\n项目导航器与 Finder 非常相似，可以显示文件和文件夹。要重命名文件或文件夹，只需选中它并按下\
    \ `Return` 键即可编辑其名称。\n\n要移动文件或文件夹，只需用鼠标将其拖拽到新位置即可。\n\n要选择多个项目，请按住 `Command` 键并点击文件或文件夹。\n\
    \n与 Finder 一样，项目导航器允许你将文件整理到文件夹中。这样你可以将相关文件分组存放，并将其收起来，避免项目导航器显得杂乱。要创建文件夹，请点击项目导航器中的一个文件或文件夹，然后选择以下任一方式：\n\
    \n*   选择“文件”➜“新建”➜“组”（或“从选中项新建组”以将选中的一个或多个文件存入文件夹）\n*   按下 `Option+Command+N`\n\
    *   右键点击项目导航器中的任意文件或文件夹，在弹出的菜单中选择“新建组”（或“从选中项新建组”以将选中的一个或多个文件存入文件夹）\n\n要删除文件或文件夹，请选中它，然后选择以下任一方式：\n\
    \n*   选择“编辑”➜“删除”\n*   按下 `Delete` 键或 `Command+Backspace`\n*   右键点击项目导航器中的任意文件或文件夹，在弹出的菜单中选择“删除”\n\
    \n> **注意**  \n> 删除文件或文件夹时，你可以选择“移除引用”（将文件/文件夹从项目中移除，但不会从 Macintosh 上物理删除）或“移到废纸篓”（将文件/文件夹从项目中移除，并从\
    \ Macintosh 上物理删除）。\n\n项目导航器最重要的用途或许就是让你能够编辑项目中的文件。当你点击项目导航器中的某个文件时，Xcode 窗口的中间面板会显示所选文件的内容，这些内容要么是\
    \ Swift 代码，要么是用户界面，如图 2-14 所示。\n\n![A978-1-4842-1233-2_2_Fig14_HTML.jpg](img/A978-1-4842-1233-2_2_Fig14_HTML.jpg)\n\
    \n图 2-14. 在导航器面板中选择一个文件会显示该文件的内容\n"
- fmt: '# Creating and Customizing a User Interface


    The `Utilities` pane is most often used for creating and customizing your project''s
    user interface. With OS X programs, user interface files may be one of two types:


    - `.xib` files

    - `.storyboard` files


    When you create a project, you can choose which type you want to use. In general,
    `.xib` files are used for single window user interfaces while `.storyboard` files
    are used for multiple windows that are linked to appear in a certain order. It''s
    possible to mix both `.xib` and `.storyboard` files to create a user interface
    or just use `.xib` or `.storyboard` files exclusively.


    Whether you use `.xib` or `.storyboard` files, you''ll need to use the `Utilities`
    pane for two purposes. First, you''ll need to drag and drop items onto your user
    interface such as buttons, text fields, and pictures. Second, you''ll need to
    customize those user interface items by changing their names, color, or size.


    To design a user interface, you start with the `Object Library`, which appears
    at the bottom of the `Utilities` pane as shown in Figure [2-15](#A978-1-4842-1233-2_2_Chapter.html#Fig15).
    To open the `Object Library`, you can do the following:


    ![A978-1-4842-1233-2_2_Fig15_HTML.jpg](A978-1-4842-1233-2_2_Fig15_HTML.jpg)


    Figure 2-15. The Object Library contains different user interface items


    - Choose View ➤ Utilities ➤ Show Object Library

    - Press Control+Option+Command+3

    - Click the Show Object Library icon


    To find a user interface item in the `Object Library`, you can simply scroll up
    and down the list. However, if you know the name of the item you want, a faster
    method is to click in the `Search` field at the bottom of the `Object Library`
    window, type all or part of the name of the item you want, and press `Return`.
    The `Object Library` will then show only those items that match what you typed.
    So if you typed "Button", then the `Object Library` would only display different
    buttons you can add to your user interface.


    After you have placed one or more items on your user interface, the second step
    is to customize those items using the `Inspector` pane. The `Inspector` pane can
    display several types of panes but the two most common you''ll use to customize
    user interface items are the:


    - Attributes Inspector

    - Size Inspector


    The `Attributes Inspector` lets you modify the appearance of an item. The `Size
    Inspector` lets you modify the size and position of an item on the user interface.


    To open the `Attributes Inspector`, you can do one of the following:


    - Choose View ➤ Utilities ➤ Show Attributes Inspector

    - Press Option+Command+4

    - Click the Show Attributes Inspector as shown in Figure [2-16](#A978-1-4842-1233-2_2_Chapter.html#Fig16)


    ![A978-1-4842-1233-2_2_Fig16_HTML.jpg](A978-1-4842-1233-2_2_Fig16_HTML.jpg)


    Figure 2-16. The Show Attributes Inspector and Show Size Inspector icons.


    To open the `Size Inspector`, you can do one of the following:


    - Choose View ➤ Utilities ➤ Show Size Inspector

    - Press Option+Command+5

    - Click the Show Size Inspector as shown in Figure [2-16](#A978-1-4842-1233-2_2_Chapter.html#Fig16)


    After opening the `Attributes` or `Size Inspectors`, you can then click on a user
    interface item to modify (such as a button or text field) and then type or choose
    different options to modify that item''s appearance.


    # The Standard and Assistant Editors


    You''ll spend most of your time using the editor or Interface Builder. The editor
    acts like a word processor and lets you type and edit Swift code. Interface Builder
    acts like a drawing program and lets you drag and drop, resize, and move items
    on the user interface such as buttons, text fields, and graphics.


    To edit Swift code, just click on any file in the `Project Navigator` pane that
    contains the `.swift` file extension. When you click on a `.swift` file, the contents
    of that file appears in the middle Xcode pane as shown in Figure [2-17](#A978-1-4842-1233-2_2_Chapter.html#Fig17).


    ![A978-1-4842-1233-2_2_Fig17_HTML.jpg](A978-1-4842-1233-2_2_Fig17_HTML.jpg)


    Figure 2-17. Clicking on a `.swift` file displays the Swift code stored in that
    file


    To edit your user interface, just click on any file in the `Project Navigator`
    pane that contains the `.xib` or `.storyboard` file extension. This displays the
    contents of that user interface in the middle Xcode pane as shown in Figure [2-18](#A978-1-4842-1233-2_2_Chapter.html#Fig18).


    ![A978-1-4842-1233-2_2_Fig18_HTML.jpg](A978-1-4842-1233-2_2_Fig18_HTML.jpg)


    Figure 2-18. Clicking on a `.xib` or `.storyboard` file displays the user interface
    stored in that file


    Each time you click on a different file in the `Project Navigator` pane, Xcode
    displays the contents of that new file in the middle pane of the Xcode window.


    When Xcode displays the contents of a single file in its middle pane, that''s
    called the `Standard Editor`. However, it''s often useful to view the contents
    of two files side by side. When Xcode displays two file contents side by side,
    that second file pane is called the `Assistant Editor`.


    The most common reason to open the `Assistant Editor` is when you have the user
    interface displayed in the left pane and a Swift file displayed in the right pane
    as shown in Figure [2-19](#A978-1-4842-1233-2_2_Chapter.html#Fig19). The purpose
    for this is to let you link your user interface to your Swift code.


    ![A978-1-4842-1233-2_2_Fig19_HTML.jpg](A978-1-4842-1233-2_2_Fig19_HTML.jpg)


    Figure 2-19. The Assistant Editor displays two file contents side by side


    When you create a user interface, it''s completely independent from your Swift
    code (and vice versa). That gives you the freedom to replace your user interface
    with a new user interface without affecting how your Swift code behaves. Likewise,
    this also lets you modify your Swift code without worrying about affecting your
    user interface.


    In the old days, programmers had to create their user interfaces using code, which
    meant changing your code often affected your user interface, increasing the chance
    of errors or bugs in your program. By separating the user interface from your
    code, Xcode eliminates this problem and helps you create more reliable software.


    Initially when you create a user interface, it won''t do anything. That''s why
    you need to link some of your user interface items to Swift code that makes the
    user interface actually work. For example, if your user interface displays a button,
    clicking on that button won''t do anything. You have to write Swift code to tell
    that button what to do. Then you have to link your button to your Swift code.


    That''s the purpose of the `Assistant Editor`. By displaying your user interface
    next to your Swift code file, the `Assistant Editor` makes it easy to drag the
    mouse from your user interface to your Swift code files, creating a link between
    your user interface and your Swift code.


    To open the `Assistant Editor`, you can choose one of the following:


    - Choose View ➤ Assistant Editor ➤ Show Assistant Editor

    - Press Option+Command+Return

    - Click the Assistant Editor icon as shown in Figure [2-20](#A978-1-4842-1233-2_2_Chapter.html#Fig20)


    ![A978-1-4842-1233-2_2_Fig20_HTML.jpg](A978-1-4842-1233-2_2_Fig20_HTML.jpg)


    Figure 2-20. The Standard and Assistant Editor icons


    To close the `Assistant Editor`, you have to open the `Standard Editor` in one
    of the following ways:'
