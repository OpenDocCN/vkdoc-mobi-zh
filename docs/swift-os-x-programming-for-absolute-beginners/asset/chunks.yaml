- fmt: "## Creating User Interface Files\n\nWhen you create a project, `Xcode` gives\
    \ you a choice between using storyboards or not as shown in Figure [14-1](#A978-1-4842-1233-2_14_Chapter.html#Fig1).\
    \ If you choose not to use storyboards, then `Xcode` will create and store your\
    \ user interface in an `.xib` file. If you choose to use storyboards, then `Xcode`\
    \ will store your user interface in a `.storyboard` file.\n\n![A978-1-4842-1233-2_14_Fig1_HTML.jpg](A978-1-4842-1233-2_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1.\n\nWhen creating an OS X project, `Xcode` gives you a choice of\
    \ choosing storyboards or not\n\nAfter you’ve created a project, you can always\
    \ add additional `.xib` or `.storyboard` files no matter if you initially started\
    \ with storyboards or not.\n\n### Adding an `.xib` or `.storyboard` File\n\nTo\
    \ add an `.xib` or `.storyboard` file to a project, follow these steps:\n\nClick\
    \ the **Next** button. `Xcode` asks where you want to store the project.  \nChoose\
    \ a folder to store your project and click the **Create** button. Your `.xib`\
    \ or `.storyboard` user interface file appears in the **Project Navigator** pane.\
    \  \nFrom within `Xcode` choose `File` ➤ `New` ➤ `File`.  \nClick **User Interface**\
    \ under the **OS X** category.  \nClick on **Window (`.xib`)** or **Storyboard\
    \ (`.storyboard`)** as shown in Figure [14-2](#A978-1-4842-1233-2_14_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1233-2_14_Fig2_HTML.jpg](A978-1-4842-1233-2_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2.\n\nAdding an `.xib` or `.storyboard` file to a project\n\nIf you\
    \ create an `.xib` file using the above steps, you may still need to create a\
    \ Swift file called a view controller to manage the view. To create a view controller\
    \ Swift file and an `.xib` file at the same time, follow these steps:\n\nClick\
    \ the **Next** button. `Xcode` asks where you want to store your new file.  \n\
    Click the **Create** button. `Xcode` creates an `.xib` and accompanying `.swift`\
    \ file in the **Project Navigator** pane.  \nClick the **Next** button. `Xcode`\
    \ now asks for a class name, subclass, and whether you want to create an accompanying\
    \ `.xib` file.  \nType any name in the **Name** text field.  \nClick in the **Subclass\
    \ of:** pop-up menu and choose `NSViewController`.  \nSelect the “**Also create\
    \ XIB file for user interface**” check box and make sure the **Language** pop-up\
    \ menu displays `Swift` as shown in Figure [14-4](#A978-1-4842-1233-2_14_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1233-2_14_Fig4_HTML.jpg](A978-1-4842-1233-2_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4.\n\nDefining a class name, subclass, and `.xib` file  \nFrom within\
    \ `Xcode` choose `File` ➤ `New` ➤ `File`.  \nClick **Source** under the **OS X**\
    \ category and click **Cocoa Class** as shown in Figure [14-3](#A978-1-4842-1233-2_14_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1233-2_14_Fig3_HTML.jpg](A978-1-4842-1233-2_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3.\n\nChoosing **Cocoa Class** under the **Source** category\n\n##\
    \ Defining the Main User Interface\n\nIf your project only consists of a single\
    \ `.xib` or `.storyboard` file, `Xcode` uses that one file as your program’s main\
    \ user interface. However, if you have multiple user interface files (such as\
    \ two `.xib` or `.storyboard` files, or a combination of both `.xib` and `.storyboard`\
    \ files), you need to define which file should be your main user interface.\n\n\
    To define a main user interface file, follow these steps:\n\nClick on the `.xib`\
    \ or `.storyboard` file in the **Project Navigator** pane that you chose in step\
    \ 2 so you can edit your main user interface.  \nClick on the project name in\
    \ the top of the **Project Navigator** pane. `Xcode` displays a list of settings\
    \ you can define for your project.  \nClick the **Main Interface** pop-up menu\
    \ and choose the user interface file (`.xib` or `.storyboard`) that you want to\
    \ use as shown in Figure [14-5](#A978-1-4842-1233-2_14_Chapter.html#Fig5).\n\n\
    ![A978-1-4842-1233-2_14_Fig5_HTML.jpg](A978-1-4842-1233-2_14_Fig5_HTML.jpg)\n\n\
    Figure 14-5.\n\nChoosing the main user interface for your project\n\n## Displaying\
    \ Multiple `.xib` Files\n\nIf you have multiple `.xib` files in a project, you\
    \ need to designate one `.xib` file as your main user interface. That means the\
    \ other `.xib` files won’t be visible until you specifically make them appear.\
    \ To open one `.xib` file from another one, there are three steps you need to\
    \ take:\n\n- Create a view controller and `.xib` file\n- Create an object to represent\
    \ your view controller\n- Use the `showWindow` and `close` commands to open the\
    \ `.xib` file and close it afterwards\n\nTo see how to open and close an `.xib`\
    \ file, follow these steps:\n\nChoose `View` ➤ `Utilities` ➤ `Show Object Library`.\
    \ The **Object Library** appears in the bottom right corner of the `Xcode` window.\
    \  \nDrag a **Push Button** on the window of your user interface and change its\
    \ label to read “**Open Window**.”  \nFrom within `Xcode` choose `File` ➤ `New`\
    \ ➤ `Project`.  \nClick **Application** under the **OS X** category.  \nClick\
    \ **Cocoa Application** and click the **Next** button. `Xcode` now asks for a\
    \ product name.  \nClick in the **Product Name** text field and type `XIBProgram`.\
    \  \nMake sure the **Language** pop-up menu displays `Swift` and that no check\
    \ boxes are selected.  \nClick the **Next** button. `Xcode` asks where you want\
    \ to store the project.  \nChoose a folder to store your project and click the\
    \ **Create** button.  \nClick the `MainMenu.xib` file in the **Project Navigator**.\
    \ Your program’s user interface appears.  \nClick the `XIBProgram` icon to display\
    \ the window of your program’s user interface.  \nChoose `View` ➤ `Utilities`\
    \ ➤ `Show Attributes Inspector`. The **Attributes Inspector** pane appears as\
    \ shown in Figure [14-6](#A978-1-4842-1233-2_14_Chapter.html#Fig6). The **Attributes\
    \ Inspector** gives you options for modifying the appearance of each window of\
    \ your user interface. For now, don’t change anything.\n\n![A978-1-4842-1233-2_14_Fig6_HTML.jpg](A978-1-4842-1233-2_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6.\n\nThe **Attributes Inspector** pane lets you modify the appearance\
    \ of a window\n\nAt this point, your program consists of a `MainMenu.xib` file\
    \ that displays a single window with a push button on it. Now we need to create\
    \ a view controller (containing Swift code) and an accompanying `.xib` file by\
    \ following these steps:\n\nClick the **Next** button. `Xcode` asks where you\
    \ want to store your file.  \nClick the **Create** button. `Xcode` displays a\
    \ `secondView.swift` and a `secondView.xib` file in the **Project Navigator**\
    \ pane.  \nChoose `File` ➤ `New` ➤ `File`. A template dialog appears.  \nChoose\
    \ **Source** under the **OS X** category and click **Cocoa Class** (see Figure\
    \ [14-3](#A978-1-4842-1233-2_14_Chapter.html#Fig3)). Click the **Next** button.\
    \ Another dialog appears, asking for a class name.  \nType `secondView` in the\
    \ **Class Name** text field.  \nClick in the **Subclass of:** pop-up menu and\
    \ choose `NSWindowController`.  \nSelect the “**Also create XIB file for user\
    \ interface**” check box.  \nMake sure the **Language** pop-up menu displays `Swift`\
    \ as shown in Figure [14-7](#A978-1-4842-1233-2_14_Chapter.html#Fig7).\n\n![A978-1-4842-1233-2_14_Fig7_HTML.jpg](A978-1-4842-1233-2_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7.\n\nDefining the features of a second. `xib` file and its view controller\n\
    \nAt this point, you’ve created a second. `xib` file and an accompanying view\
    \ controller file. Now it’s time to write Swift code to make everything work by\
    \ following these steps:\n\nClick the **Connect** button. `Xcode` creates an empty\
    \ `IBAction` method.  \nUnderneath the `@IBOutlet` line, type the following: \
    \ \nClick in the `MainMenu.xib` file in the **Project Navigator** pane.  \nChoose\
    \ `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`. `Xcode` shows the `AppDelegate.swift`\
    \ file to the right of the `MainMenu.xib` file.  \nMove the mouse pointer over\
    \ the **Open Window** button, hold down the **Control** key and drag the mouse\
    \ above the last curly bracket in the `AppDelegate.swift` file.  \nRelease the\
    \ **Control** key and the mouse button. A pop-up window appears.  \nClick the\
    \ **Connection** pop-up menu and choose **Action**.  \nClick in the **Name** text\
    \ field and type `openWindow`.  \nClick in the **Type** pop-up menu and choose\
    \ `NSButton` as shown in Figure [14-8](#A978-1-4842-1233-2_14_Chapter.html#Fig8)."
  raw: '## Creating User Interface Files


    When you create a project, Xcode gives you a choice between using storyboards
    or not as shown in Figure [14-1](#A978-1-4842-1233-2_14_Chapter.html#Fig1). If
    you choose not to use storyboards, then Xcode will create and store your user
    interface in an .xib file. If you choose to use storyboards, then Xcode will store
    your user interface in a .storyboard file.


    ![A978-1-4842-1233-2_14_Fig1_HTML.jpg](A978-1-4842-1233-2_14_Fig1_HTML.jpg)


    Figure 14-1.


    When creating an OS X project, Xcode gives you a choice of choosing storyboards
    or not


    After you’ve created a project, you can always add additional .xib or .storyboard
    files no matter if you initially started with storyboards or not.


    ### Adding an .xib or .storyboard File


    To add an .xib or .storyboard file to a project, follow these steps:


    Click the Next button. Xcode asks where you want to store the project.   Choose
    a folder to store your project and click the Create button. Your .xib or .storyboard
    user interface file appears in the Project Navigator pane.   From within Xcode
    choose File ➤ New ➤ File.   Click User Interface under the OS X category.   Click
    on Window (.xib) or Storyboard (.storyboard) as shown in Figure [14-2](#A978-1-4842-1233-2_14_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_14_Fig2_HTML.jpg](A978-1-4842-1233-2_14_Fig2_HTML.jpg)


    Figure 14-2.


    Adding an .xib or .storyboard file to a project  


    If you create an .xib file using the above steps, you may still need to create
    a Swift file called a view controller to manage the view. To create a view controller
    Swift file and an .xib file at the same time, follow these steps:


    Click the Next button. Xcode asks where you want to store your new file.   Click
    the Create button. Xcode creates an .xib and accompanying .swift file in the Project
    Navigator pane.   Click the Next button. Xcode now asks for a class name, subclass,
    and whether you want to create an accompanying .xib file.   Type any name in the
    Name text field.   Click in the Subclass of: pop-up menu and choose NSViewController.
      Select the “Also create XIB file for user interface” check box and make sure
    the Language pop-up menu displays Swift as shown in Figure [14-4](#A978-1-4842-1233-2_14_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_14_Fig4_HTML.jpg](A978-1-4842-1233-2_14_Fig4_HTML.jpg)


    Figure 14-4.


    Defining a class name, subclass, and .xib file   From within Xcode choose File
    ➤ New ➤ File.   Click Source under the OS X category and click Cocoa Class as
    shown in Figure [14-3](#A978-1-4842-1233-2_14_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_14_Fig3_HTML.jpg](A978-1-4842-1233-2_14_Fig3_HTML.jpg)


    Figure 14-3.


    Choosing Cocoa Class under the Source category


    ## Defining the Main User Interface


    If your project only consists of a single .xib or .storyboard file, Xcode uses
    that one file as your program’s main user interface. However, if you have multiple
    user interface files (such as two .xib or .storyboard files, or a combination
    of both .xib and .storyboard files), you need to define which file should be your
    main user interface.


    To define a main user interface file, follow these steps:


    Click on the .xib or .storyboard file in the Project Navigator pane that you chose
    in step 2 so you can edit your main user interface.   Click on the project name
    in the top of the Project Navigator pane. Xcode displays a list of settings you
    can define for your project.   Click the Main Interface pop-up menu and choose
    the user interface file (.xib or .storyboard) that you want to use as shown in
    Figure [14-5](#A978-1-4842-1233-2_14_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_14_Fig5_HTML.jpg](A978-1-4842-1233-2_14_Fig5_HTML.jpg)


    Figure 14-5.


    Choosing the main user interface for your project


    ## Displaying Multiple .xib Files


    If you have multiple .xib files in a project, you need to designate one .xib file
    as your main user interface. That means the other .xib files won’t be visible
    until you specifically make them appear. To open one .xib file from another one,
    there are three steps you need to take:


    *   Create a view controller and .xib file

    *   Create an object to represent your view controller

    *   Use the showWindow and close commands to open the .xib file and close it afterwards


    To see how to open and close an .xib file, follow these steps:


    Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in the
    bottom right corner of the Xcode window.   Drag a Push Button on the window of
    your user interface and change its label to read “Open Window.”   From within
    Xcode choose File ➤ New ➤ Project.   Click Application under the OS X category.
      Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.   Click in the Product Name text field and type XIBProgram.   Make sure
    the Language pop-up menu displays Swift and that no check boxes are selected.
      Click the Next button. Xcode asks where you want to store the project.   Choose
    a folder to store your project and click the Create button.   Click the MainMenu.xib
    file in the Project Navigator. Your program’s user interface appears.   Click
    the XIBProgram icon to display the window of your program’s user interface.  
    Choose View ➤ Utilities ➤ Show Attributes Inspector. The Attributes Inspector
    pane appears as shown in Figure [14-6](#A978-1-4842-1233-2_14_Chapter.html#Fig6).
    The Attributes Inspector gives you options for modifying the appearance of each
    window of your user interface. For now, don’t change anything.


    ![A978-1-4842-1233-2_14_Fig6_HTML.jpg](A978-1-4842-1233-2_14_Fig6_HTML.jpg)


    Figure 14-6.


    The Attributes Inspector pane lets you modify the appearance of a window


    At this point, your program consists of a MainMenu.xib file that displays a single
    window with a push button on it. Now we need to create a view controller (containing
    Swift code) and an accompanying .xib file by following these steps:


    Click the Next button. Xcode asks where you want to store your file.   Click the
    Create button. Xcode displays a secondView.swift and a secondView.xib file in
    the Project Navigator pane.   Choose File ➤ New ➤ File. A template dialog appears.
      Choose Source under the OS X category and click Cocoa Class (see Figure [14-3](#A978-1-4842-1233-2_14_Chapter.html#Fig3)).
    Click the Next button. Another dialog appears, asking for a class name.   Type
    secondView in the Class Name text field.   Click in the Subclass of: pop-up menu
    and choose NSWindowController.   Select the “Also create XIB file for user interface”
    check box.   Make sure the Language pop-up menu displays Swift as shown in Figure
    [14-7](#A978-1-4842-1233-2_14_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_14_Fig7_HTML.jpg](A978-1-4842-1233-2_14_Fig7_HTML.jpg)


    Figure 14-7.


    Defining the features of a second. xib file and its view controller


    At this point, you’ve created a second. xib file and an accompanying view controller
    file. Now it’s time to write Swift code to make everything work by following these
    steps:


    Click the Connect button. Xcode creates an empty IBAction method.   Underneath
    the @IBOutlet line, type the following:   Click in the MainMenu.xib file in the
    Project Navigator pane.   Choose View ➤ Assistant Editor ➤ Show Assistant Editor.
    Xcode shows the AppDelegate.swift file to the right of the MainMenu.xib file.
      Move the mouse pointer over the Open Window button, hold down the Control key
    and drag the mouse above the last curly bracket in the AppDelegate.swift file.
      Release the Control key and the mouse button. A pop-up window appears.   Click
    the Connection pop-up menu and choose Action.   Click in the Name text field and
    type openWindow.   Click in the Type pop-up menu and choose NSButton as shown
    in Figure [14-8](#A978-1-4842-1233-2_14_Chapter.html#Fig8).'
  trans: "\n## 创建用户界面文件\n\n当你创建一个项目时，`Xcode` 会提供选择是否使用故事板的选项，如图 14-1 所示。如果你选择不使用故事板，那么\
    \ `Xcode` 会将你的用户界面创建并存储在一个 `.xib` 文件中。如果你选择使用故事板，那么 `Xcode` 会将你的用户界面存储在一个 `.storyboard`\
    \ 文件中。\n\n![A978-1-4842-1233-2_14_Fig1_HTML.jpg](img/A978-1-4842-1233-2_14_Fig1_HTML.jpg)\n\
    \n图 14-1.\n\n创建 OS X 项目时，`Xcode` 会提供选择是否使用故事板的选项\n\n创建项目后，无论你最初是否选择了故事板，你都可以随时添加额外的\
    \ `.xib` 或 `.storyboard` 文件。\n\n### 添加 `.xib` 或 `.storyboard` 文件\n\n要向项目添加 `.xib`\
    \ 或 `.storyboard` 文件，请按照以下步骤操作：\n\n点击 **下一步** 按钮。`Xcode` 会询问你希望将项目存储在何处。  \n选择一个文件夹来存储你的项目，然后点击\
    \ **创建** 按钮。你的 `.xib` 或 `.storyboard` 用户界面文件会出现在 **项目导航器** 面板中。  \n在 `Xcode` 中，选择\
    \ `File` ➤ `New` ➤ `File`。  \n在 **OS X** 类别下点击 **User Interface**。  \n点击 **Window\
    \ (`.xib`)** 或 **Storyboard (`.storyboard`)**，如图 14-2 所示。\n\n![A978-1-4842-1233-2_14_Fig2_HTML.jpg](img/A978-1-4842-1233-2_14_Fig2_HTML.jpg)\n\
    \n图 14-2.\n\n向项目添加 `.xib` 或 `.storyboard` 文件\n\n如果你使用上述步骤创建了一个 `.xib` 文件，你可能仍然需要创建一个名为视图控制器的\
    \ Swift 文件来管理视图。要同时创建一个视图控制器 Swift 文件和一个 `.xib` 文件，请按照以下步骤操作：\n\n点击 **下一步** 按钮。`Xcode`\
    \ 会询问你希望将新文件存储在何处。  \n点击 **创建** 按钮。`Xcode` 会在 **项目导航器** 面板中创建一个 `.xib` 文件和一个配套的\
    \ `.swift` 文件。  \n点击 **下一步** 按钮。`Xcode` 会询问类名、子类，以及你是否想创建一个配套的 `.xib` 文件。  \n\
    在 **名称** 文本字段中输入任意名称。  \n点击 **Subclass of:** 弹出菜单并选择 `NSViewController`。  \n选中“**Also\
    \ create XIB file for user interface**”复选框，并确保 **语言** 弹出菜单显示为 `Swift`，如图 14-4\
    \ 所示。\n\n![A978-1-4842-1233-2_14_Fig4_HTML.jpg](img/A978-1-4842-1233-2_14_Fig4_HTML.jpg)\n\
    \n图 14-4.\n\n定义类名、子类和 `.xib` 文件  \n在 `Xcode` 中，选择 `File` ➤ `New` ➤ `File`。  \n\
    在 **OS X** 类别下点击 **Source**，然后点击 **Cocoa Class**，如图 14-3 所示。\n\n![A978-1-4842-1233-2_14_Fig3_HTML.jpg](img/A978-1-4842-1233-2_14_Fig3_HTML.jpg)\n\
    \n图 14-3.\n\n在 **Source** 类别下选择 **Cocoa Class**\n\n## 定义主用户界面\n\n如果你的项目只包含一个单一的\
    \ `.xib` 或 `.storyboard` 文件，那么 `Xcode` 会将该文件用作程序的主用户界面。但是，如果你有多个用户界面文件（例如两个 `.xib`\
    \ 或 `.storyboard` 文件，或者 `.xib` 和 `.storyboard` 文件的组合），你需要定义哪个文件应该是你的主用户界面。\n\n\
    要定义主用户界面文件，请按照以下步骤操作：\n\n在 **项目导航器** 面板中，点击你在步骤 2 中选择的 `.xib` 或 `.storyboard`\
    \ 文件，以便编辑主用户界面。  \n点击 **项目导航器** 面板顶部的项目名称。`Xcode` 会显示一系列你可以为项目定义的设置。  \n点击 **主界面**\
    \ 弹出菜单，并选择你想要使用的用户界面文件（`.xib` 或 `.storyboard`），如图 14-5 所示。\n\n![A978-1-4842-1233-2_14_Fig5_HTML.jpg](img/A978-1-4842-1233-2_14_Fig5_HTML.jpg)\n\
    \n图 14-5.\n\n为项目选择主用户界面\n\n## 显示多个 `.xib` 文件\n\n如果项目中有多个 `.xib` 文件，你需要指定一个 `.xib`\
    \ 文件作为主用户界面。这意味着其他 `.xib` 文件在你明确让它们显示之前是不可见的。要从一个 `.xib` 文件打开另一个，你需要执行三个步骤：\n\n\
    - 创建一个视图控制器和 `.xib` 文件\n- 创建一个对象来表示你的视图控制器\n- 使用 `showWindow` 和 `close` 命令来打开\
    \ `.xib` 文件，然后将其关闭\n\n要了解如何打开和关闭一个 `.xib` 文件，请按照以下步骤操作：\n\n选择 `View` ➤ `Utilities`\
    \ ➤ `Show Object Library`。**对象库** 会出现在 `Xcode` 窗口的右下角。  \n将一个 **Push Button**\
    \ 拖到你的用户界面窗口上，并将其标签修改为“**Open Window**”。  \n在 `Xcode` 中，选择 `File` ➤ `New` ➤ `Project`。\
    \  \n在 **OS X** 类别下点击 **Application**。  \n点击 **Cocoa Application**，然后点击 **下一步**\
    \ 按钮。`Xcode` 会询问产品名称。  \n点击 **产品名称** 文本字段并输入 `XIBProgram`。  \n确保 **语言** 弹出菜单显示为\
    \ `Swift`，并且没有选中任何复选框。  \n点击 **下一步** 按钮。`Xcode` 会询问你希望将项目存储在何处。  \n选择一个文件夹来存储你的项目，然后点击\
    \ **创建** 按钮。  \n在 **项目导航器** 中点击 `MainMenu.xib` 文件。你的程序用户界面会出现。  \n点击 `XIBProgram`\
    \ 图标以显示程序用户界面的窗口。  \n选择 `View` ➤ `Utilities` ➤ `Show Attributes Inspector`。**属性检查器**\
    \ 面板会显示，如图 14-6 所示。**属性检查器** 为你提供了修改用户界面各个窗口外观的选项。现在，不要更改任何内容。\n\n![A978-1-4842-1233-2_14_Fig6_HTML.jpg](img/A978-1-4842-1233-2_14_Fig6_HTML.jpg)\n\
    \n图 14-6.\n\n**属性检查器** 面板允许你修改窗口的外观\n\n此时，你的程序由一个 `MainMenu.xib` 文件组成，该文件显示一个带有一个按钮的单个窗口。现在，我们需要按照以下步骤创建一个视图控制器（包含\
    \ Swift 代码）和一个配套的 `.xib` 文件：\n\n点击 **下一步** 按钮。`Xcode` 会询问你希望将文件存储在何处。  \n点击 **创建**\
    \ 按钮。`Xcode` 会在 **项目导航器** 面板中显示一个 `secondView.swift` 文件和一个 `secondView.xib` 文件。\
    \  \n选择 `File` ➤ `New` ➤ `File`。会弹出一个模板对话框。  \n在 **OS X** 类别下选择 **Source**，然后点击\
    \ **Cocoa Class**（参见图 14-3）。点击 **下一步** 按钮。会弹出另一个对话框，要求输入类名。  \n在 **类名** 文本字段中输入\
    \ `secondView`。  \n点击 **Subclass of:** 弹出菜单并选择 `NSWindowController`。  \n选中“**Also\
    \ create XIB file for user interface**”复选框。  \n确保 **语言** 弹出菜单显示为 `Swift`，如图 14-7\
    \ 所示。\n\n![A978-1-4842-1233-2_14_Fig7_HTML.jpg](img/A978-1-4842-1233-2_14_Fig7_HTML.jpg)\n\
    \n图 14-7.\n\n定义第二个 `.xib` 文件及其视图控制器的特性\n\n此时，你已经创建了第二个 `.xib` 文件和一个配套的视图控制器文件。现在，是时候编写\
    \ Swift 代码来让一切正常运行了，请按照以下步骤操作：\n\n点击 **连接** 按钮。`Xcode` 会创建一个空的 `IBAction` 方法。\
    \  \n在 `@IBOutlet` 行下方，输入以下内容：  \n在 **项目导航器** 面板中点击 `MainMenu.xib` 文件。  \n选择 `View`\
    \ ➤ `Assistant Editor` ➤ `Show Assistant Editor`。`Xcode` 会在 `MainMenu.xib` 文件右侧显示\
    \ `AppDelegate.swift` 文件。  \n将鼠标指针移动到 **Open Window** 按钮上，按住 **Control** 键，然后将鼠标拖到\
    \ `AppDelegate.swift` 文件中最后一个大括号上方。  \n松开 **Control** 键和鼠标按钮。会弹出一个弹出窗口。  \n点击\
    \ **Connection** 弹出菜单并选择 **Action**。  \n点击 **名称** 文本字段并输入 `openWindow`。  \n点击\
    \ **类型** 弹出菜单并选择 `NSButton`，如图 14-8 所示。\n"
- fmt: "![A978-1-4842-1233-2_14_Fig8_HTML.jpg](A978-1-4842-1233-2_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8. Creating an `IBAction` method for the Open Window button\n\n`var\
    \ windowController = secondView(windowNibName: \"secondView\")`\n\nModify the\
    \ `IBAction` method as follows:\n\n```\n@IBAction func openWindow(sender: NSButton)\
    \ {\n    windowController.showWindow(sender)\n}\n```\n\nClick on the `secondView.xib`\
    \ file. The Assistant Editor should stay open and show the `secondView.swift`\
    \ file to the right. Drag a Push Button on to the window of the `secondView.xib`\
    \ file and label this button Back. Move the mouse button over this Back button\
    \ you just created, hold down the Control key, and drag the mouse above the last\
    \ curly bracket in the `secondView.swift` file. Release the Control key and the\
    \ mouse. A pop-up window appears. Click the Connection pop-up menu and choose\
    \ Action. Click in the Name text field and type `closeWindow`. Click in the Type\
    \ pop-up menu and choose `NSButton`. Click the Connect button. Modify the `IBAction`\
    \ method `closeWindow` as follows:\n\n```\n@IBAction func closeWindow(sender:\
    \ NSButton) {\n    self.close()\n}\n```\n\nClick the Back button to close the\
    \ second window defined by your `secondView.xib` file. Choose XIBProgram ➤ Quit\
    \ XIBProgram. Choose Product ➤ Run. Your program appears. Click the Open Window\
    \ button. The second window appears as shown in Figure [14-9](#A978-1-4842-1233-2_14_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_14_Fig9_HTML.jpg](A978-1-4842-1233-2_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9. Running the XIBProgram\n\nWhat you did was create a second `.xib`\
    \ file with a view controller. Then you created an object in the `AppDelegate.swift`\
    \ file called `windowController`, based on the `secondView` class that loads the\
    \ `secondView.xib` file.\n\nInside the `openWindow` `IBAction` method, you used\
    \ the `showWindow` method to open the `.xib` file stored in the `windowController`\
    \ object, which is the `secondView` class.\n\nWhen this second window appears,\
    \ you clicked on the Back button, which ran the `self.close()` command that closed\
    \ the window.\n\nAs you can see, opening and closing multiple `.xib` files requires\
    \ Swift code. To make transitioning from one window to another easier, Xcode also\
    \ offers storyboards.\n\n## Using Storyboards\n\nStoryboards consist of two parts:\n\
    \n- **Scenes** – Display the windows of your user interface\n- **Segues** – Define\
    \ the transitions between scenes\n\nYou create scenes and place items on scenes\
    \ such as buttons and text fields. Then you connect scenes using segues. By doing\
    \ this, you can define how your user interface displays information on the screen.\n\
    \nTo experiment with storyboards, you’ll need to create a project that uses storyboards\
    \ by following these steps:\n\nFrom within Xcode choose File ➤ New ➤ Project.\
    \ Click Application under the OS X category. Click Cocoa Application and click\
    \ the Next button. Xcode now asks for a product name. Click in the Product Name\
    \ text field and type `StoryProgram`. Make sure the Language pop-up menu displays\
    \ Swift and that only the “Use Storyboards” check box is selected. Click the Next\
    \ button. Xcode asks where you want to store the project. Choose a folder to store\
    \ your project and click the Create button.\n\nWhen you create a project that\
    \ uses storyboards, you’ll see two boxes where one box represents your window\
    \ or view (labeled Window Controller) and the second box represents that window’s\
    \ contents (labeled View Controller in its title bar) as shown in Figure [14-10](#A978-1-4842-1233-2_14_Chapter.html#Fig10).\
    \ The second box (that has an arrow pointing to it) is where you can place additional\
    \ user interface items such as buttons, text fields, and labels.\n\n![A978-1-4842-1233-2_14_Fig10_HTML.jpg](A978-1-4842-1233-2_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10. A view controller and view in a storyboard\n\nYou place items\
    \ from the Object Library onto the bottom window (labeled View Controller). To\
    \ add additional windows to a storyboard, you use the Object Library and drag\
    \ different controller objects into your storyboard as shown in Figure [14-11](#A978-1-4842-1233-2_14_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1233-2_14_Fig11_HTML.jpg](A978-1-4842-1233-2_14_Fig11_HTML.jpg)\n\
    \nFigure 14-11. Controllers you can add to a storyboard\n\n### Zooming In and\
    \ Out of a Storyboard\n\nWhen you click on a `.storyboard` file in the Project\
    \ Navigator pane, Xcode displays your storyboard. The problem with storyboards\
    \ is that they tend to consist of multiple scenes and segues, which you can’t\
    \ easily see.\n\nTo help you see your entire storyboard or just a part of it,\
    \ you can zoom magnification in and out. Xcode offers two ways to zoom in and\
    \ out:\n\n- Double-click on the blank space away from anything on the storyboard\
    \ (this toggles the storyboard between zooming in and zooming out).\n- Right-click\
    \ on the blank space on the storyboard and choose a magnification level from a\
    \ pop-up menu as shown in Figure [14-12](#A978-1-4842-1233-2_14_Chapter.html#Fig12).\n\
    \n    ![A978-1-4842-1233-2_14_Fig12_HTML.jpg](A978-1-4842-1233-2_14_Fig12_HTML.jpg)\n\
    \n    Figure 14-12. Right-clicking displays a magnification pop-up menu\n\nThe\
    \ lower to zoom magnification, the more of the storyboard you’ll be able to see,\
    \ so a zoom magnification of 25% displays more of the storyboard than a zoom magnification\
    \ of 50%.\n\n**Note:** You’ll need to change the storyboard magnification to 100%\
    \ when you want to place different items on the user interface such as buttons\
    \ or text fields.\n\n### Adding Scenes to a Storyboard\n\nYou can add scenes to\
    \ a storyboard at any magnification. Lower magnifications (such as 25% or 50%)\
    \ just make it easier to see how the individual scenes in your storyboard are\
    \ connected. To place a new scene on a storyboard, follow these steps:\n\nClick\
    \ on the `.storyboard` file in the Project Navigator pane. Choose View ➤ Utilities\
    \ ➤ Show Object Library. Drag any blue controller from the Object Library (see\
    \ Figure [14-11](#A978-1-4842-1233-2_14_Chapter.html#Fig11)) anywhere on the storyboard.\n\
    \nThe five types of controllers you can place on a storyboard include:\n\n- **View\
    \ Controller** – Controls an `.xib` file so you can include it with a storyboard\n\
    - **Window Controller** – Controls a single window or view\n- **Page Controller**\
    \ – Defines the animation between views\n- **Vertical/Horizontal Split View Controller**\
    \ – Displays two views side by side or stacked on top of each other\n- **Tab View\
    \ Controller** – Displays a tabbed interface that controls two or more views\n\
    \nYou can think of a Window Controller as a window that contains a view. The view\
    \ displayed inside the window is identified by an arrow pointing from the Window\
    \ Controller to the view as shown in Figure [14-13](#A978-1-4842-1233-2_14_Chapter.html#Fig13).\n\
    \n![A978-1-4842-1233-2_14_Fig13_HTML.jpg](A978-1-4842-1233-2_14_Fig13_HTML.jpg)\n\
    \nFigure 14-13. A Window Controller contains a single view\n\nOn the other hand,\
    \ a Vertical/Horizontal Split View Controller acts like a window that holds two\
    \ views either side by side or stacked on top of each other as shown in Figure\
    \ [14-14](#A978-1-4842-1233-2_14_Chapter.html#Fig14).\n\n![A978-1-4842-1233-2_14_Fig14_HTML.jpg](A978-1-4842-1233-2_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14. A Split View Controller contains two views\n\nThe Tab View Controller\
    \ also consists of a single window that can contain two or more views. The difference\
    \ is that it can display tabs where each tab represents a different view as shown\
    \ in Figure [14-15](#A978-1-4842-1233-2_14_Chapter.html#Fig15). You can also add\
    \ more than two views to a Tab View Controller.\n\n![A978-1-4842-1233-2_14_Fig15_HTML.jpg](A978-1-4842-1233-2_14_Fig15_HTML.jpg)\n\
    \nFigure 14-15. A Tab View Controller displays two or more views in one window\
    \ identified by tabs"
