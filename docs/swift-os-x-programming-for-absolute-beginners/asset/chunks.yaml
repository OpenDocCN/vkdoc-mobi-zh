  trans: '

    ### 使用条件断点


    断点通常会在每次执行到特定代码行时暂停程序。然而，你可能只希望在满足某个条件时才在该行暂停程序执行，例如当某个变量超过特定值时，这可以作为程序出现异常的提示信号。


    要了解条件断点的工作方式，请按照以下步骤操作：


    1. 点击“条件”文本字段，输入 `C2F(temp) > 200`，然后按回车键。

    2. 选择“产品”➤“运行”。Xcode 会高亮显示你的断点，并临时暂停程序执行，这意味着条件（`C2F(temp) > 200`）必须为真。

    3. 选择“产品”➤“停止”来终止并退出程序，返回 Xcode。

    4. 选择“视图”➤“导航器”➤“显示断点导航器”，右键点击你创建的断点，选择“编辑断点”。将弹出窗口。

    5. 点击“条件”文本字段，将文本编辑为 `C2F(temp > 500)`。按回车键。

    6. 选择“产品”➤“运行”。注意，这次断点没有暂停程序执行，因为其条件（`C2F(temp) > 500`）不成立。由于断点没有中断程序，程序的空白用户界面出现了。

    7. 选择“调试程序”➤“退出调试程序”。

    8. 将断点从左侧边栏拖走，松开鼠标左键即可删除该断点。（你也可以在“断点导航器”窗格中右键点击该断点，选择“删除断点”。）

    9. 确保 `DebugProgram` 项目已加载到 Xcode 中。

    10. 在“项目导航器”窗格中点击 `AppDelegate.swift` 文件。

    11. 通过点击左侧边栏，或将光标移至该行并按 Command+\，或选择“调试”➤“断点”➤“在当前行添加断点”，在以下代码行设置断点：`print (myMessage
    + "\(C2F(temp))")`

    12. 选择“视图”➤“导航器”➤“显示断点导航器”。“断点导航器”窗格出现，显示你刚刚创建的断点。

    13. 在“断点导航器”窗格中右键点击该断点，选择“编辑断点”。弹出窗口如图 23-13 所示。


    ![A978-1-4842-1233-2_23_Fig13_HTML.jpg](img/A978-1-4842-1233-2_23_Fig13_HTML.jpg)


    **图 23-13.** 符号断点在“符号”文本字段定义的 `C2F` 函数中暂停程序执行


    ### 在 Xcode 中排除断点故障


    从操作系统、游戏到电子表格和文字处理器，每个程序中都会出现 Bug。请记住，Xcode 本身也是一个程序，因此它也存在 Bug，这有时会令你困扰，直到 Apple
    在后续版本中更新并修复这些 Bug。


    在 Xcode 中使用断点时一个常见问题是它们并非始终有效。断点本应暂停程序执行，但如果 Xcode 似乎忽略了你的断点，可能有多方面原因（不涉及 Xcode
    本身的 Bug）。


    首先，请确认你没有通过按 Command+Y 或选择“调试”➤“停用断点”而意外停用了所有断点。


    其次，Xcode 可以在带或不带调试信息的情况下编译程序。通常你需要开启调试信息以便调试程序。然而，当程序准备发布时，你需要剥离调试信息以减少程序的内存和存储占用。如果你意外关闭了调试信息，Xcode
    会忽略你设置的所有断点。


    要确保调试信息已开启，请按照以下步骤操作：


    1. 选择“产品”➤“方案”➤“编辑方案”。出现一个工作表窗口。

    2. 点击左侧窗格中的“运行”，如图 23-14 所示。

    3. 确保选中“调试可执行文件”复选框。

    4. 确保“构建配置”弹出菜单显示的是“调试”（而非“发布”）。

    5. 点击“关闭”按钮。


    ![A978-1-4842-1233-2_23_Fig14_HTML.jpg](img/A978-1-4842-1233-2_23_Fig14_HTML.jpg)


    **图 23-14.** 开启调试信息


    ### 总结


    任何程序中都难免出现错误或 Bug。语法错误容易发现和修复，而逻辑错误则更难定位，因为你原本以为代码会产生一种结果，最终却产生了另一种结果。于是，当你自认为一切正确时，却要努力找出哪里做错了。更难追踪的错误是运行时错误，它们往往由于影响程序的未知条件而看似随机发生。


    为了帮助你追踪并消除大部分 Bug，你可以使用 `print` 命令结合注释，但对于更稳健的调试，你应该使用 Xcode 内置的调试器。借助调试器，你可以在代码中设置断点，并观察值如何存储在一个或多个变量中。


    条件断点仅在满足特定条件时暂停程序执行。符号断点仅在特定函数或方法被调用时暂停程序执行。一旦断点暂停了程序，你可以使用各种单步命令逐行检查代码。“进入”命令允许你查看函数或方法内部存储的代码，而“跳出”命令则允许你提前退出函数或方法并跳回到调用点。


    通过使用断点和单步命令，你可以逐行详尽地检查程序的工作方式，从而尽可能多地消除错误。程序中的错误越少，用户就会越满意。

    '
- fmt: '# 24. Planning a Program Before and After Coding


    Before you invest days, weeks, months, or years working on a program, make sure
    the world even wants your program in the first place. If you''re writing a program
    for yourself, then you can ignore what the rest of the world thinks. However,
    if you plan on selling your programs to others, make sure your program has a future
    before you even begin.


    Here''s one way to determine if there''s a market for your program. Look for competition.
    Most people think it''s better to target a market with no competition, but if
    there''s no competition, this could be a big clue that there''s also no market.


    However, if you look for a market loaded with lots of competitors, this means
    there''s a thriving market for that type of program. Just do a quick search for
    lottery-picking software or astrology programs and you''ll find plenty of competition.
    The more competition, the more active the market.


    If only one or two big companies dominate a particular market, chances are good
    that the opportunity in that market has already passed. For example, despite the
    availability of OS X and Linux, Windows is still the dominant operating system
    for PCs. That means you''ll probably waste your time trying to write a rival operating
    system to compete against Windows.


    Likewise, there are only a handful of major word processors, spreadsheets, and
    presentation programs on the market today, which means trying to write another
    general word processor, spreadsheet, or presentation program will likely be an
    exercise in futility.


    Lots of competition means an active market. Little or no competition means that
    the market has probably already settled on a leader, and your program likely will
    never be able to overthrow that leader. Trying to convince people to buy your
    word processor instead of using `Microsoft Word` or `Pages` will likely be a waste
    of time.


    However, look for niche markets. For example, the word processor market may already
    be dominated by `Microsoft Word`, but specialized word processors are still in
    demand. Although `Microsoft Word` can be used to write screenplays and novels,
    it''s not optimized for that purpose. That''s why other companies can successfully
    sell screenplay writing word processors or novel writing word processors that
    help you organize your ideas.


    Such specialized niches are too small for big companies to worry about, which
    means you''ll never have to compete directly against any of these big companies.
    Besides targeting niche markets that big companies ignore, a second approach is
    to find out what the big companies are lacking in their software, and then write
    a program that solves that missing need.


    For example, `Microsoft Office` offers a password protection feature to lock files.
    However, Microsoft''s encryption feature is weak and easily broken. As a result,
    there''s a market for software that can encrypt files much better than what `Microsoft
    Office` does, while offering a similar user interface as `Microsoft Office`.


    Most important, write a program because you''re interested in that particular
    field, not because you think it will make you a lot of money. There may be money
    selling real estate management software or software for controlling drones, but
    unless you''re interested in those fields, you likely won''t have the passion
    or long-term interest to spend the long hours needed to develop and market a program
    for those users.


    As a general rule, avoid competing directly against a big company. Even Apple
    couldn''t compete against `Microsoft Windows` for the PC operating system market,
    and a free offering such as `Linux` hasn''t succeeded much against `Windows` either.


    Instead of directly competing against a big company, look for niche markets that
    are too small for big companies to tackle, or look for ways to supplement a big
    company''s existing programs. Above all, look for a problem in a field that you''re
    passionately committed to solving, and this will give you the motivation to create
    the best program possible.


    ## Identifying the Purpose of Your Program


    When programmers first get an idea, their natural tendency is to rush to the computer
    and start writing code. However this is like living in Los Angeles, getting an
    idea to visit New York, and hopping in your car to drive there. You may get there
    eventually, but without a plan, you''ll likely waste time by not planning which
    roads to take or what to bring with to make your trip more enjoyable.


    Just as you should take your time and plan ahead before rushing off to visit another
    city, so you should also take your time and plan ahead when developing a new program.
    If you start writing Swift code in a flurry of inspiration, you''ll likely run
    out of energy and ideas long before you finish your program. That will likely
    create a half-completed, poorly designed program that will need to be heavily
    modified or dumped completely to make it work.


    Writing code is actually the most straightforward part of creating any program.
    The hardest part of programming can be deciding what you hope to get out of a
    program when it''s finished.


    For example, if you''re learning and experimenting with Swift, you might want
    to create programs just to learn a specific feature such as how to retrieve data
    from a stock market web site or how to create animation for a game. In this case,
    your goal is just to create short, disposable programs that let you understand
    how to use specific programming features.


    If you''re planning to create programs for other people to use, then you need
    to do some additional planning. First of all, why do you want to create a program
    for other people? Perhaps you want to create a custom program for a particular
    person. Maybe you want to create a program that offers features that current programs
    lack. Whatever the reason, every program must ultimately satisfy the user.


    If you''re creating a program for your own use, then you''re the user. However
    if you''re creating programs for other people, then the user can be a specific
    person and computer (such as one dentist in your neighborhood dental office),
    or a general group of users (any dentist who needs to manage a dental office).
    Whoever the user might be, identify the single most important task your program
    must solve for that user. Then make sure your program accomplishes that one crucial
    task correctly.


    > **Note**

    > Between 2000 and 2005, the FBI spent $170 million dollars creating a program
    called `Virtual Case File`. The government eventually abandoned the entire project
    because of constantly changing specifications for what the program was supposed
    to do and how it was supposed to work. If you don''t know what a program is supposed
    to do, you won''t know how it''s supposed to achieve that result.


    Before writing any program, identify the following:


    - Who is the user of the program?

    - What is the program supposed to do for the user?

    - How will the program achieve that result for the user?


    The user of your program completely determines the design of your program''s user
    interface. Compare the cockpit of a 777 jet airliner to the dashboard of a typical
    car. To the average person, a 777 cockpit may look intimidating, but to an experienced
    pilot, everything is within arm''s reach and easy to understand. If your program
    caters to specialists, your user interface can rely on the user''s knowledge to
    work. If your program caters to the general public, your user interface may need
    to guide the user more often.


    Every program must create a useful result for the user. Word processors organize
    text into neatly formatted pages, spreadsheets automatically and accurately calculate
    mathematical formulas, and even games provide entertainment. Imagine your program
    giving the user superpowers that the user can''t achieve any other way. What superpower
    will your program give to the user?'
