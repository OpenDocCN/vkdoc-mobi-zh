    ### Using a Secure Text Field, a Search Field, and a Token Field


    A secure text field simply hides text behind bullets when the user types. This
    can be handy for masking actual text such as passwords, credit card numbers, or
    other sensitive information from view. Beyond masking anything typed in, a secure
    text field works exactly like a regular text field where you can retrieve the
    value typed using the `intValue`, `floatValue`, `doubleValue`, or `stringValue`
    properties.


    A search text field looks like a typical search field you might find in a browser
    that displays a magnifying glass icon and close icon that can delete the text
    in the search field with one click. Each time the user types something in the
    search field and presses Return, the search field stores the text as a list stored
    in the `recentSearches` property.


    By accessing this `recentSearches` property, you can view a list of everything
    the user previously typed in that search field.


    A token field lets you type text and then it encloses that text inside a token.
    Despite the appearance of tokens, you can still retrieve the text of a token field
    by accessing the `stringValue` property.


    To see how to use a secure text field, a search field, and a token field, follow
    these steps:


    Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `AppDelegate.swift`
    file next to the user interface. Move the mouse pointer over the Search Field,
    hold down the Control key, and drag the mouse under the `IBOutlet` line in the
    `AppDelegate.swift` file. Release the Control key and the mouse button. A pop-up
    window appears. Click in the Name text field, type `searchBox`, and click the
    Connect button. Move the mouse pointer over the label to the right of the Search
    Field, hold down the Control key, and drag the mouse under the `IBOutlet` line.
    Release the Control key and the mouse button. A pop-up window appears. Click in
    the Name text field, type `historyBox`, and click the Connect button. You should
    have two IBOutlets like this:


    ```

    @IBOutlet weak var searchBox: NSSearchField!

    @IBOutlet weak var historyBox: NSTextField!

    ```


    From within Xcode choose File ➤ New ➤ Project. Click Application under the OS
    X category. Click Cocoa Application and click the Next button. Xcode now asks
    for a product name. Click in the Product Name text field and type TextProgram.
    Make sure the Language pop-up menu displays Swift and that all check boxes are
    clear and not selected. Click the Next button. Xcode asks where you want to store
    the project. Choose a folder to store your project and click the Create button.
    Click on the MainMenu.xib file in the Project Navigator Pane. Click on the TextProgram
    icon to make the window of the user interface appear. Drag three Push Buttons,
    a Search Field, a Token Field, a Secure Text Field, and three labels resized to
    expand their width onto the user interface as shown in Figure 17-7.


    ![A978-1-4842-1233-2_17_Fig7_HTML.jpg](A978-1-4842-1233-2_17_Fig7_HTML.jpg)


    Figure 17-7. The user interface of the TextProgram


    Move the mouse pointer over the Token Field, hold down the Control key, and drag
    the mouse under the `IBOutlet` line in the `AppDelegate.swift` file. Release the
    Control key and the mouse button. A pop-up window appears. Click in the Name text
    field, type `tokenBox`, and click the Connect button. Move the mouse pointer over
