    ### 使用安全文本字段、搜索字段和令牌字段


    安全文本字段在用户输入时，会用圆点隐藏文本。这对于掩盖实际文本（如密码、信用卡号或其他敏感信息）非常有用。除了屏蔽输入内容外，安全文本字段的工作方式与普通文本字段完全相同，您可以使用
    `intValue`、`floatValue`、`doubleValue` 或 `stringValue` 属性来获取输入的值。


    搜索文本字段的外观类似于浏览器中常见的搜索字段，它带有一个放大镜图标和一个可以一键删除搜索字段中文本的关闭图标。每次用户在搜索字段中输入内容并按回车键时，搜索字段都会将文本存储为列表，保存在
    `recentSearches` 属性中。


    通过访问这个 `recentSearches` 属性，您可以查看用户之前在该搜索字段中输入的所有内容的列表。


    令牌字段允许您输入文本，然后将该文本封装在一个令牌中。尽管令牌的外观特殊，您仍然可以通过访问 `stringValue` 属性来获取令牌字段的文本。


    要了解如何使用安全文本字段、搜索字段和令牌字段，请按照以下步骤操作：


    选择“视图”➤“助理编辑器”➤“显示助理编辑器”。Xcode 将在用户界面旁边显示 `AppDelegate.swift` 文件。将鼠标指针移动到“搜索字段”上，按住
    Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标按钮。将出现一个弹出窗口。点击“名称”文本字段，输入
    `searchBox`，然后点击“连接”按钮。将鼠标指针移动到搜索字段右侧的标签上，按住 Control 键，然后将鼠标拖到 `IBOutlet` 行下方。松开
    Control 键和鼠标按钮。将出现一个弹出窗口。点击“名称”文本字段，输入 `historyBox`，然后点击“连接”按钮。您应该会得到如下两个 IBOutlet：


    ```

    @IBOutlet weak var searchBox: NSSearchField!

    @IBOutlet weak var historyBox: NSTextField!

    ```


    在 Xcode 中，选择“文件”➤“新建”➤“项目”。在 OS X 类别下点击“应用程序”。点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode
    会要求您输入产品名称。点击“产品名称”文本字段，输入 TextProgram。确保“语言”弹出菜单显示为 Swift，并且所有复选框都处于清除且未选中状态。点击“下一步”按钮。Xcode
    会询问您希望将项目存储在何处。选择一个文件夹来存储您的项目，然后点击“创建”按钮。在项目导航面板中点击 MainMenu.xib 文件。点击 TextProgram
    图标，使用户界面的窗口显示出来。将三个下压按钮、一个搜索字段、一个令牌字段、一个安全文本字段以及三个调整宽度以扩展的标签拖到用户界面上，如图 17-7 所示。


    ![A978-1-4842-1233-2_17_Fig7_HTML.jpg](img/A978-1-4842-1233-2_17_Fig7_HTML.jpg)


    图 17-7. TextProgram 的用户界面


    将鼠标指针移动到“令牌字段”上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开
    Control 键和鼠标按钮。将出现一个弹出窗口。点击“名称”文本字段，输入 `tokenBox`，然后点击“连接”按钮。将鼠标指针移动到搜索字段右侧的标签上，按住
    Control 键，然后将鼠标拖到 `IBOutlet` 行下方。松开 Control 键和鼠标按钮。将出现一个弹出窗口。点击“名称”文本字段，输入 `tokenResult`，然后点击“连接”按钮。您应该会再得到两个
    IBOutlet，如下所示：


    ```

    @IBOutlet weak var tokenBox: NSTokenField!

    @IBOutlet weak var tokenResult: NSTextField!

    ```

