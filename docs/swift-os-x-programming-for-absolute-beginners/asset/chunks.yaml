  trans: '

    与人类语言不同——即使拼错单词或忘记句末加点号，人们仍能理解你的意思——编程语言可没那么宽容。在编程语言中，每个关键字和函数都必须拼写正确，每个符号都必须用在需要的位置。只要拼错一个关键字或函数，用错符号，或者把正确的符号放错位置，整个程序就无法运行。


    编程语言是精确的。编程的关键在于编写：


    -   尽可能少的代码

    -   功能尽可能强大的代码

    -   尽可能易于理解的代码


    你需要编写尽可能少的代码，因为代码越少，就越容易确保其正确运行。


    你需要功能尽可能强大的代码，因为这能让你的程序更有能力解决更大的问题。


    你需要易于理解的代码，因为这样便于修复问题和添加功能。


    不幸的是，这三个标准往往相互矛盾，如图 1-5 所示。


    ![A978-1-4842-1233-2_1_Fig5_HTML.gif](img/A978-1-4842-1233-2_1_Fig5_HTML.gif)


    图 1-5. 编程中三个常常相互矛盾的目标


    如果只写尽可能少的代码，通常意味着代码功能有限。这就是为什么程序员常常采用捷径和编程技巧来压缩代码体积，但这同时也增加了代码的复杂度，使其更难理解。


    如果编写功能尽可能强大的代码，通常意味着需要编写大量命令，这会使代码更难理解。


    如果编写易于理解的代码，通常它的功能不会很强。而为了增加功能编写更多代码，又会让代码更难理解。


    归根结底，计算机编程与其说是科学，不如说是一门艺术。通常，最好专注于让代码尽可能容易理解，因为这样更容易修复问题和添加新功能。此外，易于理解的代码也意味着其他程序员可以在你无法处理时修复和修改你的程序。


    正因如此，苹果公司创建了 Swift，旨在让代码比 Objective-C 更易理解，同时又不牺牲 Objective-C 的强大功能。尽管比 Objective-C
    更强大，但 Swift 代码往往比等效的 Objective-C 代码更短。因此，苹果公司未来的编程语言将是 Swift。


    ## Cocoa 框架


    关键字、函数和符号让你能够向计算机下达指令，但没有任何编程语言能提供创建所有类型程序所需的全部命令。为了提供额外命令，程序员会使用关键字创建执行特定任务的子程序。


    当他们创建了有用的子程序时，通常会将其保存在包含其他有用子程序的库中。现在，当你编写程序时，就可以使用编程语言的关键字以及库中存储的任何子程序。通过复用库中的子程序，你可以创建更强大、更可靠的代码。


    例如，一个库可能包含用于显示图形的子程序；另一个库可能包含用于将数据保存到磁盘并重新读取的子程序；还有的库可能包含用于计算数学公式的子程序。为了简化 OS
    X 和 iOS 程序的编写，苹果公司创建了一个有用子程序的库框架，称为 Cocoa 框架。


    复用现有框架有两个原因。首先，复用框架可以避免你为完成别人已解决的问题而编写自己的指令。框架不仅提供了现成的解决方案，而且已经经过他人测试，因此你可以放心使用，确信它能正常工作。


    使用现有框架的第二个原因是为了保持一致性。苹果公司提供了用于定义程序在屏幕上外观的框架，即用户界面。这定义了程序的行为方式，从在屏幕上显示窗口，到通过鼠标点击来调整窗口大小或关闭窗口。


    你完全可以自己编写在屏幕上显示窗口的指令，但这样很可能会花费大量时间进行创建和测试，最终得到的用户界面可能与其他 OS X 或 iOS 程序在外观或行为上不一致。


    然而，通过复用现有框架，你可以快速创建自己的程序，并确保程序的行为与其他程序一致。尽管编程听起来很复杂，但苹果提供了数百个预先编写且经过测试的子程序，帮助你快速轻松地创建程序。你只需编写那些让你的程序解决特定、独特问题的自定义指令即可。


    要理解苹果的 Cocoa 框架如何工作，你需要理解面向对象编程，这有两个原因。第一，Swift 是一种面向对象编程语言，因此要充分利用 Swift，你需要理解面向对象编程的优势。


    第二，苹果的 Cocoa 框架基于面向对象编程。要理解如何使用 Cocoa 框架，你需要使用对象。


    注意


    Cocoa 框架专为创建 OS X 程序而设计。一个名为 Cocoa Touch 的类似框架则专为创建 iOS 应用而设计。由于 Cocoa Touch 框架（iOS）基于
    Cocoa 框架（OS X），它们的工作原理相似，但提供不同的功能。


    通过依赖 Cocoa 框架，每当苹果更新和改进 Cocoa 框架时，你的程序就能获得新功能。例如，拼写检查是 Cocoa 框架的内置功能。如果你使用 Cocoa
    框架编写程序，你的程序会自动获得拼写检查功能，而无需你编写任何额外代码。当苹果改进 Cocoa 框架中的拼写检查功能时，你的程序会自动获得这些改进，无需你付出额外努力。


    Cocoa 框架是一个通用术语，涵盖了苹果所有预先编写并测试的代码库。Cocoa 框架的不同部分可以为你的程序提供音频播放、图形处理、联系人信息（如姓名和地址）存储以及网络连接等功能。


    Cocoa 框架为典型的 OS X 程序奠定了基础。你只需编写让你的程序独具特色的 Swift 代码即可。

    '
- fmt: '# The View-Model-Controller Design


    It’s possible to write a large program and store all your code in a single file.
    However, that makes finding anything in your program much harder. A better solution
    is to divide a large program into parts and store related parts in separate files.
    That way you can quickly find the part of your program you need to modify, and
    you make it easy for multiple programmers to work together since one programmer
    can work on one file and a second programmer can work on a second file.


    When you divide a program into separate files, it’s best to stay organized. Just
    as you might store socks in one drawer and pants in a second drawer so you can
    easily find what the clothes need, so should you organize your program into multiple
    files so each file only contains related data. That way you can find the file
    you need to modify quickly and easily.


    The type of data you can store in a file generally falls into one of three categories
    as shown in Figure [1-6](#A978-1-4842-1233-2_1_Chapter.html#Fig6):


    ![A978-1-4842-1233-2_1_Fig6_HTML.gif](A978-1-4842-1233-2_1_Fig6_HTML.gif)


    Figure 1-6.


    Dividing a program into a model-view-controller design


    * Views (user interface)

    * Models

    * Controllers


    The view or user interface is what the user sees. The purpose of every user interface
    is to display information, accept data, and accept commands from the user. In
    the old days, programmers often created user interfaces by writing code. While
    you can still do this in Swift, it’s time consuming, error prone, and inconsistent
    because one programmer’s user interface might not look and behave exactly like
    a second programmer’s user interface.


    A better option is to design your user interface visually, which is what Xcode
    lets you do. Just draw objects on your user interface such as buttons, text fields,
    and menus, and Xcode automatically creates an error-free, consistent-looking user
    interface that only takes seconds to create. When you create a user interface
    using Xcode, you’re actually using Apple’s Cocoa framework to do it.


    By itself, the user interface looks good but does nothing. To make a program do
    something useful, you need to write code that solves a specific problem. For example,
    a lottery-picking program might analyze the latest numbers picked and determine
    the numbers most likely to get picked the coming week. The portion of your code
    that calculates a useful result is called the model.


    The model is actually completely separate from the view (user interface). That
    makes it easy to modify the user interface without affecting the model (and vice
    versa). By keeping different parts of your program as isolated as possible from
    other parts of your program, you reduce the chance of errors occurring when you
    modify a program.


    Since the model is always completely separate from the view, you need a controller.
    When a user chooses a command or types data into the user interface, the controller
    takes that information from the view and passes it to the model.


    The model responds to this data or commands and calculates a new result. Then
    it sends the calculated result to the controller, which passes it back to the
    view to display for the user to see. At all times, the view and model are completely
    separate.


    With Xcode, this means you’ll write and store the bulk of your Swift code in files
    that define the model of your program. If you were calculating winning lottery
    numbers, your Swift code for performing these calculations would be stored in
    the model.


    You’ll also need to write and store Swift code in a controller file. In a simple
    program, you might have a single view. In a more complicated program, you might
    have several views. For each view, you’ll typically need a controller file to
    control that view. So the second place you’ll write and store Swift code is in
    the controller files.


    In simple programs, it’s common to combine a model with a controller in one file.
    However for larger, more complicated programs, it’s better to create one (or more)
    files for your model and one file for each controller. The number of controller
    files is usually equal to the number of views that make up your user interface.


    Once you’ve clearly separated your program into models, views, and controllers,
    you can easily modify your program quickly and easily by replacing one file with
    a new file. For example, if you wanted to modify the user interface, you could
    simply design a different view, connect it to your controller, and you’d be done
    without touching your model files.


    If you wanted to modify the model to add new features, you could just update your
    model files and connect it to your controller without touching your view.


    In fact, this is exactly how programmers create programs for both OS X and iOS.
    Their model remains unchanged. All they do is write one controller and view for
    OS X and one controller and view for iOS. Then they can create both OS X and iOS
    apps with the exact same model.'
