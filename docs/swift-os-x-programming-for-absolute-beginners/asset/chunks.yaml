- fmt: "This example of a `switch` statement tries to match a value/variable/expression\
    \ with exactly one value. However, a `switch` statement can try matching more\
    \ than one value. There are three ways a `switch` statement can check a range\
    \ of values:\n\n* Explicitly list all possible values, separated by a comma\n\
    * Define the starting and ending range of numbers separated by three dots (`...`)\n\
    * Define the starting number and the ending range with two dots and a less than\
    \ sign (`..<`)\n\nWhen a `case` statement lists all values separated by commas,\
    \ its code will run only if the switch value/variable/expression exactly matches\
    \ one of those values. For example, consider the following `case` statement:\n\
    \n    switch whatNumber {\n        case 1, 2, 3: print(\"The number is 1, 2, or\
    \ 3\")\n        default: print(\"The number is undefined\")\n    }\n\nOnly if\
    \ the value of `whatNumber` is 1, 2, or 3 will its code print “The number is 1,\
    \ 2, or 3.”\n\nExplicitly listing all possible values may be fine for a handful\
    \ of numbers, but for multiple numbers, it can get tedious to write every possible\
    \ number. As a shortcut, Swift lets you specify a range. If you wanted to match\
    \ a number between 4 and 20, the `case` portion of the `switch` statement might\
    \ look like this:\n\n    switch whatNumber {\n        case 4...20: print(\"The\
    \ number is between 4 and 20\")\n        default: print(\"The number is undefined\"\
    )\n    }\n\nIn this case, `whatNumber` could be 4, 20, or any number in between.\
    \ The three dots signify a range that includes the starting and ending number\
    \ of the range (4 and 20).\n\nSwift can also check a half range that consists\
    \ of two dots and a less than symbol such as:\n\n    switch whatNumber {\n   \
    \     case 20..<49: print(\"The number is between 20 and 48\")\n        default:\
    \ print(\"The number is undefined\")\n    }\n\nThis `20..<49` half range matches\
    \ only if `whatNumber` is 20, 48, or any number in between. Notice that if `whatNumber`\
    \ is 49, it will not match the half range but if `whatNumber` is 20, then it will\
    \ match.\n\nTo see how all three variations of multiple values works, follow these\
    \ steps:\n\nMake sure the BooleanPlayground file is loaded in Xcode. Edit the\
    \ code as follows:\n\n```\nimport Cocoa\nvar whatNumber: Int = 49\nswitch whatNumber\
    \ {\n    case 1, 2, 3: print(\"The number is 1\")\n        print(\"Isn’t this\
    \ amazing?\")\n    case 4...20: print(\"The number is between 4 and 20\")\n  \
    \  case 20..<49: print(\"The number is between 20 and 48\")\n    default: print(\"\
    The number is undefined\")\n}\n```\n\nWhen the value is 49, the `switch` statement\
    \ matches nothing so it uses the `default` portion of the `switch` statement as\
    \ shown in Figure [7-7](#A978-1-4842-1233-2_7_Chapter.html#Fig7).\n\n![A978-1-4842-1233-2_7_Fig7_HTML.jpg](A978-1-4842-1233-2_7_Fig7_HTML.jpg)\n\
    \n**Figure 7-7.** Running a switch statement that checks for multiple values\n\
    \nChange the value of the `whatNumber` variable to 2, 12, and 48 to see how the\
    \ `switch` statement matches different values.\n\n## Using the switch Statement\
    \ with enum Data Structures\n\nThe `switch` statement is often used to check for\
    \ specific values such as strings or numbers. However, one common use for `switch`\
    \ statements is to work with a data structure called `enum` (which is short for\
    \ “enumeration”). An `enum` data structure lets you create a list of different\
    \ data with descriptive names such as:\n\n    enum dog {\n        case poodle\n\
    \        case collie\n        case terrier\n        case mutt\n    }\n\nThe above\
    \ `enum` data structure creates a data type called “dog” that can only hold one\
    \ of four values: `poodle`, `collie`, `terrier`, or `mutt`. To use an `enum` data\
    \ structure, you need to create a variable or a constant such as:\n\n    var myPet\
    \ = dog.collie\n\nThe above code defines a variable called “myPet” and assigns\
    \ it a value of `dog.collie`. If you wanted to check the value of the `myPet`\
    \ variable, you could use a `switch` statement like this:\n\n    switch myPet\
    \ {\n        case .poodle:\n            print(\"Poodle\")\n        case .collie:\n\
    \            print(\"Collie\")\n        case .terrier:\n            print(\"Terrier\"\
    )\n        case .mutt:\n            print(\"Mutt\")\n    }\n\nTo see how the `switch`\
    \ statement works with the `enum` data structure, follow these steps:\n\nMake\
    \ sure the BooleanPlayground file is loaded in Xcode. Edit the code as follows:\n\
    \n```\nimport Cocoa\nenum dog {\n    case poodle\n    case collie\n    case terrier\n\
    \    case mutt\n}\nvar myPet = dog.collie\nswitch myPet {\n    case .poodle:\n\
    \        print(\"Poodle\")\n    case .collie:\n        print(\"Collie\")\n   \
    \ case .terrier:\n        print(\"Terrier\")\n    case .mutt:\n        print(\"\
    Mutt\")\n}\n```\n\nThe `switch` statement only looks to see which possible value,\
    \ specified by the `enum` data structure, that the `myPet` variable holds. Since\
    \ the value is `.collie`, the `switch` statement prints “Collie” as shown in Figure\
    \ [7-8](#A978-1-4842-1233-2_7_Chapter.html#Fig8).\n\n![A978-1-4842-1233-2_7_Fig8_HTML.jpg](A978-1-4842-1233-2_7_Fig8_HTML.jpg)\n\
    \n**Figure 7-8.** Running a switch statement that checks for multiple values"
