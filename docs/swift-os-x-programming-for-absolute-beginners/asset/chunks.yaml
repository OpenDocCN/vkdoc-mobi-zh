    \        myAlert.messageText = \"歹徒阵亡。\"\n        myAlert.runModal()\n    }\n\
    }\n```\n\n此代码检查 `sender` 变量的 `Tag` 属性，该属性用于标识用户点击了哪个按钮。如果 `Tag` 属性为 0，则表示用户点击了“警长射击”按钮，因此它会运行\
    \ `sheriff` 对象中的 `shoot` 方法，并从 `outlaw.hitPoints` 属性中减去其结果（一个 0 到 3 之间的值）。\n\n\
    如果用户点击了“歹徒射击”按钮，则会运行 `outlaw` 对象中的 `shoot` 方法，并从 `sheriff.hitPoints` 属性中减去其结果（一个\
    \ 0 到 3 之间的值）。\n\n无论结果如何，它随后都会在用户界面上由 `sheriffHitPoints` 和 `outlawHitPoints` 这两个\
    \ `IBOutlets` 标识的两个文本字段中，显示 `sheriff` 和 `outlaw` 双方的 `hitPoints` 属性的最新值。\n\n最后，如果\
