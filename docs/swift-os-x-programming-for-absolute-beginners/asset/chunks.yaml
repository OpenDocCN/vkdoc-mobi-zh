    ### Using Property Observers


    Swift provides two property observers called willSet and didSet. The willSet property
    observer runs code before a property receives a value. The didSet property observer
    runs code after a property receives a value.


    Like getters and setters, property observers essentially are functions that run
    when a property gets a new value. The basic structure for a willSet and didSet
