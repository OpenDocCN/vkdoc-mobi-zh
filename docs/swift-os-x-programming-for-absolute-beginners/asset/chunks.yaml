  raw: '# 5. Learning Swift


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​5](http://dx.doi.org/10.1007/978-1-4842-1233-2_5))
    contains supplementary material, which is available to authorized users.


    To write any program, you need to choose a programming language. A programming
    language lets you define commands for the computer to follow. There’s no one “best”
    programming language because every programming language is meant to solve a specific
    problem. That means that a programming language may be great at solving certain
    types of problems, but horrible at solving other types of programs.


    With most programming languages, there’s a tradeoff between ease of use and efficiency.
    For example, the BASIC programming language is meant to be easy to learn and use
    while the C programming language is meant to give you complete control over the
    computer. By maximizing computer efficiency, the C language is great for creating
    complicated programs such as operating systems or hard disk utility programs.


    Since BASIC was never designed for maximum control over a computer, BASIC would
    never be used to create an operating system or a hard disk utility program. Since
    C was designed for maximum computer efficiency, it’s difficult for novices to
    learn and even difficult for experienced programmers to use. The majority of errors
    or bugs in many programs are due solely to the complexity of the C programming
    language that confounds even professional programmers with decades of experience.


    In the world of Xcode, Apple’s official programming language used to be Objective-C,
    which was a superset of the C programming language and an alternative to the object-oriented
    C++ language. Unfortunately, Objective-C can still be difficult to learn and even
    harder to master. By making programming harder than it needs to be, Objective-C
    makes creating OS X and iOS software difficult for novices and experienced programmers
    alike.


    That’s why in 2014, Apple introduced a new programming language called Swift.
    Swift is meant to be just as powerful as Objective-C while also being much easier
    to learn. Because Apple will use Swift for both OS X and iOS programming, Swift
    is now the future programming language for the Macintosh, iPhone, iPad, Apple
    Watch, Apple TV, CarPlay, and any other future products from Apple.


    Since so many people have written programs using Objective-C, there will always
    be a need for programmers to modify existing Objective-C programs. However, you
    can always mix Objective-C and Swift in a program. That means over time, there
    will be less of a need for Objective-C programmers and more of a need for Swift
    programmers. If you want to learn the most powerful programming language for writing
    OS X and iOS programs, you want to learn Swift.


    Note


    If you’re already familiar with Objective-C, you’ll notice several ways that Swift
    makes coding far easier. First, Swift doesn’t require a semicolon to end each
    line. Second, Swift doesn’t need asterisks to represent pointers or square brackets
    to represent method calls to objects. Third, Swift stores everything in a single
    .swift file in comparison to Objective-C that needs to create an .h header file
    and an .m implementation file. If you know nothing about Objective-C, just look
    at any program written in Objective-C and see how confusing the code can be. One
    look at Objective-C code will make you realize how much easier learning and using
    Swift can be.


    ## Using Playgrounds


    In the old days, programmers had two types of tools to help them learn programming.
    The first is called an interpreter. An interpreter let you type in a command and
    then would immediately show you the results. That way you could see exactly what
    you were doing right or wrong.


    The drawback with interpreters was that they were slow and that you couldn’t use
    them to create programs you could sell. To run a program in an interpreter, you
    needed both the interpreter and the file (called the source code) that contained
    all your commands written in a particular programming language. Because you had
    to give away your source code to run programs in an interpreter, others could
    easily copy your program and steal it. As a result, interpreters were only useful
    for learning a language but weren’t practical for selling software.


    The second tool that programmers use to learn programming is called a compiler.
    A compiler takes a list of commands, stored in a file, and converts them to machine
    language so the computer can understand them. The advantage of a compiler is that
    it keeps others from seeing the source code of your program.


    The problem with using a compiler is that you have to write a complete program
    and compile it just to see if your commands work or not. If your commands don’t
    work, now you have to go back and fix the problem. Unlike the interactive nature
    of an interpreter, a compiler makes learning a programming language much slower
    and clumsier.


    With an interpreter you could write a command and immediately see if it worked
    or not. With a compiler, you had to write a command, compile your program, and
    run your program to see if it worked or not.


    Interpreters are better for learning while compilers are better for creating software
    you can distribute to others without giving away your source code. Fortunately,
    Xcode gives you the best of both worlds.


    When you run your program, you’re using Xcode’s compiler. However, if you only
    want to experiment with some commands, you can use Xcode’s interpreter called
    a Playground.


    Playgrounds let you experiment with Swift code to see if it works or not. When
    you get it to work, then you can copy and paste it into your project files and
    compile them to create a working program. By giving you the ability to use both
    an interpreter and a compiler, Xcode makes it easy to learn Swift and practical
    for creating programs you can sell or give away to others.


    To create a playground, follow these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform as shown in Figure [5-1](#A978-1-4842-1233-2_5_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_5_Fig1_HTML.jpg](A978-1-4842-1233-2_5_Fig1_HTML.jpg)


    Figure 5-1.


    Creating a playground file   Click in the Name text field and type IntroductoryPlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file
    as shown in Figure [5-2](#A978-1-4842-1233-2_5_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_5_Fig2_HTML.jpg](A978-1-4842-1233-2_5_Fig2_HTML.jpg)


    Figure 5-2.


    The playground window   Edit the second line as follows: `var str = "This is the
    Swift interpreter"`  


    Notice that the playground window immediately displays the results of your code
    change in the right margin as shown in Figure [5-3](#A978-1-4842-1233-2_5_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_5_Fig3_HTML.jpg](A978-1-4842-1233-2_5_Fig3_HTML.jpg)


    Figure 5-3.


    The playground window displays code changes immediately


    Playgrounds let you freely experiment with Swift and access every class in the
    Cocoa framework without worrying about getting your Swift code to work with a
    user interface.'
  trans: "\n# 5. 学习 Swift\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​5](http://dx.doi.org/10.1007/978-1-4842-1233-2_5)）包含补充材料，仅供授权用户使用。\n\
    \n要编写任何程序，都需要选择一门编程语言。编程语言允许你定义计算机要执行的命令。没有所谓的“最佳”编程语言，因为每种编程语言都是为了解决特定问题而设计的。这意味着，一种编程语言可能擅长解决某类问题，但在解决其他类型问题时可能表现糟糕。\n\
    \n对于大多数编程语言来说，易用性和效率之间需要权衡。例如，`BASIC` 编程语言旨在易于学习和使用，而 `C` 编程语言则旨在让你完全控制计算机。通过最大化计算机效率，`C`\
    \ 语言非常适合创建诸如操作系统或硬盘实用程序之类的复杂程序。\n\n由于 `BASIC` 从设计之初就不是为了最大限度控制计算机，因此它永远不会被用来创建操作系统或硬盘实用程序。而\
    \ `C` 语言虽为最大化计算机效率而设计，但对于新手来说很难学习，即使对有经验的程序员来说也很难使用。许多程序中的大多数错误或缺陷完全归咎于 `C` 编程语言的复杂性，这种复杂性甚至会让拥有数十年经验的专业程序员感到困惑。\n\
    \n在 Xcode 的世界里，苹果公司的官方编程语言曾经是 `Objective-C`，它是 `C` 编程语言的一个超集，也是面向对象 `C++` 语言的一个替代方案。不幸的是，`Objective-C`\
    \ 仍然很难学习，更难精通。`Objective-C` 让编程变得不必要的复杂，使得为新手和经验丰富的程序员创建 OS X 和 iOS 软件都变得困难。\n\
    \n这就是为什么在 2014 年，苹果公司推出了一门名为 `Swift` 的新编程语言。`Swift` 旨在拥有与 `Objective-C` 同等的强大功能，同时更易于学习。由于苹果公司将把\
    \ `Swift` 同时用于 OS X 和 iOS 编程，`Swift` 现在已成为 Macintosh、iPhone、iPad、Apple Watch、Apple\
    \ TV、CarPlay 以及苹果公司未来任何其他产品的未来编程语言。\n\n由于很多人一直在使用 `Objective-C` 编写程序，将来仍然需要程序员来修改现有的\
    \ `Objective-C` 程序。但是，你始终可以在一个程序里混合使用 `Objective-C` 和 `Swift`。这意味着随着时间的推移，对 `Objective-C`\
    \ 程序员的需求将会减少，而对 `Swift` 程序员的需求将会增加。如果你想学习用于编写 OS X 和 iOS 程序的最强大编程语言，那么你需要学习 `Swift`。\n\
    \n**注意**  \n如果你已经熟悉 `Objective-C`，你会注意到 `Swift` 在多个方面让编码变得更容易。首先，`Swift` 不需要用分号来结束每一行。其次，`Swift`\
    \ 不需要用星号表示指针，也不需要对方括号来表示对象的方法调用。第三，`Swift` 将所有内容存储在一个单独的 `.swift` 文件中，而 `Objective-C`\
    \ 则需要创建一个 `.h` 头文件和一个 `.m` 实现文件。如果你对 `Objective-C` 一无所知，只需看一下任何用 `Objective-C`\
    \ 编写的程序，就能体会到代码有多令人困惑。看一眼 `Objective-C` 代码，你就会意识到学习和使用 `Swift` 要容易得多。\n\n## 使用\
    \ Playgrounds\n\n在过去，程序员有两种工具可以帮助他们学习编程。第一种叫做解释器。解释器允许你输入一条命令，然后立即显示结果。这样你就能确切地看到自己做对了什么或做错了什么。\n\
    \n解释器的缺点是速度慢，并且你不能用它来创建可以销售的程序。要在解释器中运行程序，你需要解释器和包含所有用特定编程语言编写的命令的文件（称为源代码）。因为你需要提供源代码才能在解释器中运行程序，所以其他人可以轻易地复制你的程序并窃取它。因此，解释器仅对学习语言有用，但不适合用于销售软件。\n\
    \n程序员用来学习编程的第二种工具叫做编译器。编译器获取存储在文件中的命令列表，并将其转换为机器语言，以便计算机能够理解。编译器的优点是可以防止他人看到你程序的源代码。\n\
    \n使用编译器的问题在于，你必须编写一个完整的程序并编译它，才能知道你的命令是否有效。如果命令无效，你就得回去修复问题。与解释器的交互式特性不同，编译器使得学习编程语言的过程更慢、更笨拙。\n\
    \n使用解释器，你可以编写一条命令并立即看到它是否有效。而使用编译器，你必须先编写命令，然后编译程序，最后运行程序才能知道它是否有效。\n\n解释器更适合学习，而编译器更适合创建那些可以分发给他人且无需提供源代码的软件。幸运的是，Xcode\
    \ 为你提供了两全其美的方案。\n\n当你运行程序时，你使用的是 Xcode 的编译器。然而，如果你只是想试验一些命令，你可以使用 Xcode 的解释器，它被称为\
    \ `Playground`（游乐场）。\n\nPlaygrounds 让你可以试验 `Swift` 代码，看看它是否有效。当你让代码正常工作后，就可以将其复制粘贴到你的项目文件中，然后编译它们以创建一个可运行的程序。Xcode\
    \ 赋予你同时使用解释器和编译器的能力，这使得学习 `Swift` 变得容易，并且对于创建你可以出售或赠送给他人的程序来说也很实用。\n\n要创建一个 playground，请遵循以下步骤：\n\
    \n1. 启动 Xcode。\n2. 选择 **文件 ➤ 新建 ➤ Playground**。（如果你看到 Xcode 欢迎屏幕，也可以点击 **开始使用\
    \ playground**。）Xcode 会要求你输入 playground 的名称和平台，如图 5-1 所示。\n\n![A978-1-4842-1233-2_5_Fig1_HTML.jpg](img/A978-1-4842-1233-2_5_Fig1_HTML.jpg)\n\
    \n**图 5-1.** 创建一个 playground 文件\n\n3. 点击 **名称** 文本字段，输入 `IntroductoryPlayground`。\n\
    4. 点击 **平台** 弹出菜单，选择 `OS X`。Xcode 会询问你想将 playground 文件保存在哪里。\n5. 点击你想保存 playground\
    \ 文件的文件夹，然后点击 **创建** 按钮。Xcode 会显示 playground 文件，如图 5-2 所示。\n\n![A978-1-4842-1233-2_5_Fig2_HTML.jpg](img/A978-1-4842-1233-2_5_Fig2_HTML.jpg)\n\
    \n**图 5-2.** Playground 窗口\n\n6. 将第二行编辑为如下内容：`var str = \"This is the Swift interpreter\"\
    `\n\n请注意，playground 窗口会立即在右侧空白处显示代码更改的结果，如图 5-3 所示。\n\n![A978-1-4842-1233-2_5_Fig3_HTML.jpg](img/A978-1-4842-1233-2_5_Fig3_HTML.jpg)\n\
    \n**图 5-3.** Playground 窗口会立即显示代码更改\n\nPlaygrounds 让你可以自由地试验 `Swift` 并访问 Cocoa\
    \ 框架中的每个类，而无需担心让你的 `Swift` 代码与用户界面协同工作。\n"
- fmt: '# 排版后的 Markdown 内容


    ## Creating Comments in Swift


    The simplest commands to type in any programming language are comments. A comment
    is any text that exists solely for humans to read. In the top of the Playground
    file, you can see a comment that appears in green that reads:


    `// Playground – noun: a place where people can play`


    Comments let you leave notes about code such as the name of the person who wrote
    it, the date it was last modified, a description of what the code does and what
    other files it may depend on, or anything else you think might be useful for you
    (or another programmer) to read in the future.


    If you just need to write a comment on a single line, you can use the `//` symbols.
    Anything that appears to the right of the `//` symbols are comments that the computer
    completely ignores. Xcode helps identify comments by displaying text in green.


    If you need to write a command that spans two or more lines, you can type multiple
    `//` symbols in front of each line, but another solution is to define the beginning
    of a comment with the `/*` symbols and define the ending of that comment with
    the `*/` symbols such as:


    `/* This is a comment that`


    `spans multiple lines */`


    Comments exist for your benefit so feel free to use them whenever you need to
    write and store crucial information about your code.


    **Note**


    One popular use for comments is to temporarily disable Swift code without having
    to erase it. By disabling one or more lines of Swift code by turning them into
    a comment, you can see how your program runs as if any commented lines of code
    were deleted. When you’re done testing, you can remove the comment symbols and
    put your code back in your program without retyping it all over again.


    ## Storing Data in Swift


    Every program needs to accept data, manipulate that data somehow, and display
    that result to the user. To accept data, programs need to store data temporarily
    in memory. Technically, computers store data in memory addresses, which can be
    confusing to remember. To make it easier to know where data gets stored, programming
    languages let you give those memory addresses descriptive names. In Swift, those
    two choices are called:


    *   Variables

    *   Constants


    The idea behind both variables and constants is that you define a descriptive
    name and assign it to hold data such as:


    `str = "This is the Swift interpreter"`


    In the above example, `str` is the descriptive name, and `"This is the Swift interpreter"`
    is the data that gets stored. Data can either be a text string or a number such
    as an integer (3, 12, -9, etc.) or a decimal also known as a floating-point number
    (12.84, -0.83, 8.02, etc.). At any given time, you can store one chunk of data
    in a descriptive name, which can be defined as a variable or a constant.


    The main difference between a variable and a constant is that you can reuse a
    variable by storing new data as many times as you want (hence the name “variable”).
    A constant only lets you store data in it once.


    To define a variable, you have to use the `var` keyword like this:


    `var str = "This is the Swift interpreter"`


    To define a constant, you have to use the `let` keyword like this:


    `let str = "This is the Swift interpreter"`


    The first time you store data in a variable or a constant, Swift infers the data
    type such as:


    *   Text strings (defined as `String`)

    *   Integers (defined as `Int`)

    *   Decimal numbers (defined by `Float` and `Double`)


    Knowing the data type a variable or constant can hold is crucial because it can
    only hold one type of data and nothing else. So if you create a variable and store
    a string in it, that variable can only store strings from now on.


    **Note**


    Swift is known as a type-safe programming language because it explicitly defines
    the type of data each variable or constant can store.


    To make it clear what type of data a variable or constant can hold, you can explicitly
    define the data type such as:


    `var cat: String`


    `var dog: Int`


    `var fish: Float`


    `var snake: Double`


    Based on these data type declarations, the `cat` variable can only store strings,
    the `dog` variable can only store integers, the `fish` variable can only hold
    floating-point numbers, and the `snake` variable can only hold double-precision
    floating-point numbers.


    If you try to store the wrong type of data in a variable or constant, Swift won’t
    let you. This is to prevent problems when a program tries to use the wrong type
    of data. For example, if a program asks the user for how many items to order and
    the user types in "five" instead of the number 5, the program would have no idea
    how to do a mathematical calculation on "five," which would cause the program
    to either crash or work erratically.


    **Note**


    Both a `Float` and a `Double` data type can hold decimal numbers. The difference
    is that a `Double` data type can hold more precise decimal numbers that contain
    additional decimal places along with smaller and larger values. If you just need
    to use decimal numbers, use `Float` since it takes less memory than `Double`.
    If you need precise accuracy with decimal numbers, use `Double`. When Swift infers
    a decimal number, it infers a `Double` data type.


    Swift gives you three ways to define a variable or a constant:


    *   `let cat = "Oscar" // Infers String data type`

    *   `let cat: String = "Oscar"`

    *   `let cat: String` `cat = "Oscar"`


    The first method lets you store data directly into a variable or constant. Based
    on the type of data you first store, Swift infers the data type as `String`, `Int`,
    or `Double` (not a `Float` because a `Float` stores less precise decimal numbers
    than `Double` and Swift assumes you want exact precision).'
