    \ Xcode，你就能利用现在和未来众多有丰厚回报的编程机会。欢迎来到 Xcode 的世界！\n\n# 3. 创建 Mac 程序的基础\n\n电子补充材料：本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​3](http://dx.doi.org/10.1007/978-1-4842-1233-2_3)）包含补充材料，可供授权用户使用。\n\
    \n无论你想创建什么类型的 OS X 程序，比如视频游戏、为律师或股票经纪人定制的程序，你都将遵循相同的基本步骤。首先，你需要创建一个 OS X 项目。这会创建一个基本的\
    \ OS X 程序，包含一个通用的用户界面。\n\n其次，你需要以两种方式定制这个通用的 OS X 程序：向用户界面添加元素，以及编写 Swift 代码使程序实际执行某些操作。\n\
    \n第三，你需要运行并测试你的程序。在运行和测试程序之后，你很可能需要不断返回修改用户界面或 Swift 代码，以修复问题并添加新功能。最终，你的程序会达到一个（暂时）完成的状态，你可以发布它。然后你需要再次重复这些基本步骤来添加更多新功能。\n\
    \n通常，你花在修改程序上的时间会比创建新程序的时间多。然而，创建小程序来测试不同功能是很有用的。一旦这些较小的实验性程序可以工作了，你就可以将它们添加到另一个程序中。通过这样做，你不会有破坏一个正在运行的程序的风险。\n"
- fmt: "# Creating a Project\n\nThe first step to creating a program is to create\
    \ a new project. When you create a project, `Xcode` gives you the option of choosing\
    \ different templates, which provides basic functions. All you have to do is customize\
    \ the template. The four categories of OS X templates are shown in Figure [3-1](#A978-1-4842-1233-2_3_Chapter.html#Fig1):\n\
    \n![A978-1-4842-1233-2_3_Fig1_HTML.jpg](A978-1-4842-1233-2_3_Fig1_HTML.jpg)\n\n\
    Figure 3-1.\n\nThe four categories of OS X templates for creating a project\n\n\
    - Application\n- Framework & Library\n- System Plug-in\n- Other\n\nMost of the\
    \ time you’ll choose a template in the Application category, and the most common\
    \ template is `Cocoa Application`, which creates a standard OS X program with\
    \ pull-down menus and a window.\n\nThe other two Application templates are `Game`\
    \ (for creating video games) and `Command Line Tool` (for creating programs that\
    \ don’t need a traditional graphical user interface).\n\nThe `Framework & Library`\
    \ category is meant to create reusable software libraries. The `System Plug-in`\
    \ category is meant to create plug-ins for other type of programs. The `Other`\
    \ category is meant for creating programs that don’t fit into the other categories.\n\
    \nFor the purposes of this book, we’ll always use the `Cocoa Application` under\
    \ the OS X Application category. The other OS X categories are designed for advanced\
    \ programmers and won’t be covered in this book.\n\nWhen you create a `Cocoa Application`\
    \ project, you’ll need to define several items as shown in Figure [3-2](#A978-1-4842-1233-2_3_Chapter.html#Fig2):\n\
    \n![A978-1-4842-1233-2_3_Fig2_HTML.jpg](A978-1-4842-1233-2_3_Fig2_HTML.jpg)\n\n\
    Figure 3-2.\n\nDefining a `Cocoa Application` project\n\n- The name of your product\n\
    - The programming language to use (`Objective-C` or `Swift`)\n- Whether to use\
    \ storyboards or not for your user interface\n- Whether to create a document-based\
    \ application\n- Whether to use `Core Data`\n\nYour product’s name is completely\
    \ arbitrary but should be descriptive since `Xcode` will store all your files\
    \ in a folder using your chosen name.\n\nYour organization name and identifier\
    \ are also arbitrary and are typically assigned from your Apple Developer account.\
    \ Both of these can also be arbitrary strings if you want, but if you plan on\
    \ distributing your programs through the Mac App Store, they should be linked\
    \ to your Apple Developer account.\n\nThe Language pop-up menu lets you choose\
    \ `Objective-C` or `Swift`. For the purposes of this book, you always want to\
    \ choose `Swift`. `Objective-C` is a more complicated programming language that\
    \ Apple still supports, but it’s no longer considered Apple’s official programming\
    \ language.\n\nThe `Use Storyboards` check box lets you create a user interface\
    \ that either consists of a single window (a `.xib` file) or a series of windows\
    \ linked together (a `.storyboard` file). We’ll go over both methods for creating\
    \ a user interface, but unless instructed otherwise, leave the `Use Storyboards`\
    \ check box empty. That’s because storyboards are more complicated to use.\n\n\
    The `Create Document-Based Application` means that `Xcode` creates a `Cocoa Application`\
    \ that can open and manage multiple windows, such as the multiple windows available\
    \ in a word processor. Managing multiple windows is more complicated so leave\
    \ the `Create Document-Based Application` check box empty for now.\n\nThe `Use\
    \ Core Data` check box lets you store data typically for database applications\
    \ such as saving lists of names and addresses. Leave this check box blank since\
    \ this is for more advanced OS X programs.\n\nReady to create your first OS X\
    \ program? Then follow these steps:\n\nStart `Xcode`. If a `Welcome to Xcode`\
    \ screen appears as shown in Figure [3-3](#A978-1-4842-1233-2_3_Chapter.html#Fig3),\
    \ click `Create a new Xcode project`. If this welcome screen does not appear,\
    \ choose `File > New > Project` or choose `Window > Welcome to Xcode` to display\
    \ this screen so you can choose `Create a new Xcode project`. `Xcode` displays\
    \ a list of project templates (see Figure [3-1](#A978-1-4842-1233-2_3_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-1233-2_3_Fig3_HTML.jpg](A978-1-4842-1233-2_3_Fig3_HTML.jpg)\n\n\
    Figure 3-3.\n\nThe `Welcome to Xcode` opening screen\n\nClick `Application` under\
    \ the `OS X` category. A list of different OS X Application templates appears.\
    \  \nClick `Cocoa Application` and then click the `Next` button. `Xcode` now asks\
    \ for your project name (see Figure [3-2](#A978-1-4842-1233-2_3_Chapter.html#Fig2)).\
    \  \nClick in the `Product Name` text field and type `MyFirstProgram`.  \nClick\
    \ in the `Language` pop-up menu and make sure `Swift` appears.  \nMake sure all\
    \ check boxes are empty and then click the `Next` button. `Xcode` now asks where\
    \ you want to store your project.  \nClick on a folder where you want to store\
    \ your `Xcode` project and click the `Create` button. Congratulations! You’ve\
    \ just created your first OS X program. At this point, `Xcode` just created a\
    \ generic Macintosh program, but you haven’t had to write a single line of `Swift`\
    \ code or even design the user interface to create an actual working program.\
    \  \nChoose `Product > Run`, press `Command+R`, or click the `Run` icon. `Xcode`\
    \ runs your program called `MyFirstProgram` as shown in Figure [3-4](#A978-1-4842-1233-2_3_Chapter.html#Fig4).\
    \ Notice that the `MyFirstProgram` displays a menu bar with pull-down menus and\
    \ a window that you can move or resize on the screen. Because you used the `Cocoa\
    \ Application` template, `Xcode` automatically created all the code necessary\
    \ to create a generic Macintosh program.\n\n![A978-1-4842-1233-2_3_Fig4_HTML.jpg](A978-1-4842-1233-2_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4.\n\nThe `MyFirstProgram` running\n\nChoose `MyFirstProgram > Quit\
    \ MyFirstProgram`. `Xcode` appears. Keep your `MyFirstProgram` project open in\
    \ `Xcode` for the next section.\n\nWithout doing a thing, you managed to create\
    \ a program that looks and behaves like a typical Macintosh program. Of course,\
    \ this bare-bones Macintosh program won’t do anything interesting until you customize\
    \ the user interface and write `Swift` code to make the program do something useful."
  raw: '## Creating a Project


    The first step to creating a program is to create a new project. When you create
    a project, Xcode gives you the option of choosing different templates, which provides
    basic functions. All you have to do is customize the template. The four categories
    of OS X templates are shown in Figure [3-1](#A978-1-4842-1233-2_3_Chapter.html#Fig1):


    ![A978-1-4842-1233-2_3_Fig1_HTML.jpg](A978-1-4842-1233-2_3_Fig1_HTML.jpg)


    Figure 3-1.


    The four categories of OS X templates for creating a project


    *   Application

    *   Framework & Library

    *   System Plug-in

    *   Other


    Most of the time you’ll choose a template in the Application category, and the
    most common template is Cocoa Application, which creates a standard OS X program
    with pull-down menus and a window.


    The other two Application templates are Game (for creating video games) and Command
    Line Tool (for creating programs that don’t need a traditional graphical user
    interface).


    The Framework & Library category is meant to create reusable software libraries.
    The System Plug-in category is meant to create plug-ins for other type of programs.
    The Other category is meant for creating programs that don’t fit into the other
    categories.


    For the purposes of this book, we’ll always use the Cocoa Application under the
    OS X Application category. The other OS X categories are designed for advanced
    programmers and won’t be covered in this book.


    When you create a Cocoa Application project, you’ll need to define several items
    as shown in Figure [3-2](#A978-1-4842-1233-2_3_Chapter.html#Fig2):


    ![A978-1-4842-1233-2_3_Fig2_HTML.jpg](A978-1-4842-1233-2_3_Fig2_HTML.jpg)


    Figure 3-2.


    Defining a Cocoa Application project


    *   The name of your product

    *   The programming language to use (Objective-C or Swift)

    *   Whether to use storyboards or not for your user interface

    *   Whether to create a document-based application

    *   Whether to use Core Data


    Your product’s name is completely arbitrary but should be descriptive since Xcode
    will store all your files in a folder using your chosen name.


    Your organization name and identifier are also arbitrary and are typically assigned
    from your Apple Developer account. Both of these can also be arbitrary strings
    if you want, but if you plan on distributing your programs through the Mac App
    Store, they should be linked to your Apple Developer account.


    The Language pop-up menu lets you choose Objective-C or Swift. For the purposes
    of this book, you always want to choose Swift. Objective-C is a more complicated
    programming language that Apple still supports, but it’s no longer considered
    Apple’s official programming language.


    The Use Storyboards check box lets you create a user interface that either consists
    of a single window (a .xib file) or a series of windows linked together (a .storyboard
    file). We’ll go over both methods for creating a user interface, but unless instructed
    otherwise, leave the Use Storyboards check box empty. That’s because storyboards
    are more complicated to use.


    The Create Document-Based Application means that Xcode creates a Cocoa Application
    that can open and manage multiple windows, such as the multiple windows available
    in a word processor. Managing multiple windows is more complicated so leave the
    Create Document-Based Application check box empty for now.


    The Use Core Data check box lets you store data typically for database applications
    such as saving lists of names and addresses. Leave this check box blank since
    this is for more advanced OS X programs.


    Ready to create your first OS X program? Then follow these steps:


    Start Xcode. If a Welcome to Xcode screen appears as shown in Figure [3-3](#A978-1-4842-1233-2_3_Chapter.html#Fig3),
    click Create a new Xcode project. If this welcome screen does not appear, choose
    File ➤ New ➤ Project or choose Window ➤ Welcome to Xcode to display this screen
    so you can choose Create a new Xcode project. Xcode displays a list of project
    templates (see Figure [3-1](#A978-1-4842-1233-2_3_Chapter.html#Fig1)).


    ![A978-1-4842-1233-2_3_Fig3_HTML.jpg](A978-1-4842-1233-2_3_Fig3_HTML.jpg)


    Figure 3-3.


    The Welcome to Xcode opening screen   Click Application under the OS X category.
    A list of different OS X Application templates appears.   Click Cocoa Application
    and then click the Next button. Xcode now asks for your project name (see Figure
    [3-2](#A978-1-4842-1233-2_3_Chapter.html#Fig2)).   Click in the Product Name text
    field and type MyFirstProgram.   Click in the Language pop-up menu and make sure
    Swift appears.   Make sure all check boxes are empty and then click the Next button.
    Xcode now asks where you want to store your project.   Click on a folder where
    you want to store your Xcode project and click the Create button. Congratulations!
    You’ve just created your first OS X program. At this point, Xcode just created
    a generic Macintosh program, but you haven’t had to write a single line of Swift
    code or even design the user interface to create an actual working program.  
    Choose Product ➤ Run, press Command+R, or click the Run icon. Xcode runs your
    program called MyFirstProgram as shown in Figure [3-4](#A978-1-4842-1233-2_3_Chapter.html#Fig4).
    Notice that the MyFirstProgram displays a menu bar with pull-down menus and a
    window that you can move or resize on the screen. Because you used the Cocoa Application
    template, Xcode automatically created all the code necessary to create a generic
    Macintosh program.


    ![A978-1-4842-1233-2_3_Fig4_HTML.jpg](A978-1-4842-1233-2_3_Fig4_HTML.jpg)


    Figure 3-4.


    The MyFirstProgram running   Choose MyFirstProgram ➤ Quit MyFirstProgram. Xcode
    appears. Keep your MyFirstProgram project open in Xcode for the next section.


    Without doing a thing, you managed to create a program that looks and behaves
    like a typical Macintosh program. Of course, this bare-bones Macintosh program
    won’t do anything interesting until you customize the user interface and write
    Swift code to make the program do something useful.'
  trans: "\n# 创建项目\n\n创建程序的第一步就是新建一个项目。创建项目时，`Xcode` 会提供多种模板供你选择，这些模板提供了基础功能。你只需要自定义模板即可。OS\
    \ X 模板的四大类别如图 3-1 所示：\n\n![A978-1-4842-1233-2_3_Fig1_HTML.jpg](img/A978-1-4842-1233-2_3_Fig1_HTML.jpg)\n\
    \n图 3-1.\n用于创建项目的 OS X 模板四大类别\n\n- 应用程序（Application）\n- 框架与库（Framework & Library）\n\
    - 系统插件（System Plug-in）\n- 其他（Other）\n\n大多数情况下，你会选择“应用程序”类别中的模板，其中最常用的是 `Cocoa\
    \ Application`，它能创建一个带有下拉菜单和窗口的标准 OS X 程序。\n\n另外两个应用程序模板是 `Game`（用于创建视频游戏）和 `Command\
    \ Line Tool`（用于创建不需要传统图形用户界面的程序）。\n\n“框架与库”类别用于创建可复用的软件库。“系统插件”类别用于为其他类型的程序创建插件。“其他”类别则用于创建不属于其他类别的程序。\n\
    \n在本书中，我们将始终使用 OS X 应用程序类别下的 `Cocoa Application`。其他 OS X 类别是为高级程序员设计的，本书将不予涉及。\n\
    \n当你创建 `Cocoa Application` 项目时，需要定义几个项目，如图 3-2 所示：\n\n![A978-1-4842-1233-2_3_Fig2_HTML.jpg](img/A978-1-4842-1233-2_3_Fig2_HTML.jpg)\n\
    \n图 3-2.\n定义 `Cocoa Application` 项目\n\n- 产品名称\n- 要使用的编程语言（`Objective-C` 或 `Swift`）\n\
    - 是否在用户界面中使用 storyboard\n- 是否创建基于文档的应用程序\n- 是否使用 `Core Data`\n\n产品名称完全由你决定，但最好具有描述性，因为\
    \ `Xcode` 会使用你选择的名称创建一个文件夹来存储所有文件。\n\n组织名称和组织标识符也是任意的，通常来自你的 Apple Developer 账户。如果你愿意，这两项也可以设为任意字符串，但如果你计划通过\
    \ Mac App Store 分发程序，则应将它们与你的 Apple Developer 账户关联起来。\n\n“语言”弹出菜单让你选择 `Objective-C`\
    \ 或 `Swift`。在本书中，你应始终选择 `Swift`。`Objective-C` 是 Apple 仍在支持的更复杂的编程语言，但已不再被视为 Apple\
    \ 的官方编程语言。\n\n“使用 Storyboard”复选框可以让你创建用户界面，该界面可以包含单个窗口（一个 `.xib` 文件），也可以是一系列链接在一起的窗口（一个\
    \ `.storyboard` 文件）。我们将介绍创建用户界面的两种方法，但除非另有说明，否则请取消勾选“使用 Storyboard”复选框。这是因为 storyboard\
    \ 使用起来更复杂。\n\n“创建基于文档的应用程序”意味着 `Xcode` 会创建一个 `Cocoa Application`，它可以打开和管理多个窗口，例如文字处理器中的多个窗口。管理多个窗口较为复杂，所以暂时请取消勾选“创建基于文档的应用程序”复选框。\n\
    \n“使用 Core Data”复选框用于存储数据，通常用于数据库应用程序，如保存姓名和地址列表。请将此复选框留空，因为它适用于更高级的 OS X 程序。\n\
    \n准备好创建你的第一个 OS X 程序了吗？请按照以下步骤操作：\n\n启动 `Xcode`。如果出现如图 3-3 所示的 `Welcome to Xcode`\
    \ 屏幕，请点击 `Create a new Xcode project`。如果未出现此欢迎屏幕，请选择 `File > New > Project` 或选择\
    \ `Window > Welcome to Xcode` 来显示此屏幕，以便你能选择 `Create a new Xcode project`。`Xcode`\
    \ 会显示项目模板列表（参见图 3-1）。\n\n![A978-1-4842-1233-2_3_Fig3_HTML.jpg](img/A978-1-4842-1233-2_3_Fig3_HTML.jpg)\n\
    \n图 3-3.\n`Welcome to Xcode` 启动屏幕\n\n点击 `OS X` 类别下的 `Application`。会显示一系列不同的 OS\
    \ X 应用程序模板。  \n点击 `Cocoa Application`，然后点击 `Next` 按钮。`Xcode` 现在会询问你的项目名称（见图 3-2）。\
    \  \n点击 `Product Name` 文本字段，输入 `MyFirstProgram`。  \n点击 `Language` 弹出菜单，确保显示的是\
    \ `Swift`。  \n确保所有复选框都未勾选，然后点击 `Next` 按钮。`Xcode` 现在会询问你想将项目存储在哪里。  \n点击一个你想存储\
    \ `Xcode` 项目的文件夹，然后点击 `Create` 按钮。恭喜你！你已经成功创建了第一个 OS X 程序。至此，`Xcode` 刚刚创建了一个通用的\
    \ Macintosh 程序，而你甚至不需要编写一行 `Swift` 代码或设计用户界面来创建一个可实际运行的程序。  \n选择 `Product > Run`，按下\
    \ `Command+R`，或点击 `Run` 图标。`Xcode` 会运行你名为 `MyFirstProgram` 的程序，如图 3-4 所示。请注意，`MyFirstProgram`\
    \ 显示了一个带有下拉菜单的菜单栏和一个可在屏幕上移动或调整大小的窗口。因为你使用了 `Cocoa Application` 模板，`Xcode` 自动创建了创建通用\
    \ Macintosh 程序所需的所有代码。\n\n![A978-1-4842-1233-2_3_Fig4_HTML.jpg](img/A978-1-4842-1233-2_3_Fig4_HTML.jpg)\n\
    \n图 3-4.\n`MyFirstProgram` 正在运行\n\n选择 `MyFirstProgram > Quit MyFirstProgram`。`Xcode`\
    \ 会重新出现。请保持 `MyFirstProgram` 在 `Xcode` 中打开，以供下一节使用。\n\n你无需任何操作就成功创建了一个外观和行为都像典型\
    \ Macintosh 程序的程序。当然，这个极简的 Macintosh 程序在你自定义用户界面并编写 `Swift` 代码使其执行有用操作之前，不会做任何有趣的事情。"
- fmt: '# Designing a User Interface


    When designing a user interface, keep in mind the three purposes for any user
    interface:


    - To display information to the user

    - To get data from the user

    - To let the user give commands to the program


    When you design a user interface, every element must satisfy one of these criteria.
    Colors and lines might just seem decorative, but they can be useful to organize
    a user interface so users will know where to find information, how to input data,
    or how to give commands to the program.


    To create a user interface in `Xcode`, you need to follow a two-step process:


    - Use the Object Library to drag and drop items on to your user interface

    - Use the Inspector pane to customize each user interface item


    To see how to use the Object Library, let''s add a label, a text field, and a
    button to the `MyFirstProgram` user interface. The label will display text to
    the user; the text field will let the user type in data; and the button will make
    the program take the text from the text field, modify it by capitalizing every
    character, and place the modified uppercase text into the label.


    To do this, follow these steps:


    Make sure your `MyFirstProgram` project is loaded into `Xcode`. Choose **View**
    > **Navigators** > **Show Project Navigator** or press `Command+1` to view the
    list of all the files that make up your `MyFirstProgram` project. Click the `MainMenu.xib`
    file. `Xcode` displays the user interface. Notice that the actual window of your
    `MyFirstProgram` is not visible until you click the `MyFirstProgram` icon. Click
    the `MyFirstProgram` icon that appears in the pane between the Project Navigator
    and the user interface. This displays the window of the `MyFirstProgram` user
    interface as shown in Figure [3-5](#A978-1-4842-1233-2_3_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_3_Fig5_HTML.jpg](A978-1-4842-1233-2_3_Fig5_HTML.jpg)


    Figure 3-5. The `MyFirstProgram` icon displays the `MyFirstProgram` user interface


    Choose **View** > **Utilities** > **Show Object Library**. The Object Library
    appears in the bottom right corner of the `Xcode` window. Drag a Push Button from
    the Object Library and drop it near the bottom of your `MyFirstProgram` window.
    Notice that when you place the button in the middle and near the bottom of the
    window, blue guidelines appear to help you align user interface items as shown
    in Figure [3-6](#A978-1-4842-1233-2_3_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_3_Fig6_HTML.jpg](A978-1-4842-1233-2_3_Fig6_HTML.jpg)


    Figure 3-6. Using blue guidelines to place a Push Button near the bottom of the
    `MyFirstProgram` window


    Click in the Search field at the Object Library and type `label`. Notice that
    the Object Library now only displays label user interface items as shown in Figure
    [3-7](#A978-1-4842-1233-2_3_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_3_Fig7_HTML.jpg](A978-1-4842-1233-2_3_Fig7_HTML.jpg)


    Figure 3-7. Typing in the search field helps you easily find items in the Object
    Library


    Drag and drop the label from the Object Library to the middle of your `MyFirstProgram`
    window. Click the clear icon (the X in the gray circle) that appears in the right
    of the Search field at the bottom of the Object Library. The Object Library now
    displays all possible user interface items. Scroll through the Object Library
    until you find the Text Field item. Drag and drop the text field above the label
    so your entire user interface appears as shown in Figure [3-8](#A978-1-4842-1233-2_3_Chapter.html#Fig8).
    (Don''t worry about the exact position of each user interface item.)


    ![A978-1-4842-1233-2_3_Fig8_HTML.jpg](A978-1-4842-1233-2_3_Fig8_HTML.jpg)


    Figure 3-8. A label, text field, and button on the `MyFirstProgram` user interface


    At this point, you''ve customized the generic user interface. Now you have to
    customize each user interface item using the Inspector pane. Through the Inspector
    pane, you can choose different options for a user interface item, such as typing
    the exact width of a button or choosing a background color for a text field.


    When resizing or moving an item on the user interface, you can either type exact
    values into the Size Inspector pane, or you can just drag the mouse to resize
    or move an item. Either way is acceptable but the Size Inspector pane gives you
    precise control over items. Let''s see how to use the Inspector pane to customize
    our generic user interface.


    Click on the push button near the bottom of the `MyFirstProgram` window to select
    it. Choose **View** > **Utilities** > **Show Attributes Inspector**. The Attributes
    Inspector pane appears in the upper right corner of the `Xcode` window as shown
    in Figure [3-9](#A978-1-4842-1233-2_3_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_3_Fig9_HTML.jpg](A978-1-4842-1233-2_3_Fig9_HTML.jpg)


    Figure 3-9. The Attributes Inspector pane lets you customize the appearance of
    items


    Click in the Title text field that currently displays "Button." Delete any existing
    text in the Title text field, type `Change Case`, and press `Return`. The text
    on the push button now displays "Change Case." However, the button width is too
    narrow. Choose **View** > **Utilities** > **Show Size Inspector**. The Size Inspector
    pane appears in the upper right corner of the `Xcode` window. Click in the Width
    text field, change the value to `120` as shown in Figure [3-10](#A978-1-4842-1233-2_3_Chapter.html#Fig10),
    and press `Return`. `Xcode` changes the width of the push button.


    ![A978-1-4842-1233-2_3_Fig10_HTML.jpg](A978-1-4842-1233-2_3_Fig10_HTML.jpg)


    Figure 3-10. The Width text field appears in the Size Inspector pane


    Click on the label to select it. To modify the size of the label, we''ll need
    to open the Size Inspector pane, which we can do by choosing **View** > **Utilities**
    > **Show Size Inspector**, but there''s a faster method using either keystroke
    shortcuts or icons. Press `Option+Command+5` or just click the Size Inspector
    icon (it looks like a vertical ruler). The Size Inspector pane appears in the
    upper right corner of the `Xcode` window. Click in the Width text field, type
    `250`, and press `Return`. `Xcode` widens the width of your label.


    Click on the text field to select it. Press `Option+Command+5` or just click the
    Size Inspector icon (it looks like a vertical ruler). The Size Inspector pane
    appears in the upper right corner of the `Xcode` window. Click in the Width text
    field, type `250` and press `Return`. `Xcode` widens the width of your text field.
    At this point, all the user interface items appear off center. Drag each item
    until you see a blue guideline showing that you''ve centered it in the `MyFirstProgram`
    window as shown in Figure [3-11](#A978-1-4842-1233-2_3_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_3_Fig11_HTML.jpg](A978-1-4842-1233-2_3_Fig11_HTML.jpg)


    Figure 3-11. Using blue guidelines to center items on the user interface


    At this point, you''ve customized the appearance of your user interface. If you
    run this program, the user interface will look good but it won''t actually do
    anything. To make a user interface work, you need to finish two more steps:


    - Write Swift code

    - Connect your user interface to your Swift code


    You need to write Swift code to make your program calculate some useful result.
    You also need to connect your user interface to your Swift code so you can retrieve
    data from the user interface and display information back on the user interface.


    In this example, we''ll write Swift code that retrieves text from the text field,
    changes it to uppercase, then displays the uppercase text back on to the label
    when the user clicks the `Change Case` push button.


    So we need to write Swift code that converts text to uppercase. Then we need to
    connect the text field and the label so the Swift code can retrieve data from
    the text field and put new data on the label.


    To send or retrieve data from a user interface item so Swift code can access it,
    we need to use something called an `IBOutlet`. An `IBOutlet` essentially represents
    a user interface item (such as a label or a text field) as a variable that Swift
    code can use.'
  raw: '## Designing a User Interface


    When designing a user interface, keep in mind the three purposes for any user
    interface:


    *   To display information to the user

    *   To get data from the user

    *   To let the user give commands to the program


    When you design a user interface, every element must satisfy one of these criteria.
    Colors and lines might just seem decorative, but they can be useful to organize
    a user interface so users will know where to find information, how to input data,
    or how to give commands to the program.


    To create a user interface in Xcode, you need to follow a two-step process:


    *   Use the Object Library to drag and drop items on to your user interface

    *   Use the Inspector pane to customize each user interface item


    To see how to use the Object Library, let’s add a label, a text field, and a button
    to the MyFirstProgram user interface. The label will display text to the user;
    the text field will let the user type in data; and the button will make the program
    take the text from the text field, modify it by capitalizing every character,
    and place the modified uppercase text into the label.


    To do this, follow these steps:


    Make sure your MyFirstProgram project is loaded into Xcode.   Choose View ➤ Navigators
    ➤ Show Project Navigator or press Command+1 to view the list of all the files
    that make up your MyFirstProgram project.   Click the MainMenu.xib file. Xcode
    displays the user interface. Notice that the actual window of your MyFirstProgram
    is not visible until you click the MyFirstProgram icon.   Click the MyFirstProgram
