    无论你是使用“带有数字格式化器的文本框”项目创建一个新的文本框，还是将“数字格式化器”应用于现有文本框，都需要定义数字格式化器的设置。为此，请按照以下步骤操作：


    -   选择**视图 ➤ 实用工具 ➤ 显示属性检查器**。显示属性检查器面板会出现在`Xcode`窗口的右上角，如图 17-3 所示。


