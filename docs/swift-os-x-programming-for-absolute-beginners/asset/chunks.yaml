    @IBAction identifies a function that only runs when the user does something to
    a user interface item. If you look at the parameter list, you’ll see (sender:
    NSButton), which tells you that when the user clicks on a button, the changeCase
    function will run the Swift code enclosed within the curly brackets.


    The Swift code stored in any IBAction method typically manipulates data somehow.
    In this case, it converts text from a text field (represented by the IBOutlet
    variable messageText), converts it to uppercase, and then displays that uppercase
    text in a label (represented by the IBOutlet variable labelText).


    Since it’s possible for two or more user interface items to connect to the same
    IBAction method, the sender parameter identifies which button the user clicked
    on. Since this IBAction method only connects to one button, the sender parameter
    is ignored.


    IBAction methods are nothing more than special functions linked to items on your
    user interface. Within any program, you’ll likely have multiple IBAction methods
    (functions) along with any additional functions you may have defined.


