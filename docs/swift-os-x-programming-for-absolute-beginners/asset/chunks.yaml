    \ getter 和 setter 的方式如下：\n\n```\nclass blob {\n    var property1 : dataType =\
    \ value\n    var property2 : dataType {\n        get {\n            return valueHere\n\
    \        }\n        set {\n            property1 = valueHere\n        }\n    }\n\
    }\n```\n\n在 getter 中，你始终需要一个 `return` 关键字来向拥有该 getter 的属性返回一个值。在 setter 中，你必须将一个属性赋值给一个值。这个值可以是一个固定值，也可以是一个返回值计算表达式。\n\
    \n**注意：** 你不需要同时拥有 getter 和 setter。你可以只拥有一个 getter，通过省略 `get` 关键字，只将代码用花括号括起来即可缩短，就像本节开头的\
    \ shape 类示例那样。你也可以只拥有一个 setter，但你需要使用 `set` 关键字。\n\n在上面的例子中，每当 `property2` 被赋一个新值时，它都会使用其\
    \ setter 为 `property1` 定义一个新值。\n\nsetter 还可以接收一个值，并使用该值为另一个属性计算出新的结果。要接收一个值给 setter，你只需要创建一个放在圆括号中的变量，然后使用该值为另一个属性计算结果。如果你没有创建放在圆括号中的变量，那么可以直接使用默认参数名\
    \ `newValue`。下面的例子展示了如何使用 setter：\n\n```\nclass blob {\n    var property1 : dataType\
    \ = value\n    var property2 : dataType {\n        get {\n            return valueHere\n\
    \        }\n        set (newValue) {\n            property1 = valueHere based\
    \ on newValue\n        }\n    }\n}\n```\n\n要了解 getter 和 setter 是如何工作的，请按照以下步骤操作：\n\
    \n确保你的 `ClassPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass\
    \ shape {\n    var height : Int = 5\n    var width : Int {\n        return height\
    \ * 2\n    }\n}\n\nvar rectangle = shape()\nprint (rectangle.height)\nprint (rectangle.width)\n\
    \nrectangle.height = 20\nprint (rectangle.width)\n\nclass blob {\n    var height\
    \ : Int = 5\n    var width : Int = 10\n    var area : Int {\n        get {\n \
    \           return height * width\n        }\n        set {\n            height\
    \ = 24\n            width = 45\n        }\n    }\n}\n\nvar cat = blob()\ncat.area\n\
    cat.area = 129\n\nclass anotherBlob {\n    var height : Int = 5\n    var width\
    \ : Int = 10\n    var area : Int {\n        get {\n            return height *\
    \ width\n        }\n        set (newValue) {\n            height = newValue +\
    \ 10\n            width = newValue - 5\n        }\n    }\n}\n\nvar CEO = anotherBlob()\n\
    print (CEO.area)\nCEO.area = 247\nprint (CEO.height)\nprint (CEO.width)\n```\n\
    \n你可以把 getter 和 setter 看作是会改变其他属性的函数。不过，在使用 getter 和 setter 时要小心，因为如果你不了解它们的存在或工作原理，它们可能会导致意外的行为。图\
    \ 11-3 显示了上述代码的结果，以便你了解 getter 和 setter 如何影响属性。\n\n![A978-1-4842-1233-2_11_Fig3_HTML.jpg](img/A978-1-4842-1233-2_11_Fig3_HTML.jpg)\n\
    \n**图 11-3.** 使用 getter 和 setter 修改属性\n\n### 使用属性观察器\n\nSwift 提供了两个属性观察器，分别称为\
    \ `willSet` 和 `didSet`。`willSet` 属性观察器在属性接收值之前运行代码。`didSet` 属性观察器在属性接收值之后运行代码。\n\
    \n与 getter 和 setter 类似，属性观察器本质上也是在属性获得新值时运行的函数。`willSet` 和 `didSet` 属性观察器的基本结构与\
    \ getter 和 setter 的结构相同，如下所示：\n\n```\nvar property : dataType = initialValue {\n\
    \    willSet {\n    }\n    didSet {\n    }\n}\n```\n\n`willSet` 属性观察器在属性获得新值之前运行代码。`didSet`\
    \ 属性观察器在属性获得新值之后运行代码。要了解属性观察器是如何工作的，请按照以下步骤操作：\n\n确保你的 `ClassPlayground` 文件已加载到\
    \ Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass animal {\n    var IQ : Int\
    \ = 0\n    var legs : Int = 0 {\n        willSet {\n            IQ += 10\n   \
    \     }\n        didSet {\n            IQ -= 5\n        }\n    }\n}\n\nvar pet\
    \ = animal()\nprint (pet.IQ)\npet.legs = 4\nprint (pet.IQ)\n```\n\n在这个例子中，`IQ`\
    \ 属性的初始值为 0。请注意，当你将 `legs` 属性设置为 4 时，它会立即运行 `willSet` 属性观察器的代码，这将使 `IQ` 属性增加 10。然后，它会立即运行\
    \ `didSet` 属性观察器中的代码，该代码会减去 3，如图 11-4 所示。\n\n![A978-1-4842-1233-2_11_Fig4_HTML.jpg](img/A978-1-4842-1233-2_11_Fig4_HTML.jpg)\n\
    \n**图 11-4.** 使用属性观察器\n"
- fmt: "# Creating Methods\n\nA class that simply stores one or more properties can\
    \ be convenient for grouping related data together. However, what makes object-oriented\
    \ programming more useful is when objects can also manipulate their own data.\
    \ To create mini-programs for objects to run, you need to define functions (called\
    \ methods) inside a class.\n\nYou’ve already seen methods when you’ve linked push\
    \ buttons from the user interface to create an `IBAction` method in the Swift\
    \ code file. The simplest method inside a class performs the exact same function\
    \ like this:\n\n```\nclass countDown {\n\n    var counter = 10\n\n    func decrement()\
    \ {\n        counter--\n    }\n\n}\n```\n\nThis `decrement()` method simply subtracts\
    \ 1 from the `counter` property, which has an initial value of 10. To make this\
    \ method run, you have to specify the object name, a period, and the method name\
    \ like this:\n\n```\nvar counter = countDown()\ncounter.decrement()\n```\n\nThis\
    \ `decrement()` method does the exact same thing every time, which subtracts 1\
    \ from the `counter` property. A more interesting and flexible method would accept\
    \ data (one or more parameters) to modify the code in the method works such as:\n\
    \n```\nclass countDown {\n\n    var counter = 10\n\n    func decrement() {\n \
    \       counter--\n    }\n\n    func decrementByValue(step: Int) {\n        counter\
    \ -= step\n    }\n\n}\n```\n\nThe second method, `decrementByValue(step:)`, accepts\
    \ a single integer that gets stored in a variable called `step`. Then it subtracts\
    \ the value of `step` from the `counter` property as shown in Figure [11-5](#A978-1-4842-1233-2_11_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1233-2_11_Fig5_HTML.jpg](A978-1-4842-1233-2_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. Running a method that accepts a value\n\nWhen a method accepts\
    \ data, it can also return a specific value. To create such a method, you need\
    \ to identify the data type the method returns (using the `->` symbols) along\
    \ with the `return` keyword that defines the specific value to return.\n\nSo if\
    \ you wanted to create a method that returns a `Float` data type, you could define\
    \ a method such as:\n\n```\nclass mathBrain {\n\n    var tempValue: Float = 0\n\
    \n    func average(first: Float, second: Float) -> Float {\n        return (first\
    \ + second) / 2\n    }\n\n}\n```\n\nThis method accepts two `Float` numbers (stored\
    \ in variables called `first` and `second`) and returns a `Float` value. To call\
    \ this method, you would specify an object name, a period, the method name, and\
    \ two numbers that are `Float` data types.\n\nNotice that this method has two\
    \ parameters called `first` and `second`. When passing the first parameter, you\
    \ do not need to specify the parameter name (`first`) since it doesn’t have a\
    \ `#` symbol in front of it. However, when passing any other parameters, you must\
    \ specify the parameter name such as:\n\n```\nvar math = mathBrain()\nvar temp:\
    \ Float = math.average(4.0, second: 9.0)\nprint(temp)\n```\n\nTo see how to create\
    \ a set and add and remove data from it, create a new playground by following\
    \ these steps:\n\n1.  Start Xcode.\n2.  Choose File ➤ New ➤ Playground. (If you\
    \ see the Xcode welcome screen, you can also click on Get started with a playground.)\
    \ Xcode asks for a playground name and platform.\n3.  Click in the Name text field\
    \ and type `MethodPlayground`.\n4.  Click in the Platform pop-up menu and choose\
    \ OS X. Xcode asks where you want to save your playground file.\n5.  Click on\
    \ a folder where you want to save your playground file and click the Create button.\
    \ Xcode displays the playground file.\n6.  Edit the code as follows:\n\n```\n\
    import Cocoa\n\nclass mathBrain {\n\n    var tempValue: Float = 0\n\n    func\
    \ average(first: Float, second: Float) -> Float {\n        return (first + second)\
    \ / 2\n    }\n\n}\n\nvar math = mathBrain()\nvar temp: Float = math.average(4.0,\
    \ second: 9.0)\nprint(temp)\n```\n\nThe `average()` method accepts two parameters,\
    \ adds them together, and divides by 2. Then it uses the `return` keyword to return\
    \ this value.\n\nWhen the `average()` method gets past the numbers 4.0 and 9.0,\
    \ it returns a value of 6.5, which gets stored in a variable called `temp` as\
    \ shown in Figure [11-6](#A978-1-4842-1233-2_11_Chapter.html#Fig6).\n\n![A978-1-4842-1233-2_11_Fig6_HTML.jpg](A978-1-4842-1233-2_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6. Creating sets, inserting data in a set, and removing data from\
    \ a set\n\n# Using Objects in an OS X Program\n\nObjects can contain any number\
    \ of properties and those properties can hold simple data types such as integers\
    \ or strings, or more complicated data types such as tuples, sets, or arrays.\
    \ An object can also contain one or more methods that typically manipulate the\
    \ object’s properties.\n\nIn this sample program, you’ll define one class and\
    \ create two objects based on that class. You’ll also see how to store a class\
    \ in a separate file. Rather than cram everything into a single file, it’s easier\
    \ to store code in separate files.\n\nThe two objects will run methods stored\
    \ in the other object. The user interface will also retrieve values from both\
    \ object’s properties to display in the text field of the user interface.\n\n\
    To learn more about user interfaces, you’ll also see how to connect two buttons\
    \ to a single `IBAction` method and determine which button the user clicked. As\
    \ usual, you’ll see how to display data in a user interface item through an `IBOutlet`.\
    \ To create the sample program, follow these steps:\n\n1.  From within Xcode choose\
    \ File ➤ New ➤ Project.\n2.  Click Application under the OS X category.\n3.  Click\
    \ Cocoa Application and click the Next button. Xcode now asks for a product name.\n\
    4.  Click in the Product Name text field and type `ObjectProgram`.\n5.  Make sure\
    \ the Language pop-up menu displays Swift and that no check boxes are selected.\n\
    6.  Click the Next button. Xcode asks where you want to store the project.\n7.\
    \  Choose a folder to store your project and click the Create button.\n8.  Click\
    \ the `MainMenu.xib` file in the Project Navigator.\n9.  Click on the `ObjectProgram`\
    \ icon to make the window of the user interface appear.\n10.  Choose View ➤ Utilities\
    \ ➤ Show Object Library to make the Object Library appear in the bottom right\
    \ corner of the Xcode window.\n11.  Drag two Push Buttons, two Labels, and two\
    \ Text Fields on the user interface and double-click on the push buttons and labels\
    \ to change the text that appears on them so that it looks similar to Figure [11-7](#A978-1-4842-1233-2_11_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1233-2_11_Fig7_HTML.jpg](A978-1-4842-1233-2_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7. The user interface of the ObjectProgram\n\nThis user interface\
    \ will display the number of hit points for two characters: a sheriff and an outlaw.\
    \ Each time you click either the Sheriff Shoot or the Outlaw Shoot button, an\
    \ `IBAction` method will randomly determine if the other character was hit or\
    \ not. If so, it will also determine how much damage the shot causes, ranging\
    \ from 1 to 3. Any changes will appear in the text field under the Sheriff or\
    \ Outlaw label.\n\nThe Sheriff Shoot and Outlaw Shoot buttons runs an `IBAction`\
    \ method that first determines which button the user clicked: the Sheriff Shoot\
    \ or the Outlaw Shoot button. To identify which button the user clicked, you’ll\
    \ need to modify a Tag property on each button so the Sheriff Shoot button will\
    \ have a Tag value of 0 while the Outlaw Shoot button will have a Tag value of\
    \ 1.\n\nAfter determining whether the sheriff or the outlaw is shooting, the `IBAction`\
    \ method runs the `shoot()` method that randomly determines if the shot hit and\
    \ the damage it caused, which gets subtracted from the `hitPoints` property of\
    \ each object.\n\nThe total number of hit points appears in the text field under\
    \ the Sheriff and Outlaw label. The moment the total number of hit points for\
    \ either the sheriff or outlaw drops to 0 or less, an alert dialog appears to\
    \ let you know whether the sheriff or the outlaw died. To connect your user interface\
    \ to your Swift code, follow these steps."
  raw: '## Creating Methods


    A class that simply stores one or more properties can be convenient for grouping
    related data together. However, what makes object-oriented programming more useful
    is when objects can also manipulate their own data. To create mini-programs for
    objects to run, you need to define functions (called methods) inside a class.


    You’ve already seen methods when you’ve linked push buttons from the user interface
    to create an IBAction method in the Swift code file. The simplest method inside
    a class performs the exact same function like this:


    `class countDown {`


    `var counter = 10`


    `func decrement() {`


    `counter--`


    `}`


    `}`


    This decrement method simply subtracts 1 from the counter property, which has
    an initial value of 10\. To make this method run, you have to specify the object
    name, a period, and the method name like this:


    `var counter = countDown ()`


    `counter.decrement()`


    This decrement method does the exact same thing every time, which subtracts 1
    from the counter property. A more interesting and flexible method would accept
    data (one or more parameters) to modify the code in the method works such as:


    `class countDown {`


    `var counter = 10`


    `func decrement() {`


    `counter--`


    `}`


    `func decrementByValue (step : Int) {`


    `counter -= step`


    `}`


    `}`


    The second method, decrementByValue, accepts a single integer that gets stored
    in a variable called “step.” Then it subtracts the value of “step” from the counter
    property as shown in Figure [11-5](#A978-1-4842-1233-2_11_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_11_Fig5_HTML.jpg](A978-1-4842-1233-2_11_Fig5_HTML.jpg)


    Figure 11-5.


    Running a method that accepts a value


    When a method accepts data, it can also return a specific value. To create such
    a method, you need to identify the data type the method returns (using the ->
    symbols) along with the “return” keyword that defines the specific value to return.


    So if you wanted to create a method that returns a Float data type, you could
    define a method such as:


    `class mathBrain {`


    `var tempValue: Float = 0`


    `func average (first : Float, second : Float) -> Float {`


    `return (first + second) / 2`


    `}`


    `}`


    This method accepts two Float numbers (stored in variables called “first” and
    “second”) and returns a Float value. To call this method, you would specify an
    object name, a period, the method name, and two numbers that are Float data types.


    Notice that this method has two parameters called “first” and “second.” When passing
    the first parameter, you do not need to specify the parameter name (“first”) since
    it doesn’t have a # symbol in front of it. However, when passing any other parameters,
    you must specify the parameter name such as:


    `var math = mathBrain()`


    `var temp : Float = math.average(4.0, second: 9.0)`


    `print (temp)`


    To see how to create a set and add and remove data from it, create a new playground
    by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type MethodPlayground.  
    Click in the Platform pop-up menu and choose OS X. Xcode asks where you want to
    save your playground file.   Click on a folder where you want to save your playground
    file and click the Create button. Xcode displays the playground file.   Edit the
    code as follows:


    `import Cocoa`


    `class mathBrain {`


    `var tempValue: Float = 0`


    `func average (first : Float, second : Float) -> Float {`


    `return (first + second) / 2`


    `}`


    `}`


    `var math = mathBrain()`


    `var temp : Float = math.average(4.0, second: 9.0)`


    `print (temp)`


    The “average” method accepts two parameters, adds them together, and divides by
    2\. Then it uses the “return” keyword to return this value.


    When the average method gets past the numbers 4.0 and 9.0, it returns a value
    of 6.5, which gets stored in a variable called “temp” as shown in Figure [11-6](#A978-1-4842-1233-2_11_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_11_Fig6_HTML.jpg](A978-1-4842-1233-2_11_Fig6_HTML.jpg)


    Figure 11-6.


    Creating sets, inserting data in a set, and removing data from a set


    ## Using Objects in an OS X Program


    Objects can contain any number of properties and those properties can hold simple
    data types such as integers or strings, or more complicated data types such as
    tuples, sets, or arrays. An object can also contain one or more methods that typically
    manipulate the object’s properties.


    In this sample program, you’ll define one class and create two objects based on
    that class. You’ll also see how to store a class in a separate file. Rather than
    cram everything into a single file, it’s easier to store code in separate files.


    The two objects will run methods stored in the other object. The user interface
    will also retrieve values from both object’s properties to display in the text
    field of the user interface.


    To learn more about user interfaces, you’ll also see how to connect two buttons
    to a single IBAction method and determine which button the user clicked. As usual,
    you’ll see how to display data in a user interface item through an IBOutlet. To
    create the sample program, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type ObjectProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    MainMenu.xib file in the Project Navigator.   Click on the ObjectProgram icon
    to make the window of the user interface appear.   Choose View ➤ Utilities ➤ Show
    Object Library to make the Object Library appear in the bottom right corner of
    the Xcode window.   Drag two Push Buttons, two Labels, and two Text Fields on
    the user interface and double-click on the push buttons and labels to change the
    text that appears on them so that it looks similar to Figure [11-7](#A978-1-4842-1233-2_11_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_11_Fig7_HTML.jpg](A978-1-4842-1233-2_11_Fig7_HTML.jpg)


    Figure 11-7.


    The user interface of the ObjectProgram


    This user interface will display the number of hit points for two characters:
    a sheriff and an outlaw. Each time you click either the Sheriff Shoot or the Outlaw
    Shoot button, an IBAction method will randomly determine if the other character
    was hit or not. If so, it will also determine how much damage the shot causes,
    ranging from 1 to 3\. Any changes will appear in the text field under the Sheriff
    or Outlaw label.


    The Sheriff Shoot and Outlaw Shoot buttons runs an IBAction method that first
    determines which button the user clicked: the Sheriff Shoot or the Outlaw Shoot
    button. To identify which button the user clicked, you’ll need to modify a Tag
    property on each button so the Sheriff Shoot button will have a Tag value of 0
    while the Outlaw Shoot button will have a Tag value of 1.


    After determining whether the sheriff or the outlaw is shooting, the IBAction
    method runs the shoot method that randomly determines if the shot hit and the
    damage it caused, which gets subtracted from the hitPoints property of each object.


    The total number of hit points appears in the text field under the Sheriff and
    Outlaw label. The moment the total number of hit points for either the sheriff
    or outlaw drops to 0 or less, an alert dialog appears to let you know whether
    the sheriff or the outlaw died. To connect your user interface to your Swift code,
    follow these steps:'
  trans: "好的，作为一名高级文档工程师和翻译员，我将根据您提供的注意事项和示例，对给定的英文文本进行精确翻译。\n\n\n# 创建方法\n\n一个仅存储一个或多个属性的类，对于将相关数据分组在一起来说很方便。然而，面向对象编程更有用的地方在于，对象也可以操作它们自己的数据。要创建供对象运行的迷你程序，您需要在类内部定义函数（称为方法）。\n\
    \n当您将用户界面中的按钮链接起来，从而在 Swift 代码文件中创建一个 `IBAction` 方法时，您就已经见识过方法了。类内部最简单的方法执行的功能完全一样，如下所示：\n\
    \n```\nclass countDown {\n\n    var counter = 10\n\n    func decrement() {\n \
    \       counter--\n    }\n\n}\n```\n\n这个 `decrement()` 方法简单地从 `counter` 属性（初始值为\
    \ 10）中减去 1。要让这个方法运行，您必须指定对象名、句点和方法名，如下所示：\n\n```\nvar counter = countDown()\n\
    counter.decrement()\n```\n\n这个 `decrement()` 方法每次都执行完全相同的操作，即从 `counter` 属性中减去\
    \ 1。一个更有趣、更灵活的方法可以接受数据（一个或多个参数）来修改方法内部的代码执行逻辑，例如：\n\n```\nclass countDown {\n\n\
    \    var counter = 10\n\n    func decrement() {\n        counter--\n    }\n\n\
    \    func decrementByValue(step: Int) {\n        counter -= step\n    }\n\n}\n\
    ```\n\n第二个方法，`decrementByValue(step:)`，接受一个整数，该整数被存储在一个名为 `step` 的变量中。然后它从 `counter`\
    \ 属性中减去 `step` 的值，如图 11-5 所示。\n\n![A978-1-4842-1233-2_11_Fig5_HTML.jpg](img/A978-1-4842-1233-2_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 运行一个接受值的方法\n\n当一个方法接受数据时，它也可以返回一个特定的值。要创建这样的方法，您需要标识方法返回的数据类型（使用 `->`\
    \ 符号）以及定义要返回的具体值的 `return` 关键字。\n\n所以，如果您想创建一个返回 `Float` 数据类型的方法，您可以定义如下方法：\n\n\
    ```\nclass mathBrain {\n\n    var tempValue: Float = 0\n\n    func average(first:\
    \ Float, second: Float) -> Float {\n        return (first + second) / 2\n    }\n\
    \n}\n```\n\n这个方法接受两个 `Float` 数字（存储在名为 `first` 和 `second` 的变量中）并返回一个 `Float` 值。要调用这个方法，您需要指定一个对象名、句点、方法名以及两个\
    \ `Float` 数据类型的数字。\n\n请注意，这个方法有两个参数，名为 `first` 和 `second`。当传递第一个参数时，您无需指定参数名（`first`），因为它前面没有\
    \ `#` 符号。但是，在传递任何其他参数时，您必须指定参数名，例如：\n\n```\nvar math = mathBrain()\nvar temp:\
    \ Float = math.average(4.0, second: 9.0)\nprint(temp)\n```\n\n要了解如何创建一个集合以及如何向其中添加和移除数据，请按照以下步骤创建一个新的\
    \ playground：\n\n1.  启动 Xcode。\n2.  选择 文件 ➤ 新建 ➤ Playground。（如果您看到 Xcode 欢迎屏幕，也可以点击“开始使用\
    \ playground”。）Xcode 会要求您输入 playground 名称和平台。\n3.  点击名称文本字段，然后输入 `MethodPlayground`。\n\
    4.  点击平台弹出菜单，选择 OS X。Xcode 会询问您想要保存 playground 文件的位置。\n5.  点击一个您想要保存 playground\
    \ 文件的文件夹，然后点击“创建”按钮。Xcode 会显示 playground 文件。\n6.  按如下方式编辑代码：\n\n```\nimport Cocoa\n\
    \nclass mathBrain {\n\n    var tempValue: Float = 0\n\n    func average(first:\
    \ Float, second: Float) -> Float {\n        return (first + second) / 2\n    }\n\
    \n}\n\nvar math = mathBrain()\nvar temp: Float = math.average(4.0, second: 9.0)\n\
    print(temp)\n```\n\n`average()` 方法接受两个参数，将它们相加，然后除以 2。接着，它使用 `return` 关键字返回这个值。\n\
    \n当 `average()` 方法处理数字 4.0 和 9.0 时，它返回一个值为 6.5，该值被存储在一个名为 `temp` 的变量中，如图 11-6\
    \ 所示。\n\n![A978-1-4842-1233-2_11_Fig6_HTML.jpg](img/A978-1-4842-1233-2_11_Fig6_HTML.jpg)\n\
    \n图 11-6. 创建集合、向集合中插入数据以及从集合中移除数据\n\n# 在 OS X 程序中使用对象\n\n对象可以包含任意数量的属性，这些属性可以保存简单的数据类型（如整数或字符串），也可以保存更复杂的数据类型（如元组、集合或数组）。一个对象还可以包含一个或多个方法，这些方法通常用于操作对象的属性。\n\
    \n在这个示例程序中，您将定义一个类，并基于该类创建两个对象。您还将了解如何将一个类存储在一个单独的文件中。与其把所有东西都塞进一个文件，不如将代码存储在单独的文件中，这样更容易管理。\n\
    \n这两个对象将运行存储在另一个对象中的方法。用户界面还将从两个对象的属性中检索值，并显示在用户界面的文本字段中。\n\n为了更多地了解用户界面，您还将看到如何将两个按钮连接到一个\
    \ `IBAction` 方法，并确定用户点击了哪个按钮。像往常一样，您将看到如何通过 `IBOutlet` 在用户界面元素中显示数据。要创建这个示例程序，请遵循以下步骤：\n\
    \n1.  在 Xcode 中选择 文件 ➤ 新建 ➤ 项目。\n2.  在 OS X 类别下，点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
    \ 现在会要求您输入产品名称。\n4.  点击产品名称文本字段，然后输入 `ObjectProgram`。\n5.  确保语言弹出菜单显示为 Swift，并且没有勾选任何复选框。\n\
    6.  点击“下一步”按钮。Xcode 会询问您想要存储项目的位置。\n7.  选择一个文件夹来存储您的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击\
    \ `MainMenu.xib` 文件。\n9.  点击 `ObjectProgram` 图标以显示用户界面窗口。\n10.  选择 视图 ➤ 工具 ➤ 显示对象库，使对象库出现在\
    \ Xcode 窗口的右下角。\n11.  将两个“下压按钮”、两个“标签”和两个“文本字段”拖放到用户界面上，然后双击下压按钮和标签，以更改其上显示的文本，使其看起来类似于图\
    \ 11-7。\n\n![A978-1-4842-1233-2_11_Fig7_HTML.jpg](img/A978-1-4842-1233-2_11_Fig7_HTML.jpg)\n\
    \n图 11-7. ObjectProgram 的用户界面\n\n这个用户界面将显示两个角色的生命值点数：一个警长和一个亡命徒。每次您点击“警长射击”或“亡命徒射击”按钮时，一个\
    \ `IBAction` 方法将随机判定另一个角色是否被击中。如果是，它还会判定该枪造成的伤害，范围为 1 到 3。任何变化都会显示在“警长”或“亡命徒”标签下方的文本字段中。\n\
    \n“警长射击”和“亡命徒射击”按钮会运行一个 `IBAction` 方法，该方法首先确定用户点击的是哪个按钮：“警长射击”按钮还是“亡命徒射击”按钮。要识别用户点击了哪个按钮，您需要修改每个按钮上的“标记”属性，这样“警长射击”按钮的标记值将为\
    \ 0，而“亡命徒射击”按钮的标记值将为 1。\n\n在确定是警长还是亡命徒在射击之后，`IBAction` 方法会运行 `shoot()` 方法，该方法随机判定是否击中以及造成的伤害，这些伤害会从每个对象的\
    \ `hitPoints` 属性中减去。\n\n总的生命值点数会显示在“警长”和“亡命徒”标签下方的文本字段中。一旦警长或亡命徒的总生命值点数降至 0 或更低，一个警告对话框就会出现，告知您警长或亡命徒是否死亡。要将您的用户界面连接到\
    \ Swift 代码，请遵循以下步骤。\n"
