  trans: "\n# 在 OS X 程序中使用循环\n\n在这个示例程序中，计算机会在 1 到 10 之间随机选择一个数字。现在用户必须猜出这个数字。为了防止用户猜出\
    \ 1 到 10 范围之外的数字，用户界面将允许用户通过滑块选择数值。\n\n每次用户猜错时，标签会显示提示信息，告知猜测值过高或过低。当用户猜对数字时，一个循环会打印出每次猜测的列表，并在警告对话框中显示。\n\
    \n按照以下步骤创建一个新的 OS X 项目：\n\n在 Xcode 中选择 **文件** ➤ **新建** ➤ **项目**。点击 OS X 类别下的 **应用程序**。点击\
    \ **Cocoa 应用程序**，然后点击 **下一步** 按钮。Xcode 现在会要求输入产品名称。在 **产品名称** 文本字段中点击并输入 `LoopingProgram`。确保\
    \ **语言** 弹出菜单显示的是 **Swift**，且未选中任何复选框。点击 **下一步** 按钮。Xcode 会询问您希望将项目存储在何处。选择一个文件夹来存储您的项目，然后点击\
    \ **创建** 按钮。在 **项目导航器** 中点击 `MainMenu.xib` 文件。点击 `LoopingProgram` 图标，使用户界面窗口显示出来，如图\
    \ 8-6 所示。\n\n![A978-1-4842-1233-2_8_Fig6_HTML.jpg](img/A978-1-4842-1233-2_8_Fig6_HTML.jpg)\n\
    \n图 8-6.\n\n使用户界面窗口可见。选择 **视图** ➤ **实用工具** ➤ **显示对象库**，使 **对象库** 显示在 Xcode 窗口的右下角。将一个\
    \ **水平滑块**、两个 **标签** 和一个 **按钮** 拖到用户界面上，并调整它们的大小，使用户界面看起来类似于图 8-7。\n\n![A978-1-4842-1233-2_8_Fig7_HTML.jpg](img/A978-1-4842-1233-2_8_Fig7_HTML.jpg)\n\
    \n图 8-7.\n\n创建一个包含两个标签、一个水平滑块和一个按钮的基本用户界面。点击顶部的标签将其选中。然后选择 **视图** ➤ **实用工具** ➤\
    \ **显示属性检查器**。 **属性检查器** 面板会出现在 Xcode 窗口的右上角。在 **标题** 文本字段中点击并输入 `猜一个数字`。点击 **居中对齐**\
    \ 图标，如图 8-8 所示。\n\n![A978-1-4842-1233-2_8_Fig8_HTML.jpg](img/A978-1-4842-1233-2_8_Fig8_HTML.jpg)\n\
    \n图 8-8.\n\n标签的 **属性检查器** 面板。双击底部的标签，输入 `你的猜测 =`，然后按 **回车** 键。双击 **按钮**，输入 `猜测`，然后按\
    \ **回车** 键。您的用户界面应该看起来像图 8-9。\n\n![A978-1-4842-1233-2_8_Fig9_HTML.jpg](img/A978-1-4842-1233-2_8_Fig9_HTML.jpg)\n\
    \n图 8-9.\n\n完成后的用户界面。点击 **水平滑块** 将其选中，然后选择 **视图** ➤ **实用工具** ➤ **显示属性检查器**。 **属性检查器**\
    \ 面板会出现在 Xcode 窗口的右上角。选中 **“仅在刻度标记处停止”** 复选框。在 **“仅在刻度标记处停止”** 复选框正上方的文本字段中点击并输入\
    \ `10`。在 **最小值** 文本字段中点击并输入 `1`。在 **最大值** 文本字段中点击并输入 `10`。在 **当前值** 文本字段中点击并输入\
    \ `5`，如图 8-10 所示。\n\n![A978-1-4842-1233-2_8_Fig10_HTML.jpg](img/A978-1-4842-1233-2_8_Fig10_HTML.jpg)\n\
    \n图 8-10.\n\n更改水平滑块属性\n\n通过这个用户界面，用户可以使用水平滑块在 1 到 10 之间选择一个数字。如果用户猜的数值过高，标签会显示“过高”。如果用户猜的数值过低，标签会显示“过低”。\n\
    \n每次用户猜错时，底部的标签会显示错误的猜测值。当用户猜对数字时，顶部的标签会显示“你猜对了！”。\n\n在此示例中，我们需要两个 `IBOutlet`\
    \ 变量来连接到每个标签，以便我们可以在每个标签上显示信息。然后我们需要一个 `IBAction` 方法来连接到 **猜测** 按钮。这样，当用户点击 **猜测**\
    \ 按钮时，`IBAction` 方法可以检查用户是否使用水平滑块选择了正确的数字。\n\n我们需要编写 Swift 代码，在 1 到 10 之间选择一个随机数。然后我们将使用一个循环列出用户所做的所有猜测，并在警告对话框中显示这些结果。\n\
    \n要将 Swift 代码连接到您的用户界面，请执行以下步骤：\n\n在 Xcode 窗口中保持您的用户界面可见，选择 **视图** ➤ **助理编辑器**\
    \ ➤ **显示助理编辑器**。`AppDelegate.swift` 文件会出现在用户界面的旁边。将鼠标移到顶部的标签上，按住 **Control** 键，从顶部的文本字段拖拽到\
    \ `AppDelegate.swift` 文件中现有 `@IBOutlet` 行的下方，如图 8-11 所示。\n\n![A978-1-4842-1233-2_8_Fig11_HTML.jpg](img/A978-1-4842-1233-2_8_Fig11_HTML.jpg)\n\
    \n图 8-11.\n\n从顶部标签按住 Control 键拖拽到 `AppDelegate.swift` 文件。松开鼠标和 **Control** 键。会弹出一个弹出窗口，如图\
    \ 8-12 所示。\n\n![A978-1-4842-1233-2_8_Fig12_HTML.jpg](img/A978-1-4842-1233-2_8_Fig12_HTML.jpg)\n\
    \n图 8-12.\n\n用于定义 `IBOutlet` 的弹出窗口。在 **名称** 文本字段中点击并输入 `messageLabel`，然后点击 **连接**\
    \ 按钮。Xcode 会创建一个 `IBOutlet`。将鼠标移到底部的标签上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
    \ 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个弹出窗口。在 **名称** 文本字段中点击并输入 `guessLabel`，然后点击\
    \ **连接** 按钮。Xcode 会创建另一个 `IBOutlet`。将鼠标移到水平滑块上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
    \ 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个弹出窗口。在 **名称** 文本字段中点击并输入 `guessSlider`，然后点击\
    \ **连接** 按钮。Xcode 会创建另一个 `IBOutlet`。您现在应该有三个 `IBOutlet`，代表您用户界面上的两个文本字段：\n\n```\n\
    @IBOutlet weak var messageLabel: NSTextField!\n@IBOutlet weak var guessLabel:\
    \ NSTextField!\n@IBOutlet weak var guessSlider: NSSlider!\n```\n\n编辑 `IBOutlet`\
    \ 下方的内容，使其看起来像这样：\n\n```\nimport Cocoa\n\n@NSApplicationMain\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var window: NSWindow!\n\
    \    @IBOutlet weak var messageLabel: NSTextField!\n    @IBOutlet weak var guessLabel:\
    \ NSTextField!\n    @IBOutlet weak var guessSlider: NSSlider!\n\n    var randomNumber\
    \ : Int\n    var guessHistory : String\n    var guessNumber : Int\n    var guessArray\
    \ = [Int]()\n    var arrayTotal : Int\n\n    override init () {\n        self.guessHistory\
    \ = \"\"\n        self.guessNumber = 0\n        self.guessArray = []\n       \
    \ self.arrayTotal = 0\n        self.randomNumber = 1 + Int(arc4random_uniform(10))\n\
    \        // Int(arc4random_uniform(10)) 在 0 到 9 之间选择一个随机数，因此我们需要加 1，使其在 1 到 10\
    \ 之间选择随机数\n    }\n\n    func applicationDidFinishLaunching(aNotification: NSNotification)\
    \ {\n        // 在此处插入代码以初始化您的应用程序\n    }\n\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n        // 在此处插入代码以关闭您的应用程序\n    }\n```\n\n`IBOutlet` 变量连接到用户界面上的项目。\n\
    \n```\n@IBOutlet weak var window: NSWindow!\n\n@IBOutlet weak var messageLabel:\
    \ NSTextField!\n\n@IBOutlet weak var guessLabel: NSTextField!\n\n@IBOutlet weak\
    \ var guessSlider: NSSlider!\n```\n\n接下来的五行声明了整个类 `AppDelegate` 可以使用的变量。\n\n```\n\
    var guessHistory : String\n\nvar guessNumber : Int\n\nvar guessArray = [Int]()\n\
    \nvar arrayTotal : Int\n\nvar randomNumber : Int\n```\n"
- fmt: "当你在类内部定义变量（称为属性）时，需要为它们指定初始值。这就是重写`init`方法的目的：\n\n```\noverride init () {\n\
    \    self.guessHistory = \"\"\n    self.guessNumber = 0\n    self.guessArray =\
    \ []\n    self.arrayTotal = 0\n    self.randomNumber = 1 + Int(arc4random_uniform(10))\n\
    \    // Int(arc4random_uniform(10)) 会在0到9之间选择一个随机数，因此我们需要加1，使其在1到10之间选择随机数\n}\n\
    ```\n\n`self`关键字告诉Xcode所有这些变量都是在同一个类（`AppDelegate`类）内部定义的。最后一行创建了一个1到10之间的随机数。\n\
    \n整个程序的工作方式是：首先创建所有变量，然后运行重写的`init`方法来为这些变量存储初始值。\n\n将鼠标移到Guess按钮上，按住Control键，然后将鼠标拖拽到`AppDelegate.swift`文件中最后一个右花括号的上方。松开鼠标和Control键。此时会弹出一个窗口。在Connection弹出菜单中点击并选择Action来创建一个`IBAction`方法。在Name文本框中点击并输入`checkGuess`。在Type弹出菜单中点击并选择`NSButton`，如图8-13所示。\n\
    \n![A978-1-4842-1233-2_8_Fig13_HTML.jpg](A978-1-4842-1233-2_8_Fig13_HTML.jpg)\n\
    \n**图8-13. 定义一个`IBAction`方法**  \n点击Connect按钮。Xcode会创建一个空的`IBAction`方法。按下述方式修改`IBAction\
    \ checkGuess`方法：\n\n```\n@IBAction func checkGuess(sender: NSButton) {\n    var\
    \ userGuess : Int = 0\n    // 从水平滑块获取猜测值\n    userGuess = guessSlider.integerValue\n\
    \    // 将猜测值存储在guessArray中\n    guessArray.append(userGuess)\n    if userGuess\
    \ < randomNumber {\n        messageLabel.stringValue = \"Too Low\"\n    } else\
    \ if userGuess > randomNumber {\n        messageLabel.stringValue = \"Too High\"\
    \n    } else {\n        messageLabel.stringValue = \"You got it!\"\n        arrayTotal\
    \ = guessArray.count\n        for var i = 0; i < arrayTotal; i++ {\n         \
    \   guessHistory += \"Guess \\(i+1) = \\(guessArray[i])\" + \"\\r\\n\"\n     \
    \   }\n        var myAlert = NSAlert()\n        myAlert.messageText = guessHistory\n\
    \        myAlert.runModal()\n    }\n    guessLabel.stringValue = guessLabel.stringValue\
    \ + \" \\(userGuess)\"\n}\n```\n\n让我们逐一讲解这个`IBAction`方法，以便你准确理解其执行过程。首先，用户需要使用水平滑块选择一个数字进行猜测。选择数字后，用户需要点击Guess按钮，这将触发名为`checkGuess`的`IBAction`方法。\n\
    \n下面这行声明了一个名为`userGuess`的整型变量，并将其值设置为0。这行代码并非绝对必要，但它确保了`userGuess`变量有一个初始值。\n\n\
    ```\nvar userGuess : Int = 0\n```\n\n下一行从水平滑块中获取值，该滑块由名为`guessSlider`的`IBOutlet`变量表示。要获取水平滑块所代表的整数值，必须使用`integerValue`属性。这将把水平滑块的值存储到我们刚刚声明为整型变量的`userGuess`变量中。\n\
    \n```\nuserGuess = guessSlider.integerValue\n```\n\n下一行将存储在`userGuess`变量中的值添加到名为`guessArray`的数组中。这个数组必须在程序的前面部分定义。\n\
    \n```\nguessArray.append(userGuess)\n```\n\n`if-else if`语句创建了三个分支。第一个分支在`userGuess`变量小于`randomNumber`变量时执行，`randomNumber`必须在程序前面定义。这会在由`messageLabel`这个`IBOutlet`表示的标签中显示文本“Too\
    \ Low”。\n\n```\nif userGuess < randomNumber {\n    messageLabel.stringValue =\
    \ \"Too Low\"\n```\n\n第二个分支在`userGuess`变量大于`randomNumber`变量时执行。这会在`messageLabel`标签中显示文本“Too\
    \ High”。\n\n```\n} else if userGuess > randomNumber {\n    messageLabel.stringValue\
    \ = \"Too High\"\n```\n\n第三个分支在`userGuess`变量既不小于也不大于`randomNumber`变量时执行，这意味着它必须恰好等于`randomNumber`变量。这会在`messageLabel`标签中显示文本“You\
    \ got it!”。\n\n```\n} else {\n    messageLabel.stringValue = \"You got it!\"\n\
    ```\n\n然后，它统计存储在`guessArray`中的项目总数，并将这个值放入`arrayTotal`变量中，该变量必须在程序前面定义。\n\n```\n\
    arrayTotal = guessArray.count\n```\n\n现在，它使用一个`for`循环从0计数到`arrayTotal - 1`（`i\
    \ < arrayTotal`），每次递增1（`i++`）。它创建一个字符串，存储猜测序号（例如Guess 1）和用户选择的猜测值，放到名为`guessHistory`的字符串变量中，该变量必须在程序前面定义。请注意，你可以通过在字符串中使用`\\\
    (...)`字符来打印数字，其中非字符串值出现在圆括号内。这使你可以将非字符串值存储在字符串中，而无需先将它们转换为字符串数据类型。\n\n另请注意，如果你直接输入`\"\
    Guess \\(i)\"`，那么第一个字符串将存储值“Guess 0”作为第一次猜测。为避免这种情况，我们需要在当前`i`值上加1。\n\n注意，字符串末尾还包含字符`\"\
    \\r\\n\"`。这些符号分别代表回车符和换行符。这些是不可见字符，用于告诉Xcode，如果我们添加更多文本，它将显示在下一行。\n\n```\nfor\
    \ var i = 0; i < arrayTotal; i++ {\n    guessHistory += \"Guess \\(i+1) = \\(guessArray[i])\"\
    \ + \"\\r\\n\"\n}\n```\n\n`for`循环内部的代码使用复合赋值运算符（`+=`）将此字符串添加到`guessHistory`变量中已有的任何字符串中。由于`\"\
    \\r\\n\"`字符会创建回车和换行，任何新添加的字符串都将出现在下一行。\n\n接下来的三行创建一个警报对话框（`NSAlert`），将`guessHistory`变量中的字符串存储到警报对话框的`messageText`属性中，然后显示该对话框，以显示你猜了多少次以及每次猜测时选择的数字，如图8-14所示。\n\
    \n![A978-1-4842-1233-2_8_Fig14_HTML.jpg](A978-1-4842-1233-2_8_Fig14_HTML.jpg)\n\
    \n**图8-14. 警报对话框中显示的典型结果**\n\n```\nvar myAlert = NSAlert()\nmyAlert.messageText\
    \ = guessHistory\nmyAlert.runModal()\n```\n\n`IBAction`方法的最后一行仅将用户的猜测存储在`guessLabel`这个`IBOutlet`中，这使得文本显示在底部的标签中。\n\
    \n```\nguessLabel.stringValue = guessLabel.stringValue + \" \\(userGuess)\"\n\
    ```\n\n此时，程序等待用户通过水平滑块选择一个值并点击Guess按钮。\n\n选择Product ➤ Run。Xcode会运行你的`LoopingProgram`工程。在水平滑块上点击一个值来猜测一个数字。点击Guess按钮。如果你猜得太低或太高，会分别显示“Too\
    \ Low”或“Too High”消息。最终当你猜中正确的数字时，会弹出一个Alert对话框，如图8-15所示。\n\n![A978-1-4842-1233-2_8_Fig15_HTML.jpg](A978-1-4842-1233-2_8_Fig15_HTML.jpg)\n\
    \n**图8-15. 显示Alert对话框**  \n点击Alert对话框中的OK按钮使其消失。选择LoopingProgram ➤ Quit LoopingProgram。"
  raw: 'When you define variables (called properties) inside a class, you need to
    give them an initial value. That’s the purpose of the override init method:


    `override init () {`


    `self.guessHistory = ""`


    `self.guessNumber = 0`


    `self.guessArray = []`


    `self.arrayTotal = 0`


    `self.randomNumber = 1 + Int(arc4random_uniform(10))`


    `// Int(arc4random_uniform(10)) chooses a random number between 0 and 9, so we
    need to add 1 so it chooses a random number from 1 to 10`


    `}`


    The “self” keyword tells Xcode that all of these variables are defined inside
    the same class (class AppDelegate). The last line creates a random number between
    1 and 10.


    The way this entire program works is that it first creates all its variables.
    Then it runs the override init method to store initial values in these variables.


    Move the mouse over the Guess push button, hold down the Control key, and drag
    the mouse above the last curly bracket in the AppDelegate.swift file.   Release
    the mouse and the Control key. A pop-up window appears.   Click in the Connection
    pop-up menu and choose Action to create an IBAction method.   Click in the Name
    text field and type checkGuess.   Click in the Type pop-up menu and choose NSButton
    as shown in Figure [8-13](#A978-1-4842-1233-2_8_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_8_Fig13_HTML.jpg](A978-1-4842-1233-2_8_Fig13_HTML.jpg)


    Figure 8-13.


    Defining an IBAction method   Click the Connect button. Xcode creates a blank
    IBAction method.   Modify the IBAction checkGuess method as follows: `@IBAction
    func checkGuess(sender: NSButton) {`     `var userGuess : Int = 0`     `// Get
    guess from horizontal slider`     `userGuess = guessSlider.integerValue`     `//
    Store guess in guessArray`     `guessArray.append(userGuess)`     `if userGuess
    < randomNumber {`         `messageLabel.stringValue = "Too Low"`     `} else if
    userGuess > randomNumber {`         `messageLabel.stringValue = "Too High"`     `}
    else {`         `messageLabel.stringValue = "You got it!"`         `arrayTotal
    = guessArray.count`         `for var i = 0; i < arrayTotal; i++ {`             `guessHistory
    += "Guess \(i+1) = \(guessArray[i])" + "\r\n"`         `}`         `var myAlert
    = NSAlert()`         `myAlert.messageText = guessHistory`         `myAlert.runModal()`
        `}`     `guessLabel.stringValue = guessLabel.stringValue + " \(userGuess)"`
    `}`


    Let’s go through this IBAction method so you understand exactly what happens.
    First, the user needs to use the horizontal slider to pick a number to guess.
    After choosing a number, the user then needs to click the Guess button, which
    runs the IBAction method called checkGuess.


    The following line declares an integer variable called “userGuess” and sets its
    value to 0\. This line isn’t absolutely necessary but it does ensure that the
    “userGuess” variable has an initial value.


    `var userGuess : Int = 0`


    The next line retrieves the value from the horizontal slider, which is represented
    by the IBOutlet variable called “guessSlider.” To retrieve the integer that the
    horizontal slider represents, you have to use the integerValue property. This
    stores the value from the horizontal slider into the “userGuess” variable that
    we just declared as an integer variable.


    `userGuess = guessSlider.integerValue`


    The next line adds the value stored in the “userGuess” variable into the array
    called guessArray. This array must be defined earlier in your program.


    `guessArray.append(userGuess)`


    The if-else if statement creates three branches. The first branch runs if the
    “userGuess” variable is less than the “randomNumber” variable, which must be defined
    earlier in the program. This displays the text “Too Low” into the label represented
    by the messageLabel IBOutlet.


    `if userGuess < randomNumber {`


    `messageLabel.stringValue = "Too Low"`


    The second branch runs if the “userGuess” variable is greater than the “randomNumber”
    variable. This displays the text “Too High” into the label represented by the
    messageLabel IBOutlet.


    `} else if userGuess > randomNumber {`


    `messageLabel.stringValue = "Too High"`


    The third branch runs if the “userGuess” variable is neither less than or greater
    than the “randomNumber” variable, which means that it must be exactly equal to
    the “randomNumber” variable. This displays the text “You got it!” into the label
    represented by the messageLabel IBOutlet.


    `} else {`


    `messageLabel.stringValue = "You got it!"`


    Then it counts the total number of items stored in the guessArray and puts this
    value in the “arrayTotal” variable, which must be defined earlier in the program.


    `arrayTotal = guessArray.count`


    Now it uses a for loop to count from 0 to arrayTotal – 1 (i < arrayTotal) and
    increments by 1 (i++). It creates a string that stores the guess number, such
    as Guess 1, and the guess that the user chose in the string variable called “guessHistory,”
    which must be defined earlier in the program. Notice that you can print numbers
    in a string by using the \() characters where a non-string value appears inside
    the parentheses. This lets you store non-string values in a string without converting
    them to a string data type first.


    Also notice that if you simply typed “Guess \(i)” then the first string would
    hold the value “Guess 0” as the first guess. To avoid this, we need to add 1 to
    the current value of i.


    Notice that the string also contains the characters “\r\n” at the end. These symbols
    represent a carriage return and a newline character respectively. These are invisible
    characters that tell Xcode that if we add more text, it will appear on the next
    line down.


    `for var i = 0; i < arrayTotal; i++ {`


    `guessHistory += "Guess \(i+1) = \(guessArray[i])" + "\r\n"`


    `}`


    The code inside the for loop uses a compound assignment operator (+=) to add this
    string to any existing string stored in the “guessHistory” variable. Because of
    the “\r\n” characters that create a carriage return and a newline, any new string
    that gets added will appear on the next line down.


    The next three lines create an alert dialog (NSAlert), stores the string from
    the “guessHistory” variable into the messageText property of the alert dialog,
    and then displays the dialog to display how many guesses you took and the numbers
    you chose in each guess as shown in Figure [8-14](#A978-1-4842-1233-2_8_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_8_Fig14_HTML.jpg](A978-1-4842-1233-2_8_Fig14_HTML.jpg)


    Figure 8-14.


    The typical results that appear in an alert dialog


    `var myAlert = NSAlert()`


    `myAlert.messageText = guessHistory`


    `myAlert.runModal()`


    The last line of the IBAction method simply stores the user’s guesses in the guessLabel
    IBOutlet, which makes the text appear in the bottom label.


    `guessLabel.stringValue = guessLabel.stringValue + " \(userGuess)"`


    At this point, the program now waits for the user to choose a value in the horizontal
    slider and click the Guess button.


    Choose Product ➤ Run. Xcode runs your LoopingProgram project.   Click on a value
    in the horizontal slider to guess a number.   Click the Guess push button. If
    you guess too low or too high, the “Too Low” or “Too High” message appears. Eventually
    when you guess the correct number, an Alert dialog appears as shown in Figure
    [8-15](#A978-1-4842-1233-2_8_Chapter.html#Fig15).


    ![A978-1-4842-1233-2_8_Fig15_HTML.jpg](A978-1-4842-1233-2_8_Fig15_HTML.jpg)


    Figure 8-15.


    Displaying an Alert dialog   Click the OK button in the Alert dialog to make it
    go away.   Choose LoopingProgram ➤ Quit LoopingProgram.'
