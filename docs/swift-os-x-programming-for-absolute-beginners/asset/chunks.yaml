- fmt: "# Understanding Logical Operators\n\nAny comparison operator, such as `78\
    \ > 9` evaluates to a `true` or `false` value. However, Swift provides special\
    \ logical operators just for working with Boolean values as shown in Table 7-2.\n\
    \nTable 7-2. Common logical operators in Swift\n\n| Comparison operator | Purpose\
    \ |\n| --- | --- |\n| `&&` | And |\n| `\\|\\|` | Or |\n| `!` | Not |\n\nBoth the\
    \ And (`&&`) and Or (`\\|\\|`) logical operators take two Boolean values and convert\
    \ them into a single Boolean value. The Not (`!`) logical operator takes one Boolean\
    \ value and converts it to its opposite. Table 7-3 shows how the Not (`!`) logical\
    \ operator works:\n\nTable 7-3. The Not (`!`) logical operator\n\n| Example |\
    \ Value |\n| --- | --- |\n| `!true` | `false` |\n| `!false` | `true` |\n\nThe\
    \ And (`&&`) operator takes two Boolean values and calculates a single Boolean\
    \ value based on Table 7-4.\n\nTable 7-4. The And (`&&`) logical operator in Swift\n\
    \n| First Boolean Value | Second Boolean Value | Result |\n| --- | --- | --- |\n\
    | `true` && | `true` | `true` |\n| `true` && | `false` | `false` |\n| `false`\
    \ && | `true` | `false` |\n| `false` && | `false` | `false` |\n\nThe Or (`\\|\\\
    |`) operator takes two Boolean values and calculates a single Boolean value based\
    \ on Table 7-5.\n\nTable 7-5. The Or (`\\|\\|`) logical operator in Swift\n\n\
    | First Boolean Value | Second Boolean Value | Result |\n| --- | --- | --- |\n\
    | `true` \\|\\| | `true` | `true` |\n| `true` \\|\\| | `false` | `true` |\n| `false`\
    \ \\|\\| | `true` | `true` |\n| `false` \\|\\| | `false` | `false` |\n\nTo see\
    \ how Boolean values work with comparison and logical operators, create a new\
    \ playground by following these steps:\n\n1. Start Xcode.\n2. Choose File ➤ New\
    \ ➤ Playground. (If you see the Xcode welcome screen, you can also click on Get\
    \ started with a playground.) Xcode asks for a playground name and platform.\n\
    3. Click in the Name text field and type `BooleanPlayground`.\n4. Click in the\
    \ Platform pop-up menu and choose OS X. Xcode asks where you want to save your\
    \ playground file.\n5. Click on a folder where you want to save your playground\
    \ file and click the Create button. Xcode displays the playground file.\n6. Edit\
    \ the code as follows:\n\n```\nimport Cocoa\nvar x, y, z : Int\nx = 35\ny = 120\n\
    z = -48\nx == y\nx < y\nx > z\ny != z\nz > -48\n// And && operator\n(y != z) &&\
    \ (x > z)\n(y != z) && (x == y)\n(x == y) && (x < y)\n(z > -48) && (x == y)\n\
    // Or || operator\n(y != z) || (x > z)\n(y != z) || (x == y)\n(x == y) || (x <\
    \ y)\n(z > -48) || (x == y)\n```\n\nNotice how the comparison operators evaluate\
    \ to `true` or `false` and how the logical operators (And and Or) take two Boolean\
    \ values and return a single `true` or `false` value as shown in Figure 7-1.\n\
    \n![A978-1-4842-1233-2_7_Fig1_HTML.jpg](A978-1-4842-1233-2_7_Fig1_HTML.jpg)\n\n\
    Figure 7-1. Evaluating Boolean values with comparison and logical operators\n\n\
    Ultimately every Boolean value must be:\n\n*   A `true` or `false` value\n*  \
    \ A comparison of two values that is `true` or `false`\n*   A combination of Boolean\
    \ values using logical operators that evaluate to `true` or `false`\n\n## The\
    \ `if` Statement\n\nBoolean values are crucial for letting programs make choices.\
    \ If someone types in a password, a program checks to see if the password is valid.\
    \ If `true` (the password is valid), then the program grants access. If `false`\
    \ (the password is not valid), then the program blocks access.\n\nTo decide what\
    \ to do next, every program needs to evaluate a Boolean value. Only then can it\
    \ decide what to do next based on the value of that Boolean value.\n\nThe simplest\
    \ type of branching statement in Swift is an `if` statement, which looks like\
    \ this:\n\n```\nif BooleanValue == true {\n\n}\n```\n\nTo simplify this `if` statement,\
    \ you can eliminate the `== true` portion so the `if` statement looks like this:\n\
    \n```\nif BooleanValue {\n\n}\n```\n\nThis shortened version says, \"If the `BooleanValue`\
    \ is `true`, then run the code inside the curly brackets. If the `BooleanValue`\
    \ is `false`, then skip all the code inside the curly brackets without running\
    \ it.\"\n\nTo see how Boolean values work with an `if` statement, follow these\
    \ steps:\n\n1. Make sure the `BooleanPlayground` file is loaded in Xcode.\n2.\
    \ Edit the code as follows:\n\n```\nimport Cocoa\nvar BooleanValue : Bool = true\n\
    if BooleanValue {\n    print (\"The BooleanValue is true\")\n}\n```\n\nFigure\
    \ 7-2 shows the results of the `if` statement running. Change the value of `BooleanValue`\
    \ to `false` and you'll see that the `if` statement no longer prints the string\
    \ `\"The BooleanValue is true.\"`\n\n![A978-1-4842-1233-2_7_Fig2_HTML.jpg](A978-1-4842-1233-2_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2. Running an `if` statement\n\n## The `if-else` Statement\n\nThe `if`\
    \ statement either runs code or it runs nothing. If you want to run code if a\
    \ Boolean value is `false`, you could write two separate `if` statements as follows:\n\
    \n```\nif BooleanValue {\n\n}\n\nif !BooleanValue {\n\n}\n```\n\nThe first `if`\
    \ statement runs if the `BooleanValue` is `true`. If not, then it does nothing.\n\
    \nThe second `if` statement runs if the `BooleanValue` is `false`. If not, then\
    \ it does nothing.\n\nThe problem with writing two separate `if` statements is\
    \ that the logic of your program isn't as clear. To fix this problem, Swift offers\
    \ an `if-else` statement that looks like this:\n\n```\nif BooleanValue {\n   \
    \ // First set of code to run if true\n} else {\n    // Second set of code to\
    \ run if false\n}\n```\n\nAn `if-else` statement offers exactly two different\
    \ branches to follow. If a Boolean value is `true`, then the first set of code\
    \ runs. If a Boolean is `false`, then the second set of code runs. At no time\
    \ is it possible for both sets of code to run in an `if-else` statement.\n\nTo\
    \ see how Boolean values work with an `if-else` statement, follow these steps:\n\
    \n1. Make sure the `BooleanPlayground` file is loaded in Xcode.\n2. Edit the code\
    \ as follows:\n\n```\nimport Cocoa\nvar BooleanValue : Bool = true\nif BooleanValue\
    \ {\n    print (\"The BooleanValue is true\")\n} else {\n    print (\"The BooleanValue\
    \ is false\")\n}\n```\n\nFigure 7-3 shows how the `if-else` statement works when\
    \ the `BooleanValue` is `true`. Change the `BooleanValue` to `false` and see how\
    \ the `if-else` statement now runs the second set of code.\n\n![A978-1-4842-1233-2_7_Fig3_HTML.jpg](A978-1-4842-1233-2_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3. Running an `if-else` statement"
