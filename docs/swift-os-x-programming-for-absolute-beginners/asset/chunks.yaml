    mouse pointer over the Wrapping Text Field, hold down the Control key, and drag
    the mouse under the IBOutlet line in the AppDelegate.swift file.   Release the
    Control key and the mouse. A pop-up window appears.   Click in the Name text field,
    type messageBox, and click the Connect button. You should now have four new IBOutlets
    that look like this:   From within Xcode choose File ➤ New ➤ Project.   Click
    Application under the OS X category.   Click Cocoa Application and click the Next
    button. Xcode now asks for a product name.   Click in the Product Name text field
    and type CheckProgram.   Make sure the Language pop-up menu displays Swift and
    that no check boxes are selected.   Click the Next button. Xcode asks where you
