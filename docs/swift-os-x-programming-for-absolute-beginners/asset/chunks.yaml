    Selecting a radio button to modify   From within Xcode choose File ➤ New ➤ Project.
      Click Application under the OS X category.   Click Cocoa Application and click
    the Next button. Xcode now asks for a product name.   Click in the Product Name
    text field and type RadioProgram.   Make sure the Language pop-up menu displays
    Swift and that no check boxes are selected.   Click the Next button. Xcode asks
    where you want to store the project.   Choose a folder to store your project and
    click the Create button.   Click the MainMenu.xib file in the Project Navigator.
    Your program’s user interface appears.   Click the RadioProgram icon to display
    the window of your program’s user interface.   Choose View ➤ Utilities ➤ Show
    Object Library. The Object Library appears in the bottom right corner of the Xcode
    window.   Drag a Push Button and a Radio Group on to the user interface window.
      Click on the Radio Group and choose View ➤ Utilities ➤ Show Attributes Inspector
    to open the Show Attributes Inspector pane in the upper right corner of the Xcode
    window.   Modify the Rows and Columns to display three Rows and two Columns so
