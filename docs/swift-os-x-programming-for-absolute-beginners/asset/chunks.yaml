- fmt: "`ThingOne.change()`\n\n`ThingTwo.change()`\n\n`ObjectOne.textColor = ThingOne.myColor`\n\
    \n`ObjectTwo.textColor = ThingTwo.myColor`\n\n`ObjectTwo.drawsBackground = true`\n\
    \n`ObjectTwo.backgroundColor = ThingTwo.myBackground`\n\n`}`\n\nThis IBAction\
    \ method runs the `change()` method in both the `ThingOne` and `ThingTwo` objects,\
    \ which are based on the `one` and `two` classes respectively. The `two` class\
    \ inherits from the `one` class, but overrides the `change()` method to modify\
    \ an additional property called `myBackground`.\n\nAfter both `ThingOne` and `ThingTwo`\
    \ change their properties, the first label (represented by `ObjectOne`) assigns\
    \ its text color to the `myColor` property from the `ThingOne` object. The second\
    \ label (represented by `ObjectTwo`) changed its `myColor` and `myBackground`\
    \ properties, so it sets those properties to the label.\n\nThe complete contents\
    \ of the `AppDelegate.swift` file should look like this:\n\n```\nimport Cocoa\n\
    \n@NSApplicationMain\nclass AppDelegate: NSObject, NSApplicationDelegate {\n\n\
    \    @IBOutlet weak var window: NSWindow!\n    @IBOutlet weak var ObjectOne: NSTextField!\n\
    \    @IBOutlet weak var ObjectTwo: NSTextField!\n\n    class one {\n        var\
    \ myColor : NSColor = NSColor.blackColor()\n        func change() {\n        \
    \    myColor = NSColor.redColor()\n        }\n    }\n\n    class two : one {\n\
    \        var myBackground : NSColor = NSColor.whiteColor()\n        override func\
    \ change() {\n            myColor = NSColor.blueColor()\n            myBackground\
    \ = NSColor.greenColor()\n        }\n    }\n\n    var ThingOne = one()\n    var\
    \ ThingTwo = two()\n\n    func applicationDidFinishLaunching(aNotification: NSNotification)\
    \ {\n        // Insert code here to initialize your application\n    }\n\n   \
    \ func applicationWillTerminate(aNotification: NSNotification) {\n        // Insert\
    \ code here to tear down your application\n    }\n\n    @IBAction func changeButton(sender:\
    \ NSButton) {\n        ThingOne.change()\n        ThingTwo.change()\n        ObjectOne.textColor\
    \ = ThingOne.myColor\n        ObjectTwo.textColor = ThingTwo.myColor\n       \
    \ ObjectTwo.drawsBackground = true\n        ObjectTwo.backgroundColor = ThingTwo.myBackground\n\
    \    }\n\n}\n```\n\nTo see how this program works, follow these steps:\n\nChoose\
    \ InheritProgram ➤ Quit InheritProgram.\n\n![A978-1-4842-1233-2_12_Fig17_HTML.jpg](A978-1-4842-1233-2_12_Fig17_HTML.jpg)\n\
    \n**Figure 12-17.** Clicking the Change button modifies two different objects\
    \ with the same method name\n\nChoose Product ➤ Run. Xcode runs your InheritProgram\
    \ project. Notice that both labels look identical. Click the Change button. The\
    \ Object 1 label only changes its text color because it represented a class that\
    \ only has one property (`myColor`). The Object 2 label changes both its text\
    \ color and its background color because it has two properties (`myColor` and\
    \ `myBackground`). Even though the `change()` method name is identical in both\
    \ classes, it’s been overridden in the second class to modify the `myBackground`\
    \ property.\n\n## Summary\n\nClasses let you organize related code together where\
    \ data (properties) and functions (methods) to manipulate that data are stored\
    \ in the same place. The most straightforward way to extend the features of a\
    \ class is through inheritance where you create a subclass.\n\nInheritance lets\
    \ you inherit all the properties and methods of another class. A class can only\
    \ inherit from one other class, but it’s possible for that other class to inherit\
    \ from another class as well, creating a daisy-chain effect of classes inheriting\
    \ from other classes. The Cocoa framework is based on this idea of inheritance\
    \ among daisy chains of classes.\n\nTo block inheritance, you can use the `final`\
    \ keyword. To identify when you’re overriding a property or method, you need to\
    \ use the `override` keyword.\n\nBeyond inheritance, you can also extend the features\
    \ of a class through extensions and protocols. Protocols are commonly used with\
    \ the Cocoa framework to extend the features of a class. Through inheritance,\
    \ extensions, and protocols, you can extend the features of any class to make\
    \ it easy to reuse existing code.\n\n# 13. Creating a User Interface\n\nWhile\
    \ it’s possible to create programs that don’t need to interact with a user at\
    \ all (such as a program that controls a traffic light), it’s far more common\
    \ to create programs that display a user interface of some kind. Typically that\
    \ means showing a window filled with different items such as labels to display\
    \ text, text fields to allow the user to type something in, and buttons or pull-down\
    \ menus to give the user control over the program.\n\nCreating an effective user\
    \ interface depends entirely on the purpose of your program. A business program\
    \ typically follows standard conventions with pull-down menus and buttons, but\
    \ a video game may create a custom interface that may not look anything like a\
    \ standard OS X program. Ultimately a user interface needs to meet the needs of\
    \ the user. Given a choice between following standard user interface design conventions\
    \ or making a user interface easier for the user, focus on the user every time.\n\
    \nTo help you better understand user interface design, Apple provides a free document\
    \ called the OS X Human Interface Guidelines. This document gives a brief overview\
    \ of what makes a typical OS X user interface work effectively with special emphasis\
    \ on taking advantage of the latest features of OS X. By doing this, your OS X\
    \ program will look modern and up to date. Failure to take advantage of the latest\
    \ OS X features means your program could look dated even if it’s brand new.\n\n\
    In previous chapters you’ve designed simple user interfaces using Xcode. In this\
    \ chapter, we’ll dig a little deeper into the different parts of Xcode that focus\
    \ on helping you design user interfaces.\n\nRemember, there is no “perfect” design\
    \ for a user interface. The “perfect” user interface is one that makes tasks as\
    \ simple and effortless as possible to the point where the user doesn’t even notice\
    \ interacting with any user interface whatsoever. A user interface acts as the\
    \ middleman or translator between you and the program. The goal of any user interface\
    \ is to make users feel as if they’re communicating and manipulating a program\
    \ directly."
