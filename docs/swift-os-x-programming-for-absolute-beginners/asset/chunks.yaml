  trans: '

    # 4. 获取帮助


    学习任何新技能的最佳方式是由他人指点迷津。然而，并非总能如此，因此你会很高兴地发现，Xcode 内置了丰富的帮助功能，能让你的 Xcode 使用体验更轻松、更愉快。


    要使用 Xcode 的帮助功能，首先需要理解 Swift 程序如何运作，以及它们如何与 Cocoa 框架协同工作。一旦你理解了典型的 OS X 程序是如何工作的，以及它是如何依赖
    Cocoa 框架的，你就能更好地理解如何获取所需的帮助，以及如何理解通过 Xcode 找到的帮助信息。


    ## 理解 Cocoa 框架


    使用 Xcode 时，你必须明白，你创建的每一个程序都基于 Cocoa 框架，该框架使用了包含各种属性和方法的类。通过使用这些现有的类，你无需编写和测试自己的代码，从而节省时间。相反，你可以直接使用
    Cocoa 框架中已经可用的现有代码。这让你能腾出更多时间，专注于编写特定于你个人程序的代码。


    要使用 Cocoa 框架，你必须理解面向对象编程的原理以及对象的工作方式。要创建一个对象，你必须先定义一个类。一个类包含了定义属性（用于保存数据）和方法（用于操作其属性中存储的数据）的实际代码。一旦定义了类，你就可以基于该类定义一个或多个对象。


    就像饼干模具定义了饼干的形状，但本身并非饼干一样，类定义了对象，但本身并非对象。


    Cocoa 框架由多个类文件组成，其中许多类文件会从其他类文件继承属性和方法。当你创建一个 OS X 程序时，通常会基于 Cocoa 框架的类文件创建对象。实际上，你在对象库中创建的每个用户界面项都基于一个
    Cocoa 框架类。


    要查看每个用户界面项基于哪个类文件，让我们检查一下你创建的三个用户界面项：一个标签、一个文本字段和一个按钮：


    - 在 Xcode 中打开 `MyFirstProgram` 项目。

    - 点击 `MainMenu.xib` 文件。Xcode 将显示你的用户界面。

    - 选择 **视图** ➤ **工具** ➤ **显示对象库**。对象库会出现在 Xcode 窗口的右下角。

    - 点击对象库中的**按钮**项。将出现一个弹出窗口，如图 4-1 所示。请注意，此弹出窗口会告诉你按钮的类文件（`NSButton`）。


    ![A978-1-4842-1233-2_4_Fig1_HTML.jpg](img/A978-1-4842-1233-2_4_Fig1_HTML.jpg)


    图 4-1. 查找按钮的类文件


    - 点击**完成**按钮关闭弹出窗口。

    - 滚动浏览对象库，然后点击**标签**项。将出现一个弹出窗口，如图 4-2 所示。请注意，此弹出窗口会告诉你标签的类文件（`NSTextField`）。


    ![A978-1-4842-1233-2_4_Fig2_HTML.jpg](img/A978-1-4842-1233-2_4_Fig2_HTML.jpg)


    图 4-2. 查找标签的类文件


    - 滚动浏览对象库，然后点击**文本字段**项。将出现一个弹出窗口，如图 4-3 所示。


    ![A978-1-4842-1233-2_4_Fig3_HTML.jpg](img/A978-1-4842-1233-2_4_Fig3_HTML.jpg)


    图 4-3. 查找文本字段的类文件


    通过使用 Xcode 为对象库中每个项提供的简单帮助弹出窗口，我们了解了有关用户界面的以下信息：


    - 按钮基于 `NSButton` 类文件

    - 标签基于 `NSTextField` 类文件

    - 文本字段也基于 `NSTextField` 类文件

    - `NSTextField` 类继承自 `NSControl` 类（是 `NSControl` 类的子类）


    任何时候你需要查找某个用户界面项的类文件，只需在对象库窗口中点击该项即可。要了解每个用户界面项可用的属性和方法，我们需要查找该特定类的所有属性和方法。例如，如果我们想知道文本字段有哪些可用的属性和方法，就必须查找
    `NSTextField` 类定义的属性和方法。


    此外，由于 `NSTextField` 类继承自 `NSControl` 类，我们也可以使用 `NSControl` 类定义的任何属性和方法。（如果 `NSControl`
    类还继承了另一个类，那么我们也可以使用那个类中存储的属性和方法。）


    ## 在类文件中查找属性和方法


    一旦我们知道某个特定的用户界面项基于哪个类，就可以在 Xcode 的文档中查找其属性和方法列表。有两种方法可以做到这一点：


    - 选择 **帮助** ➤ **文档和 API 参考**

    - Option+点击你的 Swift 代码中的类名


    还记得我们需要在标签和文本字段中查找存储文本的属性吗？以下是查找此信息的步骤：


    - 确定每个用户界面项基于哪个类文件（`NSTextField`，我们通过在对象库中点击该项得知）

    - 查找 Xcode 关于 `NSTextField` 类文件的文档

    - 如果在 `NSTextField` 类文件中找不到所需信息，则查找 `NSControl` 类文件，因为 `NSTextField` 类从 `NSControl`
    类继承了所有属性和方法

