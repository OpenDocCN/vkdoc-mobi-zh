  trans: '

    # 在 OS X 程序中定义约束


    要充分理解约束的工作原理，你需要观察它们在实际程序中的应用。这样才能看到用户界面在每次调整窗口大小时是如何适配的。在这个示例程序中，我们将为按钮和文本字段定义关系约束，同时为图片定义宽高比约束。


    本章前面部分，你已经创建了一个名为 `UIProgram` 的 OS X 项目，我们将利用它来观察约束的实际效果：


    确保你的 `UIProgram` 项目已在 `Xcode` 中加载。点击项目导航器中的 `MainMenu.xib` 文件。点击 `UIProgram` 图标，调出用户界面的窗口。选择**视图**
    ➤ **工具** ➤ **显示对象库**，使对象库显示在 Xcode 窗口的右下角。向用户界面拖入一个按钮、一个文本字段和一个文本视图，使其外观与图 13-27
    相似。


    ![A978-1-4842-1233-2_13_Fig27_HTML.jpg](img/A978-1-4842-1233-2_13_Fig27_HTML.jpg)


    图 13-27.


    `InheritProgram` 的用户界面


    虽然这个用户界面目前看起来还可以，但一旦用户调整窗口大小，它就会变得很难看。选择**产品** ➤ **运行**，然后调整窗口大小，观察窗口缩小时如何裁剪或隐藏用户界面上的元素。现在扩大窗口大小，注意扩大后窗口内出现的空白区域。选择
    **UIProgram** ➤ **退出 UIProgram**，退出程序。


    首先，我们来定义窗口的最小尺寸，步骤如下：


    将鼠标指针移到用户界面窗口四周框架的右下角。拖动鼠标，直到出现蓝色参考线，显示按钮与窗口边缘之间的边界，如图 13-28 所示。


    ![A978-1-4842-1233-2_13_Fig28_HTML.jpg](img/A978-1-4842-1233-2_13_Fig28_HTML.jpg)


    图 13-28.


    调整用户界面窗口的尺寸 点击用户界面窗口周围的框架，选择**视图** ➤ **工具** ➤ **显示尺寸检查器**，显示窗口约束（见图 13-16）。勾选**最小尺寸**复选框，将当前窗口尺寸定义为最小尺寸。选择**产品**
    ➤ **运行**。调整用户界面窗口大小。注意，你只能将窗口缩小到一定尺寸。选择 **UIProgram** ➤ **退出 UIProgram** 退出程序。


    通过定义最小窗口尺寸，你已防止了用户将窗口缩得太小时用户界面被裁剪或元素消失的情况。现在让我们添加约束，使窗口放大时用户界面能够自适应调整。


    将鼠标指针移到按钮上，按住 **Control** 键，向右拖动鼠标，在接近窗口右边缘前停下，如图 13-29 所示。


    ![A978-1-4842-1233-2_13_Fig29_HTML.jpg](img/A978-1-4842-1233-2_13_Fig29_HTML.jpg)


    图 13-29.


    调整用户界面窗口的尺寸 松开 **Control** 键和鼠标。出现一个弹出式窗口。选择**尾随空间到容器**。注意，约束以橙色显示，表明按钮上的约束还不够。将鼠标指针移到按钮上，按住
    **Control** 键，向下拖动鼠标，在接近窗口底边前停下。松开 **Control** 键和鼠标。出现一个弹出式窗口。选择**底部空间到容器**。点击文本字段将其选中。选择**编辑器**
    ➤ **解决自动布局问题** ➤ **添加缺失约束**。Xcode 会自动添加约束，如图 13-30 所示。


    ![A978-1-4842-1233-2_13_Fig30_HTML.jpg](img/A978-1-4842-1233-2_13_Fig30_HTML.jpg)


    图 13-30.


    文本字段上的约束 将鼠标指针移到文本视图上的任意位置。按住 **Control** 键，以 45 度角向上或向下拖动鼠标，如图 13-31 所示。


    ![A978-1-4842-1233-2_13_Fig31_HTML.jpg](img/A978-1-4842-1233-2_13_Fig31_HTML.jpg)


    图 13-31.


    定义宽高比约束 松开 **Control** 键和鼠标。出现一个弹出式窗口。选择**宽高比**，以保持宽度和高度的比例。Xcode 会在文本视图周围显示橙色约束，表明文本视图上的约束不够。点击右下角的**解决自动布局问题**图标，选择**添加缺失约束**。Xcode
    会添加缺失的约束，此时它们显示为蓝色。选择**产品** ➤ **运行**。调整窗口大小。注意用户界面元素在窗口放大时是如何调整的。如你所见，无论用户如何调整窗口大小，约束都能将用户界面元素保持在适当的位置和尺寸。你可以随意尝试编辑约束，了解它们的工作方式。选择
    **UIProgram** ➤ **退出 UIProgram** 退出程序。


    ## 摘要


    程序的用户界面决定了用户与程序的交互方式。每个用户界面都需要显示信息、从用户处获取信息，并允许用户选择命令。理想情况下，用户界面应更侧重于使用程序，而非理解其工作原理。


    `对象库` 列出了所有可以添加到用户界面的元素，无论你使用的是 `.xib` 文件还是 `.storyboard` 文件。为了帮助你快速找到 `对象库` 中的元素，你可以在
    `对象库` 底部的搜索字段中输入完整的或部分单词进行搜索。


    约束可以帮助你的用户界面在用户调整程序窗口大小时始终保持美观。两种基本的约束类型如下：


    *   **关系约束**：定义相邻元素之间的距离，例如两个按钮之间，或按钮与窗口边缘之间的距离。

    *   **尺寸约束**：定义元素的高度、宽度或宽高比。


    你可以自行定义约束、让 Xcode 定义约束，或两者结合使用。定义约束可能是一个反复试验的过程，直到你的用户界面能以你期望的方式适应窗口大小的调整。


    # 使用视图和故事板


    电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​14](http://dx.doi.org/10.1007/978-1-4842-1233-2_14))
    包含补充材料，仅限授权用户使用。


    每个程序用户界面中最常见的部分是一个窗口，其中显示按钮和文本字段等元素。在 Xcode 中，窗口被称为 `视图`。除了最简单的程序外，大多数程序的用户界面可能包含两个或更多的窗口或视图。这意味着你的程序需要知道如何打开额外的窗口以及如何关闭它们。


    创建和存储视图的两种方式是使用 `.xib` 文件和 `.storyboard` 文件。一个 `.xib` 文件包含一个视图，因此如果需要显示多个视图，你需要创建多个
    `.xib` 文件。一个 `.storyboard` 文件可以包含一个或多个视图。


    你可以使用 `.xib` 文件、`.storyboard` 文件，或两者的组合来创建用户界面。通常，`.storyboard` 文件最适合逻辑上相互关联的窗口。`.storyboard`
    文件的最大优势在于，它能以逻辑顺序将多个视图连接起来。`.storyboard` 文件的最大劣势在于，如果你的程序中有多个视图，可能并不存在一个严格的逻辑顺序来按特定次序显示不同视图。在这种情况下，`.storyboard`
    文件可能会显得杂乱且难以组织。


    与了解如何设计一个良好的用户界面相比，使用 `.xib` 文件还是 `.storyboard` 文件并不那么重要——良好的用户界面应能使用户尽可能轻松地完成任务。

