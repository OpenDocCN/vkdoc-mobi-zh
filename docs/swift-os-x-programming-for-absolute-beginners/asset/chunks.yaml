- fmt: "### Polymorphism\n\nEvery object consists of data (stored in properties) and\
    \ subprograms (called methods) for manipulating that data. With inheritance, one\
    \ object can use the properties and methods defined in another object. However,\
    \ inheritance can create a problem when you need a subprogram (method) to use\
    \ different code.\n\nSuppose you created a video game. You might define a car\
    \ as one object and a monster as a second one. If the monster throws rocks at\
    \ the car, the rocks would be a third object. To make the car, monster, and rocks\
    \ move on the screen, you might create a method named `Move`.\n\nUnfortunately,\
    \ a car needs to move differently on the screen than a monster or a thrown rock.\
    \ You could create three subprograms and name them `MoveCar`, `MoveMonster`, and\
    \ `MoveRock`. However, a simpler solution is to just give all three subprograms\
    \ the same name such as `Move`.\n\nIn traditional programming, you can never give\
    \ the same name to two or more subprograms since the computer would never know\
    \ which subprogram you want to run. However in object-oriented programming, you\
    \ can use duplicate subprogram names because of polymorphism.\n\nPolymorphism\
    \ lets you use the same method names but replace it with different code. The reason\
    \ why polymorphism works is because each `Move` subprogram (method) gets stored\
    \ in a separate object such as one object that represents the car, a second object\
    \ that represents the monster, and a third object that represents a thrown rock.\
    \ To run each `Move` subprogram, you would identify the object that contains the\
    \ `Move` subprogram you want to use such as:\n\n- `Car.Move`\n- `Monster.Move`\n\
    - `Rock.Move`\n\nBy identifying both the object that you want to manipulate and\
    \ the subprogram that you want to use, object-oriented programming can correctly\
    \ identify which set of instructions to run even though one subprogram has the\
    \ identical name of another subprogram.\n\nEssentially, polymorphism lets you\
    \ create descriptive subprogram names and reuse that descriptive name as often\
    \ as you like when you also use inheritance.\n\nThe combination of encapsulation,\
    \ inheritance, and polymorphism forms the basis for object-oriented programming.\
    \ Encapsulation isolates one part of a program from another. Inheritance lets\
    \ you reuse code. Polymorphism lets you reuse method names but with different\
    \ code.\n\n## Understanding Programming Languages\n\nA programming language is\
    \ nothing more than a particular way to express ideas, much like human languages\
    \ such as Spanish, Arabic, Chinese, or English. Computer scientists create programming\
    \ languages to solve specific types of problems. That means one programming language\
    \ may be perfect to solve one type of problem but horrible at solving a different\
    \ type of problem.\n\nThe most popular programming language is C, which was designed\
    \ for low-level access to the computer hardware. As a result, the C language is\
    \ great for creating operating systems, anti-virus programs, and hard disk encryption\
    \ programs. Anything that needs to completely control hardware is a perfect task\
    \ for the C programming language.\n\nUnfortunately, C can be cryptic and sparse\
    \ because it was designed for maximum efficiency for computers without regard\
    \ for human efficiency for reading, writing, or modifying C programs. To improve\
    \ C, computer scientists created an object-oriented version of C called C++ and\
    \ a slightly different object-oriented version called Objective-C, which was the\
    \ language Apple adopted for OS X and iOS programming.\n\nBecause C was originally\
    \ designed for computer efficiency at the expense of human efficiency, all variants\
    \ of C including C++ and Objective-C can also be difficult to learn, use, and\
    \ understand. That’s why Apple created Swift. The purpose of Swift is to give\
    \ you the power of Objective-C while being far easier to learn, use, and understand.\
    \ Swift is basically an improved version of Objective-C, which was an improved\
    \ version of C.\n\nEach evolution of computer programming builds on the previous\
    \ programming standards. When you write programs in Swift, you can use Swift’s\
    \ unique features along with object-oriented features. In addition, you can also\
    \ use event-driven programming, structured programming, and the three basic building\
    \ blocks of programming (sequential, loops, and branching) when writing Swift\
    \ programs as well.\n\nSwift, like all computer programming languages, contain\
    \ a fixed list of commands known as keywords. To tell a computer what to do, you\
    \ have to use keywords to create statements that cause the computer to perform\
    \ a single task.\n\nKeywords act as building blocks for any programming language.\
    \ By combining keywords, you can create subprograms or functions that give a programming\
    \ language more power. For example, one keyword in Swift is `var`, which defines\
    \ a variable. One function defined in Swift is `print`, which prints data on the\
    \ screen.\n\nYou’ve already seen the `print` function that prints text such as:\n\
    \n`print(\"Hello, world!\")`\n\nThis Swift `print` function (which stands for\
    \ print line) works with any data enclosed in its parentheses. Just as learning\
    \ a human language requires first learning the basic symbols used to write letters\
    \ such as an alphabet or other symbols, so does learning a programming language\
    \ require first learning the keywords and functions of that particular programming\
    \ language.\n\nAlthough Swift contains dozens of keywords and functions, you don’t\
    \ have to learn all of them at once to write programs in Swift. You just have\
    \ to learn a handful of keywords and functions initially. As you get more experienced,\
    \ you’ll gradually need to learn additional Swift keywords and functions.\n\n\
    To make programming as easy as possible, Swift (like many programming languages)\
    \ uses keywords and functions that look like ordinary English words such as `print`\
    \ or `var` (short for variable). However, many programming languages, such as\
    \ Swift, also use symbols that represent different features.\n\nCommon symbols\
    \ are mathematical symbols for addition (`+`), subtraction (`-`), multiplication\
    \ (`*`), and division (`/`).\n\nSwift also uses curly brackets to group related\
    \ code that needs to run together such as:\n\n```\n{\n    print(\"This is a message\"\
    )\n    print(\"The message is done now\")\n}\n```"
