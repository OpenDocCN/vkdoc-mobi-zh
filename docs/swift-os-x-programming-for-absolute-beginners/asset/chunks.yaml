    \n图 11-9. Attributes Inspector 面板底部的 Tag 属性\n\n既然我们已经定义了用户界面，下一步是创建一个单独的 Swift\
    \ 文件来存放我们的类，您可以按照以下步骤操作：\n\n选择 `File ➤ New ➤ File`。出现一个对话框，要求选择模板。在“OS X”类别下单击“Source”，然后单击“Swift\
    \ File”，如图 11-10 所示。\n\n![A978-1-4842-1233-2_11_Fig10_HTML.jpg](img/A978-1-4842-1233-2_11_Fig10_HTML.jpg)\n\
    \n图 11-10. 选择用于存放类定义代码的文件\n\n单击“Next”按钮。Xcode 询问您想要将文件存储在哪里以及给它起什么名字。在“Save As”文本字段中单击并输入\
