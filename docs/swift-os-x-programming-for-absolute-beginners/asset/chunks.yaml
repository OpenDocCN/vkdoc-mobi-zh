    for other people? Perhaps you want to create a custom program for a particular
    person. Maybe you want to create a program that offers features that current programs
    lack. Whatever the reason, every program must ultimately satisfy the user.


    If you’re creating a program for your own use, then you’re the user. However if
    you’re creating programs for other people, then the user can be a specific person
    and computer (such as one dentist in your neighborhood dental office), or a general
    group of users (any dentist who needs to manage a dental office). Whoever the
    user might be, identify the single most important task your program must solve
    for that user. Then make sure your program accomplishes that one crucial task
    correctly.


    Note


    Between 2000 and 2005, the FBI spent $170 million dollars creating a program called
    Virtual Case File. The government eventually abandoned the entire project because
    of constantly changing specifications for what the program was supposed to do
    and how it was supposed to work. If you don’t know what a program is supposed
    to do, you won’t know how it’s supposed to achieve that result.


    Before writing any program, identify the following:


    *   Who is the user of the program?

    *   What is the program supposed to do for the user?

    *   How will the program achieve that result for the user?


    The user of your program completely determines the design of your program’s user
    interface. Compare the cockpit of a 777 jet airliner to the dashboard of a typical
    car. To the average person, a 777 cockpit may look intimidating, but to an experienced
    pilot, everything is within arm’s reach and easy to understand. If your program
    caters to specialists, your user interface can rely on the user’s knowledge to
    work. If your program caters to the general public, your user interface may need
    to guide the user more often.


    Every program must create a useful result for the user. Word processors organize
    text into neatly formatted pages, spreadsheets automatically and accurately calculate
    mathematical formulas, and even games provide entertainment. Imagine your program
    giving the user superpowers that the user can’t achieve any other way. What superpower
    will your program give to the user?'
