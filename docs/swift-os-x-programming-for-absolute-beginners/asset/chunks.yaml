  trans: '

    # 2. 认识 Xcode


    要在 Macintosh 上使用 Swift 编写程序，你需要用到 Xcode。Apple 开发了 Xcode 这一专业编程工具，并免费提供，以鼓励大家为
    OS X 和 iOS 编写软件。尽管是免费程序，Xcode 却是包括微软、Adobe、谷歌，甚至 Apple 在内的各大公司都在使用的强大工具。在你的 Macintosh
    上装上 Xcode，你就拥有了为创建 OS X 程序和 iOS 应用而准备的最强大的编程工具之一。


    虽然 Xcode 包含数十个专为专业程序员设计的功能，但任何人都可以学会使用它。Xcode 繁多的功能乍看之下可能令人困惑且望而生畏，但请放轻松。要使用 Xcode，你不需要学习所有可能的功能。相反，你只需学习你需要的那一小部分功能，其他的都可以忽略。随着经验的增长，你可以逐步学习
    Xcode 的其他功能。很多时候，某些 Xcode 功能你可能根本永远不会用到。


    Xcode 让你可以从头到尾创建一个 OS X 程序或 iOS 应用，而无需其他任何程序。在 Xcode 内部，你可以执行以下操作：


    - 创建新项目

    - 编写和编辑 Swift 代码

    - 设计和修改用户界面

    - 管理组成单个项目的文件

    - 运行和测试你的项目

    - 调试你的 Swift 代码


    你可以通过 Mac App Store 免费下载和安装 Xcode。在你的 Macintosh 上，只需点击 Apple 菜单并选择“App Store”。当
    App Store 窗口出现后，点击右上角的搜索文本字段，输入 `Xcode`，然后按回车键。现在你可以点击 Xcode 图标下方的按钮进行下载，如图 2-1
    所示。由于 Xcode 是一个相当大的文件，你需要快速的互联网连接和足够的空间来将其安装到你的 Macintosh 上。


    ![A978-1-4842-1233-2_2_Fig1_HTML.jpg](img/A978-1-4842-1233-2_2_Fig1_HTML.jpg)


    **图 2-1.** 当你搜索 Xcode 时，它通常出现在 App Store 窗口的左上角


    你将经常使用的 Xcode 四个最常见部分为：


    - 项目管理器

    - 编辑器

    - Interface Builder

    - 编译器


    一个项目代表一个单一的 OS X 或 iOS 程序。在过去程序简单的年代，你可以将代码存储在一个文件中。如今程序变得更大更复杂，将代码存储在不同的文件中更为常见。协同工作的文件集合构成一个项目，因此
    Xcode 的项目管理器允许你创建、重新排列和删除项目内的文件。


    每个项目都会包含的最常见文件类型之一是代码文件，通过 `.swift` 文件扩展名标识。代码文件是你可以存储、编辑和输入 Swift 代码的地方。通过使用
    Xcode 的编辑器，你可以打开代码文件，复制粘贴代码，删除代码，并编写新代码保存到该文件中。编辑器基本上就像一个为帮助你用 Swift 编程语言编写代码而设计的简单文字处理器。


    除了包含 Swift 代码的代码文件外，每个项目还会包含一个存储在不同文件中的用户界面，这些文件通过 `.xib` 或 `.storyboard` 文件扩展名标识。简单的程序可能只有一个包含其用户界面的文件，但更复杂的程序可能有多个文件包含用户界面的不同部分。Xcode
    中让你设计、创建和修改用户界面的功能称为 Interface Builder。


    在编写好 Swift 代码并设计好用户界面后，你需要将项目中的所有文件转换成一个实际可工作的程序。将 Swift 代码翻译成计算机能理解的语言（称为机器代码）的过程被称为编译，因此
    Xcode 中执行此操作的部分被称为编译器。


    你通常会以不同的顺序使用 Xcode 的这四个主要部分。例如，你可以先创建一个项目，并使用项目管理器功能修改其文件。然后你可能使用编辑器编写 Swift 代码，并使用
    Interface Builder 设计用户界面。最后，你将使用编译器测试你的程序。如果出现问题，你很可能需要无数次地回到编辑器或 Interface Builder，直到你的程序正常工作。你甚至可能在项目管理器中创建新文件并重新排列它们。


    最终，使用 Xcode 并没有唯一的“最佳”或“正确”方式。Xcode 在你需要时提供相应功能供你使用。


    ## 向 Xcode 下达命令


    与许多程序一样，Xcode 提供多种方式来完成完全相同的任务。例如，要打开一个项目，你可以选择“文件”➤“打开”，或按下 `Command+O`。通常，Xcode
    提供三种方式来执行常见的命令类型：


    - 使用屏幕顶部菜单栏中的下拉菜单

    - 按下独特的按键组合，如 `Command+O`

    - 点击代表某个命令的图标


    下拉菜单可以方便地帮助你找到特定命令，但使用起来可能较慢且笨拙，因为你必须点击菜单标题以下拉菜单，然后必须点击该菜单上出现的命令。


    按键组合更快更简便，但它们迫使你记住常用命令的晦涩按键组合。为了帮助你了解哪些命令有按键组合，可以查看每个下拉菜单，你会看到按键组合显示在不同命令的右侧，如图
    2-2 所示。（注意：并非所有命令都有按键组合。）


    ![A978-1-4842-1233-2_2_Fig2_HTML.jpg](img/A978-1-4842-1233-2_2_Fig2_HTML.jpg)


    **图 2-2.** 按键组合显示在下拉菜单中命令的右侧


    按键组合通常包括一个修饰键加上一个字母或功能键。四个修饰键包括 Command、Control、Option 和 Shift，如图 2-3 所示。


    ![A978-1-4842-1233-2_2_Fig3_HTML.jpg](img/A978-1-4842-1233-2_2_Fig3_HTML.jpg)


    **图 2-3.** 用于表示常见修饰键的符号


    点击图标选择命令可能是最快的方法，但你必须知道每个图标代表什么命令。为了帮助你理解图标的用途，只需将鼠标指针移到图标上并等待几秒钟。一个小窗口就会出现，简要描述该图标的用途，如图
    2-4 所示。


    ![A978-1-4842-1233-2_2_Fig4_HTML.jpg](img/A978-1-4842-1233-2_2_Fig4_HTML.jpg)


    **图 2-4.** 将鼠标指针悬停在图标上会显示该图标功能的简要描述


    有些人只使用下拉菜单，另一些人更依赖图标和按键快捷方式，还有一些人混合使用这三种方法。通常人们从下拉菜单开始，但当你开始频繁使用相同命令时，会逐渐转向图标和按键快捷方式。


    选择你喜欢的任何方法，但要注意你几乎总是有其他替代方案。重点是让你使用自己偏好的方法来舒适地使用 Xcode，这样你就能花更多时间进行创作，而花更少时间寻找你需要的命令。

    '
- fmt: '# Modifying the Xcode Window


    Because Xcode offers so many features, the Xcode window can look cluttered at
    times. To simplify the appearance of Xcode, you have several options:


    - Resize the Xcode window to make it larger (or smaller)

    - Close panes to hide parts of Xcode

    - Open panes to view parts of Xcode


    Like all Macintosh windows, the most straightforward way to resize the Xcode window
    is to move the mouse pointer over the edge or corner of the Xcode window until
    the mouse pointer turns into a two-way pointing arrow. Then drag the mouse to
    resize the window.


    A second way to resize the Xcode window is to click on the green dot in the upper
    left corner of the Xcode window. This expands the Xcode window to take up the
    full screen and hides the Xcode menu bar at the same time. To exit out of full
    screen mode, just press the `Esc` key on the keyboard.


    A third way to resize the Xcode window is to choose `Window ➤ Zoom`. This toggles
    between expanding the Xcode window to fill the screen while still displaying the
    Xcode menu bar, or shrinking the Xcode window back to its previous size.


    To reduce the amount of information displayed at any given time, Xcode has three
    panes that you can hide (or open) as shown in Figure [2-5](#A978-1-4842-1233-2_2_Chapter.html#Fig5):


    ![A978-1-4842-1233-2_2_Fig5_HTML.jpg](A978-1-4842-1233-2_2_Fig5_HTML.jpg)


    Figure 2-5. Xcode’s Navigator pane, Debug Area, and Utilities pane


    - The Navigator pane that displays information about your project

    - The Debug Area that lets you search for errors or bugs in your program

    - The Utilities pane that lets you customize different items on your user interface


    The Navigator pane displays several icons that let you switch between viewing
    different types of information. The most common use for the Navigator pane is
    to let you select a file to open by displaying the Project Navigator. To toggle
    between hiding and showing the Navigator pane, you have three options:


    - Choose `View ➤ Navigators ➤ Show/Hide Navigator`

    - Press `Command+0` (the number zero)

    - Click the Show/Hide Navigator Pane icon in the upper right corner of the Xcode
    window as shown in Figure [2-6](#A978-1-4842-1233-2_2_Chapter.html#Fig6)


    ![A978-1-4842-1233-2_2_Fig6_HTML.jpg](A978-1-4842-1233-2_2_Fig6_HTML.jpg)


    Figure 2-6. The Show/Hide Navigator Pane icon


    The Debug area is used when you want to check if your program is working correctly.
    While you’re designing your user interface or writing Swift code, you’ll likely
    want to hide this Debug area. To toggle between hiding and showing the Debug area,
    you have three options:


    - Choose `View ➤ Debug Area ➤ Show/Hide Debug Area`

    - Press `Shift+Command+Y`

    - Click the Show/Hide Debug Area icon in the upper right corner of the Xcode window
    as shown in Figure [2-7](#A978-1-4842-1233-2_2_Chapter.html#Fig7)


    ![A978-1-4842-1233-2_2_Fig7_HTML.jpg](A978-1-4842-1233-2_2_Fig7_HTML.jpg)


    Figure 2-7. The Show/Hide Debug Area icon


    The Utilities pane displays several icons that let you switch between showing
    different types of information. The most common use for the Utilities pane is
    to help you design and modify a user interface. To toggle between hiding and showing
    the Utilities Pane, you have three options:


    - Choose `View ➤ Utilities ➤ Show/Hide Utilities`

    - Press `Option+Command+0` (the number zero)

    - Click the Show/Hide Utilities icon in the upper right corner of the Xcode window
    as shown in Figure [2-8](#A978-1-4842-1233-2_2_Chapter.html#Fig8)


    ![A978-1-4842-1233-2_2_Fig8_HTML.jpg](A978-1-4842-1233-2_2_Fig8_HTML.jpg)


    Figure 2-8. The Show/Hide Utilities icon


    By selectively showing or hiding the Navigator pane, the Debug area, or the Utilities
    pane, you can make the Xcode window look less cluttered and provide more room
    for the parts of Xcode that you want to see. To quickly open or hide these three
    panes, it’s usually faster to click on the Show/Hide Navigator, Debug area, or
    Utilities icons in the upper right corner of the Xcode window.'
