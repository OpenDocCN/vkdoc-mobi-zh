    Figure 5-4.


    An error message warns that you cannot store data in a constant more than once
    Note


    Constants are also called “immutable” because they cannot be changed after you’ve
    stored data in them. Variables are called “mutable” because you can constantly
    change the data that they store. Just remember that variables can only hold one
    chunk of data at a time. The moment you store new data in a variable, any existing
    data in that variable gets wiped out.


    Modify the Swift code in the playground file by changing the constant to a variable
    (replacing “let” with “var”) as follows: `import Cocoa` `var cat: String` `cat
    = "Oscar"` `cat = 42.7`


