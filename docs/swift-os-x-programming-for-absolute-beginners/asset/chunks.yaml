    ## Summary


    You create your user interface and store them in multiple .xib files or a single
    .storyboard file that contains multiple scenes. To open and close different .xib
    files, you have to write Swift code. To open a scene in a storyboard, you just
    need to Control-drag from a button on one scene to another scene.


    To make a second scene close after opening it, you have to write Swift code. You
    also need to use Swift code to transfer data from one scene to another. When you
    transfer data from one scene to another, you use the representedObject property.
    To access any value in the representedObject property, you must unwrap it and
    cast or turn it into a specific data type.


    Storyboards let you define the order that scenes appear that make up your program’s
    user interface. To make it easy to see your entire storyboard, you can adjust
    the magnification to shrink or enlarge the storyboard. However when you want to
    place items on a storyboard scene, you must enlarge the magnification to 100%.


    When you add additional scenes in a storyboard, you’ll need to create Swift files
    that control those scenes. These Swift files need to be of the NSViewController
    class, and then you must connect your scene to that Swift file.


    Designing your program’s user interface involves using .xib or .storyboard files,
    or a combination of both. Storyboards reduce the need to write Swift code, but
    with both types of files, you’ll still need to write Swift code to make your user
    interface work completely.


    # 15. Choosing Commands with Buttons


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​15](http://dx.doi.org/10.1007/978-1-4842-1233-2_15))
    contains supplementary material, which is available to authorized users.


    Every program needs to give the user a way to control the computer. In the old
    days, that meant knowing how to type the proper commands to make a program work,
    but with today’s graphical user interfaces, the easier way to control a program
    is to choose from a list of available commands. The simplest way to give a command
    to a program is through a button.


    By displaying multiple buttons on the screen, a user interface offers multiple
    choices for the user at all times. Instead of memorizing cryptic commands, the
    user just needs to select a command by pointing at it with the mouse and clicking
    on it to choose it.


    Xcode provides a variety of different types of buttons you can place on a user
    interface, but they all work the same way. A button represents a single command,
    and clicking on that button runs Swift code stored in an IBAction method.


    To use buttons, just place them on a user interface (either a .xib or .storyboard
    file), modify the label to display the command you want the button to represent,
    and connect your button to Swift code through an IBAction method.


    All buttons are based on the NSButton class defined in the Cocoa framework. While
    most buttons display text that can contain the command the button represents,
    some buttons don’t display text at all. Despite the differences in appearance,
    all buttons work the same and can be changed into another button type at any time.
    The different button types available are shown in Figure [15-1](#A978-1-4842-1233-2_15_Chapter.html#Fig1):


    ![A978-1-4842-1233-2_15_Fig1_HTML.jpg](A978-1-4842-1233-2_15_Fig1_HTML.jpg)


    Figure 15-1.


    The different types of buttons you can place on a user interface


    *   Push Button

    *   Gradient Button

    *   Rounded Rect Button

    *   Rounded Textured Button

    *   Textured Button

    *   Recessed Button

    *   Disclosure Triangle (does not display text)

    *   Square Button (does not display text)

    *   Help Button (does not display text)

    *   Disclosure Button (does not display text)

    *   Round Button (does not display text)

    *   Bevel Button (does not display text)

    *   Inline Button


    Buttons without titles take up less space but may appear cryptic because the user
    has no idea what that button might do. The square and bevel buttons are often
    used to display images that represent commands.'
