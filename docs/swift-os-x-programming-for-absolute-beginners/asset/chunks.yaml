    \ var valueList = \"\"\n    for value in myDictionary.values {\n        valueList\
    \ = valueList + \"\\(value)\" + \" \"\n    }\n    queryValuesField.stringValue\
    \ = valueList\n}\n```\n\n`myDictionary.count`命令的作用是统计字典中键值对的数量，并将该数字显示在`queryCountField`这个`IBOutlet`中。\n\
    \n第一个 for-in 循环遍历字典中的每一个键，并将其存储在一个名为`keyList`的字符串中。然后，将这个文本字符串显示在`queryKeysField`这个`IBOutlet`中。\n\
    \n最后一个 for 循环遍历字典中的每一个值，并将其存储在一个名为`valueList`的字符串中。然后，将这个文本字符串显示在`queryValuesField`这个`IBOutlet`中。\n\
    \n`AppDelegate.swift`文件的完整内容应如下所示：\n\n```\nimport Cocoa\n\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var\
    \ window: NSWindow!\n    @IBOutlet weak var addKeyField: NSTextField!\n    @IBOutlet\
    \ weak var addValueField: NSTextField!\n    @IBOutlet weak var deleteKeyField:\
    \ NSTextField!\n    @IBOutlet weak var queryCountField: NSTextField!\n    @IBOutlet\
    \ weak var queryKeysField: NSTextField!\n    @IBOutlet weak var queryValuesField:\
    \ NSTextField!\n\n    var myDictionary = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"\
    ]\n\n    func applicationDidFinishLaunching(aNotification: NSNotification) {\n\
    \        // 在此处插入初始化应用程序的代码\n    }\n\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n        // 在此处插入清理应用程序的代码\n    }\n\n    @IBAction func addButton(sender:\
    \ NSButton) {\n        myDictionary.updateValue(addValueField.stringValue, forKey:\
    \ addKeyField.integerValue)\n    }\n\n    @IBAction func deleteButton(sender:\
    \ NSButton) {\n        myDictionary.removeValueForKey(deleteKeyField.integerValue)\n\
    \    }\n\n    @IBAction func queryButton(sender: NSButton) {\n        queryCountField.integerValue\
    \ = myDictionary.count\n        var keyList = \"\"\n        for key in myDictionary.keys\
    \ {\n            keyList = keyList + \"\\(key)\" + \" \"\n        }\n        queryKeysField.stringValue\
    \ = keyList\n        var valueList = \"\"\n        for value in myDictionary.values\
    \ {\n            valueList = valueList + \"\\(value)\" + \" \"\n        }\n  \
    \      queryValuesField.stringValue = valueList\n    }\n}\n```\n\n查询（Query）按钮的工作方式是：只需点击它，即可显示当前字典内容的相关信息。\n\
    \n添加（Add）按钮的工作方式是：用户在键（Key）和值（Value）文本字段中输入一个键（整数）和一个名称（字符串），然后点击添加（Add）按钮。\n\n\
    删除（Delete）按钮的工作方式是：用户在键（Key）文本字段中输入一个键（整数），然后点击删除（Delete）按钮。\n\n点击添加或删除按钮后，再次点击查询（Query）按钮即可查看更改。要了解此程序的工作方式，请执行以下步骤：\n\
    \n- 选择**产品** ➤ **运行**。Xcode 会运行你的 `DictionaryProgram` 项目。\n- 点击**查询**按钮。程序会显示字典中的条目数（3）、键的列表（数字\
    \ 1、2 和 3）以及值的列表（“Joe”、“Cindy” 和 “Frank”）。不必担心键和值的顺序。重点是确保每个键的顺序与其正确的值相对应，例如 1\
    \ 对应 “Joe”，2 对应 “Cindy”，3 对应 “Frank”。\n- 在**删除**按钮右侧的**键**字段中键入 3，然后点击**删除**按钮。\n\
    - 点击**查询**按钮。请注意，现在字典只包含两个条目：键 1 和 2，以及值 “Joe” 和 “Cindy”，如图 9-9 所示。\n\n![A978-1-4842-1233-2_9_Fig9_HTML.jpg](img/A978-1-4842-1233-2_9_Fig9_HTML.jpg)\n\
    \n**图 9-9.** 删除一个键值对后显示的结果\n\n- 点击**添加**按钮右侧的**键**文本字段，并键入 5。\n- 点击**添加**按钮右侧的**值**文本字段，并键入\
    \ Felicia。\n- 点击**添加**按钮。\n- 点击**查询**按钮。请注意，计数现在又回到了 3；键是 1、2 和 5；值是 “Joe”、“Cindy”\
    \ 和 “Felicia”。\n- 选择 **DictionaryProgram** ➤ **退出 DictionaryProgram**。\n\n## 总结\n\
    \n数组和字典是将相关数据列表存储在一个变量中的两种方式。数组可以轻松存储数据，但检索数据可能比较麻烦，因为必须知道要检索数据的精确索引值。\n\n字典强制你使用键来存储数据，但这个键使得以后无需知道数据在字典中存储的具体位置也能轻松检索到它。\n\
    \n在你创建的示例 OS X 程序中，你还学习了 for-in 循环如何自动遍历字典。到现在，你应该已经更加熟悉如何创建用户界面，并了解哪些项需要 `IBOutlet`，哪些项需要\
    \ `IBAction` 方法。\n\n程序设计可以分为三个不同的步骤。首先，创建用户界面并进行自定义。其次，将用户界面连接到你的 Swift 文件。第三，编写\
    \ Swift 代码使你的 `IBAction` 方法生效。\n\n可以将数组和字典视为超级变量，它们可以在一个变量名下存储多个数据。如果只需要保存单个值，那么请使用变量。如果需要存储相关数据的列表，请使用数组或字典。\n"
- fmt: '# 10. Tuples, Sets, and Structures


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​10](http://dx.doi.org/10.1007/978-1-4842-1233-2_10))
    contains supplementary material, which is available to authorized users.


    Variables are good for storing individual chunks of data while arrays and dictionaries
    are good for storing lists of the same data type. For greater flexibility, Swift
    also offers additional data structures called tuples and sets.


    A tuple lets you store related data in one place that may consist of different
    data types such as a string and an integer, which could represent a person’s name
    and an employee ID number. A set is similar to an array or a dictionary in letting
    you store two or more chunks of data that consists of the same data type, such
    as strings or integers.


    To group related data together, Swift also offers structures. With a structure,
    you can define the data type you want to group together in any combination, such
    as two strings and a floating-point value. Structures are a way to group different
    data types together.


    Perhaps the biggest advantage of both tuples and structures is when you combine
    them with other data structures. Instead of creating an array of integers, you
    could create an array of tuples or an array of structures. This gives you the
    flexibility to store different data types together and store multiple copies of
    similar data.


    ## Using Tuples


    Suppose you wanted to store somebody’s name and age. You could create two separate
    variables like this:


    ```

    var name : String

    var age : Int

    name = "Janice Parker"

    age = 47

    ```


    Creating two or more separate variables to store related data can be troublesome
    because there’s no connection between the two variables to show any relationship.
    To solve this problem, Swift offers a unique data structure called a tuple.


    A tuple can store two or more chunks of data in a single variable where the separate
    chunks of data can even be completely different data types such as a string and
    an integer. Declaring a tuple is just like declaring a variable. The main difference
    is that instead of defining a single data type, you can define multiple data types
    enclosed in parentheses like this:


    `var tupleName : (DataType1, DataType2)`


    Just like declaring variables, you have to declare a unique name for your tuple.
    Then you have to define how many different chunks of data to hold and their data
    types. Tuples can hold two or more chunks of data, but the more data a tuple holds,
    the clumsier it can be to understand and retrieve data.


    One way to create a tuple is to declare a tuple name and the data types it can
    hold. The number of data types listed also defines the number of data chunks the
    tuple can store. So if you wanted to store a string and an integer in a tuple,
    you could use the following Swift code:


    `var person : (String, Int)`


    Then you could store data in that tuple like this:


    `person = ("Janice Parker", 47)`


    When assigning data to a tuple, make sure you have both the proper data types
    and the correct number of data chunks. So the following would fail because the
    `person` tuple expects a string first and then an integer, not an integer first
    and then a string:


    `person = (47, "Janice Parker") // This would fail`


    A second way to define a tuple is to simply give it data and let Swift infer the
    data type such as:


    `var person = ("Janice Parker", 47)`


    If you define a tuple by listing its data types, or if you let Swift infer the
    data types by the type of data you store, it’s not always clear what each chunk
    of data represents. To make it easier to identify the different chunks of data,
    Swift also lets you name your data types such as:


    `var person : (name: String, age: Int)`


    or if you want Swift to infer the data types by assigning data directly into the
    tuple:


    `var person = (name: "Janice Parker", age: 47)`


    Named tuples help clarify what each data chunk represents. In this case, the string
    represents a name and the integer represents an age.'
