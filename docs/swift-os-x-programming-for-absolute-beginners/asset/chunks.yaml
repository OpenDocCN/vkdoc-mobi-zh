  trans: "\n按住 Option 键并点击可显示关于 `NSApplication` 协议的信息。松开 Option 键，然后将鼠标移到弹出窗口底部的 `NSObject\
    \ Class Reference` 上并点击。此时会出现“文档”窗口，其中显示了 `NSObject` 类中可用的不同属性和方法的详细信息，如图 12-12\
    \ 所示。所有这些属性和方法在你的 `AppDelegate` 类中同样可用。\n\n![A978-1-4842-1233-2_12_Fig12_HTML.jpg](img/A978-1-4842-1233-2_12_Fig12_HTML.jpg)\n\
    \n图 12-12. 显示 `NSObject` 类信息的“文档”窗口。\n\n按住 Option 键并点击 `NSObject`。当鼠标指针变为问号时，点击\
    \ `NSObject`，将会出现一个弹出窗口，如图 12-11 所示。\n\n![A978-1-4842-1233-2_12_Fig11_HTML.jpg](img/A978-1-4842-1233-2_12_Fig11_HTML.jpg)\n\
    \n图 12-11. 按住 Option 键并点击类名，即可显示该类的信息。\n\n```\nfunc applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n    print (\"This line should print after the program runs\"\
    )\n}\n\nfunc applicationWillTerminate(aNotification: NSNotification) {\n    print\
    \ (\"This line should print before your program stops\")\n}\n```\n\n选择 Product\
    \ ➤ Run。Xcode 会运行你的 `DelegateProgram` 项目并显示一个空的用户界面。选择 DelegateProgram ➤ Quit\
    \ DelegateProgram。Xcode 窗口会再次出现。Xcode 窗口底部的调试区现在会显示两个 `println` 命令输出的文本。注意，`applicationDidFinishLaunching`\
    \ 函数中的 `println` 命令会先执行，如图 12-15 所示。\n\n![A978-1-4842-1233-2_12_Fig15_HTML.jpg](img/A978-1-4842-1233-2_12_Fig15_HTML.jpg)\n\
    \n图 12-15. `NSApplicationDelegate` 文件定义的方法告诉程序用户界面的行为。\n\n## 在 OS X 程序中使用继承\n\n\
    继承允许你创建在两个类之间底层代码发生变化时仍保持相同的方法名。在本示例程序中，你将定义一个类，然后为第二个类继承属性和方法。第二个类还将覆写一个方法，并添加一些代码，使被覆写的方法的行为略有不同。\n\
    \n若要创建展示继承如何工作的示例程序，请按以下步骤操作：\n\n1. 在 Xcode 中，选择 File ➤ New ➤ Project。\n2. 在 OS\
    \ X 类别下点击 Application。\n3. 点击 Cocoa Application，然后点击 Next 按钮。Xcode 会询问产品名称。\n\
    4. 在 Product Name 文本框中点击，输入 `InheritProgram`。\n5. 确保 Language 弹出菜单显示为 Swift，并且没有勾选任何复选框。\n\
    6. 点击 Next 按钮。Xcode 会询问你希望将项目存储在何处。\n7. 选择一个文件夹来存储你的项目，然后点击 Create 按钮。\n8. 在项目导航器中点击\
    \ `MainMenu.xib` 文件。\n9. 点击 `StructureProgram` 图标，使用户界面窗口出现。\n10. 选择 View ➤ Utilities\
    \ ➤ Show Object Library，使对象库出现在 Xcode 窗口的右下角。\n11. 在用户界面上拖放一个按钮和两个标签，然后双击按钮和标签，修改它们上面显示的文本，使其与图\
    \ 12-16 类似。\n\n![A978-1-4842-1233-2_12_Fig16_HTML.jpg](img/A978-1-4842-1233-2_12_Fig16_HTML.jpg)\n\
    \n图 12-16. `InheritProgram` 的用户界面。\n\n该用户界面显示两个标签，代表两个不同的对象。对象 1 只包含一个属性和一个修改该属性的方法。对象\
    \ 2 继承自对象 1，包含一个额外的属性，并覆写了对象 1 中定义的方法。\n\n当你点击 Change 按钮时，两个标签的外观将根据每个对象定义的属性和方法而改变。要将你的用户界面连接到你的\
    \ Swift 代码，请按以下步骤操作：\n\n1. 在用户界面仍然显示在 Xcode 窗口中的情况下，选择 View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2. 将鼠标移到 Change 按钮上，按住\
    \ Control 键，然后拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n3. 松开鼠标和 Control 键。会弹出一个窗口。\n\
    4. 点击 Connection 弹出菜单，选择 Action。\n5. 点击 Name 文本框，输入 `changeButton`。\n6. 点击 Type\
    \ 弹出菜单，选择 `NSButton`。然后点击 Connect 按钮。Xcode 会创建一个名为 `changeButton` 的空 `IBAction`\
    \ 方法。\n7. 将鼠标移到 Object 1 标签上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`\
    \ 行的下方。\n8. 松开鼠标和 Control 键。会弹出一个窗口。\n9. 点击 Name 文本框，输入 `ObjectOne`，然后点击 Connect\
    \ 按钮。\n10. 将鼠标移到 Object 2 标签上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`\
    \ 行的下方。\n11. 松开鼠标和 Control 键。会弹出一个窗口。\n12. 点击 Name 文本框，输入 `ObjectTwo`，然后点击 Connect\
    \ 按钮。你现在应该拥有以下代表用户界面上所有标签的 `IBOutlets`：\n\n```\n@IBOutlet weak var window: NSWindow!\n\
    @IBOutlet weak var ObjectOne: NSTextField!\n@IBOutlet weak var ObjectTwo: NSTextField!\n\
    ```\n\n直接在 `IBOutlet` 代码行下方输入以下内容：\n\n```\nclass one {\n    var myColor : NSColor\
    \ = NSColor.blackColor ()\n    func change () {\n        myColor = NSColor.redColor()\n\
    \    }\n}\n\nclass two : one {\n    var myBackground : NSColor = NSColor.whiteColor()\n\
    \    override func change() {\n        myColor = NSColor.blueColor()\n       \
    \ myBackground = NSColor.greenColor()\n    }\n}\n\nvar ThingOne = one ()\nvar\
    \ ThingTwo = two()\n```\n\n按如下方式修改 `IBAction` 的 `changeButton` 方法：\n\n```\n@IBAction\
