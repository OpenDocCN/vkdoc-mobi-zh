- fmt: '# Using Dictionaries


    Arrays can be useful for storing lists of related data. The biggest drawback with
    an array comes when you want to retrieve specific data. Unless you know the exact
    index number of an item in an array, retrieving data can be cumbersome.


    That’s the advantage of a dictionary. Unlike an array that just stores data, a
    dictionary stores two chunks of data known as a key-value pair. The value represents
    the data you want to save, and the key represents a quick way to retrieve your
    data.


    For example, consider a list of phone numbers. If you stored phone numbers in
    an array, you would have to retrieve a specific phone number by knowing its exact
    index value. However, if you stored phone numbers in a dictionary, you could store
    each phone number (value) with a name (key). Now if you wanted to retrieve a particular
    phone number, you just search for the key (the person’s name).


    Regardless of where that data might be stored in the dictionary, you can quickly
    retrieve a value using a key. That makes retrieving data from a dictionary far
    easier than retrieving similar data from an array.


    Think of a dictionary like an array but instead of storing one chunk of data,
    you’re storing a pair of data (a key and a value). Both the key and the value
    can be of different data types, but all the keys must be of the same data type
    and all the values in a dictionary must be of the same data type. However, keys
    and values can be of different data types. For example, the keys of a dictionary
    could be of `String` data types while the values could be `Int` data types.


    To create a dictionary, you must define the dictionary and the data types for
    both the key and its associated value. One way to define a dictionary is to do
    this:


    `var DictionaryName = [keyDataType: valueDatatype]()`


    A second way to define a dictionary is to create a list of `key:value` pairs like
    this:


    `var DictionaryName = [102: "Fred", 87: "Valerie"]`


    When you directly assign `key:value` pairs, Swift infers the data type of the
    key and the value. In this case, the key data type is an integer (`Int`) and the
    value data type is a string (`String`).


    ## Adding Items to a Dictionary


    Whether a dictionary is empty or already filled with data, you can always add
    more items to a dictionary by specifying the dictionary name and its key value,
    and then assigning a value such as:


    `DictionaryName [key] = value`


    To see how to create a dictionary and add data to it, create a new playground
    by following these steps:


    Start Xcode. Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform. Click in the Name text field and type `DictionaryPlayground`.
    Click in the Platform pop-up menu and choose OS X. Xcode asks where you want to
    save your playground file. Click on a folder where you want to save your playground
    file and click the Create button. Xcode displays the playground file. Edit the
    code as follows:


    ```

    import Cocoa

    var DictionaryName = [102: "Fred", 87: "Valerie"]

    DictionaryName [120] = "John"

    DictionaryName [96] = "Jane"

    print (DictionaryName)

    ```


    This Swift code defines a dictionary where the `key:value` data types are `Int:String`,
    which Swift infers from the type of data initially stored in the dictionary.


    The next two lines define a key (`120`) and a value (`"John"`), which gets stored
    in the dictionary. Then the other line defines a key (`96`) and a value (`"Jane"`),
    which also gets stored in the dictionary. The last `print` command lets you see
    how the dictionary has changed as shown in Figure [9-5](#A978-1-4842-1233-2_9_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_9_Fig5_HTML.jpg](A978-1-4842-1233-2_9_Fig5_HTML.jpg)


    Figure 9-5. Creating a dictionary and adding new `key:value` data to it


    ## Retrieving and Updating Data in a Dictionary


    Once a dictionary contains `key:value` pairs, you can retrieve the value by using
    the key. To do that, you specify the dictionary name and a key. Then you assign
    this value to a variable such as:


    `variable = DictionaryName [key]!`


    The variable must be the same data type as the value stored in the dictionary.
    Also notice the exclamation mark, which defines an implicitly unwrapped variable.
    This exclamation mark ensures that if the key doesn’t exist in the dictionary,
    the nonexistent value does not crash your program.


    The following example defines two `key:value` pairs of data in a dictionary. Then
    it uses the `87` key to retrieve the value from the dictionary, which is the string
    `"Valeria"` as shown in Figure [9-6](#A978-1-4842-1233-2_9_Chapter.html#Fig6):


    ![A978-1-4842-1233-2_9_Fig6_HTML.jpg](A978-1-4842-1233-2_9_Fig6_HTML.jpg)


    Figure 9-6. Retrieving a value with a key and updating an existing key with new
    data


    ```

    var DictionaryName = [102: "Fred", 87: "Valerie"]

    var name : String

    name = DictionaryName [87]!

    print (name)

    ```


    Once you’ve stored a `key:value` pair in a dictionary, you can always assign a
    new value to an existing key using the `updateValue` command like this:


    `DictionaryName.updateValue(value, forKey: key)`


    So if you wanted to update the value stored with the `87` key, you could do the
    following:


    `DictionaryName.updateValue("Sam", forKey: 87)`


    To see how to retrieve a value from a dictionary using a key and then update a
    value for an existing key, follow these steps:


    Make sure the `LoopingPlayground` file is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var DictionaryName = [102: "Fred", 87: "Valerie"]

    DictionaryName [120] = "John"

    DictionaryName [96] = "Jane"

    print (DictionaryName)

    var name : String

    name = DictionaryName [87]!

    print (name)

    DictionaryName.updateValue("Sam", forKey: 87)

    name = DictionaryName [87]!

    print (name)

    ```


    Notice that the first time the dictionary retrieves the value associated with
    the `87` key, it returns the string `"Valerie"`. Then the `updateValue` command
    replaces `"Valerie"` with `"Sam"` so the next time the dictionary retrieves the
    value associated with the `87` key, it returns the string `"Sam"` (see Figure
    [9-6](#A978-1-4842-1233-2_9_Chapter.html#Fig6)).


    ## Deleting Data in a Dictionary


    Once a dictionary contains `key:value` pairs, you can delete the value associated
    with a specific key by using the `removeValueForKey` command like this:


    `DictionaryName.removeValueForKey(key)`


    The `removeValueForKey` command removes both the key and the value associated
    with that key. Note that if you specify a key that doesn’t exist in the dictionary,
    the `removeValueForKey` command does nothing.


    If you want to delete all the `key:value` pairs in a dictionary, you can just
    use the `removeAll` command like this:


    `DictionaryName.removeAll()`'
