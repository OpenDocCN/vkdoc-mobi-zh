  raw: '### Accessing Data in a Tuple


    Once you’ve created a tuple and stored data in it, you’ll need to retrieve that
    data eventually. Since a tuple contains two or more chunks of data, Swift offers
    three ways to retrieve the data you want.


    First, you can create multiple variables to access the tuple data as follows:


    `var petInfo = ("Rover", 38, true)`


    `var (dog, number, yesValue) = petInfo`


    `print (dog)`


    `print (number)`


    `print (yesValue)`


    In the first line of code, petInfo is a tuple. that contains three chunks of data:
    a string (“Rover”), an integer (38), and a Boolean value (true).


    The second line of code creates three variables (dog, number, yesValue) and assigns
    their values to the corresponding data stored in the petInfo tuple. That means
    dog stores “Rover,” number stores 38, and yesValue stores true. The print commands
    simply print this data out to verify that it retrieved information from the tuple.


    To access data from a tuple, you must know the order that the tuple stores data.
    So if you wanted to retrieve a string from the petInfo tuple, you’d have to know
    that the petInfo tuple stores names as its first chunk of data, a number as its
    second chunk of data, and a Boolean value as its third chunk of data.


    If you don’t want to retrieve all the values stored in a tuple, you can just create
    a variable to store the data you want and use the underscore character (_) as
    an empty placeholder to represent each additional value in the tuple that you
    want to ignore.


    That means you still need to know the number of data chunks the tuple holds so
    you can identify the one chunk of data that you want to retrieve. For example,
    if a tuple contains three items, you can retrieve the first item like this:


    `var petInfo = ("Rover", 38, true)`


    `var (pet,_,_) = petInfo`


    `print (pet)`


    This would store “Rover” in the pet variable so the print command would print
    “Rover.”.


    If you just wanted to retrieve the middle value, you could type the following:


    `var petInfo = ("Rover", 38, true)`


    `var (_,aValue,_) = petInfo`


    `print (aValue)`


    This would store the number 38 into the aValue variable and then the print command
    would print 38.


    The underscore characters act as placeholders that identify data in a tuple that
    you want to ignore. If you omit the underscore characters, Swift won’t know which
    particular data you want out of a tuple. To retrieve data from a tuple, you must
    know the number and order of the items that the tuple stores.


    A second way to retrieve values from a tuple is to use index numbers where the
    first element is assigned index number 0, the second element is assigned index
    number 1, and so on. For example, you might store data in a tuple like this:


    `var petInfo = ("Rover", 38, true)`


    `print (petInfo.0)`


    `print (petInfo.1)`


    `print (petInfo.2)`


    The first item in the tuple is assigned index number 0 so the combination of the
    tuple name (such as petInfo) followed by the index number lets you directly retrieve
    a specific tuple value. So petInfo.0 retrieves “Rover,” petInfo.1 retrieves 38,
    and petInfo.2 retrieves true.


    A third method for accessing data in a tuple involves using names. To uses this
    method, you must first assign names to each tuple data. For example, the following
    Swift code defines two names called “name” and “age”:


    `var tupleName = (name: "Bridget", age: 31)`


    Now you can access the tuple data by referencing the tuple name followed by the
    identifying name for each data like this:


    `print (tupleName.name)  // Prints "Bridget"`


    `print (tupleName.age)   // Prints 31`


    All three methods give you different ways to access data stored in tuples so just
    use the method you like best. For clarity, naming the specific elements of a tuple
    makes your code easier to understand but at the sacrifice of forcing you to name
    your tuple data. The index number method and the multiple variable method may
    be simpler, but can be less clear and requires you to know the exact order of
    the data you want to retrieve.


    To see how to work with tuples, create a new playground by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type TuplePlayground.  
    Click in the Platform pop-up menu and choose OS X. Xcode asks where you want to
    save your playground file.   Click on a folder where you want to save your playground
    file and click the Create button. Xcode displays the playground file.   Edit the
    code as follows: `import Cocoa` `var tupleName = (greeting: "Happy Birthday",
    age: 58, happy: true)` `// Method #1` `var (message, howOld, mood) = tupleName`
    `print (message)` `print (howOld)` `print (mood)` `var (_,stuff,_) = tupleName`
    `print (stuff)` `// Method #2` `print (tupleName.0)` `print (tupleName.1)` `print
    (tupleName.2)` `// Method #3` `print (tupleName.greeting)` `print (tupleName.age)`
    `print (tupleName.happy)`


    When you try all three methods for accessing values from a tuple, you can see
    how they all work alike. Tuples make it easy to group related data together in
    a single variable so you can easily keep related information organized. Then you
    can choose to retrieve data from a tuple using one of three different methods
    as shown in Figure [10-1](#A978-1-4842-1233-2_10_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_10_Fig1_HTML.jpg](A978-1-4842-1233-2_10_Fig1_HTML.jpg)


    Figure 10-1.


    Three different ways to retrieve data from a tuple


    ## Using Sets


    Arrays and dictionaries are designed to store lists of the same data types such
    as a list of strings or a list of integers. The difference between arrays and
    dictionaries is how you retrieve data. Arrays force you to retrieve data by location
    using index values. Dictionaries let you retrieve data using a key, but you must
    define a unique key for each chunk of data you store.


    Sets represent another way to store lists of identical data types such as strings
    or floating-point numbers. One speed advantage of a set is determining if something
    is stored or not. If you store data in an arrays, you’d have to exhaustively search
    throughout the entire array to determine if an array stores a particular item.
    If you store data in a dictionary, you have to know the key stored with that value,
    or you have to exhaustively search through the dictionary’s list of values.


    Sets let you quickly determine the following far faster than arrays or dictionaries:


    *   If an item is stored in a set or not

    *   If a set contains exactly the same items as another set

    *   If a set is a subset of another set (contains the same items as a larger set)

    *   If a set is a superset of another set (contains the same items and more than
    a smaller set)

    *   If two sets contain the same items or not


    Sets make it easy to compare two different groups of data in ways that arrays
    and dictionaries can’t do as easily.


    ### Creating a Set


    To create a set, you can define the name of the set and the type of data the set
    can hold like this:


    `var setName = Set<DataType>()>()`


    The set name should ideally be descriptive of its contents such as memberSet.
    The data type can be Int (integer), String (strings), Float or Double (decimal
    numbers), or even the name of another data structure.


    A second way to create a set to define it contents within square brackets and
    let Swift infer the data type. All data must be of the same data type such as:


    `var setName = Set ([Data1, Data2, Data2 ... DataN])`


    Notice that if you omit the “Set” keyword and the enclosing parentheses, you’ll
    define an array, not a set like this:


    `var thisIsAnArray = [Data1, Data2, Data2 ... DataN]`'
