- fmt: "# Swift 变量与常量声明\n\n第二种方法允许你显式声明数据类型，并将数据存储到该变量或常量中。虽然这可能会更冗长，但它清楚地表明了你要存储的数据类型。\n\
    \n第三种方法需要两行代码。第一行定义数据类型，第二行实际存储属性类型的数据。这对于可能在程序不同部分被赋予不同数据的变量来说非常方便。你可以在文件顶部附近声明变量以便于查找，然后在需要时再为其赋值。\n\
    \n要了解如何在Swift中声明变量和常量，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到Xcode中。\n\
    2.  将playground文件中的Swift代码修改如下：\n\n    ```\n    import Cocoa\n    let cat: String\n\
    \    cat = \"Oscar\"\n    cat = \"Bo\"\n    ```\n\n    请注意，当你尝试向已包含数据的常量分配新数据时，会收到一条错误消息。点击左边距中的警告图标会显示一条错误消息，如图[5-4](#A978-1-4842-1233-2_5_Chapter.html#Fig4)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig4_HTML.jpg](A978-1-4842-1233-2_5_Fig4_HTML.jpg)\n\
    \n    图5-4。一条错误消息警告你不能多次将数据存储到常量中。\n\n    **注意**\n\n    常量也被称为“不可变的”，因为一旦你向其中存储了数据，就不能更改。变量被称为“可变的”，因为你可以不断更改它们存储的数据。请记住，变量一次只能保存一块数据。当你向变量中存储新数据时，该变量中任何现有的数据都会被清除。\n\
    \n3.  将playground文件中的Swift代码修改为将常量更改为变量（将`let`替换为`var`），如下所示：\n\n    ```\n   \
    \ import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    cat = 42.7\n   \
    \ ```\n\n    请注意，当你尝试向一个只能保存字符串的变量分配数字时，会收到一条警告。点击左边距中的警告图标会显示一条错误消息，如图[5-5](#A978-1-4842-1233-2_5_Chapter.html#Fig5)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig5_HTML.jpg](A978-1-4842-1233-2_5_Fig5_HTML.jpg)\n\
    \n    图5-5。一条错误消息警告你不能存储错误类型的数据。\n\n4.  将playground文件中的Swift代码修改如下：\n\n    ```\n\
    \    import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    var greeting\
    \ = \"Hello, \"\n    var period : String = \".\"\n    print (greeting + cat +\
    \ period)\n    ```\n\n    请注意，playground会在右边距显示Swift代码的结果，如图[5-6](#A978-1-4842-1233-2_5_Chapter.html#Fig6)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig6_HTML.jpg](A978-1-4842-1233-2_5_Fig6_HTML.jpg)\n\
    \n    图5-6。playground窗口的右边距会持续显示代码的结果。\n\n## 类型别名\n\n将变量声明为`Int`、`Double`或`String`等数据类型，只告诉你可以保存哪种类型的数据，但并不说明该数据的含义。例如，如果你将两个变量声明为`Int`数据类型，每个变量都可以保存整数，但一个变量可能代表年龄，另一个变量可能代表员工ID号。\n\
    \n为了使数据类型的目的更清晰，Swift允许你使用一种叫做类型别名的东西。类型别名允许你为泛型数据类型名称提供一个描述性名称，例如：\n\n```\ntypealias\
    \ EmployeeID = Int\n```\n\n现在，你不是将变量声明为整数（`Int`）数据类型，而是可以将其声明为`EmployeeID`数据类型，例如：\n\
    \n```\ntypealias EmployeeID = Int\nvar employee : EmployeeID\nemployee = 192\n\
    ```\n\n这等价于：\n\n```\nvar employee : Int\nemployee = 192\n```\n\n## 使用Unicode字符作为名称\n\
    \n在大多数编程语言中，变量和常量被限制在固定的字符范围内，通常排除外语字符。为了帮助其他语言的程序员更方便地使用Swift，Swift允许你使用Unicode字符作为变量和常量名称。\n\
    \nUnicode是一种新的通用标准，代表不同的字符。如果你选择“编辑”->“表情与符号”，你可以从中选择有限数量的字符，用于替代或补充普通的字母和数字，如图[5-7](#A978-1-4842-1233-2_5_Chapter.html#Fig7)所示。\n\
    \n![A978-1-4842-1233-2_5_Fig7_HTML.jpg](A978-1-4842-1233-2_5_Fig7_HTML.jpg)\n\n\
    图5-7。Xcode允许你使用特殊字符作为变量或常量名称。\n\n要了解如何在变量名称中使用特殊字符，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到Xcode中。\n\
    2.  删除playground中除`import Cocoa`行之外的所有代码。\n3.  在`import Cocoa`行下方，输入`let`并按下空格键。\n\
    4.  选择“编辑”->“表情与符号”。会弹出一个窗口，如图[5-8](#A978-1-4842-1233-2_5_Chapter.html#Fig8)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig8_HTML.jpg](A978-1-4842-1233-2_5_Fig8_HTML.jpg)\n\
    \n    图5-8。一个包含不同类别特殊字符的弹出窗口。\n5.  点击任何看起来有趣的字符。Xcode会将该字符作为常量名称输入。\n6.  输入`=\
    \ \"Funny symbol here\"`并按下回车键。\n7.  复制该字符并将其粘贴到`print`命令的括号之间。请注意，playground窗口的右边距会显示常量变量的内容，如图[5-9](#A978-1-4842-1233-2_5_Chapter.html#Fig9)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig9_HTML.jpg](A978-1-4842-1233-2_5_Fig9_HTML.jpg)\n\
    \n    图5-9。在Swift代码中使用特殊字符作为常量名称。\n\n特殊字符对于显示实际的数学符号（而不是拼写出来）或以外语输入变量/常量名称非常有用。通过使变量和常量名称更加通用，Swift使编程对更多人来说更易理解。\n\
    \n## 转换数据类型\n\n如果你有一个存储为整数的数字，需要将其转换为小数，或者你有一个小数，需要将其转换为整数，该怎么办？答案是，你可以通过指定你想要的数据类型来将一种数字数据类型转换为另一种，例如：\n\
    \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉Swift将括号内的数字转换为整数。如果这个数字是小数，将其转换为整数基本上意味着丢弃小数点后的所有数字，因此像`4.9`这样的数字将被转换为整数`4`。\n\
    \n当Swift将整数转换为小数时，它只是简单地添加一个小数点和零。因此，如果你将整数`75`转换为浮点数，Swift现在会将其存储为`75.0`。要了解如何将整数转换为小数（反之亦然），请遵循以下步骤：\n\
    \n1.  确保你的`IntroductoryPlayground`文件已加载到Xcode中。\n2.  将playground文件中的代码修改如下：\n\n\
    \    ```\n    import Cocoa\n    var whole : Int = 4\n    var decimal : Double\
    \ = 4.902\n    print (Int(decimal))\n    print (Double(whole))\n    ```\n\n3.\
    \  请注意Swift如何将整数转换为小数（将`4`更改为`4.0`），以及如何通过丢弃小数点右侧的所有值来将小数转换为整数（将`4.902`更改为`4`），如图[5-10](#A978-1-4842-1233-2_5_Chapter.html#Fig10)所示。\n\
    \n    ![A978-1-4842-1233-2_5_Fig10_HTML.jpg](A978-1-4842-1233-2_5_Fig10_HTML.jpg)\n\
    \n    图5-10。将整数更改为小数，反之亦然。"
  raw: 'The second method lets you explicitly declare the data type and store data
    into that variable or constant. While this can be wordier, it’s clear exactly
    what type of data you want to store.


    The third method takes two lines. The first line defines the data type. The second
    line actually stores the property type of data. This can be handy for variables
    that may get assigned different data in various parts of your program. You could
    declare the variable near the top of your file to make it easy to find, then assign
    data to it later when you need it.


    To see how to declare variables and constants in Swift, follow these steps:


    Make sure your IntroductoryPlayground file is loaded into Xcode.   Modify the
