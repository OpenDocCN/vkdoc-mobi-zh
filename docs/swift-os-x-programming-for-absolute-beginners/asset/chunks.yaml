    ### 通过帮助菜单查找类文件


    Xcode 的菜单栏和下拉菜单通常是查找任何命令最直接的方式。因此，第一步是打开 Xcode 的文档窗口，如图 4-4 所示，可以通过以下两种方式之一打开：


    ![A978-1-4842-1233-2_4_Fig4_HTML.jpg](img/A978-1-4842-1233-2_4_Fig4_HTML.jpg)


    图 4-4. Xcode 文档窗口


    - 选择“帮助” ➤ “文档和 API 参考”

    - 按下 `Shift+Command+0`（数字零）


    **注意：** 为使文档窗口更简洁，请点击“显示/隐藏导航器”图标。


    点击文档窗口顶部的“搜索文档”文本字段，输入 `NSTextField`，然后按下 Return 键。文档窗口会显示关于 `NSTextField` 类的信息。滚动“目录”窗格以查看关于
    `NSTextField` 类的信息。如果你在“目录”窗格中点击某个主题，文档窗口会显示更多信息，如图 4-5 所示。但是，`NSTextField` 文档中并没有解释它如何存储文本。为了找到答案，我们需要进一步查看
    `NSTextField` 的父类，即 `NSControl`。


    ![A978-1-4842-1233-2_4_Fig5_HTML.jpg](img/A978-1-4842-1233-2_4_Fig5_HTML.jpg)


    图 4-5. 在“目录”窗格中选择一项，会在右侧窗格中显示信息


    点击“继承自：”标签右侧显示的 `NSControl`。请注意，`NSTextField` 继承自 `NSControl`，`NSControl` 继承自
    `NSView`，`NSView` 继承自 `NSResponder`，`NSResponder` 继承自 `NSObject`。要找到标签或文本字段（两者都基于
    `NSTextField` 类）可用的所有属性和方法，我们也需要详尽地搜索这些类文件中的每一个。


    点击 `NSControl` 的“目录”窗格中的“获取和设置控件值”，如图 4-6 所示。请注意，`NSControl` 类中用于存储文本数据的属性名为 `stringValue`。


    ![A978-1-4842-1233-2_4_Fig6_HTML.jpg](img/A978-1-4842-1233-2_4_Fig6_HTML.jpg)


    图 4-6. 文档窗口列出了 `NSControl` 中存储数据的所有属性


    一旦我们知道可以使用 `stringValue` 属性在 `NSControl` 类中保存文本数据，我们也就知道可以在 `NSTextField` 类中使用
    `stringValue` 属性来保存文本数据。由于我们的标签和文本字段都基于 `NSTextField` 类（这是通过在对象库中点击它们发现的），因此我们知道可以使用
    `stringValue` 属性来访问标签和文本字段的文本数据。


    ### 通过快速帮助查找类文件


    使用文档窗口查找类文件很方便，但 Xcode 还提供了另一种称为“快速帮助”的方法。要使用“快速帮助”，你需要将光标或鼠标指针移到包含 Swift 代码文件中的类文件名上，然后选择以下方法之一：


    - 选择“帮助” ➤ “选中项的快速帮助”

    - 按下 `Control+Command+Shift+?`

    - 按住 Option 键并点击类文件名


    “快速帮助”会显示一个弹出窗口，其中包含所选类文件的简要描述，如果你愿意，还可以选择在文档窗口中查看完整描述。要了解如何使用 Option 键和鼠标查看“快速帮助”的工作原理，请按照以下步骤操作：


    1. 确保 `MyFirstProgram` 已加载到 Xcode 中。

    2. 在项目导航器中点击 `AppDelegate.swift` 文件。Xcode 会在中间窗格中显示 `AppDelegate.swift` 文件的内容。

    3. 按住 Option 键，将鼠标移到 `IBOutlet` 中的 `NSTextField` 单词上。鼠标指针会变成一个问号，如图 4-7 所示。


    ![A978-1-4842-1233-2_4_Fig7_HTML.jpg](img/A978-1-4842-1233-2_4_Fig7_HTML.jpg)


    图 4-7. 按住 Option 键时，鼠标指针悬停在类文件名上会变成问号


    4. 在鼠标指针悬停在 `NSTextField` 上时按住 Option 键，然后点击鼠标。Xcode 会显示一个弹出窗口，简要描述 `NSTextField`
    类的特性，如图 4-8 所示。


    ![A978-1-4842-1233-2_4_Fig8_HTML.jpg](img/A978-1-4842-1233-2_4_Fig8_HTML.jpg)


    图 4-8. Option+点击类文件名会显示一个描述该类文件的弹出窗口


    5. 点击弹出窗口底部“参考”标签旁边的 `NSTextField Class Reference`。Xcode 会显示文档窗口，列出 `NSTextField`
    类文件（参见图 4-5）。


    Option+点击只是打开文档窗口的一种方式，无需通过“帮助” ➤ “文档和参考 API”命令并输入类文件名。

