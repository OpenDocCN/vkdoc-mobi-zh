    program, you’ll use functions in one form or another.'
  trans: "\n### 使用变量参数\n\n当函数接受参数时，它会将该参数视为常量。这意味着在函数内部，Swift 代码无法修改该参数。如果希望在函数内部修改参数，则需要使用\
    \ `var` 关键字将该参数标识为变量参数，如下所示：\n\n```\nfunc functionName (var parameter: dataType)\
    \ {\n\n}\n```\n\n要了解变量参数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground` 文件已在 Xcode\
    \ 中加载。按如下方式编辑代码：\n\n```swift\nimport Cocoa\nfunc internalChange (var name : String)\
    \ {\n    name = name.uppercaseString\n    print (\"Hello \" + name)\n}\ninternalChange\
    \ (\"Tasha\")\n```\n\n在 `internalChange` 函数内部，`name` 参数发生了变化。函数中的第一行将 `name` 参数转换为大写。但是，`internalChange`\
    \ 函数对 `name` 参数所做的任何更改都不会影响程序的其他部分。所有更改都仅限于 `internalChange` 函数内部。\n\n如果你希望更改参数并使这些更改在函数外部生效，则需要改用\
    \ `inout` 参数。\n\n### 使用输入输出参数\n\n向函数传递数据有两种方式。一种是传递固定值，例如：\n\n```swift\nsqrt(5)\n\
    ```\n\n第二种方式是传递一个表示值的变量，例如：\n\n```swift\nvar z : Double = 45.0\nvar answer : Double\n\
    answer = sqrt(z)\n```\n\n在这段 Swift 代码中，`z` 的值为 `45.0`，并被传递给 `sqrt` 函数。无论 `sqrt`\
    \ 函数做什么，`z` 的值仍然保持为 `45.0`。\n\n如果你希望函数能够更改其参数的值，可以创建所谓的输入输出参数。这意味着当你将一个变量传递给函数时，该函数会修改那个变量。\n\
    \n要定义一个函数可以更改的参数，只需使用 `inout` 关键字来标识该参数，例如：\n\n```\nfunc functionName (inout parameter:\
    \ dataType) {\n\n}\n```\n\n如果一个函数有两个或更多参数，你可以将一个或多个参数指定为 `inout` 参数。当你将一个参数标识为\
    \ `inout` 参数时，函数必须修改该 `inout` 参数。当你调用一个函数并向其传递 `inout` 参数时，必须使用 `&` 符号来标识该 `inout`\
    \ 参数，例如：\n\n```\nfunctionName (&variable)\n```\n\n要了解 `inout` 参数如何工作，请按照以下步骤操作：\n\
    \n确保你的 `FunctionPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```swift\nimport Cocoa\n\
    func changeMe (inout name: String, age: Int) {\n    print (name + \" is \\(age)\
    \ years old\")\n    name = name.uppercaseString\n}\nvar animal : String = \"Oscar\
    \ the cat\"\nchangeMe (&animal, age: 2)\nprint (animal)\n```\n\n`changeMe` 函数定义了两个参数：\n\
    \n*   一个名为 `name` 的字符串参数，被标识为 `inout` 参数\n*   一个名为 `age` 的整型参数\n\n`changeMe` 函数必须以某种方式修改这个\
    \ `inout` 参数，它通过将 `name` 参数改为大写来实现，如图 6-13 所示。\n\n![A978-1-4842-1233-2_6_Fig13_HTML.jpg](img/A978-1-4842-1233-2_6_Fig13_HTML.jpg)\n\
    \n图 6-13. 使用 `inout` 参数\n\n调用 `changeMe` 函数时，会向其传递一个名为 `animal` 的 `String` 变量，该变量保存字符串\
    \ `\"Oscar the cat\"`。`changeMe` 函数期望两个参数，其中第一个是 `inout` 参数。这意味着调用 `changeMe`\
    \ 函数必须满足以下条件：\n\n*   `changeMe` 函数期望两个参数，顺序依次是一个字符串和一个整数\n*   由于字符串参数是 `inout`\
    \ 参数，第一个参数必须是一个用 `&` 符号标识的变量\n\n在调用 `changeMe` 函数之前，`animal` 变量包含字符串 `\"Oscar\
    \ the cat\"`。调用 `changeMe` 函数之后，`animal` 变量现在包含字符串 `\"OSCAR THE CAT\"`。这是因为 `changeMe`\
    \ 函数中的 `inout` 参数修改了它。\n\n### 理解 IBAction 方法\n\n如果你记得在第 5 章中，你将用户界面中的一个按钮连接到了\
    \ Swift 代码，从而创建了一个 `IBAction` 方法，它实际上只是一个函数，看起来像这样：\n\n```swift\n@IBAction func\
    \ changeCase(sender: NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercaseString\n\
    \    let warning = labelText.stringValue\n}\n```\n\n既然你已经理解了函数的工作原理，让我们逐行分析这段代码。首先，`@IBAction`\
    \ 标识了一个仅在用户对用户界面元素进行操作时才会运行的函数。如果你查看参数列表，会看到 `(sender: NSButton)`，这告诉你当用户点击按钮时，`changeCase`\
    \ 函数将执行花括号内的 Swift 代码。\n\n任何 `IBAction` 方法中存储的 Swift 代码通常都会以某种方式处理数据。在这个例子中，它将来自文本字段（由\
    \ `IBOutlet` 变量 `messageText` 表示）的文本转换为大写，然后将该大写文本显示在一个标签（由 `IBOutlet` 变量 `labelText`\
    \ 表示）中。\n\n由于可能存在两个或多个用户界面元素连接到同一个 `IBAction` 方法，`sender` 参数用于标识用户点击的是哪个按钮。由于这个\
    \ `IBAction` 方法只连接到一个按钮，因此 `sender` 参数被忽略。\n\n`IBAction` 方法本质上只不过是连接到用户界面元素上的特殊函数。在任何程序中，你很可能会有多个\
    \ `IBAction` 方法（函数）以及你可能定义的其他函数。\n\n此外，即使你从未见过实现这些函数功能的实际代码，你很可能会使用 Cocoa 框架中定义的函数。在创建任何程序时，你都会以某种形式使用函数。\n"
- fmt: '# Summary


    The heart of any program is its ability to accept data, manipulate that data,
    and then return a useful result. The simplest way to manipulate numeric data is
    through common mathematical operators such as `+` (addition), `-` (subtraction),
    `/` (division), `*` (multiplication), and `%` (remainder). The common way to manipulate
    strings is through concatenation using the `+` operator, which combines two strings
    together.


    As a shortcut, you can use the increment and decrement operators to add or subtract
    1 from a variable. If you need to add or subtract values other than 1, you can
    use compound assignment operators instead.


    Beyond these basic operators, you can also manipulate data through functions defined
    by the Cocoa framework. You don’t have to know how these functions work; you just
    have to know they exist so you can use them in your own program by calling these
    function names. To find function names you can use, you may need to search through
    Xcode’s documentation window.


    While there are plenty of functions you can use from the Cocoa framework, you
    may need to create your own functions as well. Functions typically accept one
    or more parameters so they can calculate different results.


    A function can represent a single value, which means you need to define the data
    type that the function represents.


    At the simplest level, you need to define parameters with a unique name and a
    data type. To make parameters more understandable, you can create external parameter
    names, which means you need to identify the parameter name when you pass data
    to a function.


    Normally when a function accepts a parameter, it treats that parameter like a
    constant that doesn’t change in value. However, functions can modify parameters
    by creating variable parameters using the `var` keyword. Any changes a function
    makes to a variable parameter stays isolated within that function.


    For greater flexibility, functions can also create inout parameters that can modify
    the value of a parameter. When a function modifies an inout parameter, those changes
    appear outside of that function.


    By defining your own functions, you can make and create libraries of useful code
    that you can reuse in other parts of your program or even in other projects as
    well. Functions let you create specific ways to manipulate data for your particular
    program.


    # Making Decisions with Branches


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1233-2_7](http://dx.doi.org/10.1007/978-1-4842-1233-2_7))
    contains supplementary material, which is available to authorized users.


    After a program receives data, it needs to manipulate that data somehow to return
    a useful result. Simple programs manipulate data the same way, but more complicated
    programs need to make decisions on how to manipulate that data.


    For example, a program might ask the user for a password. If the user types in
    a valid password, then the program gives the user access. If the user does not
    type in a valid password, then the program must display an error message and block
    access.


    When a program analyzes data and makes a decision based on that data, it uses
    something called Boolean values and branching statements.


    Boolean values represent either a `true` or `false` value. Branching statements
    give your program the option of choosing between two or more different sets of
    commands to follow. Boolean values combined with branching statements give programs
    the ability to respond to different data.


    ## Understanding Comparison Operators


    You can create a Boolean variable by declaring a `Bool` data type such as:


    ```

    var flag : Bool

    ```


    `Bool` represents a Boolean data type. Any variable defined as a `Bool` data type
    can only hold one of two values: `true` or `false`, such as:


    ```

    flag = true

    flag = false

    ```


    While you can directly assign `true` and `false` to variables that represent Boolean
    data types, it’s far more common to calculate Boolean values using comparison
    operators. Some common comparison operators are shown in Table [7-1](#A978-1-4842-1233-2_7_Chapter.html#Tab1).


    **Table 7-1.** Common comparison operators in Swift


    | Comparison operator | Purpose | Example | Boolean value |

    | --- | --- | --- | --- |

    | `==` | Equal | `5 == 14` | `false` |

    | `<` | Less than | `5 < 14` | `true` |

    | `>` | Greater than | `5 > 14` | `false` |

    | `<=` | Less than or equal to | `5 <= 14` | `true` |

    | `>=` | Greater than or equal to | `5 >= 14` | `false` |

    | `!=` | Not equal | `5 != 14` | `true` |


    **Note**


    The equal (`==`) comparison operator is the only comparison operator that can
    also compare strings such as `"Joe" == "Fred"` (which evaluates to `false`) or
    `"Joe" == "Joe"` (which evaluates to `true`).


    Comparison operators can compare values such as `38 == 8` or `29.04 > 12`. However,
    using actual values with comparison operators always returns the same `true` or
    `false` value. What makes comparison operators more versatile is when they compare
    a fixed value with a variable or when they compare two variables such as:


    ```

    let myValue = 45

    myValue > 38            // Evaluates to true


    let yourValue = 39

    myValue < yourValue     // Evaluates to false

    ```


    When you compare one or more variables, the results can change depending on the
    current value of those variables. However, when using the equal (`==`) comparison
    operator, be careful when working with decimal values. That’s because `45.0` is
    not the same number as `45.0000001`. When working with decimal values, it’s best
    to use greater than or less than comparison operators rather than the equal comparison
    operator.'
  raw: '## Summary


    The heart of any program is its ability to accept data, manipulate that data,
    and then return a useful result. The simplest way to manipulate numeric data is
    through common mathematical operators such as + (addition), - (subtraction), /
    (division), * (multiplication), and % (remainder). The common way to manipulate
    strings is through concatenation using the + operator, which combines two strings
    together.


    As a shortcut, you can use the increment and decrement operators to add or subtract
    1 from a variable. If you need to add or subtract values other than 1, you can
    use compound assignment operators instead.


    Beyond these basic operators, you can also manipulate data through functions defined
    by the Cocoa framework. You don’t have to know how these functions work; you just
    have to know they exist so you can use them in your own program by calling these
    function names. To find function names you can use, you may need to search through
    Xcode’s documentation window.


    While there are plenty of functions you can use from the Cocoa framework, you
    may need to create your own functions as well. Functions typically accept one
    or more parameters so they can calculate different results.


    A function can represent a single value, which means you need to define the data
    type that the function represents.


    At the simplest level, you need to define parameters with a unique name and a
    data type. To make parameters more understandable, you can create external parameter
    names, which means you need to identify the parameter name when you pass data
    to a function.


    Normally when a function accepts a parameter, it treats that parameter like a
    constant that doesn’t change in value. However, functions can modify parameters
    by creating variable parameters using the “var” keyword. Any changes a function
    makes to a variable parameter stays isolated within that function.


    For greater flexibility, functions can also create inout parameters that can modify
    the value of a parameter. When a function modifies an inout parameter, those changes
    appear outside of that function.


    By defining your own functions, you can make and create libraries of useful code
    that you can reuse in other parts of your program or even in other projects as
    well. Functions let you create specific ways to manipulate data for your particular
    program.


