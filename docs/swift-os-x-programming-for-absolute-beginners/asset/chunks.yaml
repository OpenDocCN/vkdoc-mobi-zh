    the viewDidLoad method takes the representedObject property, casts or turns it
    into a String data type, and stores this into the receivedText IBOutlet.


    Click on the segue and choose View ➤ Utilities ➤ Show Attributes Inspector to
    display the Attributes Inspector pane.   Choose Product ➤ Run. Your initial scene
    appears.   Click in the text field and type any text such as your name.   Click
