  trans: '

    一旦你明确了程序应如何为用户提供服务，最后一步便是确定它将如何实现这一目标。程序通常从用户处接受输入，以某种方式处理该输入，然后提供新的结果。作为程序员，你需要一步步确定如何达成这个新结果。接着，你需要将这些步骤翻译成一种编程语言，例如
    `Swift`。


    归根结底，编程是一门创造性的技艺，需要明确、具体的目标和有方法论的坚持才能成功。


    ## 设计程序的结构


    一旦你清楚程序需要做什么以及如何做，下一步就是设计程序实际运行的方式。编写程序没有唯一的“最佳”方法，因为同样一个程序你可以用一百万种不同的方式去写。然而，你需要设计的程序不仅要能运行，还必须易于理解和未来的修改。


    每个程序总有改进的空间。有时改进意味着优化程序，使其运行更快或占用更少内存。其他时候改进则意味着为程序增加新功能。无论哪种情况，每个程序在其生命周期中很可能会经历多次修改，因此从一开始就设计出易于理解和修改的程序至关重要。


    在面向对象编程的世界里，设计程序的常见方法是将一个大型程序拆分为多个代表逻辑功能的对象。例如，如果你正在设计一个控制汽车的程序，你可以将程序划分为以下对象：


    -   引擎对象

    -   转向对象

    -   音响对象

    -   变速箱对象


    现在，如果你需要改进程序的转向能力，你只需用一个新的转向对象替换旧的转向对象，而不会影响到程序的其他部分。


    如何将程序划分为对象是完全任意的。你同样可以把同一个汽车程序设计成以下对象：


    -   前部对象

    -   后部对象

    -   内部对象

    -   底盘对象


    如果你从一开始就设计好了程序，你或其他人将来就能轻松地对其进行修改。


    ## 设计程序的用户界面


    除了程序结构的设计，程序的另一个关键元素是用户界面。借助 `Xcode`，你可以将程序的结构（其各种对象）与用户界面完全隔离地进行设计（反之亦然）。这让你可以自由地轻松设计和修改程序结构或用户界面，而不会影响程序的另一部分。


    用户界面定义了用户如何看待你的程序。糟糕的用户界面使程序难以使用。良好的用户界面则让程序易于使用。即使程序的底层结构很糟糕，一个好的用户界面也能让程序看起来响应迅速、优雅且设计精良。


    那么，什么是好的用户界面呢？理想情况下，用户界面应当消融在背景中，以至于用户甚至意识不到它的存在。当你用两个手指在 `iPhone` 或 `iPad` 屏幕上捏合时，你可以让图像变大或变小。


    从用户的角度来看，用户界面似乎根本不存在，因为用户感觉到的是直接操作图像。实际上，用户界面将用户的指尖位置转换为放大图像外观的操作。用户界面仍然存在，但用户无需阅读厚厚的培训手册并遵循多个步骤来操作它。一个优秀的用户界面本质上会融入背景之中。


    以下是一个笨拙的用户界面完成完全相同任务的方式。首先，用户必须点击屏幕上的一个按钮来显示一个菜单。其次，用户必须从该菜单中选择一个缩放命令。第三，用户必须输入一个代表缩放百分比的数字，例如
    50%或 125%。第四，用户必须点击一个确定按钮，才能最终完成任务并改变图像的缩放比例。


    你更愿意使用哪个用户界面？


    作为一般规则，完成任务所需的步骤越多，用户界面就越难使用，因为如果用户遗漏了一个步骤或搞乱了其中一个步骤的顺序，整个任务就会失败。程序员常常试图通过添加快捷键或工具栏图标等方式来增加完成同一任务的途径，以修复糟糕的用户界面设计。不幸的是，如果你的用户界面本身就很差，增加更多完成同一任务的方式并不一定会让界面变得更容易使用。


    如果你有一个糟糕的用户界面，与其尝试修复一个有缺陷的设计，不如重新设计整个界面可能更容易。


    ### 用纸笔设计用户界面


    作为一般规则，你对用户界面的第一个想法很少会是最终设计。这是因为你认为可行的方案实际上可能行不通，而你甚至可能没考虑到的因素对于你的用户来说却至关重要。因此，与其先设计好用户界面再被迫修改，不如先用纸笔画草图来设计用户界面，这样会快得多，也简单得多。


    一旦你在纸上有了初步设计，就把它展示给最终用户以获取他们的反馈。尽管看着粗糙画出的、静态的用户界面图像似乎没什么意义，但它可以让你获得关于用户界面整体设计的反馈。在评估初步用户界面时，可以问你的用户：


    -   缺少什么？是否有需要展示但没有展示出来的命令或功能？

    -   什么是不需要的？当前是否展示了某些不必要显示的命令或功能？

    -   什么可以更简单？如何重新排列或组织用户界面以使其更简洁？

    -   什么令人困惑？有没有用户不理解的地方？帮助菜单和描述性工具提示永远无法替代更清晰的用户界面设计。

    -   什么是直观的？用户会期望用你的用户界面做什么？你的用户界面是支持还是挫败了用户的期望？


    在纸上设计用户界面既快又简单。因为你没有在任何一个特定的用户界面设计上投入过多时间，所以放弃糟糕的设计比试图辩解说它该保留要容易得多。


    此外，纸面设计便于你或他人在上面涂画以重新设计。因为纸面上的用户界面设计任何人都可以快速简便地完成，所以请随意尝试。你创建的用户界面设计越多，你就越有可能偶然发现一个可行的方案。


    研究现有的程序，看看你最喜欢什么，最不喜欢什么。然后将你喜欢的和不喜欢的特性都融入到不同的用户界面设计中去。你认为最好的设计，别人可能最不喜欢；而你认为最不好的设计，别人可能认为是最好的。

    '
- fmt: '### Design a User Interface with Software


    Once you’ve experimented with different user interface designs and found one or
    more that seem promising, it’s time to move beyond paper and pencil and create
    a user interface prototype that people can actually see on a computer screen.


    What may look nice on paper may not work on a computer screen. More importantly,
    a computer screen can create a simple form of interaction. When the user clicks
    on a button, a new screen can appear just like the real user interface would work.
    This interactivity is something you can only poorly mimic with paper and pencil
    designs.


    A fast way to create an interactive user interface prototype is to use presentation
    software such as `PowerPoint` or `Keynote`. Presentation software lets you create
    slides where each slide can represent a window of your user interface. You can
    place buttons and graphics to create rough user interface designs, then create
    links between those buttons and slides to create a limited form of interactivity.


    An interactive user interface prototype lets you test how users expect the user
    interface to respond. For example, users might expect to see a certain window
    after clicking a command. If your interactive prototype shows users a different
    window, then you’ll know what you need to fix.


    Like paper and pencil designs, the goal of a user interface prototype is to find
    out what works and what doesn’t work while spending as little time designing your
    prototype. The less time you spend designing your prototype, the more time you
    can spend coming up with alternate ideas and testing them.


    In addition to creating user interface prototypes using presentation software,
    you can also buy special mock-up software that contains common user interface
    elements such as buttons, windows, and check boxes that you can quickly drag and
    drop to create a simulated user interface as shown in Figure [24-1](#A978-1-4842-1233-2_24_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_24_Fig1_HTML.jpg](A978-1-4842-1233-2_24_Fig1_HTML.jpg)


    Figure 24-1. `Balsamiq Mockups` is a specialized program for creating user interface
    prototypes


    A software version of your user interface prototype provides interactivity. When
    you’re satisfied with your user interface design as a prototype, the final step
    is to convert your prototype into an actual `Xcode` user interface.


    Remember, `Xcode` lets you create your `Swift` code completely separate from your
    user interface. That means you can create user interfaces in `Xcode` without writing
    a single line of code. When you’re happy with the appearance and design of your
    user interface, you can connect its various items (buttons, menus, etc.) to `IBOutlet`
    and `IBAction` methods to link your user interface to your `Swift` code.


    ## Marketing Your Software


    Once you create a program, you’ll need to test it to make sure it works. Such
    early testers (known as alpha and beta testers) can help spot bugs in your program
    so you can fix them right away. When your program is as bug-free as possible,
    that’s the time to release your software on the market.


    Here’s the biggest mistake most people make. They write a program, put up a web
    site advertising the program or their company, and wait for the orders to roll
    in. In the OS X world, `Apple` offers a special `Mac App Store` that gives every
    `Macintosh` user potential access to your software.


    However, it’s never enough to advertise your software on a web site or the `Mac
    App Store` and wait for people to buy it. To maximize sales, you also have to
    promote your software.


    To many people, marketing means spending money advertising. While you could do
    that, it’s always best to spend as little as possible. It’s easy to spend money
    on advertising and marketing, but unless your advertising and marketing expenses
    are less than the sales that advertising and marketing generates, you risk going
    bankrupt slowly. Where most people go wrong is that they spend money on advertising
    and marketing, but they have no idea if all that advertising and marketing is
    generating enough sales to justify the expense.


    That’s why you should focus on free ways to advertise and market your software
    so you can find out what people like about your software, what types of people
    are more likely to buy your software, and the best ways to reach your potential
    users, all without going broke to do it.


    For example, suppose you sell software that makes video look aged as if it had
    been filmed decades ago on film complete with scratches, faded images, and sound
    effects of film threading through a movie projector. You might initially target
    people who want to turn their videos into older movies for fun, but you may find
    that your actual market is Hollywood studios who need to create visual effects
    to simulate older films.


    Your initial market may not care about your software but an entirely different
    market just might. If you spent money advertising to your initial market, you
    would have wasted money targeting people who didn’t really want your program after
    all. Only later might you find the real market for your software, and it could
    come from an unexpected niche that you never thought about before.


    So don’t substitute spending money for doing market research. It’s easy to spend
    more money. It’s harder to take the time to determine how effective your marketing
    and advertising really is and whether you’re even targeting the most lucrative
    market for your software in the first place.


    Beyond spending a minimal amount of money promoting your software through a web
    site, here are some other ways to promote your software for little or no cost:


    - Start a blog.

    - Give away free software.

    - Post videos of your software on video sharing sites such as `YouTube`.

    - Create and give away free information stored in `PDF` files offering tips for
    people who are potential customers of your software.

    - Find the social networks where your potential customers gather and participate
    in discussions to answer their questions.'
