  trans: '

    # 理解用户界面文件


    Cocoa 框架定义了一系列类，用于创建从按钮（`NSButton` 类）、文本字段（`NSTextField`）、滑块（`NSSlider`）到日期选择器（`NSDatePicker`）等各种可能的用户界面元素。理论上，完全可以用纯
    Swift 代码来创建整个用户界面。但这样做可能很繁琐，因为在程序实际运行之前，你无法看到用户界面的样子。这就像试图通过精确描述画笔在画布上的位置以及手移动的特定角度和方向来画画一样笨拙。


    Xcode 并没有强制你编写 Swift 代码来定义用户界面，而是提供了一个名为 Interface Builder 的功能。Interface Builder
    的理念是，你可以通过将元素拖放到窗口上来设计用户界面。


    通过拖放元素来创建用户界面的优势在于，你可以看到用户界面的样子，从而能够快速调整和修改它。此外，通过将用户界面的设计与 Swift 代码分离，你可以在不影响
    Swift 代码的情况下更改用户界面，反之亦然。


    在过去，程序员必须编写代码来创建用户界面，修改用户界面代码可能会影响程序运行的核心代码（反之亦然）。这意味着程序的修改过程会很缓慢，因为你必须不断测试，以确保你的更改不会影响程序的其他部分。


    通过将用户界面与 Swift 代码隔离，Xcode 让你能够比以前更快地创建可靠的程序。现在，你可以替换掉一个用户界面，用另一个来取代它，而不影响你的代码；或者你可以修改代码，而不影响用户界面。


    Xcode 为你提供了两种存储用户界面的选项：


    *   在 `.xib` 文件中

    *   在 `.storyboard` 文件中


    一个 `.xib` 文件（代表 Xcode Interface Builder）通常包含用户界面的单个窗口或视图。一个简单的程序可能只需要一个 `.xib`
    文件来存放其用户界面，但更复杂的程序很可能需要多个 `.xib` 文件来存储不同的窗口。


    一个 `.storyboard` 文件由一个或多个视图（view）以及转场（segue）组成，其中视图通常代表屏幕上出现的一个窗口，而转场定义了从一个视图到下一个视图的过渡。


    实际上，你可以将 `.xib` 和 `.storyboard` 文件结合在同一个项目中，来创建程序的用户界面。由于 `.storyboard` 文件常用于创建
    iOS 应用，它们现在也越来越普遍地用于创建 OS X 用户界面。（第 14 章会更详细地解释故事板和转场。）


    用户界面的基本组件是视图（view），它在屏幕上显示信息。一个视图可以是一个完整的窗口，也可以只是一个能显示信息（如表格、文本滚动列表或图片）的框。无论你使用的是
    `.xib` 还是 `.storyboard` 文件，用户界面总是由一个或多个包含其他用户界面元素（如按钮和文本字段）的视图组成。


    # 搜索对象库


    要显示程序的用户界面，你需要在项目导航器窗格中点击 `.xib` 或 `.storyboard` 文件。一旦你选择了要修改的用户界面文件，就可以从对象库（位于
    Xcode 窗口的右下角）中拖拽元素，并将其放置在用户界面的任何位置。要查看对象库，请选择 视图 ➤ 实用工具 ➤ 显示对象库。


    搜索对象库有两种方法。一种方法是简单地上下滚动，直到找到你想要的元素。由于对象库列出了所有可用的用户界面元素，滚动查找可能会很笨拙且缓慢。


    更快捷的方法是使用对象库窗格底部的搜索字段，如图 13-1 所示。只需输入你想要的用户界面元素名称的一部分，对象库就会过滤掉所有不匹配你输入内容的元素。


    ![A978-1-4842-1233-2_13_Fig1_HTML.jpg](img/A978-1-4842-1233-2_13_Fig1_HTML.jpg)


    图 13-1.


    搜索字段让你能够快速地在对象库中找到用户界面元素


    要了解如何搜索对象库，请按照以下步骤操作：


    1.  在 Xcode 中，选择 文件 ➤ 新建 ➤ 项目。

    2.  在 OS X 分类下点击 应用程序。

    3.  点击 Cocoa 应用程序，然后点击 下一步 按钮。Xcode 现在会要求你输入产品名称。

    4.  点击 产品名称 文本字段，输入 `UIProgram`。

    5.  确保 语言 弹出菜单显示为 Swift，并且没有勾选任何复选框。注意，此时你可以通过选择“使用故事板”复选框来选择使用故事板，如图 13-2 所示。暂时保持“使用故事板”复选框未选中状态。

    6.  点击 下一步 按钮。Xcode 会询问你希望将项目存储在哪里。

    7.  选择一个文件夹来存储你的项目，然后点击 创建 按钮。

    8.  在项目导航器中点击 `MainMenu.xib` 文件。程序的用户界面将会显示出来。

    9.  点击 UIProgram 图标，如图 13-3 所示，以显示程序用户界面的窗口。

    10. 选择 视图 ➤ 实用工具 ➤ 显示对象库。对象库会出现在 Xcode 窗口的右下角。

    11. 在对象库中上下滚动。注意你可以添加到用户界面中的各种不同元素的名称和种类。

    12. 点击对象库底部的搜索字段，输入 `text`。注意，对象库现在只显示名称或描述中包含“text”的元素，如图 13-4 所示。

    13. 点击对象库底部的搜索字段，然后点击关闭图标（搜索字段最右侧灰色圆圈内的 X）来清除搜索字段。

    14. 输入 `button`。注意，对象库现在只显示名称或描述中包含“button”的元素。如果你知道自己想要元素的全部或部分名称或用途，在对象库中搜索它比在冗长的所有可用用户界面元素列表中滚动要快得多。


    ![A978-1-4842-1233-2_13_Fig2_HTML.jpg](img/A978-1-4842-1233-2_13_Fig2_HTML.jpg)


    图 13-2.


    创建新项目时，你可以选择为你的用户界面使用故事板


    ![A978-1-4842-1233-2_13_Fig3_HTML.jpg](img/A978-1-4842-1233-2_13_Fig3_HTML.jpg)


    图 13-3.


    UIProgram 图标代表你的用户界面窗口


    ![A978-1-4842-1233-2_13_Fig4_HTML.jpg](img/A978-1-4842-1233-2_13_Fig4_HTML.jpg)


    图 13-4.


    在对象库中搜索“text”

