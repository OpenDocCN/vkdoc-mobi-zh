    ## 总结


    当您创建 Cocoa 应用程序项目时，Xcode 会自动为您的程序创建下拉菜单。您可以添加、删除或重新排列菜单栏上的菜单标题或下拉菜单中的菜单命令。为了方便用户，您甚至可以为菜单命令分配键盘快捷键。


    要编辑下拉菜单，您可以直接在下拉菜单上进行编辑，也可以打开 `Document Outline`。您可以从下拉菜单命令或 `Document Outline`
    按住 Control 键拖拽，将菜单命令连接到 `IBAction` 方法。


    在处理 `.storyboard` 文件时，您通常会将菜单命令连接到 `First Responder` 图标。然后，您可以在正确的 Swift 文件中实现
    `IBAction` 方法，以使该菜单命令生效。在处理 `.xib` 文件时，您可以直接将菜单命令连接到 `IBAction` 方法。


    当 Xcode 为您的 Cocoa 应用程序创建下拉菜单时，其中许多菜单命令已经知道如何工作，例如 `Window` ➤ `Zoom` 和 `File` ➤
    `Close`。然而，大多数菜单命令在您编写自己的 Swift 代码以使它们在特定程序中正常工作之前，不会执行任何操作。


    下拉菜单上的菜单命令为您提供了另一种将命令连接到 `IBAction` 方法的方式。由于大多数 OS X 程序都依赖下拉菜单，因此应首先专注于将程序命令组织到下拉菜单中，然后编写
    Swift 代码以使每个菜单命令实际生效。


    # 20. 面向协议编程


    当苹果公司在 2014 年的全球开发者大会上推出 Swift 时，他们宣传它是一种比 Objective-C 更简单、更安全、更快的 iOS、OS X 和
    watchOS 开发语言。虽然 Swift 和 Objective-C 都支持面向对象编程，但 Swift 更进一步，还提供了面向协议编程。


    纯面向对象编程语言的最大问题之一是，扩展类的功能意味着要创建额外的子类。然后，您必须基于这些新的子类创建对象。这可能是一个笨拙的解决方案，因为您现在必须跟踪一个或多个子类，而每个子类都有不同的名称，并且它们之间可能只存在微小的差异。


    更糟糕的是，Swift（与某些面向对象编程语言不同）只允许单一继承。这意味着一个类只能恰好继承自另一个类。如果您真的想从两个不同的类继承属性和方法，那是做不到的。


    为了解决这种继承和多个子类的问题，Swift 提供了协议。协议的工作原理与面向对象编程类似，但具有一些额外的优势：


    -   协议可以扩展类、结构体和枚举的功能。继承只能扩展类的功能。

    -   单个类、结构体或枚举可以由一个或多个协议扩展。继承只能扩展单个类。


    这意味着协议比类更灵活、更通用，同时让您能获得面向对象编程的优点而避免其缺点。您可以使用协议（面向协议编程）来代替类（面向对象编程），或者将面向对象编程和面向协议编程混合使用，从而兼得两者之长。

