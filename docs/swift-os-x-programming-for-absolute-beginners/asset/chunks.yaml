- fmt: '### User Interface Items That Display and Accept Text


    Although the Object Library contains a huge number of available items that you
    can place on a user interface, most items can be grouped into categories by function.
    Remember, a user interface has three functions:


    - Display information to the user

    - Accept data from the user

    - Allow the user to control the program


    The simplest way to display information on a user interface is through a label.
    In the Cocoa framework, a label is based on the `NSTextField` class. Essentially
    a label is a text field that you can’t edit. To identify the class of any item
    in the Object Library, just click on it and a pop-up window appears that describes
    the item’s purpose and the class it’s based on as shown in Figure [13-5](#A978-1-4842-1233-2_13_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_13_Fig5_HTML.jpg](A978-1-4842-1233-2_13_Fig5_HTML.jpg)


    Figure 13-5. Identifying the class of a user interface item in the Object Library


    Any user interface item based on the `NSTextField` can be used to display and
    accept text, although it’s more common to use a label for displaying text and
    any other type of text field for letting the user type in text. The list of user
    interface items based on the `NSTextField` is shown in Figure [13-6](#A978-1-4842-1233-2_13_Chapter.html#Fig6):


    ![A978-1-4842-1233-2_13_Fig6_HTML.jpg](A978-1-4842-1233-2_13_Fig6_HTML.jpg)


    Figure 13-6. User interface items based on the `NSTextField` class


    - **Label** – Displays text but does not allow the user to enter or edit text.

    - **Text Field** – Lets the user enter and edit text.

    - **Secure Text Field** – Masks entered text with characters such as hiding typed
    passwords from view.

    - **Text Field with Number Formatter** – Lets the user enter and edit formatted
    numbers easily.

    - **Wrapping Label** – Displays text on multiple lines.

    - **Wrapping Text Field** – Lets the user enter and edit text that appears on
    multiple lines.


    ### User Interface Items That Restrict Choices


    Letting the user enter data in a text field provides maximum flexibility. However,
    this flexibility also means that your program has no idea what type of data the
    user might enter. If a program expects the user to type in a number for an age,
    but the user types in “forty-nine” instead, the program will likely crash because
    it expects a number but received a word.


    Even worse, a program could ask for someone’s age and a user could type a negative
    number or an outrageously high number such as 239, which is clearly impossible
    for someone’s age. To ensure that users enter in correct data, you can use a variety
    of different user interface items that lets the user choose a range of valid options.
    User interface items that display text (including numbers) choices include:


    - **Pop Up Button** (`NSPopUpButton`) – Displays a menu of valid options.

    - **Radio Group** (`NSMatrix`) – Displays a list of radio buttons where only one
    can be chosen at any given time.

    - **Check Box** (`NSButton`) – Displays one or more check boxes to let the user
    select multiple options.

    - **Combo Box** (`NSComboBox`) – Acts like a combination text field and pop-up
    button where the user can either type in text or choose from a list of valid options.


    User interface items that allow the user to select a range of valid numeric options
    include:


    - **Date Picker** (`NSDataPicker`) – Lets the user choose a date including day,
    month, and year.

    - **Horizontal/Vertical/Circular Slider** (`NSSlider`) – Lets the user move a
    slider to select a fixed range of valid numeric values.

    - **Stepper** (`NSStepper`) – Increments or decrements a value by a fixed amount.


    With text options, you need to list all valid options that the user can choose.
    With numeric options, you just need to list a range of all valid options such
    as letting the user choose a number between 1 and 100.


    ### User Interface Items That Accept Commands


    The most common user interface item is one that accepts commands so the user can
    control a program. The two most common types of user interface items that accept
    commands are buttons and menus. Each button or menu item represent a single command,
    so when the user clicks on a button or menu item, that command tells the program
    to do something.


    Both buttons and menu items allow the view to communicate back to the controller
    using something called target-action as shown in Figure [13-7](#A978-1-4842-1233-2_13_Chapter.html#Fig7).
    The target is a button or menu item, which triggers an action back in the controller,
    such as running an `IBAction` method.


    ![A978-1-4842-1233-2_13_Fig7_HTML.gif](A978-1-4842-1233-2_13_Fig7_HTML.gif)


    Figure 13-7. Buttons and menu items let a view communicate back to a controller


    User interface buttons are based on the `NSButton` class. Menu items are based
    on the `NSMenuItem` class. The Object Library displays a variety of different
    types of buttons and menu items, but they all work alike where the button or menu
    item represents a command. To make that command work, you need to connect the
    button on the user interface to an `IBAction` method in a Swift file.


    ### User Interface Items That Groups Items


    One type of user interface item does nothing but group and organize other items
    on the user interface, such as displaying a box around related buttons or text.
    These user interface items are more decorative so you likely won’t need to connect
    them to Swift code using `IBOutlets` or `IBAction` methods. Some examples of items
    that group and organize other user interface items include:


    - **Table View** (`NSTableView`) – Displays data in rows.

    - **Collection View** (`NSCollectionView`) – Displays data in rows and columns.

    - **Box** (`NSBox`) – Displays a box that draws a border around related items.

    - **Tab View** (`NSTabView`) – Displays two or more tabs that can change the data
    that appears inside a box as shown in Figure [13-8](#A978-1-4842-1233-2_13_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_13_Fig8_HTML.jpg](A978-1-4842-1233-2_13_Fig8_HTML.jpg)


    Figure 13-8. A Tab View can group two or more groups of related items in the same
    box


    - **Windows** (`NSWindow`) – Displays a window that can hold other user interface
    items.

    - **Toolbar** (`NSToolbar`) – Displays icons that represent commands.


    Although the Object Library contains many other items, they typically fall in
    one of these four categories:


    - Items that display or accept text.

    - Items that let the user choose from a limited range of valid options.

    - Items that let the user choose a command to control the program.

    - Items that group or organize other user interface items.


    ## Using Constraints in Auto Layout


    No matter what type of items you place on a user interface, you need to consider
    what happens if the user resizes the window. A window that’s too big might leave
    too much empty space on the user interface. A window that’s too small might cut
    off items as shown in Figure [13-9](#A978-1-4842-1233-2_13_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_13_Fig9_HTML.jpg](A978-1-4842-1233-2_13_Fig9_HTML.jpg)


    Figure 13-9. A user interface that doesn’t adapt when the user resizes a window
    risks cutting off items


    There are two ways to make sure a user interface remains usable when the user
    resizes a window. First, you can define minimum and maximum sizes for a window
    to keep a window from shrinking or expanding too much. Second, you can set constraints
    on individual items that define the distance between neighboring items and the
    edges of the window.


    In most cases, you can use both methods. That way you can define a minimum and
    maximum size for a window, and define how items on your user interface should
    adapt to changes in the window size.'
  raw: "### User Interface Items That Display and Accept Text\n\nAlthough the Object\
    \ Library contains a huge number of available items that you can place on a user\
    \ interface, most items can be grouped into categories by function. Remember,\
    \ a user interface has three functions:\n\n*   Display information to the user\n\
    *   Accept data from the user\n*   Allow the user to control the program\n\nThe\
    \ simplest way to display information on a user interface is through a label.\
    \ In the Cocoa framework, a label is based on the NSTextField class. Essentially\
    \ a label is a text field that you can’t edit. To identify the class of any item\
    \ in the Object Library, just click on it and a pop-up window appears that describes\
    \ the item’s purpose and the class it’s based on as shown in Figure [13-5](#A978-1-4842-1233-2_13_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1233-2_13_Fig5_HTML.jpg](A978-1-4842-1233-2_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5.\n\nIdentifying the class of a user interface item in the Object\
    \ Library\n\nAny user interface item based on the NSTextField can be used to display\
    \ and accept text, although it’s more common to use a label for displaying text\
    \ and any other type of text field for letting the user type in text. The list\
    \ of user interface items based on the NSTextField is shown in Figure [13-6](#A978-1-4842-1233-2_13_Chapter.html#Fig6):\n\
    \n![A978-1-4842-1233-2_13_Fig6_HTML.jpg](A978-1-4842-1233-2_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6.\n\nUser interface items based on the NSTextField class\n\n*   Label\
    \ – Displays text but does not allow the user to enter or edit text.\n*   Text\
    \ Field – Lets the user enter and edit text.\n*   Secure Text Field – Masks entered\
    \ text with characters such as hiding typed passwords from view.\n*   Text Field\
    \ with Number Formatter – Lets the user enter and edit formatted numbers easily.\n\
    *   Wrapping Label – Displays text on multiple lines.\n*   Wrapping Text Field\
    \ – Lets the user enter and edit text that appears on multiple lines.\n\n### User\
    \ Interface Items That Restrict Choices\n\nLetting the user enter data in a text\
    \ field provides maximum flexibility. However, this flexibility also means that\
    \ your program has no idea what type of data the user might enter. If a program\
    \ expects the user to type in a number for an age, but the user types in “forty-nine”\
    \ instead, the program will likely crash because it expects a number but received\
    \ a word.\n\nEven worse, a program could ask for someone’s age and a user could\
    \ type a negative number or an outrageously high number such as 239, which is\
    \ clearly impossible for someone’s age. To ensure that users enter in correct\
    \ data, you can use a variety of different user interface items that lets the\
    \ user choose a range of valid options. User interface items that display text\
    \ (including numbers) choices include:\n\n*   Pop Up Button (NSPopUpButton) –\
    \ Displays a menu of valid options.\n*   Radio Group (NSMatrix) – Displays a list\
    \ of radio buttons where only one can be chosen at any given time.\n*   Check\
    \ Box (NSButton) – Displays one or more check boxes to let the user select multiple\
    \ options.\n*   Combo Box (NSComboBox) – Acts like a combination text field and\
    \ pop-up button where the user can either type in text or choose from a list of\
    \ valid options.\n\nUser interface items that allow the user to select a range\
    \ of valid numeric options include:\n\n*   Date Picker (NSDataPicker) – Lets the\
    \ user choose a date including day, month, and year.\n*   Horizontal/Vertical/Circular\
    \ Slider (NSSlider) – Lets the user move a slider to select a fixed range of valid\
    \ numeric values.\n*   Stepper (NSStepper) – Increments or decrements a value\
    \ by a fixed amount.\n\nWith text options, you need to list all valid options\
    \ that the user can choose. With numeric options, you just need to list a range\
    \ of all valid options such as letting the user choose a number between 1 and\
    \ 100.\n\n### User Interface Items That Accept Commands\n\nThe most common user\
    \ interface item is one that accepts commands so the user can control a program.\
    \ The two most common types of user interface items that accept commands are buttons\
    \ and menus. Each button or menu item represent a single command, so when the\
    \ user clicks on a button or menu item, that command tells the program to do something.\n\
    \nBoth buttons and menu items allow the view to communicate back to the controller\
    \ using something called target-action as shown in Figure [13-7](#A978-1-4842-1233-2_13_Chapter.html#Fig7).\
    \ The target is a button or menu item, which triggers an action back in the controller,\
    \ such as running an IBAction method.\n\n![A978-1-4842-1233-2_13_Fig7_HTML.gif](A978-1-4842-1233-2_13_Fig7_HTML.gif)\n\
    \nFigure 13-7.\n\nButtons and menu items let a view communicate back to a controller\n\
    \nUser interface buttons are based on the NSButton class. Menu items are based\
    \ on the NSMenuItem class. The Object Library displays a variety of different\
    \ types of buttons and menu items, but they all work alike where the button or\
    \ menu item represents a command. To make that command work, you need to connect\
    \ the button on the user interface to an IBAction method in a Swift file.\n\n\
    ### User Interface Items That Groups Items\n\nOne type of user interface item\
    \ does nothing but group and organize other items on the user interface, such\
    \ as displaying a box around related buttons or text. These user interface items\
    \ are more decorative so you likely won’t need to connect them to Swift code using\
    \ IBOutlets or IBAction methods. Some examples of items that group and organize\
    \ other user interface items include:\n\n*   Table View (NSTableView) – Displays\
    \ data in rows.\n*   Collection View (NSCollectionView) – Displays data in rows\
    \ and columns.\n*   Box (NSBox) – Displays a box that draws a border around related\
    \ items.\n*   Tab View (NSTabView) – Displays a two or more tabs that can change\
    \ the data that appears inside a box as shown in Figure [13-8](#A978-1-4842-1233-2_13_Chapter.html#Fig8).\n\
    \n    ![A978-1-4842-1233-2_13_Fig8_HTML.jpg](A978-1-4842-1233-2_13_Fig8_HTML.jpg)\n\
    \n    Figure 13-8.\n\n    A Tab View can group two or more groups of related items\
    \ in the same box\n*   Windows (NSWindow) – Displays a window that can hold other\
    \ user interface items.\n*   Toolbar (NSToolbar) – Displays icons that represent\
    \ commands.\n\nAlthough the Object Library contains many other items, they typically\
    \ fall in one of these four categories:\n\n*   Items that display or accept text.\n\
    *   Items that let the user choose from a limited range of valid options.\n* \
    \  Items that let the user choose a command to control the program.\n*   Items\
    \ that group or organize other user interface items.\n\n## Using Constraints in\
    \ Auto Layout\n\nNo matter what type of items you place on a user interface, you\
    \ need to consider what happens if the user resizes the window. A window that’s\
    \ too big might leave too much empty space on the user interface. A window that’s\
    \ too small might cut off items as shown in Figure [13-9](#A978-1-4842-1233-2_13_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_13_Fig9_HTML.jpg](A978-1-4842-1233-2_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9.\n\nA user interface that doesn’t adapt when the user resizes a\
    \ window risks cutting off items\n\nThere are two ways to make sure a user interface\
    \ remains usable when the user resizes a window. First, you can define minimum\
    \ and maximum sizes for a window to keep a window from shrinking or expanding\
    \ too much. Second, you can set constraints on individual items that define the\
    \ distance between neighboring items and the edges of the window.\n\nIn most cases,\
    \ you can use both methods. That way you can define a minimum and maximum size\
    \ for a window, and define how items on your user interface should adapt to changes\
    \ in the window size."
  trans: '

    ### 显示和接受文本的用户界面项


    虽然对象库中包含大量可用于用户界面的项，但大多数项可按功能分类。请记住，用户界面具有三项功能：


    - 向用户显示信息

    - 接受用户输入的数据

    - 允许用户控制程序


    在用户界面上显示信息的最简单方式是通过标签。在 Cocoa 框架中，标签基于 `NSTextField` 类。本质上，标签是一种不可编辑的文本字段。要识别对象库中任何项的类，只需点击该项，便会弹出一个窗口，描述该项的用途及其所基于的类，如图
    13-5 所示。


    ![A978-1-4842-1233-2_13_Fig5_HTML.jpg](img/A978-1-4842-1233-2_13_Fig5_HTML.jpg)


    图 13-5. 在对象库中识别用户界面项的类


    任何基于 `NSTextField` 的用户界面项都可用于显示和接受文本，尽管更常见的做法是使用标签显示文本，而使用其他类型的文本字段让用户输入文本。基于
    `NSTextField` 的用户界面项列表如图 13-6 所示：


    ![A978-1-4842-1233-2_13_Fig6_HTML.jpg](img/A978-1-4842-1233-2_13_Fig6_HTML.jpg)


    图 13-6. 基于 `NSTextField` 类的用户界面项


    - **标签** – 显示文本，但不允许用户输入或编辑文本。

    - **文本字段** – 允许用户输入和编辑文本。

    - **安全文本字段** – 使用字符掩盖输入的文本，例如隐藏输入的密码。

    - **带数字格式器的文本字段** – 让用户轻松输入和编辑格式化数字。

    - **自动换行标签** – 在多行上显示文本。

    - **自动换行文本字段** – 允许用户输入和编辑显示在多行上的文本。


    ### 限制选项的用户界面项


    让用户在文本字段中输入数据提供了最大的灵活性。然而，这种灵活性也意味着程序无法预知用户可能输入何种数据。如果程序期望用户输入年龄数字，但用户输入了“forty-nine”，程序很可能崩溃，因为它期望的是数字，却收到了单词。


    更糟的是，程序可能要求输入某人的年龄，而用户可能输入负数或高得离谱的数字，如 239，这显然不可能是人的年龄。为确保用户输入正确的数据，可以使用多种不同的用户界面项，让用户从有效选项范围内选择。显示文本（包括数字）选项的用户界面项包括：


    - **弹出按钮** (`NSPopUpButton`) – 显示一个包含有效选项的菜单。

    - **单选按钮组** (`NSMatrix`) – 显示一组单选按钮，在任意时刻只能选中一个。

    - **复选框** (`NSButton`) – 显示一个或多个复选框，让用户选择多个选项。

    - **组合框** (`NSComboBox`) – 功能类似于组合了文本字段和弹出按钮的控件，用户既可以输入文本，也可以从有效选项列表中选择。


    允许用户选择有效数值范围选项的用户界面项包括：


    - **日期选择器** (`NSDataPicker`) – 让用户选择日期，包括日、月、年。

    - **水平/垂直/圆形滑块** (`NSSlider`) – 让用户拖动滑块，以选择固定范围内的有效数值。

    - **步进器** (`NSStepper`) – 以固定增量增减数值。


    对于文本选项，你需要列出所有用户可选择的合法选项。对于数值选项，你只需列出一个有效值的范围，例如让用户选择 1 到 100 之间的数字。


    ### 接受命令的用户界面项


    最常见的用户界面项是接受命令的项，以便用户控制程序。两种最常见的接受命令的用户界面项是按钮和菜单。每个按钮或菜单项代表一条单独的命令，因此当用户点击按钮或菜单项时，该命令会指示程序执行相应操作。


    按钮和菜单项都允许视图通过一种称为目标-动作（target-action）的机制与控制器通信，如图 13-7 所示。目标是按钮或菜单项，它会触发控制器中的动作，例如运行一个
    `IBAction` 方法。


    ![A978-1-4842-1233-2_13_Fig7_HTML.gif](img/A978-1-4842-1233-2_13_Fig7_HTML.gif)


    图 13-7. 按钮和菜单项允许视图与控制器通信


    用户界面按钮基于 `NSButton` 类。菜单项基于 `NSMenuItem` 类。对象库中显示了多种不同类型的按钮和菜单项，但它们的工作方式都相同，即按钮或菜单项代表一条命令。要使该命令生效，需要将用户界面上的按钮连接到
    Swift 文件中的 `IBAction` 方法。


    ### 分组项的用户界面项


    有一类用户界面项仅用于对用户界面上的其他项进行分组和组织，例如在相关按钮或文本周围显示一个框。这类用户界面项更具装饰性，因此你可能不需要使用 `IBOutlets`
    或 `IBAction` 方法将它们连接到 Swift 代码。一些用于分组和组织其他用户界面项的项示例如下：


    - **表格视图** (`NSTableView`) – 以行形式显示数据。

    - **集合视图** (`NSCollectionView`) – 以行和列形式显示数据。

    - **框** (`NSBox`) – 显示一个在相关项周围绘制边框的盒子。

    - **标签视图** (`NSTabView`) – 显示两个或多个标签，这些标签可以更改框内显示的数据，如图 13-8 所示。


    ![A978-1-4842-1233-2_13_Fig8_HTML.jpg](img/A978-1-4842-1233-2_13_Fig8_HTML.jpg)


    图 13-8. 标签视图可以在同一个框中对两组或多组相关项进行分组


    - **窗口** (`NSWindow`) – 显示一个可以容纳其他用户界面项的窗口。

    - **工具栏** (`NSToolbar`) – 显示代表命令的图标。


    尽管对象库中包含许多其他项，但它们通常属于以下四类之一：


    - 显示或接受文本的项。

    - 让用户在有限的有效选项范围内选择的项。

    - 让用户选择命令以控制程序的项。

    - 对其他用户界面项进行分组或组织的项。


    ## 在自动布局中使用约束


    无论你在用户界面上放置何种类型的项，都需要考虑用户调整窗口大小时会发生什么。窗口太大可能会在用户界面上留下过多空白区域。窗口太小则可能截断项目，如图 13-9
    所示。


    ![A978-1-4842-1233-2_13_Fig9_HTML.jpg](img/A978-1-4842-1233-2_13_Fig9_HTML.jpg)


    图 13-9. 用户调整窗口大小时不适应的用户界面存在截断项目的风险


    有两种方法可以确保用户界面在用户调整窗口大小时保持可用。首先，你可以为窗口定义最小和最大尺寸，以防止窗口过度缩小或扩大。其次，你可以对单个项目设置约束，定义相邻项目之间以及项目与窗口边缘之间的距离。


    在大多数情况下，你可以同时使用这两种方法。这样，你既可以定义窗口的最小和最大尺寸，也可以定义用户界面上的项目应如何适应窗口大小的变化。'
- fmt: "### Defining Window Sizes\n\nA window displays your program’s user interface\
    \ on the screen. `Xcode` lets you define the following for a window as shown in\
    \ Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10):\n\n- The initial\
    \ size of the window.\n- The minimum size of the window.\n- The maximum size of\
    \ the window.\n- The initial position of the window on the screen.\n\n![A978-1-4842-1233-2_13_Fig10_HTML.jpg](A978-1-4842-1233-2_13_Fig10_HTML.jpg)\n\
    \n*Figure 13-10.* The `Size Inspector` lets you define the size of a window\n\n\
    To define the size of a window of an `.xib` file in `Xcode`, follow these steps:\n\
    \n1. Click on the `.xib` file in the `Project Navigator` pane. `Xcode` displays\
    \ the user interface stored in the `.xib` file.\n2. If necessary, click the `Hide\
    \ Document Outline` icon that appears in the bottom left corner as shown in Figure\
    \ [13-11](#A978-1-4842-1233-2_13_Chapter.html#Fig11).\n\n![A978-1-4842-1233-2_13_Fig11_HTML.jpg](A978-1-4842-1233-2_13_Fig11_HTML.jpg)\n\
    \n*Figure 13-11.* The `Hide Document Outline` icon\n\n3. Click on the bottom icon\
    \ that represents the window of your user interface as shown in Figure [13-12](#A978-1-4842-1233-2_13_Chapter.html#Fig12).\n\
    \n![A978-1-4842-1233-2_13_Fig12_HTML.jpg](A978-1-4842-1233-2_13_Fig12_HTML.jpg)\n\
    \n*Figure 13-12.* The bottom icon represents your user interface window\n\n4.\
    \ Choose `View ➤ Utilities ➤ Show Size Inspector`. The `Size Inspector` pane appears\
    \ (see Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10)).\n\nWindows\
    \ stored in `.storyboard` files work slightly differently than `.xib` files. To\
    \ define the size of a window of a `.storyboard` file in `Xcode`, follow these\
    \ steps:\n\n1. Click on the `.storyboard` file in the `Project Navigator` pane.\
    \ `Xcode` displays the user interface stored in the `.storyboard` file.\n2. Click\
    \ on the `View Controller` of the window you want to modify as shown in Figure\
    \ [13-13](#A978-1-4842-1233-2_13_Chapter.html#Fig13).\n\n![A978-1-4842-1233-2_13_Fig13_HTML.jpg](A978-1-4842-1233-2_13_Fig13_HTML.jpg)\n\
    \n*Figure 13-13.* The `View Controller` defines your user interface window\n\n\
    3. Choose `View ➤ Utilities ➤ Show Size Inspector`. The `Size Inspector` pane\
    \ appears (see Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10)).\n\n\
    `Xcode` gives you two ways to change the size of a window. First, you can drag\
    \ a side or corner of the window (or view controller) using the mouse. Second,\
    \ you can click in the `Width` and `Height` text fields next to the `Size` label\
    \ to choose a precise size for your window’s width and height as shown in Figure\
    \ [13-14](#A978-1-4842-1233-2_13_Chapter.html#Fig14).\n\n![A978-1-4842-1233-2_13_Fig14_HTML.jpg](A978-1-4842-1233-2_13_Fig14_HTML.jpg)\n\
    \n*Figure 13-14.* The `View Controller` defines your user interface window\n\n\
    To define the minimum and/or maximum size of a window involves a two-step process.\
    \ First, you need to select the `Minimum Size` and/or `Maximum Size` check box.\
    \ Second, you need to type or choose a width and height to define the minimum\
    \ or maximum size for your window as shown in Figure [13-15](#A978-1-4842-1233-2_13_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1233-2_13_Fig15_HTML.jpg](A978-1-4842-1233-2_13_Fig15_HTML.jpg)\n\
    \n*Figure 13-15.* Defining the minimum and maximum size for a window\n\nFinally,\
    \ you can define the initial position of a window when it first appears. You can\
    \ do this by either dragging on the window icon on the simulated screen or by\
    \ typing in an `X` and `Y` value into the `Initial Position` text fields as shown\
    \ in Figure [13-16](#A978-1-4842-1233-2_13_Chapter.html#Fig16).\n\n![A978-1-4842-1233-2_13_Fig16_HTML.jpg](A978-1-4842-1233-2_13_Fig16_HTML.jpg)\n\
    \n*Figure 13-16.* Defining the initial position of a window\n\nThe two pop-up\
    \ menus underneath the simulated screen let you define how to determine the initial\
    \ position of a window:\n\n- **Fixed from Left/Right** – Defines a fixed value\
    \ between the window edge and the screen edge\n- **Proportional Horizontal/Vertical**\
    \ – Defines a proportional value between the window edge and the screen edge,\
    \ based on the size of the screen\n- **Center Horizontally/Vertically** – Defines\
    \ the window to appear in the center of the screen\n\nTo see how you can specify\
    \ a window’s position and minimum/maximum size, let’s create a simple program\
    \ and modify its window.\n\nFrom within `Xcode` choose `File ➤ New ➤ Project`.\
    \  \nClick `Application` under the `OS X` category.  \nClick `Cocoa Application`\
    \ and click the `Next` button. `Xcode` now asks for a product name.  \nClick in\
    \ the `Product Name` text field and type `WindowProgram`.  \nMake sure the `Language`\
    \ pop-up menu displays `Swift` and that no check boxes are selected.  \nClick\
    \ the `Next` button. `Xcode` asks where you want to store the project.  \nChoose\
    \ a folder to store your project and click the `Create` button.  \nClick the `MainMenu.xib`\
    \ file in the `Project Navigator`.  \nClick on the `WindowProgram` icon to make\
    \ the window of the user interface appear.  \nChoose `View ➤ Utilities ➤ Show\
    \ Size Inspector`. The `Size Inspector` pane appears.  \nClick the `Minimum Content\
    \ Size` check box. `Xcode` displays the current width and height of the window,\
    \ so keep those values.  \nClick the `Maximum Content Size` check box and change\
    \ the `Width` and `Height` text fields to `600`.  \nDrag the gray window rectangle\
    \ in the `Initial Position` category to the far bottom right corner. The `Size\
    \ Inspector` pane should look like Figure [13-17](#A978-1-4842-1233-2_13_Chapter.html#Fig17).\n\
    \n![A978-1-4842-1233-2_13_Fig17_HTML.jpg](A978-1-4842-1233-2_13_Fig17_HTML.jpg)\n\
    \n*Figure 13-17.* Specifying a minimum, maximum, and initial position of a window\n\
    \nChoose `Product ➤ Run`. Notice that the program’s window appears in the bottom\
    \ right corner since that’s where you defined its initial position.  \nMove the\
    \ mouse pointer over the left edge of the window, hold down the left mouse button,\
    \ and drag the mouse left and right. Notice that you can only widen and shrink\
    \ the window to a fixed size. That’s because you defined both a minimum and maximum\
    \ size for the window.  \nChoose `WindowProgram ➤ Quit WindowProgram`."
  raw: '### Defining Window Sizes


    A window displays your program’s user interface on the screen. Xcode lets you
    define the following for a window as shown in Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10):


    *   The initial size of the window.

    *   The minimum size of the window.

    *   The maximum size of the window.

    *   The initial position of the window on the screen.


    ![A978-1-4842-1233-2_13_Fig10_HTML.jpg](A978-1-4842-1233-2_13_Fig10_HTML.jpg)


    Figure 13-10.


    The Size Inspector lets you define the size of a window


    To define the size of a window of an .xib file in Xcode, follow these steps:


    Click on the .xib file in the Project Navigator pane. Xcode displays the user
    interface stored in the .xib file.   If necessary, click the Hide Document Outline
    icon that appears in the bottom left corner as shown in Figure [13-11](#A978-1-4842-1233-2_13_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_13_Fig11_HTML.jpg](A978-1-4842-1233-2_13_Fig11_HTML.jpg)


    Figure 13-11.


    The Hide Document Outline icon  Click on the bottom icon that represents the window
    of your user interface as shown in Figure [13-12](#A978-1-4842-1233-2_13_Chapter.html#Fig12).


    ![A978-1-4842-1233-2_13_Fig12_HTML.jpg](A978-1-4842-1233-2_13_Fig12_HTML.jpg)


    Figure 13-12.


    The bottom icon represents your user interface window  Choose View ➤ Utilities
    ➤ Show Size Inspector. The Size Inspector pane appears (see Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10)).


    Windows stored in .storyboard files work slightly differently than .xib files.
    To define the size of a window of a .storyboard file in Xcode, follow these steps:


    Click on the .storyboard file in the Project Navigator pane. Xcode displays the
    user interface stored in the .storyboard file.   Click on the View Controller
    of the window you want to modify as shown in Figure [13-13](#A978-1-4842-1233-2_13_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_13_Fig13_HTML.jpg](A978-1-4842-1233-2_13_Fig13_HTML.jpg)


    Figure 13-13.


    The View Controller defines your user interface window  Choose View ➤ Utilities
    ➤ Show Size Inspector. The Size Inspector pane appears (see Figure [13-10](#A978-1-4842-1233-2_13_Chapter.html#Fig10)).


    Xcode gives you two ways to change the size of a window. First, you can drag a
    side or corner of the window (or view controller) using the mouse. Second, you
    can click in the Width and Height text fields next to the Size label to choose
    a precise size for your window’s width and height as shown in Figure [13-14](#A978-1-4842-1233-2_13_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_13_Fig14_HTML.jpg](A978-1-4842-1233-2_13_Fig14_HTML.jpg)


    Figure 13-14.


    The View Controller defines your user interface window


    To define the minimum and/or maximum size of a window involves a two-step process.
    First, you need to select the Minimum Size and/or Maximum Size check box. Second,
    you need to type or choose a width and height to define the minimum or maximum
    size for your window as shown in Figure [13-15](#A978-1-4842-1233-2_13_Chapter.html#Fig15).


    ![A978-1-4842-1233-2_13_Fig15_HTML.jpg](A978-1-4842-1233-2_13_Fig15_HTML.jpg)


    Figure 13-15.


    Defining the minimum and maximum size for a window


    Finally, you can define the initial position of a window when it first appears.
    You can do this by either dragging on the window icon on the simulated screen
    or by typing in an X and Y value into the Initial Position text fields as shown
    in Figure [13-16](#A978-1-4842-1233-2_13_Chapter.html#Fig16).


    ![A978-1-4842-1233-2_13_Fig16_HTML.jpg](A978-1-4842-1233-2_13_Fig16_HTML.jpg)


    Figure 13-16.


    Defining the initial position of a window


    The two pop-up menus underneath the simulated screen lets you define how to determine
    the initial position of a window:


    *   Fixed from Left/Right – Defines a fixed value between the window edge and
    the screen edge

    *   Proportional Horizontal/Vertical – Defines a proportional value between the
    window edge and the screen edge, based on the size of the screen

    *   Center Horizontally/Vertically – Defines the window to appear in the center
    of the screen


    To see how you can specify a window’s position and minimum/maximum size, let’s
    create a simple program and modify its window.


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type WindowProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    MainMenu.xib file in the Project Navigator.   Click on the WindowProgram icon
    to make the window of the user interface appear.   Choose View ➤ Utilities ➤ Show
    Size Inspector. The Size Inspector pane appears.   Click the Minimum Content Size
    check box. Xcode displays the current width and height of the window, so keep
    those values.   Click the Maximum Content Size check box and change the Width
    and Height text fields to 600.   Drag the gray window rectangle in the Initial
    Position category to the far bottom right corner. The Size Inspector pane should
    look like Figure [13-17](#A978-1-4842-1233-2_13_Chapter.html#Fig17).


    ![A978-1-4842-1233-2_13_Fig17_HTML.jpg](A978-1-4842-1233-2_13_Fig17_HTML.jpg)


    Figure 13-17.


    Specifying a minimum, maximum, and initial position of a window  Choose Product
    ➤ Run. Notice that the program’s window appears in the bottom right corner since
    that’s where you defined its initial position.   Move the mouse pointer over the
    left edge of the window, hold down the left mouse button, and drag the mouse left
    and right. Notice that you can only widen and shrink the window to a fixed size.
    That’s because you defined both a minimum and maximum size for the window.   Choose
    WindowProgram ➤ Quit WindowProgram.'
  trans: "\n### 定义窗口尺寸\n\n窗口在屏幕上显示程序的用户界面。`Xcode` 允许你为窗口定义以下内容，如图 13-10 所示：\n\n- \
    \  窗口的初始尺寸。\n-   窗口的最小尺寸。\n-   窗口的最大尺寸。\n-   窗口在屏幕上的初始位置。\n\n![A978-1-4842-1233-2_13_Fig10_HTML.jpg](img/A978-1-4842-1233-2_13_Fig10_HTML.jpg)\n\
    \n*图 13-10.* `尺寸检查器` 可让你定义窗口的尺寸\n\n要在 `Xcode` 中定义 `.xib` 文件的窗口尺寸，请按以下步骤操作：\n\n\
    1.  在 `项目导航器` 窗格中点击 `.xib` 文件。`Xcode` 会显示该 `.xib` 文件中存储的用户界面。\n2.  如有必要，请点击左下角出现的\
    \ `隐藏文档大纲` 图标，如图 13-11 所示。\n\n![A978-1-4842-1233-2_13_Fig11_HTML.jpg](img/A978-1-4842-1233-2_13_Fig11_HTML.jpg)\n\
    \n*图 13-11.* `隐藏文档大纲` 图标\n\n3.  点击代表用户界面窗口的底部图标，如图 13-12 所示。\n\n![A978-1-4842-1233-2_13_Fig12_HTML.jpg](img/A978-1-4842-1233-2_13_Fig12_HTML.jpg)\n\
    \n*图 13-12.* 底部图标代表你的用户界面窗口\n\n4.  选择 `View ➤ Utilities ➤ Show Size Inspector`。`尺寸检查器`\
    \ 窗格就会出现（参见图 13-10）。\n\n存储在 `.storyboard` 文件中的窗口与 `.xib` 文件的窗口略有不同。要在 `Xcode`\
    \ 中定义 `.storyboard` 文件的窗口尺寸，请按以下步骤操作：\n\n1.  在 `项目导航器` 窗格中点击 `.storyboard` 文件。`Xcode`\
    \ 会显示该 `.storyboard` 文件中存储的用户界面。\n2.  点击要修改的窗口的 `视图控制器`，如图 13-13 所示。\n\n![A978-1-4842-1233-2_13_Fig13_HTML.jpg](img/A978-1-4842-1233-2_13_Fig13_HTML.jpg)\n\
    \n*图 13-13.* `视图控制器` 定义了你的用户界面窗口\n\n3.  选择 `View ➤ Utilities ➤ Show Size Inspector`。`尺寸检查器`\
    \ 窗格就会出现（参见图 13-10）。\n\n`Xcode` 提供了两种更改窗口尺寸的方法。首先，你可以使用鼠标拖动窗口（或视图控制器）的边或角。其次，你可以点击\
    \ `尺寸` 标签旁边的 `宽度` 和 `高度` 文本字段，为窗口的宽度和高度选择精确的尺寸，如图 13-14 所示。\n\n![A978-1-4842-1233-2_13_Fig14_HTML.jpg](img/A978-1-4842-1233-2_13_Fig14_HTML.jpg)\n\
    \n*图 13-14.* `视图控制器` 定义了你的用户界面窗口\n\n定义窗口的最小和/或最大尺寸需要两个步骤。首先，你需要选中 `最小尺寸` 和/或 `最大尺寸`\
    \ 复选框。其次，你需要输入或选择一个宽度和高度，来定义窗口的最小或最大尺寸，如图 13-15 所示。\n\n![A978-1-4842-1233-2_13_Fig15_HTML.jpg](img/A978-1-4842-1233-2_13_Fig15_HTML.jpg)\n\
    \n*图 13-15.* 定义窗口的最小和最大尺寸\n\n最后，你可以定义窗口首次出现时的初始位置。你可以通过拖动模拟屏幕上的窗口图标，或者在 `初始位置`\
    \ 文本字段中输入 `X` 和 `Y` 值来实现，如图 13-16 所示。\n\n![A978-1-4842-1233-2_13_Fig16_HTML.jpg](img/A978-1-4842-1233-2_13_Fig16_HTML.jpg)\n\
    \n*图 13-16.* 定义窗口的初始位置\n\n模拟屏幕下方的两个弹出菜单让你可以定义如何确定窗口的初始位置：\n\n- **从左侧/右侧固定** –\
    \ 定义窗口边缘与屏幕边缘之间的固定值\n- **水平/垂直比例** – 根据屏幕大小，定义窗口边缘与屏幕边缘之间的比例值\n- **水平/垂直居中** –\
    \ 定义窗口出现在屏幕中央\n\n为了了解如何指定窗口的位置及最小/最大尺寸，我们来创建一个简单的程序并修改其窗口。\n\n在 `Xcode` 内部，选择\
    \ `File ➤ New ➤ Project`。  \n点击 `OS X` 类别下的 `Application`。  \n点击 `Cocoa Application`，然后点击\
    \ `Next` 按钮。`Xcode` 现在会要求输入产品名称。  \n点击 `Product Name` 文本字段，输入 `WindowProgram`。\
    \  \n确保 `Language` 弹出菜单显示为 `Swift`，并且没有选中任何复选框。  \n点击 `Next` 按钮。`Xcode` 会询问你想将项目存储在何处。\
    \  \n选择一个文件夹来存储你的项目，然后点击 `Create` 按钮。  \n在 `项目导航器` 中点击 `MainMenu.xib` 文件。  \n\
    点击 `WindowProgram` 图标，使用户界面的窗口显示出来。  \n选择 `View ➤ Utilities ➤ Show Size Inspector`。`尺寸检查器`\
    \ 窗格就会出现。  \n点击 `最小内容尺寸` 复选框。`Xcode` 会显示窗口当前的宽度和高度，因此保留这些值。  \n点击 `最大内容尺寸` 复选框，并将\
    \ `宽度` 和 `高度` 文本字段更改为 `600`。  \n将 `初始位置` 类别中的灰色窗口矩形拖到最右下角。`尺寸检查器` 窗格应该如图 13-17\
    \ 所示。\n\n![A978-1-4842-1233-2_13_Fig17_HTML.jpg](img/A978-1-4842-1233-2_13_Fig17_HTML.jpg)\n\
    \n*图 13-17.* 指定窗口的最小、最大和初始位置\n\n选择 `Product ➤ Run`。注意，程序的窗口出现在右下角，因为你在那里定义了它的初始位置。\
    \  \n将鼠标指针移到窗口的左边缘，按住鼠标左键，然后左右拖动鼠标。请注意，你只能将窗口加宽和缩小到固定尺寸。这是因为你同时定义了窗口的最小和最大尺寸。\
    \  \n选择 `WindowProgram ➤ Quit WindowProgram`。\n"
- fmt: '### Placing Constraints on User Interface Items


    Defining a minimum size for a window can keep the user from shrinking a window
    so small that it cuts off the items that appear on the user interface. However,
    what happens if the user expands a window? Then the items in the window should
    ideally adjust their position to adapt to the expanded window size.


    `Constraints` define the distance between two items such as between a button and
    the edge of the window or between two buttons. Xcode gives you three ways to place
    constraints on a user interface item:


    *   Control-drag the mouse from a user interface item to another item or the edge
    of a window

    *   Choose Editor ➤ Pin or Resolve Auto Layout Issues

    *   Click the Pin or Resolve Auto Layout Issues icons in the bottom right corner
    as shown in Figure [13-18](#A978-1-4842-1233-2_13_Chapter.html#Fig18)


    ![A978-1-4842-1233-2_13_Fig18_HTML.jpg](A978-1-4842-1233-2_13_Fig18_HTML.jpg)


    Figure 13-18. The Align, Pin, and Resolve Auto Layout Issues icons


    To use the Control-drag method to place a constraint, follow these steps:


    Move the mouse pointer over the user interface item you want to constrain. Hold
    down the Control key and drag the mouse toward another user interface item or
    the edge of the window. Release the Control key and the mouse button when the
    mouse pointer appears near the other user interface item or window edge. A pop-up
    window appears similar to Figure [13-19](#A978-1-4842-1233-2_13_Chapter.html#Fig19).


    ![A978-1-4842-1233-2_13_Fig19_HTML.jpg](A978-1-4842-1233-2_13_Fig19_HTML.jpg)


    Figure 13-19. Releasing the Control key and the mouse displays a pop-up window


    Depending on the direction you Control-drag the mouse, you’ll see different options
    in the pop-up window.


    | Direction to window edge | Constraint Option |

    | --- | --- |

    | Up | Top Space to Container |

    | Bottom | Bottom Space to Container |

    | Right | Trailing Space to Container |

    | Left | Leading Space to Container |


    Besides Control-dragging to a window edge, you can also Control-drag from one
    user interface item over another user interface item. Doing this lets you define
    the distance between two items on the user interface such as the distance between
    two buttons or one button and a text field.


    When you Control-drag the mouse over another user interface item, a pop-up window
    appears. If you’re defining the distance between two items that are side by side,
    the pop-up window will display the Horizontal Spacing option. If you’re defining
    the distance between two items that are stacked one on top of another, the pop-up
    window will display the Vertical Spacing option.


    | Direction to another item | Constraint Option |

    | --- | --- |

    | Left/Right | Horizontal Spacing |

    | Up/Down | Vertical Spacing |


    The Control-drag method lets you place constraints visually on different user
    interface items. Another way to define constraints is to click on the user interface
    item you want to constrain, and then click on the Pin icon to display a pop-up
    window. To define constraints through the Pin icon, follow these steps:


    Click on the user interface item that you want to constrain. Click the Pin icon.
    A pop-up window appears, showing four constraints to the left, right, up, and
    down as shown in Figure [13-20](#A978-1-4842-1233-2_13_Chapter.html#Fig20).


    ![A978-1-4842-1233-2_13_Fig20_HTML.jpg](A978-1-4842-1233-2_13_Fig20_HTML.jpg)


    Figure 13-20. The Pin icon displays a pop-up window of constraints


    Click on a constraint to select it (the left and right constraints are selected
    in Figure [13-20](#A978-1-4842-1233-2_13_Chapter.html#Fig20) so they’re shown
    in red, but the up and down constraints are now selected so they appear as dotted
    lines). Click in any of the additional check boxes. Click on the Add X Constraints
    button at the bottom of the pop-up window to define a constraint.


    The Pin pop-up window lets you define additional types of constraints for your
    selected user interface item:


    *   Width or Height – This keeps the size of your selected user interface item
    at a fixed size

    *   Equal Widths or Heights – This keeps two or more selected user interface items
    at the same fixed size

    *   Aspect Ratio – This keeps the ratio between the selected user interface item
    properly proportioned if it’s resized

    *   Align – This aligns two or more selected user interface items


    A third way to define constraints is to let Xcode choose constraints for you.
    This lets you add constraints quickly, but at the risk that Xcode may not define
    constraints correctly. Fortunately, you can always edit constraints later.


    To let Xcode choose constraints, follow these steps:


    Click on the user interface item that you want to constrain. Click the Resolve
    Auto Layout Issues icon to display a pop-up window as shown in Figure [13-21](#A978-1-4842-1233-2_13_Chapter.html#Fig21)
    (or choose Editor ➤ Resolve Auto Layout Issues).


    ![A978-1-4842-1233-2_13_Fig21_HTML.jpg](A978-1-4842-1233-2_13_Fig21_HTML.jpg)


    Figure 13-21. The Resolve Auto Layout Issues pop-up window


    Choose Add Missing Constraints or Reset to Suggested Constraints.


    If you choose the options in the top half of the window, you’ll affect only the
    selected user interface item. If you choose the options in the bottom half of
    the window, you’ll affect all user interface items whether on the currently displayed
    window whether you selected them or not.


    Remember, adding constraints can be a trial and error process of defining a constraint
    and seeing how it works before modifying or deleting it altogether. As you add
    constraints, Xcode displays constraint lines around your user interface item.
    If Xcode doesn’t think you have enough constraints, all constraints on that item
    will appear as orange. The moment Xcode thinks you have enough constraints on
    an item, the constraints will appear in blue.


    To see how constraints work with user interface items, follow these steps:


    Make sure your WindowProgram project is loaded in Xcode. Click the MainMenu.xib
    in the Project Navigator pane. Click the Window icon to make the user interface
    window visible. Choose View ➤ Utilites ➤ Show Object Library. The Object Library
    appears in the bottom right corner of the Xcode window. Drag a Push Button item
    from the Object Library and place it anywhere on your window. Move the mouse pointer
    over the Push Button that you just placed on the window. Hold down the Control
    key and drag the mouse to the right until the entire window turns blue. Then let
    go of the Control key and the mouse. A pop-up menu appears (see Figure [13-19](#A978-1-4842-1233-2_13_Chapter.html#Fig19)).
    Choose Trailing Space to Container. Xcode displays a constraint between the edge
    of the window and the right edge of the push button as shown in Figure [13-22](#A978-1-4842-1233-2_13_Chapter.html#Fig22).


    ![A978-1-4842-1233-2_13_Fig22_HTML.jpg](A978-1-4842-1233-2_13_Fig22_HTML.jpg)


    Figure 13-22. Connecting a constraint to a window edge


    Choose Product ➤ Run. Your window appears in the initial position you defined
    earlier. Move the window to the center of the screen and resize the right edge.
    Notice that when you resize the right edge of the window, the button moves its
    position at the same time. Choose WindowProgram ➤ Quit WindowProgram.'
