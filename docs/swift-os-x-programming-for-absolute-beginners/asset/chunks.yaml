- fmt: '### Querying a Dictionary


    Once you store `key:value` pairs in a dictionary, you can use the following commands
    to get information about a dictionary:


    - `count` – counts the number of `key:value` pairs stored in a dictionary

    - `keys` – retrieves a list of all the keys stored in a dictionary

    - `values` – retrieves a list of all the values stored in a dictionary


    The `count` command only needs the dictionary name and returns an integer value
    that you can assign to a variable such as:


    ```

    var name = DictionaryName.count

    ```


    The `keys` and `values` commands need a dictionary name and returns a list of
    items that you can store in an array such as:


    ```

    let myKeys = Array(DictionaryName.keys)

    ```


    To see how to count and retrieve keys and values from a dictionary, follow these
    steps:


    Make sure the `DictionaryPlayground` file is loaded in Xcode. Edit the code as
    follows:


    ```

    import Cocoa

    var myDictionary = [12: "Joe", 7: "Walter"]

    myDictionary.removeValueForKey(7)

    print (myDictionary)

    myDictionary.removeAll()

    print (myDictionary)

    myDictionary = [25: "Stephanie", 98: "Nancy"]

    print (myDictionary.count)

    let myKeys = Array(myDictionary.keys)

    let myValues = Array(myDictionary.values)

    ```


    Notice how the `removeValueForKey` command removes an existing `key:value` pair
    while the `removeAll` command empties the entire dictionary. Also notice how the
    `count` command counts all `key:value` pairs while the `keys` and `values` commands
    return a list of the keys and values respectively as shown in Figure [9-7](#A978-1-4842-1233-2_9_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_9_Fig7_HTML.jpg](A978-1-4842-1233-2_9_Fig7_HTML.jpg)


    **Figure 9-7.** Deleting dictionary data, counting, and retrieving keys and values


    ### Using Dictionaries in an OS X Program


    In this sample program, the computer creates a list of data stored in a dictionary.
    Then through the user interface, the user can add new data to the dictionary,
    delete existing data, or get information about the dictionary.


    Create a new OS X project by following these steps:


    From within Xcode choose **File** ➤ **New** ➤ **Project**. Click **Application**
    under the OS X category. Click **Cocoa Application** and click the **Next** button.
    Xcode now asks for a product name. Click in the **Product Name** text field and
    type `DictionaryProgram`. Make sure the **Language** pop-up menu displays **Swift**
    and that no check boxes are selected. Click the **Next** button. Xcode asks where
    you want to store the project. Choose a folder to store your project and click
    the **Create** button.


    Click the `MainMenu.xib` file in the **Project Navigator**. Click on the `DictionaryProgram`
    icon to make the window of the user interface appear. Choose **View** ➤ **Utilities**
    ➤ **Show Object Library** to make the **Object Library** appear in the bottom
    right corner of the Xcode window.


    Drag three **Push Buttons**, six **Labels**, and six **Text Fields** on the user
    interface and double-click on the push buttons and labels to change the text that
    appears on them so that it looks similar to Figure [9-8](#A978-1-4842-1233-2_9_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_9_Fig8_HTML.jpg](A978-1-4842-1233-2_9_Fig8_HTML.jpg)


    **Figure 9-8.** The user interface of the `DictionaryProgram`


    The **Add** button will let you type in a key and value in the text fields on
    the right. The **Delete** button will let you specify a key to delete its associated
    value from a dictionary. The **Query** button will display the total number of
    items along with the list of keys and values currently stored in the dictionary.


    Each text field will need a separate `IBOutlet` and each push button will need
    a separate `IBAction` method, which you’ll need to create by Control-dragging
    each item from the user interface to your `AppDelegate.swift` file:


    With your user interface still visible in the Xcode window, choose **View** ➤
    **Assistant Editor** ➤ **Show Assistant Editor**. The `AppDelegate.swift` file
    appears next to the user interface.


    - Move the mouse over the **Add** button, hold down the **Control** key, and drag
    just above the last curly bracket at the bottom of the `AppDelegate.swift` file.
    Release the mouse and the **Control** key. A pop-up window appears. Click in the
    **Connection** pop-up menu and choose **Action**. Click in the **Name** text field
    and type `addButton`. Click in the **Type** pop-up menu and choose `NSButton`.
    Then click the **Connect** button.


    - Move the mouse over the **Delete** button, hold down the **Control** key, and
    drag just above the last curly bracket at the bottom of the `AppDelegate.swift`
    file. Release the mouse and the **Control** key. A pop-up window appears. Click
    in the **Connection** pop-up menu and choose **Action**. Click in the **Name**
    text field and type `deleteButton`. Click in the **Type** pop-up menu and choose
    `NSButton`. Then click the **Connect** button.


    - Move the mouse over the **Query** button, hold down the **Control** key, and
    drag just above the last curly bracket at the bottom of the `AppDelegate.swift`
    file. Release the mouse and the **Control** key. A pop-up window appears. Click
    in the **Connection** pop-up menu and choose **Action**. Click in the **Name**
    text field and type `queryButton`. Click in the **Type** pop-up menu and choose
    `NSButton`. Then click the **Connect** button.


    The bottom of the `AppDelegate.swift` file should look like this:


    ```

    @IBAction func addButton(sender: NSButton) {

    }

    @IBAction func deleteButton(sender: NSButton) {

    }

    @IBAction func queryButton(sender: NSButton) {

    }

    ```


    - Move the mouse over the **Key** text field that appears to the right of the
    **Add** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `addKeyField`
    and click the **Connect** button.


    - Move the mouse over the **Value** text field that appears to the right of the
    **Add** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `addValueField`
    and click the **Connect** button.


    - Move the mouse over the **Key** text field that appears to the right of the
    **Delete** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `deleteKeyField`
    and click the **Connect** button.


    - Move the mouse over the **Count** text field that appears to the right of the
    **Query** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `queryCountField`
    and click the **Connect** button.


    - Move the mouse over the **Keys** text field that appears to the right of the
    **Query** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `queryKeysField`
    and click the **Connect** button.


    - Move the mouse over the **Values** text field that appears to the right of the
    **Query** button, hold down the **Control** key, and drag below the `@IBOutlet`
    line in the `AppDelegate.swift` file. Release the mouse and the **Control** key.
    A pop-up window appears. Click in the **Name** text field and type `queryValuesField`
    and click the **Connect** button.


    You should now have the following `IBOutlets` that represent all the text fields
    on your user interface:


    ```

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var addKeyField: NSTextField!

    @IBOutlet weak var addValueField: NSTextField!

    @IBOutlet weak var deleteKeyField: NSTextField!

    @IBOutlet weak var queryCountField: NSTextField!

    @IBOutlet weak var queryKeysField: NSTextField!

    @IBOutlet weak var queryValuesField: NSTextField!

    ```'
