- fmt: '### Editing Constraints


    Once you’ve defined one or more constraints, you can always delete or edit existing
    constraints. To delete a constraint, you have several options:


    - Click on the constraint and then press the `Delete` or `Backspace` key.

    - Click on the user interface item that has the constraint and open the Size Inspector
    pane, then click on the constraint and press the `Delete` or `Backspace` key.


    You can also delete or clear all constraints from a single user interface item
    or from all items on the currently displayed user interface. To do this, you have
    two options:


    - Choose `Editor ➤ Resolve Auto Layout Issues`.

    - Click on the `Resolve Auto Layout Issues` icon in the bottom right corner of
    the window.


    With either option, you’ll see a menu divided in a top half and a bottom half
    as shown in Figure 13-23. Clicking `Clear Constraints` in the top half clears
    constraints only from any currently selected items. Clicking `Clear Constraints`
    in the bottom half clears constraints from all items in the currently displayed
    user interface whether you selected them or not.


    ![A978-1-4842-1233-2_13_Fig23_HTML.jpg](A978-1-4842-1233-2_13_Fig23_HTML.jpg)


    *Figure 13-23. A pop-up window lets you modify a constraint.*


    Rather than delete a constraint, you can edit it. Editing lets you modify how
    it behaves. Three values you can modify about a constraint include:


    - `Constant` – A fixed value that defines the value of the constraint.

    - `Priority` – A numeric value that determines which constraints must be followed
    first.

    - `Modifier` – A numeric value that defines a ratio that affects two values such
    as an item’s height to its width or one item’s width to a second item’s width.


    To edit a constraint, follow these steps:


    1. Click on the user interface item that contains the constraint you want to edit.

    2. Choose `View ➤ Utilities ➤ Show Size Inspector`. The `Size Inspector` pane
    lists all defined constraints as shown in Figure 13-24.


    ![A978-1-4842-1233-2_13_Fig24_HTML.jpg](A978-1-4842-1233-2_13_Fig24_HTML.jpg)


    *Figure 13-24. Viewing a list of defined constraints in the Size Inspector pane.*


    3. Click the `Edit` button on the far right of the constraint you want to modify.
    A pop-up window appears as shown in Figure 13-25.


    ![A978-1-4842-1233-2_13_Fig25_HTML.jpg](A978-1-4842-1233-2_13_Fig25_HTML.jpg)


    *Figure 13-25. A pop-up window lets you modify a constraint.*


    Notice that to the right of the `Constant:` label, there’s a pop-up menu showing
    an equal sign (`=`). If you click on this pop-up menu, you can select greater
    than or equal to (`>=`), less than or equal to (`<=`), or equal to (`=`).


    Further to the right of the `Constant:` label is a drop-down field that displays
    a number. If you click on the downward-pointing arrow, you’ll be able to choose
    between three options:


    - A numeric value that you can type or edit.

    - `Use Standard Value` – Lets Xcode decide the best value.

    - `Use Canvas Value` – Uses the current distance on the screen to define a fixed
    value.


    Keep in mind that a fixed value or `Canvas Value` may behave differently on different
    size monitors. You may need to experiment until you find the right value for your
    particular user interface.


    Priorities are used to resolve conflicts between two or more constraints that
    may contradict each other, such as one constraint keeping a button pinned to the
    right edge of a window and a second constraint keeping the same button pinned
    to the left edge of a window while a third constraint keeps the button a fixed
    width. By modifying priorities, you can make sure your constraints don’t conflict.


    Finding the right combination of constraints can be tedious and frustrating at
    times. To simplify setting constraints, Xcode offers two ways to define constraints
    for you:


    - `Add Missing Constraints` – Keeps any existing constraints you’ve defined and
    adds new ones Xcode thinks you’re missing.

    - `Reset to Suggested Constraints` – Deletes all constraints you may have set
    for an item and replaces it with its own constraints.


    When you first define constraints, Xcode displays them in orange to let you know
    that you don’t have enough constraints to define the position of an item on your
    user interface. Once you’ve defined enough constraints to specify a position,
    then Xcode displays constraints in blue.


    If you define constraints, you may see a dotted orange line that represents the
    outline of your currently selected item. This dotted line is a frame and shows
    where your item will appear when you actually run your program.


    To move an item into its proper location, you need to choose either `Editor ➤
    Resolve Auto Layout Issues ➤ Update Frames`, or click on the `Resolve Auto Layout
    Issues` icon in the bottom right corner of the Xcode window and choose `Update
    Frames` (see Figure 13-23).


    To see how Xcode can automatically define constraints, follow these steps:


    1. Make sure your `WindowProgram` project is loaded in Xcode.

    2. Click the `MainMenu.xib` in the Project Navigator pane.

    3. Click the `Window` icon to make the user interface window visible.

    4. Click on the `Push Button` on your program’s window to select that button.

    5. Choose `Editor ➤ Resolve Auto Layout Issues`. A pop-up menu appears (see Figure
    13-23).

    6. Choose `Clear Constraints` in the top half of the menu. (The top half of the
    menu affects only the selected item, which is the push button. The bottom half
    of the menu affects all items on the window. In this case, the only item is the
    push button, so you could actually select `Clear Constraints` in the top or bottom
    half of the menu.) Xcode removes the constraint from the button.

    7. Choose `Editor ➤ Resolve Auto Layout Issues`. A pop-up menu appears (see Figure
    13-23).

    8. Choose `Add Missing Constraints` in the top half of the menu. Xcode adds constraints
    that it thinks the push button needs as shown in Figure 13-26.


    ![A978-1-4842-1233-2_13_Fig26_HTML.jpg](A978-1-4842-1233-2_13_Fig26_HTML.jpg)


    *Figure 13-26. Xcode automatically adds all necessary constraints.*


    9. Choose `Product ➤ Run`. Your window appears in the initial position you defined
    earlier.

    10. Move the window to the center of the screen and resize the left edge. Notice
    that when you resize the left edge of the window, the button moves its position
    at the same time.

    11. Choose `WindowProgram ➤ Quit WindowProgram`.'
