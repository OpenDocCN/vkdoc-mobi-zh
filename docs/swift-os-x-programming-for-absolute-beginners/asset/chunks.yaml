  trans: '

    # 在 OS X 程序中使用结构体


    单独使用结构体只能保存有限的数据。为了更灵活，结构体通常会与数组等其他数据结构结合使用。这样你就可以创建一个结构体数组，本示例程序中将用到这一功能。该程序允许你输入多个姓名、地址和电话号码，并且也可以删除数据。


    在 Xcode 中，选择 **文件** ➤ **新建** ➤ **项目**。在 **OS X** 类别下点击 **应用**。点击 **Cocoa 应用**，然后点击
    **下一步** 按钮。Xcode 会要求你输入产品名称。在 **产品名称** 文本框中点击并输入 `StructureProgram`。确保 **语言**
    弹出菜单显示为 `Swift`，并且没有勾选任何复选框。点击 **下一步** 按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存放你的项目，然后点击
    **创建** 按钮。在 **项目导航器** 中点击 `MainMenu.xib` 文件。点击 `StructureProgram` 图标，使用户界面窗口显示出来。选择
    **视图** ➤ **工具** ➤ **显示对象库**，让 **对象库** 显示在 Xcode 窗口的右下角。将两个 **按钮**、四个 **标签** 和四个
    **文本字段** 拖拽到用户界面上，并双击按钮和标签，修改它们上面显示的文本，使其看起来与图 10-6 类似。


    ![A978-1-4842-1233-2_10_Fig6_HTML.jpg](img/A978-1-4842-1233-2_10_Fig6_HTML.jpg)


    **图 10-6.** `StructureProgram` 的用户界面


    在相应的文本字段中输入姓名、地址和电话号码后，**添加** 按钮会将这些信息存储到一个结构体中，然后再将该结构体存储到一个数组中。每次添加新的姓名、地址和电话号码时，你都会向数组中添加一个新的结构体，同时
    **总姓名数** 文本字段会持续显示数组中存储的结构体总数。


    **查看** 按钮会移除数组中的最后一个项目，并在一个警告对话框中显示其内容，以便你可以验证内容。然后它会显示数组中结构体的新总数。


    每个文本字段都需要一个单独的 `IBOutlet`，每个按钮都需要一个单独的 `IBAction` 方法，你需要通过按住 Control 键将每个项目从用户界面拖拽到你的
    `AppDelegate.swift` 文件中来创建它们：


    在 Xcode 窗口中用户界面仍然可见的情况下，选择 **视图** ➤ **辅助编辑器** ➤ **显示辅助编辑器**。`AppDelegate.swift`
    文件会出现在用户界面的旁边。将鼠标移动到 **添加** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个大括号的上方。松开鼠标和
    **Control** 键。会弹出一个窗口。在 **连接** 弹出菜单中点击，选择 **动作**。在 **名称** 文本框中点击并输入 `addData`。在
    **类型** 弹出菜单中点击，选择 `NSButton`。然后点击 **连接** 按钮。将鼠标移动到 **查看** 按钮上，按住 **Control** 键，拖拽到
    `AppDelegate.swift` 文件底部最后一个大括号的上方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **连接** 弹出菜单中点击，选择
    **动作**。在 **名称** 文本框中点击并输入 `viewButton`。在 **类型** 弹出菜单中点击，选择 `NSButton`。然后点击 **连接**
    按钮。`AppDelegate.swift` 文件的底部应该类似这样：

    ```

    @IBAction func viewData(sender: NSButton) {

    }

    @IBAction func addData(sender: NSButton) {

    }

    ```

    将鼠标移动到出现在 **添加** 按钮右侧的 **姓名** 文本字段上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件中
    `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称** 文本框中点击并输入 `nameField`，然后点击
    **连接** 按钮。将鼠标移动到出现在 **添加** 按钮右侧的 **地址** 文本字段上，按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称** 文本框中点击并输入 `addressField`，然后点击
    **连接** 按钮。将鼠标移动到出现在 **删除** 按钮右侧的 **电话** 文本字段上，按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称** 文本框中点击并输入 `phoneField`，然后点击
    **连接** 按钮。将鼠标移动到出现在 **查询** 按钮右侧的 **总姓名数** 文本字段上，按住 **Control** 键，拖拽到 `AppDelegate.swift`
    文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称** 文本框中点击并输入 `totalField`，然后点击
    **连接** 按钮。现在你应该有了以下代表用户界面上所有文本字段的 `IBOutlet`：

    ```

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var nameField: NSTextField!

    @IBOutlet weak var addressField: NSTextField!

    @IBOutlet weak var phoneField: NSTextField!

    @IBOutlet weak var totalField: NSTextField!

    ```

    至此，我们已经将用户界面连接到了我们的 Swift 代码，这样我们就可以使用 `IBOutlet` 来检索和显示用户界面上的数据。我们还创建了 `IBAction`
    方法，以便用户界面上的按钮能让程序真正运行起来。现在我们只需要编写 Swift 代码来创建一个初始字典，然后在每个 `IBAction` 方法中编写更多的
    Swift 代码来添加、删除或查询该字典。

