- fmt: "# Using Alerts\n\nAn alert is based on the `NSAlert` class in the Cocoa framework.\
    \ At the simplest level, you can create an alert with two lines of Swift code:\n\
    \n```\nvar myAlert = NSAlert()\nmyAlert.runModal()\n```\n\nThe first line declares\
    \ an object called `myAlert` that is based on the `NSAlert` class. Then the second\
    \ line uses the `runModal()` method to display the alert. When an alert appears,\
    \ it’s considered modal, which means the alert won’t let the user do anything\
    \ until the user dismisses the alert.\n\nThe above two lines of code creates a\
    \ generic alert that displays an OK button, a generic graphic image, and a generic\
    \ text message as shown in Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1233-2_18_Fig1_HTML.jpg](A978-1-4842-1233-2_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1. Creating a generic alert\n\nTo customize an alert, you can modify\
    \ the following properties:\n\n- `messageText` – Displays the main alert message\
    \ in bold. In Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1), Alert is\
    \ the `messageText`.\n- `informativeText` – Displays non-bold text directly underneath\
    \ the `messageText`. In Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1),\
    \ there is no `informativeText`.\n- `icon` – Displays an icon. By default, the\
    \ icon is the program’s icon.\n- `alertStyle` – Displays a critical icon when\
    \ set to `NSAlertStyle.CriticalAlertStyle`. Otherwise displays the default alert\
    \ icon.\n- `showsSuppressionButton` – Displays a check box with the default text\
    \ of “Do not show this message again” unless the `suppressionButton?.title` is\
    \ defined.\n- `suppressionButton?.title` – Replaces the default text (“Do not\
    \ show this message again”) with custom text for the check box.\n\nTo see how\
    \ to customize an alert, follow these steps:\n\nFrom within Xcode choose File\
    \ ➤ New ➤ Project. Click Application under the OS X category. Click Cocoa Application\
    \ and click the Next button. Xcode now asks for a product name. Click in the Product\
    \ Name text field and type `AlertProgram`. Make sure the Language pop-up menu\
    \ displays Swift and that no check boxes are selected. Click the Next button.\
    \ Xcode asks where you want to store the project. Choose a folder to store your\
    \ project and click the Create button. Click the `MainMenu.xib` file in the Project\
    \ Navigator. Your program’s user interface appears. Click the `AlertProgram` icon\
    \ to display the window of your program’s user interface. Choose View ➤ Utilities\
    \ ➤ Show Object Library. The Object Library appears in the bottom right corner\
    \ of the Xcode window. Drag a Push Button on to the user interface window. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. The `AppDelegate.swift` file\
    \ appears next to your user interface. Move the mouse pointer over the push button,\
    \ hold down the Control key, and drag the mouse above the last curly bracket in\
    \ the bottom of the `AppDelegate.swift` file. Release the Control key and the\
    \ mouse button. A pop-up window appears. Click in the Connect pop-up menu and\
    \ choose Action. Click in the Name text field and type `showAlert`. Click in the\
    \ Type pop-up menu, choose `NSButton`, and click the Connect button. Xcode creates\
    \ an empty `IBAction` method. Modify the `IBAction` method as follows:\n\n```\n\
    @IBAction func showAlert(sender: NSButton) {\n    var myAlert = NSAlert()\n  \
    \  myAlert.messageText = \"Warning!\"\n    myAlert.informativeText = \"Zombies\
    \ approaching\"\n    myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle\n  \
    \  myAlert.showsSuppressionButton = true\n    myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n    myAlert.runModal()\n}\n```\n\nClick the OK button\
    \ on the alert to make it go away. Choose AlertProgram ➤ Quit AlertProgram. Choose\
    \ Product ➤ Run. Your user interface appears. Click on the push button. An alert\
    \ appears as shown in Figure [18-2](#A978-1-4842-1233-2_18_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1233-2_18_Fig2_HTML.jpg](A978-1-4842-1233-2_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2. Displaying a customized alert\n\n## Getting Feedback from an Alert\n\
    \nAn alert typically displays a single OK button so the user can dismiss the alert.\
    \ However, an alert can get feedback from the user in one of two ways:\n\n- Selecting\
    \ the suppression check box\n- Clicking on a button other than the OK button\n\
    \nTo determine if the user selected the suppression check box or not, you need\
    \ to access the `suppressionButton!.state` property. If the check box is selected,\
    \ the `suppressionButton!.state` property is 1. If the check box is clear, the\
    \ `suppressionButton!.state` property is 0.\n\nThe second way to get feedback\
    \ from an alert is by displaying two or more buttons on an alert. To add more\
    \ buttons to an alert, you need to use the `addButtonWithTitle` method. Then to\
    \ determine which button the user selected, you need to use the `NSAlertFirstButtonReturn`,\
    \ `NSAlertSecondButtonReturn`, or `NSAlertThirdButtonReturn` constants.\n\nIf\
    \ you have four or more buttons on an alert, you can check for the fourth button\
    \ by using `NSAlertThirdButtonReturn + 1`, a fifth button by using `NSAlertThirdButtonReturn\
    \ + 2`, and so on for each additional button beyond the third one.\n\nTo see how\
    \ to identify what options the user chose in an alert, follow these steps:\n\n\
    Make sure your `AlertProgram` project is loaded in Xcode. Click on the `AppDelegate.swift`\
    \ file in the Project Navigator pane. Modify the `IBAction showAlert` method as\
    \ follows:\n\n```\n@IBAction func showAlert(sender: NSButton) {\n    var myAlert\
    \ = NSAlert()\n    myAlert.messageText = \"Warning!\"\n    myAlert.informativeText\
    \ = \"Zombies approaching\"\n    myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle\n\
    \    myAlert.showsSuppressionButton = true\n    myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n    myAlert.addButtonWithTitle(\"Ignore it\")\n    myAlert.addButtonWithTitle(\"\
    Run\")\n    myAlert.addButtonWithTitle(\"Panic\")\n    myAlert.addButtonWithTitle(\"\
    Do nothing\")\n    let choice = myAlert.runModal()\n    switch choice {\n    case\
    \ NSAlertFirstButtonReturn:\n        print (\"User clicked Ignore it\")\n    case\
    \ NSAlertSecondButtonReturn:\n        print (\"User clicked Run\")\n    case NSAlertThirdButtonReturn:\n\
    \        print (\"User clicked Panic\")\n    case NSAlertThirdButtonReturn + 1:\n\
    \        print (\"User clicked Do nothing\")\n    default: break\n    }\n    if\
    \ myAlert.suppressionButton!.state == 1 {\n        print (\"Checked\")\n    }\
    \ else {\n        print (\"Not checked\")\n    }\n}\n```\n\nThe `addButtonWithTitle`\
    \ methods create buttons on the alert where the first `addButtonWithTitle` method\
    \ creates a default button and the other `addButtonWithTitle` methods create additional\
    \ buttons. To capture the button that the user clicked on, the above code creates\
    \ a constant called “choice.”\n\nThen it uses a switch statement to identify which\
    \ button the user clicked. Notice that the fourth button is identified by adding\
    \ 1 to the `NSAlertThirdButtonReturn` constant.\n\nThe `suppressionButton!.state`\
    \ property checks if the user selected the check box that appears on the alert.\
    \ If its value is 1, then the user selected the check box. Otherwise if its value\
    \ is 0, the check box is clear.\n\nClick in the Stop scaring me check box to select\
    \ it. Click on one of the buttons such as Panic or Run. No matter which button\
    \ you click, the alert goes away. Choose AlertProgram ➤ Quit AlertProgram. Xcode\
    \ appears again and displays text in the Debug Area such as “User clicked Panic”\
    \ and “Checked”. Choose Product ➤ Run. Your user interface appears. Click the\
    \ button. The alert appears as shown in Figure [18-3](#A978-1-4842-1233-2_18_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1233-2_18_Fig3_HTML.jpg](A978-1-4842-1233-2_18_Fig3_HTML.jpg)\n\
    \nFigure 18-3. The alert created by Swift code"
  raw: '## Using Alerts


    An alert is based on the NSAlert class in the Cocoa framework. At the simplest
    level, you can create an alert with two lines of Swift code:


    `var myAlert = NSAlert()`


        `myAlert.runModal()`


    The first line declares an object called myAlert that is based on the NSAlert
    class. Then the second line uses the runModal() method to display the alert. When
    an alert appears, it’s considered modal, which means the alert won’t let the user
    do anything until the user dismisses the alert.


    The above two lines of code creates a generic alert that displays an OK button,
    a generic graphic image, and a generic text message as shown in Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_18_Fig1_HTML.jpg](A978-1-4842-1233-2_18_Fig1_HTML.jpg)


    Figure 18-1.


    Creating a generic alert


    To customize an alert, you can modify the following properties:


    *   messageText – Displays the main alert message in bold. In Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1),
    Alert is the messageText.

    *   informativeText – Displays non-bold text directly underneath the messageText.
    In Figure [18-1](#A978-1-4842-1233-2_18_Chapter.html#Fig1), there is no informativeText.

    *   icon – Displays an icon. By default, the icon is the program’s icon.

    *   alertStyle – Displays a critical icon when set to NSAlertStyle.CriticalAlertStyle.
    Otherwise displays the default alert icon.

    *   showsSuppressionButton – Displays a check box with the default text of “Do
    not show this message again” unless the suppressionButton?.title is defined.

    *   suppressionButton?.title – Replaces the default text (“Do not show this message
    again”) with custom text for the check box.


    To see how to customize an alert, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type AlertProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    MainMenu.xib file in the Project Navigator. Your program’s user interface appears.
      Click the AlertProgram icon to display the window of your program’s user interface.
      Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.   Drag a Push Button on to the user
    interface window.   Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The
    AppDelegate.swift file appears next to your user interface.   Move the mouse pointer
    over the push button, hold down the Control key, and drag the mouse above the
    last curly bracket in the bottom of the AppDelegate.swift file.   Release the
    Control key and the mouse button. A pop-up window appears.   Click in the Connect
    pop-up menu and choose Action.   Click in the Name text field and type showAlert.
      Click in the Type pop-up menu, choose NSButton, and click the Connect button.
    Xcode creates an empty IBAction method.   Modify the IBAction method as follows:
     


    `@IBAction func showAlert(sender: NSButton) {`


        `var myAlert = NSAlert()`


        `myAlert.messageText = "Warning!"`


        `myAlert.informativeText = "Zombies approaching"`


        `myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle`


        `myAlert.showsSuppressionButton = true`


        `myAlert.suppressionButton?.title = "Stop scaring me"`


        `myAlert.runModal()`


    `}`


    Click the OK button on the alert to make it go away.   Choose AlertProgram ➤ Quit
    AlertProgram.   Choose Product ➤ Run. Your user interface appears.   Click on
    the push button. An alert appears as shown in Figure [18-2](#A978-1-4842-1233-2_18_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_18_Fig2_HTML.jpg](A978-1-4842-1233-2_18_Fig2_HTML.jpg)


    Figure 18-2.


    Displaying a customized alert


    ### Getting Feedback from an Alert


    An alert typically displays a single OK button so the user can dismiss the alert.
    However, an alert can get feedback from the user in one of two ways:


    *   Selecting the suppression check box

    *   Clicking on a button other than the OK button


    To determine if the user selected the suppression check box or not, you need to
    access the suppressionButton!.state property. If the check box is selected, the
    suppressionButton!.state property is 1\. If the check box is clear, the suppressionButton!.state
    property is 0.


    The second way to get feedback from an alert is by displaying two or more buttons
    on an alert. To add more buttons to an alert, you need to use the addButtonWithTitle
    method. Then to determine which button the user selected, you need to use the
    NSAlertFirstButtonReturn, NSAlertSecondButtonReturn, or NSAlertThirdButtonReturn
    constants.


    If you have four or more buttons on an alert, you can check for the fourth button
    by using NSAlertThirdButtonReturn + 1, a fifth button by using NSAlertThirdButtonReturn
    + 2, and so on for each additional button beyond the third one.


    To see how to identify what options the user chose in an alert, follow these steps:


    Make sure your AlertProgram project is loaded in Xcode.   Click on the AppDelegate.swift
    file in the Project Navigator pane.   Modify the IBAction showAlert method as
    follows:  


    `@IBAction func showAlert(sender: NSButton) {`


        `var myAlert = NSAlert()`


        `myAlert.messageText = "Warning!"`


        `myAlert.informativeText = "Zombies approaching"`


        `myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle`


        `myAlert.showsSuppressionButton = true`


        `myAlert.suppressionButton?.title = "Stop scaring me"`


        `myAlert.addButtonWithTitle("Ignore it")`


        `myAlert.addButtonWithTitle("Run")`


        `myAlert.addButtonWithTitle("Panic")`


        `myAlert.addButtonWithTitle("Do nothing")`


        `let choice = myAlert.runModal()`


        `switch choice {`


        `case NSAlertFirstButtonReturn:`


            `print ("User clicked Ignore it")`


        `case NSAlertSecondButtonReturn:`


            `print ("User clicked Run")`


        `case NSAlertThirdButtonReturn:`


            `print ("User clicked Panic")`


        `case NSAlertThirdButtonReturn + 1:`


            `print ("User clicked Do nothing")`


        `default: break`


        `}`


        `if myAlert.suppressionButton!.state == 1 {`


            `print ("Checked")`


        `} else {`


            `print ("Not checked")`


        `}`


    `}`


    The addButtonWithTitle methods create buttons on the alert where the first addButtonWithTitle
    method creates a default button and the other addButtonWithTitle methods create
    additional buttons. To capture the button that the user clicked on, the above
    code creates a constant called “choice.”


    Then it uses a switch statement to identify which button the user clicked. Notice
    that the fourth button is identified by adding 1 to the NSAlertThirdButtonReturn
    constant.


    The suppressionButton!.state property checks if the user selected the check box
    that appears on the alert. If its value is 1, then the user selected the check
    box. Otherwise if its value is 0, the check box is clear.


    Click in the Stop scaring me check box to select it.   Click on one of the buttons
    such as Panic or Run. No matter which button you click, the alert goes away.  
    Choose AlertProgram ➤ Quit AlertProgram. Xcode appears again and displays text
    in the Debug Area such as User clicked Panic and Checked.   Choose Product ➤ Run.
    Your user interface appears.   Click the button. The alert appears as shown in
    Figure [18-3](#A978-1-4842-1233-2_18_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_18_Fig3_HTML.jpg](A978-1-4842-1233-2_18_Fig3_HTML.jpg)


    Figure 18-3.


    The alert created by Swift code'
  trans: "\n# 使用提醒\n\n提醒功能基于 Cocoa 框架中的 `NSAlert` 类。在最简单的层面上，你可以用两行 Swift 代码创建一个提醒：\n\
    \n```\nvar myAlert = NSAlert()\nmyAlert.runModal()\n```\n\n第一行声明了一个基于 `NSAlert`\
    \ 类的名为 `myAlert` 的对象。接着第二行使用 `runModal()` 方法来显示该提醒。当提醒出现时，它被认为是模态的，这意味着在用户关闭提醒之前，应用不会让用户执行任何其他操作。\n\
    \n上述两行代码创建了一个通用的提醒，它显示一个“确定”按钮、一个通用图形图像和一条通用文本消息，如图 18-1 所示。\n\n![A978-1-4842-1233-2_18_Fig1_HTML.jpg](img/A978-1-4842-1233-2_18_Fig1_HTML.jpg)\n\
    \n图 18-1. 创建一个通用提醒\n\n要自定义提醒，你可以修改以下属性：\n\n- `messageText` – 以粗体显示主要提醒消息。在图 18-1\
    \ 中，“Alert”就是 `messageText`。\n- `informativeText` – 在 `messageText` 正下方显示非粗体文本。在图\
    \ 18-1 中，没有 `informativeText`。\n- `icon` – 显示一个图标。默认情况下，图标是程序的图标。\n- `alertStyle`\
    \ – 当设置为 `NSAlertStyle.CriticalAlertStyle` 时，显示一个关键图标。否则显示默认的提醒图标。\n- `showsSuppressionButton`\
    \ – 显示一个复选框，其默认文本为“不再显示此消息”，除非定义了 `suppressionButton?.title`。\n- `suppressionButton?.title`\
    \ – 用自定义文本替换复选框的默认文本（“不再显示此消息”）。\n\n要了解如何自定义提醒，请按照以下步骤操作：\n\n在 Xcode 中，选择“文件”\
    \ ➤ “新建” ➤ “项目”。在“OS X”分类下点击“应用程序”。点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。点击“产品名称”文本字段，然后输入\
    \ `AlertProgram`。确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。点击“下一步”按钮。Xcode 会询问你想在哪里存储项目。选择一个文件夹来存储你的项目，然后点击“创建”按钮。在项目导航器中点击\
    \ `MainMenu.xib` 文件。你的程序用户界面就会出现。点击 `AlertProgram` 图标以显示你程序用户界面的窗口。选择“视图” ➤ “工具”\
    \ ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。将一个“下压按钮”拖到用户界面窗口上。选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。`AppDelegate.swift`\
    \ 文件会出现在你的用户界面旁边。将鼠标指针移到下压按钮上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开\
    \ Control 键和鼠标按钮。会弹出一个窗口。点击“连接”弹出菜单，然后选择“操作”。点击“名称”文本字段，然后输入 `showAlert`。点击“类型”弹出菜单，选择\
    \ `NSButton`，然后点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。按如下方式修改 `IBAction` 方法：\n\n\
    ```\n@IBAction func showAlert(sender: NSButton) {\n    var myAlert = NSAlert()\n\
    \    myAlert.messageText = \"Warning!\"\n    myAlert.informativeText = \"Zombies\
    \ approaching\"\n    myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle\n  \
    \  myAlert.showsSuppressionButton = true\n    myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n    myAlert.runModal()\n}\n```\n\n点击提醒上的“确定”按钮使其消失。选择“AlertProgram”\
    \ ➤ “退出 AlertProgram”。选择“产品” ➤ “运行”。你的用户界面就会出现。点击下压按钮。会显示一个提醒，如图 18-2 所示。\n\n\
    ![A978-1-4842-1233-2_18_Fig2_HTML.jpg](img/A978-1-4842-1233-2_18_Fig2_HTML.jpg)\n\
    \n图 18-2. 显示一个自定义提醒\n\n## 从提醒处获取反馈\n\n提醒通常只显示一个“确定”按钮，以便用户可以关闭提醒。然而，提醒可以通过以下两种方式之一从用户处获取反馈：\n\
    \n- 选择抑制复选框\n- 点击“确定”按钮以外的按钮\n\n要判断用户是否选择了抑制复选框，你需要访问 `suppressionButton!.state`\
    \ 属性。如果复选框被选中，`suppressionButton!.state` 属性的值为 1。如果复选框未被选中，该属性的值为 0。\n\n从提醒处获取反馈的第二种方式是在提醒上显示两个或更多按钮。要向提醒添加更多按钮，你需要使用\
    \ `addButtonWithTitle` 方法。然后，要确定用户点击了哪个按钮，你需要使用 `NSAlertFirstButtonReturn`、`NSAlertSecondButtonReturn`\
    \ 或 `NSAlertThirdButtonReturn` 常量。\n\n如果你的提醒上有四个或更多按钮，你可以通过使用 `NSAlertThirdButtonReturn\
    \ + 1` 来检测第四个按钮，使用 `NSAlertThirdButtonReturn + 2` 来检测第五个按钮，以此类推，处理第三个按钮之后的每个额外按钮。\n\
    \n要了解如何在提醒中识别用户选择了哪些选项，请按照以下步骤操作：\n\n确保你的 `AlertProgram` 项目已在 Xcode 中加载。在“项目导航器”窗格中点击\
    \ `AppDelegate.swift` 文件。按如下方式修改 `IBAction showAlert` 方法：\n\n```\n@IBAction func\
    \ showAlert(sender: NSButton) {\n    var myAlert = NSAlert()\n    myAlert.messageText\
    \ = \"Warning!\"\n    myAlert.informativeText = \"Zombies approaching\"\n    myAlert.alertStyle\
    \ = NSAlertStyle.CriticalAlertStyle\n    myAlert.showsSuppressionButton = true\n\
    \    myAlert.suppressionButton?.title = \"Stop scaring me\"\n    myAlert.addButtonWithTitle(\"\
    Ignore it\")\n    myAlert.addButtonWithTitle(\"Run\")\n    myAlert.addButtonWithTitle(\"\
    Panic\")\n    myAlert.addButtonWithTitle(\"Do nothing\")\n    let choice = myAlert.runModal()\n\
    \    switch choice {\n    case NSAlertFirstButtonReturn:\n        print (\"User\
    \ clicked Ignore it\")\n    case NSAlertSecondButtonReturn:\n        print (\"\
    User clicked Run\")\n    case NSAlertThirdButtonReturn:\n        print (\"User\
    \ clicked Panic\")\n    case NSAlertThirdButtonReturn + 1:\n        print (\"\
    User clicked Do nothing\")\n    default: break\n    }\n    if myAlert.suppressionButton!.state\
    \ == 1 {\n        print (\"Checked\")\n    } else {\n        print (\"Not checked\"\
    )\n    }\n}\n```\n\n`addButtonWithTitle` 方法在提醒上创建按钮，其中第一个 `addButtonWithTitle`\
    \ 方法创建一个默认按钮，其他的 `addButtonWithTitle` 方法创建额外的按钮。为了捕获用户点击的按钮，上述代码创建了一个名为“choice”的常量。\n\
    \n然后它使用一个 switch 语句来识别用户点击了哪个按钮。请注意，第四个按钮是通过在 `NSAlertThirdButtonReturn` 常量上加\
    \ 1 来标识的。\n\n`suppressionButton!.state` 属性检查用户是否选择了出现在提醒上的复选框。如果其值为 1，则表示用户选中了该复选框。否则，如果其值为\
    \ 0，则表示复选框未被选中。\n\n点击“Stop scaring me”复选框以选中它。点击其中一个按钮，例如“Panic”或“Run”。无论你点击哪个按钮，提醒都会消失。选择“AlertProgram”\
    \ ➤ “退出 AlertProgram”。Xcode 会再次出现，并在调试区域中显示文本，例如“User clicked Panic”和“Checked”。选择“产品”\
    \ ➤ “运行”。你的用户界面就会出现。点击该按钮。提醒如图 18-3 所示。\n\n![A978-1-4842-1233-2_18_Fig3_HTML.jpg](img/A978-1-4842-1233-2_18_Fig3_HTML.jpg)\n\
    \n图 18-3. 由 Swift 代码创建的提醒\n"
- fmt: '### Displaying Alerts as Sheets


    Alerts typically appear as a modal dialog that creates another window that you
    can move separately from the main program window. Another way to display alert
    is as a sheet that appears to scroll down from the title bar of the currently
    active window.


    To make an alert appear as a sheet, you need to use the `beginSheetModalForWindow`
    method like this:


    `alertObject.beginSheetModalForWindow(window, completionHandler: closure)`


    The first parameter defines the window where you want the sheet to appear. In
    the `AlertProgram` project, the `IBOutlet` representing the user interface window
    is called a `window`. The second parameter is the completion handler label, which
    identifies the name of a special function called a closure.


    A closure represents a shorthand way of writing a function. Instead of writing
    a function the traditional way like this:


    ```

    func functionName(parameters) -> Type {

    // Insert code here

    return value

    }

    ```


    You can write a closure like this:


    ```

    let closureName = { (parameters) -> Type in

    // Insert code here

    }

    ```


    To see how to turn an alert into a sheet and use closures, follow these steps:


    Make sure your `AlertProgram` project is loaded in Xcode. Click on the `AppDelegate.swift`
    file in the Project Navigator pane. Modify the `IBAction showAlert` method as
    follows:


    ```

    @IBAction func showAlert(sender: NSButton) {

    var myAlert = NSAlert()

    myAlert.messageText = "Warning!"

    myAlert.informativeText = "Zombies approaching"

    myAlert.alertStyle = NSAlertStyle.CriticalAlertStyle

    myAlert.showsSuppressionButton = true

    myAlert.suppressionButton?.title = "Stop scaring me"

    myAlert.addButtonWithTitle("Ignore it")

    myAlert.addButtonWithTitle("Run")

    myAlert.addButtonWithTitle("Panic")

    myAlert.addButtonWithTitle("Do nothing")

    let myCode = { (choice:NSModalResponse) -> Void in

    switch choice {

    case NSAlertFirstButtonReturn:

    print ("User clicked Ignore it")

    case NSAlertSecondButtonReturn:

    print ("User clicked Run")

    case NSAlertThirdButtonReturn:

    print ("User clicked Panic")

    case NSAlertThirdButtonReturn + 1:

    print ("User clicked Do nothing")

    default: break

    }

    if myAlert.suppressionButton!.state == 1 {

    print ("Checked")

    } else {

    print ("Not checked")

    }

    }

    myAlert.beginSheetModalForWindow(window, completionHandler: myCode)

    }

    ```


    Click in the Stop scaring me check box to select it. Click on one of the buttons
    such as Panic or Run. No matter which button you click, the alert goes away. Choose
    AlertProgram ➤ Quit AlertProgram. Xcode appears again and displays text in the
    Debug Area such as `User clicked Run` and `Checked`. Choose Product ➤ Run. The
    user interface appears. Click on the button. Notice that now the alert drops down
    as a sheet as shown in Figure 18-4.


    ![A978-1-4842-1233-2_18_Fig4_HTML.jpg](A978-1-4842-1233-2_18_Fig4_HTML.jpg)


    **Figure 18-4.** The alert as a sheet


    In the above Swift code, the closure is defined as follows:


    ```

    let myCode = { (choice:NSModalResponse) -> Void in

    switch choice {

    case NSAlertFirstButtonReturn:

    print ("User clicked Ignore it")

    case NSAlertSecondButtonReturn:

    print ("User clicked Run")

    case NSAlertThirdButtonReturn:

    print ("User clicked Panic")

    case NSAlertThirdButtonReturn + 1:

    print ("User clicked Do nothing")

    default: break

    }

    if myAlert.suppressionButton!.state == 1 {

    print ("Checked")

    } else {

    print ("Not checked")

    }

    }

    ```


    However, you can also place closures inline, which means instead of the completion
    handler identifying the closure name, you simply put the closure itself in that
    location. So in the above code, the `beginSheetModalForWindow` method calls the
    closure by name like this:


    `myAlert.beginSheetModalForWindow(window, completionHandler: myCode)`


    You could replace the closure name of "`myCode`" with the actual closure code
    in its place like this:


    `myAlert.beginSheetModalForWindow(window, completionHandler: { (choice:NSModalResponse)
    -> Void in`


    ```

    switch choice {

    case NSAlertFirstButtonReturn:

    print ("User clicked Ignore it")

    case NSAlertSecondButtonReturn:

    print ("User clicked Run")

    case NSAlertThirdButtonReturn:

    print ("User clicked Panic")

    case NSAlertThirdButtonReturn + 1:

    print ("User clicked Do nothing")

    default: break

    }

    if myAlert.suppressionButton!.state == 1 {

    print ("Checked")

    } else {

    print ("Not checked")

    }

    ```


    `})`


    Putting closures inline directly within a method shortens the amount of code you
    need to write, but at the possible expense of making the overall code harder to
    understand. Separating the closure by name and then calling it by name makes it
    easier to reuse that closure elsewhere in your program if necessary, but also
    makes your code clearer at the expense of forcing you to write more code.


    Choose whatever method you like best but as in all aspects of programming, stick
    to one style to make it easy for other programmers to understand your code later
    if you''re not around to explain how it works.


    ## Using Panels


    Panels represent common user interface elements that OS X programs need such as
    displaying an Open panel to let users select a file to open and a Save panel to
    let users choose a folder to store a file. The Open panel is based on the `NSOpenPanel`
    class while the Save panel is based on the `NSSavePanel` class.'
