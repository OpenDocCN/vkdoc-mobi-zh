  trans: '

    ### 使用软件设计用户界面


    在尝试了不同的用户界面设计并找到一种或多种有潜力的方案后，就该超越纸笔阶段，创建人们能在电脑屏幕上实际看到的用户界面原型了。


    纸上看起来不错的设计，在电脑屏幕上可能行不通。更重要的是，电脑屏幕可以创建一种简单的交互形式。当用户点击按钮时，一个新的屏幕就会像真实用户界面那样出现。这种交互性是纸笔设计难以完美模拟的。


    创建交互式用户界面原型的一种快速方法是使用演示文稿软件，例如 `PowerPoint` 或 `Keynote`。演示文稿软件允许你创建幻灯片，每张幻灯片可以代表用户界面的一个窗口。你可以放置按钮和图形来创建粗略的用户界面设计，然后在这些按钮和幻灯片之间创建链接，以实现有限形式的交互。


    交互式用户界面原型能让你测试用户期望用户界面如何响应。例如，用户可能希望在点击某个命令后看到一个特定窗口。如果你的交互式原型向用户显示了不同的窗口，那么你就会知道需要修正什么。


    与纸笔设计一样，用户界面原型的目标是发现哪些设计有效、哪些无效，同时尽可能少花时间在原型设计上。你在原型设计上花的时间越少，就能有越多时间来构思替代方案并进行测试。


    除了使用演示文稿软件创建用户界面原型外，你还可以购买专门的模拟软件，这些软件包含常见的用户界面元素，如按钮、窗口和复选框。你可以快速拖放这些元素来创建一个模拟的用户界面，如图
    24-1 所示。


    ![A978-1-4842-1233-2_24_Fig1_HTML.jpg](img/A978-1-4842-1233-2_24_Fig1_HTML.jpg)


    图 24-1. `Balsamiq Mockups` 是一款用于创建用户界面原型的专用程序


    用户界面原型的软件版本提供了交互性。当你对用户界面设计的原型感到满意后，最后一步就是将原型转换成实际的 `Xcode` 用户界面。


    请记住，`Xcode` 允许你将 `Swift` 代码与用户界面完全分开创建。这意味着你无需编写一行代码就能在 `Xcode` 中创建用户界面。当你对用户界面的外观和设计感到满意后，可以将其各种元素（按钮、菜单等）连接到
    `IBOutlet` 和 `IBAction` 方法，从而将用户界面与你的 `Swift` 代码关联起来。


    ## 营销你的软件


    创建程序后，你需要对其进行测试以确保它能正常工作。这些早期测试者（被称为 Alpha 和 Beta 测试者）可以帮助发现程序中的错误，以便你立即修复它们。当你的程序尽可能做到无错误时，就是将它推向市场的时候了。


    以下是大多数人会犯的最大错误：他们编写了一个程序，建立一个网站来推广该程序或他们的公司，然后坐等订单滚滚而来。在 OS X 世界中，`Apple` 提供了一个特殊的
    `Mac App Store`，让每个 `Macintosh` 用户都能接触到你的软件。


    然而，仅仅在网站或 `Mac App Store` 上推广你的软件，然后坐等人们购买是远远不够的。为了最大化销售额，你还必须推广你的软件。


    对许多人来说，营销意味着花钱做广告。虽然你可以这样做，但最好还是尽量少花钱。花钱做广告和营销很容易，但除非你的广告和营销支出低于其所产生的销售额，否则你就有慢慢破产的风险。大多数人出错的地方在于，他们在广告和营销上花了钱，却完全不知道这些广告和营销是否产生了足够的销售额来证明这笔开销是合理的。


    这就是为什么你应该专注于免费的广告和营销方式来推广你的软件，这样你就能了解人们喜欢你的软件的哪些方面、哪些类型的人更有可能购买你的软件，以及接触潜在用户的最佳途径，而这一切都无需让你破产。


    例如，假设你销售一款能让视频看起来像几十年前用胶片拍摄的老电影的软件，画面带有划痕、褪色效果，并伴有电影放映机中胶片转动的音效。你可能初步将目标用户锁定为那些想把自己的视频趣味性地变成老电影的人，但你可能会发现，你真正的市场是好莱坞的工作室，他们需要创造视觉特效来模拟老电影。


    你最初定位的市场可能对你的软件不感兴趣，但一个完全不同的市场却可能非常需要它。如果你在最初的市场广告上花了钱，就等于把钱浪费在了那些实际上并不真正想要你程序的人身上。只有后来你可能才会找到自己软件的真正市场，它可能来自一个你之前从未想过的、意想不到的细分领域。


    所以，不要用花钱来代替市场调研。花更多的钱很容易。但花时间去评估你的营销和广告实际效果如何，以及你的软件是否从一开始就瞄准了最有利可图的市场，这却要困难得多。


    除了通过网站以最低成本推广软件之外，以下是一些几乎不花钱或低成本推广软件的方法：


    - 开设博客。

    - 赠送免费软件。

    - 在视频分享网站（如 `YouTube`）上发布你的软件视频。

    - 创建并免费提供存储在 `PDF` 文件中的信息，为你的软件的潜在客户提供技巧。

    - 找到你的潜在客户聚集的社交网络，参与讨论并回答他们的问题。

    '
- fmt: '### Blogging About Your Software


    A web site is like putting a billboard in the middle of the desert and hoping
    people will magically find it. While search engines can help people find your
    web site, it’s far better to include a blog on your website as well.


    A blog serves several purposes. First, by constantly blogging at least once a
    week, you generate new content for your web site. New content tells search engines
    that your site is active, and thus search engines will rank them as more relevant
    than a site that hasn’t been updated in months or even years. So blogs increase
    your search engine rank, thereby increasing the chance that potential customers
    can find your product.


    Second, a blog puts a human face behind your software. By discussing the challenges
    you faced creating the software and responding to questions from people about
    your software, you demonstrate that there’s someone who cares and is willing to
    respond to questions about that software. Given a choice between buying from a
    faceless corporation or someone who seems like a real person, this subtle difference
    can increase the likelihood that potential customers will buy your software.


    Third, each blog post acts like another miniature ad for your software. Most people
    create a web site describing their software and hope that will convince people
    to buy it. However, a blog lets you focus on a different aspect of your software.
    One blog post might talk about a special feature that you’re particularly proud
    to highlight. A second blog post might tell a story of a happy customer who used
    your software to solve a problem. A third blog post might explain why you designed
    your program the way you did.


    Since each blog post is slightly different, you avoid repetition. Yet since each
    blog post continually promotes your software, you’re constantly advertising your
    software from different points of view. This increases the chance that one of
    your blog posts will convince someone to buy your software.


    Blogging simply costs time, yet provides higher search engine rankings while promoting
    your software over and over again. Think of blogs as a free way to advertise on
    the Internet.


    ### Giving Away Free Software


    There’s a reason companies give away free samples of everything from food to toothpaste.
    They know once you try a product and like it, you’ll be far more likely to buy
    it. If you never try a product, it’s much harder for a company to convince you
    to buy it.


    Giving away free software works the same way. Some companies give away free “lite”
    versions of their software that’s fully functional. This lets customers try and
    use your software at no cost. A certain percentage of people will eventually want
    more advanced features, and those people will translate into paying customers.


    The more people you get using your free software, the more people you’ll get paying
    for the advanced version.


    For example, assume 1 percent of all people trying your free software decide to
    buy your advanced version. If you can get your free software in the hands of 100
    people, that translates into one sale. However, if you can get your free software
    in the hands of 10,000 people, that translates into 100 sales.


    Since distributing free software doesn’t cost you anything to duplicate or distribute,
    your advertising and marketing costs are essentially zero.


    Besides offering a free “lite” version of your program, you could also offer free
    software related to your main program. For example, suppose you sell a word processor
    targeted for scientists to write complex mathematical and chemical formulas. Rather
    than give away a free “lite” version of your program, you could give away free
    software that your target audience (engineers and scientists) might like such
    as an interactive periodic table of elements or a simple equation solving program.


    Such free software simply gives potential customers something for free. Now if
    they like your free software, they’ll be far more likely to trust your commercial
    software. If your free software is well-designed and useful, potential customers
    will believe your commercial software must also be just as well-designed and useful.
    Free software lets potential customers sample your products without risk.


    ### Posting Videos About Your Software


    Blogging about your software can be great for people who like reading. Unfortunately,
    in today’s busy world, many people don’t have time to read. That’s why you can
    make short videos demonstrating how your software works so people can see what
    problems your software solves and how it does it.


    In general, nobody wants to buy or use your software. What they really want are
    the solutions your software offers, and that’s what you need to emphasize in your
    videos. Don’t explain the menu system or the organization of your user interface.
    Focus on solving a single problem and emphasize something unique about your software.


    For example, suppose your software is designed to help real estate agents. Your
    potential customers will either want to save time or make money, so show how your
    software can help real estate agents do both. Show a feature that simplifies an
    existing, time-consuming process. Show another feature that increases the number
    of potential buyers of a property with little additional work. Always focus on
    how your software benefits the user.


    Keep your videos short and to the point. More people will watch a video demonstrating
    a single feature that runs under a minute. Far fewer people will watch a thirty-minute
    video demonstrating multiple features. With many video sharing sites like YouTube,
    you can even link multiple videos together so when one video ends, a second one
    begins. Now each video acts like another advertisement for your product and by
    linking each video to another one, each new video increases the chance that someone
    will find and watch at least one of them.


    ### Give Away Free Information


    People tend to buy more from people they trust, so one way to get people to trust
    you is to give out free, useful information. For example, if your software helps
    edit photographs, write up a list of tips for capturing better pictures. Now share
    that list of tips as a PDF file and give it away for free, with a link back to
    your web site promoting your software.


    Free, useful information acts as a subtle advertisement. Traditional ads blatantly
    promote a product, which can immediately turn off even your best potential customers.
    Free information subtly promotes a product. Since the free information is useful
    to your potential customer, they’ll be more willing to look at it and even share
    it with others. If they want more information, they can visit your web site.


    One visually appealing way to provide free information is through a combination
    of text and graphics known as infographics. An infographic presents information
    in a colorful manner so it’s easy to read and understand without wading through
    large amounts of text. As Figure 24-2 shows, even IBM creates and distributes
    free infographics to promote their services and products.


    ![A978-1-4842-1233-2_24_Fig2_HTML.jpg](A978-1-4842-1233-2_24_Fig2_HTML.jpg)


    Figure 24-2. IBM provides an infographic as a PDF file to promote how their services
    helped American Greetings


    By providing free, useful information, you establish yourself as an authority.
    If you can provide free, useful information as PDF files and blog posts on your
    web site, you’ll give people additional reasons to keep coming back to your web
    site/blog over and over again. The more times people visit, the more likely they’ll
    eventually buy your software or tell others about your web site/blog.


    Free, useful information establishes you as trustworthy, which lowers the barrier
    to buying your software. The more people trust you, the more likely they’ll believe
    your product will do what you claim it does.'
  raw: '### Blogging About Your Software


    A web site is like putting a billboard in the middle of the desert and hoping
    people will magically find it. While search engines can help people find your
    web site, it’s far better to include a blog on your website as well.


    A blog serves several purposes. First, by constantly blogging at least once a
    week, you generate new content for your web site. New content tells search engines
    that your site is active, and thus search engines will rank them as more relevant
    than a site that hasn’t been updated in months or even years. So blogs increase
    your search engine rank, thereby increasing the chance that potential customers
    can find your product.


    Second, a blog puts a human face behind your software. By discussing the challenges
    you faced creating the software and responding to questions from people about
    your software, you demonstrate that there’s someone who cares and is willing to
    respond to questions about that software. Given a choice between buying from a
    faceless corporation or someone who seems like a real person, this subtle difference
    can increase the likelihood that potential customers will buy your software.


    Third, each blog post acts like another miniature ad for your software. Most people
    create a web site describing their software and hope that will convince people
    to buy it. However, a blog lets you focus on a different aspect of your software.
    One blog post might talk about a special feature that you’re particularly proud
    to highlight. A second blog post might tell a story of a happy customer who used
    your software to solve a problem. A third blog post might explain why you designed
    your program the way you did.


    Since each blog post is slightly different, you avoid repetition. Yet since each
    blog post continually promotes your software, you’re constantly advertising your
    software from different points of view. This increases the chance that one of
    your blog posts will convince someone to buy your software.


    Blogging simply costs time, yet provides higher search engine rankings while promoting
    your software over and over again. Think of blogs as a free way to advertise on
    the Internet.


    ### Giving Away Free Software


    There’s a reason companies give away free samples of everything from food to toothpaste.
    They know once you try a product and like it, you’ll be far more likely to buy
    it. If you never try a product, it’s much harder for a company to convince you
    to buy it.


    Giving away free software works the same way. Some companies give away free “lite”
    versions of their software that’s fully functional. This lets customers try and
    use your software at no cost. A certain percentage of people will eventually want
    more advanced features, and those people will translate into paying customers.


    The more people you get using your free software, the more people you’ll get paying
    for the advanced version.


    For example, assume 1 percent of all people trying your free software decide to
    buy your advanced version. If you can get your free software in the hands of 100
    people, that translates into one sale. However, if you can get your free software
    in the hands of 10,000 people, that translates into 100 sales.


    Since distributing free software doesn’t cost you anything to duplicate or distribute,
    your advertising and marketing costs are essentially zero.


    Besides offering a free “lite” version of your program, you could also offer free
    software related to your main program. For example, suppose you sell a word processor
    targeted for scientists to write complex mathematical and chemical formulas. Rather
    than give away a free “lite” version of your program, you could give away free
    software that your target audience (engineers and scientists) might like such
    as an interactive periodic table of elements or a simple equation solving program.


    Such free software simply gives potential customers something for free. Now if
    they like your free software, they’ll be far more likely to trust your commercial
    software. If your free software is well-designed and useful, potential customers
