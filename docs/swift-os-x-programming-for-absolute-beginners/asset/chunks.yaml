- fmt: "At this point we’ve connected the user interface to our Swift code so we can\
    \ use the `IBOutlet`s to retrieve and display data on the user interface. We’ve\
    \ also created the `IBAction` methods so the push buttons on the user interface\
    \ will make the program actually work. Now we just need to write Swift code to\
    \ create an initial dictionary and then write more Swift code in each `IBAction`\
    \ method to add, delete, or query the dictionary.\n\nUnderneath the `IBOutlet`\
    \ list in the `AppDelegate.swift` file, type the following to create a dictionary\
    \ where the keys are integers and the values are strings:\n\n`var myDictionary\
    \ = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"]`\n\nModify the `addButton` IBAction\
    \ method so it takes a value from the Key and Value text fields and adds them\
    \ to the dictionary as follows:\n\n```\n@IBAction func addButton(sender: NSButton)\
    \ {\n    myDictionary.updateValue(addValueField.stringValue, forKey: addKeyField.integerValue)\n\
    }\n```\n\nModify the `deleteButton` IBAction method so it takes a value from the\
    \ Key text field and deletes the associated value from the dictionary as follows:\n\
    \n```\n@IBAction func deleteButton(sender: NSButton) {\n    myDictionary.removeValueForKey(deleteKeyField.integerValue)\n\
    }\n```\n\nModify the `queryButton` IBAction method as follows:\n\n```\n@IBAction\
    \ func queryButton(sender: NSButton) {\n    queryCountField.integerValue = myDictionary.count\n\
    \    var keyList = \"\"\n    for key in myDictionary.keys {\n        keyList =\
    \ keyList + \"\\(key)\" + \" \"\n    }\n    queryKeysField.stringValue = keyList\n\
    \    var valueList = \"\"\n    for value in myDictionary.values {\n        valueList\
    \ = valueList + \"\\(value)\" + \" \"\n    }\n    queryValuesField.stringValue\
    \ = valueList\n}\n```\n\nThe `myDictionary.count` command simply counts the number\
    \ of key:value pairs in the dictionary and displays that number in the `queryCountField`\
    \ `IBOutlet`.\n\nThe first for-in loop goes through each key in the dictionary\
    \ and stores it in a string called `keyList`. Then it displays this text string\
    \ in the `queryKeysField` `IBOutlet`.\n\nThe last for loop goes through each value\
    \ in the dictionary and stores it in a string called `valueList`. Then it displays\
    \ this text string in the `queryValuesField` `IBOutlet`.\n\nThe complete contents\
    \ of the `AppDelegate.swift` file should look like this:\n\n```\nimport Cocoa\n\
    \n@NSApplicationMain\nclass AppDelegate: NSObject, NSApplicationDelegate {\n\n\
    \    @IBOutlet weak var window: NSWindow!\n    @IBOutlet weak var addKeyField:\
    \ NSTextField!\n    @IBOutlet weak var addValueField: NSTextField!\n    @IBOutlet\
    \ weak var deleteKeyField: NSTextField!\n    @IBOutlet weak var queryCountField:\
    \ NSTextField!\n    @IBOutlet weak var queryKeysField: NSTextField!\n    @IBOutlet\
    \ weak var queryValuesField: NSTextField!\n\n    var myDictionary = [1:\"Joe\"\
    , 2:\"Cindy\", 3:\"Frank\"]\n\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n        // Insert code here to initialize your application\n\
    \    }\n\n    func applicationWillTerminate(aNotification: NSNotification) {\n\
    \        // Insert code here to tear down your application\n    }\n\n    @IBAction\
    \ func addButton(sender: NSButton) {\n        myDictionary.updateValue(addValueField.stringValue,\
    \ forKey: addKeyField.integerValue)\n    }\n\n    @IBAction func deleteButton(sender:\
    \ NSButton) {\n        myDictionary.removeValueForKey(deleteKeyField.integerValue)\n\
    \    }\n\n    @IBAction func queryButton(sender: NSButton) {\n        queryCountField.integerValue\
    \ = myDictionary.count\n        var keyList = \"\"\n        for key in myDictionary.keys\
    \ {\n            keyList = keyList + \"\\(key)\" + \" \"\n        }\n        queryKeysField.stringValue\
    \ = keyList\n        var valueList = \"\"\n        for value in myDictionary.values\
    \ {\n            valueList = valueList + \"\\(value)\" + \" \"\n        }\n  \
    \      queryValuesField.stringValue = valueList\n    }\n}\n```\n\nThe Query button\
    \ works by just clicking on it to display information about the current dictionary\
    \ contents.\n\nThe Add button works by the user typing in a key (integer) and\
    \ a name (string) into the Key and Value text fields, then clicking the Add button.\n\
    \nThe Delete button works by the user typing in a key (integer) and then clicking\
    \ the Delete button.\n\nAfter clicking either the Add or Delete button, click\
    \ the Query button again to see your changes. To see how this program works, follow\
    \ these steps:\n\n- Choose **Product** ➤ **Run**. Xcode runs your `DictionaryProgram`\
    \ project.\n- Click the **Query** button. The program shows the number of items\
    \ in the dictionary (3), the list of keys (the numbers 1, 2, and 3), and the list\
    \ of values (“Joe,” “Cindy,” and “Frank”). Don’t worry about the order of the\
    \ keys and values. The important point is to see that the order of each key matches\
    \ up with the correct value such as 1 for “Joe,” 2 for “Cindy,” and 3 for “Frank.”\n\
    - Type 3 in the **Key** field to the right of the **Delete** push button and then\
    \ click the **Delete** button.\n- Click the **Query** button. Notice that now\
    \ the dictionary only contains two items: the keys 1 and 2, and the values “Joe”\
    \ and “Cindy” as shown in Figure [9-9](#A978-1-4842-1233-2_9_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_9_Fig9_HTML.jpg](A978-1-4842-1233-2_9_Fig9_HTML.jpg)\n\n\
    **Figure 9-9.** Displaying the results after deleting a key:value pair\n\n- Click\
    \ in the **Key** text field to the right of the **Add** button and type 5.\n-\
    \ Click in the **Value** text field to the right of the **Add** button and type\
    \ Felicia.\n- Click the **Add** button.\n- Click the **Query** button. Notice\
    \ that the count is now 3 again; the keys are 1, 2 and 5; and the values are “Joe,”\
    \ “Cindy,” and “Felicia.”\n- Choose **DictionaryProgram** ➤ **Quit DictionaryProgram**.\n\
    \n## Summary\n\nArrays and dictionaries are two ways to store lists of related\
    \ data in a single variable. Arrays make it easy to store data, but retrieving\
    \ data can be cumbersome since you have to know the exact index value of the data\
    \ you want to retrieve.\n\nDictionaries force you to store data with a key, but\
    \ that key makes it easy to retrieve that data later without knowing the exact\
    \ location it may be stored in the dictionary.\n\nIn the sample OS X program that\
    \ you created, you also learned how for-in loops can count automatically through\
    \ a dictionary. By now you should also be getting more comfortable creating user\
    \ interfaces and seeing which items need `IBOutlet`s and which items need `IBAction`\
    \ methods.\n\nDesigning programs can occur in three distinct steps. First, create\
    \ the user interface and customize it. Second, connect your user interface to\
    \ your Swift file. Third, write Swift code to make your `IBAction` methods work.\n\
    \nThink of arrays and dictionaries as super variables that can store multiple\
    \ data in a single variable name. If you only need to save a single value, then\
    \ use a variable. If you need to store lists of related data, then use an array\
    \ or a dictionary."
