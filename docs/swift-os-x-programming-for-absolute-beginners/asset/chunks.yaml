    `@IBOutlet weak var labelText: NSTextField?`


    Unfortunately, every time you wanted to access the data stored in this optional
    variable, you would have to type an exclamation mark. If you accessed this IBOutlet
    variable multiple times, each time you would have to type an exclamation mark,
    which can get annoying while making your code look harder to read.


    To let you access an IBOutlet variable without typing exclamation marks all the
    time, it’s easier to create an IBOutlet variable as an implicitly unwrapped optional
    variable, which means that if it holds a value, you can access it without typing
    the unwrapping exclamation mark.


    To see how Xcode creates IBOutlets as implicitly unwrapped optional variables,
    open the MyFirstProgram project that you created earlier:


    Make sure your MyFirstProgram is loaded in Xcode.   Click on the AppDelegate.swift
    file in the Project Navigator. Xcode’s middle pane displays the contents of that
    .swift file. Notice that all the IBOutlet variables are declared with an exclamation
    mark, meaning they’re implicitly unwrapped optional variables: `@IBOutlet weak
    var labelText: NSTextField!` `@IBOutlet weak var messageText: NSTextField!`


    Also notice that the IBAction changeCase method lets you access the contents of
    these implicitly unwrapped optional variables without using an exclamation mark.


    `@IBOutlet weak var labelText: NSTextField!`


    `@IBOutlet weak var messageText: NSTextField!`


    `@IBAction func changeCase(sender: NSButton) {`


    `labelText.stringValue = messageText.stringValue.uppercaseString`


    `let warning = labelText.stringValue`


    `}`


    Replace the exclamation marks at the end of each IBOutlet variable with a question
    mark like this: `@IBOutlet weak var labelText: NSTextField?` `@IBOutlet weak var
    messageText: NSTextField?`


    Notice that Xcode now displays error messages each time you use an IBOutlet variable.
    That’s because you need to unwrap each optional variable with an exclamation mark
    like this:


    `@IBAction func changeCase(sender: NSButton) {`


    `labelText!.stringValue = messageText!.stringValue.uppercaseString`


    `let warning = labelText!.stringValue`


    `}`


    If you define your IBOutlets as regular optional variables (defined by a question
    mark), then you must unwrap each optional variable with an exclamation mark to
    access its value.


    If you simply define your IBOutlets as implicitly unwrapped optional variables
    (which Xcode does for you), then you don’t need to type an exclamation mark to
    unwrap the optional variables.


    Basically, let Xcode create your IBOutlets as implicitly unwrapped variables (with
    an exclamation mark) to make typing Swift code easier.


    Now you may wonder when should you use an optional variable (defined by a question
    mark ?) and when should you use an implicitly unwrapped optional variable defined
    by an exclamation mark !)?


    In general, use implicitly unwrapped optional variables for IBOutlets to make
    it easy to write Swift code without typing exclamation marks all over. If you
    use implicitly unwrapped optional variables any other time, your variable could
    contain a nil value and Xcode won’t catch any potential errors if you try to use
    it.


    To see the danger of using implicitly unwrapped optional variables, follow these
    steps:


    Make sure your IntroductoryPlayground file is loaded in Xcode.   Modify the code
    as follows: `import Cocoa` `var safe : Int?  // optional variable` `var danger
    : Int!// implicitly unwrapped optional variable` `print (danger * 2)` `print (safe
    * 2)`


    Notice that neither integer variable has a value in it, but Xcode cheerfully lets
    you perform a calculation with a nil value in an implicitly unwrapped optional
    but flags a possible error with a regular optional variable as shown in Figure
    [5-16](#A978-1-4842-1233-2_5_Chapter.html#Fig16).


    ![A978-1-4842-1233-2_5_Fig16_HTML.jpg](A978-1-4842-1233-2_5_Fig16_HTML.jpg)


    Figure 5-16.


    Xcode can identify possible problems with undefined optional variables but not
    undefined implicitly unwrapped optional variables


    By making you unwrap optional variables with an exclamation mark (!), Xcode forces
    you to acknowledge you’re using an optional variable so you can remember to check
    if it has a nil value or not.


    Since implicitly unwrapped optional variables let you type the variable name without
    typing additional symbols, it’s much easier to forget you’re working with optional
    variables and check for a possible nil value before trying to use it. Optional
    variables can’t prevent problems, but they can force you to remember you’re working
    with potentially nil values.


    ## Summary


    If you’re coming from another programming environment, you’ve already seen numerous
    ways that Swift differs from other languages. Swift’s playground interpreter lets
    you test your code in a safe environment before copying and pasting it into an
    actual program. Playgrounds give you the freedom to experiment freely with Swift
    commands.


    You can create single line comments by using the // symbols. You can create multiple
    line comments by marking the beginning of a comment with the /* symbols and the
    end of a comment with the */ symbols.


    The three most common data types are integers (Int), decimal numbers (Float or
    Double), and text strings (String). If you need absolute precision with decimal
    numbers, use Double data types. Otherwise just use Float.


    To make data types easier to understand, you can use typealiases, which let you
    substitute a descriptive name to represent a common data type. To make variable
    names more flexible, you can use Unicode characters that can represent symbols
    or foreign language characters.


    Storing data in a variable can be as simple as assigning it to a value. Swift
    also offers computed properties that let you modify a variable or another variable
    when assigned a new value. Computed properties are far more useful when working
    with classes and object-oriented programming.


    Even more important are optional variables that let you handle nil values without
    crashing your program. Optional variables are especially important when using
    IBOutlets to connect Swift code to user interface items such as labels and text
    fields.


    When you create an optional variable (with a question mark), you need to unwrap
    it to access its actual data (using an exclamation mark).


    Variables are crucial for storing data temporarily so you’ll use them often. When
    you start learning about classes and object-oriented programming, you’ll use variables
    for defining properties. Essentially, any time you need to store one chunk of
    data, you’ll declare a variable to hold it.'
  trans: "\n## 将 Swift 代码与用户界面关联\n\n每个程序都需要存储数据，而从用户界面获取数据并将其存入变量，是最常见的方法之一。要将用户界面元素关联到\
    \ Swift 代码，你需要创建一个 `IBOutlet` 变量。\n\n如果你有一个文本字段连接到了某个 `IBOutlet` 变量，那么用户在文本字段中输入的任何内容都会自动存储到该\
    \ `IBOutlet` 变量中。同样地，你存储在该 `IBOutlet` 变量中的任何内容也会立刻出现在文本字段中。`IBOutlet` 变量就像一座桥梁，连接了你的\
    \ Swift 代码和用户界面，如图 5-15 所示。\n\n![A978-1-4842-1233-2_5_Fig15_HTML.gif](img/A978-1-4842-1233-2_5_Fig15_HTML.gif)\n\
    \n图 5-15. `IBOutlet` 变量将你的用户界面元素与 Swift 代码关联起来\n\n由于文本字段等用户界面元素初始时可能为空，`IBOutlet`\
    \ 变量通常被定义为隐式解包可选变量，并通过感叹号来声明，如下所示：\n\n```\n@IBOutlet weak var labelText: NSTextField!\n\
    ```\n\n如果将 `IBOutlet` 声明为普通变量，并连接到一个空的文本字段，那么当 `IBOutlet` 变量中没有数据时，程序可能会面临崩溃的风险。\n\
    \n如果将 `IBOutlet` 声明为可选变量，你可以用问号来定义它，如下所示：\n\n```\n@IBOutlet weak var labelText:\
    \ NSTextField?\n```\n\n遗憾的是，每次你想访问这个可选变量中存储的数据时，都必须输入一个感叹号。如果多次访问该 `IBOutlet`\
    \ 变量，每次都需输入感叹号，这既麻烦又会让代码看起来难以阅读。\n\n为了让你在不总是输入感叹号的情况下就能访问 `IBOutlet` 变量，更简单的方法是将\
    \ `IBOutlet` 变量创建为隐式解包可选变量。这意味着，如果它有值，你就可以在不输入解包感叹号的情况下访问它。\n\n要了解 Xcode 如何将 `IBOutlet`\
    \ 创建为隐式解包可选变量，请打开你之前创建的 `MyFirstProgram` 项目：\n\n确保你的 `MyFirstProgram` 已在 Xcode\
    \ 中加载。点击项目导航器中的 `AppDelegate.swift` 文件。Xcode 的中间窗格将显示该 `.swift` 文件的内容。请注意，所有 `IBOutlet`\
    \ 变量都使用感叹号声明，这意味着它们是隐式解包可选变量：`@IBOutlet weak var labelText: NSTextField!` 和 `@IBOutlet\
    \ weak var messageText: NSTextField!`\n\n同样注意，`IBAction changeCase` 方法让你无需使用感叹号即可访问这些隐式解包可选变量的内容。\n\
    \n```\n@IBOutlet weak var labelText: NSTextField!\n@IBOutlet weak var messageText:\
    \ NSTextField!\n@IBAction func changeCase(sender: NSButton) {\n    labelText.stringValue\
    \ = messageText.stringValue.uppercaseString\n    let warning = labelText.stringValue\n\
    }\n```\n\n将每个 `IBOutlet` 变量末尾的感叹号替换为问号，如下所示：`@IBOutlet weak var labelText: NSTextField?`\
    \ 和 `@IBOutlet weak var messageText: NSTextField?`\n\n注意，每当使用 `IBOutlet` 变量时，Xcode\
    \ 现在都会显示错误信息。这是因为你需要像这样用感叹号解包每个可选变量：\n\n```\n@IBAction func changeCase(sender:\
    \ NSButton) {\n    labelText!.stringValue = messageText!.stringValue.uppercaseString\n\
    \    let warning = labelText!.stringValue\n}\n```\n\n如果你将 `IBOutlet` 定义为普通的可选变量（用问号定义），那么你必须用感叹号解包每个可选变量才能访问其值。\n\
    \n如果你简单地将 `IBOutlet` 定义为隐式解包可选变量（Xcode 会自动为你这样做），那么你就不需要输入感叹号来解包这些可选变量了。\n\n基本上，让\
    \ Xcode 将你的 `IBOutlet` 创建为隐式解包变量（带感叹号）可以使编写 Swift 代码更简便。\n\n现在你可能会问，什么时候应该使用可选变量（用问号\
    \ `?` 定义），什么时候又该使用由感叹号 `!` 定义的隐式解包可选变量呢？\n\n通常，对于 `IBOutlet`，使用隐式解包可选变量可以简化 Swift\
    \ 代码的编写，免去到处输入感叹号的麻烦。如果在其他场合使用隐式解包可选变量，你的变量可能会包含 `nil` 值，而当你尝试使用它时，Xcode 不会捕捉到潜在的错误。\n\
    \n要了解使用隐式解包可选变量的风险，请遵循以下步骤：\n\n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按如下方式修改代码：\n\
    ```\nimport Cocoa\nvar safe : Int?  // 可选变量\nvar danger : Int!// 隐式解包可选变量\nprint\
    \ (danger * 2)\nprint (safe * 2)\n```\n\n注意，这两个整型变量都没有任何值，但 Xcode 却允许你对隐式解包可选变量中的\
    \ `nil` 值进行计算，而对于普通的可选变量，它会标记出可能的错误，如图 5-16 所示。\n\n![A978-1-4842-1233-2_5_Fig16_HTML.jpg](img/A978-1-4842-1233-2_5_Fig16_HTML.jpg)\n\
    \n图 5-16. Xcode 能够识别未定义可选变量的潜在问题，但无法识别未定义隐式解包可选变量的问题\n\n通过强制你用感叹号（`!`）解包可选变量，Xcode\
    \ 迫使你承认正在使用可选变量，这样你就能记得检查它是否包含 `nil` 值。\n\n由于隐式解包可选变量允许你直接输入变量名而无需额外的符号，因此你更容易忘记自己正在处理可选变量，并在使用前忘记检查可能的\
    \ `nil` 值。可选变量无法防止问题，但它们能强制你记住正在处理可能为 `nil` 的值。\n\n## 总结\n\n如果你来自其他编程环境，你会看到 Swift\
    \ 与许多其他语言的不同之处。Swift 的 Playground 解释器让你在将代码复制粘贴到实际程序之前，可以安全地测试代码。Playground 为你提供了自由尝试\
    \ Swift 命令的环境。\n\n你可以使用 `//` 符号创建单行注释。通过使用 `/*` 标记注释的开始，使用 `*/` 标记注释的结束，可以创建多行注释。\n\
    \n三种最常见的数据类型是整数（`Int`）、小数（`Float` 或 `Double`）和文本字符串（`String`）。如果需要对小数实现绝对精度，请使用\
    \ `Double` 数据类型。否则直接使用 `Float` 即可。\n\n为了更容易理解数据类型，你可以使用 `typealias`，它允许你用一个描述性名称来代替常见的数据类型。为了让变量名更灵活，你可以使用\
    \ Unicode 字符，这些字符可以表示符号或外语字符。\n\n将数据存储在变量中，可以简单到直接将值赋给它。Swift 还提供了计算属性，允许你在赋值新值时修改一个变量或另一个变量。计算属性在处理类和面向对象编程时尤其有用。\n\
    \n更重要的是可选变量，它允许你处理 `nil` 值而不会导致程序崩溃。在使用 `IBOutlet` 将 Swift 代码与标签和文本字段等用户界面元素连接时，可选变量尤其重要。\n\
    \n当你创建一个可选变量（使用问号）时，你需要对其进行解包（使用感叹号）才能访问其实际数据。\n\n变量对于临时存储数据至关重要，因此你会经常使用它们。当你开始学习类和面向对象编程时，你会使用变量来定义属性。本质上，任何时候你需要存储一块数据时，都需要声明一个变量来保存它。\n"
- fmt: '# 6. Manipulating Numbers and Strings


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​6](http://dx.doi.org/10.1007/978-1-4842-1233-2_6))
    contains supplementary material, which is available to authorized users.


    Every program needs to store data temporarily in variables. However, for a program
    to be useful, it must also manipulate that data somehow to calculate a useful
    result. A spreadsheet lets you add, subtract, multiply, and divide numbers. A
    word processor manipulates text to correct your spelling and format text. Even
    a video game responds to joystick movements to calculate a new position for the
    player’s object such as a cartoon person, airplane, or car. Using data to calculate
    a new result is the whole purpose of every program.


    To manipulate numbers, Swift includes four basic mathematic operators for addition
    (`+`), subtraction (`-`), multiplication (`*`), division (`/`), and a remainder
    operator (`%`). You can even manipulate strings using the additional operator
    (`+`) when you want to combine two strings into one.


    Although Swift includes multiple operators for manipulating numbers and text,
    the Cocoa framework includes plenty of more powerful functions for manipulating
    numbers and strings. If none of these functions prove suitable, you can always
    create your own functions to manipulate text and numeric data. By creating miniature
    programs called functions, you can manipulate data in any way you like and reuse
    your function as often as necessary.


    ## Using Mathematical Operators


    The simplest way to manipulate numbers is to perform addition, subtraction, division,
    or multiplication. When manipulating numbers, first make sure all your numbers
    are the same data type such as all integers or all `Float` or `Double` decimal
    numbers. Since mixing integers with decimal numbers can lead to calculation errors,
    Swift will force you to use all the same data types in a calculation. If all your
    data isn’t the same data type, you’ll need to convert one or more data types such
    as:


    ```

    var cats = 4

    var dogs = 5.4

    dogs = Double(cats) * dogs

    ```


    In this case, Swift infers that `cats` is an `Int` data type and `dogs` is a `Double`
    data type. To multiple `cats` and `dogs`, they must be the same data type (`Double`),
    so we must first convert the `cats` value to a `Double` data type and then the
    calculation can proceed safely.


    When using multiple mathematical operators, use parentheses to define which calculations
    should occur first. Swift normally calculates mathematical operators from left
    to right, but multiplication and division occur before addition and subtraction.
    If you typed the following Swift code, you’d get two different results based solely
    on the order of the mathematical calculations:


    ```

    var cats, dogs : Double

    dogs = 5 * 9 - 3 / 2 + 4      // 47.5

    cats = 5 * (9 - 3) / (2 + 4)  // 5.0

    ```


    For clarity, always group mathematical operators in parentheses. The most common
    mathematical operators are known as binary operators because they require two
    numbers to calculate a result, as shown in Table [6-1](#A978-1-4842-1233-2_6_Chapter.html#Tab1).


    **Table 6-1.** Common mathematical operators in Swift


    | Mathematical operator | Purpose | Example |

    | --- | --- | --- |

    | `+` | Addition | `5 + 9 = 14` |

    | `-` | Subtraction | `5 - 9 = -4` |

    | `*` | Multiplication | `5 * 9 = 45` |

    | `/` | Division | `5 / 9 = 0.555` |

    | `%` | Remainder | `5 % 9 = 5` |


    Out of all these mathematical operators, the remainder operator may need some
    additional explanation. Essentially the remainder operator divides one number
    into another and returns just the remainder of that division. So 5 divided by
    9 is 0 with a remainder of 5 and 26 divided by 5 would give a remainder of 1.


    ### Prefix and Postfix Operators


    When using the addition or subtraction operators to add or subtract 1, Swift gives
    you two options. First, you can create simple mathematical statements like this:


    ```

    var temp : Int = 1

    temp = temp + 1

    temp = temp - 1

    ```


    As a shortcut, Swift also offers something called prefix and postfix increment
    and decrement operators. So if you wanted to add 1 to any variable, you could
    just do one of the following:


    ```

    var temp : Int = 1

    ++temp

    --temp

    ```


    The `++` or `--` operator tells Swift to add or subtract 1 to the variable. When
    the `++` or `--` operator appears in front of a variable, that’s called prefix
    and that means add or subtract 1 to the variable before using it.


    If the `++` or `--` operator appears after a variable, that’s called postfix and
    that means add or subtract 1 to the variable after using it.


    To see how these different increment and decrement operators work, create a new
    playground by following these steps:


    1. Start Xcode.

    2. Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen, you can
    also click on Get started with a playground.) Xcode asks for a playground name
    and platform.

    3. Click in the Name text field and type `MathPlayground`.

    4. Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.

    5. Click on a folder where you want to save your playground file and click the
    Create button. Xcode displays the playground file.

    6. Edit the code as follows:


    ```

    import Cocoa

    var temp, temp2 : Int

    temp = 1

    temp2 = temp

    print (++temp)

    print (temp2++)

    print (temp2)

    ```


    Notice that the prefix operator (`++temp`) adds 1 to the variable before using
    it while the postfix operator (`temp--`) uses the variable and then adds 1 to
    it as shown in Figure [6-1](#A978-1-4842-1233-2_6_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_6_Fig1_HTML.jpg](A978-1-4842-1233-2_6_Fig1_HTML.jpg)


    **Figure 6-1.** Seeing how prefix and postfix operators work


    ### Compound Assignment Operators


    The increment (`++`) and decrement (`--`) operators let you add or subtract 1
    to a variable. If you want to add or subtract a number other than 1 to a variable,
    you can use a compound assignment operator that looks like this (`+=`) or (`-=`).


    To use a compound assignment operator, you need to specify a variable, the compound
    assignment operator you want to use, and then the value you want to add or subtract
    such as:


    ```

    temp += 5

    ```


    This is equivalent to:


    ```

    temp = temp + 5

    ```


    To see how compound assignment operators work, follow these steps:


    1. Make sure your `MathPlayground` file is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var temp : Int

    temp = 2

    temp += 57              // Equivalent to temp = temp + 57

    print (temp)

    temp -= 7               // Equivalent to temp = temp - 7

    print (temp)

    ```


    As Figure [6-2](#A978-1-4842-1233-2_6_Chapter.html#Fig2) shows, the `+=` compound
    assignment operator adds 57 to the current value of `temp`. Then the `-=` compound
    assignment operator subtracts 7 from the current value of `temp`.


    ![A978-1-4842-1233-2_6_Fig2_HTML.jpg](A978-1-4842-1233-2_6_Fig2_HTML.jpg)


    **Figure 6-2.** Seeing how compound assignment operators work


    By combining mathematical operators, you can create any type of calculation. However
    if you need to perform common mathematical operations such as finding the square
    root or logarithm of a number, it’s much simpler and more reliable to use built-in
    math functions that are part of the Cocoa framework.


    ## Using Math Functions


    The Cocoa framework provides dozens of math functions that you can view by choosing
    Help ➤ Documentation and API Reference. When the Documentation window appears,
    type `math` and choose `math` under the API Reference category as shown in Figure
    [6-3](#A978-1-4842-1233-2_6_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_6_Fig3_HTML.jpg](A978-1-4842-1233-2_6_Fig3_HTML.jpg)


    **Figure 6-3.** Viewing the list of all math functions in the Documentation window


    You likely won’t need or use all available math functions. Some of the more common
    math functions include the following:


    *   Rounding functions

    *   Calculation functions (`sqrt`, `cbrt`, `min`/`max`, etc.)

    *   Trigonometry functions (`sin`, `cosine`, `tangent`, etc.)

    *   Exponential functions

    *   Logarithmic functions'
