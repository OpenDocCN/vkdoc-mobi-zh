  raw: '## Understanding Protocols


    Like a class, a protocol can define properties (variables) and methods (functions).
    The main difference is that unlike a class, a protocol can’t set an initial value
    for a property and can’t implement a method. A protocol simply defines a property
    and its data type. When defining a property in a protocol, you need to define
    the following three items:


    *   The property name, which can be any arbitrary, descriptive name.

    *   The data type of the property such as Int, Double, String, etc.

    *   Whether a property is gettable { get } or gettable and settable { get set
    }


    Note


    A gettable/settable { get set } property cannot be assigned to a constant stored
    property (defined with the “let” keyword) or a read-only computed property. A
    gettable { get } property has no such limitations.


    Consider the following protocol:


    `protocol Cat {`


        `var name: String { get set }`


        `var age: Int { get }`


    `}`


    Now you can create a structure based on this protocol such as:


    `struct pet : Cat {`


        `var name : String`


        `//let name : String -- Invalid since "let" defines a constant stored property`


        `//var name : String { return "Fred" } -- Invalid since this is a read-only
    computed property`


        `let age : Int`


    `}`


    The above code defines a structure called “pet” that adopts the Cat protocol.
    That means it needs to declare the name property as a string and the age property
    as an integer.


    Notice that because the age property is defined as gettable { get } by the Cat
    protocol, you can implement that property as a constant with the “let” keyword.
    You could also compute the age property by returning a value like this:


    `struct pet : Cat {`


        `var name : String`


            `var age : Int { return 4 }`


    `}`


    To see how to use protocols and structures with different types of properties,
    follow these steps:


    From within Xcode choose File ➤ New ➤ Playground. Xcode now asks for a playground
    name.   Click in the Name text field and type ProtocolPlayground.   Make sure
    the Platform pop-up menu displays OS X.   Click the Next button. Xcode asks where
    you want to store the playground.   Choose a folder to store your project and
    click the Create button.   Edit the playground code as follows:  


    `import Cocoa`


    `protocol Cat {`


        `var name: String { get set }`


        `var age: Int { get }`


    `}`


    `// Using a computed property`


    `struct pet : Cat {`


        `var name : String`


        `var age : Int { return 4 }`


    `}`


    `var animal = pet(name: "Taffy")`


    `print (animal.name)`


    `print (animal.age)`


    `// Using a constant stored property with "let"`


    `struct feral : Cat {`


        `var name : String`


        `let age : Int`


    `}`


    `var pest = feral (name: "Stinky", age: 2)`


    `print (pest.name)`


    `print (pest.age)`


    Notice the differences when you declare a variable based on a structure. With
    computed properties for age, you don’t need to create an initial value when declaring
    the variable such as:


    `// Using a computed property { return 4 }`


    `struct pet : Cat {`


        `var name : String`


        `var age : Int { return 4 }`


    `}`


    `var animal = pet(name: "Taffy")`


    However if you don’t have computed properties, then you must specifically initialize
    it when creating a variable such as:


    `// Using a constant stored property with "let"`


    `struct feral : Cat {`


        `var name : String`


        `let age : Int`


    `}`


    `var pest = feral (name: "Stinky", age: 2)`


    Figure [20-1](#A978-1-4842-1233-2_20_Chapter.html#Fig1) shows how you can define
    two structures based on the same protocol.


    ![A978-1-4842-1233-2_20_Fig1_HTML.jpg](A978-1-4842-1233-2_20_Fig1_HTML.jpg)


    Figure 20-1.


    Two different structures can adopt the same protocol


    ### Using Methods in Protocols


    When a protocol defines a method, it only defines the method name, any parameters,
    and any data type it returns, but it does not include any Swift code that actually
    implements that method such as:


    `protocol Cat {`


        `var name: String { get set }`


        `var age: Int { get }`


            `func meow (sound: String)`


    `}`


    If a class, struct, or enum adopts this Cat protocol, it must not only define
    a name and age property, but it must also implement the protocol method with Swift
    code such as:


    `struct pet : Cat {`


        `var name : String`


        `var age : Int`


        `func meow (sound : String) {`


            `print (sound)`


        `}`


    `}`


    Even though a class, structure, or enum might adopt the exact same protocol, the
    actual implementation of a method can be wildly different such as:


    `struct feral : Cat {`


        `var name : String`


        `var age : Int`


        `func meow (sound : String) {`


            `print ("Hear me roar")`


            `print (sound.uppercaseString)`


        `}`


    `}`


    To see how to define methods in protocols and implement them in different structures,
    follow these steps:


    Make sure the ProtocolPlayground file is loaded in Xcode.   Edit the playground
    code as follows:  


    `import Cocoa`


    `protocol Cat {`


        `var name: String { get set }`


        `var age: Int { get }`


        `func meow (sound : String)`


    `}`


    `// One way to implement the meow method`


    `struct pet : Cat {`


        `var name : String`


        `var age : Int`


        `func meow (sound : String) {`


            `print (sound)`


        `}`


    `}`


    `var animal = pet(name: "Taffy", age: 16)`


    `print (animal.name)`


    `print (animal.age)`


    `animal.meow("Feed me")` `methods`


    `// A second way to implement the same meow method`


    `struct feral : Cat {`


        `var name : String`


        `var age : Int`


        `func meow (sound : String) {`


            `print ("Hear me roar")`


            `print (sound.uppercaseString)`


        `}`


    `}`


    `var pest = feral(name: "Stinky", age: 2)`


    `print (pest.name)`


    `print(pest.age)`


    `pest.meow("Growl")`


    Figure [20-2](#A978-1-4842-1233-2_20_Chapter.html#Fig2) shows how the two different
    implementations of the same protocol method work.


    ![A978-1-4842-1233-2_20_Fig2_HTML.jpg](A978-1-4842-1233-2_20_Fig2_HTML.jpg)


    Figure 20-2.


    Method implementations can be different despite adopting the same protocol


    ### Adopting Multiple Protocols


    One huge advantage protocols have over object-oriented programming is that a single
    class, structure, or enum can adopt one or more protocols. To do this, you just
    need to specify the name of each protocol to adopt such as:


    struct structureName : protocolName1, protocolName2, protocolNameN {


    By letting you adopt multiple protocols, Swift makes coding more flexible since
    you can pick and choose the protocols you want to use. To see how adopting multiple
    protocols works, follow these steps:


    Make sure the ProtocolPlayground file is loaded in Xcode.   Edit the playground
    code as follows:  


    `import Cocoa`


    `protocol Cat {`


        `var name: String { get }`


        `var age: Int { get }`


    `}`


    `protocol CatSounds {`


        `func meow (sound : String)`


    `}`


    `struct pet : Cat, CatSounds {`


        `var name : String`


        `var age : Int`


        `func meow (sound : String) {`


            `print (sound)`


        `}`


    `}`


    `var animal = pet(name: "Fluffy", age: 6)`


    `print (animal.name)`


    `print (animal.age)`


    `animal.meow("Wake up!")`


    Figure [20-3](#A978-1-4842-1233-2_20_Chapter.html#Fig3) shows how this code works
    by having a structure adopt two protocols. Notice that this code works exactly
    the same as if the name and age properties were defined in the same protocol as
    the meow method. By separating different properties and methods in multiple protocols,
    you don’t have to implement properties and/or methods you don’t need.


    ![A978-1-4842-1233-2_20_Fig3_HTML.jpg](A978-1-4842-1233-2_20_Fig3_HTML.jpg)


    Figure 20-3.


    A structure can adopt two or more protocols


    Since you can adopt multiple protocols, it’s generally best to keep each protocol
    as short and simple as possible. This makes it easier to use only the protocols
    you need without being forced to implement additional properties and/or methods
    you may not need or want.'
  trans: "\n# 理解协议\n\n协议与类类似，可以定义属性（变量）和方法（函数）。主要区别在于，协议不能为属性设置初始值，也不能实现方法。协议仅定义属性及其数据类型。在协议中定义属性时，需要定义以下三项：\n\
    \n*   属性名称，可以是任意有描述性的名称。\n*   属性的数据类型，例如 `Int`、`Double`、`String` 等。\n*   属性是只读`{\
    \ get }`，还是可读写 `{ get set }`。\n\n**注意**：可读写的 `{ get set }` 属性不能赋值给常量存储属性（使用 `let`\
    \ 关键字定义）或只读计算属性。只读的 `{ get }` 属性则没有此类限制。\n\n考虑以下协议：\n\n```swift\nprotocol Cat\
    \ {\n    var name: String { get set }\n    var age: Int { get }\n}\n```\n\n现在你可以基于此协议创建一个结构体，例如：\n\
    \n```swift\nstruct pet : Cat {\n    var name : String\n    //let name : String\
    \ -- 无效，因为 \"let\" 定义的是常量存储属性\n    //var name : String { return \"Fred\" } --\
    \ 无效，因为这是只读计算属性\n    let age : Int\n}\n```\n\n上述代码定义了一个名为 `pet` 的结构体，它遵循了 `Cat`\
    \ 协议。这意味着它需要将 `name` 属性声明为字符串，将 `age` 属性声明为整数。注意，由于 `Cat` 协议将 `age` 属性定义为只读 `{\
    \ get }`，因此你可以使用 `let` 关键字将其实现为常量。你也可以通过返回一个值来计算 `age` 属性，如下所示：\n\n```swift\n\
    struct pet : Cat {\n    var name : String\n    var age : Int { return 4 }\n}\n\
    ```\n\n要了解如何结合不同类型的属性来使用协议和结构体，请按照以下步骤操作：\n\n1.  在 Xcode 中选择 **File** ➤ **New**\
    \ ➤ **Playground**。Xcode 会要求输入 playground 名称。\n2.  在 **Name** 文本框中点击并输入 `ProtocolPlayground`。\n\
    3.  确保 **Platform** 弹出菜单显示为 **OS X**。\n4.  点击 **Next** 按钮。Xcode 会询问你希望将 playground\
    \ 存储在何处。\n5.  选择一个文件夹来存储项目，然后点击 **Create** 按钮。\n6.  按如下方式编辑 playground 代码：\n\n\
    ```swift\nimport Cocoa\n\nprotocol Cat {\n    var name: String { get set }\n \
    \   var age: Int { get }\n}\n\n// 使用计算属性\nstruct pet : Cat {\n    var name : String\n\
    \    var age : Int { return 4 }\n}\n\nvar animal = pet(name: \"Taffy\")\nprint\
    \ (animal.name)\nprint (animal.age)\n\n// 使用 \"let\" 定义的常量存储属性\nstruct feral :\
    \ Cat {\n    var name : String\n    let age : Int\n}\n\nvar pest = feral (name:\
    \ \"Stinky\", age: 2)\nprint (pest.name)\nprint (pest.age)\n```\n\n注意基于结构体声明变量时的差异。如果\
    \ age 使用计算属性，声明变量时无需创建初始值，例如：\n\n```swift\n// 使用计算属性 { return 4 }\nstruct pet\
    \ : Cat {\n    var name : String\n    var age : Int { return 4 }\n}\n\nvar animal\
    \ = pet(name: \"Taffy\")\n```\n\n然而，如果没有使用计算属性，则必须在创建变量时显式地初始化它，例如：\n\n```swift\n\
    // 使用 \"let\" 定义的常量存储属性\nstruct feral : Cat {\n    var name : String\n    let\
    \ age : Int\n}\n\nvar pest = feral (name: \"Stinky\", age: 2)\n```\n\n图 20-1 展示了如何基于同一个协议定义两个结构体。\n\
    \n![A978-1-4842-1233-2_20_Fig1_HTML.jpg](img/A978-1-4842-1233-2_20_Fig1_HTML.jpg)\n\
    \n**图 20-1.** 两个不同的结构体可以遵循同一个协议\n\n## 在协议中使用方法\n\n当协议定义方法时，它只定义方法名称、参数以及返回的数据类型，但不包含任何实际实现该方法的\
    \ Swift 代码，例如：\n\n```swift\nprotocol Cat {\n    var name: String { get set }\n\
    \    var age: Int { get }\n    func meow (sound: String)\n}\n```\n\n如果某个类、结构体或枚举遵循了此\
    \ `Cat` 协议，它不仅要定义 `name` 和 `age` 属性，还必须使用 Swift 代码实现该协议方法，例如：\n\n```swift\nstruct\
    \ pet : Cat {\n    var name : String\n    var age : Int\n    func meow (sound\
    \ : String) {\n        print (sound)\n    }\n}\n```\n\n尽管类、结构体或枚举可能遵循完全相同的协议，但方法的具体实现可能大相径庭，例如：\n\
    \n```swift\nstruct feral : Cat {\n    var name : String\n    var age : Int\n \
    \   func meow (sound : String) {\n        print (\"听我怒吼\")\n        print (sound.uppercaseString)\n\
    \    }\n}\n```\n\n要了解如何在协议中定义方法并在不同结构体中实现它们，请按照以下步骤操作：\n\n1.  确保 `ProtocolPlayground`\
    \ 文件已加载到 Xcode 中。\n2.  按如下方式编辑 playground 代码：\n\n```swift\nimport Cocoa\n\nprotocol\
    \ Cat {\n    var name: String { get set }\n    var age: Int { get }\n    func\
    \ meow (sound : String)\n}\n\n// 实现 meow 方法的一种方式\nstruct pet : Cat {\n    var\
    \ name : String\n    var age : Int\n    func meow (sound : String) {\n       \
    \ print (sound)\n    }\n}\n\nvar animal = pet(name: \"Taffy\", age: 16)\nprint\
    \ (animal.name)\nprint (animal.age)\nanimal.meow(\"喂我\")\n\n// 实现相同 meow 方法的第二种方式\n\
    struct feral : Cat {\n    var name : String\n    var age : Int\n    func meow\
    \ (sound : String) {\n        print (\"听我怒吼\")\n        print (sound.uppercaseString)\n\
    \    }\n}\n\nvar pest = feral(name: \"Stinky\", age: 2)\nprint (pest.name)\nprint(pest.age)\n\
    pest.meow(\"咆哮\")\n```\n\n图 20-2 展示了同一协议方法两种不同实现的工作方式。\n\n![A978-1-4842-1233-2_20_Fig2_HTML.jpg](img/A978-1-4842-1233-2_20_Fig2_HTML.jpg)\n\
    \n**图 20-2.** 即使遵循同一协议，方法实现也可以不同\n\n## 遵循多个协议\n\n协议相对于面向对象编程的一大优势是，单个类、结构体或枚举可以遵循一个或多个协议。为此，只需指定要遵循的每个协议的名称，例如：\n\
    \n```swift\nstruct 结构体名称 : 协议名称 1, 协议名称 2, 协议名称 N {\n```\n\n通过允许你遵循多个协议，Swift\
    \ 使编码更加灵活，因为你可以挑选和选择要使用的协议。要了解如何遵循多个协议，请按照以下步骤操作：\n\n1.  确保 `ProtocolPlayground`\
    \ 文件已加载到 Xcode 中。\n2.  按如下方式编辑 playground 代码：\n\n```swift\nimport Cocoa\n\nprotocol\
    \ Cat {\n    var name: String { get }\n    var age: Int { get }\n}\n\nprotocol\
    \ CatSounds {\n    func meow (sound : String)\n}\n\nstruct pet : Cat, CatSounds\
    \ {\n    var name : String\n    var age : Int\n    func meow (sound : String)\
    \ {\n        print (sound)\n    }\n}\n\nvar animal = pet(name: \"Fluffy\", age:\
    \ 6)\nprint (animal.name)\nprint (animal.age)\nanimal.meow(\"起床！\")\n```\n\n图\
    \ 20-3 展示了此代码如何通过让一个结构体遵循两个协议来工作。请注意，此代码的工作原理与 `name` 和 `age` 属性与 `meow()` 方法定义在同一协议中完全相同。通过将不同的属性和方法分离到多个协议中，你无需实现不需要的属性和/或方法。\n\
    \n![A978-1-4842-1233-2_20_Fig3_HTML.jpg](img/A978-1-4842-1233-2_20_Fig3_HTML.jpg)\n\
    \n**图 20-3.** 一个结构体可以遵循两个或更多协议\n\n由于你可以遵循多个协议，通常最好让每个协议尽可能简短。这样更容易只使用你需要的协议，而无需被迫实现你可能不需要或不想要的额外属性和/或方法。\n"
- fmt: "# Protocol Extensions\n\nIn the world of object-oriented programming, you\
    \ can extend a class through inheritance, which inherits every property and method\
    \ that class may have inherited from other classes. In the world of protocol-oriented\
    \ programming, you can extend a protocol through protocol extensions.\n\nOne purpose\
    \ for protocol extensions is to define default values for properties. You could\
    \ define default values by simply assigning values to one or more properties such\
    \ as:\n\n```\nprotocol Cat {\n    var name: String { get }\n    var age: Int {\
    \ get }\n}\n```\n\nThis code defines a protocol called`Cat`, which defines a`name`and`age`property\
    \ as gettable`{ get }`. Then you can create a structure that adopts the`Cat`protocol\
    \ and assigns an initial value to each property such as:\n\n```\nstruct pet :\
    \ Cat {\n    var name : String = \"Frank\"\n    var age : Int = 2\n}\n```\n\n\
    Now if you declare a variable based on this structure, the variable contains those\
    \ initial values. Despite having an initial value, you can always store new data\
    \ in those properties. To see how to define initial values for protocol properties\
    \ without using extensions, follow these steps:\n\nMake sure the`ProtocolPlayground`file\
    \ is loaded in Xcode. Edit the playground code as follows:\n\n```\nimport Cocoa\n\
    \nprotocol Cat {\n    var name: String { get }\n    var age: Int { get }\n}\n\n\
    struct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int = 2\n\
    }\n\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\nanimal.name\
    \ = \"Joey\"\nanimal.age = 13\n\nprint (animal.name)\nprint (animal.age)\n```\n\
    \nWhen you first create the`animal`variable based on the`pet`structure, the initial`name`property\
    \ value is “Frank” and the initial`age`property value is 2. At any time, you can\
    \ store a new value in both properties as shown in Figure [20-4](#A978-1-4842-1233-2_20_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1233-2_20_Fig4_HTML.jpg](A978-1-4842-1233-2_20_Fig4_HTML.jpg)\n\
    \n**Figure 20-4.** You can assign initial values to gettable properties defined\
    \ by a protocol\n\nIf you want to set (and keep) an initial value for a property,\
    \ that’s when you can use protocol extensions. Protocol extensions can only work\
    \ for gettable`{ get }`properties. A protocol extension just uses the`extension`keyword\
    \ followed by the name of the protocol you want to extend such as:\n\n```\nextension\
    \ Cat {\n    // Set one or more default values for gettable properties here\n\
    }\n```\n\nInside the extension you can compute a default value for one or more\
    \ gettable properties by using the`return`keyword such as:\n\n```\nextension Cat\
    \ {\n    var name : String { return \"Frank\" }\n}\n```\n\nNot only does the protocol\
    \ extension define the`name`property to hold the string “Frank,” but it also eliminates\
    \ the need to define the`name`property within a class, structure, or enum such\
    \ as:\n\n```\nextension Cat {\n    var name : String { return \"Frank\" }\n}\n\
    \nstruct pet : Cat {\n    var age : Int = 2\n}\n```\n\nThe above protocol extension\
    \ and structure is essentially equivalent to this:\n\n```\nstruct pet : Cat {\n\
    \    var name : String = \"Frank\"\n    var age : Int = 2\n}\n```\n\nThe main\
    \ difference is that when the`name`property is declared inside the structure,\
    \ you can assign new strings to the`name`property later. When the`name`property\
    \ is declared and set to a value inside a protocol extension, you cannot assign\
    \ a new string to the`name`property later. To see how protocol extensions define\
    \ a default value, follow these steps:\n\nMake sure the`ProtocolPlayground`file\
    \ is loaded in Xcode. Edit the playground code as follows:\n\n```\nimport Cocoa\n\
    \nprotocol Cat {\n    var name: String { get }\n    var age: Int { get }\n}\n\n\
    extension Cat {\n    var name : String { return \"Frank\" }\n}\n\nstruct pet :\
    \ Cat {\n    //var name : String = \"Frank\"\n    var age : Int = 2\n}\n\nvar\
    \ animal = pet()\nprint (animal.name)\nprint (animal.age)\n\n//animal.name = \"\
    Joey\"\nanimal.age = 13\n\nprint (animal.name)\nprint (animal.age)\n```\n\nIn\
    \ the above code, the two commented lines show you what the protocol extension\
    \ eliminates. Once you define the`name`property inside the protocol extension,\
    \ you no longer need to declare that`name`property inside the`pet`structure. You\
    \ also can’t assign a new string (such as “Joey”) to the`name`property after it’s\
    \ been assigned a default value in the protocol extension. Figure [20-5](#A978-1-4842-1233-2_20_Chapter.html#Fig5)\
    \ shows the results of the above code.\n\n![A978-1-4842-1233-2_20_Fig5_HTML.jpg](A978-1-4842-1233-2_20_Fig5_HTML.jpg)\n\
    \n**Figure 20-5.** Defining a default value with a protocol extension\n\nOne problem\
    \ with defining a default value in a protocol extension is that anything that\
    \ adopts that protocol is forced to also adopt that protocol’s extension. That\
    \ means everything based on that protocol and extension will have the same default\
    \ value that can’t be changed.\n\nIn case you want the flexibility of defining\
    \ default values, but only for certain classes, structures, or enums, you can\
    \ create a protocol extension that only applies to any class, structure, or enum\
    \ that also adopts a second protocol:\n\n```\nextension protocol2Extend where\
    \ Self: protocol2Use {\n    // Set one or more default values for gettable properties\
    \ here\n}\n```\n\nThe above Swift code extends a protocol defined by “protocol2Extend.”\
    \ However the “where Self:” keywords identify a second protocol defined by “protocol2Use.”\n\
    \nThat means if a class, structure, or enum adopts the protocol defined by “protocol2Extend,”\
    \ then the extension only sets a default value if the class, structure, or enum\
    \ also adopts the second protocol defined by “protocol2Use.”\n\nSuppose you created\
    \ the following protocol extension:\n\n```\nextension Cat where Self: CatType\
    \ {\n    var name : String { return \"Frank\" }\n}\n```\n\nThis would define a\
    \ default value of “Frank” to the`name`property to any class, structure, or enum\
    \ that adopts the`Cat`protocol and the`CatType`protocol. If a class, structure,\
    \ or enum only adopts the`Cat`protocol, its`name`property won’t be assigned a\
    \ default value of “Frank.”\n\nTo see how this version of a protocol extension\
    \ only works when a class, structure, or enum adopts a specific protocol, follow\
    \ these steps:\n\nMake sure the`ProtocolPlayground`file is loaded in Xcode. Edit\
    \ the playground code as follows:\n\n```\nimport Cocoa\n\nprotocol Cat {\n   \
    \ var name: String { get }\n    var age: Int { get }\n}\n\nprotocol CatType {\n\
    \    var species: String { get }\n}\n\nextension Cat where Self: CatType {\n \
    \   var name : String { return \"Frank\" }\n}\n\nstruct pet : Cat {\n    var name\
    \ : String = \"Max\"\n    var age : Int = 2\n}\n\nvar animal = pet()\nprint (animal.name)\n\
    print (animal.age)\n\nanimal.name = \"Joey\"\nanimal.age = 13\n\nprint (animal.name)\n\
    print (animal.age)\n\n// New structure that adopts two protocols\nstruct wild\
    \ : Cat, CatType {\n    var age : Int = 2\n    var species : String = \"Lion\"\
    \n}\n\nvar beast = wild()\nprint (beast.name)\nprint (beast.age)\nprint (beast.species)\n\
    ```\n\nNotice that`pet`structure adopts the`Cat`protocol but since it doesn’t\
    \ adopt the`CatType`protocol as well, you can assign an initial value of “Max”\
    \ to its`name`property, and you can later assign “Joey” to that same`name`property.\n\
    \nHowever the`wild`structure adopts both the`Cat`and`CatType`protocols, so it\
    \ also adopts the protocol extension, which assigns “Frank” as a default value\
    \ to the`wild`structure’s`name`property as shown in Figure [20-6](#A978-1-4842-1233-2_20_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1233-2_20_Fig6_HTML.jpg](A978-1-4842-1233-2_20_Fig6_HTML.jpg)\n\
    \n**Figure 20-6.** Protocol extensions can selectively assign default values to\
    \ a structure that adopts a specific protocol"
