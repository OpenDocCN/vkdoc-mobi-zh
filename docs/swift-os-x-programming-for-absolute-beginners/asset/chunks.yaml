    *   Constants


    The idea behind both variables and constants is that you define a descriptive
    name and assign it to hold data such as:


    `str = "This is the Swift interpreter"`


    In the above example, “str” is the descriptive name, and “This is the Swift interpreter”
    is the data that gets stored. Data can either be a text string or a number such
    as an integer (3, 12, -9, etc.) or a decimal also known as a floating-point number
    (12.84, -0.83, 8.02, etc.). At any given time, you can store one chunk of data
    in a descriptive name, which can be defined as a variable or a constant.


    The main difference between a variable and a constant is that you can reuse a
    variable by storing new data as many times as you want (hence the name “variable”).
    A constant only lets you store data in it once.


    To define a variable, you have to use the “var” keyword like this:


    `var str = "This is the Swift interpreter"`


    To define a constant, you have to use the “let” keyword like this:


    `let str = "This is the Swift interpreter"`


    The first time you store data in a variable or a constant, Swift infers the data
    type such as:


    *   Text strings (defined as String)

    *   Integers (defined as Int)

    *   Decimal numbers (defined by Float and Double)


    Knowing the data type a variable or constant can hold is crucial because it can
    only hold one type of data and nothing else. So if you create a variable and store
    a string in it, that variable can only store strings from now on.


    Note


    Swift is known as a type-safe programming language because it explicitly defines
    the type of data each variable or constant can store.


    To make it clear what type of data a variable or constant can hold, you can explicitly
    define the data type such as:


    `var cat: String`


    `var dog: Int`


    `var fish: Float`


    `var snake: Double`


    Based on these data type declarations, the “cat” variable can only store strings,
    the “dog” variable can only store integers, the “fish” variable can only hold
    floating-point numbers, and the “snake” variable can only hold double-precision
    floating-point numbers.


    If you try to store the wrong type of data in a variable or constant, Swift won’t
    let you. This is to prevent problems when a program tries to use the wrong type
    of data. For example, if a program asks the user for how many items to order and
    the user types in “five” instead of the number 5, the program would have no idea
    how to do a mathematical calculation on “five,” which would cause the program
    to either crash or work erratically.


    Note


    Both a Float and a Double data type can hold decimal numbers. The difference is
    that a Double data type can hold more precise decimal numbers that contain additional
    decimal places along with smaller and larger values. If you just need to use decimal
    numbers, use Float since it takes less memory than Double. If you need precise
    accuracy with decimal numbers, use Double. When Swift infers a decimal number,
    it infers a Double data type.


    Swift gives you three ways to define a variable or a constant:


    *   `let cat = "Oscar" // Infers String data type`

    *   `let cat: String = "Oscar"`

    *   `let cat: String` `cat = "Oscar"`


    The first method lets you store data directly into a variable or constant. Based
    on the type of data you first store, Swift infers the data type as String, Int,
    or Double (not a Float because a Float stores less precise decimal numbers than
    Double and Swift assumes you want exact precision).'
