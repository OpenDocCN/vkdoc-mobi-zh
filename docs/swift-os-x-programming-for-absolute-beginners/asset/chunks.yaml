  trans: '

    ### 管理断点


    在程序中可以设置任意数量的断点，因此请根据需要随意放置，以帮助追踪错误。当然，如果在程序中设置了断点，你可能会忘记已经设置了多少个断点以及它们的位置。为了帮助你管理断点，Xcode
    提供了断点导航器。


    你可以通过以下三种方式之一打开断点导航器：


    - 选择 `View ➤ Navigators ➤ Show Breakpoint Navigator`

    - 按下 `Command+7`

    - 在导航器窗格中点击 `Show Breakpoint Navigator` 图标


    断点导航器会列出你在程序中设置的所有断点，标识断点所在的文件以及每个断点的行号，如图 23-8 所示。


    ![A978-1-4842-1233-2_23_Fig8_HTML.jpg](img/A978-1-4842-1233-2_23_Fig8_HTML.jpg)


    图 23-8. 断点导航器标识了所有断点


    由于断点导航器通过行号来标识断点，你可能希望 Xcode 编辑器中显示行号（见图 23-8）。要开启行号显示，请按照以下步骤操作：


    1. 选择 `Xcode ➤ Preferences`。Xcode 偏好设置窗口出现。

    2. 点击 `Text Editing` 图标。文本编辑选项出现。

    3. 勾选 `Line numbers` 复选框，如图 23-9 所示。


    ![A978-1-4842-1233-2_23_Fig9_HTML.jpg](img/A978-1-4842-1233-2_23_Fig9_HTML.jpg)


    图 23-9. `Line numbers` 复选框用于在 Xcode 编辑器中显示或隐藏行号


    点击 Xcode 偏好设置窗口左上角的关闭按钮（红色按钮）。Xcode 现在会在编辑器的左侧边距中显示行号。


    要了解如何使用断点导航器，请按照以下步骤操作：


    1. 选择 `Disable Breakpoint`。请注意，这样你可以单独停用或禁用断点，而不是通过 `Debug ➤ Deactivate Breakpoints`
    命令一次性全部停用。

    2. 在断点导航器窗格中右键点击任意断点，然后选择 `Delete Breakpoint`。（删除断点的另一种方法是将断点从代码中拖开，然后松开鼠标左键。）

    3. 删除所有断点，直到没有剩余断点。

    4. 确保 Xcode 中已载入 `DebugProgram` 项目。

    5. 在 Xcode 中开启行号显示。

    6. 在项目导航器窗格中点击 `AppDelegate.swift` 文件。

    7. 在你喜欢的位置放置三个断点，可以使用你最擅长的方法，例如在 Xcode 编辑器的左侧边距中点击、按下 `Command+\`，或选择 `Debug ➤
    Breakpoints ➤ Add Breakpoint at Current Line`。（具体位置无关紧要。）

    8. 在项目导航器窗格中点击 `MainMenu.xib` 文件。Xcode 会显示程序的用户界面。

    9. 选择 `View ➤ Navigators ➤ Show Breakpoint Navigator`。断点导航器会显示你的三个断点。

    10. 点击任意断点。Xcode 会显示包含该断点的文件。

    11. 在断点导航器窗格中右键点击任意断点。会弹出一个菜单，如图 23-10 所示。


    ![A978-1-4842-1233-2_23_Fig10_HTML.jpg](img/A978-1-4842-1233-2_23_Fig10_HTML.jpg)


    图 23-10. 断点导航器让你可以查看断点的放置位置


    ### 使用符号断点


    创建断点时，必须将其放在希望程序执行暂时停止的行上。然而，这通常意味着需要猜测问题可能在哪里，然后使用各种逐步命令逐行检查代码。


    为了避免这个问题，Xcode 提供了符号断点。符号断点仅在特定函数或方法运行时才停止程序执行。如果你不希望每次特定函数或方法运行时程序都停止执行，可以告诉
    Xcode 忽略一定次数，例如十次。这意味着该函数或方法可以运行多达十次，然后在第十一次被调用时，符号断点会暂时暂停执行，以便你可以逐行调试代码。


    要创建符号断点，你可以定义以下内容：


    - `Symbol` – 要暂停程序执行的函数或方法名称。

    - `Module` – 包含 `Symbol` 文本字段所定义函数或方法的文件名。

    - `Ignore` – 在暂时暂停程序执行之前，希望函数或方法运行的次数（从 0 或更多次数开始）。


    要了解符号断点的工作原理，请按照以下步骤操作：


    1. 选择 `Product ➤ Stop` 来停止程序运行。

    2. 选择 `View ➤ Navigators ➤ Show Breakpoint Navigator`。断点导航器窗格出现。

    3. 在断点导航器窗格中右键点击 `C2F` 断点，在弹出的菜单中选择 `Delete Breakpoint`。此时断点导航器窗格中应不再显示任何断点。

    4. 点击 `Symbol` 文本字段并输入 `C2F`，这是你要检查的函数或方法的名称。

    5. （可选）如果在 `Symbol` 文本字段中指定的函数或方法名称在其他文件中也有使用，请点击 `Module` 文本字段并输入一个文件名。该文件名会将符号断点限制在指定文件的该函数或方法中。由于
    `C2F` 函数只使用一次，你可以将 `Module` 文本字段留空。

    6. （可选）点击 `Ignore` 文本字段并输入一个数字，以指定在暂停程序执行之前忽略函数或方法被调用的次数。在本例中，将 `Ignore` 文本字段保留为
    `0`。

    7. 点击符号断点弹出窗口之外的任意位置，使其消失。

    8. 选择 `Product ➤ Run`。`C2F` 符号断点会导致程序在 `C2F` 函数中计算结果的第一行代码处暂时暂停执行，如图 23-12 所示。


    ![A978-1-4842-1233-2_23_Fig12_HTML.jpg](img/A978-1-4842-1233-2_23_Fig12_HTML.jpg)


    图 23-12. 符号断点暂停了 `Symbol` 文本字段定义的 `C2F` 函数的执行


    9. 确保 Xcode 中已载入 `DebugProgram` 项目。

    10. 选择 `Debug ➤ Breakpoints ➤ Create Symbolic Breakpoint`。符号断点弹出窗口出现，如图 23-11
    所示。


    ![A978-1-4842-1233-2_23_Fig11_HTML.jpg](img/A978-1-4842-1233-2_23_Fig11_HTML.jpg)


    图 23-11. 符号断点弹出窗口允许你定义断点


    > **注意**：另一种不指定具体代码行来设置断点的方法是创建异常断点。通常，如果程序崩溃，Xcode 会显示一堆晦涩难懂的错误信息，你根本不知道是什么原因导致的。如果设置了异常断点，Xcode
    就能识别导致崩溃的代码行，从而便于修复。

    '
- fmt: '### Using Conditional Breakpoints


    Breakpoints normally stop program execution at a specific line every time. However,
    you may want to stop program execution on a particular line only if a certain
    condition holds true, such as if a variable exceeds a certain value, which can
    signal when something has gone wrong.


    To see how a Conditional breakpoint works, follow these steps:


    1. Click in the Condition text field and type `C2F(temp) > 200` and press Return.

    2. Choose Product ➤ Run. Xcode highlights your breakpoint to temporarily stop
    program execution, which means that the condition (`C2F(temp) > 200`) must be
    true.

    3. Choose Product ➤ Stop to halt and exit out of your program and return back
    to Xcode.

    4. Choose View ➤ Navigators ➤ Show Breakpoint Navigator, right-click on the breakpoint
    you created, and choose Edit Breakpoint. The pop-up window appears.

    5. Click in the Condition text field and edit the text so it reads `C2F(temp >
    500)`. Press Return.

    6. Choose Product ➤ Run. Notice that this time your breakpoint does not stop program
    execution because its condition (`C2F(temp) > 500`) is not true. Because the breakpoint
    didn’t stop your program, your program’s blank user interface appears.

    7. Choose DebugProgram ➤ Quit DebugProgram.

    8. Drag the breakpoint away from the left margin and release the left mouse button
    to delete the breakpoint. (You can also right-click on the breakpoint in the Breakpoint
    Navigator pane and choose Delete Breakpoint.)

    9. Make sure the DebugProgram project is loaded in Xcode.

    10. Click on the `AppDelegate.swift` file in the Project Navigator pane.

    11. Place a breakpoint on the following line by clicking in the left margin or
    moving the cursor in the line and pressing Command+\ or choosing Debug ➤ Breakpoints
    ➤ Add Breakpoint at Current Line: `print (myMessage + "\(C2F(temp))")`

    12. Choose View ➤ Navigators ➤ Show Breakpoint Navigator. The Breakpoint Navigator
    pane appears, showing the breakpoint you just created.

    13. Right-click on the breakpoint in the Breakpoint Navigator pane and choose
    Edit Breakpoint. A pop-up window appears as shown in Figure [23-13](#A978-1-4842-1233-2_23_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_23_Fig13_HTML.jpg](A978-1-4842-1233-2_23_Fig13_HTML.jpg)


    **Figure 23-13.** The Symbolic breakpoint halts program execution in the `C2F`
    function defined by the Symbol text field


    ### Troubleshooting Breakpoints in Xcode


    Bugs occur in every program from operating systems and games to spreadsheets and
    word processors. Keep in mind that because Xcode is a program, it also has bugs
    in it, which can sometimes frustrate you until Apple updates and fixes these bugs
    in another version of Xcode.


    One common problem with using breakpoints in Xcode is that they may not always
    work. A breakpoint is supposed to stop program execution, but if Xcode seems to
    be ignoring your breakpoints, there may be several reasons why this is occurring
    that doesn’t involve possible bugs in Xcode.


    First, make sure you didn’t accidentally deactivate all your breakpoints by pressing
    Command+Y or choosing Debug ➤ Deactivate Breakpoints.


    Second, Xcode can compile your program with or without debugging information.
    Usually you want debugging information turned on so you can debug your program.
    However, when your program is ready to ship, you want to strip debugging information
    out to make your program take up less memory and storage space. If you accidentally
    turn off debugging information, then Xcode will ignore any breakpoints you may
    have set.


    To make sure debugging information is turned on, follow these steps:


    1. Choose Product ➤ Scheme ➤ Edit Scheme. A window sheet appears.

    2. Click on Run in the left pane as shown in Figure [23-14](#A978-1-4842-1233-2_23_Chapter.html#Fig14).

    3. Make sure the Debug executable check box is selected.

    4. Make sure the Build Configuration pop-up menu shows Debug (and not Release).

    5. Click the Close button.


    ![A978-1-4842-1233-2_23_Fig14_HTML.jpg](A978-1-4842-1233-2_23_Fig14_HTML.jpg)


    **Figure 23-14.** Turning on debugging information


    ### Summary


    Errors or bugs are unavoidable in any program. While syntax errors are easy to
    find and fix, logic errors can be tougher to find because you thought your code
    would create one type of result but it winds up creating a different result. Now
    you’re left trying to figure out what you did wrong when you thought you were
    doing everything right. Even harder errors to track down are runtime errors that
    occur seemingly at random because of unknown conditions that affect a program.


    To help you track down and eliminate most bugs, you can use the `print` command
    along with comments, but for most robust debugging, you should use Xcode’s built-in
    debugger. With the debugger you can set breakpoints in your code and watch how
    values get stored in one or more variables.


    A conditional breakpoint only stops program execution when a certain condition
    occurs. A symbolic breakpoint only stops program execution when a specific function
    or method gets called. Once a breakpoint stops a program, you can continue examining
    your code line by line using various step commands. The Step Into command lets
    you view code stored inside a function or method while the Step Out command lets
    you prematurely exit out of a function or method and jump back to the function
    or method call.


    By using breakpoints and step commands, you can exhaustively examine how your
    program works, line by line, to eliminate as many errors as possible. The fewer
    errors your program contains, the happier your users will be.'
