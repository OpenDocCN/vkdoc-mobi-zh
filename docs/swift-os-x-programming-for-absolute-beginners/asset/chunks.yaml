    - 将鼠标移到 **Add** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开鼠标和
    **Control** 键。会弹出一个窗口。点击 **Connection** 弹出菜单，选择 **Action**。点击 **Name** 文本字段，输入
    `addButton`。点击 **Type** 弹出菜单，选择 `NSButton`。然后点击 **Connect** 按钮。


    - 将鼠标移到 **Delete** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开鼠标和
    **Control** 键。会弹出一个窗口。点击 **Connection** 弹出菜单，选择 **Action**。点击 **Name** 文本字段，输入
    `deleteButton`。点击 **Type** 弹出菜单，选择 `NSButton`。然后点击 **Connect** 按钮。


    - 将鼠标移到 **Query** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开鼠标和
    **Control** 键。会弹出一个窗口。点击 **Connection** 弹出菜单，选择 **Action**。点击 **Name** 文本字段，输入
    `queryButton`。点击 **Type** 弹出菜单，选择 `NSButton`。然后点击 **Connect** 按钮。


    `AppDelegate.swift` 文件的底部应该看起来像这样：


    ```

    @IBAction func addButton(sender: NSButton) {

    }

    @IBAction func deleteButton(sender: NSButton) {

