    3.  点击歹徒射击按钮。\n4.  重复步骤 2 和 3，交替点击警长射击和歹徒射击按钮，直到任一角色的生命值降到 0 或更低。此时将出现一个警告对话框，如图\
    \ 11-11 所示。\n\n![A978-1-4842-1233-2_11_Fig11_HTML.jpg](img/A978-1-4842-1233-2_11_Fig11_HTML.jpg)\n\
    \n**图 11-11.** 当任一角色的生命值降到 0 或更低时，会出现一个警告对话框\n\n5.  点击确定以关闭警告对话框。\n6.  选择 ObjectProgram\
    \ ➤ Quit ObjectProgram。\n\n## 总结\n\nSwift 编程完全依赖于对象和面向对象编程的原则。要创建一个对象，你首先必须定义一个类。一个类通常由一个或多个变量（称为属性）以及一个或多个函数（称为方法）组成。一旦定义了类，你就可以创建代表该类的对象。\n\
    \n类中的属性始终需要初始化。你可以在定义属性的同时为每个属性定义初始值，也可以创建一个特殊的初始化方法，让你能够接收数据来为对象定义初始值。\n\n属性可以用固定值初始化，也可以根据另一个属性的值计算得出。一个属性的值可以改变另一个不同属性的值。\n\
    \n你可以从一个类中创建任意多个对象。通常，最好将类定义存储在单独的文件中，以保持代码的组织性。面向对象的程序通过对象向其他对象的属性发送数据，或调用存储在其他对象中的方法来工作。通过协同工作且保持独立，对象使得比以前更快地创建可靠且复杂的程序变得更容易。\n"
- fmt: "# 12\\. Inheritance, Polymorphism, and Extending Classes\n\nElectronic supplementary\
    \ material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​12](http://dx.doi.org/10.1007/978-1-4842-1233-2_12))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In [Chapter 11](#A978-1-4842-1233-2_11_Chapter.html) you learned how objects were\
    \ created from classes and how classes define properties and methods. To protect\
    \ its data and methods from other parts of a program, an object isolates or encapsulates\
    \ its code. Encapsulation is one prime advantage of object-oriented programming\
    \ because it creates self-contained code that you can easily modify or replace\
    \ without affecting any other part of a program.\n\nBy keeping code as independent\
    \ as possible from other parts of a program, objects increase reliability. Think\
    \ of a house built out of playing cards. Remove one card and the whole thing collapses,\
    \ which is the way most software worked before object-oriented programming.\n\n\
    Objects are like playing cards that you can remove and replace without affecting\
    \ any other card. Besides encapsulation, object-oriented programming also includes\
    \ two additional features called inheritance and polymorphism.\n\nThe idea behind\
    \ inheritance is to reuse existing code without physically making another copy\
    \ of that code. The idea behind polymorphism is that you can replace inherited\
    \ code without modifying the original code. Through both inheritance and polymorphism,\
    \ you can reuse existing code, even without understanding how the original code\
    \ works.\n\nIn fact, each time you create a project in Xcode, look at the top\
    \ of your Swift files and you should see a line that looks like this:\n\n`import\
    \ Cocoa`\n\nThis line tells Xcode to use all the classes that Apple has created\
    \ for you that are stored in the Cocoa framework. In our previous example programs,\
    \ you used the Cocoa framework to manipulate arrays, sets, and dictionaries. Without\
    \ the Cocoa framework, you would have to write Swift code to perform these common\
    \ functions yourself. Not only would this be time consuming, but it would be error\
    \ prone as well since you would have to write code and then test to make sure\
    \ it worked.\n\nBy simply relying on classes in the Cocoa framework, you can add\
    \ functionality to your program without writing much code at all. As you get more\
    \ experienced writing your own classes, you can create useful libraries of your\
    \ own that you can easily plug into other projects to reuse all your hard work.\n\
    \n## Understanding Inheritance\n\nThe main purpose of inheritance is to make reusing\
    \ code easy. In the old days, people reused code by simply making another copy\
    \ of that code. Now what happens if you find an error (bug) in the code? That\
    \ means you’ll need to fix that bug in every copy of your code. Miss one copy\
    \ of the faulty code and your program won’t work.\n\nCreating multiple copies\
    \ of the same code causes two problems. First, it wastes space. Second, it makes\
    \ modifying the code harder with multiple copies of code scattered all over a\
    \ program. Inheritance fixes both problems.\n\nFirst, inheritance never makes\
    \ a copy of code so it never wastes space. Second, since inheritance only keeps\
    \ one copy of code, you just need to modify one copy of code to have your changes\
    \ automatically affect every part of your program that relies on that code.\n\n\
    Instead of physically copying code, inheritance basically creates pointers or\
    \ references to one copy of code. When you create a class, you can simply state\
    \ its name like this:\n\n```\nclass className {\n\n}\n```\n\nTo inherit code from\
    \ another class, name that other class like this:\n\n```\nclass className : superClass\
    \ {\n\n}\n```\n\nThis code defines a class called `className`, which inherits\
    \ code from another class called `superClass`. That means any properties and methods\
    \ defined in `superClass` automatically work in `className` as well, even though\
    \ the `className` class is completely empty.\n\nIf you peek at any of the OS X\
    \ sample programs you created in earlier chapters, you may see code that looks\
    \ like this:\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate {\n\n\
    }\n```\n\nThis defines a class called `AppDelegate`, which inherits code from\
    \ another class called `NSObject`. (This code also adds additional code to the\
    \ `AppDelegate` class through another file called `NSApplicationDelegate`, which\
    \ is a file that you’ll learn more about later in this chapter.)\n\nTo see how\
    \ to use inheritance with classes, create a new playground by following these\
    \ steps:\n\nStart Xcode. Choose File ➤ New ➤ Playground. (If you see the Xcode\
    \ welcome screen, you can also click on Get started with a playground.) Xcode\
    \ asks for a playground name and platform. Click in the Name text field and type\
    \ `InheritPlayground`. Click in the Platform pop-up menu and choose OS X. Xcode\
    \ asks where you want to save your playground file. Click on a folder where you\
    \ want to save your playground file and click the Create button. Xcode displays\
    \ the playground file. Edit the code as follows:\n\n```\nimport Cocoa\n\nclass\
    \ firstClass {\n\n    var speed : Int = 0\n    var locationX : Int = 3\n    var\
    \ locationY : Int = 5\n\n    func move (X: Int, Y: Int) {\n        locationX +=\
    \ X\n        locationY += Y\n    }\n}\n\nclass copyCat : firstClass {\n\n}\n\n\
    var kitten = copyCat ()\nkitten.speed = 4\nkitten.move(4, Y: 8)\nprint (kitten.locationX)\n\
    print (kitten.locationY)\n```\n\nThis Swift code defines two classes. First, it\
    \ defines a class (called `firstClass`) that has three properties (`speed`, `locationX`,\
    \ and `locationY`) and one method (`move`). Then it defines a second class (called\
    \ `copyCat`) that’s completely empty, but it inherits all the code from `firstClass`.\n\
    \nTo show that the `copyCat` class inherits code from `firstClass`, the Swift\
    \ code next creates an object called `kitten`, which is based on the `copyCat`\
    \ class. The `kitten` object can store data in a `speed` property and use the\
    \ `move` method to change its `locationX` and `locationY` properties, yet the\
    \ `copyCat` class is completely empty. Figure [12-1](#A978-1-4842-1233-2_12_Chapter.html#Fig1)\
    \ shows the results of running this Swift code in a playground.\n\n![A978-1-4842-1233-2_12_Fig1_HTML.gif](A978-1-4842-1233-2_12_Fig1_HTML.gif)\n\
    \nFigure 12-1. Showing how inheritance works\n\nNote\n\nSome programming languages,\
    \ such as C++, allow one class to inherit from two or more classes, which is known\
    \ as multiple inheritance. However in Swift, a class can only inherit from only\
    \ one other class, which is known as single inheritance."
