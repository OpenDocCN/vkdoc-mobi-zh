    \n在令牌字段中点击，输入 `Yahoo`，然后按回车键。注意，令牌字段会将你输入的文本以令牌形式显示。在令牌字段中点击，并在 Yahoo 令牌旁边输入 `Google`，然后按回车键。点击令牌字段下方的推送按钮。注意，右侧的标签会显示你的两个令牌文本。\n\
    \n在安全文本字段中点击，输入 `password`。注意，安全文本字段会遮罩该文本。点击安全文本字段下方的推送按钮。注意，右侧的标签会显示安全文本字段中的文本，如图\
    \ 17-8 所示。\n\n![A978-1-4842-1233-2_17_Fig8_HTML.jpg](img/A978-1-4842-1233-2_17_Fig8_HTML.jpg)\n\
    \n**图 17-8.** 文本程序的运行结果\n\n尽管搜索字段、令牌字段和安全文本字段外观不同，但在需要访问其中存储的值时，它们的行为与文本字段完全一致。\n\
    \n## 使用组合框\n\n文本字段允许用户输入任何内容，而弹出按钮则显示固定的选项范围。当你希望显示固定的选项范围并允许用户输入文本时，就可以使用组合框。\n\
    \n组合框基于 `NSComboBox` 类，而该类又基于定义所有文本字段的 `NSTextField` 类。因此，你可以使用 `intValue`、`floatValue`、`doubleValue`\
    \ 或 `stringValue` 属性从组合框中检索值。\n\n使用组合框时，有两种方式填充其弹出选项列表。首先，你可以使用“显示属性检查器”面板创建一个内部列表。其次，你可以使用外部数据源，使组合框从数据库文件或通过互联网检索数据。\n"
- fmt: "### Creating an Internal List\n\nAn internal list is best when you know ahead\
    \ of time exactly how many and which items you want to store in a combo box, such\
    \ as a list of countries or product names. To create an internal list, follow\
    \ these steps:\n\nPlace a combo box on your program’s user interface. Click to\
    \ select that combo box. Choose `View ➤ Utilities ➤ Show Attributes Inspector`.\
    \ The Items list appears as shown in Figure [17-9](#A978-1-4842-1233-2_17_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1233-2_17_Fig9_HTML.jpg](A978-1-4842-1233-2_17_Fig9_HTML.jpg)\n\
    \nFigure 17-9. The Items list lets you define items to appear in a combo box\n\
    \nTo edit an existing item in the list, click on that item to select it and press\
    \ `Return`. Now you can edit the text.\n\nTo remove an existing item, click on\
    \ that item to select it and click the minus sign icon.\n\nTo add a new item,\
    \ click on the plus sign icon. Then click on the newly added item, press `Return`,\
    \ and edit the text.\n\nThe `Visible Items` text field defines how many items\
    \ the combo box menu displays.\n\nThe `Autocompletes` check box lets the combo\
    \ box display items in its list that match what the user started to type in. So\
    \ if the user types one letter, autocomplete displays a list of all items in the\
    \ combo box list that begins with the same letter the user typed.\n\nThe `Uses\
    \ Data Source` check box determines if the combo box uses its internal `Items`\
    \ list to display menu items, or retrieves data from another source. If the `Uses\
    \ Data Source` check box is selected, then you’ll need to write Swift code to\
    \ fill a combo box with data.\n\nTo see how to fill a combo box using an internal\
    \ list, follow these steps:\n\nChoose `View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor`. Xcode shows the `AppDelegate.swift` file next to the user interface.\
    \ Move the mouse pointer over the Combo Box, hold down the `Control` key, and\
    \ drag the mouse under the `IBOutlet` line in the `AppDelegate.swift` file. Release\
    \ the `Control` key and the mouse. A pop-up window appears. Click in the `Name`\
    \ text field, type `myCombo`, and click the `Connect` button. Move the mouse pointer\
    \ over the Label, hold down the `Control` key, and drag the mouse under the `IBOutlet`\
    \ line in the `AppDelegate.swift` file. Release the `Control` key and the mouse.\
    \ A pop-up window appears. Click in the `Name` text field, type `comboResult`,\
    \ and click the `Connect` button. You should now have these two `IBOutlet`s:\n\
    \nFrom within Xcode choose `File ➤ New ➤ Project`. Click `Application` under the\
    \ OS X category. Click `Cocoa Application` and click the `Next` button. Xcode\
    \ now asks for a product name. Click in the `Product Name` text field and type\
    \ `ComboProgram`. Make sure the `Language` pop-up menu displays Swift and that\
    \ all check boxes are clear and not selected. Click the `Next` button. Xcode asks\
    \ where you want to store the project. Choose a folder to store your project and\
    \ click the `Create` button. Click on the `MainMenu.xib` file in the Project Navigator\
    \ Pane. Click on the `ComboProgram` icon to make the window of the user interface\
    \ appear. Drag a `Combo Box`, `Push Button`, and a Label on to the user interface,\
    \ and widen the label so it looks like Figure [17-10](#A978-1-4842-1233-2_17_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1233-2_17_Fig10_HTML.jpg](A978-1-4842-1233-2_17_Fig10_HTML.jpg)\n\
    \nFigure 17-10. The user interface of the `ComboProgram`\n\n```\n@IBOutlet weak\
    \ var myCombo: NSComboBox!\n@IBOutlet weak var comboResult: NSTextField!\n```\n\
    \nMove the mouse pointer over the Push Button, hold down the `Control` key, and\
    \ drag the mouse just above the last curly bracket at the bottom of the `AppDelegate.swift`\
    \ file. Release the `Control` key and the mouse. A pop-up window appears. Click\
    \ in the `Connection` pop-up menu and choose `Action`. Click in the `Name` text\
    \ field and type `showResult`. Click in the `Type` pop-up menu and choose `NSButton`.\
    \ Then click the `Connect` button. Xcode creates an empty `IBAction` method. Modify\
    \ this `IBAction` method as follows:\n\n```\n@IBAction func showResult(sender:\
    \ NSButton) {\n    comboResult.stringValue = myCombo.stringValue\n}\n```\n\nChoose\
    \ `Product ➤ Run`. Your user interface appears. Click in the combo box and type\
    \ `Hello`. Click the push button. The word `Hello` appears in the label. Click\
    \ the downward-pointing arrow on the right edge of the combo box to display its\
    \ list of items. Since we didn’t modify the default list, the combo box list contains\
    \ three items labeled `Item 1`, `Item 2`, and `Item 3`. Click on `Item 3` and\
    \ then click the push button. The label underneath displays `Item 3`. Choose `ComboProgram\
    \ ➤ Quit ComboProgram`.\n\nThis example used the default item list for the combo\
    \ box. Experiment by adding or modifying this combo box item list and select the\
    \ `Autocompletes` check box to see how these options modify the combo box."
