  trans: '

    # 修改 Xcode 窗口


    由于 Xcode 提供了众多功能，Xcode 窗口有时会显得杂乱。为了简化 Xcode 的外观，你有以下几种选择：


    -   调整 Xcode 窗口的大小，使其更大（或更小）

    -   关闭面板以隐藏 Xcode 的某些部分

    -   打开面板以查看 Xcode 的某些部分


    与所有 Macintosh 窗口一样，调整 Xcode 窗口大小最直接的方式是将鼠标指针移到 Xcode 窗口的边缘或角落，直到鼠标指针变成双向箭头。然后拖动鼠标即可调整窗口大小。


    调整 Xcode 窗口大小的第二种方法是点击 Xcode 窗口左上角的绿色圆点。这会展开 Xcode 窗口以占据全屏，同时隐藏 Xcode 的菜单栏。要退出全屏模式，只需按下键盘上的
    `Esc` 键。


    调整 Xcode 窗口大小的第三种方法是选择 `Window ➤ Zoom`。这会在以下两种状态间切换：将 Xcode 窗口展开至填充屏幕但仍显示 Xcode
    菜单栏，或者将 Xcode 窗口缩小回之前的大小。


    为了减少在任意时刻显示的信息量，Xcode 提供了三个可以隐藏（或打开）的面板，如图 2-5 所示：


    ![A978-1-4842-1233-2_2_Fig5_HTML.jpg](img/A978-1-4842-1233-2_2_Fig5_HTML.jpg)


    图 2-5. Xcode 的导航面板、调试区域和实用工具面板


    -   **导航面板**：显示有关项目的信息

    -   **调试区域**：允许你搜索程序中的错误或缺陷

    -   **实用工具面板**：允许你在用户界面上自定义不同的项目


    导航面板会显示多个图标，让你可以在查看不同类型的信息之间切换。导航面板最常见的用途是通过显示项目导航器来选择要打开的文件。要在隐藏和显示导航面板之间切换，你有三种选择：


    -   选择 `View ➤ Navigators ➤ Show/Hide Navigator`

    -   按下 `Command+0`（数字零）

    -   点击 Xcode 窗口右上角的“显示/隐藏导航面板”图标，如图 2-6 所示


    ![A978-1-4842-1233-2_2_Fig6_HTML.jpg](img/A978-1-4842-1233-2_2_Fig6_HTML.jpg)


    图 2-6. “显示/隐藏导航面板”图标


    当你想要检查程序是否运行正常时，会用到调试区域。在你设计用户界面或编写 Swift 代码时，可能需要隐藏这个调试区域。要在隐藏和显示调试区域之间切换，你有三种选择：


    -   选择 `View ➤ Debug Area ➤ Show/Hide Debug Area`

    -   按下 `Shift+Command+Y`

    -   点击 Xcode 窗口右上角的“显示/隐藏调试区域”图标，如图 2-7 所示


    ![A978-1-4842-1233-2_2_Fig7_HTML.jpg](img/A978-1-4842-1233-2_2_Fig7_HTML.jpg)


    图 2-7. “显示/隐藏调试区域”图标


    实用工具面板会显示多个图标，让你可以在显示不同类型的信息之间切换。实用工具面板最常见的用途是帮助你设计和修改用户界面。要在隐藏和显示实用工具面板之间切换，你有三种选择：


    -   选择 `View ➤ Utilities ➤ Show/Hide Utilities`

    -   按下 `Option+Command+0`（数字零）

    -   点击 Xcode 窗口右上角的“显示/隐藏实用工具”图标，如图 2-8 所示


    ![A978-1-4842-1233-2_2_Fig8_HTML.jpg](img/A978-1-4842-1233-2_2_Fig8_HTML.jpg)


    图 2-8. “显示/隐藏实用工具”图标


    通过有选择地显示或隐藏导航面板、调试区域或实用工具面板，你可以让 Xcode 窗口看起来不那么杂乱，并为你想看到的 Xcode 部分腾出更多空间。要快速打开或隐藏这三个面板，通常最快的方法是点击
    Xcode 窗口右上角的“显示/隐藏导航”、“调试区域”或“实用工具”图标。

    '
- fmt: "# Creating and Managing Files\n\nAny time you need to create a project (that\
    \ represents a brand new program) or a file (to add to an existing project), you\
    \ have three choices:\n\n*   Press `Command+N`\n*   Choose File ➤ New to display\
    \ a submenu as shown in Figure [2-9](#A978-1-4842-1233-2_2_Chapter.html#Fig9)\n\
    \n![A978-1-4842-1233-2_2_Fig9_HTML.jpg](A978-1-4842-1233-2_2_Fig9_HTML.jpg)\n\n\
    Figure 2-9. The File ➤ New command displays a submenu that lets you choose to\
    \ create a File or a Project\n\n*   Right-click on any file displayed in the Navigator\
    \ pane to display a pop-up menu as shown in Figure [2-10](#A978-1-4842-1233-2_2_Chapter.html#Fig10)\n\
    \n![A978-1-4842-1233-2_2_Fig10_HTML.jpg](A978-1-4842-1233-2_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10. Right-clicking on a file in the Navigator pane displays a pop-up\
    \ menu that lets you choose to create a File or a Project\n\n> **Note**  \n> Right-clicking\
    \ may be disabled on some Macintosh computers. You can simulate a right-click\
    \ by holding down the `Control` key while clicking. To turn on right-clicking,\
    \ click the Apple menu, choose System Preferences, and click on the Mouse or Trackpad\
    \ icon. Then select the “Secondary click” check box to turn on right-clicking.\n\
    \nWhen you create a new file, you can choose whether to create a file for an OS\
    \ X or iOS project. For the purposes of this book, you’ll always create files\
    \ for OS X.\n\nBesides choosing to create a file for OS X, you’ll also need to\
    \ choose what type of file to create. The two most common types of files you’ll\
    \ create will be either files that can hold Swift code (organized under the Source\
    \ category as shown in Figure [2-11](#A978-1-4842-1233-2_2_Chapter.html#Fig11))\
    \ or files that can hold a user interface (organized under the User Interface\
    \ category as shown in Figure [2-12](#A978-1-4842-1233-2_2_Chapter.html#Fig12)).\n\
    \n![A978-1-4842-1233-2_2_Fig12_HTML.jpg](A978-1-4842-1233-2_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12. A second type of file you can create holds part of your program’s\
    \ user interface\n\n![A978-1-4842-1233-2_2_Fig11_HTML.jpg](A978-1-4842-1233-2_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11. One type of file you can create holds Swift code\n\nWhen you create\
    \ a file, that file appears in the Project Navigator. The Navigator pane can actually\
    \ display several different types of information, but the most common is the Project\
    \ Navigator, which lists all the files that make up your project. To open the\
    \ Project Navigator within the Navigator pane, you have three choices:\n\n*  \
    \ Choose View ➤ Navigators ➤ Show Project Navigator\n*   Press `Command+1`\n*\
    \   Click on the Show the Project Navigator icon as shown in Figure [2-13](#A978-1-4842-1233-2_2_Chapter.html#Fig13)\n\
    \n![A978-1-4842-1233-2_2_Fig13_HTML.jpg](A978-1-4842-1233-2_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13. The Project Navigator pane lists all the files that make up a project\n\
    \nThe Project Navigator closely resembles the Finder by displaying files and folders.\
    \ To rename a file or folder, just select it and press `Return` to edit its name.\n\
    \nTo move a file or folder, just drag it with the mouse and drop it in a new location.\n\
    \nTo select one or more items, hold down the `Command` key and click on a file\
    \ or folder.\n\nJust like the Finder, the Project Navigator lets you organize\
    \ files into folders. This lets you group related files together and tuck them\
    \ out of sight so they don’t clutter the Project Navigator. To create a folder,\
    \ click on a file or folder in the Project Navigator and then choose one of the\
    \ following:\n\n*   Choose File ➤ New ➤ Group (or Group from Selection to store\
    \ one or more selected files in a folder)\n*   Press `Option+Command+N`\n*   Right-click\
    \ on any file or folder in the Project Navigator, and when a pop-up menu appears,\
    \ choose New Group (or New Group from Selection to store one or more selected\
    \ files in a folder)\n\nTo delete a file or folder, select a file or folder and\
    \ then choose one of the following:\n\n*   Choose Edit ➤ Delete\n*   Press the\
    \ `Delete` key or `Command+Backspace`\n*   Right-click on any file or folder in\
    \ the Project Navigator, and when a pop-up menu appears, choose Delete\n\n> **Note**\
    \  \n> When you delete a file or folder, you’ll have the option of Remove Reference\
    \ (which removes a file/folder from a project but does not physically delete it\
    \ from your Macintosh) or Move to Trash (which removes a file/folder from a project\
    \ and physically deletes it from your Macintosh).\n\nPerhaps the most important\
    \ use for the Project Navigator is to let you edit a file in a project. When you\
    \ click on a file in the Project Navigator, the middle pane of the Xcode window\
    \ displays the contents of your selected file, which will either hold Swift code\
    \ or your user interface as shown in Figure [2-14](#A978-1-4842-1233-2_2_Chapter.html#Fig14).\n\
    \n![A978-1-4842-1233-2_2_Fig14_HTML.jpg](A978-1-4842-1233-2_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14. Selecting a file in the Navigator pane displays the contents of\
    \ that file"
