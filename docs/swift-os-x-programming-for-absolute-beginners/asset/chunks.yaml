  trans: '

    # 摘要


    任何程序的核心在于其接收数据、处理数据并返回有用结果的能力。处理数值数据最简单的方法是通过常见的数学运算符，例如 `+`（加法）、`-`（减法）、`/`（除法）、`*`（乘法）和
    `%`（取余）。处理字符串的常见方法是使用 `+` 运算符进行拼接，该运算符用于将两个字符串组合在一起。


    作为快捷方式，你可以使用递增和递减运算符来对变量加 1 或减 1。如果你需要加或减 1 以外的值，可以使用复合赋值运算符来代替。


    除了这些基本运算符，你还可以通过 Cocoa 框架定义的函数来处理数据。你不必了解这些函数的工作原理；你只需知道它们存在，以便可以在自己的程序中通过调用这些函数名称来使用它们。要查找可用的函数名称，你可能需要在
    Xcode 的文档窗口中搜索。


    虽然 Cocoa 框架中有大量函数可供使用，但你可能也需要创建自己的函数。函数通常接受一个或多个参数，以便计算出不同的结果。


    一个函数可以表示一个单一的值，这意味着你需要定义该函数所表示的数据类型。


    在最简单的层面上，你需要定义具有唯一名称和数据类型的参数。为了使参数更易于理解，你可以创建外部参数名称，这意味着在向函数传递数据时需要指明参数名称。


    通常情况下，当函数接受一个参数时，它会将该参数视为一个值不变常量。但是，函数可以通过使用 `var` 关键字创建变量参数来修改参数。函数对变量参数所做的任何更改都仅限于该函数内部。


    为了获得更大的灵活性，函数还可以创建 `inout` 参数来修改参数的值。当函数修改一个 `inout` 参数时，这些更改会体现在函数外部。


    通过定义自己的函数，你可以创建可重用的实用代码库，这些代码库可以在程序的其他部分甚至其他项目中重复使用。函数让你能够为特定程序创建处理数据的特定方式。


    # 使用分支进行决策


    电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_7](http://dx.doi.org/10.1007/978-1-4842-1233-2_7))
    包含补充材料，仅供授权用户使用。


    程序接收到数据后，需要以某种方式处理这些数据，以返回有用的结果。简单的程序以相同方式处理数据，但更复杂的程序需要就如何处理数据做出决策。


    例如，一个程序可能会要求用户输入密码。如果用户输入了有效密码，则程序允许用户访问。如果用户未输入有效密码，则程序必须显示错误消息并阻止访问。


    当程序分析数据并根据该数据做出决策时，会使用到所谓的布尔值和分支语句。


    布尔值表示 `true` 或 `false` 的值。分支语句为你的程序提供了在两组或多组不同的待执行命令之间进行选择的选项。布尔值与分支语句相结合，使程序能够对不同数据做出响应。


    ## 理解比较运算符


    你可以通过声明 `Bool` 数据类型来创建布尔变量，例如：


    ```

    var flag : Bool

    ```


    `Bool` 表示布尔数据类型。任何定义为 `Bool` 数据类型的变量只能保存两个值之一：`true` 或 `false`，例如：


    ```

    flag = true

    flag = false

    ```


    虽然你可以直接将 `true` 和 `false` 赋值给表示布尔数据类型的变量，但更常见的是使用比较运算符来计算布尔值。一些常见的比较运算符如表 7-1
    所示。


    **表 7-1.** Swift 中的常见比较运算符


    | 比较运算符 | 用途 | 示例 | 布尔值 |

    | --- | --- | --- | --- |

    | `==` | 等于 | `5 == 14` | `false` |

    | `<` | 小于 | `5 < 14` | `true` |

    | `>` | 大于 | `5 > 14` | `false` |

    | `<=` | 小于或等于 | `5 <= 14` | `true` |

    | `>=` | 大于或等于 | `5 >= 14` | `false` |

    | `!=` | 不等于 | `5 != 14` | `true` |


    **注意**


    等于（`==`）比较运算符是唯一也可以比较字符串的比较运算符，例如 `"Joe" == "Fred"`（计算结果为 `false`）或 `"Joe" ==
    "Joe"`（计算结果为 `true`）。


    比较运算符可以比较诸如 `38 == 8` 或 `29.04 > 12` 之类的值。然而，使用实际值与比较运算符总是返回相同的 `true` 或 `false`
    值。比较运算符的通用性在于，当它们将一个固定值与一个变量进行比较，或者比较两个变量时，例如：


    ```

    let myValue = 45

    myValue > 38            // 计算结果为 true


    let yourValue = 39

    myValue < yourValue     // 计算结果为 false

    ```


    当你比较一个或多个变量时，结果会因这些变量的当前值而改变。然而，在使用等于（`==`）比较运算符时，处理小数值时要小心。这是因为 `45.0` 与 `45.0000001`
    不是同一个数字。处理小数值时，最好使用大于或小于比较运算符，而不是等于比较运算符。

