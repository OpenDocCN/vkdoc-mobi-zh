- fmt: "# Simple Debugging Techniques\n\nWhen your program isn’t working, you often\
    \ have no idea what could be wrong. While you could tediously examine your code\
    \ from beginning to end, it’s often faster to simply guess where the mistake might\
    \ be.\n\nOnce you have a rough idea what part of your program might be causing\
    \ the problem, you have two choices. First, you can delete the suspicious code\
    \ and run your program again. If the problem magically goes away, then you’ll\
    \ know that the code you deleted was likely the culprit.\n\nHowever if your program\
    \ still doesn’t work, you have to retype your deleted code back into your program.\
    \ A simpler solution might be to cut and paste code out of Xcode and store it\
    \ in a text editor such as the TextEdit program that comes with every Macintosh,\
    \ but this can be tedious.\n\nThat’s why a second solution is to just temporarily\
    \ hide code that you suspect might be causing a problem. Then if the problem persists,\
    \ you can simply unhide that code and make it visible again. To do this in Xcode,\
    \ you just need to turn your code into comments.\n\nRemember, comments are text\
    \ that Xcode completely ignores. You can create comments in three ways:\n\n- Add\
    \ the `//` symbols at the beginning of each line that you want to convert into\
    \ a comment. This method lets you convert a single line into a comment.\n- Add\
    \ the `/*` symbols at the beginning of code and add the `*/` at the end of code\
    \ you want to convert into a comment. This method lets you convert one or more\
    \ lines into a comment.\n- Select the lines of code you want to turn into a comment\
    \ and choose Editor ➤ Structure ➤ Comment Selection (or press `Command + /`).\
    \ This method lets you convert one or more lines into a comment by placing the\
    \ `//` symbols at the beginning of each line of code you selected.\n\n**Note:**\
    \ Xcode color codes comments in green (or whatever color you may have defined\
    \ to identify comments). After creating a comment, make sure Xcode color codes\
    \ it properly to ensure you have created a comment. If Xcode fails to recognize\
    \ your comments, it will treat your text as a valid Swift command, which will\
    \ likely keep your program from running properly.\n\nBy turning code into comments,\
    \ you essentially hide that code from Xcode. Now if you want to turn that comment\
    \ back into code again, you just remove the `//` or `/*` and `*/` symbols that\
    \ defines your commented out code.\n\nIf you commented out code by choosing Editor\
    \ ➤ Structure ➤ Comment Selection (or pressing `Command + /`), just choose Editor\
    \ ➤ Structure ➤ Uncomment Selection (or press `Command + /` again) to convert\
    \ that commented code back to working code once more.\n\nBesides turning your\
    \ code into comments to temporarily hide it, a second simple debugging technique\
    \ is to use the `print` command. The idea is to put the `print` command in your\
    \ code to print out the values of a variable.\n\nBy doing this, you can see what\
    \ values one or more variables may contain. Putting multiple `print` commands\
    \ throughout your program gives you a chance to make sure your program is running\
    \ correctly.\n\nTo see how using the `print` command along with commenting out\
    \ code can work to help you debug a program, follow these steps:\n\n1. From within\
    \ Xcode choose File ➤ New ➤ Project.\n2. Click Application under the OS X category.\n\
    3. Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4. Click in the Product Name text field and type `DebugProgram`.\n5.\
    \ Make sure the Language pop-up menu displays Swift and that no check boxes are\
    \ selected.\n6. Click the Next button. Xcode asks where you want to store the\
    \ project.\n7. Choose a folder to store your project and click the Create button.\n\
    8. Click the `AppDelegate.swift` file in the Project Navigator. The contents of\
    \ the `AppDelegate.swift` file appears.\n9. Edit the `applicationDidFinishLaunching`\
    \ method as follows:\n\n```\nfunc applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n    var myMessage = \"Temperature in Celsius:\"\n    let\
    \ temp = 100.0\n    print (myMessage + \"\\(temp)\")\n    myMessage = \"Temperature\
    \ in Fahrenheit:\"\n    print (myMessage + \"\\(C2F(temp))\")\n}\n```\n\n10. Directly\
    \ above this function, add the following code:\n\n```\nfunc C2F (tempC : Double)\
    \ -> Double {\n    var tempF : Double\n    tempF = tempC + 32 * 9/5\n    return\
    \ tempF\n}\n```\n\n11. Choose Product ➤ Run. Your program’s user interface appears\
    \ (which is blank).\n12. Choose DebugProgram ➤ Quit DebugProgram. Xcode appears.\
    \ If you look in the bottom of the Xcode window in the Debug Area, you can see\
    \ what your two `print` commands printed, which is “Temperature in Celsius: 100.0”\
    \ and “Temperature in Fahrenheit: 157.6” as shown in Figure 23-3.\n\n![A978-1-4842-1233-2_23_Fig3_HTML.jpg](A978-1-4842-1233-2_23_Fig3_HTML.jpg)\n\
    \n**Figure 23-3.** The `print` command displays text in the Debug Area of the\
    \ Xcode window\n\nTo view or hide the Debug Area, you have three options:\n\n\
    - Click the View/Hide Debug Area icon in the upper right corner of the Xcode window.\n\
    - Choose View ➤ Debug Area ➤ Show/Hide Debug Area.\n- Press `Shift+Command+Y`.\n\
    \nBy peeking in the Debug Area, we can see what the `print` commands have displayed.\
    \ If you know anything about temperatures in Fahrenheit and Celsius, you know\
    \ that the boiling point in Celsius is 100 degrees and the boiling point in Fahrenheit\
    \ is 212 degrees. Yet our temperature conversion program calculates that 100 degrees\
    \ Celsius is equal to 157.6 degrees in Fahrenheit, which means the Fahrenheit\
    \ temperature should be 212 instead of 157.6. Obviously something is wrong, so\
    \ let’s use the `print` command and comments to help debug the problem.\n\n1.\
    \ Make sure the `DebugProgram` project is loaded in Xcode.\n2. Click the `AppDelegate.swift`\
    \ file in the Project Navigator pane.\n3. Edit the `C2F` function by typing the\
    \ `//` symbols to the left of the `*` symbol (multiplication sign) as follows:\n\
    \n```\nfunc C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
    \ = tempC + 32//* 9/5\n    return tempF\n}\n```\n\nThis comment will let us check\
    \ if the `tempC` parameter is properly coming into the `C2F` function and getting\
    \ stored in the `tempF` variable.\n\n4. Add a `print (tempC)` command above the\
    \ return statement as follows:\n\n```\nfunc C2F (tempC : Double) -> Double {\n\
    \    var tempF : Double\n    tempF = tempC + 32 //* 9/5\n    print (tempF)\n \
    \   return tempF\n}\n```\n\n5. Choose Product ➤ Run. The blank user interface\
    \ of your program appears.\n6. Choose DebugProgram ➤ Quit DebugProgram. Xcode\
    \ appears again, displaying the result in the Debug Area, which prints:\n\n```\n\
    Temperature in Celsius: 100.0 132.0 Temperature in Fahrenheit: 132.0\n```\n\n\
    By commenting out the calculation part of the code and using the `print (tempF)`\
    \ command, we can see that the `C2F` function is storing 100.0 correctly in the\
    \ `tempC` variable and adding 32 to this value before storing it in the `tempF`\
    \ variable. Because we commented out the calculation part of the code, we can\
    \ assume that the error must be in our commented out portion of the code."
  raw: '## Simple Debugging Techniques


    When your program isn’t working, you often have no idea what could be wrong. While
    you could tediously examine your code from beginning to end, it’s often faster
    to simply guess where the mistake might be.


    Once you have a rough idea what part of your program might be causing the problem,
    you have two choices. First, you can delete the suspicious code and run your program
    again. If the problem magically goes away, then you’ll know that the code you
    deleted was likely the culprit.


    However if your program still doesn’t work, you have to retype your deleted code
    back into your program. A simpler solution might be to cut and paste code out
    of Xcode and store it in a text editor such as the TextEdit program that comes
    with every Macintosh, but this can be tedious.


    That’s why a second solution is to just temporarily hide code that you suspect
    might be causing a problem. Then if the problem persists, you can simply unhide
    that code and make it visible again. To do this in Xcode, you just need to turn
    your code into comments.


    Remember, comments are text that Xcode completely ignores. You can create comments
    in three ways:


    *   Add the // symbols at the beginning of each line that you want to convert
    into a comment. This method lets you convert a single line into a comment.

    *   Add the /* symbols at the beginning of code and add the */ at the end of code
    you want to convert into a comment. This method lets you convert one or more lines
    into a comment.

    *   Select the lines of code you want to turn into a comment and choose Editor
    ➤ Structure ➤ Comment Selection (or press Command + /). This method lets you convert
    one or more lines into a comment by placing the // symbols at the beginning of
    each line of code you selected.


    Note


    Xcode color codes comments in green (or whatever color you may have defined to
    identify comments). After creating a comment, make sure Xcode color codes it properly
    to ensure you have created a comment. If Xcode fails to recognize your comments,
    it will treat your text as a valid Swift command, which will likely keep your
    program from running properly.


    By turning code into comments, you essentially hide that code from Xcode. Now
    if you want to turn that comment back into code again, you just remove the //
    or /* and */ symbols that defines your commented out code.


    If you commented out code by choosing Editor ➤ Structure ➤ Comment Selection (or
    pressing Command + /), just choose Editor ➤ Structure ➤ Uncomment Selection (or
    press Command + / again) to convert that commented code back to working code once
    more.


    Besides turning your code into comments to temporarily hide it, a second simple
    debugging technique is to use the print command. The idea is to put the print
    command in your code to print out the values of a variable.


    By doing this, you can see what values one or more variables may contain. Putting
    multiple print commands throughout your program gives you a chance to make sure
    your program is running correctly.


    To see how using the print command along with commenting out code can work to
    help you debug a program, follow these steps


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type DebugProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    AppDelegate.swift file in the Project Navigator. The contents of the AppDelegate.swift
    file appears.   Edit the applicationDidFinishLaunching method as follows: `func
    applicationDidFinishLaunching(aNotification: NSNotification) {`     `var myMessage
    = "Temperature in Celsius:"`     `let temp = 100.0`     `print (myMessage + "\(temp)")`
        `myMessage = "Temperature in Fahrenheit:"`     `print (myMessage + "\(C2F(temp))")`
    `}`   Directly above this function, add the following code: `func C2F (tempC :
    Double) -> Double {`     `var tempF : Double`     `tempF = tempC + 32 * 9/5`     `return
    tempF` `}`   Choose Product ➤ Run. Your program’s user interface appears (which
    is blank).   Choose DebugProgram ➤ Quit DebugProgram. Xcode appears. If you look
    in the bottom of the Xcode window in the Debug Area, you can see what your two
    print commands printed, which is “Temperature in Celsius: 100.0” and “Temperature
    in Fahrenheit: 157.6” as shown in Figure [23-3](#A978-1-4842-1233-2_23_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_23_Fig3_HTML.jpg](A978-1-4842-1233-2_23_Fig3_HTML.jpg)


    Figure 23-3.


    The print command displays text in the Debug Area of the Xcode window


    To view or hide the Debug Area, you have three options:


    *   Click the View/Hide Debug Area icon in the upper right corner of the Xcode
    window.

    *   Choose View ➤ Debug Area ➤ Show/Hide Debug Area.

    *   Press Shift+Command+Y.


    By peeking in the Debug Area, we can see what the print commands have displayed.
    If you know anything about temperatures in Fahrenheit and Celsius, you know that
    the boiling point in Celsius is 100 degrees and the boiling point in Fahrenheit
    is 212 degrees. Yet our temperature conversion program calculates that 100 degrees
    Celsius is equal to 157.6 degrees in Fahrenheit, which means the Fahrenheit temperature
    should be 212 instead of 157.6\. Obviously something is wrong, so let’s use the
    print command and comments to help debug the problem.


    Make sure the DebugProgram project is loaded in Xcode.   Click the AppDelegate.swift
    file in the Project Navigator pane.   Edit the C2F function by typing the // symbols
    to the left of the * symbol (multiplication sign) as follows: `func C2F (tempC
    : Double) -> Double {`     `var tempF : Double`     `tempF = tempC + 32``//* 9/5`
        `return tempF` `}`


    This comment will let us check if the tempC parameter is properly coming into
    the C2F function and getting stored in the tempF variable.


    Add a “print (tempC)” command above the return statement as follows: `func C2F
    (tempC : Double) -> Double {`     `var tempF : Double`     `tempF = tempC + 32
    //* 9/5`     `print (tempF)`     `return tempF` `}`   Choose Product ➤ Run. The
    blank user interface of your program appears.   Choose DebugProgram ➤ Quit DebugProgram.
    Xcode appears again, displaying the result in the Debug Area, which prints:


    Temperature in Celsius: 100.0 132.0 Temperature in Fahrenheit: 132.0


    By commenting out the calculation part of the code and using the “print (tempF)”
    command, we can see that the C2F function is storing 100.0 correctly in the tempC
    variable and adding 32 to this value before storing it in the tempF variable.
    Because we commented out the calculation part of the code, we can assume that
    the error must be in our commented out portion of the code.'
  trans: "\n# 简单调试技巧\n\n当程序无法正常运行时，往往毫无头绪。虽然你可以不厌其烦地从头到尾检查代码，但通常更快的办法是直接猜测错误可能出在哪里。\n\
    \n一旦大致判断出程序中可能存在问题的地方，你有两种选择。第一种是删除可疑代码并重新运行程序。如果问题神奇地消失了，那么你就能确定删除的代码很可能是罪魁祸首。\n\
    \n然而，如果程序仍然无法正常工作，你就得把删掉的代码重新输入到程序中。一个更简单的办法是将代码从 Xcode 剪切粘贴到文本编辑器（如每台 Mac 都自带的\
    \ TextEdit 程序）中，但这个操作也可能很繁琐。\n\n因此第二种办法是临时隐藏怀疑有问题的代码。这样，如果问题依旧存在，你只需取消隐藏即可让代码重新可见。在\
    \ Xcode 中要实现这点，只需将代码变成注释。\n\n记住，注释是 Xcode 完全忽略的文本。有三种创建注释的方式：\n\n- 在要转为注释的每一行开头添加`//`符号。此方法可以将单行代码转为注释。\n\
    - 在要转为注释的代码开头添加`/*`符号，在结尾添加`*/`符号。此方法可以将一行或多行代码转为注释。\n- 选中要转为注释的代码行，然后选择“编辑器”➤“结构”➤“注释选中的内容”（或按\
    \ `Command + /`）。此方法通过在选中的每行代码开头放置`//`符号，将一行或多行代码转为注释。\n\n**注意：** Xcode 会用绿色（或你定义的任何注释标识颜色）为注释着色。创建注释后，请确保\
    \ Xcode 正确着色，以确认注释已创建。如果 Xcode 未能识别你的注释，它会将你的文本当作有效的 Swift 命令处理，这很可能导致程序无法正常运行。\n\
    \n通过将代码变为注释，你实际上将这些代码隐藏了起来，不让 Xcode 看到。如果你想把注释重新变回代码，只需移除定义注释的`//`或`/*`和`*/`符号。\n\
    \n如果你是通过选择“编辑器”➤“结构”➤“注释选中的内容”（或按 `Command + /`）来注释代码的，那么只需再次选择“编辑器”➤“结构”➤“取消注释选中的内容”（或再按一次\
    \ `Command + /`），就能将注释代码重新转换为可运行的代码。\n\n除了将代码变为注释以临时隐藏外，第二个简单的调试技巧是使用`print`命令。这个思路是在代码中放入`print`命令，来打印出某个变量的值。\n\
    \n通过这么做，你可以看到一个或多个变量可能包含什么值。在程序中放置多个`print`命令，能让你有机会确保程序运行正确。\n\n要了解如何结合使用`print`命令和注释代码来调试程序，请遵循以下步骤：\n\
    \n1. 在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2. 在 OS X 类别下点击“应用程序”。\n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
    \ 会要求输入产品名称。\n4. 点击“产品名称”文本字段，输入`DebugProgram`。\n5. 确保“语言”弹出菜单显示为 Swift，并且没有勾选任何复选框。\n\
    6. 点击“下一步”按钮。Xcode 会询问你想要存储项目的位置。\n7. 选择一个文件夹来存储项目，然后点击“创建”按钮。\n8. 在项目导航器中点击`AppDelegate.swift`文件。`AppDelegate.swift`文件的内容会显示出来。\n\
    9. 按如下方式编辑`applicationDidFinishLaunching`方法：\n\n```\nfunc applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n    var myMessage = \"Temperature in Celsius:\"\n    let\
    \ temp = 100.0\n    print (myMessage + \"\\(temp)\")\n    myMessage = \"Temperature\
    \ in Fahrenheit:\"\n    print (myMessage + \"\\(C2F(temp))\")\n}\n```\n\n10. 直接在此函数上方，添加以下代码：\n\
    \n```\nfunc C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
    \ = tempC + 32 * 9/5\n    return tempF\n}\n```\n\n11. 选择“产品”➤“运行”。程序用户界面（空白界面）出现。\n\
    12. 选择“DebugProgram”➤“退出 DebugProgram”。Xcode 界面出现。如果你查看 Xcode 窗口底部调试区的内容，可以看到两个`print`命令打印出的内容，即“Temperature\
    \ in Celsius: 100.0”和“Temperature in Fahrenheit: 157.6”，如图 23-3 所示。\n\n![A978-1-4842-1233-2_23_Fig3_HTML.jpg](img/A978-1-4842-1233-2_23_Fig3_HTML.jpg)\n\
    \n**图 23-3.** `print`命令在 Xcode 窗口的调试区显示文本\n\n要显示或隐藏调试区，你有三种选择：\n\n- 点击 Xcode 窗口右上角的“显示/隐藏调试区”图标。\n\
    - 选择“视图”➤“调试区”➤“显示/隐藏调试区”。\n- 按 `Shift+Command+Y`。\n\n通过查看调试区，我们可以看到`print`命令显示的内容。如果你对摄氏温标和华氏温标有所了解，就会知道摄氏的沸点是\
    \ 100 度，华氏的沸点是 212 度。然而我们的温度转换程序计算出 100 摄氏度等于 157.6 华氏度，这意味着华氏温度应该是 212 而不是 157.6。显然有问题，下面我们用`print`命令和注释来帮助调试。\n\
    \n1. 确保 Xcode 中加载了`DebugProgram`项目。\n2. 点击项目导航器窗格中的`AppDelegate.swift`文件。\n3.\
    \ 按如下方式编辑`C2F`函数，在`*`符号（乘号）左侧输入`//`符号：\n\n```\nfunc C2F (tempC : Double) -> Double\
    \ {\n    var tempF : Double\n    tempF = tempC + 32//* 9/5\n    return tempF\n\
    }\n```\n\n这个注释可以让我们检查`tempC`参数是否正确传入`C2F`函数并存储在`tempF`变量中。\n\n4. 在 return 语句上方添加`print\
    \ (tempC)`命令，如下所示：\n\n```\nfunc C2F (tempC : Double) -> Double {\n    var tempF\
    \ : Double\n    tempF = tempC + 32 //* 9/5\n    print (tempF)\n    return tempF\n\
    }\n```\n\n5. 选择“产品”➤“运行”。程序的空白用户界面出现。\n6. 选择“DebugProgram”➤“退出 DebugProgram”。Xcode\
    \ 界面再次出现，并在调试区显示结果，打印内容如下：\n\n```\nTemperature in Celsius: 100.0 132.0 Temperature\
    \ in Fahrenheit: 132.0\n```\n\n通过注释掉代码的计算部分并使用`print (tempF)`命令，我们可以看到`C2F`函数正确地将\
    \ 100.0 存储在`tempC`变量中，并在将其存入`tempF`变量之前加上了 32。因为我们注释掉了代码的计算部分，所以可以推断错误一定出在我们注释掉的代码部分。\n"
- fmt: "Although the formula might look correct, the error occurs because of the way\
    \ Swift (and most programming languages) calculate formulas. First, they start\
    \ from left to right. Second, they calculate certain operations such as multiplication\
    \ before addition.\n\nThe error occurs because our conversion formula first multiples\
    \ 32 by 9 (288), and then divides the result (288) by 5 to get 57.6. Finally,\
    \ it adds 57.6 to 100.0 to get the incorrect result of 157.6. What it should really\
    \ be doing is multiplying 9/5 by the temperature in Celsius and then adding 32\
    \ to the result.\n\nModify the `C2F` function as follows:\n\n```\nfunc C2F (tempC\
    \ : Double) -> Double {\n    var tempF : Double\n    tempF = tempC * (9/5) + 32\n\
    \    print (tempF)\n    return tempF\n}\n```\n\nChoose Product ➤ Run. Your program’s\
    \ blank user interface appears. Choose DebugProgram ➤ Quit DebugProgram. Xcode\
    \ appears again. Look in the Debug Area and you’ll see that the program now correctly\
    \ converts 100 degrees Celsius to 212 degrees Fahrenheit.\n\nFor simple debugging,\
    \ turning code temporarily into comments and using the `print` command can work,\
    \ but it’s fairly clumsy to keep adding and removing comment symbols and `print`\
    \ commands. A much better solution is to use breakpoints and variable watching,\
    \ which essentially duplicates using comments and `print` commands.\n\n## Using\
    \ the Xcode Debugger\n\nWhile comments and the `print` command can help you isolate\
    \ problems in your code, they can be clumsy to use. The `print` command can be\
    \ especially tedious since you have to type it into your code and then remember\
    \ to remove it later when you’re ready to ship your program.\n\nAlthough leaving\
    \ one or more `print` commands buried in your program won’t likely hurt your program’s\
    \ performance, it’s poor programming practice to leave code in your program that\
    \ no longer serves any purpose.\n\nAs an alternative to typing the `print` command\
    \ throughout your program, Xcode offers a more convenient alternative using the\
    \ Xcode debugger. The debugger gives you two ways to hunt out and identify bugs\
    \ in your program:\n\n- Breakpoints\n- Variable watching\n\n### Using Breakpoints\n\
    \nBreakpoints let you identify a specific line in your code where you want your\
    \ program to stop. Once your program stops, you can step through your code, line\
    \ by line. As you do so, you can also peek at the contents of one or more variables\
    \ to check if the variables are holding the right values.\n\nFor example, if your\
    \ program converts Celsius to Fahrenheit, but somehow converts 100 degrees Celsius\
    \ into -41259 degrees Fahrenheit, you know your code isn’t working right. By inserting\
    \ breakpoints in your code and examining the values of your variables at each\
    \ breakpoint, you can identify where your code calculates its values. The moment\
    \ you spot the line where it miscalculates a value, you know the exact area of\
    \ your program that you need to fix.\n\nYou can set a breakpoint by doing one\
    \ of the following:\n\n- Clicking to the left of the code where you want to set\
    \ the breakpoint\n- Moving the cursor to a line where you want to set the breakpoint\
    \ and pressing Command + \\\n- Moving the cursor to a line where you want to set\
    \ the breakpoint and choosing Debug ➤ Breakpoints ➤ Add Breakpoint at Current\
    \ Line\n\n### Stepping Through Code\n\nOnce a breakpoint has stopped your program\
    \ from running, you can step through your code line by line using the Step command.\
    \ Xcode offers a variety of different Step commands but the three most common\
    \ are:\n\n- Step Over\n- Step Into\n- Step Out\n\nThe Step Over command examines\
    \ the next line of code, treating function or method calls as a single line of\
    \ code.\n\nThe Step Into command works exactly like the Step Over command until\
    \ it highlights a function or method call. Then it jumps to the first line of\
    \ code in that function or method.\n\nThe Step Out command is used to prematurely\
    \ exit out of a function or method that you entered using the Step Into command.\
    \ The Step Out command returns to the line of code where a function or method\
    \ was called.\n\nAll three Step commands are used after a program temporarily\
    \ stops at a breakpoint. By using a Step command, you can examine your code, line\
    \ by line, and see how values stored in different variables may change.\n\nSuch\
    \ variable watching lets you examine the contents of one or more variables to\
    \ verify if it’s holding the correct data. The moment you spot a variable holding\
    \ incorrect data, you can zero in on the line of code that’s creating that error.\n\
    \nThe best part about breakpoints is that you can easily add and remove them since\
    \ they don’t modify your code at all, unlike comments and multiple `print` commands.\
    \ Xcode can remove all breakpoints for you automatically so you don’t have to\
    \ hunt through your code to remove them one by one.\n\nTo see how to use breakpoints,\
    \ step commands, and variable watching, follow these steps:\n\nChoose Debug ➤\
    \ Step Out (or press F8). Xcode now highlights the line that called the `C2F`\
    \ function.  \nChoose Debug ➤ Continue to continue running the program until the\
    \ next breakpoint. In this program there’s only one breakpoint so the program\
    \ displays its empty user interface.  \nChoose DebugProgram ➤ Quit DebugProgram.\
    \ The Xcode window appears again.  \nChoose Debug ➤ Deactivate Breakpoints. Xcode\
    \ dims the breakpoint. Xcode will ignore deactivated breakpoints.  \nChoose Product\
    \ ➤ Run. Notice that because you deactivated the breakpoint, Xcode ignores it\
    \ and runs your program by displaying its empty user interface.  \nChoose DebugProgram\
    \ ➤ Quit DebugProgram. The Xcode window appears again.  \nChoose Debug ➤ Step\
    \ Over (or press F6) several more times until Xcode highlights the following line:\
    \ `print (myMessage + \"\\(C2F(temp))\")`  \nChoose Debug ➤ Step Into (or press\
    \ F7). Xcode now highlights the first line of code in the `C2F` function as shown\
    \ in Figure 23-7.\n\n![A978-1-4842-1233-2_23_Fig7_HTML.jpg](A978-1-4842-1233-2_23_Fig7_HTML.jpg)\
    \  \nFigure 23-7. The Step Into command lets you step through the code stored\
    \ in a function or method\n\nChoose Debug ➤ Step Over (or press F6). Xcode highlights\
    \ the next line under your breakpoint. The information in the left-hand side of\
    \ the Debug Area displays the current values that your program is using as shown\
    \ in Figure 23-6. Notice that after the breakpoint code runs, the value of the\
    \ `myMessage` variable is now defined as the string “Temperature in Celsius:”.\n\
    \n![A978-1-4842-1233-2_23_Fig6_HTML.jpg](A978-1-4842-1233-2_23_Fig6_HTML.jpg)\
    \  \nFigure 23-6. By watching how variables change, you can see how each line\
    \ of code affects each variable\n\nChoose Product ➤ Run. Notice that Xcode highlights\
    \ the line where your breakpoint appears as shown in Figure 23-5. Notice that\
    \ initially the value of the `myMessage` variable is not defined.\n\n![A978-1-4842-1233-2_23_Fig5_HTML.jpg](A978-1-4842-1233-2_23_Fig5_HTML.jpg)\
    \  \nFigure 23-5. A breakpoint halts program execution so you can examine its\
    \ current state\n\nMake sure the DebugProgram project is loaded in Xcode.  \n\
    Click the `AppDelegate.swift` file in the Project Navigator pane.  \nModify the\
    \ `C2F` function as follows:\n\n```\nfunc C2F (tempC : Double) -> Double {\n \
    \   var tempF : Double\n    tempF = tempC + 32 * 9/5\n    return tempF\n}\n```\n\
    \nMove the cursor anywhere inside the following line inside the `applicationDidFinishLaunching`\
    \ function: `var myMessage = \"Temperature in Celsius:\"`  \nChoose Debug ➤ Breakpoints\
    \ ➤ Add Breakpoint at Current Line. Xcode displays a breakpoint as a blue arrow\
    \ as shown in Figure 23-4.\n\n![A978-1-4842-1233-2_23_Fig4_HTML.jpg](A978-1-4842-1233-2_23_Fig4_HTML.jpg)\
    \  \nFigure 23-4. A breakpoint appears to the left of your Swift code"
  raw: 'Although the formula might look correct, the error occurs because of the way
    Swift (and most programming languages) calculate formulas. First, they start from
    left to right. Second, they calculate certain operations such as multiplication
    before addition.


    The error occurs because our conversion formula first multiples 32 by 9 (288),
    and then divides the result (288) by 5 to get 57.6\. Finally, it adds 57.6 to
    100.0 to get the incorrect result of 157.6\. What it should really be doing is
    multiplying 9/5 by the temperature in Celsius and then adding 32 to the result.


    Modify the C2F function as follows: `func C2F (tempC : Double) -> Double {`     `var
    tempF : Double`     `tempF = tempC``* (9/5) + 32`     `print (tempF)`     `return
    tempF` `}`   Choose Product ➤ Run. Your program’s blank user interface appears.
      Choose DebugProgram ➤ Quit DebugProgram. Xcode appears again.   Look in the
    Debug Area and you’ll see that the program now correctly converts 100 degrees
    Celsius to 212 degrees Fahrenheit.


    For simple debugging, turning code temporarily into comments and using the print
    command can work, but it’s fairly clumsy to keep adding and removing comment symbols
    and print commands. A much better solution is to use breakpoints and variable
    watching, which essentially duplicates using comments and print commands.


    ## Using the Xcode Debugger


    While comments and the print command can help you isolate problems in your code,
    they can be clumsy to use. The print command can be especially tedious since you
    have to type it into your code and then remember to remove it later when you’re
    ready to ship your program.


    Although leaving one or more print commands buried in your program won’t likely
    hurt your program’s performance, it’s poor programming practice to leave code
    in your program that no longer serves any purpose.


    As an alternative to typing the print command throughout your program, Xcode offers
    a more convenient alternative using the Xcode debugger. The debugger gives you
    two ways to hunt out and identify bugs in your program:


    *   Breakpoints

    *   Variable watching


    ### Using Breakpoints


    Breakpoints let you identify a specific line in your code where you want your
    program to stop. Once your program stops, you can step through your code, line
    by line. As you do so, you can also peek at the contents of one or more variables
    to check if the variables are holding the right values.


    For example, if your program converts Celsius to Fahrenheit, but somehow converts
    100 degrees Celsius into -41259 degrees Fahrenheit, you know your code isn’t working
    right. By inserting breakpoints in your code and examining the values of your
    variables at each breakpoint, you can identify where your code calculates its
    values. The moment you spot the line where it miscalculates a value, you know
    the exact area of your program that you need to fix.


    You can set a breakpoint by doing one of the following:


    *   Clicking to the left of the code where you want to set the breakpoint

    *   Moving the cursor to a line where you want to set the breakpoint and pressing
    Command + \

    *   Moving the cursor to a line where you want to set the breakpoint and choosing
    Debug ➤ Breakpoints ➤ Add Breakpoint at Current Line


    ### Stepping Through Code


    Once a breakpoint has stopped your program from running, you can step through
    your code line by line using the Step command. Xcode offers a variety of different
    Step commands but the three most common are:


    *   Step Over

    *   Step Into

    *   Step Out


    The Step Over command examines the next line of code, treating function or method
    calls as a single line of code.


    The Step Into command works exactly like the Step Over command until it highlights
    a function or method call. Then it jumps to the first line of code in that function
    or method.


    The Step Out command is used to prematurely exit out of a function or method that
    you entered using the Step Into command. The Step Out command returns to the line
    of code where a function or method was called.


    All three Step commands are used after a program temporarily stops at a breakpoint.
    By using a Step command, you can examine your code, line by line, and see how
    values stored in different variables may change.


    Such variable watching lets you examine the contents of one or more variables
    to verify if it’s holding the correct data. The moment you spot a variable holding
    incorrect data, you can zero in on the line of code that’s creating that error.


    The best part about breakpoints is that you can easily add and remove them since
    they don’t modify your code at all, unlike comments and multiple print commands.
    Xcode can remove all breakpoints for you automatically so you don’t have to hunt
    through your code to remove them one by one.


    To see how to use breakpoints, step commands, and variable watching, follow these
    steps:


    Choose Debug ➤ Step Out (or press F8). Xcode now highlights the line that called
    the C2F function.   Choose Debug ➤ Continue to continue running the program until
    the next breakpoint. In this program there’s only one breakpoint so the program
    displays its empty user interface.   Choose DebugProgram ➤ Quit DebugProgram.
