    ## Summary


    Buttons represent commands that users can click on to choose an option. Xcode
    offers several different types of buttons you can place on a user interface, but
    they’re all based on the same NSButton class defined in the Cocoa frameworks.


    Not all buttons display text, but those buttons that do display text use a Title
    property to hold text. If you want to display an image on a button, you can define
    an image using the Image property. If you change the Type property of a button
    to Switch or Toggle, then you can make a button display text stored in the Title
    property along with text displayed in the Alternate Text property and/or the Alternate
    Image property as well.


    If you need to offer multiple options to the user, placing more than a handful
    of buttons on the user interface can get messy and cluttered. A simpler alternative
    is to use a pop-up button instead that displays a list of options that you can
    modify visually or through Swift code.


    Buttons often connect to a single IBAction method, but you can link multiple buttons
    (or other user interface items) to a single IBAction method. When connecting multiple
    user interface items to an IBAction method, you need to use Swift code to identify
    the user interface item that called the IBAction method. Buttons represent the
    most straightforward way to offer users an option to select.


    # 16. Making Choices with Radio Buttons, Check Boxes, Date Pickers, and Sliders


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​16](http://dx.doi.org/10.1007/978-1-4842-1233-2_16))
    contains supplementary material, which is available to authorized users.


    Rather than let the user choose a specific command through a button, user interfaces
    often give choices to pick. Such choices let the user pick one or more options,
    such as customizing the way a program works. When a user interface needs to offer
    multiple choices, the two most common ways to offer options are through radio
    buttons and check boxes.


    Radio buttons get their name from car radios that let you press a button to switch
    to a different radio station. Since you can only listen to one radio station at
    a time, radio buttons give you multiple options but limit you to choosing only
    one button. The moment you select a different button, your previous choice is
    no longer selected. With radio buttons, you can either select zero buttons or
    select exactly one button at a time.


    Check boxes work slightly differently. Like radio buttons, check boxes offer multiple
    choices. The main difference is that with a group of check boxes, you can select
    zero or more check boxes at the same time so you can choose multiple options at
    once.


    When you need to limit the user to zero or one choices, use radio buttons. When
    you need to let the user choose zero or more choices, use check boxes. Figure
    [16-1](#A978-1-4842-1233-2_16_Chapter.html#Fig1) shows the Xcode Preferences dialog
    that uses both radio buttons and a check box to let the user customize how Xcode
    behaves.


    ![A978-1-4842-1233-2_16_Fig1_HTML.jpg](A978-1-4842-1233-2_16_Fig1_HTML.jpg)


    Figure 16-1.


    The Xcode Preferences dialog uses both radio buttons and check boxes for the user
    to select options


    While radio buttons and check boxes are commonly used to display choices displayed
    as text, a date picker displays different types of dates for the user to choose.
    Then the date picker stores the user’s choice in a special date format (rather
    than separate text representing months or numbers representing days or years).


    By storing dates in a special format, your program can properly display dates
    according to the user’s settings on their computer. For example, in some parts
    of the world, they display dates like this: mm/dd/yyyy. Yet in other parts of
    the world they display dates like this: dd/mm/yyyy.


    Rather than worry about a particular date format setting on each user’s computer,
    a date picker uses a special date format so that way the computer can properly
    display the correct format based on the user’s current settings.


    Date pickers, like radio buttons, and check boxes give users a fixed but limited
    range of valid options to select. This ensures that whatever choice the user makes,
    the choice will be acceptable to your program.


    Check boxes and radio buttons are good for offering users a limited range of choices
    that are usually text options. For offering users a range of numeric values to
    select, you can use a slider. Sliders let the user visually select a range of
    valid options.'
  trans: "\n将鼠标指针移到`Add New Item`按钮上，按住`Control`键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标，会弹出一个窗口。点击`Connection`弹出菜单，选择`Action`。点击`Name`文本字段，输入`addNewItem`。点击`Type`弹出菜单，选择`NSButton`。然后点击`Connect`按钮。Xcode\
    \ 会创建一个空的`IBAction`方法。\n\n将鼠标指针移到`Delete First Item`按钮上，按住`Control`键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标，会弹出一个窗口。点击`Connection`弹出菜单，选择`Action`。点击`Name`文本字段，输入`deleteFirstItem`。点击`Type`弹出菜单，选择`NSButton`。然后点击`Connect`按钮。Xcode\
    \ 会创建一个空的`IBAction`方法。\n\n将鼠标指针移到`Add New List`按钮上，按住`Control`键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标，会弹出一个窗口。点击`Connection`弹出菜单，选择`Action`。点击`Name`文本字段，输入`addList`。点击`Type`弹出菜单，选择`NSButton`。然后点击`Connect`按钮。Xcode\
    \ 会创建另一个空的`IBAction`方法。\n\n按如下所示修改所有三个`IBAction`方法：\n\n```\n@IBAction func addNewItem(sender:\
    \ NSButton) {\nmyPopUp.addItemWithTitle(newItem.stringValue)\n}\n\n@IBAction func\
    \ deleteFirstItem(sender: NSButton) {\nmyPopUp.removeItemAtIndex(0)\n}\n\n@IBAction\
    \ func addList(sender: NSButton) {\nmyPopUp.removeAllItems()\nmyPopUp.addItemsWithTitles([\"\
    Cat\", \"Dog\", \"Bird\", \"Fish\", \"Reptile\"])\n}\n```\n\n`addNewItem`这个`IBAction`方法从文本字段获取文本，并使用`addItemWithTitle`方法将该文本作为新的菜单项添加到弹出按钮列表中。`deleteFirstItem`这个`IBAction`方法使用`removeItemAtIndex`方法删除弹出按钮列表中的第一个菜单项。`addList`这个`IBAction`方法使用`removeAllItems`方法清空弹出按钮中的当前列表，然后用一个新的字符串数组替换它。\n\
    \n选择`Product` ➤ `Run`。你的用户界面会出现。点击弹出按钮。注意，菜单项列表显示三个项目，标签分别是`Item 1`、`Item 2`和`Item\
    \ 3`。点击`Delete First Item`按钮。再次点击弹出按钮。注意，菜单项列表现在只显示两个项目，标签分别是`Item 2`和`Item 3`。点击文本字段，输入`My\
    \ Item`。点击`Add New Item`按钮。再次点击弹出按钮。注意，现在菜单项列表显示三个项目，标签分别是`Item 2`、`Item 3`和`My\
    \ Item`。点击`Add New List`按钮。再次点击弹出按钮。注意，现在菜单项列表显示的是在`addList`这个`IBAction`方法内部定义的字符串数组。选择`EditPopProgram`\
    \ ➤ `Quit EditPopProgram`。\n\n## 总结\n\n按钮代表用户可以通过点击来选择某个选项的命令。Xcode 提供了几种不同类型的按钮可以放置在用户界面上，但它们都基于\
    \ Cocoa 框架中定义的同一个`NSButton`类。\n\n并非所有按钮都显示文本，但那些显示文本的按钮使用`Title`属性来保存文本。如果希望在按钮上显示图像，可以使用`Image`属性来定义图像。如果将按钮的`Type`属性更改为`Switch`或`Toggle`，那么就可以让按钮显示`Title`属性中存储的文本，同时还可以显示`Alternate\
    \ Text`属性和/或`Alternate Image`属性中的文本。\n\n如果需要向用户提供多个选项，在用户界面上放置多个按钮可能会显得杂乱无章。一个更简单的替代方法是使用弹出按钮，它显示一个选项列表，你可以通过可视化方式或\
    \ Swift 代码来修改这个列表。\n\n按钮通常连接到一个`IBAction`方法，但你可以将多个按钮（或其他用户界面项）链接到同一个`IBAction`方法。当将多个用户界面项连接到一个`IBAction`方法时，你需要使用\
    \ Swift 代码来识别调用该`IBAction`方法的用户界面项。按钮是向用户提供可选选项的最直接方式。\n\n# 16. 使用单选按钮、复选框、日期选择器和滑块做出选择\n\
    \n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_16](http://dx.doi.org/10.1007/978-1-4842-1233-2_16))\
    \ 包含补充材料，仅供授权用户使用。\n\n用户界面通常不是让用户通过按钮选择特定命令，而是提供选项供其挑选。这些选择允许用户选取一个或多个选项，例如自定义程序的工作方式。当用户界面需要提供多个选项时，最常见的两种方式是通过单选按钮和复选框。\n\
    \n单选按钮的名称来源于汽车收音机，你可以按下按钮切换到不同的广播电台。由于一次只能收听一个电台，因此单选按钮提供多个选项，但限制一次只能选择一个按钮。当你选择另一个按钮时，之前的选择就不再被选中。使用单选按钮时，你可以选择零个按钮，或者一次恰好选择一个按钮。\n\
    \n复选框的工作原理略有不同。与单选按钮一样，复选框也提供多个选项。主要区别在于，对于一组复选框，你可以同时选择零个或多个复选框，因此可以一次选择多个选项。\n\
    \n当需要将用户限制为零个或一个选择时，请使用单选按钮。当需要让用户选择零个或多个选项时，请使用复选框。图 16-1 展示了 Xcode 偏好设置对话框，它同时使用单选按钮和复选框让用户自定义\
    \ Xcode 的行为。\n\n![A978-1-4842-1233-2_16_Fig1_HTML.jpg](img/A978-1-4842-1233-2_16_Fig1_HTML.jpg)\
    \  \n图 16-1. Xcode 偏好设置对话框使用单选按钮和复选框让用户选择选项\n\n虽然单选按钮和复选框通常用于显示文本形式的选项，但日期选择器则显示不同类型的日期供用户选择。然后日期选择器会以一种特殊的日期格式存储用户的选择（而不是表示月份的单独文本或表示日期的数字）。\n\
    \n通过以特殊格式存储日期，你的程序可以根据用户计算机上的设置正确显示日期。例如，在世界上的某些地区，日期显示为这样：`mm/dd/yyyy`。而在世界的其他地区，日期显示为这样：`dd/mm/yyyy`。\n\
    \n日期选择器无需担心每个用户计算机上的特定日期格式设置，它使用一种特殊的日期格式，这样计算机就可以根据用户当前的设置正确显示相应的格式。\n\n日期选择器与单选按钮和复选框一样，为用户提供固定但有限的、有效的选项范围供其选择。这确保了无论用户做出何种选择，该选择对于你的程序来说都是可以接受的。\n\
    \n复选框和单选按钮适用于为用户提供有限的、通常是文本类的选项。为了向用户提供一个可供选择的数值范围，你可以使用滑块。滑块允许用户直观地选择一个有效的选项范围。\n"
- fmt: "# Using Check Boxes\n\nYou can use a check box by itself or grouped together\
    \ with other check boxes. A check box is actually based on the `NSButton` class\
    \ although it looks and behaves much differently than a typical button. For a\
    \ check box, the three most important properties include:\n\n- Title – The text\
    \ that appears next to a check box that describes an option for the user to choose.\n\
    - State – Determines if the check box is selected (1) or clear (0).\n- Alternate\
    \ – Text that appears when the check box is clear. (The Title text appears when\
    \ the check box is selected.)\n\nTo see how check boxes work, follow these steps:\n\
    \nChoose View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes Inspector\
    \ pane appears in the upper right corner of the Xcode window. Click on the top\
    \ check box and in the Show Attributes Inspector pane, change its Title to “No\
    \ dogs” and its Alternate to “Dogs.” Click on the middle check box and in the\
    \ Show Attributes Inspector pane, change its Title to “No cats” and its Alternate\
    \ to “Cats.” Click on the top check box and in the Show Attributes Inspector pane,\
    \ change its Title to “No birds” and its Alternate to “Birds.” Double-click on\
    \ the Push Button and change its Title to “Check.” Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor. Xcode displays the `AppDelegate.swift` file next to\
    \ the user interface. Move the mouse pointer over the Dogs check box, hold down\
    \ the Control key, and drag the mouse under the `IBOutlet` line in the `AppDelegate.swift`\
    \ file. Release the Control key and the mouse. A pop-up window appears. Click\
    \ in the Name text field, type `dogBox`, and click the Connect button. Move the\
    \ mouse pointer over the Cats check box, hold down the Control key, and drag the\
    \ mouse under the `IBOutlet` line in the `AppDelegate.swift` file. Release the\
    \ Control key and the mouse. A pop-up window appears. Click in the Name text field,\
    \ type `catBox`, and click the Connect button. Move the mouse pointer over the\
    \ Birds check box, hold down the Control key, and drag the mouse under the `IBOutlet`\
    \ line in the `AppDelegate.swift` file. Release the Control key and the mouse.\
    \ A pop-up window appears. Click in the Name text field, type `birdBox`, and click\
    \ the Connect button. Move the mouse pointer over the Wrapping Text Field, hold\
    \ down the Control key, and drag the mouse under the `IBOutlet` line in the `AppDelegate.swift`\
    \ file. Release the Control key and the mouse. A pop-up window appears. Click\
    \ in the Name text field, type `messageBox`, and click the Connect button. You\
    \ should now have four new `IBOutlet`s that look like this: From within Xcode\
    \ choose File ➤ New ➤ Project. Click Application under the OS X category. Click\
    \ Cocoa Application and click the Next button. Xcode now asks for a product name.\
    \ Click in the Product Name text field and type `CheckProgram`. Make sure the\
    \ Language pop-up menu displays Swift and that no check boxes are selected. Click\
    \ the Next button. Xcode asks where you want to store the project. Choose a folder\
    \ to store your project and click the Create button. Click the `MainMenu.xib`\
    \ file in the Project Navigator. Your program’s user interface appears. Click\
    \ the `CheckProgram` icon to display the window of your program’s user interface.\
    \ Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in\
    \ the bottom right corner of the Xcode window. Drag a Push Button, three Check\
    \ Boxes, and a Wrapping Text Field on to the user interface window. Make sure\
    \ you resize Wrapping Text Field and all the check box widths so it looks like\
    \ Figure [16-2](#A978-1-4842-1233-2_16_Chapter.html#Fig2).\n\n![A978-1-4842-1233-2_16_Fig2_HTML.jpg](A978-1-4842-1233-2_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2. The user interface of the `CheckProgram`.\n\n```\n@IBOutlet weak\
    \ var dogBox: NSButton!\n@IBOutlet weak var catBox: NSButton!\n@IBOutlet weak\
    \ var birdBox: NSButton!\n@IBOutlet weak var messageBox: NSTextField!\n```\n\n\
    Move the mouse pointer over the Check Push Button, hold down the Control key,\
    \ and drag the mouse over the last curly bracket in the bottom of the `AppDelegate.swift`\
    \ file. Release the Control key and the mouse. A pop-up window appears. Click\
    \ in the Connection pop-up menu and choose Action. Click in the Name text field\
    \ and type `checkBoxes`. Click in the Type pop-up menu and choose `NSButton`.\
    \ Xcode creates an empty `IBAction` method. Modify this check boxes `IBAction`\
    \ method as follows:\n\n```\n@IBAction func checkBoxes(sender: NSButton) {\n \
    \   let nextLine = \"\\r\\n\"\n    var message : String = \"\"\n    if dogBox.state\
    \ == 1 {\n        message = \"Dog check box selected\" + nextLine\n    } else\
    \ {\n        message = \"Dog check box NOT selected\" + nextLine\n    }\n    if\
    \ catBox.state == 1 {\n        message = message + \"Cat check box selected\"\
    \ + nextLine\n    } else {\n        message = message + \"Cat check box NOT selected\"\
    \ + nextLine\n    }\n    if birdBox.state == 1 {\n        message = message +\
    \ \"Bird check box selected\" + nextLine\n    } else {\n        message = message\
    \ + \"Bird check box NOT selected\" + nextLine\n    }\n    messageBox.stringValue\
    \ = message\n}\n```\n\nThis code creates a constant that represents a carriage\
    \ return `\\r` and a new line `\\n` character. It declares a `message` variable\
    \ that can hold `String` data types and initially contains `\"\"`, which is an\
    \ empty string. The multiple `if-else` statements check the `State` property of\
    \ each check box to determine if it’s selected (`state = 1`) or clear (`state\
    \ = 0`). Then it displays the results in the Wrapping Text Field, which is represented\
    \ by an `IBOutlet` variable called `messageBox`.\n\nChoose Product ➤ Run. Your\
    \ user interface appears. Click on the different check boxes. Notice that each\
    \ time you select or clear a check box, the Title or Alternate text appears. Click\
    \ the Check push button. The Wrapping Text Field identifies which check boxes\
    \ you selected and which ones are clear. Choose CheckProgram ➤ Quit CheckProgram."
  raw: '## Using Check Boxes


    You can use a check box by itself or grouped together with other check boxes.
    A check box is actually based on the NSButton class although it looks and behaves
    much differently than a typical button. For a check box, the three most important
    properties include:


    *   Title – The text that appears next to a check box that describes an option
    for the user to choose.

    *   State – Determines if the check box is selected (1) or clear (0).

    *   Alternate – Text that appears when the check box is clear. (The Title text
    appears when the check box is selected.)


    To see how check boxes work, follow these steps:


    Choose View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes Inspector
    pane appears in the upper right corner of the Xcode window.   Click on the top
    check box and in the Show Attributes Inspector pane, change its Title to “No dogs”
    and its Alternate to “Dogs.”   Click on the middle check box and in the Show Attributes
    Inspector pane, change its Title to “No cats” and its Alternate to “Cats.”   Click
    on the top check box and in the Show Attributes Inspector pane, change its Title
    to “No birds” and its Alternate to “Birds.”   Double-click on the Push Button
    and change its Title to “Check.”   Choose View ➤ Assistant Editor ➤ Show Assistant
    Editor. Xcode displays the AppDelegate.swift file next to the user interface.
      Move the mouse pointer over the Dogs check box, hold down the Control key, and
    drag the mouse under the IBOutlet line in the AppDelegate.swift file.   Release
    the Control key and the mouse. A pop-up window appears.   Click in the Name text
    field, type dogBox, and click the Connect button.   Move the mouse pointer over
    the Cats check box, hold down the Control key, and drag the mouse under the IBOutlet
    line in the AppDelegate.swift file.   Release the Control key and the mouse. A
    pop-up window appears.   Click in the Name text field, type catBox, and click
    the Connect button.   Move the mouse pointer over the Birds check box, hold down
