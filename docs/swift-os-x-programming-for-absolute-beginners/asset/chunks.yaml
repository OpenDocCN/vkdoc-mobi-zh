    Figure 7-21.


    Displaying an Alert dialog   Click the OK button in the Alert dialog to make it
    go away.   Click in the ID text field of your BranchingProgram user interface
    and type 1.   Click the Check Password push button. Notice that now the Alert
    dialog displays “No access.”   Click the OK button in the Alert dialog to make
    it go away.   Choose BranchingProgram ➤ Quit BranchingProgram.


    ## Summary


    To respond intelligently to the user, every program needs a way to make decisions.
    The first step to making a decision is to define a Boolean value, which is either
    true or false. Boolean values can be calculated through comparison operators or
    logical operators.


    Once you can determine a Boolean value, then you can use that Boolean value to
    decide which code to follow in a branching statement. The simplest branch is an
    if statement that either runs a set of code or does nothing at all.


    Another branch is the if-else statement, which offers exactly two sets of code
    to run. If a Boolean value is true, then the first set of code runs. Otherwise
    the second set of code runs.


    If you want to choose between three or more sets of code to run, you can use an
    if-else if statement. However, it’s often simpler to use a switch statement instead.
    When using a switch statement, you must anticipate all possible values.


    A switch statement lets you match an exact value, a range of values (that includes
    the beginning and ending numbers), or a half range of values (which only includes
    the beginning number but not the end).


    Branching statements combined with Boolean values gives your program the ability
    to make decisions and run different code based on the data it receives. Branching
    statements essentially let your program respond intelligently to outside data.


    # 8. Repeating Code with Loops


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​8](http://dx.doi.org/10.1007/978-1-4842-1233-2_8))
    contains supplementary material, which is available to authorized users.


    The basic goal of programming is to write as little code as possible that does
    as much as possible. The less code you write, the easier the program will be to
    understand and modify later. The more your code does, the more powerful your program
    will be.


    One way to write less code is to reuse code stored in functions. A second way
    to reuse code is through loops. A loop runs one or more lines of code multiple
    times, thereby eliminating the need to write multiple, redundant lines of code.


    For example, if you wanted to print a message five times, you could write the
    following:


    `print ("Hello")`


    `print ("Hello")`


    `print ("Hello")`


    `print ("Hello")`


    `print ("Hello")`


    This is tedious but it will work. However, if you suddenly decide you need to
    print a message one thousand times, now you’d have to write that command one thousand
    times. Not only is typing the same command tedious, but it increases the chance
    of making a mistake in one of those commands.


    A far simpler method is to use a loop. A loop lets you write one or more commands
    once and then run those commands as many times as you want such as:


    `var counter : Int = 1`


    `while counter <= 5 {`


        `print ("Hello")`


        `counter++`


    `}`


    The above loop runs five times and prints “Hello” five times. If we wanted to
    print “Hello” one thousand times, we could just replace the number 5 with the
    number 1000\. Loops make code easier to write and modify while doing more work
    at the same time.'
