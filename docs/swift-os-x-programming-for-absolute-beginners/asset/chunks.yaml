    \ `representedObject` 中的值。\n\n若要了解如何将数据从一个场景传递到另一个场景，请遵循以下步骤：\n\n1.  选择 View ➤\
    \ Assistant Editor ➤ Show Assistant Editor 以显示控制初始场景的 `ViewController.swift` 文件。\n\
    2.  将鼠标指针移动到文本字段上，按住 **Control** 键，然后将鼠标从文本字段拖拽到 `class ViewController` 行下方。\n\
    3.  松开 **Control** 键和鼠标。会弹出一个菜单。\n4.  点击 **Name** 文本字段，输入 `passedText`，然后点击 **Connect**\
    \ 按钮。Xcode 会创建一个如下的 `IBOutlet`：\n\n确保你的 `StoryProgram` 项目已在 Xcode 中加载，然后点击 **Project\
    \ Navigator** 窗格中的 `Main.storyboard` 文件。\n\n在包含 **Open Scene** 按钮的场景上拖拽一个文本字段并将其加宽，如图\
    \ 14-22 所示。\n\n![A978-1-4842-1233-2_14_Fig22_HTML.jpg](img/A978-1-4842-1233-2_14_Fig22_HTML.jpg)\n\
    \n**图 14-22.** 初始场景的用户界面\n\n```\n@IBOutlet weak var passedText: NSTextField!\n\
    ```\n\n编写 `prepareForSegue` 方法，使 `ViewController.swift` 文件中的完整代码如下所示：\n\n```\n\
    import Cocoa\n\nclass ViewController: NSViewController {\n\n    @IBOutlet weak\
    \ var passedText: NSTextField!\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // 加载视图后执行任何其他设置。\n    }\n\n    override func prepareForSegue(segue:\
    \ NSStoryboardSegue, sender: AnyObject?) {\n        let secondScene = segue.destinationController\
    \ as! secondView\n        secondScene.representedObject = passedText.stringValue\n\
    \    }\n\n    override var representedObject: AnyObject? {\n        didSet {\n\
    \            // 如果视图已加载，则更新视图。\n        }\n    }\n\n}\n```\n\n`passedText` 这个\
    \ `IBOutlet` 会检索用户在文本字段中输入的文本。然后，`prepareForSegue` 方法创建一个名为 `secondScene` 的常量，它代表转场的目标，即\
    \ `secondView` 类。接着，它从 `passedText` 这个 `IBOutlet` 中获取文本，并将其存储到 `representedObject`\
    \ 属性中。\n\n选择 View ➤ Assistant Editor ➤ Show Assistant Editor。如果助理编辑器没有显示 `secondView.swift`\
    \ 文件，请点击助理编辑器左上角的 **Automatic** 以显示一个菜单。在此菜单中，选择 Manual ➤ StoryProgram ➤ StoryProgram，然后点击\
    \ `secondView.swift` 文件。\n\n-   将鼠标指针移动到标签上，按住 **Control** 键，然后将鼠标从标签拖拽到 `class\
    \ secondView` 行下方。\n-   松开 **Control** 键和鼠标。会弹出一个菜单。\n-   点击 **Name** 文本字段，输入\
    \ `receivedText`，然后点击 **Connect** 按钮。Xcode 会创建一个如下的 `IBOutlet`：\n\n在你的故事板中点击第二个场景，在上面放置一个\
    \ **Label** 并将其加宽，如图 14-23 所示。\n\n![A978-1-4842-1233-2_14_Fig23_HTML.jpg](img/A978-1-4842-1233-2_14_Fig23_HTML.jpg)\n\
    \n**图 14-23.** 第二个场景的用户界面\n\n```\n@IBOutlet weak var receivedText: NSTextField!\n\
    ```\n\n修改 `viewDidLoad` 方法，使 `secondView.swift` 文件中的完整代码如下所示：\n\n```\nimport Cocoa\n\
    \nclass secondView: NSViewController {\n\n    @IBOutlet weak var receivedText:\
    \ NSTextField!\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // 在此处进行视图设置。\n        receivedText.stringValue = self.representedObject!\
    \ as! String\n    }\n\n    @IBAction func closeScene(sender: NSButton) {\n   \
