    the Document Outline.   Click on the disclosure triangle to the left of the Text
    Field that uses the Number Formatter.   Click on the disclosure triangle that
    appears to the left of the Text Field Cell underneath the text field.   Click
    on the Number Formatter as shown in Figure [17-2](#A978-1-4842-1233-2_17_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_17_Fig2_HTML.jpg](A978-1-4842-1233-2_17_Fig2_HTML.jpg)


    Figure 17-2.


    The Number Formatter appears in the Document Outline


    The Minimum and Maximum check boxes let you define a minimum and/or maximum value
    that the text field will accept. If you define a minimum value of 10 and the user
    types in a number less than 10, the text field won’t accept the number.


    The Localize check box tells Xcode to use the user’s local settings to determine
    the appearance of a decimal point and currency symbol. In some parts of the world,
    they use a period for a decimal point while in others they use a comma.


    Likewise for currency, Europeans would use the Euro symbol, Americans would use
    the dollar symbol, and British users would use the British pound symbol. Selecting
    the Localize check box ensures that your text field number formatter works no
    matter what part of the world the program may be used.


    The Style pop-up menu lets you define different ways to format numbers. When you
    choose a Style, the Unformatted and Formatted text fields under the Sample category
    shows you how your numbers may look.


    For example, in Figure [17-3](#A978-1-4842-1233-2_17_Chapter.html#Fig3), choosing
    the None Style means that if the user types in 1,234.75 into a text field with
    a number formatter and presses Return, the text field formats that number as simply
    1235.


