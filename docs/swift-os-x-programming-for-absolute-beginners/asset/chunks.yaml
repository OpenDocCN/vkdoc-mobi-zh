- fmt: '### Modifying Pop-Up Menu Items Visually


    A pop-up button contains a default list of three items. However, you can add,
    edit, or delete items from that list at any time. To edit a pop-up menu list,
    follow these steps:


    Double-click on the menu item you want to edit. Xcode highlights the text of your
    chosen menu item as shown in Figure 15-12.


    ![A978-1-4842-1233-2_15_Fig12_HTML.jpg](A978-1-4842-1233-2_15_Fig12_HTML.jpg)


    Figure 15-12. Double-clicking on a menu item lets you edit the text


    Double-click on the pop-up button on the user interface. The current list of menu
    items appears as shown in Figure 15-11.


    ![A978-1-4842-1233-2_15_Fig11_HTML.jpg](A978-1-4842-1233-2_15_Fig11_HTML.jpg)


    Figure 15-11. Double-clicking on a pop-up button displays its list of menu items


    > **Note:** You can also choose View ➤ Utilities ➤ Show Attributes Inspector and
    edit the text of a menu item by editing the Title property of the selected menu
    item.


    Use the arrow keys, Backspace, or Delete key to edit the text and type any new
    text.


    Press Return. Xcode saves your edited text for the menu item.


    To delete a menu item from a pop-up button, follow these steps:


    1. Double-click on the pop-up button on the user interface. The current list of
    menu items appears (see Figure 15-11).

    2. Click on the menu item that you want to delete. Xcode highlights your chosen
    menu item.

    3. Press the Backspace or Delete key. Your chosen menu item disappears.


    > **Note:** If you delete a menu item by mistake, just press Command+Z or choose
    Edit ➤ Undo to reverse the delete command.


    To add a menu item to a pop-up button, follow these steps:


    1. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.

    2. Type "menu item" and press Return in the search field at the bottom of the
    Object Library. The Object Library displays a list of menu items as shown in Figure
    15-13.

    3. Drag the Menu Item from the Object Library over the list of menu items stored
    in the pop-up button on the user interface.

    4. Release the mouse button. Xcode adds a menu item to the pop-up button list.


    ![A978-1-4842-1233-2_15_Fig13_HTML.jpg](A978-1-4842-1233-2_15_Fig13_HTML.jpg)


    Figure 15-13. The list of menu items in the Object Library


    ### Adding Pop-Up Menu Items with Swift Code


    As an alternative to modifying menu items in a pop-up button visually, you can
    also use Swift code to add, delete, or change a menu item. Pop-up button menu
    items are based on the `NSMenuItem` class, but you can find the methods you need
    to manipulate a list of pop-up button menu items in the `NSMenu` class.


    If you want to add just one new menu item to a pop-up button, you can use the
    `addItemWithTitle` method and specify a string such as:


    ```

    myPopUp.addItemWithTitle("New Item")

    ```


    You can also add a list of new menu items by storing them in an array and using
    the `addItemsWithTitles` method such as:


    ```

    myPopUp.addItemsWithTitles(["Cat", "Dog", "Bird", "Fish", "Reptile"])

    ```


    You can remove individual menu items using the `removeItemAtIndex` method that
    needs an `Int` value to define which item to remove. The first item in a pop-up
    menu list is at index 0, the second at index 1, and so on.


    To remove all items in a pop-up button''s menu list, just use the `removeAllItems()`
    method, which clears out the entire list no matter how many (or how few) items
    may be currently stored in that list.


    To see how to use Swift code to add and delete items from a pop-up button menu
    list, follow these steps:


    1. Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the
    `AppDelegate.swift` file next to your user interface.

    2. Move the mouse pointer over the pop-up button, hold down the Control key, and
    drag the mouse underneath the `IBOutlet` line near the top of the `AppDelegate.swift`
    file.

    3. Release the Control key and the mouse. A pop-up window appears.

    4. Click in the Name text field and type `myPopUp`. Then click the Connect button.
    Xcode creates an `IBOutlet`.

    5. Move the mouse pointer over the text field, hold down the Control key, and
    drag the mouse underneath the `IBOutlet` line near the top of the `AppDelegate.swift`
    file.

    6. Release the Control key and the mouse. A pop-up window appears.

    7. Click in the Name text field and type `newItem`. Then click the Connect button.
    Xcode creates another `IBOutlet` so you should have two `IBOutlet`s that look
    like this:


    ```

    @IBOutlet weak var myPopUp: NSPopUpButton!

    @IBOutlet weak var newItem: NSTextField!

    ```


    From within Xcode choose File ➤ New ➤ Project.


    1. Click Application under the OS X category.

    2. Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    3. Click in the Product Name text field and type `EditPopProgram`.

    4. Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.

    5. Click the Next button. Xcode asks where you want to store the project.

    6. Choose a folder to store your project and click the Create button.

    7. Click the `MainMenu.xib` file in the Project Navigator. Your program''s user
    interface appears.

    8. Click the `EditPopProgram` icon to display the window of your program''s user
    interface.

    9. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.

    10. Drag a PopUp Button, three Push Buttons, and a Text Field on to the user interface
    window and edit the titles on both push buttons so it looks like Figure 15-14.


    ![A978-1-4842-1233-2_15_Fig14_HTML.jpg](A978-1-4842-1233-2_15_Fig14_HTML.jpg)


    Figure 15-14. The user interface of the `EditPopProgram`'
