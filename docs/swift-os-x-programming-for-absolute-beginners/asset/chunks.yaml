- fmt: '# 23. Debugging Your Programs


    In the professional world of software, you’ll actually spend more time modifying
    existing programs than you ever will creating new ones. When writing new programs
    or editing existing ones, it doesn’t matter how much experience or education you
    might have because even the best programmers can make mistakes. In fact, you can
    expect that you will make mistakes no matter how careful you may be. Once you
    accept this inevitable fact of programming, you can learn how to find and fix
    your mistakes.


    In the world of computers, mistakes are commonly called “bugs,” which gets its
    name from an early computer that used physical switches to work. One day the computer
    failed and when technicians opened the computer, they found that a moth had been
    crushed within a switch, preventing the switch from closing. From that point on,
    programming errors have been called bugs and fixing computer problems has been
    known as debugging.


    Three common types of computer bugs are:


    *   Syntax errors – Occurs when you misspell something such as a keyword, variable
    name, function name, or class name, or use a symbol incorrectly.

    *   Logic errors – Occurs when you use commands correctly, but the logic of your
    code doesn’t do what you intended.

    *   Runtime errors – Occurs when a program encounters unexpected situations such
    as the user entering invalid data or when another program somehow interferes with
    your program unexpectantly.


    Syntax errors are the easiest to find and fix because they’re merely misspellings
    of variable names that you created or misspelling of Swift commands that `Xcode`
    can help you identify. If you type a Swift keyword such as `var` or `let`, `Xcode`
    displays that keyword in pink (or whatever color you specify for displaying keywords
    in the `Xcode` editor).


    Now if you type a Swift keyword and it doesn’t appear in its usual identifying
    color, then you know you probably typed it wrong somehow. By coloring your code,
    `Xcode`’s editor helps you visually identify common misspellings or typos.


    Besides using color, the `Xcode` editor provides a second way to help you avoid
    mistakes when you need to type the name of a method or class defined in the `Cocoa`
    framework. As soon as `Xcode` recognizes that you might be typing something from
    the `Cocoa` framework, it displays a pop-up menu of possible options. Now instead
    of typing the entire command yourself, you can simply click on your choice in
    the pop-up menu and press the `Tab` key one or more times to let `Xcode` type
    your chosen command correctly as shown in Figure [23-1](#A978-1-4842-1233-2_23_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_23_Fig1_HTML.jpg](A978-1-4842-1233-2_23_Fig1_HTML.jpg)


    Figure 23-1.


    `Xcode` displays a menu of possible commands that you might want to use


    Syntax errors often keep your program from running at all. When a syntax error
    keeps your program from running, `Xcode` can usually identify the line (or the
    nearby area) of your program where the misspelled commands appears so you can
    fix it as shown in Figure [23-2](#A978-1-4842-1233-2_23_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_23_Fig2_HTML.jpg](A978-1-4842-1233-2_23_Fig2_HTML.jpg)


    Figure 23-2.


    Syntax errors often keep a program from running, which allows `Xcode` to identify
    the syntax error


    Logic errors are much harder to find and detect than syntax errors. `Xcode` can
    identify syntax errors because it recognizes the differences between a properly
    spelled Swift keyword (such as `var`) compared to a similar misspelled Swift keyword
    (such as `varr` instead of `var`).


    However, logic errors occur when you use Swift code correctly, but it doesn’t
    do what you intended it to do. Since your code is actually valid, `Xcode` has
    no way of knowing that it’s not working the way you intended. As a result, logic
    errors can be difficult to debug because you think you wrote your code correctly
    but you (obviously) did not.


    How do you find a mistake in code that you thought you wrote correctly? Finding
    your mistake can often involve starting from the beginning of your program and
    exhaustively searching each line all the way until the end. (Of course there are
    faster ways than searching your entire program, line by line, which you’ll learn
    about later in this chapter.)


    Finally, the hardest errors to find and debug are runtime errors. Syntax errors
    usually keep your program from running so if your program actually runs, you can
    assume that you have eliminated most, if not all, syntax errors in your code.


    Logic errors can be tougher to find, but they’re predictable. For example, if
    your program asks the user for a password but fails to give the user access even
    though the user types a correct password, you know you have a logic error. Each
    time you run your program, you can reliably predict when the logic error will
    occur.


    Runtime errors are more insidious because they don’t always occur predictably.
    For example, your program may run perfectly well on your computer, but the moment
    you run the same program on an identical computer, the program may fail. That’s
    because conditions between two different computers will never be exactly the same.


    As a result, the same program can run fine on one computer but fail on the exact
    same type of computer somewhere else. The problem is that unexpected, outside
    circumstances can affect your program’s behavior. For example, your program may
    run just fine until the user presses a number key on the numeric keypad instead
    of the number key at the top of the alphanumeric keys.


    Even though the user may be typing the exact same number (such as `5`), the program
    may treat the `5` key above the `R` and `T` keys as a completely different key
    as the `5` key on the numeric keypad. As subtle as that may be, it could be enough
    to cause a program to fail or crash.


    Because runtime errors can’t always be duplicated, they can be frustrating to
    find and even harder to fix since you can’t always examine every possible condition
    your program might face when running on other computers. Some programs have been
    known to work perfectly – except if the user accidentally presses two keys at
    the same time. Other programs work just fine – until the user happens to save
    a file at the exact moment that another program tries to receive e-mail over the
    Internet.


    Usually you can eliminate most syntax errors and find and fix most logic errors.
    However, it may not be possible to find and completely eliminate all runtime errors
    in a program. The best way to avoid spending time hunting for bugs is to strive
    to write code and test it carefully to make sure it’s as error-free as possible.'
