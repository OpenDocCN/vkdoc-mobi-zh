    ## Summary


    Swift programming depends entirely on objects and the principles of object-oriented
    programming. To create an object, you must first define a class. A class typically
    consists of one or more variables (called properties) and one or more functions
    (called methods). Once you’ve defined a class, you can create an object that represents
    that class.


    Properties in a class always need to be initialized. You can define initial values
    for every property at the same time you define those properties, or you can create
    a special initializer method that lets you accept data to define initial values
    for an object.


    Properties can be initialized with a fixed value, or they can be computed based
    on values of another property. The value of one property can change the value
    of a different property.


    You can create as many objects from a single class as you want. Typically it’s
    best to store class definitions in separate files to keep your code organized.
    An object-oriented program works by objects sending data to the properties of
    other objects, or calling methods stored in other objects. By working together,
