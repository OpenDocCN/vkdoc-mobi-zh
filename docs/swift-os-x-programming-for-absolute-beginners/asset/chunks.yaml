    ## Connecting Multiple User Interface Items to IBAction Methods


    Typically you link one IBAction method to one user interface item such as a button.
    However, it’s possible to connect multiple items to a single IBAction method.
    When doing this, the IBAction method needs to know what user interface item called
    the IBAction method to run.


    To identify a particular user interface item, you need to change the Tag property
    of each item linked to the same IBAction method. The Tag property can hold an
    integer value so you can use distinct Tag values to identify different user interface
    items.


    Once you’ve given each user interface item a distinct Tag value, you can create
    an IBAction method normally using the Control-drag method from one user interface
    item into your Swift file. Then you use the same Control-drag method to connect
    the remaining user interface items to that existing IBAction method.


    There’s no limit to the number of items you can link to the same IBAction method
    just as long as you use the Tag property to identify which user interface item
    called the IBAction method.


    To see how to connect multiple items to a single IBAction method, follow these
    steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type MultipleProgram.
      Make sure the Language pop-up menu displays Swift and that all check boxes are
    clear and not selected.   Click the Next button. Xcode asks where you want to
    store the project.   Choose a folder to store your project and click the Create
    button.   Click on the MainMenu.xib file in the Project Navigator Pane.   Click
    on the MultipleProgram icon to make the window of the user interface appear.  
    Drag a Push Button, Recessed Button, Inline Button, and Label on to the user interface
    and resize with width of the label as shown in Figure [15-8](#A978-1-4842-1233-2_15_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_15_Fig8_HTML.jpg](A978-1-4842-1233-2_15_Fig8_HTML.jpg)


    Figure 15-8.


    The user interface of the MultipleProgram


    At this point you have three different types of buttons on the window and a label.
    We’ll create a single IBAction method that all three buttons can run. When you
    click on a button, the label will display the button title to show you which button
    you just clicked on.


    First, we’ll need to modify the Tag property of each button. The top button will
    have a Tag value of 0, the middle button will have a Tag value of 1, and the lowest
    button will have a Tag value of 2.


    Then we’ll create an IBAction method that identifies the Tag property and displays
    the button’s title in the label. To do this, follow these steps:


    Click on the MainMenu.xib file in the Project Navigator pane.   Choose View ➤
    Assistant Editor ➤ Show Assistant Editor. Xcode displays the AppDelegate.swift
    file next to the user interface.   Move the mouse pointer over the Label, hold
    down the Control key, and drag the mouse under the IBOutlet line in the AppDelegate.swift
    file.   Release the Control key and the mouse button. A pop-up window appears.
      Click in the Name text filed, type displayLabel, and click the Connect button.
    You should have an IBOutlet as follows:


    `@IBOutlet weak var displayLabel: NSTextField!`'
