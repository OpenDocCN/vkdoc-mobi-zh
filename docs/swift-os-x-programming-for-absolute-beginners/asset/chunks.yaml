  trans: "\n### 创建内部列表\n\n当你事先确切知道要在组合框中存储多少个项目以及具体是哪些项目时（例如国家列表或产品名称列表），内部列表是最佳选择。要创建内部列表，请遵循以下步骤：\n\
    \n在程序界面上放置一个组合框。点击选中该组合框。选择 `View ➤ Utilities ➤ Show Attributes Inspector`。“Items”列表将出现，如图\
    \ 17-9 所示。\n\n![A978-1-4842-1233-2_17_Fig9_HTML.jpg](img/A978-1-4842-1233-2_17_Fig9_HTML.jpg)\n\
    \n图 17-9. “Items”列表允许你定义要在组合框中显示的项目\n\n要编辑列表中的现有项目，点击该项目将其选中，然后按下 `Return` 键。现在你就可以编辑文本了。\n\
    \n要移除现有项目，点击该项目将其选中，然后点击减号图标。\n\n要添加新项目，点击加号图标。然后点击新添加的项目，按下 `Return` 键，并编辑文本。\n\
    \n“Visible Items”文本字段定义了组合框菜单显示的项目数量。\n\n“Autocompletes”复选框允许组合框显示其列表中与用户开始输入内容相匹配的项目。因此，如果用户输入一个字母，自动完成功能会显示组合框列表中所有以该字母开头的项目。\n\
    \n“Uses Data Source”复选框决定组合框是使用其内部“Items”列表来显示菜单项，还是从其他来源检索数据。如果选中了“Uses Data\
    \ Source”复选框，那么你需要编写 Swift 代码来填充组合框数据。\n\n要了解如何使用内部列表填充组合框，请遵循以下步骤：\n\n选择 `View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor`。Xcode 会在用户界面旁边显示 `AppDelegate.swift`\
    \ 文件。将鼠标指针移到组合框上，按住 `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件中 `IBOutlet` 行的下方。松开\
    \ `Control` 键和鼠标。此时会弹出一个窗口。点击“Name”文本字段，输入 `myCombo`，然后点击“Connect”按钮。将鼠标指针移到标签上，按住\
    \ `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件中 `IBOutlet` 行的下方。松开 `Control` 键和鼠标。此时会弹出一个窗口。点击“Name”文本字段，输入\
    \ `comboResult`，然后点击“Connect”按钮。现在你应该拥有这两个 `IBOutlet`：\n\n在 Xcode 中选择 `File ➤\
    \ New ➤ Project`。在 OS X 类别下点击“Application”。点击“Cocoa Application”，然后点击“Next”按钮。Xcode\
    \ 现在会要求输入产品名称。点击“Product Name”文本字段，输入 `ComboProgram`。确保“Language”弹出菜单显示为 Swift，并且所有复选框均为清除状态且未选中。点击“Next”按钮。Xcode\
    \ 会询问你希望将项目存储在哪里。选择一个文件夹来存储项目，然后点击“Create”按钮。在项目导航窗格中点击 `MainMenu.xib` 文件。点击“ComboProgram”图标以显示用户界面窗口。将一个“Combo\
    \ Box”、一个“Push Button”和一个 Label 拖到用户界面上，并加宽标签，使其看起来如图 17-10 所示。\n\n![A978-1-4842-1233-2_17_Fig10_HTML.jpg](img/A978-1-4842-1233-2_17_Fig10_HTML.jpg)\n\
    \n图 17-10. `ComboProgram` 的用户界面\n\n```\n@IBOutlet weak var myCombo: NSComboBox!\n\
    @IBOutlet weak var comboResult: NSTextField!\n```\n\n将鼠标指针移到 Push Button 上，按住\
    \ `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开 `Control` 键和鼠标。此时会弹出一个窗口。点击“Connection”弹出菜单，选择“Action”。点击“Name”文本字段，输入\
    \ `showResult`。点击“Type”弹出菜单，选择 `NSButton`。然后点击“Connect”按钮。Xcode 会创建一个空的 `IBAction`\
    \ 方法。按如下方式修改此 `IBAction` 方法：\n\n```\n@IBAction func showResult(sender: NSButton)\
    \ {\n    comboResult.stringValue = myCombo.stringValue\n}\n```\n\n选择 `Product\
    \ ➤ Run`。你的用户界面会显示出来。点击组合框并输入 `Hello`。点击 Push Button。单词 `Hello` 会出现在标签中。点击组合框右侧边缘的向下箭头以显示其项目列表。由于我们没有修改默认列表，组合框列表包含三个项目，分别标记为\
    \ `Item 1`、`Item 2` 和 `Item 3`。点击 `Item 3`，然后点击 Push Button。下方的标签会显示 `Item 3`。选择\
    \ `ComboProgram ➤ Quit ComboProgram`。\n\n此示例使用了组合框的默认项目列表。尝试添加或修改此组合框项目列表，并选中“Autocompletes”复选框，以了解这些选项如何修改组合框的行为。\n"
- fmt: "### Using a Data Source\n\nA data source is best when a combo box needs to\
    \ display data that may change over time, such as displaying a list of information\
    \ from a database. To use a data source, you need to write Swift code. First,\
    \ you need to adopt the `NSComboBoxDataSource` protocol in a class like this:\n\
    \n```\nclass AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource\
    \ {\n```\n\nNext, you need to write two functions. One function needs to count\
    \ the number of items to display in the combo box. The second function needs to\
    \ retrieve data to insert in the combo box’s list of items.\n\nFinally, you need\
    \ to specify a data source (the file that contains the data you want to display\
    \ in the combo box) and make sure the `usesDataSource` property for the combo\
    \ box is selected in the Show Attributes Inspector pane or set to `true` using\
    \ Swift code.\n\nTo see how a data source works to fill a combo box with a list\
    \ of items, follow these steps:\n\nMake sure the `ComboProgram` project is loaded\
    \ in Xcode. Modify the class name to include the `NSComboBoxDataSource` protocol\
    \ as follows:\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource\
    \ {\n```\n\nClick on the `AppDelegate.swift` file in the Project Navigator pane.\
    \ Underneath the `IBOutlet` lines, add the following line to create an array of\
    \ strings that will fill the combo box’s item list:\n\n```\nlet myArray = [\"\
    Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n```\n\nModify the `applicationDidFinishLaunching`\
    \ function as follows:\n\n```\nfunc applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n\n    // Insert code here to initialize your application\n\
    \    myCombo.dataSource = self\n    myCombo.usesDataSource = true\n    numberOfItemsInComboBox(myCombo)\n\
    \    comboBox(myCombo, objectValueForItemAtIndex: 0)\n\n}\n```\n\nThis Swift code\
    \ defines the data source for the combo box (identified by the `myCombo` IBOutlet)\
    \ as `self`, which means the same class is also the data source. It makes sure\
    \ the `usesDataSource` property is `true` to use a data source. Then it calls\
    \ two functions defined by the `NSComboBoxDataSource` protocol.\n\nAbove the IBAction\
    \ method, add the following two function implementations:\n\n```\nfunc numberOfItemsInComboBox(aComboBox:\
    \ NSComboBox) -> Int {\n    return myArray.count\n}\n\nfunc comboBox(aComboBox:\
    \ NSComboBox, objectValueForItemAtIndex index: Int) -> AnyObject {\n    return\
    \ myArray[index]\n}\n```\n\nThe `numberOfItemsInComboBox` function counts all\
    \ the items in the `myArray` array and returns that integer. The `comboBox` function\
    \ places each array item in the combo box’s item list.\n\nChoose Product ➤ Run.\
    \ Click on the downward-pointing arrow of the combo box. Notice that its item\
    \ list contains the items defined in `myArray` (\"Sandwich,\" \"Chips,\" \"Soda,\"\
    \ and \"Salad\"). Click on Sandwich in the combo box to select it and then click\
    \ the push button. Notice that the label underneath displays Sandwich. Choose\
    \ ComboProgram ➤ Quit ComboProgram.\n\nThis simple program shows how to retrieve\
    \ a list of items from another data source (in this case an array called `myArray`)\
    \ to fill an item list for a combo box. The complete code for the `AppDelegate.swift`\
    \ file should look like this:\n\n```\nimport Cocoa\n\n@NSApplicationMain\nclass\
    \ AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource {\n\n   \
    \ @IBOutlet weak var window: NSWindow!\n    @IBOutlet weak var myCombo: NSComboBox!\n\
    \    @IBOutlet weak var comboResult: NSTextField!\n\n    let myArray = [\"Sandwich\"\
    , \"Chips\", \"Soda\", \"Salad\"]\n\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n        // Insert code here to initialize your application\n\
    \        myCombo.usesDataSource = true\n        myCombo.dataSource = self\n  \
    \      numberOfItemsInComboBox(myCombo)\n        comboBox(myCombo, objectValueForItemAtIndex:\
    \ 0)\n    }\n\n    func applicationWillTerminate(aNotification: NSNotification)\
    \ {\n        // Insert code here to tear down your application\n    }\n\n    func\
    \ numberOfItemsInComboBox(aComboBox: NSComboBox) -> Int {\n        return myArray.count\n\
    \    }\n\n    func comboBox(aComboBox: NSComboBox, objectValueForItemAtIndex index:\
    \ Int) -> AnyObject {\n        return myArray[index]\n    }\n\n    @IBAction func\
    \ showResult(sender: NSButton) {\n        comboResult.stringValue = myCombo.stringValue\n\
    \    }\n\n}\n```\n\n## Summary\n\nText fields allow the user to type anything\
    \ such as numbers or strings, so a text field offers multiple properties (`intValue`,\
    \ `floatValue`, `doubleValue`, and `stringValue`) to store typed information in\
    \ the proper data type. To restrict numeric information the user may type, you\
    \ can use a number formatter to define minimum and/or maximum values along with\
    \ defining different ways the user can enter numeric data such as with a percentage\
    \ sign or a currency sign.\n\nBesides ordinary text fields, Xcode offers several\
    \ variations of text fields for specialized purposes. Labels are designed for\
    \ simply displaying text without allowing the user to edit the displayed text.\
    \ A secure text field masks typed in data to keep it safe from prying eyes. A\
    \ token field displays typed in data as groups or tokens while a search field\
    \ offers a property to remember previously typed in data.\n\nCombo boxes combine\
    \ the features of a text field with a pop-up button. A combo box can display a\
    \ list of valid options that the user can click on, or the user can type in data.\
    \ You can define a combo box’s list of options in the Show Attributes Inspector\
    \ pane, or you can retrieve data from another source such as from an array.\n\n\
    The main purpose of text fields and combo boxes is to allow the user to type in\
    \ any type of data. When the user types in data, you may need to write Swift code\
    \ to verify that the entered data is actually valid for your program.\n\n# 18.\
    \ Using Alerts and Panels\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.1007/978-1-4842-1233-2_18](http://dx.doi.org/10.1007/978-1-4842-1233-2_18))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    With every program, you’ll need to design the unique features of your program\
    \ while letting the Cocoa framework worry about making your program look and behave\
    \ like a standard OS X program. Two common features of nearly every OS X program\
    \ are alerts and panels.\n\nAn alert typically pops up on the screen to inform\
    \ the user such as asking the user to verify the deletion of a file or to alert\
    \ the user of a problem. A panel displays common user interface items such as\
    \ a print panel that OS X programs typically display to give you options for printing,\
    \ or an open panel for selecting a file.\n\nBy using alerts and panels, you can\
    \ add common OS X user interface elements without having to create your own user\
    \ interface or without needing to write Swift code. Alerts and panels are part\
    \ of the Cocoa framework that your OS X programs can use to create a standard\
    \ OS X user interface."
  raw: '### Using a Data Source


    A data source is best when a combo box needs to display data that may change over
    time, such as displaying a list of information from a database. To use a data
    source, you need to write Swift code. First, you need to adopt the NSComboBoxDataSource
    protocol in a class like this:


    `class AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource {`


    Next, you need to write two functions. One function needs to count the number
    of items to display in the combo box. The second function needs to retrieve data
    to insert in the combo box’s list of items.


    Finally, you need to specify a data source (the file that contains the data you
    want to display in the combo box) and make sure the usesDataSource property for
    the combo box is selected in the Show Attributes Inspector pane or set to true
    using Swift code.


    To see how a data source works to fill a combo box with a list of items, follow
    these steps:


    Make sure the ComboProgram project is loaded in Xcode.   Modify the class name
    to include the NSComboBoxDataSource protocol as follows:


    `class AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource {`


    Click on the AppDelegate.swift file in the Project Navigator pane.   Underneath
    the IBOutlet lines, add the following line to create an array of strings that
    will fill the combo box’s item list:


    `let myArray = ["Sandwich", "Chips", "Soda", "Salad"]`


    Modify the applicationDidFinishLaunching function as follows:


    `func applicationDidFinishLaunching(aNotification: NSNotification) {`


    `// Insert code here to initialize your application`


    `myCombo.dataSource = self`


    `myCombo.usesDataSource = true`


    `numberOfItemsInComboBox(myCombo)`


    `comboBox(myCombo, objectValueForItemAtIndex: 0)`


    `}`


    This Swift code defines the data source for the combo box (identified by the myCombo
    IBOutlet) as self, which means the same class is also the data source. It makes
    sure the usesDataSource property is true to use a data source. Then it calls two
    functions defined by the NSComboBoxDataSource protocol.


    Above the IBAction method, add the following two function implementations:


    `func numberOfItemsInComboBox(aComboBox: NSComboBox) -> Int {`


    `return myArray.count`


    `}`


    `func comboBox(aComboBox: NSComboBox, objectValueForItemAtIndex index: Int) ->
    AnyObject {`


    `return myArray[index]`


    `}`


    The numberOfItemsInComboBox function counts all the items in the myArray array
    and returns that integer. The comboBox function places each array item in the
    combo box’s item list.


    Choose Product ➤ Run.   Click on the downward-pointing arrow of the combo box.
    Notice that its item list contains the items defined in myArray (“Sandwich,” “Chips,”
    “Soda,” and “Salad”).   Click on Sandwich in the combo box to select it and then
    click the push button. Notice that the label underneath displays Sandwich.   Choose
    ComboProgram ➤ Quit ComboProgram.


    This simple program shows how to retrieve a list of items from another data source
    (in this case an array called myArray) to fill an item list for a combo box. The
    complete code for the AppDelegate.swift file should look like this:


    `import Cocoa`


    `@NSApplicationMain`


    `class AppDelegate: NSObject, NSApplicationDelegate, NSComboBoxDataSource {`


    `@IBOutlet weak var window: NSWindow!`


    `@IBOutlet weak var myCombo: NSComboBox!`


    `@IBOutlet weak var comboResult: NSTextField!`


    `let myArray = ["Sandwich", "Chips", "Soda", "Salad"]`


    `func applicationDidFinishLaunching(aNotification: NSNotification) {`


    `// Insert code here to initialize your application`


    `myCombo.usesDataSource = true`


    `myCombo.dataSource = self`


    `numberOfItemsInComboBox(myCombo)`


    `comboBox(myCombo, objectValueForItemAtIndex: 0)`


    `}`


    `func applicationWillTerminate(aNotification: NSNotification) {`


    `// Insert code here to tear down your application`


    `}`


    `func numberOfItemsInComboBox(aComboBox: NSComboBox) -> Int {`


    `return myArray.count`


    `}`


    `func comboBox(aComboBox: NSComboBox, objectValueForItemAtIndex index: Int) ->
    AnyObject {`


    `return myArray[index]`


    `}`


    `@IBAction func showResult(sender: NSButton) {`


    `comboResult.stringValue = myCombo.stringValue`


    `}`


    `}`


    ## Summary


    Text fields allow the user to type anything such as numbers or strings, so a text
    field offers multiple properties (intValue, floatValue, doubleValue, and stringValue)
    to store typed information in the proper data type. To restrict numeric information
    the user may type, you can use a number formatter to define minimum and/or maximum
    values along with defining different ways the user can enter numeric data such
    as with a percentage sign or a currency sign.


    Besides ordinary text fields, Xcode offers several variations of text fields for
    specialized purposes. Labels are designed for simply displaying text without allowing
    the user to edit the displayed text. A secure text field masks typed in data to
    keep it safe from prying eyes. A token field displays typed in data as groups
    or tokens while a search field offers a property to remember previously typed
    in data.


    Combo boxes combine the features of a text field with a pop-up button. A combo
    box can display a list of valid options that the user can click on, or the user
    can type in data. You can define a combo box’s list of options in the Show Attributes
    Inspector pane, or you can retrieve data from another source such as from an array.


    The main purpose of text fields and combo boxes is to allow the user to type in
    any type of data. When the user types in data, you may need to write Swift code
    to verify that the entered data is actually valid for your program.


    # 18. Using Alerts and Panels


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​18](http://dx.doi.org/10.1007/978-1-4842-1233-2_18))
    contains supplementary material, which is available to authorized users.


    With every program, you’ll need to design the unique features of your program
    while letting the Cocoa framework worry about making your program look and behave
    like a standard OS X program. Two common features of nearly every OS X program
    are alerts and panels.


    An alert typically pops up on the screen to inform the user such as asking the
    user to verify the deletion of a file or to alert the user of a problem. A panel
    displays common user interface items such as a print panel that OS X programs
    typically display to give you options for printing, or an open panel for selecting
    a file.


    By using alerts and panels, you can add common OS X user interface elements without
    having to create your own user interface or without needing to write Swift code.
    Alerts and panels are part of the Cocoa framework that your OS X programs can
    use to create a standard OS X user interface.'
  trans: "\n### 使用数据源\n\n当组合框需要显示可能随时间变化的数据时（例如显示来自数据库的信息列表），使用数据源是最佳方式。要使用数据源，你需要编写\
    \ Swift 代码。首先，你需要在类中遵循 `NSComboBoxDataSource` 协议，如下所示：\n\n```\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate, NSComboBoxDataSource {\n```\n\n接下来，你需要编写两个函数。一个函数需要计算要在组合框中显示的项数。第二个函数需要检索数据以插入到组合框的项列表中。\n\
    \n最后，你需要指定一个数据源（包含你想在组合框中显示的数据的文件），并确保在“显示属性检查器”窗格中选中了组合框的 `usesDataSource` 属性，或者通过\
    \ Swift 代码将其设置为 `true`。\n\n要了解数据源如何将项列表填充到组合框中，请按以下步骤操作：\n\n确保 `ComboProgram`\
    \ 项目已在 Xcode 中加载。修改类名以包含 `NSComboBoxDataSource` 协议，如下所示：\n\n```\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate, NSComboBoxDataSource {\n```\n\n在“项目导航器”窗格中点击\
    \ `AppDelegate.swift` 文件。在 `IBOutlet` 行下方，添加以下行以创建一个将填充组合框项列表的字符串数组：\n\n```\n\
    let myArray = [\"三明治\", \"薯片\", \"苏打水\", \"沙拉\"]\n```\n\n修改 `applicationDidFinishLaunching`\
    \ 函数，如下所示：\n\n```\nfunc applicationDidFinishLaunching(aNotification: NSNotification)\
    \ {\n\n    // 在此处插入代码以初始化你的应用程序\n    myCombo.dataSource = self\n    myCombo.usesDataSource\
    \ = true\n    numberOfItemsInComboBox(myCombo)\n    comboBox(myCombo, objectValueForItemAtIndex:\
    \ 0)\n\n}\n```\n\n这段 Swift 代码将组合框的数据源（由 `myCombo` IBOutlet 标识）定义为 `self`，这意味着同一个类同时也是数据源。它确保\
    \ `usesDataSource` 属性为 `true` 以使用数据源。然后它调用了由 `NSComboBoxDataSource` 协议定义的两个函数。\n\
    \n在 IBAction 方法上方，添加以下两个函数实现：\n\n```\nfunc numberOfItemsInComboBox(aComboBox:\
    \ NSComboBox) -> Int {\n    return myArray.count\n}\n\nfunc comboBox(aComboBox:\
    \ NSComboBox, objectValueForItemAtIndex index: Int) -> AnyObject {\n    return\
    \ myArray[index]\n}\n```\n\n`numberOfItemsInComboBox` 函数计算 `myArray` 数组中的所有项并返回该整数。`comboBox`\
    \ 函数将每个数组项放入组合框的项列表中。\n\n选择“产品”➤“运行”。点击组合框向下的箭头。注意其项列表包含了 `myArray` 中定义的项（“三明治”、“薯片”、“苏打水”和“沙拉”）。在组合框中点击“三明治”以选中它，然后点击按钮。注意下方的标签显示“三明治”。选择“ComboProgram”➤“退出\
    \ ComboProgram”。\n\n这个简单的程序展示了如何从另一个数据源（本例中是一个名为 `myArray` 的数组）检索项列表，以填充组合框的项列表。`AppDelegate.swift`\
    \ 文件的完整代码应如下所示：\n\n```\nimport Cocoa\n\n@NSApplicationMain\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate, NSComboBoxDataSource {\n\n    @IBOutlet weak\
    \ var window: NSWindow!\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet\
    \ weak var comboResult: NSTextField!\n\n    let myArray = [\"三明治\", \"薯片\", \"\
    苏打水\", \"沙拉\"]\n\n    func applicationDidFinishLaunching(aNotification: NSNotification)\
    \ {\n        // 在此处插入代码以初始化你的应用程序\n        myCombo.usesDataSource = true\n   \
    \     myCombo.dataSource = self\n        numberOfItemsInComboBox(myCombo)\n  \
    \      comboBox(myCombo, objectValueForItemAtIndex: 0)\n    }\n\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n        // 在此处插入代码以终止应用程序\n    }\n\n    func numberOfItemsInComboBox(aComboBox:\
    \ NSComboBox) -> Int {\n        return myArray.count\n    }\n\n    func comboBox(aComboBox:\
    \ NSComboBox, objectValueForItemAtIndex index: Int) -> AnyObject {\n        return\
    \ myArray[index]\n    }\n\n    @IBAction func showResult(sender: NSButton) {\n\
    \        comboResult.stringValue = myCombo.stringValue\n    }\n\n}\n```\n\n##\
    \ 总结\n\n文本字段允许用户输入任何内容，例如数字或字符串，因此文本字段提供了多个属性（`intValue`、`floatValue`、`doubleValue`\
    \ 和 `stringValue`）以将输入的信息存储为适当的数据类型。要限制用户可能输入的数字信息，你可以使用数字格式化器来定义最小值和/或最大值，同时定义用户可以输入数字数据的不同方式，例如使用百分号或货币符号。\n\
    \n除了普通的文本字段外，Xcode 还提供了几种用于特定目的的文本字段变体。标签仅用于显示文本，不允许用户编辑显示的文本。安全文本字段会屏蔽输入的数据，以防止被窥视。令牌字段将输入的数据显示为组或令牌，而搜索字段则提供了一个属性来记住之前输入的数据。\n\
    \n组合框结合了文本字段和弹出按钮的功能。组合框可以显示一个有效选项列表，用户可以点击这些选项，也可以自行输入数据。你可以在“显示属性检查器”窗格中定义组合框的选项列表，也可以从其他来源（如数组）检索数据。\n\
    \n文本字段和组合框的主要目的是让用户能够输入任何类型的数据。当用户输入数据时，你可能需要编写 Swift 代码来验证输入的数据对你的程序是否确实有效。\n\
    \n# 18. 使用警告和面板\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_18](http://dx.doi.org/10.1007/978-1-4842-1233-2_18))\
    \ 包含补充材料，可供授权用户使用。\n\n在每个程序中，你都需要设计程序的独特功能，同时让 Cocoa 框架负责让你的程序看起来和表现得像标准的 OS X\
