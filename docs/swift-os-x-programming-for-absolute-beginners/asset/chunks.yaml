    In the world of object-oriented programming, you can extend a class through inheritance,
    which inherits every property and method that class may have inherited from other
    classes. In the world of protocol-oriented programming, you can extend a protocol
    through protocol extensions.


    One purpose for protocol extensions is to define default values for properties.
    You could define default values by simply assigning values to one or more properties
    such as:


    `protocol Cat {`


    `var name: String { get }`


    `var age: Int { get }`


    `}`


