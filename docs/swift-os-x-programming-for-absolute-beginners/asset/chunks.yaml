  trans: "\n尽管公式看似正确，但错误之所以发生，是因为 Swift（以及大部分编程语言）计算公式的方式。首先，它们从左到右进行计算。其次，它们会先计算乘法等运算，再计算加法。\n\
    \n错误之所以发生，是因为我们的转换公式首先将 32 乘以 9（得到 288），然后将结果（288）除以 5 得到 57.6。最后，它将 57.6 加到 100.0\
    \ 上，得到错误结果 157.6。而正确的做法应该是将 9/5 乘以摄氏温度，然后将结果加上 32。\n\n按如下方式修改 `C2F` 函数：\n\n```\n\
    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF = tempC\
    \ * (9/5) + 32\n    print (tempF)\n    return tempF\n}\n```\n\n选择“产品” ➤ “运行”。程序会显示一个空白用户界面。选择“DebugProgram”\
    \ ➤ “退出 DebugProgram”。Xcode 会再次出现。查看调试区，你会发现程序现在正确地将 100 摄氏度转换为 212 华氏度。\n\n对于简单的调试，临时将代码变为注释并使用\
    \ `print` 命令是可行的，但反复添加和移除注释符号以及 `print` 命令会相当笨拙。更好的解决方案是使用断点和变量监视，这本质上与使用注释和 `print`\
    \ 命令的效果相同。\n\n## 使用 Xcode 调试器\n\n虽然注释和 `print` 命令可以帮助你隔离代码中的问题，但它们用起来可能很笨拙。`print`\
    \ 命令尤其繁琐，因为你必须将它输入到代码中，然后在准备发布程序时再记得将其删除。\n\n尽管在程序中遗留一个或多个 `print` 命令不太可能损害程序的性能，但在程序中保留不再起任何作用的代码是一种糟糕的编程实践。\n\
    \n作为在程序中到处输入 `print` 命令的替代方案，Xcode 提供了使用 Xcode 调试器的更便捷方式。调试器提供了两种查找和识别程序中 bug\
    \ 的方法：\n\n-   断点\n-   变量监视\n\n### 使用断点\n\n断点允许你指定代码中希望程序暂停执行的特定行。程序暂停后，你可以逐行单步执行代码。在执行过程中，你还可以查看一个或多个变量的内容，以检查变量是否持有正确的值。\n\
    \n例如，如果你的程序将摄氏温度转换为华氏温度，但不知何故将 100 摄氏度转换为 -41259 华氏度，你就知道代码运行不正常。通过在代码中插入断点并检查每个断点处的变量值，你可以找出代码计算值的位置。一旦发现计算错误的代码行，你就找到了程序中需要修复的确切区域。\n\
    \n你可以通过以下任一方式设置断点：\n\n-   单击要设置断点的代码左侧\n-   将光标移到要设置断点的行，然后按 Command + \\\n- \
    \  将光标移到要设置断点的行，然后选择“调试” ➤ “断点” ➤ “在当前行添加断点”\n\n### 单步执行代码\n\n一旦断点停止了程序的运行，你可以使用“单步执行”命令逐行浏览代码。Xcode\
    \ 提供多种不同的“单步执行”命令，但最常用的三个是：\n\n-   单步跳过\n-   单步进入\n-   单步跳出\n\n“单步跳过”命令会执行下一行代码，并将函数或方法调用视为单行代码。\n\
    \n“单步进入”命令的工作方式与“单步跳过”命令完全相同，直到它高亮显示一个函数或方法调用。此时，它会跳转到该函数或方法的第一行代码。\n\n“单步跳出”命令用于提前退出通过“单步进入”命令进入的函数或方法。“单步跳出”命令会返回到调用函数或方法的代码行。\n\
    \n所有这三个单步执行命令都在程序暂时停在断点处后使用。通过使用单步命令，你可以逐行检查代码，并查看存储在不同变量中的值如何变化。\n\n这种变量监视允许你检查一个或多个变量的内容，以验证它是否持有正确的数据。一旦发现某个变量持有错误数据，你就可以锁定产生该错误的代码行。\n\
    \n断点最大的优点在于你可以轻松添加和移除它们，因为它们完全不会修改代码，这与注释和多个 `print` 命令不同。Xcode 可以为你自动移除所有断点，因此你无需在代码中逐一寻找并移除它们。\n\
    \n要了解如何使用断点、单步命令和变量监视，请按照以下步骤操作：\n\n选择“调试” ➤ “单步跳出”（或按 F8）。Xcode 会高亮显示调用 `C2F`\
    \ 函数的代码行。  \n选择“调试” ➤ “继续”以继续运行程序，直到遇到下一个断点。在此程序中只有一个断点，因此程序会显示其空白的用户界面。  \n选择“DebugProgram”\
    \ ➤ “退出 DebugProgram”。Xcode 窗口会再次出现。  \n选择“调试” ➤ “停用断点”。Xcode 会使断点变暗。Xcode 将忽略已停用的断点。\
    \  \n选择“产品” ➤ “运行”。请注意，由于你已停用断点，Xcode 会忽略它并通过显示空白的用户界面来运行程序。  \n选择“DebugProgram”\
    \ ➤ “退出 DebugProgram”。Xcode 窗口会再次出现。  \n多次选择“调试” ➤ “单步跳过”（或按 F6），直到 Xcode 高亮显示以下代码行：`print\
    \ (myMessage + \"\\(C2F(temp))\")`  \n选择“调试” ➤ “单步进入”（或按 F7）。Xcode 现在会高亮显示 `C2F`\
    \ 函数的第一行代码，如图 23-7 所示。\n\n![A978-1-4842-1233-2_23_Fig7_HTML.jpg](img/A978-1-4842-1233-2_23_Fig7_HTML.jpg)\
    \  \n图 23-7. “单步进入”命令允许你逐行执行函数或方法中存储的代码\n\n选择“调试” ➤ “单步跳过”（或按 F6）。Xcode 会高亮显示断点下的下一行代码。调试区左侧的信息会显示程序当前使用的值，如图\
    \ 23-6 所示。请注意，在断点代码运行后，`myMessage` 变量的值现在被定义为字符串“Temperature in Celsius:”。\n\n\
    ![A978-1-4842-1233-2_23_Fig6_HTML.jpg](img/A978-1-4842-1233-2_23_Fig6_HTML.jpg)\
    \  \n图 23-6. 通过观察变量如何变化，可以看到每一行代码如何影响每个变量\n\n选择“产品” ➤ “运行”。请注意，Xcode 会高亮显示断点所在的代码行，如图\
    \ 23-5 所示。请注意，最初 `myMessage` 变量的值未定义。\n\n![A978-1-4842-1233-2_23_Fig5_HTML.jpg](img/A978-1-4842-1233-2_23_Fig5_HTML.jpg)\
    \  \n图 23-5. 断点会暂停程序执行，以便你检查其当前状态\n\n确保在 Xcode 中加载了 DebugProgram 项目。  \n在项目导航器窗格中单击\
    \ `AppDelegate.swift` 文件。  \n按如下方式修改 `C2F` 函数：\n\n```\nfunc C2F (tempC : Double)\
    \ -> Double {\n    var tempF : Double\n    tempF = tempC + 32 * 9/5\n    return\
    \ tempF\n}\n```\n\n将光标移动到 `applicationDidFinishLaunching` 函数中下面这行代码内的任意位置：`var\
    \ myMessage = \"Temperature in Celsius:\"`  \n选择“调试” ➤ “断点” ➤ “在当前行添加断点”。Xcode\
    \ 会显示一个断点，如图 23-4 中的蓝色箭头所示。\n\n![A978-1-4842-1233-2_23_Fig4_HTML.jpg](img/A978-1-4842-1233-2_23_Fig4_HTML.jpg)\
    \  \n图 23-4. 断点出现在 Swift 代码的左侧\n"
- fmt: '### Managing Breakpoints


    There’s no limit to the number of breakpoints you can put in a program so feel
    free to place as many as you need to help you track down an error. Of course if
    you place breakpoints in a program, you may lose track of how many breakpoints
    you’ve set and where they might be set. To help you manage your breakpoints, Xcode
    offers a Breakpoint Navigator.


    You can open the Breakpoint Navigator in one of three ways:


    - Choose `View ➤ Navigators ➤ Show Breakpoint Navigator`

    - Press `Command+7`

    - Click the `Show Breakpoint Navigator` icon in the Navigator pane


    The Breakpoint Navigator lists all the breakpoints set in your program, identifies
    the files the breakpoints are in, and the line number of each breakpoint as shown
    in Figure [23-8](#A978-1-4842-1233-2_23_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_23_Fig8_HTML.jpg](A978-1-4842-1233-2_23_Fig8_HTML.jpg)


    Figure 23-8. The Breakpoint Navigator identifies all your breakpoints


    Since the Breakpoint Navigator identifies breakpoints by line number, you might
    want to display line numbers in the Xcode editor (see Figure [23-8](#A978-1-4842-1233-2_23_Chapter.html#Fig8)).
    To turn on line numbers, follow these steps:


    1. Choose `Xcode ➤ Preferences`. The Xcode Preferences window appears.

    2. Click the `Text Editing` icon. The Text Editing options appear.

    3. Select the `Line numbers` check box as shown in Figure [23-9](#A978-1-4842-1233-2_23_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_23_Fig9_HTML.jpg](A978-1-4842-1233-2_23_Fig9_HTML.jpg)


    Figure 23-9. The `Line numbers` check box lets you show or hide line numbers in
    the Xcode editor


    Click on the close button (the red button) in the upper left corner of the Xcode
    Preferences window. Xcode now displays line numbers in the left margin of the
    editor.


    To see how to use the Breakpoint Navigator, follow these steps:


    1. Choose `Disable Breakpoint`. Notice this lets you deactivate or disable breakpoints
    individually instead of deactivating all of them at once through the `Debug ➤
    Deactivate Breakpoints` command.

    2. Right-click on any breakpoint in the Breakpoint Navigator pane and choose `Delete
    Breakpoint`. (Another way to delete a breakpoint is to drag the breakpoint away
    from your code and release the left mouse button.)

    3. Delete all your breakpoints until no more breakpoints are left.

    4. Make sure the `DebugProgram` project is loaded in Xcode.

    5. Turn on line numbers in Xcode.

    6. Click on the `AppDelegate.swift` file in the Project Navigator pane.

    7. Place three breakpoints anywhere in your code using whatever method you like
    best such as clicking in the left margin of the Xcode editor, pressing `Command+\`,
    or choosing `Debug ➤ Breakpoints ➤ Add Breakpoint at Current Line`. (The exact
    location doesn’t matter.)

    8. Click on the `MainMenu.xib` file in the Project Navigator pane. Xcode displays
    the user interface of your program.

    9. Choose `View ➤ Navigators ➤ Show Breakpoint Navigator`. The Breakpoint Navigator
    displays your three breakpoints.

    10. Click on any breakpoint. Xcode displays the file containing your chosen breakpoint.

    11. Right-click on any breakpoint in the Breakpoint Navigator pane. A pop-up menu
    appears as shown in Figure [23-10](#A978-1-4842-1233-2_23_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_23_Fig10_HTML.jpg](A978-1-4842-1233-2_23_Fig10_HTML.jpg)


    Figure 23-10. The Breakpoint Navigator lets you see where you have placed breakpoints


    ### Using Symbolic Breakpoints


    When you create a breakpoint, you must place it on the line where you want your
    program’s execution to temporarily stop. However, this often means guessing where
    the problem might be and then using the various step commands to examine your
    code line by line.


    To avoid this problem, Xcode offers a symbolic breakpoint. A symbolic breakpoint
    stops program execution only when a specific function or method runs. In case
    you don’t want your program’s execution to stop every time a particular function
    or method runs, you can tell Xcode to ignore it a certain number of times such
    as ten. That means the function or method will run up to ten times and then on
    the eleventh time it’s called, the symbolic breakpoint will temporarily halt execution
    so you can step through your code line by line.


    To create a symbolic breakpoint, you can define the following:


    - `Symbol` – The name of the function or method to halt program execution.

    - `Module` – The file name containing the function or method defined by the `Symbol`
    text field.

    - `Ignore` – The number of times from 0 or more that you want the function or
    method to run before temporarily halting program execution.


    To see how a Symbolic breakpoint works, follows these steps:


    1. Choose `Product ➤ Stop` to make your program stop running.

    2. Choose `View ➤ Navigators ➤ Show Breakpoint Navigator`. The Breakpoint Navigator
    pane appears.

    3. Right-click on the `C2F` breakpoint in the Breakpoint Navigator pane and when
    a pop-up menu appears, choose `Delete Breakpoint`. There should be no breakpoints
    displayed in the Breakpoint Navigator pane.

    4. Click in the `Symbol` text field and type `C2F`, which is the name of the function
    or method you want to examine.

    5. (Optional) If the function or method name you specified in the `Symbol` text
    field is used in other files, click in the `Module` text field and type a file
    name. This file name will limit the symbolic breakpoint only to that function
    or method in that particular file. Since the `C2F` function is only used once,
    you can leave the `Module` text field empty.

    6. (Optional) Click in the `Ignore` text field and type a number to specify how
    many times to ignore a function or method being called before halting program
    execution. In this case, leave `0` in the `Ignore` text field.

    7. Click anywhere away from the Symbolic Breakpoint pop-up window to make it disappear.

    8. Choose `Product ➤ Run`. The `C2F` Symbolic breakpoint causes the program to
    temporarily halt execution on the first line of code in the `C2F` function that
    calculates a result as shown in Figure [23-12](#A978-1-4842-1233-2_23_Chapter.html#Fig12).


    ![A978-1-4842-1233-2_23_Fig12_HTML.jpg](A978-1-4842-1233-2_23_Fig12_HTML.jpg)


    Figure 23-12. The Symbolic breakpoint halts program execution in the `C2F` function
    defined by the `Symbol` text field


    9. Make sure the `DebugProgram` project is loaded in Xcode.

    10. Choose `Debug ➤ Breakpoints ➤ Create Symbolic Breakpoint`. A Symbolic Breakpoint
    pop-up window appears as shown in Figure [23-11](#A978-1-4842-1233-2_23_Chapter.html#Fig11).


    ![A978-1-4842-1233-2_23_Fig11_HTML.jpg](A978-1-4842-1233-2_23_Fig11_HTML.jpg)


    Figure 23-11. The Symbolic Breakpoint pop-up window lets you define a breakpoint


    > **Note**: Another way to set a breakpoint without specifying a specific line
    of code is to create an Exception breakpoint. Normally if your program crashes,
    Xcode displays a bunch of cryptic error messages and you have no idea what caused
    the error. If you set an Exception breakpoint, Xcode can identify the line of
    code that created the crash so you can fix it.'
