    button. Xcode asks where you want to store the project.   Choose a folder to store
    your project and click the Create button.   Click the MainMenu.xib file in the
    Project Navigator. Your program’s user interface appears.   Click the MenuProgram
    icon to display the window of your program’s user interface.   Choose View ➤ Utilities
    ➤ Show Object Library. The Object Library appears in the bottom right corner of
    the Xcode window.   Drag a Text Field on to the user interface window. You may
    want to widen the width of the text field.   Drag a Menu Item from the Object
    Library to the bottom of the File menu. You can either drag the Menu Item on to
    the File pull-down menu or in the Document Outline as shown in Figure [19-13](#A978-1-4842-1233-2_19_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_19_Fig13_HTML.jpg](A978-1-4842-1233-2_19_Fig13_HTML.jpg)


    Figure 19-13.


    Drag a Menu Item to the bottom of the File pull-down menu


    `@IBOutlet weak var textResult: NSTextField!`


    Move the mouse pointer over the Menu Item you just added to the bottom of the
    File pull-down menu (either on the pull-down menu or in the Document Outline),
    hold down the Control key, and drag the mouse above the last curly bracket in
    the bottom of the AppDelegate.swift file.   Release the Control key and the mouse
    button. A pop-up window appears.   Click in the Connection pop-up menu and choose
    Action.   Click in the Name text field and type myMenu.   Click in the Type pop-up
    menu, choose NSMenuItem, and click the Connect button. Xcode creates an empty
    IBAction method.   Modify the IBAction method as follows:


    `@IBAction func myMenu(sender: NSMenuItem) {`


    `textResult.stringValue = "Clicked on = " + sender.title    }`


    Release the Control key and the mouse button. Xcode connects the Save command
    to the myMenu IBAction method.   Choose Product ➤ Run. The user interface appears.
      Click on the File menu title. Notice that your Menu Item (labeled Item) appears
    at the bottom of the File pull-down menu.   Click on the Save command. The text
    field displays “Clicked on = Save…”   Click on the File menu title and click on
    Item, which is the Menu Item you added. The text field displays “Clicked on =
    Item.”   Choose MenuProgram ➤ Quit MenuProgram.   Click the close icon (the X)
    that appears to the left of First Responder. This cuts the connection between
    the Save command and the saveDocument IBAction method.   Move the mouse pointer
    over the Save command on the File pull-down menu, hold down the Control key, and
    drag the mouse over the myMenu IBAction method you created in step 22\. Make sure
    Xcode highlights the entire IBAction method and displays Connect Action as shown
    in Figure [19-15](#A978-1-4842-1233-2_19_Chapter.html#Fig15).


    ![A978-1-4842-1233-2_19_Fig15_HTML.jpg](A978-1-4842-1233-2_19_Fig15_HTML.jpg)


    Figure 19-15.


    Connecting the Save command to an existing IBAction method   Click on the Save
    command on the File pull-down menu.   Choose View ➤ Utilities ➤ Show Connections
    Inspector. The Connections Inspector pane shows that the Save command is connected
    to the saveDocument IBAction method in the First Responder as shown in Figure
    [19-14](#A978-1-4842-1233-2_19_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_19_Fig14_HTML.jpg](A978-1-4842-1233-2_19_Fig14_HTML.jpg)


    Figure 19-14.


    The Connections Inspector for the Save command in the File pull-down menu


    The MenuProgram project shows how to connect a menu command to text field so the
    text field displays the name of the menu command that the user clicked on. However,
    when working with storyboards, connecting menu commands works a little differently.


    The main difference is that in a storyboard, the pull-down menus are stored in
    a separate scene from the actual user interface as shown in Figure [19-16](#A978-1-4842-1233-2_19_Chapter.html#Fig16).


    ![A978-1-4842-1233-2_19_Fig16_HTML.jpg](A978-1-4842-1233-2_19_Fig16_HTML.jpg)


    Figure 19-16.


    Pull-down menus appear in a separate scene from the user interface in a storyboard


    That means when you Control-drag on a pull-down menu command, Xcode stores your
    Swift code in the AppDelegate.swift file, but if you Control-drag on a user interface
    item such as a text field, Xcode stores your Swift code in the ViewController.swift
    file.


    Essentially this means if you create an IBOutlet for a text field, it’s stored
    in the ViewController.swift file while your IBAction method for your pull-down
    menu commands are stored in the AppDelegate.swift file, which means the IBOutlet
    doesn’t know the IBAction method exists (and vice versa).


    The way around this problem is to connect your pull-down menu commands to the
    First Responder icon. This means that your program will first look for an IBAction
    method in its AppDelegate.swift file, but then will also look for the same IBAction
    method in other files as well.


    So the trick is to create an empty IBAction method in the AppDelegate.swift file
    and an identical IBAction method in the ViewController.swift file, except you
    fill this second IBAction method with Swift code to make it retrieve the title
    of the selected menu command.


    To see how menu commands work with storyboards, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type StoryMenu.
      Make sure the Language pop-up menu displays Swift and that only the “Use storyboards”
    check box is selected.   Click the Next button. Xcode asks where you want to store
    the project.   Choose a folder to store your project and click the Create button.
      Click the Main.storyboard file in the Project Navigator. Your program’s user
    interface appears.   Choose View ➤ Utilities ➤ Show Object Library and drag a
    Text Field on to the user interface (identified by View Controller in its title
    bar). You may want to widen the text field width.   Choose View ➤ Assistant Editor
    ➤ Show Assistant Editor. Xcode shows the ViewController.swift file next to your
    user interface.   Move the mouse pointer over the text field, hold down the Control
    key, and drag the mouse under the class ViewController line.   Release the Control
    key and the mouse. A pop-up window appears.   Click in the Name text field, type
    textResult, and then click the Connect button. Xcode creates the following IBOutlet:


    `@IBOutlet weak var textResult: NSTextField!`'
