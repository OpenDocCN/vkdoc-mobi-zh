- fmt: '# Defining Constraints in an OS X Program


    To fully understand how constraints work, you need to see how they work in an
    actual program. Then you can see how your user interface adjusts each time you
    resize its window. In this sample program, we’ll define relationships constraints
    for a push button and a text field, and also define an aspect ratio for an image.


    Earlier in this chapter you created an OS X project called `UIProgram` so we’ll
    use that to see how constraints work:


    Make sure your `UIProgram` project is loaded in `Xcode`. Click the `MainMenu.xib`
    file in the Project Navigator. Click on the `UIProgram` icon to make the window
    of the user interface appear. Choose **View** ➤ **Utilities** ➤ **Show Object
    Library** to make the Object Library appear in the bottom right corner of the
    Xcode window. Drag one Push Button, one Text Field, and one Text View on the user
    interface so that it looks similar to Figure [13-27](#A978-1-4842-1233-2_13_Chapter.html#Fig27).


    ![A978-1-4842-1233-2_13_Fig27_HTML.jpg](A978-1-4842-1233-2_13_Fig27_HTML.jpg)


    Figure 13-27.


    The user interface of the `InheritProgram`


    While this user interface may look fine right now, it will look awful as soon
    as the user resizes the window. Choose **Product** ➤ **Run** and then resize the
    window to see how shrinking the window cuts off or hides items on the user interface.
    Now expand the size of the window and notice all the empty space inside the expanded
    window. Exit out of your program by choosing **UIProgram** ➤ **Quit UIProgram**.


    First, let’s define the window’s minimum size by following these steps:


    Move the mouse pointer over the bottom right corner of the frame that surrounds
    your user interface window. Drag the mouse until you see blue guidelines showing
    the boundary between your button and window edge as shown in Figure [13-28](#A978-1-4842-1233-2_13_Chapter.html#Fig28).


    ![A978-1-4842-1233-2_13_Fig28_HTML.jpg](A978-1-4842-1233-2_13_Fig28_HTML.jpg)


    Figure 13-28.


    Adjusting the size of the user interface window Click the frame surrounding the
    user interface window and choose **View** ➤ **Utilities** ➤ **Show Size Inspector**
    to display the window constraints (see Figure [13-16](#A978-1-4842-1233-2_13_Chapter.html#Fig16)).
    Click the **Minimum Size** check box to define the current window size as its
    minimum size. Choose **Product** ➤ **Run**. Resize the user interface window.
    Notice that you can only shrink the window to a certain size. Choose **UIProgram**
    ➤ **Quit UIProgram**.


    By defining a minimum window size, you’ve kept your user interface from getting
    cut off or having items disappear if the user shrinks the window too small. Now
    let’s add constraints to make the user interface adapt if the user expands the
    window size.


    Move the mouse pointer over the button, hold down the **Control** key, and drag
    the mouse to the right and stop right before the window’s right edge as shown
    in Figure [13-29](#A978-1-4842-1233-2_13_Chapter.html#Fig29).


    ![A978-1-4842-1233-2_13_Fig29_HTML.jpg](A978-1-4842-1233-2_13_Fig29_HTML.jpg)


    Figure 13-29.


    Adjusting the size of the user interface window Release the **Control** key and
    the mouse. A pop-up window appears. Choose **Trailing Space to Container**. Notice
    that the constraints appear in orange to show that you don’t have enough constraints
    on the button yet. Move the mouse pointer over the button, hold down the **Control**
    key, and drag the mouse down and stop right before the window’s bottom edge. Release
    the **Control** key and the mouse. A pop-up window appears. Choose **Bottom Space
    to Container**. Click on the text field to select it. Choose **Editor** ➤ **Resolve
    Auto Layout Issues** ➤ **Add Missing Constraints**. Xcode adds constraints automatically
    as shown in Figure [13-30](#A978-1-4842-1233-2_13_Chapter.html#Fig30).


    ![A978-1-4842-1233-2_13_Fig30_HTML.jpg](A978-1-4842-1233-2_13_Fig30_HTML.jpg)


    Figure 13-30.


    Constraints on the text field Move the mouse pointer anywhere over the Text View.
    Hold down the **Control** key and drag the mouse at a 45 degree angle up or down
    as shown in Figure [13-31](#A978-1-4842-1233-2_13_Chapter.html#Fig31).


    ![A978-1-4842-1233-2_13_Fig31_HTML.jpg](A978-1-4842-1233-2_13_Fig31_HTML.jpg)


    Figure 13-31.


    Defining an aspect ratio constraint Release the **Control** key and the mouse.
    A pop-up window appears. Choose **Aspect Ratio** to keep the width and height
    in proportion. Xcode displays orange constraints around the Text View to indicate
    that you don’t have enough constraints on the Text View. Click the **Resolve Auto
    Layout Issues** icon in the bottom right corner and choose **Add Missing Constraints**.
    Xcode adds missing constraints so they now appear in blue. Choose **Product**
    ➤ **Run**. Resize the window. Notice how the user interface items adjust when
    you expand the window size. As you can see, constraints keep user interface items
    in their proper place and size no matter how the user resizes the window. Feel
    free to experiment with editing your constraints to see how they work. Choose
    **UIProgram** ➤ **Quit UIProgram**.


    ## Summary


    Your program’s user interface determines how people interact with your program.
    Every user interface needs to display information, retrieve information from the
    user, and allow the user to choose commands. Ideally a user interface should focus
    more on using your program and less on figuring out how the user interface works.


    The `Object Library` displays all possible items you can add to your user interface
    whether you use `.xib` or `.storyboard` files. To help you find items in the `Object
    Library`, you can type all or part of a word in the search field at the bottom
    of the `Object Library`.


    Constraints help keep your user interface looking good no matter how the user
    resizes your program’s windows. The two basic types of constraints involve the
    following:


    *   Relationship constraints that define the distance between neighboring items
    such as between two buttons or a button and the edge of a window.

    *   Size constraints that define the height, width, or aspect ratio of an item.


    You can define constraints on your own, let Xcode define constraints, or use a
    combination of both. Defining constraints may be a trial and error process until
    your user interface adapts to resizing windows exactly the way you want.


    # Working with Views and Storyboards


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​14](http://dx.doi.org/10.1007/978-1-4842-1233-2_14))
    contains supplementary material, which is available to authorized users.


    The most common part of every program’s user interface is a window that displays
    items such as buttons and text fields. In Xcode, windows are called `views`. In
    all but the simplest programs, a user interface will likely consist of two or
    more windows or views. That means your program needs to know how to open additional
    windows and close them again.


    The two ways to create and store views are `.xib` files and `.storyboard` files.
    A `.xib` file holds one view so if you need to display multiple views, you’ll
    need to create multiple `.xib` files. A `.storyboard` file can hold one or more
    views.


    You can create user interfaces with either `.xib` or `.storyboard` files, or a
    combination of both. Generally, `.storyboard` files are best for windows that
    logically link together. The biggest advantage of `.storyboard` files is that
    they link multiple views together in a logical sequence. The biggest disadvantage
    of `.storyboard` files is that if you have multiple views in your program, there
    may not be a logical sequence between displaying different views in a particular
    order. In that case, a `.storyboard` file can appear cluttered and be difficult
    to organize.


    Whether you use `.xib` or `.storyboard` files is less important than knowing how
    to design a good user interface that makes performing tasks as easy as possible
    for the user.'
