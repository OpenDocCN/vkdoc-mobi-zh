    runs the set of code associated with the first true Boolean value and ignores
    all the rest of the code as shown in Figure [7-5](#A978-1-4842-1233-2_7_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_7_Fig5_HTML.jpg](A978-1-4842-1233-2_7_Fig5_HTML.jpg)


    Figure 7-5.


    Running an if-else if statement with multiple true Boolean values


    ## The switch Statement


    An if-else if statement lets you create two or more sets of code that can possibly
    run. Unfortunately, an if-else if statement can be hard to understand when there’s
    too many Boolean values to check. To fix this problem, Swift offers a switch statement.


    A switch statement works much like an if-else if statement except that it’s easier
    to read and write. The main difference is that instead of checking multiple Boolean
    values, a switch statement checks the value of a single variable. Based on the
    value of this single variable, the switch statement can choose to run different
    sets of code.


    A typical switch statement looks like this:


    `switch value/variable/expression {`


    `case value1: // First set of code to run if variable = value1`


    `case value2: // Second set of code to run if variable = value2`


    `case value3: // Third set of code to run if variable = value3`


    `default: // Fourth set of code to run if nothing else runs`


    `}`


    A switch statement starts by examining a fixed value (such as 38 or “Bob”), a
    variable that represents data), or an expression (such as 3 * age where “age”
    is a variable). Ultimately, the switch statement needs to identify a single value
    and match that value to the first “case” statement it finds. The moment it finds
    an exact match, it runs one or more lines of code associated with that “case”
    statement.


    To see how Boolean values work with a case statement, follow these steps:


    Make sure the BooleanPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var whatNumber : Int = 3` `switch whatNumber {`     `case 1: print
    ("The number is 1")`     `case 2: print ("The number is 2")`     `case 3: print
    ("The number is 3")`         `print ("Isn’t this amazing?")`     `case 4: print
    ("The number is 4")`     `case 5: print ("The number is 5")`     `default: print
    ("The number is undefined")` `}`


    Because the value of the “whatNumber” variable is 3, the switch statement matches
    it with “case 3:” and then runs the Swift code that appears after the colon as
    shown in Figure [7-6](#A978-1-4842-1233-2_7_Chapter.html#Fig6). Note that you
    can store multiple lines of code after the colon and do not need to enclose the
    code within curly brackets. Change the value of the whatNumber variable to see
    how it affects the behavior of the switch statement.


    ![A978-1-4842-1233-2_7_Fig6_HTML.jpg](A978-1-4842-1233-2_7_Fig6_HTML.jpg)


    Figure 7-6.


    Running a switch statement Note


    Unlike other programming languages such as Objective-C, you do not need to use
    a break command to separate code stored in different “case” statements of the
    switch statement.


    The above switch statement is equivalent to:


    `if whatNumber == 1 {`


    `print ("The number is 1")`


    `} else if whatNumber == 2 {`


    `print ("The number is 2")`


    `} else if whatNumber == 3 {`


    `print ("The number is 3")`


    `print ("Isn’t this amazing?")`


    `} else if whatNumber == 4 {`


    `print ("The number is 4")`


    `} else if whatNumber == 5 {`


    `print ("The number is 5")`


    `} else {`


    `print ("The number is undefined")`


    `}`


    As you can see, the switch statement is cleaner and simpler to read and understand.


    When creating a switch statement, you must handle all possibilities. In the above
    switch statement, the whatNumber variable can be any integer, so the switch statement
    can explicitly handle any value from 1 to 5\. If the value does not fall within
    this 1 to 5 range, then the default portion of the switch statement handles any
    other value. If you fail to include a default, then Xcode will flag your switch
    statement as a possible error. (One exception to this rule is if you use a switch
    statement with an enum structure, which you’ll learn about later in this chapter.)
    This is to protect your code from possibly crashing if the switch statement receives
    data it doesn’t know how to handle.'
