    \ command checks if `myOtherSet` [“John,” “Oscar,” “Sally”] contains more items\
    \ and also contains all the items stored in `myNewSet` [“John,” “Oscar”], which\
    \ is also `true`.\n\nFinally, the `isDisjointWith` command checks if `myNewSet`\
    \ [“John,” “Oscar”] has nothing in common with `myThirdSet` [“Rick,” “Vinny”],\
    \ which is also `true` as shown in Figure [10-3](#A978-1-4842-1233-2_10_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1233-2_10_Fig3_HTML.jpg](A978-1-4842-1233-2_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3.** Querying a set"
