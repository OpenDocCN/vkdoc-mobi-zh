  trans: "\n# 视图-模型-控制器设计\n\n编写大型程序时，将所有代码存放在单个文件中是可行的。但这会大大增加在程序中查找特定内容的难度。更好的解决方案是将大型程序划分为多个部分，并将相关部分存储在不同的文件中。这样你就能快速找到需要修改的程序部分，同时也便于多位程序员协作，因为一位程序员可以处理一个文件，另一位程序员可以处理另一个文件。\n\
    \n将程序划分为多个文件时，最好保持条理清晰。就像你可能把袜子放在一个抽屉里，裤子放在另一个抽屉里，以便轻松找到所需衣物一样，你也应该将程序组织成多个文件，每个文件只包含相关的数据。这样你就能快速轻松地找到需要修改的文件。\n\
    \n文件中存储的数据类型通常可分为如图 1-6 所示的三大类别：\n\n![A978-1-4842-1233-2_1_Fig6_HTML.gif](img/A978-1-4842-1233-2_1_Fig6_HTML.gif)\n\
    \n图 1-6.  \n将程序划分为模型-视图-控制器设计\n\n* 视图（用户界面）\n* 模型\n* 控制器\n\n视图或用户界面是用户所看到的内容。每个用户界面的目的都是显示信息、接收数据，并接收来自用户的命令。在过去，程序员通常通过编写代码来创建用户界面。虽然在\
    \ Swift 中你仍可以这样做，但这既耗时又容易出错，而且缺乏一致性，因为一位程序员的用户界面在外观和行为上可能与另一位程序员的用户界面不完全相同。\n\n\
    更好的选择是可视化地设计用户界面，这正是 Xcode 让你能够做到的事情。只需在用户界面上绘制按钮、文本字段和菜单等对象，Xcode 便会自动创建一个无错误、外观一致的界面，且只需花费几秒钟即可完成。当你使用\
    \ Xcode 创建用户界面时，实际上是在使用苹果的 Cocoa 框架来实现。\n\n用户界面本身看起来不错，但什么也做不了。要让程序实现有用的功能，你需要编写解决特定问题的代码。例如，一个彩票选号程序可能会分析最近选中的号码，并确定下周最有可能被选中的号码。代码中用于计算有用结果的部分称为模型。\n\
    \n模型实际上完全独立于视图（用户界面）。这使得修改用户界面变得容易，而不会影响模型（反之亦然）。通过尽可能将程序的不同部分彼此隔离，你可以减少修改程序时发生错误的几率。\n\
    \n由于模型始终完全独立于视图，因此你需要一个控制器。当用户在界面中选择命令或输入数据时，控制器从视图获取该信息并将其传递给模型。\n\n模型响应这些数据或命令，并计算出新的结果。然后它将计算结果发送给控制器，控制器再将其返回给视图，以便用户查看。在任何时候，视图和模型都是完全分离的。\n\
    \n借助 Xcode，这意味着你将把大部分 Swift 代码编写并存储到定义程序模型的文件中。如果你正在计算中奖彩票号码，用于执行这些计算的 Swift 代码将存储在模型中。\n\
    \n你还需要在控制器文件中编写并存储 Swift 代码。在一个简单的程序中，你可能只有一个视图。在更复杂的程序中，你可能会有多个视图。对于每个视图，你通常需要一个控制器文件来控制该视图。因此，你编写和存储\
    \ Swift 代码的第二个位置就是控制器文件。\n\n在简单程序中，通常会将模型与控制器合并到一个文件中。然而，对于更大型、更复杂的程序，更好的做法是为模型创建一个（或多个）文件，并为每个控制器创建一个文件。控制器文件的数量通常等于构成用户界面的视图数量。\n\
    \n一旦你将程序清晰地划分为模型、视图和控制器，你就可以通过用新文件替换旧文件的方式，快速轻松地修改程序。例如，如果你想修改用户界面，只需设计一个不同的视图，将其连接到控制器，就完成了，无需触碰模型文件。\n\
    \n如果你想修改模型以添加新功能，只需更新模型文件并将其连接到控制器，无需触碰视图。\n\n事实上，这正是程序员为 OS X 和 iOS 创建程序的方式。他们的模型保持不变。他们只需为\
    \ OS X 编写一个控制器和视图，为 iOS 编写一个控制器和视图。然后，他们就能使用完全相同的模型创建出 OS X 和 iOS 应用程序。\n"
- fmt: '# How Programmers Work


    In the early days, a single programmer could get an idea and write code to make
    that program work. Nowadays, programs are far more complicated, and user expectations
    are much higher so that you need to design your program before writing any code.
    In fact, most programmers actually don’t spend much of their time writing or editing
    code at all. Instead, programmers spend the bulk of their time thinking, planning,
    organizing, and designing programs.


    When a programmer has an idea for a program, the first step is to decide if that
    idea is even any good. Programs must solve a specific type of problem. For example,
    word processors make it easy to write, edit, and format text. Spreadsheets make
    it easy to type in numbers and calculate new results from those numbers. Presentation
    programs make it easy to type text and insert graphics to create a slideshow.
    Even video games solve the problem of relieving boredom by offering a challenging
    puzzle or goal for players to achieve.


    **Note**


    The number one biggest failure of software development is not defining a specific
    problem to solve. The second biggest failure of software development is identifying
    a specific problem to solve but underestimating the complexity of the steps needed
    to solve that problem. You have to know what problem to solve and how to solve
    that problem. If you don’t know either one, you can’t write a useful program.


    Once you have an idea for a problem to solve, the next step is defining how to
    solve that problem. Some problems are simply too difficult to solve. For example,
    how would you write a program to write a best-selling novel? You may be able to
    write a program that can help you write a novel, but unless you know exactly how
    to create a best-selling novel predictably, you simply can’t write such a program.


    Knowing a problem to solve is your target. Once you clearly understand your problem,
    you now need to identify all the steps needed to solve that problem. If you don’t
    know how to solve a particular problem, you won’t be able to tell a computer how
    to solve that problem either.


    After defining the steps needed to solve a problem, now you can finally write
    your program. Generally you’ll write your program in parts and test each part
    before continuing. In this way, you’ll gradually expand the capabilities of your
    program while making sure that each part works correctly.


    The main steps you’ll go through while using `Xcode` are:


    - Write code and design your user interface

    - Edit your code and user interface

    - Run and test your program


    When your program is finally done, guess what? It’s never done. There will always
    be errors you’ll need to fix and new features you’ll want to add. Programmers
    actually spend more time editing and modifying existing programs than they ever
    do creating new ones.


    When you write and edit code, you’ll use an editor, which is a program that resembles
    a word processor that lets you type and edit text. When you design and modify
    your user interface, you’ll use a feature in `Xcode` called `Interface Builder`,
    which resembles a drawing program that lets you drag, drop, and resize objects
    on the screen. When you run and test your program, you’ll use a compiler, which
    converts (or compiles) your Swift code into an actual working OS X program.


    To create an OS X program, you just need a copy of `Xcode`, which is Apple’s free
    programming tool that you can download from the Mac App Store. With `Xcode` installed
    on your Macintosh, you can create your own programs absolutely free just by learning
    `Xcode` and Swift.


    ## Summary


    To learn how to write programs for the Macintosh, you need to learn several separate
    skills. First, you need to understand the basic principles of programming. That
    includes organizing instructions in sequences, loops, or branches; understanding
    structured programming techniques, event-driven programming, and object-oriented
    programming.


    Second, you need to learn a specific programming language. For the Macintosh,
    you’ll be learning Swift. That means you’ll learn the keywords and functions used
    in Swift along with learning how to write and organize your Swift code in separate
    files.


    Third, you need to know how to use `Xcode`, which is Apple’s programming tool
    for creating OS X and iOS apps. `Xcode` lets you write and edit Swift code as
    well as letting you visually design and modify your user interface.


    Fourth, you’ll need to learn how to use Apple’s Cocoa framework so that you can
    focus solely on writing instructions that make your program do something unique.


    Whether you want to write your own software to sell, or sell your programming
    skills to create custom software for others, you’ll find that programming is a
    skill that anyone can learn.


    Remember, programming is nothing more than problem solving. By knowing how to
    solve problems using Swift and `Xcode`, you can create your own programs for the
    Macintosh much easier and far faster than you might think.'
