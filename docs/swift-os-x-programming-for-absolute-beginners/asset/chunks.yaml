- fmt: '## Rounding Functions


    When you''re working with decimal numbers, you may want to round them to the nearest
    place value. However, there are many ways to round numbers in Swift such as:


    - `round` – Rounds up from 0.5 and higher and rounds down from 0.49 and lower

    - `floor` – Rounds to the lowest integer

    - `ceil` – Rounds to the highest integer

    - `trunc` – Drops the decimal value


    To see how these different rounding functions work, create a new playground by
    following these steps:


    Make sure the MathPlayground file is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = round(36.98)

    testNumber = round(-36.98)

    testNumber = round(36.08)

    testNumber = floor(36.98)

    testNumber = floor(-36.98)

    testNumber = floor(36.08)

    testNumber = ceil(36.98)

    testNumber = ceil(-36.98)

    testNumber = ceil(36.08)

    testNumber = trunc(36.98)

    testNumber = trunc(-36.98)

    testNumber = trunc(36.08)

    ```


    Notice how each type of rounding function works differently with both negative
    and positive numbers as well as how each function rounds up or down as shown in
    Figure [6-4](#A978-1-4842-1233-2_6_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_6_Fig4_HTML.jpg](A978-1-4842-1233-2_6_Fig4_HTML.jpg)


    Figure 6-4. Seeing how different rounding functions work


    ## Calculation Functions


    You can combine Swift''s four basic mathematical functions (addition, subtraction,
    division, and multiplication) to create sophisticated calculations of any kind.
    However, the Cocoa framework includes common types of mathematical functions that
    you can use so you don''t have to create them yourself. Some common calculation
    functions include:


    - `fabs` – Calculates the absolute value of a number

    - `sqrt` – Calculates the square root of a positive number

    - `cbrt` – Calculates the cube root of a positive number

    - `hypot` – Calculates the square root of (x*x + y*y)

    - `fmax` – Identifies the maximum or largest value of two numbers

    - `fmin` – Identifies the minimum or smallest value of two numbers


    To see how these different calculation functions work, follow these steps:


    Make sure your MathPlayground is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = fabs(52.64)

    testNumber = fabs(-52.64)

    testNumber = sqrt(5)

    testNumber = cbrt(5)

    testNumber = hypot(2, 3)

    testNumber = fmax(34.2, 89.2)

    testNumber = fmin(34.2, 89.2)

    ```


    Notice how each type of calculation function works differently as shown in Figure
    [6-5](#A978-1-4842-1233-2_6_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_6_Fig5_HTML.jpg](A978-1-4842-1233-2_6_Fig5_HTML.jpg)


    Figure 6-5. Seeing how different calculation functions work


    ## Trigonometry Functions


    If you remember from school (or even if you don''t), trigonometry is a mathematical
    field involving angles between intersecting lines. Since trigonometry can actually
    be handy in the real world, the Cocoa framework provides plenty of functions for
    calculating cosines, hyperbolic sines, inverse tangents, and inverse hyperbolic
    cosines. Some common trigonometry functions include:


    - `sin` – Calculates the sine of a degree measured in radians

    - `cos` – Calculates the cosine of a degree measured in radians

    - `tan` – Calculates the tangent of a degree measured in radians

    - `sinh` – Calculates the hyperbolic sine of a degree measured in radians

    - `cosh` – Calculates the hyperbolic cosine of a degree measured in radians

    - `tanh` – Calculates the hyperbolic tangent of a degree measured in radians

    - `asin` – Calculates the inverse sine of a degree measured in radians

    - `acos` – Calculates the inverse cosine of a degree measured in radians

    - `atan` – Calculates the inverse tangent of a degree measured in radians

    - `asinh` – Calculates the inverse hyperbolic sine of a degree measured in radians

    - `acosh` – Calculates the inverse hyperbolic cosine of a degree measured in radians

    - `atanh` – Calculates the inverse hyperbolic tangent of a degree measured in
    radians


    To see how these different trigonometry functions work, follow these steps:


    Make sure your MathPlayground is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = sin(1)

    testNumber = cos(1)

    testNumber = tan(1)

    testNumber = sinh(1)

    testNumber = cosh(1)

    testNumber = tanh(1)

    testNumber = asin(1)

    testNumber = acos(1)

    testNumber = atan(1)

    testNumber = asinh(1)

    testNumber = acosh(1)

    testNumber = atanh(1)

    ```


    Notice how each type of trigonometry function works differently as shown in Figure
    [6-6](#A978-1-4842-1233-2_6_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_6_Fig6_HTML.jpg](A978-1-4842-1233-2_6_Fig6_HTML.jpg)


    Figure 6-6. Seeing how different trigonometry functions work


    ## Exponential Functions


    Exponential functions involve multiplication such as multiplying the number 2
    by itself a fixed number of times. Some common exponential functions include:


    - `exp` – Calculates e**x where x is an integer

    - `exp2` – Calculates 2**x where x is an integer

    - `__exp10` – Calculates 10**x where x is an integer

    - `expm1` – Calculates e**x-1 where x is an integer

    - `pow` – Calculates x raised to the power of y


    To see how these different exponential functions work, follow these steps:


    Make sure your MathPlayground is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = exp(3)

    testNumber = exp2(3)

    testNumber = __exp10(3)

    testNumber = expm1(3)

    testNumber = pow(2,4)

    ```


    Notice how each type of exponential function works differently as shown in Figure
    [6-7](#A978-1-4842-1233-2_6_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_6_Fig7_HTML.jpg](A978-1-4842-1233-2_6_Fig7_HTML.jpg)


    Figure 6-7. Seeing how different exponential functions work


    ## Logarithmic Functions


    Logarithm functions allow multiplication, division, and addition of large numbers
    in calculations similar to exponential functions. Some common logarithmic functions
    include:


    - `log` – Calculates the natural logarithm of number

    - `log2` – Calculates the base-2 logarithm of a number

    - `log10` – Calculates the base-10 logarithm of a number

    - `log1p` – Calculates the natural log of 1+x


    To see how these different logarithmic functions work, follow these steps:


    Make sure your MathPlayground is loaded in Xcode. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = log(3)

    testNumber = log2(3)

    testNumber = log10(3)

    testNumber = log1p(3)

    ```


    Notice how each type of logarithmic function works differently as shown in Figure
    [6-8](#A978-1-4842-1233-2_6_Chapter.html#Fig8).


    ![A978-1-4842-1233-2_6_Fig8_HTML.jpg](A978-1-4842-1233-2_6_Fig8_HTML.jpg)


    Figure 6-8. Seeing how different logarithmic functions work'
