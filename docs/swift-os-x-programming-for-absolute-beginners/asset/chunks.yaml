  trans: "\n# 使用复选框\n\n您可以单独使用一个复选框，也可以将多个复选框组合在一起使用。复选框实际上基于 `NSButton` 类，尽管其外观和操作方式与典型的按钮有很大不同。对于复选框，最重要的三个属性包括：\n\
    \n- **标题** – 显示在复选框旁边，描述供用户选择的选项文本。\n- **状态** – 决定复选框是选中（1）还是未选中（0）。\n- **替代文本**\
    \ – 复选框未选中时显示的文本。（选中复选框时显示的是标题文本。）\n\n要了解复选框的工作原理，请按照以下步骤操作：\n\n选择 “视图” ➤ “工具”\
    \ ➤ “显示属性检查器”。属性检查器窗格会出现在 Xcode 窗口的右上角。点击顶部的复选框，在属性检查器窗格中，将其标题改为“无狗”，替代文本改为“狗”。点击中间的复选框，在属性检查器窗格中，将其标题改为“无猫”，替代文本改为“猫”。点击底部的复选框，在属性检查器窗格中，将其标题改为“无鸟”，替代文本改为“鸟”。双击按钮，将其标题改为“检查”。选择\
    \ “视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。Xcode 会在用户界面旁边显示 `AppDelegate.swift` 文件。将鼠标指针移到“狗”复选框上，按住\
    \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入\
    \ `dogBox`，然后点击“连接”按钮。将鼠标指针移到“猫”复选框上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
    \ 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入 `catBox`，然后点击“连接”按钮。将鼠标指针移到“鸟”复选框上，按住\
    \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入\
    \ `birdBox`，然后点击“连接”按钮。将鼠标指针移到文本视图上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的\
    \ `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入 `messageBox`，然后点击“连接”按钮。现在您应该有四个新的\
    \ `IBOutlet`，看起来像这样：在 Xcode 中选择 “文件” ➤ “新建” ➤ “项目”。在 OS X 类别下点击“应用程序”。点击“Cocoa\
    \ 应用程序”，然后点击“下一步”按钮。Xcode 会要求输入产品名称。点击“产品名称”文本字段，输入 `CheckProgram`。确保“语言”弹出菜单显示为\
    \ Swift，并且没有选中任何复选框。点击“下一步”按钮。Xcode 会询问您希望将项目存储在哪里。选择一个文件夹来存储项目，然后点击“创建”按钮。点击项目导航器中的\
    \ `MainMenu.xib` 文件。程序的主界面会显示出来。点击 `CheckProgram` 图标以显示程序主界面的窗口。选择 “视图” ➤ “工具”\
    \ ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。将一个按钮、三个复选框和一个文本视图拖到用户界面窗口上。确保调整文本视图和所有复选框的宽度，使其看起来如图\
    \ 16-2 所示。\n\n![A978-1-4842-1233-2_16_Fig2_HTML.jpg](img/A978-1-4842-1233-2_16_Fig2_HTML.jpg)\n\
    \n图 16-2. `CheckProgram` 的用户界面。\n\n```\n@IBOutlet weak var dogBox: NSButton!\n\
    @IBOutlet weak var catBox: NSButton!\n@IBOutlet weak var birdBox: NSButton!\n\
    @IBOutlet weak var messageBox: NSTextField!\n```\n\n将鼠标指针移到“检查”按钮上，按住 Control\
    \ 键，然后将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上。松开 Control 键和鼠标。会弹出一个窗口。点击“连接”弹出菜单，选择“操作”。点击“名称”文本字段，输入\
    \ `checkBoxes`。点击“类型”弹出菜单，选择 `NSButton`。Xcode 会创建一个空的 `IBAction` 方法。按如下方式修改这个复选框的\
    \ `IBAction` 方法：\n\n```\n@IBAction func checkBoxes(sender: NSButton) {\n    let\
    \ nextLine = \"\\r\\n\"\n    var message : String = \"\"\n    if dogBox.state\
    \ == 1 {\n        message = \"Dog check box selected\" + nextLine\n    } else\
    \ {\n        message = \"Dog check box NOT selected\" + nextLine\n    }\n    if\
    \ catBox.state == 1 {\n        message = message + \"Cat check box selected\"\
    \ + nextLine\n    } else {\n        message = message + \"Cat check box NOT selected\"\
    \ + nextLine\n    }\n    if birdBox.state == 1 {\n        message = message +\
    \ \"Bird check box selected\" + nextLine\n    } else {\n        message = message\
    \ + \"Bird check box NOT selected\" + nextLine\n    }\n    messageBox.stringValue\
    \ = message\n}\n```\n\n这段代码创建了一个常量，表示回车符 `\\r` 和换行符 `\\n`。它声明了一个可以存储 `String`\
    \ 数据类型的 `message` 变量，初始值为 `\"\"`，即空字符串。多个 `if-else` 语句检查每个复选框的 `State` 属性，以确定它是选中状态（`state\
    \ = 1`）还是未选中状态（`state = 0`）。然后将结果显示在由名为 `messageBox` 的 `IBOutlet` 变量表示的文本视图中。\n\
    \n选择 “产品” ➤ “运行”。用户界面会显示出来。点击不同的复选框。注意，每次选中或取消选中复选框时，都会显示标题或替代文本。点击“检查”按钮。文本视图会标识出您选中了哪些复选框，以及哪些是未选中的。选择\
    \ “CheckProgram” ➤ “退出 CheckProgram”。\n"
- fmt: "# Using Radio Buttons\n\nUnlike check boxes that allow the user to select\
    \ multiple options, radio buttons display multiple options but only let the user\
    \ select one at a time. The moment the user selects another radio button, the\
    \ currently selected radio button gets cleared.\n\nRadio buttons are defined by\
    \ the `NSMatrix` class in the Cocoa frameworks. That means when you create a group\
    \ of radio buttons, you need to define how many you want by defining the number\
    \ of rows and columns as shown in Figure [16-3](#A978-1-4842-1233-2_16_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1233-2_16_Fig3_HTML.jpg](A978-1-4842-1233-2_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3.\n\nThe Show Attributes Inspector pane of a Radio Group lets you\
    \ define the number of rows and columns to display radio buttons.\n\nTo add or\
    \ remove radio buttons, just adjust the number of rows and columns under the Matrix\
    \ category in the Show Attributes Inspector pane. If you need to create an odd\
    \ number of radio buttons, select the radio button you don’t want and select its\
    \ Transparent property as shown in Figure [16-4](#A978-1-4842-1233-2_16_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1233-2_16_Fig4_HTML.jpg](A978-1-4842-1233-2_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4.\n\nThe Transparent property lets you hide a radio button from a\
    \ group.\n\nTo identify which radio button a user selected, you need to change\
    \ the Tag property of each radio button individually. Then you can retrieve the\
    \ selected radio button by using the `selectedTag()` method.\n\nTo see how to\
    \ use radio buttons, follow these steps:\n\n1.  Select the Transparent check box\
    \ under the Button Cell category in the Show Attributes Inspector pane (see Figure\
    \ [16-4](#A978-1-4842-1233-2_16_Chapter.html#Fig4)). Your chosen radio button\
    \ disappears.\n2.  Click on the top radio button in the upper left corner and\
    \ make sure its Tag property in the Show Attributes Inspector pane is set to 0.\n\
    3.  Click on the middle radio button in the left column and make sure its Tag\
    \ property in the Show Attributes Inspector pane is set to 1.\n4.  Click on the\
    \ bottom radio button in the left column and make sure its Tag property in the\
    \ Show Attributes Inspector pane is set to 2.\n5.  Click on the top radio button\
    \ in the right column and make sure its Tag property in the Show Attributes Inspector\
    \ pane is set to 3.\n6.  Click on the middle radio button in the right column\
    \ and make sure its Tag property in the Show Attributes Inspector pane is set\
    \ to 4.\n7.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The `AppDelegate.swift`\
    \ file appears next to your user interface.\n8.  Move the mouse pointer over the\
    \ Radio Group, hold down the Control key, and drag underneath the `IBOutlet` line.\n\
    9.  Release the Control key and the mouse. A pop-up window appears.\n10. Click\
    \ in the Name text field and type `radioMatrix`. An `IBOutlet` appears as follows:\n\
    \    ```\n    @IBOutlet weak var radioMatrix: NSMatrix!\n    ```\n11. Click on\
    \ the radio button that appears in the bottom right corner of the Radio Group.\
    \ Xcode highlights your chosen radio button as shown in Figure [16-6](#A978-1-4842-1233-2_16_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1233-2_16_Fig6_HTML.jpg](A978-1-4842-1233-2_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6.\n\nSelecting a radio button to modify.\n\n12. From within Xcode\
    \ choose File ➤ New ➤ Project.\n13. Click Application under the OS X category.\n\
    14. Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n15. Click in the Product Name text field and type `RadioProgram`.\n16.\
    \ Make sure the Language pop-up menu displays Swift and that no check boxes are\
    \ selected.\n17. Click the Next button. Xcode asks where you want to store the\
    \ project.\n18. Choose a folder to store your project and click the Create button.\n\
    19. Click the `MainMenu.xib` file in the Project Navigator. Your program’s user\
    \ interface appears.\n20. Click the RadioProgram icon to display the window of\
    \ your program’s user interface.\n21. Choose View ➤ Utilities ➤ Show Object Library.\
    \ The Object Library appears in the bottom right corner of the Xcode window.\n\
    22. Drag a Push Button and a Radio Group on to the user interface window.\n23.\
    \ Click on the Radio Group and choose View ➤ Utilities ➤ Show Attributes Inspector\
    \ to open the Show Attributes Inspector pane in the upper right corner of the\
    \ Xcode window.\n24. Modify the Rows and Columns to display three Rows and two\
    \ Columns so it looks like Figure [16-5](#A978-1-4842-1233-2_16_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1233-2_16_Fig5_HTML.jpg](A978-1-4842-1233-2_16_Fig5_HTML.jpg)\n\
    \nFigure 16-5.\n\nThe user interface of the `RadioProgram`.\n\n25. Move the mouse\
    \ pointer over the Push Button, hold down the Control key, and drag the mouse\
    \ over the last curly bracket at the bottom of the `AppDelegate.swift` file.\n\
    26. Release the Control key and the mouse. A pop-up window appears.\n27. Click\
    \ in the Connect pop-up menu and choose Action.\n28. Click in the Name text field\
    \ and type `whichButton`.\n29. Click in the Type pop-up menu and choose `NSButton`.\
    \ Xcode creates an empty `IBAction` method.\n30. Modify the `IBAction` method\
    \ as follows:\n\n    ```\n    @IBAction func whichButton(sender: NSButton) {\n\
    \    \n    var myAlert = NSAlert()\n    \n    myAlert.messageText = \"You clicked\
    \ the radio button with a Tag \\(radioMatrix.selectedTag())\"\n    \n    myAlert.runModal()\n\
    \    \n    }\n    ```\n\n31. Choose Product ➤ Run. Your user interface appears.\n\
    32. Click on a radio button and then click on the Push Button. An alert dialog\
    \ appears, displaying the Tag number of the radio button you selected.\n33. Click\
    \ the OK button to make the alert dialog go away.\n34. Choose RadioProgram ➤ Quit\
    \ RadioProgram."
  raw: '## Using Radio Buttons


