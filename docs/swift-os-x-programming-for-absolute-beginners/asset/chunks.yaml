  trans: '

    # 摘要


    复选框、单选按钮和日期选择器可让您为用户提供一系列有效的选项以供选择。这确保了用户不会因误操作（或故意）向程序提供无效数据。


    复选框允许用户选择零个或多个选项。一组单选按钮只允许用户选择一个选项。日期选择器则允许用户选择格式正确的日期。


    要确定用户选择了哪些复选框，需检查每个复选框的`State`属性。若`State`值为 1，则表示该复选框被选中；若`State`值为 0，则表示该复选框未被选中。


    可以在复选框和单选按钮上显示替代文本。这样一来，当复选框或单选按钮被选中时显示一种文本，未被选中时则显示另一种不同的文本。


    要确定用户可能选择了哪个单选按钮，您需要使用`Tag`属性。每个单选按钮需要一个唯一的`Tag`值，该值可以是整数。通过识别`Tag`值，您就能确定用户选中的是哪个单选按钮。


    日期选择器使用户能够轻松选择日期和/或时间。日期选择器将选定的日期/时间存储为一种特殊的`NSDate`格式，您可以通过日期选择器的`dateValue`属性访问该格式。


    滑块允许用户从一系列有效的数值范围内进行选择。通过使用复选框、单选按钮、日期选择器和滑块，程序可以确保用户只能从一系列有效的选项中进行选择。


    # 17. 在标签、文本字段和组合框中使用文本


    电子补充材料 本章的在线版本（doi:10.1007/978-1-4842-1233-2_17）包含补充材料，仅供授权用户使用。


    当程序可以为用户提供有限的有效选项范围时，就应使用复选框、单选按钮、日期选择器或滑块。然而，有时程序需要允许用户输入无法提前预判的数据，例如人名。当程序需要允许用户输入数据时，就需要使用文本字段或组合框。


    文本字段允许用户输入任何内容，包括数字、特殊字符或普通字母。这意味着程序需要验证用户输入的数据是否有效。


    有时，程序可以同时为用户提供从有限有效选项中选择或自行输入数据的选项。例如，一个程序可能要求用户选择一个国家。那么该程序可以提供一组有限的可能性选项，或者让用户自由输入其他内容。


    这种既可以从有限选项中选择，也可以自行输入的能力，是组合框的主要优势。组合框得名于它结合了弹出按钮（显示有效选项列表）的功能和像文本字段一样自由输入文本的能力。


    虽然文本字段和组合框用于接收用户输入的数据，而标签则用于向用户显示信息。当您只需要显示信息，例如显示说明或指明文本字段的用途（如告诉用户输入姓名或地址）时，就可以使用标签。标签、文本字段和组合框协同工作，在用户界面上接收和显示文本。


    ## 使用文本字段


    由于用户可以在文本字段中输入任何内容，文本字段会将数据存储为字符串，您可以通过`stringValue`属性来获取该字符串。但是，由于用户可以输入整数或小数，文本字段具有足够的通用性来识别这些数字。


    如果用户输入的是整数，您可以通过访问`intValue`属性来获取该值。如果用户输入的是小数，您可以通过访问`floatValue`或`doubleValue`属性来获取该值。


    无论用户在文本字段中输入什么，您都能获取到相应的值。由于文本字段可以接受字符串或数字，您的程序可以通过访问以下任一属性来获取正确的值：


    - `intValue` – 获取整数值。如果用户输入的是字符串，此属性会存储 0。如果用户输入的是小数（如 10.9），则仅存储整数值（如 10）。

    - `floatValue` 或 `doubleValue` – 获取单精度或双精度浮点数值。如果用户输入的是字符串，此属性会存储 0.0。如果用户输入的是整数（如
    4），`floatValue`和`doubleValue`属性会将其存储为小数（如 4.0）。

    - `stringValue` – 获取字符串值。如果用户输入的是数字，它会将该数字存储为字符串（例如“4.305”）。


    注意


    当用户在文本字段中输入文本时，输入的文本会存储在所有四个属性中：`intValue`、`floatValue`、`doubleValue`和`stringValue`。


    除了标准文本字段，Xcode 还提供了几种适用于不同文本输入类型的文本字段变体：


    - **带数字格式化器的文本字段** – 定义可以输入的数字类型

    - **安全文本字段** – 将输入的文本进行掩码处理

    - **搜索字段** – 存储先前输入文本的列表

    - **令牌字段** – 允许用户除了输入普通文本外，还可以输入内容令牌

    '
- fmt: '### Using a Number Formatter


    A number formatter lets you define valid numeric values the user can type into
    the text box, such as a minimum or maximum value, or a specific way to enter data,
    such as with a `%` sign or by typing the number out as “four” instead of typing
    4.


    `Xcode` gives you two ways to create a text field with a number formatter. First,
    you can drag and drop the Text Field with Number Formatter from the Object Library
    and place it on your user interface. Second, you can drag and drop the Number
    Formatter from the Object Library and place it on an existing text field on your
    user interface.


    The quickest way to find both of these items is to type “Number Formatter” in
    the search text field at the bottom of the Object Library, as shown in Figure
    [17-1](#A978-1-4842-1233-2_17_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_17_Fig1_HTML.jpg](A978-1-4842-1233-2_17_Fig1_HTML.jpg)


    **Figure 17-1.** The Text Field with Number Formatter and Number Formatter in
    the Object Library


    Whether you create a new text field with the Text Field with Number Formatter
    item or apply Number Formatter to an existing text field, you’ll need to define
    the number formatter settings. To do this, follow several steps:


    - Choose **View ➤ Utilities ➤ Show Attributes Inspector**. The Show Attributes
    Inspector pane appears in the upper right corner of the `Xcode` window, as shown
    in Figure [17-3](#A978-1-4842-1233-2_17_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_17_Fig3_HTML.jpg](A978-1-4842-1233-2_17_Fig3_HTML.jpg)


    **Figure 17-3.** The Show Attributes Inspector pane


    - Click the Show Document Outline icon to display the Document Outline.

    - Click on the disclosure triangle to the left of the Text Field that uses the
    Number Formatter.

    - Click on the disclosure triangle that appears to the left of the Text Field
    Cell underneath the text field.

    - Click on the Number Formatter, as shown in Figure [17-2](#A978-1-4842-1233-2_17_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_17_Fig2_HTML.jpg](A978-1-4842-1233-2_17_Fig2_HTML.jpg)


    **Figure 17-2.** The Number Formatter appears in the Document Outline


    The **Minimum** and **Maximum** check boxes let you define a minimum and/or maximum
    value that the text field will accept. If you define a minimum value of 10 and
    the user types in a number less than 10, the text field won’t accept the number.


    The **Localize** check box tells `Xcode` to use the user’s local settings to determine
    the appearance of a decimal point and currency symbol. In some parts of the world,
    they use a period for a decimal point, while in others they use a comma. Likewise
    for currency, Europeans would use the Euro symbol, Americans would use the dollar
    symbol, and British users would use the British pound symbol. Selecting the **Localize**
    check box ensures that your text field number formatter works no matter what part
    of the world the program may be used.


    The **Style** pop-up menu lets you define different ways to format numbers. When
    you choose a **Style**, the **Unformatted** and **Formatted** text fields under
    the **Sample** category show you how your numbers may look. For example, in Figure
    [17-3](#A978-1-4842-1233-2_17_Chapter.html#Fig3), choosing the `None` **Style**
    means that if the user types in `1,234.75` into a text field with a number formatter
    and presses `Return`, the text field formats that number as simply `1235`. However,
    if the **Style** is `Currency`, `Percent`, `Scientific`, or `Spell Out`, that
    means the user can enter a number as defined by the `Formatted` example, and the
    text field will store the number as shown in the `Unformatted` example.


    To see how to use these different number formatters, follow these steps:


    1. Choose **View ➤ Assistant Editor ➤ Show Assistant Editor**. The `AppDelegate.swift`
    file appears next to your user interface.

    2. Move the mouse pointer over the pop-up button, hold down the `Control` key,
    and drag underneath the `IBOutlet` line.

    3. Release the `Control` key and the mouse. A pop-up window appears.

    4. Click in the **Name** text field, type `popUpChoice`, and click the **Connect**
    button. An `IBOutlet` appears.

    5. Move the mouse pointer over the text field, hold down the `Control` key, and
    drag the mouse under the `IBOutlet` line.

    6. Release the `Control` key and the mouse. A pop-up window appears.

    7. Click in the **Name** text field, type `textBox`, and click the **Connect**
    button.

    8. Move the mouse pointer over the label, hold down the `Control` key, and drag
    the mouse under the `IBOutlet` line.

    9. Release the `Control` key and the mouse. A pop-up window appears.

    10. Click in the **Name** text field, type `labelResult`, and click the **Connect**
    button.

    11. Click the Show Document Outline icon to reveal the Document Outline.

    12. Move the mouse pointer over Number Formatter, hold down the `Control` key,
    and drag the mouse under the `IBOutlet` line.

    13. Release the `Control` key and the mouse. A pop-up window appears.

    14. Click in the **Name** text field, type `numberFormat`, and click the **Connect**
    button.


    You should have four `IBOutlet` lines as follows:


    ![A978-1-4842-1233-2_17_Fig6_HTML.jpg](A978-1-4842-1233-2_17_Fig6_HTML.jpg)


    **Figure 17-6.** The modified pop-up button menu


    15. Double-click on **Item 1** and when `Xcode` highlights it, type `None`.

    16. Double-click on **Item 2** and when `Xcode` highlights it, type `Decimal`.

    17. Double-click on **Item 3** and when `Xcode` highlights it, type `Currency`.

    18. Drag three Menu Items from the Object Library to the bottom of the pop-up
    button list.

    19. Double-click on each of these three new menu items and modify the name so
    it displays `Percent`, `Scientific`, and `Spell Out`.

    20. Double-click on the pop-up button. `Xcode` displays a list of three choices
    labeled **Item 1**, **Item 2**, and **Item 3**, as shown in Figure [17-5](#A978-1-4842-1233-2_17_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_17_Fig5_HTML.jpg](A978-1-4842-1233-2_17_Fig5_HTML.jpg)


    **Figure 17-5.** Modifying a pop-up button


    21. From within `Xcode`, choose **File ➤ New ➤ Project**.

    22. Click **Application** under the **OS X** category.

    23. Click **Cocoa Application** and click the **Next** button. `Xcode` now asks
    for a product name.

    24. Click in the **Product Name** text field and type `NumberProgram`.

    25. Make sure the **Language** pop-up menu displays `Swift` and that no check
    boxes are selected.

    26. Click the **Next** button. `Xcode` asks where you want to store the project.

    27. Choose a folder to store your project and click the **Create** button.

    28. Click the `MainMenu.xib` file in the Project Navigator. Your program’s user
    interface appears.

    29. Click the `NumberProgram` icon to display the window of your program’s user
    interface.

    30. Choose **View ➤ Utilities ➤ Show Object Library**. The Object Library appears
    in the bottom right corner of the `Xcode` window.

    31. Drag a Pop-Up Button, a Push Button, and a Text Field with Number Formatter
    onto the user interface window so it looks like Figure [17-4](#A978-1-4842-1233-2_17_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_17_Fig4_HTML.jpg](A978-1-4842-1233-2_17_Fig4_HTML.jpg)


    **Figure 17-4.** The user interface of the NumberProgram


    32. The `IBOutlet` lines in `AppDelegate.swift` should look like this:


    ```

    @IBOutlet weak var popUpChoice: NSPopUpButton!

    @IBOutlet weak var textBox: NSTextField!

    @IBOutlet weak var labelResult: NSTextField!

    @IBOutlet weak var numberFormat: NSNumberFormatter!

    ```


    33. Click the Hide Document Outline icon to hide the document outline.

    34. Move the mouse pointer over the push button, hold down the `Control` key,
    and drag the mouse above the last curly bracket in the bottom of the `AppDelegate.swift`
    file.

    35. Release the `Control` key and the mouse button. A pop-up window appears.

    36. Click in the **Connect** pop-up menu and choose **Action**.

    37. Click in the **Name** text field and type `showResults`.

    38. Click in the **Type** pop-up menu, choose `NSButton`, and click the **Connect**
    button. `Xcode` creates an empty `IBAction` method.

    39. Modify the `IBAction` method as follows.'
  raw: '### Using a Number Formatter


    A number formatter lets you define valid numeric values the user can type into
    the text box such as a minimum or maximum value, or a specific way to enter data
    such as with a % sign or by typing the number out as “four” instead of typing
    4.


    Xcode gives you two ways to create a text field with a number formatter. First,
    you can drag and drop the Text Field with Number Formatter from the Object Library
    and place it on your user interface. Second, you can drag and drop the Number
    Formatter from the Object Library and place it on an existing text field on your
    user interface.


    To quickest way to find both of these items is to type “Number Formatter” in the
    search text field at the bottom of the Object Library as shown in Figure [17-1](#A978-1-4842-1233-2_17_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_17_Fig1_HTML.jpg](A978-1-4842-1233-2_17_Fig1_HTML.jpg)


    Figure 17-1.


    The Text Field with Number Formatter and Number Formatter in the Object Library


    Whether you create a new text field with the Text Field with Number Formatter
    item or apply Number Formatter to an existing text field, you’ll need to define
    the number formatter settings. To do this, you need to follow several steps:


    Choose View ➤ Utilities➤ Show Attributes Inspector. The Show Attributes Inspector
    pane appears in the upper right corner of the Xcode window as shown in Figure
    [17-3](#A978-1-4842-1233-2_17_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_17_Fig3_HTML.jpg](A978-1-4842-1233-2_17_Fig3_HTML.jpg)


