- fmt: "# Browsing the Documentation\n\nQuick Help can display information about specific\
    \ class files, but what if you know you need information but don’t know where\
    \ to find it? That’s when you can spend time browsing through the Documentation\
    \ window and skimming through the different help topics until you find what you\
    \ want.\n\nEven if you don’t find what you want, chances are good you’ll stumble\
    \ across some interesting information about `Xcode` or `OS X` that could come\
    \ in handy sometime in the future. When browsing through `Xcode`’s documentation,\
    \ you can look up information specific to `iOS`, `OS X`, or `Xcode`.\n\nIf you\
    \ find something interesting, you can bookmark it. That way you’ll be able to\
    \ find it quickly again later. You can also send information by e-mail or text\
    \ messaging to share useful information with others.\n\nTo browse through the\
    \ Documentation, follow these steps:\n\n1. Choose `Help` ➤ `Documentation and\
    \ API Reference`. The Documentation window appears.\n2. Click the `Show/Hide Navigator`\
    \ icon to make sure the Navigator pane appears and lists categories of topics\
    \ such as `iOS`, `OS X`, and `Xcode` as shown in Figure [4-9](#A978-1-4842-1233-2_4_Chapter.html#Fig9).\n\
    \n   ![A978-1-4842-1233-2_4_Fig9_HTML.jpg](A978-1-4842-1233-2_4_Fig9_HTML.jpg)\n\
    \n   Figure 4-9. The Navigator pane of the Documentation window displays categories\
    \ of different information\n\n3. Click the gray disclosure triangle that appears\
    \ to the left of a category such as the `OS X` or `Xcode` category. A list of\
    \ additional topics (with their own gray disclosure triangles) appears. By continuing\
    \ to click the disclosure triangle of topics, you will eventually find lists of\
    \ topics that you can click on to view that information as shown in Figure [4-10](#A978-1-4842-1233-2_4_Chapter.html#Fig10).\n\
    \n   ![A978-1-4842-1233-2_4_Fig10_HTML.jpg](A978-1-4842-1233-2_4_Fig10_HTML.jpg)\n\
    \n   Figure 4-10. Each category lists several other categories of various topics\n\
    \n4. Click the `Share` icon that appears in the upper right corner of the Documentation\
    \ window as shown in Figure [4-11](#A978-1-4842-1233-2_4_Chapter.html#Fig11).\
    \ If you click `Email Link`, the Mail program will load a blank e-mail message\
    \ with a link to that page in the documentation. If you click `Add Bookmark`,\
    \ `Xcode` stores that documentation page as a bookmark.\n\n   ![A978-1-4842-1233-2_4_Fig11_HTML.jpg](A978-1-4842-1233-2_4_Fig11_HTML.jpg)\n\
    \n   Figure 4-11. The Share icon lets you bookmark a page or share it with others\n\
    \n5. After you’ve bookmarked one or more pages, you can view your bookmarks by\
    \ clicking the `Show documentation bookmarks` icon as shown in Figure [4-12](#A978-1-4842-1233-2_4_Chapter.html#Fig12).\
    \ Now you can click on a bookmark and see that documentation page right away without\
    \ having to hunt around for it.\n\n   ![A978-1-4842-1233-2_4_Fig12_HTML.jpg](A978-1-4842-1233-2_4_Fig12_HTML.jpg)\n\
    \n   Figure 4-12. Viewing bookmarked pages\n\n   To delete a bookmark, just right-click\
    \ over it so a pop-up menu appears. Then choose `Delete`.\n\n6. When you want\
    \ to view the documentation library categories again (`iOS`, `OS X`, and `Xcode`),\
    \ just click the `Browse the documentation library` icon as shown in Figure [4-13](#A978-1-4842-1233-2_4_Chapter.html#Fig13).\n\
    \n   ![A978-1-4842-1233-2_4_Fig13_HTML.jpg](A978-1-4842-1233-2_4_Fig13_HTML.jpg)\n\
    \n   Figure 4-13. The Browse the documentation library icon\n\n# Searching the\
    \ Documentation\n\nQuick Help can display information about specific class files\
    \ and browsing the documentation can help you explore all the vast information\
    \ about `iOS`, `OS X`, and `Xcode`. The problem is that Quick Help is only useful\
    \ for finding information about class files and browsing the documentation can\
    \ be time-consuming. If you know what you want to find, you can just search for\
    \ it instead.\n\nWhen searching for information, type as much as possible to narrow\
    \ your search results. If you just type a single letter or word, `Xcode`’s documentation\
    \ will bombard you with irrelevant results.\n\nTo see how searching the documentation\
    \ window works, try the following:\n\n1. Choose `Help` ➤ `Documentation and API\
    \ Reference`. The Documentation window appears.\n2. Click in the `Search documentation`\
    \ text field and type `text`. A menu of different text results appears that you\
    \ can click on to get more information as shown in Figure [4-14](#A978-1-4842-1233-2_4_Chapter.html#Fig14).\n\
    \n   ![A978-1-4842-1233-2_4_Fig14_HTML.jpg](A978-1-4842-1233-2_4_Fig14_HTML.jpg)\n\
    \n   Figure 4-14. A menu of results for \"text\"\n\n3. Tap the spacebar to create\
    \ a space after `text`. Notice now the menu displays entirely different text results\
    \ as shown in Figure [4-15](#A978-1-4842-1233-2_4_Chapter.html#Fig15).\n\n   ![A978-1-4842-1233-2_4_Fig15_HTML.jpg](A978-1-4842-1233-2_4_Fig15_HTML.jpg)\n\
    \n   Figure 4-15. Just adding an extra space after a search term can display a\
    \ different menu of results\n\nBy searching through the documentation, you can\
    \ find what you need quickly and easily.\n\n# Using Code Completion\n\nBack in\
    \ [Chapter 3](#A978-1-4842-1233-2_3_Chapter.html) when you started typing Swift\
    \ code, you may have noticed something odd. Each time you typed part of a Swift\
    \ command, the Xcode editor may have displayed grayed text and a menu of possible\
    \ commands that match what you partially typed as shown in Figure [4-16](#A978-1-4842-1233-2_4_Chapter.html#Fig16).\n\
    \n![A978-1-4842-1233-2_4_Fig16_HTML.jpg](A978-1-4842-1233-2_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16. Code completion suggests a likely command you may be trying to\
    \ type\n\nThis feature is called Code Completion and is Xcode’s way of helping\
    \ you type long commands without actually typing every character yourself. When\
    \ you see grayed out text and a menu, you have three choices:\n\n* Press the `Tab`\
    \ key to let Xcode automatically type part of the grayed out text. (You may need\
    \ to press the `Tab` key several times to completely select all the grayed out\
    \ text.)\n* Double-click on a command in the pop-up menu to type that command\
    \ automatically.\n* Keep typing.\n\nIf you keep typing, Xcode keeps displaying\
    \ new grayed out text that it thinks you may be trying to type along with a menu\
    \ of different commands that match what you’ve typed so far. Let’s see how code\
    \ completion works:\n\nTo see how searching the documentation window works, try\
    \ the following:\n\n1. Make sure your `MyFirstProgram` is loaded in Xcode.\n2.\
    \ Click on `AppDelegate.swift` in the Project Navigator pane. The contents of\
    \ the `AppDelegate.swift` file appears in the middle Xcode pane.\n3. Modify the\
    \ `@IBAction changeCase(sender: NSButton)` code by deleting the one line between\
    \ the curly brackets so it now appears as follows:\n\n   ```\n   @IBAction func\
    \ changeCase(sender: NSButton) {\n   }\n   ```\n\n4. Move the cursor between the\
    \ curly brackets of this `@IBAction` method and type `labelText.s` and notice\
    \ that grayed out text appears, and a menu of possible commands also appears as\
    \ shown in Figure [4-17](#A978-1-4842-1233-2_4_Chapter.html#Fig17).\n\n   ![A978-1-4842-1233-2_4_Fig17_HTML.jpg](A978-1-4842-1233-2_4_Fig17_HTML.jpg)\n\
    \n   Figure 4-17. Code completion suggests `stringValue` as a possible command\n\
    \n5. Tab the `Tab` key. The first time you tap the `Tab` key, Xcode types \"string\"\
    .\n6. Tap the `Tab` key a second time and now Xcode types the complete \"stringValue\"\
    .\n7. Type `= messageText.stringValue.uppercaseString`. Notice that as you type,\
    \ Code Completion keeps showing different grayed out text and commands in the\
    \ pop-up menu.\n\nBy using Code Completion, you can type commands faster and more\
    \ accurately. If you start typing a command and you don’t see Code Completion’s\
    \ grayed out text or menu appear, that could be a signal that you mistyped the\
    \ command. Code Completion is just one more way Xcode tries to make typing code\
    \ easier for you."
  raw: '## Browsing the Documentation


    Quick Help can display information about specific class files, but what if you
    know you need information but don’t know where to find it? That’s when you can
    spend time browsing through the Documentation window and skimming through the
    different help topics until you find what you want.


    Even if you don’t find what you want, chances are good you’ll stumble across some
    interesting information about Xcode or OS X that could come in handy sometime
    in the future. When browsing through Xcode’s documentation, you can look up information
    specific to iOS, OS X, or Xcode.


    If you find something interesting, you can bookmark it. That way you’ll be able
    to find it quickly again later. You can also send information by e-mail or text
    messaging to share useful information with others.


    To browse through the Documentation, follow these steps:


    Choose Help ➤ Documentation and API Reference. The Documentation window appears.
      Click the Show/Hide Navigator icon to make sure the Navigator pane appears and
    lists categories of topics such as iOS, OS X, and Xcode as shown in Figure [4-9](#A978-1-4842-1233-2_4_Chapter.html#Fig9).


    ![A978-1-4842-1233-2_4_Fig9_HTML.jpg](A978-1-4842-1233-2_4_Fig9_HTML.jpg)


    Figure 4-9.


    The Navigator pane of the Documentation window displays categories of different
    information   Click the gray disclosure triangle that appears to the left of a
    category such as the OS X or Xcode category. A list of additional topics (with
    their own gray disclosure triangles) appears. By continuing to click the disclosure
    triangle of topics, you will eventually find lists of topics that you can click
    on to view that information as shown in Figure [4-10](#A978-1-4842-1233-2_4_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_4_Fig10_HTML.jpg](A978-1-4842-1233-2_4_Fig10_HTML.jpg)


    Figure 4-10.


    Each category lists several other categories of various topics   Click in the
    Share icon that appears in the upper right corner of the Documentation window
    as shown in Figure [4-11](#A978-1-4842-1233-2_4_Chapter.html#Fig11). If you click
    Email Link, the Mail program will load a blank e-mail message with a link to that
    page in the documentation. If you click Add Bookmark, Xcode stores that documentation
    page as a bookmark.


    ![A978-1-4842-1233-2_4_Fig11_HTML.jpg](A978-1-4842-1233-2_4_Fig11_HTML.jpg)


    Figure 4-11.


    The Share icon lets you bookmark a page or share it with others  


    After you’ve bookmarked one or more pages, you can view your bookmarks by clicking
    the Show documentation bookmarks icon as shown in Figure [4-12](#A978-1-4842-1233-2_4_Chapter.html#Fig12).
    Now you can click on a bookmark and see that documentation page right away without
    having to hunt around for it.


    ![A978-1-4842-1233-2_4_Fig12_HTML.jpg](A978-1-4842-1233-2_4_Fig12_HTML.jpg)


    Figure 4-12.


    Viewing bookmarked pages


    To delete a bookmark, just right-click over it so a pop-up menu appears. Then
    choose Delete.


    When you want to view the documentation library categories again (iOS, OS X, and
    Xcode), just click the Browse the documentation library icon as shown in Figure
    [4-13](#A978-1-4842-1233-2_4_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_4_Fig13_HTML.jpg](A978-1-4842-1233-2_4_Fig13_HTML.jpg)


    Figure 4-13.


    The Browse the documentation library icon


    ## Searching the Documentation


    Quick Help can display information about specific class files and browsing the
    documentation can help you explore all the vast information about iOS, OS X, and
    Xcode. The problem is that Quick Help is only useful for finding information about
    class files and browsing the documentation can be time-consuming. If you know
    what you want to find, you can just search for it instead.


    When searching for information, type as much as possible to narrow your search
    results. If you just type a single letter or word, Xcode’s documentation will
    bombard you with irrelevant results.


    To see how searching the documentation window works, try the following:


    Choose Help ➤ Documentation and API Reference. The Documentation window appears.
      Click in the Search documentation text field and type text. A menu of different
    text results appears that you can click on to get more information as shown in
    Figure [4-14](#A978-1-4842-1233-2_4_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_4_Fig14_HTML.jpg](A978-1-4842-1233-2_4_Fig14_HTML.jpg)


    Figure 4-14.


    A menu of results for “text”   Tap the spacebar to create a space after text.
    Notice now the menu displays entirely different text results as shown in Figure
    [4-15](#A978-1-4842-1233-2_4_Chapter.html#Fig15).


    ![A978-1-4842-1233-2_4_Fig15_HTML.jpg](A978-1-4842-1233-2_4_Fig15_HTML.jpg)


    Figure 4-15.


    Just adding an extra space after a search term can display a different menu of
    results  


    By searching through the documentation, you can find what you need quickly and
    easily.


    ## Using Code Completion


    Back in [Chapter 3](#A978-1-4842-1233-2_3_Chapter.html) when you started typing
    Swift code, you may have noticed something odd. Each time you typed part of a
    Swift command, the Xcode editor may have displayed grayed text and a menu of possible
    commands that match what you partially typed as shown in Figure [4-16](#A978-1-4842-1233-2_4_Chapter.html#Fig16).


    ![A978-1-4842-1233-2_4_Fig16_HTML.jpg](A978-1-4842-1233-2_4_Fig16_HTML.jpg)


    Figure 4-16.


    Code completion suggests a likely command you may be trying to type


    This feature is called Code Completion and is Xcode’s way of helping you type
    long commands without actually typing every character yourself. When you see grayed
    out text and a menu, you have three choices:


    *   Press the Tab key to let Xcode automatically type part of the grayed out text.
    (You may need to press the Tab key several times to completely select all the
    grayed out text.)

    *   Double-click on a command in the pop-up menu to type that command automatically.

    *   Keep typing.


    If you keep typing, Xcode keeps displaying new grayed out text that it thinks
    you may be trying to type along with a menu of different commands that match what
    you’ve typed so far. Let’s see how code completion works:


    To see how searching the documentation window works, try the following:


    Make sure your MyFirstProgram is loaded in Xcode.   Click on AppDelegate.swift
    in the Project Navigator pane. The contents of the AppDelegate.swift file appears
    in the middle Xcode pane.   Modify the @IBAction changeCase (sender: NSButton)
    code by deleting the one line between the curly brackets so it now appears as
    follows: `@IBAction func changeCase(sender: NSButton) {` `}`   Move the cursor
    between the curly brackets of this @IBAction method and type labelText.s and notice
    that grayed out text appears, and a menu of possible commands also appears as
    shown in Figure [4-17](#A978-1-4842-1233-2_4_Chapter.html#Fig17).


    ![A978-1-4842-1233-2_4_Fig17_HTML.jpg](A978-1-4842-1233-2_4_Fig17_HTML.jpg)


    Figure 4-17.


    Code completion suggests stringValue as a possible command   Tab the Tab key.
    The first time you tap the Tab key, Xcode types “string.”   Tap the Tab key a
    second time and now Xcode types the complete “stringValue.”   Type = messageText.stringValue.uppercaseString.
    Notice that as you type, Code Completion keeps showing different grayed out text
    and commands in the pop-up menu.  


    By using Code Completion, you can type commands faster and more accurately. If
    you start typing a command and you don’t see Code Completion’s grayed out text
    or menu appear, that could be a signal that you mistyped the command. Code Completion
    is just one more way Xcode tries to make typing code easier for you.'
  trans: "\n# 浏览文档\n\n快速帮助可以显示特定类文件的相关信息，但如果你知道自己需要信息，却不知从何找起，该怎么办？这时，你可以花些时间浏览“文档”窗口，快速翻阅不同的帮助主题，直到找到想要的内容。\n\
    \n即使没有找到所需信息，你也很可能会偶然发现一些关于`Xcode`或`OS X`的有趣知识，这些知识将来可能会派上用场。在浏览`Xcode`的文档时，你可以查找与`iOS`、`OS\
    \ X`或`Xcode`相关的特定信息。\n\n如果发现有趣的内容，可以将其添加为书签。这样，日后就能快速再次找到它。你还可以通过电子邮件或短信发送信息，与他人分享有用的内容。\n\
    \n要浏览文档，请按以下步骤操作：\n\n1. 选择`帮助` ➤ `文档和 API 参考`。文档窗口随即出现。\n2. 点击`显示/隐藏导航器`图标，确保导航器窗格出现，并列出主题类别，如`iOS`、`OS\
    \ X`和`Xcode`，如图 4-9 所示。\n\n   ![A978-1-4842-1233-2_4_Fig9_HTML.jpg](img/A978-1-4842-1233-2_4_Fig9_HTML.jpg)\n\
    \n   图 4-9. 文档窗口的导航器窗格显示了不同信息的类别\n\n3. 点击类别（如`OS X`或`Xcode`类别）左侧显示的灰色展开三角形。会出现一个包含更多主题的列表（这些主题也有自己的灰色展开三角形）。继续点击主题的展开三角形，最终你将找到可点击查看信息的主题列表，如图\
    \ 4-10 所示。\n\n   ![A978-1-4842-1233-2_4_Fig10_HTML.jpg](img/A978-1-4842-1233-2_4_Fig10_HTML.jpg)\n\
    \n   图 4-10. 每个类别都列出了多个其他主题类别\n\n4. 点击文档窗口右上角出现的`共享`图标，如图 4-11 所示。如果点击`发送电子邮件链接`，邮件程序将加载一封空白电子邮件，其中包含指向该文档页面的链接。如果点击`添加书签`，`Xcode`会将该文档页面保存为书签。\n\
    \n   ![A978-1-4842-1233-2_4_Fig11_HTML.jpg](img/A978-1-4842-1233-2_4_Fig11_HTML.jpg)\n\
    \n   图 4-11. “共享”图标允许你为页面添加书签或与他人分享\n\n5. 为一个或多个页面添加书签后，你可以点击`显示文档书签`图标来查看书签，如图\
    \ 4-12 所示。现在，你可以点击某个书签，立即查看该文档页面，无需再费力搜索。\n\n   ![A978-1-4842-1233-2_4_Fig12_HTML.jpg](img/A978-1-4842-1233-2_4_Fig12_HTML.jpg)\n\
    \n   图 4-12. 查看已添加书签的页面\n\n   要删除书签，只需右键点击该书签，在弹出的菜单中选择`删除`。\n\n6. 当你想再次查看文档库类别（`iOS`、`OS\
    \ X`和`Xcode`）时，只需点击`浏览文档库`图标，如图 4-13 所示。\n\n   ![A978-1-4842-1233-2_4_Fig13_HTML.jpg](img/A978-1-4842-1233-2_4_Fig13_HTML.jpg)\n\
    \n   图 4-13. “浏览文档库”图标\n\n# 搜索文档\n\n快速帮助可以显示特定类文件的信息，而浏览文档则可以帮助你探索关于`iOS`、`OS\
    \ X`和`Xcode`的海量信息。问题是，快速帮助仅对查找类文件信息有用，而浏览文档又可能很耗时。如果你知道自己想找什么，直接搜索即可。\n\n搜索信息时，请尽可能多地输入关键词，以缩小搜索结果范围。如果只输入单个字母或单词，`Xcode`的文档会用大量不相关的结果轰炸你。\n\
    \n要了解搜索文档窗口的工作原理，请尝试以下操作：\n\n1. 选择`帮助` ➤ `文档和 API 参考`。文档窗口随即出现。\n2. 点击`搜索文档`文本字段，输入`text`。会弹出一个包含不同文本结果列表的菜单，点击即可获取更多信息，如图\
    \ 4-14 所示。\n\n   ![A978-1-4842-1233-2_4_Fig14_HTML.jpg](img/A978-1-4842-1233-2_4_Fig14_HTML.jpg)\n\
    \n   图 4-14. 针对“text”的结果菜单\n\n3. 按空格键，在`text`后面创建一个空格。注意，此时菜单显示的文本结果完全不同，如图 4-15\
    \ 所示。\n\n   ![A978-1-4842-1233-2_4_Fig15_HTML.jpg](img/A978-1-4842-1233-2_4_Fig15_HTML.jpg)\n\
    \n   图 4-15. 仅在搜索词后添加一个空格，就能显示不同的结果菜单\n\n通过搜索文档，你可以快速、轻松地找到所需内容。\n\n# 使用代码补全\n\
    \n回顾第 3 章，当你开始输入 Swift 代码时，可能已经注意到一些奇怪的现象。每次你输入部分 Swift 命令时，Xcode 编辑器可能会显示灰色文本和一个包含可能匹配你部分输入的命令的菜单，如图\
    \ 4-16 所示。\n\n![A978-1-4842-1233-2_4_Fig16_HTML.jpg](img/A978-1-4842-1233-2_4_Fig16_HTML.jpg)\n\
    \n图 4-16. 代码补全建议你可能正在尝试输入的命令\n\n此功能称为“代码补全”，是 Xcode 帮助你输入长命令的一种方式，无需你亲自输入每个字符。当你看到灰色文本和菜单时，你有三个选择：\n\
    \n* 按`Tab`键让 Xcode 自动输入部分灰色文本。（你可能需要多次按`Tab`键才能完全选中所有灰色文本。）\n* 双击弹出菜单中的某个命令，自动输入该命令。\n\
    * 继续手动输入。\n\n如果你继续手动输入，Xcode 会持续显示新的灰色文本（它认为你可能在尝试输入的文本），以及一个包含与你已输入内容匹配的不同命令的菜单。让我们看看代码补全的工作原理：\n\
    \n要了解搜索文档窗口的工作原理，请尝试以下操作：\n\n1. 确保你的`MyFirstProgram`项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击`AppDelegate.swift`。`AppDelegate.swift`文件的内容会显示在中间的\
    \ Xcode 窗格中。\n3. 修改`@IBAction changeCase(sender: NSButton)`代码，删除花括号之间的那一行代码，使其现在看起来如下：\n\
    \n   ```\n   @IBAction func changeCase(sender: NSButton) {\n   }\n   ```\n\n4.\
    \ 将光标移动到此`@IBAction`方法的花括号之间，输入`labelText.s`，注意会出现灰色文本和一个包含可能命令的菜单，如图 4-17 所示。\n\
    \n   ![A978-1-4842-1233-2_4_Fig17_HTML.jpg](img/A978-1-4842-1233-2_4_Fig17_HTML.jpg)\n\
    \n   图 4-17. 代码补全建议`stringValue`作为可能的命令\n\n5. 按`Tab`键。第一次按下`Tab`键时，Xcode 会输入“string”。\n\
    6. 第二次按下`Tab`键，现在 Xcode 会输入完整的“stringValue”。\n7. 输入`= messageText.stringValue.uppercaseString`。注意，在你输入时，代码补全会持续在弹出菜单中显示不同的灰色文本和命令。\n\
    \n通过使用代码补全，你可以更快、更准确地输入命令。如果你开始输入一个命令，却没有看到代码补全的灰色文本或菜单出现，这可能表明你输入的命令有误。代码补全是\
    \ Xcode 让代码输入变得更简单的又一方式。\n"
- fmt: '# Understanding How OS X Programs Work


    To help you better understand what all of Xcode’s help documentation means, you
    need to understand how OS X programs work. In the old days when programs were
    small, programmers stored all program commands in a single file. Then the computer
    started at the first command at the top of the file, worked its way down line
    by line, and stopped when it reached the end of the file.


    Today programs are much larger so they’re often divided into multiple files. No
    matter how many files you divide your program into, Xcode treats everything as
    if it were stored in a single file. Dividing a program into files is for your
    convenience.


    Let’s examine your `MyFirstProgram` line by line so you can understand what’s
    happening. When you view Swift code in Xcode, you’ll notice that the Xcode editor
    color codes different text. These colors help you identify the purpose of different
    text as follows:


    - **Green** – Comments that Xcode completely ignores. Comments are meant to explain
    something about the nearby code.

    - **Purple** – Keywords of the Swift language.

    - **Red** – Text strings.

    - **Blue** – Class file names.

    - **Black** – Commands.


    The very first line tells Xcode to import or include all the code in the Cocoa
    framework as part of your program. The line looks like this:


    ```

    import Cocoa

    ```


    The next line runs a Swift function that loads your user interface (`MainMenu.xib`)
    and creates an object from your `AppDelegate` class. This basically gets your
    whole program running as a generic Macintosh program. The line looks like this:


    ```

    @NSApplicationMain

    ```


    The next line defines a class called `AppDelegate` that is based on the `NSObject`
    class and uses the `NSApplicationDelegate` protocol (which you’ll learn about
    shortly). This line looks like this:


    ```

    class AppDelegate: NSObject, NSApplicationDelegate {

    ```


    The next three lines define `IBOutlet`s that connect this Swift code to the user
    interface items: the window of the user interface along with the label and text
    field. The window is based on the `NSWindow` class (defined in the Cocoa framework)
    while the label and text fields are based on the `NSTextField` class. These lines
    look like this:


    ```

    @IBOutlet weak var window: NSWindow!

    ```


    ```

    @IBOutlet weak var labelText: NSTextField!

    ```


    ```

    @IBOutlet weak var messageText: NSTextField!

    ```


    The next three lines define an `IBAction` method that’s connected to the push
    button on the user interface. The code takes the text stored in `messageText`
    (the text field) and converts it to uppercase. Then it stores the uppercase text
    into `labelText` (the label). Both the label and text field are based on the `NSTextField`
    class (defined in the Cocoa framework). The lines look like this:


    ```

    @IBAction func changeCase(sender: NSButton) {

    ```


    ```

    labelText.stringValue = messageText.stringValue.uppercaseString

    ```


    ```

    }

    ```


    The remaining code defines two functions that are empty so they don’t do anything.
    If you typed code inside of these functions, the code would run right after your
    program started up (`applicationDidFinishLaunching`) or it would run as soon as
    your program ended (`applicationWillTerminate`).


    When `MyFirstProgram` runs, it imports the Cocoa framework and runs to display
    a generic Macintosh program on the screen that includes your user interface. The
    `applicationDidFinishLaunching` function runs, but since it doesn’t contain any
    code, nothing happens. Now the program stops and waits for something to happen.


    If the user quits out of the program, the `applicationWillTerminate` function
    would run, but since it doesn’t contain any code, nothing happens.


    When the user clicks the Change Case button, it runs the `IBAction` `changeCase`
    method. The only Swift command in this `IBAction` method takes the text from the
    text field (stored in the `stringValue` property of `messageText`), capitalizes
    it, and stores the capitalized text in the label (displayed by the `stringValue`
    property of `labelText`).


    Now that you’ve seen how the `MyFirstProgram` works, let’s look at OS X programming
    from a more theoretical standpoint. First, creating a program involves using class
    files defined by the Cocoa framework. When you place items on a user interface,
    you’re using Cocoa framework class files (such as `NSTextField` and `NSButton`).


    When you define a class in your `AppDelegate.swift` file, you’re also using a
    class from the Cocoa framework file (`NSObject`).


    A typical OS X program creates objects from the class files in the Cocoa framework
    and any class files you may define in your Swift files. Objects now communicate
    with one another in one of two ways:


    - Storing or retrieving data from properties stored in other objects

    - Calling methods stored in other objects


    To store data in an object’s property, you have to specify the object name and
    its property on the left side of an equal sign and a value on the right like this:


    ```

    labelText.stringValue = "Hello, world!"

    ```


    To retrieve data from an object’s property, you have to specify a variable to
    hold data on the left side of an equal sign and the object name and its property
    on the right like this:


    ```

    let warning = labelText.stringValue

    ```


    To call a method stored in another object, you have to specify the object’s name
    and the method to use like this:


    ```

    messageText.stringValue.uppercaseString

    ```


    This command tells Xcode to run the `uppercaseString` method on the `stringValue`
    property stored in the `messageText` object.


    Setting property values, retrieving property values, and calling methods to run
    are the three ways objects communicate with each other.


    When you create a class, you must define the class file to use such as:


    ```

    class AppDelegate: NSObject

    ```


    This line tells Xcode to define a class called `AppDelegate` and base it on the
    class file called `NSObject` (which is defined in the Cocoa framework).


    When you create a class based on an existing class, that class automatically includes
    all the properties and methods defined by that class. So in the above line of
    code that defines the `AppDelegate` class, any object created from the `AppDelegate`
    class automatically has all the properties and methods defined by the `NSObject`
    class.


    Sometimes a class file doesn’t have all the methods you may need. To fix this,
    you can inherit from an existing class and then define a new method in your class.
    However, if you create a method name that you want other classes to use, a second
    alternative is to define something called a protocol.


    A protocol is nothing more than a list of related method names together but doesn’t
    include any Swift code to make those methods actually do anything. In the code
    below, the `AppDelegate` class is not only based on the `NSObject` class file,
    but also uses methods defined by the `NSApplicationDelegate` protocol.


    If you open the Documentation window and search for `NSApplicationDelegate` protocol,
    you’ll see a list of method names defined by the `NSApplicationDelegate` protocol,
    such as `applicationDidFinishLaunching` or `applicationWillTerminate` as shown
    in Figure [4-18](#A978-1-4842-1233-2_4_Chapter.html#Fig18).


    ![A978-1-4842-1233-2_4_Fig18_HTML.jpg](A978-1-4842-1233-2_4_Fig18_HTML.jpg)


    **Figure 4-18.** The `NSApplicationDelegate` protocol in the Documentation window


    The `AppDelegate` class inherits properties and methods from the `NSObject` class
    and uses the method names defined by the `NSApplicationDelegate` protocol. Any
    class based on a protocol must write Swift code to make those protocol methods
    actually do something. In technical terms, this is known as “implementing or conforming
    to a protocol.”


    So the Cocoa framework actually consists of classes and protocols. Classes define
    objects, and protocols define commonly used method names that different classes
    may need.


    When you write OS X programs, you’ll often use both Cocoa framework classes and
    protocols. When you use a Cocoa framework class, you can use methods that already
    know how to work such as the `uppercaseString` method that knows how to capitalize
    text.'
