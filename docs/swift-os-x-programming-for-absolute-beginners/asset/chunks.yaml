    ## The if Statement


    Boolean values are crucial for letting programs make choices. If someone types
    in a password, a program checks to see if the password is valid. If true (the
    password is valid), then the program grants access. If false (the password is
    not valid), then the program blocks access.


    To decide what to do next, every program needs to evaluate a Boolean value. Only
    then can it decide what to do next based on the value of that Boolean value.


    The simplest type of branching statement in Swift is an if statement, which looks
    like this:


    `if BooleanValue == true {`


    `}`


    To simplify this if statement, you can eliminate the “== true” portion so the
    if statement looks like this:


    `if BooleanValue {`


    `}`


    This shortened version says, “If the BooleanValue is true, then run the code inside
    the curly brackets. If the BooleanValue is false, then skip all the code inside
    the curly brackets without running it.”


    To see how Boolean values work with an if statement, follow these steps:


    Make sure the BooleanPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var BooleanValue : Bool = true` `if BooleanValue {`     `print
    ("The BooleanValue is true")` `}`  


    Figure [7-2](#A978-1-4842-1233-2_7_Chapter.html#Fig2) shows the results of the
    if statement running. Change the value of BooleanValue to false and you’ll see
    that the if statement no longer prints the string “The BooleanValue is true.”


    ![A978-1-4842-1233-2_7_Fig2_HTML.jpg](A978-1-4842-1233-2_7_Fig2_HTML.jpg)


    Figure 7-2.


    Running an if statement


    ## The if-else Statement


    The if statement either runs code or it runs nothing. If you want to run code
    if a Boolean value is false, you could write two separate if statements as follows:


    `if BooleanValue {`


    `}`


    `if !BooleanValue {`


    `}`


    The first if statement runs if the BooleanValue is true. If not, then it does
    nothing.


    The second if statement runs if the BooleanValue is false. If not, then it does
    nothing.


    The problem with writing two separate if statements is that the logic of your
    program isn’t as clear. To fix this problem, Swift offers an if-else statement
    that looks like this:


    `if BooleanValue {`


        `// First set of code to run if true`


    `} else {`


        `// Second set of code to run if false`


    `}`


    An if-else statement offers exactly two different branches to follow. If a Boolean
    value is true, then the first set of code runs. If a Boolean is false, then the
    second set of code runs. At no time is it possible for both sets of code to run
    in an if-else statement.


    To see how Boolean values work with an if-else statement, follow these steps:


    Make sure the BooleanPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var BooleanValue : Bool = true` `if BooleanValue {`     `print
    ("The BooleanValue is true")` `} else {`     `print ("The BooleanValue is false")`
    `}`  


    Figure [7-3](#A978-1-4842-1233-2_7_Chapter.html#Fig3) shows how the if-else statement
    works when the BooleanValue is true. Change the BooleanValue to false and see
    how the if-else statement now runs the second set of code.


    ![A978-1-4842-1233-2_7_Fig3_HTML.jpg](A978-1-4842-1233-2_7_Fig3_HTML.jpg)


    Figure 7-3.


    Running an if-else statement'
  trans: "\n# 理解逻辑运算符\n\n任何比较运算符，例如 `78 > 9`，都会得出一个 `true` 或 `false` 值。然而，Swift 提供了专门的逻辑运算符，仅用于处理布尔值，如表\
    \ 7-2 所示。\n\n表 7-2. Swift 中的常见逻辑运算符\n\n| 比较运算符 | 用途 |\n| --- | --- |\n| `&&` |\
    \ 与 |\n| `\\|\\|` | 或 |\n| `!` | 非 |\n\n逻辑运算符“与”（`&&`）和“或”（`\\|\\|`）都接受两个布尔值，并将其转换为单个布尔值。逻辑运算符“非”（`!`）接受一个布尔值，并将其转换为相反的值。表\
    \ 7-3 展示了逻辑运算符“非”（`!`）的工作方式：\n\n表 7-3. 逻辑运算符“非”（`!`）\n\n| 示例 | 值 |\n| --- | ---\
    \ |\n| `!true` | `false` |\n| `!false` | `true` |\n\n“与”（`&&`）运算符接受两个布尔值，并根据表\
    \ 7-4 计算出一个单一的布尔值。\n\n表 7-4. Swift 中的逻辑“与”（`&&`）运算符\n\n| 第一个布尔值 | 第二个布尔值 | 结果\
    \ |\n| --- | --- | --- |\n| `true` && | `true` | `true` |\n| `true` && | `false`\
    \ | `false` |\n| `false` && | `true` | `false` |\n| `false` && | `false` | `false`\
    \ |\n\n“或”（`\\|\\|`）运算符接受两个布尔值，并根据表 7-5 计算出一个单一的布尔值。\n\n表 7-5. Swift 中的逻辑“或”（`\\\
    |\\|`）运算符\n\n| 第一个布尔值 | 第二个布尔值 | 结果 |\n| --- | --- | --- |\n| `true` \\|\\| |\
    \ `true` | `true` |\n| `true` \\|\\| | `false` | `true` |\n| `false` \\|\\| |\
    \ `true` | `true` |\n| `false` \\|\\| | `false` | `false` |\n\n要查看布尔值如何与比较运算符和逻辑运算符协同工作，请按照以下步骤创建一个新的\
    \ playground：\n\n1. 启动 Xcode。\n2. 选择 File ➤ New ➤ Playground。（如果你看到了 Xcode 欢迎界面，也可以点击“Get\
