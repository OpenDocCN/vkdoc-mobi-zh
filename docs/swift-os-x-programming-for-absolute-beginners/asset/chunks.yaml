    Swift is to give you the power of Objective-C while being far easier to learn,
    use, and understand. Swift is basically an improved version of Objective-C, which
    was an improved version of C.


    Each evolution of computer programming builds on the previous programming standards.
    When you write programs in Swift, you can use Swift’s unique features along with
    object-oriented features. In addition, you can also use event-driven programming,
    structured programming, and the three basic building blocks of programming (sequential,
    loops, and branching) when writing Swift programs as well.


    Swift, like all computer programming languages, contain a fixed list of commands
    known as keywords. To tell a computer what to do, you have to keywords to create
    statements that cause the computer to perform a single task.


    Keywords act as building blocks for any programming language. By combining keywords,
    you can create subprograms or functions that give a programming language more
    power. For example, one keyword in Swift is var, which defines a variable. One
    function defined in Swift is print, which prints data on the screen.


    You’ve already seen the print function that prints text such as:


    `print` `("Hello, world!")`


    This Swift print function (which stands for print line) works with any data enclosed
    in its parentheses. Just as learning a human language requires first learning
    the basic symbols used to write letters such as an alphabet or other symbols,
    so does learning a programming language require first learning the keywords and
    functions of that particular programming language.


    Although Swift contains dozens of keywords and functions, you don’t have to learn
    all of them at once to write programs in Swift. You just have to learn a handful
    of keywords and functions initially. As you get more experienced, you’ll gradually
    need to learn additional Swift keywords and functions.


    To make programming as easy as possible, Swift (like many programming languages)
    uses keywords and functions that look like ordinary English words such as print
    or var (short for variable). However, many programming languages, such as Swift,
    also use symbols that represent different features.


    Common symbols are mathematical symbols for addition (+), subtraction (-), multiplication
    (*), and division (/).


    Swift also uses curly brackets to group related code that needs to run together
    such as:


    `{`


    `print ("This is a message")`


    `print ("The message is done now")`


    `}`'
  trans: "\n### 多态性\n\n每个对象都由数据（存储在属性中）和用于操作这些数据的子程序（称为方法）组成。通过继承，一个对象可以使用另一个对象中定义的属性和方法。然而，当某个子程序（方法）需要执行不同的代码时，继承可能会带来问题。\n\
    \n假设你正在开发一款视频游戏。你可能会将汽车定义为一个对象，将怪物定义为另一个对象。如果怪物向汽车投掷石块，那么石块就是第三个对象。为了让汽车、怪物和石块在屏幕上移动，你可以创建一个名为\
    \ `Move` 的方法。\n\n但问题是，汽车在屏幕上的移动方式与怪物或投掷的石块不同。你可以创建三个子程序，并分别命名为 `MoveCar`、`MoveMonster`\
    \ 和 `MoveRock`。然而，一个更简单的解决方案是让这三个子程序共用同一个名称，比如 `Move`。\n\n在传统编程中，你绝不能给两个或更多子程序起相同的名称，因为计算机永远无法知道你实际要运行的是哪一个子程序。但在面向对象编程中，由于多态性的存在，你可以使用重复的子程序名称。\n\
    \n多态性允许你使用相同的方法名称，但用不同的代码来替换它。多态性之所以有效，是因为每个 `Move` 子程序（方法）都存储在不同的对象中，例如一个对象代表汽车，第二个对象代表怪物，第三个对象代表投掷的石块。要运行每个\
    \ `Move` 子程序，你需要指定包含你想要使用的 `Move` 子程序的对象，例如：\n\n- `Car.Move`\n- `Monster.Move`\n\
    - `Rock.Move`\n\n通过同时指定你想要操作的对象和想要使用的子程序，面向对象编程能够正确识别需要运行哪一组指令，即使一个子程序与另一个子程序具有完全相同的名称。\n\
    \n本质上，多态性允许你创建描述性的子程序名称，并且在你同时使用继承时，可以任意多次地重复使用该描述性名称。\n\n封装、继承和多态性的结合构成了面向对象编程的基础。封装将一个程序的某部分与另一部分隔离开来。继承允许你重用代码。多态性则允许你重用方法名称，但使用不同的代码。\n\
    \n## 理解编程语言\n\n一种编程语言不过是一种特定的表达思想的方式，就像西班牙语、阿拉伯语、汉语或英语等人类语言一样。计算机科学家创造编程语言是为了解决特定类型的问题。这意味着，一种编程语言可能非常适合解决某类问题，但在解决另一类不同的问题时却表现糟糕。\n\
    \n最流行的编程语言是 C 语言，它被设计用于对计算机硬件进行低级访问。因此，C 语言非常适合创建操作系统、反病毒程序和硬盘加密程序。任何需要完全控制硬件的任务，都是\
    \ C 语言的用武之地。\n\n然而，C 语言可能显得晦涩且精简，因为它旨在为计算机提供最高效率，而不考虑人类阅读、编写或修改 C 程序的效率。为了改进 C\
    \ 语言，计算机科学家创建了 C 语言的面向对象版本 C++，以及一个略有不同的面向对象版本 Objective-C，这后来成为了苹果公司为 OS X 和\
    \ iOS 编程所采用的语言。\n\n由于 C 语言最初的设计是为了计算机的效率而牺牲了人类的效率，因此包括 C++ 和 Objective-C 在内的所有\
    \ C 语言变体也可能难以学习、使用和理解。这就是苹果公司创建 Swift 的原因。Swift 的目的在于提供 Objective-C 的强大功能，同时更易于学习、使用和理解。Swift\
    \ 本质上是 Objective-C 的改进版本，而 Objective-C 又是 C 语言的改进版本。\n\n计算机编程的每一次演进都建立在前一代编程标准的基础之上。当你用\
    \ Swift 编写程序时，你可以使用 Swift 的独特特性以及面向对象的特性。此外，在编写 Swift 程序时，你还可以使用事件驱动编程、结构化编程以及编程的三大基本构建块（顺序、循环和分支）。\n\
    \n与所有计算机编程语言一样，Swift 包含一个固定的命令列表，称为关键字。要告诉计算机做什么，你必须使用关键字来创建语句，使计算机执行单个任务。\n\n\
    关键字是任何编程语言的基本构建块。通过组合关键字，你可以创建子程序或函数，从而赋予编程语言更强大的能力。例如，Swift 中的一个关键字是 `var`，它用于定义变量。Swift\
    \ 中定义的一个函数是 `print`，用于在屏幕上打印数据。\n\n你已经见过用于打印文本的 `print` 函数，例如：\n\n`print(\"Hello,\
    \ world!\")`\n\n这个 Swift 的 `print` 函数（代表打印行）适用于其括号内的任何数据。就像学习一门人类语言需要首先学习用于书写字母的基本符号（如字母表或其他符号）一样，学习一门编程语言也需要首先学习该特定编程语言的关键字和函数。\n\
    \n尽管 Swift 包含数十个关键字和函数，但你无需一次性全部掌握它们才能用 Swift 编写程序。你最初只需要学习少量关键字和函数。随着经验的增长，你会逐渐需要学习更多\
    \ Swift 的关键字和函数。\n\n为了尽可能简化编程，Swift（与许多编程语言一样）使用看起来像普通英语单词的关键字和函数，例如 `print` 或\
    \ `var`（variable 的缩写）。然而，许多编程语言（如 Swift）也会使用代表不同特性的符号。\n\n常见的符号是用于加法（`+`）、减法（`-`）、乘法（`*`）和除法（`/`）的数学符号。\n\
    \nSwift 还使用花括号来分组需要一起运行的关联代码，例如：\n\n```\n{\n    print(\"这是一条消息\")\n    print(\"\
    消息现在结束了\")\n}\n```\n"
- fmt: 'Unlike human languages where you can misspell a word or forget to end a sentence
    with a period and people can still understand what you’re saying, programming
    languages are not so forgiving. With a programming language, every keyword and
    function must be spelled correctly, and every symbol must be used where needed.
    Misspell a single keyword or function, use the wrong symbol, or put the right
    symbol in the wrong place, and your entire program will fail to work.


    Programming languages are precise. The key to programming is to write:


    - As little code as possible

    - Code that does as much as possible

    - Code that’s as easy to understand as possible


    You want to write as little code as possible because the less code you write,
    the easier it will be to ensure that it works right.


    You want code that does as much as possible because that makes your program more
    capable of solving bigger problems.


    You want code that’s easy to understand because that makes it easy to fix problems
    and add features.


    Unfortunately, these three criteria are often at odds with one another as shown
    in Figure [1-5](#A978-1-4842-1233-2_1_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_1_Fig5_HTML.gif](A978-1-4842-1233-2_1_Fig5_HTML.gif)


    Figure 1-5. The three, often contradictory, goals of programming


    If you write as little code as possible, that usually means your code can’t do
    much. That’s why programmers often resort to shortcuts and programming tricks
    to condense the size of their code, but that also increases the complexity of
    their code, making it harder to understand.


    If you write code that does as much as possible, that usually means writing large
    numbers of commands, which makes the code harder to understand.


    If you write code that’s easy to understand, it usually won’t do much. If you
    write more code to make it do more, that makes it harder to understand.


    Ultimately, computer programming is more of an art than a science. In general,
    it’s better to focus on making code as easy to understand as possible because
    that will make it easier to fix problems and add new features. In addition, code
    that’s easy to understand means other programmers can fix and modify your program
    if you can’t do it.


    That’s why Apple created Swift to make code easier to understand than Objective-C
    without sacrificing the power of Objective-C. Despite being more powerful than
    Objective-C, Swift code can often be shorter than equivalent Objective-C code.
    For that reason, the future programming language of Apple will be Swift.


    ## The Cocoa Framework


    Keywords, functions, and symbols let you give instructions to a computer, but
    no programming language can provide every possible command you might need to create
    all types of programs. To provide additional commands, programmers use keywords
    to create subprograms that perform a specific task.


    When they create a useful subprogram, they often save it in a library of other
    useful subprograms. Now when you write a program, you can use the programming
    language’s keywords plus any subprograms stored in libraries. By reusing subprograms
    stored in libraries, you can create more powerful and reliable code.


    For example, one library might contain subprograms for displaying graphics. Another
    library might contain subprograms for saving data to a disk and retrieving it
    again. Still another library might contain subprograms for calculating mathematical
    formulas. To make writing OS X and iOS programs easier, Apple has created a library
    framework of useful subprograms called the Cocoa framework.


    There are two reasons for reusing an existing framework. First, reusing a framework
    keeps you from having to write your own instructions to accomplish a task that
    somebody else has already solved. Not only does a framework provide a ready-made
    solution, but a framework has also been tested by others, so you can just use
    the framework and be assured that it will work correctly.


    A second reason to use an existing framework is for consistency. Apple provides
    frameworks for defining the appearance of a program on the screen, known as the
    user interface. This defines how a program should behave from displaying windows
    on the screen to letting you resize or close a window by clicking the mouse.


    It’s perfectly possible to write your own instructions for displaying windows
    on the screen, but chances are good that writing your own instructions would take
    time to create and test, and the end result would be a user interface that may
    not look or behave identically as other OS X or iOS programs.


    However, by reusing an existing framework, you can create your own program quickly
    and ensure that your program behaves the same way that other programs behave.
    Although programming might sound complicated, Apple provides hundreds of pre-written
    and tested subprograms that help you create programs quickly and easily. All you
    have to do is write the custom instructions that make your program solve a specific,
    unique problem.


    To understand how Apple’s Cocoa framework works, you need to understand object-oriented
    programming for two reasons. First, Swift is an object-oriented programming language,
    so to take full advantage of Swift, you need to understand the advantages of object-oriented
    programming.


    Second, Apple’s Cocoa framework is based on object-oriented programming. To understand
    how to use the Cocoa framework, you need to use objects.


    Note


    The Cocoa framework is designed for creating OS X programs. A similar framework
    called Cocoa Touch is designed for creating iOS apps. Because the Cocoa Touch
    framework (iOS) is based on the Cocoa framework (OS X), they both work similarly
    but offer different features.


    By relying on the Cocoa framework, your programs can gain new features each time
    Apple updates and improves the Cocoa framework. For example, spell checking is
    a built-in feature of the Cocoa framework. If you write a program using the Cocoa
    framework, your programs automatically get spell-checking capabilities without
    you having to write any additional code whatsoever. When Apple improves the spell-checking
    feature in the Cocoa framework, your program automatically gets those improvements
    with no extra effort on your part.


    The Cocoa framework is a general term that describes all of Apple’s pre-written
    and tested libraries of code. Some different parts of the Cocoa framework can
    give your programs audio playing capabilities, graphics capabilities, contact
    information storage abilities such as names and addresses, and Internet capabilities.


    The Cocoa framework creates the foundation of a typical OS X program. All you
    have to do is write Swift code that makes your program unique.'
