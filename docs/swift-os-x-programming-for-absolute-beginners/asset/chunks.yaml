    `displayLabel.stringValue = "Clicked Recessed Button"`


    `case 2:`


    `displayLabel.stringValue = "Clicked Inline Button"`


    `default:`


    `displayLabel.stringValue = "Unknown"`


    `}`


    `}`


    `}`


    The sender: AnyObject code means that the IBAction method can connect to any type
    of user interface item. First, we’ll check if the sender (the user interface item
    that called the IBAction method) is an NSButton. If so, then we’ll cast the sender
    as an NSButton and assign that button to whichObject.


    Now we’ll use the tab property of whichObject to determine which button the user
    clicked using a switch statement. We’ll display the proper message in the label
    depending on which button the user clicked.


    Choose Product ➤ Run. Your program’s user interface appears.   Click on the three
    different buttons to see the proper message appear in the label.   Choose MultipleProgram
    ➤ Quit Multiple Program.


    In this example, you connected multiple buttons to a single IBAction method. However,
    you can connect different user interface items to the same IBAction method as
    long as that IBAction method has (sender: AnyObject) as its parameter.


    To see how another user interface item can connect to an IBAction method, follow
    these steps:


    Drag a Vertical Slider and place it anywhere on your user interface.   Move the
    mouse pointer over the Vertical Slider, hold down the Control key, and drag the
    mouse over the IBAction displayButton method until Xcode highlights the entire
    IBAction method.   Release the Control key and the mouse button. The IBAction
    method is now linked to the Vertical Slider.   Modify the IBAction method so it
    looks like this:


    `@IBAction func displayButton(sender: AnyObject) {`


    `if sender is NSButton {`


    `let whichObject = sender as! NSButton`


    `switch whichObject.tag {`


    `case 0:`


    `displayLabel.stringValue = "Clicked Push Button"`


    `case 1:`


    `displayLabel.stringValue = "Clicked Recessed Button"`


    `case 2:`


    `displayLabel.stringValue = "Clicked Inline Button"`


    `default:`


    `displayLabel.stringValue = "Unknown"`


    `}`


    `} else if sender is NSSlider {`


    `displayLabel.stringValue = "Dragged slider"`


    `}`


    `}`


    The last else-if portion of the code checks if the sender is an NSSlider, which
    means the user dragged the vertical slider, which called the IBAction method.
    If the user dragged the vertical slider, then the code puts the string “Dragged
    slider” into the label.


    Choose Product ➤ Run. Your user interface appears.   Drag the vertical slider.
    Notice that “Dragged slider” appears in the label.   Click on any button. Notice
    that the label now identifies which button you clicked. The buttons and vertical
    slider are all linked to the same IBAction method, which must determine which
    user interface item called the IBAction method to run.   Choose MultipleProgram
    ➤ Quit MultipleProgram.


    ## Working with Pop-Up Buttons


    Buttons can be handy for displaying commands on the screen, but if you need to
    offer several options, then having each button represent one command can get cumbersome
    and crowded. One option is to condense multiple options into a single pop-up button.
    A pop-up button takes less space and can provide a large number of options for
    the user to select.


    To see how pop-up buttons work, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type PopupProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    MainMenu.xib file in the Project Navigator. Your program’s user interface appears.
      Click the PopupProgram icon to display the window of your program’s user interface.
      Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.   Drag a Popup Button and a Label
    on to the user interface window and resize the width of the Label so it looks
    like Figure [15-10](#A978-1-4842-1233-2_15_Chapter.html#Fig10).


    ![A978-1-4842-1233-2_15_Fig10_HTML.jpg](A978-1-4842-1233-2_15_Fig10_HTML.jpg)


    Figure 15-10.


    The user interface of the PopupProgram   Choose View ➤ Assistant Editor ➤ Show
    Assistant Editor. Xcode displays the AppDelegate.swift file next to your user
    interface.   Move the mouse pointer over the label, hold down the Control key,
    and drag underneath the IBOutlet line in the AppDelegate.swift file.   Release
    the Control key and the mouse. A pop-up window appears.   Click in the Name text
    field, type labelChoice, and click the Connect button. Xcode creates an IBOutlet
    as follows:  


    `@IBOutlet weak var labelChoice: NSTextField!`


    Move the mouse pointer over the pop-up button, hold down the Control key, and
    drag the mouse above the last curly bracket in the bottom of the AppDelegate.swift
    file.   Release the Control key and the mouse. A pop-up window appears.   Click
    in the Connection pop-up menu and choose Action.   Click in the Name text field
    and type showChoice.   Click in the Type pop-up menu and choose NSPopUpButton.
    Then click the Connect button. Xcode displays an empty IBAction method.   Modify
    the IBAction method as follows:  


    `@IBAction func showChoice(sender: NSPopUpButton) {`


        `labelChoice.stringValue = sender.titleOfSelectedItem!`


    `}`


    Choose Product ➤ Run. Your user interface window appears.   Click on the pop-up
    button. Notice that by default, a pop-up button contains three generic items labeled
    Item 1, Item 2, and Item 3.   Click on an option. Notice that your chosen option
    appears in the label.   Choose PopupProgram ➤ Quit PopupProgram.'
