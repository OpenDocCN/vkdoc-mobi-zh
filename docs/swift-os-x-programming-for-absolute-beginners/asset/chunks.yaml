  trans: '

    # 设计用户界面


    在设计用户界面时，请牢记任何用户界面的三个目的：


    - 向用户显示信息

    - 从用户处获取数据

    - 让用户向程序发出命令


    在设计用户界面时，每个元素都必须满足这些标准之一。颜色和线条可能看起来只是装饰性的，但它们对于组织用户界面非常有用，使用户知道在哪里查找信息、如何输入数据，或者如何向程序发出命令。


    要在`Xcode`中创建用户界面，你需要遵循一个两步流程：


    - 使用对象库将项目拖放到你的用户界面上

    - 使用检查器面板自定义每个用户界面项目


    要了解如何使用对象库，我们向`MyFirstProgram`用户界面添加一个标签、一个文本字段和一个按钮。标签将向用户显示文本；文本字段将让用户输入数据；按钮将使程序从文本字段获取文本，通过将每个字符大写来修改它，并将修改后的大写文本放入标签中。


    为此，请按照以下步骤操作：


    确保你的`MyFirstProgram`项目已加载到`Xcode`中。选择**视图** > **导航器** > **显示项目导航器**，或按`Command+1`查看组成`MyFirstProgram`项目的所有文件列表。点击`MainMenu.xib`文件。`Xcode`会显示用户界面。请注意，只有当你点击`MyFirstProgram`图标时，`MyFirstProgram`的实际窗口才会可见。点击出现在项目导航器和用户界面之间窗格中的`MyFirstProgram`图标。这将显示`MyFirstProgram`用户界面的窗口，如图
    3-5 所示。


    ![A978-1-4842-1233-2_3_Fig5_HTML.jpg](img/A978-1-4842-1233-2_3_Fig5_HTML.jpg)


    图 3-5. `MyFirstProgram`图标显示`MyFirstProgram`用户界面


    选择**视图** > **实用工具** > **显示对象库**。对象库出现在`Xcode`窗口的右下角。从对象库中拖拽一个下压按钮，并将其放置在`MyFirstProgram`窗口的底部附近。请注意，当你将按钮放置在窗口中部靠近底部的位置时，会出现蓝色辅助线，帮助你对齐用户界面项目，如图
    3-6 所示。


    ![A978-1-4842-1233-2_3_Fig6_HTML.jpg](img/A978-1-4842-1233-2_3_Fig6_HTML.jpg)


    图 3-6. 使用蓝色辅助线将下压按钮放置在`MyFirstProgram`窗口底部附近


    点击对象库中的搜索字段，然后输入`label`。请注意，对象库现在只显示标签用户界面项目，如图 3-7 所示。


    ![A978-1-4842-1233-2_3_Fig7_HTML.jpg](img/A978-1-4842-1233-2_3_Fig7_HTML.jpg)


    图 3-7. 在搜索字段中键入内容有助于你轻松找到对象库中的项目


    将标签从对象库拖放到`MyFirstProgram`窗口的中央。点击对象库底部搜索字段右侧出现的清除图标（灰色圆圈中的 X）。对象库现在显示所有可能的用户界面项目。滚动对象库，直到找到文本字段项目。将文本字段拖放到标签上方，这样你的整个用户界面就如图
    3-8 所示。（不用担心每个用户界面项目的精确位置。）


    ![A978-1-4842-1233-2_3_Fig8_HTML.jpg](img/A978-1-4842-1233-2_3_Fig8_HTML.jpg)


    图 3-8. `MyFirstProgram`用户界面上的一个标签、文本字段和按钮


    至此，你已经自定义了通用的用户界面。现在你需要使用检查器面板自定义每个用户界面项目。通过检查器面板，你可以为用户界面项目选择不同的选项，例如输入按钮的精确宽度或为文本字段选择背景颜色。


    在调整用户界面项目的大小或移动它时，你可以将精确值输入到大小检查器面板中，也可以直接拖拽鼠标来调整大小或移动项目。两种方法都可以接受，但大小检查器面板能让你对项目进行精确控制。让我们看看如何使用检查器面板来自定义我们的通用用户界面。


    点击`MyFirstProgram`窗口底部附近的下压按钮以将其选中。选择**视图** > **实用工具** > **显示属性检查器**。属性检查器面板出现在`Xcode`窗口的右上角，如图
    3-9 所示。


    ![A978-1-4842-1233-2_3_Fig9_HTML.jpg](img/A978-1-4842-1233-2_3_Fig9_HTML.jpg)


    图 3-9. 属性检查器面板让你能够自定义项目的外观


    点击当前显示“Button”的标题文本字段。删除标题文本字段中的所有现有文本，输入`Change Case`，然后按`Return`键。下压按钮上的文本现在显示“Change
    Case”。但是，按钮宽度太窄了。选择**视图** > **实用工具** > **显示大小检查器**。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，将值更改为`120`，如图
    3-10 所示，然后按`Return`键。`Xcode`会更改下压按钮的宽度。


    ![A978-1-4842-1233-2_3_Fig10_HTML.jpg](img/A978-1-4842-1233-2_3_Fig10_HTML.jpg)


    图 3-10. 宽度文本字段出现在大小检查器面板中


    点击标签以将其选中。要修改标签的大小，我们需要打开大小检查器面板，可以通过选择**视图** > **实用工具** > **显示大小检查器**来实现，但有一种更快的方法，即使用键盘快捷键或图标。按`Option+Command+5`或直接点击大小检查器图标（看起来像一把垂直的尺子）。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，输入`250`，然后按`Return`键。`Xcode`会加宽标签的宽度。


    点击文本字段以将其选中。按`Option+Command+5`或直接点击大小检查器图标（看起来像一把垂直的尺子）。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，输入`250`，然后按`Return`键。`Xcode`会加宽文本字段的宽度。此时，所有用户界面项目看起来都偏离了中心。拖拽每个项目，直到看到蓝色辅助线显示你已将其居中在`MyFirstProgram`窗口中，如图
    3-11 所示。


    ![A978-1-4842-1233-2_3_Fig11_HTML.jpg](img/A978-1-4842-1233-2_3_Fig11_HTML.jpg)


    图 3-11. 使用蓝色辅助线将项目居中于用户界面


    至此，你已经自定义了用户界面的外观。如果你运行这个程序，用户界面看起来会不错，但它实际上不会执行任何操作。要使一个用户界面工作，你还需要完成两个步骤：


    - 编写 Swift 代码

    - 将你的用户界面连接到你的 Swift 代码


    你需要编写 Swift 代码让你的程序计算出一些有用的结果。你还需要将你的用户界面连接到你的 Swift 代码，这样你可以从用户界面检索数据并将信息显示回用户界面上。


    在这个例子中，我们将编写 Swift 代码，当用户点击`Change Case`下压按钮时，代码从文本字段检索文本，将其更改为大写，然后将大写文本显示回标签上。


    因此，我们需要编写将文本转换为大写的 Swift 代码。然后我们需要连接文本字段和标签，以便 Swift 代码可以从文本字段检索数据并将新数据放入标签。


    为了向用户界面项目发送或检索数据以便 Swift 代码可以访问它，我们需要使用一种叫做`IBOutlet`的东西。一个`IBOutlet`本质上是将一个用户界面项目（例如标签或文本字段）表示为一个
    Swift 代码可以使用的变量。

    '
- fmt: '# 创建 IBOutlet 并使用 Assistant Editor


    要创建 `IBOutlet`，请使用 Assistant Editor。Assistant Editor 可以在一个窗格中显示用户界面，在相邻的窗格中显示您的
    Swift 代码。然后，您可以使用鼠标将用户界面项拖拽到 Swift 代码中，从而创建将标签或文本字段连接到 `IBOutlet` 的 `IBOutlet`。让我们看看具体如何操作：


    确保已选中 `MainMenu.xib` 文件，以便在屏幕上显示 MyFirstProgram 用户界面窗口。（如果没有，请在 Project Navigator
    中点击 `MainMenu.xib` 文件，然后点击 MyFirstProgram 图标以显示用户界面窗口。）选择 **View ➤ Assistant Editor
    ➤ Show Assistant Editor**。Assistant Editor 会在 `AppDelegate.swift` 文件中显示 Swift
    代码，与 `MainMenu.xib` 文件中的用户界面并排显示，如图 3-12 所示。


    ![A978-1-4842-1233-2_3_Fig12_HTML.jpg](A978-1-4842-1233-2_3_Fig12_HTML.jpg)


    **Figure 3-12.** Assistant Editor 让您并排查看用户界面和 Swift 代码文件


    点击 MyFirstProgram 窗口上的标签。按住 Control 键，将鼠标从标签拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`
    行的下方，直到 Swift 代码文件中出现一条水平线，如图 3-13 所示。


    ![A978-1-4842-1233-2_3_Fig13_HTML.jpg](A978-1-4842-1233-2_3_Fig13_HTML.jpg)


    **Figure 3-13.** Control-拖拽可在用户界面项与 Swift 代码之间创建连接


    松开 Control 键和鼠标。会出现一个弹出窗口，如图 3-14 所示。


    ![A978-1-4842-1233-2_3_Fig14_HTML.jpg](A978-1-4842-1233-2_3_Fig14_HTML.jpg)


    **Figure 3-14.** 弹出窗口让您为 `IBOutlet` 定义名称


    在 Name 文本字段中点击，输入 `labelText`，然后点击 Connect 按钮。（您选择的名称应具有描述性，但可以是任何您想要的名称。）Xcode
    会在您的 Swift 文件中创建一个如下所示的 `IBOutlet`：


    `@IBOutlet weak var labelText: NSTextField!`


    点击文本字段以将其选中。按住 Control 键，将鼠标从文本字段拖拽到您刚创建的 `IBOutlet` 下方，直到 `AppDelegate.swift`
    文件中出现一条水平线。松开 Control 键和鼠标。会出现一个弹出窗口。在 Name 文本字段中点击，输入 `messageText`，然后点击 Connect
    按钮。Xcode 会在您的 Swift 文件中创建第二个如下所示的 `IBOutlet`：


    `@IBOutlet weak var messageText: NSTextField!`


    让我们回顾一下您刚才的操作。首先，您创建了一个代表标签和文本字段的 `IBOutlet`。现在，标签由名称 `labelText` 表示，文本字段由名称 `messageText`
    表示。当您的 Swift 代码想要在标签或文本字段中存储或检索数据时，它可以直接通过名称 `labelText` 或 `messageText` 来引用它们。


    其次，您在 Swift 代码和用户界面项之间创建了一个链接。现在，您的 Swift 代码可以向程序用户界面上的标签和文本字段发送数据，并从中检索数据。


    将用户界面连接到 Swift 代码是使用户界面真正工作的重要一步。但是，我们需要让 Change Case 按钮在用户点击时执行某些操作。为此，我们需要创建一种叫做
    `IBAction` 方法的东西。


    `IBOutlet` 让 Swift 代码可以向用户界面项发送数据或从中检索数据，而 `IBAction` 方法则让用户界面项可以运行执行某些操作的 Swift
    代码。在本例中，我们希望用户在文本字段中输入文本。然后，程序会获取该文本，将其转换为大写，并将转换后的文本显示回标签中。


    为此，我们需要了解如何执行以下操作：


    - 创建 `IBAction` 方法

    - 从文本字段中检索文本

    - 将从文本字段检索到的所有文本转换为大写

    - 将转换后的文本存储在标签中


    从文本字段和标签中存储和检索文本是类似的，因为两者都由 `IBOutlet` 变量定义。让我们看看这些 `IBOutlet` 的含义：


    ```

    @IBOutlet weak var labelText: NSTextField!

    @IBOutlet weak var messageText: NSTextField!

    ```


    Object Library 中的所有用户界面项都基于构成 Cocoa 框架的类文件。在本例中，我们创建了两个 `IBOutlet` 变量，名为 `labelText`
    和 `messageText`，它们都基于 `NSTextField` 类文件。


    如果您在 Xcode 的文档中查找 `NSTextField` 类文件，您会看到一长串所有基于 `NSTextField` 的对象可以拥有的属性。但是，您找不到任何描述保存文本的属性的内容。


    然而，如果您还记得第 1 章的内容，面向对象编程意味着类文件可以从其他类文件继承。在本例中，`NSTextField` 类继承自另一个名为 `NSControl`
    的类。在 Xcode 文档中查找 `NSControl`（您将在下一章学习如何操作），您会看到 `NSControl` 有一个保存文本的属性，名为 `stringValue`，如图
    3-15 所示。


    ![A978-1-4842-1233-2_3_Fig15_HTML.jpg](A978-1-4842-1233-2_3_Fig15_HTML.jpg)


    **Figure 3-15.** Xcode 文档显示 `NSControl` 用于保存文本的属性


    要访问文本字段中存储的文本，我们需要通过名称 (`messageText`) 和保存文本的属性 (`stringValue`) 来标识文本字段，例如：


    `messageText.stringValue`


    要在标签中显示文本，我们需要通过名称 (`labelText`) 和保存文本的属性 (`stringValue`) 来标识标签，例如：


    `labelText.stringValue`


    那么下一个问题是：我们如何将文本转换为大写？Swift 将文本存储在一个名为 `String` 的数据类型中，该类型基于名为 `NSString` 的类。（您怎么知道这一点？您需要理解
    Cocoa 框架，您将在第 4 章中了解更多。）`NSString` 类有一个名为 `uppercaseString` 的方法，如图 3-16 所示。


    ![A978-1-4842-1233-2_3_Fig16_HTML.jpg](A978-1-4842-1233-2_3_Fig16_HTML.jpg)


    **Figure 3-16.** Xcode 文档显示 `NSString` 类有一个用于将文本转换为大写的方法，名为 `uppercaseString`


    要将文本字段中存储的文本（由 `IBOutlet` 名称 `messageText` 表示）转换为大写，我们只需对 `IBOutlet` 的文本属性应用 `uppercaseString`
    方法，如下所示：


    `messageText.stringValue.uppercaseString`


    这段 Swift 代码的意思是：获取 `messageText` 对象（即用户界面上的文本字段），检索它包含的文本（位于 `stringValue` 属性中），然后对该文本应用
    `uppercaseString` 方法。


    现在我们已经知道如何从文本字段中检索文本、将其转换为大写，并将新文本存储回标签中，最后一步是编写代码，将所有操作放在一个 `IBAction` 方法中。这个
    `IBAction` 方法需要在用户每次点击 Change Case 按钮时运行。这意味着我们需要创建一个 `IBAction` 方法并将其链接到 Change
    Case 按钮。


    确保 Assistant Editor 仍然打开，并并排显示用户界面和 `AppDelegate.swift` 文件。点击 MyFirstProgram 用户界面上的
    Change Case 按钮以将其选中。按住 Control 键，将鼠标拖拽到最后一个 `IBOutlet` 下方，直到出现一条水平线，如图 3-17 所示。


    ![A978-1-4842-1233-2_3_Fig17_HTML.jpg](A978-1-4842-1233-2_3_Fig17_HTML.jpg)


    **Figure 3-17.** 从按钮 Control-拖拽到 `AppDelegate.swift` 文件


    松开 Control 键和鼠标。会出现一个弹出窗口。点击 Connection 弹出菜单，选择 Action，如图 3-18 所示。


    ![A978-1-4842-1233-2_3_Fig18_HTML.jpg](A978-1-4842-1233-2_3_Fig18_HTML.jpg)


    **Figure 3-18.**'
  raw: 'To help you create an IBOutlet, use the Assistant Editor. The Assistant Editor
    lets you display the user interface in one pane and your Swift code in an adjacent
    pane. Then you can use the mouse to drag between your user interface items to
    your Swift code to create an IBOutlet that connects the label or text field to
    an IBOutlet. Let’s see how that works:


    Make sure the MainMenu.xib file is selected to display the MyFirstProgram user
    interface window on the screen. (If not, click the MainMenu.xib file in the Project
    Navigator and then click the MyFirstProgram icon to display the user interface
    window.)   Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The Assistant
    Editor displays the Swift code in the AppDelegate.swift file next to the user
    interface in the MainMenu.xib file as shown in Figure [3-12](#A978-1-4842-1233-2_3_Chapter.html#Fig12).


    ![A978-1-4842-1233-2_3_Fig12_HTML.jpg](A978-1-4842-1233-2_3_Fig12_HTML.jpg)


    Figure 3-12.


    The Assistant Editor lets you view the user interface and Swift code file side
    by side   Click on the label on your MyFirstProgram window.   Hold down the Control
    key and drag the mouse from the label underneath the @IBOutlet line in the AppDelegate.swift
    file until you see a horizontal line appear in the Swift code file as shown in
    Figure [3-13](#A978-1-4842-1233-2_3_Chapter.html#Fig13).


    ![A978-1-4842-1233-2_3_Fig13_HTML.jpg](A978-1-4842-1233-2_3_Fig13_HTML.jpg)


    Figure 3-13.


    Control-dragging creates a connection between a user interface item and your Swift
    code   Release the Control key and the mouse. A pop-up window appears as shown
    in Figure [3-14](#A978-1-4842-1233-2_3_Chapter.html#Fig14).


    ![A978-1-4842-1233-2_3_Fig14_HTML.jpg](A978-1-4842-1233-2_3_Fig14_HTML.jpg)


    Figure 3-14.


    A pop-up window lets you define a name for your IBOutlet   Click in the Name text
    field, type labelText, and click the Connect button. (The name you choose should
    be descriptive but can be anything you want.) Xcode creates an IBOutlet in your
    Swift file that looks like this: `@IBOutlet weak var labelText: NSTextField!`
      Click on the text field to select it.   Hold down the Control key and drag the
    mouse from the text field to underneath the IBOutlet you just created until a
    horizontal line appears in the AppDelegate.swift file.   Release the Control key
    and the mouse. A pop-up window appears.   Click in the Name text field, type messageText,
    and click the Connect button. Xcode creates a second IBOutlet in your Swift file
    that looks like this: `@IBOutlet weak var messageText: NSTextField!`


    Let’s go over what you just did. First, you created an IBOutlet to represent the
    label and the text field. The label is now represented by the name “labelText,”
    and the text field is now represented by the name “messageText.” Now when your
    Swift code wants to store or retrieve data from the label or text field, it can
    just refer to them by the names “labelText” or “messageText.”


    Second, you created a link between your Swift code and your user interface items.
    Now your Swift code can send and retrieve data to the label and text field on
    your program’s user interface.


    Connecting your user interface to your Swift code is a major step toward making
    your user interface actually work. However, we need to make the Change Case button
    do something when the user clicks on it. To do that, we need to create something
    called an IBAction method.


    Where an IBOutlet lets Swift code send or retrieve data from a user interface
    item, an IBAction method lets a user interface item run Swift code that does something.
    In this case, we want the user to type text into the text field. Then the program
    will take that text, capitalize it, and display this capitalized text back into
    the label.


    To do this, we need to know how to do the following:


    *   Create an IBAction method

    *   Retrieve text from the text field

    *   Capitalize all the text retrieved from the text field

    *   Store the capitalized text in the label


    Storing and retrieving text from a text field and label is similar because both
    are defined by IBOutlet variables. Let’s take a look at what these IBOutlets mean:


    `@IBOutlet weak var labelText: NSTextField!`


    `@IBOutlet weak var messageText: NSTextField!`


    All user interface items in the Object Library are based on class files, which
    make up the Cocoa framework. In this case, we created two IBOutlet variables called
    labelText and messageText, which are both based on the NSTextField class file.


    If you look up the NSTextField class file in Xcode’s documentation, you’ll see
    a long list of all the properties that anything based on the NSTextField can hold.
    However, you won’t find anything that describes the property that holds text.


    However, if you remember from [Chapter 1](#A978-1-4842-1233-2_1_Chapter.html),
    object-oriented programming means that class files can inherit from other class
    files. In this case, the NSTextField class inherits from another class called
    NSControl. Looking up NSControl in Xcode’s documentation (which you’ll learn how
    to do in the next chapter), you can see that NSControl has a property that holds
    text called stringValue as shown in Figure [3-15](#A978-1-4842-1233-2_3_Chapter.html#Fig15).


    ![A978-1-4842-1233-2_3_Fig15_HTML.jpg](A978-1-4842-1233-2_3_Fig15_HTML.jpg)


    Figure 3-15.


    Xcode’s documentation shows the NSControl property for holding text


    To access text stored in the text field, we need to identify the text field by
    name (messageText) and its property that holds the text (stringValue) such as:


    `messageText.stringValue`


    To display text in the label, we need to identify the label by name (labelText)
    and its property that holds text (stringValue) such as:


    `labelText.stringValue`


    Now the next question is how can we capitalize text? Swift stores text in a data
    type called String, which is based on a class called NSString. (How would you
    know this? You have to understand the Cocoa framework, which you’ll learn more
    about in [Chapter 4](#A978-1-4842-1233-2_4_Chapter.html).) The NSString class
    has a method called uppercaseString as shown in Figure [3-16](#A978-1-4842-1233-2_3_Chapter.html#Fig16).


    ![A978-1-4842-1233-2_3_Fig16_HTML.jpg](A978-1-4842-1233-2_3_Fig16_HTML.jpg)


    Figure 3-16.


    Xcode’s documentation shows the NSString class has a method for capitalizing text
    called uppercaseString


    To capitalize the text stored in the text field (represented by the IBOutlet name
    messageText, we just have to apply the uppercaseString method on the IBOutlet’s
    text property like this:


    `messageText.stringValue.uppercaseString`


    This Swift code says take the messageText object (which is the text field on the
    user interface), retrieve the text it contains (which is in the stringValue property),
    and apply the uppercaseString method on this text.


    Now that we know how to retrieve text from the text field, capitalize it, and
    store new text back into the label, the last step is to write the code that does
    all this inside an IBAction method. This IBAction method needs to run each time
    the user clicks the Change Case button. That means we need to create an IBAction
    method and link it to the Change Case button.


    Make sure the Assistant Editor is still open and displays the user interface and
    AppDelegate.swift file side by side.   Click on the Change Case button on your
    MyFirstProgram user interface to select it.   Hold down the Control key and drag
    the mouse underneath the last IBOutlet until a horizontal line appears as shown
    in Figure [3-17](#A978-1-4842-1233-2_3_Chapter.html#Fig17).


    ![A978-1-4842-1233-2_3_Fig17_HTML.jpg](A978-1-4842-1233-2_3_Fig17_HTML.jpg)


    Figure 3-17.


    Control-dragging from the button to the AppDelegate.swift file   Release the Control
    key and the mouse. A pop-up window appears.   Click in the Connection pop-up menu
    and choose Action as shown in Figure [3-18](#A978-1-4842-1233-2_3_Chapter.html#Fig18).


    ![A978-1-4842-1233-2_3_Fig18_HTML.jpg](A978-1-4842-1233-2_3_Fig18_HTML.jpg)


    Figure 3-18.'
