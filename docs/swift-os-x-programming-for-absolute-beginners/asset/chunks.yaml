  raw: '### Overriding Properties


    Besides overriding methods, Swift also lets you override properties. When you
    override properties, you must keep the same property name and data type. What
    you can change are the getters and setters along with the property observers of
    a variable.


    At the simplest level, a getter simply returns a value of a variable. On a more
    sophisticated level, a getter calculates a value. Consider the following:


    `class basicDesign {`


        `var location: Int {`


            `get {`


                `return 4`


            `}`


        `}`


    `}`


    This basicDesign class defines a single property called location with a getter
    that returns the value 4 in the location property. To override this property,
    you need to retain the variable name and data type (Int), but you can change the
    getter code such as:


    `class newDesign : basicDesign {`


        `override var location: Int {`


            `get {`


                `return 7`


            `}`


        `}`


    `}`


    This newDesign class inherits the location property from the basicDesign class.
    However it overrides the location property with a new getter that returns a value
    of 7.


    To see how overriding properties work, follow these steps:


    Make sure your InheritPlayground file is loaded into Xcode.   Edit the code as
    follows:  


    `import Cocoa`


    `class basicDesign {`


        `var location: Int {`


            `get {`


                `return 4`


            `}`


        `}`


    `}`


    `class newDesign : basicDesign {`


        `override var location: Int {`


            `get {`


                `return 7`


            `}`


        `}`


    `}`


    `var ant = basicDesign()`


    `var fly = newDesign()`


    `ant.location`


    `fly.location`


    In this example, the ant object is based on the basicDesign class, which defines
    the location property with a value of 4\. The fly object is based on the newDesign
    class, which inherits the location property. However, the newDesign class overrides
    the location property’s getter code so instead of storing a value of 4 in the
    location property, it stores a value of 7, instead, as shown in Figure [12-6](#A978-1-4842-1233-2_12_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_12_Fig6_HTML.jpg](A978-1-4842-1233-2_12_Fig6_HTML.jpg)


    Figure 12-6.


    Overriding properties with new getter code


    Remember, when overriding methods and properties, you can only change:


    *   code in the method

    *   code in the property’s getter/setter or property observer


    You can never change the:


    *   method name

    *   method parameter list

    *   property name

    *   property data type


    ### Preventing Polymorphism


    In some cases, you may want to prevent a method, property, or even an entire class
    from being modified through polymorphism. To do this, you just need to insert
    the “final” keyword. If you wanted to prevent an entire class from being inherited,
    just put the “final” keyword in front of the class name like this:


    `final class className {`


             `var propertyName = initialValue`


             `func methodName() {`


            `}`


    `}`


    Note


    If you place “final” in front of a class name, it automatically prevents that
    class’s properties and methods from being overridden so you don’t need to place
    “final” in front of each property or method name.


    If you wanted to prevent an individual property or method from being overridden,
    just place the “final” keyword in front of the property or method like this:


    `class className {`


             `final var propertyName = initialValue`


             `func methodName() {`


            `}`


    `}`


    The “final” keyword in the above example prevents the property from being overridden
    while allowing the method to be overridden. If you wanted to prevent the method
    from being overridden while allowing the property to be overridden, you would
    place the “final” keyword in front of the method like this:


    `class className {`


             `var propertyName = initialValue`


             `final func methodName() {`


            `}`


    `}`


    ## Using Extensions


    If there’s a class that contains the properties and methods you need, the object-oriented
    approach is to inherit from that class (create a subclass). The problem with constantly
    creating subclasses is that it can get awkward to create objects from slightly
    different class files.


    This can be especially true when you want to extend the features of classes that
    are part of the Cocoa framework. For example, if you’re working with String data
    types, you probably don’t want to


    create a subclass of the String data type and then create objects based on this
    new subclass. Ideally, you want to continue using String data types but have added
    features as well.


    That’s why Swift offers extensions. Extensions essentially let you add code to
    an existing class without creating a subclass. That way you can still get to use
    the original class but you also get to add new features to that class without
    going through inheritance, polymorphism, or subclasses. The structure of an extension
    looks like this:


    `extension className {`


    `}`


    Extensions can define methods along with properties that contain code such as:


    *   getters and setters

    *   initializers

    *   property observers


    While extensions add new properties methods to a class without inheritance, extensions
    cannot override existing methods or properties in a class. Extensions also can’t
    create properties assigned an initial value such as:


    `var temperature : Int = 100        // Cannot be used in an extension`


    To see how to an extension can add properties and methods to a class, create a
    new playground by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type ExtensionPlayground.
      Click in the Platform pop-up menu and choose OS X. Xcode asks where you want
    to save your playground file.   Click on a folder where you want to save your
    playground file and click the Create button. Xcode displays the playground file.
      Edit the code as follows:  


    `import Cocoa`


    `class emptyClass {`


    `}`


    `extension emptyClass {`


        `var age : Int {`


            `get {`


                `return 50`


            `}`


        `}`


        `func retire (testAge : Int) -> String {`


            `if testAge < 62 {`


                `return "Keep working"`


            `} else {`


                `return "Time to retire"`


            `}`


        `}`


    `}`


    `var aWorker = emptyClass ()`


    `aWorker.retire(65)`


    `aWorker.age`


    This code creates a completely empty class, then creates an extension that adds
    an “age” property and a “retire” method to the empty class. Finally, it creates
    an object from that empty class, calls the “retire” method (defined in the extension)
    and displays the value stored in the “age” property as shown in Figure [12-7](#A978-1-4842-1233-2_12_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_12_Fig7_HTML.jpg](A978-1-4842-1233-2_12_Fig7_HTML.jpg)


    Figure 12-7.


    Using an extension to add a property and method to an empty class


    You can see that the class itself does nothing, but with extensions, the class
    now gets added features that it didn’t have before.'
  trans: "\n### 重写属性\n\n除了重写方法之外，Swift 还允许你重写属性。当你重写属性时，必须保持相同的属性名和数据类型。你所能改变的，是一个变量的\
    \ getter 和 setter 方法，以及属性观察器。\n\n在最简单的层面上，getter 仅返回一个变量的值。在更复杂的层面上，getter 会计算一个值。请考虑以下代码：\n\
    \n```\nclass basicDesign {\n    var location: Int {\n        get {\n         \
    \   return 4\n        }\n    }\n}\n```\n\n这个 `basicDesign` 类定义了一个名为 `location`\
    \ 的属性，其 getter 返回 `location` 属性中的值 `4`。要重写这个属性，你需要保留变量名和数据类型（`Int`），但可以更改 getter\
    \ 代码，例如：\n\n```\nclass newDesign : basicDesign {\n    override var location: Int\
    \ {\n        get {\n            return 7\n        }\n    }\n}\n```\n\n这个 `newDesign`\
    \ 类继承了 `basicDesign` 类中的 `location` 属性。然而，它用一个返回值为 `7` 的新 getter 重写了 `location`\
    \ 属性。\n\n要查看重写属性是如何工作的，请遵循以下步骤：\n\n确保你的 `InheritPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
    \n```\nimport Cocoa\n\nclass basicDesign {\n    var location: Int {\n        get\
    \ {\n            return 4\n        }\n    }\n}\n\nclass newDesign : basicDesign\
    \ {\n    override var location: Int {\n        get {\n            return 7\n \
    \       }\n    }\n}\n\nvar ant = basicDesign()\nvar fly = newDesign()\n\nant.location\n\
    fly.location\n```\n\n在这个例子中，`ant` 对象基于 `basicDesign` 类，该类将 `location` 属性的值定义为\
    \ `4`。`fly` 对象基于 `newDesign` 类，该类继承了 `location` 属性。然而，`newDesign` 类重写了 `location`\
    \ 属性的 getter 代码，因此 `location` 属性中存储的值不再是 `4`，而是 `7`，如图 12-6 所示。\n\n![A978-1-4842-1233-2_12_Fig6_HTML.jpg](img/A978-1-4842-1233-2_12_Fig6_HTML.jpg)\n\
    \n图 12-6. 使用新的 getter 代码重写属性\n\n请记住，在重写方法和属性时，你只能更改：\n\n- 方法中的代码\n- 属性的 getter/setter\
    \ 或属性观察器中的代码\n\n你永远不能更改：\n\n- 方法名\n- 方法参数列表\n- 属性名\n- 属性数据类型\n\n### 防止多态\n\n在某些情况下，你可能希望阻止一个方法、属性甚至整个类通过多态被修改。为此，你只需要插入“final”关键字。如果你想阻止整个类被继承，只需将“final”关键字放在类名前面，如下所示：\n\
    \n```\nfinal class className {\n    var propertyName = initialValue\n    func\
    \ methodName() {\n    }\n}\n```\n\n> **注意**  \n> 如果你在类名前面放置“final”，它会自动阻止该类的属性和方法被重写，因此你无需在每个属性或方法名前面放置“final”。\n\
    \n如果你想阻止某个单独的属性或方法被重写，只需将“final”关键字放在该属性或方法前面，如下所示：\n\n```\nclass className {\n\
    \    final var propertyName = initialValue\n    func methodName() {\n    }\n}\n\
    ```\n\n上面例子中的“final”关键字阻止了该属性被重写，同时允许该方法被重写。如果你想阻止方法被重写，同时允许属性被重写，则应像这样将“final”关键字放在方法前面：\n\
    \n```\nclass className {\n    var propertyName = initialValue\n    final func\
    \ methodName() {\n    }\n}\n```\n\n## 使用扩展\n\n如果有一个类包含你需要的属性和方法，面向对象的方法是继承该类（创建一个子类）。不断创建子类的问题在于，从略有不同的类文件中创建对象可能会变得笨拙。\n\
    \n当你想要扩展 Cocoa 框架中类的功能时尤其如此。例如，如果你正在使用 `String` 数据类型，你可能不想创建一个 `String` 数据类型的子类，然后基于这个新的子类创建对象。理想情况下，你希望继续使用\
    \ `String` 数据类型，但同时拥有新增的功能。\n\n这就是 Swift 提供扩展的原因。扩展本质上允许你向现有类添加代码，而无需创建子类。这样，你仍然可以使用原始类，但同时无需经过继承、多态或子类化，就可以为该类添加新功能。扩展的结构如下所示：\n\
    \n```\nextension className {\n}\n```\n\n扩展可以定义方法以及包含以下代码的属性：\n\n- getter 和 setter\n\
    - 初始化器\n- 属性观察器\n\n虽然扩展可以在不继承的情况下向类添加新的属性和方法，但扩展无法覆盖类中已有的方法或属性。扩展也不能创建具有初始值的属性，例如：\n\
    \n```\nvar temperature : Int = 100        // 不能在扩展中使用\n```\n\n要了解扩展如何向类添加属性和方法，请通过以下步骤创建一个新的\
    \ playground：\n\n启动 Xcode。选择“文件”➤“新建”➤“Playground”。（如果你看到了 Xcode 欢迎屏幕，也可以点击“获取\
    \ playground 的入门知识”。）Xcode 会要求输入 playground 名称和平台。点击“名称”文本字段并输入 `ExtensionPlayground`。点击“平台”弹出菜单并选择“OS\
    \ X”。Xcode 会询问你想将 playground 文件保存到哪里。点击一个你想保存 playground 文件的文件夹，然后点击“创建”按钮。Xcode\
    \ 会显示 playground 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass emptyClass {\n}\n\
    \nextension emptyClass {\n    var age : Int {\n        get {\n            return\
    \ 50\n        }\n    }\n\n    func retire (testAge : Int) -> String {\n      \
    \  if testAge < 62 {\n            return \"继续工作\"\n        } else {\n        \
    \    return \"该退休了\"\n        }\n    }\n}\n\nvar aWorker = emptyClass ()\naWorker.retire(65)\n\
    aWorker.age\n```\n\n这段代码创建了一个完全空的类，然后创建一个扩展，向该空类添加一个“age”属性和一个“retire”方法。最后，它从那个空类创建了一个对象，调用“retire”方法（在扩展中定义），并显示存储在“age”属性中的值，如图\
    \ 12-7 所示。\n\n![A978-1-4842-1233-2_12_Fig7_HTML.jpg](img/A978-1-4842-1233-2_12_Fig7_HTML.jpg)\n\
    \n图 12-7. 使用扩展向空类添加属性和方法\n\n你可以看到，这个类本身什么也没做，但通过扩展，这个类现在获得了它之前没有的新功能。\n"
- fmt: "# Using Protocols\n\nIn the beginning of this chapter, you were first introduced\
    \ to something that appears in the class `AppDelegate.swift` file that you’ve\
    \ been creating to learn the basic principles of each chapter. This class `AppDelegate`\
    \ declaration looks like this:\n\n`class AppDelegate: NSObject, NSApplicationDelegate\
    \ {`\n\nThis line of code creates a class called `AppDelegate`, which inherits\
    \ properties and methods from the `NSObject` class that’s part of the Cocoa framework.\
    \ However, the `NSApplicationDelegate` is the name of another file used to extend\
    \ classes without going through inheritance or subclasses.\n\nThe `NSApplicationDelegate`\
    \ file is a protocol file. The above Swift code creates a class called `AppDelegate`,\
    \ inherits properties and methods from the `NSObject` class, and also inherits\
    \ code from the `NSApplicationDelegate` file. (You can see more details about\
    \ the `NSApplicationDelegate` protocol by viewing it in the Xcode Documentation\
    \ window.)\n\nThe main difference between a class (such as `NSObject`) and a protocol\
    \ (such as `NSApplicationDelegate`) is that a class defines properties and methods\
    \ while a protocol only defines properties and method names without any code that\
    \ actually implements them. A protocol is sometimes called an empty class because\
    \ it never defines any Swift code to make anything actually work.\n\nA protocol\
    \ defines a group of property and method names for solving a particular type of\
    \ problem. Now it’s up to the class that adopts or conforms to this protocol to\
    \ provide the actual Swift code that implements each method or property declaration.\n\
    \nA protocol declaration looks identical to a class or structure declaration.\
    \ The only difference is that a protocol declaration uses the “protocol” keyword:\n\
    \n```\nprotocol protocolName {\n\n}\n```\n\nWithin this protocol declaration you\
    \ can define properties and methods without implementing any Swift code like this:\n\
    \n```\nprotocol protocolName {\n    var property1 : datatype { get }        //\
    \ read-only\n    var property2 : datatype { get set }    // read-write\n    func\
    \ methodName (parameters) -> datatype\n}\n```\n\nWhen a protocol defines a property\
    \ or method, any class that adopts that protocol must implement that property\
    \ or method exactly as its defined in the protocol. In the above example, `property1`\
    \ is defined with a getter and `property2` is defined with a getter and a setter.\n\
    \nThat means when a class implements those two properties, it must define a getter\
    \ only for `property1` and both a getter and a setter for `property2`.\n\nLikewise,\
    \ the method defined in the protocol must be exact when adopted in the class file.\
    \ That means if the method is defined in the protocol with two integer parameters,\
    \ then the implementation of that method must also have the exact same two integer\
    \ parameters.\n\nProtocols are generally used when working with common user interface\
    \ items that require specific types of methods to manipulate them, but can’t define\
    \ exactly how to manipulate them because the data may differ from one program\
    \ to another.\n\nFor example, table views are a user interface item that displays\
    \ a list of data in rows. The table view needs to know how many rows of data to\
    \ hold and what type of data to display in each row. Since every table view needs\
    \ to know this information, it makes sense to create standard methods to do this,\
    \ but since every table view needs to contain different information, it also makes\
    \ sense to avoid writing Swift code to actually fill a table view with data.\n\
    \nAny program that includes a table view can take advantage of predefined method\
    \ names stored in a protocol for manipulating data. All you need to do is add\
    \ Swift code to fill the table view with data.\n\nBy using protocols, you can\
    \ manipulate table views using identical method names from one program to another.\
    \ Without table view protocols, you’d be forced to make up your own method names\
    \ for adding and displaying data in a table view. Thus protocols are typically\
    \ used in the Cocoa framework to provide a consistent list of methods for performing\
    \ common tasks.\n\nTo see how protocols work, follow these steps:\n\nMake sure\
    \ the `ExtensionPlayground` file is loaded into Xcode. Edit the code as follows:\n\
    \n```\nimport Cocoa\n\nprotocol testMe {\n    var cash : Int { get }\n    var\
    \ creditCheck : Int { get set }\n    func purchase (price : Int) -> String\n}\n\
    \nclass windowShopper : testMe {\n    var tempValue : Int = 0\n    var cash :\
    \ Int = 0\n    \n    var creditCheck : Int {\n        get {\n            return\
    \ tempValue\n        }\n        set (newValue) {\n            tempValue = newValue\n\
    \            cash -= 10\n        }\n    }\n    \n    func purchase (price : Int)\
    \ -> String {\n        cash -= price\n        return \"Bought something!\"\n \
    \   }\n}\n\nvar shopper = windowShopper()\nshopper.cash = 450\nshopper.purchase(129)\n\
    shopper.cash\n```\n\nNotice that the `testMe` protocol defines two properties\
    \ and a method. The `cash` property is defined only with a getter. The `creditCheck`\
    \ property is defined with both a getter and a setter. The `purchase` method only\
    \ lists its parameters (`price` as an integer) and its return value, which is\
    \ a `String`. Notice that the protocol doesn’t actually implement any of the necessary\
    \ Swift code.\n\nWhen the `windowShopper` class is created, it adopts or conforms\
    \ to the `testMe` protocol. That means it must provide Swift code to define the\
    \ getter for the `cash` property and the getter and setter for the `creditCheck`\
    \ property. It will also need to implement the Swift code for the `purchase` method.\n\
    \nIf you fail to write Swift code for all the properties and methods defined in\
    \ the `testMe` protocol, Xcode will give an error saying the `windowShopper` class\
    \ failed to conform to the protocol. When adopting a protocol, make sure you implement\
    \ all the necessary properties and methods.\n\nRunning the above code displays\
    \ the results as shown in Figure [12-8](#A978-1-4842-1233-2_12_Chapter.html#Fig8).\n\
    \n![A978-1-4842-1233-2_12_Fig8_HTML.jpg](A978-1-4842-1233-2_12_Fig8_HTML.jpg)\n\
    \nFigure 12-8. A class conforming to a protocol"
