    \ `BooleanPlayground`。\n4. 点击 Platform 弹出菜单，选择 OS X。Xcode 会询问你想将 playground 文件保存在哪里。\n\
    5. 点击一个你想保存 playground 文件的文件夹，然后点击 Create 按钮。Xcode 会显示该 playground 文件。\n6. 按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nvar x, y, z : Int\nx = 35\ny = 120\nz = -48\nx == y\nx <\
    \ y\nx > z\ny != z\nz > -48\n// 与 && 运算符\n(y != z) && (x > z)\n(y != z) && (x\
    \ == y)\n(x == y) && (x < y)\n(z > -48) && (x == y)\n// 或 || 运算符\n(y != z) ||\
    \ (x > z)\n(y != z) || (x == y)\n(x == y) || (x < y)\n(z > -48) || (x == y)\n\
    ```\n\n注意比较运算符是如何计算出 `true` 或 `false` 的，以及逻辑运算符（“与”和“或”）是如何接受两个布尔值并返回一个单一的 `true`\
    \ 或 `false` 值的，如图 7-1 所示。\n\n![A978-1-4842-1233-2_7_Fig1_HTML.jpg](img/A978-1-4842-1233-2_7_Fig1_HTML.jpg)\n\
    \n图 7-1. 使用比较运算符和逻辑运算符评估布尔值\n\n最终，每个布尔值必须是：\n\n*   一个 `true` 或 `false` 值\n*  \
    \ 一个结果为 `true` 或 `false` 的两个值的比较\n*   使用逻辑运算符组合而成并评估为 `true` 或 `false` 的布尔值\n\n\
    ## `if` 语句\n\n布尔值对于让程序做出选择至关重要。如果有人输入密码，程序会检查该密码是否有效。如果为 `true`（密码有效），则程序允许访问。如果为\
    \ `false`（密码无效），则程序阻止访问。\n\n为了决定下一步做什么，每个程序都需要评估一个布尔值。只有这样，程序才能根据该布尔值的值来决定下一步做什么。\n\
    \nSwift 中最简单的分支语句是 `if` 语句，其形式如下：\n\n```\nif BooleanValue == true {\n\n}\n```\n\
    \n为了简化这个 `if` 语句，你可以省略 `== true` 部分，使 `if` 语句变成这样：\n\n```\nif BooleanValue {\n\
    \n}\n```\n\n这个简写版本的意思是：“如果 `BooleanValue` 是 `true`，则运行花括号内的代码。如果 `BooleanValue`\
    \ 是 `false`，则跳过花括号内的所有代码，不运行它们。”\n\n要查看布尔值如何与 `if` 语句协同工作，请按照以下步骤操作：\n\n1. 确保\
    \ `BooleanPlayground` 文件已在 Xcode 中加载。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar\
    \ BooleanValue : Bool = true\nif BooleanValue {\n    print (\"The BooleanValue\
    \ is true\")\n}\n```\n\n图 7-2 显示了 `if` 语句运行的结果。将 `BooleanValue` 的值更改为 `false`，你会看到\
    \ `if` 语句不再打印字符串 `\"The BooleanValue is true.\"`。\n\n![A978-1-4842-1233-2_7_Fig2_HTML.jpg](img/A978-1-4842-1233-2_7_Fig2_HTML.jpg)\n\
    \n图 7-2. 运行一个 `if` 语句\n\n## `if-else` 语句\n\n`if` 语句要么运行代码，要么什么都不运行。如果希望在布尔值为 `false`\
    \ 时运行代码，你可以编写两个独立的 `if` 语句，如下所示：\n\n```\nif BooleanValue {\n\n}\n\nif !BooleanValue\
    \ {\n\n}\n```\n\n如果 `BooleanValue` 为 `true`，则运行第一个 `if` 语句。如果不是，则它什么都不做。\n\n如果\
    \ `BooleanValue` 为 `false`，则运行第二个 `if` 语句。如果不是，则它什么都不做。\n\n编写两个独立 `if` 语句的问题在于程序的逻辑不够清晰。为了解决这个问题，Swift\
    \ 提供了一种 `if-else` 语句，其形式如下：\n\n```\nif BooleanValue {\n    // 第一组代码，如果为 true 则运行\n\
    } else {\n    // 第二组代码，如果为 false 则运行\n}\n```\n\n`if-else` 语句只提供两个不同的分支。如果布尔值为\
    \ `true`，则运行第一组代码。如果布尔值为 `false`，则运行第二组代码。在 `if-else` 语句中，两组代码不可能同时运行。\n\n要查看布尔值如何与\
    \ `if-else` 语句协同工作，请按照以下步骤操作：\n\n1. 确保 `BooleanPlayground` 文件已在 Xcode 中加载。\n2.\
    \ 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar BooleanValue : Bool = true\nif BooleanValue\
    \ {\n    print (\"The BooleanValue is true\")\n} else {\n    print (\"The BooleanValue\
    \ is false\")\n}\n```\n\n图 7-3 展示了当 `BooleanValue` 为 `true` 时 `if-else` 语句是如何工作的。将\
    \ `BooleanValue` 改为 `false`，看看 `if-else` 语句现在是如何运行第二组代码的。\n\n![A978-1-4842-1233-2_7_Fig3_HTML.jpg](img/A978-1-4842-1233-2_7_Fig3_HTML.jpg)\n\
    \n图 7-3. 运行一个 `if-else` 语句\n"
- fmt: "# The if-else if Statement\n\nAn `if` statement either runs one set of code\
    \ or it runs nothing. An `if-else` statement always runs one set of code or a\
    \ second set of code. However, what if you want a choice of running two or more\
    \ possible sets of code? In that case, you need to use an `if-else if` statement.\n\
    \nLike an `if` statement, an `if-else if` statement may not run any code at all.\
    \ The simplest `if-else if` statement looks like this:\n\n```\nif BooleanValue\
    \ {\n    // First set of code to run if true\n} else if BooleanValue2 {\n    //\
    \ Second set of code to run if true\n}\n```\n\nWith an `if-else if` statement,\
    \ a Boolean value must be true to run code. If no Boolean value is true, then\
    \ it’s possible that no code will run at all. An `if-else if` statement is equivalent\
    \ to multiple `if` statements like this:\n\n```\nif BooleanValue {\n    // First\
    \ set of code to run if true\n}\n\nif BooleanValue2 {\n    // Second set of code\
    \ to run if true\n}\n```\n\nWith an `if-else if` statement, you can check for\
    \ as many Boolean values as you want such as:\n\n```\nif BooleanValue {\n    //\
    \ First set of code to run if true\n} else if BooleanValue2 {\n    // Second set\
    \ of code to run if true\n} else if BooleanValue3 {\n    // Third set of code\
    \ to run if true\n} else if BooleanValue4 {\n    // Fourth set of code to run\
    \ if true\n} else if BooleanValue5 {\n    // Fifth set of code to run if true\n\
    }\n```\n\nAs soon as the `if-else if` statement finds one Boolean value is true,\
    \ then it runs the accompanying code trapped within curly brackets. However, it’s\
    \ possible that no Boolean value will be true, in which case no code inside the\
    \ `if-else if` statement will run.\n\nIf you want to ensure that at least one\
    \ set of code will run, then you need to add a final `else` clause to the end\
    \ of an `if-else if` statement such as:\n\n```\nif BooleanValue {\n    // First\
    \ set of code to run if true\n} else if BooleanValue2 {\n    // Second set of\
    \ code to run if true\n} else if BooleanValue3 {\n    // Third set of code to\
    \ run if true\n} else if BooleanValue4 {\n    // Fourth set of code to run if\
    \ true\n} else if BooleanValue5 {\n    // Fifth set of code to run if true\n}\
    \ else {\n    // This code runs if every other Boolean value is false\n}\n```\n\
    \nTo see how Boolean values work with an `if-else` statement, follow these steps:\n\
    \nMake sure the `BooleanPlayground` file is loaded in Xcode. Edit the code as\
    \ follows:\n\n```\nimport Cocoa\nvar BooleanValue : Bool = false\nvar BooleanValue2\
    \ : Bool = false\nvar BooleanValue3 : Bool = false\nif BooleanValue {\n    print\
    \ (\"BooleanValue is true\")\n} else if BooleanValue2 {\n    print (\"BooleanValue2\
    \ is true\")\n} else if BooleanValue3 {\n    print (\"BooleanValue3 is true\"\
    )\n} else {\n    print (\"This prints if everything else is false\")\n}\n```\n\
    \nNotice that because every Boolean value is false, the only code that runs occurs\
    \ in the final `else` portion of the `if-else if` statement as shown in Figure\
    \ [7-4](#A978-1-4842-1233-2_7_Chapter.html#Fig4).\n\n![A978-1-4842-1233-2_7_Fig4_HTML.jpg](A978-1-4842-1233-2_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4. Running an `if-else if` statement with multiple Boolean values\n\
    \nIf you change different Boolean values to true, you can see how the `if-else\
    \ if` statement behaves differently by running a different set of code.\n\nWith\
    \ an `if-else if` statement:\n\n- It’s possible that no code will run unless the\
    \ last part is just a regular `else` statement\n- The program can choose between\
    \ two or more sets of code\n- The number of possible options is not limited to\
    \ just two options like an `if-else` statement\n\nSince an `if-else if` statement\
    \ checks multiple Boolean values, what happens if two or more Boolean values are\
    \ true? In that case, the `if-else if` statement only runs the set of code associated\
    \ with the first true Boolean value and ignores all the rest of the code as shown\
    \ in Figure [7-5](#A978-1-4842-1233-2_7_Chapter.html#Fig5).\n\n![A978-1-4842-1233-2_7_Fig5_HTML.jpg](A978-1-4842-1233-2_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5. Running an `if-else if` statement with multiple true Boolean values\n\
    \n# The switch Statement\n\nAn `if-else if` statement lets you create two or more\
    \ sets of code that can possibly run. Unfortunately, an `if-else if` statement\
    \ can be hard to understand when there’s too many Boolean values to check. To\
    \ fix this problem, Swift offers a `switch` statement.\n\nA `switch` statement\
    \ works much like an `if-else if` statement except that it’s easier to read and\
    \ write. The main difference is that instead of checking multiple Boolean values,\
    \ a `switch` statement checks the value of a single variable. Based on the value\
    \ of this single variable, the `switch` statement can choose to run different\
    \ sets of code.\n\nA typical `switch` statement looks like this:\n\n```\nswitch\
    \ value/variable/expression {\ncase value1: // First set of code to run if variable\
    \ = value1\ncase value2: // Second set of code to run if variable = value2\ncase\
    \ value3: // Third set of code to run if variable = value3\ndefault: // Fourth\
    \ set of code to run if nothing else runs\n}\n```\n\nA `switch` statement starts\
    \ by examining a fixed value (such as 38 or “Bob”), a variable that represents\
    \ data, or an expression (such as `3 * age` where `age` is a variable). Ultimately,\
    \ the `switch` statement needs to identify a single value and match that value\
    \ to the first `case` statement it finds. The moment it finds an exact match,\
    \ it runs one or more lines of code associated with that `case` statement.\n\n\
    To see how Boolean values work with a `case` statement, follow these steps:\n\n\
    Make sure the `BooleanPlayground` file is loaded in Xcode. Edit the code as follows:\n\
    \n```\nimport Cocoa\nvar whatNumber : Int = 3\nswitch whatNumber {\n    case 1:\
    \ print (\"The number is 1\")\n    case 2: print (\"The number is 2\")\n    case\
    \ 3: print (\"The number is 3\")\n        print (\"Isn’t this amazing?\")\n  \
    \  case 4: print (\"The number is 4\")\n    case 5: print (\"The number is 5\"\
    )\n    default: print (\"The number is undefined\")\n}\n```\n\nBecause the value\
    \ of the `whatNumber` variable is 3, the `switch` statement matches it with `case\
    \ 3:` and then runs the Swift code that appears after the colon as shown in Figure\
    \ [7-6](#A978-1-4842-1233-2_7_Chapter.html#Fig6). Note that you can store multiple\
    \ lines of code after the colon and do not need to enclose the code within curly\
    \ brackets. Change the value of the `whatNumber` variable to see how it affects\
    \ the behavior of the `switch` statement.\n\n![A978-1-4842-1233-2_7_Fig6_HTML.jpg](A978-1-4842-1233-2_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6. Running a `switch` statement\n\n**Note:** Unlike other programming\
    \ languages such as Objective-C, you do not need to use a `break` command to separate\
    \ code stored in different `case` statements of the `switch` statement.\n\nThe\
    \ above `switch` statement is equivalent to:\n\n```\nif whatNumber == 1 {\n  \
    \  print (\"The number is 1\")\n} else if whatNumber == 2 {\n    print (\"The\
    \ number is 2\")\n} else if whatNumber == 3 {\n    print (\"The number is 3\"\
    )\n    print (\"Isn’t this amazing?\")\n} else if whatNumber == 4 {\n    print\
    \ (\"The number is 4\")\n} else if whatNumber == 5 {\n    print (\"The number\
    \ is 5\")\n} else {\n    print (\"The number is undefined\")\n}\n```\n\nAs you\
    \ can see, the `switch` statement is cleaner and simpler to read and understand.\n\
    \nWhen creating a `switch` statement, you must handle all possibilities. In the\
    \ above `switch` statement, the `whatNumber` variable can be any integer, so the\
    \ `switch` statement can explicitly handle any value from 1 to 5. If the value\
    \ does not fall within this 1 to 5 range, then the `default` portion of the `switch`\
    \ statement handles any other value. If you fail to include a `default`, then\
    \ Xcode will flag your `switch` statement as a possible error. (One exception\
    \ to this rule is if you use a `switch` statement with an `enum` structure, which\
    \ you’ll learn about later in this chapter.) This is to protect your code from\
    \ possibly crashing if the `switch` statement receives data it doesn’t know how\
    \ to handle."
