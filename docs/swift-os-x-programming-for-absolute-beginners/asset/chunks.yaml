    and assigns an initial value to each property such as:`


    `struct pet : Cat {`


    `var name : String = "Frank"`


    `var age : Int = 2`


    `}`


    Now if you declare a variable based on this structure, the variable contains those
    initial values. Despite having an initial value, you can always store new data
    in those properties. To see how to define initial values for protocol properties
    without using extensions, follow these steps:


    Make sure the ProtocolPlayground file is loaded in Xcode.   Edit the playground
    code as follows:


    `import Cocoa`


    `protocol Cat {`


    `var name: String { get }`


    `var age: Int { get }`


    `}`


    `struct pet : Cat {`


    `var name : String = "Frank"`


    `var age : Int = 2`


    `}`


    `var animal = pet()`


    `print (animal.name)`


    `print (animal.age)`


    `animal.name = "Joey"`


    `animal.age = 13`


    `print (animal.name)`


    `print (animal.age)`


    When you first create the animal variable based on the pet structure, the initial
    name property value is “Frank” and the initial age property value is 2\. At any
    time, you can store a new value in both properties as shown in Figure [20-4](#A978-1-4842-1233-2_20_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_20_Fig4_HTML.jpg](A978-1-4842-1233-2_20_Fig4_HTML.jpg)


    Figure 20-4.


    You can assign initial values to gettable properties defined by a protocol


    If you want to set (and keep) an initial value for a property, that’s when you
    can use protocol extensions. Protocol extensions can only work for gettable {
    get } properties. A protocol extension just uses the extension keyword followed
    by the name of the protocol you want to extend such as:


    `extension Cat {`


    `// Set one or more default values for gettable properties here`


    `}`


    Inside the extension you can compute a default value for one or more gettable
    properties by using the return keyword such as:


    `extension Cat {`


    `var name : String { return "Frank" }`


    `}`


    Not only does the protocol extension define the name property to hold the string
    “Frank,” but it also eliminates the need to define the name property within a
    class, structure, or enum such as:


    `extension Cat {`


    `var name : String { return "Frank" }`


    `}`


    `struct pet : Cat {`


    `var age : Int = 2`


    `}`


    `The above protocol extension and structure is essentially equivalent to this:`


    `struct pet : Cat {`


    `var name : String = "Frank"`


    `var age : Int = 2`


    `}`


    The main difference is that when the name property is declared inside the structure,
    you can assign new strings to the name property later. When the name property
    is declared and set to a value inside a protocol extension, you cannot assign
    a new string to the name property later. To see how protocol extensions define
    a default value, follow these steps:


    Make sure the ProtocolPlayground file is loaded in Xcode.   Edit the playground
    code as follows:


    `import Cocoa`


    `protocol Cat {`


    `var name: String { get }`


    `var age: Int { get }`


    `}`


    `extension Cat {`


    `var name : String { return "Frank" }`


    `}`


    `struct pet : Cat {`


    `//var name : String = "Frank"`


    `var age : Int = 2`


    `}`


    `var animal = pet()`


    `print (animal.name)`


    `print (animal.age)`


    `//animal.name = "Joey"`


    `animal.age = 13`


    `print (animal.name)`


    `print (animal.age)`


    In the above code, the two commented lines show you what the protocol extension
    eliminates. Once you define the name property inside the protocol extension, you
    no longer need to declare that name property inside the pet structure. You also
    can’t assign a new string (such as “Joey”) to the name property after it’s been
    assigned a default value in the protocol extension. Figure [20-5](#A978-1-4842-1233-2_20_Chapter.html#Fig5)
    shows the results of the above code.


    ![A978-1-4842-1233-2_20_Fig5_HTML.jpg](A978-1-4842-1233-2_20_Fig5_HTML.jpg)


    Figure 20-5.


    Defining a default value with a protocol extension


    One problem with defining a default value in a protocol extension is that anything
    that adopts that protocol is forced to also adopt that protocol’s extension. That
    means everything based on that protocol and extension will have the same default
    value that can’t be changed.


    In case you want the flexibility of defining default values, but only for certain
    classes, structures, or enums, you can create a protocol extension that only applies
    to any class, structure, or enum that also adopts a second protocol:


    `extension protocol2Extend where Self: protocol2Use {`


    `// Set one or more default values for gettable properties here`


    `}`


    The above Swift code extends a protocol defined by “protocol2Extend.” However
    the “where Self:” keywords identify a second protocol defined by “protocol2Use.”


    That means if a class, structure, or enum adopts the protocol defined by “protocol2Extend,”
    then the extension only sets a default value if the class, structure, or enum
    also adopts the second protocol defined by “protocol2Use.”


    Suppose you created the following protocol extension:


    `extension Cat where Self: CatType {`


    `var name : String { return "Frank" }`


    `}`


    This would define a default value of “Frank” to the name property to any class,
    structure, or enum that adopts the Cat protocol and the CatType protocol. If a
    class, structure, or enum only adopts the Cat protocol, its name property won’t
