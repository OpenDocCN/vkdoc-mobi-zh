    means if a set contains the number 53, you can’t add another copy of 53 into that
    set.


    To remove data from a set, you just specify the set name, the remove command,
    and the data you want to remove enclosed in parentheses like this:


    `setName.remove(data)`


    If you try to remove data that doesn’t exist in the set, then the remove command
    returns a nil value. However if the remove command succeeds in removing data from
    a set, it returns an optional variable. So if you remove data from a set and store
    it in a variable like this:


    `var variableName = setName.remove(data)`


    The value stored in the variable can be accessed by using an exclamation mark
    like this:


    `print (variableName!)`


    If you want to remove all items in a set, specify the set name and the removeAll
    command like this:


    `setName.removeAll()`


    To see how to create a set and add and remove data from it, create a new playground
    by following these steps:


    Start Xcode.   Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,
    you can also click on Get started with a playground.) Xcode asks for a playground
    name and platform.   Click in the Name text field and type SetPlayground.   Click
    in the Platform pop-up menu and choose OS X. Xcode asks where you want to save
    your playground file.   Click on a folder where you want to save your playground
    file and click the Create button. Xcode displays the playground file.   Edit the
    code as follows: `import Cocoa` `var setOne = Set([2, 45, -9, 8, -34])` `var setTwo
    = Set<Int>()` `setTwo = [34, 90, -83]` `setOne.insert(65)` `setTwo.insert(-381)`
    `var temp = setOne.remove(45)` `print (temp)` `print (temp!)` `setOne.removeAll()`
     


    This Swift code creates a set called setOne by storing data directly and letting
    Swift infer the data types, which are integers. Then it creates a second set called
    setTwo, defined as holding only integers (Int).


    After creating setTwo, the next line stores three integers in that set. The two
    insert commands store different integers into both setOne and setTwo. When the
    code removes the number 45 from setOne, it stores 45 as an optional variable in
    the temp variable. To access the actual value, you have to unwrap the optional
    variable using the exclamation mark (!).


    Finally, the removeAll command empties setOne so it contains nothing as shown
    in Figure [10-2](#A978-1-4842-1233-2_10_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_10_Fig2_HTML.jpg](A978-1-4842-1233-2_10_Fig2_HTML.jpg)


    Figure 10-2.


    Creating sets, inserting data in a set, and removing data from a set


    ### Querying a Set


    Once you have a set, you can use the following commands to get information about
    that set:


    *   count – counts the number of items in a set

    *   isEmpty – checks if a set is empty (contains 0 items)

    *   isSubsetOf – checks if one set is wholly contained within another set

    *   isSupersetOf – checks if one set contains all the items of another set

    *   isDisjointWith – checks if two sets have no items in common


    Whatever the result of these commands, they never affect the data stored in a
    set.


    The count command returns an integer value and just requires the set name and
    the count command like this:


    `setName.count`


    You can also assign this value to a variable such as:


    `var total = setName.count`


    The isEmpty command returns a Boolean value of true if a set has zero items in
    it. Otherwise it returns false. Just specify the set name followed by the isEmpty
    command like this:


    `setOne.isEmpty`


    The isSubsetOf command checks if one set contains items that are also contained
    in a second set. Only if this second set contains every item from the first set
    is it considered a subset.


    The isSupersetOf command checks if one set is larger and contains all the same
    items as a smaller set. Only if this first set is larger and has all its items
    stored in the second set is it considered a superset.


    The isDisjointWith command compares two sets. If they have no items in common,
    then this command returns true. Otherwise it returns false.


    To see how to query a set, follow these steps:


    Make sure the SetPlayground file is loaded in Xcode.   Edit the code as follows:
    `import Cocoa` `var mySet = Set(["Fred", "Cindy", "Jody", "Grant"])` `print (mySet.isEmpty)`
    `mySet.count` `mySet.removeAll()` `print (mySet.isEmpty)` `var myNewSet = Set(["John",
    "Oscar"])` `var myOtherSet = Set(["John", "Oscar", "Sally"])` `var myThirdSet
    = Set(["Rick", "Vinny"])` `myNewSet.isSubsetOf(myOtherSet)` `myOtherSet.isSupersetOf(myNewSet)`
    `myNewSet.isDisjointWith(myThirdSet)`  


    This code creates a set that holds four strings. It uses the isEmpty command to
    check if the set is empty (false). Then it counts the set (it has 4 items). Finally,
    it removes all the items from the set and uses the isEmpty command again to check
    if the set is empty (true).


    The next batch of code creates three different sets called myNewSet, myOtherSet,
    and myThirdSet, which are filled with different names. Then the isSubsetOf command
    checks if all the items in myNewSet [“John,” “Oscar”]are also in the myOtherSet
    [“John,” “Oscar,” “Sally”], which is true.


    The isSupersetOf command checks if myOtherSet [“John,” “Oscar,” “Sally”] contains
    more items and also contains all the items stored in myNewSet [“John,” “Oscar”],
    which is also true.


    Finally, the isDisjointWith command checks if myNewSet [“John,” “Oscar”] has nothing
    in common with myThirdSet [“Rick,” “Vinny”], which is also true as shown in Figure
    [10-3](#A978-1-4842-1233-2_10_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_10_Fig3_HTML.jpg](A978-1-4842-1233-2_10_Fig3_HTML.jpg)


    Figure 10-3.


    Querying a set'
  trans: '

    ### 向集合中添加和移除元素


    使用集合，你可以随时添加新元素，只要新元素与现有元素的数据类型相同。要向集合中添加一个元素，只需指定集合名称、`insert` 命令以及要添加的数据，并用括号括起来，如下所示：


    `setName.insert(data)`


    你必须指定要添加数据的数组名称，并将实际数据放在括号内。确保添加的数据具有正确的数据类型。因此，如果你想向当前仅包含整数的集合中添加数据，你只能向该集合中添加另一个整数。


    如果你尝试添加集合中已存在的数据，则不会发生任何变化。这意味着如果一个集合包含数字 53，你就无法向该集合中添加另一个 53 的副本。


    要从集合中移除数据，只需指定集合名称、`remove` 命令以及要移除的数据，并用括号括起来，如下所示：


    `setName.remove(data)`


    如果你尝试移除集合中不存在的数据，那么 `remove` 命令会返回一个 `nil` 值。但是，如果 `remove` 命令成功地从集合中移除了数据，它会返回一个可选变量。因此，如果你从集合中移除数据并将其存储在一个变量中，如下所示：


    `var variableName = setName.remove(data)`


    可以通过使用感叹号来访问存储在该变量中的值，如下所示：


    `print (variableName!)`


    如果你想移除集合中的所有元素，指定集合名称和 `removeAll` 命令，如下所示：


    `setName.removeAll()`


    要了解如何创建集合以及如何向其中添加和移除数据，请按照以下步骤创建一个新的 Playground：


    1. 启动 Xcode。

    2. 选择 **文件 ➤ 新建 ➤ Playground**。（如果你看到了 Xcode 的欢迎界面，也可以点击 **开始使用 Playground**。）Xcode
    会要求你输入 Playground 名称和平台。

    3. 点击 **名称** 文本字段并输入 `SetPlayground`。

    4. 点击 **平台** 弹出菜单并选择 **OS X**。Xcode 会询问你希望将 Playground 文件保存在哪里。

    5. 点击你想保存 Playground 文件的文件夹，然后点击 **创建** 按钮。Xcode 会显示 Playground 文件。

    6. 按如下方式编辑代码：


    ```swift

    import Cocoa

    var setOne = Set([2, 45, -9, 8, -34])

    var setTwo = Set<Int>()

    setTwo = [34, 90, -83]

    setOne.insert(65)

    setTwo.insert(-381)

    var temp = setOne.remove(45)

    print (temp)

    print (temp!)

    setOne.removeAll()

    ```


    这段 Swift 代码通过直接存储数据并让 Swift 推断数据类型（即整数）来创建一个名为 `setOne` 的集合。然后，它创建了第二个名为 `setTwo`
    的集合，定义为仅存储整数（`Int`）。


    创建 `setTwo` 之后，下一行代码在该集合中存储了三个整数。两个 `insert` 命令分别向 `setOne` 和 `setTwo` 中存储了不同的整数。当代码从
    `setOne` 中移除数字 45 时，它将 45 作为一个可选变量存储在 `temp` 变量中。要访问实际值，你必须使用感叹号（`!`）来解包可选变量。


    最后，`removeAll` 命令清空了 `setOne`，使其不包含任何内容，如图 10-2 所示。


    ![A978-1-4842-1233-2_10_Fig2_HTML.jpg](img/A978-1-4842-1233-2_10_Fig2_HTML.jpg)


    **图 10-2.** 创建集合、向集合中插入数据以及从集合中移除数据


    ### 查询集合


    一旦你有了一个集合，就可以使用以下命令来获取关于该集合的信息：


    *   `count` – 计算集合中元素的数量

    *   `isEmpty` – 检查集合是否为空（包含 0 个元素）

    *   `isSubsetOf` – 检查一个集合是否完全包含在另一个集合中

    *   `isSupersetOf` – 检查一个集合是否包含另一个集合的所有元素

    *   `isDisjointWith` – 检查两个集合是否没有任何共同元素


    无论这些命令的结果如何，它们都不会影响集合中存储的数据。


    `count` 命令返回一个整数值，只需使用集合名称和 `count` 命令，如下所示：


    `setName.count`


    你也可以将此值赋给一个变量，例如：


    `var total = setName.count`


    如果集合中包含零个元素，`isEmpty` 命令返回布尔值 `true`。否则返回 `false`。只需在集合名称后加上 `isEmpty` 命令，如下所示：


    `setOne.isEmpty`


    `isSubsetOf` 命令检查一个集合是否包含也存在于第二个集合中的元素。仅当第二个集合包含第一个集合中的每一个元素时，它才被认为是子集。


    `isSupersetOf` 命令检查一个集合是否更大并且包含另一个较小集合的所有相同元素。仅当第一个集合更大并且其所有元素都存储在第二个集合中时，它才被认为是超集。


    `isDisjointWith` 命令比较两个集合。如果它们没有共同元素，则此命令返回 `true`。否则返回 `false`。


    要了解如何查询集合，请按照以下步骤操作：


    1. 确保 `SetPlayground` 文件已在 Xcode 中加载。

    2. 按如下方式编辑代码：


    ```swift

    import Cocoa

    var mySet = Set(["Fred", "Cindy", "Jody", "Grant"])

    print (mySet.isEmpty)

    mySet.count

    mySet.removeAll()

    print (mySet.isEmpty)

    var myNewSet = Set(["John", "Oscar"])

    var myOtherSet = Set(["John", "Oscar", "Sally"])

    var myThirdSet = Set(["Rick", "Vinny"])

    myNewSet.isSubsetOf(myOtherSet)

    myOtherSet.isSupersetOf(myNewSet)

    myNewSet.isDisjointWith(myThirdSet)

    ```


    这段代码创建了一个包含四个字符串的集合。它使用 `isEmpty` 命令检查该集合是否为空（`false`）。然后，它统计了该集合中的元素数量（共 4 个）。最后，它移除了该集合中的所有元素，并再次使用
    `isEmpty` 命令检查该集合是否为空（`true`）。


    接下来的一组代码创建了三个不同的集合，分别命名为 `myNewSet`、`myOtherSet` 和 `myThirdSet`，其中填充了不同的名字。然后，`isSubsetOf`
    命令检查 `myNewSet` [“John”, “Oscar”] 中的所有元素是否也存在于 `myOtherSet` [“John”, “Oscar”,
    “Sally”] 中，结果为 `true`。


    `isSupersetOf` 命令检查 `myOtherSet` [“John”, “Oscar”, “Sally”] 是否包含更多元素，并且是否也包含 `myNewSet`
    [“John”, “Oscar”] 中存储的所有元素，结果同样为 `true`。


    最后，`isDisjointWith` 命令检查 `myNewSet` [“John”, “Oscar”] 与 `myThirdSet` [“Rick”,
    “Vinny”] 是否没有共同元素，结果也为 `true`，如图 10-3 所示。


    ![A978-1-4842-1233-2_10_Fig3_HTML.jpg](img/A978-1-4842-1233-2_10_Fig3_HTML.jpg)


    **图 10-3.** 查询集合

