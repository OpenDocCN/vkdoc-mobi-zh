- fmt: '# 4. Getting Help


    The best way to learn any new skill is to have someone show you what you need
    to learn. Since that’s not always possible, you’ll be happy to know that Xcode
    comes with plenty of built-in help features to make using Xcode less stressful
    and more enjoyable.


    To use Xcode’s help, you first need to understand how Swift programs work and
    how they work with the Cocoa framework. Once you understand how a typical OS X
    program works and how it relies on the Cocoa framework, you’ll be better able
    to understand how do get the help you need and how you can understand the help
    you do find through Xcode.


    ## Understanding the Cocoa Framework


    When using Xcode, you have to understand that every program you create is based
    on the Cocoa framework that uses classes that contain various properties and methods.
    By using these existing classes, you can save time by not writing and testing
    your own code. Instead, you can just use the existing code in the Cocoa framework
    that already works. This frees you to spend more time focusing on writing the
    code that’s unique to your particular program.


    To use the Cocoa framework, you must understand the principles of object-oriented
    programming and how objects work. To create an object, you must first define a
    class. A class contains the actual code that defines properties (to hold data)
    and methods (to manipulate data stored in its properties). Once you’ve defined
    a class, you can define one or more objects based on that class.


    Just as a cookie cutter defines the shape of a cookie but isn’t the actual cookie,
    so do classes define an object but isn’t an object itself.


    The Cocoa framework consists of multiple class files where many class files inherit
    properties and methods from other class files. When you create an OS X program,
    you’ll typically create objects based on Cocoa framework class files. In fact,
    every user interface item that you create from the Object Library is based on
    a Cocoa framework class.


    To see what class file each user interface item is based on, let’s examine the
    three-user interface items you created: a label, a text field, and a button:


    - Open the MyFirstProgram project in Xcode.

    - Click on the `MainMenu.xib` file. Xcode displays your user interface.

    - Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the lower right corner of the Xcode window.

    - Click on the Push Button item in the Object Library. A pop-up window appears
    as shown in Figure [4-1](#A978-1-4842-1233-2_4_Chapter.html#Fig1). Notice that
    this pop-up window tells you the class file (`NSButton`) of a push button.


    ![A978-1-4842-1233-2_4_Fig1_HTML.jpg](A978-1-4842-1233-2_4_Fig1_HTML.jpg)


    Figure 4-1. Finding the class file of a Push Button


    - Click the Done button to make the pop-up window go away.

    - Scroll through the Object Library and click on the Label item. A pop-up window
    appears as shown in Figure [4-2](#A978-1-4842-1233-2_4_Chapter.html#Fig2). Notice
    that this pop-up window tells you the class file (`NSTextField`) of a label.


    ![A978-1-4842-1233-2_4_Fig2_HTML.jpg](A978-1-4842-1233-2_4_Fig2_HTML.jpg)


    Figure 4-2. Finding the class file of a Label


    - Scroll through the Object Library and click on the Text Field item. A pop-up
    window appears as shown in Figure [4-3](#A978-1-4842-1233-2_4_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_4_Fig3_HTML.jpg](A978-1-4842-1233-2_4_Fig3_HTML.jpg)


    Figure 4-3. Finding the class file of a Text Field


    By using Xcode’s simple help pop-up windows for each item in the Object Library,
    we’ve learned the following about our user interface:


    - Push Button is based on the `NSButton` class file

    - Label is based on the `NSTextField` class file

    - Text Field is also based on the `NSTextField` class file

    - The `NSTextField` class inherits from (is a subclass of) the `NSControl` class


    Any time you need to find the class file of a user interface item, just click
    on that item in the Object Library window. To learn what properties and methods
    we can use for each user interface item, we need to look up all the properties
    and methods for that particular class. For example, if we want to know what properties
    and methods we can use for the text field, we have to look up the properties and
    methods defined by the `NSTextField` class.


    Furthermore, since the `NSTextField` class inherits from the `NSControl` class,
    we can also use any properties and methods defined by the `NSControl` class. (If
    the `NSControl` class inherits from another class, we can use the properties and
    methods stored in that other class as well.)


    ## Looking Up Properties and Methods in a Class File


    Once we know what class a particular user interface item is based on, we can look
    up its list of properties and methods in Xcode’s documentation. There are two
    ways to do that:


    - Choose Help ➤ Documentation and API reference

    - Option+click on a class name in your Swift code


    Remember when we needed to find the property that stored text in both a label
    and a text field? Here are the steps we would follow to find this information:


    - Identify the class file that each user interface item is based on (`NSTextField`,
    which we learned by clicking on that item in the Object Library)

    - Look up Xcode’s documentation about the `NSTextField` class file

    - If we can’t find the information we need in the `NSTextField` class file, look
    up the `NSControl` class file since the `NSTextField` class inherits all properties
    and methods from the `NSControl` class'
