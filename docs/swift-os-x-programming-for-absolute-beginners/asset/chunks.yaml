    breakpoint. Xcode will ignore deactivated breakpoints.   Choose Product ➤ Run.
    Notice that because you deactivated the breakpoint, Xcode ignores it and runs
    your program by displaying its empty user interface.   Choose DebugProgram ➤ Quit
    DebugProgram. The Xcode window appears again.   Choose Debug ➤ Step Over (or press
    F6) several more times until Xcode highlights the following line: `print (myMessage
    + "\(C2F(temp))")`   Choose Debug ➤ Step Into (or press F7). Xcode now highlights
    the first line of code in the C2F function as shown in Figure [23-7](#A978-1-4842-1233-2_23_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_23_Fig7_HTML.jpg](A978-1-4842-1233-2_23_Fig7_HTML.jpg)


    Figure 23-7.


    The Step Into command lets you step through the code stored in a function or method
