- fmt: "### Creating an Open Panel\n\nAn Open panel lets the user select a file to\
    \ open. The Open panel needs to return a file name if the user selected a file.\
    \ Some properties that the Open panel uses include:\n\n- `canChooseFiles` – Lets\
    \ the user select a file.\n- `canChooseDirectories` – Lets the user select a folder\
    \ or directory.\n- `allowsMultipleSelection` – Lets the user select more than\
    \ one item.\n- `URLs` – Holds the name of the chosen item. If the `allowsMultipleSelection`\
    \ property is set to `true`, then the `URLs` property holds an array of items.\
    \ Otherwise it holds a single item.\n\nTo see how to use an Open panel, follow\
    \ these steps:\n\nFrom within Xcode choose File ➤ New ➤ Project. Click Application\
    \ under the OS X category. Click Cocoa Application and click the Next button.\
    \ Xcode now asks for a product name. Click in the Product Name text field and\
    \ type `PanelProgram`. Make sure the Language pop-up menu displays Swift and that\
    \ no check boxes are selected. Click the Next button. Xcode asks where you want\
    \ to store the project. Choose a folder to store your project and click the Create\
    \ button. Click the `MainMenu.xib` file in the Project Navigator. Your program’s\
    \ user interface appears. Click the `PanelProgram` icon to display the window\
    \ of your program’s user interface. Choose View ➤ Utilities ➤ Show Object Library.\
    \ The Object Library appears in the bottom right corner of the Xcode window. Drag\
    \ a Push Button onto the user interface window and double-click on it to change\
    \ its title to Open. Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The\
    \ `AppDelegate.swift` file appears next to your user interface. Move the mouse\
    \ pointer over the push button, hold down the Control key, and drag the mouse\
    \ above the last curly bracket in the bottom of the `AppDelegate.swift` file.\
    \ Release the Control key and the mouse button. A pop-up window appears. Click\
    \ in the Connect pop-up menu and choose Action. Click in the Name text field and\
    \ type `openPanel`. Click in the Type pop-up menu, choose `NSButton`, and click\
    \ the Connect button. Xcode creates an empty IBAction method. Modify the IBAction\
    \ method as follows:\n\n```\n@IBAction func openPanel(sender: NSButton) {\n  \
    \  var myOpen = NSOpenPanel()\n    myOpen.canChooseFiles = true\n    myOpen.canChooseDirectories\
    \ = true\n    myOpen.allowsMultipleSelection = true\n    myOpen.beginWithCompletionHandler\
    \ { (result) -> Void in\n        if result == NSFileHandlingPanelOKButton {\n\
    \            print (myOpen.URLs)\n        }\n    }\n}\n```\n\nChoose Product ➤\
    \ Run. The user interface appears. Click on the button. An Open panel appears\
    \ as shown in Figure [18-5](#A978-1-4842-1233-2_18_Chapter.html#Fig5).\n\n![A978-1-4842-1233-2_18_Fig5_HTML.jpg](A978-1-4842-1233-2_18_Fig5_HTML.jpg)\n\
    \nFigure 18-5.\n\nThe Open panel. Hold down the Command key and click on two different\
    \ items such as two different files or a file and a folder. Click the Open button.\
    \ Choose PanelProgram ➤ Quit PanelProgram. Xcode appears again. In the Debug area,\
    \ you should see a list of the files/folders you chose.\n\nNote: The Open panel\
    \ only selects a file/folder, but you’ll still need to write Swift code to actually\
    \ open any file the user selects.\n\n### Creating a Save Panel\n\nA Save panel\
    \ looks similar to an Open panel, but its purpose is to let the user select a\
    \ folder and define a file name to save. The Save panel needs to return a file\
    \ name if the user selected a file. Some properties that the Save panel uses include:\n\
    \n- `title` – Displays text at the top of the Save panel. If undefined, it defaults\
    \ to displaying “Save”.\n- `prompt` – Displays text on the default button.\n-\
    \ `URL` – Holds the path name and file name of the user’s selection.\n- `nameFieldStringValue`\
    \ – Holds just the file name the user chose.\n\nTo see how to use a Save panel,\
    \ follow these steps:\n\nMake sure the `PanelProgram` is loaded in Xcode. Click\
    \ on the `MainMenu.xib` file in the Project Navigator pane. Drag a Push Button\
    \ onto the user interface and double-click on it to change its title to Save.\
    \ Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode shows the `AppDelegate.swift`\
    \ file next to the user interface. Move the mouse pointer over the Save button,\
    \ hold down the Control key, and drag the mouse under the `IBOutlet` line in the\
    \ `AppDelegate.swift` file. Release the Control key and the mouse. A pop-up window\
    \ appears. Click in the Connection pop-up menu and choose Action. Click in the\
    \ Name text field, type `savePanel`, and click the Connect button. Click in the\
    \ Type pop-up menu and choose `NSButton`. Then click the Connect button. Xcode\
    \ creates an empty IBAction method. Modify this IBAction method as follows:\n\n\
    ```\n@IBAction func savePanel(sender: NSButton) {\n    var mySave = NSSavePanel()\n\
    \    mySave.title = \"Save a File Here\"\n    mySave.prompt = \"Save Me\"\n  \
    \  mySave.beginWithCompletionHandler { (result) -> Void in\n        if result\
    \ == NSFileHandlingPanelOKButton {\n            print (mySave.URL)\n         \
    \   print (mySave.nameFieldStringValue)\n        }\n    }\n}\n```\n\nChoose Product\
    \ ➤ Run. Your user interface appears. Click the Save button. A Save panel appears\
    \ as shown in Figure [18-6](#A978-1-4842-1233-2_18_Chapter.html#Fig6). Notice\
    \ that the `title` property creates the text that appears at the top of the Save\
    \ panel while the `prompt` property creates the text that appears on the default\
    \ button in the bottom right corner of the Save panel.\n\n![A978-1-4842-1233-2_18_Fig6_HTML.jpg](A978-1-4842-1233-2_18_Fig6_HTML.jpg)\n\
    \nFigure 18-6.\n\nThe condensed Save panel. Click the Expand button that appears\
    \ to the far right of the Save As text field. The Save panel expands as shown\
    \ in Figure [18-7](#A978-1-4842-1233-2_18_Chapter.html#Fig7).\n\n![A978-1-4842-1233-2_18_Fig7_HTML.jpg](A978-1-4842-1233-2_18_Fig7_HTML.jpg)\n\
    \nFigure 18-7.\n\nThe expanded Save panel. Click in the Save As text field and\
    \ type `TestFile`. Click the Save Me button. Choose PanelProgram ➤ Quit PanelProgram.\
    \ The Xcode window appears again. In the Debug Area at the bottom of the Xcode\
    \ window, you should see the full path name of the file and folder you chose,\
    \ and just the file name you typed.\n\n## Summary\n\nWhen designing a standard\
    \ OS X user interface, you don’t have to create everything yourself. By taking\
    \ advantage of the Cocoa framework, you can create alerts and panels that look\
    \ and behave like other OS X programs with little extra coding on your own part.\n\
    \nAlerts let you display brief messages to the user such as warnings. You can\
    \ customize an alert with text and graphics, and place two or more buttons on\
    \ the alert. If you place two or more buttons on an alert, you’ll need to write\
    \ Swift code to identify which button the user clicked.\n\nAn alert typically\
    \ appears as a separate window, but you can also make it appear as a sheet that\
    \ drops down from a window’s title.\n\nPanels display commonly used user interface\
    \ items such as an Open panel to select a file to open, and a Save panel to select\
    \ a folder and a file name to save data. The Open and Save panels are part of\
    \ the Cocoa framework, but you’ll need to write additional Swift code to make\
    \ the Open and Save panels actually open or save a file to a hard disk.\n\nAlerts\
    \ and panels let you create standard OS X user interface elements with little\
    \ additional coding. By using these features of the Cocoa framework, you can create\
    \ standard OS X programs that work reliably and behave how users expect an OS\
    \ X program to look and behave."
  raw: '### Creating an Open Panel


    An Open panel let the user select a file to open. The Open panel needs to return
    a file name if the user selected a file. Some properties that the Open panel uses
    include:


    *   canChooseFiles – Lets the user select a file.

    *   canChooseDirectories – Lets the user select a folder or directory.

    *   allowsMultipleSelection – Lets the user select more than one item.

    *   URLs – Holds the name of the chosen item. If the allowsMultipleSelection property
    is set to true, then the URLs property holds an array of items. Otherwise it holds
    a single item.


    To see how to use an Open panel, follow these steps:


    From within Xcode choose File ➤ New ➤ Project.   Click Application under the OS
    X category.   Click Cocoa Application and click the Next button. Xcode now asks
    for a product name.   Click in the Product Name text field and type PanelProgram.
      Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.   Click the Next button. Xcode asks where you want to store the project.
      Choose a folder to store your project and click the Create button.   Click the
    MainMenu.xib file in the Project Navigator. Your program’s user interface appears.
      Click the PanelProgram icon to display the window of your program’s user interface.
      Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.   Drag a Push Button on to the user
    interface window and double-click on it to change its title to Open.   Choose
    View ➤ Assistant Editor ➤ Show Assistant Editor. The AppDelegate.swift file appears
    next to your user interface.   Move the mouse pointer over the push button, hold
    down the Control key, and drag the mouse above the last curly bracket in the bottom
    of the AppDelegate.swift file.   Release the Control key and the mouse button.
    A pop-up window appears.   Click in the Connect pop-up menu and choose Action.
      Click in the Name text field and type openPanel.   Click in the Type pop-up
    menu, choose NSButton, and click the Connect button. Xcode creates an empty IBAction
    method.   Modify the IBAction method as follows:  


    `@IBAction func openPanel(sender: NSButton) {`


        `var myOpen = NSOpenPanel()`


        `myOpen.canChooseFiles = true`


        `myOpen.canChooseDirectories = true`


        `myOpen.allowsMultipleSelection = true`


        `myOpen.beginWithCompletionHandler { (result) -> Void in`


            `if result == NSFileHandlingPanelOKButton {`


                `print (myOpen.URLs)`


            `}`


        `}`


    `}`


    Choose Product ➤ Run. The user interface appears.   Click on the button. An Open
    panel appears as shown in Figure [18-5](#A978-1-4842-1233-2_18_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_18_Fig5_HTML.jpg](A978-1-4842-1233-2_18_Fig5_HTML.jpg)


    Figure 18-5.


    The Open panel  Hold down the Command key and click on two different items such
    as two different files or a file and a folder.   Click the Open button.   Choose
    PanelProgram ➤ Quit PanelProgram. Xcode appears again. In the Debug area, you
    should see a list of the files/folders you chose.   Note


    The Open panel only selects a file/folder, but you’ll still need to write Swift
    code to actually open any file the user selects.


    ### Creating a Save Panel


    A Save panel looks similar to an Open panel, but its purpose is to let the user
    select folder and define a file name to save. The Save panel needs to return a
    file name if the user selected a file. Some properties that the Open panel uses
    include:


    *   title – Displays text at the top of the Save panel. If undefined, it defaults
    to displaying “Save”.

    *   prompt – Displays text on the default button.

    *   URL – Holds the path name and file name of the user’s selection.

    *   nameFieldStringValue – Holds just the file name the user chose.


    To see how to use a Save panel, follow these steps:


    Make sure the PanelProgram is loaded in Xcode.   Click on the MainMenu.xib file
    in the Project Navigator pane.   Drag a Push Button on to the user interface and
    double-click on it to change its title to Save.   Choose View ➤ Assistant Editor
    ➤ Show Assistant Editor. Xcode shows the AppDelegate.swift file next to the user
    interface.   Move the mouse pointer over the Save button, hold down the Control
    key, and drag the mouse under the IBOutlet line in the AppDelegate.swift file.
      Release the Control key and the mouse. A pop-up window appears.   Click in the
    Connection pop-up menu and choose Action.   Click in the Name text field, type
    savePanel, and click the Connect button.   Click in the Type pop-up menu and choose
    NSButton. Then click the Connect button. Xcode creates an empty IBAction method.
      Modify this IBAction method as follows:  


    `@IBAction func savePanel(sender: NSButton) {`


        `var mySave = NSSavePanel()`


        `mySave.title = "Save a File Here"`


        `mySave.prompt = "Save Me"`


        `mySave.beginWithCompletionHandler { (result) -> Void in`


            `if result == NSFileHandlingPanelOKButton {`


                `print (mySave.URL)`


                `print (mySave.nameFieldStringValue)`


            `}`


        `}`


    `}`


    Choose Product ➤ Run. Your user interface appears.   Click the Save button. A
    Save panel appears as shown in Figure [18-6](#A978-1-4842-1233-2_18_Chapter.html#Fig6).
    Notice that the title property creates the text that appears at the top of the
    Save panel while the prompt property creates the text that appears on the default
    button in the bottom right corner of the Save panel.


    ![A978-1-4842-1233-2_18_Fig6_HTML.jpg](A978-1-4842-1233-2_18_Fig6_HTML.jpg)


    Figure 18-6.


    The condensed Save panel  Click the Expand button that appears to the far right
    of the Save As text field. The Save panel expands as shown in Figure [18-7](#A978-1-4842-1233-2_18_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_18_Fig7_HTML.jpg](A978-1-4842-1233-2_18_Fig7_HTML.jpg)


    Figure 18-7.


    The expanded Save panel   Click in Save As text field and type TestFile.   Click
    the Save Me button.   Choose PanelProgram ➤ Quit PanelProgram. The Xcode window
    appears again. In the Debug Area at the bottom of the Xcode window, you should
    see the full path name of the file and folder you chose, and just the file name
    you typed.


    ## Summary


    When designing a standard OS X user interface, you don’t have to create everything
    yourself. By taking advantage of the Cocoa framework, you can create alerts and
    panels that look and behave like other OS X programs with little extra coding
    on your own part.


    Alerts let you display brief messages to the user such as warnings. You can customize
    an alert with text and graphics, and place two or more buttons on the alert. If
    you place two or more buttons on an alert, you’ll need to write Swift code to
    identify which button the user clicked.


    An alert typically appears as a separate window, but you can also make it appear
    as a sheet that drops down from a window’s title.


    Panels display commonly used user interface items such as an Open panel to select
    a file to open, and a Save panel to select a folder and a file name to save data.
    The Open and Save panels are part of the Cocoa framework, but you’ll need to write
    additional Swift code to make the Open and Save panels actually open or save a
    file to a hard disk.


    Alerts and panels let you create standard OS X user interface elements with little
    additional coding. By using these features of the Cocoa framework, you can create
    standard OS X programs that work reliably and behave how users expect an OS X
    program to look and behave.'
  trans: "\n### 创建打开面板\n\n打开面板让用户可以选择要打开的文件。如果用户选择了文件，打开面板需要返回一个文件名。打开面板使用的一些属性包括：\n\
    \n- `canChooseFiles` – 允许用户选择一个文件。\n- `canChooseDirectories` – 允许用户选择一个文件夹或目录。\n\
    - `allowsMultipleSelection` – 允许用户选择多个项目。\n- `URLs` – 保存所选项目的名称。如果`allowsMultipleSelection`属性设置为`true`，则`URLs`属性保存一个项目数组。否则，它保存单个项目。\n\
    \n要了解如何使用打开面板，请按照以下步骤操作：\n\n在 Xcode 中选择 File ➤ New ➤ Project。在 OS X 类别下点击 Application。点击\
    \ Cocoa Application，然后点击 Next 按钮。Xcode 现在会要求您输入产品名称。点击 Product Name 文本字段并输入`PanelProgram`。确保\
    \ Language 弹出菜单显示 Swift，并且未选中任何复选框。点击 Next 按钮。Xcode 会询问您希望将项目存储在哪里。选择一个文件夹来存储您的项目，然后点击\
    \ Create 按钮。在 Project Navigator 中点击`MainMenu.xib`文件。您的程序用户界面将出现。点击`PanelProgram`图标以显示程序用户界面的窗口。选择\
    \ View ➤ Utilities ➤ Show Object Library。Object Library 会出现在 Xcode 窗口的右下角。将一个\
    \ Push Button 拖到用户界面窗口上，双击它以将其标题更改为 Open。选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor。`AppDelegate.swift`文件会出现在您的用户界面旁边。将鼠标指针移到按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开\
    \ Control 键和鼠标按钮。会弹出一个窗口。点击 Connect 弹出菜单并选择 Action。点击 Name 文本字段并输入`openPanel`。点击\
    \ Type 弹出菜单，选择`NSButton`，然后点击 Connect 按钮。Xcode 会创建一个空的 IBAction 方法。按如下所示修改 IBAction\
    \ 方法：\n\n```\n@IBAction func openPanel(sender: NSButton) {\n    var myOpen = NSOpenPanel()\n\
    \    myOpen.canChooseFiles = true\n    myOpen.canChooseDirectories = true\n  \
    \  myOpen.allowsMultipleSelection = true\n    myOpen.beginWithCompletionHandler\
    \ { (result) -> Void in\n        if result == NSFileHandlingPanelOKButton {\n\
    \            print (myOpen.URLs)\n        }\n    }\n}\n```\n\n选择 Product ➤ Run。用户界面将出现。点击该按钮。一个打开面板将出现，如图\
    \ 18-5 所示。\n\n![A978-1-4842-1233-2_18_Fig5_HTML.jpg](img/A978-1-4842-1233-2_18_Fig5_HTML.jpg)\n\
    \n图 18-5。\n\n打开面板。按住 Command 键并点击两个不同的项目，例如两个不同的文件，或一个文件和一个文件夹。点击 Open 按钮。选择 PanelProgram\
    \ ➤ Quit PanelProgram。Xcode 将再次出现。在 Debug 区域，您应该会看到您所选择的文件/文件夹列表。\n\n注意：打开面板仅用于选择文件/文件夹，您仍然需要编写\
    \ Swift 代码来实际打开用户选择的任何文件。\n\n### 创建保存面板\n\n保存面板的外观与打开面板相似，但其目的是让用户选择一个文件夹并定义一个文件名来保存。如果用户选择了文件，保存面板需要返回一个文件名。保存面板使用的一些属性包括：\n\
    \n- `title` – 在保存面板顶部显示文本。如果未定义，默认显示“Save”。\n- `prompt` – 在默认按钮上显示文本。\n- `URL`\
    \ – 保存用户选择的路径名和文件名。\n- `nameFieldStringValue` – 仅保存用户选择的文件名。\n\n要了解如何使用保存面板，请按照以下步骤操作：\n\
    \n确保`PanelProgram`已加载到 Xcode 中。在 Project Navigator 窗格中点击`MainMenu.xib`文件。将一个 Push\
    \ Button 拖到用户界面上，双击它以将其标题更改为 Save。选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor。Xcode 会在用户界面旁边显示`AppDelegate.swift`文件。将鼠标指针移到 Save 按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件中`IBOutlet`行下方。松开\
    \ Control 键和鼠标。会弹出一个窗口。点击 Connection 弹出菜单并选择 Action。点击 Name 文本字段，输入`savePanel`，然后点击\
    \ Connect 按钮。点击 Type 弹出菜单并选择`NSButton`。然后点击 Connect 按钮。Xcode 会创建一个空的 IBAction\
    \ 方法。按如下所示修改此 IBAction 方法：\n\n```\n@IBAction func savePanel(sender: NSButton)\
    \ {\n    var mySave = NSSavePanel()\n    mySave.title = \"Save a File Here\"\n\
    \    mySave.prompt = \"Save Me\"\n    mySave.beginWithCompletionHandler { (result)\
    \ -> Void in\n        if result == NSFileHandlingPanelOKButton {\n           \
    \ print (mySave.URL)\n            print (mySave.nameFieldStringValue)\n      \
    \  }\n    }\n}\n```\n\n选择 Product ➤ Run。您的用户界面将出现。点击 Save 按钮。一个保存面板将出现，如图 18-6\
    \ 所示。请注意，`title`属性创建了显示在保存面板顶部的文本，而`prompt`属性创建了显示在保存面板右下角默认按钮上的文本。\n\n![A978-1-4842-1233-2_18_Fig6_HTML.jpg](img/A978-1-4842-1233-2_18_Fig6_HTML.jpg)\n\
    \n图 18-6。\n\n紧凑型保存面板。点击“Save As”文本字段最右侧出现的 Expand 按钮。保存面板将展开，如图 18-7 所示。\n\n![A978-1-4842-1233-2_18_Fig7_HTML.jpg](img/A978-1-4842-1233-2_18_Fig7_HTML.jpg)\n\
    \n图 18-7。\n\n展开后的保存面板。点击“Save As”文本字段并输入`TestFile`。点击 Save Me 按钮。选择 PanelProgram\
    \ ➤ Quit PanelProgram。Xcode 窗口将再次出现。在 Xcode 窗口底部的 Debug Area 中，您应该会看到您所选择的文件和文件夹的完整路径名，以及您输入的完整文件名。\n\
    \n## 总结\n\n在设计标准的 OS X 用户界面时，您不必自己创建所有内容。通过利用 Cocoa 框架，您可以创建外观和行为与其他 OS X 程序相似的警告和面板，而无需编写太多额外的代码。\n\
    \n警告让您可以向用户显示简短的消息，例如警告。您可以使用文本和图形自定义警告，并在警告上放置两个或更多按钮。如果您在警告上放置了两个或更多按钮，则需要编写\
    \ Swift 代码来识别用户点击了哪个按钮。\n\n警告通常作为单独的窗口出现，但您也可以使其作为从窗口标题栏下拉的工作表出现。\n\n面板显示常用的用户界面项目，例如用于选择要打开的文件的打开面板，以及用于选择文件夹和文件名以保存数据的保存面板。打开和保存面板是\
    \ Cocoa 框架的一部分，但您需要编写额外的 Swift 代码才能使打开和保存面板实际打开文件或将文件保存到硬盘。\n\n警告和面板让您无需编写太多额外代码即可创建标准的\
    \ OS X 用户界面元素。通过使用 Cocoa 框架的这些功能，您可以创建可靠运行且行为符合用户预期的标准 OS X 程序。\n"
- fmt: '# 19. Creating Pull-Down Menus


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1233-2_19](http://dx.doi.org/10.1007/978-1-4842-1233-2_19))
    contains supplementary material, which is available to authorized users.


    Pull-down menus represent the standard way to interact with an OS X program. While
    your program may display buttons to represent commands, too many buttons can clutter
    the screen. To avoid trying to cram multiple buttons on the screen, you can group
    related commands in multiple pull-down menus. By default, Xcode creates every
    OS X project with the following pull-down menu titles:


    - File – Displays commands for opening, saving, creating, and printing.

    - Edit – Displays commands for copying, cutting, pasting, undoing, and redoing
    commands.

    - Format – Displays commands for modifying text or graphics such as changing fonts
    or aligning text.

    - View – Displays commands for changing the way data appears in the window such
    as zooming in and out or displaying other user interface items such as toolbars.

    - Window – Displays commands for manipulating document windows such as switching
    between multiple open windows.

    - Help – Displays commands for getting help using a program.


    Besides using the standard pull-down menu titles, you can add your own or delete
    the existing ones. To organize commands within a pull-down menu, you can use horizontal
    lines to group similar commands together or store them in submenus. For the user’s
    convenience, you can also assign keystroke shortcuts to commands.


    Pull-down menus represent a standard way for users to control a program. By creating
    pull-down menus for your own programs, you can create a familiar user interface
    so others can learn and use your program quickly with little or no additional
    training.


    ## Editing Pull-Down Menus


    Each time you create a Cocoa Application project, Xcode creates a default pull-down
    menu that contains common menu titles and commands. Without writing a single line
    of Swift code, many of these commands already work. For example, the Quit command
    under the application menu (the name of your program such as `MenuProgram`) knows
    how to quit your program, and the Zoom and Minimize commands under the Window
    menu title know how to zoom and minimize the user interface window.


    In most cases, you’ll need to customize these pull-down menus by editing existing
    commands, adding new commands, and deleting existing commands. To modify a program’s
    pull-down menus, you have two options:


    - Edit the pull-down menus directly

    - Open the Document Outline and edit the menus


    To edit pull-down menus directly, click on the `.xib` or `.storyboard` file in
    the Project Navigator pane and then click directly on your program’s pull-down
    menus as shown in Figure 19-1.


    ![A978-1-4842-1233-2_19_Fig1_HTML.jpg](A978-1-4842-1233-2_19_Fig1_HTML.jpg)


    Figure 19-1. You can click directly on a program’s pull-down menus to select individual
    items


    A second way to edit pull-down menus is to open the Document Outline by clicking
    on the Show Document Outline icon as shown in Figure 19-2.


    ![A978-1-4842-1233-2_19_Fig2_HTML.jpg](A978-1-4842-1233-2_19_Fig2_HTML.jpg)


    Figure 19-2. The Show Document Outline icon


    With the Document Outline open, you can click on the disclosure triangles to view
    the different pull-down menus and their commands as shown in Figure 19-3.


    ![A978-1-4842-1233-2_19_Fig3_HTML.jpg](A978-1-4842-1233-2_19_Fig3_HTML.jpg)


    Figure 19-3. Viewing menus in the Document Outline pane


    To delete a menu item, click on it to select it (either by clicking directly on
    the pull-down menu item or on the menu item in the Document Outline pane) and
    press the Backspace or Delete key. This lets you delete individual menu items
    or entire menu titles such as the File or Edit pull-down menu title.


    Note: If you delete a menu item or entire pull-down menu title by mistake, just
    choose **Edit ➤ Undo** or press `Command+Z` to recover it right away.


    To add items to a program’s pull-down menus, you have two choices:


    - Add a new menu item to an existing pull-down menu title such as File or Edit

    - Add a new pull-down menu title that lists its own commands


    ### Adding New Pull-Down Menu Titles to the Menu Bar


    You can add menu items and pull-down menu titles either directly on the pull-down
    menu, or inside the Document Outline.


    The Object Library displays the following pull-down menu titles that you can add
    to a program’s menu bar as shown in Figure 19-4:


    ![A978-1-4842-1233-2_19_Fig4_HTML.jpg](A978-1-4842-1233-2_19_Fig4_HTML.jpg)


    Figure 19-4. The pull-down menu titles you can add to a program’s menu bar


    - Application Menu Item – Contains typical commands found in an application pull-down
    menu title such as About, Preferences, and Services.

    - File Menu Item – Contains typical commands found in a File pull-down menu title
    such as Open, New, and Save.

    - Edit Menu Item – Contains typical commands found in the Edit pull-down menu
    title such as Cut, Copy, and Paste.

    - Font Menu Item – Contains typical commands found in a Font pull-down menu title
    such as Bold, Bigger, and Copy Style.

    - Format Menu Item – Contains typical commands found in a Format pull-down menu
    title such as Font and Text.

    - Text Menu Item – Contains typical commands found in a Text pull-down menu title
    such as Center, Writing Direction, and Show Ruler.

    - Find Menu Item – Contains typical commands found in a Find pull-down menu title
    such as Find, Find and Replace, and Find Next.

    - Window Menu Item – Contains typical commands found in a Window pull-down menu
    title such as Minimize, Bring to Front, and Zoom.

    - Help Menu Item – Contains typical commands found in a Help pull-down menu title
    such as Application Help.


    To add a pull-down menu title to a program’s menu bar, follow these steps:


    Click on the `.xib` or `.storyboard` file in the Project Navigator pane. Choose
    **View ➤ Utilities ➤ Show Object Library** to display the Object Library in the
    bottom right corner of the Xcode window. Drag a pull-down menu item (see Figure
    19-4) from the Object Library and move the mouse over the program’s menu bar until
    a vertical blue line appears to show you where the pull-down menu title will appear
    as shown in Figure 19-5.


    ![A978-1-4842-1233-2_19_Fig5_HTML.jpg](A978-1-4842-1233-2_19_Fig5_HTML.jpg)


    Figure 19-5. Adding a new pull-down menu title to a menu bar


    Instead of dragging the mouse over the program’s menu bar, you can also drag the
    mouse in between pull-down menu titles in the Document Outline until a horizontal
    blue line appears to show where your menu title will appear as shown in Figure
    19-6.


    Release the mouse. Your new pull-down menu title appears on the menu bar.


    ![A978-1-4842-1233-2_19_Fig6_HTML.jpg](A978-1-4842-1233-2_19_Fig6_HTML.jpg)


    Figure 19-6. Adding a new pull-down menu title to a menu bar using the Document
    Outline


    To rearrange the pull-down menu titles, move the mouse pointer over the menu title
    you wish to move (either on the menu bar or in the Document Outline), and drag
    the mouse to move the menu title to a new location.'
