  trans: '

    ## 本书的阅读预期


    无论您是编程新手，还是来自其他编程环境、经验丰富的开发者，本书都将尽量减少技术术语，重点帮助您理解做什么以及为何这么做。


    如果您想快速入门并学习使用 Swift 编程的基础知识，本书正适合您。如果您已经是经验丰富的 Windows 程序员，并希望开始为 Macintosh 编写程序，本书将特别有助于您快速掌握基础知识。


    如果您以前从未编写过程序，或者您已经熟悉编程但不熟悉 Macintosh 编程，那么本书适合您。即使您对 Macintosh 编程经验丰富，您仍然会发现本书是一本方便的参考书，能帮助您实现特定目标，而无需翻阅多本书籍来寻找答案。


    您不会学到创建超级复杂程序所需的全部知识，但您将学到足够入门的知识，能熟练使用 `Xcode`，并且能够更有信心、更深入地理解其他编程书籍。听起来不错吧？如果是这样，那么请翻到下一页，让我们开始吧。


    **注意**


    本书中的所有代码均使用 Swift 2 在 `Xcode 7` 中测试过。如果您使用的是 `Xcode 6`，本书中的部分功能将无法运行。


    ## 致谢


    感谢 APress 的所有优秀同仁，感谢他们给我机会撰写关于 Swift 的书籍，这是我目前为 `Macintosh`、`iPhone`、`iPad` 和
    `Apple Watch` 编程时最喜欢的新语言。


    另外还要感谢 Dane Henderson 和 Elizabeth Lee（[`www.echoludo.com`](http://www.echoludo.com)），他们与我一起在
    `KNSJ.org` 的广播节目“来自地下的笔记”（[`http://notesfromtheu.com`](http://notesfromtheu.com)）中分享电波。还要感谢
    Chris Clobber、Diane Jean、Ikaika Patria 和 Robert Weems，让我在 `KNSJ` 的另一个名为“当面笑”（[`http://www.laughinyourfaceradio.com`](http://www.laughinyourfaceradio.com)）的广播节目中分享他们的友谊和疯狂，该节目将喜剧与政治行动和评论结合在一起。


    特别要提到 Michael Montijo 和他不屈不挠的精神，在过去十五年里，他每月都会从凤凰城开车到洛杉矶与好莱坞高管会面。他的卡通节目创意“Mikey
    的生活”和“Pachuko 男孩”总有一天会登上电视屏幕，因为他尽管面临重重障碍，也从未放弃。


    还要感谢我的妻子 Cassandra 和儿子 Jordan，他们忍受了一个塞满电子设备、活人反而少见的家。最后感谢我的猫咪 Oscar 和 Mayer，它们总在一天中最不方便的时候踩过键盘、撞翻笔记本电脑，并啃咬电源线。

    '
