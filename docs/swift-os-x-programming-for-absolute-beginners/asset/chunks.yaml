    \ `Cat` 协议，其 `name` 属性将不会被分配默认值 “Frank”。\n\n要了解这种形式的协议扩展如何仅在类、结构体或枚举遵循特定协议时有效，请按照以下步骤操作：\n\
    \n确保 Xcode 中已加载 `ProtocolPlayground` 文件。按如下方式编辑 playground 代码：\n\n```\nimport\
    \ Cocoa\n\nprotocol Cat {\n    var name: String { get }\n    var age: Int { get\
    \ }\n}\n\nprotocol CatType {\n    var species: String { get }\n}\n\nextension\
    \ Cat where Self: CatType {\n    var name : String { return \"Frank\" }\n}\n\n\
    struct pet : Cat {\n    var name : String = \"Max\"\n    var age : Int = 2\n}\n\
    \nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\nanimal.name =\
    \ \"Joey\"\nanimal.age = 13\n\nprint (animal.name)\nprint (animal.age)\n\n// 遵循两个协议的新结构体\n\
    struct wild : Cat, CatType {\n    var age : Int = 2\n    var species : String\
    \ = \"Lion\"\n}\n\nvar beast = wild()\nprint (beast.name)\nprint (beast.age)\n\
    print (beast.species)\n```\n\n请注意，`pet` 结构体遵循了 `Cat` 协议，但由于它没有同时遵循 `CatType` 协议，因此你可以将其\
    \ `name` 属性赋初始值 “Max”，并且之后还可以为该 `name` 属性赋值 “Joey”。\n\n然而，`wild` 结构体同时遵循了 `Cat`\
    \ 和 `CatType` 协议，因此它也遵循了协议扩展，该扩展为 `wild` 结构体的 `name` 属性分配了默认值 “Frank”，如图 20-6\
    \ 所示。\n\n![A978-1-4842-1233-2_20_Fig6_HTML.jpg](img/A978-1-4842-1233-2_20_Fig6_HTML.jpg)\n\
    \n**图 20-6.** 协议扩展可以有选择地为遵循特定协议的结构体分配默认值\n"
- fmt: "### Using Protocol Extensions to Extend Common Data Types\n\nPerhaps the most\
    \ interesting use for protocol extensions is to add properties to common data\
    \ types such as `String`, `Int`, and `Double`. A protocol extension for extending\
    \ data types looks like this:\n\n```\nextension dataType {\n    // New property\
    \ {\n        // return computed value\n    }\n}\n```\n\nWhen you extend a common\
    \ data type with a protocol, you must create a variable that represents the data\
    \ type followed by a period and the property name. So if you created an extension\
    \ for the `Int` data type like this:\n\n```\nextension Int {\n    var name: String\
    \ {\n        return text\n    }\n}\n```\n\nYou could store a string value like\
    \ this:\n\n```\nvar status = 25.name   // represents a String\n```\n\nTo see how\
    \ to use protocol extensions to extend common data types, follow these steps:\n\
    \nMake sure the `ProtocolPlayground` file is loaded in Xcode. Edit the playground\
    \ code as follows:\n\n```\nimport Cocoa\n\nfunc checkMe(myAge: Int) -> String\
    \ {\n    if myAge >= 21 {\n        return \"Legal\"\n    } else {\n        return\
    \ \"Underage\"\n    }\n}\n\nvar text: String\nvar myAge: Int\nmyAge = 32\ntext\
    \ = checkMe(myAge)\n\nextension Int {\n    var name: String {\n        return\
    \ text\n    }\n}\n\nvar status = myAge.name\nprint(myAge)\nprint(status)\n\nmyAge\
    \ = 16\ntext = checkMe(myAge)\nstatus = myAge.name\nprint(myAge)\nprint(status)\n\
    ```\n\nFigure 20-7 shows the result of running this code. As you can see, when\
    \ the `myAge` variable is greater than 21, its `name` property stores a string,\
    \ which gets stored in the `status` variable. Depending on the value of the `myAge`\
    \ variable, the `name` property stores either the string \"Legal\" or the string\
    \ \"Underage.\"\n\n![A978-1-4842-1233-2_20_Fig7_HTML.jpg](A978-1-4842-1233-2_20_Fig7_HTML.jpg)\n\
    \n**Figure 20-7.** Protocol extensions can extend common data types\n\n### Summary\n\
    \nProtocols offer an alternate way to extend existing code. Just like a class,\
    \ a protocol can define properties and methods. The main difference is that a\
    \ protocol only defines a method's name and parameters, but does not actually\
    \ include Swift code that implements that method.\n\nAnother difference is that\
    \ when a protocol defines properties, it must also define whether that property\
    \ is gettable (`{ get }`) or gettable and settable (`{ get set }`).\n\nProtocols\
    \ work much like inheritance. While inheritance only allows classes to inherit\
    \ from exactly one other class, protocols can extend classes, structures, and\
    \ enums using one or more protocols.\n\nProtocol extensions let you define default\
    \ values for properties. When combined with common data types such as `Int`, `String`,\
    \ and `Double`, protocol extensions allow a data type to store additional information.\n\
    \nJust remember that you can mix object-oriented programming with protocol-oriented\
    \ programming so you don't have to choose between one or the other. Both objects\
    \ and protocols can be useful depending on what you need to accomplish in your\
    \ particular program. Make sure you understand how to define protocols, use them,\
    \ and extend them because protocols will be a common feature of Swift programming.\n\
    \n# 21. Defensive Programming\n\nProgrammers tend to be optimistic because when\
    \ they write code, they assume that it will work correctly. However, it's often\
    \ better to be more pessimistic when it comes to programming. Instead of assuming\
    \ your code will work the first time, it's safer to assume your code won't work\
    \ at all. This forces you to be extra careful when writing Swift code to make\
    \ sure it does exactly what you want and doesn't do anything unexpected.\n\nNo\
    \ program is error-free. Rather than waste time hunting down problems, it's far\
    \ better to anticipate them and do your best to prevent them from creeping into\
    \ your code in the first place. While it's not possible to write error-free code\
    \ 100 percent of the time, the more defensive you are in writing code, the less\
    \ likely you'll need to spend time hunting down errors that keep your code from\
    \ working properly.\n\nIn general, assume nothing. Assumptions will surprise you\
    \ every time, and rarely for the better. By anticipating problems ahead of time,\
    \ you can plan for them so they won't wreck your program and force you to spend\
    \ countless hours trying to fix a problem that you assumed should never have existed\
    \ at all.\n\n## Test with Extreme Values\n\nThe simplest way to test your code\
    \ is to start with extreme values to see how your program handles data way out\
    \ of range from the expected. When working with numbers, programs often assume\
    \ that the user will give it valid data within a fixed range, but what happens\
    \ if the user types a letter or a symbol such as a smiley face instead of a number?\
    \ What if the user types an integer instead of a decimal number (or vice versa)?\
    \ What if the user types an extreme number such as 42 billion or -0.00000005580?\n\
    \nWhen working with strings, do the same type of test. How does your program react\
    \ when it expects a string but receives a number instead? What happens if it receives\
    \ a huge string consisting of 3,000 characters? What happens if it receives foreign\
    \ language symbols with accent marks or unusual letters?\n\nBy testing your program\
    \ with extreme values, you can see if your program responds gracefully or simply\
    \ crashes. Ultimately the goal is to avoid crashes and respond gracefully. That\
    \ might mean asking the user for valid data over and over again, or at least warn\
    \ the user when the program receives invalid data. Reliable programs need to guard\
    \ against anything that threatens to keep it from working properly."
  raw: '### Using Protocol Extensions to Extend Common Data Types


    Perhaps the most interesting use for protocol extensions is to add properties
    to common data types such as String, Int, and Double. A protocol extension for
    extending data types looks like this:


    `extension dataType {`


      `// New property {`


             `// return computed value`


      `}`


    `}`


    When you extend a common data type with a protocol, you must create a variable
    that represents the data type followed by a period and the property name. So if
    you created an extension for the Int data type like this:


    `extension Int {`


        `var name : String {`


            `return text`


          `}`


    `}`


    You could store a string value like this:


    var status = 25.name   // represents a String


    To see how to use protocol extensions to extend common data types, follow these
    steps:


    Make sure the ProtocolPlayground file is loaded in Xcode.   Edit the playground
    code as follows:  


    `import Cocoa`


    `func checkMe (myAge : Int) -> String {`


        `if myAge >= 21 {`


            `return "Legal"`


        `} else {`


            `return "Underage"`


        `}`


    `}`


    `var text : String`


    `var myAge : Int`


    `myAge = 32`


    `text = checkMe (myAge)`


    `extension Int {`


        `var name : String {`


            `return text`


          `}`


    `}`


    `var status = myAge.name`


    `print (myAge)`


    `print (status)`


    `myAge = 16`


    `text = checkMe (myAge)`


    `status = myAge.name`


    `print (myAge)`


    `print (status)`


    Figure [20-7](#A978-1-4842-1233-2_20_Chapter.html#Fig7) shows the result of running
    this code. As you can see, when the myAge variable is greater than 21, its name
    property stores a string, which gets stored in the status variable. Depending
    on the value of the myAge variable, the name property stores either the string
    “Legal” or the string “Underage.”


    ![A978-1-4842-1233-2_20_Fig7_HTML.jpg](A978-1-4842-1233-2_20_Fig7_HTML.jpg)


    Figure 20-7.


    Protocol extensions can extend common data types


    ## Summary


    Protocols offer an alternate way to extend existing code. Just like a class, a
    protocol can define properties and methods. The main difference is that a protocol
    only defines a method’s name and parameters, but does not actually include Swift
    code that implements that method.


    Another difference is that when a protocol defines properties, it must also define
    whether that property is gettable { get } or gettable and settable { get set }.


    Protocols work much like inheritance. While inheritance only allows classes to
    inherit from exactly one other class, protocols can extend classes, structures,
    and enums using one or more protocols.


    Protocol extensions let you define default values for properties. When combined
    with common data types such as Int, String, and Double, protocol extensions allow
    a data type to store additional information.


    Just remember that you can mix object-oriented programming with protocol-oriented
    programming so you don’t have to choose between one or the other. Both objects
    and protocols can be useful depending on what you need to accomplish in your particular
    program. Make sure you understand how to define protocols, use them, and extend
    them because protocols will be a common feature of Swift programming.


    # 21. Defensive Programming


    Programmers tend to be optimistic because when they write code, they assume that
    it will work correctly. However, it’s often better to be more pessimistic when
    it comes to programming. Instead of assuming your code will work the first time,
    it’s safer to assume your code won’t work at all. This forces you to be extra
    careful when writing Swift code to make sure it does exactly what you want and
    doesn’t do anything unexpected.


    No program is error-free. Rather than waste time hunting down problems, it’s far
    better to anticipate them and do your best to prevent them from creeping into
    your code in the first place. While it’s not possible to write error-free code
    100 percent of the time, the more defensive you are in writing code, the less
    likely you’ll need to spend time hunting down errors that keep your code from
    working properly.


    In general, assume nothing. Assumptions will surprise you every time, and rarely
    for the better. By anticipating problems ahead of time, you can plan for them
    so they won’t wreck your program and force you to spend countless hours trying
    to fix a problem that you assumed should never have existed at all.


    ## Test with Extreme Values


    The simplest way to test your code is to start with extreme values to see how
    your program handles data way out of range from the expected. When working with
    numbers, programs often assume that the user will give it valid data within a
    fixed range, but what happens if the user types a letter or a symbol such as a
    smiley face instead of a number? What if the user types an integer instead of
    a decimal number (or vice versa)? What if the user types an extreme number such
    as 42 billion or -0.00000005580?


    When working with strings, do the same type of test. How does your program react
    when it expects a string but receives a number instead? What happens if it receives
    a huge string consisting of 3,000 characters? What happens if it receives foreign
    language symbols with accent marks or unusual letters?


    By testing your program with extreme values, you can see if your program responds
    gracefully or simply crashes. Ultimately the goal is to avoid crashes and respond
    gracefully. That might mean asking the user for valid data over and over again,
    or at least warn the user when the program receives invalid data. Reliable programs
    need to guard against anything that threatens to keep it from working properly.'
  trans: "\n### 使用协议扩展扩展通用数据类型\n\n协议扩展最有趣的用途可能就是为通用数据类型（如`String`、`Int`和`Double`）添加属性。用于扩展数据类型的协议扩展结构如下：\n\
    \n```\nextension dataType {\n    // 新属性 {\n        // 返回计算值\n    }\n}\n```\n\n\
    当你使用协议扩展通用数据类型时，必须先创建一个代表数据类型的变量，后跟一个句点和属性名。因此，如果你像这样为`Int`数据类型创建扩展：\n\n```\n\
    extension Int {\n    var name: String {\n        return text\n    }\n}\n```\n\n\
    你可以像这样存储一个字符串值：\n\n```\nvar status = 25.name   // 表示一个 String\n```\n\n要了解如何使用协议扩展扩展通用数据类型，请按照以下步骤操作：\n\
    \n确保`ProtocolPlayground`文件已在 Xcode 中加载。按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\n\
    \nfunc checkMe(myAge: Int) -> String {\n    if myAge >= 21 {\n        return \"\
    Legal\"\n    } else {\n        return \"Underage\"\n    }\n}\n\nvar text: String\n\
    var myAge: Int\nmyAge = 32\ntext = checkMe(myAge)\n\nextension Int {\n    var\
    \ name: String {\n        return text\n    }\n}\n\nvar status = myAge.name\nprint(myAge)\n\
    print(status)\n\nmyAge = 16\ntext = checkMe(myAge)\nstatus = myAge.name\nprint(myAge)\n\
    print(status)\n```\n\n图 20-7 显示了运行这段代码的结果。如你所见，当`myAge`变量大于 21 时，其`name`属性会存储一个字符串，该字符串会被存入`status`变量。根据`myAge`变量的值，`name`属性存储的字符串要么是\"\
    Legal\"，要么是\"Underage\"。\n\n![A978-1-4842-1233-2_20_Fig7_HTML.jpg](img/A978-1-4842-1233-2_20_Fig7_HTML.jpg)\n\
    \n**图 20-7.** 协议扩展可以扩展通用数据类型\n\n### 小结\n\n协议为扩展现有代码提供了一种替代方式。就像类一样，协议可以定义属性和方法。主要区别在于，协议只定义方法的名称和参数，但并不实际包含实现该方法的\
    \ Swift 代码。\n\n另一个区别是，当协议定义属性时，它还必须定义该属性是只读的（`{ get }`）还是可读写的（`{ get set }`）。\n\
    \n协议的工作原理与继承非常相似。虽然继承只允许类继承自另一个类，但协议可以使用一个或多个协议来扩展类、结构体和枚举。\n\n协议扩展允许你为属性定义默认值。当与`Int`、`String`和`Double`等通用数据类型结合使用时，协议扩展允许数据类型存储额外的信息。\n\
    \n请记住，你可以将面向对象编程与面向协议编程相结合，因此不必在两者之间做出选择。对象和协议都可能在特定程序中发挥重要作用，具体取决于你需要实现的目标。请务必理解如何定义、使用和扩展协议，因为协议将是\
    \ Swift 编程的一个常见特性。\n\n# 21. 防御性编程\n\n程序员往往过于乐观，因为他们在编写代码时，总是假设代码能正确运行。然而，在编程时，悲观一些往往更好。与其假设你的代码一次就能运行成功，不如安全地假设你的代码根本不会运行。这会迫使你在编写\
    \ Swift 代码时格外小心，确保代码完全按照你的意图执行，并且不会出现任何意外行为。\n\n没有程序是零错误的。与其浪费时间排查问题，不如提前预见问题并尽最大努力防止它们潜入代码中。虽然不可能\
    \ 100% 编写出零错误的代码，但你在编写代码时越具有防御性，就越不需要花时间排查导致代码无法正常运行的错误。\n\n总的来说，不要做任何假设。假设每次都会让你大吃一惊，而且很少会让事情变得更好。通过提前预见问题，你可以为它们制定计划，这样它们就不会破坏你的程序，也不会迫使你花费无数时间试图修复一个你认为根本不应该存在的问题。\n\
    \n## 使用极限值进行测试\n\n测试代码最简单的方法是从极限值开始，看看程序如何处理远超出预期范围的数据。处理数字时，程序通常假设用户会提供固定范围内的有效数据，但如果用户输入的是字母或笑脸等符号而不是数字，会发生什么？如果用户输入的是整数而不是小数（或者反之）呢？如果用户输入的是像\
    \ 420 亿或 -0.00000005580 这样的极端数字呢？\n\n处理字符串时，也要进行同样的测试。当程序期待一个字符串却收到一个数字时，它会如何反应？如果收到一个包含\
    \ 3000 个字符的巨大字符串呢？如果收到带有重音符号或特殊字母的外语符号呢？\n\n通过使用极限值测试程序，你可以观察程序是优雅地响应，还是直接崩溃。最终目标是避免崩溃并优雅地响应。这可能意味着反复要求用户提供有效数据，或者至少在程序接收到无效数据时警告用户。可靠的程序需要防范任何威胁其正常运行的情况。\n"
- fmt: "# Be Careful with Language Shortcuts\n\nEvery programming language offers\
    \ shortcuts to make programming faster by requiring less code. However, those\
    \ language shortcuts can often trip up even the most experienced programmers so\
    \ use shortcuts with care.\n\nOne simple mistake is mixing up prefix and postfix\
    \ operators such as `counter++` or `++counter`. Although the postfix and prefix\
    \ increment operators look nearly identical, they create two completely different\
    \ results as shown in Figure [21-1](#A978-1-4842-1233-2_21_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1233-2_21_Fig1_HTML.jpg](A978-1-4842-1233-2_21_Fig1_HTML.jpg)\n\
    \nFigure 21-1. Using the prefix and postfix increment shortcut\n\nNotice that\
    \ the postfix increment operator (`counter++`) first uses the value of `counter`\
    \ and then adds 1 to it. That’s why the `print(counter++)` line prints 20. Right\
    \ after it prints 20, the postfix increment operator adds 1 to the `counter` variable.\n\
    \nOn the other hand, the prefix increment operator (`++counter`) adds 1 first\
    \ and then uses the value of the `counter`. After the `counter++` operator adds\
    \ 1 to 20 and gets 21, the `++counter` prefix increment operator adds 1 to it\
    \ before using it. That’s why it prints 22.\n\nDepending on what you need, mixing\
    \ these two increment operators up can give you slightly different results, which\
    \ can keep your program from working properly. If you’re not sure how these increment\
    \ operators work, just play it safe and use `counter = counter + 1` instead. Clarity\
    \ is always better than confusion even if it means writing additional lines of\
    \ code.\n\nTo see how the postfix increment operator differs from the prefix increment\
    \ operator, follow these steps:\n\n- From within Xcode choose File ➤ New ➤ Playground.\
    \ Xcode now asks for a playground name.\n- Click in the Name text field and type\
    \ `DefensePlayground`.\n- Make sure the Platform pop-up menu displays OS X.\n\
    - Click the Next button. Xcode asks where you want to store the playground.\n\
    - Choose a folder to store your project and click the Create button.\n- Edit the\
    \ playground code as follows:\n\n```\nimport Cocoa\nvar counter : Int\ncounter\
    \ = 20\nprint (counter++)\nprint (++counter)\n```\n\nThe postfix increment operator\
    \ and the prefix increment operator can be a shortcut, but could have unintended\
    \ consequences if used incorrectly. Another shortcut is Swift’s if-else statement.\
    \ Normally it looks like this:\n\n```\nif Booleancondition {\n    // Do something\
    \ if true\n} else {\n    // Do something if false\n}\n```\n\nHowever, Swift also\
    \ offers an if-else shortcut that looks like this:\n\n```\nBooleancondition ?\
    \ Result1 : Result2\n```\n\nUnless you’re familiar with this shortcut version\
    \ of the if-else statement, it can be confusing even though it’s shorter. Any\
    \ time code is confusing, there’s a risk you’ll use it incorrectly. To see how\
    \ this if-else statement works, follow these steps:\n\n- Make sure the `DefensePlayground`\
    \ is loaded into Xcode.\n- Edit the playground code as follows:\n\n```\nimport\
    \ Cocoa\nvar i : Int\ni = 1\n// Normal if-else statement\nif i < 5 {\n    print\
    \ (\"Less than 5\")\n} else {\n    print (\"Greater than 5\")\n}\ni = 1\n// Ternary\
    \ operator version of if-else statement\nprint ((i < 5) ? \"Less than 5\" : \"\
    Greater than 5\")\n```\n\nNotice that both if-else statements work exactly alike\
    \ as shown in Figure [21-2](#A978-1-4842-1233-2_21_Chapter.html#Fig2), but the\
    \ shortcut version is much harder to understand in exchange for typing less code.\
    \ Any time code is hard to understand, there’s always the risk that you’ll use\
    \ it incorrectly. When in doubt, don’t use shortcuts.\n\n![A978-1-4842-1233-2_21_Fig2_HTML.jpg](A978-1-4842-1233-2_21_Fig2_HTML.jpg)\n\
    \nFigure 21-2. The shortcut version of the if-else statement\n\n# Working with\
    \ Optional Variables\n\nOne of Swift’s most powerful features is optional variables.\
    \ An optional variable can contain a value or nothing at all (identified with\
    \ a `nil` value). However, you must use optional variables with care because if\
    \ you try using them when they contain a `nil` value, your program could crash.\n\
    \nWhen working with optional variables, you need to worry about the following:\n\
    \n- Whether the optional variable holds a `nil` value or not\n- Unwrapping an\
    \ optional variable to retrieve its actual value\n\nNormally you can access the\
    \ value stored inside an optional by using the exclamation mark, which is called\
    \ unwrapping an optional. The big problem with unwrapping an optional is if you\
    \ assume its value is not nil. Suppose you had the following:\n\n```\nvar test\
    \ : String?\nprint (test)\nprint (test!)\n```\n\nSince the `test` optional variable\
    \ hasn’t been assigned a value, its default value is `nil`. The first `print`\
    \ command simply prints `nil`. However the second `print` command tries to unwrap\
    \ the optional, but since its value is `nil`, this causes an error as shown in\
    \ Figure [21-3](#A978-1-4842-1233-2_21_Chapter.html#Fig3).\n\n![A978-1-4842-1233-2_21_Fig3_HTML.jpg](A978-1-4842-1233-2_21_Fig3_HTML.jpg)\n\
    \nFigure 21-3. Unwrapping an optional that has a nil value causes an error\n\n\
    When working with optionals, always test to see if they’re nil before you try\
    \ using them. One way to test for a nil value is to simply test if the optional\
    \ is equal to `nil` such as:\n\n```\nimport Cocoa\nvar test : String?\nif test\
    \ == nil {\n    print (\"Nil value\")\n} else {\n    print (test!)\n}\n```\n\n\
    In this example, the if-else statement first checks if the `test` optional is\
    \ equal to `nil`. If so, then it prints `\"Nil value\"`. If not, then it can safely\
    \ unwrap the optional using the exclamation mark.\n\nAnother way to check for\
    \ a nil value is to assign a constant to an optional, which is known as optional\
    \ binding. Instead of using the optional variable, you assign or bind its value\
    \ to a constant such as:\n\n```\nif let constant = optionalVariable {\n    //\
    \ Optional is not nil\n} else {\n    // Optional is a nil value\n}\n```\n\nIf\
    \ you need to test several optional variables, you can list them on a single line\
    \ like this:\n\n```\nif let constant = optionalVariable, constant2 = optionalVariable2\
    \ {\n    // No optionals are nil\n} else {\n    // One or more optionals are nil\n\
    }\n```\n\nIf the constant holds a value, then the if-else statement can use the\
    \ constant value. If the constant does not hold a value (contains `nil`), then\
    \ the if-else statement does something else to avoid using a nil value. By using\
    \ a constant to store the value of an optional variable, you avoid unwrapping\
    \ an optional variable using the exclamation mark.\n\nLet’s see how to use optional\
    \ binding:\n\n- Make sure the `DefensePlayground` is loaded into Xcode.\n- Edit\
    \ the playground code as follows:\n\n```\nimport Cocoa\nvar test : String?\nvar\
    \ final : String?\nif let checkMe = test, let checkMe2 = final {\n    print (checkMe)\n\
    } else {\n    print (\"Nil value in one or both optionals\")\n}\ntest = \"Hello\"\
    \nif let checkMe = test, let checkMe2 = final {\n    print (checkMe)\n} else {\n\
    \    print (\"Nil value in one or both optionals\")\n}\nfinal = \"Bye\"\nif let\
    \ checkMe = test, let checkMe2 = final {\n    print (checkMe + \" & \" + checkMe2)\n\
    } else {\n    print (\"Nil value in one or both optionals\")\n}\n```\n\nThe above\
    \ code assigns two different optional variable values to two different constants.\
    \ Only if both constants contain a non-nil value will the first part of the if-else\
    \ statement run. If one or both constants contain a nil value, then the else part\
    \ of the if-else statement runs as shown in Figure [21-4](#A978-1-4842-1233-2_21_Chapter.html#Fig4).\
    \ Also notice that none of the code unwraps any optional variable using the exclamation\
    \ mark.\n\n![A978-1-4842-1233-2_21_Fig4_HTML.jpg](A978-1-4842-1233-2_21_Fig4_HTML.jpg)\n\
    \nFigure 21-4. Using optional binding to assign an optional variable value to\
    \ a constant"
  raw: '## Be Careful with Language Shortcuts


    Every programming language offers shortcuts to make programming faster by requiring
    less code. However, those language shortcuts can often trip up even the most experienced
    programmers so use shortcuts with care.


    One simple mistake is mixing up prefix and postfix operators such as counter++
    or ++counter. Although the postfix and prefix increment operators look nearly
    identical, they create two completely different results as shown in Figure [21-1](#A978-1-4842-1233-2_21_Chapter.html#Fig1).


    ![A978-1-4842-1233-2_21_Fig1_HTML.jpg](A978-1-4842-1233-2_21_Fig1_HTML.jpg)


    Figure 21-1.


    Using the prefix and postfix increment shortcut


    Notice that the postfix increment operator (counter++) first uses the value of
    counter and then adds 1 to it. That’s why the print (counter++) line prints 20\.
    Right after it prints 20, the postfix increment operator adds 1 to the counter
    variable.


    On the other hand, the prefix increment operator (++counter) adds 1 first and
    then uses the value of the counter. After the counter++ operator adds 1 to 20
    and gets 21, the ++counter prefix increment operator adds 1 to it before using
    it. That’s why it prints 22.


    Depending on what you need, mixing these two increment operators up can give you
    slightly different results, which can keep your program from working properly.
    If you’re not sure how these increment operators work, just play it safe and use
    counter = counter + 1 instead. Clarity is always better than confusion even if
    it means writing additional lines of code.


    To see how the postfix increment operator differs from the prefix increment operator,
    follow these steps:


    From within Xcode choose File ➤ New ➤ Playground. Xcode now asks for a playground
    name.   Click in the Name text field and type DefensePlayground.   Make sure the
    Platform pop-up menu displays OS X.   Click the Next button. Xcode asks where
    you want to store the playground.   Choose a folder to store your project and
    click the Create button.   Edit the playground code as follows: `import Cocoa`
    `var counter : Int` `counter = 20` `print (counter++)` `print (++counter)`  


    The postfix increment operator and the prefix increment operator can be a shortcut,
    but could have unintended consequences if used incorrectly. Another shortcut is
    Swift’s if-else statement. Normally it looks like this:


    `if Booleancondition {`


        `// Do something if true`


    `} else {`


        `// Do something if false`


    `}`


    However, Swift also offers an if-else shortcut that looks like this:


    `Booleancondition ? Result1 : Result2`


    Unless you’re familiar with this shortcut version of the if-else statement, it
    can be confusing even though it’s shorter. Any time code is confusing, there’s
    a risk you’ll use it incorrectly. To see how this if-else statement works, follow
    these steps:


    Make sure the DefensePlayground is loaded into Xcode.   Edit the playground code
    as follows: `import Cocoa` `var i : Int` `i = 1` `// Normal if-else statement`
    `if i < 5 {`     `print ("Less than 5")` `} else {`     `print ("Greater than
    5")` `}` `i = 1` `// Ternary operator version of if-else statement` `print ((i
    < 5) ? "Less than 5" : "Greater than 5"` `)`  


    Notice that both if-else statements work exactly alike as shown in Figure [21-2](#A978-1-4842-1233-2_21_Chapter.html#Fig2),
    but the shortcut version is much harder to understand in exchange for typing less
    code. Any time code is hard to understand, there’s always the risk that you’ll
    use it incorrectly. When in doubt, don’t use shortcuts.


    ![A978-1-4842-1233-2_21_Fig2_HTML.jpg](A978-1-4842-1233-2_21_Fig2_HTML.jpg)


    Figure 21-2.


    The shortcut version of the if-else statement


    ## Working with Optional Variables


    One of Swift’s most powerful features is optional variables. An optional variable
    can contain a value or nothing at all (identified with a nil value). However,
    you must use optional variables with care because if you try using them when they
    contain a nil value, your program could crash.


    When working with optional variables, you need to worry about the following:


    *   Whether the optional variable holds a nil value or not

    *   Unwrapping an optional variable to retrieve its actual value


    Normally you can access the value stored inside an optional by using the exclamation
    mark, which is called unwrapping an optional. The big problem with unwrapping
    an optional is if you assume its value is not nil. Suppose you had the following:


    `var test : String?`


    `print (test)`


    `print (test!)`


    Since the "test" optional variable hasn’t been assigned a value, its default value
    is nil. The first print command simply prints nil. However the second print command
    tries to unwrap the optional, but since its value is nil, this causes an error
    as shown in Figure [21-3](#A978-1-4842-1233-2_21_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_21_Fig3_HTML.jpg](A978-1-4842-1233-2_21_Fig3_HTML.jpg)


    Figure 21-3.


    Unwrapping an optional that has a nil value causes an error


    When working with optionals, always test to see if they’re nil before you try
    using them. One way to test for a nil value is to simply test if the optional
    is equal to nil such as:


    `import Cocoa`


    `var test : String?`


    `if test == nil {`


        `print ("Nil value")`


    `} else {`


        `print (test!)`


    `}`


    In this example, the if-else statement first checks if the "test" optional is
    equal to nil. If so, then it prints "Nil value." If not, then it can safely unwrap
    the optional using the exclamation mark.


    Another way to check for a nil value is to assign a constant to an optional, which
    is known as optional binding. Instead of using the optional variable, you assign
    or bind its value to a constant such as:


    `if let constant = optionalVariable {`


        `// Optional is not nil`


    `} else {`


        `// Optional is a nil value`


    `}`


    If you need to test several optional variables, you can list them on a single
    line like this:


    `if let constant = optionalVariable, constant2 = optionalVariable2 {`


        `// No optionals are nil`


    `} else {`


        `// One or more optionals are nil`


    `}`


    If the constant holds a value, then the if-else statement can use the constant
    value. If the constant does not hold a value (contains nil), then the if-else
    statement does something else to avoid using a nil value. By using a constant
    to store the value of an optional variable, you avoid unwrapping an optional variable
    using the exclamation mark.


    Let’s see how to use optional binding:


    Make sure the DefensePlayground is loaded into Xcode.   Edit the playground code
    as follows: `import Cocoa` `var test : String?` `var final : String?` `if let
    checkMe = test, let checkMe2 = final {`     `print (checkMe)` `} else {`     `print
    ("Nil value in one or both optionals")` `}` `test = "Hello"` `if let checkMe =
    test, let checkMe2 = final {`     `print (checkMe)` `} else {`     `print ("Nil
    value in one or both optionals")` `}` `final = "Bye"` `if let checkMe = test,
    let checkMe2 = final {`     `print (checkMe + " & " + checkMe2)` `} else {`     `print
    ("Nil value in one or both optionals")` `}`  


    The above code assigns two different optional variable values to two different
    constants. Only if both constants contain a non-nil value will the first part
    of the if-else statement run. If one or both constants contain a nil value, then
    the else part of the if-else statement runs as shown in Figure [21-4](#A978-1-4842-1233-2_21_Chapter.html#Fig4).
    Also notice that none of the code unwraps any optional variable using the exclamation
    mark.


    ![A978-1-4842-1233-2_21_Fig4_HTML.jpg](A978-1-4842-1233-2_21_Fig4_HTML.jpg)


    Figure 21-4.


    Using optional binding to assign an optional variable value to a constant'
  trans: "\n# 当心语言快捷方式\n\n每种编程语言都提供快捷方式，让你能用更少的代码来加快编程速度。然而，即使是经验最丰富的程序员，也常常会被这些语言快捷方式绊倒，因此要谨慎使用它们。\n\
    \n一个简单的错误就是混淆前缀和后缀运算符，例如 `counter++` 或 `++counter`。尽管后缀和前缀自增运算符看起来几乎一模一样，但它们会产生两种完全不同的结果，如图\
    \ 21-1 所示。\n\n![A978-1-4842-1233-2_21_Fig1_HTML.jpg](img/A978-1-4842-1233-2_21_Fig1_HTML.jpg)\n\
    \n图 21-1. 前缀与后缀自增快捷方式的使用\n\n注意，后缀自增运算符（`counter++`）会先使用 `counter` 的值，然后再加 1。这就是为什么\
    \ `print(counter++)` 这一行打印出 20。在它打印出 20 之后，后缀自增运算符立即给 `counter` 变量加上了 1。\n\n另一方面，前缀自增运算符（`++counter`）会先加\
    \ 1，然后再使用 `counter` 的值。在 `counter++` 运算符给 20 加上 1 得到 21 之后，`++counter` 前缀自增运算符在使用它之前又给它加了\
    \ 1。这就是为什么它会打印出 22。\n\n根据你的需求，混淆这两个自增运算符可能会产生略有不同的结果，进而导致程序无法正常运行。如果你不确定这些自增运算符是如何工作的，为了稳妥起见，就使用\
    \ `counter = counter + 1` 代替。清晰总比混乱好，哪怕这意味着要多写几行代码。\n\n要了解后缀自增运算符与前缀自增运算符的区别，请遵循以下步骤：\n\
    \n-   在 Xcode 中，选择 文件 ➤ 新建 ➤ Playground。Xcode 会要求输入一个 playground 名称。\n-   在名称文本字段中单击，然后输入\
    \ `DefensePlayground`。\n-   确保平台弹出菜单显示的是 OS X。\n-   点击下一步按钮。Xcode 会询问你想把 playground\
    \ 保存在哪里。\n-   选择一个文件夹来存储你的项目，然后点击创建按钮。\n-   按如下方式编辑 playground 代码：\n\n```\nimport\
    \ Cocoa\nvar counter : Int\ncounter = 20\nprint (counter++)\nprint (++counter)\n\
    ```\n\n后缀自增运算符和前缀自增运算符可以是一种快捷方式，但如果使用不当，可能会带来意想不到的后果。另一种快捷方式是 Swift 的 if-else\
    \ 语句。它通常看起来像这样：\n\n```\nif Booleancondition {\n    // 如果条件为真，则执行此处的代码\n} else\
    \ {\n    // 如果条件为假，则执行此处的代码\n}\n```\n\n然而，Swift 也提供了一种 if-else 快捷方式，看起来像这样：\n\n\
    ```\nBooleancondition ? Result1 : Result2\n```\n\n除非你熟悉这种 if-else 语句的快捷版本，否则它可能会让人感到困惑，即使它更简短。任何时候代码让人困惑，就有错误使用它的风险。要了解这个\
    \ if-else 语句如何工作，请遵循以下步骤：\n\n-   确保 `DefensePlayground` 已加载到 Xcode 中。\n-   按如下方式编辑\
    \ playground 代码：\n\n```\nimport Cocoa\nvar i : Int\ni = 1\n// 普通的 if-else 语句\n\
    if i < 5 {\n    print (\"小于 5\")\n} else {\n    print (\"大于 5\")\n}\ni = 1\n//\
    \ 三元运算符版本的 if-else 语句\nprint ((i < 5) ? \"小于 5\" : \"大于 5\")\n```\n\n注意，两个 if-else\
    \ 语句的工作方式完全相同，如图 21-2 所示，但为了减少代码量，快捷版本更难理解。任何时候代码难以理解，就有错误使用它的风险。如有疑问，就不要使用快捷方式。\n\
    \n![A978-1-4842-1233-2_21_Fig2_HTML.jpg](img/A978-1-4842-1233-2_21_Fig2_HTML.jpg)\n\
    \n图 21-2. if-else 语句的快捷版本\n\n# 使用可选变量\n\nSwift 最强大的特性之一就是可选变量。可选变量可以包含一个值，也可以什么都不包含（由\
    \ `nil` 值标识）。但是，你必须谨慎使用可选变量，因为如果你在它们包含 `nil` 值时尝试使用它们，程序可能会崩溃。\n\n在使用可选变量时，你需要关注以下几点：\n\
    \n-   可选变量是否持有 `nil` 值\n-   解包可选变量以获取其实际值\n\n通常，你可以通过使用感叹号来访问存储在可选变量中的值，这被称为解包可选变量。解包可选变量的一个大问题是假设它的值不是\
    \ nil。假设你有以下代码：\n\n```\nvar test : String?\nprint (test)\nprint (test!)\n```\n\
    \n由于 `test` 可选变量尚未被赋值，其默认值为 `nil`。第一个 `print` 命令简单地打印出 `nil`。然而，第二个 `print` 命令试图解包这个可选变量，但由于其值为\
    \ `nil`，这会导致错误，如图 21-3 所示。\n\n![A978-1-4842-1233-2_21_Fig3_HTML.jpg](img/A978-1-4842-1233-2_21_Fig3_HTML.jpg)\n\
    \n图 21-3. 解包具有 nil 值的可选变量会导致错误\n\n在处理可选变量时，始终要在尝试使用它们之前检查其是否为 nil。检查 nil 值的一种方法是简单地测试可选变量是否等于\
    \ `nil`，例如：\n\n```\nimport Cocoa\nvar test : String?\nif test == nil {\n    print\
    \ (\"Nil 值\")\n} else {\n    print (test!)\n}\n```\n\n在这个例子中，if-else 语句首先检查 `test`\
    \ 可选变量是否等于 `nil`。如果是，则打印 `\"Nil 值\"`。如果不是，则可以安全地使用感叹号解包该可选变量。\n\n另一种检查 nil 值的方法是将一个常量赋值给可选变量，这被称为可选绑定。你不是直接使用可选变量，而是将它的值赋值或绑定给一个常量，例如：\n\
    \n```\nif let 常量 = 可选变量 {\n    // 可选变量不为 nil\n} else {\n    // 可选变量是 nil 值\n}\n\
    ```\n\n如果你需要测试多个可选变量，可以像这样将它们列在同一行：\n\n```\nif let 常量 = 可选变量, 常量 2 = 可选变量 2 {\n\
    \    // 所有可选变量都不为 nil\n} else {\n    // 一个或多个可选变量为 nil\n}\n```\n\n如果该常量持有值，那么\
    \ if-else 语句就可以使用这个常量值。如果该常量没有持有值（包含 `nil`），那么 if-else 语句会执行其他操作，以避免使用 nil 值。通过使用常量来存储可选变量的值，可以避免使用感叹号来解包可选变量。\n\
    \n让我们来看看如何使用可选绑定：\n\n-   确保 `DefensePlayground` 已加载到 Xcode 中。\n-   按如下方式编辑 playground\
    \ 代码：\n\n```\nimport Cocoa\nvar test : String?\nvar final : String?\nif let checkMe\
    \ = test, let checkMe2 = final {\n    print (checkMe)\n} else {\n    print (\"\
    一个或两个可选变量中为 Nil 值\")\n}\ntest = \"Hello\"\nif let checkMe = test, let checkMe2\
    \ = final {\n    print (checkMe)\n} else {\n    print (\"一个或两个可选变量中为 Nil 值\")\n\
    }\nfinal = \"Bye\"\nif let checkMe = test, let checkMe2 = final {\n    print (checkMe\
    \ + \" & \" + checkMe2)\n} else {\n    print (\"一个或两个可选变量中为 Nil 值\")\n}\n```\n\
    \n上面的代码将两个不同的可选变量值赋值给两个不同的常量。只有当两个常量都包含非 nil 值时，if-else 语句的第一部分才会运行。如果一个或两个常量包含\
    \ nil 值，则执行 if-else 语句的 else 部分，如图 21-4 所示。同时还要注意，没有任何代码使用感叹号解包任何可选变量。\n\n![A978-1-4842-1233-2_21_Fig4_HTML.jpg](img/A978-1-4842-1233-2_21_Fig4_HTML.jpg)\n\
    \n图 21-4. 使用可选绑定将可选变量的值赋值给常量\n"
- fmt: "# Working with Optional Chaining\n\nWhen dealing with optionals, you typically\
    \ declare an optional variable with a question mark `?` such as `Int?`, `String?`,\
    \ `Float?`, and `Double?`. Besides using common data types, you can declare any\
    \ type as an optional variable including classes.\n\nTo declare an ordinary data\
    \ type as an optional variable, you just add a question mark to the data type\
    \ name like this:\n\n`var myNumber : String?`\n\nNormally properties in a class\
    \ hold a common data type such as `String`, `Int`, or `Double`. However, a class\
    \ property can also hold another class. If you can declare a class as a type,\
    \ you can also declare a class as an optional variable, too, like this:\n\n```\n\
    class Dreamer {\n    var candidate: Politician?\n}\n\nclass Politician {\n   \
    \ var name = \"\"\n}\n```\n\nNow if you create an object based on the `Dreamer`\
    \ class, you’ll wind up with a `candidate` property that holds an optional variable.\n\
    \n`let person = Dreamer()`\n\nThe `person` object is based on the `Dreamer` class,\
    \ which means it also holds a property called `candidate`. However the `candidate`\
    \ property is also an optional variable object based on the `Politician` class.\
    \ At this point the `candidate` property has an initial value of `nil`.\n\nTo\
    \ see how an object can have another object as an optional variable, follow these\
    \ steps:\n\nMake sure the `DefensePlayground` is loaded into Xcode. Edit the playground\
    \ code as follows:\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate: Politician?\n\
    }\nclass Politician {\n    var name : String = \"\"\n}\nlet person = Dreamer()\n\
    if let check = person.candidate?.name {\n    print (\"Name = \\(check)\")\n}\n\
    else {\n    print (\"Nil value here\")\n}\n```\n\nThis code fails to create an\
    \ object from the `Politician` class, so the `candidate` property is `nil`. Because\
    \ we declared the `candidate` property as an optional variable, we can use what’s\
    \ called optional chaining to access its `name` property in the `if-else` statement\
    \ as shown in Figure [21-5](#A978-1-4842-1233-2_21_Chapter.html#Fig5).\n\n![A978-1-4842-1233-2_21_Fig5_HTML.jpg](A978-1-4842-1233-2_21_Fig5_HTML.jpg)\n\
    \nFigure 21-5. Optional chaining can access an optional variable property of a\
    \ class\n\nTo store a value in the `candidate` property, we need to create another\
    \ object like this:\n\n`person.candidate = Politician ()`\n\nThen we need to store\
    \ data in the `Politician` class’s `name` property. To do this, we need to unwrap\
    \ the optional variable (the `Politician` class) to access its `name` property\
    \ like this:\n\n`person.candidate!.name = \"Sally\"`\n\nRemember, unwrapping optionals\
    \ with the exclamation mark should only be done when you’re absolutely sure the\
    \ optional variable contains a value. In this case, we’re assigning a value (`\"\
    Sally\"`) to the optional variable so it’s safe to unwrap the optional variable.\n\
    \nLet’s see how to modify our previous code to store a value in an optional variable\
    \ property:\n\nMake sure the `DefensePlayground` is loaded into Xcode. Edit the\
    \ playground code as follows:\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate:\
    \ Politician?\n}\nclass Politician {\n    var name : String = \"\"\n}\nlet person\
    \ = Dreamer()\nif let check = person.candidate?.name {\n    print (\"Name = \\\
    (check)\")\n}\nelse {\n    print (\"Nil value here\")\n}\nperson.candidate = Politician\
    \ ()\nperson.candidate!.name = \"Sally\"\nif let check = person.candidate?.name\
    \ {\n    print (\"Name = \\(check)\")\n}\nelse {\n    print (\"Nil value here\"\
    )\n}\n```\n\nNotice that the `candidate` optional variable (`Politician`) is undefined\
    \ or `nil` until we specifically store a value in it. As soon as we store a string\
    \ (`\"Sally\"`) into the `name` property, it no longer holds a `nil` value as\
    \ shown in Figure [21-6](#A978-1-4842-1233-2_21_Chapter.html#Fig6).\n\n![A978-1-4842-1233-2_21_Fig6_HTML.jpg](A978-1-4842-1233-2_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6. You need to unwrap an optional variable to store a value in it\n\
    \nThe key when working with optional variables is to make sure you use the question\
    \ mark `?` and exclamation mark `!` symbols correctly. Fortunately if you omit\
    \ either symbol, Xcode can often prompt you to choose the right symbol as shown\
    \ in Figure [21-7](#A978-1-4842-1233-2_21_Chapter.html#Fig7).\n\n![A978-1-4842-1233-2_21_Fig7_HTML.jpg](A978-1-4842-1233-2_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7. Xcode’s editor can prompt you when to use the `?` or `!` symbols\
    \ when working with optional variables\n\nThe question mark `?` symbol is used\
    \ to create optional variables or safely access optional variables. The exclamation\
    \ mark `!` symbol is used to unwrap optional variables, so make sure those unwrapped\
    \ optional variables hold a non-nil value.\n\nIn general, any time you see a question\
    \ mark `?` used with optional variables, your code is likely safe when dealing\
