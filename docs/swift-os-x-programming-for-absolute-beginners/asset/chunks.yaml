  raw: 'Creating an Action connection   Click in the Name text field and type changeCase.
    (The name you choose should be descriptive but can be anything you want.)   Click
    in the Type pop-up menu and choose NSButton as shown in Figure [3-19](#A978-1-4842-1233-2_3_Chapter.html#Fig19).
    Then click the Connect button. Xcode creates an IBAction method that looks like
    this:


    ![A978-1-4842-1233-2_3_Fig19_HTML.jpg](A978-1-4842-1233-2_3_Fig19_HTML.jpg)


    Figure 3-19.


    Choosing a Type for an IBAction method `@IBAction func changeCase(sender: NSButton)
    {` `}`


    At this point, you’ve created an IBAction method that runs every time the user
    clicks the Change Case button. Of course, there’s no Swift code inside that IBAction,
    so now we need to type Swift code inside those curly brackets that define the
    beginning and ending of the IBAction method.


    Make sure Xcode still displays your user interface and AppDelegate.swift file
    side by side.   Choose View ➤ Standard Editor ➤ Show Standard Editor. Xcode now
    only shows your MyFirstProgram user interface.   Click the AppDelegate.swift file
    in the Project Navigator. Xcode displays all the Swift code stored in the AppDelegate.swift
    file.   Edit the IBAction changeCase method as follows: `@IBAction func changeCase(sender:
    NSButton) {`     `labelText.stringValue = messageText.stringValue.uppercaseString`
    `}`   Choose Product ➤ Run. Your MyFirstProgram runs.   Click in the text field
    of your MyFirstProgram user interface and type hello, world.   Click the Change
    Case button. The label displays HELLO, WORLD as shown in Figure [3-20](#A978-1-4842-1233-2_3_Chapter.html#Fig20).


    ![A978-1-4842-1233-2_3_Fig20_HTML.jpg](A978-1-4842-1233-2_3_Fig20_HTML.jpg)


    Figure 3-20.


    Running the MyFirstProgram   Choose MyFirstProgram ➤ Quit MyFirstProgram. Xcode
    appears again.


    As you can see, you created a simple Macintosh program without writing much Swift
    code at all. The Swift code you did write was just a single line that took the
    text stored in the text field, changed it to uppercase, and then stored this uppercase
    text in the label.


    Much of the power of Swift comes from relying on Apple’s Cocoa framework as much
    as possible. That means you have to understand object-oriented programming and
    how classes define properties (to store data) and methods (to manipulate data)
    – and use inheritance – which you’ll learn more about in the next chapter.


    The main point is to see how Xcode creates generic OS X programs so you just need
    to design and customize the user interface, then write Swift code to make it all
    work.


    ## Using the Document Outline and Connections Inspector


    Before we conclude this short introduction to creating your first Macintosh program,
    let’s look at two other items that will prove helpful when working with Xcode
    in the future: the Document Outline and the Connections Inspector.


    The Document Outline lists all the items that make up your user interface. To
    open or hide the Document Outline, you can do the following as shown in Figure
    [3-21](#A978-1-4842-1233-2_3_Chapter.html#Fig21):


    ![A978-1-4842-1233-2_3_Fig21_HTML.jpg](A978-1-4842-1233-2_3_Fig21_HTML.jpg)


    Figure 3-21.


    The Document Outline


    *   Choose Editor ➤ Show/Hide Document Outline

    *   Click the Document Outline icon


    The Document Outline makes it easy to select different items on your user interface.
    In our MyFirstProgram, there’s only three items (a label, text field, and button),
    but in more complicated user interfaces, you could have many more items that could
    be hidden behind other items or too small to see easily.


    If you click on an item in the Document Outline, Xcode selects that item in the
    user interface (and vice versa) as shown in Figure [3-22](#A978-1-4842-1233-2_3_Chapter.html#Fig22).


    ![A978-1-4842-1233-2_3_Fig22_HTML.jpg](A978-1-4842-1233-2_3_Fig22_HTML.jpg)


    Figure 3-22.


    Clicking on an item in the Document Outline window selects that item on the user
    interface


    Think of the Document Outline as a fast way to see all the parts of a user interface
    and select just the items you want.


    Once you start connecting user interface items to your Swift code through IBOutlets
    and IBAction methods, you may wonder what items are connected to which IBOutlets
    and IBAction methods. To see the connections between IBOutlets/IBAction methods
    and user interface items, you have two options.


    First, you can use the Connections Inspector. Second, you can use the Assistant
    Editor.


    To open the Connections Inspector, first click on any item in the user interface
    that you want to examine, and then do one of the following to display the Connections
    Inspector that appears in the upper right corner of the Xcode window as shown
    in Figure [3-23](#A978-1-4842-1233-2_3_Chapter.html#Fig23):


    ![A978-1-4842-1233-2_3_Fig23_HTML.jpg](A978-1-4842-1233-2_3_Fig23_HTML.jpg)


    Figure 3-23.


    The Connections Inspector shows all the connections to the currently selected
    user interface item


    *   Choose View ➤ Utilities ➤ Show Connections Inspector

    *   Press Option+Command+6

    *   Click the Show Connections Inspector icon


    The Connections Inspector shows the Swift file that holds an IBOutlet or the IBAction
    method connected to the selected user interface item.


    Note


    If you look carefully, the Connections Inspector displays an X to the left of
    the Swift file that links to the currently selected user interface item. If you
    click on this X, you can break the link between a user interface item and its
    IBOutlet or IBAction method.


    Another way to see way to see which IBOutlets and IBAction methods are connected
    to user interface items is to open the user interface (such as clicking on the
    MainMenu.xib file) and then opening the Assistant Editor.


    To the left of each IBOutlet and IBAction method in your Swift file, you’ll see
    a gray circle. When you move the mouse pointer over a gray circle, Xcode highlights
    the user interface item that’s connected to that IBOutlet or IBAction method as
    shown in Figure [3-24](#A978-1-4842-1233-2_3_Chapter.html#Fig24).


    ![A978-1-4842-1233-2_3_Fig24_HTML.jpg](A978-1-4842-1233-2_3_Fig24_HTML.jpg)


    Figure 3-24.


    The Assistant Editor lets you see which IBOutlet and IBAction methods are connected
    to user interface items


    ## Summary


    Xcode is the only program you need to design, write, and modify your own OS X
    programs. When you want to create an OS X program, you’ll follow the same basic
    steps:


    *   Pick a project template to use (typically Cocoa Application)

    *   Design and customize the user interface

    *   Connect the user interface items to IBOutlets and IBAction methods

    *   Write Swift code to make IBAction methods do something

    *   Run and test your program


    To design your user interface, you need to drag and drop items from the Object
    Library. Then you need to use the Attributes and Size Inspector to customize each
    user interface item. To help you select user interface items, you can use the
    Document Outline.


    After designing your user interface, you need to connect your user interface to
    your Swift code through IBOutlets (for retrieving or displaying data) and IBAction
    methods (to make your user interface do something) using the Assistant Editor.


    To review the connections between your user interface items and your Swift code,
    you can use the Connections Inspector or the Assistant Editor.


    Already you can see how the different parts of Xcode work to help you create a
    program, and we still haven’t explored many other Xcode features yet. Perhaps
    the most confusing part about creating a Macintosh program can be writing Swift
    code and using methods stored in the class files that make up the Cocoa framework,
    so the next chapter will explain this in more detail.


    As you can see, using Xcode is actually fairly simple once you focus only on those
    features you actually need and ignore the rest. As we go through each chapter,
    you’ll keep learning a little more about Xcode and Swift programming.


    Already you’ve learned so much about Xcode, and yet you’ve only just begun.'
