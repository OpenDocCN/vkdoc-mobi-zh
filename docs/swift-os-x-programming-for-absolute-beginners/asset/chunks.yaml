- fmt: "This class defines one property called `hitPoints`, which it initializes with\
    \ a value of 10. It also defines one method called `shoot`, which does not accept\
    \ any parameters but does return an integer value. Inside the `shoot` method,\
    \ it calculates a random number from 1 to 3 and stores this value in the `odds`\
    \ variable.\n\nNext, it checks if the value in `odds` is exactly equal to 3. If\
    \ so, then it calculates a second random number from 1 to 3 and returns this value.\
    \ If the value in `odds` is not 3, then the method returns 0.\n\nNow that you’ve\
    \ defined a class in a separate Swift file, it’s time to actually use that class\
    \ to create objects, which you can do by following these steps:\n\nClick the `AppDelegate.swift`\
    \ file in the Project Navigator pane. Xcode displays the contents of the `AppDelegate.swift`\
    \ file. Underneath the `IBOutlet` list in the `AppDelegate.swift` file, type the\
    \ following to create two objects based on the `person` class defined in the `personClass.swift`\
    \ file:\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var sheriffHitPoints:\
    \ NSTextField!\n@IBOutlet weak var outlawHitPoints: NSTextField!\nvar sheriff\
    \ = person ()\nvar outlaw = person ()\n```\n\nModify the `applicationDidFinishLaunching`\
    \ method so it displays the initial values of the `hitPoints` properties of the\
    \ `sheriff` and `outlaw` objects in the text fields on the user interface. These\
    \ are the two `IBOutlets` called `sheriffHitPoints` and `outlawHitPoints`:\n\n\
    ```\nfunc applicationDidFinishLaunching(aNotification: NSNotification) {\n   \
    \ // Insert code here to initialize your application\n    sheriffHitPoints.integerValue\
    \ = sheriff.hitPoints\n    outlawHitPoints.integerValue = outlaw.hitPoints\n}\n\
    ```\n\nModify the `shootButton` IBAction method as follows:\n\n```\n@IBAction\
    \ func shootButton(sender: NSButton) {\n    if sender.tag == 0 {    // Sheriff\
    \ shooting\n        outlaw.hitPoints -= sheriff.shoot()\n    } else {    // Outlaw\
    \ shooting\n        sheriff.hitPoints -= outlaw.shoot()\n    }\n    sheriffHitPoints.integerValue\
    \ = sheriff.hitPoints\n    outlawHitPoints.integerValue = outlaw.hitPoints\n \
    \   if sheriffHitPoints.integerValue <= 0 {\n        var myAlert = NSAlert()\n\
    \        myAlert.messageText = \"The sheriff died.\"\n        myAlert.runModal()\n\
    \    } else if outlawHitPoints.integerValue <= 0 {\n        var myAlert = NSAlert()\n\
    \        myAlert.messageText = \"The outlaw died.\"\n        myAlert.runModal()\n\
    \    }\n}\n```\n\nThis code checks the `Tag` property of the `sender` variable,\
    \ which identifies which button the user clicked. If the `Tag` property is 0,\
    \ then the user clicked on the Sheriff Shoot button so it runs the `shoot` method\
    \ in the `sheriff` object and subtracts the result (a value from 0 to 3) from\
    \ the `outlaw.hitPoints` property.\n\nIf the user clicked on the Outlaw Shoot\
    \ button, then the `shoot` method runs the `shoot` method in the `outlaw` object\
    \ and subtracts the result (a value from 0 to 3) from the `sheriff.hitPoints`\
    \ property.\n\nWhatever the result, it then displays the latest values of the\
    \ `hitPoints` property from both the `sheriff` and the `outlaw` back in the two\
    \ text fields on the user interface, identified by the `sheriffHitPoints` and\
    \ `outlawHitPoints` `IBOutlets`.\n\nFinally, if the `hitPoints` property of either\
    \ the `sheriff` or the `outlaw` falls to 0 or less, then an alert dialog appears\
    \ to display a message that either the `sheriff` or the `outlaw` died. The complete\
    \ contents of the `AppDelegate.swift` file should look like this:\n\n```\nimport\
    \ Cocoa\n\nclass AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet\
    \ weak var window: NSWindow!\n    @IBOutlet weak var sheriffHitPoints: NSTextField!\n\
    \    @IBOutlet weak var outlawHitPoints: NSTextField!\n\n    var sheriff = person\
    \ ()\n    var outlaw = person ()\n\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n        // Insert code here to initialize your application\n\
    \        sheriffHitPoints.integerValue = sheriff.hitPoints\n        outlawHitPoints.integerValue\
    \ = outlaw.hitPoints\n    }\n\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n        // Insert code here to tear down your application\n\
    \    }\n\n    @IBAction func shootButton(sender: NSButton) {\n        if sender.tag\
    \ == 0 {    // Sheriff shooting\n            outlaw.hitPoints -= sheriff.shoot()\n\
    \        } else {    // Outlaw shooting\n            sheriff.hitPoints -= outlaw.shoot()\n\
    \        }\n\n        sheriffHitPoints.integerValue = sheriff.hitPoints\n    \
    \    outlawHitPoints.integerValue = outlaw.hitPoints\n\n        if sheriffHitPoints.integerValue\
    \ <= 0 {\n            var myAlert = NSAlert()\n            myAlert.messageText\
    \ = \"The sheriff died.\"\n            myAlert.runModal()\n        } else if outlawHitPoints.integerValue\
    \ <= 0 {\n            var myAlert = NSAlert()\n            myAlert.messageText\
    \ = \"The outlaw died.\"\n            myAlert.runModal()\n        }\n    }\n}\n\
    ```\n\nTo see how this program works, follow these steps:\n\n1.  Choose Product\
    \ ➤ Run. Xcode runs your ObjectProgram project. Notice that the text fields under\
    \ both the Sheriff and Outlaw display 10, which represents their total hit points.\
    \ Each time they’re hit, their hit point total will drop. The loser will be the\
    \ character whose hit points drops to 0 or less.\n2.  Click the Sheriff Shoot\
    \ button. If the sheriff hit the outlaw, then you’ll see the value under the outlaw\
    \ label drop from 10 to a lower value such as 8. If the sheriff missed, then the\
    \ number under the outlaw won’t change at all.\n3.  Click the Outlaw Shoot button.\n\
    4.  Repeat steps 2 and 3 to alternate clicking the Sheriff Shoot and Outlaw Shoot\
    \ buttons until one character’s hit points drops to 0 or less. Then an alert dialog\
