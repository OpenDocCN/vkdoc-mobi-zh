  raw: '## Working with Optional Chaining


    When dealing with optionals, you typically declare an optional variable with a
    question mark ? such as Int?, String?, Float?, and Double? Besides using common
    data types, you can declare any type as an optional variable including classes.


    To declare an ordinary data type as an optional variable, you just add a question
    mark to the data type name like this:


    var myNumber : String?


    Normally properties in a class hold a common data type such as String, Int, or
    Double. However, a class property can also hold another class. If you can declare
    a class as a type, you can also declare a class as an optional variable, too,
    like this:


    `class Dreamer {`


    `var candidate: Politician?`


    `}`


    `class Politician {`


    `var name = ""`


    `}`


    Now if you create an object based on the Dreamer class, you’ll wind up with a
    candidate property that holds an optional variable.


    let person = Dreamer()


    The person object is based on the Dreamer class, which means it also holds a property
    called candidate. However the candidate property is also an optional variable
    object based on the Politician class. At this point the candidate property has
    an initial value of nil.


    To see how an object can have another object as an optional variable, follow these
    steps:


    Make sure the DefensePlayground is loaded into Xcode.   Edit the playground code
    as follows: `import Cocoa` `class Dreamer {`     `var candidate: Politician?`
    `}` `class Politician {`     `var name : String = ""` `}` `let person = Dreamer()`
    `if let check = person.candidate?.name {`     `print ("Name = \(check)")` `}`
    `else {`     `print ("Nil value here")` `}`


    This code fails to create an object from the Politician class, so the candidate
    property is nil. Because we declared the candidate property as an optional variable,
    we can use what’s called optional chaining to access its name property in the
    if-else statement as shown in Figure [21-5](#A978-1-4842-1233-2_21_Chapter.html#Fig5).


    ![A978-1-4842-1233-2_21_Fig5_HTML.jpg](A978-1-4842-1233-2_21_Fig5_HTML.jpg)


    Figure 21-5.


    Optional chaining can access an optional variable property of a class


    To store a value in the candidate property, we need to create another object like
    this:


    `person.candidate = Politician ()`


    Then we need to store data in the Politician class’s name property. To do this,
    we need to unwrap the optional variable (the Politician class) to access its name
    property like this:


    `person.candidate!.name = "Sally"`


    Remember, unwrapping optionals with the exclamation mark should only be done when
    you’re absolutely sure the optional variable contains a value. In this case, we’re
    assigning a value (“Sally”) to the optional variable so it’s safe to unwrap the
    optional variable.


    Let’s see how to modify our previous code to store a value in an optional variable
    property:


    Make sure the DefensePlayground is loaded into Xcode.   Edit the playground code
    as follows: `import Cocoa` `class Dreamer {`     `var candidate: Politician?`
    `}` `class Politician {`     `var name : String = ""` `}` `let person = Dreamer()`
    `if let check = person.candidate?.name {`     `print ("Name = \(check)")` `}`
    `else {`     `print ("Nil value here")` `}` `person.candidate = Politician ()`
    `person.candidate!.name = "Sally"` `if let check = person.candidate?.name {`     `print
    ("Name = \(check)")` `}` `else {`     `print ("Nil value here")` `}`


    Notice that the candidate optional variable (Politician) is undefined or nil until
    we specifically store a value in it. As soon as we store a string (“Sally”) into
    the name property, it no longer holds a nil value as shown in Figure [21-6](#A978-1-4842-1233-2_21_Chapter.html#Fig6).


    ![A978-1-4842-1233-2_21_Fig6_HTML.jpg](A978-1-4842-1233-2_21_Fig6_HTML.jpg)


    Figure 21-6.


    You need to unwrap an optional variable to store a value in it


    The key when working with optional variables is to make sure you use the question
    mark ? and exclamation mark ! symbols correctly. Fortunately if you omit either
    symbol, Xcode can often prompt you to choose the right symbol as shown in Figure
    [21-7](#A978-1-4842-1233-2_21_Chapter.html#Fig7).


    ![A978-1-4842-1233-2_21_Fig7_HTML.jpg](A978-1-4842-1233-2_21_Fig7_HTML.jpg)


    Figure 21-7.


    Xcode’s editor can prompt you when to use the ? or ! symbols when working with
    optional variables


    The question mark ? symbol is used to create optional variables or safely access
    optional variables. The exclamation mark ! symbol is used to unwrap optional variables,
    so make sure those unwrapped optional variables hold a non-nil value.


    In general, any time you see a question mark ? used with optional variables, your
    code is likely safe when dealing with nil values. However, any time you see an
    exclamation mark ! with optional variables, make sure the optional variable holds
    a value because if it holds a nil value, your code may be unsafe and could crash.


    ## Error Handling


    Since you can’t expect to write bug-free code every time, Swift offers a feature
    called error handling. The idea behind error handling is to identify and catch
    likely errors so your program handles them gracefully rather than let the program
    crash or act unpredictably. To handle errors, you need to go through several steps:


    *   Define descriptive errors that you want to identify

    *   Identify one or more functions to detect an error and identify the type of
    error that occurred

    *   Handle the error


    ### Defining Errors with enum and ErrorType


    In the old days, programs often displayed cryptic error messages filled with hexadecimal
    numbers and odd symbols. Those type of error messages are generally useless to
    identify the problem that may have occurred. That’s why the first step to handling
    errors is creating a list of descriptive error types.


    The names you give different errors are completely arbitrary, but you should give
    meaningful names to different types of error messages. To create a list of descriptive
    error types, you need to create an enum that uses the ErrorType protocol like
    this:


    `enum enumName : ErrorType {`


        `case descriptiveError1`


        `case descriptiveError2`


        `case descriptiveError3`


    `}`


    Replace enumName with a descriptive name that identifies the type of error you
    want to identify. Then type a descriptive error name as one word (without spaces)
    using the case keyword. Your list of possible errors can range from one to as
    many errors as you wish to describe so you’re not limited to a fixed number. If
    you wanted to create an enum that lists three error types, you might use code
    like this:


    `enum ageError : ErrorType {`


        `case negativeAge // Negative numbers`


        `case unrealAge   // Numbers > 140`


        `case underAge    // Under` `21`


    `}`'
  trans: "\n# 使用可选链\n\n在处理可选类型时，通常用问号 `?` 声明可选变量，例如 `Int?`、`String?`、`Float?` 和 `Double?`。除了使用常见数据类型，你还可以将任何类型（包括类）声明为可选变量。\n\
    \n要将普通数据类型声明为可选变量，只需在数据类型名称后添加一个问号，像这样：\n\n`var myNumber : String?`\n\n通常情况下，类中的属性持有常见数据类型，如\
    \ `String`、`Int` 或 `Double`。然而，类属性也可以持有另一个类。如果你可以将一个类声明为类型，那么也可以将其声明为可选变量，像这样：\n\
    \n```\nclass Dreamer {\n    var candidate: Politician?\n}\n\nclass Politician\
    \ {\n    var name = \"\"\n}\n```\n\n现在，如果你基于 `Dreamer` 类创建一个对象，就会得到一个持有可选变量的 `candidate`\
    \ 属性。\n\n`let person = Dreamer()`\n\n`person` 对象基于 `Dreamer` 类，这意味着它也持有一个名为 `candidate`\
    \ 的属性。然而，`candidate` 属性本身也是一个基于 `Politician` 类的可选变量对象。此时，`candidate` 属性的初始值为 `nil`。\n\
    \n要了解一个对象如何将另一个对象作为可选变量，请遵循以下步骤：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑\
    \ playground 代码：\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate: Politician?\n\
    }\nclass Politician {\n    var name : String = \"\"\n}\nlet person = Dreamer()\n\
    if let check = person.candidate?.name {\n    print (\"Name = \\(check)\")\n}\n\
    else {\n    print (\"Nil value here\")\n}\n```\n\n这段代码没有从 `Politician` 类创建对象，因此\
    \ `candidate` 属性为 `nil`。由于我们将 `candidate` 属性声明为可选变量，因此可以使用所谓的**可选链**在 `if-else`\
    \ 语句中访问其 `name` 属性，如图 21-5 所示。\n\n![A978-1-4842-1233-2_21_Fig5_HTML.jpg](img/A978-1-4842-1233-2_21_Fig5_HTML.jpg)\n\
    \n图 21-5. 可选链可以访问类的可选变量属性\n\n要在 `candidate` 属性中存储值，我们需要像这样创建另一个对象：\n\n`person.candidate\
    \ = Politician ()`\n\n然后，我们需要在 `Politician` 类的 `name` 属性中存储数据。为此，我们需要解包这个可选变量（即\
    \ `Politician` 类）以访问其 `name` 属性，像这样：\n\n`person.candidate!.name = \"Sally\"`\n\
    \n请记住，只有在绝对确定可选变量包含值时，才应使用感叹号解包可选变量。在这种情况下，我们正在给可选变量赋值（`\"Sally\"`），因此解包它是安全的。\n\
    \n让我们看看如何修改之前的代码，从而在可选变量属性中存储值：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑\
    \ playground 代码：\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate: Politician?\n\
    }\nclass Politician {\n    var name : String = \"\"\n}\nlet person = Dreamer()\n\
    if let check = person.candidate?.name {\n    print (\"Name = \\(check)\")\n}\n\
    else {\n    print (\"Nil value here\")\n}\nperson.candidate = Politician ()\n\
    person.candidate!.name = \"Sally\"\nif let check = person.candidate?.name {\n\
    \    print (\"Name = \\(check)\")\n}\nelse {\n    print (\"Nil value here\")\n\
    }\n```\n\n注意，`candidate` 可选变量（`Politician`）在显式存储值之前是未定义的或 `nil`。一旦我们将字符串（`\"Sally\"\
    `）存储到 `name` 属性中，它就不再持有 `nil` 值，如图 21-6 所示。\n\n![A978-1-4842-1233-2_21_Fig6_HTML.jpg](img/A978-1-4842-1233-2_21_Fig6_HTML.jpg)\n\
    \n图 21-6. 你需要解包可选变量才能在其中存储值\n\n处理可选变量的关键是要确保正确使用问号 `?` 和感叹号 `!` 符号。幸运的是，如果你遗漏了任何一个符号，Xcode\
    \ 通常会提示你选择正确的符号，如图 21-7 所示。\n\n![A978-1-4842-1233-2_21_Fig7_HTML.jpg](img/A978-1-4842-1233-2_21_Fig7_HTML.jpg)\n\
    \n图 21-7. 在处理可选变量时，Xcode 的编辑器可以提示你何时使用 `?` 或 `!` 符号\n\n问号 `?` 符号用于创建可选变量或安全地访问可选变量。感叹号\
    \ `!` 符号用于解包可选变量，因此请确保这些被解包的可选变量持有非 nil 值。\n\n通常，只要你看到问号 `?` 与可选变量一起使用，在处理 `nil`\
    \ 值时你的代码很可能是安全的。然而，只要你看到感叹号 `!` 与可选变量一起使用，请确保可选变量包含一个值，因为如果它包含 `nil` 值，你的代码可能不安全并可能导致崩溃。\n\
    \n# 错误处理\n\n由于你无法每次都写出没有 bug 的代码，Swift 提供了一种称为错误处理的特性。错误处理背后的理念是识别并捕获可能出现的错误，以便你的程序能够优雅地处理它们，而不是让程序崩溃或产生不可预测的行为。要处理错误，你需要遵循以下几个步骤：\n\
    \n*   定义你想要识别的具有描述性的错误\n*   标识一个或多个函数来检测错误并识别发生的错误类型\n*   处理错误\n\n## 使用 `enum`\
    \ 和 `ErrorType` 定义错误\n\n在过去，程序经常显示充满十六进制数字和奇怪符号的晦涩错误消息。这类错误消息通常对于识别可能发生的问题毫无用处。这就是为什么处理错误的第一步是创建一个描述性错误类型的列表。\n\
    \n你为不同错误取的名字完全是任意的，但你应该为不同类型的错误消息赋予有意义的名称。要创建一个描述性错误类型的列表，你需要创建一个遵循 `ErrorType`\
    \ 协议的 `enum`，像这样：\n\n```\nenum enumName : ErrorType {\n    case descriptiveError1\n\
    \    case descriptiveError2\n    case descriptiveError3\n}\n```\n\n将 `enumName`\
    \ 替换为一个能标识你想要识别的错误类型的描述性名称。然后使用 `case` 关键字键入一个描述性的错误名称（作为一个单词，不含空格）。你的可能错误列表可以包含从一到任意数量的错误，因此你不受固定数量的限制。如果你想创建一个列出三种错误类型的\
    \ `enum`，你可能会使用如下代码：\n\n```\nenum ageError : ErrorType {\n    case negativeAge\
    \ // 负数\n    case unrealAge   // 大于 140 的数字\n    case underAge    // 未满 21 岁\n\
    }\n```\n"
- fmt: "### Creating a Function to Identify Errors\n\nOnce you’ve created a list of\
    \ descriptive error types, you now need to create one or more functions where\
    \ you think the error might occur. Normally you would define a function like this:\n\
    \n```\nfunc functionName () {\n    // Code goes here\n}\n```\n\nTo make a function\
    \ identify errors, you need to insert the `throws` keyword like this:\n\n```\n\
    func functionName () throws {\n    // Code goes here\n}\n```\n\nIf the function\
    \ returns a value, the `throws` keyword appears before the return data type like\
    \ this:\n\n```\nfunc functionName () throws -> dataType {\n    // Code goes here\n\
    }\n```\n\nThe `throws` keyword means that the function “throws” the error for\
    \ some other part of your code to handle. Inside a function with the `throws`\
    \ keyword, you need to use one or more `guard` statements.\n\nA `guard` statement\
    \ identifies what’s allowed and works similar to an `if-else` statement. If the\
    \ `guard` statement’s Boolean condition is `true`, then nothing happens. However\
    \ if the `guard` statement is `false`, then the `guard` statement can use the\
    \ `throw` keyword to identify a specific type of error like this:\n\n```\nguard\
    \ Booleancondition else {\n    throw enumName.descriptiveError\n}\n```\n\nIf you\
    \ wanted to allow only values greater than 21, you could create a `guard` statement\
    \ like this:\n\n```\nguard myAge > 21 else {\n    throw ageError.underAge\n}\n\
    ```\n\nThis `guard` statement would do nothing if the Boolean condition (`myAge\
    \ > 21`) is `true`. Otherwise it would throw the `ageError.underAge` error where\
    \ `ageError` is the name of the enum that lists different errors to identify and\
    \ `underAge` is one of the possible errors likely to occur.\n\nThe `guard` statement\
    \ always defines acceptable behavior (`myAge > 21`) or else it identifies an error\
    \ with the `throw` keyword. A function (identified with the `throws` keyword)\
    \ can have one or more `guard` statements.\n\n### Handling the Error\n\nWhen you’ve\
    \ identified one or more functions with the `throws` keyword where it uses one\
    \ or more `guard` statements to identify possible errors, you finally need a way\
    \ to handle those errors. In Swift you do that using a `do-try-catch` statement\
    \ like this:\n\n```\ndo {\n    try callFunctionThatThrows\n} catch enumName.descriptiveError\
    \ {\n    // Code to handle the error\n}\n```\n\nThe `do-try-catch` statement tries\
    \ to run a function that can identify errors using the `throws` keyword. If the\
    \ function doesn’t identify any errors with one or more `guard` statements, then\
    \ the `do-try-catch` statement works exactly like a normal function call.\n\n\
    However if the function identifies an error, the `do-try-catch` statement is where\
    \ you need to write code to handle that error. How you handle this error can be\
    \ as simple as printing a message to let you know of a problem or as complicated\
    \ as running an entirely new set of code just to deal with the problem.\n\nThe\
    \ point is that if you anticipate possible errors and write code to handle those\
    \ errors, your program will be less likely to crash. If your program does crash,\
    \ simply find out why (which may not be easy), create a new descriptive error\
    \ name to identify it, and then create a new `catch` statement to deal with that\
    \ error.\n\nLet’s see how error handling works:\n\nMake sure the `DefensePlayground`\
    \ is loaded into Xcode. Edit the playground code as follows:\n\n```\nimport Cocoa\n\
    \nenum ageError : ErrorType {\n    case negativeAge // Negative numbers\n    case\
    \ unrealAge   // Numbers > 140\n    case underAge    // Under 21\n}\n\nfunc checkAge(myAge\
    \ : Int) throws {\n    print (myAge)\n    guard myAge > 0 else {\n        throw\
    \ ageError.negativeAge\n    }\n    guard myAge <= 140 else {\n        throw ageError.unrealAge\n\
    \    }\n    guard myAge > 21 else {\n        throw ageError.underAge\n    }\n\
    }\n\nvar oldAge = -9\n\ndo {\n    try checkAge (oldAge)\n} catch ageError.negativeAge\
    \ {\n    print (\"An age can’t be a negative number\")\n} catch ageError.unrealAge\
    \ {\n    print (\"An age can’t be greater than 140\")\n} catch ageError.underAge\
    \ {\n    print (\"Sorry, you have to be 21 or older\")\n}\n\nprint (oldAge)\n\
    ```\n\nNotice how a negative number gets identified and handled with a simple\
    \ message as shown in Figure 21-8.\n\n![A978-1-4842-1233-2_21_Fig8_HTML.jpg](A978-1-4842-1233-2_21_Fig8_HTML.jpg)\n\
    \n**Figure 21-8.** Error handling involves an enum, a function with guard statements,\
    \ and a do-try-catch statement\n\nChange the value of the `oldAge` variable to\
    \ 250 to see how the `do-try-catch` statement catches that number as higher than\
    \ 140, which makes it unrealistic. Change the value of the `oldAge` variable to\
    \ 15 to see how the `do-try-catch` statement identifies an age under 21.\n\nTo\
    \ use error handling in your programs, you must first identify possible problems,\
    \ then you need to decide how to handle these problems. Error handling can only\
    \ identify errors you already know about, but it can make your programs less fragile\
    \ when confronted with common types of problems your program may face.\n\n## Summary\n\
    \nNo matter how talented, skilled, or educated you may be as a programmer, you\
    \ will make mistakes occasionally. Sometimes those mistakes will be simple errors\
    \ you can easily correct, but sometimes you’ll make mistakes that cause a variety\
    \ of subtle problems that will challenge and frustrate you to find and fix. That’s\
    \ just the nature of programming.\n\nHowever, any problems you accidentally create\
    \ are also problems you can learn to discover and fix. Once you learn how one\
    \ mistake works, you’ll likely remember how to fix those types of mistakes in\
    \ the future if you or someone else makes them again. That frees you up to make\
    \ new mistakes you’ll likely never have experience facing again.\n\nThe best way\
    \ to reduce errors in your program is to examine your code carefully and assume\
    \ nothing will go right. Then look for every possible way to make sure it can’t\
    \ go wrong. The more you code with a defensive mindset, the more likely you’ll\
    \ prevent problems before they occur.\n\nProgramming is more of an art than a\
    \ science, so learn the best ways that work for you to reduce introducing errors\
    \ in your programs. When experimenting with new code, it’s usually safer to test\
    \ it out in a Swift playground or in a simple program separate from your real\
    \ program.\n\nThat way you can isolate and test your code safely. When it works,\
    \ then you can copy and paste it into your program.\n\nErrors are a way of life\
    \ in the world of programming. Ideally you want to spend more time writing code\
    \ and less time debugging it.\n\n# Simplifying User Interface Design\n\nDesigning\
    \ a user interface can be challenging. Not only do you need to design a user interface\
    \ that’s easy to use, but you also need to design an adaptive user interface that\
    \ can respond to any changes the user might make to a window’s size. If the user\
    \ shrinks a window, your user interface must shrink accordingly without cutting\
    \ any items off. If the user enlarges a window, your user interface must expand\
    \ accordingly to maintain a consistent appearance.\n\nTo help create adaptive\
    \ user interfaces, Xcode provides constraints that fix the edges of various user\
    \ interface items to a window’s edge or the edge of other user interface items.\
    \ In this chapter, you’ll learn more about constraints and storyboards to help\
    \ make user interface design easier than ever before."
