- fmt: "### Swift 中的结构体、数组与字典操作\n\n在 `AppDelegate.swift` 文件的 `IBOutlet` 列表下方，输入以下代码来创建一个可以存储三个字符串（姓名、地址和电话号码）的结构体、一个表示该结构体的变量以及一个结构体数组：\n\
    \n```swift\nstruct person {\n    var name = \"\"\n    var address = \"\"\n   \
    \ var phone = \"\"\n}\nvar employee = person()\nvar arrayOfStructures = [person]()\n\
    ```\n\n修改 `addData` IBAction 方法，使其从姓名、地址和电话文本字段中获取值，并将它们存储到 `employee` 结构体中。然后将该结构体存储到数组中，在“总人数”文本字段中显示数组中的项目总数，并清空姓名、地址和电话文本字段：\n\
    \n```swift\n@IBAction func addData(sender: NSButton) {\n    employee.name = nameField.stringValue\n\
    \    employee.address = addressField.stringValue\n    employee.phone = phoneField.stringValue\n\
    \    arrayOfStructures.append(employee)\n    totalField.integerValue = arrayOfStructures.count\n\
    \    nameField.stringValue = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue\
    \ = \"\"\n}\n```\n\n修改 `viewData` IBAction 方法，使其从键文本字段中获取值，并从字典中删除关联的值，如下所示：\n\
    \n```swift\n@IBAction func viewData(sender: NSButton) {\n    var myAlert = NSAlert()\n\
    \    if arrayOfStructures.isEmpty {\n        myAlert.messageText = \"Array is\
    \ empty\"\n        myAlert.runModal()\n    } else {\n        var personData =\
    \ person()\n        personData = (arrayOfStructures.removeLast())\n        totalField.integerValue\
    \ = arrayOfStructures.count\n        myAlert.messageText = personData.name + \"\
    \\r\\n\" + personData.address + \"\\r\\n\" + personData.phone\n        myAlert.runModal()\n\
    \    }\n}\n```\n\n`viewData` IBAction 方法中的代码创建了一个警报对话框。然后检查数组是否为空。如果为空，则在警报对话框中显示“Array\
    \ is empty”。\n\n如果数组不为空，则移除数组中最后一个结构体，在“总人数”文本字段中显示新的数组项目总数，并在警报对话框中显示被移除的结构体数据。\n\
    \n`AppDelegate.swift` 文件的完整内容应如下所示：\n\n```swift\nimport Cocoa\n\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var\
    \ window: NSWindow!\n    @IBOutlet weak var nameField: NSTextField!\n    @IBOutlet\
    \ weak var addressField: NSTextField!\n    @IBOutlet weak var phoneField: NSTextField!\n\
    \    @IBOutlet weak var totalField: NSTextField!\n\n    struct person {\n    \
    \    var name = \"\"\n        var address = \"\"\n        var phone = \"\"\n \
    \   }\n\n    var employee = person()\n    var arrayOfStructures = [person]()\n\
    \n    func applicationDidFinishLaunching(aNotification: NSNotification) {\n  \
    \      // Insert code here to initialize your application\n    }\n\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n        // Insert code here to tear down your application\n\
    \    }\n\n    @IBAction func viewData(sender: NSButton) {\n        var myAlert\
    \ = NSAlert()\n        if arrayOfStructures.isEmpty {\n            myAlert.messageText\
    \ = \"Array is empty\"\n            myAlert.runModal()\n        } else {\n   \
    \         var personData = person()\n            personData = (arrayOfStructures.removeLast())\n\
    \            totalField.integerValue = arrayOfStructures.count\n            myAlert.messageText\
    \ = personData.name + \"\\r\\n\" + personData.address + \"\\r\\n\" + personData.phone\n\
    \            myAlert.runModal()\n        }\n    }\n\n    @IBAction func addData(sender:\
    \ NSButton) {\n        employee.name = nameField.stringValue\n        employee.address\
    \ = addressField.stringValue\n        employee.phone = phoneField.stringValue\n\
    \        arrayOfStructures.append(employee)\n        totalField.integerValue =\
    \ arrayOfStructures.count\n        nameField.stringValue = \"\"\n        addressField.stringValue\
    \ = \"\"\n        phoneField.stringValue = \"\"\n    }\n}\n```\n\n要了解此程序的工作原理，请按照以下步骤操作：\n\
    \n1. 选择 **Product** ➤ **Run**。Xcode 运行您的 `DictionaryProgram` 项目。\n2. 点击“姓名”文本字段并输入\
    \ `Bob`。\n3. 点击“地址”文本字段并输入 `123 Main`。\n4. 点击“电话”文本字段并输入 `555-1234`。\n5. 点击“添加”按钮。程序在“总人数”文本字段中显示数组中的项目数\
    \ (1)。\n6. 重复步骤 2-5，但输入姓名 `Jane`、地址 `90 Oak Lane` 和电话号码 `555-9874`。 “总人数”文本字段中显示数字\
    \ 2。\n7. 点击“查看”按钮。出现一个警报对话框，显示 `Jane`、`90 Oak Lane` 和 `555-9874`，如图 10-7 所示。\n\
    \n![A978-1-4842-1233-2_10_Fig7_HTML.jpg](A978-1-4842-1233-2_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.** 显示添加到数组中的最后一个结构体的警报对话框\n\n8. 点击“确定”关闭警报对话框。\n9. 选择 **StructureProgram**\
    \ ➤ **Quit StructureProgram**。\n\n## 总结\n\n元组是一种在单个变量中存储不同数据类型的方式。与数组和字典类似，集合可以存储相同数据类型的列表。数组最适合存储有序信息，字典最适合快速检索数据，而集合最适合检查项目是否属于集合，以及便于操作两个或多个集合。\n\
    \n如果需要存储大量相关数据，可以使用元组，但元组在处理大量数据时会变得笨拙。另一种选择是创建结构体，它允许您定义要存储的不同数据类型。除了基本数据类型（`Int`、`String`、`Float`\
    \ 和 `Double`）之外，结构体还可以包含其他数据结构，例如数组、字典或集合。为了获得更大的灵活性，您甚至可以将结构体放入数组、字典或集合中。\n\n\
    在您创建的示例 OS X 程序中，您学习了如何创建结构体并将其数据存储在数组中。到现在为止，您应该已经熟悉了如何使用 `IBOutlet` 从用户界面显示或检索数据，以及如何创建\
    \ `IBAction` 方法使程序实际运行。\n\n通过元组、集合、结构体以及数组和字典，您可以以多种方式组合数据结构，从而以最灵活的方式存储数据，满足特定需求。"
