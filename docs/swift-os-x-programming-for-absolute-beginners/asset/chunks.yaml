- fmt: "### Modifying Text on a Button\n\nFor those buttons that display text, Xcode\
    \ gives you two ways to modify a button’s text:\n\n- Double-click directly on\
    \ the button’s text and edit the text.\n- Click on a button to select it, choose\
    \ View ➤ Utilities ➤ Show Attributes Inspector, and edit the Title property as\
    \ shown in Figure 15-2.\n\n![A978-1-4842-1233-2_15_Fig2_HTML.jpg](A978-1-4842-1233-2_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2.** The Show Attributes Inspector pane lets you edit the title\
    \ of a button.\n\nTo modify text on a button, you can open the Show Attributes\
    \ Inspector pane and edit the Title property, or you can directly modify the title\
    \ property in Swift code. To do this, you must first create an `IBOutlet` that\
    \ represents your user interface button. Then modify the Title property in Swift\
    \ using code like this:\n\n```\n@IBOutlet weak var myButton: NSButton!\nmyButton.Title\
    \ = \"New Text\"\n```\n\nUnderneath the Title property is an Alternate property,\
    \ which you can also adjust using Swift code by storing text in a button’s `alternateTitle`\
    \ property. The Alternate Title text only appears if a button’s Type property\
    \ is set to Toggle or Switch as shown in Figure 15-3.\n\n![A978-1-4842-1233-2_15_Fig3_HTML.jpg](A978-1-4842-1233-2_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3.** Changing the Type property of a button.\n\nWhen a button’s\
    \ Alternate Title text is non-empty and the button’s Type property is Toggle or\
    \ Switch, clicking on a Toggle or Switch button alternates between showing the\
    \ Title text and the Alternate Title text. To see how the Title and Alternate\
    \ Title properties of a button work, follow these steps:\n\n1. Click on the Push\
    \ Button and choose View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes\
    \ Inspector pane appears in the upper right corner of the Xcode window.\n2. Click\
    \ on the Type pop-up menu and choose Toggle.\n3. Click in the Title text field\
    \ and type \"Change Me\".\n4. Click in the Alternate text field and type \"Alternate\
    \ Text\".\n5. Choose Product ➤ Run. Your user interface appears.\n6. Click on\
    \ the Change Me button. Notice that the text on the button now displays \"Alternate\
    \ Text\".\n7. Click on the same button again. Notice that the text alternates\
    \ between \"Change Me\" and \"Alternate Text\".\n8. Choose ButtonProgram ➤ Quit\
    \ ButtonProgram.\n9. From within Xcode choose File ➤ New ➤ Project.\n10. Click\
    \ Application under the OS X category.\n11. Click Cocoa Application and click\
    \ the Next button. Xcode now asks for a product name.\n12. Click in the Product\
    \ Name text field and type `ButtonProgram`.\n13. Make sure the Language pop-up\
    \ menu displays Swift and that no check boxes are selected.\n14. Click the Next\
    \ button. Xcode asks where you want to store the project.\n15. Choose a folder\
    \ to store your project and click the Create button.\n16. Click the `MainMenu.xib`\
    \ file in the Project Navigator. Your program’s user interface appears.\n17. Click\
    \ the ButtonProgram icon to display the window of your program’s user interface.\n\
    18. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears\
    \ in the bottom right corner of the Xcode window.\n19. Drag a Push Button and\
    \ a Text Field onto the user interface window and resize both items so it looks\
    \ like Figure 15-4.\n\n![A978-1-4842-1233-2_15_Fig4_HTML.jpg](A978-1-4842-1233-2_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4.** The user interface of the ButtonProgram.\n\nNow let’s see how\
    \ to modify the Title of a button by taking text from the text field and storing\
    \ it in the Title property of the button by following these steps:\n\n1. Click\
    \ on the `MainMenu.xib` file in the Project Navigator Pane.\n2. Click on the button\
    \ ButtonProgram to make sure the user interface window appears to display the\
    \ push button and text field.\n3. Choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor. The `AppDelegate.swift` file appears next to the `MainMenu.xib` file.\n\
    4. Move the mouse pointer over the push button, hold down the Control key, and\
    \ drag the mouse underneath the `@IBOutlet` line in the `AppDelegate.swift` file.\n\
    5. Release the Control key and the mouse. A pop-up menu appears.\n6. Click in\
    \ the Name text field and type `myButton`.\n7. Move the mouse pointer over the\
    \ text field, hold down the Control key, and drag the mouse underneath the `@IBOutlet`\
    \ line in the `AppDelegate.swift` file.\n8. Release the Control key and the mouse.\
    \ A pop-up menu appears.\n9. Click in the Name text field and type `changeText`.\
    \ You should now have created two IBOutlets that look like this:\n\n```\n@IBOutlet\
    \ weak var myButton: NSButton!\n@IBOutlet weak var changeText: NSTextField!\n\
    ```\n\n10. Move the mouse pointer over the push button, hold down the Control\
    \ key, and drag the mouse above the last curly bracket in the bottom of the `AppDelegate.swift`\
    \ file.\n11. Release the Control key and the mouse. A pop-up menu appears.\n12.\
    \ Click in the Connection pop-up menu and choose Action.\n13. Click in the Name\
    \ text field and type `changeTitle`.\n14. Click in the Type pop-up menu and choose\
    \ `NSButton`, then click the Connect button. Xcode creates an empty IBAction method.\n\
    15. Modify this IBAction method as follows:\n\n```\n@IBAction func changeTitle(sender:\
    \ NSButton) {\n    myButton.title = changeText.stringValue\n}\n```\n\nThis Swift\
    \ code retrieves the text in the text field (the `IBOutlet changeText`) and stores\
    \ it in the Title property of the button (the `IBOutlet myButton`).\n\n16. Choose\
    \ Product ➤ Run. Your user interface appears.\n17. Click in the text field and\
    \ type \"Hello there!\"\n18. Click on the Change Me button. The Alternate Text\
    \ appears on the button.\n19. Click the button again. The text from the text field\
    \ now appears.\n20. Choose ButtonProgram ➤ Quit ButtonProgram."
  raw: '## Modifying Text on a Button


    For those buttons that display text, Xcode gives you two ways to modify a button’s
    text:


    *   Double-click directly on the button’s text and edit the text.

    *   Click on a button to select it, choose View ➤ Utilities ➤ Show Attributes
    Inspector, and edit the Title property as shown in Figure [15-2](#A978-1-4842-1233-2_15_Chapter.html#Fig2).


    ![A978-1-4842-1233-2_15_Fig2_HTML.jpg](A978-1-4842-1233-2_15_Fig2_HTML.jpg)


    Figure 15-2.


    The Show Attributes Inspector pane lets you edit the title of a button


    To modify text on a button, you can open the Show Attributes Inspector pane and
    edit the Title property, or you can directly modify the title property in Swift
    code. To do this, you must first create an IBOutlet that represents your user
    interface button. Then modify the Title property in Swift using code like this:


    `@IBOutlet weak var myButton: NSButton!`


    `myButton.Title = "New Text"`


    Underneath the Title property is an Alternate property, which you can also adjust
    using Swift code by storing text in a button’s alternateTitle property. The Alternate
    Title text only appears if a button’s Type property is set to Toggle or Switch
    as shown in Figure [15-3](#A978-1-4842-1233-2_15_Chapter.html#Fig3).


    ![A978-1-4842-1233-2_15_Fig3_HTML.jpg](A978-1-4842-1233-2_15_Fig3_HTML.jpg)


    Figure 15-3.


    Changing the Type property of a button


    When a button’s Alternate Title text is non-empty and the button’s Type property
    is Toggle or Switch, clicking on a Toggle or Switch button alternates between
    showing the Title text and the Alternate Title text. To see how the Title and
    Alternate Title properties of a button work, follow these steps:


    Click on the Push Button and choose View ➤ Utilities ➤ Show Attributes Inspector.
    The Show Attributes Inspector pane appears in the upper right corner of the Xcode
    window.   Click on the Type pop-up menu and choose Toggle.   Click in the Title
    text field and type Change Me.   Click in the Alternate text field and type Alternate
    Text.   Choose Product ➤ Run. Your user interface appears.   Click on the Change
    Me button. Notice that the text on the button now displays Alternate Text.   Click
    on the same button again. Notice that the text alternates between Change Me and
    Alternate Text.   Choose ButtonProgram ➤ Quit ButtonProgram.   From within Xcode
    choose File ➤ New ➤ Project.   Click Application under the OS X category.   Click
    Cocoa Application and click the Next button. Xcode now asks for a product name.
      Click in the Product Name text field and type ButtonProgram.   Make sure the
    Language pop-up menu displays Swift and that no check boxes are selected.   Click
    the Next button. Xcode asks where you want to store the project.   Choose a folder
    to store your project and click the Create button.   Click the MainMenu.xib file
    in the Project Navigator. Your program’s user interface appears.   Click the ButtonProgram
    icon to display the window of your program’s user interface.   Choose View ➤ Utilities
    ➤ Show Object Library. The Object Library appears in the bottom right corner of
    the Xcode window.   Drag a Push Button and a Text Field on to the user interface
    window and resize both items so it looks like Figure [15-4](#A978-1-4842-1233-2_15_Chapter.html#Fig4).


    ![A978-1-4842-1233-2_15_Fig4_HTML.jpg](A978-1-4842-1233-2_15_Fig4_HTML.jpg)


    Figure 15-4.


    The user interface of the ButtonProgram


    Now let’s see how to modify the Title of a button by taking text from the text
    field and storing it in the Title property of the button by following these steps:


    Click on the MainMenu.xib file in the Project Navigator Pane.   Click on the button
    ButtonProgram to make sure the user interface window appears to display the push
    button and text field.   Choose View ➤ Assistant Editor ➤ Show Assistant Editor.
    The AppDelegate.swift file appears next to the MainMenu.xib file.   Move the mouse
    pointer over the push button, hold down the Control key, and drag the mouse underneath
    the @IBOutlet line in the AppDelegate.swift file.   Release the Control key and
    the mouse. A pop-up menu appears.   Click in the Name text field and type myButton.
      Move the mouse pointer over the text field, hold down the Control key, and drag
    the mouse underneath the @IBOutlet line in the AppDelegate.swift file.   Release
    the Control key and the mouse. A pop-up menu appears.   Click in the Name text
    field and type changeText. You should now have created two IBOutlets that look
    like this:


    `@IBOutlet weak var myButton: NSButton!`


    `@IBOutlet weak var changeText: NSTextField!`


    Move the mouse pointer over the push button, hold down the Control key, and drag
    the mouse above the last curly bracket in the bottom of the AppDelegate.swift
    file.   Release the Control key and the mouse. A pop-up menu appears.   Click
    in the Connection pop-up menu and choose Action.   Click in the Name text field
    and type changeTitle.   Click in the Type pop-up menu and choose NSButton, then
    click the Connect button. Xcode creates an empty IBAction method.   Modify this
    IBAction method as follows:


    `@IBAction func changeTitle(sender: NSButton) {`


    `myButton.title = changeText.stringValue`


    `}`


    This Swift code retrieves the text in the text field (the IBOutlet changeText)
    and stores it in the Title property of the button (the IBOutlet myButton).


    Choose Product ➤ Run. Your user interface appears.   Click in the text field and
    type Hello there!   Click on the Change Me button. The Alternate Text appears
    on the button.   Click the button again. The text from the text field now appears.
      Choose ButtonProgram ➤ Quit ButtonProgram.'
  trans: "\n### 修改按钮上的文本\n\n对于显示文本的按钮，Xcode 提供了两种修改按钮文本的方式：\n\n-   直接双击按钮文本进行编辑。\n\
    -   单击按钮以选中它，选择“视图”➤“实用工具”➤“显示属性检查器”，然后编辑“标题”属性，如图 15-2 所示。\n\n![A978-1-4842-1233-2_15_Fig2_HTML.jpg](img/A978-1-4842-1233-2_15_Fig2_HTML.jpg)\n\
    \n**图 15-2.** “显示属性检查器”面板可让您编辑按钮的标题。\n\n要修改按钮上的文本，您可以打开“显示属性检查器”面板并编辑“标题”属性，或者直接在\
    \ Swift 代码中修改标题属性。为此，您必须首先创建一个代表用户界面按钮的 `IBOutlet`。然后使用如下代码在 Swift 中修改“标题”属性：\n\
    \n```\n@IBOutlet weak var myButton: NSButton!\nmyButton.Title = \"New Text\"\n\
    ```\n\n在“标题”属性下方是“备选”属性，您也可以通过 Swift 代码将文本存储在按钮的 `alternateTitle` 属性中来调整它。只有当按钮的“类型”属性设置为“切换”或“开关”（如图\
    \ 15-3 所示）时，“备选标题”文本才会显示。\n\n![A978-1-4842-1233-2_15_Fig3_HTML.jpg](img/A978-1-4842-1233-2_15_Fig3_HTML.jpg)\n\
    \n**图 15-3.** 更改按钮的“类型”属性。\n\n当按钮的“备选标题”文本非空，且按钮的“类型”属性为“切换”或“开关”时，点击“切换”或“开关”按钮会在显示“标题”文本和“备选标题”文本之间切换。要了解按钮的“标题”和“备选标题”属性如何工作，请按照以下步骤操作：\n\
    \n1.  点击“下压按钮”，然后选择“视图”➤“实用工具”➤“显示属性检查器”。“显示属性检查器”面板出现在 Xcode 窗口的右上角。\n2.  点击“类型”弹出菜单并选择“切换”。\n\
    3.  点击“标题”文本字段并输入\"Change Me\"。\n4.  点击“备选”文本字段并输入\"Alternate Text\"。\n5.  选择“产品”➤“运行”。您的用户界面出现。\n\
    6.  点击“Change Me”按钮。请注意，按钮上的文本现在显示为\"Alternate Text\"。\n7.  再次点击同一个按钮。请注意，文本在\"\
    Change Me\"和\"Alternate Text\"之间切换。\n8.  选择“ButtonProgram”➤“退出 ButtonProgram”。\n\
    9.  在 Xcode 中，选择“文件”➤“新建”➤“项目”。\n10. 点击 OS X 类别下的“应用程序”。\n11. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
    \ 现在会询问产品名称。\n12. 点击“产品名称”文本字段并输入`ButtonProgram`。\n13. 确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。\n\
    14. 点击“下一步”按钮。Xcode 会询问您想要将项目存储在哪里。\n15. 选择一个文件夹来存储您的项目，然后点击“创建”按钮。\n16. 在项目导航器中点击`MainMenu.xib`文件。您的程序用户界面出现。\n\
    17. 点击“ButtonProgram”图标以显示程序用户界面的窗口。\n18. 选择“视图”➤“实用工具”➤“显示对象库”。“对象库”出现在 Xcode\
    \ 窗口的右下角。\n19. 将一个“下压按钮”和一个“文本字段”拖到用户界面窗口上，并调整这两个项目的大小，使其看起来如图 15-4 所示。\n\n![A978-1-4842-1233-2_15_Fig4_HTML.jpg](img/A978-1-4842-1233-2_15_Fig4_HTML.jpg)\n\
    \n**图 15-4.** ButtonProgram 的用户界面。\n\n现在，让我们看看如何通过从文本字段获取文本并将其存储到按钮的“标题”属性中来修改按钮的标题，请按照以下步骤操作：\n\
    \n1.  在项目导航器窗格中点击`MainMenu.xib`文件。\n2.  点击按钮“ButtonProgram”以确保用户界面窗口出现并显示下压按钮和文本字段。\n\
    3.  选择“视图”➤“助理编辑器”➤“显示助理编辑器”。`AppDelegate.swift`文件出现在`MainMenu.xib`文件旁边。\n4. \
    \ 将鼠标指针移到下压按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n5.\
    \  松开 Control 键和鼠标。出现一个弹出菜单。\n6.  点击“名称”文本字段并输入`myButton`。\n7.  将鼠标指针移到文本字段上，按住\
    \ Control 键，然后将鼠标拖到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n8.  松开 Control 键和鼠标。出现一个弹出菜单。\n\
    9.  点击“名称”文本字段并输入`changeText`。现在您应该已经创建了两个 IBOutlet，如下所示：\n\n```\n@IBOutlet weak\
    \ var myButton: NSButton!\n@IBOutlet weak var changeText: NSTextField!\n```\n\n\
    10. 将鼠标指针移到下压按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个大括号的上方。\n11. 松开\
    \ Control 键和鼠标。出现一个弹出菜单。\n12. 点击“连接”弹出菜单并选择“动作”。\n13. 点击“名称”文本字段并输入`changeTitle`。\n\
    14. 点击“类型”弹出菜单并选择`NSButton`，然后点击“连接”按钮。Xcode 会创建一个空的 IBAction 方法。\n15. 按如下方式修改此\
    \ IBAction 方法：\n\n```\n@IBAction func changeTitle(sender: NSButton) {\n    myButton.title\
    \ = changeText.stringValue\n}\n```\n\n这段 Swift 代码会检索文本字段（`IBOutlet changeText`）中的文本，并将其存储到按钮（`IBOutlet\
    \ myButton`）的“标题”属性中。\n\n16. 选择“产品”➤“运行”。您的用户界面出现。\n17. 点击文本字段并输入\"Hello there!\"\
    。\n18. 点击“Change Me”按钮。“备选文本”出现在按钮上。\n19. 再次点击该按钮。文本字段中的文本现在出现。\n20. 选择“ButtonProgram”➤“退出\
    \ ButtonProgram”。\n"
- fmt: '# Adding Images and Sounds to a Button


    Buttons typically display text that lists the command that the button represents.
    However, you can also display images on a button. This can be useful to create
    toolbar icons that display a descriptive icon that represents a command (such
    as showing a printer to represent the Print command). Images can appear on a button
    by themselves or with descriptive text.


    Besides displaying images, buttons can also play sounds to give the user audio
    feedback. While most people might click a button using the mouse (or trackpad),
    some people might prefer using keystroke shortcuts, so you can also assign keystrokes
    to run an `IBAction` method linked to a particular button.


    To add images to a button, you just need to modify the `Image` and/or the `Alternate`
    property directly underneath the `Image` property as shown in Figure 15-5.


    ![A978-1-4842-1233-2_15_Fig5_HTML.jpg](A978-1-4842-1233-2_15_Fig5_HTML.jpg)


    **Figure 15-5.** The `Image` and `Alternate` pop-up menus let you choose from
    a list of predefined images


    You can also define an image to display on a button using the `image` and `alternateImage`
    properties of an `NSButton`. When defining an image to appear on a button, you
    can also choose the position of that image relative to any text that also appears
    on that image.


    The `Position` property defines how an image appears with text where text is represented
    by a horizontal line and the image is represented by a square as shown in Figure
    15-6.


    ![A978-1-4842-1233-2_15_Fig6_HTML.jpg](A978-1-4842-1233-2_15_Fig6_HTML.jpg)


    **Figure 15-6.** The `Position` property lets you align text and images on a button


    The seven different positions from left to right are:


    - Text only

    - Image only

    - Image on the left and text on the right

    - Text on the left and image on the right

    - Text overlapping the middle of the image

    - Text underneath the image

    - Text above the image


    To define a sound to play when the user clicks on a button, you can modify the
    `Sound` property as shown in Figure 15-7. (You may need to adjust the volume of
    your computer to hear the sound played when you click on a button.)


    ![A978-1-4842-1233-2_15_Fig7_HTML.jpg](A978-1-4842-1233-2_15_Fig7_HTML.jpg)


    **Figure 15-7.** The `Sound` property lets you choose a sound to play


    To see how to add images and a sound to a button, follow these steps:


    1. Click in the `MainMenu.xib` file in the Project Navigator pane.

    2. Click on the push button on your user interface to select it.

    3. Choose View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes Inspector
    pane appears in the upper right corner of the Xcode window.

    4. Click in the `Image` pop-up menu and choose `NSCaution`.

    5. Click in the `Alternate` pop-up menu and choose `NSComputer` (see Figure 15-5).

    6. Click in the `Position` property to choose the icon (third from the left) that
    displays the image on the left and the text on the right (see Figure 15-6).

    7. Click in the `Sound` pop-up menu and choose a sound such as `Frog`.

    8. Choose Product ➤ Run. Your program appears. Notice that the caution icon appears
    on the button.

    9. Click in the text field and type `Hello there!`

    10. Click the button. The text on the button displays the alternate text and plays
    your chosen sound. Each time you click on the button, it alternates between showing
    the `Title` and `Image` properties and the `Alternate` (Text and Image) properties.

    11. Choose ButtonProgram ➤ Quit ButtonProgram.


    # Connecting Multiple User Interface Items to IBAction Methods


    Typically you link one `IBAction` method to one user interface item such as a
    button. However, it’s possible to connect multiple items to a single `IBAction`
    method. When doing this, the `IBAction` method needs to know what user interface
    item called the `IBAction` method to run.


    To identify a particular user interface item, you need to change the `Tag` property
    of each item linked to the same `IBAction` method. The `Tag` property can hold
    an integer value so you can use distinct `Tag` values to identify different user
    interface items.


    Once you’ve given each user interface item a distinct `Tag` value, you can create
    an `IBAction` method normally using the Control-drag method from one user interface
    item into your Swift file. Then you use the same Control-drag method to connect
    the remaining user interface items to that existing `IBAction` method.


    There’s no limit to the number of items you can link to the same `IBAction` method
    just as long as you use the `Tag` property to identify which user interface item
    called the `IBAction` method.


    To see how to connect multiple items to a single `IBAction` method, follow these
    steps:


    1. From within Xcode choose File ➤ New ➤ Project.

    2. Click Application under the OS X category.

    3. Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    4. Click in the Product Name text field and type `MultipleProgram`.

    5. Make sure the Language pop-up menu displays Swift and that all check boxes
    are clear and not selected.

    6. Click the Next button. Xcode asks where you want to store the project.

    7. Choose a folder to store your project and click the Create button.

    8. Click on the `MainMenu.xib` file in the Project Navigator Pane.

    9. Click on the `MultipleProgram` icon to make the window of the user interface
    appear.

    10. Drag a Push Button, Recessed Button, Inline Button, and Label on to the user
    interface and resize with width of the label as shown in Figure 15-8.


    ![A978-1-4842-1233-2_15_Fig8_HTML.jpg](A978-1-4842-1233-2_15_Fig8_HTML.jpg)


    **Figure 15-8.** The user interface of the `MultipleProgram`


    At this point you have three different types of buttons on the window and a label.
    We’ll create a single `IBAction` method that all three buttons can run. When you
    click on a button, the label will display the button title to show you which button
    you just clicked on.


    First, we’ll need to modify the `Tag` property of each button. The top button
    will have a `Tag` value of 0, the middle button will have a `Tag` value of 1,
    and the lowest button will have a `Tag` value of 2.


    Then we’ll create an `IBAction` method that identifies the `Tag` property and
    displays the button’s title in the label. To do this, follow these steps:


    1. Click on the `MainMenu.xib` file in the Project Navigator pane.

    2. Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the
    `AppDelegate.swift` file next to the user interface.

    3. Move the mouse pointer over the Label, hold down the Control key, and drag
    the mouse under the `IBOutlet` line in the `AppDelegate.swift` file.

    4. Release the Control key and the mouse button. A pop-up window appears.

    5. Click in the Name text field, type `displayLabel`, and click the Connect button.
    You should have an `IBOutlet` as follows:


    ```

    @IBOutlet weak var displayLabel: NSTextField!

    ```'
