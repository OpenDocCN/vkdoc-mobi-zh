    # 24. 编程前后的规划


    在你投入数天、数周、数月甚至数年的时间开发一个程序之前，首先要确保这个世界确实需要你的程序。如果你是为自己编写程序，那大可不必理会外界的看法。然而，如果你打算将程序出售给他人，那么在开始之前，就要确保你的程序有未来。


    判断你的程序是否有市场，其中一种方法是寻找竞争对手。大多数人认为瞄准一个没有竞争的市场更好，但如果没有竞争，这很可能是一个强烈信号——这个市场也不存在。


    相反，如果你发现某个市场充斥着大量竞争对手，这意味着这类程序有着活跃的市场。只要快速搜索一下彩票选号软件或占星程序，你就会发现大量的竞争者。竞争越激烈，市场就越活跃。


    如果一个市场仅由一两家大公司主导，那么该市场的机会很可能已经过去了。例如，尽管有 OS X 和 Linux 操作系统，但 Windows 仍然是个人电脑的主宰操作系统。这意味着你试图编写一个与之抗衡的操作系统，多半是在浪费时间。


    同样地，当今市场上主流文字处理器、电子表格和演示文稿软件屈指可数，这意味着试图开发另一款通用的文字处理器、电子表格或演示文稿软件，很可能徒劳无功。


    竞争激烈意味着市场活跃。竞争极少或没有竞争，则意味着该市场可能已有一个领导者，你的程序很可能永远无法推翻它。试图说服人们放弃 `Microsoft Word`
    或 `Pages` 来购买你的文字处理器，很可能是浪费时间。


    不过，可以寻找利基市场。例如，文字处理器市场可能已被 `Microsoft Word` 主导，但专业化的文字处理器仍有需求。虽然 `Microsoft Word`
    可以用来写剧本和小说，但它并非为此优化。正因如此，其他公司才能成功销售专门用于剧本写作或小说写作的文字处理器，这些工具能帮助你组织思路。


    这类细分市场对于大公司来说太小，不值得担忧，这意味着你永远不必直接与这些大公司竞争。除了瞄准大公司忽视的利基市场外，第二种方法是找出大公司软件中缺少的功能，然后编写一个满足这一缺失需求的程序。


    例如，`Microsoft Office` 提供了密码保护功能来锁定文件。然而，微软的加密功能很弱，很容易被破解。因此，存在一个对软件的市场需求，这类软件能提供比
    `Microsoft Office` 好得多的文件加密功能，同时又提供与 `Microsoft Office` 类似的用户界面。


    最重要的是，编写程序应该是因为你对这个特定领域感兴趣，而不是因为你认为它能让你赚大钱。销售房地产管理软件或无人机控制软件可能有利可图，但除非你对这些领域感兴趣，否则你很可能缺乏热情和长期兴趣，无法投入开发并推广面向这些用户所需的大量时间。


    一般情况下，要避免直接与大公司竞争。即使是苹果公司，也无法在个人电脑操作系统市场上与 `Microsoft Windows` 抗衡，而像 `Linux` 这样的免费产品也未能对
    `Windows` 取得太大成功。


    与其直接与大公司竞争，不如寻找那些大公司因为规模太小而不愿涉足的利基市场，或者寻找补充大公司现有程序的方式。最重要的是，在你充满热情致力于解决的领域里发现问题，这能给你动力去创造最优秀的程序。


    ## 明确程序的目的


    当程序员刚开始有一个想法时，他们的自然倾向是冲向电脑，开始编写代码。然而，这就像你住在洛杉矶，突然想去纽约，然后跳上车就直接开过去。你最终或许能到达那里，但如果没有计划，你很可能因为没有规划好路线或没有带上能让旅途更愉快的东西而浪费时间。


    正如你在匆忙前往另一个城市之前，应该花时间提前规划一样，在开发一个新程序时，你也应该花时间提前规划。如果你在灵感迸发下匆忙开始编写 Swift 代码，很可能在程序完成之前很久，你的精力和想法就已用尽。这很可能导致一个半成品、设计糟糕的程序，为了让它能工作，需要大量修改或者彻底丢弃。


    编写代码实际上是创建任何程序中最直接的部分。编程最困难的部分可能是决定程序完成后你希望得到什么。


    例如，如果你正在学习和试验 Swift，你可能创建程序只是为了了解某个特定功能，比如如何从股票市场网站检索数据，或者如何为游戏创建动画。在这种情况下，你的目标只是创建一些短小的、一次性使用的程序，让你理解如何使用特定的编程功能。


    如果你打算为他人创建程序，那么你需要做一些额外的规划。首先，你为什么想为别人创建程序？也许你想为某个特定的人创建一个定制程序。也许你想创建一个具备当前程序所缺少功能的程序。无论出于什么原因，每个程序最终都必须满足用户的需求。


    如果你创建程序是为了自己使用，那么你就是用户。但如果你是为他人创建程序，那么用户可能是特定的某个人和某台电脑（比如你所在牙科诊所的一位牙医），或者是一个通用的用户群体（任何需要管理牙科诊所的牙医）。无论用户是谁，都要确定你的程序必须为用户解决的最重要的一个任务。然后确保你的程序能正确完成这一关键任务。


    > **注意**

    > 2000 年至 2005 年间，美国联邦调查局花费了 1.7 亿美元创建了一个名为 `Virtual Case File` 的程序。由于该程序应该做什么以及如何工作的规格不断变更，政府最终放弃了整个项目。如果你不知道程序应该做什么，你就不会知道它应该如何实现那个结果。


    在编写任何程序之前，请明确以下内容：


    - 谁是这个程序的用户？

    - 这个程序应该为用户做什么？

    - 这个程序将如何为用户实现那个结果？


    你的程序的用户完全决定了程序用户界面的设计。比较一下 777 喷气式客机的驾驶舱和普通汽车的仪表盘。对普通人来说，777 的驾驶舱可能看起来令人生畏，但对经验丰富的飞行员来说，一切都在触手可及且易于理解的范围内。如果你的程序面向专业人士，你的用户界面可以依赖用户的知识来操作。如果你的程序面向普通大众，你的用户界面可能需要更频繁地引导用户。


    每个程序都必须为用户创造有用的结果。文字处理器将文本组织成排版整齐的页面，电子表格自动且准确地计算数学公式，即使是游戏也提供了娱乐。想象你的程序赋予用户一种通过其他方式无法获得的神奇能力。你的程序将赋予用户什么神奇能力呢？

    '
- fmt: 'Once you know what your program should do for the user, the final step is
    determining how it will achieve that result. Programs typically accept input from
    the user, manipulate that input somehow, and provide a new result. As a programmer,
    you need to determine how to achieve that new result, step by step. Then you need
    to translate those steps into a programming language such as `Swift`.


    Ultimately, programming is a creative talent that requires clear, specific goals
    and methodical persistence to succeed.


    ## Designing the Structure of a Program


    Once you know what your program needs to do and how it can do it, the next step
    is to design how your program will actually work. There’s no single “best” way
    to write a program since you can write the same program a million different ways.
    However, you need to design a program that not only works, but is also easy to
    understand and modify in the future.


    Every program can always be improved. Sometimes that improvement means optimizing
    the program so it runs faster or uses less memory. Other times improvement means
    adding new features to the program. In either case, every program will likely
    go through several modifications during its lifetime, so it’s crucial that you
    design your program from the start so it’s easy to understand and modify.


    In the world of object-oriented programming, the common way to design a program
    is to separate a large program into multiple objects that represent logical features.
    For example, if you were designing a program to control a car, you could divide
    the program into the following objects:


    -   Engine object

    -   Steering object

    -   Stereo object

    -   Transmission object


    Now if you needed to improve the program’s steering ability, you could just replace
    the steering object with a new steering object without the risk that your changes
    would affect the rest of the program.


    How you divide a program into objects is completely arbitrary. You could just
    as well design the same car program into the following objects:


    -   Front object

    -   Back object

    -   Inside object

    -   Undercarriage object


    If you design your program well from the start, you’ll make it easy for you or
    other programmers to modify that program easily in the future.


    ## Designing the User Interface of a Program


    Besides the structure of your program’s design, the other crucial element of your
    program is the user interface. With `Xcode`, you can design the structure of your
    program (its various objects) in complete isolation from the user interface (and
    vice versa). This gives you the freedom to easily design and modify the structure
    of your program or the user interface without affecting the other part of your
    program.


    The user interface defines how your user sees your program. A poor user interface
    makes a program hard to use. A good user interface makes a program easy to use.
    Even if the underlying structure of a program is poor, a good user interface can
    make that program appear responsive, elegant, and well-designed.


    So what is a good user interface? Ideally a user interface dissolves in the background
    to the point where the user isn’t even aware that it exists. When you pinch two
    fingers on the screen of an `iPhone` or `iPad`, you can make an image appear larger
    or smaller.


    From the user’s point of view, the user interface doesn’t even exist because the
    user gets the sensation of directly manipulating an image. In reality, the user
    interface translates the user’s fingertip positions into magnifying an image’s
    appearance. The user interface is still there, but the user doesn’t need to read
    a thick training manual and follow multiple steps to manipulate it. A good user
    interface essentially melts into the background.


    Here’s how a clumsy user interface would accomplish the exact same task. First,
    the user would have to tap a button on the screen to display a menu. Second, the
    user would have to choose a Zoom command from that menu. Third, the user would
    have to type in a number that represents the magnification percentage such as
    50 percent or 125 percent. Fourth, the user would have to tap an OK button to
    finally complete the task and change the magnification of an image.


    Which user interface would you rather use?


    As a general rule, the more steps needed to accomplish a task, the harder the
    user interface will be to use because if the user omits one step or does one step
    out of order, the entire task fails. Oftentimes programmers try to fix poor user
    interface designs by simply adding more ways to accomplish the same task through
    keystroke shortcuts or toolbar icons. Unfortunately if you have a poor user interface,
    adding more ways to accomplish the same task won’t necessarily make your user
    interface easier to use.


    If you have a poor user interface, it may be easier to redesign the whole interface
    rather than try to fix a faulty design.


    ### Design a User Interface with Paper and Pencil


    As a general rule, your first idea for a user interface will rarely be the final
    design. That’s because what you think will work won’t work, and what you may not
    even consider could be vitally important to your users. So rather than design
    your user interface and be forced to change it later, it’s far faster and simpler
    to design your user interface with paper and pencil instead.


    Once you have a rough design on paper, show it to your eventual users to get their
    feedback. Even though looking at static images of crudely drawn user interfaces
    might seem pointless, it can give you feedback on the general design of your user
    interface. When evaluating a preliminary user interface, ask your users:


    -   What’s missing? Are there commands or features that need to be displayed but
    aren’t?

    -   What’s not needed? Are there commands or features that are currently displayed
    but aren’t necessary?

    -   What could be easier? How can the user interface be rearranged or organized
    to make it simpler?

    -   What’s confusing? Is there anything that users don’t understand? Help menus
    and descriptive tool tips can never substitute for cleaner user interface designs.

    -   What’s intuitive? What will users expect to do with your user interface? Does
    your user interface support or frustrate users’ expectations?


    Designing user interfaces on paper is quick, fast, and easy. Since you don’t have
    much time invested in any particular user interface design, it’s much easier to
    throw away bad designs rather than try to defend and justify keeping them.


    In addition, paper designs make it easy for you or others to scribble on them
    to redesign them. Because paper user interface designs are so fast and simple
    for anyone to make, feel free to experiment. The more user interface designs you
    can create, the more likely you’ll stumble across one that will work.


    Study existing programs and see what you like best and what you like least. Then
    put both features (the ones you like and the ones you dislike) into different
    user interface designs. The design you may think is best may be the ones that
    others like the least, and the design you like the least may be the ones others
    find are the best.'
