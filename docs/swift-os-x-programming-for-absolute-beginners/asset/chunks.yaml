- fmt: "# Creating an Action connection\n\nClick in the `Name` text field and type\
    \ `changeCase`. (The name you choose should be descriptive but can be anything\
    \ you want.) Click in the `Type` pop-up menu and choose `NSButton` as shown in\
    \ Figure [3-19](#A978-1-4842-1233-2_3_Chapter.html#Fig19). Then click the `Connect`\
    \ button. Xcode creates an `IBAction` method that looks like this:\n\n![A978-1-4842-1233-2_3_Fig19_HTML.jpg](A978-1-4842-1233-2_3_Fig19_HTML.jpg)\n\
    \n**Figure 3-19.** Choosing a Type for an `IBAction` method\n\n```\n@IBAction\
    \ func changeCase(sender: NSButton) {\n}\n```\n\nAt this point, you’ve created\
    \ an `IBAction` method that runs every time the user clicks the **Change Case**\
    \ button. Of course, there’s no Swift code inside that `IBAction`, so now we need\
    \ to type Swift code inside those curly brackets that define the beginning and\
    \ ending of the `IBAction` method.\n\nMake sure Xcode still displays your user\
    \ interface and `AppDelegate.swift` file side by side. Choose **View ➤ Standard\
    \ Editor ➤ Show Standard Editor**. Xcode now only shows your `MyFirstProgram`\
    \ user interface. Click the `AppDelegate.swift` file in the **Project Navigator**.\
    \ Xcode displays all the Swift code stored in the `AppDelegate.swift` file. Edit\
    \ the `IBAction` `changeCase` method as follows:\n\n```\n@IBAction func changeCase(sender:\
    \ NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercaseString\n\
    }\n```\n\nChoose **Product ➤ Run**. Your `MyFirstProgram` runs. Click in the text\
    \ field of your `MyFirstProgram` user interface and type `hello, world`. Click\
    \ the **Change Case** button. The label displays `HELLO, WORLD` as shown in Figure\
    \ [3-20](#A978-1-4842-1233-2_3_Chapter.html#Fig20).\n\n![A978-1-4842-1233-2_3_Fig20_HTML.jpg](A978-1-4842-1233-2_3_Fig20_HTML.jpg)\n\
    \n**Figure 3-20.** Running the `MyFirstProgram`\n\nChoose **MyFirstProgram ➤ Quit\
    \ MyFirstProgram**. Xcode appears again.\n\nAs you can see, you created a simple\
