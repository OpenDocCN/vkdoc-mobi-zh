    \ a Program\n\nTypically you’ll run your program multiple times to test and make\
    \ sure it works right. When you run a program, Xcode compiles it into a file that\
    \ you can distribute to others if you wish. Running a program lets you test your\
    \ program directly on your Macintosh.\n\nThe three ways to run a program are:\n\
    \n*   Choose Product ➤ Run\n*   Press Command+R\n*   Click the Run icon as shown\
    \ in Figure [2-22](#A978-1-4842-1233-2_2_Chapter.html#Fig22)\n\n    ![A978-1-4842-1233-2_2_Fig22_HTML.jpg](A978-1-4842-1233-2_2_Fig22_HTML.jpg)\n\
    \n    Figure 2-22.\n\n    The Run and Stop icons let you test your OS X project\n\
    \nOnce your program is running, you can stop it in several ways:\n\n*   Choose\
    \ YourProgramName ➤ Quit where “YourProgramName” is the name of your project\n\
    *   Click the icon on the Dock that represents your program and press Command+Q\n\
    *   Click the Stop icon in Xcode as shown in Figure [2-22](#A978-1-4842-1233-2_2_Chapter.html#Fig22)\n\
    \nIf your program has major errors that prevent it from responding to any commands,\
    \ you can also use the Force Quit command to shut down your program. To use Force\
    \ Quit, click the Apple menu and choose Force Quit.\n\nWhen the Force Quit window\
    \ appears, click on your program’s name and then click the Force Quit button to\
    \ shut it down.\n\n## Summary\n\nThis chapter introduced you to the major features\
    \ of Xcode and showed various ways to choose common commands. Don’t worry about\
    \ memorizing or fully understanding everything in this chapter just yet. Think\
    \ of this chapter as an introduction to Xcode that you can refer back to whenever\
    \ you have a question.\n\nIn the next chapter, we’ll actually go through the typical\
    \ process of creating an OS X program using Xcode. That way you can see the purpose\
    \ of Xcode’s various features that you learned about in this chapter.\n\nJust\
    \ remember that with Xcode, there are often two or more ways to choose the exact\
    \ same command, but you don’t have to learn all of these different ways. All you\
    \ have to do is choose the method you like best and ignore the other methods.\n\
    \nAs you can see, Xcode offers everything you need to turn your ideas into a fully\
    \ functional OS X program that you can sell and distribute to others. By learning\
    \ Xcode, you’ll be learning to use the programming tool that professional programmers\
    \ use to create both OS X and iOS software. The more you use Xcode, the more comfortable\
    \ you’ll get and the less intimidating Xcode’s user interface will feel. Pretty\
    \ soon, you’ll be using Xcode like a pro.\n\nRemember, the real key to programming\
    \ isn’t having the best programming tools but knowing how to use them. The more\
    \ you use Xcode, the more you’ll understand how to turn your great ideas into\
    \ actual working programs. Learning Xcode is your path to writing software for\
    \ the Macintosh and Apple’s many other devices such as the iPhone, iPad, and Apple\
    \ Watch. By learning Xcode today, you can take advantage of the many lucrative\
    \ programming opportunities that will be available now and far into the future.\
    \ Welcome to the world of Xcode!\n\n# 3. The Basics of Creating a Mac Program\n\
    \nElectronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1233-2_​3](http://dx.doi.org/10.1007/978-1-4842-1233-2_3))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Whatever type of OS X program you want to create, such as a video game or a custom\
    \ program for lawyers or stock brokers, you’ll always go through the same basic\
    \ steps. First, you need to create an OS X project. This creates a bare-bones\
    \ OS X program that includes a generic user interface.\n\nSecond, you’ll need\
    \ to customize this generic OS X program in two ways: by adding items to the user\
    \ interface and by writing Swift code to make the program actually do something.\n\
    \nThird, you’ll need to run and test your program. After running and testing your\
    \ program, you’ll likely need to constantly go back and modify your user interface\
    \ or Swift code to fix problems and add new features. Eventually your program\
    \ will reach a point where it’s complete (for now) and you can ship it. Then you’ll\
    \ repeat these basic steps all over again to add new features once more.\n\nGenerally\
    \ you’ll spend more time modifying a program than creating new ones. However,\
    \ it’s useful to create small programs to test out different features. Once you\
    \ get these smaller, experimental programs working, you can add them to another\
    \ program. By doing this, you don’t risk messing up a working program."
