    # 摘要


    循环允许你重复执行一行或多行代码，其运行机制是不断执行代码直到布尔值变为 `false`。`while` 循环会先检查一个布尔值，这意味着它可能执行零次或多次。`repeat-while`
    循环则在最后检查布尔值，这意味着它至少会执行一次。


    `for` 循环允许你根据起始值、一个布尔值以及一个递增计数运算符来指定循环的执行次数。`for-in` 循环可以自动统计列表中的项目数量。


    在创建循环时，务必确保循环有结束的方式。如果循环永不结束，就会变成无限循环，这会导致你的程序看起来像死机且无响应。


    每种类型的循环各有优缺点，但你总能通过一种循环来模拟其他循环的功能。如果需要提前退出循环，可以使用 `break` 命令配合 `if` 语句。


    循环让你的程序有能力完成重复性任务，而无需你编写重复的命令。只需确保你的循环最终总会结束，并且在停止前能够运行正确的次数。


    # 9. 数组与字典


    电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​9](http://dx.doi.org/10.1007/978-1-4842-1233-2_9))
    包含补充材料，仅供授权用户使用。


    几乎每个程序都需要接收数据，以便处理数据并计算出有用的结果。临时存储数据的最简单方式是通过可以存储数字或文本字符串的变量。但是，如果你需要存储多个数据块，例如一个姓名列表或一个产品编号列表，该怎么办？你可以像这样创建多个变量：


    `var employee001, employee002, employee003 : String`


    不幸的是，创建独立的变量来存储相关数据可能很笨拙。如果你不知道需要存储多少项数据怎么办？那么你可能会创建太多或不够用的变量。更糟糕的是，将相关数据存储在独立的变量中，很容易忽略数据之间的关联性。


    例如，如果你将三个员工的名字存储在三个不同的变量中，你如何知道是否还有第四个、第五个或第六个变量包含额外的员工姓名？除非你在代码中将变量保持在一起，否则很容易遗漏存储在独立变量中的相关数据。


    这就是为什么 Swift 提供了另外两种存储数据的方式：数组和字典。这两种数据结构背后的核心理念是，创建一个可以容纳多个项目的单个变量。现在，你可以将相关数据存储在一个地方，并轻松地再次查找和检索它。


    数组和字典都旨在存储同一数据类型的多个副本，例如一个姓名列表（`String`）或一个数字列表（`Int`）。如果你想存储一个由不同类型数据（如整数、小数和字符串）组成的列表，你可以将数组或字典声明为持有
    `AnyObject` 数据类型，它可以存储任何类型的数据。


    ## 使用数组


    你可以将数组想象成一个由无数个桶组成的序列，每个桶正好可以容纳一块数据。为了帮助你找到存储在数组中的数据，每个数组元素（桶）都由一个称为索引的数字来标识。数组中的第一项定义在索引
    0 处，第二项定义在索引 1 处，第三项定义在索引 2 处，依此类推，如图 9-1 所示。


    ![A978-1-4842-1233-2_9_Fig1_HTML.gif](img/A978-1-4842-1233-2_9_Fig1_HTML.gif)


    图 9-1. 数组的结构


    要创建一个数组，你必须定义数组的名称以及该数组可以容纳的数据类型。创建数组的一种方法如下：


    `var arrayName = Array<DataType>()`


    数组名称可以是任何你想要的名字，不过最好选择一个描述性的名称来标识数组所保存的数据类型，例如 `employeeArray`。数据类型可以是 `Int`（整数）、`String`（字符串）、`Float`
    或 `Double`（小数），甚至是另一个数据结构的名称。（数组中可以包含其他数组。）


    创建数组的第二种方法如下：


    `var arrayName = [DataType]()`


    这两种方法都会创建一个空数组。此时，你需要开始向该数组中添加项目。如果你想在创建数组的同时用它存储项目，你需要使用 `arrayLiteral` 关键字，例如：


    `var arrayName = Array<Int>(arrayLiteral: 34, 89, 70, 1, -24)`


    或


    `var arrayName = Int`


    这两个命令都创建了一个名为 `arrayName` 且只能保存整数的数组。然后，`arrayLiteral` 关键字后面跟着整数列表，用数据填充数组。因为你必须定义数据类型，所以这两种方法都可以与
    `AnyObject` 一起使用，以便在数组中存储不同类型的数据。


    创建数组的一种更短、更简单的方法是定义一个数组名称，并将其设置为一个包含相同数据类型的项目列表，如下所示：


    `var myArrray = [34, 89, 70, 1, -24]`


    然后 Swift 会根据数据推断数组的数据类型。此方法仅在数组中的所有项目都是同一数据类型（例如全是整数或全是小数）时才有效。


    **注意**


    当你使用 `var` 关键字声明一个数组时，你可以向该数组添加和删除项目。如果你不希望数组被修改，请使用 `let` 关键字声明它，如下所示：`let arrayName
    = [34, 89, 70, 1, -24]`。使用 `let` 关键字声明的数组永远无法修改。


    在之前保存整数的数组示例中，第一个数字 (34) 在索引 0 处，第二个数字 (89) 在索引 1 处，第三个数字 (70) 在索引 2 处，第四个数字 (1)
    在索引 3 处，第五个数字 (-24) 在索引 4 处。因为数组从 0 开始计算索引号，所以 Swift 数组被称为基于零的数组。（某些编程语言从 1 开始计算数组的索引，因此它们被称为基于一的数组。）

