  trans: "\n# 执行转场后移除场景\n\n转场是单向的，从一个场景过渡到第二个场景。当你使用 Modal、Sheet、Popover 或 Custom\
    \ 转场创建第二个场景时，你可以通过编写 **Swift** 代码来关闭这个第二个场景。具体操作是，你需要为该场景创建一个 Swift 控制器文件，然后连接该场景中的一个用户界面元素（例如按钮），定义一个\
    \ `IBAction` 方法，并在该方法中编写关闭场景的 Swift 代码。\n\n如果你使用的是 Show 转场打开场景，用户可以直接点击关闭按钮来关闭场景，这完全不需要你编写任何\
    \ Swift 代码。\n\n若要移除通过 Modal、Sheet、Popover 或 Custom 转场呈现的场景，请遵循以下步骤：\n\n1.  将一个按钮拖拽到第二个场景上，并将其标签修改为\
    \ **Close Scene**。\n2.  选择 View ➤ Assistant Editor ➤ Show Assistant Editor。助理编辑器会显示你刚刚创建的\
    \ `secondView.swift` 文件。\n3.  将鼠标指针移动到第二个场景的按钮上，按住 **Control** 键，然后将鼠标拖拽至 `secondView.swift`\
    \ 文件底部最后一个花括号的上方。此时会弹出一个窗口。\n4.  点击 **Connection** 弹出菜单，并选择 **Action**。\n5.  点击\
    \ **Name** 文本字段，并输入 `closeScene`。\n6.  点击 **Type** 弹出菜单，并选择 `NSButton`。然后点击 **Connect**\
    \ 按钮。Xcode 会显示一个空的 `IBAction` 方法。\n7.  按如下方式修改 `IBAction` 方法：\n8.  选择一个文件夹，然后点击\
    \ **Create** 按钮。Xcode 会在 **Project Navigator** 窗格中显示你的 Swift 类。此时，Swift 类和场景之间尚未建立连接，我们需要通过将场景的视图控制器设置为我们刚刚创建的\
    \ Swift 文件中的一个类来解决这个问题。\n9.  点击 `Main.storyboard` 文件以显示你的用户界面。\n10. 点击有转场指向的那个场景上的蓝色\
    \ **View Controller** 图标。这应该就是你想要关闭的那个场景。\n11. 选择 View ➤ Utilities ➤ Show Identity\
    \ Inspector。\n12. 点击 **Class** 弹出菜单，并选择 `secondView`，即你之前创建的视图控制器，如图 14-21 所示。\n\
    \n![A978-1-4842-1233-2_14_Fig21_HTML.jpg](img/A978-1-4842-1233-2_14_Fig21_HTML.jpg)\n\
    \n**图 14-21.** 将场景连接到 Swift 视图控制器文件\n\n确保你的 `StoryProgram` 项目已在 Xcode 中加载，然后点击\
    \ **Project Navigator** 窗格中的 `Main.storyboard` 文件。\n\n-   在第一个场景上放置一个按钮，并将其标签修改为\
    \ **Open Scene**。\n-   点击转场，选择 View ➤ Utilities ➤ Show Attributes Inspector，并确保\
    \ **Style** 弹出菜单显示为 Modal、Sheet、Popover 或 Custom。\n-   选择 File ➤ New ➤ File。Xcode\
    \ 会显示不同的模板供你选择。\n-   在 **OS X** 下选择 **Source**，然后点击 **Cocoa Class** 图标。接着点击 **Next**\
    \ 按钮。会弹出另一个对话框，要求你输入名称和子类。\n-   点击 **Name** 文本字段，输入一个描述性的名称作为你的类名，用于控制场景。\n- \
    \  点击 **Subclass of:** 弹出菜单，并选择 `NSViewController`。\n-   清除 \"Also create XIB\
    \ file for user interface\" 复选框。\n-   确保 **Language** 弹出菜单显示为 **Swift**，如图 14-20\
    \ 所示。点击 **Next** 按钮。Xcode 会询问你想将新的 Swift 类保存到哪里。\n\n![A978-1-4842-1233-2_14_Fig20_HTML.jpg](img/A978-1-4842-1233-2_14_Fig20_HTML.jpg)\n\
