    \ steps:\n\n* Define descriptive errors that you want to identify\n* Identify\
    \ one or more functions to detect an error and identify the type of error that\
    \ occurred\n* Handle the error\n\n## Defining Errors with `enum` and `ErrorType`\n\
    \nIn the old days, programs often displayed cryptic error messages filled with\
