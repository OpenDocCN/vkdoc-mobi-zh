  \ ➤ **退出 UIProgram**，退出程序。\n\n首先，我们来定义窗口的最小尺寸，步骤如下：\n\n将鼠标指针移到用户界面窗口四周框架的右下角。拖动鼠标，直到出现蓝色参考线，显示按钮与窗口边缘之间的边界，如图\
