  \n**图 3-20.** 运行 `MyFirstProgram`\n\n选择 **MyFirstProgram ➤ Quit MyFirstProgram**。Xcode\
  \ 会再次出现。\n\n如你所见，你只写了很少的 Swift 代码就创建了一个简单的 Macintosh 程序。你实际编写的 Swift 代码只有一行，它获取文本字段中存储的文本，将其转换为大写，然后将这个大写的文本存储在标签中。\n\
  \nSwift 的许多强大之处源于尽可能依赖 Apple 的 Cocoa 框架。这意味着你必须理解面向对象编程，以及类如何定义属性（用于存储数据）和方法（用于操作数据）——并且使用继承——你将在下一章中了解更多。\n\
  \n重点是了解 Xcode 如何创建通用的 OS X 程序，这样你只需要设计和定制用户界面，然后编写 Swift 代码让它全部工作起来。\n\n## 使用文档大纲和连接检查器\n\
  \n在我们结束这个创建第一个 Macintosh 程序的简短介绍之前，让我们看看另外两个在未来使用 Xcode 时非常有用的工具：**文档大纲** 和 **连接检查器**。\n\
  \n**文档大纲** 列出了构成你用户界面的所有项目。要打开或隐藏 **文档大纲**，你可以按照图 3-21 所示进行操作：\n\n![A978-1-4842-1233-2_3_Fig21_HTML.jpg](img/A978-1-4842-1233-2_3_Fig21_HTML.jpg)\n\
  \n**图 3-21.** 文档大纲\n\n*   选择 **Editor ➤ Show/Hide Document Outline**\n*   点击 **Document\
  \ Outline** 图标\n\n文档大纲使得选择用户界面上的不同项目变得容易。在我们的 `MyFirstProgram` 中，只有三个项目（一个标签、一个文本字段和一个按钮），但在更复杂的用户界面中，你可能会有更多项目，这些项目可能隐藏在其它项目后面，或者太小而难以看清。\n\
  \n如果你在文档大纲中点击一个项目，Xcode 会在用户界面中选择该项目（反之亦然），如图 3-22 所示。\n\n![A978-1-4842-1233-2_3_Fig22_HTML.jpg](img/A978-1-4842-1233-2_3_Fig22_HTML.jpg)\n\
  \n**图 3-22.** 在文档大纲窗口中点击一个项目，会在用户界面中选择该项目\n\n将文档大纲视为一种快速查看用户界面的所有部分并只选择你想要的项目的途径。\n\
  \n一旦你开始通过 `IBOutlet` 和 `IBAction` 方法将用户界面项目连接到你的 Swift 代码，你可能想知道哪些项目连接到了哪些 `IBOutlet`\
  \ 和 `IBAction` 方法。要查看 `IBOutlet`/`IBAction` 方法与用户界面项目之间的连接，你有两个选项。\n\n首先，你可以使用 **连接检查器**。其次，你可以使用\
  \ **助理编辑器**。\n\n要打开 **连接检查器**，首先在用户界面上点击任何你想检查的项目，然后执行以下操作之一，以显示出现在 Xcode 窗口右上角的连接检查器，如图\
  \ 3-23 所示：\n\n![A978-1-4842-1233-2_3_Fig23_HTML.jpg](img/A978-1-4842-1233-2_3_Fig23_HTML.jpg)\n\
  \n**图 3-23.** 连接检查器显示当前选中的用户界面项目的所有连接\n\n*   选择 **View ➤ Utilities ➤ Show Connections\
  \ Inspector**\n*   按下 **Option+Command+6**\n*   点击 **Show Connections Inspector**\
  \ 图标\n\n连接检查器会显示持有与所选用户界面项目相连的 `IBOutlet` 或 `IBAction` 方法的 Swift 文件。\n\n> **注意：**\
  \ 如果你仔细观察，连接检查器会在与当前选中的用户界面项目链接的 Swift 文件左侧显示一个 X。如果你点击这个 X，你可以断开用户界面项目与其 `IBOutlet`\
  \ 或 `IBAction` 方法之间的链接。\n\n另一种查看哪些 `IBOutlet` 和 `IBAction` 方法连接到用户界面项目的方法是打开用户界面（例如点击\
  \ `MainMenu.xib` 文件），然后打开 **助理编辑器**。\n\n在你的 Swift 文件中的每个 `IBOutlet` 和 `IBAction`\
  \ 方法左侧，你会看到一个灰色圆圈。当你将鼠标指针移到灰色圆圈上时，Xcode 会高亮显示连接到该 `IBOutlet` 或 `IBAction` 方法的用户界面项目，如图\
  \ 3-24 所示。\n\n![A978-1-4842-1233-2_3_Fig24_HTML.jpg](img/A978-1-4842-1233-2_3_Fig24_HTML.jpg)\n\
  \n**图 3-24.** 助理编辑器让你看到哪些 `IBOutlet` 和 `IBAction` 方法连接到了用户界面项目\n\n## 总结\n\nXcode\
  \ 是你设计、编写和修改自己的 OS X 程序所需的唯一程序。当你想要创建一个 OS X 程序时，你将遵循相同的基本步骤：\n\n*   选择一个要使用的项目模板（通常是\
  \ **Cocoa Application**）\n*   设计和定制用户界面\n*   将用户界面项目连接到 `IBOutlet` 和 `IBAction`\
  \ 方法\n*   编写 Swift 代码以使 `IBAction` 方法执行操作\n*   运行并测试你的程序\n\n要设计你的用户界面，你需要从 **对象库**\
  \ 中拖放项目。然后你需要使用 **属性** 和 **大小检查器** 来定制每个用户界面项目。为了帮助你选择用户界面项目，你可以使用 **文档大纲**。\n\n\
  设计好用户界面后，你需要使用 **助理编辑器**，通过 `IBOutlet`（用于检索或显示数据）和 `IBAction` 方法（使你的用户界面执行操作）将你的用户界面连接到你的\
  \ Swift 代码。\n\n要查看用户界面项目与 Swift 代码之间的连接，你可以使用 **连接检查器** 或 **助理编辑器**。\n\n你已经可以看到\
  \ Xcode 的不同部分如何协同工作来帮助你创建程序，而我们还没有探索许多其它的 Xcode 功能。创建 Macintosh 程序最令人困惑的部分可能在于编写\
  \ Swift 代码和使用构成 Cocoa 框架的类文件中存储的方法，因此下一章将更详细地解释这一点。\n\n如你所见，一旦你只专注于那些你实际需要的功能而忽略其余部分，使用\
  \ Xcode 实际上相当简单。在我们逐章学习的过程中，你会不断学到更多关于 Xcode 和 Swift 编程的知识。\n\n你已经学到了很多关于 Xcode\
  \ 的知识，然而这一切才刚刚开始。\n\n\n\n"
- "# 4. 获取帮助\n\n学习任何新技能的最佳方式是由他人指点迷津。然而，并非总能如此，因此你会很高兴地发现，Xcode 内置了丰富的帮助功能，能让你的 Xcode\
  \ 使用体验更轻松、更愉快。\n\n要使用 Xcode 的帮助功能，首先需要理解 Swift 程序如何运作，以及它们如何与 Cocoa 框架协同工作。一旦你理解了典型的\
  \ OS X 程序是如何工作的，以及它是如何依赖 Cocoa 框架的，你就能更好地理解如何获取所需的帮助，以及如何理解通过 Xcode 找到的帮助信息。\n\n\
  ## 理解 Cocoa 框架\n\n使用 Xcode 时，你必须明白，你创建的每一个程序都基于 Cocoa 框架，该框架使用了包含各种属性和方法的类。通过使用这些现有的类，你无需编写和测试自己的代码，从而节省时间。相反，你可以直接使用\
  \ Cocoa 框架中已经可用的现有代码。这让你能腾出更多时间，专注于编写特定于你个人程序的代码。\n\n要使用 Cocoa 框架，你必须理解面向对象编程的原理以及对象的工作方式。要创建一个对象，你必须先定义一个类。一个类包含了定义属性（用于保存数据）和方法（用于操作其属性中存储的数据）的实际代码。一旦定义了类，你就可以基于该类定义一个或多个对象。\n\
  \n就像饼干模具定义了饼干的形状，但本身并非饼干一样，类定义了对象，但本身并非对象。\n\nCocoa 框架由多个类文件组成，其中许多类文件会从其他类文件继承属性和方法。当你创建一个\
  \ OS X 程序时，通常会基于 Cocoa 框架的类文件创建对象。实际上，你在对象库中创建的每个用户界面项都基于一个 Cocoa 框架类。\n\n要查看每个用户界面项基于哪个类文件，让我们检查一下你创建的三个用户界面项：一个标签、一个文本字段和一个按钮：\n\
  \n- 在 Xcode 中打开 `MyFirstProgram` 项目。\n- 点击 `MainMenu.xib` 文件。Xcode 将显示你的用户界面。\n\
  - 选择 **视图** ➤ **工具** ➤ **显示对象库**。对象库会出现在 Xcode 窗口的右下角。\n- 点击对象库中的**按钮**项。将出现一个弹出窗口，如图\
  \ 4-1 所示。请注意，此弹出窗口会告诉你按钮的类文件（`NSButton`）。\n\n![A978-1-4842-1233-2_4_Fig1_HTML.jpg](img/A978-1-4842-1233-2_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 查找按钮的类文件\n\n- 点击**完成**按钮关闭弹出窗口。\n- 滚动浏览对象库，然后点击**标签**项。将出现一个弹出窗口，如图 4-2\
  \ 所示。请注意，此弹出窗口会告诉你标签的类文件（`NSTextField`）。\n\n![A978-1-4842-1233-2_4_Fig2_HTML.jpg](img/A978-1-4842-1233-2_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 查找标签的类文件\n\n- 滚动浏览对象库，然后点击**文本字段**项。将出现一个弹出窗口，如图 4-3 所示。\n\n![A978-1-4842-1233-2_4_Fig3_HTML.jpg](img/A978-1-4842-1233-2_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 查找文本字段的类文件\n\n通过使用 Xcode 为对象库中每个项提供的简单帮助弹出窗口，我们了解了有关用户界面的以下信息：\n\n- 按钮基于\
  \ `NSButton` 类文件\n- 标签基于 `NSTextField` 类文件\n- 文本字段也基于 `NSTextField` 类文件\n- `NSTextField`\
  \ 类继承自 `NSControl` 类（是 `NSControl` 类的子类）\n\n任何时候你需要查找某个用户界面项的类文件，只需在对象库窗口中点击该项即可。要了解每个用户界面项可用的属性和方法，我们需要查找该特定类的所有属性和方法。例如，如果我们想知道文本字段有哪些可用的属性和方法，就必须查找\
  \ `NSTextField` 类定义的属性和方法。\n\n此外，由于 `NSTextField` 类继承自 `NSControl` 类，我们也可以使用 `NSControl`\
  \ 类定义的任何属性和方法。（如果 `NSControl` 类还继承了另一个类，那么我们也可以使用那个类中存储的属性和方法。）\n\n## 在类文件中查找属性和方法\n\
  \n一旦我们知道某个特定的用户界面项基于哪个类，就可以在 Xcode 的文档中查找其属性和方法列表。有两种方法可以做到这一点：\n\n- 选择 **帮助** ➤\
  \ **文档和 API 参考**\n- Option+点击你的 Swift 代码中的类名\n\n还记得我们需要在标签和文本字段中查找存储文本的属性吗？以下是查找此信息的步骤：\n\
  \n- 确定每个用户界面项基于哪个类文件（`NSTextField`，我们通过在对象库中点击该项得知）\n- 查找 Xcode 关于 `NSTextField`\
  \ 类文件的文档\n- 如果在 `NSTextField` 类文件中找不到所需信息，则查找 `NSControl` 类文件，因为 `NSTextField` 类从\
  \ `NSControl` 类继承了所有属性和方法\n\n\n\n### 通过帮助菜单查找类文件\n\nXcode 的菜单栏和下拉菜单通常是查找任何命令最直接的方式。因此，第一步是打开\
  \ Xcode 的文档窗口，如图 4-4 所示，可以通过以下两种方式之一打开：\n\n![A978-1-4842-1233-2_4_Fig4_HTML.jpg](img/A978-1-4842-1233-2_4_Fig4_HTML.jpg)\n\
  \n图 4-4. Xcode 文档窗口\n\n- 选择“帮助” ➤ “文档和 API 参考”\n- 按下 `Shift+Command+0`（数字零）\n\n\
  **注意：** 为使文档窗口更简洁，请点击“显示/隐藏导航器”图标。\n\n点击文档窗口顶部的“搜索文档”文本字段，输入 `NSTextField`，然后按下\
  \ Return 键。文档窗口会显示关于 `NSTextField` 类的信息。滚动“目录”窗格以查看关于 `NSTextField` 类的信息。如果你在“目录”窗格中点击某个主题，文档窗口会显示更多信息，如图\
  \ 4-5 所示。但是，`NSTextField` 文档中并没有解释它如何存储文本。为了找到答案，我们需要进一步查看 `NSTextField` 的父类，即 `NSControl`。\n\
  \n![A978-1-4842-1233-2_4_Fig5_HTML.jpg](img/A978-1-4842-1233-2_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 在“目录”窗格中选择一项，会在右侧窗格中显示信息\n\n点击“继承自：”标签右侧显示的 `NSControl`。请注意，`NSTextField`\
  \ 继承自 `NSControl`，`NSControl` 继承自 `NSView`，`NSView` 继承自 `NSResponder`，`NSResponder`\
  \ 继承自 `NSObject`。要找到标签或文本字段（两者都基于 `NSTextField` 类）可用的所有属性和方法，我们也需要详尽地搜索这些类文件中的每一个。\n\
  \n点击 `NSControl` 的“目录”窗格中的“获取和设置控件值”，如图 4-6 所示。请注意，`NSControl` 类中用于存储文本数据的属性名为 `stringValue`。\n\
  \n![A978-1-4842-1233-2_4_Fig6_HTML.jpg](img/A978-1-4842-1233-2_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 文档窗口列出了 `NSControl` 中存储数据的所有属性\n\n一旦我们知道可以使用 `stringValue` 属性在 `NSControl`\
  \ 类中保存文本数据，我们也就知道可以在 `NSTextField` 类中使用 `stringValue` 属性来保存文本数据。由于我们的标签和文本字段都基于\
  \ `NSTextField` 类（这是通过在对象库中点击它们发现的），因此我们知道可以使用 `stringValue` 属性来访问标签和文本字段的文本数据。\n\
  \n### 通过快速帮助查找类文件\n\n使用文档窗口查找类文件很方便，但 Xcode 还提供了另一种称为“快速帮助”的方法。要使用“快速帮助”，你需要将光标或鼠标指针移到包含\
  \ Swift 代码文件中的类文件名上，然后选择以下方法之一：\n\n- 选择“帮助” ➤ “选中项的快速帮助”\n- 按下 `Control+Command+Shift+?`\n\
  - 按住 Option 键并点击类文件名\n\n“快速帮助”会显示一个弹出窗口，其中包含所选类文件的简要描述，如果你愿意，还可以选择在文档窗口中查看完整描述。要了解如何使用\
  \ Option 键和鼠标查看“快速帮助”的工作原理，请按照以下步骤操作：\n\n1. 确保 `MyFirstProgram` 已加载到 Xcode 中。\n\
  2. 在项目导航器中点击 `AppDelegate.swift` 文件。Xcode 会在中间窗格中显示 `AppDelegate.swift` 文件的内容。\n\
  3. 按住 Option 键，将鼠标移到 `IBOutlet` 中的 `NSTextField` 单词上。鼠标指针会变成一个问号，如图 4-7 所示。\n\n\
  ![A978-1-4842-1233-2_4_Fig7_HTML.jpg](img/A978-1-4842-1233-2_4_Fig7_HTML.jpg)\n\n\
  图 4-7. 按住 Option 键时，鼠标指针悬停在类文件名上会变成问号\n\n4. 在鼠标指针悬停在 `NSTextField` 上时按住 Option 键，然后点击鼠标。Xcode\
  \ 会显示一个弹出窗口，简要描述 `NSTextField` 类的特性，如图 4-8 所示。\n\n![A978-1-4842-1233-2_4_Fig8_HTML.jpg](img/A978-1-4842-1233-2_4_Fig8_HTML.jpg)\n\
  \n图 4-8. Option+点击类文件名会显示一个描述该类文件的弹出窗口\n\n5. 点击弹出窗口底部“参考”标签旁边的 `NSTextField Class\
  \ Reference`。Xcode 会显示文档窗口，列出 `NSTextField` 类文件（参见图 4-5）。\n\nOption+点击只是打开文档窗口的一种方式，无需通过“帮助”\
  \ ➤ “文档和参考 API”命令并输入类文件名。\n\n\n\n## 浏览文档\n\n快速帮助可以显示特定类文件的相关信息，但如果你知道自己需要信息，却不知从何找起，该怎么办？这时，你可以花些时间浏览“文档”窗口，快速翻阅不同的帮助主题，直到找到想要的内容。\n\
  \n即使没有找到所需信息，你也很可能会偶然发现一些关于`Xcode`或`OS X`的有趣知识，这些知识将来可能会派上用场。在浏览`Xcode`的文档时，你可以查找与`iOS`、`OS\
  \ X`或`Xcode`相关的特定信息。\n\n如果发现有趣的内容，可以将其添加为书签。这样，日后就能快速再次找到它。你还可以通过电子邮件或短信发送信息，与他人分享有用的内容。\n\
  \n要浏览文档，请按以下步骤操作：\n\n1. 选择`帮助` ➤ `文档和 API 参考`。文档窗口随即出现。\n2. 点击`显示/隐藏导航器`图标，确保导航器窗格出现，并列出主题类别，如`iOS`、`OS\
  \ X`和`Xcode`，如图 4-9 所示。\n\n   ![A978-1-4842-1233-2_4_Fig9_HTML.jpg](img/A978-1-4842-1233-2_4_Fig9_HTML.jpg)\n\
  \n   图 4-9. 文档窗口的导航器窗格显示了不同信息的类别\n\n3. 点击类别（如`OS X`或`Xcode`类别）左侧显示的灰色展开三角形。会出现一个包含更多主题的列表（这些主题也有自己的灰色展开三角形）。继续点击主题的展开三角形，最终你将找到可点击查看信息的主题列表，如图\
  \ 4-10 所示。\n\n   ![A978-1-4842-1233-2_4_Fig10_HTML.jpg](img/A978-1-4842-1233-2_4_Fig10_HTML.jpg)\n\
  \n   图 4-10. 每个类别都列出了多个其他主题类别\n\n4. 点击文档窗口右上角出现的`共享`图标，如图 4-11 所示。如果点击`发送电子邮件链接`，邮件程序将加载一封空白电子邮件，其中包含指向该文档页面的链接。如果点击`添加书签`，`Xcode`会将该文档页面保存为书签。\n\
  \n   ![A978-1-4842-1233-2_4_Fig11_HTML.jpg](img/A978-1-4842-1233-2_4_Fig11_HTML.jpg)\n\
  \n   图 4-11. “共享”图标允许你为页面添加书签或与他人分享\n\n5. 为一个或多个页面添加书签后，你可以点击`显示文档书签`图标来查看书签，如图\
  \ 4-12 所示。现在，你可以点击某个书签，立即查看该文档页面，无需再费力搜索。\n\n   ![A978-1-4842-1233-2_4_Fig12_HTML.jpg](img/A978-1-4842-1233-2_4_Fig12_HTML.jpg)\n\
  \n   图 4-12. 查看已添加书签的页面\n\n   要删除书签，只需右键点击该书签，在弹出的菜单中选择`删除`。\n\n6. 当你想再次查看文档库类别（`iOS`、`OS\
  \ X`和`Xcode`）时，只需点击`浏览文档库`图标，如图 4-13 所示。\n\n   ![A978-1-4842-1233-2_4_Fig13_HTML.jpg](img/A978-1-4842-1233-2_4_Fig13_HTML.jpg)\n\
  \n   图 4-13. “浏览文档库”图标\n\n## 搜索文档\n\n快速帮助可以显示特定类文件的信息，而浏览文档则可以帮助你探索关于`iOS`、`OS X`和`Xcode`的海量信息。问题是，快速帮助仅对查找类文件信息有用，而浏览文档又可能很耗时。如果你知道自己想找什么，直接搜索即可。\n\
  \n搜索信息时，请尽可能多地输入关键词，以缩小搜索结果范围。如果只输入单个字母或单词，`Xcode`的文档会用大量不相关的结果轰炸你。\n\n要了解搜索文档窗口的工作原理，请尝试以下操作：\n\
  \n1. 选择`帮助` ➤ `文档和 API 参考`。文档窗口随即出现。\n2. 点击`搜索文档`文本字段，输入`text`。会弹出一个包含不同文本结果列表的菜单，点击即可获取更多信息，如图\
  \ 4-14 所示。\n\n   ![A978-1-4842-1233-2_4_Fig14_HTML.jpg](img/A978-1-4842-1233-2_4_Fig14_HTML.jpg)\n\
  \n   图 4-14. 针对“text”的结果菜单\n\n3. 按空格键，在`text`后面创建一个空格。注意，此时菜单显示的文本结果完全不同，如图 4-15\
  \ 所示。\n\n   ![A978-1-4842-1233-2_4_Fig15_HTML.jpg](img/A978-1-4842-1233-2_4_Fig15_HTML.jpg)\n\
  \n   图 4-15. 仅在搜索词后添加一个空格，就能显示不同的结果菜单\n\n通过搜索文档，你可以快速、轻松地找到所需内容。\n\n## 使用代码补全\n\n\
  回顾第 3 章，当你开始输入 Swift 代码时，可能已经注意到一些奇怪的现象。每次你输入部分 Swift 命令时，Xcode 编辑器可能会显示灰色文本和一个包含可能匹配你部分输入的命令的菜单，如图\
  \ 4-16 所示。\n\n![A978-1-4842-1233-2_4_Fig16_HTML.jpg](img/A978-1-4842-1233-2_4_Fig16_HTML.jpg)\n\
  \n图 4-16. 代码补全建议你可能正在尝试输入的命令\n\n此功能称为“代码补全”，是 Xcode 帮助你输入长命令的一种方式，无需你亲自输入每个字符。当你看到灰色文本和菜单时，你有三个选择：\n\
  \n* 按`Tab`键让 Xcode 自动输入部分灰色文本。（你可能需要多次按`Tab`键才能完全选中所有灰色文本。）\n* 双击弹出菜单中的某个命令，自动输入该命令。\n\
  * 继续手动输入。\n\n如果你继续手动输入，Xcode 会持续显示新的灰色文本（它认为你可能在尝试输入的文本），以及一个包含与你已输入内容匹配的不同命令的菜单。让我们看看代码补全的工作原理：\n\
  \n要了解搜索文档窗口的工作原理，请尝试以下操作：\n\n1. 确保你的`MyFirstProgram`项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击`AppDelegate.swift`。`AppDelegate.swift`文件的内容会显示在中间的\
  \ Xcode 窗格中。\n3. 修改`@IBAction changeCase(sender: NSButton)`代码，删除花括号之间的那一行代码，使其现在看起来如下：\n\
  \n   ```\n   @IBAction func changeCase(sender: NSButton) {\n   }\n   ```\n\n4. 将光标移动到此`@IBAction`方法的花括号之间，输入`labelText.s`，注意会出现灰色文本和一个包含可能命令的菜单，如图\
  \ 4-17 所示。\n\n   ![A978-1-4842-1233-2_4_Fig17_HTML.jpg](img/A978-1-4842-1233-2_4_Fig17_HTML.jpg)\n\
  \n   图 4-17. 代码补全建议`stringValue`作为可能的命令\n\n5. 按`Tab`键。第一次按下`Tab`键时，Xcode 会输入“string”。\n\
  6. 第二次按下`Tab`键，现在 Xcode 会输入完整的“stringValue”。\n7. 输入`= messageText.stringValue.uppercaseString`。注意，在你输入时，代码补全会持续在弹出菜单中显示不同的灰色文本和命令。\n\
  \n通过使用代码补全，你可以更快、更准确地输入命令。如果你开始输入一个命令，却没有看到代码补全的灰色文本或菜单出现，这可能表明你输入的命令有误。代码补全是 Xcode\
  \ 让代码输入变得更简单的又一方式。\n\n\n\n## 理解 OS X 程序的工作原理\n\n为了帮助您更好地理解 Xcode 帮助文档中的全部含义，您需要了解\
  \ OS X 程序的工作原理。在过去，当程序还很小时，程序员会将所有程序命令存储在一个文件中。然后计算机从文件顶部的第一条命令开始，逐行向下执行，直到到达文件末尾才停止。\n\
  \n如今程序规模要大得多，因此它们通常被分割成多个文件。无论您将程序分割成多少个文件，Xcode 都会将所有内容视为存储在一个文件中。将程序分割成多个文件是为了方便您管理。\n\
  \n让我们逐行分析您的 `MyFirstProgram`，以便您理解其运行机制。当您在 Xcode 中查看 Swift 代码时，会注意到 Xcode 编辑器对不同文本进行了颜色编码。这些颜色有助于您识别不同文本的用途，如下所示：\n\
  \n-   **绿色** – 注释，Xcode 会完全忽略它们。注释旨在解释附近代码的相关信息。\n-   **紫色** – Swift 语言的关键字。\n-\
  \   **红色** – 文本字符串。\n-   **蓝色** – 类文件名。\n-   **黑色** – 命令。\n\n第一行代码告诉 Xcode 导入或包含\
  \ Cocoa 框架中的所有代码，作为您程序的一部分。这行代码如下所示：\n\n```\nimport Cocoa\n```\n\n下一行运行一个 Swift\
  \ 函数，该函数加载您的用户界面（`MainMenu.xib`）并从您的 `AppDelegate` 类创建一个对象。这基本上让您的整个程序作为一个通用的 Macintosh\
  \ 程序运行。这行代码如下所示：\n\n```\n@NSApplicationMain\n```\n\n下一行定义了一个名为 `AppDelegate` 的类，该类基于\
  \ `NSObject` 类，并使用 `NSApplicationDelegate` 协议（您很快会了解到）。这行代码如下所示：\n\n```\nclass AppDelegate:\
  \ NSObject, NSApplicationDelegate {\n```\n\n接下来的三行定义了 `IBOutlet`s，用于将此 Swift 代码连接到用户界面元素：用户界面的窗口以及标签和文本字段。窗口基于\
  \ `NSWindow` 类（在 Cocoa 框架中定义），而标签和文本字段基于 `NSTextField` 类。这些行代码如下所示：\n\n```\n@IBOutlet\
  \ weak var window: NSWindow!\n```\n\n```\n@IBOutlet weak var labelText: NSTextField!\n\
  ```\n\n```\n@IBOutlet weak var messageText: NSTextField!\n```\n\n接下来的三行定义了一个连接到用户界面按钮的\
  \ `IBAction` 方法。该代码获取存储在 `messageText`（文本字段）中的文本并将其转换为大写。然后，它将大写文本存储到 `labelText`（标签）中。标签和文本字段都基于\
  \ `NSTextField` 类（在 Cocoa 框架中定义）。这些行代码如下所示：\n\n```\n@IBAction func changeCase(sender:\
  \ NSButton) {\n```\n\n```\nlabelText.stringValue = messageText.stringValue.uppercaseString\n\
  ```\n\n```\n}\n```\n\n剩下的代码定义了两个空函数，因此它们不执行任何操作。如果您在这些函数内部键入代码，该代码将在您的程序启动后立即运行（`applicationDidFinishLaunching`），或者在您的程序结束时立即运行（`applicationWillTerminate`）。\n\
  \n当 `MyFirstProgram` 运行时，它会导入 Cocoa 框架并运行，在屏幕上显示一个包含您用户界面的通用 Macintosh 程序。`applicationDidFinishLaunching`\
  \ 函数会执行，但由于它不包含任何代码，因此什么也不会发生。此时程序停止并等待某些事情发生。\n\n如果用户退出程序，`applicationWillTerminate`\
  \ 函数将会执行，但由于它不包含任何代码，因此什么也不会发生。\n\n当用户单击“Change Case”按钮时，它会运行 `IBAction` 方法 `changeCase`。此\
  \ `IBAction` 方法中唯一的 Swift 命令获取文本字段中的文本（存储在 `messageText` 的 `stringValue` 属性中），将其转换为大写，并将大写文本存储在标签中（由\
  \ `labelText` 的 `stringValue` 属性显示）。\n\n现在您已经了解了 `MyFirstProgram` 的工作原理，让我们从更理论的角度来看看\
  \ OS X 编程。首先，创建一个程序涉及使用 Cocoa 框架定义的类文件。当您在用户界面上放置元素时，您使用的是 Cocoa 框架类文件（例如 `NSTextField`\
  \ 和 `NSButton`）。\n\n当您在 `AppDelegate.swift` 文件中定义一个类时，您同样在使用 Cocoa 框架文件（`NSObject`）中的一个类。\n\
  \n一个典型的 OS X 程序会从 Cocoa 框架中的类文件以及您可能在 Swift 文件中定义的任何类文件创建对象。对象现在通过以下两种方式之一相互通信：\n\
  \n-   在其他对象的属性中存储或检索数据\n-   调用其他对象中存储的方法\n\n要将数据存储到对象的属性中，您需要在等号左侧指定对象名称及其属性，在右侧指定一个值，如下所示：\n\
  \n```\nlabelText.stringValue = \"Hello, world!\"\n```\n\n要从对象的属性中检索数据，您需要在等号左侧指定一个变量来保存数据，在右侧指定对象名称及其属性，如下所示：\n\
  \n```\nlet warning = labelText.stringValue\n```\n\n要调用另一个对象中存储的方法，您需要指定对象的名称和要使用的方法，如下所示：\n\
  \n```\nmessageText.stringValue.uppercaseString\n```\n\n此命令告诉 Xcode 对存储在 `messageText`\
  \ 对象中的 `stringValue` 属性运行 `uppercaseString` 方法。\n\n设置属性值、检索属性值以及调用方法运行，是对象相互通信的三种方式。\n\
  \n当您创建一个类时，必须指定要使用的类文件，例如：\n\n```\nclass AppDelegate: NSObject\n```\n\n这行代码告诉 Xcode\
  \ 定义一个名为 `AppDelegate` 的类，并将其基于名为 `NSObject` 的类文件（在 Cocoa 框架中定义）。\n\n当您基于现有类创建一个新类时，该类会自动包含该现有类定义的所有属性和方法。因此，在上述定义\
  \ `AppDelegate` 类的代码行中，任何从 `AppDelegate` 类创建的对象都会自动拥有 `NSObject` 类定义的所有属性和方法。\n\n\
  有时，一个类文件可能不具备您需要的所有方法。为了解决这个问题，您可以从现有类继承，然后在您的类中定义一个新方法。然而，如果您创建了一个希望其他类也能使用的方法名，另一种替代方案是定义一个称为“协议”的东西。\n\
  \n协议只不过是一组相关方法名的列表，但不包含任何使这些方法实际执行操作的 Swift 代码。在下面的代码中，`AppDelegate` 类不仅基于 `NSObject`\
  \ 类文件，还使用了 `NSApplicationDelegate` 协议定义的方法。\n\n如果您打开“文档”窗口并搜索 `NSApplicationDelegate`\
  \ 协议，您会看到由 `NSApplicationDelegate` 协议定义的一系列方法名，例如 `applicationDidFinishLaunching`\
  \ 或 `applicationWillTerminate`，如图 4-18 所示。\n\n![A978-1-4842-1233-2_4_Fig18_HTML.jpg](img/A978-1-4842-1233-2_4_Fig18_HTML.jpg)\n\
  \n**图 4-18.** “文档”窗口中的 `NSApplicationDelegate` 协议\n\n`AppDelegate` 类从 `NSObject`\
  \ 类继承属性和方法，并使用 `NSApplicationDelegate` 协议定义的方法名。任何基于某个协议的类都必须编写 Swift 代码，以使这些协议方法实际执行某些操作。用技术术语来说，这被称为“实现或遵循一个协议”。\n\
  \n因此，Cocoa 框架实际上由类和协议组成。类定义对象，而协议定义不同类可能需要的常用方法名。\n\n当您编写 OS X 程序时，您经常会同时使用 Cocoa\
  \ 框架类和协议。当您使用 Cocoa 框架类时，您可以使用已经知道如何工作的现成方法，例如知道如何将文本转换为大写的 `uppercaseString` 方法。\n\
  \n\n\n当您使用 Cocoa 框架的协议时，需要编写 Swift 代码来使该方法实际生效。在浏览 Xcode 文档时，请留意类与协议之间的这种差异。\n\n\
  我们来看一个在 Xcode 文档窗口中同时展示类与协议的示例：\n\n确保您的 `MyFirstProgram` 已在 Xcode 中加载。单击项目导航器中的\
  \ `AppDelegate.swift` 文件。Xcode 的中间窗格会显示该 `.swift` 文件的内容。将光标移动到 `NSApplicationDelegate`\
  \ 上。选择“帮助”>“为选中项快速查看”，或按住 Option 键并单击 `NSApplicationDelegate`。此时会弹出一个快速帮助窗口，如图 [4-19]\
  \ 所示，解释 `NSApplicationDelegate` 是一个协议。\n\n![A978-1-4842-1233-2_4_Fig19_HTML.jpg](img/A978-1-4842-1233-2_4_Fig19_HTML.jpg)\n\
  \n图 4-19. `NSApplicationDelegate` 快速帮助弹出窗口\n\n单击 `NSApplicationDelegate Protocol\
  \ Reference`。该协议参考文档会出现在文档窗口中（见图 [4-18]）。在文档窗口的“搜索文档”字段中输入 `NSTextField` 并按下 Return\
  \ 键。注意，文档窗口会说明 `NSTextField` 继承自哪些类（标签为 `Inherits from:`），以及处理用户界面项时哪些协议可能有用（标签为\
  \ `Conforms to:`），如图 [4-20] 所示。\n\n![A978-1-4842-1233-2_4_Fig20_HTML.jpg](img/A978-1-4842-1233-2_4_Fig20_HTML.jpg)\n\
  \n图 4-20. 查看相关类与协议\n\n协议可以向类添加方法，而无需创建新类，但您并不一定要使用协议。当您在 Xcode 中编写程序时，会用到 Cocoa\
  \ 框架的类与协议。随后，根据您程序的特定需求，您很可能也会创建自己的类与协议。\n\n在浏览 Xcode 文档时，请在编写自己的代码之前，先查看类中的属性和方法。如果您在一个类中没有找到所需的属性和方法，可以查看\
  \ `Inherits from:` 标签旁边列出的其他类。\n\n如果您需要一些有用的方法，可以查看 `Conforms to:` 标签旁边列出的不同协议。只有当您确定相关类或协议中不存在某个属性或方法时，才应该编写您自己的\
  \ Swift 代码来实现功能。\n\n例如，在 `MyFirstProgram` 项目中，我们本可以编写 Swift 代码来将文本字段中输入的文字转换为大写。然而，直接使用现有的\
  \ `uppercaseString` 方法要简单得多。这样节省了我们编写和调试代码的时间，因为我们直接使用了 Cocoa 框架中经过验证的代码。\n\n您对\
  \ Cocoa 框架了解得越多，编写自己的程序时要做的工作就越少。请利用 Xcode 的文档来帮助您更好地理解构成整个 Cocoa 框架的所有类与协议。\n\n\
  由于 Cocoa 框架非常庞大，不要试图一次性学习所有内容。只需学习您需要的部分，忽略其余部分。随着您越来越多地使用 Xcode 并编写程序，您很可能逐渐需要并学习\
  \ Cocoa 框架的其他部分。\n\n总体思路是尽可能依赖 Cocoa 框架，只有在必要时才编写 Swift 代码。这样，您就能以更少的精力快速编写出可靠的软件。\n\
  \n## 总结\n\n学习 Xcode 可能令人望而生畏，因此请慢慢来，依靠 Xcode 的文档学习。如果您急需帮助，请使用“快速查看”来查找有关 Cocoa\
  \ 框架类的信息。如果您需要某个特定主题的帮助，请搜索文档。\n\n当您只是出于好奇时，可以浏览 Xcode 针对 iOS、OS X 和 Xcode 本身提供的文档，从而了解其海量可用功能。通过随机浏览，您常常能了解到关于\
  \ Xcode 或为 iOS 与 OS X 编写程序的有趣信息。\n\n如您所见，学习编写程序需要学习 Xcode、学习 Cocoa 框架以及学习 Swift\
  \ 编程语言。放轻松，只学习您需要了解的内容，并逐步扩展您的知识。通过稳步前进，您将学到越来越多，直到有一天您会发现自己实际上已经掌握了如此多的知识。\n\n\
  学习使用 Xcode 为 iOS 和 OS X 编写程序不是一蹴而就的事，但您会惊讶于通过日积月累的稳步进步能学到多少东西。只需坚持练习编写程序，并依赖“帮助”菜单中的\
  \ Xcode 文档。在您意识到这一点之前，您将能够自信地编写小型程序，并最终编写更大、更复杂的程序。\n\n\n\n"
- "# 5. 学习 Swift\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​5](http://dx.doi.org/10.1007/978-1-4842-1233-2_5)）包含补充材料，仅供授权用户使用。\n\
  \n要编写任何程序，都需要选择一门编程语言。编程语言允许你定义计算机要执行的命令。没有所谓的“最佳”编程语言，因为每种编程语言都是为了解决特定问题而设计的。这意味着，一种编程语言可能擅长解决某类问题，但在解决其他类型问题时可能表现糟糕。\n\
  \n对于大多数编程语言来说，易用性和效率之间需要权衡。例如，`BASIC` 编程语言旨在易于学习和使用，而 `C` 编程语言则旨在让你完全控制计算机。通过最大化计算机效率，`C`\
  \ 语言非常适合创建诸如操作系统或硬盘实用程序之类的复杂程序。\n\n由于 `BASIC` 从设计之初就不是为了最大限度控制计算机，因此它永远不会被用来创建操作系统或硬盘实用程序。而\
  \ `C` 语言虽为最大化计算机效率而设计，但对于新手来说很难学习，即使对有经验的程序员来说也很难使用。许多程序中的大多数错误或缺陷完全归咎于 `C` 编程语言的复杂性，这种复杂性甚至会让拥有数十年经验的专业程序员感到困惑。\n\
  \n在 Xcode 的世界里，苹果公司的官方编程语言曾经是 `Objective-C`，它是 `C` 编程语言的一个超集，也是面向对象 `C++` 语言的一个替代方案。不幸的是，`Objective-C`\
  \ 仍然很难学习，更难精通。`Objective-C` 让编程变得不必要的复杂，使得为新手和经验丰富的程序员创建 OS X 和 iOS 软件都变得困难。\n\n\
  这就是为什么在 2014 年，苹果公司推出了一门名为 `Swift` 的新编程语言。`Swift` 旨在拥有与 `Objective-C` 同等的强大功能，同时更易于学习。由于苹果公司将把\
  \ `Swift` 同时用于 OS X 和 iOS 编程，`Swift` 现在已成为 Macintosh、iPhone、iPad、Apple Watch、Apple\
  \ TV、CarPlay 以及苹果公司未来任何其他产品的未来编程语言。\n\n由于很多人一直在使用 `Objective-C` 编写程序，将来仍然需要程序员来修改现有的\
  \ `Objective-C` 程序。但是，你始终可以在一个程序里混合使用 `Objective-C` 和 `Swift`。这意味着随着时间的推移，对 `Objective-C`\
  \ 程序员的需求将会减少，而对 `Swift` 程序员的需求将会增加。如果你想学习用于编写 OS X 和 iOS 程序的最强大编程语言，那么你需要学习 `Swift`。\n\
  \n**注意**  \n如果你已经熟悉 `Objective-C`，你会注意到 `Swift` 在多个方面让编码变得更容易。首先，`Swift` 不需要用分号来结束每一行。其次，`Swift`\
  \ 不需要用星号表示指针，也不需要对方括号来表示对象的方法调用。第三，`Swift` 将所有内容存储在一个单独的 `.swift` 文件中，而 `Objective-C`\
  \ 则需要创建一个 `.h` 头文件和一个 `.m` 实现文件。如果你对 `Objective-C` 一无所知，只需看一下任何用 `Objective-C` 编写的程序，就能体会到代码有多令人困惑。看一眼\
  \ `Objective-C` 代码，你就会意识到学习和使用 `Swift` 要容易得多。\n\n## 使用 Playgrounds\n\n在过去，程序员有两种工具可以帮助他们学习编程。第一种叫做解释器。解释器允许你输入一条命令，然后立即显示结果。这样你就能确切地看到自己做对了什么或做错了什么。\n\
  \n解释器的缺点是速度慢，并且你不能用它来创建可以销售的程序。要在解释器中运行程序，你需要解释器和包含所有用特定编程语言编写的命令的文件（称为源代码）。因为你需要提供源代码才能在解释器中运行程序，所以其他人可以轻易地复制你的程序并窃取它。因此，解释器仅对学习语言有用，但不适合用于销售软件。\n\
  \n程序员用来学习编程的第二种工具叫做编译器。编译器获取存储在文件中的命令列表，并将其转换为机器语言，以便计算机能够理解。编译器的优点是可以防止他人看到你程序的源代码。\n\
  \n使用编译器的问题在于，你必须编写一个完整的程序并编译它，才能知道你的命令是否有效。如果命令无效，你就得回去修复问题。与解释器的交互式特性不同，编译器使得学习编程语言的过程更慢、更笨拙。\n\
  \n使用解释器，你可以编写一条命令并立即看到它是否有效。而使用编译器，你必须先编写命令，然后编译程序，最后运行程序才能知道它是否有效。\n\n解释器更适合学习，而编译器更适合创建那些可以分发给他人且无需提供源代码的软件。幸运的是，Xcode\
  \ 为你提供了两全其美的方案。\n\n当你运行程序时，你使用的是 Xcode 的编译器。然而，如果你只是想试验一些命令，你可以使用 Xcode 的解释器，它被称为\
  \ `Playground`（游乐场）。\n\nPlaygrounds 让你可以试验 `Swift` 代码，看看它是否有效。当你让代码正常工作后，就可以将其复制粘贴到你的项目文件中，然后编译它们以创建一个可运行的程序。Xcode\
  \ 赋予你同时使用解释器和编译器的能力，这使得学习 `Swift` 变得容易，并且对于创建你可以出售或赠送给他人的程序来说也很实用。\n\n要创建一个 playground，请遵循以下步骤：\n\
  \n1. 启动 Xcode。\n2. 选择 **文件 ➤ 新建 ➤ Playground**。（如果你看到 Xcode 欢迎屏幕，也可以点击 **开始使用 playground**。）Xcode\
  \ 会要求你输入 playground 的名称和平台，如图 5-1 所示。\n\n![A978-1-4842-1233-2_5_Fig1_HTML.jpg](img/A978-1-4842-1233-2_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 创建一个 playground 文件\n\n3. 点击 **名称** 文本字段，输入 `IntroductoryPlayground`。\n\
  4. 点击 **平台** 弹出菜单，选择 `OS X`。Xcode 会询问你想将 playground 文件保存在哪里。\n5. 点击你想保存 playground\
  \ 文件的文件夹，然后点击 **创建** 按钮。Xcode 会显示 playground 文件，如图 5-2 所示。\n\n![A978-1-4842-1233-2_5_Fig2_HTML.jpg](img/A978-1-4842-1233-2_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** Playground 窗口\n\n6. 将第二行编辑为如下内容：`var str = \"This is the Swift interpreter\"\
  `\n\n请注意，playground 窗口会立即在右侧空白处显示代码更改的结果，如图 5-3 所示。\n\n![A978-1-4842-1233-2_5_Fig3_HTML.jpg](img/A978-1-4842-1233-2_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** Playground 窗口会立即显示代码更改\n\nPlaygrounds 让你可以自由地试验 `Swift` 并访问 Cocoa 框架中的每个类，而无需担心让你的\
  \ `Swift` 代码与用户界面协同工作。\n\n\n\n"
- "# 排版后的 Markdown 内容\n\n## 在 Swift 中创建注释\n\n在任何编程语言中，最简单的命令就是注释。注释是仅为人阅读而存在的任何文本。在\
  \ Playground 文件的顶部，你可以看到一条以绿色显示的注释：\n\n`// Playground – noun: a place where people\
  \ can play`\n\n注释允许你留下关于代码的笔记，例如编写者的姓名、最后修改的日期、代码功能的描述以及它所依赖的其他文件，或者任何你认为对你（或其他程序员）未来阅读有用的信息。\n\
  \n如果你只需要在单行上编写注释，可以使用 `//` 符号。任何出现在 `//` 符号右侧的内容都是注释，计算机会完全忽略它们。Xcode 通过将文本显示为绿色来帮助你识别注释。\n\
  \n如果你需要编写跨越多行的注释，可以在每一行前面输入多个 `//` 符号，但另一种解决方案是使用 `/*` 符号来定义注释的开始，并使用 `*/` 符号来定义注释的结束，例如：\n\
  \n`/* This is a comment that`\n\n`spans multiple lines */`\n\n注释是为你的便利而存在的，因此当你需要编写和存储关于代码的关键信息时，可以随时使用它们。\n\
  \n**注意**\n\n注释的一个流行用途是临时禁用 Swift 代码，而无需将其删除。通过将一行或多行 Swift 代码变成注释来禁用它们，你可以观察程序的运行效果，就像这些被注释掉的代码行被删除了一样。测试完成后，你可以移除注释符号，将代码重新放回程序中，而无需重新输入。\n\
  \n## 在 Swift 中存储数据\n\n每个程序都需要接收数据，以某种方式处理这些数据，并将结果展示给用户。为了接收数据，程序需要将数据临时存储在内存中。从技术上讲，计算机将数据存储在内存地址中，而这些地址可能难以记忆。为了更容易知道数据存储的位置，编程语言允许你为这些内存地址赋予描述性的名称。在\
  \ Swift 中，这两种选择被称为：\n\n*   变量\n*   常量\n\n变量和常量背后的理念是，你定义一个描述性的名称，并将其赋值为存储数据，例如：\n\
  \n`str = \"This is the Swift interpreter\"`\n\n在上面的例子中，`str` 是描述性名称，而 `\"This is\
  \ the Swift interpreter\"` 是被存储的数据。数据可以是文本字符串，也可以是数字，例如整数（3, 12, -9 等）或小数，也称为浮点数（12.84,\
  \ -0.83, 8.02 等）。在任何给定时间，你只能在描述性名称中存储一块数据，该名称可以被定义为变量或常量。\n\n变量和常量的主要区别在于，你可以根据需要多次重用变量来存储新数据（因此得名“变量”）。而常量只允许你向其中存储一次数据。\n\
  \n要定义一个变量，你必须像这样使用 `var` 关键字：\n\n`var str = \"This is the Swift interpreter\"`\n\
  \n要定义一个常量，你必须像这样使用 `let` 关键字：\n\n`let str = \"This is the Swift interpreter\"`\n\
  \n当你第一次向变量或常量中存储数据时，Swift 会推断数据类型，例如：\n\n*   文本字符串（定义为 `String`）\n*   整数（定义为 `Int`）\n\
  *   小数（由 `Float` 和 `Double` 定义）\n\n了解变量或常量可以容纳的数据类型至关重要，因为它只能容纳一种数据类型，而不能是其他类型。因此，如果你创建了一个变量并存储了一个字符串，那么该变量从现在起就只能存储字符串。\n\
  \n**注意**\n\nSwift 被称为一种类型安全的编程语言，因为它明确定义了每个变量或常量可以存储的数据类型。\n\n为了明确变量或常量可以容纳何种数据类型，你可以显式地定义数据类型，例如：\n\
  \n`var cat: String`\n\n`var dog: Int`\n\n`var fish: Float`\n\n`var snake: Double`\n\
  \n基于这些数据类型声明，`cat` 变量只能存储字符串，`dog` 变量只能存储整数，`fish` 变量只能存储浮点数，而 `snake` 变量只能存储双精度浮点数。\n\
  \n如果你试图向变量或常量中存储错误类型的数据，Swift 不会允许。这是为了防止程序在尝试使用错误数据类型时出现问题。例如，如果程序询问用户要订购多少件商品，而用户输入的是\
  \ \"five\" 而不是数字 5，程序将不知道如何对 \"five\" 进行数学计算，这会导致程序崩溃或运行异常。\n\n**注意**\n\n`Float`\
  \ 和 `Double` 数据类型都可以存储小数。区别在于 `Double` 数据类型可以存储更精确的小数，包含更多的小数位以及更小和更大的值。如果你只是需要使用小数，请使用\
  \ `Float`，因为它比 `Double` 占用更少的内存。如果你需要对小数进行精确计算，请使用 `Double`。当 Swift 推断一个小数时，它会推断为\
  \ `Double` 数据类型。\n\nSwift 提供了三种定义变量或常量的方式：\n\n*   `let cat = \"Oscar\" // 推断为 String\
  \ 数据类型`\n*   `let cat: String = \"Oscar\"`\n*   `let cat: String` `cat = \"Oscar\"\
  `\n\n第一种方法允许你直接将数据存储到变量或常量中。根据你首次存储的数据类型，Swift 会推断数据类型为 `String`、`Int` 或 `Double`（而不是\
  \ `Float`，因为 `Float` 存储的小数精度低于 `Double`，而 Swift 假设你想要精确的精度）。\n\n\n\n## Swift 变量与常量声明\n\
  \n第二种方法允许你显式声明数据类型，并将数据存储到该变量或常量中。虽然这可能会更冗长，但它清楚地表明了你要存储的数据类型。\n\n第三种方法需要两行代码。第一行定义数据类型，第二行实际存储属性类型的数据。这对于可能在程序不同部分被赋予不同数据的变量来说非常方便。你可以在文件顶部附近声明变量以便于查找，然后在需要时再为其赋值。\n\
  \n要了解如何在 Swift 中声明变量和常量，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到 Xcode\
  \ 中。\n2.  将 playground 文件中的 Swift 代码修改如下：\n\n    ```\n    import Cocoa\n    let\
  \ cat: String\n    cat = \"Oscar\"\n    cat = \"Bo\"\n    ```\n\n    请注意，当你尝试向已包含数据的常量分配新数据时，会收到一条错误消息。点击左边距中的警告图标会显示一条错误消息，如图\
  \ 5-4 所示。\n\n    ![A978-1-4842-1233-2_5_Fig4_HTML.jpg](img/A978-1-4842-1233-2_5_Fig4_HTML.jpg)\n\
  \n    图 5-4。一条错误消息警告你不能多次将数据存储到常量中。\n\n    **注意**\n\n    常量也被称为“不可变的”，因为一旦你向其中存储了数据，就不能更改。变量被称为“可变的”，因为你可以不断更改它们存储的数据。请记住，变量一次只能保存一块数据。当你向变量中存储新数据时，该变量中任何现有的数据都会被清除。\n\
  \n3.  将 playground 文件中的 Swift 代码修改为将常量更改为变量（将`let`替换为`var`），如下所示：\n\n    ```\n \
  \   import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    cat = 42.7\n   \
  \ ```\n\n    请注意，当你尝试向一个只能保存字符串的变量分配数字时，会收到一条警告。点击左边距中的警告图标会显示一条错误消息，如图 5-5 所示。\n\
  \n    ![A978-1-4842-1233-2_5_Fig5_HTML.jpg](img/A978-1-4842-1233-2_5_Fig5_HTML.jpg)\n\
  \n    图 5-5。一条错误消息警告你不能存储错误类型的数据。\n\n4.  将 playground 文件中的 Swift 代码修改如下：\n\n   \
  \ ```\n    import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    var greeting\
  \ = \"Hello, \"\n    var period : String = \".\"\n    print (greeting + cat + period)\n\
  \    ```\n\n    请注意，playground 会在右边距显示 Swift 代码的结果，如图 5-6 所示。\n\n    ![A978-1-4842-1233-2_5_Fig6_HTML.jpg](img/A978-1-4842-1233-2_5_Fig6_HTML.jpg)\n\
  \n    图 5-6。playground 窗口的右边距会持续显示代码的结果。\n\n### 类型别名\n\n将变量声明为`Int`、`Double`或`String`等数据类型，只告诉你可以保存哪种类型的数据，但并不说明该数据的含义。例如，如果你将两个变量声明为`Int`数据类型，每个变量都可以保存整数，但一个变量可能代表年龄，另一个变量可能代表员工\
  \ ID 号。\n\n为了使数据类型的目的更清晰，Swift 允许你使用一种叫做类型别名的东西。类型别名允许你为泛型数据类型名称提供一个描述性名称，例如：\n\n\
  ```\ntypealias EmployeeID = Int\n```\n\n现在，你不是将变量声明为整数（`Int`）数据类型，而是可以将其声明为`EmployeeID`数据类型，例如：\n\
  \n```\ntypealias EmployeeID = Int\nvar employee : EmployeeID\nemployee = 192\n```\n\
  \n这等价于：\n\n```\nvar employee : Int\nemployee = 192\n```\n\n## 使用 Unicode 字符作为名称\n\
  \n在大多数编程语言中，变量和常量被限制在固定的字符范围内，通常排除外语字符。为了帮助其他语言的程序员更方便地使用 Swift，Swift 允许你使用 Unicode\
  \ 字符作为变量和常量名称。\n\nUnicode 是一种新的通用标准，代表不同的字符。如果你选择“编辑”->“表情与符号”，你可以从中选择有限数量的字符，用于替代或补充普通的字母和数字，如图\
  \ 5-7 所示。\n\n![A978-1-4842-1233-2_5_Fig7_HTML.jpg](img/A978-1-4842-1233-2_5_Fig7_HTML.jpg)\n\
  \n图 5-7。Xcode 允许你使用特殊字符作为变量或常量名称。\n\n要了解如何在变量名称中使用特殊字符，请遵循以下步骤：\n\n1.  确保你的`IntroductoryPlayground`文件已加载到\
  \ Xcode 中。\n2.  删除 playground 中除`import Cocoa`行之外的所有代码。\n3.  在`import Cocoa`行下方，输入`let`并按下空格键。\n\
  4.  选择“编辑”->“表情与符号”。会弹出一个窗口，如图 5-8 所示。\n\n    ![A978-1-4842-1233-2_5_Fig8_HTML.jpg](img/A978-1-4842-1233-2_5_Fig8_HTML.jpg)\n\
  \n    图 5-8。一个包含不同类别特殊字符的弹出窗口。\n5.  点击任何看起来有趣的字符。Xcode 会将该字符作为常量名称输入。\n6.  输入`=\
  \ \"Funny symbol here\"`并按下回车键。\n7.  复制该字符并将其粘贴到`print`命令的括号之间。请注意，playground 窗口的右边距会显示常量变量的内容，如图\
  \ 5-9 所示。\n\n    ![A978-1-4842-1233-2_5_Fig9_HTML.jpg](img/A978-1-4842-1233-2_5_Fig9_HTML.jpg)\n\
  \n    图 5-9。在 Swift 代码中使用特殊字符作为常量名称。\n\n特殊字符对于显示实际的数学符号（而不是拼写出来）或以外语输入变量/常量名称非常有用。通过使变量和常量名称更加通用，Swift\
  \ 使编程对更多人来说更易理解。\n\n## 转换数据类型\n\n如果你有一个存储为整数的数字，需要将其转换为小数，或者你有一个小数，需要将其转换为整数，该怎么办？答案是，你可以通过指定你想要的数据类型来将一种数字数据类型转换为另一种，例如：\n\
  \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉 Swift 将括号内的数字转换为整数。如果这个数字是小数，将其转换为整数基本上意味着丢弃小数点后的所有数字，因此像`4.9`这样的数字将被转换为整数`4`。\n\
  \n当 Swift 将整数转换为小数时，它只是简单地添加一个小数点和零。因此，如果你将整数`75`转换为浮点数，Swift 现在会将其存储为`75.0`。要了解如何将整数转换为小数（反之亦然），请遵循以下步骤：\n\
  \n1.  确保你的`IntroductoryPlayground`文件已加载到 Xcode 中。\n2.  将 playground 文件中的代码修改如下：\n\
  \n    ```\n    import Cocoa\n    var whole : Int = 4\n    var decimal : Double =\
  \ 4.902\n    print (Int(decimal))\n    print (Double(whole))\n    ```\n\n3.  请注意\
  \ Swift 如何将整数转换为小数（将`4`更改为`4.0`），以及如何通过丢弃小数点右侧的所有值来将小数转换为整数（将`4.902`更改为`4`），如图 5-10\
  \ 所示。\n\n    ![A978-1-4842-1233-2_5_Fig10_HTML.jpg](img/A978-1-4842-1233-2_5_Fig10_HTML.jpg)\n\
  \n    图 5-10。将整数更改为小数，反之亦然。\n\n\n\n## 计算属性\n\n到目前为止，声明变量和常量，然后将数据赋值给这些变量或常量的方式，与其他编程语言差别不大。如果你有一个变量与另一个变量相关，可以这样操作：\n\
  \n```\nvar cats = 4\nvar dogs: Int\ndogs = cats + 2\nprint(dogs)\n```\n\n遗憾的是，这种方式将\
  \ `dogs` 变量的声明与 `dogs` 变量实际值的赋值分离开来。为了让变量声明与其定义代码保持关联，Swift 提供了名为计算属性（computed properties）的功能。\n\
  \n使用计算属性时，你不会直接将数据存入变量。相反，你定义变量可以持有的数据类型，然后利用其他变量或常量计算新值，再存储到该变量中。这种计算被称为 getter（取值器），其代码示例如下：\n\
  \n```\nvar dogs : Int {\n    get {\n        return cats + 2 // 用于计算值的代码\n    }\n\
  }\n```\n\n上述代码声明了一个名为 `dogs` 的变量，该变量只能持有整数（`Int`）数据类型。然后，它在大括号内包含了称为 getter 的代码（由关键字\
  \ `get` 定义）。\n\n实际上，你可以在 getter 的大括号内放置任意数量的 Swift 代码，但此示例只包含了最关键的一行，即使用 `return`\
  \ 关键字返回一个值，该值会被存储到 `dogs` 变量中。\n\n在此例中，它会获取 `cats` 变量（该变量必须在程序的其他地方被赋值）中存储的值，将其加\
  \ 2，然后将这个新值存入 `dogs` 变量。修改 getter 中的代码，就会改变计算后存入 `dogs` 变量的值。\n\n让我们按照以下步骤来看看这是如何工作的：\n\
  \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按照如下方式修改 playground 文件中的代码：\n\n```\n\
  import Cocoa\nvar cats = 4\nvar dogs : Int {\n    get {\n        return cats + 2\
  \ // 用于计算值的代码\n    }\n}\nprint(dogs)\n```\n\n注意，playground 窗口的右侧栏显示了 `dogs` 的值，如图\
  \ 5-11 所示。\n\n![A978-1-4842-1233-2_5_Fig11_HTML.jpg](img/A978-1-4842-1233-2_5_Fig11_HTML.jpg)\n\
  \n图 5-11.\n\nplayground 窗口右侧栏展示了 getter 部分的运行方式\n\nGetter 通过代码来计算一个变量的值。第二种计算属性被称为\
  \ setter（设置器），它会运行代码来计算另一个变量的值。\n\n每次给变量赋值时，setter 都会运行。要了解 getter 和 setter 如何工作，请按以下步骤操作：\n\
  \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按照如下方式修改 playground 文件中的代码：\n\n```\n\
  import Cocoa\nvar cats = 4\nvar dogs : Int {\n    get {\n        return cats + 2\
  \ // 用于计算值的代码\n    }\n    set(newValue) {\n        cats = 3 * newValue\n    }\n\
  }\nprint(dogs)\nprint(cats)\ndogs = 5\nprint(dogs)\nprint(cats)\n```\n\n注意\n\n在上述\
  \ setter 代码中，`newValue` 实际上是一个可以省略的默认变量，例如：\n\n```\nset {\n    cats = 3 * newValue\n\
  }\n```\n\n如果你想定义自己的变量名（而不是使用默认的 `newValue` 变量），那么必须将该新名称放在括号内，如下所示：\n\n```\nset\
  \ (myOwnVariable){\n    cats = 3 * myOwnVariable\n}\n```\n\n注意，当你给 `dogs` 变量赋予不同值时，`cats`\
  \ 和 `dogs` 变量的值会如何变化，如图 5-12 所示。\n\n![A978-1-4842-1233-2_5_Fig12_HTML.jpg](img/A978-1-4842-1233-2_5_Fig12_HTML.jpg)\n\
  \n图 5-12.\n\nplayground 窗口右侧栏展示了 getter 和 setter 代码的运行方式\n\n让我们逐行解析这段代码。首先，数字 4\
  \ 被存入 `cats` 变量。在 getter 中使用 `cats` 变量（值为 4）会返回 `cats + 2` 即 `4 + 2`（结果为 6）。因此第一个\
  \ `print(dogs)` 命令打印出 6。\n\n第二个 `print(cats)` 打印出 `cats` 变量的值，该值仍为 4。\n\n当 `dogs`\
  \ 变量被赋值为数字 5 时，setter 会运行。临时变量 `newValue` 被赋值为 5，并据此计算 `cats` 的新值为 `3 * newValue`，即\
  \ `3 * 5` 等于 15。此时 `cats` 变量的值被设为 15。\n\n接下来运行 `print(dogs)` 命令，使用由 getter 计算出的\
  \ `dogs` 的值。由于 `cats` 的值是 15，getter 计算出 `cats + 2` 即 `15 + 2`，结果为 17。因此下一个 `print(dogs)`\
  \ 命令打印出 17，而最后一个 `print(cats)` 命令打印出 15。\n\n注意\n\n计算属性可以在给变量赋值时运行代码。但是，请谨慎使用计算属性，因为它们可能使代码更难以理解。计算属性最常用于面向对象编程中的类属性。例如，如果一个对象代表屏幕上绘制的一个正方形，改变正方形的宽度必须同时改变其高度（反之亦然）。\n\
  \n\n\n## 使用可选变量\n\n声明变量时最大的缺陷在于，在存储数据之前你无法使用该变量。如果在存储任何数据之前就尝试使用变量，程序将会运行失败并崩溃。为避免此问题，许多程序员会先在变量中存储“虚拟”数据。遗憾的是，程序仍可能使用这种“虚拟”数据并引发错误。\n\
  \n为了解决这个问题，Swift 提供了一种称为可选变量的机制。可选变量可以存储数据，也可以不存储任何内容。如果可选变量不包含任何内容，则视为它持有名为 `nil`\
  \ 的值。通过使用可选变量，当变量不包含任何数据时，可以避免程序崩溃。\n\n要创建可选变量，只需声明变量及其数据类型，并在末尾加上问号，如下所示：\n\n```\n\
  var fish : String?\n```\n\n问号将变量标识为可选类型。你可以像使用普通变量一样，使用可选变量来存储数据，例如：\n\n```\nfish\
  \ = \"goldfish\"\n```\n\n虽然在可选变量中存储数据与在普通变量中存储数据并无区别，但从可选变量中检索数据则需要额外的步骤。首先，你必须检查该可选变量是否包含数据。一旦确认可选变量包含数据，你就需要使用感叹号来解包该可选变量，以获取实际数据，例如：\n\
  \n```\nprint (fish!)\n```\n\n要了解可选变量如何工作，请尝试以下步骤：\n\n确保你的 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。按如下方式修改代码：\n\n```\nimport Cocoa\nvar fish : String?\nfish = \"\
  goldfish\"\nprint (fish)\nprint (fish!)\n```\n\n请注意，`fish` 本身实际上是一个可选变量，但当你使用感叹号解包它时，你就能访问可选变量内部的真实数据，如图\
  \ 5-13 所示。\n\n在下方再输入两行代码：\n\n```\nvar str : String\nstr = fish\n```\n\n![A978-1-4842-1233-2_5_Fig13_HTML.jpg](img/A978-1-4842-1233-2_5_Fig13_HTML.jpg)\n\
  \n**图 5-13.** 查看可选变量与解包后数据的区别\n\n请注意，你不能将可选变量 `fish` 赋值给 `str`，因为 `str` 只能存储 `String`\
  \ 类型的数据。相反，你必须使用感叹号解包可选变量 `fish` 并检索其实际的字符串内容，如下所示：\n\n```\nvar str : String\nstr\
  \ = fish!\n```\n\n在解包可选变量以获取其数据之前，务必检查该可选变量包含的是 `nil` 值还是变量。如果尝试在可选变量包含 `nil` 值时使用它，程序将会崩溃。\n\
  \n要检查可选变量是否持有 `nil` 值，有两种选择。首先，你可以像这样显式检查 `nil` 值：\n\n```\nif fish != nil {\n  \
  \  print (\"The optional variable is not nil\")\n}\n```\n\n这段代码检查 `fish` 可选变量是否不等于（`!=`）`nil`。如果可选变量不是\
  \ `nil`，那么它一定持有某个值，因此安全地检索它是安全的。\n\n检查可选变量是否有值的第二种方法是将其赋值给一个常量，如下所示：\n\n```\nif\
  \ let food = fish {\n    print (\"The optional variable has a value\")\n    print\
  \ (food)\n}\n```\n\n如果可选变量有值，它会将该值存储在一个常量（或另一个变量）中。现在你可以通过该常量或变量来访问该值。要了解其工作原理，请按照以下步骤操作：\n\
  \n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按如下方式修改代码：\n\n```\nimport Cocoa\n\
  var fish : String?\nfish = \"goldfish\"\nif fish != nil {\n    print (\"The optional\
  \ variable is not nil\")\n    var str : String\n    str = fish!\n    print (str)\n\
  }\nif let food = fish {\n    print (\"The optional variable has a value\")\n   \
  \ print (food)\n}\n```\n\n请注意，你可以通过使用感叹号解包可选变量，或将其存储在常量中然后使用该常量，来检索可选变量中的值，如图 5-14\
  \ 所示。\n\n![A978-1-4842-1233-2_5_Fig14_HTML.jpg](img/A978-1-4842-1233-2_5_Fig14_HTML.jpg)\n\
  \n**图 5-14.** 访问可选变量中存储值的两种方法\n\n\n\n## 将 Swift 代码与用户界面关联\n\n每个程序都需要存储数据，而从用户界面获取数据并将其存入变量，是最常见的方法之一。要将用户界面元素关联到\
  \ Swift 代码，你需要创建一个 `IBOutlet` 变量。\n\n如果你有一个文本字段连接到了某个 `IBOutlet` 变量，那么用户在文本字段中输入的任何内容都会自动存储到该\
  \ `IBOutlet` 变量中。同样地，你存储在该 `IBOutlet` 变量中的任何内容也会立刻出现在文本字段中。`IBOutlet` 变量就像一座桥梁，连接了你的\
  \ Swift 代码和用户界面，如图 5-15 所示。\n\n![A978-1-4842-1233-2_5_Fig15_HTML.gif](img/A978-1-4842-1233-2_5_Fig15_HTML.gif)\n\
  \n图 5-15. `IBOutlet` 变量将你的用户界面元素与 Swift 代码关联起来\n\n由于文本字段等用户界面元素初始时可能为空，`IBOutlet`\
  \ 变量通常被定义为隐式解包可选变量，并通过感叹号来声明，如下所示：\n\n```\n@IBOutlet weak var labelText: NSTextField!\n\
  ```\n\n如果将 `IBOutlet` 声明为普通变量，并连接到一个空的文本字段，那么当 `IBOutlet` 变量中没有数据时，程序可能会面临崩溃的风险。\n\
  \n如果将 `IBOutlet` 声明为可选变量，你可以用问号来定义它，如下所示：\n\n```\n@IBOutlet weak var labelText:\
  \ NSTextField?\n```\n\n遗憾的是，每次你想访问这个可选变量中存储的数据时，都必须输入一个感叹号。如果多次访问该 `IBOutlet` 变量，每次都需输入感叹号，这既麻烦又会让代码看起来难以阅读。\n\
  \n为了让你在不总是输入感叹号的情况下就能访问 `IBOutlet` 变量，更简单的方法是将 `IBOutlet` 变量创建为隐式解包可选变量。这意味着，如果它有值，你就可以在不输入解包感叹号的情况下访问它。\n\
  \n要了解 Xcode 如何将 `IBOutlet` 创建为隐式解包可选变量，请打开你之前创建的 `MyFirstProgram` 项目：\n\n确保你的 `MyFirstProgram`\
  \ 已在 Xcode 中加载。点击项目导航器中的 `AppDelegate.swift` 文件。Xcode 的中间窗格将显示该 `.swift` 文件的内容。请注意，所有\
  \ `IBOutlet` 变量都使用感叹号声明，这意味着它们是隐式解包可选变量：`@IBOutlet weak var labelText: NSTextField!`\
  \ 和 `@IBOutlet weak var messageText: NSTextField!`\n\n同样注意，`IBAction changeCase`\
  \ 方法让你无需使用感叹号即可访问这些隐式解包可选变量的内容。\n\n```\n@IBOutlet weak var labelText: NSTextField!\n\
  @IBOutlet weak var messageText: NSTextField!\n@IBAction func changeCase(sender:\
  \ NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercaseString\n\
  \    let warning = labelText.stringValue\n}\n```\n\n将每个 `IBOutlet` 变量末尾的感叹号替换为问号，如下所示：`@IBOutlet\
  \ weak var labelText: NSTextField?` 和 `@IBOutlet weak var messageText: NSTextField?`\n\
  \n注意，每当使用 `IBOutlet` 变量时，Xcode 现在都会显示错误信息。这是因为你需要像这样用感叹号解包每个可选变量：\n\n```\n@IBAction\
  \ func changeCase(sender: NSButton) {\n    labelText!.stringValue = messageText!.stringValue.uppercaseString\n\
  \    let warning = labelText!.stringValue\n}\n```\n\n如果你将 `IBOutlet` 定义为普通的可选变量（用问号定义），那么你必须用感叹号解包每个可选变量才能访问其值。\n\
  \n如果你简单地将 `IBOutlet` 定义为隐式解包可选变量（Xcode 会自动为你这样做），那么你就不需要输入感叹号来解包这些可选变量了。\n\n基本上，让\
  \ Xcode 将你的 `IBOutlet` 创建为隐式解包变量（带感叹号）可以使编写 Swift 代码更简便。\n\n现在你可能会问，什么时候应该使用可选变量（用问号\
  \ `?` 定义），什么时候又该使用由感叹号 `!` 定义的隐式解包可选变量呢？\n\n通常，对于 `IBOutlet`，使用隐式解包可选变量可以简化 Swift\
  \ 代码的编写，免去到处输入感叹号的麻烦。如果在其他场合使用隐式解包可选变量，你的变量可能会包含 `nil` 值，而当你尝试使用它时，Xcode 不会捕捉到潜在的错误。\n\
  \n要了解使用隐式解包可选变量的风险，请遵循以下步骤：\n\n确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。按如下方式修改代码：\n\
  ```\nimport Cocoa\nvar safe : Int?  // 可选变量\nvar danger : Int!// 隐式解包可选变量\nprint\
  \ (danger * 2)\nprint (safe * 2)\n```\n\n注意，这两个整型变量都没有任何值，但 Xcode 却允许你对隐式解包可选变量中的\
  \ `nil` 值进行计算，而对于普通的可选变量，它会标记出可能的错误，如图 5-16 所示。\n\n![A978-1-4842-1233-2_5_Fig16_HTML.jpg](img/A978-1-4842-1233-2_5_Fig16_HTML.jpg)\n\
  \n图 5-16. Xcode 能够识别未定义可选变量的潜在问题，但无法识别未定义隐式解包可选变量的问题\n\n通过强制你用感叹号（`!`）解包可选变量，Xcode\
  \ 迫使你承认正在使用可选变量，这样你就能记得检查它是否包含 `nil` 值。\n\n由于隐式解包可选变量允许你直接输入变量名而无需额外的符号，因此你更容易忘记自己正在处理可选变量，并在使用前忘记检查可能的\
  \ `nil` 值。可选变量无法防止问题，但它们能强制你记住正在处理可能为 `nil` 的值。\n\n## 总结\n\n如果你来自其他编程环境，你会看到 Swift\
  \ 与许多其他语言的不同之处。Swift 的 Playground 解释器让你在将代码复制粘贴到实际程序之前，可以安全地测试代码。Playground 为你提供了自由尝试\
  \ Swift 命令的环境。\n\n你可以使用 `//` 符号创建单行注释。通过使用 `/*` 标记注释的开始，使用 `*/` 标记注释的结束，可以创建多行注释。\n\
  \n三种最常见的数据类型是整数（`Int`）、小数（`Float` 或 `Double`）和文本字符串（`String`）。如果需要对小数实现绝对精度，请使用\
  \ `Double` 数据类型。否则直接使用 `Float` 即可。\n\n为了更容易理解数据类型，你可以使用 `typealias`，它允许你用一个描述性名称来代替常见的数据类型。为了让变量名更灵活，你可以使用\
  \ Unicode 字符，这些字符可以表示符号或外语字符。\n\n将数据存储在变量中，可以简单到直接将值赋给它。Swift 还提供了计算属性，允许你在赋值新值时修改一个变量或另一个变量。计算属性在处理类和面向对象编程时尤其有用。\n\
  \n更重要的是可选变量，它允许你处理 `nil` 值而不会导致程序崩溃。在使用 `IBOutlet` 将 Swift 代码与标签和文本字段等用户界面元素连接时，可选变量尤其重要。\n\
  \n当你创建一个可选变量（使用问号）时，你需要对其进行解包（使用感叹号）才能访问其实际数据。\n\n变量对于临时存储数据至关重要，因此你会经常使用它们。当你开始学习类和面向对象编程时，你会使用变量来定义属性。本质上，任何时候你需要存储一块数据时，都需要声明一个变量来保存它。\n\
  \n\n\n"
- "# 6. 处理数字与字符串\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​6](http://dx.doi.org/10.1007/978-1-4842-1233-2_6)）包含补充材料，仅供授权用户使用。\n\
  \n每个程序都需要在变量中临时存储数据。然而，为了让程序变得有用，它还必须以某种方式处理这些数据，从而计算出有用的结果。电子表格能让你对数字进行加、减、乘、除运算。文字处理器会处理文本，以纠正拼写错误并格式化文本。就连电子游戏也会响应摇杆的移动，为玩家的对象（如卡通人物、飞机或汽车）计算新的位置。利用数据计算出新的结果，这正是每个程序的全部目的。\n\
  \n为了处理数字，Swift 提供了四种基本的数学运算符：加法（`+`）、减法（`-`）、乘法（`*`）、除法（`/`），以及一个取余运算符（`%`）。你甚至可以使用加法运算符（`+`）来处理字符串，从而将两个字符串合并为一个。\n\
  \n尽管 Swift 包含多种用于处理数字和文本的运算符，但 Cocoa 框架提供了大量功能更强大的函数来处理数字和字符串。如果这些函数都不适用，你随时可以创建自己的函数来处理文本和数字数据。通过创建名为函数的迷你程序，你可以以任何你喜欢的方式处理数据，并根据需要重复使用函数。\n\
  \n## 使用数学运算符\n\n处理数字最简单的方法就是执行加法、减法、除法或乘法运算。处理数字时，首先要确保所有数字都是相同的数据类型，比如全部是整数，或者全部是\
  \ `Float` 或 `Double` 小数。由于将整数与小数混合使用可能会导致计算错误，Swift 会强制你在一次计算中使用完全相同的数据类型。如果你的所有数据并非同一数据类型，则需要转换其中一种或多种数据类型，例如：\n\
  \n```\nvar cats = 4\nvar dogs = 5.4\ndogs = Double(cats) * dogs\n```\n\n在这个例子中，Swift\
  \ 推断 `cats` 是 `Int` 数据类型，`dogs` 是 `Double` 数据类型。要将 `cats` 和 `dogs` 相乘，它们必须是相同的数据类型（`Double`），因此我们必须先将\
  \ `cats` 的值转换为 `Double` 数据类型，然后计算才能安全地进行。\n\n当使用多个数学运算符时，请使用括号来定义计算的先后顺序。Swift 通常从左到右计算数学运算符，但乘法和除法的优先级高于加法和减法。如果你输入以下\
  \ Swift 代码，仅因数学计算顺序不同，就会得到两个不同的结果：\n\n```\nvar cats, dogs : Double\ndogs = 5 * 9\
  \ - 3 / 2 + 4      // 47.5\ncats = 5 * (9 - 3) / (2 + 4)  // 5.0\n```\n\n为了清晰起见，始终用括号将数学运算符分组。最常见的数学运算符被称为二元运算符，因为它们需要两个数字来计算一个结果，如表\
  \ 6-1 所示。\n\n**表 6-1.** Swift 中的常见数学运算符\n\n| 数学运算符 | 用途 | 示例 |\n| --- | --- | ---\
  \ |\n| `+` | 加法 | `5 + 9 = 14` |\n| `-` | 减法 | `5 - 9 = -4` |\n| `*` | 乘法 | `5 *\
  \ 9 = 45` |\n| `/` | 除法 | `5 / 9 = 0.555` |\n| `%` | 取余 | `5 % 9 = 5` |\n\n在这些数学运算符中，取余运算符可能需要额外解释一下。实质上，取余运算符是用一个数除以另一个数，然后只返回该除法的余数。因此，5\
  \ 除以 9 等于 0 余 5，而 26 除以 5 的余数则为 1。\n\n### 前缀与后缀运算符\n\n当使用加法或减法运算符进行加 1 或减 1 操作时，Swift\
  \ 为你提供了两种选择。首先，你可以像这样编写简单的数学语句：\n\n```\nvar temp : Int = 1\ntemp = temp + 1\ntemp\
  \ = temp - 1\n```\n\n作为一种快捷方式，Swift 还提供了称为前缀和后缀的自增和自减运算符。因此，如果你想给任何变量加 1，只需要执行以下任一操作：\n\
  \n```\nvar temp : Int = 1\n++temp\n--temp\n```\n\n`++` 或 `--` 运算符告诉 Swift 对该变量进行加\
  \ 1 或减 1 操作。当 `++` 或 `--` 运算符出现在变量之前时，这称为前缀，意味着在使用该变量之前先对其进行加 1 或减 1 操作。\n\n如果 `++`\
  \ 或 `--` 运算符出现在变量之后，这称为后缀，意味着在使用该变量之后再对其进行加 1 或减 1 操作。\n\n为了了解这些不同的自增和自减运算符是如何工作的，请按照以下步骤创建一个新的\
  \ playground：\n\n1. 启动 Xcode。\n2. 选择“文件” ➤ “新建” ➤ “Playground”。（如果你看到 Xcode 欢迎界面，也可以点击“开始使用\
  \ playground”。）Xcode 会要求输入 playground 名称和平台。\n3. 点击“名称”文本字段并输入 `MathPlayground`。\n\
  4. 点击“平台”弹出菜单并选择“OS X”。Xcode 会询问你想将 playground 文件保存在哪里。\n5. 点击一个你想要保存 playground\
  \ 文件的文件夹，然后点击“创建”按钮。Xcode 会显示该 playground 文件。\n6. 按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  var temp, temp2 : Int\ntemp = 1\ntemp2 = temp\nprint (++temp)\nprint (temp2++)\n\
  print (temp2)\n```\n\n请注意，前缀运算符（`++temp`）在使用该变量之前先对其加 1，而后缀运算符（`temp++`）则先使用该变量值，然后再对其加\
  \ 1，如图 6-1 所示。\n\n![A978-1-4842-1233-2_6_Fig1_HTML.jpg](img/A978-1-4842-1233-2_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 了解前缀和后缀运算符的工作原理\n\n### 复合赋值运算符\n\n自增（`++`）和自减（`--`）运算符允许你对变量进行加 1 或减\
  \ 1 操作。如果你想对变量进行加或减 1 以外的数值，你可以使用看起来像这样的复合赋值运算符（`+=`）或（`-=`）。\n\n要使用复合赋值运算符，你需要指定一个变量、你想要使用的复合赋值运算符，以及你想要加或减的数值，例如：\n\
  \n```\ntemp += 5\n```\n\n这等同于：\n\n```\ntemp = temp + 5\n```\n\n为了了解复合赋值运算符是如何工作的，请按照以下步骤操作：\n\
  \n1. 确保你的 `MathPlayground` 文件已在 Xcode 中加载。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  var temp : Int\ntemp = 2\ntemp += 57              // 等同于 temp = temp + 57\nprint\
  \ (temp)\ntemp -= 7               // 等同于 temp = temp - 7\nprint (temp)\n```\n\n\
  如图 6-2 所示，`+=` 复合赋值运算符将 57 加到 `temp` 的当前值上。然后 `-=` 复合赋值运算符从 `temp` 的当前值中减去 7。\n\n\
  ![A978-1-4842-1233-2_6_Fig2_HTML.jpg](img/A978-1-4842-1233-2_6_Fig2_HTML.jpg)\n\n\
  **图 6-2.** 了解复合赋值运算符的工作原理\n\n通过组合数学运算符，你可以创建任何类型的计算。然而，如果你需要执行常见的数学运算，例如求一个数的平方根或对数，使用\
  \ Cocoa 框架中内置的数学函数会更加简单可靠。\n\n## 使用数学函数\n\nCocoa 框架提供了数十个数学函数，你可以通过选择“帮助” ➤ “文档和\
  \ API 参考”来查看它们。当“文档”窗口出现时，键入 `math`，然后在“API 参考”类别下选择 `math`，如图 6-3 所示。\n\n![A978-1-4842-1233-2_6_Fig3_HTML.jpg](img/A978-1-4842-1233-2_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** 在“文档”窗口中查看所有数学函数的列表\n\n你可能不会用到或需要所有可用的数学函数。一些比较常见的数学函数包括：\n\n*   取整函数\n\
  *   计算函数（`sqrt`、`cbrt`、`min`/`max` 等）\n*   三角函数（`sin`、`cosine`、`tangent` 等）\n* \
  \  指数函数\n*   对数函数\n\n\n\n### 舍入函数\n\n在处理十进制数时，你可能需要将它们舍入到最接近的位值。不过，在 Swift 中有多种舍入数字的方式，例如：\n\
  \n- `round` – 将 0.5 及以上舍入，将 0.49 及以下舍去\n- `floor` – 向下舍入到最接近的整数\n- `ceil` – 向上舍入到最接近的整数\n\
  - `trunc` – 截断小数部分\n\n要了解这些不同的舍入函数是如何工作的，请按照以下步骤创建一个新的 playground：\n\n确保 MathPlayground\
  \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\ntestNumber\
  \ = round(36.98)\ntestNumber = round(-36.98)\ntestNumber = round(36.08)\ntestNumber\
  \ = floor(36.98)\ntestNumber = floor(-36.98)\ntestNumber = floor(36.08)\ntestNumber\
  \ = ceil(36.98)\ntestNumber = ceil(-36.98)\ntestNumber = ceil(36.08)\ntestNumber\
  \ = trunc(36.98)\ntestNumber = trunc(-36.98)\ntestNumber = trunc(36.08)\n```\n\n\
  请注意每种舍入函数在正负数上的不同工作方式，以及每个函数是如何向上或向下舍入的，如图 6-4 所示。\n\n![A978-1-4842-1233-2_6_Fig4_HTML.jpg](img/A978-1-4842-1233-2_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 观察不同舍入函数的工作方式\n\n### 计算函数\n\n你可以结合 Swift 的四种基本数学运算（加、减、除、乘）来创建任意复杂的计算。不过，Cocoa\
  \ 框架包含了一些常用的数学函数，这样你就不必从头自己创建了。一些常见的计算函数包括：\n\n- `fabs` – 计算一个数的绝对值\n- `sqrt` –\
  \ 计算一个正数的平方根\n- `cbrt` – 计算一个正数的立方根\n- `hypot` – 计算 (x*x + y*y) 的平方根\n- `fmax` –\
  \ 找出两个数中的最大值\n- `fmin` – 找出两个数中的最小值\n\n要了解这些不同的计算函数是如何工作的，请按照以下步骤操作：\n\n确保你的 MathPlayground\
  \ 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\ntestNumber\
  \ = fabs(52.64)\ntestNumber = fabs(-52.64)\ntestNumber = sqrt(5)\ntestNumber = cbrt(5)\n\
  testNumber = hypot(2, 3)\ntestNumber = fmax(34.2, 89.2)\ntestNumber = fmin(34.2,\
  \ 89.2)\n```\n\n请注意每种计算函数的不同工作方式，如图 6-5 所示。\n\n![A978-1-4842-1233-2_6_Fig5_HTML.jpg](img/A978-1-4842-1233-2_6_Fig5_HTML.jpg)\n\
  \n图 6-5. 观察不同计算函数的工作方式\n\n### 三角函数\n\n如果你还记得学校学的（即使不记得也没关系），三角学是数学中研究相交线之间角度的领域。由于三角学在实际生活中确实很有用，Cocoa\
  \ 框架提供了大量的函数来计算余弦、双曲正弦、反正切和反双曲余弦。一些常见的三角函数包括：\n\n- `sin` – 计算以弧度为单位的角度正弦值\n- `cos`\
  \ – 计算以弧度为单位的角度余弦值\n- `tan` – 计算以弧度为单位的角度正切值\n- `sinh` – 计算以弧度为单位的角度双曲正弦值\n- `cosh`\
  \ – 计算以弧度为单位的角度双曲余弦值\n- `tanh` – 计算以弧度为单位的角度双曲正切值\n- `asin` – 计算以弧度为单位的角度反正弦值\n\
  - `acos` – 计算以弧度为单位的角度反余弦值\n- `atan` – 计算以弧度为单位的角度反正切值\n- `asinh` – 计算以弧度为单位的角度反双曲正弦值\n\
  - `acosh` – 计算以弧度为单位的角度反双曲余弦值\n- `atanh` – 计算以弧度为单位的角度反双曲正切值\n\n要了解这些不同的三角函数是如何工作的，请按照以下步骤操作：\n\
  \n确保你的 MathPlayground 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar testNumber\
  \ : Double\ntestNumber = sin(1)\ntestNumber = cos(1)\ntestNumber = tan(1)\ntestNumber\
  \ = sinh(1)\ntestNumber = cosh(1)\ntestNumber = tanh(1)\ntestNumber = asin(1)\n\
  testNumber = acos(1)\ntestNumber = atan(1)\ntestNumber = asinh(1)\ntestNumber =\
  \ acosh(1)\ntestNumber = atanh(1)\n```\n\n请注意每种三角函数的不同工作方式，如图 6-6 所示。\n\n![A978-1-4842-1233-2_6_Fig6_HTML.jpg](img/A978-1-4842-1233-2_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 观察不同三角函数的工作方式\n\n### 指数函数\n\n指数函数涉及乘法，例如将数字 2 自乘固定次数。一些常见的指数函数包括：\n\n-\
  \ `exp` – 计算 e**x，其中 x 是整数\n- `exp2` – 计算 2**x，其中 x 是整数\n- `__exp10` – 计算 10**x，其中\
  \ x 是整数\n- `expm1` – 计算 e**x-1，其中 x 是整数\n- `pow` – 计算 x 的 y 次幂\n\n要了解这些不同的指数函数是如何工作的，请按照以下步骤操作：\n\
  \n确保你的 MathPlayground 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar testNumber\
  \ : Double\ntestNumber = exp(3)\ntestNumber = exp2(3)\ntestNumber = __exp10(3)\n\
  testNumber = expm1(3)\ntestNumber = pow(2,4)\n```\n\n请注意每种指数函数的不同工作方式，如图 6-7 所示。\n\
  \n![A978-1-4842-1233-2_6_Fig7_HTML.jpg](img/A978-1-4842-1233-2_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 观察不同指数函数的工作方式\n\n### 对数函数\n\n对数函数允许在处理大数时进行乘法、除法和加法运算，类似于指数函数。一些常见的对数函数包括：\n\
  \n- `log` – 计算一个数的自然对数\n- `log2` – 计算一个数以 2 为底的对数\n- `log10` – 计算一个数以 10 为底的对数\n\
  - `log1p` – 计算 1+x 的自然对数\n\n要了解这些不同的对数函数是如何工作的，请按照以下步骤操作：\n\n确保你的 MathPlayground\
  \ 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\ntestNumber\
  \ = log(3)\ntestNumber = log2(3)\ntestNumber = log10(3)\ntestNumber = log1p(3)\n\
  ```\n\n请注意每种对数函数的不同工作方式，如图 6-8 所示。\n\n![A978-1-4842-1233-2_6_Fig8_HTML.jpg](img/A978-1-4842-1233-2_6_Fig8_HTML.jpg)\n\
  \n图 6-8. 观察不同对数函数的工作方式\n\n\n\n## 使用字符串函数\n\n正如 Cocoa 框架提供了数十种数学函数一样，它也包含了一些字符串操作函数。一些常见的字符串函数包括：\n\
  \n*   `+` —— 将两个字符串连接或组合在一起，例如 \"Hello\" + \"world\"，会生成字符串 \"Hello world\"\n* \
  \  `capitalizedString` —— 将每个单词的首字母大写\n*   `lowercaseString` —— 将整个字符串转换为小写字母\n\
  *   `uppercaseString` —— 将整个字符串转换为大写字母\n*   `doubleValue` —— 将包含数值的字符串转换为 `Double`\
  \ 数据类型\n*   `isEmpty` —— 检查字符串是否为空或至少有一个字符\n*   `hasPrefix` —— 检查特定文本是否出现在字符串的开头\n\
  *   `hasSuffix` —— 检查特定文本是否出现在字符串的结尾\n\n使用 `+` 运算符追加或组合字符串时，要注意空格。如果省略空格，可能会得到不想要的结果。例如，\"\
  Hello\" + \"world\" 会生成没有任何空格的字符串 \"Helloworld\"。这就是为什么你需要确保在单词之间加上空格，例如 \"Hello\"\
  \ + \"world\" 才能生成 \"Hello world\"。\n\n要了解这些不同的字符串函数如何工作，请遵循以下步骤：\n\n确保你的 `MathPlayground`\
  \ 已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar text : String = \"Hello everyone!\"\
  \nprint (text.capitalizedString)\nprint (text.lowercaseString)\nprint (text.uppercaseString)\n\
  print (text.isEmpty)\nprint (text.hasPrefix (\"Hello\"))\nprint (text.hasSuffix\
  \ (\"world\"))\nvar dog : Double\ndog = \"23.79\".doubleValue\n```\n\n注意每种字符串类型函数的工作方式不同，如图\
  \ 6-9 所示。\n\n![A978-1-4842-1233-2_6_Fig9_HTML.jpg](img/A978-1-4842-1233-2_6_Fig9_HTML.jpg)\n\
  \n图 6-9.\n\n观察不同字符串函数的工作方式\n\n## 创建函数\n\n到目前为止，你用来操作数字或字符串的所有函数，都是 Cocoa 框架为你创建好的。函数的基本思想是，你无需了解其工作原理即可使用它。你只需要知道函数名（用来调用并执行它）以及可能需要传递给函数的任何数据，以便它能够利用这些数据执行操作（例如，将字符串中的所有文本转换为大写）。\n\
  \n你应该始终尽可能多地使用 Cocoa 框架的内置函数，因为这能让你使用经过预测试、可靠的代码来创建程序。当然，Cocoa 框架无法提供你可能需要的所有函数，所以你最终需要创建自己的函数。\n\
  \n函数的目的是简化代码。与其编写多行代码来计算一个数的平方根，不如将该代码隐藏在一个函数中，并通过名称调用或执行该函数，这样要简单得多。函数基本上是用单行代码（即函数调用）来替代多行代码。\n\
  \n你可以创建的三种函数类型是：\n\n*   不接受任何数据且执行相同操作的函数\n*   接受数据的函数\n*   返回值的函数\n\n请记住，接受数据的函数也可以返回值。\n\
  \n### 不带参数或返回值的简单函数\n\n最简单的函数只包含一个函数名，如下所示：\n\n```\nfunc functionName () {\n\n}\n\
  ```\n\n通过在花括号之间插入一行或多行代码，你可以让函数执行某些操作，例如：\n\n```\nfunc simpleFunction () {\n   \
  \ print (\"Hello\")\n    print (\"there\")\n}\n```\n\n要运行函数内的代码，你只需按名称调用该函数，例如：\n\
  \n```\nsimpleFunction()\n```\n\n要了解此函数的工作方式，请遵循以下步骤：\n\n启动 Xcode。选择 文件 ➤ 新建 ➤ Playground。（如果你看到\
  \ Xcode 欢迎屏幕，也可以点击“开始使用 playground”）。Xcode 会要求输入 playground 的名称和平台。点击“名称”文本框，输入\
  \ `FunctionPlayground`。点击“平台”弹出菜单，选择 OS X。Xcode 会询问你想将 playground 文件保存在哪里。点击一个文件夹来保存你的\
  \ playground 文件，然后点击“创建”按钮。Xcode 会显示该 playground 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  func simpleFunction () {\n    print (\"Hello\")\n    print (\"there\")\n}\nvar i\
  \ = 1\nwhile i <= 5 {\n    simpleFunction()\n    i = i + 1\n}\n```\n\n这段代码定义了一个简单的函数，该函数只打印\
  \ \"Hello\" 和 \"there\"。然后它使用一个循环（稍后你会学到）运行五次，并运行或调用 `simpleFunction` 五次，如图 6-10\
  \ 所示。\n\n![A978-1-4842-1233-2_6_Fig10_HTML.jpg](img/A978-1-4842-1233-2_6_Fig10_HTML.jpg)\n\
  \n图 6-10.\n\n定义并调用一个简单的函数\n\n如果不使用函数，同样的 Swift 代码可能如下所示：\n\n```\nimport Cocoa\n\
  var i = 1\nwhile i <= 5 {\n    print (\"Hello\")\n    print (\"there\")\n    i =\
  \ i + 1\n}\n```\n\n虽然这看起来更简单，但问题在于，如果你需要在程序的多个部分重用这段代码。这意味着你需要在多个位置复制粘贴相同的代码。现在，如果你需要修改这段代码，你必须确保在整个程序中修改它。如果遗漏了某一个代码副本，你的程序可能就无法正常运行了。\n\
  \n通过将常用代码存储在函数中，你将其存储在一个地方，但可以在程序的多个部分使用它。现在，如果你需要修改代码，只需在一个地方更改，这些更改会自动影响程序中调用该函数的多个部分。\n\
  \n\n\n### 带参数的简单函数\n\n不带参数的简单函数只能重复执行相同的操作。而参数允许函数接收数据，并利用这些数据计算出不同的结果。要定义一个参数，你只需定义一个描述性的名称及其数据类型，这很像声明一个变量，但不需要使用\
  \ `var` 关键字，例如：\n\n```\nfunc functionName (parameter: dataType) {\n\n}\n```\n\n\
  要调用一个定义了参数的函数，你只需输入函数名，后跟正确数量的参数，例如：\n\n```\nfunctionName (parameter)\n```\n\n调用带参数的函数时，需要确保传递了正确数量的参数，并且每个参数的数据类型都是正确的。因此，如果你有一个接受一个字符串参数的函数，像这样：\n\
  \n```\nfunc parameterFunction (name : String) {\n\n}\n```\n\n你可以通过函数名并传入一个（且仅一个）字符串来调用它，像这样：\n\
  \n```\nparameterFunction(\"Oscar\")\n```\n\n函数调用失败的方式有三种：\n\n- 如果你把函数名写错了\n- 如果你没有列出或传递正确数量的参数\n\
  - 如果你没有列出或传递正确数据类型的参数\n\n在这个例子中，`parameterFunction` 期望接收一个参数，且该参数必须是 `String` 数据类型。如果你给\
  \ `parameterFunction` 传递零个或两个参数，它都将无法工作。同样，如果你给 `parameterFunction` 传递一个参数，但其数据类型不是\
  \ `String`，它也无法工作。\n\n要了解带参数的函数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground` 文件已在\
  \ Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc parameterFunction (name : String)\
  \ {\n    print (\"Hello, \" + name)\n}\nparameterFunction(\"Oscar\")\n```\n\n这个\
  \ Swift 程序调用了 `parameterFunction`，并向其传递了一个字符串参数 (`\"Oscar\"`)。当 `parameterFunction`\
  \ 接收到这个参数 (`\"Oscar\"`) 时，会将其存储在其 `name` 变量中。然后它会打印出 \"Hello, Oscar\"，如图 6-11 所示。\n\
  \n![A978-1-4842-1233-2_6_Fig11_HTML.jpg](img/A978-1-4842-1233-2_6_Fig11_HTML.jpg)\n\
  \n图 6-11. 向函数传递一个字符串参数\n\n尽管这个示例只使用了一个参数，但一个函数可以接受的参数数量没有限制。要接受更多参数，你只需定义额外的变量名称和数据类型，像这样：\n\
  \n```\nfunc functionName (parameter: dataType, parameter2 : dataType) {\n\n}\n```\n\
  \n每个参数可以接受不同的数据类型，因此你可以向函数传递一个字符串和一个整数，例如：\n\n```\nfunc functionName (parameter:\
  \ String, parameter2 : Int) {\n\n}\n```\n\n要调用这个函数，你需要指定函数名以及它的两个具有正确数据类型的参数：\n\n\
  ```\nfunctionName (\"Hello\", 48)\n```\n\n如果你以错误的顺序传递参数，函数调用将无法工作，例如：\n\n```\nfunctionName\
  \ (48, \"Hello\")\n```\n\n传递参数时，始终要确保传递正确数量的参数、正确的数据类型以及正确的顺序。\n\n### 带参数并返回值的函数\n\
  \n最通用的函数是那些使用参数接收数据，然后根据这些数据返回一个值的函数。一个返回值函数的基本结构如下：\n\n```\nfunc functionName (parameter:\
  \ ParameterDataType) -> DataType {\n        return someValue\n}\n```\n\n函数名可以是您想用的任意名称。理想情况下，函数名应能描述其用途。\n\
  \n参数很像声明一个变量，通过指定参数名称及其可以接受的数据类型。参数是可选的，但不带参数的函数通常用处不大，因为它们会重复执行相同的任务。\n\n`->` 符号定义了函数名所代表的数据类型。\n\
  \n`return` 关键字后面必须跟着一个值或可以计算出值的命令。这个值的数据类型必须与 `->` 符号后面的数据类型相同。\n\n假设你定义了一个如下的函数：\n\
  \n```\nfunc salesTax (amount: Double) -> Double {\n    let currentTax = 0.075 //\
  \ 7.5% 销售税\n    return amount * currentTax\n}\n```\n\n这个函数名为 `salesTax`，它接受一个名为\
  \ `amount` 的参数，该参数可以存储 `Double` 数据类型。当它计算结果时，该结果也是一个 `Double` 数据类型，由 `->` 符号后的 `Double`\
  \ 标识。`return` 关键字标识了函数如何计算要返回的值。\n\n要了解这个函数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground`\
  \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc salesTax (amount: Double)\
  \ -> Double {\n    let currentTax = 0.075\n    return amount * currentTax\n}\nlet\
  \ purchasePrice = 59.95\nvar total : Double\ntotal = purchasePrice + salesTax(purchasePrice)\n\
  print (\"包含销售税，您的总金额是 =  \\(total)\")\n```\n\n请注意，这段代码通过向 `salesTax` 函数传递存储在 `purchasePrice`\
  \ 中的值来调用它。当你在 playground 中输入此代码时，你会在右侧边栏看到显示的结果，如图 6-12 所示。尝试更改 `purchasePrice`\
  \ 和 `currentTax` 中存储的值，看看它们如何影响此 Swift 代码计算出的结果。\n\n![A978-1-4842-1233-2_6_Fig12_HTML.jpg](img/A978-1-4842-1233-2_6_Fig12_HTML.jpg)\n\
  \n图 6-12. 定义和调用函数\n\n当一个函数返回一个值时，请确保指定：\n\n- 函数所代表的数据类型 (`-> dataType`)\n- 函数名所代表的值\
  \ (`return`)\n\n调用一个返回值的函数时，请确保数据类型匹配。在上面的例子中，`salesTax` 函数返回一个 `Double` 数据类型，因此在\
  \ Swift 代码中，这个 `salesTax` 函数值被存储在 `total` 变量中，该变量也是一个 `Double` 数据类型。\n\n### 定义外部参数名\n\
  \n当一个函数使用一个或多个参数来接收数据时，你只需定义参数名及其数据类型，例如：\n\n```\nfunc storeContact (name: String,\
  \ age : Int) {\n\n}\n```\n\n要调用此函数，你只需使用函数名，并为其提供一个字符串和一个整数，例如：\n\n```\nstoreContact\
  \ (\"Fred\", 58)\n```\n\n传递参数时的问题是，你只能看到你传递的数据，但可能不完全理解它所代表的内容。为了解决这个问题，Swift 允许你创建外部参数名，强制你在向函数传递数据时进行标识。\n\
  \n一种方法是创建一个外部参数名，例如：\n\n```\nfunc functionName (externalName internalName: dataType)\
  \ {\n\n}\n```\n\n当你为一个参数同时定义了外部名称和内部名称时，在向函数传递参数时使用外部参数名，而在函数内部则使用内部参数名。要了解如何使用外部和内部参数名，请按照以下步骤操作：\n\
  \n确保你的 `FunctionPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc\
  \ greeting (person name : String) -> String {\n    return \"Hello \" + name\n}\n\
  var message : String\nmessage = greeting (person: \"Bob\")\nprint (message)\n```\n\
  \n此函数有一个外部参数名 `\"person\"` 和一个内部参数名 `\"name\"`。要调用此函数，你必须包含外部参数名 `\"person\"`：\n\
  \n```\ngreeting (person: \"Bob\")\n```\n\n外部参数名只是让调用函数和传递参数变得更加易于理解。\n\n\n\n###\
  \ 使用变量参数\n\n当函数接受参数时，它会将该参数视为常量。这意味着在函数内部，Swift 代码无法修改该参数。如果希望在函数内部修改参数，则需要使用 `var`\
  \ 关键字将该参数标识为变量参数，如下所示：\n\n```\nfunc functionName (var parameter: dataType) {\n\n\
  }\n```\n\n要了解变量参数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\
  \n```swift\nimport Cocoa\nfunc internalChange (var name : String) {\n    name =\
  \ name.uppercaseString\n    print (\"Hello \" + name)\n}\ninternalChange (\"Tasha\"\
  )\n```\n\n在 `internalChange` 函数内部，`name` 参数发生了变化。函数中的第一行将 `name` 参数转换为大写。但是，`internalChange`\
  \ 函数对 `name` 参数所做的任何更改都不会影响程序的其他部分。所有更改都仅限于 `internalChange` 函数内部。\n\n如果你希望更改参数并使这些更改在函数外部生效，则需要改用\
  \ `inout` 参数。\n\n### 使用输入输出参数\n\n向函数传递数据有两种方式。一种是传递固定值，例如：\n\n```swift\nsqrt(5)\n\
  ```\n\n第二种方式是传递一个表示值的变量，例如：\n\n```swift\nvar z : Double = 45.0\nvar answer : Double\n\
  answer = sqrt(z)\n```\n\n在这段 Swift 代码中，`z` 的值为 `45.0`，并被传递给 `sqrt` 函数。无论 `sqrt`\
  \ 函数做什么，`z` 的值仍然保持为 `45.0`。\n\n如果你希望函数能够更改其参数的值，可以创建所谓的输入输出参数。这意味着当你将一个变量传递给函数时，该函数会修改那个变量。\n\
  \n要定义一个函数可以更改的参数，只需使用 `inout` 关键字来标识该参数，例如：\n\n```\nfunc functionName (inout parameter:\
  \ dataType) {\n\n}\n```\n\n如果一个函数有两个或更多参数，你可以将一个或多个参数指定为 `inout` 参数。当你将一个参数标识为 `inout`\
  \ 参数时，函数必须修改该 `inout` 参数。当你调用一个函数并向其传递 `inout` 参数时，必须使用 `&` 符号来标识该 `inout` 参数，例如：\n\
  \n```\nfunctionName (&variable)\n```\n\n要了解 `inout` 参数如何工作，请按照以下步骤操作：\n\n确保你的 `FunctionPlayground`\
  \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```swift\nimport Cocoa\nfunc changeMe (inout name:\
  \ String, age: Int) {\n    print (name + \" is \\(age) years old\")\n    name =\
  \ name.uppercaseString\n}\nvar animal : String = \"Oscar the cat\"\nchangeMe (&animal,\
  \ age: 2)\nprint (animal)\n```\n\n`changeMe` 函数定义了两个参数：\n\n*   一个名为 `name` 的字符串参数，被标识为\
  \ `inout` 参数\n*   一个名为 `age` 的整型参数\n\n`changeMe` 函数必须以某种方式修改这个 `inout` 参数，它通过将 `name`\
  \ 参数改为大写来实现，如图 6-13 所示。\n\n![A978-1-4842-1233-2_6_Fig13_HTML.jpg](img/A978-1-4842-1233-2_6_Fig13_HTML.jpg)\n\
  \n图 6-13. 使用 `inout` 参数\n\n调用 `changeMe` 函数时，会向其传递一个名为 `animal` 的 `String` 变量，该变量保存字符串\
  \ `\"Oscar the cat\"`。`changeMe` 函数期望两个参数，其中第一个是 `inout` 参数。这意味着调用 `changeMe` 函数必须满足以下条件：\n\
  \n*   `changeMe` 函数期望两个参数，顺序依次是一个字符串和一个整数\n*   由于字符串参数是 `inout` 参数，第一个参数必须是一个用 `&`\
  \ 符号标识的变量\n\n在调用 `changeMe` 函数之前，`animal` 变量包含字符串 `\"Oscar the cat\"`。调用 `changeMe`\
  \ 函数之后，`animal` 变量现在包含字符串 `\"OSCAR THE CAT\"`。这是因为 `changeMe` 函数中的 `inout` 参数修改了它。\n\
  \n### 理解 IBAction 方法\n\n如果你记得在第 5 章中，你将用户界面中的一个按钮连接到了 Swift 代码，从而创建了一个 `IBAction`\
  \ 方法，它实际上只是一个函数，看起来像这样：\n\n```swift\n@IBAction func changeCase(sender: NSButton)\
  \ {\n    labelText.stringValue = messageText.stringValue.uppercaseString\n    let\
  \ warning = labelText.stringValue\n}\n```\n\n既然你已经理解了函数的工作原理，让我们逐行分析这段代码。首先，`@IBAction`\
  \ 标识了一个仅在用户对用户界面元素进行操作时才会运行的函数。如果你查看参数列表，会看到 `(sender: NSButton)`，这告诉你当用户点击按钮时，`changeCase`\
  \ 函数将执行花括号内的 Swift 代码。\n\n任何 `IBAction` 方法中存储的 Swift 代码通常都会以某种方式处理数据。在这个例子中，它将来自文本字段（由\
  \ `IBOutlet` 变量 `messageText` 表示）的文本转换为大写，然后将该大写文本显示在一个标签（由 `IBOutlet` 变量 `labelText`\
  \ 表示）中。\n\n由于可能存在两个或多个用户界面元素连接到同一个 `IBAction` 方法，`sender` 参数用于标识用户点击的是哪个按钮。由于这个\
  \ `IBAction` 方法只连接到一个按钮，因此 `sender` 参数被忽略。\n\n`IBAction` 方法本质上只不过是连接到用户界面元素上的特殊函数。在任何程序中，你很可能会有多个\
  \ `IBAction` 方法（函数）以及你可能定义的其他函数。\n\n此外，即使你从未见过实现这些函数功能的实际代码，你很可能会使用 Cocoa 框架中定义的函数。在创建任何程序时，你都会以某种形式使用函数。\n\
  \n\n\n## 摘要\n\n任何程序的核心在于其接收数据、处理数据并返回有用结果的能力。处理数值数据最简单的方法是通过常见的数学运算符，例如 `+`（加法）、`-`（减法）、`/`（除法）、`*`（乘法）和\
  \ `%`（取余）。处理字符串的常见方法是使用 `+` 运算符进行拼接，该运算符用于将两个字符串组合在一起。\n\n作为快捷方式，你可以使用递增和递减运算符来对变量加\
  \ 1 或减 1。如果你需要加或减 1 以外的值，可以使用复合赋值运算符来代替。\n\n除了这些基本运算符，你还可以通过 Cocoa 框架定义的函数来处理数据。你不必了解这些函数的工作原理；你只需知道它们存在，以便可以在自己的程序中通过调用这些函数名称来使用它们。要查找可用的函数名称，你可能需要在\
  \ Xcode 的文档窗口中搜索。\n\n虽然 Cocoa 框架中有大量函数可供使用，但你可能也需要创建自己的函数。函数通常接受一个或多个参数，以便计算出不同的结果。\n\
  \n一个函数可以表示一个单一的值，这意味着你需要定义该函数所表示的数据类型。\n\n在最简单的层面上，你需要定义具有唯一名称和数据类型的参数。为了使参数更易于理解，你可以创建外部参数名称，这意味着在向函数传递数据时需要指明参数名称。\n\
  \n通常情况下，当函数接受一个参数时，它会将该参数视为一个值不变常量。但是，函数可以通过使用 `var` 关键字创建变量参数来修改参数。函数对变量参数所做的任何更改都仅限于该函数内部。\n\
  \n为了获得更大的灵活性，函数还可以创建 `inout` 参数来修改参数的值。当函数修改一个 `inout` 参数时，这些更改会体现在函数外部。\n\n通过定义自己的函数，你可以创建可重用的实用代码库，这些代码库可以在程序的其他部分甚至其他项目中重复使用。函数让你能够为特定程序创建处理数据的特定方式。\n\
  \n"
- "# 使用分支进行决策\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_7](http://dx.doi.org/10.1007/978-1-4842-1233-2_7))\
  \ 包含补充材料，仅供授权用户使用。\n\n程序接收到数据后，需要以某种方式处理这些数据，以返回有用的结果。简单的程序以相同方式处理数据，但更复杂的程序需要就如何处理数据做出决策。\n\
  \n例如，一个程序可能会要求用户输入密码。如果用户输入了有效密码，则程序允许用户访问。如果用户未输入有效密码，则程序必须显示错误消息并阻止访问。\n\n当程序分析数据并根据该数据做出决策时，会使用到所谓的布尔值和分支语句。\n\
  \n布尔值表示 `true` 或 `false` 的值。分支语句为你的程序提供了在两组或多组不同的待执行命令之间进行选择的选项。布尔值与分支语句相结合，使程序能够对不同数据做出响应。\n\
  \n## 理解比较运算符\n\n你可以通过声明 `Bool` 数据类型来创建布尔变量，例如：\n\n```\nvar flag : Bool\n```\n\n\
  `Bool` 表示布尔数据类型。任何定义为 `Bool` 数据类型的变量只能保存两个值之一：`true` 或 `false`，例如：\n\n```\nflag\
  \ = true\nflag = false\n```\n\n虽然你可以直接将 `true` 和 `false` 赋值给表示布尔数据类型的变量，但更常见的是使用比较运算符来计算布尔值。一些常见的比较运算符如表\
  \ 7-1 所示。\n\n**表 7-1.** Swift 中的常见比较运算符\n\n| 比较运算符 | 用途 | 示例 | 布尔值 |\n| --- | ---\
  \ | --- | --- |\n| `==` | 等于 | `5 == 14` | `false` |\n| `<` | 小于 | `5 < 14` | `true`\
  \ |\n| `>` | 大于 | `5 > 14` | `false` |\n| `<=` | 小于或等于 | `5 <= 14` | `true` |\n\
  | `>=` | 大于或等于 | `5 >= 14` | `false` |\n| `!=` | 不等于 | `5 != 14` | `true` |\n\n\
  **注意**\n\n等于（`==`）比较运算符是唯一也可以比较字符串的比较运算符，例如 `\"Joe\" == \"Fred\"`（计算结果为 `false`）或\
  \ `\"Joe\" == \"Joe\"`（计算结果为 `true`）。\n\n比较运算符可以比较诸如 `38 == 8` 或 `29.04 > 12` 之类的值。然而，使用实际值与比较运算符总是返回相同的\
  \ `true` 或 `false` 值。比较运算符的通用性在于，当它们将一个固定值与一个变量进行比较，或者比较两个变量时，例如：\n\n```\nlet myValue\
  \ = 45\nmyValue > 38            // 计算结果为 true\n\nlet yourValue = 39\nmyValue < yourValue\
  \     // 计算结果为 false\n```\n\n当你比较一个或多个变量时，结果会因这些变量的当前值而改变。然而，在使用等于（`==`）比较运算符时，处理小数值时要小心。这是因为\
  \ `45.0` 与 `45.0000001` 不是同一个数字。处理小数值时，最好使用大于或小于比较运算符，而不是等于比较运算符。\n\n\n\n## 理解逻辑运算符\n\
  \n任何比较运算符，例如 `78 > 9`，都会得出一个 `true` 或 `false` 值。然而，Swift 提供了专门的逻辑运算符，仅用于处理布尔值，如表\
  \ 7-2 所示。\n\n表 7-2. Swift 中的常见逻辑运算符\n\n| 比较运算符 | 用途 |\n| --- | --- |\n| `&&` | 与\
  \ |\n| `\\|\\|` | 或 |\n| `!` | 非 |\n\n逻辑运算符“与”（`&&`）和“或”（`\\|\\|`）都接受两个布尔值，并将其转换为单个布尔值。逻辑运算符“非”（`!`）接受一个布尔值，并将其转换为相反的值。表\
  \ 7-3 展示了逻辑运算符“非”（`!`）的工作方式：\n\n表 7-3. 逻辑运算符“非”（`!`）\n\n| 示例 | 值 |\n| --- | ---\
  \ |\n| `!true` | `false` |\n| `!false` | `true` |\n\n“与”（`&&`）运算符接受两个布尔值，并根据表 7-4\
  \ 计算出一个单一的布尔值。\n\n表 7-4. Swift 中的逻辑“与”（`&&`）运算符\n\n| 第一个布尔值 | 第二个布尔值 | 结果 |\n| ---\
  \ | --- | --- |\n| `true` && | `true` | `true` |\n| `true` && | `false` | `false`\
  \ |\n| `false` && | `true` | `false` |\n| `false` && | `false` | `false` |\n\n“或”（`\\\
  |\\|`）运算符接受两个布尔值，并根据表 7-5 计算出一个单一的布尔值。\n\n表 7-5. Swift 中的逻辑“或”（`\\|\\|`）运算符\n\n\
  | 第一个布尔值 | 第二个布尔值 | 结果 |\n| --- | --- | --- |\n| `true` \\|\\| | `true` | `true`\
  \ |\n| `true` \\|\\| | `false` | `true` |\n| `false` \\|\\| | `true` | `true` |\n\
  | `false` \\|\\| | `false` | `false` |\n\n要查看布尔值如何与比较运算符和逻辑运算符协同工作，请按照以下步骤创建一个新的\
  \ playground：\n\n1. 启动 Xcode。\n2. 选择 File ➤ New ➤ Playground。（如果你看到了 Xcode 欢迎界面，也可以点击“Get\
  \ started with a playground”。）Xcode 会要求输入 playground 名称和平台。\n3. 在 Name 文本框中点击，然后输入\
  \ `BooleanPlayground`。\n4. 点击 Platform 弹出菜单，选择 OS X。Xcode 会询问你想将 playground 文件保存在哪里。\n\
  5. 点击一个你想保存 playground 文件的文件夹，然后点击 Create 按钮。Xcode 会显示该 playground 文件。\n6. 按如下方式编辑代码：\n\
  \n```\nimport Cocoa\nvar x, y, z : Int\nx = 35\ny = 120\nz = -48\nx == y\nx < y\n\
  x > z\ny != z\nz > -48\n// 与 && 运算符\n(y != z) && (x > z)\n(y != z) && (x == y)\n\
  (x == y) && (x < y)\n(z > -48) && (x == y)\n// 或 || 运算符\n(y != z) || (x > z)\n(y\
  \ != z) || (x == y)\n(x == y) || (x < y)\n(z > -48) || (x == y)\n```\n\n注意比较运算符是如何计算出\
  \ `true` 或 `false` 的，以及逻辑运算符（“与”和“或”）是如何接受两个布尔值并返回一个单一的 `true` 或 `false` 值的，如图 7-1\
  \ 所示。\n\n![A978-1-4842-1233-2_7_Fig1_HTML.jpg](img/A978-1-4842-1233-2_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 使用比较运算符和逻辑运算符评估布尔值\n\n最终，每个布尔值必须是：\n\n*   一个 `true` 或 `false` 值\n*   一个结果为\
  \ `true` 或 `false` 的两个值的比较\n*   使用逻辑运算符组合而成并评估为 `true` 或 `false` 的布尔值\n\n## `if`\
  \ 语句\n\n布尔值对于让程序做出选择至关重要。如果有人输入密码，程序会检查该密码是否有效。如果为 `true`（密码有效），则程序允许访问。如果为 `false`（密码无效），则程序阻止访问。\n\
  \n为了决定下一步做什么，每个程序都需要评估一个布尔值。只有这样，程序才能根据该布尔值的值来决定下一步做什么。\n\nSwift 中最简单的分支语句是 `if`\
  \ 语句，其形式如下：\n\n```\nif BooleanValue == true {\n\n}\n```\n\n为了简化这个 `if` 语句，你可以省略\
  \ `== true` 部分，使 `if` 语句变成这样：\n\n```\nif BooleanValue {\n\n}\n```\n\n这个简写版本的意思是：“如果\
  \ `BooleanValue` 是 `true`，则运行花括号内的代码。如果 `BooleanValue` 是 `false`，则跳过花括号内的所有代码，不运行它们。”\n\
  \n要查看布尔值如何与 `if` 语句协同工作，请按照以下步骤操作：\n\n1. 确保 `BooleanPlayground` 文件已在 Xcode 中加载。\n\
  2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar BooleanValue : Bool = true\nif BooleanValue\
  \ {\n    print (\"The BooleanValue is true\")\n}\n```\n\n图 7-2 显示了 `if` 语句运行的结果。将\
  \ `BooleanValue` 的值更改为 `false`，你会看到 `if` 语句不再打印字符串 `\"The BooleanValue is true.\"\
  `。\n\n![A978-1-4842-1233-2_7_Fig2_HTML.jpg](img/A978-1-4842-1233-2_7_Fig2_HTML.jpg)\n\
  \n图 7-2. 运行一个 `if` 语句\n\n## `if-else` 语句\n\n`if` 语句要么运行代码，要么什么都不运行。如果希望在布尔值为 `false`\
  \ 时运行代码，你可以编写两个独立的 `if` 语句，如下所示：\n\n```\nif BooleanValue {\n\n}\n\nif !BooleanValue\
  \ {\n\n}\n```\n\n如果 `BooleanValue` 为 `true`，则运行第一个 `if` 语句。如果不是，则它什么都不做。\n\n如果 `BooleanValue`\
  \ 为 `false`，则运行第二个 `if` 语句。如果不是，则它什么都不做。\n\n编写两个独立 `if` 语句的问题在于程序的逻辑不够清晰。为了解决这个问题，Swift\
  \ 提供了一种 `if-else` 语句，其形式如下：\n\n```\nif BooleanValue {\n    // 第一组代码，如果为 true 则运行\n\
  } else {\n    // 第二组代码，如果为 false 则运行\n}\n```\n\n`if-else` 语句只提供两个不同的分支。如果布尔值为 `true`，则运行第一组代码。如果布尔值为\
  \ `false`，则运行第二组代码。在 `if-else` 语句中，两组代码不可能同时运行。\n\n要查看布尔值如何与 `if-else` 语句协同工作，请按照以下步骤操作：\n\
  \n1. 确保 `BooleanPlayground` 文件已在 Xcode 中加载。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  var BooleanValue : Bool = true\nif BooleanValue {\n    print (\"The BooleanValue\
  \ is true\")\n} else {\n    print (\"The BooleanValue is false\")\n}\n```\n\n图 7-3\
  \ 展示了当 `BooleanValue` 为 `true` 时 `if-else` 语句是如何工作的。将 `BooleanValue` 改为 `false`，看看\
  \ `if-else` 语句现在是如何运行第二组代码的。\n\n![A978-1-4842-1233-2_7_Fig3_HTML.jpg](img/A978-1-4842-1233-2_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 运行一个 `if-else` 语句\n\n\n\n## if-else if 语句\n\n`if` 语句要么执行一组代码，要么什么都不执行。`if-else`\
  \ 语句总是执行第一组代码或第二组代码。但是，如果你希望从两组或更多可能的代码中选择执行一组，该怎么办？这种情况下，你需要使用 `if-else if` 语句。\n\
  \n与 `if` 语句一样，`if-else if` 语句可能根本不执行任何代码。最简单的 `if-else if` 语句如下所示：\n\n```\nif BooleanValue\
  \ {\n    // 如果为真，则执行第一组代码\n} else if BooleanValue2 {\n    // 如果为真，则执行第二组代码\n}\n\
  ```\n\n使用 `if-else if` 语句，必须有一个布尔值为真才能执行代码。如果没有布尔值为真，则可能完全不执行任何代码。`if-else if` 语句等同于多个\
  \ `if` 语句，如下所示：\n\n```\nif BooleanValue {\n    // 如果为真，则执行第一组代码\n}\n\nif BooleanValue2\
  \ {\n    // 如果为真，则执行第二组代码\n}\n```\n\n使用 `if-else if` 语句，你可以根据需要检查任意数量的布尔值，例如：\n\n\
  ```\nif BooleanValue {\n    // 如果为真，则执行第一组代码\n} else if BooleanValue2 {\n    //\
  \ 如果为真，则执行第二组代码\n} else if BooleanValue3 {\n    // 如果为真，则执行第三组代码\n} else if BooleanValue4\
  \ {\n    // 如果为真，则执行第四组代码\n} else if BooleanValue5 {\n    // 如果为真，则执行第五组代码\n}\n\
  ```\n\n一旦 `if-else if` 语句发现某个布尔值为真，它就会执行花括号内的相应代码。但是，也可能所有布尔值都为假，在这种情况下，`if-else\
  \ if` 语句内的代码都不会执行。\n\n如果你希望确保至少有一组代码会执行，那么你需要在 `if-else if` 语句的末尾添加一个最终的 `else`\
  \ 子句，例如：\n\n```\nif BooleanValue {\n    // 如果为真，则执行第一组代码\n} else if BooleanValue2\
  \ {\n    // 如果为真，则执行第二组代码\n} else if BooleanValue3 {\n    // 如果为真，则执行第三组代码\n} else\
  \ if BooleanValue4 {\n    // 如果为真，则执行第四组代码\n} else if BooleanValue5 {\n    // 如果为真，则执行第五组代码\n\
  } else {\n    // 如果其他所有布尔值都为假，则执行此代码\n}\n```\n\n要了解布尔值如何与 `if-else` 语句配合工作，请按照以下步骤操作：\n\
  \n确保 `BooleanPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar BooleanValue\
  \ : Bool = false\nvar BooleanValue2 : Bool = false\nvar BooleanValue3 : Bool = false\n\
  if BooleanValue {\n    print (\"BooleanValue 为真\")\n} else if BooleanValue2 {\n\
  \    print (\"BooleanValue2 为真\")\n} else if BooleanValue3 {\n    print (\"BooleanValue3\
  \ 为真\")\n} else {\n    print (\"如果所有其他值都为假，则打印此信息\")\n}\n```\n\n请注意，因为每个布尔值都为假，所以唯一执行的代码位于\
  \ `if-else if` 语句最终 `else` 部分，如图 7-4 所示。\n\n![A978-1-4842-1233-2_7_Fig4_HTML.jpg](img/A978-1-4842-1233-2_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 运行带有多个布尔值的 `if-else if` 语句\n\n如果你将不同的布尔值改为真，可以看到 `if-else if` 语句通过执行不同的代码组而产生不同的行为。\n\
  \n关于 `if-else if` 语句：\n\n- 除非最后一部分是普通的 `else` 语句，否则可能不会执行任何代码\n- 程序可以在两组或更多组代码之间进行选择\n\
  - 可能选项的数量不限于像 `if-else` 语句那样只有两个选项\n\n由于 `if-else if` 语句检查多个布尔值，如果两个或更多布尔值为真会发生什么？在这种情况下，`if-else\
  \ if` 语句只执行与第一个为真的布尔值相关联的代码组，并忽略所有其余代码，如图 7-5 所示。\n\n![A978-1-4842-1233-2_7_Fig5_HTML.jpg](img/A978-1-4842-1233-2_7_Fig5_HTML.jpg)\n\
  \n图 7-5. 运行带有多个真布尔值的 `if-else if` 语句\n\n## switch 语句\n\n`if-else if` 语句允许你创建可能执行的两组或更多组代码。不幸的是，当需要检查的布尔值过多时，`if-else\
  \ if` 语句可能难以理解。为了解决这个问题，Swift 提供了 `switch` 语句。\n\n`switch` 语句的工作原理与 `if-else if`\
  \ 语句非常相似，只是它更易于读写。主要区别在于，`switch` 语句不是检查多个布尔值，而是检查单个变量的值。基于这个单个变量的值，`switch` 语句可以选择执行不同的代码组。\n\
  \n一个典型的 `switch` 语句如下所示：\n\n```\nswitch 值/变量/表达式 {\ncase 值 1: // 如果变量 = 值 1，则执行第一组代码\n\
  case 值 2: // 如果变量 = 值 2，则执行第二组代码\ncase 值 3: // 如果变量 = 值 3，则执行第三组代码\ndefault: //\
  \ 如果没有其他匹配，则执行第四组代码\n}\n```\n\n`switch` 语句首先检查一个固定值（例如 38 或 “Bob”）、一个代表数据的变量，或一个表达式（例如\
  \ `3 * age`，其中 `age` 是一个变量）。最终，`switch` 语句需要确定一个单一的值，并将该值与其找到的第一个匹配的 `case` 语句相匹配。一旦找到精确匹配，它就会执行与该\
  \ `case` 语句关联的一行或多行代码。\n\n要了解布尔值如何与 `case` 语句配合工作，请按照以下步骤操作：\n\n确保 `BooleanPlayground`\
  \ 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar whatNumber : Int = 3\nswitch\
  \ whatNumber {\n    case 1: print (\"数字是 1\")\n    case 2: print (\"数字是 2\")\n \
  \   case 3: print (\"数字是 3\")\n        print (\"这难道不神奇吗？\")\n    case 4: print (\"\
  数字是 4\")\n    case 5: print (\"数字是 5\")\n    default: print (\"数字未定义\")\n}\n```\n\
  \n因为 `whatNumber` 变量的值是 3，所以 `switch` 语句将其与 `case 3:` 匹配，然后执行冒号后面出现的 Swift 代码，如图\
  \ 7-6 所示。请注意，你可以在冒号后面存储多行代码，并且不需要将代码括在花括号内。更改 `whatNumber` 变量的值，看看它如何影响 `switch`\
  \ 语句的行为。\n\n![A978-1-4842-1233-2_7_Fig6_HTML.jpg](img/A978-1-4842-1233-2_7_Fig6_HTML.jpg)\n\
  \n图 7-6. 运行 `switch` 语句\n\n**注意：** 与其他编程语言（如 Objective-C）不同，你不需要使用 `break` 命令来分隔\
  \ `switch` 语句中不同 `case` 语句中存储的代码。\n\n上面的 `switch` 语句等同于：\n\n```\nif whatNumber ==\
  \ 1 {\n    print (\"数字是 1\")\n} else if whatNumber == 2 {\n    print (\"数字是 2\"\
  )\n} else if whatNumber == 3 {\n    print (\"数字是 3\")\n    print (\"这难道不神奇吗？\")\n\
  } else if whatNumber == 4 {\n    print (\"数字是 4\")\n} else if whatNumber == 5 {\n\
  \    print (\"数字是 5\")\n} else {\n    print (\"数字未定义\")\n}\n```\n\n如你所见，`switch`\
  \ 语句更简洁，更易于阅读和理解。\n\n在创建 `switch` 语句时，你必须处理所有可能性。在上面的 `switch` 语句中，`whatNumber`\
  \ 变量可以是任何整数，因此 `switch` 语句可以显式处理从 1 到 5 的任何值。如果该值不在 1 到 5 的范围内，则 `switch` 语句的 `default`\
  \ 部分会处理任何其他值。如果你未能包含 `default`，那么 Xcode 会标记你的 `switch` 语句为可能的错误。（此规则的一个例外是，如果你将\
  \ `switch` 语句与 `enum` 结构一起使用，你将稍后在本章中了解到这一点。）这样做是为了保护你的代码，防止 `switch` 语句接收到它不知道如何处理的数据时可能崩溃。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n这个 `switch` 语句的示例尝试将一个值/变量/表达式与一个确切的值进行匹配。然而，`switch`\
  \ 语句也可以尝试匹配多个值。`switch` 语句有三种方式可以检查一个值的范围：\n\n*   显式地列出所有可能的值，用逗号分隔\n*   用三个点号（`...`）定义数字范围的起点和终点\n\
  *   用两个点号和一个小于号（`..<`）定义起始数字和结束范围\n\n当一个 `case` 语句列出所有用逗号分隔的值时，只有当 `switch` 的值/变量/表达式与这些值中的一个完全匹配时，其代码才会执行。例如，考虑下面的\
  \ `case` 语句：\n\n    switch whatNumber {\n        case 1, 2, 3: print(\"The number\
  \ is 1, 2, or 3\")\n        default: print(\"The number is undefined\")\n    }\n\
  \n只有当 `whatNumber` 的值是 1、2 或 3 时，它的代码才会打印 “The number is 1, 2, or 3。”\n\n对于少量数字，显式列出所有可能的值还可以接受，但对于多个数字，写出每一个可能的数字就会变得繁琐。作为一种快捷方式，Swift\
  \ 允许你指定一个范围。如果你想匹配 4 到 20 之间的数字，`switch` 语句的 `case` 部分可能如下所示：\n\n    switch whatNumber\
  \ {\n        case 4...20: print(\"The number is between 4 and 20\")\n        default:\
  \ print(\"The number is undefined\")\n    }\n\n在这种情况下，`whatNumber` 可以是 4、20 或介于它们之间的任何数字。三个点号表示一个范围，该范围包含起始和结束数字（4\
  \ 和 20）。\n\nSwift 还可以检查一个半开范围，它由两个点号和一个小于号组成，例如：\n\n    switch whatNumber {\n  \
  \      case 20..<49: print(\"The number is between 20 and 48\")\n        default:\
  \ print(\"The number is undefined\")\n    }\n\n这个 `20..<49` 的半开范围仅在 `whatNumber`\
  \ 是 20、48 或介于它们之间的任何数字时才匹配。注意，如果 `whatNumber` 是 49，它将不匹配这个半开范围，但如果 `whatNumber`\
  \ 是 20，则会匹配。\n\n要了解多值匹配的这三种变体是如何工作的，请按照以下步骤操作：\n\n确保在 Xcode 中加载了 `BooleanPlayground`\
  \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar whatNumber: Int = 49\nswitch whatNumber\
  \ {\n    case 1, 2, 3: print(\"The number is 1\")\n        print(\"Isn’t this amazing?\"\
  )\n    case 4...20: print(\"The number is between 4 and 20\")\n    case 20..<49:\
  \ print(\"The number is between 20 and 48\")\n    default: print(\"The number is\
  \ undefined\")\n}\n```\n\n当值为 49 时，`switch` 语句未匹配任何内容，因此它使用了 `switch` 语句的 `default`\
  \ 部分，如图 7-7 所示。\n\n![A978-1-4842-1233-2_7_Fig7_HTML.jpg](img/A978-1-4842-1233-2_7_Fig7_HTML.jpg)\n\
  \n**图 7-7.** 运行检查多个值的 switch 语句\n\n将 `whatNumber` 变量的值更改为 2、12 和 48，以查看 `switch`\
  \ 语句如何匹配不同的值。\n\n## 在枚举数据结构中使用 switch 语句\n\n`switch` 语句通常用于检查特定的值，例如字符串或数字。然而，`switch`\
  \ 语句的一个常见用途是与一种称为 `enum`（“enumeration”的缩写）的数据结构一起使用。`enum` 数据结构允许你创建一个由不同数据组成的列表，并为其赋予描述性名称，例如：\n\
  \n    enum dog {\n        case poodle\n        case collie\n        case terrier\n\
  \        case mutt\n    }\n\n上面的 `enum` 数据结构创建了一个名为 “dog” 的数据类型，它只能保存四个值之一：`poodle`、`collie`、`terrier`\
  \ 或 `mutt`。要使用 `enum` 数据结构，你需要创建一个变量或常量，例如：\n\n    var myPet = dog.collie\n\n上面的代码定义了一个名为\
  \ “myPet” 的变量，并为其赋值为 `dog.collie`。如果你想检查 `myPet` 变量的值，你可以使用像这样的 `switch` 语句：\n\n\
  \    switch myPet {\n        case .poodle:\n            print(\"Poodle\")\n    \
  \    case .collie:\n            print(\"Collie\")\n        case .terrier:\n    \
  \        print(\"Terrier\")\n        case .mutt:\n            print(\"Mutt\")\n\
  \    }\n\n要了解 `switch` 语句如何与 `enum` 数据结构一起工作，请按照以下步骤操作：\n\n确保在 Xcode 中加载了 `BooleanPlayground`\
  \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nenum dog {\n    case poodle\n    case collie\n\
  \    case terrier\n    case mutt\n}\nvar myPet = dog.collie\nswitch myPet {\n  \
  \  case .poodle:\n        print(\"Poodle\")\n    case .collie:\n        print(\"\
  Collie\")\n    case .terrier:\n        print(\"Terrier\")\n    case .mutt:\n   \
  \     print(\"Mutt\")\n}\n```\n\n`switch` 语句仅查看 `myPet` 变量持有的是由 `enum` 数据结构指定的哪一个可能的值。由于该值是\
  \ `.collie`，因此 `switch` 语句打印出 “Collie”，如图 7-8 所示。\n\n![A978-1-4842-1233-2_7_Fig8_HTML.jpg](img/A978-1-4842-1233-2_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.** 运行检查多个值的 switch 语句\n\n\n\n## 在 OS X 程序中做决策\n\n使用 playground 文件测试 Swift\
