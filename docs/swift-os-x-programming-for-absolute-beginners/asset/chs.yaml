  \n## 使用组合框\n\n文本字段允许用户输入任何内容，而弹出按钮则显示固定的选项范围。当你希望显示固定的选项范围并允许用户输入文本时，就可以使用组合框。\n\
  \n组合框基于 `NSComboBox` 类，而该类又基于定义所有文本字段的 `NSTextField` 类。因此，你可以使用 `intValue`、`floatValue`、`doubleValue`\
  \ 或 `stringValue` 属性从组合框中检索值。\n\n使用组合框时，有两种方式填充其弹出选项列表。首先，你可以使用“显示属性检查器”面板创建一个内部列表。其次，你可以使用外部数据源，使组合框从数据库文件或通过互联网检索数据。\n\
  \n\n\n### 创建内部列表\n\n当你事先确切知道要在组合框中存储多少个项目以及具体是哪些项目时（例如国家列表或产品名称列表），内部列表是最佳选择。要创建内部列表，请遵循以下步骤：\n\
  \n在程序界面上放置一个组合框。点击选中该组合框。选择 `View ➤ Utilities ➤ Show Attributes Inspector`。“Items”列表将出现，如图\
  \ 17-9 所示。\n\n![A978-1-4842-1233-2_17_Fig9_HTML.jpg](img/A978-1-4842-1233-2_17_Fig9_HTML.jpg)\n\
  \n图 17-9. “Items”列表允许你定义要在组合框中显示的项目\n\n要编辑列表中的现有项目，点击该项目将其选中，然后按下 `Return` 键。现在你就可以编辑文本了。\n\
  \n要移除现有项目，点击该项目将其选中，然后点击减号图标。\n\n要添加新项目，点击加号图标。然后点击新添加的项目，按下 `Return` 键，并编辑文本。\n\
  \n“Visible Items”文本字段定义了组合框菜单显示的项目数量。\n\n“Autocompletes”复选框允许组合框显示其列表中与用户开始输入内容相匹配的项目。因此，如果用户输入一个字母，自动完成功能会显示组合框列表中所有以该字母开头的项目。\n\
  \n“Uses Data Source”复选框决定组合框是使用其内部“Items”列表来显示菜单项，还是从其他来源检索数据。如果选中了“Uses Data Source”复选框，那么你需要编写\
  \ Swift 代码来填充组合框数据。\n\n要了解如何使用内部列表填充组合框，请遵循以下步骤：\n\n选择 `View ➤ Assistant Editor\
  \ ➤ Show Assistant Editor`。Xcode 会在用户界面旁边显示 `AppDelegate.swift` 文件。将鼠标指针移到组合框上，按住\
  \ `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件中 `IBOutlet` 行的下方。松开 `Control` 键和鼠标。此时会弹出一个窗口。点击“Name”文本字段，输入\
  \ `myCombo`，然后点击“Connect”按钮。将鼠标指针移到标签上，按住 `Control` 键，将鼠标拖到 `AppDelegate.swift`\
  \ 文件中 `IBOutlet` 行的下方。松开 `Control` 键和鼠标。此时会弹出一个窗口。点击“Name”文本字段，输入 `comboResult`，然后点击“Connect”按钮。现在你应该拥有这两个\
  \ `IBOutlet`：\n\n在 Xcode 中选择 `File ➤ New ➤ Project`。在 OS X 类别下点击“Application”。点击“Cocoa\
  \ Application”，然后点击“Next”按钮。Xcode 现在会要求输入产品名称。点击“Product Name”文本字段，输入 `ComboProgram`。确保“Language”弹出菜单显示为\
  \ Swift，并且所有复选框均为清除状态且未选中。点击“Next”按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存储项目，然后点击“Create”按钮。在项目导航窗格中点击\
  \ `MainMenu.xib` 文件。点击“ComboProgram”图标以显示用户界面窗口。将一个“Combo Box”、一个“Push Button”和一个\
  \ Label 拖到用户界面上，并加宽标签，使其看起来如图 17-10 所示。\n\n![A978-1-4842-1233-2_17_Fig10_HTML.jpg](img/A978-1-4842-1233-2_17_Fig10_HTML.jpg)\n\
  \n图 17-10. `ComboProgram` 的用户界面\n\n```\n@IBOutlet weak var myCombo: NSComboBox!\n\
  @IBOutlet weak var comboResult: NSTextField!\n```\n\n将鼠标指针移到 Push Button 上，按住 `Control`\
  \ 键，将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开 `Control` 键和鼠标。此时会弹出一个窗口。点击“Connection”弹出菜单，选择“Action”。点击“Name”文本字段，输入\
  \ `showResult`。点击“Type”弹出菜单，选择 `NSButton`。然后点击“Connect”按钮。Xcode 会创建一个空的 `IBAction`\
  \ 方法。按如下方式修改此 `IBAction` 方法：\n\n```\n@IBAction func showResult(sender: NSButton)\
  \ {\n    comboResult.stringValue = myCombo.stringValue\n}\n```\n\n选择 `Product ➤\
  \ Run`。你的用户界面会显示出来。点击组合框并输入 `Hello`。点击 Push Button。单词 `Hello` 会出现在标签中。点击组合框右侧边缘的向下箭头以显示其项目列表。由于我们没有修改默认列表，组合框列表包含三个项目，分别标记为\
  \ `Item 1`、`Item 2` 和 `Item 3`。点击 `Item 3`，然后点击 Push Button。下方的标签会显示 `Item 3`。选择\
  \ `ComboProgram ➤ Quit ComboProgram`。\n\n此示例使用了组合框的默认项目列表。尝试添加或修改此组合框项目列表，并选中“Autocompletes”复选框，以了解这些选项如何修改组合框的行为。\n\
  \n\n\n### 使用数据源\n\n当组合框需要显示可能随时间变化的数据时（例如显示来自数据库的信息列表），使用数据源是最佳方式。要使用数据源，你需要编写 Swift\
  \ 代码。首先，你需要在类中遵循 `NSComboBoxDataSource` 协议，如下所示：\n\n```\nclass AppDelegate: NSObject,\
  \ NSApplicationDelegate, NSComboBoxDataSource {\n```\n\n接下来，你需要编写两个函数。一个函数需要计算要在组合框中显示的项数。第二个函数需要检索数据以插入到组合框的项列表中。\n\
  \n最后，你需要指定一个数据源（包含你想在组合框中显示的数据的文件），并确保在“显示属性检查器”窗格中选中了组合框的 `usesDataSource` 属性，或者通过\
  \ Swift 代码将其设置为 `true`。\n\n要了解数据源如何将项列表填充到组合框中，请按以下步骤操作：\n\n确保 `ComboProgram` 项目已在\
  \ Xcode 中加载。修改类名以包含 `NSComboBoxDataSource` 协议，如下所示：\n\n```\nclass AppDelegate: NSObject,\
  \ NSApplicationDelegate, NSComboBoxDataSource {\n```\n\n在“项目导航器”窗格中点击 `AppDelegate.swift`\
  \ 文件。在 `IBOutlet` 行下方，添加以下行以创建一个将填充组合框项列表的字符串数组：\n\n```\nlet myArray = [\"三明治\"\
  , \"薯片\", \"苏打水\", \"沙拉\"]\n```\n\n修改 `applicationDidFinishLaunching` 函数，如下所示：\n\
  \n```\nfunc applicationDidFinishLaunching(aNotification: NSNotification) {\n\n \
  \   // 在此处插入代码以初始化你的应用程序\n    myCombo.dataSource = self\n    myCombo.usesDataSource\
  \ = true\n    numberOfItemsInComboBox(myCombo)\n    comboBox(myCombo, objectValueForItemAtIndex:\
  \ 0)\n\n}\n```\n\n这段 Swift 代码将组合框的数据源（由 `myCombo` IBOutlet 标识）定义为 `self`，这意味着同一个类同时也是数据源。它确保\
  \ `usesDataSource` 属性为 `true` 以使用数据源。然后它调用了由 `NSComboBoxDataSource` 协议定义的两个函数。\n\
  \n在 IBAction 方法上方，添加以下两个函数实现：\n\n```\nfunc numberOfItemsInComboBox(aComboBox: NSComboBox)\
  \ -> Int {\n    return myArray.count\n}\n\nfunc comboBox(aComboBox: NSComboBox,\
  \ objectValueForItemAtIndex index: Int) -> AnyObject {\n    return myArray[index]\n\
  }\n```\n\n`numberOfItemsInComboBox` 函数计算 `myArray` 数组中的所有项并返回该整数。`comboBox` 函数将每个数组项放入组合框的项列表中。\n\
  \n选择“产品”➤“运行”。点击组合框向下的箭头。注意其项列表包含了 `myArray` 中定义的项（“三明治”、“薯片”、“苏打水”和“沙拉”）。在组合框中点击“三明治”以选中它，然后点击按钮。注意下方的标签显示“三明治”。选择“ComboProgram”➤“退出\
  \ ComboProgram”。\n\n这个简单的程序展示了如何从另一个数据源（本例中是一个名为 `myArray` 的数组）检索项列表，以填充组合框的项列表。`AppDelegate.swift`\
  \ 文件的完整代码应如下所示：\n\n```\nimport Cocoa\n\n@NSApplicationMain\nclass AppDelegate: NSObject,\
  \ NSApplicationDelegate, NSComboBoxDataSource {\n\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet weak var\
  \ comboResult: NSTextField!\n\n    let myArray = [\"三明治\", \"薯片\", \"苏打水\", \"沙拉\"\
  ]\n\n    func applicationDidFinishLaunching(aNotification: NSNotification) {\n \
  \       // 在此处插入代码以初始化你的应用程序\n        myCombo.usesDataSource = true\n        myCombo.dataSource\
  \ = self\n        numberOfItemsInComboBox(myCombo)\n        comboBox(myCombo, objectValueForItemAtIndex:\
  \ 0)\n    }\n\n    func applicationWillTerminate(aNotification: NSNotification)\
  \ {\n        // 在此处插入代码以终止应用程序\n    }\n\n    func numberOfItemsInComboBox(aComboBox:\
  \ NSComboBox) -> Int {\n        return myArray.count\n    }\n\n    func comboBox(aComboBox:\
  \ NSComboBox, objectValueForItemAtIndex index: Int) -> AnyObject {\n        return\
  \ myArray[index]\n    }\n\n    @IBAction func showResult(sender: NSButton) {\n \
  \       comboResult.stringValue = myCombo.stringValue\n    }\n\n}\n```\n\n## 总结\n\
  \n文本字段允许用户输入任何内容，例如数字或字符串，因此文本字段提供了多个属性（`intValue`、`floatValue`、`doubleValue` 和\
  \ `stringValue`）以将输入的信息存储为适当的数据类型。要限制用户可能输入的数字信息，你可以使用数字格式化器来定义最小值和/或最大值，同时定义用户可以输入数字数据的不同方式，例如使用百分号或货币符号。\n\
  \n除了普通的文本字段外，Xcode 还提供了几种用于特定目的的文本字段变体。标签仅用于显示文本，不允许用户编辑显示的文本。安全文本字段会屏蔽输入的数据，以防止被窥视。令牌字段将输入的数据显示为组或令牌，而搜索字段则提供了一个属性来记住之前输入的数据。\n\
  \n组合框结合了文本字段和弹出按钮的功能。组合框可以显示一个有效选项列表，用户可以点击这些选项，也可以自行输入数据。你可以在“显示属性检查器”窗格中定义组合框的选项列表，也可以从其他来源（如数组）检索数据。\n\
  \n文本字段和组合框的主要目的是让用户能够输入任何类型的数据。当用户输入数据时，你可能需要编写 Swift 代码来验证输入的数据对你的程序是否确实有效。\n\n"
- "# 18. 使用警告和面板\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_18](http://dx.doi.org/10.1007/978-1-4842-1233-2_18))\
  \ 包含补充材料，可供授权用户使用。\n\n在每个程序中，你都需要设计程序的独特功能，同时让 Cocoa 框架负责让你的程序看起来和表现得像标准的 OS X 程序。几乎所有\
  \ OS X 程序的两个常见功能是警告和面板。\n\n警告通常会弹出在屏幕上以通知用户，例如要求用户确认删除文件，或提醒用户出现问题。面板显示常见的用户界面项目，例如\
  \ OS X 程序通常显示打印面板以提供打印选项，或用于选择文件的打开面板。\n\n通过使用警告和面板，你可以添加常见的 OS X 用户界面元素，而无需创建自己的用户界面或编写\
  \ Swift 代码。警告和面板是 Cocoa 框架的一部分，你的 OS X 程序可以使用它们来创建标准的 OS X 用户界面。\n\n\n\n## 使用提醒\n\
  \n提醒功能基于 Cocoa 框架中的 `NSAlert` 类。在最简单的层面上，你可以用两行 Swift 代码创建一个提醒：\n\n```\nvar myAlert\
  \ = NSAlert()\nmyAlert.runModal()\n```\n\n第一行声明了一个基于 `NSAlert` 类的名为 `myAlert` 的对象。接着第二行使用\
  \ `runModal()` 方法来显示该提醒。当提醒出现时，它被认为是模态的，这意味着在用户关闭提醒之前，应用不会让用户执行任何其他操作。\n\n上述两行代码创建了一个通用的提醒，它显示一个“确定”按钮、一个通用图形图像和一条通用文本消息，如图\
  \ 18-1 所示。\n\n![A978-1-4842-1233-2_18_Fig1_HTML.jpg](img/A978-1-4842-1233-2_18_Fig1_HTML.jpg)\n\
  \n图 18-1. 创建一个通用提醒\n\n要自定义提醒，你可以修改以下属性：\n\n- `messageText` – 以粗体显示主要提醒消息。在图 18-1\
  \ 中，“Alert”就是 `messageText`。\n- `informativeText` – 在 `messageText` 正下方显示非粗体文本。在图\
  \ 18-1 中，没有 `informativeText`。\n- `icon` – 显示一个图标。默认情况下，图标是程序的图标。\n- `alertStyle`\
  \ – 当设置为 `NSAlertStyle.CriticalAlertStyle` 时，显示一个关键图标。否则显示默认的提醒图标。\n- `showsSuppressionButton`\
  \ – 显示一个复选框，其默认文本为“不再显示此消息”，除非定义了 `suppressionButton?.title`。\n- `suppressionButton?.title`\
  \ – 用自定义文本替换复选框的默认文本（“不再显示此消息”）。\n\n要了解如何自定义提醒，请按照以下步骤操作：\n\n在 Xcode 中，选择“文件” ➤\
  \ “新建” ➤ “项目”。在“OS X”分类下点击“应用程序”。点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。点击“产品名称”文本字段，然后输入\
  \ `AlertProgram`。确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。点击“下一步”按钮。Xcode 会询问你想在哪里存储项目。选择一个文件夹来存储你的项目，然后点击“创建”按钮。在项目导航器中点击\
  \ `MainMenu.xib` 文件。你的程序用户界面就会出现。点击 `AlertProgram` 图标以显示你程序用户界面的窗口。选择“视图” ➤ “工具”\
  \ ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。将一个“下压按钮”拖到用户界面窗口上。选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。`AppDelegate.swift`\
  \ 文件会出现在你的用户界面旁边。将鼠标指针移到下压按钮上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开\
  \ Control 键和鼠标按钮。会弹出一个窗口。点击“连接”弹出菜单，然后选择“操作”。点击“名称”文本字段，然后输入 `showAlert`。点击“类型”弹出菜单，选择\
  \ `NSButton`，然后点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。按如下方式修改 `IBAction` 方法：\n\n```\n\
  @IBAction func showAlert(sender: NSButton) {\n    var myAlert = NSAlert()\n    myAlert.messageText\
  \ = \"Warning!\"\n    myAlert.informativeText = \"Zombies approaching\"\n    myAlert.alertStyle\
  \ = NSAlertStyle.CriticalAlertStyle\n    myAlert.showsSuppressionButton = true\n\
  \    myAlert.suppressionButton?.title = \"Stop scaring me\"\n    myAlert.runModal()\n\
  }\n```\n\n点击提醒上的“确定”按钮使其消失。选择“AlertProgram” ➤ “退出 AlertProgram”。选择“产品” ➤ “运行”。你的用户界面就会出现。点击下压按钮。会显示一个提醒，如图\
  \ 18-2 所示。\n\n![A978-1-4842-1233-2_18_Fig2_HTML.jpg](img/A978-1-4842-1233-2_18_Fig2_HTML.jpg)\n\
  \n图 18-2. 显示一个自定义提醒\n\n### 从提醒处获取反馈\n\n提醒通常只显示一个“确定”按钮，以便用户可以关闭提醒。然而，提醒可以通过以下两种方式之一从用户处获取反馈：\n\
  \n- 选择抑制复选框\n- 点击“确定”按钮以外的按钮\n\n要判断用户是否选择了抑制复选框，你需要访问 `suppressionButton!.state`\
  \ 属性。如果复选框被选中，`suppressionButton!.state` 属性的值为 1。如果复选框未被选中，该属性的值为 0。\n\n从提醒处获取反馈的第二种方式是在提醒上显示两个或更多按钮。要向提醒添加更多按钮，你需要使用\
  \ `addButtonWithTitle` 方法。然后，要确定用户点击了哪个按钮，你需要使用 `NSAlertFirstButtonReturn`、`NSAlertSecondButtonReturn`\
  \ 或 `NSAlertThirdButtonReturn` 常量。\n\n如果你的提醒上有四个或更多按钮，你可以通过使用 `NSAlertThirdButtonReturn\
  \ + 1` 来检测第四个按钮，使用 `NSAlertThirdButtonReturn + 2` 来检测第五个按钮，以此类推，处理第三个按钮之后的每个额外按钮。\n\
  \n要了解如何在提醒中识别用户选择了哪些选项，请按照以下步骤操作：\n\n确保你的 `AlertProgram` 项目已在 Xcode 中加载。在“项目导航器”窗格中点击\
  \ `AppDelegate.swift` 文件。按如下方式修改 `IBAction showAlert` 方法：\n\n```\n@IBAction func\
  \ showAlert(sender: NSButton) {\n    var myAlert = NSAlert()\n    myAlert.messageText\
  \ = \"Warning!\"\n    myAlert.informativeText = \"Zombies approaching\"\n    myAlert.alertStyle\
  \ = NSAlertStyle.CriticalAlertStyle\n    myAlert.showsSuppressionButton = true\n\
  \    myAlert.suppressionButton?.title = \"Stop scaring me\"\n    myAlert.addButtonWithTitle(\"\
  Ignore it\")\n    myAlert.addButtonWithTitle(\"Run\")\n    myAlert.addButtonWithTitle(\"\
  Panic\")\n    myAlert.addButtonWithTitle(\"Do nothing\")\n    let choice = myAlert.runModal()\n\
  \    switch choice {\n    case NSAlertFirstButtonReturn:\n        print (\"User\
  \ clicked Ignore it\")\n    case NSAlertSecondButtonReturn:\n        print (\"User\
  \ clicked Run\")\n    case NSAlertThirdButtonReturn:\n        print (\"User clicked\
  \ Panic\")\n    case NSAlertThirdButtonReturn + 1:\n        print (\"User clicked\
  \ Do nothing\")\n    default: break\n    }\n    if myAlert.suppressionButton!.state\
  \ == 1 {\n        print (\"Checked\")\n    } else {\n        print (\"Not checked\"\
  )\n    }\n}\n```\n\n`addButtonWithTitle` 方法在提醒上创建按钮，其中第一个 `addButtonWithTitle` 方法创建一个默认按钮，其他的\
  \ `addButtonWithTitle` 方法创建额外的按钮。为了捕获用户点击的按钮，上述代码创建了一个名为“choice”的常量。\n\n然后它使用一个\
  \ switch 语句来识别用户点击了哪个按钮。请注意，第四个按钮是通过在 `NSAlertThirdButtonReturn` 常量上加 1 来标识的。\n\n\
  `suppressionButton!.state` 属性检查用户是否选择了出现在提醒上的复选框。如果其值为 1，则表示用户选中了该复选框。否则，如果其值为 0，则表示复选框未被选中。\n\
  \n点击“Stop scaring me”复选框以选中它。点击其中一个按钮，例如“Panic”或“Run”。无论你点击哪个按钮，提醒都会消失。选择“AlertProgram”\
  \ ➤ “退出 AlertProgram”。Xcode 会再次出现，并在调试区域中显示文本，例如“User clicked Panic”和“Checked”。选择“产品”\
  \ ➤ “运行”。你的用户界面就会出现。点击该按钮。提醒如图 18-3 所示。\n\n![A978-1-4842-1233-2_18_Fig3_HTML.jpg](img/A978-1-4842-1233-2_18_Fig3_HTML.jpg)\n\
  \n图 18-3. 由 Swift 代码创建的提醒\n\n\n\n### 以工作表形式显示警告\n\n警告通常以模态对话框的形式出现，它会创建一个独立于主程序窗口并可单独移动的窗口。另一种显示警告的方式是作为工作表，它看起来像是从当前活动窗口的标题栏向下展开。\n\
  \n要使警告以工作表形式显示，你需要使用 `beginSheetModalForWindow` 方法，如下所示：\n\n`alertObject.beginSheetModalForWindow(window,\
  \ completionHandler: closure)`\n\n第一个参数定义了你希望工作表出现的窗口。在 `AlertProgram` 项目中，代表用户界面窗口的\
  \ `IBOutlet` 被称为 `window`。第二个参数是完成处理器的标签，它标识了一个称为闭包的特殊函数的名称。\n\n闭包代表了一种编写函数的简写方式。不必像这样以传统方式编写函数：\n\
  \n```\nfunc functionName(parameters) -> Type {\n// 在此处插入代码\nreturn value\n}\n```\n\
  \n你可以像这样编写闭包：\n\n```\nlet closureName = { (parameters) -> Type in\n// 在此处插入代码\n\
  }\n```\n\n要了解如何将警告转换为工作表并使用闭包，请遵循以下步骤：\n\n确保你的 `AlertProgram` 项目已在 Xcode 中加载。在项目导航窗格中点击\
  \ `AppDelegate.swift` 文件。修改 `IBAction showAlert` 方法如下：\n\n```\n@IBAction func showAlert(sender:\
  \ NSButton) {\nvar myAlert = NSAlert()\nmyAlert.messageText = \"警告！\"\nmyAlert.informativeText\
  \ = \"僵尸正在逼近\"\nmyAlert.alertStyle = NSAlertStyle.CriticalAlertStyle\nmyAlert.showsSuppressionButton\
  \ = true\nmyAlert.suppressionButton?.title = \"别再吓我了\"\nmyAlert.addButtonWithTitle(\"\
  忽略它\")\nmyAlert.addButtonWithTitle(\"逃跑\")\nmyAlert.addButtonWithTitle(\"恐慌\")\n\
  myAlert.addButtonWithTitle(\"什么都不做\")\nlet myCode = { (choice:NSModalResponse) ->\
  \ Void in\nswitch choice {\ncase NSAlertFirstButtonReturn:\nprint (\"用户点击了“忽略它”\"\
  )\ncase NSAlertSecondButtonReturn:\nprint (\"用户点击了“逃跑”\")\ncase NSAlertThirdButtonReturn:\n\
  print (\"用户点击了“恐慌”\")\ncase NSAlertThirdButtonReturn + 1:\nprint (\"用户点击了“什么都不做”\"\
  )\ndefault: break\n}\nif myAlert.suppressionButton!.state == 1 {\nprint (\"已勾选\"\
  )\n} else {\nprint (\"未勾选\")\n}\n}\nmyAlert.beginSheetModalForWindow(window, completionHandler:\
  \ myCode)\n}\n```\n\n点击“别再吓我了”复选框以选中它。点击其中一个按钮，例如“恐慌”或“逃跑”。无论你点击哪个按钮，警告都会消失。选择 **AlertProgram**\
  \ ➤ **退出 AlertProgram**。Xcode 重新出现，并在调试区域显示文本，例如 `User clicked Run` 和 `Checked`。选择\
  \ **产品** ➤ **运行**。用户界面出现。点击该按钮。现在请注意，警告会像图 18-4 所示的那样以工作表形式下拉。\n\n![A978-1-4842-1233-2_18_Fig4_HTML.jpg](img/A978-1-4842-1233-2_18_Fig4_HTML.jpg)\n\
  \n**图 18-4.** 作为工作表的警告\n\n在上述 Swift 代码中，闭包定义如下：\n\n```\nlet myCode = { (choice:NSModalResponse)\
  \ -> Void in\nswitch choice {\ncase NSAlertFirstButtonReturn:\nprint (\"用户点击了“忽略它”\"\
  )\ncase NSAlertSecondButtonReturn:\nprint (\"用户点击了“逃跑”\")\ncase NSAlertThirdButtonReturn:\n\
  print (\"用户点击了“恐慌”\")\ncase NSAlertThirdButtonReturn + 1:\nprint (\"用户点击了“什么都不做”\"\
  )\ndefault: break\n}\nif myAlert.suppressionButton!.state == 1 {\nprint (\"已勾选\"\
  )\n} else {\nprint (\"未勾选\")\n}\n}\n```\n\n然而，你也可以将闭包内联放置，这意味着完成处理器不是标识闭包名称，而是直接将闭包本身放在那个位置。因此，在上述代码中，`beginSheetModalForWindow`\
  \ 方法通过名称调用闭包，如下所示：\n\n`myAlert.beginSheetModalForWindow(window, completionHandler:\
  \ myCode)`\n\n你可以将闭包名称“`myCode`”替换为实际的闭包代码，如下所示：\n\n`myAlert.beginSheetModalForWindow(window,\
  \ completionHandler: { (choice:NSModalResponse) -> Void in`\n\n```\nswitch choice\
  \ {\ncase NSAlertFirstButtonReturn:\nprint (\"用户点击了“忽略它”\")\ncase NSAlertSecondButtonReturn:\n\
  print (\"用户点击了“逃跑”\")\ncase NSAlertThirdButtonReturn:\nprint (\"用户点击了“恐慌”\")\ncase\
  \ NSAlertThirdButtonReturn + 1:\nprint (\"用户点击了“什么都不做”\")\ndefault: break\n}\nif\
  \ myAlert.suppressionButton!.state == 1 {\nprint (\"已勾选\")\n} else {\nprint (\"\
  未勾选\")\n}\n```\n\n`})`\n\n在方法中直接内联放置闭包可以缩短你需要编写的代码量，但可能以牺牲整体代码的可读性为代价。通过名称分离闭包，然后按名称调用它，可以让你在程序的其他地方更容易地重用该闭包（如果需要），但也会迫使你编写更多代码，不过代码会更清晰。\n\
  \n选择你最喜欢的方法，但就像编程的各个方面一样，坚持使用一种风格，以便日后如果你不在场解释代码的运行方式，其他程序员也能轻松理解你的代码。\n\n## 使用面板\n\
  \n面板代表了 OS X 程序所需的常见用户界面元素，例如显示一个“打开”面板让用户选择要打开的文件，以及一个“保存”面板让用户选择文件夹来存储文件。“打开”面板基于\
  \ `NSOpenPanel` 类，而“保存”面板基于 `NSSavePanel` 类。\n\n\n\n### 创建打开面板\n\n打开面板让用户可以选择要打开的文件。如果用户选择了文件，打开面板需要返回一个文件名。打开面板使用的一些属性包括：\n\
  \n- `canChooseFiles` – 允许用户选择一个文件。\n- `canChooseDirectories` – 允许用户选择一个文件夹或目录。\n\
  - `allowsMultipleSelection` – 允许用户选择多个项目。\n- `URLs` – 保存所选项目的名称。如果`allowsMultipleSelection`属性设置为`true`，则`URLs`属性保存一个项目数组。否则，它保存单个项目。\n\
  \n要了解如何使用打开面板，请按照以下步骤操作：\n\n在 Xcode 中选择 File ➤ New ➤ Project。在 OS X 类别下点击 Application。点击\
  \ Cocoa Application，然后点击 Next 按钮。Xcode 现在会要求您输入产品名称。点击 Product Name 文本字段并输入`PanelProgram`。确保\
  \ Language 弹出菜单显示 Swift，并且未选中任何复选框。点击 Next 按钮。Xcode 会询问您希望将项目存储在哪里。选择一个文件夹来存储您的项目，然后点击\
  \ Create 按钮。在 Project Navigator 中点击`MainMenu.xib`文件。您的程序用户界面将出现。点击`PanelProgram`图标以显示程序用户界面的窗口。选择\
  \ View ➤ Utilities ➤ Show Object Library。Object Library 会出现在 Xcode 窗口的右下角。将一个 Push\
  \ Button 拖到用户界面窗口上，双击它以将其标题更改为 Open。选择 View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor。`AppDelegate.swift`文件会出现在您的用户界面旁边。将鼠标指针移到按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开\
  \ Control 键和鼠标按钮。会弹出一个窗口。点击 Connect 弹出菜单并选择 Action。点击 Name 文本字段并输入`openPanel`。点击\
  \ Type 弹出菜单，选择`NSButton`，然后点击 Connect 按钮。Xcode 会创建一个空的 IBAction 方法。按如下所示修改 IBAction\
  \ 方法：\n\n```\n@IBAction func openPanel(sender: NSButton) {\n    var myOpen = NSOpenPanel()\n\
  \    myOpen.canChooseFiles = true\n    myOpen.canChooseDirectories = true\n    myOpen.allowsMultipleSelection\
  \ = true\n    myOpen.beginWithCompletionHandler { (result) -> Void in\n        if\
  \ result == NSFileHandlingPanelOKButton {\n            print (myOpen.URLs)\n   \
  \     }\n    }\n}\n```\n\n选择 Product ➤ Run。用户界面将出现。点击该按钮。一个打开面板将出现，如图 18-5 所示。\n\
  \n![A978-1-4842-1233-2_18_Fig5_HTML.jpg](img/A978-1-4842-1233-2_18_Fig5_HTML.jpg)\n\
  \n图 18-5。\n\n打开面板。按住 Command 键并点击两个不同的项目，例如两个不同的文件，或一个文件和一个文件夹。点击 Open 按钮。选择 PanelProgram\
  \ ➤ Quit PanelProgram。Xcode 将再次出现。在 Debug 区域，您应该会看到您所选择的文件/文件夹列表。\n\n注意：打开面板仅用于选择文件/文件夹，您仍然需要编写\
  \ Swift 代码来实际打开用户选择的任何文件。\n\n### 创建保存面板\n\n保存面板的外观与打开面板相似，但其目的是让用户选择一个文件夹并定义一个文件名来保存。如果用户选择了文件，保存面板需要返回一个文件名。保存面板使用的一些属性包括：\n\
  \n- `title` – 在保存面板顶部显示文本。如果未定义，默认显示“Save”。\n- `prompt` – 在默认按钮上显示文本。\n- `URL` –\
  \ 保存用户选择的路径名和文件名。\n- `nameFieldStringValue` – 仅保存用户选择的文件名。\n\n要了解如何使用保存面板，请按照以下步骤操作：\n\
  \n确保`PanelProgram`已加载到 Xcode 中。在 Project Navigator 窗格中点击`MainMenu.xib`文件。将一个 Push\
  \ Button 拖到用户界面上，双击它以将其标题更改为 Save。选择 View ➤ Assistant Editor ➤ Show Assistant Editor。Xcode\
  \ 会在用户界面旁边显示`AppDelegate.swift`文件。将鼠标指针移到 Save 按钮上，按住 Control 键，然后将鼠标拖到`AppDelegate.swift`文件中`IBOutlet`行下方。松开\
  \ Control 键和鼠标。会弹出一个窗口。点击 Connection 弹出菜单并选择 Action。点击 Name 文本字段，输入`savePanel`，然后点击\
  \ Connect 按钮。点击 Type 弹出菜单并选择`NSButton`。然后点击 Connect 按钮。Xcode 会创建一个空的 IBAction 方法。按如下所示修改此\
  \ IBAction 方法：\n\n```\n@IBAction func savePanel(sender: NSButton) {\n    var mySave\
  \ = NSSavePanel()\n    mySave.title = \"Save a File Here\"\n    mySave.prompt =\
  \ \"Save Me\"\n    mySave.beginWithCompletionHandler { (result) -> Void in\n   \
  \     if result == NSFileHandlingPanelOKButton {\n            print (mySave.URL)\n\
  \            print (mySave.nameFieldStringValue)\n        }\n    }\n}\n```\n\n选择\
  \ Product ➤ Run。您的用户界面将出现。点击 Save 按钮。一个保存面板将出现，如图 18-6 所示。请注意，`title`属性创建了显示在保存面板顶部的文本，而`prompt`属性创建了显示在保存面板右下角默认按钮上的文本。\n\
  \n![A978-1-4842-1233-2_18_Fig6_HTML.jpg](img/A978-1-4842-1233-2_18_Fig6_HTML.jpg)\n\
  \n图 18-6。\n\n紧凑型保存面板。点击“Save As”文本字段最右侧出现的 Expand 按钮。保存面板将展开，如图 18-7 所示。\n\n![A978-1-4842-1233-2_18_Fig7_HTML.jpg](img/A978-1-4842-1233-2_18_Fig7_HTML.jpg)\n\
  \n图 18-7。\n\n展开后的保存面板。点击“Save As”文本字段并输入`TestFile`。点击 Save Me 按钮。选择 PanelProgram\
  \ ➤ Quit PanelProgram。Xcode 窗口将再次出现。在 Xcode 窗口底部的 Debug Area 中，您应该会看到您所选择的文件和文件夹的完整路径名，以及您输入的完整文件名。\n\
  \n## 总结\n\n在设计标准的 OS X 用户界面时，您不必自己创建所有内容。通过利用 Cocoa 框架，您可以创建外观和行为与其他 OS X 程序相似的警告和面板，而无需编写太多额外的代码。\n\
  \n警告让您可以向用户显示简短的消息，例如警告。您可以使用文本和图形自定义警告，并在警告上放置两个或更多按钮。如果您在警告上放置了两个或更多按钮，则需要编写 Swift\
  \ 代码来识别用户点击了哪个按钮。\n\n警告通常作为单独的窗口出现，但您也可以使其作为从窗口标题栏下拉的工作表出现。\n\n面板显示常用的用户界面项目，例如用于选择要打开的文件的打开面板，以及用于选择文件夹和文件名以保存数据的保存面板。打开和保存面板是\
  \ Cocoa 框架的一部分，但您需要编写额外的 Swift 代码才能使打开和保存面板实际打开文件或将文件保存到硬盘。\n\n警告和面板让您无需编写太多额外代码即可创建标准的\
  \ OS X 用户界面元素。通过使用 Cocoa 框架的这些功能，您可以创建可靠运行且行为符合用户预期的标准 OS X 程序。\n\n\n\n"
- "# 19. 创建下拉菜单\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1233-2_19](http://dx.doi.org/10.1007/978-1-4842-1233-2_19)）包含补充材料，仅供授权用户使用。\n\
  \n下拉菜单是与 OS X 程序交互的标准方式。虽然你的程序可以显示按钮来表示命令，但按钮过多会使屏幕显得杂乱。为了避免在屏幕上挤入过多按钮，可以将相关命令分组到多个下拉菜单中。默认情况下，Xcode\
  \ 为每个 OS X 项目创建以下下拉菜单标题：\n\n- **文件** – 显示用于打开、保存、创建和打印的命令。\n- **编辑** – 显示用于复制、剪切、粘贴、撤销和重做命令的命令。\n\
  - **格式** – 显示用于修改文本或图形的命令，例如更改字体或对齐文本。\n- **视图** – 显示用于更改数据在窗口中显示方式的命令，例如缩放或显示其他用户界面项（如工具栏）。\n\
  - **窗口** – 显示用于操作文档窗口的命令，例如在多个打开的窗口之间切换。\n- **帮助** – 显示用于获取程序使用帮助的命令。\n\n除了使用标准下拉菜单标题外，你还可以添加自己的标题或删除现有标题。为了组织下拉菜单中的命令，你可以使用水平线将相似命令分组，或将它们存储在子菜单中。为了方便用户，你还可以为命令分配快捷键。\n\
  \n下拉菜单是用户控制程序的标准方式。通过为你自己的程序创建下拉菜单，你可以构建一个熟悉的用户界面，让其他人无需额外培训或经过很少培训就能快速学习和使用你的程序。\n\
  \n## 编辑下拉菜单\n\n每次创建 Cocoa 应用程序项目时，Xcode 都会创建一个包含常用菜单标题和命令的默认下拉菜单。无需编写一行 Swift 代码，其中许多命令就能正常工作。例如，应用程序菜单（你的程序名称，例如\
  \ `MenuProgram`）下的“退出”命令知道如何退出程序，而“窗口”菜单标题下的“缩放”和“最小化”命令知道如何缩放和最小化用户界面窗口。\n\n在大多数情况下，你需要通过编辑现有命令、添加新命令和删除现有命令来自定义这些下拉菜单。要修改程序的下拉菜单，你有两个选择：\n\
  \n- 直接编辑下拉菜单\n- 打开文档大纲并编辑菜单\n\n要直接编辑下拉菜单，请单击项目导航器窗格中的 `.xib` 或 `.storyboard` 文件，然后直接单击程序的下拉菜单，如图\
  \ 19-1 所示。\n\n![A978-1-4842-1233-2_19_Fig1_HTML.jpg](img/A978-1-4842-1233-2_19_Fig1_HTML.jpg)\n\
  \n图 19-1。你可以直接单击程序的下拉菜单来选择单个项目\n\n编辑下拉菜单的第二种方法是单击“显示文档大纲”图标打开文档大纲，如图 19-2 所示。\n\n\
  ![A978-1-4842-1233-2_19_Fig2_HTML.jpg](img/A978-1-4842-1233-2_19_Fig2_HTML.jpg)\n\
  \n图 19-2。“显示文档大纲”图标\n\n打开文档大纲后，你可以单击展开三角形来查看不同的下拉菜单及其命令，如图 19-3 所示。\n\n![A978-1-4842-1233-2_19_Fig3_HTML.jpg](img/A978-1-4842-1233-2_19_Fig3_HTML.jpg)\n\
  \n图 19-3。在文档大纲窗格中查看菜单\n\n要删除菜单项，请单击选中它（通过直接单击下拉菜单项或在文档大纲窗格中单击菜单项），然后按退格键或删除键。这样可以删除单个菜单项或整个菜单标题，例如“文件”或“编辑”下拉菜单标题。\n\
  \n注意：如果不小心删除了菜单项或整个下拉菜单标题，只需选择**编辑 ➤ 撤销**或按下 `Command+Z` 即可立即恢复。\n\n要向程序的下拉菜单添加项目，你有两个选择：\n\
  \n- 向现有的下拉菜单标题（如“文件”或“编辑”）添加新菜单项\n- 添加一个新的下拉菜单标题，该标题包含自己的命令\n\n### 向菜单栏添加新的下拉菜单标题\n\
  \n你可以直接在下拉菜单上或文档大纲内添加菜单项和下拉菜单标题。\n\n对象库显示以下下拉菜单标题，你可以将它们添加到程序的菜单栏中，如图 19-4 所示：\n\
  \n![A978-1-4842-1233-2_19_Fig4_HTML.jpg](img/A978-1-4842-1233-2_19_Fig4_HTML.jpg)\n\
  \n图 19-4。可以添加到程序菜单栏的下拉菜单标题\n\n- **应用程序菜单项** – 包含应用程序下拉菜单标题中的典型命令，例如“关于”、“偏好设置”和“服务”。\n\
  - **文件菜单项** – 包含文件下拉菜单标题中的典型命令，例如“打开”、“新建”和“保存”。\n- **编辑菜单项** – 包含编辑下拉菜单标题中的典型命令，例如“剪切”、“复制”和“粘贴”。\n\
  - **字体菜单项** – 包含字体下拉菜单标题中的典型命令，例如“粗体”、“放大”和“复制样式”。\n- **格式菜单项** – 包含格式下拉菜单标题中的典型命令，例如“字体”和“文本”。\n\
  - **文本菜单项** – 包含文本下拉菜单标题中的典型命令，例如“居中”、“书写方向”和“显示标尺”。\n- **查找菜单项** – 包含查找下拉菜单标题中的典型命令，例如“查找”、“查找与替换”和“查找下一个”。\n\
  - **窗口菜单项** – 包含窗口下拉菜单标题中的典型命令，例如“最小化”、“置于顶层”和“缩放”。\n- **帮助菜单项** – 包含帮助下拉菜单标题中的典型命令，例如“应用程序帮助”。\n\
  \n要将下拉菜单标题添加到程序的菜单栏，请执行以下步骤：\n\n单击项目导航器窗格中的 `.xib` 或 `.storyboard` 文件。选择**视图 ➤ 工具\
  \ ➤ 显示对象库**以在 Xcode 窗口的右下角显示对象库。从对象库中拖拽一个下拉菜单项（参见图 19-4），将鼠标移动到程序的菜单栏上方，直到出现一条蓝色竖线，显示下拉菜单标题将出现的位置，如图\
  \ 19-5 所示。\n\n![A978-1-4842-1233-2_19_Fig5_HTML.jpg](img/A978-1-4842-1233-2_19_Fig5_HTML.jpg)\n\
  \n图 19-5。向菜单栏添加新的下拉菜单标题\n\n除了将鼠标拖拽到程序的菜单栏上，你也可以将鼠标拖拽到文档大纲中的下拉菜单标题之间，直到出现一条蓝色横线，显示菜单标题将出现的位置，如图\
  \ 19-6 所示。\n\n释放鼠标。新的下拉菜单标题就会出现在菜单栏上。\n\n![A978-1-4842-1233-2_19_Fig6_HTML.jpg](img/A978-1-4842-1233-2_19_Fig6_HTML.jpg)\n\
  \n图 19-6。使用文档大纲向菜单栏添加新的下拉菜单标题\n\n要重新排列下拉菜单标题，请将鼠标指针移动到要移动的菜单标题上（位于菜单栏或文档大纲中），然后拖拽鼠标将菜单标题移动到新位置。\n\
  \n\n\n### 向下拉菜单添加新命令\n\n你可以随时在任何下拉菜单上删除、重新排列和添加命令。要删除命令，只需选中它并按 `Backspace` 或 `Delete`\
  \ 键。要重新排列命令，将其拖放到新位置即可。\n\n要向下拉菜单添加新命令，你需要使用来自 `Object Library` 的以下三个项目，如图 19-7\
  \ 所示：\n\n![A978-1-4842-1233-2_19_Fig7_HTML.jpg](img/A978-1-4842-1233-2_19_Fig7_HTML.jpg)\n\
  \n图 19-7. 用于修改下拉菜单上命令的三个项目\n\n- `Menu Item` – 表示单个命令。\n- `Submenu Menu Item` – 表示一个包含附加命令的子菜单。\n\
  - `Separate Menu Item` – 显示一条水平线，用于分隔下拉菜单上的命令。\n\n要向下拉菜单添加新命令，请遵循以下步骤：\n\n1.  释放鼠标。`Xcode`\
  \ 会将你的新菜单项添加到下拉菜单中。如果你添加的是 `Submenu Menu Item`，现在即可编辑其子菜单中存储的命令。\n2.  从 `Object\
  \ Library` 中拖动一个菜单项（见图 19-7），并将鼠标移动到下拉菜单列表中，直到出现一条水平蓝色线，指示该命令将出现的位置，如图 19-9 所示。\n\
  \n![A978-1-4842-1233-2_19_Fig9_HTML.jpg](img/A978-1-4842-1233-2_19_Fig9_HTML.jpg)\n\
  \n图 19-9. 在下拉菜单列表中拖放新命令\n\n3.  在 `Project Navigator` 窗格中点击 `.xib` 或 `.storyboard`\
  \ 文件。\n4.  选择 `View` ➤ `Utilities` ➤ `Show Object Library`，以在 `Xcode` 窗口的右下角显示 `Object\
  \ Library`。\n5.  点击你想要添加新命令的下拉菜单。你可以直接点击菜单栏上的下拉菜单标题，或者点击展开三角形以打开 `Document Outline`\
  \ 中的下拉菜单标题，如图 19-8 所示。\n\n![A978-1-4842-1233-2_19_Fig8_HTML.jpg](img/A978-1-4842-1233-2_19_Fig8_HTML.jpg)\n\
  \n图 19-8. 你可以直接在下拉菜单上或通过 `Document Outline` 添加新命令\n\n### 编辑命令\n\n一旦你修改了菜单栏上出现的下拉菜单标题以及每个下拉菜单上出现的命令，你或许还想使用\
  \ `Inspector` 窗格进一步编辑每个命令。`Inspector` 窗格对于修改以下属性非常有用：\n\n- `Title` – 显示菜单命令的文本。\n\
  - `Key Equivalent` – 为命令定义快捷键。\n\n要编辑命令（或下拉菜单标题），请遵循以下步骤：\n\n1.  在 `Inspector` 窗格中点击\
  \ `Title` 文本字段以编辑命令的文本。\n2.  点击 `Key Equivalent` 文本字段，然后按下（而非输入）你想要分配给命令的快捷键。确保此快捷键未被其他命令占用（例如用于\
  \ `Cut` 命令的 `Command+X`）。`Xcode` 会在下拉菜单中该命令的右侧显示你的快捷键。\n3.  在 `Project Navigator`\
  \ 窗格中点击 `.xib` 或 `.storyboard` 文件。\n4.  点击你想要编辑的下拉菜单命令（或下拉菜单标题）。可以在 `Document Outline`\
  \ 中点击，也可以直接点击下拉菜单本身。\n5.  选择 `View` ➤ `Utilities` ➤ `Show Attributes Inspector`。此时将显示\
  \ `Show Attributes Inspector` 窗格，如图 19-10 所示。\n\n![A978-1-4842-1233-2_19_Fig10_HTML.jpg](img/A978-1-4842-1233-2_19_Fig10_HTML.jpg)\n\
  \n图 19-10. 在下拉菜单列表中拖放新命令\n\n### 将菜单命令连接到 Swift 代码\n\n一旦你修改了下拉菜单标题并用适当的命令填充了它们，你最终需要让这些命令实际执行操作。这意味着将你的菜单命令链接到\
  \ `IBAction` 方法，就像将按钮或其他用户界面项连接到包含 Swift 代码的文件一样。你可以从下拉菜单上的菜单命令本身，或者从 `Document\
  \ Outline` 中显示的菜单命令进行 `Control-drag` 操作。\n\n当你创建一个 Cocoa 应用程序项目时，你会发现许多菜单命令已经可以工作，例如\
  \ `File` ➤ `Print`、`Window` ➤ `Minimize` 以及应用程序名称 ➤ `About` 命令。这些功能由 Cocoa 框架中的\
  \ `NSApplication`、`NSWindow`、`NSView` 和 `NSResponder` 类提供。\n\n如果你点击 Cocoa 应用程序项目中的某个菜单命令，然后选择\
  \ `View` ➤ `Utilities` ➤ `Show Connections Inspector`，你会在 `Xcode` 窗口的右上角看到 `Connections\
  \ Inspector` 窗格。\n\n`Connections Inspector` 窗格让你可以看到选中的用户界面项（如下拉菜单上的命令）连接到了什么，如图\
  \ 19-11 所示。\n\n![A978-1-4842-1233-2_19_Fig11_HTML.jpg](img/A978-1-4842-1233-2_19_Fig11_HTML.jpg)\n\
  \n图 19-11. `Connections Inspector` 窗格显示用户界面连接到了哪个 `IBAction` 方法\n\n通常，当你查看用户界面项的\
  \ `Connections Inspector` 时，你会在左侧看到 `IBAction` 方法的名称（例如 `print`），并且有一条线将其连接到实际存储该\
  \ `IBAction` 方法的文件（例如 `AppDelegate`）。\n\n在图 19-11 中，`File` 菜单上的 `Print` 菜单命令连接到了\
  \ `print` `IBAction` 方法，但此 `IBAction` 方法并未存储在特定文件中。相反，它连接到了名为 `First Responder`\
  \ 的对象，该对象由 `NSResponder` 类定义。\n\n用户界面由多个基于 `NSApplication`、`NSWindow` 和 `NSView`\
  \ 的对象组成，因此 `First Responder` 仅指向应首先响应用户点击用户界面项（例如 `File` 菜单上的 `Print` 命令）的对象。如果这个第一个对象没有\
  \ `print` `IBAction` 方法，那么它会搜索下一个对象中的这个 `IBAction` 方法。\n\n因此，如果你在窗口上有一个文本字段，并点击\
  \ `File` 菜单上的 `Print` 命令，`Print` 命令会首先在该文本字段中查找 `print` `IBAction` 方法（文本字段基于 `NSTextfield`，而\
  \ `NSTextfield` 又基于 `NSView`）。如果在 `NSTextfield` 类中找不到 `print` `IBAction` 方法，它会接着在窗口（基于\
  \ `NSWindow`）或应用程序本身（基于 `NSApplication`）中查找。\n\n如果你点击 `First Responder` 图标，然后选择\
  \ `View` ➤ `Utilities` ➤ `Show Connections Inspector`，你可以看到 `First Responder` 的\
  \ `Connections Inspector` 窗格，其中标识了连接到典型 Cocoa 应用程序项目默认下拉菜单的所有 `IBAction` 方法，如图 19-12\
  \ 所示。\n\n![A978-1-4842-1233-2_19_Fig12_HTML.jpg](img/A978-1-4842-1233-2_19_Fig12_HTML.jpg)\n\
  \n图 19-12. `First Responder` 的 `Connections Inspector` 窗格列出了连接到 Cocoa 应用程序项目默认下拉菜单的所有\
  \ `IBAction` 方法\n\n> **注:** 查看 `Connections Inspector` 的另一种方法是右键点击 `First Responder`\
  \ 图标。\n\n尽管 Cocoa 应用程序模板创建了标准的下拉菜单和命令，你仍然需要编写 Swift 代码才能使其中许多命令实际工作。例如，`Save` 命令不知道要保存什么或如何保存，而\
  \ `New` 命令不知道要创建哪种类型的文档。\n\n要了解菜单命令如何像其他用户界面项一样与 `IBAction` 方法配合使用，请遵循以下步骤。\n\n\n\
  \n选择“View ➤ Assistant Editor ➤ Show Assistant Editor”。`AppDelegate.swift`文件会出现在用户界面旁边。将鼠标指针悬停在文本字段上，按住`Control`键，然后拖动鼠标到`AppDelegate.swift`文件中`IBOutlet`行的下方。松开`Control`键和鼠标按钮，会出现一个弹出窗口。在“Name”文本字段中点击，输入`textResult`，然后点击“Connect”按钮，这样你的`IBOutlet`应如下所示：\n\
  \n在 Xcode 中选择“File ➤ New ➤ Project”。  \n点击“OS X”类别下的“Application”。  \n点击“Cocoa Application”，然后点击“Next”按钮。Xcode\
  \ 会要求输入产品名称。  \n点击“Product Name”文本字段，输入`MenuProgram`。  \n确保“Language”弹出菜单显示为“Swift”，并且没有勾选任何复选框。\
  \  \n点击“Next”按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击“Create”按钮。  \n\n点击项目导航器中的`MainMenu.xib`文件。程序用户界面会显示出来。\
  \  \n点击`MenuProgram`图标以显示程序用户界面的窗口。  \n选择“View ➤ Utilities ➤ Show Object Library”。对象库会出现在\
  \ Xcode 窗口的右下角。  \n将一个文本字段拖拽到用户界面窗口上。你可能需要加宽文本字段的宽度。  \n将一个菜单项从对象库拖拽到“File”菜单的底部。你可以将菜单项拖拽到“File”下拉菜单中，或者拖拽到文档大纲中，如图\
  \ 19-13 所示。\n\n![A978-1-4842-1233-2_19_Fig13_HTML.jpg](img/A978-1-4842-1233-2_19_Fig13_HTML.jpg)\n\
  \n**图 19-13.** 将菜单项拖拽到“File”下拉菜单的底部\n\n`@IBOutlet weak var textResult: NSTextField!`\n\
  \n将鼠标指针悬停在你刚刚添加到“File”下拉菜单底部的菜单项上（无论是在下拉菜单中还是在文档大纲中），按住`Control`键，然后拖动鼠标到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标按钮，会出现一个弹出窗口。点击“Connection”弹出菜单，选择“Action”。在“Name”文本字段中点击，输入`myMenu`。点击“Type”弹出菜单，选择`NSMenuItem`，然后点击“Connect”按钮。Xcode\
  \ 会创建一个空的`IBAction`方法。按如下方式修改`IBAction`方法：\n\n```\n@IBAction func myMenu(sender:\
  \ NSMenuItem) {\n\n    textResult.stringValue = \"Clicked on = \" + sender.title\
  \    \n}\n```\n\n松开`Control`键和鼠标按钮。Xcode 将“Save”命令连接到`myMenu IBAction`方法。  \n选择“Product\
  \ ➤ Run”。用户界面会显示出来。  \n点击“File”菜单标题。注意，你添加的菜单项（标签为“Item”）会出现在“File”下拉菜单的底部。  \n\
  点击“Save”命令。文本字段会显示“Clicked on = Save…”。  \n点击“File”菜单标题，然后点击你添加的菜单项“Item”。文本字段会显示“Clicked\
  \ on = Item.”。  \n选择“MenuProgram ➤ Quit MenuProgram”。  \n点击出现在“First Responder”左侧的关闭图标（X）。这会切断“Save”命令与`saveDocument\
  \ IBAction`方法之间的连接。  \n将鼠标指针悬停在“File”下拉菜单中的“Save”命令上，按住`Control`键，然后拖动鼠标到你第 22 步创建的`myMenu\
  \ IBAction`方法上。确保 Xcode 高亮了整个`IBAction`方法，并显示“Connect Action”，如图 19-15 所示。\n\n![A978-1-4842-1233-2_19_Fig15_HTML.jpg](img/A978-1-4842-1233-2_19_Fig15_HTML.jpg)\n\
  \n**图 19-15.** 将“Save”命令连接到现有的`IBAction`方法\n\n点击“File”下拉菜单中的“Save”命令。  \n选择“View\
  \ ➤ Utilities ➤ Show Connections Inspector”。“Connections Inspector”面板会显示“Save”命令已连接到“First\
  \ Responder”中的`saveDocument IBAction`方法，如图 19-14 所示。\n\n![A978-1-4842-1233-2_19_Fig14_HTML.jpg](img/A978-1-4842-1233-2_19_Fig14_HTML.jpg)\n\
  \n**图 19-14.** “File”下拉菜单中“Save”命令的“Connections Inspector”\n\n`MenuProgram`项目演示了如何将菜单命令连接到文本字段，以便文本字段显示用户点击的菜单命令名称。但是，在使用故事板时，连接菜单命令的方式略有不同。\n\
  \n主要区别在于，在故事板中，下拉菜单存储在与实际用户界面不同的场景中，如图 19-16 所示。\n\n![A978-1-4842-1233-2_19_Fig16_HTML.jpg](img/A978-1-4842-1233-2_19_Fig16_HTML.jpg)\n\
  \n**图 19-16.** 在故事板中，下拉菜单出现在与用户界面不同的场景中\n\n这意味着，当你按住`Control`键拖拽下拉菜单命令时，Xcode 会将你的\
  \ Swift 代码存储在`AppDelegate.swift`文件中；但如果你按住`Control`键拖拽用户界面元素（如文本字段），Xcode 会将你的 Swift\
  \ 代码存储在`ViewController.swift`文件中。\n\n本质上，这意味着如果你为文本字段创建了一个`IBOutlet`，它会存储在`ViewController.swift`文件中，而你的下拉菜单命令的`IBAction`方法存储在`AppDelegate.swift`文件中，因此`IBOutlet`不知道`IBAction`方法的存在（反之亦然）。\n\
  \n解决此问题的方法是将下拉菜单命令连接到“First Responder”图标。这意味着你的程序将首先在其`AppDelegate.swift`文件中查找`IBAction`方法，但随后也会在其他文件中查找相同的`IBAction`方法。\n\
  \n诀窍是在`AppDelegate.swift`文件中创建一个空的`IBAction`方法，并在`ViewController.swift`文件中创建一个完全相同的`IBAction`方法，不同之处在于你需要填写第二个`IBAction`方法中的\
  \ Swift 代码，使其能够检索所选菜单命令的标题。\n\n要了解菜单命令如何与故事板配合使用，请按照以下步骤操作：\n\n在 Xcode 中选择“File\
  \ ➤ New ➤ Project”。  \n点击“OS X”类别下的“Application”。  \n点击“Cocoa Application”，然后点击“Next”按钮。Xcode\
  \ 会要求输入产品名称。  \n点击“Product Name”文本字段，输入`StoryMenu`。  \n确保“Language”弹出菜单显示为“Swift”，并且只勾选了“Use\
  \ storyboards”复选框。  \n点击“Next”按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击“Create”按钮。\
  \  \n\n点击项目导航器中的`Main.storyboard`文件。程序用户界面会显示出来。  \n选择“View ➤ Utilities ➤ Show Object\
  \ Library”，将一个文本字段拖拽到用户界面（由标题栏中的“View Controller”标识）上。你可能需要加宽文本字段的宽度。  \n选择“View\
  \ ➤ Assistant Editor ➤ Show Assistant Editor”。Xcode 会在用户界面旁边显示`ViewController.swift`文件。\
  \  \n将鼠标指针悬停在文本字段上，按住`Control`键，然后拖动鼠标到`class ViewController`行的下方。  \n松开`Control`键和鼠标。会出现一个弹出窗口。在“Name”文本字段中点击，输入`textResult`，然后点击“Connect”按钮。Xcode\
  \ 会创建以下`IBOutlet`：\n\n```\n@IBOutlet weak var textResult: NSTextField!\n```\n\n\n\
  \n点击 `myMenu`。将鼠标指针移至 `File` 下拉菜单中的 `Save` 命令上。按住 Control 键并从 `Save` 命令拖拽至 `First\
  \ Responder` 图标。松开 `Control` 键和鼠标。此时会出现一个弹出菜单（参见图 19-18）。点击 `myMenu`。选择 `View` ➤\
  \ `Standard Editor` ➤ `View Standard Editor`，以便在 Xcode 窗口中仅显示一个文件。点击 `Project Navigator`\
  \ 面板中的 `ViewController.swift` 文件。将光标移至 `ViewController.swift` 文件最后一个花括号的上方，然后选择\
  \ `Edit` ➤ `Paste`。Xcode 会粘贴您在第 20 步创建的 `IBAction` 方法。按如下方式修改此 IBAction 方法：松开 `Control`\
  \ 键和鼠标。此时会出现一个如图 19-18 所示的弹出菜单。\n\n![A978-1-4842-1233-2_19_Fig18_HTML.jpg](img/A978-1-4842-1233-2_19_Fig18_HTML.jpg)\n\
  \n图 19-18。\n\n将菜单命令连接到 `First Responder` 图标。点击 `File` 下拉菜单以显示其完整列表。此时助理编辑器应显示 `AppDelegate.swift`\
  \ 文件。将 `Object Library` 中的 `Menu Item` 拖拽至 `File` 下拉菜单的底部。将鼠标指针移至您刚刚添加到 `File` 下拉菜单底部的新\
  \ `Menu Item` 上，按住 `Control` 键，然后将鼠标拖拽至 `AppDelegate.swift` 文件底部最后一个花括号的上方。此时会出现一个弹出窗口。点击\
  \ `Connection` 弹出菜单并选择 `Action`。点击 `Name` 文本字段并输入 `myMenu`。点击 `Type` 弹出菜单，选择 `NSMenuItem`，然后点击\
  \ `Connect` 按钮。Xcode 会创建一个空的 `IBAction` 方法。选中这个空的 `IBAction` 方法，然后选择 `Edit` ➤ `Copy`。将鼠标指针移至您刚刚添加到\
  \ `File` 菜单底部的新 `Menu Item` 上，按住 `Control` 键，然后将鼠标拖拽至 `First Responder` 图标上（如图 19-17\
  \ 所示）。\n\n![A978-1-4842-1233-2_19_Fig17_HTML.jpg](img/A978-1-4842-1233-2_19_Fig17_HTML.jpg)\n\
  \n图 19-17。\n\n将菜单命令连接到 `First Responder` 图标\n\n```\n@IBAction func myMenu(sender:\
  \ NSMenuItem) {\n\ntextResult.stringValue = \"Clicked on = \" + sender.title\n\n\
  }\n```\n\n选择 `Product` ➤ `Run`。您的用户界面将出现。在 StoryMenu 菜单栏上选择 `File` ➤ `Save`。请注意，文本字段显示“Clicked\
  \ on = Save…”。在 StoryMenu 菜单栏上选择 `File` ➤ `Item`。请注意，文本字段现在显示“Clicked on = Item-”。选择\
  \ `StoryMenu` ➤ `Quit StoryMenu`。\n\n## 总结\n\n当您创建 Cocoa 应用程序项目时，Xcode 会自动为您的程序创建下拉菜单。您可以添加、删除或重新排列菜单栏上的菜单标题或下拉菜单中的菜单命令。为了方便用户，您甚至可以为菜单命令分配键盘快捷键。\n\
  \n要编辑下拉菜单，您可以直接在下拉菜单上进行编辑，也可以打开 `Document Outline`。您可以从下拉菜单命令或 `Document Outline`\
  \ 按住 Control 键拖拽，将菜单命令连接到 `IBAction` 方法。\n\n在处理 `.storyboard` 文件时，您通常会将菜单命令连接到 `First\
  \ Responder` 图标。然后，您可以在正确的 Swift 文件中实现 `IBAction` 方法，以使该菜单命令生效。在处理 `.xib` 文件时，您可以直接将菜单命令连接到\
  \ `IBAction` 方法。\n\n当 Xcode 为您的 Cocoa 应用程序创建下拉菜单时，其中许多菜单命令已经知道如何工作，例如 `Window` ➤\
  \ `Zoom` 和 `File` ➤ `Close`。然而，大多数菜单命令在您编写自己的 Swift 代码以使它们在特定程序中正常工作之前，不会执行任何操作。\n\
  \n下拉菜单上的菜单命令为您提供了另一种将命令连接到 `IBAction` 方法的方式。由于大多数 OS X 程序都依赖下拉菜单，因此应首先专注于将程序命令组织到下拉菜单中，然后编写\
  \ Swift 代码以使每个菜单命令实际生效。\n\n"
- "# 20. 面向协议编程\n\n当苹果公司在 2014 年的全球开发者大会上推出 Swift 时，他们宣传它是一种比 Objective-C 更简单、更安全、更快的\
  \ iOS、OS X 和 watchOS 开发语言。虽然 Swift 和 Objective-C 都支持面向对象编程，但 Swift 更进一步，还提供了面向协议编程。\n\
  \n纯面向对象编程语言的最大问题之一是，扩展类的功能意味着要创建额外的子类。然后，您必须基于这些新的子类创建对象。这可能是一个笨拙的解决方案，因为您现在必须跟踪一个或多个子类，而每个子类都有不同的名称，并且它们之间可能只存在微小的差异。\n\
  \n更糟糕的是，Swift（与某些面向对象编程语言不同）只允许单一继承。这意味着一个类只能恰好继承自另一个类。如果您真的想从两个不同的类继承属性和方法，那是做不到的。\n\
  \n为了解决这种继承和多个子类的问题，Swift 提供了协议。协议的工作原理与面向对象编程类似，但具有一些额外的优势：\n\n-   协议可以扩展类、结构体和枚举的功能。继承只能扩展类的功能。\n\
  -   单个类、结构体或枚举可以由一个或多个协议扩展。继承只能扩展单个类。\n\n这意味着协议比类更灵活、更通用，同时让您能获得面向对象编程的优点而避免其缺点。您可以使用协议（面向协议编程）来代替类（面向对象编程），或者将面向对象编程和面向协议编程混合使用，从而兼得两者之长。\n\
  \n\n\n## 理解协议\n\n协议与类类似，可以定义属性（变量）和方法（函数）。主要区别在于，协议不能为属性设置初始值，也不能实现方法。协议仅定义属性及其数据类型。在协议中定义属性时，需要定义以下三项：\n\
  \n*   属性名称，可以是任意有描述性的名称。\n*   属性的数据类型，例如 `Int`、`Double`、`String` 等。\n*   属性是只读`{\
  \ get }`，还是可读写 `{ get set }`。\n\n**注意**：可读写的 `{ get set }` 属性不能赋值给常量存储属性（使用 `let`\
  \ 关键字定义）或只读计算属性。只读的 `{ get }` 属性则没有此类限制。\n\n考虑以下协议：\n\n```swift\nprotocol Cat {\n\
  \    var name: String { get set }\n    var age: Int { get }\n}\n```\n\n现在你可以基于此协议创建一个结构体，例如：\n\
  \n```swift\nstruct pet : Cat {\n    var name : String\n    //let name : String --\
  \ 无效，因为 \"let\" 定义的是常量存储属性\n    //var name : String { return \"Fred\" } -- 无效，因为这是只读计算属性\n\
  \    let age : Int\n}\n```\n\n上述代码定义了一个名为 `pet` 的结构体，它遵循了 `Cat` 协议。这意味着它需要将 `name`\
  \ 属性声明为字符串，将 `age` 属性声明为整数。注意，由于 `Cat` 协议将 `age` 属性定义为只读 `{ get }`，因此你可以使用 `let`\
  \ 关键字将其实现为常量。你也可以通过返回一个值来计算 `age` 属性，如下所示：\n\n```swift\nstruct pet : Cat {\n   \
  \ var name : String\n    var age : Int { return 4 }\n}\n```\n\n要了解如何结合不同类型的属性来使用协议和结构体，请按照以下步骤操作：\n\
  \n1.  在 Xcode 中选择 **File** ➤ **New** ➤ **Playground**。Xcode 会要求输入 playground 名称。\n\
  2.  在 **Name** 文本框中点击并输入 `ProtocolPlayground`。\n3.  确保 **Platform** 弹出菜单显示为 **OS\
  \ X**。\n4.  点击 **Next** 按钮。Xcode 会询问你希望将 playground 存储在何处。\n5.  选择一个文件夹来存储项目，然后点击\
  \ **Create** 按钮。\n6.  按如下方式编辑 playground 代码：\n\n```swift\nimport Cocoa\n\nprotocol\
  \ Cat {\n    var name: String { get set }\n    var age: Int { get }\n}\n\n// 使用计算属性\n\
  struct pet : Cat {\n    var name : String\n    var age : Int { return 4 }\n}\n\n\
  var animal = pet(name: \"Taffy\")\nprint (animal.name)\nprint (animal.age)\n\n//\
  \ 使用 \"let\" 定义的常量存储属性\nstruct feral : Cat {\n    var name : String\n    let age\
  \ : Int\n}\n\nvar pest = feral (name: \"Stinky\", age: 2)\nprint (pest.name)\nprint\
  \ (pest.age)\n```\n\n注意基于结构体声明变量时的差异。如果 age 使用计算属性，声明变量时无需创建初始值，例如：\n\n```swift\n\
  // 使用计算属性 { return 4 }\nstruct pet : Cat {\n    var name : String\n    var age :\
  \ Int { return 4 }\n}\n\nvar animal = pet(name: \"Taffy\")\n```\n\n然而，如果没有使用计算属性，则必须在创建变量时显式地初始化它，例如：\n\
  \n```swift\n// 使用 \"let\" 定义的常量存储属性\nstruct feral : Cat {\n    var name : String\n\
  \    let age : Int\n}\n\nvar pest = feral (name: \"Stinky\", age: 2)\n```\n\n图 20-1\
  \ 展示了如何基于同一个协议定义两个结构体。\n\n![A978-1-4842-1233-2_20_Fig1_HTML.jpg](img/A978-1-4842-1233-2_20_Fig1_HTML.jpg)\n\
  \n**图 20-1.** 两个不同的结构体可以遵循同一个协议\n\n### 在协议中使用方法\n\n当协议定义方法时，它只定义方法名称、参数以及返回的数据类型，但不包含任何实际实现该方法的\
  \ Swift 代码，例如：\n\n```swift\nprotocol Cat {\n    var name: String { get set }\n \
  \   var age: Int { get }\n    func meow (sound: String)\n}\n```\n\n如果某个类、结构体或枚举遵循了此\
  \ `Cat` 协议，它不仅要定义 `name` 和 `age` 属性，还必须使用 Swift 代码实现该协议方法，例如：\n\n```swift\nstruct\
  \ pet : Cat {\n    var name : String\n    var age : Int\n    func meow (sound :\
  \ String) {\n        print (sound)\n    }\n}\n```\n\n尽管类、结构体或枚举可能遵循完全相同的协议，但方法的具体实现可能大相径庭，例如：\n\
  \n```swift\nstruct feral : Cat {\n    var name : String\n    var age : Int\n   \
  \ func meow (sound : String) {\n        print (\"听我怒吼\")\n        print (sound.uppercaseString)\n\
  \    }\n}\n```\n\n要了解如何在协议中定义方法并在不同结构体中实现它们，请按照以下步骤操作：\n\n1.  确保 `ProtocolPlayground`\
  \ 文件已加载到 Xcode 中。\n2.  按如下方式编辑 playground 代码：\n\n```swift\nimport Cocoa\n\nprotocol\
  \ Cat {\n    var name: String { get set }\n    var age: Int { get }\n    func meow\
  \ (sound : String)\n}\n\n// 实现 meow 方法的一种方式\nstruct pet : Cat {\n    var name :\
  \ String\n    var age : Int\n    func meow (sound : String) {\n        print (sound)\n\
  \    }\n}\n\nvar animal = pet(name: \"Taffy\", age: 16)\nprint (animal.name)\nprint\
  \ (animal.age)\nanimal.meow(\"喂我\")\n\n// 实现相同 meow 方法的第二种方式\nstruct feral : Cat\
  \ {\n    var name : String\n    var age : Int\n    func meow (sound : String) {\n\
  \        print (\"听我怒吼\")\n        print (sound.uppercaseString)\n    }\n}\n\nvar\
  \ pest = feral(name: \"Stinky\", age: 2)\nprint (pest.name)\nprint(pest.age)\npest.meow(\"\
  咆哮\")\n```\n\n图 20-2 展示了同一协议方法两种不同实现的工作方式。\n\n![A978-1-4842-1233-2_20_Fig2_HTML.jpg](img/A978-1-4842-1233-2_20_Fig2_HTML.jpg)\n\
  \n**图 20-2.** 即使遵循同一协议，方法实现也可以不同\n\n## 遵循多个协议\n\n协议相对于面向对象编程的一大优势是，单个类、结构体或枚举可以遵循一个或多个协议。为此，只需指定要遵循的每个协议的名称，例如：\n\
  \n```swift\nstruct 结构体名称 : 协议名称 1, 协议名称 2, 协议名称 N {\n```\n\n通过允许你遵循多个协议，Swift 使编码更加灵活，因为你可以挑选和选择要使用的协议。要了解如何遵循多个协议，请按照以下步骤操作：\n\
  \n1.  确保 `ProtocolPlayground` 文件已加载到 Xcode 中。\n2.  按如下方式编辑 playground 代码：\n\n```swift\n\
  import Cocoa\n\nprotocol Cat {\n    var name: String { get }\n    var age: Int {\
  \ get }\n}\n\nprotocol CatSounds {\n    func meow (sound : String)\n}\n\nstruct\
  \ pet : Cat, CatSounds {\n    var name : String\n    var age : Int\n    func meow\
  \ (sound : String) {\n        print (sound)\n    }\n}\n\nvar animal = pet(name:\
  \ \"Fluffy\", age: 6)\nprint (animal.name)\nprint (animal.age)\nanimal.meow(\"起床！\"\
  )\n```\n\n图 20-3 展示了此代码如何通过让一个结构体遵循两个协议来工作。请注意，此代码的工作原理与 `name` 和 `age` 属性与 `meow()`\
  \ 方法定义在同一协议中完全相同。通过将不同的属性和方法分离到多个协议中，你无需实现不需要的属性和/或方法。\n\n![A978-1-4842-1233-2_20_Fig3_HTML.jpg](img/A978-1-4842-1233-2_20_Fig3_HTML.jpg)\n\
  \n**图 20-3.** 一个结构体可以遵循两个或更多协议\n\n由于你可以遵循多个协议，通常最好让每个协议尽可能简短。这样更容易只使用你需要的协议，而无需被迫实现你可能不需要或不想要的额外属性和/或方法。\n\
  \n\n\n## 协议扩展\n\n在面向对象编程的世界中，你可以通过继承来扩展一个类，这会让该类继承其父类从其他类继承而来的所有属性和方法。而在面向协议编程的世界中，你可以通过协议扩展来扩展一个协议。\n\
  \n协议扩展的目的之一是定义属性的默认值。你可以通过简单地为其中一个或多个属性赋值来定义默认值，例如：\n\n```\nprotocol Cat {\n   \
  \ var name: String { get }\n    var age: Int { get }\n}\n```\n\n这段代码定义了一个名为 `Cat`\
  \ 的协议，其中定义了 `name` 和 `age` 属性为可获取（gettable）`{ get }`。然后你可以创建一个遵循 `Cat` 协议的结构体，并为每个属性赋初始值，例如：\n\
  \n```\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int\
  \ = 2\n}\n```\n\n现在，如果你基于此结构体声明一个变量，该变量将包含这些初始值。尽管有了初始值，你仍然可以随时在这些属性中存储新数据。要了解如何在不使用扩展的情况下为协议属性定义初始值，请按照以下步骤操作：\n\
  \n确保 Xcode 中已加载 `ProtocolPlayground` 文件。按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\n\
  \nprotocol Cat {\n    var name: String { get }\n    var age: Int { get }\n}\n\n\
  struct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int = 2\n}\n\
  \nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\nanimal.name = \"\
  Joey\"\nanimal.age = 13\n\nprint (animal.name)\nprint (animal.age)\n```\n\n当你首次基于\
  \ `pet` 结构体创建 `animal` 变量时，初始的 `name` 属性值为 “Frank”，初始的 `age` 属性值为 2。你可以随时在这两个属性中存储新值，如图\
  \ 20-4 所示。\n\n![A978-1-4842-1233-2_20_Fig4_HTML.jpg](img/A978-1-4842-1233-2_20_Fig4_HTML.jpg)\n\
  \n**图 20-4.** 你可以为协议定义的可获取属性分配初始值\n\n如果你想要设置（并保持）某个属性的初始值，这时就可以使用协议扩展。协议扩展仅适用于可获取（gettable）`{\
  \ get }` 属性。协议扩展只是使用 `extension` 关键字，后跟你想要扩展的协议名称，例如：\n\n```\nextension Cat {\n\
  \    // 这里为可获取属性设置一个或多个默认值\n}\n```\n\n在扩展内部，你可以使用 `return` 关键字为一个或多个可获取属性计算默认值，例如：\n\
  \n```\nextension Cat {\n    var name : String { return \"Frank\" }\n}\n```\n\n协议扩展不仅将\
  \ `name` 属性定义为包含字符串 “Frank”，而且还消除了在类、结构体或枚举中定义 `name` 属性的需要，例如：\n\n```\nextension\
  \ Cat {\n    var name : String { return \"Frank\" }\n}\n\nstruct pet : Cat {\n \
  \   var age : Int = 2\n}\n```\n\n上述协议扩展和结构体本质上等同于：\n\n```\nstruct pet : Cat {\n\
  \    var name : String = \"Frank\"\n    var age : Int = 2\n}\n```\n\n主要区别在于，当 `name`\
  \ 属性在结构体内部声明时，你之后可以为 `name` 属性分配新字符串。当 `name` 属性在协议扩展内部声明并设置为某个值时，你之后无法为 `name`\
  \ 属性分配新字符串。要了解协议扩展如何定义默认值，请按照以下步骤操作：\n\n确保 Xcode 中已加载 `ProtocolPlayground` 文件。按如下方式编辑\
  \ playground 代码：\n\n```\nimport Cocoa\n\nprotocol Cat {\n    var name: String {\
  \ get }\n    var age: Int { get }\n}\n\nextension Cat {\n    var name : String {\
  \ return \"Frank\" }\n}\n\nstruct pet : Cat {\n    //var name : String = \"Frank\"\
  \n    var age : Int = 2\n}\n\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\
  \n//animal.name = \"Joey\"\nanimal.age = 13\n\nprint (animal.name)\nprint (animal.age)\n\
  ```\n\n在上面的代码中，两行被注释掉的代码展示了协议扩展消除了什么。一旦你在协议扩展内部定义了 `name` 属性，就无需再在 `pet` 结构体内部声明\
  \ `name` 属性。同时，在协议扩展中为 `name` 属性分配默认值之后，你也不能再为该属性分配新字符串（例如 “Joey”）。图 20-5 显示了上述代码的结果。\n\
  \n![A978-1-4842-1233-2_20_Fig5_HTML.jpg](img/A978-1-4842-1233-2_20_Fig5_HTML.jpg)\n\
  \n**图 20-5.** 使用协议扩展定义默认值\n\n在协议扩展中定义默认值的一个问题是，任何遵循该协议的事物都强制同时遵循该协议的扩展。这意味着基于该协议和扩展的所有内容都将拥有相同的、不可更改的默认值。\n\
  \n如果你希望拥有定义默认值的灵活性，但只针对某些特定的类、结构体或枚举，你可以创建一个协议扩展，该扩展仅适用于同时遵循了第二个协议的类、结构体或枚举：\n\n\
  ```\nextension protocol2Extend where Self: protocol2Use {\n    // 这里为可获取属性设置一个或多个默认值\n\
  }\n```\n\n上述 Swift 代码扩展了一个由 “protocol2Extend” 定义的协议。然而，“where Self:” 关键字标识了一个由 “protocol2Use”\
  \ 定义的第二个协议。\n\n这意味着，如果一个类、结构体或枚举遵循了由 “protocol2Extend” 定义的协议，那么只有在该类、结构体或枚举也遵循了由\
  \ “protocol2Use” 定义的第二个协议时，该扩展才会设置一个默认值。\n\n假设你创建了以下协议扩展：\n\n```\nextension Cat\
  \ where Self: CatType {\n    var name : String { return \"Frank\" }\n}\n```\n\n\
  这将为任何遵循 `Cat` 协议和 `CatType` 协议的类、结构体或枚举的 `name` 属性定义默认值 “Frank”。如果一个类、结构体或枚举仅遵循\
  \ `Cat` 协议，其 `name` 属性将不会被分配默认值 “Frank”。\n\n要了解这种形式的协议扩展如何仅在类、结构体或枚举遵循特定协议时有效，请按照以下步骤操作：\n\
  \n确保 Xcode 中已加载 `ProtocolPlayground` 文件。按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\n\
  \nprotocol Cat {\n    var name: String { get }\n    var age: Int { get }\n}\n\n\
  protocol CatType {\n    var species: String { get }\n}\n\nextension Cat where Self:\
  \ CatType {\n    var name : String { return \"Frank\" }\n}\n\nstruct pet : Cat {\n\
  \    var name : String = \"Max\"\n    var age : Int = 2\n}\n\nvar animal = pet()\n\
  print (animal.name)\nprint (animal.age)\n\nanimal.name = \"Joey\"\nanimal.age =\
  \ 13\n\nprint (animal.name)\nprint (animal.age)\n\n// 遵循两个协议的新结构体\nstruct wild :\
  \ Cat, CatType {\n    var age : Int = 2\n    var species : String = \"Lion\"\n}\n\
  \nvar beast = wild()\nprint (beast.name)\nprint (beast.age)\nprint (beast.species)\n\
  ```\n\n请注意，`pet` 结构体遵循了 `Cat` 协议，但由于它没有同时遵循 `CatType` 协议，因此你可以将其 `name` 属性赋初始值 “Max”，并且之后还可以为该\
  \ `name` 属性赋值 “Joey”。\n\n然而，`wild` 结构体同时遵循了 `Cat` 和 `CatType` 协议，因此它也遵循了协议扩展，该扩展为\
  \ `wild` 结构体的 `name` 属性分配了默认值 “Frank”，如图 20-6 所示。\n\n![A978-1-4842-1233-2_20_Fig6_HTML.jpg](img/A978-1-4842-1233-2_20_Fig6_HTML.jpg)\n\
  \n**图 20-6.** 协议扩展可以有选择地为遵循特定协议的结构体分配默认值\n\n\n\n### 使用协议扩展扩展通用数据类型\n\n协议扩展最有趣的用途可能就是为通用数据类型（如`String`、`Int`和`Double`）添加属性。用于扩展数据类型的协议扩展结构如下：\n\
  \n```\nextension dataType {\n    // 新属性 {\n        // 返回计算值\n    }\n}\n```\n\n当你使用协议扩展通用数据类型时，必须先创建一个代表数据类型的变量，后跟一个句点和属性名。因此，如果你像这样为`Int`数据类型创建扩展：\n\
  \n```\nextension Int {\n    var name: String {\n        return text\n    }\n}\n\
  ```\n\n你可以像这样存储一个字符串值：\n\n```\nvar status = 25.name   // 表示一个 String\n```\n\n要了解如何使用协议扩展扩展通用数据类型，请按照以下步骤操作：\n\
  \n确保`ProtocolPlayground`文件已在 Xcode 中加载。按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\n\
  \nfunc checkMe(myAge: Int) -> String {\n    if myAge >= 21 {\n        return \"\
  Legal\"\n    } else {\n        return \"Underage\"\n    }\n}\n\nvar text: String\n\
  var myAge: Int\nmyAge = 32\ntext = checkMe(myAge)\n\nextension Int {\n    var name:\
  \ String {\n        return text\n    }\n}\n\nvar status = myAge.name\nprint(myAge)\n\
  print(status)\n\nmyAge = 16\ntext = checkMe(myAge)\nstatus = myAge.name\nprint(myAge)\n\
  print(status)\n```\n\n图 20-7 显示了运行这段代码的结果。如你所见，当`myAge`变量大于 21 时，其`name`属性会存储一个字符串，该字符串会被存入`status`变量。根据`myAge`变量的值，`name`属性存储的字符串要么是\"\
  Legal\"，要么是\"Underage\"。\n\n![A978-1-4842-1233-2_20_Fig7_HTML.jpg](img/A978-1-4842-1233-2_20_Fig7_HTML.jpg)\n\
  \n**图 20-7.** 协议扩展可以扩展通用数据类型\n\n### 小结\n\n协议为扩展现有代码提供了一种替代方式。就像类一样，协议可以定义属性和方法。主要区别在于，协议只定义方法的名称和参数，但并不实际包含实现该方法的\
  \ Swift 代码。\n\n另一个区别是，当协议定义属性时，它还必须定义该属性是只读的（`{ get }`）还是可读写的（`{ get set }`）。\n\n\
  协议的工作原理与继承非常相似。虽然继承只允许类继承自另一个类，但协议可以使用一个或多个协议来扩展类、结构体和枚举。\n\n协议扩展允许你为属性定义默认值。当与`Int`、`String`和`Double`等通用数据类型结合使用时，协议扩展允许数据类型存储额外的信息。\n\
  \n请记住，你可以将面向对象编程与面向协议编程相结合，因此不必在两者之间做出选择。对象和协议都可能在特定程序中发挥重要作用，具体取决于你需要实现的目标。请务必理解如何定义、使用和扩展协议，因为协议将是\
  \ Swift 编程的一个常见特性。\n\n"
- "# 21. 防御性编程\n\n程序员往往过于乐观，因为他们在编写代码时，总是假设代码能正确运行。然而，在编程时，悲观一些往往更好。与其假设你的代码一次就能运行成功，不如安全地假设你的代码根本不会运行。这会迫使你在编写\
  \ Swift 代码时格外小心，确保代码完全按照你的意图执行，并且不会出现任何意外行为。\n\n没有程序是零错误的。与其浪费时间排查问题，不如提前预见问题并尽最大努力防止它们潜入代码中。虽然不可能\
  \ 100% 编写出零错误的代码，但你在编写代码时越具有防御性，就越不需要花时间排查导致代码无法正常运行的错误。\n\n总的来说，不要做任何假设。假设每次都会让你大吃一惊，而且很少会让事情变得更好。通过提前预见问题，你可以为它们制定计划，这样它们就不会破坏你的程序，也不会迫使你花费无数时间试图修复一个你认为根本不应该存在的问题。\n\
  \n## 使用极限值进行测试\n\n测试代码最简单的方法是从极限值开始，看看程序如何处理远超出预期范围的数据。处理数字时，程序通常假设用户会提供固定范围内的有效数据，但如果用户输入的是字母或笑脸等符号而不是数字，会发生什么？如果用户输入的是整数而不是小数（或者反之）呢？如果用户输入的是像\
  \ 420 亿或 -0.00000005580 这样的极端数字呢？\n\n处理字符串时，也要进行同样的测试。当程序期待一个字符串却收到一个数字时，它会如何反应？如果收到一个包含\
  \ 3000 个字符的巨大字符串呢？如果收到带有重音符号或特殊字母的外语符号呢？\n\n通过使用极限值测试程序，你可以观察程序是优雅地响应，还是直接崩溃。最终目标是避免崩溃并优雅地响应。这可能意味着反复要求用户提供有效数据，或者至少在程序接收到无效数据时警告用户。可靠的程序需要防范任何威胁其正常运行的情况。\n\
  \n\n\n## 当心语言快捷方式\n\n每种编程语言都提供快捷方式，让你能用更少的代码来加快编程速度。然而，即使是经验最丰富的程序员，也常常会被这些语言快捷方式绊倒，因此要谨慎使用它们。\n\
  \n一个简单的错误就是混淆前缀和后缀运算符，例如 `counter++` 或 `++counter`。尽管后缀和前缀自增运算符看起来几乎一模一样，但它们会产生两种完全不同的结果，如图\
  \ 21-1 所示。\n\n![A978-1-4842-1233-2_21_Fig1_HTML.jpg](img/A978-1-4842-1233-2_21_Fig1_HTML.jpg)\n\
  \n图 21-1. 前缀与后缀自增快捷方式的使用\n\n注意，后缀自增运算符（`counter++`）会先使用 `counter` 的值，然后再加 1。这就是为什么\
  \ `print(counter++)` 这一行打印出 20。在它打印出 20 之后，后缀自增运算符立即给 `counter` 变量加上了 1。\n\n另一方面，前缀自增运算符（`++counter`）会先加\
  \ 1，然后再使用 `counter` 的值。在 `counter++` 运算符给 20 加上 1 得到 21 之后，`++counter` 前缀自增运算符在使用它之前又给它加了\
  \ 1。这就是为什么它会打印出 22。\n\n根据你的需求，混淆这两个自增运算符可能会产生略有不同的结果，进而导致程序无法正常运行。如果你不确定这些自增运算符是如何工作的，为了稳妥起见，就使用\
  \ `counter = counter + 1` 代替。清晰总比混乱好，哪怕这意味着要多写几行代码。\n\n要了解后缀自增运算符与前缀自增运算符的区别，请遵循以下步骤：\n\
  \n-   在 Xcode 中，选择 文件 ➤ 新建 ➤ Playground。Xcode 会要求输入一个 playground 名称。\n-   在名称文本字段中单击，然后输入\
  \ `DefensePlayground`。\n-   确保平台弹出菜单显示的是 OS X。\n-   点击下一步按钮。Xcode 会询问你想把 playground\
  \ 保存在哪里。\n-   选择一个文件夹来存储你的项目，然后点击创建按钮。\n-   按如下方式编辑 playground 代码：\n\n```\nimport\
  \ Cocoa\nvar counter : Int\ncounter = 20\nprint (counter++)\nprint (++counter)\n\
  ```\n\n后缀自增运算符和前缀自增运算符可以是一种快捷方式，但如果使用不当，可能会带来意想不到的后果。另一种快捷方式是 Swift 的 if-else 语句。它通常看起来像这样：\n\
  \n```\nif Booleancondition {\n    // 如果条件为真，则执行此处的代码\n} else {\n    // 如果条件为假，则执行此处的代码\n\
  }\n```\n\n然而，Swift 也提供了一种 if-else 快捷方式，看起来像这样：\n\n```\nBooleancondition ? Result1\
  \ : Result2\n```\n\n除非你熟悉这种 if-else 语句的快捷版本，否则它可能会让人感到困惑，即使它更简短。任何时候代码让人困惑，就有错误使用它的风险。要了解这个\
  \ if-else 语句如何工作，请遵循以下步骤：\n\n-   确保 `DefensePlayground` 已加载到 Xcode 中。\n-   按如下方式编辑\
  \ playground 代码：\n\n```\nimport Cocoa\nvar i : Int\ni = 1\n// 普通的 if-else 语句\nif\
  \ i < 5 {\n    print (\"小于 5\")\n} else {\n    print (\"大于 5\")\n}\ni = 1\n// 三元运算符版本的\
  \ if-else 语句\nprint ((i < 5) ? \"小于 5\" : \"大于 5\")\n```\n\n注意，两个 if-else 语句的工作方式完全相同，如图\
  \ 21-2 所示，但为了减少代码量，快捷版本更难理解。任何时候代码难以理解，就有错误使用它的风险。如有疑问，就不要使用快捷方式。\n\n![A978-1-4842-1233-2_21_Fig2_HTML.jpg](img/A978-1-4842-1233-2_21_Fig2_HTML.jpg)\n\
  \n图 21-2. if-else 语句的快捷版本\n\n## 使用可选变量\n\nSwift 最强大的特性之一就是可选变量。可选变量可以包含一个值，也可以什么都不包含（由\
  \ `nil` 值标识）。但是，你必须谨慎使用可选变量，因为如果你在它们包含 `nil` 值时尝试使用它们，程序可能会崩溃。\n\n在使用可选变量时，你需要关注以下几点：\n\
  \n-   可选变量是否持有 `nil` 值\n-   解包可选变量以获取其实际值\n\n通常，你可以通过使用感叹号来访问存储在可选变量中的值，这被称为解包可选变量。解包可选变量的一个大问题是假设它的值不是\
  \ nil。假设你有以下代码：\n\n```\nvar test : String?\nprint (test)\nprint (test!)\n```\n\n\
  由于 `test` 可选变量尚未被赋值，其默认值为 `nil`。第一个 `print` 命令简单地打印出 `nil`。然而，第二个 `print` 命令试图解包这个可选变量，但由于其值为\
  \ `nil`，这会导致错误，如图 21-3 所示。\n\n![A978-1-4842-1233-2_21_Fig3_HTML.jpg](img/A978-1-4842-1233-2_21_Fig3_HTML.jpg)\n\
  \n图 21-3. 解包具有 nil 值的可选变量会导致错误\n\n在处理可选变量时，始终要在尝试使用它们之前检查其是否为 nil。检查 nil 值的一种方法是简单地测试可选变量是否等于\
  \ `nil`，例如：\n\n```\nimport Cocoa\nvar test : String?\nif test == nil {\n    print\
  \ (\"Nil 值\")\n} else {\n    print (test!)\n}\n```\n\n在这个例子中，if-else 语句首先检查 `test`\
  \ 可选变量是否等于 `nil`。如果是，则打印 `\"Nil 值\"`。如果不是，则可以安全地使用感叹号解包该可选变量。\n\n另一种检查 nil 值的方法是将一个常量赋值给可选变量，这被称为可选绑定。你不是直接使用可选变量，而是将它的值赋值或绑定给一个常量，例如：\n\
  \n```\nif let 常量 = 可选变量 {\n    // 可选变量不为 nil\n} else {\n    // 可选变量是 nil 值\n}\n\
  ```\n\n如果你需要测试多个可选变量，可以像这样将它们列在同一行：\n\n```\nif let 常量 = 可选变量, 常量 2 = 可选变量 2 {\n\
  \    // 所有可选变量都不为 nil\n} else {\n    // 一个或多个可选变量为 nil\n}\n```\n\n如果该常量持有值，那么 if-else\
  \ 语句就可以使用这个常量值。如果该常量没有持有值（包含 `nil`），那么 if-else 语句会执行其他操作，以避免使用 nil 值。通过使用常量来存储可选变量的值，可以避免使用感叹号来解包可选变量。\n\
  \n让我们来看看如何使用可选绑定：\n\n-   确保 `DefensePlayground` 已加载到 Xcode 中。\n-   按如下方式编辑 playground\
  \ 代码：\n\n```\nimport Cocoa\nvar test : String?\nvar final : String?\nif let checkMe\
  \ = test, let checkMe2 = final {\n    print (checkMe)\n} else {\n    print (\"一个或两个可选变量中为\
  \ Nil 值\")\n}\ntest = \"Hello\"\nif let checkMe = test, let checkMe2 = final {\n\
  \    print (checkMe)\n} else {\n    print (\"一个或两个可选变量中为 Nil 值\")\n}\nfinal = \"\
  Bye\"\nif let checkMe = test, let checkMe2 = final {\n    print (checkMe + \" &\
  \ \" + checkMe2)\n} else {\n    print (\"一个或两个可选变量中为 Nil 值\")\n}\n```\n\n上面的代码将两个不同的可选变量值赋值给两个不同的常量。只有当两个常量都包含非\
  \ nil 值时，if-else 语句的第一部分才会运行。如果一个或两个常量包含 nil 值，则执行 if-else 语句的 else 部分，如图 21-4 所示。同时还要注意，没有任何代码使用感叹号解包任何可选变量。\n\
  \n![A978-1-4842-1233-2_21_Fig4_HTML.jpg](img/A978-1-4842-1233-2_21_Fig4_HTML.jpg)\n\
  \n图 21-4. 使用可选绑定将可选变量的值赋值给常量\n\n\n\n## 使用可选链\n\n在处理可选类型时，通常用问号 `?` 声明可选变量，例如 `Int?`、`String?`、`Float?`\
  \ 和 `Double?`。除了使用常见数据类型，你还可以将任何类型（包括类）声明为可选变量。\n\n要将普通数据类型声明为可选变量，只需在数据类型名称后添加一个问号，像这样：\n\
  \n`var myNumber : String?`\n\n通常情况下，类中的属性持有常见数据类型，如 `String`、`Int` 或 `Double`。然而，类属性也可以持有另一个类。如果你可以将一个类声明为类型，那么也可以将其声明为可选变量，像这样：\n\
  \n```\nclass Dreamer {\n    var candidate: Politician?\n}\n\nclass Politician {\n\
  \    var name = \"\"\n}\n```\n\n现在，如果你基于 `Dreamer` 类创建一个对象，就会得到一个持有可选变量的 `candidate`\
  \ 属性。\n\n`let person = Dreamer()`\n\n`person` 对象基于 `Dreamer` 类，这意味着它也持有一个名为 `candidate`\
  \ 的属性。然而，`candidate` 属性本身也是一个基于 `Politician` 类的可选变量对象。此时，`candidate` 属性的初始值为 `nil`。\n\
  \n要了解一个对象如何将另一个对象作为可选变量，请遵循以下步骤：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑\
  \ playground 代码：\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate: Politician?\n\
  }\nclass Politician {\n    var name : String = \"\"\n}\nlet person = Dreamer()\n\
  if let check = person.candidate?.name {\n    print (\"Name = \\(check)\")\n}\nelse\
  \ {\n    print (\"Nil value here\")\n}\n```\n\n这段代码没有从 `Politician` 类创建对象，因此 `candidate`\
  \ 属性为 `nil`。由于我们将 `candidate` 属性声明为可选变量，因此可以使用所谓的**可选链**在 `if-else` 语句中访问其 `name`\
  \ 属性，如图 21-5 所示。\n\n![A978-1-4842-1233-2_21_Fig5_HTML.jpg](img/A978-1-4842-1233-2_21_Fig5_HTML.jpg)\n\
  \n图 21-5. 可选链可以访问类的可选变量属性\n\n要在 `candidate` 属性中存储值，我们需要像这样创建另一个对象：\n\n`person.candidate\
  \ = Politician ()`\n\n然后，我们需要在 `Politician` 类的 `name` 属性中存储数据。为此，我们需要解包这个可选变量（即\
  \ `Politician` 类）以访问其 `name` 属性，像这样：\n\n`person.candidate!.name = \"Sally\"`\n\n\
  请记住，只有在绝对确定可选变量包含值时，才应使用感叹号解包可选变量。在这种情况下，我们正在给可选变量赋值（`\"Sally\"`），因此解包它是安全的。\n\n\
  让我们看看如何修改之前的代码，从而在可选变量属性中存储值：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑 playground\
  \ 代码：\n\n```\nimport Cocoa\nclass Dreamer {\n    var candidate: Politician?\n}\n\
  class Politician {\n    var name : String = \"\"\n}\nlet person = Dreamer()\nif\
  \ let check = person.candidate?.name {\n    print (\"Name = \\(check)\")\n}\nelse\
  \ {\n    print (\"Nil value here\")\n}\nperson.candidate = Politician ()\nperson.candidate!.name\
  \ = \"Sally\"\nif let check = person.candidate?.name {\n    print (\"Name = \\(check)\"\
  )\n}\nelse {\n    print (\"Nil value here\")\n}\n```\n\n注意，`candidate` 可选变量（`Politician`）在显式存储值之前是未定义的或\
  \ `nil`。一旦我们将字符串（`\"Sally\"`）存储到 `name` 属性中，它就不再持有 `nil` 值，如图 21-6 所示。\n\n![A978-1-4842-1233-2_21_Fig6_HTML.jpg](img/A978-1-4842-1233-2_21_Fig6_HTML.jpg)\n\
  \n图 21-6. 你需要解包可选变量才能在其中存储值\n\n处理可选变量的关键是要确保正确使用问号 `?` 和感叹号 `!` 符号。幸运的是，如果你遗漏了任何一个符号，Xcode\
  \ 通常会提示你选择正确的符号，如图 21-7 所示。\n\n![A978-1-4842-1233-2_21_Fig7_HTML.jpg](img/A978-1-4842-1233-2_21_Fig7_HTML.jpg)\n\
  \n图 21-7. 在处理可选变量时，Xcode 的编辑器可以提示你何时使用 `?` 或 `!` 符号\n\n问号 `?` 符号用于创建可选变量或安全地访问可选变量。感叹号\
  \ `!` 符号用于解包可选变量，因此请确保这些被解包的可选变量持有非 nil 值。\n\n通常，只要你看到问号 `?` 与可选变量一起使用，在处理 `nil`\
  \ 值时你的代码很可能是安全的。然而，只要你看到感叹号 `!` 与可选变量一起使用，请确保可选变量包含一个值，因为如果它包含 `nil` 值，你的代码可能不安全并可能导致崩溃。\n\
  \n## 错误处理\n\n由于你无法每次都写出没有 bug 的代码，Swift 提供了一种称为错误处理的特性。错误处理背后的理念是识别并捕获可能出现的错误，以便你的程序能够优雅地处理它们，而不是让程序崩溃或产生不可预测的行为。要处理错误，你需要遵循以下几个步骤：\n\
  \n*   定义你想要识别的具有描述性的错误\n*   标识一个或多个函数来检测错误并识别发生的错误类型\n*   处理错误\n\n### 使用 `enum`\
  \ 和 `ErrorType` 定义错误\n\n在过去，程序经常显示充满十六进制数字和奇怪符号的晦涩错误消息。这类错误消息通常对于识别可能发生的问题毫无用处。这就是为什么处理错误的第一步是创建一个描述性错误类型的列表。\n\
  \n你为不同错误取的名字完全是任意的，但你应该为不同类型的错误消息赋予有意义的名称。要创建一个描述性错误类型的列表，你需要创建一个遵循 `ErrorType`\
  \ 协议的 `enum`，像这样：\n\n```\nenum enumName : ErrorType {\n    case descriptiveError1\n\
  \    case descriptiveError2\n    case descriptiveError3\n}\n```\n\n将 `enumName`\
  \ 替换为一个能标识你想要识别的错误类型的描述性名称。然后使用 `case` 关键字键入一个描述性的错误名称（作为一个单词，不含空格）。你的可能错误列表可以包含从一到任意数量的错误，因此你不受固定数量的限制。如果你想创建一个列出三种错误类型的\
  \ `enum`，你可能会使用如下代码：\n\n```\nenum ageError : ErrorType {\n    case negativeAge //\
  \ 负数\n    case unrealAge   // 大于 140 的数字\n    case underAge    // 未满 21 岁\n}\n```\n\
  \n\n\n### 创建错误识别函数\n\n在创建描述性错误类型列表后，现在需要创建一个或多个你认为可能发生错误的函数。通常你会像下面这样定义一个函数：\n\n\
  ```\nfunc functionName () {\n    // 代码写在这里\n}\n```\n\n为了让函数能够识别错误，你需要像这样插入 `throws`\
  \ 关键字：\n\n```\nfunc functionName () throws {\n    // 代码写在这里\n}\n```\n\n如果函数有返回值，`throws`\
  \ 关键字应放在返回值数据类型之前，如下所示：\n\n```\nfunc functionName () throws -> dataType {\n    //\
  \ 代码写在这里\n}\n```\n\n`throws` 关键字意味着该函数会“抛出”错误，交由代码的其他部分来处理。在包含 `throws` 关键字的函数内部，你需要使用一个或多个\
  \ `guard` 语句。\n\n`guard` 语句用于识别允许的情况，其工作原理类似于 `if-else` 语句。如果 `guard` 语句的布尔条件为 `true`，则不执行任何操作。但如果\
  \ `guard` 语句的条件为 `false`，则 `guard` 语句可以使用 `throw` 关键字来识别特定类型的错误，如下所示：\n\n```\nguard\
  \ 布尔条件 else {\n    throw 枚举名称.描述性错误\n}\n```\n\n如果只想允许大于 21 的值，你可以创建如下的 `guard` 语句：\n\
  \n```\nguard myAge > 21 else {\n    throw ageError.underAge\n}\n```\n\n如果布尔条件 (`myAge\
  \ > 21`) 为 `true`，该 `guard` 语句不会执行任何操作。否则，它会抛出 `ageError.underAge` 错误，其中 `ageError`\
  \ 是用于列出不同错误的枚举名称，而 `underAge` 是可能发生的错误之一。\n\n`guard` 语句总是定义可接受的行为 (`myAge > 21`)，否则它会通过\
  \ `throw` 关键字识别错误。一个带有 `throws` 关键字的函数可以包含一个或多个 `guard` 语句。\n\n### 处理错误\n\n在识别出一个或多个带有\
  \ `throws` 关键字的函数，并且这些函数使用了一个或多个 `guard` 语句来识别可能的错误之后，最后还需要一种方法来处理这些错误。在 Swift 中，你可以使用\
  \ `do-try-catch` 语句来实现，如下所示：\n\n```\ndo {\n    try 调用会抛出错误的函数\n} catch 枚举名称.描述性错误\
  \ {\n    // 处理错误的代码\n}\n```\n\n`do-try-catch` 语句会尝试运行一个可以使用 `throws` 关键字识别错误的函数。如果该函数没有通过\
  \ `guard` 语句识别出任何错误，那么 `do-try-catch` 语句的执行效果就与普通函数调用完全一样。\n\n但是，如果函数识别出了错误，你就需要在\
  \ `do-try-catch` 语句中编写代码来处理该错误。处理错误的方式可以很简单，比如打印一条消息来提示问题，也可以很复杂，比如运行一整套全新的代码来处理问题。\n\
  \n关键在于，如果你能预判可能的错误并编写代码加以处理，你的程序就不太可能崩溃。如果程序确实崩溃了，只需找出原因（这可能并不容易），创建一个新的描述性错误名称来标识它，然后创建一个新的\
  \ `catch` 语句来处理该错误。\n\n让我们看看错误处理如何工作：\n\n确保 `DefensePlayground` 已加载到 Xcode 中。按如下方式编辑\
  \ playground 代码：\n\n```\nimport Cocoa\n\nenum ageError : ErrorType {\n    case negativeAge\
  \ // 负数\n    case unrealAge   // 大于 140 的数\n    case underAge    // 小于 21 岁\n}\n\
  \nfunc checkAge(myAge : Int) throws {\n    print (myAge)\n    guard myAge > 0 else\
  \ {\n        throw ageError.negativeAge\n    }\n    guard myAge <= 140 else {\n\
  \        throw ageError.unrealAge\n    }\n    guard myAge > 21 else {\n        throw\
  \ ageError.underAge\n    }\n}\n\nvar oldAge = -9\n\ndo {\n    try checkAge (oldAge)\n\
  } catch ageError.negativeAge {\n    print (\"年龄不能是负数\")\n} catch ageError.unrealAge\
  \ {\n    print (\"年龄不能大于 140\")\n} catch ageError.underAge {\n    print (\"抱歉，你必须年满\
  \ 21 岁或以上\")\n}\n\nprint (oldAge)\n```\n\n注意，如图 21-8 所示，负数是如何被识别并通过一条简单消息处理的。\n\n\
  ![A978-1-4842-1233-2_21_Fig8_HTML.jpg](img/A978-1-4842-1233-2_21_Fig8_HTML.jpg)\n\
  \n**图 21-8.** 错误处理包含一个枚举、一个带有 guard 语句的函数以及一个 do-try-catch 语句\n\n将 `oldAge` 变量的值改为\
  \ 250，观察 `do-try-catch` 语句如何将该数字捕获为大于 140（这意味着不现实）。将 `oldAge` 变量的值改为 15，观察 `do-try-catch`\
  \ 语句如何识别出小于 21 的年龄。\n\n要在程序中使用错误处理，首先必须识别可能的问题，然后需要决定如何处理这些问题。错误处理只能识别你已经知道的错误，但它可以使你的程序在面对可能遇到的常见问题时更不易出错。\n\
  \n## 总结\n\n无论你作为程序员多么有天赋、有技巧或受过多少教育，偶尔总会犯错。有时这些错误是很容易纠正的简单错误，但有时你犯的错误会导致各种细微的问题，这些问题会给你的查找和修复带来挑战和挫败感。这本身就是编程的本质。\n\
  \n然而，你无意中造成的任何问题，也是你可以学会发现和修复的问题。一旦你学会了某种错误的产生机制，你很可能就会记住将来如何修复这类错误，无论将来是你自己还是其他人再次犯下这些错误。这样你就能腾出手来，去犯那些你可能从未遇到过的新错误。\n\
  \n减少程序错误的最佳方法是仔细检查代码，并且假定任何事情都不会一帆风顺。然后，寻找所有可能的方法，确保它不可能出错。你越是以防御性思维编写代码，就越有可能在问题发生之前就将其预防。\n\
  \n编程更像是一门艺术而非科学，所以请学习最适合你的方法，以减少在程序中引入错误。在尝试新代码时，通常更安全的做法是在 Swift playground 或一个独立于你实际程序的简单程序中对其进行测试。\n\
  \n这样，你就可以安全地隔离和测试代码。当代码正常工作后，再将其复制粘贴到你的程序中。\n\n错误是编程世界中的常态。理想情况下，你希望花更多时间编写代码，而花更少时间调试代码。\n\
  \n"
- '# 简化用户界面设计


  设计用户界面可能具有挑战性。你不仅需要设计一个易于使用的用户界面，还需要设计一个自适应用户界面，能够响应用户对窗口大小所做的任何更改。如果用户缩小窗口，你的用户界面必须相应缩小，且不裁剪任何元素。如果用户放大窗口，你的用户界面必须相应扩展，以保持外观的一致。


  为了帮助创建自适应用户界面，Xcode 提供了约束，可以将各种用户界面元素的边缘固定到窗口边缘或其他用户界面元素的边缘。在本章中，你将了解更多关于约束和 storyboard
  的知识，这将帮助用户界面设计变得比以往任何时候都更加简单。




  ## 使用堆栈视图


  如果你的用户界面包含少量项目（例如文本字段、按钮和标签），为这些项目添加约束以确保它们位于正确位置相对简单。然而，当用户界面包含多个项目时，为每个项目添加大量约束就会变得混乱。改动一个约束可能导致整个用户界面无法正确适配，这往往意味着需要花费时间重新调整多个约束。图
  22-1 展示了在拥挤的用户界面上，多个约束可能带来的混乱情况。


  ![A978-1-4842-1233-2_22_Fig1_HTML.jpg](img/A978-1-4842-1233-2_22_Fig1_HTML.jpg)


  图 22-1. 多个约束使得布局用户界面变得困难


  为解决这一问题，Xcode 提供了一项名为“堆栈视图”的功能。堆栈视图的核心思想是：用户界面中的项目组往往需要保持在一起。你不必为每个项目单独设置约束，而是将它们分组到一个堆栈视图中，然后为这个单一的堆栈视图设置约束。


  要了解如何创建和使用堆栈视图，请按照以下步骤操作：


  -   选择 `Editor` ➤ `Embed In` ➤ `Stack View`（或点击 Xcode 中间窗格右下角的堆栈视图图标）。Xcode 会将选中的项目组合到单个堆栈视图内。

  -   将鼠标指针移到三个复选框的堆栈视图上，按住 `Control` 键，向窗口右边缘拖动鼠标。

  -   松开 `Control` 键和鼠标按钮，会弹出一个窗口。

  -   选择 `Trailing Space to Container`。Xcode 会显示整个堆栈视图的约束。

  -   将鼠标指针移到三个复选框的堆栈视图上，按住 `Control` 键，向窗口底部边缘拖动鼠标。

  -   松开 `Control` 键和鼠标按钮，会弹出一个窗口。

  -   选择 `Bottom Space to Container`。Xcode 会显示整个堆栈视图的约束。

  -   选择 `Product` ➤ `Run`。程序的用户界面将显示。

  -   拖动窗口右下角来缩小和放大窗口。注意，当你改变窗口的宽度和高度时，三个复选框的堆栈会作为一个整体一起移动。

  -   选择 `StackViewProgram` ➤ `Quit StackViewProgram`。

  -   在 Xcode 中，选择 `File` ➤ `New` ➤ `Project`。

  -   在 `OS X` 类别下点击 `Application`。

  -   点击 `Cocoa Application`，然后点击 `Next` 按钮。Xcode 会要求输入产品名称。

  -   点击 `Product Name` 文本字段，输入 `StackViewProgram`。

  -   确保 `Language` 弹出菜单显示为 `Swift`，且未选中任何复选框。

  -   点击 `Next` 按钮。Xcode 会询问你希望将项目存储在何处。

  -   选择一个文件夹来存储项目，然后点击 `Create` 按钮。

  -   在项目导航器中点击 `MainMenu.xib` 文件。

  -   在项目导航器右侧出现的窗格中，点击窗口图标。程序的用户界面将显示。

  -   选择 `View` ➤ `Utilities` ➤ `Show Object Library`。对象库会出现在 Xcode 窗口的右下角。

  -   将三个复选框拖到用户界面窗口上，使它们上下堆叠显示。请注意，除非你精确对齐每个复选框，否则它们看起来会不整齐。

  -   拖动鼠标选中所有三个复选框，如图 22-2 所示。（另一种选择多个项目的方法是按住 `Shift` 键并点击你想选择的每个项目。）


  ![A978-1-4842-1233-2_22_Fig2_HTML.jpg](img/A978-1-4842-1233-2_22_Fig2_HTML.jpg)


  图 22-2. 拖动是快速选择多个项目的方法


  通过使用堆栈视图，你可以将分组项目保持在一起，并且仅对整个组使用一组约束，而不是为每个项目逐一添加约束。


  ## 解决约束冲突


  理想情况下，约束应使项目与窗口边缘或其他用户界面项目边缘保持特定距离。然而，当你缩小或放大窗口时，约束可能会产生意外问题。


  让我们看看为用户界面项目设置两个约束是如何引发问题的：


  -   确保 `StackViewProgram` 项目已加载到 Xcode 中。

  -   在项目导航器窗格中点击 `MainMenu.xib` 文件。

  -   在项目导航器右侧出现的窗格中，点击窗口图标。程序的用户界面将显示。

  -   选择 `Edit` ➤ `Select All`（或按 `Command+A`）。Xcode 会选中当前位于用户界面窗口上的堆栈视图。

  -   按键盘上的 `Delete` 键，或选择 `Edit` ➤ `Delete`，从窗口中删除所有用户界面项目。

  -   选择 `View` ➤ `Utilities` ➤ `Show Object Library`。

  -   将单个文本字段拖到用户界面窗口的中间位置。（无需担心精确定位。）

  -   将鼠标指针移到文本字段上，按住 `Control` 键，向窗口右边缘拖动鼠标。

  -   松开 `Control` 键和鼠标按钮，会弹出一个窗口。

  -   选择 `Trailing Space to Container`。Xcode 会创建一个从文本字段右边缘到窗口右边缘的约束。

  -   将鼠标指针移到文本字段上，按住 `Control` 键，向窗口左边缘拖动鼠标。

  -   松开 `Control` 键和鼠标按钮，会弹出一个窗口。

  -   选择 `Leading Space to Container`。Xcode 会创建一个从文本字段左边缘到窗口左边缘的约束。

  -   选择 `Product` ➤ `Run`。用户界面窗口将显示。

  -   将鼠标指针移到窗口右边缘，向右拖动鼠标以扩展窗口宽度。注意，文本字段会随之向右扩展。

  -   将鼠标指针移到窗口右边缘，向左拖动鼠标以缩小窗口宽度。注意，文本字段会随之缩小。如果你持续缩小窗口宽度，文本字段最终会完全消失，这很可能不是你期望的结果。

  -   选择 `StackViewProgram` ➤ `Quit StackViewProgram`。


  目前，我们有两个约束使文本字段与两个窗口边缘保持固定距离，但它们无法阻止文本字段在窗口过度缩小时消失。一种解决方法是为其创建一个压缩约束。


  压缩约束用于防止用户界面项目过度缩小或扩展。要创建压缩约束，你需要按住 `Control` 键并在该用户界面元素的边界内拖动鼠标。


  -   选择 `Product` ➤ `Run`。用户界面窗口将显示。

  -   将鼠标指针移到窗口右边缘，尝试拖动窗口以扩展或缩小其宽度。注意，由于压缩约束的存在，你无法做到这一点。

  -   选择 `StackViewProgram` ➤ `Quit StackViewProgram`。

  -   选择 `Width`。Xcode 会在文本字段下方显示一个压缩约束，如图 22-4 所示。


  ![A978-1-4842-1233-2_22_Fig4_HTML.jpg](img/A978-1-4842-1233-2_22_Fig4_HTML.jpg)


  图 22-4. 压缩约束显示在用户界面项目下方


  -   确保 `StackViewProgram` 项目已加载到 Xcode 中。

  -   在项目导航器窗格中点击 `MainMenu.xib` 文件。

  -   将鼠标指针移到文本字段上。

  -   按住 `Control` 键，向左或向右拖动鼠标，同时保持鼠标指针在文本字段的边界内。

  -   松开 `Control` 键和鼠标按钮，会弹出一个菜单，如图 22-3 所示。


  ![A978-1-4842-1233-2_22_Fig3_HTML.jpg](img/A978-1-4842-1233-2_22_Fig3_HTML.jpg)


  图 22-3. 定义压缩约束




  压缩约束告诉`Xcode`保持文本字段固定宽度，而左侧和右侧约束告诉`Xcode`保持文本字段与窗口左右边缘的固定距离。为满足所有这些约束，窗口的宽度将无法再调整大小。


  如果希望保持文本字段宽度不小于其当前宽度，但允许窗口调整大小，该怎么办？一种解决方案是使用约束优先级。


  优先级定义了哪些约束必须首先满足。每次创建约束时，`Xcode`都会为其赋予优先级`1000`，这是可能的最高优先级。如果为约束赋予较低的优先级，则该约束将允许更高优先级的约束优先执行。让我们看看更改约束优先级的效果：


  选择`Product ➤ Run`。用户界面窗口出现。将鼠标指针移动到窗口右边缘，并尝试拖动窗口以扩展或缩小其宽度。请注意，如果缩小窗口宽度，文本字段会再次消失。选择`StackViewProgram
  ➤ Quit StackViewProgram`。选择`Low (250)`。请注意，`Xcode`现在以虚线显示宽度约束，直观地表明其优先级低于实线显示的约束，如图
  22-7 所示。


  ![A978-1-4842-1233-2_22_Fig7_HTML.jpg](img/A978-1-4842-1233-2_22_Fig7_HTML.jpg)


