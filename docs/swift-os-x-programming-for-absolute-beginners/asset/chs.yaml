  \ Navigator** 中点击 `MainMenu.xib` 文件。点击 `DictionaryProgram` 图标，让用户界面的窗口显示出来。选择 **View**\
  \ ➤ **Utilities** ➤ **Show Object Library**，让 **Object Library** 出现在 Xcode 窗口的右下角。\n\
  \n在用户界面上拖入三个 **Push Buttons**、六个 **Labels** 和六个 **Text Fields**，然后双击这些按钮和标签，更改它们上面显示的文本，使其与图\
