  \ 文件之外是如何运行的。\n\n在这个示例程序中，用户需要输入员工 ID 编号和密码。员工 ID 编号必须在 100 到 150 之间才有效，密码则必须与字符串\
  \ `\"password\"`（这并不是一个安全的密码）完全匹配。\n\n这意味着我们将使用两个比较运算符来检查 ID 和密码是否有效，然后使用一个逻辑运算符来确保两者都有效。\n\
