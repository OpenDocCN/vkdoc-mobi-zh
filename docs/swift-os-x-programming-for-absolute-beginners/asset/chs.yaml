  \ `NSObject`，将会出现一个弹出窗口，如图 12-11 所示。\n\n![A978-1-4842-1233-2_12_Fig11_HTML.jpg](img/A978-1-4842-1233-2_12_Fig11_HTML.jpg)\n\
