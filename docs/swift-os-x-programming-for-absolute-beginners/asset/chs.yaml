  \ `IBAction` 内部还没有任何 Swift 代码，所以现在我们需要在那些定义 `IBAction` 方法起始位置的花括号内输入 Swift 代码。\n\
  \n确保 Xcode 仍然并排显示你的用户界面和 `AppDelegate.swift` 文件。选择 **View ➤ Standard Editor ➤ Show\
  \ Standard Editor**。Xcode 现在只显示你的 `MyFirstProgram` 用户界面。在 **Project Navigator**\
  \ 中点击 `AppDelegate.swift` 文件。Xcode 会显示存储在 `AppDelegate.swift` 文件中的所有 Swift 代码。按如下方式编辑\
