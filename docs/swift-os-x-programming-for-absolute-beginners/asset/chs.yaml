  \ 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开鼠标和 **Control**\
  \ 键。会弹出一个窗口。点击 **Connection** 弹出菜单，选择 **Action**。点击 **Name** 文本字段，输入 `deleteButton`。点击\
  \ **Type** 弹出菜单，选择 `NSButton`。然后点击 **Connect** 按钮。\n\n- 将鼠标移到 **Query** 按钮上，按住 **Control**\
  \ 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Connection**\
  \ 弹出菜单，选择 **Action**。点击 **Name** 文本字段，输入 `queryButton`。点击 **Type** 弹出菜单，选择 `NSButton`。然后点击\
  \ **Connect** 按钮。\n\n`AppDelegate.swift` 文件的底部应该看起来像这样：\n\n```\n@IBAction func addButton(sender:\
  \ NSButton) {\n}\n@IBAction func deleteButton(sender: NSButton) {\n}\n@IBAction\
  \ func queryButton(sender: NSButton) {\n}\n```\n\n- 将鼠标移到 **Key** 文本字段上（该字段出现在 **Add**\
  \ 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行下方。松开鼠标和 **Control**\
  \ 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `addKeyField`，然后点击 **Connect** 按钮。\n\n- 将鼠标移到 **Value**\
  \ 文本字段上（该字段出现在 **Add** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`\
  \ 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `addValueField`，然后点击 **Connect**\
  \ 按钮。\n\n- 将鼠标移到 **Key** 文本字段上（该字段出现在 **Delete** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `deleteKeyField`，然后点击\
  \ **Connect** 按钮。\n\n- 将鼠标移到 **Count** 文本字段上（该字段出现在 **Query** 按钮右侧），按住 **Control**\
  \ 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name**\
  \ 文本字段，输入 `queryCountField`，然后点击 **Connect** 按钮。\n\n- 将鼠标移到 **Keys** 文本字段上（该字段出现在\
  \ **Query** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行下方。松开鼠标和\
  \ **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `queryKeysField`，然后点击 **Connect** 按钮。\n\
  \n- 将鼠标移到 **Values** 文本字段上（该字段出现在 **Query** 按钮右侧），按住 **Control** 键，拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行下方。松开鼠标和 **Control** 键。会弹出一个窗口。点击 **Name** 文本字段，输入 `queryValuesField`，然后点击\
  \ **Connect** 按钮。\n\n你现在应该拥有以下代表用户界面上所有文本字段的 `IBOutlets`：\n\n```\n@IBOutlet weak\
  \ var window: NSWindow!\n@IBOutlet weak var addKeyField: NSTextField!\n@IBOutlet\
  \ weak var addValueField: NSTextField!\n@IBOutlet weak var deleteKeyField: NSTextField!\n\
  @IBOutlet weak var queryCountField: NSTextField!\n@IBOutlet weak var queryKeysField:\
  \ NSTextField!\n@IBOutlet weak var queryValuesField: NSTextField!\n```\n\n\n\n至此，我们已经将用户界面连接到\
  \ Swift 代码，这样就可以使用`IBOutlet`来检索数据并在用户界面上显示。我们还创建了`IBAction`方法，以便用户界面上的按钮能够真正让程序运行起来。现在，我们只需要编写\
  \ Swift 代码来创建一个初始字典，然后在每个`IBAction`方法中编写更多的 Swift 代码，用于添加、删除或查询字典。\n\n在`AppDelegate.swift`文件中的`IBOutlet`列表下方，输入以下代码来创建一个字典，其中键是整数，值是字符串：\n\
  \n`var myDictionary = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"]`\n\n修改`addButton`的 IBAction\
  \ 方法，使其从键（Key）和值（Value）文本字段中获取值，并将其添加到字典中，代码如下：\n\n```\n@IBAction func addButton(sender:\
  \ NSButton) {\n    myDictionary.updateValue(addValueField.stringValue, forKey: addKeyField.integerValue)\n\
  }\n```\n\n修改`deleteButton`的 IBAction 方法，使其从键（Key）文本字段中获取值，并从字典中删除关联的值，代码如下：\n\n\
  ```\n@IBAction func deleteButton(sender: NSButton) {\n    myDictionary.removeValueForKey(deleteKeyField.integerValue)\n\
  }\n```\n\n修改`queryButton`的 IBAction 方法，代码如下：\n\n```\n@IBAction func queryButton(sender:\
  \ NSButton) {\n    queryCountField.integerValue = myDictionary.count\n    var keyList\
  \ = \"\"\n    for key in myDictionary.keys {\n        keyList = keyList + \"\\(key)\"\
  \ + \" \"\n    }\n    queryKeysField.stringValue = keyList\n    var valueList =\
  \ \"\"\n    for value in myDictionary.values {\n        valueList = valueList +\
  \ \"\\(value)\" + \" \"\n    }\n    queryValuesField.stringValue = valueList\n}\n\
  ```\n\n`myDictionary.count`命令的作用是统计字典中键值对的数量，并将该数字显示在`queryCountField`这个`IBOutlet`中。\n\
  \n第一个 for-in 循环遍历字典中的每一个键，并将其存储在一个名为`keyList`的字符串中。然后，将这个文本字符串显示在`queryKeysField`这个`IBOutlet`中。\n\
  \n最后一个 for 循环遍历字典中的每一个值，并将其存储在一个名为`valueList`的字符串中。然后，将这个文本字符串显示在`queryValuesField`这个`IBOutlet`中。\n\
  \n`AppDelegate.swift`文件的完整内容应如下所示：\n\n```\nimport Cocoa\n\n@NSApplicationMain\n\
  class AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var addKeyField: NSTextField!\n    @IBOutlet weak\
  \ var addValueField: NSTextField!\n    @IBOutlet weak var deleteKeyField: NSTextField!\n\
  \    @IBOutlet weak var queryCountField: NSTextField!\n    @IBOutlet weak var queryKeysField:\
  \ NSTextField!\n    @IBOutlet weak var queryValuesField: NSTextField!\n\n    var\
  \ myDictionary = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"]\n\n    func applicationDidFinishLaunching(aNotification:\
  \ NSNotification) {\n        // 在此处插入初始化应用程序的代码\n    }\n\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n        // 在此处插入清理应用程序的代码\n    }\n\n    @IBAction func addButton(sender:\
  \ NSButton) {\n        myDictionary.updateValue(addValueField.stringValue, forKey:\
  \ addKeyField.integerValue)\n    }\n\n    @IBAction func deleteButton(sender: NSButton)\
  \ {\n        myDictionary.removeValueForKey(deleteKeyField.integerValue)\n    }\n\
  \n    @IBAction func queryButton(sender: NSButton) {\n        queryCountField.integerValue\
  \ = myDictionary.count\n        var keyList = \"\"\n        for key in myDictionary.keys\
  \ {\n            keyList = keyList + \"\\(key)\" + \" \"\n        }\n        queryKeysField.stringValue\
  \ = keyList\n        var valueList = \"\"\n        for value in myDictionary.values\
  \ {\n            valueList = valueList + \"\\(value)\" + \" \"\n        }\n    \
  \    queryValuesField.stringValue = valueList\n    }\n}\n```\n\n查询（Query）按钮的工作方式是：只需点击它，即可显示当前字典内容的相关信息。\n\
  \n添加（Add）按钮的工作方式是：用户在键（Key）和值（Value）文本字段中输入一个键（整数）和一个名称（字符串），然后点击添加（Add）按钮。\n\n\
  删除（Delete）按钮的工作方式是：用户在键（Key）文本字段中输入一个键（整数），然后点击删除（Delete）按钮。\n\n点击添加或删除按钮后，再次点击查询（Query）按钮即可查看更改。要了解此程序的工作方式，请执行以下步骤：\n\
