  \n\n\n## 使用日期选择器\n\n日期选择器能让用户以规范的格式轻松选择日期和/或时间。三种日期选择器外观类型如图 16-7 所示：\n\n![A978-1-4842-1233-2_16_Fig7_HTML.jpg](img/A978-1-4842-1233-2_16_Fig7_HTML.jpg)\n\
