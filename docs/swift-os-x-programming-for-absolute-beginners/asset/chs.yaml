  \ 文件顶部附近的 `IBOutlet` 行下方。\n3.  松开 Control 键和鼠标。此时会弹出一个窗口。\n4.  点击“名称”文本字段，输入 `myPopUp`。然后点击“连接”按钮。Xcode\
  \ 会创建一个 `IBOutlet`。\n5.  将鼠标指针移到文本字段上，按住 Control 键，然后将鼠标拖拽到 `AppDelegate.swift`\
  \ 文件顶部附近的 `IBOutlet` 行下方。\n6.  松开 Control 键和鼠标。此时会弹出一个窗口。\n7.  点击“名称”文本字段，输入 `newItem`。然后点击“连接”按钮。Xcode\
  \ 会创建另一个 `IBOutlet`，因此你应该会有两个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet weak var myPopUp:\
