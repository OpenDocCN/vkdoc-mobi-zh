  \ WindowProgram`（WindowProgram ➤ 退出 WindowProgram）。\n\n\n\n## 在 OS X 程序中定义约束\n\n\
  要充分理解约束的工作原理，你需要观察它们在实际程序中的应用。这样才能看到用户界面在每次调整窗口大小时是如何适配的。在这个示例程序中，我们将为按钮和文本字段定义关系约束，同时为图片定义宽高比约束。\n\
