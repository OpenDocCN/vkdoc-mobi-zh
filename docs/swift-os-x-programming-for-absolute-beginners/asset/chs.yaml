  \n图 8-10.\n\n更改水平滑块属性\n\n通过这个用户界面，用户可以使用水平滑块在 1 到 10 之间选择一个数字。如果用户猜的数值过高，标签会显示“过高”。如果用户猜的数值过低，标签会显示“过低”。\n\
  \n每次用户猜错时，底部的标签会显示错误的猜测值。当用户猜对数字时，顶部的标签会显示“你猜对了！”。\n\n在此示例中，我们需要两个 `IBOutlet` 变量来连接到每个标签，以便我们可以在每个标签上显示信息。然后我们需要一个\
  \ `IBAction` 方法来连接到 **猜测** 按钮。这样，当用户点击 **猜测** 按钮时，`IBAction` 方法可以检查用户是否使用水平滑块选择了正确的数字。\n\
  \n我们需要编写 Swift 代码，在 1 到 10 之间选择一个随机数。然后我们将使用一个循环列出用户所做的所有猜测，并在警告对话框中显示这些结果。\n\n\
  要将 Swift 代码连接到您的用户界面，请执行以下步骤：\n\n在 Xcode 窗口中保持您的用户界面可见，选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。`AppDelegate.swift`\
  \ 文件会出现在用户界面的旁边。将鼠标移到顶部的标签上，按住 **Control** 键，从顶部的文本字段拖拽到 `AppDelegate.swift` 文件中现有\
  \ `@IBOutlet` 行的下方，如图 8-11 所示。\n\n![A978-1-4842-1233-2_8_Fig11_HTML.jpg](img/A978-1-4842-1233-2_8_Fig11_HTML.jpg)\n\
  \n图 8-11.\n\n从顶部标签按住 Control 键拖拽到 `AppDelegate.swift` 文件。松开鼠标和 **Control** 键。会弹出一个弹出窗口，如图\
  \ 8-12 所示。\n\n![A978-1-4842-1233-2_8_Fig12_HTML.jpg](img/A978-1-4842-1233-2_8_Fig12_HTML.jpg)\n\
  \n图 8-12.\n\n用于定义 `IBOutlet` 的弹出窗口。在 **名称** 文本字段中点击并输入 `messageLabel`，然后点击 **连接**\
  \ 按钮。Xcode 会创建一个 `IBOutlet`。将鼠标移到底部的标签上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个弹出窗口。在 **名称** 文本字段中点击并输入 `guessLabel`，然后点击\
  \ **连接** 按钮。Xcode 会创建另一个 `IBOutlet`。将鼠标移到水平滑块上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个弹出窗口。在 **名称** 文本字段中点击并输入 `guessSlider`，然后点击\
  \ **连接** 按钮。Xcode 会创建另一个 `IBOutlet`。您现在应该有三个 `IBOutlet`，代表您用户界面上的两个文本字段：\n\n```\n\
  @IBOutlet weak var messageLabel: NSTextField!\n@IBOutlet weak var guessLabel: NSTextField!\n\
  @IBOutlet weak var guessSlider: NSSlider!\n```\n\n编辑 `IBOutlet` 下方的内容，使其看起来像这样：\n\
  \n```\nimport Cocoa\n\n@NSApplicationMain\nclass AppDelegate: NSObject, NSApplicationDelegate\
  \ {\n\n    @IBOutlet weak var window: NSWindow!\n    @IBOutlet weak var messageLabel:\
  \ NSTextField!\n    @IBOutlet weak var guessLabel: NSTextField!\n    @IBOutlet weak\
  \ var guessSlider: NSSlider!\n\n    var randomNumber : Int\n    var guessHistory\
  \ : String\n    var guessNumber : Int\n    var guessArray = [Int]()\n    var arrayTotal\
  \ : Int\n\n    override init () {\n        self.guessHistory = \"\"\n        self.guessNumber\
  \ = 0\n        self.guessArray = []\n        self.arrayTotal = 0\n        self.randomNumber\
  \ = 1 + Int(arc4random_uniform(10))\n        // Int(arc4random_uniform(10)) 在 0\
  \ 到 9 之间选择一个随机数，因此我们需要加 1，使其在 1 到 10 之间选择随机数\n    }\n\n    func applicationDidFinishLaunching(aNotification:\
  \ NSNotification) {\n        // 在此处插入代码以初始化您的应用程序\n    }\n\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n        // 在此处插入代码以关闭您的应用程序\n    }\n```\n\n`IBOutlet` 变量连接到用户界面上的项目。\n\
  \n```\n@IBOutlet weak var window: NSWindow!\n\n@IBOutlet weak var messageLabel:\
  \ NSTextField!\n\n@IBOutlet weak var guessLabel: NSTextField!\n\n@IBOutlet weak\
  \ var guessSlider: NSSlider!\n```\n\n接下来的五行声明了整个类 `AppDelegate` 可以使用的变量。\n\n```\n\
  var guessHistory : String\n\nvar guessNumber : Int\n\nvar guessArray = [Int]()\n\
  \nvar arrayTotal : Int\n\nvar randomNumber : Int\n```\n\n\n\n当你在类内部定义变量（称为属性）时，需要为它们指定初始值。这就是重写`init`方法的目的：\n\
  \n```\noverride init () {\n    self.guessHistory = \"\"\n    self.guessNumber =\
  \ 0\n    self.guessArray = []\n    self.arrayTotal = 0\n    self.randomNumber =\
  \ 1 + Int(arc4random_uniform(10))\n    // Int(arc4random_uniform(10)) 会在 0 到 9 之间选择一个随机数，因此我们需要加\
  \ 1，使其在 1 到 10 之间选择随机数\n}\n```\n\n`self`关键字告诉 Xcode 所有这些变量都是在同一个类（`AppDelegate`类）内部定义的。最后一行创建了一个\
  \ 1 到 10 之间的随机数。\n\n整个程序的工作方式是：首先创建所有变量，然后运行重写的`init`方法来为这些变量存储初始值。\n\n将鼠标移到 Guess\
  \ 按钮上，按住 Control 键，然后将鼠标拖拽到`AppDelegate.swift`文件中最后一个右花括号的上方。松开鼠标和 Control 键。此时会弹出一个窗口。在\
  \ Connection 弹出菜单中点击并选择 Action 来创建一个`IBAction`方法。在 Name 文本框中点击并输入`checkGuess`。在\
  \ Type 弹出菜单中点击并选择`NSButton`，如图 8-13 所示。\n\n![A978-1-4842-1233-2_8_Fig13_HTML.jpg](img/A978-1-4842-1233-2_8_Fig13_HTML.jpg)\n\
  \n**图 8-13. 定义一个`IBAction`方法**  \n点击 Connect 按钮。Xcode 会创建一个空的`IBAction`方法。按下述方式修改`IBAction\
  \ checkGuess`方法：\n\n```\n@IBAction func checkGuess(sender: NSButton) {\n    var\
  \ userGuess : Int = 0\n    // 从水平滑块获取猜测值\n    userGuess = guessSlider.integerValue\n\
  \    // 将猜测值存储在 guessArray 中\n    guessArray.append(userGuess)\n    if userGuess\
  \ < randomNumber {\n        messageLabel.stringValue = \"Too Low\"\n    } else if\
  \ userGuess > randomNumber {\n        messageLabel.stringValue = \"Too High\"\n\
  \    } else {\n        messageLabel.stringValue = \"You got it!\"\n        arrayTotal\
  \ = guessArray.count\n        for var i = 0; i < arrayTotal; i++ {\n           \
  \ guessHistory += \"Guess \\(i+1) = \\(guessArray[i])\" + \"\\r\\n\"\n        }\n\
  \        var myAlert = NSAlert()\n        myAlert.messageText = guessHistory\n \
  \       myAlert.runModal()\n    }\n    guessLabel.stringValue = guessLabel.stringValue\
  \ + \" \\(userGuess)\"\n}\n```\n\n让我们逐一讲解这个`IBAction`方法，以便你准确理解其执行过程。首先，用户需要使用水平滑块选择一个数字进行猜测。选择数字后，用户需要点击\
  \ Guess 按钮，这将触发名为`checkGuess`的`IBAction`方法。\n\n下面这行声明了一个名为`userGuess`的整型变量，并将其值设置为\
  \ 0。这行代码并非绝对必要，但它确保了`userGuess`变量有一个初始值。\n\n```\nvar userGuess : Int = 0\n```\n\n\
  下一行从水平滑块中获取值，该滑块由名为`guessSlider`的`IBOutlet`变量表示。要获取水平滑块所代表的整数值，必须使用`integerValue`属性。这将把水平滑块的值存储到我们刚刚声明为整型变量的`userGuess`变量中。\n\
  \n```\nuserGuess = guessSlider.integerValue\n```\n\n下一行将存储在`userGuess`变量中的值添加到名为`guessArray`的数组中。这个数组必须在程序的前面部分定义。\n\
  \n```\nguessArray.append(userGuess)\n```\n\n`if-else if`语句创建了三个分支。第一个分支在`userGuess`变量小于`randomNumber`变量时执行，`randomNumber`必须在程序前面定义。这会在由`messageLabel`这个`IBOutlet`表示的标签中显示文本“Too\
  \ Low”。\n\n```\nif userGuess < randomNumber {\n    messageLabel.stringValue = \"\
  Too Low\"\n```\n\n第二个分支在`userGuess`变量大于`randomNumber`变量时执行。这会在`messageLabel`标签中显示文本“Too\
  \ High”。\n\n```\n} else if userGuess > randomNumber {\n    messageLabel.stringValue\
  \ = \"Too High\"\n```\n\n第三个分支在`userGuess`变量既不小于也不大于`randomNumber`变量时执行，这意味着它必须恰好等于`randomNumber`变量。这会在`messageLabel`标签中显示文本“You\
  \ got it!”。\n\n```\n} else {\n    messageLabel.stringValue = \"You got it!\"\n```\n\
  \n然后，它统计存储在`guessArray`中的项目总数，并将这个值放入`arrayTotal`变量中，该变量必须在程序前面定义。\n\n```\narrayTotal\
  \ = guessArray.count\n```\n\n现在，它使用一个`for`循环从 0 计数到`arrayTotal - 1`（`i < arrayTotal`），每次递增\
  \ 1（`i++`）。它创建一个字符串，存储猜测序号（例如 Guess 1）和用户选择的猜测值，放到名为`guessHistory`的字符串变量中，该变量必须在程序前面定义。请注意，你可以通过在字符串中使用`\\\
  (...)`字符来打印数字，其中非字符串值出现在圆括号内。这使你可以将非字符串值存储在字符串中，而无需先将它们转换为字符串数据类型。\n\n另请注意，如果你直接输入`\"\
  Guess \\(i)\"`，那么第一个字符串将存储值“Guess 0”作为第一次猜测。为避免这种情况，我们需要在当前`i`值上加 1。\n\n注意，字符串末尾还包含字符`\"\
  \\r\\n\"`。这些符号分别代表回车符和换行符。这些是不可见字符，用于告诉 Xcode，如果我们添加更多文本，它将显示在下一行。\n\n```\nfor var\
  \ i = 0; i < arrayTotal; i++ {\n    guessHistory += \"Guess \\(i+1) = \\(guessArray[i])\"\
  \ + \"\\r\\n\"\n}\n```\n\n`for`循环内部的代码使用复合赋值运算符（`+=`）将此字符串添加到`guessHistory`变量中已有的任何字符串中。由于`\"\
  \\r\\n\"`字符会创建回车和换行，任何新添加的字符串都将出现在下一行。\n\n接下来的三行创建一个警报对话框（`NSAlert`），将`guessHistory`变量中的字符串存储到警报对话框的`messageText`属性中，然后显示该对话框，以显示你猜了多少次以及每次猜测时选择的数字，如图\
  \ 8-14 所示。\n\n![A978-1-4842-1233-2_8_Fig14_HTML.jpg](img/A978-1-4842-1233-2_8_Fig14_HTML.jpg)\n\
  \n**图 8-14. 警报对话框中显示的典型结果**\n\n```\nvar myAlert = NSAlert()\nmyAlert.messageText\
  \ = guessHistory\nmyAlert.runModal()\n```\n\n`IBAction`方法的最后一行仅将用户的猜测存储在`guessLabel`这个`IBOutlet`中，这使得文本显示在底部的标签中。\n\
  \n```\nguessLabel.stringValue = guessLabel.stringValue + \" \\(userGuess)\"\n```\n\
  \n此时，程序等待用户通过水平滑块选择一个值并点击 Guess 按钮。\n\n选择 Product ➤ Run。Xcode 会运行你的`LoopingProgram`工程。在水平滑块上点击一个值来猜测一个数字。点击\
  \ Guess 按钮。如果你猜得太低或太高，会分别显示“Too Low”或“Too High”消息。最终当你猜中正确的数字时，会弹出一个 Alert 对话框，如图\
  \ 8-15 所示。\n\n![A978-1-4842-1233-2_8_Fig15_HTML.jpg](img/A978-1-4842-1233-2_8_Fig15_HTML.jpg)\n\
  \n**图 8-15. 显示 Alert 对话框**  \n点击 Alert 对话框中的 OK 按钮使其消失。选择 LoopingProgram ➤ Quit\
  \ LoopingProgram。\n\n\n\n## 摘要\n\n循环允许你重复执行一行或多行代码，其运行机制是不断执行代码直到布尔值变为 `false`。`while`\
  \ 循环会先检查一个布尔值，这意味着它可能执行零次或多次。`repeat-while` 循环则在最后检查布尔值，这意味着它至少会执行一次。\n\n`for` 循环允许你根据起始值、一个布尔值以及一个递增计数运算符来指定循环的执行次数。`for-in`\
  \ 循环可以自动统计列表中的项目数量。\n\n在创建循环时，务必确保循环有结束的方式。如果循环永不结束，就会变成无限循环，这会导致你的程序看起来像死机且无响应。\n\
  \n每种类型的循环各有优缺点，但你总能通过一种循环来模拟其他循环的功能。如果需要提前退出循环，可以使用 `break` 命令配合 `if` 语句。\n\n循环让你的程序有能力完成重复性任务，而无需你编写重复的命令。只需确保你的循环最终总会结束，并且在停止前能够运行正确的次数。\n\
  \n"
- "# 9. 数组与字典\n\n电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​9](http://dx.doi.org/10.1007/978-1-4842-1233-2_9))\
  \ 包含补充材料，仅供授权用户使用。\n\n几乎每个程序都需要接收数据，以便处理数据并计算出有用的结果。临时存储数据的最简单方式是通过可以存储数字或文本字符串的变量。但是，如果你需要存储多个数据块，例如一个姓名列表或一个产品编号列表，该怎么办？你可以像这样创建多个变量：\n\
  \n`var employee001, employee002, employee003 : String`\n\n不幸的是，创建独立的变量来存储相关数据可能很笨拙。如果你不知道需要存储多少项数据怎么办？那么你可能会创建太多或不够用的变量。更糟糕的是，将相关数据存储在独立的变量中，很容易忽略数据之间的关联性。\n\
  \n例如，如果你将三个员工的名字存储在三个不同的变量中，你如何知道是否还有第四个、第五个或第六个变量包含额外的员工姓名？除非你在代码中将变量保持在一起，否则很容易遗漏存储在独立变量中的相关数据。\n\
  \n这就是为什么 Swift 提供了另外两种存储数据的方式：数组和字典。这两种数据结构背后的核心理念是，创建一个可以容纳多个项目的单个变量。现在，你可以将相关数据存储在一个地方，并轻松地再次查找和检索它。\n\
  \n数组和字典都旨在存储同一数据类型的多个副本，例如一个姓名列表（`String`）或一个数字列表（`Int`）。如果你想存储一个由不同类型数据（如整数、小数和字符串）组成的列表，你可以将数组或字典声明为持有\
  \ `AnyObject` 数据类型，它可以存储任何类型的数据。\n\n## 使用数组\n\n你可以将数组想象成一个由无数个桶组成的序列，每个桶正好可以容纳一块数据。为了帮助你找到存储在数组中的数据，每个数组元素（桶）都由一个称为索引的数字来标识。数组中的第一项定义在索引\
  \ 0 处，第二项定义在索引 1 处，第三项定义在索引 2 处，依此类推，如图 9-1 所示。\n\n![A978-1-4842-1233-2_9_Fig1_HTML.gif](img/A978-1-4842-1233-2_9_Fig1_HTML.gif)\n\
  \n图 9-1. 数组的结构\n\n要创建一个数组，你必须定义数组的名称以及该数组可以容纳的数据类型。创建数组的一种方法如下：\n\n`var arrayName\
  \ = Array<DataType>()`\n\n数组名称可以是任何你想要的名字，不过最好选择一个描述性的名称来标识数组所保存的数据类型，例如 `employeeArray`。数据类型可以是\
  \ `Int`（整数）、`String`（字符串）、`Float` 或 `Double`（小数），甚至是另一个数据结构的名称。（数组中可以包含其他数组。）\n\n\
  创建数组的第二种方法如下：\n\n`var arrayName = [DataType]()`\n\n这两种方法都会创建一个空数组。此时，你需要开始向该数组中添加项目。如果你想在创建数组的同时用它存储项目，你需要使用\
  \ `arrayLiteral` 关键字，例如：\n\n`var arrayName = Array<Int>(arrayLiteral: 34, 89, 70,\
  \ 1, -24)`\n\n或\n\n`var arrayName = Int`\n\n这两个命令都创建了一个名为 `arrayName` 且只能保存整数的数组。然后，`arrayLiteral`\
  \ 关键字后面跟着整数列表，用数据填充数组。因为你必须定义数据类型，所以这两种方法都可以与 `AnyObject` 一起使用，以便在数组中存储不同类型的数据。\n\
  \n创建数组的一种更短、更简单的方法是定义一个数组名称，并将其设置为一个包含相同数据类型的项目列表，如下所示：\n\n`var myArrray = [34,\
  \ 89, 70, 1, -24]`\n\n然后 Swift 会根据数据推断数组的数据类型。此方法仅在数组中的所有项目都是同一数据类型（例如全是整数或全是小数）时才有效。\n\
  \n**注意**\n\n当你使用 `var` 关键字声明一个数组时，你可以向该数组添加和删除项目。如果你不希望数组被修改，请使用 `let` 关键字声明它，如下所示：`let\
  \ arrayName = [34, 89, 70, 1, -24]`。使用 `let` 关键字声明的数组永远无法修改。\n\n在之前保存整数的数组示例中，第一个数字\
  \ (34) 在索引 0 处，第二个数字 (89) 在索引 1 处，第三个数字 (70) 在索引 2 处，第四个数字 (1) 在索引 3 处，第五个数字 (-24)\
  \ 在索引 4 处。因为数组从 0 开始计算索引号，所以 Swift 数组被称为基于零的数组。（某些编程语言从 1 开始计算数组的索引，因此它们被称为基于一的数组。）\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\n\n### 向数组添加元素\n\n无论数组是空的还是已经填充了数据，你都可以使用\
  \ `append` 命令向数组中添加更多元素，如下所示：\n\n`arrayName.append(data)`\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号中。确保添加的数据具有正确的数据类型。因此，如果要将数据添加到一个只能保存整数的数组中，则只能向该数组添加另一个整数。\n\
  \n除了使用 `append` 命令，你还可以使用加法复合赋值运算符向数组末尾添加元素，如下所示：\n\n`arrayName3 += [data1, data2,\
  \ data3, ... dataN]`\n\n`+=` 复合赋值运算符可以向数组末尾添加多个元素，而 `append` 命令一次只能向数组末尾添加一个元素。\n\
  \n`append` 命令总是将新元素添加到数组的末尾。如果要将新元素添加到数组中的特定位置，可以使用 `insert` 和 `atIndex` 命令，如下所示：\n\
  \n`arrayName.insert(data, atIndex: index)`\n\n使用 `insert` 命令，你必须添加与该数组数据类型一致的数据。然后，你还必须指定索引编号。如果你选择的索引编号大于数组大小，`insert`\
  \ 命令将无法生效。\n\n要了解如何创建数组并向其中添加数据，请按照以下步骤创建一个新的 playground：\n\n-   启动 Xcode。\n-  \
  \ 选择 **文件** ➤ **新建** ➤ **Playground**。（如果你看到 Xcode 欢迎屏幕，也可以点击 **开始使用 playground**。）Xcode\
  \ 会要求你输入 playground 名称和平台。\n-   点击 **名称** 文本字段并输入 `ArrayPlayground`。\n-   点击 **平台**\
  \ 弹出菜单并选择 **OS X**。Xcode 会询问你希望将 playground 文件保存在哪里。\n-   点击一个你想要保存 playground 文件的文件夹，然后点击\
  \ **创建** 按钮。Xcode 会显示该 playground 文件。\n-   按如下方式编辑代码：\n\n```\nimport Cocoa\nvar\
  \ arrayName = Array<Int>(arrayLiteral: 34, 89, 70, 1, -24)\nvar arrayName2 = Int\n\
  arrayName.append(2)\narrayName2.append(2)\narrayName.insert(-37, atIndex: 2)\narrayName2.insert(-37,\
  \ atIndex: 2)\n```\n\n注意 `append` 和 `insert` 命令的工作方式有何不同，如图 9-2 所示。\n\n![A978-1-4842-1233-2_9_Fig2_HTML.jpg](img/A978-1-4842-1233-2_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 在 Playground 中创建数组\n\n### 从数组删除元素\n\n就像你可以向数组添加元素一样，你也可以从数组中删除元素。要删除数组中的最后一个元素，你可以使用\
  \ `removeLast` 命令，如下所示：\n\n`arrayName.removeLast()`\n\n这不仅会删除数组中的最后一个元素，还会返回该值。如果你想将数组的最后一个元素保存到一个变量中，可以这样做：\n\
  \n`var item = arrayName.removeLast()`\n\n如果你想从数组中删除一个特定元素，你可以使用 `removeAtIndex`\
  \ 命令来标识该元素的索引编号，如下所示：\n\n`arrayName.removeAtIndex(number)`\n\n因此，如果你想删除数组中的第二个元素，你应指定索引为\
  \ 1。与 `removeLast` 命令一样，`removeAtIndex` 命令也会返回一个值，你可以将其存储在变量中，如下所示：\n\n`var item\
  \ = arrayName.removeAtIndex(1)`\n\n如果你想删除数组中的所有元素，可以使用 `removeAll` 命令，如下所示：\n\n\
  `arrayName.removeAll()`\n\n要了解如何从数组中删除元素，请按照以下步骤操作：\n\n-   确保在 Xcode 中加载了 `ArrayPlayground`\
  \ 文件。\n-   按如下方式编辑代码：\n\n```\nimport Cocoa\nvar arrayName = Int\nvar item = arrayName.removeLast()\n\
  print (arrayName)\nprint (item)\nitem = arrayName.removeAtIndex(1)\nprint (arrayName)\n\
  print (item)\narrayName.removeAll()\n```\n\n注意在从数组中删除元素时，不同命令的工作方式，如图 9-3 所示。指定索引值时，必须确保索引编号存在。这意味着如果一个数组包含三个元素，则第一个元素的索引为\
  \ 0，第二个元素的索引为 1，第三个元素的索引为 2。因此，你可以从该数组中删除索引值为 0、1 或 2 的元素，但任何其他索引编号都将无效。\n\n![A978-1-4842-1233-2_9_Fig3_HTML.jpg](img/A978-1-4842-1233-2_9_Fig3_HTML.jpg)\n\
  \n图 9-3. 从数组中删除元素\n\n从数组中删除元素会物理地从该数组中移除该元素。除了从数组中删除元素，你也可以用新值替换现有元素。你只需指定要替换的数组元素的索引值，并为其分配新数据，如下所示：\n\
  \n`arrayName[index] = newData`\n\n因此，如果你想用新数据替换数组中的第二个元素（索引值为 1），你可以执行以下操作：\n\n\
  `arrayName[1] = 91`\n\n数组中索引值为 1 处存储的任何现有值都将被数字 91 替换。替换数据时，新数据必须与数组中的其他元素具有相同的数据类型，例如整数或字符串。\n\
  \n### 查询数组\n\n当你拥有一个数组时，你可能想知道该数组是否为空（其中存储了零个元素），或者如果数组中有元素，则想知道它包含多少个元素。要确定数组是否为空，你可以使用\
  \ `isEmpty` 命令，该命令返回一个布尔值，如下所示：\n\n`arrayName.isEmpty`\n\n如果你想将此布尔值存储到变量中，可以这样做：\n\
  \n`var flag = arrayName.isEmpty`\n\n如果你想知道数组中存储了多少个元素，可以使用 `count` 命令，如下所示：\n\n\
  `arrayName.count`\n\n如果你想将此整数值存储到变量中，可以这样做：\n\n`var total = arrayName.count`\n\n\
  如果你只想访问单个数组元素，你可以从数组中复制它并将其值存储到变量中，如下所示：\n\n`var item = arrayName[index]`\n\n这允许你从数组中的特定索引位置检索一个元素，并将该值存储到变量中。从数组中检索数据时，请确保指定了有效的索引值。因此，如果数组包含三个元素，则索引值分别为\
  \ 0、1 和 2。这意味着如果你想检索数组中的第二个元素（索引为 1），你可以使用以下代码：\n\n`var item = arrayName[1]`\n\n\
  ### 操作数组\n\n操作数组的两种常见方法是反转所有元素的顺序，或者按升序或降序重新排列元素。这只是反转数组中所有元素的顺序，而不考虑它们的实际值，例如：\n\
  \n`arrayName.reverse()`\n\n当你按升序对数组进行排序时，最低值存储在数组的第一个元素中，最高值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift\
  \ 会按字母顺序对它们进行排序。要按升序对数组进行排序，你有两个选择：\n\n`myArray.sort { $0 < $1 }`\n\n或\n\n`myArray.sort\
  \ ()`\n\n当你按降序对数组进行排序时，最高值存储在数组的第一个元素中，最低值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift 会按反向字母顺序对它们进行排序。要按降序对数组进行排序，请使用以下代码：\n\
  \n`myArray.sort { $1 < $0 }`\n\n要了解数组排序是如何工作的，请按照以下步骤操作：\n\n-   确保在 Xcode 中加载了 `ArrayPlayground`\
  \ 文件。\n-   按如下方式编辑代码：\n\n```\nimport Cocoa\nvar myArray = [\"Bob\", \"Fred\", \"\
  Jane\", \"Mary\"]\nprint (myArray.sort())\nvar sortedArray = myArray.sort() { $1\
  \ < $0 }\nprint (sortedArray)\n```\n\n注意，对数组进行排序会根据元素的内容改变它们的位置，如图 9-4 所示。\n\n![A978-1-4842-1233-2_9_Fig4_HTML.jpg](img/A978-1-4842-1233-2_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 对数组进行排序\n\n\n\n## 使用字典\n\n数组对于存储相关数据的列表很有用。数组最大的缺点在于当你想要检索特定数据时。除非你知道数组中某个项的确切索引号，否则检索数据可能会很麻烦。\n\
  \n这正是字典的优势所在。与只存储数据的数组不同，字典存储两个数据块，称为键值对。值代表你想要保存的数据，而键代表一种快速检索数据的方式。\n\n例如，考虑一个电话号码列表。如果你把电话号码存储在数组中，就必须知道确切的索引值才能检索到特定的电话号码。但是，如果你把电话号码存储在字典中，就可以将每个电话号码（值）与一个姓名（键）一起存储。现在，如果你想检索某个特定的电话号码，只需搜索这个键（人名）即可。\n\
  \n无论该数据存储在字典中的哪个位置，你都可以使用键快速检索到值。这使得从字典中检索数据比从数组中检索类似数据要容易得多。\n\n可以将字典视为一种数组，但它不是存储一个数据块，而是存储一对数据（一个键和一个值）。键和值可以是不同的数据类型，但一个字典中所有键必须是相同的数据类型，所有值也必须是相同的数据类型。然而，键和值可以是不同的数据类型。例如，一个字典的键可以是\
  \ `String` 类型，而值可以是 `Int` 类型。\n\n要创建字典，你必须定义字典以及键和其关联值的数据类型。定义字典的一种方法是：\n\n`var\
  \ DictionaryName = [keyDataType: valueDatatype]()`\n\n定义字典的第二种方法是创建一个 `key:value`\
  \ 对的列表，如下所示：\n\n`var DictionaryName = [102: \"Fred\", 87: \"Valerie\"]`\n\n当你直接赋值\
  \ `key:value` 对时，Swift 会推断键和值的数据类型。在这种情况下，键的数据类型是整型（`Int`），值的数据类型是字符串（`String`）。\n\
  \n### 向字典添加条目\n\n无论字典是空的还是已经填充了数据，你都可以通过指定字典名称及其键值，然后赋值来向字典添加更多条目，例如：\n\n`DictionaryName\
  \ [key] = value`\n\n要了解如何创建字典并向其中添加数据，请按照以下步骤创建一个新的 playground：\n\n启动 Xcode。选择 文件\
  \ ➤ 新建 ➤ Playground。 （如果你看到 Xcode 欢迎屏幕，也可以点击“开始使用 playground”。）Xcode 会要求你输入 playground\
  \ 名称和平台。在“名称”文本框中点击并输入 `DictionaryPlayground`。在“平台”弹出菜单中点击并选择 OS X。Xcode 会询问你想要将\
  \ playground 文件保存在何处。点击你想要保存 playground 文件的文件夹，然后点击“创建”按钮。Xcode 会显示 playground 文件。按如下方式编辑代码：\n\
  \n```\nimport Cocoa\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\nDictionaryName\
  \ [120] = \"John\"\nDictionaryName [96] = \"Jane\"\nprint (DictionaryName)\n```\n\
  \n这段 Swift 代码定义了一个字典，其中 `key:value` 的数据类型是 `Int:String`，Swift 根据字典初始存储的数据类型推断得出。\n\
  \n接下来的两行定义了一个键（`120`）和一个值（`\"John\"`），它们被存储在字典中。然后另一行定义了一个键（`96`）和一个值（`\"Jane\"\
  `），也被存储在字典中。最后一个 `print` 命令可以让你看到字典的变化，如图 9-5 所示。\n\n![A978-1-4842-1233-2_9_Fig5_HTML.jpg](img/A978-1-4842-1233-2_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 创建一个字典并向其添加新的 `key:value` 数据\n\n### 检索和更新字典中的数据\n\n一旦字典包含了 `key:value`\
  \ 对，你就可以使用键来检索值。为此，你需要指定字典名称和一个键。然后，将这个值赋值给一个变量，例如：\n\n`variable = DictionaryName\
  \ [key]!`\n\n该变量的数据类型必须与字典中存储的值的数据类型相同。还要注意感叹号，它定义了一个隐式解包的变量。这个感叹号确保如果键在字典中不存在，不存在的值不会导致程序崩溃。\n\
  \n下面的例子在一个字典中定义了两个 `key:value` 对。然后它使用 `87` 这个键从字典中检索值，即字符串 `\"Valeria\"`，如图 9-6\
  \ 所示：\n\n![A978-1-4842-1233-2_9_Fig6_HTML.jpg](img/A978-1-4842-1233-2_9_Fig6_HTML.jpg)\n\
  \n图 9-6. 使用键检索值并使用新数据更新现有键\n\n```\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"\
  ]\nvar name : String\nname = DictionaryName [87]!\nprint (name)\n```\n\n一旦你在字典中存储了一个\
  \ `key:value` 对，你就可以使用 `updateValue` 命令为现有键赋值新值，如下所示：\n\n`DictionaryName.updateValue(value,\
  \ forKey: key)`\n\n所以，如果你想更新存储在 `87` 这个键下的值，你可以这样做：\n\n`DictionaryName.updateValue(\"\
  Sam\", forKey: 87)`\n\n要了解如何使用键从字典中检索值，然后更新现有键的值，请按照以下步骤操作：\n\n确保在 Xcode 中加载了 `LoopingPlayground`\
  \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar DictionaryName = [102: \"Fred\", 87: \"\
  Valerie\"]\nDictionaryName [120] = \"John\"\nDictionaryName [96] = \"Jane\"\nprint\
  \ (DictionaryName)\nvar name : String\nname = DictionaryName [87]!\nprint (name)\n\
  DictionaryName.updateValue(\"Sam\", forKey: 87)\nname = DictionaryName [87]!\nprint\
  \ (name)\n```\n\n注意，第一次字典检索与 `87` 键关联的值时，返回的是字符串 `\"Valerie\"`。然后 `updateValue`\
  \ 命令用 `\"Sam\"` 替换了 `\"Valerie\"`，因此下次字典检索与 `87` 键关联的值时，返回的是字符串 `\"Sam\"`（参见图 9-6）。\n\
  \n### 删除字典中的数据\n\n一旦字典包含了 `key:value` 对，你就可以使用 `removeValueForKey` 命令删除与特定键关联的值，如下所示：\n\
  \n`DictionaryName.removeValueForKey(key)`\n\n`removeValueForKey` 命令会同时移除该键及其关联的值。注意，如果你指定的键在字典中不存在，`removeValueForKey`\
  \ 命令将不会执行任何操作。\n\n如果你想删除字典中所有的 `key:value` 对，只需使用 `removeAll` 命令，如下所示：\n\n`DictionaryName.removeAll()`\n\
  \n\n\n### 查询字典\n\n在字典中存储了`key:value`对之后，你可以使用以下命令来获取字典的信息：\n\n- `count` – 统计字典中存储的`key:value`对的数量\n\
  - `keys` – 检索字典中存储的所有键的列表\n- `values` – 检索字典中存储的所有值的列表\n\n`count`命令只需输入字典名称，并返回一个整数值，你可以将其赋值给一个变量，例如：\n\
  \n```\nvar name = DictionaryName.count\n```\n\n`keys`和`values`命令需要输入字典名称，并返回一个项目列表，你可以将其存储在一个数组中，例如：\n\
  \n```\nlet myKeys = Array(DictionaryName.keys)\n```\n\n要了解如何从字典中统计和检索键与值，请按照以下步骤操作：\n\
  \n确保`DictionaryPlayground`文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar myDictionary\
  \ = [12: \"Joe\", 7: \"Walter\"]\nmyDictionary.removeValueForKey(7)\nprint (myDictionary)\n\
  myDictionary.removeAll()\nprint (myDictionary)\nmyDictionary = [25: \"Stephanie\"\
  , 98: \"Nancy\"]\nprint (myDictionary.count)\nlet myKeys = Array(myDictionary.keys)\n\
  let myValues = Array(myDictionary.values)\n```\n\n注意`removeValueForKey`命令如何移除现有的`key:value`对，而`removeAll`命令如何清空整个字典。还要注意`count`命令如何统计所有`key:value`对，而`keys`和`values`命令分别返回键和值的列表，如图\
  \ 9-7 所示。\n\n![A978-1-4842-1233-2_9_Fig7_HTML.jpg](img/A978-1-4842-1233-2_9_Fig7_HTML.jpg)\n\
  \n**图 9-7.** 删除字典数据、统计以及检索键和值\n\n### 在 OS X 程序中使用字典\n\n在这个示例程序中，计算机会创建一个存储在字典中的数据列表。然后通过用户界面，用户可以添加新数据到字典中、删除现有数据或获取字典的信息。\n\
  \n按照以下步骤创建一个新的 OS X 项目：\n\n在 Xcode 中选择 **File** ➤ **New** ➤ **Project**。在 OS X 类别下点击\
