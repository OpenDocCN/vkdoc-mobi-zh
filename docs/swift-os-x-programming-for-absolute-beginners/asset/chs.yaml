  '
- "# 1. 理解编程\n\n编程无非就是为计算机编写其需遵循的逐步指令。如果你曾写下烹饪食谱的步骤，或草拟了度假期间照顾宠物的指南，那么你已经完成了编写程序的基本流程。关键在于，明确自己想要实现的目标，然后确保写出正确的指令，告诉他人如何实现该目标。\n\
  \n尽管编程在理论上很简单，但细节之处可能让人犯错。首先，你需要明确自己想要什么。如果你想要一道炒鸡丁的食谱，却照着烤三文鱼的指南操作，显然无济于事。\n\n\
  其次，你需要写出从起点到期望结果的每一步必要指令。如果跳过某个步骤或顺序写错，结果就会不同。试试看，开车去一家餐厅，但你的驾车指南里漏掉了在某个路口转弯的指示。即便\
  \ 99%的指令都正确，只要有一个错误，就无法到达目的地。\n\n目标越简单，实现起来就越容易。编写一个在屏幕上显示计算器的程序，远比编写一个监控核电站安全系统的程序简单。程序越复杂，需要编写的指令就越多；指令越多，就越容易遗漏、写错指令或搞错顺序。\n\
  \n编程不过是一种控制计算机解决问题的方式，无论这台计算机是笔记本电脑、智能手机、平板电脑还是智能手表。在开始编写自己的程序之前，你首先需要理解编程的基本原理。\n\
  \n**注意**：不要混淆学习编程和学习特定编程语言。实际上，你完全可以在不接触电脑的情况下学习编程原理。一旦理解了编程原理，你就能轻松学习任何特定编程语言，例如\
  \ `Swift`。\n\n## 编程原理\n\n要编写程序，你必须写出计算机能遵循的指令。无论程序做什么或有多大，世界上每一个程序都不过是计算机需要依次逐步遵循的指令集。最简单的程序可以只有一行，例如：\n\
  \n`print (\"Hello, world!\")`\n\n显然，只有一行的程序做不了太多事，因此大多数程序都包含多行指令（或称代码），例如：\n\n`print\
  \ (\"Hello, world!\")`\n`print (\"Now the program is done.\")`\n\n这个两行程序从第一行开始，执行第二行的指令后停止。当然，你可以不断向程序添加更多指令，直到拥有百万条计算机能依次执行的指令。\n\
  \n顺序列出指令是编程的基础。不幸的是，这也带来了局限性。例如，如果你想将同一消息打印五次，可以使用以下代码：\n\n`print (\"Hello, world!\"\
  )`\n`print (\"Hello, world!\")`\n`print (\"Hello, world!\")`\n`print (\"Hello, world!\"\
  )`\n`print (\"Hello, world!\")`\n\n编写相同的五条指令既繁琐又多余，但确实有效。如果你想将同一消息打印一千次呢？那你必须将同一指令写上一千次。\n\
  \n多次编写相同的指令显得笨拙。为了让编程更简单，目标是以最少的指令完成最多的工作。避免重复编写指令的一种方法，是利用编程的第二个基本原则——**循环**。\n\
  \n循环的思想是重复执行一条或多条指令多次，但只需书写一次。一个典型的循环可能如下所示：\n\n```\nfor i in 1...5 {\n    print\
  \ (\"Hello, world!\")\n}\n```\n\n第一行告诉计算机重复该循环五次。第二行让计算机在屏幕上打印消息“Hello, world”。第三行定义循环的结束。\n\
  \n现在，如果你想让计算机打印消息一千次，无需写一千次相同指令，只需修改循环的重复次数即可，例如：\n\n```\nfor i in 1...1000 {\n\
  \    print (\"Hello, world!\")\n}\n```\n\n尽管循环在阅读和理解上比顺序指令略复杂，但它能让你无需重复编写相同指令即可轻松实现重复任务。\n\
  \n大多数程序并非仅使用顺序指令或循环，而是两者结合，例如：\n\n```\nprint (\"Hello, world!\")\nprint (\"Now the\
  \ program is starting.\")\nfor i in 1...1000 {\n    print (\"Hello, world!\")\n\
  }\n```\n\n在此示例中，计算机先顺序执行前两行指令，然后通过循环重复执行最后三行指令。通常，当只需计算机执行一次指令时，顺序列出即可；当需要计算机重复执行指令时，就需要使用循环。\n\
  \n计算机的强大之处不仅在于能顺序执行或循环执行指令，更在于能够做出决策。决策意味着计算机需要评估某些条件，然后根据该条件决定下一步操作。\n\n例如，你可能编写一个程序，在用户输入正确密码前锁定计算机。如果用户输入了正确密码，程序需授予访问权限；但如果用户输入了错误密码，程序则应阻止其访问。这种决策的示例如下：\n\
  \n```\nif password == \"secret\" {\n    print (\"Access granted!\")\n} else {\n\
  \    print (\"Login denied!\")\n}\n```\n\n\n\n在这个例子中，计算机要求输入一个密码，当用户输入密码后，计算机会检查是否与单词“secret”匹配。如果匹配，则允许该用户访问计算机；如果用户没有输入“secret”，则拒绝访问。\n\
  \n决策正是编程灵活性的体现。如果你编写一系列顺序指令，计算机每次都会以完全相同的方式执行这些指令。然而，如果你加入决策指令（也称为分支指令），计算机就可以根据用户的操作做出响应。\n\
  \n以电子游戏为例。完全由顺序组织的指令编写的游戏是不可能的，因为那样游戏每次运行方式都完全相同。相反，电子游戏需要随时适应玩家的行为。如果玩家将物体向左移动，游戏需要做出与向右移动或角色被击败时不同的反应。使用分支指令赋予了计算机灵活应变的能力，使得程序永远不会以完全相同的方式运行两次。\n\
  \n要编写计算机程序，你需要以下三种方式之一来组织指令，如图 1-1 所示：\n\n![A978-1-4842-1233-2_1_Fig1_HTML.gif](img/A978-1-4842-1233-2_1_Fig1_HTML.gif)\n\
  \n图 1-1. 编程的三种基本构建块\n\n- **顺序执行** – 计算机一条接一条地执行指令\n- **循环** – 计算机重复执行一条或多条指令\n-\
  \ **分支** – 计算机根据外部数据选择执行一组或多组指令\n\n虽然简单的程序可能只采用顺序结构，但每个大型程序都会结合顺序、循环和分支来组织指令。编程更像是一门艺术而非科学的原因在于，编写程序没有唯一的最佳方法。事实上，完全有可能编写出两个行为完全相同的不同程序。\n\
  \n由于没有唯一的“正确”方法来编写程序，所以只有一些指导原则能帮助你更轻松地编写程序。最终唯一重要的是你编写出一个能正常工作的程序。\n\n在编写任何程序时，通常存在两个常常相互排斥的目标。首先，程序员力求编写易于阅读、理解和修改的程序。这通常意味着编写多条指令来清晰地定义解决特定问题所需的步骤。\n\
  \n其次，程序员试图编写能够高效执行任务、让程序运行尽可能快的程序。这通常意味着尽可能压缩多条指令，使用一些技巧或利用鲜为人知的特性，这些特性往往难以理解，甚至会让大多数其他程序员感到困惑。\n\
  \n刚开始时，应努力让你的程序尽可能清晰、符合逻辑且易于理解，即使为此需要编写更多指令或更长的指令。随着你编程经验的不断丰富，你可以致力于创建最小、最快、最高效的程序，但请记住，你的最终目标是编写出能正常工作的程序。\n\
  \n## 结构化编程\n\n小程序指令较少，因此更容易阅读、理解和修改。不幸的是，小程序只能解决小问题。要解决复杂问题，你需要编写包含更多指令的大型程序。编写的指令越多，犯错（称为“bug”）的几率就越大。更糟糕的是，程序越大，就越难理解其工作原理，也就越难对其进行后续修改。\n\
  \n为了避免编写单个庞大的程序，程序员通常将大型程序分解成较小的部分，称为子程序或函数。其核心理念是每个子程序只解决一个单一任务。这使得编写和确保其正确工作变得容易。\n\
  \n一旦所有独立的函数都能正常工作，你就可以将它们连接在一起，构成一个大型程序，如图 1-2 所示。这就像用砖块盖房子，而不是试图从一块巨石中凿出整个房子。\n\
  \n![A978-1-4842-1233-2_1_Fig2_HTML.gif](img/A978-1-4842-1233-2_1_Fig2_HTML.gif)\n\
  \n图 1-2. 将大型程序划分为多个子程序或函数有助于提高编程的可靠性\n\n将大型程序划分为多个小程序有许多好处。首先，编写较小的子程序快速且容易，并且小的子程序使得指令易于阅读、理解和修改。\n\
  \n其次，子程序就像可以协同工作的构建块，因此多个程序员可以并行开发不同的子程序，然后将各自独立的子程序组合起来创建大型程序。\n\n第三，如果你想修改一个大型程序，只需要抽出、重写并替换一个或多个子程序即可。没有子程序的话，修改大型程序意味着要在庞大程序的所有指令中费力搜索，并试图找到需要修改的指令。\n\
  \n子程序的第四个好处是，如果你编写了一个有用的子程序，你可以将其复用到其他程序中。通过创建一个经过测试的有用子程序库，你可以通过重用现有代码快速轻松地创建其他程序，从而减少从头编写一切的需要。\n\
  \n当你将大型程序划分为多个子程序时，你有一个选择：你可以将所有子程序存储在一个文件中，也可以将每个子程序存储在单独的文件中，如图 1-3 所示。通过将子程序存储在单独的文件中，多个程序员可以同时处理不同的文件而互不影响。\n\
  \n![A978-1-4842-1233-2_1_Fig3_HTML.gif](img/A978-1-4842-1233-2_1_Fig3_HTML.gif)\n\
  \n图 1-3. 你可以将子程序存储在一个文件或多个文件中\n\n将所有子程序存储在一个文件中，使得查找和修改程序的任何部分都很方便。然而，程序越大，你需要编写的指令就越多，这会使得在单个大文件中搜索变得像翻阅字典一样笨拙。\n\
  \n将所有子程序存储在单独文件中意味着你需要跟踪哪个文件包含哪个子程序。但好处是，修改一个子程序要容易得多，因为一旦你打开了正确的文件，你看到的只是单个子程序的指令，而不是十几个或更多其他子程序的指令。\n\
  \n鉴于当今的程序规模庞大，将其各个子程序分散存储在单独的文件中是常见的做法。\n\n\n\n## 事件驱动编程\n\n在计算机早期，大多数程序的运行方式是从第一条指令开始，逐行执行指令直到结束。这类程序严格地控制着计算机在任何给定时刻的行为。\n\
  \n当计算机开始显示带有窗口和下拉菜单的图形用户界面，使用户能够随时选择要执行的操作时，这一切都发生了改变。突然间，每个程序都必须等待用户执行某些操作，例如选择菜单命令或点击按钮。现在，程序必须先等待用户操作，然后再做出响应。\n\
  \n用户每次执行操作，都被视为一个事件。用户单击鼠标左键与用户单击鼠标右键是两个完全不同的事件。程序不再规定用户在任何给定时刻能做什么，而是需要响应用户执行的不同事件。让程序能够响应用户的不同事件，就称为事件驱动编程。\n\
  \n事件驱动编程将一个大型程序划分为多个子程序，每个子程序负责响应一个不同的事件。如果用户点击了一个菜单命令，一个子程序就会运行其指令。如果用户点击了一个按钮，另一个不同的子程序就会运行另一组指令。\n\
  \n事件驱动编程始终在等待响应用户的操作。\n\n### 面向对象编程\n\n将一个大型程序划分为多个子程序使得创建和修改程序变得容易。然而，尝试理解这样一个大型程序是如何工作的，往往令人困惑，因为没有一个简单的方法来确定哪些子程序协同工作，或者它们可能需要从其他子程序获取哪些数据。\n\
  \n更糟糕的是，子程序经常修改其他子程序所使用的数据。这意味着，有时一个子程序会在另一个子程序使用数据之前修改它。使用错误的数据会导致另一个子程序失败，进而导致整个程序崩溃。这种情况不仅会降低软件的可靠性，还会使得确定问题所在以及如何修复问题变得更加困难。\n\
  \n为了解决这个问题，计算机科学家创建了面向对象编程。其目标是将大型程序划分为更小的子程序，但将相关的子程序组织成称为对象的组。为了使面向对象的程序更易于理解，对象还会模拟现实世界中的物理事物。\n\
  \n假设你编写了一个控制机器人的程序。按任务划分这个问题，你可能会创建一个子程序来移动机器人，第二个子程序告诉机器人如何感知附近的障碍物，第三个子程序计算最佳行进路径。如果机器人的移动出现问题，你无法判断问题出在控制移动的子程序、控制机器人感知障碍物的子程序，还是计算最佳路径的子程序。\n\
  \n将同一个机器人程序划分为多个对象，可能会创建一个负责移动机器人的 `Legs` 对象、一个负责感知附近障碍物的 `Eye` 对象，以及一个负责计算避开障碍物最佳路径的\
  \ `Brain` 对象。现在，如果机器人移动出现问题，你可以将问题定位到存储在 `Legs` 对象中的代码。\n\n除了在对象内部隔离数据之外，面向对象编程的第二个理念是使大型程序易于重用和修改。假设我们用履带替换机器人的腿。那么，我们就必须修改移动机器人的子程序，因为履带的行为与腿不同。接下来，我们还得修改计算避开障碍物最佳路径的子程序，因为履带迫使机器人绕过障碍物，而腿则允许机器人跨过小障碍物并绕开较大的障碍物。\n\
  \n如果你想用履带替换机器人的腿，面向对象编程可以让你简单地取出 `Legs` 对象，并用一个新的 `Treads` 对象替换它，而不会影响或需要修改构成程序其余部分的任何其他对象。\n\
  \n由于大多数程序都会不断被修改以修复错误或添加新功能，面向对象编程允许你使用独立的构建块（即对象）来构建大型程序，并且通过仅修改单个对象来修改程序。\n\n\
  面向对象编程的关键在于隔离程序的各个部分，并通过封装、继承和多态这三个特性来提升可重用性。\n\n### 封装\n\n封装的主要目的是将一个程序的一部分与另一部分保护并隔离开来。为此，封装会隐藏数据，使其永远不会被程序的另一部分更改。此外，封装还包含了操作存储在对象中数据的所有子程序。如果出现任何问题，封装使得将问题隔离在特定对象内变得容易。\n\
  \n每个对象都应完全独立于程序的任何其他部分。对象将数据存储在属性中。操作这些属性的唯一方法是使用称为方法的子程序，这些方法也封装在同一个对象中。属性和方法的组合隔离在对象内部，使得通过将对象用作构建块（如图\
  \ 1-4 所示）来快速、可靠地创建大型程序变得容易。\n\n![A978-1-4842-1233-2_1_Fig4_HTML.gif](img/A978-1-4842-1233-2_1_Fig4_HTML.gif)\n\
  \n图 1-4. 对象将相关的子程序和数据封装在一起，对程序的其他部分隐藏\n\n### 继承\n\n创建大型、复杂的程序很困难，但更困难的是从零开始编写整个程序。这就是为什么大多数程序员会重用现有程序的代码，原因有二。首先，他们不必从头重写所需的功能。这意味着他们可以更快地创建大型程序。其次，他们可以使用已经过测试并证明能正常运行的代码。这意味着，通过重用可靠的代码，他们可以更快地创建更可靠的软件。\n\
  \n重用代码的一个巨大问题是，你绝不想制作重复的副本。假设你复制了一个子程序并将其粘贴到第二个子程序中。那么，你在同一个程序的两个不同位置存储了两个完全相同的代码副本。这浪费了空间，但更重要的是，它可能会在未来引发问题。\n\
  \n假设你在一个子程序中发现了问题。要修复此问题，你需要在你复制并粘贴了这段代码的每一个地方进行修复。如果你在程序的其他两个地方复制并粘贴了这段代码，你就需要在这两个地方找到并修复它。如果你在程序的一千个地方复制并粘贴了这段代码，你就需要在一千个不同的地方找到并修复这段代码。\n\
  \n这不仅不方便且耗时，还增加了忽略代码并在该代码中遗留问题的风险。这会降低程序的可靠性。\n\n为了避免修复同一代码的多个副本的问题，面向对象编程使用了称为继承的机制。其思想是，一个对象可以使用存储在另一个对象中的所有代码，而无需实际制作该代码的物理副本。相反，一个对象从另一个对象继承代码，但该代码始终只存在一个副本。\n\
  \n现在，你可以根据需要多次重用同一个代码副本。如果你需要修复一个问题，你只需修复该代码一次，这些更改就会自动出现在通过继承重用该代码的任何对象中。\n\n基本上，继承允许你重用代码，而无需物理制作该代码的重复副本。这使得代码易于重用，并且将来也易于修改。\n\
  \n\n\n#### 多态性\n\n每个对象都由数据（存储在属性中）和用于操作这些数据的子程序（称为方法）组成。通过继承，一个对象可以使用另一个对象中定义的属性和方法。然而，当某个子程序（方法）需要执行不同的代码时，继承可能会带来问题。\n\
  \n假设你正在开发一款视频游戏。你可能会将汽车定义为一个对象，将怪物定义为另一个对象。如果怪物向汽车投掷石块，那么石块就是第三个对象。为了让汽车、怪物和石块在屏幕上移动，你可以创建一个名为\
  \ `Move` 的方法。\n\n但问题是，汽车在屏幕上的移动方式与怪物或投掷的石块不同。你可以创建三个子程序，并分别命名为 `MoveCar`、`MoveMonster`\
  \ 和 `MoveRock`。然而，一个更简单的解决方案是让这三个子程序共用同一个名称，比如 `Move`。\n\n在传统编程中，你绝不能给两个或更多子程序起相同的名称，因为计算机永远无法知道你实际要运行的是哪一个子程序。但在面向对象编程中，由于多态性的存在，你可以使用重复的子程序名称。\n\
  \n多态性允许你使用相同的方法名称，但用不同的代码来替换它。多态性之所以有效，是因为每个 `Move` 子程序（方法）都存储在不同的对象中，例如一个对象代表汽车，第二个对象代表怪物，第三个对象代表投掷的石块。要运行每个\
  \ `Move` 子程序，你需要指定包含你想要使用的 `Move` 子程序的对象，例如：\n\n- `Car.Move`\n- `Monster.Move`\n\
  - `Rock.Move`\n\n通过同时指定你想要操作的对象和想要使用的子程序，面向对象编程能够正确识别需要运行哪一组指令，即使一个子程序与另一个子程序具有完全相同的名称。\n\
  \n本质上，多态性允许你创建描述性的子程序名称，并且在你同时使用继承时，可以任意多次地重复使用该描述性名称。\n\n封装、继承和多态性的结合构成了面向对象编程的基础。封装将一个程序的某部分与另一部分隔离开来。继承允许你重用代码。多态性则允许你重用方法名称，但使用不同的代码。\n\
  \n## 理解编程语言\n\n一种编程语言不过是一种特定的表达思想的方式，就像西班牙语、阿拉伯语、汉语或英语等人类语言一样。计算机科学家创造编程语言是为了解决特定类型的问题。这意味着，一种编程语言可能非常适合解决某类问题，但在解决另一类不同的问题时却表现糟糕。\n\
  \n最流行的编程语言是 C 语言，它被设计用于对计算机硬件进行低级访问。因此，C 语言非常适合创建操作系统、反病毒程序和硬盘加密程序。任何需要完全控制硬件的任务，都是\
  \ C 语言的用武之地。\n\n然而，C 语言可能显得晦涩且精简，因为它旨在为计算机提供最高效率，而不考虑人类阅读、编写或修改 C 程序的效率。为了改进 C 语言，计算机科学家创建了\
  \ C 语言的面向对象版本 C++，以及一个略有不同的面向对象版本 Objective-C，这后来成为了苹果公司为 OS X 和 iOS 编程所采用的语言。\n\
  \n由于 C 语言最初的设计是为了计算机的效率而牺牲了人类的效率，因此包括 C++ 和 Objective-C 在内的所有 C 语言变体也可能难以学习、使用和理解。这就是苹果公司创建\
  \ Swift 的原因。Swift 的目的在于提供 Objective-C 的强大功能，同时更易于学习、使用和理解。Swift 本质上是 Objective-C\
  \ 的改进版本，而 Objective-C 又是 C 语言的改进版本。\n\n计算机编程的每一次演进都建立在前一代编程标准的基础之上。当你用 Swift 编写程序时，你可以使用\
  \ Swift 的独特特性以及面向对象的特性。此外，在编写 Swift 程序时，你还可以使用事件驱动编程、结构化编程以及编程的三大基本构建块（顺序、循环和分支）。\n\
  \n与所有计算机编程语言一样，Swift 包含一个固定的命令列表，称为关键字。要告诉计算机做什么，你必须使用关键字来创建语句，使计算机执行单个任务。\n\n关键字是任何编程语言的基本构建块。通过组合关键字，你可以创建子程序或函数，从而赋予编程语言更强大的能力。例如，Swift\
  \ 中的一个关键字是 `var`，它用于定义变量。Swift 中定义的一个函数是 `print`，用于在屏幕上打印数据。\n\n你已经见过用于打印文本的 `print`\
  \ 函数，例如：\n\n`print(\"Hello, world!\")`\n\n这个 Swift 的 `print` 函数（代表打印行）适用于其括号内的任何数据。就像学习一门人类语言需要首先学习用于书写字母的基本符号（如字母表或其他符号）一样，学习一门编程语言也需要首先学习该特定编程语言的关键字和函数。\n\
  \n尽管 Swift 包含数十个关键字和函数，但你无需一次性全部掌握它们才能用 Swift 编写程序。你最初只需要学习少量关键字和函数。随着经验的增长，你会逐渐需要学习更多\
  \ Swift 的关键字和函数。\n\n为了尽可能简化编程，Swift（与许多编程语言一样）使用看起来像普通英语单词的关键字和函数，例如 `print` 或 `var`（variable\
  \ 的缩写）。然而，许多编程语言（如 Swift）也会使用代表不同特性的符号。\n\n常见的符号是用于加法（`+`）、减法（`-`）、乘法（`*`）和除法（`/`）的数学符号。\n\
  \nSwift 还使用花括号来分组需要一起运行的关联代码，例如：\n\n```\n{\n    print(\"这是一条消息\")\n    print(\"\
  消息现在结束了\")\n}\n```\n\n\n\n与人类语言不同——即使拼错单词或忘记句末加点号，人们仍能理解你的意思——编程语言可没那么宽容。在编程语言中，每个关键字和函数都必须拼写正确，每个符号都必须用在需要的位置。只要拼错一个关键字或函数，用错符号，或者把正确的符号放错位置，整个程序就无法运行。\n\
  \n编程语言是精确的。编程的关键在于编写：\n\n-   尽可能少的代码\n-   功能尽可能强大的代码\n-   尽可能易于理解的代码\n\n你需要编写尽可能少的代码，因为代码越少，就越容易确保其正确运行。\n\
  \n你需要功能尽可能强大的代码，因为这能让你的程序更有能力解决更大的问题。\n\n你需要易于理解的代码，因为这样便于修复问题和添加功能。\n\n不幸的是，这三个标准往往相互矛盾，如图\
  \ 1-5 所示。\n\n![A978-1-4842-1233-2_1_Fig5_HTML.gif](img/A978-1-4842-1233-2_1_Fig5_HTML.gif)\n\
  \n图 1-5. 编程中三个常常相互矛盾的目标\n\n如果只写尽可能少的代码，通常意味着代码功能有限。这就是为什么程序员常常采用捷径和编程技巧来压缩代码体积，但这同时也增加了代码的复杂度，使其更难理解。\n\
  \n如果编写功能尽可能强大的代码，通常意味着需要编写大量命令，这会使代码更难理解。\n\n如果编写易于理解的代码，通常它的功能不会很强。而为了增加功能编写更多代码，又会让代码更难理解。\n\
  \n归根结底，计算机编程与其说是科学，不如说是一门艺术。通常，最好专注于让代码尽可能容易理解，因为这样更容易修复问题和添加新功能。此外，易于理解的代码也意味着其他程序员可以在你无法处理时修复和修改你的程序。\n\
  \n正因如此，苹果公司创建了 Swift，旨在让代码比 Objective-C 更易理解，同时又不牺牲 Objective-C 的强大功能。尽管比 Objective-C\
  \ 更强大，但 Swift 代码往往比等效的 Objective-C 代码更短。因此，苹果公司未来的编程语言将是 Swift。\n\n## Cocoa 框架\n\
  \n关键字、函数和符号让你能够向计算机下达指令，但没有任何编程语言能提供创建所有类型程序所需的全部命令。为了提供额外命令，程序员会使用关键字创建执行特定任务的子程序。\n\
  \n当他们创建了有用的子程序时，通常会将其保存在包含其他有用子程序的库中。现在，当你编写程序时，就可以使用编程语言的关键字以及库中存储的任何子程序。通过复用库中的子程序，你可以创建更强大、更可靠的代码。\n\
  \n例如，一个库可能包含用于显示图形的子程序；另一个库可能包含用于将数据保存到磁盘并重新读取的子程序；还有的库可能包含用于计算数学公式的子程序。为了简化 OS\
  \ X 和 iOS 程序的编写，苹果公司创建了一个有用子程序的库框架，称为 Cocoa 框架。\n\n复用现有框架有两个原因。首先，复用框架可以避免你为完成别人已解决的问题而编写自己的指令。框架不仅提供了现成的解决方案，而且已经经过他人测试，因此你可以放心使用，确信它能正常工作。\n\
  \n使用现有框架的第二个原因是为了保持一致性。苹果公司提供了用于定义程序在屏幕上外观的框架，即用户界面。这定义了程序的行为方式，从在屏幕上显示窗口，到通过鼠标点击来调整窗口大小或关闭窗口。\n\
  \n你完全可以自己编写在屏幕上显示窗口的指令，但这样很可能会花费大量时间进行创建和测试，最终得到的用户界面可能与其他 OS X 或 iOS 程序在外观或行为上不一致。\n\
  \n然而，通过复用现有框架，你可以快速创建自己的程序，并确保程序的行为与其他程序一致。尽管编程听起来很复杂，但苹果提供了数百个预先编写且经过测试的子程序，帮助你快速轻松地创建程序。你只需编写那些让你的程序解决特定、独特问题的自定义指令即可。\n\
  \n要理解苹果的 Cocoa 框架如何工作，你需要理解面向对象编程，这有两个原因。第一，Swift 是一种面向对象编程语言，因此要充分利用 Swift，你需要理解面向对象编程的优势。\n\
  \n第二，苹果的 Cocoa 框架基于面向对象编程。要理解如何使用 Cocoa 框架，你需要使用对象。\n\n注意\n\nCocoa 框架专为创建 OS X 程序而设计。一个名为\
  \ Cocoa Touch 的类似框架则专为创建 iOS 应用而设计。由于 Cocoa Touch 框架（iOS）基于 Cocoa 框架（OS X），它们的工作原理相似，但提供不同的功能。\n\
  \n通过依赖 Cocoa 框架，每当苹果更新和改进 Cocoa 框架时，你的程序就能获得新功能。例如，拼写检查是 Cocoa 框架的内置功能。如果你使用 Cocoa\
  \ 框架编写程序，你的程序会自动获得拼写检查功能，而无需你编写任何额外代码。当苹果改进 Cocoa 框架中的拼写检查功能时，你的程序会自动获得这些改进，无需你付出额外努力。\n\
  \nCocoa 框架是一个通用术语，涵盖了苹果所有预先编写并测试的代码库。Cocoa 框架的不同部分可以为你的程序提供音频播放、图形处理、联系人信息（如姓名和地址）存储以及网络连接等功能。\n\
  \nCocoa 框架为典型的 OS X 程序奠定了基础。你只需编写让你的程序独具特色的 Swift 代码即可。\n\n\n\n### 视图-模型-控制器设计\n\
  \n编写大型程序时，将所有代码存放在单个文件中是可行的。但这会大大增加在程序中查找特定内容的难度。更好的解决方案是将大型程序划分为多个部分，并将相关部分存储在不同的文件中。这样你就能快速找到需要修改的程序部分，同时也便于多位程序员协作，因为一位程序员可以处理一个文件，另一位程序员可以处理另一个文件。\n\
  \n将程序划分为多个文件时，最好保持条理清晰。就像你可能把袜子放在一个抽屉里，裤子放在另一个抽屉里，以便轻松找到所需衣物一样，你也应该将程序组织成多个文件，每个文件只包含相关的数据。这样你就能快速轻松地找到需要修改的文件。\n\
  \n文件中存储的数据类型通常可分为如图 1-6 所示的三大类别：\n\n![A978-1-4842-1233-2_1_Fig6_HTML.gif](img/A978-1-4842-1233-2_1_Fig6_HTML.gif)\n\
  \n图 1-6.  \n将程序划分为模型-视图-控制器设计\n\n* 视图（用户界面）\n* 模型\n* 控制器\n\n视图或用户界面是用户所看到的内容。每个用户界面的目的都是显示信息、接收数据，并接收来自用户的命令。在过去，程序员通常通过编写代码来创建用户界面。虽然在\
  \ Swift 中你仍可以这样做，但这既耗时又容易出错，而且缺乏一致性，因为一位程序员的用户界面在外观和行为上可能与另一位程序员的用户界面不完全相同。\n\n\
  更好的选择是可视化地设计用户界面，这正是 Xcode 让你能够做到的事情。只需在用户界面上绘制按钮、文本字段和菜单等对象，Xcode 便会自动创建一个无错误、外观一致的界面，且只需花费几秒钟即可完成。当你使用\
  \ Xcode 创建用户界面时，实际上是在使用苹果的 Cocoa 框架来实现。\n\n用户界面本身看起来不错，但什么也做不了。要让程序实现有用的功能，你需要编写解决特定问题的代码。例如，一个彩票选号程序可能会分析最近选中的号码，并确定下周最有可能被选中的号码。代码中用于计算有用结果的部分称为模型。\n\
  \n模型实际上完全独立于视图（用户界面）。这使得修改用户界面变得容易，而不会影响模型（反之亦然）。通过尽可能将程序的不同部分彼此隔离，你可以减少修改程序时发生错误的几率。\n\
  \n由于模型始终完全独立于视图，因此你需要一个控制器。当用户在界面中选择命令或输入数据时，控制器从视图获取该信息并将其传递给模型。\n\n模型响应这些数据或命令，并计算出新的结果。然后它将计算结果发送给控制器，控制器再将其返回给视图，以便用户查看。在任何时候，视图和模型都是完全分离的。\n\
  \n借助 Xcode，这意味着你将把大部分 Swift 代码编写并存储到定义程序模型的文件中。如果你正在计算中奖彩票号码，用于执行这些计算的 Swift 代码将存储在模型中。\n\
  \n你还需要在控制器文件中编写并存储 Swift 代码。在一个简单的程序中，你可能只有一个视图。在更复杂的程序中，你可能会有多个视图。对于每个视图，你通常需要一个控制器文件来控制该视图。因此，你编写和存储\
  \ Swift 代码的第二个位置就是控制器文件。\n\n在简单程序中，通常会将模型与控制器合并到一个文件中。然而，对于更大型、更复杂的程序，更好的做法是为模型创建一个（或多个）文件，并为每个控制器创建一个文件。控制器文件的数量通常等于构成用户界面的视图数量。\n\
  \n一旦你将程序清晰地划分为模型、视图和控制器，你就可以通过用新文件替换旧文件的方式，快速轻松地修改程序。例如，如果你想修改用户界面，只需设计一个不同的视图，将其连接到控制器，就完成了，无需触碰模型文件。\n\
  \n如果你想修改模型以添加新功能，只需更新模型文件并将其连接到控制器，无需触碰视图。\n\n事实上，这正是程序员为 OS X 和 iOS 创建程序的方式。他们的模型保持不变。他们只需为\
  \ OS X 编写一个控制器和视图，为 iOS 编写一个控制器和视图。然后，他们就能使用完全相同的模型创建出 OS X 和 iOS 应用程序。\n\n\n\n\
  ## 程序员如何工作\n\n在过去，单个程序员就能想出创意并编写代码让程序运行起来。如今，程序要复杂得多，用户的期望也高得多，因此你需要在编写任何代码之前先设计好程序。事实上，大多数程序员实际花在编写或修改代码上的时间并不多。相反，程序员的大部分时间都用于思考、规划、组织和设计程序。\n\
  \n当程序员有了一个程序创意时，第一步是判断这个创意是否真的有价值。程序必须解决特定类型的问题。例如，文字处理软件让编写、编辑和格式化文本变得容易；电子表格软件让输入数字并根据这些数字计算新结果变得简单；演示文稿软件让输入文字并插入图形以创建幻灯片变得便捷。即使是电子游戏，也是通过提供具有挑战性的谜题或目标来帮助玩家消遣，从而解决无聊的问题。\n\
  \n**注意**\n\n软件开发最大的失败就是没有定义要解决的具体问题。软件开发第二大失败则是虽然明确了要解决的具体问题，却低估了解该问题所需的步骤的复杂性。你必须知道要解决什么问题，以及如何解决这个问题。如果这两点中的任何一点不清楚，你就无法编写出有用的程序。\n\
  \n一旦你有了一个待解决问题的想法，下一步就是定义如何解决该问题。有些问题实在太难解决。例如，你怎么能编写一个程序来写出一本畅销小说呢？你或许能写一个辅助你写小说的程序，但除非你确切知道如何可预测地创作出一本畅销小说，否则你根本写不出这样的程序。\n\
  \n了解要解决的问题就是你的目标。一旦你清楚理解了问题，接下来就需要确定解决该问题所需的所有步骤。如果你不知道如何解决某个特定问题，你也就无法告诉计算机如何去解决它。\n\
  \n在定义了解决一个问题的步骤之后，现在你终于可以编写程序了。通常你会分部分编写程序，并在继续之前测试每个部分。这样，你就能逐步扩展程序的功能，同时确保每个部分都能正确运行。\n\
  \n在使用 `Xcode` 时，你将经历的主要步骤是：\n\n-   编写代码并设计用户界面\n-   编辑代码和用户界面\n-   运行并测试程序\n\n当你的程序最终完成时，猜猜怎么着？它永远没有真正完成的时候。总会有需要修复的错误，以及你想要添加的新功能。实际上，程序员花在编辑和修改现有程序上的时间，远比花在创建新程序上的时间要多。\n\
  \n在编写和编辑代码时，你会使用编辑器，它类似于一个文字处理软件，让你能够输入和编辑文本。在设计和修改用户界面时，你会用到 `Xcode` 中一个名为 `Interface\
  \ Builder` 的功能，它类似于一个绘图程序，让你可以在屏幕上拖拽、放置和调整对象的大小。在运行和测试程序时，你会使用编译器，它负责将你的 Swift 代码转换（或称编译）成一个实际可运行的\
  \ OS X 程序。\n\n要创建一个 OS X 程序，你只需要一份 `Xcode`，这是 Apple 的免费编程工具，你可以从 Mac App Store 下载。只要在\
  \ Macintosh 上安装了 `Xcode`，通过学习 `Xcode` 和 Swift，你完全可以免费创建自己的程序。\n\n## 总结\n\n要学习如何为\
  \ Macintosh 编写程序，你需要掌握几项不同的技能。首先，你需要理解编程的基本原理，这包括将指令组织成顺序、循环或分支结构；理解结构化编程技术、事件驱动编程和面向对象编程。\n\
  \n其次，你需要学习一门特定的编程语言。对于 Macintosh 而言，你将学习 Swift。这意味着你要学习 Swift 中使用的关键字和函数，同时还要学习如何在不同的文件中编写和组织你的\
  \ Swift 代码。\n\n第三，你需要知道如何使用 `Xcode`，这是 Apple 用于创建 OS X 和 iOS 应用的编程工具。`Xcode` 让你能编写和编辑\
  \ Swift 代码，同时也能让你以可视化的方式设计和修改用户界面。\n\n第四，你需要学习如何使用 Apple 的 Cocoa 框架，这样你就可以专注于编写那些能让你的程序实现独特功能的指令。\n\
  \n无论你是想编写自己的软件来销售，还是想出售自己的编程技能为他人创建定制软件，你都会发现编程是一项任何人都能学会的技能。\n\n记住，编程无非就是解决问题。通过了解如何使用\
  \ Swift 和 `Xcode` 解决问题，你可以比你想象的更容易、更快速地为自己创建 Macintosh 程序。\n\n\n\n"
- "# 2. 认识 Xcode\n\n要在 Macintosh 上使用 Swift 编写程序，你需要用到 Xcode。Apple 开发了 Xcode 这一专业编程工具，并免费提供，以鼓励大家为\
  \ OS X 和 iOS 编写软件。尽管是免费程序，Xcode 却是包括微软、Adobe、谷歌，甚至 Apple 在内的各大公司都在使用的强大工具。在你的 Macintosh\
  \ 上装上 Xcode，你就拥有了为创建 OS X 程序和 iOS 应用而准备的最强大的编程工具之一。\n\n虽然 Xcode 包含数十个专为专业程序员设计的功能，但任何人都可以学会使用它。Xcode\
  \ 繁多的功能乍看之下可能令人困惑且望而生畏，但请放轻松。要使用 Xcode，你不需要学习所有可能的功能。相反，你只需学习你需要的那一小部分功能，其他的都可以忽略。随着经验的增长，你可以逐步学习\
  \ Xcode 的其他功能。很多时候，某些 Xcode 功能你可能根本永远不会用到。\n\nXcode 让你可以从头到尾创建一个 OS X 程序或 iOS 应用，而无需其他任何程序。在\
  \ Xcode 内部，你可以执行以下操作：\n\n- 创建新项目\n- 编写和编辑 Swift 代码\n- 设计和修改用户界面\n- 管理组成单个项目的文件\n\
  - 运行和测试你的项目\n- 调试你的 Swift 代码\n\n你可以通过 Mac App Store 免费下载和安装 Xcode。在你的 Macintosh\
  \ 上，只需点击 Apple 菜单并选择“App Store”。当 App Store 窗口出现后，点击右上角的搜索文本字段，输入 `Xcode`，然后按回车键。现在你可以点击\
  \ Xcode 图标下方的按钮进行下载，如图 2-1 所示。由于 Xcode 是一个相当大的文件，你需要快速的互联网连接和足够的空间来将其安装到你的 Macintosh\
  \ 上。\n\n![A978-1-4842-1233-2_2_Fig1_HTML.jpg](img/A978-1-4842-1233-2_2_Fig1_HTML.jpg)\n\
  \n**图 2-1.** 当你搜索 Xcode 时，它通常出现在 App Store 窗口的左上角\n\n你将经常使用的 Xcode 四个最常见部分为：\n\n\
  - 项目管理器\n- 编辑器\n- Interface Builder\n- 编译器\n\n一个项目代表一个单一的 OS X 或 iOS 程序。在过去程序简单的年代，你可以将代码存储在一个文件中。如今程序变得更大更复杂，将代码存储在不同的文件中更为常见。协同工作的文件集合构成一个项目，因此\
  \ Xcode 的项目管理器允许你创建、重新排列和删除项目内的文件。\n\n每个项目都会包含的最常见文件类型之一是代码文件，通过 `.swift` 文件扩展名标识。代码文件是你可以存储、编辑和输入\
  \ Swift 代码的地方。通过使用 Xcode 的编辑器，你可以打开代码文件，复制粘贴代码，删除代码，并编写新代码保存到该文件中。编辑器基本上就像一个为帮助你用\
  \ Swift 编程语言编写代码而设计的简单文字处理器。\n\n除了包含 Swift 代码的代码文件外，每个项目还会包含一个存储在不同文件中的用户界面，这些文件通过\
  \ `.xib` 或 `.storyboard` 文件扩展名标识。简单的程序可能只有一个包含其用户界面的文件，但更复杂的程序可能有多个文件包含用户界面的不同部分。Xcode\
  \ 中让你设计、创建和修改用户界面的功能称为 Interface Builder。\n\n在编写好 Swift 代码并设计好用户界面后，你需要将项目中的所有文件转换成一个实际可工作的程序。将\
  \ Swift 代码翻译成计算机能理解的语言（称为机器代码）的过程被称为编译，因此 Xcode 中执行此操作的部分被称为编译器。\n\n你通常会以不同的顺序使用\
  \ Xcode 的这四个主要部分。例如，你可以先创建一个项目，并使用项目管理器功能修改其文件。然后你可能使用编辑器编写 Swift 代码，并使用 Interface\
  \ Builder 设计用户界面。最后，你将使用编译器测试你的程序。如果出现问题，你很可能需要无数次地回到编辑器或 Interface Builder，直到你的程序正常工作。你甚至可能在项目管理器中创建新文件并重新排列它们。\n\
  \n最终，使用 Xcode 并没有唯一的“最佳”或“正确”方式。Xcode 在你需要时提供相应功能供你使用。\n\n## 向 Xcode 下达命令\n\n与许多程序一样，Xcode\
  \ 提供多种方式来完成完全相同的任务。例如，要打开一个项目，你可以选择“文件”➤“打开”，或按下 `Command+O`。通常，Xcode 提供三种方式来执行常见的命令类型：\n\
  \n- 使用屏幕顶部菜单栏中的下拉菜单\n- 按下独特的按键组合，如 `Command+O`\n- 点击代表某个命令的图标\n\n下拉菜单可以方便地帮助你找到特定命令，但使用起来可能较慢且笨拙，因为你必须点击菜单标题以下拉菜单，然后必须点击该菜单上出现的命令。\n\
  \n按键组合更快更简便，但它们迫使你记住常用命令的晦涩按键组合。为了帮助你了解哪些命令有按键组合，可以查看每个下拉菜单，你会看到按键组合显示在不同命令的右侧，如图\
  \ 2-2 所示。（注意：并非所有命令都有按键组合。）\n\n![A978-1-4842-1233-2_2_Fig2_HTML.jpg](img/A978-1-4842-1233-2_2_Fig2_HTML.jpg)\n\
  \n**图 2-2.** 按键组合显示在下拉菜单中命令的右侧\n\n按键组合通常包括一个修饰键加上一个字母或功能键。四个修饰键包括 Command、Control、Option\
  \ 和 Shift，如图 2-3 所示。\n\n![A978-1-4842-1233-2_2_Fig3_HTML.jpg](img/A978-1-4842-1233-2_2_Fig3_HTML.jpg)\n\
  \n**图 2-3.** 用于表示常见修饰键的符号\n\n点击图标选择命令可能是最快的方法，但你必须知道每个图标代表什么命令。为了帮助你理解图标的用途，只需将鼠标指针移到图标上并等待几秒钟。一个小窗口就会出现，简要描述该图标的用途，如图\
  \ 2-4 所示。\n\n![A978-1-4842-1233-2_2_Fig4_HTML.jpg](img/A978-1-4842-1233-2_2_Fig4_HTML.jpg)\n\
  \n**图 2-4.** 将鼠标指针悬停在图标上会显示该图标功能的简要描述\n\n有些人只使用下拉菜单，另一些人更依赖图标和按键快捷方式，还有一些人混合使用这三种方法。通常人们从下拉菜单开始，但当你开始频繁使用相同命令时，会逐渐转向图标和按键快捷方式。\n\
  \n选择你喜欢的任何方法，但要注意你几乎总是有其他替代方案。重点是让你使用自己偏好的方法来舒适地使用 Xcode，这样你就能花更多时间进行创作，而花更少时间寻找你需要的命令。\n\
  \n\n\n## 修改 Xcode 窗口\n\n由于 Xcode 提供了众多功能，Xcode 窗口有时会显得杂乱。为了简化 Xcode 的外观，你有以下几种选择：\n\
  \n-   调整 Xcode 窗口的大小，使其更大（或更小）\n-   关闭面板以隐藏 Xcode 的某些部分\n-   打开面板以查看 Xcode 的某些部分\n\
  \n与所有 Macintosh 窗口一样，调整 Xcode 窗口大小最直接的方式是将鼠标指针移到 Xcode 窗口的边缘或角落，直到鼠标指针变成双向箭头。然后拖动鼠标即可调整窗口大小。\n\
  \n调整 Xcode 窗口大小的第二种方法是点击 Xcode 窗口左上角的绿色圆点。这会展开 Xcode 窗口以占据全屏，同时隐藏 Xcode 的菜单栏。要退出全屏模式，只需按下键盘上的\
  \ `Esc` 键。\n\n调整 Xcode 窗口大小的第三种方法是选择 `Window ➤ Zoom`。这会在以下两种状态间切换：将 Xcode 窗口展开至填充屏幕但仍显示\
  \ Xcode 菜单栏，或者将 Xcode 窗口缩小回之前的大小。\n\n为了减少在任意时刻显示的信息量，Xcode 提供了三个可以隐藏（或打开）的面板，如图\
  \ 2-5 所示：\n\n![A978-1-4842-1233-2_2_Fig5_HTML.jpg](img/A978-1-4842-1233-2_2_Fig5_HTML.jpg)\n\
  \n图 2-5. Xcode 的导航面板、调试区域和实用工具面板\n\n-   **导航面板**：显示有关项目的信息\n-   **调试区域**：允许你搜索程序中的错误或缺陷\n\
  -   **实用工具面板**：允许你在用户界面上自定义不同的项目\n\n导航面板会显示多个图标，让你可以在查看不同类型的信息之间切换。导航面板最常见的用途是通过显示项目导航器来选择要打开的文件。要在隐藏和显示导航面板之间切换，你有三种选择：\n\
  \n-   选择 `View ➤ Navigators ➤ Show/Hide Navigator`\n-   按下 `Command+0`（数字零）\n- \
  \  点击 Xcode 窗口右上角的“显示/隐藏导航面板”图标，如图 2-6 所示\n\n![A978-1-4842-1233-2_2_Fig6_HTML.jpg](img/A978-1-4842-1233-2_2_Fig6_HTML.jpg)\n\
  \n图 2-6. “显示/隐藏导航面板”图标\n\n当你想要检查程序是否运行正常时，会用到调试区域。在你设计用户界面或编写 Swift 代码时，可能需要隐藏这个调试区域。要在隐藏和显示调试区域之间切换，你有三种选择：\n\
  \n-   选择 `View ➤ Debug Area ➤ Show/Hide Debug Area`\n-   按下 `Shift+Command+Y`\n\
  -   点击 Xcode 窗口右上角的“显示/隐藏调试区域”图标，如图 2-7 所示\n\n![A978-1-4842-1233-2_2_Fig7_HTML.jpg](img/A978-1-4842-1233-2_2_Fig7_HTML.jpg)\n\
  \n图 2-7. “显示/隐藏调试区域”图标\n\n实用工具面板会显示多个图标，让你可以在显示不同类型的信息之间切换。实用工具面板最常见的用途是帮助你设计和修改用户界面。要在隐藏和显示实用工具面板之间切换，你有三种选择：\n\
  \n-   选择 `View ➤ Utilities ➤ Show/Hide Utilities`\n-   按下 `Option+Command+0`（数字零）\n\
  -   点击 Xcode 窗口右上角的“显示/隐藏实用工具”图标，如图 2-8 所示\n\n![A978-1-4842-1233-2_2_Fig8_HTML.jpg](img/A978-1-4842-1233-2_2_Fig8_HTML.jpg)\n\
  \n图 2-8. “显示/隐藏实用工具”图标\n\n通过有选择地显示或隐藏导航面板、调试区域或实用工具面板，你可以让 Xcode 窗口看起来不那么杂乱，并为你想看到的\
  \ Xcode 部分腾出更多空间。要快速打开或隐藏这三个面板，通常最快的方法是点击 Xcode 窗口右上角的“显示/隐藏导航”、“调试区域”或“实用工具”图标。\n\
  \n\n\n## 创建与管理文件\n\n每当需要创建项目（代表全新的程序）或文件（添加到现有项目）时，你有三种选择：\n\n*   按下 `Command+N`\n\
  *   选择“文件”➜“新建”以显示如图 2-9 所示的子菜单\n\n![A978-1-4842-1233-2_2_Fig9_HTML.jpg](img/A978-1-4842-1233-2_2_Fig9_HTML.jpg)\n\
  \n图 2-9. “文件”➜“新建”命令会显示一个子菜单，允许你选择创建文件或项目\n\n*   右键点击导航器面板中的任意文件，显示如图 2-10 所示的弹出菜单\n\
  \n![A978-1-4842-1233-2_2_Fig10_HTML.jpg](img/A978-1-4842-1233-2_2_Fig10_HTML.jpg)\n\
  \n图 2-10. 在导航器面板中右键点击文件会显示一个弹出菜单，允许你选择创建文件或项目\n\n> **注意**  \n> 在某些 Macintosh 电脑上右键点击可能被禁用。你可以按住\
  \ `Control` 键的同时点击来模拟右键点击。若要启用右键点击，点击苹果菜单，选择“系统偏好设置”，然后点击“鼠标”或“触控板”图标。接着选中“辅助点击”复选框以开启右键点击功能。\n\
  \n创建新文件时，你可以选择为 OS X 项目还是 iOS 项目创建文件。就本书而言，你始终为 OS X 创建文件。\n\n除了选择为 OS X 创建文件，你还需要选择要创建的文件类型。最常见的两种文件类型是：存放\
  \ Swift 代码的文件（归类在“源”类别下，如图 2-11 所示），或存放用户界面的文件（归类在“用户界面”类别下，如图 2-12 所示）。\n\n![A978-1-4842-1233-2_2_Fig12_HTML.jpg](img/A978-1-4842-1233-2_2_Fig12_HTML.jpg)\n\
  \n图 2-12. 你可以创建的第二种文件类型用于存放程序用户界面的部分\n\n![A978-1-4842-1233-2_2_Fig11_HTML.jpg](img/A978-1-4842-1233-2_2_Fig11_HTML.jpg)\n\
  \n图 2-11. 你可以创建的一种文件类型用于存放 Swift 代码\n\n创建文件后，该文件会出现在项目导航器中。导航器面板实际上可以显示多种不同类型的信息，但最常见的是项目导航器，它列出了构成项目的所有文件。要在导航器面板中打开项目导航器，你有三种选择：\n\
  \n*   选择“视图”➜“导航器”➜“显示项目导航器”\n*   按下 `Command+1`\n*   点击“显示项目导航器”图标，如图 2-13 所示\n\
  \n![A978-1-4842-1233-2_2_Fig13_HTML.jpg](img/A978-1-4842-1233-2_2_Fig13_HTML.jpg)\n\
  \n图 2-13. 项目导航器面板列出了构成项目的所有文件\n\n项目导航器与 Finder 非常相似，可以显示文件和文件夹。要重命名文件或文件夹，只需选中它并按下\
  \ `Return` 键即可编辑其名称。\n\n要移动文件或文件夹，只需用鼠标将其拖拽到新位置即可。\n\n要选择多个项目，请按住 `Command` 键并点击文件或文件夹。\n\
  \n与 Finder 一样，项目导航器允许你将文件整理到文件夹中。这样你可以将相关文件分组存放，并将其收起来，避免项目导航器显得杂乱。要创建文件夹，请点击项目导航器中的一个文件或文件夹，然后选择以下任一方式：\n\
  \n*   选择“文件”➜“新建”➜“组”（或“从选中项新建组”以将选中的一个或多个文件存入文件夹）\n*   按下 `Option+Command+N`\n\
  *   右键点击项目导航器中的任意文件或文件夹，在弹出的菜单中选择“新建组”（或“从选中项新建组”以将选中的一个或多个文件存入文件夹）\n\n要删除文件或文件夹，请选中它，然后选择以下任一方式：\n\
  \n*   选择“编辑”➜“删除”\n*   按下 `Delete` 键或 `Command+Backspace`\n*   右键点击项目导航器中的任意文件或文件夹，在弹出的菜单中选择“删除”\n\
  \n> **注意**  \n> 删除文件或文件夹时，你可以选择“移除引用”（将文件/文件夹从项目中移除，但不会从 Macintosh 上物理删除）或“移到废纸篓”（将文件/文件夹从项目中移除，并从\
  \ Macintosh 上物理删除）。\n\n项目导航器最重要的用途或许就是让你能够编辑项目中的文件。当你点击项目导航器中的某个文件时，Xcode 窗口的中间面板会显示所选文件的内容，这些内容要么是\
  \ Swift 代码，要么是用户界面，如图 2-14 所示。\n\n![A978-1-4842-1233-2_2_Fig14_HTML.jpg](img/A978-1-4842-1233-2_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 在导航器面板中选择一个文件会显示该文件的内容\n\n\n\n## 创建和自定义用户界面\n\n`Utilities`面板最常用于创建和自定义项目的用户界面。在\
  \ OS X 程序中，用户界面文件可以是以下两种类型之一：\n\n- `.xib`文件\n- `.storyboard`文件\n\n创建项目时，你可以选择要使用的类型。通常，`.xib`文件用于单窗口用户界面，而`.storyboard`文件则用于需要按特定顺序链接显示的多个窗口。你也可以混合使用`.xib`和`.storyboard`文件来创建用户界面，或者仅使用`.xib`或`.storyboard`文件。\n\
  \n无论你使用`.xib`文件还是`.storyboard`文件，都需要借助`Utilities`面板实现两个目的。首先，你需要将按钮、文本字段和图片等元素拖放到用户界面上。其次，你需要通过更改这些用户界面元素的名称、颜色或大小来自定义它们。\n\
  \n要设计用户界面，你需从`对象库`开始，该库位于`Utilities`面板底部，如图 2-15 所示。要打开`对象库`，可以执行以下操作：\n\n![A978-1-4842-1233-2_2_Fig15_HTML.jpg](img/A978-1-4842-1233-2_2_Fig15_HTML.jpg)\n\
  \n图 2-15. 对象库包含不同的用户界面元素\n\n- 选择 视图 ➤ 实用工具 ➤ 显示对象库\n- 按 Control+Option+Command+3\n\
  - 点击显示对象库图标\n\n要在`对象库`中查找某个用户界面元素，只需上下滚动列表即可。但如果你知道所需元素的名称，更快捷的方式是点击`对象库`窗口底部的`搜索`字段，输入全部或部分元素名称，然后按`Return`键。`对象库`将仅显示与你输入内容匹配的元素。例如，如果你输入\"\
  Button\"，则`对象库`只会显示可以添加到用户界面的各种按钮。\n\n在用户界面上放置一个或多个元素后，第二步是使用`检查器`面板自定义这些元素。`检查器`面板可以显示多种类型的窗格，但自定义用户界面元素最常用的是以下两种：\n\
  \n- 属性检查器\n- 大小检查器\n\n`属性检查器`允许你修改元素的外观。`大小检查器`允许你修改元素在用户界面上的大小和位置。\n\n要打开`属性检查器`，可以执行以下任一操作：\n\
  \n- 选择 视图 ➤ 实用工具 ➤ 显示属性检查器\n- 按 Option+Command+4\n- 点击显示属性检查器，如图 2-16 所示\n\n![A978-1-4842-1233-2_2_Fig16_HTML.jpg](img/A978-1-4842-1233-2_2_Fig16_HTML.jpg)\n\
  \n图 2-16. 显示属性检查器和显示大小检查器图标。\n\n要打开`大小检查器`，可以执行以下任一操作：\n\n- 选择 视图 ➤ 实用工具 ➤ 显示大小检查器\n\
  - 按 Option+Command+5\n- 点击显示大小检查器，如图 2-16 所示\n\n打开`属性检查器`或`大小检查器`后，你可以点击一个用户界面元素（如按钮或文本字段）进行修改，然后输入或选择不同的选项来更改该元素的外观。\n\
  \n## 标准编辑器和辅助编辑器\n\n你大部分时间将使用编辑器或 Interface Builder。编辑器类似于文字处理器，允许你输入和编辑 Swift 代码。Interface\
  \ Builder 类似于绘图程序，允许你拖放、调整大小和移动用户界面上的元素，如按钮、文本字段和图形。\n\n要编辑 Swift 代码，只需在`项目导航器`面板中点击任何扩展名为`.swift`的文件。当你点击一个`.swift`文件时，该文件的内容会显示在\
  \ Xcode 的中间窗格中，如图 2-17 所示。\n\n![A978-1-4842-1233-2_2_Fig17_HTML.jpg](img/A978-1-4842-1233-2_2_Fig17_HTML.jpg)\n\
  \n图 2-17. 点击`.swift`文件会显示该文件中存储的 Swift 代码\n\n要编辑你的用户界面，只需在`项目导航器`面板中点击任何扩展名为`.xib`或`.storyboard`的文件。这会将该用户界面的内容显示在\
  \ Xcode 的中间窗格中，如图 2-18 所示。\n\n![A978-1-4842-1233-2_2_Fig18_HTML.jpg](img/A978-1-4842-1233-2_2_Fig18_HTML.jpg)\n\
  \n图 2-18. 点击`.xib`或`.storyboard`文件会显示该文件中存储的用户界面\n\n每次你在`项目导航器`面板中点击不同的文件，Xcode\
  \ 都会在窗口的中间窗格中显示该新文件的内容。\n\n当 Xcode 在中间窗格中显示单个文件的内容时，这被称为`标准编辑器`。然而，并排查看两个文件的内容通常也很有用。当\
  \ Xcode 并排显示两个文件内容时，第二个文件窗格被称为`辅助编辑器`。\n\n打开`辅助编辑器`最常见的原因是，如图 2-19 所示，左侧窗格显示用户界面，右侧窗格显示\
  \ Swift 文件。这样做的目的是让你能够将用户界面与 Swift 代码连接起来。\n\n![A978-1-4842-1233-2_2_Fig19_HTML.jpg](img/A978-1-4842-1233-2_2_Fig19_HTML.jpg)\n\
  \n图 2-19. 辅助编辑器并排显示两个文件的内容\n\n当你创建用户界面时，它完全独立于你的 Swift 代码（反之亦然）。这让你可以自由地用新用户界面替换旧用户界面，而不会影响\
  \ Swift 代码的行为。同样，这也允许你修改 Swift 代码而无需担心影响到用户界面。\n\n在过去，程序员必须使用代码创建用户界面，这意味着修改代码往往会影响到用户界面，增加了程序出错或出现\
  \ bug 的风险。通过将用户界面与代码分离，Xcode 消除了这个问题，并帮助你创建更可靠的软件。\n\n最初创建用户界面时，它什么也做不了。这就是为什么你需要将一些用户界面元素连接到使用户界面真正工作的\
  \ Swift 代码上。例如，如果用户界面显示一个按钮，点击该按钮不会发生任何事情。你必须编写 Swift 代码来告诉该按钮该做什么。然后你必须将按钮连接到你的\
  \ Swift 代码。\n\n这就是`辅助编辑器`的用途。通过将用户界面显示在 Swift 代码文件旁边，`辅助编辑器`让你可以轻松地从用户界面拖拽鼠标到 Swift\
  \ 代码文件中，并在用户界面和 Swift 代码之间建立连接。\n\n要打开`辅助编辑器`，可以选择以下任一方式：\n\n- 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器\n\
  - 按 Option+Command+Return\n- 点击辅助编辑器图标，如图 2-20 所示\n\n![A978-1-4842-1233-2_2_Fig20_HTML.jpg](img/A978-1-4842-1233-2_2_Fig20_HTML.jpg)\n\
  \n图 2-20. 标准编辑器和辅助编辑器图标\n\n要关闭`辅助编辑器`，需要通过以下方式之一打开`标准编辑器`：\n\n\n\n*   选择 View ➤\
  \ Standard Editor ➤ Show Standard Editor\n*   按下 `Command+Return`\n*   点击 **Standard\
  \ Editor** 图标，如图 2-20 所示\n\n使用 **Assistant Editor** 的一个问题是 Xcode 会在窄面板中显示两个文件的内容。如果你更希望在更宽的视图中查看两个或多个文件，可以将它们显示在单独的标签页中。这样你可以在\
  \ Xcode 的中间面板中看到每个文件的内容，并简单地点击标签页来查看不同文件的内容。\n\n标签页的缺点是你一次只能看到一个文件的内容。第二个缺点是你无法在\
  \ Swift 代码旁边看到用户界面，因此无法将用户界面元素连接到你的 Swift 代码。\n\n要创建标签页，请选择以下任一方式：\n\n*   选择 File\
  \ ➤ New ➤ Tab\n*   按下 `Command+T`\n\n现在你可以点击每个标签页来查看该文件的内容。要关闭标签页，将鼠标移到标签页上，然后选择以下任一方式：\n\
  \n*   点击标签页左侧的关闭图标（看起来像一个大的 X）\n*   右键点击标签页，在弹出的菜单中点击 `Close Tab`，如图 2-21 所示\n\n\
  ![A978-1-4842-1233-2_2_Fig21_HTML.jpg](img/A978-1-4842-1233-2_2_Fig21_HTML.jpg)\n\
  图 2-21.\n右键点击标签页会显示一个弹出菜单\n\n## 运行程序\n\n通常你会多次运行程序来测试并确保其工作正常。当你运行程序时，Xcode 会将其编译成一个文件，如果你愿意，可以将其分发给其他人。运行程序可以让你直接在\
  \ Mac 上测试程序。\n\n运行程序的三种方式是：\n\n*   选择 Product ➤ Run\n*   按下 `Command+R`\n*   点击\
  \ **Run** 图标，如图 2-22 所示\n\n    ![A978-1-4842-1233-2_2_Fig22_HTML.jpg](img/A978-1-4842-1233-2_2_Fig22_HTML.jpg)\n\
  \    图 2-22.\n    **Run** 和 **Stop** 图标让你测试 OS X 项目\n\n程序运行后，你可以通过几种方式停止它：\n\n*\
  \   选择 `YourProgramName` ➤ Quit，其中 `YourProgramName` 是你的项目名称\n*   点击 Dock 上代表你的程序的图标，然后按下\
  \ `Command+Q`\n*   点击 Xcode 中的 **Stop** 图标，如图 2-22 所示\n\n如果你的程序有严重错误，导致无法响应任何命令，你也可以使用\
  \ `Force Quit` 命令来关闭程序。要使用 `Force Quit`，点击 Apple 菜单并选择 `Force Quit`。\n\n当 `Force\
  \ Quit` 窗口出现时，点击你的程序名称，然后点击 `Force Quit` 按钮将其关闭。\n\n### 小结\n\n本章介绍了 Xcode 的主要功能，并展示了选择常用命令的各种方式。目前不必担心要记住或完全理解本章的所有内容。将本章视为\
  \ Xcode 的入门介绍，无论何时遇到问题都可以回头参考。\n\n在下一章中，我们将实际经历使用 Xcode 创建 OS X 程序的典型过程。这样你就能理解本章中学到的\
  \ Xcode 各种功能的目的。\n\n请记住，对于 Xcode，通常有两种或更多方式可以选择完全相同的命令，但你无需学习所有这些不同的方法。你只需选择最喜欢的方法，忽略其他方法即可。\n\
  \n如你所见，Xcode 提供了将你的想法转变为功能完备的 OS X 程序所需的一切，你可以将该程序出售或分发给他人。通过学习 Xcode，你将学会使用专业程序员用来创建\
  \ OS X 和 iOS 软件的编程工具。你使用 Xcode 越多，就会越得心应手，Xcode 的用户界面也不会再让你感到畏惧。很快，你就能像专业人士一样使用\
  \ Xcode。\n\n记住，编程的真正关键不在于拥有最好的编程工具，而在于知道如何使用它们。你使用 Xcode 越多，就越能理解如何将你的绝妙想法变成实际可运行的程序。学习\
  \ Xcode 是为 Macintosh 以及 Apple 的许多其他设备（如 iPhone、iPad 和 Apple Watch）编写软件的必经之路。今天学习\
  \ Xcode，你就能利用现在和未来众多有丰厚回报的编程机会。欢迎来到 Xcode 的世界！\n\n"
- "# 3. 创建 Mac 程序的基础\n\n电子补充材料：本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​3](http://dx.doi.org/10.1007/978-1-4842-1233-2_3)）包含补充材料，可供授权用户使用。\n\
  \n无论你想创建什么类型的 OS X 程序，比如视频游戏、为律师或股票经纪人定制的程序，你都将遵循相同的基本步骤。首先，你需要创建一个 OS X 项目。这会创建一个基本的\
  \ OS X 程序，包含一个通用的用户界面。\n\n其次，你需要以两种方式定制这个通用的 OS X 程序：向用户界面添加元素，以及编写 Swift 代码使程序实际执行某些操作。\n\
  \n第三，你需要运行并测试你的程序。在运行和测试程序之后，你很可能需要不断返回修改用户界面或 Swift 代码，以修复问题并添加新功能。最终，你的程序会达到一个（暂时）完成的状态，你可以发布它。然后你需要再次重复这些基本步骤来添加更多新功能。\n\
  \n通常，你花在修改程序上的时间会比创建新程序的时间多。然而，创建小程序来测试不同功能是很有用的。一旦这些较小的实验性程序可以工作了，你就可以将它们添加到另一个程序中。通过这样做，你不会有破坏一个正在运行的程序的风险。\n\
  \n\n\n## 创建项目\n\n创建程序的第一步就是新建一个项目。创建项目时，`Xcode` 会提供多种模板供你选择，这些模板提供了基础功能。你只需要自定义模板即可。OS\
  \ X 模板的四大类别如图 3-1 所示：\n\n![A978-1-4842-1233-2_3_Fig1_HTML.jpg](img/A978-1-4842-1233-2_3_Fig1_HTML.jpg)\n\
  \n图 3-1.\n用于创建项目的 OS X 模板四大类别\n\n- 应用程序（Application）\n- 框架与库（Framework & Library）\n\
  - 系统插件（System Plug-in）\n- 其他（Other）\n\n大多数情况下，你会选择“应用程序”类别中的模板，其中最常用的是 `Cocoa Application`，它能创建一个带有下拉菜单和窗口的标准\
  \ OS X 程序。\n\n另外两个应用程序模板是 `Game`（用于创建视频游戏）和 `Command Line Tool`（用于创建不需要传统图形用户界面的程序）。\n\
  \n“框架与库”类别用于创建可复用的软件库。“系统插件”类别用于为其他类型的程序创建插件。“其他”类别则用于创建不属于其他类别的程序。\n\n在本书中，我们将始终使用\
  \ OS X 应用程序类别下的 `Cocoa Application`。其他 OS X 类别是为高级程序员设计的，本书将不予涉及。\n\n当你创建 `Cocoa\
  \ Application` 项目时，需要定义几个项目，如图 3-2 所示：\n\n![A978-1-4842-1233-2_3_Fig2_HTML.jpg](img/A978-1-4842-1233-2_3_Fig2_HTML.jpg)\n\
  \n图 3-2.\n定义 `Cocoa Application` 项目\n\n- 产品名称\n- 要使用的编程语言（`Objective-C` 或 `Swift`）\n\
  - 是否在用户界面中使用 storyboard\n- 是否创建基于文档的应用程序\n- 是否使用 `Core Data`\n\n产品名称完全由你决定，但最好具有描述性，因为\
  \ `Xcode` 会使用你选择的名称创建一个文件夹来存储所有文件。\n\n组织名称和组织标识符也是任意的，通常来自你的 Apple Developer 账户。如果你愿意，这两项也可以设为任意字符串，但如果你计划通过\
  \ Mac App Store 分发程序，则应将它们与你的 Apple Developer 账户关联起来。\n\n“语言”弹出菜单让你选择 `Objective-C`\
  \ 或 `Swift`。在本书中，你应始终选择 `Swift`。`Objective-C` 是 Apple 仍在支持的更复杂的编程语言，但已不再被视为 Apple\
  \ 的官方编程语言。\n\n“使用 Storyboard”复选框可以让你创建用户界面，该界面可以包含单个窗口（一个 `.xib` 文件），也可以是一系列链接在一起的窗口（一个\
  \ `.storyboard` 文件）。我们将介绍创建用户界面的两种方法，但除非另有说明，否则请取消勾选“使用 Storyboard”复选框。这是因为 storyboard\
  \ 使用起来更复杂。\n\n“创建基于文档的应用程序”意味着 `Xcode` 会创建一个 `Cocoa Application`，它可以打开和管理多个窗口，例如文字处理器中的多个窗口。管理多个窗口较为复杂，所以暂时请取消勾选“创建基于文档的应用程序”复选框。\n\
  \n“使用 Core Data”复选框用于存储数据，通常用于数据库应用程序，如保存姓名和地址列表。请将此复选框留空，因为它适用于更高级的 OS X 程序。\n\n\
  准备好创建你的第一个 OS X 程序了吗？请按照以下步骤操作：\n\n启动 `Xcode`。如果出现如图 3-3 所示的 `Welcome to Xcode`\
  \ 屏幕，请点击 `Create a new Xcode project`。如果未出现此欢迎屏幕，请选择 `File > New > Project` 或选择\
  \ `Window > Welcome to Xcode` 来显示此屏幕，以便你能选择 `Create a new Xcode project`。`Xcode`\
  \ 会显示项目模板列表（参见图 3-1）。\n\n![A978-1-4842-1233-2_3_Fig3_HTML.jpg](img/A978-1-4842-1233-2_3_Fig3_HTML.jpg)\n\
  \n图 3-3.\n`Welcome to Xcode` 启动屏幕\n\n点击 `OS X` 类别下的 `Application`。会显示一系列不同的 OS X\
  \ 应用程序模板。  \n点击 `Cocoa Application`，然后点击 `Next` 按钮。`Xcode` 现在会询问你的项目名称（见图 3-2）。\
  \  \n点击 `Product Name` 文本字段，输入 `MyFirstProgram`。  \n点击 `Language` 弹出菜单，确保显示的是 `Swift`。\
  \  \n确保所有复选框都未勾选，然后点击 `Next` 按钮。`Xcode` 现在会询问你想将项目存储在哪里。  \n点击一个你想存储 `Xcode` 项目的文件夹，然后点击\
  \ `Create` 按钮。恭喜你！你已经成功创建了第一个 OS X 程序。至此，`Xcode` 刚刚创建了一个通用的 Macintosh 程序，而你甚至不需要编写一行\
  \ `Swift` 代码或设计用户界面来创建一个可实际运行的程序。  \n选择 `Product > Run`，按下 `Command+R`，或点击 `Run`\
  \ 图标。`Xcode` 会运行你名为 `MyFirstProgram` 的程序，如图 3-4 所示。请注意，`MyFirstProgram` 显示了一个带有下拉菜单的菜单栏和一个可在屏幕上移动或调整大小的窗口。因为你使用了\
  \ `Cocoa Application` 模板，`Xcode` 自动创建了创建通用 Macintosh 程序所需的所有代码。\n\n![A978-1-4842-1233-2_3_Fig4_HTML.jpg](img/A978-1-4842-1233-2_3_Fig4_HTML.jpg)\n\
  \n图 3-4.\n`MyFirstProgram` 正在运行\n\n选择 `MyFirstProgram > Quit MyFirstProgram`。`Xcode`\
  \ 会重新出现。请保持 `MyFirstProgram` 在 `Xcode` 中打开，以供下一节使用。\n\n你无需任何操作就成功创建了一个外观和行为都像典型\
  \ Macintosh 程序的程序。当然，这个极简的 Macintosh 程序在你自定义用户界面并编写 `Swift` 代码使其执行有用操作之前，不会做任何有趣的事情。\n\
  \n\n## 设计用户界面\n\n在设计用户界面时，请牢记任何用户界面的三个目的：\n\n- 向用户显示信息\n- 从用户处获取数据\n- 让用户向程序发出命令\n\
  \n在设计用户界面时，每个元素都必须满足这些标准之一。颜色和线条可能看起来只是装饰性的，但它们对于组织用户界面非常有用，使用户知道在哪里查找信息、如何输入数据，或者如何向程序发出命令。\n\
  \n要在`Xcode`中创建用户界面，你需要遵循一个两步流程：\n\n- 使用对象库将项目拖放到你的用户界面上\n- 使用检查器面板自定义每个用户界面项目\n\n\
  要了解如何使用对象库，我们向`MyFirstProgram`用户界面添加一个标签、一个文本字段和一个按钮。标签将向用户显示文本；文本字段将让用户输入数据；按钮将使程序从文本字段获取文本，通过将每个字符大写来修改它，并将修改后的大写文本放入标签中。\n\
  \n为此，请按照以下步骤操作：\n\n确保你的`MyFirstProgram`项目已加载到`Xcode`中。选择**视图** > **导航器** > **显示项目导航器**，或按`Command+1`查看组成`MyFirstProgram`项目的所有文件列表。点击`MainMenu.xib`文件。`Xcode`会显示用户界面。请注意，只有当你点击`MyFirstProgram`图标时，`MyFirstProgram`的实际窗口才会可见。点击出现在项目导航器和用户界面之间窗格中的`MyFirstProgram`图标。这将显示`MyFirstProgram`用户界面的窗口，如图\
  \ 3-5 所示。\n\n![A978-1-4842-1233-2_3_Fig5_HTML.jpg](img/A978-1-4842-1233-2_3_Fig5_HTML.jpg)\n\
  \n图 3-5. `MyFirstProgram`图标显示`MyFirstProgram`用户界面\n\n选择**视图** > **实用工具** > **显示对象库**。对象库出现在`Xcode`窗口的右下角。从对象库中拖拽一个下压按钮，并将其放置在`MyFirstProgram`窗口的底部附近。请注意，当你将按钮放置在窗口中部靠近底部的位置时，会出现蓝色辅助线，帮助你对齐用户界面项目，如图\
  \ 3-6 所示。\n\n![A978-1-4842-1233-2_3_Fig6_HTML.jpg](img/A978-1-4842-1233-2_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 使用蓝色辅助线将下压按钮放置在`MyFirstProgram`窗口底部附近\n\n点击对象库中的搜索字段，然后输入`label`。请注意，对象库现在只显示标签用户界面项目，如图\
  \ 3-7 所示。\n\n![A978-1-4842-1233-2_3_Fig7_HTML.jpg](img/A978-1-4842-1233-2_3_Fig7_HTML.jpg)\n\
  \n图 3-7. 在搜索字段中键入内容有助于你轻松找到对象库中的项目\n\n将标签从对象库拖放到`MyFirstProgram`窗口的中央。点击对象库底部搜索字段右侧出现的清除图标（灰色圆圈中的\
  \ X）。对象库现在显示所有可能的用户界面项目。滚动对象库，直到找到文本字段项目。将文本字段拖放到标签上方，这样你的整个用户界面就如图 3-8 所示。（不用担心每个用户界面项目的精确位置。）\n\
  \n![A978-1-4842-1233-2_3_Fig8_HTML.jpg](img/A978-1-4842-1233-2_3_Fig8_HTML.jpg)\n\
  \n图 3-8. `MyFirstProgram`用户界面上的一个标签、文本字段和按钮\n\n至此，你已经自定义了通用的用户界面。现在你需要使用检查器面板自定义每个用户界面项目。通过检查器面板，你可以为用户界面项目选择不同的选项，例如输入按钮的精确宽度或为文本字段选择背景颜色。\n\
  \n在调整用户界面项目的大小或移动它时，你可以将精确值输入到大小检查器面板中，也可以直接拖拽鼠标来调整大小或移动项目。两种方法都可以接受，但大小检查器面板能让你对项目进行精确控制。让我们看看如何使用检查器面板来自定义我们的通用用户界面。\n\
  \n点击`MyFirstProgram`窗口底部附近的下压按钮以将其选中。选择**视图** > **实用工具** > **显示属性检查器**。属性检查器面板出现在`Xcode`窗口的右上角，如图\
  \ 3-9 所示。\n\n![A978-1-4842-1233-2_3_Fig9_HTML.jpg](img/A978-1-4842-1233-2_3_Fig9_HTML.jpg)\n\
  \n图 3-9. 属性检查器面板让你能够自定义项目的外观\n\n点击当前显示“Button”的标题文本字段。删除标题文本字段中的所有现有文本，输入`Change\
  \ Case`，然后按`Return`键。下压按钮上的文本现在显示“Change Case”。但是，按钮宽度太窄了。选择**视图** > **实用工具** >\
  \ **显示大小检查器**。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，将值更改为`120`，如图 3-10 所示，然后按`Return`键。`Xcode`会更改下压按钮的宽度。\n\
  \n![A978-1-4842-1233-2_3_Fig10_HTML.jpg](img/A978-1-4842-1233-2_3_Fig10_HTML.jpg)\n\
  \n图 3-10. 宽度文本字段出现在大小检查器面板中\n\n点击标签以将其选中。要修改标签的大小，我们需要打开大小检查器面板，可以通过选择**视图** > **实用工具**\
  \ > **显示大小检查器**来实现，但有一种更快的方法，即使用键盘快捷键或图标。按`Option+Command+5`或直接点击大小检查器图标（看起来像一把垂直的尺子）。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，输入`250`，然后按`Return`键。`Xcode`会加宽标签的宽度。\n\
  \n点击文本字段以将其选中。按`Option+Command+5`或直接点击大小检查器图标（看起来像一把垂直的尺子）。大小检查器面板出现在`Xcode`窗口的右上角。点击宽度文本字段，输入`250`，然后按`Return`键。`Xcode`会加宽文本字段的宽度。此时，所有用户界面项目看起来都偏离了中心。拖拽每个项目，直到看到蓝色辅助线显示你已将其居中在`MyFirstProgram`窗口中，如图\
  \ 3-11 所示。\n\n![A978-1-4842-1233-2_3_Fig11_HTML.jpg](img/A978-1-4842-1233-2_3_Fig11_HTML.jpg)\n\
  \n图 3-11. 使用蓝色辅助线将项目居中于用户界面\n\n至此，你已经自定义了用户界面的外观。如果你运行这个程序，用户界面看起来会不错，但它实际上不会执行任何操作。要使一个用户界面工作，你还需要完成两个步骤：\n\
  \n- 编写 Swift 代码\n- 将你的用户界面连接到你的 Swift 代码\n\n你需要编写 Swift 代码让你的程序计算出一些有用的结果。你还需要将你的用户界面连接到你的\
  \ Swift 代码，这样你可以从用户界面检索数据并将信息显示回用户界面上。\n\n在这个例子中，我们将编写 Swift 代码，当用户点击`Change Case`下压按钮时，代码从文本字段检索文本，将其更改为大写，然后将大写文本显示回标签上。\n\
  \n因此，我们需要编写将文本转换为大写的 Swift 代码。然后我们需要连接文本字段和标签，以便 Swift 代码可以从文本字段检索数据并将新数据放入标签。\n\
  \n为了向用户界面项目发送或检索数据以便 Swift 代码可以访问它，我们需要使用一种叫做`IBOutlet`的东西。一个`IBOutlet`本质上是将一个用户界面项目（例如标签或文本字段）表示为一个\
  \ Swift 代码可以使用的变量。\n\n\n\n## 创建 IBOutlet 并使用 Assistant Editor\n\n要创建 `IBOutlet`，请使用\
  \ Assistant Editor。Assistant Editor 可以在一个窗格中显示用户界面，在相邻的窗格中显示您的 Swift 代码。然后，您可以使用鼠标将用户界面项拖拽到\
  \ Swift 代码中，从而创建将标签或文本字段连接到 `IBOutlet` 的 `IBOutlet`。让我们看看具体如何操作：\n\n确保已选中 `MainMenu.xib`\
  \ 文件，以便在屏幕上显示 MyFirstProgram 用户界面窗口。（如果没有，请在 Project Navigator 中点击 `MainMenu.xib`\
  \ 文件，然后点击 MyFirstProgram 图标以显示用户界面窗口。）选择 **View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor**。Assistant Editor 会在 `AppDelegate.swift` 文件中显示 Swift 代码，与 `MainMenu.xib`\
  \ 文件中的用户界面并排显示，如图 3-12 所示。\n\n![A978-1-4842-1233-2_3_Fig12_HTML.jpg](img/A978-1-4842-1233-2_3_Fig12_HTML.jpg)\n\
  \n**Figure 3-12.** Assistant Editor 让您并排查看用户界面和 Swift 代码文件\n\n点击 MyFirstProgram\
  \ 窗口上的标签。按住 Control 键，将鼠标从标签拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方，直到 Swift\
  \ 代码文件中出现一条水平线，如图 3-13 所示。\n\n![A978-1-4842-1233-2_3_Fig13_HTML.jpg](img/A978-1-4842-1233-2_3_Fig13_HTML.jpg)\n\
  \n**Figure 3-13.** Control-拖拽可在用户界面项与 Swift 代码之间创建连接\n\n松开 Control 键和鼠标。会出现一个弹出窗口，如图\
  \ 3-14 所示。\n\n![A978-1-4842-1233-2_3_Fig14_HTML.jpg](img/A978-1-4842-1233-2_3_Fig14_HTML.jpg)\n\
  \n**Figure 3-14.** 弹出窗口让您为 `IBOutlet` 定义名称\n\n在 Name 文本字段中点击，输入 `labelText`，然后点击\
  \ Connect 按钮。（您选择的名称应具有描述性，但可以是任何您想要的名称。）Xcode 会在您的 Swift 文件中创建一个如下所示的 `IBOutlet`：\n\
  \n`@IBOutlet weak var labelText: NSTextField!`\n\n点击文本字段以将其选中。按住 Control 键，将鼠标从文本字段拖拽到您刚创建的\
  \ `IBOutlet` 下方，直到 `AppDelegate.swift` 文件中出现一条水平线。松开 Control 键和鼠标。会出现一个弹出窗口。在 Name\
  \ 文本字段中点击，输入 `messageText`，然后点击 Connect 按钮。Xcode 会在您的 Swift 文件中创建第二个如下所示的 `IBOutlet`：\n\
  \n`@IBOutlet weak var messageText: NSTextField!`\n\n让我们回顾一下您刚才的操作。首先，您创建了一个代表标签和文本字段的\
  \ `IBOutlet`。现在，标签由名称 `labelText` 表示，文本字段由名称 `messageText` 表示。当您的 Swift 代码想要在标签或文本字段中存储或检索数据时，它可以直接通过名称\
  \ `labelText` 或 `messageText` 来引用它们。\n\n其次，您在 Swift 代码和用户界面项之间创建了一个链接。现在，您的 Swift\
  \ 代码可以向程序用户界面上的标签和文本字段发送数据，并从中检索数据。\n\n将用户界面连接到 Swift 代码是使用户界面真正工作的重要一步。但是，我们需要让\
  \ Change Case 按钮在用户点击时执行某些操作。为此，我们需要创建一种叫做 `IBAction` 方法的东西。\n\n`IBOutlet` 让 Swift\
  \ 代码可以向用户界面项发送数据或从中检索数据，而 `IBAction` 方法则让用户界面项可以运行执行某些操作的 Swift 代码。在本例中，我们希望用户在文本字段中输入文本。然后，程序会获取该文本，将其转换为大写，并将转换后的文本显示回标签中。\n\
  \n为此，我们需要了解如何执行以下操作：\n\n- 创建 `IBAction` 方法\n- 从文本字段中检索文本\n- 将从文本字段检索到的所有文本转换为大写\n\
  - 将转换后的文本存储在标签中\n\n从文本字段和标签中存储和检索文本是类似的，因为两者都由 `IBOutlet` 变量定义。让我们看看这些 `IBOutlet`\
  \ 的含义：\n\n```\n@IBOutlet weak var labelText: NSTextField!\n@IBOutlet weak var messageText:\
  \ NSTextField!\n```\n\nObject Library 中的所有用户界面项都基于构成 Cocoa 框架的类文件。在本例中，我们创建了两个 `IBOutlet`\
  \ 变量，名为 `labelText` 和 `messageText`，它们都基于 `NSTextField` 类文件。\n\n如果您在 Xcode 的文档中查找\
  \ `NSTextField` 类文件，您会看到一长串所有基于 `NSTextField` 的对象可以拥有的属性。但是，您找不到任何描述保存文本的属性的内容。\n\
  \n然而，如果您还记得第 1 章的内容，面向对象编程意味着类文件可以从其他类文件继承。在本例中，`NSTextField` 类继承自另一个名为 `NSControl`\
  \ 的类。在 Xcode 文档中查找 `NSControl`（您将在下一章学习如何操作），您会看到 `NSControl` 有一个保存文本的属性，名为 `stringValue`，如图\
  \ 3-15 所示。\n\n![A978-1-4842-1233-2_3_Fig15_HTML.jpg](img/A978-1-4842-1233-2_3_Fig15_HTML.jpg)\n\
  \n**Figure 3-15.** Xcode 文档显示 `NSControl` 用于保存文本的属性\n\n要访问文本字段中存储的文本，我们需要通过名称 (`messageText`)\
  \ 和保存文本的属性 (`stringValue`) 来标识文本字段，例如：\n\n`messageText.stringValue`\n\n要在标签中显示文本，我们需要通过名称\
  \ (`labelText`) 和保存文本的属性 (`stringValue`) 来标识标签，例如：\n\n`labelText.stringValue`\n\n\
  那么下一个问题是：我们如何将文本转换为大写？Swift 将文本存储在一个名为 `String` 的数据类型中，该类型基于名为 `NSString` 的类。（您怎么知道这一点？您需要理解\
  \ Cocoa 框架，您将在第 4 章中了解更多。）`NSString` 类有一个名为 `uppercaseString` 的方法，如图 3-16 所示。\n\n\
  ![A978-1-4842-1233-2_3_Fig16_HTML.jpg](img/A978-1-4842-1233-2_3_Fig16_HTML.jpg)\n\
  \n**Figure 3-16.** Xcode 文档显示 `NSString` 类有一个用于将文本转换为大写的方法，名为 `uppercaseString`\n\
  \n要将文本字段中存储的文本（由 `IBOutlet` 名称 `messageText` 表示）转换为大写，我们只需对 `IBOutlet` 的文本属性应用 `uppercaseString`\
  \ 方法，如下所示：\n\n`messageText.stringValue.uppercaseString`\n\n这段 Swift 代码的意思是：获取 `messageText`\
  \ 对象（即用户界面上的文本字段），检索它包含的文本（位于 `stringValue` 属性中），然后对该文本应用 `uppercaseString` 方法。\n\
  \n现在我们已经知道如何从文本字段中检索文本、将其转换为大写，并将新文本存储回标签中，最后一步是编写代码，将所有操作放在一个 `IBAction` 方法中。这个\
  \ `IBAction` 方法需要在用户每次点击 Change Case 按钮时运行。这意味着我们需要创建一个 `IBAction` 方法并将其链接到 Change\
  \ Case 按钮。\n\n确保 Assistant Editor 仍然打开，并并排显示用户界面和 `AppDelegate.swift` 文件。点击 MyFirstProgram\
  \ 用户界面上的 Change Case 按钮以将其选中。按住 Control 键，将鼠标拖拽到最后一个 `IBOutlet` 下方，直到出现一条水平线，如图\
  \ 3-17 所示。\n\n![A978-1-4842-1233-2_3_Fig17_HTML.jpg](img/A978-1-4842-1233-2_3_Fig17_HTML.jpg)\n\
  \n**Figure 3-17.** 从按钮 Control-拖拽到 `AppDelegate.swift` 文件\n\n松开 Control 键和鼠标。会出现一个弹出窗口。点击\
  \ Connection 弹出菜单，选择 Action，如图 3-18 所示。\n\n![A978-1-4842-1233-2_3_Fig18_HTML.jpg](img/A978-1-4842-1233-2_3_Fig18_HTML.jpg)\n\
  \n**Figure 3-18.**\n\n\n\n## 创建动作连接\n\n在 `Name` 文本字段中点击并输入 `changeCase`。（你选择的名称应具有描述性，但可以是任何你想要的名称。）在\
  \ `Type` 弹出菜单中点击，并选择 `NSButton`，如图 3-19 所示。然后点击 `Connect` 按钮。Xcode 会创建一个如下所示的 `IBAction`\
  \ 方法：\n\n![A978-1-4842-1233-2_3_Fig19_HTML.jpg](img/A978-1-4842-1233-2_3_Fig19_HTML.jpg)\n\
  \n**图 3-19.** 为 `IBAction` 方法选择类型\n\n```\n@IBAction func changeCase(sender: NSButton)\
