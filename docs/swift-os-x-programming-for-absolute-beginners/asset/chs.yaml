  Cat\", \"Dog\", \"Bird\", \"Fish\", \"Reptile\"])\n}\n```\n\n`addNewItem`这个`IBAction`方法从文本字段获取文本，并使用`addItemWithTitle`方法将该文本作为新的菜单项添加到弹出按钮列表中。`deleteFirstItem`这个`IBAction`方法使用`removeItemAtIndex`方法删除弹出按钮列表中的第一个菜单项。`addList`这个`IBAction`方法使用`removeAllItems`方法清空弹出按钮中的当前列表，然后用一个新的字符串数组替换它。\n\
  \n选择`Product` ➤ `Run`。你的用户界面会出现。点击弹出按钮。注意，菜单项列表显示三个项目，标签分别是`Item 1`、`Item 2`和`Item\
  \ 3`。点击`Delete First Item`按钮。再次点击弹出按钮。注意，菜单项列表现在只显示两个项目，标签分别是`Item 2`和`Item 3`。点击文本字段，输入`My\
  \ Item`。点击`Add New Item`按钮。再次点击弹出按钮。注意，现在菜单项列表显示三个项目，标签分别是`Item 2`、`Item 3`和`My\
  \ Item`。点击`Add New List`按钮。再次点击弹出按钮。注意，现在菜单项列表显示的是在`addList`这个`IBAction`方法内部定义的字符串数组。选择`EditPopProgram`\
  \ ➤ `Quit EditPopProgram`。\n\n## 总结\n\n按钮代表用户可以通过点击来选择某个选项的命令。Xcode 提供了几种不同类型的按钮可以放置在用户界面上，但它们都基于\
  \ Cocoa 框架中定义的同一个`NSButton`类。\n\n并非所有按钮都显示文本，但那些显示文本的按钮使用`Title`属性来保存文本。如果希望在按钮上显示图像，可以使用`Image`属性来定义图像。如果将按钮的`Type`属性更改为`Switch`或`Toggle`，那么就可以让按钮显示`Title`属性中存储的文本，同时还可以显示`Alternate\
  \ Text`属性和/或`Alternate Image`属性中的文本。\n\n如果需要向用户提供多个选项，在用户界面上放置多个按钮可能会显得杂乱无章。一个更简单的替代方法是使用弹出按钮，它显示一个选项列表，你可以通过可视化方式或\
  \ Swift 代码来修改这个列表。\n\n按钮通常连接到一个`IBAction`方法，但你可以将多个按钮（或其他用户界面项）链接到同一个`IBAction`方法。当将多个用户界面项连接到一个`IBAction`方法时，你需要使用\
  \ Swift 代码来识别调用该`IBAction`方法的用户界面项。按钮是向用户提供可选选项的最直接方式。\n\n"
- "# 16. 使用单选按钮、复选框、日期选择器和滑块做出选择\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1233-2_16](http://dx.doi.org/10.1007/978-1-4842-1233-2_16))\
  \ 包含补充材料，仅供授权用户使用。\n\n用户界面通常不是让用户通过按钮选择特定命令，而是提供选项供其挑选。这些选择允许用户选取一个或多个选项，例如自定义程序的工作方式。当用户界面需要提供多个选项时，最常见的两种方式是通过单选按钮和复选框。\n\
  \n单选按钮的名称来源于汽车收音机，你可以按下按钮切换到不同的广播电台。由于一次只能收听一个电台，因此单选按钮提供多个选项，但限制一次只能选择一个按钮。当你选择另一个按钮时，之前的选择就不再被选中。使用单选按钮时，你可以选择零个按钮，或者一次恰好选择一个按钮。\n\
  \n复选框的工作原理略有不同。与单选按钮一样，复选框也提供多个选项。主要区别在于，对于一组复选框，你可以同时选择零个或多个复选框，因此可以一次选择多个选项。\n\
  \n当需要将用户限制为零个或一个选择时，请使用单选按钮。当需要让用户选择零个或多个选项时，请使用复选框。图 16-1 展示了 Xcode 偏好设置对话框，它同时使用单选按钮和复选框让用户自定义\
  \ Xcode 的行为。\n\n![A978-1-4842-1233-2_16_Fig1_HTML.jpg](img/A978-1-4842-1233-2_16_Fig1_HTML.jpg)\
  \  \n图 16-1. Xcode 偏好设置对话框使用单选按钮和复选框让用户选择选项\n\n虽然单选按钮和复选框通常用于显示文本形式的选项，但日期选择器则显示不同类型的日期供用户选择。然后日期选择器会以一种特殊的日期格式存储用户的选择（而不是表示月份的单独文本或表示日期的数字）。\n\
  \n通过以特殊格式存储日期，你的程序可以根据用户计算机上的设置正确显示日期。例如，在世界上的某些地区，日期显示为这样：`mm/dd/yyyy`。而在世界的其他地区，日期显示为这样：`dd/mm/yyyy`。\n\
  \n日期选择器无需担心每个用户计算机上的特定日期格式设置，它使用一种特殊的日期格式，这样计算机就可以根据用户当前的设置正确显示相应的格式。\n\n日期选择器与单选按钮和复选框一样，为用户提供固定但有限的、有效的选项范围供其选择。这确保了无论用户做出何种选择，该选择对于你的程序来说都是可以接受的。\n\
  \n复选框和单选按钮适用于为用户提供有限的、通常是文本类的选项。为了向用户提供一个可供选择的数值范围，你可以使用滑块。滑块允许用户直观地选择一个有效的选项范围。\n\
  \n\n\n## 使用复选框\n\n您可以单独使用一个复选框，也可以将多个复选框组合在一起使用。复选框实际上基于 `NSButton` 类，尽管其外观和操作方式与典型的按钮有很大不同。对于复选框，最重要的三个属性包括：\n\
  \n- **标题** – 显示在复选框旁边，描述供用户选择的选项文本。\n- **状态** – 决定复选框是选中（1）还是未选中（0）。\n- **替代文本**\
  \ – 复选框未选中时显示的文本。（选中复选框时显示的是标题文本。）\n\n要了解复选框的工作原理，请按照以下步骤操作：\n\n选择 “视图” ➤ “工具” ➤\
  \ “显示属性检查器”。属性检查器窗格会出现在 Xcode 窗口的右上角。点击顶部的复选框，在属性检查器窗格中，将其标题改为“无狗”，替代文本改为“狗”。点击中间的复选框，在属性检查器窗格中，将其标题改为“无猫”，替代文本改为“猫”。点击底部的复选框，在属性检查器窗格中，将其标题改为“无鸟”，替代文本改为“鸟”。双击按钮，将其标题改为“检查”。选择\
  \ “视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。Xcode 会在用户界面旁边显示 `AppDelegate.swift` 文件。将鼠标指针移到“狗”复选框上，按住\
  \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入\
  \ `dogBox`，然后点击“连接”按钮。将鼠标指针移到“猫”复选框上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的\
  \ `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入 `catBox`，然后点击“连接”按钮。将鼠标指针移到“鸟”复选框上，按住\
  \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入\
  \ `birdBox`，然后点击“连接”按钮。将鼠标指针移到文本视图上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件中的\
  \ `IBOutlet` 行下方。松开 Control 键和鼠标。会弹出一个窗口。点击“名称”文本字段，输入 `messageBox`，然后点击“连接”按钮。现在您应该有四个新的\
  \ `IBOutlet`，看起来像这样：在 Xcode 中选择 “文件” ➤ “新建” ➤ “项目”。在 OS X 类别下点击“应用程序”。点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
  \ 会要求输入产品名称。点击“产品名称”文本字段，输入 `CheckProgram`。确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。点击“下一步”按钮。Xcode\
  \ 会询问您希望将项目存储在哪里。选择一个文件夹来存储项目，然后点击“创建”按钮。点击项目导航器中的 `MainMenu.xib` 文件。程序的主界面会显示出来。点击\
  \ `CheckProgram` 图标以显示程序主界面的窗口。选择 “视图” ➤ “工具” ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。将一个按钮、三个复选框和一个文本视图拖到用户界面窗口上。确保调整文本视图和所有复选框的宽度，使其看起来如图\
  \ 16-2 所示。\n\n![A978-1-4842-1233-2_16_Fig2_HTML.jpg](img/A978-1-4842-1233-2_16_Fig2_HTML.jpg)\n\
  \n图 16-2. `CheckProgram` 的用户界面。\n\n```\n@IBOutlet weak var dogBox: NSButton!\n@IBOutlet\
  \ weak var catBox: NSButton!\n@IBOutlet weak var birdBox: NSButton!\n@IBOutlet weak\
  \ var messageBox: NSTextField!\n```\n\n将鼠标指针移到“检查”按钮上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift`\
  \ 文件底部最后一个花括号上。松开 Control 键和鼠标。会弹出一个窗口。点击“连接”弹出菜单，选择“操作”。点击“名称”文本字段，输入 `checkBoxes`。点击“类型”弹出菜单，选择\
  \ `NSButton`。Xcode 会创建一个空的 `IBAction` 方法。按如下方式修改这个复选框的 `IBAction` 方法：\n\n```\n@IBAction\
  \ func checkBoxes(sender: NSButton) {\n    let nextLine = \"\\r\\n\"\n    var message\
  \ : String = \"\"\n    if dogBox.state == 1 {\n        message = \"Dog check box\
  \ selected\" + nextLine\n    } else {\n        message = \"Dog check box NOT selected\"\
  \ + nextLine\n    }\n    if catBox.state == 1 {\n        message = message + \"\
  Cat check box selected\" + nextLine\n    } else {\n        message = message + \"\
  Cat check box NOT selected\" + nextLine\n    }\n    if birdBox.state == 1 {\n  \
  \      message = message + \"Bird check box selected\" + nextLine\n    } else {\n\
  \        message = message + \"Bird check box NOT selected\" + nextLine\n    }\n\
  \    messageBox.stringValue = message\n}\n```\n\n这段代码创建了一个常量，表示回车符 `\\r` 和换行符 `\\\
  n`。它声明了一个可以存储 `String` 数据类型的 `message` 变量，初始值为 `\"\"`，即空字符串。多个 `if-else` 语句检查每个复选框的\
  \ `State` 属性，以确定它是选中状态（`state = 1`）还是未选中状态（`state = 0`）。然后将结果显示在由名为 `messageBox`\
  \ 的 `IBOutlet` 变量表示的文本视图中。\n\n选择 “产品” ➤ “运行”。用户界面会显示出来。点击不同的复选框。注意，每次选中或取消选中复选框时，都会显示标题或替代文本。点击“检查”按钮。文本视图会标识出您选中了哪些复选框，以及哪些是未选中的。选择\
  \ “CheckProgram” ➤ “退出 CheckProgram”。\n\n\n\n## 使用单选按钮\n\n与允许用户选择多个选项的复选框不同，单选按钮会显示多个选项，但一次只允许用户选择一项。当用户选择另一个单选按钮时，当前选中的单选按钮会自动取消选中。\n\
  \n在 Cocoa 框架中，单选按钮由 `NSMatrix` 类定义。这意味着当你创建一组单选按钮时，需要通过定义行数和列数来确定所需的数量，如图 16-3 所示。\n\
  \n![A978-1-4842-1233-2_16_Fig3_HTML.jpg](img/A978-1-4842-1233-2_16_Fig3_HTML.jpg)\n\
  \n图 16-3.\n\n单选组（Radio Group）的“显示属性检查器”（Show Attributes Inspector）面板允许你定义显示单选按钮的行数和列数。\n\
  \n要添加或移除单选按钮，只需调整“显示属性检查器”面板中“矩阵”（Matrix）类别下的行数和列数即可。如果需要创建奇数个单选按钮，选择你不想要的单选按钮，并选中其“透明”（Transparent）属性，如图\
  \ 16-4 所示。\n\n![A978-1-4842-1233-2_16_Fig4_HTML.jpg](img/A978-1-4842-1233-2_16_Fig4_HTML.jpg)\n\
  \n图 16-4.\n\n“透明”属性允许你隐藏组中的某个单选按钮。\n\n要确定用户选择了哪个单选按钮，你需要单独更改每个单选按钮的“标签”（Tag）属性。然后，你可以使用\
  \ `selectedTag()` 方法来获取选中的单选按钮。\n\n要了解如何使用单选按钮，请按照以下步骤操作：\n\n1.  在“显示属性检查器”面板的“按钮单元”（Button\
  \ Cell）类别下，选中“透明”复选框（见图 16-4）。你选择的单选按钮会消失。\n2.  点击左上角的顶部单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为\
  \ 0。\n3.  点击左列的中间单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为 1。\n4.  点击左列的底部单选按钮，并确保其“显示属性检查器”面板中的“标签”属性设置为\
