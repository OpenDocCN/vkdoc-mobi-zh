  26. 选择“DateProgram” ➤ “退出 DateProgram”。\n\n## 使用滑块\n\n滑块可以垂直或水平显示。滑块通过视觉方式表示一个值范围，用户可以通过前后（或上下）拖动滑块来选择其中某个值。一端代表最小值（左侧或底部），另一端代表最大值（右侧或顶部）。为了帮助用户理解滑块代表的不同值，你也可以选择显示刻度线，如图\
