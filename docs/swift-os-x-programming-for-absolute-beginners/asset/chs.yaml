  \ ➤ Quit StoryProgram。\n\n## 在场景间传递数据\n\n当你在一个场景中做出更改，然后打开另一个场景时，你可能希望第二个场景能知道你在前一个场景中所做的更改。为此，你需要执行以下操作：\n\
