  \ 点击**查询**按钮。请注意，现在字典只包含两个条目：键 1 和 2，以及值 “Joe” 和 “Cindy”，如图 9-9 所示。\n\n![A978-1-4842-1233-2_9_Fig9_HTML.jpg](img/A978-1-4842-1233-2_9_Fig9_HTML.jpg)\n\
  \n**图 9-9.** 删除一个键值对后显示的结果\n\n- 点击**添加**按钮右侧的**键**文本字段，并键入 5。\n- 点击**添加**按钮右侧的**值**文本字段，并键入\
  \ Felicia。\n- 点击**添加**按钮。\n- 点击**查询**按钮。请注意，计数现在又回到了 3；键是 1、2 和 5；值是 “Joe”、“Cindy”\
  \ 和 “Felicia”。\n- 选择 **DictionaryProgram** ➤ **退出 DictionaryProgram**。\n\n## 总结\n\
  \n数组和字典是将相关数据列表存储在一个变量中的两种方式。数组可以轻松存储数据，但检索数据可能比较麻烦，因为必须知道要检索数据的精确索引值。\n\n字典强制你使用键来存储数据，但这个键使得以后无需知道数据在字典中存储的具体位置也能轻松检索到它。\n\
  \n在你创建的示例 OS X 程序中，你还学习了 for-in 循环如何自动遍历字典。到现在，你应该已经更加熟悉如何创建用户界面，并了解哪些项需要 `IBOutlet`，哪些项需要\
  \ `IBAction` 方法。\n\n程序设计可以分为三个不同的步骤。首先，创建用户界面并进行自定义。其次，将用户界面连接到你的 Swift 文件。第三，编写\
  \ Swift 代码使你的 `IBAction` 方法生效。\n\n可以将数组和字典视为超级变量，它们可以在一个变量名下存储多个数据。如果只需要保存单个值，那么请使用变量。如果需要存储相关数据的列表，请使用数组或字典。\n\
  \n\n\n"
- "# 10. 元组、集合与结构体\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​10](http://dx.doi.org/10.1007/978-1-4842-1233-2_10))\
  \ 包含补充材料，仅供授权用户使用。\n\n变量适合存储单个数据块，而数组和字典则适合存储同一数据类型的列表。为了提供更大的灵活性，Swift 还提供了另外两种数据结构，称为**元组**和**集合**。\n\
  \n元组允许你将相关数据（可能包含不同的数据类型，例如表示人名的字符串和表示员工 ID 的整数）存储在一个地方。集合与数组或字典类似，允许你存储两个或更多由相同数据类型（例如字符串或整数）组成的数据块。\n\
  \n为了将相关数据组合在一起，Swift 还提供了结构体。通过结构体，你可以自由定义要组合在一起的数据类型，例如两个字符串和一个浮点值。结构体是将不同数据类型组合在一起的一种方式。\n\
  \n元组和结构体最大的优势或许在于将它们与其他数据结构结合使用时。与其创建一个整数数组，不如创建一个元组数组或结构体数组。这为你提供了灵活性，既可以将不同的数据类型存储在一起，也可以存储相似数据的多个副本。\n\
  \n## 使用元组\n\n假设你想要存储某人的姓名和年龄。你可以创建两个独立的变量，如下所示：\n\n```\nvar name : String\nvar age\
  \ : Int\nname = \"Janice Parker\"\nage = 47\n```\n\n创建两个或多个独立的变量来存储相关数据可能会很麻烦，因为这两个变量之间没有任何联系来表明它们的关系。为了解决这个问题，Swift\
  \ 提供了一种独特的数据结构，称为**元组**。\n\n元组可以将两个或多个数据块存储在一个变量中，这些单独的数据块甚至可以完全不同，例如字符串和整数。声明元组就像声明变量一样。主要区别在于，你无需定义单一数据类型，而是可以在括号内定义多种数据类型，如下所示：\n\
  \n`var tupleName : (DataType1, DataType2)`\n\n就像声明变量一样，你必须为元组声明一个唯一的名称。然后，你需要定义要容纳多少个不同的数据块以及它们的数据类型。元组可以容纳两个或更多数据块，但元组容纳的数据越多，理解和检索数据就可能越笨拙。\n\
  \n创建元组的一种方法是声明元组名称及其可以容纳的数据类型。所列出的数据类型数量也定义了该元组可以存储的数据块数量。因此，如果你想在元组中存储一个字符串和一个整数，可以使用以下\
  \ Swift 代码：\n\n`var person : (String, Int)`\n\n然后，你可以像这样将数据存储到该元组中：\n\n`person =\
  \ (\"Janice Parker\", 47)`\n\n向元组赋值时，请确保数据块既具有正确的数据类型，又有正确的数量。因此，下面的代码会失败，因为 `person`\
  \ 元组期望先是一个字符串，然后是一个整数，而不是先整数后字符串：\n\n`person = (47, \"Janice Parker\") // 这将会失败`\n\
  \n定义元组的第二种方法是简单地为其提供数据，并让 Swift 推断数据类型，例如：\n\n`var person = (\"Janice Parker\",\
  \ 47)`\n\n如果你通过列出其数据类型来定义元组，或者让 Swift 根据你存储的数据类型来推断数据类型，那么每个数据块代表什么并不总是很清楚。为了更容易识别不同的数据块，Swift\
  \ 还允许你命名你的数据类型，例如：\n\n`var person : (name: String, age: Int)`\n\n或者，如果你想通过直接将数据赋给元组来让\
  \ Swift 推断数据类型：\n\n`var person = (name: \"Janice Parker\", age: 47)`\n\n命名元组有助于阐明每个数据块代表什么。在这种情况下，字符串代表姓名，整数代表年龄。\n\
  \n\n\n### 访问元组中的数据\n\n创建元组并将数据存入其中后，你最终需要检索这些数据。由于元组包含两个或更多数据块，Swift 提供了三种方法来检索你需要的数据。\n\
  \n首先，你可以像下面这样创建多个变量来访问元组数据：\n\n```\nvar petInfo = (\"Rover\", 38, true)\nvar (dog,\
  \ number, yesValue) = petInfo\nprint (dog)\nprint (number)\nprint (yesValue)\n```\n\
  \n在第一行代码中，`petInfo` 是一个包含三个数据块的元组：一个字符串 (`\"Rover\"`)、一个整数 (`38`) 和一个布尔值 (`true`)。\n\
  \n第二行代码创建了三个变量 (`dog`、`number`、`yesValue`)，并将它们的值赋给 `petInfo` 元组中存储的对应数据。这意味着 `dog`\
  \ 存储 `\"Rover\"`，`number` 存储 `38`，`yesValue` 存储 `true`。`print` 命令只是将这些数据打印出来，以验证它已从元组中检索到信息。\n\
  \n要从元组中访问数据，你必须知道元组存储数据的顺序。所以如果你想从 `petInfo` 元组中检索一个字符串，你必须知道 `petInfo` 元组将名称存储为第一个数据块，将数字存储为第二个数据块，将布尔值存储为第三个数据块。\n\
  \n如果你不想检索元组中存储的所有值，你可以只创建一个变量来存储你想要的数据，并使用下划线字符 (`_`) 作为空占位符，来表示元组中你希望忽略的每个额外值。\n\
  \n这意味着你仍然需要知道元组包含的数据块数量，这样才能识别出你想要检索的那个数据块。例如，如果一个元组包含三个元素，你可以像这样检索第一个元素：\n\n```\n\
  var petInfo = (\"Rover\", 38, true)\nvar (pet,_,_) = petInfo\nprint (pet)\n```\n\
  \n这会将 `\"Rover\"` 存储在 `pet` 变量中，因此 `print` 命令会打印 `\"Rover\"`。\n\n如果你只想检索中间的值，可以输入以下代码：\n\
  \n```\nvar petInfo = (\"Rover\", 38, true)\nvar (_,aValue,_) = petInfo\nprint (aValue)\n\
  ```\n\n这会将数字 `38` 存储到 `aValue` 变量中，然后 `print` 命令会打印 `38`。\n\n下划线字符充当占位符，用于标识元组中你希望忽略的数据。如果省略下划线字符，Swift\
  \ 将不知道你想从元组中提取哪一个特定数据。要从元组中检索数据，你必须知道元组存储的项的数量和顺序。\n\n从元组中检索值的第二种方法是使用索引编号，其中第一个元素被分配索引编号\
  \ `0`，第二个元素被分配索引编号 `1`，依此类推。例如，你可以像这样将数据存储在一个元组中：\n\n```\nvar petInfo = (\"Rover\"\
  , 38, true)\nprint (petInfo.0)\nprint (petInfo.1)\nprint (petInfo.2)\n```\n\n元组中的第一个项被分配索引编号\
  \ `0`，因此元组名称（例如 `petInfo`）后跟索引编号的组合让你可以直接检索特定的元组值。所以 `petInfo.0` 检索 `\"Rover\"`，`petInfo.1`\
  \ 检索 `38`，`petInfo.2` 检索 `true`。\n\n访问元组中数据的第三种方法涉及使用名称。要使用这种方法，你必须首先为每个元组数据分配名称。例如，以下\
  \ Swift 代码定义了两个名为 `\"name\"` 和 `\"age\"` 的名称：\n\n```\nvar tupleName = (name: \"\
  Bridget\", age: 31)\n```\n\n现在，你可以通过引用元组名称后跟每个数据的标识名称来访问元组数据，如下所示：\n\n```\nprint\
  \ (tupleName.name)  // 打印 \"Bridget\"\nprint (tupleName.age)   // 打印 31\n```\n\n\
  这三种方法为你提供了访问存储在元组中数据的不同方式，因此只需使用你最喜欢的方法即可。为了清晰起见，命名元组的特定元素会使你的代码更易于理解，但代价是强制你命名元组数据。索引编号方法和多变量方法可能更简单，但可能不够清晰，并且需要你知道要检索的数据的确切顺序。\n\
  \n要了解如何使用元组，请按照以下步骤创建一个新的 playground：\n\n启动 Xcode。选择“文件”➤“新建”➤“Playground”。（如果你看到\
  \ Xcode 欢迎屏幕，你也可以点击“开始使用 Playground”。）Xcode 会要求输入 playground 名称和平台。在“名称”文本字段中单击并输入\
  \ `TuplePlayground`。单击“平台”弹出菜单并选择 OS X。Xcode 会询问你想要将 playground 文件保存在哪里。单击你想要保存\
  \ playground 文件的文件夹，然后点击“创建”按钮。Xcode 会显示 playground 文件。按如下方式编辑代码：\n\n```\nimport\
  \ Cocoa\nvar tupleName = (greeting: \"Happy Birthday\", age: 58, happy: true)\n\
  // 方法 #1\nvar (message, howOld, mood) = tupleName\nprint (message)\nprint (howOld)\n\
  print (mood)\nvar (_,stuff,_) = tupleName\nprint (stuff)\n// 方法 #2\nprint (tupleName.0)\n\
  print (tupleName.1)\nprint (tupleName.2)\n// 方法 #3\nprint (tupleName.greeting)\n\
  print (tupleName.age)\nprint (tupleName.happy)\n```\n\n当你尝试从元组中访问值的所有三种方法时，你会看到它们的工作原理是相似的。元组使得将相关数据组合到单个变量中变得容易，这样你就可以轻松地组织相关信息。然后，你可以选择使用三种不同方法之一从元组中检索数据，如图\
  \ 10-1 所示。\n\n![A978-1-4842-1233-2_10_Fig1_HTML.jpg](img/A978-1-4842-1233-2_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 从元组检索数据的三种不同方式\n\n## 使用集合\n\n数组和字典旨在存储相同数据类型的列表，例如字符串列表或整数列表。数组和字典之间的区别在于你如何检索数据。数组强制你使用索引值按位置检索数据。字典允许你使用键来检索数据，但你必须为你存储的每个数据块定义一个唯一的键。\n\
  \n集合代表了另一种存储相同数据类型列表的方式，例如字符串或浮点数。集合的一个速度优势是判断某物是否被存储。如果你将数据存储在数组中，你必须彻底搜索整个数组来确定数组是否存储了特定项。如果你将数据存储在字典中，你必须知道与该值一起存储的键，或者你必须彻底搜索字典的值列表。\n\
  \n集合让你能够比数组或字典快得多地快速确定以下内容：\n\n- 一个项是否存储在集合中\n- 一个集合是否包含与另一个集合完全相同的项\n- 一个集合是否是另一个集合的子集（包含与更大集合相同的项）\n\
  - 一个集合是否是另一个集合的超集（包含与更小集合相同的项以及更多项）\n- 两个集合是否包含相同的项\n\n集合使得比较两组不同的数据变得容易，而数组和字典无法如此轻松地做到这一点。\n\
  \n### 创建集合\n\n要创建一个集合，你可以像这样定义集合的名称以及集合可以保存的数据类型：\n\n```\nvar setName = Set<DataType>()\n\
  ```\n\n集合名称最好能描述其内容，例如 `memberSet`。数据类型可以是 `Int`（整数）、`String`（字符串）、`Float` 或 `Double`（小数），甚至是另一个数据结构的名称。\n\
  \n创建集合的第二种方法是在方括号内定义其内容，并让 Swift 推断数据类型。所有数据必须是相同的数据类型，例如：\n\n```\nvar setName =\
  \ Set([Data1, Data2, Data2 ... DataN])\n```\n\n注意，如果你省略了 `Set` 关键字和周围的括号，你将定义一个数组，而不是集合，如下所示：\n\
  \n```\nvar thisIsAnArray = [Data1, Data2, Data2 ... DataN]\n```\n\n\n\n### 向集合中添加和移除元素\n\
  \n使用集合，你可以随时添加新元素，只要新元素与现有元素的数据类型相同。要向集合中添加一个元素，只需指定集合名称、`insert` 命令以及要添加的数据，并用括号括起来，如下所示：\n\
  \n`setName.insert(data)`\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号内。确保添加的数据具有正确的数据类型。因此，如果你想向当前仅包含整数的集合中添加数据，你只能向该集合中添加另一个整数。\n\
  \n如果你尝试添加集合中已存在的数据，则不会发生任何变化。这意味着如果一个集合包含数字 53，你就无法向该集合中添加另一个 53 的副本。\n\n要从集合中移除数据，只需指定集合名称、`remove`\
  \ 命令以及要移除的数据，并用括号括起来，如下所示：\n\n`setName.remove(data)`\n\n如果你尝试移除集合中不存在的数据，那么 `remove`\
  \ 命令会返回一个 `nil` 值。但是，如果 `remove` 命令成功地从集合中移除了数据，它会返回一个可选变量。因此，如果你从集合中移除数据并将其存储在一个变量中，如下所示：\n\
  \n`var variableName = setName.remove(data)`\n\n可以通过使用感叹号来访问存储在该变量中的值，如下所示：\n\n`print\
  \ (variableName!)`\n\n如果你想移除集合中的所有元素，指定集合名称和 `removeAll` 命令，如下所示：\n\n`setName.removeAll()`\n\
  \n要了解如何创建集合以及如何向其中添加和移除数据，请按照以下步骤创建一个新的 Playground：\n\n1. 启动 Xcode。\n2. 选择 **文件\
  \ ➤ 新建 ➤ Playground**。（如果你看到了 Xcode 的欢迎界面，也可以点击 **开始使用 Playground**。）Xcode 会要求你输入\
  \ Playground 名称和平台。\n3. 点击 **名称** 文本字段并输入 `SetPlayground`。\n4. 点击 **平台** 弹出菜单并选择\
  \ **OS X**。Xcode 会询问你希望将 Playground 文件保存在哪里。\n5. 点击你想保存 Playground 文件的文件夹，然后点击 **创建**\
  \ 按钮。Xcode 会显示 Playground 文件。\n6. 按如下方式编辑代码：\n\n```swift\nimport Cocoa\nvar setOne\
  \ = Set([2, 45, -9, 8, -34])\nvar setTwo = Set<Int>()\nsetTwo = [34, 90, -83]\n\
  setOne.insert(65)\nsetTwo.insert(-381)\nvar temp = setOne.remove(45)\nprint (temp)\n\
  print (temp!)\nsetOne.removeAll()\n```\n\n这段 Swift 代码通过直接存储数据并让 Swift 推断数据类型（即整数）来创建一个名为\
  \ `setOne` 的集合。然后，它创建了第二个名为 `setTwo` 的集合，定义为仅存储整数（`Int`）。\n\n创建 `setTwo` 之后，下一行代码在该集合中存储了三个整数。两个\
  \ `insert` 命令分别向 `setOne` 和 `setTwo` 中存储了不同的整数。当代码从 `setOne` 中移除数字 45 时，它将 45 作为一个可选变量存储在\
  \ `temp` 变量中。要访问实际值，你必须使用感叹号（`!`）来解包可选变量。\n\n最后，`removeAll` 命令清空了 `setOne`，使其不包含任何内容，如图\
  \ 10-2 所示。\n\n![A978-1-4842-1233-2_10_Fig2_HTML.jpg](img/A978-1-4842-1233-2_10_Fig2_HTML.jpg)\n\
  \n**图 10-2.** 创建集合、向集合中插入数据以及从集合中移除数据\n\n### 查询集合\n\n一旦你有了一个集合，就可以使用以下命令来获取关于该集合的信息：\n\
  \n*   `count` – 计算集合中元素的数量\n*   `isEmpty` – 检查集合是否为空（包含 0 个元素）\n*   `isSubsetOf`\
  \ – 检查一个集合是否完全包含在另一个集合中\n*   `isSupersetOf` – 检查一个集合是否包含另一个集合的所有元素\n*   `isDisjointWith`\
  \ – 检查两个集合是否没有任何共同元素\n\n无论这些命令的结果如何，它们都不会影响集合中存储的数据。\n\n`count` 命令返回一个整数值，只需使用集合名称和\
  \ `count` 命令，如下所示：\n\n`setName.count`\n\n你也可以将此值赋给一个变量，例如：\n\n`var total = setName.count`\n\
  \n如果集合中包含零个元素，`isEmpty` 命令返回布尔值 `true`。否则返回 `false`。只需在集合名称后加上 `isEmpty` 命令，如下所示：\n\
  \n`setOne.isEmpty`\n\n`isSubsetOf` 命令检查一个集合是否包含也存在于第二个集合中的元素。仅当第二个集合包含第一个集合中的每一个元素时，它才被认为是子集。\n\
  \n`isSupersetOf` 命令检查一个集合是否更大并且包含另一个较小集合的所有相同元素。仅当第一个集合更大并且其所有元素都存储在第二个集合中时，它才被认为是超集。\n\
  \n`isDisjointWith` 命令比较两个集合。如果它们没有共同元素，则此命令返回 `true`。否则返回 `false`。\n\n要了解如何查询集合，请按照以下步骤操作：\n\
  \n1. 确保 `SetPlayground` 文件已在 Xcode 中加载。\n2. 按如下方式编辑代码：\n\n```swift\nimport Cocoa\n\
  var mySet = Set([\"Fred\", \"Cindy\", \"Jody\", \"Grant\"])\nprint (mySet.isEmpty)\n\
  mySet.count\nmySet.removeAll()\nprint (mySet.isEmpty)\nvar myNewSet = Set([\"John\"\
  , \"Oscar\"])\nvar myOtherSet = Set([\"John\", \"Oscar\", \"Sally\"])\nvar myThirdSet\
  \ = Set([\"Rick\", \"Vinny\"])\nmyNewSet.isSubsetOf(myOtherSet)\nmyOtherSet.isSupersetOf(myNewSet)\n\
  myNewSet.isDisjointWith(myThirdSet)\n```\n\n这段代码创建了一个包含四个字符串的集合。它使用 `isEmpty` 命令检查该集合是否为空（`false`）。然后，它统计了该集合中的元素数量（共\
  \ 4 个）。最后，它移除了该集合中的所有元素，并再次使用 `isEmpty` 命令检查该集合是否为空（`true`）。\n\n接下来的一组代码创建了三个不同的集合，分别命名为\
  \ `myNewSet`、`myOtherSet` 和 `myThirdSet`，其中填充了不同的名字。然后，`isSubsetOf` 命令检查 `myNewSet`\
  \ [“John”, “Oscar”] 中的所有元素是否也存在于 `myOtherSet` [“John”, “Oscar”, “Sally”] 中，结果为 `true`。\n\
  \n`isSupersetOf` 命令检查 `myOtherSet` [“John”, “Oscar”, “Sally”] 是否包含更多元素，并且是否也包含 `myNewSet`\
  \ [“John”, “Oscar”] 中存储的所有元素，结果同样为 `true`。\n\n最后，`isDisjointWith` 命令检查 `myNewSet`\
  \ [“John”, “Oscar”] 与 `myThirdSet` [“Rick”, “Vinny”] 是否没有共同元素，结果也为 `true`，如图 10-3\
  \ 所示。\n\n![A978-1-4842-1233-2_10_Fig3_HTML.jpg](img/A978-1-4842-1233-2_10_Fig3_HTML.jpg)\n\
  \n**图 10-3.** 查询集合\n\n\n\n### 操作集合\n\n当你拥有两个或多个集合时，可以对它们执行操作以创建第三个集合。一些常见的集合操作包括：\n\
  \n- `union` – 将两个集合中的所有项目合并到一个新集合中\n- `subtract` – 从第一个集合中移除第二个集合的项目，以形成新集合\n- `intersect`\
  \ – 找出两个集合中共同的项目，并将它们存储在新集合中\n- `exclusiveOr` – 找出仅存在于其中一个集合（而非两者）中的项目\n\n可以把 `union`\
  \ 命令想象成将两个集合相加，而 `subtract` 命令则像从一个集合中减去另一个集合。`union` 命令指定两个集合名称的方式如下：\n\n`firstSet.union(secondSet)`\n\
  \n可以将其视为等价于 `firstSet + secondSet`，即两个集合中的所有项目都会合并到第三个集合中。\n\n`subtract` 命令也会指定两个集合名称，但顺序会产生影响，例如：\n\
  \n`thirdSet.subtract(firstSet)`\n\n`firstSet.subtract(thirdSet)`\n\n根据每个集合的内容，这两个命令可能会产生不同的结果。假设\
  \ `thirdSet` 包含 `{1, 2, 3, 4, 5}`，而 `firstSet` 包含 `[1, 3, 5, 7]`。`thirdSet.subtract(firstSet)`\
  \ 命令的工作方式如下：\n\n`{1, 2, 3, 4, 5} thirdSet`\n\n`[1, 3, 5, 7} firstSet`\n\n两个集合都包含\
  \ 1、3 和 5，因此这些数字会被消除。从 `thirdSet` 中移除 1、3 和 5，剩下 `{2, 4}`。\n\n`firstSet.subtract(thirdSet)`\
  \ 命令的工作方式如下：\n\n`[1, 3, 5, 7] firstSet`\n\n`{1, 2, 3, 4, 5} thirdSet`\n\n两个集合都包含\
  \ 1、3 和 5，因此这些数字会被消除。从 `firstSet` 中移除 1、3 和 5，剩下 `{7}`。\n\n`intersect` 命令找出两个集合中的共同项目。`exclusiveOr`\
  \ 命令找出不存于两个集合中的项目。可以将 `exclusiveOr` 命令视为 `intersect` 命令的反向操作。\n\n要了解这四种不同的集合操作方式如何工作，请遵循以下步骤：\n\
  \n确保 `SetPlayground` 文件已在 Xcode 中加载。按如下方式编辑代码：\n\n```\nimport Cocoa\nvar firstSet\
  \ = Set([1, 3, 5, 7])\nvar secondSet = Set([2, 4, 6, 8])\nvar thirdSet = Set ([1,\
  \ 2, 3, 4, 5])\nfirstSet.union(secondSet)\nsecondSet.subtract(firstSet)\nfirstSet.subtract(secondSet)\n\
  firstSet.subtract(thirdSet)\nthirdSet.subtract(firstSet)\nfirstSet.intersect(thirdSet)\n\
  firstSet.exclusiveOr(thirdSet)\n```\n\n注意 `subtract` 命令如何因两个集合的列出顺序不同而产生不同结果，如图\
  \ 10-4 所示。\n\n![A978-1-4842-1233-2_10_Fig4_HTML.jpg](img/A978-1-4842-1233-2_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 操作集合\n\n## 使用结构体\n\n元组和集合都是 Swift 的内置特性。而结构体是一种独特的方式，允许你将不同类型的数据组合在一个地方。使用传统的变量，你一次只能存储一块数据。而使用结构体，你可以定义两块或更多数据，并存储在单个变量中。在结构体内声明的变量被称为属性。\n\
  \n一个存储两块数据的结构体看起来像这样：\n\n```\nstruct structureName {\n    var variableName1 : dataType\n\
  \    var variableName2 : dataType\n}\n```\n\n请记住，每个变量的数据类型可以是简单数据类型，如 `Int`、`String`\
  \ 或 `Double`；也可以是更复杂的数据类型，如数组、元组、集合或字典。\n\n你可以在结构体内定义两个或更多变量，每个变量可以包含不同的数据类型，例如字符串或整数。无论结构体持有多少个属性，都必须先初始化这些属性，然后才能向其中存储数据。\n\
  \nSwift 提供了三种初始化属性的方式。首先，你可以像这样为每个属性定义一个初始值：\n\n```\nstruct structureName {\n  \
  \  var variableName1 : dataType = initialValue\n    var variableName2 : dataType\
  \ = initialValue\n}\n```\n\n为了简化属性声明，第二种方式是省略数据类型，让 Swift 推断数据类型，如下所示：\n\n```\n\
  struct structureName {\n    var variableName1 = initialValue\n    var variableName2\
  \ = initialValue\n}\n```\n\n当你为属性分配初始值后，可以像这样创建一个变量来表示该结构体：\n\n`var variableName\
  \ = structureName()`\n\n初始化结构体属性的第三种方式是创建一个 `init` 函数。这意味着你必须创建一个属性名称及其数据类型的列表。然后在创建表示该结构体的变量时，为这些属性赋值。\n\
  \n例如，假设你想存储关于一个人的信息，比如他或她的姓名、电子邮件地址和电话号码。你可以创建一个单独的结构体，而不是创建三个独立的变量，如下所示：\n\n```\n\
  struct person {\n    var name : String\n    var email : String\n    var phone :\
  \ String\n}\n```\n\n当你基于这个结构体创建变量时，需要包含初始值，例如：\n\n`var workers = person(name: \"\
  Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")`\n\n创建结构体包含两个部分：\n\n-   创建一个包含两个或更多变量（属性）的结构体\n\
  -   创建一个表示该结构体的变量，并为这些属性分配初始值\n\n### 从结构体中存储和检索项目\n\n结构体让你定义要存储的相关数据类型。然后你需要创建一个变量名来表示该结构体。最后，要向结构体中存储数据，你需要用点号分隔指定结构体变量名和属性名，如下所示：\n\
  \n`structureVariable.variableName = value`\n\n要从结构体中检索数据，你可以将变量赋值给结构体的某个变量，如下所示：\n\
  \n`var variableName = structureVariable.variableName`\n\n要了解如何创建结构体、初始化其属性以及添加和检索数据，请按照以下步骤创建一个新的\
  \ playground：\n\n启动 Xcode。选择 **File** ➤ **New** ➤ **Playground**。（如果你看到 Xcode 欢迎屏幕，也可以点击\
  \ **Get started with a playground**。）Xcode 会询问 playground 名称和平台。在 **Name** 文本字段中点击并输入\
  \ `StructurePlayground`。点击 **Platform** 弹出菜单并选择 **OS X**。Xcode 会询问你想将 playground\
  \ 文件保存到哪里。点击一个文件夹以保存 playground 文件，然后点击 **Create** 按钮。Xcode 会显示 playground 文件。按如下方式编辑代码：\n\
  \n```\nimport Cocoa\nstruct pet {\n    var name : String = \"\"\n    var age : Int\
  \ = 0\n}\nvar dog = pet()\ndog.name = \"Fido\"\ndog.age = 4\nprint (dog.name)\n\
  print (dog.age)\nstruct person {\n    var name : String\n    var email : String\n\
  \    var phone : String\n}\nvar workers = person(name: \"Sue\", email: \"sdk@aol.com\"\
  , phone: \"555-1234\")\nlet boss = workers.name\nprint (boss)\nworkers.name = \"\
  Bo\"\nprint (workers.email)\nprint (workers.phone)\n```\n\n第一个结构体为其属性定义了初始值，因此不需要\
  \ `init` 函数。这就是为什么你可以用空括号创建一个变量的原因：\n\n`var dog = pet()`\n\n第二个结构体没有为其属性定义初始值，因此当你创建一个变量来表示该结构体时，必须定义初始值。\n\
  \n`var workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
  )`\n\n要向结构体中存储数据，你需要指定表示该结构体的变量名，后跟属性名，如图 10-5 所示。\n\n![A978-1-4842-1233-2_10_Fig5_HTML.jpg](img/A978-1-4842-1233-2_10_Fig5_HTML.jpg)\n\
  \n图 10-5. 创建结构体并检索数据\n\n\n\n## 在 OS X 程序中使用结构体\n\n单独使用结构体只能保存有限的数据。为了更灵活，结构体通常会与数组等其他数据结构结合使用。这样你就可以创建一个结构体数组，本示例程序中将用到这一功能。该程序允许你输入多个姓名、地址和电话号码，并且也可以删除数据。\n\
  \n在 Xcode 中，选择 **文件** ➤ **新建** ➤ **项目**。在 **OS X** 类别下点击 **应用**。点击 **Cocoa 应用**，然后点击\
  \ **下一步** 按钮。Xcode 会要求你输入产品名称。在 **产品名称** 文本框中点击并输入 `StructureProgram`。确保 **语言**\
  \ 弹出菜单显示为 `Swift`，并且没有勾选任何复选框。点击 **下一步** 按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存放你的项目，然后点击\
  \ **创建** 按钮。在 **项目导航器** 中点击 `MainMenu.xib` 文件。点击 `StructureProgram` 图标，使用户界面窗口显示出来。选择\
  \ **视图** ➤ **工具** ➤ **显示对象库**，让 **对象库** 显示在 Xcode 窗口的右下角。将两个 **按钮**、四个 **标签** 和四个\
  \ **文本字段** 拖拽到用户界面上，并双击按钮和标签，修改它们上面显示的文本，使其看起来与图 10-6 类似。\n\n![A978-1-4842-1233-2_10_Fig6_HTML.jpg](img/A978-1-4842-1233-2_10_Fig6_HTML.jpg)\n\
  \n**图 10-6.** `StructureProgram` 的用户界面\n\n在相应的文本字段中输入姓名、地址和电话号码后，**添加** 按钮会将这些信息存储到一个结构体中，然后再将该结构体存储到一个数组中。每次添加新的姓名、地址和电话号码时，你都会向数组中添加一个新的结构体，同时\
  \ **总姓名数** 文本字段会持续显示数组中存储的结构体总数。\n\n**查看** 按钮会移除数组中的最后一个项目，并在一个警告对话框中显示其内容，以便你可以验证内容。然后它会显示数组中结构体的新总数。\n\
  \n每个文本字段都需要一个单独的 `IBOutlet`，每个按钮都需要一个单独的 `IBAction` 方法，你需要通过按住 Control 键将每个项目从用户界面拖拽到你的\
  \ `AppDelegate.swift` 文件中来创建它们：\n\n在 Xcode 窗口中用户界面仍然可见的情况下，选择 **视图** ➤ **辅助编辑器**\
  \ ➤ **显示辅助编辑器**。`AppDelegate.swift` 文件会出现在用户界面的旁边。将鼠标移动到 **添加** 按钮上，按住 **Control**\
  \ 键，拖拽到 `AppDelegate.swift` 文件底部最后一个大括号的上方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **连接**\
  \ 弹出菜单中点击，选择 **动作**。在 **名称** 文本框中点击并输入 `addData`。在 **类型** 弹出菜单中点击，选择 `NSButton`。然后点击\
  \ **连接** 按钮。将鼠标移动到 **查看** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个大括号的上方。松开鼠标和\
  \ **Control** 键。会弹出一个窗口。在 **连接** 弹出菜单中点击，选择 **动作**。在 **名称** 文本框中点击并输入 `viewButton`。在\
  \ **类型** 弹出菜单中点击，选择 `NSButton`。然后点击 **连接** 按钮。`AppDelegate.swift` 文件的底部应该类似这样：\n\
  ```\n@IBAction func viewData(sender: NSButton) {\n}\n@IBAction func addData(sender:\
  \ NSButton) {\n}\n```\n将鼠标移动到出现在 **添加** 按钮右侧的 **姓名** 文本字段上，按住 **Control** 键，拖拽到\
  \ `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称**\
  \ 文本框中点击并输入 `nameField`，然后点击 **连接** 按钮。将鼠标移动到出现在 **添加** 按钮右侧的 **地址** 文本字段上，按住 **Control**\
  \ 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在 **名称**\
  \ 文本框中点击并输入 `addressField`，然后点击 **连接** 按钮。将鼠标移动到出现在 **删除** 按钮右侧的 **电话** 文本字段上，按住\
  \ **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在\
  \ **名称** 文本框中点击并输入 `phoneField`，然后点击 **连接** 按钮。将鼠标移动到出现在 **查询** 按钮右侧的 **总姓名数** 文本字段上，按住\
  \ **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。松开鼠标和 **Control** 键。会弹出一个窗口。在\
  \ **名称** 文本框中点击并输入 `totalField`，然后点击 **连接** 按钮。现在你应该有了以下代表用户界面上所有文本字段的 `IBOutlet`：\n\
  ```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var nameField: NSTextField!\n\
  @IBOutlet weak var addressField: NSTextField!\n@IBOutlet weak var phoneField: NSTextField!\n\
  @IBOutlet weak var totalField: NSTextField!\n```\n至此，我们已经将用户界面连接到了我们的 Swift 代码，这样我们就可以使用\
  \ `IBOutlet` 来检索和显示用户界面上的数据。我们还创建了 `IBAction` 方法，以便用户界面上的按钮能让程序真正运行起来。现在我们只需要编写\
  \ Swift 代码来创建一个初始字典，然后在每个 `IBAction` 方法中编写更多的 Swift 代码来添加、删除或查询该字典。\n\n\n\n### Swift\
  \ 中的结构体、数组与字典操作\n\n在 `AppDelegate.swift` 文件的 `IBOutlet` 列表下方，输入以下代码来创建一个可以存储三个字符串（姓名、地址和电话号码）的结构体、一个表示该结构体的变量以及一个结构体数组：\n\
  \n```swift\nstruct person {\n    var name = \"\"\n    var address = \"\"\n    var\
  \ phone = \"\"\n}\nvar employee = person()\nvar arrayOfStructures = [person]()\n\
  ```\n\n修改 `addData` IBAction 方法，使其从姓名、地址和电话文本字段中获取值，并将它们存储到 `employee` 结构体中。然后将该结构体存储到数组中，在“总人数”文本字段中显示数组中的项目总数，并清空姓名、地址和电话文本字段：\n\
  \n```swift\n@IBAction func addData(sender: NSButton) {\n    employee.name = nameField.stringValue\n\
  \    employee.address = addressField.stringValue\n    employee.phone = phoneField.stringValue\n\
  \    arrayOfStructures.append(employee)\n    totalField.integerValue = arrayOfStructures.count\n\
  \    nameField.stringValue = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue\
  \ = \"\"\n}\n```\n\n修改 `viewData` IBAction 方法，使其从键文本字段中获取值，并从字典中删除关联的值，如下所示：\n\n\
  ```swift\n@IBAction func viewData(sender: NSButton) {\n    var myAlert = NSAlert()\n\
  \    if arrayOfStructures.isEmpty {\n        myAlert.messageText = \"Array is empty\"\
  \n        myAlert.runModal()\n    } else {\n        var personData = person()\n\
  \        personData = (arrayOfStructures.removeLast())\n        totalField.integerValue\
  \ = arrayOfStructures.count\n        myAlert.messageText = personData.name + \"\\\
  r\\n\" + personData.address + \"\\r\\n\" + personData.phone\n        myAlert.runModal()\n\
  \    }\n}\n```\n\n`viewData` IBAction 方法中的代码创建了一个警报对话框。然后检查数组是否为空。如果为空，则在警报对话框中显示“Array\
  \ is empty”。\n\n如果数组不为空，则移除数组中最后一个结构体，在“总人数”文本字段中显示新的数组项目总数，并在警报对话框中显示被移除的结构体数据。\n\
  \n`AppDelegate.swift` 文件的完整内容应如下所示：\n\n```swift\nimport Cocoa\n\n@NSApplicationMain\n\
  class AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var nameField: NSTextField!\n    @IBOutlet weak\
  \ var addressField: NSTextField!\n    @IBOutlet weak var phoneField: NSTextField!\n\
  \    @IBOutlet weak var totalField: NSTextField!\n\n    struct person {\n      \
  \  var name = \"\"\n        var address = \"\"\n        var phone = \"\"\n    }\n\
  \n    var employee = person()\n    var arrayOfStructures = [person]()\n\n    func\
  \ applicationDidFinishLaunching(aNotification: NSNotification) {\n        // Insert\
  \ code here to initialize your application\n    }\n\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n        // Insert code here to tear down your application\n\
  \    }\n\n    @IBAction func viewData(sender: NSButton) {\n        var myAlert =\
  \ NSAlert()\n        if arrayOfStructures.isEmpty {\n            myAlert.messageText\
  \ = \"Array is empty\"\n            myAlert.runModal()\n        } else {\n     \
  \       var personData = person()\n            personData = (arrayOfStructures.removeLast())\n\
  \            totalField.integerValue = arrayOfStructures.count\n            myAlert.messageText\
  \ = personData.name + \"\\r\\n\" + personData.address + \"\\r\\n\" + personData.phone\n\
  \            myAlert.runModal()\n        }\n    }\n\n    @IBAction func addData(sender:\
  \ NSButton) {\n        employee.name = nameField.stringValue\n        employee.address\
  \ = addressField.stringValue\n        employee.phone = phoneField.stringValue\n\
  \        arrayOfStructures.append(employee)\n        totalField.integerValue = arrayOfStructures.count\n\
  \        nameField.stringValue = \"\"\n        addressField.stringValue = \"\"\n\
  \        phoneField.stringValue = \"\"\n    }\n}\n```\n\n要了解此程序的工作原理，请按照以下步骤操作：\n\
  \n1. 选择 **Product** ➤ **Run**。Xcode 运行您的 `DictionaryProgram` 项目。\n2. 点击“姓名”文本字段并输入\
  \ `Bob`。\n3. 点击“地址”文本字段并输入 `123 Main`。\n4. 点击“电话”文本字段并输入 `555-1234`。\n5. 点击“添加”按钮。程序在“总人数”文本字段中显示数组中的项目数\
  \ (1)。\n6. 重复步骤 2-5，但输入姓名 `Jane`、地址 `90 Oak Lane` 和电话号码 `555-9874`。 “总人数”文本字段中显示数字\
  \ 2。\n7. 点击“查看”按钮。出现一个警报对话框，显示 `Jane`、`90 Oak Lane` 和 `555-9874`，如图 10-7 所示。\n\n\
  ![A978-1-4842-1233-2_10_Fig7_HTML.jpg](img/A978-1-4842-1233-2_10_Fig7_HTML.jpg)\n\
  \n**图 10-7.** 显示添加到数组中的最后一个结构体的警报对话框\n\n8. 点击“确定”关闭警报对话框。\n9. 选择 **StructureProgram**\
  \ ➤ **Quit StructureProgram**。\n\n## 总结\n\n元组是一种在单个变量中存储不同数据类型的方式。与数组和字典类似，集合可以存储相同数据类型的列表。数组最适合存储有序信息，字典最适合快速检索数据，而集合最适合检查项目是否属于集合，以及便于操作两个或多个集合。\n\
  \n如果需要存储大量相关数据，可以使用元组，但元组在处理大量数据时会变得笨拙。另一种选择是创建结构体，它允许您定义要存储的不同数据类型。除了基本数据类型（`Int`、`String`、`Float`\
  \ 和 `Double`）之外，结构体还可以包含其他数据结构，例如数组、字典或集合。为了获得更大的灵活性，您甚至可以将结构体放入数组、字典或集合中。\n\n在您创建的示例\
  \ OS X 程序中，您学习了如何创建结构体并将其数据存储在数组中。到现在为止，您应该已经熟悉了如何使用 `IBOutlet` 从用户界面显示或检索数据，以及如何创建\
  \ `IBAction` 方法使程序实际运行。\n\n通过元组、集合、结构体以及数组和字典，您可以以多种方式组合数据结构，从而以最灵活的方式存储数据，满足特定需求。\n\
  \n\n\n"
- "# 11. 创建类与对象\n\n电子补充材料：本章在线版本 (doi:[10.1007/978-1-4842-1233-2_11](http://dx.doi.org/10.1007/978-1-4842-1233-2_11))\
  \ 包含补充材料，仅供授权用户使用。\n\n使用 Xcode 进行 Swift 编程的核心是面向对象编程。其主要思想是将一个大型程序划分为独立的对象，每个对象理想情况下代表一个物理实体。例如，如果你正在创建一个控制汽车的程序，一个对象可以代表汽车的发动机，第二个对象可以代表汽车的娱乐系统，第三个对象则可以代表汽车的加热与冷却系统。\n\
  \n现在，如果你想要更新程序中控制汽车发动机的部分，你只需修改或替换控制该发动机的对象即可。对象不仅帮助你更好地理解程序不同部分如何协同工作，还能隔离代码，从而让你能够构建模块，组合成更大、更复杂的程序。\n\
  \n对象帮助你以相互独立的独立构建块的方式来看待程序。在面向对象编程出现之前，程序员将程序划分为子程序，这些子程序也类似于微型构建块。子程序和对象的主要区别在于，子程序可以访问由其他子程序使用的数据。这意味着，如果你修改了一个子程序，常常会无意中影响到程序的其他部分。这使得修复错误（Bug）变得困难，同样也使修改程序变得困难。\n\
  \n而对于对象，其主要思想是创建独立、互不影响的构建块，它们协同工作，同时不干扰彼此的数据。为了保持数据的隔离，对象使用了**封装**。这意味着对象拥有自己的变量（称为**属性**）和函数（称为**方法**）。\n\
  \n对象之间可以通过两种方式通信：\n\n*   在另一个对象的属性中存储新值\n*   调用另一个对象的方法\n\n理想情况下，一个程序应由多个完全独立执行任务的对象组成。这使得通过用改进版的对象替换旧对象来修改程序变得简单。\n\
  \n## 创建类\n\n创建对象分为两步。首先，你必须创建一个类。其次，你基于该类创建一个对象。\n\n类的外观和工作方式与结构体非常相似（参见第 10 章），你需要为其定义一个名称。一旦你定义了一个类，就可以基于该类创建一个或多个对象。可以将类想象成一个决定饼干形状的模具，而对象则是你可以基于该类定义的不同类型的面团。\n\
  \n你可以定义的最简单的类如下所示：\n\n```\nclass className {\n\n}\n```\n\n要从这个类创建一个对象，你只需声明一个变量，但不要定义像\
  \ `Int` 或 `String` 这样的数据类型，而是定义类名，例如：\n\n```\nvar myObject = className()\n```\n\n\
  当然，一个不包含任何代码的类是无用的，因此你可以在类中包含的两种代码是：变量（称为属性）和用于操作数据的函数（称为方法）。在类中创建属性涉及创建一个或多个变量，并定义数据类型和初始值，例如：\n\
  \n```\nclass className {\n    var name : String = \"\"\n    var ID : Int = 0\n \
  \   var salary : Double = 0\n}\n```\n\n初始值非常重要，因为当你基于一个类创建对象时，你不希望存在未初始化的值，这些值在你试图使用时可能会导致问题。\n\
  \n要定义一个属性，你需要声明一个变量名、一个数据类型和一个初始值。由于 Swift 可以推断数据类型，你可以省略数据类型声明，仅像这样赋予初始值：\n\n```\n\
  class className {\n    var name = \"\"\n    var ID  = 0\n    var salary = 0.0\n\
  }\n```\n\n无论你是否使用数据类型定义类属性，你都可以通过创建一个变量名，将其设置为类名，并在其后加上一对空圆括号来从此类创建对象，如下所示：\n\n\
  ```\nvar myObject = className()\n```\n\n以上两种方法都会为类的属性创建相同的初始值。为了获得更大的灵活性，你可以创建一个名为\
  \ `init` 的初始化方法。这允许你每次从类创建对象时定义初始值。类中的初始化器可能如下所示：\n\n```\nclass secondClass {\n\
  \    var name : String\n    var ID : Int\n    var salary : Double\n    init (name:\
  \ String, ID: Int, salary: Double) {\n        self.name = name\n        self.ID\
  \ = ID\n        self.salary = salary\n    }\n}\n```\n\n这个初始化方法 (`init`) 定义了一个参数列表，接受三个项目：一个字符串、一个整数和一个双精度浮点数值。然后它将这些信息分别存储在\
  \ `name`、`ID` 和 `salary` 属性中。当一个类具有初始化器时，你必须通过包含与初始化器参数列表匹配的正确数量和数据类型来创建该类的对象。\n\
  \n这意味着创建一个对象时需要在圆括号中包含一个字符串、一个整数和一个双精度浮点数值，如下所示：\n\n```\nvar secondObject = secondClass\
  \ (name: \"Joe\", ID: 102, salary: 120000)\n```\n\n请注意，当你在参数列表中包含数据时，必须使用初始化器参数列表中定义的变量名来标记每个数据块。在本例中，三个参数名是\
  \ `name`、`ID` 和 `salary`，因此创建对象意味着使用这些相同的参数名来标识数据。\n\n\n\n### 访问对象中的属性\n\n要访问对象的属性，您必须指定对象名称，后跟句点和属性名称，例如：\n\
  \n`objectName.propertyName = data`\n\n您也可以将对象的属性值赋值给变量，如下所示：\n\n`var person = myObject.name`\n\
  \n要访问属性，您需要指定对象名称、句点以及要访问的属性名称，例如：\n\n`print (person.name)`\n\n**注意**  \n访问存储在属性中的值时，请确保指定的是对象名称，而不是类名称。如果您是从“className”类创建了一个“person”对象，那么您应该通过指定对象名称（`person`）和属性名称（`name`、`ID`、`salary`）来访问属性，例如\
  \ `person.name` 或 `person.ID`。您不应使用类名称来访问属性值，例如 `className.name` 或 `className.ID`。如果尝试这样做，您的代码将无法运行。\n\
  \n就像普通变量一样，对象的属性一次只能保存一块数据。当你将新数据存入属性时，它会覆盖之前的数据。\n\n要了解如何创建类以及操作对象的属性，请按照以下步骤创建一个新的\
  \ playground：\n\n1. 启动 Xcode。\n2. 选择 **文件 ➤ 新建 ➤ Playground**。（如果您看到 Xcode 欢迎屏幕，也可以点击“开始使用\
  \ playground”。）Xcode 会要求您输入 playground 名称并选择平台。\n3. 在“名称”文本框中点击并输入 `ClassPlayground`。\n\
  4. 在“平台”弹出菜单中点击并选择 **OS X**。Xcode 会询问您希望将 playground 文件保存在哪里。\n5. 点击您要保存 playground\
  \ 文件的文件夹，然后点击 **创建** 按钮。Xcode 会显示该 playground 文件。\n6. 按如下方式编辑代码：\n\n```\nimport\
  \ Cocoa\n\nclass className {\n    var name = \"\"\n    var ID  = 0\n    var salary\
  \ = 0\n}\n\nvar worker = className()\nworker.name = \"Bob\"\nworker.ID = 102\nworker.salary\
  \ = 10\n\nvar executive = className()\nexecutive.name = \"Robert\"\nexecutive.ID\
  \ = 1\nexecutive.salary = worker.salary * 100\n\nclass secondClass {\n    var name\
  \ : String\n    var ID : Int\n    var salary : Double\n    init (name: String, ID:\
  \ Int, salary: Double) {\n        self.name = name\n        self.ID = ID\n     \
  \   self.salary = salary\n    }\n}\n\nvar consultant = secondClass (name: \"Joe\"\
  , ID: 17, salary: 50000)\n```\n\n第一个类在声明属性时对其进行了初始化。然后，它基于该类（`className`）创建了一个对象（`worker`）。为了将数据存入\
  \ `worker` 对象，代码指定了对象名称（`worker`）和属性名称，并为其赋值。\n\n第二个类示例使用初始化器来定义属性值。`init` 方法按顺序接受三块数据：一个字符串、一个整数和一个十进制（`Double`）值。\n\
  \n要从这第二个类（`secondClass`）创建一个对象（`consultant`），括号内需要包含正确顺序、正确数量的数据，以及正确的数据类型，此外还需要显示一个标签来标识数据的含义，如图\
  \ 11-1 所示。\n\n![A978-1-4842-1233-2_11_Fig1_HTML.jpg](img/A978-1-4842-1233-2_11_Fig1_HTML.jpg)\n\
  \n*图 11-1. 创建类文件并访问属性*\n\n### 对象中的计算属性\n\n除了为属性定义固定值之外，您还可以使用计算属性，其中一个属性的初始值取决于另一个属性的值。创建计算属性的最简单方法是定义一个属性名称、数据类型，然后在花括号中编写计算值的代码。最后，使用\
  \ `return` 关键字定义要存储在属性中的值，如下所示：\n\n```\nclass shape {\n    var height : Int = 5\n\
  \    var width : Int {\n      return height * 2\n    }\n}\n\nvar rectangle = shape()\n\
  print (rectangle.height)\nprint (rectangle.width)\n```\n\n这个计算属性只是获取存储在 `height`\
  \ 属性中的值，将其乘以 2，然后将结果存储在 `width` 属性中。当您基于 `shape` 类创建对象时，初始值 5 会被存储在 `height` 属性中，然后计算属性将\
  \ `height` 值（5）乘以 2 得到 10，并将其存储在 `width` 属性中，如图 11-2 所示。\n\n![A978-1-4842-1233-2_11_Fig2_HTML.jpg](img/A978-1-4842-1233-2_11_Fig2_HTML.jpg)\n\
  \n*图 11-2. 使用计算属性来确定属性的初始值*\n\n在这个计算属性的例子中，一个属性（`width`）的值依赖于另一个属性（`height`）的值来确定其自身的值。用技术术语来说，这被称为\
  \ getter（获取方法）。\n\n\n\n### 设置其他属性\n\n另一种方法是使用所谓的 setter（设置器）。使用 setter 时，定义一个属性会设置另一个属性的值。由于\
  \ getter（获取器）和 setter 非常相似，它们通常会在同一个属性中使用。这样，一个属性使用 getter 从另一个属性计算其值，然后如果你用某个值设置该属性，它就可以改变另一个属性。定义\
  \ getter 和 setter 的方式如下：\n\n```\nclass blob {\n    var property1 : dataType = value\n\
  \    var property2 : dataType {\n        get {\n            return valueHere\n \
  \       }\n        set {\n            property1 = valueHere\n        }\n    }\n\
  }\n```\n\n在 getter 中，你始终需要一个 `return` 关键字来向拥有该 getter 的属性返回一个值。在 setter 中，你必须将一个属性赋值给一个值。这个值可以是一个固定值，也可以是一个返回值计算表达式。\n\
  \n**注意：** 你不需要同时拥有 getter 和 setter。你可以只拥有一个 getter，通过省略 `get` 关键字，只将代码用花括号括起来即可缩短，就像本节开头的\
  \ shape 类示例那样。你也可以只拥有一个 setter，但你需要使用 `set` 关键字。\n\n在上面的例子中，每当 `property2` 被赋一个新值时，它都会使用其\
  \ setter 为 `property1` 定义一个新值。\n\nsetter 还可以接收一个值，并使用该值为另一个属性计算出新的结果。要接收一个值给 setter，你只需要创建一个放在圆括号中的变量，然后使用该值为另一个属性计算结果。如果你没有创建放在圆括号中的变量，那么可以直接使用默认参数名\
  \ `newValue`。下面的例子展示了如何使用 setter：\n\n```\nclass blob {\n    var property1 : dataType\
  \ = value\n    var property2 : dataType {\n        get {\n            return valueHere\n\
  \        }\n        set (newValue) {\n            property1 = valueHere based on\
  \ newValue\n        }\n    }\n}\n```\n\n要了解 getter 和 setter 是如何工作的，请按照以下步骤操作：\n\n\
  确保你的 `ClassPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass shape\
  \ {\n    var height : Int = 5\n    var width : Int {\n        return height * 2\n\
  \    }\n}\n\nvar rectangle = shape()\nprint (rectangle.height)\nprint (rectangle.width)\n\
  \nrectangle.height = 20\nprint (rectangle.width)\n\nclass blob {\n    var height\
  \ : Int = 5\n    var width : Int = 10\n    var area : Int {\n        get {\n   \
  \         return height * width\n        }\n        set {\n            height =\
  \ 24\n            width = 45\n        }\n    }\n}\n\nvar cat = blob()\ncat.area\n\
  cat.area = 129\n\nclass anotherBlob {\n    var height : Int = 5\n    var width :\
  \ Int = 10\n    var area : Int {\n        get {\n            return height * width\n\
  \        }\n        set (newValue) {\n            height = newValue + 10\n     \
  \       width = newValue - 5\n        }\n    }\n}\n\nvar CEO = anotherBlob()\nprint\
  \ (CEO.area)\nCEO.area = 247\nprint (CEO.height)\nprint (CEO.width)\n```\n\n你可以把\
  \ getter 和 setter 看作是会改变其他属性的函数。不过，在使用 getter 和 setter 时要小心，因为如果你不了解它们的存在或工作原理，它们可能会导致意外的行为。图\
  \ 11-3 显示了上述代码的结果，以便你了解 getter 和 setter 如何影响属性。\n\n![A978-1-4842-1233-2_11_Fig3_HTML.jpg](img/A978-1-4842-1233-2_11_Fig3_HTML.jpg)\n\
  \n**图 11-3.** 使用 getter 和 setter 修改属性\n\n### 使用属性观察器\n\nSwift 提供了两个属性观察器，分别称为 `willSet`\
  \ 和 `didSet`。`willSet` 属性观察器在属性接收值之前运行代码。`didSet` 属性观察器在属性接收值之后运行代码。\n\n与 getter\
  \ 和 setter 类似，属性观察器本质上也是在属性获得新值时运行的函数。`willSet` 和 `didSet` 属性观察器的基本结构与 getter 和\
  \ setter 的结构相同，如下所示：\n\n```\nvar property : dataType = initialValue {\n    willSet\
  \ {\n    }\n    didSet {\n    }\n}\n```\n\n`willSet` 属性观察器在属性获得新值之前运行代码。`didSet`\
  \ 属性观察器在属性获得新值之后运行代码。要了解属性观察器是如何工作的，请按照以下步骤操作：\n\n确保你的 `ClassPlayground` 文件已加载到\
  \ Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass animal {\n    var IQ : Int =\
  \ 0\n    var legs : Int = 0 {\n        willSet {\n            IQ += 10\n       \
  \ }\n        didSet {\n            IQ -= 5\n        }\n    }\n}\n\nvar pet = animal()\n\
  print (pet.IQ)\npet.legs = 4\nprint (pet.IQ)\n```\n\n在这个例子中，`IQ` 属性的初始值为 0。请注意，当你将\
  \ `legs` 属性设置为 4 时，它会立即运行 `willSet` 属性观察器的代码，这将使 `IQ` 属性增加 10。然后，它会立即运行 `didSet`\
  \ 属性观察器中的代码，该代码会减去 3，如图 11-4 所示。\n\n![A978-1-4842-1233-2_11_Fig4_HTML.jpg](img/A978-1-4842-1233-2_11_Fig4_HTML.jpg)\n\
  \n**图 11-4.** 使用属性观察器\n\n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的注意事项和示例，对给定的英文文本进行精确翻译。\n\n\
  \n## 创建方法\n\n一个仅存储一个或多个属性的类，对于将相关数据分组在一起来说很方便。然而，面向对象编程更有用的地方在于，对象也可以操作它们自己的数据。要创建供对象运行的迷你程序，您需要在类内部定义函数（称为方法）。\n\
  \n当您将用户界面中的按钮链接起来，从而在 Swift 代码文件中创建一个 `IBAction` 方法时，您就已经见识过方法了。类内部最简单的方法执行的功能完全一样，如下所示：\n\
  \n```\nclass countDown {\n\n    var counter = 10\n\n    func decrement() {\n   \
  \     counter--\n    }\n\n}\n```\n\n这个 `decrement()` 方法简单地从 `counter` 属性（初始值为 10）中减去\
  \ 1。要让这个方法运行，您必须指定对象名、句点和方法名，如下所示：\n\n```\nvar counter = countDown()\ncounter.decrement()\n\
  ```\n\n这个 `decrement()` 方法每次都执行完全相同的操作，即从 `counter` 属性中减去 1。一个更有趣、更灵活的方法可以接受数据（一个或多个参数）来修改方法内部的代码执行逻辑，例如：\n\
  \n```\nclass countDown {\n\n    var counter = 10\n\n    func decrement() {\n   \
  \     counter--\n    }\n\n    func decrementByValue(step: Int) {\n        counter\
  \ -= step\n    }\n\n}\n```\n\n第二个方法，`decrementByValue(step:)`，接受一个整数，该整数被存储在一个名为\
  \ `step` 的变量中。然后它从 `counter` 属性中减去 `step` 的值，如图 11-5 所示。\n\n![A978-1-4842-1233-2_11_Fig5_HTML.jpg](img/A978-1-4842-1233-2_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 运行一个接受值的方法\n\n当一个方法接受数据时，它也可以返回一个特定的值。要创建这样的方法，您需要标识方法返回的数据类型（使用 `->`\
  \ 符号）以及定义要返回的具体值的 `return` 关键字。\n\n所以，如果您想创建一个返回 `Float` 数据类型的方法，您可以定义如下方法：\n\n\
  ```\nclass mathBrain {\n\n    var tempValue: Float = 0\n\n    func average(first:\
  \ Float, second: Float) -> Float {\n        return (first + second) / 2\n    }\n\
  \n}\n```\n\n这个方法接受两个 `Float` 数字（存储在名为 `first` 和 `second` 的变量中）并返回一个 `Float` 值。要调用这个方法，您需要指定一个对象名、句点、方法名以及两个\
  \ `Float` 数据类型的数字。\n\n请注意，这个方法有两个参数，名为 `first` 和 `second`。当传递第一个参数时，您无需指定参数名（`first`），因为它前面没有\
  \ `#` 符号。但是，在传递任何其他参数时，您必须指定参数名，例如：\n\n```\nvar math = mathBrain()\nvar temp: Float\
  \ = math.average(4.0, second: 9.0)\nprint(temp)\n```\n\n要了解如何创建一个集合以及如何向其中添加和移除数据，请按照以下步骤创建一个新的\
  \ playground：\n\n1.  启动 Xcode。\n2.  选择 文件 ➤ 新建 ➤ Playground。（如果您看到 Xcode 欢迎屏幕，也可以点击“开始使用\
  \ playground”。）Xcode 会要求您输入 playground 名称和平台。\n3.  点击名称文本字段，然后输入 `MethodPlayground`。\n\
  4.  点击平台弹出菜单，选择 OS X。Xcode 会询问您想要保存 playground 文件的位置。\n5.  点击一个您想要保存 playground\
  \ 文件的文件夹，然后点击“创建”按钮。Xcode 会显示 playground 文件。\n6.  按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  \nclass mathBrain {\n\n    var tempValue: Float = 0\n\n    func average(first: Float,\
  \ second: Float) -> Float {\n        return (first + second) / 2\n    }\n\n}\n\n\
  var math = mathBrain()\nvar temp: Float = math.average(4.0, second: 9.0)\nprint(temp)\n\
  ```\n\n`average()` 方法接受两个参数，将它们相加，然后除以 2。接着，它使用 `return` 关键字返回这个值。\n\n当 `average()`\
  \ 方法处理数字 4.0 和 9.0 时，它返回一个值为 6.5，该值被存储在一个名为 `temp` 的变量中，如图 11-6 所示。\n\n![A978-1-4842-1233-2_11_Fig6_HTML.jpg](img/A978-1-4842-1233-2_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 创建集合、向集合中插入数据以及从集合中移除数据\n\n## 在 OS X 程序中使用对象\n\n对象可以包含任意数量的属性，这些属性可以保存简单的数据类型（如整数或字符串），也可以保存更复杂的数据类型（如元组、集合或数组）。一个对象还可以包含一个或多个方法，这些方法通常用于操作对象的属性。\n\
  \n在这个示例程序中，您将定义一个类，并基于该类创建两个对象。您还将了解如何将一个类存储在一个单独的文件中。与其把所有东西都塞进一个文件，不如将代码存储在单独的文件中，这样更容易管理。\n\
  \n这两个对象将运行存储在另一个对象中的方法。用户界面还将从两个对象的属性中检索值，并显示在用户界面的文本字段中。\n\n为了更多地了解用户界面，您还将看到如何将两个按钮连接到一个\
  \ `IBAction` 方法，并确定用户点击了哪个按钮。像往常一样，您将看到如何通过 `IBOutlet` 在用户界面元素中显示数据。要创建这个示例程序，请遵循以下步骤：\n\
  \n1.  在 Xcode 中选择 文件 ➤ 新建 ➤ 项目。\n2.  在 OS X 类别下，点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
  \ 现在会要求您输入产品名称。\n4.  点击产品名称文本字段，然后输入 `ObjectProgram`。\n5.  确保语言弹出菜单显示为 Swift，并且没有勾选任何复选框。\n\
  6.  点击“下一步”按钮。Xcode 会询问您想要存储项目的位置。\n7.  选择一个文件夹来存储您的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击\
  \ `MainMenu.xib` 文件。\n9.  点击 `ObjectProgram` 图标以显示用户界面窗口。\n10.  选择 视图 ➤ 工具 ➤ 显示对象库，使对象库出现在\
  \ Xcode 窗口的右下角。\n11.  将两个“下压按钮”、两个“标签”和两个“文本字段”拖放到用户界面上，然后双击下压按钮和标签，以更改其上显示的文本，使其看起来类似于图\
  \ 11-7。\n\n![A978-1-4842-1233-2_11_Fig7_HTML.jpg](img/A978-1-4842-1233-2_11_Fig7_HTML.jpg)\n\
  \n图 11-7. ObjectProgram 的用户界面\n\n这个用户界面将显示两个角色的生命值点数：一个警长和一个亡命徒。每次您点击“警长射击”或“亡命徒射击”按钮时，一个\
  \ `IBAction` 方法将随机判定另一个角色是否被击中。如果是，它还会判定该枪造成的伤害，范围为 1 到 3。任何变化都会显示在“警长”或“亡命徒”标签下方的文本字段中。\n\
  \n“警长射击”和“亡命徒射击”按钮会运行一个 `IBAction` 方法，该方法首先确定用户点击的是哪个按钮：“警长射击”按钮还是“亡命徒射击”按钮。要识别用户点击了哪个按钮，您需要修改每个按钮上的“标记”属性，这样“警长射击”按钮的标记值将为\
  \ 0，而“亡命徒射击”按钮的标记值将为 1。\n\n在确定是警长还是亡命徒在射击之后，`IBAction` 方法会运行 `shoot()` 方法，该方法随机判定是否击中以及造成的伤害，这些伤害会从每个对象的\
  \ `hitPoints` 属性中减去。\n\n总的生命值点数会显示在“警长”和“亡命徒”标签下方的文本字段中。一旦警长或亡命徒的总生命值点数降至 0 或更低，一个警告对话框就会出现，告知您警长或亡命徒是否死亡。要将您的用户界面连接到\
  \ Swift 代码，请遵循以下步骤。\n\n\n\n释放鼠标和 Control 键，将“Outlaw Shoot”按钮连接到现有的 `IBAction shootButton`\
  \ 方法。将鼠标移动到“Sheriff”文本字段上，按住 Control 键，然后拖动到 `AppDelegate.swift` 文件中 `@IBOutlet`\
  \ 行的下方。释放鼠标和 Control 键，弹出窗口出现。在“Name”文本字段中单击并输入 `sheriffHitPoints`，然后单击“Connect”按钮。\n\
  \n将鼠标移动到“Add”按钮右侧出现的“Outlaw”文本字段上，按住 Control 键，然后拖动到 `AppDelegate.swift` 文件中 `@IBOutlet`\
  \ 行的下方。释放鼠标和 Control 键，弹出窗口出现。在“Name”文本字段中单击并输入 `outlawHitPoints`，然后单击“Connect”按钮。现在您应该拥有代表用户界面上所有文本字段的以下\
  \ `IBOutlet`：\n\n保持用户界面在 Xcode 窗口中可见，选择 `View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor`。`AppDelegate.swift` 文件出现在用户界面旁边。\n\n将鼠标移动到“Sheriff Shoot”按钮上，按住 Control\
  \ 键，然后拖动到 `AppDelegate.swift` 文件底部最后一个花括号的上方。释放鼠标和 Control 键，弹出窗口出现。在“Connection”弹出菜单中单击并选择\
  \ `Action`。在“Name”文本字段中单击并输入 `shootButton`。在“Type”弹出菜单中单击并选择 `NSButton`。然后单击“Connect”按钮。\n\
  \n将鼠标移动到“Outlaw Shoot”按钮上，按住 Control 键，然后拖动到您刚刚创建的现有 `IBAction shootButton` 方法上，直到整个方法高亮显示，如图\
  \ 11-8 所示。\n\n![A978-1-4842-1233-2_11_Fig8_HTML.jpg](img/A978-1-4842-1233-2_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 将 Outlaw Shoot 按钮连接到现有的 IBAction 方法\n\n```\n@IBOutlet weak var window:\
  \ NSWindow!\n\n@IBOutlet weak var sheriffHitPoints: NSTextField!\n\n@IBOutlet weak\
  \ var outlawHitPoints: NSTextField!\n```\n\n至此，我们已经将用户界面连接到 Swift 代码，因此可以使用 `IBOutlet`\
  \ 在用户界面上显示数据。我们还创建了一个单一的 `IBAction` 方法，当用户单击两个按钮中的任意一个时运行。现在我们需要更改“Outlaw Shoot”按钮的“Tag”属性。\n\
  \n单击“Outlaw Shoot”按钮以选中它。选择 `View ➤ Utilities ➤ Show Attributes Inspector`。“Attributes\
  \ Inspector”面板出现在 Xcode 窗口的右上角。向下滚动到“View”类别，并将“Tag”属性更改为 1，如图 11-9 所示。\n\n![A978-1-4842-1233-2_11_Fig9_HTML.jpg](img/A978-1-4842-1233-2_11_Fig9_HTML.jpg)\n\
  \n图 11-9. Attributes Inspector 面板底部的 Tag 属性\n\n既然我们已经定义了用户界面，下一步是创建一个单独的 Swift 文件来存放我们的类，您可以按照以下步骤操作：\n\
  \n选择 `File ➤ New ➤ File`。出现一个对话框，要求选择模板。在“OS X”类别下单击“Source”，然后单击“Swift File”，如图\
  \ 11-10 所示。\n\n![A978-1-4842-1233-2_11_Fig10_HTML.jpg](img/A978-1-4842-1233-2_11_Fig10_HTML.jpg)\n\
  \n图 11-10. 选择用于存放类定义代码的文件\n\n单击“Next”按钮。Xcode 询问您想要将文件存储在哪里以及给它起什么名字。在“Save As”文本字段中单击并输入\
  \ `personClass`。然后单击“Create”按钮。Xcode 在“Project Navigator”面板中显示 `personClass.swift`\
  \ 文件。在“Project Navigator”面板中单击 `personClass.swift` 文件。Xcode 显示文件内容。如下编辑 `personClass.swift`\
  \ 文件：\n\n```\nimport Foundation\n\nclass person {\n\n    var hitPoints = 10\n\n\
  \    func shoot () -> Int {\n        var odds = 1 + Int(arc4random_uniform(3))\n\
  \        if odds == 3 {\n            // Hit, randomly determine damage from 1..3\n\
  \            return 1 + Int(arc4random_uniform(3))\n        } else {\n         \
  \   return 0 // Missed\n        }\n    }\n\n}\n```\n\n\n\n这个类定义了一个名为 `hitPoints`\
  \ 的属性，并将其初始值设为 10。同时，它还定义了一个名为 `shoot` 的方法，该方法不接受任何参数，但会返回一个整数值。在 `shoot` 方法内部，它会计算一个从\
  \ 1 到 3 的随机数，并将该值存储在 `odds` 变量中。\n\n接着，它检查 `odds` 中的值是否恰好等于 3。如果是，则再次计算一个从 1 到 3\
  \ 的随机数并返回此值。如果 `odds` 中的值不是 3，则该方法返回 0。\n\n现在，你已经在单独的 Swift 文件中定义了一个类，接下来要实际使用该类创建对象。你可以按照以下步骤操作：\n\
  \n在项目导航窗格中点击 `AppDelegate.swift` 文件。Xcode 会显示 `AppDelegate.swift` 文件的内容。在 `AppDelegate.swift`\
  \ 文件的 `IBOutlet` 列表下方，输入以下代码，基于 `personClass.swift` 文件中定义的 `person` 类创建两个对象：\n\n\
  ```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var sheriffHitPoints:\
  \ NSTextField!\n@IBOutlet weak var outlawHitPoints: NSTextField!\nvar sheriff =\
  \ person ()\nvar outlaw = person ()\n```\n\n修改 `applicationDidFinishLaunching` 方法，使其在用户界面的文本字段中显示\
  \ `sheriff` 和 `outlaw` 对象的 `hitPoints` 属性的初始值。这两个 `IBOutlet` 分别名为 `sheriffHitPoints`\
  \ 和 `outlawHitPoints`：\n\n```\nfunc applicationDidFinishLaunching(aNotification:\
  \ NSNotification) {\n    // Insert code here to initialize your application\n  \
  \  sheriffHitPoints.integerValue = sheriff.hitPoints\n    outlawHitPoints.integerValue\
  \ = outlaw.hitPoints\n}\n```\n\n修改 `shootButton` IBAction 方法，如下所示：\n\n```\n@IBAction\
  \ func shootButton(sender: NSButton) {\n    if sender.tag == 0 {    // 警长射击\n  \
  \      outlaw.hitPoints -= sheriff.shoot()\n    } else {    // 歹徒射击\n        sheriff.hitPoints\
  \ -= outlaw.shoot()\n    }\n    sheriffHitPoints.integerValue = sheriff.hitPoints\n\
  \    outlawHitPoints.integerValue = outlaw.hitPoints\n    if sheriffHitPoints.integerValue\
  \ <= 0 {\n        var myAlert = NSAlert()\n        myAlert.messageText = \"警长阵亡。\"\
  \n        myAlert.runModal()\n    } else if outlawHitPoints.integerValue <= 0 {\n\
  \        var myAlert = NSAlert()\n        myAlert.messageText = \"歹徒阵亡。\"\n    \
  \    myAlert.runModal()\n    }\n}\n```\n\n此代码检查 `sender` 变量的 `Tag` 属性，该属性用于标识用户点击了哪个按钮。如果\
  \ `Tag` 属性为 0，则表示用户点击了“警长射击”按钮，因此它会运行 `sheriff` 对象中的 `shoot` 方法，并从 `outlaw.hitPoints`\
  \ 属性中减去其结果（一个 0 到 3 之间的值）。\n\n如果用户点击了“歹徒射击”按钮，则会运行 `outlaw` 对象中的 `shoot` 方法，并从 `sheriff.hitPoints`\
  \ 属性中减去其结果（一个 0 到 3 之间的值）。\n\n无论结果如何，它随后都会在用户界面上由 `sheriffHitPoints` 和 `outlawHitPoints`\
  \ 这两个 `IBOutlets` 标识的两个文本字段中，显示 `sheriff` 和 `outlaw` 双方的 `hitPoints` 属性的最新值。\n\n\
  最后，如果 `sheriff` 或 `outlaw` 任意一方的 `hitPoints` 属性降至 0 或以下，则会弹出一个警告对话框，显示 `sheriff`\
  \ 或 `outlaw` 阵亡的消息。`AppDelegate.swift` 文件的完整内容应如下所示：\n\n```\nimport Cocoa\n\nclass\
  \ AppDelegate: NSObject, NSApplicationDelegate {\n\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var sheriffHitPoints: NSTextField!\n    @IBOutlet\
  \ weak var outlawHitPoints: NSTextField!\n\n    var sheriff = person ()\n    var\
  \ outlaw = person ()\n\n    func applicationDidFinishLaunching(aNotification: NSNotification)\
  \ {\n        // 在此处插入代码以初始化你的应用程序\n        sheriffHitPoints.integerValue = sheriff.hitPoints\n\
  \        outlawHitPoints.integerValue = outlaw.hitPoints\n    }\n\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n        // 在此处插入代码以关闭你的应用程序\n    }\n\n    @IBAction func shootButton(sender:\
  \ NSButton) {\n        if sender.tag == 0 {    // 警长射击\n            outlaw.hitPoints\
  \ -= sheriff.shoot()\n        } else {    // 歹徒射击\n            sheriff.hitPoints\
  \ -= outlaw.shoot()\n        }\n\n        sheriffHitPoints.integerValue = sheriff.hitPoints\n\
  \        outlawHitPoints.integerValue = outlaw.hitPoints\n\n        if sheriffHitPoints.integerValue\
  \ <= 0 {\n            var myAlert = NSAlert()\n            myAlert.messageText =\
  \ \"警长阵亡。\"\n            myAlert.runModal()\n        } else if outlawHitPoints.integerValue\
  \ <= 0 {\n            var myAlert = NSAlert()\n            myAlert.messageText =\
  \ \"歹徒阵亡。\"\n            myAlert.runModal()\n        }\n    }\n}\n```\n\n要查看此程序如何工作，请遵循以下步骤：\n\
  \n1.  选择 Product ➤ Run。Xcode 会运行你的 ObjectProgram 项目。注意，警长和歹徒下方的文本字段都显示 10，代表他们的总生命值。每次被击中，他们的生命值都会下降。生命值降到\
  \ 0 或更低的一方将失败。\n2.  点击警长射击按钮。如果警长击中了歹徒，你会看到歹徒标签下方的数值从 10 下降到某个较低的值，例如 8。如果警长未命中，歹徒下方的数字将完全不变。\n\
  3.  点击歹徒射击按钮。\n4.  重复步骤 2 和 3，交替点击警长射击和歹徒射击按钮，直到任一角色的生命值降到 0 或更低。此时将出现一个警告对话框，如图\
  \ 11-11 所示。\n\n![A978-1-4842-1233-2_11_Fig11_HTML.jpg](img/A978-1-4842-1233-2_11_Fig11_HTML.jpg)\n\
  \n**图 11-11.** 当任一角色的生命值降到 0 或更低时，会出现一个警告对话框\n\n5.  点击确定以关闭警告对话框。\n6.  选择 ObjectProgram\
  \ ➤ Quit ObjectProgram。\n\n## 总结\n\nSwift 编程完全依赖于对象和面向对象编程的原则。要创建一个对象，你首先必须定义一个类。一个类通常由一个或多个变量（称为属性）以及一个或多个函数（称为方法）组成。一旦定义了类，你就可以创建代表该类的对象。\n\
  \n类中的属性始终需要初始化。你可以在定义属性的同时为每个属性定义初始值，也可以创建一个特殊的初始化方法，让你能够接收数据来为对象定义初始值。\n\n属性可以用固定值初始化，也可以根据另一个属性的值计算得出。一个属性的值可以改变另一个不同属性的值。\n\
  \n你可以从一个类中创建任意多个对象。通常，最好将类定义存储在单独的文件中，以保持代码的组织性。面向对象的程序通过对象向其他对象的属性发送数据，或调用存储在其他对象中的方法来工作。通过协同工作且保持独立，对象使得比以前更快地创建可靠且复杂的程序变得更容易。\n\
  \n\n\n"
- "# 12\\. 继承、多态与类的扩展\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1233-2_​12](http://dx.doi.org/10.1007/978-1-4842-1233-2_12)）包含补充材料，仅供授权用户使用。\n\
  \n在第 11 章中，你学习了如何通过类创建对象，以及类如何定义属性和方法。为了保护自身的数据和方法不受程序其他部分的影响，对象会隔离或封装其代码。封装是面向对象编程的一大优势，因为它能创建自包含的代码，你可以轻松修改或替换这些代码，而不会影响程序的任何其他部分。\n\
  \n通过让代码尽可能独立于程序的其他部分，对象提高了可靠性。想象一座用纸牌搭成的房子：抽掉一张牌，整个房子就会倒塌——在面向对象编程出现之前，大多数软件的工作方式正是如此。\n\
  \n对象就像纸牌一样，你可以抽走或替换它，而不会影响其他任何牌。除了封装之外，面向对象编程还包含另外两个特性，称为继承和多态。\n\n继承背后的思想是重用现有代码，而无需实际复制另一份代码。多态背后的思想是，你可以在不修改原始代码的情况下替换继承而来的代码。通过继承和多态，即使不了解原始代码的工作原理，你也能重用现有代码。\n\
  \n事实上，每次在 Xcode 中创建项目时，查看你的 Swift 文件顶部，你应该会看到一行类似这样的代码：\n\n`import Cocoa`\n\n这行代码告诉\
  \ Xcode 使用苹果为你创建并存储在 Cocoa 框架中的所有类。在我们之前的示例程序中，你使用了 Cocoa 框架来操作数组、集合和字典。如果没有 Cocoa\
  \ 框架，你就得自己编写 Swift 代码来实现这些常用功能。这不仅耗时，而且容易出错，因为你需要编写代码并测试以确保其正常工作。\n\n只需依赖 Cocoa\
  \ 框架中的类，你就能在几乎不写代码的情况下为程序增加功能。随着你在编写自己的类方面经验越来越丰富，你可以创建自己的实用库，并轻松地将其插入其他项目中，从而重用你所有的辛勤成果。\n\
  \n## 理解继承\n\n继承的主要目的是让代码重用变得简单。在过去，人们通过简单地复制代码来重用代码。但如果代码中发现错误（bug）该怎么办？这意味着你需要修复每一份代码副本中的那个\
  \ bug。只要漏掉一份有问题的代码副本，你的程序就无法运行。\n\n创建同一代码的多个副本会引发两个问题。首先，它浪费空间。其次，由于代码的多个副本散布在整个程序中，修改代码变得更加困难。继承解决了这两个问题。\n\
  \n首先，继承从不复制代码，因此从不浪费空间。其次，由于继承只保留一份代码，你只需修改这一份代码，就能让修改自动影响程序中所有依赖该代码的部分。\n\n继承并非实际复制代码，而是创建指向一份代码的指针或引用。当你创建一个类时，你可以这样简单地声明它的名称：\n\
  \n```\nclass className {\n\n}\n```\n\n要从另一个类继承代码，则像这样命名那个类：\n\n```\nclass className\
  \ : superClass {\n\n}\n```\n\n这段代码定义了一个名为`className`的类，它从另一个名为`superClass`的类中继承代码。这意味着在`superClass`中定义的任何属性和方法也会自动在`className`中生效，即使`className`类完全是空的。\n\
  \n如果你查看之前在章节中创建的任何 OS X 示例程序，你可能会看到类似这样的代码：\n\n```\nclass AppDelegate: NSObject,\
  \ NSApplicationDelegate {\n\n}\n```\n\n这定义了一个名为`AppDelegate`的类，它从另一个名为`NSObject`的类中继承代码。（这段代码还通过另一个名为`NSApplicationDelegate`的文件向`AppDelegate`类添加了额外代码，你将在本章后面了解更多关于这个文件的内容。）\n\
  \n要了解如何在类中使用继承，请按照以下步骤创建一个新的 playground：\n\n启动 Xcode。选择“文件”>“新建”>“Playground”。（如果你看到\
  \ Xcode 欢迎屏幕，也可以点击“开始使用 playground”。）Xcode 会要求你输入 playground 名称和平台。在“名称”文本字段中点击，输入`InheritPlayground`。在“平台”弹出菜单中选择“OS\
  \ X”。Xcode 会询问你希望将 playground 文件保存到哪里。点击一个文件夹以保存 playground 文件，然后点击“创建”按钮。Xcode\
  \ 会显示该 playground 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass firstClass {\n\n \
  \   var speed : Int = 0\n    var locationX : Int = 3\n    var locationY : Int =\
  \ 5\n\n    func move (X: Int, Y: Int) {\n        locationX += X\n        locationY\
  \ += Y\n    }\n}\n\nclass copyCat : firstClass {\n\n}\n\nvar kitten = copyCat ()\n\
  kitten.speed = 4\nkitten.move(4, Y: 8)\nprint (kitten.locationX)\nprint (kitten.locationY)\n\
  ```\n\n这段 Swift 代码定义了两个类。首先，它定义了一个类（名为`firstClass`），该类拥有三个属性（`speed`、`locationX`和`locationY`）和一个方法（`move`）。然后，它定义了第二个类（名为`copyCat`），这个类完全是空的，但它继承了`firstClass`中的所有代码。\n\
  \n为了证明`copyCat`类确实继承了`firstClass`的代码，这段 Swift 代码接下来创建了一个名为`kitten`的对象，该对象基于`copyCat`类。`kitten`对象可以在`speed`属性中存储数据，并使用`move`方法来修改其`locationX`和`locationY`属性，然而`copyCat`类本身完全是空的。图\
  \ 12-1 显示了在 playground 中运行这段 Swift 代码的结果。\n\n![A978-1-4842-1233-2_12_Fig1_HTML.gif](img/A978-1-4842-1233-2_12_Fig1_HTML.gif)\n\
  \n图 12-1. 展示继承的工作原理\n\n注意\n\n某些编程语言（如 C++）允许一个类从两个或多个类继承，这称为多重继承。然而在 Swift 中，一个类只能从另一个类继承，这称为单继承。\n\
  \n\n\n在上面的例子中，`copyCat` 类从 `firstClass` 继承了三个属性（`speed`、`locationX` 和 `locationY`）以及一个方法（`move`）。由于\
  \ `copyCat` 类没有定义自己的任何属性或方法，因此 `copyCat` 类与 `firstClass` 基本相同。\n\n在实际使用中，一个类没有理由完全照搬另一个类的内容来继承。更常见的做法是一个类（称为子类）从另一个类（称为超类）继承，然后添加自己的额外属性和方法。\n\
  \n这样一来，子类只需包含这些新属性和方法的代码，同时仍能访问超类的所有属性和方法。例如，考虑下面的类：\n\n```\nclass copyDog : copyCat\
  \ {\n    var name : String = \"\"\n}\n```\n\n这个类继承了 `copyCat` 类的所有代码，并添加了它自己的一个新属性，名为“name”，该属性可以存储一个字符串。上述定义了\
  \ `name` 属性并继承 `copyCat` 类代码的类定义，等价于下面这样：\n\n```\nclass copyDog {\n    var speed\
  \ : Int = 0\n    var locationX : Int = 3\n    var locationY : Int = 5\n    func\
  \ move (X: Int, Y: Int) {\n        locationX += X\n        locationY += Y\n    }\n\
  \    var name : String = \"\"\n}\n```\n\n请记住，`copyCat` 类继承了 `firstClass` 的所有内容，而\
  \ `firstClass` 定义了 `speed`、`locationX` 和 `locationY` 属性以及 `move` 方法。相比之下，从 `copyCat`\
  \ 类继承代码的 `copyDog` 类要简短得多。\n\n继承像一条链条一样运作。如果类 A 继承自类 B，但类 B 继承自类 C 的所有内容，那么类 A 就继承了类\
  \ B 和类 C 的所有内容。例如，`copyDog` 类继承了 `copyCat` 类的所有内容。而 `copyCat` 类又继承了 `firstClass`\
  \ 的所有内容。这意味着 `copyDog` 类最终继承了 `copyCat` 类和 `firstClass` 的所有内容，如图 12-2 所示。\n\n![A978-1-4842-1233-2_12_Fig2_HTML.jpg](img/A978-1-4842-1233-2_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 类继承前一个类的所有内容\n\n这种继承的链条效应正是 Cocoa 框架的设计方式。在最简单的层面上，有一个名为 `NSObject` 的基本类。像\
  \ `NSResponder` 这样的类继承了 `NSObject` 的所有内容，并添加了自己的新属性和方法。另一个类如 `NSView` 则继承了 `NSResponder`\
  \ 和 `NSObject` 的所有内容。当你在 Xcode 的文档窗口中查阅 Cocoa 框架中的类时，可以看到由“继承自：”标签标识的这个类的链条链接，如图\
  \ 12-3 所示。\n\n![A978-1-4842-1233-2_12_Fig3_HTML.jpg](img/A978-1-4842-1233-2_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 文档窗口标识了当前显示的类所继承的超类\n\n要了解如何在多个类之间使用继承，请按照以下步骤操作：\n\n确保 Xcode 中已加载 `InheritPlayground`\
  \ 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass animal {\n    var legs : Int = 0\n\
  }\n\nclass packAnimal : animal {\n    var strength : Int = 100\n}\n\nclass biped\
  \ : packAnimal {\n    var IQ : Int = 75\n}\n\nvar snake = animal()\nprint (snake.legs)\n\
  \nvar mule = packAnimal()\nmule.legs = 4\nmule.strength = 120\n\nvar relative =\
  \ biped()\nrelative.legs = 2\nrelative.strength = 55\nrelative.IQ = 10\n```\n\n\
  这段代码创建了三个类：`animal`（`legs` 属性）、`packAnimal`（`strength` 属性）和 `biped`（`IQ` 属性）。然后，它基于这些类创建了三个对象。第一个对象\
  \ `snake` 基于 `animal` 类。第二个对象 `mule` 基于 `packAnimal` 类。第三个对象 `relative` 基于 `biped`\
  \ 类。\n\n最终，`relative` 对象包含了来自所有三个类的属性，`mule` 对象只包含来自 `animal` 和 `packAnimal` 类的属性，而\
  \ `snake` 对象只包含来自 `animal` 类的属性，如下所示：\n\n| 对象 | 基于这些类 | 包含这些属性 |\n| --- | --- |\
  \ --- |\n| `snake` | `animal` | `legs` |\n| `mule` | `packAnimal`、`animal` | `legs`、`strength`\
  \ |\n| `relative` | `biped`、`packAnimal`、`animal` | `legs`、`strength`、`IQ` |\n\n\
  `snake`、`mule` 和 `relative` 对象基于它们不同的类以及它们所继承的类而包含不同的属性，如图 12-4 所示。\n\n![A978-1-4842-1233-2_12_Fig4_HTML.jpg](img/A978-1-4842-1233-2_12_Fig4_HTML.jpg)\n\
  \n图 12-4. 查看继承如何在不同类存储的属性之间运作\n\n\n\n## 理解多态\n\n当一个类（子类）继承自另一个类（超类）时，它会包含超类中存储的所有属性和方法。尽管子类继承了超类的所有属性和方法，但这些属性和方法并不会显示在子类内部。每个类中出现的代码，仅是该类所特有的属性和方法。\n\
  \n从其他类继承来的属性会保持相同的名称和数据类型。从其他类继承来的方法也会保持相同的名称和实现其功能的代码。\n\n继承方法的问题在于，你可能想要修改继承来的方法中的代码。例如，假设你有一个视频游戏，里面有在地上跑的狗和在空中飞的鸟。你可以创建一个像这样的基础类：\n\
  \n```\nclass gameObject {\n    var speed : Int = 0\n    var locationX : Int = 3\n\
  \    var locationY : Int = 3\n\n    func move (X: Int, Y: Int) {\n        locationX\
  \ += X + speed\n        locationY += Y + speed\n    }\n}\n\nvar dog = gameObject()\n\
  ```\n\n现在，从 `gameObject` 类创建的 `dog` 对象，拥有三个属性（`speed`、`locationX` 和 `locationY`）和一个方法（`move`），该方法用于改变\
  \ `locationX` 和 `locationY` 属性。\n\n狗只能在地上跑，但鸟可以在二维空间中移动，因此它需要一个额外的 `height` 属性。要移动一个飞行物体，`move`\
  \ 方法需要能改变 `height` 属性。这意味着 `move` 方法需要有所不同。\n\n解决这个问题的一个笨办法是为 `move` 方法起一个不同的名称，比如将其名称从\
  \ `\"move\"` 改为 `\"fly\"`：\n\n```\nclass flyingObject : gameObject {\n    var height\
  \ : Int = 0\n\n    func fly (X: Int, Y: Int) {\n        locationX += X + speed\n\
  \        locationY += Y + speed\n        height += (X + Y) / 2\n    }\n}\n\nvar\
  \ bird = flyingObject()\n```\n\n这个解决方案的问题在于，从 `flyingObject` 类创建的 `bird` 对象现在有两个方法：从\
  \ `gameObject` 继承来的 `move` 方法，以及在 `flyingObject` 中新定义的 `fly` 方法。\n\n你可以简单地忽略 `move`\
  \ 方法而使用 `fly` 方法，但如果你意外地使用了 `move` 方法（而不是正确的、能让鸟在二维空间中移动的 `fly` 方法）来改变鸟的位置，这就有产生错误的风险。\n\
  \n这就是多态存在的意义了。多态基本上允许你重复使用一个方法名（比如 `move`），但用完全不同的代码来替换它，使其正常工作。为了表明你在使用多态来重用方法名但修改其代码，必须在你要修改的方法前加上\
  \ `\"override\"` 关键字，例如：\n\n```\noverride func move (X: Int, Y: Int) {\n    locationX\
  \ += X + speed\n    locationY += Y + speed\n    height += (X + Y) / 2\n}\n```\n\n\
  当你覆盖一个方法（使用多态）时，你实际上拥有了两个同名的方法，但一个版本定义在某个类中，第二个版本定义在另一个类中。计算机永远不会搞混，因为你只能通过同时指定对象名和方法名来运行每个方法。尽管方法名相同，但对象名是不同的。\n\
  \n要了解多态如何工作，请遵循以下步骤：\n\n确保你的 `InheritPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\n\
  import Cocoa\n\nclass gameObject {\n    var speed : Int = 0\n    var locationX :\
  \ Int = 3\n    var locationY : Int = 3\n\n    func move (X: Int, Y: Int) {\n   \
  \     locationX += X + speed\n        locationY += Y + speed\n    }\n}\n\nvar dog\
  \ = gameObject()\n\nclass flyingObject : gameObject {\n    var height : Int = 0\n\
  \n    override func move (X: Int, Y: Int) {\n        locationX += X + speed\n  \
  \      locationY += Y + speed\n        height += (X + Y) / 2\n    }\n}\n\nvar bird\
  \ = flyingObject()\n\ndog.move(4, Y: 7)\nbird.move(4, Y: 7)\n```\n\n要覆盖一个方法，`flyingObject`\
  \ 类必须首先继承自另一个类。在这个例子中，`flyingObject` 继承自 `gameObject`。现在 `flyingObject` 类可以使用 `\"\
  override\"` 关键字来指定它正在修改使 `move` 方法工作的代码。在这个例子中，唯一的改动是添加了修改 `height` 属性的代码，但我们完全可以在这个被覆盖的\
  \ `move` 方法中添加完全不同的代码。\n\n请注意，当你对 `dog` 对象运行 `move` 方法（`dog.move`）时，`move` 方法只改变\
  \ `locationX` 和 `locationY` 的值；但当你对 `bird` 对象运行 `move` 方法（`bird.move`）时，覆盖后的方法会运行，并且也会改变\
  \ `height` 属性，如图 12-5 所示。\n\n![A978-1-4842-1233-2_12_Fig5_HTML.jpg](img/A978-1-4842-1233-2_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.** 被覆盖的方法可以有不同的行为\n\n当覆盖方法时，你只能修改方法内部的代码。你不能修改方法的参数列表。例如，考虑这个类：\n\n```\n\
  class basicDesign {\n    var location : Int = 0\n\n    func moveMe (X : Int) {\n\
  \        location += X\n    }\n}\n```\n\n要覆盖 `moveMe` 方法，下一个类需要继承 `basicDesign`\
  \ 类，并且只修改被覆盖方法内部的代码。以下做法是行不通的：\n\n```\nclass newDesign : basicDesign {\n    override\
  \ func moveMe (X: Int, Y: Int) { // 不起作用\n    }\n}\n```\n\n注意，原始的 `moveMe` 方法只有一个参数（`X\
  \ : Int`），但 `newDesign` 类中的 `moveMe` 方法有两个参数（`X: Int`, `Y: Int`）。尽管方法名相同，但这个方法的参数列表不同，所以它是行不通的。当覆盖方法时，你只能修改代码，而不能修改参数列表。\n\
  \n\n\n### 重写属性\n\n除了重写方法之外，Swift 还允许你重写属性。当你重写属性时，必须保持相同的属性名和数据类型。你所能改变的，是一个变量的\
  \ getter 和 setter 方法，以及属性观察器。\n\n在最简单的层面上，getter 仅返回一个变量的值。在更复杂的层面上，getter 会计算一个值。请考虑以下代码：\n\
  \n```\nclass basicDesign {\n    var location: Int {\n        get {\n           \
  \ return 4\n        }\n    }\n}\n```\n\n这个 `basicDesign` 类定义了一个名为 `location` 的属性，其\
  \ getter 返回 `location` 属性中的值 `4`。要重写这个属性，你需要保留变量名和数据类型（`Int`），但可以更改 getter 代码，例如：\n\
  \n```\nclass newDesign : basicDesign {\n    override var location: Int {\n     \
  \   get {\n            return 7\n        }\n    }\n}\n```\n\n这个 `newDesign` 类继承了\
  \ `basicDesign` 类中的 `location` 属性。然而，它用一个返回值为 `7` 的新 getter 重写了 `location` 属性。\n\
  \n要查看重写属性是如何工作的，请遵循以下步骤：\n\n确保你的 `InheritPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
  \n```\nimport Cocoa\n\nclass basicDesign {\n    var location: Int {\n        get\
  \ {\n            return 4\n        }\n    }\n}\n\nclass newDesign : basicDesign\
  \ {\n    override var location: Int {\n        get {\n            return 7\n   \
  \     }\n    }\n}\n\nvar ant = basicDesign()\nvar fly = newDesign()\n\nant.location\n\
  fly.location\n```\n\n在这个例子中，`ant` 对象基于 `basicDesign` 类，该类将 `location` 属性的值定义为 `4`。`fly`\
  \ 对象基于 `newDesign` 类，该类继承了 `location` 属性。然而，`newDesign` 类重写了 `location` 属性的 getter\
  \ 代码，因此 `location` 属性中存储的值不再是 `4`，而是 `7`，如图 12-6 所示。\n\n![A978-1-4842-1233-2_12_Fig6_HTML.jpg](img/A978-1-4842-1233-2_12_Fig6_HTML.jpg)\n\
  \n图 12-6. 使用新的 getter 代码重写属性\n\n请记住，在重写方法和属性时，你只能更改：\n\n- 方法中的代码\n- 属性的 getter/setter\
  \ 或属性观察器中的代码\n\n你永远不能更改：\n\n- 方法名\n- 方法参数列表\n- 属性名\n- 属性数据类型\n\n### 防止多态\n\n在某些情况下，你可能希望阻止一个方法、属性甚至整个类通过多态被修改。为此，你只需要插入“final”关键字。如果你想阻止整个类被继承，只需将“final”关键字放在类名前面，如下所示：\n\
  \n```\nfinal class className {\n    var propertyName = initialValue\n    func methodName()\
  \ {\n    }\n}\n```\n\n> **注意**  \n> 如果你在类名前面放置“final”，它会自动阻止该类的属性和方法被重写，因此你无需在每个属性或方法名前面放置“final”。\n\
  \n如果你想阻止某个单独的属性或方法被重写，只需将“final”关键字放在该属性或方法前面，如下所示：\n\n```\nclass className {\n\
  \    final var propertyName = initialValue\n    func methodName() {\n    }\n}\n\
  ```\n\n上面例子中的“final”关键字阻止了该属性被重写，同时允许该方法被重写。如果你想阻止方法被重写，同时允许属性被重写，则应像这样将“final”关键字放在方法前面：\n\
  \n```\nclass className {\n    var propertyName = initialValue\n    final func methodName()\
  \ {\n    }\n}\n```\n\n## 使用扩展\n\n如果有一个类包含你需要的属性和方法，面向对象的方法是继承该类（创建一个子类）。不断创建子类的问题在于，从略有不同的类文件中创建对象可能会变得笨拙。\n\
  \n当你想要扩展 Cocoa 框架中类的功能时尤其如此。例如，如果你正在使用 `String` 数据类型，你可能不想创建一个 `String` 数据类型的子类，然后基于这个新的子类创建对象。理想情况下，你希望继续使用\
  \ `String` 数据类型，但同时拥有新增的功能。\n\n这就是 Swift 提供扩展的原因。扩展本质上允许你向现有类添加代码，而无需创建子类。这样，你仍然可以使用原始类，但同时无需经过继承、多态或子类化，就可以为该类添加新功能。扩展的结构如下所示：\n\
  \n```\nextension className {\n}\n```\n\n扩展可以定义方法以及包含以下代码的属性：\n\n- getter 和 setter\n\
  - 初始化器\n- 属性观察器\n\n虽然扩展可以在不继承的情况下向类添加新的属性和方法，但扩展无法覆盖类中已有的方法或属性。扩展也不能创建具有初始值的属性，例如：\n\
  \n```\nvar temperature : Int = 100        // 不能在扩展中使用\n```\n\n要了解扩展如何向类添加属性和方法，请通过以下步骤创建一个新的\
  \ playground：\n\n启动 Xcode。选择“文件”➤“新建”➤“Playground”。（如果你看到了 Xcode 欢迎屏幕，也可以点击“获取 playground\
  \ 的入门知识”。）Xcode 会要求输入 playground 名称和平台。点击“名称”文本字段并输入 `ExtensionPlayground`。点击“平台”弹出菜单并选择“OS\
  \ X”。Xcode 会询问你想将 playground 文件保存到哪里。点击一个你想保存 playground 文件的文件夹，然后点击“创建”按钮。Xcode\
  \ 会显示 playground 文件。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nclass emptyClass {\n}\n\n\
  extension emptyClass {\n    var age : Int {\n        get {\n            return 50\n\
  \        }\n    }\n\n    func retire (testAge : Int) -> String {\n        if testAge\
  \ < 62 {\n            return \"继续工作\"\n        } else {\n            return \"该退休了\"\
  \n        }\n    }\n}\n\nvar aWorker = emptyClass ()\naWorker.retire(65)\naWorker.age\n\
  ```\n\n这段代码创建了一个完全空的类，然后创建一个扩展，向该空类添加一个“age”属性和一个“retire”方法。最后，它从那个空类创建了一个对象，调用“retire”方法（在扩展中定义），并显示存储在“age”属性中的值，如图\
  \ 12-7 所示。\n\n![A978-1-4842-1233-2_12_Fig7_HTML.jpg](img/A978-1-4842-1233-2_12_Fig7_HTML.jpg)\n\
  \n图 12-7. 使用扩展向空类添加属性和方法\n\n你可以看到，这个类本身什么也没做，但通过扩展，这个类现在获得了它之前没有的新功能。\n\n\n\n##\
  \ 使用协议\n\n在本章开头，你首次接触了为了学习各章基本原理而创建的 `AppDelegate.swift` 文件中出现的内容。这个 `AppDelegate`\
  \ 类的声明如下：\n\n`class AppDelegate: NSObject, NSApplicationDelegate {`\n\n这行代码创建了一个名为\
  \ `AppDelegate` 的类，它继承了 Cocoa 框架中 `NSObject` 类的属性和方法。然而，`NSApplicationDelegate`\
  \ 是另一个文件的名称，用于在不通过继承或子类化的情况下扩展类。\n\n`NSApplicationDelegate` 文件是一个协议文件。上述 Swift 代码创建了一个名为\
  \ `AppDelegate` 的类，它从 `NSObject` 类继承属性和方法，同时也从 `NSApplicationDelegate` 文件继承代码。（你可以在\
  \ Xcode 文档窗口中查看 `NSApplicationDelegate` 协议的更多细节。）\n\n类（如 `NSObject`）与协议（如 `NSApplicationDelegate`）之间的主要区别在于：类定义了属性和方法，而协议仅定义了属性和方法的名称，并不包含实际实现它们的任何代码。协议有时被称为空类，因为它从不定义任何使事物实际运行的\
  \ Swift 代码。\n\n协议定义了一组用于解决特定类型问题的属性和方法名称。采用或遵循此协议的类需要提供实际的 Swift 代码来实现每个方法或属性的声明。\n\
  \n协议的声明看起来与类或结构体的声明相同。唯一的区别在于协议声明使用“protocol”关键字：\n\n```\nprotocol 协议名称 {\n\n}\n\
  ```\n\n在这个协议声明中，你可以定义属性和方法，但不实现任何 Swift 代码，如下所示：\n\n```\nprotocol 协议名称 {\n    var\
  \ 属性 1 : 数据类型 { get }        // 只读\n    var 属性 2 : 数据类型 { get set }    // 读写\n \
  \   func 方法名 (参数) -> 数据类型\n}\n```\n\n当协议定义了一个属性或方法时，任何采用该协议的类都必须按照协议中的定义精确实现该属性或方法。在上述示例中，`属性\
  \ 1` 定义为仅有 getter，而 `属性 2` 定义为同时有 getter 和 setter。\n\n这意味着当一个类实现这两个属性时，它必须仅为 `属性\
  \ 1` 定义 getter，而为 `属性 2` 同时定义 getter 和 setter。\n\n同样，协议中定义的方法在类文件中采用时必须完全一致。也就是说，如果协议中定义的方法带有两个整数参数，那么该方法的实现也必须具有完全相同的两个整数参数。\n\
  \n协议通常用于处理常见的用户界面元素，这些元素需要特定类型的方法来操作它们，但由于不同程序的数据可能不同，因此无法精确定义如何操作它们。\n\n例如，表格视图是一种用户界面元素，它以行的形式显示数据列表。表格视图需要知道要容纳多少行数据以及每行显示什么类型的数据。由于每个表格视图都需要知道这些信息，因此创建标准方法来处理这一需求是合理的；同时，由于每个表格视图需要包含不同的信息，因此避免编写实际的\
  \ Swift 代码来填充表格视图数据也是合理的。\n\n任何包含表格视图的程序都可以利用存储在协议中的预定义方法名称来操作数据。你只需添加 Swift 代码来用数据填充表格视图即可。\n\
  \n通过使用协议，你可以在不同程序之间使用相同的方法名称来操作表格视图。如果没有表格视图协议，你将被迫自己发明在表格视图中添加和显示数据的方法名称。因此，协议在\
  \ Cocoa 框架中通常用于提供一致的方法列表来执行常见任务。\n\n要了解协议的工作原理，请按照以下步骤操作：\n\n确保 `ExtensionPlayground`\
  \ 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\nprotocol testMe {\n    var cash\
  \ : Int { get }\n    var creditCheck : Int { get set }\n    func purchase (price\
  \ : Int) -> String\n}\n\nclass windowShopper : testMe {\n    var tempValue : Int\
  \ = 0\n    var cash : Int = 0\n    \n    var creditCheck : Int {\n        get {\n\
  \            return tempValue\n        }\n        set (newValue) {\n           \
  \ tempValue = newValue\n            cash -= 10\n        }\n    }\n    \n    func\
  \ purchase (price : Int) -> String {\n        cash -= price\n        return \"买到了东西！\"\
  \n    }\n}\n\nvar shopper = windowShopper()\nshopper.cash = 450\nshopper.purchase(129)\n\
  shopper.cash\n```\n\n注意，`testMe` 协议定义了两个属性和一个方法。`cash` 属性仅定义了 getter。`creditCheck`\
  \ 属性同时定义了 getter 和 setter。`purchase` 方法只列出了它的参数（`price` 为整数）及其返回值，返回值是一个 `String`。注意，协议实际上并没有实现任何必要的\
  \ Swift 代码。\n\n当创建 `windowShopper` 类时，它采用或遵循了 `testMe` 协议。这意味着它必须提供 Swift 代码来定义\
  \ `cash` 属性的 getter，以及 `creditCheck` 属性的 getter 和 setter。它还需要实现 `purchase` 方法的 Swift\
  \ 代码。\n\n如果你未能为 `testMe` 协议中定义的所有属性和方法编写 Swift 代码，Xcode 将给出错误提示，指出 `windowShopper`\
  \ 类未能遵循该协议。在采用协议时，请务必实现所有必要的属性和方法。\n\n运行上述代码会显示结果，如图 12-8 所示。\n\n![A978-1-4842-1233-2_12_Fig8_HTML.jpg](img/A978-1-4842-1233-2_12_Fig8_HTML.jpg)\n\
  \n图 12-8. 符合协议的类\n\n\n\n### 在协议中定义可选属性和方法\n\n当你创建协议时，你定义的每个属性和方法都必须被任何采用该协议的类所实现。但是，你也可以让一个或多个属性和方法成为可选的，这样它们就可以被忽略。要定义可选属性或方法，你需要使用\
  \ `@objc` 关键字标记协议，并同样使用 `optional` 关键字标记单个属性或方法，例如：\n\n```\n@objc protocol 协议名称\
  \ {\n    var 必需属性 : 数据类型 { get }\n    optional var 可选属性 : 数据类型 { get }\n    optional\
  \ func 可选方法 ()\n}\n```\n\n要采用或遵循此协议，一个类只需要实现任何未被 `optional` 关键字标记的属性或方法。要实现必需的属性或方法，你需要使用\
  \ `@objc` 关键字标记它们，例如：\n\n```\nclass 类名称 : 协议名称 {\n    @objc var 必需属性 : 数据类型 = 初始值\n\
  }\n```\n\n然而，如果你想实现一个可选的属性或方法，你可以省略 `@objc` 关键字，像这样：\n\n```\nclass 类名称 : 协议名称 {\n\
  \    @objc var 必需属性 : 数据类型 = 初始值\n    var 可选属性 : 数据类型 = 初始值\n}\n```\n\n要了解如何在协议中创建可选属性和方法，请按照以下步骤操作：\n\
  \n确保 `ExtensionPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\n\n@objc\
  \ protocol 人 {\n    var 姓名 : String { get }\n    optional var 年龄 : Int { get }\n\
  \    optional func 移动 (X: Int) -> Int\n}\n\nclass 政治家 : 人 {\n    @objc var 姓名 :\
  \ String = \"\"\n}\n\nvar 候选人 = 政治家 ()\n候选人.姓名 = \"约翰·多伊\"\n```\n\n请注意，上面 `人` 协议中唯一必需的项目是属性\
  \ `姓名`。这就是为什么 `政治家` 类只需要实现 `姓名` 属性，但必须使用 `@objc` 关键字来标记它。\n\n尝试将不同的属性和方法设置为可选，这样你就能看到它们如何影响你在类中实现它们的方式。\n\
  \n### 将继承与协议结合使用\n\n协议甚至可以从其他协议继承属性和方法。这使得一个协议可以从多个协议中继承属性和方法。现在，一个类必须采用或遵循所有协议中定义的所有属性和方法。\n\
  \n要了解如何从多个协议中继承属性和方法，请按照以下步骤操作：\n\n确保 `ExtensionPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\
  \n```\nimport Cocoa\n\nprotocol 第一个 {\n    var 姓名 : String { get }\n}\n\nprotocol\
  \ 第二个 {\n    var ID : Int { get }\n}\n\nprotocol 第三个: 第一个, 第二个 {\n    var 电子邮件 :\
  \ String { get }\n}\n\nclass 继承协议 : 第三个 {\n    var 姓名 : String = \"\"\n    var ID\
  \ : Int = 0\n    var 电子邮件 : String = \"\"\n}\n\nvar 朋友 = 继承协议()\n朋友.姓名 = \"辛迪·史密斯\"\
  \n朋友.ID = 12\n朋友.电子邮件 = \"cindysmith@isp.com\"\n```\n\n在这个例子中，`姓名`、`ID` 和 `电子邮件`\
  \ 属性定义在三个不同的协议中。`第三个` 协议继承了 `第一个` 和 `第二个` 协议。\n\n现在，当某个类采用最后一个协议时，它必须实现所有协议中存储的属性和方法。尽管\
  \ `姓名`、`ID` 和 `电子邮件` 属性都在不同的协议中声明，但 `继承协议` 类可以访问它们全部，如图 12-9 所示。\n\n![A978-1-4842-1233-2_12_Fig9_HTML.jpg](img/A978-1-4842-1233-2_12_Fig9_HTML.jpg)\n\
  \n**图 12-9.** 从多个协议继承属性和方法\n\n## 使用委托\n\n协议与委托密切相关。委托背后的主要思想是让一个类将责任移交或委托给存储在另一个类中的代码。因此，与其创建新的子类来添加新功能，你可以使用包含额外功能的委托。\n\
  \n使用委托的一种常见方式是允许视图（用户界面）与控制器通信。通常，控制器通过 `IBOutlet` 与视图通信，这些 `IBOutlet` 允许控制器在用户界面上显示数据或从用户界面检索数据。\n\
  \n然而，视图也可以通过协议与控制器通信。协议文件定义了方法，并将实现这些方法的责任委托给控制器。控制器实现的最常见的方法类型包括名称中包含 `will`、`should`\
  \ 和 `did` 的方法，例如 `applicationDidFinishLaunching` 或 `applicationWillTerminate`。\n\
  \n图 12-10 展示了控制器如何通过 `IBOutlet` 与视图通信，以及视图如何通过协议与控制器通信。\n\n![A978-1-4842-1233-2_12_Fig10_HTML.jpg](img/A978-1-4842-1233-2_12_Fig10_HTML.jpg)\n\
  \n**图 12-10.** 视图可以通过协议与控制器通信\n\n要了解视图如何使用委托与控制器通信，请按照以下步骤操作：\n\n在 Xcode 内，选择 **文件\
  \ ➤ 新建 ➤ 项目**。在 OS X 类别下点击 **应用程序**。点击 **Cocoa 应用程序**，然后点击 **下一步** 按钮。Xcode 现在会询问产品名称。在\
  \ **产品名称** 文本字段中点击并输入 `DelegateProgram`。确保 **语言** 弹出菜单显示 `Swift`，并且没有勾选任何复选框。点击\
  \ **下一步** 按钮。Xcode 会询问你希望将项目存储在哪里。选择一个文件夹来存储你的项目，然后点击 **创建** 按钮。在项目导航器中点击 `AppDelegate.swift`\
  \ 文件。`AppDelegate.swift` 文件的内容会出现在 Xcode 窗口的中间。查找以下代码行：\n\n```\nclass AppDelegate:\
  \ NSObject, NSApplicationDelegate {\n```\n\n这一行定义了一个名为 `AppDelegate` 的类，该类继承了 `NSObject`\
  \ 类的属性和方法。此外，它还采用了 `NSApplicationDelegate` 文件定义的任何属性和方法。\n\n点击文档窗口左上角的关闭按钮（红点）将其关闭。Xcode\
  \ 窗口再次出现。请注意，`AppDelegate.swift` 文件包含两个空函数，分别名为 `applicationDidFinishLaunching`\
  \ 和 `applicationWillTerminate`。这些函数由 `NSApplicationDelegate` 协议文件定义，但在 `AppDelegate.swift`\
  \ 文件中实现。按如下方式修改这两个函数：\n\n松开 **Option** 键，然后在弹出窗口底部的 **NSApplicationDelegate Protocol\
  \ Reference** 上点击鼠标。文档窗口出现，显示关于 `NSApplicationDelegate` 协议的详细信息，如图 12-14 所示。注意 `NSApplicationDelegate`\
  \ 协议定义的两个方法分别名为 `applicationDidFinishLaunching` 和 `applicationWillTerminate`。\n\n\
  ![A978-1-4842-1233-2_12_Fig14_HTML.jpg](img/A978-1-4842-1233-2_12_Fig14_HTML.jpg)\n\
  \n**图 12-14.** 在文档窗口中查看 `NSApplicationDelegate` 协议\n\n点击文档窗口左上角的关闭按钮（红点）将其关闭。按住\
  \ **Option** 键，在 `NSApplicationDelegate` 上点击鼠标。当鼠标指针变为问号时，在 `NSApplicationDelegate`\
  \ 上点击，使弹出窗口出现，如图 12-13 所示。\n\n![A978-1-4842-1233-2_12_Fig13_HTML.jpg](img/A978-1-4842-1233-2_12_Fig13_HTML.jpg)\n\
  \n**图 12-13.**\n\n\n\n按住 Option 键并点击可显示关于 `NSApplication` 协议的信息。松开 Option 键，然后将鼠标移到弹出窗口底部的\
  \ `NSObject Class Reference` 上并点击。此时会出现“文档”窗口，其中显示了 `NSObject` 类中可用的不同属性和方法的详细信息，如图\
