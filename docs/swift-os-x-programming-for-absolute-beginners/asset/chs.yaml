  \ \"password\"。如果条件也成立，则`switch`语句会在 Alert 对话框中显示 \"Access granted\"。如果 ID 不在`100...150`范围内，或者密码文本字段不包含\
  \ \"password\"，则 Alert 对话框会显示 \"No access\"。\n\n**注意**\n\n你可能想知道上述代码中的`stringValue`和`integerValue`是从哪里来的。查看你的`IBOutlet`，会发现每个文本字段`IBOutlet`都基于`NSTextField`类。在\
  \ Xcode 的文档中查找`NSTextField`，会看到`NSTextField`基于`NSControl`类。`NSControl`类包含`stringValue`和`integerValue`等属性，这意味着任何基于`NSTextField`的类（例如代表用户界面上文本字段的`IBOutlet`）也可以使用这些`stringValue`和`integerValue`属性。\n\
  \n选择 Product ➤ Run。Xcode 会运行你的`BranchingProgram`项目。点击`BranchingProgram`用户界面的 ID\
  \ 文本字段，输入 120。点击`BranchingProgram`用户界面的密码文本字段，输入`password`。点击 Check Password 按钮。会出现一个\
  \ Alert 对话框，如图 7-21 所示。\n\n![A978-1-4842-1233-2_7_Fig21_HTML.jpg](img/A978-1-4842-1233-2_7_Fig21_HTML.jpg)\n\
  \n图 7-21.\n\n显示 Alert 对话框。点击 Alert 对话框中的 OK 按钮使其消失。点击`BranchingProgram`用户界面的 ID\
  \ 文本字段，输入 1。点击 Check Password 按钮。注意，现在 Alert 对话框显示 \"No access\"。点击 Alert 对话框中的\
  \ OK 按钮使其消失。选择 BranchingProgram ➤ Quit BranchingProgram。\n\n### 小结\n\n为了智能地响应用户，每个程序都需要一种决策方式。做出决策的第一步是定义一个**布尔**值，其值为`true`或`false`。可以通过比较运算符或逻辑运算符来计算布尔值。\n\
  \n一旦能确定一个布尔值，就可以使用该布尔值来决定在分支语句中执行哪段代码。最简单的分支是`if`语句，它可以执行一组代码，或者什么都不做。\n\n另一种分支是`if-else`语句，它提供恰好两组可执行的代码。如果布尔值为`true`，则执行第一组代码，否则执行第二组代码。\n\
  \n如果需要在三组或更多代码中选择执行，可以使用`if-else if`语句。不过，通常使用`switch`语句会更简单。在使用`switch`语句时，必须考虑到所有可能的值。\n\
  \n`switch`语句可以匹配精确值、一个数值范围（包含起始和结束数字），或者一个半开范围（仅包含起始数字，不包含结束数字）。\n\n分支语句与布尔值相结合，使你的程序能够根据接收到的数据做出决策并执行不同的代码。分支语句本质上让你的程序能够智能地响应外部数据。\n\
  \n"
- "# 8. 用循环重复执行代码\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1233-2_8](http://dx.doi.org/10.1007/978-1-4842-1233-2_8)）包含补充材料，可供授权用户使用。\n\
  \n编程的基本目标是编写尽可能少的代码，却完成尽可能多的功能。编写的代码越少，程序将来就越容易理解和修改。代码完成的功能越多，程序就越强大。\n\n减少代码编写量的一种方法是重用存储在函数中的代码。第二种重用代码的方式是通过循环。循环可以多次运行一行或多行代码，从而无需编写多行冗余代码。\n\
  \n例如，如果你想打印五遍消息，可以编写如下代码：\n\n```swift\nprint (\"Hello\")\nprint (\"Hello\")\nprint\
  \ (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\n```\n\n这种做法很繁琐，但能生效。然而，如果你突然决定需要打印一千遍消息，那就得把这条命令写一千次。反复输入相同命令不仅枯燥，还增加了在某条命令中出错的可能性。\n\
  \n更简单的方法是使用循环。循环允许你只编写一次一条或多条命令，然后按需运行多次，例如：\n\n```swift\nvar counter : Int = 1\n\
  while counter <= 5 {\n    print (\"Hello\")\n    counter++\n}\n```\n\n上述循环运行了五次，并打印出五遍\
  \ \"Hello\"。如果我们想打印一千遍 \"Hello\"，只需将数字 5 替换为 1000。循环让代码更易于编写和修改，同时能完成更多工作。\n\n\n\
  \n## `while` 循环\n\nSwift 中最简单的循环称为 `while` 循环，其结构如下：\n\n```\nwhile 布尔值 {\n\n}\n\
  ```\n\n在 `while` 循环执行任何操作之前，它首先检查一个布尔值是 `true` 还是 `false`。如果为 `true`，则运行其花括号内的代码一次。然后它会再次检查该布尔值，判断其是否已变为\
  \ `false`，或者仍为 `true`。当该布尔值变为 `false` 的那一刻，`while` 循环就会停止。\n\n由于 `while` 循环在执行任何操作前会检查一个布尔值，因此\
  \ `while` 循环有可能永远不会运行其任何代码。更重要的是，`while` 循环仅在其布尔值为 `true` 时才会运行。这意味着 `while` 循环的花括号内，必须存在一段能够最终将该布尔值变为\
  \ `false` 的代码。\n\n如果 `while` 循环未能将其布尔值从 `true` 变为 `false`，那么循环将永远运行下去，这被称为**无限循环**。无限循环可能导致程序崩溃或冻结，使其不再响应用户或正常工作。\n\
  \n在最简单的层面上，`while` 循环的布尔值可以直接是 `true` 或 `false`，例如：\n\n```\nwhile true {\n\n}\n\
  ```\n\n更常见的是，`while` 循环使用比较运算符来确定一个布尔值，例如：\n\n```\nwhile counter <= 5 {\n\n}\n```\n\
  \n只要 `counter <= 5` 保持为 `true`，`while` 循环就会运行。当 `counter <= 5` 不再为 `true` 时，`while`\
  \ 循环就会停止。\n\n在使用 `while` 循环时，你需要在循环开始前定义好布尔值（以确保它是 `true` 或 `false`），然后必须在 `while`\
  \ 循环内部的某个地方改变这个布尔值（以确保 `while` 循环最终会停止）。\n\n要了解布尔值如何与 `while` 循环配合使用，请按照以下步骤创建一个新的\
  \ playground：\n\n- 启动 Xcode。\n- 选择文件 ➤ 新建 ➤ Playground。（如果你看到了 Xcode 欢迎屏幕，也可以点击“开始使用\
  \ playground”。）Xcode 会要求输入 playground 名称和平台。\n- 点击“名称”文本框，输入 `LoopingPlayground`。\n\
  - 点击“平台”弹出菜单，选择 OS X。Xcode 会询问你想将 playground 文件保存在哪里。\n- 点击一个你想保存 playground 文件的文件夹，然后点击“创建”按钮。Xcode\
  \ 会显示该 playground 文件。\n- 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar counter = 1\nwhile\
  \ counter <= 10 {\n    print (\"Hello\")\n    counter++\n}\n```\n\n请注意，`var counter\
  \ : Int = 1` 这一行定义了变量，`while` 循环使用该变量来确定一个布尔值（`true` 或 `false`）。同时注意 `while` 循环内部的\
  \ `counter++` 这一行。它不断地改变 `while` 循环用来确定何时停止的变量。通过更改布尔比较条件（`counter <= 10`），可以改变\
  \ `while` 循环运行的次数，如图 8-1 所示。\n\n![A978-1-4842-1233-2_8_Fig1_HTML.jpg](img/A978-1-4842-1233-2_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 在 playground 中运行 `while` 循环\n\n使用 `while` 循环时，请记住以下几点：\n\n- 在 `while` 循环之前，确保定义好\
  \ `while` 循环的布尔值所使用的所有变量。\n- `while` 循环可能运行零次或多次。\n- 在 `while` 循环内部，确保所使用的布尔值最终能够变为\
  \ `false`，以避免造成无限循环。\n\n## `repeat-while` 循环\n\n作为 `while` 循环的替代方案，Swift 还提供了一种\
  \ `repeat-while` 循环，其工作方式几乎相同。唯一的区别在于，`repeat-while` 循环不是在运行前检查布尔值，而是在运行后检查布尔值。\n\
  \n这意味着 `repeat-while` 循环**至少会运行一次**。`repeat-while` 循环的结构如下：\n\n```\nrepeat {\n\n\
  } while 布尔值\n```\n\n与 `while` 循环类似，`repeat-while` 循环也需要在其循环内部有能够将其布尔值从 `true` 变为\
  \ `false` 的代码，并且还需要在 `repeat-while` 循环之前有代码来初始化用于计算其布尔值的所有变量。\n\n要了解布尔值如何与 `repeat-while`\
  \ 循环配合使用，请按照以下步骤操作：\n\n- 确保 `LoopingPlayground` 文件已在 Xcode 中加载。\n- 按如下方式编辑代码：\n\n\
  ```\nimport Cocoa\nvar counter = 1\nrepeat {\n    print (\"Goodbye\")\n    counter++\n\
  } while counter <= 10\n```\n\n请注意，布尔值（`counter <= 10`）决定了 `repeat-while` 循环的运行次数，如图\
  \ 8-2 所示。同时注意 `counter++` 等同于 `counter = counter + 1`。\n\n![A978-1-4842-1233-2_8_Fig2_HTML.jpg](img/A978-1-4842-1233-2_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 在 playground 中运行 `repeat-while` 循环\n\n请记住，`while` 循环和 `repeat-while` 循环的主要区别在于：`repeat-while`\
  \ 循环至少会运行一次，而 `while` 循环可以运行零次。\n\n\n\n## 用于计数的 `for` 循环\n\n根据布尔值的不同，`while` 和 `repeat-while`\
  \ 循环可以运行多次。如果你的代码像之前的 `while` 和 `repeat-while` 循环示例那样进行计数，那么你可以指定循环重复的次数。然而，`while`\
  \ 或 `repeat-while` 循环的运行次数可能会根据其布尔值而有所不同。\n\n例如，一个 `while` 或 `repeat-while` 循环可能会要求用户输入密码。如果密码无效，循环会再次要求输入有效密码。由于你永远无法预知用户需要尝试多少次才能输入正确的密码，因此你事先无法知道一个\
  \ `while` 或 `repeat-while` 循环会运行多少次。\n\n这就是 `for` 循环的用途：按固定的次数运行。使用 `for` 循环，你需要定义以下内容：\n\
  \n*   一个计数变量\n*   计数变量的初始值\n*   计数变量的结束值，通常由比较运算符定义\n*   用于递增或递减的增量/减量值\n\n`for`\
  \ 循环的结构如下所示：\n\n```\nfor var 起始值; 布尔值; 增量值 {\n\n}\n```\n\n`起始值` 需要定义一个用于计数的变量名和一个初始值，例如\
  \ `i = 1`。\n\n`布尔值` 需要计算出一个 `true` 或 `false` 值，该值使用用于计数的变量，通常使用比较运算符。\n\n`增量值` 定义如何计数。计数通常是通过加\
  \ 1 实现的，但你可以使用更大的增量来计数，例如 5 或 10，甚至可以使用负数来逆向计数。计数通常使用递增/递减运算符（例如 `i++`）或复合赋值运算符（例如\
  \ `i += 15`）。\n\n一个典型的 `for` 循环可能如下所示：\n\n```\nfor var i = 1; i <= 10; i++ {\n\n\
  }\n```\n\n在这个 `for` 循环示例中，起始值定义了一个名为 `i` 的变量，并将其初始值设置为 1。\n\n然后，布尔值由 `i <= 10` 定义，该值使用了计数变量\
  \ `i`。\n\n增量值是 `i++`，它简单地将 `i` 变量的值加 1。\n\n现在，这个 `for` 循环从 1 开始计数，不断重复循环并将 `i` 变量加\
  \ 1，只有当布尔值 `i <= 10` 不再为真时才会停止，当 `i` 变量等于 11 时就会发生这种情况。\n\n要了解布尔值如何与 `for` 循环配合使用，请按照以下步骤操作：\n\
  \n确保 `LoopingPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\nfor var\
  \ i = 1; i <= 10; i++ {\n    print (\"问候语\")\n}\nfor var i = 21; i <= 120; i +=\
  \ 10 {\n    print (\"问候语\")\n}\n```\n\n注意，在第二个 `for` 循环中，初始起始值不是 1，并且增量计数器不是每次加\
  \ 1。然而，它仍然产生与第一个 `for` 循环完全相同的结果。在选择起始值、停止循环的布尔值以及增量计数器时，你可以根据自己的意愿随意发挥创意。不过，最好让\
  \ `for` 循环尽可能保持简单，这样它们才易于理解和修改。图 8-3 显示了这两个 `for` 循环运行的结果。\n\n![A978-1-4842-1233-2_8_Fig3_HTML.jpg](img/A978-1-4842-1233-2_8_Fig3_HTML.jpg)\n\
  \n**图 8-3.** 运行两个相同的 `for` 循环\n\n## `for-in` 语句\n\n`for` 循环根据其起始值、布尔值和增量计数器，总是按固定的次数运行。然而，你必须指定布尔值才能使\
  \ `for` 循环最终停止。\n\n由于你可能并不总是知道 `for` 循环应根据不同的数据在何时停止，Swift 还提供了 `for-in` 循环。其主要优势在于\
  \ `for-in` 循环自动知道如何计数，因此你无需指定何时停止。\n\n`for-in` 循环的结构如下所示：\n\n```\nfor 计数变量 in 列表项\
  \ {\n\n}\n```\n\n`计数变量` 对某种列表中的每一项进行计数。该列表可以是字符串或数组（你将在后面了解到）。主要思想是 `for-in` 循环自动知道如何计算列表中有多少项。\n\
  \n例如，如果你想根据字符串的长度按固定次数运行一个 `for` 循环，可以这样做：\n\n```\nlet name = \"Oscar\"\nvar nameLength\
  \ = count(name)\nfor var i = 0; i < nameLength; i++ {\n    print (\"你好\")\n}\n```\n\
  \n在这个例子中，`name` 保存了包含五个字符的字符串 `\"Oscar\"`。`nameLength` 变量统计了 `name` 变量中的字符数（即 5）。现在\
  \ `for` 循环使用 `\"Oscar\"` 字符串的长度（5）来确定运行 `for` 循环的次数。\n\n以下是等效的 `for-in` 循环的样子：\n\
  \n```\nfor name in \"Oscar\" {\n    print (\"你好\")\n}\n```\n\n注意 `for-in` 循环看起来要简洁得多。这个\
  \ `for-in` 循环根据存储在 `\"Oscar\"` 字符串中的字符数（即 5）持续运行。由于 `for-in` 循环可以自动自行计数，它减少了你需要编写的代码量，同时提高了准确性。\n\
  \n`for-in` 循环在处理数组（你将在后面了解到）时特别方便。要了解 `for-in` 循环如何工作，请按照以下步骤操作：\n\n确保 `LoopingPlayground`\
  \ 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n```\nimport Cocoa\nlet names = [\"Oscar\", \"Sally\"\
  , \"Marty\", \"Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\n图\
  \ 8-4 显示了 `for-in` 循环如何运行四次，因为 `names` 数组包含四个项。如果从该数组中添加或删除一个名字，`for-in` 循环会自动计算数组中新项的数量。\n\
  \n![A978-1-4842-1233-2_8_Fig4_HTML.jpg](img/A978-1-4842-1233-2_8_Fig4_HTML.jpg)\n\
  \n**图 8-4.** 使用 `for-in` 循环进行计数\n\n## 提前退出循环\n\n通常情况下，循环会一直运行直到布尔值发生变化。然而，你可以使用\
  \ `break` 命令提前退出循环。通常这个循环会运行四次：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\"\
  , \"Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\n如果你插入一个 `break`\
  \ 命令，可以让这个循环只运行一次后退出，如下所示：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\"\
  , \"Louis\"]\nfor person in names {\n    print (person)\n    break\n}\n```\n\n这个\
  \ `for-in` 循环将运行一次，打印名字 `\"Oscar\"`，遇到 `break` 命令，然后退出 `for-in` 循环。当然，在 `for-in`\
  \ 循环中总是放置一个 `break` 命令来提前停止它是毫无意义的，因此更常见的是将 `break` 命令与分支语句结合使用。这样，如果某个布尔值为真，循环就会提前退出。否则，循环会继续运行。\n\
  \n要了解如何提前退出循环，请按照以下步骤操作：\n\n确保 `LoopingPlayground` 文件已加载到 Xcode 中。按如下方式编辑代码：\n\n\
  ```\nimport Cocoa\nlet employees = [\"Fred\", \"Jane\", \"Sam\", \"Kelly\"]\nfor\
  \ person in employees {\n    if person == \"Sam\" {\n        print (person)\n  \
  \      break\n    }\n    print (person)\n}\n```\n\n这个 `for-in` 循环通常会运行四次，因为 `employees`\
  \ 数组包含四个名字。然而，一旦 `for-in` 循环找到名字 `\"Sam\"`，它就会打印该名字，遇到 `break` 命令，并提前退出 `for-in`\
  \ 循环，因此它只运行了两次，如图 8-5 所示。\n\n![A978-1-4842-1233-2_8_Fig5_HTML.jpg](img/A978-1-4842-1233-2_8_Fig5_HTML.jpg)\n\
  \n**图 8-5.** 使用 `break` 命令提前退出循环\n\n\n\n## 在 OS X 程序中使用循环\n\n在这个示例程序中，计算机会在 1 到\
  \ 10 之间随机选择一个数字。现在用户必须猜出这个数字。为了防止用户猜出 1 到 10 范围之外的数字，用户界面将允许用户通过滑块选择数值。\n\n每次用户猜错时，标签会显示提示信息，告知猜测值过高或过低。当用户猜对数字时，一个循环会打印出每次猜测的列表，并在警告对话框中显示。\n\
