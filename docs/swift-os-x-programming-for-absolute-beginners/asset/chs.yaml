  \ ➤ Quit StoryProgram。\n\n## 总结\n\n创建用户界面并将其存储在多个 `.xib` 文件中，或存储在包含多个场景的单个 `.storyboard`\
  \ 文件中。要打开和关闭不同的 `.xib` 文件，你必须编写 Swift 代码。要在故事板中打开一个场景，只需从某个场景的按钮 `Control`-拖拽到另一个场景即可。\n\
  \n要使打开的第二个场景关闭，你必须编写 Swift 代码。你还需要使用 Swift 代码来在场景之间传输数据。当你在场景之间传输数据时，可以使用 `representedObject`\
  \ 属性。要访问 `representedObject` 属性中的任何值，你必须解包它，并将其强制转换或转化为特定的数据类型。\n\n故事板允许你定义构成程序用户界面的场景出现的顺序。为了便于查看整个故事板，你可以调整缩放比例以缩小或放大故事板。但是，当你想在故事板场景上放置项目时，必须将缩放比例放大到\
  \ 100%。\n\n当你在故事板中添加额外的场景时，你需要创建控制这些场景的 Swift 文件。这些 Swift 文件必须是 `NSViewController`\
  \ 类，然后你必须将你的场景连接到该 Swift 文件。\n\n设计程序用户界面涉及使用 `.xib` 或 `.storyboard` 文件，或两者的组合。故事板减少了编写\
  \ Swift 代码的需求，但无论使用哪种类型的文件，你仍然需要编写 Swift 代码来使你的用户界面完全正常工作。\n\n"
- "# 15. 用按钮选择命令\n\n**电子补充材料** 本章的在线版本 (doi:[10.​1007/​978-1-4842-1233-2_​15](http://dx.doi.org/10.1007/978-1-4842-1233-2_15))\
  \ 包含补充材料，可供授权用户使用。\n\n每个程序都需要为用户提供控制计算机的方式。在过去，这意味着要知道如何输入正确的命令来使程序运行，但在今天的图形用户界面中，控制程序更简单的方式是从可用命令列表中进行选择。向程序发出命令最简单的方法是通过按钮。\n\
  \n通过在屏幕上显示多个按钮，用户界面随时为用户提供多种选择。用户不需要记忆晦涩的命令，只需通过鼠标指向并点击来选择命令即可。\n\nXcode 提供了多种不同类型的按钮，你可以将其放置在用户界面上，但它们的工作方式都是相同的。一个按钮代表一个命令，点击该按钮会运行存储在\
  \ `IBAction` 方法中的 Swift 代码。\n\n要使用按钮，只需将它们放置在用户界面（可以是 `.xib` 或 `.storyboard` 文件）上，修改标签以显示你希望按钮代表的命令，然后通过\
  \ `IBAction` 方法将按钮连接到 Swift 代码。\n\n所有按钮都基于 Cocoa 框架中定义的 `NSButton` 类。虽然大多数按钮显示可以包含按钮所代表命令的文本，但有些按钮根本不显示文本。尽管外观上存在差异，但所有按钮的工作方式相同，并且可以随时更改为另一种按钮类型。可用的不同按钮类型如图\
  \ 15-1 所示：\n\n![A978-1-4842-1233-2_15_Fig1_HTML.jpg](img/A978-1-4842-1233-2_15_Fig1_HTML.jpg)\n\
  \n**图 15-1.** 可以放置在用户界面上的不同类型的按钮\n\n*   **推送按钮** (Push Button)\n*   **渐变按钮** (Gradient\
  \ Button)\n*   **圆角矩形按钮** (Rounded Rect Button)\n*   **圆角纹理按钮** (Rounded Textured\
  \ Button)\n*   **纹理按钮** (Textured Button)\n*   **凹入按钮** (Recessed Button)\n*   **展开三角形**（不显示文本）(Disclosure\
  \ Triangle)\n*   **方形按钮**（不显示文本）(Square Button)\n*   **帮助按钮**（不显示文本）(Help Button)\n\
  *   **展开按钮**（不显示文本）(Disclosure Button)\n*   **圆形按钮**（不显示文本）(Round Button)\n*   **斜面按钮**（不显示文本）(Bevel\
  \ Button)\n*   **内联按钮** (Inline Button)\n\n没有标题的按钮占用空间更小，但可能看起来令人费解，因为用户不知道那个按钮可能有什么作用。方形按钮和斜面按钮通常用于显示代表命令的图片。\n\
  \n\n\n### 修改按钮上的文本\n\n对于显示文本的按钮，Xcode 提供了两种修改按钮文本的方式：\n\n-   直接双击按钮文本进行编辑。\n-  \
