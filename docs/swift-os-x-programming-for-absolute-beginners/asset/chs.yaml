  \n**图 17-4.** NumberProgram 的用户界面\n\n32. `AppDelegate.swift`中的`IBOutlet`行应如下所示：\n\
  \n```\n@IBOutlet weak var popUpChoice: NSPopUpButton!\n@IBOutlet weak var textBox:\
  \ NSTextField!\n@IBOutlet weak var labelResult: NSTextField!\n@IBOutlet weak var\
  \ numberFormat: NSNumberFormatter!\n```\n\n33. 点击隐藏文档大纲图标以隐藏文档大纲。\n34. 将鼠标指针移到推送按钮上，按住`Control`键，然后拖到`AppDelegate.swift`文件底部最后一个花括号上方。\n\
  35. 松开`Control`键和鼠标按钮。将出现一个弹出窗口。\n36. 点击**连接**弹出菜单，并选择**动作**。\n37. 点击**名称**文本字段，输入`showResults`。\n\
  38. 点击**类型**弹出菜单，选择`NSButton`，然后点击**连接**按钮。`Xcode`会创建一个空的`IBAction`方法。\n39. 按如下方式修改`IBAction`方法。\n\
  \n\n\n`@IBAction func showResults(sender: NSButton) {`\n\n`if popUpChoice.titleOfSelectedItem!\
  \ == \"None\" {`\n\n`numberFormat.numberStyle = NSNumberFormatterStyle.NoStyle`\n\
  \n`} else if popUpChoice.titleOfSelectedItem! == \"Decimal\" {`\n\n`numberFormat.numberStyle\
  \ = NSNumberFormatterStyle.DecimalStyle`\n\n`} else if popUpChoice.titleOfSelectedItem!\
  \ == \"Currency\" {`\n\n`numberFormat.numberStyle = NSNumberFormatterStyle.CurrencyStyle`\n\
  \n`} else if popUpChoice.titleOfSelectedItem! == \"Percent\" {`\n\n`numberFormat.numberStyle\
  \ = NSNumberFormatterStyle.PercentStyle`\n\n`} else if popUpChoice.titleOfSelectedItem!\
  \ == \"Scientific\" {`\n\n`numberFormat.numberStyle = NSNumberFormatterStyle.ScientificStyle`\n\
  \n`} else if popUpChoice.titleOfSelectedItem! == \"Spell Out\" {`\n\n`numberFormat.numberStyle\
  \ = NSNumberFormatterStyle.SpellOutStyle`\n\n`}`\n\n`labelResult.stringValue = String(stringInterpolationSegment:\
  \ textBox.doubleValue)`\n\n`}`\n\n选择“产品”➤“运行”。您的用户界面会显示出来。点击弹出按钮，选择“Decimal”（十进制），在文本字段中输入一个十进制数，然后点击“Push\
  \ Button”（下压按钮）。标签将显示文本字段数值格式化器所包含的结果。点击弹出按钮，选择“Currency”（货币），在文本字段中输入 $4.56，然后点击“Push\
  \ Button”。标签将显示 4.56。点击弹出按钮，选择“Percent”（百分比），在文本字段中输入 25%，然后点击“Push Button”。标签将显示\
  \ 0.25。点击弹出按钮，选择“Scientific”（科学计数），在文本字段中输入 1.2E3，然后点击“Push Button”。标签将显示 1200.0。点击弹出按钮，选择“Spell\
  \ Out”（拼写输出），在文本字段中输入 forty-five，然后点击“Push Button”。标签将显示 45.0。选择“NumberProgram”➤“退出\
  \ NumberProgram”。\n\n上述 IBAction 方法中的 Swift 代码使用了 `titleOfSelectedItem` 属性来判断用户选择了哪个选项。然后它使用多个\
  \ `if-else if` 语句来更改数值格式化器的 `numberStyle` 属性。\n\n弹出按钮让您可以选择不同的数值格式样式，这样当您在文本字段中输入格式化数字时，就能看到它们的工作效果。通过选择不同的格式样式，您可以观察文本字段如何让您输入不同格式的数字，例如\
  \ 25%（会被转换为 0.25）或 1.2E3（会被转换为 1200.0）。\n\n### 使用安全文本字段、搜索字段和令牌字段\n\n安全文本字段在用户输入时，会用圆点隐藏文本。这对于掩盖实际文本（如密码、信用卡号或其他敏感信息）非常有用。除了屏蔽输入内容外，安全文本字段的工作方式与普通文本字段完全相同，您可以使用\
  \ `intValue`、`floatValue`、`doubleValue` 或 `stringValue` 属性来获取输入的值。\n\n搜索文本字段的外观类似于浏览器中常见的搜索字段，它带有一个放大镜图标和一个可以一键删除搜索字段中文本的关闭图标。每次用户在搜索字段中输入内容并按回车键时，搜索字段都会将文本存储为列表，保存在\
  \ `recentSearches` 属性中。\n\n通过访问这个 `recentSearches` 属性，您可以查看用户之前在该搜索字段中输入的所有内容的列表。\n\
  \n令牌字段允许您输入文本，然后将该文本封装在一个令牌中。尽管令牌的外观特殊，您仍然可以通过访问 `stringValue` 属性来获取令牌字段的文本。\n\n\
