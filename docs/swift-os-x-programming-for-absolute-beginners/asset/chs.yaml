  \ 会创建一个空的`IBAction`方法。\n\n将鼠标指针移到`Delete First Item`按钮上，按住`Control`键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标，会弹出一个窗口。点击`Connection`弹出菜单，选择`Action`。点击`Name`文本字段，输入`deleteFirstItem`。点击`Type`弹出菜单，选择`NSButton`。然后点击`Connect`按钮。Xcode\
  \ 会创建一个空的`IBAction`方法。\n\n将鼠标指针移到`Add New List`按钮上，按住`Control`键，然后将鼠标拖到`AppDelegate.swift`文件底部最后一个花括号的上方。松开`Control`键和鼠标，会弹出一个窗口。点击`Connection`弹出菜单，选择`Action`。点击`Name`文本字段，输入`addList`。点击`Type`弹出菜单，选择`NSButton`。然后点击`Connect`按钮。Xcode\
