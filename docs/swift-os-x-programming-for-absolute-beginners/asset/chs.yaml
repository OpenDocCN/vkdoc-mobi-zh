  \ 按钮。你现在应该拥有以下代表用户界面上所有标签的 `IBOutlets`：\n\n```\n@IBOutlet weak var window: NSWindow!\n\
  @IBOutlet weak var ObjectOne: NSTextField!\n@IBOutlet weak var ObjectTwo: NSTextField!\n\
