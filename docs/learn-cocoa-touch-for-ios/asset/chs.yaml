  \ action。这样，我们的用户界面设置就完成了；让我们进入实现部分。\n\n由于我们要将视图控制器嵌入到导航控制器中，我们需要修改应用委托的实现。打开其实现文件（`LCTAppDelegate.m`），并通过添加粗体显示的行并删除被划掉的行来修改`application:didFinishLaunchingWithOptions:`方法：\n\
