- '# 关于作者


  **Jeff Kelley** 从 iPhone OS 2 时代就开始为 iPhone 编程，并亲眼见证其演变为我们今天所熟知和喜爱的 iOS。Jeff 为各行各业、大大小小的客户开发了数十款应用，同时也为自己开发了多款应用。他早在小学时就开始使用
  BASIC 编程，职业生涯起步于教育行业的 Mac IT 领域。如今，他全职从事 iOS 编程，并在各大会议及当地 CocoaHeads 分会发表演讲。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


