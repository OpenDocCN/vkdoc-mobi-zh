  \n使用键值观察（KVO）是控制应用数据流转的绝佳方式。通过 KVO 来更新 UI 元素，可以将更新模型对象的代码与更新 UI 的代码解耦；现在设置好这些表格视图单元格后，我们可以随意修改\
  \ `Possession` 类的实例，而无需再去手动更新表格视图单元格。不过我们仍然有一个问题：新条目无法被添加。为了解决这个问题，我们可以修改详情视图控制器的代理方法，以通知表格视图这些变更。打开\
  \ `PossessionListViewController.m`，并按如下方式修改 `possessionDetailViewController:didEditPossession:`\
  \ 方法：\n\n\n```objectivec\n- (void)possessionDetailViewController:(PossessionDetailViewController\
  \ *)detailViewController\n                  didEditPossession:(Possession *)possession\n\
  {\n    if ([_possessions containsObject:possession] == NO) {\n        [_possessions\
  \ addObject:possession];\n        NSIndexPath *newIndexPath = [NSIndexPath\n   \
  \         indexPathForRow:[_possessions indexOfObject:possession]\n            \
  \      inSection:0];\n        NSArray *indexPaths = [NSArray arrayWithObject:newIndexPath];\n\
  \        [[self tableView] insertRowsAtIndexPaths:indexPaths\n                 \
  \               withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n}\n\
  ```\n\n现在，当你添加一个新项目时，表格视图会自动为其添加一行，而无需重新加载其他行，这样效率更高。这在委托方法中效果很好，因为我们已经在这两个视图控制器之间建立了连接。如果没有这种连接，当新项目被添加时，我们又该如何得到通知呢？答案是另一种在应用中传递数据的方式：通知。\n\
  \n## 通知\n\n正如我们提到的，优秀代码设计中的一个常见模式是解耦。尽管委托协议非常适合这一点，但它们仍然要求对象与其委托之间是一对一的关系。而`通知`则允许你在整个应用中广播消息，而无需知道哪些对象正在监听。通知由\
  \ `NSNotificationCenter` 类处理，这是一个单例——即设计为只有一个实例的对象。你可以像这样访问该单例实例：\n\n```objectivec\n\
  NSNotificationCenter *nc = [NSNotificationCenter defaultCenter];\n```\n\n### 注册通知\n\
  \n与 Cocoa Touch 中的许多其他 API 一样，使用 `NSNotificationCenter` 通常需要设置一个目标（target）和一个动作（action）；在这里，观察者就是目标。要接收通知，类似于\
  \ KVO，你需要先注册它：\n\n```objectivec\nstatic NSString * const kNotificationName = @\"\
  notificationName\";\n[nc addObserver:self\n       selector:@selector(handleNotification:)\n\
  \           name:kNotificationName\n         object:nil];\n```\n\n这四个参数第一个是观察者，接着是一个选择器，指定当通知触发时要发送给观察者的消息。接下来是通知名称。这只是一个标识通知的字符串。在你自己的应用中，最好像前面\
  \ `kNotificationName` 那样将名称定义为一个字符串常量，而不是每次使用时重新输入；花几个小时追查一个 bug，最后却发现只是拼错了通知名称，这相当尴尬（虽然我没干过这种事！）。最后一个参数允许你指定要从哪个对象接收通知。通常你会在这里传入\
  \ `nil`，这会告诉 `NSNotificationCenter` 在任何对象触发通知时都发送消息。\n\n> **注意:** 就像键值观察（KVO）一样，在\
  \ `NSNotificationCenter` 的观察者被释放之前移除它非常重要，否则当已释放的对象被发送消息时，你的应用有崩溃的风险。你通常会在 `dealloc`\
  \ 方法中执行此操作。\n\n你可能已经注意到，示例代码中传递给 `NSNotificationCenter` 的选择器以冒号结尾，表示它有一个参数。该参数类型为\
  \ `NSNotification`，其中包含一些关于通知的有用信息。`通知`有三个实例方法可以用来获取这些信息：`name`，通知的名称；`object`，发布通知的对象；以及\
  \ `userInfo`，一个包含发布通知时附带的所有键值对的 `NSDictionary`。`userInfo` 字典是使用 `NSNotifications`\
  \ 最有用的特性之一，许多系统通知都通过这种方式提供有用的信息。当你创建自己的通知时，也可以构造自己的 `userInfo` 字典，以便传递所需的数据。\n\n\
  ### 发布你自己的通知\n\n当你想要发布通知时，无需自己创建 `NSNotification` 对象，只需使用 `NSNotificationCenter`\
  \ 的便捷方法之一：`postNotificationName:object:` 或 `postNotificationName:object:userInfo:`。第一个参数与注册观察者时一样，是通知的名称；第二个参数是发布通知的对象（几乎总是\
  \ `self`）。如果你愿意，也可以创建自己的通知对象；只需改用 `postNotification:` 方法即可。创建通知的代码可能如下所示：\n\n```objectivec\n\
  NSDictionary *userInfo = [NSDictionary dictionaryWithObject:@\"Fido\"\n        \
  \                                            forKey:@\"dogName\"];\n[nc postNotificationName:@\"\
  notificationName\"\n                  object:self\n                userInfo:userInfo];\n\
  ```\n\n使用通知的一个强大之处在于，你无需了解接收通知的对象。与委托消息不同，你可以让多个对象接收同一个通知，因此，如果你的应用有多个显示同一对象内容的视图控制器，你可以发送一个通知来告知它们该对象已更新。\n\
  \n### 常见的系统通知\n\n在 iOS 中，有一些非常有用的通知可供你的对象监听。其中最重要的是 `UIApplicationDidReceiveMemoryWarningNotification`，每当系统内存不足时就会发送该通知。你在视图控制器中已经见过它，但如果你在视图控制器之外有一个使用大量内存的对象（如图片缓存），就可以使用这个通知来指示何时清理该内存。另一个有用的通知是\
  \ `UIApplicationSignificantTimeChangeNotification`，它会在夏令时生效等情况下被发布。任何日历类应用都应该响应这个通知。当然，iOS\
  \ 中还有更多有用的通知，但这里仅仅罗列它们是不够的。相反，你可以参考开发者文档以获取更多详细信息。\n\n> **注意:** 从前面两个例子可以看出，Apple\
  \ 对通知名称的命名规范似乎使其尽可能长。如果你在其他平台上曾尝试在 80 或 100 字符宽的屏幕上保持代码整洁，那么在使用 Cocoa Touch 时可能很难维持这种风格。Apple\
  \ 宁可冗长也不愿模糊，因此长名称很常见。\n\n## 单例\n\n`NSNotificationCenter` 是单例的一个绝佳示例。简单来说，单例是一个设计成只有一个实例且永久存在的对象。单例对于任何为多个对象协调数据的对象都非常有用，它作为一组通用功能的单个引用点。另一个单例的例子是\
  \ `NSFileManager`，它用于访问设备的文件系统，这也是你在本章后面要做的事情。许多程序员对单例评价不高，因为过度使用它存在风险；如果你的单例从未被释放，它们会无限期地占用内存，因此使用过多会对性能产生不利影响。在\
  \ Cocoa Touch 中，单例被频繁使用，但在使用之前，请务必考虑单例在你的代码中是否合理。\n\n一个典型的单例拥有一个通过类方法访问的共享实例。一个原型单例可能看起来像这样：\n\
  \n```objectivec\n@interface Singleton : NSObject\n+ (id)sharedInstance;\n@end\n\n\
  @implementation Singleton\nstatic Singleton *_sharedInstance = nil;\n\n+ (id)sharedInstance\n\
  {\n    if (_sharedInstance == nil) {\n        _sharedInstance = [[self alloc] init];\n\
  \    }\n    return _sharedInstance;\n}\n@end\n```\n\n\n**注意：** 尽管我们在之前的代码中，在声明行将\
  \ `_sharedInstance` 初始化为 `nil`，但如果你在使用 ARC，这并非严格必要，因为默认情况下它会被初始化为 `nil`。如果你没有使用\
  \ ARC，则需要将其初始化为 `nil`，因为在声明之后，它会立即指向一个垃圾值。\n\n以这种方式创建的单例永远不会被释放，因为 `_sharedInstance`\
  \ 变量将始终持有对它的引用。借助 ARC 的弱引用，你可以将其定义为弱引用，从而允许它在不使用时被释放，但如果你的单例创建成本很高（从性能角度考虑），那么这样做可能得不偿失。\n\
  \n有些网站可能会指导你重写单例的 `retain`、`release` 和 `retainCount` 方法，以禁止创建多个实例。虽然在 ARC 下这是不可能的，因为你无法重写这些方法，但在\
  \ ARC 之前，这也并非最佳建议。有时，出于性能原因，你可能希望创建一个完全不是单例的 `NSNotificationCenter` 或 `NSFileManager`\
  \ 的独立实例；在这种情况下，使用常规的 `alloc` 和 `init` 方法返回的对象，其生命周期与任何其他对象一样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 4 章：在应用中保存内容


  单例的另一个常见用途是管理资源，例如网络连接。与其让应用中的每个视图控制器都从网络加载数据，不如通过一个集中点来管理这些操作，从而避免同时尝试加载多个连接。这对性能和电池寿命都有好处。稍后我们将介绍一些网络相关的技术。


  ## 将数据持久化到文件


  到目前为止，本章已经介绍了在应用中移动数据的各种方法。它们都有一个共同的缺点：无法以应用之外的生命周期保存数据。当你的应用退出时，键值观察通知将停止触发，系统通知无法到达你的代码，你的委托也会消失。理想情况下，你应该在应用退出前将用户数据保存到磁盘，并在应用启动时加载进来，这样用户的工作就能跨越应用会话而持久存在。有几种保存数据的方法，每种方法都有其优势和局限性。我们从最简单的方法开始：用户默认设置（User
  Defaults）。


  我们还将介绍使用归档（Archiving）将数据保存到文件，以及直接写入文件的方法。


  ### NSUserDefaults


  如果你是一位 Mac 老用户，那么你可能曾经想让某些应用启用隐藏偏好设置。例如，要在 Finder 中查看隐藏文件，技巧是打开终端并执行以下命令：`defaults
  write com.apple.finder AppleShowAllFiles TRUE`


  重启 Finder，一切就绪。Mac 上的 `defaults` 命令是与 Mac OS X 的用户默认设置系统交互，而该系统在 iOS 上也存在。在 Mac
  上，你的家目录中，应用偏好设置可以在 `~/Library/Preferences/` 目录下找到。每个文件对应一个应用的偏好设置，它们包含键-值对，就像 `NSDictionary`
  一样。`NSUserDefaults` 为你管理这些文件，让你无需手动保存、加载和管理，从而可以设置持久化的值。在 iOS 上同样简单。要将值保存到名为 `userName`
  的键中，只需调用 `NSUserDefaults` 单例：


  ```

  [[NSUserDefaults standardUserDefaults] setObject:@"Jeff" forKey:@"userName"];

  ```


  从那时起，除非你删除该键或用户删除应用，否则你可以同样轻松地随时获取 `userName` 的值：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 4 章：在应用中保存内容\n\n```\nNSString *userName = [[NSUserDefaults standardUserDefaults]\
  \ objectForKey:@\"userName\"];\n```\n\n**注意：** 如果你请求的键在用户默认设置字典中不存在，你将得到 `nil`。请务必考虑到这种可能性。\n\
  \n并非所有对象都可以使用 `NSUserDefaults` 保存。可以保存的对象包括 `NSArray`、`NSData`、`NSDate`、`NSDictionary`、`NSNumber`\
  \ 和 `NSString`。这些是 iOS 知道如何写入属性列表（Property List）的对象类型，属性列表是一种基于 XML 的特殊文件，用于编码这些对象。你刚才看到的将\
  \ `userName` 保存到用户默认设置的代码，将生成以下属性列表文件：\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n  [\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >](http://www.apple.com/DTDs/PropertyList-1.0.dtd)\n<plist version=\"1.0\">\n<dict>\n\
  \    <key>userName</key>\n    <string>Jeff</string>\n</dict>\n</plist>\n```\n\n\
  `Property list` 在此处缩写为 plist。在开头的 `<plist>` 和结尾的 `</plist>` 标签之间是一系列对象。属性列表有一个根对象，通常是一个数组或字典，此处用\
  \ `dict` 指定。字典包含键-值对，通过交替出现的 `<key>` 标签和值标签指定。由于我们指定了一个字符串，值标签是 `<string>`，但也可以出现其他类型。字典和数组可以相互嵌套。这是一个包含两个字典的数组的属性列表：\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
  \ PLIST 1.0//EN\"\n  [\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">](http://www.apple.com/DTDs/PropertyList-1.0.dtd)\n\
  <plist version=\"1.0\">\n<array>\n    <dict>\n        <key>userName</key>\n    \
  \    <string>Jeff</string>\n    </dict>\n    <dict>\n        <key>userName</key>\n\
  \        <string>Amanda</string>\n    </dict>\n</array>\n</plist>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 4 章：在应用中保存内容\n\n如你所见，两个字典在数组中依次出现。数组中的对象之间没有特殊语法，只是一系列对象。\n\n### 使用用户默认设置保存应用数据\n\
  \n让我们修改 MyStuff，使用 `NSUserDefaults` 将数据保存到磁盘。在 Xcode 中打开 `PossessionListViewController.m`。我们将在类扩展中声明两个新方法。添加以下粗体行：\n\
  \n```\n@interface PossessionListViewController() {\n    NSMutableArray *_possessions;\n\
  }\n- (void)addItemButtonPressed:(id)sender;\n- (Possession *)possessionAtIndex:(NSUInteger)index;\n\
  - (void)savePossessionsToDisk;\n- (void)loadPossessionsFromDisk;\n@end\n```\n\n\
  首先，我们将实现 `savePossessionsToUserDefaults`。由于无法将 `Possession` 对象直接保存到用户默认设置，我们将先将其转换为\
  \ `NSDictionary`。在文件的 `@implementation` 块中添加新方法：\n\n```\n- (void)savePossessionsToDisk\n\
  {\n    NSMutableArray *possessionsAsDictionaries =\n        [NSMutableArray arrayWithCapacity:[_possessions\
  \ count]];\n    for (Possession *possession in _possessions) {\n        NSDictionary\
  \ *possessionRepresentation =\n            [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \                [possession name], @\"name\",\n                [possession value],\
  \ @\"value\", nil];\n        [possessionsAsDictionaries addObject:possessionRepresentation];\n\
  \    }\n    [[NSUserDefaults standardUserDefaults] setObject:possessionsAsDictionaries\
  \ forKey:@\"possessions\"];\n    [[NSUserDefaults standardUserDefaults] synchronize];\n\
  }\n```\n\n这段代码创建了一个可变数组，其容量足以容纳每个物品。可变数组是指在创建后可以修改的数组。接下来，我们遍历物品数组。对于每个物品，我们创建一个字典，其中的键与对象的属性相匹配。然后我们将该字典添加到可变数组中，并继续处理下一个物品。全部完成后，我们将数组保存到用户默认设置数据库中，键为\
  \ `possessions`。我们将在加载方法中使用该键。最后，我们向用户默认设置单例发送 `synchronize` 方法。这会强制它将我们的更改保存到磁盘。如果你省略这一步，可能会发现在系统终止应用之前，你的更改尚未保存。\n\
  \n\n\n`NSUserDefaults` 会定期将其内存中的缓存写入文件系统。调用 `synchronize` 可以强制持久化你的更改。这在调试应用时特别有用，因为在\
  \ `NSUserDefaults` 自动保存之前，关闭 iPhone 模拟器几乎总会先退出应用。\n\n从用户默认设置加载物品的方法同样简单。在前一个方法之后添加此方法：\n\
  \n```\n- (void)loadPossessionsFromDisk\n{\n    NSArray *possessionDictionaries =\n\
  \        [[NSUserDefaults standardUserDefaults] objectForKey:@\"possessions\"];\n\
  \    _possessions = [NSMutableArray array];\n    for (NSDictionary *dictionary in\
  \ possessionDictionaries) {\n        Possession *possession = [[Possession alloc]\
  \ init];\n        [possession setName:[dictionary objectForKey:@\"name\"]];\n  \
  \      [possession setValue:[dictionary objectForKey:@\"value\"]];\n        [_possessions\
  \ addObject:possession];\n    }\n}\n```\n\n在此方法中，首先我们从 `NSUserDefaults` 加载物品数组。尽管我们是从\
  \ `NSMutableArray` 中保存的，但它实际上是以不可变数组的形式保存的。接下来，我们将 `_possessions` 设置为一个空的可变数组，以便准备加载我们的物品。我们遍历\
  \ `NSUserDefaults` 数组中的字典，为每个字典创建一个新的 `Possession` 值，从字典中填充其值，然后将其添加到我们的物品数组中。\n\
  \n现在我们已经写好了这个数组，我们需要保存它。修改 `possessionDetailViewController:didEditPossession:` 方法来保存数组：\n\
  \n```\n- (void)possessionDetailViewController:(PossessionDetailViewController\n\
  \                                          *)detailViewController\n            \
  \      didEditPossession:(Possession *)possession\n{\n    if ([_possessions containsObject:possession]\
  \ == NO) {\n        [_possessions addObject:possession];\n        NSIndexPath *newIndexPath\
  \ = [NSIndexPath indexPathForRow:[_possessions\n            indexOfObject:possession]\n\
  \                                                     inSection:0];\n        NSArray\
  \ *indexPaths = [NSArray arrayWithObject:newIndexPath];\n        [[self tableView]\
  \ insertRowsAtIndexPaths:indexPaths\n                                withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n    [self savePossessionsToDisk];\n}\n```\n\n接下来，我们需要在应用启动时加载我们的物品。修改 `initWithNibName:bundle:`\
  \ 来实现这一点，并移除之前测试数据：\n\n```\n- (id)initWithNibName:(NSString *)nibNameOrNil\n   \
  \            bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\n\
  \                           bundle:nibBundleOrNil];\n    if (self) {\n        Possession\
  \ *iPhone = [[Possession alloc] init];\n        [iPhone setName:@\"iPhone 4S\"];\n\
  \        [iPhone setValue:[NSNumber numberWithInt:649]];\n        Possession *iPad\
  \ = [[Possession alloc] init];\n        [iPad setName:@\"iPad 2\"];\n        [iPad\
  \ setValue:[NSNumber numberWithInt:499]];\n        _possessions = [NSMutableArray\
  \ arrayWithObjects:iPhone, iPad, nil];\n        [self loadPossessionsFromDisk];\n\
  \        [self setTitle:@\"我的物品\"];\n        UIBarButtonItem *addItemButton =\n\
  \            [[UIBarButtonItem alloc]\n                initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
  \                                     target:self\n                            \
  \         action:@selector(addItemButtonPressed:)];\n        [[self navigationItem]\
  \ setRightBarButtonItem:addItemButton];\n    }\n    return self;\n}\n```\n\n再次运行应用，你会注意到物品列表是空的。添加一个新物品，然后关闭\
  \ iPhone 模拟器。再次运行应用，你的物品就在那里了！现在你拥有了一个可以在不同启动间持久保存数据的应用。如果你添加了两个示例物品并检查了偏好设置文件，它会看起来像这样：\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
  \ PLIST 1.0//EN\"\n \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
  \ version=\"1.0\">\n<dict>\n    <key>possessions</key>\n    <array>\n        <dict>\n\
  \            <key>name</key>\n            <string>iPhone 4S</string>\n         \
  \   <key>value</key>\n            <integer>649</integer>\n        </dict>\n    \
  \    <dict>\n            <key>name</key>\n            <string>iPad 2</string>\n\
  \            <key>value</key>\n            <integer>499</integer>\n        </dict>\n\
  \    </array>\n</dict>\n</plist>\n```\n\n\n\n请注意，财产数组本身位于一个字典中。所有偏好设置文件的顶层对象都是一个字典。这是属性列表中嵌套结构的典型示例，因为我们在另一个字典中的一个数组里包含了两个字典。\n\
  \n使用 `NSUserDefaults` 来持久化数据虽然效果不错，但它并非为存储应用程序的所有数据而设计。如果能将我们的财产归档到单独的文件中，让 `NSUserDefaults`\
  \ 仅用于存储应用偏好设置，那会更好。实际上这相当容易实现，因为 `NSArray` 和 `NSDictionary` 均支持将其内容直接以属性列表的形式写入磁盘。不过，这仍然意味着我们无法直接保存自定义对象，因此仍需将\
  \ `Possession` 对象转换为 `NSDictionary` 对象。首先，我们需要一个保存文件的位置。在 `PossessionsListViewController.m`\
  \ 的类扩展中添加一个新的方法声明，请添加以下粗体行：\n\n```objectivec\n@interface PossessionListViewController()\
  \ {\n\nNSMutableArray *_possessions;\n\n}\n\n@property (strong) NSMutableArray *possessions;\n\
  \n- (void)addItemButtonPressed:(id)sender;\n\n- (Possession *)possessionAtIndex:(NSUInteger)index;\n\
  \n- (NSString *)possessionsArchivePath;\n\n- (void)savePossessionsToDisk;\n\n- (void)loadPossessionsFromDisk;\n\
  \n@end\n```\n\n接下来，在类实现中添加以下粗体行来实现该方法：\n\n```objectivec\n- (NSString *)possessionsArchivePath\n\
  \n{\n\nNSString *documentsPath =\n\n[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \nNSUserDomainMask,\n\nYES) objectAtIndex:0];\n\nreturn [documentsPath\n\nstringByAppendingPathComponent:@\"\
  possessions.plist\"];\n\n}\n```\n\n要将对象保存到磁盘，我们只需在已创建的临时字典数组上调用一个方法即可。修改 `savePossessionsToDisk`\
  \ 方法，删除被划掉的代码行并添加粗体行：\n\n```objectivec\n- (void)savePossessionsToDisk\n\n{\n\nNSMutableArray\
  \ *possessionsAsDictionaries =\n\n[NSMutableArray arrayWithCapacity:[_possessions\
  \ count]];\n\nfor (Possession *possession in _possessions) {\n\nNSDictionary *possessionRepresentation\
  \ =\n\n[NSDictionary dictionaryWithObjectsAndKeys:\n\n[possession name], @\"name\"\
  ,\n\n[possession value], @\"value\", nil];\n\n[possessionsAsDictionaries addObject:possessionRepresentation];\n\
  \n}\n\n[[NSUserDefaults standardUserDefaults] setObject:possessionsAsDictionaries\
  \ forKey:@\"possessions\"];\n\n[[NSUserDefaults standardUserDefaults] synchronize];\n\
  \n[possessionsAsDictionaries writeToFile:[self possessionsArchivePath]\n\natomically:YES];\n\
  \n}\n```\n\n`NSArray` 的 `writeToFile:atomically` 方法会负责为你创建一个属性列表文件。`atomically`\
  \ 参数如果传入 `YES`，则会在临时位置创建文件，待完成后将其移动到最终位置。这有助于避免在保存出错时该位置出现未完成的文件，从而防止加载文件时产生进一步的错误。\n\
  \n从该文件加载数据只需快速改动。修改 `loadPossessionsFromDisk` 方法，删除被划掉的代码行并添加粗体行：\n\n```objectivec\n\
  - (void)loadPossessionsFromDisk\n\n{\n\nNSArray *possessionDictionaries =\n\n[[NSUserDefaults\
  \ standardUserDefaults] objectForKey:@\"possessions\"];\n\nNSArray *possessionDictionaries\
  \ =\n\n[NSArray arrayWithContentsOfFile:[self possessionsArchivePath]];\n\n_possessions\
  \ = [NSMutableArray array];\n\nfor (NSDictionary *dictionary in possessionDictionaries)\
  \ {\n\nPossession *possession = [[Possession alloc] init];\n\n[possession setName:[dictionary\
  \ objectForKey:@\"name\"]];\n\n[possession setValue:[dictionary objectForKey:@\"\
  value\"]];\n\n[_possessions addObject:possession];\n\n}\n\n}\n```\n\n就这样，我们实现了向自己的文件保存和加载数据。实际上，你甚至可以在\
  \ Mac 上打开并编辑该文件。运行应用程序，向其中保存一些内容，然后退出 iPhone 模拟器。保存的文件位于你的文件系统中，但在 Lion 系统中它默认隐藏在你的\
  \ `Library` 文件夹中。\n\n\n\n在 Mac 上打开一个 Finder 窗口，选择菜单栏中的 **前往** ➔ **前往文件夹…** ，或按下\
  \ `Shift+⌘+G`；然后在弹出的对话框中输入 `~/Library/Application Support/iPhone Simulator`。选择与你使用的\
  \ iOS 版本匹配的子文件夹（如果不确定，请查看 Xcode），然后进入其中的 `Applications` 文件夹。iPhone Simulator 中的所有应用都以一个文件夹的形式呈现，其名称是一个很长且无意义的\
  \ UUID。逐一查看这些文件夹，直到找到包含 `MyStuff` 的那个。在该文件夹中，查找 `Documents` 子文件夹，你会看到 `possessions.plist`。你可以在\
  \ Xcode 中打开此文件，Xcode 提供了属性列表的编辑模式。图 4-1 显示了在 Xcode 中打开的文件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 20](img/index-104_1.jpg)\n\n**第四章：在应用中保存内容**\n\n**图 4-1.** *Xcode 的属性列表编辑器，其中打开了\
  \ `possessions.plist`*  \n你可以看到，每个字典左侧都有一个下拉元素，展开后其下列出了各个条目。对于字典，你可以在 Xcode 中编辑键、类型和值。自己试试看——修改其中一个值，保存文件，然后从\
  \ Xcode 运行你的应用。这种打开属性列表并直接编辑值的能力是一个极好的调试工具。\n\n---\n\n### `NSCoding`\n\n尽管我们的文件保存方案已经很不错，但在保存时我们仍需费周折地将对象转换为\
  \ `NSDictionary`，并在加载时从字典转换回对象。幸运的是，有一个我们可以遵循的协议——`NSCoding`——它对此有所帮助。我们仍需做一些工作，但不必创建任何临时数组或字典。让我们在\
  \ `MyStuff` 中实现 `NSCoding`，以简化文件的保存和加载过程。打开 `Possession` 的头文件 `Possession.h`，并通过添加以下粗体代码来声明你对这个协议的遵循：\n\
  \n```objectivec\n@interface Possession : NSObject <NSCoding>\n```\n\n在 `Possession.m`\
  \ 中需要实现两个方法。首先，我们将设置一些字符串常量以便引用。这些常量是我们用于将属性归档到磁盘的键。在 `implementation` 之前添加以下粗体行：\n\
  \n```objectivec\nstatic NSString * const kNameKey = @\"name\";\nstatic NSString\
  \ * const kValueKey = @\"value\";\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第四章：在应用中保存内容**\n\n```objectivec\n@implementation Possession\n```\n\n然后，我们将实现\
  \ `initWithCoder:`，该方法用于从磁盘加载对象。在实现中添加以下粗体代码：\n\n```objectivec\n- (id)initWithCoder:(NSCoder\
  \ *)aDecoder\n{\n    self = [self init];\n    if (self) {\n        [self setName:[aDecoder\
  \ decodeObjectForKey:kNameKey]];\n        [self setValue:[aDecoder decodeObjectForKey:kValueKey]];\n\
  \    }\n    return self;\n}\n```\n\n你会注意到，除了这个 `NSCoder` 参数之外，它看起来就像一个普通的 init 方法。`NSCoder`\
  \ 是一个辅助对象，负责将文件中的值传输到你的对象。保存对象则更简短。在实现中，于 `initWithCoder:` 之后添加一个 `encodeWithCoder:`\
  \ 方法，代码如下（粗体部分）：\n\n```objectivec\n- (void)encodeWithCoder:(NSCoder *)aCoder\n{\n\
  \    [aCoder encodeObject:[self name] forKey:kNameKey];\n    [aCoder encodeObject:[self\
  \ value] forKey:kValueKey];\n}\n```\n\n**注意：** 当你要将许多属性保存到磁盘时，出现拼写错误的可能性很高。建议为所有键使用字符串常量，这样即使出现拼写错误，也能保持一致性。没有任何规则要求你必须将属性保存到与其名称匹配的键上，因此如果你拼写错误，编译器不会报错。\n\
  \n要将你的对象写入磁盘，打开 `PossessionListViewController.m`，并修改 `savePossesionsToDisk` 方法：\n\
  \n```objectivec\n- (void)savePossessionsToDisk\n{\n    [NSKeyedArchiver archiveRootObject:_possessions\n\
  \                                toFile:[self possessionsArchivePath]];\n\n    NSMutableArray\
  \ *possessionsAsDictionaries =\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第四章：在应用中保存内容**\n\n```objectivec\n    [NSMutableArray arrayWithCapacity:[_possessions\
  \ count]];\n    for (Possession *possession in _possessions) {\n```\n\n\n```objectivec\n\
  NSDictionary *possessionRepresentation =\n[NSDictionary dictionaryWithObjectsAndKeys:\n\
  \ [possession name], @\"name\",\n [possession value], @\"value\", nil];\n[possessionsAsDictionaries\
  \ addObject:possessionRepresentation];\n}\n[possessionsAsDictionaries writeToFile:[self\
  \ possessionsArchivePath]\n                           atomically:YES];\n}\n```\n\
  \n这里引入了 `NSKeyedArchiver` 对象，你可以将其与任何遵循 `NSCoding` 协议的类配合使用。当我们向它传递财产数组时，它会简单地遍历这些财产，并使用我们编写的\
  \ `NSCoding` 方法将它们归档到文件中。正如你所见，用这种方法写入文件所需的代码量大幅减少了。从文件加载对象的情况也类似。按如下方式修改 `loadPossessionsFromDisk`\
  \ 方法：\n\n```objectivec\n- (void)loadPossessionsFromDisk\n{\n    NSArray *possessionDictionaries\
  \ =\n        [NSArray arrayWithContentsOfFile:[self possessionsArchivePath]];\n\
  \    _possessions = [NSMutableArray array];\n    _possessions = [NSKeyedUnarchiver\
  \ unarchiveObjectWithFile:[self\n        possessionsArchivePath]];\n    if (_possessions\
  \ == nil) {\n        _possessions = [NSMutableArray array];\n    }\n    for (NSDictionary\
  \ *dictionary in possessionDictionaries) {\n        Possession *possession = [[Possession\
  \ alloc] init];\n        [possession setName:[dictionary objectForKey:@\"name\"\
  ]];\n        [possession setValue:[dictionary objectForKey:@\"value\"]];\n     \
  \   [_possessions addObject:possession];\n    }\n}\n```\n\n这段代码也变少了，但你会注意到我们在加载后添加了一个检查，判断\
  \ `_possessions` 是否为空。如果文件不存在，`NSKeyedUnarchiver` 对象将返回 nil，在这种情况下，我们创建一个空数组，以便仍然可以向其中添加内容。如果你现在运行应用，并且之前保存过数据，应用会崩溃，因为\
  \ `possessions.plist` 中原有的内容并非 `NSKeyedUnarchiver` 所期望的格式。这对于你的应用来说是一个很好的教训：在不同版本之间，如果你更改了文件名，一定要预判到旧文件名可能存在，且其格式可能不同。为了解决这个问题，让我们将文件扩展名从\
  \ plist 改为 archive。在 `PossessionListViewController.m` 文件中，删除被划掉的行，并在 `possessionsArchivePath`\
  \ 方法中添加用粗体标记的那一行：\n\n```objectivec\n- (NSString *)possessionsArchivePath\n{\n  \
  \  NSString *documentsPath =\n        [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \                                             NSUserDomainMask,\n              \
  \                               YES) objectAtIndex:0];\n    return [documentsPath\
  \ stringByAppendingPathComponent:@\"possessions.plist\"];\n    return [documentsPath\n\
  \        stringByAppendingPathComponent:@\"possessions.archive\"];\n}\n```\n\n从技术上讲，`NSKeyedArchiver`\
  \ 保存的是一个属性列表，但你绝不会想要手动修改它。图 4-2 展示了在 Xcode 中打开的该属性列表。\n\n![图片 21](img/index-108_1.jpg)\n\
  \n**图 4-2.** *由 NSKeyedArchiver 保存的属性列表*\n\n即使你能弄清楚 Apple 用于此属性列表的格式，也无法保证它在 Mac\
  \ OS X 或 iOS 的下一个版本中不会发生大幅变化，因此试图自行解析它很可能徒劳无功。\n\n以这种方式将文件保存到磁盘的过程称为序列化。其理念是，已序列化到磁盘的对象应与从磁盘反序列化得到的对象无法区分。对于实现了\
  \ `NSCoding` 的对象来说，情况通常如此，除非你在编码时没有编码关键信息。\n\nnib 文件的工作方式也是如此；nib 只是一个包含序列化对象的 XML\
  \ 属性列表。当你在应用中从磁盘加载 nib 文件时，视图只是从文件中反序列化出来。实际上，当你在 Xcode 中使用 nib 编辑器将标签拖到视图上时，你就是在直接创建该对象，然后将其保存为一种形式，以便在应用运行时可以从中恢复。\n\
  \n## 手动文件处理\n\n使用 `NSCoding` 或属性列表对象将数据保存到磁盘具有一些重要优势。首先，这些代码经过了充分测试。由于 Apple 依赖它们来实现\
  \ iOS 框架，因此它们拥有配套的单元测试以及一整个能够修复问题的工程师团队。其次，它们是可移植的，这意味着无需将对象的二进制数据保存到文件，而是保存数据的一种表示形式，该表示形式与运行它的计算机的处理器架构无关。其中的细节相当高级，但足以让你了解：不同的处理器在内存中存储数据的方式不同，如果你试图直接按照处理器存储的方式将数据保存到磁盘，或者将数据按照处理器存储的方式传输到另一台计算机，你可能会尝试打开不符合计算机预期格式的数据。能解决这个问题的代码被称为可移植代码，而使用\
  \ `NSCoding` 方法保存数据就能实现这一点。\n\n有时，出于性能原因、为了节省磁盘空间，或者为了使用专有文件格式，你可能希望直接读写磁盘上的文件，而不使用像\
  \ `NSKeyedArchiver` 这样的高级辅助对象。为此，你可以使用 `NSFileHandle` 对象，它允许你直接读写文件中的字节。虽然通常建议使用高级\
  \ API 来保存数据，但如果你无法做到，还有其他选择。\n\n## SQLite 数据库\n\n到目前为止，我们在应用中保存内容的方式存在几个重要的缺陷。随着应用变得更加复杂，你遇到的一个更严重的问题是，模型对象将开始消耗大量内存。虽然我们的财产数组只有少量对象，但如果有用户拥有大量物品——例如数百万个——就会带来问题。到了这个地步，我们需要实现一种解决方案，既能将对象保存到磁盘，又能允许我们一次只加载一部分对象，而无需加载整个数组。我们还需要能够保存财产数组，而无需将整个数组加载到内存中。\n\
  \n解决这个问题的一种方法是将每个财产保存到自己的文件中，然后使用包含这些文件的目录作为容器，而不是使用数组。然而，更好的实现方式是使用数据库技术来存储数据，而不是使用平面文件。iOS\
  \ 原生支持 SQLite，因此如果你熟悉 SQL 数据库，就可以轻松地将该技术应用于你的 iOS 应用。这里我们不深入探讨，但在 MyStuff 中使用 SQLite\
  \ 数据库将非常容易，使我们能够使用数据库而不是属性列表来持久化数据，从而让应用能够存储更多的数据。SQLite 在性能方面也非常出色，当你的应用达到需要添加\
  \ SQLite 来扩展规模的程度时，这一点将很重要。\n\n## iOS 上的文件位置\n\n我们已经讨论了很多关于文件的内容，但并没有真正涉及这些文件放在哪里。你可能在\
  \ Finder 中查看 iPhone 模拟器的文件时，已经看到过应用文件系统层次结构的一点片段。让我们退一步，讨论一下你的 iOS 应用将如何与文件交互。需要理解的一个重要概念是，你的应用处于沙盒中：它无法访问任何其他应用的文件、密码、偏好设置或图片。你的应用被允许保存文件的位置有明确定义，每个位置都有不同的含义和约定。随你的应用一起提供的文件位于应用包中。\n\
  \n### 应用包\n\n\n"
- '# App 包


  App 包是一个目录，其中包含用户从 App Store 下载应用时附带的所有内容：图像、视频、可执行文件等等。App 包严格为只读，其完整性通过代码签名进行验证。由于代码签名的要求，更改
  App 包中的任何内容都会使代码签名失效，导致应用无法使用。要从 App 包中获取文件，可以使用 `NSBundle` 类。以下是获取 App 包中 `Catalog.pdf`
  文件路径的代码示例：


  ```

  NSString *path = [[NSBundle mainBundle] pathForResource:@"Catalog"

  ofType:@"pdf"];

  ```


  只有当你将文件包含在应用中时，从 App 包加载文件才会生效。如果你有大量文件，或者它们特别大，你可能不希望将它们包含在应用包中。还有两个主要的文件存储位置：Documents
  目录和 Caches 目录。


  ### Documents 目录


  iOS 上的 Documents 目录是存储用户生成文件的主要位置。放置在 Documents 目录中的文件会在设备使用 iCloud 或 iTunes 备份时一同备份，因此将不易重新生成的文件存储在
  Documents 中以避免丢失非常重要。要获取 Documents 目录的路径，请使用 `NSSearchPathForDirectoriesInDomains`
  函数：


  ```

  NSArray *documentsDirectories =

  NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

  NSUserDomainMask,

  YES);

  ```


  `NSSearchPathForDirectoriesInDomains` 返回一个路径数组，要获取路径，只需获取数组的第一个对象即可。第一个参数是最重要的指定项；在此例中，它指定了你正在查找
  Documents 目录。


  ### Caches 目录


  Caches 目录在几个关键方面与 Documents 目录不同。


  首先，它不会被备份。如果用户更换新手机并迁移数据，放置在 Caches 中的文件将被删除。由于这一限制，只能将可以重新创建或重新下载的文件放入 Caches 目录，因为这些文件随时可能消失。iOS
  5 增加了一项功能：当设备内存不足时，系统会自动清理缓存，这让那些依赖持久化文件的应用程序大为恼火，不过苹果后来增加了一种方法，可以标记 Caches 中的文件，使其不会被系统自动清除，这将在本书后续部分介绍。获取
  Caches 目录的方式与获取 Documents 目录类似：


  ```

  NSArray *cacheDirectories =

  NSSearchPathForDirectoriesInDomains(NSCachesDirectory,

  NSUserDomainMask,

  YES);

  ```


  与 Documents 目录一样，这会返回一个包含一个目录的数组。


  ## Core Data


  跨文件系统管理文件、在 SQLite 中操作数据库以及将对象移入和移出内存是一项繁重的工作，而且很难做到完美。你可能过于激进（或不够激进）地从内存中移除对象，数据库代码可能未充分优化，文件系统访问也可能是一团乱麻，毫无组织。数据持久化也是一个常见问题。几乎所有应用都需要管理对象、存储对象并查找对象。苹果对此问题的解决方案是
  Core Data，这是一个在 Mac OS X 和 iOS 上可用的框架，可为你管理数据持久化。Core Data 可以将应用的数据保存到 SQLite 数据库（默认方式）、XML
  或二进制格式，或者仅仅保存在内存中；Core Data 还可以自动将图像和视频等大文件保存到外部文件中，以提高数据库性能。Core Data 的核心是托管对象模型，这是一个描述数据的文档。通过使用
  Xcode 中的可视化布局，你可以定义类及它们之间的关系。例如，一个追踪图书的应用可能有一个 `Book` 类和一个 `Author` 类。使用 Core Data，你可以创建一个如图
  4-3 所示的对象关系图。


  **图 4-3.** *在 Core Data 中编辑 Book 和 Author 类*


  此配置将创建这两个类。`Book` 类将具有 `pageCount`、`synopsis` 和 `title` 属性，以及一个 `Author` 的 `NSSet`。`Author`
  类将具有 `firstName` 和 `lastName` 属性，以及一个 `Book` 的 `NSSet`。这本身就已使 Core Data 成为一个方便的工具，仅用于对象建模。Core
  Data 还为你管理对象生命周期，从创建对象到将其保存到磁盘。最后，Core Data 可以为你搜索对象，甚至自动管理表格视图以显示搜索结果。它是一个强大的工具。有关更多信息，有一些优秀的书籍介绍了
  Core Data：《More iOS 5 Development》和《Pro Core Data for iOS, Second Edition》。


  ## 总结


  在本章中，我们讨论了如何处理数据。无论你是在应用中使用键值观察来传递数据，还是发送 `NSNotification` 通知，都有多种方法可以将对象指针从 A 点传递到
  B 点。我们还讨论了使用 `NSUserDefaults` 存储偏好设置和简单的键值对以实现数据持久化。对于大量数据，我们介绍了创建属性列表，以及使用 `NSCoding`
  协议来存储归档数据。现在我们已经介绍了如何处理数据，下一章我们将介绍如何让用户与数据进行交互。


