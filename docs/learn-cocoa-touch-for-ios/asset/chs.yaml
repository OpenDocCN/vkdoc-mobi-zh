- "# 第 12 章：本地化与国际化\n\n在本书接近尾声之际，我们理应探讨一下应用程序的国际化与本地化流程。在开发应用时，你很可能使用的是母语。你可能已经在考虑支持应用的多语言功能，但事实上这只是其中一部分。这些流程还包括在开发应用时考虑用户的首选语言、货币、数字格式、日期格式以及文化习惯。在本章中，我们将介绍本地化和国际化的不同方法，以及在进行相关工作时需要考虑的一些关键因素。不过，首先让我们探讨一个更重要的问题：为什么？\n\
  \n许多开发者用英语创建应用，然后在全球的 App Store 上发布。对大多数人而言，这种做法效果不错；英语在美国以外的许多国家也广泛使用，因此在这些国家也能获得销量，但大部分销量仍来自英语国家。截至目前，App\
  \ Store 已在超过 120 个国家上线，iOS 支持超过 50 种语言。决定忽略 49 种语言并在 119 个国家销量不佳，固然能节省时间，但最终可能会让你损失金钱。对应用进行本地化能立即产生影响，甚至在应用被下载之前就已显现——因为你可以本地化\
  \ App Store 中的应用描述。如果用户能在 App Store 中读懂你的应用描述，他们就更有可能下载它。因此，遵循本章的指导原则，可以提升销量，并在全球范围内赢得更满意的用户基础。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 国际化\n\n本章首先介绍的是国际化。你可能已经熟悉本地化的概念——将应用翻译成另一种语言——但国际化比这更复杂一些。它涵盖应用中的细节：例如数字、日期和货币的表示方式。iOS\
  \ 通过语言区域（locales）来支持国际化的实现，这些语言区域将区域习惯封装在 `NSLocale` 类中。系统会跟踪用户选择的语言区域，而不是让用户在运行时选择——或者更糟，让你的应用自动检测。你可以使用\
  \ `currentLocale` 类方法来获取用户的 `NSLocale` 对象。出于测试目的，你可以在 iOS 设备或 iOS 模拟器上更改所选的语言区域。请注意，这不会影响当前正在运行的应用；若要测试更改语言区域的效果，请务必在更改前退出应用。打开“设置”应用，选择“通用”，然后点击“国际”。你将看到类似图\
  \ 12-1 的界面。语言区域可以通过点击“区域格式”行来更改，此处设置为“美国”。更改区域格式不会自动更改设备的语言，更改语言需要点击“语言”行。我们将在讨论本地化时再讨论语言更改。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 52](img/index-354_1.jpg)\n\
  \n**图 12-1.** *“通用”设置中的“国际”部分*\n\n既然我们已经了解了如何更改区域格式，下面我们来看看在呈现数据时如何使用用户的设置。\n\n\
  ### 使用数字\n\n不同地区数字的表示方式也不同。在美国表示为 1,000.42 的数字，在法国表示为 1 000,42。对于不使用阿拉伯数字的国家，同一个数字的表示方式可能完全不同。与其自行编写代码来处理这些差异，结果却可能在某些国家完全错误从而激怒用户，不如使用\
  \ `NSNumberFormatter` 类，在向用户显示数字和数字字符串（例如一百二十三）时，自动考虑用户所选的语言区域。\n\n让我们来看看如何使用 `NSNumberFormatter`。如果你查阅文档，会发现有几十个实例方法；你可以随心所欲地定制数字格式化程序的输出，但我们这里更关心的是获取语言区域的默认行为，而不是定义自定义的数字格式。要使用内置的格式化功能，只需在\
  \ `NSNumberFormatter` 对象上调用 `setNumberStyle:` 方法即可。可选值包括 `NSNumberFormatterDecimalStyle`、`NSNumberFormatterCurrencyStyle`、`NSNumberFormatterPercentStyle`、`NSNumberFormatterScientificStyle`、`NSNumberFormatterNoStyle`\
  \ 和 `NSNumberFormatterSpellOutStyle`。要使用十进制样式，可以像下面这样创建一个数字格式化程序：\n\n```\nNSNumber\
  \ *number = [NSNumber numberWithDouble:1000.42];\nNSNumberFormatter *numberFormatter\
  \ = [[NSNumberFormatter alloc] init];\n[numberFormatter setNumberStyle:NSNumberFormatterDecimalStyle];\n\
  NSString *formattedString = [numberFormatter stringFromNumber:number];\n```\n\n\
  当语言区域设置为美国时，`formattedString` 为 \"1,000.42\"。设置为法国法语时，结果为 1 000,42；而设置为德国德语时，结果为\
  \ 1.000,42。在国际化应用中，只要向用户显示数字，你都应该使用数字格式化程序。通过使用数字格式化程序，你的用户会感受到你对应用国际版本的用心，并对此表示赞赏。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n## 排版后的内容\n\n仅以适当格式显示数字还不够。如果你的应用使用了计量单位（例如重量、长度或体积），你应该使用用户习惯的单位制。为此，你可以查询\
  \ `NSLocale` 对象，以确定该区域设置是否使用公制：\n\n```\nNSLocale *locale = [NSLocale currentLocale];\n\
  \nNSNumber *usesMetricNumber = [locale objectForKey:NSLocaleUsesMetricSystem];\n\
  BOOL usesMetric = [usesMetricNumber boolValue];\n```\n\n一旦能确定是否应使用公制，你就应该（如有必要）将数值转换为用户所处的度量系统。这看似一步之遥，却能显著提升用户对应用的好感。为了演示这一点，我们来创建一个使用区域设置的示例应用。\n\
  \n#### 示例：LocaleNumbers\n\n在这个示例应用中，我们将使用当前区域设置，以用户习惯的方式正确书写数字。打开 Xcode 并选择 `File`\
  \ → `New` → `Project…`，或按下 `+Shift+N`。在 iOS 部分的最左侧列中选择 `Application`，然后在右侧选择 `Single\
  \ View Application`。点击 `Next`，然后输入 `LocaleNumbers` 作为项目名称。输入你的公司标识和类前缀（我会使用 `com.learncocoatouch`\
  \ 和 `LCT`），在 Device Family 中选择 `iPhone`，确保勾选了 `Use Automatic Reference Counting`，并取消勾选\
  \ `Use Storyboards` 和 `Include Unit Tests`。点击 `Next`，然后点击 `Create` 将项目保存到磁盘。\n\n\
  该项目的用户界面将相当简单：只包含少量标签。在 Xcode 中打开主视图控制器的用户界面文件（`LCTViewController.xib`）。通过选择 `View`\
  \ → `Utilities` → `Show Object Library` 或按下 `Control+Option+` +3 打开对象库。打开后，我们将为六种内置的\
  \ `NSNumberFormatter` 样式各添加两个标签，总共 12 个。将它们排列成六行，每行两列。为了简化操作，你可以将两个标签并排放置，按住 `Option`\
  \ 并拖拽以复制标签，这样每次可以创建两个，而非一个。双击左侧列中的标签以更改其文本；从上到下，将标签分别设置为 `NoStyle`、`DecimalStyle`、`CurrencyStyle`、`PercentStyle`、`ScientificStyle`\
  \ 和 `SpellOutStyle`。让我们将这些标签设为粗体。为方便起见，你可以一次性选中它们；在视图中的标签下方点击，然后拖拽形成一个矩形，选中其中包含的所有视图。或者，你也可以在点击标签时按住\
  \ `Shift` 或 以选择多个标签。选中全部六个标签后，通过选择 `View` → `Utilities` → `Show Attribute Inspector`\
  \ 或按下 `Option+` +4 打开属性检查器。点击字体文本框右侧带有 T 的图标以调整标签字体；在弹出的菜单中，将 `System` 改为 `System\
  \ Bold`。请注意，操作后文本的大小会增加。当你输入文本时，标签会自动调整大小。为了自动调整大小以适应新的尺寸，请在选择一个或多个标签后按下 `+=`。对于另外六个标签，我们需要做两件事：首先，选中它们全部并打开属性检查器。在\
  \ Alignment 旁边，选择对齐按钮最右侧的部分，将标签文本设置为右对齐。其次，通过选择 `View` → `Utilities` → `Show Size\
  \ Inspector` 或按下 `Option+` +5 打开尺寸检查器。在 Origin 上方，有一个包含九个点的方形。点击右上角的点，这样在改变标签大小时，标签将锚定在其框架的该角落。将\
  \ Width 上方的文本字段值改为 75，这将把标签扩展为 75 点宽。这将为它们提供足够的空间来显示内容，但最后一个对应“拼写”样式的标签除外。对于这个标签，将其拖到左侧标签的下方，并水平扩展以填充视图；这应能提供足够空间。完成后，视图应如图\
  \ 12-2 所示。\n\n![Image 53](img/index-357_1.jpg)\n\n**图 12-2.** *我们的示例项目的用户界面*\n\n\
  让我们为这些标签定义一些输出口。我们只会更改右侧的标签，因此只需要六个输出口。打开视图控制器的头文件（`LCTViewController.h`），并添加粗体显示的行：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface LCTViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *noStyleLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *decimalStyleLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *currencyStyleLabel;\n@property (weak, nonatomic) IBOutlet UILabel *percentStyleLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *scientificStyleLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *spellOutStyleLabel;\n\n@end\n```\n\n接下来，切换回用户界面（`LCTViewController.xib`）并连接输出口：按住\
  \ `Control` 并从 File’s Owner 对象拖拽到 Xcode 编辑器窗格左侧，依次连接到右侧的每个标签，为每个标签选择与左侧标签匹配的输出口。如果出错，移除输出口连接很容易。点击你出错的标签，通过选择\
  \ `View` → `Utilities` → `Show Connections Inspector` 或按下 `Option+` +6 打开连接检查器。在\
  \ Xcode 窗口右侧的实用工具窗格中，你将看到所选对象所有已连接输出口的列表。点击某个输出口中的 X 即可断开连接。所有标签正确连接后，让我们切换到实现文件（`LCTViewController.m`）。在\
  \ `@implementation` 指令之后添加粗体显示的行，以合成为我们属性生成的访问器：\n\n```\n@implementation LCTViewController\n\
  \n@synthesize noStyleLabel;\n@synthesize decimalStyleLabel;\n@synthesize currencyStyleLabel;\n\
  @synthesize percentStyleLabel;\n@synthesize scientificStyleLabel;\n@synthesize spellOutStyleLabel;\n\
  ```\n\n接下来，我们将修改 `viewDidLoad` 方法以填充这些标签。在 `viewDidLoad` 方法中添加以下粗体显示的行：\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n\n    NSNumber *number = [NSNumber\
  \ numberWithDouble:1000.42];\n    NSNumberFormatter *numberFormatter = [[NSNumberFormatter\
  \ alloc] init];\n    [numberFormatter setNumberStyle:NSNumberFormatterNoStyle];\n\
  \    [[self noStyleLabel] setText:[numberFormatter\n        stringFromNumber:number]];\n\
  ```\n\n\n```objectivec\n[numberFormatter setNumberStyle:NSNumberFormatterDecimalStyle];\n\
  \n[[self decimalStyleLabel] setText:[numberFormatter stringFromNumber:number]];\n\
  \n[numberFormatter setNumberStyle:NSNumberFormatterCurrencyStyle];\n\n[[self currencyStyleLabel]\
  \ setText:[numberFormatter stringFromNumber:number]];\n\n[numberFormatter setNumberStyle:NSNumberFormatterPercentStyle];\n\
  \n[[self percentStyleLabel] setText:[numberFormatter stringFromNumber:number]];\n\
  \n[numberFormatter setNumberStyle:NSNumberFormatterScientificStyle];\n\n[[self scientificStyleLabel]\
  \ setText:[numberFormatter stringFromNumber:number]];\n\n[numberFormatter setNumberStyle:NSNumberFormatterSpellOutStyle];\n\
  \n[[self spellOutStyleLabel] setText:[numberFormatter stringFromNumber:number]];\n\
  ```\n\n如您所见，对于每个标签，我们都将数字格式化器的样式设置为相应的样式常量，并将标签的值设置为同一个数字，并按相应样式进行格式化。构建并运行应用。您应该会看到根据您区域设置格式化后的数字。点击\
  \ Xcode 中的“停止”按钮退出应用，然后切换回 iOS 模拟器，打开“设置”，依次选择“通用”→“国际”→“区域格式”，并选择一个不同的区域。再次构建并运行应用，您将看到根据所选区域格式化后的数字。对于美国、法语（法国）和中文（中国）这三种区域设置，应用应如图\
  \ 12-3 所示。\n\n**图 12-3.** 我们的示例应用在美国区域设置（左）、法语（法国）区域设置（中）和中文（中国）区域设置（右）下的运行效果\n\n\
  如您所见，不同的数字格式化器样式对此应用中显示的数字会产生不同的效果。然而，无需编写任何特定于区域的代码，您就可以使用这些样式以用户本地格式显示数字。接下来，我们将讨论一个类似的问题及其类似的解决方案：显示日期。\n\
  \n### 使用日期\n\n正如我们使用 `NSNumberFormatter` 从表示数字的 `NSNumber` 对象生成字符串一样，我们使用 `NSDateFormatter`\
  \ 对象从表示日期的 `NSDate` 对象生成字符串。使用 `NSDateFormatter` 的方式与 `NSNumberFormatter` 类似：\n\n\
  ```objectivec\nNSDateFormatter *dateFormatter = [[NSDateFormatter alloc] init];\n\
  [dateFormatter setDateStyle:NSDateFormatterFullStyle];\nNSString *formattedDate\
  \ = [dateFormatter stringFromDate:[NSDate date]];\n```\n\n在美国区域设置下，假设当前日期为 2012\
  \ 年 4 月 4 日，则 `formattedDate` 等于 \"Wednesday, April 4, 2012\"。由于 `NSDate` 对象同样表示时间和日期，我们可以使用\
  \ `NSDateFormatter` 的 `setTimeStyle:` 实例方法来定义时间的显示方式：\n\n```objectivec\nNSDateFormatter\
  \ *dateFormatter = [[NSDateFormatter alloc] init];\n[dateFormatter setDateStyle:NSDateFormatterFullStyle];\n\
  [dateFormatter setTimeStyle:NSDateFormatterFullStyle];\nNSString *formattedDate\
  \ = [dateFormatter stringFromDate:[NSDate date]];\n```\n\n在美国区域设置下，`formattedDate`\
  \ 现在将等于 \"Monday, April 16, 2012 12:24:50 AM Eastern Daylight Time\"，当然，其中的值会根据当前日期和时间变化，并包含基于时区的夏令时调整。同样的代码，在法国区域设置下，`formattedDate`\
  \ 会变成 \"lundi 16 avril 2012 00:24:50 heure avancée de l'Est\"。而在爱尔兰（爱尔兰语）区域设置下，`formattedDate`\
  \ 则是 \"Dé Luain 16 Aibreán 2012 00:26:23 GMT-04:00\"。虽然我不会说爱尔兰语，也从未去过爱尔兰，但我可以自信地说，如果我要构建一个向用户显示日期的应用，无论用户身在何处（只要设备支持该区域设置），我都能做到。\n\
  \n格式化日期时，您可以使用的日期格式化器样式非常丰富。您可以独立设置日期和时间的样式，从而获得所需的格式。表 12-1 列出了最常用的样式，以及它们在美国区域设置下的示例结果。\n\
  \n\n\n***表 12-1.** 使用 `NSDateFormatter` 可用的日期和时间格式化样式*\n\n**日期格式化样式**\n\n**格式化后的日期和时间**\n\
  \n`NSDateFormatterShortStyle`\n\n4/4/12 11:55 PM\n\n`NSDateFormatterMediumStyle`\n\
  \n2012 年 4 月 4 日 11:55:00 PM\n\n**日期格式化样式**\n\n**格式化后的日期和时间**\n\n`NSDateFormatterLongStyle`\n\
  \n2012 年 4 月 4 日 11:56:10 PM EDT\n\n`NSDateFormatterFullStyle`\n\n2012 年 4 月 4 日星期三\
  \ 11:56:46 PM 美国东部夏令时间\n\n你也可以对日期或时间样式使用 `NSDateFormatterNoStyle`，以省略日期的相应部分。你还可以混合搭配样式；如果你想要长日期但短时间，可以相应地设置样式，最终格式化日期为“2012\
  \ 年 4 月 4 日 11:55 PM”。\n\n使用日期格式化器比尝试自行编写日期解析器要容易得多。与数字格式化器类似，它们允许你支持设备支持的任何语言环境。随着\
  \ iOS 设备在更多国家上市，Apple 的国际化和本地化团队会为操作系统添加更多语言环境和语言，让你的应用程序能够自动利用它们。\n\n**日历、日期组件和时区**\n\
  \n使用 `NSDate` 对象时可能遇到的一个潜在问题是，它表示的是时间上的一个单一时刻。它包含日、月、年，但也包含一天中的具体时间。\n\n如果你试图表示特定的日历日，这可能会成为问题；某个时区的午夜在另一个时区可能是前一天。为了解决这个问题，你可以使用\
  \ `NSCalendar` 类从日期中提取组件，或从组件创建日期。如果你想表示当前日期但不包含当前时间，可以使用以下代码从日期中提取月、日和年：\n\n```\n\
  NSDate *currentDate = [NSDate date];\nNSCalendar *currentCalendar = [NSCalendar\
  \ currentCalendar];\nNSDateComponents *dateComponents =\n[currentCalendar components:(NSYearCalendarUnit\
  \ |\nNSMonthCalendarUnit |\nNSDayCalendarUnit)\nfromDate:currentDate];\n```\n\n\
  在此示例中，`dateComponents` 对象将由 `currentCalendar` 对象创建，该对象会从 `currentDate` 设置其年、月和日值。一旦从日期获得日期组件，你就可以修改这些单独的值来创建新日期。例如，要创建一个比\
  \ `currentDate` 晚五年的 `NSDate`，你可以执行以下操作：\n\n```\nNSDateComponents *nextDateComponents\
  \ = [dateComponents copy];\n[nextDateComponents setYear:[dateComponents year] +\
  \ 5];\nNSDate *nextDate = [currentCalendar dateFromComponents:nextDateComponents];\n\
  ```\n\n再次强调，正是 `currentCalendar` 对象将日期组件中月、日、年值所指定的日期数值表示形式转换成了 `NSDate` 对象。关于此示例需要注意的一点是，它并未保留当前日期的时间；新日期将在午夜创建。对于大多数用户而言，`NSCalendar`\
  \ 的 `currentCalendar` 类方法将返回公历，但 iOS 也支持其他日历。截至 iOS 5.1，日本历和佛教历可用作系统日历，尽管其他日历也可以创建为\
  \ `NSCalendar` 对象并用于日期计算。通过使用 `currentCalendar` 方法，你可以确保日历计算（例如在当前日期上增加一个月）会按照用户的预期行为进行。你也可以使用\
  \ `NSDate` 的 `dateByAddingTimeInterval:` 方法，通过向现有日期添加适当的秒数来计算新日期，但如果你对用户的日历做出假设，可能会很快让他们感到困惑。\n\
  \n处理数字、日期等内容都是为了帮助你根据用户所在位置，向用户显示与他们相关的信息。然而，同样关键的是要考虑你从用户那里获取的数据。\n\n**处理用户输入**\n\
  \n\n\n`iOS`用户通常希望以他们阅读的语言进行书写，这看似显而易见。`iOS`设备软件键盘的一个关键优势是支持任何书面语言，甚至包括由复杂亚洲字符组成的语言。图\
  \ 12-4 展示了可供用户使用的几种不同键盘。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![Image 55](img/index-363_1.jpg)\n\n"
- '# 第 12 章：本地化与国际化


  **图 12-4.** *三种不同键盘（从左至右）：英文、法文以及手写模式下的繁体中文*


  如您所见，英文和法文键盘非常相似，但中文键盘处于手写模式，允许用户用他们的手指绘制字符。当用户有多个可用键盘时，底部行会出现一个地球图标；点击此图标可切换键盘。


  如何处理用户提供的文本取决于您，但一条通用规则是：对您使用的任何网络服务采用`UTF`编码，而非`ASCII`。`UTF`设计用于接受多语言输入。尽管这看似一个微不足道的考虑，但如果您的用户名中包含特殊`Unicode`字符，他们不会希望这些字符被您的应用弄得一团糟。


  在处理显示给用户的文本时，您还应特别小心。


  只要可能，您的应用应以其用户的母语显示内容。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 12 章：本地化与国际化


  ## 本地化


  国际化与本地化的关键区别在于：国际化使应用更具通用性，能够支持用户手机设置的任何语言环境；而本地化则在于为用户选择的语言提供替代内容。您可以为任意数量（或多或少的）语言提供内容。任何应用资源——图片、视频、文本、音频等——都可以被本地化。然而，如果您本地化了一个资源，并不意味着需要本地化所有资源。因此，如果您拥有一个在所有语言中均保持相同的公司徽标，则无需做任何额外操作来保持其一致性。


  当应用包中的任何文件被本地化时，系统会将其移动到当前所在位置的一个子文件夹中，该子文件夹以应用的开发语言命名。在本章中，我们假设开发语言为英文。要将文件标记为可本地化，请在`Xcode`的**项目导航器**中选择该文件，然后通过选择**视图**
  → **实用工具** → **显示文件检查器**或按下`⌘+Option+1`打开**文件检查器**。


  如有需要，滚动到右侧**文件检查器**中的**本地化**分组。


  默认情况下，根据您使用的应用模板，它要么为空，要么列有一种语言。图 12-5 显示了一个具有两种本地化（英文和法文）的示例图片。要将文件标记为可本地化，请点击本地化列表下方的加号（`+`）；这将自动将其移动到当前文件夹的一个子文件夹中（对于英文，该文件夹将命名为`en.lproj`）。在`Xcode`的**项目导航器**文件列表中，您不会看到此文件夹，但它确实存在，并作为包含现已本地化文件的文件夹的子文件夹被创建。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![Image 56](img/index-365_1.jpg)


  '
- "# 第 12 章：本地化与国际化\n\n**图 12-5.** *显示本地化分组的文件检查器（位于 Xcode 窗口右侧）*\n\n要查看`Xcode`如何为您重新整理文件，您可以右键点击`Xcode`文件浏览器中的文件，并选择**在访达中显示**。您应该会看到一个名称以`.lproj`结尾的文件夹，其中包含您的文件。要添加更多语言，请再次点击加号按钮；您将看到支持的语言列表。选择您想要为此文件提供另一个版本的语言，`Xcode`会将当前版本复制到相应的文件夹中。只需修改或替换该复制文件，即可为该语言提供独立的资源。\n\
  \n\n\n那么，这一切是如何运作的呢？针对每种语言和区域设置，iOS 会构建一个首选语言列表。假设一个虚构国家有两种官方语言：法语和中文。再假设一个应用程序支持法语和英语。对于设备设置为法语的用户，iOS\
  \ 会自动从 `fr.lproj` 目录加载资源，而不是 `en.lproj` 目录。由于这个虚构国家的首选语言列表同时包含法语和中文，因此如果某用户设备设置为中文，但未找到中文资源时，系统会使用法语资源。要获得这种内置的文化敏感性，你只需提供多种语言的资源即可，只要\
  \ iOS 包含对该国家的支持。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第十二章：本地化与国际化\n\
  \n使用 iOS 内置本地化工具的最大好处之一，就是你可以发布一个应用面向全球用户。无需分别发布英语版、法语版、西班牙语版、中文版和德语版，只需发布一个包含所有这些语言本地化的版本。这样做有诸多优势：首先，如果用户在其设备上切换语言（例如为了学习第二语言），你的应用会随之切换。其次，在更新应用时，你无需费心更新多个版本并等待苹果逐一审核。第三，如果只有一个应用，追踪下载数据、使用分析以及排查问题都会容易得多。\n\
  \n当你使用苹果的内置控件时，部分本地化工作会自动完成。你使用的任意系统按钮（例如“完成”按钮）都会自动翻译成用户的语言：英语的“Done”在法语中是“OK”，在德语中是“Fertig”——至少根据“完成”按钮的显示如此。类似地，为屏幕键盘上的“返回”键指定不同的值，也会使用苹果提供的翻译值。这虽然很棒，而且据我所知，苹果的翻译质量一流，但这里存在一个小风险：如果你需要在应用的其他地方翻译“完成”一词，你的翻译可能与苹果的不一致，这可能会让用户困惑。让母语使用者测试应用，并告知你翻译是否准确，这一点很重要。此外，除非你在应用中有针对目标语言的本地化资源，否则系统按钮不会自动翻译。纯英语应用会显示纯英语的按钮，但如果你提供了本地化文本，按钮也会随之本地化。\n\
  \n我们首先来详细看看最容易本地化的内容：文本。\n\n### 本地化文本\n\n文本本地化是通过一种名为字符串文件（strings file）的方式实现的。这是一种可添加到项目中的特殊资源，能让你的应用根据用户首选语言加载文本。要在\
  \ Xcode 中为应用添加字符串文件，选择 File → New → File... 或按下 `⌘+N`，在左侧栏的 iOS 下选择 Resource，然后从右侧列表中选择\
  \ Strings File。这个文件的常规名称是 `Localizable.strings`。在此文件中，你需要提供一系列字符串，这些字符串被分配给键，键本身也是字符串。在代码中，你将引用这些键，并根据需要加载对应的字符串。考虑以下创建标题为“提交”的按钮的示例：\n\
  \n```objc\nUIButton *submitButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  [submitButton setTitle:@\"Submit\"\n              forState:UIControlStateNormal];\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n注意，“Submit”这个词是硬编码的英文。在本地化过程中，你可以提取这一行并将其放入字符串文件中，或许使用标题\
  \ `SubmitButtonTitle`：\n\n```\n\"SubmitButtonTitle\" = \"Submit\";\n```\n\n现在，当我们在代码中引用\
  \ `SubmitButtonTitle` 这个键时，就会得到“Submit”（提交）这个词。\n\n\n\n"
- "# 本地化与国际化\n\n## 在代码中使用 `NSLocalizedString`\n\n为了支持多语言，请添加 `Localized.strings` 文件的本地化版本。当用户选择特定语言时，系统将使用对应的翻译文本替代默认文本。在代码中，请按如下方式使用\
  \ `NSLocalizedString` 宏：\n\n```objc\nUIButton *submitButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  [submitButton setTitle:NSLocalizedString(@\"SubmitButtonTitle\", NULL) forState:UIControlStateNormal];\n\
  ```\n\n该宏的第一个参数是键（作为 `NSString` 对象），第二个参数是可选的注释（此处省略，使用 `NULL` 代替）。返回值是来自字符串文件的本地化字符串。\n\
  \n#### 使用字符串文件的优势\n\n字符串文件的优势在于，您很可能无需自行提供所有翻译。通过将所有可本地化的内容放入一个文件，您可以将其交给翻译人员，确保他们理解任务。此外，Apple\
  \ 提供了 `genstrings` 工具，可基于您的注释自动生成这些字符串文件。最佳工作流程是：始终在代码中使用 `NSLocalizedString`，然后在本地化之前运行\
  \ `genstrings` 生成字符串文件。\n\n#### 多语言的字体支持\n\n使用多语言时，请考虑字体支持。如果您在应用中提供了自定义字体，请确保它们支持应用所使用的所有语言。\n\
  \n#### 示例：HelloLocalization\n\n让我们逐步完成一个简单的“Hello, World!”应用的本地化过程。\n\n1. 打开 Xcode，选择\
  \ **File → New → Project…**（或按下 **Command + Shift + N**）。\n2. 在 **iOS** 下，选择最左侧栏的\
  \ **Application**，然后选择右侧的 **Single View Application**。\n3. 点击 **Next**，输入 `HelloLocalization`\
  \ 作为项目名称。\n4. 输入您的公司标识符和类前缀（例如 `com.learncocoatouch` 和 `LCT`）。\n5. 将 **Device Family**\
  \ 选择为 **iPhone**，确保勾选 **Use Automatic Reference Counting**，并取消勾选 **Use Storyboards**\
  \ 和 **Include Unit Tests**。\n6. 点击 **Next**，然后 **Create** 保存项目。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n##### 构建用户界面\n\n用户界面很简单：只有一个标签。在 Xcode 中打开主视图控制器的界面文件（`LCTViewController.xib`）。通过选择\
  \ **View → Utilities → Show Object Library**（或按下 **Control + Option + Command +\
  \ 3**）打开对象库。将一个标签拖入视图中并居中。将标签展开以填满视图的宽度。\n\n通过打开视图控制器的头文件（`LCTViewController.h`）并添加以下粗体行，为这个标签添加一个输出口（outlet）：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface LCTViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *helloLabel;\n\n@end\n```\n\n回到 `LCTViewController.xib`\
  \ 并连接该输出口：按住 **Control**，从 **File's Owner** 拖到标签，然后从列表中选择 `helloLabel`。\n\n打开视图控制器的实现文件（`LCTViewController.m`）并为该标签添加一个\
  \ `@synthesize` 指令：\n\n```objc\n@implementation LCTViewController\n\n@synthesize\
  \ helloLabel;\n```\n\n在 `viewDidLoad` 中设置标签的文本：\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    [[self helloLabel] setText:NSLocalizedString(@\"helloWorld\"\
  , NULL)];\n}\n```\n\n如果现在运行应用，标签将显示 `\"helloWorld\"`，因为尚未为此键提供文本。\n\n##### 使用 `genstrings`\
  \ 生成字符串文件\n\n打开 **终端** 并导航到项目的代码目录（例如 `cd /Users/jeff/Projects/HelloLocalization/HelloLocalization`）。运行：\n\
  \n```bash\ngenstrings –o en.lproj *.m\n```\n\n这将创建一个名为 `en.lproj` 的文件夹（如果不存在），并在其中生成一个\
  \ `Localizable.strings` 文件。该文件的初始内容如下：\n\n```\n/* No comment provided by engineer.\
  \ */\n\"helloWorld\" = \"helloWorld\";\n```\n\n将 `Localizable.strings` 拖入 Xcode\
  \ 项目中的 **Supporting Files** 组。点击 **Finish**；字符串文件出现，并已设置英语本地化。在 Xcode 中打开它，删除被划掉的行，并添加粗体行：\n\
  \n```\n/* No comment provided by engineer. */\n\"helloWorld\" = \"helloWorld\";\n\
  \"helloWorld\" = \"Hello, World!\";\n```\n\n构建并运行应用。现在，对于所有语言，标签都会显示 `\"Hello, World!\"\
  `。\n\n##### 添加另一种语言（法语）\n\n要添加法语：\n\n1. 在 Xcode 的项目导航器中选择 `Localizable.strings`。\n\
  2. 打开文件检查器（**View → Utilities → Show File Inspector** 或按下 **Option + Command + 1**）。\n\
  3. 在 **Localization** 下，点击 **plus** 按钮添加新的本地化。如果文件还没有任何翻译，点击加号可能会选择另一个文件；重新选择 `Localizable.strings`\
  \ 并再次点击 **plus**。\n4. 在项目导航器中，`Localizable.strings` 旁边会出现一个箭头；点击展开以显示翻译。\n5. 选择\
  \ `Localizable.strings (French)`，删除被划掉的行，并添加粗体行：\n\n```\n/* No comment provided\
  \ by engineer. */\n\"helloWorld\" = \"Hello, World!\";\n\"helloWorld\" = \"Bonjour,\
  \ Monde!\";\n```\n\n构建并运行应用。如果您的设备语言设置为法语（或法语在 iOS 首选语言列表中排在英语之前），您将看到 `\"Bonjour,\
  \ Monde!\"`；否则将显示英语版本。\n\n要测试，请在 **设置** 应用中更改语言。请注意，更改后，设置本身也会被翻译，导致难以恢复。如果您切换到法语并卡住：\"\
  Settings\" 在法语中是 `\"Réglages\"`，路径是 **Général → International → Langue**。更改语言会终止正在运行的应用，因此您需要重新启动应用才能继续测试。\n\
  \n## 总结\n\n`genstrings` 命令简化了字符串文件的生成。任何显示给用户的文本都应来自 `NSLocalizedString()`，从而轻松实现本地化。接下来，我们将介绍如何本地化应用中的非文本部分。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 本地化资源\n\n本地化资源只需点击 **plus**\
  \ 按钮，但注意不要过度。App Store 将蜂窝网络下载限制为 50MB；如果您为每种语言包含全尺寸图像，应用的大小会迅速增加——尤其是针对第三代 iPad\
  \ Retina 显示屏的 2048×1536 图形。如果大图中只有一小部分需要更改（例如样式化标题），请考虑将其拆分为两个图像，并仅本地化标题。这将显著节省文件大小。对于捆绑的视频，请移除所有可本地化的文本，或将本地化视频托管在线上；用户不会愿意下载数\
  \ GB 的视频来获取他们不使用的语言。\n\n\n\n### 本地化 Nib 文件\n\n与其他资源一样，nib 文件也可以进行本地化。这对于德语等单词通常较长的语言尤为实用。当较长的单词需要你重新调整用户界面时，你可以只修改特定语言的\
  \ nib 文件，而无需改动其他语言的版本，从而实现针对单一语言的界面调整。要本地化一个 nib 文件，只需按照之前的方法，使用文件检查器创建另一种语言版本，然后将其中的英文文本替换为相应语言的文本。根据需要移动界面元素，保存即可完成。\n\
  \n然而，本地化 nib 文件也可能暗藏风险。你应尽量在开发周期的末期进行此操作，甚至可以考虑改用本地化字符串。设想以下场景：你开发了一款应用，并决定将其发布为五种语言版本。该应用表现良好，于是你开始更新以修复\
  \ Bug。在修复 Bug 的过程中，你需要修改某个 nib 文件中视图的属性。但由于你已经本地化了该 nib 文件，此时面临两种选择：要么在每一个 nib 文件中都进行修改，要么删除其他\
  \ nib 文件，然后基于最新更新的 nib 文件重新创建它们。无论选择哪种方式，都可能带来大量工作，因此或许应彻底避免这种情况，转而使用本地化字符串。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 12 章：本地化与国际化


  ## 章节摘要


  本地化和国际化不仅仅是简单地将应用中的英文文本替换为用户母语文本。它还涉及文化敏感性，即认识到用户希望应用能够给人一种出自其本国开发者之手的感受。如果你在应用中使用了一句习语，比如“她的面孔看起来很眼熟”（原文："her
  face rang a bell"），不要只将其翻译成另一种语言——当然更不要使用在线翻译工具来处理。同样，对于应用中的颜色、图片和音频，也需要保持文化敏感性。红色在中国是好运的象征，因此你的应用可以检测到中文区域设置并相应地调整颜色的显示方式。


  阅读完本章后，你将能够使应用从仅支持一种语言和区域设置，扩展到支持 iOS 所支持的全部语言和区域设置。这是一项关键技能，能使你的应用从单一市场发布走向全球现象级应用。这项功能很容易被忽略，但它可能是你为应用添加的最重要的功能。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 附录 A：在 iOS 设备上运行代码\n\niOS 开发意味着许多事情：充满挑战、乐趣、回报和兴奋。但有一件事它绝不是：免费的。首先，任何合法的 iOS\
  \ 开发都需要使用 Mac OS X，而这需要有一台符合苹果许可协议的 Mac 电脑。拥有 Mac 后，你可以从 Mac App Store 免费下载 Xcode。使用免费版的\
  \ Xcode，你可以尽情编写 iOS 应用，并在 iOS 模拟器中运行它们。然而，要将应用在 iOS 设备上运行，你需要成为 iOS 开发者计划的成员。\n\n\
  ## iOS 开发者计划\n\niOS 开发者计划可在 [`developer.apple.com/programs/ios`](http://developer.apple.com/programs/ios)\
  \ 查阅，它涵盖了你作为 iOS 开发者与苹果互动的多个方面。注册该计划不仅能让你获得代码级技术支持、iOS SDK 的预发布版本以及 iOS 系统本身的预发布版本，还能让你在\
  \ iOS 设备上测试代码。同时，这也是向 App Store 提交应用（无论是免费还是付费应用）的必要条件。iOS 开发者计划的会员资格每年费用为 99 美元。此外，还有\
  \ iOS 开发者企业计划，可在 [`developer.apple.com/programs/ios/enterprise/`](http://developer.apple.com/programs/ios/enterprise/)\
  \ 查阅，年费为 299 美元。这两个计划的区别在于：iOS 开发者计划允许你在最多 100 台设备上运行代码，而 iOS 开发者企业计划允许你在不限数量的设备上运行代码。如果你计划向\
  \ App Store 提交应用，需要的是非企业版计划，不过你也可以两者都购买。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n为什么在设备上运行代码必须成为 iOS 开发者计划成员？有人可能会说，这是苹果在向开发者一点点榨取费用，但在笔者看来，这种说法是有缺陷的。考虑到开发者的数量，相对于苹果的其他业务，每年\
  \ 99 美元的费用产生的收入微乎其微，在统计上几乎可以忽略不计。相反，我将这 99 美元的费用视为一种门槛：那些对 iOS 应用开发不够认真的人不会购买会员资格，从而不会为该平台制作劣质应用。要求加入\
  \ iOS 开发者计划也让苹果能够执行更严格的安全标准。为了理解为什么在开发过程中需要经历这些步骤，让我们来看看 iOS 的安全模型以及它与我们的关系。\n\n\
  ## iOS 应用安全\n\niOS 设备上的每个应用都必须拥有有效的加密签名才能运行。本书不会深入探讨涉及的加密技术细节，但请放心，这采用的是行业标准。这个加密签名有两个非常重要的特性。首先，它包含了对应用包内文件的签名；如果一个恶意用户以某种方式修改了你的应用的可执行代码，签名就会失效，设备将拒绝运行该应用。其次，用于创建加密签名的证书虽然具体指向创建该应用的开发者，但由苹果签发。如果某个恶意应用在\
  \ iOS 用户群体中造成严重破坏，苹果可以通过吊销该证书来禁用该应用，同样会导致 iOS 拒绝运行它。\n\n## 获取证书\n\n那么，如何获得一个证书呢？在\
  \ iOS 开发的早期，这是一个漫长的过程，涉及在开发者计划网站的 iOS 配置门户部分进行操作。而在 Xcode 4.3 中，这个过程完全自动化了。打开 Xcode，选择\
  \ `Window` ➤ `Organizer` 或按下 `Command+Shift+2` 打开组织器窗口。组织器窗口顶部的带状区域充当标签栏；选择 `Devices`\
  \ 部分。在屏幕左侧的 `Library` 标题下方，选择 `Provisioning Profiles`。点击屏幕底部的 `Refresh` 按钮。系统会提示你登录\
  \ iOS 开发者计划账户。如果你还没有证书，Xcode 会为你创建一个。就这样，你便完成了一个证书的创建。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## iOS 应用配置\n\n\n\n应用在设备上运行的第二个部分是它的配置文件（provisioning profile）。配置文件包含决定应用能否启动所需的两条信息：允许签署应用的证书列表，以及允许运行该应用的设备列表（通过设备的唯一标识符列出）。如果你要配置的是\
  \ App Store 或企业级应用，则无需指定单个设备，因为你的应用不会受限于特定设备。\n\n要创建配置文件，首先至少需要指定一个可以运行该应用的 iOS\
  \ 设备。这是另一个 Xcode 已经自动化了原本繁琐流程的领域。用 USB 线将 iOS 设备连接到 Mac。在 Xcode 的 Organizer 窗口中，它应该会出现在左侧边栏的`Devices`下。点击选中该设备。如果其右侧边栏旁有一个绿色圆圈，则说明它已配置为可用于开发。否则，请点击`Use\
  \ for Development`按钮。点击后，Xcode 会为你创建一个用于通用开发的配置文件，并将其安装到设备上。此时，你应该就能在设备上运行代码了！在打开项目的\
  \ Xcode 中，点击工具栏上 Scheme 上方的按钮。这会打开 Scheme 弹出菜单。如果你看到目标名称右侧有一个三角形，将鼠标光标移到它上面以展开菜单。从列表中选择你的设备名称，点击`Run`，你的代码就会为你的设备编译并运行！既然现在你能在设备上运行代码了，就可以更好地测试那些利用硬件\
  \ API（如摄像头、GPS 芯片和加速度计）的代码了。\n\n关于更多后续操作（例如向 App Store 提交应用）的信息，请参考 Apple 的文档“Tools\
  \ Workflow Guide for iOS”，该文档可在 iOS Dev Center 的`http://developer.apple.com/ios`获取。\n\
  \n`http://www.it-ebooks.info/`\n\n### 索引\n\n**A, B**\n\n**C, D, E, F**\n\n**Blocks\
  \ (代码块)**  \nCamera (摄像头)  \narrays (数组)  \ntypes, 278  \ncomparison selectors (比较选择器),\
  \ 199  \n`UIImagePickerController`  \n`NSComparator`, 200–201  \n`allowsEditing`\
  \ property, 283  \nsort descriptors (排序描述符), 199–200  \n`cameraFlashMode`, 284 \
  \ \nasynchronous callbacks (异步回调), 193–194  \ncustom overlay view (自定义覆盖视图), 279\
  \  \nblock-based methods (基于块的方法), 192  \n`mediaTypes` property, 282  \ncode, 201–203\
  \  \n`MyStuff`, 278–279  \nencapsulated functions (封装函数), 182  \nphotos (照片), 278–281\
  \  \nenumeration (枚举)  \nrear-facing and front-facing (后置和前置)  \nfast enumeration\
  \ (快速枚举), 196  \ncamera (摄像头), 280–281  \nfor loops (for 循环), 194–195  \n`UIView`\
