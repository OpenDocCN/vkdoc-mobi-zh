  \ 方法，在方法开头添加加粗的行：\n\n```\n- (void)selectVideoButtonPressed:(id)sender\n{\n    //\
  \ 如果已经存在视频播放器控制器，则进行清理。\n    if (_moviePlayerController != nil) {\n        [[_moviePlayerController\
  \ view] removeFromSuperview];\n        _moviePlayerController = nil;\n    }\n\n\
  \    // 确定我们可以从图片选择器控制器获取视频的方式。\n    BOOL canUseCamera = NO;\n    ...\n```\n\n这将防止我们在视图层次结构中同时拥有多个电影播放器控制器的视图。接下来，让我们为“播放”和“全屏”按钮添加方法。在\
  \ `showImagePickerForSourceType:` 之后、`#pragma mark` 部分之前，通过添加以下加粗代码来添加这两个方法：\n\n\
  ```\n- (void)playPauseButtonPressed:(id)sender\n{\n    if (_moviePlayerController\
  \ == nil) {\n        return;\n    }\n    if ([_moviePlayerController playbackState]\
  \ ==\n        MPMoviePlaybackStatePlaying) {\n        // 视频正在播放。\n        [_moviePlayerController\
  \ pause];\n    }\n    else {\n        // 视频未播放。\n        [_moviePlayerController\
  \ play];\n    }\n}\n\n- (void)fullscreenButtonPressed:(id)sender\n{\n    if (_moviePlayerController\
  \ == nil) {\n        return;\n    }\n    [_moviePlayerController setControlStyle:MPMovieControlStyleDefault];\n\
  \    [_moviePlayerController setFullscreen:YES animated:YES];\n}\n```\n\n在每个方法中，如果不存在电影播放器控制器，我们将立即通过调用\
  \ `return` 退出。在 `playPauseButtonPressed:` 中，如果电影播放器控制器当前正在播放，我们对其调用 `pause`；否则，我们调用\
  \ `play`。在 `fullscreenButtonPressed:` 方法中，在调用电影播放器控制器的 `setFullscreen:animated:`\
  \ 之前，我们将其控制样式设置回 `MPMovieControlStyleDefault`。如果不这样做，全屏电影将没有任何播放控件，这会使我们难以返回！现在我们已经添加了这些方法，请在支持视频录制或媒体库中有视频的设备上构建并运行此应用。按下相机按钮，选择或拍摄一个视频，然后您就可以使用“播放”按钮在视图控制器的视图中开始播放视频！如果您从库中选择了一个视频，您可能会看到一个标有“正在压缩视频…”的进度条，表示视频正在为在应用内播放进行压缩。\n\
  \n我们还要做一些事情来改善此应用的体验。电影播放器控制器在播放时会向默认的 `NSNotificationCenter` 发布通知，我们可以利用这一点来修改用户界面。修改\
  \ `initWithNibName:bundle:` 方法以监听这些通知，添加以下加粗的行：\n\n```\n- (id)initWithNibName:(NSString\
  \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\
  \ bundle:nibBundleOrNil];\n    if (self) {\n        [self setTitle:@\"CustomPlayer\"\
  ];\n        SEL selectVideoSelector = @selector(selectVideoButtonPressed:);\n  \
  \      UIBarButtonItem *selectVideoButton =\n        [[UIBarButtonItem alloc]\n\
  \         initWithBarButtonSystemItem:UIBarButtonSystemItemCamera\n         target:self\n\
  \         action:selectVideoSelector];\n        [[self navigationItem] setRightBarButtonItem:selectVideoButton];\n\
  \n        [[NSNotificationCenter defaultCenter]\n         addObserverForName:MPMoviePlayerPlaybackStateDidChangeNotification\n\
  \         object:nil\n         queue:[NSOperationQueue mainQueue]\n         usingBlock:^(NSNotification\
  \ *note) {\n            MPMoviePlayerController *moviePlayerController = [note object];\n\
  \            if ([moviePlayerController playbackState] ==\n                MPMoviePlaybackStatePlaying)\
  \ {\n                [[self playPauseButton] setTitle:@\"暂停\"\n                \
  \                        forState:UIControlStateNormal];\n            }\n      \
  \      else {\n                [[self playPauseButton] setTitle:@\"播放\"\n      \
  \                                  forState:UIControlStateNormal];\n           \
  \ }\n        }];\n\n        [[NSNotificationCenter defaultCenter]\n         addObserverForName:MPMoviePlayerDidExitFullscreenNotification\n\
  \         object:nil\n         queue:[NSOperationQueue mainQueue]\n         usingBlock:^(NSNotification\
  \ *note) {\n            MPMoviePlayerController *moviePlayerController = [note object];\n\
  \            [moviePlayerController setControlStyle:MPMovieControlStyleNone];\n\
  \        }];\n    }\n    return self;\n}\n```\n\n在这段代码中，我们响应两个通知：`MPMoviePlayerPlaybackStateDidChangeNotification`\
  \ 和 `MPMoviePlayerDidExitFullscreenNotification`。对于前者，我们修改“播放/暂停”按钮的标题；如果视频正在播放，我们将其设置为“暂停”，否则设置为“播放”。对于后者，一旦电影播放器不再全屏播放，我们将电影播放器控制样式设置回\
  \ None。由于我们已经注册接收这些通知，我们需要记住在不再需要这些通知时通知通知中心。为此，请在 `initWithNibName:bundle:` 之后添加一个\
  \ `dealloc` 方法，添加以下加粗的行：\n\n```\n- (void)dealloc\n{\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self name:nil\n                                \
  \                  object:nil];\n}\n```\n\n\n\n"
- '# 本地化与国际化


  至此，我们就完成了！你通过图像选择器选取或拍摄的任何视频，都将使用我们自定义的控件在所创建的视图控制器中播放。如果你有兼容 AirPlay 的设备，不妨在全屏模式下尝试将视频发送到该设备。通过这种技术，你可以使用自己的自定义界面将视频整合到应用中，因此你不会受到应用内置风格的限制。


  ## 总结


  本章全部围绕媒体展开，包括音频和视频。阅读本章后，你应该能够在应用中播放音频和视频。对于音频，你学习了三种不同的方式将磁盘文件中的声音传送到用户耳中；对于视频，你学会了如何在自己的界面中或使用内置控件来显示视频。运用这些技术，你将能够打造出借助媒体吸引用户注意力的丰富应用。


