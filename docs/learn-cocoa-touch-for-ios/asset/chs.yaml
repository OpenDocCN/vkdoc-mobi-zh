  别担心，我不会逐一解释每个值。前三个值 `ScaleToFill`、`ScaleAspectFit` 和 `ScaleAspectFill` 都会缩放原始内容。`ScaleToFill`
  只是将内容调整大小以完全匹配新视图，必要时会拉伸，不考虑纵横比。这对于渐变或纯色等无需保持纵横比的内容是最佳选择。`ScaleAspectFit` 和 `ScaleAspectFill`
  都会保持内容的原始纵横比。`ScaleAspectFit` 确保原始内容完整显示，如果需要会缩小，但会尽可能大地显示而不截断任何部分；任何剩余区域将由视图的背景色填充。`ScaleAspectFill`
  会调整原始内容的大小以完全填充新尺寸，必要时会截断顶部、底部或侧边。`UIViewContentModeRedraw` 强制系统为新尺寸重绘内容。这是效率最低的选择，但如果您需要重绘内容以响应尺寸变化，则非常有用。其余的内容模式在视图尺寸变化时不会调整内容大小，而是将其锚定到指定点。


  在处理图像时，内容模式最为有用。由于图像内容通常具有特定的纵横比，因此对于图像视图，通常最好使用 `UIViewContentModeScaleAspectFit`
  或 `UIViewContentModeScaleAspectFill`。


