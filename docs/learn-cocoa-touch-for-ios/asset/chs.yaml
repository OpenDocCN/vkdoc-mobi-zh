- "# 第 8 章：管理事件的发生时机\n\n到目前为止，本书中你都是以相当常规的方式让代码执行。你向对象发送消息，与该消息选择器对应的方法运行并返回，然后代码继续执行。但这仅仅触及了\
  \ Objective-C 和 Cocoa Touch 能力的皮毛；你可以稍后运行代码，同时运行两段代码，或者在特定事件发生前什么都不运行。在本章中，我们将讨论如何管理代码运行时的具体细节，并深入探讨其重要性。我们将介绍如何编写代码以充分利用最新的多核处理器，使用\
  \ *定时器* 重复执行代码，以及使用 **运行循环** 这一苹果公司高效的事件等待机制。在此过程中，我们还将涵盖诸如线程安全以及如何优化代码速度等主题。首先，让我们在更宏观的讨论背景下，回顾一下目前所做的工作。\n\
  \n## 发送消息\n\n当你向对象发送消息时，你实际上是在运行一个方法。我们从第 1 章开始就一直在发送消息，但我们并没有真正探究其运行机制。现在让我们来探究一下；了解这一点将有助于你理解后面的讨论。当你发送消息时，方法的名称被称为**选择器**。选择器由\
  \ `SEL` 数据类型表示，它只是与方法名称相对应的字符串。考虑以下发送给名为 `myArray` 的 `NSArray` 对象的消息：\n\n```\n[myArray\
  \ count]\n```\n\n此例中的选择器是 `count`。当这段代码执行时，Objective-C 运行时会在一个表中查找该方法以找到其地址。找到地址后，它便会执行该方法。这个过程会被高度缓存以提高性能，但当你第一次在某个类上调用特定方法时，它会查找该方法的地址并将其缓存起来供后续使用。\n\
  \n### 消息的底层实现\n\n方法的实现实际上是一个 C 函数。`NSArray` 的这个特定方法 `count` 返回一个无符号整数，所以你可能认为相应的\
  \ C 函数会是这样声明的：\n\n```\nNSUInteger count();\n```\n\n有趣的是，当 Objective-C 代码被编译时，这些\
  \ C 函数会在开头附加两个额外的参数：`self` 和 `_cmd`。`self` 就是你一直在使用的、用来引用正在执行方法的对象的东西，而 `_cmd` 是被执行的选择器，这对调试很有帮助。作为\
  \ C 函数的 `count` 方法会这样声明：\n\n```\nNSUInteger count(id self, SEL _cmd);\n```\n\n当该方法第一次被调用时，该函数的地址会被查找并缓存起来。\n\
  \n这为什么重要呢？在编程语言及其各自优缺点的讨论中，一个常见的说法是 Objective-C 比 C 或 C++ 慢。事实是，由于每个 Objective-C\
  \ 方法都由编译器实现为一个 C 函数，Objective-C 代码实际上非常快。话虽如此，查找函数地址的开销并非为零。考虑以下 `if` 语句：\n\n```\n\
  for (NSUInteger i = 0; i < [myArray count]; i++) {\n    NSLog(@\"%@\", [[myArray\
  \ objectAtIndex:i] description]);\n}\n\nNSUInteger count = [myArray count];\nfor\
  \ (NSUInteger i = 0; i < count; i++) {\n    NSLog(@\"%@\", [[myArray objectAtIndex:i]\
  \ description]);\n}\n```\n\n在第一个示例中，每次循环迭代时，它都会调用 `myArray` 的 `count` 方法来检查 `i`\
  \ 是否小于计数值。在第二个示例中，我们将 `count` 返回的值存储到一个临时变量中，然后在循环中与之比较。第二个示例有可能快得多，因为它不会在每次循环中都调用方法。当你编写实际的\
  \ Objective-C 代码时，一定要考虑这样的情况。本章的大部分内容将聚焦于应用的性能，但无论有多少技巧来管理代码的执行时机，慢代码终究是慢代码。\n\n\
  ### 手动执行选择器\n\n大多数 Cocoa Touch 开发人员最早学会管理代码调用时机的方法之一，就是 `UIControl` 类的**目标-动作**模式。当你将一个目标和动作传递给\
  \ `UIButton` 的实例，并将其分配给 `UIControlEventTouchUpInside` 事件时，其效果是显而易见的。你也可以通过 `NSObject`\
  \ 上的 `performSelector:` 系列方法以类似方式调用方法。下面的例子在名为 `myTableView` 的 `UITableView` 实例上调用了\
  \ `reloadData` 方法：\n\n```\n[myTableView performSelector:@selector(reloadData)];\n\
  ```\n\n现在，这本身与直接调用 `myTableView` 的 `reloadData` 方法相比并无真正优势。然而，`performSelector:`\
  \ 的一些变体开始显现其真正的威力。UIKit 类的原则之一是所有 UI 代码都应在应用的主线程上运行；也就是说，你不应该在后台线程上更新 UI（如果你不确定什么是线程，不用担心；我们将在本章后面深入讨论）。下面这行代码设置了一个标签的文本，但它是在主线程上完成的：\n\
  \n```\n[myLabel performSelectorOnMainThread:@selector(setText:)\n              \
  \        withObject:@\"Hello, World!\"\n                      waitUntilDone:NO];\n\
  ```\n\n这等同于已经在主线程上调用这行代码：\n\n```\n[myLabel setText:@\"Hello, World!\"];\n```\n\n\
  当 `waitUntilDone` 参数设置为 `NO` 时，会导致方法立即返回，这在您传递的选择器对应一个长时间运行的方法时非常有用。\n\n`performSelector:`\
  \ 中包含对象参数的变体只允许你执行带一个参数的选择器。如果你要调用的方法需要多个参数，则无法使用此方法。对于这些方法，我们将在本章后面看到更好的调用方式。\n\
  \n### 在后台调用选择器\n\n在主线程上调用方法的反面是在后台线程上调用它。如果你有一些长时间运行的任务并在主线程上调用它，它会阻塞用户界面更新，直到任务完成。为避免这种情况，你可以使用\
  \ `performSelectorInBackground:withObject:` 在后台线程上调用该任务：\n\n```\n[myObject performSelectorInBackground:@selector(longRunningTask)\
  \ withObject:nil];\n```\n\n这将在单独的线程上执行 `longRunningTask` 方法，从而允许主线程继续处理用户界面更新。但是，在从后台线程更新\
  \ UI 时务必小心；正如我们之前讨论的，始终确保 UI 更新在主线程上执行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n你的应用程序的用户界面（UI）会在任务处理时挂起。这不仅会带来糟糕的用户体验，而且如果你的应用界面挂起时间过长，系统会将其终止。如果你有长时间运行的任务，这种自动终止将迫使你采取措施。\n\
  \n我们将在本章后面讨论在后台运行代码的不同方法，但最简单的方法是使用`performSelector:`方法的另一种变体：\n\n```\n[myObject\
  \ performSelectorInBackground:@selector(longRunningTask:)\n                    \
  \      withObject:@\"foo\"];\n```\n\n这一行会在后台调用`myObject`的`longRunningTask:`方法。\n\
  \n虽然我们将在本章关于线程的部分更详细地讨论线程安全，但请确保在你于后台调用的方法中，任何 UI 更新都发生在主线程上，并使用`performSelectorOnMainThread:withObject:waitUntilDone:`，根据需要执行。\n\
  \n**延迟调用选择器**\n\n到目前为止，我们执行的所有代码都是立即运行的。\n\n但这并不总是你想要的；也许你希望向用户展示某些内容一段时间，或者你希望在一段时间后刷新显示的信息。`performSelector:`方法族中有一个方法可以在一定延迟后执行选择器：\n\
  \n```\n[myObject performSelector:@selector(update)\n              withObject:nil\n\
  \              afterDelay:5.0];\n```\n\n这一行会在五秒延迟后调用`myObject`的`update`方法（不带参数）。当你使用`performSelector:withObject:afterDelay:`时，该方法会在当前线程上被调用，因此如果你在后台调用的某个方法中调用此方法，它也会在后台运行。\n\
  \n如果你需要取消之前使用上述方法安排执行的选择器，可以使用`NSObject`类方法`cancelPreviousPerformRequestsWithTarget:selector:object:`，并传入与安排选择器时相同的参数。要取消之前的更新选择器安排，你可以这样使用该方法：\n\
  \n```\n[NSObject cancelPreviousPerformRequestsWithTarget:myObject\n            \
  \                            selector:@selector(update)\n                      \
  \                    object:nil];\n```\n\n确保这三个参数匹配非常重要，否则你安排的选择器将不会被取消。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 8 章：管理事件发生时的情况\n\n**示例：在 TwitterExample 中安排选择器**\n\nTwitter 应用的一个通用特性是，如果你让它们保持打开状态，它们会自动刷新数据。让我们使用选择器为\
  \ TwitterExample 应用添加这个功能。在 Xcode 中打开 TwitterExample 项目，并导航到时序视图控制器的实现文件（`LCTTimelineViewController.m`）。\n\
  \n为方法`reloadTweets`和`scheduleTweetRefresh`添加方法声明，添加到类扩展中，如下面粗体所示：\n\n```\n@interface\
  \ LCTTimelineViewController () {\n    NSArray *_tweets;\n}\n- (void)reloadButtonPressed:(id)sender;\n\
  - (void)reloadTweets;\n- (void)scheduleTweetRefresh;\n- (void)tweetButtonPressed:(id)sender;\n\
  @end\n```\n\n将这些方法的实现代码添加到此文件的实现部分，位于`reloadButtonPressed:`和`tweetButtonPressed:`的实现之间，如下所示：\n\
  \n```\n- (void)reloadTweets\n{\n    LCTTwitterController *twitterController = [LCTTwitterController\
  \ sharedInstance];\n    [twitterController getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n        _tweets = tweets;\n        [[self tableView] performSelectorOnMainThread:@selector(reloadData)\n\
  \                                          withObject:nil\n                    \
  \                   waitUntilDone:NO];\n        [self performSelectorOnMainThread:@selector(scheduleTweetRefresh)\n\
  \                              withObject:nil\n                           waitUntilDone:NO];\n\
  \    }];\n}\n\n- (void)scheduleTweetRefresh\n{\n    [self performSelector:@selector(reloadTweets)\n\
  \              withObject:nil\n              afterDelay:15.0];\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 8 章：管理事件发生时的情况\n\n`scheduleTweetRefresh`方法会导致`reloadTweets`方法在被调用后 15 秒运行。当`reloadTweets`方法完成时，它自己会调用`scheduleTweetRefresh`，从而导致这个循环每大约\
  \ 15 秒执行一次，具体取决于从 Twitter 获取推文所需的时间。为了让它在初始加载推文后运行，请在`viewWillAppear:`方法中添加下面粗体所示的行：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    LCTTwitterController *twitterController = [LCTTwitterController sharedInstance];\n\
  \    NSString *title = [self title];\n    [self setTitle:@\"Authorizing…\"];\n \
  \   [twitterController authorizeAccountWithCompletionHandler:^{\n        [self performSelectorOnMainThread:@selector(setTitle:)\n\
  \                              withObject:@\"Loading Tweets…\"\n               \
  \            waitUntilDone:NO];\n        [twitterController getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n            [self performSelectorOnMainThread:@selector(setTitle:)\n\
  \                                  withObject:title\n                          \
  \     waitUntilDone:NO];\n            _tweets = tweets;\n            [[self tableView]\
  \ performSelectorOnMainThread:@selector(reloadData)\n                          \
  \                    withObject:nil\n                                          \
  \ waitUntilDone:NO];\n            [self performSelectorOnMainThread:@selector(scheduleTweetRefresh)\n\
  \                                  withObject:nil\n                            \
  \   waitUntilDone:NO];\n        }];\n    }];\n}\n```\n\n现在，如果用户离开此屏幕，我们需要取消自动刷新。在`viewWillAppear:`方法之后、`viewDidUnload`方法之前，添加`viewWillDisappear:`方法的实现：\n\
  \n```\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    [NSObject cancelPreviousPerformRequestsWithTarget:self\n                  \
  \                          selector:@selector(reloadTweets)\n                  \
  \                            object:nil];\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 8 章：管理事件发生时的情况\n\n此方法将确保在时间线不可见时我们不会重新加载它。\n\n现在，构建并运行应用。每大约 15 秒，它应该会更新你的\
  \ Twitter 时间线，无需手动刷新。我们已经介绍了使用`performSelector:`方法族来控制代码何时运行，接下来让我们看看一种更简单的实现自动重载的方法：使用`NSTimer`类。\n\
  \n**使用定时器安排代码**\n\n使用`performSelector:withObject:afterDelay:`的一个缺点是，每次你想执行选择器时都需要调用该方法。在我们的\
  \ TwitterExample 应用中，每次调用`reloadTweets`，我们也都调用了`scheduleTweetRefresh`来将另一次`reloadTweets`调用加入队列。这不仅繁琐，而且会导致刷新间隔略长于\
  \ 15 秒。对于 Twitter 应用来说，精确计时并不重要，但在某些情况下，按特定间隔运行代码是很重要的。`NSTimer`类允许你安排代码运行，与`performSelector:`方法族非常相似，但其优点在于它可以按照你指定的任何间隔自动重复执行方法。你可以使用类方法`scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:`创建一个定时器，该方法会创建定时器并同时为其安排运行。要每隔\
  \ 30 秒在一个对象上调用一个名为`update:`的方法，定时器的创建代码如下：\n\n```\nNSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:30.0\n\
  \                                                   target:myObject\n          \
  \                                       selector:@selector(update:)\n          \
  \                                       userInfo:nil\n                         \
  \                         repeats:YES];\n```\n\n前三个参数相当直观：重复选择器的时间间隔（以秒为单位）、要调用选择器的目标对象以及选择器本身。此方法的参数是一个指向触发的`NSTimer`对象的指针。`userInfo`参数允许你随定时器对象传递一个任意的`NSDictionary`，如果你需要将附加数据与定时器一起传递，这将非常有用。`repeats`参数指定了定时器在触发后是否应继续重复。虽然此方法不是创建定时器的唯一方式，但它为你完成了大部分工作。当我们稍后在本章讨论运行循环时，我们将会...\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 8 章：管理事件发生时的情况\n\n\n\n## 创建 `NSTimers` 的其他方式\n\n我们还将介绍一些创建 `NSTimers` 的其他方式。如果我们想在定时器中附带一个字符串，可以像下面这样使用\
  \ `userInfo` 字典：\n\n```objectivec\nNSDictionary *userInfo = [NSDictionary dictionaryWithObject:@\"\
  foo\"\n                                                    forKey:@\"myString\"\
  ];\n\nNSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:30.0\n          \
  \                                       target:myObject\n                      \
  \                         selector:@selector(update:)\n                        \
  \                       userInfo:userInfo\n                                    \
  \            repeats:YES];\n```\n\n相应的 `update:` 方法可以像下面这样访问 `userInfo` 字典：\n\n\
  ```objectivec\n- (void)update:(NSTimer *)timer\n{\n    NSString *myString = [[timer\
  \ userInfo] objectForKey:@\"myString\"];\n    // ...\n}\n```\n\n你可以根据需要向 `userInfo`\
  \ 字典中添加任意数量的对象，从而通过定时器传递复杂的数据。\n\n如果你创建了一个重复执行的定时器，它会持续运行直到收到 `invalidate` 消息，如下所示：\n\
  \n```objectivec\n[timer invalidate];\n```\n\n如果你创建了一个不重复执行的定时器，它会在首次触发后立即自行失效。定时器调用的方法的第一个参数必须是一个指向\
  \ `NSTimer` 的指针，因为定时器会将自身作为第一个参数传递。\n\n现在，让我们修改 `TwitterExample` 项目，利用 `NSTimer`\
  \ 来实现自动刷新时间线。我们将在 `viewWillAppear:` 方法中，在时间线填入初始推文列表后创建定时器。这样就不需要 `scheduleTweetRefresh`\
  \ 方法了，同时还需要为 `reloadTweets` 方法添加一个 `NSTimer` 参数。\n\n我们还需要一个实例变量来存储指向定时器的指针。为此，按如下方式修改\
  \ `LCTTimelineViewController.m` 中的类扩展：\n\n```objectivec\n@interface LCTTimelineViewController\
  \ () {\n    NSTimer *_reloadTimer;\n    NSArray *_tweets;\n}\n\n- (void)reloadButtonPressed:(id)sender;\n\
  - (void)reloadTweets:(NSTimer *)reloadTimer;\n- (void)scheduleTweetRefresh;\n- (void)tweetButtonPressed:(id)sender;\n\
  \n@end\n```\n\n**注意：** 我们在类扩展中定义了两个私有实例变量：`_reloadTimer` 和 `_tweets`。我们也可以将它们定义为属性，而且你可能会听到更推荐这种做法的建议，因为直接访问实例变量可能导致内存管理问题。这个建议是在\
  \ ARC 出现之前提出的。然而，使用 ARC 后，编译器会确保你不会少保留对象，因此直接访问实例变量更加安全。\n\n现在你可以完全删除 `scheduleTweetRefresh`\
  \ 方法。接下来，修改 `reloadTweets` 方法，添加参数并移除对 `scheduleTweetRefresh` 的调用：\n\n```objectivec\n\
  - (void)reloadTweets:(NSTimer *)reloadTimer\n{\n    LCTTwitterController *twitterController\
  \ = [LCTTwitterController sharedInstance];\n    [twitterController getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n        _tweets = tweets;\n        [[self tableView] performSelectorOnMainThread:@selector(reloadData)\n\
  \                                          withObject:nil\n                    \
  \                   waitUntilDone:NO];\n        [self performSelectorOnMainThread:@selector(scheduleTweetRefresh)\n\
  \                              withObject:nil\n                           waitUntilDone:NO];\n\
  \    }];\n}\n```\n\n我们不再需要重新安排更新，因为我们要创建的定时器会处理所有的调度。我们将在 `viewWillAppear:` 方法中创建它，同时移除调用\
  \ `scheduleTweetRefresh` 的旧代码。按如下方式修改该方法：\n\n```objectivec\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    \n    LCTTwitterController *twitterController\
  \ = [LCTTwitterController sharedInstance];\n    NSString *title = [self title];\n\
  \    [self setTitle:@\"正在授权…\"];\n    \n    [twitterController authorizeAccountWithCompletionHandler:^{\n\
  \        [self performSelectorOnMainThread:@selector(setTitle:)\n              \
  \                withObject:@\"正在加载推文…\"\n                           waitUntilDone:NO];\n\
  \        [twitterController getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n            [self performSelectorOnMainThread:@selector(setTitle:)\n\
  \                                  withObject:title\n                          \
  \     waitUntilDone:NO];\n            _tweets = tweets;\n            [[self tableView]\
  \ performSelectorOnMainThread:@selector(reloadData)\n                          \
  \                    withObject:nil\n                                          \
  \ waitUntilDone:NO];\n            [self performSelectorOnMainThread:@selector(scheduleTweetRefresh)\n\
  \                                  withObject:nil\n                            \
  \   waitUntilDone:NO];\n            _reloadTimer = [NSTimer scheduledTimerWithTimeInterval:15.0\n\
  \                                                           target:self\n      \
  \                                                   selector:@selector(reloadTweets:)\n\
  \                                                         userInfo:nil\n       \
  \                                                   repeats:YES];\n        }];\n\
  \    }];\n}\n```\n\n最后，当视图消失时，我们需要使更新定时器失效。此时，我们将它设置为 `nil`，因为失效的定时器不能重复使用。我们还需要移除之前取消已调度选择器的旧代码。按如下方式修改\
  \ `viewWillDisappear:`：\n\n```objectivec\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    [NSObject cancelPreviousPerformRequestsWithTarget:self\n\
  \                                            selector:@selector(reloadTweets)\n\
  \                                              object:nil];\n    [_reloadTimer invalidate];\n\
  \    _reloadTimer = nil;\n}\n```\n\n构建并运行应用程序。和之前一样，它应该会自动刷新，但这次几乎正好每隔 15 秒刷新一次。\n\
  \n定时器在 Cocoa Touch 应用中非常有用。例如，如果你有一个显示倒计时的标签，就可以使用定时器定期更新标签的值。定时器的性能足以让你以非常高的频率安排它们更新。例如，对于\
  \ UI 更新，你可以将时间间隔设置为 1/60 秒，这样你的 UI 将以每秒 60 帧的速度更新；任何比这更快的更新可能都是过度的。\n\n关于重复定时器，需要注意的一个重要问题是它们不会叠加。定时器会安排代码运行，但如果代码已经安排好但尚未执行，它不会重新安排自己；一个定时器最多只能被安排运行一次。因此，定时器对于需要绝对确保代码运行特定次数的高性能场景并不适用。我们接下来会详细讨论这一点，涉及运行循环的相关内容。\n\
  \n## 运行循环\n\nCocoa Touch 应用是事件驱动应用的一个很好的例子。在大多数情况下，应用启动后会执行任何初始化所需的操作，然后……什么都不做——直到用户与之交互。没有用户交互时，应用会处于等待状态，除了某些例外情况，比如任何\
  \ `NSTimer` 对象触发时。它是如何做到这一点的呢？如果你在编写一个等待事件的系统，可能会像下面这样编写：\n\n```objectivec\nBOOL\
  \ stop = NO;\nwhile (stop == NO) {\n    BOOL result = [self eventHappened];\n  \
  \  if (result == YES) {\n        [self processEvent];\n        stop = YES;\n   \
  \ }\n}\n```\n\n这段代码会持续调用 `eventHappened` 方法来检查事件是否发生。如果发生了，它会调用其他代码；如果没有，则重复循环。虽然这段代码能工作，但效率极低。它会\
  \ 100% 处于忙碌状态，要么反复调用 `eventHappened`，要么处理事件。更快的处理器只会让 `eventHappened` 被调用更多次。更糟糕的是，这段代码会完全阻塞任何后续执行，直到\
  \ `stop` 被设置为 `YES`，因此我们无法轻松地将多个循环链式组合起来。\n\niOS 和 Mac OS X 通过使用*运行循环*来解决这个问题，它能够以更高效的方式处理事件。运行循环的动作大致如图\
  \ 8-1 所示。\n\n**图 8-1.** *运行循环的基本周期*\n\n运行循环会持续循环执行这些任务，但效率远高于简单的 `while` 循环。当它遇到用户输入或需要触发的定时器时，它会运行与该事件关联的代码，然后返回到循环的开头。所有自动释放的对象会在运行循环结束时被释放，然后循环回到开头。\n\
  \n\n\n这张图涵盖了主要部分，但运行循环中还会发生其他事情，例如网络连接接收数据和端口接收数据。不过，大多数情况下，你只需要通过添加代码来处理事件（例如按钮按下时）或创建计时器，来直接与运行循环的行为打交道。\n\
  \n你可以通过调用 `[NSRunLoop currentRunLoop]` 随时获取当前的运行循环。\n\n即使当前线程尚不存在运行循环，此方法也会创建一个。\n\
  \n这在创建计时器时非常有用。到目前为止，我们见过一些便利方法，这些方法能自动将计时器安排到当前运行循环上，但你也可以自己来实现。下面展示了如何创建一个计时器并将其安排到运行循环上：\n\
  \n```\nNSTimer *timer = [[NSTimer alloc] initWithFireDate:[[NSDate date]\ndateByAddingTimeInterval:60.0]\n\
  interval:60.0\ntarget:self\nselector:@selector(reload:)\nuserInfo:nil\nrepeats:YES];\n\
  ```\n\n`[[NSRunLoop currentRunLoop] addTimer:timer forMode:NSDefaultRunLoopMode];`\n\
  \n这里有几个新内容需要讲解。首先是 `NSDate` 对象的使用。`NSDate` 仅仅是对象中某个特定时间的表示形式。`[NSDate date]` 返回一个代表当前时间的\
  \ `NSDate` 对象。我们在之前的例子中用它来获取当前日期，然后向其发送 `dateByAddingTimeInterval:` 方法，以获取一个比当前时间提前\
  \ 60 秒的新日期。通过将这个日期设置为计时器的触发日期，我们可以控制计时器首次触发的时间。\n\n接下来，我们通过 `NSRunLoop` 的类方法 `currentRunLoop`\
  \ 获取当前运行循环，并将计时器添加到其中。模式参数定义了我们要添加计时器的运行循环模式。运行循环始终有一个模式，通常是 `NSDefaultRunLoopMode`，但有时它会切换模式，例如在积极处理用户输入时。通常，你会想要使用\
  \ `NSDefaultRunLoopMode`。\n\n在 `NSRunLoop` 上，一个值得了解的有用方法是 `runUntilDate:` 方法。假设你正在主线程上执行一个冗长复杂的计算。这会导致\
  \ UI 卡顿，但你不想这样。由于你知道用户交互是在主运行循环中处理的，你可以强制它在继续执行之前先处理这些事件。如果你需要执行某项操作 1000 次，但又希望用户界面保持响应，可以这样做：\n\
  \n```\nfor (NSUInteger i = 0; i < 1000; i++) {\n    [self performSomeTask];\n  \
  \  [[NSRunLoop currentRunLoop] runUntilDate:[NSDate date]];\n}\n```\n\n每次循环执行时，都会调用\
  \ `performSomeTask` 方法，然后运行循环开始运行。起初，传递 `[NSDate date]`（它返回当前时间）可能看起来会让运行循环立即退出，但事实并非如此；实际上，它会运行整个循环并处理在当前时间之前发生的所有事件。如果用户在\
  \ `performSomeTask` 执行期间点击了按钮或计时器触发了，这些事件会在 `runUntilDate:` 方法返回之前被处理。\n\n运行循环依赖于拥有输入源（例如\
  \ iOS 设备的屏幕，或 Mac 上的键盘和鼠标）来保持活跃。如果运行循环没有输入源或计时器，它就会退出。\n\n关于运行循环的构成还有更多内容，但这些信息已经足够满足我们的需求了。\n\
  \n当你使用 Cocoa Touch 时，运行循环会为你自动创建和销毁，因此只要你知道如何与它们交互，这就足够了。最后一个有趣的小细节是查看 iOS 程序中 `main`\
  \ 函数的实现。\n\n对于任何 iOS 应用，你都会找到一个类似如下的 `main.m` 文件：\n\n```\nint main(int argc, char\
  \ *argv[])\n{\n    @autoreleasepool {\n        return UIApplicationMain(argc, argv,\
  \ nil,\n            NSStringFromClass([LCTAppDelegate class]));\n    }\n}\n```\n\
  \n`UIApplicationMain` 函数就是开始运行你应用的函数。它会创建一个运行循环，该循环开始处理事件，并持续运行直到你的应用退出。\n\n\n\n\
  我们已经讨论过运行循环，这涵盖了大部分关于如何控制代码在单任务场景下执行的内容。然而，如今许多设备都拥有多个处理器核心，这意味着你可以同时运行多段代码！接下来，我们将探讨多线程代码的工作原理、编写方式以及如何安全地实现。\n\
  \n## 多线程代码\n\n个人电脑刚开始普及时，处理器速度以相当可预测的速度提升。通常被称为摩尔定律，其速度大约每 18 个月翻一番。然而，随着时间的推移，从处理器进步中获得的速度提升开始放缓。为了加快运行速度，处理器制造商开始制造多核处理器，让它们能同时处理多件事情。处理器不再仅仅是变得更快，而是通过增加核心数量来让你能完成更多工作。从\
  \ iPhone 4S 和第二代 iPad 开始，即便是移动设备也在 iOS 中提供了双核处理能力，让你的应用能够有效地同时利用多段代码。但这种能力并非凭空而来；为了充分利用多个处理器核心，你必须编写相应的应用代码。否则，你的应用将只能在一个核心上运行，而其他核心则闲置未用。你可以自己判断哪种选择能提供最佳用户体验。\n\
  \n### 在另一个线程上运行代码\n\n所有 Cocoa Touch 应用都从一个线程启动：主线程。这是调用 `UIApplicationMain()` 的线程，是\
  \ UI 回调（例如，表视图数据源方法）被调用的线程，也是你用来配置应用 UI 的线程。你甚至可能将应用的大部分代码都运行在主线程上；有些任务并不会从多线程中获益太多。\n\
  \n当你有一个长时间运行的任务时，不建议在主线程上执行，在某些情况下，这可能会导致系统终止你的应用。\n\n避免这种情况的最简单方法是在一个新的线程上调用你的长时间运行任务：\n\
  \n```\n[NSThread detachNewThreadSelector:@selector(longRunningTask)\n          \
  \          toTarget:self\n                  withObject:nil];\n```\n\n这相当于调用 `[self\
  \ longRunningTask]`，不同之处在于它会创建一个新线程并在其上运行 `longRunningTask` 方法。需要注意的是，当你创建一个新线程时，会为该线程创建一个新的运行循环，因为每个线程都有自己的运行循环（应用中的主运行循环只是主线程的运行循环）。因此，在使用任何会自动释放对象的函数之前，你需要创建自己的自动释放池。由于你无法确定系统框架是否会自动释放对象，最好立即执行此操作。`longRunningTask`\
  \ 应该这样实现：\n\n```\n- (void)longRunningTask\n{\n    @autoreleasepool {\n        //\
  \ 任务代码写在这里。\n    }\n}\n```\n\n通过用 `@autoreleasepool` 指令包裹方法代码，我们可以捕获此线程中任何自动释放的对象，并适当处理它们。\n\
  \n如你所见，创建一个新线程相当简单。但正确执行则需要一些工作。\n\n### 线程安全\n\n如果操作不当，在多线程上运行代码可能很危险。如果你在一个线程上写入一个整数，同时在另一个线程上读取它，那么读取操作可能返回旧值、新值，或者一个既非旧值也非新值的垃圾值，这可能导致应用崩溃或显示错误的值。编写代码来应对这些问题的概念称为线程安全。其中一项最简单的线程安全做法是在声明属性时将其声明为\
  \ `atomic`。当你这样做时（通过省略 `nonatomic` 关键字，因为没有 `atomic` 关键字），可以确保属性访问是线程安全的；如果你尝试同时进行读写操作，其中一个操作会等待另一个完成。\n\
  \n\n\n## 第八章：管理事件发生的时机\n\n仅仅做到这一点还不足以实现真正的线程安全，但它能防止你在尝试读取属性时意外覆盖它。你经常会看到人们默认使用`nonatomic`属性，因为这样能获得轻微的性能提升，但如果你在多线程环境下进行任何操作，就应该从使用`atomic`属性开始。\n\
  \n可写的`atomic`属性有一个副作用：如果你使用合成（synthesized）的 getter 方法，就无法再定义自己的 setter 方法；这样做会破坏提供线程安全的内置机制。如果你需要在设置属性时运行代码，有两个选择：使用键值观察（KVO）来监听代码的变化，或者自己编写线程安全的代码。\n\
  \n你可以合成访问器方法并使用 KVO 来避免自己编写代码。然而，如果你需要自己编写，可以使用`NSLock`类创建锁，以此来强制实现线程安全所需的同步机制。让我们考虑一个假设的类`ThreadSafeObject`，它有一个属性`name`。我们希望编写自定义的`setName:`实现，因此我们将使用锁来限制对其的访问。接口看起来像这样：\n\
  \n```\n@interface ThreadSafeObject : NSObject {\n\nNSLock *_nameLock;\n\nNSString\
  \ *_name;\n\n}\n\n@property (atomic, copy) NSString *name;\n\n@end\n```\n\n在设置或获取`name`的值之前，我们将使用`_nameLock`来确保线程安全。让我们逐步介绍`ThreadSafeObject`类的实现，从`init`方法开始：\n\
  \n```\n@implementation ThreadSafeObject\n\n- (id)init\n\n{\n\nself = [super init];\n\
  \nif (self) {\n\n_nameLock = [[NSLock alloc] init];\n\n}\n\nreturn self;\n\n}\n\
  ```\n\n如你所见，创建`_nameLock`对象很简单，不需要特殊方法；它只是一个常规的初始化。接下来是`setName:`方法：\n\n```\n- (void)setName:(NSString\
  \ *)newName\n\n{\n\n[_nameLock lock];\n\n_name = [newName copy];\n\n[_nameLock unlock];\n\
  \n}\n```\n\n当我们调用锁的`lock`方法时，如果锁是未锁定状态，`lock`方法会立即返回；如果锁已经被锁定，则会等待直到它被解锁，然后将其锁定并返回。如果有多个方法试图锁定一个已经被锁定的锁，它们会按照先到先得的原则依次锁定。关键点在于，一个锁在代码中只能在一个位置被锁定——所以完成操作后一定要解锁，否则你将无法再次使用它。接下来是我们的最后一个方法`name`：\n\
  \n```\n- (NSString *)name\n\n{\n\nNSString *nameToReturn;\n\n[_nameLock lock];\n\
  \nnameToReturn = _name;\n\n[_nameLock unlock];\n\nreturn nameToReturn;\n\n}\n\n\
  @end\n```\n\n请注意，我们不能在解锁锁之前返回，因此我们将`_name`的值存储在一个临时变量`nameToReturn`中。在这里也使用锁，完善了`name`属性的线程安全性，因为任何对`name`和`setName:`的组合调用都能成功执行，而不会相互覆盖。线程安全是一个复杂的话题，但锁和`atomic`属性是入门该领域的快速且高效的方法。\n\
  \n### 运行大量任务\n\n通过创建新线程在后台执行任务，其能力是有限的。假设你有一个包含 1000 个对象的数组，并且希望对每个对象执行一个耗时任务。你当然可以创建一个后台线程，并在该线程上遍历数组中的对象，但如果你使用的是双核设备，你可能希望一次处理两个对象来加快速度。一个简单的实现可能会为每个对象分离一个线程，就像这样：\n\
  \n```\nNSUInteger count = [myArray count];\n\nfor (NSUInteger i = 0; i < count;\
  \ i++) {\n\nid obj = [myArray objectAtIndex:i];\n\n[NSThread detachNewThreadSelector:@selector(longRunningTask)\
  \ toTarget:obj withObject:nil];\n\n}\n```\n\n\n\n这种方式的缺陷在于，我们很快就会开启 1,001 个线程。每个线程都会带来一定的内存开销，因此额外创建\
  \ 1,000 个线程成本高昂。在 iPhone 有限的资源下，还没等开启这么多线程，你的应用就会被系统终止，所以这不可行。\n\n一种略为明智的实现方式是，先获取设备中的处理器核心数量，然后保持相应数量的线程开启，每当一个任务完成时，处理数组中的下一个对象。这避免了线程过多的问题，并确保始终有任务在执行。然而，这种方法并未考虑处理器的实际繁忙程度。设备可能正在后台运行某些代码——例如检查邮件、播放音乐等——单纯用任务填满处理器反而会影响这些后台操作。\n\
  \n当你遇到这类独立任务时，无需自己编写上述代码，可以直接使用内置类 `NSOperationQueue` 将操作加入队列，由它来自动执行。你可以通过 `NSOperationQueue`\
  \ 实现之前的代码，如下所示：\n\n```\nNSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\
  NSUInteger count = [myArray count];\nfor (NSUInteger i = 0; i < count; i++) {\n\
  \    id obj = [myArray objectAtIndex:i];\n    [queue addOperationWithBlock:^{\n\
  \        [obj performLongTask];\n    }];\n}\n```\n\n使用 `NSOperationQueue` 可以让操作并发执行，同时尊重系统及其当前任务。它会根据处理器自动调整操作规模，从而减少你需要编写的代码量。\n\
  \n## 示例：Twitter 头像图片\n\n接下来，我们将运用新学到的知识，在我们的 Twitter 示例中应用它。目标是加载时间线中用户的头像图片。首先，我们采用完全初级的方式，同步加载图片。完成之后，再使用后台线程来加载，最后用操作队列来实现。\n\
  \n打开 `LCTTimeLineViewController.m`，按如下方式修改 `tableView:cellForRowAtIndexPath:` 方法：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView\n                             dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[UITableViewCell alloc]\n             \
  \   initWithStyle:UITableViewCellStyleSubtitle\n                reuseIdentifier:CellIdentifier];\n\
  \    }\n    // 配置 cell...\n    NSDictionary *tweet = [_tweets objectAtIndex:[indexPath\
  \ row]];\n    [[cell textLabel] setText:[tweet objectForKey:@\"text\"]];\n    [[cell\
  \ detailTextLabel] setText:[[tweet objectForKey:@\"user\"]\n                   \
  \                  objectForKey:@\"name\"]];\n    NSString *profileImageURI = [[tweet\
  \ objectForKey:@\"user\"]\n                                  objectForKey:@\"profile_image_url\"\
  ];\n    NSURL *profileImageURL = [NSURL URLWithString:profileImageURI];\n    NSURLRequest\
  \ *profileImageURLRequest = [NSURLRequest\n                                    \
  \        requestWithURL:profileImageURL];\n    NSURLResponse *response = nil;\n\
  \    NSError *error = nil;\n    NSData *imageData = [NSURLConnection\n         \
  \                sendSynchronousRequest:profileImageURLRequest\n               \
  \          returningResponse:&response\n                         error:&error];\n\
  \    UIImage *image = [UIImage imageWithData:imageData];\n    [[cell imageView]\
  \ setImage:image];\n    return cell;\n}\n```\n\n构建并运行应用。如果你的网络连接速度很快，可能甚至察觉不到应用为每一行加载图片时的卡顿；但如果网速较慢，你一定会明显感受到影响。与其在等待图片下载时阻塞\
  \ UI，不如使用 `NSOperationQueue` 来将图片排队下载。在 `LCTTimelineViewController.m` 文件顶部的类扩展中，为队列添加一个实例变量：\n\
  \n```\n@interface LCTTimelineViewController () {\n    NSTimer *_reloadTimer;\n \
  \   NSArray *_tweets;\n    NSOperationQueue *_profileImageQueue;\n}\n- (void)reloadButtonPressed:(id)sender;\n\
  - (void)reloadTweets:(NSTimer *)reloadTimer;\n- (void)tweetButtonPressed:(id)sender;\n\
  @end\n```\n\n\n\n接下来，我们在`initWithStyle:`方法中初始化队列：\n\n```\n- (id)initWithStyle:(UITableViewStyle)style\n\
  {\n    self = [super initWithStyle:style];\n    if (self) {\n        [self setTitle:@\"\
  Timeline\"];\n\n        UIBarButtonItem *reloadButton =\n        [[UIBarButtonItem\
  \ alloc]\n         initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh\n  \
  \       target:self\n         action:@selector(reloadButtonPressed:)];\n\n     \
  \   [[self navigationItem] setLeftBarButtonItem:reloadButton];\n\n        UIBarButtonItem\
  \ *tweetButton =\n        [[UIBarButtonItem alloc]\n         initWithBarButtonSystemItem:UIBarButtonSystemItemCompose\n\
  \         target:self\n         action:@selector(tweetButtonPressed:)];\n\n    \
  \    [[self navigationItem] setRightBarButtonItem:tweetButton];\n\n        _profileImageQueue\
  \ = [[NSOperationQueue alloc] init];\n    }\n    return self;\n}\n```\n\n可以看到，这里的设置代码并不多。接下来，我们使用操作队列来下载图片。在`tableView:cellForRowAtIndexPath:`中，按如下方式修改方法：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
  \ *cell = [tableView\n                             dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[UITableViewCell alloc]\n             \
  \   initWithStyle:UITableViewCellStyleSubtitle\n                reuseIdentifier:CellIdentifier];\n\
  \    }\n\n    // Configure the cell...\n    NSDictionary *tweet = [_tweets objectAtIndex:[indexPath\
  \ row]];\n    [[cell textLabel] setText:[tweet objectForKey:@\"text\"]];\n    [[cell\
  \ detailTextLabel] setText:[[tweet objectForKey:@\"user\"]\n                   \
  \                  objectForKey:@\"name\"]];\n\n    NSString *profileImageURI =\
  \ [[tweet objectForKey:@\"user\"]\n                                 objectForKey:@\"\
  profile_image_url\"];\n    NSURL *profileImageURL = [NSURL URLWithString:profileImageURI];\n\
  \    NSURLRequest *profileImageURLRequest = [NSURLRequest\n                    \
  \                        requestWithURL:profileImageURL];\n\n    [_profileImageQueue\
  \ addOperationWithBlock:^{\n        NSURLResponse *response = nil;\n        NSError\
  \ *error = nil;\n        NSData *imageData = [NSURLConnection\n                \
  \             sendSynchronousRequest:profileImageURLRequest\n                  \
  \           returningResponse:&response\n                             error:&error];\n\
  \        UIImage *image = [UIImage imageWithData:imageData];\n        [[cell imageView]\
  \ setImage:image];\n        [[cell imageView] performSelectorOnMainThread:@selector(setImage:)\n\
  \                                           withObject:image\n                 \
  \                       waitUntilDone:NO];\n        [cell performSelectorOnMainThread:@selector(setNeedsLayout)\n\
  \                               withObject:nil\n                            waitUntilDone:NO];\n\
  \    }];\n\n    return cell;\n}\n```\n\n可以看到，我们只是将执行网络请求的代码包装在一个 block 中，然后将该 block\
  \ 传递给操作队列。由于这个 block 不会在主线程上运行，因此我们随后在主线程上设置 cell 的 image view 中的图片，因为这是 UI 操作。接下来，我们在主线程上调用\
  \ cell 的`setNeedsLayout`。当从`tableView:cellForRowAtIndexPath:`返回 cell 时，其 image view\
  \ 还没有图片，因此我们需要调用`setNeedsLayout`来强制 cell 调整其子视图以适应图片。\n\n构建并运行应用，你会注意到表格视图单元格的内容异步加载。对于网络连接速度较慢的用户来说，这一点尤其好，因为他们在等待图片加载时仍然可以滚动表格视图。\n\
  \n现在，尽管创建自己的线程和使用操作队列可以很简单，但事实上，它们并不是最简单也不是最适合的并发代码执行方法。在 Mac OS X Snow Leopard\
  \ 和 iOS 4.0 中，Apple 引入了一个新的低级框架来管理并发性，称为 Grand Central Dispatch，它在几乎所有方面都改进了并发代码。\n\
  \n**注意：** 如果你想模拟较差的网络条件，Apple 提供了一个名为 Network Link Conditioner 的工具。它不是默认 Xcode 安装的一部分，而是一个可选的开发者工具，你可以用它来在\
  \ Mac 上模拟较差的网络。\n\n## Grand Central Dispatch\n\n\n\n一般来说，你编写的代码可以分解为离散的任务：从服务器下载图片、将\
  \ JSON 响应解析为模型对象、根据用户输入计算值等等。通过将代码分解为更小的块，可以更轻松地管理它们、编写出更好的代码，也更易于更改代码的某一部分工作方式。Apple\
  \ 的 Grand Central Dispatch 框架通过根据系统繁忙程度自动运行你的各个任务，帮助你管理代码的执行时间。\n\n就像使用 `NSOperationQueue`\
  \ 一样，你可以将单个任务添加到队列中，然后队列会执行这些任务直到全部完成。使用 Grand Central Dispatch，你将拥有比操作队列更大的灵活性。无需手动创建队列并向其添加项目，你可以根据优先级将项目添加到共享的全局队列，以及一个在主线程上运行任务的队列。我们先来看后一种情况。\n\
  \n`dispatch_async()` 函数接受一个调度队列作为第一个参数，要执行的代码块作为第二个参数。我们稍后将更详细地介绍调度队列，但目前，宏 `dispatch_get_main_queue()`\
  \ 足以在此处返回主队列。在代码块中，我们正常调用这两个方法，知道它们会在主线程上执行。\n\n当你向队列派发一个任务时，有两种方式：同步和异步。异步函数（例如\
  \ `dispatch_async()`）在调度任务后立即返回，而同步函数（例如相应的 `dispatch_sync()` 函数）会等待任务完成后再返回。\n\n\
  **注意：** 使用 Grand Central Dispatch 的同步函数时要格外小心。如果你在已经处于主队列上时，又向主队列同步派发一个任务，该任务将永远不会开始，因为主队列正在等待该任务完成。\n\
  \n你不必一定要将代码块与 Grand Central Dispatch 一起使用。如果你更愿意传递函数指针而不是代码块，替代方法 `dispatch_async_f()`\
  \ 和 `dispatch_sync_f()` 与它们基于代码块的对应方法功能相同，只是多了一个参数：一个上下文指针，该指针作为第一个参数传递给函数。编写新代码时，你通常会使用代码块，但如果你有大量兼容的\
  \ C 函数，这允许你转而使用这些函数。\n\n在 `TwitterExample` 代码中，还有几个地方可以用 Grand Central Dispatch\
  \ 替换 `performSelector:` 方法。在 `LCTTimelineViewController.m` 中，按如下方式修改 `viewWillAppear:`\
  \ 方法：\n\n```objc\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \n    LCTTwitterController *twitterController = [LCTTwitterController\n        sharedInstance];\n\
  \    NSString *title = [self title];\n    [self setTitle:@\"Authorizing…\"];\n\n\
  \    [twitterController authorizeAccountWithCompletionHandler:^{\n        [self\
  \ performSelectorOnMainThread:@selector(setTitle:)\n                           \
  \    withObject:@\"Loading Tweets…\"\n                            waitUntilDone:NO];\n\
  \        dispatch_async(dispatch_get_main_queue(), ^{\n            [self setTitle:@\"\
  Loading Tweets…\"];\n        });\n\n        [twitterController\n            getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n                [self performSelectorOnMainThread:@selector(setTitle:)\n\
  \                                       withObject:title\n```\n\n\n\n`waitUntilDone:NO`;\n\
  \n`_tweets = tweets;`\n\n`[[self tableView] performSelectorOnMainThread:@selector(reloadData)\
  \ withObject:nil waitUntilDone:NO];`\n\n```\ndispatch_async(dispatch_get_main_queue(),\
  \ ^{\n    [self setTitle:title];\n    [[self tableView] reloadData];\n});\n```\n\
  \n`_reloadTimer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self selector:@selector(reloadTweets:)\
  \ userInfo:nil repeats:YES];`\n\n"
- "# 第 8 章：掌控事件发生的时机\n\n将 `performSelectorOnMainThread:withObject:waitUntilDone:`\
  \ 的多次调用合并成一次 `dispatch_async()` 调用并非绝对必要，但依笔者之见，这种做法能让代码的可读性大大提高。\n\n### 使用全局调度队列\n\
  \n我们已经见过了调度队列的一个例子：主队列。任何与用户界面相关的方法或需要在主线程上运行的其他任务，你都可以将其分派到这个队列。对于希望在后台运行的任务，你可以使用\
  \ `dispatch_get_global_queue()` 函数获取一个全局队列，该函数接受两个参数：队列优先级和选项。第二个参数是为 Apple 未来使用预留的，因此目前只需传入\
  \ `0` 即可。\n\n第一个参数应该是以下四个常量之一，这里按优先级从高到低列出：\n\n- `DISPATCH_QUEUE_PRIORITY_HIGH`\n\
  - `DISPATCH_QUEUE_PRIORITY_DEFAULT`\n- `DISPATCH_QUEUE_PRIORITY_LOW`\n- `DISPATCH_QUEUE_PRIORITY_BACKGROUND`（适用于\
  \ iOS 5 及更高版本）\n\n获取到调度队列后，其使用方法与上一示例中的主队列完全相同。\n\n让我们修改之前的 Twitter 示例，改用调度队列而不是\
  \ `NSOperationQueue`。打开 `LCTTimelineViewController.m`，并按如下方式修改 `tableView:cellForRowAtIndexPath:`\
  \ 方法：\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n        \
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
  \ = @\"Cell\";\n    UITableViewCell *cell = [tableView\n                       \
  \      dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil)\
  \ {\n        cell = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleSubtitle\n\
  \                reuseIdentifier:CellIdentifier];\n    }\n\n    // 配置单元格...\n  \
  \  NSDictionary *tweet = [_tweets objectAtIndex:[indexPath row]];\n    [[cell textLabel]\
  \ setText:[tweet objectForKey:@\"text\"]];\n    [[cell detailTextLabel] setText:[[tweet\
  \ objectForKey:@\"user\"]\n                                      objectForKey:@\"\
  name\"]];\n    NSString *profileImageURI = [[tweet objectForKey:@\"user\"]\n   \
  \                               objectForKey:@\"profile_image_url\"];\n    NSURL\
  \ *profileImageURL = [NSURL URLWithString:profileImageURI];\n    NSURLRequest *profileImageURLRequest\
  \ = [NSURLRequest\n                                            requestWithURL:profileImageURL];\n\
  \n    [_profileImageQueue addOperationWithBlock:^{\n        dispatch_queue_t dispatchQueue\
  \ =\n            dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
  \        dispatch_async(dispatchQueue, ^{\n            NSURLResponse *response =\
  \ nil;\n            NSError *error = nil;\n            NSData *imageData = [NSURLConnection\n\
  \                                 sendSynchronousRequest:profileImageURLRequest\n\
  \                                 returningResponse:&response\n                \
  \                 error:&error];\n            UIImage *image = [UIImage imageWithData:imageData];\n\
  \n            [[cell imageView] performSelectorOnMainThread:@selector(setImage:)\n\
  \                                               withObject:image\n             \
  \                               waitUntilDone:NO];\n            [cell performSelectorOnMainThread:@selector(setNeedsLayout)\n\
  \                                  withObject:nil\n                            \
  \   waitUntilDone:NO];\n\n            dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                [[cell imageView] setImage:image];\n                [cell\
  \ setNeedsLayout];\n            });\n        });\n    }];\n\n    return cell;\n\
  }\n```\n\n首先，我们用默认队列优先级获取一个全局调度队列。接着，使用 `dispatch_async()` 将一个代码块调度到这个队列上。在这个代码块内部，我们第二次使用\
  \ `dispatch_async()` 来将一个代码块调度到主队列上。像这样嵌套调用 `dispatch_async()` 的情况并不罕见，实际上这恰恰是 Grand\
  \ Central Dispatch 的一大优势。\n\n既然我们已经开始使用这些队列，你就可以移除之前创建的 `NSOperationQueue` 变量了：\n\
  \n```\n@interface LCTTimelineViewController () {\n    NSTimer *_reloadTimer;\n \
  \   NSArray *_tweets;\n    NSOperationQueue *_profileImageQueue;\n}\n```\n\n\n\n\
  - (void)reloadButtonPressed:(id)sender;\n\n- (void)reloadTweets:(NSTimer *)reloadTimer;\n\
  \n- (void)tweetButtonPressed:(id)sender;\n\n@end\n\n同样地，你可以将其从 `initWithStyle:`\
  \ 方法中移除：\n\n```objc\n- (id)initWithStyle:(UITableViewStyle)style\n{\n    self =\
  \ [super initWithStyle:style];\n    if (self) {\n        [self setTitle:@\"Timeline\"\
  ];\n        UIBarButtonItem *reloadButton =\n            [[UIBarButtonItem alloc]\n\
  \                initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh\n    \
  \                                target:self\n                                 \
  \   action:@selector(reloadButtonPressed:)];\n        [[self navigationItem] setLeftBarButtonItem:reloadButton];\n\
  \        UIBarButtonItem *tweetButton =\n            [[UIBarButtonItem alloc]\n\
  \                initWithBarButtonSystemItem:UIBarButtonSystemItemCompose\n    \
  \                                target:self\n                                 \
  \   action:@selector(tweetButtonPressed:)];\n        [[self navigationItem] setRightBarButtonItem:tweetButton];\n\
  \        _profileImageQueue = [[NSOperationQueue alloc] init];\n    }\n    return\
  \ self;\n}\n```\n\n很好。现在，构建并运行你的代码，你会看到一切仍如预期般运行。如果这就是 Grand Central Dispatch 能为你做的一切，那它已经是一个很棒的库了。它能做的远不止这些，但在深入探讨它的能力之前，我们先聊聊它的结构。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 8 章：管理事件触发时机\n\n### 调度对象（Dispatch Objects）\n\nGrand Central Dispatch 是一个面向对象的框架，但它并非\
  \ Objective-C。相反，它采用 C 语言编写，并拥有自己的对象系统。与 Objective-C 类似，它也使用引用计数进行内存管理，但不幸的是，ARC\
  \ 无法对此类代码提供帮助。创建调度对象通常涉及以下形式的函数，其中 type 是调度对象的类型：\n\n`dispatch_<type>_create()`\n\
  \n例如，要创建一个调度队列，你需要调用 `dispatch_queue_create()`。当你从此函数获取一个队列时，它的引用计数为 1。因此，当你使用完毕后，需要使用\
  \ `dispatch_release()` 函数来释放它。你不必对全局队列或主队列调用 `dispatch_release()`，因为它们并非由你创建。如果你需要传递调度对象并保留其值，请使用\
  \ `dispatch_retain()` 函数。\n\n### 调度队列（Dispatch Queues）\n\n最常见的创建调度对象类型之一就是调度队列。队列有两种类型：串行队列和并发队列。串行队列一次只运行一个任务，并遵循先进先出的原则。虽然在串行队列中一次只会运行一个任务，但\
  \ Grand Central Dispatch 可能同时运行来自两个不同串行队列的任务。顾名思义，并发队列可以同时运行多个任务。Grand Central Dispatch\
  \ 的特性之一是它会自动调节应用中活跃线程的数量，因此你无需配置在给定并发队列中可同时运行多少个任务。任务按先进先出的顺序启动，但它们的完成顺序取决于每个任务所需的执行时间。\n\
  \n要创建调度队列，请使用 `dispatch_queue_create()` 函数：\n\n```objc\ndispatch_queue_t myQueue\
  \ = dispatch_queue_create(\"com.learncocoatouch.myQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
  ```\n\n第一个参数是一个 C 字符串，用作该队列的标签。队列集合在所有活跃应用中是全局共享的，因此请务必使用反向 DNS 风格的标签，以避免名称冲突。该标签在调试时也很有用，因为你可以看到出问题的代码正在哪个队列上运行。第二个参数是\
  \ `DISPATCH_QUEUE_CONCURRENT` 或 `DISPATCH_QUEUE_SERIAL`，对应你想要创建的调度队列类型。在可用的常量出现之前编写的代码中，你可能会看到使用\
  \ `NULL`；在这种情况下，创建的队列为串行队列。你可以像使用全局队列一样，使用此队列来分发任务：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```objc\ndispatch_async(myQueue, ^{ NSLog(@\"Hello, World!\"); });\n```\n\n使用完队列后，请务必释放它：\n\
  \n```objc\ndispatch_release(myQueue);\n```\n\n\n当您将任务分派到队列时，该任务会保留队列，因此在提交一个或多个任务后可以立即释放队列，无需担心事情发生的顺序。\n\
  \n另一个使用分派队列的有用函数是`dispatch_apply()`。如果您需要多次执行相同的任务，可以使用`dispatch_apply()`（以及其基于函数的对应项`dispatch_apply_f()`）来完成。如果您使用基于块的`dispatch_apply()`函数，该块接受一个参数，该参数对应当前迭代的索引。如果您使用`dispatch_apply_f()`，该计数将作为第二个参数传递给函数。\n\
  \n为了说明这一点，以下是您如何使用`dispatch_apply()`来遍历数组：\n\n```objectivec\nNSUInteger count =\
  \ [myArray count];\ndispatch_apply(count, myQueue, ^(size_t idx) {\n    id object\
  \ = [myArray objectAtIndex:idx];\n    [object doSomething];\n});\n```\n\n请注意，我们作为第三个参数传入的块接受一个参数。`size_t`类型本质上是一个整数，因此我们可以将其用作索引来从数组中检索对象。当您使用`dispatch_apply()`时，它会将块分派到给定队列指定次数，然后等待所有块完成后再返回。因为它会等待块完成，所以您可以将`dispatch_apply()`用作`for`循环的快速替代方案，并且当它与并发队列配合使用时，可以因此获得性能提升。\n\
  \n### 分派信号量\n\n我们的 Twitter 示例有一个大问题：由于我们可以在屏幕上同时显示多个单元格，最终会有大量的 URL 连接同时加载。过多的并发连接会对性能产生不利影响。为了解决这个问题，我们将使用分派信号量，这是一种计数信号量，可以充当锁。当您使用`dispatch_semaphore_create()`创建信号量时，需要传入一个数字来初始化信号量的值。要使用信号量，请调用`dispatch_semaphore_wait()`，它会递减信号量的当前值。如果结果值小于\
  \ 0，该函数会等待，直到值增加后再返回。信号量的值在`dispatch_semaphore_create()`方法中设置，因此要创建一个一次只允许一个访问的信号量，您可以通过调用`dispatch_semaphore_create(0)`来创建它。要增加值，请调用`dispatch_semaphore_signal()`。还可以为`dispatch_semaphore_wait()`指定最大等待时间，以便在无法立即操作时能够做出适当的响应。如果多次调用`dispatch_semaphore_wait()`，则按先进先出的方式确定哪个调用最先返回，类似于锁的行为。\n\
  \n为了限制 Twitter 应用中的并发连接数，我们将在`dispatch_semaphore_create()`中使用值 3。我们还将创建自己的分派队列来处理请求，以帮助清理代码。在\
  \ Xcode 中打开 TwitterExample 项目，并导航到`LCTTimelineViewController.m`。向类扩展添加两个变量：\n\n\
  ```objectivec\n@interface LCTTimelineViewController () {\n    NSTimer *_reloadTimer;\n\
  \    NSArray *_tweets;\n    dispatch_queue_t _profileImageQueue;\n    dispatch_semaphore_t\
  \ _profileImageSemaphore;\n}\n\n- (void)reloadButtonPressed:(id)sender;\n- (void)reloadTweets:(NSTimer\
  \ *)reloadTimer;\n- (void)tweetButtonPressed:(id)sender;\n\n@end\n```\n\n请注意，因为分派对象不是\
  \ Objective-C 对象，所以它们不是指针。我们将在`initWithStyle:`方法中初始化它们：\n\n```objectivec\n- (id)initWithStyle:(UITableViewStyle)style\n\
  {\n    self = [super initWithStyle:style];\n    if (self) {\n        [self setTitle:@\"\
  Timeline\"];\n        UIBarButtonItem *reloadButton =\n            [[UIBarButtonItem\
  \ alloc]\n                initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh\n\
  \                                     target:self\n                            \
  \         action:@selector(reloadButtonPressed:)];\n        [[self navigationItem]\
  \ setLeftBarButtonItem:reloadButton];\n        UIBarButtonItem *tweetButton =\n\
  \            [www.it-ebooks.info](http://www.it-ebooks.info/)\n```\n\n\n"
- "# 第 8 章：管理事件发生时机\n\n`[[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCompose\
  \ target:self action:@selector(tweetButtonPressed:)];`\n\n`[[self navigationItem]\
  \ setRightBarButtonItem:tweetButton];`\n\n`_profileImageQueue = dispatch_queue_create(\"\
  com.learncocoatouch.profileImageQueue\", DISPATCH_QUEUE_CONCURRENT);`\n\n`_profileImageSemaphore\
  \ = dispatch_semaphore_create(3);`\n\n`return self;`\n\n尽管我们使用了 ARC，但在完成操作后仍需释放这些对象。在`initWithStyle:`方法之后添加一个`dealloc`方法：\n\
  \n```\n- (void)dealloc\n{\n    dispatch_release(_profileImageQueue);\n    dispatch_release(_profileImageSemaphore);\n\
  }\n```\n\n接下来，让我们使用队列和信号量来控制并发连接的数量。按如下方式修改`tableView:cellForRowAtIndexPath:`：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView\n                dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[UITableViewCell alloc]\n             \
  \   initWithStyle:UITableViewCellStyleSubtitle\n                reuseIdentifier:CellIdentifier];\n\
  \    }\n    // 配置单元格...\n    NSDictionary *tweet = [_tweets objectAtIndex:[indexPath\
  \ row]];\n    [[cell textLabel] setText:[tweet objectForKey:@\"text\"]];\n    [[cell\
  \ detailTextLabel] setText:[[tweet objectForKey:@\"user\"]\n            objectForKey:@\"\
  name\"]];\n```\n\n`NSString *profileImageURI = [[tweet objectForKey:@\"user\"] objectForKey:@\"\
  profile_image_url\"];`\n\n`NSURL *profileImageURL = [NSURL URLWithString:profileImageURI];`\n\
  \n`NSURLRequest *profileImageURLRequest = [NSURLRequest requestWithURL:profileImageURL];`\n\
  \n`dispatch_queue_t dispatchQueue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0ul);`\n\n```\ndispatch_async(dispatchQueue, ^{\n    dispatch_async(_profileImageQueue,\
  \ ^{\n        NSURLResponse *response = nil;\n        NSError *error = nil;\n  \
  \      dispatch_semaphore_wait(_profileImageSemaphore,\n                       \
  \         DISPATCH_TIME_FOREVER);\n        NSData *imageData = [NSURLConnection\n\
  \                  sendSynchronousRequest:profileImageURLRequest\n             \
  \     returningResponse:&response\n                  error:&error];\n        dispatch_semaphore_signal(_profileImageSemaphore);\n\
  \        UIImage *image = [UIImage imageWithData:imageData];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            [[cell imageView] setImage:image];\n            [cell setNeedsLayout];\n\
  \        });\n    });\n    return cell;\n}\n```\n\n如你所见，我们将 URL 连接方法封装在信号量调用中。一旦从服务器获取到数据，就可以启动新的连接。构建并再次运行应用，你应该会看到图片加载出来。根据你的网络连接速度，你可能会注意到性能有所提升。\n\
  \n**分派时间**\n\n你可能已经注意到前一个代码示例中的`DISPATCH_TIME_FOREVER`宏。`dispatch_semaphore_wait()`中的该参数指定了在继续执行之前等待信号量的最长时间。传入`DISPATCH_TIME_FOREVER`会使函数无限期等待。如果信号量未超时，`dispatch_semaphore_wait()`的返回值为零；如果超时发生，则返回非零值。要指定最大超时时间，你需要创建一个`dispatch_time_t`值。`dispatch_time_t`不是对象，因此不要使用以\"\
  create\"结尾的函数。相反，使用`dispatch_time()`函数返回一个新的时间值。`dispatch_time()`接受两个参数，第一个参数是另一个`dispatch_time_t`；你创建的时间将相对于第一个参数。使用`DISPATCH_TIME_NOW`可以创建一个在不久的将来的时间。\n\
  \n第二个参数是添加到第一个参数以获取所需时间的纳秒数。你可以使用`NSEC_PER_SEC`宏来方便地计算要使用的纳秒数。要指定从现在起 15 秒后的分派时间，你可以按如下方式调用该函数：\n\
  \n`dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 15 * NSEC_PER_SEC);`\n\
  \n要将此时间用作信号量的超时时间，你可以按如下方式调用`dispatch_semaphore_wait()`：\n\n```\nlong success =\
  \ dispatch_semaphore_wait(mySemaphore, time);\nif (success == 0) {\n    // 超时未发生。\n\
  }\nelse {\n    // 超时发生。\n}\n```\n\n结合这些超时时间使用分派信号量，可以灵活控制应用中的资源分配。另一个使用`dispatch_time_t`类型的有用函数是`dispatch_after()`（以及它的对应函数`dispatch_after_f()`，它接受一个函数而不是代码块），该函数用于调度一段代码在稍后执行。使用`dispatch_after()`就像使用`dispatch_async()`一样，只是在其他参数之前多了一个参数，即一个`dispatch_time_t`值，用于指定何时调用该代码。如果你想调度一个代码块在\
  \ 30 秒后运行，可以按如下方式操作：\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
  \ 30 * NSEC_PER_SEC);\ndispatch_after(time, dispatch_get_main_queue(), ^{\n    NSLog(@\"\
  Hello, World!\");\n});\n```\n\n像这样使用`dispatch_after()`具有与非重复定时器相同的效果，但没有创建`NSTimer`对象的开销。\n\
  \n**总结**\n\n在本章中，你学习了几种不同的代码执行方式。`performSelector:`方法家族提供了基本的消息路由功能，而定时器允许你在定时间隔内重复执行代码。运行循环是每个线程的基础，负责处理应用中的事件。线程及其伴随的线程安全问题允许你同时运行两段代码，而`NSOperationQueue`允许你将特定的工作块加入队列。最后，Grand\
  \ Central Dispatch（GCD）使你能对代码的执行方式进行精细控制。完成本章后，你已经为编写高性能 iOS 应用做好了充分准备。我们使用 GCD\
  \ 让 Twitter 示例的响应性更强，但其用户界面还有改进空间。在下一章中，我们将讨论如何实现出色的 iPhone 用户界面、渲染自定义图形以及实现动画效果。\n\
  \n"
- "# 章节：用户界面设计\n\n截至撰写本文时，iOS 平台上已有超过 55 万个应用可用。竞争之激烈可见一斑。你的应用将在 App Store 中与成千上万台设备的用户争夺关注度和收入。面对如此众多的产品，用户在比较应用时常常感到无所适从。\n\
  \n下面快速做个实验：在你的 iOS 设备或 iTunes 中打开 App Store，搜索一个应用。试试搜索\"photography\"或\"weight\
  \ loss\"。你的潜在用户到底要如何在如此嘈杂的信息中找到你的应用？主要通过他们的眼睛。要打造成功的应用，最重要的事情之一就是拥有一个出色的图标。聘请一位设计师，为你的图标制作超高分辨率的图像。如果你的应用表现出色且\
  \ Apple 希望在某些位置展示它，你可能还需要提供分辨率更高的版本。如果 Apple 想要展示你的应用，你最好准备好这些图像；被 App Store 推荐比拥有出色的图标更是一种成功之道。\n\
  \n当用户看到你惊艳的图标，为其美丽而驻足片刻，并决定购买你的应用后，他们还得实际使用这个应用。即使你的图标只是几个简笔画人物，用户也会欣赏你在应用外观上所付出的用心。为此，本章将介绍如何通过引人注目的用户界面设计让你的应用脱颖而出。这不仅会让你的应用看起来更美观，而且会更易于使用。我们将从高级（但同样非常强大）的技巧开始讲起。\n\
  \n\n\n像`UIKit`这样的框架，然后我们会逐步深入到更底层的细节。在本章结束时，你将能够获取设计师给你的图片，并让你的应用看起来与设计师的作品一致。首先，我们来介绍一些`UIKit`中的基础知识。\n\
  \n`UIKit`是一个非常庞大的框架。它涵盖了制作 iPhone 应用所需的大部分用户界面元素，从按钮到滑块，从标签到图像视图。令人欣慰的是，无论是对按钮使用自定义图像、为标签设置颜色，还是在应用启动时添加生动的动画，`UIKit`提供的大部分内容都可以根据你的需求进行定制。让你的应用脱颖而出的最简单方法之一，就是为\
  \ UI 元素使用自定义颜色；为此，你需要使用`UIColor`类。\n\n## 用`UIColor`为界面元素着色\n\n在使用 Interface Builder\
  \ 时，你可能已经尝试过颜色设置。如果是这样，那太好了。如果没有，也别担心，因为我们即将深入探讨。`UIColor`类的实例代表一种特定的颜色。它们遍布在`UIKit`中，但最简单的演示其工作原理的方式是，选取一个用户界面元素并为其添加颜色。为此，让我们使用我们熟悉的\
  \ Twitter 示例项目，并增添一些亮点。在 Xcode 中打开`TwitterExample`项目，并导航到应用代理的实现文件（`LCTAppDelegate.m`）。在`application:didFinishLaunchingWithOptions:`方法中添加以下粗体显示的行：\n\
  \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\nself.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\n\
  bounds]];\n// 覆盖点，用于应用启动后的自定义设置。\nself.window.backgroundColor = [UIColor whiteColor];\n\
  [self.window makeKeyAndVisible];\nLCTTimelineViewController *viewController =\n\
  [[LCTTimelineViewController alloc] initWithStyle:UITableViewStylePlain];\nUINavigationController\
  \ *navigationController =\n[[UINavigationController alloc] initWithRootViewController:viewController];\n\
  UIColor *navigationBarColor = [UIColor redColor];\n[[navigationController navigationBar]\
  \ setTintColor:navigationBarColor];\n[[self window] setRootViewController:navigationController];\n\
  return YES;\n}\n```\n\n**注意：** 如果你的设备或 iOS 模拟器中的 Twitter 账户已被移除，你需要在使用 TwitterExample\
  \ 应用之前重新输入。\n\n构建并运行应用，差异应该相当明显。如图 9-1 所示，导航栏看起来已经大不相同。\n\n**图 9-1.** *左侧为默认着色颜色的导航控制器，右侧为红色着色颜色的导航控制器*\n\
  \n`tintColor`属性不仅影响导航栏的颜色，还会改变显示在导航栏上的`UIBarButtonItem`对象的颜色。许多`UIKit`类都支持的着色颜色，会影响对象的颜色，但不会改变其形状或行为方式。\n\
  \n你可能也注意到了，我们直接使用了`UIColor`类的类方法`redColor`来获取一种颜色。这为你提供了便利，让你能快速创建常用颜色。你可以使用类方法来创建黑色、深灰色、浅灰色、灰色、白色、红色、绿色、蓝色、青色、黄色、品红色、橙色、紫色和棕色的颜色对象。你还可以使用`clearColor`便利方法创建透明颜色，这对于使视图背景透明非常有用。你可以将\
  \ Twitter 代码中的`redColor`方法替换为上述任意颜色，构建并运行应用，查看效果。请注意，对于由两个单词组成的颜色名称，这些方法采用驼峰式命名，因此对于深灰色，你需要使用`darkGrayColor`方法。\n\
  \n\n\n下一个显而易见的问题是：“我可以使用自己的颜色吗？”答案是肯定的，你可以使用自己的颜色。只需使用`UIColor`类方法`colorWithRed:green:blue:alpha:`即可创建颜色。你可以通过以下代码行创建一种深蓝板岩色：\n\
  \n```\nUIColor *darkBlueSlateColor = [UIColor colorWithRed:0.129f\n            \
  \                                 green:0.278f\n                               \
  \               blue:0.380f\n                                             alpha:1.0f];\n\
  ```\n\n**注意：** 与所有显示器一样，iOS 设备显示屏上的颜色可能与其他显示屏上的同一颜色不完全匹配。请务必在真实设备上测试你的应用，以查看你所使用的颜色实际效果。\n\
  \n该方法的每个参数都接受 0 到 1 范围内的浮点数。对于红色、绿色和蓝色值，设计师通常习惯使用整数或十六进制值来表示颜色。为了便于后续修改，你可以通过除法运算获得\
  \ 0 到 1 之间的值。前面示例中的颜色也可以通过以下两种方式编写：\n\n```\nUIColor *darkBlueSlateColor = [UIColor\
  \ colorWithRed:(74.0f/255.0f)\n                                             green:(82.0f/255.0f)\n\
  \                                              blue:(90.0f/255.0f)\n           \
  \                                  alpha:1.0f];\n\nUIColor *darkBlueSlateColor =\
  \ [UIColor colorWithRed:((float)0x4A / (float)0xFF)\n                          \
  \                   green:((float)0x52 / (float)0xFF)\n                        \
  \                      blue:((float)0x5A / (float)0xFF)\n                      \
  \                       alpha:1.0f];\n```\n\n在第一个示例中，我们使用数值除以 255 来获得 0 到 1 之间的值；在第二个示例中，我们使用十六进制值除以`FF`来获得该值。当你的设计师给你一个特定的颜色时，你可以使用相应的方法来生成颜色。\n\
  \n该方法的第四个参数是颜色的 alpha 分量，它表示颜色的不透明度。在设置导航栏的色调颜色时，这个参数不会产生任何效果，但在其他使用`UIColor`对象为颜色添加透明度的场景中可以使用它。\n\
  \n如果你的设计师提供了色调、饱和度和亮度的值，你也可以使用这些值来创建颜色。前面示例中的颜色也可以这样创建：\n\n```\nUIColor *darkBlueSlateColor\
  \ = [UIColor colorWithHue:(210.0f/359.0f)\n                                    \
  \   saturation:(18.0f/100.0f)\n                                       brightness:(35.0f/100.0f)\n\
  \                                            alpha:1.0f];\n```\n\n颜色不仅用于为 UI 元素着色，还可以用来改变`UILabel`的文本颜色或任何`UIView`的背景颜色。例如，如果你希望表格视图单元格在灰色和稍深一点的灰色之间交替显示，可以使用`UIColor`来实现。在\
  \ Xcode 中打开 TwitterExample 项目，并导航到`LCTTimelineViewController.m`文件。在`tableView:cellForRowAtIndexPath:`方法之后添加一个新的方法实现，如下所示：\n\
  \n```\n- (void)tableView:(UITableView *)tableView\n  willDisplayCell:(UITableViewCell\
  \ *)cell\nforRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSUInteger row = [indexPath\
  \ row];\n    if (row % 2) {\n        [cell setBackgroundColor:[UIColor grayColor]];\n\
  \    }\n    else {\n        [cell setBackgroundColor:[UIColor lightGrayColor]];\n\
