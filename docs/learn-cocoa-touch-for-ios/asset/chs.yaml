  \ setTextColor:[UIColor whiteColor]];\nreturn cell;\n```\n\n再次构建并运行应用。现在文本应该可见了，您的应用看起来应该像图\
  \ 9-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 38](img/index-252_1.jpg)\n\
