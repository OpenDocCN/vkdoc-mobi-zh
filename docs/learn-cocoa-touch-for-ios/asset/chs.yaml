- "# 第 9 章：用户界面设计\n\n可以想象，你的图片文件数量很容易成倍增长，导致应用程序的文件体积变得很大，尤其是当你在 iPhone 和 iPad 上都使用了全尺寸图形时。\n\
  \n- `blueButton~ipad.png`\n- `blueButton~ipad@2x.png`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 视图动画\n\niPhone 如此成功的一个原因在于，使用它给人一种神奇的感觉。这听起来可能像是市场部门才会想出来的说辞，但事实是，提供一个引人入胜的用户界面可以让你的用户感觉他们不是在操作\
  \ iPhone 或 iPad，而是在直接与你的应用互动。获得这种感受的一个好方法是利用动画来增加应用的交互性。有些动画是内置的，例如在导航控制器中从一个视图控制器导航到另一个时。其他动画则可以由你自己创建。要对你的视图进行动画处理，可以使用\
  \ `UIView` 上的一些类方法。举一个基本示例，下面展示了如何在两秒内将一个名为 `myView` 的 `UIView` 从不透明（100% 透明度）动画到完全透明（0%\
  \ 透明度）：\n\n```\n[UIView animateWithDuration:2.0\n    animations:^{\n        [myView\
  \ setAlpha:0.0f];\n}];\n```\n\n`animateWithDuration:animations:` 是可用的最基本的动画方法。第一个参数是\
  \ `NSTimeInterval` 值（实际上就是 `double`），第二个参数是一个代码块。在这个代码块中，只需设置你想要进行动画处理的视图的属性，`UIView`\
  \ 类就会负责创建动画。许多属性都可以通过这种方式进行动画处理：\n\n- `frame`\n- `bounds`\n- `center`（不过对此属性进行动画处理与直接设置它存在相同的缺陷）\n\
  - `transform`\n- `alpha`\n- `backgroundColor`\n- `contentStretch`\n\n要动画处理一个在屏幕上移动的视图，你需要将其\
  \ `frame` 值更改为你希望它在动画结束时拥有的 frame。还有一些更复杂但功能更强大的动画方法可用，其中最强大的是 `animateWithDuration:delay:options:animations:completion:`。这个名称冗长的方法，以及其他带有名为\
  \ `completion` 参数的方法，允许你在动画完成时运行一段代码。这段示例代码会等待五秒钟，然后将 `myView` 动画为完全透明；动画完成后，它会将\
  \ `myView` 从其父视图中移除：\n\n```\n[UIView animateWithDuration:2.0\n    delay:5.0\n  \
  \  options:0\n    animations:^{\n        [myView setAlpha:0.0f];\n    }\n    completion:^(BOOL\
  \ finished) {\n        [myView removeFromSuperview];\n}];\n```\n\n`completion` 参数接受一个带有一个参数的代码块，该参数是一个名为\
  \ `finished` 的 `BOOL` 值。如果动画成功完成，则 `finished` 会被设置为 `YES`。如果没有成功完成（例如，如果 `myView`\
  \ 的父视图从视图层级中被移除，就可能发生这种情况），那么 `finished` 会被设置为 `NO`。\n\n你也可以嵌套动画。以下代码会用 `myOtherView`\
  \ 替换 `myView`，淡出 `myView` 并淡入 `myOtherView`：\n\n```\n[UIView animateWithDuration:2.0\n\
  \    delay:5.0\n    options:0\n    animations:^{\n        [myView setAlpha:0.0f];\n\
  \    }\n    completion:^(BOOL finished) {\n        [[myView superview] addSubview:myOtherView];\n\
  \        [myView removeFromSuperview];\n        [myOtherView setAlpha:0.0f];\n \
  \       [UIView animateWithDuration:2.0\n            animations:^{\n           \
  \     [myOtherView setAlpha:1.0f];\n        }];\n}];\n```\n\n如你所见，在动画处理 `myOtherView`\
  \ 之前，我们将其 `alpha` 属性设置为 0。由于我们在动画代码块外部更改了这个属性，因此这个更改是即时生效的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n动画是为你的应用增添一丝活力的好方法。优秀的应用会以巧妙的方式使用动画，引导用户使用它们。苹果地图应用中的动画是一个精妙的例子。当你搜索某物并将结果显示为地图上的图钉时，图钉并不是凭空出现的；相反，它们会从上方落下，帮助用户看清它们的位置。人类大脑天生对运动敏感；动画可以利用这一点来吸引用户的注意力。\n\
  \n## 示例：Reddit 图片浏览器\n\n为了展示我们新学的用户界面技能，让我们为社交新闻聚合网站 Reddit 构建一个酷炫的图片浏览器。如果你不熟悉\
  \ Reddit，它会将其内容组织成称为子版块的子类别。我们称这个应用为 `RedditPics`，它将显示发布到 Reddit 上的图片的动画幻灯片。\n\n\
  在构建基于第三方 API 的应用时，首先要回答的问题是：“我如何获取数据？” 对于 Reddit，答案很简单：只需在任何 URL 后追加 `.json`，即可接收该\
  \ URL 的 JSON 格式内容。我们可以通过加载以下 URL 来获取首页的主要 JSON 数据：\n\n[`www.reddit.com/.json`](http://www.reddit.com/.json)\n\
  \nJSON 数据会返回一个项目数组，每个项目都有一个 URL。我们将检查 URL 中是否包含图片文件扩展名——`.png`、`.jpg` 和 `.gif`——并下载这些图片用于我们的幻灯片。除此之外，我们还将使该应用成为通用应用，以便它能够在\
  \ iPhone 和 iPad 上运行。打开 Xcode，从欢迎屏幕中选择“创建一个新的 Xcode 项目”。如果欢迎屏幕没有出现，请选择 File → New\
  \ → Project…，或按 `⌘`+`Shift`+`N`。在左侧栏的 iOS 下选择 Application，然后选择 Single View Application\
  \ 模板并点击 Next。对于 Product Name，使用 `RedditSlideshow`。如果你还没有设置 Company Identifier 或\
  \ Class Prefix，请现在设置；我将分别使用 `com.learncocoatouch` 和 `LCT`。对于 Device Family，选择 iPhone。不要勾选\
  \ Use Storyboards 和 Include Unit Tests，同时应勾选 Use Automatic Reference Counting。确认设置无误后，点击\
  \ Next。选择你希望将项目保存到磁盘的位置，再次点击 Next 以创建项目。\n\n我们要做的第一件事是显示一张图片。首先，我们需要加载 Reddit 网站并解析其\
  \ JSON 输出。为此，我们首先在类扩展中声明一个方法来解析 JSON，同时，我们将声明一个数组来存储返回的图片 URL。导航至 `LCTViewController.m`（你的文件名可能因类前缀而异）。如果\
  \ `LCTViewController.m` 文件中已有类扩展，则将下面加粗的行添加到其中。如果没有，则将整个下面的类扩展添加到文件顶部，即 `@implementation`\
  \ 指令之前，同时添加 `@synthesize` 行：\n\n```\n@interface LCTViewController ()\n\n@property\
  \ (strong) NSMutableArray *imageURLs;\n- (void)parseJSONData:(NSData *)jsonData;\n\
  \n@end\n\n@implementation LCTViewController\n\n@synthesize imageURLs = _imageURLs;\n\
  ```\n\n接下来，找到 `viewDidLoad` 方法。如果不存在 `viewDidLoad` 方法，则将以下代码完整地复制到视图控制器的 `@implementation`\
  \ 和 `@end` 指令之间；否则，只需添加加粗的行：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    // 加载视图后进行任何额外的设置，通常来自 nib 文件\n\n    NSURL *redditURL = [NSURL URLWithString:@\"\
  http://www.reddit.com/r/aww/.json\"];\n    NSURLRequest *redditURLRequest = [NSURLRequest\
  \ requestWithURL:redditURL];\n\n    [NSURLConnection sendAsynchronousRequest:redditURLRequest\n\
  \        queue:[NSOperationQueue currentQueue]\n        completionHandler:^(NSURLResponse\
  \ *response, NSData *data, NSError *error) {\n            if (data != nil) {\n \
  \               [self parseJSONData:data];\n            }\n            else {\n\
  \                NSLog(@\"加载 JSON 出错: %@\", error);\n            }\n    }];\n}\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n**注意：** Reddit，如同互联网上的许多其他内容，由用户生成。它返回的内容可能不适宜儿童、具有冒犯性或文化不敏感。之前使用的\
  \ URL 指向网站的一个部分（称为*子版块*），该部分专门用于发布可爱的图片（通常是动物的），名为“aww”。其他子版块可能包含不同类型的内容；浏览风险自负。\n\
  \n此代码加载 Reddit URL 并检查是否返回了数据。\n\n如果返回了数据，它会将数据传递给`parseJSONData:`方法。让我们实现该方法。如果你查看\
  \ Web 服务返回的 JSON，其顶层对象是一个字典，后面跟着一个`data`键，该键有一个名为`children`的键，它映射到一个子字典数组。在这些字典中，我们将查看`url`键，以确定链接是否为图片。将以下方法实现添加到类实现中，位于文件末尾的`@end`编译器指令之前：\n\
  \n```objc\n- (void)parseJSONData:(NSData *)jsonData\n{\n    [self setImageURLs:[NSMutableArray\
  \ array]];\n    \n    NSError *parseError = nil;\n    \n    id returnedObject =\
  \ [NSJSONSerialization JSONObjectWithData:jsonData\n                           \
  \                              options:0\n                                     \
  \                      error:&parseError];\n    \n    if (returnedObject != nil)\
  \ {\n        if ([returnedObject isKindOfClass:[NSDictionary class]]) {\n      \
  \      NSDictionary *data = [returnedObject objectForKey:@\"data\"];\n         \
  \   NSArray *children = [data objectForKey:@\"children\"];\n            for (NSDictionary\
  \ *childDict in children) {\n                NSString *url = [[childDict objectForKey:@\"\
  data\"]\n                                            objectForKey:@\"url\"];\n \
  \               \n                // Is this an image?\n                if ([url\
  \ hasSuffix:@\".png\"] ||\n                    [url hasSuffix:@\".jpg\"] ||\n  \
  \                  [url hasSuffix:@\".jpeg\"] ||\n                    [url hasSuffix:@\"\
  .gif\"]) {\n                    NSURL *imageURL = [NSURL URLWithString:url];\n \
  \                   [[self imageURLs] addObject:imageURL];\n                }\n\
  \            }\n        }\n    } else {\n        NSLog(@\"Error parsing data: %@\"\
  , parseError);\n    }\n}\n```\n\n此代码遍历响应，查找带有图片扩展名的 URL，并将匹配项填充到`imageURLs`数组中。完成后，`imageURLs`数组将填充`NSURL`对象，每个对象代表一张不同的图片。一旦我们有了\
  \ URL 列表，就需要在屏幕上显示图片！首先，添加一个实例变量、一个属性和两个方法声明到类扩展，以及该属性的合成存取方法，还有一个稍后会用到的常量。通过将以下加粗的行添加到`LCTViewController.m`的顶部：\n\
  \n`static const NSTimeInterval kPictureDisplayTime = 15.0;`\n\n```objc\n@interface\
  \ LCTViewController () {\n    NSUInteger _currentImageIndex;\n}\n\n@property (strong)\
  \ NSMutableArray *imageURLs;\n@property (strong) UIImageView *imageView;\n\n- (void)parseJSONData:(NSData\
  \ *)jsonData;\n- (void)startSlideshow;\n- (void)loadNextImageInSlideshow;\n\n@end\n\
  \n@implementation LCTViewController\n\n@synthesize imageURLs = _imageURLs;\n@synthesize\
  \ imageView = _imageView;\n```\n\n我们将使用`startSlideshow`方法加载第一张图片，并使用`loadNextImageInSlideshow`方法加载下一张。因此，通过添加以下加粗的行，修改`viewDidLoad`方法，使其在解析从\
  \ Reddit 返回的数据后调用`startSlideshow`：\n\n```objc\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n    \n    NSURL *redditURL = [NSURL\n                        URLWithString:@\"\
  http://www.reddit.com/r/aww/.json\"];\n    NSURLRequest *redditURLRequest = [NSURLRequest\
  \ requestWithURL:redditURL];\n    \n    [NSURLConnection sendAsynchronousRequest:redditURLRequest\n\
  \                                       queue:[NSOperationQueue currentQueue]\n\
  \                           completionHandler:^(NSURLResponse *response,\n     \
  \                                          NSData *data,\n                     \
  \                          NSError *error) {\n        if (data != nil) {\n     \
  \       [self parseJSONData:data];\n            [self startSlideshow];\n       \
  \ } else {\n            NSLog(@\"Error loading JSON: %@\", [error\n            \
  \                                   localizedDescription]);\n        }\n    }];\n\
  }\n```\n\n接下来，添加`startSlideshow`方法的实现，以及`loadNextImageInSlideshow`的空实现（这样调用时应用不会崩溃）。在`parseJSONData:`方法之后、`@end`指令之前插入以下加粗的代码：\n\
  \n\n```objective-c\n- (void)startSlideshow\n{\n    if ([[self imageURLs] count]\
  \ == 0) {\n        return;\n    }\n    UIActivityIndicatorView *activityIndicatorView\
  \ = [[UIActivityIndicatorView alloc] initWithActivityIndicatorStyle:UIActivityIndicatorViewStyleGray];\n\
  \    CGRect activityIndicatorFrame = [activityIndicatorView frame];\n    activityIndicatorFrame.origin\
  \ = CGPointMake(floorf((CGRectGetWidth([[self view] bounds]) + CGRectGetWidth(activityIndicatorFrame))\
  \ / 2.0f),\n                                               floorf((CGRectGetHeight([[self\
  \ view] bounds]) + CGRectGetHeight(activityIndicatorFrame)) / 2.0f));\n    [activityIndicatorView\
  \ setFrame:activityIndicatorFrame];\n    [[self view] addSubview:activityIndicatorView];\n\
  \    [activityIndicatorView startAnimating];\n    // 加载第一张图片\n    _currentImageIndex\
  \ = 0;\n    NSURL *firstURL = [[self imageURLs] objectAtIndex:0];\n    NSURLRequest\
  \ *firstImageRequest = [NSURLRequest requestWithURL:firstURL];\n    [NSURLConnection\
  \ sendAsynchronousRequest:firstImageRequest\n                                  \
  \     queue:[NSOperationQueue currentQueue]\n                           completionHandler:^(NSURLResponse\
  \ *response,\n                                               NSData *data,\n   \
  \                                            NSError *error) {\n               \
  \                UIImage *image = [UIImage imageWithData:data];\n              \
  \                 if (image == nil) {\n                                   return;\n\
  \                               }\n                               UIImageView *imageView\
  \ = [[UIImageView alloc] initWithImage:image];\n                               [imageView\
  \ setAutoresizingMask:(UIViewAutoresizingFlexibleWidth|UIViewAutoresizingFlexibleHeight)];\n\
  \                               [imageView setContentMode:UIViewContentModeScaleAspectFit];\n\
  \                               [imageView setFrame:[[self view] bounds]];\n   \
  \                            [[self view] addSubview:imageView];\n             \
  \                  [activityIndicatorView removeFromSuperview];\n              \
  \                 [self setImageView:imageView];\n                             \
  \  int64_t popTime = kPictureDisplayTime * NSEC_PER_SEC;\n                     \
  \          dispatch_time_t nextPictureLoadDelay = dispatch_time(DISPATCH_TIME_NOW,\
  \ popTime);\n                               dispatch_after(nextPictureLoadDelay,\
  \ dispatch_get_main_queue(), ^{\n                                   [self loadNextImageInSlideshow];\n\
  \                               });\n                           }];\n}\n\n- (void)loadNextImageInSlideshow\n\
  {\n}\n```\n\n这段代码为第一张图片创建了一个 URL 请求，然后通过异步连接加载它。数据加载完成后，代码从中创建一个 `UIImage` 对象，再创建一个用于显示该图片的图像视图。接着，利用\
  \ `popTime` 变量创建 `dispatch_time_t` 类型的时间表示，并在此时间后调度 `loadNextImageInSlideshow` 方法。\n\
  \n构建并运行应用，你会看到加载完毕后图片才会出现，在此之前会看到一个活动指示器。一旦加载完成，应用不会再做任何事，因为我们把 `loadNextImageInSlideshow`\
  \ 方法留空了。现在让我们填充这个方法，让幻灯片加载新的图片！请在 `loadNextImageInSlideshow` 的实现中添加以下**粗体**代码：\n\
  \n```objective-c\n- (void)loadNextImageInSlideshow\n{\n    _currentImageIndex +=\
  \ 1;\n    if (_currentImageIndex >= [[self imageURLs] count]) {\n        return;\n\
  \    }\n    NSURL *imageURL = [[self imageURLs] objectAtIndex:_currentImageIndex];\n\
  \    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageURL];\n    [NSURLConnection\
  \ sendAsynchronousRequest:urlRequest\n                                       queue:[NSOperationQueue\
  \ currentQueue]\n                           completionHandler:^(NSURLResponse *response,\
  \ NSData *data, NSError *error) {\n                               UIImage *image\
  \ = [UIImage imageWithData:data];\n                               if (image == nil)\
  \ {\n                                   return;\n                              \
  \ }\n                               UIImageView *nextImageView = [[UIImageView alloc]\
  \ initWithImage:image];\n                               [nextImageView setAutoresizingMask:(UIViewAutoresizingFlexibleWidth\
  \ | UIViewAutoresizingFlexibleHeight)];\n                               [nextImageView\
  \ setContentMode:UIViewContentModeScaleAspectFit];\n                           \
  \    [nextImageView setFrame:[[self view] bounds]];\n                          \
  \     [nextImageView setAlpha:0.0f];\n                               [[self view]\
  \ addSubview:nextImageView];\n                               [UIView animateWithDuration:1.0\n\
  \                                                animations:^{\n               \
  \                                     [[self imageView] setAlpha:0.0f];\n      \
  \                                              [nextImageView setAlpha:1.0f];\n\
  \                                                }\n                           \
  \                     completion:^(BOOL finished) {\n                          \
  \                          [[self imageView] removeFromSuperview];\n           \
  \                                         [self setImageView:nextImageView];\n \
  \                                               }];\n                          \
  \     int64_t popTime = kPictureDisplayTime * NSEC_PER_SEC;\n                  \
  \             dispatch_time_t nextPictureLoadDelay = dispatch_time(DISPATCH_TIME_NOW,\
  \ popTime);\n                               dispatch_after(nextPictureLoadDelay,\
  \ dispatch_get_main_queue(), ^{\n                                   [self loadNextImageInSlideshow];\n\
  \                               });\n                           }];\n}\n```\n\n\n\
  ### 硬件 API\n\n该方法与之前的方法非常相似：获取下一个 URL，下载图像数据，然后创建图像视图。新增的部分是它使用的动画。旧图像视图淡出（其 `alpha`\
  \ 属性动画至 0），同时新图像淡入（其 `alpha` 属性动画至 1）。加载新图像后，我们以相同方式调度下一个加载任务：创建一个 `dispatch_time_t`\
  \ 时间表示，并在该时间后调度一个代码块。\n\n再次构建并运行应用，效果就出来了！现在你应该能看到 Reddit 图片的幻灯片放映，并且图片之间带有动画过渡效果！\n\
  \n## 总结\n\n本章全部关于用户界面。现在，你应该能够创建符合自己喜好的自定义用户界面，让你的应用脱颖而出。你应该能够使用字体、颜色和图像来设计视图，在屏幕上布局它们，并制作动画效果。在下一章中，我们将探索一些与硬件组件（如\
  \ GPS 芯片和加速度计）交互的 API，从而在屏幕上呈现更多数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n---\n\n在移动开发的讨论中，经常出现的一个争论点是关于 Web 应用与原生应用。到目前为止，我们只编写了原生应用；所谓原生应用，是指用 Objective-C\
  \ 编写、编译成二进制可执行格式并安装在设备上的应用。另一种选择是 Web 应用，它使用 HTML、CSS 和 JavaScript 编写，安装在服务器上，并通过浏览器访问——JavaScript\
  \ 在运行时被解释，而不是编译成可执行二进制文件。有一些框架试图弥合这一差距，本质上是将网站隐藏在一个仅相当于 Web 浏览器的原生应用内部，但通常很容易区分原生应用和\
  \ Web 应用。原生应用运行速度更快、用户交互更流畅，并且在手机上能做的事情比 Web 应用更多。本书一直在介绍如何编写原生应用，而本章则关注这些应用如何做更多事情。\n\
  \niPhone、iPod touch 和 iPad 拥有多个硬件传感器，你可以利用它们为己所用。这些小巧的设备中集成了一个或两个摄像头、一个或两个麦克风、一个\
  \ GPS 芯片、一个加速度计、一个陀螺仪，甚至还有一个磁力计！我们可以利用这些传感器，让应用能够知道你在哪里、移动速度有多快、以及你面朝哪个方向。加速度计可以告诉我们你是如何握持设备的，陀螺仪则告诉我们你是如何移动它的。将这些数据融入你的应用，就能创造出引人入胜、沉浸式的体验。在本章中，我们将介绍如何使用摄像头、加速度计、陀螺仪、GPS\
  \ 和磁力计，以及它们相关的框架。我们将查看一些示例代码，并扩展我们的 Twitter 示例应用，使其能够使用你当前的位置。首先，我们将介绍如何使用摄像头拍摄照片和视频。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n## 使用摄像头\n\n在 MyStuff\
  \ 示例项目中，我们已经初步使用了摄像头 API，用它们来获取物品的图像并保存到磁盘。然而，在那个项目中，我们仅仅触及了摄像头 API 所能实现功能的皮毛。在\
  \ iOS 设备上使用摄像头有两种方式：第一种，正如我们在 MyStuff 中所做的那样，使用 `UIImagePickerController` 类及其内置\
  \ UI 从摄像头获取图像；第二种，使用 `AVFoundation` 框架。`AVFoundation` 框架是苹果为 iOS 创建的高级视听框架，后来也被移植到了\
  \ Mac OS X 上。它可用于许多强大的任务，包括音频和视频播放、实时视频处理，甚至视频编辑！事实上，iOS 上的 iMovie 应用就是使用 `AVFoundation`\
  \ 编写的，并且没有使用任何私有 API，因此苹果在该应用中所做的一切，你同样可以在自己的应用中实现。\n\n\n\n### AVFoundation 概述\n\
  \n`AVFoundation`是一个非常高级的框架，因此我们不会在这里对其进行详细介绍。关于这个主题已有大量书籍可供参考，同时苹果的官方文档也一如既往地提供了详尽的帮助。\n\
  \n### 使用`UIImagePickerController`处理照片\n\n为了完成大多数与照片相关的任务，我们可以使用`UIImagePickerController`类来满足需求。正如我们在`MyStuff`示例中所见，创建并显示一个图片选择器控制器是简单的任务：\n\
  \n```\nUIImagePickerController *imagePickerController =\n[[UIImagePickerController\
  \ alloc] init];\n[imagePickerController setSourceType:UIImagePickerControllerSourceTypeCamera];\n\
  [imagePickerController setDelegate:self];\n[self presentModalViewController:imagePickerController\
  \ animated:YES];\n```\n\n这段代码创建了一个名为`imagePickerController`的`UIImagePickerController`实例。接着，它将源类型（`sourceType`）设置为`UIImagePickerControllerSourceTypeCamera`，从而触发拍照功能；我们也可以使用`UIImagePickerControllerSourceTypePhotoLibrary`或`UIImagePickerControllerSourceTypeSavedPhotosAlbum`来访问设备上已有的照片。在示例代码中，我们有一个名为`myViewController`的视图控制器，并将其设置为图片选择器控制器的代理（`delegate`）。\n\
  \n然后我们使用这个视图控制器来呈现图片选择器控制器。通常的做法是让一个视图控制器同时完成这两项操作：由于图片选择器控制器的代理也负责将其从屏幕上移除，因此让它同时负责初始呈现图片选择器控制器也是合理的。\n\
  \n以这种方式呈现的图片选择器控制器，默认会显示拍照的标准控件，并通过`imagePickerController:didFinishPickingMediaWithInfo:`方法向代理返回一张照片，或者通过`imagePickerControllerDidCancel:`方法指示用户取消了操作。\n\
  \n自定义`UIImagePickerController`行为的方式有很多。其中最简单的一种是向图片预览中添加一个覆盖视图（overlay view），你可以用它来辅助构图，或者使其与应用的用户界面风格保持一致。\n\
  \n图 10-1 展示了一个带有自定义覆盖视图的图片选择器控制器。\n\n**图 10-1.** *带有自定义覆盖视图的图片选择器控制器*\n\n这个覆盖层只是一张半透明的图片。创建图片选择器控制器并生成一个用作覆盖层的图片视图的代码如下（图片文件名为`Overlay.png`）：\n\
  \n```\nUIImagePickerController *imagePickerController =\n[[UIImagePickerController\
  \ alloc] init];\n[imagePickerController setSourceType:UIImagePickerControllerSourceTypeCamera];\n\
  \n// 此处的 \"self\" 应为 UIViewController 子类的实例，\n// 且需遵循 UIImagePickerControllerDelegate\
  \ 和\n// UINavigationControllerDelegate 协议。\n[imagePickerController setDelegate:self];\n\
  \nUIImage *overlayImage = [UIImage imageNamed:@\"Overlay\"];\nUIImageView *overlayView\
  \ = [[UIImageView alloc] initWithImage:overlayImage];\n[imagePickerController setCameraOverlayView:overlayView];\n\
  [self presentModalViewController:imagePickerController animated:YES];\n```\n\n任何`UIView`的子类都可以使用；只需将图片选择器控制器的`cameraOverlayView`属性设置为你的覆盖视图即可。\n\
  \n自定义覆盖层不仅能美化外观，其实力远不止于此。实际上，你可以完全替换图片选择器控制器的默认界面（chrome），改用你自己定义的用户界面：只需将图片选择器控制器的`showsCameraControls`属性设置为`NO`。如果这样做，你需要实现自己的拍照按钮。该按钮应是覆盖视图的子视图，并调用图片选择器控制器的`takePicture`方法，这会导致图片选择器控制器调用其代理上的`imagePickerController:didFinishPickingMediaWithInfo:`方法。\n\
  \n如果你确实实现了带有“拍照”按钮的自定义覆盖界面，就可以使用图片选择器控制器拍摄多张照片，这是默认界面无法做到的。每次调用图片选择器控制器的`takePicture`方法时，它都会向代理发送另一张图片，但在第一张图片的代理方法仍在处理期间，你不能拍摄下一张。如果你希望连续拍摄多张照片，这个特性会非常有用。\n\
  \n当你隐藏内置的相机界面时，也会同时隐藏允许用户开启相机闪光灯的控制按钮。如果你想提供自己的控件来启用或禁用闪光灯，可以通过图片选择器控制器的`cameraFlashMode`属性来控制该设置。有效的设置值包括：`UIImagePickerControllerCameraFlashModeAuto`（默认设置）、`UIImagePickerControllerCameraFlashModeOff`和`UIImagePickerControllerCameraFlashModeOn`。请注意，并非所有配备摄像头的\
  \ iOS 设备都有闪光灯，因此此设置可能会被忽略。\n\n内置相机界面提供的另一个控件是用于在具有两个摄像头的 iOS 设备上切换后置摄像头和前置摄像头的按钮。你也可以通过图片选择器控制器来控制此设置：只需将`cameraDevice`属性设置为`UIImagePickerControllerCameraDeviceRear`或`UIImagePickerControllerCameraDeviceFront`。在这样做之前，你需要通过调用`UIImagePickerController`类方法`isCameraDeviceAvailable:`并传入所需设备作为参数，来确保所选设备可用。你还可以通过`UIImagePickerController`类方法`isFlashAvailableForCameraDevice:`来根据摄像头设备判断闪光灯是否可用。\n\
  \n通过合理使用这些方法，你可以避免在相机界面中添加用于设置不可用选项的按钮；例如，如果用户从带有闪光灯的后置摄像头切换到没有闪光灯的前置摄像头，那么你应该移除或禁用你提供的闪光灯按钮。\n\
  \n虽然为图片选择器控制器提供自定义界面功能强大，但使用内置界面也有其优势。如果将图片选择器控制器的`allowsEditing`属性设置为`YES`，那么用户拍照后，系统会提示他们进行编辑，允许他们裁剪和移动裁剪后的图像。如果这样做，图片选择器控制器的代理可以通过在作为参数传入的字典中使用不同的键来同时访问原始图像和编辑后的图像。以下是获取每种图像的方法：\n\
  \n```\n- (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    UIImage *originalImage = [info\n        objectForKey:UIImagePickerControllerOriginalImage];\n\
  \    UIImage *editedImage = [info\n        objectForKey:UIImagePickerControllerEditedImage];\n\
  \    ...\n}\n```\n\n当你允许用户编辑他们通过图片选择器控制器拍摄的照片时，应确保：如果存在编辑后的图像，则使用它；如果不存在（即用户未编辑图像），则使用原始图像。如果你允许用户编辑，就不应该使用原始图像，因为用户不会期望你的应用接收到了它。\n\
  \n### 使用`UIImagePickerController`处理视频\n\n如果你希望在应用中支持视频功能，`UIImagePickerController`类为视频提供了与照片基本相同的大部分功能。\n\
  \n\n\n为了正确使用视频的图像选取器控制器，您首先需要通过其`mediaTypes`属性告诉它您想要哪种媒体类型。`mediaTypes`是一个`NSArray`，默认情况下其中只包含`kUTTypeImage`（对应图像）。替代选项是用于电影的`kUTTypeMovie`。图像选取器控制器的可用媒体类型取决于其源类型（例如，相机或相册）。因此，要将图像选取器控制器设置为只提供视频，我们将使用以下代码：\n\
  \n```\n[imagePickerController setMediaTypes:[NSArray arrayWithObject:(id)kUTTypeMovie]];\n\
  ```\n\n**注意：** 要使用`kUTTypeMovie`常量，您需要导入声明该常量的头文件，方法是在文件顶部添加以下内容：\n\n```\n#import\
  \ <MobileCoreServices/UTCoreTypes.h>\n```\n\n您还需要将项目链接到`MobileCoreServices`框架。\n\
  \n由于`mediaTypes`属性是一个数组，您可以创建一个能够选择或拍摄照片和视频的图像选取器控制器。为此，只需将`mediaTypes`属性设置为可用媒体类型的列表：\n\
  \n```\nUIImagePickerControllerSourceType sourceType = [imagePickerController sourceType];\n\
  NSArray *mediaTypes = [UIImagePickerController availableMediaTypesForSourceType:sourceType];\n\
  [imagePickerController setMediaTypes:mediaTypes];\n```\n\n您可以通过这种方式使用图像选取器控制器从相机以及用户的相册中获取视频。\n\
  \n当用户完成拍摄视频或从相册中选择视频时，会在传递给委托方法`imagePickerController:didFinishPickingMediaWithInfo:`的`info`字典中为不同的键提供对象。尽管图像选取器控制器会将原始图像数据传递给此方法，但电影数据太大，无法完整地保留在内存中。为此，图像选取器控制器将改为将带有`UIImagePickerControllerMediaURL`键的文件\
  \ URL 传递给该方法。您可以像这样访问此 URL：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    NSURL *movieURL\
  \ = [info objectForKey:UIImagePickerControllerMediaURL];\n}\n```\n\n如果您期望接收照片或视频，那么您需要查看存储在键`UIImagePickerControllerMediaType`下的对象，以确定用户选择了哪种类型的媒体。该委托方法的一个完整实现可能如下所示：\n\
  \n```\n- (void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    NSString *mediaType = [info objectForKey:UIImagePickerControllerMediaType];\n\
  \    if ([mediaType isEqualToString:(NSString *)kUTTypeMovie]) {\n        NSURL\
  \ *movieURL = [info objectForKey:UIImagePickerControllerMediaURL];\n        // 在此处处理视频\
  \ URL\n    }\n    else if ([mediaType isEqualToString:(NSString *)kUTTypeImage])\
  \ {\n        UIImage *image = [info objectForKey:UIImagePickerControllerEditedImage];\n\
  \        if (image == nil) {\n            image = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
  \        }\n        // 在此处处理图像\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
  }\n```\n\n与照片一样，可以将图像选取器控制器的`allowsEditing`属性设置为`YES`，以允许用户在录制后编辑视频。对于视频来说，这允许用户裁剪视频的开头或结尾部分。`UIImagePickerController`还有一些视频特有的属性，您可以在录制视频时设置这些属性来控制其行为。`videoMaximumDuration`属性可以限制视频的长度，这在例如您计划将视频上传到仅接受特定长度以下视频的服务时会很有用。默认情况下，图像选取器控制器会将视频限制为十分钟。\n\
  \n如果您想控制图像选取器控制器返回的视频质量，请将`videoQuality`方法设置为您希望接收的质量。\n\n\n\n"
- "# 第 10 章：硬件 API\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n默认情况下，该属性设置为\
  \ `UIImagePickerControllerQualityTypeMedium`，苹果公司声明此设置适合通过 Wi-Fi 发送视频。将质量设置为 `UIImagePickerControllerQualityTypeHigh`\
  \ 将完全阻止图像选择器控制器降低质量；对于配备高质量摄像头的设备，这些文件可能会变得非常大，因此除通过 USB 线缆传输外，不建议使用此质量设置来传输视频文件。\n\
  \n`UIImagePickerControllerQualityTypeLow` 将生成一个足够小的视频文件，使其能够轻松通过蜂窝网络传输。\n\n还有三个用于固定分辨率的质量常量：`UIImagePickerControllerQualityType640x480`、`UIImagePickerControllerQualityTypeIFrame960x540`\
  \ 和 `UIImagePickerControllerQualityTypeIFrame1280x720`。\n\n无论您将 `videoQuality` 属性设置为何值，视频都只能被缩小，而不能被放大。如果您的源类型是用户的照片库，并且他们选择了一个视频，则\
  \ `videoQuality` 属性将用于降低视频的分辨率（如果需要）。发生这种情况时，在 `imagePickerController:didFinishPickingMediaWithinfo:`\
  \ 方法中传递给代理的信息字典将包含 `UIImagePickerControllerReferenceURL` 键下的原始视频 URL。\n\n如果您将图像选择器控制器的\
  \ `cameraFlashMode` 属性设置为 `UIImagePickerControllerCameraFlashModeOn`，那么在图像选择器控制器显示并设置为拍摄视频时，闪光灯将保持开启。这可能会对电池寿命产生不利影响，因此请确保仅在必要时使用。\n\
  \n### 使用 UIVideoEditorController 处理视频\n\n一旦您使用 `UIImagePickerController` 获取了视频的\
  \ URL，您可能希望为用户提供编辑视频的方式。这就是 `UIVideoEditorController` 类的用武之地。要使用它，只需创建一个 `UIVideoEditorController`\
  \ 实例，将其 `videoPath` 属性设置为视频的路径，然后像呈现任何其他视图控制器一样呈现它。它与 `UIImagePickerController`\
  \ 有两个共同的属性：`videoMaximumDuration` 和 `videoQuality`，它们的功能与图像选择器控制器的对应属性完全相同，尽管图像选择器控制器的默认视频质量为\
  \ `UIImagePickerControllerQualityTypeMedium`，而视频编辑器控制器的默认视频质量为 `UIImagePickerControllerQualityTypeLow`。\n\
  \n在创建视频编辑器控制器之前，请通过调用类方法 `canEditVideoAtPath:` 来验证它是否能够编辑该视频。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**注意：** `UIVideoEditorController` 的 `videoPath` 属性是一个 `NSString`，但 `UIImagePickerController`\
  \ 类传递给代理方法 `imagePickerController:didFinishPickingMediaWithInfo:` 的是一个包含编辑信息的字典，其中包含键\
  \ `UIImagePickerControllerMediaURL`，其值是一个 `NSURL` 对象。要将 `NSURL` 转换为其所代表的 `NSString`\
  \ 路径，请使用其 `path` 方法。\n\n当用户完成视频编辑后，视频编辑器控制器会调用代理方法 `videoEditorController:didSaveEditedVideoToPath:`，并传入编辑后视频的路径（作为字符串）。代理还需要实现\
  \ `videoEditorControllerDidCancel:` 以处理用户取消操作的情况，以及 `videoEditorController:didFailWithError:`\
  \ 以处理任何错误情况。\n\n`UIImagePickerController` 和 `UIVideoEditorController` 类为您提供了在应用中使用照片和视频所需的大部分功能。对于本书范围之外的高级图像处理，请查看\
  \ Core Image 框架；对于更高级的视频处理，请查看 AVFoundation 框架。我们稍后还会在本书中介绍如何在您的应用中播放音频和视频。接下来在本章中，我们将讨论如何在您的\
  \ iOS 应用中使用另一种硬件：加速计。\n\n## 使用加速计\n\n响应用户操作的一种方式是使用设备的加速计。该设备提供关于设备方向的实时数据，让您确切知道用户是如何手持它的。来自加速计的数据非常详尽——您可快至每十毫秒接收一次数据——对于简单的任务来说，这绝对是杀鸡用牛刀。幸运的是，有一些更高级的方法来响应用户的运动，不需要您处理原始的加速计数据。以防您需要使用它，我们也会介绍这部分内容，但首先，我们将了解一些更易于使用的\
  \ API。\n\n### 加速计事件\n\n正如我们在第 5 章中看到的，当用户点击屏幕时，您会收到一个 `UIEvent` 对象，其中包含一个或多个代表触摸的\
  \ `UITouch` 对象。类似地，当用户摇动设备时，它会生成一个代表该运动的 `UIEvent`。此事件沿着响应者链向上传递，直到某个响应者实现了 `motionBegan:withEvent:`\
  \ 方法或 `motionEnded:withEvent:` 方法。在这些方法中，您可以适当响应该事件。例如，如果您有一个具有撤销方法的视图控制器，并且您希望允许用户摇动手机来调用撤销方法，那么您的视图控制器首先需要成为第一响应者才能接收该事件。要使对象成为第一响应者，请按如下方式实现\
  \ `canBecomeFirstResponder`：\n\n```\n- (BOOL)canBecomeFirstResponder\n{\n    return\
  \ YES;\n}\n```\n\n然后，您需要告知您的视图控制器在其视图出现时成为第一响应者，并在其视图消失时放弃第一响应者身份：\n\n```\n- (void)viewDidAppear:(BOOL)animated\n\
  {\n    [super viewDidAppear:animated];\n    [self becomeFirstResponder];\n}\n\n\
  - (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    [self resignFirstResponder];\n}\n```\n\n一旦您的视图控制器成为第一响应者，您就可以按如下方式实现触摸方法：\n\
  \n```\n- (void)motionBegan:(UIEventSubtype)motion withEvent:(UIEvent *)event\n{\n\
  }\n\n- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event\n{\n\
  \    [self undo];\n}\n\n- (void)motionCancelled:(UIEventSubtype)motion withEvent:(UIEvent\
  \ *)event\n{\n}\n```\n\n如您所见，这里代码并不多。您甚至不需要在 `motionBegan:withEvent:` 或 `motionCancelled:withEvent:`\
  \ 方法中放置任何内容；它们只需要存在，以便应用程序可以向该对象发送运动事件。当您实现“摇动以撤销”时，您需要向用户提供一个选择，但处理摇动的代码仍然如此简单。\n\
  \n在我看来，“摇动以撤销”有点难以理解且不易被用户发现，同时很容易意外触发，但如果您想支持它，这并不困难。通常，您会使用 `UIAlertView` 来提供选择；一个典型的\
  \ `motionEnded:withEvent:` 方法如下所示：\n\n```\n- (void)motionEnded:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n{\n    // 此处的 \"self\" 应遵循 UIAlertViewDelegate 协议。\n\
  \    UIAlertView *alertView =\n        [[UIAlertView alloc] initWithTitle:@\"撤销\"\
  \n                                  message:@\"您想要撤销吗？\"\n                     \
  \            delegate:self\n                        cancelButtonTitle:@\"不撤销\"\n\
  \                        otherButtonTitles:@\"撤销\", nil];\n    [alertView show];\n\
  }\n```\n\n当用户选择“撤销”或“不撤销”后，您的代码将相应地执行撤销操作或不执行任何操作。\n\n### 设备方向通知\n\n\n\n"
- "# 使用加速计与 Core Motion\n\n设备中加速计的另一个用途是确定设备方向。大多数情况下，当设备方向改变时你无需干预。只需在你的视图控制器的 `shouldAutorotateToInterfaceOrientation:`\
  \ 方法中返回正确的值，它就会自动旋转界面来适应方向变化。但在某些场景下，你可能希望在不改变用户界面方向的前提下，接收方向变化的通知。\n\n要开始接收这些通知，你必须调用设备的\
  \ `beginGeneratingDeviceOrientationNotifications` 方法，该方法可通过 `currentDevice` 类方法获取。你可以像下面这样组合方法并开始生成通知：\n\
  \n```\n[[UIDevice currentDevice] beginGeneratingDeviceOrientationNotifications];\n\
  ```\n\n一旦启用了通知，你有责任在不再需要时通过调用 `endGeneratingDeviceOrientationNotifications` 方法告知设备。如果不这样做，加速计硬件将保持比平时更活跃的状态，导致你的应用消耗更多电量。\n\
  \n启用方向通知后，代表设备的 `UIDevice` 对象会以名称 `UIDeviceOrientationDidChangeNotification` 向默认通知中心发布通知。只需为这个通知添加一个观察者，然后检查设备的\
  \ `orientation` 属性即可确定其当前方向。方向的可能值如下：\n\n- `UIDeviceOrientationUnknown`\n- `UIDeviceOrientationPortrait`\n\
  - `UIDeviceOrientationPortraitUpsideDown`\n- `UIDeviceOrientationLandscapeLeft`\n\
  - `UIDeviceOrientationLandscapeRight`\n- `UIDeviceOrientationFaceUp`\n- `UIDeviceOrientationFaceDown`\n\
  \n列表中最后两个尤其值得注意。如果用户将手机平放，设备的加速计将无法确定界面方向，只能判断设备是面朝上还是面朝下。请务必始终考虑这两个值，因为忽略它们可能导致不可预见的情况。\n\
  \n## 使用 Core Motion 处理原始加速计、陀螺仪和磁力计数据\n\n有时，设备方向对于你的应用程序来说粒度不够精细。这在游戏中经常出现，它们需要高精度的实时更新。加速计数据完全能够满足这些需求。部分\
  \ iOS 设备还配备了陀螺仪，有助于提供更精确的运动数据。这些数据通过 Core Motion 框架提供给您的应用程序。让我们来看一个快速示例应用，它利用设备运动在屏幕上移动一个圆点。\n\
  \n**注意：** 使用 Core Motion 需要在 iOS 设备上测试代码，因为 iPhone 模拟器不支持它。如果你还没有在设备上运行过代码，请确保拥有有效的\
  \ iOS 开发者账号，并阅读 `http://developer.apple.com/ios` 上的文档，了解如何在设备上开始运行代码。附录 A 中也会详细说明这一点。\n\
  \n打开 Xcode，选择 File ➤ New ➤ Project…或按 `+Shift+N` 创建新项目。在左侧栏 iOS 下选择 Application，然后在右侧选择\
  \ Single View Application 模板，点击 Next。输入 `MotionDot` 作为产品名称，填写你的公司标识符和类前缀。在 Device\
  \ Family 旁边选择 iPhone，确保未勾选 Use Storyboards 和 Include Unit Tests，同时确保勾选了 Use Automatic\
  \ Reference Counting。点击 Next，选择项目保存位置，点击 Create 创建项目。项目中会有一个已创建的视图控制器类——我的是 `LCTViewController`。打开其实现文件（`LCTViewController.m`）。\n\
  \n首先，我们将创建一个根据设备运动移动的视图。通过将加粗代码添加到文件顶部的类扩展中（如果没有类扩展，请将这段代码完整输入在 `#import` 语句和 `@implementation`\
  \ 指令之间），添加一个实例变量来存储这个视图：\n\n```\n@interface LCTViewController () {\n    UIView *_blueDot;\n\
  }\n@end\n```\n\n修改 `viewDidLoad` 方法来创建这个视图，并修改 `viewDidUnload` 方法销毁它，添加加粗行：\n\n\
  ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    _blueDot = [[UIView alloc]\
  \ initWithFrame:CGRectMake(0.0f, 0.0f, 20.0f, 20.0f)];\n    [_blueDot setBackgroundColor:[UIColor\
  \ blueColor]];\n    [[self view] addSubview:_blueDot];\n}\n\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    _blueDot = nil;\n}\n```\n\n我们不希望用户界面旋转，因此删除划掉的行，并在\
  \ `shouldAutorotateToInterfaceOrientation:` 方法中添加加粗行：\n\n```\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    return (interfaceOrientation == UIInterfaceOrientationPortrait);\n}\n```\n\
  \n接下来，我们将设置实际的运动处理方法。首先，需要将 Core Motion 框架添加到项目中。在文件浏览器顶部选择项目，然后选择 `MotionDot` 目标。在编辑窗格中选择\
  \ Build Phases 标签，然后通过点击标题左侧箭头展开 Link Binary With Libraries 阶段。点击展开库列表底部的加号（+），从列表中选择\
  \ `CoreMotion.framework`，点击 Add。接着，再次打开视图控制器的实现文件（`LCTViewController.m`），在文件顶部添加\
  \ Core Motion 头文件的 `#import` 语句，并在类扩展中添加一个 `CMMotionManager` 类的实例变量，添加加粗行：\n\n```\n\
  #import \"LCTViewController.h\"\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
  \ LCTViewController () {\n    CMMotionManager *_motionManager;\n    UIView *_blueDot;\n\
  }\n@end\n```\n\n现在我们可以准备接收运动数据了。在 `viewDidLoad` 方法之后，通过添加以下加粗代码来添加 `viewWillAppear:`\
  \ 和 `viewWillDisappear:` 的方法实现：\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    CGRect bounds = [[self view] bounds];\n\
  \    CGFloat width = CGRectGetWidth(bounds);\n    CGFloat height = CGRectGetHeight(bounds);\n\
  \    CGRect blueDotFrame = [_blueDot frame];\n    CGFloat dotWidth = CGRectGetWidth(blueDotFrame);\n\
  \    CGFloat dotHeight = CGRectGetHeight(blueDotFrame);\n\n    _motionManager =\
  \ [[CMMotionManager alloc] init];\n    if ([_motionManager isAccelerometerAvailable]\
  \ == NO) {\n        return;\n    }\n    [_motionManager setAccelerometerUpdateInterval:1.0\
  \ / 60.0];\n\n    CMAccelerometerHandler accelerometerHandler =\n    ^(CMAccelerometerData\
  \ *accelerometerData, NSError *error) {\n        CMAcceleration acceleration = [accelerometerData\
  \ acceleration];\n        CGFloat x = floorf(((width - dotWidth) / 2.0f) + (100\
  \ * acceleration.x));\n        CGFloat y = floorf(((height - dotHeight) / 2.0f)\
  \ + (100 * acceleration.y));\n        CGFloat dotwidth = floorf(dotWidth * (20 *\
  \ acceleration.z));\n        CGFloat dotheight = floorf(dotHeight * (20 * acceleration.z));\n\
  \        [_blueDot setFrame:CGRectMake(x, y, dotwidth, dotheight)];\n    };\n\n\
  \    [_motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue]\n\
  \                                        withHandler:accelerometerHandler];\n}\n\
  \n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    if ([_motionManager isAccelerometerActive]) {\n        [_motionManager stopAccelerometerUpdates];\n\
  \    }\n    _motionManager = nil;\n}\n```\n\n\n\n这段代码的工作原理是，首先检查加速度计是否可用，然后将更新间隔设置为每秒\
  \ 60 次。`accelerometerHandler` 变量持有一个代码块，该代码块处理来自运动管理器的返回数据，数据形式为 `CMAccelerometerData`\
  \ 对象。而该对象又有一个名为 `acceleration` 的属性，它是一个包含 `x`、`y` 和 `z` 三个成员的 C 语言结构体，这三个成员是来自设备的实际测量值。我们使用这些数据来移动蓝点。当视图开始消失时，我们检查加速度计是否处于活动状态，如果是，则将其禁用。\n\
  \n在设备上构建并运行这段代码，然后稍微移动一下设备。你会注意到蓝点抖动得很厉害，但你可以通过移动设备在屏幕上移动它。你现在正在使用加速度计数据！虽然严肃的、面向业务的应用通常用不到这些数据，但如果你正在开发一款驾驶游戏，你绝对会想研究一下这个功能。\n\
  \nCore Motion 框架也涵盖了陀螺仪数据。其方法与加速度计的方法非常相似：你需要在调用 `setGyroUpdateInterval:` 和 `startGyroUpdatesToQueue:withHandler:`\
  \ 之前调用 `isGyroAvailable`。这些方法的结构与它们的加速度计对应方法完全相同，区别在于传递给 `startGyroUpdatesToQueue:withHandler:`\
  \ 的代码块接收的是一个 `CMGyroData` 对象，该对象包含一个 C 语言结构体 `CMRotationRate`，它有三个成员（`x`、`y` 和 `z`），用于测量沿着每个轴的旋转速率，单位是弧度每秒。当你完成接收陀螺仪数据后，务必调用\
  \ `stopGyroUpdates`。\n\n一些 iOS 设备中的另一个传感器是磁力计，它测量设备周围的磁场。虽然听起来像是科幻电影里的东西，但这现在已经很常见了。磁力计的方法遵循与加速度计和陀螺仪方法相同的模式：首先调用\
  \ `isMagnetometerAvailable`，然后调用 `setMagnetometerUpdateInterval:` 和 `startMagnetometerUpdatesToQueue:withHandler:`，最后在完成操作后调用\
  \ `stopMagnetometerUpdates`。传递给处理器的对象是一个 `CMMagnetometerData` 对象，它有一个属性 `magneticField`，该属性是一个包含三个成员（`x`、`y`\
  \ 和 `z`）的结构体，每个成员测量该方向上的磁场强度，单位是微特斯拉。有了这些信息，你就有足够的信息来创建属于自己的指南针应用了。\n\nCore Motion\
  \ 框架的杀手锏功能不在于它能使用这三个传感器中的任何一个，而在于它能同时使用它们。通过结合加速度计和陀螺仪，我们可以过滤掉重力，从而更纯粹地了解用户的运动，我们还可以利用周围的磁场来校准这些测量值。不过，这些都是复杂的计算，远远超出了本书的范围。幸运的是，你不需要自己解决这个问题。\n\
  \nCore Motion 返回的第四种数据类型，恰当地被称为设备运动。你将像使用其他类型一样使用它：调用 `isDeviceMotionAvailable`，然后调用\
  \ `setDeviceMotionUpdateInterval:`，接着调用 `startDeviceMotionUpdatesToQueue:withHandler:`，最后调用\
  \ `stopDeviceMotionUpdates`。处理器接收到一个 `CMDeviceMotion` 对象，其中包含了来自所有三个传感器的综合数据。其中的\
  \ `rotationRate` 属性与陀螺仪返回的数据类似，但已经由 Core Motion 移除了偏差（即传感器在没有输入信号时的输出）。加速度计数据则被分离为\
  \ `gravity` 和 `userAcceleration` 属性，允许你分别测量它们。`magneticField` 属性存储磁场数据，同样也由 Core\
  \ Motion 移除了偏差。\n\n当你使用 Core Motion 中的设备运动数据时，还有一种其他类型的数据不会返回的数据类型：`attitude` 属性。这是一个\
  \ `CMAttitude` 对象，包含 `roll`、`pitch` 和 `yaw`；以及四元数和旋转矩阵。如果你了解使用这些数据的数学原理，那么你可以直接使用，无需自行计算。\n\
  \nCore Motion 是一个非常强大的框架。你可能永远都用不到它，但如果你需要，你可以从中获取丰富的数据。然而，如果你需要确定手机的位置，你将使用 GPS\
  \ 芯片和 Core Location 框架。\n\n## 使用位置数据\n\n人们喜欢在他们的设备上搜索本地数据。从餐厅评论到天气预报再到本地交友，位置数据对你的用户来说有数不清的用途。话虽如此，你也应该尽一切可能保护用户的隐私，并且绝不要将他们的位置数据发送到他们没有明确要求你发送的任何地方。这是非常严肃的事情——搞砸了用户隐私，美国国会可能会向苹果公司询问你的应用。\n\
  \n### 使用 CoreLocation\n\n要获取原始位置数据，你将使用 Core Location 框架。在通过 `locationServicesEnabled`\
  \ 类方法检查其可用性后，你将创建一个 `CLLocationManager` 对象的实例。第一次尝试访问用户的位置时，系统会显示一个提示，要求他们授权你的应用使用他们的位置数据。如果应用需要这些数据的原因不明确，你可以将位置管理器的\
  \ `purpose` 属性设置为一个字符串来解释你将要做的事情。你始终可以通过 `authorizationStatus` 类方法检查授权状态，该方法返回一个\
  \ `CLAuthorizationStatus` 值。如果该值等于 `kCLAuthorizationStatusDenied`，则表示用户拒绝了授权提示或完全禁用了定位服务。此时，除非用户打开“设置”应用并解除对你的应用的限制，或者重新启用被禁用的定位服务，否则你将无法使用\
  \ Core Location。\n\nCore Location 框架从三个来源获取位置数据。第一个来源是预计只有通过蜂窝网络通信的设备才可用的移动基站三角定位。通过查看附近的移动基站并估算设备与基站之间的距离，设备可以大致了解你的位置。仅凭这些信息，你无法获得极其精确的位置，但如果你的应用只需要确定用户所在的国家，这通常就足够了。Core\
  \ Location 还会检查附近有哪些 Wi-Fi 网络，并查询一个位置数据库，以帮助根据附近的网络确定用户的位置。这会更精确一些，因为 Wi-Fi 网络比移动基站更多。最后，对于带有硬件\
  \ GPS 芯片的设备，设备可以利用 GPS 卫星精确地定位用户的位置。前面确定用户位置的方法有助于将 GPS 搜索范围缩小到一个粗略的位置，然后 Core Location\
  \ 可以利用这个粗略位置更快地找到正确的 GPS 卫星。\n\nCoreLocation 的一大优点是，你不需要管理这些不同的数据源。Core Location\
  \ 会根据需要自动使用它们，无缝地从一种切换到另一种。你只需要让 `CLLocationManager` 类开始更新用户的位置，它就会接管后续操作。\n\n`CLLocationManager`\
  \ 类与 `CMMotionManager` 类有许多相似之处，但没有现代的基于代码块的语法。你将调用 `startUpdatingLocation` 来开启位置管理器，然后它会调用带有数据的委托方法。你可以通过以下方式控制其返回的内容：\n\
  \n\n\n`desiredAccuracy` 属性。如果您需要确定街道级别的精度，应将 `desiredAccuracy` 设置为 `kCLLocationAccuracyBest`；但如果您只需确定用户位于某个特定地理区域，则可以使用另一个极值\
  \ `kCLLocationAccuracyThreeKilometers`，该值的精度仅为三公里。通常，您应尽可能指定最低的所需精度；定位管理器要求的精度越高，就越可能使用设备中高耗电的通信系统，而\
  \ GPS 芯片是其中最耗电的。\n\n您将接收到的委托消息是 `locationManager:didUpdateToLocation:fromLocation:`。您会同时收到新位置和旧位置，从而可以判断位置变化是否足以触发操作。位置是\
  \ `CLLocation` 类的实例。对于用户位置而言，最重要的属性是 `coordinate` 属性（包含经纬度数据）以及 `altitude` 属性。还有一些其他有用的属性，例如\
  \ `course` 和 `speed`。\n\n**注意：** 一旦您已根据需求充分获取了用户位置，请务必通过调用定位管理器上的 `stopUpdatingLocation`\
  \ 来禁用定位服务。所涉及的硬件在功耗方面成本极高，因此运行时间越短越好。\n\n如果您不需要超高频率地更新用户位置，只需知道他们已移动到不同位置；您可以改为通过调用定位管理器上的\
  \ `startMonitoringSignificantLocationChanges` 来监控重大位置变化。这仍然会使定位管理器调用 `locationManager:didUpdateToLocation:fromLocation:`，但频率不会那么高。请务必使用\
  \ `significantLocationChangeMonitoringAvailable` 类方法检查此功能是否可用。\n\n如果您想知道用户何时进入或离开某个区域，则可以使用\
  \ `startMonitoringForRegion:desiredAccuracy:` 方法，并传入一个 `CLRegion` 对象，该对象包含中心坐标和以米为单位的半径。当您在监控某个区域时，定位管理器会适时调用\
  \ `locationManager:didEnterRegion:` 和 `locationManager:didExitRegion:` 方法。\n\n###\
  \ 使用 MapKit\n\n如果您想向用户显示地图，则应使用 MapKit 框架。MapKit 的核心是 `MKMapView` 类，它会绘制一张用户可交互的地图，同时也允许您提供自己的地图数据。您可以在地图上高亮显示特定点、在特定地理区域上绘制线条，以及在地图上绘制任意形状。截至\
  \ iOS 5.1，MapKit 使用的所有地图数据均由 Google 提供，不过这在未来的 iOS 版本中可能会有所变化。\n\n学习使用 MapKit 的最佳方式可能是直接动手实践，那么我们就开始吧。我们将为\
  \ TwitterExample 项目添加一个非常酷的功能：本地推文地图。在 Xcode 中打开项目。首先，我们需要将 CoreLocation 和 MapKit\
  \ 框架添加到项目中。点击文件浏览器顶部的项目，然后在 TARGETS 下选择 TwitterExample 目标，并导航到 Build Phases 选项卡。展开\
  \ Link Binary With Libraries 阶段，点击加号按钮，选择 `CoreLocation.framework` 和 `MapKit.framework`（您可以按住按键同时点击来选择多个项目），然后点击\
  \ Add。接下来，我们需要为项目添加搜索功能。\n\n打开 `LCTTwitterController.h`，并通过添加以下粗体行来为 `CLLocation`\
  \ 类添加前置类声明以及两个新方法声明：\n\n```objc\n#import <Foundation/Foundation.h>\n\n@class CLLocation;\n\
  \n@interface LCTTwitterController : NSObject\n\n+ (id)sharedInstance;\n\n- (void)authorizeAccountWithCompletionHandler:(void(^)(void))handler;\n\
  \n- (void)getTweetsInUserTimelineWithCompletionHandler:(void(^)(NSArray *tweets))handler;\n\
  ```\n\n\n\n- (void)getTweetsNearStreetAddress:(NSString *)streetAddress  \nsearchRadius:(NSUInteger)searchRadiusInMeters\
  \  \ncompletionHandler:(void(^)(NSArray *tweets))handler;  \n\n- (void)getTweetsNearLocation:(CLLocation\
  \ *)location  \nsearchRadius:(NSUInteger)searchRadiusInMeters  \ncompletionHandler:(void(^)(NSArray\
  \ *tweets))handler;  \n\n@end  \n\n我们将从控制器外部调用的方法是`getTweetsNearStreetAddress:searchRadius:completionHandler:`，它会将第一个参数提供的街道地址转换为`CLLocation`对象，然后调用`getTweetsNearLocation:searchRadius:completionHandler:`完成搜索，使用\
  \ Twitter 搜索 API 查找该位置附近的推文，并将结果解析为推文数组。导航至`LCTTwitterController.m`，并通过在文件顶部添加加粗行来导入\
  \ Core Location 和 MapKit 头文件：\n\n```objc\n#import \"LCTTwitterController.h\"\n\n\
  #import <Accounts/Accounts.h>\n\n#import <CoreLocation/CoreLocation.h>\n\n#import\
  \ <MapKit/MapKit.h>\n\n#import <Twitter/Twitter.h>\n```\n\n接下来，在`@end`指令之前，通过添加加粗的行，将第一个方法添加到实现中：\n\
  \n```objc\n- (void)getTweetsNearStreetAddress:(NSString *)streetAddress\nsearchRadius:(NSUInteger)searchRadiusInMeters\n\
  completionHandler:(void (^)(NSArray *))handler\n{\n    // 对地址进行地理编码\n    CLGeocoder\
  \ *geocoder = [[CLGeocoder alloc] init];\n    [geocoder geocodeAddressString:streetAddress\n\
  \                 completionHandler:^(NSArray *placemarks,\n                   \
  \                  NSError *error) {\n        if ([placemarks count] > 0) {\n  \
  \          CLPlacemark *placemark = [placemarks objectAtIndex:0];\n            CLLocation\
  \ *location = [placemark location];\n            if (location != nil) {\n      \
  \          // 现在我们有了地址，可以搜索 Twitter 了。\n                [self getTweetsNearLocation:location\n\
  \                              searchRadius:searchRadiusInMeters\n             \
  \            completionHandler:handler];\n            }\n        }\n        else\
  \ {\n            NSLog(@\"对 %@ 进行地理编码时出错：%@\", streetAddress, error);\n        }\n\
  \    }];\n}\n```\n\n该方法首先创建一个`CLGeocoder`对象，用于将街道地址地理编码为位置坐标。一旦以`CLLocation`对象的形式获取到位置，它便会将该位置与搜索半径和完成处理程序一同传递给下一个方法。在第一个方法之后，通过添加加粗的行来添加下一个方法：\n\
  \n```objc\n- (void)getTweetsNearLocation:(CLLocation *)location\n              \
  \  searchRadius:(NSUInteger)searchRadiusInMeters\n           completionHandler:(void\
  \ (^)(NSArray *))handler\n{\n    NSString *searchURI =\n        [NSString stringWithFormat:\n\
  \         @\"http://search.twitter.com/search.json?geocode=%f,%f,%fkm\",\n     \
  \    [location coordinate].latitude,\n         [location coordinate].longitude,\n\
  \         (float)searchRadiusInMeters / 1000.0f];\n    \n    NSURL *searchURL =\
  \ [NSURL URLWithString:searchURI];\n    TWRequest *searchRequest = [[TWRequest alloc]\
  \ initWithURL:searchURL\n                                                   parameters:nil\n\
  \                                                requestMethod:TWRequestMethodGET];\n\
  \    \n    [[UIApplication sharedApplication]\n        setNetworkActivityIndicatorVisible:YES];\n\
  \    \n    [searchRequest performRequestWithHandler:^(NSData *responseData,\n  \
  \                                             NSHTTPURLResponse *response,\n   \
  \                                            NSError *error) {\n        [[UIApplication\
  \ sharedApplication]\n            setNetworkActivityIndicatorVisible:NO];\n    \
  \    \n        if (responseData) {\n            id topLevelObject = [NSJSONSerialization\n\
  \                JSONObjectWithData:responseData\n                           options:0\n\
  \                             error:NULL];\n            \n            if ([topLevelObject\
  \ isKindOfClass:[NSDictionary class]]) {\n                NSArray *results = [topLevelObject\n\
  \                    objectForKey:@\"results\"];\n                \n           \
  \     if ([results isKindOfClass:[NSArray class]] && [results\n                \
  \    count] > 0) {\n                    if (handler != NULL) {\n               \
  \         handler(results);\n                    }\n                }\n        \
  \        else {\n                    NSLog(@\"没有结果。\");\n                }\n   \
  \         }\n        }\n        else {\n            NSLog(@\"搜索时出错：%@\", error);\n\
  \        }\n    }];\n}\n```\n\n在这个方法中，我们基于位置的坐标属性和`searchRadiusInMeters`参数创建搜索 URL，为了适配\
  \ API，我们将搜索半径转换为千米。获取到 URL 后，搜索过程与之前相同：创建一个`TWRequest`对象并执行它。\n\n\n\n由于我们要在地图上显示推文，因此需要一个实现\
  \ `MKAnnotation` 协议的类。标注是地图上的一个点，例如，我们可以在这里放置一个用户可以点击的图钉。由于地图上的每个点都对应一条推文，我们将创建一个\
  \ `LCTTweet` 类来存储推文信息。点击 **文件 -> 新建 -> 文件...** 或按下 **Command+N**。\n\n在左侧栏中选择 **Cocoa\
  \ Touch**，然后在右侧选择 **Objective-C class**。\n\n点击 **下一步**。在 **Subclass Of** 中输入 `NSObject`，然后在\
  \ **Class** 中输入 `LCTTweet`。点击 **下一步**，然后点击 **创建** 将文件保存到磁盘。打开 `LCTTweet.h` 并添加加粗显示的代码：\n\
  \n```\n#import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\n@interface\
  \ LCTTweet : NSObject <MKAnnotation>\n\n@property (copy, nonatomic) NSString *text;\n\
  @property (copy, nonatomic) NSString *username;\n@property (copy, nonatomic) CLLocation\
  \ *location;\n\n@end\n```\n\n接下来，打开 `LCTTweet.m` 并添加加粗显示的代码：\n\n```\n#import \"\
  LCTTweet.h\"\n\n@implementation LCTTweet\n\n@synthesize text = _text;\n@synthesize\
  \ username = _username;\n@synthesize location = _location;\n\n#pragma mark - MKAnnotation\
  \ Protocol Methods\n\n- (NSString *)title\n{\n    return [self text];\n}\n\n- (NSString\
  \ *)subtitle\n{\n    return [self username];\n}\n\n- (CLLocationCoordinate2D)coordinate\n\
  {\n    return [[self location] coordinate];\n}\n\n#pragma mark -\n\n@end\n```\n\n\
  如你所见，这个类相当简洁。我们稍后会负责创建推文并填充数据；目前，我们只需要这个类实现 `MKAnnotation` 协议的方法 `title`、`subtitle`\
  \ 和 `coordinate`。\n\n我们将在 `LCTTwitterController` 类中将推文解析为 `LCTTweet` 对象。\n\n打开 `LCTTwitterController.m`，并在文件顶部导入\
  \ `LCTTweet` 的头文件，添加加粗显示的行：\n\n```\n#import \"LCTTwitterController.h\"\n#import\
  \ <Accounts/Accounts.h>\n#import <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n\
  #import <Twitter/Twitter.h>\n#import \"LCTTweet.h\"\n```\n\n接下来，修改 `getTweetsNearLocation:searchRadius:completionHandler:`\
  \ 方法，删除带删除线的行并添加加粗显示的行：\n\n```\n- (void)getTweetsNearLocation:(CLLocation *)location\n\
  searchRadius:(NSUInteger)searchRadiusInMeters\ncompletionHandler:(void (^)(NSArray\
  \ *))handler\n{\n    NSString *searchURI =\n    [NSString stringWithFormat:\n  \
  \   [@\"http://search.twitter.com/search.json?geocode=%f,%f,%fkm\"],\n     [location\
  \ coordinate].latitude,\n     [location coordinate].longitude,\n     (float)searchRadiusInMeters\
  \ / 1000.0f];\n\n    NSURL *searchURL = [NSURL URLWithString:searchURI];\n    TWRequest\
  \ *searchRequest = [[TWRequest alloc] initWithURL:searchURL\n                  \
  \                                 parameters:nil\n                             \
  \                   requestMethod:TWRequestMethodGET];\n\n    [[UIApplication sharedApplication]\
  \ setNetworkActivityIndicatorVisible:YES];\n\n    [searchRequest performRequestWithHandler:^(NSData\
  \ *responseData,\n                                                NSHTTPURLResponse\
  \ *response,\n                                                NSError *error) {\n\
  \        [[UIApplication sharedApplication]\n         setNetworkActivityIndicatorVisible:NO];\n\
  \n        if (responseData) {\n            id topLevelObject = [NSJSONSerialization\n\
  \                                 JSONObjectWithData:responseData\n            \
  \                     options:0\n                                 error:NULL];\n\
  \n            if ([topLevelObject isKindOfClass:[NSDictionary class]]) {\n     \
  \           NSArray *results = [topLevelObject objectForKey:@\"results\"];\n   \
  \             if ([results isKindOfClass:[NSArray class]] && [results count] > 0)\
  \ {\n                    NSMutableArray *tweets = [NSMutableArray array];\n    \
  \                for (NSDictionary *tweetDict in results) {\n                  \
  \      LCTTweet *tweet = [[LCTTweet alloc] init];\n                        [tweet\
  \ setText:[tweetDict objectForKey:@\"text\"]];\n                        [tweet setUsername:\n\
  \                         [tweetDict objectForKey:@\"from_user_name\"]];\n\n   \
  \                     // 并非每条推文都有精确位置。\n                        NSDictionary *geoDict\
  \ = [tweetDict\n                                                 objectForKey:@\"\
  geo\"];\n                        if ([geoDict isKindOfClass:[NSDictionary class]])\
  \ {\n                            NSArray *coords = [geoDict\n                  \
  \                             objectForKey:@\"coordinates\"];\n                \
  \            float latitude = [[coords objectAtIndex:0]\n                      \
  \                        floatValue];\n                            float longitude\
  \ = [[coords objectAtIndex:1]\n                                               floatValue];\n\
  \                            CLLocation *location =\n                          \
  \  [[CLLocation alloc] initWithLatitude:latitude\n```\n\n*（注：代码块中的 URL 原本有一个多余的右括号\
  \ `]` 和一个不匹配的引号；这里已尽可能保持与原文一致。）*\n\n\n\n"
