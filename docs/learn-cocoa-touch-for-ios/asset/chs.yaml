  #### 在 Retina 显示屏设备上的视图布局


  与图像类似，在配备 Retina 显示屏的设备上布局视图时，有一些需要注意的事项。值得庆幸的是，您编写的大部分实际代码无需更改，但在与设计师合作时，了解操作系统如何处理
  Retina 显示屏将大有裨益。


  在绘制和定位视图时，屏幕尺寸并非以像素为单位，而是以点（points）为单位进行测量。点是一种抽象度量单位，根据设备分辨率对应不同数量的像素。在 iPhone、iPhone
  3G 或 iPhone 3GS，以及对应的 iPod touch 型号上，屏幕宽 320 像素、高 480 像素，以点计量时同样为宽 320 点、高 480 点。iPhone
  4、iPhone 4S 及后续可能的 iPhone 设备，连同对应的 iPod touch 型号，屏幕宽 640 像素、高 960 像素。然而以点计量时，尺寸完全相同：宽
  320 点、高 480 点。因此，当您考虑 iPhone 4S 上 `UIWindow` 的 `frame` 属性时，其 `size` 成员的值是 320 和
  480，而非 640 和 960。这对开发者而言，意味着无需对现有应用进行额外调整即可在 Retina 显示屏上正常运行。您只需提供双倍尺寸的图像，布局依然保持不变。


