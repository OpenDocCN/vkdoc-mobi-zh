  \n                             delegate:nil\n                    cancelButtonTitle:@\"\
  确定\"\n                    otherButtonTitles:nil];\n    [alertView show];\n}\n```\n\
  \n在此方法中，我们分别使用 `canUseCamera` 和 `canUsePhotoLibrary` 来存储摄像头和照片库是否可用。为了确定这一点，我们使用\
  \ `UIImagePickerController` 类方法 `isSourceTypeAvailable:` 判断来源是否可用，然后使用 `availableMediaTypesForSourceType:`\
  \ 判断该来源类型能否返回视频。这一点很重要，因为某些旧款 iOS 设备虽然有摄像头，但无法拍摄视频（只能拍照）。如果发现两种来源类型都可用且能返回视频，我们就创建一个包含两个选项的\
  \ `UIActionSheet` 并呈现给用户。如果只有一种来源类型可用且能返回视频，我们就用该来源类型调用视图控制器的 `showImagePickerForSourceType:`\
  \ 方法。如果两种来源类型均不可用，则通过 `UIAlertView` 通知用户。如果显示了操作列表，当用户选择某个选项时，会调用操作列表的代理方法 `actionSheet:clickedButtonAtIndex:`。\n\
  \n在实现此方法之前，我们先添加一条 `#pragma mark` 语句来帮助组织代码。将以下加粗的代码添加在刚才实现的方法之后、`@end` 指令之前：\n\n\
  ```\n#pragma mark - UIActionSheetDelegate 协议方法\n\n- (void)actionSheet:(UIActionSheet\
  \ *)actionSheet\nclickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
  \ == 0) {\n        // 用户选择了\"拍摄视频\"。\n        [self showImagePickerForSourceType:UIImagePickerControllerSourceTypeCamera];\n\
  \    }\n    else if (buttonIndex == 1) {\n        // 用户选择了\"使用照片库\"。\n        [self\
  \ showImagePickerForSourceType:UIImagePickerControllerSourceTypePhotoLibrary];\n\
  \    }\n}\n```\n\n如你所见，该方法仅检查所选按钮的索引，并调用用户所选来源类型的 `showImagePickerForSourceType:`\
  \ 方法。添加此方法后，我们来实现 `showImagePickerForSourceType:`。为保持代码组织的连贯性，将此方法添加在之前添加的 `#pragma\
  \ mark` 行之前，插入以下加粗的代码行：\n\n```\n- (void)showImagePickerForSourceType:(UIImagePickerControllerSourceType)sourceType\n\
  {\n    UIImagePickerController *imagePicker =\n    [[UIImagePickerController alloc]\
  \ init];\n    [imagePicker setDelegate:self];\n    [imagePicker setMediaTypes:[NSArray\
  \ arrayWithObject:(NSString *)kUTTypeMovie]];\n```\n\n\n\n`[imagePicker setSourceType:sourceType];`\n\
  \n`[self presentModalViewController:imagePicker animated:YES];`\n\n在这个方法中，我们创建了一个\
  \ `UIImagePickerController`，将我们的视图控制器设置为其代理，将其 `mediaTypes` 属性设置为仅包含 `kUTTypeMovie`\
  \ 类型的数组，以防止用户选择图片，最后将源类型设置为给定的源类型。然后我们以模态方式呈现图片选择器控制器。用户随后会按下“取消”、拍摄视频或选择视频，此时图片选择器控制器会调用其代理方法。\n\
  \n现在让我们实现这些方法。我们将为这些方法添加一个新的 `#pragma mark` 部分，因此在 `actionSheet:clickedButtonAtIndex:`\
  \ 方法之后、`@end` 指令之前添加以下加粗的行：\n\n```\n#pragma mark - UIImagePickerControllerDelegate\
  \ Protocol Methods\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
  \    NSURL *movieURL = [info objectForKey:UIImagePickerControllerMediaURL];\n  \
  \  if (movieURL != nil) {\n        _moviePlayerController =\n        [[MPMoviePlayerController\
  \ alloc] initWithContentURL:movieURL];\n        [_moviePlayerController setControlStyle:MPMovieControlStyleNone];\n\
  \        [[_moviePlayerController view]\n         setAutoresizingMask:(UIViewAutoresizingFlexibleWidth\
  \ |\n                             UIViewAutoresizingFlexibleHeight)];\n        [[_moviePlayerController\
  \ view] setClipsToBounds:YES];\n        [[_moviePlayerController view] setFrame:[[self\
  \ movieHostingView]\n                                                  bounds]];\n\
  \        [[self movieHostingView] addSubview:[_moviePlayerController view]];\n \
  \   }\n}\n```\n\n无论用户是取消、拍摄视频还是选择视频，我们首先要做的就是在视图控制器上调用 `dismissModalViewControllerAnimated:`\
  \ 以移除图片选择器控制器。如果用户没有取消，我们就从 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法中的 `info` 字典里获取视频 URL。在这里，我们创建了一个指向此 URL 的 `MPMoviePlayerController`。我们将其控制样式设置为\
  \ `MPMovieControlStyleNone` 以移除内置控件，然后将其视图的自动调整遮罩设置为随其包含视图一起调整大小。我们将电影播放器控制器视图的\
  \ `clipsToBounds` 属性设置为 `YES`，以防止其绘制到框架之外，然后将其框架设置为电影托管视图的边界，这将使其完全填充电影托管视图。最后，我们将电影播放器控制器的视图作为子视图添加到电影托管视图中。\n\
