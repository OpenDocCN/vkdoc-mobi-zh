- "# 第 10 章：硬件 API\n\n打开 `LCTTweetMapViewController.h`。我们将添加一个文本字段和地图视图，因此需要将它们的委托协议添加到我们的类中。对于地图视图，还需要导入\
  \ MapKit 头文件。在头文件中添加粗体显示的行：\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
