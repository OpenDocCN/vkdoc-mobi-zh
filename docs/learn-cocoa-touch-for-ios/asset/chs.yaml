  \n\n```objectivec\n[[cell detailTextLabel] setText:[[tweet objectForKey:@\"user\"\
  ] objectForKey:@\"name\"]];\n\nNSString *profileImageURI = [[tweet objectForKey:@\"\
  user\"] objectForKey:@\"profile_image_url\"];\n\nNSURL *profileImageURL = [NSURL\
  \ URLWithString:profileImageURI];\n\nNSURLRequest *profileImageURLRequest = [NSURLRequest\
