- '# 使用 Blocks 编写现代代码


  如果说苹果在开发 Cocoa Touch 相关开发工具和语言时有一种趋势的话，那就是它正竭尽全力让开发者能轻松创建引人入胜、易于使用的应用。似乎每一个 iOS
  新版本发布，都会为 Cocoa Touch 开发者带来更多便利。其中一个例子出现在 iOS 4.0 和 Mac OS X Snow Leopard 中，它是苹果在
  C 语言中新增的一个特性：blocks。C 语言的发展通常缓慢如冰河，因此任何新特性都因其稀有而成为新闻。而 Blocks 带来的兴奋远不止于此：它赋予代码更大的自由度、更合理的逻辑分组以及更好的封装性。在本章中，我们将讨论什么是
  blocks、它们如何工作，以及你为何会想使用它们。我们还会介绍苹果要求使用 blocks 的一些新 API，你在第 6 章的 Twitter 示例中已经略见一斑。最后，我们将重新审视那个示例，扩展其功能，把它变成一个更好的应用。首先，我们来聊聊
  blocks 究竟是什么。


  ## 什么是 Blocks？


  简单来说，block 是一段自包含的代码。与函数或方法类似，block 可以接受参数并返回值，但与函数或方法不同的是，它们是匿名的；也就是说，你可以在不为其命名的情况下创建并执行一个
  block。通常，block 代表一个离散的任务，无论是比较两个对象、执行动画，还是调整图像大小。从这个角度来看，blocks 在为代码引入多线程处理方面扮演着重要角色；本章我们将初步体验这一点，并在下一章进行更深入的探讨。


  Blocks 也常用于延迟代码执行；除了传递目标-动作对、或对象与方法选择器之外，你还可以传递一个 block，在其他任务完成后执行它。这一切既便捷又高效，而苹果还为
  blocks 添加了一些内存管理魔法，使其使用起来更加轻松。




  '
- "# Objective-C 中的块\n\n## 块是封装好的函数\n\n对于我们的第一个块，不妨遵循传统方式，创建一个“Hello, World!”块。该块在执行时会在控制台打印“Hello,\
  \ World!”，仅此而已。它既不接受参数，也不返回任何值，因此其返回类型为`void`，就像不返回值的函数或方法一样。创建该块的方法如下：\n\n```objective-c\n\
  void (^helloBlock)(void) = ^ void (void){ NSLog(@\"Hello, World!\"); };\n```\n\n\
  让我们分解一下。首先，我们看到了返回类型，在本例中是`void`。接着，在括号内，有一个脱字符（`^`）表示这是一个块，后面跟的是用于存储该块的临时变量名称，因此我们得到`(^helloBlock)`。最后，另一组括号中包含了该块接受参数的逗号分隔列表，这里没有参数，所以就是简单的`(void)`。表达式左侧的最终结果是一个名为`helloBlock`的新的临时变量，其中包含一个块。如果你曾使用过\
  \ C 语言中的函数指针，你会注意到语法几乎完全相同，区别在于函数使用星号（`*`），而块使用脱字符（`^`）。\n\n这个表达式的右侧就是块本身。它以脱字符开始，接着是返回类型（此处为`void`），然后在括号中列出参数列表，这里同样是`(void)`。之后，位于花括号（`{`和`}`）之间的就是块的实际代码。请注意，这里有两个分号。一个结束块内的表达式（即`NSLog()`函数调用），另一个结束定义这个块的表达式。忘记其中一个或两个分号，是练习调试代码时最容易犯的错误之一。\n\
  \n为了节省空间，可以从右侧省略`void`返回类型和参数列表；之前的代码可以改写如下：\n\n```objective-c\nvoid (^helloBlock)(void)\
  \ = ^{ NSLog(@\"Hello, World!\"); };\n```\n\n如你所见，这样简洁多了。回顾一下，这一行代码（以及之前的版本）创建了一个块，该块在执行时会调用`NSLog()`，然后将该块存储在一个名为`helloBlock`的变量中。那么，我们如何执行它呢？就像调用函数一样：\n\
  \n```objective-c\nhelloBlock();\n```\n\n调用`helloBlock()`将导致该块的代码立即执行。\n\n有趣的是，在调用之前并不一定要将块存储在变量中。下面这行代码也能成功在控制台打印“Hello,\
  \ World!”：\n\n```objective-c\n^{ NSLog(@\"Hello, World!\"); }();\n```\n\n这个特定代码示例的优点并不多，但它是块匿名性的一个有趣例子。\n\
  \n## 使用类型定义实现可读的块声明\n\n前面的例子是块声明中最简单的情况。在实践中，块声明要复杂得多。考虑一个返回`BOOL`值并接受两个参数（类型分别为`id`和`NSError*`）的块。声明一个用于存储该块的变量`resultHandler`的方法如下：\n\
  \n```objective-c\nBOOL (^resultHandler)(id result, NSError *error);\n```\n\n这还不算太糟，其可读性足以直接使用。然而，如果它还有第三个参数，且该参数本身又是一个块呢？这样一来情况就变得更复杂了：\n\
  \n```objective-c\nBOOL (^resultHandler)(id result, NSError *error, NSString *(^helperBlock)(void));\n\
  ```\n\n如你所见，事情很快就变得难以掌控。为了解决这个问题，你可以使用`typedef`来定义常见的块类型，这是 C 语言中定义自定义类型的方法。之前展示的第一个`resultHandler`块可能是一种足够常见的块风格，你希望将它作为一个名为`ResultHandler`的独立类型来引用。这可以通过以下一行代码实现：\n\
  \n```objective-c\ntypedef BOOL (^ResultHandler)(id result, NSError *error);\n```\n\
  \n有了我们新定义的类型，我们可以更简洁地声明这种块类型的变量：\n\n```objective-c\nResultHandler resultHandler;\n\
  ```\n\n\n\n```objc\nResultHandler resultHandler = ^ BOOL (id result, NSError *error)\
  \ {\n    [result performSomeTask];\n    return YES;\n};\n```\n\n"
- "# 第 7 章：使用 Block 编写现代代码\n\n如你所见，这个 Block 返回一个`BOOL`，接受两个参数，而我们在实现中返回一个`BOOL`。你还可以在一个`typedef`内部嵌套另一个`typedef`；如果我们想添加一个`HelperBlock`类型作为第三个参数，可以这样定义两个类型：\n\
  \n```objc\ntypedef NSString *(^HelperBlock)(void);\ntypedef BOOL (^ResultHandler)(id\
  \ result, NSError *error, HelperBlock helperBlock);\n```\n\n这是一种能极大提高代码可读性的快速简便方法。\n\
  \n## Block 的内存管理\n\nBlock 的一个独特特性是其内存管理语义。Block 在栈上创建，就像临时变量一样。当创建它们的作用域结束时，Block\
  \ 会随栈帧的其余部分一起销毁。考虑以下示例：\n\n```objc\nif (x == 5) {\n    void (^myBlock)(void) = ^{\n\
  \        [self doSomethingCool];\n    };\n}\n```\n\n当这段代码中的`if`语句执行完毕时，`myBlock`就会被销毁。如果我们想在`if`语句之外使用`myBlock`呢？你可能会认为以下代码能够工作：\n\
  \n```objc\nvoid (^myBlock)(void) = NULL;\nif (x == 5) {\n    myBlock = ^{\n    \
  \    [self doSomethingCool];\n    };\n} else {\n    myBlock = ^{\n        [self\
  \ doSomethingElse];\n    };\n}\nmyBlock();\n```\n\n问题在于，当存储在`myBlock`中的 Block 被创建时，它位于`if`语句或`else`语句内部，因此当语句执行完毕时\
  \ Block 仍然会被销毁。正因如此，当我们试图执行`myBlock`变量时，它保存的将是垃圾数据，从而导致崩溃。为了解决这个问题，我们需要将 Block 从栈移动到堆上。这可以通过`Block_copy()`函数实现，该函数会将\
  \ Block 从栈复制到堆。由于它移动了 Block 在内存中的位置，原始 Block 的位置就不再有效。一旦复制了 Block，请务必只使用`Block_copy()`的返回值，而不是原始的\
  \ Block。以下是在关闭 ARC 的情况下前面代码的正确版本；我们稍后会讨论 ARC 和 Block：\n\n```objc\nvoid (^myBlock)(void)\
  \ = NULL;\nif (x == 5) {\n    myBlock = Block_copy(^{\n        [self doSomethingCool];\n\
  \    });\n} else {\n    myBlock = Block_copy(^{\n        [self doSomethingElse];\n\
  \    });\n}\nmyBlock();\nBlock_release(myBlock);\n```\n\n如你所见，我们将`Block_copy()`的返回值存储到`myBlock`中，将其移动到堆上并避免其被销毁。Block\
  \ 是引用计数的，因此每次调用`Block_copy()`时，我们也必须调用`Block_release()`；就像 Objective-C 对象一样，当 Block\
  \ 的保留计数达到 0 时，它会被销毁。你还可以对 Block 调用`Block_retain()`来增加其保留计数，但需要注意的是，对基于栈的 Block 调用`Block_retain()`并不会将其复制到堆上。同样重要的是，对已复制到堆上的\
  \ Block 调用`Block_copy()`只会增加保留计数；实际上并不会再次复制该 Block。\n\n因此，仅使用`Block_copy()`而从不使用`Block_retain()`应该不会引发任何问题，但单独使用`Block_retain()`可能会让你在应用崩溃时花费大量时间调试。就像对\
  \ Objective-C 对象进行内存管理一样，ARC 也会帮助管理 Block 的内存。它是如何做到的呢？通过将 Block 视为对象。\n\n## Block\
  \ 是对象\n\n你可能已经注意到 Block 和 Objective-C 对象之间的一些相似之处。它们都有类似的、基于引用计数的内存管理环境，而且我们将 Block\
  \ 存储到变量中的方式，与将对象存储到指针中的方式非常相似。这些相似之处也并非表面功夫。虽然它们不像`NSArray`那样是成熟的对象，但由于一些幕后的技巧，Block\
  \ 与 Objective-C 运行时兼容。这使得你可以向 Block 发送消息。之前的代码可以这样编写（仍处于关闭 ARC 的状态）：\n\n```objc\n\
  void (^myBlock)(void) = NULL;\nif (x == 5) {\n    myBlock = [^{ [self doSomethingCool];\
  \ } copy];\n} else {\n    myBlock = [^{ [self doSomethingElse]; } copy];\n}\nmyBlock();\n\
  [myBlock release];\n```\n\n如你所见，现在 Block 成为`copy`和`release`消息的接收者，它们分别等同于`Block_copy()`和`Block_release()`。我们也可以对\
  \ Block 调用`retain`，效果与预期一致。\n\nBlock 可以作为对象使用这一事实，其影响远不止简化内存管理代码。首先，如果你使用 ARC，编译器会为你自动编写内存管理代码，它足够智能，会在适当的时候将\
  \ Block 复制到堆上。仅此一点就能通过消除一些开发者错误来减少崩溃。利用这一特性的另一个有用方法是，将 Block 放入`NSArray`和`NSDictionary`等集合类中。这为\
  \ Block 带来了一些非常巧妙的使用模式。你可以像使用栈一样使用`NSArray`，将 Block 推入或弹出以执行，或者在`NSDictionary`中使用\
  \ Block，将特定操作绑定到特定键。如果你将 Block 用于不期望接收 Block 的 API（例如将 Block 添加到数组中），请确保将 Block\
  \ 的副本放入数组，如以下示例所示：\n\n```objc\n[myArray addObject:[^{\n    [self doSomething];\n\
  } copy]];\n```\n\n这种灵活性蕴含着巨大的力量，但更强大的是 Apple 在 Block 实现中注入的一些额外魔法。\n\n## Block 捕获作用域\n\
  \n我们目前看到的 Block 只能从一个地方获取数据：它们的参数。如果你想要编写一个处理图像、将其调整为特定尺寸的 Block，那么你至少需要给它一个图像参数和一个尺寸参数。如果这是将数据传入\
  \ Block 的唯一方式，那么对于复杂过程来说，参数列表不仅会变得非常长，而且 Block 实际上也不会比方法或函数有用多少。\n\n幸运的是，Block 还能够捕获其周围的作用域，并在执行过程中使用它！你可以创建一个简单的\
  \ Block，它引入一个字符串并将其打印到控制台：\n\n```objc\nNSString *message = @\"Hello, World!\";\n\
  void (^blockLog)(void) = ^{\n    NSLog(@\"%@\", message);\n};\nblockLog();\n```\n\
  \n在这里，`blockLog`这个 Block 使用了`message`变量的值，但并非来自参数！当 Block 被创建时，它会捕获被引用的周围作用域中的值，从而无需将所有变量都定义为参数。然而，这里的内存管理并不总是一目了然的；一个作为临时变量创建但在\
  \ Block 中被引用的`int`，应当在整个 Block 生命周期内对 Block 保持可访问。但如果 Block 被复制到堆上，它可能比创建该`int`的栈帧存活得更久，导致该`int`已被销毁。\n\
  \n为了解决这个问题，当你将 Block 复制到堆上时，它会同时复制基于栈的变量。这是完全自动的，因此你无需担心维护在 Block 中引用的基于栈的变量列表；编译器会帮你维护这个列表。这正是\
  \ Block 的优势开始显现的地方，因为像这样捕获作用域是函数或方法无法做到的。你必须将所有变量作为参数传递进去。\n\n\n\n"
- "# 块与作用域：重要注意事项\n\n关于块捕获作用域，有一个重要的注意事项需要提及。默认情况下，块无法修改从周围作用域中获取的变量。允许块修改变量需要编译器进行更多的干预。当块被复制到堆上时，如果它可以修改该变量，那么为了保持该值的一致性，对该变量的所有引用也必须相应更改。只要告知编译器需要处理，它完全有能力为你完成这项工作。为此，你需要使用存储限定符，这是创建变量时指定的一个属性。要创建一个块可以写入的`int`值，请在声明中的`int`前添加`__block`（前面是两个下划线）：`__block\
  \ int myInt = 42;`\n\n完成上述操作后，无论块是否被复制到堆上，它都可以随意写入该变量。得益于`__block`存储限定符，编写那些生命周期超过其创建方法的块变得简单且实用。\n\
  \n块的另一个有用特性是与 Objective-C 对象的交互方式。\n\n## 块保留对象\n\n与任何其他变量一样，你可以在块内部引用来自块周围作用域的指向\
  \ Objective-C 对象的指针。即使当你位于 Objective-C 方法中时引用`self`，其行为也符合预期。由于 Objective-C 对象（与`int`等临时变量不同）是在堆上创建并进行引用计数的，仅仅将指针复制到块中是不够的，尤其当块本身的生命周期超过了原始对象引用时。为了解决这个问题，当你在块中引用一个\
  \ Objective-C 对象时，它会自动收到`retain`消息，并在块被销毁时收到`release`消息。这让你可以在块中使用对象，而无需担心在块使用完对象之前，对象就被释放了。你还可以将对象与`__block`存储限定符结合使用，以在块内创建对象，并处理预期的内存管理影响。\n\
  \n然而，将对象与块结合使用有一个主要的注意事项：保留循环。可能出现这样一种情况：块引用了一个对象，从而保留了它，但该对象也保留了块，从而导致两个对象都永远不会被释放。让我们看看这种情况是如何发生的，以及如何避免它。考虑一个具有一个属性的对象：该属性是一个不带参数并返回`void`的块。我们将这个类命名为`BlockHolder`：\n\
  \n```objc\ntypedef void (^SimpleBlock)(void);\n\n@interface BlockHolder : NSObject\n\
  \n@property (copy) SimpleBlock block;\n\n@end\n```\n\n请注意，对于块，我们将使用`copy`属性来确保它被复制到堆上。现在让我们看看如何通过一个`BlockHolder`对象创建保留循环：\n\
  \n```objc\nBlockHolder *holder = [[BlockHolder alloc] init];\n\n[holder setBlock:^{\n\
  \    NSLog(@\"%@\", [holder description]);\n}];\n```\n\n在这段代码片段中，我们创建了一个`BlockHolder`类的新实例，并将其赋值给`holder`变量。接下来，我们创建了一个要传递进去的块，该块仅将对象的描述打印到控制台。问题出在细节上：由于我们在块中引用了`holder`，它被块保留；而由于`BlockHolder`类使用`copy`属性定义了`block`属性，它会保留该块，从而导致两个对象相互保留。由于保留循环，这两个对象都不会被释放。有两种方法可以解决这个问题，一种是特定的，一种是通用的。首先，由于我们编写了`BlockHolder`类，我们可以修改这个块。不采用无参数的形式，而是将指向块持有者的指针作为参数提供给块。我们使用`self`作为名称来模拟`self`在\
  \ Objective-C 方法中的工作方式。新的...\n\n\n`SimpleBlock`声明如下：\n\n```objc\ntypedef void (^SimpleBlock)(id\
  \ self);\n```\n\n当我们创建该`block`时，会将`holder`替换为`self`：\n\n```objc\nBlockHolder *holder\
  \ = [[BlockHolder alloc] init];\n[holder setBlock:^(id self){\n    NSLog(@\"%@\"\
  , [self description]);\n}];\n```\n\n这能很好地避免保留环。`self`可能会让人有些困惑，因此你可以考虑为参数使用不同的名称，但这是完全避免保留环的好方法。如果你无法控制传入`block`的对象代码，第二种方法会更适用。你需要创建对对象的弱引用，并在`block`中引用该弱引用，从而避免保留环，因为弱引用不会导致额外的`retain`调用。此时，创建`block`的代码如下：\n\
  \n```objc\ntypedef void (^SimpleBlock)(void);\n\nBlockHolder *holder = [[BlockHolder\
  \ alloc] init];\n__weak BlockHolder *safeHolder = holder;\n[holder setBlock:^{\n\
  \    NSLog(@\"%@\", [safeHolder description]);\n}];\n```\n\n`__weak`限定符需要 iOS 5\
  \ 和 ARC。如果你使用 ARC 但目标平台是 iOS 4.3，请改用`__unsafe_unretained`。\n\n### 将 Block 作为方法参数\n\
  \n关于`block`，最后一点我想谈谈风格。Apple 倾向于遵循一种编码模式：将 Objective-C 方法中的`block`参数放在最后。这有助于保持代码的可读性，因为两个`block`之间夹杂单个参数很容易被忽略。\n\
  \n不正确的风格示例如下：\n\n```objc\n[someObject someMethodWithThisParameter:@\"ThisParameter\"\
  \n                  performingThisBlock:^{\n                      NSLog(@\"This\
  \ Block\");\n                  }\n                  withThisParameter:YES\n    \
  \              andThisBlock:^{\n                      NSLog(@\"Another Block\");\n\
  \                  }];\n```\n\n如你所见，很难分辨一个参数在哪里结束、另一个参数在哪里开始。当`block`内部的代码很长时，这个问题会更加严重。\n\
  \n正确的风格示例如下：\n\n```objc\n[someObject someMethodWithThisParameter:@\"ThisParameter\"\
  \n                      andThisParameter:YES\n                     performingThisBlock:^{\n\
  \                         NSLog(@\"This Block\");\n                     }\n    \
  \                     andThisBlock:^{\n                             NSLog(@\"Another\
  \ Block\");\n                         }];\n```\n\n通过将`block`分组到末尾，代码的可读性大大提高——至少我个人（以及\
  \ Apple）这样认为。现在我们已经了解了`block`是什么以及如何使用它们，接下来讨论一下为什么要使用它们。\n\n### 为什么应该使用 Block？\n\
  \n为了说明为什么应该使用`block`，让我们考察几个常见场景，看看在`block`出现之前是如何处理的。然后看看使用`block`后，这些场景是变得更简单、更清晰，还是两者兼得。尽管所有旧方法仍然有效且可用，但\
  \ Apple 随每个 iOS 和 Mac OS X 版本发布的新 API 大量采用`block`，并且常常不提供无`block`的替代方案。我们从 iOS 最强大的特性之一开始分析：`UIView`动画。\n\
  \n#### UIView 动画\n\niOS 中的动画系统极其强大。每个视图都由 OpenGL 支撑的图层绘制，使得非常简单的代码就能创建出高性能、硬件加速的\
  \ 2D 和 3D 动画。这在`block`出现前是如此，在`block`出现后依然如此，但 iOS 4 中随`block`一同推出的基于`block`的新动画\
  \ API 使其变得更加简单。来看一个常见示例：淡出视图。使用旧方法，代码如下（假设要淡出的视图名为`myView`）：\n\n```objc\n[UIView\
  \ beginAnimations:@\"animationName\" context:NULL];\n[UIView setAnimationDuration:1.0];\n\
  [myView setAlpha:0.0f];\n[UIView commitAnimations];\n```\n\n动画系统的基本思想是：在`beginAnimations:context:`和`commitAnimations`之间，你只需设置视图在动画结束时应有的属性；动画系统会自动在`setAnimationDuration:`定义的时间段内，在当前值与目标值之间进行插值。\n\
  \n\n\n虽然这几乎是动画最简单的形式，但仍值得看一下基于块的替代方案：\n\n```\n[UIView animateWithDuration:1.0\n\
  \  animations:^{\n    [myView setAlpha:0.0f];\n  }];\n```\n\n如你所见，三个`UIView`类方法调用被替换成了一个。\n\
  \n你不再需要将动画方法放在两个方法调用之间，只需将它们放入作为第二个参数传递的块中即可。即使在代码长度方面，这也是一种改进，但当我们为其添加一些选项时，改进才开始真正显现。首先，假设动画完成后，我们想将现已透明的视图从其父视图中移除。使用旧方法，我们需在动画前导代码中添加两行：\n\
  \n```\n[UIView beginAnimations:@\"animationName\" context:NULL];\n[UIView setAnimationDuration:1.0];\n\
  [UIView setAnimationDelegate:self];\n[UIView setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];\n\
  [myView setAlpha:0.0f];\n[UIView commitAnimations];\n```\n\n在这段代码中，我们调用`setAnimationDelegate:`来为动画系统提供一个对象，以便动画完成时向其发送消息。然后，我们提供一个选择器供其在发送消息时使用。第一个参数是指向包含动画\
  \ ID（前例中的`animationName`）的`NSString`的指针，第二个参数是一个`BOOL`值，表示动画是否完成（在某些情况下，例如视图的父视图在动画完成前已从其视图层次结构中移除，该值将为`NO`），第三个参数是一个大多未使用的上下文指针。然而，我们还没完成；我们需要实现这个新方法：\n\
  \n```\n- (void)animationDidStop:(NSString *)animationID\n                finished:(BOOL)finished\n\
  \                 context:(void *)context\n{\n    [myView removeFromSuperview];\n\
  }\n```\n\n我们还需要在头文件或类扩展声明中添加一行来声明此方法。事情从这里开始变得冗长。让我们将其与等效的基于块的代码进行比较：\n\n```\n[UIView\
  \ animateWithDuration:1.0\n  animations:^{\n    [myView setAlpha:0.0f];\n  }\n \
  \ completion:^(BOOL finished) {\n    [myView removeFromSuperview];\n  }];\n```\n\
  \n这已经少了好几行！此方法增加了一个参数，一个在动画完成时运行的块。它唯一的参数是一个`BOOL`值，表示动画是否完成。由于你是在定义动画的地方定义完成处理程序，因此无需跟踪动画\
  \ ID。\n\n如果旧式`UIView`动画的复杂性仅限于此，那么基于块的方法已经是巨大的改进。随着代码变得更加复杂，你可能会在单个类中拥有几个不同的动画。在这种情况下，没有块，你将在同一个`animationDidStop:finished:context:`方法中处理这些动画的完成，这意味着你需要使用动画\
  \ ID 来确保正确的代码为正确的动画运行。然而，在这里使用块真正的好处是，它将完成代码紧挨着动画代码。你不必记得将其放入`animationDidStop:finished:context:`方法，也不必根据动画\
  \ ID 在该方法中查找正确的代码。相反，与单个动画相关的所有内容都在同一个地方。在你编写代码六个月后，如果必须回来修改它，你会庆幸这种代码组织方式，因为它使问题排查变得简单得多。这是普遍倾向于使用块的一个重要原因，也是我们接下来要探讨的重点：使用块作为回调。\n\
  \n## 使用块进行异步回调\n\n在之前的某一章中，我们讨论了使用异步的`NSURLConnection`方法来避免阻塞主线程（这反过来会使应用无响应）。这是一件好事，但这样做的一个潜在症状是，URL\
  \ 连接调用的这些回调方法对于每个连接都是相同的。如果你的代码创建了 20 个 URL 连接，它们都会发送相同的委托消息，这意味着你需要在那些方法中找出实际发送消息的\
  \ URL 连接，以便相应地采取行动。一些开源网络库通过允许你指定一个完成处理程序来解决这个问题。这可能看起来像这样：\n\n```\n[MyNetworkingLibrary\
  \ loadURLWithRequest:aURLRequest\n  completionHandler:^(NSData *receivedData,\n\
  \                      NSURLResponse *response,\n                      NSError *error)\
  \ {\n    // 在此处处理响应\n  }];\n```\n\n就像我们之前做的 URL 加载一样，这会接受一个 URL 请求并发送它，然后接收一些数据、一个响应以及可能返回的错误。具体的**方法因网络库而异**——`MyNetworkingLibrary`并非真实的库名——但核心思想是相同的：当连接完成时，库不再调用委托方法，而是简单地执行你在发出请求时提供给它的块。\n\
  \n与`UIView`动画一样，主要优势在于代码组织。处理请求响应的代码紧挨着最初发出请求的代码，这让你能一眼看到过程中两个步骤发生了什么。与动画一样，连接越多，委托方法就会变得越繁琐，并且随着项目时间推移，它们会变得越难以维护和排查问题。这个优势并不仅限于\
  \ URL 加载；任何不需要阻塞主线程的长时间运行进程，都应利用完成处理程序块来编写。\n\n单个对象也可以关联多个块；一些 URL 库允许你定义一个被多次调用的块来报告下载进度。\n\
  \n与 URL 加载非常相似，另一个可以将稍后运行的代码放入块的地方是使用`NSNotificationCenter`。你可以使用块在你注册通知的地方定义要执行的代码，而不是定义一个在触发通知时调用的方法：\n\
  \n```\nNSNotificationCenter *nc = [NSNotificationCenter defaultCenter];\n[nc addObserverForName:UIApplicationDidReceiveMemoryWarningNotification\n\
  \                object:nil\n                 queue:nil\n            usingBlock:^(NSNotification\
  \ *note) {\n    NSLog(@\"收到内存警告！\");\n}];\n```\n\n我们稍后会详细说明`queue`参数，但这又一次允许你以更易读的方式组织代码。你无需寻找触发通知时调用的方法，而是可以在提供的块中找到将要执行的代码。这导致你需要编写更少的代码，并且理想情况下，更少的错误。尽管块对于回调很有用，但它们在枚举集合时甚至更有用，我们接下来将讨论这一点。\n\
  \n## 使用块进行枚举\n\n枚举集合中的项是过去几十年几乎所有编程语言中都存在的任务。总体思路很简单：给定一个项集合，依次获取每个项的引用，对其执行一些代码，然后获取下一个，重复直到遍历完所有项。在我们讨论使用块实现此目的之前，让我们看看在\
  \ Cocoa Touch 中可以使用的从集合类（数组、字典和集合）中枚举对象的一些工具。\n\n**注意：** iOS 5 添加了一个新的集合类`NSOrderedSet`，它具有数组（其成员有序）和集合（其成员唯一）的特性。我们在这里不会专门讨论有序集合，但你通常可以假设访问其成员的方式与数组相同。\n\
  \n\n\n**For 循环**\n\n从集合中枚举元素最传统的方式是使用 `for` 循环，这里以 Objective-C 为例：\n\n```\nNSUInteger\
  \ count = [myArray count];\n\nfor (NSUInteger i = 0; i < count; i++) {\n    id object\
  \ = [myArray objectAtIndex:i];\n    [object performSomeTask];\n}\n```\n\n在这个示例中，我们获取数组中的对象数量，然后从第一个到最后一个依次处理它们，向每个对象发送消息，然后移动到下一个对象。这段代码的优点在于它几乎是通用的；从其他编程语言转过来的开发人员几乎总能理解这段代码的作用，以及如何修改它以达到期望的行为。对于任何一个给定的对象，都可以轻松获取它在数组中的当前索引，因为该索引存储在\
  \ `i` 变量中。一个缺点是 `NSArray` 的方法 `objectAtIndex:` 返回的是 `id`，因此我们不知道其中所包含对象的类，不过通过内省机制可以很容易地确定这一点。\n\
  \n对于字典来说，使用 `for` 循环就不那么简单了。以下代码会枚举字典中的所有对象并向它们发送消息：\n\n```\nNSArray *keys = [myDictionary\
  \ allKeys];\nNSUInteger count = [keys count];\n\nfor (NSUInteger i = 0; i < count;\
  \ i++) {\n    id key = [keys objectAtIndex:i];\n    id object = [myDictionary objectForKey:key];\n\
  \    [object performSomeTask];\n}\n```\n\n如你所见，差别并不太大，但它确实需要先从字典的键数组中获取一个键，然后用这个键来获取对象。如果你有一个\
  \ `NSSet`，它没有顺序，因此也没有 `objectAtIndex:` 方法，你就必须使用它的 `allObjects` 方法来获取一个包含其对象的数组，然后遍历返回的数组。\n\
  \n**NSEnumerator**\n\n除了手动使用 `for` 循环遍历集合，还可以使用 Objective-C 的 `NSEnumerator` 类来枚举对象。\n\
  \n`NSEnumerator` 的实例会通过其 `nextObject` 方法持续返回对象，直到集合中的所有对象都被枚举完毕。对于字典，有两种枚举器，一种用于对象，一种用于键。使用\
  \ `NSEnumerator` 的方式如下：\n\n```\nNSEnumerator *objectEnumerator = [myArray objectEnumerator];\n\
  id object;\n\nwhile ((object = [objectEnumerator nextObject])) {\n    [object performSomeTask];\n\
  }\n```\n\n在这段代码中，我们从数组中获取了一个 `NSEnumerator`。`NSArray` 类定义了 `objectEnumerator` 和\
  \ `reverseObjectEnumerator` 方法，后者只是从数组的最后一个元素遍历到第一个元素。接下来，我们创建了一个指向对象的指针，命名为 `object`。我们持续将从枚举器的\
  \ `nextObject` 方法返回的值存储到 `object` 中，如果它不为 `nil`，那么 `while` 表达式就会求值为 `true`，我们就会对\
  \ `object` 调用 `performSomeTask`。\n\n**注意：** 因为在表达式中使用单个等号（`=`）而不是两个等号（`==`）来判断相等性，比如\
  \ `if (a = 42) …`，是一个很常见的编程错误，所以我们在 `while` 语句周围使用两对括号，以此向编译器表明我们知道自己在做什么，从而防止某些编译器版本就潜在的不安全代码发出警告。\n\
  \n与使用 `for` 循环相比，使用 `NSEnumerator` 有一些权衡。你不需要获取集合中元素的总数，但如果你想获取当前元素的索引，就需要做一些额外的工作。\n\
  \n使用 `NSEnumerator` 时有一件事不能做，那就是在枚举可变集合（例如 `NSMutableArray`、`NSMutableDictionary`\
  \ 或 `NSMutableSet`）的同时更改该集合。如果你需要这样做，你应该先对原始数据创建一个不可变的副本，然后枚举这个副本；或者保存一份你需要进行的更改的列表，在枚举完成后再执行这些更改。例如，如果你想要从名为\
  \ `myMutableArray` 的可变数组中移除每一个奇数 `NSNumber` 对象，你可以这样做：\n\n```\nNSArray *myArray\
  \ = [NSArray arrayWithArray:myMutableArray];\nNSEnumerator *objectEnumerator = [myArray\
  \ objectEnumerator];\nNSNumber *number;\n\nwhile ((number = [objectEnumerator nextObject]))\
  \ {\n    if ([number intValue] % 2) {\n        [myMutableArray removeObject:number];\n\
  \    }\n}\n```\n\n我们不能在枚举 `myMutableArray` 的同时从中移除对象，因此我们枚举 `myArray` 并从 `myMutableArray`\
  \ 中移除对象。\n\n**快速枚举**\n\n快速枚举是在 Mac OS X 10.5 中引入的，并且从一开始就在 iOS 中可用，它实际上是一个名为 `NSFastEnumeration`\
  \ 的协议，集合类都遵循该协议。它允许你使用一种特殊的语法来枚举对象：\n\n```\nfor (NSString *string in myArray) {\n\
  \    [string performSomeTask];\n}\n```\n\n快速枚举是带有类型的，因此这里我们将 `myArray` 中的对象转换为 `NSString`\
  \ 对象。这并不能保证返回的对象就是 `NSString` 实例，只是意味着编译器会将变量 `string` 视为 `NSString *` 类型。你仍然应该查询对象的类，以确保它确实是你所期望的类型。\n\
  \n当将快速枚举用于数组或集合时，它会遍历集合中的对象；当将其用于字典时，它会遍历字典的所有键。快速枚举不仅比 `NSEnumerator` 更高效，而且代码量更少，可读性也更高。它非常类似于\
  \ `foreach` 循环，因此来自其他语言的开发人员很可能会理解这段代码的作用。在循环内部，你无法获取数组的计数或当前对象的索引，但如果你需要，可以很容易地获取它们。在\
  \ Block 出现之前，快速枚举是遍历 Cocoa Touch 集合类的首选方式，而且它现在仍然是一个相当不错的选择。\n\n与 `NSEnumerator`\
  \ 一样，在对其使用快速枚举时，你也不能更改可变集合；如果你这样做了，集合会抛出一个异常，你的应用就会崩溃。\n\n**对成员执行选择器**\n\n到目前为止，我们使用枚举的相当刻意造作的示例都是向集合中的对象发送单个消息\
  \ `performSomeTask`。如果你只需要这样做，并且你有一个 `NSArray` 或 `NSSet` 对象，那么你可以使用实例方法 `makeObjectsPerformSelector:`。这将向集合中的每个成员发送一条单独的消息。还有一个变体，它接受一个对象并将其作为参数发送给该方法，叫做\
  \ `makeObjectsPerformSelector:withObject:`。如果你只需要调用一个具有零个或一个参数的方法，并且该参数是 Objective-C\
  \ 对象，那么这会很有用。如果你需要做更复杂的事情，你就需要使用此处描述的一种枚举技术。\n\n**使用 Block 进行枚举**\n\n在 Mac OS X\
  \ 和 iOS 4 中，与 Block 一起引入的，还有集合类上的一些方法，你可以使用它们通过 Block 来枚举其对象。我们之前的示例可以这样编写：\n\n\
  ```\n[myArray enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n\
  \    [obj performSomeTask];\n}];\n```\n\n就代码行数而言，这在简洁性方面与快速枚举不相上下。该方法接受一个参数，即一个\
  \ Block，该 Block 有三个参数：一个指向对象的指针、该对象在数组中的索引，以及一个指向 `BOOL` 值的指针。第三个参数很有意思。它实际上是供你在想要停止枚举时进行修改的。在\
  \ `for` 循环中，你会调用 `break` 来停止枚举，而在使用 Block 时，你会这样设置：\n\n```\n*stop = YES;\n```\n\n\
  这会填充相应的值并停止枚举。\n\n\n\n"
- "# 在 Objective-C 中使用 Block 进行枚举和排序\n\n## 使用 Block 进行枚举\n\n从表面上看，使用 Block 枚举集合类与使用之前的方法相比，似乎并没有明显更优或更简便。`NSDictionary`\
  \ 对应的 `enumerateKeysAndObjectsUsingBlock:` 方法相当不错，因为它将键和对象都传递给 Block，但除此之外，这些方法并无太大差别。然而，Block\
  \ 方法的优势在于其扩展版本 `enumerateObjectsWithOptions:usingBlock:`。\n\n第一个参数是一个选项位掩码，其中最主要的是\
  \ `NSEnumerationConcurrent`。这告诉数组并发枚举其元素，在多核处理器设备上能带来巨大收益（尽管在某些情况下也能显著提升单核设备的性能）。以下代码将以并发方式对\
  \ `myArray` 中的每个对象执行 `performSomeTask`：\n\n```objc\n[myArray enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
  \                          usingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n\
  \                              [obj performSomeTask];\n                        \
  \  }];\n```\n\n就这样，你可以利用 iOS 先进的多线程性能，而无需编写一行线程代码。该方法会等到所有对象枚举完毕才返回，但它会尽可能多地并发运行枚举实例。随着越来越多的设备拥有多核，这种枚举方法应成为你的默认选择，因为它是一种无需增加开发成本就能提升应用性能的简便方式。我们将在下一章更详细地讨论多核处理，但这是一个良好的开端。目前，你可以将其作为提升应用在枚举集合类时性能的工具。以上就是\
  \ Block 为何适合枚举的简要介绍。Block 还能帮助解决的另一个密切相关的问题是数组排序。\n\n### 使用 Block 对数组排序\n\n与枚举类似，数组排序是许多编程语言中的常见任务。基本概念在各语言中相似：根据排序类型，以某种模式遍历数组，比较值并执行相应操作。使用哪种排序类型存在广泛争议，但对值进行排序几乎是每种编程语言都需要处理的问题。Objective-C\
  \ 也不例外，它提供了几种对数组排序的方法。\n\n### 使用比较选择器对数组排序\n\n对数组进行排序最直接的方法是对每个对象使用比较方法。这通过 `NSArray`\
  \ 的实例方法 `sortedArrayUsingSelector:` 实现，该方法接受一个比较选择器作为参数，并返回一个新的 `NSArray`，通过将选择器发送给数组中每个对象（另一个对象作为参数）来完成排序。要对字符串数组进行不区分大小写的排序，代码如下：\n\
  \n```objc\nNSArray *sortedArray = [myArray sortedArrayUsingSelector:@selector(caseInsensitiveCompare:)];\n\
  ```\n\n数组中的每个对象都会收到 `caseInsensitiveCompare:` 消息，并以另一个对象作为参数。这种方法相当直接，但不够灵活；它仅能基于一个方法对数组排序，并且为了正常工作，数组中的每个对象都必须实现相同的方法。\n\
  \n还有一类类似的排序方法，例如 `sortedArrayUsingFunction:context:`，它使用 C 函数对数组排序。虽然它们不依赖成员对象实现任何功能，但比较过程的执行路径仍然受限。如果你希望基于多个条件排序，最好使用排序描述符。\n\
  \n### 使用排序描述符对数组排序\n\n排序描述符是一种封装了数据排序方式的对象。单个描述符聚焦于每个对象的一个属性，并根据该属性进行排序。使用排序描述符时，你需要一个描述符数组来构建排序层次结构，用于对对象进行排序。\n\
  \n给定一个名为 `Person` 的 Objective-C 类，包含 `name` 和 `age` 属性，以下代码先按年龄从大到小排序，再按字母顺序对姓名排序：\n\
  \n```objc\nNSSortDescriptor *ageDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
  age\"\n                                                              ascending:NO];\n\
  NSSortDescriptor *nameDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"name\"\
  \n                                                               ascending:YES];\n\
  NSArray *sortDescriptors = [NSArray arrayWithObjects:ageDescriptor,\n          \
  \                                           nameDescriptor, nil];\nNSArray *sortedArray\
  \ = [myArray sortedArrayUsingDescriptors:sortDescriptors];\n```\n\n默认情况下，排序描述符会使用\
  \ `compare:` 方法来比较两个项目，但在创建时也可以修改使用的选择器。如果你想用 `localizedCaseInsensitiveCompare:`\
  \ 方法对字符串数组排序，可以这样做：\n\n```objc\nNSSortDescriptor *sortDescriptor =\n    [NSSortDescriptor\
  \ sortDescriptorWithKey:nil\n                                  ascending:YES\n \
  \                                  selector:@selector(localizedCaseInsensitiveCompare:)];\n\
  NSArray *sortDescriptors = [NSArray arrayWithObject:sortDescriptor];\nNSArray *sortedArray\
  \ = [myArray sortedArrayUsingDescriptors:sortDescriptors];\n```\n\n当数据中有大量相同值，需要第二、第三甚至更多排序方法时，排序描述符非常有用。当引入\
  \ Block 后，它们变得更加实用。\n\n### 使用 Block 对数组排序\n\n使用 Block 对数组排序时，通常会使用一种名为 `NSComparator`\
  \ 的已定义 Block 类型。`NSComparator` 在系统头文件中的定义如下：\n\n```objc\ntypedef NSComparisonResult\
  \ (^NSComparator)(id obj1, id obj2);\n```\n\n该 Block 返回一个 `NSComparisonResult`，并接受两个参数，分别对应待比较的对象。有三种可能的返回值：当\
  \ `obj1` 小于 `obj2` 时返回 `NSOrderedAscending`；当 `obj1` 大于 `obj2` 时返回 `NSOrderedDescending`；相等时返回\
  \ `NSOrderedSame`。Block 的实现可以随心所欲地使用 `obj1` 和 `obj2`，使用 `NSComparator` 对数组排序也非常简单：\n\
  \n```objc\nNSArray *sortedArray = [myArray sortedArrayUsingComparator:^NSComparisonResult(id\
  \ obj1, id obj2) {\n    return [obj1 caseInsensitiveCompare:obj2];\n}];\n```\n\n\
  在这个例子中，我们只是简单地调用了 `caseInsensitiveCompare:` 方法，但你可以使用任何适合比较值的逻辑。你也可以通过比较器 Block\
  \ 来创建 `NSSortDescriptor` 对象：\n\n```objc\nNSSortDescriptor *nameSortDescriptor =\n\
  \    [[NSSortDescriptor alloc] initWithKey:@\"name\"\n                         \
  \       ascending:YES\n                               comparator:^NSComparisonResult(id\
  \ obj1, id obj2) {\n                                   return [obj1 caseInsensitiveCompare:obj2];\n\
  \                               }];\nNSArray *sortDescriptors = [NSArray arrayWithObject:nameSortDescriptor];\n\
  NSArray *sortedArray = [myArray sortedArrayUsingDescriptors:sortDescriptors];\n\
  ```\n\n这里的 Block 相同，但我们可以将其与 `NSSortDescriptor` 结合，利用其支持多个排序标准的能力。\n\n与集合枚举类似，使用\
  \ Block 时数组排序也拥有一个秘密武器。我们可以通过 `sortedArrayWithOptions:usingComparator:` 方法自动对数组进行并发排序。以下代码对字符串数组进行并发排序：\n\
  \n```objc\nNSArray *sortedArray = [myArray sortedArrayWithOptions:NSSortConcurrent\n\
  \                                       usingComparator:^NSComparisonResult(id obj1,\
  \ id obj2) {\n                                           return [obj1 caseInsensitiveCompare:obj2];\n\
  \                                       }];\n```\n\n\n\n"
- "# 使用 Block 编写现代代码\n\n根据数组的大小，使用此方法对其内容进行并发排序可以带来巨大的性能提升。与枚举一样，设备拥有的处理器核心越多，排序速度就越快。因此，现在像这样编写数组排序代码，可以确保在任何未来的\
  \ iOS 设备上获得最大性能，无论其拥有多少内核。\n\n回顾一下，`block` 允许你编写更好的代码。你可以使用它们在某些情况下替代回调，使回调代码靠近其他相关代码；用于枚举和排序数组；以及在需要\
  \ `block` 的新 API 中使用。既然我已经论证了使用 `block` 的好处，那么接下来让我们看看如何将 `block` 添加到自己的 API 中。\n\
  \n## 在你的代码中使用 Block\n\n在你的代码中使用 `block` 主要有两种方式，区别在于 `block` 的生命周期。第一种也是最简单的方式是，简单地将一个\
  \ `block` 作为方法参数接受，并在方法中的某个时刻调用它：\n\n```\n- (void)expensiveOperationWithCompletionHandler:(void(^)(void))handler\n\
  {\n    [self performExpensiveOperation];\n    if (handler != NULL) {\n        handler();\n\
  \    }\n}\n```\n\n在此方法中，我们使用 `handler` 参数来存储一个 `block`，该 `block` 在方法的主要操作完成后被调用。注意，我们必须检查\
  \ `block` 是否为 `NULL`，因为像这样调用此方法是完全合法的：\n\n```\n[self expensiveOperationWithCompletionHandler:NULL];\n\
  ```\n\n如果我们没有检查 `NULL`，应用将会崩溃。\n\n**注意：** 关于当 `block` 指向空时，使用 `NULL` 还是 `nil` 更合适，一直存在一些争论。在本书中，我将坚持使用\
  \ `NULL`，但如果你在其他代码中看到 `nil`，那也是可以接受的。\n\n这个方法之所以如此简单，是因为当 `handler` 存在于栈帧中时，栈帧永远不会退出。即使\
  \ `block` 是在栈上创建并且从未移动到堆上，它在这里仍然是有效的。在你的 API 中调用 `block` 的第二种方法则绕过了这个问题。\n\n对于第二种方法，你需要首先为\
  \ `block` 创建一个属性，使用 `copy` 属性来确保它被复制到堆上：\n\n```\n@property (copy) void(^completionHandler)(void);\n\
  ```\n\n那么 `expensiveOperation` 方法可能是这样的：\n\n```\n- (void)expensiveOperation\n{\n\
  \    [self performExpensiveOperation];\n    if ([self completionHandler] != NULL)\
  \ {\n        [self completionHandler]();\n    }\n}\n```\n\n即使 `block` 是一个属性，我们也要将其与\
  \ `NULL` 进行检查，以确保不会出错。将 `block` 存储在属性中不仅允许你将其存储在堆中并在必要时调用它，还允许你从多个方法以及多次调用同一个 `block`。一个常见的例子可以在一些开源网络库中找到：当你创建一个加载\
  \ URL 的请求时，你可以指定一个 `block` 在进度更新时运行。\n\n现在我们已经介绍了这些方法，让我们看看如何改进第 6 章中的 Twitter 客户端以利用\
  \ `block`。\n\n## 使用 Block 更新 TwitterExample\n\n在我们之前的 `TwitterExample` 代码中，我们可以使用\
  \ `block` 进行一些优化，以稍微清理代码。在我们的 Twitter 控制器类中，有一个 `authorizeAccount` 方法，用于将用户登录到 Twitter\
  \ 并授权我们的应用使用他们的 Twitter 账户。目前，该方法只是调用了 `ACAccountStore` 的 `requestAccessToAccountsWithType:completionHandler:`\
  \ 方法后就返回了，但一旦该方法完成，它并没有做任何特别的事情。\n\n因此，我们在应用加载时尝试授权应用，并希望它在我们的视图控制器加载推文之前完成。你可能已经注意到应用启动时加载了一个空白的推文列表，但当用户点击“重新加载”按钮时却能完美加载；这就是原因。让我们更改该方法，使其拥有自己的完成处理程序，这样我们就可以在账户获得授权时利用\
  \ `block` 来执行代码。\n\n### 添加完成处理程序\n\n启动 Xcode 并打开 `TwitterExample` 项目。打开 Twitter\
  \ 控制器的头文件 `LCTTwitterController.h`（请记住，如果你的类前缀不是 `LCT`，文件名将会不同），并修改 `authorizeAccount`\
  \ 的声明，删除被删除的行并添加粗体显示的行：\n\n```\n@interface LCTTwitterController : NSObject\n\n+\
  \ (id)sharedInstance;\n- (void)authorizeAccount;\n- (void)authorizeAccountWithCompletionHandler:(void(^)(void))handler;\n\
  - (void)getTweetsInUserTimelineWithCompletionHandler:(void(^)(NSArray *tweets))handler;\n\
  \n@end\n```\n\n现在，打开相应的实现文件（`LCTTwitterController.m`），并修改 `authorizeAccount` 方法，删除被删除的行并添加粗体显示的行：\n\
  \n```\n- (void)authorizeAccount\n- (void)authorizeAccountWithCompletionHandler:(void\
  \ (^)(void))handler\n{\n    if (_twitterAccount == nil) {\n        ACAccountType\
  \ *accountType = [_accountStore\n                                      accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \        NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
  \n        [_accountStore requestAccessToAccountsWithType:accountType\n         \
  \                        withCompletionHandler:^(BOOL granted, NSError *error) {\n\
  \            if (granted) {\n                NSArray *twitterAccounts =\n      \
  \          [_accountStore accountsWithAccountType:accountType];\n\n            \
  \    if ([twitterAccounts count] > 0) {\n                    _twitterAccount = [twitterAccounts\
  \ objectAtIndex:0];\n                    NSString *identifier = [_twitterAccount\
  \ identifier];\n                    [userDefaults setObject:identifier\n       \
  \                              forKey:kSavedTwitterAccountKey];\n              \
  \      [userDefaults synchronize];\n                }\n            }\n\n       \
  \     if (handler != NULL) {\n                handler();\n            }\n      \
  \  }];\n    }\n    else {\n        if (handler != NULL) {\n            handler();\n\
  \        }\n    }\n}\n```\n\n需要注意的重要一点是，我们必须在调用 `handler` 之前检查它的值。如果我们在调用方法时传入了\
  \ `NULL`，但方法没有检查 `handler` 的值是否为 `NULL`，那么当我们尝试执行 `block` 时，应用将会崩溃。这是一个简单的改变，但它允许我们在账户授权后执行任意代码。如果我们已经有一个账户，那么该方法将调用完成处理程序而不做其他事情，从而允许已保存的登录像以前一样继续工作。\n\
  \n在我们将它投入使用之前，我们需要移除对 `authorizeAccount` 的现有调用，因为该方法已不存在。打开应用委托的实现文件（`LCTAppDelegate.m`），并通过删除被删除的行来移除\
  \ `application:didFinishLaunchingWithOptions:` 方法中授权账户的行：\n\n```\n- (BOOL)application:(UIApplication\
  \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // Override point for customization after application launch.\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    [[LCTTwitterController\
  \ sharedInstance] authorizeAccount];\n\n    LCTTimelineViewController *viewController\
  \ =\n    [[LCTTimelineViewController alloc] initWithStyle:UITableViewStylePlain];\n\
  \    UINavigationController *navigationController =\n    [[UINavigationController\
  \ alloc] initWithRootViewController:viewController];\n    [[self window] setRootViewController:navigationController];\n\
  \n    return YES;\n}\n```\n\n幸运的是，Xcode 应该已经提醒你这一行有问题。现在我们在应用委托中不再使用 `LCTTwitterController`，我们可以移除它的\
  \ `#import` 指令。在文件顶部，像这样删除被删除的行：\n\n```\n#import \"LCTAppDelegate.h\"\n```\n\n\n\
  \n```objectivec\n#import \"LCTTwitterController.h\"\n#import \"LCTTimelineViewController.h\"\
  \n```\n\n现在是保存工作的好时机。接下来，我们将在 `LCTTimelineViewController` 的视图控制器生命周期中添加一个步骤，以便在加载推文前完成账户授权。打开\
  \ `LCTTimelineViewController.m`，并通过添加粗体所示的代码行来修改 `viewWillAppear:` 方法：\n\n```objectivec\n\
  - (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [[LCTTwitterController sharedInstance]\n        authorizeAccountWithCompletionHandler:^{\n\
  \            [[LCTTwitterController sharedInstance]\n                getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n                    _tweets = tweets;\n                    [[self\
  \ tableView] performSelectorOnMainThread:@selector(reloadData)\n               \
  \                                       withObject:nil\n                       \
  \                            waitUntilDone:NO];\n                }];\n        }];\n\
  }\n```\n\n这里我们有一个嵌套在另一个块中的块。一旦第一个方法的完成处理器被触发，第二个方法就会被调用，最后当它的完成处理器被触发时，我们重新加载表格视图。在\
  \ Xcode 中运行应用；它应该在授权账户后启动时加载推文。这很不错，但在加载过程中没有任何反馈，只有一个空白的表格视图。让我们添加一些视觉提示，表明应用正在工作。\n\
  \n## 添加活动指示器\n\n指示应用正在进行网络调用的一种方法是使用设备状态栏上的网络活动指示器。这通过 `UIApplication` 类修改 `networkActivityIndicatorVisible`\
  \ 属性来实现。让我们在加载推文时完成这项工作。在 Xcode 中打开 `LCTTwitterController.m`，并通过添加粗体所示的代码行来修改 `getTweetsInUserTimelineWithCompletionHandler:`\
  \ 方法，以使用网络活动指示器：\n\n```objectivec\n- (void)getTweetsInUserTimelineWithCompletionHandler:(void(^)(NSArray\
  \ *tweets))handler\n{\n    NSString *timelinePath = @\"https://api.twitter.com/1/statuses/home_timeline.json\"\
  ;\n    NSURL *timelineURL = [NSURL URLWithString:timelinePath];\n    TWRequest *timelineRequest\
  \ = [[TWRequest alloc] initWithURL:timelineURL\n                               \
  \                     parameters:nil\n                                         \
  \        requestMethod:TWRequestMethodGET];\n    [timelineRequest setAccount:_twitterAccount];\n\
  \n    [[UIApplication sharedApplication] setNetworkActivityIndicatorVisible:YES];\n\
  \n    [timelineRequest performRequestWithHandler:^(NSData *responseData,\n     \
  \                                             NSHTTPURLResponse *urlResponse,\n\
  \                                                  NSError *error) {\n        [[UIApplication\
  \ sharedApplication] setNetworkActivityIndicatorVisible:NO];\n        if (responseData)\
  \ {\n            id topLevelObject = [NSJSONSerialization JSONObjectWithData:responseData\n\
  \                                                               options:0\n    \
  \                                                             error:NULL];\n   \
  \         if ([topLevelObject isKindOfClass:[NSArray class]]) {\n              \
  \  if (handler != NULL) {\n                    handler(topLevelObject);\n      \
  \          }\n            }\n        }\n    }];\n}\n```\n\n构建并运行应用，你应该会注意到状态栏中的网络活动指示器。这是\
  \ iOS 应用中近乎通用的设计，用于告知用户应用正在执行网络操作。不过，如果你正在查看表格视图，它并不太显眼。让我们通过在加载推文时更新视图控制器的标题来解决这个问题。在\
  \ Xcode 中，打开 `LCTTimelineViewController.m`，并通过添加粗体所示的代码行来修改 `viewWillAppear:` 方法：\n\
  \n```objectivec\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \n    LCTTwitterController *twitterController = [LCTTwitterController sharedInstance];\n\
  \    NSString *title = [self title];\n    [self setTitle:@\"Authorizing…\"];\n\n\
  \    [twitterController authorizeAccountWithCompletionHandler:^{\n        [self\
  \ performSelectorOnMainThread:@selector(setTitle:)\n                           \
  \    withObject:@\"Loading Tweets…\"\n                            waitUntilDone:NO];\n\
  \n        [twitterController getTweetsInUserTimelineWithCompletionHandler:^(NSArray\
  \ *tweets) {\n            [self performSelectorOnMainThread:@selector(setTitle:)\n\
  \                                   withObject:title\n                         \
  \       waitUntilDone:NO];\n            _tweets = tweets;\n            [[self tableView]\
  \ performSelectorOnMainThread:@selector(reloadData)\n                          \
  \                    withObject:nil\n                                          \
  \ waitUntilDone:NO];\n        }];\n    }];\n}\n```\n\n\n\n"
- '# 排版后的文档


  我们首先要做的是将视图控制器的当前标题保存到 `title` 变量中。这样我们就能在 `initWithStyle:` 中修改为视图控制器设置的标题，而无需在此方法中再次修改。接下来，我们在授权账户时将标题改为"正在授权..."，在加载推文时改为"正在加载推文..."，最后在推文加载完成后恢复为最初的标题。对于后两种操作，我们使用
  `performSelectorOnMainThread:withObject:waitUntilDone:` 来确保标题始终在主线程上被修改，因为在其他线程中调用
  UI 方法可能会导致 iOS 出现问题，包括崩溃和意外的用户界面设置。我们将在下一章中更深入地了解线程，所以如果你现在不太明白这意味着什么，不必担心。构建并运行你的应用，你应该能看到标题随着网络活动指示器一起变化。我们的
  Twitter 客户端距离完成还有很长一段路要走；在下一章中，我们将在讨论代码中的性能与并发性时为其添加更多功能。


