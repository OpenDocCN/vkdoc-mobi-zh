  \ Buttons`拖入你的视图中。双击它们以更改标题；将其中一个按钮的标题设置为`Play`，另一个设置为`Fullscreen`。将它们拖到用户界面的底部（会出现一条蓝色参考线，显示与底部的合适距离）。接下来，从对象库中将一个新的`View`对象拖入你的视图，并将其大小调整为填充按钮上方的空间，使用蓝色参考线进行对齐。完成后，它应该看起来像图\
  \ 11-5。\n\n**图 11-5.** *我们的自定义视频播放器 UI*\n\n由于这个应用将支持旋转，我们需要为这些视图设置适当的自动调整掩码。我们希望`Play`按钮保持在左下角，`Fullscreen`按钮保持在右下角，并且它们上方的视图随着视图的增长而增长。通过选择`View`\
