- "# 第 5 章：处理用户触摸\n\n在实现中，我们将追踪用户的触摸点并维护一些状态，以确定手势当前所处的阶段。为此，我们将在实现文件中定义一些实例变量：\n\n\
  ```\n@implementation LCTGreaterThanGestureRecognizer {\n    CGPoint        _beginningPoint;\n\
  \    CGPoint        _midPoint;\n    BOOL           _receivedDownRightSwipe;\n  \
  \  BOOL           _receivedDownLeftSwipe;\n}\n```\n\n`_beginningPoint` 指的是用户开始触摸时的坐标点。我们将保存它，以便之后进行比较：\n\
  \n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n   \
  \ UITouch *touch = [touches anyObject];\n    _beginningPoint = [touch locationInView:[self\
  \ view]];\n}\n```\n\n由于 `NSSet` 是无序的，不存在第一个或最后一个对象，因此我们使用其返回的第一个对象。获取起始点后，我们将后续点与之进行比较。为了匹配我们的手势，我们需要追踪两个动作：先向右下移动，再向左下移动。一旦用户向右下移动了最小距离，我们将\
  \ `_receivedDownRightSwipe` 标记为 `YES`，并将当前位置存入 `_midPoint`。不过，用户可能会继续朝这个方向移动，因此在他们持续向右下移动的过程中，我们会不断更新\
  \ `_midPoint`，直到他们改变方向。一旦改变方向，我们就可以开始追踪向左下的移动，直到手势完成。如果上述任何步骤未能发生，我们将手势识别器的状态设置为\
  \ `Failed`，从而结束触摸追踪：\n\n```\n#define CGPointDistanceFromPoint(p1, p2) (sqrtf(powf((p2.x\
  \ - p1.x), 2.0f) + \n                                                  powf((p2.y\
  \ - p1.y), 2.0f)))\n\n// 用户手指必须移动的最小距离，以触发一半的滑动动作。\nstatic const CGFloat kMinimumSwipeDistance\
  \ = 50.0f;\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event\n\
  {\n    UITouch *touch = [touches anyObject];\n    CGPoint newPoint = [touch locationInView:[self\
  \ view]];\n\n    if (_receivedDownRightSwipe == NO) {\n        if (newPoint.x >=\
  \ _beginningPoint.x &&\n            newPoint.y >= _beginningPoint.y) {\n       \
  \     [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n            第 5 章：处理用户触摸\n\
  \            CGFloat distance = CGPointDistanceFromPoint(newPoint,\n           \
  \                                             _beginningPoint);\n            if\
  \ (distance >= kMinimumSwipeDistance) {\n                _midPoint = newPoint;\n\
  \                _receivedDownRightSwipe = YES;\n            }\n        }\n    \
  \    else {\n            [self setState:UIGestureRecognizerStateFailed];\n     \
  \   }\n    }\n    else if (newPoint.x >= _midPoint.x &&\n             newPoint.y\
  \ >= _midPoint.y) {\n```\n\n\n\n```objectivec\n// 仍沿原方向前进，无需开始寻找新的距离。\n\n_midPoint\
  \ = newPoint;\n}\nelse if (newPoint.x <= _midPoint.x &&\n         newPoint.y >=\
  \ _midPoint.y) {\n    CGFloat distance = CGPointDistanceFromPoint(newPoint,\n  \
  \                                              _midPoint);\n    if (distance >=\
  \ kMinimumSwipeDistance) {\n        _receivedDownLeftSwipe = YES;\n    }\n}\nelse\n\
  {\n    [self setState:UIGestureRecognizerStateFailed];\n}\n```\n\n在完成这个实现之前，还有几件事要做。首先，如果在触摸结束时`_receivedDownRightSwipe`和`_receivedDownLeftSwipe`都为`YES`，我们将手势标记为已识别；否则，标记为失败：\n\
  \n```objectivec\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n\
  {\n    if (_receivedDownRightSwipe && _receivedDownLeftSwipe) {\n        [self setState:UIGestureRecognizerStateRecognized];\n\
  \    }\n    else\n    {\n        [self setState:UIGestureRecognizerStateFailed];\n\
  \    }\n}\n```\n\n如果触摸被取消，则手势失败：\n\n```objectivec\n- (void)touchesCancelled:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n    [self setState:UIGestureRecognizerStateFailed];\n\
  }\n```\n\n最后，手势识别器将通过`reset`方法重置自身。我们将在其中重置状态，并确保调用父类的实现：\n\n```objectivec\n- (void)reset\n\
  {\n    [super reset];\n    _beginningPoint = CGPointZero;\n    _midPoint = CGPointZero;\n\
  \    _receivedDownRightSwipe = NO;\n}\n```\n\n就这样，一个功能完备的、用于捕获自定义手势的手势识别器就完成了。虽然这看起来可能用途不大，但手势实际上可以为高级用户提供快捷操作，甚至可以用在游戏中！不过在大多数情况下，你会希望使用内置了手势识别器的标准用户界面组件。常用于交互的组件之一是`UIScrollView`。\n\
  \n## 滚动视图\n\n`UIScrollView`是一种常见的`UIView`类型，用于在其内部滚动内容。我们之前介绍过的`UITableView`和`UIWebView`都使用`UIScrollView`来移动其内容。要使用`UIScrollView`，需要做两件事：首先，将你想要滚动的内容作为子视图添加到滚动视图中。其次，设置滚动视图的`contentSize`属性，使其与内容的尺寸相匹配。之后，当用户在滚动视图上移动手指时，其内容会自动跟随手指的移动而移动。滚动视图的`contentOffset`属性反映了它从起始位置移动了多少；你也可以通过编程方式设置该属性来滚动视图。\n\
  \n关于`UIScrollView`的工作原理，请参见图 5-1。如果你在 Mac OS X 上做过视图编程，可能会注意到 Mac OS X 与 iOS 的一个关键区别：在\
  \ iOS 中，坐标系的原点位于视图的左上角，而在 Mac OS X 中，原点位于视图的左下角。\n\n![图 23](img/index-123_1.jpg)\n\
  \n**图 5-1.** *一个典型的滚动视图。滚动视图的`contentOffset`为`{ x, y }`，可见部分为滚动视图内部的深色棋盘格图案。*\n\n\
  `UIScrollView`的一个便捷功能是其`pagingEnabled`属性（可通过`isPagingEnabled`方法访问）。当该属性设置为`YES`时，滚动视图会在左右滚动时自动对齐到其宽度的整数倍，在上下滚动时对齐到其高度的整数倍。如果你使用滚动视图来显示多个相同尺寸的内容，可以利用此功能实现分页滚动效果。例如，如果你有一个名为`images`的图像数组，可以通过以下方式创建一个用于在图像间切换的滚动视图：\n\
  \n```objectivec\nUIScrollView *scrollView = [[UIScrollView alloc] initWithFrame:CGRectMake(0.0f,\
  \ 0.0f, 320.0f, 480.0f)];\n[scrollView setPagingEnabled:YES];\n\nCGFloat xValue\
  \ = 0.0f;\nfor (UIImage *image in images) {\n    UIImageView *imageView = [[UIImageView\
  \ alloc] initWithFrame:CGRectMake(xValue, 0.0f, 320.0f, 480.0f)];\n    [imageView\
  \ setImage:image];\n    [scrollView addSubview:imageView];\n    xValue += 320.0f;\n\
  }\n```\n\n\n\n`[scrollView setContentSize:CGSizeMake([images count] * 320.0f, 480.0f)];`\
  \ 这段代码示例将允许你水平滚动，并在图片之间分页切换。\n\n这是 `UIScrollView` 一种非常典型的用法，它让你能够快速为图片、文本或应用显示的任何其他内容构建一个高度交互的布局。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 5 章：处理用户触摸\n\n### **实现 UI 变更**\n\n让我们在 MyStuff 中使用这个新获得的用户界面知识。目前我们的 UI 还很普通，而对于\
  \ iOS 应用，用户期望看到的是更具视觉冲击力的东西。仅仅做一个有用的应用是不够的；相反，我们应该努力打造一个既实用又美观的应用。首先，我们应该支持展示物品的图片。\n\
  \n#### 为物品添加图片\n\n让我们为 `Possession` 添加一个图片属性。打开 `Possession.h` 并添加加粗的那行代码：\n\n```\n\
  @interface Possession : NSObject <NSCoding>\n\n@property (strong) UIImage *image;\n\
  \n@property (copy) NSString *name;\n\n@property (strong) NSNumber *value;\n\n@end\n\
  ```\n\n接下来，我们需要修改它保存到磁盘的方式。`UIImage` 是 UIKit 中用于表示多种格式图片的类，在 iOS 5 之前它并不遵循 `NSCoding`\
  \ 协议。要在 iOS 4 上将其保存到磁盘，我们不能直接对它进行编码。幸运的是，我们可以将其转换为 `NSData` 对象，然后直接保存到磁盘。初次尝试保存时，我们会将其直接编码为数据。打开\
  \ `Possession.m` 并编辑 `NSCoding` 方法，添加加粗的代码行：\n\n```\n@synthesize image;\n\n@synthesize\
  \ name;\n\n@synthesize value;\n\n- (id)initWithCoder:(NSCoder *)aDecoder\n\n{\n\n\
  self = [self init];\n\nif (self) {\n\n[self setImage:[UIImage imageWithData:[aDecoder\n\
  \ndecodeObjectForKey:@\"image\"]]];\n\n[self setName:[aDecoder decodeObjectForKey:@\"\
  name\"]];\n\n[self setValue:[aDecoder decodeObjectForKey:@\"value\"]];\n\n}\n\n\
  return self;\n\n}\n\n- (void)encodeWithCoder:(NSCoder *)aCoder\n\n{\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章：处理用户触摸\n\n[aCoder encodeObject:UIImagePNGRepresentation([self image])\n\n\
  forKey:@\"image\"];\n\n[aCoder encodeObject:[self name]\n\nforKey:@\"name\"];\n\n\
  [aCoder encodeObject:[self value]\n\nforKey:@\"value\"];\n\n}\n```\n\n我们在这里使用的关键函数是\
  \ `UIImagePNGRepresentation()`。它从一张图片返回一个 `NSData` 对象，并将其转换为 PNG 表示。你也可以使用 `UIImageJPEGRepresentation()`，它接受图片作为第一个参数，并接受一个浮点值作为第二个参数来控制压缩质量：0.0\
  \ 代表最高压缩（因此质量最低），而 1.0 代表最低压缩（因此质量最高）。\n\n如果你只支持 iOS 5 及更新版本，可以直接对 `UIImage` 对象进行编码和解码，而无需先将其转换为\
  \ `NSData` 对象。\n\n现在我们已经准备好为 `Possession` 对象添加图片了。当我们获得一张图片时，希望能在列表视图中显示它。打开 `PossessionListTableViewCell.m`，并添加加粗的代码行，以便在图片发生变化时接收键值观察通知：\n\
