- '# 第 3 章：使用视图控制器管理屏幕内容


  如果你不小心将文本字段连接到了错误的输出口，可以在`连接检查器`中修复。要打开它，请选择你错误连接的文本字段，然后按下`⌘+Option+6`或选择`视图` ➤
  `工具` ➤ `显示连接检查器`。如图 3-7 所示，`连接检查器`列出了你在`引用输出口`下为文本字段建立的连接。图 3-7 中的输出口是正确的。如果你将其连接到了错误的输出口，请按下引用对象名称左侧的小`x`（在图
  3-7 中为`文件所有者`）以断开连接。


  **图 3-7.** *连接检查器*


  连接好文本字段的输出口后，让我们为视图控制器再添加一个属性：指向我们正在显示详情对象的指针。打开`PossessionDetailViewController.h`，并添加加粗部分的内容：


  ```

  @class Possession;


