- "# 第 3 章：使用视图控制器管理屏幕内容\n\n总的来说，iOS 应用每次只处理一个屏幕的内容。例如，通讯录应用在一个屏幕上显示联系人列表。它的功能只有一个：显示联系人列表。当你点击某个联系人时，便会显示另一个屏幕的内容，此次展示的是你选中的联系人详情。Safari\
  \ 浏览器每次显示一个网页，设置应用每次显示一组设置，而邮件应用每次显示一个文件夹，当你选择一封邮件时再显示其内容。在像 iPhone 这样的小屏幕上处理内容时，每次只显示一个屏幕的内容是必要的；由于分辨率仅有\
  \ 320x480，根本容不下多组信息。\n\niOS 应用中出现的屏幕具有一些共同特征。通常，应用顶部会有一个导航栏，显示当前屏幕的名称，左侧有一个返回按钮。其他应用则在底部使用黑色标签栏来切换不同屏幕。某些行为是所有内容屏幕共有的：在需要时加载它们，在不需要时释放它们，并将它们呈现给用户。\n\
  \n这些共同的行为和任务被封装在 Cocoa Touch 中最重要的一个类里：`UIViewController`。视图控制器管理单个视图，通常是一个屏幕的内容。这个视图可以拥有一个复杂层级中的许多子视图，但视图控制器直接处理一个视图——它的\
