- "# 第 5 章：处理用户触摸\n\n然后将它们连接到操作。现在，我们用代码来创建。打开 `PossessionDetailViewController.m`，并添加\
  \ `viewDidLoad` 方法：\n\n```objectivec\n- (void)viewDidLoad\n{\n[super viewDidLoad];\n\
  UITapGestureRecognizer *tapGestureRecognizer =\n[[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\naction:@selector(imageViewTapped:)];\n[[self imageView] addGestureRecognizer:tapGestureRecognizer];\n\
  [[self imageView] setUserInteractionEnabled:YES];\n}\n```\n\n我们必须将 `imageView` 的\
  \ `userInteractionEnabled:` 属性设置为 `YES`，因为图片视图默认情况下该属性是关闭的，它们通常不会直接接收轻点操作。接下来，我们需要添加\
  \ `imageViewTapped:` 方法。向类扩展中添加该方法的声明：\n\n```objectivec\n@interface PossessionDetailViewController()\n\
  - (void)doneButtonPressed:(id)sender;\n- (void)imageViewTapped:(UITapGestureRecognizer\
  \ *)tapGestureRecognizer;\n@end\n```\n\n在编写该方法时，我们将使用一个名为 `UIImagePickerController`\
  \ 的 UIKit 类来为对象拍照。\n\n\n\n`UIImagePickerController`类继承自`UIViewController`，因此我们可以创建一个实例并以模态视图控制器的方式呈现它。编写方法如下：\n\
  \n```objc\n- (void)imageViewTapped:(UITapGestureRecognizer *)tapGestureRecognizer\n\
  {\n    UIImagePickerController *imagePickerController =\n        [[UIImagePickerController\
  \ alloc] init];\n\n    if ([UIImagePickerController\n            isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        [imagePickerController\n            setSourceType:UIImagePickerControllerSourceTypeCamera];\n\
  \    }\n    else {\n        [imagePickerController\n            setSourceType:UIImagePickerControllerSourceTypeSavedPhotosAlbum];\n\
  \    }\n\n    [imagePickerController setDelegate:self];\n    [self presentModalViewController:imagePickerController\
  \ animated:YES];\n}\n```\n\n你可能会注意到这段代码中调用`setDelegate:`（对`imagePickerController`）时出现编译器警告。我们稍后会修复它，目前可以先忽略。\n\
  \n图像选择器控制器可用于通过设备相机拍照（如果设备有相机的话），或从用户的相册中获取图片。在此例中，如果相机可用则优先使用相机，否则回退到用户的已保存相册。创建好实例并设置其来源类型后，我们将详情视图控制器（此方法中的`self`）设置为它的委托，以便接收用户选择的图片。最后以模态方式呈现它。之后图像选择器控制器接管控制权，直到用户选择（或拍摄）图片后才将控制权返回给我们的代码。\n\
  \n**注意：** 在 iPhone 模拟器上进行测试时，无法使用相机，但可以使用“已保存的相册”。向 iPhone 模拟器的“已保存的相册”添加图片的最简单方法是通过\
  \ Safari；长按图片并保存即可。\n\n在测试这段代码之前，我们需要为图像选择器控制器添加一个委托。有趣的是，`UIImagePickerController`的`delegate`属性被定义遵守两个协议：`UINavigationControllerDelegate`和`UIImagePickerControllerDelegate`。在苹果的源代码中，他们用以下行声明（来自\
  \ iOS 系统框架中的`UIImagePickerController.h`）：\n\n```objc\n@property(nonatomic,assign)\
  \ id <UINavigationControllerDelegate,\n    UIImagePickerControllerDelegate> delegate;\n\
  ```\n\n因此，为了避免之前代码产生的编译器警告，我们需要让`PossessionDetailViewController`同时遵守`UINavigationControllerDelegate`和`UIImagePickerControllerDelegate`协议，即使我们并不会实现`UINavigationControllerDelegate`中定义的任何方法。打开头文件（`PossessionDetailViewController.h`），并相应地调整类声明：\n\
  \n```objc\n@interface PossessionDetailViewController : UIViewController\n    <UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n```\n\n我们将要实现的方法来自`UIImagePickerControllerDelegate`。将这两个方法添加到`PossessionDetailViewController`的实现中：\n\
  \n```objc\n#pragma mark – UIImagePickerControllerDelegate Protocol Methods\n\n-\
  \ (void)imagePickerController:(UIImagePickerController *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    // 如果我们的 possession 为 nil，则无法保存图像。如果它尚不存在，则创建一个并填入用户已输入的值。\n  \
  \  if ([self possession] == nil) {\n        [self setPossession:[[Possession alloc]\
  \ init]];\n        [[self possession] setName:[[self nameField] text]];\n      \
  \  [[self possession] setValue:[NSNumber numberWithInt:[[[self valueField] text]\
  \ intValue]]];\n    }\n\n    UIImage *image = [info\n        objectForKey:UIImagePickerControllerOriginalImage];\n\
  \    [[self possession] setImage:image];\n\n    [self dismissModalViewControllerAnimated:YES];\n\
  }\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n#pragma mark -\n```\n\
  \n为了帮助组织代码，我们使用了`#pragma mark`编译器指令。\n\n\n\n"
- "# 处理用户触摸操作\n\n使用`#pragma mark`可以为代码段添加标签，功能类似于注释。你可以在编辑器中出现的方法下拉列表中看到这些部分，如图 5-4\
  \ 所示。`#pragma mark - `会在列表中添加一条水平线，而`#pragma mark -`后跟文字标签则会在列表中显示该标签。如果使用类名或（如我们之前所做的）协议名，可以按住\
  \ Option 键点击该名称，然后点击弹出窗口右上角的书籍图标，直接跳转到该符号的文档。你也可以按住`⌘`键并点击`#pragma mark -`注释中的协议名称，直接跳转到该协议的定义位置。\n\
  \n![图片 26](img/index-134_1.jpg)\n\n**图 5-4.** Xcode 编辑器中的下拉列表（请注意，我的 Xcode 偏好设置将背景设为深色而非默认的白色）\n\
  \n这两个方法中的第二个仅在用户取消图像选择器时被调用，其实现仅涉及关闭模态视图控制器。第一个方法更有趣。首先，它确保存在一个用于存储图像的`Possession`对象；如果该对象不存在但用户已输入文本，则将该文本保存到新创建的对象中。然后，它从传入的`info`字典中获取用户选择的图像，并将其设置为当前`Possession`对象的图像属性。一旦我们设置了图像属性，之前设置的\
  \ KVO 方法会自动处理在详情视图控制器和列表视图控制器中显示该图像。我们在`Possession`中设置的`NSCoding`方法现在也会将该图像保存到磁盘，因此下次运行应用时，你设置的任何图像都会保留。构建并运行应用，为你的条目设置一些图像。完成后，你应该会在两个位置看到这些图像，如图\
  \ 5-5 所示。\n\n![图片 27](img/index-135_1.jpg)\n\n**图 5-5.** MyStuff 为产品设置了图像\n\n太棒了！现在，我们有了一个可以让用户追踪其物品（包括每个物品的图片）的应用。然而，我们还没有完成。在创建图像选择器控制器时，我们假设用户希望使用相机（如果可用）拍照。但这不支持那些想为某些物品拍照、同时又想使用其他物品的已保存照片的用户。如果遗漏了这类功能，你肯定会在\
  \ App Store 上收获一堆一星评价。让我们改为给用户一个提示，让他们选择是使用相机拍照还是从照片库中选择图片。我们将使用一个名为`UIActionSheet`的\
  \ UIKit 对象，它会显示一个模态对话框，要求用户从几个选项中选择一个。\n\n**注意：** 在配备高分辨率照片相机的设备上，你可能会注意到创建带图像的新物品时出现延迟。这种延迟是由于图像正在保存到磁盘。在后续章节中，我们将学习\
  \ iOS 上的性能和多线程技术。在此之前，这种延迟是正常的。\n\n## 使用 UIActionSheet\n\n创建`UIActionSheet`实例时需要提供可选的标题、一个用于接收点击事件的委托，以及一些按钮标题。我们需要让`PossesionDetailViewController`类成为其委托，这意味着要遵守另一个协议。打开其头文件，并添加新的声明：\n\
  \n```objectivec\n@interface PossessionDetailViewController : UIViewController\n\
  <UIActionSheetDelegate, UIImagePickerControllerDelegate,\nUINavigationControllerDelegate>\n\
  ```\n\n现在，我们准备添加操作表。不过，首先让我们考虑一下`imageViewTapped:`方法。目前，它创建并显示一个`UIImagePickerController`，我们仍需要这个功能，但希望在代码的不同位置进行。我们还希望用户指定使用哪种源类型（相机或照片库）。为此，让我们在类扩展中声明一个新方法：\n\
  \n```objectivec\n- (void)showImagePickerControllerWithSourceType:(UIImagePickerControllerSourceType)sourceType;\n\
  ```\n\n在实现中，我们将执行与`imageViewTapped:`中大部分相同的操作，区别在于使用传入的源类型。输入以下方法实现代码：\n\n```objectivec\n\
  - (void)showImagePickerControllerWithSourceType:(UIImagePickerControllerSourceType)sourceType\n\
  {\n    UIImagePickerController *imagePickerController =\n        [[UIImagePickerController\
  \ alloc] init];\n    [imagePickerController setSourceType:sourceType];\n    [imagePickerController\
  \ setDelegate:self];\n    [self presentModalViewController:imagePickerController\
  \ animated:YES];\n}\n```\n\n完美。现在，我们可以随时调用此方法。回到`imageViewTapped:`的实现，删除其内容，并替换为以下代码：\n\
  \n```objectivec\n- (void)imageViewTapped:(UITapGestureRecognizer *)tapGestureRecognizer\n\
  {\n    if ([UIImagePickerController\n            isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ &&\n        [UIImagePickerController\n            isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\
  \ {\n        UIActionSheet *actionSheet =\n            [[UIActionSheet alloc] initWithTitle:nil\n\
  \                                       delegate:self\n                        \
  \      cancelButtonTitle:@\"取消\"\n                         destructiveButtonTitle:nil\n\
  \                              otherButtonTitles:@\"拍照\", @\"从相册选择\", nil];\n  \
  \      [actionSheet showInView:[self view]];\n    }\n    else if ([UIImagePickerController\n\
  \                 isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\
  \ {\n        [self showImagePickerControllerWithSourceType:UIImagePickerControllerSourceTypePhotoLibrary];\n\
  \    }\n}\n```\n\n在此方法中，仅当`UIImagePickerController`有多个源类型可用时，我们才会创建操作表。如果用户使用的是早期型号的\
  \ iPod Touch 或 iPhone 模拟器（没有相机），我们会直接跳转到刚刚创建的用于显示图像选择器控制器的方法，因为用户没有选择余地。如果两者都不可用，则不执行任何操作。\n\
  \n接下来，我们需要编写响应操作表的代码。按钮的显示顺序如图 5-6 所示：先显示“拍照”，然后是“从相册选择”，最后是“取消”。\n\n![图片 28](img/index-138_1.jpg)\n\
  \n**图 5-6.** 使用操作表增加界面友好度\n\n让我们实现`UIActionSheet`的委托方法`actionSheet:clickedButtonAtIndex:`。传递给委托的索引对应按钮的位置，从\
  \ 0 开始。因此，0 对应“拍照”，1 对应“从相册选择”，2 对应“取消”。取消按钮的索引也是`UIActionSheet`的一个属性`cancelButtonIndex`。我们利用这个属性，在用户按下“取消”时提前结束方法。在`PossessionDetailViewController.m`中实现委托方法：\n\
  \n```objectivec\n- (void)actionSheet:(UIActionSheet *)actionSheet\nclickedButtonAtIndex:(NSInteger)buttonIndex\n\
  {\n    if (buttonIndex == [actionSheet cancelButtonIndex]) {\n        return;\n\
  \    }\n    else {\n        UIImagePickerControllerSourceType sourceType;\n    \
  \    if (buttonIndex == 0) {\n            sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \        }\n        else {\n            sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
  \        }\n        [self showImagePickerControllerWithSourceType:sourceType];\n\
  \    }\n}\n```\n\n通过检查所选索引的值，我们可以确定要显示哪种类型的图像选择器控制器，并调用之前编写的辅助方法来实现。这个操作表增加了界面友好度，让用户能够自行选择而非替他们做决定。做这样的事情很重要，能让用户感觉一切尽在掌控之中，但我们的应用仍未完成。\n\
  \n## 为表格视图实现“编辑”功能\n\n\n\n我们让`MyStuff`变得实用，并添加了一些细节打磨，但还缺少一项极其重要的功能：让用户能从自己的错误中恢复。如果用户误添加了一件物品，或者后来误删了它，我们目前没有方法让用户看到！幸运的是，`UITableView`支持一种“编辑”模式，可以在每一行旁边添加一个删除控件。要启用编辑模式，我们可以在列表视图控制器中，在导航栏的左侧添加一个“编辑”按钮。\n\
  \n打开`PossessionListViewController.m`，用粗体标记的代码行编辑`initWithNibName:bundle:`方法：\n\n\
  ```objective-c\n- (id)initWithNibName:(NSString *)nibNameOrNil\n       bundle:(NSBundle\
  \ *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\n        \
  \                 bundle:nibBundleOrNil];\n    if (self) {\n        [self loadPossessionsFromDisk];\n\
  \        [self setTitle:@\"My Stuff\"];\n\n        UIBarButtonItem *addItemButton\
  \ =\n        [[UIBarButtonItem alloc]\n         initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
  \         target:self\n         action:@selector(addItemButtonPressed:)];\n\n  \
  \      [[self navigationItem] setRightBarButtonItem:addItemButton];\n        [[self\
  \ navigationItem] setLeftBarButtonItem:[self editButtonItem]];\n    }\n    return\
  \ self;\n}\n```\n\n新代码其实不多，对吧？`editButtonItem`是`UIViewController`的一个便捷方法，它会为你创建一个按钮。图\
  \ 5-7 显示了视图控制器在编辑模式下的样子：\n\n**图 5-7.** *我们的列表视图控制器处于编辑模式*\n\n进入编辑模式会自动产生一些动画变化：\n\
  \n- 表格视图右侧的披露指示器会向右滑出屏幕。\n- 单元格的文本会向右移动。\n- 一个删除控件会从左侧淡入。\n\n按下删除按钮会将单元格内容推向一旁，为红色的删除按钮腾出空间，但此时按下它还没有实际效果。要响应这个按钮，我们需要实现表视图数据源方法`tableView:commitEditingStyle:forRowAtIndexPath:`。将其添加到列表视图控制器（`PossessionListViewController.m`）中，实现代码如下：\n\
  \n```objective-c\n- (void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\
  \ {\n        [_possessions removeObjectAtIndex:[indexPath row]];\n        NSArray\
  \ *indexPaths = [NSArray arrayWithObject:indexPath];\n        [tableView deleteRowsAtIndexPaths:indexPaths\n\
  \                         withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \        [self savePossessionsToDisk];\n    }\n}\n```\n\n删除项目是一个三步过程：首先，将其从我们的模型（即`_possessions`数组）中移除。接下来，告诉表视图删除该索引路径对应的单元格。最后，将物品列表保存到磁盘，这会更新归档文件以移除该项。\n\
  \n构建并运行，尝试删除一件物品。你会看到该行在动画中消失，而其他行则移动过来。这是我们可以为应用添加的又一个快速打磨，以提供更好的用户体验。删除功能让用户能够从错误中恢复，并且随着时间的推移调整他们的数据集。\n\
  \n接下来，我们将通过允许用户重新排序列表中的内容，赋予他们对数据展示方式更多的控制权。\n\n### 实现表视图重排序\n\n始终记住，应用中的数据并非你的，而是用户的。因此，用户可能希望更改数据的排序和显示方式。目前，`MyStuff`并没有以任何有意义的方式对数据进行排序，它只是按照输入的顺序显示。我们可以自己进行排序，无论是按字母顺序还是按价值，但这里我们选择让用户自己排序。我们将通过`UITableView`提供的另一个机制来实现：重排序控件。\n\
  \n\n\n"
- "# 排版后的文档\n\n**图 5-8**展示了我们的表格视图在启用重排控件时的效果。\n\n**图 5-8.** 我们的列表表格视图在编辑模式内外的重排控件效果\n\
  \n如图所示，重排控件是一个由三条线组成的方框。进入编辑模式后，它会替换右侧的展开指示器，成为表格视图单元格的辅助视图。要启用重排控件，我们无需在表格视图上设置属性、调用方法或执行类似操作。只需实现用户在移动行时调用的方法即可：表格视图会检测到我们已实现该方法，并自动显示控件。打开\
  \ `PossessionListViewController.m`，添加以下表格视图数据源方法：\n\n```objective-c\n- (void)tableView:(UITableView\
  \ *)tableView\nmoveRowAtIndexPath:(NSIndexPath *)sourceIndexPath\ntoIndexPath:(NSIndexPath\
  \ *)destinationIndexPath\n{\n    id movingObject = [_possessions objectAtIndex:[sourceIndexPath\
  \ row]];\n    [_possessions removeObjectAtIndex:[sourceIndexPath row]];\n    [_possessions\
  \ insertObject:movingObject atIndex:[destinationIndexPath row]];\n    [self savePossessionsToDisk];\n\
  }\n```\n\n在此方法中，我们只需修改 `_possessions` 数组以匹配用户所做的更改，然后将其保存到磁盘以持久化更改。表格视图会自动处理所有 UI\
  \ 更新。\n\n**注意：** 如果你的表格视图中某些行无法移动或某些目标位置无效，请实现数据源方法 `tableView:canMoveRowAtIndexPath:`\
  \ 以逐行禁用重排控件，并实现较为冗长的委托方法 `tableView:targetIndexPathForMoveFromRowAtIndexPath:toProposedIndexPath:`\
  \ 来在用户拖拽时调整目标行。\n\n现在，用户已经可以重排内容，完全掌控自己的数据，因此我们正朝着打造一款广受欢迎的优秀应用迈进。MyStuff 在视觉体验方面还有很长的路要走，但其功能性已经相当扎实。\n\
  \n## 总结\n\n本章我们介绍了多种让应用更灵敏响应用户触摸的方法。从实现自定义 `UIView` 子类处理触摸，到使用 `UIGestureRecognizer`，你拥有丰富的选项来打造卓越的用户体验。我们还介绍了几种内置的用户交互方式，你可以利用它们为用户提供跨应用一致的功能体验，从而让用户无需学习即可上手使用你的应用。下一章我们将充分利用这些知识，借助设备的网络连接功能，打造一款出色的\
  \ Twitter 客户端。\n\n---\n\n"
- "# 第 6 章：集成网络与 Web 服务\n\niPhone 开启了一个始终联网的应用新时代。App Store 中几乎每个 iOS 应用都会以某种方式使用网络连接，无论是加载图片、向\
  \ Game Center 排行榜提交高分，还是向开发者报告分析数据。然而，作为开发者，我们必须审慎考虑数据使用量、发送内容以及发送方式。许多用户（尤其是美国以外的用户）并未购买昂贵的无限流量套餐，因此不会欣赏一个启动时下载几百兆图片的应用。理解如何使用这些设备的网络功能，是\
  \ Cocoa Touch 开发者的基本技能。\n\n与学习网络服务使用密不可分的，是掌握如何集成 Web 服务。仅仅从互联网读取数据是不够的，还必须解析这些数据，并让应用据此运行。Web\
  \ 上的数据格式多种多样，从 XML 到 JSON 再到自定义格式，来源也各不相同，可能是静态文件，也可能是复杂的 Web 应用。此外，这些 Web 服务通常还会要求你向它们发送数据，这本身就是一系列挑战，涉及文本编码和图像表示等方面。本章将带你逐一应对这些场景，从从网络加载简单数据，到向\
  \ Web 服务上传文件和发送数据。在此过程中，我们将运用新学到的技能来创建一个 Twitter 客户端。\n\n我们从简单的开始：将网络上的简单数据加载到应用中。\n\
  \n## 从网络加载数据\n\n如果无法从网络读取数据，许多类别的应用将变得毫无用处。天气应用、电影票应用以及新闻阅读应用都将无法提供实用功能。幸运的是，我们可以在\
  \ iOS 设备上使用网络。让我们看一个使用 `NSURLConnection` 类从 Web 服务获取天气数据的快速示例。要获取天气数据，我们首先需要确定要使用的\
  \ Web 服务。市面上有各种天气服务，每个都有各自的许可协议和使用条款。在本书中，我将使用 Yahoo! Weather 服务。你可以在 [`developer.yahoo.com/weather/`](http://developer.yahoo.com/weather/)\
  \ 上了解更多信息。我们实际用于获取天气数据的 URL 是 [`weather.yahooapis.com/forecastrss?p=48226`](http://weather.yahooapis.com/forecastrss?p=48226)。此例中，`48226`\
  \ 是密歇根州底特律的邮政编码，作为参数传递给 URL。该过程包含三个步骤。首先，我们必须创建一个 URL 请求。\n\n### 创建 URL 请求\n\n`NSURLRequest`\
  \ 对象封装了 `NSURLConnection` 对象执行请求所需的一切：要连接的 URL、请求的缓存设置，以及需要随请求发送的任何 HTTP 标头。要创建\
  \ `NSURLRequest` 对象，我们首先需要创建一个 `NSURL` 对象来表示 URL。创建请求的代码如下：\n\n```objective-c\n\
  NSURL *weatherURL = [NSURL\n    URLWithString:@\"http://weather.yahooapis.com/forecastrss?p=48226\"\
  ];\nNSURLRequest *urlRequest = [NSURLRequest requestWithURL:weatherURL];\n```\n\n\
  URL 请求的默认设置对于这个简单任务已经足够，因此我们无需进行任何进一步配置。\n\n### 创建 URL 连接\n\n创建请求后，我们几乎已经准备好创建连接并获取数据。我们将使用\
  \ `NSURLConnection` 类方法 `sendSynchronousRequest:returningResponse:error:`，该方法会同步地从网络加载数据。第一个参数是我们刚创建的请求，但后两个参数需要提前创建。\n\
  \n**注意：** 在实际开发中，使用同步 URL 连接通常是一个坏主意。它们会在等待连接完成时停止执行。如果网络连接较慢或正在加载大量数据，使用同步请求会导致应用挂起，直到连接完成。本章稍后我们将介绍异步请求，这是一种处理数据加载的更好方式，并且在第\
  \ 7 章中，我们将更一般性地讨论此类性能问题。\n\n此方法在系统头文件 `NSURLConnection.h` 中声明：\n\n```objective-c\n\
  + (NSData *)sendSynchronousRequest:(NSURLRequest *)request\n                returningResponse:(NSURLResponse\
  \ **)response\n                            error:(NSError **)error;\n```\n\n如你所见，后两个参数并非指向对象的常规指针，而是指向对象指针的指针，这就是它们有两个星号的原因。这最初可能会让人困惑，但实际上这只是该方法返回指针的一种方式。你需要为每个参数创建一个指针，并将其初始化为指向\
  \ `nil`：\n\n```objective-c\nNSURLResponse *urlResponse = nil;\nNSError *error =\
  \ nil;\n```\n\n创建好这两个指针后，你就可以调用该方法并创建连接了。\n\n\n\n```objc\nNSData *receivedData =\
  \ [NSURLConnection sendSynchronousRequest:urlRequest returningResponse:&urlResponse\
  \ error:&error];\n```\n\n在`urlResponse`和`error`前添加一个取地址符（`&`），会传递指向指针的指针，而不是指针本身。当该方法执行完毕后，这些指针将指向相应的对象。通过以这种方式传递指针，我们可以从一个方法中接收多个返回值。\n\
  \n## 解释响应\n\n当该方法返回时，`receivedData`对象将以`NSData`对象的形式包含我们从服务器获取的数据。就其本身而言，一个普通的`NSData`对象并不是很有用。由于我们知道该服务返回的是文本，而不是图像等其他数据，让我们将其转换为`NSString`对象：\n\
  \n```objc\nNSString *receivedText = [[NSString alloc] initWithData:receievedData\
  \ encoding:NSUTF8StringEncoding];\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 6 章：集成网络与 Web 服务**\n\n**注意：** 你可能已经注意到我们使用了`NSUTF8StringEncoding`作为第二个参数。你接收到的数据的字符串编码取决于你所连接的服务器。大多数服务使用\
  \ UTF8 或 ASCII 文本编码。有关不同编码类型及其使用时机的更多信息，请查阅 Joel Spolsky 关于该主题的文章，地址为：\n\n[www.joelonsoftware.com/articles/Unicode.html](http://www.joelonsoftware.com/articles/Unicode.html)\n\
  \n现在我们有了一个包含服务器对我们请求的响应的字符串。这并不能立即为我们所用，因为它是 XML 格式的，但这是一个开始。一旦你从服务器获取了数据，只需对其进行解析即可。我们还可以从`urlResponse`对象中获取一些信息。由于这是一个\
  \ HTTP 连接（我们的 URL 以`http://`开头），响应对象实际上是`NSHTTPURLResponse`的一个实例，它是`NSURLResponse`的子类。这个特定于\
  \ HTTP 的子类为你提供了额外的数据，例如响应的状态码。例如，假设你在编写一个 iOS 应用，用于与一个支持网络的咖啡壶通过 HTTP 进行交互——这是一个对该协议的明确定义的使用——并且你想要适当地响应\
  \ HTTP 状态码 418（“我是一个茶壶”，如果你意外地连接到了一个茶壶，而不是咖啡壶，就会得到这个状态码），代码可能如下所示：\n\n```objc\n\
  if ([urlResponse isKindOfClass:[NSHTTPURLResponse class]]) {\n    NSInteger statusCode\
  \ = [(NSHTTPURLResponse *)urlResponse statusCode];\n    if (statusCode == 418) {\n\
  \        // 哎呀，这是一个茶壶！\n        NSLog(@\"意外地给一个茶壶发了消息。\");\n    }\n}\n```\n\n虽然这个例子看起来相当简单，但它提供了一个讨论如何在\
  \ Objective-C 中处理棘手情况的机会。我们想要使用响应的状态码，但只有当响应是`NSHTTPURLResponse`对象时才可用；任何其他`NSURLResponse`对象都不行。我们使用`isKindOfClass:`方法来检查`urlResponse`的类。如果它是`NSHTTPURLResponse`，那么我们就知道可以检查状态码了。为了在其上调用`statusCode`方法，我们首先使用圆括号将其强制转换为`NSHTTPURLResponse`对象。这让编译器知道了我们的假设，并且在\
  \ Xcode 中会启用代码补全功能。\n\n一般来说，大于或等于 200 且小于 300 的 HTTP 状态码被认为是“成功的”，而一些常见的错误在 400\
  \ 和 500 级范围内。某些 Web 服务要求成功时状态码返回 200，你可以在针对它们进行编程时利用这一点。`NSHTTPURLResponse`上另一个有用的方法是`allHeaderFields`，它返回随响应一起发送的头部信息。例如，如果头部信息指定了返回数据的缓存信息，这会非常有用。\n\
  \n如果你的连接出现问题，通常在从`sendSynchronousRequest:returningResponse:error:`返回时，`error`对象会被设置为一个`NSError`。`NSError`类定义了许多有用的方法，你可以用它们来获取关于该错误的更多信息。`localizedDescription`方法返回本地化文本，用于向用户显示。`code`方法返回一个错误码，该错误码特定于由`domain`方法返回的域。最后，`userInfo`方法返回的`NSDictionary`中可能包含更多信息。在尝试排查网络连接问题时，这些错误可能是无价之宝。\n\
  \n## 使用接收到的数据\n\n一旦你收到来自所连接的服务器的响应，你将得到一个`NSData`对象，其中包含响应正文。根据你所连接的服务，这可能是文本、图像、视频或专有的二进制格式。如果是文本，它可能是纯文本、逗号或制表符分隔的文本数据库、JSON\
  \ 或 XML 格式的数据，或者是一种专有的文本格式。\n\n无论是什么格式，你的应用都应该适当地处理它。我们将在本章后面介绍图像、JSON 和 XML。现在，我们不会解析这些数据，而是只使用`NSLog()`宏在控制台中显示它。首先，让我们创建一个实际的应用程序来放置我们刚刚讲到的这些代码。打开\
  \ Xcode，通过选择**File → New → Project...** 来创建一个新项目。在对话框左侧的**iOS**下选择**Application**，然后从模板列表中选择**Empty\
  \ Application**。对于**Product Name**，输入`SimpleWeather`。填写**Company Identifier**和**Class\
  \ Prefix**字段，从**Device Family**下拉框中选择**iPhone**，取消选中**Use Core Data**和**Include\
  \ Unit Tests**，并保持**Use Automatic Reference Counting**处于选中状态。完成后的设置应与图 6-1 相符。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 31](img/index-149_1.jpg)\n\
  \n**第 6 章：集成网络与 Web 服务**\n\n**图 6-1.** *创建 SimpleWeather 应用的 Xcode 设置* **注意：** 当你使用\
  \ Empty Application 模板时，运行应用时会在控制台中看到以下一行：\n\n```\nApplication windows are expected\
  \ to have a root view controller at the end of application launch\n```\n\n到我们完成这个应用时，我们的窗口将有一个根视图控制器，所以你不会再看到这条消息了。\n\
  \n点击**Next**，将你的项目保存到磁盘。打开你的应用委托实现文件（对于我的类前缀`LCT`来说是`LCTAppDelegate.m`）。将我们的网络代码以粗体形式添加到`application:didFinishLaunchingWithOptions:`方法中：\n\
  \n```objc\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.window.backgroundColor =\
  \ [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    NSURL *weatherURL\
  \ = [NSURL URLWithString:@\"http://weather.yahooapis.com/forecastrss?p=48226\"];\n\
  \    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:weatherURL];\n\n  \
  \  NSURLResponse *urlResponse = nil;\n    NSError *error = nil;\n    NSData *receivedData\
  \ = [NSURLConnection sendSynchronousRequest:urlRequest returningResponse:&urlResponse\
  \ error:&error];\n\n    NSString *receivedText = [[NSString alloc] initWithData:receivedData\
  \ encoding:NSUTF8StringEncoding];\n    NSLog(@\"%@\", receivedText);\n\n    return\
  \ YES;\n}\n```\n\n运行应用。你在 iPhone 模拟器窗口中看不到太多内容，但 Xcode 窗口应该会显示它接收到的数据。如果你没有看到调试区域，请选择**View\
  \ → Debug Area → Activate Console**，或按下**Shift+⌘+C**。调试区域出现在屏幕底部，其中包含从你的应用发送的日志消息。图\
  \ 6-2 显示了一个 Xcode 窗口，其中调试区域在底部打开到控制台，并显示来自 Yahoo 的一些响应数据！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 32](img/index-151_1.jpg)\n\n**第 6 章：集成网络与 Web 服务**\n\n显示。\n\n\n\n"
- "# 图 6-2. 调试区域中打开的 Xcode 控制台\n\n我的 Xcode 编辑器窗口使用深色背景；你的窗口（如果未修改过）将使用白色背景。\n\n如果网络连接成功，你现在应该在控制台中看到响应数据。这是包含密歇根州底特律天气预报的\
  \ XML 格式数据。下一步是获取这些 XML 数据，将其转换为可用的格式，并展示给用户。但在那之前，我们当前的做法存在一个问题：通过使用 `NSURLConnection`\
  \ 的 `sendSynchronousRequest:returningResponse:error:` 方法，我们阻止了应用在收到服务器响应前完成启动。这不仅给用户带来糟糕的体验，更重要的是，如果应用启动时间过长，它将被操作系统终止。让我们在处理数据之前先解决这个问题。\n\
  \n## 异步操作\n\n我们之前使用的方法是一个典型的同步方法，它返回三个对象：数据、响应和错误（如果遇到的话）。`NSURLConnection` 还支持使用委托来接收这些对象，这样你可以在收到响应之前继续执行其他操作。让我们修改代码使其异步运行。打开应用委托的实现文件（我的是\
  \ `LCTAppDelegate.m`），通过删除带有删除线的行并添加粗体显示的行来修改 `application:didFinishLaunchingWithOptions:`\
  \ 方法：\n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen]\nbounds]];\n    // 应用启动后的自定义覆盖点\n    self.window.backgroundColor =\
  \ [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    NSURL *weatherURL\
  \ =\n        [NSURL URLWithString:@\"http://weather.yahooapis.com/forecastrss?p=48226\"\
  ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:weatherURL];\n \
  \   NSURLResponse *urlResponse = nil;\n    NSError *error = nil;\n    NSData *receievedData\
  \ = [NSURLConnection sendSynchronousRequest:urlRequest\n                       \
  \                        returningResponse:&urlResponse\n                      \
  \                                     error:&error];\n    NSString *receivedText\
  \ = [[NSString alloc] initWithData:receievedData\n                             \
  \                      encoding:NSUTF8StringEncoding];\n    NSLog(@\"%@\", receivedText);\n\
  \n    NSURLConnection *connection = [[NSURLConnection alloc]\n                 \
  \                     initWithRequest:urlRequest\n                             \
  \                delegate:self];\n    [connection start];\n    return YES;\n}\n\
  ```\n\n## URL 连接委托方法\n\n你可能已经注意到我们从未打开应用委托的头文件来声明我们遵守某个协议。虽然在 Cocoa Touch 中有一个名为\
  \ `NSURLConnectionDelegate` 的委托协议，但 `NSURLConnection` 的 delegate 属性并未声明为遵守该协议。从历史上看，URL\
  \ 连接委托方法一直是一个非正式协议，并且重要的方法至今仍然如此。每次使用 `NSURLConnection` 时，你几乎都需要实现以下四个方法：\n\n- `connection:didReceiveResponse:`\n\
  - `connection:didReceiveData:`\n- `connection:didFailWithError:`\n- `connectionDidFinishLoading:`\n\
  \n与 `UITableView` 的委托和数据源方法类似，所有这些方法的第一个参数都是指向 URL 连接的指针。之前通过单个同步方法返回的对象——响应正文中的数据、响应本身以及可能存在的错误——现在分别在不同的方法中返回，并在连接完成时额外调用一个方法。这种分离带来的一个后果是，我们需要在连接完成加载之前找一个地方来存储这些值。使用粗体行修改应用委托的实现文件（`LCTAppDelegate.m`），为这些值添加私有实例变量：\n\
  \n```\n#import \"LCTAppDelegate.h\"\n\n@implementation LCTAppDelegate {\n    NSMutableData\
  \ *_receivedData;\n}\n```\n\n\n`NSURLResponse *_receivedResponse;`\n\n`NSError *_connectionError;`\n\
  \n}\n\n`@synthesize window = _window;`\n\n…\n\n您可能会注意到，我们使用的不再是`NSData`对象，而是`NSMutableData`对象。这是因为\
  \ URL 连接会多次调用`connection:didReceiveData:`方法，因此我们需要在其整个生命周期内持续跟踪接收到的所有数据。基于这一考虑，请在应用代理实现文件（`LCTAppDelegate.m`）中，用粗体显示的代码行进行修改：\n\
  \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen]\nbounds]];\n    // 重写点为应用启动后的自定义设置\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    NSURL *weatherURL\
  \ =\n    [NSURL URLWithString:@\"http://weather.yahooapis.com/forecastrss?p=48226\"\
  ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:weatherURL];\n \
  \   NSURLConnection *connection = [[NSURLConnection alloc]\ninitWithRequest:urlRequest\n\
  delegate:self];\n    _receivedData = [[NSMutableData alloc] init];\n    [connection\
  \ start];\n    return YES;\n}\n```\n\n```\n- (void)connection:(NSURLConnection *)connection\n\
  didReceiveResponse:(NSURLResponse *)response\n{\n    _receivedResponse = response;\n\
  }\n```\n\n```\n- (void)connection:(NSURLConnection *)connection didReceiveData:(NSData\n\
  *)data\n{\n    [_receivedData appendData:data];\n}\n```\n\n```\n- (void)connection:(NSURLConnection\
  \ *)connection didFailWithError:(NSError\n*)error\n{\n    _connectionError = error;\n\
  }\n```\n\n```\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n\
  {\n    NSLog(@\"Response: %@\", _receivedResponse);\n    NSString *receivedString\
  \ = [[NSString alloc] initWithData:_receivedData encoding:NSUTF8StringEncoding];\n\
  \    NSLog(@\"Body: %@\", receivedString);\n}\n```\n\n运行您的应用，您应该会看到与之前类似的控制台输出。不同之处在于，在连接完成前，应用的其余部分可以继续执行。如果连接加载需要\
  \ 30 秒，用户将会感激不需要为此等待。\n\n## 异步网络请求的注意事项\n\n在继续之前，您需要了解一些异步使用`NSURLConnection`的注意事项。首先，`NSURLConnection`操作没有内置的排队机制。如果您创建了\
  \ 50 个对象，每个对象都异步触发一个`NSURLConnection`，您会很快发现应用尝试同时打开 50 个连接时出现性能问题。虽然从硬件角度看，iOS\
  \ 设备完全有能力维持多个并发连接，但超过一定数量就可能成为问题。一个常用的经验法则是并发连接数不超过三个，尤其是在用户连接到蜂窝网络时。\n\n异步网络请求的第二个问题是，每个活动连接被赋予相同的优先级。如果您的应用中有一次极其关键的数据上传，它可能会与其他正在下载图片或内容的代码竞争资源，甚至可能与设备后台运行的邮件应用竞争。虽然这通常不算严重问题，但在设计应用时仍需注意。\n\
  \n最后，协调多个 URL 连接的代理消息比较困难。当然这也是可行的：每个代理方法的第一个参数都是指向 URL 连接的指针，因此您可以先引用该值再继续处理，但这很快就会变得繁琐，并且管理这些连接的状态也会颇具挑战。\n\
  \n幸运的是，我并非只带来坏消息。其他开发者早已遇到过这个问题，并为此创建了开源解决方案。其中大多数方案都使用了内置的排队机制。\n\n\n\n`NSOperationQueue`的机制，我们将在后续章节中讨论。它们各自有其用途和优势，因此我不会只推荐某一个库，而是列举三个我认为很有用的库：`ASIHTTPRequest`、`AFNetworking`和`MKNetworkKit`。当你在构建真实应用时，请在网上搜索这些解决方案，并考虑利用它们来辅助你的异步网络处理。\n\
  \n回到我们的天气解析示例应用，我们已经以合适的异步方式从服务器接收了数据，现在让我们着手将数据解析为有用的形式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 6 章：集成网络与 Web 服务\n\n## 解析来自 Web 服务的 JSON 与 XML\n\nJSON 和 XML 是解决同一类问题的两种不同方法：我们如何以有意义的方式封装数据，以便发送给另一台计算机？\n\
  \n例如，当你连接天气服务获取十天的预报时，它会返回一个包含这些天最高温和最低温的列表。为了让你的应用能够使用这些数据，Web 服务用于返回数据的格式必须在某处有文档说明，以便你能解析它。但这究竟意味着什么呢？简单来说，你需要在原生`Objective-C`对象和服务器返回的数据之间进行转换。\n\
  \n为了解释这一点，让我们来看一些 XML 格式的数据。这些来自 Yahoo! Web 服务的数据展示了一个两天的预报：\n\n```\n<yweather:forecast\
  \ day=\"Wed\" date=\"22 Feb 2012\" low=\"31\" high=\"39\"\ntext=\"Rain/Snow Showers\
  \ Early\" code=\"5\" />\n<yweather:forecast day=\"Thu\" date=\"23 Feb 2012\" low=\"\
  32\" high=\"40\" text=\"PM Snow Showers\" code=\"14\" />\n```\n\n如你所见，这里有两个`yweather:forecast`对象，它们拥有属性`day`、`date`、`low`、`high`、`text`和`code`。让我们看看同样的数据在\
  \ JSON 中是什么样子：\n\n```json\n{\n    \"forecast\": [\n        {\n            \"day\"\
  : \"Wed\",\n            \"date\": \"22 Feb 2012\",\n            \"low\": 31,\n \
  \           \"high\": 39,\n            \"text\": \"Rain/Snow Showers Early\",\n\
  \            \"code\": 5\n        },\n        {\n            \"day\": \"Thu\",\n\
  \            \"date\": \"23 Feb 2012\",\n            \"low\": 32,\n            \"\
  high\": 40,\n            \"text\": \"PM Snow Showers\",\n            \"code\": 14\n\
  \        }\n    ]\n}\n```\n\n当 JSON 从服务器接收到时，它是紧凑的，没有换行符，因此它看起来像这样：\n\n```json\n\
  {\"forecast\":[{\"day\":\"Wed\",\"date\":\"22 Feb 2012\",\"low\":31,\"high\":39,\"\
  text\":\"Rain/Snow Showers Early\",\"code\":5},{\"day\":\"Thu\",\"date\":\"23 Feb\
  \ 2012\",\"low\":32,\"high\":40,\"text\":\"PM Snow Showers\",\"code\":14}]}\n```\n\
  \n虽然这两种形式在功能上是相同的，但第一种形式更易于人类阅读。它有一个名为`forecast`的元素数组，每个元素都拥有与 XML 中相同的属性。在深入学习解析过程时，我们将进一步了解每种格式的语法。\n\
  \n### 解析 XML\n\n有两种不同类型的 XML 解析器：流式解析器和树状解析器。\n\n流式解析器（也称为顺序解析器）每次读取一个元素，并在读取时处理该元素的数据。树状解析器则一次性读取整个文档，将元素组织成对象的层次结构。在\
  \ iOS 设备上使用树状解析器可能存在风险，因为在应用的整个生命周期中将整个文档保留在内存中可能会触及内存限制。\n\n因此，内置的解析器`NSXMLParser`更接近于流式处理器，尽管它并不被认为是真正的流式解析器。虽然这种方式解析数据可能显得冗长，但在内存受限的环境中它更为安全。\n\
  \n让我们在天气示例中实现`NSXMLParser`。打开你的应用委托的头文件（使用我的类前缀则为`LCTAppDelegate.h`），并通过添加以下加粗的文本，声明它遵循`NSXMLParserDelegate`协议：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface LCTAppDelegate : UIResponder <NSXMLParserDelegate,\n\
  UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow *window;\n\n@end\n\
  ```\n\n要理解`NSXMLParser`的工作原理，请考虑一个 XML 元素的结构。一个名称为`element`、内容为`content`的元素，其结构如下：\n\
  \n```\n<element>content</element>\n```\n\n\n\n当 XML 解析器读取文件时，一旦遇到`<element>`标签，它会向代理（delegate）发送一条消息，以此标记元素的开始。解析器会继续读取文本，直到找到`</element>`标签，此时它会向代理发送另一条消息。解析器会保存两个标签之间的文本内容，并通过另一个代理方法将其发送出去。因此，在`NSXMLParserDelegate`中为每个元素定义了三个主要的代理方法，此外还有一个用于捕获错误的方法，以及两个用于标记文档开始和结束的方法：\n\
  \n- `parserDidStartDocument:`\n- `parserDidEndDocument:`\n- `parser:didStartElement:namespaceURI:qualifiedName:attributes:`\n\
  - `parser:didEndElement:namespaceURI:qualifiedName:`\n- `parser:foundCharacters:`\n\
  - `parser:parseErrorOccurred:`\n\n与优秀的代理协议一样，每个方法的第一个参数都是指向`NSXMLParser`对象的指针。第三和第四个方法还包含用于命名空间和限定名的额外参数，但对于简单的\
  \ XML 解析，我们不需要使用它们。如果你进行高级 XML 处理，还有其他方法可用于处理 XML 实体声明等主题。就目前而言，这些方法集合足以让我们解析来自\
  \ Yahoo! 的响应。打开你的应用代理实现文件（`LCTAppDelegate.m`），修改`connectionDidFinishLoading:`方法，添加粗体显示的行并删除被划掉的行：\n\
  \n```\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n   \
  \ NSLog(@\"Response: %@\", _receivedResponse);\n    NSString *receivedString = [[NSString\
  \ alloc] initWithData:_receivedData encoding:NSUTF8StringEncoding];\n    NSLog(@\"\
  Body: %@\", receivedString);\n    NSXMLParser *parser = [[NSXMLParser alloc] initWithData:_receivedData];\n\
  \    [parser setDelegate:self];\n    [parser parse];\n}\n```\n\n在这个方法中，我们只需创建一个`NSXMLParser`实例，为其提供从\
  \ URL 连接接收到的数据指针，将它的代理设置为`self`（这里指应用代理对象），然后告诉它开始解析。这将解析逻辑的控制权交给 XML 解析器，解析器随后会回调我们的代理方法。\n\
  \n我们要寻找的数据是`yweather:forecast`元素，它没有任何文本内容。相反，它使用属性。一个示例的 forecast 元素如下所示：\n\n```\n\
  <yweather:forecast day=\"Fri\" date=\"24 Feb 2012\" low=\"27\" high=\"35\" text=\"\
  Few Snow Showers\" code=\"14\" />\n```\n\n属性将作为最后一个参数传递给`parser:didStartElement:namespaceURI:qualifiedName:attributes:`，因此我们可以使用该方法来解析数据。首先，我们创建一个可变数组来传递数据。在文件顶部，将可变数组添加到类的私有实例变量声明中：\n\
  \n```\n@implementation LCTAppDelegate {\n    NSMutableData *_receivedData;\n   \
  \ NSURLResponse *_receivedResponse;\n    NSError *_connectionError;\n    NSMutableArray\
  \ *_forecasts;\n}\n```\n\n我们将接收到的属性存储在此数组中。接下来，在文件末尾的`@end`编译器指令之前，为`parser:didStartElement:namespaceURI:qualifiedName:attributes:`添加实现。由于所有数据都在属性中，我们只需将字典添加到数组中：\n\
  \n```\n- (void)parser:(NSXMLParser *)parser\n    didStartElement:(NSString *)elementName\n\
  \    namespaceURI:(NSString *)namespaceURI\n    qualifiedName:(NSString *)qName\n\
  \    attributes:(NSDictionary *)attributeDict\n{\n    if ([elementName isEqualToString:@\"\
  yweather:forecast\"]) {\n        [_forecasts addObject:attributeDict];\n    }\n\
  }\n```\n\n我们还需要实现`parserDidStartDocument:`来创建数组。在上一个方法之后，`@end`编译器指令之前添加此方法：\n\n\
  ```\n- (void)parserDidStartDocument:(NSXMLParser *)parser\n{\n    _forecasts = [NSMutableArray\
  \ array];\n}\n```\n\n现在，当 XML 解析器遇到`yweather:forecast`元素时，我们的代理方法会将属性字典保存到`_forecasts`数组中。\n\
  \n\n\n在 `parserDidStartDocument:` 之后实现 `parserDidEndDocument:`，并将数组输出到控制台：\n\n```\n\
  - (void)parserDidEndDocument:(NSXMLParser *)parser\n{\n    NSLog(@\"%@\", _forecasts);\n\
  }\n```\n\n构建并运行应用。你应在控制台中看到该数组的描述信息。\n\n输出结果应类似如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 6 章：集成网络与 Web 服务**\n\n```\n2012-02-24 23:45:50.078 SimpleWeather[1235:f803]\
  \ (\n    {\n        code = 14;\n        date = \"2012 年 2 月 24 日\";\n        day\
  \ = 周五;\n        high = 35;\n        low = 27;\n        text = \"零星阵雪\";\n    },\n\
  \    {\n        code = 14;\n        date = \"2012 年 2 月 25 日\";\n        day = 周六;\n\
  \        high = 33;\n        low = 21;\n        text = \"零星阵雪\";\n    }\n)\n```\n\
  \n如你所见，数组包含两个天气预报，每个都带有 `code`、`date`、`day`、`high`、`low` 和 `text` 这些键。\n\n**注意：**\
  \ 虽然控制台输出看起来与 JSON 类似（你将在本章后续内容中更详细地了解 JSON），但它并非 JSON。这只是一种用于日志记录的人类可读输出格式。\n\n\
  我们已成功将 XML 数据解析为 Foundation 对象。此应用的后续步骤可能包括围绕这些结果创建用户界面，例如在表视图或某种自定义视图中显示天气预报。虽然流式\
  \ XML 解析器可能复杂，但对于此类简单任务来说，它运行得相当好。然而，大多数新的 Web 服务都使用 JSON，或至少提供 JSON 作为选项。对于使用 Cocoa\
  \ Touch 的 iOS 开发，你通常会优先使用 JSON 而非 XML。基于此，让我们深入探讨如何解析 JSON 数据。\n\n### 解析 JSON\n\n\
  JSON 是 JavaScript 对象表示法（JavaScript Object Notation）的缩写。它源自 JavaScript 语言，并已成为网络传输对象的首选格式。你在\
  \ JSON 中会遇到两种主要结构：数组和字典。数组以 `[` 字符开头，内部元素用逗号分隔，以 `]` 字符结尾。在 JSON 中，数据对象只是字符串和数字，因此一个数字的\
  \ JSON 数组可以这样定义：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 6 章：集成网络与\
  \ Web 服务**\n\n```\n[1,2,3]\n```\n\n字典以 `{` 字符开头，以 `}` 字符结尾。键值对以键开头，后跟 `:` 字符，然后是值，各对之间用逗号分隔。一个简单的字典可以这样定义：\n\
  \n```\n{\"value1\":10,\"value2\":42}\n```\n\n这个字典有两个键：`value1` 和 `value2`，分别对应值\
  \ 10 和 42。如你所见，JSON 表示法尽可能简单，只用了很少的字符来定义一种简洁的语法。你可能已经在思考如何为 JSON 编写解析器——这可不是一件轻松的事。幸运的是，从\
  \ iOS 5 开始，Cocoa Touch 原生支持解析 JSON，所以你无需自己编写！\n\n只需使用 `NSJSONSerialization` 类即可将\
  \ JSON 解析为 `NSArray`、`NSDictionary`、`NSString` 和 `NSNumber` 对象。以下是在 URL 连接代理的 `connectionDidFinishLoading:`\
  \ 方法中解析从 Web 服务返回数据的示例：\n\n```\n- (void)connectionDidFinishLoading:(NSURLConnection\
  \ *)connection\n{\n    NSLog(@\"响应: %@\", _receivedResponse);\n\n    // _receivedData\
  \ 是从连接接收到的 NSData 对象\n    NSError *parseError = nil;\n    id responseObject = [NSJSONSerialization\
  \ JSONObjectWithData:_receivedData options:0\n                                 \
  \                        error:&parseError];\n\n    // 在此处处理 responseObject\n}\n\
  ```\n\n如你所见，我们使用一个包含从连接接收到的数据的 `NSData` 对象来创建 `responseObject` 对象。根据 JSON 中的内容，`responseObject`\
  \ 对象将是 `NSArray` 或 `NSDictionary` 中的一种。还可以将一些选项作为第二个参数传递给 `JSONObjectWithData:options:error:`，从而创建\
  \ `NSMutableArray` 和 `NSMutableDictionary` 对象（而非不可变版本）、创建 `NSMutableString` 对象（而非\
  \ `NSString` 对象），或允许顶层对象不是数组或字典。\n\n### 创建 JSON 表示\n\n\n\n"
- "# 集成网络与 Web 服务\n\n如果你需要创建自己的 JSON，它也内置了类似功能。以下代码片段创建了一个字符串数组，然后生成对应的 JSON 字符串：\n\
  \n```\nNSArray *fruits = [NSArray arrayWithObjects:@\"orange\", @\"apple\", @\"\
  cherry\",\n    @\"pear\", nil];\nNSError *encodingError = nil;\nNSData *jsonData\
  \ = [NSJSONSerialization dataWithJSONObject:fruits\n    options:0\n    error:&encodingError];\n\
  NSString *jsonString = [[NSString alloc] initWithData:jsonData\n    encoding:NSUTF8StringEncoding];\n\
  NSLog(@\"%@\", jsonString);\n```\n\n这段代码中 `NSLog()` 行的输出如下：\n\n```\n[\"orange\"\
  ,\"apple\",\"cherry\",\"pear\"]\n```\n\n如你所见，这是一个包含四个字符串的数组。这种方式非常适合将自定义数据上传到 Web\
  \ 服务。然而 JSON 并非完美；例如，它没有内置的二进制数据类型，因此如果你想将图片上传到 Web 服务，要么将其编码为字符串，要么寻找其他上传数据的方法。\n\
  \n## 将 Foundation 对象解析为模型对象\n\n通过 XML 和 JSON，我们已经学会了如何从 Web 服务获取数据，并将其解析为包含 `NSString`\
  \ 和 `NSNumber` 对象的 `NSArray` 和 `NSDictionary` 对象。然而在 Objective-C 中，通常更倾向于使用原生对象。例如，在\
  \ Yahoo! Weather 示例中，我们理想的做法是创建一个 `LCTForecast` 对象来操作。现在我们直接创建它，并赋予我们想要使用的属性。在 Xcode\
  \ 中，选择 **File → New → File...** 或按 **⌘+N**。在左侧栏中选择 **Cocoa Touch**，右侧选择 **Objective-C\
  \ Class**。点击 **Next**，将类命名为 `LCTForecast`，作为 `NSObject` 的子类。点击 **Next**，然后点击 **Create**\
  \ 按钮将文件保存到磁盘。打开新创建的头文件 `LCTForecast.h`，并添加以下加粗显示的属性：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface LCTForecast : NSObject\n\n@property (copy) NSString *date;\n@property\
  \ (strong) NSNumber *low;\n@property (strong) NSNumber *high;\n@property (copy)\
  \ NSString *text;\n\n@end\n```\n\n接下来，切换到实现文件（`LCTForecast.m`），并在 `@implementation`\
  \ 指令后添加属性的 `@synthesize` 指令：\n\n```\n@implementation LCTForecast\n\n@synthesize\
  \ date = _date;\n@synthesize low = _low;\n@synthesize high = _high;\n@synthesize\
  \ text = _text;\n\n@end\n```\n\n现在，我们只需要一种将数据传入对象的方法。为此，我们将创建一个名为 `initWithDictionary:`\
  \ 的方法，并将从 Web 服务器接收数据解析得到的字典传递给它。再次打开头文件（`LCTForecast.h`），添加一行声明该方法：\n\n```\n@interface\
  \ LCTForecast : NSObject\n\n@property (copy) NSString *date;\n@property (strong)\
  \ NSNumber *low;\n@property (strong) NSNumber *high;\n@property (copy) NSString\
  \ *text;\n\n- (id)initWithDictionary:(NSDictionary *)dictionary;\n\n@end\n```\n\n\
  现在，切换回实现文件（`LCTForecast.m`）并实现该方法。由于 XML 数据为每个属性返回字符串，我们需要将 `low` 和 `high` 转换为 `NSNumber`\
  \ 对象。我们将通过使用它们的 `intValue` 方法获取 `int` 类型，然后从 `int` 创建 `NSNumber` 对象来实现。按以下加粗显示创建该方法：\n\
  \n```\n@implementation LCTForecast\n\n@synthesize date = _date;\n@synthesize low\
  \ = _low;\n@synthesize high = _high;\n@synthesize text = _text;\n\n- (id)initWithDictionary:(NSDictionary\
  \ *)dictionary\n{\n    self = [super init];\n    if (self) {\n        _date = [[dictionary\
  \ objectForKey:@\"date\"] copy];\n        _text = [[dictionary objectForKey:@\"\
  text\"] copy];\n        _low = [[NSNumber alloc] initWithInt:[[dictionary\n    \
  \        objectForKey:@\"low\"] intValue]];\n        _high = [[NSNumber alloc] initWithInt:[[dictionary\n\
  \            objectForKey:@\"high\"] intValue]];\n    }\n    return self;\n}\n\n\
  @end\n```\n\n这个方法将从解析后的 `NSDictionary` 中提取我们要存储的值，使我们能够将 Web 服务的输出转换为原生对象。让我们回到应用程序委托并创建这些对象。打开你的应用程序委托的实现文件（`LCTAppDelegate.m`），在顶部导入\
  \ `LCTForecast` 头文件，添加如下加粗显示的行：\n\n```\n#import \"LCTAppDelegate.h\"\n#import \"\
  LCTForecast.h\"\n```\n\n接下来，修改 `parser:didStartElement:namespaceURI:qualifiedName:attributes:`\
  \ 方法，通过添加加粗显示的代码并移除被删除线标记的代码，来创建 `LCTForecast` 对象并将其放入 `_forecasts` 数组：\n\n```\n\
  - (void)parser:(NSXMLParser *)parser\n    didStartElement:(NSString *)elementName\n\
  \    namespaceURI:(NSString *)namespaceURI\n    qualifiedName:(NSString *)qName\n\
  \    attributes:(NSDictionary *)attributeDict\n{\n    if ([elementName isEqualToString:@\"\
  yweather:forecast\"]) {\n        LCTForecast *forecast = [[LCTForecast alloc]\n\
  \            initWithDictionary:attributeDict];\n        [_forecasts addObject:forecast];\n\
  \    }\n}\n```\n\n再次构建并运行应用程序，控制台输出应如下所示：\n\n```\n2012-02-25 00:55:09.876 SimpleWeather[2043:f803]\
  \ (\n    \"<LCTForecast: 0x688be90>\",\n    \"<LCTForecast: 0x688c0b0>\"\n)\n```\n\
  \n如你所见，该数组包含两个 `LCTForecast` 对象，它们都是由我们的解析器创建的。现在，应用程序已准备好使用原生 Objective-C 范式来管理这些对象，并围绕它们构建有用的用户界面。\n\
  \n**注意：** 为 `LCTForecast` 对象打印的调试文本有点简略。你可以通过在任何继承自 `NSObject` 的类中实现 `description`\
  \ 方法（该方法返回一个字符串）来控制控制台中打印的内容。以下是 `LCTForecast` 的 `description` 实现示例：\n\n```\n- (NSString\
  \ *)description\n{\n    return [NSString stringWithFormat:@\"%@, date: <%@>, text:\n\
  \        <%@>, low: <%@>, high: <%@>\",\n        [super description],\n        [self\
  \ date],\n        [self text],\n        [self low],\n        [self high]];\n}\n\
  ```\n\n## 下载文件\n\n到目前为止，我们已经介绍了如何处理来自服务器的文本数据，但其他类型的数据呢？你的应用程序可能需要从服务器下载图片、音乐、视频或文档。在这些情况下，最好将文件保存到设备的磁盘上。一个显而易见的解决方案是在连接加载完成时将从服务器接收的数据写入文件：\n\
  \n```\n// 下载 Apple 网站图标\nNSURL *faviconImageURL = [NSURL\n    URLWithString:@\"\
  http://www.apple.com/favicon.ico\"];\nNSURLRequest *urlRequest = [NSURLRequest requestWithURL:faviconImageURL];\n\
  NSURLResponse *urlResponse = nil;\nNSError *error = nil;\nNSData *imageData = [NSURLConnection\
  \ sendSynchronousRequest:urlRequest\n    returningResponse:&urlResponse\n    error:&error];\n\
  [imageData writeToFile:@\"favicon.ico\" atomically:YES];\n```\n\n这段代码下载 Apple 网站的小型浏览器图标，并将其保存到文件\
  \ `favicon.ico`。这对于小图片和文件来说效果很好——截至本文撰写时，该图标仅为 9 KB——但如果应用程序需要下载一个比设备内存容量还大的文件（比如应用程序要离线播放的视频）呢？这种方法就不行了，因为\
  \ `imageData` 变量会因过大而无法存储在内存中。在这些情况下，你需要实现 URL 连接委托方法，并仅使用传入的数据进行处理：\n\n```\n- (void)connection:(NSURLConnection\
  \ *)connection didReceiveData:(NSData *)data\n{\n    NSFileHandle *fileHandle =\
  \ [NSFileHandle\n        fileHandleForWritingAtPath:@\"favicon.ico\"];\n    [fileHandle\
  \ seekToEndOfFile];\n    [fileHandle writeData:data];\n}\n```\n\n\n\n这里，我们使用`NSFileHandle`来管理在文件末尾写入数据。这让我们只需在内存中保留必要的数据量。但对于大文件而言，存在连接中断、用户进入隧道后失去与信号塔连接等风险。因此，你可能希望以原子方式操作：将数据写入磁盘上的临时位置，待连接无误完成后再将文件移至最终位置。上述代码示例可改写为以下原子操作形式：\n\
  \n```\n- (void)connection:(NSURLConnection *)connection didReceiveData:(NSData *)data\n\
  \n{\n\nNSString *filePath = @\"favicon.ico\";\n\nNSURL *fileURL = [NSURL fileURLWithPath:filePath];\n\
  \nNSString *tmpFilePath = @\"favicon.ico.tmp\";\n\nNSURL *tmpFileURL = [NSURL fileURLWithPath:tmpFilePath];\n\
  \nNSError *copyError = nil;\n\nBOOL copySuccess = [[NSFileManager defaultManager]\
  \ copyItemAtURL:fileURL\n\ntoURL:tmpFileURL\n\nerror:&copyError];\n\nif (copySuccess\
  \ == YES) {\n\nNSFileHandle *fileHandle = [NSFileHandle\n\nfileHandleForWritingAtPath:tmpFilePath];\n\
  \n[fileHandle seekToEndOfFile];\n\n[fileHandle writeData:data];\n\nNSError *moveError\
  \ = nil;\n\nBOOL moveSuccess =\n\n[[NSFileManager defaultManager] replaceItemAtURL:fileURL\n\
  \nwithItemAtURL:tmpFileURL\n\nbackupItemName:@\"favicon.bak\"\n\noptions:0\n\nresultingItemURL:NULL\n\
  \nerror:&moveError];\n\nif (moveSuccess == NO) {\n\nNSLog(@\"Error moving item at\
  \ URL %@ to URL at %@: %@\",\n\ntmpFileURL,\n\nfileURL,\n\n[moveError localizedDescription]);\n\
  \n}\n\n}\n\nelse {\n\nNSLog(@\"Error copying item at URL %@ to URL at %@: %@\",\n\
  \nfileURL,\n\ntmpFileURL,\n\n[copyError localizedDescription]);\n\n}\n\n}\n```\n\
  \n### 何时缓存文件\n\n将内容保存到磁盘时，主要有两个存储位置：`Documents`目录和`Caches`目录。两者的关键区别在于：`Caches`目录的内容不会被备份，且在\
  \ iOS 5 及以上系统中，当设备存储空间不足时，操作系统可能会清空该目录。因此，任何不易重新创建的文件（例如用户生成的内容）都应保存在`Documents`文件夹中，以防永久丢失。而能够轻松重新下载的数据（例如图片以及你所维护的\
  \ Web 服务提供的内容）则可保存在`Caches`目录中。此外还存在一种中间情况：内容可轻松重新下载，但又不希望系统立即清除。这类内容可能包括用户保存以供离线查看的数据，或用户正在使用的大文件。针对这种情况，Apple\
  \ 在 iOS 5.0.1 中更新了一个标志，你可以对`Documents`目录中的文件设置该标志，以防止其被备份。\n\n这既避免了大量易重新下载的文件占用用户\
  \ iCloud 备份的宝贵空间，又防止了 iOS 在设备存储空间不足时删除这些文件。从 iOS 5.1 开始，Apple 提供了`NSURL`级别的 API\
  \ 来设置该值。假设`NSString`对象已设置为文件路径，你可以使用以下代码防止文件被备份：\n\n```\nNSURL *fileURL = [NSURL\
  \ fileURLWithPath:pathString];\n\nNSError *error = nil;\n\n[fileURL setResourceValue:[NSNumber\
  \ numberWithBool:YES]\n\nforKey:NSURLIsExcludedFromBackupKey\n\nerror:&error];\n\
  ```\n\n### 下载图片\n\n下载用于显示的图片时需要格外小心。展示图片库的应用会迅速膨胀，尤其是随着 Apple 设备摄像头的分辨率不断提高。因此，良好的做法是持续监控已下载图片集的大小，并在其过度膨胀前自行清理缓存图片。你可以使用`NSFileManager`类的`removeItemAtURL:error:`或`removeItemAtPath:error:`方法，在缓存过大之前删除本地保存的图片。\n\
  \n\n\n下载图片时还需要考虑另一个问题：通常，当你需要显示较大图片的缩略图时，你会以比原始下载尺寸更小的尺寸来显示图片。虽然`UIImageView`对象可以自动缩放图片以进行显示，但缩放后图片的质量不如你在显示前在设备上手动调整尺寸所获得的质量。此外，将原始图片放入`UIImageView`会保留整个原始图片在内存中。如果你的应用要显示\
  \ 100 张 800 万像素的图片作为 10x10 的缩略图，你实际上只用了图片像素中微不足道的 0.00125%来在屏幕上显示，却将 100%的像素都保留在内存中！这当然是一个极端的例子，但可以肯定的是，在显示图片之前将其调整到所需的尺寸，可以带来实实在在的性能提升。幸运的是，有许多开源库正是为此而生；快速用\
  \ Google 搜索“`resize UIImage`”就能找到合适的库。\n\n**通过网络发送数据**\n\n到目前为止，我们所见的所有网络编程代码都涉及从服务器加载数据到应用中。然而，向服务器发送数据也同样重要；任何包含用户生成内容的应用都依赖于此功能。发送数据类似于接收数据：创建一个`NSURLRequest`，设置它的一些属性，然后使用`NSURLConnection`来执行这个请求。事实上，URL\
  \ 连接仍然会返回一个`NSURLResponse`、一个`NSError`和一些`NSData`来表示服务器的响应，因此从这个角度来看，这个过程是相同的。关键的区别在于准备\
  \ URL 请求。你将使用`NSURLRequest`的可变子类`NSMutableURLRequest`，而不是`NSURLRequest`本身，它允许你设置\
  \ HTTP 方法、HTTP 正文以及你需要设置的任何 HTTP 头字段。以下代码示例使用`PUT` HTTP 方法将字符串`“Hello, World!”`发送到`www.example.com/service`的\
  \ URL：\n\n```\nNSString *message = @\"Hello, World!\";\n\nNSData *bodyData = [message\
  \ dataUsingEncoding:NSUTF8StringEncoding];\n\nNSString *contentLength = [NSString\
  \ stringWithFormat:@\"%d\", [bodyData length]];\n\nNSURL *serviceURL = [NSURL URLWithString:@\"\
  http://www.example.com/service\"];\n\nNSMutableURLRequest *request = [NSURLRequest\
  \ requestWithURL:serviceURL];\n\n[request setHTTPMethod:@\"PUT\"];\n\n[request setHTTPBody:bodyData];\n\
  \n[request setValue:contentLength forHTTPHeaderField:@\"Content-Length\"];\n\nNSURLResponse\
  \ *response = nil;\n\nNSError *error = nil;\n\nNSData *responseData = [NSURLConnection\
  \ sendSynchronousRequest:request\n\n                                           \
  \          returningResponse:&response\n\n                                     \
  \                            error:&error];\n```\n\n在下一个示例应用——一个功能完整的 Twitter 客户端中，我们将发送大量数据。\n\
  \n**创建一个 Twitter 客户端**\n\nTwitter 的爆炸性增长带来了大量针对 iOS 的 Twitter 客户端。在 App Store 中搜索“Twitter”，你会得到多得难以筛选的结果，官方的\
  \ Twitter 客户端也不例外。因此，创建一个 Twitter 客户端可以说是当今 Cocoa Touch 开发者的一种“成人礼”。这在一定程度上是合理的，因为用于发送\
  \ 140 字符消息的 API 其复杂度也只能到此为止。\n\n**注意：** 截至撰写本文时，Twitter API 的文档可在`http://dev.twitter.com`找到。\n\
  \n一个成功的 Twitter 客户端需要具备一些基本功能：\n\n- 显示用户的动态\n- 显示用户动态中的图片\n- 发布新推文\n- 搜索 Twitter\
  \ 上的帖子\n\n要做到这一点，我们自然必须先登录 Twitter。除了搜索之外，所有 API 都要求用户进行身份验证。在过去，这非常麻烦，因为 Twitter\
  \ 使用 OAuth 标准进行身份验证。\n\n\n\n```markdown\n使用`OAuth`进行身份验证的服务不会直接存储用户的密码；相反，它们会保存一个“授权令牌”（`authorization\
  \ token`），作为用户已登录的证明。授权令牌只是一个字符串，当您以该用户身份执行操作时，它会被传回服务器。虽然这乍听起来还不错，但细节中却隐藏着魔鬼。\n\
  \n要登录`OAuth`服务，应用程序首先会加载一个指向该服务登录页面的`Web View`。用户输入其登录名和密码后，`Web View`会重定向到一个成功页面。这个成功页面通常执行以下两种操作之一：打开您指定的`callback\
  \ URL`，并将授权令牌作为`URL`字符串的参数传递进去；或者显示一个包含`PIN`码的第二个页面，用户需要在您的应用程序中输入该`PIN`码。随后，该`PIN`码会被用来获取授权令牌。实现这些功能耗时、低效且难以学习。更糟糕的是，每个实现`OAuth`的服务在细节上都略有不同，因此只学一次远远不够；您不仅需要学习`OAuth`，还必须了解每个网站的特殊之处。\n\
  \n`OAuth`拼图中的另一部分是创建`API key`。对于您想要在应用中添加`OAuth`身份验证的每个`Web`服务，您都必须向该服务的开发者注册，并接收一个`API\
  \ key`，用于对您的请求进行身份验证。这些`API key`通常与服务的使用频率限制相关联，这样您的应用程序就不会发出过多的请求，从而避免拖慢所有用户使用的服务。\n\
  \n对于`Cocoa Touch`开发者来说幸运的是，苹果再次挺身而出。它在`iOS 5`中引入了`Accounts`框架，允许系统将用户账户的信息集中存储在设备上的一个位置，而不是让每个应用程序各自保存这些信息。截至`iOS\
  \ 5.0.1`，唯一利用`Accounts`框架的服务是`Twitter`，它在操作系统中也拥有自己的`Twitter`框架。借助`Twitter`框架，您的应用无需手动对用户进行身份验证，而是可以使用用户在系统中已输入的账户，无需执行`OAuth`的繁琐流程。用户不会看到登录界面，而只会看到一个简单的警报视图，点击即可授权您的应用访问其`Twitter`账户。如果用户有多个`Twitter`账户，您需要询问他们想使用哪一个，但这基本上就是在`iOS\
  \ 5`中获得`Twitter`授权的全部步骤了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
