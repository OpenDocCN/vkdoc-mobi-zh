  \ 340\n\n两个按钮上方的视图，设置自动调整掩码，使得所有四个支撑和两个弹簧都被选中；这将允许它随视图调整大小。\n\n我们的用户界面已设置好，现在为这些对象定义一些`outlet`，以及为按钮定义一些`action`。我们还需要表明这个视图控制器符合几个委托协议：一个用于操作表，一个用于导航控制器，一个用于图像选择器控制器。打开视图控制器的头文件（`LCTViewController.h`），并添加粗体显示的代码：\n\
