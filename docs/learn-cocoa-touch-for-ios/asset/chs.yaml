  \n**图 10-3.** *我们的推文地图，以图钉的形式在地图上显示推文*\n\n`MapKit` 能做的事情远不止我们在这里介绍的——完全可以用一整本书来讲述\
  \ `Core Location` 和 `MapKit`——但这已经是一个很好的开始了。作为给读者的练习，可以考虑进一步修改 `TwitterExample`，将地图集成到应用的其余流程中。\n\
  \n## 自带设备\n\n如果本章描述的所有传感器都无法满足您的需求，或者您需要比设备内置传感器更强大的功能，那么可以考虑创建自己的硬件设备并在应用中使用。苹果有一个名为\
  \ `MFi` 的计划，允许您许可硬件技术并通过基座连接器与 iOS 设备通信。我很想详细告诉您，但即便是获取相关文档，您也需要先申请加入该计划。如果您需要为\
  \ iOS 设备创建硬件配件，请了解一下这个计划，但预计苹果官方文档之外的资源会比较稀少。\n\n蓝牙 4.0 为硬件设备带来了一线希望。这种新的蓝牙标准允许设备与您的应用以更小的阻碍进行通信。实现蓝牙硬件超出了本书的范围，但如果您发现需要与您的应用通信的硬件，蓝牙\
  \ 4.0 可能是阻碍最小的途径。\n\n### 在应用中指定所需设备\n\n对于某些应用，缺少某个特定传感器会使应用变得毫无用处。例如，设备上的指南针应用需要磁力计，否则指南针就毫无用处。视频录制应用需要能够拍摄视频的摄像头，而面对面的视频聊天应用则需要前置摄像头。要指定您的应用所需的设备功能，您需要修改应用的\
  \ `Info.plist` 文件。默认情况下，该文件以您的目标命名，因此对于 `TwitterExample`，它是 `TwitterExample-Info.plist`。您需要为键\
  \ `Required device capabilities` 添加一个新行（如果它不存在的话）。\n\n为此，在编辑器的空白区域右键单击，然后选择“添加行”（Add\
  \ Row）。Xcode 在您的 Info plist 中使键名变得友好，但在文件中，这个键实际上叫做 `UIRequiredDeviceCapabilities`。该键的值可以是一个数组或一个字典；如果是数组，数组中的每个对象应该是一个描述所需设备功能的字符串。如果是字典，每个键应该是一个功能字符串，值则是一个\
  \ `BOOL`——`YES` 表示应用需要该功能，`NO` 表示设备必须不具备该功能。要更改值的类型，您首先需要告诉 Xcode 将 `Info.plist`\
  \ 文件视为一个普通的属性列表：右键单击编辑器，选择“属性列表类型”（Property List Type），然后选择“无”（None）。完成后，右键单击 `UIRequiredDeviceCapabilities`\
  \ 键，选择“值类型”（Value Type），然后选择“数组”（Array）或“字典”（Dictionary）。\n\n以下是涵盖本章讨论的硬件的部分功能字符串列表：\n\
  \n- `still-camera`：存在摄像头\n- `front-facing-camera`：存在前置摄像头\n- `camera-flash`：存在摄像头闪光灯（不一定是设备上的所有摄像头都有）\n\
  - `video-camera`：存在可以录制视频的摄像头\n- `accelerometer`：存在加速计\n- `gyroscope`：存在陀螺仪\n- `location-services`：位置服务可用\n\
  - `gps`：存在 GPS 传感器\n- `magnetometer`：存在磁力计\n- `bluetooth-le`：存在低功耗蓝牙芯片，用于蓝牙 4.0\
  \ 设备\n\n例如，如果您的应用需要摄像头才能工作，那么没有摄像头的设备用户将不会在 App Store 中看到您的应用列表。您可以在 iOS 文档中的苹果文档\
  \ *Information Property List Key Reference* 中找到可用键的完整列表。\n\n## 总结\n\n本章主要介绍了如何利用\
  \ iOS 设备的各种硬件组件。随着苹果产品线的不断增长，更新、更好的硬件组件被引入其设备中。尽管如此，当前的产品线已经相当强大了。阅读本章后，您应该能够从用户那里获取照片和视频，使用\
  \ Core Motion 确定设备的方向和加速度，使用 Core Location 确定用户的位置，并通过 MapKit 向他们显示所在的位置。这些硬件传感器使您能够在应用中构建一些非常酷的功能，如果您找不到所需的功能，您总是可以自己动手制作！\n\
  \n"
- "# 第 11 章：应用中的媒体：播放音频和视频\n\n\n\n目前为止，本书已涵盖大量控制应用外观及用户交互方式的内容。从自定义用户界面设计到自定义用户交互，您所学的知识实际上一直局限于改变应用的外观。在本章中，我们将向应用引入媒体功能。通过应用播放音频和视频，您可以在另一个维度吸引用户，对他们的操作提供即时反馈，并丰富应用所能提供的内容。对于游戏而言，能够播放音效、环境噪音和音乐至关重要。由于每台\
  \ iOS 设备都能播放音乐，用户在启动任何应用时都可能正在播放音乐，因此播放媒体的应用需要考虑到这一点。\n\n## 播放音频\n\n就本节而言，我们将音频分为三类：独立播放的声音（例如提醒或通知音）、与音乐或其他声音一起播放的音效（例如游戏音效）以及音乐。您编写的代码将取决于您希望通过声音实现的目标。首先，我们来讨论独立播放作为提醒或通知的声音。对于这些情况，您将使用系统声音服务（System\
  \ Sound Services）。\n\n### 系统声音服务\n\n系统声音服务是 iOS 上最基础的声音 API，它的简洁性带来了一些限制：一旦声音开始播放便无法停止，一次只能播放一个声音，无法控制音量（声音以系统当前音量级别播放），且声音长度限制为\
  \ 30 秒。因此，对于游戏来说，系统声音显然不合适；但对于需要播放简短通知或提醒声音的应用来说，它非常适用。系统声音服务是一个 C 语言 API，因此您将使用一些比以往更底层的技术。它位于\
  \ `AudioToolbox` 框架中，因此您需要将此框架添加到目标构建阶段的“Link Binary With Libraries”中，并使用 `#import\
  \ <AudioToolbox/AudioToolbox.h>` 导入 `AudioToolbox` 头文件。\n\n#### 播放系统声音\n\n要播放系统声音，首先需要创建一个声音\
  \ ID。该声音 ID 存储在 `SystemSoundID` 类型中。这并非 Objective-C 对象，而是一个由系统与您的声音关联的标识符。要创建 ID，请使用\
  \ `AudioServicesCreateSystemSoundID()` 函数，它接受两个参数：一个指向声音文件 URL 的 CoreFoundation\
  \ URL 引用（`CFURLRef`），以及一个指向将填入正确 ID 的 `SystemSoundID` 变量的指针。由于 CoreFoundation 类\
  \ `CFURL` 与 `NSURL` 是“免费桥接”（toll-free-bridged）的，因此您可以将 `NSURL` 转换为 `CFURLRef`，反之亦然。这样您就可以在\
  \ Cocoa Touch 中管理该 URL 的内存，让 ARC 自动处理。转换时，请使用 `__bridge` 关键字，如下所示。\n\n在主 bundle\
  \ 中为文件 `mySound.wav` 创建系统声音的代码如下所示：\n\n```\nNSURL *soundURL = [[NSBundle mainBundle]\
  \ URLForResource:@\"mySound\"\n                                              withExtension:@\"\
  wav\"];\n\nSystemSoundID soundID;\n\nOSStatus status = AudioServicesCreateSystemSoundID((__bridge\
  \ CFURLRef)soundURL,\n                                                    &soundID);\n\
  ```\n\n当 `AudioServicesCreateSystemSoundID` 函数返回时，`soundID` 变量将保存已初始化的声音 ID，而 `status`\
  \ 变量将包含代表操作结果代码的函数返回值。如果成功，此代码将等于 `kAudioServicesNoError`；错误代码列在系统声音服务参考文档中。\n\n\
  创建声音后，您可以使用两个不同的函数来播放它。`AudioServicesPlaySystemSound()` 会在调用时立即播放声音，其唯一参数是声音 ID。在创建声音\
  \ ID 之后\n\n\n\n使用之前的代码，你可以这样播放音效：\n\n```\nif (status == kAudioServicesNoError) {\n\
  \    AudioServicesPlaySystemSound(soundID);\n}\n```\n\n注意，我们首先检查了`status`的值，以确保`soundID`被成功创建。`AudioServicesPlaySystemSound()`函数是异步运行的，因此无论音频时长多久，它都会立即返回。若要在音频播放完成时执行代码，你可以使用`AudioServicesAddSystemSoundCompletion`函数为\
  \ C 函数添加回调。用于回调的函数必须匹配`AudioServices`头文件中的`AudioServicesSystemSoundCompletionProc`原型，如下所示：\n\
  \n```c\ntypedef void (*AudioServicesSystemSoundCompletionProc)(SystemSoundID ssID,\
  \ void *clientData);\n```\n\n这里使用的函数指针语法与 block 声明语法类似，但使用指针（`*`）代替脱字符（`^`）。如果你想创建一个名为`MySystemSoundCallback()`的函数，需要在头文件中按如下方式声明：`void\
  \ MySystemSoundCallback(SystemSoundID ssID, void *clientData);`\n\n然后，你实现该函数：\n\n\
  ```c\nvoid MySystemSoundCallback(SystemSoundID ssID, void *clientData) {\n    //\
  \ 运行回调代码\n}\n```\n\n**注意：** 你可以在 Objective-C 代码中毫无问题地使用 C 函数。只需将函数声明放在头文件的`@interface`块之外，将函数实现放在实现文件的`@implementation`块之外。在`@end`指令之后通常是放置\
  \ C 函数的好位置，无论是在头文件还是实现文件中。\n\n如果你想将 C 函数保持为类私有，可以将其声明和实现都放在类的实现文件中，只要声明位于`@implementation`块之前即可。\n\
  \n创建完用作系统声音回调的 C 函数后，使用`AudioServicesAddSystemSoundCompletion()`函数添加回调。它接受五个参数：声音\
  \ ID（一个指向 CoreFoundation 运行循环的`CFRunLoopRef`引用）；`CFStringRef`（一个 Core Foundation\
  \ 字符串，表示运行循环模式）；指向你函数的函数指针，类型为`AudioServicesSystemSoundCompletionProc`；以及一个`void\
  \ *`指针，用于传递你希望传递给函数的任何额外数据（即之前回调函数实现中的`clientData`参数）。对于运行循环参数和客户端数据参数，你可以传递`NULL`，这将在默认模式下于默认运行循环上调用你的函数，且不传递额外数据。要使用我们的`MySystemSoundCallback`函数作为声音回调，代码如下：\n\
  \n```c\nAudioServicesAddSystemSoundCompletion(soundID,\n                       \
  \                NULL,\n                                       NULL,\n         \
  \                              &MySystemSoundCallback,\n                       \
  \                NULL);\n```\n\n`AudioServicesAddSystemSoundCompletion()`函数返回一个`OSStatus`值作为结果码，因此如果你需要确定回调是否成功添加，可以使用返回值来判断。你应该在调用`AudioServicesPlaySystemSound()`之前调用`AudioServicesAddSystemSoundCompletion()`，以确保在音频播放完毕前回调函数已成功添加。\n\
  \n最后，当系统声音使用完毕后，应销毁它以回收占用的资源。这通过`AudioServicesDisposeSystemSoundID()`函数完成，该函数接受系统声音\
  \ ID 作为唯一参数并回收其资源。系统声音不像 CoreFoundation 或 Objective-C 对象那样进行引用计数，因此 ARC 无法帮助管理其内存；你必须自行调用此方法。如果你在调用`AudioServicesPlaySystemSound()`后立即调用`AudioServicesDisposeSystemSoundID()`，音频将永远不会播放。如果你需要创建系统声音、播放它，然后不再使用，可以在回调函数中销毁它。\n\
  \n\n\n我们现在已经有足够的代码来播放系统声音，这足以满足按钮点击音效之类的需求。以下是完整的代码：\n\n```\nNSURL *soundURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"mySound\"\n                                    \
  \      withExtension:@\"wav\"];\nSystemSoundID soundID;\nOSStatus status = AudioServicesCreateSystemSoundID((__bridge\
  \ CFURLRef)soundURL,\n                                                   &soundID);\n\
  if (status == kAudioServicesNoError) {\n    AudioServicesAddSystemSoundCompletion(soundID,\n\
  \                                          NULL,\n                             \
  \             NULL,\n                                          &MySystemSoundCallback,\n\
  \                                          NULL);\n    AudioServicesPlaySystemSound(soundID);\n\
  }\n```\n\n相应的回调函数应在头文件中或`@implementation`块之前声明，用于销毁声音 ID 以回收内存：\n\n```\nvoid MySystemSoundCallback(SystemSoundID\
  \ ssID, void *clientData)\n{\n    NSLog(@\"System sound finished!\");\n    AudioServicesDisposeSystemSoundID(ssID);\n\
  }\n```\n\n这种播放声音的方法简单且能满足许多需求。不过，我之前提到有两种播放系统声音的方式。我们刚刚看到了第一种。另一种是将系统声音作为警报音播放。\n\
  \n### 播放警报音\n\n使用`AudioServicesPlayAlertSound()`函数可以将系统声音作为警报音播放。其过程与播放系统声音类似，但在不同设备上存在一些差异。在`iPhone`上，如果用户配置了在接听电话时同时播放声音和振动，那么警报音也会使手机振动，除非应用配置为录制音频——此时手机不会振动，以避免干扰音频。在最初的`iPod\
  \ touch`上（未插入耳机时没有扬声器播放声音），播放警报音会播放一个通用的警报音。与系统声音一样，警报音的长度不能超过 30 秒，否则应用会崩溃并报错。\n\
  \n将我们的声音作为警报音播放非常简单：\n\n```\nNSURL *soundURL = [[NSBundle mainBundle] URLForResource:@\"\
  mySound\"\n                                          withExtension:@\"wav\"];\n\
  SystemSoundID soundID;\nOSStatus status = AudioServicesCreateSystemSoundID((__bridge\
  \ CFURLRef)soundURL,\n                                                   &soundID);\n\
  if (status == kAudioServicesNoError) {\n    AudioServicesPlayAlertSound(soundID);\n\
  }\n```\n\n你可以像处理系统声音一样添加回调。你也仍然需要在播放完毕后调用`AudioServicesDisposeSystemSoundID()`来销毁声音，通常放在`dealloc`方法中。你应该使用警报音来提示应用需要用户注意的情况，例如发生错误时。\n\
  \n在带有振动马达的设备上，警报音也可以用来触发振动，我们将在下一节讨论。\n\n### 触发振动\n\n如果你希望触发振动，可以使用`AudioServicesPlayAlertSound()`函数并传入一个表示振动的常量声音\
  \ ID：\n\n```\nAudioServicesPlayAlertSound(kSystemSoundID_Vibrate);\n```\n\n在带有振动马达的设备（如`iPhone`）上，这将触发短暂的振动。在其他设备上，此调用不会做任何事。\n\
  \n如你所见，系统声音服务（System Sound Services）非常适合短声音，例如按钮点击和警报音。对于超过 30 秒的声音、音乐或同时播放多个声音，我们需要使用更高级的音频\
  \ API。\n\n### `AVAudioPlayer`\n\n如果你需要同时播放多个声音、控制单个声音的播放音量、循环播放，但不需要精确同步两个或多个声音、不需要立体声播放，且不是从网络流播放音频，那么`AVAudioPlayer`类是苹果推荐的选择。与系统声音服务不同，`AVAudioPlayer`是用`Objective-C`编写的，因此你无需为声音做额外的内存管理，只需像对待任何其他对象一样即可。\n\
  \n你需要为每个要播放的声音创建一个`AVAudioPlayer`对象；它们可以同时播放各自的声音。你可以像系统声音服务一样，通过文件`URL`创建音频播放器，或者如果你在数据缓冲区中有音频字节，也可以使用`NSData`对象创建。\n\
  \n要通过音频播放器播放声音，只需调用其`play`方法。没有比这更简单的了！`.caf`扩展名是 iOS 原生的未压缩声音格式，也是苹果推荐用于短音效的格式。你可以使用`afconvert`命令行工具将`.wav`文件转换为`.caf`；在命令行中输入`man\
  \ afconvert`查看其文档。这一步是可选的，建议执行以节省空间；`.wav`文件直接使用也能正常工作。\n\n假设你的声音文件名为`mySound.caf`，以下是创建`AVAudioPlayer`并播放声音的方法：\n\
  \n```\nNSURL *soundURL = [[NSBundle mainBundle] URLForResource:@\"mySound\"\n  \
  \                                        withExtension:@\"caf\"];\nNSError *error\
  \ = nil;\nAVAudioPlayer *audioPlayer = [[AVAudioPlayer alloc]\n                \
  \              initWithContentsOfURL:soundURL\n                              error:&error];\n\
  if (audioPlayer != nil) {\n    [audioPlayer play];\n}\nelse {\n    NSLog(@\"Error\
  \ creating audio player: %@\", error);\n}\n```\n\n**注意：** 由于`AVAudioPlayer`是`AVFoundation`框架的一部分，请确保将该框架添加到目标的“Link\
  \ Binary With Libraries”构建阶段。\n\n这段代码与系统声音服务的代码非常相似。然而，`AVAudioPlayer`的优势在于你可以在每个播放器上设置许多属性，包括但不限于：\n\
  \n- `volume`属性，一个`float`值，让你以线性方式调整播放音量，范围为`0.0`到`1.0`。\n- 要循环播放声音，可以使用`numberOfLoops`属性，它是一个`NSInteger`值。将`numberOfLoops`设置为`0`会播放一次。设置为`1`会播放两次（第一次播放加一次循环）。设置为任何`n`值会播放`n\
  \ + 1`次。将`numberOfLoops`设置为任何负数会无限循环播放，直到你调用音频播放器的`stop`方法。\n- 从左到右调整立体声位置，设置`pan`属性，一个`float`值，范围从`-1.0`到`1.0`，其中`-1.0`表示\
  \ 100%左声道，`1.0`表示 100%右声道。\n- 要调整播放速率，首先将`enableRate`属性（一个`BOOL`值）设置为`YES`，然后设置`rate`属性，一个`float`值。`rate`属性的范围可以从`0.5`（半速）到`2.0`（双倍速）。\n\
  - 要调整播放时间（例如跳到声音中的特定点或实现快进/快退功能），设置`currentTime`属性，它是一个`NSTimeInterval`值，本质上是一个表示秒数的`double`。\n\
  \n在使用`AVAudioPlayer`时还有一些其他注意事项。当音频播放器播放时，音频会被加载到内存中，并且音频硬件会被占用。为了避免调用`play`方法和音频开始播放之间的延迟，你可以调用`prepareToPlay`，它会预加载音频缓冲区并占用音频硬件。如果你打算将`enableRate`设置为`YES`，请在调用`prepareToPlay`之前进行。要停止播放，你可以调用音频播放器的`pause`方法，这会保持缓冲区填充状态并占用音频硬件；或者调用`stop`方法，这会清空缓冲区并释放音频硬件。但是，调用`stop`不会重置播放时间，所以如果你先调用`stop`再调用`play`，音频会从上次停止的位置继续播放。要停止音频并重置播放时间，请在调用`stop`后将`currentTime`设置为`0.0`。\n\
  \n在使用系统声音服务时我们使用回调函数，而`AVAudioPlayer`类有一个`delegate`属性，它遵循\n\n\n\n`AVAudioPlayerDelegate`\
  \ 协议。与系统声音服务回调等效的是 `audioPlayerDidFinishPlaying:successfully:` 委托方法，该方法将音频播放器对象指针作为第一个参数，将一个指示播放是否成功的\
  \ `BOOL` 值作为第二个参数。你还可以使用 `audioPlayerDecodeErrorDidOccur:error:` 委托方法来响应播放期间发生的解码错误。\n\
  \n当用户接听电话或应用被其他事件中断时，你的音频播放器将停止播放，直至中断解除（例如，如果用户拒接来电）。中断开始时，会调用 `audioPlayerBeginInterruption:`\
  \ 委托方法，使你能够做出反应，例如调整应用的用户界面以反映音频播放器已停止播放。一旦中断结束，将调用 `audioPlayerEndInterruption:`\
  \ 委托方法，允许你恢复播放。要获取更多关于中断的信息，你可以改为实现 `audioPlayerEndInterruption:withFlags:` 委托方法，音频播放器会将包含更多信息的标志作为第二个参数传递。如果你同时实现了这两种方法，则只会调用带有标志的版本。自\
  \ iOS 5.1 起，唯一标志是 `AVAudioSessionInterruptionFlags_ShouldResume`，如果应该恢复播放，该值被设为\
  \ `1`。实现这个委托方法很简单：\n\n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer *)player\n\
  withFlags:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionFlags_ShouldResume)\
  \ {\n        [player play];\n    }\n}\n```\n\n这几乎涵盖了关于 `AVAudioPlayer` 你需要了解的所有内容。它还有更多特性，例如如果你想在应用的用户界面中实现音频电平显示，但这是播放声音的基本接口。你可以用它同时以不同音量播放多个音效，例如在游戏中。\n\
  \n### 其他声音 API\n\niOS 上还有其他可用的声音 API。如果你需要精确控制两个或多个声音之间的同步，或从网络缓冲区加载声音，则需要使用音频队列服务。此\
  \ API 提供一个回调方法，你可以在其中用要播放的声音填充音频缓冲区。例如，如果你正在制作一个同时播放多个音乐循环的音乐应用，则可以使用音频队列服务来管理这些循环并确保它们保持同步。\n\
  \n如果你需要将音效定位在 3D 空间中（这在游戏中最常见），那么你可以使用 iOS 也提供的开源 OpenAL 框架。虽然 OpenAL 是声音可以追溯到屏幕上特定位置的游戏的最佳选择，但它对于通用声音播放来说也并非一个糟糕的选择。对于诸如实时应用效果等复杂的音频工作，你可以使用\
  \ Core Audio 框架，但与其他音频框架相比，为 Core Audio 编程的相对难度相当高。OpenAL 和 Core Audio 都是相当底层的框架，因此如果你确定系统声音服务和\
  \ `AVAudioPlayer` 都无法满足你的需求，则应研究这些选项。要获得 OpenAL 的帮助，可以访问网站 OpenAL.org；对于 Core Audio，一个好的资源是\
  \ Core Audio 邮件列表，网址为 [`lists.apple.com/mailman/listinfo/coreaudio-api.`](https://lists.apple.com/mailman/listinfo/coreaudio-api)\n\
  \n### 示例：SoundBoard\n\n让我们制作一个示例应用来测试播放声音。打开 Xcode，选择 **文件** → **新建** → **项目…**，或按\
  \ **+Shift+N**。在 iOS 部分的最左侧列中选择 **应用**，然后在右侧选择 **单视图应用**。点击 **下一步**，然后输入 `SoundBoard`\
  \ 作为项目名称。输入你的公司标识符和类前缀（我将使用 `com.learncocoatouch` 和 `LCT`）。为设备系列选择 `iPhone`，并确保\
  \ **使用自动引用计数** 已选中，且 **使用故事板** 和 **包含单元测试** 均未选中。点击 **下一步**，然后点击 **创建** 将项目保存到磁盘。\n\
  \n在我们可以播放声音之前，我们需要一个可供播放的声音文件。你可以从本书的 [网站 www.learncocoatouch.com](http://www.learncocoatouch.com)\
  \ 下载一个与 iOS 兼容的名为 `Trumpet.m4a` 的示例音频文件。下载文件后，在 Finder 中找到它，然后将其拖入 Xcode 的文件浏览器中。为了便于组织，让我们将其放在\
  \ **Supporting Files** 部分。勾选 **“如果需要，将项目复制到目标组的文件夹中”**，然后在 **“添加到目标”** 旁边，勾选 `SoundBoard`\
  \ 以将此声音包含在该应用的 bundle 中。点击 **完成**，该声音将被添加到项目中。\n\n此项目的目标将是一个包含按钮的视图，我们可以使用这些按钮以三种不同的方式播放此声音：作为系统声音、作为提示音以及使用\
  \ `AVAudioPlayer` 对象。首先，让我们创建这些按钮。在 Xcode 中打开主视图控制器的用户界面文件（`LCTViewController.xib`）。通过选择\
  \ **视图** → **工具** → **显示对象库** 或按 **Control+Option++3** 打开对象库。打开后，将三个 **圆角矩形按钮**\
  \ 拖到你的项目视图上，将它们垂直排列成一列。双击每个按钮以设置其标题；我们将它们分别命名为 `Play System Sound`、`Play Alert Sound`\
  \ 和 `Play using AVAudioPlayer`。按钮将自动调整大小以适应其文本。完成后，视图将如图 11-1 所示。\n\n**图 11-1.**\
  \ *添加三个按钮后的视图*\n\n接下来，让我们为这些按钮添加一些插座变量和操作方法。打开视图控制器的头文件（`LCTViewController.h`），并添加粗体显示的行：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface LCTViewController : UIViewController\n\
  \n@property (strong, nonatomic) IBOutlet UIButton *systemSoundButton;\n@property\
  \ (strong, nonatomic) IBOutlet UIButton *alertSoundButton;\n@property (strong, nonatomic)\
  \ IBOutlet UIButton *audioPlayerButton;\n\n- (IBAction)systemSoundButtonPressed:(id)sender;\n\
  - (IBAction)alertSoundButtonPressed:(id)sender;\n- (IBAction)audioPlayerButtonPressed:(id)sender;\n\
  \n@end\n```\n\n如你所见，我们已经为每个按钮创建了一个 `IBOutlet` 和 `IBAction`。让我们将这些连接到视图中的对象。再次打开界面文件（`LCTViewController.xib`）。按住\
  \ Control 键，点击编辑窗格左侧的 **File’s Owner** 对象，拖动到标记为 `Play System Sound` 的按钮，然后从弹出菜单中选择\
  \ `systemSoundButton`。对标记为 `Play Alert Sound` 的按钮执行相同操作，选择 `alertSoundButton`；然后对标记为\
  \ `Play using AVAudioPlayer` 的按钮执行相同操作，选择 `audioPlayerButton`。\n\n既然我们已经连接了插座变量，让我们连接操作方法。按住\
  \ Control 键，点击标记为 `Play System Sound` 的按钮并拖动到 **File’s Owner** 对象，从列表中选择 `systemSoundButtonPressed:`\
  \ 方法。对标记为 `Play Alert Sound` 的按钮执行相同操作，选择 `alertSoundButtonPressed:`，对标记为 `Play\
  \ using AVAudioPlayer` 的按钮执行相同操作，选择 `audioPlayerButtonPressed:`。\n\n在实现我们的视图控制器之前，请添加\
  \ `AVFoundation` 和\n\n\n\n将`AudioToolbox`和`AVFoundation`框架添加到你的项目中，并链接到目标。为此，在 Xcode\
  \ 的文件浏览器顶部选择项目，点击`SoundBoard`目标，然后在编辑窗格中选择`Build Phases`。通过点击`Link Binary With Libraries`阶段旁边的三角形展开它，然后按下添加按钮（`+`）并选择`AVFoundation.framework`。再次点击添加按钮并选择`AudioToolbox.framework`。\n\
  \n现在我们已经将`AVFoundation`和`AudioToolbox`框架添加到项目中，可以开始实现这个类了。打开实现文件（`LCTViewController.m`）。首先，导入`AVFoundation`框架的头文件，为声音\
  \ ID 和音频播放器添加私有实例变量，并为我们的属性添加`@synthesize`指令。我们将实现`dealloc`方法以正确销毁声音 ID。然后在`viewDidLoad`方法中初始化声音，最后在三个`IBAction`方法中实现声音的播放。为此，通过添加粗体中的行来修改文件：\n\
  \n```\n#import \"LCTViewController.h\"\n#import <AVFoundation/AVFoundation.h>\n\
  #import <AudioToolbox/AudioToolbox.h>\n\n@interface LCTViewController () {\n   \
  \ AVAudioPlayer *_audioPlayer;\n    SystemSoundID _soundID;\n}\n@end\n\n@implementation\
  \ LCTViewController\n\n@synthesize systemSoundButton;\n@synthesize alertSoundButton;\n\
  @synthesize audioPlayerButton;\n\n- (void)dealloc\n{\n    AudioServicesDisposeSystemSoundID(_soundID);\n\
  }\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    NSURL *soundURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"Trumpet\"\n                                    \
  \         withExtension:@\"m4a\"];\n    // Create a sound ID used to play the system\
  \ sound.\n    OSStatus status = AudioServicesCreateSystemSoundID((__bridge CFURLRef)soundURL,\n\
  \                                                       &_soundID);\n    if (status\
  \ != kAudioServicesNoError) {\n        // An error occurred, so let's disable the\
  \ buttons.\n        [[self systemSoundButton] setEnabled:NO];\n        [[self alertSoundButton]\
  \ setEnabled:NO];\n    }\n    // Initialize the AVAudioPlayer\n    NSError *error\
  \ = nil;\n    _audioPlayer = [[AVAudioPlayer alloc] initWithContentsOfURL:soundURL\n\
  \                                                         error:&error];\n    if\
  \ (_audioPlayer == nil) {\n        // An error occured, so let's disable the button\
  \ and log the error.\n        NSLog(@\"%@\", error);\n        [[self audioPlayerButton]\
  \ setEnabled:NO];\n    }\n    else {\n        [_audioPlayer prepareToPlay];\n  \
  \  }\n}\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n    // Release\
  \ any retained subviews of the main view.\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    return (interfaceOrientation != UIInterfaceOrientationPortraitUpsideDown);\n\
  }\n\n- (IBAction)systemSoundButtonPressed:(id)sender\n{\n    AudioServicesPlaySystemSound(_soundID);\n\
  }\n\n- (IBAction)alertSoundButtonPressed:(id)sender\n{\n    AudioServicesPlayAlertSound(_soundID);\n\
  }\n\n- (IBAction)audioPlayerButtonPressed:(id)sender\n{\n    [_audioPlayer play];\n\
  }\n\n@end\n```\n\n如你在`viewDidLoad`方法中所见，我们使用同一个`NSURL`对象（代表声音文件的路径）来创建声音 ID 和音频播放器。如果创建时遇到任何错误，我们将禁用相关按钮。最后，在`IBAction`方法中，我们使用适当的方法或函数播放声音。现在我们已经完成了，构建并运行应用。你应该可以通过点击任一按钮来播放声音。就这样，我们开始播放声音了！接下来，我们来讨论另一种音频：音乐。\n\
  \n## 播放音乐\n\n每个 iOS 设备都支持在其库中维护音乐、视频、播客、电视节目等的库。尽管 iPhone 和 iPad 有这个库，但在文档中仍被称为\
  \ iPod 库。你的应用能够搜索用户的 iPod 库、播放其中的项目，甚至控制设备内置的音乐播放器。最常见的用途之一是允许用户在使用应用时选择一些歌曲来播放。为此，你将使用`MPMediaPickerController`类为用户提供一个界面来选择媒体。\n\
  \n### 使用`MPMediaPickerController`\n\n与允许用户选择图像在应用中使用的`UIImagePickerController`类非常相似，`MPMediaPickerController`允许用户从\
  \ iPod 库中选择媒体在应用中使用，这些媒体由`MPMediaItem`类表示。\n\n**注意：** iPhone 模拟器上没有 iPod 库，因此使用`MPMediaPickerController`类仅限于实际设备。\n\
  \n要使用`MPMediaPickerController`，你需要将`MediaPlayer`框架添加到项目中，链接到目标，然后导入`MediaPlayer`框架的头文件，如下所示：\n\
  \n```\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n正如我们稍后将讨论的，你需要一个媒体选择器控制器的委托对象，通常是显示媒体选择器控制器的视图控制器，该控制器需遵循`MPMediaPickerControllerDelegate`协议。要显示`MPMediaPickerController`，创建一个并像其他视图控制器一样展示它：\n\
  \n```\nMPMediaPickerController *mediaPickerController =\n    [[MPMediaPickerController\
  \ alloc] initWithMediaTypes:MPMediaTypeAnyAudio];\n[mediaPickerController setDelegate:self];\n\
  [mediaPickerController setPrompt:@\"Choose a song!\"];\n[self presentModalViewController:mediaPickerController\
  \ animated:YES];\n```\n\n![Image 48](img/index-325_1.jpg)\n\n在初始化方法中，我们指定了要查找的媒体类型；在本例中，是任何音频。其他媒体类型包括播客、iTunes\
  \ U、音乐视频、有声读物等特定类型的媒体。`MPMediaPickerController`有一个委托协议，你大概能猜到它的名字：`MPMediaPickerControllerDelegate`。媒体选择器控制器还有一个`prompt`属性，我们可以用它来在选择器控制器的视图顶部显示自定义字符串。图\
  \ 11-2 展示了媒体选择器控制器视图的外观，带有自定义提示“Choose a song!”。\n\n**图 11-2.** *媒体选择器控制器的视图。右侧的云图标表示这些艺术家在\
  \ iTunes Match 中。带有向下箭头的云图标表示该歌曲在用户的 iTunes Match 账户中可用但不在设备上；点击此图标将下载该歌曲。*\n\n\
  与`UIImagePickerController`类似，`MPMediaPickerController`通过其委托返回选中的项目或项目，在本例中使用`MPMediaPickerControllerDelegate`协议。该协议有两个方法：`mediaPickerDidCancel:`和`mediaPicker:didPickMediaItems:`。如果用户取消并未选择任何媒体项目，则调用第一个方法；而第二个方法在用户选择一个或多个媒体项目时被调用。要允许用户选择多个项目，将`MPMediaPickerController`的`allowsPickingMultipleItems`属性设置为`YES`。然而，与类似的委托方法不同，选中的项目不会在`NSArray`对象中返回；相反，它们会在`MPMediaItemCollection`对象中返回。媒体项目集合的行为类似于媒体项目的数组，但具有一些额外功能。其`mediaTypes`属性包含集合中每种媒体类型的标志。单个媒体项目（`MPMediaItem`类的实例）可以通过`items`属性访问，该属性返回一个包含这些项目的`NSArray`。\n\
  \n\n\n"
- "# 当所有项目具有共同特征时\n\n当所有项目具有共同特征时——例如，当你按特定艺术家选择专辑时——`representativeItem` 属性会返回一个设置了通用属性的\
  \ `MPMediaItem` 对象，这些属性包括艺术家名称、专辑名称、发行年份以及其他常见元数据。\n\n访问媒体项目的这些属性并非直接通过属性访问，而是通过它继承自\
  \ `MPMediaEntity` 的 `valueForProperty:` 方法来实现。`MPMediaEntity` 是一个位于 `MPMediaItem`\
  \ 和 `MPMediaItemCollection` 之上的抽象类。要访问 `MPMediaPickerController` 中所有选中媒体项目的艺术家名称和标题，你可以按如下方式实现委托方法\
  \ `mediaPicker:didPickMediaItems:`：\n\n```objc\n- (void)mediaPicker:(MPMediaPickerController\
  \ *)mediaPicker\n  didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
  {\n    // 打印每个项目的艺术家和标题\n    for (MPMediaItem *mediaItem in [mediaItemCollection\
  \ items]) {\n        NSString *artist = [mediaItem\n            valueForProperty:MPMediaItemPropertyArtist];\n\
  \        NSString *title = [mediaItem valueForProperty:MPMediaItemPropertyTitle];\n\
  \        NSLog(@\"Artist: %@ Title: %@\", artist, title);\n    }\n}\n```\n\n###\
  \ 使用 MPMusicPlayerController\n\n一旦你有了 `MPMediaItemCollection`，你很可能想要播放音乐！为此，你需要使用\
  \ `MPMusicPlayerController` 类。不是直接创建音乐播放器控制器，而是使用两个类方法之一来访问两个单例播放器之一：`applicationMusicPlayer`\
  \ 或 `iPodMusicPlayer`。\n\n虽然这两个播放器一次只能有一个在播放，但你会将它们用于不同的场景。应用程序音乐播放器是特定于你的应用程序的；当用户离开你的应用时，音乐会停止播放。而\
  \ iPod 音乐播放器则是设备级别的音乐播放器。当你的应用启动时，它可能已经在播放音乐，而当你的应用退出时，音乐会继续播放。\n\n当你的应用启动时，最好先判断用户是否已经在听音乐。首先，与之前讨论的\
  \ `MPMediaPickerController` 类一样，你需要将 `MediaPlayer` 框架添加到项目中，将其与目标关联，并导入其头文件。完成这些步骤后，你可以按如下方式判断用户当前是否在听音乐：\n\
  \n```objc\nBOOL isAlreadyPlaying;\nMPMusicPlayerController *iPodPlayer = [MPMusicPlayerController\
  \ iPodMusicPlayer];\nif ([iPodPlayer playbackState] == MPMusicPlaybackStatePlaying)\
  \ {\n    isAlreadyPlaying = YES;\n}\nelse {\n    isAlreadyPlaying = NO;\n}\n```\n\
  \n这段代码通过访问 iPod 音乐播放器控制器的 `playbackState` 属性，如果用户已经在听音乐，则将 `isAlreadyPlaying` 设置为\
  \ `YES`。\n\n与 `AVAudioPlayer` 类似，`MPMusicPlayerController` 类也有 `play`、`pause` 和\
  \ `stop` 方法，不过你无需在播放前准备它。要加载用户通过媒体选择器控制器选中的媒体项目，请使用 `setQueueWithItemCollection:`\
  \ 方法。以下代码会立即播放用户选中的项目。（注意，与 `UIImagePickerController` 一样，你需要负责关闭媒体选择器控制器展示的模态视图控制器，因为它不会自动关闭。）\n\
  \n```objc\n- (void)mediaPicker:(MPMediaPickerController *)mediaPicker\n  didPickMediaItems:(MPMediaItemCollection\
  \ *)mediaItemCollection\n{\n    MPMusicPlayerController *iPodPlayer = [MPMusicPlayerController\n\
  \        iPodMusicPlayer];\n    [iPodPlayer setQueueWithItemCollection:mediaItemCollection];\n\
  \    [iPodPlayer play];\n    [self dismissModalViewControllerAnimated:YES];\n}\n\
  ```\n\n如果你按下设备的 Home 键并关闭应用，通过 iPod 播放器播放的音乐会继续播放。\n\n有时你可能需要对播放哪些媒体项目进行更精细的控制。假设你想构建一个自定义用户界面来浏览用户的媒体库，或执行高级搜索功能。这时你可以使用\
  \ `MPMediaQuery` 类，它允许你以编程方式搜索媒体库，提供比用户在 `MPMediaPickerController` 中使用搜索栏更精细的控制。\n\
  \n### 媒体查询\n\n要搜索媒体库，你需要使用 `MPMediaQuery` 的几个便捷构造器之一来创建实例，这些构造器是 `MPMediaQuery`\
  \ 的类方法：\n\n- `albumsQuery`\n- `artistsQuery`\n- `songsQuery`\n- `playlistsQuery`\n\
  - `podcastsQuery`\n- `audiobooksQuery`\n- `compilationsQuery`\n- `composersQuery`\n\
  - `genresQuery`\n\n媒体查询可以有一个分组类型，通过 `groupingType` 属性来表示。前面列出的每个便捷构造器都会应用一个分组类型；例如，`albumsQuery`\
  \ 方法返回的查询的分组类型为 `MPMediaGroupingAlbum`。查询的 `collections` 属性会根据分组类型返回媒体项目集合；对于专辑查询，`collections`\
  \ 属性会为用户库中的每张专辑返回一个单独的 `MPMediaItemCollection` 对象，并按专辑标题排序。你可以使用 `items` 属性返回查询返回的所有项目。\n\
  \n假设你想查找用户的所有歌曲中标题包含 \"Friday\" 的歌曲。为此，你需要为媒体项目查询创建一个过滤器。这个过滤器将是一个 `MPMediaPropertyPredicate`\
  \ 类的谓词。首先，你需要创建一个匹配用户所有歌曲的查询：\n\n```objc\nMPMediaQuery *query = [MPMediaQuery songsQuery];\n\
  ```\n\n然后，通过按标题过滤来构造谓词。在此之前，你应该检查要用于过滤媒体项目的属性是否可以作为谓词使用。过滤查询的步骤如下：\n\n```objc\n\
  if ([MPMediaItem canFilterByProperty:MPMediaItemPropertyTitle]) {\n    MPMediaPropertyPredicate\
  \ *titlePredicate =\n        [MPMediaPropertyPredicate predicateWithValue:@\"Friday\"\
  \n            forProperty:MPMediaItemPropertyTitle\n            comparisonType:MPMediaPredicateComparisonContains];\n\
  \    [query addFilterPredicate:titlePredicate];\n}\n```\n\n你可以组合多个过滤谓词来精确定位所需的媒体项目。借助这些查询，你可以构建自己的搜索界面，发现用户媒体库的详细信息，并构建出能够播放用户音乐、播客等内容的出色应用。\n\
  \n通过音乐播放器控制器和媒体库，我们探讨了将音频集成到应用中的几种方法。无论是播放按钮点击声、游戏音效，还是播放音乐，iOS 中总有一个适合你的框架。让我们在一个示例应用中实践一下。\n\
  \n### 示例：TitularSongs\n\n这个示例应用的目标很简单：在 iTunes 库中查找所有名称与其所属专辑同名的歌曲。打开 Xcode，选择 File\
  \ → New → Project…，或按 `+Shift+N`。在 iOS 部分最左侧的列中选择 `Application`，然后在右侧选择 `Single\
  \ View Application`。点击 Next，然后输入 `TitularSongs` 作为项目名称。输入公司标识符和类前缀（我将使用 `com.learncocoatouch`\
  \ 和 `LCT`），选择 `iPhone` 作为设备系列，并确保选中 `Use Automatic Reference Counting`，且同时取消选中 `Use\
  \ Storyboards` 和 `Include Unit Tests`。点击 Next，然后点击 `Create` 将项目保存到磁盘。\n\n\n\n首先，我们来添加用户界面。这款应用将非常简单：只有一个表格视图。在\
  \ Xcode 中打开主视图控制器的界面文件（`LCTViewController.xib`）。依次选择**视图 ▸ 工具 ▸ 显示对象库**或按 **Control+Option++3**\
  \ 组合键来打开对象库。打开后，从对象库中拖出一个表格视图并将其放置在视图上。它应该会自动调整大小以适配视图；如果没有，请手动调整使其完全贴合视图，效果如图 11-3\
  \ 所示。接下来，按住 **Control** 键并从表格视图拖拽到 Xcode 编辑面板左侧的 **File’s Owner** 对象上，以将你的视图控制器设置为表格视图的代理和数据源。重复此操作两次，分别在弹出菜单中选择\
  \ `dataSource` 和 `delegate`。\n\n**图 11-3.** *我们的视图控制器用户界面*\n\n接下来，打开视图控制器的头文件（`LCTViewController.h`）。由于我们已将其设为表格视图的数据源和代理，因此需要遵循\
  \ `UITableViewDataSource` 和 `UITableViewDelegate` 协议。添加以下粗体显示的代码：\n\n```objectivec\n\
  #import <UIKit/UIKit.h>\n\n@interface LCTViewController : UIViewController <UITableViewDataSource,\
  \ UITableViewDelegate>\n\n@end\n```\n\n将这些协议添加到类声明后，Xcode 中可能会出现一些警告。暂时忽略这些警告是没问题的；它们只是提示我们尚未实现这些协议中的必需方法，这正是我们下一步要做的。在实现此视图控制器之前，请先将\
  \ `MediaLibrary` 框架添加到你的项目并链接到目标。为此，在 Xcode 的文件浏览器顶部选择项目，点击 `TitularSongs` 目标，然后在编辑面板中选择\
  \ **构建阶段**。点击 **Link Binary With Libraries** 旁边的三角形展开该阶段，然后按 **添加** 按钮（+），最后选择 `MediaPlayer.framework`。\n\
  \n现在已将 `MediaPlayer` 框架添加到项目中，让我们来实现视图控制器。打开视图控制器的实现文件（`LCTViewController.m`）。在文件顶部添加以下粗体行来导入\
  \ `MediaPlayer` 头文件：\n\n```objectivec\n#import \"LCTViewController.h\"\n#import\
  \ <MediaPlayer/MediaPlayer.h>\n```\n\n为了存储所有符合条件歌曲的列表，我们将使用一个 `NSArray` 对象。通过以下粗体代码将其作为私有实例变量添加到类扩展中：\n\
  \n```objectivec\n@interface LCTViewController () {\n    NSArray *_songs;\n}\n@end\n\
  ```\n\n我们将在 `viewDidLoad` 方法中搜索媒体库。添加以下粗体行的搜索代码（稍后我们将对其进行分析）：\n\n```objectivec\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 加载视图后的其他设置，通常来自 nib 文件\n\
  \n    MPMediaQuery *mediaQuery = [MPMediaQuery songsQuery];\n\n    // 遍历歌曲，判断它们是否与专辑共享标题。如果是，则添加到数组中。\n\
  \    NSMutableArray *matchingSongs = [[NSMutableArray alloc] init];\n\n    // 创建针对每个项目调用的块；如果项目符合条件，则将其添加到数组中。\n\
  \    void (^songBlock)(id, NSUInteger, BOOL *) = ^(id obj, NSUInteger idx,\n   \
  \                                               BOOL *stop) {\n        MPMediaItem\
  \ *song = (MPMediaItem *)obj;\n        NSString *songTitle = [song\n           \
  \                    valueForProperty:MPMediaItemPropertyTitle];\n        NSString\
  \ *albumTitle = [song\n                                valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
  \        if ([songTitle isEqualToString:albumTitle]) {\n            @synchronized(matchingSongs)\
  \ {\n                [matchingSongs addObject:song];\n            }\n        }\n\
  \    };\n\n    // 遍历查询中的项目，对每个项目调用 songBlock。\n    [[mediaQuery items] enumerateObjectsWithOptions:NSEnumerationConcurrent\
  \ usingBlock:songBlock];\n\n    // 获取数据后，将其存储在 _songs 变量中。\n    _songs = [NSArray\
  \ arrayWithArray:matchingSongs];\n}\n```\n\n\n\n\n这段代码首先通过`songsQuery`方法获取设备上所有歌曲的列表，并将其存储在`mediaQuery`变量中。然后，我们创建一个可变数组，用于在找到歌曲时添加它们。接下来，我们创建一个名为`songBlock`的块，用于枚举歌曲。在该块中，我们将从歌曲中获取歌曲标题和专辑标题；如果两者相等，则将它们添加到`matchingSongs`数组中。我们使用`@synchronized`指令确保不会同时从多个线程修改该数组。下一行明确说明了这一点的重要性：我们使用`NSEnumerationConcurrent`选项枚举查询的`items`方法返回的数组中的对象，这会导致该块在多个线程上并发运行。最后，枚举完歌曲后，我们会将每个匹配的歌曲存储在`_songs`数组中。\n\
  \n既然我们已经找到了所需的歌曲，接下来实现表格视图方法来显示结果。在视图控制器实现中的`@end`编译器指令之前，添加加粗显示的方法：\n\n```objectivec\n\
  @implementation LCTViewController\n\n...\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
  \ \nnumberOfRowsInSection:(NSInteger)section\n{\n    return [_songs count];\n}\n\
  \n- (UITableViewCell *)tableView:(UITableView *)tableView \ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSString *cellIdentifier = @\"songCell\";\n    UITableViewCell\
  \ *cell = [tableView \n        dequeueReusableCellWithIdentifier:cellIdentifier];\n\
  \    \n    if (cell == nil) {\n        cell = [[UITableViewCell alloc] \n      \
  \      initWithStyle:UITableViewCellStyleSubtitle \n            reuseIdentifier:cellIdentifier];\n\
  \    }\n    \n    MPMediaItem *song = [_songs objectAtIndex:[indexPath row]];\n\
  \    [[cell textLabel] setText:[song \n        valueForProperty:MPMediaItemPropertyTitle]];\n\
  \    [[cell detailTextLabel] setText:[song \n        valueForProperty:MPMediaItemPropertyArtist]];\n\
  \    \n    MPMediaItemArtwork *albumArt = [song \n        valueForProperty:MPMediaItemPropertyArtwork];\n\
  \    CGSize imageSize = CGSizeMake([tableView rowHeight], [tableView \n        rowHeight]);\n\
  \    [[cell imageView] setImage:[albumArt imageWithSize:imageSize]];\n    \n   \
  \ return cell;\n}\n\n@end\n```\n\n我们的表格视图只有一个分区，其行数与匹配的歌曲数量相同。在`tableView:cellForRowAtIndexPath:`方法中，我们将创建（或重用）一个具有`UITableViewCellStyleSubtitle`样式的单元格，然后用歌曲标题（由于我们搜索的歌曲，它也是专辑标题）和艺术家名称填充它。接下来，我们获取一个代表歌曲专辑封面的`MPMediaItemArtwork`对象，然后用它来填充单元格的图像视图。在\
  \ iOS 设备上构建并运行该应用程序，您的媒体库中符合我们条件的歌曲将出现在表格视图中。图 11-4 显示了该应用在我的 iPhone 上运行的情况，展示了我媒体库中符合此条件的歌曲。请注意，并非所有专辑都有专辑封面，尤其是\
  \ iTunes Match 中的专辑。\n\n![图片 50](img/index-334_1.jpg)\n\n**图 11-4.** *TitularSongs\
  \ 示例应用*\n\n到目前为止一切顺利。让我们为此应用再添加一个功能：播放歌曲。在`@end`指令之前的实现文件中添加委托方法`tableView:didSelectRowAtIndexPath:`。使用加粗显示的行创建它：\n\
  \n```objectivec\n- (void)tableView:(UITableView *)tableView \ndidSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  \    \n    MPMediaItem *song = [_songs objectAtIndex:[indexPath row]];\n    NSArray\
  \ *items = [NSArray arrayWithObject:song];\n    MPMediaItemCollection *itemCollection\
  \ = \n        [MPMediaItemCollection collectionWithItems:items];\n    \n    [[MPMusicPlayerController\
  \ iPodMusicPlayer] \n        setQueueWithItemCollection:itemCollection];\n    [[MPMusicPlayerController\
  \ iPodMusicPlayer] play];\n}\n```\n\n这段代码从一个仅包含所选歌曲的数组中创建一个`MPMediaItemCollection`，然后指示系统范围的\
  \ iPod 音乐播放器播放它。构建并运行该应用，然后点击其中一首歌曲；它将开始播放。由于我们未在此应用中内置任何播放控制，您需要使用设备上的“音乐”应用来停止音频。我们在应用中使用了\
  \ iPod 音乐播放器，因此在 Xcode 中单击“停止”来停止执行是不够的，因为音频控制已移交给内置的 iPod 播放器。\n\n如您所见，`MediaPlayer`框架允许我们操作用户的\
  \ iTunes 库，以执行任意搜索并随意播放内容。接下来，我们将了解如何为您的应用添加另一种媒体类型：视频。\n\n## 播放视频\n\n与播放音频一样，在\
  \ iOS 上有多种播放视频的方式。使用哪种方式取决于您的需求。有些应用只需为用户提供视频供其随意观看，而其他应用则可能希望在屏幕的特定部分播放无控件的视频。在高级层面上，您可以使用`MPMoviePlayerController`类来播放视频，但如果您需要更精细的控制，则可以使用`AVFoundation`框架。让我们先讨论`MPMoviePlayerController`类。\n\
  \n### 使用 MPMoviePlayerController\n\n如果您有一个本地视频文件，可以使用以下代码创建一个`MPMoviePlayerController`：\n\
  \n```objectivec\nNSURL *movieURL = [[NSBundle mainBundle] URLForResource:@\"myMovie\"\
  \ \n                                          withExtension:@\"mov\"];\nMPMoviePlayerController\
  \ *moviePlayerController = \n    [[MPMoviePlayerController alloc] initWithContentURL:movieURL];\n\
  ```\n\n也可以通过网络流播放视频；我们稍后会介绍。\n\n与`AVAudioPlayer`类类似，`MPMoviePlayerController`类维护缓冲区并调用硬件；为此，您可以调用其实例方法`prepareToPlay`来缓冲视频，从而避免在调用其`play`方法时出现延迟。然而，与`AVAudioPlayer`类不同，调用`play`后工作并未结束；因为这里讨论的是视频，所以必然涉及用户界面，您需要一个位置来放置显示给用户的视频。\n\
  \n**注意：** 默认情况下，电影播放控制器会同时播放电影中的音频和您应用中的音频。如果您想更改此行为，确保电影的音频不与应用中的其他音频混合，请将电影播放控制器的`useApplicationAudioSession`属性设置为`NO`。\n\
  \n### 使用 MPMoviePlayerViewController\n\n播放视频最简单的方法是完全不使用`MPMoviePlayerController`，而是使用另一个使用它的类，即`MPMoviePlayerViewController`类。这个类是一种自包含的方式，用于呈现全屏视图控制器并播放电影。它包含显示电影控件的自有逻辑，但其他方面与普通视图控制器类似。使用它就像创建电影播放控制器一样简单：\n\
  \n```objectivec\nNSURL *movieURL = [[NSBundle mainBundle] URLForResource:@\"myMovie\"\
  \ \n                                          withExtension:@\"mov\"];\nMPMoviePlayerViewController\
  \ *moviePlayerViewController = \n    [[MPMoviePlayerViewController alloc] initWithContentURL:movieURL];\n\
  ```\n\n您可以通过访问其`moviePlayer`属性来访问电影播放视图控制器在幕后使用的电影播放控制器。这允许您配置播放所需的`MPMoviePlayerController`属性——我们稍后会介绍这些。当您想要呈现电影播放器时，您将使用...而不是`presentModalViewController:animated:`。\n\
  \n\n\n"
- "# 应用中的媒体：播放音频与视频\n\n### 使用 `presentMoviePlayerViewControllerAnimated:`\n\n`presentMoviePlayerViewControllerAnimated:`\
  \ 是一个专为此用途设计的类似方法（在 `MediaPlayer` 框架中作为 `UIViewController` 的一个类别定义），它将以模态方式显示电影播放器视图控制器。该方法的唯一参数是电影播放器视图控制器；它总是以动画形式显示。当你的视频播放完毕后，调用\
  \ `dismissMoviePlayerViewControllerAnimated` 来关闭它。但如何知道视频已经播放完毕？为此，你需要使用 `MPMoviePlayerViewController`\
  \ 的 `moviePlayer` 属性中的 `MPMoviePlayerController`。\n\n你使用 `MPMoviePlayerController`\
  \ 可以做的事情之一，是在电影播放过程中的不同节点注册它发布的通知。在这种情况下，当视频播放完毕时（无论是完整播放完毕还是因错误结束），会发布 `MPMoviePlayerPlaybackDidFinishNotification`\
  \ 通知。如果是 `MPMoviePlayerViewController` 的情况，你可以在其视频播放完毕后关闭该视图控制器。如果用户按下“完成”按钮停止观看视频，则不会发送\
  \ `MPMoviePlayerPlaybackDidFinishNotification` 通知；在这种情况下，电影播放器控制器会发布 `MPMoviePlayerDidExitFullscreenNotification`\
  \ 通知。不过，如果你不使用电影播放器视图控制器，而仅使用电影播放器控制器，就可以对视频进行更多有趣的操作。\n\n### 使用 `MPMoviePlayerController`\
  \ 的视图\n\n`MPMoviePlayerController` 的属性之一是 `view` 属性。这是一个标准的 `UIView`，可以放置在你视图层次结构中的任何位置。当它出现时，会包含一个系统绘制的播放按钮。在\
  \ iPhone 或 iPod touch 上，由于屏幕尺寸有限，视频会自动以全屏模式播放。在 iPad 上，视频默认会在电影播放器控制器视图所在的位置内联播放。当然，你也可以在\
  \ iPhone 或 iPod touch 上不进行全屏播放，或在 iPad 上进行全屏播放。\n\n无论视频当前是否正在播放，无论你使用何种设备，都可以调用电影播放器控制器的\
  \ `setFullscreen:animated:` 方法来进入或退出全屏播放。这会生成一个你可以监听的通知，即 `MPMoviePlayerDidEnterFullscreenNotification`\
  \ 或 `MPMoviePlayerDidExitFullscreenNotification`。当视频以全屏模式播放时，系统会自动提供一个“完成”按钮，用户可以按下该按钮退出全屏模式。\n\
  \n电影控件——包括播放、暂停、快退和快进按钮等——是电影播放器控制器视图上的标准配置。如果你想提供自己的控件（可能为了使用你应用的 UI 风格），可以使用电影播放器控制器的\
  \ `controlStyle` 属性。将其设置为 `MPMovieControlStyleNone` 常量以移除内置控件，然后将你自己的控件作为子视图添加到电影播放器控制器的视图中。当使用你的自定义控件时，只需适当地调用\
  \ `play`、`pause`、`stop` 等方法即可。\n\n### 播放网络视频\n\n`MPMoviePlayerController` 类的初始化方法是\
  \ `initWithContentURL:`。虽然你可以使用文件 URL 访问应用包或文件系统中其他位置的本地文件，但也可以使用远程 URL 从服务器播放电影。如果视频的\
  \ URL 是 `http://www.example.com/myMovie.mp4`，创建电影播放器控制器的代码如下：\n\n```\nNSURL *movieURL\
  \ = [NSURL URLWithString:@\"http://www.example.com/myMovie.mp4\"];\nMPMoviePlayerController\
  \ *moviePlayerController =\n    [[MPMoviePlayerController alloc] initWithContentURL:movieURL];\n\
  ```\n\n如果这样做，有一些注意事项需要牢记。由于远程电影的部分数据（如时长）是元数据，你可能无法立即访问它们。如果电影播放器控制器无法确定其电影的时长，其\
  \ `duration` 属性将返回 `0.0`。如果发生这种情况，你可以通过注册 `MPMovieDurationAvailableNotification`\
  \ 通知的观察者，在时长已知时得到通知。假设你有一个名为 `durationLabel` 的标签，以下是如何使用电影时长对其进行初始化的代码：\n\n```\n\
  MPMoviePlayerController *moviePlayerController =\n    [[MPMoviePlayerController\
  \ alloc] initWithContentURL:movieURL];\nNSTimeInterval duration = [moviePlayerController\
  \ duration];\n\nif (duration > 0.0) {\n    NSString *durationString =\n        [NSString\
  \ stringWithFormat:@\"%f\", duration];\n    [durationLabel setText:durationString];\n\
  }\nelse {\n    [durationLabel setText:nil];\n    NSNotificationCenter *notificationCenter\
  \ = [NSNotificationCenter\n        defaultCenter];\n    [notificationCenter addObserverForName:MPMovieDurationAvailableNotification\n\
  \                                    object:moviePlayerController\n            \
  \                         queue:[NSOperationQueue mainQueue]\n                 \
  \               usingBlock:^(NSNotification *note) {\n                         \
  \           NSString *durationString =\n                                       \
  \ [NSString stringWithFormat:@\"%f\", duration];\n                             \
  \       [durationLabel setText:durationString];\n                              \
  \  }];\n}\n```\n\n请注意，我们只为这个特定的电影播放器控制器注册了该通知；你可能同时有多个电影播放器控制器处于活动状态，因此要确保从正确的控制器获取时长。\n\
  \n### 获取视频缩略图\n\n通过网络播放视频时，另一个无法立即获取的内容是缩略图。通常，你可以使用 `thumbnailImageAtTime:timeOption:`\
  \ 方法从电影播放器控制器中检索缩略图。该方法的第一个参数是一个 `NSTimeInterval` 值，表示你在电影中想要缩略图的时间点（从电影开始算起的秒数），这在例如构建一个在电影多个章节间导航的\
  \ UI 时非常有用。第二个参数是一个 `MPMovieTimeOption` 常量，可以是 `MPMovieTimeOptionNearestKeyFrame`\
  \ 或 `MPMovieTimeOptionExact`。前者不尝试在指定的精确时间获取缩略图，而是选择最近的 keyframe，这可以提供更好的性能；而后者则使缩略图来自视频中指定的精确时间。取决于用于压缩视频的视频压缩编解码器，这可能导致电影播放器控制器将压缩视频的多个帧合成在一起，以创建所需的缩略图。\n\
  \n使用 `thumbnailImageAtTime:timeOption:` 方法的问题在于它是同步运行的。对于网络视频，如果你调用此方法并请求接近末尾的缩略图，可能会导致该方法阻塞当前线程相当长的时间。为了解决这个问题，并同时提供分别异步请求多个缩略图的能力，`MPMoviePlayerController`\
  \ 类提供了 `requestThumbnailImagesAtTimes:timeOption:` 方法。第一个参数是一个包含 `NSNumber` 对象的\
  \ `NSArray`，这些对象表示从视频开始算起的 `NSTimeInterval` 值（以秒为单位）；第二个参数与之前相同，是 `MPMovieTimeOption`\
  \ 值。在创建用于此数组的 `NSNumber` 对象时，务必使用 `NSNumber` 的 `numberWithDouble:` 类方法，因为使用 `numberWithInt:`\
  \ 或其他使用整数的方法会导致错误。电影播放器控制器期望的是一个定义为 `double` 类型的 `NSTimeInterval` 值。一旦缩略图可用，电影播放器控制器会发布一个名为...\n\
  \n\n```markdown\n\n`MPMoviePlayerThumbnailImageRequestDidFinishNotification`。该通知的`userInfo`字典中包含两个对象：一个`NSNumber`对象，表示你请求缩略图的时间点（以秒为单位，从视频开头算起），该对象与键`MPMoviePlayerThumbnailTimeKey`关联；另一个对象是缩略图图像（由`UIImage`对象表示）或错误（由`NSError`对象表示），根据操作是否成功，分别与键`MPMoviePlayerThumbnailImageKey`或`MPMoviePlayerThumbnailErrorKey`关联。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 11 章：应用中的媒体：播放音频和视频**\
  \ 338\n\n最后，如果你需要取消缩略图请求——例如，当用户离开原本要显示缩略图图像的视图控制器时——你可以调用电影播放器控制器的`cancelAllThumbnailImageRequests`方法，顾名思义，该方法会取消当前所有待处理的缩略图请求。\n\
  \n**AirPlay**\n\n`AirPlay`是苹果公司用于通过本地网络流式传输音频和视频的技术。如果你家里有`Apple TV`和无线网络，就可以用它来接收来自`iOS`设备的音频和视频。默认情况下，`MPMoviePlayerController`不允许其视频通过`AirPlay`流式传输到其他设备；若要允许，需将电影播放器控制器的`allowsAirPlay`属性设置为`YES`。设置完成后，`MPMoviePlayerController`视图中的控件将包含一个按钮，用于将当前正在播放的视频发送到其他设备。\n\
  \n我们已经涵盖了使用`MPMoviePlayerController`类播放视频的大部分内容。你也可以使用`AVFoundation`框架来播放视频——特别是在需要同时播放多个视频时——但对于绝大多数需求，`MPMoviePlayerController`和`MPMoviePlayerViewController`足以处理视频播放。让我们编写一个示例应用来实践这些知识。\n\
  \n**示例：CustomPlayer**\n\n这个示例应用将非常简单。我们的目标是获取一个视频（我们将使用`UIImagePickerController`来实现），然后使用自定义控件显示该视频。打开`Xcode`，选择`File`\
  \ → `New` → `Project…`，或按`⌘+Shift+N`。\n\n在`iOS`部分下的最左列选择`Application`，然后在右侧选择`Single\
  \ View Application`。点击`Next`，然后将项目名称设置为`CustomPlayer`。输入你的公司标识符和类前缀（我将使用`com.learncocoatouch`和`LCT`），选择`iPhone`作为`Device\
  \ Family`，并确保勾选了`Use Automatic Reference Counting`，同时取消勾选`Use Storyboards`和`Include\
  \ Unit Tests`。点击`Next`，然后点击`Create`将项目保存到磁盘。\n\n首先，添加用户界面。这个应用将非常简单：一个单一的表格视图。在`Xcode`中打开主视图控制器的用户界面文件（`LCTViewController.xib`）。由于我们将把这个视图控制器嵌入到导航控制器中，请选择该视图，然后通过选择`View`\
  \ → `Utilities` → `Show Attribute Inspector`或按`⌥+⌘+4`打开属性检查器。在`Simulated Metrics`下，为`Top\
  \ Bar`设置选择`Navigation Bar`。你应该会看到\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
