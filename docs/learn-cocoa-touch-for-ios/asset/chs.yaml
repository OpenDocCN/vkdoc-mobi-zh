- "# 第九章：用户界面设计\n\n**图 9-2.** *我们的 Twitter 客户端，带有一点颜色*\n\n如您所见，只需添加一点点颜色——即使是灰色调——就能带来显著的不同。既然这么简单，就没有理由发布一个使用朴素默认界面的应用。不过，这个\
  \ Twitter 界面仍然需要一些改进。大多数推文都超过了一行，但它们被截断了。让我们看看能对此做些什么。\n\n## 字体与文本大小\n\n标签中用于显示文本的字体由\
  \ `UIFont` 类表示。我们还可以用它来确定绘制字符串需要多少空间。要设置标签的字体，您可以像这样创建一个字体：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```objectivec\nUIFont *myFont = [UIFont boldSystemFontOfSize:17.0f];\n```\n\n\
  如果您想使用具有特定名称的字体，或更具体的字体变体（例如粗体和斜体），您可以使用字体的名称来创建一个 `UIFont` 对象来表示它：\n\n```objectivec\n\
  UIFont *myFont = [UIFont fontWithName:@\"Helvetica Neue\" size:17.0f];\n```\n\n\
  `UIFont` 类方法 `familyNames` 返回系统上存在的字体族名称数组。要获取特定族中字体的名称，请使用 `UIFont` 类方法 `fontNamesForFamilyName:`，它接受一个字符串（族名称）作为参数，并返回指定族中的字体名称数组。在\
  \ `fontWithName:size:` 方法中使用这些字体名称。\n\n**注意**：要获取 iOS 内置字体的最新列表，请访问 [www.iosfonts.com.](http://www.iosfonts.com)\n\
  \n要使用该字体绘制标签的文本，请将其设置为标签的字体：\n\n```objectivec\n[myLabel setFont:myFont];\n```\n\n\
  对于 TwitterExample，让我们使用自定义字体添加一些风格。在 Xcode 中打开您的 TwitterExample 项目，如果您还没有打开，请导航到\
  \ `LCTTimelineViewController.m` 文件。让我们添加两个 `UIFont` 实例变量来存储我们想要使用的字体。我们将实例变量添加到文件顶部的类扩展中。请添加以下加粗的行：\n\
  \n```objectivec\n@interface LCTTimelineViewController () {\n    NSTimer *_reloadTimer;\n\
  \    NSArray *_tweets;\n    dispatch_queue_t _profileImageQueue;\n    dispatch_semaphore_t\
  \ _profileImageSemaphore;\n    UIFont *_tweetFont;\n    UIFont *_usernameFont;\n\
  }\n- (void)reloadButtonPressed:(id)sender;\n- (void)reloadTweets:(NSTimer *)reloadTimer;\n\
  - (void)tweetButtonPressed:(id)sender;\n@end\n```\n\n接下来，通过添加以下加粗的行来修改 `initWithStyle:`\
  \ 方法，以初始化这些字体：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```objectivec\n\
  - (id)initWithStyle:(UITableViewStyle)style\n{\n    self = [super initWithStyle:style];\n\
  \    if (self) {\n        [self setTitle:@\"Timeline\"];\n        UIBarButtonItem\
  \ *reloadButton =\n        [[UIBarButtonItem alloc]\n         initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh\n\
  \         target:self\n         action:@selector(reloadButtonPressed:)];\n     \
  \   [[self navigationItem] setLeftBarButtonItem:reloadButton];\n    }\n    return\
  \ self;\n}\n```\n\n\n\n`UIBarButtonItem *tweetButton =`  \n`[[UIBarButtonItem alloc]`\
  \  \n`initWithBarButtonSystemItem:UIBarButtonSystemItemCompose`  \n`target:self`\
  \  \n`action:@selector(tweetButtonPressed:)];`  \n`[[self navigationItem] setRightBarButtonItem:tweetButton];`\n\
