  最后，通过启动 `NITE-Win32` 安装程序来安装最后一个驱动程序。同意许可协议，保持默认安装路径为 `C:\Program Files\Prime Sense\NITE\`，并点击`安装`。下一步，系统会提示你输入许可证密钥（图
  1-17）。粘贴你之前从 RGBDemo 下载页面（图 1-9）复制的那串 28 个字符，然后点击`安装`。在此步骤中，几个命令提示符窗口自动打开和关闭是正常现象，不必担心。


  ![images](img/0117.jpg)


  ***图 1-17.** PrimeSense 提示输入 NITE 许可证密钥——0KOIk2JeIBYClPWVnMoRKn5cdY4=*




  ### 连接 Kinect


  恭喜！你已经完成安装。接下来是有趣的部分——准备将 Kinect 连接到你的计算机。请参考图 1-4 直观了解后续步骤中涉及的线缆。将 Kinect 上的专用
