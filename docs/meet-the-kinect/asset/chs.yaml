  ### 测试你的 Kinect


  准备好看到体积 3D 中的自己了吗？！好了，如果你已成功完成前述步骤，你应该能像我一样在图 1-21 中看到自己。这个彩色实时的影像看起来像科幻电影中的热成像摄像头，但相似之处仅限于此。


  ![images](img/0121.jpg)


  **图 1-21.** `rgbd-viewer` 应用程序中的`RGBD`捕获窗口。主图像显示合并后的深度范围图像，其颜色映射为表示与传感器距离的色值。右上图像显示来自
  RGB 摄像头的`彩色图像`流。`3D 视图`和`滤镜`选项在`显示`下拉菜单中提供。每个像素的距离值显示在上中部的`距离在...`状态栏中，对应鼠标指针在深度范围图像上的位置。


  与热成像摄像头显示代表温度范围的不同颜色不同，Kinect 显示的是代表与摄像头不同距离范围的不同颜色。这些颜色是任意的——其他一些驱动程序会以灰度范围显示深度图像。您可以通过将鼠标移动到自身彩色图像的任意位置，来查看图像中任何像素或图片元素距离摄像头的精确米数距离。请观察深度图像的右上方，您会看到类似图
  1-21 中的读数，例如`距离在 (0,414) = 0.000 米`。试着移动鼠标指针，看看环境中不同物体距离摄像头有多远。该读数以米而非英尺为单位，但您可以在网上找到换算工具。


  花点时间在摄像头前跳跃，观察深度图像如何反映您在空间中的运动。拿起 Kinect，将其对准周围的墙壁和地板，注意颜色变化如何对应这些物体与设备的距离变化。关于场景的所有深度数据都可以发送到您编写的程序中，本书后续章节将详细介绍其工作原理。此外，您将在第
  2 章中学习人体和骨骼追踪的基础知识。目前，我们仅关注 Kinect 输出的基本数据和图像，不涉及任何复杂中间件。


  这是一个相当简单的概念——图像中的每个像素都有一个相对于摄像头测量的空间位置。没有其他消费级摄像头具备 Kinect 测量空间的能力。这正是“深度传感器”的原始功能，已在机器人技术和工程领域应用多年。仅使用深度传感器，以及我们稍后将介绍的骨骼追踪中间件和其他追踪方法，软件开发人员就可以创建简单的“自然界面”软件，让人无需触碰机器即可与之交互。这非常酷——但接下来我们将展示，在合适软件的帮助下，Kinect
  如何超越单纯的深度感知，开创全新的设备类别，成为首款消费级体积 3D 摄像头，简称`voxelcam`。


  在图 1-21 中，您可以在右上角标注为`彩色图像`的窗口中看到普通网络摄像头视角下的自己。该信号来自 Kinect 中部镜头后面的可见光摄像头传感器（图 1-6,
  C）。您在`彩色图像`窗口中看到的是可见光的实时视频流，其组织方式与自电视时代以来屏幕显示静态照片和视频的方式相同——通过一个二维的图片元素（即像素）表格。就像一个包含行和列的光样本，以及表格中每个单元格的颜色值一样，这些元素拼接在一起，在屏幕上形成一幅马赛克图像。请注意，在图
  1-21 中，窗口右下角的`强度图像`和`振幅图像`默认是关闭的。如果该区域什么也没显示，说明您的设置没有问题。


  现在，您将借助深度范围图像数据为摄像头图像增加一个维度。突破我们已知的所有传统摄影和视频技术，我们如今可以为每个图片元素分配一个 3D 空间位置，该位置反映了其采样原始表面的位置（图
  1-22）。对于深度图像中的每个像素，我们可以提取三个维度：其与摄像头的距离 (z)、其在图像表格列中的垂直位置 (y)，以及其在图像表格行中的水平位置 (x)。


  ![images](img/0122.jpg)


  **图 1-22.** `RGBDemo` 3D 视图——默认情况下合成摄像头与实际摄像头对齐


  这些浮点数据，或称“空间中的像素”，难以想象。它们本身没有颜色或纹理。它们仅用于指示存在反射红外激光图案的物体。为了提供更具体的方式来理解这些空间点，我们将从二维的电子表格隐喻转向三维的魔方隐喻。想象每个点本身具有一个体积，如同大魔方中的一个小立方体。一个单独的立方体体积元素，即`体素`，来自这个更大的三维立方体阵列，它充当信息的容器，具有
  x、y 和 z 坐标地址，指定了场景中一块物理空间。这意味着我们可以将来自网络摄像头的图片元素与来自深度摄像头的`体素`合并，构建一个既有深度又有颜色的体积立方体空间。这个过程在
  3D 空间中组装出一个活生生的彩色`体素`云，重建了 Kinect 前方物体的表面形状和外观（图 1-22）。与 Playstation Move 或 Nintendo
  Wii 等 2D 计算机视觉技术不同，这种解析包含深度信息的场景`体素`图的能力，是理解 Kinect 强大功能以及如何运用它的基础。


  准备好变得“体素化”了吗？好了，要在体积 3D 中看到自己，首先在`RGBD`捕获窗口的菜单栏中点击`显示`，然后选择`3D 视图`。将弹出一个标注为`3D 视图
  (图 1-22)`的新窗口。此时还没完全成功——此刻您应该能看到自己，就像在普通网络摄像头上一样，但头部和其他物体边缘有些粗糙。接下来是好玩的部分：点击您自己的影像并拖动。现在，这就是您一直在等待的效果（图
  1-23）！


  ![images](img/0123.jpg)


  **图 1-23.** 合成摄像头稍微向左旋转后的 3D 视图。顶部视图显示默认的`点云`渲染模式，底部视图显示`三角形`渲染模式


  您看到的是体积空间中的“合成摄像头”图像。这个合成摄像头并非真实存在——其图像是通过从不同于原始采样角度的方向观察空间中的浮动体积元素而得出的。您可以拿起这个合成摄像头，朝任意方向旋转，从任何角度查看`体素`数据。例如，图
  1-24 显示了旋转 90 度后的图像。


  由于您只使用单个摄像头，如果您试图观察正对摄像头物体的背面，图像会看起来更不完整，这一点您可以从图 1-24 中推断出来。在同一个空间内布置多个`体素摄像头`可以构建更完整的场景。Microsoft
  Kinect SDK 和 OpenNI 框架实际上都包含支持同时与多个 Kinect 交互的接口。因此，如果您想创建一个从多个角度填补图像空白的应用程序，编写相关软件是可行的。这种对空间的单一、全面的体积视图，可以从无限多的视角进行观察，所有这些视角都可以在回放期间通过映射到观看者视线方向的合成摄像头进行实时交互定位。


  一旦人们真正理解这项技术的能力，对更真实沉浸式体验的需求就会增加。随着满足这种需求的体积传感器阵列变得越来越普遍，基于此技术所能创造的可能性将变得更加无限。Kinect
  只是冰山一角。欢迎来到体积时代！


  这些信息桶可以用不同的方式渲染。3D 视图的默认方法是一个空间中的像素云，也称为点云（图 1-23，顶部）。如您所见，这个视图有很多空洞。您可以放大以更近地观察这些点——它们显示的图案反映了红外投影仪不可见地投射在您身上的结构光点阵。


  既然我们目前还没有多个 Kinect 来填补合成摄像头图像中的所有裂缝，那么让我们利用多边形的魔力，以一种我们更习惯的方式来渲染这些信息。选择 3D 视图屏幕右上角的`三角形`按钮（位于`PointCloud`和`Surfels`按钮右侧），如图
  1-23 所示。这将创建一个由三角形多边形组成的网格，连接各个点，并为可见光图像数据提供更多显示表面积。注意点云视图和三角形视图（图 1-23，底部）之间的区别。仅几年之前，创建这种
  3D 图像的能力还仅限于能够负担约 15,000 美元价格的学术、娱乐和军事机构。


  ![images](img/0124.jpg)


  **图 1-24.** `RGBDemo` 3D 视图显示体积 3D 合成摄像头视角神奇地垂直于物理 Kinect 旋转了 90 度


  您会注意到您所在位置“后面”图像的大空洞——那是您的阴影！您的轮廓被勾勒出来，是因为您阻挡了红外投影仪将可测量的光线投射到您身后的墙壁上。这看起来可能没什么大不了的，因为这只是该技术非常基础的运用，但当您了解微软研究院的`KinectFusion`项目用于实时动态
  3D 表面重建时，就能明白这项能力的未来发展方向。这种在数字空间中重建物理世界的能力是微软的一个主要主题，而在`Xbox Live`的`趣味实验室`小游戏中，可以找到让您“数字化您的世界”的简单应用程序。


  ![images](img/square.jpg) **注意** 更多关于`KinectFusion`项目的信息，请访问以下 URL：[`research.microsoft.com/en-us/projects/surfacerecon/`](http://research.microsoft.com/en-us/projects/surfacerecon/)


  虽然多数人只将 Kinect 视为一种自然界面 3D 手势识别设备，但理解支撑身体追踪软件和其他功能的成像数据至关重要。Kinect 收集空间信息的能力是其独特硬件功能的核心。YouTube
  上一些伟大的“破解”仅利用这些原始数据就能实现，甚至不需要用到 Kinect 的手势识别功能。微软研究院在 2011 年 SIGGRAPH（图形专家领域的顶级行业会议）上首次展示的`KinectFusion`（图
  1-25），震惊了许多科技界人士。此前，Kinect 的体积视频输出曾被批评为质量太低而无法实用。`KinectFusion`能够高分辨率、实时、照片级地重建人物和物体，即使摄像头抖动也能做到，这表明整个场景的持久模型可以被快速存储和更新，以填补摄像头视角背后的缺失细节。


  ![images](img/0125.jpg)


  **图 1-25.** `KinectFusion` 显示人体的实时 3D 重建（左）以及带有光照效果的照片级纹理贴图模型（右）。图片由微软研究院提供。


  很可能本章中您所瞥见的——在实时体积 3D 视频中看到自己——将在未来塑造基于屏幕的娱乐和虚拟存在感方面发挥关键作用。不再使用我们所熟悉的即时通讯或 Skype，您可以通过“即时化身”的方式，将朋友、家人和同事“请”到您的房间，与他们交流。接收到他们身体的完整
  3D 数据后，您或许可以歪头并从各个角度观察他们，仿佛他们就在身边一样，这是当今 2D 摄像头无法做到的。期待一系列全新的应用程序，邀请您将家中的人和物“数字化”，并将其带入游戏或新颖的应用中。现在，您已了解真实
  Kinect 数据的模样，并对不远的将来可能实现的体验有了概念。本书其余部分将更详细地介绍，如何利用从这些“体素化”物理信息中提取的人体追踪点，设计具有自然手势界面的应用程序。




