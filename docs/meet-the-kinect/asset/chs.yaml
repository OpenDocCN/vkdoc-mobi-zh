  \ Adobe 网站的游戏专区：[`www.adobe.com/devnet/games.html`](http://www.adobe.com/devnet/games.html)。\n\
  \n#### 安装 Beckon\n\nKinect 与其他传感器一样，需要安装单独的设备驱动程序。为此，我们依赖 Kinect 开发者社区编写的公共组件。最流行的解决方案是\
  \ `SensorKinect`，这是一个基于 `PrimeSensor` 设备驱动程序的开源项目。重要的是要理解，`SensorKinect` 驱动程序不能与标准\
  \ `PrimeSensor` 驱动程序在同一台 PC 上共存，因为 `SensorKinect` 驱动程序的设计目的是让 Kinect 传感器显示为标准 `PrimeSensor`\
  \ 设备。\n\n让 Beckon 启动运行需要几个步骤。我建议查看 Omek 网站以获取最新详情，因为随着 Omek 发布更新和新版本软件，相应的驱动程序会发生变化。您需要做的第一件事是删除操作系统中现有的\
  \ Open NI SDK 和 PrimeSense 驱动程序。另外需要提醒的是，您还必须确保完全卸载并从系统中移除 `libfreenect` 开放 Kinect\
  \ 驱动程序。否则会导致 Beckon 无法识别传感器摄像头。之后，我们将重新下载并安装适用于 Beckon 的 OpenNI 和 PrimSense 驱动程序版本。最后，我们将安装\
  \ Beckon SDK 和许可证并开始使用。\n\n![images](img/square.jpg) **注意** 如果您是可能从 Mac OS 转过来的开发者，并希望充分利用\
  \ SDK，那么需要确保也已安装 Visual Studio Professional 和 .NET 框架。\n\n##### 第 1 步：移除现有驱动程序\n\
  \n第一步是移除系统中任何可能与 Beckon 软件或运行该软件所需驱动程序冲突的现有驱动程序。部分驱动程序通过控制面板移除，其他则通过 Windows 设备管理器移除。以下是针对控制面板驱动的操作步骤：\n\
  \n1.  转到“开始”->“设置”->“控制面板”\n2.  选择“程序”控制面板\n3.  选择“卸载程序”选项\n4.  卸载名称中包含“OpenNI”或“PrimeSense”的任何应用程序。例如：适用于\
  \ Windows 的 `OpenNI 1.0.0`、`PrimeSensor 5.0.0`、`Windows Driver Package – PrimeSense\
  \ (psdrv3) PrimeSensor` 等。\n\n以下展示如何使用设备管理器移除驱动程序：\n\n1.  转到“开始”->“计算机”\n2.  右键单击“计算机”，选择“管理”\n\
  3.  点击“设备管理器”\n4.  展开“人体学输入设备”\n5.  找到 `XBox NUI Camera`，右键单击，选择“卸载”\n6.  找到 `XBox\
  \ NUI Motor` 和 `XBox NUI Camera` 驱动程序，右键单击，同样卸载它们\n\n##### 第 2 步：安装新驱动程序\n\n现在所有可能冲突的其他软件和驱动程序都已清除，您可以下载并安装\
  \ Beckon 所需的组件。请按照以下说明操作：\n\n1.  下载 `OpenNI 1.0.0.25` 安装程序。\n2.  下载并安装 `SensorKinect\
  \ 5.0.0` 驱动程序。\n3.  通过运行第 1 步中下载的安装程序来安装 OpenNI。\n4.  通过运行第 2 步中下载的安装程序来安装 `SensorKinect`。\n\
  \n![images](img/square.jpg) **注意** 关于驱动安装的新信息，请查看本书的示例下载文件。\n\n##### 第 3 步：下载并安装\
  \ Beckon SDK\n\n现在是时候下载并安装 Beckon SDK 了。最好使用 Internet Explorer 或 Firefox 浏览器进行此操作，尤其是在安装了防火墙的情况下。流程如下：\n\
  \n1.  导航至客户服务门户网站：\n    [`https://license.omekinteractive.com/solo/customers/Default.aspx`](https://license.omekinteractive.com/solo/customers/Default.aspx)\n\
  2.  使用 Omek 提供给您的客户 ID 和密码登录，并下载您的许可证。当 Omek 同意授予您许可证时，他们会通过电子邮件发送此信息。如果您在此处遇到问题，请参阅\
  \ Omek Beckon SDK 安装指南。\n3.  下载 Beckon SDK。使用您注册非商业许可证时收到的 Beckon 电子邮件中提供的链接安装软件。过程中唯一需要注意的棘手弹窗是最后的弹窗，如图\
  \ 6-1 所示。如果您使用的是安装了 Visual C++ 的 Windows 7 64 位系统，请选择“否”。否则，请选择“是”。\n\n![images](img/0601.jpg)\n\
  \n***图 6-1.** Beckon 安装程序最后但棘手的弹窗。*\n\n### 激活 Beckon\n\nBeckon SDK 受许可证保护；您有 3 天时间激活许可证。运行\
  \ `Tracking Viewer` 工具，根据您的许可证权限激活软件。您可以在“开始”菜单中找到该工具：开始 -> Omek Beckon -> Tracking\
  \ Viewer。不过，请先不要运行它。\n\n首先，插入您的 Kinect 设备。驱动程序安装是验证过程的一部分。\n\n现在运行 `Tracking Viewer`。Beckon\
  \ 将引导您完成验证过程。您会看到一个弹出通知，告知 Kinect 驱动程序正在安装。您会看到 Xbox NUI Audio 驱动程序安装失败。这完全正常，并且表明到目前为止您所做的一切都是正确的。\n\
  \n![images](img/square.jpg) **注意** 如果需要更多帮助，Omek Beckon SDK 安装指南提供了简单的分步指南。\n\n\n\
  \n### 快速入门\n\n现在，我们来检查安装是否成功。Beckon 安装包中包含一个示例应用程序，可用于测试安装是否成功。从“开始”菜单启动“Omek BeckonTracking\
  \ Viewer”。\n\n**注意**：可执行文件位于以下文件夹中：`C:\\Program Files\\Omek\\Beckon SDK\\bin\\Omek\
  \ Beckon Tracking Viewer.exe`。\n\n在 Omek Beckon Tracking Viewer 中，选择：`Open -> Live\
  \ Camera`。如果一切安装正确，您将看到类似于图 6-2 的画面。\n\n![images](img/0602.jpg)\n\n***图 6-2.** Omek\
  \ Beckon 跟踪查看器*\n\n### 将 Beckon 与 Flash 集成\n\n现在，让我们在 Flash 中使用 Beckon SDK。再次说明，Flash\
  \ 与 Beckon 结合可创建独立应用程序，而非浏览器体验。Beckon 无法在带 Flash 的浏览器中或在线运行；您实际上不能将 Beckon 作为 Flash\
  \ 库安装，或将其作为`.swc` 文件加载。不过，据传闻，这是最后一个不含嵌入式解决方案的 Beckon 版本。Beckon 的工作方式有所不同：它通过 Flash\
  \ 的 `ExternalInterface` 与 Flash 协同工作。您创建自己的 Flash 文件并暴露一些函数，这些函数将与 Beckon SDK 通信。Beckon\
  \ 还有一个名为 `OmekBeckonFlash.exe` 的应用程序，它在运行的 swf 文件和 Beckon 库之间进行通信。Beckon 使用一个名为\
  \ `config.xml` 的 XML 文件，来告知 BeckonFlash 应用程序在何处寻找要运行的 swf，并设置一些初始启动参数。\n\n要运行 Beckon\
  \ Flash 示例，请执行以下操作：\n\n1.  为项目新建一个文件夹（例如 `C:\\MyProject`）。\n2.  将必要文件从 `C:\\Program\
  \ Files\\Omek\\Beckon SDK\\bin` 复制到 `C:\\MyProject`。您可以按照开发者指南中“分发基于 Omek 的内容”下的说明操作，或者简单地将\
  \ `bin` 文件夹中的所有内容复制到您的项目文件夹中。\n3.  将 `C:\\Program Files\\Omek\\Beckon SDK\\samples\\\
  Flash` 复制到 `C:\\MyProject`。请确保将目标文件夹命名为 `Flash`，首字母 `F` 大写。\n4.  运行 `OmekBeckonFlash.exe`。\n\
  5.  现在 Flash 示例 `.swf` 会在此应用程序中打开，并且它将链接到 Omek SDK 运行。\n\n此时，您应该会看到类似 图 6-3 的画面。这并非浏览器，而是一个独立的应用程序。\n\
  \n![images](img/0603.jpg)\n\n***图 6-3.** 在 OmekBeckonFlash.exe 中运行的默认独立 Flash 示例*\n\
  \n以下是 Beckon 与 Flash 通信的方式：\n\n1.  `OmekBeckonFlash.exe` 加载 `Flash/config.xml`（您必须保留此文件名）。\n\
  2.  Flash 项目会根据 `config.xml` 中 `<movie swfPath=\".\\Flash\\game.swf\" />` 标签指定的路径加载。\n\
  3.  加载 SDK，并使用 `.swf` 文件中暴露的函数，将数据发送到正在运行的 `.swf` 文件。\n\n现在您应该已经可以成功运行 Beckon SDK\
  \ 了。\n\n![images](img/square.jpg) **注意**：Omek 正在简化运行 Flash 应用程序的流程，因此预计会有改进。预计会看到快速更新、快速变动和创新。\n\
  \n### 理解 Beckon Flash 示例\n\n在我们创建自己的 Flash 文件之前，先来探索一下 Beckon Flash 示例。通过理解 Beckon\
  \ 示例的工作原理，您将能够从零开始创建一个项目。\n\n#### Beckon 如何与 Flash 协同工作\n\n在我们甚至打开 Flash 之前，我们先对两行代码进行一次基本的剖析，以便掌握\
  \ Beckon 如何与 Flash 协同工作。如果您习惯使用 Flash，您可能已经熟悉 `ExternalInterface.callback()` 类。使用\
  \ `ExternalInterface` 类，您可以在 Flash 运行时环境中调用 ActionScript 函数。通常，这个类用于让正在运行的 swf 文件与浏览器中的\
  \ JavaScript 进行通信。然而，在本例中，Beckon 使用一个额外的应用程序 `OmekBeckonFlash.exe` 来在其中运行 swf 文件。由于函数在\
  \ `.swf` 文件中被暴露出来，因此 OmekBeckonFlash 应用程序可以将 SDK 发送的信息传递给它们。\n\n我们将查看 `ExternalCallback`\
  \ 类的两个关键方法。第一个是 `.addCallback`。此方法将 ActionScript 方法注册为可从容器 swf 调用。\n\n以下是 Flash\
  \ 文件中的完整代码行：\n\n```\nExternalInterface.addCallback(\"OmekGesture\", onOmekGesture);\n\
  ```\n\n这个 `addCallback` 方法将 `onOmekGesture` 暴露给 SDK。\n\n下一个方法调用将参数从 `.swf` 文件传递到\
  \ `OmekBeckonFlash` 应用程序。这个调用建立了 Flash 与 Beckon 之间的双向通信。它还告诉 `OmekAddGesture` 函数，如果在摄像头视野中执行了\
  \ `leftPush` 手势，则注册该手势。以下是相关的代码行：\n\n```\nExternalInterface.call(\"OmekAddGesture\"\
  ,\"leftPush\");\n```\n\n现在我们已经了解了 Beckon 如何与 Flash 协同工作，让我们来看看实际的 Flash 文件。在 Flash\
  \ 中打开 `C:\\MyProject\\Flash\\testOmekFlashPlayer`。您会看到当我们启动 `OmekBeckonFlash.exe`\
  \ 文件时运行的初始界面。那是因为界面的一部分是在 Flash 中创建的。请注意，没有为 RGB 视频流或深度图预留的方框。这是因为这些元素是通过 `config.xml`\
  \ 文件添加到文件中的。Beckon 同时使用 Flash 和这个文件来设置 `OmekBeckonFlash` 应用程序的启动参数。\n\n您可以稍微修改代码，以帮助理解所发生的事情。首先，调整舞台上标记为\
  \ `debugString_txt` 的文本框大小，以便在 `BeckonFlash.exe` 运行 swf 文件时，能够真正看到其中显示的所有调试代码。将其大小调整为整个舞台大小，并将文本大小设为约\
  \ 10pt。您还可以继续将其文字颜色设为白色。现在，将背景色设为黑色以便于阅读。保存并导出应用程序。\n\n现在再次运行示例。移动身体，您将看到所有调试文本都显示在屏幕上，如\
  \ 图 6-4 所示。\n\n![images](img/0604.jpg)\n\n***图 6-4.** 在 OmekBeckonFlash.exe 中运行的修改后的独立\
  \ Flash 示例*\n\n使用 Flash 和 Beckon 最大的困难在于失去了控制台窗口。您可以使用原始方法，在屏幕上放一个文本框并向其发送消息，但一种更干净的方法是在屏幕上获取调试文本，即创建一个通过\
  \ Actionscript 绘制调试文本的函数。\n\n注意示例现在如何反映上述更改。我通过执行手势或在屏幕上触发警报显示，触发了文件中的几个函数。尝试做出类似动作，比如靠近\
  \ Kinect 或走出视野。您现在会看到所有新行都被写入屏幕。它们之前就在那里，但因为文本框太小，您看不到调试文本的显示。现在您可以轻松地在 `debugString_txt`\
  \ 文本框中看到它们。\n\n我在图 6-4 中执行了“右击”手势。执行这个手势，只需在右手稍微抬起至胸前高度时，快速做一个类似双击的轻拍动作。这与你轻拍坐在你正前方的人的肩部动作相同。调试文本显示此手势已被摄像头捕捉并注册。接着，我故意靠摄像头太近，触发了\
  \ `Alert_TooClose` 警报。\n\n`debugString_txt` 文本框之所以重要，是因为当您在第三方应用程序中运行 swf 时，您会失去对\
  \ Flash 中普通控制台窗口的访问。创建在屏幕上显示的消息以进行调试，是您在使用 Beckon 时必须适应的一个根本性变化。处理此问题的一个聪明方法是，在您的应用程序中创建一个调试模式，您可以通过按键触发来开启或关闭屏幕上的警报。\n\
  \n\n\n#### 示例代码\n\n现在，我们来看看 Beckon 的 Flash 示例代码。要查看代码，请打开“动作”面板，查看时间轴第一帧上的 ActionScript。\n\
  \n![images](img/square.jpg) **注意** 从菜单中选择“窗口”>“动作”即可查看动作面板。\n\n你应该会在代码顶部看到一个 `import`\
  \ 语句。在你使用 Beckon SDK 创建的每一个 Flash 应用程序中，都需要导入以下类：\n\n```\n  import flash.external.ExternalInterface;\n\
  ```\n\n接下来是暴露特定函数给 `swf` 文件的 `ExternalInterface` 代码。第一步始终是将函数暴露给 Flash 运行时环境。第二步是可选的，通过\
  \ `ExternalInterface.call` 方法发送消息来设置功能。最后一步则是设置暴露出来的函数。\n\n无可讳言，这种暴露函数的过程感觉像是权宜之计。毫无疑问，最好是\
  \ Omek 将 Beckon SDK 构建成 Flash 库的版本，这样就能轻松在线发布，或分发给其他使用 Kinect 的人。目前，你只能局限在运行着你特定版本\
  \ Beckon 的那一个系统上。希望这种情况在 Beckon SDK 的未来版本中会有所改变。\n\nActionScript 中的三个 `ExternalInterface.callback()`\
  \ 方法是必需的，必须在每个打算使用 Beckon 的文件中实现。每个方法都集成了一些基本功能。我们将回顾这三个必需的方法以及它们暴露的函数。其他方法都是可选的，但本章介绍的这三个是必要的。\n\
  \n我们讲解这三个方法的顺序与它们在 ActionScript 文件中被使用的顺序不同。我们之所以采用这种顺序，是为了能够更清晰地解释代码。我们会通过行号来引用\
  \ ActionScript 代码，以便尽量让讨论易于理解。\n\n第 8 行通过在 Flash 运行时中暴露 `onOmekGesture` 函数来处理手势识别。\n\
  \n```\nExternalInterface.addCallback(\"OmekGesture\", onOmekGesture);\n```\n\n接下来要看的方法是第\
  \ 56 行。这个方法让 SDK 注册 `leftPush` 手势。这个手势是 SDK 中包含的一个手势。用户想要检测的每个手势都必须在这里列出，包括自定义手势。\n\
  \n```\n        ExternalInterface.call(\"OmekAddGesture\",\"leftPush\");\n```\n\n\
  现在，回顾一下第 106 行暴露的函数 `onOmekGesture`。\n\n```\nfunction onOmekGesture(gestureName:String,\
  \ playerLabel:String):void\n{\n        debugString_txt.appendText(\"\\nOmekGesture:\
  \ \" + gestureName + \":\" + playerLabel);\n}\n```\n\n这个函数可以从 SDK 接收两个字符串。第一个是接收到的手势名称，第二个是玩家的标签。Beckon\
  \ 可以追踪多个玩家，并在它们之间轻松切换。它最多支持 5 个玩家。它还可以追踪无限数量的所谓候选者（或潜在玩家）。\n\n#### 骨骼数据\n\n接下来，我们看看如何将骨骼数据获取到\
  \ Flash 中。第 9 行暴露了函数 `onOmekJointPosition`：\n\n```\nExternalInterface.addCallback(\"\
  OmekJointPosition\", onOmekJointPosition);\n```\n\n你必须列出你想要接收的每一个关节，但不是在 Flash 文件中。打开\
  \ `Config.html` 文件。该文件位于此文件夹中：`C:\\MyProject\\Flash`。打开文件，注意其中的 `<tracking>` 标签。其内容应如下所示：\n\
  \n```\n<tracking>\n                <skeleton rawSkeleton=\"true\"/>\n          \
  \      <joint name=\"rightFingerTip\" screen=\"false\" smooth=\"true\"/>\n     \
  \           <joint name=\"leftFingerTip\" screen=\"false\" smooth=\"true\"/>\n \
  \               <joint name=\"torso\" screen=\"false\" smooth=\"true\"/>\n</tracking>\n\
  ```\n\n这个 `<tracking>` 标签注册了所有要追踪的关节。你*必须*列出你想要追踪的每一个关节。在这个例子中，只追踪了左右指尖和躯干。由于这个标签已经在这个\
  \ xml 文件中预先设置了关节，因此无需使用 `.call` 向 SDK 发送消息。\n\n#### 关节位置\n\n现在让我们看看 `onOmekJointPosition`\
  \ 函数。它接收关节名称、与该关节关联的 `playerLabel` 以及该关节在空间中的 X、Y、Z 位置。以下是示例中的代码：\n\n```\nfunction\
  \ onOmekJointPosition(jointName:String, playerLabel:String, jointX:String, jointY:String,\
  \ jointZ:String, confidence:String):void\n{\n//将鼠标控制权交给一个特定的玩家。\nif(playerLabel\
  \ == \"0\")\n{\n  if(jointName == \"leftFingerTip\")\n  {\n  //镜像 X 值，使鼠标像手一样左右移动。\n\
  \  leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;\n\
  \  leftFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;\n\n  //debugString_txt.appendText(\"\
  \\nleftFingerTip_mc located at:\n  //(\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
  )\");\n  }\n  if(jointName == \"rightFingerTip\")\n  {\n  rightFingerTip_mc.x =\
  \ stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;\n  rightFingerTip_mc.y\
  \ = Number(jointY) * _screenScaleY + _correctionY;\n  }\n  }\n}\n```\n\n这个函数将控制权交给玩家\
  \ 0，并将圆形图形影片剪辑 `leftFingerTip_mc` 和 `rightFingerTip_mc` 连接到每只手最长的手指指尖点。该函数还会将这些关节的位置打印到舞台上的\
  \ `debugString_txt` 框中。\n\nBeckon 可以追踪多个玩家，并为每个玩家分配一个编号。第一个玩家是玩家 0。\n\n#### 警报\n\
  \n最后一个必需的功能是处理警报。在第 10 行，注意函数 `onOmekAlert` 已被暴露给 Flash 运行时环境：\n\n```\nExternalInterface.addCallback(\"\
  OmekAlert\", onOmekAlert);\n```\n\n你想要监听的每一个警报也必须通过 `.call` 方法发送给 SDK。在第 62-79 行，一系列可用的警报监听器被发送给\
  \ SDK，每个监听器附带相应的监听消息，从下面这行开始：\n\n```\nExternalInterface.call(\"OmekAddAlert\",\"\
  Alert_CalibrationDone\");\n```\n\n现在我们来看看暴露出来的 `onOmekAlert` 函数以及它的功能：\n\n```\n\
  function onOmekAlert(alertName:String, playerLabel:String):void\n{\ndebugString_txt.appendText(\"\
  \\nOmekAlert: \" + alertName + \":\" + playerLabel);\n\nif (alertName ==\"Alert_CalibrationDone\"\
  ){\n//只有在 Alert_CalibrationDone 之后，OmekGetBodyDimensions 才会返回正确的值\n  ExternalInterface.call(\"\
  OmekGetBodyDimensions\",\"0\");\n  //请求特定玩家的身体补偿数据。将返回值传递给 ExternalInterface.addCallback(\"\
  OmekGetCompensationData\", onOmekGetCompensationData);\n  ExternalInterface.call(\"\
  OmekGetCompensationData\",\"0\");\n} else if (alertName == \"Alert_CalibrationBegun\"\
  ){\n  ExternalInterface.call(\"OmekGetBodyDimensions\",\"0\");\n  //请求特定玩家的身体补偿数据。将返回值传递给\
  \  \n  //ExternalInterface.addCallback(\"OmekGetCompensationData\", onOmekGetCompensationData);\n\
  \  ExternalInterface.call(\"OmekGetCompensationData\",\"0\");\n}\n```\n\n这个函数处理几个警报。对于每个警报，它只是将文本打印到\
  \ `debugString_txt` 字段。这里没有发生什么特别的事情。将来这个函数的一个实用用途是在屏幕上显示玩家警告信息。\n\n\n\n#### 核心功能\n\
  \n至此，我们已经完成了设置 Beckon Flash 集成所需的代码。在了解了最基本的设置后，让我们来看看我们讨论过的功能是如何集成到示例中的。首先，代码会检查传感器是否已连接并就绪。如果传感器已准备好使用且所有连线均正确，则所有相关查询将被发送到\
  \ SDK。此过程从第 21 行开始，通过一个每帧运行的 `addEventListener` 来检查传感器是否就绪。以下是从第 21 行开始的相关代码：\n\n\
  ```actionscript\n//wait for connecting to the sensor before querying it.\naddEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n\
  function checkIfSensorReady(e:Event):void\n{\n//ask if the sensor is ready to receive\
  \ queries. return a value to\n//ExternalInterface.addCallback(\"OmekIsSensorConnected\"\
  , onOmekIsSensorConnected);\nExternalInterface.call(\"OmekIsSensorConnected\",\"\
  \");\n}\n```\n\n请注意下一个函数 `onOmekIsSensorConnected`，它现在已暴露给 SDK，并且 SDK 中的 `OmekIsSensorConnected`\
  \ 函数通过 `.call` 触发，并接收 `false` 或 `true`。\n\n`onOmekIsSensorConnected` 函数从 SDK 接收一个字符串。如果该字符串是\
  \ `true`，则执行 `sendQueriesToSensor` 函数。\n\n```actionscript\n/**\n * function returns\
  \ true or false if the sensor is connected.\n *\n * connected : boolean (as a string)\
  \ \"true\" or \"false\", marking if the sensor is ready\n */\nfunction onOmekIsSensorConnected(connected:String):void\n\
  {\n  if ( connected==\"true\" )\n  {\n    removeEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n\
  \    sendQueriesToSensor();\n  }\n}\n```\n\n接下来是 `sendQueriesToSensor` 函数。该函数会向\
  \ SDK 发送所有调用消息。（`sendQueriesToNSensor` 还会暴露一些其他函数）。这一点很重要，因为这些调用包括所有需要追踪的手势以及所有需要发送的警报消息。例如：\n\
  \n```actionscript\nfunction sendQueriesToSensor():void\n{\n  //设置传感器追踪的玩家数量\n  ExternalInterface.call(\"\
  OmekSetMaxPlayers\",\"2\");\n  //请求当前追踪的玩家数量。将返回值发送到\n  //ExternalInterface.addCallback(\"\
  OmekGetMaxPlayers\", onOmekGetMaxPlayers);\n  ExternalInterface.call(\"OmekGetMaxPlayers\"\
  ,\"\");\n\n  //设置传感器的追踪模式： \"all\", \"basic\", \"upper\", 或 \"sitting\"\n  ExternalInterface.call(\"\
  OmekSetTrackingMode\",\"all\");\n  //请求当前的追踪模式。将返回值发送到\n  //ExternalInterface.addCallback(\"\
  OmekGetTrackingMode\", onOmekGetTrackingMode);\n  ExternalInterface.call(\"OmekGetTrackingMode\"\
  ,\"\");\n\n  //为传感器添加特定手势监听器（完整手势列表请参阅文档）\n  ExternalInterface.call(\"OmekAddGesture\"\
  ,\"leftPush\");\n  ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");\n\
  \  ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");\n  //移除传感器的特定手势监听器\n\
  \  ExternalInterface.call(\"OmekRemoveGesture\",\"leftPush\");\n\n  //为传感器添加特定警报监听器（完整警报列表请参阅文档）\n\
  \  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CalibrationDone\");\n  ExternalInterface.call(\"\
  OmekAddAlert\",\"Alert_CalibrationBegun\");\n  ExternalInterface.call(\"OmekAddAlert\"\
  ,\"Alert_TooClose\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_TooFar\"\
  );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CloseToSide\");\n  ExternalInterface.call(\"\
  OmekAddAlert\",\"Alert_OutOfFrame\");\n  ExternalInterface.call(\"OmekAddAlert\"\
  ,\"Alert_GoodLocation\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CloseToWall\"\
  );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodBackground\");\n  ExternalInterface.call(\"\
  OmekAddAlert\",\"Alert_PlayerEnters\");\n  ExternalInterface.call(\"OmekAddAlert\"\
  ,\"Alert_PlayerLeaves\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodFrameRate\"\
  );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_LowFrameRate\");\n  //移除传感器的特定警报监听器\n\
  \  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodLocation\");\n  ExternalInterface.call(\"\
  OmekRemoveAlert\",\"Alert_GoodFrameRate\");\n  ExternalInterface.call(\"OmekAddAlert\"\
  ,\"Alert_CloseToWall\");\n\n  //请求当前工作目录。将返回值发送到\n  //ExternalInterface.addCallback(\"\
  OmekGetWorkingDir\", onOmekGetWorkingDir);\n  ExternalInterface.call(\"OmekGetWorkingDir\"\
  ,\"\");\n  //请求传感器的属性。将返回值发送到\n  //ExternalInterface.addCallback(\"OmekGetSensorProperties\"\
  , onOmekGetSensorProperties);\n  ExternalInterface.call(\"OmekGetSensorProperties\"\
  ,\"\");\n  //请求特定玩家的身体尺寸。将返回值发送到\n  //ExternalInterface.addCallback(\"OmekGetBodyDimensions\"\
  , onOmekGetBodyDimensions);\n  ExternalInterface.call(\"OmekGetBodyDimensions\"\
  ,\"0\");\n\n  //获取 rgb、深度或玩家遮罩\n  ExternalInterface.addCallback(\"OmekShowImage\"\
  , onOmekShowImage);\n  ExternalInterface.addCallback(\"OmekGetImageResolution\"\
  , onOmekGetImageResolution);\n  //请求 xml 中 rgb 图像的分辨率。将返回值发送到\n  //ExternalInterface.addCallback(\"\
  OmekGetImageResolution\", onOmekGetImageResolution);\n  ExternalInterface.call(\"\
  OmekGetImageResolution\",\"\");\n\n}\n```\n\n### 修改 Beckon Flash 示例\n\n现在，在开始创建我们自己的示例之前，我们先在这个示例中添加一些内容。让我们追踪一个新关节：头部。\n\
  \n首先，我们需要让 Beckon 知道我们希望在 Flash 运行时环境中接收头部关节。为此，我们需要修改 `config.xml` 文件，使其与以下代码一致：\n\
  \n`C:\\MyProject\\Flash\\config.xml`\n```xml\n<tracking>\n                <skeleton\
  \ rawSkeleton=\"true\"/>\n                <joint name=\"rightFingerTip\" screen=\"\
  false\" smooth=\"true\"/>\n                <joint name=\"leftFingerTip\" screen=\"\
  false\" smooth=\"true\"/>\n                <joint name=\"torso\" screen=\"false\"\
  \ smooth=\"true\"/>              \n                <joint name=\"head\" screen=\"\
  false\" smooth=\"true\"/>\n</tracking>\n```\n\n通过修改 `testOmekFlashPlayer.fla` 文件中从第\
  \ 164 行开始的 `onOmekJointPosition` 函数，将头部追踪添加到示例中。以下是您应创建的新版本函数：\n\n```actionscript\n\
  function onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,\
  \ jointY:String, jointZ:String, confidence:String):void\n{\n//将鼠标控制权交给特定玩家。\nif(playerLabel\
  \ == \"0\")\n{\nif(jointName == \"head\") {\n\n  myHead.x = stage.stageWidth - Number(jointX)\
  \ * _screenScaleX + _correctionX;\n  myHead.y =Number(jointY) * _screenScaleY +\
  \ _correctionY;\n\n}\nif(jointName == \"leftFingerTip\")\n{\n  //镜像 X 值，使鼠标像手一样左右移动。\n\
  \  leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + _correctionX;\n\
  \  leftFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;\n\n  //debugString_txt.appendText(\"\
  \\nleftFingerTip_mc located at: (\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
  )\");\n}\nif(jointName == \"rightFingerTip\")\n{\n  rightFingerTip_mc.x = stage.stageWidth\
  \ - Number(jointX) * _screenScaleX + _correctionX;\n  rightFingerTip_mc.y = Number(jointY)\
  \ * _screenScaleY + _correctionY;\n}\n}\n}\n```\n\n最后，导出并运行 `OmekBeckonFlash.exe`。您应该会看到影片剪辑的头部追踪已启用并正常工作，如图\
  \ 6-5 所示。\n\n![images](img/0605.jpg)\n\n***图 6-5.** Beckon 追踪新增的头部关节*\n\n\n\n###\
  \ 设计自定义手势\n\n手势设计为用户体验打开了一扇全新世界的大门，而这个世界才刚刚开始被创造。当你开始设计手势时，需要牢记一些基本原则。以下是七条设计策略，助你入门：\n\
  \n1. 首先，手势应与用户需要执行的操作产生关联。想想 iPhone 上流行的用于缩放照片的“捏合缩放”手势。它非常直观，堪称出色手势设计的典范。放大或缩小图像的动作十分自然，并能以一种更有机的方式将人们与他们的照片连接起来。\n\
  \n![图片](img/square.jpg) **提示** 你的应用或游戏的最佳手势是什么？当然，最佳手势是那些无需用户手册、几乎不用解释就能理解的手势。让人们在完全未接触过你的项目的前提下尝试使用你的界面，就能立刻判断设计是否奏效。用户能否自然地理解你的界面，还是需要停下来询问该如何操作？你的界面是否足够友好、具有吸引力，让用户敢于直接尝试，还是让人望而生畏？几次失败的操作就可能破坏用户对界面的初始印象。如果界面持续以出乎意料的方式响应，用户很可能会彻底放弃使用。\n\
  \n2. 第二条手势设计经验法则是考虑用户的舒适度和身体因素。身体需要适应机器的时代已经结束了。我一直感到疑惑，为什么在科技突飞猛进一百多年后，我们依然在使用类似于华丽打字机的设备。我们的\
  \ QWERTY 键盘除了让成千上万的用户患上重复性劳损、腕管综合征和背痛之外，毫无益处。舒适易用的界面才能长期获得成功。值得庆幸的是，借助多点触控和计算机视觉来创造用户体验，我们不再需要依赖旧有的模式来构建交互模型。简而言之，如果设计会带来疼痛，那就不要做——也不要要求你的客户和用户去做。\n\
  \n3. 第三，设计时要考虑基本的人类心理学。将手臂举向天空通常让人感到振奋，而跪下则带有祈祷和屈服的含义。例如，如果你想让人在玩你的游戏时感到快乐，明智的做法是阅读简·麦戈尼格尔的《游戏改变世界》*Reality\
  \ is Broken*。她记录了在游戏中创造积极情绪的许多策略，其中最常用的一种是触摸他人。人类接触会在大脑中释放大量催产素。催产素是一种与在大脑中创造幸福感密切相关的化学物质。基于手势的\
  \ SDK 能够实现玩家互动，因此触摸是一种非常简单的方法，可以在玩家中激发积极情绪、建立纽带和连接感。\n\n4. 第四，要善于利用并发展已有的手势惯例。绝对没有理由忽视用户从其他平台或交互模式中已熟悉的手势。借鉴这些手势，并使它们为你正在设计的界面服务。设计的核心在于建立在现有范式之上，而优秀的设计则能推动设计对话向前发展。\n\
  \n5. 第五，不要违反用户从现实世界或其他界面中习惯的交互模式。游戏玩家习惯了拿起剑的概念，并且他们对于如何握持和挥舞剑有特定的预期。设计时要考虑到这种模式。使用带有手臂挥动的手势，可以实现更有趣、更逼真的剑术对决。\n\
  \n6. 第六，交互模式不应与其所处的世界相冲突。例如，如果玩家在游戏中将剑背在背上，就不要让玩家通过一个界面来获取那把武器。只需允许他们伸手从背后拿下来即可。否则，你就会设计出相互矛盾、令人困惑的交互，用户将难以凭直觉理解。\n\
  \n7. 最后，界面和手势应该作为一个整体协同工作。用户应该能够轻松把握用户体验设计的整体性，并能快速、轻易地将其传达给新用户。不要在交互过程中途将用于某个任务的手势更改为另一个手势。考虑让用于相似体验的手势在设计中保持关联性。\n\
  \n在这一领域，可以从瑜伽、神经学和物理治疗等领域学到很多东西。这三个领域都对身心连接进行了广泛的探索。人类身体做出的各种姿态会唤起怎样的情绪？哪些手势会触发我们大脑中的哪些化学物质？镜像神经元将如何影响群体体验设计？毫无疑问，你为设计添加的手势将对可用性产生巨大影响。\n\
  \n\n\n### 向 SDK 添加新手势\n\n在 Beckon 中，我们可以通过完全无需编码的图形用户界面来创建、编辑和添加手势。我们将创建一个 SDK 中尚未存在的全新手势，并从\
  \ Flash 示例中调用它。为此，我们需要在传感器前多次记录自己执行该手势的动作。执行手势时，你需要通过将身体摆成该手势对应的姿势来做出姿态。我们将多次摆出姿势，以便机器学习环境拥有可供分析和学习的样本。每次记录的姿势都被视为一个样本。这些样本会被组合成该手势的分类器。Beckon\
  \ 将视频剪辑片段称为序列。一个序列就是一个人执行手势的一段录制内容。一旦 Beckon 能够良好地识别手势，我们就会在 Flash 中为这个新手势添加一个监听器。当我们执行该手势时，如果一切顺利，手势名称将出现在舞台上的\
  \ `debugString_txt` 文本框中，以告知我们它已被识别。要完成整个流程，我们需要使用三个工具：\n\n- 第一个工具是 Omek Beckon\
  \ 手势组织器，它让我们仅以名称形式将手势添加到 SDK 中。\n- 第二个应用程序是手势工具箱，它使我们能够选择手势，以便录制示例。我们通过 Kinect 摄像头录制示例。录制多个示例。一旦有了几个正面示例，我们也要录制几个负面示例。之后，我们将进入每个文件并标记每次录制，通过标注来告知\
  \ Beckon 正确执行手势的位置。任何未标记的剪辑片段或片段区域都将被作为负面示例进行分析。\n- 最后，我们启动第三个应用程序——手势学习器，并告知它我们的示例所存放的位置。我们还会告诉它一些关于手势识别目标的信息。手势学习器将分析我们的剪辑片段并为其评级。任何低于\
  \ 0.96 的评级都应促使我们返回手势工具箱获取更多正面和负面示例。理想情况下，我们希望评级为 1。\n\n基于本章示例的目的，我没有包含来自不同人员的测试手势录制内容。理想情况下，您应该录制这些类型的手势，并根据测试示例对您的示例进行评级，以确保您能在多种数据源中获得良好的识别效果。这是一个易于添加的步骤，Beckon\
  \ SDK 中提供了教程链接，可指导您完成此操作。\n\n让我们开始吧。首先，我们需要了解 Beckon 如何将手势分组到它称为分类器的手势组中。再次说明，分类器只是一组完全相同的、将一起进行分析的手势录制内容。这些序列最终将为机器学习环境描述该分类器。我们需要进入\
  \ SDK 中的 Classifier 文件夹，并为我们的新手势添加一个新文件夹。打开该文件夹，路径应如下所示：\n\n`C:\\Beckon SDK\\bin\\\
  Classifiers`\n\n注意，那里有两个现有文件夹：`GuiGesturePack` 和 `BasicGesturePack`。它们包含 Beckon\
  \ 自带的手势。我们添加一个文件夹并将其命名为 `gameGestures`。在该文件夹中，我建议为每个新手势创建一个新文件夹。现在，我们只创建一个名为 `leftHandUp`\
  \ 的文件夹。完整路径和名称应为：\n\n`C:\\Beckon SDK\\bin\\Classifiers\\gameGestures\\leftHandUp`\n\
  \n现在，在 `leftHandUp` 中创建一个名为 `examples` 的文件夹：\n\n`C:\\Beckon SDK\\bin\\Classifiers\\\
  gameGestures\\leftHandUp\\examples`\n\n最后，再添加一个文件夹，用于在手势训练完成后存放输出内容：\n\n`C:\\Beckon\
  \ SDK\\bin\\Classifiers\\gameGestures\\leftHandUp\\output`\n\n现在，启动三个图形界面之一，并添加您的手势。启动手势组织器，您可以在以下位置找到它：\n\
  \n`C:\\Beckon SDK\\bin\\OmekGestgureOrganizer.exe`\n\n启动手势组织器后，执行以下步骤：\n\n1. 单击“添加”按钮，并填写“添加手势”对话框，具体如下：`包\
  \ (gameGestures)`、`文件 (leftHandUp)`、`手势 (leftHandUp)` 和 `类型`（使用“已训练”）。在本教程中，无需修改其他字段。\n\
  2. 单击“创建”按钮，添加此手势及其包。\n3. 单击手势组织器菜单中的“保存”按钮，以应用这些更改。\n\n现在，您的手势已经存在于 SDK 中，并且生成了一个\
  \ `.xml` 文件。当然，它现在还不能工作，但它将出现在用于标记序列的工具中（图 6-6）。\n\n![插图](img/0606.jpg)\n\n**图 6-6.**\
  \ 添加了 `leftHandUp` 手势的手势组织器。\n\n![插图](img/square.jpg) **注意** 有关手势组织器中不同选项的更多信息，请参阅\
  \ `docs` 文件夹中的《手势训练手册》。\n\n### 录制手势\n\n既然您已经添加了新手势，现在可以录制它了。让我们打开手势工具箱，这是我们用来录制手势的应用程序。录制手势的目的是让\
  \ Beckon 能够在用户面对传感器执行该手势时进行识别。\n\n通过查找并双击以下可执行文件来运行手势工具箱：\n\n`C:\\Beckon SDK\\bin\\\
  OmekGestgureToolbox.exe`\n\n此应用程序中有几个选项卡。我们将从“录制器”选项卡开始，然后在下一部分进入“标记”选项卡。\n\n提醒一句：手势工具箱的界面可能使用起来不够流畅。文件的名称会在查看器中被截断。别担心；您创建的每个剪辑都会被保存，但您需要按方向键才能看到每个剪辑的名称。在剪辑名称获得焦点时按右箭头键即可。您可以逐个字母地浏览，但无法展开字段。\n\
  \n剪辑会自动按数字顺序排列，但很容易忘记当前的位置。因此，我建议您列出哪些是正面示例，哪些是负面示例。这会对以后的工作有所帮助。正面示例是执行手势的视频录制。负面示例则是身体做出任何动作，但并非所要训练的手势的录制。这些负面示例有助于描述手势“不是”什么。正面示例则告诉机器学习系统手势“是”什么。\n\
  \n请按以下步骤录制一些手势示例：\n\n1. 在“录制器”选项卡中，选择“examples”文件夹作为输出文件夹，并设置所需的帧数（通常介于 200 到 500\
  \ 帧之间）。\n2. 按下“录制”按钮，录制某人执行所需手势的序列。我们称之为正面示例，因为它展示了应被检测为训练手势的动作。当您自己执行手势时，请在开始录制前勾选“倒计时”选项。确保稍微动一动。您应该会看到每个关节点出现小圆点。如果看不到小圆点，说明您没有获取到关节点数据。\n\
  3. 以同样的方式添加更多序列。至少添加 3 到 4 个。建议在保持姿势时稍微移动一下。不要僵直地站着。如果这样，您将永远看不到关节点被注册。可以轻微地左右摇晃，转移身体重心。\n\
  4. 同时录制一些您没有做该手势的负面示例。这对于之后训练系统时成功识别手势非常重要。\n\n对于训练序列，请尽量清晰地执行手势，不要与其他手势混合。对于“姿势”手势（如本例所示），您可以在序列的大部分时间内持续保持所需姿势，同时调整姿势的风格和位置。\n\
  \n\n\n### 标记手势\n\n当您为某个手势录制了多个片段后，必须告知 SDK 哪些片段代表了您想要检测的优质手势版本。具体做法是：在录制内容中标记手势发生的位置。这些标记好的片段将用于训练分类器。请注意，SDK\
  \ 也会分析未标记的部分，并将其视为负面样本，因此务必准确选中所有手势正确执行的帧。\n\n以下是标记手势的流程：\n\n1.  转到“标记”选项卡，并打开您录制的视频序列。视频序列将被加载并显示在中间窗口中。\n\
  2.  播放该片段，确保手势按预期执行，并且对玩家的追踪是正确的。如果出现问题，可以删除该片段并重新录制，或使用“跳过入点/出点”选项来忽略有问题的帧。\n3.\
  \  在左上角窗口的手势列表中，选择要标记的手势。在本例中，手势名为`leftHandUp`，位于`gameGestures`包中。展开该包并点击手势名称即可选中。\n\
  4.  查看视频序列，并使用“标记入点”和“标记出点”按钮标记手势。\n5.  对所有包含正面样本的录制视频序列重复上述步骤。\n\n对于您的负面样本，请加载片段，确保已选中目标手势，然后保存。请注意图\
  \ 6-7 中序列名称后面带有省略号（即三个点）的高亮按钮。这个无名且仅带有点的按钮，是用来打开文件浏览器的。进入您保存手势的文件夹，您将看到按编号排列的片段列表。还记得我之前提到要记录哪些表演是负面样本吗？现在需要加载视频片段时，知道哪些是负面样本会非常有帮助。选择一个负面样本，它会打开。您可以使用常规的视频控件播放该片段，并按照标记正面序列的完全相同步骤来标记负面序列。\n\
  \n![图片](img/0607.jpg)\n\n***图 6-7.** Omek Beckon 手势工具箱，已选中“打开序列”按钮。*\n\n### 训练手势\n\
  \n录制和标记之后是训练阶段。在此阶段，您将使用手势学习器工具，基于录制的视频序列来训练手势。通过这一步，您可以判断自己在片段中执行手势的效果如何，或者是否需要返回并重复此前的流程。\n\
  \n首先，打开并执行 `GestureLearner`。双击以下可执行文件：\n\n```\nC:\\Beckon SDK\\bin\\Omek Beckon\
  \ Gesture Learner.exe\n```\n\n然后按照以下步骤操作：\n\n1.  转到“文件”选项卡并添加训练序列。点击“添加目录”按钮，选择“examples”文件夹，然后点击“确定”按钮。这将添加其中包含的所有序列。\n\
  \n![图片](img/square.jpg) **提示** 如果您将目标手势的序列保存在其他文件夹中，可以重复上一步并将其也添加进来。\n\n2.  现在设置“输出文件”选项。选择您之前创建的“output”文件夹。它将包含训练过程的所有输出结果。点击“确定”按钮。\n\
  3.  确保“包”字段显示的是您的新包名称（`gameGestures`）。\n4.  确认“分类器”字段中保存的是您在“手势组织器”中输入的文件名。该文件名应为\
  \ `leftHandUp.xml`。\n5.  转到“手势”选项卡并设置“每个手势的配置”选项。点击“手势”字段并选择目标手势（`leftHandUp`）。按下“添加”按钮将此手势插入到“活动手势”列表中。\n\
  \n至此，您已选择了将要训练的手势。有时您可能希望在一次训练过程中训练多个手势；在这种情况下，您可以重复步骤 1-5，逐一添加所需手势。\n\n该选项卡包含所有可在训练过程中修改的参数。解释所有这些参数已超出本教程的范围。我们将仅探讨几个示例，其余内容可参考《手势训练手册》。参数分为不同的组。在每个组中，您会看到一个名为“自动”的复选框。选中此选项表示学习器应自动寻找参数值。\n\
  \n按如下方式设置“高级”选项卡参数：\n\n> **手势类型。**在我们的示例中，训练的手势是一个姿势而非动作，因此我们将选中“姿势”选项。像跳跃或出拳这样的手势属于“移动”手势。让“自动”选项保持选中状态。\n\
  > \n> **数据处理。**保持选中“自动”选项。\n> \n> **关节**。首先，使用默认值（“自动”和“两者”）。之后，您可以更改这些值，看看它们如何影响结果。“上半身”将仅使用上半身进行训练，而“下半身”则仅使用下半身。选择“两者”将尝试使用所有身体关节。\n\
  > \n> **学习方法。**首次选择“快速”；这将使手势训练更快，以便您能快速看到一些结果。之后，尝试将此值更改为“最佳”以查看其影响。“快速”和“最佳”方法使用不同的选项，因此两种方法的结果可能不同。\n\
  \n设置完所有需要的参数后，就可以运行训练过程了。操作如下：\n\n1.  点击窗口底部的“添加”按钮，使用当前值添加一个训练任务。请注意，在下一步点击“运行”按钮之前，训练过程不会执行。\n\
  2.  点击“运行”按钮来运行列表中的所有任务。这些任务将按顺序（一个接一个）运行，每个任务完成后会立即显示其结果。\n3.  如果任务成功结束，将显示一个“成功”图标（勾选形状），并且该分类器的得分会显示在列表中。如果发生错误，则会显示一个“失败”图标（“X”形状）。\n\
  4.  双击包含任务名称的行，查看关于得分的更多详细信息。\n\n您可以同时运行多个训练任务，并且可以在当前任务运行的同时添加更多任务。只需返回之前的选项卡（文件、手势和高级），更改任意参数，然后添加一个新任务即可。请注意，由于算法应用了随机性，两次运行相同的参数可能不会得到相同的结果！有关训练选项的更多详细信息，请参阅《手势训练手册》。\n\
  \n![图片](img/square.jpg) **注意** 如果您已关闭学习器并想检索旧任务的参数，只需点击“文件”选项卡中的“加载”按钮，浏览到保存所需输出的文件夹，然后选择\
  \ XML 文件即可。\n\n\n\n### 测试手势\n\n按照前述方法创建的每个手势，都会生成并发布一个对应的分类器。正是这个分类器让你能够在 Flash\
  \ 中使用手势。发布分类器指的是将其添加到 SDK 中，就像我们为 `leftHandUp` 所做的那样。\n\n发布分类器后，你可能想用实况摄像头对其进行测试。以下是运行测试的方法：\n\
  \n1.  打开手势工具箱，进入查看器选项卡。\n2.  选择输入源（位于屏幕右下角）：\n    -   如需使用摄像头进行实况测试，请选择传感器选项。然后在下方菜单中选择摄像头类型。\n\
  \    -   如需使用序列，请选择序列选项。然后浏览找到该序列，或在下方文本框中输入其路径。\n3.  按下启动按钮以开始追踪执行。\n\n在手势显示区（屏幕左上角）选择目标手势。你可以选择多个手势。执行该手势。如果一切操作正确，你应该能看到手势被注册。请参见图\
  \ 6.8 中 `leftHandUp` 手势被成功追踪的示例。\n\n![images](img/0608.jpg)\n\n***图 6-8.** 选中查看器选项卡，手势已开启并被正确追踪。*\n\
  \n### 为 Flash 使用添加手势\n\n现在，我们可以将新手势添加到 Flash 文件的 ActionScript 中。第一步是向调用中添加手势监听器。找到以下代码块，并将粗体行添加到你的代码中：\n\
  \n`//为特定手势添加传感器监听器（有关可用手势的完整列表，请参阅文档）`\n`ExternalInterface.call(\"OmekAddGesture\"\
  ,\"leftPush\");`\n`ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");`\n\
  `ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");`\n`ExternalInterface.call(\"\
  OmekAddGesture\",\"leftHandUp\");`\n\n`//移除特定手势的传感器监听器`\n`ExternalInterface.call(\"\
  OmekRemoveGesture\",\"leftPush\");`\n`ExternalInterface.call(\"OmekRemoveGesture\"\
  ,\"rightClick\");`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"jumpNoHands\"\
  );`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"leftHandUp\");`\n\n保存并导出应用程序。然后启动\
  \ `OmekBeckonFlash.exe`。现在，当我们执行 `leftHandUp` 手势时，`debugString_txt` 框应输出该手势的名称。该框应弹出并显示“leftHandUp”。如果你没有看到该结果，请返回并仔细检查你是否正确执行了本章的每一步。\n\
  \n### 基于手势构建功能\n\n既然我们的新手势已能工作并被识别，我们就可以使用该手势来触发应用程序中的功能。让我们回到代码块中，添加一些新功能：当应用程序注册到该手势被执行时，在左指尖附近绘制一个黄色方框。将以下代码添加到\
  \ `testOmekFlashPlayer.fla` 文件中 `OnOmekGesture()` 函数的上方。这段代码使我们在应用程序正确追踪到新的 `leftHandUp`\
  \ 手势的每个点，都能在屏幕上绘制一个黄色方块图形。在图 6.9 中，你将看到当我的左臂到达屏幕上肩膀上方某个点时，该手势被追踪到。\n\n```\nvar gestureSeen:MovieClip\
  \ = new MovieClip();\nvar xNum:Number = 80;\nvar yNum:Number = 80;\ngestureSeen.graphics.beginFill(0xFFcc00);\n\
  gestureSeen.graphics.drawRect(xNum, yNum, 30,30);\n\nfunction onOmekGesture(gestureName:String,\
  \ playerLabel:String):void\n\n{\n    if (gestureName == \"leftHandUp\") {\n    \
  \    stage.addChild(gestureSeen);\n        gestureSeen.x = xNum;\n        gestureSeen.y\
  \ = yNum;\n    }\n}\n```\n\n再添加两行代码来获取左手食指指尖的位置，并将其赋值给 `xNum` 和 `yNum` 变量。这两行代码在以下示例中以粗体显示。在示例文件中找到相同的代码块，并添加以粗体显示的两行代码。\n\
  \n```\nfunction onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,\
  \ jointY:String, jointZ:String, confidence:String):void\n{\n    //将鼠标控制权交给特定玩家。\n\
  \    if(playerLabel == \"0\")\n    {\n\n    }\n    if(jointName == \"leftFingerTip\"\
  )\n    {\n        //镜像 X 值，使鼠标能像手一样左右移动。\n        leftFingerTip_mc.x = stage.stageWidth\
  \ - Number(jointX) * _screenScaleX + _correctionX;\n        leftFingerTip_mc.y =\
  \ Number(jointY) * _screenScaleY + _correctionY;\n        xNum = leftFingerTip_mc.x;\n\
  \        yNum = leftFingerTip_mc.y;\n    }\n}\n```\n\n保存并导出示例项目。再次运行示例。执行 LeftHandUp\
  \ 手势。你应该会看到 Beckon 在你执行手势时，在屏幕上指尖所在的位置放置一个方框（图 6-9）。\n\n![images](img/0609.jpg)\n\
  \n***图 6-9.** Beckon 注册了 `leftHandUp` 手势，并将一个方框移动到执行手势时屏幕上我左手食指指尖所在的位置。*\n\n我希望这个示例能让你了解\
  \ Beckon SDK 背后的主要概念。首先，我们了解了 Beckon 的功能，然后启动并运行了它。接着，我们在现有示例中为头部添加了新的追踪功能。在此基础上，很容易将图形映射到骨骼上。然后，我们讨论了一些界面设计的基础知识。之后，我们创建了自己的手势，将其添加到\
  \ Beckon SDK，并成功在 Flash 中为其添加了监听器。最后，我们添加了一个图形来指示我们的手势何时发生，更重要的是，发生在哪里。这应该足以让你开始使用\
  \ Beckon 创建基本界面了。\n\n"
- "# 第 7 章\n\n\n\n## 使用 Unity 制作 3D 游戏与用户界面\n\n本章我们将使用一款非常流行的游戏引擎——Unity。通过在 Unity\
  \ 中集成 `OpenNI`、`NITE` 和 `Sensor Kinect`，我们将能够控制一个 3D 角色以及多个用户界面。在介绍完主要组件后，我们将从零开始逐一构建相应的示例。\n\
  \n游戏引擎是为创建和开发视频游戏、装置空间及界面而设计的系统。使用游戏引擎能做的事情远不止于制作游戏。Unity 常被用于创建建筑装置和 3D 用户界面。游戏引擎专为移动设备、计算机和游戏主机而设计。大多数引擎都提供\
  \ 2D 和 3D 图形的渲染引擎、物理引擎（用于碰撞检测和物理模拟）、音频、脚本、动画等功能。游戏引擎是一个实时 3D 环境，可以轻松地以多种方式加以改造利用。它既能创造出精彩的响应式环境、3D\
  \ 投影映射和交互式展示，也能同样轻松地制作游戏。\n\n那么，游戏引擎到底是什么？它是一种游戏制作工具，与 3D 软件包有所不同。你通常不会用引擎来建模你的\
  \ 3D 角色，而是用来将它们整合在一起，变成一个可玩的游戏。行业内各个层次的 3D 软件包都能导出引擎支持的格式。如果你是 3D 新手，想免费尝试一下，可以看看\
  \ Blender 和 Google SketchUp。对于更专业的用户来说，你很可能已经在使用 Maya 或 3D Studio Max 了。如果你是学生，Maya\
  \ 也提供免费的教育版。请注意，`.fbx` 文件是 Unity 原生的支持格式，Unity 会将所有多边形转换为三角形多边形。\n\nUnity 是一个出色的游戏平台，与价格昂贵得多的引擎（如虚幻引擎）相比也颇具竞争力，但它提供免费版本。如果使用\
  \ Unity 创建的游戏或应用总收入超过 10 万美元，则需要购买 Unity 的许可证。这使得免费版非常适合初学者。该免费版限制了游戏的复杂性，并禁用了一些专业功能，例如移动端功能，但你仍然可以利用可用的工具制作出不错的游戏。\n\
  \nKinect 极大地激发了开源社区的活力。在 Open Kinect 社区成功将 Kinect 的数据流转换为可用数据后，独立开发领域随之活跃起来。世界各地涌现了各种游戏、艺术装置以及其他实验性的计算机用户交互方式。\n\
  \n### 安装 Unity 及配套软件\n\n让我们开始吧。首先，从 [`http://unity3d.com/`](http://unity3d.com/)\
  \ 下载 Unity。像安装平台上的其他应用程序一样安装 Unity。我将在本示例中使用 Mac OS X 10.6.8，但 Unity 本身与平台无关，我们之后将运行的\
  \ ZigFu 脚本也是如此。\n\n![images](img/square.jpg) **注意** 本章基于 Unity 3.4 版本创建。旧版本与本教程涉及的软件不兼容。\n\
  \n接下来，我们将使用 ZigFu 提供的一个极其简单的安装脚本。ZigFu 创建了一个包含单个安装脚本的软件包，该脚本整合了 `OpenNI`、`Sensor\
  \ Kinect` 和 `NITE`。ZigFu 的独特之处在于，它由两位前 PrimeSense 员工以及另外两位开发者共同编写。PrimeSense 正是创建\
  \ `NITE` 的公司。因此，这些用于 `OpenNI` 的 Unity 脚本是目前最稳定的，并且具有开源的优点。ZigFu 的团队成员是 Amir Hirsch、Ted\
  \ Blackman、Roee Shenberg 和 Shlomo Zippel。当被问及名字的由来时，他们引用了 90 年代的网络迷因“All Your Base\
  \ Are Belong to Us”。此外，他们将在 Kinect 前移动的动作称为“zigging”。从 [`www.Zigfu.com`](http://www.Zigfu.com)\
  \ 下载安装脚本。同时，也从 [`www.Zigfu.com`](http://www.Zigfu.com) 下载 Unity 包。我们将导入这个包，以便在 Unity\
  \ 中运行 Kinect。解压这些文件，并将它们移动到你的“文档”文件夹中。\n\n![images](img/square.jpg) **警告** ZigFu\
  \ 建议在运行其 `install.sh` 脚本之前，完全卸载 Open Kinect、NITE 和 OpenNI。我发现卸载并非必要，但你也许希望遵循 ZigFu\
  \ 的建议。\n\n以下是在 Mac 上执行 ZigFu 安装脚本的步骤。在 Windows PC 上的过程类似，甚至可能更简单，因为 Windows 安装程序可以让你一键完成所有操作。\n\
  \n1.  打开一个终端窗口。在 Mac 上，通过依次进入 Mac ![images](img/U001.jpg) 应用程序 ![images](img/U001.jpg)\
  \ 实用工具 ![images](img/U001.jpg) 终端 来打开它。\n\n    终端窗口应该会打开，你可能会看到类似 图 7-1 的画面。\n\n\
  \    ![images](img/0701.jpg)\n\n    ***图 7-1.** Mac OS X 终端窗口*\n\n2.  导航到你下载的安装脚本所在的文件夹。例如，我在我的系统上执行了以下命令：`cd\
  \ Documents/ZigFuOpenNIMac`\n3.  执行以下命令，以 root 用户身份运行安装脚本：`sudo sh install.sh`\n\
  4.  `sudo` 命令对你来说可能比较陌生。在你的 Mac OS 中，有一个超级用户（即 root 用户），用于系统管理。这个用户帐户拥有你的普通帐户所不具备的权限。`sudo`\
  \ 命令允许你以 root 这个特殊用户的身份执行单条命令。\n5.  系统会提示你输入用户密码。输入密码。安装过程会开始运行，终端窗口中会出现以下代码行。\n\
  \n    ```\n    You Know What You Doing (Installing OpenNI)\n    Installing OpenNI\n\
  \    ****************************\n    copying shared libraries…OK\n    copying\
  \ executables…OK\n    copying include files…OK\n    …\n    *** DONE ***\n    For\
  \ Great Justice… (Type \"sh test.sh\" to run the UserTracker demo)\n    ```\n\n\
  6.  现在，我们将通过运行测试脚本来确认一切安装正确。输入以下命令并按回车：`sh test.sh`\n7.  应该会弹出一个窗口，你应该能看到自己正在移动，如\
  \ 图 7-2 所示。图中展示的是一个深度图。深度图是一种图像通道，包含与从某个视点（此处为 Kinect）到场景对象表面距离相关的信息。\n\n安装完成！你已经准备好继续前进，探索\
  \ Unity 提供的功能了。在继续之前，请务必关闭 PrimeSense User Tracker Viewer，以避免与后续示例发生冲突。\n\n![images](img/0702.jpg)\n\
  \n***图 7-2.** Unity 生成的 Kinect 深度图*\n\n### 探索 Unity 界面\n\n启动 Unity。让我们一起来创建一个项目并探索其界面。\n\
  \n#### 项目\n\n以下是创建项目的方法：\n\n1.  从菜单中选择 File ![images](img/U001.jpg) New Project。\n\
  2.  始终导入 Unity 的 Standard Assets 是一个好习惯。在弹出的窗口中，你会看到一长串可以包含到项目中的选项。选择 Standard Assets，然后点击\
  \ Create Project。\n3.  为所有示例导入 ZigFu Unity 包。首先，从菜单中选择 Assets ![images](img/U001.jpg)\
  \ Import Package ![images](img/U001.jpg) Custom Package。\n4.  导航到你的“文档”文件夹，导入以下文件：`UnityOpenNIBindings-v1.1.unitypackage`\n\
  5.  在随后弹出的窗口中，让 Unity 自动导入项目所需的所有相关库。\n\n现在，Unity 应该打开了几个选项卡。你首先要做的是注意左上角有两个选项卡：Scene\
  \ 和 Game。点击 Game 切换到游戏选项卡。\n\n\n\n#### 工作区\n\n为了更方便地在 Unity 中工作，请选中 `Game`（游戏）标签页并将其拖拽至左侧。它会自动弹出成为一个独立的标签页区域。两个窗口之间的灰色分隔条可以通过拖拽进行调整。移动标签页后，你应该会看到与图\
  \ 7-3 类似的结果。\n\n![images](img/0703.jpg)\n\n***图 7-3.** Unity 工作区*\n\n左侧的标签页现在是 `Game\
  \ Viewer`（游戏视图）。在此标签页中，你可以从摄像机的视角看到当前场景在 3D 空间中的所有内容。3D 空间中的摄像机工作原理与普通摄像机相同，需将其定位以便框选场景中所有合适的视觉元素。\n\
  \n`Game Viewer` 右侧的标签页是 `Scene Viewer`（场景视图）。此标签页显示所选场景的 3D 世界。你可以将场景视为关卡。游戏中的每个关卡都需要创建一个场景。在\
  \ `Scene Viewer` 的右上角，有一个在许多 3D 软件包中都能找到的奇异生物，称为 `Gizmo`（小控件），没错，这就是它的官方名称。别害怕，只要你不在午夜后喂食或者把它弄湿，它就不会繁殖。它会显示\
  \ X、Y、Z 轴以及透视视图。在这个彩色场景中，你可以将 X、Y、Z 轴轻松地记忆为 R、G、B 色。点击并旋转 X、Y、Z 轴或中心立方体（透视视图）轴，即可从这些角度观察游戏。\n\
  \n![images](img/square.jpg) **注意** 从不同角度观察并不会移动摄像机，它只改变用户在当前场景中的观察视角。\n\n最右侧的最后一个标签页是\
  \ `Inspector`（检视面板）。如果你熟悉 Flash，可以将其视为属性检查器。`Inspector` 允许你设置所选对象组件的属性。`Inspector`\
  \ 还允许你为游戏对象附加脚本，从而在 Unity 中引入功能。这正是 ZigFu 实现其示例工作方式的核心。ZigFu 设计了一个包含游戏对象的基本场景，然后将脚本附加到这些游戏对象上，以便与\
  \ OpenNI 进行绑定。\n\n你会在工作区底部看到两个标签页。左下角的标签页是 `Hierarchy Viewer`（层级视图）。此标签页中的所有内容实际上都是你游戏中的对象。右下角的标签页是当前项目的\
  \ `Project`（项目）文件夹。该文件夹中的所有内容都存放在 `User` ![images](img/U001.jpg) `New Unity Project\
  \ 1` ![images](img/U001.jpg) `Assets`（资源）目录下。任何添加到 `Assets` 文件夹中的内容都会自动在此标签页的视图中更新。不过，只有当该对象通过拖拽添加到\
  \ `Scene`（场景）或 `Inspector`（检视面板）中后，它才会出现在游戏里。\n\n#### 基本导航与变换工具\n\n现在，我们来了解环绕标签页的各种按钮。你左上角的按钮（图\
  \ 7-4）是基本导航和变换工具，其快捷键与大多数 3D 应用程序一致。\n\n![images](img/0704.jpg)\n\n***图 7-4.** 基本导航与变换工具*\n\
  \n图 7-4 中的按钮从左到右依次具有以下功能。括号中的字母为键盘快捷键。\n\n*   `Hand`（手形）工具（`Q`）允许你在 3D 世界中移动视角。\n\
  *   `Move`（移动）工具（`W`）允许你在 `Scene`（场景）标签页中移动选中的游戏对象。\n*   `Rotate`（旋转）工具（`E`）允许你在\
  \ `Scene`（场景）标签页中旋转选中的游戏对象。\n*   `Scale`（缩放）工具（`R`）允许你在 `Scene`（场景）标签页中缩放选中的游戏对象。\n\
  \n另一个好用的键盘快捷键是 `F`。按下键盘上的 `F` 键，`Scene`（场景）标签页会聚焦于你在 `Hierarchy`（层级）标签页中选择的任何游戏对象。\n\
  \n#### 播放控制\n\n再往右的按钮是播放控制（图 7-5）。\n\n![images](img/0705.jpg)\n\n***图 7-5.** Unity\
  \ 的播放控制*\n\n`Play`（播放）按钮用于运行当前场景。如果在场景播放时再次按下 `Play` 按钮，场景会停止。Unity 有一个特定的界面特性需要留意：如果处于\
  \ `Play`（播放）模式，这些按钮会变为蓝色。在此模式下，如果在 `Inspector`（检视面板）中对游戏对象属性进行了任何更改，当场景停止时，这些更改将会丢失。除非你为\
  \ Unity 安装额外的插件，否则无法保存 `Play`（播放）模式下的更改。如果你在 `Play`（播放）模式下发现某个属性更改很满意，请记下该更改，待退出\
  \ `Play`（播放）模式后重新输入。\n\n![images](img/square.jpg) **提示** 三键鼠标对于在 Unity 的 3D 空间中工作至关重要。三个按键都可用于在\
  \ 3D 空间中平滑移动场景。按住 `Option` 键并左键单击可以平移透视视图。鼠标中键滚轮可以拉近或拉远场景视图。按下鼠标中键可以切换为 `Hand`（手形）工具。右键单击可以旋转透视视图。`Option`+右键单击可提供额外的\
  \ `Zoom`（缩放）工具。\n\n### 理解 ZigFu 与 Unity 的关系\n\nZigFu 是一组与 `OpenNI` 和 PrimeSense\
  \ 公司的 `NITE` 绑定的 C# 脚本，它使 Unity 能够访问 `NITE` 的功能。`OpenNI` 是一个开源标准，旨在为新出现的自然交互设备、应用程序和中间件领域创建兼容性。`OpenNI`\
  \ 是一个抽象层，它将中间件与硬件和应用程序集成在一起。\n\n#### OpenNI 与 NITE\n\n`OpenNI` 主要面向 3D 传感器，但 `OpenNI`\
  \ 中没有任何内容是专属于 PrimeSense 公司的 `NITE` 或 Kinect 的。`OpenNI` 是一个接口，它允许诸如 `NITE` 之类的中间件开发者获取深度流、骨骼数据、音频、红外\
  \ (`IR`)、手部点、RGB 图像和手势检测。`OpenNI` 并不具体关注这些数据点是如何生成的，也不关心它们来自何处。\n\n`OpenNI` 依赖模块来获取设备数据，并将这些数据传入\
  \ `OpenNI` 以及任何中间件。任何人都可以为任何摄像头或传感器编写模块，并通过 `OpenNI` 注册。`NITE` 是一种中间件，它赋予数字设备无需可穿戴设备或控制器即可翻译并响应用户交互的能力。\n\
  \n![images](img/square.jpg) **注意** 理解 `OpenNI` 的关键点在于，它并非针对特定硬件或中间件。`OpenNI` 可以用于任何符合\
  \ `OpenNI` 标准的硬件。例如，你可以将 `OpenNI` 与 PrimeSense 参考设计、微软 Kinect、华硕 Xtion 以及任何符合 `OpenNI`\
  \ 标准的中间件（如 `NITE`，以及即将推出的 Beckon）配合使用。\n\n因此，`NITE` 是介于 `OpenNI` 和你的应用程序（在此处为 Unity）之间的中介。就\
  \ Kinect 而言，PrimeSense 不仅提供了中间件，还制造了 Kinect 内部的运动感应芯片。这在实际上并没有改变任何实质内容，但这算是一个有趣的事实，也体现了\
  \ `NITE` 为何如此强大。\n\n#### Unity 与 ZigFu\n\nUnity 允许用户创建脚本，并将这些脚本作为组件附加到游戏对象上。组件是向任何游戏添加游戏功能的方式，它们驱动着游戏对象。ZigFu\
  \ 创建了用于 Unity 的脚本，以便与 `OpenNI` 进行绑定，或者说“通信”。\n\nZigFu 创建了示例脚本，帮助用户熟悉 `OpenNI` 的功能。在\
  \ ZigFu 出现之前，Unity 的开发者需要自行编写绑定代码。现在，如果开发者有足够的技术和意愿，也仍然可以这样做。鉴于 Unity 的工作方式，你可以非常轻松地将\
  \ ZigFu 脚本附加到一个对象上，并将你可能创建的任何自定义脚本附加到同一个对象或其他任何对象上。\n\nUnity 对此类开发的容忍度出奇地高。事实上，Unity\
  \ 不仅支持一种，而是支持*三种*脚本语言：JavaScript、C# 和 Boo。开发者可以同时使用这三种语言，无需只选择其中一种。你游戏对象的一个组件可以用\
  \ C# 编写，另一个则可以用 Boo 编写。\n\n\n\n### 运行 ZigFu 游戏示例\n\n前往你的 `Project` 文件夹，打开名为 `_Scenes`\
  \ 的文件夹。这些是 ZigFu 创建的场景，是演示 OpenNI 功能的示例。其中一些示例需要两个人才能实际使用，所以请准备好找一位朋友，以便在运行多人示例时提供帮助。\n\
  \nZigFu 将示例分为两类：游戏和界面。在本节中，我们将首先介绍游戏示例，然后再介绍界面示例。\n\n#### Avatar2Players\n\n双击 `Avatar2Players`（需要两人）。你应该会看到两个士兵并排站在地板上，如图\
  \ 7-6 所示。如果你在 `Scene` 选项卡中看不到它们，请调整视图直到看到它们为止。你可以在 `Hierarchy` 选项卡中选择一个士兵，然后按下键盘上的\
  \ `F` 键。场景视图将聚焦于所选对象。\n\n![images](img/0706.jpg)\n\n***图 7-6.** Avatar2Players 游戏*\n\
  \nOpenNI 尚未追踪到玩家。这是因为你需要播放每个场景才能开始追踪。现在按下黑色的 `Play` 按钮。\n\n此时，你将在 `Game` 选项卡底部看到一个小小的黄色视口。请确保你和你的同伴在摄像机视图中都可见。你们都需要摆出校准姿势来校准\
  \ OpenNI。这个姿势与银行劫案中的“举起手来”姿势完全相同。现在，请举起双手！\n\n确保你的肘部与肩部平行，双手处于同一高度。当 Kinect 捕捉到你和你同伴作为玩家后，你会看到\
  \ 3D 模型跳转到你们的身体位置。\n\n![images](img/square.jpg) **注意** OpenNI 将于 2011 年底移除校准姿势。如果你在此之后阅读本章，可能无需进行校准姿势。试着舞动身体，看看是否被追踪到。如果是，那很好。如果不行，再尝试校准姿势。\n\
  \n现在，让我们更深入地了解一下图 7-6 中的这个场景以及如何导航。请执行以下操作：\n\n1.  点击 `Hierarchy` 选项卡中的 `Soldier`。\n\
  2.  将注意力转向右侧的 `Inspector` 选项卡。\n3.  展开 `OpenNI Skeleton (script)` 旁边的箭头。\n\n现在可以看到一个列表，列出了你可以通过\
  \ OpenNI 访问的所有关节点，以及这些关节点在 Unity 中连接的游戏对象。请注意所有对应的关节点是如何映射到游戏对象上的。来自 OpenNI 的脚本关节点在左侧，场景中的游戏对象列在右侧。它们的命名简单地对应了所连接的关节点名称。单击列表中右侧的任意游戏对象关节点，你将看到它跳转到\
  \ `Hierarchy` 选项卡中列出的关联对象。双击将在 `Inspector` 中打开该对象。要返回到 `Soldier`，只需再次在 `Hierarchy`\
  \ 中单击它即可。\n\n在 `Hierarchy` 选项卡中，你将看到游戏中的所有对象。在这个示例中，有一个 `Directional Light`（方向光），它为场景提供照明。列表中下一个是\
  \ `Floor`（地板）。点击它查看附加到该游戏对象的组件。`Transform`（变换）组件存在于每个游戏对象上。接下来，你将看到 `Box Collider`（盒子碰撞器）、包含\
  \ `Soldier` 着色器的 `Mesh Renderer`（网格渲染器），以及地板及其各自的 `Normalmap`（法线贴图）。`Mesh Renderer`\
  \ 从 `Mesh Filter`（网格过滤器）获取几何体，并将其渲染在 `Inspector` 中由对象的 `Transform` 组件定义的位置。法线贴图（或称法线映射）是一种通过应用在对象网格上的\
  \ 2D 文件来模拟光照和凹陷，从而使对象看起来具有比实际更高多边形数量的方法。创建法线、网格和纹理超出了本教程的范围，但它是每个 3D 工作流程的一部分。请参阅你的\
  \ 3D 软件手册以了解更多信息。\n\n`Hierarchy` 选项卡中的下一个对象是 `Main Camera`（主摄像机）。打开此对象并注意，上面应用了一个名为\
  \ `ExitOnEscape` 的 ZigFu 脚本，它允许你在按下 `Escape` 键时退出游戏。你可以将此脚本添加到任何需要此行为的场景中。该脚本特定于这个\
  \ ZigFu 示例，并非 OpenNI 的一部分。\n\n![images](img/square.jpg) **注意** 要向游戏对象添加脚本组件，请在 `Hierarchy`\
  \ 选项卡中选择该游戏对象，以在 `Inspector` 中打开该对象的组件列表。这是一个非常直接的过程，但第一次操作时可能会觉得陌生。你所做的只是通过将一个新组件（脚本组件）拖拽到显示着该游戏对象组件的\
  \ `Inspector Window` 中来附加它。每当你在 `Hierarchy` 选项卡中选择一个对象时，都会显示其组件。如果需要帮助，YouTube 上有几个教程视频。此外，请访问\
  \ Unity 论坛，网址为 [`www.unity3d.com`](http://www.unity3d.com)。Unity 社区提供了良好的支持；用户论坛上有很多乐于助人的程序员愿意帮助新手。如果你遇到难题，论坛应该是你求助的首选之地。\n\
  \n以下是一些你可以添加到游戏对象上的脚本：\n\n> **ChangeColor** 用于更改 `ItemSelector` 场景中方块的颜色。\n> \n\
  > **Exitonescape** 在按下 `Escape` 键时退出游戏。\n> \n> **ObjectPeruser** 为每个检测到的用户实例化一个\
  \ `Prefab`（预制件），并在 `TopDownUserMap` 场景中使用。\n> \n> **StartSessesionMessage** 在未进入会话时显示“执行焦点手势以开始会话”。\n\
  \n下一个对象是传感器对象。选择此对象并注意，在 `Inspector` 选项卡中附加了几个 OpenNI 脚本。传感器对象本身是一个空的游戏对象。Unity\
  \ 允许你创建空的游戏对象。创建这个空对象是为了附加在场景中运行的脚本。这些脚本都与 OpenNI 功能相关，如下所示：\n\n> **Open NIUser\
  \ Tracker:** 允许 Unity 追踪用户，最多可达 OpenNI 注册的最大用户数。没有默认的最大数量。\n> \n> **Open NIDepthMapViewer:**\
  \ 在游戏运行时简单地显示 Kinect 深度图。请记住，在游戏运行之前它是不可见的。\n> \n> **OpenNIUsers Radar:** 在游戏屏幕上弹出一个深灰色的用户追踪框，并为游戏注册的每个特定用户附加一个编号。如果你想在新创建的场景中使用此脚本，你必须在\
  \ `Inspector` 中将其链接到 `Open NIUser Tracker`。\n> \n> **Open NISplit Screen Skeleton\
  \ Control:** 允许屏幕上一次显示两个玩家。这对于分屏的第一人称射击游戏可能很有帮助。\n\n`Hierarchy` 中的最后一个对象是 `Soldier`。`Soldier`\
  \ 是一个 `Prefab`（预制件）；这就是它显示为蓝色的原因。`Prefab` 是一个可以在游戏中反复使用的游戏对象和组件的集合。它们保存在 `Project`\
  \ 选项卡视图中。`Prefabs` 是 Unity 中的基本功能。\n\n`Soldier` 实际上是一个 ZigFu 创建的 `Prefab`，你可以将其添加到任何场景中。查看\
  \ `Project` 选项卡，打开 `OpenNI` 文件夹，然后打开 `Prefabs`。`Prefab` `Soldier` 就在其中。要将 `Prefab`\
  \ 添加到场景，只需将 `Prefab` 从 `Project` 文件夹拖拽到 `Scene Viewer` 中即可。\n\n\n\n### `AvatarFrontFacing`\n\
  \n`AvatarFrontFacing` 与 `Avatar2Players` 几乎完全相同，但它只有一个 `Skeleton`，并实现了一些附加功能。双击\
  \ `AvatarFrontFacing` 并播放场景。做出校准姿势，然后看着自己像士兵一样跳舞。\n\n在层级（Hierarchy）选项卡中选择你的 `Sensor`\
  \ 游戏对象。注意最后添加的脚本组件 `OpenNIContext`。`OpenNIContext` 脚本允许加载 `.oni` 文件，而非使用实时传感器。（`.oni`\
  \ 文件是包含预录制骨骼数据的文件。）要录制 `.oni` 文件，请使用 `OpenNI` 附带的 `NIViewer`。（关于录制 `.oni` 文件的更多文档，请参考\
  \ OpenNI 手册。）你录制的任何 `.oni` 文件都可以通过 `OpenNIContext` 组件轻松地在 Unity 中链接起来。这是一种无需动作捕捉套件即可实现非常廉价且高效的动作捕捉的简便方法。\n\
  \n### `TopDownUserMap`\n\n`TopDownUserMap` 展示了一个俯视的游戏地图，其中 Kinect 驱动玩家在地板上的位置。层级选项卡中的\
  \ `UsersContainer` 对象上附加了 `Object Per Use` 和 `OpenNIUser Tracker` 脚本。\n\n### `Blockman3rdPerson`\n\
  \n`Blockman3rdPerson` 添加了一些新的功能。运行它并观察发生了什么。骨骼由 Unity 游戏对象构成，摄像机在空间中跟随 `Blockman`。\n\
  \n让我们看看层级选项卡，了解这个示例中包含的内容。首先，有一个 `Blockman Container`。展开它可以找到 `Blockman Prefab`。这是另一个你可以在任何项目中使用的\
  \ ZigFu 预制件。点击 `Blockman` 在检视面板（Inspector）中打开它。注意一些新内容：在关节列表之后，再次出现了三个复选框。这次，与 `Soldiers\
  \ Prefab` 不同，`Update Joint Positions` 选项是勾选的。取消勾选该选项并重新运行示例。看到区别了吗？当你移动时，游戏对象不再改变旋转方向。实际上，整个骨骼现在已经错位了。重新勾选该选项以恢复正确设置，然后继续前进。\n\
  \n接下来，查看摄像机设置。在层级选项卡中选择 Camera，然后在检视面板中注意新的脚本 `Smooth Follow`。`Smooth Follow` 是一个默认的\
  \ Unity 脚本，可以在我们项目开始时导入的标准资源（Standard Assets）文件夹中找到。在项目（Project）选项卡中，打开 Standard\
  \ Assets 文件夹，然后打开 Scripts 子文件夹。`Smooth Follow` 就在这里，它可以被拖放到任何摄像机上，并指示要跟随哪个游戏对象。在这里，该脚本使摄像机跟随\
  \ `Blockman's Head`。\n\n`Sensor` 再次位于层级选项卡的底部，看起来与之前的示例非常相似。它是一个附加了 OpenNI 脚本的空游戏对象。这里我们使用\
  \ `Open NISingle Skeleton Controller`，就像在 `AvatarFrontFacing` 示例中一样。\n\n### 运行界面示例\n\
  \n接下来，我们将查看用于创建用户体验的下一个示例。在项目选项卡的 `_Scenes` 文件夹中打开并播放 `FollowHandPoint`。试一试。是不是很闪耀？你会看到\
  \ Unity 默认的椭球粒子发射器（Ellipsoid Particle Emitter）组件在后台运行，同时 OpenNI 脚本追踪一个球体。\n\n这里发生的一切是：`Follow\
  \ Hand Point (script)` 脚本被附加到层级中的 `Hand Follower` 对象上。该脚本位于项目选项卡中 Scripts 子文件夹 `HandpointControls`\
  \ 内。打开并记下它。稍后我们将用它从头开始构建一个示例。\n\n在层级选项卡的 `Hand Follower` 内部，是容纳另外两个我们尚未介绍的游戏对象（粒子系统）的父级游戏对象。粒子系统是一个由模糊粒子组成的系统。它们经常被用来生成星星、火焰和其他自然现象。这些系统可以以有趣的方式被使用甚至滥用。虽然粒子系统超出了本章的范围，但它们值得未来深入探究。像创建其他任何游戏对象一样创建它们，选择以下菜单选项：\n\
  \n> **主菜单 ![images](img/U001.jpg) 游戏对象 ![images](img/U001.jpg) 创建其他 ![images](img/U001.jpg)\
  \ 粒子系统**\n\n![images](img/square.jpg) **注意** 以下场景更为复杂，可能不适合初学者；然而，任何人都可以运行并播放它们。此外，欢迎初学者根据自己的需求修改示例，直到他们对\
  \ Unity 有更好的理解。这些场景是为对创建界面感兴趣的高级用户准备的。\n\n### `Item Selector`\n\n`_Scenes` 文件夹中的下一个示例是\
  \ `Item Selector`。现在打开并播放这个场景。这个示例展示了界面设计的新功能。在层级选项卡中，有六个对象：一个摄像机、四个平面和一个名为 `Static\
  \ Menu` 的空游戏对象。所有的 OpenNI 脚本都附加在这里。选择 `Static Menu` 并注意检视面板中的脚本。\n\n#### 项目选择器脚本\n\
  \n`Static Menu` 游戏对象上附加了该场景的所有脚本。选择 `Static Menu` 以在层级选项卡中显示其组件。展开 `Static Menu`\
  \ 脚本的 `Items` 箭头。这个脚本可以根据需要容纳任意数量的游戏对象。只需将游戏对象拖放到你希望它们附加到的元素上即可。`Element 0` 对应 `Plane\
  \ 1`，依此类推。\n\n![images](img/square.jpg) **注意** `Static Menu` 脚本是一个复杂的复合手部点控制脚本，它会对来自\
  \ ZigFu 提供的基础构建块的底层事件做出反应。要打开脚本并查看其构成，请在检视面板中右键点击它，然后选择 `Edit Script`，或者点击脚本名称最右侧的齿轮图标。\n\
  \n复选框 `Select on Push` 是我们的第一个手势。推（Push）动作就是在空间中用手快速向前推。实际上并没有太多技巧。在场景播放时尝试几次，感受一下。当你在其中一个平面上成功执行此操作时，盒子会从绿色（高亮）变为蓝色（选中）。\n\
  \n附加到此游戏对象的下一个脚本组件是 `Push Detector`。`Push Detector` 是 ZigFu 的另一个自定义脚本，不属于 `OpenNI`。对于有更多编程经验的人来说，你可以使用\
  \ ZigFu 原语编写自己的检测器，例如：\n\n```\nHand_Create(Vector3 position)\nHand_Update(Vector3\
  \ position)\nHand_Destroy()\nPushDetector_Push()\nPushDetector_Release()\nPushDetector_Click()\n\
  ItemSelector_Select(int index)\nItemSelector_Next()\nItemSelector_Prev()\n```\n\n\
  `Fader` 是另一个自定义的 ZigFu 脚本，它将空间中的物理区域映射到标准化的 0-1 范围。然后，`Item Selector` 可以获取这个 0-1\
  \ 范围，并将其分割成带有迟滞（hysteresis）的逻辑区域，包括特殊的滚动区域。\n\n当 `Item Selector` 场景运行时，有两个渐变器（Fader），因为\
  \ `Push Detector` 在运行时会隐式添加一个。`Push Detector` 的渐变器位于 Z 轴上，另一个渐变器位于 X 轴上。尺寸代表物理尺寸（以毫米为单位），因此\
  \ `300` 代表 30 厘米，大约 1 英尺。\n\n#### 项目选择器参数\n\n`Item Selector` 的部分参数如下：\n\n> **项目数量（Number\
  \ of items）：** 脚本检测到的逻辑项目数量。\n>\n> **迟滞（Hysteresis）：** 一个介于 0 和 1 之间的值。它定义了逻辑项目之间的重叠区域，防止选中的索引在两个逻辑区域之间“跳动”。不同的应用需要不同的设置，可以在开发过程中进行调整。\n\
  >\n> **滚动区域（Scroll Region）：** 范围中专门用于滚动区域的比例。例如，`0.2` 意味着两侧各 20% 的区域用于滚动（发送 `Next`\
  \ 和 `Prev` 消息）。\n\n\n\n### 项目选择器操作\n\n要全面理解`Item Selector`（项目选择器）的功能，请创建一个空白游戏对象，并将一个淡入淡出控制器和项目选择器拖入该对象。此外，添加一个新脚本，用于监听`Item\
  \ Selector`消息并将其打印出来。让我们创建一个脚本来向控制台输出哪些项目被选中。要创建脚本，请前往主菜单 ![images](img/U001.jpg)\
  \ Assets（资源） ![images](img/U001.jpg) Create（创建） ![images](img/U001.jpg) C# Script（C#\
  \ 脚本）。在项目中为脚本命名。在层级面板中选择该脚本，然后选择 Open（打开）。这将打开 Unity 的脚本编辑环境。输入以下代码：\n\n```\nvoid\
  \ ItemSelector_Select(int index)\n{\n  print(\"Item selector select \" + index);\n\
  }\nvoid ItemSelector_Next()\n{\n  print(\"Item selector next\");\n}\nvoid ItemSelector_Prev()\n\
  {\n  print(\"Item selector prev\");\n}\n```\n\n现在，将脚本添加到您创建的游戏对象上。此外，您还需要在检视面板中手动将\
  \ Fader（淡入淡出控制器）链接到`Item Selector`（项目选择器）。这将在控制台中打印您当前聚焦的元素。要查看控制台，请按`Shift+Com+C`或前往主菜单\
  \ ![images](img/U001.jpg) Window（窗口） ![images](img/U001.jpg) Console（控制台）。\n\n各种等待时间控制着滚动的重复逻辑（类似于按住键盘上的某个键：先触发第一次按键，稍作停顿，然后重复按键并逐渐加速）。`Session\
  \ Manager`（会话管理器）等待焦点手势并启动一个手部指向会话。`Session Manager`在屏幕左侧（仅在播放模式下可见）显示的标题是隐式添加的，例如`OpenNIContext`，但如果您想更改默认设置（例如，要监听哪些手势），也可以显式添加。\n\
  \n`OpenNISessionManager`为`HandTracking`（手部追踪）和`GestureDetection`（手势检测）的 OpenNI 流提供了一个封装器。此模型的主要优势在于，手势检测器基于原始深度流，无需骨骼检测器。这意味着，即使您裹着毯子坐在沙发上，不像任何人形，ZigFu\
  \ 的手部追踪器也能正常工作。只需做出手势，您就能掌控一切！\n\n### CoverFlow（封面流）\n\n`CoverFlow`创建了基本的旋转木马式用户体验。菜单游戏对象包含一个手部指向控制器、淡入淡出控制器、滚动菜单和虚拟馈送器。滚动菜单仅为场景添加了滚动功能。您可以设置方向、窗口大小、阻尼和滚动区域大小。静态菜单和滚动菜单的主要区别在于，滚动菜单将成为所有添加给它的子对象的实际父级。\n\
  \n以下是`Scrolling Menu`（滚动菜单）组件的主要属性的详细说明：\n\n> **Direction（方向）：** 菜单项之间的距离\n> \n\
  > **RepositionBasedOnBounds（基于边界重新定位）：** 菜单布局项应基于其实际边界，还是仅基于“Direction”属性？\n> \n\
  > **WindowSize（窗口大小）：** 在开始滚动前，屏幕上显示的项目数量。传递给`ItemSelector`\n> \n> **ScrollRegionSize（滚动区域大小）：**\
  \ 传递给`ItemSelector`\n\n虚拟馈送器仅生成虚拟网格，是一个自定义的 ZigFu 脚本。在层级面板中选择链接到此脚本的`Menu Item`（菜单项）组件后，您可以更改网格颜色和其他特性。\n\
  \n### Slide Viewer（幻灯片查看器）\n\n`Slide Viewer`是一个基本的幻灯片查看器，其性质与`CoverFlow`非常相似。然而，它使用的不是虚拟馈送器，而是来自文件夹的图像馈送器。Path（路径）是您设置这些图像路径的位置，而\
  \ Search Pattern（搜索模式）则用于指定您希望从该目录中包含的文件类型。\n\n### 从头创建骨骼\n\nUnity 和 OpenNI 是一个强大的组合。利用它们，您可以从头创建骨骼。以下步骤将引导您完成整个过程。骨骼是一个术语，与\
  \ API 可以检测到的所有可能的关节的可视化相关联。在这里，我们将制作一个“火柴人骨骼”。您对此感兴趣的原因是为了确认您的追踪是否正常工作，并随后将默认游戏对象替换为在\
  \ Maya 等程序中创建的真实图形。骨骼、绑定和角色动画超出了本教程的范围，但所有 3D 软件包都有大量关于如何执行此操作的文档。此外，请参阅 Unity 手册以获取针对\
  \ Unity 的说明。\n\n#### 任务 1. 添加 OpenNI 功能\n\n第一步是创建一个新场景并添加一些 OpenNI 功能。请遵循以下步骤：\n\
  \n1.  前往主菜单。选择 File（文件） ![images](img/U001.jpg) New Scene（新建场景）。\n2.  将场景保存为`MySkeleton`。\n\
  3.  在该新场景中，创建一个空的游戏对象并向其添加 OpenNI 脚本。选择主菜单 ![images](img/U001.jpg) Game Object（游戏对象）\
  \ ![images](img/U001.jpg) Create Empty（创建空对象）来创建一个新的游戏对象。\n4.  将游戏对象重命名为`OpenNI\
  \ Functionality`。通过按`Ctrl`+右键单击并选择 Rename（重命名）选项来执行此操作。注意：您实际上可以指定任何您喜欢的名称。例如，在\
  \ ZigFu 场景中，游戏对象被称为`Sensor`。它所做的只是持有与 OpenNI 通信的组件脚本。\n5.  现在转到 Project（项目）选项卡并打开\
  \ OpenNI 文件夹。确保`OpenNI Functionality`游戏对象在层级面板中被选中并在检视面板中打开。现在单击并将`Open NIDepthmap\
  \ Viewer`拖入检视面板。对`OpenNIUser Tracker`、`Open NIUsers Radar`和`Open NISingle Skeleton\
  \ Controller`执行相同操作。\n6.  现在我们需要将`OpenNI Tracker`连接到`Open NIUsers Radar`以使雷达工作。只需选择`Open\
  \ NIUser Tracker`并将其拖到`Open NIUsers Radar`脚本上即可。图 7-7 显示了正确的配置。\n\n![images](img/0707.jpg)\n\
  \n***图 7-7.** OpenNI 用户追踪器配置*\n\n现在您已经连接了必要的 OpenNI 功能，可以继续制作一个基本骨骼了。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\
  \n\n#### 任务 2：制作基本骨架\n\n让我们开始创建第一个骨架吧。请遵循以下步骤：\n\n1.  从主菜单创建一个空的游戏对象。选择以下选项：主菜单\
  \ ![images](img/U001.jpg) 游戏对象 ![images](img/U001.jpg) 创建空对象。\n2.  您的新空游戏对象现在将出现在层级（Hierarchy）选项卡中。选中该对象，并按\
  \ Ctrl+右键点击。选择重命名。将对象重命名为 `Custom Skeleton`。\n3.  现在，按如下方式创建一个新的球体对象：主菜单 ![images](img/U001.jpg)\
  \ 游戏对象 ![images](img/U001.jpg) 创建其他 ![images](img/U001.jpg) 球体。\n4.  现在，在层级（Hierarchy）中，将球体添加到\
  \ `Custom Skeleton` 中。只需选中球体并将其拖拽到 `Custom Skeleton` 字样上。拖拽时会出现一个黑色箭头。当您看到黑色箭头时，松开鼠标。\n\
  5.  `Custom Skeleton` 旁边应该有一个下拉箭头，球体应该位于其中。这个球体将作为我们的头部。让我们将其重命名为 `Head` 以保持一致。按\
  \ Ctrl+右键点击，然后选择重命名选项进行重命名。\n6.  选中球体，使用移动工具将其向上移动。选中对象后，移动工具会自动激活。单击绿色箭头，将球体在 Y\
  \ 轴空间向上移动。\n7.  对两只手重复步骤 3-6。创建两个新的球体，将它们添加到 `Custom Skeleton` 中，并重命名。然后定位它们。由于这些对象的位置实际上将由用户生成，因此这些位置仅在非播放模式下对游戏开发者有益。\n\
  \n![images](img/square.jpg) **注意**：这种创建作为更大对象一部分的对象的过程称为父级化。我们正在将球体对象作为子级添加到它们的父级\
  \ `Custom Skeleton` 中。\n\n8.  为左肩和右肩创建两个立方体。执行与球体完全相同的操作，但选择创建立方体：主菜单 ![images](img/U001.jpg)\
  \ 游戏对象 ![images](img/U001.jpg) 创建其他 ![images](img/U001.jpg) 立方体。\n\n现在，层级（Hierarchy）选项卡应类似于\
  \ 图 7-8 所示。\n\n![images](img/0708.jpg)\n\n***图 7-8.** 添加三个球体和两个立方体后的自定义骨架层级结构*\n\
  \n通过照亮场景来结束此任务。通过从以下菜单选项添加一个方向光来实现：主菜单 ![images](img/U001.jpg) 创建其他 ![images](img/U001.jpg)\
  \ 方向光。\n\n#### 任务 3：将部件连接起来\n\n现在是通过链接游戏对象和组件来让骨架工作的时候了。具体操作如下：\n\n1.  首先，将 `Custom\
  \ Skeleton` 游戏对象连接到 `OpenNI Skeleton`。（ZigFu 使这个过程几乎毫不费力。）转到项目（Project）选项卡，打开 `OpenNI`\
  \ 文件夹，然后打开 `Scripts` 子文件夹。滚动直到看到 `OpenNISkeleton`。选中它，并将其拖拽到 `Custom Skeleton` 游戏对象上，就像我们对球体和立方体所做的那样。\n\
  2.  接下来，您必须将 `Custom Skeleton` 中的对象（我们之前创建的形状）连接到 `OpenNISkeleton` 中相应的关节。在层级（Hierarchy）选项卡中选择\
  \ `Custom Skeleton`。在检查器（Inspector）选项卡中，应该会有 `OpenNISkeleton` 的脚本。点击此脚本旁边的箭头以展开所有关节。在层级（Hierarchy）选项卡中选中并拖拽在\
  \ Unity 中创建的 `Custom Skeleton` 下的 `Head`，将其拖到 `OpenNISkeleton` 脚本中的 `Head` 上。您的结果应类似于\
  \ 图 7-9。请特别注意图中底部列表的第二项，即 `Head` 项。\n\n![images](img/0709.jpg)\n\n***图 7-9.** 链接到\
  \ OpenNISkeleton 脚本的 Head 项*\n\n3.  对 `Right Hand`、`Left Hand`、`Right Shoulder`\
  \ 和 `Left Shoulder` 重复步骤 2。如果检查器（Inspector）切换到层级（Hierarchy）中选中的对象（如立方体或球体），只需点击并稍微快一点拖拽即可。\n\
  4.  在关节列表之后，有三个复选框，用于告知 Unity 如何相对于骨架移动这些对象的变换。按如下方式设置这些复选框：\n\n**更新关节位置：** 选中此框。此框允许对象的变换发生变化，以匹配骨架上关节的旋转。如果模型是在\
  \ 3D 软件包中创建的，则无需选中此项，因为很可能不需要移动关节位置，只需旋转关节即可。\n\n**更新根位置：** 这将在 3D 空间中更新游戏对象（`Custom\
  \ Skeleton`）相对于用户的位置。如果选中此项，对象将随用户在 3D 空间中移动；否则，即使关节会移动，游戏对象也会保持在固定位置。\n\n**更新方向：**\
  \ 选中此框。这会更新关节在 3D 空间中的旋转。\n\n5.  剩下的选项是缩放。展开此菜单。OpenNI 中的默认测量单位是毫米，而 Unity 中是米。此选项会按比例缩放游戏对象。对于本练习，请将\
  \ X、Y 和 Z 的缩放比例更改为 `0.008`。\n6.  现在在层级（Hierarchy）选项卡中选择 `OpenNI Functionality`，以便您可以在检查器（Inspector）中访问其组件。在检查器中，找到\
  \ `OpenNISingle Skeleton Controller` 脚本。展开箭头以显示此组件的所有属性。从层级（Hierarchy）选项卡中将 `Custom\
  \ Skeleton` 拖拽到 `OpenNISingle Skeleton Controller` 的 `Skeletons` 属性上。\n7.  最后，将\
  \ `OpenNI Functionality` 拖拽到 `OpenNISingle Skeleton Controller User Tracker` 上。\n\
  \n这就是神奇的关键！现在运行场景并执行校准姿势。在追踪器锁定您的骨骼后，您应该会看到类似于 图 7-10 的结果。\n\n![images](img/0710.jpg)\n\
  \n***图 7-10.** 运行中的自定义骨架*\n\n### 创建自定义手部追踪器\n\n最后一项任务，让我们从头开始制作一个自定义手部追踪器示例。创建一个新场景并将其命名为\
  \ `MyScene`。现在向场景中添加一个立方体游戏对象，并在层级（Hierarchy）选项卡中打开它。打开 `HandpointControl` 文件夹。将\
  \ `Follow Hand Point` 脚本拖拽到检查器（Inspector）中的立方体上。播放场景，进行校准，瞧——手部追踪完成了。ZigFu 就是这么简单。图\
  \ 7-11 展示了运行中的手部追踪场景。\n\n![images](img/0711.jpg)\n\n***图 7-11.** 手部追踪器场景*\n\n最后，值得注意的是，ZigFu\
  \ 是值得关注的开发者。他们其他有趣的项目还包括一套适用于官方 Microsoft SDK 的 Unity 脚本，截至目前这些脚本无需校准。\n\n`http://groups.google.com/group/unitykinect/browse_thread/thread/7217ea5eaf4d37e2`\n\
  \n此外，他们接下来计划的是将 Beckon SDK 与 OpenNI 封装在一起，这样 Unity 就能与 Beckon 支持的任何传感器无缝协作。扩展的无控制器游戏和界面正变得越来越普遍，甚至在本书发布之日，都会有新的更新可用。总而言之，开发超越鼠标和控制器的游戏和体验，将使任何创作者都处于用户体验设计的前沿。\n\
  \n"
- "# 第 8 章\n\n\n\n## 微软 Kinect SDK\n\n微软研究院于 2011 年 6 月 16 日高调发布了其 Kinect for Windows\
  \ 软件开发工具包（`SDK`），此时距离该设备正式上市仅七个多月。虽然微软最初或许从未打算支持在 Windows 上为 Kinect 进行开发，且该设备引发的浓厚兴趣很可能令其始料未及，但如今微软正在积极支持这一平台——你需要密切关注微软研究院的更新动态，因为任何纸质书籍都无法紧跟最新发展步伐：\n\
  \n`http://research.microsoft.com/kinectsdk/`\n\n尽管如此，Kinect SDK 及相关资源（例如包含辅助代码和示例代码的\
  \ Coding4Fun Kinect 工具包）已足够丰富，可让你利用现有最成熟、最完善的 Kinect 代码来构建应用程序并顺利运行。本文介绍的资源为`C#`、`C++`和`Visual\
  \ Basic`开发者——乃至勇敢的初学者——提供了一条绝佳途径，让他们能够借助微软极其稳健的代码，开始使用 Kinect 进行用户分割、骨骼跟踪甚至语音识别。（例如，如果你希望利用\
  \ Kinect 的多麦克风阵列，Windows SDK 就是最佳工具集。）\n\n![images](img/square.jpg) **注意** 为 Windows\
  \ 编写代码与为 Xbox 编写代码并不相同。微软拥有一个名为`XNA`的独立编程框架和名为`Game Studio`的开发环境，供开发者创建 Xbox Live\
  \ 独立游戏。截至撰写本文时，Kinect 功能**尚未**在`XNA`中公开，不过内部人士表示这即将实现。本章介绍的 Kinect SDK 仅使你能够为 Windows\
  \ 平台（而非 Xbox）创建 Kinect 应用程序。\n\n### Coding4Fun\n\n学习新工具的最佳方式通常是观察他人如何利用该工具实现应用程序、构思实验及其他代码杰作。为此，微软设立了\
  \ Coding4Fun（图 8-1）网站，专为那些热衷于探索微软技术的爱好者而生。为纪念 2011 年 6 月 Kinect SDK 的发布，微软在华盛顿州雷德蒙德园区举办了一场编程马拉松，30\
  \ 多位开发者获赠 Kinect、SDK，并在 24 小时内创建了精巧的应用程序，用以展示这套新工具包的可能性。这些应用成为了 Coding4Fun 网站上微软\
  \ Kinect 项目展示/资源库的基础。无论你在阅读本章之前、期间还是之后，都值得一访：\n\n`http://channel9.msdn.com/coding4fun/kinect`\n\
  \nCoding4Fun 网站会频繁发布新项目和示例，通常附带源代码，因此它是你寻找能快速启动自己 Kinect for Windows 项目的现成方案时的首选之地。\n\
  \n![images](img/0801.jpg)\n\n***图 8-1.** Coding4Fun Kinect 专区*\n\n### Kinect SDK\
  \ 的优缺点\n\n使用微软 SDK 的优势相当显著。它提供了比其他任何软件包都更优秀的应用程序编程接口（API），用于访问 Kinect 特定的硬件功能，例如其四元件麦克风阵列。该\
  \ SDK 还附带了微软的 Kinect 运行时及其他支持软件，使你能够借助微软的工程技术和算法实现用户分割、骨骼跟踪以及（如果包含语音 SDK）语音控制，而无需脱离\
  \ Windows 强大的应用程序框架。\n\n简而言之，从 Kinect SDK 获得的这些组件非常强大。我们曾运行过本书其他章节讨论过的各种中间件，例如 PrimeSense\
  \ 的开源`OpenNI`，并用它们实现了一些类似功能。虽然所有这些软件都令人惊叹，但根据我们的经验，微软的 Kinect 代码在性能上表现最佳，其低延迟响应以及无需校准的骨骼跟踪算法堪称神奇。\n\
  \n缺点——至少对你们中的一些人而言——是目前用微软 SDK 所能做的实际上仅限于“为乐趣而编码”，因为其许可证仅允许有限的非商业用途。（你大概也能猜到，微软表示商业用途许可证即将推出，但价格和条款谁也说不准。）此外，如果你不熟悉`C#`、`C++`或`Visual\
  \ Basic`编程，或不熟悉集成开发环境（IDE）的使用，那么功能强大但令人望而生畏的`Microsoft Visual Studio`及其支持的语言很可能会吓退胆怯者。\n\
  \n至于你们其他人，泡杯咖啡，开始干活吧。\n\n### 开始使用 Kinect SDK\n\n要在 Windows 上搭建 Kinect 开发环境，你需要一台\
  \ Kinect、一个空闲的 USB 端口、Windows 7 系统，以及微软提供的大量免费软件，包括适合你编程语言的 Visual Studio 版本，以及来自微软研究院的\
  \ Kinect SDK 本身。你所需的一切都在下面的“需求”部分详细列出，同时附带一些常见问题。\n\n#### 需求\n\n使用 Kinect SDK 的要求虽然繁多，但并非不可满足。唯一的成本应该只有你的\
  \ PC 和 Kinect。请注意，我泛泛地使用“PC”一词——我能在运行 Windows 7 的 Bootcamp 版 Mac Mini 上成功运行本章的所有内容。不过，截至撰写本文时，你无法通过`Parallels`或`VMware`等虚拟机使用\
  \ Kinect SDK。忠告已给。\n\n##### 系统\n\n你需要一台相当新的 PC 来运行本章描述的软件：双核 2.66 GHz 或更快的处理器；支持`DirectX\
  \ 9.0c`功能（于 2004 年 8 月发布）的 Windows 7 兼容显卡（因此如果你的电脑使用不到五年且运行 Windows 7，应该没问题）；以及至少\
  \ 2 GB 内存（推荐 4 GB）。当然，你还需要一台 Kinect 传感器！但希望你在第 1 章已经解决了这个问题。\n\n在软件方面，你必须运行 Windows\
  \ 7（64 位或 32 位版本），并且需要知道你的系统版本才能下载正确版本的 SDK。要查看版本，请进入控制面板![images](img/U001.jpg)系统和安全![images](img/U001.jpg)系统，然后向下滚动查找“系统类型”。你应该会看到“64\
  \ 位操作系统”或“32 位操作系统”。\n\n##### Visual Studio 2010\n\n如果你是 Windows 开发者，可能已经安装了某个版本的\
  \ Visual Studio。任何 2010 版本都可以满足需求，这里推荐 Express 版仅仅是因为它们免费。要下载，只需访问：\n\n`http://www.microsoft.com/visualstudio`\n\
  \n在“产品”选项卡下，根据你计划使用的编程语言，单击 Visual Basic Express、Visual C# Express 或 Visual C++\
  \ Express。由于网上许多示例都是用`C#`编写的，因此我们在此处使用`Visual C# Express`。这样，我们就能顺利下载并剖析在网上找到的大部分代码。单击“立即安装”下载并安装`Visual\
  \ C# Express`。除非有个人原因需要更改，否则请直接使用默认安装选项。\n\n##### 附加框架和支持软件\n\n###### .NET Framework\n\
  \n毫无疑问，你需要在 Visual Studio 中构建应用程序时使用`.NET` 4.0 框架。该框架通常随 Visual Studio 一起捆绑提供，但如果没有，请下载并运行安装程序——它相当大，可能需要一些时间：\n\
  \n`http://msdn.microsoft.com/en-us/netframework/aa569263`\n\n除此之外，此处描述的其他支持软件均为可选。不过，如果你打算深入研究\
  \ Kinect for Windows，最好现在就安装这些软件，因为它们会被用在 SDK 附带的一些示例以及网上许多第三方示例中。\n\n\n\n######\
  \ DirectX 运行时与 SDK\n\n微软的 DirectX 软件由大量主要用于处理游戏所需媒体和图形功能的库组成。例如，Kinect SDK（见下文）附带的示例形状游戏就使用了\
  \ DirectX。\n\n微软 DirectX SDK（2010 年 6 月版或更高版本）：\n\n`http://www.microsoft.com/download/en/details.aspx?id=6812`\n\
  \n以及当前的 DirectX 最终用户运行时：\n\n`http://www.microsoft.com/download/en/details.aspx?id=35`\n\
  \n###### 微软的语音平台\n\n同样，这些组件是可选的。然而，它们确实使微软为 Kinect 开发者提供的产品与本书中描述的其他软件包有所区别。如果你计划在应用程序中集成语音识别，或者只是想尝试示例形状游戏的这项功能，请下载这些软件包并运行安装程序。请注意，即使你使用的是\
  \ 64 位机器，也必须下载 x86（32 位）版本的语音平台软件。64 位版本将无法工作：\n\n> 微软语音平台 SDK，版本 10.2（x86 版）\n\
  > [`http://www.microsoft.com/download/en/details.aspx?id=14373`](http://www.microsoft.com/download/en/details.aspx?id=14373)\n\
  > \n> 微软语音平台运行时，版本 10.2（x86 版）\n> [`http://www.microsoft.com/download/en/details.aspx?id=10208`](http://www.microsoft.com/download/en/details.aspx?id=10208)\n\
  > \n> 微软 Kinect 语音平台（美国英语版）\n> [`http://go.microsoft.com/fwlink/?LinkId=220942`](http://go.microsoft.com/fwlink/?LinkId=220942)\n\
  \n###### Kinect SDK 和 Coding4Fun Kinect 工具包\n\n最后，是 Kinect 的相关内容！浏览到 Kinect SDK\
  \ 登录页面（如下所示）并点击“下载”。在这里，你需要根据上文“系统”部分所述的操作系统选择 32 位或 64 位版本。Kinect SDK 登录页面的 URL\
  \ 是：\n\n`http://research.microsoft.com/kinectsdk/`\n\n运行安装程序。安装完成后，你就可以启动 Visual\
  \ Studio（在我们的例子中是 Visual C# Express）并开始使用 Kinect SDK 了。\n\n然而，你可能还需要下载最后一个可选的软件包。Coding4Fun\
  \ Kinect 工具包将我们使用 Kinect 数据时的一些典型任务（例如将原始数据转换为位图图像）封装成了更简单的函数调用，从而让你需要编写的代码更简洁、更干净。该库被用于\
  \ SDK 附带的一些示例中，是建议你添加到设置中的一项附加内容。你可以在此处下载该库：\n\n`http://c4fkinect.codeplex.com/`\n\
  \n选择压缩的当前版本，下载并解压。Coding4Fun 库没有安装程序。相反，我们需要在每个要使用该库的项目中添加对其的引用。这是在设置新的 Kinect 项目时，需要在我们的开发环境\
  \ Visual Studio 内部完成的任务，具体细节如下。现在，只需将下载并解压后的库存放在你希望保存的任何位置，比如现在应该出现在你文档文件夹中的 Visual\
  \ Studio 2010 文件夹内。\n\n#### 运行示例并排查问题\n\n在我们尝试构建自己的代码之前，应该先尝试运行 SDK 附带的两个编译好的示例，以确保一切按预期工作。你应该可以通过在“开始”菜单的“程序”中查找来确认\
  \ SDK 已安装。现在，“开始”菜单的“程序”下有已编译的示例应用程序：![images](img/U001.jpg) Kinect for Windows\
  \ SDK ![images](img/U001.jpg) “示例骨骼查看器”和![images](img/U001.jpg) Kinect for Windows\
  \ SDK ![images](img/U001.jpg) “示例形状游戏”。让我们启动“示例骨骼查看器”。你应该会看到类似于图 8-2 所示的结果。\n\n\
  ![images](img/0802.jpg)\n\n*图 8-2. Kinect SDK 附带的运行正常的“示例骨骼查看器”程序*\n\n如果你收到类似“NuiInitalize\
  \ Failed”的警报，或者看到图 8-3 中的窗口，那么说明出了问题：\n\n![images](img/0803.jpg)\n\n*图 8-3. “示例骨骼查看器”程序运行失败*\n\
  \n在这种情况下，就该进行故障排除了。和往常一样，确保 Kinect 已插入你的电脑，并且电源线已连接到墙上插座。如果你有很多 USB 设备或使用了 USB 集线器，则需要为\
  \ Kinect 腾出空间：要么将其直接插入电脑的某个端口，要么如果必须插在集线器上，请确保 Kinect 不与任何其他高吞吐量的 USB 设备共享该集线器。\n\
  \n另一个潜在的麻烦来源是驱动程序。如果你安装了第三方 Kinect 设备驱动程序来运行本书中的任何其他软件包或示例，那么 Kinect SDK 附带的新驱动程序应该会取代第三方驱动程序。但是，如果存在冲突，你可能需要在设备管理器中卸载其他驱动程序（见下文）。\n\
  \n在安装了 SDK 之后首次连接 Kinect 时，Windows 会自动为各种硬件组件安装驱动程序，这些组件现在被识别为 Microsoft Kinect\
  \ Device、Microsoft Kinect Camera 和 Microsoft Kinect Audio Array Control。如果你查看设备管理器，你应该会在“Microsoft\
  \ Kinect”列表项下找到这三个组件。但是，如果你在通用的“人体学输入设备”列表项下仍然看到“Xbox NUI Motor”、“XBox NUI Camera”和“XBox\
  \ NUI Audio”，则需要右键单击每一个并选择“卸载”。\n\n最后，在进行这些更改后，你可能还需要卸载并重新安装 Kinect SDK 和驱动程序。一旦你在设备管理器中看到“Microsoft\
  \ Kinect”及其三个组件，就应该没问题了。但如果仍然不行，你需要查看在线论坛来排查你的特定问题。\n\n#### 设置新的 Kinect 项目\n\n如果你是\
  \ Windows 开发的新手，你可能希望将此部分加为书签，因为每次你在 Visual C# Express 中设置一个要使用 Kinect SDK 的新项目时，都必须执行我们在此介绍的步骤。\n\
  \n基本上，过程如下：\n\n1.  创建一个新的 Windows Presentation Foundation (WPF) 项目。\n2.  添加对 Kinect\
  \ SDK 和 Coding4Fun Kinect 库的引用。\n3.  添加 `using` 语句，告知我们的代码正在使用哪些库。\n4.  在我们的应用程序中创建标准的加载和关闭事件，以初始化和取消初始化\
  \ Visual Studio 在运行 Kinect 应用程序时使用的资源。\n\n类似的步骤在微软研究网站上的快速入门视频系列中也有介绍。\n\n#####\
  \ 第 1 步：创建一个新项目\n\n要在 Visual C# Express 中创建一个新的 WPF 项目，只需启动应用程序，然后从主屏幕选择“文件”![images](img/U001.jpg)\
  \ “新建项目…”或“新建项目…”。在打开的对话框中，选择“WPF 应用程序”，如图 8-4 所示。\n\n![images](img/0804.jpg)\n\n\
  *图 8-4. Visual C# Express 中的新建项目对话框*\n\nWindows Presentation Foundation 简单来说就是 Windows\
  \ 用来组织和链接 Windows 应用程序中用户界面元素的系统。XML（或 XAML）文件是 WPF 的核心——当你的新项目创建时，你会看到一个名为 `MainWindow.Xaml`\
  \ 的文件。\n\n###### 第 3 步：添加 `Using` 语句\n\n终于，我们可以开始编码了！你需要从编辑 XAML 文件切换到编辑名为 `MainWindow.xaml.cs`\
  \ 的 C#（“C-Sharp”）文件。通过点击项目主区域中的 `MainWindow.xaml.cs` 选项卡来完成此操作。你应该会看到如图 8-8 所示的代码。\n\
  \n![images](img/0808.jpg)\n\n*图 8-8. `MainWindow.xaml.cs` 中的 C# 代码*\n\n你会看到已经有一些\
  \ `using` 语句。将光标放在最后一个之后，新建一行，然后输入：\n\n```\nusing Microsoft.Research.Kinect.Nui;\n\
  using Microsoft.Research.Kinect.Audio;\nusing Coding4Fun.Kinect.Wpf;\n```\n\n完成。不过，可别真的照着输入啊！\n\
  \n\n\n### 步骤 4：创建加载和关闭事件\n\n再完成一步，我们的 Kinect 项目模板就大功告成了！这一步的原因很简单：我们需要确保在每个使用 Kinect\
  \ 运行时的应用程序中，都对其进行初始化和反初始化，否则会导致混乱（至少是糟糕的内存管理）。因此，我们将添加一些函数，当应用程序窗口加载时自动初始化该运行时，并在窗口关闭时自动反初始化。\n\
  \n为此，请切换回 XAML 文件选项卡，查看项目窗口右下角的“属性”面板。单击“事件”选项卡，按字母顺序浏览事件列表，直到看到如图 8-9 所示的 `Loaded`\
  \ 事件。\n\n![images](img/0809.jpg)\n\n***图 8-9.** 突出显示 Loaded 事件的属性面板*\n\n双击 `Loaded`\
  \ 事件。Visual Studio 会自动创建一个空的事件回调函数，并切换回包含该函数的 .cs 文件：\n\n```\nprivate void Window_Loaded(object\
  \ sender, RoutedEventArgs e)\n        {\n\n        }\n```\n\n现在，重复这些步骤，为应用程序添加一个\
  \ `Closed` 事件，这将在 .cs 文件中添加 `Window_Closed` 事件回调函数。我们只需放入初始化和反初始化代码即可完成。幸运的是，Kinect\
  \ SDK 让这段代码变得超简单。\n\n将光标置于 `Window_Loaded` 函数之前（外部），并为 Kinect 运行时命名，如下所示：\n\n```\n\
  Runtime kinect = new Runtime();\n```\n\n现在，在 `Window_Loaded` 函数内部，使用 `Initialize()`\
  \ 函数初始化运行时。该函数接受由 \"|\" 字符分隔的配置选项作为参数。我们只需告诉应用程序使用 Kinect 的 RGB 彩色摄像头和原始深度数据：\n\n\
  ```\nkinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepth);\n```\n\
  \n最后，在 `Window_Closed` 函数内部添加一个 `Uninitialize()` 函数调用：\n\n```\nkinect.Uninitialize();\n\
  ```\n\n完成时，.cs 文件中的代码应如下所示：\n\n```\nusing System;\nusing System.Collections.Generic;\n\
  using System.Linq;\nusing System.Text;\nusing System.Windows;\nusing System.Windows.Controls;\n\
  using System.Windows.Data;\nusing System.Windows.Documents;\nusing System.Windows.Input;\n\
  using System.Windows.Media;\nusing System.Windows.Media.Imaging;\nusing System.Windows.Navigation;\n\
  using System.Windows.Shapes;\nusing Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
  using Coding4Fun.Kinect.Wpf;\n\nnamespace WpfApplication1\n{\n    /// <summary>\n\
  \    /// MainWindow.xaml 的交互逻辑\n    /// </summary>\n    public partial class MainWindow\
  \ : Window\n    {\n        public MainWindow()\n        {\n            InitializeComponent();\n\
  \        }\n\n        Runtime kinect = new Runtime();\n        private void Window_Loaded(object\
  \ sender, RoutedEventArgs e)\n        {\n            kinect.Initialize(RuntimeOptions.UseColor\
  \ | RuntimeOptions.UseDepth);\n        }\n\n        private void Window_Closed(object\
  \ sender, EventArgs e)\n        {\n            kinect.Uninitialize();\n        }\n\
  \n    }\n}\n```\n\n太棒了！现在你可以成功生成并运行/调试此应用程序，建议执行此操作以确保没有语法错误。单击图 8-10 中所示的绿色箭头。\n\
  \n![images](img/0810.jpg)\n\n***图 8-10.** 启动生成和调试序列的绿色箭头*\n\n当然，这个应用程序绝对*什么都不做*！*看起来*它什么都没做。但它确实安全地初始化和反初始化了\
  \ Kinect 运行时，这样我们想要夹在 `Loaded` 和 `Closed` 事件之间的任何代码都能正确执行。这是我们为每个新 Kinect 项目都希望使用的基本模板设置，因此你可以将其保存在某处，以便需要时复制使用。\n\
  \n现在，我们来构建。\n\n### 构建一个简单的应用\n\n构建 Kinect 应用程序现在只需在 XAML 文件中设计好用户界面（使用 Visual Studio\
  \ 中的创作工具即可轻松完成），然后在刚刚处理好的 `Loaded` 和 `Closed` 事件之间添加一些执行代码（Coding4Fun 工具包会让这一步变得极其简单）。让我们开始吧。\n\
  \n#### 决定构建什么\n\n像我们介绍过的许多引导示例一样，假设我们只想构建一个类似于“骨骼查看器示例”的简单应用，但我们希望从头开始，以便真正了解其中的要点（示例源码随\
  \ SDK 提供，但它们没有使用 Coding4Fun 辅助库，因此相对复杂一些）。本质上，我们希望创建一个能够获取主要原始数据流（彩色和深度图像）、执行一些分析使数据更有用（用户分割和骨骼跟踪）并将其渲染到屏幕上的应用。那么，我们该怎么做呢？\n\
  \n#### 设计用户界面\n\n从上一节创建的模板开始，选择 `MainWindow.XAML` 选项卡。请注意在设计视图（上部）面板中有一个白色的主窗口框。这表示主应用程序窗口，当你启动应用时，它将直接位于窗口框架内部。\n\
  \n如果你单击主窗口框，角落会出现手柄，你可以像图 8-11 那样单击并拖动它们来调整窗口大小。我们只需进行一些简单的点击和拖动，就能按照我们的意愿来布局主窗口及其中的任何对象。\n\
  \n![images](img/0811.jpg)\n\n***图 8-11.** XAML 文件的设计视图允许你使用鼠标移动和调整对象大小*\n\n我将主窗口的角拖拽到宽度为\
  \ 800 像素、高度为 350 像素。当你释放鼠标时，可以在代码视图中看到属性值的变化；你也可以在代码中修改它们，或者在项目窗口左下角的“属性”面板中修改。例如，在代码视图中，我的\
  \ Window 标签的属性看起来像这样：\n\n```\nTitle=\"MainWindow\" Height=\"350\" Width=\"800\"\
  \ Closed=\"Window_Closed\" Loaded=\"Window_Loaded\"\n```\n\n现在，如图 8-12 所示，打开项目窗口左上角的工具箱，从“工具”面板中拖动一个图像对象到主窗口上。就像我们处理主窗口一样，使用手柄、属性面板或\
  \ XAML 代码来调整图像对象的大小。只需确保符合 Kinect 640 × 480 分辨率的长宽比。例如，我将它的大小调整为 320 × 240 像素。\n\
  \n![images](img/0812.jpg)\n\n***图 8-12.** Visual Studio 中的工具箱，突出显示了一个图像对象*\n\n然后，你可以复制并粘贴图像对象的另一个实例到主窗口上，这样我们就有一个用于\
  \ RGB 图像，另一个用于深度图像。按你喜欢的方式排列它们，注意选定对象的属性面板会显示其默认名称（例如 `image1`、`image2` 等）。如果需要，你可以更改这些名称，但这些名称将在代码中用于以编程方式定位这些对象。说到这里，我们先保持布局不变，开始在\
  \ .cs 文件中进行代码连接。\n\n\n\n### 用代码连接用户界面\n\n以下是实现此功能的方法：我们将利用 Kinect 运行时的事件，在有新的 RGB\
  \ 图像数据帧时触发一个函数，在有新的深度数据帧时触发另一个函数。这些函数将更新主窗口中相应图像对象的内容，如此一来，我们就能拥有一个收集并呈现 Kinect\
  \ 主要数据流的应用程序了。\n\n因此，在 `Window_Loaded` 函数中初始化 Kinect 运行时的代码下方，输入一些代码来监听新帧或 `FrameReady`\
  \ 事件，并将它们绑定到适当的回调函数（我们稍后会定义这些函数）：\n\n```csharp\nkinect.VideoFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_VideoFrameReady);\n\
  kinect.DepthFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_DepthFrameReady);\n\
  ```\n\n接下来，我们必须打开来自 Kinect 设备的这些数据流，以开始生成图像。只需添加：\n\n```csharp\nkinect.VideoStream.Open(ImageStreamType.Video,\
  \ 2, ImageResolution.Resolution640x480,\nImageType.Color);\nkinect.DepthStream.Open(ImageStreamType.Depth,\
  \ 2, ImageResolution.Resolution320x240,\nImageType.Depth);\n```\n\n这段代码的含义相当明了：我们使用内置设置和类型来配置并启动每个数据流。`Stream.Open()`\
  \ 函数的第二个参数（即这里的数字“2”）是唯一可能令人费解的部分：它指的是 `PoolSize`，即用于播放流数据的缓冲区数量。其值必须在 1 到 4 之间。我们选择了\
  \ 2：一个缓冲区用于显示当前帧，另一个用于加载新帧。增加缓冲区数量会引入延迟，但可能使数据播放更流畅。\n\n最后，为了让这个应用程序运行起来，我们需要定义那些绑定到\
  \ `FrameReady` 事件的函数，即 `kinect_VideoFrameReady` 和 `kinect_DepthFrameReady` 函数。同样，这些函数只需用来自\
  \ Kinect 彩色和深度数据流的图像数据更新我们的图像对象。借助 Coding4Fun 库提供的 `ToBitmapSource()` 方法，这相当简单：\n\
  \n```csharp\nvoid kinect_VideoFrameReady(object sender, ImageFrameReadyEventArgs\
  \ e)\n{\n        image1.Source = e.ImageFrame.ToBitmapSource();\n}\n\nvoid kinect_DepthFrameReady(object\
  \ sender, ImageFrameReadyEventArgs e)\n{\n        image2.Source = e.ImageFrame.ToBitmapSource();\n\
  }\n```\n\n你可能还记得，“image1”和“image2”这两个名称是我们从工具箱拖入主窗口的图像对象所使用的默认名称。如果你在 XAML 文件中更改了这些名称，那么你需要在代码中也进行相应更改。完成这些后，我们就可以构建并运行该项目了。你应该会得到类似图\
  \ 8-13 所示的输出窗口。\n\n![images](img/0813.jpg)\n\n***图 8-13.** 彩色图像与深度图像*\n\n这很简单！但这并没有提供任何\
  \ libfreenect 无法实现的功能。神奇之处在哪里？问得好。让我们看看能否添加一些微软的独门秘技！\n\n首先，我们可以尝试获取一个深度图像，用于识别\
  \ Kinect 前方场景中的人，这个任务通常称为*用户分割*，但在微软 API 的语境下可能被称为*玩家分割*。使用 Kinect SDK，我们只需更改运行时配置，并将整个代码中的深度图像类型从\
  \ `Depth` 改为 `DepthAndPlayerIndex`，即可添加玩家分割功能。这意味着要将初始化代码改为：\n\n```csharp\nkinect.Initialize(RuntimeOptions.UseColor\
  \ | RuntimeOptions.UseDepthAndPlayerIndex);\n```\n\n并且像这样更改 `DepthStream.Open()`\
  \ 中的图像类型：\n\n```csharp\nkinect.DepthStream.Open(ImageStreamType.Depth, 2, ImageResolution.Resolution320x240,\n\
  ImageType.DepthAndPlayerIndex);\n```\n\n然后，我们就能得到类似图 8-14 所示的图像，其中“玩家”在场景中被分割出来，并附有颜色覆盖层。\n\
  \n![images](img/0814.jpg)\n\n***图 8-14.** 彩色图像与 DepthAndPlayerIndex 图像*\n\n那么，像样的骨骼追踪——也就是让使用\
  \ Kinect 传感器进行实际游戏成为可能的技术——该如何实现呢？实际上，在应用程序中实现骨骼追踪并不比实现上述的彩色和深度图像功能更困难。只需在运行时配置中添加一个选项，并增加一个\
  \ `SkeletonFrameReady` 事件和相应的回调函数。在 `Window_Loaded` 函数中，需要更改/添加两行代码：\n\n```csharp\n\
  kinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepthAndPlayerIndex\
  \ |\nRuntimeOptions.UseSkeletalTracking);\nSkeletonFrameReady += new\nEventHandler<SkeletonFrameReadyEventArgs>(kinect_SkeletonFrameReady);\n\
  ```\n\n当然，在实践中，要使用骨骼信息，你需要编写一个 `kinect_SkeletonFrameReady` 函数，智能地利用这些数据，将身体关节点映射到应用程序中的对象和控制器等。以下是完整的骨骼查看器代码的简化版本，它负责映射这些数据并将其绘制到屏幕上，产生类似于图\
  \ 8-15 所示的效果（需要在添加第三个图像对象来显示骨骼之后）：\n\n![images](img/0815.jpg)\n\n***图 8-15.** 在窗口中央显示骨骼*\n\
  \n该代码部分借用于 Sample Skeletal Viewer，看起来像这样：\n\n```csharp\nusing System;\nusing System.Collections.Generic;\n\
  using System.Linq;\nusing System.Text;\nusing System.Windows;\nusing System.Windows.Controls;\n\
  using System.Windows.Data;\nusing System.Windows.Documents;\nusing System.Windows.Input;\n\
  using System.Windows.Media;\nusing System.Windows.Media.Imaging;\nusing System.Windows.Navigation;\n\
  using System.Windows.Shapes;\nusing Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
  using Coding4Fun.Kinect.Wpf;\n\nnamespace WpfApplication1\n{\n    /// <summary>\n\
  \    /// MainWindow.xaml 的交互逻辑\n    /// </summary>\n    public partial class MainWindow\
  \ : Window\n    {\n        public MainWindow()\n        {\n            InitializeComponent();\n\
  \        }\n\n        Runtime kinect = new Runtime();\n\n        private void Window_Loaded(object\
  \ sender, RoutedEventArgs e)\n        {\n            kinect.Initialize(RuntimeOptions.UseColor\
  \ | RuntimeOptions.UseDepthAndPlayerIndex |\n            RuntimeOptions.UseSkeletalTracking);\n\
  \            kinect.VideoFrameReady += new\nEventHandler<ImageFrameReadyEventArgs>(kinect_VideoFrameReady);\n\
  \            kinect.DepthFrameReady += new\nEventHandler<ImageFrameReadyEventArgs>(kinect_DepthFrameReady);\n\
  \            kinect.SkeletonFrameReady += new\nEventHandler<SkeletonFrameReadyEventArgs>(kinect_SkeletonFrameReady);\n\
  \            kinect.VideoStream.Open(ImageStreamType.Video, 2,\nImageResolution.Resolution640x480,\
  \ ImageType.Color);\n            kinect.DepthStream.Open(ImageStreamType.Depth,\
  \ 2,\nImageResolution.Resolution320x240, ImageType.DepthAndPlayerIndex);\n     \
  \   }\n\n        void kinect_VideoFrameReady(object sender, ImageFrameReadyEventArgs\
  \ e)\n        {\n            image1.Source = e.ImageFrame.ToBitmapSource();\n  \
  \      }\n\n        void kinect_DepthFrameReady(object sender, ImageFrameReadyEventArgs\
  \ e)\n        {\n            image2.Source = e.ImageFrame.ToBitmapSource();\n  \
  \      }\n\n        void kinect_SkeletonFrameReady(object sender, SkeletonFrameReadyEventArgs\
  \ e)\n        {\n            SkeletonFrame skeletonFrame = e.SkeletonFrame;\n  \
  \          int iSkeleton = 0;\n            Brush[] brushes = new Brush[6];\n   \
  \         brushes[0] = new SolidColorBrush(Color.FromRgb(255, 0, 0));\n        \
  \    brushes[1] = new SolidColorBrush(Color.FromRgb(0, 255, 0));\n            brushes[2]\
  \ = new SolidColorBrush(Color.FromRgb(64, 255, 255));\n            brushes[3] =\
  \ new SolidColorBrush(Color.FromRgb(255, 255, 64));\n            brushes[4] = new\
  \ SolidColorBrush(Color.FromRgb(255, 64, 255));\n            brushes[5] = new SolidColorBrush(Color.FromRgb(128,\
  \ 128, 255));\n```\n\n\n\n`canvas1.Children.Clear();`\n`foreach (SkeletonData data\
  \ in skeletonFrame.Skeletons)`\n`{`\n`    if (SkeletonTrackingState.Tracked == data.TrackingState)`\n\
  `    {`\n`        // 绘制骨骼`\n`        Brush brush = brushes[iSkeleton % brushes.Length];`\n\
  `        canvas1.Children.Add(getBodySegment(data.Joints, brush, JointID.HipCenter,`\n\
  `JointID.Spine, JointID.ShoulderCenter, JointID.Head));`\n`        canvas1.Children.Add(getBodySegment(data.Joints,\
  \ brush,`\n`JointID.ShoulderCenter, JointID.ShoulderLeft, JointID.ElbowLeft, JointID.WristLeft,`\n\
  `JointID.HandLeft));`\n`        canvas1.Children.Add(getBodySegment(data.Joints,\
  \ brush,`\n`JointID.ShoulderCenter, JointID.ShoulderRight, JointID.ElbowRight, JointID.WristRight,`\n\
  `JointID.HandRight));`\n`        canvas1.Children.Add(getBodySegment(data.Joints,\
  \ brush,`\n`JointID.HipCenter, JointID.HipLeft, JointID.KneeLeft, JointID.AnkleLeft,\
  \ JointID.FootLeft));`\n`        canvas1.Children.Add(getBodySegment(data.Joints,\
  \ brush, JointID.HipCenter,`\n`JointID.HipRight, JointID.KneeRight, JointID.AnkleRight,\
  \ JointID.FootRight));`\n\n`        // 绘制关节点`\n`        foreach (Joint joint in\
  \ data.Joints)`\n`        {`\n`            Point jointPos = getDisplayPosition(joint);`\n\
  `            Line jointLine = new Line();`\n`            jointLine.X1 = jointPos.X\
  \ - 3;`\n`            jointLine.X2 = jointLine.X1 + 6;`\n`            jointLine.Y1\
  \ = jointLine.Y2 = jointPos.Y;`\n`            jointLine.Stroke = brushes[0];`\n\
  `            jointLine.StrokeThickness = 6;`\n`            canvas1.Children.Add(jointLine);`\n\
  `        }`\n`    }`\n`    iSkeleton++;`\n`} // 遍历每个骨骼`\n`}`\n\n`private Point getDisplayPosition(Joint\
  \ joint)`\n`{`\n`    float depthX, depthY;`\n`    kinect.SkeletonEngine.SkeletonToDepthImage(joint.Position,\
  \ out depthX, out`\n`depthY);`\n`    depthX = depthX * 320; // 转换为 320x240 空间`\n\
  `    depthY = depthY * 240; // 转换为 320x240 空间`\n`    int colorX, colorY;`\n`   \
  \ ImageViewArea iv = new ImageViewArea();`\n`    // 此时仅支持 ImageResolution.Resolution640x480\
  \ 分辨率`\n\n`    kinect.NuiCamera.GetColorPixelCoordinatesFromDepthPixel(ImageResolution.Resolution640x480,\
  \ iv,`\n`(int)depthX, (int)depthY, (short)0, out colorX, out colorY);`\n\n`    //\
  \ 映射回 skeleton.Width 和 skeleton.Height`\n`    return new Point((int)(canvas1.Width\
  \ * colorX / 640.0), (int)(canvas1.Height *`\n`colorY / 480));`\n`}`\n\n`Polyline\
  \ getBodySegment(Microsoft.Research.Kinect.Nui.JointsCollection joints, Brush`\n\
  `brush, params JointID[] ids)`\n`{`\n`    PointCollection points = new PointCollection(ids.Length);`\n\
  `    for (int i = 0; i < ids.Length; ++i)`\n`    {`\n`        points.Add(getDisplayPosition(joints[ids[i]]));`\n\
  `    }`\n\n`    Polyline polyline = new Polyline();`\n`    polyline.Points = points;`\n\
  `    polyline.Stroke = brush;`\n`    polyline.StrokeThickness = 5;`\n`    return\
  \ polyline;`\n`}`\n\n`private void Window_Closed(object sender, EventArgs e)`\n\
  `{`\n`    kinect.Uninitialize();`\n`}`\n\n`}`\n\n### 需要更多？\n\n在本章中，我们努力为使用微软 Kinect\
  \ SDK 构建应用程序所需的所有工具提供了详细介绍，但显然，所展示的应用程序相当基础：我们只使用了 Kinect 的摄像头和深度功能（甚至没有涉及音频），以及开箱即用的用户分割骨骼追踪功能。\n\
  \n还有很多事情可以做，如果微软的工具集吸引你，毫无疑问你会想做得更多！这超出了本书的范围，但 Coding4Fun 网站和开放网络上不断增长的示例代码可供你参考，其中许多代码针对特定任务和用例。四处搜索，订阅论坛，并关注微软，因为在最初缓慢支持\
  \ Kinect 开发者之后，他们现在正全力推进！\n\n![images](img/square.jpg) **注意** 要更深入地了解微软 Kinect SDK，最好的方法是获取\
  \ Jarrett Webb 和 James Ashley 的著作 *Beginning Kinect Programming*。该书也由 Apress 出版。\n\
  \n"
- '# 第 9 章


  ## 体三维显示技术


  在本章中，你将熟悉用于视觉图像体三维显示的各种技术。与传统的 2D 屏幕，甚至是最新的基于眼镜的立体 3D 电视和影院体验不同，体三维技术为观看者提供了“全息”图像的感觉，并根据用于在自然
  3D 空间中重建显示的技术，提供不同程度的运动视差。运动视差描述的是基于观察者相对于背景中多个静止物体的运动来感知深度的能力。信不信由你，许多人实际上无法感知立体眼镜带来的
  3D 效果，因为他们的大脑缺乏完整的立体视觉发育。为什么这些人不会撞到东西？这是因为你头部的每一次轻微移动都会揭示周围环境的深度。这一在任何大众市场 3D 解决方案中都尚未实现的功能，正是这种新颖方法区别于基于眼镜体验的关键所在。


  也许科幻领域最著名的体三维显示实际例子来自最初的《星球大战》电影，当时 R2D2 播放了莱娅公主告诉欧比旺·克诺比他是她唯一希望的录像。深度感知摄影技术，例如
  Kinect，可以有效捕捉“全息”或体三维视频记录，但并不提供将其回放到体三维 3D 空间的方法。体三维显示器是将这些“全息”体验投射回日常生活维度的关键。在很大程度上，这些显示器仍处于研究前沿，且价格高得令人望而却步，消费者无法在家中体验，今年它们还不会进入你的客厅——但技术进步的节奏会出人意料地飞跃，正如
  Kinect 向我们展示的那样。


  本章将涵盖新颖显示器类型的全貌，包括那些严格符合体三维显示器的类型，以及许多不符合的类型。它将涵盖那些包含关键特性（如运动视差和屏幕上的多视角）的显示器，以及一些虽然不具备这些特性却仍被公众误称为“全息”的显示器，因为它们的图像悬浮在空中。这是对许多人不熟悉的显示技术的介绍，因为互联网上关于该主题的较新信息收集得很少。这些创新的方法未来很可能会更频繁地出现，也许会相互结合，以满足公众的需求——他们已通过
  Kinect 的体三维摄像头受到了启发，并将期望在真正沉浸式的体验中获得超越 2D 屏幕的东西。




  ### 静态体显示


  如果你在过去几年里逛过美国任何大型商场或旅游区，你很可能见过那种提供 3D 人像照片打印的新奇服务，照片会被蚀刻到透明塑料棱镜中（图 9-1），这种工艺被称为“亚表面激光雕刻”。虽然这不是一种可以更新的体显示设备，但它为我们理解第一类显示——*静态体*显示——提供了参考基准。


  ![images](img/0901.jpg)


  ***图 9-1.** 亚表面激光雕刻。图片由 LooxisFL.com 提供*


  对于能够像视频一样实时变化、活灵活现的体显示，我们需要研究如何在感兴趣的空间内控制彩色光点的开启和关闭，而不是简单地将静态图像蚀刻在某个位置。实现这一目标的一种直接方法是使用立方体结构的
  LED，其中每个发光二极管作为一个体素。图 9-2 展示了这样一个设备。它是由八岁的乔伊·哈迪制作的，他是网站“Look What Joey''s Making”（[`http://lwjm.us/`](http://lwjm.us/)）的幕后推动者。乔伊制作了图
  9-2 所示的 LED 显示屏用于销售。访问他的网站，立即订购属于你的那一个吧。


  ![images](img/0902.jpg)


  ***图 9-2.** 八年级学生乔伊·哈迪制作的**3×3×3** LED 显示屏的 Arduino 扩展板，图片由 lwjm.us 提供*


  目前市面上最大的此类商用显示屏之一拥有一个`66×48×24`的 LED 阵列，由 Seekway（[`seekway.com.cn`](http://seekway.com.cn)）制造。这意味着有`76,032`个独立的
  LED 灯需要连接成电路，并由微处理器单独寻址。这个设备大约 6 英尺高、1.5 英尺深、3 英尺宽，售价高达数千美元。


  ![images](img/square.jpg) **注意** 对于想要自己动手制作简单 LED 显示屏的爱好者来说，Instructables.com 上的两篇文章是很好的资源。一篇介绍了如何制作一个`8×8`的立方体：[`www.instructables.com/id/Led-Cube-8x8x8/`](http://www.instructables.com/id/Led-Cube-8x8x8/)；另一篇稍微简单一些，介绍如何制作一个`4×4×4`的
  LED 立方体：[`www.instructables.com/id/LED-Cube-4x4x4/`](http://www.instructables.com/id/LED-Cube-4x4x4/)。当然，也别忘了乔伊·哈迪的网站[`http://lwjm.us/`](http://lwjm.us/)。


  ### 向静态体投影


  为了克服需要将独立灯珠逐个连接到网格化立方体电路中的难题，一种非常巧妙的技术是直接将光线投射到空间中感兴趣区域的反射材料上。阿尔伯特·黄、马特·帕克和艾略特·伍兹创建了开源设计项目
  Lumarca（图 9-3），通过以非常特殊的方式悬挂数百根绳子，使投影仪能够对准这个网状结构，从而产生非凡的效果。借助用于校准的定制软件，并将一台 SVGA（`1024
  × 768`）投影仪非常精确地对准线阵，无论每根线在空间中的位置如何——在体积的前部、后部，还是两者之间的任何位置或两侧——每根线都可以被单独寻址照明。每根线都必须精心放置，以免遮挡投影光束照射到其后面的另一根线。


  你可以在项目网站 [`madparker.com/lumarca/construction`](http://madparker.com/lumarca/construction)
  上找到如何自己动手用不到 100 美元建造一个这样的设备的详细说明。在 2011 年纽约制汇节上，该团队首次展示了一个大约 1 英尺见方的微型投影仪套件。如果进一步小型化，能否将一个小型塑料棱镜中
  3D 激光蚀刻的“线”或点与口袋投影仪结合，在固态介质中重现这种显示效果？哥伦比亚大学的研究人员已经朝着这个方向迈出了一步，他们研究了被动光学散射投影技术（[`www.cs.columbia.edu/CAVE/projects/3d_display/`](http://www.cs.columbia.edu/CAVE/projects/3d_display/)）。关于体三维显示，仍有大量研究和开发工作要做，因此将这些技术混合搭配可能会带来前所未有的创新。拓荒者们，前进吧！


  ![images](img/0903.jpg)


  ***图 9-3.** Lumarca 体显示，将图像投影到悬挂的绳子上。照片由杰夫·霍华德拍摄*


  ### 扫描体显示


  扫描体显示在许多方面都算是“传统”意义上的体显示。这些设备的专利申请可以追溯到 20 世纪 50 年代和 60 年代，但我们直到最近几十年才开始看到实际应用。扫描体显示利用一个发光的二维截面来呈现立体图像，并通过一种机制快速移动该截面的位置及其内容，使其与正在穿过的空间保持同步，利用视觉暂留效应在空间中印刻出一个三维体图像。


  1988 年，纽约科学馆花费了 40,000 美元建造了一个可以交互式显示“量子原子”的体三维显示器。通过一个由计算机控制示波器照亮的往复式机械运动圆盘，一个固体运动物体的各个切片被投射到圆柱体内的空间中，使得观众可以围绕这个交互式电子
  3D 图像 360 度行走。该显示器的设计者艾伦·杰克逊发起了一项新计划，旨在利用现代硬件和开源软件，将采用相同往复运动扫描体技术的价格合理的设备交到开发者手中。


  艾伦的 VoxieBox（[`voxiebox.com`](http://voxiebox.com)）将自 2012 年起以套件或预组装形式提供。与 Primesense
  的 OpenNI 计划类似，VoxieBox 将推广一个由 OpenVoxel.org 开发的用于体显示的开源框架，以吸引一个能够利用这些设备独特能力的开发者社区。Kinect
  在让 3D 捕捉技术的开发变得易于获取方面做出了巨大贡献，而 VoxieBox 以及 OpenVoxel 框架将支持的其他设备，则希望在体三维显示领域达到同样的效果。与那些昙花一现、之后未能在公众视野中聚集势头的专有商业设备及研究项目不同，利用开源创新者激情的努力更有可能获得成功。


  其中一项研究项目来自南加州大学创意技术研究所。该项目依赖扫描体机制来实现他们的“交互式 360 度光场显示器”（图 9-5）。在该设计中，一台投影仪从上方指向旋转的镜子。这种直接的方法可以作为在可控环境中——例如艺术馆、博物馆或零售场所——重现所需效果的基础，打造一个更独立、无需远程摆放投影仪的装置。有关该系统的更多信息，请访问
  [`gl.ict.usc.edu/Research/3DDisplay/`](http://gl.ict.usc.edu/Research/3DDisplay/)。




  2002 年，Actuality Systems 公司推出了一款产品，该产品采用了与创造性技术研究所描述的旋转镜系统类似的扫描体技术。他们的设备 `Perspecta`（图
  9-4）造价约 30,000 美元，并利用旋转屏幕下方一套精密的光学系统，使设备显著更加紧凑。由于投影并非来自上方，观看者可以将手放在玻璃屏幕顶部而不会中断图像显示。`Perspecta`
  设备被推向医疗行业，用于可视化 MRI 扫描仪产生的体积图像。依赖物理运动来扫描图像的系统的缺点之一是，其部件可能会损坏，且比固态系统需要更频繁的更换；同时，干扰屏幕预期运动路径的振动会中断视觉暂留效应。因此，此类系统不适用于车辆内的移动应用，也无法在暴露于旋转机械轰鸣声的环境中使用。或许是由于这款独特产品难以获得市场认可，Actuality
  Systems 于 2009 年关闭，但其工程师可通过 `opticsforhire.com` 提供咨询服务。


  ![images](img/0904.jpg)


  ***图 9-4.** Actuality Systems 公司的 Perspecta 体三维显示器。图片由 OpticsForHire.com 提供*


  这些扫描体系统的主要缺点之一是对带有运动部件的设备的维护。LightSpace Technologies 公司通过 `DepthCube` 创造了一种卓越的方法来解决这个问题。通过将投影图像快速循环到
  20 个垂直堆叠的液晶镀层板之一上，构建出一个具有深度感的切片堆栈。这些 LCD 板在施加电流之前保持不透明，之后变为透明。利用 `DepthCube` 设计，每次只有
  20 个板中的一个保持不透明，投影仪可以将正确的图像切片从整个体堆栈投射到该板上。当所有部件同步并以极快速度运行时，视觉暂留效应会将图像切片堆栈融合成一个连贯的立体图像。观看
  `DepthCube` 的实际运作，请访问：[`youtu.be/RAasdH10Irg`](http://youtu.be/RAasdH10Irg)。


  除专利文件和学术论文外，关于如何自行构建扫描体显示器的在线信息非常少。随着人们对这些独特能力的更多关注，这种情况将会改变。我们需要看到一个由共同兴趣凝聚而成的更大社区，共同推动这项技术进入主流。在此之前，这份关于如何使用
  LED 灯构建旋转扫描体的指南能让您了解其中涉及的要点：[`bit.ly/makevolumedisplay`](http://bit.ly/makevolumedisplay)。


  如果您需要为 LED 开始显现其局限性的高分辨率显示器配置一个基于投影仪的图像生成器，德州仪器的 `DLP` 开发套件（[`bit.ly/dlpdevkits`](http://bit.ly/dlpdevkits)）提供了一个坚实的基础。德州仪器的
  `Digital Light Processing`（数字光处理）技术搭配 `Digital Micromirror Device`（数字微镜器件），售价为 350
  美元，其 `DLP Pico Projector Development Kit`（DLP Pico 投影仪开发套件）能以 1440 帧/秒的速度运行在单色模式下，比一副扑克牌还小，并产生
  7 流明的图像亮度，使其非常适合超短距离安装。在其原生分辨率 `480 × 320` 下，您需要保持投影图像较小以获得最佳图像密度。售价 3,500 美元的 `DLP
  LightCommander` 提供了一种更模块化的设计——大约相当于一个烟机的大小——其单色二进制图案模式最高可达 5000 帧/秒，并能通过尼康 f 卡口可互换镜头提供
  200 流明的光输出。其原生分辨率为 `1024 × 768`。`DLP Discovery 4100 Kit` 的报价高达 8,000 美元以上，提供 HD
  1080p (1920×1080) 分辨率，并拥有更高级的功能集。


  ### 佩珀尔幻象（Pepper''s Ghost）显示


  虽然扫描体技术可以生成悬浮在空中的真正立体 3D 图像，提供每个角度的独特视角，但此类系统的价格高得令人望而却步，尤其是对于相对较小的显示器。另一方面，一种源自
  19 世纪 60 年代、最初作为戏剧特效而开发的技术，可以扩展到非常大的环境，并已被用于提供令人信服的“空中”视觉效果。约翰·亨利·佩珀尔的幻象最初用于在查尔斯·狄更斯的《着魔的人》的舞台表演中神奇地显示透明幽灵。现在被称为“佩珀尔幻象”（图
  9-5），这种光学错觉依赖于来自隐蔽光源的光线反射到透明薄膜或玻璃板上，使得图像看起来悬浮在空中。同样的原理也是提词器和平视显示器工作的基础。这种技术的变体支撑着许多“全息”图像效果和显示器。


  ![images](img/0905.jpg)


  ***图 9-5.** 约翰·亨利·佩珀尔教授在伦敦皇家理工学院演示的“佩珀尔幻象”图解，1881 年*


  目前有多种商业解决方案可将这种类型的显示付诸实践，无论是大规模还是小规模应用。`Musion Eyeliner 3D`（[`eyeliner3d.com`](http://eyeliner3d.com)）和
  `Arena 3D Industrial Illusion`（[`arena3d.com`](http://arena3d.com)）销售和租赁用于贸易展览和大型娱乐制作的系统。`Teleportec`（[www.teleportec.com/](http://www.teleportec.com/)）销售一种专为远程临场感设计的更小型系统，可以将参加远程会议的人置于讲台后发表演讲，或置于会议桌旁参加会议。


  亚历山大·麦昆在其 2006/2007 秋冬时装秀《卡洛登的寡妇》中因使用基于佩珀尔幻象的错觉而备受赞誉，秀场上凯特·摩丝的形象在舞台上方浮现并漂浮。预先录制的模特视频从四个不同角度（相隔
  90 度）拍摄，从隐藏的屏幕反射到四块玻璃板上，这些玻璃板形成了一个透明的金字塔形状。


  ![images](img/square.jpg) **注意** 乐队街头顽童（Gorillaz）的卡通角色曾通过 `Eyeliner 3D` 系统与麦当娜在
  2007 年格莱美奖上进行了著名的现场表演；然而，由于用于反射的薄膜对振动敏感，在极度喧闹的音乐会环境中并不理想。该乐队此后已停止使用“全息”舞台把戏。


  许多公司已经制造了更小型的、基于佩珀尔幻象的一体式展示箱，非常适合展示悬浮或透明的产品——甚至可以将数字视频与真实物理对象混合到同一个显示区域。图 9-6 展示了一个使用
  MacBook 的简单的三面佩珀尔幻象设计。该设计由 Ujjval Panchal 创建。您可以在他的博客上阅读更多内容：[`http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/`](http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/)。


  ![images](img/0906.jpg)


  ***图 9-6**. 使用 MacBook 的三面佩珀尔幻象显示器。图片由 Ujjval Panchal 提供*


  `HoloCube`（[www.holocube.eu/](http://www.holocube.eu/)）拥有一些简单且美观的箱式设计，适用于单一方向观看。`RealFiction`（[www.realfiction.com/](http://www.realfiction.com/)）和
  `Vizoo`（[www.vizoo.com/](http://www.vizoo.com/)）销售金字塔形系统，其工作原理类似于亚历山大·麦昆秀场的布置，通过三到四个对应不同角度的独立视频通道，实现
  180 度到 360 度的观看视角。




  ![images](img/square.jpg) **注意** 由于这些显示器呈现的图像源自 2D 屏幕或投影源，它们并非真正意义上的体积显示或“全息”显示，无法让你从任意角度观察物体周围。


  佩珀尔幻象技术的一项创新应用是将单个 2D 显示器或投影源分割成多个佩珀尔幻象图层，这些图层可以叠加起来重新构建前景、中景和背景。基于这一原理，为 iPhone
  设计了一款名为 `i3dg` 的原型配件（图 9-7），它曾预计在 2012 年初投入生产。你可以在这个视频中看到它的显示效果——[`youtu.be/JnGPtVNmtvI`](http://youtu.be/JnGPtVNmtvI)——并在
  [`i3dg.mobi`](http://i3dg.mobi) 了解更多信息。


  ![images](img/0907.jpg)


  ***图 9-7.** iPhone 的 `i3Dg` 配件利用佩珀尔幻象原理，通过三块塑料面板创造了多层次的深度体验。图片由 i3Dg 提供*


  这个设计的原始模型来自于使用塑料 CD 盒；网上的其他人已经成功使用各种材料重现了这一效果。在更大规模上，使用平板电视或特殊形状的投影表面，这项技术可以创造出非常引人注目的体验，配合合适的内容或应用，能带来真正的深度感和运动视差。


  ### 多视角自动立体平板显示器


  在本章描述的所有技术中，多视角自动立体显示器是最成熟且最容易获得的技术。它们可从多家专业供应商处获得，能与现有的开发工具结合使用，其成本不像那些更具研究性和工业级别的技术那样高昂。目前，用于数字标牌应用的自动立体
  3D 显示器市场规模约为每年 2,000 到 4,000 台，这使得这些产品的价格标签保持在 5,000 美元左右。每台显示器的生产都需要大量的资源来精心制造——从为每种
  LCD 型号定制制造精密倾斜透镜阵列，到将多视角层粘合到屏幕上所需的“洁净室”环境。此外，要为屏幕提供足够多的视角，使观看体验真正令人惊叹且不引起视觉疲劳，定制内容制作和硬件要求可能相当高。主流消费者对这些屏幕的采用将大大降低成本——就像
  Kinect 对深度感知体积摄像机市场所做的那样。


  多家制造商都提供此类显示器。总部位于纽约的 `Magnetic3D` ([`magnetic3d.com`](http://magnetic3d.com))、`3DFusion`
  ([`3dfusion.com`](http://3dfusion.com)) 和 `Exceptional3D` ([`exceptional3d.com`](http://www.exceptional3d.com))
  提供不同尺寸和质量级别的九视角显示器。`Alioscopy` ([`alioscopyusa.com /`](http://alioscopyusa.com/)
  [`alioscopy.com`](http://alioscopy.com)) 使用八视角显示技术。低端显示器有四视角和五视角的，而在高端领域，由曾在飞利浦从事自动立体屏幕工作的团队创立的
  `Dimenco` ([www.dimenco.eu](http://www.dimenco.eu)) 号称拥有二十八视角系统。`Dimenco` 的方法依赖于
  2D + 深度图源材料和专用的硬件“渲染盒”，这限制了它使用原生多视角内容的潜力。`Magnetic3D` 的九视角允许一个中心通道作为参考图像，左右两侧各有四个视角，用于环绕观察物体。在倾斜透镜阵列设计中，在提供良好运动视差的视角数量与避免因塞入过多视角而导致下层像素间产生重影或串扰之间找到平衡，需要精心权衡。


  与本章讨论的任何体积显示器一样，在某些环节，你必须找出如何针对应用的多个视图或内容进行优化，以匹配显示器的物理特性。当观看者能感受到屏幕后方下凹和屏幕前方凸出的深度时，这些屏幕才能发挥最佳效果。`Magnetic3D`
  的创始人 Thomas J. Zerega 建议，内容和应用开发者可以通过遵循最佳的内容准备实践来设计充分发掘这些显示器潜力的体验，实现“真正的体积感知”。当从屏幕平面凸出的视觉资产被
  LCD 的边框边缘切断时，就会产生“窗口冲突”，这会干扰深度感知。为了避免这种体验，程序员可以创建应用内物理机制，通过设计来避免此类瑕疵。你也可以利用这一效果，通过为显示区域添加黑边（即在屏幕上的内容周围放置黑色边框）来发挥其优势。这样一来，当一个物体要从屏幕中出来时，它可以突破数字黑边——达到出色的弹出效果——而不会被显示器边缘的硬物理“边框”切断。


  ### 激光等离子体发射显示器


  如果你追求的是将图像悬浮在空中而非固定在屏幕上的想法——那么脉冲激光在自由空间中发出的噼啪声光芒会让你兴奋。日本产业技术综合研究所 ([`bit.ly/plasmaemission`](http://bit.ly/plasmaemission))
  与庆应义塾大学和 Burton 公司合作，推动使用激光在空气分子中发光的技术，实现了一种无需云雾等生成介质的真正体积显示器。


  这类显示器的工作原理在两个层面上令人着迷。首先，它展示了动态显示器的实时演示，其性能与本章开头提到的静态塑料蚀刻激光的可变点能力相匹配。这非常棒，因为该机制不受必须遵守的固定体素网格的限制。这与其它静态或扫描显示器形成对比，后者被锁定在像素或
  LED 的边界内。


  第二个令人感兴趣的点是，有启发将用于聚焦激光束的光学技巧应用到其他类型的显示器光学器件上。在 z 轴上移动的扩散透镜和在 x 与 y 平面上调制的第二光学器件的组合，可能在本章概述的其他方法中得到应用。随着人们对真正体积显示器的兴趣日益增长，我们必将看到这些技术的融合与匹配，带来更多突破。请关注
  Burton 公司 ([`burton-jp.com`](http://burton-jp.com)) 以获取这项技术的更多进展。他们最新的显示器演示能在空间中每秒显示
  50,000 个体素点。观看视频 [`youtu.be/EndNwMBEiVU`](http://youtu.be/EndNwMBEiVU) 和 [`youtu.be/KfVS-npfVuY`](http://youtu.be/KfVS-npfVuY)
  来了解它的实际效果。




  ### 自由空间气态显示器


  悬浮在空气中的分子——例如喷洒的水雾、浓雾和细密薄雾——可作为投影介质，呈现出令人惊叹的效果。市面上此类商用产品通常基于二维素材，因此其真实的立体程度得益于一种错觉：无边界的空间区域中悬浮着没有传统屏幕边界的浮动影像切片。然而，在定制工程化配置中，通过多图像源与对空气中粒子的巧妙操控，一切皆有可能。


  ![images](img/square.jpg) **注意** 您可以在以下链接中欣赏到来自《锦鲤池畔的黄昏》的精彩图像：

  [`http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG`](http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG)。


  此类显示器的市场通常面向舞台演出或大型活动，这些场合配备一系列独特灯光，而空中显示器只是整体体验的一部分。在日本 2005 年世界博览会（EXPO 2005）上，我亲眼目睹了罗伯特·威尔逊（Robert
  Wilson）的《锦鲤池畔的黄昏》中这项技术的卓越应用。该装置将投射在漂浮于池塘的巨型固体物体上的影像，与投射在漂浮于数百英尺高空的喷泉雾中的多组影像相结合。自由空间投影技术被精心保留在特定角色出现或主舞蹈编排中的其他点睛时刻，从而赋予这些瞬间令人瞠目结舌的震撼力。因此，在装置艺术或表演场景中，建议结合使用本章所述的技术，以达到最佳效果。


  #### IO2 Heliodisplay


  IO2 Heliodisplay（`www.io2technology.com`）利用环境空气通过一系列热控金属板，产生一层从设备中喷射而出的超细不可见粒子。这些小于
  10 微米的半不可见雾化水粒子，类似于人体呼出的气息。因此，与其他方法相比，这种独特设计不会产生可见雾气或大量湿气。配合一台专为后投影设置和该气流优化的高功率
  4500 流明投影仪，即可在设备前方一定距离的空气中看到悬浮的可见图像（图 9-8）。该设备基础型号售价 48,000 美元，互动型号售价 68,000 美元。


  ![images](img/0908.jpg)


  ***图 9-8.** 嵌入桌面的 Heliodisplay 及其多种朝向选项。图片由 i2o Technologies 提供*


  直立配置可隐藏于墙壁中，将气流水平向外喷射，高度足以投射出真人大小的影像。桌面安装的设备则将气流垂直向上喷射，使图像悬浮于表面之上。设备还可倒置安装，通过特殊定制向几乎任何方向投射屏幕。关键在于设计内容时使用黑色背景，并隐藏所有物理组件、投影仪及
  heliodisplay 设备，使观众仅能看到悬浮影像。该系统不适用于前投影或短焦投影仪，因此您需要将投影仪放置在设备后方约五英尺（约 1.5 米）处。一个装满自来水的小水箱可使设备根据设置连续运行数天至一周；每隔六个月到一年需更换一次专用滤芯。该设备甚至可在户外使用——但环境需避免强风，否则风会扭曲图像。说到扭曲，请勿期望其清晰度能达到平板电视或普通投影电视的水平。仔细观察产品图片，您会发现明显的拖尾效应。与任何技术一样，最佳策略是思考如何将局限性转化为优势，或许将屏幕的条纹与波动流畅感融入与应用程序相匹配的美学中。


  #### FogScreen 显示器


  如果您不需要近距离且私密的效果，而是希望在舞台上呈现超越现实的大型影像——来自芬兰的 FogScreen（`fogscreen.com`）便是理想之选（图 9-9）。其设备利用层流气流工艺，结合超声波，将水转化为可见雾气状薄屏。其入门级型号
  FogScreen EZ 定价低于 30,000 美元，与 Heliodisplay 不同，可供全球租赁。FogScreen Pro 可串联使用以实现可变规模的装置，按米订购：一米起价
  33,000 美元，四米 100,000 美元，八米 175,000 美元，中间尺寸价格各异。


  ![images](img/0909.jpg)


  ***图 9-9.** E3 会议上的 FogScreen 投影。* 图片由 wili_hybrid 拍摄。


  FogScreen 大量应用于舞台灯光和活动展示，而 i2o 设备则更适合小规模亲密场景。与可安装于地面和墙壁的 Heliodisplay 不同，FogScreen
  仅有一种朝向——自上而下。这使得设备及其附带的吸顶安装投影仪可以隐藏于视线之外。由于光线是散射而非反射自空气中的粒子，FogScreen 也必须采用后投影方式。这一特性可转化为优势，例如有研究人员曾尝试用两台投影仪分别指向屏幕两侧，投射不同影像，从而营造出
  3D 立体感。FogScreen 配备可调节屏幕不透明度的控制器。这意味着您可以使用它实现“揭开帷幕”的效果，让人物从投影幕布后显现；或将其调至足够透明，使影像看似无边界地悬浮在空气中。


  一项特别有前景的技术利用了光在雾中传播具有方向性的特性。在 2011 年的 Interaction 大会上，大阪大学的研究人员使用三台投影仪指向一个雾柱，根据不同视角展示同一
  3D 物体的不同影像，从而满足运动视差需求。这项创新技术的精彩视频可在[`http://youtu.be/yzIeiyzRLCw`](http://youtu.be/yzIeiyzRLCw)观看。利用多台投影仪满足对场景的多视角观察，正是光场显示技术的基础。




  ### 投影光场阵列


  体三维成像领域当前备受关注的一个方向，是利用投影仪阵列在漫射滤光器上重建场景的多重视角。其核心理念是：在更多角度添加更多投影仪，就能更好地重建三维场景的原始光场。因此，当观察者通过特殊的漫射膜观察场景时，头部视角的移动会触发运动视差，从而产生观看三维场景的感知。随着低成本投影仪（包括尺寸微小的微型设备）的出现，这种方法比几年前在财务上要可行得多。


  投影光场方法被应用于日本国立信息与通信技术研究所吉田俊介的研究项目 `fVisiOn` 中，创造了一种新颖效果——桌面上的浮动三维视觉。该项目的目的是创建一种不会干扰桌面工作区，反而能让真实三维物体与虚拟物体共存的显示器。


  ![images](img/square.jpg) **注意** 您可以在项目网站 [`http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html`](http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html)
  上了解更多信息并观看视频。


  `fVisiOn` 并未采用标准的平面片材来将投影光结合成连贯的三维图像，而是依靠一个锥形屏幕。如图 9-10 所示，该显示器由一组微型投影仪组成，这些投影仪全部向内指向锥体，呈圆形排列。右上角图像中可见的白色光点显示了密集排列的投影仪环。锥体顶部放置了两层过滤材料，以增加图像的对比度。


  ![images](img/0910.jpg)


  ***图 9-10.** `fVisiOn` 显示器结构分解图。左上角显示了锥形漫射器和微型投影仪的一个角度；右上角显示了数十个安装到位的投影仪，呈现为光点；左下角和右下角显示了增加图像对比度以生成浮动数字对象的两层滤镜。*


  尽管 `fVisiOn` 让我们了解到光场显示器如何在小型规模上应用，但许多人渴望了解体三维体验将如何扩展，将体素带到影院的大银幕上。答案可能在于欧盟牵头的一系列创新举措。三个项目：`HOLOVISION`
  ([www.holovisionproject.org](http://www.holovisionproject.org))、`OSIRIS` ([www.osiris-project.eu](http://www.osiris-project.eu))
  和 `COHERENT` ([www.coherentproject.org](http://www.coherentproject.org)) 的设立，旨在将欧洲国家和公司定位为全息介质捕获、传输和显示的领先先驱。这些技术的主要集成商是一家名为
  `Holographika` 的匈牙利公司 ([www.holografika.com/](http://www.holografika.com/))。


  通过使用大约 100 个聚焦于漫射屏的投影仪，`Holographika` 的显示器重建光场，以提供对场景的分辨视角，这取决于每个观看者相对于屏幕的位置。该技术类似于大阪大学研究人员使用雾气的尝试，不同之处在于，这家公司现在已有可供租赁或购买的生产型号。由一家匈牙利公司实现这一奇迹是恰如其分的，因为实际上，全息术领域正是由一位匈牙利科学家发明的。


  尽管 `Holographika` 的产品定价并非面向消费者，价格范围在 45,000 至 150,000 美元之间，但它们设定了很高的标准，并将提供一个参考规格，用以评判未来的解决方案。对于家庭和办公用途，其背投型号在视觉上类似于等离子和
  LCD 出现之前的早期宽屏电视。为了将所有投影仪封装在内部，需要有足够的深度将图像反射到屏幕上。然而，更令人惊叹的创新在于适用于大型影院环境的正投解决方案（图
  9-11）。


  ![images](img/0911.jpg)


  ***图 9-11.** `Holographika` 的 `HoloVizio` C80*


  `HoloVizio C80` 开启了体三维影院时代，人们有朝一日可能会将其简称为体素影院。这并非科幻小说。C80 设备目前正在世界各地的贸易展上进行演示。传统影院只有一台投影仪，或者两台用于立体三维，而
  `Holographika` 的技术则使用了多达 80 台投影仪。目前，最大屏幕尺寸约为 140 英寸宽——足以满足小型独立影院的需求。现在，我们只需要新一代的故事讲述者，利用这种颠覆性创新，凭借体三维电影来启动体素业务。你愿意为哪个付更多钱——外出看一场电影，还是体素影院？


  ## 我们何去何从？


  撰写这本书对我们在座的每一位都意义重大。在 Kinect 中，我们看到了一个可以用于创意表达的神奇设备。我们也看到了一种能够改变我们将技术应用于日常生活方式的设备和技术。起初，Kinect
  及其骨骼追踪技术主要关乎游戏和酷炫的艺术项目。但事情并未止步于此。其底层技术对人与技术的交互方式有着深远的影响。在这篇后记中，我们每人就这项技术的影响及其未来可能引领我们走向何方，提供一些最后思考。




  ### 肖恩·基恩


  我希望这篇关于使用微软 Kinect 进行开发的介绍，为你提供了一个坚实的基础，让你能够实现那些重新定义我们与技术关系的新想法。现在，你已掌握了创建体验的基石，这些体验能帮助我们摆脱过去与机器互动的有限方式，并为未来人与设备之间建立更人性化的关系铺平道路。作为一个最初因艺术和社会表达而对技术感兴趣的人，我一直觉得鼠标和键盘是办公室环境的遗留产物，无法充分表达我想要的与机器互动的方式。像
  Kinect 这样的创新，以及你即将着手开发的软件，将书写社会与技术如何共同演进的新篇章。


  在 Kinect 于 2010 年 11 月首次亮相大约一年后，我们看到这款设备以许多令人惊叹的方式被投入使用。各种不同的用途多到令人目不暇接，甚至难以归类。看到公众的想象力被充斥网络的“Kinect
  破解玩法”所吸引，很明显，一旦人们亲眼目睹，他们便渴望将基于身体手势的软件控制融入到自己的生活方式中。然而，这项技术的一个应用并没有像其他应用那样受到太多关注，而这也是自从去年我第一次在
  YouTube 上看到奥利弗·克里奥斯演示它以来，最让我兴奋的一个应用。


  在一段名为“用 Kinect 进行 3D 视频捕捉”（[`youtube/7QrnwoO1-8A`](http://youtube/7QrnwoO1-8A)）的视频中，该视频在设备上市仅十天后发布，奥利弗是第一个展示了三维体积
  3D 视频的人，这种视频允许观众在录制过程中，将虚拟摄像机围绕现场场景进行 360 度旋转。这至今仍让我感到震撼，我认为它是 Kinect 中沉睡的巨人，将在不久的未来标志着电影、摄影和实况视频体验方式的根本性转变。一旦用于创建、分享和观看三维体积
  3D 视频的工具能以更成熟的状态展现在大众面前，我相信它将被广泛应用于从视频会议到体育赛事，再到故事片和真正的 3D 游戏系统等各个领域。这是体积时代的黎明。


  一段时间以来，我一直担心，由于在电视、电脑和手机上过多接触平面屏幕媒体，社会已经侵蚀了我们解码周围物理 3D 世界的一些先天能力。我相信，从 2D 向三维体积
  3D 体验的转变，有可能重新点燃人们对一种新的空间感知能力的希望，这种能力可以唤醒我们自屏幕媒体无处不在以来一直沉睡的某部分心智。一旦数字媒体能够更贴近我们与生俱来但却无法与
  2D 媒体和传统软件界面协调的深度感知能力，事情将真正变得有趣起来。


  让我们来看看引发三维体积 3D 视频革命涉及哪些内容。通过审视当今消费者如何创建和体验 2D 视频，我们可以研究为了实现三维体积 3D 视频的同样效果，需要建立哪些条件。在此过程中，我希望你能看到许多令人兴奋的机会，去开发能够满足未来需求的技术——当创作者从拍摄
  2D 电影，转向开创“体素视频”（即基于 Kinect 等设备生成的体素点云图像，可从任何 360 度角度观看的视频）时，这些需求将会出现。


  对于消费者来说，用 iPhone 录制高清视频，在设备上剪辑，然后上传到 YouTube 或 Facebook 与世界分享，是极其轻松的。专业人士可能会选择使用更精密的单反相机，这需要额外步骤将其连接到电脑，并在
  FinalCut 或 iMovie 等程序中编辑视频，然后才上传到网络，或许还会选择 Vimeo.com 等替代视频分享网站。经过多年的完善，已经存在简单、实惠且易于获得的解决方案，供用户捕捉、编辑和观看共享视频。我们还需要类似的设备、服务和软件，才能将三维体积
  3D 视频推向主流市场。幸运的是，如今已有数百万人拥有了可用于捕捉基础三维体积 3D 视频的设备——Kinect。


  如果你坚持读完了第一章的最后，你已经看到自己被以原始的三维体积 3D 形式捕捉，并且能够用一个合成的摄像机旋转视角。微软 SDK 以及 OpenNI 的最新版本，允许开发者利用多个
  Kinect 设备，这些设备可以以某种方式排列，以填补单个相机造成的阴影空白。通过 KinectFusion 项目，微软研究院向我们展示，仅使用一台 Kinect
  和采用标准计算机图形处理芯片组的软件，实时重建场景的完整 3D 模型前景广阔（参见图 1-25）。Kinect 作为视频录制设备的唯一问题是，用户必须与电脑和墙上电源插座相连。这导致
  Kinect 视频的内容主题大致相同——人们坐在他们的电脑前。


  我更希望能在户外到处跑动、在偏远地区探险，以及做所有我们如今期望便携式电子产品可以实现的其他活动时，拍摄动态视频。在 1967 年索尼 Portapak 推出之前，视频几乎是无法移动的——就像我们今天使用
  Kinect 时一样。电视演播室设备体积庞大且功耗极高，必须留在演播室里。Portapak 问世后，视频艺术蓬勃发展，像白南准和白南准和比尔·维奥拉这样的艺术家，他们背上电池供电的设备，利用这种媒介探索视觉表达，其方式以前只有通过胶片制作才能实现。如今，任何一部智能手机的功能都远超
  Portapak——但我们很可能仍会回归专门的特制硬件设备，以充分利用三维体积 3D 视频的潜力。这将为那些希望设计和制造新型电影工具的人创造激动人心的机会。


  为了实现更高质量的制作级捕捉，还有一系列超越 Kinect 的令人兴奋的可能性。PrimeSense 解决方案中使用的结构光方法无法在干扰红外激光的明亮光照条件下工作。飞行时间传感器提供了一种替代方案，可以去到
  Kinect 无法到达的地方；然而，它们当前的深度图分辨率远低于 PrimeSense 所提供的，并且仍然依赖发射光，感应范围有限。一种名为“光场”或全光相机的新兴成像技术，今年由
  Lytro 公司（[www.lytro.com](http://www.lytro.com)）首次推出，它最终可能被嵌入到用于体积极电影的创作工具中。




  这款独特的成像设备利用微透镜阵列计算从多个角度进入相机的所有光线，并生成类似 3D 传感器（如 `Kinect`）的深度图。尽管目前尚未成为实时视频解决方案，但请密切关注这项技术的发展。从不同角度围绕场景布置一组
  `Lytro` 相机，不仅能够在不相互干扰的情况下采集多个深度图，还能够在观看时对场景中的任意点进行重新对焦。这将产生我们期望从高端单反相机中获得的那种景深效果，而且理论上可以根据用户观察图像的视角实现实时景深。`Lytro`
  面向消费者的产品可能会像 `Kinect` 一样，具有颠覆性且易于改造。当你考虑到唯一的竞品 `Raytrix` ( [`raytrix.de`](http://raytrix.de)
  ) 相机起步价约为 20,000 美元时，`Lytro` 突破性的 399 美元定价令人震惊。


  在 `Kinect` 问世之前，已有大量关于利用立体摄像头和多摄像头阵列计算 3D 场景信息的技术研究，这种技术被称为摄影测量法。随着更成熟的云计算环境的出现，许多解决方案应运而生，用于在远程服务器上处理此类图像处理，以降低对用户机器的要求。现在，使用诸如
  `Autodesk` 的 `123D Catch` ( [`123dapp.com/catch`](http://123dapp.com/catch) ) 和
  `Hypr3D` ( [www.hypr3d.com](http://www.hypr3d.com) ) 等工具，可以处理来自不同视角的多相机阵列的静态图像，上传一系列图像后，系统会返回场景的摄影测量
  3D 模型。若要在本地机器上使用，`AgiSoft` 的 `PhotoScan` ( [`www.agisoft.ru/`](http://www.agisoft.ru/)
  ) 是一款支持 Windows 和 Mac OS X 系统的桌面级摄影测量解决方案。通过使用多个廉价高清相机（例如 `GoPro` ( [www.gopro.com](http://www.gopro.com)
  ) 提供的相机），可以设想组装一个包含数十个单元的大型设备，从不同角度捕捉视频，然后将每个相机的每一帧分解成一系列摄影测量批处理作业。结合 3D 传感器（如用于辅助深度映射的
  `Kinect`），我们必然会看到一些融合了这些技术、用于生成高质量体积 3D 图像的非常有趣的解决方案。


  制作 2D 电影和制作体积 3D 体素电影有何区别？首先，电影导演习惯于通过单一摄像机视角，对观众观看故事的角度拥有绝对控制权。然而，在体素电影的世界里，初出茅庐的体积电影摄影师必须在制作过程中考虑观众可能通过移动头部、使用控制器或仅仅围绕体积显示器走动等方式，从任意角度凝视场景，从而协调表演者、灯光和摄像机设备。但这仅仅是开始。我们需要全新的软件来处理这种真正意义上的新媒体的后期制作编辑、传输、存储和显示。


  好消息是，这类软件正在积极开发中。首次通过互联网直播的体积 3D 视频发生在 2011 年 10 月匹兹堡举行的 `Art&&Code 3D` ( [`artandcode.com/3d`](http://artandcode.com/3d)
  ) 活动中。该活动将演讲者的 360 度视频直接传输给了全球正在收看的网络浏览器。这标志着一项重大的技术成就，无疑将激励他人创建更强大的解决方案，以克服在诸如
  `YouTube` 和 `Vimeo` 等系统上分享这种深度媒体时的局限性，这些系统目前无法在其 2D 文件格式中存储完整的体积数据。


  一个专为体积 3D 视频（也称为自由视角视频 FVV）打造的 `YouTube`，可以充当大型视频形式体素数据集的存储库。这些数据可以在后期使用更复杂的 3D
  重建算法（如 `KinectFusion`）进行分析和重新处理。许多人可能会选择将所有原始体积视频上传至云端，并使用基于网页的编辑服务来完成视频制作，以最大限度地减少对自用设备的处理要求。对于更专业的导演来说，会对用于本地编辑和后期特效的专业级工作站软件产生需求。回到云端，类似于
  `Primesense` 的 `NITE` 的机器视觉中间件，可以提供基于用户分割、骨骼追踪和模式识别的新功能。这些功能可应用于上传内容，以生成用于分类视频、视频中的物体甚至对故事情节进行语义分析的结构化信息。一旦视频上线并配备交互式可嵌入播放器，我们可以预见它们将在
  Facebook 信息流中被分享，并链接到当前 2D 照片和视频使用的相同位置。当聪明的艺术家和程序员以难以预测的方式利用深度视频的功能时，用户创作由用户提交的体积视频的混搭和混音作品的机会，将会非常引人入胜。


  然而，如果你只是打算在普通的 2D 屏幕上观看，那么捕捉体积视频的作用就不大了。虽然将会有过渡性解决方案（例如使用头部追踪让你在 2D 屏幕上体验模拟的运动视差，从而观察体积
  3D 内容），但开发此类内容的根本驱动力将源于真正的体积 3D 显示器的普及，这些显示器是基于第九章中所记载的技术成熟发展而来的。随着更引人注目的基于体素的视频内容和服务的创建，以及游戏和专业
  3D 应用的出现，体积显示器将开启一个全新的娱乐和空间计算时代。正如微软研究院近期展示的成果所示，包括一个名为 `Vermeer` 的真正 360 度体积 3D
  显示器的触控界面 ([`research.microsoft.com/en-us/projects/vermeer/`](http://research.microsoft.com/en-us/projects/vermeer/))，以及一个依赖头部追踪的
  `Holodesk` ([`research.microsoft.com/apps/video/default.aspx?id=154571`](http://research.microsoft.com/apps/video/default.aspx?id=154571)
  )，与占据真实 3D 空间的、可触摸的图像进行交互，开启了以前被认为是科幻小说的无限可能。


  当触及体积视频显示器的能力变得价格亲民时，消费者会渴望什么样的内容和应用？我们很快就会知道，这也是我接下来的探索方向。加入 `volumetric.org` 社区，并通过关注
  `meetthekinect.com` 上本书的更新，来拥抱体积时代吧。


  -- 肖恩·基恩




  ### 菲尼克斯·佩里


  未来的智者常常在事后看来显得愚蠢。他们常常高估眼前发展的速度，却又低估了长期即将到来的巨大变革。话虽如此，我写下这篇预言时，正值史蒂夫·乔布斯逝世之日。基于鼠标的计算时代已经终结。全美苹果商店的门前烛光摇曳，而计算领域的未来舞台已经敞开。基于手势的计算是界面设计的未来。这场革命已经酝酿了
  20 年，它的时代终于来临。视觉识别系统、触摸屏、手势界面和语音控制将在未来 5 年内结合，取代遥控器和鼠标，尤其是在休闲计算体验中。用户体验将变得更加有机和以人为中心。自然界面的浪潮是设计技术领域即将迎来的下一个大繁荣。


  我对鼠标的幻灭始于 1999 年，当时我患上了严重的腕管综合征。我的个人电脑界面因设计不良而摧残了我的身体。我无法梳头。我的男友为我刷牙。那个曾让我成为富有创造力的创造者的工具，却毁掉了我的身体。因此，过去的十年里，我一直在康复并探索替代的计算机控制模式，以便长期使用而不伤害人体。借助这些新的交互模式，我们可以安全地开发与人体相匹配、并能贯穿人类一生的计算体验。计算体验正在被彻底重新构想。设计师和
  DIY 创客正通过创造新的体验来推动市场前进。用户渴望更丰富、更个性化、更具触感的体验。我们正在重新思考数字体验，并将其融入人类体验之中。从整合面部识别的响应式标牌与移动购物体验，到智能客厅，再到治愈身心的新方法，等待被创造的沉浸式体验无穷无尽。


  在文化层面，音乐和艺术创作正被彻底颠覆。你的乐器可以是你能想象到的任何东西，甚至可以用手指在空中绘画。媒体艺术家可以将视频和图像精确地映射到包括面部在内的人体上。动作捕捉可以在你的客厅里完成。艺术家可以用双手在物理世界中绘制
  3D 图形，然后通过从 MakerBot Industries 购买的、价格低于 3000 美元的桌面制造机器将结果打印出来。基于脑电波控制的研究正在进行中，它或许能让艺术家只需闭上眼睛就能创作。未来已经到来。它只是看起来与我们预期的不同，而且幸运的是，它不再是过去那种光鲜亮丽的、企业塑造的塑料界面，而是无缝地融入人类的生活图景。设计的未来是开源的，掌握在创造者手中。


  ——菲尼克斯·佩里




  ### 乔纳森·C·霍尔


  如果你正在阅读本文，我可以假设你至少对微软的 Kinect 和其他类似 Kinect 的传感器感到好奇。如果你出生在上个千年，并且没有把每一项技术奇迹都视为理所当然，你甚至可能会同意这些设备相当惊人。但它们具有革命性吗？我没有答案，但我可以告诉你，我在哪里寻找这项技术来支持社会、文化和经济变革——无论好坏——而且它不在客厅里。它在公共和准公共空间。


  免触摸计算机界面具有其无触摸特性所固有的某种实用性。例如，免触摸界面更卫生，因此在医院和诊所、洁净室、手术室和洗手间中使用具有明显的优势。免触摸界面还可以让像我这样身高不占优势的人（我身高
  5 英尺 9 英寸……好吧，5 英尺 8 英寸……踮起脚尖算）直观地操控任意大小的媒体，以获得沉浸式娱乐、艺术、教育或营销体验。免触摸界面甚至可以通过响应特定空间中人员的位置和数量，并提供智能的上下文反馈，来启动“被动”交互。这很像传奇的施乐帕克研究中心科学家马克·维瑟等人设想的“普适计算”场景。


  当然，要实现这些好处，我们仍然面临重大障碍。例如，我的第一次 Kinect 体验让我很难堪，在激烈地玩了一轮 `Kinect Adventures` 后，屏幕上显示了我被抓拍到的不雅姿势的照片。当我的
  Xbox 威胁要将其发布到 Facebook 时，我尖叫道：“不——！”然后扑过去拔掉了墙上的电源插头。除了在自己的客厅里，谁会在公共场合像个傻瓜一样手舞足蹈？


  十年前，我可能会同样难以置信地问：“谁会愿意在拥挤的火车上，通过电话与伴侣闹得不可开交地分手？”然而，这种场景却是大都市通勤生活背景音中的常见节目。关键是，我们的文化规则和习惯确实会随着技术创新和普及而改变：看看手机就知道了。


  我相信，随着时间的推移，人们会习惯一套有限的、通过动作控制与公共屏幕进行交互的方式。这种演变部分来自文化层面，但也部分来自技术本身，或者更具体地说，来自应用程序的设计。公共空间中用于免触摸界面的应用程序，其体力消耗必然会比
  `Kinect Adventures` 或大多数 Xbox 游戏要小，并且会更像 Xbox 仪表盘，旨在进行快速、随意、主要是实用性的交互。我在 `Sensecast`
  上的工作（参见第 3 章）正是为了支持这种程度的参与：在大厅签到参加会议、在诊所浏览与健康相关的信息、在手机上获取新闻报道的全文，然后离开。（当然，这项工作还处于生命周期的早期阶段，还不能说我们做得对。）


  就像我们愿意在 Facebook 上公开分享我们的“状态”或在星巴克“签到”一样，我们与公共屏幕的互动有潜力创造出全新的文化和经济价值生态系统，当然也包括剥削的可能，这一点我们将在下文看到。我希望我们能够将这种潜力引导向好的一面：通过共享媒体，将公共空间转变为更具社交性的场所，这些媒体不仅协调我们与计算机的互动，也协调我们与他人的互动。我们今天的集体习惯是被动的、独自的媒体消费。智能过滤器、小众博客和微博让我们能够根据自己的兴趣定制媒体食谱。与此同时，所谓的社交和移动应用程序，通过将我们的注意力从地理社区转移开，使我们与地理社区隔绝。想象一下
  Kinect 应用程序，它让我们在公共空间里站起来，与邻居会面，渗透到我们的日常生活中。想象一下：


  *   上午 8:00。在火车月台上，通勤者们聚集在一个显示屏前，上面显示着昨晚镇民会议的头条新闻和照片。其中一则写道：“青少年中心将进行全民公投。”显示屏对周围的观众进行民意调查，让他们对这个决定竖起大拇指或朝下大拇指，记录他们的手势，并收集/显示全镇的总体情绪。在你上火车之前，你可以将完整报道传送到你的手机上。

  *   下午 3:00。高中学生会成员在公共拱廊会面，举着标语敦促大家采取行动，推进镇上停滞不前的青少年中心项目。他们将标语举到一个社区显示屏前，车上的 Kinect
  识别到他们的活动并拍了张照片，然后将这张图片分发到全镇的网络中。

  *   晚上 7:00。一家拥挤的咖啡馆里响起提示音，一个安装在天花板上的数字显示屏开始播放有关本地数据的测验问题：今年的犯罪率是上升还是下降？镇预算中有多少百分比用于教育？普通家庭要缴纳多少房产税？围观者可以通过模仿游戏节目中的抢答按钮（用双手）来“抢答”。然后，显示屏会选择并跟踪第一个“抢答”的人，让他/她在屏幕上选择一个答案。


  虽然为了让观点更明确，我的例子带有明显的公民色彩，但在未来几年，毫无疑问，创意科技公司、广告商、非营利组织和政府实体将在我们的公共空间推出更广泛的应用程序和游戏。有些会是好的，有些是坏的。但潜力是存在的，可以通过提供丰富的体验、关键信息以及围绕真实（而非虚拟）社区的共享兴趣和空间进行的自发游戏，为人们创造真正的价值。通过面向公共和准公共空间进行设计，Kinect
  应用程序的开发者们可以探索一个全新的、真实的（而非虚拟的）社交和基于位置的媒体时代。


  `Sensecast` 的第一个应用程序是一个新闻浏览器，它被放置在一栋人流量很大的半公共建筑内，位于哥伦比亚新闻学院咖啡馆外。它鼓励路过的行人阅读某篇新闻报道的导语，如果被打动，可以通过竖起大拇指的手势“点赞”。为什么？我们在新闻学院的历史学同事指出，在
  1900 年之前，人们不是独自阅读报纸，而是与朋友和陌生人聚在一起大声朗读。如果哲学家尤尔根·哈贝马斯的观点可信，那么公共生活中这种现已失落的社会政治维度，能够支撑一个更有活力的民主。也许，通过共享的、能够促使我们相互联系的
  Kinect 新闻显示屏，我们能够让它重新焕发生机。


  或许吧。但也或许不行。隐私在美式英语和欧式英语词汇中是神圣的词汇，而公开性则是可疑的（想想“宣传噱头”、“公开卖弄”等词语）。人文地理学家段义孚指出，在古希腊世界，这两个极端是颠倒的：隐私与希腊语中的“白痴”一词有关，因为纯粹的私民被认为像是与世隔绝的人，不适合在社会中扮演任何角色。与此同时，人类蓬勃发展的崇高巅峰则留给了那些愿意走向市集广场、让自己为人所知、在公众舞台上行动的人。然而，在现代世界的大部分地区，隐私才是王道。


  尽管如此，对公开性的评判尚未有定论。我们在对监控工具（安全摄像头、浏览器 cookies、社交网络等）的漠不关心和对它们合理偏执之间摇摆不定。当我兴高采烈地谈论
  Kinect 类摄像头在改善公共空间方面的潜力时，毫无疑问，你们中的一些人正对随之而来的（或者至少是使之成为可能的）监控水平感到越来越不安。


  我认为这些担忧，正如我所说，是“合理的偏执”。虽然我随意地把 Kinect 称为“摄像头”，但你会注意到微软和该领域的设备制造商明确没有这样做。他们努力地坚持使用他们偏好的术语：“传感器”。这个选择是一个刻意的营销决策，旨在模糊设备收集的数据的性质。正如你在本书中所看到的，这些我们心甘情愿请进家门的“传感器”是功能强大的摄像头，能够被动地收集大量关于我们、我们的体型、我们的家和我们的家人的私密细节。我们从专利申请中得知，随着微软在其
  Xbox 平台上推出直播电视服务（取代有线电视机顶盒），该公司正在将 Kinect 集成到家长控制和广告系统中。Kinect 不仅为你提供了一个你再也不会弄丢的便捷遥控器，它还向微软及其合作伙伴提供了关于你的详细档案以及谁在观看的实时数据。我们现在都成了尼尔森家庭！


  这一切可能看起来有点 creepy。我们是否应该接受 Napster 创始人肖恩·帕克最近在 2011 年旧金山 Web 2.0 峰会演讲中宣扬的反乌托邦格言——“今天的
  creepy，明天的必需品”？


  再次强调，我没有答案。我选择将我的工作重点放在公共空间的 Kinect 应用程序上，这个领域*似乎*比微软、苹果、谷歌和 Facebook 等公司可能对我们的“私人”数据所做的事情更少涉及隐私问题。当然，这个领域并非没有顾虑。试想一下，3D
  辅助的人脸识别算法可能比纯粹的 2D 算法要强大一个数量级。在公共空间广泛部署 Kinect 有可能意味着公共场合匿名的终结。当然，这个结果还很遥远，而且可能难以解决，因为物理空间的所有权远不如移动平台的所有权那么集中，从而防止任何一方拥有所有数据。但它在技术上是否可能？是的。


  无论如何，在权衡隐私和公开性的价值时，显然需要做出重要的取舍。公司和个人已经构建了令人惊叹的产品，并以免费或低成本提供给我们，以换取我们一部分的隐私。事实上，就像古希腊人一样，我们可能通过过更公开的生活而让自己有所收获。我们也可能被当作“眼球”，或者现在叫“骨架”（*skeletons*，指
  Kinect 捕捉的骨骼数据）而被利用和售卖。毫无疑问，Kinect 以及围绕它构建的公司和开发者生态系统，将把隐私和公开性的概念推向新的方向。你，通过拿起这本书并按照你的方式使用它，就是那个先锋队伍的一部分。请负责任地使用
  Kinect。


  --乔纳森·霍尔




