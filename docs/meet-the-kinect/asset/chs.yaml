  接下来，启动 `SensorKinect-Win-OpenSource32` 安装程序，并确保在组件选择对话框（图 1-16）中同时勾选了 `OpenNI` 和
  `Sensor`。在安装接近尾声时，你可能会看到另一个 Windows 安全警告（图 1-15 下方）——点击`仍要安装此驱动程序软件`，然后在该过程完成后关闭窗口。


  ![images](img/0116.jpg)


  ***图 1-16.** 组件安装选择——确保同时勾选了 OpenNI 和 Sensor*


