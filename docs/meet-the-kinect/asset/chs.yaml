- '# 第 1 章




  ## 开始上手


  在本章中，你将拆开一台全新的 Kinect——如果已经有一台，则需要将其与 Xbox 断开连接。接着，你将安装一些软件，将 Kinect 连接到计算机，并一窥这款独特设备究竟有何神奇之处。你将了解
  Kinect 各个组件的功能，并通过一些简单的控制操作，感受所有部件如何协同工作，共同缔造奇迹。


  Kinect 的营销、包装和设计均面向微软 Xbox 游戏主机。Xbox 是一款出色的客厅娱乐系统，如果你还没玩过《舞蹈中心》或《Kinect 运动大会》，我强烈推荐你尝试——正是当初在纽约联合广场的
  24 小时百思买门店体验了这两款游戏，才让我第一次对 Kinect 如此着迷。我拉上尽可能多的朋友前往门店，让他们亲眼见识这项令人惊叹的技术。


  话说回来，本书是一本非官方手册，教你如何将 Kinect 带出客厅使用——无需 Xbox。现在，让我们确保你拥有所需的一切：要么将 Kinect 从游戏主机上拔下，要么单独购买一台，将其连接到计算机，然后开始动手折腾。


  ### 购买正确的 Kinect


  当初我想购买自己的 Kinect 时，费了很大功夫才从所有 Xbox Kinect 品牌产品中找出该买哪一款。我既想玩 Xbox 游戏，*又*想拥有一台能在计算机上使用的
  Kinect。不幸的是，Xbox Kinect 套装并非按此目标设计。


  我最终决定购买独立的 Kinect 传感器（图 1-1），并买一台二手 Xbox 主机来玩游戏，这样还能省点钱。独立 Kinect 传感器包装盒内包含一根转接线，可让
  Kinect 直接从墙壁插座取电，而无需依赖 Xbox 主机。


  ![图片](img/0101.jpg)


  ***图 1-1.** Kinect 传感器与《Kinect 冒险！》——唯一一款所有配件齐备、可直接连接计算机的 Xbox Kinect 产品。*


  另一种选择是购买包含 Xbox 主机和 Kinect 传感器的套装。你在图 1-2 中看到的第二个商品就是这种套装。问题在于，人们经常购买 Kinect 套装，以为马上就能用……直到带回家才发现缺少一根线缆，不得不在线上下单购买并等待到货。


  Kinect 套装缺少的是将 Kinect 通过 USB 连接到个人计算机所需的电源适配器。虽然我完全支持购买完整的 Xbox Kinect 系统套装，但你还需要额外购买这个价值
  30 美元的附件——电源适配器，才能通过普通 USB 将 Kinect 连接到计算机。图 1-2 中列出的第三个商品正是这个电源适配器。


  ![图片](img/0102.jpg)


  ***图 1-2.** Amazon.com 上 Kinect 相关产品的在线商品列表——第一个列出的 Kinect 是你应该购买的；否则，你还需要购买第三个列出的商品。*


  你也可以双管齐下：为计算机购买独立传感器，同时购买游戏套装。这条路比较昂贵，但能让你将一个 Kinect 常连在计算机上用于折腾，同时始终有另一个 Kinect
  配合 Xbox 使用，无需来回移动线缆和摄像头。新的驱动程序和软件已开始支持同时使用多个 Kinect，因此手头有多个 Kinect 可能会很有价值。


  ### 将 Kinect 与 Xbox 分离


  你已经有一台 Xbox 了？太好了。那么，你需要从 Xbox 上借走 Kinect，接到计算机上。在动手之前，最好先征得 Kinect 主人的同意。我相信他们会想念它的！告诉他们，等你读完第
  3 章，给他们展示了用 Kinect 连接计算机能做哪些酷炫事情之后，就会还回来。他们会感谢你的！


  从新款 Xbox 上断开 Kinect 非常简单。只需找到 Kinect，顺着线缆找到 Xbox 背面的接口，然后拔下即可。搞定。接下来，你只需要一个 Kinect
  交流电源适配器，就能继续下载和安装软件了。


  如果你成功将 Kinect 连接到旧款 Xbox，那也是个好消息——这意味着你拥有将传感器连接到计算机所需的所有部件。要从旧款 Xbox 上断开 Kinect，你需要移除两个组件——Kinect
  传感器本身，以及连接 Xbox 和墙壁交流电源插座的线缆（图 1-3）。断开这两样东西后，就万事俱备了。


  ![图片](img/0103.jpg)


  ***图 1-3.** 从旧款 Xbox 游戏主机上拔下 Kinect 和交流电源适配器（图片由微软提供）*


  ### 确保拥有交流电源适配器


  如果你是新款 Xbox 搭配 Kinect，它们很可能是作为套装购买的。如果是这样，你可能还没有让 Kinect 在计算机上工作所需的转接线。不幸的是，现在你必须先购买一根交流电源转接线才能继续。图
  1-2 中的第三个商品显示了该适配器在 Amazon.com 上的产品信息。图 1-4 则更清晰地展示了这根线缆。


  ![图片](img/0104.jpg)


  ***图 1-4.** 左侧为适用于新款 Xbox 系统的 Kinect USB 延长线，右侧为 Kinect 电源适配器。*


  需要电源转接线的原因有两个。首先，Kinect 的耗电量超过了标准 USB 端口所能提供的上限，这可能是由于其内部组件众多，例如电机、多个传感器以及一个用于强制通风散热的风扇。新款
  Xbox 上的特殊 USB 端口能提供额外电力，但你的计算机做不到，因此必须通过线缆上的交流适配器将 Kinect 插入电源插座来弥补。如果你想让 Kinect
  和笔记本电脑一起移动使用，这种对转接线的需求会令人沮丧——你需要一块 12 伏电池并进行一些细致的改装才能解决这个问题。


  第二个需要转接线的原因是，Kinect 的线缆使用了 Xbox 专用的专有 USB 连接器。我知道这很令人沮丧。交流转接线的一端有一个接口，能接受这种特殊 USB
  形状，另一端则将其转换为标准 USB 连接器。旧款 Xbox 系统拥有标准 USB 端口，因此它们也需要一根转接线才能与 Kinect 兼容。当微软推出内置 Kinect
  支持的 Windows 版本时，可能会推出一款功耗更低的 Kinect 供计算机使用，届时就不再需要这根烦人的交流电源适配器附件了。




  ### 逐件检视 Kinect 的各个部件


  现在你已经拥有了一台 Kinect，让我们仔细看看它的所有部件。图 1-5 展示了从独立 Kinect 传感器包装盒中取出的所有物品。你只需用到`AC 电源适配器`和
  Kinect 本体即可跟随本书学习。你可以将`USB 延长线`、手册和《Kinect 大冒险》游戏光盘留在盒中，因为如果你拥有或计划购买 Xbox，后续可能会用到它们。


  在扔掉那个包装盒之前，你应该知道它可以作为一个方便的容器来存放和运输体积庞大且形状奇特的 Kinect。这款设备相当坚固，很少有退货或损坏的情况，而且能承受一定的冲击。然而，在纽约，人们经常使用原装包装盒将传感器带到聚会和黑客马拉松活动现场。盒内的泡沫完美贴合
  Kinect 的形状，使其成为一个简单便携的容器，因此你或许最好留着它以防万一。


  ![images](img/0105.jpg)


  ***图 1-5.** 独立 Kinect 传感器包装盒内容物：手册、《Kinect 大冒险！》游戏光盘、Kinect 本体、AC 电源适配器及专用 USB 延长线。*


  现在，让我们看看在应用程序开发以及构建自己的项目或产品时，你能利用的输入和输出接口。能够识别设备外部的所有组件（图 1-6）将对后续学习非常有帮助。Kinect
  的构造颇为复杂，许多人并不清楚每个部件的作用。阅读完本节后，你将了解每个部件的功能，并能将这些知识应用到实践中。


  ![images](img/0106.jpg)


  ***图 1-6.** Kinect 外部组件识别——输出：A) 红外结构光激光投影仪，B) LED 指示灯，K) 控制底座倾斜的电机。输入：F-I) 四个麦克风，C-D)
  两个摄像头（RGB 和红外），E) 一个加速度计*


  在处理硬件乃至一般技术时，有两个非常重要的基本概念：输入和输出。输入是指从外部来源进入系统的信息，输出则是指从系统向外部发送的信息。我小时候通过连接音响、电视和录像机学习了输入和输出。音响的输入可能来自麦克风或
  iPod，而输出则可以连接到扬声器或放大器。像放大器这样的许多设备既能接收输入，也能发送输出。Kinect 拥有作为输入设备的传感器，用于读取（或采样）其前方物理空间的信息。Kinect
  也拥有执行器（输出设备），使其能够通过不同方式改变物理空间，从而作用于该空间。


  Kinect 上有四个麦克风——没错，就是四个！这不仅仅是立体声，实际上是四声道声音。结合软件中的高级数字信号处理技术，这四个麦克风可以用来实现非凡的功能。通过协同工作，这四个音频输入可以过滤背景噪音，并检测房间内说话者的相对位置。从
  Kinect 正面看，右侧有三个相邻的麦克风，就在“XBOX 360”标识的下方（图 1-6，G-I）。第四个麦克风在左侧（图 1-6，F）。微软官方的 Kinect
  SDK（软件开发工具包）是首个提供访问麦克风方法的工具，不过预计未来其他驱动程序也能提供对此硬件的访问权限。


  Kinect 看起来有点像一个大而笨重的旧式网络摄像头，这也情有可原，因为它中间确实内置了一个标准网络摄像头（图 1-6，C）。它旁边是一个红外摄像头，这比标准网络摄像头要少见一些。同样有趣，甚至可以说是相当神秘的，是设备内部“XBOX
  360”标识后面的三轴加速度计。大多数人没想到 Kinect 会包含这样一个传感器，这种传感器在手机或任天堂 Wii 控制器等手持设备中更为常见。


  现在，来说说输出设备。你可能听说过 Kinect 内部有一个激光器——这是真的。当 Kinect 接通电源时，你可以看到它发出红光（图 1-6，A），尽管投影仪发射的光位于红外光谱并且几乎不可见。它与设备上的红外摄像头（图
  1-6，D）协同工作，以确定其所处房间内一切物体的精确空间位置。另一个基于光的输出是 LED 指示灯（图 1-6，B）。从诸如`OpenNI`这样的框架中不容易直接访问它；然而，如果你的项目需要利用硬件反馈来提升效果，这可能对你会有帮助。例如，当应用希望在无需屏幕的情况下通知用户有事件发生时，这或许是一种理想的告警方式。比如在
  3D 捕捉工具`MatterPort`中，用户拿起 Kinect 在房间里走动——远离电脑——来拍摄物体。电脑发出的“哔”声让用户知道某个特定视图已被充分分析。此“哔”声可以伴随设备上
  LED 灯的闪烁作为额外提示，这样用户无需查看屏幕就能感知到状态变化。


  最后，Kinect 拥有一个功能上与传感器相反的执行器，它由一个驱动齿轮的小型电机组成，可以使摄像头上下倾斜 30 度。这可以在你构建的应用中得到新颖的应用。例如，通过在空间中上下扫动设备及其传感元件，Kinect
  可以用于捕捉其周围环境的高分辨率扫描。如果你想将 Kinect 安装在机器人上，这个电机可以提供摄像头的机械上下运动。此外，如果你使用人脸或身体追踪，当人物移出视野时，你可以调整摄像头的位置来适应。


  现在我们已经识别了所有的 Kinect 硬件，接下来让我们配合软件一起使用。你将有机会看到来自 RGB 摄像头的图像，以及由红外投影仪和摄像头组合计算出的深度图像。


  **Kinect 拆解！**


  对 Kinect 的内部构造感兴趣吗？`iFixit`网站整理了一篇文章和一段视频，带你一探 Kinect 设备的拆解过程。


  阅读拆解文章： [`www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/`](http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/)


  观看拆解视频： [`www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/`](http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/)


  请勿在家中尝试！不要拿自己的设备冒险。如果你好奇内部构造，请访问`iFixit.com`。




  ### 下载与安装软件


  我第一次将 Kinect 连接到计算机以了解其工作原理时，使用的就是你将在此节安装的软件。这款软件名为 `RGBDemo`，至今每当我想展示 Kinect 的功能及其与标准网络摄像头的区别时，我仍会用到它。`RGB`
  代表红色、绿色和蓝色——这是 Kinect 中部网络摄像头所能识别的颜色。`Demo` 中的 `D` 也代表深度，由红外投影仪和红外摄像头借助一家名为 `PrimeSense`
  公司的结构光芯片生成。那么，`PrimeSense` 是谁？


  `PrimeSense` 是一家以色列公司，其硬件参考设计和结构光解码芯片是 Kinect 体积 3D 摄像头系统的核心。这让许多关注 Kinect（最初代号为“Project
  Natal”）演变的人感到意外，因为许多人认为微软会使用其最近收购的两家飞行时间 3D 传感器公司——`3DV Systems` 和 `Canesta`——的知识产权。继
  `OpenKinect` 项目的引领之后，`PrimeSense` 又协助创立了 `OpenNI`，旨在将最佳工具交到开发者手中。`OpenNI` 推出了第一家主要商店，提供利用体积摄像头（如
  Kinect 中的摄像头）的 PC 应用程序，随着 `Arena` 的亮相，这将在第 3 章中更详细地介绍。


  虽然从自然用户界面角度看待 Kinect 的人将其视为 3D 手势识别设备，但来自工程和机器人领域背景的人则将 Kinect 硬件的这一特定方面称为 `RGBD`
  传感器。`RGBDemo` 旨在演示 Kinect 如何在机器视觉和 3D 重建等应用中作为 `RGBD` 传感器发挥作用——因此得名 `RGBDemo`。这是在
  Mac 和 Windows 机器上查看 Kinect 底层数据最直接的方法。


  如果 Kinect “即插即用”于你的 Xbox，为什么还需要下载软件呢？好吧，如果你在没有安装一些能够与 Kinect 通信的驱动程序和应用程序的情况下将 Kinect
  插入计算机，那么什么都不会发生！因此，尽管我知道你一定迫不及待，但请耐心等待，在插入 Kinect 之前，请仔细按顺序完成所有步骤。其中一些步骤需要严格按照特定顺序执行。请务必遵循！


  首先，你需要上网下载 `RGBDemo`，这是一套由 Nicolas Burrus 编写的强大的开源软件套件，旨在提供一套工具包，供他人编写程序，并为非编码人员提供一种查看
  Kinect 数据真实样子的方法。如果你使用的是 Windows 系统，那么你将从 `OpenNI` 安装三个附带的驱动程序，这些程序有助于 `RGBDemo`
  更好地理解来自 Kinect 的数据。该软件附带的 `RGBD-viewer` 应用程序将向你展示 Kinect 所能看到的图像类型及其独特的成像方式——这将是我们测试一切连接是否正确的方法。


  Nicolas Burrus 来自巴黎，他在马德里卡洛斯三世大学机器人实验室进行博士后计算机视觉研究时，探索了深度感测摄像头（如 Kinect 中的摄像头）的应用（`http://roboticslab.uc3m.es/`）。非常感谢
  Nicolas 在 Kinect 发布当月，首次打包了一个任何人都可以在计算机上使用 Kinect 的简单可执行程序。对于程序员来说，他为 `RGBDemo`
  汇编的源代码和相关机器视觉库集合帮助许多人开始了应用程序的开发。对于非技术用户来说，`RGBDemo` 提供了一种无需编写任何代码即可首次查看 Kinect 数据的方法。此后，Burrus
  和他的搭档 Nicolas Tisserand 成立了一家名为 `manctl` 的公司（`http://manctl.com`），以进一步围绕 Kinect
  相关技术进行创新。让我们来了解一下如何开始使用 `RGBDemo`。


  #### 查找 `RGBDemo` 的正确版本


  首先，你需要找到适合你操作系统的 `RGBDemo` 正确版本。打开浏览器，访问 `http://labs.manctl.com/rgbdemo`，以获取该软件项目的最新信息（图
  1-7）。Nicolas 会定期更新代码库，你需要选择在你的系统上运行的最新版本。在撰写本文时，`v0.6.1` 是适用于 Windows 和 Intel Mac
  OS X Snow Leopard 的最新版本。在撰写本文时，`RGBDemo` 项目刚刚在 `manctl` 网站上有了一个主页，因此请注意，当你访问时其外观可能已发生变化。


  ![images](img/0107.jpg)


  ***图 1-7.** RGBDemo 项目网页*


  `RGBDemo` 是一个开源软件项目。令人欣喜的是，它不仅包含一个可以直接作为“二进制可执行文件”运行的应用程序，还包含了其构成的源代码。像这样的开源项目非常有价值：如果你发现软件有问题，或者想以新的方式扩展它，你可以根据原始说明自行定制版本，然后将其编译成你自己改进的“二进制可执行文件”应用程序。许多开源项目只提供源代码，如果你不知道如何编译程序，就无法使用。如果你不太懂技术，那就没什么乐趣了。`RGBDemo`
  的妙处在于，它不仅可以作为可执行二进制文件直接运行，还能让你了解其构建方式。


  现在，让我们直接进入可以在你的操作系统上运行的二进制软件。为此，以下内容将分为针对 Windows 和 Mac 用户的不同说明。在完成下载和安装后，我们将再次在“测试你的
  Kinect”一节中会合，届时我们将启动 `RGBDemo` 并进行调试，以确保一切正常工作。


  #### 为 Windows 下载并安装 `RGBDemo`


  根据你使用的 Windows 版本（XP、Vista 或 Windows 7），你在本节中的具体体验可能会有所不同。这些说明解决了一些你在 Vista 上下载和安装时可能遇到的卡顿问题，而这些问题在
  XP 或 Windows 7 上可能不会遇到。如果你没有遇到这些问题，可以跳过这些说明，但这里包含它们是为了不落下任何初级读者。与简单得多的 Mac 安装相比，这个过程在
  Windows 上可能会有些繁琐。




  ### 下载二进制文件


  废话不多说，我们直接去获取这个软件！在 RGBDemo 网页上，点击`Windows 二进制文件`下载链接，如图 1-8 所示。页面将跳转至包含名为`RGBDemo
  0.6.1rc1-Win32.zip`文件链接的行（图 1-9）。在点击该下载链接之前，你需要按顺序仔细完成两个步骤。


