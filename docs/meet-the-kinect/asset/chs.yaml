  现在，进入名为 `Drivers` 的目录。进入 `Drivers` 目录后，你会看到三个 `MSI` 安装文件列表——先不要点击任何一个！你需要按照一个非常关键的顺序来安装它们（图
  1-13），所以请集中注意力并按照指示操作。请按照以下顺序进行安装：


  > 1.  `OpenNI-Win32`

  > 2.  `SensorKinect-Win-OpenSource32`

  > 3.  `NITE-Win32`


  请注意，目录中文件的显示顺序（如图 1-13 所示）不一定与正确的安装顺序一致。所以要小心！务必按照我所描述的顺序操作。


