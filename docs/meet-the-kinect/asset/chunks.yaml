  trans: '

    # 微软 Kinect SDK


    微软研究院于 2011 年 6 月 16 日高调发布了其 Kinect for Windows 软件开发工具包（`SDK`），此时距离该设备正式上市仅七个多月。虽然微软最初或许从未打算支持在
    Windows 上为 Kinect 进行开发，且该设备引发的浓厚兴趣很可能令其始料未及，但如今微软正在积极支持这一平台——你需要密切关注微软研究院的更新动态，因为任何纸质书籍都无法紧跟最新发展步伐：


    `http://research.microsoft.com/kinectsdk/`


    尽管如此，Kinect SDK 及相关资源（例如包含辅助代码和示例代码的 Coding4Fun Kinect 工具包）已足够丰富，可让你利用现有最成熟、最完善的
    Kinect 代码来构建应用程序并顺利运行。本文介绍的资源为`C#`、`C++`和`Visual Basic`开发者——乃至勇敢的初学者——提供了一条绝佳途径，让他们能够借助微软极其稳健的代码，开始使用
    Kinect 进行用户分割、骨骼跟踪甚至语音识别。（例如，如果你希望利用 Kinect 的多麦克风阵列，Windows SDK 就是最佳工具集。）


    ![images](img/square.jpg) **注意** 为 Windows 编写代码与为 Xbox 编写代码并不相同。微软拥有一个名为`XNA`的独立编程框架和名为`Game
    Studio`的开发环境，供开发者创建 Xbox Live 独立游戏。截至撰写本文时，Kinect 功能**尚未**在`XNA`中公开，不过内部人士表示这即将实现。本章介绍的
    Kinect SDK 仅使你能够为 Windows 平台（而非 Xbox）创建 Kinect 应用程序。


    ## Coding4Fun


    学习新工具的最佳方式通常是观察他人如何利用该工具实现应用程序、构思实验及其他代码杰作。为此，微软设立了 Coding4Fun（图 8-1）网站，专为那些热衷于探索微软技术的爱好者而生。为纪念
    2011 年 6 月 Kinect SDK 的发布，微软在华盛顿州雷德蒙德园区举办了一场编程马拉松，30 多位开发者获赠 Kinect、SDK，并在 24
    小时内创建了精巧的应用程序，用以展示这套新工具包的可能性。这些应用成为了 Coding4Fun 网站上微软 Kinect 项目展示/资源库的基础。无论你在阅读本章之前、期间还是之后，都值得一访：


    `http://channel9.msdn.com/coding4fun/kinect`


    Coding4Fun 网站会频繁发布新项目和示例，通常附带源代码，因此它是你寻找能快速启动自己 Kinect for Windows 项目的现成方案时的首选之地。


    ![images](img/0801.jpg)


    ***图 8-1.** Coding4Fun Kinect 专区*


    ## Kinect SDK 的优缺点


    使用微软 SDK 的优势相当显著。它提供了比其他任何软件包都更优秀的应用程序编程接口（API），用于访问 Kinect 特定的硬件功能，例如其四元件麦克风阵列。该
    SDK 还附带了微软的 Kinect 运行时及其他支持软件，使你能够借助微软的工程技术和算法实现用户分割、骨骼跟踪以及（如果包含语音 SDK）语音控制，而无需脱离
    Windows 强大的应用程序框架。


    简而言之，从 Kinect SDK 获得的这些组件非常强大。我们曾运行过本书其他章节讨论过的各种中间件，例如 PrimeSense 的开源`OpenNI`，并用它们实现了一些类似功能。虽然所有这些软件都令人惊叹，但根据我们的经验，微软的
    Kinect 代码在性能上表现最佳，其低延迟响应以及无需校准的骨骼跟踪算法堪称神奇。


    缺点——至少对你们中的一些人而言——是目前用微软 SDK 所能做的实际上仅限于“为乐趣而编码”，因为其许可证仅允许有限的非商业用途。（你大概也能猜到，微软表示商业用途许可证即将推出，但价格和条款谁也说不准。）此外，如果你不熟悉`C#`、`C++`或`Visual
    Basic`编程，或不熟悉集成开发环境（IDE）的使用，那么功能强大但令人望而生畏的`Microsoft Visual Studio`及其支持的语言很可能会吓退胆怯者。


    至于你们其他人，泡杯咖啡，开始干活吧。


    ## 开始使用 Kinect SDK


    要在 Windows 上搭建 Kinect 开发环境，你需要一台 Kinect、一个空闲的 USB 端口、Windows 7 系统，以及微软提供的大量免费软件，包括适合你编程语言的
    Visual Studio 版本，以及来自微软研究院的 Kinect SDK 本身。你所需的一切都在下面的“需求”部分详细列出，同时附带一些常见问题。


    ### 需求


    使用 Kinect SDK 的要求虽然繁多，但并非不可满足。唯一的成本应该只有你的 PC 和 Kinect。请注意，我泛泛地使用“PC”一词——我能在运行
    Windows 7 的 Bootcamp 版 Mac Mini 上成功运行本章的所有内容。不过，截至撰写本文时，你无法通过`Parallels`或`VMware`等虚拟机使用
    Kinect SDK。忠告已给。


    #### 系统


    你需要一台相当新的 PC 来运行本章描述的软件：双核 2.66 GHz 或更快的处理器；支持`DirectX 9.0c`功能（于 2004 年 8 月发布）的
    Windows 7 兼容显卡（因此如果你的电脑使用不到五年且运行 Windows 7，应该没问题）；以及至少 2 GB 内存（推荐 4 GB）。当然，你还需要一台
    Kinect 传感器！但希望你在第 1 章已经解决了这个问题。


    在软件方面，你必须运行 Windows 7（64 位或 32 位版本），并且需要知道你的系统版本才能下载正确版本的 SDK。要查看版本，请进入控制面板![images](img/U001.jpg)系统和安全![images](img/U001.jpg)系统，然后向下滚动查找“系统类型”。你应该会看到“64
    位操作系统”或“32 位操作系统”。


    #### Visual Studio 2010


    如果你是 Windows 开发者，可能已经安装了某个版本的 Visual Studio。任何 2010 版本都可以满足需求，这里推荐 Express 版仅仅是因为它们免费。要下载，只需访问：


    `http://www.microsoft.com/visualstudio`


    在“产品”选项卡下，根据你计划使用的编程语言，单击 Visual Basic Express、Visual C# Express 或 Visual C++
    Express。由于网上许多示例都是用`C#`编写的，因此我们在此处使用`Visual C# Express`。这样，我们就能顺利下载并剖析在网上找到的大部分代码。单击“立即安装”下载并安装`Visual
    C# Express`。除非有个人原因需要更改，否则请直接使用默认安装选项。


    #### 附加框架和支持软件


    ##### .NET Framework


    毫无疑问，你需要在 Visual Studio 中构建应用程序时使用`.NET` 4.0 框架。该框架通常随 Visual Studio 一起捆绑提供，但如果没有，请下载并运行安装程序——它相当大，可能需要一些时间：


    `http://msdn.microsoft.com/en-us/netframework/aa569263`


    除此之外，此处描述的其他支持软件均为可选。不过，如果你打算深入研究 Kinect for Windows，最好现在就安装这些软件，因为它们会被用在 SDK
    附带的一些示例以及网上许多第三方示例中。

