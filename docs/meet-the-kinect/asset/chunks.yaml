- fmt: '# CHAPTER 2


    ## Behind the Technology


    In this chapter, we’ll demystify the underlying technology behind Kinect. You’ll
    learn about the principles of depth–sensing imagers, discover alternatives to
    Kinect that are available through other manufacturers, and understand the general
    data output that all of these devices offer to your potential applications. You
    can create applications through various drivers, processing libraries, and application
    development environments. You’ll be exposed to new language that is used to describe
    working with depth and natural interface technology and be provided with a mental
    framework for relating these new ideas to ones you’re already familiar with from
    2D technology.


    One of the challenges of working with new technology is that the concepts behind
    it have not yet worked their way into common knowledge or become household names.
    Because Kinect was designed as a video game controller that can provide a “natural
    interface” for gaming, much of the literature on its development focuses on its
    application as a “mouse/remote/game controller replacement” input device for the
    living room. This is an emerging field, and a number of hardware and software
    manufacturers have designed their own systems to accomplish this, albeit in slightly
    different ways. As a result, there are disparities in the language used by people
    and companies from different backgrounds who are developing this technology for
    different environments. In some cases, there is not even a well–defined vocabulary
    that describes how aspects of this technology work when they are applied outside
    the boundaries of a “natural interface.”


    The problem is that since Kinect was liberated from its attachment to the Xbox,
    many of the most interesting “hacks” have used the device in ways that were never
    intended by the manufacturers. Therefore, as concepts and techniques once locked
    away in academic research or industrial applications make their way into the public
    consciousness—through YouTube videos and other popular media—there is a need to
    come up with descriptions of technology for conversational use by general audiences.
    In order to explain how to use these new technologies as designed, while still
    addressing the imaginative off–label uses that are driving innovation, liberties
    must be taken to bend “expert” terminology in order to provide a more open–ended
    view of the technology’s possibilities.


    As we move away from conventions of imaging and input systems based on 2D principles—such
    as a webcam and a mouse—to those based on 3D systems such as Kinect, we will identify
    principles that provide a concrete reference between the two dimensions. After
    that, we will look at the complete Kinect “stack,” from hardware to software,
    in order to explain how this technology works.


    ### Understanding the Technology Stack


    The technology stack is a way of describing the relationship between the components
    that make up a hardware and software solution. The scope of the stack can be adjusted
    to the context of what is being described. Using a personal computer as an example,
    we can identify a hardware manufacturer (HP), an operating system (Windows 7),
    and an application that users can run (Google Chrome). Using web applications
    as an example, we can look at the server operating system (Linux), the web server
    software (Apache), the database software (MySQL), and the web scripting language
    (PHP). The stack provides a perspective on the complete system design and the
    chosen components in combination, or as elements that can be swapped in and out.
    There are so many ways to use Kinect and its revolutionary inexpensive 3D depth
    sensor that people may choose different technology stacks depending on how they
    wish to utilize the technology. This book is primarily about ways to use Kinect
    as way of enabling natural interface experiences; others may use it for filmmaking,
    3D reconstruction of objects and environments, or providing a machine vision system
    for a new class of affordable robotics.


    Originally, the only way to develop Kinect applications (apps) was to use a $10,000
    Xbox Development Kit (XDK) supplied by Microsoft to its partners at high–level
    studios so they could design applications exclusively for the Xbox system ([Figure
    2-1](#Chapter02.html#fig_2_1), left). That changed dramatically only days after
    Kinect’s retail release – software drivers interpreted the signal coming from
    Kinect’s USB port, which was then written and released as open source software
    on the Internet. Suddenly, with the aid of the `libfreenect` drivers, also known
    as `OpenKinect`, anyone could develop their own apps using the Kinect sensor,
    free of charge. These drivers access raw data from various Kinect sensors, but
    don’t provide a higher-level framework for making sense of the data in a natural
    interface–based development environment. That didn’t stop curious and creative
    programmers from producing remarkable applications, also known as “hacks,” that
    explored the possibilities of Kinect technology beyond gaming ([Figure 2-1](#Chapter02.html#fig_2_1),
    right).


    ![images](images/0201.jpg)


    **Figure 2-1.** Original Microsoft Xbox Kinect stack vs. OpenKinect/libfreenect
    stack


    Once unofficial Kinect apps began to gather media attention and online buzz, the
    companies that were previously designing software to enable the development of
    natural interface–based applications took notice. PrimeSense, the company that
    developed the enabling technology behind the structured light depth sensor inside
    Kinect, responded by spearheading the OpenNI initiative with a number of other
    industry leaders – a driver framework that allows interoperability between any
    depth–sensing hardware and the related software, which enables the creation of
    natural interface applications.


    This gave developers another option for Kinect development – for the first time,
    they had access to a driver framework that would not require them to consider
    a particular manufacturer or the implementation of the depth–sensing hardware.
    Additionally, the OpenNI software came with tools that increased the speed of
    development because they solved many of the harder problems of working with raw
    sensor data that the `libfreenect`/`OpenKinect` drivers had not yet overcome.
    This software was freely available, and its source code was openly viewable. PrimeSense
    separately released a freely available, but closed source skeletal tracking middleware
    system called `NITE` that interprets raw data and computes simplified coordinates
    of body parts in order to author gesture input commands, which is similar to the
    technology used to create games with the Xbox Development Kit.'
