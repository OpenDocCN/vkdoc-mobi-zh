- fmt: "# Marking a Gesture\n\nOnce you’ve made several recordings of a gesture, you\
    \ must tell the SDK which of those recordings represent good versions of the gesture\
    \ that you want to detect. You do that by marking the places in the recordings\
    \ where the gesture was performed. These marked clips will be used to train the\
    \ classifier. Note that it will also analyze sections not marked, considering\
    \ those as negative examples, so be careful to select all frames where the gesture\
    \ is performed correctly.\n\nHere is the process to follow in marking a gesture:\n\
    \n1.  Go to the Marker Tab and open the video sequence that you have recorded.\
    \ The video sequence will be loaded and displayed in the middle window.\n2.  Let\
    \ the clip run and make sure that the gesture is performed as expected, and that\
    \ the tracking of the player is correct. If there is a problem, either delete\
    \ the clip and record a new one, or use the “Skip In/Out” options to ignore the\
    \ problematic frames.\n3.  Select the gesture to be marked in the gestures list\
    \ at the top left window. In this example, the gesture is called `leftHandUp`\
    \ and it is located in the `gameGestures` package. Select it by expanding the\
    \ package and clicking the gesture name.\n4.  View the video sequence and mark\
    \ the gesture using the Mark In and Mark Out buttons.\n5.  Repeat these steps\
    \ for all the video sequences you have recorded with positive examples.\n\nFor\
    \ your negative examples, load your clip, make sure you have the gesture selected,\
    \ and save it. Notice in [Figure 6-7](#Chapter06.html#fig_6_7) the highlighted\
    \ button after the sequence name with an ellipsis, or three dots, as the label.\
    \ This button with no name and only dots is the button that allows you to open\
    \ your file viewer. If you go into the folder where you are saving your gestures,\
    \ you will see a list of clips by number. Remember that I mentioned to keep track\
    \ of which performances were the negative examples? Now that you need to load\
    \ the sequence video clips, it’s really helpful to know which ones are negative\
    \ examples. Select a negative example and it will open. You can press the regular\
    \ video controls to play the clip and mark the negative sequence using the exact\
    \ same series of steps you used to mark the positive sequence.\n\n![images](images/0607.jpg)\n\
    \n***Figure 6-7.** Omek Beckon Gesture Toolbox with the Sequence open button selected.*\n\
    \n## Training a Gesture\n\nAfter recording and marking comes the training stage.\
    \ In this stage, you will train the gesture based on the recorded video sequences,\
    \ using the Gesture Learner tool. Here you will find out if you did a good job\
    \ of performing the gesture in the clips or if you will need to go back and repeat\
    \ the process.\n\nBegin by opening and executing the `GestureLearner`. Double-click\
    \ the following executable:\n\n```\nC:\\Beckon SDK\\bin\\Omek Beckon Gesture Learner.exe\n\
    ```\n\nThen follow these steps:\n\n1.  Go to the Files Tab and add the trainings\
    \ sequences. Click the Add Directory Button, select the “examples” folder, and\
    \ click the OK Button. This will add all of the contained sequences.\n\n![images](images/square.jpg)\
    \ **Tip** If you saved sequences of the target gesture in other folders, you can\
    \ repeat the previous step and add them as well.\n\n2.  Now set the “Output Files”\
    \ options. Select your “output” folder created earlier. It will contain all of\
    \ the outputs of the training process. Click the OK Button.\n3.  Ensure that the\
    \ “Package” field shows the name of your new package (`gameGestures`).\n4.  Verify\
    \ that the “Classifier” field holds the name of the file that you entered in the\
    \ Gesture Organizer. That file name should be `leftHandUp.xml`.\n5.  Go to the\
    \ Gesture Tab and set the “Per Gesture Configuration” options. Click on the “Gesture”\
    \ field and select the target gesture (`leftHandUp`). Press the Add Button to\
    \ insert this gesture into the “Active Gestures” list.\n\nYou have now selected\
    \ the gesture that will be trained. Sometimes you may want to train more than\
    \ one gesture in a single process; in these cases, you will repeat steps 1-5,\
    \ adding required gestures one after the other.\n\nThe tab contains all of the\
    \ parameters that can be modified for the training process. It is beyond the scope\
    \ of this tutorial to explain all of these. We will examine a few examples only,\
    \ while the rest can be learned from the Gesture Manual document. The parameters\
    \ are divided into different groups. In every group, you can see a check box called\
    \ “Auto”. Checking this option will indicate that the Learner should find the\
    \ parameters automatically.\n\nSet the Advanced Tab parameters as follows:\n\n\
    > **Gesture Type.** In our example, the trained gesture is a pose and not a motion,\
    \ so we will check the “Pose” option. Gestures like jump or punch will be a “Moving”\
    \ gesture. Leave the “Auto” option checked.\n> \n> **Data Processing.** Leave\
    \ the “Auto” option selected.\n> \n> **Joints**. First, use the default values\
    \ (“Auto” and “Both”) selected. Later on, you can change these values and see\
    \ how they influence the results. “Upper” will use only the upper-body for the\
    \ training, while “Lower” will use the lower-body only. Selecting “Both” will\
    \ try all of the body joints.\n> \n> **Learning Method.** Select “Fast” for the\
    \ first time; this will train the gesture faster, so you can readily see some\
    \ results. Later on, try to change this value to “Best” to see its influence.\
    \ The “Fast” and the “Best” methods use different options, so the results may\
    \ be different between the two methods.\n\nAfter setting all of the wanted parameters,\
    \ it’s time to run the training process. You do that as follows:\n\n1.  Click\
    \ the Add Button, at the bottom part of the window, to add a training job with\
    \ the current values. Note that the training process will not execute until you\
    \ click the Run Button in the next step.\n2.  Click the Run Button to run all\
    \ the jobs in the list. The jobs will run sequentially (one after the other),\
    \ and their results will be displayed immediately as every job finishes.\n3. \
    \ If a job ends successfully, a “success” icon (a check shape) is displayed and\
    \ the score of this classifier is shown in the list. A “failure” icon will be\
    \ displayed in case of an error (“X” shaped).\n4.  Double click the line with\
    \ the job name to see more details about the score.\n\nYou can run many training\
    \ jobs at the same time, and you can add more as the current jobs are running.\
    \ Simply go back to the previous tabs (Files, Gesture, and Advanced), change any\
    \ parameter, and add a new job. Note that since randomness is applied to the algorithm,\
    \ running the same parameters twice may not result in the same output! Please\
    \ refer to the Gesture Training Manual for more details about the training options.\n\
    \n![images](images/square.jpg) **Note** f you have closed the Learner and want\
    \ to retrieve the parameters of an old job, simply click the “Load” button in\
    \ the “Files” tab, browse to the folder where your required output is saved, and\
    \ select the XML file."
