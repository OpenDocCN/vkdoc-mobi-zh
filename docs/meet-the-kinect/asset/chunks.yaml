  trans: '

    ### 设计自定义手势


    手势设计为用户体验打开了一扇全新世界的大门，而这个世界才刚刚开始被创造。当你开始设计手势时，需要牢记一些基本原则。以下是七条设计策略，助你入门：


    1. 首先，手势应与用户需要执行的操作产生关联。想想 iPhone 上流行的用于缩放照片的“捏合缩放”手势。它非常直观，堪称出色手势设计的典范。放大或缩小图像的动作十分自然，并能以一种更有机的方式将人们与他们的照片连接起来。


    ![图片](img/square.jpg) **提示** 你的应用或游戏的最佳手势是什么？当然，最佳手势是那些无需用户手册、几乎不用解释就能理解的手势。让人们在完全未接触过你的项目的前提下尝试使用你的界面，就能立刻判断设计是否奏效。用户能否自然地理解你的界面，还是需要停下来询问该如何操作？你的界面是否足够友好、具有吸引力，让用户敢于直接尝试，还是让人望而生畏？几次失败的操作就可能破坏用户对界面的初始印象。如果界面持续以出乎意料的方式响应，用户很可能会彻底放弃使用。


    2. 第二条手势设计经验法则是考虑用户的舒适度和身体因素。身体需要适应机器的时代已经结束了。我一直感到疑惑，为什么在科技突飞猛进一百多年后，我们依然在使用类似于华丽打字机的设备。我们的
    QWERTY 键盘除了让成千上万的用户患上重复性劳损、腕管综合征和背痛之外，毫无益处。舒适易用的界面才能长期获得成功。值得庆幸的是，借助多点触控和计算机视觉来创造用户体验，我们不再需要依赖旧有的模式来构建交互模型。简而言之，如果设计会带来疼痛，那就不要做——也不要要求你的客户和用户去做。


    3. 第三，设计时要考虑基本的人类心理学。将手臂举向天空通常让人感到振奋，而跪下则带有祈祷和屈服的含义。例如，如果你想让人在玩你的游戏时感到快乐，明智的做法是阅读简·麦戈尼格尔的《游戏改变世界》*Reality
    is Broken*。她记录了在游戏中创造积极情绪的许多策略，其中最常用的一种是触摸他人。人类接触会在大脑中释放大量催产素。催产素是一种与在大脑中创造幸福感密切相关的化学物质。基于手势的
    SDK 能够实现玩家互动，因此触摸是一种非常简单的方法，可以在玩家中激发积极情绪、建立纽带和连接感。


    4. 第四，要善于利用并发展已有的手势惯例。绝对没有理由忽视用户从其他平台或交互模式中已熟悉的手势。借鉴这些手势，并使它们为你正在设计的界面服务。设计的核心在于建立在现有范式之上，而优秀的设计则能推动设计对话向前发展。


    5. 第五，不要违反用户从现实世界或其他界面中习惯的交互模式。游戏玩家习惯了拿起剑的概念，并且他们对于如何握持和挥舞剑有特定的预期。设计时要考虑到这种模式。使用带有手臂挥动的手势，可以实现更有趣、更逼真的剑术对决。


    6. 第六，交互模式不应与其所处的世界相冲突。例如，如果玩家在游戏中将剑背在背上，就不要让玩家通过一个界面来获取那把武器。只需允许他们伸手从背后拿下来即可。否则，你就会设计出相互矛盾、令人困惑的交互，用户将难以凭直觉理解。


    7. 最后，界面和手势应该作为一个整体协同工作。用户应该能够轻松把握用户体验设计的整体性，并能快速、轻易地将其传达给新用户。不要在交互过程中途将用于某个任务的手势更改为另一个手势。考虑让用于相似体验的手势在设计中保持关联性。


    在这一领域，可以从瑜伽、神经学和物理治疗等领域学到很多东西。这三个领域都对身心连接进行了广泛的探索。人类身体做出的各种姿态会唤起怎样的情绪？哪些手势会触发我们大脑中的哪些化学物质？镜像神经元将如何影响群体体验设计？毫无疑问，你为设计添加的手势将对可用性产生巨大影响。

    '
- fmt: '### Adding a New Gesture to the SDK


    In Beckon, we can create, edit, and add gestures through GUI interfaces that require
    no code at all. We are going to create a brand new gesture that doesn’t exist
    in the SDK as of yet and we’ll call it from the Flash example. To do this, we
    need to record ourselves performing the gesture a few times in front of the sensor.
    To perform a gesture, you pose by putting your body into the form for that gesture.
    We will pose a few times so that the machine learning environment will have samples
    to analyze and learn from. Each recording of a pose is considered a sample. Those
    samples are combined into a Classifier of that gesture. Beckon calls video clips
    sequences. A sequence is just a recording of a person performing the gesture.
    Once we are getting good recognition from Beckon, we’ll add a listener for this
    new gesture into Flash. When we perform it, if all goes well, the name of the
    gesture will appear in the `debugString_txt` box on the stage to let us know it
    was recognized. We have to use three tools to go through the complete process:


    - The first tool, Omek Beckon Gesture Organizer, lets us add the gesture in name
    only into the SDK.

    - The second application, the Gesture Toolbox, enables us to select the gesture
    so that we can record Examples. We record examples through the Kinect camera.
    Record several examples. Once we have a few positive ones, we record a few negative
    ones as well. From there, we will go into each file and mark each recording, letting
    Beckon know where the gesture is positively performed by marking it as such. Any
    unmarked clip or clip area will be analyzed as a negative example.

    - Finally, we launch the Gesture Learner, our third application, and tell it where
    our examples are located. We also tell it a few things about what we are looking
    for with our gesture. The Gesture Learner will analyze our clips and grade them.
    Anything less than .96% should send us back into the Gesture Toolbox to get more
    positive and negative examples. Ideally, we would like a grade of 1.


    For the purpose of this chapter’s example, I’ve not included the recording of
    gestures from different people as test gestures. Ideally, you would record these
    types of gestures and grade your examples against test examples to make sure you
    were getting good recognition across many sources. This is an easy step to add
    and the Beckon SDK has links to a tutorial to guide you through it.


    Let’s get started. First off, we need to know how Beckon groups gestures into
    gesture groups it calls classifiers. Again, a classifier is just a set of gesture
    recording of the exact same gesture that will be analyzed together. These sequences
    will ultimately describe the classifier for the machine learning environment.
    We need to go into the Classifier folder in the SDK and add a new folder for our
    new gesture. Open the folder, which should have the following path:


    `C:\Beckon SDK\bin\Classifiers`


    Notice that there are two existing folders, `GuiGesturePack` and `BasicGesturePack`.
    These contain the gestures that come with Beckon. Let’s add a folder and call
    it `gameGestures`. In that folder, I’d suggest a new folder for each new gesture.
    For now, let’s just make one called `leftHandUp`. The full path and name should
    be:


    `C:\Beckon SDK\bin\Classifiers\gameGestures\leftHandUp`


    Now create a folder in `leftHandUp` called `examples`:


    `C:\Beckon SDK\bin\Classifiers\gameGestures\leftHandUp\examples`


    Finally, add one more folder for your output once your gestures are trained:


    `C:\Beckon SDK\bin\Classifiers\gameGestures\leftHandUp\output`


    Now let’s launch one of the three GUI interfaces and add your gesture. Launch
    the Gesture Organizer, which you’ll find at the following location:


    `C:\Beckon SDK\bin\OmekGestgureOrganizer.exe`


    Once you have launched the Gesture Organizer, perform the following steps:


    1. Click the Add Button and fill in the “Add Gestures” dialog as follows: `Package
    (gameGestures)`, `File (leftHandUp)`, `Gestures (leftHandUp)`, and `Type` (use
    “Trained”). For this tutorial, modifying other fields is not necessary.

    2. Click the Create Button to add this gesture and its package.

    3. Click the Save Button in the Gesture Organizer menu, to apply these changes.


    Your gesture now exists in the SDK and an `.xml` file has been generated. Of course,
    it doesn’t work yet, but it will be available in the tools for marking sequences
    ([Figure 6-6](#Chapter06.html#fig_6_6)).


    ![images](images/0606.jpg)


    **Figure 6-6.** The Gesture Organizer with the added `leftHandUp` gesture.


    ![images](images/square.jpg) **Note** For more information about the different
    options in the Gesture Organizer, please refer to the Gesture Training Manual
    in the `docs` folder.


    ### Recording a Gesture


    Now that you’ve added a new gesture, you can record it. Let’s open the Gesture
    Toolbox, which is the application we use to record gestures. The purpose of recording
    a gesture is to allow Beckon to register the gesture later, when it is performed
    by a user in front of the sensor.


    Execute the Gesture Toolbox by finding and double-clicking the following executable:


    `C:\Beckon SDK\bin\OmekGestgureToolbox.exe`


    There are a few tabs in this application. We will start off with the Recorder
    tab and then move into the marker tab in the next section.


    A word to the wise is that the Gesture Toolbox’s interface could be smoother to
    use. The name of your file is going to be cut off in the viewer. Don’t worry;
    each clip you make will be saved, but you will need to key over to see the name
    of each clip. Do that by pressing the right-arrow key when a clip’s name has focus.
    You can key over the letters, but there’s no way to expand the field.


    Clips are in numeric order automatically, but it’s easy to forget your place.
    For this reason, I recommend keeping a list of which clips are positive examples
    and which are negative examples. It’s helpful to know later. A positive example
    is a video recording of the gesture being performed. A negative example is a recording
    of a body doing anything but the gesture being trained. These negative examples
    help describe what the gesture is not. The positive ones tell the machine learning
    system what the gesture is.


    Follow these steps to record some examples of your gesture:


    1. In the Recorder tab, select the “examples” folder as the output folder and
    set the desired number of frames (usually between 200 and 500 frames).

    2. Record a sequence of someone performing the desired gesture, by pressing the
    Record Button. We call this a positive example, since it demonstrates what should
    be detected as the trained gesture. When performing the gesture by yourself, check
    the “countdown” option before starting to record. Make sure to move around a bit.
    You should see dots pop up on each joint. If you don’t see dots, you aren’t getting
    joint data.

    3. Add more sequences in the same way. Add at least 3 or 4. It’s recommended to
    move around a bit in the pose. Don’t just stand stock still. If you do, you’ll
    never see the joints register. Sway slightly, shifting your weight from right
    to left.

    4. Also get a few negative examples of you not doing the gesture. This is very
    important for successful gesture recognition later when we train our systems.


    For the training sequences, try to perform the gesture very clearly, without mixing
    it with other gestures. With “pose” gestures (like the one in this example), you
    can stay in the desired pose continuously for most of the sequence, while you
    modify the style of the pose and its location.'
