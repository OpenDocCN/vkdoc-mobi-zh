    ***Figure 7-3.** The Unity workspace*


    The left tab is now Game Viewer. In this tab, you can see everything that is in
    the current scene in 3D space from the perspective of the camera. A camera in
    3D space works just like a regular camera and should be positioned to frame all
    the appropriate visual elements in the scene.


    The tab on the right of the Game Viewer is the Scene Viewer tab. This tab shows
    the 3D world of the selected scene. You can think of scenes exactly like you''d
    think of levels. For each level in your game, you''ll create a scene. In the upper-right
    corner of the Scene Viewer, there is an exotic creature found in many 3D packages
    known as a Gizmo, and yes, that''s the official name. Fear not, it will not reproduce
    if you feed it after midnight or get it wet. It shows you the X, Y, Z, and perspective
    views. It''s easy to remember X, Y, and Z as R, G, and B in this color scene.
    Click and rotate on the X, Y, Z, or center cube (perspective view) axis to see
    the game from these angles.


    ![images](images/square.jpg) **Note** Viewing from different angles doesn''t move
    the camera, only what the user is looking at in the current scene.


    The final tab to the far right is the Inspector. If you know Flash, you can think
    of this tab like the Properties Inspector. The Inspector allows you to set the
    properties for a selected object''s components. The Inspector also allows you
    to attach scripts to game objects to introduce functionality in Unity. This is
    exactly what ZigFu has already done to make their examples work. ZigFu designed
    a basic scene with game objects and then attached scripts to the game objects
    to bind with OpenNI.


    You''ll see two tabs on the bottom of the workspace. The bottom left tab is your
    Hierarchy Viewer. Everything in this tab is actually an object in your game. The
    bottom right tab is the Project folder for the current project. Everything in
    this folder is hiding in User ![images](images/U001.jpg) New Unity Project 1 ![images](images/U001.jpg)
    Assets. Anything added to the Assets file will automatically update in this tab
    viewer. However, the object will not be in the game until it is added to a scene
    by dragging it into the Scene or Inspector.


    #### Basic Navigation and Transform Tools


    Now let''s run down the buttons surrounding the tabs. The buttons to your top
    left ([Figure 7-4](#Chapter07.html#fig_7_4)) are your basic navigation and transform
    tools with key commands that match most 3D applications.


    ![images](images/0704.jpg)


    ***Figure 7-4.** Basic navigation and transform tools*


    The buttons in [Figure 7-4](#Chapter07.html#fig_7_4) operate as follows, working
    from left to right. The letters in parentheses are the keyboard shortcuts.


    *   The Hand tool (Q) allows you to move around the 3D world.

    *   The Move tool (W) allows you to move around a selected game object in the
    Scene tab.

    *   The Rotate tool (W) allows you to rotate around your selected game object
    in the Scene tab.

    *   The Scale tool (R) allows you to scale a selected game object in the Scene
    tab.


    Another handy key command to know is F. Pressing F on your keyboard will focus
    the Scene tab on any game object selected in the Hierarchy tab.


    #### Play Controls


    The next buttons to the right are the play controls ([Figure 7-5](#Chapter07.html#fig_7_5)).


    ![images](images/0705.jpg)


    ***Figure 7-5.** Unity''s play controls*


    The Play button runs the current scene. If you press the Play button while the
    scene is playing, the scene stops. Unity has a specific interface particularity
    to be aware of. If in Play mode, these buttons will glow blue. Any changes made
    in the Inspector during this time to game object properties will be lost when
    the scene is stopped. There is no way to save changes made during Play mode unless
    you add an additional plug-in to Unity. If you hit on a property change that you
    like while in Play mode, write that change down and reenter it once you are out
    of Play mode.


    ![images](images/square.jpg) **Tip** A three-button mouse is critical for working
    in Unity''s 3D space. All three buttons are used to smoothly move around the scene
    in 3D space. Holding down Option and left-clicking allows you to pan the perspective.
    The middle mouse scroll zooms in and out of a scene. Pressing the scroll middle
    button down will toggle into the Hand tool. Right-clicking rotates perspective.
    Option+right-clicking provides an additional Zoom tool.


    ### Understanding ZigFu''s Relation to Unity


    ZigFu is a set of C# scripts that bind with OpenNI and PrimeSense''s NITE to allow
    Unity to access NITE''s functionality. OpenNI is an open source standard for creating
    compatibility across the newly emerging field of natural interaction devices,
    applications, and middleware. OpenNI is an abstraction layer that integrates middleware
    with hardware and applications.


    #### OpenNI and NITE


    OpenNI has been geared mainly toward 3D sensors, but nothing in OpenNI is specific
    to PrimeSense''s NITE or the Kinect. OpenNI is an interface that allows developers
    of middleware such as NITE get a depth stream, skeleton data, audio, infrared
    (IR), hand points, an RGB image, and gesture detection. OpenNI doesn''t specifically
    care how these points were generated or from where.


    OpenNI relies upon modules to retrieve device data and pass that data into OpenNI
    and any middleware. Anyone can write a module for any camera or sensor and register
    it with OpenNI. NITE is middleware that gives digital devices the power to translate
    and respond to user interaction without wearable equipment or controls.


    ![images](images/square.jpg) **Note** The important point to understand about
    OpenNI is that is it not specific to hardware or middleware. OpenNI can be used
    with any OpenNI-compliant hardware. For example, you can use OpenNI with the PrimeSense
    reference design, the Microsoft Kinect, the Asus Xtion, and with any OpenNI-compliant
    middleware such as NITE, and soon Beckon.


    NITE, then, is the intermediary standing between OpenNI and your application,
    in this case Unity. In the case of the Kinect, PrimeSense made not only the middleware
    but also the motion sensor chip inside the Kinect. This really changes nothing
    practically, but it''s a fun fact to know and part of what makes NITE so robust.


    #### Unity and ZigFu


    Unity allows users to create scripts and attach those scripts to game objects
    as components. Components are how game functionality is added to any game, and
    they drive the game objects. ZigFu has created scripts for Unity to bind, or talk
    with, OpenNI.


    ZigFu has created sample scripts to familiarize users with OpenNI''s functionality.
    Before ZigFu, developers in Unity wrote their own bindings. There''s still nothing
    stopping developers from doing this now should they be so inclined and skilled.
    With the way Unity works, you can very easily attach the ZigFu scripts onto one
    object and any custom scripts that you might create onto that same object or any
    other object.


    Unity is surprisingly tolerant of this kind of development. In fact, Unity supports
    not one but *three* scripting languages: JavaScript, C#, and Boo. Developers can
    use all three simultaneously, and there''s no need to choose one language over
    the other. One of your game object''s components can be in C# and the other in
    Boo.'
