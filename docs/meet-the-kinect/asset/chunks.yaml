  trans: '

    ### 入门指南：openFrameworks + Kinect


    与 C++ 和 OpenGL 本身一样，openFrameworks 支持跨平台运行，可在 PC、Mac 和 Linux 上使用。不过，你需要自行提供集成开发环境（IDE），即一个能够让你整合框架所有文件并将其与自己的代码一同编译的创作环境。openFrameworks
    支持的 IDE 包括各平台通用的 `Code::Blocks`，Windows 上的 `Visual C++ 2008` 和 `Visual C++ 2010`，以及
    Mac 上的 `Xcode`。


    选定 IDE 并配置完成后，你需要访问官网下载 openFrameworks 的最新版本。截至撰稿时，最新版本为 0.07（据我们所知，这与詹姆斯·邦德无关！）。访问地址如下：


    ```

    http://www.openframeworks.cc/download

    ```


    根据你的平台和 IDE 下载最新版 openFrameworks 后，你可以在 `apps/examples` 文件夹中找到示例项目。打开并编译这些项目，可以确保一切配置正确。如果编译过程中遇到兼容性问题或“文件未找到”错误，欢迎来到框架开发的世界——这是你的入门考验！不必担心，初次从源代码编译自己的程序时，根据错误提示四处摸索是非常常见的。坚持下去！特别需要注意的是，openFrameworks
    的示例项目使用相对路径来引用文件和框架；因此，如果你尝试编译一个位于错误文件夹中的项目，肯定会失败。


    成功编译几个基础示例后，就可以尝试 Kinect 相关的内容了。为了配合 `libfreenect` 驱动从零开始工作，西奥·沃森（Theo Watson）发布了一个“插件”（add-on，这是对可选模块或插件的惯用称呼），名为
    `ofxKinect`。它封装了 `libfreenect` 驱动，以便在 openFrameworks 中使用。请从 [`https://github.com/ofTheo/ofxKinect`](https://github.com/ofTheo/ofxKinect)
    获取该插件。


    只需下载该项目，将其移动到 `/add-ons` 文件夹，再将示例项目移动到 `apps/examples` 文件夹，然后打开并编译示例项目即可。编译成功后，你可以在如图
    5-7 所示的反馈仪表盘视图与如图 5-8 所示的经典点云视图之间切换。openFrameworks 的强大之处在于它能够轻松集成强大的计算机视觉库 `OpenCV`。如图
    5-7 所示，左下角的反馈图像虽然原本是一张深度图，但现在已借助 `OpenCV` 额外进行了分析，以检测场景中的“色块”（即作者本人）。色块检测结果通过绘制在图像上的矩形框来显示。


    ![images](img/0507.jpg)


    **图 5-7.** `ofxKinect` 示例项目展示了深度图、RGB 图像以及色块检测*


    ![images](img/0508.jpg)


    **图 5-8.** `ofxKinect` 示例项目必然包含数据的点云视图*


    另外，如果你想使用 OpenNI 预建的抽象层及其算法魔法（比如手势和骨骼追踪），可以选用荷兰艺术家/开发者、openFrameworks 的活跃贡献者迪德里克·海伯斯（Diederick
    Huijbers）发布的封装了 OpenNI 的 openFrameworks 插件，名为 `ofxOpenNI`。请在此处获取该插件：


    ```

    https://github.com/roxlu/ofxOpenNI

    ```


    ### Cinder


    我们上面关于 openFrameworks 的大部分描述同样适用于 Cinder，这是一个由数字代理机构 Barbarian Group 于 2010 年发布的、用于“创意编程”的
    C++ 框架。Cinder 是一个较新的项目，对于 C++ 新手来说，可能比 openFrameworks 更具挑战性。这两个项目有大量重叠之处，要逐点比较它们需要大量篇幅，并且涉及设计哲学和
    C++ 内存管理等微妙话题。简而言之，如果你想创建一个精美的 C++ 应用程序，这两个项目都值得考虑。


    #### Cinder 能为你做什么


    那么，为什么要在 Kinect 应用中使用 Cinder 呢？用 Cinder 创作的作品本身就很有说服力。简单来说，它能帮助你打造令人惊叹的图形作品，并在视觉上突破界限。加上一款深度感知摄像头，你就能创造出一场交互式视觉盛宴！正如第
    3 章所述，数字艺术家罗伯特·霍金斯（Robert Hodgins）的“Body Dysmorphia（身体畸形）”项目就是用 Cinder 创建的，它展示了一些令人不安的
    3D 视觉效果（霍金斯本人也是 Cinder 的共创者）。如图 5-9 所示，如果说普通摄像头会让你看起来胖十斤，那么 Kinect 加上 Cinder 则会让效果加倍！


    ![images](img/0509.jpg)


    **图 5-9.** 数字艺术家罗伯特·霍金斯基于 Cinder 的 Body Dysmorphia 项目*


    #### Cinder 入门指南


    与 openFrameworks（或任何框架）一样，你需要自行提供 IDE。Cinder 适用于 Windows 上的 `Visual C++ 2008`
    和 `Visual C++ 2010`，以及 Mac 上的 `Xcode`。不过截至撰稿时，它还不能很好地支持 Linux。


    因此，只需下载最新版本的 Cinder 并将其放在任何位置即可。你可以从以下地址获取代码：


    ```

    http://libcinder.org/download/

    ```


    同样，建议先编译 `/samples` 文件夹中的一两个内置示例项目。如果一切编译正常，就可以开始用 Cinder 操作 Kinect 了。


    Cinder 对 Kinect 的支持并非以“块”（block，这是对可选模块或插件的惯用称呼）的形式提供，而是以霍金斯提供的一些示例和支持文件的形式提供，恰如其分地命名为
    `Cinder-Kinect`。请在此处获取这些文件：


    ```

    https://github.com/cinder/Cinder-Kinect

    ```


    `Cinder-Kinect` 封装了 `libfreenect` 驱动，是目前唯一可用的、将 Kinect 数据提供给 Cinder 的选项。下载 `Cinder-Kinect`
    后，将整个文件夹（包括 `/include`、`/lib`、`/samples` 和 `/src` 子文件夹）放入 Cinder 主目录的 `/samples`
    文件夹中。这样可以确保项目文件中使用的相对路径能够正常工作。编译 `kinectBasic` 示例后，你将获得来自 Kinect 的深度图像和 RGB 图像。


    编译 `kinectPointCloud` 示例后，你将获得 3D 点云的又一个变体。不过，在我们看来，这是视觉上最悦目、细节最丰富的点云之一。


    ![images](img/0510.jpg)


    **图 5-10.** `Cinder-Kinect` 的点云版本*


    ### 现在，开始创作吧！


    在本章中，我们想简要介绍用于 Kinect 创意编程的可用工具集。这些工具中的每一个都值得用一整本书来介绍！如果你为项目选择了其中一种，毫无疑问需要更深入地探索它（这不是双关语！）。我们小小的希望是，当你脑海中涌现出精彩的
    Kinect 创意项目时，通过阅读本章，你将能更好地找到合适的工具。在下一章中，我们将转向一些最强大、最流行的 Kinect 通用开发框架。继续前进！


    ## 第六章

