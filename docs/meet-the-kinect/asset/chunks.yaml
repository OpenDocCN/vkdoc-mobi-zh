- fmt: 'After OpenNI became available, Microsoft announced that a Kinect Software
    Development Kit for Windows would become available in the spring of 2011 for non–commercial
    use. Soon, companies that had spent years designing application development suites
    for authoring natural gesture software woke up to find a growing market demand.
    Previously, their systems were not easily available for download and came with
    licensing fees that made it too costly even to publish them on their websites.
    Suddenly, these companies needed to maintain relevance as thousands of developers
    were clamoring to create sophisticated applications – the most accessible choice
    was open source software. By February 2011, SoftKinectic announced the general
    availability of `iisu`, their driver system for any depth sensor as well as a
    development environment for body gestures, in addition to their line of DepthSense
    camera hardware. Omek Interactive moved to release their `Beckon SDK` while announcing
    a partnership with PMD Technologies, a time–of–flight depth camera manufacturer.
    GestureTek, a pioneer in body–based gesture interaction systems since the 1980s,
    prepared to offer their `GestTrack3D SDK` for general availability.


    Gradually development choices have become increasingly diversified for designers
    and developers who are looking for tools that will help them take advantage of
    the possibilities offered by Kinect. Today, there are dozens of hardware and software
    combinations that result in novel technology stacks that can drive natural user
    interface experiences into the future ([Figure 2-2](#Chapter02.html#fig_2_2)).
    In the next section, we will explain the factors that determine the shape of a
    Kinect stack, based on the individual components.


    ![images](images/0202.jpg)


    **Figure 2-2.** New alternative natural interface hardware and software stacks


    ## Hardware


    A variety of devices can capture 3D imagery. Most are still expensive, which is
    why Kinect is such a significant breakthrough. Some devices are more appropriate
    for capturing still imagery, while other designs are suited for producing a high
    frequency of still imagery over time to generate 3D depth video. Each device captures
    depth information about the 3D world and stores it in ways that can reconstruct
    the full dimensionality of the captured 3D data. The systems may use very different
    operational approaches or come from different manufacturers, but the result is
    always data that contains some form of 3D depth information.


    It can be helpful to compare the different approaches of collecting 3D imagery
    with the choices for collecting 2D information. Regardless of the device’s operational
    method, a traditional camera always captures the 3D world and stores it in a 2D
    format. Whether it’s a pinhole camera, a large format plate camera, a single lens
    reflex (SLR), a rangefinder, a point and shoot, or the camera in your phone, the
    optical systems take in light and store a negative or raw image file in flat 2D.
    Therefore, just as these different imaging systems exist with their own strengths
    and weaknesses for a particular application in 2D photography, there is a range
    of different ways to build 3D imaging systems as well. In depth–sensing systems,
    the basic premise usually includes emitting a signal, having that signal bounce
    off the objects in the environment, reading the signal as it returns, and computing
    the depth information ([Figure 2-3](#Chapter02.html#fig_2_3)). Regardless of the
    technique used, the common thread between them is the generation of a depth map
    image or a 3D point cloud of a scene.


    ![images](images/0203.jpg)


    **Figure 2-3.** Shared principles of most 3D depth–sensing systems. Signal is
    sent from the emitter, signal reflects back and is received by the sensor, calculations
    on returned signal are used to measure the distance to the target.


    ## Structured Light Camera Systems


    A visible structured light approach was famously used as the basis for Radiohead’s
    breakthrough 2008 cameraless music video, “House of Cards,” from the album *In
    Rainbows*. With the aid of Geometric Informatics’ custom system, close–up recordings
    of singer Tom Yorke’s face were captured as point cloud data, which allowed the
    ”synthetic camera” viewpoints to be directed in postproduction. The structured
    light approach was ideal for capturing the singer’s detailed facial expressions
    since this technique can be used to capture subjects within a couple of feet.
    Another 3D capture technique called LIDAR, or light detection and ranging, was
    used to gather large–scale 3D imagery spanning hundreds of feet for renderings
    of buildings and roads. A US$75,000 Velodyne device with 64 synchronized spinning
    lasers made this imagery possible.


    The data resulting from the production of the Radiohead video was made openly
    available through a Google code repository at `http://code.google.com/creative/radiohead/`.
    Kyle MacDonald explains how to recreate a setup like the one used to create the
    close-ups in the video at `http://www.instructables.com/id/Structured-Light-3D-Scanning/`
    ([Figure 2-4](#Chapter02.html#fig_2_4)).


    Structured light scanning is the process of generating 3D depth imagery data by
    projecting a known signal on to a scene, such as bands of frequency, coded light,
    or a pattern of shapes, and observing the way this pattern is deformed as it strikes
    surfaces at variable distances to calculate depth range. Kinect uses an infrared
    structured light system, along with the ASUS WAVI Xtion and the PrimeSense reference
    designs. Because these systems use invisible infrared light, there is no perceivable
    disturbance to the environment during recording. This allows 3D capture to be
    unaffected by lighting conditions in the scene. In contrast, visible structured
    light systems work by projecting patterns on to a scene that is visible with the
    naked eye. Such systems provide their own illumination of the scene within the
    visible spectrum, which can be quite noticeable.


    The visible structured light approach has some advantages. Previously, this approach
    was one of the less expensive options for generating depth imagery. It can produce
    higher resolution imagery than other approaches, such as time–of–flight cameras,
    at a fraction of the cost. In a visible structured light system, a projector can
    be used to overlay a pattern of shapes, such as lines, that are still or moving
    at high frequencies and bend around objects. One or more cameras are pointed at
    the structured light and calculations are processed on the resulting imagery to
    generate depth data. For example, the PR2 robot by Willow Garage uses an LED “texture”
    projector to overlay a pattern on the scene in front of the robot that looks like
    random red pixilated static. The Robot Operating System uses a narrow angle stereo
    camera pair that is pointed at the visible pattern to generate a 3D point cloud.
    Artists like Kyle MacDonald have successfully constructed visible structured light
    systems with off–the–shelf components ([Figure 2-4](#Chapter02.html#fig_2_4))
    including the Sony Playstation Eye high–speed camera, DLP data projectors, and
    software written in Processing – an open source creative coding suite covered
    in [Chapter 4](#Chapter04.html#ch4). It is technically possible, although perhaps
    costly, to modify this visible structured light approach into an invisible structured
    light method if the projector signal and camera elements are adapted to work in
    the infrared range. This is the range of light the Kinect uses so the user doesn’t
    actively see light coming from the device.


    ![images](images/0204.jpg)'
