- fmt: '# Getting Started: Flash + Kinect


    As of this writing, the primary technique used to talk to Flash from the Kinect
    is to run a small helper app that grabs whatever data you want from the Kinect,
    does whatever low-level analysis you want to do on that data in a language like
    C or C++, and then sends along the information you plan to use in your application
    to Flash through a socket connection as if over a network connection. (In fact,
    it *can* be over a network connection, though you’ll more likely run the socket
    server and your Flash movie on the same machine.)


    Within the framework of this general approach, there is an important question
    to consider: How much of your Kinect data analysis do you want to do in Flash,
    and how much can you do before you send data on to Flash? As always, the answer
    is, “It depends.”


    What does it depend on? Well, a likely scenario for Flash application development
    is that you have an idea for an application that requires the hand-tracking, skeleton-tracking
    magic provided by extant machine vision libraries, like OpenCV or OpenNI/NITE.
    In that case, you’re probably going to be in the camp of those who do a lot of
    data processing *before* sending anything to Flash, at which point you’re sending
    some fairly minimal but powerful data, like the X-Y-Z coordinates of the hand-point
    tracked by NITE. The other alternative is to work with the Kinect’s depth and
    RGB data directly in Flash, grabbing that data from the Kinect and hucking it
    over to your Flash movie for processing.


    For the first alternative, the folks at Blitz Agency offer up a solution based
    on Node.js, a popular JavaScript web server. Blitz runs a modified version of
    one of the OpenNI/NITE sample applications called `SingleControl` and sends the
    pre-processed hand-point data over a socket to Flash using Node.js. Their steps
    are detailed on their development blog:


    `http://labs.blitzagency.com/?p=2634`


    Using this technique requires you to run three things at once, and it looks something
    like this: 1) start your socket server using Node.js and Blitz''s JavaScript file
    which is configured to broadcast data at defined intervals (think "frames"); 2)
    run the modified `SingleControl` example to start collecting hand-point data and
    feeding it to the socket server; 3) run your Flash movie with a `Socket` object
    and a listener (`ProgressEvent.SOCKET_DATA`) to take some action whenever new
    hand-point data is received. [Figure 5-5](#Chapter05.html#fig_5_5) shows how lean
    the data passed to Flash really is: much smaller than an RGB or depth image!


    ![images](images/0505.jpg)


    **Figure 5-5.** The X-Y-Z hand-point data passed to Flash from the included NITE
    example application, `SingleControl`


    The OpenKinect-based AS3Kinect project pursues the second alternative, getting
    fairly raw data (images) from the Kinect and pumping it into Flash (again, using
    a socket server). Although this setup also requires a fair bit of diligence, it
    can be well worth it if you''re itching to train your Flash/ActionScript 3 chops
    on a Kinect project. Details about the AS3Kinect project can be found here:


    `http://www.as3kinect.org/`


    ## openFrameworks


    Unlike the other tools profiled in this chapter—and, in fact, most of the rest
    of this book—neither openFrameworks nor Cinder (the next project profiled) provides
    you with a self-contained environment for writing and compiling code. As the "openFrameworks"
    name implies, they are simply "frameworks," or bunches of pre-written code you
    can use to handle common tasks in the otherwise daunting languages of C++ and
    OpenGL. C++ and OpenGL are two relatively old and extremely powerful languages
    with which you can build very robust interactive desktop and mobile applications.
    C++ is your low-level, functional programming language, while OpenGL handles your
    high-performance 2D and 3D graphics processing and rendering.


    As with Processing and Cinder (as we''ll see), openFrameworks is built to support
    intuitive, sketch-style "creative coding," a domain that includes all the things
    that interactive artists, designers, and application developers might want to
    do with graphics, media, data, and hardware.


    That turns out to be a lot of things. The openFrameworks project, which began
    as a collaboration between Zach Lieberman and Theodore Watson at Parsons School
    of Design, has grown to become a vast and powerful library used by thousands of
    installation artists, performers, and hackers.


    ### What openFrameworks Can Do for You


    The openFrameworks community, which has forever had a hand in creative computer
    vision applications, jumped right into the Kinect hacking frenzy. Why? The Kinect
    and Kinect-like sensors help solve one of the fundamental challenges of creating
    interactive, vision-based applications: namely, getting a clear picture of what
    the user is doing. Moreover, the Kinect can be powerfully combined with some of
    the other tools built into or wrapped by openFrameworks. OpenCV, the computer
    vision library discussed in the last chapter, is a great example. Whereas OpenCV
    can be used to accomplish tough computer vision tasks, like face detection or
    recognition, those tasks become easier when combined with the ability to see in
    3D and, say, know roughly where to look in the image for faces. With openFrameworks,
    we can bring both of these technologies under the same roof, so to speak, and
    do some amazing stuff. One of the first demonstrations of the possibilities was
    the interactive puppet prototype created by Design I/O''s Emily Gobeille and openFrameworks
    co-creator Theo Watson, as shown in [Figure 5-6](#Chapter05.html#fig_5_6).


    ![images](images/0506.jpg)


    **Figure 5-6.** A projected virtual puppet application built with openFrameworks
    by Emily Gobeille and Theo Watson'
