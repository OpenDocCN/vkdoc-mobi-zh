- fmt: "### Item Selector Operation\n\nTo fully understand what the `Item Selector`\
    \ does, create a blank game object and drag a fader and item selector into the\
    \ object. In addition, add a new script that listens to the `Item Selector` messages\
    \ and prints them out. Let's create a script to output which items are selected\
    \ to the console. To create a script, go to Main Menu ![images](images/U001.jpg)\
    \ Assets ![images](images/U001.jpg) Create ![images](images/U001.jpg) C# script.\
    \ Name your script in your project. Select the script in the Hierarchy and choose\
    \ Open. This will open Unity's scripting environment. Type in the following code:\n\
    \n```\nvoid ItemSelector_Select(int index)\n{\n  print(\"Item selector select\
    \ \" + index);\n}\nvoid ItemSelector_Next()\n{\n  print(\"Item selector next\"\
    );\n}\nvoid ItemSelector_Prev()\n{\n  print(\"Item selector prev\");\n}\n```\n\
    \nNow add the script to the game object you created. In addition, you are going\
    \ to need to manually link up the Fader to the `Item Selector` in the Inspector.\
    \ This will print the element you are focused on in the console. To view the console,\
    \ press `Shift+Com+C` or go to Main Menu ![images](images/U001.jpg) Window ![images](images/U001.jpg)\
    \ Console.\n\nThe various wait times control the repeat logic of the scrolling\
    \ (similar to holding down on a keyboard key: you get the first keypress, slight\
    \ pause, and then repeated keypressing slowly accelerating). The `Session Manager`\
    \ waits for the focus gesture and starts a hand point session. The `Session Manager`\
    \ heads up the display on the left of the screen seen only in Play mode is added\
    \ implicitly, such as `OpenNIContext`, but can also be added explicitly if you\
    \ want to change the default settings (which gestures to listen to, for example).\n\
    \nThe `OpenNISessionManager` provides a wrapper for the `HandTracking` and `GestureDetection`\
    \ OpenNI streams. The main advantage of this model is that the gesture detector\
    \ is based on a raw depth stream; no skeleton detector needed. This means that\
    \ ZigFu's hand tracker will work even when you are on the couch covered with a\
    \ blanket and do not resemble any humanoid form. Just do the gesture and you're\
    \ in control!\n\n### CoverFlow\n\n`CoverFlow` creates your basic carousel user\
    \ experience. The Menu Game Object has a hand point controller, fader, scrolling\
    \ menu, and dummy feed. The scrolling menu adds just that to your scene. You can\
    \ set direction, window size, dampening, and scroll region size. The main difference\
    \ between a static and scrolling menu is that the scrolling menu is going to be\
    \ the actual parent of all children added to it.\n\nHere are the main properties\
    \ of the `Scrolling Menu` component in more detail:\n\n> **Direction:** Distance\
    \ between menu items\n> \n> **RepositionBasedOnBounds:** Should the menu layout\
    \ items be based on their actual bounds, or just based on the “Direction” property?\n\
    > \n> **WindowSize:** How many on-screen items before scrolling. Passed to `ItemSelector`\n\
    > \n> **ScrollRegionSize:** Passed to `ItemSelector`\n\nThe dummy feed just generates\
    \ dummy meshes and is a custom ZigFu script. You can change mesh color and other\
    \ features after selecting the `Menu Item` component that's linked to this script\
    \ in the Hierarchy tab.\n\n### Slide Viewer\n\n`Slide Viewer` is a basic slide\
    \ viewer that is very similar in nature to `CoverFlow`. However, the feed isn't\
    \ a dummy feed, but a feed of images for a folder. Path is where you set the path\
    \ to these images, and your search pattern is for the type of files you want it\
    \ to include from this directory.\n\n## Creating a Skeleton from Scratch\n\nUnity\
    \ and OpenNI are a powerful combination. With them, you can create a skeleton\
    \ from scratch. The following steps walk you through the process. A skeleton is\
    \ a term associated with a visualization of all possible joints an API can detect.\
    \ In this case, we will make a “stick man skeleton.” The reason you'd be interested\
    \ in doing this is to see that your tracking is working and to later to replace\
    \ your default game objects with real graphics created in a program like Maya.\
    \ Bones, rigging, and character animation are beyond the scope of this tutorial,\
    \ but all 3D packages have plenty of documentation about how to do this. In addition,\
    \ see the Unity manual for instructions specific to Unity.\n\n### Task 1. Add\
    \ the OpenNI Functionality\n\nYour first step is to create a new scene and add\
    \ some OpenNI functionality. Here is the process to follow:\n\n1.  Go to the Main\
    \ Menu. Choose File ![images](images/U001.jpg) New Scene.\n2.  Save your scene\
    \ as `MySkeleton`.\n3.  In that new scene, create an empty game object and add\
    \ the OpenNI scripts onto it. Choose Main Menu ![images](images/U001.jpg) Game\
    \ Object ![images](images/U001.jpg) Create Empty to create a new game object.\n\
    4.  Rename the game object `OpenNI Functionality`. Do that by pressing `Ctrl`+right-click\
    \ and choosing the Rename option. Note: You can actually specify any name that\
    \ you like. For example, the game object is called `Sensor` in the ZigFu scenes.\
    \ All it does is hold the component scripts to talk with OpenNI.\n5.  Now go to\
    \ the Project tab and open the OpenNI folder. Make sure the `OpenNI Functionality`\
    \ Game Object is selected in the Hierarchy and open in the Inspector. Now click\
    \ and drag `Open NIDepthmap Viewer` into the Inspector. Do the same for `OpenNIUser\
    \ Tracker`, `Open NIUsers Radar`, and `Open NISingle Skeleton Controller`.\n6.\
    \  We now need to connect our `OpenNI Tracker` to our `Open NIUsers Radar` to\
    \ make our Radar work. Simply select and drag the `Open NIUser Tracker` onto the\
    \ `Open NIUsers Radar` script. [Figure 7-7](#Chapter07.html#fig_7_7) shows the\
    \ correct configuration.\n\n![images](images/0707.jpg)\n\n***Figure 7-7.** OpenNI\
    \ User Tracker configuration*\n\nNow that you've tied in the necessary OpenNI\
    \ functionality, you can move on to make a basic skeleton."
