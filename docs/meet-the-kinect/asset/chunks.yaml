  trans: "\n### 测试手势\n\n按照前述方法创建的每个手势，都会生成并发布一个对应的分类器。正是这个分类器让你能够在 Flash 中使用手势。发布分类器指的是将其添加到\
    \ SDK 中，就像我们为 `leftHandUp` 所做的那样。\n\n发布分类器后，你可能想用实况摄像头对其进行测试。以下是运行测试的方法：\n\n1.\
    \  打开手势工具箱，进入查看器选项卡。\n2.  选择输入源（位于屏幕右下角）：\n    -   如需使用摄像头进行实况测试，请选择传感器选项。然后在下方菜单中选择摄像头类型。\n\
    \    -   如需使用序列，请选择序列选项。然后浏览找到该序列，或在下方文本框中输入其路径。\n3.  按下启动按钮以开始追踪执行。\n\n在手势显示区（屏幕左上角）选择目标手势。你可以选择多个手势。执行该手势。如果一切操作正确，你应该能看到手势被注册。请参见图\
    \ 6.8 中 `leftHandUp` 手势被成功追踪的示例。\n\n![images](img/0608.jpg)\n\n***图 6-8.** 选中查看器选项卡，手势已开启并被正确追踪。*\n\
    \n### 为 Flash 使用添加手势\n\n现在，我们可以将新手势添加到 Flash 文件的 ActionScript 中。第一步是向调用中添加手势监听器。找到以下代码块，并将粗体行添加到你的代码中：\n\
    \n`//为特定手势添加传感器监听器（有关可用手势的完整列表，请参阅文档）`\n`ExternalInterface.call(\"OmekAddGesture\"\
    ,\"leftPush\");`\n`ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");`\n\
    `ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");`\n`ExternalInterface.call(\"\
    OmekAddGesture\",\"leftHandUp\");`\n\n`//移除特定手势的传感器监听器`\n`ExternalInterface.call(\"\
    OmekRemoveGesture\",\"leftPush\");`\n`ExternalInterface.call(\"OmekRemoveGesture\"\
    ,\"rightClick\");`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"jumpNoHands\"\
    );`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"leftHandUp\");`\n\n保存并导出应用程序。然后启动\
    \ `OmekBeckonFlash.exe`。现在，当我们执行 `leftHandUp` 手势时，`debugString_txt` 框应输出该手势的名称。该框应弹出并显示“leftHandUp”。如果你没有看到该结果，请返回并仔细检查你是否正确执行了本章的每一步。\n\
    \n### 基于手势构建功能\n\n既然我们的新手势已能工作并被识别，我们就可以使用该手势来触发应用程序中的功能。让我们回到代码块中，添加一些新功能：当应用程序注册到该手势被执行时，在左指尖附近绘制一个黄色方框。将以下代码添加到\
    \ `testOmekFlashPlayer.fla` 文件中 `OnOmekGesture()` 函数的上方。这段代码使我们在应用程序正确追踪到新的 `leftHandUp`\
    \ 手势的每个点，都能在屏幕上绘制一个黄色方块图形。在图 6.9 中，你将看到当我的左臂到达屏幕上肩膀上方某个点时，该手势被追踪到。\n\n```\nvar\
    \ gestureSeen:MovieClip = new MovieClip();\nvar xNum:Number = 80;\nvar yNum:Number\
    \ = 80;\ngestureSeen.graphics.beginFill(0xFFcc00);\ngestureSeen.graphics.drawRect(xNum,\
    \ yNum, 30,30);\n\nfunction onOmekGesture(gestureName:String, playerLabel:String):void\n\
    \n{\n    if (gestureName == \"leftHandUp\") {\n        stage.addChild(gestureSeen);\n\
    \        gestureSeen.x = xNum;\n        gestureSeen.y = yNum;\n    }\n}\n```\n\
    \n再添加两行代码来获取左手食指指尖的位置，并将其赋值给 `xNum` 和 `yNum` 变量。这两行代码在以下示例中以粗体显示。在示例文件中找到相同的代码块，并添加以粗体显示的两行代码。\n\
    \n```\nfunction onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,\
    \ jointY:String, jointZ:String, confidence:String):void\n{\n    //将鼠标控制权交给特定玩家。\n\
    \    if(playerLabel == \"0\")\n    {\n\n    }\n    if(jointName == \"leftFingerTip\"\
    )\n    {\n        //镜像 X 值，使鼠标能像手一样左右移动。\n        leftFingerTip_mc.x = stage.stageWidth\
    \ - Number(jointX) * _screenScaleX + _correctionX;\n        leftFingerTip_mc.y\
    \ = Number(jointY) * _screenScaleY + _correctionY;\n        xNum = leftFingerTip_mc.x;\n\
    \        yNum = leftFingerTip_mc.y;\n    }\n}\n```\n\n保存并导出示例项目。再次运行示例。执行 LeftHandUp\
    \ 手势。你应该会看到 Beckon 在你执行手势时，在屏幕上指尖所在的位置放置一个方框（图 6-9）。\n\n![images](img/0609.jpg)\n\
    \n***图 6-9.** Beckon 注册了 `leftHandUp` 手势，并将一个方框移动到执行手势时屏幕上我左手食指指尖所在的位置。*\n\n我希望这个示例能让你了解\
    \ Beckon SDK 背后的主要概念。首先，我们了解了 Beckon 的功能，然后启动并运行了它。接着，我们在现有示例中为头部添加了新的追踪功能。在此基础上，很容易将图形映射到骨骼上。然后，我们讨论了一些界面设计的基础知识。之后，我们创建了自己的手势，将其添加到\
    \ Beckon SDK，并成功在 Flash 中为其添加了监听器。最后，我们添加了一个图形来指示我们的手势何时发生，更重要的是，发生在哪里。这应该足以让你开始使用\
    \ Beckon 创建基本界面了。\n\n### 第 7 章\n"
- fmt: "# 3D Games and User Interfaces with Unity\n\nFor this chapter, we are going\
    \ to be using a very popular game engine called Unity. By integrating `OpenNI`,\
    \ `NITE`, and `Sensor Kinect` in Unity, we will control a 3D character and multiple\
    \ user interfaces. After we cover the main components, we will build an example\
    \ of each from the bottom up.\n\nA game engine is a system designed for creating\
    \ and developing video games, installation spaces, and interfaces. What you can\
    \ do with a game engine goes far beyond just creating games. Unity is used commonly\
    \ to create architectural installations and 3D user interfaces. Game engines are\
    \ designed to work with mobile devices, computers, and game consoles. Most offer\
    \ a rendering engine for 2D and 3D graphics, a physics engine (for collision detection\
    \ and adding physics), sound, scripting, animation, and more. A game engine is\
    \ a real-time 3D environment easily repurposed in many ways. It can create brilliant\
    \ responsive environments, 3D projection maps, and interactive displays just as\
    \ easily as it can create games.\n\nSo what is a game engine exactly? It's a game\
    \ creation tool, which is different from a 3D package. You usually would not use\
    \ an engine to model your 3D characters but to put them together and turn them\
    \ into a playable game. Three-dimensional software packages at every level of\
    \ the industry export files that engines support. If you are new to 3D and want\
    \ to try it out for free, check out Blender and Google SketchUp. For more serious\
    \ users, you are already most likely using Maya or 3D Studio Max. If you are a\
    \ student, Maya also has a free educational version. Note that `.fbx` files are\
    \ native for Unity support, and Unity converts all polygons to polygon triangles.\n\
    \nUnity is a great game platform that's competitive with much more expensive engines,\
    \ such as the Unreal Engine, but it has a free edition. If a game or application\
    \ created in Unity grosses more than $100,000, Unity requires a license be purchased.\
    \ This makes the free edition ideal for beginners. This edition limits the complexity\
    \ of the games and disables some of the pro features such as mobile functionality,\
    \ but you can still make a good game with the tools available.\n\nThe Kinect galvanized\
    \ the open source community. After the Kinect data stream was successfully converted\
    \ into useable data by the Open Kinect community, the indie development scene\
    \ exploded with activity. Games, art installations, and other experimental computer\
    \ user interactions were created all over the world.\n\n## Installing Unity and\
    \ Supporting Software\n\nLet's get started. First, download Unity from [`http://unity3d.com/`](http://unity3d.com/).\
    \ Install Unity as you would install any other application on your platform. I\
    \ will be using Mac OS X 10.6.8 for the examples here, but Unity is platform agnostic\
    \ as are the ZigFu scripts we will be running.\n\n![images](images/square.jpg)\
    \ **Note** This chapter is created with Unity version 3.4. Older versions are\
    \ not compliant with the software covered here.\n\nNext, we are going to use an\
    \ extremely easy install script from ZigFu. ZigFu has created a package with one\
    \ install script that includes `OpenNI`, `Sensor Kinect`, and `NITE`. ZigFu has\
    \ the unique attribute of being written by two ex-PrimeSense employees and two\
    \ other developers. PrimeSense was the company that created `NITE`. As a result,\
    \ these Unity scripts for `OpenNI` are the most stable available and have the\
    \ advantage of being open source. ZigFu is Amir Hirsch, Ted Blackman, Roee Shenberg,\
    \ and Shlomo Zippel. When asked where they got their name from, they cited the\
    \ '90s meme, All Your Base Are Belong to Us. In addition, they think of moving\
    \ in front of a Kinect as \"zigging.\" Download the Installer script from [`www.Zigfu.com`](http://www.Zigfu.com).\
    \ In addition, download the Unity package on [`www.Zigfu.com`](http://www.Zigfu.com).\
    \ This is the package we will import to run Kinect in Unity. Unzip these files\
    \ and move them into your Documents folder.\n\n![images](images/square.jpg) **Caution**\
    \ ZigFu recommends a complete deinstall of Open Kinect, NITE, and OpenNI before\
    \ running their `install.sh` script. I found deinstalling unnecessary, but you\
    \ may want to follow ZigFu's recommendation.\n\nFollowing are the steps for executing\
    \ ZigFu's installer script on a Mac. The process on a Windows PC will be similar,\
    \ and perhaps even easier, as the Windows installer enables you do everything\
    \ with a single click.\n\n1.  Launch a terminal window. Do that on the Mac by\
    \ going to Mac ![images](images/U001.jpg) Application ![images](images/U001.jpg)\
    \ Utilities ![images](images/U001.jpg) Terminal.\n\n    A terminal window should\
    \ open, and you should see something like that in [Figure 7-1](#Chapter07.html#fig_7_1).\n\
    \n    ![images](images/0701.jpg)\n\n    ***Figure 7-1.** The Mac OS X terminal\
    \ window*\n\n2.  Navigate to the folder containing the installer script that you\
    \ downloaded. For example, I issued the following command on my system: `cd Documents/ZigFuOpenNIMac`\n\
    3.  Issue the following command to execute the installer script as the root user:\
    \ `sudo sh install.sh`\n4.  The `sudo` command might be new to you. There's a\
    \ user in your Mac OS that's a superuser, or root user, used for system administration.\
    \ This user account has privileges that your regular account does not have. The\
    \ `sudo` command allows you to execute a single command as if you were logged\
    \ on as this special user known as root.\n5.  You will be prompted for your user\
    \ password. Enter it. The installation will run, and the following lines of code\
    \ will appear in the Terminal window.\n\n    ```\n    You Know What You Doing\
    \ (Installing OpenNI)\n    Installing OpenNI\n    ****************************\n\
    \    copying shared libraries…OK\n    copying executables…OK\n    copying include\
    \ files…OK\n    …\n    *** DONE ***\n    For Great Justice… (Type \"sh test.sh\"\
    \ to run the UserTracker demo)\n    ```\n\n6.  Now we are going to test to make\
    \ sure everything installed correctly by running the test script. Type the following\
    \ command and press Enter: `sh test.sh`\n7.  This window should pop open, and\
    \ you should see yourself moving around, as shown in [Figure 7-2](#Chapter07.html#fig_7_2).\
    \ What you see in the figure is a depth map. A depth map is an image channel that\
    \ contains information relating to the distance to the surfaces of scene objects\
    \ from a viewpoint, in this case from the Kinect.\n\nThe installation is complete!\
    \ You are ready to move on and explore what Unity has to offer. Make sure to close\
    \ the PrimeSense User Tracker Viewer before moving on to avoid conflicts with\
    \ subsequent examples.\n\n![images](images/0702.jpg)\n\n***Figure 7-2.** A Kinect\
    \ depth map as generated by Unity*\n\n## Exploring the Unity Interface\n\nLaunch\
    \ Unity. Let's create a project and explore the interface together.\n\n### Projects\n\
    \nHere's how to create a project:\n\n1.  Select File ![images](images/U001.jpg)\
    \ New Project from the menu.\n2.  It's a good idea to always import Unity's Standard\
    \ Assets. In the popup, you will see a whole list of possibilities to include\
    \ in your project. Select Standard Assets and press Create Project.\n3.  Import\
    \ the ZigFu Unity package for all of the examples. Start by selecting Assets ![images](images/U001.jpg)\
    \ Import Package ![images](images/U001.jpg) Custom Package from the menu.\n4.\
    \  Navigate to your Documents folder and import the following file: `UnityOpenNIBindings-v1.1.unitypackage`\n\
    5.  From the ensuing popup, just let Unity import all the appropriate libraries\
    \ for the project it needs.\n\nUnity should now have a few tabs open. The first\
    \ thing you are going to want to do is note that in the upper left you see two\
    \ tabs, Scene and Game. Click Game to switch to the Game tab."
  raw: "## 3D Games and User Interfaces with Unity\n\nFor this chapter, we are going\
    \ to be using a very popular game engine called Unity. By integrating OpenNI,\
    \ NITE, and Sensor Kinect in Unity, we will control a 3D character and multiple\
    \ user interfaces. After we cover the main components, we will build an example\
    \ of each from the bottom up.\n\nA game engine is a system designed for creating\
    \ and developing video games, installation spaces, and interfaces. What you can\
    \ do with a game engine goes far beyond just creating games. Unity is used commonly\
    \ to create architectural installations and 3D user interfaces. Game engines are\
    \ designed to work with mobile devices, computers, and game consoles. Most offer\
    \ a rendering engine for 2D and 3D graphics, a physics engine (for collision detection\
    \ and adding physics), sound, scripting, animation, and more. A game engine is\
    \ a real-time 3D environment easily repurposed in many ways. It can create brilliant\
    \ responsive environments, 3D projection maps, and interactive displays just as\
    \ easily as it can create games.\n\nSo what is a game engine exactly? It's a game\
    \ creation tool, which is different from a 3D package. You usually would not use\
    \ an engine to model your 3D characters but to put them together and turn them\
    \ into a playable game. Three-dimensional software packages at every level of\
    \ the industry export files that engines support. If you are new to 3D and want\
    \ to try it out for free, check out Blender and Google SketchUp. For more serious\
    \ users, you are already most likely using Maya or 3D Studio Max. If you are a\
    \ student, Maya also has a free educational version. Note that .fbx files are\
    \ native for Unity support, and Unity converts all polygons to polygon triangles.\n\
    \nUnity is a great game platform that's competitive with much more expensive engines,\
    \ such as the Unreal Engine, but it has a free edition. If a game or application\
    \ created in Unity grosses more than $100,000, Unity requires a license be purchased.\
    \ This makes the free edition ideal for beginners. This edition limits the complexity\
    \ of the games and disables some of the pro features such as mobile functionality,\
    \ but you can still make a good game with the tools available.\n\nThe Kinect galvanized\
    \ the open source community After the Kinect data stream was successfully converted\
    \ into useable data by the Open Kinect community, the indie development scene\
    \ exploded with activity. Games, art installations, and other experimental computer\
    \ user interactions were created all over the world.\n\n### Installing Unity and\
    \ Supporting Software\n\nLet's get started. First, download Unity from [`http://unity3d.com/`](http://unity3d.com/).\
    \ Install Unity as you would install any other application on your platform. I\
    \ will be using Mac OS X 10.6.8 for the examples here, but Unity is platform agnostic\
    \ as are the ZigFu scripts we will be running.\n\n![images](images/square.jpg)\
    \ **Note** This chapter is created with Unity version 3.4\\. Older versions are\
    \ not compliant with the software covered here.\n\nNext, we are going to use an\
    \ extremely easy install script from ZigFu. ZigFu has created a package with one\
    \ install script that includes OpenNI, Sensor Kinect, and NITE. ZigFu has the\
    \ unique attribute of being written by two ex-PrimeSense employees and two other\
    \ developers. PrimeSense was the company that created NITE. As a result, these\
    \ Unity scripts for OpenNI are the most stable available and have the advantage\
    \ of being open source. ZigFu is Amir Hirsch, Ted Blackman, Roee Shenberg, and\
    \ Shlomo Zippel. When asked where they got their name from, they cited the '90s\
    \ meme, All Your Base Are Belong to Us. In addition, they think of moving in front\
    \ of a Kinect as “zigging.” Download the Installer script from [`www.Zigfu.com`](http://www.Zigfu.com).\
    \ In addition, download the Unity package on [`www.Zigfu.com`](http://www.Zigfu.com).\
    \ This is the package we will import to run Kinect in Unity. Unzip these files\
    \ and move them into your Documents folder.\n\n![images](images/square.jpg) **Caution**\
    \ ZigFu recommends a complete deinstall of Open Kinect, NITE, and OpenNI before\
    \ running their install.sh script. I found deinstalling unnecessary, but you may\
    \ want to follow ZigFu's recommendation.\n\nFollowing are the steps for executing\
    \ ZigFu's installer script on a Mac. The process on a Windows PC will be similar,\
    \ and perhaps even easier, as the Windows installer enables you do everything\
    \ with a single click.\n\n1.  Launch a terminal window. Do that on the Mac by\
    \ going to Mac ![images](images/U001.jpg) Application ![images](images/U001.jpg)\
    \ Utilities ![images](images/U001.jpg) Terminal.\n\n    A terminal window should\
    \ open, and you should see something like that in [Figure 7-1](#Chapter07.html#fig_7_1).\n\
    \n    ![images](images/0701.jpg)\n\n    ***Figure 7-1.** The Mac OS X terminal\
    \ window*\n\n2.  Navigate to the folder containing the installer script that you\
    \ downloaded. For example, I issued the following command on my system: `cd  Documents/ZigFuOpenNIMac`\n\
    3.  Issue the following command to execute the installer script as the root user:\
    \ `sudo sh install.sh`\n4.  The sudo command might be new to you. There's a user\
    \ in your Mac OS that's a superuser, or root user, used for system administration.\
    \ This user account has privileges that your regular account does not have. The\
    \ sudo command allows you to execute a single command as if you were logged on\
    \ as this special user known as root.\n5.  You will be prompted for your user\
    \ password. Enter it. The installation will run, and the following lines of code\
    \ will appear in the Terminal window. `You Know What You Doing (Installing OpenNI)`\n\
    \    `Installing OpenNI`\n    `****************************`\n    `copying shared\
    \ libraries…OK`\n    `copying executables…OK`\n    `copying include files…OK`\n\
    \    `…`\n    `*** DONE ***`\n    `For Great Justice… (Type “sh test.sh” to run\
    \ the UserTracker demo)`\n6.  Now we are going to test to make sure everything\
    \ installed correctly by running the test script. Type the following command and\
    \ press Enter: `sh test.sh`\n7.  This window should pop open, and you should see\
    \ yourself moving around, as shown in [Figure 7-2](#Chapter07.html#fig_7_2). What\
    \ you see in the figure is a depth map. A depth map is an image channel that contains\
    \ information relating to the distance to the surfaces of scene objects from a\
    \ viewpoint, in this case from the Kinect.\n\nThe installation is complete! You\
    \ are ready to move on and explore what Unity has to offer. Make sure to close\
    \ the PrimeSense User Tracker Viewer before moving on to avoid conflicts with\
    \ subsequent examples.\n\n![images](images/0702.jpg)\n\n***Figure 7-2.** A Kinect\
    \ depth map as generated by Unity*\n\n### Exploring the Unity Interface\n\nLaunch\
    \ Unity. Let's create a project and explore the interface together.\n\n#### Projects\n\
    \nHere's how to create a project:\n\n1.  Select File ![images](images/U001.jpg)\
    \ New Project from the menu.\n2.  It's a good idea to always import Unity's Standard\
    \ Assets. In the popup, you will see a whole list of possibilities to include\
    \ in your project. Select Standard Assets and press Create Project.\n3.  Import\
    \ the ZigFu Unity package for all of the examples. Start by selecting Assets ![images](images/U001.jpg)\
    \ Import Package ![images](images/U001.jpg) Custom Package from the menu.\n4.\
    \  Navigate to your Documents folder and import the following file: `UnityOpenNIBindings-v1.1.unitypackage`\n\
    5.  From the ensuing popup, just let Unity import all the appropriate libraries\
    \ for the project it needs.\n\nUnity should now have a few tabs open. The first\
    \ thing you are going to want to do is note that in the upper left you see two\
    \ tabs, Scene and Game. Click Game to switch to the Game tab."
  trans: "\n# 使用 Unity 制作 3D 游戏与用户界面\n\n本章我们将使用一款非常流行的游戏引擎——Unity。通过在 Unity 中集成 `OpenNI`、`NITE`\
    \ 和 `Sensor Kinect`，我们将能够控制一个 3D 角色以及多个用户界面。在介绍完主要组件后，我们将从零开始逐一构建相应的示例。\n\n游戏引擎是为创建和开发视频游戏、装置空间及界面而设计的系统。使用游戏引擎能做的事情远不止于制作游戏。Unity\
    \ 常被用于创建建筑装置和 3D 用户界面。游戏引擎专为移动设备、计算机和游戏主机而设计。大多数引擎都提供 2D 和 3D 图形的渲染引擎、物理引擎（用于碰撞检测和物理模拟）、音频、脚本、动画等功能。游戏引擎是一个实时\
    \ 3D 环境，可以轻松地以多种方式加以改造利用。它既能创造出精彩的响应式环境、3D 投影映射和交互式展示，也能同样轻松地制作游戏。\n\n那么，游戏引擎到底是什么？它是一种游戏制作工具，与\
    \ 3D 软件包有所不同。你通常不会用引擎来建模你的 3D 角色，而是用来将它们整合在一起，变成一个可玩的游戏。行业内各个层次的 3D 软件包都能导出引擎支持的格式。如果你是\
    \ 3D 新手，想免费尝试一下，可以看看 Blender 和 Google SketchUp。对于更专业的用户来说，你很可能已经在使用 Maya 或 3D\
    \ Studio Max 了。如果你是学生，Maya 也提供免费的教育版。请注意，`.fbx` 文件是 Unity 原生的支持格式，Unity 会将所有多边形转换为三角形多边形。\n\
    \nUnity 是一个出色的游戏平台，与价格昂贵得多的引擎（如虚幻引擎）相比也颇具竞争力，但它提供免费版本。如果使用 Unity 创建的游戏或应用总收入超过\
    \ 10 万美元，则需要购买 Unity 的许可证。这使得免费版非常适合初学者。该免费版限制了游戏的复杂性，并禁用了一些专业功能，例如移动端功能，但你仍然可以利用可用的工具制作出不错的游戏。\n\
    \nKinect 极大地激发了开源社区的活力。在 Open Kinect 社区成功将 Kinect 的数据流转换为可用数据后，独立开发领域随之活跃起来。世界各地涌现了各种游戏、艺术装置以及其他实验性的计算机用户交互方式。\n\
    \n## 安装 Unity 及配套软件\n\n让我们开始吧。首先，从 [`http://unity3d.com/`](http://unity3d.com/)\
    \ 下载 Unity。像安装平台上的其他应用程序一样安装 Unity。我将在本示例中使用 Mac OS X 10.6.8，但 Unity 本身与平台无关，我们之后将运行的\
    \ ZigFu 脚本也是如此。\n\n![images](img/square.jpg) **注意** 本章基于 Unity 3.4 版本创建。旧版本与本教程涉及的软件不兼容。\n\
    \n接下来，我们将使用 ZigFu 提供的一个极其简单的安装脚本。ZigFu 创建了一个包含单个安装脚本的软件包，该脚本整合了 `OpenNI`、`Sensor\
    \ Kinect` 和 `NITE`。ZigFu 的独特之处在于，它由两位前 PrimeSense 员工以及另外两位开发者共同编写。PrimeSense 正是创建\
    \ `NITE` 的公司。因此，这些用于 `OpenNI` 的 Unity 脚本是目前最稳定的，并且具有开源的优点。ZigFu 的团队成员是 Amir Hirsch、Ted\
    \ Blackman、Roee Shenberg 和 Shlomo Zippel。当被问及名字的由来时，他们引用了 90 年代的网络迷因“All Your\
    \ Base Are Belong to Us”。此外，他们将在 Kinect 前移动的动作称为“zigging”。从 [`www.Zigfu.com`](http://www.Zigfu.com)\
    \ 下载安装脚本。同时，也从 [`www.Zigfu.com`](http://www.Zigfu.com) 下载 Unity 包。我们将导入这个包，以便在\
    \ Unity 中运行 Kinect。解压这些文件，并将它们移动到你的“文档”文件夹中。\n\n![images](img/square.jpg) **警告**\
    \ ZigFu 建议在运行其 `install.sh` 脚本之前，完全卸载 Open Kinect、NITE 和 OpenNI。我发现卸载并非必要，但你也许希望遵循\
    \ ZigFu 的建议。\n\n以下是在 Mac 上执行 ZigFu 安装脚本的步骤。在 Windows PC 上的过程类似，甚至可能更简单，因为 Windows\
    \ 安装程序可以让你一键完成所有操作。\n\n1.  打开一个终端窗口。在 Mac 上，通过依次进入 Mac ![images](img/U001.jpg)\
    \ 应用程序 ![images](img/U001.jpg) 实用工具 ![images](img/U001.jpg) 终端 来打开它。\n\n    终端窗口应该会打开，你可能会看到类似\
    \ 图 7-1 的画面。\n\n    ![images](img/0701.jpg)\n\n    ***图 7-1.** Mac OS X 终端窗口*\n\
    \n2.  导航到你下载的安装脚本所在的文件夹。例如，我在我的系统上执行了以下命令：`cd Documents/ZigFuOpenNIMac`\n3.  执行以下命令，以\
    \ root 用户身份运行安装脚本：`sudo sh install.sh`\n4.  `sudo` 命令对你来说可能比较陌生。在你的 Mac OS 中，有一个超级用户（即\
    \ root 用户），用于系统管理。这个用户帐户拥有你的普通帐户所不具备的权限。`sudo` 命令允许你以 root 这个特殊用户的身份执行单条命令。\n\
    5.  系统会提示你输入用户密码。输入密码。安装过程会开始运行，终端窗口中会出现以下代码行。\n\n    ```\n    You Know What You\
    \ Doing (Installing OpenNI)\n    Installing OpenNI\n    ****************************\n\
    \    copying shared libraries…OK\n    copying executables…OK\n    copying include\
    \ files…OK\n    …\n    *** DONE ***\n    For Great Justice… (Type \"sh test.sh\"\
    \ to run the UserTracker demo)\n    ```\n\n6.  现在，我们将通过运行测试脚本来确认一切安装正确。输入以下命令并按回车：`sh\
    \ test.sh`\n7.  应该会弹出一个窗口，你应该能看到自己正在移动，如 图 7-2 所示。图中展示的是一个深度图。深度图是一种图像通道，包含与从某个视点（此处为\
    \ Kinect）到场景对象表面距离相关的信息。\n\n安装完成！你已经准备好继续前进，探索 Unity 提供的功能了。在继续之前，请务必关闭 PrimeSense\
    \ User Tracker Viewer，以避免与后续示例发生冲突。\n\n![images](img/0702.jpg)\n\n***图 7-2.**\
    \ Unity 生成的 Kinect 深度图*\n\n## 探索 Unity 界面\n\n启动 Unity。让我们一起来创建一个项目并探索其界面。\n\n\
    ### 项目\n\n以下是创建项目的方法：\n\n1.  从菜单中选择 File ![images](img/U001.jpg) New Project。\n\
    2.  始终导入 Unity 的 Standard Assets 是一个好习惯。在弹出的窗口中，你会看到一长串可以包含到项目中的选项。选择 Standard\
    \ Assets，然后点击 Create Project。\n3.  为所有示例导入 ZigFu Unity 包。首先，从菜单中选择 Assets ![images](img/U001.jpg)\
    \ Import Package ![images](img/U001.jpg) Custom Package。\n4.  导航到你的“文档”文件夹，导入以下文件：`UnityOpenNIBindings-v1.1.unitypackage`\n\
    5.  在随后弹出的窗口中，让 Unity 自动导入项目所需的所有相关库。\n\n现在，Unity 应该打开了几个选项卡。你首先要做的是注意左上角有两个选项卡：Scene\
    \ 和 Game。点击 Game 切换到游戏选项卡。\n"
- fmt: '# The Workspace


    To make working in Unity easier, grab the `Game` tab and drag it to the left.
    It will pop in as its own separate tab area. The gray bar between the two windows
    can be adjusted by dragging. After moving the tab, you should see results similar
    to those in [Figure 7-3](#Chapter07.html#fig_7_3).


    ![images](images/0703.jpg)


    ***Figure 7-3.** The Unity workspace*


    The left tab is now `Game Viewer`. In this tab, you can see everything that is
    in the current scene in 3D space from the perspective of the camera. A camera
    in 3D space works just like a regular camera and should be positioned to frame
    all the appropriate visual elements in the scene.


    The tab on the right of the `Game Viewer` is the `Scene Viewer` tab. This tab
    shows the 3D world of the selected scene. You can think of scenes exactly like
    you''d think of levels. For each level in your game, you''ll create a scene. In
    the upper-right corner of the `Scene Viewer`, there is an exotic creature found
    in many 3D packages known as a `Gizmo`, and yes, that''s the official name. Fear
    not, it will not reproduce if you feed it after midnight or get it wet. It shows
    you the X, Y, Z, and perspective views. It''s easy to remember X, Y, and Z as
    R, G, and B in this color scene. Click and rotate on the X, Y, Z, or center cube
    (perspective view) axis to see the game from these angles.


    ![images](images/square.jpg) **Note** Viewing from different angles doesn''t move
    the camera, only what the user is looking at in the current scene.


    The final tab to the far right is the `Inspector`. If you know Flash, you can
    think of this tab like the Properties Inspector. The `Inspector` allows you to
    set the properties for a selected object''s components. The `Inspector` also allows
    you to attach scripts to game objects to introduce functionality in Unity. This
    is exactly what ZigFu has already done to make their examples work. ZigFu designed
    a basic scene with game objects and then attached scripts to the game objects
    to bind with OpenNI.


    You''ll see two tabs on the bottom of the workspace. The bottom left tab is your
    `Hierarchy Viewer`. Everything in this tab is actually an object in your game.
    The bottom right tab is the `Project` folder for the current project. Everything
    in this folder is hiding in `User` ![images](images/U001.jpg) `New Unity Project
    1` ![images](images/U001.jpg) `Assets`. Anything added to the `Assets` file will
    automatically update in this tab viewer. However, the object will not be in the
    game until it is added to a scene by dragging it into the `Scene` or `Inspector`.


    # Basic Navigation and Transform Tools


    Now let''s run down the buttons surrounding the tabs. The buttons to your top
    left ([Figure 7-4](#Chapter07.html#fig_7_4)) are your basic navigation and transform
    tools with key commands that match most 3D applications.


    ![images](images/0704.jpg)


    ***Figure 7-4.** Basic navigation and transform tools*


    The buttons in [Figure 7-4](#Chapter07.html#fig_7_4) operate as follows, working
    from left to right. The letters in parentheses are the keyboard shortcuts.


    * The `Hand` tool (`Q`) allows you to move around the 3D world.

    * The `Move` tool (`W`) allows you to move around a selected game object in the
    `Scene` tab.

    * The `Rotate` tool (`E`) allows you to rotate around your selected game object
    in the `Scene` tab.

    * The `Scale` tool (`R`) allows you to scale a selected game object in the `Scene`
    tab.


    Another handy key command to know is `F`. Pressing `F` on your keyboard will focus
    the `Scene` tab on any game object selected in the `Hierarchy` tab.


    # Play Controls


    The next buttons to the right are the play controls ([Figure 7-5](#Chapter07.html#fig_7_5)).


    ![images](images/0705.jpg)


    ***Figure 7-5.** Unity''s play controls*


    The `Play` button runs the current scene. If you press the `Play` button while
    the scene is playing, the scene stops. Unity has a specific interface particularity
    to be aware of. If in `Play` mode, these buttons will glow blue. Any changes made
    in the `Inspector` during this time to game object properties will be lost when
    the scene is stopped. There is no way to save changes made during `Play` mode
    unless you add an additional plug-in to Unity. If you hit on a property change
    that you like while in `Play` mode, write that change down and reenter it once
    you are out of `Play` mode.


    ![images](images/square.jpg) **Tip** A three-button mouse is critical for working
    in Unity''s 3D space. All three buttons are used to smoothly move around the scene
    in 3D space. Holding down `Option` and left-clicking allows you to pan the perspective.
    The middle mouse scroll zooms in and out of a scene. Pressing the scroll middle
    button down will toggle into the `Hand` tool. Right-clicking rotates perspective.
    `Option`+right-clicking provides an additional `Zoom` tool.


    ## Understanding ZigFu''s Relation to Unity


    ZigFu is a set of C# scripts that bind with `OpenNI` and PrimeSense''s `NITE`
    to allow Unity to access `NITE`''s functionality. `OpenNI` is an open source standard
    for creating compatibility across the newly emerging field of natural interaction
    devices, applications, and middleware. `OpenNI` is an abstraction layer that integrates
    middleware with hardware and applications.


    ### OpenNI and NITE


    `OpenNI` has been geared mainly toward 3D sensors, but nothing in `OpenNI` is
    specific to PrimeSense''s `NITE` or the Kinect. `OpenNI` is an interface that
    allows developers of middleware such as `NITE` get a depth stream, skeleton data,
    audio, infrared (`IR`), hand points, an RGB image, and gesture detection. `OpenNI`
    doesn''t specifically care how these points were generated or from where.


    `OpenNI` relies upon modules to retrieve device data and pass that data into `OpenNI`
    and any middleware. Anyone can write a module for any camera or sensor and register
    it with `OpenNI`. `NITE` is middleware that gives digital devices the power to
    translate and respond to user interaction without wearable equipment or controls.


    ![images](images/square.jpg) **Note** The important point to understand about
    `OpenNI` is that it is not specific to hardware or middleware. `OpenNI` can be
    used with any `OpenNI`-compliant hardware. For example, you can use `OpenNI` with
    the PrimeSense reference design, the Microsoft Kinect, the Asus Xtion, and with
    any `OpenNI`-compliant middleware such as `NITE`, and soon Beckon.


    `NITE`, then, is the intermediary standing between `OpenNI` and your application,
    in this case Unity. In the case of the Kinect, PrimeSense made not only the middleware
    but also the motion sensor chip inside the Kinect. This really changes nothing
    practically, but it''s a fun fact to know and part of what makes `NITE` so robust.


    ### Unity and ZigFu


    Unity allows users to create scripts and attach those scripts to game objects
    as components. Components are how game functionality is added to any game, and
    they drive the game objects. ZigFu has created scripts for Unity to bind, or talk
    with, `OpenNI`.


    ZigFu has created sample scripts to familiarize users with `OpenNI`''s functionality.
    Before ZigFu, developers in Unity wrote their own bindings. There''s still nothing
    stopping developers from doing this now should they be so inclined and skilled.
    With the way Unity works, you can very easily attach the ZigFu scripts onto one
    object and any custom scripts that you might create onto that same object or any
    other object.


    Unity is surprisingly tolerant of this kind of development. In fact, Unity supports
    not one but *three* scripting languages: JavaScript, C#, and Boo. Developers can
    use all three simultaneously, and there''s no need to choose one language over
    the other. One of your game object''s components can be in C# and the other in
    Boo.'
