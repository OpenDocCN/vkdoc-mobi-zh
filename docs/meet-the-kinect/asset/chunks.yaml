- fmt: '# Getting Started


    In this chapter you’ll unbox a new Kinect—or if you have one already, you’ll disconnect
    it from your Xbox. Then you’ll install some software, plug the Kinect into a computer,
    and take a look at what all of the fuss is about with this unique device. You’ll
    learn what the different components of the Kinect are and be able to play with
    some simple controls to get a feel for how all the parts work together to make
    the magic happen.


    The Kinect is marketed, packaged, and designed for use with Microsoft’s Xbox gaming
    console. The Xbox is a remarkable living room entertainment system, and if you
    haven’t tried Dance Central or Kinect Sports, I recommend that you do—playing
    those two games at the 24-hour Best Buy in Union Square here in NYC is what got
    me so excited about the Kinect in the first place. I dragged as many friends as
    I could down to the store so they could see this amazing technology in action.


    That said, this book is the unofficial manual for how to take a Kinect and use
    it outside the living room—no Xbox required. Now, let’s make sure you have everything
    you need to unplug your Kinect from the game system—or purchase one by itself,
    plug it into your computer, and get tinkering.


    ## Buying the Correct Kinect


    When I wanted to get my own Kinect, I spent a lot of time trying to figure out
    the right product to buy out of all of the Xbox Kinect–branded merchandise. I
    really wanted to play the Xbox games *and* have a Kinect that could work on my
    computer. Unfortunately, the Xbox Kinect system bundle isn’t packaged with this
    goal in mind.


    I ended up deciding to purchase the standalone Kinect sensor (Figure 1-1) and
    saved some money by getting a used Xbox system on which to play the games. The
    standalone Kinect sensor package includes an adapter cable that lets your Kinect
    draw power directly from a wall outlet instead of from the Xbox console.


    ![images](images/0101.jpg)


    ***Figure 1-1.** Kinect Sensor with Kinect Adventures!—The only Xbox Kinect product
    that comes with all the parts ready to hook up to your computer.*


    Another option is to buy the Kinect bundle that includes an Xbox console and the
    Kinect sensor. You see that bundle as the second item in Figure 1-2. The danger
    is that people often purchase the Kinect bundle thinking that it will immediately
    work for them…until they bring it home and find that they are missing a cable
    and now have to buy one online and wait for it to arrive.


    What the Kinect bundle lacks is the power adapter that you need in order to use
    your Kinect with a personal computer via USB. While I fully endorse getting the
    full Xbox Kinect system bundle, you’ll need to purchase this additional accessory,
    a US $30 power adapter, to be able to connect the Kinect to your computer via
    normal USB. Figure 1-2 shows that power adapter, which is the third item listed
    in the figure.


    ![images](images/0102.jpg)


    ***Figure 1-2.** Online product listings on Amazon.com for Kinect-related products—The
    first listing is the Kinect you should probably get; otherwise, you will also
    need to purchase the third listing.*


    You might choose to go both routes at the same time: buy the standalone sensor
    for your computer and buy the bundle for playing games. That’s an expensive path,
    but it lets you keep a Kinect plugged into your computer for tinkering and always
    have another Kinect to use with your Xbox without having to move cords and cameras
    around. Newer drivers and software are becoming available to support the use of
    multiple Kinects simultaneously, so you might find value in having more than one
    at your disposal.


    ## Separating a Kinect from an Xbox


    So, you already have an Xbox? Awesome. Okay, now you need to borrow the Kinect
    from your Xbox and bring it over to a computer. You’ll probably want to ask permission
    from whomever’s Kinect you are using before you proceed. I’m sure they’ll miss
    it! Tell them you’ll give it back after you show them all the cool stuff you can
    do with a Kinect on a computer once you get through Chapter 3. They’ll thank you!


    Disconnecting the Kinect from a late model Xbox is very straightforward. Simply
    locate the Kinect, follow the cord to the back of your Xbox, and pull it out.
    Done. Now, you’ll just need the Kinect AC adapter and you’ll be ready to move
    on to downloading and installing software.


    If you’ve got a Kinect successfully hooked up to an early model Xbox, that’s great
    news—it means you’ve got all the parts necessary to take the sensor and plug it
    into your computer. To disconnect your Kinect from an older model Xbox, you’ll
    be removing two components—the Kinect sensor itself, and the attached cable that
    leads to the Xbox and AC wall outlet (Figure 1-3). Once you’ve disconnected those
    two things, you are all set.


    ![images](images/0103.jpg)


    ***Figure 1-3.** Unplugging the Kinect and AC adapter from an early model Xbox
    game console (Photo courtesy Microsoft)*


    ## Making Sure You Have the AC Adapter


    If you have a new model Xbox with a Kinect, it’s possible that they were purchased
    as a bundle. If that’s the case, then you probably don’t yet own the adapter cable
    necessary to make the Kinect work on a computer. Unfortunately, now you’ll have
    to purchase the AC adapter cable before you can continue. The third item in Figure
    1-2 shows the product information for the adapter as it should appear on Amazon.com.
    Figure 1-4 shows a better image of the cable itself.


    ![images](images/0104.jpg)


    ***Figure 1-4.** Kinect USB extender on the left for newer Xbox systems, and the
    Kinect power adapter on the right.*


    The power adapter cable is required for two reasons. First, the Kinect requires
    more power than a standard USB port can deliver, probably because of all of the
    components it has inside, such as a motor, a number of sensors, and a fan to push
    air through the device for cooling. The special USB port on the late model Xbox
    can deliver this extra power, but because your computer can’t, you have to compensate
    for that by plugging the Kinect into an electrical outlet with the AC adapter
    provided on the cable. This need for an adapter cable is frustrating if you want
    to go mobile with the Kinect and a laptop—you’ll need a 12-volt battery and some
    careful modification to get past that problem.


    The second reason you need the adapter cable is that the cord on the Kinect uses
    a proprietary, Xbox-only USB connector. This is frustrating, I know. The AC adapter
    cable has a port that accepts this special USB shape on one end and turns it into
    a standard USB connector on the other. The older Xbox systems have a standard
    USB port, which is why they also require an adapter cable to be compatible with
    the Kinect. When Microsoft launches a version of Windows with Kinect support built-in,
    they may introduce a lower-power version of the Kinect for use with computers
    that doesn’t require this pesky AC adapter attachment.'
