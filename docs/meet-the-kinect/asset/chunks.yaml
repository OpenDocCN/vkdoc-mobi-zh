    \ that you and your fellow player are both visible in the camera view. You both\
    \ need to stand in the calibration pose to calibrate OpenNI. This pose is exactly\
    \ like the stick 'em up pose in a bank robbery. Both hands up now, please!\n\n\
    Make sure your elbows are parallel to your shoulders and your hands are at the\
    \ same height. After the Kinect catches you and your partner as the players, you\
    \ will see the 3D model jump into your body positions.\n\n![images](images/square.jpg)\
    \ **Note** OpenNI is removing the calibration pose by the end of 2011\\. If you\
    \ are reading this chapter after then, you might not need to do a calibration\
    \ pose. Dance around and see if you are tracked. If you are, then good. If not,\
    \ then try the calibration pose.\n\nLet's now look a little bit deeper into this\
    \ scene from [Figure 7-6](#Chapter07.html#fig_7_6) and how to navigate around\
    \ it. Do the following:\n\n1.  Click Soldier in the Hierarchy tab.\n2.  Direct\
    \ your attention to the right Inspector tab.\n3.  Turn down the arrow next to\
    \ OpenNI Skeleton (script).\n\nNow visible is a list of all the joints you can\
    \ get access to with OpenNI and what game objects the joints are attached to in\
    \ Unity. Note how all the corresponding joints are mapped onto the game objects.\
    \ The script joints coming from OpenNI are on the left, and the game objects in\
    \ the scene are listed on the right. They have simply been named to match the\
    \ names of the joint they correspond to. Single-click any game object joint on\
    \ the right of the list, and you will see it jump to its associated object listed\
    \ in the Hierarchy tab. Double-clicking will open that object up in the Inspector.\
    \ To go back to the Soldier, simply single-click it in the Hierarchy again.\n\n\
    In the Hierarchy tab, you will see all objects in the game. In this example, there\
    \ is a Directional Light, which is lighting the scene. Next down in the list is\
    \ the Floor. Click it to see the components attached to this game object. The\
    \ Transform component is on every game object. Next, you will see the Box Collider,\
    \ Mesh Renderer with the shaders for the Soldier, and the floor and their respective\
    \ Normalmap. A Mesh Renderer takes the geometry from the Mesh Filter and renders\
    \ it at the location defined by an object's Transform component in the Inspector.\
    \ A normal map, or normal mapping, is a way to make an object look like it has\
    \ a higher polygonal count than it actually does by faking lighting and dents\
    \ via a 2D file that's applied to the mesh of an object. Creating normals, meshes,\
    \ and textures is beyond the scope of this tutorial, but is part of every 3D workflow.\
    \ See the manual for your 3D package to learn more.\n\nThe next object in the\
    \ Hierarchy tab is the Main Camera. Open this object and note that there is a\
    \ ZigFu script applied to it called ExitOnEscape that allows you to exit a game\
    \ when you press Escape. You can add this script to any scene where you want this\
    \ behavior. The script is specific just to this ZigFu example and not part of\
    \ OpenNI.\n\n![images](images/square.jpg) **Note** To add a script component to\
    \ a game object, select the game object in the Hierarchy tab to open up the object's\
    \ list of components in the Inspector. This is a very straightforward process,\
    \ but it feels strange the first time you do it. All you are doing is attaching\
    \ a new component, a script component, to your game object via dragging it into\
    \ the Inspector Window with that game object's components revealed. You expose\
    \ an object's components whenever you select it in the Hierarchy tab. If you need\
    \ help, there are several tutorial videos on YouTube. In addition, visit the Unity\
    \ forums at [`www.unity3d.com`](http://www.unity3d.com). The Unity community provides\
    \ good support; the user forums are full of programmers who are kind enough to\
    \ help newbies out. If you ever get stuck in a jam, the forums should be the first\
    \ place you turn to for help.\n\nFollowing are some of the scripts that you can\
    \ add to a game object:\n\n> **ChangeColor** is for changing the color of the\
    \ boxes in the ItemSelector scene.\n> \n> **Exitonescape** exits the game when\
    \ Escape is pressed.\n> \n> **ObjectPeruser** simply instantiates a Prefab for\
    \ every detected user and is used in the TopDownUserMap scene.\n> \n> **StartSessesionMessage**\
    \ displays the “perform focus gesture to start session” when you are not in a\
    \ session.\n\nThe next object is the sensor object. Select this object and notice\
    \ that in the Inspector tab several OpenNI scripts are attached. The sensor object\
    \ itself is an empty game object. Unity allows you to create empty game objects.\
    \ This empty object was created to attach scripts to it that run in the scene.\
    \ These scripts are all related to OpenNI functionality, and are as follows:\n\
    \n> **Open NIUser Tracker:** Allows for Unity to track users up to the maximum\
    \ number of users OpenNI registers. There is no default maximum number.\n> \n\
    > **Open NIDepthMapViewer:** Simply displays the Kinect depth map in your game\
    \ when it is running. Remember it will not be visible until the game is running.\n\
    > \n> **OpenNIUsers Radar:** Pops a dark gray user tracker box up on-screen in\
    \ the game with a number attached to each specific user the game registers. If\
    \ you want to use this script in a newly created scene, you must link this script\
    \ to the Open NIUser Tracker in the Inspector.\n> \n> **Open NISplit Screen Skeleton\
    \ Control:** Allows users to have two players on-screen at once. This might be\
    \ helpful for a first-person shooter with a split screen.\n\nThe final object\
    \ in the Hierarchy is the Soldier. Soldier is a Prefab; that's why it is blue.\
    \ A Prefab is a collection of game objects and components that can be used again\
    \ and again in a game. They are saved in the Project tab view. Prefabs are basic\
    \ functionality in Unity.\n\nSoldier is actually a ZigFu-created Prefab you can\
    \ add to any scene. Look in the Project tab and open the OpenNI folder and then\
    \ the Prefabs. The Prefab Soldier is located within. To add a Prefab to a scene,\
    \ simply drag the Prefab from the Project folder in th**e** Scene Viewer."
  trans: "\n### 运行 ZigFu 游戏示例\n\n前往你的 `Project` 文件夹，打开名为 `_Scenes` 的文件夹。这些是 ZigFu\
    \ 创建的场景，是演示 OpenNI 功能的示例。其中一些示例需要两个人才能实际使用，所以请准备好找一位朋友，以便在运行多人示例时提供帮助。\n\nZigFu\
    \ 将示例分为两类：游戏和界面。在本节中，我们将首先介绍游戏示例，然后再介绍界面示例。\n\n#### Avatar2Players\n\n双击 `Avatar2Players`（需要两人）。你应该会看到两个士兵并排站在地板上，如图\
    \ 7-6 所示。如果你在 `Scene` 选项卡中看不到它们，请调整视图直到看到它们为止。你可以在 `Hierarchy` 选项卡中选择一个士兵，然后按下键盘上的\
    \ `F` 键。场景视图将聚焦于所选对象。\n\n![images](img/0706.jpg)\n\n***图 7-6.** Avatar2Players\
    \ 游戏*\n\nOpenNI 尚未追踪到玩家。这是因为你需要播放每个场景才能开始追踪。现在按下黑色的 `Play` 按钮。\n\n此时，你将在 `Game`\
    \ 选项卡底部看到一个小小的黄色视口。请确保你和你的同伴在摄像机视图中都可见。你们都需要摆出校准姿势来校准 OpenNI。这个姿势与银行劫案中的“举起手来”姿势完全相同。现在，请举起双手！\n\
    \n确保你的肘部与肩部平行，双手处于同一高度。当 Kinect 捕捉到你和你同伴作为玩家后，你会看到 3D 模型跳转到你们的身体位置。\n\n![images](img/square.jpg)\
    \ **注意** OpenNI 将于 2011 年底移除校准姿势。如果你在此之后阅读本章，可能无需进行校准姿势。试着舞动身体，看看是否被追踪到。如果是，那很好。如果不行，再尝试校准姿势。\n\
    \n现在，让我们更深入地了解一下图 7-6 中的这个场景以及如何导航。请执行以下操作：\n\n1.  点击 `Hierarchy` 选项卡中的 `Soldier`。\n\
    2.  将注意力转向右侧的 `Inspector` 选项卡。\n3.  展开 `OpenNI Skeleton (script)` 旁边的箭头。\n\n现在可以看到一个列表，列出了你可以通过\
    \ OpenNI 访问的所有关节点，以及这些关节点在 Unity 中连接的游戏对象。请注意所有对应的关节点是如何映射到游戏对象上的。来自 OpenNI 的脚本关节点在左侧，场景中的游戏对象列在右侧。它们的命名简单地对应了所连接的关节点名称。单击列表中右侧的任意游戏对象关节点，你将看到它跳转到\
    \ `Hierarchy` 选项卡中列出的关联对象。双击将在 `Inspector` 中打开该对象。要返回到 `Soldier`，只需再次在 `Hierarchy`\
    \ 中单击它即可。\n\n在 `Hierarchy` 选项卡中，你将看到游戏中的所有对象。在这个示例中，有一个 `Directional Light`（方向光），它为场景提供照明。列表中下一个是\
    \ `Floor`（地板）。点击它查看附加到该游戏对象的组件。`Transform`（变换）组件存在于每个游戏对象上。接下来，你将看到 `Box Collider`（盒子碰撞器）、包含\
    \ `Soldier` 着色器的 `Mesh Renderer`（网格渲染器），以及地板及其各自的 `Normalmap`（法线贴图）。`Mesh Renderer`\
    \ 从 `Mesh Filter`（网格过滤器）获取几何体，并将其渲染在 `Inspector` 中由对象的 `Transform` 组件定义的位置。法线贴图（或称法线映射）是一种通过应用在对象网格上的\
    \ 2D 文件来模拟光照和凹陷，从而使对象看起来具有比实际更高多边形数量的方法。创建法线、网格和纹理超出了本教程的范围，但它是每个 3D 工作流程的一部分。请参阅你的\
    \ 3D 软件手册以了解更多信息。\n\n`Hierarchy` 选项卡中的下一个对象是 `Main Camera`（主摄像机）。打开此对象并注意，上面应用了一个名为\
    \ `ExitOnEscape` 的 ZigFu 脚本，它允许你在按下 `Escape` 键时退出游戏。你可以将此脚本添加到任何需要此行为的场景中。该脚本特定于这个\
    \ ZigFu 示例，并非 OpenNI 的一部分。\n\n![images](img/square.jpg) **注意** 要向游戏对象添加脚本组件，请在\
    \ `Hierarchy` 选项卡中选择该游戏对象，以在 `Inspector` 中打开该对象的组件列表。这是一个非常直接的过程，但第一次操作时可能会觉得陌生。你所做的只是通过将一个新组件（脚本组件）拖拽到显示着该游戏对象组件的\
    \ `Inspector Window` 中来附加它。每当你在 `Hierarchy` 选项卡中选择一个对象时，都会显示其组件。如果需要帮助，YouTube\
    \ 上有几个教程视频。此外，请访问 Unity 论坛，网址为 [`www.unity3d.com`](http://www.unity3d.com)。Unity\
    \ 社区提供了良好的支持；用户论坛上有很多乐于助人的程序员愿意帮助新手。如果你遇到难题，论坛应该是你求助的首选之地。\n\n以下是一些你可以添加到游戏对象上的脚本：\n\
    \n> **ChangeColor** 用于更改 `ItemSelector` 场景中方块的颜色。\n> \n> **Exitonescape** 在按下\
    \ `Escape` 键时退出游戏。\n> \n> **ObjectPeruser** 为每个检测到的用户实例化一个 `Prefab`（预制件），并在 `TopDownUserMap`\
    \ 场景中使用。\n> \n> **StartSessesionMessage** 在未进入会话时显示“执行焦点手势以开始会话”。\n\n下一个对象是传感器对象。选择此对象并注意，在\
    \ `Inspector` 选项卡中附加了几个 OpenNI 脚本。传感器对象本身是一个空的游戏对象。Unity 允许你创建空的游戏对象。创建这个空对象是为了附加在场景中运行的脚本。这些脚本都与\
    \ OpenNI 功能相关，如下所示：\n\n> **Open NIUser Tracker:** 允许 Unity 追踪用户，最多可达 OpenNI 注册的最大用户数。没有默认的最大数量。\n\
    > \n> **Open NIDepthMapViewer:** 在游戏运行时简单地显示 Kinect 深度图。请记住，在游戏运行之前它是不可见的。\n>\
    \ \n> **OpenNIUsers Radar:** 在游戏屏幕上弹出一个深灰色的用户追踪框，并为游戏注册的每个特定用户附加一个编号。如果你想在新创建的场景中使用此脚本，你必须在\
    \ `Inspector` 中将其链接到 `Open NIUser Tracker`。\n> \n> **Open NISplit Screen Skeleton\
    \ Control:** 允许屏幕上一次显示两个玩家。这对于分屏的第一人称射击游戏可能很有帮助。\n\n`Hierarchy` 中的最后一个对象是 `Soldier`。`Soldier`\
    \ 是一个 `Prefab`（预制件）；这就是它显示为蓝色的原因。`Prefab` 是一个可以在游戏中反复使用的游戏对象和组件的集合。它们保存在 `Project`\
    \ 选项卡视图中。`Prefabs` 是 Unity 中的基本功能。\n\n`Soldier` 实际上是一个 ZigFu 创建的 `Prefab`，你可以将其添加到任何场景中。查看\
    \ `Project` 选项卡，打开 `OpenNI` 文件夹，然后打开 `Prefabs`。`Prefab` `Soldier` 就在其中。要将 `Prefab`\
    \ 添加到场景，只需将 `Prefab` 从 `Project` 文件夹拖拽到 `Scene Viewer` 中即可。\n"
- fmt: '### `AvatarFrontFacing`


    `AvatarFrontFacing` is almost exactly like `Avatar2Players`, but it has just one
    `Skeleton`, and it implements some additional functionality. Double-click `AvatarFrontFacing`
    and play the scene. Do the Calibration pose and watch yourself dance around as
    a soldier.


    Select your `Sensor` Game Object in the Hierarchy tab. Notice the last script
    component added, `OpenNIContext`. The `OpenNIContext` script allows `.oni` files
    to be loaded instead of using the live sensor. (`.oni` files are files that contain
    prerecorded skeleton data.) To record `.oni` files, use `NIViewer`, which comes
    with `OpenNI`. (There''s more documentation on recording `.oni` files in the OpenNI
    manual.) Any `.oni` file you recorded can easily be linked in Unity using the
    `OpenNIContext` component. This is an easy way to do very cheap and effective
    motion capture without a motion capture suite.


    ### `TopDownUserMap`


    `TopDownUserMap` shows a top-down game map in which the Kinect drives the location
    of the player on the floor. The `UsersContainer` Object in the Hierarchy tab has
    the `Object Per Use` and the `OpenNIUser Tracker` scripts attached to it.


    ### `Blockman3rdPerson`


    `Blockman3rdPerson` adds a few new bits of functionality. Run it and watch what
    happens. The skeleton is made from Unity game objects, and the camera follows
    the `Blockman` in space.


    Let''s look at the Hierarchy tab to see what is in this example. First, there''s
    a `Blockman Container`. Open it to find the `Blockman Prefab`. This is another
    ZigFu Prefab you can use in any of your projects. Click the `Blockman` to open
    it in the Inspector. Note something new: after the list of joints, notice there
    are three check boxes again. This time, unlike with the `Soldiers Prefab`, `Update
    Joint Positions` is checked. Uncheck that option and run the example again. See
    the difference? The game objects no longer change rotation as you move. In fact,
    the whole skeleton is now wrong. Recheck the option to put things right again
    and move forward.


    Next, look at the Camera settings. Select the Camera in the Hierarchy tab, and
    in the Inspector, notice the new script `Smooth Follow`. `Smooth Follow` is a
    default Unity script that can be found in the Standard Assets folder we imported
    in the beginning of our project. In the Project tab, open the Standard Assets
    folder and then the Scripts subfolder. `Smooth Follow` is here, and it can be
    dropped onto any camera and told what game object to follow. Here the script causes
    the camera to follow the `Blockman''s Head`.


    `Sensor` sits at the bottom of our Hierarchy tab again and looks very similar
    to previous examples. It''s an empty game object with the OpenNI scripts attached.
    Here we are using the `Open NISingle Skeleton Controller` just as we were in the
    `AvatarFrontFacing` example.


    ## Running the Interface Examples


    Moving forward, we are now going to look at the next examples used to create user
    experiences. Open and play `FollowHandPoint` in the `_Scenes` folder in our Project
    Tab. Try it out. Sparkly right? You''ll see Unity''s default Ellipsoid Particle
    Emitter component playing in the background while the OpenNI script tracks a sphere.


    All that''s happening here is that the `Follow Hand Point (script)` is attached
    to the `Hand Follower` Object in the Hierarchy. The script exists inside the Project
    tab in the Scripts subfolder `HandpointControls`. Open and note it. We will use
    it later to build an example from scratch.


    Inside `Hand Follower` in the Hierarchy tab is the parent game object holding
    two other game objects we haven''t covered yet, particle systems. A particle system
    is a system of fuzzy particles. They are frequently used to generate stars, fire,
    and other natural phenomena. These systems can be used and abused in interesting
    ways. Although particle systems are outside the scope of this chapter, they are
    worth a future look. Create them just like any other game object, by choosing
    the following menu option:


    > **Main Menu ![images](images/U001.jpg) Game Object ![images](images/U001.jpg)
    Create Other ![images](images/U001.jpg) Particle System**


    ![images](images/square.jpg) **Note** The following scenes are more complex and
    perhaps not ideal for beginners; however, anyone can run them and play them. In
    addition, beginners are welcome to modify examples to their own ends until they
    have a better understanding of Unity. These scenes are here for more advanced
    users interested in creating interfaces.


    ### `Item Selector`


    The subsequent example in the `_Scenes` folder is `Item Selector`. Open and play
    this scene now. This example features new functionality for interface design.
    In the Hierarchy tab, there are six objects: one camera, four planes, and an empty
    game object called `Static Menu`. All of the OpenNI scripts are attached here.
    Select `Static Menu` and notice the scripts in the Inspector.


    #### Item Selector Scripts


    The `Static Menu` game object has all of the scripts for this scene attached to
    it. Select `Static Menu` to expose its components in the Hierarchy tab. Expand
    the `Items` arrow of the `Static Menu` script. This script can take as many game
    objects as needed. Simply drag game objects onto the elements you want the game
    objects attached to. `Element 0` has `Plane 1` and so forth.


    ![images](images/square.jpg) **Note** The `Static Menu` script is a complex composite
    hand point control that reacts to the lower-level events from the building blocks
    ZigFu provides. To open a script and look at what is made of, right-click while
    over it in the Inspector and choose `Edit Script` or click the gear icon in the
    far right corner of the script name.


    The check box `Select on Push` is our first gesture. Push simply is a quick push
    forward with your hand in space. There''s not much to it really. Try performing
    it a few times while the scene is playing to get the feel for it. When you perform
    it successfully over one of the planes, the box will turn from green (highlighted)
    to blue (selected).


    The next script component attached to this game object is `Push Detector`. `Push
    Detector` is another one of ZigFu''s custom scripts that is not part of `OpenNI`.
    For those out there with more programming experience, you can write your own detector
    using the ZigFu primitives such as:


    ```

    Hand_Create(Vector3 position)

    Hand_Update(Vector3 position)

    Hand_Destroy()

    PushDetector_Push()

    PushDetector_Release()

    PushDetector_Click()

    ItemSelector_Select(int index)

    ItemSelector_Next()

    ItemSelector_Prev()

    ```


    `Fader`, another custom ZigFu script, maps a physical region in space to a normalized
    0-1 range. The `Item Selector` can then take the 0-1 range and split it into logical
    regions with hysteresis between them, including special scroll regions.


    When the `Item Selector` scene is running, there are two faders because the `Push
    Detector` implicitly adds one in runtime. The `Push Detector` fader is on the
    Z axis, and the other fader is the X axis. The size represents physical size (in
    millimeters), so `300` is 30 cm, or about 1 ft.


    #### Item Selector Parameters


    Some of the `Item Selector` parameters are as follows:


    > **Number of items:** How many logical items the script detects.

    >

    > **Hysteresis:** A value between 0 and 1. It defines overlap between logical
    items, prevents the selected index from “bouncing” between two logical areas.
    Different applications need different settings, and they can be tweaked in development.

    >

    > **Scroll Region:** How much of the range is dedicated to a scroll region. For
    example, `0.2` would be 20% from each side dedicated to scrolling (sending the
    `Next` and `Prev` messages).'
