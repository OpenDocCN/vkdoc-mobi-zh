    \ of this chapter, they are worth a future look. Create them just like any other\
    \ game object, by choosing the following menu option:\n\n> **Main Menu ![images](images/U001.jpg)\
    \ Game Object ![images](images/U001.jpg) Create Other ![images](images/U001.jpg)\
    \ Particle System**\n\n![images](images/square.jpg) **Note** The following scenes\
    \ are more complex and perhaps not ideal for beginners; however, anyone can run\
    \ them and play them. In addition, beginners are welcome to modify examples to\
    \ their own ends until they have a better understanding of Unity. These scenes\
    \ are here for more advanced users interested in creating interfaces.\n\n####\
    \ Item Selector\n\nThe subsequent example in the _Scenes folder is Item Selector.\
    \ Open and play this scene now. This example features new functionality for interface\
    \ design. In the Hierarchy tab, there are six objects: one camera, four planes,\
    \ and an empty game object called Static Menu. All of the OpenNI scripts are attached\
    \ here. Select Static Menu and notice the scripts in the Inspector.\n\n##### Item\
    \ Selector Scripts\n\nThe Static Menu game object has all of the scripts for this\
    \ scene attached to it. Select Static Menu to expose its components in the Hierarchy\
    \ tab. Expand the Items arrow of the Static Menu script. This script can take\
    \ as many game objects as needed. Simply drag game objects onto the elements you\
    \ want the game objects attached to. Element 0 has Plane 1 and so forth.\n\n![images](images/square.jpg)\
    \ **Note** The Static Menu script is a complex composite hand point control that\
    \ reacts to the lower-level events from the building blocks ZigFu provides. To\
    \ open a script and look at what is made of, right-click while over it in the\
    \ Inspector and choose Edit Script or click the gear icon in the far right corner\
    \ of the script name.\n\nThe check box Select on Push is our first gesture. Push\
    \ simply is a quick push forward with your hand in space. There's not much to\
    \ it really. Try performing it a few times while the scene is playing to get the\
    \ feel for it. When you perform it successfully over one of the planes, the box\
    \ will turn from green (highlighted) to blue (selected).\n\nThe next script component\
    \ attached to this game object is Push Detector. Push Detector is another one\
    \ of ZigFu's custom scripts that is not part of OpenNI. For those out there with\
    \ more programming experience, you can write your own detector using the ZigFu\
    \ primitives such as:\n\n`Hand_Create(Vector3 position)`\n`Hand_Update(Vector3\
    \ position)`\n`Hand_Destroy()`\n`PushDetector_Push()`\n`PushDetector_Release()`\n\
    `PushDetector_Click()`\n`ItemSelector_Select(int index)`\n`ItemSelector_Next()`\n\
    `ItemSelector_Prev()`\n\nFader, another custom ZigFu script, maps a physical region\
    \ in space to a normalized 0-1 range. The Item Selector can then take the 0-1\
    \ range and split it into logical regions with hysteresis between them, including\
    \ special scroll regions.\n\nWhen the Item Selector scene is running, there are\
    \ two faders because the Push Detector implicitly adds one in runtime. The Push\
    \ Detector fader is on the Z axis, and the other fader is the X axis. The size\
    \ represents physical size (in millimeters), so 300 is 30 cm, or about 1 ft.\n\
    \n##### Item Selector Parameters\n\nSome of the Item Selector parameters are as\
    \ follows:\n\n> **Number of items:** How many logical items the script detects.\n\
    > \n> **Hysteresis:** A value between 0 and 1\\. It defines overlap between logical\
    \ items, prevents the selected index from “bouncing” between two logical areas.\
    \ Different applications need different settings, and they can be tweaked in development.\n\
    > \n> **Scroll Region:** How much of the range is dedicated to a scroll region.\
    \ For example, 0.2 would be 20% from each side dedicated to scrolling (sending\
    \ the Next and Prev messages)."
