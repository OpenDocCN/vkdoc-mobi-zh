    Here''s how we''re going to make this work: We''ll use events from the Kinect
    runtime to trigger a function whenever there''s a new frame of image data from
    the RGB camera and another function whenever there''s a new frame of depth data.
    These functions will update the content of the appropriate image object in the
    main window, and we''ll have an application that collects and renders the major
    data streams from the Kinect, just like that.


    So, below our initialization of the Kinect runtime inside the `Window_Loaded`
    function, type in some code to listen for the new frame or `FrameReady` events
    and tie them to appropriate callback functions, which we''ll define later:


    `kinect.VideoFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_VideoFrameReady);`

    `kinect.DepthFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_DepthFrameReady);`


    Next, we have to open these data streams from the Kinect device to start generating
    images. Simply add:


    `kinect.VideoStream.Open(ImageStreamType.Video, 2, ImageResolution.Resolution640x480,`

    `ImageType.Color);`

    `kinect.DepthStream.Open(ImageStreamType.Depth, 2, ImageResolution.Resolution320x240,`

    `ImageType.Depth);`


    This code is fairly self-explanatory: we''re using built-in settings and types
    to configure and start each data stream. The second argument in the Stream.Open()
    function (i.e., the “2”) is the only obscure one: it refers to the PoolSize, or
    the number of buffers to use for playback of the stream data. It must be a number
    from 1 to 4\. We chose 2: one buffer to display the current frame and one buffer
    to load the new frame. Adding more buffers introduces latency but can give smoother
    playback of the data.


    Finally, to get this application working, we need to define the functions we tied
    to the FrameReady events, the kinect_VideoFrameReady and kinect_DepthFrameReady
    functions. Again, these functions simply need to update our image objects with
    the image data from the color and depth streams from the Kinect. Using the ToBitmapSource()
    function available to us from Coding4Fun, this is quite easy:


    `void kinect_VideoFrameReady(object sender, ImageFrameReadyEventArgs e)`

    `{`

    `        image1.Source = e.ImageFrame.ToBitmapSource();`

    `}`


    `void kinect_DepthFrameReady(object sender, ImageFrameReadyEventArgs e)`

    `{`

    `        image2.Source = e.ImageFrame.ToBitmapSource();`

    `}`


    The names “image1” and “image2,” you''ll recall, are the defaults given to the
    image objects we dragged into our main window from the Toolbox. If you changed
    these names in the XAML file, you need to change them here in the code, too. With
    that done, we''re ready to build and run this project. You should get an output
    window like that in [Figure 8-13](#Chapter08.html#fig_8_13).


    ![images](images/0813.jpg)


    ***Figure 8-13.** Color and depth images*


    That was easy! But it gives us nothing that we can''t get with libfreenect. Where''s
    the magic? Good question. Let''s see if we can add some of Microsoft''s special
    sauce!


    First, we can try getting a depth image that identifies people in the scene in
    front of the Kinect, a task commonly called *user segmentation* but might be called
    *player segmentation* in the context of the Microsoft APIs. With the Kinect SDK,
    we can add player segmentation just by changing our runtime configuration and
    depth image type from Depth to DepthAndPlayerIndex throughout the code. That means
    changing the initialization to:


