    as “OpenKinect,” anyone could develop their own apps using the Kinect sensor,
    free of charge. These drivers access raw data from various Kinect sensors, but
    don’t provide a higher-level framework for making sense of the data in a natural
    interface–based development environment. That didn’t stop curious and creative
    programmers from producing remarkable applications, also known as “hacks,” that
    explored the possibilities of Kinect technology beyond gaming ([Figure 2-1](#Chapter02.html#fig_2_1),
    right).


    ![images](images/0201.jpg)


    ***Figure 2-1.** Original Microsoft Xbox Kinect stack vs. OpenKinect/libfreenect
    stack*


    Once unofficial Kinect apps began to gather media attention and online buzz, the
    companies that were previously designing software to enable the development of
    natural interface–based applications took notice. PrimeSense, the company that
    developed the enabling technology behind the structured light depth sensor inside
