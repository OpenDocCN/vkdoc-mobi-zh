  trans: '

    # 开始上手


    在本章中，你将拆开一台全新的 Kinect——如果已经有一台，则需要将其与 Xbox 断开连接。接着，你将安装一些软件，将 Kinect 连接到计算机，并一窥这款独特设备究竟有何神奇之处。你将了解
    Kinect 各个组件的功能，并通过一些简单的控制操作，感受所有部件如何协同工作，共同缔造奇迹。


    Kinect 的营销、包装和设计均面向微软 Xbox 游戏主机。Xbox 是一款出色的客厅娱乐系统，如果你还没玩过《舞蹈中心》或《Kinect 运动大会》，我强烈推荐你尝试——正是当初在纽约联合广场的
    24 小时百思买门店体验了这两款游戏，才让我第一次对 Kinect 如此着迷。我拉上尽可能多的朋友前往门店，让他们亲眼见识这项令人惊叹的技术。


    话说回来，本书是一本非官方手册，教你如何将 Kinect 带出客厅使用——无需 Xbox。现在，让我们确保你拥有所需的一切：要么将 Kinect 从游戏主机上拔下，要么单独购买一台，将其连接到计算机，然后开始动手折腾。


    ## 购买正确的 Kinect


    当初我想购买自己的 Kinect 时，费了很大功夫才从所有 Xbox Kinect 品牌产品中找出该买哪一款。我既想玩 Xbox 游戏，*又*想拥有一台能在计算机上使用的
    Kinect。不幸的是，Xbox Kinect 套装并非按此目标设计。


    我最终决定购买独立的 Kinect 传感器（图 1-1），并买一台二手 Xbox 主机来玩游戏，这样还能省点钱。独立 Kinect 传感器包装盒内包含一根转接线，可让
    Kinect 直接从墙壁插座取电，而无需依赖 Xbox 主机。


    ![图片](img/0101.jpg)


    ***图 1-1.** Kinect 传感器与《Kinect 冒险！》——唯一一款所有配件齐备、可直接连接计算机的 Xbox Kinect 产品。*


    另一种选择是购买包含 Xbox 主机和 Kinect 传感器的套装。你在图 1-2 中看到的第二个商品就是这种套装。问题在于，人们经常购买 Kinect 套装，以为马上就能用……直到带回家才发现缺少一根线缆，不得不在线上下单购买并等待到货。


    Kinect 套装缺少的是将 Kinect 通过 USB 连接到个人计算机所需的电源适配器。虽然我完全支持购买完整的 Xbox Kinect 系统套装，但你还需要额外购买这个价值
    30 美元的附件——电源适配器，才能通过普通 USB 将 Kinect 连接到计算机。图 1-2 中列出的第三个商品正是这个电源适配器。


    ![图片](img/0102.jpg)


    ***图 1-2.** Amazon.com 上 Kinect 相关产品的在线商品列表——第一个列出的 Kinect 是你应该购买的；否则，你还需要购买第三个列出的商品。*


    你也可以双管齐下：为计算机购买独立传感器，同时购买游戏套装。这条路比较昂贵，但能让你将一个 Kinect 常连在计算机上用于折腾，同时始终有另一个 Kinect
    配合 Xbox 使用，无需来回移动线缆和摄像头。新的驱动程序和软件已开始支持同时使用多个 Kinect，因此手头有多个 Kinect 可能会很有价值。


    ## 将 Kinect 与 Xbox 分离


    你已经有一台 Xbox 了？太好了。那么，你需要从 Xbox 上借走 Kinect，接到计算机上。在动手之前，最好先征得 Kinect 主人的同意。我相信他们会想念它的！告诉他们，等你读完第
    3 章，给他们展示了用 Kinect 连接计算机能做哪些酷炫事情之后，就会还回来。他们会感谢你的！


    从新款 Xbox 上断开 Kinect 非常简单。只需找到 Kinect，顺着线缆找到 Xbox 背面的接口，然后拔下即可。搞定。接下来，你只需要一个 Kinect
    交流电源适配器，就能继续下载和安装软件了。


    如果你成功将 Kinect 连接到旧款 Xbox，那也是个好消息——这意味着你拥有将传感器连接到计算机所需的所有部件。要从旧款 Xbox 上断开 Kinect，你需要移除两个组件——Kinect
    传感器本身，以及连接 Xbox 和墙壁交流电源插座的线缆（图 1-3）。断开这两样东西后，就万事俱备了。


    ![图片](img/0103.jpg)


    ***图 1-3.** 从旧款 Xbox 游戏主机上拔下 Kinect 和交流电源适配器（图片由微软提供）*


    ## 确保拥有交流电源适配器


    如果你是新款 Xbox 搭配 Kinect，它们很可能是作为套装购买的。如果是这样，你可能还没有让 Kinect 在计算机上工作所需的转接线。不幸的是，现在你必须先购买一根交流电源转接线才能继续。图
    1-2 中的第三个商品显示了该适配器在 Amazon.com 上的产品信息。图 1-4 则更清晰地展示了这根线缆。


    ![图片](img/0104.jpg)


    ***图 1-4.** 左侧为适用于新款 Xbox 系统的 Kinect USB 延长线，右侧为 Kinect 电源适配器。*


    需要电源转接线的原因有两个。首先，Kinect 的耗电量超过了标准 USB 端口所能提供的上限，这可能是由于其内部组件众多，例如电机、多个传感器以及一个用于强制通风散热的风扇。新款
    Xbox 上的特殊 USB 端口能提供额外电力，但你的计算机做不到，因此必须通过线缆上的交流适配器将 Kinect 插入电源插座来弥补。如果你想让 Kinect
    和笔记本电脑一起移动使用，这种对转接线的需求会令人沮丧——你需要一块 12 伏电池并进行一些细致的改装才能解决这个问题。


    第二个需要转接线的原因是，Kinect 的线缆使用了 Xbox 专用的专有 USB 连接器。我知道这很令人沮丧。交流转接线的一端有一个接口，能接受这种特殊
    USB 形状，另一端则将其转换为标准 USB 连接器。旧款 Xbox 系统拥有标准 USB 端口，因此它们也需要一根转接线才能与 Kinect 兼容。当微软推出内置
    Kinect 支持的 Windows 版本时，可能会推出一款功耗更低的 Kinect 供计算机使用，届时就不再需要这根烦人的交流电源适配器附件了。

    '
- fmt: '### Inspecting the Kinect, Part by Part


    Now that you’ve acquired a Kinect, let’s take a closer look at all the parts.
    [Figure 1-5](#Chapter01.html#fig_1_5) shows all the items in the box from a standalone,
    Kinect Sensor purchase. The only ones you need to follow along with this book
    are the `AC Adapter` and the Kinect itself. You can keep the `USB extender`, manuals,
    and `Kinect Adventures` game disc in the box, as you may need them if you have
    or plan to get an Xbox.


    Before you throw away that box, you should know that it functions as a handy way
    to store and transport the bulky and oddly shaped Kinect. The device is pretty
    rugged; very few are returned defective or broken, and they can take a beating.
    However, the original box is a popular way for people to bring the sensor to and
    from meetups and hackathons in NYC. The foam inside is shaped perfectly to hold
    the Kinect, making the box a simple, portable container, so you might want to
    hang on to it just in case.


    ![images](images/0105.jpg)


    ***Figure 1-5.** Contents of standalone Kinect sensor box: Manual, Kinect Adventures!
    game disc, the Kinect itself, AC adapter, and special USB extender.*


    Now, let’s take a look at the inputs and outputs you’ll be able to take advantage
    of in applications and when building your own projects or products. Being able
    to identify all the components on the outside of the device ([Figure 1-6](#Chapter01.html#fig_1_6))
    will be very helpful going forward. There’s a lot going on, and many people aren’t
    quite sure which part does what. After reading through this section, you’ll know
    the function of every part and be able to apply that knowledge to your advantage.


    ![images](images/0106.jpg)


    ***Figure 1-6.** Kinect external component identification— Output: A) IR (infrared)
    structured-light laser projector, B) LED indicator, and K) motor to control tilt-in
    base. Input: F-I) Four microphones, C-D) two cameras (RGB and IR), and E) one
    accelerometer*


    There are two basic ideas when working with hardware, and with technology in general,
    that are really important: input and output. Input is information that comes into
    a system from an external source, and output is information that goes out from
    a system. I learned about inputs and outputs by hooking up stereos, TVs, and VCRs
    as a kid. An input to a stereo might be through a microphone or an iPod, whereas
    an output could be to a speaker or amplifier. Many devices, such as an amplifier,
    can both receive input and send output. The Kinect has sensors that act as inputs,
    reading (or sampling) information in space about the physical environment in front
    of it. The Kinect also has actuators (outputs) that allow it to write or act upon
    the physical space by changing it in different ways.


    There are four microphones on the Kinect—that’s right, four! That’s not just stereo;
    it’s actually quadraphonic sound. Combined with advanced digital signal processing
    in software, these four mics can be used to do remarkable things. In combination,
    these four audio inputs can work to filter out background noise and detect the
    relative position of anyone speaking within a room. Looking at the Kinect head
    on, there are three adjacent mics on the right side, just below the “XBOX 360”
    label ([Figure 1-6](#Chapter01.html#fig_1_6), G-I). A fourth microphone is on
    the left side ([Figure 1-6](#Chapter01.html#fig_1_6), F). Microsoft’s official
    Kinect SDK (Software Development Kit) is the first to reveal how to access the
    microphones, although other drivers are expected to provide access to this hardware
    in the future.


    The Kinect kind of looks like a huge, clunky old webcam, which is fitting because
    there’s actually a standard webcam built right into the middle of it ([Figure
    1-6](#Chapter01.html#fig_1_6), C). Next to it is an infrared camera, which is
    a bit more exotic than a standard webcam. Equally interesting, if not downright
    mysterious, is the 3-axis accelerometer inside the device, behind the “XBOX 360”
    label. Most people didn’t expect the Kinect to contain such a sensor, which is
    more common in devices designed to be held in your hand, such as a mobile phone
    or the Nintendo Wii controller.


    Now, for the outputs. You may have heard that the Kinect has a laser in it—it’s
    true. You can see it glowing red ([Figure 1-6](#Chapter01.html#fig_1_6), A) when
    the Kinect is plugged in, even though the light the projector emits is in the
    infrared spectrum and mostly invisible. It works in combination with the infrared
    camera on the unit ([Figure 1-6](#Chapter01.html#fig_1_6), D) to derive the exact
    position in space of everything in the room it occupies. The other light-based
    output is the LED indicator ([Figure 1-6](#Chapter01.html#fig_1_6), B). It’s not
    easily accessible from frameworks such as `OpenNI`; however, if you have a project
    that would benefit from feedback through the hardware, this may be of interest
    to you. It could be an ideal way for the application to alert a user that something
    is happening without requiring a screen. For example, in the 3D capture tool `MatterPort`,
    the user picks up the Kinect and walks around the room—away from the computer—to
    photograph objects. An audible beep from the computer lets the user know once
    a particular view has been adequately analyzed. This beep could be accompanied
    by a flicker of the LED light on the unit as an additional cue, so the user doesn’t
    have to be looking at the screen to register it.


    Finally, the Kinect has the functional opposite of a sensor, called an actuator,
    in the form of a small motor driving gears that pitch the tilt of the camera 30
    degrees up or down. This could be put to novel use in the applications you build.
    For example, by sweeping the device and its sensor elements up and down through
    space, the Kinect can be used to capture high-resolution scans of the environment
    around it. If you want to mount a Kinect to a robot, the motor could provide the
    mechanical up-and-down motion of the camera. Additionally, if you employ face
    or body tracking, you can adjust the position of the camera to adapt when a person
    moves out of the field of view.


    Now that we have identified all of the Kinect hardware, let’s put it to use with
    software. You’ll have a chance to see the imagery that comes from the RGB camera,
    as well as the depth image computed from the infrared projector and camera combination.


    **KINECT TEARDOWN!**


    Interested in an insider view of the Kinect? The website `iFixit` has put together
    a writeup and a video that take you through a tear-down of the Kinect device.


    Read the teardown article at: [http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/](http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/)


    Watch the teardown video at: [http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/](http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/)


    Please don’t try it at home! Don’t risk your own device. If you’re curious about
    what’s inside, visit `iFixit.com`.'
  raw: '### Inspecting the Kinect, Part by Part


    Now that you’ve acquired a Kinect, let’s take a closer look at all the parts.
    [Figure 1-5](#Chapter01.html#fig_1_5) shows all the items in the box from a standalone,
    Kinect Sensor purchase. The only ones you need to follow along with this book
    are the AC Adapter and the Kinect itself. You can keep the USB extender, manuals,
    and Kinect Adventures game disc in the box, as you may need them if you have or
    plan to get an Xbox.


    Before you throw away that box, you should know that it functions as a handy way
    to store and transport the bulky and oddly shaped Kinect. The device is pretty
    rugged; very few are returned defective or broken, and they can take a beating.
    However, the original box is a popular way for people to bring the sensor to and
    from meetups and hackathons in NYC. The foam inside is shaped perfectly to hold
    the Kinect, making the box a simple, portable container, so you might want to
    hang on to it just in case.


    ![images](images/0105.jpg)


    ***Figure 1-5.** Contents of standalone Kinect sensor box: Manual, Kinect Adventures!
    game disc, the Kinect itself, AC adapter, and special USB extender.*


    Now, let’s take a look at the inputs and outputs you’ll be able to take advantage
    of in applications and when building your own projects or products. Being able
    to identify all the components on the outside of the device ([Figure 1-6](#Chapter01.html#fig_1_6))
    will be very helpful going forward. There’s a lot going on, and many people aren’t
    quite sure which part does what. After reading through this section, you’ll know
    the function of every part and be able to apply that knowledge to your advantage.


    ![images](images/0106.jpg)


    ***Figure 1-6.** Kinect external component identification— Output: A) IR (infrared)
    structured-light laser projector, B) LED indicator, and K) motor to control tilt-in
    base. Input: F-I) Four microphones, C-D) two cameras (RGB and IR), and E) one
    accelerometer*


    There are two basic ideas when working with hardware, and with technology in general,
    that are really important: input and output. Input is information that comes into
    a system from an external source, and output is information that goes out from
    a system. I learned about inputs and outputs by hooking up stereos, TVs, and VCRs
    as a kid. An input to a stereo might be through a microphone or an iPod, whereas
    an output could be to a speaker or amplifier. Many devices, such as an amplifier,
    can both receive input and send output. The Kinect has sensors that act as inputs,
    reading (or sampling) information in space about the physical environment in front
    of it. The Kinect also has actuators (outputs) that allow it to write or act upon
    the physical space by changing it in different ways.


    There are four microphones on the Kinect—that’s right, four! That’s not just stereo;
    it’s actually quadraphonic sound. Combined with advanced digital signal processing
    in software, these four mics can be used to do remarkable things. In combination,
    these four audio inputs can work to filter out background noise and detect the
    relative position of anyone speaking within a room. Looking at the Kinect head
    on, there are three adjacent mics on the right side, just below the “XBOX 360”
    label ([Figure 1-6](#Chapter01.html#fig_1_6), G-I). A fourth microphone is on
    the left side ([Figure 1-6](#Chapter01.html#fig_1_6), F). Microsoft’s official
    Kinect SDK (Software Development Kit) is the first to reveal how to access the
    microphones, although other drivers are expected to provide access to this hardware
    in the future.


    The Kinect kind of looks like a huge, clunky old webcam, which is fitting because
    there’s actually a standard webcam built right into the middle of it ([Figure
    1-6](#Chapter01.html#fig_1_6), C). Next to it is an infrared camera, which is
    a bit more exotic than a standard webcam. Equally interesting, if not downright
    mysterious, is the 3-axis accelerometer inside the device, behind the “XBOX 360”
    label. Most people didn’t expect the Kinect to contain such a sensor, which is
    more common in devices designed to be held in your hand, such as a mobile phone
    or the Nintendo Wii controller.


    Now, for the outputs. You may have heard that the Kinect has a laser in it—it’s
    true. You can see it glowing red ([Figure 1-6](#Chapter01.html#fig_1_6), A) when
    the Kinect is plugged in, even though the light the projector emits is in the
    infrared spectrum and mostly invisible. It works in combination with the infrared
    camera on the unit ([Figure 1-6](#Chapter01.html#fig_1_6), D) to derive the exact
    position in space of everything in the room it occupies. The other light-based
    output is the LED indicator ([Figure 1-6](#Chapter01.html#fig_1_6), B). It’s not
    easily accessible from frameworks such as OpenNI; however, if you have a project
    that would benefit from feedback through the hardware, this may be of interest
    to you. It could be an ideal way for the application to alert a user that something
    is happening without requiring a screen. For example, in the 3D capture tool MatterPort,
    the user picks up the Kinect and walks around the room—away from the computer—to
    photograph objects. An audible beep from the computer lets the user know once
    a particular view has been adequately analyzed. This beep could be accompanied
    by a flicker of the LED light on the unit as an additional cue, so the user doesn’t
    have to be looking at the screen to register it.


    Finally, the Kinect has the functional opposite of a sensor, called an actuator,
    in the form of a small motor driving gears that pitch the tilt of the camera 30
    degrees up or down. This could be put to novel use in the applications you build.
    For example, by sweeping the device and its sensor elements up and down through
    space, the Kinect can be used to capture high-resolution scans of the environment
    around it. If you want to mount a Kinect to a robot, the motor could provide the
    mechanical up-and-down motion of the camera. Additionally, if you employ face
    or body tracking, you can adjust the position of the camera to adapt when a person
    moves out of the field of view.


    Now that we have identified all of the Kinect hardware, let’s put it to use with
    software. You’ll have a chance to see the imagery that comes from the RGB camera,
    as well as the depth image computed from the infrared projector and camera combination.


    **KINECT TEARDOWN!**


    Interested in an insider view of the Kinect? The website iFixit has put together
    a writeup and a video that take you through a tear-down of the Kinect device.


    Read the teardown article at: [http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/](http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/)


    Watch the teardown video at: [http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/](http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/)


    Please don’t try it at home! Don’t risk your own device. If you’re curious about
    what’s inside, visit iFixit.com.'
  trans: '

    ### 逐件检视 Kinect 的各个部件


    现在你已经拥有了一台 Kinect，让我们仔细看看它的所有部件。图 1-5 展示了从独立 Kinect 传感器包装盒中取出的所有物品。你只需用到`AC 电源适配器`和
    Kinect 本体即可跟随本书学习。你可以将`USB 延长线`、手册和《Kinect 大冒险》游戏光盘留在盒中，因为如果你拥有或计划购买 Xbox，后续可能会用到它们。


    在扔掉那个包装盒之前，你应该知道它可以作为一个方便的容器来存放和运输体积庞大且形状奇特的 Kinect。这款设备相当坚固，很少有退货或损坏的情况，而且能承受一定的冲击。然而，在纽约，人们经常使用原装包装盒将传感器带到聚会和黑客马拉松活动现场。盒内的泡沫完美贴合
    Kinect 的形状，使其成为一个简单便携的容器，因此你或许最好留着它以防万一。


    ![images](img/0105.jpg)


    ***图 1-5.** 独立 Kinect 传感器包装盒内容物：手册、《Kinect 大冒险！》游戏光盘、Kinect 本体、AC 电源适配器及专用 USB
    延长线。*


    现在，让我们看看在应用程序开发以及构建自己的项目或产品时，你能利用的输入和输出接口。能够识别设备外部的所有组件（图 1-6）将对后续学习非常有帮助。Kinect
    的构造颇为复杂，许多人并不清楚每个部件的作用。阅读完本节后，你将了解每个部件的功能，并能将这些知识应用到实践中。


    ![images](img/0106.jpg)


    ***图 1-6.** Kinect 外部组件识别——输出：A) 红外结构光激光投影仪，B) LED 指示灯，K) 控制底座倾斜的电机。输入：F-I) 四个麦克风，C-D)
    两个摄像头（RGB 和红外），E) 一个加速度计*


    在处理硬件乃至一般技术时，有两个非常重要的基本概念：输入和输出。输入是指从外部来源进入系统的信息，输出则是指从系统向外部发送的信息。我小时候通过连接音响、电视和录像机学习了输入和输出。音响的输入可能来自麦克风或
    iPod，而输出则可以连接到扬声器或放大器。像放大器这样的许多设备既能接收输入，也能发送输出。Kinect 拥有作为输入设备的传感器，用于读取（或采样）其前方物理空间的信息。Kinect
    也拥有执行器（输出设备），使其能够通过不同方式改变物理空间，从而作用于该空间。


    Kinect 上有四个麦克风——没错，就是四个！这不仅仅是立体声，实际上是四声道声音。结合软件中的高级数字信号处理技术，这四个麦克风可以用来实现非凡的功能。通过协同工作，这四个音频输入可以过滤背景噪音，并检测房间内说话者的相对位置。从
    Kinect 正面看，右侧有三个相邻的麦克风，就在“XBOX 360”标识的下方（图 1-6，G-I）。第四个麦克风在左侧（图 1-6，F）。微软官方的 Kinect
    SDK（软件开发工具包）是首个提供访问麦克风方法的工具，不过预计未来其他驱动程序也能提供对此硬件的访问权限。


    Kinect 看起来有点像一个大而笨重的旧式网络摄像头，这也情有可原，因为它中间确实内置了一个标准网络摄像头（图 1-6，C）。它旁边是一个红外摄像头，这比标准网络摄像头要少见一些。同样有趣，甚至可以说是相当神秘的，是设备内部“XBOX
    360”标识后面的三轴加速度计。大多数人没想到 Kinect 会包含这样一个传感器，这种传感器在手机或任天堂 Wii 控制器等手持设备中更为常见。


    现在，来说说输出设备。你可能听说过 Kinect 内部有一个激光器——这是真的。当 Kinect 接通电源时，你可以看到它发出红光（图 1-6，A），尽管投影仪发射的光位于红外光谱并且几乎不可见。它与设备上的红外摄像头（图
    1-6，D）协同工作，以确定其所处房间内一切物体的精确空间位置。另一个基于光的输出是 LED 指示灯（图 1-6，B）。从诸如`OpenNI`这样的框架中不容易直接访问它；然而，如果你的项目需要利用硬件反馈来提升效果，这可能对你会有帮助。例如，当应用希望在无需屏幕的情况下通知用户有事件发生时，这或许是一种理想的告警方式。比如在
    3D 捕捉工具`MatterPort`中，用户拿起 Kinect 在房间里走动——远离电脑——来拍摄物体。电脑发出的“哔”声让用户知道某个特定视图已被充分分析。此“哔”声可以伴随设备上
    LED 灯的闪烁作为额外提示，这样用户无需查看屏幕就能感知到状态变化。


    最后，Kinect 拥有一个功能上与传感器相反的执行器，它由一个驱动齿轮的小型电机组成，可以使摄像头上下倾斜 30 度。这可以在你构建的应用中得到新颖的应用。例如，通过在空间中上下扫动设备及其传感元件，Kinect
    可以用于捕捉其周围环境的高分辨率扫描。如果你想将 Kinect 安装在机器人上，这个电机可以提供摄像头的机械上下运动。此外，如果你使用人脸或身体追踪，当人物移出视野时，你可以调整摄像头的位置来适应。


    现在我们已经识别了所有的 Kinect 硬件，接下来让我们配合软件一起使用。你将有机会看到来自 RGB 摄像头的图像，以及由红外投影仪和摄像头组合计算出的深度图像。


    **Kinect 拆解！**


    对 Kinect 的内部构造感兴趣吗？`iFixit`网站整理了一篇文章和一段视频，带你一探 Kinect 设备的拆解过程。


    阅读拆解文章： [`www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/`](http://www.ifixit.com/Teardown/Microsoft-Kinect-Teardown/4066/)


    观看拆解视频： [`www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/`](http://www.ifixit.com/blog/blog/2010/11/05/kinect-teardown-video/)


    请勿在家中尝试！不要拿自己的设备冒险。如果你好奇内部构造，请访问`iFixit.com`。

    '
- fmt: '### Downloading and Installing Software


    The first time I plugged my Kinect into a computer to see how it worked, I used
    the software you’ll install in this section. That software is `RGBDemo`, and I
    still reach for it whenever I want to demonstrate what the Kinect is capable of
    and how it is different from a standard webcam. `RGB` stands for red, green and
    blue—the colors the webcam in the middle of the Kinect can see. The `D` in `Demo`
    also stands for depth, which the IR projector and IR camera generate with the
    help of a structured-light chip from a company called `PrimeSense`. Who is `PrimeSense`?


    `PrimeSense` is the Israeli company whose hardware reference design and structured-light
    decoding chip are at the heart of the Kinect’s volumetric 3D camera system. This
    was a surprise to many who had tracked the evolution of the Kinect (originally
    code-named Project Natal), as many thought Microsoft would use the intellectual
    property of the two time-of-flight 3D sensor companies they had recently acquired—`3DV
    Systems` and `Canesta`. Following the lead of the `OpenKinect` project, `PrimeSense`
    went on to help found `OpenNI` in an effort to put the best tools in the hands
    of developers. `OpenNI` has launched the first major store offering PC applications
    that make use of volumetric cameras such as those in the Kinect with the debut
    of `Arena`, which will be covered in more detail in [Chapter 3](#Chapter03.html#ch3).


    While those approaching the Kinect from a natural user-interface perspective see
    the Kinect as a 3D gesture-recognition device, people from engineering and robotics
    backgrounds refer to this particular aspect of the Kinect’s hardware as an `RGBD`
    sensor. `RGBDemo` is intended to provide a demonstration of how the Kinect performs
    as an `RGBD` sensor in applications such as machine vision and 3D reconstruction—hence,
    the name `RGBDemo`. It’s the most straightforward way to get a look at the low-level
    data from the Kinect on both Mac and Windows machines.


    Why do you need to download software if the Kinect “just works” on your Xbox?
    Well, if you plugged your Kinect into a computer without installing some drivers
    and applications that know how to talk to the Kinect, nothing would happen! So,
    while I know you must be eager to get going, please wait until you carefully go
    through the steps in order before plugging in your Kinect. Some of these steps
    need to be carried out in a very specific order. Please follow along!


    First, you’ll need to go on the Web and download `RGBDemo`, a powerful suite of
    open-source software written by Nicolas Burrus to provide a toolkit that others
    can use to write programs and a means for noncoders to see what the Kinect data
    really looks like. If you’re on Windows, then you’ll install three included drivers
    from `OpenNI` that help `RGBDemo` make better sense of the data from the Kinect.
    The `RGBD-viewer` application included with the software will show you the kind
    of imagery the Kinect can see and the unique ways in which it does so—this will
    be how we test that you’ve got everything hooked up correctly.


    Nicolas Burrus, originally from Paris, explores the use of depth sensing cameras
    like the one in the Kinect for his postdoctoral research in computer vision at
    the robotics lab of Carlos III University of Madrid (`http://roboticslab.uc3m.es/`).
    Many thanks are owed to Nicolas for being the first to package up a simple executable
    program anyone can use with the Kinect on their computer, the same month the Kinect
    debuted. For coders, the collection of source code and related machine vision
    libraries he assembled for `RGBDemo` helped many people get started building applications.
    For less technical people, `RGBDemo` provided a means to see the Kinect data for
    the first time without having to write any code. Burrus and his partner, Nicolas
    Tisserand, have since formed a company called `manctl` (`http://manctl.com`) to
    further innovate around Kinect-related technology. Let’s take a look at how to
    get started with `RGBDemo`.


    #### Finding the Correct Version of `RGBDemo`


    First, you need to find the correct version of `RGBDemo` for your operating system.
    Open up a web browser and go to `http://labs.manctl.com/rgbdemo` in order to pull
    up the latest information about the software project ([Figure 1-7](#Chapter01.html#fig_1_7)).
    Nicolas updates the codebase regularly, and you’ll need to pick the most recent
    version that works on your system. As of this writing, `v0.6.1` is the latest
    version that works for Windows and Intel Mac OS X Snow Leopard. As of this writing,
    the `RGBDemo` project has just been given a home on the `manctl` web site, so
    be aware that its appearance may have changed by the time you visit.


    ![images](images/0107.jpg)


    ***Figure 1-7.** RGBDemo project web page*


    `RGBDemo` is an open-source software project. Delightfully, it therefore includes
    not only an application ready to run as a “binary executable,” but the source
    code of its composition as well. Open-source projects such as this one are valuable:
    If you find a problem with the software or want to extend it in a new way, you
    have the recipe to cook your own version from the original instructions, which
    you can then compile into your own improved “binary executable” application. Many
    open-source projects come with only the source code and nothing you can use without
    knowing how to compile programs. That’s not much fun if you aren’t that technical.
    `RGBDemo` is wonderful because it’s ready to run with an executable binary file,
    in addition to letting you see how it was constructed.


    Now, let’s jump to the binary software that can run on your operating system.
    To do that, the following material is split up into different instructions for
    Windows and Mac users. After the download and installation, we’ll meet up once
    again in the “Testing Your Kinect” section, where we’ll launch `RGBDemo` and tinker
    around to make sure everything is working.


    #### Downloading and Installing `RGBDemo` for Windows


    Depending on which version of Windows you are using—XP, Vista, or Windows 7—your
    experience with the details in this section may vary. These instructions address
    some of the hangups you could face when downloading and installing on Vista that
    you might not experience on XP or Windows 7\. You can just skip the explanations
    of those problems if you don’t run into them, but they’re included so we don’t
    leave any of the less advanced readers behind. This process can be tedious on
    Windows, compared to the much simpler Mac installation.'
