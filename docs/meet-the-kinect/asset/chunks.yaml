- fmt: '### Ultra Seven


    你是否曾梦想征服宇宙乃至更远的世界？试试这款专为 Windows 设计的 `Ultra Seven` 程序，它将把你变身为一位星际战士。`Ultra Seven`
    是 20 世纪 60 年代同名电视剧中一位广受欢迎的日本超级英雄。他是一名来自 M-78 星云的士兵，在执行绘制银河系地图的任务时，对地球心生眷恋。`Ultra
    Seven` 拥有多个标志性动作，非常适合利用 `Kinect` 的手势识别功能来施展。


    `Kinect-Ultra` 适用于 CPU 和 GPU 性能较强、支持 `OpenGL 2.0` 及以上版本且具备可编程着色器功能的 `Windows`
    个人电脑。如果你的机器满足这些要求，运行它应该不会有什么大问题。如果不满足，请跳过此应用和 `Kamehameha` 应用。此应用位于 `OpenNI Arena`，可在
    [`http://bit.ly/ultraseven`](http://bit.ly/ultraseven) 找到。


    该项目的原始页面（你可以在那里阅读更详细的说明、更新并观看示例视频）位于 [`http://code.google.com/p/kinect-ultra/`](http://code.google.com/p/kinect-ultra/)。请检查你安装的
    `OpenNI`、`NITE` 和 `SensorKinect` 版本是否与文档中指示的该应用兼容。


    按照这些说明操作并准备好所有必需组件后，请插入你的 `Kinect`，将其连接到电脑，然后打开应用程序。确保传感器能清晰看到你，并且你有足够的空间自由移动。如果遇到问题，请查阅位于
    [`http://code.google.com/p/kinect-ultra/wiki/FAQ_en`](http://code.google.com/p/kinect-ultra/wiki/FAQ_en)
    的常见问题解答。


    做出校准姿势（双臂举起至头部附近），将向传感器发出信号，为你“穿上”`Ultra Seven` 的服装。[图 3-6](#Chapter03.html#fig_3_6)
    展示了这个变身的预期效果。现在，你的身体将身着红色服装，你的“骨架”可见，一个莫西干头式的回旋镖状的物体栖息在你的头顶。你现在已经准备好与怪物、外星人以及你的猫战斗了。


    ![images](images/0306.jpg)


    ***图 3-6.** 校准姿势让你变身成 Ultra Seven！*


    装饰在你头顶的冠冕被称为“Eye Slugger”。这个时尚的头饰可以兼作可拆卸武器。将你的手伸到脑后，然后向前猛推，即可将这个武器掷向你面朝的方向。别担心，它也会回到你手中。


    你也可以将 `Eye Slugger` 置于半空中。伸出左臂让 `Kinect` 知道你的意图，然后用右手抓住武器，将其放置在你面前。现在，你可以像[图 3-7](#Chapter03.html#fig_3_7)
    所示的那样，用你的前臂做出劈砍动作，用武器攻击你的对手、猫或脏衣篮。


    ![images](images/0307.jpg)


    ***图 3-7.** 上行：演示如何投掷 Eye Slugger；下行：高级 Eye Slugger 操作*


    `Ultra Seven` 的另一个绝技是“Wide Shot”，它允许你通过双臂摆成 `L` 形来发射一股超级能量流。将你的左臂弯曲横于胸前，右臂从肘部向上竖直，手掌向上。能量流将沿着你身体所朝向的方向射出。`Kinect`
    感应到的前景物体不会被能量流击中；相反，能量流会绕过这些物体继续前进。


    最后，你还可以使用你的“Emperium Beam”。在电视剧中，这道能量射线会从 `Ultra Seven` 额头上的绿色宝石中射出。将你的手指放在额头两侧，以发出光束信号。瞄准！发射！[图
    3-8](#Chapter03.html#fig_3_8) 展示了这些流畅的动作。


    ![images](images/0308.jpg)


    ***图 3-8.** 上行：通过姿势触发的强大能量流；下行：Emperium Beam 实战*


    玩耍几分钟后，你的超级英雄斗篷会开始闪烁，表示 `Ultra Seven` 离开地球的时间到了。在电视剧中，奥特曼只能在地球上停留很短时间。当你开始闪烁时，蹲下然后向上猛冲。你的化身将直冲屏幕顶部，想必是再次返回
    M-78 星云。


    ### Kamehameha


    由同一位开发者（Tomoto Washio）开发的类似应用，允许你变身为超级赛亚人。如果你不熟悉《龙珠 Z》系列，超级赛亚人是一种强大的、由愤怒引发的变身，赛亚人的高级成员在特殊情况下可以达成。变身的最终效果是产生燃烧般的金色光环和违背重力的头发，如[图
    3-9](#Chapter03.html#fig_3_9) 所示。


    此应用也可在 `OpenNI Arena` 获取。网站短链接为 [`http://bit.ly/arkamehameha`](http://bit.ly/arkamehameha)，更多信息可在项目页面
    [`http://code.google.com/p/kinect-kamehameha`](http://code.google.com/p/kinect-kamehameha)
    找到。与之前的超级英雄应用类似，`Kamehameha` 仅在性能更强的 `Windows` 个人电脑上运行。请遵循网站上的说明和建议。确保你安装了正确版本的
    `OpenNI`、`NITE` 和 `SensorKinect`。准备好后，插入 `Kinect`，将其连接到电脑，然后打开应用程序。


    站在 `Kinect` 传感器前，让你的身体可见，采用标准的校准姿势：双臂举至头部附近，双肘弯曲，如[图 3-9](#Chapter03.html#fig_3_9)
    所示。给传感器一些时间来找到你的身形。你应开始闪烁，很快一个光环和一头电光四射的头发将出现在你周围。如果传感器难以找到你，请尝试切换到聚会模式以便更轻松地校准。


    ![images](images/0309.jpg)


    ***图 3-9.** Kamehameha 校准与变身*


    `Kamehameha` 是夏威夷第一位国王的名字。据称他出生于 1738 年左右，当时哈雷彗星正在天空中进行其炽热的旅程。这个时间点意义重大，因为当时的传说提到，一位伟大的国王将在彗星之下诞生，并统一诸岛。


    在《龙珠》系列中，`Kamehameha` 指的是一种标志性的能量攻击，这正是你将通过此应用能够施展的招式。施展 `Kamehameha` 时，使用者将双手合拢置于身前，将其潜在能量集中到合拢双手之间的一个点上，然后将双手向前猛推，射出一股连续而强大的能量光束。首先，将你的双手紧紧靠在一起，以便传感器能看到它们。你会看到双手之间形成一个白色光球，看起来应该类似于[图
    3-10](#Chapter03.html#fig_3_10) 系列图片中的第一张。


    ![images](images/0310.jpg)


    ***图 3-10.** Kamehameha 攻击*


    保持双手合拢，弯曲膝盖以降低重心。这个动作应会发出信号，使光球强度增加。然后，你可以将能量球从手中推向任何方向。以可控的动作伸直双臂，并使其保持朝向目标的方向，看看会发生什么。


    如果动作检测效果不佳，请尝试切换到聚会模式。请注意，这项技术都相对较新，有人可能会称之为尖端技术，因此开发者仍在努力解决其中的问题。`Kamehameha`
    并非大型游戏工作室为 `Xbox` 销售而推出的作品，因此可以理解它尚未像商业程序那样完善。`Tomoto` 的这两款 `Kinect` 应用值得注意，因为它们是最早真正发挥运动控制能力的一批应用之一。此外，`Tomoto`
    以开源许可证形式提供了所有代码，供人们修改和学习。'
  raw: '### Ultra Seven


    Do you sometimes dream of conquering the universe and beyond? Try out the Ultra
    Seven program designed for Windows that will transform you into an intergalactic
    warrior. Ultra Seven is a popular Japanese superhero from the 1960’s show of the
    same name. He is a soldier from Nebula M-78, who becomes smitten with Earth while
    on a mission to map the Milky Way. Ultra Seven has several signature moves that
    lend themselves well for use with the Kinect’s gestural recognition capabilities.


    Kinect-Ultra is available for Windows PCs with fairly fast CPUs and fairly advanced
    GPUs. You must have at least OpenGL 2.0 and programmable shader capabilities in
    your graphics card. If your machine meets those requirements, you shouldn’t have
    too much of a problem. If it doesn’t, please skip past this application and the
    Kamehameha application. This app is at OpenNI Arena, which can be found at [`http://bit.ly/ultraseven`](http://bit.ly/ultraseven).


    The project’s original page, where you can read more detailed instructions, updates,
    and watch example videos is at [`http://code.google.com/p/kinect-ultra/`](http://code.google.com/p/kinect-ultra/).
    Check that you have the versions of OpenNI, NITE, and SensorKinect that will work
    with this application as indicated in the documentation.


    Once you have followed these instructions and have everything you need, plug in
    your Kinect, and connect the Kinect to your computer. Open the application. Make
    sure the sensor can see you clearly and you have enough space to move around freely.
    If you are having trouble, please consult the FAQ at [`http://code.google.com/p/kinect-ultra/wiki/FAQ_en`](http://code.google.com/p/kinect-ultra/wiki/FAQ_en).


    Going into the calibration pose with your arms up around your head will signal
    the sensor to “clothe” you in the Ultra Seven costume. [Figure 3-6](#Chapter03.html#fig_3_6)
    shows you how this transformation should look. Now your body should be clothed
    in red, with your “skeleton” visible and a mohawkish boomerang perched on top
    of your head. You are now ready to battle monsters, aliens, and your cat.


    ![images](images/0306.jpg)


    ***Figure 3-6.** Calibration pose transforms you into Ultra Seven!*


    The crest alighting your crown is called the Eye Slugger. This fashionable head
    topper doubles as a removable weapon. By reaching your hands to the back of your
    head, then thrusting them forward, you can hurl this weapon in the direction you
    are facing. Don’t worry; it’ll return to you, too.


    You can also place the Eye Slugger in midair. Stretch out your left arm to let
    the Kinect know what you’re doing, then grab the weapon with your right hand,
    and place in front of you. Now you can move your forearm in a chopping motion
    to strike your opponent/cat/laundry hamper with the weapon, as shown in [Figure
    3-7](#Chapter03.html#fig_3_7).


    ![images](images/0307.jpg)


    ***Figure 3-7.** Top row: demonstration of how to fling the Eye Slugger ; bottom
    row: advanced Eye Slugger maneuver*


    Another trick up Ultra Seven’s sleeve is the Wide Shot, which allows you to shoot
    out a super stream of energy by making an L shape with both arms. Bend your left
    arm across your chest and hold your right arm vertical from the elbow with your
    hand up. The energy stream will fire out in the direction that your body is oriented.
    Objects that the Kinect senses in the foreground will not be hit by the energy
    stream; instead, it will pass by such objects and continue on its path.


    Lastly, you also have at your fingertips the Emperium Beam. In the TV show, this
    energy ray would shoot out from a green gem on Ultra Seven’s forehead. Bring your
    fingers to the sides of your forehead to signal the beam. Aim! Fire! [Figure 3-8](#Chapter03.html#fig_3_8)
    shows these slick moves.


    ![images](images/0308.jpg)


    ***Figure 3-8.** Top row: a powerful stream of energy triggered with pose ; bottom
    row: Emperium Beam in action*


    After a couple minutes of play, your superhero cloak will start to blink on and
    off, signaling that it is time for Ultra Seven to depart from Earth. In the TV
    show, the Ultramen could only stay on Earth for short periods of time. When you
    begin to flash, crouch down and then thrust upwards. Your avatar will shoot straight
    out the top of the screen, presumably bound for Nebula M-78 once again.


    ### Kamehameha


    A similar application by the same developer, Tomoto Washio, allows you to morph
    into a Super Saiyan. If you are not familiar with the Dragon Ball Z series, a
    Super Saiyan is a powerful, rage-induced transformation that may be achieved by
    advanced members of the Saiyan race under extraordinary circumstances. The result
    of the transformation is apparently a flaming, golden aura and hair that defies
    gravity, as shown in [Figure 3-9](#Chapter03.html#fig_3_9).


    This application is also available at OpenNI Arena. The short link to the site
    is [`http://bit.ly/arkamehameha`](http://bit.ly/arkamehameha), and additional
    information can be found on the project page at [`http://code.google.com/p/kinect-kamehameha`](http://code.google.com/p/kinect-kamehameha).
    Like the previous superhero app, Kamehameha works on faster Windows PC computers
    only. Follow the instructions and suggestions on the site. Make sure you have
    the correct versions of OpenNI, NITE, and SensorKinect. Once you are ready, plug
    in your Kinect, connect the Kinect to your computer, and then open the application.


    Standing in front of the Kinect sensor so that your body is visible, assume the
    standard calibration pose with arms up around your head and your elbows bent,
    as shown in [Figure 3-9](#Chapter03.html#fig_3_9). Allow the sensor time to find
    your shape. You should begin to flash, and soon an aura and a head of electric
    hair will appear around you. If the sensor is having a hard time finding you,
    try switching to party mode for easier calibration.


    ![images](images/0309.jpg)


    ***Figure 3-9.** Kamehameha calibration and transformation*


    Kamehameha was the name of the first king of Hawaii. He was purportedly born around
    1738 when Haley’s Comet was making its fiery journey across the sky. The timing
    was significant because legend at the time spoke of a great king born under a
    comet who would unify the islands.


    In the Dragon Ball series, Kamehameha refers to a signature energy attack, which
    is the move that you will be able to perform with this application. The Kamehameha
    is formed when cupped hands are drawn in front of the user and their latent energy
    is concentrated into a single point between the cupped hands. The hands are then
    thrust forward to shoot out a streaming, powerful beam of energy. First, hold
    your hands close together so that the sensor can see them. You will see a white
    ball of light form between your hands that should look similar to the first image
    in the series in [Figure 3-10](#Chapter03.html#fig_3_10).


    ![images](images/0310.jpg)


    ***Figure 3-10.** Kamehameha attack*


    Keeping your hands cupped, bend from the knee to lower your center of gravity.
    This movement should signal the light to increase in intensity. From here, you
    can push the energy ball out from your hands in any direction. Extend your arms
    out in a controlled motion and hold them towards your target to see what happens.


    If the motion detection isn’t working very well, try switching to Party Mode.
    Please note that this technology is all relatively new, what some might call the
    bleeding edge, so developers are still trying to work the kinks out. Kamehameha
    isn’t a title put out by a major game studio for sale on Xbox and understandably
    is not yet as polished as a commercial program. Tomoto’s two Kinect apps are noteworthy
    for being a couple of the first apps out that really put the motion control abilities
    to use. Also, Tomoto provides all the code under an open source license for people
    to modify and learn from.'
  trans: '

    ### 超人七号


    你是否曾梦想征服宇宙乃至更远的世界？试试这款专为 Windows 设计的 `Ultra Seven` 程序，它将把你变身为一位星际战士。`Ultra Seven`
    是 20 世纪 60 年代同名电视剧中一位广受欢迎的日本超级英雄。他是一名来自 M-78 星云的战士，在执行绘制银河系地图的任务时，对地球心生眷恋。`Ultra
    Seven` 拥有多个标志性动作，非常适合利用 `Kinect` 的手势识别功能来施展。


    `Kinect-Ultra` 适用于 CPU 和 GPU 性能较强、支持 `OpenGL 2.0` 及以上版本且具备可编程着色器功能的 `Windows`
    个人电脑。如果你的机器满足这些要求，运行它应该不会有什么大问题。如果不满足，请跳过此应用和 `Kamehameha` 应用。此应用位于 `OpenNI Arena`，可在
    [`http://bit.ly/ultraseven`](http://bit.ly/ultraseven) 找到。


    该项目的原始页面（你可以在那里阅读更详细的说明、更新并观看示例视频）位于 [`http://code.google.com/p/kinect-ultra/`](http://code.google.com/p/kinect-ultra/)。请检查你安装的
    `OpenNI`、`NITE` 和 `SensorKinect` 版本是否与文档中指示的该应用兼容。


    按照这些说明操作并准备好所有必需组件后，请插入你的 `Kinect`，将其连接到电脑，然后打开应用程序。确保传感器能清晰看到你，并且你有足够的空间自由移动。如果遇到问题，请查阅位于
    [`http://code.google.com/p/kinect-ultra/wiki/FAQ_en`](http://code.google.com/p/kinect-ultra/wiki/FAQ_en)
    的常见问题解答。


    做出校准姿势（双臂举起至头部附近），将向传感器发出信号，为你“穿上”`Ultra Seven` 的服装。图 3-6 展示了这个变身的预期效果。现在，你的身体将身着红色服装，你的“骨架”可见，一个莫西干头式的回旋镖状的物体栖息在你的头顶。你现在已经准备好与怪物、外星人以及你的猫战斗了。


    ![images](img/0306.jpg)


    ***图 3-6.** 校准姿势让你变身成 Ultra Seven！*


    装饰在你头顶的冠冕被称为“Eye Slugger”。这个时尚的头饰可以兼作可拆卸武器。将你的手伸到脑后，然后向前猛推，即可将这个武器掷向你面朝的方向。别担心，它也会回到你手中。


    你也可以将 `Eye Slugger` 置于半空中。伸出左臂让 `Kinect` 知道你的意图，然后用右手抓住武器，将其放置在你面前。现在，你可以像图 3-7
    所示的那样，用你的前臂做出劈砍动作，用武器攻击你的对手、猫或脏衣篮。


    ![images](img/0307.jpg)


    ***图 3-7.** 上行：演示如何投掷 Eye Slugger；下行：高级 Eye Slugger 操作*


    `Ultra Seven` 的另一个绝技是“Wide Shot”，它允许你通过双臂摆成 `L` 形来发射一股超级能量流。将你的左臂弯曲横于胸前，右臂从肘部向上竖直，手掌向上。能量流将沿着你身体所朝向的方向射出。`Kinect`
    感应到的前景物体不会被能量流击中；相反，能量流会绕过这些物体继续前进。


    最后，你还可以使用你的“Emperium Beam”。在电视剧中，这道能量射线会从 `Ultra Seven` 额头上的绿色宝石中射出。将你的手指放在额头两侧，以发出光束信号。瞄准！发射！图
    3-8 展示了这些流畅的动作。


    ![images](img/0308.jpg)


    ***图 3-8.** 上行：通过姿势触发的强大能量流；下行：Emperium Beam 实战*


    玩耍几分钟后，你的超级英雄斗篷会开始闪烁，表示 `Ultra Seven` 离开地球的时间到了。在电视剧中，奥特曼只能在地球上停留很短时间。当你开始闪烁时，蹲下然后向上猛冲。你的化身将直冲屏幕顶部，想必是再次返回
    M-78 星云。


    ### 卡美哈梅哈


    由同一位开发者（Tomoto Washio）开发的类似应用，允许你变身为超级赛亚人。如果你不熟悉《龙珠 Z》系列，超级赛亚人是一种强大的、由愤怒引发的变身，赛亚人的高级成员在特殊情况下可以达成。变身的最终效果是产生燃烧般的金色光环和违背重力的头发，如图
    3-9 所示。


    此应用也可在 `OpenNI Arena` 获取。网站短链接为 [`http://bit.ly/arkamehameha`](http://bit.ly/arkamehameha)，更多信息可在项目页面
    [`http://code.google.com/p/kinect-kamehameha`](http://code.google.com/p/kinect-kamehameha)
    找到。与之前的超级英雄应用类似，`Kamehameha` 仅在性能更强的 `Windows` 个人电脑上运行。请遵循网站上的说明和建议。确保你安装了正确版本的
    `OpenNI`、`NITE` 和 `SensorKinect`。准备好后，插入 `Kinect`，将其连接到电脑，然后打开应用程序。


    站在 `Kinect` 传感器前，让你的身体可见，采用标准的校准姿势：双臂举至头部附近，双肘弯曲，如图 3-9 所示。给传感器一些时间来找到你的身形。你应开始闪烁，很快一个光环和一头电光四射的头发将出现在你周围。如果传感器难以找到你，请尝试切换到聚会模式以便更轻松地校准。


    ![images](img/0309.jpg)


    ***图 3-9.** Kamehameha 校准与变身*


    `Kamehameha` 是夏威夷第一位国王的名字。据称他出生于 1738 年左右，当时哈雷彗星正在天空中进行其炽热的旅程。这个时间点意义重大，因为当时的传说提到，一位伟大的国王将在彗星之下诞生，并统一诸岛。


    在《龙珠》系列中，`Kamehameha` 指的是一种标志性的能量攻击，这正是你将通过此应用能够施展的招式。施展 `Kamehameha` 时，使用者将双手合拢置于身前，将其潜在能量集中到合拢双手之间的一个点上，然后将双手向前猛推，射出一股连续而强大的能量光束。首先，将你的双手紧紧靠在一起，以便传感器能看到它们。你会看到双手之间形成一个白色光球，看起来应该类似于图
    3-10 系列图片中的第一张。


    ![images](img/0310.jpg)


    ***图 3-10.** Kamehameha 攻击*


    保持双手合拢，弯曲膝盖以降低重心。这个动作应会发出信号，使光球强度增加。然后，你可以将能量球从手中推向任何方向。以可控的动作伸直双臂，并使其保持朝向目标的方向，看看会发生什么。


    如果动作检测效果不佳，请尝试切换到聚会模式。请注意，这项技术都相对较新，有人可能会称之为尖端技术，因此开发者仍在努力解决其中的问题。`Kamehameha`
    并非大型游戏工作室为 `Xbox` 销售而推出的作品，因此可以理解它尚未像商业程序那样完善。`Tomoto` 的这两款 `Kinect` 应用值得注意，因为它们是最早真正发挥运动控制能力的一批应用之一。此外，`Tomoto`
    以开源许可证形式提供了所有代码，供人们修改和学习。

    '
- fmt: '### Body Dysmorphia


    This Mac only app made with the `Cinder` creative coding framework is simple,
    but quite entertaining. Basically you can make yourself look fat or thin in realtime.
    `Body dysmorphia` is a psychological disorder that affects perhaps 1% of the population
    and causes the afflicted to obsess over a perceived defect in one’s own appearance.
    Use this program created by `Robert Hodgin` to see yourself, your cat, and the
    world in `Stay Puft Marshmellow` form.


    A quick link to the download the program is at [`http://bit.ly/dysmorphia`](http://bit.ly/dysmorphia),
    and you can learn more about the creator at [`http://roberthodgin.com/`](http://roberthodgin.com/)
    and [`http://www.flight404.com/`](http://www.flight404.com/). Take a look at the
    instructions on the first site and click the link to download the application.
    Keep in mind that this application will only work on a Mac operating system. Before
    opening the application, make sure that your `Kinect` is plugged in and also connected
    to your computer. Once the green light is visible, you can launch the application
    and start playing!


    As soon as you open the program, you will see objects within the scope of your
    `Kinect` dysmorphed in realtime. At the bottom left-hand side of the screen, you
    will find a key for various adjustments to the image. Hold down the `P` key to
    inflate your subject and lowercase `p` to shrink it. Basically, the data from
    the `Kinect` is manipulated by increasing or decreasing the radius of the points
    in the cloud. This has a comical and cartoonish effect as you expand the points
    into puffy lumps and blobs. Do not expect a realistic-looking image, but instead
    have fun adjusting the colors and textures in various ways using the key.


    Pressing `b` or `B` will adjust the amount of blur applied to the image. Adding
    blur by pressing down an uppercase `B` will smooth out the points along the surface
    so the image is less lumpy. Play around with the blur levels to find an amount
    you like in correlation to an amount of puffiness. If you turn the blur up all
    the way, the image will look extremely impressionistic and lose detail, especially
    if you also turn up the amount of puffiness, as shown in [Figure 3-11](#Chapter03.html#fig_3_11).
    Increasing both blur and puffiness can also erase the appearance of depth.


    ![images](images/0311.jpg)


    **Figure 3-11.** Body Dysmorphia Toy showing the user fully puffed and blurred


    Remember that the `Kinect` has a limited usable range of about 2′ to 20′. Therefore,
    if you get too close or far away from the sensor, the dysmorphia filter will not
    work. The ideal range for using this application is around 5′ to 10′.


    Next to the key along the bottom edge of your screen, you will find the gray scale
    depth map that the infrared sensor has produced. Anything outside the recordable
    range of the `Kinect` will appear in black, as shown in [Figure 3-12](#Chapter03.html#fig_3_12).
    You can use this guide and know that anything appearing in black will be clipped
    and unaffected by the dysmorphia filter.


    ![images](images/0312.jpg)


    **Figure 3-12.** The Body Dysmorphia Toy applies puffiness to the user on the
    left within the range of depth sensor, but not to the user on the right who is
    too close to the sensor.


    You can also control what is viewable on your screen by adjusting the clipping
    plane. You can make adjustments to decrease the usable depth as an easy way to
    isolate your subject from an object-filled background. Simply adjust the clipping
    plane to include only the subject you are interested in, cutting out elements
    from the foreground or background you’d like to discard, as shown in [Figure 3-13](#Chapter03.html#fig_3_13).


    ![images](images/0313.jpg)


    **Figure 3-13**. Body dysmorphia application used to clip information from the
    background


    `Hodgin`’s body dysmorphia app shows how a novel, yet very straightforward use
    of the camera and depth map data stream can provide an entertaining experience
    without even using gesture recognizers and body data mappings. The next app we
    will show will reveal another level of usage for the same data when matched with
    more sophisticated algorithms for 3-D scene reconstruction.'
