    RGBDemo-0.6.1-Darwin.dmg 吗？”的消息。RGBDemo 中没有任何会损害你计算机的东西，所以请放心。


    文件下载完成后，点击它展开成磁盘映像。生成的磁盘映像（图 1-19 底部）将包含两个文件夹。将`RGBDemo`文件夹拖到`Applications`（应用程序）文件夹中。然后，导航到`Applications`文件夹，找到`RGBDemo`并进入。进入后，你会看到该目录中所有文件和文件夹的列表（图
    1-20）。就是这么简单。


    ![images](img/0119.jpg)


    ***图 1-19.*** `RGBDemo-0.6.1-Darwin.dmg` *下载及生成的磁盘映像，其中包含 RGBDemo 文件夹和指向应用程序的链接*


