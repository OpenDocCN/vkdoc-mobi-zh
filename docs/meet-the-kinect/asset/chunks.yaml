- fmt: '### Plugging in the Kinect


    Congratulations! You are done installing. Now, for the fun part—you are ready
    to plug the Kinect into your computer. Refer back to [Figure 1-4](#Chapter01.html#fig_1_4)
    for a visual overview of the cords involved in this next series of steps. Take
    the special male USB plug directly on the Kinect and plug it into the female USB
    connector on the AC adapter cable. Plug the AC adapter into a wall outlet, and
    then plug the standard USB connector into a USB port on your computer. This should
    look something like [Figure 1-3](#Chapter01.html#fig_1_3) but instead of unplugging
    from an Xbox you are plugging into your computer. You may see the Kinect’s LED
    indicator turn on or blink. Now, go ahead and point the Kinect at yourself from
    a distance of about two feet.


    Once you have plugged in the Kinect, you may see various system notifications
    ([Figure 1-18](#Chapter01.html#fig_1_18), bottom) about driver software installation.
    Depending on your system configuration, you may see individual notifications for
    the motor, cameras, and Xbox NUI Audio. This could take a while, so please be
    patient. Windows may be unable to find the audio drivers because these sensor
    drivers are only for the PrimeSense-related components of the Kinect ([Figure
    1-18](#Chapter01.html#fig_1_18), top). When Microsoft licensed the design, they
    added their own array of four microphones (See F-I in [Figure 1-6](#Chapter01.html#fig_1_6))
    on top of the PrimeSense reference specification. Microsoft has yet to distribute
    third-party drivers for the audio components on Windows; however, they provide
    full audio support in their official SDK. Therefore, if prompted to locate audio
    drivers, select the choice labeled `Don’t show this message again for this device`
    and don’t worry about Windows not finding the Xbox `NUI Audio` device ([Figure
    1-18](#Chapter01.html#fig_1_18), top)—this is normal.


    ![images](images/0118.jpg)


    ***Figure 1-18.** Xbox NUI Audio driver not found message and system tray notification*


    If you are running Windows Vista, you will probably be prompted to restart; go
    ahead and do that. When you return to Windows, it will show a screen saying it
    is configuring updates and warn you not to turn off your computer. It could take
    a while depending on your system. When it’s done, you’ll finally be able to tinker
    around with the Kinect on your computer!


    Navigate to the RGBDemo folder on your desktop and launch the `rgbd-viewer` application
    ([Figure 1-12](#Chapter01.html#fig_1_12), last item in directory). A black command
    prompt window will appear with the message `Setting resolution to VGA`. This is
    normal and should be followed by the graphical user interface window of RGBDemo
    ([Figure 1-21](#Chapter01.html#fig_1_21), later in the chapter).


    Now, skip to the “Testing your Kinect” section, as the following pages explain
    the download and installation process for Mac OS X. If you’re curious, take a
    look at the process as described in this section for Apple computer users.


    ### Downloading and Installing RGBDemo for Mac OS X


    RGBDemo is available for the Intel-based Macs and requires Snow Leopard or Lion.
    Unfortunately, PowerPC-based machines are not supported. Navigate to the RGBDemo
    site at [`http://labs.manctl.com/rgbdemo`](http://labs.manctl.com/rgbdemo) and
    locate the `Mac Binaries` link.


    The file is hosted at SourceForge, and will download automatically, as pictured
    in [Figure 1-19](#Chapter01.html#fig_1_19). You may need to confirm by clicking
    `Yes` in response to a message such as `This type of file can harm your computer.
    Are you sure you want to download RGBDemo-0.6.1-Darwin.dmg`? There’s nothing in
    RGBDemo that will harm your computer, so don’t worry.


    Once the file has finished downloading, click it so it will expand into a disk
    image. The resulting disk image ([Figure 1-19](#Chapter01.html#fig_1_19), bottom)
    will contain two folders. Drag the `RGBDemo` folder onto the `Applications` folder.
    Then, navigate to the `Applications` folder, find `RGBDemo`, and navigate into
    it. Once inside, you’ll see a listing of all the files and folders in that directory
    ([Figure 1-20](#Chapter01.html#fig_1_20)). It’s that simple.


    ![images](images/0119.jpg)


    ***Figure 1-19.*** `RGBDemo-0.6.1-Darwin.dmg` *download and resulting disk image
    containing RGBDemo folder and link to Applications*


    Congratulations! You are done installing. Now, for the fun part—you are ready
    to plug the Kinect into your computer. Refer to [Figure 1-4](#Chapter01.html#fig_1_4)
    for a visual overview of the cords used in this next series of steps. Take the
    special male USB plug on the Kinect and plug it into the female USB connector
    on the AC adapter cable. Plug the AC adapter into a wall outlet, and then plug
    the standard USB connector into a USB port on your computer. This should look
    something like [Figure 1-3](#Chapter01.html#fig_1_3), but instead of unplugging
    from an Xbox, you are plugging into your computer. You should see the Kinect’s
    LED indicator turn on or blink.


    Now, point the Kinect at yourself from a distance of about two feet. Let’s launch
    the `rgbd-viewer` application as shown in [Figure 1-20](#Chapter01.html#fig_1_20).
    You are ready to test the Kinect on yourself! You should see the RGBDemo user
    interface as pictured in [Figure 1-21](#Chapter01.html#fig_1_21). This is the
    end of the section on downloading and installing RGBDemo for Mac OS X. The rest
    of this chapter applies for both Windows and Apple computers. Well done!


    ![images](images/0120.jpg)


    ***Figure 1-20.** The complete directory of files in the RGBDemo folder, with
    the* `rgbd-viewer` *application selected*'
