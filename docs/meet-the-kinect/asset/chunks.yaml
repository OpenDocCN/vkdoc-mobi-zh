    USB 公头插入交流电源适配器线缆上的 USB 母头。将交流电源适配器插入墙上的电源插座，然后将标准 USB 接头插入计算机的 USB 端口。此时外观应类似图
    1-3，但不同的是你并非从 Xbox 上拔下线缆，而是连接到计算机。你应该会看到 Kinect 的 LED 指示灯亮起或闪烁。


    现在，将 Kinect 对准自己，距离约两英尺。启动`rgbd-viewer`应用程序，如图图 1-20 所示。你已经准备好用 Kinect 测试自己了！你应该会看到如图图
    1-21 所示的 RGBDemo 用户界面。至此，为 Mac OS X 下载并安装 RGBDemo 的部分结束。本章的其余部分适用于 Windows 和苹果电脑。干得好！


    ![images](img/0120.jpg)


    ***图 1-20.** RGBDemo 文件夹中的完整文件目录，其中* `rgbd-viewer` *应用程序已被选中*

