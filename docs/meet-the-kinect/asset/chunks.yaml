  raw: '#### Download, Install, Explore


    If you’re familiar with other IDEs, such as Visual Studio, Xcode, Eclipse, or
    even Adobe products like DreamWeaver, this is going to be the easiest setup of
    a programming environment you’ve ever experienced! If this is your first IDE,
    well, suck it up. It doesn’t get any easier. In this section, we’re going to download
    and install Processing, run some quick test code to make sure everything works,
    and then explore the setup of the IDE, the filesystem, and some of the included
    sample sketches so you get a sense of what Processing can do, and what you can
    do with Processing plus Kinect.


    To download Processing, browse to [`http://processing.org/download`](http://processing.org/download),
    where you’ll find download packages for each of the major operating systems (Windows,
    Mac OS X, and Linux) and a second Windows download for those of you who want to
    set up and use your own JVM separate from the included one (not recommended).
    Click the download link appropriate for you.


    Unlike many pieces of software you may have installed before, there’s no separate
    installer program with Processing. After you download it, you simply need to uncompress
    any compressed files, move them to wherever you keep applications on your computer
    (usually `C:\Program Files\Processing\` on Windows, `/Applications/Processing/`
    on Mac OS X, or `~/Applications/` on Linux), and launch the program. You’re done!
    Well, almost.


    It’s a good idea to try building some super simple script to make sure everything’s
    in working order, so let’s do that. When you launch Processing, you’ll see a blank
    code window, like that in [Figure 4-1](#Chapter04.html#fig_4_1), open to a new
    “sketch.” Let’s run our first script to make sure we’re set up correctly. Write
    these five lines of code into the code window, as shown in [Figure 4-1](#Chapter04.html#fig_4_1),
    and click `Run`. The `Run` button is the circular “play” button at the top left
    corner of the application window. You should see results like those in [Figure
    4-2](#Chapter04.html#fig_4_2).


    `size(800, 600);`

    `fill(255, 0, 0);`

    `rect(10, 10, 10, 10);`

    `text("Hello World", 25, 20);`

    `print("It works!");` ![images](images/0401.jpg)


    ***Figure 4-1.** Processing’s application window*


    ![images](images/0402.jpg)


    ***Figure 4-2.** The output of our “Hello World” example*


    Our little example script generated a new application window that’s 800 pixels
    wide by 600 pixels tall. It then drew a 10-pixel-by-10-pixel red rectangle in
    the window starting at (10, 10) in (x, y) coordinate space and rendered the text
    “Hello World” next to that rectangle. Finally, our script printed a success message
    to the console. Got it? Good. Let’s go just a tad deeper in preparation for using
    Processing to control the Kinect.


    #### Processing Libraries and Sketches


    Since we’re going to spend some time with Processing in this chapter writing scripts
    and adding Kinect libraries written by third parties, you will not regret taking
    a little time now to browse the dozens of useful libraries and example sketches
    included with the main Processing distribution. These examples will give you an
    idea of how Processing works and what its capabilities are, as well as how the
    larger Processing user community has extended those capabilities to create a formidable
    free software platform for programming interactivity.


    ##### Included Examples


    Start by taking a gander at the extensive list that opens under `File  Examples`...
    It should look something like the list shown in [Figure 4-3](#Chapter04.html#fig_4_3).
    Open one of the sketches under “Topics” that seems interesting to you. Want to
    render cool visual effects? Check out the Firecube example under “Effects.” Looking
    to build your own graphical user interface (GUI)? See how simple button and scrollbar
    elements are implemented under the “GUI” topic. How about eerily complex and cool
    physics? Try a bunch of the “Motion” examples.


    ![images](images/0403.jpg)


    ***Figure 4-3.** The “palette” of examples in Processing*


    Once you’ve seen enough to convince you that Processing is worth your while, let’s
    take a last peek under the hood before connecting the Kinect. Specifically, let’s
    look at Processing’s file organization and how to extend the functionality of
    the application ourselves using freely available code libraries on the Web.


    ##### Adding Libraries


    A nice-but-not-comprehensive index of Processing libraries lives at [`http://www.processing.org/reference/libraries/`](http://www.processing.org/reference/libraries/)`.`
    There are some great libraries for helping your Processing code interface with
    hardware, do advanced 3D work, and tie into other massively useful non-Processing
    code bases such as OpenCV, the open source computer vision library. If you use
    Processing again, you’ll no doubt want to know how to add some of this free contributed
    code.


    When you first launched Processing, a new sketch was created with the naming convention
    `sketch_datex`. If you’re following along, you created a 5-line “Hello World”
    script. Now, let’s save that sketch to our “Sketchbook.” Go ahead and click `Save`.
    Processing creates a sketchbook folder inside your operating system’s main documents
    folder, something like `C:\My Documents\Processing\ on Windows and /Documents/Processing`
    on Mac OS X, depending on how your system is set up. In Processing’s “Preferences”
    pane, you can see—and change—the location of the sketchbook on the filesystem.
    In any case, find out where it is and browse to that location.


    Your Processing sketchbook is just a folder that contains any sketches or libraries
    you’ve created or added from third parties. You should now see a folder inside
    it called `sketch_datex`, or whatever you named your sketch if you gave it a name.
    Every Processing sketch gets its own folder, which helps keep all related files
    and assets together.


    Since you haven’t yet added any contributed libraries to Processing, you won’t
    have a “libraries” folder in your sketchbook folder. Let’s fix that now. Create
    a folder inside your sketchbook folder called “libraries.” Note that you must
    name this folder “libraries,” as that is the specific name that Processing looks
    for. In the next section, you will drop downloaded Kinect library files into it,
    relaunch Processing, and voila! The libraries will be installed. Every time Processing
    starts up, it searches the sketchbook folder for stuff to load. Sketches are arranged
    in the fly-out menus under File Sketchbook. Contributed libraries are arranged
    under Sketch>Import Library...>Contributed. Whenever you add files to the sketchbook
    and libraries folders like this, you have to relaunch Processing for the new libraries
    to become available to your sketches and show up in the menu. Without further
    ado, let’s add Kinect libraries and start scripting the Kinect!'
  trans: '

    #### 下载、安装与探索


    如果你已经熟悉其他 IDE，如 Visual Studio、Xcode、Eclipse，甚至是 DreamWeaver 等 Adobe 产品，那么这将成为你经历过的最简单的编程环境搭建过程！但如果这是你第一次使用
    IDE，那就咬咬牙忍忍吧，没有比这更简单的了。在本节中，我们将下载并安装 Processing，运行一些快速测试代码以确保一切正常，然后探索 IDE 的配置、文件系统以及一些内置的示例草图，以便你了解
    Processing 能做什么，以及你能用 Processing 和 Kinect 做什么。


    要下载 Processing，请访问 [`http://processing.org/download`](http://processing.org/download)，在那里你可以找到针对各大主流操作系统（Windows、Mac
    OS X 和 Linux）的下载包，此外还有一个针对 Windows 的额外下载选项，供那些希望设置并使用独立于内置 JVM 的用户使用（不推荐）。点击适合你的下载链接。


    与你之前可能安装过的许多软件不同，Processing 没有单独的安装程序。下载后，你只需解压所有压缩文件，将它们移动到计算机上存放应用程序的任意位置（通常在
    Windows 上是 `C:\Program Files\Processing\`，在 Mac OS X 上是 `/Applications/Processing/`，在
    Linux 上是 `~/Applications/`），然后启动程序即可。大功告成！嗯，差不多。


    最好尝试构建一个超级简单的脚本，以确保一切运行正常，那我们就开始吧。启动 Processing 后，你会看到一个空白的代码窗口，就像图 4-1 所示，打开了一个新的“草图”。让我们运行第一个脚本来确认配置正确。在代码窗口中写入以下五行代码，如图
    4-1 所示，然后点击 `Run`。`Run` 按钮是应用程序窗口左上角的圆形“播放”按钮。你应该会看到类似图 4-2 所示的结果。


    ```

    size(800, 600);

    fill(255, 0, 0);

    rect(10, 10, 10, 10);

    text("Hello World", 25, 20);

    print("It works!");

    ```


    ![images](img/0401.jpg)


    ***图 4-1.** Processing 的应用程序窗口*


    ![images](img/0402.jpg)


    ***图 4-2.** 我们的“Hello World”示例的输出*


    我们的小示例脚本生成了一个宽 800 像素、高 600 像素的新应用程序窗口。然后它在窗口中以 (x, y) 坐标空间的 (10, 10) 为起点绘制了一个
    10x10 像素的红色矩形，并在该矩形旁边渲染了文本“Hello World”。最后，脚本在控制台打印了一条成功消息。明白了吗？很好。为了使用 Processing
    控制 Kinect，我们再深入准备一点。


    #### Processing 库与草图


    由于我们将在本章中花一些时间使用 Processing 编写脚本并添加由第三方编写的 Kinect 库，现在花点时间浏览 Processing 主发行版中包含的数十个有用库和示例草图，你将不会后悔。这些示例将让你了解
    Processing 的工作原理及其能力，以及更广泛的 Processing 用户社区如何扩展这些能力，从而创建一个强大的、用于编程交互的自由软件平台。


    ##### 内置示例


    首先，浏览 `File  Examples` 下打开的大量列表……它应该像图 4-3 所示的列表。打开“Topics”下你感兴趣的一个草图。想要渲染炫酷的视觉效果？请查看“Effects”下的
    Firecube 示例。想要构建自己的图形用户界面 (GUI)？看看“GUI”主题下是如何实现简单的按钮和滚动条元素的。对复杂而炫酷的物理效果感兴趣？试试“Motion”示例中的几个。


    ![images](img/0403.jpg)


    ***图 4-3.** Processing 中的示例“调色板”*


    一旦你看到足够多的内容，确信 Processing 值得你投入时间，那么我们在连接 Kinect 之前最后再窥探一下内部原理。具体来说，让我们看看 Processing
    的文件组织方式，以及如何利用网络上的免费代码库自行扩展应用程序的功能。


    ##### 添加库


    Processing 库的一个全面但不完整的索引位于 [`http://www.processing.org/reference/libraries/`](http://www.processing.org/reference/libraries/)。有一些很棒的库可以帮助你的
    Processing 代码与硬件交互、进行高级 3D 工作，并连接到其他极其有用的非 Processing 代码库（例如开源计算机视觉库 OpenCV）。如果你再次使用
    Processing，你无疑会想知道如何添加这些免费贡献的代码。


    当你首次启动 Processing 时，会创建一个以命名约定 `sketch_datex` 命名的草图。如果你一直跟着操作，你已经创建了一个 5 行的“Hello
    World”脚本。现在，让我们将该草图保存到“Sketchbook”中。继续点击 `Save`。Processing 会在操作系统的文档主文件夹内创建一个
    sketchbook 文件夹，具体位置取决于系统设置，例如 Windows 上的 `C:\My Documents\Processing\` 和 Mac OS
    X 上的 `/Documents/Processing`。在 Processing 的“Preferences”面板中，你可以查看并更改 sketchbook
    在文件系统中的位置。无论如何，请找到它的位置并浏览到该路径。


    你的 Processing sketchbook 只是一个文件夹，其中包含你创建或从第三方添加的任何草图或库。你现在应该会看到其中有一个名为 `sketch_datex`
    的文件夹，或者如果你给草图命名了，则显示你命名的名称。每个 Processing 草图都有自己的文件夹，这有助于将所有相关文件和资源保存在一起。


    由于你尚未向 Processing 添加任何贡献库，因此你的 sketchbook 文件夹中不会有“libraries”文件夹。现在让我们解决这个问题。在你的
    sketchbook 文件夹中创建一个名为“libraries”的文件夹。请注意，你必须将此文件夹命名为“libraries”，因为这是 Processing
    查找的特定名称。在下一节中，你将把下载的 Kinect 库文件放入其中，重新启动 Processing，瞧！库就安装好了。每次 Processing 启动时，它都会搜索
    sketchbook 文件夹中的内容进行加载。草图会排列在 File > Sketchbook 下的弹出菜单中。贡献库则排列在 Sketch > Import
    Library... > Contributed 下。每当你像这样向 sketchbook 和 libraries 文件夹添加文件时，都必须重新启动 Processing，新库才能在你的草图中可用并显示在菜单中。事不宜迟，让我们添加
    Kinect 库并开始为 Kinect 编写脚本吧！

    '
- fmt: '#### Finally Kinecting


    Unfortunately, here is where PC, Mac, and Linux users must part ways. As of this
    writing, there’s no single Kinect library for Processing that does it all on all
    platforms. But that will change (if it hasn’t already by the time you read this)!
    Processing is constantly being extended by a devoted community of hackers, and
    there’s a particularly active group dedicated to unleashing the power of Kinect
    and Kinect-like sensors. Once you feel comfortable with how this works, you might
    even take a look around [`http://www.processing.org/reference/libraries/`](http://www.processing.org/reference/libraries/)
    for Kinect projects other than the ones we use below.


    We use two Kinect-for-Processing libraries here: `dLibs` for Windows by Thomas
    Diewald and `openkinect` for Mac by Daniel Shiffman. Both of these projects implement
    partial functionality of the Kinect using the drivers and libraries that are part
    of the open source `libfreenect` project, the pinnacle accomplishment (so far!)
    of the OpenKinect community at [`http://openkinect.org`](http://openkinect.org)
    and mentioned in the Introduction. Although much of this book covers codebases
    that originated in commercial enterprises and are partly or completely proprietary,
    this chapter is built entirely on free and open source software (FOSS) shared
    by talented hackers all over the world. Before jumping into the Windows-, Mac-,
    and Linux-specific directions to follow, bask in the glow of that!


    ### Kinect for Processing on Windows


    Now that we’ve installed Processing, getting Kinect to work with it on your PC
    is a simple matter of installing some compatible drivers and running some example
    code. For this, we turn to Thomas Diewald’s `dLibs` project.


    #### Adding dLibs


    Let’s do this. Browse to the `dLibs` code repository on GitHub: [`https://github.com/diwi/dLibs`](https://github.com/diwi/dLibs).
    Click “Downloads” and select the `.zip` package to download somewhere on your
    computer. Unzip the folder and inside you’ll see a `README` document and a folder
    called `dLibs_freenect`. Copy or move the whole `dLibs_freenect` folder into your
    newly-minted `libraries` folder inside Processing’s sketchbook folder. Now, do
    the exact same thing with Jonathan Feinberg’s `PeasyCam` library, which `dLibs`
    uses in some of its included examples. Download the zip archive from [`http://mrfeinberg.com/peasycam/#download`](http://mrfeinberg.com/peasycam/#download)
    and move `peasycam` into your `libraries` folder. Whew! That’s a lot of folder
    shuffling, but that’s it! Relaunch Processing and you should see `dLibs_freenect`
    and `peasycam` now available to you under Sketch → Import Library... → Contributed.


    #### Updating Drivers


    We can’t use the library until we’ve updated our Kinect drivers to the `libfreenect`
    ones it expects. If you already installed some Kinect drivers for Windows (e.g.,
    to run `RGBDemo` in Chapter 1), we’re going to update them here to use `libfreenect`.
    Fortunately, they come precompiled and included with the `dLibs` download. Unfortunately,
    you will probably also need to install the free, 5MB Microsoft Visual C++ 2010
    Redistributable Package, which provides the runtime components necessary to use
    software compiled with Visual C++ 2010, which these `libfreenect` files were (please
    note that you do not need this package if you already have Visual C++ 2010 installed).
    Grab it at [`http://www.microsoft.com/download/en/details.aspx?id=5555`](http://www.microsoft.com/download/en/details.aspx?id=5555)
    or search “Microsoft Visual C++ 2010 Redistributable Package” if the link has
    changed. Download the package and run the installer.


    Now, make sure the Kinect is plugged into the PC with the power cord connected
    to the wall socket. When the hardware is connected, Windows will launch a wizard
    to install drivers for the three components—XBox NUI Motor, XBox NUI Audio, and
    XBox NUI Camera—or if you already installed some drivers or otherwise, put the
    kibosh on the search. You can launch the wizard yourself from the Device Manager
    (Control Panel → System → Device Manager). Find the three “XBox” components, probably
    under “Human Interface Components” (if already installed) or with big yellow question
    marks on them under “Other” (if not installed). If you have previously installed
    other Kinect drivers either with OpenNI or the Microsoft Kinect SDK, you may see
    these devices set up under different headings in the Device Manager. Right-click
    on each of the components and select “Update Driver Software...” As of this writing,
    Windows will not find drivers for the Kinect using Windows Update, and you don’t
    want it to. Instead, steer the driver installation wizard to the `kinect_driver_windows`
    folder inside `dLibs_freenect/library`. Once all three drivers are added, we’re
    ready to launch one of the `dLibs` samples.


    #### Running the Pointcloud Example


    In Processing, under Processing → Examples..., you should now see some additional
    examples under the contributed libraries. For comparison with `RGBDemo` from Chapter
    1, let’s look first at the `dLibs` “pointcloud” example: `kinect_basic_3d_pointcloud`


    Open and run the example. Right out of the box, the output of the sketch should
    look like Figure 4-4. If you click and drag inside the window or use your mouse
    scroll wheel, you can alter the “camera” perspective on the image/depth data (thanks
    to `PeasyCam`!) to something like that shown in Figure 4-5. You’ll notice that
    the output of this sketch is a lot like that of `RGBDemo` in Chapter 1, only now
    you can see the script and edit it right in Processing!


    ![images](images/0404.jpg)


    ***Figure 4-4.** The dLibs pointcloud sketch, run as is*


    ![images](images/0405.jpg)


    ***Figure 4-5.** The dLibs pointcloud sketch with the perspective changed by clicking
    and dragging inside the window*'
