    interoperability of Natural Interaction (NI) devices, applications, and middleware.”
    To carry out this mission, and with the strong support of PrimeSense, the organization
    has created an open source framework called OpenNI that provides an application–programming
    interface (API) for writing applications that use natural interaction. The API
    covers communication with low–level devices, such as vision and audio sensors,
    as well as high–level middleware solutions for visual tracking using computer
    vision.


    OpenNI provides access to all of the data available through the Libfreenect driver.
    It also provides benefits such as methods for converting from projective x, y
    coordinates of the depth map back to real world x, y, and z coordinates in centimeters.
    This makes it easier to acquire a point cloud and generate alternate viewpoints
    in a scene from synthesized camera views (see [Figure 2-12](#Chapter02.html#fig_2_12)).
    Additionally this software provides the ability to track multiple people, and
    extract their gestures from skeletal body data.


    ![images](images/0212.jpg)


    ***Figure 2-12.** Upper row, point cloud rotated to show alternate viewpoints.
    Lower row, source RGB, depth, and IR map images for point cloud scene.*


    #### Commercial Drivers


    The various software development kits designed to build applications for natural
    interaction all come with their own series of drivers for Kinect and have other
    depth sensors built in. SoftKinetic’s issu, Omek Interactive’s Beckon, and Gesturetek’s
    GestTrack3D have their own implementations and may have varying ways of working
    with the device. In terms of the microphone array inside Kinect, Microsoft’s drivers
    for Windows contain features not available in other drivers. Microsoft’s Kinect
    SDK is not yet licensable for commercial use, but we expect that situation to
    change early in 2012 when Microsoft releases a commercial version of their SDK.


    ### Middleware and Application Development Environments


    The last major component of the stack is the so–called Middleware – various modules
    of software that act on sensor data and produce new functionality that an application
    can use. This type of functionality may be incorporated into integrated application
    development environments so the degree to which you are made aware of them as
    separate middleware modules depends on the software environment you are using
    to design your application.


    The ability to segment the depth map into isolated users ([Figure 2-13](#Chapter02.html#fig_2_13),
    left) that are separated from the background, or to extract and track a user’s
    hand ([Figure 2-13](#Chapter02.html#fig_2_13), right) are functional time–saving
    modules that can help you develop applications more quickly, and that dramatically
    reduce your codebase’s size.


    ![images](images/0213.jpg)


    ***Figure 2-13.** Left, user segmentation tracking two people. Right, demonstration
    of a point tracking a hand*


    The details of how to interface with this functionality may be different depending
    on the development environment you chose to work in. However, the underlying concepts
    are similar. Skeletal tracking middleware can track a user by segmenting that
    user into a skeleton with a series of “body data” joints. These joints can be
    assigned matching values in your application for puppeting a character or to listen
    for recognizable gestures.


    As we move on to [Chapter 3](#Chapter03.html#ch3) and review applications in the
    wild, make note of how the programmers have used the methods we’ve identified
    in this chapter. Now that you’re aware of how the technology works, you’ll have
    a better idea of how to start making your own motion– and depth–aware apps.


    ## C H A P T E R  3'
  trans: '

    #### `OpenKinect/Libfreenect`


    OpenKinect 项目的 `libfreenect` 开源驱动是首个可供普遍使用的 Kinect 驱动，也是许多项目的基础。OpenNI 驱动框架发布后，许多项目放弃了对
    `libfreenect` 的依赖，转而使用 OpenNI 驱动，因为它们能更灵活地更换其他硬件，并且提供了更强大的功能集来构建应用。尽管如此，许多程序员仍选择使用
    `libfreenect` 驱动，因为它易于重新分发，无需用户下载依赖软件。


    `Libfreenect` 以图像形式提供对 Kinect 三组主要数据的访问。最重要的数据是原始深度图（图 2-9）。这是 `libfreenect` 为你的应用提供深度信息的唯一方式。该图像编码为
    11 位深度，其强度值映射到与摄像头的特定距离。最原始的数据以灰度显示，但大多数工具会选择以彩色图像显示，以便在视觉上区分距离。


    ![images](img/0209.jpg)


    **图 2-9.** `Libfreenect` 的深度图。每种颜色代表与摄像头的不同距离。


    `libfreenect` 驱动还通过最右侧的摄像头（图 2-10）为你的应用提供原始红外图像。该驱动使用摄像头的直接数据流，该摄像头专门用于捕捉红外投影仪发出的光点。因此，图像中充满了散布在场景物体周围的斑点图案。由于红外图用于生成深度图，将两者结合生成点云视图，可以提供校准良好的
    3D 表示。然而，这种表示需要进行校准。这种校准的需求是使用 `Libfreenect` 驱动令人困扰的方面之一——OpenNI 则为深度数据提供了校准后的
    RGB 数据映射。


    ![images](img/0210.jpg)


    **图 2-10.** `Libfreenect` 的红外图。红外投影仪将斑点投射到场景上。


    `Libfreenect` 提供的最后一项图像数据是来自 Kinect 中间摄像头的可见光 RGB 图像（图 2-11）。该 RGB 摄像头提供了视觉数据，你可以利用这些数据，通过
    OpenCV 等计算机视觉软件对场景进行计算，例如进行面部识别。正如你将在第 3 章中看到的“身体畸形玩具”和“奥特曼 / 龟派气功”应用，这些视觉数据也可以反馈到你开发的软件中，以提供增强现实视图。你的应用还可以将
    RGB 图像数据与深度图对齐，生成点云，从而像“3D Capture-It”那样重建场景，这部分内容也将在第 3 章中介绍。


    ![images](img/0211.jpg)


    **图 2-11.** `libfreenect` 的 RGB 图


    除了基于图像的传感器数据外，`Libfreenect` 还允许访问嵌入在 Kinect 中的 3 轴加速度计芯片。这对于设计需要用户手动移动 Kinect
    的手持应用可能很有帮助，正如第 3 章中的 MatterPort 所做的那样。`Libfreenect` 允许你的应用读取数据，同时还能控制 Kinect
    的执行器。LED 灯可以按你的设计变换不同颜色并开关。Kinect 的头部可以使用电机控制功能上下倾斜 30 度。


    #### `OpenNI`


    正如 `www.OpenNI.org` 所述，“OpenNI 组织是一个由行业领导、非盈利的组织，旨在认证并促进自然交互设备、应用和中间件的兼容性与互操作性。”为了执行这一使命，并在
    PrimeSense 的大力支持下，该组织创建了一个名为 OpenNI 的开源框架，它提供了应用程序编程接口，用于编写使用自然交互的应用。该 API 涵盖了与低级设备（如视觉和音频传感器）的通信，以及用于使用计算机视觉进行视觉追踪的高级中间件解决方案。


    OpenNI 提供了对 `Libfreenect` 驱动中所有可用数据的访问。它还提供了诸如将深度图的投影 x、y 坐标转换回以厘米为单位的真实世界 x、y、z
    坐标等方法。这使得获取点云以及从合成摄像头视角生成场景中的替代视点变得更容易（参见图 2-12）。此外，该软件还提供了追踪多人，并从骨骼身体数据中提取手势的能力。


    ![images](img/0212.jpg)


    **图 2-12.** 上一行，点云旋转以显示替代视点。下一行，点云场景的源 RGB、深度和红外图。


    #### 商业驱动


    各种旨在为自然交互构建应用的软件开发工具包都带有自己系列针对 Kinect 的驱动，并且内置了其他深度传感器。`SoftKinetic` 的 `issu`、`Omek
    Interactive` 的 `Beckon` 以及 `Gesturetek` 的 `GestTrack3D` 都有自己的实现方式，并且可能有不同的设备交互方式。就
    Kinect 内部的麦克风阵列而言，微软的 Windows 驱动包含其他驱动所不具备的功能。微软的 Kinect SDK 目前还不能用于商业用途许可，但我们预期这种情况将在
    2012 年初微软发布其 SDK 的商业版本时发生变化。


    ### 中间件和应用开发环境


    技术栈的最后一个主要组件是所谓的中间件——各种作用于传感器数据并产生应用可用的新功能的软件模块。这类功能可能会被整合到集成应用开发环境中，因此你对它们作为独立中间件模块的感知程度取决于你设计应用时所使用的软件环境。


    将深度图分割成与背景分离的独立用户（图 2-13，左），或提取并追踪用户的手（图 2-13，右）的能力，是功能性省时模块，可以帮助你更快地开发应用，并显著减少代码库的规模。


    ![images](img/0213.jpg)


    **图 2-13.** 左，用户分割追踪两个人。右，点追踪手的演示。


    与这些功能交互的细节可能会因你选择的开发环境而异。然而，底层概念是相似的。骨骼追踪中间件可以通过将用户分割成一个带有系列“身体数据”关节的骨骼来追踪用户。在你的应用中，这些关节可以被分配相应的值，用于控制角色或监听可识别的手势。


    当我们进入第 3 章并回顾实际应用时，请注意程序员是如何使用我们在本章中介绍的方法的。既然你已经了解了这项技术的工作原理，你将更清楚地知道如何开始创建自己的运动和深度感知应用。


    ## 第 3 章

