- fmt: "### Running the ZigFu Game Examples\n\nGo to your `Project` folder and open\
    \ the folder called `_Scenes`. These are the ZigFu-created scenes, which are examples\
    \ demonstrating OpenNI functionality. Some of these you need two people to actually\
    \ use, so be prepared to get a friend to help at some point to run the multiplayer\
    \ examples.\n\nZigFu divides examples into two categories: game and interface.\
    \ We'll go over the game examples first, in this section, and then the interface\
    \ examples.\n\n#### Avatar2Players\n\nDouble-click `Avatar2Players` (two people\
    \ required). You should see two soldiers standing side by side on a floor, as\
    \ shown in [Figure 7-6](#Chapter07.html#fig_7_6). If you cannot see them in your\
    \ `Scene` tab, adjust the view until you do see them. You can select a soldier\
    \ in your `Hierarchy` tab and press `F` on your keyboard. Scene view will now\
    \ focus on the selected object.\n\n![images](images/0706.jpg)\n\n***Figure 7-6.**\
    \ The Avatar2Players game*\n\nOpenNI is not tracking a player yet. That's because\
    \ you need to play each scene to start the tracking. Press the black `Play` button\
    \ now.\n\nYou will now see a little yellow view port in the bottom of your `Game`\
    \ tab. Make sure that you and your fellow player are both visible in the camera\
    \ view. You both need to stand in the calibration pose to calibrate OpenNI. This\
    \ pose is exactly like the stick 'em up pose in a bank robbery. Both hands up\
    \ now, please!\n\nMake sure your elbows are parallel to your shoulders and your\
    \ hands are at the same height. After the Kinect catches you and your partner\
    \ as the players, you will see the 3D model jump into your body positions.\n\n\
    ![images](images/square.jpg) **Note** OpenNI is removing the calibration pose\
    \ by the end of 2011. If you are reading this chapter after then, you might not\
    \ need to do a calibration pose. Dance around and see if you are tracked. If you\
    \ are, then good. If not, then try the calibration pose.\n\nLet's now look a little\
    \ bit deeper into this scene from [Figure 7-6](#Chapter07.html#fig_7_6) and how\
    \ to navigate around it. Do the following:\n\n1.  Click `Soldier` in the `Hierarchy`\
    \ tab.\n2.  Direct your attention to the right `Inspector` tab.\n3.  Turn down\
    \ the arrow next to `OpenNI Skeleton (script)`.\n\nNow visible is a list of all\
    \ the joints you can get access to with OpenNI and what game objects the joints\
    \ are attached to in Unity. Note how all the corresponding joints are mapped onto\
    \ the game objects. The script joints coming from OpenNI are on the left, and\
    \ the game objects in the scene are listed on the right. They have simply been\
    \ named to match the names of the joint they correspond to. Single-click any game\
    \ object joint on the right of the list, and you will see it jump to its associated\
    \ object listed in the `Hierarchy` tab. Double-clicking will open that object\
    \ up in the `Inspector`. To go back to the `Soldier`, simply single-click it in\
    \ the `Hierarchy` again.\n\nIn the `Hierarchy` tab, you will see all objects in\
    \ the game. In this example, there is a `Directional Light`, which is lighting\
    \ the scene. Next down in the list is the `Floor`. Click it to see the components\
    \ attached to this game object. The `Transform` component is on every game object.\
    \ Next, you will see the `Box Collider`, `Mesh Renderer` with the shaders for\
    \ the `Soldier`, and the floor and their respective `Normalmap`. A `Mesh Renderer`\
    \ takes the geometry from the `Mesh Filter` and renders it at the location defined\
    \ by an object's `Transform` component in the `Inspector`. A normal map, or normal\
    \ mapping, is a way to make an object look like it has a higher polygonal count\
    \ than it actually does by faking lighting and dents via a 2D file that's applied\
    \ to the mesh of an object. Creating normals, meshes, and textures is beyond the\
    \ scope of this tutorial, but is part of every 3D workflow. See the manual for\
    \ your 3D package to learn more.\n\nThe next object in the `Hierarchy` tab is\
    \ the `Main Camera`. Open this object and note that there is a ZigFu script applied\
    \ to it called `ExitOnEscape` that allows you to exit a game when you press `Escape`.\
    \ You can add this script to any scene where you want this behavior. The script\
    \ is specific just to this ZigFu example and not part of OpenNI.\n\n![images](images/square.jpg)\
    \ **Note** To add a script component to a game object, select the game object\
    \ in the `Hierarchy` tab to open up the object's list of components in the `Inspector`.\
    \ This is a very straightforward process, but it feels strange the first time\
    \ you do it. All you are doing is attaching a new component, a script component,\
    \ to your game object via dragging it into the `Inspector Window` with that game\
    \ object's components revealed. You expose an object's components whenever you\
    \ select it in the `Hierarchy` tab. If you need help, there are several tutorial\
    \ videos on YouTube. In addition, visit the Unity forums at [`www.unity3d.com`](http://www.unity3d.com).\
    \ The Unity community provides good support; the user forums are full of programmers\
    \ who are kind enough to help newbies out. If you ever get stuck in a jam, the\
    \ forums should be the first place you turn to for help.\n\nFollowing are some\
    \ of the scripts that you can add to a game object:\n\n> **ChangeColor** is for\
    \ changing the color of the boxes in the `ItemSelector` scene.\n> \n> **Exitonescape**\
    \ exits the game when `Escape` is pressed.\n> \n> **ObjectPeruser** simply instantiates\
    \ a `Prefab` for every detected user and is used in the `TopDownUserMap` scene.\n\
    > \n> **StartSessesionMessage** displays the “perform focus gesture to start session”\
    \ when you are not in a session.\n\nThe next object is the sensor object. Select\
    \ this object and notice that in the `Inspector` tab several OpenNI scripts are\
    \ attached. The sensor object itself is an empty game object. Unity allows you\
    \ to create empty game objects. This empty object was created to attach scripts\
    \ to it that run in the scene. These scripts are all related to OpenNI functionality,\
    \ and are as follows:\n\n> **Open NIUser Tracker:** Allows for Unity to track\
    \ users up to the maximum number of users OpenNI registers. There is no default\
    \ maximum number.\n> \n> **Open NIDepthMapViewer:** Simply displays the Kinect\
    \ depth map in your game when it is running. Remember it will not be visible until\
    \ the game is running.\n> \n> **OpenNIUsers Radar:** Pops a dark gray user tracker\
    \ box up on-screen in the game with a number attached to each specific user the\
    \ game registers. If you want to use this script in a newly created scene, you\
    \ must link this script to the `Open NIUser Tracker` in the `Inspector`.\n> \n\
    > **Open NISplit Screen Skeleton Control:** Allows users to have two players on-screen\
    \ at once. This might be helpful for a first-person shooter with a split screen.\n\
    \nThe final object in the `Hierarchy` is the `Soldier`. `Soldier` is a `Prefab`;\
    \ that's why it is blue. A `Prefab` is a collection of game objects and components\
    \ that can be used again and again in a game. They are saved in the `Project`\
    \ tab view. `Prefabs` are basic functionality in Unity.\n\n`Soldier` is actually\
    \ a ZigFu-created `Prefab` you can add to any scene. Look in the `Project` tab\
    \ and open the `OpenNI` folder and then the `Prefabs`. The `Prefab` `Soldier`\
    \ is located within. To add a `Prefab` to a scene, simply drag the `Prefab` from\
    \ the `Project` folder in the `Scene Viewer`."
