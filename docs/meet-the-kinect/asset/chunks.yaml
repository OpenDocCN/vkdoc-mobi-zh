  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。



    # 任务 2：制作基本骨架


    让我们开始创建第一个骨架吧。请遵循以下步骤：


    1.  从主菜单创建一个空的游戏对象。选择以下选项：主菜单 ![images](img/U001.jpg) 游戏对象 ![images](img/U001.jpg)
    创建空对象。

    2.  您的新空游戏对象现在将出现在层级（Hierarchy）选项卡中。选中该对象，并按 Ctrl+右键点击。选择重命名。将对象重命名为 `Custom Skeleton`。

    3.  现在，按如下方式创建一个新的球体对象：主菜单 ![images](img/U001.jpg) 游戏对象 ![images](img/U001.jpg)
    创建其他 ![images](img/U001.jpg) 球体。

    4.  现在，在层级（Hierarchy）中，将球体添加到 `Custom Skeleton` 中。只需选中球体并将其拖拽到 `Custom Skeleton`
    字样上。拖拽时会出现一个黑色箭头。当您看到黑色箭头时，松开鼠标。

    5.  `Custom Skeleton` 旁边应该有一个下拉箭头，球体应该位于其中。这个球体将作为我们的头部。让我们将其重命名为 `Head` 以保持一致。按
    Ctrl+右键点击，然后选择重命名选项进行重命名。

    6.  选中球体，使用移动工具将其向上移动。选中对象后，移动工具会自动激活。单击绿色箭头，将球体在 Y 轴空间向上移动。

    7.  对两只手重复步骤 3-6。创建两个新的球体，将它们添加到 `Custom Skeleton` 中，并重命名。然后定位它们。由于这些对象的位置实际上将由用户生成，因此这些位置仅在非播放模式下对游戏开发者有益。


    ![images](img/square.jpg) **注意**：这种创建作为更大对象一部分的对象的过程称为父级化。我们正在将球体对象作为子级添加到它们的父级
    `Custom Skeleton` 中。


    8.  为左肩和右肩创建两个立方体。执行与球体完全相同的操作，但选择创建立方体：主菜单 ![images](img/U001.jpg) 游戏对象 ![images](img/U001.jpg)
    创建其他 ![images](img/U001.jpg) 立方体。


    现在，层级（Hierarchy）选项卡应类似于 图 7-8 所示。


    ![images](img/0708.jpg)


    ***图 7-8.** 添加三个球体和两个立方体后的自定义骨架层级结构*


    通过照亮场景来结束此任务。通过从以下菜单选项添加一个方向光来实现：主菜单 ![images](img/U001.jpg) 创建其他 ![images](img/U001.jpg)
    方向光。


    ## 任务 3：将部件连接起来


    现在是通过链接游戏对象和组件来让骨架工作的时候了。具体操作如下：


    1.  首先，将 `Custom Skeleton` 游戏对象连接到 `OpenNI Skeleton`。（ZigFu 使这个过程几乎毫不费力。）转到项目（Project）选项卡，打开
    `OpenNI` 文件夹，然后打开 `Scripts` 子文件夹。滚动直到看到 `OpenNISkeleton`。选中它，并将其拖拽到 `Custom Skeleton`
    游戏对象上，就像我们对球体和立方体所做的那样。

    2.  接下来，您必须将 `Custom Skeleton` 中的对象（我们之前创建的形状）连接到 `OpenNISkeleton` 中相应的关节。在层级（Hierarchy）选项卡中选择
    `Custom Skeleton`。在检查器（Inspector）选项卡中，应该会有 `OpenNISkeleton` 的脚本。点击此脚本旁边的箭头以展开所有关节。在层级（Hierarchy）选项卡中选中并拖拽在
    Unity 中创建的 `Custom Skeleton` 下的 `Head`，将其拖到 `OpenNISkeleton` 脚本中的 `Head` 上。您的结果应类似于
    图 7-9。请特别注意图中底部列表的第二项，即 `Head` 项。


    ![images](img/0709.jpg)


    ***图 7-9.** 链接到 OpenNISkeleton 脚本的 Head 项*


    3.  对 `Right Hand`、`Left Hand`、`Right Shoulder` 和 `Left Shoulder` 重复步骤 2。如果检查器（Inspector）切换到层级（Hierarchy）中选中的对象（如立方体或球体），只需点击并稍微快一点拖拽即可。

    4.  在关节列表之后，有三个复选框，用于告知 Unity 如何相对于骨架移动这些对象的变换。按如下方式设置这些复选框：


    **更新关节位置：** 选中此框。此框允许对象的变换发生变化，以匹配骨架上关节的旋转。如果模型是在 3D 软件包中创建的，则无需选中此项，因为很可能不需要移动关节位置，只需旋转关节即可。


    **更新根位置：** 这将在 3D 空间中更新游戏对象（`Custom Skeleton`）相对于用户的位置。如果选中此项，对象将随用户在 3D 空间中移动；否则，即使关节会移动，游戏对象也会保持在固定位置。


    **更新方向：** 选中此框。这会更新关节在 3D 空间中的旋转。


    5.  剩下的选项是缩放。展开此菜单。OpenNI 中的默认测量单位是毫米，而 Unity 中是米。此选项会按比例缩放游戏对象。对于本练习，请将 X、Y 和
    Z 的缩放比例更改为 `0.008`。

    6.  现在在层级（Hierarchy）选项卡中选择 `OpenNI Functionality`，以便您可以在检查器（Inspector）中访问其组件。在检查器中，找到
    `OpenNISingle Skeleton Controller` 脚本。展开箭头以显示此组件的所有属性。从层级（Hierarchy）选项卡中将 `Custom
    Skeleton` 拖拽到 `OpenNISingle Skeleton Controller` 的 `Skeletons` 属性上。

    7.  最后，将 `OpenNI Functionality` 拖拽到 `OpenNISingle Skeleton Controller User Tracker`
    上。


    这就是神奇的关键！现在运行场景并执行校准姿势。在追踪器锁定您的骨骼后，您应该会看到类似于 图 7-10 的结果。


    ![images](img/0710.jpg)


    ***图 7-10.** 运行中的自定义骨架*


    ## 创建自定义手部追踪器


    最后一项任务，让我们从头开始制作一个自定义手部追踪器示例。创建一个新场景并将其命名为 `MyScene`。现在向场景中添加一个立方体游戏对象，并在层级（Hierarchy）选项卡中打开它。打开
    `HandpointControl` 文件夹。将 `Follow Hand Point` 脚本拖拽到检查器（Inspector）中的立方体上。播放场景，进行校准，瞧——手部追踪完成了。ZigFu
    就是这么简单。图 7-11 展示了运行中的手部追踪场景。


    ![images](img/0711.jpg)


    ***图 7-11.** 手部追踪器场景*


    最后，值得注意的是，ZigFu 是值得关注的开发者。他们其他有趣的项目还包括一套适用于官方 Microsoft SDK 的 Unity 脚本，截至目前这些脚本无需校准。


    `http://groups.google.com/group/unitykinect/browse_thread/thread/7217ea5eaf4d37e2`


    此外，他们接下来计划的是将 Beckon SDK 与 OpenNI 封装在一起，这样 Unity 就能与 Beckon 支持的任何传感器无缝协作。扩展的无控制器游戏和界面正变得越来越普遍，甚至在本书发布之日，都会有新的更新可用。总而言之，开发超越鼠标和控制器的游戏和体验，将使任何创作者都处于用户体验设计的前沿。


    ## 第 8 章

