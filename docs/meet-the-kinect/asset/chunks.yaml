- fmt: '### Testing your Kinect


    Are you ready to see yourself in volumetric 3D?! Okay, if you’ve followed the
    steps successfully, you should be looking at yourself like I am in [Figure 1-21](#Chapter01.html#fig_1_21).
    This colorful, realtime view of you looks like a thermal camera image from a science
    fiction movie, but that’s where the similarity ends.


    ![images](images/0121.jpg)


    **Figure 1-21.** `RGBD` Capture window in `rgbd-viewer` application. Main image
    shows merged depth range image mapped to color values representing distance from
    sensor. Upper right image shows `Color Image` stream from RGB camera. `3D View`
    and `Filters` options are shown in the `Show` dropdown menu. Distance value for
    each pixel is shown in upper middle `Distance at...` status corresponding to location
    of mouse pointer on depth range image.


    Instead of showing different colors representing a range of temperatures like
    a thermal camera, the Kinect shows different colors for a range of distances from
    the camera. These colors are arbitrary—some other drivers display the depth image
    as a grayscale range, instead. You can see the exact distance in meters of any
    pixel, or picture element, in the image from the camera by moving your mouse over
    any part of the colored image of yourself. Look just above and to the right of
    the depth image and you’ll see a readout such as `Distance at (0,414) = 0.000
    m` in [Figure 1-21](#Chapter01.html#fig_1_21). Try rolling your pointer around
    and see how far different things in your environment are from the camera. The
    readout is calibrated in meters, not feet, but you can find a converter online.


    Take a moment to jump around in front of the camera and observe how the depth
    image reflects your movements in space. Pick up the Kinect and point it at the
    walls and floor around you, and note the change in color corresponding to the
    change in distance of these objects from the device. All of the depth data about
    the scene can be sent to the programs you write, and the other chapters in this
    book will go into detail about how that works. Additionally, you’ll learn about
    the fundamentals of people and skeleton tracking in [Chapter 2](#Chapter02.html#ch2).
    For now, we’ll just focus on the basics of the data and imagery coming out of
    the Kinect without any sophisticated middleware.


    It’s a pretty simple idea—every pixel in the image has a location in space as
    measured from the camera. No other consumer camera has ever had the Kinect’s ability
    to measure space. This is the raw functionality of a “depth sensor”, which has
    been used in robotics and engineering for years. With just the depth sensor, as
    well as skeletal tracking middleware and other tracking methods we’ll look at
    later, software developers can create simple “natural interface” software that
    makes it easier to interact with machines without touching them. It’s pretty cool—but
    what we’ll do next shows how, with the help of the right software, the Kinect
    breaks away from just depth sensing to usher in a whole new class of equipment,
    becoming the first consumer-grade volumetric 3D camera, or `voxelcam` for short.


    In [Figure 1-21](#Chapter01.html#fig_1_21), you can see a normal webcam view of
    yourself in the upper right corner labeled `Color Image`. The signal is coming
    from the visible light camera sensor behind the lens in the middle of the Kinect
    ([Figure 1-6](#Chapter01.html#fig_1_6), C). What you are looking at in the `Color
    Image` window is a live video stream of visible light, organized on your screen
    in the same way that still pictures and video have been displayed on screens since
    the dawn of television—through a 2D table of picture elements, or pixels. Like
    a spreadsheet with rows and columns of light samples, and a color value for each
    cell in the table, these elements are stitched together to form a mosaic on the
    screen. Note that by default the `Intensity Image` and the `Amplitude Image` in
    the lower right of the window in [Figure 1-21](#Chapter01.html#fig_1_21) are turned
    off. Nothing is wrong with your setup if you don’t see anything in that area.


    Now, you’ll add another dimension to the camera image with the help of the depth
    range image data. Breaking from all traditional photography and video as we’ve
    known it, we can now assign each picture element a location in 3D space that reflects
    the position of the original surface from which it was sampled ([Figure 1-22](#Chapter01.html#fig_1_22)).
    For every pixel in the depth image, we can extract three dimensions: its distance
    from the camera (z), its vertical position in a column of the image table (y),
    and its horizontal position in a row of the image table (x).


    ![images](images/0122.jpg)


    **Figure 1-22.** `RGBDemo` 3D View—synthetic camera in alignment with actual camera
    by default


    These floating points, or “pixels in space”, are hard to imagine. They have no
    color or texture of their own. They are merely used to indicate the presence of
    something that is reflecting the infrared laser pattern. To provide a more concrete
    way of understanding these points in space, we’ll move from the 2D metaphor of
    a spreadsheet to a 3D metaphor of a Rubik’s cube. Imagine each point as having
    a volume of its own as represented by a single cube within the larger Rubik’s
    cube. An individual cubic volume element, or `voxel`, from this larger 3D array
    of cubes acts as a container for information, with an address in x, y, and z coordinates
    designating a chunk of physical space in the scene. That means we can merge the
    picture elements from the webcam with the `voxels` from the Depth Cam to build
    a volumetric cubic space that has both depth and color. This process assembles
    a live cloud of colored `voxels` in 3D space that reconstruct the surface shape
    and appearance of objects in front of the Kinect ([Figure 1-22](#Chapter01.html#fig_1_22)).
    Unlike 2D computer vision technology, such as the Playstation Move or Nintendo
    Wii, this ability to parse the `voxel` map of a scene with depth information is
    fundamental to understanding the power of the Kinect and how you can work with
    it.


    Are you ready to get `voxelated`? Okay, to see yourself in volumetric 3D, first
    click `Show` from the menu bar in the `RGBD` Capture window, and then select `3D
    View`. A new window will pop up labeled `3D View (Figure 1-22)`. You’re not quite
    there yet—at this point you should see yourself like you would on a normal webcam,
    but with some rough edges around your head and other objects. Here’s the fun part:
    click on yourself and drag. Now, that’s what you’ve been waiting for ([Figure
    1-23](#Chapter01.html#fig_1_23))!


    ![images](images/0123.jpg)


    **Figure 1-23.** 3D View with synthetic camera rotated slightly to the left. Top
    view shows default `PointCloud` render mode, bottom view shows `Triangles` render
    mode


    What you are looking at is a “synthetic camera” image in volumetric space. The
    synthetic camera isn’t really there—its image is derived from peering at the floating
    volume elements in space from a different angle than that at which they were originally
    sampled. You can take this synthetic camera and spin it in any direction to look
    at the `voxel` data from any angle. [Figure 1-24](#Chapter01.html#fig_1_24), for
    example, shows the image rotated 90 degrees.


    Since you are using only a single camera, the image will start to look more incomplete
    if you try to peer behind objects facing it, and you can extrapolate this from
    [Figure 1-24](#Chapter01.html#fig_1_24). It’s possible to arrange a number of
    `voxelcams` in a space in order to build a more complete scene. Both the Microsoft
    Kinect SDK and OpenNI framework actually include support for interfacing with
    multiple Kinects simultaneously. Therefore, if you wanted to create an application
    that filled in imagery gaps from multiple angles, it is possible to write software
    to do that. This single, comprehensive volumetric view of a space could be observed
    from infinite perspectives, all positioned in real time interactively during playback
    with synthetic cameras that map to the direction a viewer is looking.


    Once people catch on to what this technology can really do, there will be an increased
    demand for more truly immersive experiences. As volumetric sensor arrays become
    more common to meet this demand, the possibilities of what can be created from
    this technology grow even more limitless. The Kinect is the tip of the iceberg.
    Welcome to the volumetric age!


    These buckets of information can be rendered in different ways. The default method
    for 3D View is just a cloud of pixels in space, also called a point cloud ([Figure
    1-23](#Chapter01.html#fig_1_23), top). This view has lots of holes in it, as you
    can see. You can zoom in to see the points even closer—the pattern they display
    reflects the structured-light dot pattern invisibly cascading over you from the
    IR projector.


    Since we don’t have multiple Kinects to fill in all the cracks of this synthetic
    camera image just yet, let’s use the magic of polygons to render this information
    in a way we are more accustomed to seeing. Select the button in the upper right
    section of the 3D View screen ([Figure 1-23](#Chapter01.html#fig_1_23)) labeled
    `Triangles`, located to the right of the `PointCloud` and `Surfels` buttons. This
    will create a mesh of triangle-shaped polygons that connect the dots and allow
    the visible light image data more surface area to display. Notice the difference
    between point cloud view and triangle view ([Figure 1-23](#Chapter01.html#fig_1_23),
    bottom). The ability to create this kind of 3D imagery was only within reach of
    academic, entertainment, and military institutions that could afford a price tag
    in the US $15,000 range only a few years ago.


    ![images](images/0124.jpg)


    **Figure 1-24.** `RGBDemo` 3D View showing volumetric 3D synthetic camera perspective
    magically rotating 90 degrees perpendicular to the physical Kinect


    You’ll notice the big hole in the image “behind” where you are sitting – that’s
    your shadow! Your shape is silhouetted because you are blocking the IR projector
    from placing measurable light on the wall behind you. It may not look like much,
    since this is a very rudimentary use of the technology, but you can get an idea
    of where this capability is leading when you check out Microsoft Research’s `KinectFusion`
    project for realtime dynamic 3D surface reconstruction. This ability to reconstruct
    the physical world in digital space is a major theme at Microsoft, and simple
    applications that have you “digitize your world” can be found in the `Fun Labs`
    minigames available from `Xbox Live`.


    ![images](images/square.jpg) **Note** Learn more about the the `KinectFusion`
    project at the following URL: [http://research.microsoft.com/en-us/projects/surfacerecon/](http://research.microsoft.com/en-us/projects/surfacerecon/)


    While most people only see the Kinect as a natural interface 3D gesture recognition
    device, it is important to understand the imaging data that body-tracking software
    and other features are built upon. The Kinect’s ability to gather spatial information
    is the heart of its unique hardware functionality. Some of the great “hacks” seen
    on YouTube work with just this raw data and don’t even go to the level of using
    the Kinect for gesture recognition. Microsoft Research’s debut of `KinectFusion`
    ([Figure 1-25](#Chapter01.html#fig_1_25)) at SIGGRAPH 2011, the leading industry
    conference for graphics experts, shocked many in the tech world. Previously, the
    volumetric video output from the Kinect was panned as too low quality to be useful.
    `KinectFusion`’s high-resolution, realtime, photorealistic reconstruction of people
    and objects, even with a shaky camera, demonstrated that a persistent model of
    an entire scene could be stored and updated rapidly to fill in missing detail
    behind the view of the camera.


    ![images](images/0125.jpg)


    **Figure 1-25.** `KinectFusion` showing realtime reconstruction of person in 3D
    (left) and photorealistic texture map model with lighting effects (right). Courtesy
    Microsoft Research.


    It’s likely that what you’ve glimpsed in this chapter, seeing yourself in live
    volumetric 3D video, will play a key part in shaping screen-based entertainment
    and virtual presence in the future. Instead of using instant messaging or Skype
    as we know it, you could be communicating with friends, family, and colleagues
    by “instant personing” them into your room with you. Receiving full 3D data of
    their bodies, you may be able to tilt your head and look around them as if they
    were there, something not possible with today’s 2D cameras. Expect a whole class
    of applications that invite you to “digitize” people and objects in your home
    and bring them into a game or novel application. Now, you know what the real Kinect
    data looks like and have a perspective on the kind of experiences that are possible
    in the not-too-distant future. The rest of the book will go into more detail on
    how body-tracking points extracted from this “voxelated” physical information
    can be used today to design applications with natural, gestural interfaces.'
