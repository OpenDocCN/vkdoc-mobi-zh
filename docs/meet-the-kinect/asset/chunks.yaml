    so slightly. We’ve altered the rendering so that its colors reflect depth, but
    now let’s try selecting only pixels from the Kinect within a certain depth range,
    a technique called thresholding. Note these two lines in the example code:


    `if (kinect_3d[index1].getColor() == 0 )`

    `        continue;`


    As `drawPointcloud()` is looping through the 640×480 array of points, these lines
    tell the draw function to just drop any black points typically associated with
    object “shadows.” In the following example, an additional directive to drop any
    points beyond a depth of 2 meters has been added:


    `if (kinect_3d[index1].z < -2)`

    `        continue;`


    Finally, we can comment out the earlier edits we made to create the depthmap with
    the “//” comment characters. Now when we run the sketch, points must meet a certain
    depth threshold in order to be rendered at all. In this case, anything more than
    2 meters from the Kinect will be dropped, most of it is probably background stuff.
    If you’re just a meter or two away from your Kinect and it’s clear behind you
    when you run this sketch, you should see yourself fairly cleanly cut out from
    the black void behind you as in [Figure 4-9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    ***Figure 4-9.** Thresholding example, with a poorly calibrated Kinect*


    When you have a camera that sees in 3D, it’s that easy to pick out a very well-defined
    region of interest in 3D space for further analysis. Now that you have your likeness
    as a cutout, what do you want to do with it? We’ll explore more in later chapters.'
  trans: "\n# 点云草图的作用\n\n一个典型的、非常基础的 Processing 草图由 `setup()` 函数（在开始时调用，用于设置草图使用的任何参数或流程）和\
    \ `draw()` 函数（在主循环中运行，不断绘制和重绘你指定的任何元素，无论是静态还是动画）组成。点云草图遵循这一约定，但额外进行了一些操作：一些初步的库导入语句和变量声明、用于\
    \ PeasyCam 的初始化例程（PeasyCam 用于控制虚拟“相机”，即渲染的 3D 场景的视角），以及 `drawPointcloud()` 这个自定义函数，用于获取\
    \ `Kinect3D` 对象中的所有点并进行绘制。此外，还有一个 `stop()` 函数，在草图终止时被调用。\n\n查看代码并尝试理解其作用几乎总是很有启发性的。例如，这里是\
    \ `drawPointcloud` 函数的原始代码以及它使用的一些变量：\n\n```\nKinect3D k3d_;\n\nint kinectFrame_size_x\
    \ = VIDEO_FORMAT._RGB_.getWidth();\nint kinectFrame_size_y = VIDEO_FORMAT._RGB_.getHeight();\n\
    \nvoid drawPointcloud(){\n\n  KinectPoint3D kinect_3d[] = k3d_.get3D();\n\n  int\
    \ jump = 5;\n\n  int cam_w_ = kinectFrame_size_x;\n  int cam_h_ = kinectFrame_size_y;\n\
    \n  strokeWeight(3);\n\n  for(int y = 0; y < cam_h_-jump ; y+=jump){\n    for(int\
    \ x = 0; x< cam_w_-jump*2 ; x+=jump){\n      int index1 = y*cam_w_+x;\n\n    \
    \  if (kinect_3d[index1].getColor() == 0 )\n        continue;\n\n      stroke(kinect_3d[index1].getColor()\
    \ );\n\n      float cx = kinect_3d[index1].x;\n      float cy = kinect_3d[index1].y;\n\
    \      float cz = kinect_3d[index1].z;\n      point(cx, cy, cz);\n\n    }\n  }\n\
    }\n```\n\n我知道你心里在想什么：`Kinect3D` 对象？那是什么，在哪里？还有 `drawPointcloud()` 函数里面的 `KinectPoint3D`\
    \ 呢？它是从哪里来的，我怎么知道它是做什么的？这时查看 dLibs 附带的文档会很有帮助，它至少能识别出库中所有可用对象的相关属性和方法。在浏览器中打开附带的\
    \ `dLibs_freenect/reference/index.html`。\n\n虽然文档很基础，但你可以看到 `Kinect3D` 对象管理着来自\
    \ Kinect 的数据采集，包括帧率、校准、深度和 RGB 图像等。像示例在 `drawPointcloud()` 内部所做的那样，在 `Kinect3D`\
    \ 对象上调用 `get3D()` 函数会返回一个 640×480 的点或像素数组，每个点同时包含颜色（RGB）和位置（X, Y, Z）值，有时被称为 RGBZ\
    \ 数据，因为它将传统的 RGB 相机数据（2D 彩色图像）与深度信息（该图像每个像素在 Z 轴上的位置）合并在一起。用于存储每个点的库对象是 `KinectPoint3D`\
    \ 对象，因此草图每次调用 `drawPointcloud()` 时都会创建一个这些对象的数组并存储在其中。\n\n```\nKinectPoint3D kinect_3d[]\
    \ = k3d_.get3D();\n```\n\n## 调整示例\n\n在你已经玩过示例之后，让我们尝试对其进行一些修改。具体来说，让我们调整 `drawPointcloud()`\
    \ 函数，看看会发生什么。\n\n### 更高分辨率\n\n你可以尝试的第一件事是改变渲染图像的分辨率。你可以看到整数变量 `jump` 用于跳过来自我们\
    \ `Kinect3D` 对象的每个 RGBZ 值数组中的点。尝试将\n\n```\nint jump = 5;\n```\n\n改为\n\n```\nint\
    \ jump = 1;\n```\n\n渲染每一个数据点而不是每五个点中的一个将会影响程序的执行效率，你会注意到这次运行草图时帧率变慢了。不过，你也应该会注意到渲染图像中更多的细节，比如图\
    \ 4-6 和 4-7 中所示。\n\n![images](img/0406.jpg)\n\n***图 4-6.** 我们的高分辨率点云揭示了场景中一个新的细节：一只猫！*\n\
    \n![images](img/0407.jpg)\n\n***图 4-7.** 倾斜的高分辨率点云*\n\n### 深度图\n\n或者，你可能希望渲染图像显示不同类型的信息，而不仅仅是可见光\
    \ RGB 数据。例如，你可能希望将深度信息以某种方式编码到渲染中每个像素的颜色中，从而创建所谓的“深度图”。这个示例使用 Processing 的 `stroke()`\
    \ 函数来渲染点云，其中描边的颜色参数取自 `KinectPoint3D`。现在，让我们改为取该像素处的深度值。\n\n将\n\n```\nstroke(kinect_3d[index1].getColor()\
    \ );\n```\n\n替换为\n\n```\nfloat depth = (10 +kinect_3d[index1].z)/10;\nstroke(color(255*\
    \ depth, 255* depth, 255* depth));\n```\n\n本质上，我们正在用基于点与 Kinect 距离的灰度值替换图像的 RGB\
    \ 颜色。现在，看起来离 Kinect 较近的物体应该比较远的物体更亮。我们应该注意，`KinectPoint3D` 对象中的 Z 值以负米为单位（相机前方的距离），并且是浮点（十进制）数。所以，如果我的鼻尖距离\
    \ Kinect 正好是 1.333 米，Z 值将会像是 `-1.333333`，我们上面应用的用于获取颜色的转换也将相应地受到影响。如果你运行草图，应该会看到类似于图\
    \ 4-8 的内容。\n\n![images](img/0408.jpg)\n\n***图 4-8.** 点云草图转换为深度图*\n\n### 阈值处理\n\
    \n这虽然不错，但还不是特别有用。真正释放 Kinect 潜力的是能够选择性地分析传感器前方的 3D 空间，挑选出场景中的物体和人，并理解它们正在做什么。这个物体是什么？这个人拿着物体吗？这个人在做手势吗？这些问题构成了机器视觉中一个经典主题，即场景分析，在过去的几十年里，人们利用\
    \ 2D 图像对其进行了广泛的研究。有了来自类 Kinect 传感器或深度相机提供的额外深度信息，场景分析变得更容易、更稳健，可能性也随之增加。\n\n通过非常轻微地修改这个草图，我们已经可以开始看到这些可能性。我们改变了渲染，使其颜色反映深度，但现在让我们尝试只从\
    \ Kinect 中选择某个深度范围内的像素，这种技术称为阈值处理。注意示例代码中的这两行：\n\n```\nif (kinect_3d[index1].getColor()\
    \ == 0 )\n        continue;\n```\n\n当 `drawPointcloud()` 循环遍历 640×480 的点数组时，这些行告诉绘制函数丢弃任何通常与物体“阴影”相关的黑色点。在下面的示例中，添加了一条额外的指令，用于丢弃任何深度超过\
    \ 2 米的点：\n\n```\nif (kinect_3d[index1].z < -2)\n        continue;\n```\n\n最后，我们可以用\
    \ `//` 注释字符注释掉我们之前为创建深度图所做的修改。现在，当我们运行草图时，点必须满足一定的深度阈值才能被渲染。在这种情况下，任何距离 Kinect\
    \ 超过 2 米的点都将被丢弃，其中大部分可能是背景物体。如果你距离 Kinect 只有一到两米，并且你身后是干净的，那么当你运行这个草图时，你应该会看到自己相当清晰地被从身后的黑色虚空中切割出来，如同图\
    \ 4-9 所示。\n\n![images](img/0409.jpg)\n\n***图 4-9.** 阈值处理示例，使用一个校准不佳的 Kinect*\n\
    \n当你拥有一个能在 3D 中“看”的相机时，在 3D 空间中挑选出一个非常明确的感兴趣区域进行进一步分析就是这么简单。既然你已经有了自己的轮廓剪影，你想用它做什么？我们将在后续章节中进一步探索。\n\
    \n"
- fmt: '### Kinect for Processing on Mac OS X


    Getting Processing to talk to the Kinect on Mac OS X is a bit easier than on Windows,
    thanks to ITP’s Daniel Shiffman, who released his library based on `libfreenect`
    within weeks of the Kinect’s release.


    #### Adding OpenKinect


    To install Shiffman’s library, simply browse to [`http://www.shiffman.net/p5/kinect/`](http://www.shiffman.net/p5/kinect/)
    and download the `openkinect.zip` file, which contains the compiled library and
    some sketch examples. You’ll be able to dig a bit deeper into the examples if
    you also take a look at the source on GitHub: [`https://github.com/shiffman/libfreenect/tree/master/wrappers/java/processing`](https://github.com/shiffman/libfreenect/tree/master/wrappers/java/processing).
    Put this whole folder inside your “libraries” folder inside your Processing sketchbook
    folder and, as always, relaunch Processing.


    #### Updating Drivers


    Unlike on Windows, here we’re able to let Processing drive the hardware directly—there’s
    no separate process to set up the Kinect or install drivers. You’re ready to go!


    #### Running the Pointcloud Example


    Let’s launch the included pointcloud example code as a point of reference. Under
    Examples... Contributed Libraries `openkinect`, you should see three or so examples.
    Open Pointcloud and click `Run`. You should see something like [Figure 4-10](#Chapter04.html#fig_4_10),
    yet another pointcloud not unlike that of the `RGBDemo` program.


    ![images](images/0410.jpg)


    ***Figure 4-10:** Shiffman’s pointcloud sketch, run as is*


    #### What the Pointcloud Sketch is Doing


    Again, we have an output that’s a bit like `RGBDemo` from [Chapter 1](#Chapter01.html#ch1),
    only we can play with it in Processing! This sketch obeys the convention in Processing
    of having a `setup()` function to set up any parameters or processes used by the
    sketch and a `draw()` function that repeats as the sketch runs, drawing and redrawing
    elements. As with the Windows examples, there’s some other stuff going on too:
    import statements to import the necessary library elements, some variable declarations,
    some helper functions to get the data from the `Kinect()` object into the form
    the sketch needs to produce the rendering, and, of course, a `stop()` function
    that gets called when the sketch is terminated.


    Speaking of the `Kinect()` object, uh, what is it? If you read through the Windows
    example, you learned that dLibs breaks up the data from the Kinect into a few
    different classes, and there was some basic documentation for them included with
    the library. The `openkinect` library also wraps the Kinect data with a few classes,
    but you can only learn about them through the included examples and by looking
    at the source code. In particular, if you want to learn about the `Kinect()` object,
    which is the main interface for the device, you want to look at the source on
    GitHub:


    [`https://github.com/shiffman/libfreenect/blob/master/wrappers/java/processing/KinectProcessing/src/org/openkinect/processing/Kinect.java`](https://github.com/shiffman/libfreenect/blob/master/wrappers/java/processing/KinectProcessing/src/org/openkinect/processing/Kinect.java)


    Here you’ll see that the properties and methods associated with this object mostly
    deal with the depth and RGB data, like:


    - `enableDepth()`

    - `enableRGB()`

    - `getDepthImage()`

    - `getVideoImage()`

    - `getRawDepth()`

    - etc.


    ![images](images/square.jpg) **Note** It’s cool that there’s also an interface
    here for the Kinect’s motor control, so that if you call `tilt(15)`, your Kinect
    will tilt to 15 degrees! However, the motor inside the Kinect is not rated for
    continuous or even frequent use, and it will burn out, so use this feature judiciously.


    #### Tweaking the Example


    After you’ve played around with the example as is, let’s try modifying it a bit.
    Specifically, let’s tweak the `draw()` function and see what happens.


    ##### Higher Resolution


    Only because it’s stupid easy, the first thing we can do here is change the resolution
    as we did in Windows. You can see that the integer variable `skip` is used to
    skip over data points from the Kinect, because we just don’t need every point
    to render a point cloud. Try changing:


    ```

    int skip = 4;

    ```


    to:


    ```

    int skip = 1;

    ```


    Rendering every single data point rather than every fourth data point will take
    its toll on the program’s execution, which you’ll notice in the slower frame rate
    when you run the sketch this time. Unlike on Windows, where our point cloud included
    RGB values, higher resolution here just means more “coverage” in the rendering,
    as in [Figure 4-11](#Chapter04.html#fig_4_11).


    ![images](images/0411.jpg)


    ***Figure 4-11.** The pointcloud sketch at a higher resolution*'
