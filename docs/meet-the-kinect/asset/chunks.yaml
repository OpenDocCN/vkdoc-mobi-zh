  trans: '

    ### 静态体显示


    如果你在过去几年里逛过美国任何大型商场或旅游区，你很可能见过那种提供 3D 人像照片打印的新奇服务，照片会被蚀刻到透明塑料棱镜中（图 9-1），这种工艺被称为“亚表面激光雕刻”。虽然这不是一种可以更新的体显示设备，但它为我们理解第一类显示——*静态体*显示——提供了参考基准。


    ![images](img/0901.jpg)


    ***图 9-1.** 亚表面激光雕刻。图片由 LooxisFL.com 提供*


    对于能够像视频一样实时变化、活灵活现的体显示，我们需要研究如何在感兴趣的空间内控制彩色光点的开启和关闭，而不是简单地将静态图像蚀刻在某个位置。实现这一目标的一种直接方法是使用立方体结构的
    LED，其中每个发光二极管作为一个体素。图 9-2 展示了这样一个设备。它是由八岁的乔伊·哈迪制作的，他是网站“Look What Joey''s Making”（[`http://lwjm.us/`](http://lwjm.us/)）的幕后推动者。乔伊制作了图
    9-2 所示的 LED 显示屏用于销售。访问他的网站，立即订购属于你的那一个吧。


    ![images](img/0902.jpg)


    ***图 9-2.** 八年级学生乔伊·哈迪制作的**3×3×3** LED 显示屏的 Arduino 扩展板，图片由 lwjm.us 提供*


    目前市面上最大的此类商用显示屏之一拥有一个`66×48×24`的 LED 阵列，由 Seekway（[`seekway.com.cn`](http://seekway.com.cn)）制造。这意味着有`76,032`个独立的
    LED 灯需要连接成电路，并由微处理器单独寻址。这个设备大约 6 英尺高、1.5 英尺深、3 英尺宽，售价高达数千美元。


    ![images](img/square.jpg) **注意** 对于想要自己动手制作简单 LED 显示屏的爱好者来说，Instructables.com
    上的两篇文章是很好的资源。一篇介绍了如何制作一个`8×8`的立方体：[`www.instructables.com/id/Led-Cube-8x8x8/`](http://www.instructables.com/id/Led-Cube-8x8x8/)；另一篇稍微简单一些，介绍如何制作一个`4×4×4`的
    LED 立方体：[`www.instructables.com/id/LED-Cube-4x4x4/`](http://www.instructables.com/id/LED-Cube-4x4x4/)。当然，也别忘了乔伊·哈迪的网站[`http://lwjm.us/`](http://lwjm.us/)。


    ### 向静态体投影


    为了克服需要将独立灯珠逐个连接到网格化立方体电路中的难题，一种非常巧妙的技术是直接将光线投射到空间中感兴趣区域的反射材料上。阿尔伯特·黄、马特·帕克和艾略特·伍兹创建了开源设计项目
    Lumarca（图 9-3），通过以非常特殊的方式悬挂数百根绳子，使投影仪能够对准这个网状结构，从而产生非凡的效果。借助用于校准的定制软件，并将一台 SVGA（`1024
    × 768`）投影仪非常精确地对准线阵，无论每根线在空间中的位置如何——在体积的前部、后部，还是两者之间的任何位置或两侧——每根线都可以被单独寻址照明。每根线都必须精心放置，以免遮挡投影光束照射到其后面的另一根线。


    你可以在项目网站 [`madparker.com/lumarca/construction`](http://madparker.com/lumarca/construction)
    上找到如何自己动手用不到 100 美元建造一个这样的设备的详细说明。在 2011 年纽约制汇节上，该团队首次展示了一个大约 1 英尺见方的微型投影仪套件。如果进一步小型化，能否将一个小型塑料棱镜中
    3D 激光蚀刻的“线”或点与口袋投影仪结合，在固态介质中重现这种显示效果？哥伦比亚大学的研究人员已经朝着这个方向迈出了一步，他们研究了被动光学散射投影技术（[`www.cs.columbia.edu/CAVE/projects/3d_display/`](http://www.cs.columbia.edu/CAVE/projects/3d_display/)）。关于体三维显示，仍有大量研究和开发工作要做，因此将这些技术混合搭配可能会带来前所未有的创新。拓荒者们，前进吧！


    ![images](img/0903.jpg)


    ***图 9-3.** Lumarca 体显示，将图像投影到悬挂的绳子上。照片由杰夫·霍华德拍摄*


    ### 扫描体显示


    扫描体显示在许多方面都算是“传统”意义上的体显示。这些设备的专利申请可以追溯到 20 世纪 50 年代和 60 年代，但我们直到最近几十年才开始看到实际应用。扫描体显示利用一个发光的二维截面来呈现立体图像，并通过一种机制快速移动该截面的位置及其内容，使其与正在穿过的空间保持同步，利用视觉暂留效应在空间中印刻出一个三维体图像。


    1988 年，纽约科学馆花费了 40,000 美元建造了一个可以交互式显示“量子原子”的体三维显示器。通过一个由计算机控制示波器照亮的往复式机械运动圆盘，一个固体运动物体的各个切片被投射到圆柱体内的空间中，使得观众可以围绕这个交互式电子
    3D 图像 360 度行走。该显示器的设计者艾伦·杰克逊发起了一项新计划，旨在利用现代硬件和开源软件，将采用相同往复运动扫描体技术的价格合理的设备交到开发者手中。


    艾伦的 VoxieBox（[`voxiebox.com`](http://voxiebox.com)）将自 2012 年起以套件或预组装形式提供。与 Primesense
    的 OpenNI 计划类似，VoxieBox 将推广一个由 OpenVoxel.org 开发的用于体显示的开源框架，以吸引一个能够利用这些设备独特能力的开发者社区。Kinect
    在让 3D 捕捉技术的开发变得易于获取方面做出了巨大贡献，而 VoxieBox 以及 OpenVoxel 框架将支持的其他设备，则希望在体三维显示领域达到同样的效果。与那些昙花一现、之后未能在公众视野中聚集势头的专有商业设备及研究项目不同，利用开源创新者激情的努力更有可能获得成功。


    其中一项研究项目来自南加州大学创意技术研究所。该项目依赖扫描体机制来实现他们的“交互式 360 度光场显示器”（图 9-5）。在该设计中，一台投影仪从上方指向旋转的镜子。这种直接的方法可以作为在可控环境中——例如艺术馆、博物馆或零售场所——重现所需效果的基础，打造一个更独立、无需远程摆放投影仪的装置。有关该系统的更多信息，请访问
    [`gl.ict.usc.edu/Research/3DDisplay/`](http://gl.ict.usc.edu/Research/3DDisplay/)。

    '
- fmt: '2002年，Actuality Systems 公司推出了一款产品，该产品采用了与创造性技术研究所描述的旋转镜系统类似的扫描体技术。他们的设备`Perspecta`（[图9-4](#Chapter09.html#fig_9_4)）造价约30,000美元，并利用旋转屏幕下方一套精密的光学系统，使设备显著更加紧凑。由于投影并非来自上方，观看者可以将手放在玻璃屏幕顶部而不会中断图像显示。`Perspecta`设备被推向医疗行业，用于可视化MRI扫描仪产生的体积图像。依赖物理运动来扫描图像的系统的缺点之一是，其部件可能会损坏，且比固态系统需要更频繁的更换；同时，干扰屏幕预期运动路径的振动会中断视觉暂留效应。因此，此类系统不适用于车辆内的移动应用，也无法在暴露于旋转机械轰鸣声的环境中使用。或许是由于这款独特产品难以获得市场认可，Actuality
    Systems 于2009年关闭，但其工程师可通过`opticsforhire.com`提供咨询服务。


    ![images](images/0904.jpg)


    ***图9-4.** Actuality Systems 公司的Perspecta体三维显示器。图片由OpticsForHire.com提供*


    这些扫描体系统的主要缺点之一是对带有运动部件的设备的维护。LightSpace Technologies 公司通过`DepthCube` 创造了一种卓越的方法来解决这个问题。通过将投影图像快速循环到20个垂直堆叠的液晶镀层板之一上，构建出一个具有深度感的切片堆栈。这些LCD板在施加电流之前保持不透明，之后变为透明。利用`DepthCube`设计，每次只有20个板中的一个保持不透明，投影仪可以将正确的图像切片从整个体堆栈投射到该板上。当所有部件同步并以极快速度运行时，视觉暂留效应会将图像切片堆栈融合成一个连贯的立体图像。观看`DepthCube`的实际运作，请访问：[http://youtu.be/RAasdH10Irg](http://youtu.be/RAasdH10Irg)。


    除专利文件和学术论文外，关于如何自行构建扫描体显示器的在线信息非常少。随着人们对这些独特能力的更多关注，这种情况将会改变。我们需要看到一个由共同兴趣凝聚而成的更大社区，共同推动这项技术进入主流。在此之前，这份关于如何使用LED灯构建旋转扫描体的指南能让您了解其中涉及的要点：[http://bit.ly/makevolumedisplay](http://bit.ly/makevolumedisplay)。


    如果您需要为LED开始显现其局限性的高分辨率显示器配置一个基于投影仪的图像生成器，德州仪器的`DLP`开发套件（[http://bit.ly/dlpdevkits](http://bit.ly/dlpdevkits)）提供了一个坚实的基础。德州仪器的`Digital
    Light Processing`（数字光处理）技术搭配`Digital Micromirror Device`（数字微镜器件），售价为350美元，其`DLP
    Pico Projector Development Kit`（DLP Pico投影仪开发套件）能以1440帧/秒的速度运行在单色模式下，比一副扑克牌还小，并产生7流明的图像亮度，使其非常适合超短距离安装。在其原生分辨率`480
    × 320`下，您需要保持投影图像较小以获得最佳图像密度。售价3,500美元的`DLP LightCommander`提供了一种更模块化的设计——大约相当于一个烟机的大小——其单色二进制图案模式最高可达5000帧/秒，并能通过尼康f卡口可互换镜头提供200流明的光输出。其原生分辨率为`1024
    × 768`。`DLP Discovery 4100 Kit`的报价高达8,000美元以上，提供HD 1080p (1920×1080)分辨率，并拥有更高级的功能集。


    ### 佩珀尔幻象（Pepper''s Ghost）显示


    虽然扫描体技术可以生成悬浮在空中的真正立体3D图像，提供每个角度的独特视角，但此类系统的价格高得令人望而却步，尤其是对于相对较小的显示器。另一方面，一种源自19世纪60年代、最初作为戏剧特效而开发的技术，可以扩展到非常大的环境，并已被用于提供令人信服的“空中”视觉效果。约翰·亨利·佩珀尔的幻象最初用于在查尔斯·狄更斯的《着魔的人》的舞台表演中神奇地显示透明幽灵。现在被称为“佩珀尔幻象”（[图9-5](#Chapter09.html#fig_9_5)），这种光学错觉依赖于来自隐蔽光源的光线反射到透明薄膜或玻璃板上，使得图像看起来悬浮在空中。同样的原理也是提词器和平视显示器工作的基础。这种技术的变体支撑着许多“全息”图像效果和显示器。


    ![images](images/0905.jpg)


    ***图9-5.** 约翰·亨利·佩珀尔教授在伦敦皇家理工学院演示的“佩珀尔幻象”图解，1881年*


    目前有多种商业解决方案可将这种类型的显示付诸实践，无论是大规模还是小规模应用。`Musion Eyeliner 3D`（[http://eyeliner3d.com](http://eyeliner3d.com)）和`Arena
    3D Industrial Illusion`（[http://arena3d.com](http://arena3d.com)）销售和租赁用于贸易展览和大型娱乐制作的系统。`Teleportec`（[www.teleportec.com/](http://www.teleportec.com/)）销售一种专为远程临场感设计的更小型系统，可以将参加远程会议的人置于讲台后发表演讲，或置于会议桌旁参加会议。


    亚历山大·麦昆在其2006/2007秋冬时装秀《卡洛登的寡妇》中因使用基于佩珀尔幻象的错觉而备受赞誉，秀场上凯特·摩丝的形象在舞台上方浮现并漂浮。预先录制的模特视频从四个不同角度（相隔90度）拍摄，从隐藏的屏幕反射到四块玻璃板上，这些玻璃板形成了一个透明的金字塔形状。


    ![images](images/square.jpg) **注意** 乐队街头顽童（Gorillaz）的卡通角色曾通过`Eyeliner 3D`系统与麦当娜在2007年格莱美奖上进行了著名的现场表演；然而，由于用于反射的薄膜对振动敏感，在极度喧闹的音乐会环境中并不理想。该乐队此后已停止使用“全息”舞台把戏。


    许多公司已经制造了更小型的、基于佩珀尔幻象的一体式展示箱，非常适合展示悬浮或透明的产品——甚至可以将数字视频与真实物理对象混合到同一个显示区域。[图9-6](#Chapter09.html#fig_9_6)展示了一个使用MacBook的简单的三面佩珀尔幻象设计。该设计由Ujjval
    Panchal创建。您可以在他的博客上阅读更多内容：[`http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/`](http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/)。


    ![images](images/0906.jpg)


    ***图9-6**. 使用MacBook的三面佩珀尔幻象显示器。图片由Ujjval Panchal提供*


    `HoloCube`（[www.holocube.eu/](http://www.holocube.eu/)）拥有一些简单且美观的箱式设计，适用于单一方向观看。`RealFiction`（[www.realfiction.com/](http://www.realfiction.com/)）和`Vizoo`（[www.vizoo.com/](http://www.vizoo.com/)）销售金字塔形系统，其工作原理类似于亚历山大·麦昆秀场的布置，通过三到四个对应不同角度的独立视频通道，实现180度到360度的观看视角。'
  raw: 'In 2002, Actuality Systems introduced a product that used a swept volume technique
    similar to the rotating mirror system described by the Institute for Creative
    Technologies. Their device, Perspecta ([Figure 9-4](#Chapter09.html#fig_9_4)),
    cost roughly $30,000 and used a sophisticated series of optics under the rotating
    screen to make the device significantly more compact. Because the projection wasn''t
    from above, a viewer could place their hand on top of the glass screen without
    interrupting the image display. Perspecta devices were marketed to the medical
    industry to visualize the volumetric imagery produced from MRI scanners. One drawback
    to systems that rely on physical motion to sweep out imagery is that parts can
    break down and need more frequent replacement than solid state systems and the
    persistence of vision effect can be interrupted from vibrations that disturb the
    intended path of the screen through space. Therefore, such systems would be unsuitable
    for mobile applications inside vehicles and unacceptable in environments exposed
    to the rumble of a spinning machine. Perhaps due to difficulty in gaining acceptance
    for such a unique product, Actuality Systems closed down in 2009 yet its engineers
    are available for consulting from opticsforhire.com.


    ![images](images/0904.jpg)


    ***Figure 9-4.** Perspecta Volumetric Display by Actuality Systems, Inc. Images
    courtesy OpticsForHire.com*


    One of the main drawbacks of these swept volume systems is the maintenance of
    the device with moving parts. LightSpace Technologies created a remarkable approach
    to address this problem with the DepthCube. By rapidly cycling a projected image
    onto one of 20 vertically stacked liquid crystal coated plates, a volume of slices
    that has depth is built up. The LCD plates remain opaque until electric current
    is applied, at which point they become transparent. Utilizing the DepthCube design,
    with only one of the 20 plates opaque at a time, a projector can present the correct
    image slice onto that plate from the full volume stack. With everything synced
    up and running very fast, persistence of vision blends the image slice stack into
    a cohesive volumetric image. See the DepthCube in action at [http://youtu.be/RAasdH10Irg](http://youtu.be/RAasdH10Irg).


    Other than in patent filings and academic papers, there is very little information
    online about how to construct your own swept volume display. This will change
    as more attention is drawn to their unique abilities. We need to see a greater
    community brought together with a shared interest in seeing this technology reach
    the mainstream. Until then, this how-to-guide for constructing a spinning swept
    volume with LED lights gives an idea of what is involved: [http://bit.ly/makevolumedisplay](http://bit.ly/makevolumedisplay).


    Should you require a projector based image generator for high resolution displays
    where LED begins to show its limits, the DLP developer kits from Texas Instruments
    ([http://bit.ly/dlpdevkits](http://bit.ly/dlpdevkits)) provide a strong base to
    build upon. Texas Instruments'' Digital Light Processing with a Digital Micromirror
    Device, which sells for $350, with the DLP Pico Projector Development Kit can
    run at 1,440 frames per second in one color, is smaller than a deck of cards,
    and produces an image brightness of 7 lumen, making it ideal for very short throw
    installations. At its native 480 × 320, you''ll want to keep the projected image
    small to make for the densest image quality. For $3,500 the DLP LightCommander
    offers a more modular design—about the size of a fog machine—that can go up to
    5,000 frames per second in monochrome binary pattern mode and supply 200 lumens-worth
    of light out of a Nikon f-mount interchangeable lens. Its native resolution is
    1024 × 768\. The DLP Discovery 4100 Kit costs upwards of US$8.000 and offers resolutions
    of HD 1080p (1920 ×1080), along with much more advanced feature sets.


    ### Pepper''s Ghost-Based Displays


    While swept volume techniques can produce true volumetric 3D imagery that hangs
    in the air, providinga unique perspective from every angle, the price tag for
    such systems are prohibitively high, especially for displays that are relatively
    small. On the other end of the spectrum and dating back to the 1860s, is a technique
    that was developed as a theatrical special effect, which can scale to very large
    environments and which has been used to provide a convincing “in air” visual effect.
    John Henry Pepper''s illusion was originally used to magically display transparent
    ghosts on stage for a performance of Charles Dickens''s *A Haunted Man*. Now referred
    to as “Pepper''s Ghost” ([Figure 9-5](#Chapter09.html#fig_9_5)), this optical
    illusion relies on the reflection of light from an obscured source onto a transparent
    film or glass plate where the image is seen to be hanging in space. This same
    principle is what makes teleprompters and heads-up displays work. Variations on
    this technique are behind many “holographic” imagery effects and displays.


    ![images](images/0905.jpg)


    ***Figure 9-5.** Illustration of the “Pepper''s Ghost” illusion by Professor John
    Henry Pepper at London''s Royal Polytechnic, 1881*


    A number of commercial solutions are available to bring this type of display to
    life on both large and small scales. Musion Eyeliner 3D ([http://eyeliner3d.com](http://eyeliner3d.com))
    and Arena 3D Industrial Illusion ([http://arena3d.com](http://arena3d.com)) sell
    and lease systems that are used for trade exhibits and major entertainment productions.
    Teleportec ([www.teleportec.com/](http://www.teleportec.com/)) sells a smaller
    system tailored to telepresence, which can place a remotely conferenced person
    behind a podium for a speech or at a board table for a meeting.


    Alexander McQueen received much fanfare for his use of a Pepper''s Ghost-based
    illusion for his *Widows of Culloden*, autumn/winter 2006/2007 fashion show, in
    which Kate Moss materialized and floated above the stage. Prerecorded video of
    the model, shot from four different angles, 90 degrees apart, was reflected from
    hidden screens suspended above four panels of glass that formed a transparent
    pyramid shape.


    ![images](images/square.jpg) **Note** Illustrated characters from the band Gorillaz
    famously performed live at the 2007 Grammy awards with Madonna via the Eyeliner
    3D system; however, because the thin film used to reflect off of it is sensitive
    to vibrations, it is less than ideal for a thunderously loud concert setting.
    The band has since discontinued use of “holographic” stage tricks.


    A number of companies have created smaller self-contained Pepper''s Ghost-based
    display cases that work well for showcasing a hovering or transparent product—even
    mixing digital video and a real physical object into the same display area. [Figure
    9-6](#Chapter09.html#fig_9_6) shows a simple three-sided Pepper''s Ghost design
    using a MacBook. This design was created by Ujjval Panchal. You can read more
    at his blog:

    [`http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/`](http://blog.ujjvalpanchal.com/3d-holographic-display-prototype-1/).


    ![images](images/0906.jpg)


    ***Figure 9-6**. Three-pane Pepper''s Ghost display with MacBook. Photo courtesy
    Ujjval Panchal*


    HoloCube ([www.holocube.eu/](http://www.holocube.eu/)) has a number of simple
    and pleasing box-shaped designs for viewing in one direction. RealFiction ([www.realfiction.com/](http://www.realfiction.com/))
    and Vizoo ([www.vizoo.com/](http://www.vizoo.com/)) sell pyramid-shaped systems,
    working off an arrangement similar to the Alexander McQueen show, that allow viewing
    from 180 to 360 degrees with either three or four separate channels of video corresponding
    to different angles.'
