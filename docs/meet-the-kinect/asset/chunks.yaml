    the OmekIsSensorConnected function in the SDK is triggered by .call and receives
    false or true.


    The onOmekIsSensorConnected function receives a string from the SDK. If it is
    the string true, the function sendQueriesToSensor runs.


    `/**`

    ` * function returns true or false if the sensor is connected.`

    ` *`

    ` * connected : boolean (as a string) "true" or "false", marking if the sensor
    is ready`

    ` */`

    `function onOmekIsSensorConnected(connected:String):void`

    `{`

    `  if ( connected=="true" )`

    `  {`

    `    removeEventListener(Event.ENTER_FRAME,checkIfSensorReady);`

    `    sendQueriesToSensor();`

    `  }`

    `}`


    Next is the function `sendQueriesToSensor`. This is the function that sends all
    of the call messages to the SDK. (`sendQueriesToNSensor` also exposes a few more
    functions). This is important because these calls include all gestures to be tracked
    and all alert messages to send. For example:


    `function sendQueriesToSensor():void`

    `{`

    `  //set the number of players the sensor tracks`

    `  ExternalInterface.call("OmekSetMaxPlayers","2");`

    `  //ask for the tracked number of players. return a value to`

    `  //ExternalInterface.addCallback("OmekGetMaxPlayers", onOmekGetMaxPlayers);`

    `  ExternalInterface.call("OmekGetMaxPlayers","");`


    `  //set the sensor''s tracking mode to either: "all", "basic", "upper", or "sitting"`

    `  ExternalInterface.call("OmekSetTrackingMode","all");`

    `  //ask for the current tracking mode. return a value to`

    `  //ExternalInterface.addCallback("OmekGetTrackingMode", onOmekGetTrackingMode);`

    `  ExternalInterface.call("OmekGetTrackingMode","");`


    `  //adding listeners for the sensor to specific gestures (see documentation`

    `  //for full list of gestures available)`

    `  ExternalInterface.call("OmekAddGesture","leftPush");`

    `  ExternalInterface.call("OmekAddGesture","rightClick");`

    `  ExternalInterface.call("OmekAddGesture","jumpNoHands");`

    `  //removing listeners from the sensor to specific gestures`

    `  ExternalInterface.call("OmekRemoveGesture","leftPush");`


    `  //adding listeners to specific alerts (see documentation for full`

    `  //list of alerts available).`

    `  ExternalInterface.call("OmekAddAlert","Alert_CalibrationDone");`

    `  ExternalInterface.call("OmekAddAlert","Alert_CalibrationBegun");`

    `  ExternalInterface.call("OmekAddAlert","Alert_TooClose");`

    `  ExternalInterface.call("OmekAddAlert","Alert_TooFar");`

    `  ExternalInterface.call("OmekAddAlert","Alert_CloseToSide");`

    `  ExternalInterface.call("OmekAddAlert","Alert_OutOfFrame");`

    `  ExternalInterface.call("OmekAddAlert","Alert_GoodLocation");`

    `  ExternalInterface.call("OmekAddAlert","Alert_CloseToWall");`

    `  ExternalInterface.call("OmekAddAlert","Alert_GoodBackground");`

    `  ExternalInterface.call("OmekAddAlert","Alert_PlayerEnters");`

    `  ExternalInterface.call("OmekAddAlert","Alert_PlayerLeaves");`

    `  ExternalInterface.call("OmekAddAlert","Alert_GoodFrameRate");`

    `  ExternalInterface.call("OmekAddAlert","Alert_LowFrameRate");`

    `  //removing listeners from the sensor to specific alerts`

    `  ExternalInterface.call("OmekAddAlert","Alert_GoodLocation");`

    `  ExternalInterface.call("OmekRemoveAlert","Alert_GoodFrameRate");`

    `  ExternalInterface.call("OmekAddAlert","Alert_CloseToWall");`


    `  //ask for the current working directory. return a value to`

    `  //ExternalInterface.addCallback("OmekGetWorkingDir", onOmekGetWorkingDir);`

    `  ExternalInterface.call("OmekGetWorkingDir","");`

    `  //ask for the sensor''s properties. return a value to`

    `  //ExternalInterface.addCallback("OmekGetSensorProperties", onOmekGetSensorProperties);`

    `  ExternalInterface.call("OmekGetSensorProperties","");`

    `  //ask for the body dimensions of a specific player. return a value to`

    `  //ExternalInterface.addCallback("OmekGetBodyDimensions", onOmekGetBodyDimensions);`

    `  ExternalInterface.call("OmekGetBodyDimensions","0");`


    `  //get rgb or depth or player mask`

    `  ExternalInterface.addCallback("OmekShowImage", onOmekShowImage);`

    `  ExternalInterface.addCallback("OmekGetImageResolution", onOmekGetImageResolution);`

    `  //ask for the resolution of the rgb image written in the xml. return a value
    to`

    `  //ExternalInterface.addCallback("OmekGetImageResolution", onOmekGetImageResolution);`

    `  ExternalInterface.call("OmekGetImageResolution","");`


    `}`


    ### Modifying the Beckon Flash Example


    Now we will add something to this example before moving on to creating our own
    example. Let’s track a new joint: the head.


    First off, we need to let Beckon know that we want to receive the head joint in
    the flash runtime environment. To do this, we need to modify the config.xml file
    and modify it to match the following code:


    `C:\MyProject\Flash\config.xml`

    `<tracking>`

    `                <skeleton rawSkeleton="true"/>`

    `                <joint name="rightFingerTip" screen="false" smooth="true"/>`

    `                <joint name="leftFingerTip" screen="false" smooth="true"/>`

    `                <joint name="torso" screen="false" smooth="true"/>              `

    `                <joint name="head" screen="false" smooth="true"/>`

    `</tracking>`


    Add head tracking into the example by modifying the onOmekJointPosition function  that
    starts on line 164 of the testOmekFlashPlayer.fla file. Following is the new version
    of the function that you should create:


    `function onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,
    jointY:String, jointZ:String, confidence:String):void`

    `{`

    `//give control on mouses to one specific player.`

    `if(playerLabel == "0")`

    `{`

    `if(jointName == "head") {`


    `  myHead.x = stage.stageWidth - Number(jointX) * _screenScaleX + _correctionX;`

    `  myHead.y =Number(jointY) * _screenScaleY + _correctionY;`


    `}`

    `if(jointName == "leftFingerTip")`

    `{`

    `  //mirror X value in order to make the mouse move left and right like the hand.`

    `  leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + _correctionX;`

    `  leftFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;`


    `  //debugString_txt.appendText("\nleftFingerTip_mc located at: ("+leftFingerTip_mc.x.toString()+","+leftFingerTip_mc.y.toString()+")");`

    `}`

    `if(jointName == "rightFingerTip")`

    `{`

    `  rightFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + _correctionX;`

    `  rightFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;`

    `}`

    `}`

    `}`


    Finally, export and run OmekBeckonFlash.exe. You should see your movie clip head
    tracking enabled and working, as shown in [Figure 6-5](#Chapter06.html#fig_6_5).


    ![images](images/0605.jpg)


    ***Figure 6-5.** Beckon tracking the added head joint*'
  trans: "\n#### 核心功能\n\n至此，我们已经完成了设置 Beckon Flash 集成所需的代码。在了解了最基本的设置后，让我们来看看我们讨论过的功能是如何集成到示例中的。首先，代码会检查传感器是否已连接并就绪。如果传感器已准备好使用且所有连线均正确，则所有相关查询将被发送到\
    \ SDK。此过程从第 21 行开始，通过一个每帧运行的 `addEventListener` 来检查传感器是否就绪。以下是从第 21 行开始的相关代码：\n\
    \n```actionscript\n//wait for connecting to the sensor before querying it.\naddEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n\
    function checkIfSensorReady(e:Event):void\n{\n//ask if the sensor is ready to\
    \ receive queries. return a value to\n//ExternalInterface.addCallback(\"OmekIsSensorConnected\"\
    , onOmekIsSensorConnected);\nExternalInterface.call(\"OmekIsSensorConnected\"\
    ,\"\");\n}\n```\n\n请注意下一个函数 `onOmekIsSensorConnected`，它现在已暴露给 SDK，并且 SDK 中的 `OmekIsSensorConnected`\
    \ 函数通过 `.call` 触发，并接收 `false` 或 `true`。\n\n`onOmekIsSensorConnected` 函数从 SDK 接收一个字符串。如果该字符串是\
    \ `true`，则执行 `sendQueriesToSensor` 函数。\n\n```actionscript\n/**\n * function returns\
    \ true or false if the sensor is connected.\n *\n * connected : boolean (as a\
    \ string) \"true\" or \"false\", marking if the sensor is ready\n */\nfunction\
    \ onOmekIsSensorConnected(connected:String):void\n{\n  if ( connected==\"true\"\
    \ )\n  {\n    removeEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n   \
    \ sendQueriesToSensor();\n  }\n}\n```\n\n接下来是 `sendQueriesToSensor` 函数。该函数会向 SDK\
    \ 发送所有调用消息。（`sendQueriesToNSensor` 还会暴露一些其他函数）。这一点很重要，因为这些调用包括所有需要追踪的手势以及所有需要发送的警报消息。例如：\n\
    \n```actionscript\nfunction sendQueriesToSensor():void\n{\n  //设置传感器追踪的玩家数量\n\
    \  ExternalInterface.call(\"OmekSetMaxPlayers\",\"2\");\n  //请求当前追踪的玩家数量。将返回值发送到\n\
    \  //ExternalInterface.addCallback(\"OmekGetMaxPlayers\", onOmekGetMaxPlayers);\n\
    \  ExternalInterface.call(\"OmekGetMaxPlayers\",\"\");\n\n  //设置传感器的追踪模式： \"all\"\
    , \"basic\", \"upper\", 或 \"sitting\"\n  ExternalInterface.call(\"OmekSetTrackingMode\"\
    ,\"all\");\n  //请求当前的追踪模式。将返回值发送到\n  //ExternalInterface.addCallback(\"OmekGetTrackingMode\"\
    , onOmekGetTrackingMode);\n  ExternalInterface.call(\"OmekGetTrackingMode\",\"\
    \");\n\n  //为传感器添加特定手势监听器（完整手势列表请参阅文档）\n  ExternalInterface.call(\"OmekAddGesture\"\
    ,\"leftPush\");\n  ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");\n\
    \  ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");\n  //移除传感器的特定手势监听器\n\
    \  ExternalInterface.call(\"OmekRemoveGesture\",\"leftPush\");\n\n  //为传感器添加特定警报监听器（完整警报列表请参阅文档）\n\
    \  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CalibrationDone\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_CalibrationBegun\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_TooClose\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_TooFar\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CloseToSide\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_OutOfFrame\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_GoodLocation\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CloseToWall\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodBackground\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_PlayerEnters\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_PlayerLeaves\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodFrameRate\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_LowFrameRate\");\n  //移除传感器的特定警报监听器\n\
    \  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodLocation\");\n  ExternalInterface.call(\"\
    OmekRemoveAlert\",\"Alert_GoodFrameRate\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_CloseToWall\");\n\n  //请求当前工作目录。将返回值发送到\n  //ExternalInterface.addCallback(\"\
    OmekGetWorkingDir\", onOmekGetWorkingDir);\n  ExternalInterface.call(\"OmekGetWorkingDir\"\
    ,\"\");\n  //请求传感器的属性。将返回值发送到\n  //ExternalInterface.addCallback(\"OmekGetSensorProperties\"\
    , onOmekGetSensorProperties);\n  ExternalInterface.call(\"OmekGetSensorProperties\"\
    ,\"\");\n  //请求特定玩家的身体尺寸。将返回值发送到\n  //ExternalInterface.addCallback(\"OmekGetBodyDimensions\"\
    , onOmekGetBodyDimensions);\n  ExternalInterface.call(\"OmekGetBodyDimensions\"\
    ,\"0\");\n\n  //获取 rgb、深度或玩家遮罩\n  ExternalInterface.addCallback(\"OmekShowImage\"\
    , onOmekShowImage);\n  ExternalInterface.addCallback(\"OmekGetImageResolution\"\
    , onOmekGetImageResolution);\n  //请求 xml 中 rgb 图像的分辨率。将返回值发送到\n  //ExternalInterface.addCallback(\"\
    OmekGetImageResolution\", onOmekGetImageResolution);\n  ExternalInterface.call(\"\
    OmekGetImageResolution\",\"\");\n\n}\n```\n\n### 修改 Beckon Flash 示例\n\n现在，在开始创建我们自己的示例之前，我们先在这个示例中添加一些内容。让我们追踪一个新关节：头部。\n\
    \n首先，我们需要让 Beckon 知道我们希望在 Flash 运行时环境中接收头部关节。为此，我们需要修改 `config.xml` 文件，使其与以下代码一致：\n\
    \n`C:\\MyProject\\Flash\\config.xml`\n```xml\n<tracking>\n                <skeleton\
    \ rawSkeleton=\"true\"/>\n                <joint name=\"rightFingerTip\" screen=\"\
    false\" smooth=\"true\"/>\n                <joint name=\"leftFingerTip\" screen=\"\
    false\" smooth=\"true\"/>\n                <joint name=\"torso\" screen=\"false\"\
    \ smooth=\"true\"/>              \n                <joint name=\"head\" screen=\"\
    false\" smooth=\"true\"/>\n</tracking>\n```\n\n通过修改 `testOmekFlashPlayer.fla`\
    \ 文件中从第 164 行开始的 `onOmekJointPosition` 函数，将头部追踪添加到示例中。以下是您应创建的新版本函数：\n\n```actionscript\n\
    function onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,\
    \ jointY:String, jointZ:String, confidence:String):void\n{\n//将鼠标控制权交给特定玩家。\n\
    if(playerLabel == \"0\")\n{\nif(jointName == \"head\") {\n\n  myHead.x = stage.stageWidth\
    \ - Number(jointX) * _screenScaleX + _correctionX;\n  myHead.y =Number(jointY)\
    \ * _screenScaleY + _correctionY;\n\n}\nif(jointName == \"leftFingerTip\")\n{\n\
    \  //镜像 X 值，使鼠标像手一样左右移动。\n  leftFingerTip_mc.x = stage.stageWidth - Number(jointX)\
    \ * _screenScaleX + _correctionX;\n  leftFingerTip_mc.y = Number(jointY) * _screenScaleY\
    \ + _correctionY;\n\n  //debugString_txt.appendText(\"\\nleftFingerTip_mc located\
    \ at: (\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
    )\");\n}\nif(jointName == \"rightFingerTip\")\n{\n  rightFingerTip_mc.x = stage.stageWidth\
    \ - Number(jointX) * _screenScaleX + _correctionX;\n  rightFingerTip_mc.y = Number(jointY)\
    \ * _screenScaleY + _correctionY;\n}\n}\n}\n```\n\n最后，导出并运行 `OmekBeckonFlash.exe`。您应该会看到影片剪辑的头部追踪已启用并正常工作，如图\
    \ 6-5 所示。\n\n![images](img/0605.jpg)\n\n***图 6-5.** Beckon 追踪新增的头部关节*\n"
- fmt: '### Designing A Custom Gesture


    Gesture design opens the door to a new world of user experience that’s just now
    being created. When you start designing your gestures, you will want to keep a
    few basics in mind. Here are seven design strategies to get you started:


    1. First, the gesture should feel connected to the activity the user needs to
    perform. Think about the popular ‘pinch to peek‘ gesture for zooming photos on
    the iPhone. It feels very intuitive and is an example of excellent gesture design.
    The motions are natural for making an image larger or smaller, and connect people
    to their photos in a more organic way.


    ![images](images/square.jpg) **Tip** What would be the best gestures for your
    application or game? Certainly the best would be gestures that require no user
    manual and very little explanation. Allowing people to try and use your interface
    with absolutely no prior exposure to your project will immediately let you know
    if the design is working. Can users figure out your interface naturally, or do
    they need to stop and ask what to do? Is your interface friendly and inviting
    enough that users can just start trying it out, or does it feel intimidating?
    A few false starts can spoil a user’s initial reaction to an interface. If the
    interface continues to behave in unexpected ways, the user will likely quit using
    it at all.


    2. A second gesture rule of thumb is to consider user comfort and the body. The
    days of the body needing to conform to the machine are over. I have continued
    to wonder why we still use what looks like a glorified typewriter over 100 years
    later, despite vast leaps in technology. Our QWERTY keyboard does nothing but
    lead to RSI, Carpel Tunnel, and back pain for thousands of users. Interfaces that
    are comfortable to use are going to be the most successful for long-term use.
    Thankfully, with multi touch and computer vision at our disposal for creating
    user experiences, we no longer need to rely on old paradigms to create interaction
    models. Simply put, if it hurts, don’t do it—and don’t ask your customers and
    users to do it.


    3. Third, take into account basic human psychology when designing. Raising your
    arms up to the sky universally feels uplifting, while kneeling has connotations
    of prayer and surrender. For example, if you want someone to feel happy while
    playing your game, it would be wise to read Jane McGonigal’s, *Reality is Broken*.
    She documents many tactics for creating positive emotions in gaming, the most
    common of which is touching another human. Human touch releases a flood of oxytocin
    in the brain. Oxytocin is a chemical widely associated with creating happiness
    in the mind. Gesture based SDKs allow for player interaction, so touch would be
    a very easy way to trigger positive emotions, bonding, and a feeling of connection
    in your players.


    4. Fourth, use gesture conventions to your advantage and build upon them. There’s
    absolutely no excuse to ignore gestures that people are familiar with from other
    platforms or interaction models. Take those gestures and make them work for the
    interface you are designing. At its core, design builds upon existing paradigms
    and good design advances design discourse.


    5. Fifth, don’t violate interaction models that users are accustomed to from the
    real world or other interfaces. Gamers are used to the idea of picking up a sword
    and they have a specific way they expect to hold and swing it. Take that model
    into account when designing. Use gestures with arm swings to allow for a fun,
    more realistic sword fight.


    6. Sixth, interaction models should not be in conflict with the world in which
    they exist. For instance, if a player is carrying a sword on their back in the
    game, don’t make the player go through an interface to access that weapon. Just
    allow them to reach up and grab it off their back. Otherwise, you will design
    conflicting, confusing interactions that will be unintuitive to players.


    7. Finally, an interface and gestures should work as a whole. Users should be
    able to easily grasp the gestalt of the UX design and convey it to new users quickly
    and with ease. Don’t change the gesture used for a task to another gesture halfway
    through the experience. Consider keeping gestures used for similar experiences
    connected in their design.


    In this area, much might be learned from the fields of yoga, neurology, and physical
    therapy. All three of these fields have extensively explored the mind-body connection.
    What emotion arises by forms created with the human body? What chemicals are triggered
    in our brains with which gestures? How will mirror neurons impact group experience
    design? Without doubt, gestures that you add to your design will have tremendous
    impact usability.'
