  trans: '

    ***图 2-4.** 采用三步相移扫描技术的可见光结构光设备示意图。下方帧显示可任意角度查看的最终点云图像。* 图片由 Kyle MacDonald 根据知识共享署名
    3.0 未本地化版本许可协议授权。


    Kinect 的结构光方法在原理上类似于用于扫描可见光的技术，如图 2-4 所示。投影仪发射信号，摄像头读取信号，然后通过计算得出最终深度图像中每个像素对应的物体与摄像头之间的距离。然而，由
    PrimeSense 设计的 Kinect 方法在实现细节上具有独特性。它并非投射可见的连续变化形状或光带，而是让不可见的红外激光投影仪生成一个由强度各异的点组成的静态云状图案，该图案看似随机。红外激光照射到衍射光栅上，将光束分成数千个独立的点，从而形成每个光点。


    Kinect 会向场景投射多少个红外光点？据估计在 30,000 到 300,000 个之间。有一位好奇的人费尽心思记录了该图案并在网格上重建，以理解这些点的结构。他的结论是，一个
    3×3 的网格是 211×165 点阵图案的重复，从而构成一个 633×495 或总计 313,335 个光点的整体网格（更多信息请参见 [`http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/`](http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/)）。


    这些点看起来像随机的静态噪声，直到你发现存在一个由九个部分组成的重复图案，形成棋盘格。使用诸如 `RGBDemo` 之类的程序可以观察到这个光阵列，该程序提供了对红外图像流的访问。该图案的构建方式使得任何一组点的检测都能在整个点集的范围内被识别——这就是
    PrimeSense 深度传感器系统架构的精髓（图 2-5）。由于它们以如此可识别的方式结构化排列，PrimeSense 图像处理器芯片能够对齐这些点，并通过比较它们的不同位置进行计算，从而创建参考图像。当这些摄像头和芯片在工厂被组装成一个系统时，所有组件都通过将传感器指向距设备特定距离的墙壁来进行校准。投影仪显示其结构光图案，红外摄像头捕捉一幅图像，该图像存储在
    PrimeSense 芯片上，作为该特定距离下图像中所有像素的深度记录。从此以后，这幅图像便成为计算实时深度图像中每个像素距离的参照点。人的面部会破坏均匀图案，并与参考图像进行比较，通过这一过程得出面部每个点的距离，精度达到厘米级。


    ![images](img/0205.jpg)


    ***图 2-5.** PrimeSense 深度传感器架构。彩色图像 CMOS 传感器和音频组件（以蓝色标出）并非生成深度图所必需。图片由 PrimeSense
    提供。*


    读取所有这些点需要一种能够看到红外光的特殊摄像头。这便是 Kinect 最右侧镜头（图 1-6，D）后面的摄像头。该摄像头有一个滤光片，它通过只允许红外光照射到后面的感光传感器来屏蔽可见光谱。如果你仔细观察这个镜头，可以看到其虹彩般的绿色镀膜，这是将其与左侧的可见光摄像头区分开来的方式。这个屏障反射了深度计算过程所不需要的所有不必要的可见光，只允许红外投影光点通过镜头。


    Kinect 还配备了另一个我们更为熟悉的摄像头。它是一个简单的网络摄像头，类似于你的笔记本电脑或手机可能包含的那种，用于捕捉可见光并将其表示为红绿蓝（RGB）像素。PrimeSense
    参考设备也包含这个摄像头。然而，另一个被许可方华硕在其首款 WAVI Xtion 设备中选择不包含 RGB 摄像头。该摄像头不用于生成深度图，但许多新型深度摄像头设备都包含它，作为将可见光图像与深度图像融合的一种方法。将可见光与深度图结合的系统是一种体积摄像机的形式，特别是当它们以多个
    RGB/深度传感设备阵列的形式组装时。组合多个传感器阵列可以生成无阴影的图像（阴影区域不存储深度信息），从而允许对场景进行无限视角观察，而物体后方没有明显的空隙。


    此外，可见光摄像头还可用于计算分析。例如，计算机视觉识别软件（如 `OpenCV`）可以应用于场景以搜索人脸，并可经过训练将这些面部与从深度图中分离出的单个用户相关联。已有多种现成的库和方法可用于从
    RGB 图像中提取有意义的信息，当硬件使用这个额外的可见光摄像头时，这些库和方法可以集成到应用程序中。


    以下小节将介绍若干采用结构光方法获取 3D 场景信息的深度传感器。它们都使用了 PrimeSense 的设计，但在可选内部组件和外形尺寸上有不同选择。随着
    PrimeSense 继续将该设计授权给更多制造商（例如生产平板电视和机顶盒的制造商），开发者将发现一个可以选择多种设备的生态系统，能够基于他们对 Kinect
    的了解来设计应用程序。许多此类硬件制造商将选择加入符合 OpenNI 标准或其它基于标准的应用商店，这为应用开发者创造了将其作品分发给更广泛的已安装设备用户群的机会。


    #### PrimeSense 参考设计


    PrimeSense 是一家总部位于以色列的公司，它开发了 Microsoft 许可用于 Kinect 的 3D 结构光技术。开发者可以使用参考设计产品来评估该技术在新硬件中的应用，或者配合将在后续章节中介绍的
    `OpenNI`/`NITE` 软件进行开发。就本书的范围而言，PrimeSense 的参考设计与 Kinect 的相同。唯一的区别在于缺少电机、需要交流电源适配器以及麦克风组件不同。`PS1080`
    设计（图 2-6）是最早可用的，现在正在被一个带有内置支架的更小型号所取代。（更多信息请访问 [`http://www.primesense.com`](http://www.primesense.com)`）。`


    ![images](img/square.jpg) **提示** 华硕制造并在下一节中提及的 `Xtion Pro Live` 正是 PrimeSense
    参考设计的具体实现。如果你想要一个参考设计的实现版本，但又难以从 PrimeSense 获得，那么 `Xtion Pro Live` 是一个不错的选择。


    ![images](img/0206.jpg)


    ***图 2-6.** 最初的 PrimeSense 参考设计 PS1080（上方）以及更新款设计（下方）*


    PrimeSense 是红外结构光系统的主要设计者。然而，其他硬件制造商使用将在后续章节“飞行时间摄像头系统”中描述的替代技术来生成深度图像。重要的是要记住，无论设计如何，所有这些传感器都能生成深度图，并且可以运用类似的原理将其集成到软件中。当我们进入软件栈的驱动部分时，你会看到存在多层软件，它们将特定的硬件实现抽象化，让你能够直接访问
    3D 数据，而无论生成该数据使用了何种方法。

    '
- fmt: '## ASUS WAVI Xtion PRO and PRO Live


    ASUS, a Taiwanese computer manufacturer, was the second major licensee of the
    PrimeSense hardware technology after Microsoft. The WAVI Xtion PRO is marketed
    as “the world’s first and only professional PC motion–sensing software development
    kit.” The distinction is warranted because, unlike Kinect, this product was designed
    with the intention of connecting it to a personal computer right out of the box
    and is developer–friendly with software and content creation tools intentionally
    included. Developers who build `OpenNI`–compliant software will have an opportunity
    to sell it in the ASUS Xtion store that will accompany the WAVI Xtion product
    line.


    More recently, ASUS has introduced the Xtion PRO Live. This newer model includes
    an RGB camera, and is a precise implementation of PrimeSense’s reference design.
    More information about both models is available at [`http://event.asus.com/wavi/Product/WAVI_Pro.aspx`](http://event.asus.com/wavi/Product/WAVI_Pro.aspx).


    ![images](images/square.jpg) **Note** Following is the direct link to the ASUS
    store page from which you can purchase the PRO Live model: [`http://us.estore.asus.com/index.php?l=product_detail&p=4001`](http://us.estore.asus.com/index.php?l=product_detail&p=4001).


    ### Time–of–Flight Camera Systems


    In contrast to structured light systems, time–of–flight camera systems don’t make
    use of a complex projected pattern that needs to be decoded in order to calculate
    depth. Instead, these systems make use of the constant speed of light, approximately
    300 million meters per second, as the key to unlocking the depth of objects in
    a scene. This depth ranging technique works by recording the time it takes a light
    signal to travel from an emitter and bounce off an object in a scene, and eventually
    land back on a light sensor in the unit. Extremely sensitive photo sensors and
    high–speed electronic components allow for a calculation of distance to be made
    based upon the time it takes for the light to travel and bounce back. This calculation
    is performed for every element in the sensor array, which requires the resolution
    of these devices to be smaller than that of structured light systems, usually
    between 64x48 and 320x240 pixels.


    There are a number of techniques—such as pulsed light, RF modulation, and range
    gating—that manufacturers can use to make a time–of–flight system. Additionally,
    one can choose what type of light source to use, which determines the price and
    suitability of a given environment. An array of LEDs can be used to construct
    a consumer–priced system that works well for close range subjects, between two
    centimeters and two meters. Laser light–based systems have the ability to extend
    up to two kilometers, but these are out of the price range for anyone but large
    institutions.


    `LED`–based time–of–flight sensors make up the bulk of the competition against
    PrimeSense structured light depth sensors. The following section highlights the
    devices that are marketed for use in 3D natural interface systems. Because of
    the way these systems are designed, they have abilities that structured light
    systems are unable to match. Depending on the type of illumination employed and
    the availability of ambient light suppression, time–of–flight units can be used
    outdoors in daylight. Structured light systems are often unable to compete with
    the strength of light beyond indoor conditions. Additionally, time–of–flight chip
    timing can be altered to provide depth precision over a large distance, or it
    can be densely tuned to a small depth range, making these systems suitable for
    facial capture where a high degree of detail is required over a short distance.


    ### SoftKinetic DepthSense Cameras


    SoftKinetic is a Belgium–based company that is bringing its DepthSense line of
    cameras to the US market along with their 3D gesture recognition middleware, `iisu`.
    Their DepthSense cameras gather 3D scene information using time–of–flight systems
    and include an RGB camera for sensing visible light imagery similar to Kinect.
    Their DepthSense hardware enables the natural motion based interface for the first
    game console designed for the Chinese market, iSec ([`http://www.eedoo.cn/html/eedoo/isec/`](http://www.eedoo.cn/html/eedoo/isec/)).
    More information about SoftKinetic is available at [`http://www.softkinetic.com/`](http://www.softkinetic.com/).


    ### PMD [vision] time–of–flight cameras


    PMDTec, headquartered in Germany, is the world’s leading supplier of integrated
    circuit technology for time–of–flight cameras. Their `PMD[vision] CamBoard` reference
    design has a grid of 200x200 sensor elements and provides companies that want
    to build their own products around this technology with an idea of how it can
    be implemented, similar to the relationship between PrimeSense and Microsoft with
    Kinect. The `PMD [vision] O3` on the other hand, is packaged to be purchased direct
    from PMD and contains a sensor grid of 64x48 elements. These two devices (shown
    in [Figure 2-7](#Chapter02.html#fig_2_7)) do not come with an integrated RGB camera
    so they can only provide a depth and IR map. PMDTec’s newest high–resolution prototypes
    capture up to 352x288 sensor elements. (More information is available at [`http://www.pmdtec.com/`](http://www.pmdtec.com/)`).


    ![images](images/0207.jpg)


    `Figure 2-7.` The PMD [vision] CamCube, PMD [vision] CamBoard reference design,
    and PMD [vision] ConceptCam. Photo by Kara Dahlberg.


    ### Panasonic D-Imager


    Panasonic’s D-Imager shown in [Figure 2-8](#Chapter02.html#fig_2_8) is marketed
    as a depth–sensing solution for gaming systems and digital signage. It was used
    to drive an interactive display at the Japanese pavilion during the World’s Fair
    EXPO 2010 in Shanghai. The D-Imager can produce a 160x120-resolution depth map
    image at up to 30 frames per second. Panasonic’s device contains back light suppression
    technology to make it more resilient to bright ambient light conditions. More
    information is available at [`http://panasonic-electric-works.net/D-IMager`](http://panasonic-electric-works.net/D-IMager)``.


    ![images](images/0208.jpg)


    `Figure 2-8.` Panasonic D-Imager time–of–flight depth sensor with an array of
    near infrared LEDs hidden to the left and right of the lens.


    ## Drivers & Data


    Each of the devices mentioned in the previous hardware sections require drivers
    that can interpret the raw signals coming out of them and turn those signals into
    usable data for applications. Drivers are the next layer in the technology stack
    and are critical for developing software that can take full advantage of these
    devices on a given platform.


    The original manufacturers only provide drivers for these devices on platforms
    that they support. This was the case with Kinect when it was initially released.
    Kinect was only usable on Xbox 360 systems until the open source community reverse–engineered
    the device to produce the OpenKinect project and the `libfreenect` drivers. Since
    then, there are multiple ways to work with Kinect on the platform you desire,
    or with any of the other depth–sensing cameras listed in the previous hardware
    section. This is all thanks to the magic of drivers – let’s look at the kind of
    data supplied by different drivers.'
  raw: '#### ASUS WAVI Xtion PRO and PRO Live


    ASUS, a Taiwanese computer manufacturer, was the second major licensee of the
    PrimeSense hardware technology after Microsoft. The WAVI Xtion PRO is marketed
    as “the world’s first and only professional PC motion–sensing software development
    kit.” The distinction is warranted because, unlike Kinect, this product was designed
    with the intention of connecting it to a personal computer right out of the box
    and is developer–friendly with software and content creation tools intentionally
    included. Developers who build OpenNI–compliant software will have an opportunity
    to sell it in the ASUS Xtion store that will accompany the WAVI Xtion product
    line.


    More recently, ASUS has introduced the Xtion PRO Live. This newer model includes
    an RGB camera, and is a precise implementation of PrimeSense’s reference design.
    More information about both models is available at [`http://event.asus.com/wavi/Product/WAVI_Pro.aspx`](http://event.asus.com/wavi/Product/WAVI_Pro.aspx).


    ![images](images/square.jpg) **Note** Following is the direct link to the ASUS
    store page from which you can purchase the PRO Live model: [`http://us.estore.asus.com/index.php?l=product_detail&p=4001`](http://us.estore.asus.com/index.php?l=product_detail&p=4001).


    ### Time–of–Flight Camera Systems


    In contrast to structured light systems, time–of–flight camera systems don’t make
    use of a complex projected pattern that needs to be decoded in order to calculate
    depth. Instead, these systems make use of the constant speed of light, approximately
    300 million meters per second, as the key to unlocking the depth of objects in
    a scene. This depth ranging technique works by recording the time it takes a light
    signal to travel from an emitter and bounce off an object in a scene, and eventually
    land back on a light sensor in the unit. Extremely sensitive photo sensors and
    high–speed electronic components allow for a calculation of distance to be made
    based upon the time it takes for the light to travel and bounce back. This calculation
    is performed for every element in the sensor array, which requires the resolution
    of these devices to be smaller than that of structured light systems, usually
    between 64x48 and 320x240 pixels.


    There are a number of techniques—such as pulsed light, RF modulation, and range
    gating—that manufacturers can use to make a time–of–flight system. Additionally,
    one can choose what type of light source to use, which determines the price and
    suitability of a given environment. An array of LEDs can be used to construct
    a consumer–priced system that works well for close range subjects, between two
    centimeters and two meters. Laser light–based systems have the ability to extend
    up to two kilometers, but these are out of the price range for anyone but large
    institutions.


    LED–based time–of–flight sensors make up the bulk of the competition against PrimeSense
    structured light depth sensors. The following section highlights the devices that
    are marketed for use in 3D natural interface systems. Because of the way these
    systems are designed, they have abilities that structured light systems are unable
    to match. Depending on the type of illumination employed and the availability
    of ambient light suppression, time–of–flight units can be used outdoors in daylight.
    Structured light systems are often unable to compete with the strength of light
    beyond indoor conditions. Additionally, time–of–flight chip timing can be altered
    to provide depth precision over a large distance, or it can be densely tuned to
    a small depth range, making these systems suitable for facial capture where a
    high degree of detail is required over a short distance.


    #### SoftKinetic DepthSense Cameras


    SoftKinetic is a Belgium–based company that is bringing its DepthSense line of
    cameras to the US market along with their 3D gesture recognition middleware, iisu.
    Their DepthSense cameras gather 3D scene information using time–of–flight systems
    and include an RGB camera for sensing visible light imagery similar to Kinect.
    Their DepthSense hardware enables the natural motion based interface for the first
    game console designed for the Chinese market, iSec ([`http://www.eedoo.cn/html/eedoo/isec/`](http://www.eedoo.cn/html/eedoo/isec/)).
    More information about SoftKinetic is available at [`http://www.softkinetic.com/`](http://www.softkinetic.com/).


    #### PMD [vision] time–of–flight cameras


    PMDTec, headquartered in Germany, is the world’s leading supplier of integrated
    circuit technology for time–of–flight cameras. Their PMD[vision] CamBoarreference
    design has a grid of 200x200 sensor elements and provides companiesd reference
    design has a grid of 200x200 sensor elements and provides companies that want
    to build their own products around this technology with an idea of how it can
    be implemented, similar to the relationship between PrimeSense and Microsoft with
    Kinect. The PMD [vision] O3 on the other hand, is packaged to be purchased direct
    from PMD and contains a sensor grid of 64x48 elements. These two devices (shown
    in [Figure 2-7](#Chapter02.html#fig_2_7)) do not come with an integrated RGB camera
    so they can only provide a depth and IR map. PMDTec’s newest high–resolution prototypes
    capture up to 352x288 sensor elements. (More information is available at [`http://www.pmdtec.com/`](http://www.pmdtec.com/)`)`.


    ![images](images/0207.jpg)


    ***Figure 2-7.** The PMD [vision] CamCube, PMD [vision] CamBoard reference design,
    and PMD [vision] ConceptCam. Photo by Kara Dahlberg.*


    #### Panasonic D-Imager


    Panasonic’s D-Imager shown in [Figure 2-8](#Chapter02.html#fig_2_8) is marketed
    as a depth–sensing solution for gaming systems and digital signage. It was used
    to drive an interactive display at the Japanese pavilion during the World’s Fair
    EXPO 2010 in Shanghai. The D-Imager can produce a 160x120-resolution depth map
    image at up to 30 frames per second. Panasonic’s device contains back light suppression
    technology to make it more resilient to bright ambient light conditions. More
    information is available at [`http://panasonic-electric-works.net/D-IMager`](http://panasonic-electric-works.net/D-IMager)`.`


    ![images](images/0208.jpg)


    ***Figure 2-8.** Panasonic D-Imager time–of–flight depth sensor with an array
    of near infrared LEDs hidden to the left and right of the lens.*


    ### Drivers & Data


    Each of the devices mentioned in the previous hardware sections require drivers
    that can interpret the raw signals coming out of them and turn those signals into
    usable data for applications. Drivers are the next layer in the technology stack
    and are critical for developing software that can take full advantage of these
    devices on a given platform.


    The original manufacturers only provide drivers for these devices on platforms
    that they support. This was the case with Kinect when it was initially released.
    Kinect was only usable on Xbox 360 systems until the open source community reverse–engineered
    the device to produce the OpenKinect project and the libfreenect drivers. Since
    then, there are multiple ways to work with Kinect on the platform you desire,
    or with any of the other depth–sensing cameras listed in the previous hardware
    section. This is all thanks to the magic of drivers – let’s look at the kind of
    data supplied by different drivers.'
  trans: '

    ## 华硕 WAVI Xtion PRO 与 PRO Live


    台湾电脑制造商华硕是继微软之后，PrimeSense 硬件技术的第二家主要授权商。WAVI Xtion PRO 被宣传为“全球首款也是唯一一款专业 PC 动作感应软件开发工具包”。这种差异化是合理的，因为与
    Kinect 不同，该产品设计初衷就是开箱即可连接个人电脑，并且特意包含了软件和内容创建工具，对开发者十分友好。构建符合`OpenNI`标准的软件的开发者，将有机会在华硕
    Xtion 商店中销售其产品，该商店将伴随 WAVI Xtion 产品线推出。


    最近，华硕推出了 Xtion PRO Live。这款较新的型号包含一个 RGB 摄像头，是 PrimeSense 参考设计的精确实现。有关这两款型号的更多信息，请访问
    [`http://event.asus.com/wavi/Product/WAVI_Pro.aspx`](http://event.asus.com/wavi/Product/WAVI_Pro.aspx)。


    ![images](img/square.jpg) **注意** 以下是华硕商店页面的直接链接，您可以通过该链接购买 PRO Live 型号：[`http://us.estore.asus.com/index.php?l=product_detail&p=4001`](http://us.estore.asus.com/index.php?l=product_detail&p=4001)。


    ### 飞行时间相机系统


    与结构光系统相比，飞行时间相机系统不依赖需要通过解码来计算深度的复杂投射图案。相反，这些系统利用光速恒定（约每秒 3 亿米）这一特性，作为揭示场景中物体深度的关键。这种深度测距技术的原理是：记录光信号从发射器发出，照射到场景中的物体后反射，最终返回到设备中光传感器所需的时间。极其灵敏的光传感器和高速电子组件能够根据光往返所需的时间来计算距离。对于传感器阵列中的每个单元都会进行此计算，这导致这些设备的分辨率通常低于结构光系统，一般在
    64x48 到 320x240 像素之间。


    制造商可以采用多种技术来构建飞行时间系统，例如脉冲光、射频调制和距离选通。此外，还可以选择使用何种类型的光源，这决定了系统的价格及其对特定环境的适应性。可以使用
    LED 阵列来构建适合近距离（两厘米到两米）对象的消费级系统。基于激光的系统能够将测距范围扩展到两公里，但其价格超出了除大型机构以外的任何人的承受范围。


    基于`LED`的飞行时间传感器构成了与 PrimeSense 结构光深度传感器竞争的主力。下一节将重点介绍那些被宣传用于 3D 自然界面系统的设备。由于这些系统的设计方式，它们具备结构光系统无法比拟的能力。根据所采用的照明类型和环境光抑制能力，飞行时间设备可以在白天的室外使用。而结构光系统通常无法在室内以外的强光下与之竞争。此外，飞行时间芯片的计时可以调整，以提供大范围距离上的深度精度，也可以密集地调整到较小的深度范围，这使得这些系统适用于面部捕捉——这类应用需要在短距离内获得高度细节。


    ### SoftKinetic DepthSense 摄像头


    SoftKinetic 是一家总部位于比利时的公司，正将其 DepthSense 系列摄像头及其 3D 手势识别中间件`iisu`推向美国市场。其 DepthSense
    摄像头使用飞行时间系统收集 3D 场景信息，并包含一个类似于 Kinect 的 RGB 摄像头，用于感知可见光图像。他们的 DepthSense 硬件为首款面向中国市场的游戏机
    iSec 提供了基于自然动作的界面支持（[`http://www.eedoo.cn/html/eedoo/isec/`](http://www.eedoo.cn/html/eedoo/isec/)）。有关
    SoftKinetic 的更多信息，请访问 [`http://www.softkinetic.com/`](http://www.softkinetic.com/)。


    ### PMD [vision] 飞行时间摄像头


    总部位于德国的 PMDTec 是全球领先的飞行时间摄像头集成电路技术供应商。他们的`PMD[vision] CamBoard`参考设计采用 200x200
    的传感器单元网格，为希望围绕此技术构建自有产品的公司提供了如何实现的思路，类似于 PrimeSense 与微软在 Kinect 上的合作模式。另一方面，`PMD
    [vision] O3`以可直接从 PMD 购买的形式包装，包含 64x48 单元的传感器网格。这两款设备（如图 2-7 所示）未集成 RGB 摄像头，因此只能提供深度图和红外图。PMDTec
    最新的高分辨率原型机可捕捉高达 352x288 的传感器单元。（更多信息请访问 [`http://www.pmdtec.com/`](http://www.pmdtec.com/)）。


    ![images](img/0207.jpg)


    `图 2-7.` PMD [vision] CamCube、PMD [vision] CamBoard 参考设计以及 PMD [vision] ConceptCam。摄影：Kara
    Dahlberg。


    ### 松下 D-Imager


    图 2-8 所示的松下 D-Imager 被宣传为适用于游戏系统和数字标牌的深度感应解决方案。在 2010 年上海世博会的日本馆中，它被用于驱动一个交互式显示屏。D-Imager
    能够以最高每秒 30 帧的速度生成 160x120 分辨率的深度图。松下的设备包含背光抑制技术，使其在明亮的环境光条件下更具韧性。更多信息请访问 [`http://panasonic-electric-works.net/D-IMager`](http://panasonic-electric-works.net/D-IMager)。


    ![images](img/0208.jpg)


    `图 2-8.` 松下 D-Imager 飞行时间深度传感器，其镜头的左侧和右侧隐藏了近红外 LED 阵列。


    ## 驱动与数据


    前面硬件章节中提到的每款设备都需要驱动程序来解释其输出的原始信号，并将这些信号转换为应用程序可用的数据。驱动程序是技术栈中的下一层，对于开发能够在特定平台上充分利用这些设备的软件至关重要。


    原始制造商只在其支持的平台上提供这些设备的驱动程序。Kinect 最初发布时也是如此。在开源社区逆向工程该设备，开发出 OpenKinect 项目和`libfreenect`驱动程序之前，Kinect
    只能在 Xbox 360 系统上使用。自那时起，就有了多种方法可以在您想要的平台上使用 Kinect，或者使用前面硬件章节中列出的任何其他深度感应摄像头。这一切都归功于驱动程序的神奇之处——让我们来看看不同驱动程序提供的数据类型。

    '
- fmt: '#### `OpenKinect/Libfreenect`


    The OpenKinect project’s `libfreenect` open source driver for Kinect was the first
    available for general use and is the basis for a number of projects. Once the
    OpenNI driver framework came out, many projects dropped their dependencies on
    `libfreenect` and moved over to the OpenNI drivers because they offered more flexibility
    for swapping out Kinect for other hardware, as well as a more robust set of features
    to build applications on top of. That said, many programmers still choose to use
    the `libfreenect` driver because it is easy to redistribute without requiring
    users to download dependent software.


    `Libfreenect` provides access to three main sets of data from Kinect in the form
    of imagery. The most important data is the raw depth map image ([Figure 2-9](#Chapter02.html#fig_2_9)).
    This is `libfreenect`’s only way of providing depth information for your application.
    This image is encoded to an 11-bit depth and the intensity values map to a specific
    distance from the camera. The rawest form of data displays this in shades of gray,
    yet most utilities choose to display it as a colored image in order to distinguish
    between distances visually.


    ![images](images/0209.jpg)


    **Figure 2-9.** Depth map image from `Libfreenect`. Each color represents a distance
    from the camera.


    The `libfreenect` driver also provides your application with a raw infrared (IR)
    image using the far right camera ([Figure 2-10](#Chapter02.html#fig_2_10)). The
    driver uses a direct feed from the camera that is designed to look for the dots
    of light produced by the IR projector. For that reason, the image is filled with
    a speckled pattern that is dispersed around the objects in the scene. Because
    the IR map is used to generate the depth map, combining the two in a point cloud
    view provides a well-aligned 3D representation. However, the representation must
    be calibrated. This need for calibration is one of the frustrating aspects of
    using the `Libfreenect` drivers – OpenNI provides a calibrated mapping of the
    RGB data for the depth data.


    ![images](images/0210.jpg)


    **Figure 2-10.** IR map image from `Libfreenect`. Speckled dots are projected
    on the scene from the IR projector.


    The final image data provided by `Libfreenect` is the visible light RGB image
    ([Figure 2-11](#Chapter02.html#fig_2_11)) from the middle camera in Kinect. The
    RGB camera provides the visual data you would work with to perform calculations
    on a scene using computer vision software, such as OpenCV, for face recognition.
    As you’ll see in [Chapter 3](#Chapter03.html#ch3)’s coverage of the Body Dysmorphia
    Toy and the Ultra Seven/Kamehameha apps, this visual data can also be fed back
    into the software you produce to provide an augmented reality view. Your application
    can also align the RGB image data with the depth map to produce point clouds that
    will reconstruct a scene like 3D Capture-It, which is also covered in [Chapter
    3](#Chapter03.html#ch3).


    ![images](images/0211.jpg)


    **Figure 2-11.** RGB map image from `libfreenect`


    In addition to the image-based sensor data, `Libfreenect` also provides access
    to the 3-axis accelerometer chip embedded in Kinect. This could be helpful for
    designing hand-held applications that require users to move Kinect manually, as
    MatterPort does in [Chapter 3](#Chapter03.html#ch3). `Libfreenect` lets your application
    read data, but it also controls actuators on Kinect. The LED light can turn different
    colors and turn on and off according to your design. The Kinect head can be tilted
    30 degrees up or down using the motor-control function.


    #### `OpenNI`


    As described on `www.OpenNI.org`, “the OpenNI organization is an industry-led,
    not-for-profit organization formed to certify and promote the compatibility and
    interoperability of Natural Interaction (NI) devices, applications, and middleware.”
    To carry out this mission, and with the strong support of PrimeSense, the organization
    has created an open source framework called OpenNI that provides an application-programming
    interface (API) for writing applications that use natural interaction. The API
    covers communication with low-level devices, such as vision and audio sensors,
    as well as high-level middleware solutions for visual tracking using computer
    vision.


    OpenNI provides access to all of the data available through the `Libfreenect`
    driver. It also provides benefits such as methods for converting from projective
    x, y coordinates of the depth map back to real world x, y, and z coordinates in
    centimeters. This makes it easier to acquire a point cloud and generate alternate
    viewpoints in a scene from synthesized camera views (see [Figure 2-12](#Chapter02.html#fig_2_12)).
    Additionally this software provides the ability to track multiple people, and
    extract their gestures from skeletal body data.


    ![images](images/0212.jpg)


    **Figure 2-12.** Upper row, point cloud rotated to show alternate viewpoints.
    Lower row, source RGB, depth, and IR map images for point cloud scene.


    #### Commercial Drivers


    The various software development kits designed to build applications for natural
    interaction all come with their own series of drivers for Kinect and have other
    depth sensors built in. `SoftKinetic`’s `issu`, `Omek Interactive`’s `Beckon`,
    and `Gesturetek`’s `GestTrack3D` have their own implementations and may have varying
    ways of working with the device. In terms of the microphone array inside Kinect,
    Microsoft’s drivers for Windows contain features not available in other drivers.
    Microsoft’s Kinect SDK is not yet licensable for commercial use, but we expect
    that situation to change early in 2012 when Microsoft releases a commercial version
    of their SDK.


    ### Middleware and Application Development Environments


    The last major component of the stack is the so-called Middleware – various modules
    of software that act on sensor data and produce new functionality that an application
    can use. This type of functionality may be incorporated into integrated application
    development environments so the degree to which you are made aware of them as
    separate middleware modules depends on the software environment you are using
    to design your application.


    The ability to segment the depth map into isolated users ([Figure 2-13](#Chapter02.html#fig_2_13),
    left) that are separated from the background, or to extract and track a user’s
    hand ([Figure 2-13](#Chapter02.html#fig_2_13), right) are functional time-saving
    modules that can help you develop applications more quickly, and that dramatically
    reduce your codebase’s size.


    ![images](images/0213.jpg)


    **Figure 2-13.** Left, user segmentation tracking two people. Right, demonstration
    of a point tracking a hand


    The details of how to interface with this functionality may be different depending
    on the development environment you chose to work in. However, the underlying concepts
    are similar. Skeletal tracking middleware can track a user by segmenting that
    user into a skeleton with a series of “body data” joints. These joints can be
    assigned matching values in your application for puppeting a character or to listen
    for recognizable gestures.


    As we move on to [Chapter 3](#Chapter03.html#ch3) and review applications in the
    wild, make note of how the programmers have used the methods we’ve identified
    in this chapter. Now that you’re aware of how the technology works, you’ll have
    a better idea of how to start making your own motion- and depth-aware apps.


    ## C H A P T E R  3'
