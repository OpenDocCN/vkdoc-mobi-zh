    ### Need More?


    In this chapter, we''ve tried to give a detailed introduction to all of the tools
    needed to build an application with Microsoft''s Kinect SDK, but obviously the
    application presented is rather basic: we used only the Kinect''s camera and depth
    capabilities (not even touching sound) and straight-out-of-the-box user segmentation
    skeletal tracking.


    There''s lots more to do, and if the Microsoft toolset appeals to you, no doubt
    you''ll want to do lots more! That''s beyond the scope of this book, but there''s
    a growing body of example code out there on the Coding4Fun site and the open Web
    for you to draw on, much of it tackling specific tasks and use cases. Search around,
    subscribe to forums, and watch Microsoft, because after a slow start supporting
    Kinect developers, now they''re really going for it!


    ![images](images/square.jpg) **Note** For an even deeper treatment of the Microsoft
    SDK for the Kinect, you can do no better than to grab a copy of Jarrett Webb''s
    and James Ashley''s book *Beginning Kinect Programming*. It''s also published
    by Apress.


    ## C H A P T E R  9


    ## Volumetric Display Techniques


    In this chapter, you will become familiar with the various techniques for the
    volumetric display of visual imagery. Unlike a traditional 2D screen, or even
    the newest glasses-based stereoscopic 3D TVs and movie theatre experiences, volumetric
    technologies provide the viewer with a feeling of "holographic" imagery with varying
    degrees of motion parallax based on the technique used to recreate a display in
    natural 3D space. Motion parallax describes the ability to perceive depth based
    on the movement of the observer relative to multiple stationary objects against
    a background. Believe it or not, many people cannot actually perceive the 3D effect
    from stereo glasses because their brains lack full stereovision development. How
    come these people aren''t bumping into things? It''s because every slight movement
    of your head reveals the depth of your surroundings. This feature, not yet available
    in any mass market 3D solution, is what sets this novel approach apart from glasses-based
    experiences.


    Perhaps the most well-known practical example of a volumetric display from the
    realm of science fiction is from the original Star Wars movie, when R2D2 displays
    a recording of Princess Leia telling Obi Wan Kinobe he''s her only hope. Depth-sensing
    photographic technology, such as the Kinect, effectively captures "holographic"
    or volumetric video recordings, but doesn''t provide a way to display them back
    into volumetric 3D space. Volumetric displays are the key to projecting these
    "holographic" experiences back into the dimensionality of everyday life. For the
    most part still on the edge of research and prohibitively priced for consumers
    to experience at home, these displays won''t make it into your livingroom this
    year—but the pace of technology''s progress takes unexpected leaps, as the Kinect
    has shown us.


    This chapter will cover the full spectrum of novel display types, including those
    that strictly qualify as volumetric displays and many that do not. It will cover
    those that contain key aspects, such as motion parallax and multiple views on
    a screen, and some that have none of those qualities yet receive recognition,
    as the public erroneously refers to them as "holographic" because their imagery
    hangs in the air. This is an introduction to display technology that many are
    unfamiliar with, as little up-to-date information on the topic has been collected
    on the internet. These innovative approaches will likely be seen more in the future,
    perhaps in combination, to satisfy the demands of a public having been primed
    by the Kinect''s volumetric camera and who will come to expect more than just
    a 2D screen for truly immersive experiences.'
