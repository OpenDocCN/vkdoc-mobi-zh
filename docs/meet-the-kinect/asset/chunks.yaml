- fmt: '![images](images/square.jpg) **Note** Because the imagery being presented
    on these displays originates from 2D screens or projection sources, they are not
    truly volumetric or “holographic” in the sense that you can look around objects
    from any angle.


    An innovative use of the Pepper''s Ghost technique is to separate a single 2D
    display or projection into multiple Pepper''s Ghost layers, which can be stacked
    up to recreate a foreground, middle ground, and background. A prototype accessory
    for the iPhone was created on this principle, called `i3dg` ([Figure 9-7](#Chapter09.html#fig_9_7)),
    and at lost word was slated to go into production early in 2012. You can see the
    display in action in this video—[http://youtu.be/JnGPtVNmtvI](http://youtu.be/JnGPtVNmtvI)—and
    learn more at [http://i3dg.mobi](http://i3dg.mobi).


    ![images](images/0907.jpg)


    ***Figure 9-7.** The `i3Dg` accessory for iPhone utilizes three panes of plastic
    to create a multi-depth experience, utilizing the principle of Pepper''s Ghost.
    Image courtesy i3Dg*


    The original mock-up for this design came from using plastic CD cases; others
    online have successfully recreated this effect using various materials. On a larger
    scale, with a flatscreen TV or uniquely shaped projection surface, this technique
    could be employed to create a very eye-catching experience with a real sense of
    depth and motion parallax with the right content or application.


    ## Multi View Autostereoscopic Flatscreens


    Of all the technologies described in this chapter, multiview autostereoscopic
    displays are the most mature and accessible technology. Available from a variety
    of specialized providers, they can be used with existing development tools at
    a cost that is not as prohibitive as the more researched and industrial level
    technologies. The market size is currently about 2–4 thousand autostereoscopic
    3D displays per year for digital signage applications, which keeps the price tag
    for these items around US$5,000. Each display requires a significant amount of
    resources to carefully produce—from custom manufacturing precision slanted lenticular
    sheets for every model of LCD to the “clean room” environment needed to adhere
    the multiview layer to the screen. Additionally, the custom content production
    and hardware requirements can be substantial for delivering enough views to the
    screens to make the viewing experience truly eye popping without causing eye strain.
    Mainstream consumer adoption of such screens would drive the cost down considerably—just
    as Kinect did for the depth-sensing volumetric camera market.


    Displays are available from a variety of manufacturers. `Magnetic3D` ([http://magnetic3d.com](http://magnetic3d.com)),
    `3DFusion` ([http://3dfusion.com](http://3dfusion.com)), and `Exceptional3D` ([http://exceptional3d.com](http://www.exceptional3d.com))
    are all based in New York and offer nine-view displays at varying levels of size
    and quality. `Alioscopy` ([http://alioscopyusa.com /](http://alioscopyusa.com/)
    [http://alioscopy.com](http://alioscopy.com)), uses an eight-view display technique.
    Lower-end displays can be found with four and five views, and on the high end,
    `Dimenco` ([www.dimenco.eu](http://www.dimenco.eu)), founded by a team that worked
    on autostereoscopic screens at Philips, boasts a twenty-eight-view system. `Dimenco`''s
    approach relies on 2D + depth map source material and a dedicated hardware “rendering
    box,” which limits its potential to use native multiview content. `Magnetic3D`''s
    nine-view allows a center channel to act as a reference image with four views
    to each the left and right for peering around an object. In a slated lenticular
    design, finding the right compromise between the number of views to give a good
    motion parallex and not packing so many views in that there is ghosting or cross-talk
    between the layers of pixels underneath is a careful balance.


    As with any of the volumetric displays discussed in this chapter, somewhere along
    the line, you''ll have to figure out how you will optimize multiple views of your
    application or content to match the physical properties of a display. These screens
    are at their best when the viewer can feel depth that both drops behind the screen
    and protrudes out from it. Thomas J. Zerega, founder of `Magnetic3D`, suggests
    that content and application developers can design experiences that utilize these
    displays to their limits, enabling “True Volumetric Perception” by following best
    practices in how content is prepared. When visual assets protruding out from the
    plane of the screen get cut off by the LCD''s border edges, a “window violation”
    that disturbs the perception of depth is produced. To avoid this experience, programmers
    can create in-app physics that avoid such glitches by design. You can use this
    effect to your advantage by letterboxing the display area; that is, placing a
    black border around the content on the screen. This way, when an object is meant
    to come out from the screen, it can break the digital letterboxing—to a great
    popping effect—without getting cut off by the hard physical “boxing” of the display
    edge.


    ## Laser Plasma Emission Displays


    If the idea of producing images hanging in air instead of stuck to a screen is
    what you are after—pulsed laser''s crackling light in free space is going to excite
    you. Japan''s National Institute of Advanced Industrial Science and Technology
    ([http://bit.ly/plasmaemission](http://bit.ly/plasmaemission)) has partnered with
    Keio University and Burton Inc. to push the edge of using lasers to light up air
    molecules in a true volumetric display that works without the need for a generated
    medium such as mist.


    The mechanism by which this type of display works is fascinating on two levels.
    First, it shows a real time demonstration of a dynamic display that matches the
    variable point abilities of the static plastic etching laser noted at the beginning
    of thischapter. This is great, because the mechanism isn''t bound by a set grid
    of voxels that it must adhere to. This is in contrast to other static or swept
    displays, which are locked into the boundaries of pixels or LEDs.


    The second level of interest is the inspiration to apply the optical tricks leveraged
    to focus the laser beam to other types of display optics. The use of a diffusion
    lens moving in the z-axis and a second optic modulating in the x and y plane might
    have application with the other approaches outlined in this chapter. As more interest
    gravitates towards the aspiration of true volumetric displays, we''re bound to
    see a mixing and matching of these techniques to bring about more breakthroughs.
    Stay tuned to Burton, Inc ([http://burton-jp.com](http://burton-jp.com)) for more
    developments with this technology. The latest demonstration of their display can
    show 50,000 voxel points in space per second. Check out the videos at [http://youtu.be/EndNwMBEiVU](http://youtu.be/EndNwMBEiVU)
    and [http://youtu.be/KfVS-npfVuY](http://youtu.be/KfVS-npfVuY) to see it in action.'
