    ### 投影光场阵列


    体三维成像领域当前备受关注的一个方向，是利用投影仪阵列在漫射滤光器上重建场景的多重视角。其核心理念是：在更多角度添加更多投影仪，就能更好地重建三维场景的原始光场。因此，当观察者通过特殊的漫射膜观察场景时，头部视角的移动会触发运动视差，从而产生观看三维场景的感知。随着低成本投影仪（包括尺寸微小的微型设备）的出现，这种方法比几年前在财务上要可行得多。


    投影光场方法被应用于日本国立信息与通信技术研究所吉田俊介的研究项目 `fVisiOn` 中，创造了一种新颖效果——桌面上的浮动三维视觉。该项目的目的是创建一种不会干扰桌面工作区，反而能让真实三维物体与虚拟物体共存的显示器。


    ![images](img/square.jpg) **注意** 您可以在项目网站 [`http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html`](http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html)
    上了解更多信息并观看视频。


    `fVisiOn` 并未采用标准的平面片材来将投影光结合成连贯的三维图像，而是依靠一个锥形屏幕。如图 9-10 所示，该显示器由一组微型投影仪组成，这些投影仪全部向内指向锥体，呈圆形排列。右上角图像中可见的白色光点显示了密集排列的投影仪环。锥体顶部放置了两层过滤材料，以增加图像的对比度。


    ![images](img/0910.jpg)


    ***图 9-10.** `fVisiOn` 显示器结构分解图。左上角显示了锥形漫射器和微型投影仪的一个角度；右上角显示了数十个安装到位的投影仪，呈现为光点；左下角和右下角显示了增加图像对比度以生成浮动数字对象的两层滤镜。*


    尽管 `fVisiOn` 让我们了解到光场显示器如何在小型规模上应用，但许多人渴望了解体三维体验将如何扩展，将体素带到影院的大银幕上。答案可能在于欧盟牵头的一系列创新举措。三个项目：`HOLOVISION`
    ([www.holovisionproject.org](http://www.holovisionproject.org))、`OSIRIS` ([www.osiris-project.eu](http://www.osiris-project.eu))
    和 `COHERENT` ([www.coherentproject.org](http://www.coherentproject.org)) 的设立，旨在将欧洲国家和公司定位为全息介质捕获、传输和显示的领先先驱。这些技术的主要集成商是一家名为
    `Holographika` 的匈牙利公司 ([www.holografika.com/](http://www.holografika.com/))。


    通过使用大约 100 个聚焦于漫射屏的投影仪，`Holographika` 的显示器重建光场，以提供对场景的分辨视角，这取决于每个观看者相对于屏幕的位置。该技术类似于大阪大学研究人员使用雾气的尝试，不同之处在于，这家公司现在已有可供租赁或购买的生产型号。由一家匈牙利公司实现这一奇迹是恰如其分的，因为实际上，全息术领域正是由一位匈牙利科学家发明的。


    尽管 `Holographika` 的产品定价并非面向消费者，价格范围在 45,000 至 150,000 美元之间，但它们设定了很高的标准，并将提供一个参考规格，用以评判未来的解决方案。对于家庭和办公用途，其背投型号在视觉上类似于等离子和
    LCD 出现之前的早期宽屏电视。为了将所有投影仪封装在内部，需要有足够的深度将图像反射到屏幕上。然而，更令人惊叹的创新在于适用于大型影院环境的正投解决方案（图
    9-11）。


    ![images](img/0911.jpg)


    ***图 9-11.** `Holographika` 的 `HoloVizio` C80*


    `HoloVizio C80` 开启了体三维影院时代，人们有朝一日可能会将其简称为体素影院。这并非科幻小说。C80 设备目前正在世界各地的贸易展上进行演示。传统影院只有一台投影仪，或者两台用于立体三维，而
    `Holographika` 的技术则使用了多达 80 台投影仪。目前，最大屏幕尺寸约为 140 英寸宽——足以满足小型独立影院的需求。现在，我们只需要新一代的故事讲述者，利用这种颠覆性创新，凭借体三维电影来启动体素业务。你愿意为哪个付更多钱——外出看一场电影，还是体素影院？


    ## 我们何去何从？


    撰写这本书对我们在座的每一位都意义重大。在 Kinect 中，我们看到了一个可以用于创意表达的神奇设备。我们也看到了一种能够改变我们将技术应用于日常生活方式的设备和技术。起初，Kinect
    及其骨骼追踪技术主要关乎游戏和酷炫的艺术项目。但事情并未止步于此。其底层技术对人与技术的交互方式有着深远的影响。在这篇后记中，我们每人就这项技术的影响及其未来可能引领我们走向何方，提供一些最后思考。

    '
- fmt: '### Sean Kean


    I hope this introduction to development with the Microsoft Kinect has provided
    you with a solid foundation from which to execute new ideas that redefine our
    relationship with technology. You now have the building blocks for creating experiences
    that can help us move past the limited means of interacting with machines from
    the past and pave the way to a more humane relationship between people and devices
    in the future. As someone who initially became interested in technology for artistic
    and social expression, I''ve always felt the mouse and keyboard were a legacy
    of office environments that fell short of capturing the ways I wanted to play
    with machines. Innovations such as the Kinect, as well as the software that you
    will now go forth and develop, will write a new chapter of how society and technology
    evolve with one another.


    Roughly one year after the Kinect''s debut in November 2010, we''ve seen this
    device put to use in so many breathtaking ways. It''s been overwhelming to keep
    track of or even classify the different usages. Seeing the public''s imagination
    captured by the ‘Kinect hacks'' that have flooded the web, it''s clear that body
    gesture-based control of software is something people are eager to have integrated
    into their lifestyle once they''ve witnessed it. However, one application of this
    technology hasn''t received quite as much attention as the others and it''s the
    one I''ve been most excited about since I first saw Oliver Kreyos demonstrate
    it in a post to YouTube last year.


    In a video entitled “3D Video Capture with Kinect” ([http://youtube/7QrnwoO1-8A](http://youtube/7QrnwoO1-8A)
    ), posted just ten days after the device hit stores, Oliver was the first to show
    volumetric 3D video that allows a viewer to move a virtual camera 360 degrees
    around a live scene during its recording. This still blows my mind and I think
    it''s the sleeping giant of the Kinect that will mark a fundamental shift in the
    way motion pictures, photography, and live video will be experienced in the very
    near future. Once the tools for creating, sharing, and viewing volumetric 3D video
    can be demonstrated in a more mature state for the general population to consider,
    I''m confident that we will see widespread adoption of it for everything from
    video conferencing to sports, to feature films and truly 3D game systems. This
    is the dawning of the volumetric age.


    I have feared for some time that with so much exposure to flat screen media on
    televisions, computers, and phones, society has eroded some of our innate abilities
    to decode the physical 3D world around us. I believe this shift from 2D to volumetric
    3D experiences has the potential to reignite hope for a new spatial awareness
    that can revive a section of our minds that has lain dormant since screen media
    became ubiquitous. Things will truly get interesting once digital media can more
    closely match the depth perception capabilities we were born with but have had
    no way to reconcile with 2D media and traditional software interfaces.


    Let''s take a look at what''s involved in bringing about the volumetric 3D video
    revolution. By examining how 2D video is created and experienced by consumers
    today, we can look at what needs to be put in place to do the same for volumetric
    3D. Along the way, I hope you see a number of exciting opportunities to develop
    technology that fits into the needs that will arise as creators go from shooting
    2D motion pictures to pioneering the voxies, video that is viewable from any 360
    degree angle and is based on the voxel point cloud imagery generated from devices
    such as the Kinect.


    For a consumer, recording HD video with an iPhone, trimming it on the device,
    and uploading it to YouTube or Facebook to share with the world is remarkably
    effortless. A professional may choose to use a more elaborate SLR camera that
    would require the additional step of connecting it to a computer along with opting
    to edit the video in a program, such as FinalCut or iMovie, before uploading it
    to the web, perhaps opting for an alternative video sharing site such as Vimeo.com.
    Refined over many years, there are simple, affordable, and accessible solutions
    for users to capture, edit, and view shared video. We will need comparable devices,
    services, and software to bring volumetric 3D to the mainstream market. Luckily,
    millions of people now have a device to capture basic volumetric 3D video with
    the Kinect.


    If you followed through till the end of [Chapter 1](#Chapter01.html#ch1), you''ve
    already seen yourself captured in primitive volumetric 3D and are able to spin
    around your view with a synthetic camera. The latest versions of Microsoft''s
    SDK, as well as OpenNI, lets developers make use of multiple Kinects that could
    be arranged in such a way to fill in the empty shadows resulting from just one
    camera. With the KinectFusion project, Microsoft Research shows us that there
    is a bright future ahead for reconstructing full 3D models of scenes in realtime
    (see [Figure 1-25](#Chapter01.html#fig_1_25)) using just one Kinect and software
    utilizing standard computer graphics processing chipsets. The only problem with
    the Kinect as a video recording device is that the user is tethered to a computer
    and wall outlet. This has resulted in Kinect videos containing roughly the same
    subject matter – people sitting at their computers.


    I''d much rather shoot active video running around outdoors, adventuring in remote
    locations, and everything else we''ve come to expect that is possible from portable
    electronics today. Prior to the introduction of Sony''s Portapak in 1967, video
    was pretty much immobile – just as we are today with the Kinect. TV studio equipment
    was so large and power intensive that it had to stay in the studio. After the
    Portapak''s introduction, video art flourished with artists such as Nam June Paik
    and Bill Viola, who strapped on battery powered equipment and used the medium
    to explore visual expression in ways that were previously only available by working
    with film. Today, every smartphone is far more capable than a Portapak – yet we
    will likely want to return to specialty hardware devices to take advantage of
    volumetric 3D''s promise. This will create exciting opportunities for those that
    wish to design and manufacture novel cinematic tools.


    For higher production quality capture, there is an exciting array of possibilities
    that go beyond the Kinect. The structured light approach from the PrimeSense solution
    is not able to work outside in bright lighting conditions that interfere with
    the infrared laser. Time-of-flight sensors offer one alternative to go where the
    Kinect cannot; however, their depthmap resolution is currently much smaller than
    that which is offered by PrimeSense and still relies on emitted light with a limited
    sensing range. A remarkable new imaging technology called a light field, or plenoptic,
    camera debuted this year from Lytro ([www.lytro.com](http://www.lytro.com)) that
    may eventually be embedded into a tool for the volumetric cinematographer.'
