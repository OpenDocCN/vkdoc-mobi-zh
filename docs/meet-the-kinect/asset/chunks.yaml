- fmt: '#### Download, Install, Explore


    If you’re familiar with other IDEs, such as Visual Studio, Xcode, Eclipse, or
    even Adobe products like DreamWeaver, this is going to be the easiest setup of
    a programming environment you’ve ever experienced! If this is your first IDE,
    well, suck it up. It doesn’t get any easier. In this section, we’re going to download
    and install Processing, run some quick test code to make sure everything works,
    and then explore the setup of the IDE, the filesystem, and some of the included
    sample sketches so you get a sense of what Processing can do, and what you can
    do with Processing plus Kinect.


    To download Processing, browse to [`http://processing.org/download`](http://processing.org/download),
    where you’ll find download packages for each of the major operating systems (Windows,
    Mac OS X, and Linux) and a second Windows download for those of you who want to
    set up and use your own JVM separate from the included one (not recommended).
    Click the download link appropriate for you.


    Unlike many pieces of software you may have installed before, there’s no separate
    installer program with Processing. After you download it, you simply need to uncompress
    any compressed files, move them to wherever you keep applications on your computer
    (usually `C:\Program Files\Processing\` on Windows, `/Applications/Processing/`
    on Mac OS X, or `~/Applications/` on Linux), and launch the program. You’re done!
    Well, almost.


    It’s a good idea to try building some super simple script to make sure everything’s
    in working order, so let’s do that. When you launch Processing, you’ll see a blank
    code window, like that in [Figure 4-1](#Chapter04.html#fig_4_1), open to a new
    “sketch.” Let’s run our first script to make sure we’re set up correctly. Write
    these five lines of code into the code window, as shown in [Figure 4-1](#Chapter04.html#fig_4_1),
    and click `Run`. The `Run` button is the circular “play” button at the top left
    corner of the application window. You should see results like those in [Figure
    4-2](#Chapter04.html#fig_4_2).


    ```

    size(800, 600);

    fill(255, 0, 0);

    rect(10, 10, 10, 10);

    text("Hello World", 25, 20);

    print("It works!");

    ```


    ![images](images/0401.jpg)


    ***Figure 4-1.** Processing’s application window*


    ![images](images/0402.jpg)


    ***Figure 4-2.** The output of our “Hello World” example*


    Our little example script generated a new application window that’s 800 pixels
    wide by 600 pixels tall. It then drew a 10-pixel-by-10-pixel red rectangle in
    the window starting at (10, 10) in (x, y) coordinate space and rendered the text
    “Hello World” next to that rectangle. Finally, our script printed a success message
    to the console. Got it? Good. Let’s go just a tad deeper in preparation for using
    Processing to control the Kinect.


    #### Processing Libraries and Sketches


    Since we’re going to spend some time with Processing in this chapter writing scripts
    and adding Kinect libraries written by third parties, you will not regret taking
    a little time now to browse the dozens of useful libraries and example sketches
    included with the main Processing distribution. These examples will give you an
    idea of how Processing works and what its capabilities are, as well as how the
    larger Processing user community has extended those capabilities to create a formidable
    free software platform for programming interactivity.


    ##### Included Examples


    Start by taking a gander at the extensive list that opens under `File  Examples`...
    It should look something like the list shown in [Figure 4-3](#Chapter04.html#fig_4_3).
    Open one of the sketches under “Topics” that seems interesting to you. Want to
    render cool visual effects? Check out the Firecube example under “Effects.” Looking
    to build your own graphical user interface (GUI)? See how simple button and scrollbar
    elements are implemented under the “GUI” topic. How about eerily complex and cool
    physics? Try a bunch of the “Motion” examples.


    ![images](images/0403.jpg)


    ***Figure 4-3.** The “palette” of examples in Processing*


    Once you’ve seen enough to convince you that Processing is worth your while, let’s
    take a last peek under the hood before connecting the Kinect. Specifically, let’s
    look at Processing’s file organization and how to extend the functionality of
    the application ourselves using freely available code libraries on the Web.


    ##### Adding Libraries


    A nice-but-not-comprehensive index of Processing libraries lives at [`http://www.processing.org/reference/libraries/`](http://www.processing.org/reference/libraries/).
    There are some great libraries for helping your Processing code interface with
    hardware, do advanced 3D work, and tie into other massively useful non-Processing
    code bases such as OpenCV, the open source computer vision library. If you use
    Processing again, you’ll no doubt want to know how to add some of this free contributed
    code.


    When you first launched Processing, a new sketch was created with the naming convention
    `sketch_datex`. If you’re following along, you created a 5-line “Hello World”
    script. Now, let’s save that sketch to our “Sketchbook.” Go ahead and click `Save`.
    Processing creates a sketchbook folder inside your operating system’s main documents
    folder, something like `C:\My Documents\Processing\` on Windows and `/Documents/Processing`
    on Mac OS X, depending on how your system is set up. In Processing’s “Preferences”
    pane, you can see—and change—the location of the sketchbook on the filesystem.
    In any case, find out where it is and browse to that location.


    Your Processing sketchbook is just a folder that contains any sketches or libraries
    you’ve created or added from third parties. You should now see a folder inside
    it called `sketch_datex`, or whatever you named your sketch if you gave it a name.
    Every Processing sketch gets its own folder, which helps keep all related files
    and assets together.


