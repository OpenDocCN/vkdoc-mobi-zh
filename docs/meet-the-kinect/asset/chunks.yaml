  trans: '

    这款独特的成像设备利用微透镜阵列计算从多个角度进入相机的所有光线，并生成类似 3D 传感器（如 `Kinect`）的深度图。尽管目前尚未成为实时视频解决方案，但请密切关注这项技术的发展。从不同角度围绕场景布置一组
    `Lytro` 相机，不仅能够在不相互干扰的情况下采集多个深度图，还能够在观看时对场景中的任意点进行重新对焦。这将产生我们期望从高端单反相机中获得的那种景深效果，而且理论上可以根据用户观察图像的视角实现实时景深。`Lytro`
    面向消费者的产品可能会像 `Kinect` 一样，具有颠覆性且易于改造。当你考虑到唯一的竞品 `Raytrix` ( [`raytrix.de`](http://raytrix.de)
    ) 相机起步价约为 20,000 美元时，`Lytro` 突破性的 399 美元定价令人震惊。


    在 `Kinect` 问世之前，已有大量关于利用立体摄像头和多摄像头阵列计算 3D 场景信息的技术研究，这种技术被称为摄影测量法。随着更成熟的云计算环境的出现，许多解决方案应运而生，用于在远程服务器上处理此类图像处理，以降低对用户机器的要求。现在，使用诸如
    `Autodesk` 的 `123D Catch` ( [`123dapp.com/catch`](http://123dapp.com/catch) )
    和 `Hypr3D` ( [www.hypr3d.com](http://www.hypr3d.com) ) 等工具，可以处理来自不同视角的多相机阵列的静态图像，上传一系列图像后，系统会返回场景的摄影测量
    3D 模型。若要在本地机器上使用，`AgiSoft` 的 `PhotoScan` ( [`www.agisoft.ru/`](http://www.agisoft.ru/)
    ) 是一款支持 Windows 和 Mac OS X 系统的桌面级摄影测量解决方案。通过使用多个廉价高清相机（例如 `GoPro` ( [www.gopro.com](http://www.gopro.com)
    ) 提供的相机），可以设想组装一个包含数十个单元的大型设备，从不同角度捕捉视频，然后将每个相机的每一帧分解成一系列摄影测量批处理作业。结合 3D 传感器（如用于辅助深度映射的
    `Kinect`），我们必然会看到一些融合了这些技术、用于生成高质量体积 3D 图像的非常有趣的解决方案。


    制作 2D 电影和制作体积 3D 体素电影有何区别？首先，电影导演习惯于通过单一摄像机视角，对观众观看故事的角度拥有绝对控制权。然而，在体素电影的世界里，初出茅庐的体积电影摄影师必须在制作过程中考虑观众可能通过移动头部、使用控制器或仅仅围绕体积显示器走动等方式，从任意角度凝视场景，从而协调表演者、灯光和摄像机设备。但这仅仅是开始。我们需要全新的软件来处理这种真正意义上的新媒体的后期制作编辑、传输、存储和显示。


    好消息是，这类软件正在积极开发中。首次通过互联网直播的体积 3D 视频发生在 2011 年 10 月匹兹堡举行的 `Art&&Code 3D` ( [`artandcode.com/3d`](http://artandcode.com/3d)
    ) 活动中。该活动将演讲者的 360 度视频直接传输给了全球正在收看的网络浏览器。这标志着一项重大的技术成就，无疑将激励他人创建更强大的解决方案，以克服在诸如
    `YouTube` 和 `Vimeo` 等系统上分享这种深度媒体时的局限性，这些系统目前无法在其 2D 文件格式中存储完整的体积数据。


    一个专为体积 3D 视频（也称为自由视角视频 FVV）打造的 `YouTube`，可以充当大型视频形式体素数据集的存储库。这些数据可以在后期使用更复杂的 3D
    重建算法（如 `KinectFusion`）进行分析和重新处理。许多人可能会选择将所有原始体积视频上传至云端，并使用基于网页的编辑服务来完成视频制作，以最大限度地减少对自用设备的处理要求。对于更专业的导演来说，会对用于本地编辑和后期特效的专业级工作站软件产生需求。回到云端，类似于
    `Primesense` 的 `NITE` 的机器视觉中间件，可以提供基于用户分割、骨骼追踪和模式识别的新功能。这些功能可应用于上传内容，以生成用于分类视频、视频中的物体甚至对故事情节进行语义分析的结构化信息。一旦视频上线并配备交互式可嵌入播放器，我们可以预见它们将在
    Facebook 信息流中被分享，并链接到当前 2D 照片和视频使用的相同位置。当聪明的艺术家和程序员以难以预测的方式利用深度视频的功能时，用户创作由用户提交的体积视频的混搭和混音作品的机会，将会非常引人入胜。


    然而，如果你只是打算在普通的 2D 屏幕上观看，那么捕捉体积视频的作用就不大了。虽然将会有过渡性解决方案（例如使用头部追踪让你在 2D 屏幕上体验模拟的运动视差，从而观察体积
    3D 内容），但开发此类内容的根本驱动力将源于真正的体积 3D 显示器的普及，这些显示器是基于第九章中所记载的技术成熟发展而来的。随着更引人注目的基于体素的视频内容和服务的创建，以及游戏和专业
    3D 应用的出现，体积显示器将开启一个全新的娱乐和空间计算时代。正如微软研究院近期展示的成果所示，包括一个名为 `Vermeer` 的真正 360 度体积
    3D 显示器的触控界面 ([`research.microsoft.com/en-us/projects/vermeer/`](http://research.microsoft.com/en-us/projects/vermeer/))，以及一个依赖头部追踪的
    `Holodesk` ([`research.microsoft.com/apps/video/default.aspx?id=154571`](http://research.microsoft.com/apps/video/default.aspx?id=154571)
    )，与占据真实 3D 空间的、可触摸的图像进行交互，开启了以前被认为是科幻小说的无限可能。


    当触及体积视频显示器的能力变得价格亲民时，消费者会渴望什么样的内容和应用？我们很快就会知道，这也是我接下来的探索方向。加入 `volumetric.org`
    社区，并通过关注 `meetthekinect.com` 上本书的更新，来拥抱体积时代吧。


    -- 肖恩·基恩

    '
- fmt: '### Phoenix Perry


    未来的智者常常在事后看来显得愚蠢。他们常常高估眼前发展的速度，却又低估了长期即将到来的巨大变革。话虽如此，我写下这篇预言时，正值史蒂夫·乔布斯逝世之日。基于鼠标的计算时代已经终结。全美苹果商店的门前烛光摇曳，而计算领域的未来舞台已经敞开。基于手势的计算是界面设计的未来。这场革命已经酝酿了20年，它的时代终于来临。视觉识别系统、触摸屏、手势界面和语音控制将在未来5年内结合，取代遥控器和鼠标，尤其是在休闲计算体验中。用户体验将变得更加有机和以人为中心。自然界面的浪潮是设计技术领域即将迎来的下一个大繁荣。


    我对鼠标的幻灭始于1999年，当时我患上了严重的腕管综合征。我的个人电脑界面因设计不良而摧残了我的身体。我无法梳头。我的男友为我刷牙。那个曾让我成为富有创造力的创造者的工具，却毁掉了我的身体。因此，过去的十年里，我一直在康复并探索替代的计算机控制模式，以便长期使用而不伤害人体。借助这些新的交互模式，我们可以安全地开发与人体相匹配、并能贯穿人类一生的计算体验。计算体验正在被彻底重新构想。设计师和DIY创客正通过创造新的体验来推动市场前进。用户渴望更丰富、更个性化、更具触感的体验。我们正在重新思考数字体验，并将其融入人类体验之中。从整合面部识别的响应式标牌与移动购物体验，到智能客厅，再到治愈身心的新方法，等待被创造的沉浸式体验无穷无尽。


    在文化层面，音乐和艺术创作正被彻底颠覆。你的乐器可以是你能想象到的任何东西，甚至可以用手指在空中绘画。媒体艺术家可以将视频和图像精确地映射到包括面部在内的人体上。动作捕捉可以在你的客厅里完成。艺术家可以用双手在物理世界中绘制3D图形，然后通过从MakerBot
    Industries购买的、价格低于3000美元的桌面制造机器将结果打印出来。基于脑电波控制的研究正在进行中，它或许能让艺术家只需闭上眼睛就能创作。未来已经到来。它只是看起来与我们预期的不同，而且幸运的是，它不再是过去那种光鲜亮丽的、企业塑造的塑料界面，而是无缝地融入人类的生活图景。设计的未来是开源的，掌握在创造者手中。


    ——Phoenix Perry'
  raw: '### Phoenix Perry


    Sages of the future often look foolish in hindsight. Frequently, they overstate
    the speed of immediate developments and underestimate the huge changes coming
    in the long term. That said, I am writing this prediction on the day of the death
    of Steve Jobs. The era of mouse-based computing has come to a close. The doors
    of Apple stores across America are covered in candles and the playing field for
    the future of computing is wide open. Gesture based computing is the future of
    interface design. This revolution has been developing for 20 years and the time
    for it is finally here. Visual recognition systems, touch screens, gesture based
    interfaces and voice control will be combined to replace remotes and mice over
    the next 5 years, particularly in casual computing experiences. User experiences
    will become more organic and biocentric. The wave of natural interfaces is the
    next big boom coming in design technology.


    My disenchantment with the mouse began in 1999 when I developed an extreme case
    of carpel tunnel. The interface of my personal computer broke my body through
    bad design. I couldn''t comb my hair. My boyfriend brushed my teeth and the tool
    that had allowed me to become a thriving creator had destroyed my body. As a result,
    I''ve spent the last 10 years healing and exploring alternate modes for computer
    control that allow for long term use without harming the human body. With these
    new modes of interactivity, we can safely develop computing experiences that match
    our bodies and work for the span of a human lifetime. The computing experience
    is being wildly rethought. Designers and DIY makers are pushing the market forward
    by creating new experiences. Users hunger for richer, more personalized, tactile
    experiences. We are rethinking the digital experience and integrating it into
    the human experience. From reactive signage integrating facial recognition with
    mobile shopping experiences and smart living rooms to new ways to heal the mind
    and body, there is no end to the immersive experiences waiting to be created.


    Culturally, music and art making are being torn wide open. Your instrument can
    be anything you could possibly imagine and even draw with your fingers in the
    air. Media artists can map video and images directly on the body, including the
    face, with precision. Motion capture can happen in your living room. Artists can
    draw in 3D in the physical world with just their hands and then print the results
    out via a desktop fabrication machine bought for under $3000 from MakerBot Industries.
    Research is being done with brain wave control that might allow artists to work
    by simply closing their eyes. The future has arrived. It just looks different
    than we expected, and fortunately it''s not the pristine corporate modeled plastic
    interface of the past but seamlessly integrating into the human landscape. The
    future of design is open source and in the hands of the makers.


    --Phoenix Perry'
  trans: '

    ### 菲尼克斯·佩里


    未来的智者常常在事后看来显得愚蠢。他们常常高估眼前发展的速度，却又低估了长期即将到来的巨大变革。话虽如此，我写下这篇预言时，正值史蒂夫·乔布斯逝世之日。基于鼠标的计算时代已经终结。全美苹果商店的门前烛光摇曳，而计算领域的未来舞台已经敞开。基于手势的计算是界面设计的未来。这场革命已经酝酿了
    20 年，它的时代终于来临。视觉识别系统、触摸屏、手势界面和语音控制将在未来 5 年内结合，取代遥控器和鼠标，尤其是在休闲计算体验中。用户体验将变得更加有机和以人为中心。自然界面的浪潮是设计技术领域即将迎来的下一个大繁荣。


    我对鼠标的幻灭始于 1999 年，当时我患上了严重的腕管综合征。我的个人电脑界面因设计不良而摧残了我的身体。我无法梳头。我的男友为我刷牙。那个曾让我成为富有创造力的创造者的工具，却毁掉了我的身体。因此，过去的十年里，我一直在康复并探索替代的计算机控制模式，以便长期使用而不伤害人体。借助这些新的交互模式，我们可以安全地开发与人体相匹配、并能贯穿人类一生的计算体验。计算体验正在被彻底重新构想。设计师和
    DIY 创客正通过创造新的体验来推动市场前进。用户渴望更丰富、更个性化、更具触感的体验。我们正在重新思考数字体验，并将其融入人类体验之中。从整合面部识别的响应式标牌与移动购物体验，到智能客厅，再到治愈身心的新方法，等待被创造的沉浸式体验无穷无尽。


    在文化层面，音乐和艺术创作正被彻底颠覆。你的乐器可以是你能想象到的任何东西，甚至可以用手指在空中绘画。媒体艺术家可以将视频和图像精确地映射到包括面部在内的人体上。动作捕捉可以在你的客厅里完成。艺术家可以用双手在物理世界中绘制
    3D 图形，然后通过从 MakerBot Industries 购买的、价格低于 3000 美元的桌面制造机器将结果打印出来。基于脑电波控制的研究正在进行中，它或许能让艺术家只需闭上眼睛就能创作。未来已经到来。它只是看起来与我们预期的不同，而且幸运的是，它不再是过去那种光鲜亮丽的、企业塑造的塑料界面，而是无缝地融入人类的生活图景。设计的未来是开源的，掌握在创造者手中。


    ——菲尼克斯·佩里

