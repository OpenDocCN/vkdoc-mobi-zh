  trans: '

    ### 肖恩·基恩


    我希望这篇关于使用微软 Kinect 进行开发的介绍，为你提供了一个坚实的基础，让你能够实现那些重新定义我们与技术关系的新想法。现在，你已掌握了创建体验的基石，这些体验能帮助我们摆脱过去与机器互动的有限方式，并为未来人与设备之间建立更人性化的关系铺平道路。作为一个最初因艺术和社会表达而对技术感兴趣的人，我一直觉得鼠标和键盘是办公室环境的遗留产物，无法充分表达我想要的与机器互动的方式。像
    Kinect 这样的创新，以及你即将着手开发的软件，将书写社会与技术如何共同演进的新篇章。


    在 Kinect 于 2010 年 11 月首次亮相大约一年后，我们看到这款设备以许多令人惊叹的方式被投入使用。各种不同的用途多到令人目不暇接，甚至难以归类。看到公众的想象力被充斥网络的“Kinect
    破解玩法”所吸引，很明显，一旦人们亲眼目睹，他们便渴望将基于身体手势的软件控制融入到自己的生活方式中。然而，这项技术的一个应用并没有像其他应用那样受到太多关注，而这也是自从去年我第一次在
    YouTube 上看到奥利弗·克里奥斯演示它以来，最让我兴奋的一个应用。


    在一段名为“用 Kinect 进行 3D 视频捕捉”（[`youtube/7QrnwoO1-8A`](http://youtube/7QrnwoO1-8A)）的视频中，该视频在设备上市仅十天后发布，奥利弗是第一个展示了三维体积
    3D 视频的人，这种视频允许观众在录制过程中，将虚拟摄像机围绕现场场景进行 360 度旋转。这至今仍让我感到震撼，我认为它是 Kinect 中沉睡的巨人，将在不久的未来标志着电影、摄影和实况视频体验方式的根本性转变。一旦用于创建、分享和观看三维体积
    3D 视频的工具能以更成熟的状态展现在大众面前，我相信它将被广泛应用于从视频会议到体育赛事，再到故事片和真正的 3D 游戏系统等各个领域。这是体积时代的黎明。


    一段时间以来，我一直担心，由于在电视、电脑和手机上过多接触平面屏幕媒体，社会已经侵蚀了我们解码周围物理 3D 世界的一些先天能力。我相信，从 2D 向三维体积
    3D 体验的转变，有可能重新点燃人们对一种新的空间感知能力的希望，这种能力可以唤醒我们自屏幕媒体无处不在以来一直沉睡的某部分心智。一旦数字媒体能够更贴近我们与生俱来但却无法与
    2D 媒体和传统软件界面协调的深度感知能力，事情将真正变得有趣起来。


    让我们来看看引发三维体积 3D 视频革命涉及哪些内容。通过审视当今消费者如何创建和体验 2D 视频，我们可以研究为了实现三维体积 3D 视频的同样效果，需要建立哪些条件。在此过程中，我希望你能看到许多令人兴奋的机会，去开发能够满足未来需求的技术——当创作者从拍摄
    2D 电影，转向开创“体素视频”（即基于 Kinect 等设备生成的体素点云图像，可从任何 360 度角度观看的视频）时，这些需求将会出现。


    对于消费者来说，用 iPhone 录制高清视频，在设备上剪辑，然后上传到 YouTube 或 Facebook 与世界分享，是极其轻松的。专业人士可能会选择使用更精密的单反相机，这需要额外步骤将其连接到电脑，并在
    FinalCut 或 iMovie 等程序中编辑视频，然后才上传到网络，或许还会选择 Vimeo.com 等替代视频分享网站。经过多年的完善，已经存在简单、实惠且易于获得的解决方案，供用户捕捉、编辑和观看共享视频。我们还需要类似的设备、服务和软件，才能将三维体积
    3D 视频推向主流市场。幸运的是，如今已有数百万人拥有了可用于捕捉基础三维体积 3D 视频的设备——Kinect。


    如果你坚持读完了第一章的最后，你已经看到自己被以原始的三维体积 3D 形式捕捉，并且能够用一个合成的摄像机旋转视角。微软 SDK 以及 OpenNI 的最新版本，允许开发者利用多个
    Kinect 设备，这些设备可以以某种方式排列，以填补单个相机造成的阴影空白。通过 KinectFusion 项目，微软研究院向我们展示，仅使用一台 Kinect
    和采用标准计算机图形处理芯片组的软件，实时重建场景的完整 3D 模型前景广阔（参见图 1-25）。Kinect 作为视频录制设备的唯一问题是，用户必须与电脑和墙上电源插座相连。这导致
    Kinect 视频的内容主题大致相同——人们坐在他们的电脑前。


    我更希望能在户外到处跑动、在偏远地区探险，以及做所有我们如今期望便携式电子产品可以实现的其他活动时，拍摄动态视频。在 1967 年索尼 Portapak 推出之前，视频几乎是无法移动的——就像我们今天使用
    Kinect 时一样。电视演播室设备体积庞大且功耗极高，必须留在演播室里。Portapak 问世后，视频艺术蓬勃发展，像白南准和白南准和比尔·维奥拉这样的艺术家，他们背上电池供电的设备，利用这种媒介探索视觉表达，其方式以前只有通过胶片制作才能实现。如今，任何一部智能手机的功能都远超
    Portapak——但我们很可能仍会回归专门的特制硬件设备，以充分利用三维体积 3D 视频的潜力。这将为那些希望设计和制造新型电影工具的人创造激动人心的机会。


    为了实现更高质量的制作级捕捉，还有一系列超越 Kinect 的令人兴奋的可能性。PrimeSense 解决方案中使用的结构光方法无法在干扰红外激光的明亮光照条件下工作。飞行时间传感器提供了一种替代方案，可以去到
    Kinect 无法到达的地方；然而，它们当前的深度图分辨率远低于 PrimeSense 所提供的，并且仍然依赖发射光，感应范围有限。一种名为“光场”或全光相机的新兴成像技术，今年由
    Lytro 公司（[www.lytro.com](http://www.lytro.com)）首次推出，它最终可能被嵌入到用于体积极电影的创作工具中。

    '
- fmt: 'This unique imager makes use of a micro lens array that computes all the light
    rays entering the camera from a number of angles and produces a depthmap similar
    to 3D sensors such as the `Kinect`. While not yet a realtime video solution, keep
    your eye on how this technology develops. An array of `Lytro` cameras surrounding
    a scene from different angles would not only be able to gather multiple depthmaps
    without interference from each other, but they would also be able to refocus on
    any point in an scene at the time of viewing. This would result in the type of
    depth of field that we''ve come to expect from high quality SLR cameras, but conceivably
    in realtime based on the users''s perspective into an image. `Lytro`''s consumer
    focused product may turn out to be just as disruptive and accessible to hack as
    the `Kinect`. Its breakthrough price point of US$399 is astonishing when you consider
    `Raytrix`''s ( [http://raytrix.de](http://raytrix.de) ) cameras, the only competitor,
    start at around US$20,000.


    Before the `Kinect`, there was a lot of research into techniques for computing
    3D scene information from stereo cameras and multi camera arrays in a technique
    called photogrammetry. With the advent of more mature cloud computing environments,
    a number of solutions are cropping up to handle this type of image processing
    on remote servers to reduce the requirements on user machines. Processing still
    imagery from an array of cameras at different perspectives is now possible using
    tools such as `Autodesk`''s `123D Catch` ( [http://123dapp.com/catch](http://123dapp.com/catch)
    ) and `Hypr3D` ( [www.hypr3d.com](http://www.hypr3d.com)) with photomapped 3D
    models of a scene returned after uploading a series of images. For use on your
    local machine, `AgiSoft`''s `PhotoScan` ( [http://www.agisoft.ru/](http://www.agisoft.ru/)
    ) is a desktop photogrammetry solution available for Windows and Mac OS X. By
    using a number of inexpensive HD cameras, such as those available from `GoPro`
    ( [www.gopro.com](http://www.gopro.com) ), its conceivable to assemble a large
    rig with dozens of units that would capture video from an assortment of angles
    and then break down each frame from each camera into a series of photogrammetry
    batch processing jobs. Combined with 3D sensors, such as the `Kinect` to aid in
    depth mapping, we are bound to see some very interesting solutions for generating
    high quality volumetric 3D imagery with a blend of these techniques.


    What''s the difference between producing a movie in 2D and a voxie in volumetric
    3D? To start, movie directors are accustomed to having absolute control over the
    viewer''s perspective into a story through a single camera view. However, in the
    world of the voxie, the budding volumetric cinematographer must wrestle with choreographing
    performers, lighting, and camera rigs during production in a way that takes into
    account the way that the audience may gaze into the scene from any angle, such
    as by moving their head, using a controller, or simply walking around a volumetric
    display. But that''s only the start. We''ll need entirely new software to handle
    post production editing, transmission, storage, and display of this truly new
    media.


    The good news is this software is being actively developed right now. The first
    live internet video stream of volumetric 3D video occurred during the `Art&&Code
    3D` ( [http://artandcode.com/3d](http://artandcode.com/3d) ) event in Pittsburg
    in October 2011. This transmitted a 360 degree video of the speakers straight
    to web browsers tuning in around the world. This marked a significant technical
    accomplishment that will no doubt begin to inspire others to create more robust
    solutions that move beyond the limitations of sharing this depth-enabled media
    on systems such as `YouTube` and `Vimeo`, which currently have no capacity to
    store the complete volumetric data in their 2D file format.


    A `YouTube` for volumetric 3D video, or free viewpoint video (FVV) as it is also
    refereed, could act as a repository for large voxel datasets in video form that
    could be analyzed and reprocessed with more sophisticated algorithms for 3D reconstruction,
    such as `KinectFusion` when they become available at a later point. Many people
    may choose to upload all of their raw volumetric video to the cloud and use web-based
    editing services to finish their videos in order to minimize the processing requirements
    on their own equipment. For more sophisticated directors, there will be a demand
    for professional grade workstation software for local editing and post production
    effects. Back in the cloud, machine vision middleware, similar to `Primesense`''s
    `NITE`, could provide novel features based on user segmenting, skeletal tracking,
    and pattern recognition that could be applied to uploads in order to generate
    structured information for categorizing videos, objects within them, and even
    the semantic analysis of storylines. Once the videos are online with interactive
    and embeddable viewers, we can expect to see them shared online within Facebook
    streams and linked into the same places where 2D photos and video are used now.
    The opportunity for users to create mashups and remixes of user submitted volumetric
    video will be fascinating to watch unfold as clever artists and programmers leverage
    the capabilities of depth-enabled video in ways that are hard to predict.


    Yet there isn''t much use in capturing volumetric video if you are just going
    to look at it on a plain old 2D screen. While interim solutions will be available
    that use head tracking to allow you to experience simulated motion parallax to
    look around volumetric 3D on 2D screens, the driving reason to develop this type
    of content will result from the availability of true volumetric 3D displays that
    mature from techniques documented in [`Chapter 9`](#Chapter09.html#ch9). As more
    compelling voxel-based video content and services are created, along with games
    and professional 3D applications, volumetric displays will break through a whole
    new era of entertainment and spatial computing. As recently demonstrated by `Microsoft
    Research`''s work with a touch interface for both a true 360 degree volumetric
    3D display called `Vermeer` ([http://research.microsoft.com/en-us/projects/vermeer/](http://research.microsoft.com/en-us/projects/vermeer/)
    ) and a their `Holodesk` ([http://research.microsoft.com/apps/video/default.aspx?id=154571](http://research.microsoft.com/apps/video/default.aspx?id=154571)
    ), which relies on head tracking, interacting with touchable imagery that occupies
    real 3D space opens up a realm of opportunities that were previously considered
    science fiction.


    What kind of content and applications will consumers desire when the ability to
    reach out and touch volumetric video displays is priced within reach? We''ll soon
    find out and that''s where I''ll be going from here. Join the volumetric age by
    getting involved in the community at `volumetric.org` and by following updates
    to this book at `meetthekinect.com` .


    -- Sean Kean'
