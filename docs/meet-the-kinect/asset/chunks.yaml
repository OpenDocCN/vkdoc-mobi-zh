    \ to make a basic skeleton."
  trans: "\n### 项目选择器操作\n\n要全面理解`Item Selector`（项目选择器）的功能，请创建一个空白游戏对象，并将一个淡入淡出控制器和项目选择器拖入该对象。此外，添加一个新脚本，用于监听`Item\
    \ Selector`消息并将其打印出来。让我们创建一个脚本来向控制台输出哪些项目被选中。要创建脚本，请前往主菜单 ![images](img/U001.jpg)\
    \ Assets（资源） ![images](img/U001.jpg) Create（创建） ![images](img/U001.jpg) C# Script（C#\
    \ 脚本）。在项目中为脚本命名。在层级面板中选择该脚本，然后选择 Open（打开）。这将打开 Unity 的脚本编辑环境。输入以下代码：\n\n```\n\
    void ItemSelector_Select(int index)\n{\n  print(\"Item selector select \" + index);\n\
    }\nvoid ItemSelector_Next()\n{\n  print(\"Item selector next\");\n}\nvoid ItemSelector_Prev()\n\
    {\n  print(\"Item selector prev\");\n}\n```\n\n现在，将脚本添加到您创建的游戏对象上。此外，您还需要在检视面板中手动将\
    \ Fader（淡入淡出控制器）链接到`Item Selector`（项目选择器）。这将在控制台中打印您当前聚焦的元素。要查看控制台，请按`Shift+Com+C`或前往主菜单\
    \ ![images](img/U001.jpg) Window（窗口） ![images](img/U001.jpg) Console（控制台）。\n\n\
    各种等待时间控制着滚动的重复逻辑（类似于按住键盘上的某个键：先触发第一次按键，稍作停顿，然后重复按键并逐渐加速）。`Session Manager`（会话管理器）等待焦点手势并启动一个手部指向会话。`Session\
    \ Manager`在屏幕左侧（仅在播放模式下可见）显示的标题是隐式添加的，例如`OpenNIContext`，但如果您想更改默认设置（例如，要监听哪些手势），也可以显式添加。\n\
    \n`OpenNISessionManager`为`HandTracking`（手部追踪）和`GestureDetection`（手势检测）的 OpenNI\
    \ 流提供了一个封装器。此模型的主要优势在于，手势检测器基于原始深度流，无需骨骼检测器。这意味着，即使您裹着毯子坐在沙发上，不像任何人形，ZigFu 的手部追踪器也能正常工作。只需做出手势，您就能掌控一切！\n\
    \n### CoverFlow（封面流）\n\n`CoverFlow`创建了基本的旋转木马式用户体验。菜单游戏对象包含一个手部指向控制器、淡入淡出控制器、滚动菜单和虚拟馈送器。滚动菜单仅为场景添加了滚动功能。您可以设置方向、窗口大小、阻尼和滚动区域大小。静态菜单和滚动菜单的主要区别在于，滚动菜单将成为所有添加给它的子对象的实际父级。\n\
    \n以下是`Scrolling Menu`（滚动菜单）组件的主要属性的详细说明：\n\n> **Direction（方向）：** 菜单项之间的距离\n> \n\
    > **RepositionBasedOnBounds（基于边界重新定位）：** 菜单布局项应基于其实际边界，还是仅基于“Direction”属性？\n>\
    \ \n> **WindowSize（窗口大小）：** 在开始滚动前，屏幕上显示的项目数量。传递给`ItemSelector`\n> \n> **ScrollRegionSize（滚动区域大小）：**\
    \ 传递给`ItemSelector`\n\n虚拟馈送器仅生成虚拟网格，是一个自定义的 ZigFu 脚本。在层级面板中选择链接到此脚本的`Menu Item`（菜单项）组件后，您可以更改网格颜色和其他特性。\n\
    \n### Slide Viewer（幻灯片查看器）\n\n`Slide Viewer`是一个基本的幻灯片查看器，其性质与`CoverFlow`非常相似。然而，它使用的不是虚拟馈送器，而是来自文件夹的图像馈送器。Path（路径）是您设置这些图像路径的位置，而\
    \ Search Pattern（搜索模式）则用于指定您希望从该目录中包含的文件类型。\n\n## 从头创建骨骼\n\nUnity 和 OpenNI 是一个强大的组合。利用它们，您可以从头创建骨骼。以下步骤将引导您完成整个过程。骨骼是一个术语，与\
    \ API 可以检测到的所有可能的关节的可视化相关联。在这里，我们将制作一个“火柴人骨骼”。您对此感兴趣的原因是为了确认您的追踪是否正常工作，并随后将默认游戏对象替换为在\
    \ Maya 等程序中创建的真实图形。骨骼、绑定和角色动画超出了本教程的范围，但所有 3D 软件包都有大量关于如何执行此操作的文档。此外，请参阅 Unity\
    \ 手册以获取针对 Unity 的说明。\n\n### 任务 1. 添加 OpenNI 功能\n\n第一步是创建一个新场景并添加一些 OpenNI 功能。请遵循以下步骤：\n\
    \n1.  前往主菜单。选择 File（文件） ![images](img/U001.jpg) New Scene（新建场景）。\n2.  将场景保存为`MySkeleton`。\n\
    3.  在该新场景中，创建一个空的游戏对象并向其添加 OpenNI 脚本。选择主菜单 ![images](img/U001.jpg) Game Object（游戏对象）\
    \ ![images](img/U001.jpg) Create Empty（创建空对象）来创建一个新的游戏对象。\n4.  将游戏对象重命名为`OpenNI\
    \ Functionality`。通过按`Ctrl`+右键单击并选择 Rename（重命名）选项来执行此操作。注意：您实际上可以指定任何您喜欢的名称。例如，在\
    \ ZigFu 场景中，游戏对象被称为`Sensor`。它所做的只是持有与 OpenNI 通信的组件脚本。\n5.  现在转到 Project（项目）选项卡并打开\
    \ OpenNI 文件夹。确保`OpenNI Functionality`游戏对象在层级面板中被选中并在检视面板中打开。现在单击并将`Open NIDepthmap\
    \ Viewer`拖入检视面板。对`OpenNIUser Tracker`、`Open NIUsers Radar`和`Open NISingle Skeleton\
    \ Controller`执行相同操作。\n6.  现在我们需要将`OpenNI Tracker`连接到`Open NIUsers Radar`以使雷达工作。只需选择`Open\
    \ NIUser Tracker`并将其拖到`Open NIUsers Radar`脚本上即可。图 7-7 显示了正确的配置。\n\n![images](img/0707.jpg)\n\
    \n***图 7-7.** OpenNI 用户追踪器配置*\n\n现在您已经连接了必要的 OpenNI 功能，可以继续制作一个基本骨骼了。\n"
- fmt: '# Task 2\. Making the Basic Skeleton


    Let''s get started creating our first skeleton. Here are the steps to follow:


    1.  Create an empty game object from the Main menu. Select the following option
    to do that: Main Menu ![images](images/U001.jpg) Game Object ![images](images/U001.jpg)
    Create Empty.

    2.  Your new empty game object will now be in the Hierarchy tab. Select the object
    and Ctrl+right-click. Choose Rename. Rename the object `Custom Skeleton`.

    3.  Now create a new object, a sphere, as follows: Main Menu ![images](images/U001.jpg)
    Game Object ![images](images/U001.jpg) Create Other ![images](images/U001.jpg)
    Sphere.

    4.  Now add the sphere to the `Custom Skeleton` in the Hierarchy. Simply select
    the sphere and drag it on the words `Custom Skeleton`. A black arrow will appear
    while you drag. When you see the black arrow, drop the object.

    5.  The `Custom Skeleton` should have a drop-down arrow next to it, and the sphere
    should be located within it. This sphere will be our head. Let''s rename it `Head`
    to match. Rename by pressing Ctrl+right-click and then select the Rename option.

    6.  Select the sphere and move it upward using the Move tool. The Move tool is
    automatically activated when an object is selected. Click the green arrow and
    move the sphere upward in Y space.

    7.  Repeat steps 3-6 for each of the two hands. Create two new spheres, add them
    to the `Custom Skeleton`, and rename them. Then position them. Since the location
    of these objects is going to actually be generated by the user, these positions
    are only for the game developers'' benefit when not in Play mode.


    ![images](images/square.jpg) **Note**: This process of creating objects that are
    part of a larger object is called parenting. We are adding the sphere objects
    as children of the `Custom Skeleton`, their parent.


    8.  Create two cubes for the left and right shoulders. Do exactly the same as
    you did for the spheres, but choose to create cubes instead: Main Menu ![images](images/U001.jpg)
    Game Object ![images](images/U001.jpg) Create Other ![images](images/U001.jpg)
    Cube.


    The Hierarchy tab now should look like the one shown in [Figure 7-8](#Chapter07.html#fig_7_8).


    ![images](images/0708.jpg)


    ***Figure 7-8.** Custom skeleton hierarchy after adding the three spheres and
    two cubes*


    End this task by lighting the scene. Do that by adding a directional light from
    the following menu option: Main Menu ![images](images/U001.jpg) Create Other ![images](images/U001.jpg)
    Directional Light.


    ## Task 3. Connecting the Pieces Together


    Now it''s time to make the skeleton work by linking in the game objects and components.
    Here''s what to do:


    1.  First, you''ll connect the `Custom Skeleton` Game Object to the `OpenNI Skeleton`.
    (ZigFu makes this process nearly effortless.) Go to the Project tab, open the
    `OpenNI` folder, and then open the `Scripts` subfolder. Scroll until `Open NISkeleton`
    is visible. Select it and drag it onto the `Custom Skeleton` Game Object just
    as we did for the spheres and cube.

    2.  Next you must connect the objects (the shapes we created earlier) in the `Custom
    Skeleton` to the appropriate joints in `Open NISkeleton`. Select `Custom Skeleton`
    in the Hierarchy tab. In the Inspector tab, there should be the script for `Open
    NISkeleton`. Click the arrow next to this script to expose all the joints. Select
    and drag the `Head` created in Unity in `Custom Skeleton` in the Hierarchy tab
    onto the `Head` in the `Open NISkeleton` script. Your result should look like
    [Figure 7-9](#Chapter07.html#fig_7_9). Especially note the second item, the `Head`
    item, in the list in the bottom section of the figure.


    ![images](images/0709.jpg)


    ***Figure 7-9.** The Head item linked to the Open NISkeleton script*


    3.  Repeat Step 2 for the `Right Hand`, `Left Hand`, `Right Shoulder`, and `Left
    Shoulder`. If the Inspector changes to the selected object in the Hierarchy tab
    such as the Cube or Sphere, simply click and drag a little bit faster.

    4.  After the list of joints, there are three check boxes that tell Unity how
    to move these objects'' Transform in relation to the skeleton. Set these check
    boxes as follows:


    **Update Joint Positions:** Check this box. This box allows the object''s Transform
    to change to match the rotation of the joints on the skeleton. If a model was
    created in a 3D package, there is no need to check this because most likely there
    will be no need to move joint position, just rotate the joints.


    **Update Root Position:** This will update the game object (`Custom Skeleton`)
    in relation to the user in 3D space. If this is checked, the objects will move
    in 3D space with the user; otherwise, the game object will stay in a fixed position,
    even though the joints will move.


    **Update Orientation:** Check this box. This updates the rotation of the joints
    in 3D space.


    5.  The remaining option is for Scale. Expand this menu. The default unit of measurement
    in OpenNI is millimeters and in Unity is in meters. This option scales the game
    object approximately. For this exercise, change the scale of X, Y, and Z to `0.008`.

    6.  Now select `OpenNI Functionality` in your Hierarchy tab so that you can access
    its components in the Inspector. In the Inspector, find the `OpenNISingle Skeleton
    Controller` script. Open the arrow to expose all of this component''s properties.
    Drag the `Custom Skeleton` from the Hierarchy tab onto the `Skeletons` property
    of the `OpenNISingle Skeleton Controller`.

    7.  Lastly, drag the `OpenNI Functionality` onto the `OpenNISingle Skeleton Controller
    User Tracker`.


    That was the magic sauce! Now run the scene and perform the calibration pose.
    After the tracker latches onto your skeleton, you should see results like those
    in [Figure 7-10](#Chapter07.html#fig_7_10).


    ![images](images/0710.jpg)


    ***Figure 7-10.** The custom skeleton in operation*


    ## Creating a Custom Hand Tracker


    For the last order of business, let''s make a custom hand-tracker example from
    scratch. Create a new scene and call it `MyScene`. Now add a cube game object
    to the scene and open it in the Hierarchy tab. Open the `HandpointControl` folder.
    Select the `Follow Hand Point` script onto the Cube in the Inspector. Play the
    scene, do the calibration, and voilà—hand tracking. ZigFu can be that simple.
    [Figure 7-11](#Chapter07.html#fig_7_11) shows the hand-tracking scene in operation.


    ![images](images/0711.jpg)


    ***Figure 7-11.** The hand-tracker scene*


    On a final note, ZigFu are developers worth watching. Other interesting projects
    they have include a set of Unity scripts for the official Microsoft SDK that are
    calibration free as of today.


    `http://groups.google.com/group/unitykinect/browse_thread/thread/7217ea5eaf4d37e2`


    In addition, the next thing they plan on doing is wrapping the Beckon SDK with
    OpenNI, and then Unity will work seamlessly with any sensor supported by Beckon.
    Expanded controller free games and interfaces are becoming more and more common,
    and even by the day this book is released, new updates will be available. In summary,
    developing games and experiences that go beyond mice and controllers positions
    any creator at the front of user experience design.


    ## C H A P T E R  8'
