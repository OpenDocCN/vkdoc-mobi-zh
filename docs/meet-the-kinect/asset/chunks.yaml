    # 入门指南：Flash + Kinect


    撰写本文时，从 Kinect 与 Flash 通信的主要技术是运行一个小型辅助应用，该应用从 Kinect 抓取所需数据，用 C 或 C++ 等语言对数据进行底层分析，然后像通过网络连接一样，通过套接字连接将你计划在应用程序中使用的信息发送给
    Flash。（实际上，它*可以*通过网络连接，但你更可能在同一个机器上运行套接字服务器和 Flash 影片。）


    在这种通用方法的框架内，有一个重要问题需要考虑：你希望在 Flash 中完成多少 Kinect 数据分析工作，以及在将数据发送到 Flash 之前又能完成多少？和往常一样，答案是：“视情况而定。”


    取决于什么？嗯，Flash 应用程序开发的一个典型场景是，你有一个需要借助现有机器视觉库（如 OpenCV 或 OpenNI/NITE）所提供的手部追踪、骨骼追踪神奇功能的应用程序创意。在这种情况下，你可能属于那些在将任何数据发送到
    Flash *之前*就进行大量数据处理的阵营，此时你发送的是相当精简但强大的数据，比如 NITE 追踪到的手部点的 X-Y-Z 坐标。另一种选择是直接在 Flash
    中处理 Kinect 的深度和 RGB 数据，从 Kinect 抓取这些数据并将其扔给 Flash 影片进行处理。


    对于第一种方案，Blitz Agency 的人员提供了一个基于 Node.js（一个流行的 JavaScript 网络服务器）的解决方案。Blitz 运行了
    OpenNI/NITE 示例应用之一（称为`SingleControl`）的修改版本，并通过 Node.js 将预处理后的手部点数据通过套接字发送给 Flash。他们的步骤在其开发博客上有详细说明：


    `http://labs.blitzagency.com/?p=2634`


    使用这种技术需要你同时运行三个东西，大致如下：1) 使用 Node.js 和 Blitz 的 JavaScript 文件启动你的套接字服务器，该文件配置为按定义的间隔（想想“帧”）广播数据；2)
    运行修改后的`SingleControl`示例，开始收集手部点数据并将其提供给套接字服务器；3) 运行你的 Flash 影片，使用一个`Socket`对象和一个监听器（`ProgressEvent.SOCKET_DATA`），以便在接收到新的手部点数据时执行某些操作。图
    5-5 展示了传递给 Flash 的数据实际上有多精简：远小于 RGB 或深度图像！


    ![images](img/0505.jpg)


    **图 5-5.** 从附带的 NITE 示例应用`SingleControl`传递给 Flash 的 X-Y-Z 手部点数据


    基于 OpenKinect 的 AS3Kinect 项目则采用了第二种方案，从 Kinect 获取相当原始的数据（图像）并将其泵入 Flash（同样使用套接字服务器）。虽然这种设置同样需要相当多的精力，但如果你渴望在一个
    Kinect 项目中磨练你的 Flash/ActionScript 3 技能，这也是非常值得的。关于 AS3Kinect 项目的详细信息可以在这里找到：


    `http://www.as3kinect.org/`


    ## openFrameworks


    与本章介绍的其他工具不同——实际上，也与本书其余大部分内容不同——openFrameworks 和 Cinder（接下来介绍的项目）都不会为你提供一个用于编写和编译代码的独立环境。正如“openFrameworks”这个名字所暗示的，它们只是“框架”，或者说是一堆预编写的代码，你可以使用它们来处理常见任务，而这些任务在原本令人生畏的
    C++ 和 OpenGL 语言中则很难处理。C++ 和 OpenGL 是两种相对较老且极其强大的语言，你可以用它们构建非常稳健的交互式桌面和移动应用程序。C++
    是你的底层函数式编程语言，而 OpenGL 则处理你的高性能 2D 和 3D 图形处理与渲染。


    与 Processing 和 Cinder（我们将会看到）一样，openFrameworks 旨在支持直观的、草图风格的“创意编码”，这一领域涵盖了交互式艺术家、设计师和应用程序开发者可能想要用图形、媒体、数据和硬件所做的所有事情。


    事实证明，这涵盖了非常多的方面。openFrameworks 项目始于帕森斯设计学院的 Zach Lieberman 和 Theodore Watson 之间的合作，现已发展成为一个庞大而强大的库，被成千上万的装置艺术家、表演者和黑客所使用。


    ### openFrameworks 能为你做什么


    openFrameworks 社区一直致力于创意计算机视觉应用，他们迅速加入了 Kinect 黑客狂潮。为什么？因为 Kinect 和类似 Kinect 的传感器有助于解决创建交互式、基于视觉的应用的一个基本挑战：即清晰地了解用户正在做什么。此外，Kinect
    可以与 openFrameworks 内置或封装的某些其他工具强大地结合使用。上一章讨论的计算机视觉库 OpenCV 就是一个很好的例子。虽然 OpenCV
    可用于完成困难的计算机视觉任务，例如人脸检测或识别，但当我们能够进行 3D 视觉观察，并且知道大致在图像中的什么位置寻找人脸时，这些任务就变得更容易了。借助
    openFrameworks，我们可以将这两项技术融合在一起，可以说是在同一个屋檐下，并做出一些了不起的事情。最早展示这种可能性的演示之一是由 Design
    I/O 的 Emily Gobeille 和 openFrameworks 联合创始人 Theo Watson 创建的交互式木偶原型，如 图 5-6 所示。


    ![images](img/0506.jpg)


    **图 5-6.** 由 Emily Gobeille 和 Theo Watson 使用 openFrameworks 构建的投影虚拟木偶应用

    '
- fmt: '### Getting Started: openFrameworks + Kinect


    Like C++ and OpenGL themselves, openFrameworks works cross-platform and can be
    used on PC, Mac, and Linux. However, you have to supply your own integrated development
    environment (IDE), the authoring environment that lets you pull together all the
    files of the frameworks and compile them along with your own code. Supported IDEs
    for openFrameworks are `Code::Blocks` on all platforms, plus `Visual C++ 2008`
    and `Visual C++ 2010` on Windows and `Xcode` on Mac.


    Once you’re set up with your IDE of choice, you’ll need to go to the website to
    pull down the latest release of openFrameworks, which is 0.07 as of this writing.
    (Not a reference to James Bond, as far as we know!) Here is the URL to visit:


    ```

    http://www.openframeworks.cc/download

    ```


    Grabbing the latest release of openFrameworks for your intended platform and IDE
    should give you sample projects inside the `apps/examples` folder that you can
    open and build to make sure everything is set up. If you do that and get a number
    of compatibility and “file not found” errors, welcome: this is your initiation
    to working with frameworks! Not to worry, it’s very common to have to poke around
    following error codes when you first start compiling your own programs from source
    code. Stay with it! The openFrameworks examples, in particular, use relative addressing
    to pull in files and frameworks; so if you try to compile a project that you have
    sitting in the wrong folder, it will certainly break.


    Once you’ve successfully compiled a few of the basic examples, it’s time to try
    some Kinect stuff. For working from scratch with the `libfreenect` driver, Theo
    Watson released an “add-on” (the preferred term for an optional module or plugin)
    called `ofxKinect`, which wraps the `libfreenect` driver for use in openFrameworks.
    Grab the add-on from [`https://github.com/ofTheo/ofxKinect`](https://github.com/ofTheo/ofxKinect).


    Just download that project, move it to the `/add-ons` folder, move the example
    project to the `apps/examples` folder, open the example project, and compile it.
    You can toggle between a kind of feedback dashboard, shown in [Figure 5-7](#Chapter05.html#fig_5_7),
    and the now-familiar pointcloud, shown in [Figure 5-8](#Chapter05.html#fig_5_8).
    What’s especially powerful about openFrameworks is its easy integration with that
    deep computer vision library, `OpenCV`. As you can see in [Figure 5-7](#Chapter05.html#fig_5_7),
    the bottom left feedback image is a depthmap, but now has some additional analysis
    to detect the “blob” (i.e., the author) in the scene, courtesy of `OpenCV`. Blob
    detection is indicated by rectangles drawn over the image.


    ![images](images/0507.jpg)


    **Figure 5-7.** The `ofxKinect` example project shows a depthmap, RGB image, and
    blob detection*


    ![images](images/0508.jpg)


    **Figure 5-8.** The `ofxKinect` example project would not be complete without
    showing a pointcloud view of the data*


    Alternatively, if you want to use OpenNI’s pre-built abstraction layer and algorithmic
    magic, like hand and skeletal tracking, Diederick Huijbers, a Dutch artist/developer
    and prolific contributor to openFrameworks, released an add-on for openFrameworks
    that wraps OpenNI, called `ofxOpenNI`. Get that add-on here:


    ```

    https://github.com/roxlu/ofxOpenNI

    ```


    ### Cinder


    Much of what we’ve said above about openFrameworks can also be said about Cinder,
    a C++ framework for “creative coding” that was released by The Barbarian Group
    digital agency in 2010. Cinder is a newer project and probably a tad scarier than
    openFrameworks for the C++ newbie. There’s a great deal of overlap between the
    two projects, and comparing them point for point would require lots of space and
    quite a bit of subtlety about things like design philosophy and C++ memory management.
    Suffice it to say that both projects bear consideration if you’re looking to create
    a slick C++ app.


    #### What Cinder Can Do For You


    So, why use Cinder for your Kinect app? The work created using Cinder speaks for
    itself. Simply put, it can help you do awe-inspiring graphical work and push the
    envelope visually. Add in a depth-seeing camera and you have the makings of a
    Roman orgy of interactive visual delights! As mentioned in [Chapter 3](#Chapter03.html#ch3),
    digital artist Robert Hodgins’s “Body Dysmorphia” was created using Cinder and
    demonstrates some of the downright disturbing 3D visual effects that are possible.
    (Hodgins himself is a co-creator of Cinder.) As shown in [Figure 5-9](#Chapter05.html#fig_5_9),
    if the camera adds ten pounds, the Kinect plus Cinder adds ten pounds and then
    some!


    ![images](images/0509.jpg)


    **Figure 5-9.** The Cinder-based Body Dysmorphia project by digital artist Robert
    Hodgins*


    #### Getting Started With Cinder


    As with openFrameworks—or any frameworks, for that matter—you need to supply the
    IDE. Cinder will work with `Visual C++ 2008` and `Visual C++ 2010` on Windows
    and with `Xcode` on Mac. As of this writing, though, it does not play well with
    Linux.


    So, just download the latest release of Cinder and put it somewhere—anywhere.
    You can pull down the code from here:


    ```

    http://libcinder.org/download/

    ```


    Again, it’s a good idea to build one or two of the out-of-the-box examples inside
    the `/samples` folder. If everything seems to build okay, it’s time to rock the
    Kinect with Cinder.


    Kinect support for Cinder doesn’t come in a “block” (the preferred term for an
    optional module or plugin) but in a couple of samples and supporting files from
    Hodgins, aptly named `Cinder-Kinect`. Get these files here:


    ```

    https://github.com/cinder/Cinder-Kinect

    ```


    `Cinder-Kinect` wraps the `libfreenect` driver and is currently the only available
    option for making your Kinect data available to Cinder. Download `Cinder-Kinect`
    and drop the whole folder (including the `/include`, `/lib`, `/samples`, and `/src`
    folders) into the main Cinder `/samples` folder. This should ensure that any relative
    locations used in the project files work. When you build the `kinectBasic` example,
    you get the depth and RGB images from the Kinect.


    And when you build the `kinectPointCloud` example, you get yet another variation
    on the 3D point cloud. Though in our opinion, this is one of the most pleasing
    to the eye and interesting, in terms of the level of detail it surfaces.


    ![images](images/0510.jpg)


    **Figure 5-10.** `Cinder-Kinect`’s version of the pointcloud*


    ### Now, Go Forth and Create!


    In this chapter, we wanted to briefly introduce you to the palette of tools available
    for creative coding with the Kinect. Each of these tools deserves a book of its
    own! If you choose one of them for your project, you‘ll no doubt need to explore
    it in a bit more depth (no pun intended!). Our modest hope is that now, as your
    ideas for awesome, creative Kinect projects arise, you’ll be that much better
    equipped to find the right tool for the job having read this chapter. In the next
    chapter, we turn to some of the most powerful and popular general development
    frameworks for Kinect. Onward!


    ## C H A P T E R 6'
