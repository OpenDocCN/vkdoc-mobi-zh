    test that you’ve got everything hooked up correctly.


    Nicolas Burrus, originally from Paris, explores the use of depth sensing cameras
    like the one in the Kinect for his postdoctoral research in computer vision at
    the robotics lab of Carlos III University of Madrid ([`http://roboticslab.uc3m.es/`](http://roboticslab.uc3m.es/)).
    Many thanks are owed to Nicolas for being the first to package up a simple executable
    program anyone can use with the Kinect on their computer, the same month the Kinect
    debuted. For coders, the collection of source code and related machine vision
    libraries he assembled for RGBDemo helped many people get started building applications.
    For less technical people, RGBDemo provided a means to see the Kinect data for
    the first time without having to write any code. Burrus and his partner, Nicolas
    Tisserand, have since formed a company called manctl ([`http://manctl.com`](http://manctl.com))
    to further innovate around Kinect-related technology. Let’s take a look at how
    to get started with RGBDemo.


    #### Finding the Correct Version of RGBDemo


    First, you need to find the correct version of RGBDemo for your operating system.
    Open up a web browser and go to [`http://labs.manctl.com/rgbdemo`](http://labs.manctl.com/rgbdemo)
    in order to pull up the latest information about the software project ([Figure
    1-7](#Chapter01.html#fig_1_7)). Nicolas updates the codebase regularly, and you’ll
    need to pick the most recent version that works on your system. As of this writing,
    v0.6.1 is the latest version that works for Windows and Intel Mac OS X Snow Leopard.
    As of this writing, the RGBDemo project has just been given a home on the manctl
    web site, so be aware that its appearance may have changed by the time you visit.


    ![images](images/0107.jpg)


    ***Figure 1-7.** RGBDemo project web page*


    RGBDemo is an open-source software project. Delightfully, it therefore includes
    not only an application ready to run as a “binary executable,” but the source
    code of its composition as well. Open-source projects such as this one are valuable:
    If you find a problem with the software or want to extend it in a new way, you
    have the recipe to cook your own version from the original instructions, which
    you can then compile into your own improved “binary executable” application. Many
    open-source projects come with only the source code and nothing you can use without
    knowing how to compile programs. That’s not much fun if you aren’t that technical.
    RGBDemo is wonderful because it’s ready to run with an executable binary file,
    in addition to letting you see how it was constructed.


    Now, let’s jump to the binary software that can run on your operating system.
    To do that, the following material is split up into different instructions for
    Windows and Mac users. After the download and installation, we’ll meet up once
    again in the “Testing Your Kinect” section, where we’ll launch RGBDemo and tinker
    around to make sure everything is working.


    #### Downloading and Installing RGBDemo for Windows


    Depending on which version of Windows you are using—XP, Vista, or Windows 7—your
    experience with the details in this section may vary. These instructions address
    some of the hangups you could face when downloading and installing on Vista that
    you might not experience on XP or Windows 7\. You can just skip the explanations
    of those problems if you don’t run into them, but they’re included so we don’t
    leave any of the less advanced readers behind. This process can be tedious on
    Windows, compared to the much simpler Mac installation.'
  trans: '

    ### 下载与安装软件


    我第一次将 Kinect 连接到计算机以了解其工作原理时，使用的就是你将在此节安装的软件。这款软件名为 `RGBDemo`，至今每当我想展示 Kinect
    的功能及其与标准网络摄像头的区别时，我仍会用到它。`RGB` 代表红色、绿色和蓝色——这是 Kinect 中部网络摄像头所能识别的颜色。`Demo` 中的
    `D` 也代表深度，由红外投影仪和红外摄像头借助一家名为 `PrimeSense` 公司的结构光芯片生成。那么，`PrimeSense` 是谁？


    `PrimeSense` 是一家以色列公司，其硬件参考设计和结构光解码芯片是 Kinect 体积 3D 摄像头系统的核心。这让许多关注 Kinect（最初代号为“Project
    Natal”）演变的人感到意外，因为许多人认为微软会使用其最近收购的两家飞行时间 3D 传感器公司——`3DV Systems` 和 `Canesta`——的知识产权。继
    `OpenKinect` 项目的引领之后，`PrimeSense` 又协助创立了 `OpenNI`，旨在将最佳工具交到开发者手中。`OpenNI` 推出了第一家主要商店，提供利用体积摄像头（如
    Kinect 中的摄像头）的 PC 应用程序，随着 `Arena` 的亮相，这将在第 3 章中更详细地介绍。


    虽然从自然用户界面角度看待 Kinect 的人将其视为 3D 手势识别设备，但来自工程和机器人领域背景的人则将 Kinect 硬件的这一特定方面称为 `RGBD`
    传感器。`RGBDemo` 旨在演示 Kinect 如何在机器视觉和 3D 重建等应用中作为 `RGBD` 传感器发挥作用——因此得名 `RGBDemo`。这是在
    Mac 和 Windows 机器上查看 Kinect 底层数据最直接的方法。


    如果 Kinect “即插即用”于你的 Xbox，为什么还需要下载软件呢？好吧，如果你在没有安装一些能够与 Kinect 通信的驱动程序和应用程序的情况下将
    Kinect 插入计算机，那么什么都不会发生！因此，尽管我知道你一定迫不及待，但请耐心等待，在插入 Kinect 之前，请仔细按顺序完成所有步骤。其中一些步骤需要严格按照特定顺序执行。请务必遵循！


    首先，你需要上网下载 `RGBDemo`，这是一套由 Nicolas Burrus 编写的强大的开源软件套件，旨在提供一套工具包，供他人编写程序，并为非编码人员提供一种查看
    Kinect 数据真实样子的方法。如果你使用的是 Windows 系统，那么你将从 `OpenNI` 安装三个附带的驱动程序，这些程序有助于 `RGBDemo`
    更好地理解来自 Kinect 的数据。该软件附带的 `RGBD-viewer` 应用程序将向你展示 Kinect 所能看到的图像类型及其独特的成像方式——这将是我们测试一切连接是否正确的方法。


    Nicolas Burrus 来自巴黎，他在马德里卡洛斯三世大学机器人实验室进行博士后计算机视觉研究时，探索了深度感测摄像头（如 Kinect 中的摄像头）的应用（`http://roboticslab.uc3m.es/`）。非常感谢
    Nicolas 在 Kinect 发布当月，首次打包了一个任何人都可以在计算机上使用 Kinect 的简单可执行程序。对于程序员来说，他为 `RGBDemo`
    汇编的源代码和相关机器视觉库集合帮助许多人开始了应用程序的开发。对于非技术用户来说，`RGBDemo` 提供了一种无需编写任何代码即可首次查看 Kinect
    数据的方法。此后，Burrus 和他的搭档 Nicolas Tisserand 成立了一家名为 `manctl` 的公司（`http://manctl.com`），以进一步围绕
    Kinect 相关技术进行创新。让我们来了解一下如何开始使用 `RGBDemo`。


    #### 查找 `RGBDemo` 的正确版本


    首先，你需要找到适合你操作系统的 `RGBDemo` 正确版本。打开浏览器，访问 `http://labs.manctl.com/rgbdemo`，以获取该软件项目的最新信息（图
    1-7）。Nicolas 会定期更新代码库，你需要选择在你的系统上运行的最新版本。在撰写本文时，`v0.6.1` 是适用于 Windows 和 Intel
    Mac OS X Snow Leopard 的最新版本。在撰写本文时，`RGBDemo` 项目刚刚在 `manctl` 网站上有了一个主页，因此请注意，当你访问时其外观可能已发生变化。


    ![images](img/0107.jpg)


    ***图 1-7.** RGBDemo 项目网页*


    `RGBDemo` 是一个开源软件项目。令人欣喜的是，它不仅包含一个可以直接作为“二进制可执行文件”运行的应用程序，还包含了其构成的源代码。像这样的开源项目非常有价值：如果你发现软件有问题，或者想以新的方式扩展它，你可以根据原始说明自行定制版本，然后将其编译成你自己改进的“二进制可执行文件”应用程序。许多开源项目只提供源代码，如果你不知道如何编译程序，就无法使用。如果你不太懂技术，那就没什么乐趣了。`RGBDemo`
    的妙处在于，它不仅可以作为可执行二进制文件直接运行，还能让你了解其构建方式。


    现在，让我们直接进入可以在你的操作系统上运行的二进制软件。为此，以下内容将分为针对 Windows 和 Mac 用户的不同说明。在完成下载和安装后，我们将再次在“测试你的
    Kinect”一节中会合，届时我们将启动 `RGBDemo` 并进行调试，以确保一切正常工作。


    #### 为 Windows 下载并安装 `RGBDemo`


    根据你使用的 Windows 版本（XP、Vista 或 Windows 7），你在本节中的具体体验可能会有所不同。这些说明解决了一些你在 Vista 上下载和安装时可能遇到的卡顿问题，而这些问题在
    XP 或 Windows 7 上可能不会遇到。如果你没有遇到这些问题，可以跳过这些说明，但这里包含它们是为了不落下任何初级读者。与简单得多的 Mac 安装相比，这个过程在
    Windows 上可能会有些繁琐。

    '
- fmt: '### Downloading the Binaries


    Enough talk—let’s get that software! On the RGBDemo web page, click the `Windows
    binaries` download link, as shown in [Figure 1-8](#Chapter01.html#fig_1_8). The
    page will jump to a line that contains a link to a file called `RGBDemo 0.6.1rc1-Win32.zip`
    ([Figure 1-9](#Chapter01.html#fig_1_9)). Before you click that download link,
    you’ll need to carefully carry out two steps in sequence.


    ![images](images/0108.jpg)


    ***Figure 1-8.** The link for* `Windows binaries` *on the Kinect RGBDemo page*


    First, I want you to select and copy the 28-character License Key, as shown in
    [Figure 1-9](#Chapter01.html#fig_1_9). You will need to use this in a moment and,
    if you copy it to your clipboard now, you will be able to paste it in the next
    step without having to come back to this page and hunt for it. This long string
    of letters, numbers, and symbols is a license to use the PrimeSense NITE middleware
    with the OpenNI framework.


    ![images](images/0109.jpg)


    ***Figure 1-9.** Screen showing the License Key and the download link for the
    RGBDemo* `ZIP` *file*


    Great! Now, let’s click the link at the top of the screen ([Figure 1-9](#Chapter01.html#fig_1_9))
    to download the `RGBDemo-0.6.1rc1-Win32.zip` compressed file.


    Bam! What just happened? Your browser is now at another site called SourceForge
    ([Figure 1-10](#Chapter01.html#fig_1_10)), which hosts this popular file. Don’t
    be alarmed when the RGBDemo software starts to download automatically. Or, you
    may see a dialog box prompting you to select a save location for the file. The
    compressed file is over 60MB in size and could take a bit of time to download
    depending on the speed of your Internet connection.


    ![images](images/0110.jpg)


    ***Figure 1-10.** Downloading from SourceForge*


    You may need to respond to an alert that says something like `This type of file
    can harm your computer. Are you sure you want to download RGBDemo-0.6.1rc1-Win32.zip?`
    Answer affirmatively, and when `RGBDemo-0.6.1rc1-Win32.zip` is finished downloading,
    double-click the `ZIP` file to see the `Extract all files` window ([Figure 1-11](#Chapter01.html#fig_1_11)).
    Simply click the icon for the RGBDemo folder and drag it out of the window and
    over to your desktop to extract it there.


    ![images](images/0111.jpg)


    ***Figure 1-11.** Dragging the RGBDemo folder to the desktop*


    You may be prompted with a Windows Security Warning asking `Are you sure you want
    to copy and move files to this folder?` Click `Yes`. Windows will copy the folder
    and all its files over to the desktop. Once it has finished, open the folder on
    your desktop and you’ll see a listing of all the files and folders inside the
    directory ([Figure 1-12](#Chapter01.html#fig_1_12)).


    ![images](images/0112.jpg)


    ***Figure 1-12.** The complete directory of files inside the RGBDemo folder*


    Now, go into the directory labeled `Drivers`. Once you are in the `Drivers` directory,
    you will see a list of three `MSI` installation files—don’t click any, yet! You’ll
    need to install them in a very critical order ([Figure 1-13](#Chapter01.html#fig_1_13)),
    so pay attention and follow along, please. Perform the installation in the following
    order:


    > 1.  `OpenNI-Win32`

    > 2.  `SensorKinect-Win-OpenSource32`

    > 3.  `NITE-Win32`


    Notice that the order in which the files are listed in the directory as shown
    in [Figure 1-13](#Chapter01.html#fig_1_13) won’t necessarily match the proper
    installation order. So be careful! Pay attention to the order as I describe it.


    ![images](images/0113.jpg)


    ***Figure 1-13.** Critical order of driver installation: 1.) OpenNI-Win32, 2.)
    SensorKinect-Win-OpenSource32, 3.) NITE-Win32*


    First, you need to install OpenNI ([Figure 1-14](#Chapter01.html#fig_1_14)). This
    is a framework for “natural interface” technology that allows modules for different
    hardware and software to talk with each other. Next, you’ll install SensorKinect
    ([Figure 1-16](#Chapter01.html#fig_1_16)), a device module that registers the
    Kinect with OpenNI so it can read its sensor data. Finally, you’ll install NITE
    ([Figure 1-17](#Chapter01.html#fig_1_17)), a “middleware” module that processes
    the volumetric data coming from the Kinect and derives a map of a person’s skeletal
    structure that can be used by an application, controlling gestures and other interactivity.


    ![images](images/0114.jpg)


    ***Figure 1-14.** OpenNI install dialog showing default destination*


    ### Installing OpenNI


    Double-click the `OpenNI-Win32` file to start the installer. Depending on your
    settings and which version of Windows you are using, you might get a Windows Security
    Warning ([Figure 1-15](#Chapter01.html#fig_1_15), top). Just respond in the affirmative—in
    this case, `Install`. Don’t worry, all of the software you are instructed to download
    in this book are from safe sources. In the OpenNI setup application, you can accept
    the default path, `C:\Program Files\OpenNI`, click `Install`, and close the window
    once it’s finished.


    ![images](images/0115.jpg)


    ***Figure 1-15.** Windows Security Warnings—It’s okay to trust software from PrimeSense
    Ltd; choose* `Install`*.*


    ### Installing SensorKinect


    Next, launch the `SensorKinect-Win-OpenSource32` setup application and be sure
    that both `OpenNI` and `Sensor` are checked in the component selection dialog
    box ([Figure 1-16](#Chapter01.html#fig_1_16)). Near the end of the installation,
    you may see another Windows Security Warning ([Figure 1-15](#Chapter01.html#fig_1_15),
    bottom)—click `Install this driver software anyway`, then close the window when
    the process has completed.


    ![images](images/0116.jpg)


    ***Figure 1-16.** Component install choices—Make sure both OpenNI and Sensor are
    checked*


    ### Installing PrimeSense NITE


    Finally, install the last driver by launching the `NITE-Win32` setup application.
    Agree to the license agreement, keep the default installation path as `C:\Program
    Files\Prime Sense\NITE\`, and click `Install`. In the next step, you’ll be prompted
    for a license key ([Figure 1-17](#Chapter01.html#fig_1_17)). Paste in the string
    of 28 characters that you copied from the RGBDemo download page ([Figure 1-9](#Chapter01.html#fig_1_9))
    and hit `Install`. It’s normal for a couple of command prompt windows to open
    and close by themselves during this step, so don’t be alarmed.


    ![images](images/0117.jpg)


    ***Figure 1-17.** PrimeSense prompt for NITE license key—0KOIk2JeIBYClPWVnMoRKn5cdY4=*'
