  trans: '

    ### 在 Mac OS X 上使用 Processing 控制 Kinect


    与 Windows 相比，让 Processing 在 Mac OS X 上控制 Kinect 要简单一些，这要归功于 ITP 的 Daniel Shiffman，他在
    Kinect 发布后数周内就发布了基于 `libfreenect` 的库。


    #### 添加 OpenKinect


    要安装 Shiffman 的库，只需浏览到 [`http://www.shiffman.net/p5/kinect/`](http://www.shiffman.net/p5/kinect/)
    并下载 `openkinect.zip` 文件，其中包含编译好的库和一些示例草图。如果你同时查看 GitHub 上的源代码，可以更深入地研究这些示例：[`https://github.com/shiffman/libfreenect/tree/master/wrappers/java/processing`](https://github.com/shiffman/libfreenect/tree/master/wrappers/java/processing)。将整个文件夹放入
    Processing 草图文件夹中的 "libraries" 文件夹内，然后按照惯例，重新启动 Processing。


    #### 更新驱动程序


    与 Windows 不同，在这里我们可以让 Processing 直接驱动硬件——无需单独设置 Kinect 或安装驱动。一切就绪，可以开始了！


    #### 运行点云示例


    让我们以参考为目的，运行附带的点云示例代码。在 "Examples... Contributed Libraries" 下的 `openkinect` 目录中，您应该能看到三个左右的示例。打开
    "Pointcloud" 并点击 `Run`。您应该会看到类似 图 4-10 的画面，又是一个与 `RGBDemo` 程序相似的点云。


    ![images](img/0410.jpg)


    ***图 4-10：** Shiffman 的点云草图，按原样运行*


    #### 点云草图的工作原理


    再次强调，我们得到了一个有点像第 1 章中 `RGBDemo` 的输出，只不过我们可以在 Processing 中操作它！此草图遵循 Processing
    的惯例：使用 `setup()` 函数来设置草图所使用的任何参数或进程，以及一个在草图运行时重复执行的 `draw()` 函数，用于绘制和重绘元素。与 Windows
    示例一样，其中还包含其他一些内容：导入必要库元素的 import 语句、一些变量声明、一些辅助函数（用于将来自 `Kinect()` 对象的数据转换为草图渲染所需的格式），当然，还有一个在草图终止时被调用的
    `stop()` 函数。


    说到 `Kinect()` 对象，呃，它到底是什么？如果您读过 Windows 示例，就会知道 dLibs 将 Kinect 的数据拆分为几个不同的类，并且该库附带了一些基本文档。`openkinect`
    库也使用几个类来封装 Kinect 数据，但您只能通过附带的示例和查看源代码来了解它们。特别是，如果您想了解 `Kinect()` 对象（这是设备的主要接口），您需要在
    GitHub 上查看源代码：


    [`https://github.com/shiffman/libfreenect/blob/master/wrappers/java/processing/KinectProcessing/src/org/openkinect/processing/Kinect.java`](https://github.com/shiffman/libfreenect/blob/master/wrappers/java/processing/KinectProcessing/src/org/openkinect/processing/Kinect.java)


    在这里，您会看到与此对象关联的属性和方法主要处理深度和 RGB 数据，例如：


    - `enableDepth()`

    - `enableRGB()`

    - `getDepthImage()`

    - `getVideoImage()`

    - `getRawDepth()`

    - 等等。


    ![images](img/square.jpg) **注意**  这里还有一个用于控制 Kinect 电机的接口，太酷了，因此如果您调用 `tilt(15)`，您的
    Kinect 将会倾斜 15 度！但是，Kinect 内部的电机并非为连续或频繁使用而设计，它会烧毁，因此请明智地使用此功能。


    #### 调整示例


    在按原样体验过示例之后，让我们尝试对它进行一些修改。具体来说，让我们调整 `draw()` 函数，看看会发生什么。


    ##### 更高分辨率


    纯粹因为它简单得离谱，我们首先可以像在 Windows 上那样更改分辨率。您可以看到，整数变量 `skip` 用于跳过来自 Kinect 的数据点，因为我们不需要每个点来渲染点云。尝试将：


    ```

    int skip = 4;

    ```


    更改为：


    ```

    int skip = 1;

    ```


    渲染每一个数据点（而不是每四个点渲染一个）会影响程序的执行，您在本次运行草图时会注意到帧率变慢。与 Windows 上我们的点云包含 RGB 值不同，这里更高的分辨率仅意味着渲染中更多的“覆盖范围”，如图
    4-11 所示。


    ![images](img/0411.jpg)


    ***图 4-11.** 更高分辨率下的点云草图*

    '
- fmt: "## Depthmap and Thresholding\n\nThe pointcloud example looks cool and all,\
    \ but much of the power of the Kinect and Kinect-like sensors is in the kinds\
    \ of analysis they allow us to do in 3D space. If you skipped over the Windows\
    \ section, you may have missed this point, so I will repeat myself verbatim: What\
    \ really unlocks the power of the Kinect is the ability to selectively analyze\
    \ the 3D space in front of the sensor, to pick out objects and people in the scene,\
    \ and understand what’s happening with them. What is the object? Is the person\
    \ holding the object? Is the person gesturing? Such questions form a classic topic\
    \ in machine vision known as scene analysis that has been extensively developed\
    \ using 2D images over the past few decades. With the added depth information\
    \ from a Kinect-like sensor or depth camera, scene analysis becomes much easier\
    \ and more robust and the possibilities grow.\n\nWith that said, let’s open the\
    \ `RGBDepthTest` example, run it, and then tweak it to do some rudimentary scene\
    \ analysis of our own.\n\n![images](images/0412.jpg)\n\n***Figure 4-12.** The\
    \ output of Shiffman’s `RGBDepthTest` sketch*\n\nWhen you run the sketch and enable\
    \ the RGB image by hitting `“r”`, you’ll see the RGB image and depth image—sometimes\
    \ called a `depthmap`—side by side as in [Figure 4-12](#Chapter04.html#fig_4_12).\
    \ As you can imagine, programmatically picking out a region of interest in this\
    \ scene is quite a bit easier and likely more accurate when we know at what depth\
    \ we’re looking for it.\n\nSo, let’s do it. We’re going to need to add a bit of\
    \ code to the top of the sketch, as well as the `setup` and `draw` functions,\
    \ to replace the depthmap with our own thresholded depth image.\n\nAdd these variable\
    \ declarations to the top of the sketch to set the new depth image as well as\
    \ the minimum and maximum depth to show. We will only draw pixels in this range,\
    \ cutting out everything behind it.\n\n```\nPImage threshImage;\nint minThresh\
    \ =  0;\nint maxThresh = 750;\n```\n\nThen provision the new depth image inside\
    \ the `setup()` function:\n\n```\nvoid setup() {\n\n  //...\n\n```\n\nLeave all\
    \ the existing code intact and add\n\n```\n  threshImage = new PImage(640, 480);\n\
    \n}\n```\n\nInside the `draw()` function, comment out the existing depth image\
    \ renderer\n\n```\n//image(kinect.getDepthImage(),640,0);\n```\n\nNow add a routine\
    \ inside the draw image to loop through all the depth pixels, setting any pixels\
    \ within our threshold range to a color (blue) and everything else to black, as\
    \ in the following:\n\n```\nint[] depth = kinect.getRawDepth();\n  for (int i=0;\
    \ i < 640*480; i++) {\n    if (depth[i] > minThresh && depth[i] < maxThresh) {\n\
    \      threshImage.pixels[i] = 0xFF0000FF;\n    } else {\n      threshImage.pixels[i]\
    \ = 0;\n    }\n  }\n```\n\nFinally, draw our new depth image as follows:\n\n```\n\
    \  threshImage.updatePixels();\n  image(threshImage, 640, 0);\n```\n\nWhen you\
    \ run the sketch, you should see an output window like that shown in [Figure 4-13](#Chapter04.html#fig_4_13).\n\
    \n![images](images/0413.jpg)\n\n***Figure 4-13.** Our thresholded depthmap as\
    \ a model of the `RGBDepthTest` example sketch*\n\nThresholding the image at a\
    \ given depth allows you to select out a slice in space, in this case grabbing\
    \ a perfect outline of yourself at a given distance from the Kinect. Applying\
    \ some of the traditional machine vision analysis and algorithms to this “blob”\
    \ is what makes many of the Kinect applications go. In this chapter, we’ve just\
    \ started down this long and fascinating path, building the foundation for such\
    \ work in processing. Good job!\n\n### Processing Plus Kinect: Beyond This Book\n\
    \nIt’s beyond the scope of this book to delve into everything you can do with\
    \ Processing plus Kinect, but if you’re thinking Processing might be your tool\
    \ of choice, there are some excellent resources out there on the open Web. One\
    \ is `SimpleOpenNI`, a Processing wrapper for PrimeSense’s OpenNI framework (covered\
    \ in [Chapter 6](#Chapter06.html#ch6)). `SimpleOpenNI` exposes in Processing all\
    \ of the function calls and machine vision jujitsu that makes building a complex,\
    \ gestural interface possible.\n\nBut don’t leave this book with just Processing\
    \ in your Kinect-hacking toolbox. There’s much more out there. Depending on what\
    \ you want to build or accomplish, you may be better served by another language\
    \ or tool. In the next chapter, we survey the landscape of programming environments\
    \ and frameworks that support Kinect hacking and try to show what hackers, artists,\
    \ researchers, and visionaries in diverse domains have used to generate the veritable\
    \ cornucopia of Kinect concoctions in the less than one year since the device’s\
    \ release.\n\n## Chapter 5: Kinect for Creatives\n\nIf you followed the explosion\
    \ of hacker activity around the release of the Kinect, you noticed that many of\
    \ the applications looked nothing like, say, `Kinect Adventures` for XBox. Armed\
    \ with this revolutionary device, creative people of all stripes envisioned their\
    \ own novel use cases: virtual puppets, 3D scan-and-print workflows, operating\
    \ room image assistants, robots that see and follow people, gesture-controlled\
    \ hovercraft, no-frills motion-capture Jedi animations, etc. How could such a\
    \ diverse set of applications be possible?\n\nThe answer is in the accessibility\
    \ of the Kinect to creative people: the mix of available software and development\
    \ platforms that creators use within their own more specialized domains, whether\
    \ visual arts, performance, robotics, or what have you. What follows is not a\
    \ comprehensive list of these tools, but a selective inventory of some of the\
    \ more popular and potentially useful ones and an overview of how to get started\
    \ using the Kinect with them. These tools comprise a mix of free-and-open-source\
    \ and proprietary commercial products, which run the gamut in terms of their respective\
    \ learning curves. Processing, as discussed in the last chapter, may well be the\
    \ right tool for the job if you’re new to programming but want to learn and if\
    \ the application of your dreams requires 2D or simple 3D animation, cross-platform\
    \ support, and a smattering of its audio-visual and networking tools. In later\
    \ chapters, we’ll look closely at the more intensive, dedicated SDKs (software\
    \ development kits) and development platforms for building rich gestural interfaces\
    \ and 3D games—the kind of stuff you see, or will see, on XBox. In this chapter,\
    \ we survey a different corner of the vast Kinect-hacking toolshed: the tools\
    \ that creative coders (and non-coders) use to build all manner of projects, from\
    \ Kinect-controlled musical instruments to full, motion-controlled Web apps. The\
    \ idea is to present you, the reader, with the current breadth of tools available\
    \ to execute your vision, whatever it is.\n\n![images](images/square.jpg) **Note**\
    \ Subsequent chapters in this book discuss other frameworks and platforms, such\
    \ as Beckon, Unity, OpenNI, and NITE. Those others are more general in nature\
    \ and sometimes require deep programming expertise. The platforms described in\
    \ this chapter are aimed specifically at the creative and artistic community.\n\
    \n### MaxMSP\n\nMaxMSP is more obscure than a mainstream software like Adobe Flash,\
    \ but it’s tailor-made for certain Kinect applications, for example those that\
    \ involve the Kinect as an input to control sound or, say, stage lighting. Also,\
    \ if you’re a very visual person, or just really code-averse, you will want to\
    \ check out MaxMSP.\n\nMaxMSP does cost money. If you’re on a budget or just prefer\
    \ free software, you can look at MaxMSP’s free-and-open-source competitor, PureData\
    \ (PD). You can learn more about PureData at `http://puredata.info/`."
  raw: '##### Depthmap and Thresholding


    The pointcloud example looks cool and all, but much of the power of the Kinect
    and Kinect-like sensors is in the kinds of analysis they allow us to do in 3D
    space. If you skipped over the Windows section, you may have missed this point,
    so I will repeat myself verbatim: What really unlocks the power of the Kinect
    is the ability to selectively analyze the 3D space in front of the sensor, to
    pick out objects and people in the scene, and understand what’s happening with
    them. What is the object? Is the person holding the object? Is the person gesturing?
    Such questions form a classic topic in machine vision known as scene analysis
    that has been extensively developed using 2D images over the past few decades.
    With the added depth information from a Kinect-like sensor or depth camera, scene
    analysis becomes much easier and more robust and the possibilities grow.


    With that said, let’s open the `RGBDepthTest` example, run it, and then tweak
    it to do some rudimentary scene analysis of our own.


    ![images](images/0412.jpg)


    ***Figure 4-12.** The output of Shiffman’s RGBDepthTest sketch*


    When you run the sketch and enable the RGB image by hitting “r,” you’ll see the
    RGB image and depth image—sometimes called a depthmap—side by side as in [Figure
    4-12](#Chapter04.html#fig_4_12). As you can imagine, programmatically picking
    out a region of interest in this scene is quite a bit easier and likely more accurate
    when we know at what depth we’re looking for it.


    So, let’s do it. We’re going to need to add a bit of code to the top of the sketch,
    as well as the `setup` and `draw` functions, to replace the depthmap with our
    own thresholded depth image.


    Add these variable declarations to the top of the sketch to set the new depth
    image as well as the minimum and maximum depth to show. We will only draw pixels
    in this range, cutting out everything behind it.


    `PImage threshImage;`

    `int minThresh =  0;`

    `int maxThresh = 750;`


    Then provision the new depth image inside the `setup()` function:


    `void setup() {`


    `  //...`


    Leave all the existing code intact and add


    `  threshImage = new PImage(640, 480);`


    `}`


    Inside the `draw()` function, comment out the existing depth image renderer


    `//image(kinect.getDepthImage(),640,0);`


    Now add a routine inside the draw image to loop through all the depth pixels,
    setting any pixels within our threshold range to a color (blue) and everything
    else to black, as in the following:


    `int[] depth = kinect.getRawDepth();`

    `  for (int i=0; i < 640*480; i++) {`

    `    if (depth[i] > minThresh && depth[i] < maxThresh) {`

    `      threshImage.pixels[i] = 0xFF0000FF;`

    `    } else {`

    `      threshImage.pixels[i] = 0;`

    `    }`

    `  }`


    Finally, draw our new depth image as follows:


    `  threshImage.updatePixels();`

    `  image(threshImage, 640, 0);`


    When you run the sketch, you should see an output window like that shown in [Figure
    4-13](#Chapter04.html#fig_4_13).


    ![images](images/0413.jpg)


    ***Figure 4-13.** Our thresholded depthmap as a model of the RGBDepthTest example
    sketch*


    Thresholding the image at a given depth allows you to select out a slice in space,
    in this case grabbing a perfect outline of yourself at a given distance from the
    Kinect. Applying some of the traditional machine vision analysis and algorithms
    to this “blob” is what makes many of the Kinect applications go. In this chapter,
    we’ve just started down this long and fascinating path, building the foundation
    for such work in processing. Good job!


    ### Processing Plus Kinect: Beyond This Book


    It’s beyond the scope of this book to delve into everything you can do with Processing
    plus Kinect, but if you’re thinking Processing might be your tool of choice, there
    are some excellent resources out there on the open Web. One is SimpleOpenNI, a
    Processing wrapper for PrimeSense’s OpenNI framework (covered in [Chapter 6](#Chapter06.html#ch6)).
    SimpleOpenNI exposes in Processing all of the function calls and machine vision
    jujitsu that makes building a complex, gestural interface possible.


    But don’t leave this book with just Processing in your Kinect-hacking toolbox.
    There’s much more out there. Depending on what you want to build or accomplish,
    you may be better served by another language or tool. In the next chapter, we
    survey the landscape of programming environments and frameworks that support Kinect
    hacking and try to show what hackers, artists, researchers, and visionaries in
    diverse domains have used to generate the veritable cornucopia of Kinect concoctions
    in the less than one year since the device’s release.


    ## C H A P T E R  5


    ## Kinect for Creatives


    If you followed the explosion of hacker activity around the release of the Kinect,
    you noticed that many of the applications looked nothing like, say, Kinect Adventures
    for XBox. Armed with this revolutionary device, creative people of all stripes
    envisioned their own novel use cases: virtual puppets, 3D scan-and-print workflows,
    operating room image assistants, robots that see and follow people, gesture-controlled
    hovercraft, no-frills motion-capture Jedi animations, etc. How could such a diverse
    set of applications be possible?


    The answer is in the accessibility of the Kinect to creative people: the mix of
    available software and development platforms that creators use within their own
    more specialized domains, whether visual arts, performance, robotics, or what
    have you. What follows is not a comprehensive list of these tools, but a selective
    inventory of some of the more popular and potentially useful ones and an overview
    of how to get started using the Kinect with them. These tools comprise a mix of
    free-and-open-source and proprietary commercial products, which run the gamut
    in terms of their respective learning curves. Processing, as discussed in the
    last chapter, may well be the right tool for the job if you’re new to programming
    but want to learn and if the application of your dreams requires 2D or simple
    3D animation, cross-platform support, and a smattering of its audio-visual and
    networking tools. In later chapters, we’ll look closely at the more intensive,
    dedicated SDKs (software development kits) and development platforms for building
    rich gestural interfaces and 3D games—the kind of stuff you see, or will see,
    on XBox. In this chapter, we survey a different corner of the vast Kinect-hacking
    toolshed: the tools that creative coders (and non-coders) use to build all manner
    of projects, from Kinect-controlled musical instruments to full, motion-controlled
    Web apps. The idea is to present you, the reader, with the current breadth of
    tools available to execute your vision, whatever it is.


    ![images](images/square.jpg) **Note**  Subsequent chapters in this book discuss
    other frameworks and platforms, such as Beckon, Unity, OpenNI, and NITE. Those
    others are more general in nature and sometimes require deep programming expertise.
    The platforms described in this chapter are aimed specifically at the creative
    and artistic community.


    ### MaxMSP


    MaxMSP is more obscure than a mainstream software like Adobe Flash, but it’s tailor-made
    for certain Kinect applications, for example those that involve the Kinect as
    an input to control sound or, say, stage lighting. Also, if you’re a very visual
    person, or just really code-averse, you will want to check out MaxMSP.


    MaxMSP does cost money. If you’re on a budget or just prefer free software, you
    can look at MaxMSP’s free-and-open-source competitor, PureData (PD). You can learn
    more about PureData at [`http://puredata.info/`](http://puredata.info/).'
  trans: "\n## 深度图与阈值处理\n\n点云示例看起来炫酷且功能全面，但 Kinect 及同类传感器的强大之处，更多在于它们允许我们在三维空间进行各种分析。如果你跳过了\
    \ Windows 部分，可能错过了这一点，所以我要原话重复一遍：真正释放 Kinect 潜力的关键，在于能够有选择性地分析传感器前方的三维空间，识别场景中的物体与人，并了解它们的状态。这个物体是什么？这个人是否正拿着物体？这个人是否在做手势？这类问题构成了机器视觉中一个经典课题——场景分析，过去几十年来，人们一直利用二维图像对其进行深入研究。而有了\
    \ Kinect 类传感器或深度相机提供的额外深度信息，场景分析变得更加简单、鲁棒性更强，可能性也随之增加。\n\n说到这里，让我们打开 `RGBDepthTest`\
    \ 示例，运行它，然后修改代码，进行一些基础的场景分析。\n\n![图片](img/0412.jpg)\n\n***图 4-12.** Shiffman 的\
    \ `RGBDepthTest` 程式的输出*\n\n当你运行该程式，并通过按下 `“r”` 键启用 RGB 图像时，你将看到 RGB 图像和深度图像（有时也称为\
    \ `深度图`）并排显示，如图 4-12 所示。可以想象，当我们在场景中通过编程方式选取感兴趣的区域时，如果知道我们正在寻找的深度，操作会容易得多，精度也可能更高。\n\
    \n那么，我们就开始吧。我们需要在程式顶部以及 `setup` 和 `draw` 函数中添加一些代码，用我们自己的阈值处理后的深度图像替换原始深度图。\n\n\
    在程式顶部添加这些变量声明，以设置新的深度图像以及要显示的最小和最大深度。我们将只绘制这个范围内的像素，剔除其后的所有内容。\n\n```\nPImage\
    \ threshImage;\nint minThresh =  0;\nint maxThresh = 750;\n```\n\n然后在 `setup()`\
    \ 函数中配置新的深度图像：\n\n```\nvoid setup() {\n\n  //...\n\n```\n\n保留所有现有代码不变，并添加\n\n\
    ```\n  threshImage = new PImage(640, 480);\n\n}\n```\n\n在 `draw()` 函数中，注释掉现有的深度图像渲染代码：\n\
    \n```\n//image(kinect.getDepthImage(),640,0);\n```\n\n现在，在绘图函数中添加一个例程，用于遍历所有深度像素，将阈值范围内的像素设置为一种颜色（蓝色），其余像素设置为黑色，如下所示：\n\
    \n```\nint[] depth = kinect.getRawDepth();\n  for (int i=0; i < 640*480; i++)\
    \ {\n    if (depth[i] > minThresh && depth[i] < maxThresh) {\n      threshImage.pixels[i]\
    \ = 0xFF0000FF;\n    } else {\n      threshImage.pixels[i] = 0;\n    }\n  }\n\
    ```\n\n最后，按如下方式绘制新的深度图像：\n\n```\n  threshImage.updatePixels();\n  image(threshImage,\
    \ 640, 0);\n```\n\n当你运行该程式时，应该会看到一个输出窗口，如图 4-13 所示。\n\n![图片](img/0413.jpg)\n\n\
    ***图 4-13.** 我们对 `RGBDepthTest` 示例程式进行阈值处理后的深度图模型*\n\n在给定深度处对图像进行阈值处理，可以让你在空间中选取一个切片，本例中即是抓取距离\
    \ Kinect 特定距离处你自身的完美轮廓。将一些传统的机器视觉分析和算法应用于这个“团块”，正是许多 Kinect 应用程序得以运行的关键。在本章中，我们刚刚踏上这条漫长而迷人的道路，为在\
    \ Processing 中进行此类工作奠定了基础。干得漂亮！\n\n### Processing 与 Kinect：本书之外\n\n深入探讨你可以用 Processing\
    \ 结合 Kinect 做的一切，已超出本书范围。但如果你认为 Processing 可能是你的首选工具，开放网络上还有一些优秀的资源。其中之一是 `SimpleOpenNI`，它是\
    \ PrimeSense 的 OpenNI 框架的 Processing 封装（详见第 6 章）。`SimpleOpenNI` 在 Processing 中暴露了所有函数调用和机器视觉技巧，使得构建复杂的、基于手势的界面成为可能。\n\
    \n但是，不要只把 Processing 作为 Kinect 破解工具箱中的唯一工具就合上这本书。外面世界更广阔。根据你想构建或实现的目标，其他语言或工具可能更适合你。在下一章中，我们将考察支持\
    \ Kinect 破解的编程环境和框架的现状，并尝试展示不同领域的黑客、艺术家、研究人员和远见卓识者，是如何在该设备发布后不到一年之内，就用它们创造出了琳琅满目的\
    \ Kinect 混合体。\n\n## 第 5 章：面向创作者的 Kinect\n\n如果你关注过围绕 Kinect 发布而涌现的黑客活动热潮，你会注意到许多应用程序看起来与\
    \ XBox 上的《Kinect 冒险》完全不同。有了这一革命性设备，各行各业的创意人士构想出了他们自己的新颖用例：虚拟木偶、3D 扫描和打印工作流、手术室图像助手、能看能跟随人的机器人、手势控制的气垫船、简洁的动作捕捉绝地武士动画等等。如此多样化的应用集是如何成为可能的？\n\
    \n答案在于 Kinect 对创意人士的可及性：创作者在自己更专业的领域（无论是视觉艺术、表演艺术、机器人技术还是其他领域）所使用的可用软件和开发平台的组合。以下并非这些工具的完整列表，而是一些较为流行且可能有用工具的选择性清单，以及如何使用它们入门\
    \ Kinect 的概述。这些工具包括免费开源和专有商业产品，其学习曲线各不相同。如上一章所述，如果你编程新手但想学习，并且你梦想中的应用程序需要 2D 或简单\
    \ 3D 动画、跨平台支持以及一些视听和网络工具，那么 Processing 很可能是合适的工具。在后面的章节中，我们将深入研究用于构建丰富手势界面和 3D\
    \ 游戏（你在 XBox 上看到的或将要看到的那种）的更深入、更专业的 SDK（软件开发工具包）和开发平台。在本章中，我们考察的是庞大的 Kinect 破解工具库中另一个不同的角落：创意编码人员（和非编码人员）用来构建各种项目（从\
    \ Kinect 控制的乐器到全动作控制的 Web 应用程序）的工具。其目的是向读者你展示当前可用的、能够实现你愿景的工具的广度，无论这愿景是什么。\n\n\
    ![图片](img/square.jpg) **注意** 本书后续章节将讨论其他框架和平台，例如 Beckon、Unity、OpenNI 和 NITE。这些其他框架和平台本质上更具通用性，有时需要深厚的编程专业知识。本章描述的平台则专门针对创意和艺术社区。\n\
    \n### MaxMSP\n\nMaxMSP 比 Adobe Flash 这类主流软件更为小众，但它为某些 Kinect 应用量身定制，例如那些将 Kinect\
    \ 作为输入来控制声音或舞台灯光的应用。此外，如果你是一个高度视觉化的人，或者只是非常厌恶编码，你会想看看 MaxMSP。\n\nMaxMSP 是收费软件。如果你预算有限或者更喜欢免费软件，可以看看\
    \ MaxMSP 的免费开源竞争对手 PureData (PD)。你可以在 `http://puredata.info/` 了解更多关于 PureData\
    \ 的信息。\n"
- fmt: '#### Patcher Programming Languages


    MaxMSP and PD are sometimes called “patcher” programming languages because they
    let you patch together a bunch of pre-defined, graphical audio and video objects
    (including hardware), connecting and combining those objects with virtual patchcords
    and building your entire application without writing a line of code (though you
    can get under the hood and code if you want to).


    That is *not* to say, however, that using a patcher language is necessarily any
    easier than writing code—you still have to understand the architecture of what
    you’re trying to program. In fact, an argument can be made that patcher languages
    enforce good programming practice by forcing you to break down an application
    into so many discrete but connected parts. There is no doubt that for certain
    people and certain applications, patching is the way to go.


    `MaxMSP` is a proprietary software, and a license will set you back about $400
    (though significantly less for students), but as of this writing, there is better,
    more widely available support for using `MaxMSP` with `Kinect` than there is for
    `PD`.


    #### What MaxMSP Can Do for You


    `MaxMSP` is sometimes called just `Max` or `Max/MSP/Jitter` to denote all three
    components of the interactive programming environment from San Francisco–based
    Cycling ’74. Despite shortening the name to `MaxMSP` for convenience, we shouldn’t
    forget about `Jitter`! `Jitter` is the piece of the puzzle used for working with
    “matrices,” a generic term for multidimensional data structures that include images
    and video (and therefore `Kinect` data). Like `Processing`, the whole `MaxMSP`
    package was created to support artists, educators, and researchers working intensively
    with audio-visual media and physical computing.


    Digital artist Liubo Borissov’s “hackiscan” was created using `MaxMSP` and a `Kinect`.
    [Figure 5-1](#Chapter05.html#fig_5_1) shows the output of the `hackiscan` art
    installation. And in [Figure 5-2](#Chapter05.html#fig_5_2), you can see how the
    application is set up inside the `MaxMSP` environment, which we’ll explore in
    more detail later on.


    ![images](images/0501.jpg)


    ***Figure 5-1.** Digital artist Liubo Borissov’s “hackiscan” ensures your privacy
    at the airport the old-fashioned way: with a fig leaf!*


    ![images](images/0502.jpg)


    ***Figure 5-2.** Borissov’s hackiscan project “under the hood” in the MaxMSP authoring
    environment—see the whole video online here: [http://vimeo.com/17480291](http://vimeo.com/17480291)*


    #### Getting Started: MaxMSP + Kinect


    The best available technique for getting `Kinect` data into `MaxMSP` comes from
    Jean-Marc Pelletier as part of the broader `OpenKinect` project. Hit up Jean-Marc’s
    GitHub repository for the latest code:


    `https://github.com/jmpelletier/jit.freenect.grab`


    Be sure to download the compiled “mex” and help files under Downloads>Download
    Packages on GitHub. Put the `/jit` folder somewhere special on your machine and
    launch the help file, i.e., the one with the extension `.maxhelp`. Now witness
    the plug-and-play magic of `MaxMSP`! [Figure 5-3](#Chapter05.html#fig_5_3) shows
    what you’ll see when you launch the help file.


    ![images](images/0503.jpg)


    ***Figure 5-3.** The `jit.freenect.grab.maxhelp` help file presents you with Kinect
    data streams and a bunch of parameters to tweak on them.*


    Check the “Use live camera input” box and click the “Open” button—you should see
    your `Kinect` data streaming in. This help interface lets you play with all kinds
    of variables: you can invert the coloration of the depthmap, for example, or tilt
    the `Kinect`’s motor, like we did using `RGBDemo`.


    ### Flash Actionscript


    For those of us who cut our programming teeth on Adobe’s (or way back when, Macromedia’s)
    `Flash Actionscript`—as many Web and interactive designers did during the last
    decade—it is glorious news, indeed, to learn that several developer communities
    are actively working on connecting the `Kinect` to `Flash`. As of this writing,
    however, using the `Kinect` from `Flash` is not an easy row to hoe.


    But wait, we keep hearing that `Flash` is dead, right? Why would we want to use
    it? It turns out that the rumors of `Flash`’s demise are greatly exaggerated.
    Yes, `HTML5` will replace some uses of `Flash` on the Web, such as for video.
    And yes, `Flash` is notoriously unsupported on Apple iOS devices because it enables
    the creation of rich, app-like interactive experiences right in the browser (which
    Apple can’t charge for, thus undermining the App Store). But the `Flash` authoring
    environment is a powerful and intuitive integrated development environment (`IDE`)
    that thousands of Web designers and developers already know well. `Flash`’s output,
    the `SWF` (pronounced “swiff”) or `Flash` movie, is a highly optimized, Web-ready
    and cross-platform medium for rich video, animation, and interaction that will,
    no doubt, live on in its own right for at least a few years to come.


    #### What Flash Can Do For You


    So why would you want to use `Flash` for your `Kinect` application? Well, if you’re
    going to be delivering it over the Web or using intensive 2D animation and interaction,
    or if you’re already a `Flash` ninja, `Flash` plus `Kinect` may be just the combination
    for you.


    Biltz Agency, a Los Angeles–based digital agency that produces cutting-edge media
    and marketing content for big brands, released a `Kinect`-to-`Flash` solution
    early in 2011 (more below) and demonstrated the proof-of-concept media browser
    shown in [Figure 5-4](#Chapter05.html#fig_5_4).


    ![images](images/0504.jpg)


    ***Figure 5-4.** A Kinected media browser built in Flash by Blitz, a digital agency*'
  raw: '#### Patcher Programming Languages


    MaxMSP and PD are sometimes called “patcher” programming languages because they
    let you patch together a bunch of pre-defined, graphical audio and video objects
    (including hardware), connecting and combining those objects with virtual patchcords
    and building your entire application without writing a line of code (though you
    can get under the hood and code if you want to).


    That is *not* to say, however, that using a patcher language is necessarily any
    easier than writing code—you still have to understand the architecture of what
    you’re trying to program. In fact, an argument can be made that patcher languages
    enforce good programming practice by forcing you to break down an application
    into so many discrete but connected parts. There is no doubt that for certain
    people and certain applications, patching is the way to go.


    MaxMSP is a proprietary software, and a license will set you back about $400 (though
    significantly less for students), but as of this writing, there is better, more
    widely available support for using MaxMSP with Kinect than there is for PD.


    #### What MaxMSP Can Do for You


    MaxMSP is sometimes called just Max or Max/MSP/Jitter to denote all three components
    of the interactive programming environment from San Francisco–based Cycling ’74\.
    Despite shortening the name to MaxMSP for convenience, we shouldn’t forget about
    Jitter! Jitter is the piece of the puzzle used for working with “matrices,” a
    generic term for multidimensional data structures that include images and video
    (and therefore Kinect data). Like Processing, the whole MaxMSP package was created
    to support artists, educators, and researchers working intensively with audio-visual
    media and physical computing.


    Digital artist Liubo Borissov’s “hackiscan” was created using MaxMSP and a Kinect.
    [Figure 5-1](#Chapter05.html#fig_5_1) shows the output of the hackiscan art installation.
    And in [Figure 5-2](#Chapter05.html#fig_5_2), you can see how the application
    is set up inside the MaxMSP environment, which we’ll explore in more detail later
    on.


    ![images](images/0501.jpg)


    ***Figure 5-1.** Digital artist Liubo Borissov’s “hackiscan” ensures your privacy
    at the airport the old-fashioned way:  with a fig leaf!*


    ![images](images/0502.jpg)


    ***Figure 5-2.** Borissov’s hackiscan project “under the hood” in the MaxMSP authoring
    environment—see the whole video online here: [http://vimeo.com/17480291](http://vimeo.com/17480291)*


    #### Getting Started: MaxMSP + Kinect


    The best available technique for getting Kinect data into MaxMSP comes from Jean-Marc
    Pelletier as part of the broader OpenKinect project. Hit up Jean-Marc’s GitHub
    repository for the latest code:


    `https://github.com/jmpelletier/jit.freenect.grab`


    Be sure to download the compiled “mex” and help files under Downloads>Download
    Packages on GitHub. Put the /jit folder somewhere special on your machine and
    launch the help file, i.e., the one with the extension .maxhelp. Now witness the
    plug-and-play magic of MaxMSP! [Figure 5-3](#Chapter05.html#fig_5_3) shows what
    you’ll see when you launch the help file.


    ![images](images/0503.jpg)


    ***Figure 5-3.** The jit.freenect.grab.maxhelp help file presents you with Kinect
    data streams and a bunch of parameters to tweak on them.*


    Check the “Use live camera input” box and click the “Open” button—you should see
    your Kinect data streaming in. This help interface lets you play with all kinds
    of variables: you can invert the coloration of the depthmap, for example, or tilt
    the Kinect’s motor, like we did using RGBDemo.


    ### Flash Actionscript


    For those of us who cut our programming teeth on Adobe’s (or way back when, Macromedia’s)
    Flash Actionscript—as many Web and interactive designers did during the last decade—it
    is glorious news, indeed, to learn that several developer communities are actively
    working on connecting the Kinect to Flash. As of this writing, however, using
    the Kinect from Flash is not an easy row to hoe.


    But wait, we keep hearing that Flash is dead, right? Why would we want to use
    it? It turns out that the rumors of Flash’s demise are greatly exaggerated. Yes,
    HTML5 will replace some uses of Flash on the Web, such as for video. And yes,
    Flash is notoriously unsupported on Apple iOS devices because it enables the creation
    of rich, app-like interactive experiences right in the browser (which Apple can’t
    charge for, thus undermining the App Store). But the Flash authoring environment
    is a powerful and intuitive integrated development environment (IDE) that thousands
    of Web designers and developers already know well. Flash’s output, the SWF (pronounced
    “swiff”) or Flash movie, is a highly optimized, Web-ready and cross-platform medium
    for rich video, animation, and interaction that will, no doubt, live on in its
    own right for at least a few years to come.


    #### What Flash Can Do For You


    So why would you want to use Flash for your Kinect application? Well, if you’re
    going to be delivering it over the Web or using intensive 2D animation and interaction,
    or if you’re already a Flash ninja, Flash plus Kinect may be just the combination
    for you.


    Biltz Agency, a Los Angeles–based digital agency that produces cutting-edge media
    and marketing content for big brands, released a Kinect-to-Flash solution early
    in 2011 (more below) and demonstrated the proof-of-concept media browser shown
    in [Figure 5-4](#Chapter05.html#fig_5_4).


    ![images](images/0504.jpg)


    ***Figure 5-4.** A Kinected media browser built in Flash by Blitz, a digital agency*'
