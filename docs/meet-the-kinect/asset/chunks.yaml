- fmt: '# Applications in the Wild


    In this chapter, we’ll take a look at some applications built by developers in
    the PC Kinect app scene’s first year that demonstrate the functionality you can
    take advantage of in your own programs. As you install the applications on your
    own computer, consider how the developers have leveraged the capabilities of the
    Kinect to create a unique experience in their applications. In later chapters,
    it will be your turn to design an application, so use this chapter for inspiration.


    Control news and other realtime information from the Web with a wave of your hand
    using `SenseCast`. Practice your super powers as Ultra Seven or Kamehameha transforms
    your body movements into laser beams and exploding light. Freak yourself and your
    friends out as you adjust the “puffiness” of the world around you with the clever
    `Body Dysmorphia Toy`. Finally, discover the wonders of volumetric photography
    as an art form with `MatterPort`, an application that lets you scan the physical
    world to produce 3-D photographic models of objects and environments.


    ## Other Sources for Kinect Applications


    When people first began sharing their experiments with the Kinect, replication
    on your own computer wasn’t easy. Many developers posted videos of their work
    to YouTube that were picked up by sites such as `KinectHacks.net` and `kinecthacks.com`.
    These videos teased us all with the notion of what was possible.


    OpenNI’s Arena at `http://arena.openni.org` is a great place to look for inspiration
    and for programs to run on your computer. Currently, there are over 50 applications
    at the Arena. `Zigfu.com` takes the idea even further with a portal that lets
    you download its app store and then install and navigate new motion controlled
    apps that don’t require you to touch a mouse or keyboard.


    ### SenseCast: Minority Report Meets the Web


    `Sensecast` is a program that was created to help designers and content creators
    easily wrap text, images, videos, RSS feeds, Twitter streams, and other Web-based
    media in a motion-controlled interface. Combined with an online service to manage
    the media you publish to your displays, `Sensecast` aims to be a complete authoring
    and publishing platform for motion-controlled content.


    `Sensecast` is ideal for Web-like content such as photo slideshows and news feeds.
    The free `Sensecast` client software (which you download to your computer) pulls
    media from the Web and/or your local machine and arranges it in a series of menus
    and pages that you can then navigate with hand swipes and hovers. Just plug in
    your Kinect, download and launch the client, and voila! You’re flicking text and
    images around the screen like it’s 2054, as shown in Figure 3-1.


    ![images](images/0301.jpg)


    ***Figure 3-1.** Creator Jonathan C. Hall demos Sensecast’s Kinect-aided motion
    controls.*


    Created by one of our co-authors, Jonathan Hall, `Sensecast` aims to lower the
    barriers to entry for companies that want to put interesting content, rather than
    just signage and advertising, on public and quasi-public screens. We walk you
    through using the free client software in this chapter. However, `Sensecast` also
    offers a commercial version that integrates with social media channels, provides
    content performance metrics, etc. Of course, there’s nothing to stop you from
    setting up `Sensecast` to run a Kinect-enabled display anywhere your heart desires,
    even in your own home. Want to flip through recipes for inspiration while kneading
    pizza dough in the kitchen? How about setting up a touch-free, germ-free bulletin
    and message board at your local school or community center? Or maybe you just
    want to build the coolest motion-controlled multimedia doorbell in your neighborhood.
    `Sensecast` can help.


    In this exercise, we’ll simply download and run the free client software available
    for Mac. More information is available online for those who want to tweak our
    Kinected display. Note that the `Sensecast` client can be configured to download
    assets from the Web or we can supply content manually for the display. Supplying
    your own content allows you to run `Sensecast` as a standalone without an Internet
    connection or content management system (CMS). The look and feel of the display
    is also completely customizable: you just have to edit the markup in the included
    `presentation.xml` file and add any of your own creative assets, such as fonts,
    images and sounds. In fact, there’s a lot we can do with this little package.
    For those who want to explore beyond the simple content browser application presented
    in this section, there’s an expanding library of tips and tricks available online.


    #### Step 1: Download the Client


    The first thing you’ll want to do is find and download the latest build of the
    `Sensecast` client software for Mac by going to `http://sensecast.com/downloads`.


    Download the `Sensecast` disk image file (`.DMG`) and double-click to mount if
    it does not mount automatically. You should see an install window something like
    the one in Figure 3-2.


    ![images](images/0302.jpg)


    ***Figure 3-2.** Sensecast installer window*


    #### Step 2: Install the Dependencies


    Next, you’ll need to run the installer to set up the correct builds of `Sensecast`,
    `OpenNI`, `NITE`, and the device driver for your Kinect (or similar sensor). Double-click
    the installer, agree to the terms (if you want) and follow the instructions of
    the install process. The installer will ask you where you want to store `Sensecast`’s
    data as shown in Figure 3-3. This is where all the program will look for settings
    and assets. By default, it creates a `Sensecast` folder in your Documents folder.


    ![images](images/0303.jpg)


    ***Figure 3-3.** Sensecast installer dialog*


    In the final steps of the install process, you should probably reject the Advanced
    Option to run `Sensecast` on startup (which is intended for deployed `Sensecast`
    installations) and then select the sensor you want to setup, as shown in Figure
    3-4.


    ![images](images/0304.jpg)


    ***Figure 3-4.** Sensecast installer dialog final steps*


    When the installer completes, go ahead and quit out of it. Now, as with the other
    Mac applications, `Sensecast` has placed an application icon in your Applications
    folder. Find it, plug in your Kinect and double click when ready!


    #### Step 3: Launch Sensecast


    Launch `Sensecast` to see how the application runs out of the box. A motion-controlled
    image and news browser will appear, as shown in Figure 3-5. Now, your whole screen
    is filled with Kinected-content joy!


    ![images](images/0305.jpg)


    ***Figure 3-5.** The Sensecast app that ships with the software*


    #### Step 4: Rock Out!


    By default, `Sensecast` uses only the hand-tracking machinery of `OpenNI`/`NITE`
    for navigation and requires a “focus gesture” before it will start tracking your
    hand. If you’re standing in front of the display and you move around a little
    bit, you will be prompted to “Wave your hand back and forth to take control of
    the screen.” Go ahead and wave at the screen until you see the hand cursor appear
    and the feedback image indicate that it’s now tracking your hand. Now, as the
    Xbox folks say, you are the controller!


    Take a minute to explore the `Sensecast` demo. Find the hover controls and the
    swipe controls by roaming the interface with the hand cursor. Browse the dummy
    content. This demo shows you the basic set of elements and interactions that you
    can use to make your own content similarly navigable by hand-waving magic. If
    this kind of thing floats your boat, you can check out `http://sensecast.org`
    to learn how to customize `Sensecast` and to see more examples.'
