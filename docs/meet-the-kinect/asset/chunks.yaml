- fmt: "###### DirectX Runtime and SDK\n\nMicrosoft's DirectX software consists of\
    \ a number of libraries largely used to handle media and graphics functions necessary\
    \ for creating games. The Sample Shape Game that ships with the Kinect SDK (below),\
    \ for example, uses DirectX.\n\nMicrosoft DirectX SDK (June 2010 or later version):\n\
    \n`http://www.microsoft.com/download/en/details.aspx?id=6812`\n\nAnd the current\
    \ DirectX end-user runtime:\n\n`http://www.microsoft.com/download/en/details.aspx?id=35`\n\
    \n###### Microsoft's Speech Platform\n\nAgain, these components are optional.\
    \ However, they do differentiate Microsoft's offering for Kinect developers from\
    \ the other packages described in this book. If you plan on integrating speech\
    \ recognition in your app or just want to play around with this feature of the\
    \ Sample Shape Game, download these packages and run the installers. Note that\
    \ even if you are on a 64-bit machine, you must download the x86 (32-bit) edition\
    \ of the Speech Platform software. The 64-bit version will not work:\n\n> Microsoft\
    \ Speech Platform SDK, version 10.2 (x86 edition)\n> [`http://www.microsoft.com/download/en/details.aspx?id=14373`](http://www.microsoft.com/download/en/details.aspx?id=14373)\n\
    > \n> Microsoft Speech Platform Runtime, version 10.2 (x86 edition)\n> [`http://www.microsoft.com/download/en/details.aspx?id=10208`](http://www.microsoft.com/download/en/details.aspx?id=10208)\n\
    > \n> Microsoft Kinect Speech Platform (US English version)\n> [`http://go.microsoft.com/fwlink/?LinkId=220942`](http://go.microsoft.com/fwlink/?LinkId=220942)\n\
    \n###### The Kinect SDK and Coding4Fun Kinect Toolkit\n\nFinally, the Kinect stuff!\
    \ Browse to the Kinect SDK landing page (below) and click Download. Here you need\
    \ to choose the 32- or 64-bit version depending on your operating system as described\
    \ under \"System\" above. The URL for the Kinect SDK landing page is:\n\n`http://research.microsoft.com/kinectsdk/`\n\
    \nRun the installer. When it is finished, you're ready to launch Visual Studio\
    \ (in our case, Visual C# Express) and start using the Kinect SDK.\n\nHowever,\
    \ there's one final optional piece of software that you probably want to download.\
    \ The Coding4Fun Kinect Toolkit wraps some typical tasks we do with Kinect data\
    \ into simpler function calls—such as converting raw data into a bitmapped image—making\
    \ the code you have to write simpler and cleaner. This library is used in some\
    \ of the samples included with the SDK and is a recommended addition to your setup.\
    \ You can download the library here:\n\n`http://c4fkinect.codeplex.com/`\n\nChoose\
    \ the zipped current release, download it, and extract it. There's no installer\
    \ program for the Coding4Fun library. Instead, we have to add a reference to it\
    \ in each project in which we want to use the library. This is a task to do inside\
    \ Visual Studio, our development environment, when setting up a new Kinect project,\
    \ as detailed below. For now, just stash the downloaded, unarchived library wherever\
    \ you want to keep it, such as inside the Visual Studio 2010 folder that should\
    \ now appear in your Documents folder.\n\n##### Running and Troubleshooting the\
    \ Samples\n\nBefore we try to build our own code, we should try running the two\
    \ compiled samples included with the SDK to make sure everything's working as\
    \ expected. You should see that the SDK is installed by looking for it under Programs\
    \ in the Start menu. There are two compiled sample applications now under Programs\
    \ ![images](images/U001.jpg) Kinect for Windows SDK ![images](images/U001.jpg)\
    \ Sample Skeletal Viewer and Programs ![images](images/U001.jpg) Kinect for Windows\
    \ SDK ![images](images/U001.jpg) Sample Shape Game in the Start menu. Let's launch\
    \ the Sample Skeletal Viewer. You should see results similar to those in [Figure\
    \ 8-2](#Chapter08.html#fig_8_2).\n\n![images](images/0802.jpg)\n\n*Figure 8-2.\
    \ The working Sample Skeletal Viewer program included with the Kinect SDK*\n\n\
    If you get an alert like \"NuiInitalize Failed\" or see the window in [Figure\
    \ 8-3](#Chapter08.html#fig_8_3), something is amiss:\n\n![images](images/0803.jpg)\n\
    \n*Figure 8-3. The Sample Skeletal Viewer program failing*\n\nIn that case, it's\
    \ time to troubleshoot. As always, make sure the Kinect is plugged into your PC\
    \ and the power cord is connected to a wall socket. If you have many USB devices\
    \ or use a USB hub, you're going to have to make room for the Kinect: Either plug\
    \ it directly into one of the ports on the PC itself, or if it must be on a hub,\
    \ make sure the Kinect is not sharing the hub with any other high-throughput USB\
    \ devices.\n\nAnother potential source of trouble is the drivers. If you installed\
    \ third-party device drivers for the Kinect to run any of the other packages or\
    \ examples in this book, the new ones included with the Kinect SDK should supersede\
    \ the third-party drivers. However, if there is a conflict, you may need to uninstall\
    \ the other drivers in the Device Manager (see below).\n\nWhen the Kinect is connected\
    \ the first time after the SDK has been installed, Windows automagically installs\
    \ drivers for the various hardware components, which are now identified as the\
    \ Microsoft Kinect Device, Microsoft Kinect Camera, and Microsoft Kinect Audio\
    \ Array Control. If you take a look at the Device Manager, you should find these\
    \ three components under a Microsoft Kinect list item. If, however, you still\
    \ see Xbox NUI Motor, XBox NUI Camera, and XBox NUI Audio under the generic Human\
    \ Interface Components list item, you will want to right-click each one and select\
    \ Uninstall.\n\nFinally, you may also need to uninstall and reinstall the Kinect\
    \ SDK and drivers after making these changes. Once you see Microsoft Kinect and\
    \ its three components here in the Device Manager, you should be golden. But if\
    \ you're still not, you will need to check out the forums online to troubleshoot\
    \ your particular issue.\n\n##### Setting Up New Kinect Projects\n\nIf you're\
    \ new to Windows development, you may want to bookmark this section as you'll\
    \ have to perform the steps we cover here every time you set up a new project\
    \ in Visual C# Express in which you want to use the Kinect SDK.\n\nBasically,\
    \ the process is this:\n\n1.  Create a new Windows Presentation Foundation (WPF)\
    \ project.\n2.  Add references to the Kinect SDK and the Coding4Fun Kinect library.\n\
    3.  Add `using` statements to tell our code what libraries we're using.\n4.  Create\
    \ standard Loaded and Closed events in our application to initialize and uninitialize\
    \ the resources that Visual Studio uses when running a Kinect application.\n\n\
    Similar steps are also covered in a Quickstart video series on the Microsoft Research\
    \ site.\n\n###### Step 1: Create a New Project\n\nTo create a new WPF project\
    \ in Visual C# Express, just launch the application and choose File ![images](images/U001.jpg)\
    \ New Project… or New Project… from the home screen. In the dialog window that\
    \ opens, choose WPF Application, as shown in [Figure 8-4](#Chapter08.html#fig_8_4).\n\
    \n![images](images/0804.jpg)\n\n*Figure 8-4. The New Project dialog window in\
    \ Visual C# Express*\n\nWindows Presentation Foundation is simply the system Windows\
    \ uses to organize and link user interface elements in Windows applications. XML\
    \ (or XAML) files are at the heart of WPF—you'll see one called `MainWindow.Xaml`\
    \ when your new project is created.\n\n###### Step 3: Add `Using` Statements\n\
    \nAt long last, we're ready to code! You're going to want to switch from editing\
    \ the XAML file to editing the C# (\"C-Sharp\") file called `MainWindow.xaml.cs`.\
    \ Do this by clicking the tab `MainWindow.xaml.cs` in the main area of the project.\
    \ You should see the code shown in [Figure 8-8](#Chapter08.html#fig_8_8).\n\n\
    ![images](images/0808.jpg)\n\n*Figure 8-8. The C# code in `MainWindow.xaml.cs`*\n\
    \nYou'll see `using` statements already in place. Place your cursor after the\
    \ last one, make a new line, and type:\n\n```\nusing Microsoft.Research.Kinect.Nui;\n\
    using Microsoft.Research.Kinect.Audio;\nusing Coding4Fun.Kinect.Wpf;\n```\n\n\
    Done and done. (Don't type that, though!)"
