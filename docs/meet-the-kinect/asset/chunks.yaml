    And changing the image type in the `DepthStream.Open()` like so:


    `kinect.DepthStream.Open(ImageStreamType.Depth, 2, ImageResolution.Resolution320x240,`

    `ImageType.DepthAndPlayerIndex);`


    And we can get something like the image in [Figure 8-14](#Chapter08.html#fig_8_14),
    where the “player” is now segmented in the scene and given a color overlay.


