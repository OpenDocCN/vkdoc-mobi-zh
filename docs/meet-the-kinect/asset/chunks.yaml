- fmt: '# Application Development with the Beckon Framework


    Up until this point, we have covered open source platforms that work with Kinect.
    In addition to these tools, other advanced commercial frameworks are available
    to explore. These suites can provide additional tools, applications, and functionality.
    One exciting platform is Omek Interactive’s Beckon Development Suite. Omek’s Beckon
    SDK performs skeleton tracking, gesture recognition, and blob tracking, and it
    also comes with a suite of tools for recording custom gestures with the Kinect
    and many of the other 3D sensor cameras currently available. These new gestures
    can then be used in any application created with the Beckon SDK. For example,
    if you want to make a painting program, you can design gestures specific to your
    application. In this chapter, we’ll go through the basic Flash example included
    with Beckon, we’ll create a simple skeleton, and then we’ll train our own gesture.
    We will then integrate both the skeleton and trained gesture into a basic application.
    Using Flash with Beckon creates a standalone application rather than a browser
    compatible `.swf` file. We will cover the use of Beckon with Flash because of
    Flash’s capability for rapid prototyping of environments. As we go along, we’ll
    also discuss basic UX design strategies for gesture interfaces.


    ![images](images/square.jpg) **Note** The `.swf` files are compiled Flash files.
    They originally were referred to as “Shockwave Flash Files”, but are today commonly
    referred to only by their extension `.swf`. The type of application you get using
    Beckon with Flash is a stand-alone Flash application of the type stored in a `.fla`
    file.


    ## What is Beckon?


    Omek Interactive, a breakthrough company based in Israel, created Beckon. Their
    aim was to transform the way people interact with their devices and applications,
    by providing tools and technology that enable manufacturers and software developers
    to add gesture-based interfaces to their products. Beckon is perhaps the most
    robust SDK covered in this book. Beckon is part middleware and part toolbox. Middleware
    is a piece of software that sits between one application or hardware device and
    another one. Up until this point in the book, you’ve been using either OpenNI
    and NITE or the Microsoft SDK to extrapolate and analyze the data coming in from
    your Kinect. Beckon is unique in that it supports nearly all of the depth cameras
    on the market (and has plans to support future cameras). By leveraging a proprietary
    machine learning environment, Beckon allows developers and designers to create
    completely customized interactive applications and immersed environments in Adobe
    Flash CS 5.5, C++ or C#, as well as plug-ins for the `.NET` framework and the
    Unity and OGRE game engines. It is fully compatible with any game engine and natively
    supports the industry-standard FBX animation format for blending pre-generated
    3D content with real-time tracking.


    The Beckon API provides what it refers to as “scene intelligence” at the blob,
    skeleton, or gesture level. The Basic and GUI Gesture Packs provide predefined,
    ready-to-use gestures for different contexts (UI control, game control, etc.).
    Developers can easily integrate these Gesture Packs into their applications.


    Designers can also record completely original gestures, or gesture combinations,
    for their applications using the applications that come with Beckon. The Gesture
    Authoring Toolkit is a suite of tools that allows both designers and developers
    to define and manage their own gestures, and even to create new gestures without
    writing code. Gestures can be very intuitive and combined together. In music creation
    software, a gesture for a musician to loop a track might be drawing a circle in
    space. With a first person martial arts game, perhaps a jump and a dodge are the
    right moves for a player to escape a punch from an opponent.


    Beckon’s machine learning environment can learn from many different samples of
    the same gesture. Creating a gesture is a process of performing and recording
    it in front of the camera several times. This process is referred to as training
    the machine learning environment. Machine learning is a branch of Artificial Intelligence
    and is nothing to be afraid of. Simply put, the computer learns through recorded
    gestures and gets better at recognizing the gesture with each new sample. Beckon
    allows designers and developers to get highly accurate recognition, even across
    diverse populations. For example, the way that a 12 year old boy and a 30 year
    old woman will look making the same gesture is quite different. Beckon allows
    your program to identify both users with ease. While Beckon is a great tool over
    all, it’s this feature that sets it a head above other technology specialized
    for Kinect.


    Kinect, like any other sensor, requires the installation of a separate device
    driver built by the community. Currently, the most popular solution is the SensorKinect,
    an open source project based on the PrimeSensor device driver. It’s important
    to understand that the SensorKinect drivers cannot co-exist with the standard
    PrimeSensor drivers on the same PC, because the SensorKinect drivers were designed
    to make the Kinect sensor appear as a standard PrimeSensor device. For this reason,
    we’d recommend adding a new OS onto a blank partition on your hard drive and booting
    from there so that you can switch back to other SDKs later. For this chapter,
    we will be using Windows 7; however, XP also works. Because of the need to uninstall
    your drivers, you might want to read this chapter first to decide if Beckon suits
    your needs.'
