- fmt: "### The Example Code\n\nNow, let's look at the code for Beckon's Flash example.\
    \ To look at the code, open the Actions panel and look at the Actionscript on\
    \ the first frame of the timeline.\n\n![images](images/square.jpg) **Note** Choose\
    \ Windows > Actions from the menu to view the actions panel.\n\nYou should see\
    \ an `import` at the top of the code. You are going to want to import the following\
    \ class in every Flash application you create using the Beckon SDK:\n\n```\n \
    \ import flash.external.ExternalInterface;\n```\n\nNext up is the `ExternalInterface`\
    \ code that exposes specified functions to the `swf` file. Step one is always\
    \ to expose the function to the Flash runtime environment. Step two is optional,\
    \ and sends messages to set up the functionality from the `ExternalInterface.call`\
    \ method. The last step then is to setup the exposed function.\n\nAdmittedly,\
    \ this process of exposing functions feels like a hack. Without a doubt, it would\
    \ be best if Omek would build a version the Beckon SDK as a Flash library so it\
    \ could be released easily online, or distributed to other people with a Kinect.\
    \ For now, you are locked into the one system on which you have running your specific\
    \ copy of Beckon. Hopefully, this situation will change with future releases of\
    \ the Beckon SDK.\n\nThree of the `ExternalInterface.callback()` methods in the\
    \ action script are mandatory and must be implemented in every file planning to\
    \ use Beckon. Each integrates some basic functionally. We will review these three\
    \ mandatory methods and the functions they expose. Others are optional, but the\
    \ three we cover in this chapter are mandatory.\n\nWe cover the three methods\
    \ out of the order that they are used in the ActionScript file. We cover them\
    \ in the order that we do because this allows us to explain the code more clearly.\
    \ We'll refer to the ActionScript code by line number to make the discussion as\
    \ easy to follow as we can.\n\nLine 8 takes care of handling gestures by exposing\
    \ the function `onOmekGesture` in the Flash runtime.\n\n```\nExternalInterface.addCallback(\"\
    OmekGesture\", onOmekGesture);\n```\n\nThe next method to look at is on line 56.\
    \ This method lets the SDK know to register the `leftPush` gesture. This gesture\
    \ is a gesture included in the SDK. Each gesture that a user wants to detect must\
    \ be listed here, including custom gestures.\n\n```\n        ExternalInterface.call(\"\
    OmekAddGesture\",\"leftPush\");\n```\n\nNow, review the exposed function `onOmekGesture`\
    \ on line 106.\n\n```\nfunction onOmekGesture(gestureName:String, playerLabel:String):void\n\
    {\n        debugString_txt.appendText(\"\\nOmekGesture: \" + gestureName + \"\
    :\" + playerLabel);\n}\n```\n\nThis function can receive two strings from the\
    \ SDK. The first is the name of the gesture received and the next is the label\
    \ of the player. Beckon can track multiple players and easily switch between them.\
    \ It supports up to 5 players. It can also track an unlimited number of what it\
    \ refers to as candidates, or possible players.\n\n### Skeleton Data\n\nNext,\
    \ let's look at how to handle getting skeleton data into Flash. Line 9 exposes\
    \ the function `onOmekJointPosition`:\n\n```\nExternalInterface.addCallback(\"\
    OmekJointPosition\", onOmekJointPosition);\n```\n\nYou must list every joint you\
    \ would like to receive, but not in the Flash file. Open the `Config.html` file.\
    \ This file is located in this folder: `C:\\MyProject\\Flash`. Open the file and\
    \ take note of the `<tracking>` tag. Its contents should appear as follows:\n\n\
    ```\n<tracking>\n                <skeleton rawSkeleton=\"true\"/>\n          \
    \      <joint name=\"rightFingerTip\" screen=\"false\" smooth=\"true\"/>\n   \
    \             <joint name=\"leftFingerTip\" screen=\"false\" smooth=\"true\"/>\n\
    \                <joint name=\"torso\" screen=\"false\" smooth=\"true\"/>\n</tracking>\n\
    ```\n\nThis `<tracking>` tag registers all of the joints to be tracked. You *must*\
    \ list each joint that you want to track. In this example, only the left and right\
    \ fingertips and the torso are tracked. Since this tag sets up the joints ahead\
    \ of time in this xml file, there's no need to use `.call` to send messages to\
    \ the SDK.\n\n### Joint Positions\n\nNow let's look at the `onOmekJointPosition`\
    \ function. It receives a joint's name, the `playerLabel` associated with the\
    \ joint, and the X,Y,Z position of the joint in space. Here's the code from the\
    \ example:\n\n```\nfunction onOmekJointPosition(jointName:String, playerLabel:String,\
    \ jointX:String, jointY:String, jointZ:String, confidence:String):void\n{\n//give\
    \ control on mouses to one specific player.\nif(playerLabel == \"0\")\n{\n  if(jointName\
    \ == \"leftFingerTip\")\n  {\n  //mirror X value in order to make the mouse move\
    \ left and right like the hand.\n  leftFingerTip_mc.x = stage.stageWidth - Number(jointX)\
    \ * _screenScaleX + correctionX;\n  leftFingerTip_mc.y = Number(jointY) * _screenScaleY\
    \ + _correctionY;\n\n  //debugString_txt.appendText(\"\\nleftFingerTip_mc located\
    \ at:\n  //(\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
    )\");\n  }\n  if(jointName == \"rightFingerTip\")\n  {\n  rightFingerTip_mc.x\
    \ = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;\n  rightFingerTip_mc.y\
    \ = Number(jointY) * _screenScaleY + _correctionY;\n  }\n  }\n}\n```\n\nThis function\
    \ gives player 0 control and attaches to the circle graphic movie clips, `leftFingerTip_mc`\
    \ and `rightFingerTip_mc`, to the longest finger point of each hand. This function\
    \ also prints the location of these joints to the `debugString_txt` box on the\
    \ stage.\n\nBeckon can track multiple players and it assigns each player a number.\
    \ The first player is player 0.\n\n### Alerts\n\nThe last mandatory functionality\
    \ is to handle Alerts. On line 10, notice the `onOmekAlert` function is exposed\
    \ to the Flash runtime environment:\n\n```\nExternalInterface.addCallback(\"OmekAlert\"\
    , onOmekAlert);\n```\n\nEach alert that you want to listen for must also be sent\
    \ to the SDK with a `.call` method. On lines 62-79 a partial list of the alert\
    \ listeners that are available are sent to the SDK with each corresponding message\
    \ to listen for, starting with the following line:\n\n```\nExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_CalibrationDone\");\n```\n\nLet's look at the exposed `onOmekAlert`\
    \ function now and see what it does:\n\n```\nfunction onOmekAlert(alertName:String,\
    \ playerLabel:String):void\n{\ndebugString_txt.appendText(\"\\nOmekAlert: \" +\
    \ alertName + \":\" + playerLabel);\n\nif (alertName ==\"Alert_CalibrationDone\"\
    ){\n//only after Alert_CalibrationDone the OmekGetBodyDimensions will return the\
    \ correct values\n  ExternalInterface.call(\"OmekGetBodyDimensions\",\"0\");\n\
    \  //ask for the body compensation of a specific player. return a value to ExternalInterface.addCallback(\"\
    OmekGetCompensationData\", onOmekGetCompensationData);\n  ExternalInterface.call(\"\
    OmekGetCompensationData\",\"0\");\n} else if (alertName == \"Alert_CalibrationBegun\"\
    ){\n  ExternalInterface.call(\"OmekGetBodyDimensions\",\"0\");\n  //ask for the\
    \ body compensation of a specific player. return a value to  \n  //ExternalInterface.addCallback(\"\
    OmekGetCompensationData\", onOmekGetCompensationData);\n  ExternalInterface.call(\"\
    OmekGetCompensationData\",\"0\");\n}\n```\n\nThis function handles a few alerts.\
    \ For each one, it just prints copy to the `debugString_txt` field. Nothing fancy\
    \ happens here. A handy use for this function in the future would be to display\
    \ player warnings on screen."
  raw: '#### The Example Code


    Now, let’s look at the code for Beckon’s Flash example. To look at the code, open
    the Actions panel and look at the Actionscript on the first frame of the timeline.


    ![images](images/square.jpg) **Note** Choose Windows > Actions from the menu to
    view the actions panel.


    You should see an import at the top of the code. You are going to want to import
    the following class in every Flash application you create using the Beckon SDK:


    `  import flash.external.ExternalInterface;`


    Next up is the ExternalInterface code that exposes specified functions to the
    swf file. Step one is always to expose the function to the Flash runtime environment.
    Step two is optional, and sends messages to set up the functionality from the
    `ExternalInterface.call` method. The last step then is to setup the exposed function.


    Admittedly, this process of exposing functions feels like a hack. Without a doubt,
    it would be best if Omek would build a version the Beckon sdk as a flash library
    so it could be released easily online, or distributed to other people with a Kinect.
    For now, you are locked into the one system on which you have running your specific
    copy of Beckon. Hopefully, this situation will change with future releases of
    the Beckon sdk.


    Three of the `ExternalInterface.callback()` methods in the action script are mandatory
    and must be implemented in every file planning to use Beckon. Each integrates
    some basic functionally. We will review these three mandatory methods and the
    functions they expose. Others are optional, but the three we cover in this chapter
    are mandatory.


    We cover the three methods out of the order that they are used in the ActionScript
    file. We cover them in the order that we do because this allows us to explain
    the code more clearly. We’ll refer to the ActionScript code by line number to
    make the discussion as easy to follow as we can.


    Line 8 takes care of handling gestures by exposing the function onOmekGesture
    in the flash runtime.


    `ExternalInterface.addCallback("OmekGesture", onOmekGesture);`


    The next method to look at is on line 56\. This method lets the sdk know to register
    the leftPush gesture. This gesture is a gesture included in the sdk. Each gesture
    that a user wants to detect must be listed here, including custom gestures.


    `        ExternalInterface.call("OmekAddGesture","leftPush");`


    Now, review the exposed function onOmekGesture on line 106.


    `function onOmekGesture(gestureName:String, playerLabel:String):void`

    `{`

    `        debugString_txt.appendText("\nOmekGesture: " + gestureName + ":" + playerLabel);`

    `}`


    This function can receive two strings from the SDK. The first is the name of the
    gesture received and the next is the label of the player. Beckon can track multiple
    players and easily switch between them. It supports up to 5 players. It can also
    track an unlimited number of what it refers to as candidates, or possible players.


    #### Skeleton Data


    Next, let’s look at how to handle getting skeleton data into flash. Line 9 exposes
    the function onOmekJointPosition:


    `ExternalInterface.addCallback("OmekJointPosition", onOmekJointPosition);`


    You must list every joint you would like to receive,  but not in the Flash file.
    Open the Config.html file. This file is located in this folder: `C:\MyProject\Flash`.
    Open the file and take note of the `<tracking>` tag. Its contents should appear
    as follows:


    `<tracking>`

    `                <skeleton rawSkeleton="true"/>`

    `                <joint name="rightFingerTip" screen="false" smooth="true"/>`

    `                <joint name="leftFingerTip" screen="false" smooth="true"/>`

    `                <joint name="torso" screen="false" smooth="true"/>`

    `</tracking>`


    This `<tracking>` tag registers all of the joints to be tracked. You *must* list
    each joint that you want to track. In this example, only the left and right fingertips
    and the torso are tracked. Since this tag sets up the joints ahead of time in
    this xml file, there’s no need to use .call to send messages to the SDK.


    #### Joint Positions


    Now let’s look at the onOmekJointPosition function. It receives a joint’s name,
    the playerLabel associated with the joint, and the X,Y,Z position of the joint
    in space. Here’s the code from the example:


    `function onOmekJointPosition(jointName:String, playerLabel:String, jointX:String,
    jointY:String, jointZ:String, confidence:String):void`

    `{`

    `//give control on mouses to one specific player.`

    `if(playerLabel == "0")`

    `{`

    `  if(jointName == "leftFingerTip")`

    `  {`

    `  //mirror X value in order to make the mouse move left and right like the hand.`

    `  leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;`

    `  leftFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;`


    `  //debugString_txt.appendText("\nleftFingerTip_mc located at:`

    `  //("+leftFingerTip_mc.x.toString()+","+leftFingerTip_mc.y.toString()+")");`

    `  }`

    `  if(jointName == "rightFingerTip")`

    `  {`

    `  rightFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;`

    `  rightFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;`

    `  }`

    `  }`

    `}`


    This function gives player 0 control and attaches to the circle graphic movie
    clips, `leftFingerTip_mc` and `rightFingerTip_mc`, to the longest finger point
    of each hand. This function also prints the location of these joints to the `debugString_txt`
    box on the stage.


    Beckon can track multiple players and it assigns each player a number. The first
    player is player 0.


    #### Alerts


    The last mandatory functionality is to handle Alerts. On line 10, notice the `onOmekAlert`
    function is exposed to the Flash runtime environment:


    `ExternalInterface.addCallback("OmekAlert", onOmekAlert);`


    Each alert that you want to listen for must also be sent to the SDK with a .call
    method. On lines 62-79 a partial list of the alert listeners that are available
    are sent to the sdk with each corresponding message to listen for, starting with
    the following line:


    `ExternalInterface.call("OmekAddAlert","Alert_CalibrationDone");`


    Let’s look at the exposed onOmekAlert function now and see what it does:


    `function onOmekAlert(alertName:String, playerLabel:String):void`

    `{`

    `debugString_txt.appendText("\nOmekAlert: " + alertName + ":" + playerLabel);`


    `if (alertName =="Alert_CalibrationDone"){`

    `//only after Alert_CalibrationDone the OmekGetBodyDimensions will return the
    correct values`

    `  ExternalInterface.call("OmekGetBodyDimensions","0");`

    `  //ask for the body compensation of a specific player. return a value to ExternalInterface.addCallback("OmekGetCompensationData",
    onOmekGetCompensationData);`

    `  ExternalInterface.call("OmekGetCompensationData","0");`

    `} else if (alertName == "Alert_CalibrationBegun"){`

    `  ExternalInterface.call("OmekGetBodyDimensions","0");`

    `  //ask for the body compensation of a specific player. return a value to  `

    `  //ExternalInterface.addCallback("OmekGetCompensationData", onOmekGetCompensationData);`

    `  ExternalInterface.call("OmekGetCompensationData","0");`

    `}`


    This function handles a few alerts. For each one, it just prints copy to the `debugString_txt`
    field. Nothing fancy happens here. A handy use for this function in the future
    would be to display player warnings on screen.'
  trans: "\n### 示例代码\n\n现在，我们来看看 Beckon 的 Flash 示例代码。要查看代码，请打开“动作”面板，查看时间轴第一帧上的 ActionScript。\n\
    \n![images](img/square.jpg) **注意** 从菜单中选择“窗口”>“动作”即可查看动作面板。\n\n你应该会在代码顶部看到一个 `import`\
    \ 语句。在你使用 Beckon SDK 创建的每一个 Flash 应用程序中，都需要导入以下类：\n\n```\n  import flash.external.ExternalInterface;\n\
    ```\n\n接下来是暴露特定函数给 `swf` 文件的 `ExternalInterface` 代码。第一步始终是将函数暴露给 Flash 运行时环境。第二步是可选的，通过\
    \ `ExternalInterface.call` 方法发送消息来设置功能。最后一步则是设置暴露出来的函数。\n\n无可讳言，这种暴露函数的过程感觉像是权宜之计。毫无疑问，最好是\
    \ Omek 将 Beckon SDK 构建成 Flash 库的版本，这样就能轻松在线发布，或分发给其他使用 Kinect 的人。目前，你只能局限在运行着你特定版本\
    \ Beckon 的那一个系统上。希望这种情况在 Beckon SDK 的未来版本中会有所改变。\n\nActionScript 中的三个 `ExternalInterface.callback()`\
    \ 方法是必需的，必须在每个打算使用 Beckon 的文件中实现。每个方法都集成了一些基本功能。我们将回顾这三个必需的方法以及它们暴露的函数。其他方法都是可选的，但本章介绍的这三个是必要的。\n\
    \n我们讲解这三个方法的顺序与它们在 ActionScript 文件中被使用的顺序不同。我们之所以采用这种顺序，是为了能够更清晰地解释代码。我们会通过行号来引用\
    \ ActionScript 代码，以便尽量让讨论易于理解。\n\n第 8 行通过在 Flash 运行时中暴露 `onOmekGesture` 函数来处理手势识别。\n\
    \n```\nExternalInterface.addCallback(\"OmekGesture\", onOmekGesture);\n```\n\n\
    接下来要看的方法是第 56 行。这个方法让 SDK 注册 `leftPush` 手势。这个手势是 SDK 中包含的一个手势。用户想要检测的每个手势都必须在这里列出，包括自定义手势。\n\
    \n```\n        ExternalInterface.call(\"OmekAddGesture\",\"leftPush\");\n```\n\
    \n现在，回顾一下第 106 行暴露的函数 `onOmekGesture`。\n\n```\nfunction onOmekGesture(gestureName:String,\
    \ playerLabel:String):void\n{\n        debugString_txt.appendText(\"\\nOmekGesture:\
    \ \" + gestureName + \":\" + playerLabel);\n}\n```\n\n这个函数可以从 SDK 接收两个字符串。第一个是接收到的手势名称，第二个是玩家的标签。Beckon\
    \ 可以追踪多个玩家，并在它们之间轻松切换。它最多支持 5 个玩家。它还可以追踪无限数量的所谓候选者（或潜在玩家）。\n\n### 骨骼数据\n\n接下来，我们看看如何将骨骼数据获取到\
    \ Flash 中。第 9 行暴露了函数 `onOmekJointPosition`：\n\n```\nExternalInterface.addCallback(\"\
    OmekJointPosition\", onOmekJointPosition);\n```\n\n你必须列出你想要接收的每一个关节，但不是在 Flash\
    \ 文件中。打开 `Config.html` 文件。该文件位于此文件夹中：`C:\\MyProject\\Flash`。打开文件，注意其中的 `<tracking>`\
    \ 标签。其内容应如下所示：\n\n```\n<tracking>\n                <skeleton rawSkeleton=\"true\"\
    />\n                <joint name=\"rightFingerTip\" screen=\"false\" smooth=\"\
    true\"/>\n                <joint name=\"leftFingerTip\" screen=\"false\" smooth=\"\
    true\"/>\n                <joint name=\"torso\" screen=\"false\" smooth=\"true\"\
    />\n</tracking>\n```\n\n这个 `<tracking>` 标签注册了所有要追踪的关节。你*必须*列出你想要追踪的每一个关节。在这个例子中，只追踪了左右指尖和躯干。由于这个标签已经在这个\
    \ xml 文件中预先设置了关节，因此无需使用 `.call` 向 SDK 发送消息。\n\n### 关节位置\n\n现在让我们看看 `onOmekJointPosition`\
    \ 函数。它接收关节名称、与该关节关联的 `playerLabel` 以及该关节在空间中的 X、Y、Z 位置。以下是示例中的代码：\n\n```\nfunction\
    \ onOmekJointPosition(jointName:String, playerLabel:String, jointX:String, jointY:String,\
    \ jointZ:String, confidence:String):void\n{\n//将鼠标控制权交给一个特定的玩家。\nif(playerLabel\
    \ == \"0\")\n{\n  if(jointName == \"leftFingerTip\")\n  {\n  //镜像 X 值，使鼠标像手一样左右移动。\n\
    \  leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;\n\
    \  leftFingerTip_mc.y = Number(jointY) * _screenScaleY + _correctionY;\n\n  //debugString_txt.appendText(\"\
    \\nleftFingerTip_mc located at:\n  //(\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
    )\");\n  }\n  if(jointName == \"rightFingerTip\")\n  {\n  rightFingerTip_mc.x\
    \ = stage.stageWidth - Number(jointX) * _screenScaleX + correctionX;\n  rightFingerTip_mc.y\
    \ = Number(jointY) * _screenScaleY + _correctionY;\n  }\n  }\n}\n```\n\n这个函数将控制权交给玩家\
    \ 0，并将圆形图形影片剪辑 `leftFingerTip_mc` 和 `rightFingerTip_mc` 连接到每只手最长的手指指尖点。该函数还会将这些关节的位置打印到舞台上的\
    \ `debugString_txt` 框中。\n\nBeckon 可以追踪多个玩家，并为每个玩家分配一个编号。第一个玩家是玩家 0。\n\n### 警报\n\
    \n最后一个必需的功能是处理警报。在第 10 行，注意函数 `onOmekAlert` 已被暴露给 Flash 运行时环境：\n\n```\nExternalInterface.addCallback(\"\
    OmekAlert\", onOmekAlert);\n```\n\n你想要监听的每一个警报也必须通过 `.call` 方法发送给 SDK。在第 62-79\
    \ 行，一系列可用的警报监听器被发送给 SDK，每个监听器附带相应的监听消息，从下面这行开始：\n\n```\nExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_CalibrationDone\");\n```\n\n现在我们来看看暴露出来的 `onOmekAlert`\
    \ 函数以及它的功能：\n\n```\nfunction onOmekAlert(alertName:String, playerLabel:String):void\n\
    {\ndebugString_txt.appendText(\"\\nOmekAlert: \" + alertName + \":\" + playerLabel);\n\
    \nif (alertName ==\"Alert_CalibrationDone\"){\n//只有在 Alert_CalibrationDone 之后，OmekGetBodyDimensions\
    \ 才会返回正确的值\n  ExternalInterface.call(\"OmekGetBodyDimensions\",\"0\");\n  //请求特定玩家的身体补偿数据。将返回值传递给\
    \ ExternalInterface.addCallback(\"OmekGetCompensationData\", onOmekGetCompensationData);\n\
    \  ExternalInterface.call(\"OmekGetCompensationData\",\"0\");\n} else if (alertName\
    \ == \"Alert_CalibrationBegun\"){\n  ExternalInterface.call(\"OmekGetBodyDimensions\"\
    ,\"0\");\n  //请求特定玩家的身体补偿数据。将返回值传递给  \n  //ExternalInterface.addCallback(\"OmekGetCompensationData\"\
    , onOmekGetCompensationData);\n  ExternalInterface.call(\"OmekGetCompensationData\"\
    ,\"0\");\n}\n```\n\n这个函数处理几个警报。对于每个警报，它只是将文本打印到 `debugString_txt` 字段。这里没有发生什么特别的事情。将来这个函数的一个实用用途是在屏幕上显示玩家警告信息。\n"
- fmt: "#### The Core Functionality\n\nWe are now finished with the code needed to\
    \ set up Beckon Flash integration. Now that we have covered the most basic setup,\
    \ let’s look at how the functionality we’ve talked about is integrated into our\
    \ example. First, the code checks to see if a sensor is connected and ready. If\
    \ the sensor is ready to use and everything is hooked up, all of the appropriate\
    \ queries are then sent to the SDK. This process starts on line 21 with an `addEventListener`\
    \ running every frame to see if the sensor is ready. Here is the relevant code,\
    \ beginning from line 21:\n\n```actionscript\n//wait for connecting to the sensor\
    \ before querying it.\naddEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n\
    function checkIfSensorReady(e:Event):void\n{\n//ask if the sensor is ready to\
    \ receive queries. return a value to\n//ExternalInterface.addCallback(\"OmekIsSensorConnected\"\
    , onOmekIsSensorConnected);\nExternalInterface.call(\"OmekIsSensorConnected\"\
    ,\"\");\n}\n```\n\nNotice the next function, `onOmekIsSensorConnected`, is now\
    \ exposed to the SDK and the `OmekIsSensorConnected` function in the SDK is triggered\
    \ by `.call` and receives `false` or `true`.\n\nThe `onOmekIsSensorConnected`\
    \ function receives a string from the SDK. If it is the string `true`, the function\
    \ `sendQueriesToSensor` runs.\n\n```actionscript\n/**\n * function returns true\
    \ or false if the sensor is connected.\n *\n * connected : boolean (as a string)\
    \ \"true\" or \"false\", marking if the sensor is ready\n */\nfunction onOmekIsSensorConnected(connected:String):void\n\
    {\n  if ( connected==\"true\" )\n  {\n    removeEventListener(Event.ENTER_FRAME,checkIfSensorReady);\n\
    \    sendQueriesToSensor();\n  }\n}\n```\n\nNext is the function `sendQueriesToSensor`.\
    \ This is the function that sends all of the call messages to the SDK. (`sendQueriesToNSensor`\
    \ also exposes a few more functions). This is important because these calls include\
    \ all gestures to be tracked and all alert messages to send. For example:\n\n\
    ```actionscript\nfunction sendQueriesToSensor():void\n{\n  //set the number of\
    \ players the sensor tracks\n  ExternalInterface.call(\"OmekSetMaxPlayers\",\"\
    2\");\n  //ask for the tracked number of players. return a value to\n  //ExternalInterface.addCallback(\"\
    OmekGetMaxPlayers\", onOmekGetMaxPlayers);\n  ExternalInterface.call(\"OmekGetMaxPlayers\"\
    ,\"\");\n\n  //set the sensor's tracking mode to either: \"all\", \"basic\", \"\
    upper\", or \"sitting\"\n  ExternalInterface.call(\"OmekSetTrackingMode\",\"all\"\
    );\n  //ask for the current tracking mode. return a value to\n  //ExternalInterface.addCallback(\"\
    OmekGetTrackingMode\", onOmekGetTrackingMode);\n  ExternalInterface.call(\"OmekGetTrackingMode\"\
    ,\"\");\n\n  //adding listeners for the sensor to specific gestures (see documentation\n\
    \  //for full list of gestures available)\n  ExternalInterface.call(\"OmekAddGesture\"\
    ,\"leftPush\");\n  ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");\n\
    \  ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");\n  //removing listeners\
    \ from the sensor to specific gestures\n  ExternalInterface.call(\"OmekRemoveGesture\"\
    ,\"leftPush\");\n\n  //adding listeners to specific alerts (see documentation\
    \ for full\n  //list of alerts available).\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_CalibrationDone\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_CalibrationBegun\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_TooClose\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_TooFar\");\n  ExternalInterface.call(\"OmekAddAlert\",\"\
    Alert_CloseToSide\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_OutOfFrame\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodLocation\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_CloseToWall\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_GoodBackground\");\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_PlayerEnters\"\
    );\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_PlayerLeaves\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_GoodFrameRate\");\n  ExternalInterface.call(\"OmekAddAlert\"\
    ,\"Alert_LowFrameRate\");\n  //removing listeners from the sensor to specific\
    \ alerts\n  ExternalInterface.call(\"OmekAddAlert\",\"Alert_GoodLocation\");\n\
    \  ExternalInterface.call(\"OmekRemoveAlert\",\"Alert_GoodFrameRate\");\n  ExternalInterface.call(\"\
    OmekAddAlert\",\"Alert_CloseToWall\");\n\n  //ask for the current working directory.\
    \ return a value to\n  //ExternalInterface.addCallback(\"OmekGetWorkingDir\",\
    \ onOmekGetWorkingDir);\n  ExternalInterface.call(\"OmekGetWorkingDir\",\"\");\n\
    \  //ask for the sensor's properties. return a value to\n  //ExternalInterface.addCallback(\"\
    OmekGetSensorProperties\", onOmekGetSensorProperties);\n  ExternalInterface.call(\"\
    OmekGetSensorProperties\",\"\");\n  //ask for the body dimensions of a specific\
    \ player. return a value to\n  //ExternalInterface.addCallback(\"OmekGetBodyDimensions\"\
    , onOmekGetBodyDimensions);\n  ExternalInterface.call(\"OmekGetBodyDimensions\"\
    ,\"0\");\n\n  //get rgb or depth or player mask\n  ExternalInterface.addCallback(\"\
    OmekShowImage\", onOmekShowImage);\n  ExternalInterface.addCallback(\"OmekGetImageResolution\"\
    , onOmekGetImageResolution);\n  //ask for the resolution of the rgb image written\
    \ in the xml. return a value to\n  //ExternalInterface.addCallback(\"OmekGetImageResolution\"\
    , onOmekGetImageResolution);\n  ExternalInterface.call(\"OmekGetImageResolution\"\
    ,\"\");\n\n}\n```\n\n### Modifying the Beckon Flash Example\n\nNow we will add\
    \ something to this example before moving on to creating our own example. Let’s\
    \ track a new joint: the head.\n\nFirst off, we need to let Beckon know that we\
    \ want to receive the head joint in the flash runtime environment. To do this,\
    \ we need to modify the `config.xml` file and modify it to match the following\
    \ code:\n\n`C:\\MyProject\\Flash\\config.xml`\n```xml\n<tracking>\n          \
    \      <skeleton rawSkeleton=\"true\"/>\n                <joint name=\"rightFingerTip\"\
    \ screen=\"false\" smooth=\"true\"/>\n                <joint name=\"leftFingerTip\"\
    \ screen=\"false\" smooth=\"true\"/>\n                <joint name=\"torso\" screen=\"\
    false\" smooth=\"true\"/>              \n                <joint name=\"head\"\
    \ screen=\"false\" smooth=\"true\"/>\n</tracking>\n```\n\nAdd head tracking into\
    \ the example by modifying the `onOmekJointPosition` function that starts on line\
    \ 164 of the `testOmekFlashPlayer.fla` file. Following is the new version of the\
    \ function that you should create:\n\n```actionscript\nfunction onOmekJointPosition(jointName:String,\
    \ playerLabel:String, jointX:String, jointY:String, jointZ:String, confidence:String):void\n\
    {\n//give control on mouses to one specific player.\nif(playerLabel == \"0\")\n\
    {\nif(jointName == \"head\") {\n\n  myHead.x = stage.stageWidth - Number(jointX)\
    \ * _screenScaleX + _correctionX;\n  myHead.y =Number(jointY) * _screenScaleY\
    \ + _correctionY;\n\n}\nif(jointName == \"leftFingerTip\")\n{\n  //mirror X value\
    \ in order to make the mouse move left and right like the hand.\n  leftFingerTip_mc.x\
    \ = stage.stageWidth - Number(jointX) * _screenScaleX + _correctionX;\n  leftFingerTip_mc.y\
    \ = Number(jointY) * _screenScaleY + _correctionY;\n\n  //debugString_txt.appendText(\"\
    \\nleftFingerTip_mc located at: (\"+leftFingerTip_mc.x.toString()+\",\"+leftFingerTip_mc.y.toString()+\"\
    )\");\n}\nif(jointName == \"rightFingerTip\")\n{\n  rightFingerTip_mc.x = stage.stageWidth\
    \ - Number(jointX) * _screenScaleX + _correctionX;\n  rightFingerTip_mc.y = Number(jointY)\
    \ * _screenScaleY + _correctionY;\n}\n}\n}\n```\n\nFinally, export and run `OmekBeckonFlash.exe`.\
    \ You should see your movie clip head tracking enabled and working, as shown in\
    \ [Figure 6-5](#Chapter06.html#fig_6_5).\n\n![images](images/0605.jpg)\n\n***Figure\
    \ 6-5.** Beckon tracking the added head joint*"
