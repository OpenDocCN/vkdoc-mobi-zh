  trans: '

    ### 下载二进制文件


    废话不多说，我们直接去获取这个软件！在 RGBDemo 网页上，点击`Windows 二进制文件`下载链接，如图 1-8 所示。页面将跳转至包含名为`RGBDemo
    0.6.1rc1-Win32.zip`文件链接的行（图 1-9）。在点击该下载链接之前，你需要按顺序仔细完成两个步骤。


    ![images](img/0108.jpg)


    ***图 1-8.** Kinect RGBDemo 页面上 `Windows 二进制文件` 的链接*


    首先，我要你选择并复制这串 28 个字符的许可证密钥，如图 1-9 所示。你稍后就会用到它，如果你现在把它复制到剪贴板，就能在下一步直接粘贴，而无需返回此页面查找。这一长串由字母、数字和符号组成的字符串是用于在
    OpenNI 框架下使用 PrimeSense NITE 中间件的许可证。


    ![images](img/0109.jpg)


    ***图 1-9.** 显示许可证密钥和 RGBDemo `ZIP` 文件下载链接的屏幕*


    很好！现在，让我们点击屏幕顶部的链接（图 1-9）来下载 `RGBDemo-0.6.1rc1-Win32.zip` 压缩文件。


    看吧！刚发生了什么？你的浏览器现在打开了另一个名为 SourceForge 的网站（图 1-10），这里托管着这个热门文件。当 RGBDemo 软件自动开始下载时，不必惊慌。或者，你可能会看到一个对话框，提示你选择文件的保存位置。这个压缩文件超过
    60MB，根据你的网速，下载可能需要一些时间。


    ![images](img/0110.jpg)


    ***图 1-10.** 从 SourceForge 下载*


    你可能会看到一个类似`此类文件可能会损害你的计算机。你确定要下载 RGBDemo-0.6.1rc1-Win32.zip 吗？`的警报。请给予肯定回答。当 `RGBDemo-0.6.1rc1-Win32.zip`
    下载完成后，双击这个 `ZIP` 文件以查看“提取所有文件”窗口（图 1-11）。只需点击 RGBDemo 文件夹图标，将其从窗口中拖出并放到你的桌面上，即可解压到那里。


    ![images](img/0111.jpg)


    ***图 1-11.** 将 RGBDemo 文件夹拖到桌面*


    你可能会看到一个 Windows 安全警告，询问`你确定要将文件复制并移动到该文件夹吗？`点击`是`。Windows 会将文件夹及其所有文件复制到桌面。复制完成后，打开桌面上的文件夹，你会看到该目录下的所有文件和文件夹列表（图
    1-12）。


    ![images](img/0112.jpg)


    ***图 1-12.** RGBDemo 文件夹内的完整文件目录*


    现在，进入名为 `Drivers` 的目录。进入 `Drivers` 目录后，你会看到三个 `MSI` 安装文件列表——先不要点击任何一个！你需要按照一个非常关键的顺序来安装它们（图
    1-13），所以请集中注意力并按照指示操作。请按照以下顺序进行安装：


    > 1.  `OpenNI-Win32`

    > 2.  `SensorKinect-Win-OpenSource32`

    > 3.  `NITE-Win32`


    请注意，目录中文件的显示顺序（如图 1-13 所示）不一定与正确的安装顺序一致。所以要小心！务必按照我所描述的顺序操作。


    ![images](img/0113.jpg)


    ***图 1-13.** 驱动程序安装的关键顺序：1.) OpenNI-Win32，2.) SensorKinect-Win-OpenSource32，3.)
    NITE-Win32*


    首先，你需要安装 OpenNI（图 1-14）。这是一个用于“自然界面”技术的框架，它允许不同硬件和软件的模块相互通信。接着，你将安装 SensorKinect（图
    1-16），这是一个设备模块，它将 Kinect 注册到 OpenNI，使其能够读取传感器数据。最后，你将安装 NITE（图 1-17），这是一个“中间件”模块，用于处理来自
    Kinect 的体积数据，并推导出可用于应用程序的人体骨骼结构图，从而控制手势和其他交互操作。


    ![images](img/0114.jpg)


    ***图 1-14.** 显示默认安装路径的 OpenNI 安装对话框*


    ### 安装 OpenNI


    双击 `OpenNI-Win32` 文件以启动安装程序。根据你的设置和你使用的 Windows 版本，你可能会看到一个 Windows 安全警告（图 1-15
    上方）。只需给予肯定回答——在本例中是`安装`。别担心，本书中指导你下载的所有软件都来自安全来源。在 OpenNI 安装程序中，你可以接受默认路径 `C:\Program
    Files\OpenNI`，点击`安装`，安装完成后关闭窗口。


    ![images](img/0115.jpg)


    ***图 1-15.** Windows 安全警告——可以信任来自 PrimeSense Ltd 的软件；选择 `安装`。*


    ### 安装 SensorKinect


    接下来，启动 `SensorKinect-Win-OpenSource32` 安装程序，并确保在组件选择对话框（图 1-16）中同时勾选了 `OpenNI`
    和 `Sensor`。在安装接近尾声时，你可能会看到另一个 Windows 安全警告（图 1-15 下方）——点击`仍要安装此驱动程序软件`，然后在该过程完成后关闭窗口。


    ![images](img/0116.jpg)


    ***图 1-16.** 组件安装选择——确保同时勾选了 OpenNI 和 Sensor*


    ### 安装 PrimeSense NITE


    最后，通过启动 `NITE-Win32` 安装程序来安装最后一个驱动程序。同意许可协议，保持默认安装路径为 `C:\Program Files\Prime
    Sense\NITE\`，并点击`安装`。下一步，系统会提示你输入许可证密钥（图 1-17）。粘贴你之前从 RGBDemo 下载页面（图 1-9）复制的那串
    28 个字符，然后点击`安装`。在此步骤中，几个命令提示符窗口自动打开和关闭是正常现象，不必担心。


    ![images](img/0117.jpg)


    ***图 1-17.** PrimeSense 提示输入 NITE 许可证密钥——0KOIk2JeIBYClPWVnMoRKn5cdY4=*

