    ## About the Authors


    ![image](images/sean_kean.jpg) ![image](images/square.jpg) **Sean Kean** is an
    artist and entrepreneur living in Brooklyn, New York. With a background spanning
    engineering, art, education, and travel, he is passionate about simplifying complex
    technology in order to make tools more accessible to others. Insatiable in his
    curiosity, the author has filled his passport as a flight attendant, rediscovered
    learning through play as an early childhood educator, studied the streets and
    buildings of New York City in order to earn both a taxi driver license and real
    estate sales license, and has been programming well enough to be dangerous for
    more than 20 years. Sean is currently working to bridge the gap between the physical
    and digital worlds at HERE, Inc. ([`http://here.st`](http://here.st)), to bring
    volumetric 3D TVs mainstream with the VoxieBox ([`www.voxiebox.com`](http://www.voxiebox.com)),
    and to help professionals working with volumetric depth cameras, software, and
    displays to connect to each other through the Volumetric Society ([`www.volumetric.org`](http://www.volumetric.org))
    via a publication, conference, and local chapter meetups you can help set up in
    your city.


    ![image](images/jonathan_c_hall.jpg) ![image](images/square.jpg) **Jonathan C.
    Hall** is one of the creators of Sensecast, an application that makes it easy
    to build motion-controlled interfaces for content using a Kinect. He has been
    an independent designer/developer for digital projects for the last decade. Hall
    has also done stints as a beat reporter, a researcher for the smartest person
    in the world, a technology consultant to the likes of Rob Jarvik and King Abdullah
    II of Jordan, and a student of the sciences and humanities. Jonathan holds a BA
    from Harvard University, where he studied languages and religion, and about half
    a PhD (Communications) from Columbia University.


    ![image](images/phoenix_perry.jpg) ![image](images/square.jpg) **Phoenix Perry**
    was born in Denver, CO, in 1975. From digital arts curator to Creative Director,
    she has gained extensive experience in new media, design, and user interfaces.
    Perry''s work spans a large range of disciplines, including drawing, generative
    art, video, games, and sound. Her projects have been seen worldwide at venues
    and festivals, including Come out and Play, the Maker Faire at the New York Hall
    of Science, the Lincoln Center, Transmediale, the Yerba Buena Center for the Arts,
    the LAMCA, Harvest Works, Babycastles, the European Media Arts Festival, GenArt,
    the Seoul Film Festival, and Harvestworks. She is adjunct faculty at NYU-Poly
    in Integrated Digital Media and owns Devotion Gallery in Brooklyn, NY.


    ## About the Technical Reviewer


    ![image](images/jarrett_webb.jpg) ![image](images/square.jpg) **Jarrett Webb**
    creates imaginative, dynamic, interactive, immersive experiences using multi-touch
    technology and the Kinect. He lives in Austin, TX.


