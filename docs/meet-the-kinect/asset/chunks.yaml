  trans: "\n# 标记手势\n\n当您为某个手势录制了多个片段后，必须告知 SDK 哪些片段代表了您想要检测的优质手势版本。具体做法是：在录制内容中标记手势发生的位置。这些标记好的片段将用于训练分类器。请注意，SDK\
    \ 也会分析未标记的部分，并将其视为负面样本，因此务必准确选中所有手势正确执行的帧。\n\n以下是标记手势的流程：\n\n1.  转到“标记”选项卡，并打开您录制的视频序列。视频序列将被加载并显示在中间窗口中。\n\
    2.  播放该片段，确保手势按预期执行，并且对玩家的追踪是正确的。如果出现问题，可以删除该片段并重新录制，或使用“跳过入点/出点”选项来忽略有问题的帧。\n\
    3.  在左上角窗口的手势列表中，选择要标记的手势。在本例中，手势名为`leftHandUp`，位于`gameGestures`包中。展开该包并点击手势名称即可选中。\n\
    4.  查看视频序列，并使用“标记入点”和“标记出点”按钮标记手势。\n5.  对所有包含正面样本的录制视频序列重复上述步骤。\n\n对于您的负面样本，请加载片段，确保已选中目标手势，然后保存。请注意图\
    \ 6-7 中序列名称后面带有省略号（即三个点）的高亮按钮。这个无名且仅带有点的按钮，是用来打开文件浏览器的。进入您保存手势的文件夹，您将看到按编号排列的片段列表。还记得我之前提到要记录哪些表演是负面样本吗？现在需要加载视频片段时，知道哪些是负面样本会非常有帮助。选择一个负面样本，它会打开。您可以使用常规的视频控件播放该片段，并按照标记正面序列的完全相同步骤来标记负面序列。\n\
    \n![图片](img/0607.jpg)\n\n***图 6-7.** Omek Beckon 手势工具箱，已选中“打开序列”按钮。*\n\n## 训练手势\n\
    \n录制和标记之后是训练阶段。在此阶段，您将使用手势学习器工具，基于录制的视频序列来训练手势。通过这一步，您可以判断自己在片段中执行手势的效果如何，或者是否需要返回并重复此前的流程。\n\
    \n首先，打开并执行 `GestureLearner`。双击以下可执行文件：\n\n```\nC:\\Beckon SDK\\bin\\Omek Beckon\
    \ Gesture Learner.exe\n```\n\n然后按照以下步骤操作：\n\n1.  转到“文件”选项卡并添加训练序列。点击“添加目录”按钮，选择“examples”文件夹，然后点击“确定”按钮。这将添加其中包含的所有序列。\n\
    \n![图片](img/square.jpg) **提示** 如果您将目标手势的序列保存在其他文件夹中，可以重复上一步并将其也添加进来。\n\n2.  现在设置“输出文件”选项。选择您之前创建的“output”文件夹。它将包含训练过程的所有输出结果。点击“确定”按钮。\n\
    3.  确保“包”字段显示的是您的新包名称（`gameGestures`）。\n4.  确认“分类器”字段中保存的是您在“手势组织器”中输入的文件名。该文件名应为\
    \ `leftHandUp.xml`。\n5.  转到“手势”选项卡并设置“每个手势的配置”选项。点击“手势”字段并选择目标手势（`leftHandUp`）。按下“添加”按钮将此手势插入到“活动手势”列表中。\n\
    \n至此，您已选择了将要训练的手势。有时您可能希望在一次训练过程中训练多个手势；在这种情况下，您可以重复步骤 1-5，逐一添加所需手势。\n\n该选项卡包含所有可在训练过程中修改的参数。解释所有这些参数已超出本教程的范围。我们将仅探讨几个示例，其余内容可参考《手势训练手册》。参数分为不同的组。在每个组中，您会看到一个名为“自动”的复选框。选中此选项表示学习器应自动寻找参数值。\n\
    \n按如下方式设置“高级”选项卡参数：\n\n> **手势类型。**在我们的示例中，训练的手势是一个姿势而非动作，因此我们将选中“姿势”选项。像跳跃或出拳这样的手势属于“移动”手势。让“自动”选项保持选中状态。\n\
    > \n> **数据处理。**保持选中“自动”选项。\n> \n> **关节**。首先，使用默认值（“自动”和“两者”）。之后，您可以更改这些值，看看它们如何影响结果。“上半身”将仅使用上半身进行训练，而“下半身”则仅使用下半身。选择“两者”将尝试使用所有身体关节。\n\
    > \n> **学习方法。**首次选择“快速”；这将使手势训练更快，以便您能快速看到一些结果。之后，尝试将此值更改为“最佳”以查看其影响。“快速”和“最佳”方法使用不同的选项，因此两种方法的结果可能不同。\n\
    \n设置完所有需要的参数后，就可以运行训练过程了。操作如下：\n\n1.  点击窗口底部的“添加”按钮，使用当前值添加一个训练任务。请注意，在下一步点击“运行”按钮之前，训练过程不会执行。\n\
    2.  点击“运行”按钮来运行列表中的所有任务。这些任务将按顺序（一个接一个）运行，每个任务完成后会立即显示其结果。\n3.  如果任务成功结束，将显示一个“成功”图标（勾选形状），并且该分类器的得分会显示在列表中。如果发生错误，则会显示一个“失败”图标（“X”形状）。\n\
    4.  双击包含任务名称的行，查看关于得分的更多详细信息。\n\n您可以同时运行多个训练任务，并且可以在当前任务运行的同时添加更多任务。只需返回之前的选项卡（文件、手势和高级），更改任意参数，然后添加一个新任务即可。请注意，由于算法应用了随机性，两次运行相同的参数可能不会得到相同的结果！有关训练选项的更多详细信息，请参阅《手势训练手册》。\n\
    \n![图片](img/square.jpg) **注意** 如果您已关闭学习器并想检索旧任务的参数，只需点击“文件”选项卡中的“加载”按钮，浏览到保存所需输出的文件夹，然后选择\
    \ XML 文件即可。\n"
- fmt: "### Testing a Gesture\n\nA classifier is created and published for every gesture\
    \ that you create using the method described so far. It is the classifier that\
    \ enables you to use a gesture from Flash. Publishing a classifier simply refers\
    \ to adding it into the SDK, just as we did for `leftHandUp`.\n\nHaving published\
    \ a classifier, you may want to test the classifier with a live camera. Here is\
    \ how to run a test:\n\n1. Open the Gesture Toolbox and go to the Viewer tab.\n\
    2. Select the Input source (in the bottom right part of the screen):\n   - For\
    \ live testing with a camera, select the Sensor option. Then select the type of\
    \ camera from the menu below.\n   - For a sequence, select the Sequence option.\
    \ Then browse for the sequence, or type its path in the text-box below.\n3. Press\
    \ the Start Button to initiate the execution of the tracking.\n\nSelect the target\
    \ gestures in the Gestures Display (top left part of the screen). You may choose\
    \ more than one gesture. Perform the gesture. If you did everything correctly,\
    \ you should see your gesture register. See figure 6.8 for an example of the `leftHandUp`\
    \ gesture correctly tracking.\n\n![images](images/0608.jpg)\n\n***Figure 6-8.**\
    \ Viewer tab selected with the gesture open and correctly tracked.*\n\n### Adding\
    \ a Gesture for use by Flash\n\nNow we can add our new gesture into our Flash\
    \ file’s Actionscript. The first step is to add the gesture listener into our\
    \ calls. Find the following code block and add the bold lines into your code:\n\
    \n`//adding listeners for the sensor to specific gestures (see documentation for\
    \ full list of`\n`gestures available)`\n`ExternalInterface.call(\"OmekAddGesture\"\
    ,\"leftPush\");`\n`ExternalInterface.call(\"OmekAddGesture\",\"rightClick\");`\n\
    `ExternalInterface.call(\"OmekAddGesture\",\"jumpNoHands\");`\n`ExternalInterface.call(\"\
    OmekAddGesture\",\"leftHandUp\");`\n\n`//removing listeners from the sensor to\
    \ specific gestures`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"leftPush\"\
    );`\n`ExternalInterface.call(\"OmekRemoveGesture\",\"rightClick\");`\n`ExternalInterface.call(\"\
    OmekRemoveGesture\",\"jumpNoHands\");`\n`ExternalInterface.call(\"OmekRemoveGesture\"\
    ,\"leftHandUp\");`\n\nSave and export the application. Then launch `OmekBeckonFlash.exe`.\
    \ Now, when we perform the `leftHandUp` gesture, the `debugString_txt` box should\
    \ output the gesture’s name. The box should pop up and read “leftHandUp.” If you\
    \ are not seeing that result, go back and carefully check that you’ve performed\
    \ each step in this chapter correctly.\n\n### Building Functionality Based on\
    \ a Gesture\n\nNow that our new gesture is working and is being recognized, we\
    \ can use the gesture to trigger functionality in the application. Let’s go back\
    \ into our code block add some new functionality to draw a yellow box near our\
    \ left fingertip when the application registers the gesture as having been performed.\
    \ Add the below code into the `testOmekFlashPlayer.fla` file above the function\
    \ `OnOmekGesture()`. This code just allows us to draw a yellow square graphic\
    \ onscreen at every point where the application correctly tracks the new `leftHandUp`\
    \ gesture. In figure 6.9, you will see the gesture tracked at the moment my left\
    \ arm got to a certain point on screen above my shoulder.\n\n```\nvar gestureSeen:MovieClip\
    \ = new MovieClip();\nvar xNum:Number = 80;\nvar yNum:Number = 80;\ngestureSeen.graphics.beginFill(0xFFcc00);\n\
    gestureSeen.graphics.drawRect(xNum, yNum, 30,30);\n\nfunction onOmekGesture(gestureName:String,\
    \ playerLabel:String):void\n\n{\n    if (gestureName == \"leftHandUp\") {\n  \
    \      stage.addChild(gestureSeen);\n        gestureSeen.x = xNum;\n        gestureSeen.y\
    \ = yNum;\n    }\n}\n```\n\nAdd two more lines of code to get the position of\
    \ your left finger tip and assign it to the `xNum` and `yNum` variables. The two\
    \ lines are shown in bold in the following example. Find the same block of code\
    \ in the example file and add the two lines shown in bold.\n\n```\nfunction onOmekJointPosition(jointName:String,\
    \ playerLabel:String, jointX:String, jointY:String, jointZ:String, confidence:String):void\n\
    {\n    //give control on mouses to one specific player.\n    if(playerLabel ==\
    \ \"0\")\n    {\n\n    }\n    if(jointName == \"leftFingerTip\")\n    {\n    \
    \    //mirror X value in order to make the mouse move left and right like the\
    \ hand.\n        leftFingerTip_mc.x = stage.stageWidth - Number(jointX) * _screenScaleX\
    \ + _correctionX;\n        leftFingerTip_mc.y = Number(jointY) * _screenScaleY\
    \ + _correctionY;\n        xNum = leftFingerTip_mc.x;\n        yNum = leftFingerTip_mc.y;\n\
    \    }\n}\n```\n\nSave and export the example project. Run the example again.\
    \ Perform the LeftHandUp gesture. You should see that Beckon will place a box\
    \ on the screen at the position of your fingertip at the time you performed the\
    \ gesture (Figure 6-9).\n\n![images](images/0609.jpg)\n\n***Figure 6-9.** Beckon\
    \ registering the `leftHandUp` gesture and moving a box to the location of my\
    \ left finger tip where on screen the gesture was performed.*\n\nI hope that this\
    \ example has introduced you to the main ideas behind the Beckon SDK. First, we\
    \ went over what Beckon does and then we got it up and running. We then added\
    \ in new tracking functionality to the existing example for your head. From there,\
    \ it’s easy to map graphics to a skeleton. Next, we went over some basics of interface\
    \ design. Then we created our own gesture and added it to the Beckon SDK and successful\
    \ added a listener for it in Flash. Finally, we added a graphic to indicate when—and,\
    \ more importantly, where—our gesture occurred. That should give you enough of\
    \ a start with Beckon to create a basic interface.\n\n### C H A P T E R 7"
  raw: "#### Testing a Gesture\n\nA classifier is created and published for every\
    \ gesture that you create using the method described so far. It is the classifier\
    \ that enables you to use a gesture from Flash. Publishing a classifier simply\
    \ refers to adding it into the SDK, just as we did for `leftHandUp`.\n\nHaving\
    \ published a classifier, you may want to test the classifier with a live camera.\
    \ Here is how to run a test:\n\n1.  Open the Gesture Toolbox and go to the Viewer\
    \ tab.\n2.  Select the Input source (in the bottom right part of the screen):\n\
