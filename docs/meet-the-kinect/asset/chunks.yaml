    \n`{`\n**`        if (gestureName == \"leftHandUp\") {`**\n**`        stage.addChild(`**`gestureSeen`**`);`**\n\
    `        gestureSeen`**`.x = xNum;`**\n`        gestureSeen`**`.y = yNum;`**\n\
