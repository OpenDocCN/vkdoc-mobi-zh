  trans: '

    ### 身体畸形恐惧症


    这款仅适用于 Mac 的应用使用 `Cinder` 创意编码框架构建，虽然简单，但相当有趣。基本上，你可以实时让自己看起来变胖或变瘦。`身体畸形恐惧症`是一种心理障碍，大约影响
    1% 的人口，导致患者过度关注自己外表上感知到的缺陷。使用由 `Robert Hodgin` 创建的这个程序，以`棉花糖人`的形式看看自己、你的猫和这个世界。


    下载该程序的快捷链接是 [`http://bit.ly/dysmorphia`](http://bit.ly/dysmorphia)，你可以在 [`http://roberthodgin.com/`](http://roberthodgin.com/)
    和 [`http://www.flight404.com/`](http://www.flight404.com/) 上了解更多关于创建者的信息。查看第一个网站上的说明，并点击链接下载应用程序。请记住，此应用程序仅适用于
    Mac 操作系统。在打开应用程序之前，请确保你的 `Kinect` 已插入并连接到你的计算机。一旦绿灯可见，你就可以启动应用程序并开始玩了！


    打开程序后，你会立即看到 `Kinect` 视场范围内的物体实时变形。在屏幕的左下方，你会找到一个用于进行各种图像调整的按键说明。按住 `P` 键可以膨胀你的拍摄对象，按住小写
    `p` 键可以缩小它。基本上，通过增加或减少点云中点的半径来操纵来自 `Kinect` 的数据。当你将点扩展成蓬松的肿块和团块时，会产生一种滑稽和卡通的视觉效果。不要期望获得逼真的图像，而是使用按键以各种方式调整颜色和纹理，享受其中的乐趣。


    按下 `b` 或 `B` 键将调整应用于图像的模糊量。按住大写 `B` 键增加模糊会沿着表面平滑点，使图像不那么凹凸不平。尝试不同的模糊级别，找到与你喜欢的蓬松程度相匹配的量。如果你将模糊调到最大，图像将看起来非常印象派并失去细节，特别是当你同时调高蓬松度时，如
    图 3-11 所示。同时增加模糊和蓬松度也会抹去深度感。


    ![images](img/0311.jpg)


    **图 3-11.** 身体畸形恐惧症玩具显示用户处于完全膨胀和模糊状态


    请记住，`Kinect` 的可用范围有限，大约为 2 英尺到 20 英尺。因此，如果你离传感器太近或太远，变形滤镜将无法工作。使用此应用程序的理想范围大约是
    5 英尺到 10 英尺。


    在屏幕底边的按键说明旁边，你会找到红外传感器生成的灰度深度图。任何超出 `Kinect` 可记录范围的内容都将显示为黑色，如 图 3-12 所示。你可以使用这个指南，并知道任何显示为黑色的内容都将被裁剪，且不受变形滤镜影响。


    ![images](img/0312.jpg)


    **图 3-12.** 身体畸形恐惧症玩具对左侧深度传感器范围内的用户施加蓬松效果，但对右侧离传感器太近的用户不生效。


    你还可以通过调整裁剪平面来控制屏幕上可见的内容。你可以进行调整以减小可用深度，这是一种将拍摄对象与充满物体的背景隔离开来的简单方法。只需调整裁剪平面，使其仅包含你感兴趣的拍摄对象，从而裁剪掉你想要丢弃的前景或背景元素，如
    图 3-13 所示。


    ![images](img/0313.jpg)


    **图 3-13.** 用于裁剪背景信息的身体畸形恐惧症应用


    `Hodgin` 的身体畸形恐惧症应用展示了如何以新颖但非常直接的方式使用摄像头和深度图数据流来提供娱乐体验，甚至无需使用手势识别器和身体数据映射。我们将展示的下一个应用，在将相同数据与更复杂的
    3D 场景重建算法结合时，将揭示其另一种使用层次。

    '
- fmt: '### MatterPort


    Photography takes a step towards its volumetric 3-D future with the software MatterPort.
    Go to [`http://matterport.com`](http://matterport.com) to download the application,
    which is currently available only for Windows. This program will allow you to
    easily take volumetric snapshots of objects or entire scenes and then stitch them
    together to be viewable from all angles in a single 3-D model.


    Snapshots are automatically taken based on your movements. The idea is that you
    move around the room carrying the Kinect device. Every time you move to a new
    position and then pause, a picture is automatically taken. The software in combination
    with the Kinect is able to detect your motion and pausing, and take photos at
    each pause. You are thus able to capture an entire scene without returning to
    the keyboard over and over again.


    After each photo, the system shows a rough alignment of the overall scene. You
    are then able to fill in the spots you missed. Once the basic alignments have
    been found, the program will spend some time optimizing the alignments for maximum
    visual quality.


    Begin by plugging in your Kinect, connecting the Kinect to your computer, and
    opening the MatterPort software. On the right hand side of the screen, you will
    see the MatterPort Controls, as shown in [Figure 3-14](#Chapter03.html#fig_3_14).
    The top image on the screen will show the live camera view, which is what the
    Kinect is pointed at right at that moment. The image underneath will be the last
    good capture, which will update to show the past capture point as soon as you
    begin to capture a different image. You will use the control buttons at the bottom
    of the panel on the screen as you go through the process of capturing a scene.
    `START` is a toggle button that will initiate the capture and that you can use
    to pause and resume the process. `Backup` will let you go back and remove the
    last capture in the series. `Restart` lets you start all over again from scratch.
    The control buttons to the right enable you to refine a model, save a model, and
    load files.


    ![images](images/0314.jpg)


    ***Figure 3-14.** MatterPort live camera view, last good capture, and the various
    control buttons*


    To capture the room you are in, stand in the middle of the room and point the
    Kinect at a corner. Click `START`, and MatterPort will begin to capture an image,
    as shown in [Figure 3-15](#Chapter03.html#fig_3_15). You can click `START`, which
    serves as a `PAUSE` button once the capture begins, if you need to take a break
    from the process.


    ![images](images/0315.jpg)


    ***Figure 3-15.** MatterPort Cloud Viewer window to the left of the control panel
    showing start of process with one good capture displayed*


    When the image is captured, the application will make a sound. Once you hear the
    sound, a screenshot will appear in the `Last good capture` section of the control
    panel. This screen will show the last scan taken. There is no need to check the
    screen as you continue to scan. Every time you hear the capture noise, you can
    quickly move the Kinect to a new position to cover more area in the room. The
    new position should overlap with at least some of the area from the previous capture.
    As more images are captured, they will automatically be aligned in the composite
    image.


    [Figure 3-16](#Chapter03.html#fig_3_16) shows how the 3D model gets built as you
    take more photos. The full-resolution of the most recent capture will appear in
    the `Cloud Viewer` window to the left of the MatterPort controls. The rest of
    the model will appear in reduced resolution. You can see in [Figure 3-16](#Chapter03.html#fig_3_16)
    how the sharpest part of the image in the `Cloud Viewer` corresponds to the `last
    good capture` image in the control panel to the right.


    ![images](images/0316.jpg)


    ***Figure 3-16.** MatterPort capture in progress showing last good capture aligning
    with incoming capture information*


    If you move the Kinect too fast, the alignment will fail. In such instances, move
    the camera so that the view is similar to that shown in the last good capture.
    If the program does not create proper alignment between items, you can repeatedly
    hit `Backup` to go back until the bad alignment is removed. After a large number
    of capture screens, objects may align only roughly, as shown in [Figure 3-17](#Chapter03.html#fig_3_17).


    ![images](images/0317.jpg)


    ***Figure 3-17.** MatterPort showing a roughly aligned 3-D capture*


    Use the mouse to browse around the composite image from different angles. Small
    misalignments are okay since they can be fixed by clicking `Refine`, which will
    create a final result like that shown in [Figure 3-18](#Chapter03.html#fig_3_18).
    However, a large misalignment must generally be fixed by clicking `Backup` until
    the alignment problem is removed. This final screenshot will continue to show
    a reduced-resolution cloud, but a final full-resolution point cloud will be written
    to disk. Don’t forget to save your final, composite image! MatterPort saves your
    composite image as a point cloud in a `.ply` file that can be opened in Meshlab,
    which you can find at [`http://meshlab.sourceforge.net/`](http://meshlab.sourceforge.net/).


    ![images](images/0318.jpg)


    ***Figure 3-18.** MatterPort showing rough mesh enhanced by using the Refine button*


    Now that you’ve walked through a number of different applications created by other
    users, start thinking about how you can approach designing your own. In the following
    chapters, you’ll get acquainted with various development environments and see
    what it’s like to put your ideas into action.


    ## Chapter 4: Scripting the Kinect


    Now that you’ve seen a little bit of what the Kinect can do, it’s time to make
    it do your bidding! In this chapter, we will use the cross-platform, noob-friendly
    Processing programming environment—along with some Kinect libraries written by
    geniuses—to grab in–depth information from a Kinect sensor and do our own rendering
    and analysis of it. Sound amazing? Prepare to amaze yourself.


    ### Processing


    First, a response to those of you who are saying to yourselves, “Uh, why Processing?”
    (or perhaps more likely, “Uh, what’s Processing?”). Processing is a sweet, little,
    self-contained programming language and integrated development environment (IDE)
    that came out of the famed MIT Media Lab in 2001. It was created by Ben Fry and
    Casey Reas, then two students in John Maeda’s research group.


    Originally, Processing was conceived as a software sketchbook for visual artists
    that would make it simple to do basic computer programming for visual applications.
    Today, Processing is a free and open source software platform for all kinds of
    interactive applications. It has scores of user-contributed libraries and is actively
    maintained, improved, and used by tens of thousands of artists, developers, hobbyists,
    and students.


    #### What Processing Can Do For You


    Processing is essentially a Java application and therefore can do everything that
    Java can do: drawing and animating 2D and 3D graphics; manipulating images, sound
    and video; reading and writing data; communicating via HTTP; and, of course, working
    with data from a Kinect sensor. But Processing has a scripting syntax and simplified
    function calls that make it easy for newcomers and efficient for pro coders of
    a certain stripe. It is “self-contained” in that it runs its own instance of the
    Java Virtual Machine (JVM) on your computer, so it’s a cinch to set up: just download
    and launch. Like Java, Processing works across Windows, Mac, and Linux operating
    systems.


    So, again, why Processing? If this is your first trip down the rabbit hole of
    computer programming, well, Processing is as easy as it gets. It is the gateway
    drug to hackerdom. But, even if you’re a C++ heavyweight who writes your own Assembler
    hacks, Processing still has its charms: the “sketchbook” metaphor and pluggable
    libraries are a handy way to jump into exploring something completely new, like
    a new piece of 3D-seeing hardware!'
  raw: '### MatterPort


    Photography takes a step towards its volumetric 3-D future with the software MatterPort.
    Go to [`http://matterport.com`](http://matterport.com) to download the application,
    which is currently available only for Windows. This program will allow you to
    easily take volumetric snapshots of objects or entire scenes and then stitch them
    together to be viewable from all angles in a single 3-D model.


    Snapshots are automatically taken based on your movements. The idea is that you
    move around the room carrying the Kinect device. Every time you move to a new
    position and then pause, a picture is automatically taken. The software in combination
    with the Kinect is able to detect your motion and pausing, and take photos at
    each pause. You are thus able to capture an entire scene without returning to
    the keyboard over and over again.


    After each photo, the system shows a rough alignment of the overall scene. You
    are then able to fill in the spots you missed. Once the basic alignments have
    been found, the program will spend some time optimizing the alignments for maximum
    visual quality.


    Begin by plugging in your Kinect, connecting the Kinect to your computer, and
    opening the MatterPort software. On the right hand side of the screen, you will
    see the MatterPort Controls, as shown in [Figure 3-14](#Chapter03.html#fig_3_14).
    The top image on the screen will show the live camera view, which is what the
    Kinect is pointed at right at that moment. The image underneath will be the last
    good capture, which will update to show the past capture point as soon as you
    begin to capture a different image. You will use the control buttons at the bottom
    of the panel on the screen as you go through the process of capturing a scene.
    START is a toggle button that will initiate the capture and that you can use to
    pause and resume the process. Backup will let you go back and remove the last
    capture in the series. Restart lets you start all over again from scratch. The
    control buttons to the right enable you to refine a model, save a model, and load
    files.


    ![images](images/0314.jpg)


    ***Figure 3-14.** MatterPort live camera view, last good capture, and the various
    control buttons*


    To capture the room you are in, stand in the middle of the room and point the
    Kinect at a corner. Click START, and MatterPort will begin to capture an image,
    as shown in [Figure 3-15](#Chapter03.html#fig_3_15). You can click START, which
    serves as a PAUSE button once the capture begins, if you need to take a break
    from the process.


    ![images](images/0315.jpg)


    ***Figure 3-15.** MatterPort Cloud Viewer window to the left of the control panel
    showing start of process with one good capture displayed*


    When the image is captured, the application will make a sound. Once you hear the
    sound, a screenshot will appear in the Last good capture section of the control
    panel. This screen will show the last scan taken. There is no need to check the
    screen as you continue to scan. Every time you hear the capture noise, you can
    quickly move the Kinect to a new position to cover more area in the room. The
    new position should overlap with at least some of the area from the previous capture.
    As more images are captured, they will automatically be aligned in the composite
    image.


    [Figure 3-16](#Chapter03.html#fig_3_16) shows how the 3D model gets built as you
    take more photos. The full-resolution of the most recent capture will appear in
    the Cloud Viewer window to the left of the MatterPort controls. The rest of the
    model will appear in reduced resolution. You can see in [Figure 3-16](#Chapter03.html#fig_3_16)
    how the sharpest part of the image in the Cloud Viewer corresponds to the last
    good capture image in the control panel to the right.


    ![images](images/0316.jpg)


    ***Figure 3-16.** MatterPort capture in progress showing last good capture aligning
    with incoming capture information*


    If you move the Kinect too fast, the alignment will fail. In such instances, move
    the camera so that the view is similar to that shown in the last good capture.
    If the program does not create proper alignment between items, you can repeatedly
    hit Backup to go back until the bad alignment is removed. After a large number
    of capture screens, objects may align only roughly, as shown in [Figure 3-17](#Chapter03.html#fig_3_17).


    ![images](images/0317.jpg)


    ***Figure 3-17.** MatterPort showing a roughly aligned 3-D capture*


    Use the mouse to browse around the composite image from different angles. Small
    misalignments are okay since they can be fixed by clicking Refine, which will
    create a final result like that shown in [Figure 3-18](#Chapter03.html#fig_3_18).
    However, a large misalignment must generally be fixed by clicking Backup until
    the alignment problem is removed. This final screenshot will continue to show
    a reduced-resolution cloud, but a final full-resolution point cloud will be written
    to disk. Don’t forget to save your final, composite image! MatterPort saves your
    composite image as a point cloud in a .ply file that can be opened in Meshlab,
    which you can find at [`http://meshlab.sourceforge.net/`](http://meshlab.sourceforge.net/).


    ![images](images/0318.jpg)


    ***Figure 3-18.** MatterPort showing rough mesh enhanced by using the Refine button*


    Now that you’ve walked through a number of different applications created by other
    users, start thinking about how you can approach designing your own. In the following
    chapters, you’ll get acquainted with various development environments and see
    what it’s like to put your ideas into action.


    ## C H A P T E R  4


    ## Scripting the Kinect


    Now that you’ve seen a little bit of what the Kinect can do, it’s time to make
    it do your bidding! In this chapter, we will use the cross-platform, noob-friendly
    Processing programming environment—along with some Kinect libraries written by
    geniuses—to grab in–depth information from a Kinect sensor and do our own rendering
    and analysis of it. Sound amazing? Prepare to amaze yourself.


    ### Processing


    First, a response to those of you who are saying to yourselves, “Uh, why Processing?”
    (or perhaps more likely, “Uh, what’s Processing?”). Processing is a sweet, little,
    self-contained programming language and integrated development environment (IDE)
    that came out of the famed MIT Media Lab in 2001\. It was created by Ben Fry and
    Casey Reas, then two students in John Maeda’s research group.


    Originally, Processing was conceived as a software sketchbook for visual artists
    that would make it simple to do basic computer programming for visual applications.
    Today, Processing is a free and open source software platform for all kinds of
    interactive applications. It has scores of user-contributed libraries and is actively
    maintained, improved, and used by tens of thousands of artists, developers, hobbyists,
    and students.


    #### What Processing Can Do For You


    Processing is essentially a Java application and therefore can do everything that
    Java can do: drawing and animating 2D and 3D graphics; manipulating images, sound
    and video; reading and writing data; communicating via HTTP; and, of course, working
    with data from a Kinect sensor. But Processing has a scripting syntax and simplified
    function calls that make it easy for newcomers and efficient for pro coders of
    a certain stripe. It is “self-contained” in that it runs its own instance of the
    Java Virtual Machine (JVM) on your computer, so it’s a cinch to set up: just download
    and launch. Like Java, Processing works across Windows, Mac, and Linux operating
    systems.


    So, again, why Processing? If this is your first trip down the rabbit hole of
