    ### 连接 Kinect


    恭喜！你已经完成安装。接下来是有趣的部分——准备将 Kinect 连接到你的计算机。请参考图 1-4 直观了解后续步骤中涉及的线缆。将 Kinect 上的专用
    USB 公头插入交流电源适配器线缆上的 USB 母头。将交流电源适配器插入墙上的电源插座，然后将标准 USB 接头插入计算机的 USB 端口。此时外观应类似图
    1-3，但不同的是你并非从 Xbox 上拔下线缆，而是连接到计算机。你可能会看到 Kinect 的 LED 指示灯亮起或闪烁。现在，请将 Kinect 对准自己，距离约两英尺。


    连接好 Kinect 后，你可能会看到各种系统通知（图 1-18 底部）关于驱动程序软件的安装。根据系统配置的不同，你可能会看到针对电机、摄像头和 Xbox
    NUI 音频的单独通知。这可能需要一些时间，请耐心等待。Windows 可能无法找到音频驱动程序，因为这些传感器驱动程序仅适用于 Kinect 中与 PrimeSense
    相关的组件（图 1-18 顶部）。微软在获得设计授权后，在 PrimeSense 参考规格基础上增加了自己的一组四个麦克风阵列（参见图 1-6 中的 F-I）。微软尚未在
    Windows 上发布音频组件的第三方驱动程序；不过，他们在官方 SDK 中提供了完整的音频支持。因此，如果系统提示定位音频驱动程序，请选择标签为`Don’t
    show this message again for this device`（不再为此设备显示此消息）的选项，无需担心 Windows 找不到 Xbox
    `NUI Audio` 设备（图 1-18 顶部）——这是正常现象。


    ![images](img/0118.jpg)


    ***图 1-18.** 找不到 Xbox NUI 音频驱动程序的消息及系统托盘通知*


    如果你运行的是 Windows Vista，系统很可能会提示重启，请照做。重启返回 Windows 后，屏幕会显示正在配置更新，并警告不要关闭计算机。根据系统性能，这可能需要一些时间。完成后，你终于可以在计算机上摆弄
    Kinect 了！


    导航到桌面上的 RGBDemo 文件夹，启动`rgbd-viewer`应用程序（图 1-12 目录中的最后一个项目）。将会出现一个黑色的命令提示符窗口，显示消息`Setting
    resolution to VGA`（设置分辨率为 VGA）。这是正常现象，随后会弹出 RGBDemo 的图形用户界面窗口（本章稍后的图 1-21）。


    现在，请直接跳转到“测试你的 Kinect”部分，因为接下来的页面将介绍 Mac OS X 的下载和安装过程。如果你好奇，可以看看本部分为苹果电脑用户描述的过程。


