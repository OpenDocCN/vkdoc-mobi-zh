- fmt: "# What the Pointcloud Sketch is Doing\n\nA typical, very basic Processing\
    \ sketch consists of a `setup()` function—called at the outset to set up any parameters\
    \ or processes used by the sketch—and a `draw()` function, which runs on the main\
    \ loop, constantly drawing and redrawing any elements you tell it to, whether\
    \ static or animated. The pointcloud sketch follows that convention with a few\
    \ additional things going on: some preliminary library import statements and variable\
    \ declarations, an initialization routine for PeasyCam, which is used to control\
    \ the virtual “camera”, or perspective on the rendered 3D scene, and `drawPointcloud()`,\
    \ a custom-defined function that grabs all the points in the `Kinect3D` object\
    \ and draw them. There is also a `stop()` function that gets called whenever the\
    \ sketch is terminated.\n\nIt’s almost always instructive to look at the code\
    \ and try to understand what it’s doing. Here, for example, is the original code\
    \ for the `drawPointcloud` function and some of the variables used by it:\n\n\
    ```\nKinect3D k3d_;\n\nint kinectFrame_size_x = VIDEO_FORMAT._RGB_.getWidth();\n\
    int kinectFrame_size_y = VIDEO_FORMAT._RGB_.getHeight();\n\nvoid drawPointcloud(){\n\
    \n  KinectPoint3D kinect_3d[] = k3d_.get3D();\n\n  int jump = 5;\n\n  int cam_w_\
    \ = kinectFrame_size_x;\n  int cam_h_ = kinectFrame_size_y;\n\n  strokeWeight(3);\n\
    \n  for(int y = 0; y < cam_h_-jump ; y+=jump){\n    for(int x = 0; x< cam_w_-jump*2\
    \ ; x+=jump){\n      int index1 = y*cam_w_+x;\n\n      if (kinect_3d[index1].getColor()\
    \ == 0 )\n        continue;\n\n      stroke(kinect_3d[index1].getColor() );\n\n\
    \      float cx = kinect_3d[index1].x;\n      float cy = kinect_3d[index1].y;\n\
    \      float cz = kinect_3d[index1].z;\n      point(cx, cy, cz);\n\n    }\n  }\n\
    }\n```\n\nI know what you’re saying to yourself: `Kinect3D` object? What and where\
    \ is that? And what about `KinectPoint3D` inside the `drawPointcloud()` function?\
    \ Where did that come from, and how do I know what it does? Here it’s instructive\
    \ to look through the documentation included with dLibs, which at least identifies\
    \ the properties and methods associated with all of the objects available from\
    \ the library. Open the included `dLibs_freenect/reference/index.html` in your\
    \ browser.\n\nAlthough the documentation is bare bones, you can see that the `Kinect3D`\
    \ object manages data collection from the Kinect, including frame rate, calibration,\
    \ depth, and RGB images, etc. Calling the function `get3D()` on the `Kinect3D`\
    \ object like the example does inside `drawPointcloud()` returns a 640×480 array\
    \ of points or pixels, each of which has both color (RGB) and position (X, Y,\
    \ Z) values, sometimes called RGBZ data because it merges traditional RGB camera\
    \ data (a 2D color image) with depth information (the position of each pixel of\
    \ that image on the Z axis). The library object for holding each point is a `KinectPoint3D`\
    \ object and so the sketch creates an array of these objects each time it calls\
    \ `drawPointcloud()` and stores it there.\n\n```\nKinectPoint3D kinect_3d[] =\
    \ k3d_.get3D();\n```\n\n## Tweaking the Example\n\nAfter you’ve played around\
    \ with the example as is, let’s try modifying it a bit. Specifically, let’s tweak\
    \ the `drawPointcloud()` function and see what happens.\n\n### Higher Resolution\n\
    \nThe first thing you can try is changing up the resolution of the rendered image.\
    \ You can see that the integer variable `jump` is used to skip over points in\
    \ each array of RGBZ values coming from our `Kinect3D` object. Try changing\n\n\
    ```\nint jump = 5;\n```\n\nto\n\n```\nint jump = 1;\n```\n\nRendering every single\
    \ data point rather than every fifth data point will take its toll on the program’s\
    \ execution, which you’ll notice in the slower frame rate when you run the sketch\
    \ this time. Still, you should also notice quite a bit more detail in the rendered\
    \ image like those in [Figures 4-6](#Chapter04.html#fig_4_6) and [4-7](#Chapter04.html#fig_4_7).\n\
    \n![images](images/0406.jpg)\n\n***Figure 4-6.** Our hi-res pointcloud reveals\
    \ a new detail in the scene: a cat!*\n\n![images](images/0407.jpg)\n\n***Figure\
    \ 4-7.** The hi-res pointcloud, tilted*\n\n### Depthmap\n\nAlternatively, you\
    \ might want your rendered image to show a different type of information, not\
    \ just the visible light RGB data. You might, for example, want the depth information\
    \ somehow encoded in the color of each pixel in the rendering, creating what’s\
    \ called a “depthmap.” This example uses Processing’s `stroke()` function to render\
    \ the pointcloud, where the color argument for the stroke is taken from the `KinectPoint3D`.\
    \ Now, let’s take this value from the depth value at that pixel instead.\n\nReplace\n\
    \n```\nstroke(kinect_3d[index1].getColor() );\n```\n\nwith\n\n```\nfloat depth\
    \ = (10 +kinect_3d[index1].z)/10;\nstroke(color(255* depth, 255* depth, 255* depth));\n\
    ```\n\nEssentially, we’re replacing the RGB color of the image with a gray value\
    \ based on the distance of the point from the Kinect. Now, objects that appear\
    \ closer to the Kinect should be brighter than objects farther away. We should\
    \ note here that the Z values in our `KinectPoint3D` object are in negative meters\
    \ (distance in front of the camera) and are floating-point (decimal) numbers.\
    \ So, if the tip of my nose is exactly a meter and a third away from the connect,\
    \ the Z value will be something like `-1.333333`, and the transformation we’ve\
    \ applied above to get the color will be affected accordingly. If you run the\
    \ sketch, you should see something like [Figure 4-8](#Chapter04.html#fig_4_8).\n\
    \n![images](images/0408.jpg)\n\n***Figure 4-8.** The pointcloud sketch turned\
    \ into a depthmap*\n\n### Thresholding\n\nThat’s all fine and good, but not incredibly\
    \ useful. What really unlocks the power of the Kinect is the ability to selectively\
    \ analyze the 3D space in front of the sensor, to pick out objects and people\
    \ in the scene, and understand what’s happening with them. What is the object?\
    \ Is the person holding the object? Is the person gesturing? Such questions form\
    \ a classic topic in machine vision known as scene analysis that has been extensively\
    \ developed using 2D images over the past few decades. With the added depth information\
    \ from a Kinect-like sensor or depth camera, scene analysis becomes much easier\
    \ and more robust and the possibilities grow.\n\nWe can already begin to see these\
    \ possibilities by modifying this sketch ever so slightly. We’ve altered the rendering\
    \ so that its colors reflect depth, but now let’s try selecting only pixels from\
    \ the Kinect within a certain depth range, a technique called thresholding. Note\
    \ these two lines in the example code:\n\n```\nif (kinect_3d[index1].getColor()\
    \ == 0 )\n        continue;\n```\n\nAs `drawPointcloud()` is looping through the\
    \ 640×480 array of points, these lines tell the draw function to just drop any\
    \ black points typically associated with object “shadows.” In the following example,\
    \ an additional directive to drop any points beyond a depth of 2 meters has been\
    \ added:\n\n```\nif (kinect_3d[index1].z < -2)\n        continue;\n```\n\nFinally,\
    \ we can comment out the earlier edits we made to create the depthmap with the\
    \ `//` comment characters. Now when we run the sketch, points must meet a certain\
    \ depth threshold in order to be rendered at all. In this case, anything more\
    \ than 2 meters from the Kinect will be dropped, most of it is probably background\
    \ stuff. If you’re just a meter or two away from your Kinect and it’s clear behind\
    \ you when you run this sketch, you should see yourself fairly cleanly cut out\
    \ from the black void behind you as in [Figure 4-9](#Chapter04.html#fig_4_9).\n\
    \n![images](images/0409.jpg)\n\n***Figure 4-9.** Thresholding example, with a\
    \ poorly calibrated Kinect*\n\nWhen you have a camera that sees in 3D, it’s that\
    \ easy to pick out a very well-defined region of interest in 3D space for further\
    \ analysis. Now that you have your likeness as a cutout, what do you want to do\
    \ with it? We’ll explore more in later chapters."
