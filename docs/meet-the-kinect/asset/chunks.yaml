  trans: '

    在 OpenNI 问世后，微软宣布将于 2011 年春季发布一款面向 Windows 的非商业用途 **Kinect 软件开发工具包**。很快，那些花费多年时间设计用于创作自然手势软件的应用程序开发套件的公司，突然发现市场需求正在不断增长。此前，他们的系统不易下载，并且附带许可费用，这使得即便是在其网站上发布也成本过高。突然间，这些公司需要维持其相关性，因为成千上万的开发者正争相创建复杂的应用程序——而最容易获取的选择就是**开源软件**。到
    2011 年 2 月，**SoftKinetic** 宣布其驱动系统 `iisu`（适用于任何深度传感器）以及用于肢体动作的开发环境现已普遍可用，此外还有他们的
    **DepthSense** 摄像头硬件产品线。**Omek Interactive** 则发布了其 `Beckon SDK`，同时宣布与飞行时间深度摄像头制造商
    **PMD Technologies** 建立合作关系。自 20 世纪 80 年代以来一直是基于身体手势交互系统先驱的 **GestureTek**，也准备提供其
    `GestTrack3D SDK` 供普遍使用。


    对于寻求利用 Kinect 所提供可能性的工具的设计师和开发者来说，开发选择已逐渐变得日益多样化。如今，有数十种硬件和软件的组合，能够形成新颖的技术栈，将自然用户界面体验推向未来（图
    2-2）。在下一节中，我们将根据各个组件，解释决定 Kinect 技术栈形态的因素。


    ![images](img/0202.jpg)


    **图 2-2.** 新兴的替代性自然界面硬件与软件栈


    ## 硬件


    有多种设备可以捕捉 3D 图像。其中多数仍然昂贵，这正是 Kinect 成为一项重大突破的原因。一些设备更适合捕捉静态图像，而另一些设计则适用于随时间生成高频静态图像以产生
    3D 深度视频。每种设备都捕捉关于 3D 世界的深度信息，并以能够重建所捕捉 3D 数据完整维度的方式进行存储。这些系统可能采用截然不同的操作方法，或来自不同的制造商，但结果始终是包含某种形式
    3D 深度信息的数据。


    将收集 3D 图像的不同方法与收集 2D 信息的选择进行比较会很有帮助。无论设备的操作方法如何，传统相机总是捕捉 3D 世界并将其存储在 2D 格式中。无论是针孔相机、大画幅平板相机、单反相机
    (SLR)、旁轴相机、傻瓜相机，还是你手机中的相机，光学系统都会接收光线并将底片或原始图像文件以平面 2D 形式存储。因此，正如这些不同的成像系统在 2D
    摄影中针对特定应用各有其优缺点一样，构建 3D 成像系统也有多种不同的方式。在深度传感系统中，基本原理通常包括发射信号、让该信号在环境中的物体上反射、读取返回的信号，并计算深度信息（图
    2-3）。无论使用何种技术，它们之间的共同点都是生成场景的深度图图像或 3D 点云。


    ![images](img/0203.jpg)


    **图 2-3.** 大多数 3D 深度传感系统的共同原理。信号从发射器发出，信号反射回来并被传感器接收，对返回信号进行计算以测量到目标的距离。


    ## 结构光摄像头系统


    一种可见的结构光方法曾被著名地用作 Radiohead 在 2008 年突破性的无摄像音乐录影带《*In Rainbows*》中的《House of Cards》的基础。借助
    **Geometric Informatics** 的定制系统，歌手汤姆·约克面部的特写镜头被捕捉为点云数据，从而允许在后期制作中引导“合成摄像头”视点。结构光方法非常适合捕捉歌手详细的面部表情，因为这种技术可用于捕捉几英尺内的主体。另一种称为
    LIDAR（光探测与测距）的 3D 捕捉技术被用于收集跨越数百英尺的大规模 3D 图像，以渲染建筑物和道路。一台价值 75,000 美元的 **Velodyne**
    设备，配备 64 个同步旋转激光器，使得这种图像成为可能。


    Radiohead 视频制作产生的数据通过谷歌代码仓库在 `http://code.google.com/creative/radiohead/` 公开提供。凯尔·麦克唐纳在
    `http://www.instructables.com/id/Structured-Light-3D-Scanning/` 解释了如何重建类似于视频中用于创建特写镜头的设置（图
    2-4）。


    结构光扫描是通过向场景投射已知信号（例如频率带、编码光或形状图案）来生成 3D 深度图像数据的过程，并观察该图案在撞击距离变化的表面时如何变形，以计算深度范围。Kinect
    使用红外结构光系统，华硕 WAVI Xtion 和 PrimeSense 参考设计也采用此技术。由于这些系统使用不可见的红外光，因此在记录过程中对环境没有可感知的干扰。这使得
    3D 捕捉不受场景光照条件的影响。相比之下，可见结构光系统通过将图案投射到肉眼可见的场景上来工作。这类系统在可见光谱内为场景提供自身照明，这可能是相当明显的。


    可见结构光方法有一些优势。此前，该方法是生成深度图像成本较低的选择之一。它能够以比飞行时间摄像头等其他方法更低的成本产生更高分辨率的图像。在可见结构光系统中，可以使用投影仪叠加一个形状图案，例如线条，这些线条可以是静止的或以高频率运动，并围绕物体弯曲。一个或多个摄像头对准该结构光，并对生成的图像进行计算处理以生成深度数据。例如，**Willow
    Garage** 的 PR2 机器人使用一个 LED “纹理”投影仪，在机器人前方的场景上叠加一个看起来像随机红色像素静态噪声的图案。**机器人操作系统**
    (Robot Operating System) 使用一对对准该可见图案的窄视角立体摄像头来生成 3D 点云。像凯尔·麦克唐纳这样的艺术家已经成功地使用现成的组件（图
    2-4）构建了可见结构光系统，这些组件包括 **索尼 PlayStation Eye** 高速摄像头、DLP 数据投影仪以及用 **Processing**（一种开源创意编程套件，将在第
    4 章中介绍）编写的软件。如果投影仪信号和摄像头组件被改造以适应红外波段工作，在技术上有可能（尽管可能成本高昂）将这种可见结构光方法修改为不可见的结构光方法。Kinect
    正是使用这种波段的光，因此用户无法主动看到从设备发出的光。


    ![images](img/0204.jpg)

    '
- fmt: '***Figure 2-4.** Visible structured light setup pictured with a three–phase
    scanning technique. Lower frame shows resulting point cloud imagery that can be
    viewed from any angle.* Image licensed by Kyle MacDonald under Creative Commons
    Attribution 3.0 Unported.


    Kinect’s structured light approach is similar in principle to the technique used
    to scan visible light, as seen in [Figure 2-4](#Chapter02.html#fig_2_4). A projector
    transmits a signal, a camera reads the signal, and computations are made to derive
    the distance of the objects from the camera for every pixel in the resulting depth
    image. However, the implementation details of Kinect’s approach, as designed by
    PrimeSense, are unique. Instead of projecting a visible stream of changing shapes
    or bands of light, the invisible infrared laser projector generates a static cloud
    of variably intense dots in a pattern that appears to be random. An infrared laser
    striking a diffraction grating creates each of the dots by splitting the beam
    into thousands of individual points of light.


    How many dots of infrared light does Kinect project onto a scene? Some estimate
    30,000 to 300,000 dots. One curious person went through the trouble of documenting
    the pattern and reconstructing it on a grid in order to understand how the dots
    were structured. His conclusion was that a 3×3 grid is a repetition of a 211 x
    165 spot pattern, which creates an overall grid of 633 x 495 or 313,335 points
    of light in total (see [`http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/`](http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/)
    for more information).


    These dots look like random static, until you see that there is a repeating pattern
    with nine sections that make up a checkerboard. This light array is visible using
    a program like `RGBDemo`, which provides access to the IR image stream. The pattern
    is structured in a way that makes the detection of any set of dots registerable
    within the scope of the entire set – this is the essence of the architecture behind
    the PrimeSense depth sensor system ([Figure 2-5](#Chapter02.html#fig_2_5)). Because
    they are structured in such a recognizable way, the PrimeSense image processor
    chip can align these dots and make calculations based on them by comparing their
    different positions in order to create a reference image. When these cameras and
    chips are assembled into a system in the factory, all the components are calibrated
    by pointing the sensors at a wall, which are a specific distance from the device.
    The projector displays its structured pattern, and the IR camera captures an image
    that is stored on the PrimeSense chip as a registration of depth for all of the
    pixels in the image using that particular distance. For now on, this image becomes
    the reference point for calculating the distance to each pixel in a live depth
    image. The person’s face disrupts the uniform pattern and is compared to the reference
    image in a process that derives the distance to each dot on the face within centimeters.


    ![images](images/0205.jpg)


    ***Figure 2-5.** PrimeSense depth sensor architecture. Color image CMOS sensor
    and audio components, colored blue, are not required to produce a depth map. Image
    courtesy of PrimeSense.*


    A special camera that can see infrared light is required to read all of the dots.
    This is the camera behind Kinect’s far right lens ([Figure 1-6](#Chapter01.html#fig_1_6),
    D). This camera has a filter that masks the visible spectrum of light by only
    allowing infrared light to hit the light sensors behind it. If you look closely
    at this lens, you can see its iridescent green coating, which is how you can identify
    it from the visible light camera to its left. This barrier reflects all the unnecessary
    visible light that is not required for the depth calculating process, and only
    allows the infrared–projected dots to make it past the lens.


    Kinect comes with another camera that is more familiar to us. It’s a simple webcam,
    similar to what your laptop or phone might contain that captures visible light
    as red–green–blue, or RGB pixels. The PrimeSense reference devices have this camera
    as well. However, another licensee, Asus, chose not to include the RGB camera
    in their first WAVI Xtion unit. This camera is not used to generate the depth
    map, yet is included in many new depth camera units as a method of mixing visible
    light imagery and depth imagery together. Systems that combine visible light with
    depth maps are a form of volumetric camera, especially when they are assembled
    in an array of multiple RGB/depth–sensing devices. Combining an array of sensors
    can produce imagery without shadows where no depth information is stored, which
    allows for an infinite perspective on a scene without noticeable gaps behind the
    objects.


    Additionally, visible light cameras can be used for computational analysis. For
    example, computer vision recognition software, such as `OpenCV`, can be applied
    to a scene to search for faces, and be trained to associate those faces with individual
    users who are isolated from the depth map. There are a variety of existing libraries
    and methods for deriving meaningful information from RGB imagery that can be integrated
    into an application when the hardware uses this additional visible light camera.


    The following subsections describe a number of depth sensors that implement the
    structured light approach for deriving 3D scene information. They all utilize
    the PrimeSense design, but have different choices for optional internal components
    and form factors. As PrimeSense continues to license the design to more manufacturers,
    such as those producing flat screen TVs and set top boxes, developers will find
    an ecosystem of choices that can be applied to design applications based on what
    they know about Kinect. Many of these hardware manufacturers will choose to participate
    in OpenNI–compliant or other standards–based app stores, which creates opportunities
    for app developers to distribute their creations to a larger base of installed
    devices.


    #### PrimeSense Reference Design


    PrimeSense is an Israel–based company that makes the 3D–structured light technology
    that Microsoft licensed for use in Kinect. A reference design product is available
    for developers to evaluate the technology for use in new hardware, or for working
    with the `OpenNI`/`NITE` software that will be covered in subsequent chapters.
    For the scope of this book, PrimeSense’s reference design is the same as Kinect’s.
    The only differences are the lack of a motor, the need for an A/C power supply,
    and different microphone components. The `PS1080` design ([Figure 2-6](#Chapter02.html#fig_2_6))
    was the first available and is being replaced by a smaller model with a built-in
    stand. (More information is available at [`http://www.primesense.com`](http://www.primesense.com)`).`


    ![images](images/square.jpg) **Tip** The `Xtion Pro Live` manufactured by ASUS
    and mentioned in the next section is an exact implementation of the PrimeSense
    reference design. If you want an implementation of the reference design and have
    trouble getting the one from PrimeSense, the `Xtion Pro Live` is a good option.


    ![images](images/0206.jpg)


    ***Figure 2-6.** The original PrimeSense reference design, the PS1080 (top), and
    the newer design (bottom)*


    PrimeSense is the primary designer of infrared structured light systems. However,
    other hardware manufacturers produce depth imagery using alternative techniques
    that are described in upcoming section “Time–of–Flight Camera Systems”. It is
    important to remember that regardless of the design, all of these sensors generate
    a depth map that can be incorporated into software using similar principles. As
    we get to the driver section of the stack, you’ll see that there are layers of
    software that abstract out the particular hardware implementation and simply give
    you access to the 3D data regardless of the method used to generate it.'
  raw: '***Figure 2-4.** Visible structured light setup pictured with a three–phase
    scanning technique. Lower frame shows resulting point cloud imagery that can be
    viewed from any angle.* Image licensed by Kyle MacDonald under Creative Commons
    Attribution 3.0 Unported.


    Kinect’s structured light approach is similar in principle to the technique used
    to scan visible light, as seen in [Figure 2-4](#Chapter02.html#fig_2_4). A projector
    transmits a signal, a camera reads the signal, and computations are made to derive
    the distance of the objects from the camera for every pixel in the resulting depth
    image. However, the implementation details of Kinect’s approach, as designed by
    PrimeSense, are unique. Instead of projecting a visible stream of changing shapes
    or bands of light, the invisible infrared laser projector generates a static cloud
    of variably intense dots in a pattern that appears to be random. An infrared laser
    striking a diffraction grating creates each of the dots by splitting the beam
    into thousands of individual points of light.


    How many dots of infrared light does Kinect project onto a scene? Some estimate
    30,000 to 300,000 dots. One curious person went through the trouble of documenting
    the pattern and reconstructing it on a grid in order to understand how the dots
    were structured. His conclusion was that a 3×3 grid is a repetition of a 211 x
    165 spot pattern, which creates an overall grid of 633 x 495 or 313,335 points
    of light in total (see [`http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/`](http://azttm.wordpress.com/2011/04/03/kinect-pattern-uncovered/)
    for more information).


    These dots look like random static, until you see that there is a repeating pattern
    with nine sections that make up a checkerboard. This light array is visible using
    a program like RGBDemo, which provides access to the IR image stream. The pattern
    is structured in a way that makes the detection of any set of dots registerable
    within the scope of the entire set – this is the essence of the architecture behind
    the PrimeSense depth sensor system ([Figure 2-5](#Chapter02.html#fig_2_5)). Because
