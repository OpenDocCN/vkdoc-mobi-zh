  trans: '

    ![images](img/square.jpg) **注意** 由于这些显示器呈现的图像源自 2D 屏幕或投影源，它们并非真正意义上的体积显示或“全息”显示，无法让你从任意角度观察物体周围。


    佩珀尔幻象技术的一项创新应用是将单个 2D 显示器或投影源分割成多个佩珀尔幻象图层，这些图层可以叠加起来重新构建前景、中景和背景。基于这一原理，为 iPhone
    设计了一款名为 `i3dg` 的原型配件（图 9-7），它曾预计在 2012 年初投入生产。你可以在这个视频中看到它的显示效果——[`youtu.be/JnGPtVNmtvI`](http://youtu.be/JnGPtVNmtvI)——并在
    [`i3dg.mobi`](http://i3dg.mobi) 了解更多信息。


    ![images](img/0907.jpg)


    ***图 9-7.** iPhone 的 `i3Dg` 配件利用佩珀尔幻象原理，通过三块塑料面板创造了多层次的深度体验。图片由 i3Dg 提供*


    这个设计的原始模型来自于使用塑料 CD 盒；网上的其他人已经成功使用各种材料重现了这一效果。在更大规模上，使用平板电视或特殊形状的投影表面，这项技术可以创造出非常引人注目的体验，配合合适的内容或应用，能带来真正的深度感和运动视差。


    ## 多视角自动立体平板显示器


    在本章描述的所有技术中，多视角自动立体显示器是最成熟且最容易获得的技术。它们可从多家专业供应商处获得，能与现有的开发工具结合使用，其成本不像那些更具研究性和工业级别的技术那样高昂。目前，用于数字标牌应用的自动立体
    3D 显示器市场规模约为每年 2,000 到 4,000 台，这使得这些产品的价格标签保持在 5,000 美元左右。每台显示器的生产都需要大量的资源来精心制造——从为每种
    LCD 型号定制制造精密倾斜透镜阵列，到将多视角层粘合到屏幕上所需的“洁净室”环境。此外，要为屏幕提供足够多的视角，使观看体验真正令人惊叹且不引起视觉疲劳，定制内容制作和硬件要求可能相当高。主流消费者对这些屏幕的采用将大大降低成本——就像
    Kinect 对深度感知体积摄像机市场所做的那样。


    多家制造商都提供此类显示器。总部位于纽约的 `Magnetic3D` ([`magnetic3d.com`](http://magnetic3d.com))、`3DFusion`
    ([`3dfusion.com`](http://3dfusion.com)) 和 `Exceptional3D` ([`exceptional3d.com`](http://www.exceptional3d.com))
    提供不同尺寸和质量级别的九视角显示器。`Alioscopy` ([`alioscopyusa.com /`](http://alioscopyusa.com/)
    [`alioscopy.com`](http://alioscopy.com)) 使用八视角显示技术。低端显示器有四视角和五视角的，而在高端领域，由曾在飞利浦从事自动立体屏幕工作的团队创立的
    `Dimenco` ([www.dimenco.eu](http://www.dimenco.eu)) 号称拥有二十八视角系统。`Dimenco` 的方法依赖于
    2D + 深度图源材料和专用的硬件“渲染盒”，这限制了它使用原生多视角内容的潜力。`Magnetic3D` 的九视角允许一个中心通道作为参考图像，左右两侧各有四个视角，用于环绕观察物体。在倾斜透镜阵列设计中，在提供良好运动视差的视角数量与避免因塞入过多视角而导致下层像素间产生重影或串扰之间找到平衡，需要精心权衡。


    与本章讨论的任何体积显示器一样，在某些环节，你必须找出如何针对应用的多个视图或内容进行优化，以匹配显示器的物理特性。当观看者能感受到屏幕后方下凹和屏幕前方凸出的深度时，这些屏幕才能发挥最佳效果。`Magnetic3D`
    的创始人 Thomas J. Zerega 建议，内容和应用开发者可以通过遵循最佳的内容准备实践来设计充分发掘这些显示器潜力的体验，实现“真正的体积感知”。当从屏幕平面凸出的视觉资产被
    LCD 的边框边缘切断时，就会产生“窗口冲突”，这会干扰深度感知。为了避免这种体验，程序员可以创建应用内物理机制，通过设计来避免此类瑕疵。你也可以利用这一效果，通过为显示区域添加黑边（即在屏幕上的内容周围放置黑色边框）来发挥其优势。这样一来，当一个物体要从屏幕中出来时，它可以突破数字黑边——达到出色的弹出效果——而不会被显示器边缘的硬物理“边框”切断。


    ## 激光等离子体发射显示器


    如果你追求的是将图像悬浮在空中而非固定在屏幕上的想法——那么脉冲激光在自由空间中发出的噼啪声光芒会让你兴奋。日本产业技术综合研究所 ([`bit.ly/plasmaemission`](http://bit.ly/plasmaemission))
    与庆应义塾大学和 Burton 公司合作，推动使用激光在空气分子中发光的技术，实现了一种无需云雾等生成介质的真正体积显示器。


    这类显示器的工作原理在两个层面上令人着迷。首先，它展示了动态显示器的实时演示，其性能与本章开头提到的静态塑料蚀刻激光的可变点能力相匹配。这非常棒，因为该机制不受必须遵守的固定体素网格的限制。这与其它静态或扫描显示器形成对比，后者被锁定在像素或
    LED 的边界内。


    第二个令人感兴趣的点是，有启发将用于聚焦激光束的光学技巧应用到其他类型的显示器光学器件上。在 z 轴上移动的扩散透镜和在 x 与 y 平面上调制的第二光学器件的组合，可能在本章概述的其他方法中得到应用。随着人们对真正体积显示器的兴趣日益增长，我们必将看到这些技术的融合与匹配，带来更多突破。请关注
    Burton 公司 ([`burton-jp.com`](http://burton-jp.com)) 以获取这项技术的更多进展。他们最新的显示器演示能在空间中每秒显示
    50,000 个体素点。观看视频 [`youtu.be/EndNwMBEiVU`](http://youtu.be/EndNwMBEiVU) 和 [`youtu.be/KfVS-npfVuY`](http://youtu.be/KfVS-npfVuY)
    来了解它的实际效果。

    '
- fmt: '### Free-space Aerosol Displays


    Molecules that float in air—sprayed water, dense fog, and fine mist—can be used
    as a medium for projection with stunning results. The commercial products that
    fall into this category tend to be based on 2D source material, so their degree
    of true volumetricness is owing to the illusion that a borderless volume of space
    contains a floating slice of imagery without the traditional boundaries of a screen.
    However, in custom engineered setups with multiple sources of imagery and clever
    manipulations of in-air particles, anything is possible.


    ![images](images/square.jpg) **Note** You can view an excellent image from "In
    the Evening at Koi Pond" at:

    [`http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG`](http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG).


    The market for this type of display is often stage shows or big events with an
    array of unique lighting of which an in-air display is one part of the larger
    experience. At the World''s Fair EXPO 2005 in Japan, I witnessed a remarkable
    use of this technique in Robert Wilson''s "In the Evening at Koi Pond". This system
    combined projections on giant solid objects floating in a pond with multiple projections
    in fountain mist that floated hundreds of feet in the air. The use of free space
    projection was reserved for moments when a certain character would appear or other
    accents to the main choreography took place. This gave those moments jaw-dropping
    impact. Therefore in an installation or performance situation, consider the use
    of the techniques described in this chapter in combination for best effect.


    #### The IO2 Heliodisplay


    The IO2 Heliodisplay (`www.io2technology.com`) uses ambient air passed through
    a series of thermal controlled metal plates to create a sheet of ultrafine invisible
    articles that jet out from the unit. At less than 10 microns, the semi-invisible
    atomized water particles are similar to human breath when exhaled. Therefore,
    there is no visible fog or heavy moisture from this unique design in contrast
    to other approaches. Used in combination with a high-powered 4500 lumen projector,
    optimized for a rear projection setup and this air stream, a visible image can
    be seen to hang in the air a distance from the unit ([Figure 9-8](#Chapter09.html#fig_9_8)).
    The unit costs US $48,000 for the base model, and US $68,000 for an interactive
    unit.


    ![images](images/0908.jpg)


    ***Figure 9-8.** Heliodisplay embedded in a table and various orientation options.
    Image i2o Technologies*


    An upright configuration, which can be hidden in a wall, casts the air stream
    out horizontally and can be tall enough to project an image of a life-sized human.
    A table-mounted unit sends the air stream up vertically with the effect of an
    image floating above the surface. The unit can also be hung upside down and send
    the screen out in virtually any direction on special order. The trick is to design
    content with a black background and hide all of the physical components, as well
    as the projector and the heliodisplay unit, so all that is seen is the floating
    imagery. The system does not work with a front projection or short throw projector,
    so you''ll need to configure this in such a way that you can place the projector
    about five feet behind it. A small tank filled with tap water allows the unit
    to run for a couple of days to a week, depending on its settings; a special disk
    needs to be replaced every six months to a year. It can even be used outdoors—but
    you''ll need an environment without too much wind, as wind will distort the image.
    Speaking of distortion, don''t expect this to look as clear and crisp as a flatscreen
    normal projection TV. If you look closely at the product images, you can see that
    a streaking effect is noticeable. As with any technology, it''s best to consider
    how to leverage limitations in a way that makes them look like advantages, perhaps
    working the streaks and wavy flow of the screen into an aesthetic that fits the
    application.


    #### The FogScreen Display


    If you don''t need something up close and personal, and instead want to go larger
    than life for the stage—look no further than the FogScreen (`fogscreen.com`) from
    Finland ([Figure 9-9](#Chapter09.html#fig_9_9)). Their units use a laminar airflow
    process to create a thin screen made of water in the form of visible fog, and
    ultrasonic waves. Their entry-level unit, the FogScreen EZ, is priced under US
    $30,000 and unlike the Heliodisplay, is available to rent worldwide. The FogScreen
    Pro can be connected in series for variable scale installations and is available
    for order by the meter starting at US $33,000 for one meter, US $100,000 for four
    meters, and US $175,000 for eight meters, with a variety of prices in between.


    ![images](images/0909.jpg)


    ***Figure 9-9.** FogScreen projections at E3 conference.* Photo by wili_hybrid.


    The FogScreen gets a great deal of use in stage lighting and event displays, whereas
    the i2o unit is more suited for intimate settings at a smaller scale. In contrast
    to the floor- and wall-mounted Heliodisplay, the Fogscreen works in one orientation—from
    above. This allows the unit to be hidden out of the way along with its projector
    attached to the ceiling. Because the light scatters rather than reflects from
    the particles in the air, the FogScreen must also be used in a rear projection
    capacity. This property could be used to your advantage, as some researchers have
    experimented with two projectors pointing at either side of the screen to show
    a different image, giving a sense of 3D. The FogScreen has controls to change
    the level of opacity in the screen. That means you can use it for a "reveal" effect
    of someone coming out from behind a curtain of projection, or make it transparent
    enough to appear floating in air with no edges.


    One especially promising technique relies on the fact that dispersion of light
    through fog has directionality. At the Interaction 2011 conference, researchers
    from Osaka University used a three-projector setup pointed at a cylinder of fog
    to demonstrate different images of a 3D object based on different angles of view,
    satisfying motion parallax. Remarkable video of this innovative technique can
    be seen at [`http://youtu.be/yzIeiyzRLCw`](http://youtu.be/yzIeiyzRLCw). The use
    of multiple projectors to satisfy multiple views into a scene is the basis for
    light field-based displays.'
  raw: '### Free-space Aerosol Displays


    Molecules that float in air—sprayed water, dense fog, and fine mist—can be used
    as a medium for projection with stunning results. The commercial products that
    fall into this category tend to be based on 2D source material, so their degree
    of true volumetricness is owing to the illusion that a borderless volume of space
    contains a floating slice of imagery without the traditional boundaries of a screen.
    However, in custom engineered setups with multiple sources of imagery and clever
    manipulations of in-air particles, anything is possible.


    ![images](images/square.jpg) **Note** You can view an excellent image from “In
    the Evening at Koi Pond” at:

    [`http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG`](http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG).


    The market for this type of display is often stage shows or big events with an
    array of unique lighting of which an in-air display is one part of the larger
    experience. At the World''s Fair EXPO 2005 in Japan, I witnessed a remarkable
    use of this technique in Robert Wilson''s “In the Evening at Koi Pond”. This system
    combined projections on giant solid objects floating in a pond with multiple projections
    in fountain mist that floated hundreds of feet in the air. The use of free space
    projection was reserved for moments when a certain character would appear or other
    accents to the main choreography took place. This gave those moments jaw-dropping
    impact.Therefore in an installation or performance situation, consider theuse
    of the techniques described in this chapter in combination for best effect.


    #### The IO2 Heliodisplay


    The IO2 Heliodisplay (www.io2technology.com) uses ambient air passed through a
    series of thermal controlled metal plates to create a sheet of ultrafine invisible
    articles that jet out from the unit. At less than 10 microns, the semi-invisible
    atomized water particles are similar to human breath when exhaled. Therefore,
    there is no visible fog or heavy moisture from this unique design in contrast
    to other approaches. Used in combination with a high-powered 4500 lumen projector,
    optimized for a rear projection setup and this air stream, a visible image can
    be seen to hang in the air a distance from the unit ([Figure 9-8](#Chapter09.html#fig_9_8)).
    The unit costsUS $48,000 forthe base model, and US$68,000 for an interactive unit.


    ![images](images/0908.jpg)


    ***Figure 9-8.** Heliodisplay embedded in a table and various orientation options.
    Image i2o Technologies*


    An upright configuration, which can be hidden in a wall, casts the air stream
    out horizontally and can be tall enough to project an image of a life-sized human.
    A table-mounted unit sends the air stream up vertically with the effect of an
    image floating above the surface. The unit can also be hung upside down and send
    the screen out in virtually any direction on special order. The trick is to design
    content with a black background and hide all of the physical components, as well
    as the projector and the heliodisplay unit, so all that is seen is the floating
    imagery. The system does not work with a front projection or short throw projector,
    so you''ll need to configure this in such a way that you can place the projector
    about five feet behind it. A small tank filled with tap water allows the unit
    to run for a couple of days to a week, depending on its settings; a special disk
    needs to be replaced every sixmonths to a year. It can even be used outdoors—but
    you''ll need an environment without too much wind, as windwill distort the image.
    Speaking of distortion, don''t expect this to look as clear and crisp as a flatscreen
    normal projection TV. If you look closely at the product images, you can see that
    a streaking effect is noticeable. As with any technology, it''s best to consider
    how to leverage limitations in a way that makes them look like advantages, perhaps
    working the streaks and wavy flow of the screen into an aesthetic that fits the
    application.


    #### The FogScreen Display


    If you don''t need something up close and personal, and instead want to go larger
    than life for the stage—look no further than the FogScreen (fogscreen.com) from
    Finland ([Figure 9-9](#Chapter09.html#fig_9_9)). Their units use a laminar airflow
    process to create a thin screen made of water in the form of visible fog, and
    ultrasonic waves. Their entry-level unit, the FogScreen EZ, is priced under US
    $30,000 and unlike the Heliodisplay, is available to rent worldwide. The FogScreen
    Pro can be connected in series for variable scale installations and is available
    for order by the meter starting at US $33,000 for one meter, US $100,000 for four
    meters, and US $175,000 for eight meters, with a variety of prices in between.


    ![images](images/0909.jpg)


    ***Figure 9-9.** FogScreen projections at E3 conference.*Photo by wili_hybrid.


    The FogScreen gets a great deal of use in stage lighting and event displays, whereas
    the i2o unit is more suited for intimate settings at a smaller scale. In contrast
    to the floor- and wall-mounted Heliodisplay, the Fogscreen works in one orientation—from
    above. This allows the unit to be hidden out of the way along with its projector
    attached to the ceiling. Because the light scatters rather than reflects from
    the particles in the air, the FogScreen must also be used in a rear projection
    capacity. This property could be used to your advantage, as some researchers have
    experimented with two projectors pointing at either side of the screen to show
    a different image, giving a sense of 3D. The FogScreen has controls to change
    the level of opacity in the screen. That means you can use it for a “reveal” effect
    of someone coming out from behind a curtain of projection, or make it transparent
    enough to appear floating in air with no edges.


    One especially promising technique relies on the fact that dispersion of light
    through fog has directionality. At the Interaction 2011 conference, researchers
    from Osaka University used a three-projector setup pointed at a cylinder of fog
    to demonstrate different images of a 3D object based on different angles of view,
    satisfying motion parallax. Remarkable video of this innovative technique can
    be seen at [http://youtu.be/yzIeiyzRLCw](http://youtu.be/yzIeiyzRLCw). The use
    of multiple projectors to satisfy multiple views into a scene is the basis for
    light field-based displays.'
  trans: '

    ### 自由空间气态显示器


    悬浮在空气中的分子——例如喷洒的水雾、浓雾和细密薄雾——可作为投影介质，呈现出令人惊叹的效果。市面上此类商用产品通常基于二维素材，因此其真实的立体程度得益于一种错觉：无边界的空间区域中悬浮着没有传统屏幕边界的浮动影像切片。然而，在定制工程化配置中，通过多图像源与对空气中粒子的巧妙操控，一切皆有可能。


    ![images](img/square.jpg) **注意** 您可以在以下链接中欣赏到来自《锦鲤池畔的黄昏》的精彩图像：

    [`http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG`](http://commons.wikimedia.org/wiki/File:In_the_Evening_at_Koi_Pond_in_Expo_2005.JPG)。


    此类显示器的市场通常面向舞台演出或大型活动，这些场合配备一系列独特灯光，而空中显示器只是整体体验的一部分。在日本 2005 年世界博览会（EXPO 2005）上，我亲眼目睹了罗伯特·威尔逊（Robert
    Wilson）的《锦鲤池畔的黄昏》中这项技术的卓越应用。该装置将投射在漂浮于池塘的巨型固体物体上的影像，与投射在漂浮于数百英尺高空的喷泉雾中的多组影像相结合。自由空间投影技术被精心保留在特定角色出现或主舞蹈编排中的其他点睛时刻，从而赋予这些瞬间令人瞠目结舌的震撼力。因此，在装置艺术或表演场景中，建议结合使用本章所述的技术，以达到最佳效果。


    #### IO2 Heliodisplay


    IO2 Heliodisplay（`www.io2technology.com`）利用环境空气通过一系列热控金属板，产生一层从设备中喷射而出的超细不可见粒子。这些小于
    10 微米的半不可见雾化水粒子，类似于人体呼出的气息。因此，与其他方法相比，这种独特设计不会产生可见雾气或大量湿气。配合一台专为后投影设置和该气流优化的高功率
    4500 流明投影仪，即可在设备前方一定距离的空气中看到悬浮的可见图像（图 9-8）。该设备基础型号售价 48,000 美元，互动型号售价 68,000 美元。


    ![images](img/0908.jpg)


    ***图 9-8.** 嵌入桌面的 Heliodisplay 及其多种朝向选项。图片由 i2o Technologies 提供*


    直立配置可隐藏于墙壁中，将气流水平向外喷射，高度足以投射出真人大小的影像。桌面安装的设备则将气流垂直向上喷射，使图像悬浮于表面之上。设备还可倒置安装，通过特殊定制向几乎任何方向投射屏幕。关键在于设计内容时使用黑色背景，并隐藏所有物理组件、投影仪及
    heliodisplay 设备，使观众仅能看到悬浮影像。该系统不适用于前投影或短焦投影仪，因此您需要将投影仪放置在设备后方约五英尺（约 1.5 米）处。一个装满自来水的小水箱可使设备根据设置连续运行数天至一周；每隔六个月到一年需更换一次专用滤芯。该设备甚至可在户外使用——但环境需避免强风，否则风会扭曲图像。说到扭曲，请勿期望其清晰度能达到平板电视或普通投影电视的水平。仔细观察产品图片，您会发现明显的拖尾效应。与任何技术一样，最佳策略是思考如何将局限性转化为优势，或许将屏幕的条纹与波动流畅感融入与应用程序相匹配的美学中。


    #### FogScreen 显示器


    如果您不需要近距离且私密的效果，而是希望在舞台上呈现超越现实的大型影像——来自芬兰的 FogScreen（`fogscreen.com`）便是理想之选（图
    9-9）。其设备利用层流气流工艺，结合超声波，将水转化为可见雾气状薄屏。其入门级型号 FogScreen EZ 定价低于 30,000 美元，与 Heliodisplay
    不同，可供全球租赁。FogScreen Pro 可串联使用以实现可变规模的装置，按米订购：一米起价 33,000 美元，四米 100,000 美元，八米 175,000
    美元，中间尺寸价格各异。


    ![images](img/0909.jpg)


    ***图 9-9.** E3 会议上的 FogScreen 投影。* 图片由 wili_hybrid 拍摄。


    FogScreen 大量应用于舞台灯光和活动展示，而 i2o 设备则更适合小规模亲密场景。与可安装于地面和墙壁的 Heliodisplay 不同，FogScreen
    仅有一种朝向——自上而下。这使得设备及其附带的吸顶安装投影仪可以隐藏于视线之外。由于光线是散射而非反射自空气中的粒子，FogScreen 也必须采用后投影方式。这一特性可转化为优势，例如有研究人员曾尝试用两台投影仪分别指向屏幕两侧，投射不同影像，从而营造出
    3D 立体感。FogScreen 配备可调节屏幕不透明度的控制器。这意味着您可以使用它实现“揭开帷幕”的效果，让人物从投影幕布后显现；或将其调至足够透明，使影像看似无边界地悬浮在空气中。


    一项特别有前景的技术利用了光在雾中传播具有方向性的特性。在 2011 年的 Interaction 大会上，大阪大学的研究人员使用三台投影仪指向一个雾柱，根据不同视角展示同一
    3D 物体的不同影像，从而满足运动视差需求。这项创新技术的精彩视频可在[`http://youtu.be/yzIeiyzRLCw`](http://youtu.be/yzIeiyzRLCw)观看。利用多台投影仪满足对场景的多视角观察，正是光场显示技术的基础。

    '
- fmt: '### Projected Light Field Arrays


    An area of volumetric imaging currently receiving much attention relates to the
    use of an array of projectors to recreate multiple views of a scene onto a diffused
    light filter. The general idea is that, the more projectors you can add at more
    angles, the better you can recreate the original light field of a 3D scene. Therefore,
    when the viewer observes the scene through a special diffuser film, the movement
    of the viewer''s head through the viewing angle will stimulate the motion parallax
    required to provide the sensation of viewing a 3D scene. With the advent of low
    cost projectors, including pico class devices of diminutive size, this approach
    is much more financially feasible then it would have been only a few years ago.


    The projected light field approach is applied to produce a novel effect in `fVisiOn`—floating
    3D vision on the table—a research project from Shunsuke Yoshida at Japan''s National
    Institute of Information and Communications Technology. The intent of this project
    is to create a display that doesn''t interfere with the workspace of a table,
    but instead allows for the comingling of real 3D objects and virtual ones.


    ![images](images/square.jpg) **Note** You can learn more and watch a video at
    the project''s website: [`http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html`](http://mmc.nict.go.jp/people/shun/fVisiOn/fVisiOn.html).


    Instead of implementing a standard planar sheet to combine the projected light
    into a cohesive 3D image, the `fVisiOn` approach relies on a cone shaped screen.
    As seen in [Figure 9-10](#Chapter09.html#fig_9_10), the display is made up of
    an array of pico projectors all pointed inward in a circle onto the cone. The
    white dots of light visible in the upper right hand image show the densely packed
    ring of projectors. Two layers of filtered material are placed on top of the cone
    to increase the contrast in the image.


    ![images](images/0910.jpg)


    ***Figure 9-10.** The `fVisiOn` display deconstructed. Upper left shows the cone
    shaped diffuser and pico projector at one angle; upper right shows dozens of projectors
    in place, appearing as dots of light; lower left and right show two layers of
    filters that increase the contrast in the image to produce a floating digital
    object.*


    While the `fVisiOn` provides insight into how light field displays can be used
    on a small scale, many are eager to know how volumetric 3D experiences will scale
    up to bring voxies to the big screen of a theatre. The answers may lie in a series
    of innovation initiatives spearheaded by the European Union. Three projects: `HOLOVISION`
    ([www.holovisionproject.org](http://www.holovisionproject.org)), `OSIRIS` ([www.osiris-project.eu](http://www.osiris-project.eu)),
    and `COHERENT` ([www.coherentproject.org](http://www.coherentproject.org)) were
    established to position European countries and companies as the leading pioneers
    of holographic media capture, transmission, and display. The primary integrator
    for these technologies is a Hungarian company called `Holographika` ([www.holografika.com/](http://www.holografika.com/)).


    Through the use of roughly 100 projectors focused on a diffusion screen, `Holographika`''s
    displays recreate a light field to provide a discreet view into a scene, dependent
    on each viewer''s position with regard to the screen. This technique is similar
    to the efforts from Osaka University researchers with fog, the difference being,
    this company now has units in production ready to be rented or purchased. It''s
    fitting that a Hungarian company achieved this marvel, as it was, in fact, a Hungarian
    scientist who invented the field of holography.


    While the products from `Holographika` are not priced for consumers, ranging from
    US $45,000–150,000, they''ve set the bar very high and will provide a reference
    spec by which to judge future solutions. For home and office usage, the rear projection
    models appear visually similar to early widescreen TVs before plasma and LCD.
    In order to pack all the projectors inside, there needs to be enough depth to
    bounce the images onto the screen. However, the more breathtaking innovation lies
    in the front projected solution for large scale theatre environments([Figure 9-11](#Chapter09.html#fig_9_11)).


    ![images](images/0911.jpg)


    ***Figure 9-11.** `HoloVizio` C80 by `Holographika`


    The `HoloVizio C80` has ushered in the age of volumetric 3D movie theatres, what
    people may one day call the voxies for short. This isn''t science fiction. The
    `C80` unit is currently being demonstrated in trade shows around the world. Where
    traditional movie theatres have one projector, or perhaps two for stereoscopic
    3D, `Holographika`''s technique employs upwards of 80 projectors. Presently, the
    maximum-sized screen is around 140" wide—large enough for a small indie theatre.
    Now, we just need a new generation of storytellers to kick start the voxie business
    with volumetric motion pictures that take advantage of this disruptive innovation.
    Which would you pay more for—a night out at the movies or the voxies?


    ## Where Do We Go From Here?


    Working on this book has meant a lot to each of us. In the Kinect, we see a wonderful
    device that can be used for creative expression. We also see a device and technology
    that is capable of changing the way we put technology to work in our daily lives.
    At first, the Kinect and its skeleton-tracking technology are all about games
    and cool art projects. But it doesn''t end there. The underlying technology has
    profound implications on how people and technology interact. In this Afterword,
    we each offer a few final thoughts on the impact of the technology and where it
    might take us in the future.'
