- fmt: '### Jonathan C. Hall


    If you''re reading this, I can assume that you at least find Microsoft''s Kinect
    and other Kinect-like sensors to be intriguing. If you were born in the last millennium
    and don''t take every technological feat for granted, you might even agree that
    these devices are pretty amazing. But are they revolutionary? I don''t have the
    answer, but I can tell you where I''m looking for this technology to support social,
    cultural, and economic change—for better and worse—and it''s not in the living
    room. It''s in public and quasi-public spaces.


    A touch-free computer interface has a certain utility that''s inherent in its
    touchlessness. For example, a touch-free interface is more hygienic and therefore
    offers clear advantages if used in hospitals and doctor''s offices, in clean rooms,
    operating rooms, and rest rooms. A touch-free interface can also empower even
    vertically-challenged people like me (I''m 5′9″… okay 5′8″… on my tippy toes)
    to intuitively manipulate arbitrarily large media for experiences in immersive
    entertainment, art, education, or marketing. A touch-free interface can even initiate
    "passive" interaction by responding to where and how many people are situated
    in a given space and providing intelligent, contextual feedback. much like the
    "ubiquitous computing" scenarios envisioned by the legendary Xerox PARC scientist
    Mark Weiser among others.


    There remain, of course, significant barriers to our realization of these benefits.
    For example, I was mortified by my very first Kinect experience when, after a
    vigorous round of `Kinect Adventures`, I was presented with pictures of myself
    caught in compromising poses. As my Xbox threatened to post them to Facebook.
    I shrieked, “Noooooooooo!” and dove to yank the plug out of the wall. Who''s going
    to be caught dead gesticulating like a moron anywhere *but* their living room?


    Ten years ago, I might''ve asked, equally incredulous, “Who''s going to be caught
    dead having a messy breakup with their significant other over the phone on a crowded
    train?” And yet, this genre is a staple in the soundtrack of commuter life in
    major metropolitan areas. The point is our cultural rules and habits do change
    in the wake of technological innovation and adoption: witness the mobile phone.


    I believe that people will grow accustomed to a certain constrained repertoire
    of motion-controlled interactions with public screens over time. Part of that
    evolution is cultural, but part of it is in the technology itself or, more specifically,
    in the design of applications. Applications for touch-free interfaces in public
    spaces will necessarily be less physically demanding than `Kinect Adventures`
    or most Xbox games, and will be more like the Xbox dashboard, intended for quick,
    casual, mostly utilitarian interaction. My work on `Sensecast` (see [Chapter 3](#Chapter03.html#ch3))
    is designed to support just this level of engagement: check in for a meeting in
    the lobby, browse some information relevant to your health at the doctor''s office,
    grab the full text of a news story on your phone, and go. (Of course, it''s far
    too early in the lifecycle of this work to say that we are doing it right.)


    Like our willingness to post our “status” publicly on Facebook or to “check in”
    at a Starbucks, our interactions with public screens have the potential to create
    whole new ecosystems of cultural and economic value, as well as exploitation,
    as we''ll see below. My hope is that we can steer this potential toward the good:
    to transform public spaces into more sociable places through shared media that
    orchestrates our interaction not only with computers but with each other. Our
    collective habit today is one of passive, solitary media consumption. Smart filters,
    niche blogs, and micro-blogging let us tailor our media diets to only our own
    interests. So-called social and mobile apps, meanwhile, isolate us from our geographic
    communities by channeling our attention away from them. Imagine Kinected applications
    that get us on our feet in common spaces, meeting our neighbors, permeating our
    day-to-day lives. Imagine:


    *   8:00 a.m. On the train platform, commuters gather around a display that bears
    headlines and photos from a town council meeting the night before. One reads:
    “Youth Center to Go to Referendum.” The display polls the surrounding audience
    for a literal thumbs-up or thumbs-down on this decision, records their gestures,
    and collects/displays the aggregate town sentiment. Before you board the train,
    you can beam the full story to your mobile phone.

    *   3:00 p.m. High school student council members meet in the public arcade with
    signs urging action on the town''s stalled youth center project. They hold the
    signs up to a community display, where an onboard Kinect recognizes their activity
    and snaps a photo, distributing the image across a town-wide network.

    *   7:00 p.m. A chime sounds in a crowded café, and a ceiling-mounted digital
    display starts showing quiz questions about local data: Did the crime rate go
    up or down this year? What percent of the town budget goes to education? How much
    does the average family pay in property taxes? Onlookers are able to "buzz in"
    by mimicking a game-show push-button with two hands. The display then selects
    and follows whomever buzzed in first, allowing him/her to choose an answer on
    screen.


    While I''ve given my examples a decidedly civic cast to make a point, a much broader
    set of applications and games will no doubt be unleashed upon our public spaces
    by creative technology companies, advertisers, non-profits, and government entities
    in the years to come. Some will be good and some bad. But the potential is there
    is to create real value for people by delivering rich experiences, critical information,
    and spontaneous play around the shared interests and spaces of real, not virtual,
    communities. By designing for public and quasi-public spaces, developers of Kinected
    applications can explore a new era of real, not virtual, social and location-based
    media.


    The first application for `Sensecast` was a news browser placed just outside a
    Columbia Journalism School café in a semi-public building with high foot traffic.
    It encouraged passers-by to read a given story lede, and if so moved, to “like”
    it with a thumbs-up gesture. Why? Our historian colleagues at the J School note
    that before 1900, people didn''t read newspapers alone but rather aloud with friends
    and strangers gathered around. If philosopher Jürgen Habermas is to be believed,
    this socio-political dimension of public life, now lost to history, can support
    a more vital democracy. Perhaps with shared, Kinected news displays that persuade
    us to also connect with each other, we can resuscitate it.


    Maybe. But maybe not. Privacy is a holy term in the American and European lexicons
    and publicity a suspect one (consider the words “publicity stunt,” “publicity
    whore,” etc.). The humanist geographer Yi-Fu Tuan points out that, in the ancient
    Greek world, these poles were reversed: privacy is related to the Greek word for
    idiot, as purely private folk were considered to be like shut-ins not fit for
    any role in society. Meanwhile, the lofty peaks of human flourishing were reserved
    for those willing to roll out to the agora, to make themselves known, to act on
    a public stage. In most of the modern world, however, privacy is king.


    Still, the jury on publicity is not yet in. We tack between obliviousness to the
    tools of surveillance (security cameras, browser cookies, social networks, etc.)
    and a justified paranoia about them. As I wax euphoric about the potential of
    Kinect-like cameras to transform public space for the better, no doubt some of
    you are growing duly uncomfortable with the level of surveillance that''s entailed—or,
    at least, enabled.


    I consider these concerns, as I''ve said, “justified paranoias.” While I freely
    refer to the Kinect as a “camera,” you will note that Microsoft and device manufacturers
    in the space explicitly do not. They diligently assert their preferred term: “sensor.”
    That choice is a conscious marketing decision intended to make vague the data
    that the device collects. As you''ve seen throughout this book, these “sensors”
    that we''ve willingly invited into our homes are powerful cameras capable of passively
    collecting quite a bit of intimate detail about us, our dimensions, our homes,
    and our families. We know from patent filings that as Microsoft rolls out live
    TV service on its Xbox platform—replacing cable''s set-top box—the company is
    integrating Kinect into systems for parental control and advertising. The Kinect
    not only provides you a convenient remote control that you will never lose again,
    it provides Microsoft and its partners a rich profile of you and realtime data
    on who''s watching. We''re all Nielsen families now!


    This all may seem creepy. Do we just accept as true the dystopian aphorism promulgated
    by Napster creator Sean Parker in a recent talk at the 2011 Web 2.0 Summit in
    San Francisco–“Today''s creepy is tomorrow''s necessity”?


    Again, I don''t have the answer. I''ve chosen to focus my work on Kinected applications
    for public spaces, a domain that *seems* less frought with privacy concerns than
    whatever the likes of Microsoft, Apple, Google, and Facebook might be doing with
    our “private” data. This domain is not free of concern, of course. Consider that
    3D-hinted facial recognition algorithms are probably an order of magnitude more
    robust than their straight 2D counterparts. Deploying Kinects widely in public
    space could conceivably spell the end to anonymity in public. Of course, that
    outcome is a ways off and possibly intractable, as ownership of physical space
    is not nearly as consolidated as ownership of, say, mobile platforms, thus preventing
    any one party from owning all the data. But is it technologically possible? Yes.


    In any case, there is clearly a non-trivial trade-off to be made when weighing
    the values of privacy and publicity. Companies and individuals have built amazing
    products and made them available to us for free or at low cost in exchange for
    a share of our privacy. And indeed, like the ancient Greeks, we may stand to gain
    something ourselves by living more public lives. We also stand to be exploited
    and sold as “eyeballs,” or now “skeletons.” No doubt the Kinect and the ecosystem
    of companies and developers building with it will stretch concepts of privacy
    and publicity in new directions. You, by picking up this book and doing with it
    whatever you do with it, are part of that vanguard. Please Kinect responsibly.


    --Jonathan Hall'
