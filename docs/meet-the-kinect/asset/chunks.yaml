    ### 需要更多？


    在本章中，我们努力为使用微软 Kinect SDK 构建应用程序所需的所有工具提供了详细介绍，但显然，所展示的应用程序相当基础：我们只使用了 Kinect
    的摄像头和深度功能（甚至没有涉及音频），以及开箱即用的用户分割骨骼追踪功能。


    还有很多事情可以做，如果微软的工具集吸引你，毫无疑问你会想做得更多！这超出了本书的范围，但 Coding4Fun 网站和开放网络上不断增长的示例代码可供你参考，其中许多代码针对特定任务和用例。四处搜索，订阅论坛，并关注微软，因为在最初缓慢支持
    Kinect 开发者之后，他们现在正全力推进！


    ![images](img/square.jpg) **注意** 要更深入地了解微软 Kinect SDK，最好的方法是获取 Jarrett Webb 和
    James Ashley 的著作 *Beginning Kinect Programming*。该书也由 Apress 出版。


    ## 第 9 章


    ## 体三维显示技术


    在本章中，你将熟悉用于视觉图像体三维显示的各种技术。与传统的 2D 屏幕，甚至是最新的基于眼镜的立体 3D 电视和影院体验不同，体三维技术为观看者提供了“全息”图像的感觉，并根据用于在自然
    3D 空间中重建显示的技术，提供不同程度的运动视差。运动视差描述的是基于观察者相对于背景中多个静止物体的运动来感知深度的能力。信不信由你，许多人实际上无法感知立体眼镜带来的
    3D 效果，因为他们的大脑缺乏完整的立体视觉发育。为什么这些人不会撞到东西？这是因为你头部的每一次轻微移动都会揭示周围环境的深度。这一在任何大众市场 3D
    解决方案中都尚未实现的功能，正是这种新颖方法区别于基于眼镜体验的关键所在。


    也许科幻领域最著名的体三维显示实际例子来自最初的《星球大战》电影，当时 R2D2 播放了莱娅公主告诉欧比旺·克诺比他是她唯一希望的录像。深度感知摄影技术，例如
    Kinect，可以有效捕捉“全息”或体三维视频记录，但并不提供将其回放到体三维 3D 空间的方法。体三维显示器是将这些“全息”体验投射回日常生活维度的关键。在很大程度上，这些显示器仍处于研究前沿，且价格高得令人望而却步，消费者无法在家中体验，今年它们还不会进入你的客厅——但技术进步的节奏会出人意料地飞跃，正如
    Kinect 向我们展示的那样。


    本章将涵盖新颖显示器类型的全貌，包括那些严格符合体三维显示器的类型，以及许多不符合的类型。它将涵盖那些包含关键特性（如运动视差和屏幕上的多视角）的显示器，以及一些虽然不具备这些特性却仍被公众误称为“全息”的显示器，因为它们的图像悬浮在空中。这是对许多人不熟悉的显示技术的介绍，因为互联网上关于该主题的较新信息收集得很少。这些创新的方法未来很可能会更频繁地出现，也许会相互结合，以满足公众的需求——他们已通过
    Kinect 的体三维摄像头受到了启发，并将期望在真正沉浸式的体验中获得超越 2D 屏幕的东西。

    '
- fmt: '### Static Volume Displays


    If you''ve been through any major American mall or tourist area in the past couple
    of years, you''ve likely seen the novelty service that takes a 3D portrait photo,
    which then gets etched into a clear plastic prism ([Figure 9-1](#Chapter09.html#fig_9_1)),
    a process known as sub-surface laser engraving. While this isn''t a volumetric
    display that can be updated, it provides a reference point for understanding the
    first class of displays known as *static volume* displays.


    ![images](images/0901.jpg)


    ***Figure 9-1.** A Sub-Surface Laser Engraving. Image courtesy LooxisFL.com*


    For a volumetric display that can come to life and change like video in realtime,
    we''ll need to look at ways to turn colored light on and off for a volume of interest
    instead of simply having an image statically etched in place. A straightforward
    way to accomplish this is through the use of LEDs in a cube formation, wherein
    each single Light Emitting Diode acts as a voxel. [Figure 9-2](#Chapter09.html#fig_9_2)
    shows such a device. It is built by eight-year-old Joey Hudy who is the driving
    force behind the site "Look What Joey''s Making" at [`http://lwjm.us/`](http://lwjm.us/).
    Joey builds the LED display shown in [Figure 9-2](#Chapter09.html#fig_9_2) for
    sale. Visit his website to order yours today.


    ![images](images/0902.jpg)


    ***Figure 9-2.** Arduino shield for a 3 × 3 × 3 LED display by eighth grader,
    Joey Hudy, courtesy of lwjm.us*


    One of the largest commercially available displays of this type has an array of
    `66×48×24` LED lights and is created by Seekway ([http://seekway.com.cn](http://seekway.com.cn)).
    That''s `76,032` individual lights that need to be wired up in a circuit and individually
    addressed with a microprocessor. The unit is roughly 6 feet tall, 1.5 feet deep
    and 3 feet wide. It costs many thousands of dollars.


    ![images](images/square.jpg) **Note** For the hobbyist who''d like to create their
    own simple LED display, two great resources are from articles at Instructables.com.
    One is for creating an `8×8` cube: [`www.instructables.com/id/Led-Cube-8x8x8/`](http://www.instructables.com/id/Led-Cube-8x8x8/)
    and the other is a bit simpler, for creating a `4×4×4` LED cube: [`www.instructables.com/id/LED-Cube-4x4x4/`](http://www.instructables.com/id/LED-Cube-4x4x4/).
    And, of course, do not forget Joey Hudy''s site at [`http://lwjm.us/`](http://lwjm.us/).


    ### Projection onto Static Volumes


    A very clever technique to overcome the need to electrically wire up individual
    lights to a gridded out cube is to simply project light onto a reflective material
    at that volume of interest in space. Albert Hwang, Matt Parker, and Elliot Woods
    created Lumarca, an open source design project ([Figure 9-3](#Chapter09.html#fig_9_3)),
    to accomplish this through the hanging of hundreds of strings in a very special
    way so that a projector can be pointed into the mesh with extraordinary results.
    With custom software for calibration and very precise positioning of an SVGA (`1024
    × 768`) projector into the string array, each string can be individually addressed
    with light, regardless of where it resides in space—at the front of the volume,
    at the back, and anywhere in between and side to side. Every string must be carefully
    placed so as not to obscure the projector beam from hitting another string behind
    it.


    The details of how to construct one of these on your own for less than US$100
    are on the project''s website at [http://madparker.com/lumarca/construction](http://madparker.com/lumarca/construction).
    At the New York MakerFaire 2011, the team debuted a pico projector- sized kit,
    roughly 1 foot cubed. Taking this miniaturization further, could "strings" or
    dots 3D laser etched into a small plastic prism with a pocket projector reproduce
    this type of display in a solid state medium? Researchers at Columbia have taken
    a step in this direction with their work on projected passive optical scattering
    ([http://www.cs.columbia.edu/CAVE/projects/3d_display/](http://www.cs.columbia.edu/CAVE/projects/3d_display/)).
    There''s still much to research and develop with regard to volumetric 3D displays,
    so mixing and matching these techniques could lead to innovations previously undiscovered.
    Onward pioneers!


    ![images](images/0903.jpg)


    ***Figure 9-3.** Lumarca volumetric display with projection onto hanging strings.
    Photo by Jeff Howard*


    ### Swept Volume Displays


    Swept volume volumetric displays are in many ways the "traditional" volumetric
    display. Patent applications for these devices go back to the 1950s and 1960s
    but we only began to see actual implementation in the last couple of decades.
    A swept volume display takes a single light emitting 2D slice of a volume and,
    through a mechanism that rapidly moves the location of the slice and its content
    in context with the space it is pushing through, uses the persistence of vision
    optical effect to imprint a volumetric 3D image hanging in space.


    In 1988, the New York Hall of Science spent US$40,000 to construct a volumetric
    3D display that could interactively depict "The Quantum Atom." With the reciprocating
    mechanical motion of a platter painted with light from a computer controlled oscilloscope,
    the individual slices of a solid moving object were carved into space inside a
    cylinder, which allowed audiences to walk 360 degrees around the interactive electronic
    3D image. Alan Jackson, the designer of that display, has launched a new initiative
    to get affordably-priced units that utilize the same reciprocating motion swept
    volume technique into the hands of developers, using modern hardware and open
    source software.


    Alan''s VoxieBox ([http://voxiebox.com](http://voxiebox.com)) will be available
    in kit or preassembled form starting in 2012. Similar to the OpenNI initiative
    of Primesense, the VoxieBox will promote an open source framework being developed
    for volumetric displays at OpenVoxel.org to attract a developer community that
    can take advantage of these devices'' unique capabilities. While the Kinect has
    done so much to make technology accessibility for development around 3D capture,
    the VoxieBox and other devices that the OpenVoxel framework will support aspire
    to do the same for volumetric 3D displays. Unlike the proprietary commercial devices
    and research projects that debuted, and then failed to gather momentum in the
    public eye, efforts leveraging the passion of open source innovators have a chance
    for success.


    One of those research projects was from the Institute for Creative Technologies
    at the University of Southern California. This project relied on a swept volume
    mechanism to enable their "Interactive 360º Light Field Display" ([Figure 9-5](#Chapter09.html#fig_9_5)).
    In this design, a projector is positioned pointing down from above the spinning
    mirror. This direct approach could be the basis for reproducing the desired effect
    in a controlled environment—perhaps an art, museum, or retail installation—for
    a more self-contained apparatus that doesn''t have room for a projector at a distance.
    More information can be found about this system at [http://gl.ict.usc.edu/Research/3DDisplay/](http://gl.ict.usc.edu/Research/3DDisplay/).'
