    # 工作区


    为了更方便地在 Unity 中工作，请选中 `Game`（游戏）标签页并将其拖拽至左侧。它会自动弹出成为一个独立的标签页区域。两个窗口之间的灰色分隔条可以通过拖拽进行调整。移动标签页后，你应该会看到与图
    7-3 类似的结果。


    ![images](img/0703.jpg)


    ***图 7-3.** Unity 工作区*


    左侧的标签页现在是 `Game Viewer`（游戏视图）。在此标签页中，你可以从摄像机的视角看到当前场景在 3D 空间中的所有内容。3D 空间中的摄像机工作原理与普通摄像机相同，需将其定位以便框选场景中所有合适的视觉元素。


    `Game Viewer` 右侧的标签页是 `Scene Viewer`（场景视图）。此标签页显示所选场景的 3D 世界。你可以将场景视为关卡。游戏中的每个关卡都需要创建一个场景。在
    `Scene Viewer` 的右上角，有一个在许多 3D 软件包中都能找到的奇异生物，称为 `Gizmo`（小控件），没错，这就是它的官方名称。别害怕，只要你不在午夜后喂食或者把它弄湿，它就不会繁殖。它会显示
    X、Y、Z 轴以及透视视图。在这个彩色场景中，你可以将 X、Y、Z 轴轻松地记忆为 R、G、B 色。点击并旋转 X、Y、Z 轴或中心立方体（透视视图）轴，即可从这些角度观察游戏。


    ![images](img/square.jpg) **注意** 从不同角度观察并不会移动摄像机，它只改变用户在当前场景中的观察视角。


    最右侧的最后一个标签页是 `Inspector`（检视面板）。如果你熟悉 Flash，可以将其视为属性检查器。`Inspector` 允许你设置所选对象组件的属性。`Inspector`
    还允许你为游戏对象附加脚本，从而在 Unity 中引入功能。这正是 ZigFu 实现其示例工作方式的核心。ZigFu 设计了一个包含游戏对象的基本场景，然后将脚本附加到这些游戏对象上，以便与
    OpenNI 进行绑定。


    你会在工作区底部看到两个标签页。左下角的标签页是 `Hierarchy Viewer`（层级视图）。此标签页中的所有内容实际上都是你游戏中的对象。右下角的标签页是当前项目的
    `Project`（项目）文件夹。该文件夹中的所有内容都存放在 `User` ![images](img/U001.jpg) `New Unity Project
    1` ![images](img/U001.jpg) `Assets`（资源）目录下。任何添加到 `Assets` 文件夹中的内容都会自动在此标签页的视图中更新。不过，只有当该对象通过拖拽添加到
    `Scene`（场景）或 `Inspector`（检视面板）中后，它才会出现在游戏里。


    # 基本导航与变换工具


    现在，我们来了解环绕标签页的各种按钮。你左上角的按钮（图 7-4）是基本导航和变换工具，其快捷键与大多数 3D 应用程序一致。


    ![images](img/0704.jpg)


    ***图 7-4.** 基本导航与变换工具*


    图 7-4 中的按钮从左到右依次具有以下功能。括号中的字母为键盘快捷键。


    *   `Hand`（手形）工具（`Q`）允许你在 3D 世界中移动视角。

    *   `Move`（移动）工具（`W`）允许你在 `Scene`（场景）标签页中移动选中的游戏对象。

    *   `Rotate`（旋转）工具（`E`）允许你在 `Scene`（场景）标签页中旋转选中的游戏对象。

    *   `Scale`（缩放）工具（`R`）允许你在 `Scene`（场景）标签页中缩放选中的游戏对象。


    另一个好用的键盘快捷键是 `F`。按下键盘上的 `F` 键，`Scene`（场景）标签页会聚焦于你在 `Hierarchy`（层级）标签页中选择的任何游戏对象。


    # 播放控制


    再往右的按钮是播放控制（图 7-5）。


    ![images](img/0705.jpg)


    ***图 7-5.** Unity 的播放控制*


    `Play`（播放）按钮用于运行当前场景。如果在场景播放时再次按下 `Play` 按钮，场景会停止。Unity 有一个特定的界面特性需要留意：如果处于 `Play`（播放）模式，这些按钮会变为蓝色。在此模式下，如果在
    `Inspector`（检视面板）中对游戏对象属性进行了任何更改，当场景停止时，这些更改将会丢失。除非你为 Unity 安装额外的插件，否则无法保存 `Play`（播放）模式下的更改。如果你在
    `Play`（播放）模式下发现某个属性更改很满意，请记下该更改，待退出 `Play`（播放）模式后重新输入。


    ![images](img/square.jpg) **提示** 三键鼠标对于在 Unity 的 3D 空间中工作至关重要。三个按键都可用于在 3D 空间中平滑移动场景。按住
    `Option` 键并左键单击可以平移透视视图。鼠标中键滚轮可以拉近或拉远场景视图。按下鼠标中键可以切换为 `Hand`（手形）工具。右键单击可以旋转透视视图。`Option`+右键单击可提供额外的
    `Zoom`（缩放）工具。


    ## 理解 ZigFu 与 Unity 的关系


    ZigFu 是一组与 `OpenNI` 和 PrimeSense 公司的 `NITE` 绑定的 C# 脚本，它使 Unity 能够访问 `NITE` 的功能。`OpenNI`
    是一个开源标准，旨在为新出现的自然交互设备、应用程序和中间件领域创建兼容性。`OpenNI` 是一个抽象层，它将中间件与硬件和应用程序集成在一起。


    ### OpenNI 与 NITE


    `OpenNI` 主要面向 3D 传感器，但 `OpenNI` 中没有任何内容是专属于 PrimeSense 公司的 `NITE` 或 Kinect 的。`OpenNI`
    是一个接口，它允许诸如 `NITE` 之类的中间件开发者获取深度流、骨骼数据、音频、红外 (`IR`)、手部点、RGB 图像和手势检测。`OpenNI` 并不具体关注这些数据点是如何生成的，也不关心它们来自何处。


    `OpenNI` 依赖模块来获取设备数据，并将这些数据传入 `OpenNI` 以及任何中间件。任何人都可以为任何摄像头或传感器编写模块，并通过 `OpenNI`
    注册。`NITE` 是一种中间件，它赋予数字设备无需可穿戴设备或控制器即可翻译并响应用户交互的能力。


    ![images](img/square.jpg) **注意** 理解 `OpenNI` 的关键点在于，它并非针对特定硬件或中间件。`OpenNI` 可以用于任何符合
    `OpenNI` 标准的硬件。例如，你可以将 `OpenNI` 与 PrimeSense 参考设计、微软 Kinect、华硕 Xtion 以及任何符合 `OpenNI`
    标准的中间件（如 `NITE`，以及即将推出的 Beckon）配合使用。


    因此，`NITE` 是介于 `OpenNI` 和你的应用程序（在此处为 Unity）之间的中介。就 Kinect 而言，PrimeSense 不仅提供了中间件，还制造了
    Kinect 内部的运动感应芯片。这在实际上并没有改变任何实质内容，但这算是一个有趣的事实，也体现了 `NITE` 为何如此强大。


    ### Unity 与 ZigFu


    Unity 允许用户创建脚本，并将这些脚本作为组件附加到游戏对象上。组件是向任何游戏添加游戏功能的方式，它们驱动着游戏对象。ZigFu 创建了用于 Unity
    的脚本，以便与 `OpenNI` 进行绑定，或者说“通信”。


    ZigFu 创建了示例脚本，帮助用户熟悉 `OpenNI` 的功能。在 ZigFu 出现之前，Unity 的开发者需要自行编写绑定代码。现在，如果开发者有足够的技术和意愿，也仍然可以这样做。鉴于
    Unity 的工作方式，你可以非常轻松地将 ZigFu 脚本附加到一个对象上，并将你可能创建的任何自定义脚本附加到同一个对象或其他任何对象上。


    Unity 对此类开发的容忍度出奇地高。事实上，Unity 不仅支持一种，而是支持*三种*脚本语言：JavaScript、C# 和 Boo。开发者可以同时使用这三种语言，无需只选择其中一种。你游戏对象的一个组件可以用
    C# 编写，另一个则可以用 Boo 编写。

