  trans: "\n###### DirectX 运行时与 SDK\n\n微软的 DirectX 软件由大量主要用于处理游戏所需媒体和图形功能的库组成。例如，Kinect\
    \ SDK（见下文）附带的示例形状游戏就使用了 DirectX。\n\n微软 DirectX SDK（2010 年 6 月版或更高版本）：\n\n`http://www.microsoft.com/download/en/details.aspx?id=6812`\n\
    \n以及当前的 DirectX 最终用户运行时：\n\n`http://www.microsoft.com/download/en/details.aspx?id=35`\n\
    \n###### 微软的语音平台\n\n同样，这些组件是可选的。然而，它们确实使微软为 Kinect 开发者提供的产品与本书中描述的其他软件包有所区别。如果你计划在应用程序中集成语音识别，或者只是想尝试示例形状游戏的这项功能，请下载这些软件包并运行安装程序。请注意，即使你使用的是\
    \ 64 位机器，也必须下载 x86（32 位）版本的语音平台软件。64 位版本将无法工作：\n\n> 微软语音平台 SDK，版本 10.2（x86 版）\n\
    > [`http://www.microsoft.com/download/en/details.aspx?id=14373`](http://www.microsoft.com/download/en/details.aspx?id=14373)\n\
    > \n> 微软语音平台运行时，版本 10.2（x86 版）\n> [`http://www.microsoft.com/download/en/details.aspx?id=10208`](http://www.microsoft.com/download/en/details.aspx?id=10208)\n\
    > \n> 微软 Kinect 语音平台（美国英语版）\n> [`http://go.microsoft.com/fwlink/?LinkId=220942`](http://go.microsoft.com/fwlink/?LinkId=220942)\n\
    \n###### Kinect SDK 和 Coding4Fun Kinect 工具包\n\n最后，是 Kinect 的相关内容！浏览到 Kinect SDK\
    \ 登录页面（如下所示）并点击“下载”。在这里，你需要根据上文“系统”部分所述的操作系统选择 32 位或 64 位版本。Kinect SDK 登录页面的 URL\
    \ 是：\n\n`http://research.microsoft.com/kinectsdk/`\n\n运行安装程序。安装完成后，你就可以启动 Visual\
    \ Studio（在我们的例子中是 Visual C# Express）并开始使用 Kinect SDK 了。\n\n然而，你可能还需要下载最后一个可选的软件包。Coding4Fun\
    \ Kinect 工具包将我们使用 Kinect 数据时的一些典型任务（例如将原始数据转换为位图图像）封装成了更简单的函数调用，从而让你需要编写的代码更简洁、更干净。该库被用于\
    \ SDK 附带的一些示例中，是建议你添加到设置中的一项附加内容。你可以在此处下载该库：\n\n`http://c4fkinect.codeplex.com/`\n\
    \n选择压缩的当前版本，下载并解压。Coding4Fun 库没有安装程序。相反，我们需要在每个要使用该库的项目中添加对其的引用。这是在设置新的 Kinect\
    \ 项目时，需要在我们的开发环境 Visual Studio 内部完成的任务，具体细节如下。现在，只需将下载并解压后的库存放在你希望保存的任何位置，比如现在应该出现在你文档文件夹中的\
    \ Visual Studio 2010 文件夹内。\n\n##### 运行示例并排查问题\n\n在我们尝试构建自己的代码之前，应该先尝试运行 SDK 附带的两个编译好的示例，以确保一切按预期工作。你应该可以通过在“开始”菜单的“程序”中查找来确认\
    \ SDK 已安装。现在，“开始”菜单的“程序”下有已编译的示例应用程序：![images](img/U001.jpg) Kinect for Windows\
    \ SDK ![images](img/U001.jpg) “示例骨骼查看器”和![images](img/U001.jpg) Kinect for Windows\
    \ SDK ![images](img/U001.jpg) “示例形状游戏”。让我们启动“示例骨骼查看器”。你应该会看到类似于图 8-2 所示的结果。\n\n\
    ![images](img/0802.jpg)\n\n*图 8-2. Kinect SDK 附带的运行正常的“示例骨骼查看器”程序*\n\n如果你收到类似“NuiInitalize\
    \ Failed”的警报，或者看到图 8-3 中的窗口，那么说明出了问题：\n\n![images](img/0803.jpg)\n\n*图 8-3. “示例骨骼查看器”程序运行失败*\n\
    \n在这种情况下，就该进行故障排除了。和往常一样，确保 Kinect 已插入你的电脑，并且电源线已连接到墙上插座。如果你有很多 USB 设备或使用了 USB\
    \ 集线器，则需要为 Kinect 腾出空间：要么将其直接插入电脑的某个端口，要么如果必须插在集线器上，请确保 Kinect 不与任何其他高吞吐量的 USB\
    \ 设备共享该集线器。\n\n另一个潜在的麻烦来源是驱动程序。如果你安装了第三方 Kinect 设备驱动程序来运行本书中的任何其他软件包或示例，那么 Kinect\
    \ SDK 附带的新驱动程序应该会取代第三方驱动程序。但是，如果存在冲突，你可能需要在设备管理器中卸载其他驱动程序（见下文）。\n\n在安装了 SDK 之后首次连接\
    \ Kinect 时，Windows 会自动为各种硬件组件安装驱动程序，这些组件现在被识别为 Microsoft Kinect Device、Microsoft\
    \ Kinect Camera 和 Microsoft Kinect Audio Array Control。如果你查看设备管理器，你应该会在“Microsoft\
    \ Kinect”列表项下找到这三个组件。但是，如果你在通用的“人体学输入设备”列表项下仍然看到“Xbox NUI Motor”、“XBox NUI Camera”和“XBox\
    \ NUI Audio”，则需要右键单击每一个并选择“卸载”。\n\n最后，在进行这些更改后，你可能还需要卸载并重新安装 Kinect SDK 和驱动程序。一旦你在设备管理器中看到“Microsoft\
    \ Kinect”及其三个组件，就应该没问题了。但如果仍然不行，你需要查看在线论坛来排查你的特定问题。\n\n##### 设置新的 Kinect 项目\n\n\
    如果你是 Windows 开发的新手，你可能希望将此部分加为书签，因为每次你在 Visual C# Express 中设置一个要使用 Kinect SDK\
    \ 的新项目时，都必须执行我们在此介绍的步骤。\n\n基本上，过程如下：\n\n1.  创建一个新的 Windows Presentation Foundation\
    \ (WPF) 项目。\n2.  添加对 Kinect SDK 和 Coding4Fun Kinect 库的引用。\n3.  添加 `using` 语句，告知我们的代码正在使用哪些库。\n\
    4.  在我们的应用程序中创建标准的加载和关闭事件，以初始化和取消初始化 Visual Studio 在运行 Kinect 应用程序时使用的资源。\n\n\
    类似的步骤在微软研究网站上的快速入门视频系列中也有介绍。\n\n###### 第 1 步：创建一个新项目\n\n要在 Visual C# Express 中创建一个新的\
    \ WPF 项目，只需启动应用程序，然后从主屏幕选择“文件”![images](img/U001.jpg) “新建项目…”或“新建项目…”。在打开的对话框中，选择“WPF\
    \ 应用程序”，如图 8-4 所示。\n\n![images](img/0804.jpg)\n\n*图 8-4. Visual C# Express 中的新建项目对话框*\n\
    \nWindows Presentation Foundation 简单来说就是 Windows 用来组织和链接 Windows 应用程序中用户界面元素的系统。XML（或\
    \ XAML）文件是 WPF 的核心——当你的新项目创建时，你会看到一个名为 `MainWindow.Xaml` 的文件。\n\n###### 第 3 步：添加\
    \ `Using` 语句\n\n终于，我们可以开始编码了！你需要从编辑 XAML 文件切换到编辑名为 `MainWindow.xaml.cs` 的 C#（“C-Sharp”）文件。通过点击项目主区域中的\
    \ `MainWindow.xaml.cs` 选项卡来完成此操作。你应该会看到如图 8-8 所示的代码。\n\n![images](img/0808.jpg)\n\
    \n*图 8-8. `MainWindow.xaml.cs` 中的 C# 代码*\n\n你会看到已经有一些 `using` 语句。将光标放在最后一个之后，新建一行，然后输入：\n\
    \n```\nusing Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
    using Coding4Fun.Kinect.Wpf;\n```\n\n完成。不过，可别真的照着输入啊！\n"
- fmt: "### Step 4. Create Loaded and Closed Events\n\nOne more step for our Kinect\
    \ project template to be complete! The reason for this step is simple: we need\
    \ to make sure we initialize and uninitialize the Kinect runtime in every application\
    \ that uses it, lest chaos (or at least, poor memory management) ensues. So, we're\
    \ going to add functions that will initialize it for us whenever our application\
    \ window is loaded and uninitialize it whenever the window is closed.\n\nTo do\
    \ so, switch back to the XAML file tab and look at the Properties panel at the\
    \ bottom right of the project window. Click the Events tab and scan down the alphabetical\
    \ list of events until you see the Loaded event shown in [Figure 8-9](#Chapter08.html#fig_8_9).\n\
    \n![images](images/0809.jpg)\n\n***Figure 8-9.** The Properties panel highlighting\
    \ the Loaded event*\n\nDouble-click the Loaded event. Visual Studio automatically\
    \ creates an empty event callback function and switches back to your .cs file\
    \ where the function lives:\n\n```\nprivate void Window_Loaded(object sender,\
    \ RoutedEventArgs e)\n        {\n\n        }\n```\n\nNow, repeat these steps to\
    \ add a Closed event to your application, which adds the `Window_Closed` event\
    \ callback function to your .cs file. All we need to do is put up our initialization\
    \ and uninitialization code, and we're done. Fortunately, the Kinect SDK makes\
    \ this code super simple.\n\nPut your cursor before (and outside) the `Window_Loaded`\
    \ function and give your Kinect runtime a name like this:\n\n```\nRuntime kinect\
    \ = new Runtime();\n```\n\nNow inside the `Window_Loaded` function, initialize\
    \ the runtime with the `Initialize()` function, which takes configuration options\
    \ as arguments separated by the \"|\" character. We're simply telling the application\
    \ to use the Kinect's RGB color camera and raw depth:\n\n```\nkinect.Initialize(RuntimeOptions.UseColor\
    \ | RuntimeOptions.UseDepth);\n```\n\nFinally, add an `Uninitialize()` function\
    \ call inside the `Window_Closed` function:\n\n```\nkinect.Uninitialize();\n```\n\
    \nWhen you're done, the code in your .cs file should look about like this:\n\n\
    ```\nusing System;\nusing System.Collections.Generic;\nusing System.Linq;\nusing\
    \ System.Text;\nusing System.Windows;\nusing System.Windows.Controls;\nusing System.Windows.Data;\n\
    using System.Windows.Documents;\nusing System.Windows.Input;\nusing System.Windows.Media;\n\
    using System.Windows.Media.Imaging;\nusing System.Windows.Navigation;\nusing System.Windows.Shapes;\n\
    using Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
    using Coding4Fun.Kinect.Wpf;\n\nnamespace WpfApplication1\n{\n    /// <summary>\n\
    \    /// Interaction logic for MainWindow.xaml\n    /// </summary>\n    public\
    \ partial class MainWindow : Window\n    {\n        public MainWindow()\n    \
    \    {\n            InitializeComponent();\n        }\n\n        Runtime kinect\
    \ = new Runtime();\n        private void Window_Loaded(object sender, RoutedEventArgs\
    \ e)\n        {\n            kinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepth);\n\
    \        }\n\n        private void Window_Closed(object sender, EventArgs e)\n\
    \        {\n            kinect.Uninitialize();\n        }\n\n    }\n}\n```\n\n\
    Sweet! You can successfully build and run/debug this application now, which you\
    \ should do to make sure there are no syntax mistakes. Click the green arrow shown\
    \ in [Figure 8-10](#Chapter08.html#fig_8_10).\n\n![images](images/0810.jpg)\n\n\
    ***Figure 8-10.** The green arrow to initiate a build and debug sequence*\n\n\
    Of course, the application does absolutely *nothing*! Nothing you can *see*, anyway.\
    \ But it is safely initializing and uninitializing the Kinect runtime so that\
    \ now any code we want to sandwich between the Loaded and the Closed events will\
    \ execute properly. This is the basic template setup we'll want to use for each\
    \ new Kinect project we work on, so you might just save it somewhere to be copied\
    \ as needed.\n\nNow, we build.\n\n### Building a Simple Application\n\nBuilding\
    \ a Kinect application is now just a matter of laying out our user interface in\
    \ the XAML file (which we can do easily with the authoring tools in Visual Studio)\
    \ and putting some code to execute between the Loaded and Closed events we just\
    \ addressed (which the Coding4Fun Toolkit is going to make a snap). Let's do it.\n\
    \n#### Deciding What to Build\n\nLike many of the bootstrap examples we've covered,\
    \ let's say we just want to built a simple app along the lines of the Sample Skeletal\
    \ Viewer, but we want to do it from scratch so that we really learn what it takes.\
    \ (The source for the samples is provided with the SDK, but they don't utilize\
    \ the Coding4Fun helper library and are therefore a bit more complex.) Essentially,\
    \ we want to create an app that gets the major raw data streams (color and depth\
    \ images), does some of the analysis we need to make that data more useful (user\
    \ segmentation and skeletal tracking), and renders it to the screen. How do we\
    \ do it?\n\n#### Laying Out the UI\n\nStarting from the template we created in\
    \ the last section, select the `MainWindow.XAML` tab. Note in the design view\
    \ (upper) panel that there's a white Main Window box. This represents the main\
    \ application window that will sit right inside the chrome when you launch your\
    \ app.\n\nIf you click the Main Window box, handles appear at the corners that\
    \ you can click and drag to resize it as in [Figure 8-11](#Chapter08.html#fig_8_11).\
    \ Let's just do a little clicking and dragging to lay out the main window for\
    \ our application and any objects in it just the way we want.\n\n![images](images/0811.jpg)\n\
    \n***Figure 8-11.** The design view of the XAML file lets you move and resize\
    \ objects with the mouse*\n\nI dragged the corners of my main window out to a\
    \ width of 800 pixels and a height of 350 pixels. You can see the attribute values\
    \ in the code view change when you release the mouse, and you can modify them\
    \ in code as well as in the Properties panel at the bottom left of the project\
    \ window. In code view, for example, the attributes of my Window tag look like\
    \ this:\n\n```\nTitle=\"MainWindow\" Height=\"350\" Width=\"800\" Closed=\"Window_Closed\"\
    \ Loaded=\"Window_Loaded\"\n```\n\nNow open up the Toolbox as in [Figure 8-12](#Chapter08.html#fig_8_12)\
    \ in the upper left of the project window (it is identified in the overview of\
    \ the project window earlier in this chapter) and drag an image object from the\
    \ palette of \"tools\" onto the main window. As we did with the main window, size\
    \ the image object using the handles, the Properties panel, or the XAML code.\
    \ Just make sure to accommodate the aspect ratio of the 640 × 480 resolution Kinect.\
    \ For example, I sized mine to 320 pixels by 240 pixels.\n\n![images](images/0812.jpg)\n\
    \n***Figure 8-12.** The Toolbox in Visual Studio, with an image object highlighted*\n\
    \nYou can then copy and paste another instance of the image object onto the main\
    \ window so that we have one for the RGB image and one for the depth image. Arrange\
    \ them however you like, and notice that the Properties panel for the selected\
    \ object gives its default name (e.g., `image1`, `image2`, etc.). You can change\
    \ these names if you want, but these are the names we'll be using to target these\
    \ objects programmatically in code. Speaking of which, let's leave our layout\
    \ as is and start to wire it up in the .cs file."
  raw: '##### Step 4\. Create Loaded and Closed Events


    One more step for our Kinect project template to be complete! The reason for this
    step is simple: we need to make sure we initialize and uninitialize the Kinect
    runtime in every application that uses it, lest chaos (or at least, poor memory
    management) ensues. So, we''re going to add functions that will initialize it
    for us whenever our application window is loaded and uninitialize it whenever
    the window is closed.


    To do so, switch back to the XAML file tab and look at the Properties panel at
    the bottom right of the project window. Click the Events tab and scan down the
    alphabetical list of events until you see the Loaded event shown in [Figure 8-9](#Chapter08.html#fig_8_9).


    ![images](images/0809.jpg)


    ***Figure 8-9.** The Properties panel highlighting the Loaded event*


    Double-click the Loaded event. Visual Studio automatically creates an empty event
    callback function and switches back to your .cs file where the function lives:


    `private void Window_Loaded(object sender, RoutedEventArgs e)`

    `        {`


    `        }`


    Now, repeat these steps to add a Closed event to your application, which adds
    the `Window_Closed` event callback function to your .cs file. All we need to do
    is put up our initialization and uninitialization code, and we''re done. Fortunately,
    the Kinect SDK makes this code super simple.


    Put your cursor before (and outside) the `Window_Loaded` function and give your
    Kinect runtime a name like this:


    `Runtime kinect = new Runtime();`


    Now inside the `Window_Loaded` function, initialize the runtime with the `intialize()`
    function, which takes configuration options as arguments separated by the “|”
    character. We''re simply telling the application to use the Kinect''s RGB color
    camera and raw depth:


    `kinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepth);`


    Finally, add an `uninitalize()` function call inside the `Window_Closed` function:


    `kinect.Uninitialize();`


    When you''re done, the code in your .cs file should look about like this:


    `using System;`

    `using System.Collections.Generic;`

    `using System.Linq;`

    `using System.Text;`

    `using System.Windows;`

    `using System.Windows.Controls;`

    `using System.Windows.Data;`

    `using System.Windows.Documents;`

    `using System.Windows.Input;`

    `using System.Windows.Media;`

    `using System.Windows.Media.Imaging;`

    `using System.Windows.Navigation;`

    `using System.Windows.Shapes;`

    `using Microsoft.Research.Kinect.Nui;`

    `using Microsoft.Research.Kinect.Audio;`

    `using Coding4Fun.Kinect.Wpf;`


    `namespace WpfApplication1`

    `{`

    `    /// <summary>`

    `    /// Interaction logic for MainWindow.xaml`

    `    /// </summary>`

    `    public partial class MainWindow : Window`

    `    {`

    `        public MainWindow()`

    `        {`

    `            InitializeComponent();`

    `        }`


    `        Runtime kinect = new Runtime();`

    `        private void Window_Loaded(object sender, RoutedEventArgs e)`

    `        {`

    `            kinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepth);`

    `        }`


    `        private void Window_Closed(object sender, EventArgs e)`

    `        {`

    `            kinect.Uninitialize();`

    `        }`


    `    }`

    `}`


    Sweet! You can successfully build and run/debug this application now, which you
    should do to make sure there are no syntax mistakes. Click the green arrow shown
    in [Figure 8-10](#Chapter08.html#fig_8_10).


    ![images](images/0810.jpg)


    ***Figure 8-10.** The green arrow to initiate a build and debug sequence*


    Of course, the application does absolutely *nothing*! Nothing you can *see*, anyway.
    But it is safely initializing and uninitializing the Kinect runtime so that now
    any code we want to sandwich between the Loaded and the Closed events will execute
    properly. This is the basic template setup we''ll want to use for each new Kinect
    project we work on, so you might just save it somewhere to be copied as needed.


    Now, we build.


    ### Building a Simple Application


    Building a Kinect application is now just a matter of laying out our user interface
    in the XAML file (which we can do easily with the authoring tools in Visual Studio)
    and putting some code to execute between the Loaded and Closed events we just
    addressed (which the Coding4Fun Toolkit is going to make a snap). Let''s do it.


    ##### Deciding What to Build


    Like many of the bootstrap examples we''ve covered, let''s say we just want to
    built a simple app along the lines of the Sample Skeletal Viewer, but we want
    to do it from scratch so that we really learn what it takes. (The source for the
    samples is provided with the SDK, but they don''t utilize the Coding4Fun helper
    library and are therefore a bit more complex.) Essentially, we want to create
    an app that gets the major raw data streams (color and depth images), does some
    of the analysis we need to make that data more useful (user segmentation and skeletal
    tracking), and renders it to the screen. How do we do it?


    ##### Laying Out the UI


    Starting from the template we created in the last section, select the MainWindow.XAML
    tab. Note in the design view (upper) panel that there''s a white Main Window box.
    This represents the main application window that will sit right inside the chrome
    when you launch your app.


    If you click the Main Window box, handles appear at the corners that you can click
    and drag to resize it as in [Figure 8-11](#Chapter08.html#fig_8_11). Let''s just
    do a little clicking and dragging to lay out the main window for our application
    and any objects in it just the way we want.


    ![images](images/0811.jpg)


    ***Figure 8-11.** The design view of the XAML file lets you move and resize objects
    with the mouse*


    I dragged the corners of my main window out to a width of 800 pixels and a height
    of 350 pixels. You can see the attribute values in the code view change when you
    release the mouse, and you can modify them in code as well as in the Properties
    panel at the bottom left of the project window. In code view, for example, the
    attributes of my Window tag look like this:


    `Title="MainWindow" Height="350" Width="800" Closed="Window_Closed" Loaded="Window_Loaded"`


    Now open up the Toolbox as in [Figure 8-12](#Chapter08.html#fig_8_12) in the upper
    left of the project window (it is identified in the overview of the project window
    earlier in this chapter) and drag an image object from the palette of “tools”
    onto the main window. As we did with the main window, size the image object using
    the handles, the Properties panel, or the XAML code. Just make sure to accommodate
    the aspect ratio of the 640  480 resolution Kinect. For example, I sized mine
    to 320 pixels by 240 pixels.


    ![images](images/0812.jpg)


    ***Figure 8-12.** The Toolbox in Visual Studio, with an image object highlighted*


    You can then copy and paste another instance of the image object onto the main
    window so that we have one for the RGB image and one for the depth image. Arrange
    them however you like, and notice that the Properties panel for the selected object
    gives its default name (e.g., “image1,” “image2,” etc.). You can change these
    names if you want, but these are the names we''ll be using to target these objects
    programmatically in code. Speaking of which, let''s leave our layout as is and
    start to wire it up in the .cs file.'
  trans: "\n### 步骤 4：创建加载和关闭事件\n\n再完成一步，我们的 Kinect 项目模板就大功告成了！这一步的原因很简单：我们需要确保在每个使用\
    \ Kinect 运行时的应用程序中，都对其进行初始化和反初始化，否则会导致混乱（至少是糟糕的内存管理）。因此，我们将添加一些函数，当应用程序窗口加载时自动初始化该运行时，并在窗口关闭时自动反初始化。\n\
    \n为此，请切换回 XAML 文件选项卡，查看项目窗口右下角的“属性”面板。单击“事件”选项卡，按字母顺序浏览事件列表，直到看到如图 8-9 所示的 `Loaded`\
    \ 事件。\n\n![images](img/0809.jpg)\n\n***图 8-9.** 突出显示 Loaded 事件的属性面板*\n\n双击 `Loaded`\
    \ 事件。Visual Studio 会自动创建一个空的事件回调函数，并切换回包含该函数的 .cs 文件：\n\n```\nprivate void Window_Loaded(object\
    \ sender, RoutedEventArgs e)\n        {\n\n        }\n```\n\n现在，重复这些步骤，为应用程序添加一个\
    \ `Closed` 事件，这将在 .cs 文件中添加 `Window_Closed` 事件回调函数。我们只需放入初始化和反初始化代码即可完成。幸运的是，Kinect\
    \ SDK 让这段代码变得超简单。\n\n将光标置于 `Window_Loaded` 函数之前（外部），并为 Kinect 运行时命名，如下所示：\n\n\
    ```\nRuntime kinect = new Runtime();\n```\n\n现在，在 `Window_Loaded` 函数内部，使用 `Initialize()`\
    \ 函数初始化运行时。该函数接受由 \"|\" 字符分隔的配置选项作为参数。我们只需告诉应用程序使用 Kinect 的 RGB 彩色摄像头和原始深度数据：\n\
    \n```\nkinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepth);\n\
    ```\n\n最后，在 `Window_Closed` 函数内部添加一个 `Uninitialize()` 函数调用：\n\n```\nkinect.Uninitialize();\n\
    ```\n\n完成时，.cs 文件中的代码应如下所示：\n\n```\nusing System;\nusing System.Collections.Generic;\n\
    using System.Linq;\nusing System.Text;\nusing System.Windows;\nusing System.Windows.Controls;\n\
    using System.Windows.Data;\nusing System.Windows.Documents;\nusing System.Windows.Input;\n\
    using System.Windows.Media;\nusing System.Windows.Media.Imaging;\nusing System.Windows.Navigation;\n\
    using System.Windows.Shapes;\nusing Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
    using Coding4Fun.Kinect.Wpf;\n\nnamespace WpfApplication1\n{\n    /// <summary>\n\
    \    /// MainWindow.xaml 的交互逻辑\n    /// </summary>\n    public partial class MainWindow\
    \ : Window\n    {\n        public MainWindow()\n        {\n            InitializeComponent();\n\
    \        }\n\n        Runtime kinect = new Runtime();\n        private void Window_Loaded(object\
    \ sender, RoutedEventArgs e)\n        {\n            kinect.Initialize(RuntimeOptions.UseColor\
    \ | RuntimeOptions.UseDepth);\n        }\n\n        private void Window_Closed(object\
    \ sender, EventArgs e)\n        {\n            kinect.Uninitialize();\n      \
    \  }\n\n    }\n}\n```\n\n太棒了！现在你可以成功生成并运行/调试此应用程序，建议执行此操作以确保没有语法错误。单击图 8-10 中所示的绿色箭头。\n\
    \n![images](img/0810.jpg)\n\n***图 8-10.** 启动生成和调试序列的绿色箭头*\n\n当然，这个应用程序绝对*什么都不做*！*看起来*它什么都没做。但它确实安全地初始化和反初始化了\
    \ Kinect 运行时，这样我们想要夹在 `Loaded` 和 `Closed` 事件之间的任何代码都能正确执行。这是我们为每个新 Kinect 项目都希望使用的基本模板设置，因此你可以将其保存在某处，以便需要时复制使用。\n\
    \n现在，我们来构建。\n\n### 构建一个简单的应用\n\n构建 Kinect 应用程序现在只需在 XAML 文件中设计好用户界面（使用 Visual\
    \ Studio 中的创作工具即可轻松完成），然后在刚刚处理好的 `Loaded` 和 `Closed` 事件之间添加一些执行代码（Coding4Fun 工具包会让这一步变得极其简单）。让我们开始吧。\n\
    \n#### 决定构建什么\n\n像我们介绍过的许多引导示例一样，假设我们只想构建一个类似于“骨骼查看器示例”的简单应用，但我们希望从头开始，以便真正了解其中的要点（示例源码随\
    \ SDK 提供，但它们没有使用 Coding4Fun 辅助库，因此相对复杂一些）。本质上，我们希望创建一个能够获取主要原始数据流（彩色和深度图像）、执行一些分析使数据更有用（用户分割和骨骼跟踪）并将其渲染到屏幕上的应用。那么，我们该怎么做呢？\n\
    \n#### 设计用户界面\n\n从上一节创建的模板开始，选择 `MainWindow.XAML` 选项卡。请注意在设计视图（上部）面板中有一个白色的主窗口框。这表示主应用程序窗口，当你启动应用时，它将直接位于窗口框架内部。\n\
    \n如果你单击主窗口框，角落会出现手柄，你可以像图 8-11 那样单击并拖动它们来调整窗口大小。我们只需进行一些简单的点击和拖动，就能按照我们的意愿来布局主窗口及其中的任何对象。\n\
    \n![images](img/0811.jpg)\n\n***图 8-11.** XAML 文件的设计视图允许你使用鼠标移动和调整对象大小*\n\n我将主窗口的角拖拽到宽度为\
    \ 800 像素、高度为 350 像素。当你释放鼠标时，可以在代码视图中看到属性值的变化；你也可以在代码中修改它们，或者在项目窗口左下角的“属性”面板中修改。例如，在代码视图中，我的\
    \ Window 标签的属性看起来像这样：\n\n```\nTitle=\"MainWindow\" Height=\"350\" Width=\"800\"\
    \ Closed=\"Window_Closed\" Loaded=\"Window_Loaded\"\n```\n\n现在，如图 8-12 所示，打开项目窗口左上角的工具箱，从“工具”面板中拖动一个图像对象到主窗口上。就像我们处理主窗口一样，使用手柄、属性面板或\
    \ XAML 代码来调整图像对象的大小。只需确保符合 Kinect 640 × 480 分辨率的长宽比。例如，我将它的大小调整为 320 × 240 像素。\n\
    \n![images](img/0812.jpg)\n\n***图 8-12.** Visual Studio 中的工具箱，突出显示了一个图像对象*\n\n\
    然后，你可以复制并粘贴图像对象的另一个实例到主窗口上，这样我们就有一个用于 RGB 图像，另一个用于深度图像。按你喜欢的方式排列它们，注意选定对象的属性面板会显示其默认名称（例如\
    \ `image1`、`image2` 等）。如果需要，你可以更改这些名称，但这些名称将在代码中用于以编程方式定位这些对象。说到这里，我们先保持布局不变，开始在\
    \ .cs 文件中进行代码连接。\n"
- fmt: "### Wiring Up the UI with Code\n\nHere's how we're going to make this work:\
    \ We'll use events from the Kinect runtime to trigger a function whenever there's\
    \ a new frame of image data from the RGB camera and another function whenever\
    \ there's a new frame of depth data. These functions will update the content of\
    \ the appropriate image object in the main window, and we'll have an application\
    \ that collects and renders the major data streams from the Kinect, just like\
    \ that.\n\nSo, below our initialization of the Kinect runtime inside the `Window_Loaded`\
    \ function, type in some code to listen for the new frame or `FrameReady` events\
    \ and tie them to appropriate callback functions, which we'll define later:\n\n\
    ```csharp\nkinect.VideoFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_VideoFrameReady);\n\
    kinect.DepthFrameReady += new EventHandler<ImageFrameReadyEventArgs>(kinect_DepthFrameReady);\n\
    ```\n\nNext, we have to open these data streams from the Kinect device to start\
    \ generating images. Simply add:\n\n```csharp\nkinect.VideoStream.Open(ImageStreamType.Video,\
    \ 2, ImageResolution.Resolution640x480,\nImageType.Color);\nkinect.DepthStream.Open(ImageStreamType.Depth,\
    \ 2, ImageResolution.Resolution320x240,\nImageType.Depth);\n```\n\nThis code is\
    \ fairly self-explanatory: we're using built-in settings and types to configure\
    \ and start each data stream. The second argument in the `Stream.Open()` function\
    \ (i.e., the \"2\") is the only obscure one: it refers to the `PoolSize`, or the\
    \ number of buffers to use for playback of the stream data. It must be a number\
    \ from 1 to 4. We chose 2: one buffer to display the current frame and one buffer\
    \ to load the new frame. Adding more buffers introduces latency but can give smoother\
    \ playback of the data.\n\nFinally, to get this application working, we need to\
    \ define the functions we tied to the `FrameReady` events, the `kinect_VideoFrameReady`\
    \ and `kinect_DepthFrameReady` functions. Again, these functions simply need to\
    \ update our image objects with the image data from the color and depth streams\
    \ from the Kinect. Using the `ToBitmapSource()` function available to us from\
    \ Coding4Fun, this is quite easy:\n\n```csharp\nvoid kinect_VideoFrameReady(object\
    \ sender, ImageFrameReadyEventArgs e)\n{\n        image1.Source = e.ImageFrame.ToBitmapSource();\n\
    }\n\nvoid kinect_DepthFrameReady(object sender, ImageFrameReadyEventArgs e)\n\
    {\n        image2.Source = e.ImageFrame.ToBitmapSource();\n}\n```\n\nThe names\
    \ \"image1\" and \"image2,\" you'll recall, are the defaults given to the image\
    \ objects we dragged into our main window from the Toolbox. If you changed these\
    \ names in the XAML file, you need to change them here in the code, too. With\
    \ that done, we're ready to build and run this project. You should get an output\
    \ window like that in [Figure 8-13](#Chapter08.html#fig_8_13).\n\n![images](images/0813.jpg)\n\
    \n***Figure 8-13.** Color and depth images*\n\nThat was easy! But it gives us\
    \ nothing that we can't get with libfreenect. Where's the magic? Good question.\
    \ Let's see if we can add some of Microsoft's special sauce!\n\nFirst, we can\
    \ try getting a depth image that identifies people in the scene in front of the\
    \ Kinect, a task commonly called *user segmentation* but might be called *player\
    \ segmentation* in the context of the Microsoft APIs. With the Kinect SDK, we\
    \ can add player segmentation just by changing our runtime configuration and depth\
    \ image type from `Depth` to `DepthAndPlayerIndex` throughout the code. That means\
    \ changing the initialization to:\n\n```csharp\nkinect.Initialize(RuntimeOptions.UseColor\
    \ | RuntimeOptions.UseDepthAndPlayerIndex);\n```\n\nAnd changing the image type\
    \ in the `DepthStream.Open()` like so:\n\n```csharp\nkinect.DepthStream.Open(ImageStreamType.Depth,\
    \ 2, ImageResolution.Resolution320x240,\nImageType.DepthAndPlayerIndex);\n```\n\
    \nAnd we can get something like the image in [Figure 8-14](#Chapter08.html#fig_8_14),\
    \ where the \"player\" is now segmented in the scene and given a color overlay.\n\
    \n![images](images/0814.jpg)\n\n***Figure 8-14.** Color and DepthAndPlayerIndex\
    \ images*\n\nNow, what about proper skeletal tracking, the stuff that makes actual\
    \ gameplay using the Kinect sensor possible? In essence, implementing skeletal\
    \ tracking in your application is no more difficult than implementing the color\
    \ and depth image functionalities as above. Just add an option to the runtime\
    \ configuration and a `SkeletonFrameReady` event and callback. In the `Window_Loaded`\
    \ function, that's changing/adding two lines:\n\n```csharp\nkinect.Initialize(RuntimeOptions.UseColor\
    \ | RuntimeOptions.UseDepthAndPlayerIndex |\nRuntimeOptions.UseSkeletalTracking);\n\
    SkeletonFrameReady += new\nEventHandler<SkeletonFrameReadyEventArgs>(kinect_SkeletonFrameReady);\n\
    ```\n\nIn practice, of course, to use the skeleton information, you need to write\
    \ a `kinect_SkeletonFrameReady` function that uses the data intelligently, mapping\
    \ the body joints to objects and controllers in the application, etc. Following\
    \ is a simplified version of the full Skeletal Viewer code that maps and draws\
    \ that data to the screen, producing a result similar to that in [Figure 8-15](#Chapter08.html#fig_8_15)\
    \ (after adding a third image object to display the skeleton):\n\n![images](images/0815.jpg)\n\
    \n***Figure 8-15.** Displaying the skeleton in the center of the window*\n\nThe\
    \ code, partially borrowed from the Sample Skeletal Viewer, looks something like\
    \ this:\n\n```csharp\nusing System;\nusing System.Collections.Generic;\nusing\
    \ System.Linq;\nusing System.Text;\nusing System.Windows;\nusing System.Windows.Controls;\n\
    using System.Windows.Data;\nusing System.Windows.Documents;\nusing System.Windows.Input;\n\
    using System.Windows.Media;\nusing System.Windows.Media.Imaging;\nusing System.Windows.Navigation;\n\
    using System.Windows.Shapes;\nusing Microsoft.Research.Kinect.Nui;\nusing Microsoft.Research.Kinect.Audio;\n\
    using Coding4Fun.Kinect.Wpf;\n\nnamespace WpfApplication1\n{\n    /// <summary>\n\
    \    /// Interaction logic for MainWindow.xaml\n    /// </summary>\n    public\
    \ partial class MainWindow : Window\n    {\n        public MainWindow()\n    \
    \    {\n            InitializeComponent();\n        }\n\n        Runtime kinect\
    \ = new Runtime();\n\n        private void Window_Loaded(object sender, RoutedEventArgs\
    \ e)\n        {\n            kinect.Initialize(RuntimeOptions.UseColor | RuntimeOptions.UseDepthAndPlayerIndex\
    \ |\n            RuntimeOptions.UseSkeletalTracking);\n            kinect.VideoFrameReady\
    \ += new\nEventHandler<ImageFrameReadyEventArgs>(kinect_VideoFrameReady);\n  \
    \          kinect.DepthFrameReady += new\nEventHandler<ImageFrameReadyEventArgs>(kinect_DepthFrameReady);\n\
    \            kinect.SkeletonFrameReady += new\nEventHandler<SkeletonFrameReadyEventArgs>(kinect_SkeletonFrameReady);\n\
    \            kinect.VideoStream.Open(ImageStreamType.Video, 2,\nImageResolution.Resolution640x480,\
    \ ImageType.Color);\n            kinect.DepthStream.Open(ImageStreamType.Depth,\
    \ 2,\nImageResolution.Resolution320x240, ImageType.DepthAndPlayerIndex);\n   \
    \     }\n\n        void kinect_VideoFrameReady(object sender, ImageFrameReadyEventArgs\
    \ e)\n        {\n            image1.Source = e.ImageFrame.ToBitmapSource();\n\
    \        }\n\n        void kinect_DepthFrameReady(object sender, ImageFrameReadyEventArgs\
    \ e)\n        {\n            image2.Source = e.ImageFrame.ToBitmapSource();\n\
    \        }\n\n        void kinect_SkeletonFrameReady(object sender, SkeletonFrameReadyEventArgs\
    \ e)\n        {\n            SkeletonFrame skeletonFrame = e.SkeletonFrame;\n\
    \            int iSkeleton = 0;\n            Brush[] brushes = new Brush[6];\n\
    \            brushes[0] = new SolidColorBrush(Color.FromRgb(255, 0, 0));\n   \
    \         brushes[1] = new SolidColorBrush(Color.FromRgb(0, 255, 0));\n      \
    \      brushes[2] = new SolidColorBrush(Color.FromRgb(64, 255, 255));\n      \
    \      brushes[3] = new SolidColorBrush(Color.FromRgb(255, 255, 64));\n      \
    \      brushes[4] = new SolidColorBrush(Color.FromRgb(255, 64, 255));\n      \
    \      brushes[5] = new SolidColorBrush(Color.FromRgb(128, 128, 255));\n```"
