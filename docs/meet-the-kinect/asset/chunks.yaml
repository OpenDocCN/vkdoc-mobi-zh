  trans: '

    # 使用 Beckon 框架进行应用程序开发


    到目前为止，我们已经介绍了一些适用于 Kinect 的开源平台。除了这些工具外，还有一些高级商业框架可供探索。这些套件能提供额外的工具、应用程序和功能。其中一个令人兴奋的平台是
    Omek Interactive 公司的 Beckon 开发套件。Omek 的 Beckon SDK 能够执行骨架追踪、手势识别和斑点追踪，并且还附带了一套工具，用于使用
    Kinect 及目前可用的许多其他 3D 传感摄像头录制自定义手势。这些新手势随后可以在任何使用 Beckon SDK 创建的应用程序中使用。例如，如果你想制作一个绘画程序，你可以设计特定于你应用的手势。在本章中，我们将介绍
    Beckon 附带的 Flash 基础示例，创建一个简单的骨架，然后训练我们自己的手势。接着，我们会将骨架和训练好的手势整合到一个基础应用程序中。使用 Beckon
    搭配 Flash 会生成一个独立的应用程序，而不是一个浏览器兼容的 `.swf` 文件。我们将重点介绍 Beckon 与 Flash 结合使用，因为 Flash
    具备快速原型设计环境的能力。在学习过程中，我们还会讨论手势界面的基本用户体验设计策略。


    ![images](img/square.jpg) **注意** `.swf` 文件是编译后的 Flash 文件。它们最初被称为“Shockwave Flash
    文件”，但如今通常仅通过其扩展名 `.swf` 来指代。使用 Beckon 和 Flash 所得到的应用程序类型是存储在 `.fla` 文件中的独立 Flash
    应用程序。


    ## 什么是 Beckon？


    Omek Interactive 是一家位于以色列的突破性公司，创立了 Beckon。他们的目标是通过提供工具和技术，使制造商和软件开发人员能够为其产品添加基于手势的界面，从而改变人们与其设备和应用程序的交互方式。Beckon
    或许是本书中介绍的最强大的 SDK。Beckon 部分是中间件，部分是工具箱。中间件是一种位于一个应用程序或硬件设备与另一个之间的软件。在本书的前面部分，你一直在使用
    OpenNI 和 NITE 或 Microsoft SDK 来推断和分析来自 Kinect 的数据。Beckon 的独特之处在于，它支持市面上几乎所有的深度摄像头（并计划支持未来的摄像头）。通过利用专有的机器学习环境，Beckon
    允许开发人员和设计人员在 Adobe Flash CS 5.5、C++ 或 C# 中创建完全定制的交互式应用程序和沉浸式环境，以及为 `.NET` 框架以及
    Unity 和 OGRE 游戏引擎创建插件。它与任何游戏引擎完全兼容，并原生支持业界标准的 FBX 动画格式，用于将预生成的 3D 内容与实时追踪混合在一起。


    Beckon API 在斑点、骨架或手势层面提供了其所称的“场景智能”。基本和 GUI 手势包为不同的场景（如 UI 控制、游戏控制等）提供了预定义且可立即使用的手势。开发人员可以轻松地将这些手势包集成到他们的应用程序中。


    设计人员还可以使用 Beckon 附带的应用程序，为其应用录制完全原创的手势或手势组合。手势编写工具包是一套工具，允许设计人员和开发人员定义和管理自己的手势，甚至无需编写代码即可创建新手势。手势可以非常直观，并且可以组合在一起。在音乐创作软件中，音乐家循环播放一段音轨的手势可能是在空中画一个圈。在第一人称格斗游戏中，跳跃和闪避可能是玩家躲避对手拳头攻击的正确动作。


    Beckon 的机器学习环境可以从同一个手势的许多不同样本中学习。创建手势的过程就是在摄像头前多次执行并录制该手势。这个过程被称为训练机器学习环境。机器学习是人工智能的一个分支，无需畏惧。简单来说，计算机通过录入手势进行学习，并且随着每个新样本的加入，识别该手势的准确率会越来越高。Beckon
    允许设计人员和开发人员获得高度准确的识别，即使是面对不同的人群也是如此。例如，一个 12 岁男孩和一个 30 岁女性做出相同手势的样子会截然不同。Beckon
    能让你的程序轻松识别这两种用户。虽然 Beckon 总体上是一个很棒的工具，但正是这个特性使其在专用于 Kinect 的其他技术中脱颖而出。


    Kinect 与其他任何传感器一样，需要安装由社区构建的单独设备驱动程序。目前，最流行的解决方案是 SensorKinect，这是一个基于 PrimeSensor
    设备驱动程序的开源项目。需要理解的是，SensorKinect 驱动程序无法与标准的 PrimeSensor 驱动程序在同一台 PC 上共存，因为 SensorKinect
    驱动程序的设计目的是让 Kinect 传感器看起来像一个标准的 PrimeSensor 设备。因此，我们建议在你的硬盘上新建一个空白分区并安装一个新的操作系统，从该分区启动，以便你之后可以切换回其他
    SDK。在本章中，我们将使用 Windows 7 系统；不过 XP 系统也能工作。由于需要卸载驱动，你可能想先阅读本章内容，以判断 Beckon 是否满足你的需求。

    '
- fmt: "![images](images/square.jpg) **Note** Beckon is currently available via a\
    \ 90-day free trial evaluation version; however, Omek will be providing a non-commercial\
    \ version to the public with their next major release. If you would like to get\
    \ your hands on a copy now, you can request a copy here: [`www.omekinteractive.com/beckon-eval`](http://www.omekinteractive.com/beckon-eval)\
    \ or by contacting the team at [`info@omekinteractive.com`](http://info@omekinteractive.com).\
    \ While you can’t purchase a license directly from Omek’s website, you can contact\
    \ their sales team, who will provide you with details on how to get a commercial\
    \ version of their SDK. Pricing depends on the type of application you are looking\
    \ to commercialize, so it’s best to reach out to them for details. On the upside,\
    \ not only does Beckon work with Kinect, but it also works with the Panasonic\
    \ D-Imager, the Asus Xtion Pro, PMDTec’s GameCube 3.0, and the PMD[vision] CamCube.\
    \ You’ll also get access to the incredible support team, who will ensure that\
    \ you get the installation functional on your platform.\n\nSpeaking based on personal\
    \ use, this platform performs flawlessly and Beckon’s stability cannot be overstated.\
    \ I’ve seen it seamlessly track a player in a game with as many as 40 people standing\
    \ directly behind that person, cheering and taking photos. It also does a very\
    \ good job at allowing one person to leave a game and another to enter into the\
    \ Kinect’s view and start playing. It will register the player change and start\
    \ tracking within seconds, with no calibration poses. Shockingly accurate, it\
    \ was able to recognize people as young as 2 and as old as 70+ years of age performing\
    \ the same gestures. The performance that Beckon delivers makes it worth the investment.\n\
    \nRegardless of the initial setup time, if you’re interested in developing a game\
    \ or application simultaneously for iOS, Android, touch display, and Kinect, Beckon\
    \ really is a timesaver. Otherwise, you’d have to have to build the iOS application\
    \ in Objective C, the Droid version in Java, and the Kinect version a language\
    \ like C++. Plus, it’s fun, as a game developer, to be able to take a game to\
    \ a festival and set it up to run in a kiosk version making use of the Kinect.\
    \ Beckon makes this very easy to do.\n\nIf you’re scratching your head right now\
    \ and thinking, “I heard Flash didn’t run on an iPad!” welcome to the new version\
    \ of Flash, CS 5.5, which supports multiscreen output natively from both Flash\
    \ and Flash Builder. The number one best-selling apps on the iTunes store are\
    \ now made with Flash, such as the heavily awarded Machinarium. Great tips are\
    \ available for developing this way online. A good place to start is the games\
    \ section of the Adobe site here: [`www.adobe.com/devnet/games.html`](http://www.adobe.com/devnet/games.html).\n\
    \n### Installing Beckon\n\nKinect, like any other sensor, requires the installation\
    \ of a separate device driver. To this end, we rely on public components written\
    \ by the Kinect-developers community. The most popular solution is `SensorKinect`,\
    \ an open source project based on the `PrimeSensor` device driver. It’s important\
    \ to understand that `SensorKinect` drivers cannot co-exist with the standard\
    \ `PrimeSensor` drivers on the same PC, because `SensorKinect` drivers were designed\
    \ to make the Kinect sensor appear as a standard `PrimeSensor` device.\n\nGetting\
    \ Beckon up and running takes a few steps. I recommend checking the Omek website\
    \ for the most up-to-date details, since the appropriate drivers will change as\
    \ Omek releases updates and newer versions of their software. The first thing\
    \ you are going to need to do is to remove the Open NI SDK and PrimeSense drivers\
    \ you currently have on your OS. An additional word to the wise is that you will\
    \ also need to make sure that you fully uninstall and remove from your system\
    \ your `libfreenect` open Kinect drivers. Failing to do so will cause Beckon to\
    \ be unable to recognize the sensor camera. Afterwards, we will re-download and\
    \ install versions of OpenNI and the PrimSense drivers that are appropriate for\
    \ Beckon. Finally, we will install the Beckon SDK and license and get started.\n\
    \n![images](images/square.jpg) **Note** If you are a developer possibly coming\
    \ over from the Mac OS and want to take full advantage of the SDK, you’ll want\
    \ to make sure you have Visual Studio Professional and the .NET framework installed\
    \ as well.\n\n#### Step 1: Remove Existing Drivers\n\nThe first step is to remove\
    \ any existing drivers on your system that might conflict with the Beckon software\
    \ or the drivers needed to run that software. Some drivers are removed from the\
    \ Control Panel. Others are removed from the Windows Device Manager. Here is what\
    \ to do for the Control Panel drivers:\n\n1.  Go to Start -> Settings -> Control\
    \ Panel\n2.  Select the Programs Control Panel\n3.  Select the “Uninstall a Program”\
    \ option\n4.  Uninstall any application having “OpenNI” or “PrimeSense” in their\
    \ name. Examples include: `OpenNI 1.0.0`, `PrimeSensor 5.0.0` for Windows, `Windows\
    \ Driver Package – PrimeSense (psdrv3) PrimeSensor`, etc.\n\nThe following shows\
    \ how to use Device Driver to remove drivers:\n\n1.  Go to Start -> Computer\n\
    2.  Right-click on Computer, and choose Manage\n3.  Click on Device Manager\n\
    4.  Open Human Interface Devices\n5.  Find `XBox NUI Camera`, right-click, and\
    \ choose Uninstall\n6.  Find `XBox NUI Motor` and `XBox NUI Camera` drivers, right-click,\
    \ and uninstall those too\n\n#### Step 2: Install New Drivers\n\nNow that any\
    \ possibly conflicting other software and drivers are out of the way, you can\
    \ download and install what Beckon needs. Here are the instructions to follow:\n\
    \n1.  Download the `OpenNI 1.0.0.25` installer.\n2.  Download and install the\
    \ `SensorKinect 5.0.0` drivers.\n3.  Install OpenNI by running the installer downloaded\
    \ in #1.\n4.  Install `SensorKinect` by running the installer downloaded in #2.\n\
    \n![images](images/square.jpg) **Note** Check the example download for this book\
    \ for possibly new information regarding driver installation.\n\n#### Step 3:\
    \ Download and Install the Beckon SDK\n\nNow it’s time to download and install\
    \ the Beckon SDK. It’s best to use either Internet Explorer or Firefox for that\
    \ purpose, especially if you have a firewall installed. Here is the process to\
    \ follow:\n\n1.  Navigate to the customer service portal at:\n    [`https://license.omekinteractive.com/solo/customers/Default.aspx`](https://license.omekinteractive.com/solo/customers/Default.aspx)\n\
    2.  Log in using the customer ID and password provided to you by Omek and download\
    \ your license. Omek will email you this when they agree to give you a license.\
    \ See the Omek Beckon SDK Installation Guide if you get lost here.\n3.  Download\
    \ the Beckon SDK. Using the link provided in the email you received from Beckon\
    \ when you signed up for a non-commercial license, install the software. The only\
    \ tricky popup to watch out for will be the final popup in the process, shown\
    \ in [Figure 6-1](#Chapter06.html#fig_6_1). If you have a Windows7 64 bit system\
    \ with Visual C++ installed, press “No.” Otherwise, press “Yes.”\n\n![images](images/0601.jpg)\n\
    \n***Figure 6-1.** The Beckon installer’s final, but tricky, popup.*\n\n### Activating\
    \ Beckon\n\nBeckon SDK is license protected; you have 3 days to activate your\
    \ license. Run the `Tracking Viewer` tool to activate the software according to\
    \ your license permissions. You’ll find that tool from your Start menu, at Start\
    \ -> Omek Beckon -> Tracking Viewer. Don’t run it quite yet, though.\n\nFirst,\
    \ plug in your Kinect device. Driver installation is part of the validation process.\n\
    \nNow run the `Tracking Viewer`. Beckon will walk you through the validation process.\
    \ You will see a popup notification that will let you know the drivers for Kinect\
    \ are installing. You will see the Xbox NUI Audio driver fail. This is perfectly\
    \ normal and a sign that you have done everything correctly to this point.\n\n\
    ![images](images/square.jpg) **Note** The Omek Beckon SDK Installation Guide provides\
    \ a simple step by step guide if you need more help."
  raw: "![images](images/square.jpg) **Note** Beckon is currently available via a\
    \ 90-day free trial evaluation version; however, Omek will be providing a non-commercial\
    \ version to the public with their next major release. If you would like to get\
    \ your hands on a copy now, you can request a copy here: [`www.omekinteractive.com/beckon-eval`](http://www.omekinteractive.com/beckon-eval)\
    \ or by contacting the team at [`info@omekinteractive.com`](http://info@omekinteractive.com).\
    \ While you can’t purchase a license directly from Omek’s website, you can contact\
    \ their sales team, who will provide you with details on how to get a commercial\
    \ version of their SDK. Pricing depends on the type of application you are looking\
    \ to commercialize, so it’s best to reach out to them for details. On the upside,\
    \ not only does Beckon work with Kinect, but it also works with the Panasonic\
    \ D-Imager, the Asus Xtion Pro, PMDTec’s GameCube 3.0, and the PMD[vision] CamCube.\
    \ You’ll also get access to the incredible support team, who will ensure that\
    \ you get the installation functional on your platform.\n\nSpeaking based on personal\
    \ use, this platform performs flawlessly and Beckon’s stability cannot be overstated.\
    \ I’ve seen it seamlessly track a player in a game with as many as 40 people standing\
    \ directly behind that person, cheering and taking photos. It also does a very\
    \ good job at allowing one person to leave a game and another to enter into the\
    \ Kinect’s view and start playing. It will register the player change and start\
    \ tracking within seconds, with no calibration poses. Shockingly accurate, it\
    \ was able to recognize people as young as 2 and as old as 70+ years of age performing\
    \ the same gestures. The performance that Beckon delivers makes it worth the investment.\n\
    \nRegardless of the initial setup time, if you’re interested in developing a game\
    \ or application simultaneously for iOS, Android, touch display, and Kinect, Beckon\
    \ really is a timesaver. Otherwise, you’d have to have to build the iOS application\
    \ in Objective C, the Droid version in Java, and the Kinect version a language\
    \ like C++. Plus, it’s fun, as a game developer, to be able to take a game to\
    \ a festival and set it up to run in a kiosk version making use of the Kinect.\
    \ Beckon makes this very easy to do.\n\nIf you’re scratching your head right now\
    \ and thinking, “I heard Flash didn’t run on an iPad!” welcome to the new version\
    \ of Flash, CS 5.5, which supports multiscreen output natively from both Flash\
    \ and Flash Builder. The number one best-selling apps on the iTunes store are\
    \ now made with Flash, such as the heavily awarded Machinarium. Great tips are\
    \ available for developing this way online. A good place to start is the games\
    \ section of the Adobe site here: [`www.adobe.com/devnet/games.html`](http://www.adobe.com/devnet/games.html).\n\
    \n### Installing Beckon\n\nKinect, like any other sensor, requires the installation\
    \ of a separate device driver. To this end, we rely on public components written\
    \ by the Kinect-developers community. The most popular solution is SensorKinect,\
    \ an open source project based on the PrimeSensor device driver. It’s important\
    \ to understand that SensorKinect drivers cannot co-exist with the standard PrimeSensor\
    \ drivers on the same PC, because SensorKinect drivers were designed to make the\
    \ Kinect sensor appear as a standard PrimeSensor device.\n\nGetting Beckon up\
    \ and running takes a few steps. I recommend checking the Omek website for the\
    \ most up-to-date details, since the appropriate drivers will change as Omek releases\
    \ updates and newer versions of their software. The first thing you are going\
    \ to need to do is to remove the Open NI SDK and PrimeSense drivers you currently\
    \ have on your OS An additional word to the wise is that you will also need to\
    \ make sure that you fully uninstall and remove from your system your libfreenect\
    \ open Kinect drivers. Failing to do so will cause Beckon to be unable to recognize\
    \ the sensor camera. Afterwards, we will re-download and install versions of OpenNI\
    \ and the PrimSense drivers that are appropriate for Beckon. Finally, we will\
    \ install the Beckon SDK and license and get started.\n\n![images](images/square.jpg)\
    \ **Note** If you are a developer possibly coming over from the Mac OS and want\
    \ to take full advantage of the SDK, you’ll want to make sure you have Visual\
    \ Studio Professional and the .NET framework installed as well.\n\n#### Step 1:\
    \ Remove Existing Drivers\n\nThe first step is to remove any existing drivers\
    \ on your system that might conflict with the Beckon software or the drivers needed\
    \ to run that software. Some drivers are removed from the Control Panel. Others\
    \ are removed from the Windows Device Manager. Here is what to do for the Control\
    \ Panel drivers:\n\n1.  Go to Start -> Settings -> Control Panel\n2.  Select the\
    \ Programs Control Panel\n3.  Select the “Uninstall a Program” option\n4.  Uninstall\
    \ any application having “OpenNI” or “PrimeSense” in their name. Examples include:\
    \ OpenNI 1.0.0, PrimeSensor 5.0.0 for Windows, Windows Driver Package – PrimeSense\
    \ (psdrv3) PrimeSensor, etc.\n\nThe following shows how to use Device Driver to\
    \ remove drivers:\n\n1.  Go to Start -> Computer\n2.  Right-click on Computer,\
    \ and choose Manage\n3.  Click on Device Manager\n4.  Open Human Interface Devices\n\
    5.  Find XBox NUI Camera, right-click, and choose Uninstall\n6.  Find XBox NUI\
    \ Motor and XBox NUI Camera drivers, right-click, and uninstall those too\n\n\
    #### Step 2: Install New Drivers\n\nNow that any possibly conflicting other software\
    \ and drivers are out of the way, you can download and install what Beckon needs.\
    \ Here are the instructions to follow:\n\n1.  Download the OpenNI 1.0.0.25 installer.\n\
    2.  Download and install the SensorKinect 5.0.0 drivers.\n3.  Install OpenNI by\
    \ running the installer downloaded in #1.\n4.  Install SensorKinect by running\
    \ the installer downloaded in #2.\n\n![images](images/square.jpg) **Note** Check\
    \ the example download for this book for possibly new information regarding driver\
    \ installation.\n\n#### Step 3: Download and Install the Beckon SDK\n\nNow it’s\
    \ time to download and install the Beckon SDK. It’s best to use either Internet\
    \ Explorer or Firefox for that purpose, especially if you have a firewall installed.\
    \ Here is the process to follow:\n\n1.  Navigate to the customer service portal\
    \ at:\n    [`https://license.omekinteractive.com/solo/customers/Default.aspx`](https://license.omekinteractive.com/solo/customers/Default.aspx)\n\
    2.  Log in using the customer ID and password provided to you by Omek and download\
    \ your license. Omek will email you this when they agree to give you a license.\
    \ See the Omek Beckon SDK Installation Guide if you get lost here.\n3.  Download\
    \ the Beckon SD. Using the link provided in the email you received from Beckon\
    \ when you signed up for a non-commercial license, install the software. The only\
    \ tricky popup to watch out for will be the final popup in the process, shown\
    \ in [Figure 6-1](#Chapter06.html#fig_6_1). If you have a Windows7 64 bit system\
    \ with Visual C++ installed, press “No.” Otherwise, press “Yes.”\n\n![images](images/0601.jpg)\n\
    \n***Figure 6-1.** The Beckon installer’s final, but tricky, popup.*\n\n### Activating\
    \ Beckon\n\nBeckon SDK is license protected; you have 3 days to activate your\
    \ license. Run the Tracking Viewer tool to activate the software according to\
    \ your license permissions. You’ll find that tool from your Start menu, at Start\
    \ -> Omek Beckon -> Tracking Viewer. Don’t run it quite yet, though.\n\nFirst,\
    \ plug in your Kinect device. Driver installation is part of the validation process.\n\
    \nNow run the Tracking Viewer. Beckon will walk you through the validation process.\
    \ You will see a popup notification that will let you know the drivers for Kinect\
    \ are installing. You will see the Xbox NUI Audio driver fail. This is perfectly\
    \ normal and a sign that you have done everything correctly to this point.\n\n\
    ![images](images/square.jpg) **Note** The Omek Beckon SDK Installation Guide provides\
    \ a simple step by step guide if you need more help."
  trans: "\n![images](img/square.jpg) **注意** Beckon 目前通过 90 天免费试用评估版提供；然而，Omek 将在其下一个主要版本中向公众提供非商业版本。如果您希望现在获得一份副本，可以通过以下链接申请：[`www.omekinteractive.com/beckon-eval`](http://www.omekinteractive.com/beckon-eval)\
    \ 或联系团队邮箱 [`info@omekinteractive.com`](http://info@omekinteractive.com)。虽然您无法直接从\
    \ Omek 网站购买许可证，但可以联系他们的销售团队，他们将为提供关于如何获得其 SDK 商业版本的详细信息。价格取决于您希望商业化的应用类型，因此最好直接联系他们了解详情。好处是，Beckon\
    \ 不仅适用于 Kinect，还适用于 Panasonic D-Imager、Asus Xtion Pro、PMDTec 的 GameCube 3.0 以及\
    \ PMD[vision] CamCube。您还将获得出色的技术支持团队的支持，他们确保您能在自己的平台上成功完成安装。\n\n根据个人使用经验，这个平台性能完美，Beckon\
    \ 的稳定性再强调也不为过。我曾见过它在游戏中无缝追踪一名玩家，而该玩家身后有多达 40 人欢呼拍照。它还能非常好地让一名玩家离开游戏，另一名玩家进入 Kinect\
    \ 视野并开始游玩。它会在数秒内检测到玩家变化并开始追踪，无需任何校准姿势。其准确性惊人，能够识别 2 岁到 70 岁以上不同年龄段的人执行相同的手势。Beckon\
    \ 提供的性能使其值得投资。\n\n无论初始设置时间如何，如果你有兴趣同时为 iOS、Android、触摸屏和 Kinect 开发游戏或应用，Beckon\
    \ 确实能节省时间。否则，你不得不使用 Objective C 构建 iOS 应用，用 Java 构建 Android 版本，并用 C++ 等语言构建 Kinect\
    \ 版本。此外，作为游戏开发者，能够将游戏带到展会，设置成使用 Kinect 的自助服务机版本运行，也很有趣。Beckon 让这一切变得非常简单。\n\n\
    如果你现在感到困惑，心想：“我听说 Flash 无法在 iPad 上运行！”欢迎来到 Flash 新版本 CS 5.5，它原生支持 Flash 和 Flash\
    \ Builder 的多屏幕输出。iTunes 商店最畅销的应用现在都是用 Flash 制作的，例如获奖无数的《机械迷城》。网上有很多关于这种开发方式的实用技巧。一个不错的起点是\
    \ Adobe 网站的游戏专区：[`www.adobe.com/devnet/games.html`](http://www.adobe.com/devnet/games.html)。\n\
    \n### 安装 Beckon\n\nKinect 与其他传感器一样，需要安装单独的设备驱动程序。为此，我们依赖 Kinect 开发者社区编写的公共组件。最流行的解决方案是\
    \ `SensorKinect`，这是一个基于 `PrimeSensor` 设备驱动程序的开源项目。重要的是要理解，`SensorKinect` 驱动程序不能与标准\
    \ `PrimeSensor` 驱动程序在同一台 PC 上共存，因为 `SensorKinect` 驱动程序的设计目的是让 Kinect 传感器显示为标准\
    \ `PrimeSensor` 设备。\n\n让 Beckon 启动运行需要几个步骤。我建议查看 Omek 网站以获取最新详情，因为随着 Omek 发布更新和新版本软件，相应的驱动程序会发生变化。您需要做的第一件事是删除操作系统中现有的\
    \ Open NI SDK 和 PrimeSense 驱动程序。另外需要提醒的是，您还必须确保完全卸载并从系统中移除 `libfreenect` 开放 Kinect\
    \ 驱动程序。否则会导致 Beckon 无法识别传感器摄像头。之后，我们将重新下载并安装适用于 Beckon 的 OpenNI 和 PrimSense 驱动程序版本。最后，我们将安装\
    \ Beckon SDK 和许可证并开始使用。\n\n![images](img/square.jpg) **注意** 如果您是可能从 Mac OS 转过来的开发者，并希望充分利用\
    \ SDK，那么需要确保也已安装 Visual Studio Professional 和 .NET 框架。\n\n#### 第 1 步：移除现有驱动程序\n\
    \n第一步是移除系统中任何可能与 Beckon 软件或运行该软件所需驱动程序冲突的现有驱动程序。部分驱动程序通过控制面板移除，其他则通过 Windows 设备管理器移除。以下是针对控制面板驱动的操作步骤：\n\
    \n1.  转到“开始”->“设置”->“控制面板”\n2.  选择“程序”控制面板\n3.  选择“卸载程序”选项\n4.  卸载名称中包含“OpenNI”或“PrimeSense”的任何应用程序。例如：适用于\
    \ Windows 的 `OpenNI 1.0.0`、`PrimeSensor 5.0.0`、`Windows Driver Package – PrimeSense\
    \ (psdrv3) PrimeSensor` 等。\n\n以下展示如何使用设备管理器移除驱动程序：\n\n1.  转到“开始”->“计算机”\n2.  右键单击“计算机”，选择“管理”\n\
    3.  点击“设备管理器”\n4.  展开“人体学输入设备”\n5.  找到 `XBox NUI Camera`，右键单击，选择“卸载”\n6.  找到 `XBox\
    \ NUI Motor` 和 `XBox NUI Camera` 驱动程序，右键单击，同样卸载它们\n\n#### 第 2 步：安装新驱动程序\n\n现在所有可能冲突的其他软件和驱动程序都已清除，您可以下载并安装\
    \ Beckon 所需的组件。请按照以下说明操作：\n\n1.  下载 `OpenNI 1.0.0.25` 安装程序。\n2.  下载并安装 `SensorKinect\
    \ 5.0.0` 驱动程序。\n3.  通过运行第 1 步中下载的安装程序来安装 OpenNI。\n4.  通过运行第 2 步中下载的安装程序来安装 `SensorKinect`。\n\
    \n![images](img/square.jpg) **注意** 关于驱动安装的新信息，请查看本书的示例下载文件。\n\n#### 第 3 步：下载并安装\
    \ Beckon SDK\n\n现在是时候下载并安装 Beckon SDK 了。最好使用 Internet Explorer 或 Firefox 浏览器进行此操作，尤其是在安装了防火墙的情况下。流程如下：\n\
    \n1.  导航至客户服务门户网站：\n    [`https://license.omekinteractive.com/solo/customers/Default.aspx`](https://license.omekinteractive.com/solo/customers/Default.aspx)\n\
    2.  使用 Omek 提供给您的客户 ID 和密码登录，并下载您的许可证。当 Omek 同意授予您许可证时，他们会通过电子邮件发送此信息。如果您在此处遇到问题，请参阅\
    \ Omek Beckon SDK 安装指南。\n3.  下载 Beckon SDK。使用您注册非商业许可证时收到的 Beckon 电子邮件中提供的链接安装软件。过程中唯一需要注意的棘手弹窗是最后的弹窗，如图\
    \ 6-1 所示。如果您使用的是安装了 Visual C++ 的 Windows 7 64 位系统，请选择“否”。否则，请选择“是”。\n\n![images](img/0601.jpg)\n\
    \n***图 6-1.** Beckon 安装程序最后但棘手的弹窗。*\n\n### 激活 Beckon\n\nBeckon SDK 受许可证保护；您有 3\
    \ 天时间激活许可证。运行 `Tracking Viewer` 工具，根据您的许可证权限激活软件。您可以在“开始”菜单中找到该工具：开始 -> Omek Beckon\
    \ -> Tracking Viewer。不过，请先不要运行它。\n\n首先，插入您的 Kinect 设备。驱动程序安装是验证过程的一部分。\n\n现在运行\
    \ `Tracking Viewer`。Beckon 将引导您完成验证过程。您会看到一个弹出通知，告知 Kinect 驱动程序正在安装。您会看到 Xbox\
    \ NUI Audio 驱动程序安装失败。这完全正常，并且表明到目前为止您所做的一切都是正确的。\n\n![images](img/square.jpg)\
    \ **注意** 如果需要更多帮助，Omek Beckon SDK 安装指南提供了简单的分步指南。\n"
- fmt: '### Getting Started


    Now we are going to see whether our installation was successful. The Beckon installation
    includes a sample application that you can use to test for a successful install.
    From the Start Menu, launch "Omek BeckonTracking Viewer".


    **Note**: For reference, the executable is located in the following folder: `C:\Program
    Files\Omek\Beckon SDK\bin\Omek Beckon Tracking Viewer.exe`.


    In the Omek Beckon Tracking Viewer, choose: `Open -> Live Camera`. If everything
    is installed, you will see something similar to [Figure 6-2](#Chapter06.html#fig_6_2).


    ![images](images/0602.jpg)


    ***Figure 6-2.** Omek Beckon Tracking Viewer*


    ### Incorporating Beckon with Flash


    Now let''s use the Beckon SDK in Flash. Again, Flash with Beckon creates standalone
    applications, not browser experiences. Beckon will not work in a browser with
    Flash or online; you don''t actually install Beckon as a flash library or load
    it as a `.swc` file. However, the beat on the street is that this is the last
    version of Beckon that does not include an embedded solution. The process for
    Beckon is different. The way Beckon works with Flash is through Flash''s `ExternalInterface`.
    You create your flash file and expose functions that will communicate with the
    Beckon SDK. Beckon has another application, `OmekBeckonFlash.exe`, that communicates
    between the running swf file and the Beckon library. Beckon uses an xml file,
    `config.xml`, to tell the BeckonFlash application where to look for the swf to
    run. It also sets some of the initial start settings.


    To run the Beckon Flash example, do the following:


    1.  Create a new folder for the project (e.g., `C:\MyProject`).

    2.  Copy the necessary files from `C:\Program Files\Omek\Beckon SDK\bin` to `C:\MyProject`.
    You can either follow the instructions on the Developer Guide, under "Distribution
    of Omek-Based Content", or simply copy everything from inside the `bin` folder
    to your project''s folder.

    3.  Copy `C:\Program Files\Omek\Beckon SDK\samples\Flash` to `C:\MyProject`. Make
    sure to name the target folder `Flash`, and with a capital `F`.

    4.  Run `OmekBeckonFlash.exe`.

    5.  Now the Flash example `.swf` will open in this application, and it will run
    linked to the Omek SDK.


    At this point, you should see something similar to [Figure 6-3](#Chapter06.html#fig_6_3).
    This is not a browser but a separate, standalone application.


    ![images](images/0603.jpg)


    ***Figure 6-3.** Default stand-alone Flash example running in OmekBeckonFlash.exe*


    The following is how Beckon communicates with Flash:


    1.  `OmekBeckonFlash.exe` loads the `Flash/config.xml` (you must keep this name).

    2.  The Flash project is loaded from the path, specified in the `config.xml`,
    in the `<movie swfPath=".\Flash\game.swf" />` tag.

    3.  The SDK is loaded and uses the exposed function in the `.swf` file to send
    data to the running `.swf` file.


    You should now be up and running with the Beckon SDK.


    ![images](images/square.jpg) **Note**: Omek is currently streamlining the process
    of running Flash applications, so expect improvements. Expect to see rapid updates,
    quick changes, and innovation.


    ### Understanding the Beckon Flash Example


    Before we create our own Flash file, let''s explore the Beckon Flash example.
    By understanding how Beckon''s example works, you will be equipped to create a
    project from scratch.


    #### How Beckon Works with Flash


    Before we even open Flash, we are going to do a basic walk-through of two lines
    of code so that we can get the hang of how Beckon works with Flash. If you are
    used to working with Flash, you might be used to seeing the `ExternalInterface.callback()`
    class. Using the `ExternalInterface` class, you can call an ActionScript function
    in the Flash runtime environment. Usually, this class is used so that a running
    swf file can communicate with JavaScript in a Browser. However, in this case,
    Beckon uses an additional application, `OmekBeckonFlash.exe`, to run the swf file
    within. Because functions are exposed in the `.swf` file, the OmekBeckonFlash
    application can send information from SDK to them.


    We are going to look at two key methods of `ExternalCallback` class. The first
    is `.addCallback`. This method registers an ActionScript method as callable from
    the container swf.


    Here''s the whole line of code that is in the Flash file:


    ```

    ExternalInterface.addCallback("OmekGesture", onOmekGesture);

    ```


    This `addCallback` method exposes `onOmekGesture` to the sdk.


    The next method call passes arguments from the `.swf` file to the `OmekBeckonFlash`
    application. The call sets up two way communications between Flash and Beckon.
    It also tells the `OmekAddGesture` function to register the `leftPush` gesture
    if it is performed in the camera''s view. Here''s the relevant line of code:


    ```

    ExternalInterface.call("OmekAddGesture","leftPush");

    ```


    Now that we have established how Beckon works with Flash, let''s look at the actual
    Flash file. Open `C:\MyProject\Flash\testOmekFlashPlayer` in Flash. You will see
    the basic interface that ran when we started the `OmekBeckonFlash.exe` file. That''s
    because parts of the interface were created within Flash. Note that no box exists
    for the RGB video feed or for the depth map. This is because these elements are
    added into the file through the `config.xml` file. Beckon uses both Flash and
    this file to set up the start parameters for the `OmekBeckonFlash` application.


    You can change a few things in the code to help you understand what is happening.
    First, resize the text box on the stage labeled `debugString_txt` so that you
    can actually see all of the debug code that is written there when `BeckonFlash.exe`
    runs the swf file. Resize it to be the size of the entire stage and make the text
    about 10pt in size. You can go ahead and also make it white. Now set your background
    color to black to make it easy to read. Save and export the application.


    Now run the example again. Move around and you will see all of the debug copy
    writing to screen, as shown in [Figure 6-4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    ***Figure 6-4.** Modified stand alone Flash example running in OmekBeckonFlash.exe*


    The greatest difficulty working with Flash and Beckon is the loss of a console
    window. You could use brute force and drop a text box onto the screen and send
    messages to it, but a cleaner way to get debug text on screen is to create a function
    that draws debug text via Actionscript.


    Notice how the example now reflects the above changes. I triggered a few of the
    functions that are in the file by performing gestures or causing alerts to display
    on screen. Try doing the same by moving to close to the Kinect or walking out
    of view. You will now see all of the new lines being written to screen. They were
    there before, but because the textbox was so small, you didn''t see the debug
    text being displayed. Now you can easily in the `debugString_txt` box''s text.


    I perform the right click gesture in [Figure 6-4](#Chapter06.html#fig_6_4). Performing
    this gesture is just a matter of tapping forward with a quick double-tap like
    motion as your right hand is slightly raised in front of you to about chest height.
    It''s the same motion you''d make to tap someone on the shoulder who was sitting
    directly in front of you. The debug text shows this gesture was seen by the camera
    and registered. Next, I intentionally got to close to the camera to trigger the
    `Alert_TooClose` alert.


    The reason the `debugString_txt` box is important is that, by running the swf
    in a 3rd party application, you lose access to the normal console window in Flash.
    Creating messages that appear on-screen for debugging purposes is a fundamental
    change that you are going to have to adapt to when working with Beckon. A smart
    way to handle this is to create a debug mode in your application that you can
    trigger with a keystroke to turn onscreen alerts on or off.'
  raw: '### Getting Started


    Now we are going to see whether our installation was successful. The Beckon installation
    includes a sample application that you can use to test for a successful install.
    From the Start Menu, launch “Omek BeckonTracking Viewer”


    **Note** For reference, the executable is located in the following folder: C:/
    Program Files/Omek/Beckon SDK/ bin/ Omek Beckon Tracking Viewer.exe


    In the Omek Beckon Tracking Viewer, choose: Open -> Live Camera. If everything
    is installed, you will see something similar to [Figure 6-2](#Chapter06.html#fig_6_2).


    ![images](images/0602.jpg)


    ***Figure 6-2.** Omek Beckon Tracking Viewer*


    ### Incorporating Beckon with Flash


    Now let’s use the Beckon SDK in Flash. Again, Flash with Beckon creates standalone
    applications, not browser experiences. Beckon will not work in a browser with
    Flash or online; you don’t actually install Beckon as a flash library or load
    it as a .swc file. However, the beat on the street is that this is the last version
    of Beckon that does not include an embedded solution. The process for Beckon is
    different. The way Beckon works with Flash is through Flash’s ExternalInterface.
    You create your flash file and expose functions that will communicate with the
    Beckon SDK. Beckon has another application, “OmekBeckonFlash.exe” that communicates
    between the running swf file and the Beckon library. Beckon uses an xml file,
    config.xml, to tell the BeckonFlash application where to look for the swf to run.
    It also sets some of the initial start settings.


    To run the Beckon Flash example, do the following:


    1.  Create a new folder for the project (e.g., C:\MyProject)

    2.  Copy the necessary files from “C:\Program Files\Omek\Beckon SDK\bin” to C:\MyProject.
    You can either follow the instructions on the Developer Guide, under “Distribution
    of Omek-Based Content”, or simply copy everything from inside the bin folder to
    your project’s folder.

    3.  Copy “C:\Program Files\Omek\Beckon SDK\samples\Flash” to C:\MyProject. Make
    sure to name the target folder “Flash”, and with a capital “F”.

    4.  Run OmekBeckonFlash.exe

    5.  Now the Flash example .swf will open in this application, and it will run
    linked to the Omek SDK.


    At this point, you should see something similar to [Figure 6-3](#Chapter06.html#fig_6_3).This
    is not a browser but a separate, standalone application


    ![images](images/0603.jpg)


    ***Figure 6-3.** Default stand-alone Flash example running in OmekBeckonFlash.exe*


    The following is how Beckon communicates with Flash:


    1.  OmekBeckonFlash.exe loads the Flash/config.xml (you must keep this name)

    2.  The Flash project is loaded from the path, specified in the config.xml, in
    the `<movie swfPath=".\Flash\game.swf" />` tag.

    3.  The SDK is loaded and uses the exposed function in the .swf file to send data
    to the running .swf file.


    You should now be up and running with the Beckon SDK.


    ![images](images/square.jpg) **Note** Omek is currently streamlining the process
    of running Flash applications, so expect improvements. Expect to see rapid updates,
    quick changes, and innovation.


    ### Understanding the Beckon Flash Example


    Before we create our own Flash file, let’s explore the Beckon Flash example. By
    understanding how Beckon’s example works, you will be equipped to create a project
    from scratch.


    #### How Beckon Works with Flash


    Before we even open Flash, we are going to do a basic walk-through of two lines
    of code so that we can get the hang of how Beckon works with Flash. If you are
    used to working with Flash, you might be used to seeing the `ExternalInterface.callback()`
    class. Using the ExternalInterface class, you can call an ActionScript function
    in the Flash runtime environment. Usually, this class is used so that a running
    swf file can communicate with JavaScript in a Browser. However, in this case,
    Beckon uses an additional application, OmekBeckonFlash.exe, to run the swf file
    within. Because functions are exposed in the .swf file, the OmekBeckonFlash application
    can send information from SDK to them.


    We are going to look at two key methods of ExternalCalllback class. The first
    is `.addCallback`. This method registers an ActionScript method as callable from
    the container swf.


    Here’s the whole line of code that is in the Flash file.


    `ExternalInterface.addCallback("OmekGesture", onOmekGesture);`


    This addCallback method exposes onOmekGesture to the sdk.


    The next method call passes arguments from the .swf file to the OmekBeckonFlash
    application. The call sets up two way communications between Flash and Beckon.
    It also tells the OmekAddGesture function to register the leftPush gesture if
    it is performed in the camera’s view. Here’s the relevant line of code:


    `ExternalInterface.call("OmekAddGesture","leftPush");`


    Now that we have established how Beckon works with Flash, let’s look at the actual
    Flash file. Open `C:\MyProject\Flash\testOmekFlashPlayer` in Flash. You will see
    the basic interface that ran when we started the OmekBeckonFlash.exe file. That’s
    because parts of the interface were created within Flash. Note that no box exists
    for the RGB video feed or for the depth map. This is because these elements are
    added into the file through the config.xml file. Beckon uses both Flash and this
    file to set up the start parameters for the OmekBeckonFlash application.


    You can change a few things in the code to help you understand what is happening.
    First, resize the text box on the stage labeled `debugString_txt` so that you
    can actually see all of the debug code that is written there when BeckonFlash.exe
    runs the swf file. Resize it to be the size of the entire stage and make the text
    about 10pt in size. You can go ahead and also make it white. Now set your background
    color to black to make it easy to read. Save and export the application.


    Now run the example again. Move around and you will see all of the debug copy
    writing to screen, as shown in [Figure 6-4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    ***Figure 6-4.** Modified stand alone Flash example running in OmekBeckonFlash.exe*


    The greatest difficulty working with Flash and Beckon is the loss of a console
    window. You could use brute force and drop a text box onto the screen and send
    messages to it, but a cleaner way to get debug text on screen is to create a function
    that draws debug text via Actionscript.


    Notice how the example now reflects the above changes. I triggered a few of the
    functions that are in the file by performing gestures or causing alerts to display
    on screen. Try doing the same by moving to close to the Kinect or walking out
    of view. You will now see all of the new lines being written to screen. They were
    there before, but because the textbox was so small, you didn’t see the debug text
    being displayed. Now you can easily in the `debugString_txt` box’s text.


    I perform the right click gesture in [Figure 6-4](#Chapter06.html#fig_6_4). Performing
    this gesture is just a matter of tapping forward with a quick double-tap like
    motion as your right hand is slightly raised in front of you to about chest height.
    It’s the same motion you’d make to tap someone on the shoulder who was sitting
    directly in front of you. The debug text shows this gesture was seen by the camera
    and registered. Next, I intentionally got to close to the camera to trigger the
    “Alert_TooClose” alert.


    The reason the debugString_txt box is important is that, by running the swf in
    a 3rd party application, you lose access to the normal console window in Flash.
    Creating messages that appear on-screen for debugging purposes is a fundamental
    change that you are going to have to adapt to when working with Beckon. A smart
    way to handle this is to create a debug mode in your application that you can
    trigger with a keystroke to turn onscreen alerts on or off.'
  trans: '

    ### 快速入门


    现在，我们来检查安装是否成功。Beckon 安装包中包含一个示例应用程序，可用于测试安装是否成功。从“开始”菜单启动“Omek BeckonTracking
    Viewer”。


    **注意**：可执行文件位于以下文件夹中：`C:\Program Files\Omek\Beckon SDK\bin\Omek Beckon Tracking
    Viewer.exe`。


    在 Omek Beckon Tracking Viewer 中，选择：`Open -> Live Camera`。如果一切安装正确，您将看到类似于图 6-2
    的画面。


    ![images](img/0602.jpg)


    ***图 6-2.** Omek Beckon 跟踪查看器*


    ### 将 Beckon 与 Flash 集成


    现在，让我们在 Flash 中使用 Beckon SDK。再次说明，Flash 与 Beckon 结合可创建独立应用程序，而非浏览器体验。Beckon 无法在带
    Flash 的浏览器中或在线运行；您实际上不能将 Beckon 作为 Flash 库安装，或将其作为`.swc` 文件加载。不过，据传闻，这是最后一个不含嵌入式解决方案的
    Beckon 版本。Beckon 的工作方式有所不同：它通过 Flash 的 `ExternalInterface` 与 Flash 协同工作。您创建自己的
    Flash 文件并暴露一些函数，这些函数将与 Beckon SDK 通信。Beckon 还有一个名为 `OmekBeckonFlash.exe` 的应用程序，它在运行的
    swf 文件和 Beckon 库之间进行通信。Beckon 使用一个名为 `config.xml` 的 XML 文件，来告知 BeckonFlash 应用程序在何处寻找要运行的
    swf，并设置一些初始启动参数。


    要运行 Beckon Flash 示例，请执行以下操作：


    1.  为项目新建一个文件夹（例如 `C:\MyProject`）。

    2.  将必要文件从 `C:\Program Files\Omek\Beckon SDK\bin` 复制到 `C:\MyProject`。您可以按照开发者指南中“分发基于
    Omek 的内容”下的说明操作，或者简单地将 `bin` 文件夹中的所有内容复制到您的项目文件夹中。

    3.  将 `C:\Program Files\Omek\Beckon SDK\samples\Flash` 复制到 `C:\MyProject`。请确保将目标文件夹命名为
    `Flash`，首字母 `F` 大写。

    4.  运行 `OmekBeckonFlash.exe`。

    5.  现在 Flash 示例 `.swf` 会在此应用程序中打开，并且它将链接到 Omek SDK 运行。


    此时，您应该会看到类似 图 6-3 的画面。这并非浏览器，而是一个独立的应用程序。


    ![images](img/0603.jpg)


    ***图 6-3.** 在 OmekBeckonFlash.exe 中运行的默认独立 Flash 示例*


    以下是 Beckon 与 Flash 通信的方式：


    1.  `OmekBeckonFlash.exe` 加载 `Flash/config.xml`（您必须保留此文件名）。

    2.  Flash 项目会根据 `config.xml` 中 `<movie swfPath=".\Flash\game.swf" />` 标签指定的路径加载。

    3.  加载 SDK，并使用 `.swf` 文件中暴露的函数，将数据发送到正在运行的 `.swf` 文件。


    现在您应该已经可以成功运行 Beckon SDK 了。


    ![images](img/square.jpg) **注意**：Omek 正在简化运行 Flash 应用程序的流程，因此预计会有改进。预计会看到快速更新、快速变动和创新。


    ### 理解 Beckon Flash 示例


    在我们创建自己的 Flash 文件之前，先来探索一下 Beckon Flash 示例。通过理解 Beckon 示例的工作原理，您将能够从零开始创建一个项目。


    #### Beckon 如何与 Flash 协同工作


    在我们甚至打开 Flash 之前，我们先对两行代码进行一次基本的剖析，以便掌握 Beckon 如何与 Flash 协同工作。如果您习惯使用 Flash，您可能已经熟悉
    `ExternalInterface.callback()` 类。使用 `ExternalInterface` 类，您可以在 Flash 运行时环境中调用
    ActionScript 函数。通常，这个类用于让正在运行的 swf 文件与浏览器中的 JavaScript 进行通信。然而，在本例中，Beckon 使用一个额外的应用程序
    `OmekBeckonFlash.exe` 来在其中运行 swf 文件。由于函数在 `.swf` 文件中被暴露出来，因此 OmekBeckonFlash 应用程序可以将
    SDK 发送的信息传递给它们。


    我们将查看 `ExternalCallback` 类的两个关键方法。第一个是 `.addCallback`。此方法将 ActionScript 方法注册为可从容器
    swf 调用。


    以下是 Flash 文件中的完整代码行：


    ```

    ExternalInterface.addCallback("OmekGesture", onOmekGesture);

    ```


    这个 `addCallback` 方法将 `onOmekGesture` 暴露给 SDK。


    下一个方法调用将参数从 `.swf` 文件传递到 `OmekBeckonFlash` 应用程序。这个调用建立了 Flash 与 Beckon 之间的双向通信。它还告诉
    `OmekAddGesture` 函数，如果在摄像头视野中执行了 `leftPush` 手势，则注册该手势。以下是相关的代码行：


    ```

    ExternalInterface.call("OmekAddGesture","leftPush");

    ```


    现在我们已经了解了 Beckon 如何与 Flash 协同工作，让我们来看看实际的 Flash 文件。在 Flash 中打开 `C:\MyProject\Flash\testOmekFlashPlayer`。您会看到当我们启动
    `OmekBeckonFlash.exe` 文件时运行的初始界面。那是因为界面的一部分是在 Flash 中创建的。请注意，没有为 RGB 视频流或深度图预留的方框。这是因为这些元素是通过
    `config.xml` 文件添加到文件中的。Beckon 同时使用 Flash 和这个文件来设置 `OmekBeckonFlash` 应用程序的启动参数。


    您可以稍微修改代码，以帮助理解所发生的事情。首先，调整舞台上标记为 `debugString_txt` 的文本框大小，以便在 `BeckonFlash.exe`
    运行 swf 文件时，能够真正看到其中显示的所有调试代码。将其大小调整为整个舞台大小，并将文本大小设为约 10pt。您还可以继续将其文字颜色设为白色。现在，将背景色设为黑色以便于阅读。保存并导出应用程序。


    现在再次运行示例。移动身体，您将看到所有调试文本都显示在屏幕上，如 图 6-4 所示。


    ![images](img/0604.jpg)


    ***图 6-4.** 在 OmekBeckonFlash.exe 中运行的修改后的独立 Flash 示例*


    使用 Flash 和 Beckon 最大的困难在于失去了控制台窗口。您可以使用原始方法，在屏幕上放一个文本框并向其发送消息，但一种更干净的方法是在屏幕上获取调试文本，即创建一个通过
    Actionscript 绘制调试文本的函数。


    注意示例现在如何反映上述更改。我通过执行手势或在屏幕上触发警报显示，触发了文件中的几个函数。尝试做出类似动作，比如靠近 Kinect 或走出视野。您现在会看到所有新行都被写入屏幕。它们之前就在那里，但因为文本框太小，您看不到调试文本的显示。现在您可以轻松地在
    `debugString_txt` 文本框中看到它们。


    我在图 6-4 中执行了“右击”手势。执行这个手势，只需在右手稍微抬起至胸前高度时，快速做一个类似双击的轻拍动作。这与你轻拍坐在你正前方的人的肩部动作相同。调试文本显示此手势已被摄像头捕捉并注册。接着，我故意靠摄像头太近，触发了
    `Alert_TooClose` 警报。


    `debugString_txt` 文本框之所以重要，是因为当您在第三方应用程序中运行 swf 时，您会失去对 Flash 中普通控制台窗口的访问。创建在屏幕上显示的消息以进行调试，是您在使用
    Beckon 时必须适应的一个根本性变化。处理此问题的一个聪明方法是，在您的应用程序中创建一个调试模式，您可以通过按键触发来开启或关闭屏幕上的警报。

