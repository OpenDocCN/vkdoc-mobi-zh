- fmt: '# Microsoft''s Kinect SDK


    Microsoft Research launched its Kinect for Windows Software Development Kit (`SDK`)
    with great fanfare on June 16, 2011, a little more than seven months after the
    device was released into the wild. While Microsoft perhaps never intended to support
    development for the Kinect on Windows and was likely surprised by the intensive
    interest the device generated, the company is aggressively supporting the platform
    now—you''ll want to watch for updates from Microsoft Research as no print book
    can possibly keep abreast of the latest developments:


    `http://research.microsoft.com/kinectsdk/`


    That said, there''s enough to the Kinect SDK and associated resources (such as
    the Coding4Fun Kinect Toolkit, which includes helper and example code) to get
    you up and running building apps with some of the most sophisticated and mature
    Kinect code available. The resources covered here offer a great way for `C#`,
    `C++`, and `Visual Basic` developers—as well as intrepid beginners—to start using
    the Kinect with Microsoft''s wonderfully robust code for user segmentation, skeletal
    tracking, and even speech recognition. (The Windows SDK is the best toolset available
    if you want to tap into the Kinect''s multimicrophone array, for example.)


    ![images](images/square.jpg) **Note** Coding for Windows is not the same as coding
    for Xbox. Microsoft has a separate programming framework called `XNA` and development
    environment called `Game Studio` for developers to create indie games for Xbox
    Live. As of this writing, Kinect functionalities have **not** been exposed in
    `XNA`, though company insiders say that''s forthcoming. The Kinect SDK covered
    in this chapter empowers you to created Kinect apps for only the Windows platform,
    not Xbox.


    ## Coding4Fun


    Often the best way to learn a new tool is to look at examples of how other folks
    use it to implement their apps, thought experiments, and other feats of code.
    To that end, there''s Coding4Fun ([Figure 8-1](#Chapter08.html#fig_8_1)), a Microsoft
    site dedicated to enthusiast adventures with the company''s technologies. To mark
    the launch of the Kinect SDK in June 2011, Microsoft held a camp at the Microsoft
    campus in Redmond, Washington, where 30-odd developers were given a Kinect, the
    SDK, and 24 hours to create sweet little apps that demonstrate the possibilities
    of this new toolset. The apps became the basis of Microsoft''s showcase/repository
    of Kinect projects on Coding4Fun, which is well worth checking out before, during,
    or after you read this chapter:


    `http://channel9.msdn.com/coding4fun/kinect`


    New projects and examples are frequently posted on the Coding4Fun site, often
    with source code, so it''s the first place to look in case there''s a project
    out there that can jump-start your own Kinect-for-Windows project.


    ![images](images/0801.jpg)


    ***Figure 8-1.** The Coding4Fun Kinect section*


    ## Kinect SDK Pros and Cons


    The upside to using Microsoft''s SDK is considerable. It gives you better Application
    Programming Interfaces (APIs) than any other package for accessing Kinect''s specific
    hardware capabilities, such as its four-element microphone array. The SDK also
    ships with Microsoft''s Kinect runtime and other supporting software, which give
    you the power of Microsoft''s engineering and algorithms for implementing user
    segmentation, skeletal tracking, and (if you include the Speech SDK) voice control,
    all without leaving Windows''s powerful application frameworks.


    These components you get from the Kinect SDK are, in a word, bad ass. We''ve run
    the various middleware discussed elsewhere in the book such as PrimeSense''s open
    source `OpenNI`, and used them to implement some of the same functionality. While
    all of this software is amazing, our experience put Microsoft''s Kinect code at
    the top performance-wise for its low-latency responsiveness and the pure magic
    of its calibration-free skeletal tracking algorithm.


    The downside—at least, for some of you—is that all you can really do with Microsoft''s
    SDK right now is "code for fun" because the license permits only limited, noncommercial
    use of the software. (As you probably can guess, the company says that a commercial-use
    license is forthcoming, though the price and terms are anyone''s guess.) Moreover,
    if you''re new to programming `C#`, `C++`, or `Visual Basic` or to using an integrated
    development environment (IDE), the excellent-but-formidable `Microsoft Visual
    Studio` and supported languages may well scare off the fainthearted.


    For the rest of you, put some coffee on.


    ## Getting Started with the Kinect SDK


    To set up a Kinect development environment on Windows, you''re going to need a
    Kinect, an open USB port, and Windows 7, plus a lot of (no-cost) software from
    Microsoft, including the appropriate Visual Studio edition for your programming
    language of choice and the Kinect SDK itself from Microsoft Research. Everything
    you need is itemized below under "Requirements," along with some common gotchas.


    ### Requirements


    The requirements for working with the Kinect SDK are many but manageable. And
    the only costs should be your PC and the Kinect. Note that I use the term "PC"
    inclusively—I was able to run everything in this chapter on a Mac Mini running
    Windows 7 on Bootcamp. However, as of this writing, you cannot use the Kinect
    SDK via a virtual machine like `Parallels` or `VMware`. Word to the wise.


    #### System


    You''ll need a fairly current PC to run the software described in this chapter:
    a dual-core, 2.66 GHz or faster processor; Windows 7–compatible graphics card
    that supports `DirectX 9.0c` capabilities (which were released in August 2004,
    so if your computer is less than five years old running Windows 7, you''re probably
    good); and at least 2 GB of RAM (4 GB is recommended). And of course, you need
    a Kinect sensor! But hopefully you squared that away in [Chapter 1](#Chapter01.html#ch1).


    Software-wise, you must be running Windows 7, either the 64- or 32-bit version,
    and you''re going to need to know which version you have so that you can download
    the correct version of the SDK. To find out which version you have, check out
    Control Panel ![images](images/U001.jpg) System and Security ![images](images/U001.jpg)
    System and scan down to where it says "System type." You should see either "64-bit
    Operating System" or "32-bit Operating System."


    #### Visual Studio 2010


    If you''re a Windows developer, you probably have a version of Visual Studio already
    installed. Any 2010 edition will suffice, and the Express editions are recommended
    here simply because they''re free. To download yours, just browse to:


    `http://www.microsoft.com/visualstudio`


    Under the Products tab, click Visual Basic Express, Visual C# Express, or Visual
    C++ Express depending on which language you plan to code in. Since many of the
    examples available online are written in `C#`, we''ll use `Visual C# Express`
    here. That way, we''ll be all set up to pull down and pull apart most of the code
    we find on the interwebs. Click Install Now to download and install `Visual C#
    Express`. Just go with the default installation options unless you have some personal
    reason for changing them.


    #### Additional Frameworks and Supporting Software


    ##### .NET Framework


    Without a doubt, you need the `.NET` 4.0 framework for building your apps in Visual
    Studio. The framework is typically bundled with Visual Studio, but if not, download
    and run the installer—it''s fairly large and can take some time:


    `http://msdn.microsoft.com/en-us/netframework/aa569263`


    Beyond that, the other supporting software described here is optional. Still,
    if you plan on exploring Kinect for Windows in depth, you might as well get this
    software installed now, as it is used in some of the examples included with the
    SDK, as well as many third-party examples found online.'
