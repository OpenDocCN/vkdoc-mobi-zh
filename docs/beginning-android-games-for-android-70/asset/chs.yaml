  public class AndroidAudio implements Audio {\nAssetManager assets;\nSoundPool soundPool;\n\
  代码清单 5-2.\nAndroidAudio.java：实现音频接口\n```\n\n`AndroidAudio` 的实现包含一个 `AssetManager`\
  \ 实例和一个 `SoundPool` 实例。当调用 `AndroidAudio.newSound()` 时，需要 `AssetManager` 来将音效从资源文件加载到\
  \ `SoundPool` 中。同时，`AndroidAudio` 实例也负责管理 `SoundPool`。\n\n```java\npublic AndroidAudio(Activity\
  \ activity) {\nactivity.setVolumeControlStream(AudioManager.STREAM_MUSIC);\nthis.assets\
  \ = activity.getAssets();\nthis.soundPool = new SoundPool();\n}\npublic Music newMusic(String\
  \ filename) {\ntry {\nAssetFileDescriptor assetDescriptor = assets.openFd(filename);\n\
  return new AndroidMusic(assetDescriptor);\n} catch (IOException e) {\nthrow new\
  \ RuntimeException(\"Couldn't load music '\" + filename + \"'\");\n}\n}\n```\n\n\
  `newMusic()` 方法创建一个新的 `AndroidMusic` 实例。该类的构造函数接收一个 `AssetFileDescriptor` 参数，并利用它来创建一个内部的\
  \ `MediaPlayer`（稍后会详细说明）。如果出现错误，`AssetManager.openFd()` 方法会抛出 `IOException`。我们捕获此异常，并将其重新抛出为\
  \ `RuntimeException`。为什么不让调用者处理 `IOException`？首先，这会使调用代码变得相当臃肿，因此我们更倾向于抛出一个无需显式捕获的\
  \ `RuntimeException`。其次，我们从资源文件加载音乐。只有在忘记将音乐文件添加到 `assets/` 目录，或者音乐文件包含错误字节时，才会加载失败。错误的字节属于不可恢复的错误，因为我们需要该\
  \ `Music` 实例才能使游戏正常运行。为了避免这种情况发生，在游戏框架的另外几个地方，我们也使用了抛 `RuntimeException` 的方式，而非受检异常。\n\
  \n```java\npublic Sound newSound(String filename) {\ntry {\nAssetFileDescriptor\
  \ assetDescriptor = assets.openFd(filename);\nint soundId = soundPool.load(assetDescriptor,\
  \ 0);\nreturn new AndroidSound(soundPool, soundId);\n} catch (IOException e) {\n\
  throw new RuntimeException(\"Couldn't load sound '\" + filename + \"'\");\n}\n}\n\
  }\n```\n\n最后，`newSound()` 方法从资源文件中加载音效到 `SoundPool`，并返回一个 `AndroidSound` 实例。该实例的构造函数接收一个\
  \ `SoundPool` 和所需音效的 ID（该 ID 由 `SoundPool` 分配）。同样，我们捕获所有 `IOException`，并将其重新抛出为非受检的\
  \ `RuntimeException`。\n\n> **注意**\n>\n> 我们没有在任何方法中释放 `SoundPool`。这是因为始终会存在一个单一的\
  \ `Game` 实例，该实例持有一个单一的 `Audio` 实例，而该 `Audio` 实例又持有一个单一的 `SoundPool` 实例。因此，只要 Activity（以及我们的游戏）存在，`SoundPool`\
  \ 实例就会保持存活。当 Activity 结束时，它会被自动销毁。\n\n接下来，我们将讨论 `AndroidSound` 类，该类实现了 `Sound` 接口。代码清单\
  \ 5-3 展示了其实现。\n\n```java\npackage com.badlogic.androidgames.framework.impl;\nimport\
  \ android.media.SoundPool;\nimport com.badlogic.androidgames.framework.Sound;\n\
  public class AndroidSound implements Sound {\nint soundId;\nSoundPool soundPool;\n\
  public AndroidSound(SoundPool soundPool, int soundId) {\nthis.soundId = soundId;\n\
  this.soundPool = soundPool;\n}\npublic void play(float volume) {\nsoundPool.play(soundId,\
  \ volume, volume, 0, 0, 1);\n}\npublic void dispose() {\nsoundPool.unload(soundId);\n\
  }\n}\n代码清单 5-3.\n使用 AndroidSound.java 实现 Sound 接口\n```\n\n这里没有什么特别之处。通过 `play()`\
  \ 和 `dispose()` 方法，我们只是存储了 `SoundPool` 和已加载音效的 ID，以便稍后进行播放和释放。得益于 Android API，没有比这更简单的实现了。\n\
  \n最后，我们需要实现由 `AndroidAudio.newMusic()` 返回的 `AndroidMusic` 类。代码清单 5-4 展示了该类的代码，看起来比之前稍微复杂一些。这是因为\
  \ `MediaPlayer` 使用了一个状态机，如果在某些状态下调用其方法，它会持续抛出异常。请注意，该代码清单同样被分段展示，并在适当位置插入了注释。\n\n\
  ```java\npackage com.badlogic.androidgames.framework.impl;\nimport java.io.IOException;\n\
  import android.content.res.AssetFileDescriptor;\nimport android.media.MediaPlayer;\n\
  import android.media.MediaPlayer.OnCompletionListener;\nimport com.badlogic.androidgames.framework.Music;\n\
  public class AndroidMusic implements Music, OnCompletionListener {\nMediaPlayer\
  \ mediaPlayer;\nboolean isPrepared = false;\n代码清单 5-4.\nAndroidMusic.java：实现音频接口\n\
  ```\n\n`AndroidMusic` 类存储了一个 `MediaPlayer` 实例和一个名为 `isPrepared` 的布尔变量。请记住，只有当 `MediaPlayer`\
  \ 处于准备状态时，我们才能调用 `MediaPlayer.start()`/`stop()`/`pause()` 方法。这个成员变量帮助我们跟踪 `MediaPlayer`\
  \ 的状态。\n\n`AndroidMusic` 类同时实现了 `Music` 接口和 `OnCompletionListener` 接口。在第 4 章中，我们简单地将此接口定义为一个通知机制，用于告知我们\
  \ `MediaPlayer` 实例何时停止播放音乐文件。如果发生这种情况，在调用其他任何方法之前，需要再次准备 `MediaPlayer`。`OnCompletionListener.onCompletion()`\
  \ 方法可能会在单独的线程中被调用，并且由于我们在此方法中设置了 `isPrepared` 成员变量，因此必须确保其免受并发修改的影响。\n\n```java\n\
  public AndroidMusic(AssetFileDescriptor assetDescriptor) {\nmediaPlayer = new MediaPlayer();\n\
  try {\nmediaPlayer.setDataSource(assetDescriptor.getFileDescriptor(),\nassetDescriptor.getStartOffset(),\n\
  assetDescriptor.getLength());\nmediaPlayer.prepare();\nisPrepared = true;\nmediaPlayer.setOnCompletionListener(this);\n\
  } catch (Exception e) {\nthrow new RuntimeException(\"Couldn't load music\");\n\
  }\n}\n```\n\n在构造函数中，我们根据传入的 `AssetFileDescriptor` 创建并准备 `MediaPlayer` 实例，设置 `isPrepared`\
  \ 标志，并将 `AndroidMusic` 实例注册为 `MediaPlayer` 的 `OnCompletionListener`。如果出现任何问题，我们将再次抛出一个非受检的\
  \ `RuntimeException`。\n\n```java\npublic void dispose() {\nif (mediaPlayer.isPlaying())\n\
  mediaPlayer.stop();\nmediaPlayer.release();\n}\n```\n\n\n\n## 文档排版\n\n`dispose()`方法检查`MediaPlayer`是否仍在播放，如果是则停止它。否则，调用`MediaPlayer.release()`将抛出`RuntimeException`。\n\
  \n```\npublic boolean isLooping() {\nreturn mediaPlayer.isLooping();\n}\npublic\
  \ boolean isPlaying() {\nreturn mediaPlayer.isPlaying();\n}\npublic boolean isStopped()\
  \ {\nreturn !isPrepared;\n}\n```\n\n方法`isLooping()`、`isPlaying()`和`isStopped()`很直接。前两个使用`MediaPlayer`提供的方法；最后一个使用`isPrepared`标志，该标志指示`MediaPlayer`是否已停止。这是`MediaPlayer.isPlaying()`不一定能告诉我们的，因为它会在`MediaPlayer`暂停但未停止时返回`false`。\n\
  \n```\npublic void pause() {\nif (mediaPlayer.isPlaying())\nmediaPlayer.pause();\n\
  }\n```\n\n`pause()`方法简单地检查`MediaPlayer`实例是否正在播放，如果是则调用其`pause()`方法。\n\n```\npublic\
  \ void play() {\nif (mediaPlayer.isPlaying())\nreturn;\ntry {\nsynchronized (this)\
  \ {\nif (!isPrepared)\nmediaPlayer.prepare();\nmediaPlayer.start();\n}\n} catch\
  \ (IllegalStateException e) {\ne.printStackTrace();\n} catch (IOException e) {\n\
  e.printStackTrace();\n}\n}\n```\n\n`play()`方法稍微复杂一些。如果我们已经在播放，则直接返回。接下来，我们有一个庞大的`try/catch`块，在其中我们检查`MediaPlayer`是否已经根据我们的标志准备好了；如果需要，我们准备它。如果一切顺利，我们调用`MediaPlayer.start()`方法，它将开始播放。这是在同步块中进行的，因为我们使用`isPrepared`标志，该标志可能由于实现`OnCompletionListener`接口而在单独的线程上设置。如果出现问题，我们会抛出未经检查的`RuntimeException`。\n\
  \n```\npublic void setLooping(boolean isLooping) {\nmediaPlayer.setLooping(isLooping);\n\
  }\npublic void setVolume(float volume) {\nmediaPlayer.setVolume(volume, volume);\n\
  }\n```\n\n`setLooping()`和`setVolume()`方法可以在`MediaPlayer`的任何状态下调用，并委托给相应的`MediaPlayer`方法。\n\
  \n```\npublic void stop() {\nmediaPlayer.stop();\nsynchronized (this) {\nisPrepared\
  \ = false;\n}\n}\n```\n\n`stop()`方法停止`MediaPlayer`并在同步块中设置`isPrepared`标志。\n\n```\n\
  public void onCompletion(MediaPlayer player) {\nsynchronized (this) {\nisPrepared\
  \ = false;\n}\n}\n}\n```\n\n最后，有`OnCompletionListener.onCompletion()`方法，由`AndroidMusic`类实现。它所做的只是在同步块中设置`isPrepared`标志，以便其他方法不会突然抛出异常。接下来，我们将继续讨论与输入相关的类。\n\
  \n## AndroidInput 和 AccelerometerHandler\n\n使用几个便捷的方法，我们在第[3]章(#A340874_3_En_3_Chapter.html)设计的输入接口允许我们以轮询和事件模式访问加速度计、触摸屏和键盘。将实现该接口的所有代码放入一个文件的想法有些混乱，因此我们将所有输入事件处理外包给处理程序类。`Input`实现将使用这些处理程序来假装它实际上在执行所有工作。\n\
  \n## AccelerometerHandler：哪边朝上？\n\n让我们从最简单的处理程序`AccelerometerHandler`开始。清单 5-5 显示其代码。\n\
  \n```\npackage com.badlogic.androidgames.framework.impl;\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\npublic class AccelerometerHandler implements\
  \ SensorEventListener {\nfloat accelX;\nfloat accelY;\nfloat accelZ;\npublic AccelerometerHandler(Context\
  \ context) {\nSensorManager manager = (SensorManager) context\n.getSystemService(Context.SENSOR_SERVICE);\n\
  if (manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size() != 0) {\nSensor accelerometer\
  \ = manager.getSensorList(\nSensor.TYPE_ACCELEROMETER).get(0);\nmanager.registerListener(this,\
  \ accelerometer,\nSensorManager.SENSOR_DELAY_GAME);\n}\n}\npublic void onAccuracyChanged(Sensor\
  \ sensor, int accuracy) {\n// 这里无需任何操作\n}\npublic void onSensorChanged(SensorEvent\
  \ event) {\naccelX = event.values[0];\naccelY = event.values[1];\naccelZ = event.values[2];\n\
  }\npublic float getAccelX() {\nreturn accelX;\n}\npublic float getAccelY() {\nreturn\
  \ accelY;\n}\npublic float getAccelZ() {\nreturn accelZ;\n}\n}\n```\n*清单 5-5.* `AccelerometerHandler.java`：执行所有加速度计处理\n\
  \n不出所料，该类实现了我们第[4]章(#A340874_3_En_4_Chapter.html)中使用的`SensorEventListener`接口。该类通过保存加速度计三个轴上的加速度来存储三个成员。\n\
  \n构造函数接受一个`Context`，从中获取`SensorManager`实例来设置事件监听。其余代码与我们第[4]章(#A340874_3_En_4_Chapter.html)所做的相同。请注意，如果没有安装加速度计，那么在整个生命周期中，处理程序将愉快地返回所有轴上的零加速度。因此，我们不需要任何额外的错误检查或异常抛出代码。\n\
  \n接下来的两个方法`onAccuracyChanged()`和`onSensorChanged()`应该很熟悉。在第一个方法中，我们不执行任何操作，因此没有太多可报告的。在第二个方法中，我们从提供的`SensorEvent`中获取加速度计值，并将其存储在处理程序的成员中。最后三个方法简单地返回每个轴的当前加速度。\n\
  \n请注意，这里我们不需要执行任何同步，即使`onSensorChanged()`方法可能在不同线程中被调用。Java 内存模型保证对布尔值、整数或字节等基本类型的读写是原子的。在这种情况下，依赖这个事实是可以的，因为我们所做的只是赋值新值，没有更复杂的操作。如果不是这样（例如，我们在`onSensorChanged()`方法中对成员变量进行了某些操作），那么我们就需要适当的同步。\n\
  \n## CompassHandler\n\n只是为有趣，我们将提供一个与`AccelerometerHandler`类似的示例，但这次我们将提供指南针值以及手机的俯仰角和翻滚角，如清单\
  \ 5-6 所示。我们将指南针值称为`yaw`，因为这是一个标准的方位术语，很好地定义了我们看到的值。\n\nAndroid 通过相同的接口处理所有传感器，因此此示例向您展示如何处理这种情况。清单\
  \ 5-6 与之前的加速度计示例的唯一区别在于，传感器类型更改为`TYPE_ORIENTATION`，并且字段名称从`accel`重命名为`yaw`、`pitch`和`roll`。否则，它以相同的方式工作，并且您可以轻松地将此代码作为控制处理程序交换到游戏中！\n\
  \n\n\n```java\npackage com.badlogic.androidgames.framework.impl;\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\npublic class CompassHandler implements SensorEventListener\
  \ {\nfloat yaw;\nfloat pitch;\nfloat roll;\nSensor mAccelerometer;\nSensor mMagnetometer;\n\
  float[] mLastAccelerometer = new float[3];\nfloat[] mLastMagnetometer = new float[3];\n\
  boolean mLastAccelerometerSet = false;\nboolean mLastMagnetometerSet = false;\n\
  float[] mR = new float[9];\nfloat[] mOrientation = new float[3];\npublic CompassHandler(Context\
  \ context) {\nSensorManager manager = (SensorManager) context\n.getSystemService(Context.SENSOR_SERVICE);\n\
  mAccelerometer = mSensorManager.getDefaultSensor(Sensor.TYPE_ACCELEROMETER);\nmMagnetometer\
  \ = mSensorManager.getDefaultSensor(Sensor.TYPE_MAGNETIC_FIELD);        }\n}\n@Override\n\
  public void onAccuracyChanged(Sensor sensor, int accuracy) {\n// 此处无需处理\n}\n@Override\n\
  public void onSensorChanged(SensorEvent event) {\nif (event.sensor == mAccelerometer)\
  \ {\nSystem.arraycopy(event.values, 0, mLastAccelerometer,\n0, event.values.length);\n\
  mLastAccelerometerSet = true;\n} else if (event.sensor == mMagnetometer) {\nSystem.arraycopy(event.values,\
  \ 0,\nmLastMagnetometer, 0, event.values.length);\nmLastMagnetometerSet = true;\n\
  }\nif (mLastAccelerometerSet && mLastMagnetometerSet) {\nSensorManager.getRotationMatrix(mR,\
  \ null,\nmLastAccelerometer, mLastMagnetometer);\nSensorManager.getOrientation(mR,\
  \ mOrientation);\nyaw = mOrientation[0];\npitch = mOrientation[1];\nroll = mOrientation[2];\n\
  }\n}\npublic float getYaw() {\nreturn yaw;\n}\npublic float getPitch() {\nreturn\
  \ pitch;\n}\npublic float getRoll() {\nreturn roll;\n}\n}\n```\n代码清单 5-6. `CompassHandler.java`：执行所有指南针处理\n\
  \n本书中的游戏不会使用指南针，但如果你打算复用我们开发的框架，这个类可能会派上用场。\n\n## Pool 类：复用有益无害！\n\n作为 Android 开发者，最糟糕的事情是什么？是导致世界停滞的垃圾回收！如果你查看第\
  \ 3 章中的输入接口定义，会发现 `getTouchEvents()` 和 `getKeyEvents()` 方法。这些方法返回 `TouchEvent` 和\
  \ `KeyEvent` 列表。在键盘和触摸事件处理器中，我们不断创建这两个类的实例，并将其存储在处理器内部的列表中。Android 输入系统在按下按键或手指触摸屏幕时会触发大量此类事件，因此我们不断创建新实例，而垃圾回收器会在短时间内回收它们。为避免这种情况，我们必须实现一种称为实例池化的概念。与其重复创建类的新实例，不如直接复用先前创建的实例。`Pool`\
  \ 类是实现这一行为的便捷方式。让我们看看代码清单 5-7 中的代码，该代码已分段并包含相应的注释。\n\n```java\npackage com.badlogic.androidgames.framework;\n\
  import java.util.ArrayList;\nimport java.util.List;\npublic class Pool {\n```\n\
  代码清单 5-7. `Pool.java`：与垃圾回收器友好协作\n\n以下是泛型部分：首先要认识到这是一个泛型类型类，与 `ArrayList` 或 `HashMap`\
  \ 等集合类类似。泛型允许我们在 `Pool` 中存储任何类型的对象，而无需持续进行强制类型转换。那么，`Pool` 类究竟是做什么的呢？\n\n```java\n\
  public interface PoolObjectFactory {\npublic T createObject();\n}\n```\n\n首先定义的是一个名为\
  \ `PoolObjectFactory` 的接口，同样也是泛型的。它有一个方法 `createObject()`，该方法将返回一个与 `Pool`/`PoolObjectFactory`\
  \ 实例泛型类型相同的新对象。\n\n```java\nprivate final List freeObjects;\nprivate final PoolObjectFactory\
  \ factory;\nprivate final int maxSize;\n```\n\n`Pool` 类有三个成员。其中包括一个用于存储池化对象的 `ArrayList`、一个用于生成该类所持有类型新实例的\
  \ `PoolObjectFactory`，以及一个存储池最大可容纳对象数量的成员。最后一项是必需的，以确保池不会无限增长；否则，我们可能会遇到内存不足异常。\n\
  \n```java\npublic Pool(PoolObjectFactory factory, int maxSize) {\nthis.factory =\
  \ factory;\nthis.maxSize = maxSize;\nthis.freeObjects = new ArrayList(maxSize);\n\
  }\n```\n\n`Pool` 类的构造函数接受一个 `PoolObjectFactory` 和最大可存储对象数量。我们将这两个参数分别存储到对应成员变量中，并实例化一个新的\
  \ `ArrayList`，其容量设置为最大对象数量。\n\n```java\npublic T newObject() {\nT object = null;\n\
  if (freeObjects.isEmpty())\nobject = factory.createObject();\nelse\nobject = freeObjects.remove(freeObjects.size()\
  \ - 1);\nreturn object;\n}\n```\n\n`newObject()` 方法负责通过 `PoolObjectFactory.newObject()`\
  \ 方法返回一个该类所持有类型的新实例，或者，如果 `freeObjects` 列表中有池化实例，则返回该实例。使用此方法时，只要池的 `freeObjects`\
  \ 列表中存有对象，我们就会获得可回收的对象。否则，该方法会通过工厂创建一个新对象。\n\n```java\npublic void free(T object)\
  \ {\nif (freeObjects.size() < maxSize)\nfreeObjects.add(object);\n}\n}\n```\n\n\
  `free()` 方法允许我们重新插入不再使用的对象。它会在列表未满时将对象插入到 `freeObjects` 列表中。如果列表已满，则不添加该对象，该对象很可能会在垃圾回收器下次执行时被回收。\n\
  \n那么，如何使用这个类呢？我们将通过一些伪代码来展示 `Pool` 类与触摸事件的结合使用。\n\n```java\nPoolObjectFactory factory\
  \ = new PoolObjectFactory() {\n@Override\npublic TouchEvent createObject() {\nreturn\
  \ new TouchEvent();\n}\n};\nPool touchEventPool = new Pool(factory, 50);\nTouchEvent\
  \ touchEvent = touchEventPool.newObject();\n... 在此处执行某些操作 ...\ntouchEventPool.free(touchEvent);\n\
  ```\n\n首先，我们定义一个 `PoolObjectFactory`，用于创建 `TouchEvent` 实例。接着，实例化 `Pool` 类，指定使用我们的工厂，并设置最大存储\
  \ 50 个 `TouchEvent`。当我们想从池中获取新的 `TouchEvent` 时，调用池的 `newObject()` 方法。初始时池为空，因此它会要求工厂创建一个全新的\
  \ `TouchEvent` 实例。当不再需要该 `TouchEvent` 时，通过调用 `free()` 方法将其重新插入池中。下次调用 `newObject()`\
  \ 方法时，我们将获得相同的 `TouchEvent` 实例并进行回收，从而避免垃圾回收器带来的问题。这个类在多个场景中都很有用。请注意，从池中获取复用对象时，务必确保完全重新初始化这些对象。\n\
  \n## KeyboardHandler：上、上、下、下、左、右……\n\n`KeyboardHandler` 类需完成多项任务。首先，它必须与接收键盘事件的视图建立连接。其次，它必须存储每个按键的当前状态，以供轮询。同时，它还必须维护一个\
  \ `KeyEvent` 实例列表（我们在第 3 章中为此设计了事件型输入处理），用于基于事件的输入处理。最后，由于它将在 UI 线程上接收事件，同时又被我们主游戏循环（在另一线程上执行）轮询，因此必须正确同步所有操作。工作量相当大！为了便于回顾，我们在此展示第\
  \ 3 章中作为输入接口一部分定义的 `KeyEvent` 类。\n\n```java\npublic static class KeyEvent {\npublic\
  \ static final int KEY_DOWN = 0;\npublic static final int KEY_UP = 1;\npublic int\
  \ type;\npublic int keyCode;\npublic char keyChar;\n}\n```\n\n\n\n### 排版后内容\n\n\
  该类仅定义了三个成员变量，用于编码按键事件类型，同时保存事件的类型、键码和 Unicode 字符。借助此类，我们可以实现事件处理程序。\n\n清单 5-8 展示了使用之前讨论的\
  \ Android API 和我们新建的 `Pool` 类所实现的事件处理程序。该清单通过注释进行了分段解析。\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport android.view.View;\n\
  import android.view.View.OnKeyListener;\nimport com.badlogic.androidgames.framework.Input.KeyEvent;\n\
  import com.badlogic.androidgames.framework.impl.Pool.PoolObjectFactory;\npublic\
  \ class KeyboardHandler implements OnKeyListener {\nboolean[] pressedKeys = new\
  \ boolean[128];\nPool keyEventPool;\nList keyEventsBuffer = new ArrayList();\nList\
  \ keyEvents = new ArrayList();\nListing 5-8.\nKeyboardHandler.java: Handling keys\
  \ since 2010\n```\n\n`KeyboardHandler` 类实现了 `OnKeyListener` 接口，以便从视图接收按键事件。其成员变量如下：\n\
  \n第一个成员变量是一个包含 128 个布尔值的数组。我们用它存储每个按键的当前状态（按下或未按下），并通过按键的键码进行索引。幸运的是，`android.view.KeyEvent.KEYCODE_XXX`\
  \ 常量（编码了键码）的取值范围均在 0 到 127 之间，因此我们可以采用对垃圾回收器友好的方式存储它们。需要注意的是，由于意外重名，我们的 `KeyEvent`\
  \ 类与 Android 的 `KeyEvent` 类名称相同，Android 的实例会传递给我们的 `OnKeyEventListener.onKeyEvent()`\
  \ 方法。这种轻微混淆仅限于此处理程序代码。由于没有比 `KeyEvent` 更适合按键事件的名称，我们选择接受这种短暂的混淆。\n\n第二个成员变量是一个 `Pool`\
  \ 类，用于持有 `KeyEvent` 类的实例。我们不希望激怒垃圾回收器，因此会回收所有创建的 `KeyEvent` 对象。\n\n第三个成员变量存储尚未被游戏消费的\
  \ `KeyEvent` 实例。每当我们在 UI 线程上收到新的按键事件时，都会将其添加到此列表中。\n\n最后一个成员变量存储通过调用 `KeyboardHandler.getKeyEvents()`\
  \ 返回的按键事件。在后续章节中，我们将了解为何需要对按键事件进行双缓冲。\n\n```\npublic KeyboardHandler(View view)\
  \ {\nPoolObjectFactory factory = new PoolObjectFactory() {\npublic KeyEvent createObject()\
  \ {\nreturn new KeyEvent();\n}\n};\nkeyEventPool = new Pool(factory, 100);\nview.setOnKeyListener(this);\n\
  view.setFocusableInTouchMode(true);\nview.requestFocus();\n}\n```\n\n构造方法接收一个参数，即我们希望从中接收按键事件的视图。我们通过适当的\
  \ `PoolObjectFactory` 创建 `Pool` 实例，将处理程序注册为视图的 `OnKeyListener`，最后通过将视图设置为焦点视图来确保其能够接收按键事件。\n\
  \n```\npublic boolean onKey(View v, int keyCode, android.view.KeyEvent event) {\n\
  if (event.getAction() == android.view.KeyEvent.ACTION_MULTIPLE)\nreturn false;\n\
  synchronized (this) {\nKeyEvent keyEvent = keyEventPool.newObject();\nkeyEvent.keyCode\
  \ = keyCode;\nkeyEvent.keyChar = (char) event.getUnicodeChar();\nif (event.getAction()\
  \ == android.view.KeyEvent.ACTION_DOWN) {\nkeyEvent.type = KeyEvent.KEY_DOWN;\n\
  if(keyCode > 0 && keyCode < 127)\npressedKeys[keyCode] = true;\n}\nif (event.getAction()\
  \ == android.view.KeyEvent.ACTION_UP) {\nkeyEvent.type = KeyEvent.KEY_UP;\nif(keyCode\
  \ > 0 && keyCode < 127)\npressedKeys[keyCode] = false;\n}\nkeyEventsBuffer.add(keyEvent);\n\
  }\nreturn false;\n}\n```\n\n接下来，我们将讨论 `OnKeyListener.onKey()` 接口方法的实现，该方法在视图每次收到新的按键事件时被调用。我们首先忽略任何编码为\
  \ `KeyEvent.ACTION_MULTIPLE` 的（Android）按键事件。这些事件在我们的上下文中不相关。随后是一个同步块。请记住，事件是在 UI\
  \ 线程上接收的，而在主循环线程上读取，因此我们必须确保成员变量不会被并行访问。\n\n在同步块内，我们首先从 `Pool` 类中获取一个（我们 `KeyEvent`\
  \ 实现的）`KeyEvent` 实例。根据对象池的状态，这可能会返回一个回收的实例或一个全新的实例。接着，我们根据传递给方法的 Android `KeyEvent`\
  \ 的内容设置 `KeyEvent` 的 `keyCode` 和 `keyChar` 成员变量。然后，我们解码 Android `KeyEvent` 的类型，并相应地设置我们\
  \ `KeyEvent` 的类型以及 `pressedKey` 数组中的元素。最后，我们将 `KeyEvent` 添加到之前定义的 `keyEventBuffer`\
  \ 列表中。\n\n```\npublic boolean isKeyPressed(int keyCode) {\nif (keyCode < 0 || keyCode\
  \ > 127)\nreturn false;\nreturn pressedKeys[keyCode];\n}\n```\n\n处理程序的另一个方法是 `isKeyPressed()`，它实现了\
  \ `Input.isKeyPressed()` 的语义。首先，我们传入一个指定键码（Android `KeyEvent.KEYCODE_XXX` 常量之一）的整数，并返回该键是否被按下。为此，我们在进行范围检查后，在\
  \ `pressedKey` 数组中查找该键的状态。请记住，我们在之前的方法中设置了该数组的元素，而该方法是在 UI 线程上调用的。由于我们再次使用基本类型，因此无需同步。\n\
  \n```\npublic List getKeyEvents() {\nsynchronized (this) {\nint len = keyEvents.size();\n\
  for (int i = 0; i < len; i++) {\nkeyEventPool.free(keyEvents.get(i));\n}\nkeyEvents.clear();\n\
  keyEvents.addAll(keyEventsBuffer);\nkeyEventsBuffer.clear();\nreturn keyEvents;\n\
  }\n}\n}\n```\n\n处理程序的最后一个方法名为 `getKeyEvents()`，它实现了 `Input.getKeyEvents()` 方法的语义。我们再次从同步块开始，要记住该方法将从不同的线程调用。\n\
  \n接下来，我们遍历 `keyEvents` 数组，并将其所有 `KeyEvent` 插入 `Pool` 类。请记住，我们是在 UI 线程的 `onKey()`\
  \ 方法中从对象池获取实例的。这里，我们将它们重新插入对象池。但 `keyEvents` 列表难道不是空的吗？是的，但仅在第一次调用该方法时。要理解原因，需要理解该方法剩余部分。\n\
  \n在我们神秘的 `Pool` 插入循环之后，我们清空 `keyEvents` 列表，并用 `keyEventsBuffer` 列表中的事件填充它。最后，我们清空\
  \ `keyEventsBuffer` 列表，并将新填充的 `keyEvents` 列表返回给调用者。这里发生了什么？\n\n我们将通过一个简单示例来说明这一点。首先，我们检查每当\
  \ UI 线程上到达新事件或游戏在主游戏线程中获取事件时，`keyEvents` 列表、`keyEventsBuffer` 列表以及 `Pool` 类会发生什么：\n\
  \n1.  我们在 UI 线程上收到一个新事件。对象池中还没有内容，因此会创建一个新的 `KeyEvent` 实例（`KeyEvent1`）并插入到 `keyEventsBuffer`\
  \ 列表中。\n2.  我们在主线程上调用 `getKeyEvents()`。`getKeyEvents()` 从 `keyEventsBuffer` 列表中取出\
  \ `KeyEvent1`，并将其放入返回给调用者的 `keyEvents` 列表中。\n3.  我们在 UI 线程上收到另一个事件。对象池中仍然没有内容，因此会创建一个新的\
  \ `KeyEvent` 实例（`KeyEvent2`）并插入到 `keyEventsBuffer` 列表中。\n4.  主线程再次调用 `getKeyEvents()`。现在，有趣的事情发生了。进入该方法时，`keyEvents`\
  \ 列表仍然持有 `KeyEvent1`。插入循环会将该事件放入对象池。然后清空 `keyEvents` 列表，并将 `keyEventsBuffer` 中的\
  \ `KeyEvent` 插入（在本例中为 `KeyEvent2`）。我们刚刚回收了一个按键事件。\n5.  又一个按键事件在 UI 线程上到达。这次，对象池中有一个空闲的\
  \ `KeyEvent1`，我们愉快地重用了它。令人难以置信的是，没有产生垃圾回收！\n\n\n\n```\nUI 线程：onKey() ->\nkeyEvents\
  \ = { }, keyEventsBuffer = {KeyEvent1}, pool = { }\n游戏线程：getKeyEvents() ->\nkeyEvents\
  \ = {KeyEvent1}, keyEventsBuffer = { }, pool = { }\nUI 线程：onKey() ->\nkeyEvents\
  \ = {KeyEvent1}, keyEventsBuffer = {KeyEvent2}, pool = { }\n游戏线程：getKeyEvents()\
  \ ->\nkeyEvents = {KeyEvent2}, keyEventsBuffer = { }, pool = {KeyEvent1}\nUI 线程：onKey()\
  \ ->\nkeyEvents = {KeyEvent2}, keyEventsBuffer = {KeyEvent1}, pool = { }\n```\n\n\
  该机制有一个注意事项：我们必须频繁调用`KeyboardHandler.getKeyEvents()`，否则`keyEvents`列表会迅速填满，且没有对象会被回收到对象池。只要记住这一点，就可以避免问题。\n\
  \n## Touch Handlers（触摸处理器）\n\n为了可互换地使用我们的两个处理程序类，我们需要定义一个通用接口。清单 5-9 展示了`TouchHandler`接口。\n\
  \n```java\npackage com.badlogic.androidgames.framework.impl;\nimport java.util.List;\n\
  import android.view.View.OnTouchListener;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  public interface TouchHandler extends OnTouchListener {\npublic boolean isTouchDown(int\
  \ pointer);\npublic int getTouchX(int pointer);\npublic int getTouchY(int pointer);\n\
  public List getTouchEvents();\n}\n清单 5-9.\nTouchHandler.java\n```\n\n所有触摸处理程序都必须实现`OnTouchListener`接口，该接口用于将处理程序注册到视图。该接口的方法分别对应第\
  \ 3 章定义的输入接口的相应方法。前三个方法用于轮询特定指针 ID 的状态，最后一个方法用于获取触摸事件以进行基于事件驱动的输入处理。请注意，轮询方法接受的指针\
  \ ID 可以是任意数字，并由触摸事件给出。\n\n## The SingleTouchHandler Class（单点触摸处理程序类）\n\n对于单点触摸处理程序，我们忽略除零之外的任何\
  \ ID。回顾第 3 章中作为输入接口一部分定义的`TouchEvent`类。\n\n```java\npublic static class TouchEvent\
  \ {\npublic static final int TOUCH_DOWN = 0;\npublic static final int TOUCH_UP =\
  \ 1;\npublic static final int TOUCH_DRAGGED = 2;\npublic int type;\npublic int x,\
  \ y;\npublic int pointer;\n}\n```\n\n与`KeyEvent`类类似，`TouchEvent`类定义了一些常量来表示触摸事件的类型，以及触摸事件在视图坐标系中的\
  \ x 和 y 坐标和指针 ID。清单 5-10 展示了适用于 Android 1.5 和 1.6 的`TouchHandler`接口实现，并附有注释说明。\n\
  \n```java\npackage com.badlogic.androidgames.framework.impl;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport android.view.MotionEvent;\nimport android.view.View;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.impl.Pool.PoolObjectFactory;\n\
  public class SingleTouchHandler implements TouchHandler {\nboolean isTouched;\n\
  int touchX;\nint touchY;\nPool touchEventPool;\nList touchEvents = new ArrayList();\n\
  List touchEventsBuffer = new ArrayList();\nfloat scaleX;\nfloat scaleY;\n清单 5-10.\n\
  SingleTouchHandler.java: 适用于单点触摸，不适用于多点触摸\n```\n\n我们首先让这个类实现`TouchHandler`接口，这也意味着它必须实现`OnTouchListener`接口。接着，我们使用三个成员变量来存储单根手指的触摸屏当前状态，然后是一个`Pool`类和两个存储触摸事件的列表。这与`KeyboardHandler`中的结构相同。我们还有两个成员变量`scaleX`和`scaleY`。我们将在后续章节中处理它们，并用它们来适配不同的屏幕分辨率。\n\
  \n> **注意**：当然，我们可以通过从处理对象池和同步的基类派生出`KeyboardHandler`和`SingleTouchHandler`来使代码更优雅。但这会使解释变得更加复杂，因此我们选择多写几行代码。\n\
  \n```java\npublic SingleTouchHandler(View view, float scaleX, float scaleY) {\n\
  PoolObjectFactory factory = new PoolObjectFactory() {\n@Override\npublic TouchEvent\
  \ createObject() {\nreturn new TouchEvent();\n}\n};\ntouchEventPool = new Pool(factory,\
  \ 100);\nview.setOnTouchListener(this);\nthis.scaleX = scaleX;\nthis.scaleY = scaleY;\n\
  }\n```\n\n在构造函数中，我们将该处理程序注册为一个`OnTouchListener`，并设置用于回收`TouchEvent`实例的`Pool`类。我们还存储了传递给构造函数的`scaleX`和`scaleY`参数（暂时忽略它们）。\n\
  \n```java\npublic boolean onTouch(View v, MotionEvent event) {\nsynchronized(this)\
  \ {\nTouchEvent touchEvent = touchEventPool.newObject();\nswitch (event.getAction())\
  \ {\ncase MotionEvent.ACTION_DOWN:\ntouchEvent.type = TouchEvent.TOUCH_DOWN;\nisTouched\
  \ = true;\nbreak;\ncase MotionEvent.ACTION_MOVE:\ntouchEvent.type = TouchEvent.TOUCH_DRAGGED;\n\
  isTouched = true;\nbreak;\ncase MotionEvent.ACTION_CANCEL:\ncase MotionEvent.ACTION_UP:\n\
  touchEvent.type = TouchEvent.TOUCH_UP;\nisTouched = false;\nbreak;\n}\ntouchEvent.x\
  \ = touchX = (int)(event.getX() * scaleX);\ntouchEvent.y = touchY = (int)(event.getY()\
  \ * scaleY);\ntouchEventsBuffer.add(touchEvent);\nreturn true;\n}\n}\n```\n\n`onTouch()`方法达到了与`KeyboardHandler`的`onKey()`方法相同的效果；唯一的区别是我们现在处理的是触摸事件而非按键事件。所有的同步、对象池和`MotionEvent`处理都是我们熟悉的。唯一值得注意的地方是，我们将触摸事件报告的\
  \ x 和 y 坐标乘以了`scaleX`和`scaleY`。这一点很重要，我们将在后续章节中再次提及。\n\n```java\npublic boolean\
  \ isTouchDown(int pointer) {\nsynchronized(this) {\nif(pointer == 0)\nreturn isTouched;\n\
  else\nreturn false;\n}\n}\npublic int getTouchX(int pointer) {\nsynchronized(this)\
  \ {\nreturn touchX;\n}\n}\npublic int getTouchY(int pointer) {\nsynchronized(this)\
  \ {\nreturn touchY;\n}\n}\n```\n\n方法`isTouchDown()`、`getTouchX()`和`getTouchY()`允许我们根据在`onTouch()`方法中设置的成员变量来轮询触摸屏的状态。它们唯一值得注意的是，它们仅对指针\
  \ ID 为零的情况返回有用数据，因为此类仅支持单点触摸屏。\n\n```java\npublic List getTouchEvents() {\nsynchronized(this)\
  \ {\nint len = touchEvents.size();\nfor( int i = 0; i < len; i++ )\ntouchEventPool.free(touchEvents.get(i));\n\
  touchEvents.clear();\ntouchEvents.addAll(touchEventsBuffer);\ntouchEventsBuffer.clear();\n\
  return touchEvents;\n}\n}\n}\n```\n\n最后一个方法`SingleTouchHandler.getTouchEvents()`对您来说应该很熟悉，它与`KeyboardHandler.getKeyEvents()`方法类似。请记住，我们需要频繁调用此方法，以防止`touchEvents`列表被填满。\n\
  \n## The MultiTouchHandler（多点触摸处理程序）\n\n对于多点触摸处理，我们使用一个名为`MultiTouchHandler`的类，如清单\
  \ 5-11 所示。\n\n\n\n```java\npackage com.badlogic.androidgames.framework.impl;\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\nimport android.view.MotionEvent;\n\
  import android.view.View;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.impl.Pool.PoolObjectFactory;\npublic\
  \ class MultiTouchHandler implements TouchHandler {\nprivate static final int MAX_TOUCHPOINTS\
  \ = 10;\nboolean[] isTouched = new boolean[MAX_TOUCHPOINTS];\nint[] touchX = new\
  \ int[MAX_TOUCHPOINTS];\nint[] touchY = new int[MAX_TOUCHPOINTS];\nint[] id = new\
  \ int[MAX_TOUCHPOINTS];\nPool touchEventPool;\nList touchEvents = new ArrayList();\n\
  List touchEventsBuffer = new ArrayList();\nfloat scaleX;\nfloat scaleY;\npublic\
  \ MultiTouchHandler(View view, float scaleX, float scaleY) {\nPoolObjectFactory\
  \ factory = new PoolObjectFactory() {\npublic TouchEvent createObject() {\nreturn\
  \ new TouchEvent();\n}\n};\ntouchEventPool = new Pool(factory, 100);\nview.setOnTouchListener(this);\n\
  this.scaleX = scaleX;\nthis.scaleY = scaleY;\n}\npublic boolean onTouch(View v,\
  \ MotionEvent event) {\nsynchronized (this) {\nint action = event.getAction() &\
  \ MotionEvent.ACTION_MASK;\nint pointerIndex = (event.getAction() & MotionEvent.ACTION_POINTER_ID_MASK)\
  \ >> MotionEvent.ACTION_POINTER_ID_SHIFT;\nint pointerCount = event.getPointerCount();\n\
  TouchEvent touchEvent;\nfor (int i = 0; i < MAX_TOUCHPOINTS; i++) {\nif (i >= pointerCount)\
  \ {\nisTouched[i] = false;\nid[i] = -1;\ncontinue;\n}\nint pointerId = event.getPointerId(i);\n\
  if (event.getAction() != MotionEvent.ACTION_MOVE && i != pointerIndex) {\n// 如果是抬起/按下/取消/移出事件，检查\
  \ id 以确定是否应对此触点进行处理\ncontinue;\n}\nswitch (action) {\ncase MotionEvent.ACTION_DOWN:\n\
  case MotionEvent.ACTION_POINTER_DOWN:\ntouchEvent = touchEventPool.newObject();\n\
  touchEvent.type = TouchEvent.TOUCH_DOWN;\ntouchEvent.pointer = pointerId;\ntouchEvent.x\
  \ = touchX[i] = (int) (event.getX(i) * scaleX);\ntouchEvent.y = touchY[i] = (int)\
  \ (event.getY(i) * scaleY);\nisTouched[i] = true;\nid[i] = pointerId;\ntouchEventsBuffer.add(touchEvent);\n\
  break;\ncase MotionEvent.ACTION_UP:\ncase MotionEvent.ACTION_POINTER_UP:\ncase MotionEvent.ACTION_CANCEL:\n\
  touchEvent = touchEventPool.newObject();\ntouchEvent.type = TouchEvent.TOUCH_UP;\n\
  touchEvent.pointer = pointerId;\ntouchEvent.x = touchX[i] = (int) (event.getX(i)\
  \ * scaleX);\ntouchEvent.y = touchY[i] = (int) (event.getY(i) * scaleY);\nisTouched[i]\
  \ = false;\nid[i] = -1;\ntouchEventsBuffer.add(touchEvent);\nbreak;\ncase MotionEvent.ACTION_MOVE:\n\
  touchEvent = touchEventPool.newObject();\ntouchEvent.type = TouchEvent.TOUCH_DRAGGED;\n\
  touchEvent.pointer = pointerId;\ntouchEvent.x = touchX[i] = (int) (event.getX(i)\
  \ * scaleX);\ntouchEvent.y = touchY[i] = (int) (event.getY(i) * scaleY);\nisTouched[i]\
  \ = true;\nid[i] = pointerId;\ntouchEventsBuffer.add(touchEvent);\nbreak;\n}\n}\n\
  return true;\n}\n}\npublic boolean isTouchDown(int pointer) {\nsynchronized (this)\
  \ {\nint index = getIndex(pointer);\nif (index < 0 || index >= MAX_TOUCHPOINTS)\n\
  return false;\nelse\nreturn isTouched[index];\n}\n}\npublic int getTouchX(int pointer)\
  \ {\nsynchronized (this) {\nint index = getIndex(pointer);\nif (index < 0 || index\
  \ >= MAX_TOUCHPOINTS)\nreturn 0;\nelse\nreturn touchX[index];\n}\n}\npublic int\
  \ getTouchY(int pointer) {\nsynchronized (this) {\nint index = getIndex(pointer);\n\
  if (index < 0 || index >= MAX_TOUCHPOINTS)\nreturn 0;\nelse\nreturn touchY[index];\n\
  }\n}\npublic List getTouchEvents() {\nsynchronized (this) {\nint len = touchEvents.size();\n\
  for (int i = 0; i < len; i++)\ntouchEventPool.free(touchEvents.get(i));\ntouchEvents.clear();\n\
  touchEvents.addAll(touchEventsBuffer);\ntouchEventsBuffer.clear();\nreturn touchEvents;\n\
  }\n}\n// 返回给定 pointerId 对应的索引，若不存在则返回 -1。\nprivate int getIndex(int pointerId) {\n\
  for (int i = 0; i < MAX_TOUCHPOINTS; i++) {\nif (id[i] == pointerId) {\nreturn i;\n\
  }\n}\nreturn -1;\n}\n}\n```\n\n**清单 5-11.** `MultiTouchHandler.java`（内容类似）\n\n`onTouch()`方法看起来和我们第\
  \ 4 章的测试示例一样令人生畏。然而，我们只需要将那个测试代码与我们之前详细讨论过的事件池和同步机制结合起来。与`SingleTouchHandler.onTouch()`方法的唯一真正区别在于，我们处理了多指触摸，并相应地设置了`TouchEvent.pointer`成员（而不是使用值\
  \ 0）。\n\n轮询方法——`isTouchDown()`、`getTouchX()`和`getTouchY()`——也应该看起来很熟悉。我们进行一些错误检查，然后从我们在`onTouch()`方法中填充的成员数组中获取相应触摸索引对应的触摸状态。\n\
  \n最后一个公共方法`getTouchEvents()`与`SingleTouchHandler.getTouchEvents()`中的对应方法完全相同。现在我们拥有了所有这些处理器，我们可以实现输入接口了。\n\
  \n该类中的最后一个方法是辅助方法，用于查找触摸点 ID 对应的索引。\n\n### AndroidInput：伟大的协调器\n\n游戏框架的`Input`实现将所有我们开发的处理器整合在一起。任何方法调用都被委托给相应的处理器。该实现唯一有趣的地方在于，根据设备运行的\
  \ Android 版本选择合适的`TouchHandler`实现。清单 5-12 展示了一个名为`AndroidInput`的实现，并附有注释。\n\n```java\n\
  package com.badlogic.androidgames.framework.impl;\nimport java.util.List;\nimport\
  \ android.content.Context;\nimport android.os.Build.VERSION;\nimport android.view.View;\n\
  import com.badlogic.androidgames.framework.Input;\npublic class AndroidInput implements\
  \ Input {\nAccelerometerHandler accelHandler;\nKeyboardHandler keyHandler;\nTouchHandler\
  \ touchHandler;\n```\n\n**清单 5-12.** `AndroidInput.java`: 优雅地处理处理器\n\n我们首先让该类实现在第\
  \ 3 章定义的输入接口`AndroidInput`。这为我们带来了三个成员：`AccelerometerHandler`、`KeyboardHandler`和`TouchHandler`。\n\
  \n```java\npublic AndroidInput(Context context, View view, float scaleX, float scaleY)\
  \ {\naccelHandler = new AccelerometerHandler(context);\nkeyHandler = new KeyboardHandler(view);\n\
  touchHandler = new MultiTouchHandler(view, scaleX, scaleY);\n}\n```\n\n这些成员在构造函数中初始化，该构造函数接受`Context`、`View`以及`scaleX`和`scaleY`参数（后两个我们可以忽略）。`AccelerometerHandler`通过`Context`参数实例化，而`KeyboardHandler`需要传入的`View`。\n\
  \n```java\npublic boolean isKeyPressed(int keyCode) {\n    return keyHandler.isKeyPressed(keyCode);\n\
  }\npublic boolean isTouchDown(int pointer) {\n    return touchHandler.isTouchDown(pointer);\n\
  }\npublic int getTouchX(int pointer) {\n    return touchHandler.getTouchX(pointer);\n\
  }\npublic int getTouchY(int pointer) {\n    return touchHandler.getTouchY(pointer);\n\
  }\npublic float getAccelX() {\n    return accelHandler.getAccelX();\n}\npublic float\
  \ getAccelY() {\n    return accelHandler.getAccelY();\n}\npublic float getAccelZ()\
  \ {\n    return accelHandler.getAccelZ();\n}\npublic List getTouchEvents() {\n \
  \   return touchHandler.getTouchEvents();\n}\npublic List getKeyEvents() {\n   \
  \ return keyHandler.getKeyEvents();\n}\n}\n```\n\n该类的其余部分不言自明。每个方法调用都被委托给相应的处理器，由它们完成实际工作。至此，我们完成了游戏框架的输入\
  \ API。接下来，我们将讨论图形。\n\n### AndroidGraphics 与 AndroidPixmap：双重彩虹\n\n\n\n### 图形编程\n\
  \n是时候回到我们最钟爱的话题了：图形编程。在第 3 章中，我们定义了两个接口：`graphics` 和 `pixmap`。现在，我们将基于第 4 章所学的内容来实现它们。不过，还有一件事我们尚未考虑：如何处理不同的屏幕尺寸和分辨率。\n\
  \n## 处理不同的屏幕尺寸和分辨率\n\nAndroid 从 1.6 版本开始就支持不同的屏幕分辨率。它可以处理从 426×320 像素到 2560×1440\
  \ 像素的分辨率。在第 4 章中，我们讨论了不同屏幕分辨率和物理屏幕尺寸带来的影响。例如，使用像素指定的绝对坐标和尺寸进行绘图会产生意想不到的结果。图 5-1\
  \ 展示了在 480×800 和 320×480 屏幕上，将一个 100×100 像素的矩形（左上角位于 (219,379)）渲染出来时的效果。\n\n![A340874_3_En_5_Fig1_HTML.jpg](img/A340874_3_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 在 480×800 屏幕（左图）和 320×480 屏幕（右图）上，在 (219,379) 位置绘制的一个 100×100 像素矩形\n\
  \n这种差异会带来两个问题。首先，我们不能在假设分辨率固定的情况下绘制游戏。第二个问题则更为微妙：在图 5-1 中，我们假设两个屏幕具有相同的密度（即，两个设备上每个像素的物理尺寸相同），但现实中情况很少如此。\n\
  \n### 密度\n\n密度通常以每英寸像素数或每厘米像素数来指定（有时你会听到每英寸点数，但这在技术上是正确的）。Nexus 6 和 Galaxy s7 Edge\
  \ 拥有 2560×1440 像素的屏幕，物理尺寸为 13.19×7.42 厘米。这相当于两个轴上都是每厘米 194 像素。我们可以通过以下公式轻松计算每厘米像素数：\n\
  \n```\n每厘米像素数（x 轴）= 宽度（像素）/ 宽度（厘米）\n```\n\n或\n\n```\n每厘米像素数（y 轴）= 高度（像素）/ 高度（厘米）\n\
  ```\n\n通常，我们只需要在单个轴上进行计算，因为物理像素是正方形的（实际上是三个子像素——分别对应红、蓝、绿——但这里我们忽略这一点）。\n\n一个 100×100\
  \ 像素的矩形在厘米上有多大？在 Nexus 6 上，我们将得到一个 0.51×0.51 厘米的矩形。例如，如果我们试图在所有屏幕尺寸上提供适合普通拇指大小的按钮，就需要考虑到这一点。这个例子表明这是一个可能带来巨大问题的主要问题；然而，通常情况并非如此。我们需要确保按钮在高密度屏幕上具有适当的大小，因为它们在中等密度屏幕上会自动足够大。\n\
  \n### 宽高比\n\n宽高比是另一个需要考虑的问题。屏幕的宽高比是宽度与高度之比，可以用像素或厘米来表示。我们可以通过以下公式计算宽高比：\n\n```\n\
  像素宽高比 = 宽度（像素）/ 高度（像素）\n```\n\n或\n\n```\n物理宽高比 = 宽度（厘米）/ 高度（厘米）\n```\n\n这里，宽度和高度通常指横屏模式下的宽度和高度。Nexus\
  \ 6 的像素和物理宽高比约为 1.78。\n\n> **注**  \n> 本书使用公制单位。我们知道，如果你熟悉英寸和磅，这可能会带来不便。然而，由于我们将在后续章节中考虑一些物理问题，最好现在就开始习惯，因为物理问题通常使用公制单位定义。请记住，1\
  \ 英寸约等于 2.54 厘米。\n\n### 应对不同的宽高比\n\nReplica Island 是一款流行的开源 Android 游戏，它是宽高比问题的一个非常有用的示例。该游戏最初设计用于\
  \ 480×320 像素的屏幕，包括所有“精灵”（如机器人和医生）、“世界”的图块以及 UI 元素（屏幕左下角的按钮和屏幕顶部的状态信息）。当游戏在 Hero\
  \ 设备上渲染时，精灵位图中的每个像素正好映射到屏幕上的一个像素。而在 Nexus One 上，渲染时所有内容都会被放大，因此精灵的一个像素实际上会占据屏幕上的\
  \ 1.5 个像素。换句话说，一个 32×32 像素的精灵在屏幕上将是 48×48 像素。这个缩放因子可以通过以下公式轻松计算：\n\n```\n缩放因子（x\
  \ 轴）= 屏幕宽度（像素）/ 目标宽度（像素）\n```\n\n```\n缩放因子（y 轴）= 屏幕高度（像素）/ 目标高度（像素）\n```\n\n目标宽度和高度等于图形资源所设计的分辨率；在\
  \ Replica Island 中，尺寸为 480×320 像素。对于 Nexus One，x 轴的缩放因子是 1.66，y 轴的缩放因子是 1.5。为什么两个轴的缩放因子不同？\n\
  \n这是因为两个屏幕分辨率具有不同的宽高比。如果我们简单地将 480×320 像素的图像拉伸到 800×480 像素，原始图像会在 x 轴方向上被拉伸。对于大多数游戏来说，这影响不大，因此我们可以简单地为特定目标分辨率绘制图形资源，并在渲染时将其拉伸到实际屏幕分辨率（还记得\
  \ `Bitmap.drawBitmap()` 方法吗？）。\n\n然而，对于某些游戏，你可能希望使用更复杂的方法。图 5-2 展示了 Replica Island\
  \ 从 480×320 像素缩放到 800×480 像素的效果，并叠加了它实际渲染效果的半透明图像。\n\n![A340874_3_En_5_Fig2_HTML.jpg](img/A340874_3_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** Replica Island 从 480×320 像素拉伸到 800×480 像素，并叠加了它在 800×480 像素显示屏上未经拉伸渲染时的半透明效果图像\n\
  \nReplica Island 使用我们刚刚计算的 y 轴缩放因子（1.5）进行正常的 y 轴拉伸，但在 x 轴上，它并未使用 x 轴缩放因子（1.66）——这会导致图像被挤压——而是采用了\
  \ y 轴的缩放因子。这个技巧使得屏幕上所有对象都能保持它们的宽高比。一个 32×32 像素的精灵会变成 48×48 像素，而不是 53×48 像素。然而，这也意味着我们的坐标系不再局限于\
  \ (0,0) 到 (479,319)，而是扩展到 (0,0) 到 (533,319)。\n\n但请注意，对于某些游戏，使用这种巧妙的方法可能并不合适。例如，如果世界的大小取决于屏幕宽高比，那么拥有更宽屏幕的玩家可能会获得不公平的优势。《星际争霸\
  \ 2》这类游戏就属于这种情况。最后，如果你希望整个游戏适配单个屏幕（例如《小顽童》），那么使用更简单的拉伸方法更好；如果我们使用第二种方法，在更宽的屏幕上会留下空白区域。\n\
  \n### 一个更简单的解决方案\n\nReplica Island 的一个优势是它通过硬件加速的 OpenGL ES 来完成所有这些拉伸和缩放操作。到目前为止，我们只讨论了如何通过\
  \ `Canvas` 类在 `Bitmap` 和 `View` 上进行绘制，在旧版 Android 上，这涉及 CPU 上缓慢的数值运算，并且不涉及 GPU 上的硬件加速。\n\
  \n\n\n#### 基于此，我们通过一个简单技巧来解决这个问题：创建一个以目标分辨率为尺寸的 `Bitmap` 实例作为帧缓冲。这样一来，在设计图形资源或通过代码渲染时，就无需关心实际的屏幕分辨率。相反，我们假定所有设备的屏幕分辨率相同，所有绘制指令都通过\
  \ `Canvas` 实例指向这个“虚拟”帧缓冲 `Bitmap`。当一帧渲染完成后，只需调用 `Canvas.drawBitmap()` 方法，将这个帧缓冲\
  \ `Bitmap` 绘制到 `SurfaceView` 上，该方法支持对 `Bitmap` 进行拉伸。\n\n如果采用与 Replica Island 相同的技术，则需要调整帧缓冲在较长轴上的尺寸（即在横屏模式下调整\
  \ x 轴，在竖屏模式下调整 y 轴）。同时，必须填充多余的像素以避免出现空白区域。\n\n## 实现方法\n\n下面将所有内容总结为一份工作计划：\n\n-\
  \ 所有图形资源均按照固定的目标分辨率设计，以 Android mdpi 为例（在 Mr. Nom 游戏中为 320×480）。\n- 创建一个与目标分辨率大小相同的\
  \ `Bitmap`，将所有绘制指令指向它，从而在固定坐标系中操作。\n- 完成一帧绘制后，将帧缓冲 `Bitmap` 拉伸后绘制到 `SurfaceView`\
  \ 上。在屏幕分辨率较低的设备上，图像会被缩小；在分辨率较高的设备上，图像则会被放大。\n- 在执行缩放技巧时，需确保所有用户交互的 UI 元素在所有屏幕密度下都足够大。这可以在图形资源设计阶段，通过结合实际设备尺寸与前述公式来实现。\n\
  \n现在我们已经了解如何处理不同屏幕分辨率和密度，可以解释前几节实现 `SingleTouchHandler` 和 `MultiTouchHandler` 时遇到的\
  \ `scaleX` 和 `scaleY` 变量了。\n\n所有游戏代码都将基于固定的目标分辨率（320×480 像素）运行。如果在分辨率更高或更低的设备上接收触摸事件，这些事件的\
  \ x 和 y 坐标将定义在 `View` 的坐标系中，而非目标分辨率坐标系。因此，需要根据缩放因子将这些坐标从原始系统转换到我们的系统。为此，我们使用以下公式：\n\
  \n```\n转换后的触摸 x = 实际触摸 x * (目标像素在 x 轴上 / 实际像素在 x 轴上)\n转换后的触摸 y = 实际触摸 y * (目标像素在\
  \ y 轴上 / 实际像素在 y 轴上)\n```\n\n让我们计算一个简单示例：目标分辨率为 320×480 像素，设备分辨率为 480×800 像素。触摸屏幕中央时，收到坐标为\
  \ (240,400) 的事件。使用上述两个公式，得到以下结果，恰好位于目标坐标系的正中央：\n\n```\n转换后的触摸 x = 240 * (320 / 480)\
  \ = 160\n转换后的触摸 y = 400 * (480 / 800) = 240\n```\n\n再举一个例子：假设实际分辨率为 240×320，同样触摸屏幕中央，坐标为\
  \ (120,160)：\n\n```\n转换后的触摸 x = 120 * (320 / 240) = 160\n转换后的触摸 y = 160 * (480 /\
  \ 320) = 240\n```\n\n这个方法在两种情况下都适用。如果我们将实际触摸事件的坐标乘以目标因子除以实际因子，就无需在游戏代码中进行额外的坐标转换。所有触摸坐标都将以固定目标坐标系的形式呈现。\n\
  \n解决了这个问题后，就可以实现游戏框架的最后几个类了。\n\n## `AndroidPixmap`：面向用户的像素\n\n根据第 3 章中像素图接口的设计，实现内容并不多。代码清单\
  \ 5-13 展示了具体实现。\n\n```\npackage com.badlogic.androidgames.framework.impl;\nimport\
  \ android.graphics.Bitmap;\nimport com.badlogic.androidgames.framework.Graphics.PixmapFormat;\n\
  import com.badlogic.androidgames.framework.Pixmap;\npublic class AndroidPixmap implements\
  \ Pixmap {\n    Bitmap bitmap;\n    PixmapFormat format;\n    public AndroidPixmap(Bitmap\
  \ bitmap, PixmapFormat format) {\n        this.bitmap = bitmap;\n        this.format\
  \ = format;\n    }\n    public int getWidth() {\n        return bitmap.getWidth();\n\
  \    }\n    public int getHeight() {\n        return bitmap.getHeight();\n    }\n\
  \    public PixmapFormat getFormat() {\n        return format;\n    }\n    public\
  \ void dispose() {\n        bitmap.recycle();\n    }\n}\n```\n\n**代码清单 5-13.** `AndroidPixmap.java`：封装\
  \ `Bitmap` 实例的像素图实现\n\n我们需要做的就是存储所封装的 `Bitmap` 实例及其格式（格式存储为第 3 章定义的 `PixmapFormat`\
  \ 枚举值）。此外，我们实现了像素图接口中的必需方法，以便查询像素图的宽度、高度和格式，并确保像素可以从 RAM 中释放。注意，`Bitmap` 成员是包内私有的，这样我们就可以在\
  \ `AndroidGraphics` 中访问它——接下来将实现这个类。\n\n## `AndroidGraphics`：满足我们的绘制需求\n\n我们在第 3\
  \ 章设计的图形接口同样精简高效。它负责将像素、线条、矩形和像素图绘制到帧缓冲中。如前所述，我们将使用 `Bitmap` 作为帧缓冲，并通过 `Canvas`\
  \ 类将所有绘制指令指向该帧缓冲。它还负责从资源文件创建 `Pixmap` 实例。因此，我们还需要另一个 `AssetManager`。代码清单 5-14 展示了接口实现类\
  \ `AndroidGraphics` 的代码及注释。\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\
  import java.io.IOException;\nimport java.io.InputStream;\nimport android.content.res.AssetManager;\n\
  import android.graphics.Bitmap;\nimport android.graphics.Bitmap.Config;\nimport\
  \ android.graphics.BitmapFactory;\nimport android.graphics.BitmapFactory.Options;\n\
  import android.graphics.Canvas;\nimport android.graphics.Paint;\nimport android.graphics.Paint.Style;\n\
  import android.graphics.Rect;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Pixmap;\npublic class AndroidGraphics\
  \ implements Graphics {\n    AssetManager assets;\n    Bitmap frameBuffer;\n   \
  \ Canvas canvas;\n    Paint paint;\n    Rect srcRect = new Rect();\n    Rect dstRect\
  \ = new Rect();\n```\n\n**代码清单 5-14.** `AndroidGraphics.java`：实现图形接口\n\n该类实现了图形接口。它包含一个用于加载\
  \ `Bitmap` 实例的 `AssetManager` 成员、一个表示人工帧缓冲的 `Bitmap` 成员、一个用于向人工帧缓冲绘制的 `Canvas` 成员、一个绘制所需的\
  \ `Paint` 成员，以及两个用于实现 `AndroidGraphics.drawPixmap()` 方法的 `Rect` 成员。后三个成员的存在是为了避免每次绘制调用时都创建这些类的新实例，否则会给垃圾回收器带来一系列问题。\n\
  \n```\npublic AndroidGraphics(AssetManager assets, Bitmap frameBuffer) {\n    this.assets\
  \ = assets;\n    this.frameBuffer = frameBuffer;\n    this.canvas = new Canvas(frameBuffer);\n\
  \    this.paint = new Paint();\n}\n```\n\n在构造函数中，我们从外部接收一个 `AssetManager` 和一个代表人工帧缓冲的\
  \ `Bitmap`。我们将它们存储在各自对应的成员中，并创建用于绘制人工帧缓冲的 `Canvas` 实例，以及将在某些绘制方法中使用的 `Paint` 成员。\n\
  \n\n\n```java\npublic Pixmap newPixmap(String fileName, PixmapFormat format) {\n\
  \    Config config = null;\n    if (format == PixmapFormat.RGB565)\n        config\
  \ = Config.RGB_565;\n    else if (format == PixmapFormat.ARGB4444)\n        config\
  \ = Config.ARGB_4444;\n    else\n        config = Config.ARGB_8888;\n    Options\
  \ options = new Options();\n    options.inPreferredConfig = config;\n    InputStream\
  \ in = null;\n    Bitmap bitmap = null;\n    try {\n        in = assets.open(fileName);\n\
  \        bitmap = BitmapFactory.decodeStream(in);\n        if (bitmap == null)\n\
  \            throw new RuntimeException(\"Couldn't load bitmap from asset '\"\n\
  \                    + fileName + \"'\");\n    } catch (IOException e) {\n     \
  \   throw new RuntimeException(\"Couldn't load bitmap from asset '\"\n         \
  \       + fileName + \"'\");\n    } finally {\n        if (in != null) {\n     \
  \       try {\n                in.close();\n            } catch (IOException e)\
  \ {\n            }\n        }\n    }\n    if (bitmap.getConfig() == Config.RGB_565)\n\
  \        format = PixmapFormat.RGB565;\n    else if (bitmap.getConfig() == Config.ARGB_4444)\n\
  \        format = PixmapFormat.ARGB4444;\n    else\n        format = PixmapFormat.ARGB8888;\n\
  \    return new AndroidPixmap(bitmap, format);\n}\n```\n\n`newPixmap()` 方法尝试从资源文件中加载一个`Bitmap`实例，并使用指定的`PixmapFormat`。我们首先将`PixmapFormat`转换为第\
  \ 4 章中使用的 Android `Config`类常量之一。接着，创建一个新的`Options`实例并设置首选颜色格式。然后，尝试通过`BitmapFactory`从资源中加载`Bitmap`，如果出现任何问题则抛出`RuntimeException`。否则，我们检查`BitmapFactory`实际用于加载`Bitmap`的格式，并将其转换为`PixmapFormat`枚举值。请记住，`BitmapFactory`可能会忽略我们期望的颜色格式，因此我们必须通过检查来确定它实际用于解码图像的格式。最后，根据加载的`Bitmap`及其`PixmapFormat`构造一个新的`AndroidBitmap`实例，并将其返回给调用者。\n\
  \n```java\npublic void clear(int color) {\n    canvas.drawRGB((color & 0xff0000)\
  \ >> 16, (color & 0xff00) >> 8,\n            (color & 0xff));\n}\n```\n\n`clear()`\
  \ 方法提取指定 32 位 ARGB 颜色参数中的红色、绿色和蓝色分量，并调用 `Canvas.drawRGB()` 方法，该方法用该颜色清除我们的人工帧缓冲区。此方法会忽略指定颜色的任何\
  \ Alpha 值，因此我们无需提取它。\n\n```java\npublic void drawPixel(int x, int y, int color)\
  \ {\n    paint.setColor(color);\n    canvas.drawPoint(x, y, paint);\n}\n```\n\n\
  `drawPixel()` 方法通过 `Canvas.drawPoint()` 方法绘制人工帧缓冲区中的一个像素。首先，我们设置 `Paint` 成员变量的颜色，然后将该颜色连同像素的\
  \ x 和 y 坐标一起传递给绘制方法。\n\n```java\npublic void drawLine(int x, int y, int x2, int\
  \ y2, int color) {\n    paint.setColor(color);\n    canvas.drawLine(x, y, x2, y2,\
  \ paint);\n}\n```\n\n`drawLine()` 方法绘制人工帧缓冲区中的指定线条，在调用 `Canvas.drawLine()` 方法时使用\
  \ `Paint` 成员变量来指定颜色。\n\n```java\npublic void drawRect(int x, int y, int width, int\
  \ height, int color) {\n    paint.setColor(color);\n    paint.setStyle(Style.FILL);\n\
  \    canvas.drawRect(x, y, x + width - 1, y + width - 1, paint);\n}\n```\n\n`drawRect()`\
  \ 方法设置 `Paint` 成员变量的颜色和样式属性，以便绘制填充的彩色矩形。在实际的 `Canvas.drawRect()` 调用中，我们必须将参数的 `x`、`y`、`width`\
  \ 和 `height` 转换为矩形左上角和右下角的坐标。对于左上角，我们直接使用 `x` 和 `y` 参数。对于右下角，我们将 `width` 和 `height`\
  \ 加到 `x` 和 `y` 上，并减去 1。例如，如果我们渲染一个 `x` 和 `y` 为 (10,10)、`width` 和 `height` 为 2 和\
  \ 2 的矩形，并且不减去 1，那么屏幕上生成的矩形尺寸将是 3×3 像素。\n\n```java\npublic void drawPixmap(Pixmap\
  \ pixmap, int x, int y, int srcX, int srcY,\n        int srcWidth, int srcHeight)\
  \ {\n    srcRect.left = srcX;\n    srcRect.top = srcY;\n    srcRect.right = srcX\
  \ + srcWidth - 1;\n    srcRect.bottom = srcY + srcHeight - 1;\n    dstRect.left\
  \ = x;\n    dstRect.top = y;\n    dstRect.right = x + srcWidth - 1;\n    dstRect.bottom\
  \ = y + srcHeight - 1;\n    canvas.drawBitmap(((AndroidPixmap) pixmap).bitmap, srcRect,\
  \ dstRect, null);\n}\n```\n\n`drawPixmap()` 方法允许我们绘制像素图的一部分，它设置了实际绘制调用中使用的 `Rect`\
  \ 成员的源和目标。与绘制矩形一样，我们必须将 x、y 坐标以及宽度和高度转换为左上角和右下角坐标。同样，我们也要减去 1，否则我们会多画 1 个像素。接下来，我们通过\
  \ `Canvas.drawBitmap()` 方法执行实际绘制，如果绘制的像素图具有 `PixmapFormat.ARGB4444` 或 `PixmapFormat.ARGB8888`\
  \ 颜色深度，该方法将自动进行混合。请注意，我们必须将 `Pixmap` 参数强制转换为 `AndroidPixmap`，以便获取 `Bitmap` 成员，从而使用\
  \ `Canvas` 实例进行绘制。这有点复杂，但我们可以确定传入的 `Pixmap` 实例将是 `AndroidPixmap`。\n\n```java\npublic\
  \ void drawPixmap(Pixmap pixmap, int x, int y) {\n    canvas.drawBitmap(((AndroidPixmap)pixmap).bitmap,\
  \ x, y, null);\n}\n```\n\n第二个 `drawPixmap()` 方法在给定坐标处将整个像素图绘制到人工帧缓冲区。同样，我们必须进行一些类型转换才能获取\
  \ `AndroidPixmap` 中的 `Bitmap` 成员。\n\n```java\npublic int getWidth() {\n    return\
  \ frameBuffer.getWidth();\n}\npublic int getHeight() {\n    return frameBuffer.getHeight();\n\
  }\n```\n\n最后，我们有 `getWidth()` 和 `getHeight()` 方法，它们仅仅返回 `AndroidGraphics` 类内部渲染到的人工帧缓冲区的大小。\n\
  \n`AndroidFastRenderView` 是我们实现所需功能的最后一个类。\n\n### AndroidFastRenderView：循环、拉伸、循环、拉伸\n\
  \n这个类的名称应该能暗示后续内容。在第 4 章中，我们讨论了使用 `SurfaceView` 在单独的线程中执行连续渲染，该线程也可以容纳我们游戏的主循环。我们开发了一个名为\
  \ `FastRenderView` 的非常简单的类，它派生自 `SurfaceView` 类；我们确保它与活动生命周期良好协作；并设置了一个线程来通过 `Canvas`\
  \ 实例持续渲染 `SurfaceView`。在这里，我们将重用这个 `FastRenderView` 类，并对其进行增强以执行更多操作：\n\n-   它保留一个对\
  \ `Game` 实例的引用，从中可以获取活动屏幕。我们不断从 `FastRenderView` 线程内部调用 `Screen.update()` 和 `Screen.present()`\
  \ 方法。\n-   它追踪传递给活动屏幕的帧间增量时间。\n-   它获取 `AndroidGraphics` 实例绘制到的人工帧缓冲区，并将其绘制到 `SurfaceView`，如果需要，会进行缩放。\n\
  \n清单 5-15 展示了 `AndroidFastRenderView` 类的实现，并在适当位置添加了注释。\n\n```java\npackage com.badlogic.androidgames.framework.impl;\n\
  import android.graphics.Bitmap;\nimport android.graphics.Canvas;\nimport android.graphics.Rect;\n\
  import android.view.SurfaceHolder;\nimport android.view.SurfaceView;\npublic class\
  \ AndroidFastRenderView extends SurfaceView implements Runnable {\n    AndroidGame\
  \ game;\n    Bitmap framebuffer;\n    Thread renderThread = null;\n    SurfaceHolder\
  \ holder;\n    volatile boolean running = false;\n    // 清单 5-15.\n    // AndroidFastRenderView.java：执行我们游戏代码的线程化\
  \ SurfaceView\n}\n```\n\n\n\n这看起来应该很熟悉。我们只需要添加两个新成员——一个`AndroidGame`实例和一个代表人工帧缓冲区的`Bitmap`实例。其余成员与第三章中的`FastRenderView`相同。\n\
  \n```\npublic AndroidFastRenderView(AndroidGame game, Bitmap framebuffer) {\nsuper(game);\n\
  this.game = game;\nthis.framebuffer = framebuffer;\nthis.holder = getHolder();\n\
  }\n```\n\n在构造函数中，我们只需用`AndroidGame`参数（这是一个 Activity，将在后续章节讨论）调用基类的构造函数，并将参数存储在相应的成员中。与前面章节一样，我们再次获取一个`SurfaceHolder`。\n\
  \n```\npublic void resume() {\nrunning = true;\nrenderThread = new Thread(this);\n\
  renderThread.start();\n}\n```\n\n`resume()`方法完全复制了`FastRenderView.resume()`方法，因此不再赘述。简而言之，该方法确保线程能够很好地与\
  \ Activity 生命周期交互。\n\n```\npublic void run() {\nRect dstRect = new Rect();\nlong\
  \ startTime = System.nanoTime();\nwhile(running) {\nif(!holder.getSurface().isValid())\n\
  continue;\nfloat deltaTime = (System.nanoTime()-startTime) / 1000000000.0f;\nstartTime\
  \ = System.nanoTime();\ngame.getCurrentScreen().update(deltaTime);\ngame.getCurrentScreen().present(deltaTime);\n\
  Canvas canvas = holder.lockCanvas();\ncanvas.getClipBounds(dstRect);\ncanvas.drawBitmap(framebuffer,\
  \ null, dstRect, null);\nholder.unlockCanvasAndPost(canvas);\n}\n}\n```\n\n`run()`方法增加了一些新功能。第一个新增功能是能够追踪每帧之间的时间差（delta\
  \ time）。为此，我们使用`System.nanoTime()`，它以`long`类型返回当前时间的纳秒数。\n\n> **注意**：1 纳秒等于十亿分之一秒。\n\
  \n在每个循环迭代中，我们首先计算上一轮循环开始时间与当前时间之间的差值。为了使这个时间差更易于使用，我们将其转换为秒。接下来，我们保存当前时间戳，用于下一轮循环迭代以计算下一个时间差。有了时间差后，我们调用当前`Screen`实例的`update()`和`present()`方法，这些方法会更新游戏逻辑并将内容渲染到人工帧缓冲区。最后，我们获取`SurfaceView`的`Canvas`实例，并绘制人工帧缓冲区。如果传递给`Canvas.drawBitmap()`方法的目标矩形比帧缓冲区小或大，则会自动进行缩放。\n\
  \n注意，这里我们使用了一个快捷方式，通过`Canvas.getClipBounds()`方法获取一个覆盖整个`SurfaceView`的目标矩形。该方法会将`dstRect`的`top`和`left`成员分别设为\
  \ 0 和 0，并将`bottom`和`right`成员设为实际的屏幕尺寸（例如，Nexus One 竖屏模式下为 480×800）。该方法的其余部分与上一章`FastRenderView`测试中的内容完全相同。该方法只是确保当\
  \ Activity 暂停或销毁时，线程能够停止。\n\n```\npublic void pause() {\nrunning = false;\nwhile(true)\
  \ {\ntry {\nrenderThread.join();\nreturn;\n} catch (InterruptedException e) {\n\
  // 重试\n}\n}\n}\n}\n```\n\n`pause()`方法是该类的最后一个方法，与`FastRenderView.pause()`方法相同——它只是终止渲染/主循环线程，并等待其完全结束后再返回。\n\
  \n我们的框架已基本完成。最后一块拼图是实现`Game`接口。\n\n## AndroidGame：整合一切\n\n我们的游戏开发框架已接近完成。我们需要做的就是将松散的部分整合起来，实现我们在第三章中设计的游戏接口。为此，我们将使用在本章前面章节中创建的类。以下是职责列表：\n\
  \n-   执行窗口管理。在我们的上下文中，这意味着设置一个 Activity 和一个`AndroidFastRenderView`，并以干净的方式处理 Activity\
  \ 生命周期。\n-   使用并管理一个`WakeLock`，以防止屏幕变暗。\n-   实例化并向相关方提供`Graphics`、`Audio`、`FileIO`和`Input`的引用。\n\
  -   管理屏幕并将其与 Activity 生命周期集成。\n-   我们的总体目标是创建一个名为`AndroidGame`的类，我们可以从中派生。稍后我们将实现`Game.getStartScreen()`方法，以以下方式启动游戏。（我们将在后面介绍`MainMenu`。）\n\
  \n```\npublic class MrNom extends AndroidGame {\npublic Screen getStartScreen()\
  \ {\nreturn new MainMenu(this);\n}\n}\n```\n\n我们希望你能理解，在开始实际游戏编程之前，设计一个可行的框架是有益的。我们可以将这个框架复用于所有未来图形要求不高的游戏。现在，让我们讨论清单\
  \ 5-16，其中展示了`AndroidGame`类，并通过注释分段呈现。\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\
  import android.app.Activity;\nimport android.content.res.Configuration;\nimport\
  \ android.graphics.Bitmap;\nimport android.graphics.Bitmap.Config;\nimport android.os.Bundle;\n\
  import android.view.Window;\nimport android.view.WindowManager;\nimport com.badlogic.androidgames.framework.Audio;\n\
  import com.badlogic.androidgames.framework.FileIO;\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Input;\n\
  import com.badlogic.androidgames.framework.Screen;\npublic abstract class AndroidGame\
  \ extends Activity implements Game {\nAndroidFastRenderView renderView;\nGraphics\
  \ graphics;\nAudio audio;\nInput input;\nFileIO fileIO;\nScreen screen;\nListing\
  \ 5-16.\nAndroidGame.java: 整合一切\n```\n\n类的定义以`AndroidGame`扩展`Activity`类并实现游戏接口开始。接下来，我们定义了几个应该熟悉的成员。第一个成员是`AndroidFastRenderView`，我们将向其进行绘制，并且它将为我们管理主循环线程。当然，我们将`Graphics`、`Audio`、`Input`和`FileIO`成员设置为`AndroidGraphics`、`AndroidAudio`、`AndroidInput`和`AndroidFileIO`的实例。下一个成员保存当前活动的屏幕。最后，还有一个成员保存着一个`WakeLock`，我们用它来防止屏幕变暗。\n\
  \n```\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  requestWindowFeature(Window.FEATURE_NO_TITLE);\ngetWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  WindowManager.LayoutParams.FLAG_FULLSCREEN);\ngetWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);\n\
  boolean isLandscape = getResources().getConfiguration().orientation == Configuration.ORIENTATION_LANDSCAPE;\n\
  int frameBufferWidth = isLandscape ? 480 : 320;\nint frameBufferHeight = isLandscape\
  \ ? 320 : 480;\nBitmap frameBuffer = Bitmap.createBitmap(frameBufferWidth,\nframeBufferHeight,\
  \ Config.RGB_565);\nfloat scaleX = (float) frameBufferWidth\n/ getWindowManager().getDefaultDisplay().getWidth();\n\
  float scaleY = (float) frameBufferHeight\n/ getWindowManager().getDefaultDisplay().getHeight();\n\
  renderView = new AndroidFastRenderView(this, frameBuffer);\ngraphics = new AndroidGraphics(getAssets(),\
  \ frameBuffer);\nfileIO = new AndroidFileIO(this);\naudio = new AndroidAudio(this);\n\
  input = new AndroidInput(this, renderView, scaleX, scaleY);\nscreen = getStartScreen();\n\
  setContentView(renderView);\n}\n```\n\n\n\n`onCreate()` 方法，作为 `Activity` 类中熟悉的启动方法，首先按要求调用了基类的\
  \ `onCreate()` 方法。接着，我们让 Activity 全屏显示，正如我们在第 [4] 章的其他几个测试中所做的那样。在接下来的几行代码中，我们设置了人工帧缓冲。根据\
  \ Activity 的方向，我们想要使用一个 320×480 的帧缓冲（竖屏模式）或一个 480×320 的帧缓冲（横屏模式）。为了确定 Activity 的屏幕方向，我们从一个名为\
  \ `Configuration` 的类中获取 `Orientation` 成员，而获取方式是通过调用 `getResources().getConfiguration()`。基于该成员的值，我们随后设置了帧缓冲的大小，并实例化了一个\
  \ `Bitmap`，我们将在后续章节中将其传递给 `AndroidFastRenderView` 和 `AndroidGraphics` 实例。\n\n> **注意**\
  \  \n> `Bitmap` 实例采用 RGB565 颜色格式。这样我们就不会浪费内存，并且绘制速度也会稍快一些。\n\n对于我们的第一个游戏“Mr. Nom”，我们将使用\
  \ 320×480 像素的目标分辨率。`AndroidGame` 类已将这些值硬编码。如果您想使用不同的目标分辨率，请相应地修改 `AndroidGame`！\n\
  \n我们还计算了 `scaleX` 和 `scaleY` 值，`SingleTouchHandler` 和 `MultiTouchHandler` 类将使用这些值在我们的固定坐标系中转换触摸事件坐标。\n\
  \n接下来，我们使用必要的构造函数参数实例化 `AndroidFastRenderView`、`AndroidGraphics`、`AndroidAudio`、`AndroidInput`\
  \ 和 `AndroidFileIO`。最后，我们调用`getStartScreen()` 方法（我们的游戏将实现此方法），并将 `AndroidFastRenderView`\
  \ 设置为 Activity 的内容视图。当然，所有之前实例化的辅助类都会在后台执行一些额外的工作。例如，`AndroidInput` 类会通知选定的触摸处理器与\
  \ `AndroidFastRenderView` 进行通信。\n\n```java\n@Override\npublic void onResume() {\n\
  super.onResume();\nscreen.resume();\nrenderView.resume();\n}\n```\n\n接下来是 `Activity`\
  \ 类的 `onResume()` 方法，我们对其进行了重写。像往常一样，我们首先调用父类的方法。然后，我们确保当前屏幕已获知游戏（以及 Activity）已恢复。最后，我们通知\
  \ `AndroidFastRenderView` 恢复渲染线程，这也会启动我们的游戏主循环，在每次迭代中，我们都会让当前屏幕更新并绘制自身。\n\n```java\n\
  @Override\npublic void onPause() {\nsuper.onPause();\nrenderView.pause();\nscreen.pause();\n\
  if (isFinishing())\n{\nscreen.dispose();\n}\n}\n```\n\n首先，`onPause()` 方法再次调用了父类的方法。接着，它确保渲染线程被终止。如果我们在调用当前屏幕的\
  \ `onPause()` 方法之前不终止线程，可能会遇到并发问题，因为 UI 线程和主循环线程将同时访问屏幕。一旦我们确定主循环线程不再活跃，我们就通知当前屏幕它应该暂停自身。如果\
  \ Activity 即将被销毁，我们还会通知屏幕，以便它能够执行必要的清理工作。\n\n```java\npublic Input getInput() {\n\
  return input;\n}\npublic FileIO getFileIO() {\nreturn fileIO;\n}\npublic Graphics\
  \ getGraphics() {\nreturn graphics;\n}\npublic Audio getAudio() {\nreturn audio;\n\
  }\n```\n\n`getInput()`、`getFileIO()`、`getGraphics()` 和 `getAudio()` 方法无需解释。我们只是将相应的实例返回给调用者。调用者将始终是我们游戏中的\
  \ `Screen` 实现类之一。\n\n```java\npublic void setScreen(Screen screen) {\nif (screen\
  \ == null)\nthrow new IllegalArgumentException(\"Screen must not be null\");\nthis.screen.pause();\n\
  this.screen.dispose();\nscreen.resume();\nscreen.update(0);\nthis.screen = screen;\n\
  }\n```\n\n起初，我们从游戏接口继承的 `setScreen()` 方法看起来很简单。我们进行了一些传统的空值检查，因为我们不允许存在空屏幕。接着，我们让当前屏幕暂停并释放自身，以便为新屏幕腾出空间。新的屏幕被要求恢复自身，并以零增量时间更新一次。最后，我们将\
  \ `Screen` 成员设置为新的屏幕。\n\n让我们考虑一下谁以及何时会调用此方法。在设计“Mr. Nom”时，我们确定了各种 `Screen` 实例之间的所有转换。我们通常会在某个\
  \ `Screen` 实例的 `update()` 方法中调用 `AndroidGame.setScreen()` 方法。\n\n例如，假设我们有一个主菜单屏幕，在\
  \ `update()` 方法中我们会检查“开始”按钮是否被按下。如果是这样，我们就会从 `MainMenu.update()` 方法内部调用 `AndroidGame.setScreen()`\
  \ 方法，并传入一个全新的下一屏幕实例，从而转换到下一个屏幕。主菜单屏幕在调用 `AndroidGame.setScreen()` 后重新获得控制权，并应立即返回给调用者，因为它已不再是活动屏幕。在这种情况下，调用者是主循环线程中的\
  \ `AndroidFastRenderView`。如果您检查负责更新和渲染活动屏幕的主循环部分，您会发现 `update()` 方法将在 `MainMenu`\
  \ 类上被调用，但 `present()` 方法将在新的当前屏幕上被调用。这可能会产生问题，因为我们定义屏幕接口的方式确保了在屏幕被要求绘制自身之前，`resume()`\
  \ 和 `update()` 方法至少会被调用一次。这就是为什么我们在 `AndroidGame.setScreen()` 方法中为新屏幕调用这两个方法的原因。`AndroidGame`\
  \ 类会处理一切。\n\n```java\npublic Screen getCurrentScreen() {\nreturn screen;\n}\n}\n\
  ```\n\n最后一个方法是 `getCurrentScreen()` 方法，它只是简单地返回当前活动的屏幕。\n\n最后，请记住 `AndroidGame`\
  \ 派生自 `Game`，后者还包含一个名为 `getStartScreen()` 的方法。这是我们必须实现的方法，以便让我们的游戏启动运行！\n\n现在，我们已经创建了一个易于使用的\
  \ Android 游戏开发框架。我们只需要实现我们游戏的各个屏幕。我们也可以将这个框架复用于任何未来的游戏，只要它们不需要强大的图形处理能力。如果需要强大的图形能力，我们就必须使用\
  \ OpenGL ES。然而，要做到这一点，我们只需要替换框架中的图形部分。所有其他用于音频、输入和文件 I/O 的类都可以重用。\n\n## 总结\n\n在本章中，我们从零开始实现了一个完整的\
  \ 2D Android 游戏开发框架，它可以被复用于所有未来的游戏（只要它们在图形方面要求不高）。我们非常注重实现一个良好、可扩展的设计。我们可以获取代码，并将其渲染部分替换为\
  \ OpenGL ES，从而使“Mr. Nom”变成 3D 游戏。\n\n有了所有这些样板代码，让我们专注于我们此行的目标：编写游戏！\n\n"
- "# 6. Mr. Nom 入侵 Android\n\n在第 [3] 章中，我们为“Mr. Nom”设计了完整的方案，包括游戏机制、简单的背景故事、手工制作的图形资源，以及基于一些纸模定义的所有屏幕界面。在第\
  \ [5] 章中，我们开发了一个完整的游戏开发框架，使我们能够轻松地将设计好的屏幕转换为代码。但话不多说，让我们开始编写我们的第一个游戏吧！\n\n### 创建资源\n\
  \n\n\n在 Mr. Nom 中，我们拥有两类资源：音频资源和图形资源。我们通过一款名为 Audacity 的优秀开源应用程序以及一台性能不佳的上网本麦克风录制了音频资源。我们创建了三种音效：一种在按下按钮或选择菜单项时播放，一种在\
  \ Mr. Nom 吃掉墨渍时播放，还有一种在他吃掉自己时播放。我们将这些音效保存为 OGG 格式，并分别命名为 `click.ogg`、`eat.ogg` 和\
  \ `bitten.ogg`，存放在 `assets/` 文件夹中。你可以发挥创意，使用 Audacity 和麦克风自行创建这些文件，也可以从 SVN 仓库 [`http://code.google.com/p/beginnginandroidgames2/`](http://code.google.com/p/beginnginandroidgames2/)\
  \ 中获取。如果你不熟悉 SVN，请参阅前文关于如何获取源代码的说明。\n\n之前，我们提到希望在游戏开发阶段重复使用设计阶段的剪纸图形作为实际游戏图形。为此，我们首先需要让它们适配目标分辨率。\n\
  \n我们选择了固定的目标分辨率 320×480（竖屏模式，Android mdpi 分辨率），并据此设计所有图形资源。这个分辨率看似较小，但能让我们非常快速、轻松地开发游戏和图形，毕竟这里的重点是让你了解完整的\
  \ Android 游戏开发流程。\n\n对于你的正式游戏，请考虑所有分辨率并使用更高分辨率的图形，这样游戏即使在平板尺寸的屏幕上也能看起来不错，或许可以将 1440×2560\
  \ 作为基准分辨率。我们扫描了所有剪纸图形并略微调整了它们的大小。我们将大部分资源保存在独立的文件中，并将其中一些合并到单个文件中。所有图像均保存为 PNG 格式。背景是唯一采用\
  \ RGB888 格式的图像；其他所有图像均为 ARGB8888 格式。图 6-1 展示了我们最终得到的成果。\n\n![A340874_3_En_6_Fig1_HTML.jpg](img/A340874_3_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. Mr. Nom 的所有图形资源及其各自的文件名和像素尺寸\n\n让我们稍微分解一下这些图像：\n\n*   `background.png`：这是我们的背景图像，将是我们在帧缓冲区中绘制的第一张图。显然，它的尺寸与目标分辨率相同。\n\
  *   `buttons.png`：该文件包含了游戏中所需的所有按钮。我们将它们放在一个文件中，因为我们可以通过 `Graphics.drawPixmap()`\
  \ 方法轻松绘制它们，该方法允许绘制图像的某一部分。在开始使用 OpenGL ES 进行绘制时，我们会更频繁地使用这种技术，所以最好现在就习惯它。将多张图像合并到一张图像中的做法通常称为图集化（atlasing），而这张图像本身被称为图像图集（image\
  \ atlas，或纹理图集、精灵表）。每个按钮的尺寸为 64×64 像素，这在判断触摸事件是否按下屏幕上的按钮时会非常有用。\n*   `help1.png`、`help2.png`\
  \ 和 `help3.png`：这些图像将显示在 Mr. Nom 的三个帮助屏幕上。它们尺寸相同，这使得将它们放置到屏幕上更加容易。\n*   `logo.png`：这是显示在主菜单屏幕上的徽标。\n\
  *   `mainmenu.png`：该文件包含了我们在主菜单上向玩家展示的三个选项。选择其中一个将触发跳转到相应的屏幕。每个选项的高度约为 42 像素，我们可以利用这点轻松检测哪个选项被触摸。\n\
  *   `ready.png`、`pause.png` 和 `gameover.png`：我们将在游戏即将开始、游戏暂停以及游戏结束时绘制这些图像。\n*  \
  \ `numbers.png`：此文件包含我们稍后渲染高分所需要的所有数字。关于这张图像需要记住的是，除了结尾的点（尺寸为 10×32 像素）外，每个数字都具有相同的宽度和高度，即\
  \ 20×32 像素。我们可以用它来渲染任何遇到的数字。\n*   `tail.png`：这是 Mr. Nom 的尾巴，或者更确切地说是他尾巴的一部分。尺寸为\
  \ 32×32 像素。\n*   `headdown.png`、`headleft.png`、`headright.png` 和 `headup.png`：这些图像用于\
  \ Mr. Nom 的头部；对应他可能移动的每个方向都有一张。由于他戴着帽子，我们必须让这些图像比尾巴图像稍大一些。每张头部图像的尺寸为 42×42 像素。\n\
  *   `stain1.png`、`stain2.png` 和 `stain3.png`：这是我们可以渲染的三种类型的墨渍。拥有三种类型会让游戏画面更加多样化。它们的尺寸均为\
  \ 32×32 像素，与尾巴图像相同。\n\n很好，现在让我们开始实现屏幕吧！\n\n## 设置项目\n\n如第 5 章所述，我们将把 Mr. Nom 的代码与框架代码合并。所有与\
  \ Mr. Nom 相关的类都将放置在 `com.badlogic.androidgames.mrnom` 包中。此外，根据第 4 章的说明，我们必须修改清单文件。我们的默认活动将命名为\
  \ `MrNomGame`。只需按照第 4 章“Android 游戏项目设置六步法”一节中概述的八个步骤进行操作，即可正确设置 `<activity>` 属性（即确保游戏固定为竖屏模式，且配置变更由应用程序处理），并为我们的应用程序授予适当的权限（写入外部存储、使用唤醒锁等）。\n\
  \n前面部分的所有资源都位于项目的 `assets/` 文件夹中。此外，我们还需要将 `ic_launcher.png` 文件放入 `res/mipmap-mdpi`、`res/mipmap-hdpi`、`res/mipmap-xdpi`、`res/mipmap-xxdpi`\
  \ 和 `res/mipmap-xxxdpi` 文件夹中。我们只需取用 Mr. Nom 的 `headright.png`，将其重命名为 `ic_launcher.png`，然后将经过适当大小调整的版本放入每个文件夹中。\n\
  \n剩下的工作就是将我们的游戏代码放入 Android Studio 项目的 `com.badlogic.androidgames.mrnom` 包中！\n\n\
  ## MrNomGame：主活动\n\n我们的应用程序需要一个主入口点，在 Android 中被称为默认活动。我们将这个默认活动命名为 `MrNomGame`，并让它继承自我们在第\
  \ 5 章中实现的 `AndroidGame` 类，用于运行我们的游戏。它稍后将负责创建和运行我们的第一个屏幕。清单 6-1 展示了我们的 `MrNomGame`\
  \ 类。\n\n```\npackage com.badlogic.androidgames.mrnom;\nimport com.badlogic.androidgames.framework.Screen;\n\
  import com.badlogic.androidgames.framework.impl.AndroidGame;\npublic class MrNomGame\
  \ extends AndroidGame {\npublic Screen getStartScreen() {\nreturn new LoadingScreen(this);\n\
  }\n}\n清单 6-1. MrNomGame.java: 我们的主活动/游戏混合体\n```\n\n我们唯一需要做的就是继承 `AndroidGame` 并实现\
  \ `getStartScreen()` 方法，该方法将返回一个 `LoadingScreen` 类的实例（我们稍后会实现它）。请记住，这将为我们启动游戏所需的一切，从设置音频、图形、输入和文件\
  \ I/O 的不同模块，到启动主循环线程。相当简单，对吧？\n\n## Assets：便捷的资源存储\n\n加载屏幕将加载我们游戏的所有资源。但是我们把它们存储在哪里呢？为了存储它们，我们将采用一种在\
  \ Java 领域不太常见的方式：创建一个类，该类包含大量公开的静态成员，用于保存我们从资源中加载的所有像素图和声音。清单 6-2 展示了这个类。\n\n\n\n\
  ```java\npackage com.badlogic.androidgames.mrnom;\nimport com.badlogic.androidgames.framework.Pixmap;\n\
  import com.badlogic.androidgames.framework.Sound;\npublic class Assets {\npublic\
  \ static Pixmap background;\npublic static Pixmap logo;\npublic static Pixmap mainMenu;\n\
  public static Pixmap buttons;\npublic static Pixmap help1;\npublic static Pixmap\
  \ help2;\npublic static Pixmap help3;\npublic static Pixmap numbers;\npublic static\
  \ Pixmap ready;\npublic static Pixmap pause;\npublic static Pixmap gameOver;\npublic\
  \ static Pixmap headUp;\npublic static Pixmap headLeft;\npublic static Pixmap headDown;\n\
  public static Pixmap headRight;\npublic static Pixmap tail;\npublic static Pixmap\
  \ stain1;\npublic static Pixmap stain2;\npublic static Pixmap stain3;\npublic static\
  \ Sound click;\npublic static Sound eat;\npublic static Sound bitten;\n}\n```\n\
  列表 6-2. `Assets.java`：持有所有图片和声音资源，便于访问\n\n我们为从资产中加载的每个图像和声音都设置了一个静态成员。如果想使用这些资源之一，可以这样操作：\n\
  \n```java\ngame.getGraphics().drawPixmap(Assets.background, 0, 0);\n```\n\n或者这样：\n\
  \n```java\nAssets.click.play(1);\n```\n\n这样确实很方便。但请注意，由于这些静态成员没有声明为 `final`，我们无法阻止他人覆盖它们。不过只要我们不主动覆盖，就是安全的。这些公开的非\
  \ final 成员实际上让这种“设计模式”成了一种反模式。不过对于我们的游戏而言，稍微偷懒一下也没关系。更优雅的解决方案是将资源隐藏在所谓的单例类中的 setter\
  \ 和 getter 之后。我们选择坚持使用这个简易资源管理器。\n\n## 设置：追踪用户选择与最高分\n\n在加载界面中，还需要加载另外两项内容：用户设置和最高分。回顾第\
  \ 3 章的主菜单和最高分界面，我们会发现允许用户切换音效，并且会存储前五名的最高分。我们会将这些设置保存到外部存储中，以便游戏下次启动时重新加载。为此，我们将实现另一个简单的类，叫做\
  \ `Settings`，如列表 6-3 所示。该列表被拆分显示，并穿插了注释。\n\n```java\npackage com.badlogic.androidgames.mrnom;\n\
  import java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.IOException;\n\
  import java.io.InputStreamReader;\nimport java.io.OutputStreamWriter;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  public class Settings {\npublic static boolean soundEnabled = true;\npublic static\
  \ int[] highscores = new int[] { 100, 80, 50, 30, 10 };\n```\n\n列表 6-3. `Settings.java`：存储设置并实现加载/保存功能\n\
  \n是否播放音效由一个名为`soundEnabled`的公共静态布尔值决定。最高分存储在一个包含五个元素的整数数组中，按从高到低排序。我们为这两个设置定义了合理的默认值。我们可以像访问`Assets`类的成员一样访问这两个成员。\n\
  \n```java\npublic static void load(FileIO files) {\nBufferedReader in = null;\n\
  try {\nin = new BufferedReader(new InputStreamReader(\nfiles.readFile(\".mrnom\"\
  )));\nsoundEnabled = Boolean.parseBoolean(in.readLine());\nfor (int i = 0; i < 5;\
  \ i++) {\nhighscores[i] = Integer.parseInt(in.readLine());\n}\n} catch (IOException\
  \ e) {\n// :( 没关系，我们有默认值\n} catch (NumberFormatException e) {\n// :/ 没关系，默认值能解决问题\n\
  } finally {\ntry {\nif (in != null)\nin.close();\n} catch (IOException e) {\n}\n\
  }\n}\n```\n\n静态方法`load()`会尝试从外部存储中名为`.mrnom`的文件加载设置。为此，它需要一个`FileIO`实例，我们将其传递给该方法。该方法假定声音设置和每个最高分条目都存储在不同的行中，并直接逐行读取。如果出现任何问题（例如外部存储不可用或设置文件尚不存在），我们会直接回退到默认值并忽略错误。\n\
  \n```java\npublic static void save(FileIO files) {\nBufferedWriter out = null;\n\
  try {\nout = new BufferedWriter(new OutputStreamWriter(\nfiles.writeFile(\".mrnom\"\
  )));\nout.write(Boolean.toString(soundEnabled));\nfor (int i = 0; i < 5; i++) {\n\
  out.write(Integer.toString(highscores[i]));\n}\n} catch (IOException e) {\n} finally\
  \ {\ntry {\nif (out != null)\nout.close();\n} catch (IOException e) {\n}\n}\n}\n\
  ```\n\n接下来是一个名为`save()`的方法。它获取当前设置，并将其序列化到外部存储的`.mrnom`文件中（即`/sdcard/.mrnom`）。声音设置和每个最高分条目都存储在该文件的不同行中，这与`load()`方法的预期一致。如果出现问题，我们会忽略错误，并使用之前定义的默认值。在\
  \ AAA 级大作中，你可能需要将此类加载错误告知用户。\n\n```java\npublic static void addScore(int score)\
  \ {\nfor (int i = 0; i < 5; i++) {\nif (highscores[i] < score) {\nfor (int j = 4;\
  \ j > i; j--)\nhighscores[j] = highscores[j - 1];\nhighscores[i] = score;\nbreak;\n\
  }\n}\n}\n```\n\n最后一个方法是`addScore()`，它是一个便捷方法。我们将用它来向最高分列表中添加新分数，并根据要插入的分数值自动重新排序。\n\
  \n## LoadingScreen：从磁盘获取资源\n\n有了这些类，我们现在可以轻松实现加载界面。列表 6-4 展示了相关代码。\n\n```java\n\
  package com.badlogic.androidgames.mrnom;\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Screen;\n\
  import com.badlogic.androidgames.framework.Graphics.PixmapFormat;\npublic class\
  \ LoadingScreen extends Screen {\npublic LoadingScreen(Game game) {\nsuper(game);\n\
  }\n```\n\n列表 6-4. `LoadingScreen.java`：加载所有资源和设置\n\n我们让`LoadingScreen`类继承自第 3 章定义的`Screen`类。这要求我们实现一个接受`Game`实例的构造函数，并将其传递给父类构造函数。请注意，该构造函数将在我们之前定义的`MrNomGame.getStartScreen()`方法中被调用。\n\
  \n\n\n```java\npublic void update(float deltaTime) {\n    Graphics g = game.getGraphics();\n\
  \    Assets.background = g.newPixmap(\"background.png\", PixmapFormat.RGB565);\n\
  \    Assets.logo = g.newPixmap(\"logo.png\", PixmapFormat.ARGB4444);\n    Assets.mainMenu\
  \ = g.newPixmap(\"mainmenu.png\", PixmapFormat.ARGB4444);\n    Assets.buttons =\
  \ g.newPixmap(\"buttons.png\", PixmapFormat.ARGB4444);\n    Assets.help1 = g.newPixmap(\"\
  help1.png\", PixmapFormat.ARGB4444);\n    Assets.help2 = g.newPixmap(\"help2.png\"\
  , PixmapFormat.ARGB4444);\n    Assets.help3 = g.newPixmap(\"help3.png\", PixmapFormat.ARGB4444);\n\
  \    Assets.numbers = g.newPixmap(\"numbers.png\", PixmapFormat.ARGB4444);\n   \
  \ Assets.ready = g.newPixmap(\"ready.png\", PixmapFormat.ARGB4444);\n    Assets.pause\
  \ = g.newPixmap(\"pausemenu.png\", PixmapFormat.ARGB4444);\n    Assets.gameOver\
  \ = g.newPixmap(\"gameover.png\", PixmapFormat.ARGB4444);\n    Assets.headUp = g.newPixmap(\"\
  headup.png\", PixmapFormat.ARGB4444);\n    Assets.headLeft = g.newPixmap(\"headleft.png\"\
  , PixmapFormat.ARGB4444);\n    Assets.headDown = g.newPixmap(\"headdown.png\", PixmapFormat.ARGB4444);\n\
  \    Assets.headRight = g.newPixmap(\"headright.png\", PixmapFormat.ARGB4444);\n\
  \    Assets.tail = g.newPixmap(\"tail.png\", PixmapFormat.ARGB4444);\n    Assets.stain1\
  \ = g.newPixmap(\"stain1.png\", PixmapFormat.ARGB4444);\n    Assets.stain2 = g.newPixmap(\"\
  stain2.png\", PixmapFormat.ARGB4444);\n    Assets.stain3 = g.newPixmap(\"stain3.png\"\
  , PixmapFormat.ARGB4444);\n    Assets.click = game.getAudio().newSound(\"click.ogg\"\
  );\n    Assets.eat = game.getAudio().newSound(\"eat.ogg\");\n    Assets.bitten =\
  \ game.getAudio().newSound(\"bitten.ogg\");\n    Settings.load(game.getFileIO());\n\
  \    game.setScreen(new MainMenuScreen(game));\n}\n```\n\n接下来是我们实现的 `update()` 方法，我们在其中加载资源和设置。对于图像资源，我们只需通过\
  \ `Graphics.newPixmap()` 方法创建新的像素图。请注意，我们指定了像素图应采用的色彩格式。背景采用 RGB565 格式，所有其他图像采用\
  \ ARGB4444 格式（前提是 `BitmapFactory` 尊重我们的提示）。我们这样做是为了节省内存，并稍后提高渲染速度。我们的原始图像以 PNG 格式存储，分别为\
  \ RGB888 和 ARGB8888 格式。我们还加载了三种音效，并将它们存储在 `Assets` 类的相应成员中。接着，我们通过 `Settings.load()`\
  \ 方法从外部存储加载设置。最后，我们启动屏幕切换，跳转到一个名为 `MainMenuScreen` 的`Screen`，它将接管后续的执行。\n\n```java\n\
  public void present(float deltaTime) {\n}\npublic void pause() {\n}\npublic void\
  \ resume() {\n}\npublic void dispose() {\n}\n}\n```\n\n其他方法只是存根，不执行任何操作。由于 `update()`\
  \ 方法在加载完所有资源后会立即触发屏幕切换，因此此屏幕上无需再做其他事情。\n\n##### 主菜单屏幕\n\n主菜单屏幕非常简单。它仅渲染徽标、主菜单选项以及以切换按钮形式呈现的音效设置。它所做的一切就是响应对主菜单选项或音效设置切换按钮的触摸。为了实现此行为，我们需要知道两件事：我们在屏幕上渲染图像的位置，以及哪些触摸区域会触发屏幕切换或切换音效设置。图\
  \ 6-2 展示了我们将在屏幕上渲染不同图像的位置。由此我们可以直接推导出触摸区域。\n\n![A340874_3_En_6_Fig2_HTML.jpg](img/A340874_3_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** 主菜单屏幕。坐标指定了我们将渲染不同图像的位置，轮廓线显示了触摸区域。\n\n徽标和主菜单选项图像的 x 坐标经过计算，使其在 x 轴上居中。\n\
  \n接下来，让我们实现 `Screen`。清单 6-5 展示了代码。\n\n```java\npackage com.badlogic.androidgames.mrnom;\n\
  import java.util.List;\nimport com.badlogic.androidgames.framework.Game;\nimport\
  \ com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.Screen;\npublic class MainMenuScreen\
  \ extends Screen {\n    public MainMenuScreen(Game game) {\n        super(game);\n\
  \    }\n}\n```\n\n**清单 6-5.** `MainMenuScreen.java`: 主菜单屏幕\n\n我们让该类再次继承自 `Screen`，并为其实现一个合适的构造函数。\n\
  \n```java\npublic void update(float deltaTime) {\n    Graphics g = game.getGraphics();\n\
  \    List touchEvents = game.getInput().getTouchEvents();\n    game.getInput().getKeyEvents();\n\
  \    int len = touchEvents.size();\n    for(int i = 0; i < len; i++) {\n       \
  \ TouchEvent event = touchEvents.get(i);\n        if(event.type == TouchEvent.TOUCH_UP)\
  \ {\n            if(inBounds(event, 0, g.getHeight() - 64, 64, 64)) {\n        \
  \        Settings.soundEnabled = !Settings.soundEnabled;\n                if(Settings.soundEnabled)\n\
  \                    Assets.click.play(1);\n            }\n            if(inBounds(event,\
  \ 64, 220, 192, 42) ) {\n                game.setScreen(new GameScreen(game));\n\
  \                if(Settings.soundEnabled)\n                    Assets.click.play(1);\n\
  \                return;\n            }\n            if(inBounds(event, 64, 220\
  \ + 42, 192, 42) ) {\n                game.setScreen(new HighscoreScreen(game));\n\
  \                if(Settings.soundEnabled)\n                    Assets.click.play(1);\n\
  \                return;\n            }\n            if(inBounds(event, 64, 220\
  \ + 84, 192, 42) ) {\n                game.setScreen(new HelpScreen(game));\n  \
  \              if(Settings.soundEnabled)\n                    Assets.click.play(1);\n\
  \                return;\n            }\n        }\n    }\n}\n```\n\n接下来，我们有一个 `update()`\
  \ 方法，在其中我们将进行所有的触摸事件检查。我们首先从 `Game` 实例提供的 `Input` 实例中获取 `TouchEvent` 和 `KeyEvent`\
  \ 实例。请注意，我们并没有使用 `KeyEvent` 实例，但我们还是获取它们以清除内部缓冲区（是的，这有点不优雅，但我们还是要养成这个习惯）。然后我们遍历所有\
  \ `TouchEvent` 实例，直到找到一个类型为 `TouchEvent.TOUCH_UP` 的事件。（我们也可以查找 `TouchEvent.TOUCH_DOWN`\
  \ 事件，但在大多数 UI 中，抬起事件用于指示 UI 组件已被按下。）\n\n一旦找到合适的事件，我们就检查它是否按下了音效切换按钮或某个菜单项。为了使代码更简洁，我们编写了一个名为\
  \ `inBounds()` 的方法，它接收一个触摸事件、x 和 y 坐标以及宽度和高度。该方法检查触摸事件是否位于由这些参数定义的矩形内，并返回 `true`\
  \ 或 `false`。\n\n如果按下了音效切换按钮，我们只需反转 `Settings.soundEnabled` 布尔值。如果按下了任何主菜单项，我们通过实例化相应的\
  \ `Screen` 并使用 `Game.setScreen()` 设置它来切换到该屏幕。在这种情况下，我们可以立即返回，因为 `MainMenuScreen`\
  \ 已经无事可做。如果切换按钮或主菜单项被按下且音效已启用，我们还会播放点击音效。\n\n请记住，所有触摸事件都将相对于我们 320×480 像素的目标分辨率进行报告，这要归功于我们在第\
  \ 5 章讨论的触摸事件处理程序中执行的缩放魔法。\n\n```java\nprivate boolean inBounds(TouchEvent event,\
  \ int x, int y, int width, int height) {\n    if(event.x > x && event.x < x + width\
  \ - 1 && event.y > y && event.y < y + height - 1)\n        return true;\n    else\n\
  \        return false;\n}\n```\n\n`inBounds()` 方法的工作原理如前所述：传入一个触摸事件和一个矩形，它会告知你触摸事件的坐标是否在该矩形内。\n\
  \n```java\npublic void present(float deltaTime) {\n    Graphics g = game.getGraphics();\n\
  \    g.drawPixmap(Assets.background, 0, 0);\n    g.drawPixmap(Assets.logo, 32, 20);\n\
  \    g.drawPixmap(Assets.mainMenu, 64, 220);\n    if(Settings.soundEnabled)\n  \
  \      g.drawPixmap(Assets.buttons, 0, 416, 0, 0, 64, 64);\n    else\n        g.drawPixmap(Assets.buttons,\
  \ 0, 416, 64, 0, 64, 64);\n}\n```\n\n\n\n`present()`方法可能是你最期待的方法，但它并没有那么令人兴奋。我们的小游戏框架让渲染主菜单屏幕变得非常简单。我们只需在坐标`(0,0)`处渲染背景，这基本上会清空帧缓冲区，因此无需调用`Graphics.clear()`。接下来，我们在图\
  \ 6-2 所示的坐标处绘制 Logo 和主菜单项。最后，我们根据当前设置绘制声音切换按钮来结束该方法。如你所见，我们使用相同的像素图，但只绘制其适当的区域（声音切换按钮；见图\
  \ 6-1）。这很简单。\n\n```java\npublic void pause() {\n    Settings.save(game.getFileIO());\n\
  }\n```\n\n我们需要讨论的最后一部分是`pause()`方法。由于我们可以在该屏幕上更改设置，因此必须确保将其持久化到外部存储。使用我们的`Settings`类，这也非常简单！\n\
  \n```java\npublic void resume() {\n}\npublic void dispose() {\n}\n}\n```\n\n`resume()`和`dispose()`方法在此屏幕中不需要执行任何操作。\n\
  \n### HelpScreen 类\n\n接下来，让我们实现在之前的`update()`方法中使用过的`HelpScreen`、`HighscoreScreen`和`GameScreen`类。\n\
  \n我们在第 3 章定义了三个帮助屏幕，每个屏幕或多或少都解释了游戏玩法的一个方面。我们现在直接将它们转换为名为`HelpScreen`、`HelpScreen2`和`HelpScreen3`的`Screen`实现。它们都有一个按钮，用于启动屏幕转换。`HelpScreen3`屏幕将转换回主菜单屏幕。图\
  \ 6-3 显示了三个帮助屏幕及其绘制坐标和触摸区域。\n\n![A340874_3_En_6_Fig3_HTML.jpg](img/A340874_3_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3. 三个帮助屏幕、绘制坐标和触摸区域**\n\n现在，这看起来实现起来很简单。让我们从`HelpScreen`类开始，如清单 6-6 所示。\n\
  \n```java\npackage com.badlogic.androidgames.mrnom;\nimport java.util.List;\nimport\
