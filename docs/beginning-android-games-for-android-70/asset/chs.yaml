  \ 9-15 以及上一节中的其他图片进行对比。加载图形资源的代码中唯一值得注意的地方是创建金币`Animation`实例的部分。如前所述，我们在动画帧序列的末尾复用了第二帧。所有动画都使用\
  \ 0.2 秒的帧间隔。\n\n我们还创建了一个`Font`类的实例，这个类之前没有讨论过。它将实现使用图集中嵌入的位图字体渲染文本的逻辑。构造函数接收包含位图字体字符的`Texture`、包含字符区域左上角的像素坐标、每行的字符数以及每个字符的像素尺寸。\n\
  \n我们还在此方法中加载了所有`Music`和`Sound`实例。如你所见，我们再次使用了老朋友`Settings`类。我们可以直接从 Mr. Nom 项目中复用该类，只需稍作修改，稍后你会看到。注意，我们将`Music`实例设置为循环播放，音量设置为\
  \ 0.5，这样比音效稍微轻柔一些。只有当用户之前没有禁用声音时，音乐才会开始播放，该设置存储在`Settings`类中，与 Mr. Nom 中的做法一样。\n\
  \n```\npublic static void reload() {\nbackground.reload();\nitems.reload();\nif(Settings.soundEnabled)\n\
  music.play();\n}\n```\n\n\n\n接下来，我们来介绍一个神秘的方法：`reload()`。请记住，当我们的应用暂停时，OpenGL ES\
  \ 上下文将会丢失。当应用恢复时，我们必须重新加载纹理，这正是此方法要做的。如果启用了音效，我们也会恢复音乐播放。\n\n```\npublic static\
  \ void playSound(Sound sound) {\n    if(Settings.soundEnabled)\n        sound.play(1);\n\
  }\n```\n\n这个类的最后一个方法 `playSound()` 是一个辅助方法，我们将在后续代码中使用它来播放音频。我们无需在每个地方都检查音效是否启用，而是将检查逻辑封装在此方法中。\n\
  \n让我们看看修改后的 `Settings` 类。\n\n### Settings 类\n\n`Settings` 类没有太多的改动。清单 9-2 展示了我们稍微修改过的\
  \ `Settings` 类的代码。\n\n```\npackage com.badlogic.androidgames.jumper;\nimport java.io.BufferedReader;\n\
  import java.io.BufferedWriter;\nimport java.io.IOException;\nimport java.io.InputStreamReader;\n\
  import java.io.OutputStreamWriter;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  public class Settings {\npublic static boolean soundEnabled = true;\npublic final\
  \ static int[] highscores = new int[] { 100, 80, 50, 30, 10 };\npublic final static\
  \ String file = \".superjumper\";\npublic static void load(FileIO files) {\nBufferedReader\
  \ in = null;\ntry {\nin = new BufferedReader(new InputStreamReader(files.readFile(file)));\n\
  soundEnabled = Boolean.parseBoolean(in.readLine());\nfor(int i = 0; i < 5; i++)\
  \ {\nhighscores[i] = Integer.parseInt(in.readLine());\n}\n} catch (IOException e)\
  \ {\n// :( 没关系，我们有默认值\n} catch (NumberFormatException e) {\n// :( 没关系，我们有默认值\n}\
  \ finally {\ntry {\nif (in != null)\nin.close();\n} catch (IOException e) {\n}\n\
  }\n}\npublic static void save(FileIO files) {\nBufferedWriter out = null;\ntry {\n\
  out = new BufferedWriter(new OutputStreamWriter(\nfiles.writeFile(file)));\nout.write(Boolean.toString(soundEnabled));\n\
  for(int i = 0; i < 5; i++) {\nout.write(Integer.toString(highscores[i]));\n}\n}\
  \ catch (IOException e) {\n} finally {\ntry {\nif (out != null)\nout.close();\n\
  } catch (IOException e) {\n}\n}\n}\npublic static void addScore(int score) {\nfor(int\
