  \ assets 一样，资源也会被打包到应用中。\n*   `AndroidManifest.xml` 描述了你的应用。它定义了构成应用的 Activity 和服务、（理论上）应用运行的最低和目标\
  \ Android 版本，以及需要的权限（例如访问 SD 卡或网络）。\n\n你可以在 Project 视图中右键点击目标文件夹，选择 `New` 及相应资源类型，轻松添加新的源文件、文件夹和其他资源。不过目前我们保持所有设置不变。接下来，我们将研究如何修改基本应用设置和配置，使其尽可能兼容更多\
  \ Android 版本和设备。\n\n\n\n### 编写应用程序代码\n\n我们至今尚未编写一行代码，现在该改变这一状况了。新建项目向导为我们创建了一个名为`HelloWorldActivity`的模板活动类，当我们在模拟器或设备上运行应用时，该类将被显示。通过在项目视图中双击该文件来打开类的源代码，我们将用清单\
  \ 2-1 中的代码替换该模板代码。\n\n```\npackage com.helloworld.helloworld;\nimport android.support.v7.app.AppCompatActivity;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
  public class HelloWorldActivity extends AppCompatActivity\nimplements View.OnClickListener\
  \ {\nButton button;\nint touchCount;\n@Override\npublic void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nbutton = new Button(this);\nbutton.setText(\
  \ \"Touch me!\" );\nbutton.setOnClickListener(this);\nsetContentView(button);\n\
  }\npublic void onClick(View v) {\ntouchCount++;\nbutton.setText(\"Touched me \"\
  \ + touchCount + \" time(s)\");\n}\n}\n```\n\n我们来剖析清单 2-1 的代码，以便理解其功能。细节问题留待后续章节探讨，当前只需大致了解运行原理即可。\n\
  \n源代码文件以标准的 Java 包声明和几个导入语句开头。大多数 Android 框架类都位于`android`包中。\n\n```\npackage com.helloworld.helloworld;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\nimport\
  \ android.view.View;\nimport android.widget.Button;\n```\n\n接下来，我们定义`HelloWorldActivity`，并让它继承\
  \ Android 框架 API 提供的基类`AppCompatActivity`。活动（Activity）非常类似于经典桌面界面中的窗口，区别在于活动始终填充整个屏幕（根据设备不同，Android\
  \ UI 顶部的通知栏和屏幕底部的“软键”除外）。此外，我们让`HelloWorldActivity`实现接口`OnClickListener`。如果你有其他\
  \ UI 工具包的经验，可能已经猜到接下来要做什么了。稍后会有更多说明。\n\n```\npublic class HelloWorldActivity extends\
  \ AppCompatActivity\nimplements View.OnClickListener {\n```\n\n我们让活动拥有两个成员：一个`Button`和一个`int`，用于记录`Button`被触摸的次数。\n\
  \n```\nButton button;\nint touchCount;\n```\n\n每个活动都可以实现`Activity.onCreate()`方法，该方法在活动第一次启动时由\
  \ Android 系统调用一次，这取代了通常用于创建类实例的构造函数。\n\n```\n@Override\npublic void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n```\n\n接下来，我们创建一个按钮并设置其初始文本。`Button`是\
  \ Android 框架 API 提供的众多控件之一。在 Android 中，UI 控件被称为视图（View）。注意，`Button`是我们的`HelloWorldActivity`类的一个成员，后续需要保留对其的引用。\n\
  \n```\nbutton = new Button(this);\nbutton.setText( \"Touch me!\" );\n```\n\n`onCreate()`中的下一行设置了按钮的`OnClickListener`。`OnClickListener`是一个回调接口，包含一个名为`OnClickListener.onClick()`的方法，当按钮被点击时会调用该方法。我们希望收到点击通知，因此让`HelloWorldActivity`实现该接口，并将其注册为按钮的`OnClickListener`。\n\
  \n```\nbutton.setOnClickListener(this);\n```\n\n`onCreate()`方法的最后一行将按钮设置为活动的内容视图。视图可以嵌套，而活动的内容视图是这一层次结构的根节点。在这里，我们简单地将按钮设置为活动要显示的视图。为简化起见，我们不再深入探讨该内容视图下活动的布局细节。\n\
  \n```\nsetContentView(button);\n}\n```\n\n下一步是接口要求活动必须实现的`OnClickListener.onClick()`方法。每次按钮被点击时都会调用该方法。在此方法中，我们递增`touchCount`计数器，并将按钮的文本设置为新的字符串。\n\
  \n```\npublic void onClick(View v) {\ntouchCount++;\nbutton.setText(\"Touched me\"\
  \ + touchCount + \"times\");\n}\n```\n\n因此，总结我们的`Hello World`应用，我们构建了一个包含按钮的活动。每次点击按钮时，都会相应地更新其文本。这可能算不上世界上最激动人心的应用，但足以用于后续演示。\n\
  \n请注意，我们从未需要手动编译任何内容。每次添加、修改或删除源文件或资源时，Android Studio 都会重新编译项目。编译过程的结果是一个 APK 文件，可随时部署到模拟器或\
  \ Android 设备上。APK 文件位于项目的`bin/`文件夹中。\n\n你将在后续部分使用此应用，学习如何在模拟器实例和设备上运行并调试 Android\
  \ 应用。\n\n## 在设备或模拟器上运行应用\n\n编写完应用代码的第一个迭代版本后，我们希望运行并测试，以找出潜在问题，或者只是惊叹于它的出色表现。实现这一目标有两种方式：\n\
  \n- 我们可以通过 USB 将应用运行在连接到开发电脑的真实设备上。\n- 我们可以启动 SDK 附带的模拟器，并在其中测试应用。\n\n无论哪种情况，在最终看到应用运行之前，都需要进行一些设置工作。\n\
  \n### 连接设备\n\n在连接设备进行测试之前，我们必须确保操作系统能识别该设备。在 Windows 上，这需要安装合适的驱动程序，该驱动程序是我们之前安装的\
  \ SDK 的一部分。只需连接设备，然后按照 Windows 的标准驱动安装程序操作，将安装过程指向 SDK 安装根目录下的`driver/`文件夹即可。对于某些设备，你可能需要从制造商网站获取驱动程序。许多设备可以使用\
  \ SDK 附带的 Android ADB 驱动程序；不过，通常还需要将特定设备的硬件 ID 添加到 INF 文件中。快速在谷歌上搜索设备名称和“Windows\
  \ ADB”，通常就能找到连接该设备所需的信息。\n\n在 Linux 和 Mac OS X 上，通常无需安装驱动程序，因为操作系统已自带。根据你使用的 Linux\
  \ 发行版，可能需要对 USB 设备发现进行一些调整，通常是通过为`udev`创建新的规则文件。这因设备而异。快速上网搜索应该能找到适用于你设备的解决方案。\n\
  \n\n\n### 创建安卓虚拟设备\n\nSDK 附带一个可以运行安卓虚拟设备 (AVD) 的模拟器。安卓虚拟设备由特定安卓版本的系统映像、皮肤以及一组属性（包括屏幕分辨率、SD\
  \ 卡大小等）组成。\n\n要创建 AVD，您需要启动安卓虚拟设备管理器。为此，请单击 `Tools >> Android >> AVD Manager`。下面我们来一步步创建一个自定义\
  \ AVD：\n\n1.  单击 AVD 管理器屏幕左下角的 `Create Virtual Device…` 按钮，这将打开虚拟设备配置对话框，如图 2-6\
  \ 所示。\n\n    ![A340874_3_En_2_Fig6_HTML.jpg](img/A340874_3_En_2_Fig6_HTML.jpg)\n\
  \n    图 2-6.\n\n    虚拟设备配置对话框  \n2.  选择正确的硬件配置文件。在本例中，我们将选择 `Phone >> Nexus 5`。单击\
  \ `Next` 继续。  \n3.  系统映像指定了 AVD 应使用的安卓版本。对于我们简单的“Hello World”项目，您可以选择 `x86Images\
  \ >> Jelly Bean`。注意：您可能需要先下载它才能选择。不过不用担心，AVD 管理器已简化此过程；只需单击“Download”链接，AVD 管理器将处理其余部分。\
  \  \n4.  单击 `Finish` 创建您的模拟器。  \n\n注意\n\n除非您有几十种具有不同安卓版本和屏幕尺寸的设备，否则您应该使用模拟器对其他安卓版本和屏幕尺寸组合进行额外测试。\n\
  \n### 安装高级模拟器功能\n\n目前有一些硬件虚拟化实现支持安卓模拟器，英特尔是其中之一。如果您拥有英特尔 CPU，您应该能够安装英特尔硬件加速执行管理器\
  \ (HAXM)，它与 x86 模拟器映像配合使用，可以虚拟化您的 CPU，并且运行速度比普通的完整模拟映像快得多。与此相结合，启用 GPU 加速（理论上）将提供一个合理的性能测试环境。我们使用这些工具当前版本的体验是，它们仍然有些小问题，但前景看起来不错，所以请务必关注\
  \ Google 的官方公告。与此同时，让我们开始设置：\n\n1.  打开独立 SDK 管理器。找到 `Intel x86 Emulator Accelerator\
  \ (HAXM installer)`，选中它并安装（参见图 2-7）。\n\n    ![A340874_3_En_2_Fig7_HTML.jpg](img/A340874_3_En_2_Fig7_HTML.jpg)\n\
  \n    图 2-7.\n\n    选择 HAXM 安装程序  \n2.  现在，通过打开 AVD 管理器并单击模拟器名称旁边的绿色铅笔图标来编辑模拟器的映像。将图形设置为\
  \ `Hardware GLES20`，如图 2-8 所示。注意，如果您在较旧的计算机上运行，并且您的 GPU 无法胜任模拟安卓屏幕的任务，您可能需要选择 `Software\
  \ GLES20`。\n\n    ![A340874_3_En_2_Fig8_HTML.jpg](img/A340874_3_En_2_Fig8_HTML.jpg)\n\
  \n    图 2-8.\n\n    创建启用 GPU 模拟的 x86 AVD\n\n### 运行应用程序\n\n现在您已经设置好了设备和 AVD，终于可以运行\
  \ `Hello World` 应用程序了。您可以在 Android Studio 中通过单击工具栏上的 `Run` 按钮轻松实现。Android Studio\
  \ 随后将在后台执行以下步骤：\n\n1.  如果自上次编译后有任何文件发生更改，则使用 Gradle 将项目编译为 APK 文件。  \n2.  通过启动或复用已运行的、具有合适安卓版本的模拟器实例，或者在已连接的设备（该设备也必须至少运行您在创建项目时指定的最低\
  \ SDK 级别所对应的安卓版本）上部署并运行应用程序，来安装和运行该应用程序。  \n\n如果您没有连接设备，ADT 插件将启动一个您在 AVD 管理器窗口中看到的\
  \ AVD。输出应如图 2-9 所示。\n\n![A340874_3_En_2_Fig9_HTML.jpg](img/A340874_3_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9.\n\n正在运行的 Hello World 应用程序\n\n模拟器的工作原理几乎与真实设备完全相同，您可以通过鼠标与它交互，就像在设备上用手指操作一样。以下是真实设备与模拟器的一些区别：\n\
  \n*   默认情况下，模拟器仅支持单点触控输入。只需使用鼠标光标，将其视为您的手指即可。要模拟多点触控，请在按住 Windows 上的 `CTRL` 键（或\
  \ Mac 上的 `Command` 键）的同时单击鼠标。\n*   模拟器缺少一些应用程序，例如 Google Play 应用。\n*   要更改屏幕上设备的方向，请勿倾斜您的显示器。而是单击\
  \ `Rotate Left` 或 `Rotate Right` 按钮。\n*   模拟器可能运行缓慢。不要通过在模拟器上运行来评估您的应用程序的速度性能。\n\
  *   4.0.3 之前的模拟器版本仅支持 OpenGL ES 1.x。OpenGL ES 2.0 在 4.0.3 及更高版本的模拟器上受支持。我们将在第 7\
  \ 章讨论 OpenGL ES。对于我们的基本测试，模拟器可以正常工作。一旦我们更深入地学习 OpenGL，您就需要一个真实设备进行测试，因为即使是我们使用过的最新模拟器，其\
  \ OpenGL 实现（虚拟化和软件）仍然有些小问题。目前，在模拟器上测试 OpenGL ES 应用程序时请谨慎行事。\n\n稍微试玩一下，熟悉熟悉。\n\n\
  注意\n\n启动一个新的模拟器实例可能需要相当长的时间（根据您的硬件，最多可能需要十分钟）。您可以保留模拟器在整个开发会话期间运行，这样就不必反复重启它，或者在创建或编辑\
  \ AVD 时勾选“Snapshot”选项，这将允许您保存和恢复虚拟机 (VM) 的快照，从而实现快速启动。\n\n\n\n## 应用程序的调试与性能分析\n\n\
  有时，你的应用程序会出现意外行为，甚至崩溃。要弄清楚具体出了什么问题，你需要能够调试应用程序。\n\n`Android Studio` 为我们提供了极其强大的\
  \ Android 应用程序调试功能。我们可以在源代码中设置断点、检查变量和当前堆栈跟踪等。\n\n通常，你会在调试之前设置断点，以便检查程序在特定点时的状态。要设置断点，只需在\
  \ `Android Studio` 中打开源文件，然后点击你想要设置断点那一行前面的灰色区域即可。为了演示，请在 `HelloWorldActivity` 类的第\
  \ 23 行执行此操作。这将使调试器在你每次点击按钮时停止。点击后，编辑器标签页应该会在该行前面显示一个小圆圈，如图 2-10 所示。你可以通过在编辑器标签页中再次点击断点来移除它。\n\
  \n![A340874_3_En_2_Fig10_HTML.jpg](img/A340874_3_En_2_Fig10_HTML.jpg)\n\n图 2-10.\
  \ 设置断点\n\n启动调试与运行应用程序非常相似，如上一节所述。不过，不要点击运行按钮，而是点击调试按钮。\n\n让我们看看调试应用程序时，有哪些信息可供你使用。\n\
  \n-   左下角的调试器会显示所有当前正在运行的应用程序，以及如果这些应用程序以调试模式运行并被挂起时，它们所有线程的堆栈跟踪。\n-   控制台窗口会打印来自\
  \ ADT 插件的消息，告诉我们它正在做什么。\n-   Android Monitor 视图中的 `logcat` 视图将成为你开发旅程中最好的伙伴之一。该视图会显示来自你应用程序正在运行的模拟器/设备的日志输出。日志输出来自系统组件、其他应用程序和你自己的应用程序。当你的应用程序崩溃时，`logcat`\
  \ 视图会显示堆栈跟踪，并允许你在运行时输出你自己的日志消息。我们将在下一节中更详细地了解 `logcat`。\n-   变量视图对于调试尤其有用。当调试器命中一个断点时，你将能够检查和修改程序当前作用域内的变量。\n\
  \n如果你好奇的话，可能已经在运行中的应用程序里点击了按钮，看看调试器会如何反应。它会按照我们通过设置断点的指示，在第 23 行停止。你还会注意到，变量视图现在显示了当前作用域内的变量，这些变量包括活动本身（`this`）和方法的参数（`v`）。你可以通过展开这些变量来进一步深入查看。\n\
  \n调试视图会显示从当前堆栈向下到你当前所在方法的堆栈跟踪。请注意，你可能运行了多个线程，并且可以在调试视图中随时暂停它们。\n\n最后，注意我们设置断点的那一行会被高亮显示，这表示程序当前暂停在代码中的那个位置。\n\
  \n你可以指示调试器执行当前语句（按 `F8`），单步进入当前方法中被调用的任何方法（按 `F7`），或者正常继续执行程序（按 `F9`）。或者，你也可以使用运行菜单中的项目来实现相同的功能。此外，请注意，除了我们刚才提到的，还有更多的单步执行选项。与所有事情一样，我们建议你通过实验来找出哪些方法对你有用，哪些没用。\n\
  \n**注意：** 好奇心是成功开发 Android 游戏的基础。你必须深入了解你的开发环境，才能最大限度地利用它。一本这种篇幅的书不可能解释 `Android\
  \ Studio` 所有繁琐的细节，因此我们强烈建议你去尝试。\n\n### LogCat\n\n最有用的视图之一是 `logcat` 视图，我们在上一节中简要提到过它。\n\
  \n`Logcat` 是 Android 的事件日志系统，它允许系统组件和应用程序输出不同日志级别的日志信息。每条日志条目由时间戳、日志级别、产生日志的进程 ID、由记录日志的应用程序自身定义的标签以及实际的日志消息组成。\n\
  \n`logcat` 视图从连接的模拟器或设备收集并显示这些信息。图 2-11 显示了来自 `logcat` 视图的一些示例输出。\n\n![A340874_3_En_2_Fig11_HTML.jpg](img/A340874_3_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11. `logcat` 视图\n\n如果当前连接了多个设备和模拟器，那么 `logcat` 视图将只输出其中一个的日志数据。\n\n## 总结\n\
  \nAndroid 开发环境有时可能会让人望而生畏。幸运的是，你只需要掌握可用选项中的一部分就可以上手，本章应该已经为你提供了足够的信息来开始一些基本的编码。\n\
  \n本章最重要的收获是理解各个部分如何协同工作。JDK 和 Android SDK 为所有 Android 开发提供了基础。它们提供了在模拟器实例和设备上编译、部署和运行应用程序的工具。为了加快开发速度，我们使用\
  \ `Android Studio`，它帮我们完成了原本需要在命令行中使用 JDK 和 SDK 工具才能完成的所有繁重工作。`Android Studio` 提供了特定的功能，例如源代码编辑、`logcat`\
  \ 输出和调试。\n\n掌握所有这些的秘诀在于实践，尽管这听起来可能有些枯燥。在本书中，我们将实现多个项目，这些项目应该能让你对 Android 开发环境更加熟悉。不过，最终能否更上一层楼，取决于你自己。\n\
  \n掌握了这些信息，你就可以进入一开始阅读本书的原因了：开发游戏。\n\n\n\n"
- "# 3. 游戏开发入门指南\n\n游戏开发之所以困难，并非因其高深莫测，而是因为在真正开始编写你梦想中的游戏之前，需要消化海量的信息。从编程角度来看，你需要处理诸如文件输入/输出（I/O）、用户输入处理、音频与图形编程以及网络代码等基础事务。而这些还仅仅只是开始！在此之上，你还需要构建实际的游戏机制。相关的代码同样需要合理架构，但如何设计出游戏的体系结构并非总是显而易见。你实际上必须决定如何让游戏世界运转起来。能否不依赖物理引擎，而是自己编写简单的模拟代码？游戏世界采用怎样的单位与比例尺度？这些又如何映射到屏幕上？\n\
  \n事实上，许多初学者还会忽略另一个问题：在开始动手编写代码之前，你首先得设计好游戏。无数项目从未见天日，始终停留在技术演示阶段，就是因为对游戏应如何运作始终缺乏清晰的概念。这里说的并非普通第一人称射击游戏的基础玩法机制——那反而是简单的部分：用`WASD`键控制移动加上鼠标即可完成。你需要思考诸如：是否有启动画面？它如何过渡？主菜单界面包含什么？实际游戏界面上有哪些平视显示器元素？按下暂停键会发生什么？设置界面应提供哪些选项？你的用户界面设计在不同屏幕尺寸和宽高比下如何呈现？\n\
  \n有趣的是，面对这些问题并没有万能灵药，也没有标准化的处理方式。我们不会假装能为你提供游戏开发的终极解决方案。相反，我们将尝试展示我们通常如何设计一款游戏。你可以选择完全借鉴，或根据自身需求进行修改。没有固定规则——适合你的方法就是好方法。但无论在代码层面还是纸面设计上，你都应始终追求简洁的解决方案。\n\
  \n## 游戏类型：各有所爱\n\n项目启动时，你通常需要确定游戏所属的类型。除非你能想出完全新颖、前所未见的创意，否则你的游戏理念大概率会落入当前流行的几大类型范畴。大多数类型都有既定的机制标准（例如操作方案、特定目标等）。背离这些标准可能让游戏大获成功，因为玩家总是渴望新鲜感；但这也可能带来巨大风险，因此请谨慎考虑你新的平台跳跃/第一人称射击/即时战略游戏是否真的有受众。\n\
  \n让我们看看 Google Play 上一些更受欢迎的游戏类型实例。\n\n## 休闲游戏\n\nGoogle Play 上最大的游戏板块大概就是所谓的休闲游戏。那么，究竟什么是休闲游戏？这个问题没有确切答案，但休闲游戏确实具有一些共同特征。通常，它们拥有极高的易上手性，即使是非游戏玩家也能轻松掌握，这极大地扩展了潜在玩家群体。单个游戏回合通常只需几分钟。然而，休闲游戏简单玩法中蕴含的成瘾性往往能让玩家沉迷数小时。其具体玩法机制从极简的益智游戏，到一键式平台跳跃游戏，甚至简单到将纸团扔进篮筐。由于休闲游戏类型定义的模糊性，其可能性是无限的。\n\
  \nImangi Studios 开发的《神庙逃亡》（见图 3-1）是休闲游戏的完美范例。你引导角色穿越布满障碍的多条跑道。整个操作体系基于滑动屏幕：向左或向右滑动，角色即转向对应方向（前提是前方有岔路）；向上滑动，角色跳跃；向下滑动，角色滑铲穿越障碍。沿途你可以收集各种奖励和增益道具。易于理解的操作、清晰的目标以及精美的\
  \ 3D 画面，使这款游戏在苹果 App Store 和 Google Play 上迅速走红。\n\n![A340874_3_En_3_Fig1_HTML.jpg](img/A340874_3_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1. Imangi Studios 出品的《神庙逃亡》\n\n由单人团队 Psym Mobile 开发的《宝石矿工：深挖》（见图 3-2）则完全是另一回事。它是同一家公司大获成功的《宝石矿工》的续作，仅对原作进行了小幅迭代。你扮演一名矿工，试图在随机生成的矿洞中寻找有价值的矿石、金属和宝石。这些宝藏可以兑换更好的装备，从而挖掘更深，寻获更珍贵的宝物。该游戏利用了人们对“刷宝”概念的偏爱：无需太多努力，你就能持续获得新玩意作为奖励，让你欲罢不能。该游戏的另一个有趣之处在于矿洞是随机生成的。这在不增加额外游戏机制的前提下，极大地提升了游戏的重玩价值。为了增加趣味性，游戏还提供了挑战关卡，设有具体目标和任务，完成后可获得奖牌。这是一个非常轻量级的成就系统。\n\
  \n![A340874_3_En_3_Fig2_HTML.jpg](img/A340874_3_En_3_Fig2_HTML.jpg)\n\n图 3-2. Psym\
  \ Mobile 出品的《宝石矿工：深挖》\n\n这款游戏的另一个有趣之处在于其盈利模式。尽管当前“免费增值”游戏（游戏本身免费，但附加内容价格往往高得离谱）大行其道，它却采用了“老派”的付费模式。每份售价约\
  \ 2 美元，下载量超过 10 万次，对于一款非常简单的游戏来说，这相当赚钱。这种销量在安卓平台上实属罕见，尤其是考虑到 Psym Mobile 基本没为这款游戏做任何广告。前作的成功及其庞大的玩家基础，几乎确保了续作的成功。\n\
  \n要列出休闲游戏类别下所有可能的子类型，恐怕能填满这本书的大半篇幅。在这个类型中可以找到更多创新的游戏概念，值得在应用市场中浏览该类别以获取灵感。\n\n\n\
  \n## 益智游戏\n\n益智游戏无需介绍。我们都熟悉像 `Tetris`（俄罗斯方块）和 `Bejeweled`（宝石迷阵）这样的经典游戏。它们是安卓游戏市场的重要组成部分，深受各个年龄段人群的欢迎。与通常只是将三个同色或同形物体放在一起的\
  \ PC 益智游戏不同，安卓上的许多益智游戏偏离了经典的三消模式，采用了更精巧的、基于物理的谜题。\n\n`ZeptoLab` 出品的 `Cut the Rope`（割绳子）（见图\
  \ 3-3）是物理益智游戏的绝佳范例。游戏的目标是喂食每个关卡中的小生物糖果。玩家需要切断糖果连着的绳子，将其放入气泡中使其上浮，绕过障碍物等方式，引导糖果到达小生物处。每个游戏对象都在一定程度上进行了物理模拟。游戏由\
  \ 2D 物理引擎 `Box2D` 驱动。`Cut the Rope` 在 iOS App Store 和 Google Play 上迅速获得成功，甚至被移植到了浏览器中运行！\n\
  \n![A340874_3_En_3_Fig3_HTML.jpg](img/A340874_3_En_3_Fig3_HTML.jpg)\n\n**图 3-3.**\
  \ `ZeptoLab` 出品的 `Cut the Rope`\n\n`Bithack`（另一家一人公司）出品的 `Apparatus`（见图 3-4）深受老式\
  \ Amiga 和 PC 经典游戏 `Incredible Machines` 的影响。和 `Cut the Rope` 一样，它也是一款物理益智游戏，但赋予了玩家更多掌控如何解决每个谜题的自由度。各种构建模块，如可以钉在一起的简单原木、绳索、马达等，可以创造性地组合起来，将一个蓝色球从关卡一端运送到目标区域。\n\
  \n![A340874_3_En_3_Fig4_HTML.jpg](img/A340874_3_En_3_Fig4_HTML.jpg)\n\n**图 3-4.**\
  \ `Bithack` 出品的 `Apparatus`\n\n除了包含预设关卡的战役模式外，还有一个沙盒环境，你可以在这里尽情发挥创造力。更棒的是，你自制的奇妙装置可以轻松与他人分享。`Apparatus`\
  \ 的这一特性保证了即使玩家通关，仍有海量额外内容等待探索。\n\n当然，你也能在市场上找到各种 `Tetris` 的克隆版、三消游戏以及其他标准模式的游戏。\n\
  \n#### 动作与街机游戏\n\n动作与街机游戏通常能充分发挥安卓平台的潜力。其中许多游戏拥有令人惊叹的 3D 视觉效果，展示了当前一代硬件所能实现的效果。这一类型包含许多子类型，包括竞速游戏、射击游戏、第一人称和第三人称射击游戏以及平台游戏。随着大型游戏工作室开始将其游戏移植到安卓平台，安卓市场的这一细分领域在过去几年中获得了极大的发展。\n\
  \n`MADFINGER Games` 出品的 `SHADOWGUN`（见图 3-5）是一款视觉惊艳的第三人称射击游戏，充分展示了现代安卓手机和平板电脑的计算能力。与许多\
  \ AAA 大作一样，它同时登陆了安卓和 iOS 平台。`SHADOWGUN` 利用了跨平台游戏引擎 `Unity`，是展示 `Unity` 在移动设备上强大能力的典范之一。在玩法上，它是一款双摇杆射击游戏，甚至包含了在板条箱后掩护和其他通常在移动动作游戏中找不到的精巧机制。\n\
  \n![A340874_3_En_3_Fig5_HTML.jpg](img/A340874_3_En_3_Fig5_HTML.jpg)\n\n**图 3-5.**\
  \ `MADFINGER Games` 出品的 `SHADOWGUN`\n\n虽然很难获取确切数字，但安卓市场的统计数据似乎表明，`SHADOWGUN` 的下载量与之前讨论的\
  \ `Gem Miner` 大致相当。这表明，创建一个成功的安卓游戏并不一定需要一个庞大的 AAA 团队。\n\n`Tank Hero: Laser Wars`（坦克英雄：激光战争）（见图\
  \ 3-6）是 `Tank Hero` 的续作，由一个非常小的独立团队 `Clapfoot, Inc.` 开发。你指挥一辆坦克，可以为其装备越来越疯狂的配件，比如射线枪、声波炮等等。关卡是狭小封闭的平坦战场，散布着可交互元素，你可以利用它们来消灭战场上的所有敌方坦克。操作坦克只需简单点击敌人或战场区域，坦克便会做出相应的动作（分别为射击或移动）。虽然它在视觉上无法与\
  \ `SHADOWGUN` 相提并论，但它拥有相当出色的动态光照系统。这里可以学到的教训是，即使是小团队，如果能对内容施加限制，例如限制战场大小，也能创造出视觉上令人愉悦的体验。\n\
  \n![A340874_3_En_3_Fig6_HTML.jpg](img/A340874_3_En_3_Fig6_HTML.jpg)\n\n**图 3-6.**\
  \ `Clapfoot Inc.` 出品的 `Tank Hero: Laser Wars`\n\n`Four Pixels` 出品的 `Dragon, Fly!`（见图\
  \ 3-7）是对 `Andreas Illiger` 那款极其成功的游戏 `Tiny Wings` 的改编，后者在撰写本书时仅限于 iOS 平台。你控制一只小龙，在近乎无尽的斜坡上上下翻飞，同时收集各种宝石。如果小龙加速足够快，它就可以起飞翱翔。操作方法是在下坡时触摸屏幕。游戏机制极其简单，但随机生成的世界和对更高分数的渴望驱使玩家不断挑战。\n\
  \n![A340874_3_En_3_Fig7_HTML.jpg](img/A340874_3_En_3_Fig7_HTML.jpg)\n\n**图 3-7.**\
  \ `Four Pixels` 出品的 `Dragon, Fly!`\n\n`Dragon, Fly!` 很好地说明了一种现象：特定的移动游戏类型常常首先出现在\
  \ iOS 上。即便需求巨大，原创者往往也不会将他们的游戏移植到安卓平台。其他游戏开发者便可以介入，为安卓市场提供一个替代版本。但如果这款“灵感之作”抄袭成分过多，也可能会完全适得其反，正如\
  \ `Zynga` 模仿 `NimbleBit` 的 `Tiny Tower` 时所遭遇的情况。扩展一个创意通常会受到欢迎，而公然抄袭另一款游戏则通常会招致敌意。\n\
  \n`Rockstar Games` 出品的 `Max Payne`（马克思·佩恩）（见图 3-8）是 2001 年发行的一款老 PC 游戏的移植版。我们在此提及它，是为了说明一个日益增长的趋势：大型发行商将其旧有知识产权移植到移动平台。`Max\
  \ Payne` 讲述了一名警察的家人被贩毒集团杀害的故事。为了复仇，马克思大开杀戒。整个故事被嵌入黑色电影风格的叙事中，通过连环漫画和过场短片来呈现。原作严重依赖我们在\
  \ PC 上玩射击游戏时惯用的标准鼠标/键盘组合操作方式。`Rockstar Games` 成功地创建了基于触摸屏的操作方式。虽然控制精度不如 PC，但仍然足够让游戏在触摸屏上玩得愉快。\n\
  \n![A340874_3_En_3_Fig8_HTML.jpg](img/A340874_3_En_3_Fig8_HTML.jpg)\n\n**图 3-8.**\
  \ `Rockstar Games` 出品的 `Max Payne`\n\n动作与街机游戏在市场上的占比仍然有些不足。玩家们渴望优秀的动作类游戏，所以这或许可以成为你的专属领域！\n\
  \n\n\n## 塔防游戏\n\n鉴于塔防游戏在安卓平台上的巨大成功，我们认为有必要将其作为独立游戏类型进行讨论。塔防游戏最初作为电脑即时战略游戏的变体，由模组社区开发而流行起来，随后很快演变出独立游戏版本。目前，塔防游戏是安卓平台上最畅销的游戏类型。\n\
  \n在典型的塔防游戏中，通常会有一些邪恶力量派遣怪物以“波次”形式攻击你的城堡/基地/水晶/任何你能想到的目标。你的任务是在游戏地图上这个特殊地点布置防御炮塔，射击来袭的敌人。每击杀一个敌人，你通常会获得一定数量的金钱或积分，可用于购买新炮塔或升级现有装备。游戏概念极为简单，但要让这类游戏达到完美的平衡却相当困难。\n\
  \nDroidHen 开发的《防御者》（`Defender`，见图 3-9）是 Google Play 上最受欢迎的免费游戏之一。它对塔防玩法进行了巧妙简化，在\
  \ Flash 游戏玩家中广为人知。游戏中你不需要建造多个炮塔，而是控制一座可升级的单一炮塔，升级选项涵盖攻击力提升到分裂箭矢等多种功能。除了主武器，还有不同的法术技能树可供施放，用以扫荡入侵的敌军。这款游戏的优点在于简单易懂、制作精良。画面干净整洁，主题搭配和谐，而\
  \ DroidHen 对平衡性的精准把控会让你不由自主地玩得远超预期。游戏在变现方面也设计得很聪明：你既能获取大量免费升级，也能让性急的玩家用真实货币提前购买物品，获得即时满足感。\n\
  \n![A340874_3_En_3_Fig9_HTML.jpg](img/A340874_3_En_3_Fig9_HTML.jpg)\n\n图 3-9. DroidHen\
  \ 开发的《防御者》（`Defender`）\n\n《防御者》虽然只有一个关卡，但通过变换不同的敌人带来一波又一波的攻击。由于画面非常精美，你会将注意力更多地放在敌人、武器和法术上，几乎察觉不到它只有一个关卡。总的来说，这为小型开发团队在合理时间内打造出休闲玩家喜爱的游戏类型提供了良好启发。\n\
  \n## 社交游戏\n\n你该不会以为我们会跳过社交游戏吧？在当今的现代科技领域，“社交”这个词可是最热门的话题（也是最赚钱的领域之一）。什么是社交游戏？就是你与朋友和熟人分享体验、通常在病毒式互动循环中相互交流的游戏。这种模式威力惊人，一旦运营得当，就能像滚雪球一样走向巨大的成功。\n\
  \nZynga 开发的《与朋友拼词》（`Words with Friends`，见图 3-10）为字母牌拼词这一成熟游戏类型加入了回合制玩法。这款游戏真正的创新之处在于集成了聊天功能和多局游戏同时进行。你可以同时进行多局游戏，从而免去了等待单一游戏回合的烦恼。约翰·梅尔（John\
  \ Mayer）在一篇知名评论中说道：“《与朋友拼词》应用就是新的推特。”这很好地概括了 Zynga 如何充分利用社交空间，并将其融入一款极易上手的游戏中。\n\
  \n![A340874_3_En_3_Fig10_HTML.jpg](img/A340874_3_En_3_Fig10_HTML.jpg)\n\n图 3-10.\
  \ Zynga 开发的《与朋友拼词》（`Words with Friends`）\n\nOMGPOP 开发的《你画我猜》（`Draw Something`，见图\
  \ 3-11）是一款玩家猜测他人一笔一划画作内容的游戏。它不仅有趣，而且其他玩家还会将自己的画作提交给朋友，由此产生了众包内容的奇妙效果。这款游戏乍一看像是个基础的手指绘画应用，但玩上几分钟，你就能立刻体会到它的精髓：你会迫不及待地当场提交自己的猜测，然后继续猜下一幅画，自己再画一幅，拉上朋友一起享受乐趣。\n\
  \n![A340874_3_En_3_Fig11_HTML.jpg](img/A340874_3_En_3_Fig11_HTML.jpg)\n\n图 3-11.\
  \ OMGPOP 开发的《你画我猜》（`Draw Something`）\n\n#### 超越类型\n\n许多新游戏、新创意、新类型和新应用起初看起来并不像游戏，但实际却是。因此，在进入\
  \ Google Play 时，很难精确界定什么才算真正的创新。我们见过这样的游戏：平板电脑充当游戏主机，连接到电视上，再通过蓝牙连接多部安卓手机，每部手机都作为控制器使用。休闲社交游戏已经风靡了相当长的时间，许多在苹果平台走红的游戏也已被移植到安卓平台。难道所有可能性都已经穷尽了吗？绝非如此！对于那些愿意在新游戏创意上承担风险的人来说，总会有尚未开发的市场和游戏点子。硬件性能越来越强大，这开辟了过去因\
  \ CPU 算力不足而无法实现的全新可能性领域。\n\n现在，既然你已经了解了安卓平台已有的游戏类型，我们建议你启动 Google Play 应用，试试上面提到的一些游戏。关注它们的结构（例如，哪些界面会跳转到哪些界面，每个按钮的功能是什么，游戏元素如何相互交互等）。要感受这些东西，实际上需要带着分析思维去玩游戏。暂时抛开娱乐因素，专注于解构游戏。完成之后，再回来继续阅读。我们将从纸面设计一个非常简单的游戏。\n\
  \n## 游戏设计：笔锋胜于代码\n\n正如我们之前所说，启动 IDE 随手拼凑一个漂亮的技术演示确实很有诱惑力。如果你想制作实验性游戏机制的原型并验证其可行性，这倒也无妨。但一旦完成，请扔掉这个原型。拿起笔和纸，坐在舒适的椅子上，仔细思考游戏的所有高层概念。暂时不要关注技术细节——那是之后要做的事。现在，你应该专注于设计游戏的用户体验。最好的方法就是勾勒出以下内容：\n\
  \n*   核心游戏机制，包括游戏关卡概念（如适用）\n*   包含主要角色的粗略背景故事\n*   物品、强化道具或其他可改变角色、机制或环境的元素清单（如适用）\n\
  *   基于背景故事和角色的美术风格草图\n*   所有涉及界面的草图、界面转换示意图以及触发转换的条件（例如游戏结束状态）\n\n如果你之前瞥过目录，就会知道我们将在安卓上实现《贪吃蛇》（Snake）。《贪吃蛇》是手机市场上最受欢迎的游戏之一。如果你还不了解它，请在继续阅读前先上网查查。我们在这里等你……\n\
  \n欢迎回来。既然你已经了解了《贪吃蛇》是什么，让我们假设这是我们自己刚刚想到的创意，并开始为其设计布局。先从游戏机制开始吧。\n\n\n\n### 核心游戏机制\n\
  \n开始之前，先列出我们需要的物品清单：\n\n- 一把剪刀\n- 书写工具\n- 大量纸张\n\n在这个游戏设计阶段，一切都在不断变化中。我们建议你别费力在`Paint`、`Gimp`或`Photoshop`中精心绘制精美图片，而是用纸张制作基础构件，在桌面上不断调整摆放位置，直到满意为止。这样你可以轻松进行物理层面的调整，无需受鼠标操作束缚。当纸质设计完成后，可以拍照或扫描存档备用。现在让我们开始创建核心游戏界面的基础构件。图\
  \ 3-12 展示了我们设计的核心游戏机制所需的版本。\n\n![A340874_3_En_3_Fig12_HTML.jpg](img/A340874_3_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12. 游戏设计构件\n\n最左侧的矩形是屏幕，尺寸大致相当于`Nexus One`屏幕。我们将在此放置所有其他元素。接下来的构件是两个方向箭头按钮，用于控制蛇的移动。最后是蛇头、几节尾部部件，以及可被蛇吃掉的食物。我们还剪裁了一些数字，用于显示得分。图\
  \ 3-13 展示了对初始游戏场的设想。\n\n![A340874_3_En_3_Fig13_HTML.jpg](img/A340874_3_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13. 初始游戏场\n\n现在定义游戏机制：\n\n- 蛇沿头部朝向方向前进，并拖拽尾部移动。头部和尾部由大小相同的部件组成，外观差异不大。\n-\
  \ 如果蛇超出屏幕边界，会从另一侧重新进入屏幕。\n- 按下右箭头或左箭头按钮时，蛇会顺时针（右）或逆时针（左）转向 90 度。\n- 如果蛇撞到自己（例如尾部某个部分），游戏结束。\n\
  - 如果蛇头撞到食物，食物消失，得分增加 10 分，同时在游戏场上未被蛇占据的位置生成新食物。蛇也会增加一节尾部，新尾部连接在蛇的末端。\n\n对于如此简单的游戏而言，这段描述相当复杂。注意我们按照难度递增的顺序排列了这些条目。其中蛇吃掉场上食物的行为机制可能是最复杂的。当然，更复杂的游戏无法用如此简洁的方式描述。通常你需要将这些机制拆分成独立部分，分别设计，最后在流程结束时整合连接。\n\
  \n最后一条游戏机制意味着：游戏终将结束，因为屏幕上的所有空间最终都会被蛇占据。\n\n既然我们独创的游戏机制看起来不错，现在来为它构思一个背景故事吧。\n\n\
  ### 故事与艺术风格\n\n虽然设计一个包含僵尸、飞船、矮人和大量爆炸场面的史诗故事会很有趣，但我们必须意识到资源有限。如图 3-12 所示，我们的绘画能力有所欠缺。就算性命攸关，我们也画不出僵尸。于是我们采取了任何自重独立游戏开发者都会做的选择：采用涂鸦风格，并相应调整设定。\n\
  \n欢迎来到诺姆先生的世界。诺姆先生是一条纸蛇，他总渴望吃掉从不明来源滴落在纸上的墨水渍。诺姆先生极其自私，只有一个并不崇高的目标：成为世界上最大的墨水纸蛇！\n\
  \n这个小背景故事让我们能定义更多内容：\n\n- 艺术风格是涂鸦风。我们后续会将纸质构件扫描进游戏，用作图形资源。\n- 由于诺姆先生是个特立独行的角色，我们会稍作修改，给他一副像样的蛇脸，再加一顶帽子。\n\
  - 可食用物将变成一组墨水渍。\n- 我们将让诺姆先生每次吃掉墨水渍时发出咕噜声，以此提升游戏的音频体验。\n- 与其用“涂鸦蛇”这样无聊的标题，不如将游戏命名为“诺姆先生”——一个更具吸引力的名字。\n\
  \n图 3-14 展示了诺姆先生的完整风采，以及替代原始方块的一组墨水渍。我们还草拟了一个涂鸦风格的诺姆先生 Logo，可在游戏中反复使用。\n\n![A340874_3_En_3_Fig14_HTML.jpg](img/A340874_3_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 诺姆先生、他的帽子、墨水渍及 Logo\n\n\n\n## 屏幕与切换\n\n在确定了游戏机制、背景故事、角色和美术风格后，我们现在可以开始设计游戏屏幕及其之间的切换。不过，首先需要准确理解屏幕的构成要素：\n\
  \n-   一个屏幕是填充整个显示区域的原子单元，它恰好负责游戏的一个部分（例如，主菜单、设置菜单或正在发生动作的游戏屏幕）。\n-   一个屏幕可由多个组件构成（例如，按钮、控件、抬头显示或游戏世界的渲染画面）。\n\
  -   一个屏幕允许用户与屏幕上的元素进行交互。这些交互可以触发屏幕切换（例如，在主菜单上按下“新游戏”按钮，当前激活的主菜单屏幕可被切换为游戏屏幕或关卡选择屏幕）。\n\
  \n基于这些定义，我们可以开动脑筋，为我们的《Nom 先生》游戏设计所有屏幕。\n\n游戏首先向玩家呈现的是主菜单屏幕。一个好的主菜单屏幕应具备哪些要素？\n\n\
  -   可能有些人不知道“贪吃蛇”游戏。让我们通过一个“帮助”按钮为他们提供一些帮助，该按钮将切换至帮助屏幕。\n-   虽然我们的音效设计会很棒，但有些玩家可能仍喜欢静音游戏。给他们一个象征性的开关按钮来启用和禁用声音即可解决问题。\n\
  -   原则上，显示游戏名称是个好主意，因此我们会放置《Nom 先生》的标识。\n-   为了使整体外观更协调，我们还需要一个背景。我们将复用游戏场地的背景。\n\
  -   玩家通常想要玩游戏，所以让我们添加一个“开始”按钮。\n-   这将是我们的第一个交互组件。\n-   玩家希望跟踪自己的进度和成就，因此我们还将添加一个高分按钮，如图\
  \ 3-15 所示，这是另一个交互组件。\n\n![A340874_3_En_3_Fig15_HTML.jpg](img/A340874_3_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15. 主菜单屏幕\n\n我们如何实际布局这些屏幕组件取决于个人品味。你可以开始研究计算机科学的一个子领域——人机交互（HCI），以获取关于如何向用户呈现应用程序的最新科学观点。不过，对于《Nom\
  \ 先生》来说，这或许有些大材小用了。我们最终采用了图 3-15 所示的简洁设计。\n\n请注意，所有这些元素（标识、菜单按钮等）都是独立的图片。\n\n从主菜单屏幕开始，我们立即获得一个优势：可以直接从交互组件派生出更多屏幕。就《Nom\
  \ 先生》而言，我们将需要一个游戏屏幕、一个高分屏幕和一个帮助屏幕。由于唯一的设置选项（声音）已经出现在主菜单屏幕上，因此无需包含单独的设置屏幕。\n\n我们先暂不考虑游戏屏幕，集中精力设计高分屏幕。我们决定高分记录将本地存储在《Nom\
  \ 先生》中，因此我们只追踪单个玩家的成就。我们还决定只记录最高分的前五名。因此，高分屏幕将如图 3-16 所示：顶部显示 `\"HIGHSCORES\"` 文本，接着是五个最高分，以及一个带有箭头标记的按钮，表示可以切换回某处。我们将再次复用游戏场地的背景，因为我们喜欢这种经济实惠的做法。\n\
  \n![A340874_3_En_3_Fig16_HTML.jpg](img/A340874_3_En_3_Fig16_HTML.jpg)\n\n图 3-16.\
  \ 高分屏幕\n\n接下来是帮助屏幕。它将向玩家介绍背景故事和游戏机制。这些信息量太大，无法在一个屏幕上呈现。因此，我们将帮助屏幕拆分成多个屏幕。每个屏幕将向用户传达一条关键信息：Nom\
  \ 先生是谁、他想要什么，如何控制 Nom 先生使他吃掉墨渍，以及 Nom 先生不喜欢什么（即吃掉自己）。总共是三个帮助屏幕，如图 3-17 所示。请注意，我们在每个屏幕上添加了一个按钮，以提示还有更多信息可阅读。稍后我们会将这些屏幕串联起来。\n\
  \n![A340874_3_En_3_Fig17_HTML.jpg](img/A340874_3_En_3_Fig17_HTML.jpg)\n\n图 3-17.\
  \ 帮助屏幕\n\n最后是我们的游戏屏幕，我们之前已经看到它的运行情况。不过，还有一些细节我们未曾提及。首先，游戏不应立即开始；我们应该给玩家一些时间做准备。因此，屏幕会以请求触摸屏幕开始吞噬的提示开始。这不需要一个单独的屏幕；我们将直接在游戏屏幕中实现这个初始暂停。\n\
  \n说到暂停，我们还将添加一个按钮，允许用户暂停游戏。一旦暂停，我们还需要给用户一个恢复游戏的方式。在这种情况下，我们只需显示一个大的“继续”按钮。在暂停状态下，我们还将显示另一个按钮，允许用户返回主菜单屏幕。另外再添加一个“退出”按钮，让用户返回主菜单。\n\
  \n如果 Nom 先生咬到了自己的尾巴，我们需要通知玩家游戏结束。我们可以实现一个单独的游戏结束屏幕，或者停留在游戏屏幕内，仅覆盖显示一个大的“游戏结束”消息。在这里，我们选择后者。最后，我们还将显示玩家获得的分数，以及一个返回主菜单的按钮。\n\
  \n将游戏屏幕的这些不同状态视为子屏幕。我们共有四个子屏幕：初始的准备就绪状态、正常的游戏进行状态、暂停状态和游戏结束状态。图 3-18 展示了这些子屏幕。\n\
  \n![A340874_3_En_3_Fig18_HTML.jpg](img/A340874_3_En_3_Fig18_HTML.jpg)\n\n图 3-18.\
  \ 游戏屏幕及其四种不同状态\n\n现在是将这些屏幕串联起来的时候了。每个屏幕都有一些交互组件，用于切换到另一个屏幕。\n\n-   从主菜单屏幕，我们可以通过各自的按钮进入游戏屏幕、高分屏幕和帮助屏幕。\n\
  -   从游戏屏幕，我们可以通过暂停状态下的按钮或游戏结束状态下的按钮返回主菜单屏幕。\n-   从高分屏幕，我们可以返回主菜单屏幕。\n-   从第一个帮助屏幕，我们可以进入第二个帮助屏幕；从第二个到第三个；从第三个到第四个；从第四个，我们将返回主菜单屏幕。\n\
  \n这就是我们所有的切换！看起来没那么复杂，对吧？图 3-19 以可视化方式总结了所有切换，箭头从每个交互组件指向目标屏幕。我们还标注了构成我们屏幕的所有元素。\n\
  \n![A340874_3_En_3_Fig19_HTML.jpg](img/A340874_3_En_3_Fig19_HTML.jpg)\n\n图 3-19.\
  \ 所有设计元素与切换\n\n我们现在已经完成了第一个完整的游戏设计。剩下的事情就是实现了。我们究竟如何将这个设计变成一个可执行的游戏呢？\n\n> **注：**\
  \ 我们刚刚用来创建游戏设计的方法对于小型游戏来说非常不错。这本书名为《Android 游戏开发入门》，所以这是一种合适的方法。对于较大的项目，你很可能会在团队中工作，每个团队成员专攻一个方面。虽然在该情境下你仍然可以应用此处描述的方法，但可能需要根据不同的环境进行一些调整和优化。你还会以更迭代的方式工作，不断精炼你的设计。\n\
  \n\n\n## 代码：核心细节\n\n这又是一个鸡生蛋蛋生鸡的问题：我们只想了解与游戏编程相关的 Android API，但还不知如何实际编写游戏程序。虽然我们有了游戏设计思路，但将其转化为可执行程序仍如同巫术般神秘。在接下来的章节中，我们将概述构成游戏的基本元素。我们会查看一些伪代码形式的接口，后续将使用\
  \ Android 提供的功能来实现这些接口。接口之所以强大有两个原因：它们让我们无需了解实现细节就能专注于语义，同时也允许我们日后更换实现方式（例如，我们可以用\
  \ OpenGL ES 代替 2D CPU 渲染来显示\"诺姆先生\"）。\n\n每个游戏都需要一个基础框架，用于抽象化并简化与底层操作系统的通信。这通常分为以下几个模块：\n\
  \n*   **应用程序与窗口管理**：负责创建窗口，并处理窗口关闭、Android 应用暂停/恢复等事务。\n*   **输入**：与窗口管理模块相关，负责追踪用户输入（即触摸事件、按键、外设和加速计读数）。\n\
  *   **文件 I/O**：允许我们从磁盘将资源文件的字节数据读入程序。\n*   **图形**：这可能是除游戏本体外最复杂的模块。负责加载图形并绘制到屏幕上。\n\
  *   **音频**：负责加载和播放所有音频内容。\n*   **游戏框架**：将上述所有模块整合在一起，为编写游戏提供一个易用的基础。\n\n每个模块都由一个或多个接口组成。每个接口至少有一个具体实现，该实现基于底层平台（此处为\
  \ Android）提供的功能来应用接口的语义。\n\n> **注意**  \n> 是的，我们从上述列表中刻意省略了网络功能。本书不会实现多人游戏。根据游戏类型的不同，这属于较为高级的话题。如果你对此感兴趣，可以在网络上使用\
  \ Google Play 游戏服务找到一系列教程。（[`www.gamedev.net`](http://www.gamedev.net) 是一个不错的起点。）\n\
  \n在接下来的讨论中，我们将尽可能保持平台无关性。这些概念在所有平台上都是相通的。\n\n## 应用程序与窗口管理\n\n游戏就像任何其他具有用户界面的计算机程序一样。它包含在某种窗口中（如果底层操作系统的\
  \ UI 范式是基于窗口的，而所有主流操作系统都是如此）。窗口充当容器，我们基本上将其视为绘制游戏内容的画布。\n\n大多数操作系统允许用户以特殊方式与窗口交互，而不仅仅是触摸客户区域或按键。在桌面系统上，通常可以拖动窗口、调整大小或将其最小化到任务栏。在\
  \ Android 中，调整大小被适应方向变化所取代，而最小化类似于通过按下主页按钮将应用程序置于后台，或作为来电的反应。\n\n应用程序与窗口管理模块还负责实际设置窗口，并确保窗口由一个\
  \ UI 组件填充——我们后续可以渲染到该组件，并接收用户通过触摸或按键形式提供的输入。该 UI 组件可能通过 CPU 渲染，也可能是硬件加速的（如 OpenGL\
  \ ES 的情况）。\n\n应用程序与窗口管理模块没有一套具体的接口。我们稍后会将其与游戏框架合并。我们需要记住的是必须管理的应用程序状态和窗口事件：\n\n\
  *   **创建**：在窗口（因此也是应用程序）启动时调用一次。\n*   **暂停**：当应用程序因某种机制而被暂停时调用。\n*   **恢复**：当应用程序恢复且窗口再次位于前台时调用。\n\
  \n> **注意**  \n> 此时一些 Android 发烧友可能会不以为然。为什么只使用一个窗口（Android 中的 activity）？为什么不为游戏使用多个\
  \ UI 控件——比如实现游戏可能需要的复杂 UI？主要原因是我们希望完全控制游戏的外观和感觉。这也让我们能专注于 Android 游戏编程，而非 Android\
  \ UI 编程——关于后者已有更出色的书籍（例如，Mark Murphy 的优秀著作《Beginning Android 3》，Apress 出版社，2011\
  \ 年）。\n\n\n\n### 输入\n\n用户无疑会希望以某种方式与我们的游戏进行交互。这正是输入模块发挥作用的地方。在大多数操作系统上，触摸屏幕或按下按键等输入事件会被分发给当前获得焦点的窗口。然后，窗口会进一步将事件分发给拥有焦点的\
  \ UI 组件。这个分发过程通常对我们来说是透明的；我们唯一关心的是从获得焦点的 UI 组件获取事件。操作系统的 UI API 提供了一种机制，可以让我们接入事件分发系统，从而轻松地注册和记录事件。这种事件的钩取和记录就是输入模块的主要任务。\n\
  \n我们能用记录下来的信息做什么呢？有两种操作模式：\n\n*   **轮询（Polling）**：采用轮询方式时，我们只检查输入设备的当前状态。上次检查与本次检查之间的任何状态都会丢失。这种输入处理方式适用于检查诸如用户是否触摸了某个特定按钮等情况。它不适合追踪文本输入，因为按键事件的顺序会丢失。\n\
  *   **基于事件的处理（Event-based handling）**：这种方式提供了自上次检查以来发生的所有事件的完整时间顺序历史记录。它非常适合执行文本输入或任何其他依赖事件顺序的任务。它对于检测手指何时首次触摸屏幕或何时抬起手指也很有用。\n\
  \n我们需要处理哪些输入设备呢？在 Android 上，我们有三种主要的输入方式：触摸屏、键盘/轨迹球和加速度计。前两种方式既适用于轮询，也适用于基于事件的处理。加速度计通常仅用于轮询。\n\
  \n触摸屏可以产生三种事件：\n\n*   **触摸按下（Touch down）**：当手指触摸到屏幕时发生。\n*   **触摸拖动（Touch drag）**：当手指在屏幕上拖动时发生。在拖动之前，总会有一个按下事件。\n\
  *   **触摸抬起（Touch up）**：当手指从屏幕抬起时发生。\n\n每个触摸事件都带有附加信息：相对于 UI 组件原点的位置，以及用于在多指触摸环境中识别和追踪不同手指的指针索引。\n\
  \n键盘可以产生两种类型的事件：\n\n*   **按键按下（Key down）**：当按下某个键时发生。\n*   **按键抬起（Key up）**：当抬起某个键时发生。此事件之前总是有一个按键按下事件。\n\
  \n按键事件也携带附加信息。按键按下事件存储被按下键的**键码**。按键抬起事件存储键的键码和一个实际的 Unicode 字符。键的键码与按键抬起事件生成的 Unicode\
  \ 字符之间存在区别。对于后者，还会考虑其他键的状态，例如 Shift 键。这样，我们就能在按键抬起事件中获得大写和小写字母。而通过按键按下事件，我们只知道某个键被按下了；我们无法得知这次按键实际会产生哪个字符。\n\
  \n寻求使用自定义 USB 硬件的开发者，包括操纵杆、模拟控制器、特殊键盘、触摸板或其他 Android 支持的外设，可以通过使用 `android.hardware.usb`\
  \ 包中的 API 来实现。该 API 在 API 级别 12（Android 3.1）中引入，并通过 `com.android.future.usb` 包回溯移植到了\
  \ Android 2.3.4。USB API 使 Android 设备能够在主机模式或配件模式下运行。主机模式允许外设连接到 Android 设备并被其使用；配件模式则允许该设备作为另一个\
  \ USB 主机的配件。这些 API 并不完全是初学者的内容，因为设备访问处于非常低的层级，仅提供到 USB 配件的数据流 I/O，但重要的是要知道该功能确实存在。如果你的游戏设计围绕某个特定的\
  \ USB 配件展开，你肯定会希望为该配件开发一个通信模块并使用其进行原型开发。\n\n最后，还有加速度计。重要的是要理解，尽管几乎所有手机和平板电脑都将加速度计作为标准硬件，但许多新设备，包括机顶盒，可能没有加速度计，所以始终要规划多种输入模式！\n\
  \n要使用加速度计，我们总是轮询加速度计的状态。加速度计报告的是我们星球的重力作用于加速度计三个轴之一的加速度。这些轴被称为 `x`、`y` 和 `z`。图 3-20\
  \ 描绘了每个轴的方向。每个轴上的加速度以米每平方秒（m/s²）表示。从物理课上我们知道，一个物体在地球上自由落体时，加速度约为 9.8 m/s²。其他行星的重力不同，所以加速度常数也不同。为简单起见，我们这里只讨论地球。当一个轴指向远离地心的方向时，它会受到最大的正加速度。如果一个轴指向地心方向，我们得到的是最大的负加速度。例如，如果你将手机垂直竖屏拿着，那么\
  \ `y` 轴会报告 9.8 m/s²的加速度。在图 3-20 中，`z` 轴会报告 9.8 m/s²的加速度，而 `x` 和 `y` 轴会报告加速度为零。\n\
  \n![A340874_3_En_3_Fig20_HTML.jpg](img/A340874_3_En_3_Fig20_HTML.jpg)\n\n图 3-20.\
  \ Android 手机上的加速度计轴。`z` 轴指向手机外部\n\n现在，让我们定义一个接口，该接口为我们提供对触摸屏、键盘和加速度计的轮询访问，同时也为我们提供对触摸屏和键盘的基于事件的访问（见代码清单\
  \ 3-1）。\n\n```\npackage com.badlogic.androidgames.framework;\nimport java.util.List;\n\
  public interface Input {\n    public class KeyEvent {\n        public static final\
  \ int KEY_DOWN = 0;\n        public static final int KEY_UP = 1;\n        public\
  \ int type;\n        public int keyCode;\n        public char keyChar;\n    }\n\
  \    public static class TouchEvent {\n        public static final int TOUCH_DOWN\
  \ = 0;\n        public static final int TOUCH_UP = 1;\n        public static final\
  \ int TOUCH_DRAGGED = 2;\n        public int type;\n        public int x, y;\n \
  \       public int pointer;\n    }\n    public boolean isKeyPressed(int keyCode);\n\
  \    public boolean isTouchDown(int pointer);\n    public int getTouchX(int pointer);\n\
  \    public int getTouchY(int pointer);\n    public float getAccelX();\n    public\
  \ float getAccelY();\n    public float getAccelZ();\n    public List getKeyEvents();\n\
  \    public List getTouchEvents();\n}\n```\n\n**代码清单 3-1.** 输入接口以及 `KeyEvent` 和\
  \ `TouchEvent` 类\n\n我们的定义从两个类开始：`KeyEvent` 和 `TouchEvent`。`KeyEvent` 类定义了编码 `KeyEvent`\
  \ 类型的常量；`TouchEvent` 类也是如此。一个 `KeyEvent` 实例记录其类型、键的键码，并且如果事件的类型是 `KEY_UP`，还会记录其\
  \ Unicode 字符。\n\n`TouchEvent` 代码类似，它包含 `TouchEvent` 的类型、手指相对于 UI 组件原点的位置，以及触摸屏驱动程序分配给该手指的指针\
  \ ID。只要手指还在屏幕上，该手指的指针 ID 就会保持不变。如果两个手指都按下，然后手指 0 抬起，那么只要手指 1 还在触摸屏幕，它就会保留其 ID。一个新的手指将会获得第一个空闲的\
  \ ID，在本例中就是 0。指针 ID 通常是顺序分配的，但不能保证总是如此。例如，索尼 Xperia Play 使用 15 个 ID，并以轮询方式将它们分配给触摸。在代码中永远不要对新指针的\
  \ ID 做任何假设——你只能通过索引读取指针的 ID，并在该指针抬起之前引用它。\n\n\n\n接下来是输入接口的轮询方法，这些方法不言自明。`Input.isKeyPressed()`\
  \ 接收一个 `keyCode` 参数，返回对应按键当前是否被按下。`Input.isTouchDown()`、`Input.getTouchX()` 和 `Input.getTouchY()`\
  \ 返回指定触摸点是否被按下，以及其当前的 x 和 y 坐标。请注意，如果对应触摸点并未实际接触屏幕，这些坐标将是未定义的。\n\n`Input.getAccelX()`、`Input.getAccelY()`\
  \ 和 `Input.getAccelZ()` 分别返回每个加速度计轴的加速度值。\n\n最后两个方法用于基于事件的处理。它们返回自上次调用这些方法以来记录的\
  \ `KeyEvent` 和 `TouchEvent` 实例。事件根据发生时间排序，最新的事件位于列表末尾。通过这个简单的接口和这些辅助类，我们涵盖所有输入需求。接下来让我们处理文件操作。\n\
  \n> **注意**  \n> 虽然具有公共成员的可变类是一种糟粕，但在本例中我们可以容忍它们，原因有二：Dalvik 调用方法（本例中的 getter）时仍然较慢；并且事件类的可变性不会影响\
  \ `Input` 实现的内部逻辑。请记住，这通常是不良风格，但出于性能原因，我们会时不时代入这种捷径。\n\n## 文件 I/O\n\n对于我们的游戏开发工作而言，读写文件相当重要。由于我们身处\
  \ Java 领域，主要关心的是创建 `InputStream` 和 `OutputStream` 实例，这是从特定文件读写数据的标准 Java 机制。在我们的场景中，主要关心读取随游戏打包的文件，例如关卡文件、图片和音频文件。写入文件的操作则少得多。通常，只有在需要维护高分记录或游戏设置，或保存游戏状态以便用户从中断处继续时，我们才会写入文件。\n\
  \n我们希望使用最简单的文件访问机制。代码清单 3-2 展示了我们提出的简洁接口。\n\n```\npackage com.badlogic.androidgames.framework;\n\
  import java.io.IOException; import java.io.InputStream; import java.io.OutputStream;\n\
  public interface FileIO {\n    InputStream readAsset(String fileName) throws IOException;\n\
  \    InputStream readFile(String fileName) throws IOException;\n    OutputStream\
  \ writeFile(String fileName) throws IOException;\n}\n```\n\n这相当精简实用。我们只需指定文件名即可获得一个流。与\
  \ Java 惯例一致，如果出现错误，我们会抛出 `IOException`。读写文件的具体位置当然取决于实现。资源将从应用的 APK 文件中读取，而常规文件将从\
  \ SD 卡（也称为外部存储）中读写。\n\n返回的 `InputStream` 和 `OutputStream` 是标准的 Java 流。当然，使用完毕后需要关闭它们。\n\
  \n## 音频\n\n虽然音频编程是一个相当复杂的主题，但我们可以通过非常简单的抽象来应付。我们不会进行任何高级音频处理；仅仅播放从文件加载的音效和音乐，这与图形模块中加载位图的方式类似。\n\
  \n在深入探讨模块接口之前，让我们先暂停一下，了解声音的实际本质及其数字表示方式。\n\n### 声音的物理学原理\n\n声音通常被建模为在空气或水等介质中传播的一组波。波并不是实际的物理物体，而是介质内分子的运动。想象一下，你向一个小池塘扔一块石头。当石头撞击池塘表面时，它会推开池塘中大量的水分子，这些被推开的分子会将其能量传递给邻居，邻居们也会开始移动和推动。最终，你会看到圆形波纹从石头落点处扩散开来。\n\
  \n声音产生时也会发生类似的事情。不过，你得到的是球形运动，而非圆形运动。正如你小时候可能进行过的高度科学实验所知，水波可以相互作用；它们可以相互抵消或相互增强。声波也是如此。环境中所有的声波结合起来，形成了你听音乐时听到的音调和旋律。声音的响度取决于移动和推动的分子对其邻居最终对你的耳朵施加了多少能量。\n\
  \n\n\n#### 录音与回放\n\n音频录制与回放的原理在理论上其实相当简单。录音时，我们记录的是构成声波的分子在空间中对某个区域施加特定压力的时间点。而回放这些数据，只需让扬声器周围的空气分子像我们录音时那样摆动和运动即可。\n\
  \n在实践中，这当然要稍微复杂一些。音频通常以两种方式之一录制：模拟方式或数字方式。在这两种情况下，声波都是通过某种麦克风记录的，麦克风通常由一个振膜组成，该振膜将分子的推动转化为某种信号。这种信号的处理和存储方式，是模拟录音与数字录音之间的区别所在。我们采用数字方式工作，因此让我们来看看这种情况。\n\
  \n以数字方式录制音频意味着，在离散的时间步长上测量并存储麦克风振膜的状态。根据周围分子的推动程度，振膜可以相对于中性状态向内或向外被推动。这个过程被称为采样，因为我们是在离散的时间点上采集振膜状态的样本。每单位时间采集的样本数量称为采样率。通常时间单位是秒，该单位称为赫兹（`Hz`）。每秒采样的数量越多，音频的质量就越高。CD\
  \ 的回放采样率为 `44,100Hz`，即 `44.1KHz`。例如，在电话线上传输语音时，会发现较低的采样率（这种情况下通常为 `8KHz`）。\n\n采样率只是决定录音质量的一个属性。我们存储每个振膜状态样本的方式也起着作用，并且这种方式同样需要数字化。让我们回想一下振膜状态究竟是什么：它是振膜距离其中性状态的距离。由于振膜是被向内推还是向外推会产生差异，我们记录的是带符号的距离。因此，在特定时间步长上的振膜状态是一个负值或正值的数。我们可以通过多种方式存储这个带符号的数：作为有符号的\
  \ 8 位、16 位或 32 位整数，作为 32 位浮点数，甚至作为 64 位浮点数。每种数据类型都有有限的精度。一个 8 位有符号整数可以存储 127 个正距离值和\
  \ 128 个负距离值。\n\n32 位整数则提供了更高的分辨率。当存储为浮点数时，振膜状态通常被归一化到 `-1` 到 `1` 的范围内。最大正值和最小负值代表了振膜距离其中心状态的最远距离。振膜状态也称为振幅。它代表了撞击它的声音的响度。使用单个麦克风，我们只能录制单声道声音，这会丢失所有空间信息。使用两个麦克风，我们可以在空间中的不同位置测量声音，从而获得所谓的立体声。例如，你可以通过将一只麦克风放置在发声物体的左侧，另一只放置在右侧来实现立体声。当声音通过两个扬声器同时回放时，我们可以合理地再现音频的空间成分。但这同时也意味着，在存储立体声音频时，我们需要存储两倍的样本数量。\n\
  \n最后，回放是一件简单的事情。一旦我们以数字形式、特定的采样率和数据类型获得了音频样本，我们就可以将这些数据发送给音频处理单元，该单元会将信息转换为连接扬声器的信号。扬声器解释这个信号，并将其转换为振膜的振动，进而引起周围空气分子的运动并产生声波。这与录音时所做的完全相同，只是方向相反！\n\
  \n#### 音频质量与压缩\n\n哇，好多理论。我们为什么关心这个？如果你注意到了，你现在就可以根据采样率和用于存储每个样本的数据类型来判断一个音频文件的质量是高是低。采样率越高，数据类型的精度越高，音频的质量就越好。然而，这也意味着我们需要更多的存储空间来存放音频信号。\n\
  \n想象一下，我们录制同一段长度为 60 秒的声音，但录制两次：一次采用 `8KHz` 的采样率，每个样本 8 位；另一次采用 `44KHz` 的采样率，16\
  \ 位精度。存储每段声音需要多少内存？在第一种情况下，每个样本需要 1 个字节。将此乘以 `8,000Hz` 的采样率，我们每秒需要 `8,000` 字节。对于我们\
  \ 60 秒的完整录音，那就是 `480,000` 字节，大约半兆字节（`MB`）。我们质量更高的录音则需要多得多的内存：每个样本需要 2 个字节，每秒需要 2\
  \ 乘以 `44,000` 字节。也就是每秒 `88,000` 字节。再乘以 60 秒，我们得到 `5,280,000` 字节，即略高于 `5MB`。一首普通的三分钟流行歌曲，以这种质量将占用超过\
  \ `15MB` 的空间，而这还仅仅是单声道录音。对于立体声录音，你需要两倍大小的内存。为了区区一首歌，这字节量可真不少！\n\n许多聪明人想出了减少音频录制所需字节数的方法。他们发明了相当复杂的心理声学压缩算法，这些算法分析未压缩的音频录制，并输出一个更小的压缩版本。这种压缩通常是有损的，意味着原始音频中一些微小的部分会被省略。当你回放\
  \ `MP3` 或 `OGG` 时，实际上听到的是经过压缩的有损音频。因此，使用诸如 `MP3` 或 `OGG` 之类的格式，将有助于减少在磁盘上存储音频所需的空间。\n\
  \n那么，如何从压缩文件中回放音频呢？尽管存在针对各种压缩音频格式的专用解码硬件，但常见的音频硬件通常只能处理未压缩的样本。在实际将样本馈送给声卡之前，我们必须先读取并解压缩它们。我们可以一次性完成此操作，并将所有未压缩的音频样本存储在内存中，或者根据需求仅从音频文件中流式读取部分数据。\n\
  \n\n##### 实践应用\n\n你已经看到，即使是三分钟的歌曲也会占用大量内存。因此，在播放游戏音乐时，我们将实时流式传输音频样本，而不是将所有音频样本预加载到内存中。通常，我们只有一个音乐流在播放，所以只需访问磁盘一次。\n\
  \n对于短促的音效，例如爆炸声或枪声，情况则略有不同。我们经常需要同时多次播放同一个音效。为每个音效实例从磁盘流式传输音频样本并非良策。不过，幸运的是，短促的声音不会占用太多内存。因此，我们会将一个音效的所有样本读取到内存中，这样就能直接从内存中同时播放它们。\n\
  \n我们有以下需求：\n\n*   需要一种方式来加载音频文件，以支持流式播放和从内存中播放。\n*   需要一种方式来控制流式音频的播放。\n*   需要一种方式来控制完全加载的音频的播放。\n\
  \n这些需求直接转化为了音频（Audio）、音乐（Music）和音效（Sound）接口（分别见代码清单 3-3 至 3-5）。\n\n```\npackage\
  \ com.badlogic.androidgames.framework;\npublic interface Audio {\n    Music newMusic(String\
  \ filename);\n    Sound newSound(String filename);\n}\n```\n\n音频接口是我们创建新的音乐和音效实例的方式。音乐实例代表一个流式音频文件。音效实例代表一个完全保存在内存中的短促音效。`Audio.newMusic()`\
  \ 和 `Audio.newSound()` 方法都接受一个文件名作为参数。这些文件名指向我们应用 APK 文件中的资源文件。\n\n```\npackage\
  \ com.badlogic.androidgames.framework;\npublic interface Music {\n    public void\
  \ play();\n    public void stop();\n    public void pause();\n    void setLooping(boolean\
  \ looping);\n    void setVolume(float volume);\n    public boolean isPlaying();\n\
  \    public boolean isStopped();\n    public boolean isLooping();\n    public void\
  \ dispose();\n}\n```\n\n音乐接口稍微复杂一些。它提供了启动音乐流播放、暂停和停止播放、以及设置循环播放的方法（循环播放意味着当音频文件播放到末尾时会自动从头开始）。此外，我们可以将音量设置为一个\
  \ 0（静音）到 1（最大音量）之间的浮点数。还有一些 getter 方法，允许我们查询音乐实例的当前状态。\n\n一旦不再需要音乐实例，我们必须释放它。这将关闭所有系统资源，例如用于流式播放音频的文件。\n\
  \n```\npackage com.badlogic.androidgames.framework;\npublic interface Sound {\n\
  \    void play(float volume);\n    ...\n    void dispose();\n}\n```\n\n音效接口则更简单。我们只需调用它的\
  \ `play()` 方法，该方法同样接受一个浮点参数来指定音量。我们可以随时调用 `play()` 方法（例如，当小诺姆先生吃到墨点时）。一旦不再需要音效实例，我们必须释放它，以释放其样本占用的内存以及其他可能关联的系统资源。\n\
  \n**注**  \n虽然本章内容已相当丰富，但关于音频编程还有很多值得学习的地方。为了让本节内容简洁明了，我们简化了一些内容。例如，通常你不会线性地指定音频音量。在我们的上下文中，忽略这个小细节是可以接受的。但请记住，音频领域远不止于此！\n\
  \n### 图形\n\n我们游戏框架核心的最后一个模块是图形模块。你可能已经猜到，它将负责在屏幕上绘制图像（也称为位图）。这听起来简单，但如果想要高性能的图形，你至少需要了解图形编程的基础知识。让我们从\
  \ 2D 图形的基础开始。\n\n我们需要问的第一个问题是：图像究竟是如何输出到我的显示器上的？答案相当复杂，而我们并不需要了解所有细节。我们只需快速回顾一下计算机和显示器内部发生的事情。\n\
  \n\n#### 关于光栅、像素和帧缓冲区\n\n如今的显示器都是基于光栅的。光栅是一个由所谓图像元素组成的二维网格。你可能知道它们叫像素，下文我们也将这样称呼。光栅网格有有限的宽度和高度，我们通常用每行和每列的像素数来表示。如果你胆子够大，可以打开电脑，尝试分辨显示器上的单个像素。不过，我们不对因此对眼睛造成的任何损伤负责。\n\
  \n一个像素有两个属性：网格中的位置和颜色。像素的位置由离散坐标系中的二维坐标给出。离散意味着坐标始终是整数位置。坐标是在施加于网格的欧几里得坐标系中定义的。坐标系的原点是网格的左上角。x\
  \ 轴正方向指向右，y 轴正方向指向下。最后一点是最让人困惑的。我们稍后会解释；这有一个简单的原因。\n\n忽略奇怪的 y 轴，我们可以看到，由于坐标的离散性质，原点与网格左上角的像素重合，该像素位于\
  \ `(0,0)`。原点像素右侧的像素位于 `(1,0)`，原点像素下方的像素位于 `(0,1)`，以此类推（见图 3-21 左侧）。显示器的光栅网格是有限的，因此有意义的坐标数量有限。负坐标位于屏幕之外。大于或等于光栅宽度或高度的坐标也位于屏幕之外。请注意，最大的\
  \ x 坐标是光栅宽度减 1，最大的 y 坐标是光栅高度减 1。这是因为原点与左上角像素重合。差一错误是图形编程中常见的挫败感来源。\n\n![A340874_3_En_3_Fig21_HTML.jpg](img/A340874_3_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21. 显示器光栅网格和显存（极度简化）\n\n显示器会从图形处理器接收持续不断的信息流。它根据控制屏幕绘制的程序或操作系统的指定，对显示器光栅中每个像素的颜色进行编码。显示器每秒会刷新其状态几十次。确切的频率称为刷新率，以赫兹为单位。液晶显示器通常有\
  \ 60 赫兹的刷新率；阴极射线管显示器和等离子显示器通常有更高的刷新率。\n\n图形处理器可以访问一个称为视频随机存取存储器（显存）的特殊内存区域。在显存中，有一个保留区域用于存储要在屏幕上显示的每个像素。这个区域通常被称为帧缓冲区。因此，一整个屏幕图像被称为一帧。对于显示器光栅网格中的每个像素，帧缓冲区中都有一个对应的内存地址来保存该像素的颜色。当我们要更改屏幕上显示的内容时，只需更改显存中该内存区域的像素颜色值即可。\n\
  \n现在，是时候解释为什么显示器坐标系中的 y 轴指向下方了。内存，无论是显存还是普通内存，都是线性和一维的。可以把它想象成一个一维数组。那么，我们如何将二维像素坐标映射到一维内存地址呢？图\
  \ 3-21 展示了一个非常小的 3×2 像素的显示器光栅网格，以及它在显存中的表示。（我们假设显存仅由帧缓冲区内存组成。）由此，我们可以轻松推导出以下公式，用于计算位于\
  \ `(x,y)` 处像素的内存地址：\n\n```\nint address = x + y * rasterWidth;\n```\n\n我们也可以反过来，从地址得到像素的\
  \ x 和 y 坐标：\n\n```\nint x = address % rasterWidth;\nint y = address / rasterWidth;\n\
  ```\n\n因此，y 轴之所以指向下方，是因为显存中像素颜色的内存布局。这实际上是计算机图形学早期遗留下来的一种传统。显示器会更新屏幕上每个像素的颜色，从左上角开始，向右移动，然后在下一行折返到左边，直到到达屏幕底部。将显存内容以方便将颜色信息传输到显示器的方式进行布局，在过去是很方便的。\n\
  \n**注意：**\n\n如果我们能完全访问帧缓冲区，就可以使用前面的公式编写一个完整的图形库，来绘制像素、线条、矩形、加载到内存中的图像等等。出于各种原因，现代操作系统不允许我们直接访问帧缓冲区。相反，我们通常绘制到一个内存区域，然后由操作系统将其复制到实际的帧缓冲区。不过，总体概念在这种情况下仍然适用！如果你对如何高效地完成这些底层操作感兴趣，可以在网上搜索一个叫\
  \ Bresenham 的人，以及他的直线和圆绘制算法。\n\n\n\n#### 垂直同步与双缓冲\n\n现在，如果你还记得关于刷新率的段落，你可能会注意到这些刷新率似乎相当低，并且我们向帧缓冲写入数据的速度可能比显示器刷新速度更快。这种情况确实会发生。更糟糕的是，我们并不知道显示器何时从显存中抓取最新的帧副本，如果我们正在绘制某些东西的过程中，这就会产生问题。在这种情况下，显示器会同时显示旧帧缓冲的部分内容和当前状态的部分内容，这是一种不理想的情况。你可以在许多电脑游戏中看到这种效果，它表现为画面撕裂（即屏幕上同时显示上一帧的部分内容和当前帧的部分内容）。\n\
  \n解决这个问题的第一部分方案叫做双缓冲。图形处理单元（GPU）并非只管理一个帧缓冲，而是实际管理两个：一个前缓冲和一个后缓冲。前缓冲用于提供像素颜色，可供显示器读取；后缓冲则用于绘制我们的下一帧画面，而显示器可以愉快地从前缓冲读取内容。当我们完成当前帧的绘制后，就告诉\
  \ GPU 交换这两个缓冲，这通常意味着只需交换前缓冲和后缓冲的地址。在图形编程文献和 API 文档中，你可能会找到“翻页”和“缓冲交换”这两个术语，它们指的就是这个过程。\n\
  \n然而，仅靠双缓冲并不能完全解决问题：在屏幕刷新其内容的过程中，交换操作仍然可能发生。这时，垂直同步（也称为垂直同步）就派上了用场。当我们调用缓冲交换方法时，GPU\
  \ 会阻塞，直到显示器发出信号，表明它已完成当前刷新。当这个信号发出时，GPU 就可以安全地交换缓冲地址，一切就都正常了。\n\n幸运的是，如今我们几乎不需要关心这些烦人的细节。显存、双缓冲和垂直同步的具体细节都被很好地隐藏起来，使我们无法对其进行破坏。相反，我们得到了一组\
  \ API，这些 API 通常限制我们只能操作应用程序窗口的内容。其中一些 API，例如 OpenGL ES，提供了硬件加速功能，它基本上不过是利用图形芯片上的专用电路来操作显存。看到了吧，这并不是魔法！你应该了解这些内部工作原理（至少是高级概念）的原因是，这能帮助你理解应用程序的性能特性。当垂直同步启用时，你的帧率永远无法超过屏幕的刷新率，如果你只是在绘制单个像素，这可能会让你感到困惑。\n\
  \n当我们使用非硬件加速的 API 进行渲染时，我们不直接与显示器本身打交道。相反，我们绘制到窗口的某个 UI 组件。在我们的场景中，我们处理的是一个覆盖整个窗口的单一\
  \ UI 组件。因此，我们的坐标系不会覆盖整个屏幕，而只覆盖我们的这个 UI 组件。该 UI 组件实际上变成了我们自己的“显示器”，拥有它自己的虚拟帧缓冲。操作系统将负责合成所有可见窗口的内容，并确保这些内容被正确地传输到它们在真实帧缓冲中覆盖的区域。\n\
  \n#### 什么是颜色？\n\n你会注意到，到目前为止我们一直方便地忽略了颜色。我们在图 3-21 中设定了一个名为 `color` 的类型，并假装一切都很好。让我们来看看颜色到底是什么。从物理上讲，颜色是你的视网膜和视觉皮层对电磁波的反应。这种波的特征在于其波长和强度。我们可以看到波长大约在\
  \ 400 到 700 纳米（nm）之间的波。电磁波谱的这个子波段也称为可见光谱。彩虹展示了可见光谱中的所有颜色，从紫色到靛蓝，到蓝色，到绿色，到黄色，然后是橙色，最后是红色。\n\
  \n显示器所做的，就是为每个像素发射特定的电磁波，而我们则感受到每个像素的颜色。不同类型的显示器使用不同的方法来实现这一目标。这个过程的一个简化版本是这样的：屏幕上的每个像素都由三种不同的荧光粒子组成，这些粒子会分别发出红色、绿色或蓝色的光。\n\
  \n当显示器刷新时，每个像素的荧光粒子会通过某种方式发光（例如，在 CRT 显示器的情况下，像素的粒子会受到一束电子的轰击）。显示器可以控制每个粒子发出的光量。例如，如果一个像素完全是红色的，那么只有红色粒子会以最大强度被电子轰击。如果我们想要三种基色以外的其他颜色，可以通过混合基色来实现。混合是通过改变每个粒子发出其颜色的强度来完成的。这些电磁波在到达我们视网膜的途中会相互叠加。我们的大脑会将这种混合解读为一种特定的颜色。因此，一种颜色可以通过红、绿、蓝三种基色强度的混合来指定。\n\
  \n#### 色彩模型\n\n我们刚才讨论的内容被称为色彩模型，具体来说是 RGB 色彩模型。RGB 当然代表红色、绿色和蓝色。我们还可以使用许多其他的色彩模型，例如\
  \ YUV 和 CMYK。不过，在大多数图形编程 API 中，RGB 色彩模型几乎是标准，因此我们这里只讨论它。\n\nRGB 色彩模型被称为加法色彩模型，这是因为最终颜色是通过混合加色法原色（红、绿、蓝）得出的。你可能在学校里就尝试过混合原色。图\
  \ 3-22 为你展示了一些 RGB 颜色混合的示例，以帮助你回忆一下。\n\n![A340874_3_En_3_Fig22_HTML.jpg](img/A340874_3_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22.\n\n混合原色红、绿、蓝的有趣尝试\n\n当然，通过改变红、绿、蓝分量的强度，我们可以生成比图 3-22 所示的颜色多得多的颜色。每个分量的强度值可以在\
  \ 0 和某个最大值（例如 1）之间。如果我们将每个颜色分量解释为三维欧几里得空间中三个轴上的一个值，我们就可以绘制出一个所谓的颜色立方体，如图 3-23 所示。通过改变每个分量的强度，我们可以获得更多种颜色。一种颜色由三元组\
  \ `(red, green, blue)` 表示，其中每个分量在 0.0 到 1.0 之间（0.0 表示该颜色没有强度，1.0 表示最大强度）。黑色位于原点\
  \ `(0,0,0)`，白色位于 `(1,1,1)`。\n\n![A340874_3_En_3_Fig23_HTML.jpg](img/A340874_3_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23.\n\n强大的 RGB 颜色立方体\n\n\n\n#### 数字颜色编码\n\n我们如何在计算机内存中对 RGB 颜色三元组进行编码？首先，我们必须定义要为颜色分量使用何种数据类型。我们可以使用浮点数，并将有效范围指定为\
  \ 0.0 到 1.0 之间。这样每个分量都会获得相当的分辨率，使我们能够使用大量不同的颜色。遗憾的是，这种方法会占用大量空间（每个像素需要 3 个 4 字节或\
  \ 8 字节的浮点数，具体取决于我们使用 32 位还是 64 位浮点数）。\n\n我们可以做得更好——代价是损失一些颜色——这完全可以接受，因为显示器通常只能发射有限范围的颜色。与其为每个分量使用浮点数，不如使用无符号整数。现在，如果我们为每个分量使用\
  \ 32 位整数，就没有任何节省。相反，我们为每个分量使用一个无符号字节。这样每个分量的强度范围就是 0 到 255。对于 1 个像素，我们需要 3 个字节，即\
  \ 24 位。这相当于 2 的 24 次方（16,777,216）种不同的颜色。这足以满足我们的需求。\n\n我们还能进一步减少空间吗？是的，可以。我们可以将每个分量打包到一个\
  \ 16 位字中，这样每个像素只需要 2 个字节的存储空间。红色使用 5 位，绿色使用 6 位，蓝色使用剩下的 5 位。给绿色分配 6 位的原因是，我们的眼睛能分辨出比红色或蓝色更多的绿色色调。所有这些位加起来，可以编码\
  \ 2 的 16 次方（65,536）种不同的颜色。图 3-24 展示了如何使用前面描述的三种编码方式对一种颜色进行编码。\n\n![A340874_3_En_3_Fig24_HTML.jpg](img/A340874_3_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24.** 一种漂亮的粉色调的颜色编码（抱歉，在本书的印刷版中显示为灰色）\n\n对于浮点数情况，我们可以使用三个 32 位 Java 浮点数。在\
  \ 24 位编码的情况下，我们有个小问题：Java 中没有 24 位整数类型，因此我们要么将每个分量存储在一个单独的字节中，要么使用一个 32 位整数，让高 8\
  \ 位闲置。在 16 位编码的情况下，我们可以再次选择使用两个单独的字节，或者将分量存储在一个单一的 short 值中。请注意，Java 没有无符号类型。由于二进制补码的特性，我们可以安全地使用有符号整数类型来存储无符号值。\n\
  \n对于 16 位和 24 位整数编码，我们还需要指定在 short 或 integer 值中存储三个分量的顺序。通常使用两种方法：RGB 和 BGR。图 3-23\
  \ 使用的是 RGB 编码。蓝色分量位于最低的 5 位或 8 位，绿色分量占用接下来的 6 位或 8 位，红色分量占用最高的 5 位或 8 位。BGR 编码则反转此顺序。绿色位保持不变，而红色和蓝色位互换位置。本书将全程使用\
  \ RGB 顺序，因为 Android 的图形 API 也使用此顺序。让我们总结一下迄今为止讨论过的颜色编码：\n\n-   32 位浮点 RGB 编码：每个像素\
  \ 12 个字节，强度在 0.0 到 1.0 之间变化。\n-   24 位整数 RGB 编码：每个像素 3 或 4 个字节，强度在 0 到 255 之间变化。分量的顺序可以是\
  \ RGB 或 BGR。在某些圈内这也被称为 RGB888 或 BGR888，其中 8 指定每个分量的位数。\n-   16 位整数 RGB 编码：每个像素 2\
  \ 个字节；红色和蓝色的强度在 0 到 31 之间，绿色的强度在 0 到 63 之间。分量的顺序可以是 RGB 或 BGR。在某些圈内这也被称为 RGB565\
  \ 或 BGR565，其中 5 和 6 指定了相应分量的位数。\n\n我们使用的编码类型也称为颜色深度。我们在磁盘或内存中创建和存储的图像具有定义的颜色深度，实际图形硬件的帧缓冲区和显示器本身也是如此。今天的显示器通常默认颜色深度为\
  \ 24 位，在某些情况下可以配置为使用更低的深度。图形硬件的帧缓冲区也相当灵活，可以使用多种不同的颜色深度。当然，我们自己的图像也可以具有任何我们喜欢的颜色深度。\n\
  \n> **注意**  \n> 还有很多其他方法来编码每像素的颜色信息。除了 RGB 颜色，我们还可以有灰度像素，它只有一个分量。由于这些不常用，我们在此暂时忽略它们。\n\
  \n#### 图像格式与压缩\n\n在某游戏开发阶段，美术人员会提供使用 Gimp、Paint.NET 或 Photoshop 等图形软件创建的图像。这些图像可以以多种格式存储在磁盘上。为什么首先需要这些格式？我们不能直接将光栅数据作为字节块存储在磁盘上吗？\n\
  \n嗯，可以，但让我们算算这需要多少内存。假设我们想要最佳质量，因此选择以 RGB888 格式编码像素，每像素 24 位。图像大小为 1024 × 1024 像素。仅这一张小小的图像就需要\
  \ 3MB！使用 RGB565，我们可以将其降低到大约 2MB。\n\n与音频的情况类似，人们在如何减少存储图像所需的内存方面进行了大量研究。通常采用专门为存储图像并尽可能保留原始颜色信息的需求而定制的压缩算法。两种最流行的格式是\
  \ JPEG 和 PNG。JPEG 是一种有损格式。这意味着在压缩过程中会丢弃一些原始信息。PNG 是一种无损格式，它能够 100% 真实地再现原始图像。有损格式通常表现出更好的压缩特性，占用更少的磁盘空间。因此，我们可以根据磁盘内存限制来选择使用哪种格式。\n\
  \n与音效类似，当我们加载图像到内存中时，必须完全解压缩它。因此，即使你的图像在磁盘上压缩后只有 20KB，在 RAM 中仍然需要完整的宽度乘以高度乘以颜色深度的存储空间。\n\
  \n一旦加载和解压缩，图像将以与 VRAM 中帧缓冲区布局完全相同的方式，以像素颜色数组的形式提供。唯一的区别是这些像素位于普通的 RAM 中，并且颜色深度可能与帧缓冲区的颜色深度不同。加载的图像也像帧缓冲区一样具有坐标系统，原点在其左上角，x\
  \ 轴指向右方，y 轴指向下方。\n\n图像加载后，我们可以通过简单地将像素颜色从图像传输到帧缓冲区中的适当位置，将其从 RAM 绘制到帧缓冲区。我们不需要手动操作，而是使用提供此功能的\
  \ API。\n\n\n\n#### Alpha 合成与混合\n\n在开始设计图形模块接口之前，我们还需要处理一件事：图像合成。为了便于讨论，假设我们有一个可供渲染的帧缓冲区，并且有一堆加载到内存中的图像，待会儿我们会将它们绘制到帧缓冲区中。图\
  \ 3-25 展示了一张简单的背景图片，以及鲍勃（一位斩妖除魔的万人迷）。\n\n![A340874_3_En_3_Fig25_HTML.jpg](img/A340874_3_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25.** 简单的背景与宇宙之主鲍勃\n\n要绘制鲍勃的世界，我们首先将背景图像绘制到帧缓冲区，然后将鲍勃绘制在帧缓冲区中的背景图像之上。这个过程称为合成，因为我们是将不同的图像合成为最终的图像。我们绘制图像的顺序至关重要，因为任何新的绘制操作都会覆盖帧缓冲区中的现有内容。那么，我们合成的最终输出会是什么样子呢？图\
  \ 3-26 给出了答案。\n\n![A340874_3_En_3_Fig26_HTML.jpg](img/A340874_3_En_3_Fig26_HTML.jpg)\n\
  \n**图 3-26.** 将背景和鲍勃合成到帧缓冲区中（这不是我们想要的结果）\n\n哎呀，这不是我们想要的结果。在图 3-26 中，请注意鲍勃周围环绕着白色像素。当我们在帧缓冲区中将鲍勃绘制到背景上时，这些白色像素也会被绘制出来，从而覆盖了背景。我们怎样才能绘制鲍勃的图像，使得只有鲍勃的像素被绘制出来，而白色的背景像素被忽略呢？\n\
  \n这就需要引入 Alpha 混合了。嗯，对于鲍勃的情况，严格来说应该叫 Alpha 遮罩，但这只是 Alpha 混合的一个子集。图形软件通常不仅允许我们指定像素的\
  \ RGB 值，还可以指示其半透明度。可以将其视为像素颜色的另一个分量。我们可以像编码红、绿、蓝分量一样来编码它。\n\n我们之前曾暗示，可以将一个 24 位的\
  \ RGB 三元组存储在一个 32 位整数中。这个 32 位整数中有 8 个未使用的位，我们可以利用它们来存储我们的 Alpha 值。然后，我们可以指定像素的半透明度，范围从\
  \ 0 到 255，其中 0 表示完全透明，255 表示不透明。这种编码方式根据颜色分量的顺序，被称为 `ARGB8888` 或 `BGRA8888`。当然，也有\
  \ `RGBA8888` 和 `ABGR8888` 格式。\n\n在 16 位编码的情况下，我们有个小问题：我们 16 位短整数中的所有位都被颜色分量占用了。让我们模仿\
  \ `ARGB8888` 格式，类似地定义一个 `ARGB4444` 格式。这样总共剩下 12 位用于我们的 RGB 值——每个颜色分量 4 位。\n\n我们可以很容易地想象出针对完全透明或不透明像素的渲染方法是如何工作的。在第一种情况下，我们只需忽略\
  \ Alpha 分量为零的像素。在第二种情况下，我们只需覆盖目标像素。然而，当一个像素的 Alpha 分量既不是完全透明也不是完全不透明时，情况会变得稍微复杂一些。\n\
  \n当以正式方式讨论混合时，我们需要定义几个概念：\n\n- 混合有两个输入和一个输出，每个都表示为一个 RGB 三元组（`C`）加上一个 Alpha 值（`a`）。\n\
  - 这两个输入被称为源和目标。源是我们想要绘制到目标图像（即帧缓冲区）上的图像中的像素。目标是我们要用源像素（部分）覆盖的像素。\n- 输出同样是一种颜色，表示为\
  \ RGB 三元组和 Alpha 值。不过，我们通常忽略 Alpha 值。为简单起见，本章我们将采用这种做法。\n- 为了简化计算，我们将 RGB 和 Alpha\
  \ 值表示为 0.0 到 1.0 范围内的浮点数。\n\n有了这些定义，我们就可以创建所谓的混合方程。最简单的方程如下所示：\n\n```\nred = src.red\
  \ * src.alpha + dst.red * (1  - src.alpha)\ngreen  = src.green  * src.alpha + dst.green\
  \  * (1  - src.alpha)\nblue = src.blue * src.alpha + dst.blue * (1  - src.alpha)\n\
  ```\n\n`src` 和 `dst` 是我们要混合在一起的源像素和目标像素。我们逐分量混合这两种颜色。请注意这些混合方程中不存在目标 Alpha 值。我们来看一个例子，看看它的效果：\n\
  \n```\nsrc  = (1, 0.5,  0.5), src.alpha = 0.5,  dst  = (0, 1,  0)\nred = 1 * 0.5\
  \  + 0 * (1  - 0.5)  = 0.5\nblue  = 0.5  * 0.5  + 1 * (1  - 0.5)  = 0.75 red = 0.5\
  \  * 0.5  + 0 * (1  - 0.5)  = 0.25\n```\n\n图 3-27 说明了上述方程。我们的源颜色是粉红色调，目标颜色是绿色调。两种颜色对最终输出颜色的贡献相同，结果产生了一种有些脏兮兮的绿色或橄榄色。\n\
  \n![A340874_3_En_3_Fig27_HTML.jpg](img/A340874_3_En_3_Fig27_HTML.jpg)\n\n**图 3-27.**\
  \ 混合两个像素\n\n两位名为 Porter 和 Duff 的杰出人物提出了大量混合方程。不过，我们将坚持使用上述方程，因为它能满足我们大部分的使用场景。尝试在纸上或你选择的图形软件中进行实验，以感受混合对你合成图像的影响。\n\
  \n> **注**  \n> 混合是一个广阔的领域。如果你想充分利用其潜力，我们建议你在网络上搜索 Porter 和 Duff 在此主题上的原创著作。不过，对于我们将要编写的游戏而言，上述方程已经足够了。\n\
  \n请注意，上述方程涉及大量乘法运算（确切地说，是六次）。乘法运算是高成本的，我们应该尽可能避免。在混合的情况下，我们可以通过将源像素颜色的 RGB 值预乘源\
  \ Alpha 值来省去其中的三次乘法。大多数图形软件支持将图像的 RGB 值与其对应的 Alpha 值进行预乘。如果不支持，你可以在加载时于内存中完成此操作。然而，当我们使用图形\
  \ API 通过混合来绘制图像时，我们必须确保使用正确的混合方程。我们的图像仍然包含 Alpha 值，因此上述方程会输出错误的结果。源 Alpha 值不得与源颜色相乘。幸运的是，所有\
  \ Android 图形 API 都允许我们完全指定如何混合图像。\n\n在鲍勃的例子中，我们只需在我们偏好的图形软件程序中将所有白色像素的 Alpha 值设置为零，以\
  \ `ARGB8888` 或 `ARGB4444` 格式加载图像，也许再进行 Alpha 预乘，然后使用能通过正确混合方程执行实际 Alpha 混合的绘制方法。结果将如图\
  \ 3-28 所示。\n\n![A340874_3_En_3_Fig28_HTML.jpg](img/A340874_3_En_3_Fig28_HTML.jpg)\n\
  \n**图 3-28.** 左侧是经过混合的鲍勃，右侧是 Paint.NET 中的鲍勃。棋盘格背景说明白色背景像素的 Alpha 值为零，因此背景棋盘格能够透显出来。\n\
  \n> **注**  \n> JPEG 格式不支持存储每个像素的 Alpha 值。在这种情况下，请使用 PNG 格式。\n\n\n\n##### 实际应用\n\n\
  有了这些信息，我们终于可以开始设计图形模块的接口了。让我们来定义这些接口的功能。请注意，当我们提到帧缓冲时，我们实际上指的是我们进行绘制的 UI 组件的虚拟帧缓冲。我们只是假装直接绘制到真正的帧缓冲上。我们需要能够执行以下操作：\n\
  \n*   从磁盘加载图像并将其存储在内存中，以便后续绘制。\n*   用某种颜色清除帧缓冲，从而擦除上一帧留下的内容。\n*   在帧缓冲的特定位置将像素设置为特定颜色。\n\
  *   在帧缓冲上绘制线条和矩形。\n*   将之前加载的图像绘制到帧缓冲上。我们希望既能绘制完整图像，也能绘制其部分区域。此外，还需要能够对图像进行带混合与不带混合的绘制。\n\
  *   获取帧缓冲的尺寸。\n\n我们提出了两个简单的接口：`graphics` 和 `pixmap`。让我们从 `graphics` 接口开始，如清单 3-6\
  \ 所示。\n\n```\npackage com.badlogic.androidgames.framework;\npublic interface Graphics\
  \ {\npublic static enum PixmapFormat   {\nARGB8888,  ARGB4444,  RGB565\n}\npublic\
  \ Pixmap  newPixmap(String fileName,  PixmapFormat format);\npublic void  clear(int\
  \ color);\npublic void  drawPixel(int  x, int y, int color);\npublic void  drawLine(int\
  \  x, int y, int x2,  int y2,  int color);\npublic void  drawRect(int  x, int y,\
  \ int width, int height, int color);\npublic void  drawPixmap(Pixmap pixmap, int\
  \ x, int y, int srcX,  int srcY,\nint srcWidth,  int srcHeight);\npublic void  drawPixmap(Pixmap\
  \ pixmap, int x, int y);\npublic int  getWidth();\npublic int  getHeight();\n}\n\
  ```\n\n我们从名为 `PixmapFormat` 的公共静态枚举开始。它对我们将要支持的不同像素格式进行了编码。接下来，我们介绍 `Graphics` 接口的不同方法：\n\
  \n*   `Graphics.newPixmap()` 方法将加载以 JPEG 或 PNG 格式提供的图像。我们为生成的像素图指定一个期望的格式，这是对加载机制的一个提示。生成的像素图可能具有不同的格式。我们这样做是为了能在一定程度上控制加载图像的内存占用（例如，将\
  \ RGB888 或 ARGB8888 图像加载为 RGB565 或 ARGB4444 图像）。文件名指定了我们应用程序 APK 文件中的一个资源。\n*  \
  \ `Graphics.clear()` 方法用给定的颜色清除整个帧缓冲。在我们这个小框架中，所有颜色都将被指定为 32 位 ARGB8888 值（当然，像素图可能有不同的格式）。\n\
  *   `Graphics.drawPixel()` 方法会将帧缓冲中位于 (`x`,`y`) 的像素设置为给定颜色。屏幕外的坐标将被忽略。这称为裁剪。\n*\
  \   `Graphics.drawLine()` 方法与 `Graphics.drawPixel()` 方法类似。我们指定线条的起点和终点，以及一种颜色。任何位于帧缓冲光栅之外的线条部分都将被忽略。\n\
  *   `Graphics.drawRect()` 方法在帧缓冲上绘制一个矩形。\n*   (`x`,`y`) 指定了矩形的左上角在帧缓冲中的位置。参数 `width`\
  \ 和 `height` 指定了 x 和 y 方向的像素数量，矩形将从 (`x`,`y`) 开始填充。我们沿 y 轴向下填充。颜色参数是用于填充矩形的颜色。\n\
  *   `Graphics.drawPixmap()` 方法将像素图的矩形部分绘制到帧缓冲上。(`x`,`y`) 坐标指定了像素图目标位置（在帧缓冲中）的左上角。参数\
  \ `srcX` 和 `srcY` 指定了从像素图中使用的矩形区域的相应左上角，该坐标基于像素图自身的坐标系。最后，`srcWidth` 和 `srcHeight`\
  \ 指定了我们从像素图中取出的部分的大小。\n*   最后，`Graphics.getWidth()` 和 `Graphics.getHeight()` 方法返回帧缓冲的宽度和高度（以像素为单位）。\n\
  \n除了 `Graphics.clear()` 之外，所有绘图方法都会自动对其接触的每个像素执行混合，如上一节所述。我们可以在个别情况下禁用混合以加快绘图速度，但这会使我们的实现变得复杂。通常，对于像《Mr.\
  \ Nom》这样的简单游戏，我们可以一直启用混合而无需担心。\n\n`Pixmap` 接口如清单 3-7 所示。\n\n```\npackage com.badlogic.androidgames.framework;\n\
  import  com.badlogic.androidgames.framework.Graphics.PixmapFormat;\npublic interface\
  \ Pixmap  {\npublic int  getWidth();\npublic int  getHeight();\npublic PixmapFormat\
  \ getFormat();\npublic void  dispose();\n}\n```\n\n我们保持它非常简单且不可变，因为合成操作是在帧缓冲中完成的：\n\
  \n*   `Pixmap.getWidth()` 和 `Pixmap.getHeight()` 方法返回像素图的宽度和高度（以像素为单位）。\n*   `Pixmap.getFormat()`\
  \ 方法返回像素图在内存中存储时使用的 `PixmapFormat`。\n*   最后是 `Pixmap.dispose()` 方法。`Pixmap` 实例会占用内存以及可能的其他系统资源。如果我们不再需要它们，应使用此方法将其释放。\n\
  \n有了这个简单的图形模块，我们后续就可以轻松实现《Mr. Nom》。让我们以对游戏框架本身的讨论来结束本章。\n\n\n\n## 游戏框架\n\n在完成所有基础工作后，我们终于可以讨论如何实现游戏本身了。为此，让我们先明确游戏需要执行哪些任务：\n\
  \n- 游戏被划分为不同的屏幕。每个屏幕执行相同的任务：评估用户输入、将输入应用于屏幕状态，以及渲染场景。有些屏幕可能不需要任何用户输入，只需经过一段时间后自动切换到另一个屏幕（例如启动画面）。\n\
  - 这些屏幕需要以某种方式进行管理（也就是说，我们需要追踪当前屏幕，并找到切换至新屏幕的方法，这归根结底就是销毁旧屏幕并将新屏幕设置为当前屏幕）。\n- 游戏需要让屏幕能够访问不同的模块（用于图形、音频、输入等），以便它们能够加载资源、获取用户输入、播放声音、渲染到帧缓冲等。\n\
  - 由于我们的游戏是实时运行的（这意味着事物会不断移动和更新），我们必须尽可能频繁地让当前屏幕更新自身状态并进行渲染。这通常会在一个称为主循环的循环内部完成。当用户退出游戏时，循环将终止。这个循环的每一次迭代被称为一帧。我们可以计算的每秒帧数（FPS）被称为帧率。\n\
  - 说到时间，我们还需要追踪自上一帧以来经过的时间跨度。这用于实现帧率无关的运动，我们稍后会讨论这一点。\n- 游戏需要追踪窗口状态（即它是被暂停还是恢复），并将这些事件通知当前屏幕。\n\
  - 游戏框架将负责设置窗口以及创建我们用来渲染和接收输入的 UI 组件。\n\n让我们将其简化为一些伪代码，暂时忽略像暂停和恢复这样的窗口管理事件：\n\n```\n\
  createWindowAndUIComponent();\nInput input = new Input();\nGraphics graphics = new\
  \ Graphics();\nAudio audio = new Audio();\nScreen currentScreen = new MainMenu();\n\
  float lastFrameTime = currentTime();\nwhile (!userQuit()) {\n    float deltaTime\
  \ = currentTime() - lastFrameTime;\n    lastFrameTime = currentTime();\n    currentScreen.updateState(input,\
  \ deltaTime);\n    currentScreen.present(graphics, audio, deltaTime);\n}\ncleanupResources();\n\
  ```\n\n我们首先创建游戏的窗口以及用于渲染和接收输入的 UI 组件。接下来，我们实例化所有执行底层工作所需的模块。我们实例化起始屏幕并将其设为当前屏幕，并记录当前时间。然后我们进入主循环，如果用户表示想要退出游戏，该循环将终止。\n\
  \n在游戏循环内部，我们计算所谓的增量时间。这是自上一帧开始以来经过的时间。然后我们记录当前帧开始的时间。增量时间和当前时间通常以秒为单位给出。对于屏幕而言，增量时间表示自其上次更新以来经过了多少时间——如果我们希望实现帧率无关的运动（稍后会回顾），就需要这些信息。\n\
  \n最后，我们只需更新当前屏幕的状态并将其呈现给用户。更新过程依赖于增量时间和输入状态；因此，我们将这些信息提供给屏幕。呈现过程包括将屏幕状态渲染到帧缓冲，以及播放屏幕状态所要求的任何音频（例如，由于上一次更新中触发了射击）。呈现方法可能还需要知道自上次调用以来过去了多少时间。\n\
  \n当主循环终止时，我们可以清理并释放所有资源，然后关闭窗口。\n\n这就是几乎所有游戏在高层设计上的工作方式：处理用户输入，更新状态，向用户呈现状态，然后无限重复（直到用户对我们的游戏感到厌倦）。\n\
  \n现代操作系统上的 UI 应用程序通常不会实时运行。它们采用基于事件的范式工作，由操作系统通知应用程序输入事件，以及何时进行自我渲染。这是通过应用程序在启动时向操作系统注册的回调函数实现的。这些回调函数负责处理接收到的事件通知。所有这些都发生在一个所谓的\
  \ UI 线程中——即 UI 应用程序的主线程。\n\n通常最好尽可能快地返回回调函数，因此我们不想在其中实现主循环。\n\n相反，我们将游戏的主循环托管在一个单独的线程中，该线程在游戏启动时生成。这意味着当我们需要接收\
  \ UI 线程事件（例如输入事件或窗口事件）时，必须采取一些预防措施。但这些细节我们将在后续为 Android 实现游戏框架时再处理。只需要记住，我们需要在特定时刻同步\
  \ UI 线程和游戏主循环线程。\n\n\n\n## 游戏与屏幕接口\n\n话已至此，让我们尝试设计一个游戏接口。该接口的实现必须完成以下任务：\n\n*  \
  \ 设置窗口和 UI 组件，并接入回调函数，以便接收窗口和输入事件。\n*   启动主循环线程。\n*   跟踪当前屏幕，并在每个主循环迭代（即帧）中通知其更新和呈现自身。\n\
  *   将窗口事件（例如暂停和恢复事件）从 UI 线程传递到主循环线程，并转发给当前屏幕，以便其相应地更改状态。\n*   授权访问我们之前开发的所有模块：输入、文件\
  \ I/O、图形和音频。\n\n作为游戏开发者，我们无需关心主循环运行在哪个线程上，也无需关心是否需要与 UI 线程同步。我们只希望在低级模块的一点帮助和一些窗口事件通知下，能够实现不同的游戏画面。因此，我们将创建一个非常简单的游戏接口，它为我们隐藏了所有这些复杂性，同时还将创建一个抽象的\
  \ `Screen` 类，用于实现所有屏幕。清单 3-8 展示了这个游戏接口。\n\n```\npackage com.badlogic.androidgames.framework;\n\
  public interface Game  {\npublic Input  getInput(); public  FileIO  getFileIO();\
  \ public Graphics getGraphics(); public Audio getAudio();\npublic void  setScreen(Screen\
  \ screen);\npublic Screen getCurrentScreen();\npublic Screen getStartScreen();\n\
  }\n清单 3-8.\n游戏接口\n```\n\n如您所料，这里提供了一些 getter 方法，用于返回我们低级模块的实例，这些实例将由 `Game` 的实现来实例化和跟踪。\n\
  \n`Game.setScreen()` 方法允许我们设置游戏的当前屏幕。该方法将实现一次，并包含所有内部的线程创建、窗口管理和主循环逻辑，主循环逻辑会持续要求当前屏幕进行呈现和更新。\n\
  \n`Game.getCurrentScreen()` 方法返回当前活跃的 `Screen` 实例。稍后我们将使用一个名为 `AndroidGame` 的抽象类来实现游戏接口，该类将实现除\
  \ `Game.getStartScreen()` 之外的所有方法。`Game.getStartScreen()` 方法将是一个抽象方法。如果我们为实际游戏创建\
  \ `AndroidGame` 实例，我们将扩展它并重写 `Game.getStartScreen()` 方法，返回一个指向游戏第一个屏幕的实例。\n\n为了让您了解设置我们的游戏是多么容易，这里有一个示例（假设我们已经实现了\
  \ `AndroidGame` 类）：\n\n```\npublic class  MyAwesomeGame  extends AndroidGame  {\n\
  public Screen getStartScreen  () {\nreturn new  MySuperAwesomeStartScreen(this);\n\
  }\n}\n```\n\n这相当酷，不是吗？我们只需实现想要用来启动游戏的屏幕，剩下的工作将由 `AndroidGame` 类完成。从那时起，`AndroidGame`\
  \ 实例将在主循环线程中要求我们的 `MySuperAwesomeStartScreen` 进行更新和渲染。请注意，我们将 `MyAwesomeGame` 实例本身传递给了\
  \ Screen 实现的构造函数。\n\n**注意**\n\n如果您想知道实际上是谁实例化了我们的 `MyAwesomeGame` 类，我们给您一个提示：`AndroidGame`\
  \ 将从 `Activity` 派生，当用户启动我们的游戏时，Android 操作系统会自动实例化 `Activity`。\n\n谜题的最后一部分是抽象的 `Screen`\
  \ 类。我们将其设为抽象类而不是接口，以便实现一些簿记功能。这样，我们在实际实现抽象的 `Screen` 类时，就可以减少编写样板代码。清单 3-9 展示了抽象的\
  \ `Screen` 类。\n\n```\npackage com.badlogic.androidgames.framework;\npublic abstract\
  \ class  Screen {\nprotected  final Game  game;\npublic Screen(Game  game)  {\n\
  this.game = game;\n}\npublic abstract void  update(float  deltaTime);\npublic abstract\
  \ void  present(float  deltaTime);\npublic abstract void  pause();\npublic abstract\
  \ void  resume();\npublic abstract void  dispose();\n}\n清单 3-9.\nScreen 类\n```\n\
  \n事实证明，簿记功能其实并不复杂。构造函数接收 `Game` 实例并将其存储在一个所有子类都能访问的 final 成员变量中。通过这种机制，我们可以实现两件事：\n\
  \n*   我们可以访问游戏接口的低级模块，来播放音频、在屏幕上绘制、获取用户输入以及读写文件。\n*   我们可以在适当的时候（例如，当按下触发切换到新屏幕的按钮时）通过调用\
  \ `Game.setScreen()` 来设置新的当前屏幕。\n\n第一点显而易见：我们的 Screen 实现需要访问这些模块，以便能执行一些有意义的操作，比如渲染大量患有狂犬病的独角兽。\n\
  \n第二点允许我们在 `Screen` 实例内部轻松实现屏幕切换。每个屏幕都可以根据自身状态（例如，当按下菜单按钮时）决定何时切换到哪个其他屏幕。\n\n`Screen.update()`\
  \ 和 `Screen.present()` 方法现在应该不言自明了：它们将更新屏幕状态并相应地呈现屏幕。`Game` 实例将在主循环的每次迭代中调用它们一次。\n\
  \n`Screen.pause()` 和 `Screen.resume()` 方法将在游戏暂停或恢复时被调用。这同样由 `Game` 实例完成，并作用于当前活跃的屏幕。\n\
  \n如果调用了 `Game.setScreen()`，`Game` 实例将调用 `Screen.dispose()` 方法。`Game` 实例通过此方法销毁当前屏幕，从而使该屏幕有机会释放其所有系统资源（例如，存储在像素图中的图形资源），以便为内存中的新屏幕资源腾出空间。调用\
  \ `Screen.dispose()` 方法也是屏幕确保需要持久化的任何信息都已保存的最后机会。\n\n\n## 一个简单的示例\n\n继续以我们的`MySuperAwesomeGame`示例为例，下面是一个非常简单的`MySuperAwesomeStartScreen`类实现：\n\
  \n```\npublic class MySuperAwesomeStartScreen extends Screen {\n    Pixmap awesomePic;\n\
  \    int x;\n\n    public MySuperAwesomeStartScreen(Game game) {\n        super(game);\n\
  \        awesomePic = game.getGraphics().newPixmap(\"data/pic.png\", PixmapFormat.RGB565);\n\
  \        MySuperAwesomeGame.getStartScreen(awesomePic);\n    }\n\n    @Override\n\
  \    public void update(float deltaTime) {\n        x += 1;\n        if (x > 100)\n\
  \            x = 0;\n    }\n\n    @Override\n    public void present(float deltaTime)\
  \ {\n        game.getGraphics().clear(0);\n        game.getGraphics().drawPixmap(awesomePic,\
  \ x, 0, 0, 0,\n            awesomePic.getWidth(), awesomePic.getHeight());\n   \
  \ }\n\n    @Override\n    public void pause() {\n        // 这里无需操作\n    }\n\n  \
  \  @Override\n    public void resume() {\n        // 这里无需操作\n    }\n\n    @Override\n\
  \    public void dispose() {\n        awesomePic.dispose();\n    }\n}\n```\n\n让我们看看这个类与`MySuperAwesomeGame`类结合后，将会实现什么功能：\n\
  \n1. 当`MySuperAwesomeGame`类被创建时，它会初始化窗口、用于渲染和接收事件的 UI 组件、接收窗口和输入事件的回调函数，以及主循环线程。最后，它会调用自身的`MySuperAwesomeGame.getStartScreen()`方法，该方法返回`MySuperAwesomeStartScreen()`类的一个实例。\n\
  2. 在`MySuperAwesomeStartScreen`构造函数中，我们从磁盘加载一个位图，并将其存储在一个成员变量中。至此，屏幕设置完成，控制权交还给`MySuperAwesomeGame`类。\n\
  3. 主循环线程将不断调用我们刚创建的实例中的`MySuperAwesomeStartScreen.update()`和`MySuperAwesomeStartScreen.present()`方法。\n\
  4. 在`MySuperAwesomeStartScreen.update()`方法中，我们每帧将一个名为`x`的成员变量增加 1。该成员变量保存了我们要渲染的图像的\
  \ x 坐标。当 x 坐标值大于 100 时，我们将其重置为 0。\n5. 在`MySuperAwesomeStartScreen.present()`方法中，我们用黑色（`0x00000000\
  \ = 0`）清除帧缓冲区，并在位置（`x,0`）渲染我们的像素图。\n6. 主循环线程将重复步骤 3 到 5，直到用户按下设备上的返回键退出游戏。`Game`实例随后会调用`MySuperAwesomeStartScreen.dispose()`方法，该方法会释放像素图资源。\n\
  \n这就是我们的第一个（并不那么）激动人心的游戏！用户所能看到的，只是一个图像在屏幕上从左向右移动。这算不上多么愉快的用户体验，但我们稍后会对此进行改进。请注意，在\
  \ Android 系统上，游戏可以在任意时刻暂停和恢复。我们的`MyAwesomeGame`实现随后会调用`MySuperAwesomeStartScreen.pause()`和`MySuperAwesomeStartScreen.resume()`方法。只要应用程序本身暂停，主循环线程也会暂停。\n\
  \n我们还有一个最后需要讨论的问题：帧速率无关的运动。\n\n## 帧速率无关的运动\n\n假设用户设备能够以 60FPS 运行我们上一节的游戏。由于我们每帧将`MySuperAwesomeStartScreen.x`成员增加\
  \ 1 个像素，所以我们的像素图在 100 帧内将移动 100 个像素。以 60FPS 的帧率计算，大约需要 1.66 秒才能到达位置(100,0)。\n\n\
  现在，假设第二个用户在不同的设备上玩我们的游戏。该设备能以 30FPS 运行游戏。每秒我们的像素图移动 30 个像素，因此需要 3.33 秒才能到达位置(100,0)。\n\
  \n这很糟糕。对于我们这个简单的游戏来说，可能对用户体验影响不大，但如果把像素图替换成超级马里奥，想想以帧依赖的方式移动他会产生什么后果。假设我们按住方向键右键，让马里奥向右跑。每帧我们让他移动\
  \ 1 个像素，就像处理像素图一样。在能以 60FPS 运行游戏的设备上，马里奥的奔跑速度将是在 30FPS 设备上的两倍！这将完全改变用户体验，完全取决于设备性能。我们需要解决这个问题。\n\
  \n这个问题的解决方案被称为**帧速率无关的运动**。与其每帧以固定量移动像素图（或马里奥），我们改用每秒移动的单位来指定移动速度。假设我们希望像素图每秒移动\
  \ 50 个像素。除了每秒 50 像素这个值之外，我们还需要知道自上次移动像素图以来经过了多少时间。这就是奇怪的 delta time 参数发挥作用的地方。它精确地告诉我们自上次更新以来经过了多少时间。因此，我们的`MySuperAwesomeStartScreen.update()`方法应该如下所示：\n\
  \n```\n@Override\npublic void update(float deltaTime) {\n    x += 50 * deltaTime;\n\
  \    if (x > 100)\n        x = 0;\n}\n```\n\n如果我们的游戏以恒定的 60FPS 运行，传递给该方法的 delta\
  \ time 将始终是`1 / 60 ~ 0.016`秒。因此，每帧我们移动`50 × 0.016 ~ 0.83`像素。以 60FPS 计算，每秒我们移动`60\
  \ × 0.83 ~ 50`像素！让我们用 30FPS 测试一下：`50 × 1 / 30 ~ 1.66`。乘以 30FPS，我们每秒同样总共移动 50 像素。所以，无论运行我们游戏的设备速度多快，我们的动画和移动始终与实际挂钟时间保持一致。\n\
  \n如果我们尝试用前面的代码实际运行，在 60FPS 下，我们的像素图根本不会移动。这是因为我们代码中的一个 bug。我们给你一点时间来找出来。这个 bug 相当隐蔽，但却是游戏开发中常见的陷阱。我们每帧递增的`x`成员实际上是一个整数。给整数加上`0.83`不会有任何效果。要解决这个问题，我们只需将`x`存储为`float`类型而不是整数。这也意味着在调用`Graphics.drawPixmap()`时，我们必须添加一个强制转换为`int`的操作。\n\
  \n**注意**：虽然在 Android 上浮点运算通常比整数运算慢，但影响大多可以忽略不计，因此我们可以使用成本更高的浮点运算。\n\n以上就是我们游戏框架的全部内容。我们可以直接将\
  \ Mr. Nom 设计中的各个屏幕转化为我们的类以及框架的接口。当然，一些实现细节仍需注意，但我们将留到后面的章节讨论。现在，你可以为自己感到非常自豪。你坚持读完了这一章，现在你已经准备好成为一名\
  \ Android（以及其他平台）的游戏开发者了！\n\n## 总结\n\n在阅读了这 60 多页高度浓缩且信息量丰富的内容之后，你应该对创建一款游戏所涉及的内容有了很好的了解。我们考察了\
  \ Google Play 上一些最流行的游戏类型，并得出了一些结论。我们仅用剪刀、笔和一些纸，从头设计了一款完整的游戏。最后，我们探索了游戏开发的理论基础，甚至基于这些理论概念创建了一套接口和抽象类，并将在本书中始终使用它们来实现我们的游戏设计。\n\
  \n如果你觉得自己想超越这里介绍的基础知识，那么请务必上网查询更多信息。你手中已经掌握了所有关键词。理解这些原理是开发稳定且性能良好的游戏的关键。话不多说，让我们为\
  \ Android 实现我们的游戏框架吧！\n\n\n\n"
- "# 面向游戏开发者的 Android\n\nAndroid 的应用框架庞大且时常令人困惑。但凡你能想到的每个任务，都有相应的 API 可供使用。当然，你必须先学习这些\
  \ API。幸运的是，我们游戏开发者只需用到这些 API 中极其有限的一部分。我们所需要的只是一个包含单一 UI 组件的窗口，方便我们进行绘制，并能够从中接收输入，同时还要具备音频播放的能力。这足以满足我们实现第\
  \ 3 章中设计的游戏框架的所有需求，而且是以一种相当平台无关的方式。\n\n在本章中，你将学习让 Mr. Nom 成为现实所必需的、最精简的 Android\
  \ API。你会惊讶地发现，要实现这一目标，实际上只需了解这些 API 中极少的一部分。让我们回顾一下需要哪些要素：\n\n*   窗口管理\n*   输入\n\
  *   文件 I/O\n*   音频\n*   图形\n\n在应用框架 API 中，每个模块都有对应的实现。我们将挑选出处理这些模块所需的 API，探讨其内部机制，最后实现我们在第\
  \ 3 章中设计的游戏框架的相应接口。\n\n如果你恰好有 iOS / Xcode 背景，我们在本章末尾有一个小章节，会提供一些转换说明和指导。然而，在深入探讨\
  \ Android 上的窗口管理之前，我们必须重新审视一下我们在第 2 章中仅简要讨论过的内容：通过清单文件定义应用程序。\n\n## 定义 Android 应用程序：清单文件\n\
  \n一个 Android 应用程序可以由多种不同的组件构成：\n\n*   Activity（活动）：这些是面向用户的组件，提供用户界面以供交互。\n*   Service（服务）：这些是在后台运行、没有可见界面的进程。例如，一个服务可能负责轮询邮件服务器以获取新邮件。\n\
  *   Content Provider（内容提供者）：这些组件让你的部分应用数据可供其他应用程序使用。\n*   Intent（意图）：这些是由系统或应用程序本身创建的消息，然后被传递给任何感兴趣的接收方。Intent\
  \ 可能通知我们系统事件，例如 SD 卡被移除或 USB 线缆被连接。系统也使用 Intent 来启动我们应用程序的组件，例如 Activity。我们也可以触发自己的\
  \ Intent，请求其他应用程序执行某个操作，比如打开相册显示图片，或启动相机应用拍照。\n*   Broadcast Receiver（广播接收者）：这些组件响应特定的\
  \ Intent，并可能执行某个操作，例如启动特定的 Activity 或向系统发送另一个 Intent。\n\nAndroid 应用程序没有我们习惯在桌面操作系统（例如，以\
  \ Java 的 `main()` 方法的形式）上见到的那种单一入口点。相反，Android 应用程序的组件是由特定的 Intent 来启动或要求其执行特定操作的。\n\
  \n我们的应用程序由哪些组件构成，以及这些组件响应哪些 Intent，都在应用程序的清单文件中定义。Android 系统使用这个清单文件来了解我们应用程序的构成，例如，当从应用启动器启动应用程序时要显示的默认\
  \ Activity。\n\n**注意：** 本书中我们只关心 Activity，因此我们将仅讨论这种类型组件在清单文件中的相关部分。如果你想了解详情，可以访问\
  \ Android 开发者网站（[`http://developer.android.com`](http://developer.android.com)）了解更多关于清单文件的信息。\n\
  \n清单文件的用途远不止定义应用程序的组件。以下列表总结了游戏开发背景下清单文件的相关部分：\n\n*   我们的应用程序所需的硬件配置（即，多点触控、特定屏幕分辨率，或对\
  \ OpenGL ES 2.0 的支持）\n*   使用特定组件的权限，例如写入 SD 卡或访问网络栈\n\n在接下来的小节中，我们将创建一个模板清单文件，稍作修改后，可在本书所有项目中重复使用。为此，我们将遍历所有需要用来定义应用程序的相关\
  \ XML 标签。\n\n### `<manifest>` 元素\n\n`<manifest>` 标签是 `AndroidManifest.xml` 文件的根元素。这是一个基本示例：\n\
  \n```\n...\n```\n\n我们假设你之前使用过 XML，因此你应该熟悉第一行。`<manifest>` 标签指定了一个名为 `android` 的命名空间，该命名空间会在清单文件的其余部分中被使用。`package`\
  \ 属性定义了应用程序的根包名。稍后，我们将基于此包名引用我们应用程序的特定类。\n\n只有当我们把 Android 项目的构建目标设置为 Android 2.2\
  \ 或更新版本时，`installLocation` 属性才可用。它指定了应用程序应被安装的位置。字符串 `preferExternal` 告诉系统，我们希望将应用程序安装到\
  \ SD 卡上。这仅适用于 Android 2.2 或更新版本，旧版本的 Android 应用会忽略此字符串。在 Android 2.2 或更新版本上，应用程序会尽可能安装到外部存储设备。\n\
  \n如前所示，清单文件中 XML 元素的所有属性通常都以 `android` 命名空间作为前缀。为简洁起见，在后续小节中讨论特定属性时，我们不会指定该命名空间。\n\
  \n在 `<manifest>` 元素内部，我们接着定义应用程序的组件、权限、硬件配置和支持的 Android 版本。\n\n\n\n### `<application>`\
  \ 元素\n\n与 `<manifest>` 元素类似，我们通过一个示例来讨论 `<application>` 元素：\n\n```\n...\n```\n\n\
  现在，这是否看起来有点奇怪？`@mipmap/ic_launcher` 和 `@string/app_name` 这些字符串是怎么回事？在开发标准 Android\
  \ 应用时，我们通常会编写大量 XML 文件，每个文件定义了应用的一个特定部分。要完整定义这些部分，我们需要能够引用 XML 文件中未定义的资源，例如图片或国际化字符串。这些资源位于\
  \ `res/` 文件夹的子文件夹中，正如我们在第 2 章解剖 Android Studio 中的 Hello World 项目时所讨论的那样。\n\n为了引用资源，我们使用上述表示法。`@`\
  \ 表示我们要引用一个在其他地方定义的资源。接下来的字符串标识了我们要引用的资源类型，它可以映射到 `res/` 目录下的某个文件夹或文件。最后一部分指定了资源的名称。在上述例子中，这是一张名为\
  \ `ic_launcher` 的图片和一个名为 `app_name` 的字符串。对于图片来说，我们指定的是实际文件名，该文件位于 `res/mipmap-xxx/`\
  \ 文件夹中。请注意，图片名称没有 `.png` 或 `.jpg` 这样的后缀。Android 会根据 `res/mipmap-xxx/` 文件夹中的内容自动推断后缀。`app_name`\
  \ 字符串定义在 `res/values/strings.xml` 文件中，该文件存储了应用使用的所有字符串。字符串的名称是在 `strings.xml` 文件中定义的。\n\
  \n**注意**：Android 上的资源处理虽然极其灵活，但也相当复杂。出于两个原因，本书决定跳过大部分资源处理：对于游戏开发来说，这完全是过度设计；并且我们希望完全控制自己的资源。Android\
  \ 习惯修改放入 `res/` 文件夹中的资源，尤其是图片（称为 drawable）。这是我们作为游戏开发者不希望看到的。在游戏开发中，我们建议唯一使用的 Android\
  \ 资源系统功能是字符串国际化。本书不会深入探讨这个主题；相反，我们将创建一个更适合游戏开发的 `assets/` 文件夹，这样我们的资源就不会被修改，并且我们能够指定自己的文件夹层级结构。\n\
  \n现在，`<application>` 元素各属性的含义应该更清晰了。`icon` 属性指定了 `res/mipmap-xxx/` 文件夹中用作应用图标的图片。这个图标也是我们在\
  \ `<application>` 元素内定义的所有活动的默认图标。\n\n`label` 属性指定了在应用启动器中为我们的应用显示的字符串。在上述示例中，它引用了\
  \ `res/values/string.xml` 文件中的一个字符串，这正是我们在 Android Studio 中创建 Android 项目时指定的内容。我们也可以将其设置为原始字符串，例如\
  \ `我的超级酷游戏`。这个标签也是我们在 `<application>` 元素中定义的所有活动的默认标签。该标签会显示在应用的标题栏中。\n\n我们只讨论了可以为\
  \ `<application>` 元素指定的属性中非常小的一部分。不过，这些对于我们的游戏开发需求来说已经足够了。如果你想了解更多信息，可以查阅 Android\
  \ 开发者网站上的完整文档。\n\n### `<activity>` 元素\n\n现在，有趣的地方来了。以下是我们为 Mr. Nom 游戏假设的一个示例：\n\n\
  ```\nandroid:configChanges=\"keyboard|keyboardHidden|orientation\">\n```\n\n我们先来看一下\
  \ `<activity>` 标签的属性：\n\n- `name`：指定了活动类相对于我们在 `<manifest>` 元素中指定的 `package` 属性的名称。你也可以在此指定完全限定的类名。\n\
  - `label`：我们在 `<application>` 元素中已经指定了相同的属性。这个标签显示在活动的标题栏中（如果有的话）。如果我们定义的活动是应用的一个入口点，该标签也会用作应用启动器中显示的文本。如果没有指定，则会使用\
  \ `<application>` 元素中的标签。请注意，这里我们使用了原始字符串，而不是引用 `string.xml` 文件中的字符串。\n- `screenOrientation`：该属性指定了活动将使用的屏幕方向。这里，我们为\
  \ Mr. Nom 游戏指定了 `portrait`（竖屏），因此它只能在竖屏模式下运行。或者，如果我们想以横屏模式运行，可以指定 `landscape`（横屏）。这两个配置都会强制活动在其生命周期内保持相同的屏幕方向，无论设备实际如何旋转。如果省略此属性，活动将使用设备的当前屏幕方向，通常基于加速度计数据。这也意味着每当设备方向改变时，活动将被销毁并重新启动——这对于游戏来说是不可取的。我们通常会固定游戏活动的方向，要么是横屏模式，要么是竖屏模式。\n\
  - `configChanges`：重新调整设备方向或滑出键盘被视为配置变更。发生此类变更时，Android 会销毁并重启我们的应用以适应变化。这对于游戏来说是不可取的。`<activity>`\
  \ 元素的 `configChanges` 属性可以解决这个问题。它允许我们指定哪些配置变更由我们自己处理，而无需销毁和重新创建活动。可以使用 `|` 字符连接多个配置变更。在上述示例中，我们自己处理了\
  \ `keyboard`、`keyboardHidden` 和 `orientation` 这三种变更。\n\n与 `<application>` 元素一样，当然也可以为\
  \ `<activity>` 元素指定更多属性。对于游戏开发，我们使用刚才讨论的四个属性就足够了。\n\n现在，你可能已经注意到 `<activity>` 元素并非空元素，而是包含另一个元素，该元素本身又包含两个子元素。这些是做什么用的？\n\
  \n正如我们之前指出的，Android 中没有单一的应用程序主入口点的概念。相反，我们可以有多个入口点，形式为响应系统或第三方应用发出的特定意图而启动的活动和服务。我们需要以某种方式告知\
  \ Android，我们应用中的哪些活动和服务会响应特定的意图（以及以何种方式响应）。这就是 `<intent-filter>` 元素发挥作用的地方。\n\n\
  在上述示例中，我们指定了两种类型的意图过滤器：一个 `<action>` 和一个 `<category>`。`<action>` 元素告诉 Android，我们的活动是应用的一个主入口点。`<category>`\
  \ 元素指定我们希望将该活动添加到应用启动器中。这两个元素一起使得 Android 能够推断出：当按下应用中应用启动器的图标时，它应该启动那个特定的活动。\n\n\
  \n\n对于`<action>`和`<category>`这两个元素，唯一需要指定的是`name`属性，它标识了该活动将要响应的意图。意图`android.intent.action.MAIN`是一个特殊的意图，Android\
  \ 系统使用它来启动应用程序的主活动。意图`android.intent.category.LAUNCHER`用于告知 Android，应用程序中的特定活动是否应在应用启动器中拥有一个入口。\n\
  \n通常，我们只有一个活动会指定这两个意图过滤器。然而，一个标准的 Android 应用程序几乎总是包含多个活动，这些活动也需要在`manifest.xml`文件中定义。以下是此类子活动的一个示例定义：\n\
  \n```\n<activity android:name=\".SubActivity\"\n    android:label=\"该子活动的名称\"\n\
  \    android:exported=\"false\"\n    android:theme=\"@android:style/Theme.NoTitleBar\"\
  \ />\n```\n\n在此处，并未指定任何意图过滤器——只包含了我们之前讨论过的活动的四个属性。当我们像这样定义一个活动时，它仅对自身应用可用。我们通过一种特殊的意图以编程方式启动此类活动；例如，当一个按钮在一个活动中被按下，以触发一个新活动打开时。我们将在后续章节中了解如何以编程方式启动一个活动。\n\
  \n总而言之，我们有一个活动为其指定了两个意图过滤器，使其成为应用程序的主入口点。对于所有其他活动，我们省略了意图过滤器规范，使其成为应用内部活动，并以编程方式启动它们。\n\
  \n**注意**\n\n如前所述，在我们的 Mr. Nom 游戏中，我们只会有一个活动。该活动将具有与之前展示完全相同的意图过滤器规范。我们之所以讨论如何指定多个活动，是因为我们即将创建一个包含多个活动的特殊示例应用程序。别担心——这会很简单。\n\
  \n### `<uses-permission>` 元素\n\n我们现在离开`<application>`元素，回到通常被定义为`<manifest>`元素子元素的元素。其中一个元素就是`<uses-permission>`元素。\n\
  \nAndroid 拥有一个精细的安全模型。每个应用程序在其自己的进程和虚拟机（VM）中运行，拥有自己的 Linux 用户和组，并且不能影响其他应用程序。Android\
  \ 还限制了对系统资源的使用，例如网络设施、SD 卡和音频录制硬件。如果我们的应用程序想要使用这些系统资源中的任何一个，我们必须请求权限。这是通过`<uses-permission>`元素来完成的。\n\
  \n一个权限通常具有以下形式，其中`string`指定了我们希望被授予的权限名称：\n\n```\n<uses-permission android:name=\"\
  string\" />\n```\n\n以下是一些可能会派上用场的权限名称：\n\n*   `android.permission.RECORD_AUDIO`：授予我们访问音频录制硬件的权限。\n\
  *   `android.permission.INTERNET`：授予我们访问所有网络 API 的权限，以便我们能够，例如，从互联网获取图片或上传高分。\n\
  *   `android.permission.WRITE_EXTERNAL_STORAGE`：允许我们在外部存储（通常是设备的 SD 卡）上读写文件。\n*\
  \   `android.permission.WAKE_LOCK`：允许我们获取一个唤醒锁。有了这个唤醒锁，即使屏幕在一段时间内未被触摸，我们也能防止设备进入睡眠状态。例如，在仅由加速度计控制的游戏中就可能发生这种情况。\n\
  *   `android.permission.ACCESS_COARSE_LOCATION`：这是一个非常有用的权限，因为它允许您获取非 GPS 级别的访问权限，例如获取用户所在的国家/地区，这对于语言默认设置和分析非常有用。\n\
  *   `android.permission.NFC`：允许应用程序通过近场通信（NFC）执行 I/O 操作，这对于涉及快速交换少量信息的各种游戏功能非常有用。\n\
  \n因此，为了访问网络 API，我们需要在`<manifest>`元素下指定以下子元素：\n\n```\n<uses-permission android:name=\"\
  android.permission.INTERNET\" />\n```\n\n对于任何额外的权限，我们只需添加更多的`<uses-permission>`元素。您可以指定的权限远不止于此列表；我们再次建议您参考官方\
  \ Android 文档。我们只需要刚刚讨论过的这些。\n\n忘记添加某些权限（例如访问 SD 卡的权限）是常见的错误来源。这通常表现为设备日志中的一条消息，因此可能会因为日志中的大量信息而被忽略。对于其他权限，如果您尝试使用它们而未检查用户是否已授予该权限，应用程序将会崩溃。在后续章节中，我们将更详细地描述日志。请思考您的游戏将需要的权限，并在最初创建项目时就指定它们。\n\
  \n另外需要注意的一点是，由于我们将使用 Nougat——它利用运行时权限——用户在运行您的游戏时，将被要求接受或拒绝每个权限。许多用户不会注意这些，并且会愉快地安装他们能找到的任何东西。有些用户则对自己的决定更加谨慎，会详细审查权限。如果您请求可疑的权限，例如发送短信或获取用户位置的能力，当您的应用程序在\
  \ Google Play 上时，您可能会在评论区收到用户一些尖锐的反馈。如果您必须使用这些有问题的权限之一，您的应用描述也应该告诉用户您为何使用它。最好的做法是首先避免这些权限，或者提供合法使用这些权限的功能。\n\
  \n### `<uses-feature>` 元素\n\n如果您自己是 Android 用户，并且拥有一台搭载像 1.5 这样旧版 Android 系统的旧设备，您会注意到一些很棒的应用程序不会出现在您设备上的\
  \ Google Play 应用中。其中一个原因可能是应用程序的清单文件中使用了`<uses-feature>`元素。\n\nGoogle Play 应用会根据您的硬件配置文件过滤所有可用应用程序。使用`<uses-feature>`元素，应用程序可以指定它需要哪些硬件特性；例如，多点触控或对\
  \ OpenGL ES 2.0 的支持。任何不具备指定特性的设备都将触发该过滤器，以便最终用户一开始就不会看到该应用程序。\n\n一个`<uses-feature>`元素具有以下属性：\n\
  \n```\n<uses-feature android:name=\"android.hardware.touchscreen.multitouch\"\n\
  \    android:required=\"true\" />\n```\n\n`name` 属性指定了该特性本身。`required` 属性告知过滤器我们是否在所有情况下都确实需要该特性，或者它仅仅是锦上添花。最后一个属性是可选的，仅当需要特定的\
  \ OpenGL ES 版本时才使用。\n\n对于游戏开发者来说，以下特性最为相关：\n\n*   `android.hardware.touchscreen.multitouch`：要求设备具备能够处理基本多点触控交互（如捏合缩放等）的多点触控屏幕。这类屏幕在独立跟踪多个手指方面存在问题，因此您必须评估这些能力是否足以满足您的游戏需求。\n\
  *   `android.hardware.touchscreen.multitouch.distinct`：这是前一个特性的“大哥”。它要求具备完整的多点触控能力，适用于实现诸如屏幕虚拟双摇杆控制等功能。\n\
  \n我们将在本章后面部分探讨多点触控。现在，只需记住：当我们的游戏需要多点触控屏幕时，我们可以通过指定一个包含上述某个特性名称的`<uses-feature>`元素来剔除所有不支持该特性的设备，如下所示：\n\
  \n```\n<uses-feature android:name=\"android.hardware.touchscreen.multitouch\" android:required=\"\
  true\" />\n```\n\n\n游戏开发者需要做的另一件有用的事是指定所需的 OpenGL ES 版本。在本书中，我们将关注 OpenGL ES 1（我们将在第\
  \ 7 章解释原因）。以下是具体做法：\n\n```\n<uses-feature android:glEsVersion=”0x00010000″ />\n\
  ```\n\n这将使我们的游戏仅显示在支持 OpenGL ES 1 的设备上，因此可以假设这些设备拥有相当强大的图形处理器。\n\n假设你想为游戏提供可选的 USB\
  \ 外设支持，使设备充当 USB 主机，并连接手柄或其他外设。正确的处理方式是添加以下内容：\n\n```\n<uses-feature android:name=”android.hardware.usb.host”\
  \ android:required=”false” />\n```\n\n将 `android:required` 设置为 `false` 相当于告诉 Google\
  \ Play：“我们可能会使用此功能，但下载和运行游戏并非必须。”声明可选硬件功能的使用，是让你的游戏能够适应未来可能遇到的各种硬件的好方法。这允许制造商将提供的应用限制为仅那些已声明支持其特定硬件的应用；而如果你声明了可选支持，你的游戏就会包含在可为该设备下载的应用列表中。\n\
  \n现在，你在硬件方面的每一个具体需求都可能会减少能安装你游戏的设备数量，这将直接影响你的销量。在指定上述任何选项之前，请三思。\n\n## 六步轻松完成游戏项目设置\n\
  \n现在，让我们结合以上所有信息，制定一个在 Android Studio 中创建新 Android 游戏项目的简单分步方法。以下是我们的项目需求：\n\n-\
  \ 能够使用最新 SDK 版本的功能，同时保持与某些旧设备仍在使用的最低 SDK 版本兼容。这意味着我们希望支持 Android 4.3 及以上版本。\n- 在可能的情况下安装到\
  \ SD 卡，以免占满设备的内部存储空间。\n- 应有一个单一的主 Activity 来处理所有配置更改，这样当硬件键盘弹出或设备方向改变时，它不会被销毁。\n\
  - Activity 应固定为竖屏或横屏模式。\n- 应允许我们访问 SD 卡。\n- 应允许我们获取唤醒锁。\n\n利用你刚刚获得的信息，这些是很容易实现的目标。步骤如下：\n\
  \n1.  在 Android Studio 中，通过打开“创建新项目”向导来创建一个新的 Android 项目，如第 2 章所述。\n2.  项目创建后，打开\
  \ `AndroidManifest.xml` 文件。\n3.  为了使 Android 在 SD 卡可用时将游戏安装到 SD 卡，请将 `installLocation`\
  \ 属性添加到 `<manifest>` 元素，并将其设置为 `preferExternal`。\n4.  要固定 Activity 的方向，请将 `screenOrientation`\
  \ 属性添加到 `<activity>` 元素，并指定你想要的方位（`portrait` 或 `landscape`）。\n5.  要告诉 Android 我们希望处理\
  \ `keyboard`、`keyboardHidden` 和 `orientation` 配置更改，请将 `<activity>` 元素的 `configChanges`\
  \ 属性设置为 `keyboard|keyboardHidden|orientation`。\n6.  将两个 `<uses-permission>` 元素添加到\
  \ `<manifest>` 元素，并分别指定 `name` 属性为 `android.permission.WRITE_EXTERNALSTORAGE` 和\
  \ `android.permission.WAKE_LOCK`。\n\n完成了！只需六个简单步骤，即可生成一个完全定义的应用程序，它将安装到 SD 卡，具有固定方向，不会因配置更改而崩溃，允许你访问\
  \ SD 卡和唤醒锁，并且可以在从 4.3 到最新版本的所有 Android 版本上运行。执行上述步骤后，最终的 `AndroidManifest.xml` 内容如下：\n\
  \n```\n<?xml version=”1.0″ encoding=”utf-8″?>\n<manifest xmlns:android=”http://schemas.android.com/apk/res/android”\n\
  \    package=”com.yourcompany.yourapp”\n    android:installLocation=”preferExternal”\
  \ >\n    <uses-permission android:name=”android.permission.WRITE_EXTERNAL_STORAGE”\
  \ />\n    <uses-permission android:name=”android.permission.WAKE_LOCK” />\n    <application\n\
  \        android:icon=”@mipmap/ic_launcher”\n        android:label=”@string/app_name”\
  \ >\n        <activity\n            android:name=”.MainActivity”\n            android:label=”@string/app_name”\n\
  \            android:configChanges=”keyboard|keyboardHidden|orientation”\n     \
  \       android:screenOrientation=”portrait” >\n            <intent-filter>\n  \
  \              <action android:name=”android.intent.action.MAIN” />\n          \
  \      <category android:name=”android.intent.category.LAUNCHER” />\n          \
  \  </intent-filter>\n        </activity>\n    </application>\n</manifest>\n```\n\
  \n正如你所见，我们删除了 `<application>` 和 `<activity>` 元素中 `label` 属性里的 `@string/app_name`。这并不是必须的，但将应用程序定义放在一个地方更可取。从现在开始，一切就看代码了！或者不是吗？\n\
  \n## Google Play 过滤器\n\nAndroid 设备种类繁多，功能各异，硬件制造商有必要只允许兼容的应用程序在其设备上下载和运行；否则，用户尝试运行一个与其设备不兼容的应用时，会带来糟糕的体验。为了解决这个问题，Google\
  \ Play 会从特定设备的可用应用列表中过滤掉不兼容的应用。例如，如果你的设备没有摄像头，而你搜索一个需要摄像头的游戏，那么它根本不会显示。不管好坏，对于用户来说，这个应用就好像根本不存在一样。\n\
  \n我们之前讨论过的许多清单元素都被用作过滤器，包括 `<uses-feature>` 和 `<uses-permission>`。以下是另外三个特定于过滤器的元素，你应该牢记：\n\
  \n- `<supports-screens>`：这允许你声明你的游戏可以运行的屏幕尺寸和密度。理想情况下，你的游戏能在所有屏幕上运行，我们将会展示如何确保这一点。但是，在清单文件中，你最好为每一种可能的屏幕尺寸显式声明支持。\n\
  - `<uses-configuration>`：这允许你显式声明对设备上的输入配置类型的支持，例如硬键盘、QWERTY 专用键盘、触摸屏或轨迹球导航输入。理想情况下，你会支持所有这些输入方式，但如果你的游戏需要非常特定的输入方式，你应该了解并使用此标签在\
  \ Google Play 上进行过滤。\n- `<uses-library>`：这允许声明你的游戏所依赖的第三方库必须存在于设备上。例如，你可能需要一个很大的但很常见的文字转语音库。使用此标签声明该库，可确保只有安装了该库的设备才能看到并下载你的游戏。一个常见的用途是让基于\
  \ GPS/地图的游戏仅在安装了 Google Maps 库的设备上运行。\n\n随着 Android 的发展，可能会出现更多的过滤器标签，因此请务必在发布前查看官方\
  \ Google Play 过滤器页面 [`http://developer.android.com/guide/google/play/filters.html`](http://developer.android.com/guide/google/play/filters.html)，以获取最新信息。\n\
  \n## 定义游戏图标\n\n当你将游戏部署到设备并打开应用启动器时，你会看到它的条目有一个漂亮但并不独特的 Android 图标。在 Google Play\
  \ 上，你的游戏也会显示相同的图标。如何将其更改为自定义图标呢？\n\n仔细看看 `<application>` 元素。我们在其中定义了一个名为 `icon`\
  \ 的属性。它引用 `res/mipmap-xxx` 目录中名为 `icon` 的图像。因此，该怎么做就很明显了：将 `mipmap` 文件夹中的图标图像替换为你自己的图标图像。\n\
  \n按照六个简单步骤创建 Android 项目后，你将在 `res/` 文件夹中看到类似于图 4-1 的内容。\n\n![A340874_3_En_4_Fig1_HTML.jpg](img/A340874_3_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1.** 我的 `res/` 文件夹怎么了？\n\n\n\n我们已经在第 1 章中看到设备有不同的尺寸，但我们没有讨论 Android 如何处理这些不同的尺寸。事实上，Android\
  \ 有一套精巧的机制，允许你为一组屏幕密度定义图形资源。屏幕密度是物理屏幕尺寸和屏幕像素数量的结合。我们将在第 5 章中更详细地探讨这个主题。目前，只需知道 Android\
  \ 定义了五种密度：`mdpi`（标准密度屏幕）、`hdpi`（高密度屏幕）和`xhdpi`（超高密度屏幕）；随后是超超高密度和超超超高密度（分别为 480dpi\
  \ 和 640dpi）。对于标准屏幕，我们通常使用较小的图像，而对于更高密度的屏幕，则使用高分辨率资源。\n\n因此，对于我们的图标，需要提供五个版本：每种密度一个。但是每个版本的大小应该是多少？幸运的是，在`res/mipmap`文件夹中已经有默认图标，我们可以用来逆向工程我们自己图标的大小。`res/mipmap-mdpi`中的图标分辨率为\
  \ 48×48 像素；`res/mipmap-hdpi`中的图标分辨率为 72×72 像素；`res/mipmap-xhdpi`中的图标分辨率为 96×96 像素；`res/mipmap-xxhdpi`文件夹中的图标分辨率为\
  \ 144×144；最后，`res/mipmap-xxxhdpi`文件夹中的图标分辨率为 192×192。我们需要做的就是创建具有相同分辨率的自定义图标版本，并将每个文件夹中的`ic_launcher.png`文件替换为我们自己的`ic_launcher.png`文件。只要我们将图标图像文件命名为`ic_launcher.png`，就可以保持清单文件不变。请注意，清单文件中的文件引用是区分大小写的。资源文件始终使用全小写字母。\n\
  \n最后，我们已准备好进行一些 Android 编码。\n\n## Android API 基础\n\n在本章的剩余部分，我们将专注于使用与我们游戏开发需求相关的\
  \ Android API。为此，我们将做一些相当方便的事情：设置一个测试项目，该项目将包含我们即将使用的不同 API 的所有小测试示例。让我们开始吧。\n\n\
  ## 创建测试项目\n\n从前面的章节中，我们已经知道如何设置我们所有的项目。因此，我们要做的第一件事是执行前面概述的八个步骤。创建一个名为`Ch04 Android\
  \ Basics`的应用程序，使用包名`androidgames.badlogic.com`，并带有一个名为`MainActivity`的主活动。我们将使用一些较旧和较新的\
  \ API，因此我们将最低 SDK 版本设置为 18（Android 4.3）。对于其他设置，例如应用程序的标题，您可以填写任意值。从现在开始，我们要做的就是创建新的活动实现，每个实现演示\
  \ Android API 的一部分。\n\n然而，请记住我们只有一个主活动。那么，我们的主活动应该是什么样的？我们想要一种方便的方法来添加新活动，并且希望能够轻松启动特定活动。对于一个主活动，它应该清楚该活动将提供一种启动特定测试活动的方法。如前所述，主活动将在清单文件中被指定为主要入口点。我们添加的每个额外活动都将不带`<intent-filter>`子元素进行指定。我们将从主活动以编程方式启动它们。\n\
  \n### `AndroidBasicsStarter` 活动\n\nAndroid API 为我们提供了一个名为`ListActivity`的特殊类，它派生自我们在\
  \ Hello World 项目中使用的`Activity`类。`ListActivity`类是一种特殊类型的活动，其唯一目的是显示事物列表（例如，字符串）。我们用它来显示测试活动的名称。当我们触摸列表项之一时，我们将以编程方式启动相应的活动。清单\
  \ 4-1 显示了我们的`AndroidBasicsStarter`主活动的代码。\n\n```java\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import android.app.ListActivity;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.widget.ArrayAdapter;\nimport android.widget.ListView;\n\
  public class MainActivity extends ListActivity {\n    String tests[] = { \"LifeCycleTest\"\
  , \"SingleTouchTest\", \"MultiTouchTest\",\n    \"KeyTest\", \"AccelerometerTest\"\
  , \"AssetsTest\",\n    \"ExternalStorageTest\", \"SoundPoolTest\", \"MediaPlayerTest\"\
  ,\n    \"FullScreenTest\", \"RenderViewTest\", \"ShapeTest\", \"BitmapTest\",\n\
  \    \"FontTest\", \"SurfaceViewTest\" };\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setListAdapter(new ArrayAdapter(this,\n\
  \        android.R.layout.simple_list_item_1, tests));\n    }\n    @Override\n \
  \   protected void onListItemClick(ListView list, View view, int position,\n   \
  \ long id) {\n        super.onListItemClick(list, view, position, id);\n       \
  \ String testName = tests[position];\n        try {\n            Class clazz = Class.forName(\"\
  com.badlogic.androidgames.ch04androidbasics.\" + testName);\n            Intent\
  \ intent = new Intent(this, clazz);\n            startActivity(intent);\n      \
  \  } catch (ClassNotFoundException e) {\n            e.printStackTrace();\n    \
  \    }\n    }\n}\n```\n*清单 4-1. `AndroidBasicsStarter.java`，我们负责列出并启动所有测试的主活动*\n\
  \n我们选择的包名是`com.badlogic.androidgames.ch04androidbasics`。导入应该也很容易解释；它们只是我们将要在代码中使用的所有类。我们的`MainActivity`类派生自`ListActivity`类——仍然没什么特别的。字段`tests`是一个字符串数组，保存了我们的启动器应用程序应显示的所有测试活动的名称。请注意，该数组中的名称是我们稍后将实现的活动类的确切\
  \ Java 类名。\n\n下一段代码应该很熟悉；它是`onCreate()`方法，我们为每个活动实现该方法，并且当活动创建时会被调用。\n\n抛开这些，接下来我们调用一个名为`setListAdapter()`的方法。这个方法是由它派生出的`ListActivity`类提供给我们的。它允许我们指定希望`ListActivity`类为我们显示的列表项。这些需要以实现了`ListAdapter`接口的类实例的形式传递给该方法。我们使用方便的`ArrayAdapter`类来实现这一点。该类的构造函数接受三个参数：第一个是我们的上下文，第二个我们将在下一段中解释，第三个是`ListActivity`应该显示的数组项。我们愉快地为第三个参数指定了之前定义的`tests`数组，这就完成了。\n\
  \n\n\n#### 那么，`ArrayAdapter` 构造函数的第二个参数到底是什么？\n\n要解释这个问题，我们得深入探讨 Android UI 相关的\
  \ API，但本书并不会用到这些内容。因此，与其浪费篇幅介绍我们不需要的东西，不如直接给你一个简单粗暴的说明：列表中的每一项都是通过一个 `View` 来显示的。这个参数定义了每个\
  \ `View` 的布局及其类型。`android.R.layout.simple_list_item_1` 是 UI API 提供的一个预定义常量，用于快速启动和运行。它代表一个标准的列表项\
  \ `View`，用于显示文本。简单回顾一下，`View` 是 Android 上的 UI 组件，比如按钮、文本框或滑块。在剖析第 2 章的 `HelloWorldActivity`\
  \ 时，我们曾以 `Button` 实例的形式介绍过视图。\n\n如果我们的 Activity 只包含这个 `onCreate()` 方法，启动后就会看到类似图\
  \ 4-2 所示的屏幕。\n\n![A340874_3_En_4_Fig2_HTML.jpg](img/A340874_3_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 我们的测试启动 Activity，看起来花哨，但功能有限\n\n现在，让我们实现当触摸列表项时触发某个操作。我们想要启动对应所触摸列表项的 Activity。\n\
  \n## 以编程方式启动 Activity\n\n`ListActivity` 类有一个名为 `onListItemClick()` 的受保护方法，当点击列表项时会调用该方法。我们只需要在\
  \ `AndroidBasicsStarter` 类中重写这个方法即可。这正是我们在代码清单 4-1 中所做的。\n\n该方法的参数包括：`ListActivity`\
  \ 用来显示列表项的 `ListView`、被触摸且包含在该 `ListView` 中的 `View`、所触摸项在列表中的 `position`（位置），以及一个我们不太关心的\
  \ ID。我们真正关注的是 `position` 参数。\n\n`onListItemClicked()` 方法以良好的规范开头，首先调用基类方法。这是重写 Activity\
  \ 方法时总是推荐的做法。接着，我们根据 `position` 参数从 `tests` 数组中获取类名。这是解决问题的第一步。\n\n前面我们提到过，可以通过\
  \ Intent 以编程方式启动已在清单文件中定义的 Activity。`Intent` 类有一个简洁的构造函数用于此操作，它接受两个参数：一个 `Context`\
  \ 实例和一个 `Class` 实例。后者代表我们要启动的 Activity 的 Java 类。\n\n`Context` 是一个接口，为我们提供应用程序的全局信息。`Activity`\
  \ 类实现了该接口，所以我们只需将 `this` 引用传递给 `Intent` 构造函数即可。\n\n为了获取代表要启动的 Activity 的 `Class`\
  \ 实例，我们使用了少量反射技术。如果你用过 Java，应该对此比较熟悉。反射允许我们在运行时以编程方式检查、实例化和调用类。静态方法 `Class.forName()`\
  \ 接受一个字符串，其中包含我们要为其创建 `Class` 实例的类的完全限定名。我们稍后要实现的所有测试 Activity 都将位于 `com.badlogic.androidgames.ch04androidbasics`\
  \ 包中。将包名与从 `tests` 数组中获取的类名拼接起来，就能得到要启动的 `Activity` 类的完全限定名。我们将该名称传递给 `Class.forName()`，获得一个可用于\
  \ `Intent` 构造函数的 `Class` 实例。\n\n一旦构造好 `Intent` 实例，我们就可以通过调用 `startActivity()` 方法来启动它。该方法也定义在\
  \ `Context` 接口中。由于我们的 Activity 实现了该接口，我们只需调用它对该方法的实现。就这么简单！\n\n那么，我们的应用程序将如何表现呢？首先，会显示启动\
  \ Activity。每次触摸列表中的某个项，就会启动相应的 Activity。启动 Activity 将被暂停并进入后台。新 Activity 将由我们发出的\
  \ Intent 创建，并替换屏幕上的启动 Activity。当我们按下 Android 设备的返回键时，该 Activity 会被销毁，启动 Activity\
  \ 会恢复并重新占据屏幕。\n\n## 创建测试 Activity\n\n在创建新的测试 Activity 时，我们需要执行以下步骤：\n\n1.  在 `com.badlogic.androidgames.ch04androidbasics`\
  \ 包中创建对应的 Java 类，并实现其逻辑。\n2.  在清单文件中为 Activity 添加条目，并根据需要使用相应的属性（例如 `android:configChanges`\
  \ 或 `android:screenOrientation`）。注意，我们不会指定 `<intent-filter>` 元素，因为我们将以编程方式启动该 Activity。\n\
  3.  将 Activity 的类名添加到 `AndroidBasicsStarter` 类的 `tests` 数组中。\n\n只要遵循这一流程，其他所有事务都将由我们在\
  \ `AndroidBasicsStarter` 类中实现的逻辑自动处理。新 Activity 会自动出现在列表中，只需轻轻一触即可启动。\n\n你可能会好奇，触摸启动的测试\
  \ Activity 是否在自己的进程和虚拟机中运行。答案是否定的。由多个 Activity 组成的应用程序有一个称为 Activity 栈的结构。每次启动一个新\
  \ Activity，它就会被压入该栈中。当我们关闭新 Activity 时，最后压入栈中的 Activity 会被弹出并恢复，成为屏幕上新的活动 Activity。\n\
  \n这带来了一些其他影响。首先，应用程序中的所有 Activity（栈中暂停的 Activity 和当前活动的 Activity）共享同一个虚拟机。它们也共享同一个内存堆。这既可能是福音，也可能是诅咒。如果你的\
  \ Activity 中有静态字段，一旦它们启动，就会在堆上分配内存。作为静态字段，它们会存活于 Activity 销毁及后续的垃圾回收之后。如果粗心地使用静态字段，可能会导致严重的内存泄漏。在使用静态字段之前请三思。\n\
  \n如前所述，我们在实际游戏中只会使用单个 Activity。前面的 Activity 启动器是此规则的一个例外，目的是让我们的工作更轻松。但请放心，即使只有一个\
  \ Activity，我们也有很多机会遇到麻烦。\n\n> **注：** 这就是我们对 Android UI 编程的深入程度。从现在开始，我们将始终在 Activity\
  \ 中使用单个 `View` 来输出内容和接收输入。如果你想了解布局、视图组以及 Android UI 库提供的各种功能，建议你查阅 Grant Allen 的著作《Beginning\
  \ Android 4》（Apress, 2011），或者 Android 开发者网站上的优秀开发者指南。\n\n## Activity 的生命周期\n\n在为\
  \ Android 编程时，首先要弄清楚的是 Activity 的行为方式。在 Android 中，这被称为 Activity 的生命周期。它描述了 Activity\
  \ 可能经历的状态以及这些状态之间的转换。让我们先讨论其背后的理论。\n\n### 理论部分\n\n一个 Activity 可以处于以下三种状态之一：\n\n\
  * **运行中**：在此状态下，它是占据屏幕的顶层 Activity，直接与用户交互。\n\n\n\n*   `Paused`（暂停）：当 Activity 在屏幕上仍然可见，但被透明\
  \ Activity 或对话框部分遮挡，或者设备屏幕被锁定时，会发生此状态。暂停的 Activity 随时可能被 Android 系统终止（例如，由于内存不足）。请注意，Activity\
  \ 实例本身仍在虚拟机堆中活跃运行，并等待恢复为运行状态。\n*   `Stopped`（停止）：当 Activity 被另一个 Activity 完全遮挡，从而在屏幕上不再可见时，会发生此状态。例如，如果我们启动一个测试\
  \ Activity，`AndroidBasicsStarter` Activity 就会处于此状态。当用户按下主页按钮暂时返回主屏幕时，也会发生此状态。如果内存不足，系统可能再次决定完全终止该\
  \ Activity 并将其从内存中移除。\n\n在暂停和停止状态下，Android 系统都可能随时决定终止 Activity。它既可以礼貌地通过调用其 `finished()`\
  \ 方法先通知 Activity，也可以不礼貌地直接静默终止 Activity 的进程。\n\nActivity 可以从暂停或停止状态恢复到运行状态。再次注意，当\
  \ Activity 从暂停或停止状态恢复时，它在内存中仍是同一个 Java 实例，因此所有状态和成员变量都与 Activity 暂停或停止之前完全相同。\n\n\
  Activity 有一些我们可以重写以获取状态变化信息的保护方法：\n\n*   `Activity.onCreate()`：当我们的 Activity 首次启动时调用。在这里，我们设置所有\
  \ UI 组件并接入输入系统。在 Activity 的生命周期中，此方法只会被调用一次。\n*   `Activity.onRestart()`：当 Activity\
  \ 从停止状态恢复时调用。它位于 `onStop()` 调用之后。\n*   `Activity.onStart()`：在 `onCreate()` 之后或当\
  \ Activity 从停止状态恢复时调用。在后一种情况下，它位于 `onRestart()` 调用之后。\n*   `Activity.onResume()`：在\
  \ `onStart()` 之后或当 Activity 从暂停状态恢复时调用（例如，当屏幕解锁时）。\n*   `Activity.onPause()`：当 Activity\
  \ 进入暂停状态时调用。这可能是我们收到的最后一次通知，因为 Android 系统可能决定静默终止我们的应用。我们应该在此方法中保存所有想要持久化的状态！\n\
  *   `Activity.onStop()`：当 Activity 进入停止状态时调用。它位于 `onPause()` 调用之后。这意味着 Activity\
  \ 在暂停之前已经停止。与 `onPause()` 一样，这可能是我们在 Android 系统静默终止 Activity 之前收到的最后一次通知。我们也可以在此处保存持久状态。但是，系统可能决定不调用此方法而直接终止\
  \ Activity。由于 `onPause()` 总是在 `onStop()` 之前且 Activity 被静默终止之前调用，我们更应该在 `onPause()`\
  \ 方法中保存所有内容。\n*   `Activity.onDestroy()`：在 Activity 生命周期结束时，当 Activity 被不可逆地销毁时调用。这是我们能持久化任何信息以在下次\
  \ Activity 重新创建时恢复的最后机会。请注意，如果系统在调用 `onPause()` 或 `onStop()` 之后静默销毁了 Activity，此方法实际上可能永远不会被调用。\n\
  \n图 4-3 展示了 Activity 生命周期和方法调用顺序。\n\n![A340874_3_En_4_Fig3_HTML.jpg](img/A340874_3_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3.\n\n强大而令人困惑的 Activity 生命周期\n\n以下是我们应从中学到的三个重要经验：\n\n1.  在我们的 Activity 进入运行状态之前，无论我们是从停止状态还是暂停状态恢复，`onResume()`\
  \ 方法总会被调用。因此，我们可以安全地忽略 `onRestart()` 和 `onStart()` 方法。我们不关心是从停止状态还是暂停状态恢复。对于我们的游戏，我们只需要知道我们现在确实在运行，而\
  \ `onResume()` 方法向我们发出了这个信号。\n2.  在 `onPause()` 之后，Activity 可能被静默销毁。我们绝不应该假设 `onStop()`\
  \ 或 `onDestroy()` 一定会被调用。我们也知道 `onPause()` 总是在 `onStop()` 之前被调用。因此，我们可以安全地忽略 `onStop()`\
  \ 和 `onDestroy()` 方法，只需重写 `onPause()`。在此方法中，我们必须确保所有想要持久化的状态（如最高分和关卡进度）都被写入外部存储（例如\
  \ SD 卡）。在 `onPause()` 之后，一切都无法保证，我们不知道我们的 Activity 是否还有机会再次运行。\n3.  我们知道，如果系统决定在\
  \ `onPause()` 或 `onStop()` 之后终止 Activity，`onDestroy()` 可能永远不会被调用。然而，有时我们想知道 Activity\
  \ 是否真的要被终止。那么，如果 `onDestroy()` 不会被调用，我们该如何做呢？`Activity` 类有一个名为 `Activity.isFinishing()`\
  \ 的方法，我们可以随时调用它来检查我们的 Activity 是否要被终止。我们至少可以保证在 Activity 被终止之前，`onPause()` 方法会被调用。我们只需要在\
  \ `onPause()` 方法内调用这个 `isFinishing()` 方法，就能判断 Activity 在 `onPause()` 调用之后是否即将结束。\n\
  \n这让事情变得简单多了。我们只需重写 `onCreate()`、`onResume()` 和 `onPause()` 方法。\n\n*   在 `onCreate()`\
  \ 中，我们设置窗口以及用于渲染和接收输入的 UI 组件。\n*   在 `onResume()` 中，我们（重新）启动主循环线程（在第 3 章中讨论）。\n\
  *   在 `onPause()` 中，我们只需暂停我们的主循环线程，并且如果 `Activity.isFinishing()` 返回 `true`，我们还将任何想要持久化的状态保存到磁盘。\n\
  \n许多人在 Activity 生命周期中挣扎，但如果我们遵循这些简单的规则，我们的游戏将能够处理暂停、恢复和清理工作。\n\n#### 实践\n\n让我们编写第一个测试示例来演示\
  \ Activity 生命周期。我们想要某种输出来显示到目前为止发生了哪些状态变化。我们将通过两种方式来实现：\n\n1.  Activity 将显示的唯一 UI\
  \ 组件是一个 `TextView`。顾名思义，它显示文本，我们在之前的主页 Activity 中隐式地使用它来显示每个条目。每次我们进入一个新状态时，我们都会向\
  \ `TextView` 追加一个字符串，它将显示到目前为止发生的所有状态变化。\n2.  我们无法在 `TextView` 中显示 Activity 的销毁事件，因为它会从屏幕上消失得太快，所以我们也会将所有状态变化输出到\
  \ `logcat`。我们使用 `Log` 类来实现，它提供了一些向 `logcat` 追加消息的静态方法。\n\n还记得我们需要做什么来向测试应用添加一个测试\
  \ Activity 吗？首先，我们在清单文件中以 `<activity>` 元素的形式定义它，该元素是 `<application>` 元素的子元素：\n\n\
  ```\n<activity>...</activity>\n```\n\n接下来，我们向 `com.badlogic.androidgames.ch04androidbasics`\
  \ 包中添加一个名为 `LifeCycleTest` 的新 Java 类。最后，我们将该类名称添加到我们之前定义的 `AndroidBasicsStarter`\
  \ 类的 `tests` 成员中。（当然，在我们之前为了演示目的编写该类时，它已经在那里了。）\n\n\n\n我们必须在接下来的章节中为任何创建的活动重复所有这些步骤。为简洁起见，我们不再赘述这些步骤。另外请注意，我们没有为`LifeCycleTest`活动指定方向。在此示例中，根据设备方向，我们可以处于横屏模式或竖屏模式。我们这样做是为了让您能够看到方向变化对生命周期的影响（由于我们设置了`configChanges`属性，所以没有影响）。清单\
  \ 4-2 展示了整个活动的代码。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics.ch04androidbasics;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\nimport\
  \ android.util.Log;\nimport android.widget.TextView;\npublic class LifeCycleTest\
  \ extends AppCompatActivity {\nStringBuilder builder = new StringBuilder();\nTextView\
  \ textView;\nprivate void log(String text) {\nLog.d(\"LifeCycleTest\", text);\n\
  builder.append(text);\nbuilder.append('\\n');\ntextView.setText(builder.toString());\n\
  }\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  textView = new TextView(this);\ntextView.setText(builder.toString());\nsetContentView(textView);\n\
  log(\"created\");\n}\n@Override\nprotected void onResume() {\nsuper.onResume();\n\
  log(\"resumed\");\n}\n@Override\nprotected void onPause() {\nsuper.onPause();\n\
  log(\"paused\");\nif (isFinishing()) {\nlog(\"finishing\");\n}\n}\n}\n```\n\n 清单\
  \ 4-2. `LifeCycleTest.java`，演示活动生命周期\n\n让我们快速浏览一下这段代码。该类继承自`AppCompatActivity`。该活动最初是在\
  \ SDK 22 中提供的，用于兼容 21 及更早版本。我们定义了两个成员：一个`StringBuilder`，它将保存到目前为止产生的所有消息；以及`TextView`，我们用它直接在活动中显示这些消息。\n\
  \n接下来，我们定义一个私有辅助方法，该方法会将文本记录到 logcat，将其追加到`StringBuilder`中，并更新`TextView`的文本。对于 logcat\
  \ 输出，我们使用静态的`Log.d()`方法，该方法接受一个标签作为第一个参数，实际消息作为第二个参数。\n\n在`onCreate()`方法中，我们首先调用父类方法。我们创建`TextView`并将其设置为活动的内容视图。它将填充活动的整个空间。最后，我们将“created”消息记录到\
  \ logcat，并使用之前定义的辅助方法`log()`更新`TextView`的文本。\n\n接下来，我们重写活动的`onResume()`方法。与我们重写的任何活动方法一样，我们首先调用父类方法。我们所做的只是再次调用`log()`，并以`resumed`作为参数。\n\
  \n重写的`onPause()`方法看起来很像`onResume()`方法。我们首先将消息记录为“paused”。我们还想知道活动在`onPause()`方法调用后是否即将被销毁，因此我们检查了`Activity.isFinishing()`方法。如果它返回`true`，我们也会记录销毁事件。当然，我们将无法看到更新后的`TextView`文本，因为活动在屏幕显示更改之前就会被销毁。因此，我们也将所有内容输出到\
  \ logcat，如前所述。\n\n运行应用程序并稍微试验一下这个测试活动。以下是您可以执行的一系列操作：\n\n1.  从启动器活动启动测试活动。\n2. \
  \ 锁定屏幕。\n3.  解锁屏幕。\n4.  按主页按钮（这将带您回到主屏幕）。\n5.  从正在运行的应用程序列表中选择您的应用程序。\n6.  按返回按钮（这将带您回到启动器活动）。\n\
  \n如果您的系统在活动暂停时没有在任何时刻决定静默地杀死它，您将看到如图 4-4 所示的输出（当然，前提是您还没有按下返回按钮）。\n\n![A340874_3_En_4_Fig4_HTML.jpg](img/A340874_3_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4. 运行`LifeCycleTest`活动\n\n启动时，调用`onCreate()`，然后调用`onResume()`。当我们锁定屏幕时，调用`onPause()`。当我们解锁屏幕时，调用`onResume()`。当我们按主页按钮时，调用`onPause()`。返回活动将再次调用`onResume()`。相同的消息当然也会显示在\
  \ logcat 中，您可以在 Android Studio 的 logcat 视图中观察到。图 4-5 显示了在执行上述操作序列（加上按返回按钮）时我们写入\
  \ logcat 的内容。\n\n![A340874_3_En_4_Fig5_HTML.jpg](img/A340874_3_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. `LifeCycleTest`的 logcat 输出\n\n再次按返回按钮会调用`onPause()`方法。由于它也会销毁活动，`onPause()`中的`if`语句也会被触发，通知我们这是该活动的最后一次出现。\n\
  \n这就是活动生命周期，为我们的游戏编程需求进行了简化和揭秘。我们现在可以轻松处理任何暂停和恢复事件，并且保证在活动被销毁时收到通知。\n\n### 输入设备处理\n\
  \n如前面章节所述，我们可以从 Android 上的许多不同输入设备获取信息。在本节中，我们将讨论 Android 上最相关的四个输入设备以及如何处理它们：触摸屏、键盘、加速度计和指南针。\n\
  \n### 获取（多点）触摸事件\n\n触摸屏可能是从用户那里获取输入的最重要方式。直到 Android 2.0 版本，API 只支持处理单指触摸事件。多点触控是在\
  \ Android 2.0（SDK 版本 5）中引入的。多点触控事件报告被附加到单点触控 API 上，在可用性上产生了一些混合的结果。我们将首先研究处理所有 Android\
  \ 版本上可用的单点触控事件。\n\n#### 处理单点触控事件\n\n当我们在第 2 章中处理按钮上的点击时，我们看到监听器接口是 Android 向我们报告事件的方式。触摸事件也不例外。触摸事件被传递给我们注册到`View`的`OnTouchListener`接口实现。`OnTouchListener`接口只有一个方法：\n\
  \n```\nboolean onTouch (View v, MotionEvent event)\n```\n\n第一个参数是接收触摸事件的`View`。第二个参数是我们需要解析以获取触摸事件的内容。\n\
  \n`OnTouchListener`可以通过`View.setOnTouchListener()`方法注册到任何`View`实现。在将`MotionEvent`分派给`View`本身之前，会先调用`OnTouchListener`。我们可以在`onTouch()`方法的实现中通过返回`true`来向`View`指示我们已经处理了该事件。如果我们返回`false`，`View`本身将处理该事件。\n\
  \n`MotionEvent`实例有三个与我们相关的方法：\n\n*   `MotionEvent.getX()`和`MotionEvent.getY()`：这些方法报告触摸事件相对于`View`的\
  \ x 和 y 坐标。坐标系原点在视图的左上角，x 轴向右，y 轴向下。坐标以像素为单位。请注意，这些方法返回浮点数，因此坐标具有亚像素精度。\n*   `MotionEvent.getAction()`：该方法返回触摸事件的类型。它是一个整数，取`MotionEvent.ACTION_DOWN`、`MotionEvent.ACTION_MOVE`、`MotionEvent.ACTION_CANCEL`或`MotionEvent.ACTION_UP`之一的值。\n\
  \n\n\n听起来很简单，事实也确实如此。当手指触摸屏幕时，会触发`MotionEvent.ACTION_DOWN`事件。手指移动时，会触发类型为`MotionEvent.ACTION_MOVE`的事件。请注意，你始终会收到`MotionEvent.ACTION_MOVE`事件，因为手指无法保持绝对静止来避免触发它们。触摸传感器能够识别最细微的变化。当手指再次抬起时，会报告`MotionEvent.ACTION_UP`事件。如果用户触摸某个元素并将手指拖离该元素，从而未完成操作，则可能会发生`MotionEvent.ACTION_CANCEL`事件。不过，在开始实现我们的第一个游戏时，我们仍会处理它，并将其视为`MotionEvent.ACTION_UP`事件。\n\
  \n让我们编写一个简单的测试 Activity 来看看它在代码中是如何工作的。该 Activity 应在屏幕上显示手指的当前位置以及事件类型。清单 4-3 展示了我们设计的内容。\n\
  \n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\nimport android.support.v7.app.AppCompatActivity;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.MotionEvent;\n\
  import android.view.View;\nimport android.view.View.OnTouchListener;\nimport android.widget.TextView;\n\
  \npublic class SingleTouchTest extends Activity implements OnTouchListener {\n \
  \   StringBuilder builder = new StringBuilder();\n    TextView textView;\n\n   \
  \ public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        textView = new TextView(this);\n        textView.setText(\"Touch and drag\
  \ (one finger only)!\");\n        textView.setOnTouchListener(this);\n        setContentView(textView);\n\
  \    }\n\n    public boolean onTouch(View v, MotionEvent event) {\n        builder.setLength(0);\n\
  \        switch (event.getAction()) {\n            case MotionEvent.ACTION_DOWN:\n\
  \                builder.append(\"down, \");\n                break;\n         \
  \   case MotionEvent.ACTION_MOVE:\n                builder.append(\"move, \");\n\
  \                break;\n            case MotionEvent.ACTION_CANCEL:\n         \
  \       builder.append(\"cancel, \");\n                break;\n            case\
  \ MotionEvent.ACTION_UP:\n                builder.append(\"up, \");\n          \
  \      break;\n        }\n        builder.append(event.getX());\n        builder.append(\"\
  , \");\n        builder.append(event.getY());\n        String text = builder.toString();\n\
  \        Log.d(\"TouchTest\", text);\n        textView.setText(text);\n        return\
  \ true;\n    }\n}\n```\n\n清单 4-3. `SingleTouchTest.java`：测试单点触摸处理\n\n我们让 Activity\
  \ 实现了`OnTouchListener`接口。我们还有两个成员变量：一个用于`TextView`，另一个是`StringBuilder`，用于构建事件字符串。\n\
  \n`onCreate()`方法不言自明。唯一的新颖之处在于调用了`TextView.setOnTouchListener()`，在此处我们向`TextView`注册了\
  \ Activity，以便它能接收`MotionEvents`。\n\n剩下的就是`onTouch()`方法的实现。我们忽略了`view`参数，因为我们知道它一定就是`TextView`。我们只关心获取触摸事件类型，将标识该类型的字符串追加到`StringBuilder`中，添加触摸坐标，然后更新`TextView`的文本。仅此而已。我们还将事件记录到`logcat`中，以便查看事件发生的顺序，因为`TextView`只会显示我们处理的最后一个事件（每次调用`onTouch()`时，我们都会清空`StringBuilder`）。\n\
  \n`onTouch()`方法中有一个细微之处是`return`语句，我们返回了`true`。通常，我们会遵循监听器概念并返回`false`，以免干扰事件分发过程。但是，如果我们在示例中这样做，除了`MotionEvent.ACTION_DOWN`事件之外，我们将收不到任何其他事件。因此，我们告诉`TextView`我们刚刚消费了这个事件。这种行为在不同的`View`实现中可能会有所不同。幸运的是，在本书的其余部分，我们只需要另外三个视图，而且它们会很乐意让我们消费我们想要的任何事件。\n\
  \n如果在模拟器或连接的设备上启动该应用程序，我们会看到`TextView`始终显示报告给`onTouch()`方法的最后一个事件类型和位置。此外，你可以在`logcat`中看到相同的消息。\n\
  \n我们没有在清单文件中固定 Activity 的方向。如果旋转设备使 Activity 处于横屏模式，坐标系统当然会发生变化。图 4-6 显示了竖屏模式（左）和横屏模式（右）下的\
  \ Activity。在这两种情况下，我们都试图触摸`View`的中间位置。请注意 x 和 y 坐标似乎如何互换。该图还显示了这两种情况下的 x 和 y 轴（黄色线条），以及我们大致触摸到的屏幕上的点（绿色圆圈）。在这两种情况下，原点都在`TextView`的左上角，x\
  \ 轴指向右，y 轴指向下。\n\n![A340874_3_En_4_Fig6_HTML.jpg](img/A340874_3_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 在竖屏和横屏模式下触摸屏幕\n\n当然，取决于方向，我们的最大 x 和 y 值会发生变化。由于触摸坐标是相对于视图给出的，并且视图并没有填满整个屏幕，所以我们的最大\
  \ y 值将小于屏幕分辨率的高度。稍后我们将看到如何启用全屏模式，以便标题栏和通知栏不会妨碍我们。\n\n遗憾的是，在较老的 Android 版本和第一代设备上，触摸事件存在一些问题：\n\
  \n- **触摸事件洪流**：当手指按下触摸屏时，驱动程序会尽可能多地报告触摸事件——在某些设备上，每秒可达数百次。我们可以通过在`onTouch()`方法中添加一个`Thread.sleep(16)`调用来解决这个问题，这将使分发这些事件的\
  \ UI 线程休眠 16 毫秒。这样，我们每秒最多收到 60 个事件，这对于一个响应迅速的游戏来说已经绰绰有余。\n\n- **触摸屏幕消耗 CPU**：即使我们在`onTouch()`方法中休眠，系统也必须在内核中处理驱动程序报告的事件。在较旧的设备上，例如\
  \ Hero 或 G1，这可能会消耗高达 50% 的 CPU，给我们的主循环线程留下的处理能力就少得多了。结果，我们原本完美的帧率会大幅下降，有时甚至会导致游戏无法运行。在第二代设备上，这个问题要小得多，通常可以忽略。遗憾的是，在较旧的设备上没有解决方案。\n\
  \n### 处理多点触摸事件\n\n警告：前方剧痛！多点触摸 API 是附加到`MotionEvent`类上的，该类最初只处理单点触摸。这使得解码多点触摸事件时会非常混乱。让我们试着理清头绪。\n\
  \n处理多点触摸事件与处理单点触摸事件非常相似。我们仍然实现之前为单点触摸事件实现的`OnTouchListener`接口。我们还会得到一个`MotionEvent`实例，从中读取数据。我们也处理之前处理过的事件类型，比如`MotionEvent.ACTION_UP`，再加上一些不太复杂的新类型。\n\
  \n#### 指针 ID 和索引\n\n处理多点触摸事件和处理单点触摸事件之间的区别始于我们想要访问触摸事件的坐标时。`MotionEvent.getX()`和`MotionEvent.getY()`返回屏幕上单个手指的坐标。当处理多点触摸事件时，我们使用这些方法的重载变体，它们接受一个指针索引。这可能如下所示：\n\
  \n```\nevent.getX(pointerIndex);\nevent.getY(pointerIndex);\n```\n\n\n\n现在，你可能会认为\
  \ `pointerIndex` 直接对应触摸屏幕的某个手指（例如，最先触摸的手指对应 `pointerIndex` 0，随后触摸的手指对应 `pointerIndex`\
  \ 1，以此类推）。但遗憾的是，实际情况并非如此。\n\n`pointerIndex` 是 `MotionEvent` 内部数组的索引，这些数组保存了屏幕上特定触摸手指的事件坐标。屏幕上手指的真实标识符被称为指针标识符（pointer\
  \ identifier）。指针标识符是一个随机数，它唯一标识了触摸屏幕的一个指针实例。有一个名为 `MotionEvent.getPointerIdentifier(int\
  \ pointerIndex)` 的独立方法，可以根据指针索引返回指针标识符。只要手指接触屏幕，其指针标识符就会保持不变。但指针索引却未必如此。理解这两者之间的区别至关重要，并且要明白你不能依赖第一次触摸的索引是\
  \ 0 且 ID 是 0，因为在某些设备上，特别是初代 Xperia Play，指针 ID 会一直递增到 15，然后从 0 重新开始，而不是重复使用可用的最小\
  \ ID 数字。\n\n让我们先来研究如何获取事件的指针索引。我们暂时忽略事件类型。\n\n```\nint pointerIndex = (event.getAction()\
  \ & MotionEvent.ACTION_POINTER_INDEX_MASK) >> MotionEvent.ACTION_POINTER_INDEX_SHIFT;\n\
  ```\n\n你此刻的想法，大概和我们当初首次实现这段代码时一样。在对人性失去信心之前，让我们先来解读一下这里发生的事情。我们通过 `MotionEvent.getAction()`\
  \ 从 `MotionEvent` 中获取事件类型。很好，这个我们之前做过。接着，我们对从 `MotionEvent.getAction()` 方法获取的整数和一个名为\
  \ `MotionEvent.ACTION_POINTER_INDEX_MASK` 的常量进行按位 **与** 运算。现在，有趣的部分来了。\n\n这个常量的值是\
  \ `0xff00`，所以我们实际上把除了第 8 到第 15 位之外的所有位都置为 0，而这第 8 到第 15 位正好保存了事件的指针索引。`event.getAction()`\
  \ 返回的整数的最低 8 位保存了事件类型的值，例如 `MotionEvent.ACTION_DOWN` 及其同类事件。通过这个按位运算，我们实际上舍弃了事件类型。现在，移位操作的含义应该更清晰了。我们右移\
  \ `MotionEvent.ACTION_POINTER_INDEX_SHIFT` 位，该常量的值是 8，所以我们基本上是把第 8 到第 15 位移到了第 0\
  \ 到第 7 位，从而得到事件实际的指针索引。有了这个索引，我们就可以获取事件的坐标，以及指针标识符。\n\n请注意，我们的魔术常量被命名为 `XXX_POINTER_INDEX_XXX`，而不是\
  \ `XXX_POINTER_ID_XXX`（后者听起来更合理，因为我们实际上是要提取指针索引，而不是指针标识符）。嗯，大概是 Android 工程师自己也被搞糊涂了。在\
  \ SDK 版本 8 中，他们弃用了这些常量，并引入了名为 `XXX_POINTER_ID_XXX` 的新常量，这些新常量与已弃用的旧常量有着完全相同的值。为了让那些基于\
  \ SDK 版本 5 编写的旧版应用能在新版 Android 上继续运行，这些旧常量仍然可用。\n\n所以，我们现在知道了如何获取那个神秘的指针索引，并可以用它来查询事件的坐标和指针标识符。\n\
  \n### 动作掩码与更多事件类型\n\n接下来，我们需要获取纯粹的事件类型，去掉 `MotionEvent.getAction()` 返回的整数中编码的额外指针索引。我们只需屏蔽掉指针索引：\n\
  \n```\nint action = event.getAction() & MotionEvent.ACTION_MASK;\n```\n\n好的，这很容易。不过，只有当你理解了什么是指针索引，并且知道它确实被编码在\
  \ action 中时，才能明白这行代码的作用。\n\n剩下的工作就是像之前一样解码事件类型。我们已经提到过有一些新的事件类型，现在来逐一了解：\n\n*  \
  \ `MotionEvent.ACTION_POINTER_DOWN`：当第一个手指触摸之后，任何额外的手指触摸屏幕时，就会触发此事件。第一个手指触摸时仍然会产生\
  \ `MotionEvent.ACTION_DOWN` 事件。\n*   `MotionEvent.ACTION_POINTER_UP`：这个与前一个动作类似。当有手指从屏幕上抬起，且屏幕上仍有一个以上手指触摸时，会触发此事件。最后一个离开屏幕的手指会产生\
  \ `MotionEvent.ACTION_UP` 事件。这个手指不一定是最先触摸屏幕的那个手指。\n\n幸运的是，我们可以直接把这两种新事件类型当作旧的 `MotionEvent.ACTION_UP`\
  \ 和 `MotionEvent.ACTION_DOWN` 事件来处理。\n\n最后一个不同点在于：一个单独的 `MotionEvent` 对象可能包含多个事件的数据。是的，你没看错。要实现这一点，合并的事件必须具有相同的类型。实际上，这种情况只会发生在\
  \ `MotionEvent.ACTION_MOVE` 事件上，所以我们在处理该事件类型时只需要考虑这一点。要检查一个 `MotionEvent` 中包含多少个事件，我们使用\
  \ `MotionEvent.getPointerCount()` 方法，它能告诉我们有多少个手指的坐标数据位于这个 `MotionEvent` 中。然后，我们可以通过\
  \ `MotionEvent.getX()`、`MotionEvent.getY()` 和 `MotionEvent.getPointerId()` 方法，获取从\
  \ 0 到 `MotionEvent.getPointerCount() – 1` 的指针索引对应的指针标识符和坐标。\n\n#### 实践\n\n我们来为这个优秀的\
  \ API 编写一个示例。我们希望最多追踪十个手指。Android 设备通常会在我们向屏幕添加更多手指时分配连续的指针索引，但这并不总是保证成立的，因此我们依靠指针索引来管理数组，并简单显示每个触摸点分配的\
  \ ID。我们追踪每个指针的坐标和触摸状态（是否正在触摸），然后通过一个 `TextView` 将这个信息输出到屏幕上。我们将测试 Activity 命名为 `MultiTouchTest`。清单\
  \ 4-4 展示了完整的代码。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics;\nimport\
  \ android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\nimport android.view.MotionEvent;\n\
  import android.view.View;\nimport android.view.View.OnTouchListener;\nimport android.widget.TextView;\n\
  public class MultiTouchTest extends AppCompatActivity implements OnTouchListener\
  \ {\nStringBuilder builder = new StringBuilder();\nTextView textView;\nfloat[] x\
  \ = new float[10];\nfloat[] y = new float[10];\nboolean[] touched = new boolean[10];\n\
  int[] id = new int[10];\nprivate void updateTextView() {\nbuilder.setLength(0);\n\
  for (int i = 0; i < 10; i++) {\nbuilder.append(touched[i]);\nbuilder.append(\",\
  \ \");\nbuilder.append(id[i]);\nbuilder.append(\", \");\nbuilder.append(x[i]);\n\
  builder.append(\", \");\nbuilder.append(y[i]);\nbuilder.append(\"\\n\");\n}\ntextView.setText(builder.toString());\n\
  }\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  textView = new TextView(this);\ntextView.setText(\"触摸并拖动（支持多指）！\");\ntextView.setTextSize(10);\n\
  setContentView(textView);\ntextView.setOnTouchListener(this);\n}\n@Override\npublic\
  \ boolean onTouch(View v, MotionEvent event) {\nint action = event.getAction() &\
  \ MotionEvent.ACTION_MASK;\nint pointerIndex = (event.getAction() & MotionEvent.ACTION_POINTER_INDEX_MASK)\
  \ >> MotionEvent.ACTION_POINTER_INDEX_SHIFT;\nint pointerCount = event.getPointerCount();\n\
  for (int i = 0; i < 10; i++) {\nif (i >= pointerCount) {\ntouched[i] = false;\n\
  id[i] = -1;\ncontinue;\n}\nif (event.getAction() != MotionEvent.ACTION_MOVE && i\
  \ != pointerIndex) {\n// 如果是 up/down/cancel/out 事件，通过 id 来屏蔽，以判断是否应该处理此触摸点\ncontinue;\n\
  }\nint pointerId = event.getPointerId(i);\nswitch (action) {\ncase MotionEvent.ACTION_DOWN:\n\
  case MotionEvent.ACTION_POINTER_DOWN:\ntouched[i] = true;\nid[i] = pointerId;\n\
  x[i] = (int) event.getX(i);\ny[i] = (int) event.getY(i);\nbreak;\ncase MotionEvent.ACTION_UP:\n\
  case MotionEvent.ACTION_POINTER_UP:\ncase MotionEvent.ACTION_OUTSIDE:\ncase MotionEvent.ACTION_CANCEL:\n\
  touched[i] = false;\nid[i] = -1;\nx[i] = (int) event.getX(i);\ny[i] = (int) event.getY(i)\
  \ ;\nbreak;\ncase MotionEvent.ACTION_MOVE:\ntouched[i] = true;\nid[i] = pointerId;\n\
  x[i] = (int) event.getX(i);\ny[i] = (int) event.getY(i);\nbreak;\n}\n}\nupdateTextView();\n\
  return true;\n}\n}\n```\n\n*清单 4-4.* `MultiTouchTest.java`：测试多点触控 API\n\n\n\n我们实现`OnTouchListener`接口与之前一样。为了跟踪十根手指的坐标和触摸状态，我们添加了三个新的成员数组来保存这些信息。数组`x`和`y`保存每个指针\
  \ ID 的坐标，数组`touched`存储具有该指针 ID 的手指是否按下。\n\n接下来，我们创建了一个小辅助方法，将手指的当前状态输出到`TextView`。该方法简单地遍历所有十个手指状态，并通过`StringBuilder`将它们连接起来。最终的文本被发送到`TextView`。\n\
  \n`onCreate()`方法设置我们的活动，并将其注册为`TextView`的`OnTouchListener`。这部分我们已经非常熟悉了。\n\n现在，进入令人头疼的部分：`onTouch()`方法。\n\
  \n我们首先通过屏蔽`event.getAction()`返回的整数来获取事件类型。接着，我们提取指针索引，并根据之前的讨论，从`MotionEvent`中获取对应的指针标识符。\n\
  \n`onTouch()`方法的核心是那个巨大的`switch`语句，我们之前以简化形式使用它来处理单点触摸事件。我们从高层次将所有事件分为三类：\n\n- 触摸按下事件发生（`MotionEvent.ACTION_DOWN`或`MotionEvent.ACTION_POINTER_DOWN`）：我们将该指针标识符的触摸状态设置为`true`，并保存该指针的当前坐标。\n\
  - 触摸抬起事件发生（`MotionEvent.ACTION_UP`、`MotionEvent.ACTION_POINTER_UP`或`MotionEvent.CANCEL`）：我们将该指针标识符的触摸状态设置为`false`，并保存其最后已知坐标。\n\
  - 一根或多根手指在屏幕上拖动（`MotionEvent.ACTION_MOVE`）：我们检查`MotionEvent`中包含多少个事件，然后更新指针索引从 0\
  \ 到`MotionEvent.getPointerCount()-1`的坐标。对于每个事件，我们获取对应的指针 ID 并更新坐标。\n\n事件处理完成后，我们通过调用之前定义的`updateView()`方法来更新`TextView`。最后，我们返回`true`，表示我们处理了触摸事件。\n\
  \n图 4-7 显示了在 Samsung Galaxy Nexus 上触摸五根手指并稍微拖动它们后，活动产生的输出。\n\n![A340874_3_En_4_Fig7_HTML.jpg](img/A340874_3_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7. 多点触摸的乐趣\n\n运行此示例时，我们可以观察到几点：\n\n- 模拟器上不支持多点触摸。如果我们创建运行 Android 2.0 或更高版本的模拟器，API\
  \ 是存在的，但我们只有一个鼠标。要模拟多点触摸，在 Windows 上按住 CTRL 键，在 Mac 上按住 COMMAND 键。\n- 触摸两根手指，抬起第一根，然后再次触摸它。抬起第一根手指后，第二根手指将保留其指针\
  \ ID。当第一根手指第二次触摸时，它会获得一个新的指针 ID，通常为 0，但可以是任何整数。任何新触摸屏幕的手指都会获得一个新的指针 ID，该 ID 可以是当前未被其他活动触摸使用的任何值。这是需要记住的规则。\n\
  - 如果你在低端智能手机上尝试，当你在同一轴上交叉两根手指时，可能会注意到一些奇怪的行为。这是因为这些设备的屏幕不完全支持单独手指的跟踪。这是一个大问题，但我们可以通过精心设计\
  \ UI 来在一定程度上绕开它。我们将在后面的章节中再次讨论这个问题。需要记住的一句话是：不要交叉！\n\n这就是 Android 上多点触摸处理的原理。虽然有点痛苦，但一旦你理清了所有术语并接受了位操作，你会对实现感到更加得心应手，并像专家一样处理所有触摸点。\n\
  \n注意\n\n如果这部分内容让你的大脑爆炸，我们深表歉意。这节内容相当繁重。遗憾的是，该 API 的官方文档非常欠缺，大多数人只是通过反复尝试来“学习”API。我们建议你多玩玩前面的代码示例，直到完全理解其中的原理。\n\
  \n处理按键事件\n\n经历了上一节的疯狂之后，你应该得到一些非常简单的东西。欢迎来到按键事件处理。\n\n要捕获按键事件，我们需要实现另一个监听器接口，即`OnKeyListener`。它有一个名为`onKey()`的单一方法，签名如下：\n\
  \n```\npublic boolean onKey(View view, int keyCode, KeyEvent event)\n```\n\n`View`参数指定接收按键事件的视图，`keyCode`参数是`KeyEvent`类中定义的常量之一，最后一个参数是按键事件本身，它包含一些附加信息。\n\
  \n什么是键码？每个（屏幕上的）键盘键和每个系统键都有一个唯一的数字与之对应。这些键码在`KeyEvent`类中定义为静态公共最终整型。其中一个键码是`KeyEvent.KEYCODE_A`，它是\
  \ A 键的代码。这与在文本字段中按下按键时生成的字符无关。它只是标识按键本身。\n\n`KeyEvent`类类似于`MotionEvent`类。它有两个与我们相关的方法：\n\
  \n- `KeyEvent.getAction()`：此方法返回`KeyEvent.ACTION_DOWN`、`KeyEvent.ACTION_UP`和`KeyEvent.ACTION_MULTIPLE`。就我们的目的而言，我们可以忽略最后一种按键事件类型。其他两种将在按键被按下或释放时发送。\n\
  - `KeyEvent.getUnicodeChar()`：此方法返回按键在文本字段中会产生的 Unicode 字符。假设我们按住 Shift 键并按下 A 键。这将报告为一个键码为`KeyEvent.KEYCODE_A`但\
  \ Unicode 字符为`A`的事件。如果我们想自己进行文本输入，可以使用此方法。\n\n要接收键盘事件，`View`必须获得焦点。这可以通过以下方法调用来强制实现：\n\
  \n```\nView.setFocusableInTouchMode(true);\nView.requestFocus();\n```\n\n第一个方法将保证`View`可以获得焦点。第二个方法请求特定的`View`获得焦点。\n\
  \n让我们实现一个简单的测试活动，看看这如何组合工作。我们想要获取按键事件，并在`TextView`中显示我们接收到的最后一个事件。我们将显示的信息是按键事件类型、键码以及\
  \ Unicode 字符（如果有的话）。请注意，某些按键本身不会产生 Unicode 字符，而只能与其他字符组合产生。清单 4-5 演示了如何用少量代码行实现所有这些功能。\n\
  \n\n\n```java\npackage com.badlogic.androidgames.ch04androidbasics.ch04androidbasics;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\nimport\
  \ android.util.Log;\nimport android.view.KeyEvent;\nimport android.view.View;\n\
  import android.view.View.OnKeyListener;\nimport android.widget.TextView;\npublic\
  \ class KeyTest extends AppCompatActivity implements OnKeyListener {\nStringBuilder\
  \ builder = new StringBuilder();\nTextView textView;\npublic void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\ntextView = new TextView(this);\n\
  textView.setText(\"Press keys (if you have some)!\");\ntextView.setOnKeyListener(this);\n\
  textView.setFocusableInTouchMode(true);\ntextView.requestFocus();\nsetContentView(textView);\n\
  }\npublic boolean onKey(View view, int keyCode, KeyEvent event) {\nbuilder.setLength(0);\n\
  switch (event.getAction()) {\ncase KeyEvent.ACTION_DOWN:\nbuilder.append(\"down,\
  \ \");\nbreak;\ncase KeyEvent.ACTION_UP:\nbuilder.append(\"up, \");\nbreak;\n}\n\
  builder.append(event.getKeyCode());\nbuilder.append(\", \");\nbuilder.append((char)\
  \ event.getUnicodeChar());\nString text = builder.toString();\nLog.d(\"KeyTest\"\
  , text);\ntextView.setText(text);\nreturn event.getKeyCode() != KeyEvent.KEYCODE_BACK;\n\
  }\n}\n```\n\n代码清单 4-5. `KeyTest.Java`：测试按键事件 API\n\n首先，我们声明该 Activity 实现了 `OnKeyListener`\
  \ 接口。接着，我们定义两个已经熟悉的成员变量：一个 `StringBuilder` 用于构建要显示的文本，以及一个 `TextView` 用于显示文本。\n\n\
  在 `onCreate()` 方法中，我们确保 `TextView` 获得焦点，以便其能接收按键事件。我们还通过 `TextView.setOnKeyListener()`\
  \ 方法将 Activity 注册为 `OnKeyListener`。\n\n`onKey()` 方法也很直接了当。我们在 `switch` 语句中处理两种事件类型，向\
  \ `StringBuilder` 追加相应的字符串。接着，我们追加按键码以及来自 `KeyEvent` 本身的 Unicode 字符，并将 `StringBuffer`\
  \ 实例的内容输出到 logcat 和 `TextView` 中。\n\n最后一个 `if` 语句很有意思：如果按下了返回键，我们从 `onKey()` 方法中返回\
  \ `false`，让 `TextView` 处理该事件。否则，我们返回 `true`。为什么在这里要区分处理呢？\n\n如果我们在返回键的情况下返回 `true`，就会稍微干扰\
  \ Activity 的生命周期。由于我们决定自己消费返回键事件，Activity 将不会关闭。当然，在某些场景下我们确实需要捕获返回键，以防止 Activity\
  \ 关闭。但强烈建议除非万不得已，不要这样做。\n\n图 4-8 展示了在 Droid 设备的键盘上同时按住 Shift 键和 A 键时 Activity 的输出结果。\n\
  \n![A340874_3_En_4_Fig8_HTML.jpg](img/A340874_3_En_4_Fig8_HTML.jpg)\n\n图 4-8. 同时按下\
  \ Shift 键和 A 键\n\n这里有几点需要注意：\n\n*   观察 logcat 输出时，请注意我们可以轻松处理同时发生的按键事件。同时按住多个按键不是问题。\n\
  *   按下方向键和滚动轨迹球都会作为按键事件上报。\n*   与触摸事件类似，按键事件在旧版 Android 系统和第一代设备上可能会消耗大量 CPU 资源。不过，它们不会产生事件洪流。\n\
  \n与上一节相比，这一节的内容相当轻松，不是吗？\n\n**注意**\n\n按键处理 API 实际上比我们这里展示的要复杂一些。不过，对于我们游戏编程项目而言，这里包含的信息已经绰绰有余。如果你需要更复杂的功能，请参考\
  \ Android 开发者网站上的官方文档。\n\n## 读取加速度计状态\n\n对于游戏来说，一个非常有趣的输入选项是加速度计。所有 Android 设备都必须配备一个三轴加速度计。我们在第\
  \ 3 章中简单讨论过加速度计。通常，我们只需要轮询加速度计的状态即可。\n\n那么，我们该如何获取加速度计信息呢？如果你说通过注册监听器，那就猜对了。我们需要实现的接口叫做\
  \ `SensorEventListener`，它包含两个方法：\n\n```java\npublic void onSensorChanged(SensorEvent\
  \ event);\npublic void onAccuracyChanged(Sensor sensor, int accuracy);\n```\n\n\
  第一个方法在新的加速度计事件到达时被调用。第二个方法在加速度计精度发生变化时被调用。出于我们的目的，可以放心地忽略第二个方法。\n\n那么，我们在哪里注册我们的\
  \ `SensorEventListener` 呢？为此，我们需要做一点准备工作。首先，我们需要检查设备上是否确实安装了加速度计。我们刚才告诉你所有 Android\
  \ 设备都必须包含加速度计。这一点目前仍然成立，但未来可能会改变。因此，我们希望 100% 确保这个输入方法对我们可用。\n\n我们需要做的第一件事是获取一个\
  \ `SensorManager` 实例。这个管理器会告诉我们是否安装了加速度计，同时，我们也是通过它来注册监听器。要获取 `SensorManager`，我们使用\
  \ `Context` 接口的一个方法：\n\n```java\nSensorManager manager = (SensorManager)context.getSystemService(Context.SENSOR_SERVICE);\n\
  ```\n\n`SensorManager` 是 Android 系统提供的一个系统服务。Android 由多个系统服务组成，每个服务都会向请求者提供不同部分的系统信息。\n\
  \n一旦我们获得了 `SensorManager`，就可以检查加速度计是否可用：\n\n```java\nboolean hasAccel = manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size()\
  \ > 0;\n```\n\n通过这段代码，我们向 `SensorManager` 查询所有已安装且类型为 `accelerometer` 的传感器。虽然这暗示设备可能拥有多个加速度计，但实际上，这通常只会返回一个加速度计传感器。\n\
  \n如果安装了加速度计，我们可以从 `SensorManager` 中获取它，并注册 `SensorEventListener`，如下所示：\n\n```java\n\
  Sensor sensor = manager.getSensorList(Sensor.TYPE_ACCELEROMETER).get(0);\nboolean\
  \ success = manager.registerListener(listener, sensor, SensorManager.SENSOR_DELAY_GAME);\n\
  ```\n\n参数 `SensorManager.SENSOR_DELAY_GAME` 指定了监听器应以多高的频率接收加速度计的最新状态更新。这是一个专为游戏设计的特殊常量，因此我们很乐意使用它。请注意，`SensorManager.registerListener()`\
  \ 方法返回一个 `Boolean` 值，指示注册过程是否成功。这意味着我们需要随后检查该 `Boolean` 值，以确保我们确实能从传感器接收到任何事件。\n\
  \n一旦我们注册了监听器，就会在 `SensorEventListener.onSensorChanged()` 方法中收到 `SensorEvents`。方法名称暗示它仅在传感器状态发生变化时被调用。这有点令人困惑，因为加速度计的状态是不断变化的。当我们注册监听器时，实际上就是在指定我们希望接收传感器状态更新的期望频率。\n\
  \n那么，我们该如何处理 `SensorEvent` 呢？这相当简单。`SensorEvent` 有一个名为 `SensorEvent.values` 的公共浮点数数组成员，它保存了加速度计三个轴各自的当前加速度值。`SensorEvent.values[0]`\
  \ 保存 x 轴的值，`SensorEvent.values[1]` 保存 y 轴的值，`SensorEvent.values[2]` 保存 z 轴的值。我们在第\
  \ 3 章中讨论了这些值的含义，所以如果你忘记了，请回头查看“输入”部分。\n\n\n\n有了这些信息，我们就可以编写一个简单的测试活动。我们只需在 `TextView`\
  \ 中输出每个加速度计轴的数值即可。\n清单 4-6 展示了如何实现。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  public class AccelerometerTest extends AppCompatActivity implements SensorEventListener\
  \ {\nTextView textView;\nStringBuilder builder = new StringBuilder();\n@Override\n\
  public void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  textView = new TextView(this);\nsetContentView(textView);\nSensorManager manager\
  \ = (SensorManager) getSystemService(Context.SENSOR_SERVICE);\nif (manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size()\
  \ == 0) {\ntextView.setText(\"No accelerometer installed\");\n} else {\nSensor accelerometer\
  \ = manager.getSensorList(\nSensor.TYPE_ACCELEROMETER).get(0);\nif (!manager.registerListener(this,\
  \ accelerometer,\nSensorManager.SENSOR_DELAY_GAME)) {\ntextView.setText(\"Couldn't\
  \ register sensor listener\");\n}\n}\n}\npublic void onSensorChanged(SensorEvent\
  \ event) {\nbuilder.setLength(0);\nbuilder.append(\"x: \");\nbuilder.append(event.values[0]);\n\
  builder.append(\", y: \");\nbuilder.append(event.values[1]) ;\nbuilder.append(\"\
  , z: \");\nbuilder.append(event.values[2]);\ntextView.setText(builder.toString());\n\
  }\npublic void onAccuracyChanged(Sensor sensor, int accuracy) {\n// 这里无需执行任何操作\n\
  }\n}\n清单 4-6.\nAccelerometerTest.java：测试加速度计 API\n```\n\n我们首先检查加速度计传感器是否可用。如果可用，我们就从\
  \ `SensorManager` 中获取它，并尝试注册我们的活动——该活动实现了 `SensorEventListener` 接口。如果上述任何一步失败，我们就设置\
  \ `TextView` 显示一条适当的错误消息。\n\n`onSensorChanged()` 方法会从传递给它的 `SensorEvent` 中直接读取各轴数值，并相应地更新\
  \ `TextView` 的文本。\n\n`onAccuracyChanged()` 方法的存在是为了让我们完整实现 `SensorEventListener`\
  \ 接口，除此之外并无其他实质用途。\n\n图 4-9 展示了设备垂直于地面时，在竖屏和横屏模式下各轴的取值情况。\n\n![A340874_3_En_4_Fig9_HTML.jpg](img/A340874_3_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9.  \n设备垂直于地面时，加速度计在竖屏模式（左）和横屏模式（右）下的各轴数值\n\n处理安卓加速度计时有一个容易疏忽的地方：加速度计的数值是相对于设备的默认方向来提供的。这意味着，如果你的游戏只在横屏模式下运行，那么默认方向为竖屏的设备上显示的数值，会与默认方向为横屏的设备相差\
  \ 90 度！例如，平板电脑就是这种情况。那么，该如何应对呢？使用下面这段方便实用的代码片段，问题就迎刃而解了：\n\n```\nint screenRotation;\n\
  public void onResume() {\nsuper.onResume();\nWindowManager windowMgr = (WindowManager)activity.getSystemService(Activity.WINDOW_SERVICE);\n\
  screenRotation = windowMgr.getDefaultDisplay().getRotation();\n}\nstatic final int\
  \ ACCELEROMETER_AXIS_SWAP[][] = {\n{1, -1, 0, 1}, // ROTATION_0\n{-1, -1, 1, 0},\
  \ // ROTATION_90\n{-1, 1, 0, 1}, // ROTATION_180\n{1, 1, 1, 0}}; // ROTATION_270\n\
  public void onSensorChanged(SensorEvent event) {\nfinal int[] as = ACCELEROMETER_AXIS_SWAP[screenRotation];\n\
  float screenX = (float)as[0] * event.values[as[2]];\nfloat screenY = (float)as[1]\
  \ * event.values[as[3]];\nfloat screenZ = event.values[2];\n// 现在就可以将 screenX、screenY\
  \ 和 screenZ 用作加速度计数值了！\n}\n```\n\n以下是关于加速度计的一些补充说明：\n\n*   如图 4-9 右侧截图所示，加速度计的数值有时可能会超出其规定范围。这是由于传感器存在微小误差导致的，因此如果你需要这些数值尽可能精确，就必须对此进行调整。\n\
  *   无论你的活动处于何种方向，加速度计各轴报告的数值顺序始终相同。\n*   应用程序开发者有责任根据设备的自然方向对加速度计数值进行旋转处理。\n\n>\
  \ **注意**  \n> 顾名思义，`SensorManager` 类也允许你访问其他传感器，包括指南针和光线传感器。如果你想发挥创意，可以构思一个使用这些传感器的游戏创意。处理它们的事件方式与我们处理加速度计数据的方式类似。Android\
  \ 开发者网站上的文档将为你提供更多信息。\n\n### 文件处理\n\n安卓为我们提供了几种读写文件的方式。在本节中，我们将探讨 assets（资源文件）的用法；了解如何访问外部存储（通常以\
  \ SD 卡形式实现）；并介绍共享首选项（Shared Preferences），它类似于一个持久化的哈希映射。让我们先从 assets 开始。\n\n###\
  \ 读取 Assets\n\n在第 2 章中，我们简要了解了安卓项目的所有文件夹。我们提到 `assets/` 和 `res/` 文件夹是存放需要随应用程序一起分发的文件的地方（你必须创建\
  \ `assets/` 文件夹，因为 Android Studio 不会自动创建）。在讨论清单文件时，我们曾表示不会使用 `res/` 文件夹，因为它对我们组织文件结构的方式有所限制。`assets/`\
  \ 目录才是存放所有文件的地方，你可以按照任何想要的文件夹层级来组织。\n\n`assets/` 文件夹中的文件通过一个名为 `AssetManager` 的类提供。我们可以通过以下方式为应用程序获取该管理器的引用：\n\
  \n```\nAssetManager assetManager = context.getAssets();\n```\n\n我们之前已经见过 `context`\
  \ 接口；`Activity` 类实现了这个接口。在实际操作中，我们会从自己的活动中获取 `AssetManager`。\n\n一旦有了 `AssetManager`，我们就可以开始大量打开文件了：\n\
  \n```\nInputStream inputStream = assetManager.open(\"dir/dir2/filename.txt\");\n\
  ```\n\n请记住，上面的示例可能会抛出 `IOException`，因此应将其包裹在 try/catch 块中。不过，这个方法会返回一个普通的 Java `InputStream`，我们可以用它来读取任何类型的文件。`AssetManager.open()`\
  \ 方法唯一的参数是相对于 asset 目录的文件名。在上面的示例中，`assets/` 文件夹下有两个目录，其中第二个目录（`dir2/`）是第一个目录（`dir/`）的子目录。在我们的\
  \ Android Studio 项目中，该文件将位于 `assets/dir/dir2/`。请确保你是在项目视图（Project view）而非安卓视图（Android\
  \ view）中操作，否则将看不到这些目录。在 Android Studio 中添加 assets 文件夹最安全的方法是：在项目视图中右键点击项目，然后选择 **New\
  \ >> Folder >> Assets Folder**。\n\n让我们编写一个简单的测试活动来检验这个功能。我们想从 `assets/` 目录下一个名为\
  \ `texts` 的子目录中加载一个名为 `myawesometext.txt` 的文本文件。该文本文件的内容将显示在一个 `TextView` 中。清单 4-7\
  \ 展示了这个令人惊叹的活动的源代码。\n\n\n\n```java\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import java.io.ByteArrayOutputStream;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.res.AssetManager;\n\
  import android.os.Bundle;\nimport android.widget.TextView;\npublic class AssetsTest\
  \ extends AppCompatActivity {\n@Override\npublic void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nTextView textView = new TextView(this);\n\
  setContentView(textView);\nAssetManager assetManager = this.getAssets();\nInputStream\
  \ inputStream = null;\ntry {\ninputStream = assetManager.open(\"texts/myawesometext.txt\"\
  );\nString text = loadTextFile(inputStream);\ntextView.setText(text);\n} catch (IOException\
  \ e) {\ntextView.setText(\"无法加载文件\");\n} finally {\nif (inputStream != null)\ntry\
  \ {\ninputStream.close();\n} catch (IOException e) {\ntextView.setText(\"无法关闭文件\"\
  );\n}\n}\n}\npublic String loadTextFile(InputStream inputStream) throws IOException\
  \ {\nByteArrayOutputStream byteStream = new ByteArrayOutputStream();\nbyte[] bytes\
  \ = new byte[4096];\nint len = 0;\nwhile ((len = inputStream.read(bytes)) > 0)\n\
  byteStream.write(bytes, 0, len);\nreturn new String(byteStream.toByteArray(), \"\
  UTF8\");\n}\n}\n```\n清单 4-7. `AssetsTest.java`：演示如何读取资产文件\n\n这里没有什么大惊喜，唯一值得注意的是，在\
  \ Java 中从`InputStream`加载简单的文本相当冗长。我们编写了一个名为`loadTextFile()`的小方法，它会从`InputStream`中提取所有字节，并以字符串形式返回这些字节。我们假定文本文件采用\
  \ UTF-8 编码。其余部分只是捕获和处理各种异常。图 4-10 显示了这个小活动的输出结果。\n\n![A340874_3_En_4_Fig10_HTML.jpg](img/A340874_3_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10.\n\n`AssetsTest`的文本输出\n\n你应该从本节中记住以下几点：\n\n*   在 Java 中从`InputStream`加载文本文件真是麻烦！我们把这个留给你作为练习自己完成。\n\
  *   我们只能读取资产文件，而不能写入。\n*   我们可以轻松修改`loadTextFile()`方法，改为加载二进制数据。我们只需要返回字节数组，而不是字符串。\n\
  \n#### 访问外部存储\n\n虽然资产文件非常适合随应用程序一起打包发送所有图像和声音，但有时我们需要能够持久保存一些信息并在之后重新加载。一个常见的例子就是高分榜。\n\
  \nAndroid 提供了多种实现方式，例如使用应用的本地共享首选项、使用小型 SQLite 数据库等。所有这些选项都有一个共同点：它们处理大型二进制文件都不太优雅。但我们为什么需要这个功能呢？虽然我们可以告诉\
  \ Android 将应用程序安装到外部存储设备上，从而避免占用内部存储空间，但这仅适用于 Android 2.2 及以上版本。对于更早的版本，所有应用程序数据都会安装在内部存储中。理论上，我们只能将应用程序的代码包含在\
  \ APK 文件中，并且必须在应用程序首次启动时从服务器将所有资产文件下载到 SD 卡。Android 上许多知名游戏就是这么做的。\n\n还有其他一些场景需要我们能够访问\
  \ SD 卡（在当前所有可用的设备上，SD 卡基本上等同于外部存储）。我们可以允许用户使用游戏内编辑器创建自己的关卡。我们需要将这些关卡存储在某处，而 SD 卡正好适合这个目的。\n\
  \n那么，既然我们已经说服你不要使用 Android 提供的那些花哨的机制来存储应用首选项，让我们来看看如何在 SD 卡上读写文件。\n\n首先，我们必须请求访问外部存储的权限。这需要在清单文件中使用本章前面讨论过的`<uses-permission>`元素来完成，如下所示：\n\
  \n接下来，我们需要检查用户的 Android 设备上是否确实有外部存储设备。例如，如果你创建一个 Android 虚拟设备（AVD），可以选择不模拟 SD 卡，那么你的应用程序就无法向其写入数据。无法访问\
  \ SD 卡的另一个原因可能是外部存储设备正在被其他程序使用（例如，用户可能正在通过 USB 在桌面电脑上浏览它）。那么，这里介绍如何获取外部存储的状态：\n\n\
  ```\nString state = Environment.getExternalStorageState();\n```\n\n嗯，我们得到的是一个字符串。`Environment`类定义了几个常量。其中之一是`Environment.MEDIA_MOUNTED`。它也是一个字符串。如果上述方法返回的字符串等于这个常量，我们就具有对外部存储的完全读/写权限。请注意，你必须使用`equals()`方法来比较这两个字符串；引用相等性并非在所有情况下都有效。\n\
  \n一旦确定我们可以实际访问外部存储，就需要获取其根目录名称。然后，如果我们要访问特定文件，需要指定相对于该目录的路径。要获取根目录，我们使用另一个`Environment`的静态方法：\n\
  \n```\nFile externalDir = Environment.getExternalStorageDirectory();\n```\n\n从这里开始，我们可以使用标准的\
  \ Java I/O 类来读写文件。\n\n让我们快速编写一个示例，该示例向 SD 卡写入一个文件，然后读回该文件，将其内容显示在`TextView`中，最后从\
  \ SD 卡中删除该文件。清单 4-8 显示了此操作的源代码。\n\n\n```java\npackage com.badlogic.androidgames.ch04androidbasics\
  \ ;\nimport java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.File;\n\
  import java.io.FileReader;\nimport java.io.FileWriter;\nimport java.io.IOException;\n\
  import android.Manifest;\nimport android.content.pm.PackageManager;\nimport android.os.Bundle;\n\
  import android.os.Environment;\nimport android.support.v4.app.ActivityCompat;\n\
  import android.support.v4.content.ContextCompat;\nimport android.support.v7.app.AppCompatActivity;\n\
  import android.widget.TextView;\nimport android.widget.Toast;\npublic class ExternalStorageTest\
  \ extends AppCompatActivity {\nfinal private int REQUEST_READ_EXTERNAL_STORAGE =\
  \ 123;\nfinal private int REQUEST_WRITE_EXTERNAL_STORAGE = 123;\nTextView textView\
  \ ;\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  textView = new TextView(this);\nsetContentView(textView);\nif (ContextCompat.checkSelfPermission(this,\
  \       Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED\
  \ &&\nContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE)\
  \ != PackageManager.PERMISSION_GRANTED    ) {\nActivityCompat.requestPermissions(this,\n\
  new String[]{Manifest.permission.READ_EXTERNAL_STORAGE},\nREQUEST_READ_EXTERNAL_STORAGE);\n\
  ActivityCompat.requestPermissions(this,\nnew String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE},\n\
  REQUEST_WRITE_EXTERNAL_STORAGE);\n} else {\nReadExternalStorage();\n}\n}\n@Override\n\
  public void onRequestPermissionsResult(int requestCode, String[] permissions, int[]\
  \ grantResults) {\nsuper.onRequestPermissionsResult(requestCode, permissions, grantResults);\n\
  switch (requestCode) {\ncase REQUEST_READ_EXTERNAL_STORAGE :\nfor (int i = 0; i\
  \ < permissions.length; i++) {\nString permission = permissions[i];\nint grantResult\
  \ = grantResults[i] ;\nif (permission.equals(Manifest.permission.READ_EXTERNAL_STORAGE)\
  \ || permission.equals(Manifest.permission.WRITE_EXTERNAL_STORAGE)) {\nif (grantResult\
  \ == PackageManager.PERMISSION_GRANTED) {\nReadExternalStorage();\n} else {\nToast.makeText(ExternalStorageTest.this,\
  \ \"Permission Denied\",    Toast.LENGTH_SHORT).show();\n}\n}\n}\nbreak;\ndefault:\n\
  super.onRequestPermissionsResult(requestCode, permissions, grantResults);\n}\n}\n\
  public void ReadExternalStorage() {\nString state = Environment.getExternalStorageState();\n\
  if (!state.equals(Environment.MEDIA_MOUNTED)) {\ntextView.setText(\"No external\
  \ storage mounted\");\n} else {\nFile externalDir = Environment.getExternalStorageDirectory();\n\
  File textFile = new File(externalDir.getAbsolutePath()\n+ File.separator + \"text.txt\"\
  );\ntry {\nwriteTextFile(textFile, \"This is a test. Roger\");\nString text = readTextFile(textFile);\n\
  textView.setText(text);\nif (!textFile.delete()) {\ntextView.setText(\"Couldn't\
  \ remove temporary file\");\n}\n} catch (IOException e) {\ntextView.setText(\"Something\
  \ went wrong! \" + e.getMessage());\n}\n}\n}\nprivate void writeTextFile(File file,\
  \ String text) throws IOException {\nBufferedWriter writer = new BufferedWriter(new\
  \ FileWriter(file));\nwriter.write(text);\nwriter.close();\n}\nprivate String readTextFile(File\
  \ file) throws IOException {\nBufferedReader reader = new BufferedReader(new FileReader(file));\n\
  StringBuilder text = new StringBuilder();\nString line;\nwhile ((line = reader.readLine())\
  \ != null) {\ntext.append(line);\ntext.append(\"\\n\");\n}\nreader.close();\nreturn\
  \ text.toString() ;\n}\n}\n```\n\n**清单 4-8.** `ExternalStorageTest` 活动\n\n首先，我们检查用户是否已授予我们访问外部存储的权限。如果这是我们的应用第一次检查，Android\
  \ 会弹出一个对话框询问用户是否授予或拒绝权限。然后，我们检查 SD 卡是否已挂载。如果没有，我们就提前退出。接下来，我们获取外部存储目录，并构造一个新的 `File`\
  \ 实例，该实例指向我们将在下一条语句中创建的文件。 `writeTextFile()` 方法使用标准的 Java I/O 类来完成其工作。如果文件不存在，该方法会创建它；否则，它会覆盖已有的文件。成功将测试文本写入外部存储设备上的文件后，我们再次读取该文件，并将其设置为\
  \ `TextView` 的文本。最后一步，我们从外部存储中删除该文件。所有这些操作都采用了标准的安全措施，如果出现问题，会通过向 `TextView` 输出错误消息来报告。图\
  \ 4-11 显示了该活动的输出。\n\n![A340874_3_En_4_Fig11_HTML.jpg](img/A340874_3_En_4_Fig11_HTML.jpg)\n\
  \n**图 4-11.** 收到！\n\n以下是从本节中应吸取的教训：\n\n*   不要乱动不属于你的任何文件。如果你删除了用户上次度假的照片，他们会非常生气。\n\
  *   始终检查外部存储设备是否已挂载。\n*   不要乱动外部存储设备上的任何文件！\n\n因为删除外部存储设备上的所有文件非常容易，所以在从 Google\
  \ Play 安装下一个请求 SD 卡权限的应用之前，你可能需要三思。一旦安装，该应用将对你的文件拥有完全控制权。\n\n### 共享首选项\n\nAndroid\
  \ 提供了一个简单的 API 来为你的应用存储键值对，称为 `SharedPreferences`。 `SharedPreferences` API 与标准的\
  \ Java Properties API 并无不同。一个活动可以有一个默认的 `SharedPreferences` 实例，也可以根据需要使用任意多个不同的\
  \ `SharedPreferences` 实例。以下是从活动中获取 `SharedPreferences` 实例的典型方法：\n\n```java\nSharedPreferences\
  \ prefs = PreferenceManager.getDefaultSharedPreferences(this);\n```\n\n或\n\n```java\n\
  SharedPreferences prefs = getPreferences(Context.MODE_PRIVATE);\n```\n\n第一种方法提供一个通用的\
  \ `SharedPreferences` 实例，该实例将在该上下文中（在我们的例子中是活动）共享。第二种方法做同样的事情，但它允许你选择共享首选项的隐私级别。选项包括\
  \ `Context.MODE_PRIVATE`（默认值）、`Context.MODE_WORLD_READABLE` 和 `Context.MODE_WORLD_WRITEABLE`。使用除\
  \ `Context.MODE_PRIVATE` 之外的任何选项都更高级，对于保存游戏设置之类的事情并非必需。\n\n要使用共享首选项，你首先需要获取编辑器。这通过以下方式完成：\n\
  \n```java\nEditor editor = prefs.edit()\n```\n\n现在，我们可以插入一些值：\n\n```java\neditor.putString(\"\
  key1\", \"banana\");\neditor.putInt(\"key2\", 5);\n```\n\n最后，当我们想要保存时，只需添加以下代码：\n\
  \n```java\neditor.commit();\n```\n\n准备好读取回来了吗？正如预期的那样：\n\n```java\nString value1\
  \ = prefs.getString(\"key1\", null);\nint value2 = prefs.getInt(\"key2\", 0);\n\
  ```\n\n在我们的示例中，`value1` 将是 `\"banana\"`，`value2` 将是 `5`。`SharedPreferences` 的 \"\
  get\" 调用中的第二个参数是默认值。如果在首选项中找不到该键，则将使用这些默认值。例如，如果从未设置过 `\"key1\"`，则在 `getString`\
  \ 调用之后 `value1` 将为 `null`。`SharedPreferences` 非常简单，我们实际上不需要任何测试代码来演示。只需记住始终提交这些编辑！\n\
  \n## 音频编程\n\nAndroid 提供了几个易于使用的 API 来播放音效和音乐文件——非常适合我们的游戏编程需求。让我们来看看这些 API。\n\n\
  ### 设置音量控制\n\n\n如果你有一个安卓设备，你会注意到，当你按下音量加减按钮时，根据你当前使用的应用，你控制的是不同的音量设置。在通话中，你控制的是来电语音流的音量；在播放\
  \ YouTube 视频时，你控制的是视频音频的音量；而在主屏幕上，你控制的是系统声音的音量，例如铃声或收到即时消息的声音。\n\n安卓系统针对不同用途设有不同的音频流。当我们在游戏中播放音频时，我们会使用一些类将音效和音乐输出到一个特定的音频流，即音乐流。在考虑播放音效或音乐之前，我们首先要确保音量按钮能控制正确的音频流。为此，我们使用`context`接口的另一个方法：\n\
  \n```\ncontext.setVolumeControlStream(AudioManager.STREAM_MUSIC);\n```\n\n一如既往，我们选择的`Context`实现就是我们的\
  \ Activity。调用此方法后，音量按钮将控制音乐流，我们之后会将音效和音乐输出到这个流中。在 Activity 的生命周期中，我们只需要调用一次此方法。`Activity.onCreate()`方法是最合适的位置。\n\
  \n编写一个只包含一行代码的示例有点小题大做，因此我们暂时不做。只需记住要在所有输出声音的 Activity 中使用此方法。\n\n### 播放音效\n\n在第\
  \ 3 章中，我们讨论了流式播放音乐和播放音效之间的区别。后者存储在内存中，通常持续时间只有几秒。安卓为我们提供了一个名为`SoundPool`的类，它使得播放音效变得非常简单。\n\
  \n我们可以像下面这样简单地实例化新的`SoundPool`实例：\n\n```\nSoundPool soundPool = new SoundPool();\n\
  ```\n\n要从一个音频文件将音效加载到堆内存中，我们可以使用`SoundPool.load()`方法。我们将所有文件存储在`assets/`目录下，因此我们需要使用接受`AssetFileDescriptor`的`SoundPool.load()`方法的重载版本。如何获取`AssetFileDescriptor`？很简单——通过我们之前使用过的`AssetManager`。下面展示了如何通过`SoundPool`从`assets/`目录加载一个名为`explosion.ogg`的\
  \ OGG 文件：\n\n```\nAssetFileDescriptor descriptor = assetManager.openFd(\"explosion.ogg\"\
  );\nint explosionId = soundPool.load(descriptor, 1);\n```\n\n通过`AssetManager.openFd()`方法获取`AssetFileDescriptor`非常直接。通过`SoundPool`加载音效也同样容易。`SoundPool.load()`方法的第一个参数是我们的`AssetFileDescriptor`，第二个参数指定了音效的优先级。目前此参数尚未使用，为了将来的兼容性，应将其设为`1`。\n\
  \n`SoundPool.load()`方法返回一个整数，作为已加载音效的句柄。当我们想要播放这个音效时，我们指定这个句柄，以便`SoundPool`知道要播放哪个音效。\n\
  \n播放音效同样非常简单：\n\n```\nsoundPool.play(explosionId, 1.0f, 1.0f, 0, 0, 1);\n```\n\n\
  第一个参数是我们从`SoundPool.load()`方法接收到的句柄。接下来的两个参数指定左右声道的音量。这些值应在`0`（静音）到`1`（最大音量）之间。\n\
  \n接下来是两个我们很少使用的参数。第一个是优先级，目前未使用，应设为`0`。另一个参数指定音效应循环播放的次数。不建议循环播放音效，因此通常在这里使用`0`。最后一个参数是播放速率。将其设为高于`1`会使音效播放速度比录制时更快，而设为低于`1`则会使播放速度变慢。\n\
  \n当我们不再需要一个音效并想释放一些内存时，可以使用`SoundPool.unload()`方法：\n\n```\nsoundPool.unload(explosionId);\n\
  ```\n\n我们只需传入从`SoundPool.load()`方法接收到的该音效的句柄，它就会从内存中卸载。\n\n通常，我们会在游戏中只使用一个`SoundPool`实例，用它来根据需要加载、播放和卸载音效。当我们完成所有音频输出，不再需要`SoundPool`时，应该始终调用`SoundPool.release()`方法，该方法会释放`SoundPool`通常占用的所有资源。释放后，你当然不能再使用该`SoundPool`，并且由该`SoundPool`加载的所有音效也会消失。\n\
  \n让我们编写一个简单的测试 Activity，每次点击屏幕时播放一个爆炸音效。我们已经知道实现此功能所需的一切，因此下面的代码列表应该不会有什么大惊喜。\n\n\
  ```\npackage com.badlogic.androidgames.ch04androidbasics;\nimport java.io.IOException;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.res.AssetFileDescriptor;\n\
  import android.content.res.AssetManager;\nimport android.media.AudioManager;\nimport\
  \ android.media.SoundPool;\nimport android.os.Bundle;\nimport android.view.MotionEvent;\n\
  import android.view.View;\nimport android.view.View.OnTouchListener;\nimport android.widget.TextView;\n\
  public class SoundPoolTest extends AppCompatActivity implements OnTouchListener\
  \ {\nSoundPool soundPool;\nint explosionId = -1;\n@Override\npublic void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nTextView textView\
  \ = new TextView(this);\ntextView.setOnTouchListener(this);\nsetContentView(textView);\n\
  setVolumeControlStream(AudioManager.STREAM_MUSIC);\nsoundPool = new SoundPool(20,\
  \ AudioManager.STREAM_MUSIC, 0);\ntry {\nAssetManager assetManager = this.getAssets();\n\
  AssetFileDescriptor descriptor = assetManager\n.openFd(\"explosion.ogg\");\nexplosionId\
  \ = soundPool.load(descriptor, 1);\n} catch (IOException e) {\ntextView.setText(\"\
  Couldn't load sound effect from asset, \"\n+ e.getMessage()) ;\n}\n}\npublic boolean\
  \ onTouch(View v, MotionEvent event) {\nif (event.getAction() == MotionEvent.ACTION_UP)\
  \ {\nif (explosionId != -1) {\nsoundPool.play(explosionId, 1, 1, 0, 0, 1);\n}\n\
  }\nreturn true;\n}\n}\n列表 4-9.\nSoundPoolTest.java；播放音效\n```\n\n我们首先从`AppCompatActivity`派生我们的类，并让它实现`OnTouchListener`接口，以便我们之后能处理屏幕点击。我们的类有两个成员：`SoundPool`和我们将要加载和播放的音效句柄。我们将其初始化为`–1`，表示音效尚未加载。\n\
  \n在`onCreate()`方法中，我们做了之前做过几次的事情：创建一个`TextView`，将 Activity 注册为`OnTouchListener`，并将`TextView`设置为内容视图。\n\
  \n下一行设置了音量控件以控制音乐流，如前所述。接着我们创建`SoundPool`并配置它，使其能同时播放 20 个并发音效。这对于大多数游戏来说应该足够了。\n\
  \n最后，我们从`AssetManager`为放置在`assets/`目录下的`explosion.ogg`文件获取一个`AssetFileDescriptor`。要加载该音效，我们只需将该描述符传递给`SoundPool.load()`方法并存储返回的句柄。如果加载过程中出现问题，`SoundPool.load()`方法会抛出异常，在这种情况下我们会捕获它并显示一条错误消息。\n\
  \n在`onTouch()`方法中，我们简单地检查是否有手指抬起，这表示屏幕被点击了。如果是这种情况，并且爆炸音效已成功加载（由句柄不是`–1`指示），我们就播放该音效。\n\
  \n\n\n当你执行这个简单操作时，只需触摸屏幕即可让世界爆炸。如果快速连续触摸屏幕，你会发现音效会以重叠的方式多次播放。我们配置的 `SoundPool` 最大支持\
  \ 20 次播放重叠，这几乎是很难超越的。但如果真的发生了这种情况，当前正在播放的某个音效就会停止，为新请求的播放腾出空间。\n\n请注意，在前面的例子中，我们没有卸载音效或释放\
  \ `SoundPool`。这是为了简洁起见。通常，你会在 Activity 即将被销毁时的 `onPause()` 方法中释放 `SoundPool`。请记住，始终要释放或卸载你不再需要的任何资源。\n\
  \n虽然 `SoundPool` 类非常易用，但请记住 `SoundPool.load()` 方法是异步执行实际加载的。这意味着，在你使用该音效调用 `SoundPool.play()`\
  \ 方法之前，需要稍等片刻，因为加载可能尚未完成。通常这不成问题，因为在该音效首次播放之前，你很可能还会加载其他资源。\n\n**注意**\n\n正如我们讨论的任何\
  \ API 一样，`SoundPool` 还有更多功能。我们简单提过，你可以循环播放音效。为此，你可以从 `SoundPool.play()` 方法获取一个 ID，用于暂停或停止循环播放的音效。如果你需要该功能，请查阅\
  \ Android 开发者网站上的 `SoundPool` 文档。\n\n### 流式播放音乐\n\n小的音效可以放入 Android 应用程序从操作系统获得的有限堆内存中。包含较长音乐片段的大型音频文件则不行。因此，我们需要将音乐流式传输到音频硬件，这意味着我们一次只读取一小块数据，足以将其解码为原始\
  \ PCM 数据并发送给音频芯片。\n\n这听起来很令人望而生畏。幸运的是，有 `MediaPlayer` 类可以为我们处理所有这些事务。我们只需将其指向音频文件并告诉它播放即可。\n\
  \n实例化 `MediaPlayer` 类非常简单：\n\n```\nMediaPlayer mediaPlayer = new MediaPlayer();\n\
  ```\n\n接下来，我们需要告诉 `MediaPlayer` 要播放哪个文件。同样通过 `AssetFileDescriptor` 完成：\n\n```\n\
  AssetFileDescriptor descriptor = assetManager.openFd(\"music.ogg\");\nmediaPlayer.setDataSource(descriptor.getFileDescriptor(),\
  \ descriptor.getStartOffset(), descriptor.getLength());\n```\n\n这里的步骤比 `SoundPool`\
  \ 的情况要多一些。`MediaPlayer.setDataSource()` 方法不直接接受 `AssetFileDescriptor`。相反，它需要一个 `FileDescriptor`，我们通过\
  \ `AssetFileDescriptor.getFileDescriptor()` 方法获取。此外，我们还必须指定音频文件的偏移量和长度。为什么要指定偏移量？实际上，所有资源都存储在单个文件中。为了让\
  \ `MediaPlayer` 找到文件的起始位置，我们必须为其提供该文件在包含它的资源文件中的偏移量。\n\n在我们可以开始播放音乐文件之前，还必须调用另一个方法来准备\
  \ `MediaPlayer` 进行播放：\n\n```\nmediaPlayer.prepare();\n```\n\n这将实际打开文件并检查它是否可以被 `MediaPlayer`\
  \ 实例读取和播放。至此，我们就可以自由地播放、暂停、停止音频文件，设置循环播放以及调整音量。\n\n要开始播放，我们只需调用以下方法：\n\n```\nmediaPlayer.start();\n\
  ```\n\n请注意，此方法只能在成功调用 `MediaPlayer.prepare()` 方法后调用（如果它抛出运行时异常，你会注意到）。\n\n在开始播放后，我们可以通过调用\
  \ `pause()` 方法来暂停播放：\n\n```\nmediaPlayer.pause();\n```\n\n调用此方法同样仅在成功准备 `MediaPlayer`\
  \ 并已开始播放后才有效。要恢复已暂停的 `MediaPlayer`，我们可以再次调用 `MediaPlayer.start()` 方法，无需任何准备。\n\n\
  要停止播放，我们调用以下方法：\n\n```\nmediaPlayer.stop();\n```\n\n请注意，当我们想要启动一个已停止的 `MediaPlayer`\
  \ 时，必须首先再次调用 `MediaPlayer.prepare()` 方法。\n\n我们可以使用以下方法将 `MediaPlayer` 设置为循环播放：\n\
  \n```\nmediaPlayer.setLooping(true);\n```\n\n要调节音乐播放的音量，我们可以使用以下方法：\n\n```\nmediaPlayer.setVolume(1,\
  \ 1);\n```\n\n这将设置左右声道的音量。\n\n最后，我们需要一种方法来检查播放是否已完成。我们可以通过两种方式做到这一点。其一，我们可以向 `MediaPlayer`\
  \ 注册一个 `OnCompletionListener`，当播放完成时将调用该监听器：\n\n```\nmediaPlayer.setOnCompletionListener(listener);\n\
  ```\n\n如果我们想轮询 `MediaPlayer` 的状态，也可以使用以下方法：\n\n```\nboolean isPlaying = mediaPlayer.isPlaying();\n\
  ```\n\n请注意，如果 `MediaPlayer` 设置为循环播放，上述两种方法都不会指示 `MediaPlayer` 已停止。\n\n最后，如果我们处理完该\
  \ `MediaPlayer` 实例，可以通过调用以下方法来确保释放其占用的所有资源：\n\n```\nmediaPlayer.release();\n```\n\
  \n在丢弃该实例之前始终执行此操作，这被认为是一种良好的实践。\n\n如果我们没有将 `MediaPlayer` 设置为循环播放且播放已完成，我们可以通过再次调用\
  \ `MediaPlayer.prepare()` 和 `MediaPlayer.start()` 方法重新启动 `MediaPlayer`。\n\n这些方法中的大多数是异步工作的，因此即使你调用了\
  \ `MediaPlayer.stop()`，之后短时间内 `MediaPlayer.isPlaying()` 方法仍可能返回 `true`。这通常无需担心。在大多数游戏中，我们将\
  \ `MediaPlayer` 设置为循环播放，然后在需要时（例如，切换到需要播放其他音乐的不同屏幕时）停止它。\n\n让我们编写一个小测试 Activity，以循环模式播放来自\
  \ `assets/` 目录的音频文件。该音效将根据 Activity 生命周期暂停和恢复——当我们的 Activity 暂停时，音乐也应暂停；当 Activity\
  \ 恢复时，音乐应从暂停处继续播放。清单 4-10 展示了如何实现。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import java.io.IOException;\nimport android.support.v7.app.AppCompatActivity;\n\
  import android.content.res.AssetFileDescriptor;\nimport android.content.res.AssetManager;\n\
  import android.media.AudioManager;\nimport android.media.MediaPlayer;\nimport android.os.Bundle;\n\
  import android.widget.TextView;\npublic class MediaPlayerTest extends AppCompatActivity\
  \ {\nMediaPlayer mediaPlayer;\n@Override\npublic void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nTextView textView = new TextView(this);\n\
  setContentView(textView);\nsetVolumeControlStream(AudioManager.STREAM_MUSIC);\n\
  mediaPlayer = new MediaPlayer();\ntry {\nAssetManager assetManager = getAssets();\n\
  AssetFileDescriptor descriptor = assetManager.openFd(\"music.ogg\");\nmediaPlayer.setDataSource(descriptor.getFileDescriptor(),\n\
  descriptor.getStartOffset(), descriptor.getLength());\nmediaPlayer.prepare();\n\
  mediaPlayer.setLooping(true);\n} catch (IOException e) {\ntextView.setText(\"无法加载音乐文件，\
  \ \" + e.getMessage());\nmediaPlayer = null;\n}\n}\n@Override\nprotected void onResume()\
  \ {\nsuper.onResume();\nif (mediaPlayer != null) {\nmediaPlayer.start();\n}\n}\n\
  protected void onPause() {\nsuper.onPause();\nif (mediaPlayer != null) {\nmediaPlayer.pause();\n\
  if (isFinishing()) {\nmediaPlayer.stop();\nmediaPlayer.release();\n}\n}\n}\n}\n\
  清单 4-10.\nMediaPlayerTest.java：播放音频流\n```\n\n\n\n#### MediaPlayer 使用与全屏设置\n\n我们持有`MediaPlayer`的引用，作为\
  \ Activity 的成员变量。在`onCreate()`方法中，我们创建一个`TextView`用于输出错误信息，一如既往。\n\n在开始使用`MediaPlayer`之前，我们确保音量控制实际控制的是音乐流。设置完成后，我们实例化`MediaPlayer`。我们从`AssetManager`中获取`AssetFileDescriptor`，该文件位于`assets/`目录下，名为`music.ogg`，并将其设置为`MediaPlayer`的数据源。剩下要做的就是准备`MediaPlayer`实例并设置循环播放。如果出现任何问题，我们将`MediaPlayer`成员变量设为`null`，以便稍后判断加载是否成功。此外，我们向`TextView`输出一些错误文本。\n\
  \n在`onResume()`方法中，我们直接启动`MediaPlayer`（如果创建成功）。`onResume()`方法是执行此操作的理想位置，因为它会在`onCreate()`之后和`onPause()`之后被调用。在前一种情况下，它将首次启动播放；在后一种情况下，它将恢复暂停的`MediaPlayer`。\n\
  \n`onPause()`方法暂停`MediaPlayer`。如果 Activity 即将被销毁，我们停止`MediaPlayer`并释放其所有资源。\n\n\
  如果你尝试使用这些功能，请务必测试锁屏或暂时切换到主屏幕时，Activity 暂停和恢复的响应情况。当恢复时，`MediaPlayer`将从暂停处继续播放。\n\
  \n以下是需要记住的几点：\n\n- `MediaPlayer.start()`、`MediaPlayer.pause()`和`MediaPlayer.resume()`方法只能在特定状态下被调用，如前所述。在尚未准备好`MediaPlayer`时，切勿尝试调用它们。仅在准备`MediaPlayer`之后，或者在你通过调用`MediaPlayer.pause()`显式暂停后希望恢复时，才能调用`MediaPlayer.start()`。\n\
  - `MediaPlayer`实例相当重量级。实例化过多会占用大量资源。我们应始终尽量只保留一个用于音乐播放。音效更适合用`SoundPool`类处理。\n-\
  \ 记得将音量控制设置为处理音乐流，否则你的播放器将无法调整游戏音量。\n\n本章即将结束，但还有一个重要主题摆在面前：2D 图形。\n\n## 基本图形编程\n\
  \nAndroid 提供了两个主要的 API 用于屏幕绘制。一个主要用于简单的 2D 图形编程，另一个用于硬件加速的 3D 图形编程。本节和下一章将重点介绍使用`Canvas`\
  \ API 进行 2D 图形编程，这是 Skia 库的一个优秀封装，适用于中等复杂度的 2D 图形。从第 7 章开始，我们将研究使用 OpenGL 渲染 2D\
  \ 和 3D 图形。在此之前，我们需要先讨论两件事：全屏显示和唤醒锁。\n\n## 全屏显示\n\n在我们使用 Android API 绘制第一个图形之前，先解决另一个问题。到目前为止，我们所有的\
  \ Activity 都显示标题栏。通知栏也是可见的。我们希望消除这些元素，让玩家更沉浸。我们可以通过两个简单调用来实现：\n\n```\nrequestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);\n\
  ```\n\n第一个调用消除了 Activity 的标题栏。为了使 Activity 进入全屏模式并消除通知栏，我们调用第二个方法。注意，我们必须先调用这些方法，然后才能设置\
  \ Activity 的内容视图。\n\n清单 4-11 展示了一个非常简单的测试 Activity，演示如何进入全屏模式。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import android.os.Bundle;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  public class FullScreenTest extends SingleTouchTest {\n@Override\npublic void onCreate(Bundle\
  \ savedInstanceState) {\nrequestWindowFeature(Window.FEATURE_NO_TITLE);\ngetWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  WindowManager.LayoutParams.FLAG_FULLSCREEN);\nsuper.onCreate(savedInstanceState);\n\
  }\n}\n```\n\n清单 4-11. `FullScreenTest.java`: 使 Activity 全屏\n\n这里发生了什么？我们简单地从之前创建的`TouchTest`类派生，并重写`onCreate()`方法。在`onCreate()`方法中，我们启用全屏模式，然后调用超类（本例中为`TouchTest`\
  \ Activity）的`onCreate()`方法，该方法将设置 Activity 的其余部分。再次注意，我们必须在设置内容视图之前调用这两个方法。因此，在执行这两个方法之后才调用超类的`onCreate()`方法。\n\
  \n我们还在清单文件中将 Activity 的朝向固定为竖屏模式。你没有忘记为每个测试在清单文件中添加`<activity>`元素吧？从现在开始，我们将始终固定为竖屏模式或横屏模式，因为我们不希望坐标系不断变化。\n\
  \n通过从`TouchTest`派生，我们获得了一个可工作的完整示例，现在可以用它来探索绘图所用的坐标系。该 Activity 会像之前的`TouchTest`示例一样，显示你触摸屏幕的坐标。不同之处在于这次是全屏模式，这意味着触摸事件的最大坐标等于屏幕分辨率（每个维度减一，因为我们从[0,0]开始）。对于\
  \ Nexus 6，在竖屏模式下，坐标系范围从(0,0)到(1080,1780)（总共 1080×1780 个可用像素）。\n\n虽然屏幕看起来是连续重绘的，但实际上并非如此。回想一下我们的`TouchTest`类，我们每次处理触摸事件时都会更新`TextView`。这反过来又会使`TextView`重绘自身。如果不触摸屏幕，`TextView`不会重绘。对于游戏来说，我们需要尽可能频繁地重绘屏幕，最好是在我们的主循环线程中进行。我们先从简单的开始，在\
  \ UI 线程中实现连续渲染。\n\n## UI 线程中的连续渲染\n\n到目前为止，我们所做的只是在需要时设置`TextView`的文本。实际的渲染工作是由`TextView`自身完成的。现在让我们创建自定义视图，其唯一目的是让我们将内容绘制到屏幕上。我们还希望它尽可能频繁地重绘自身，并且希望有一种简单的方法在那个神秘的绘制方法中执行自己的绘图。\n\
  \n虽然这听起来可能很复杂，但实际上 Android 让我们很容易实现这样的功能。我们所要做的就是创建一个派生自`View`的类，并重写`View.onDraw()`方法。每当系统需要我们的视图重绘自身时，就会调用此方法。示例如下：\n\
  \n```\nclass RenderView extends View {\npublic RenderView(Context context) {\nsuper(context);\n\
  }\n@Override\nprotected void onDraw(Canvas canvas) {\n// 待实现\n}\n}\n```\n\n这不算什么高科技，对吧？我们得到一个`Canvas`类的实例，它被传递给`onDraw()`方法。这将是我们在后续章节中的主力工具。它允许我们在另一个位图或视图（或`Surface`，稍后会谈到）上绘制形状和位图。\n\
  \n\n\n我们可以将`RenderView`当作`TextView`来使用。只需将其设置为 Activity 的内容视图，并连接所需的输入监听器即可。然而，目前它还不是很有用，原因有二：它实际上没有绘制任何内容；即使它能绘制内容，也只有在\
  \ Activity 需要重绘时才会执行（例如，当 Activity 创建或恢复时，或者当覆盖其上的对话框消失时）。我们如何让它自行重绘呢？\n\n很简单，像这样：\n\
  \n```\nprotected void onDraw(Canvas canvas) {\n    // 所有绘制代码都放在这里\n    invalidate();\n\
  }\n```\n\n在`onDraw()`方法末尾调用`View.invalidate()`方法，会告知 Android 系统在下次有空闲时尽快重绘`RenderView`。所有这些操作仍然发生在\
  \ UI 线程上，这有点像一头懒马。不过，我们确实通过`onDraw()`方法实现了连续渲染，尽管是相对较慢的连续渲染。我们稍后会改进这一点；目前，它足以满足我们的需求。\n\
  \n那么，让我们回到神秘的`Canvas`类。它是一个非常强大的类，封装了一个名为 Skia 的自定义底层图形库，该库专门用于在 CPU 上执行 2D 渲染。`Canvas`类为我们提供了许多用于绘制各种形状、位图甚至文本的绘图方法。\n\
  \n这些绘图方法绘制到哪里？这取决于具体情况。一个`Canvas`实例可以渲染到`Bitmap`实例；`Bitmap`是 Android 2D API 提供的另一个类，我们将在本章后面深入探讨。在本例中，它渲染到视图在屏幕上占据的区域。当然，这只是一个极其简化的说法。在底层，它不会直接绘制到屏幕，而是绘制到某种位图，系统稍后会将这个位图与\
  \ Activity 中所有其他视图的位图组合起来，合成最终的输出图像。然后，该图像将被交给 GPU，再通过另一组神秘的路径显示在屏幕上。\n\n我们实际上不需要关心这些细节。从我们的角度来看，我们的`View`似乎覆盖了整个屏幕，因此可以认为它是在系统的帧缓冲区上绘制。在接下来的讨论中，我们将假装直接绘制到帧缓冲区，而系统为我们处理所有精巧的事情，例如垂直回扫和双缓冲。\n\
  \n`onDraw()`方法会被尽可能频繁地调用。对我们而言，它非常类似于我们理论上的游戏主循环的主体。如果我们想用这个方法来实现一个游戏，我们会把所有游戏逻辑都放在这个方法中。由于多种原因（其中性能是一个原因），我们不会这么做。\n\
  \n那么，让我们来做一些有趣的事情。每次你接触一个新的绘图 API 时，都应该编写一个简单的小测试来检查屏幕是否真的被频繁重绘。这有点像穷人的灯光秀。你需要在每次调用重绘方法时所做的，就是用一种新的随机颜色填充屏幕。这样，你只需要找到该\
  \ API 中允许你填充屏幕的方法，而无需了解太多繁琐的细节。让我们用自定义的`RenderView`实现来编写这样一个测试。\n\n`Canvas`类中用于使用特定颜色填充其渲染目标的方法是`Canvas.drawRGB()`：\n\
  \n```\nCanvas.drawRGB(int r, int g, int b);\n```\n\n参数`r`、`g`和`b`分别代表我们将用于填充屏幕的颜色的一个分量。每个分量的取值范围必须是\
  \ 0 到 255，因此我们实际上是在这里指定一种 RGB888 格式的颜色。如果你不记得关于颜色的详细信息，请重新查阅第 3 章的“数字编码颜色”部分，因为我们在本章余下部分都会用到这些信息。\n\
  \n清单 4-12 展示了我们这个小灯光秀的代码。\n\n**警告**\n\n运行此代码将快速用随机颜色填充屏幕。如果您患有癫痫症或对光敏感，请不要运行它。\n\
  \n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\nimport java.util.Random;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.Context;\n\
  import android.graphics.Canvas;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.view.Window;\nimport android.view.WindowManager;\n\npublic class\
  \ RenderViewTest extends AppCompatActivity {\n    class RenderView extends View\
  \ {\n        Random rand = new Random();\n\n        public RenderView(Context context)\
  \ {\n            super(context);\n        }\n\n        protected void onDraw(Canvas\
  \ canvas) {\n            canvas.drawRGB(rand.nextInt(256), rand.nextInt(256),\n\
  \                    rand.nextInt(256));\n            invalidate();\n        }\n\
  \    }\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
  \        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n\n**清单 4-12. `RenderViewTest` Activity。**\n\
  \n对于我们的第一个图形演示来说，这已经相当简洁了。我们将`RenderView`类定义为`RenderViewTest` Activity 的内部类。`RenderView`类派生自`View`类，正如之前讨论的那样，它有一个必需的构造函数以及重写的`onDraw()`方法。它还拥有一个`Random`类的实例作为成员变量；我们将用它来生成随机颜色。\n\
  \n`onDraw()`方法非常简单。我们首先告诉`Canvas`类用一种随机颜色填充整个视图。对于每个颜色分量，我们只需指定一个 0 到 255 之间的随机数（`Random.nextInt()`方法返回的值不包含上限）。之后，我们告诉系统我们希望尽快再次调用`onDraw()`方法。\n\
  \nActivity 的`onCreate()`方法启用了全屏模式，并将我们`RenderView`类的一个实例设置为内容视图。为了保持示例简短，我们暂时省略了唤醒锁。\n\
  \n为这个示例截取屏幕截图意义不大。它所做的只是以 UI 线程允许的最快速度用随机颜色填充屏幕。这没什么值得大书特书的。让我们做一些更有趣的事情：绘制一些形状……\n\
  \n**注意**\n\n上述连续渲染的方法是可行的，但我们强烈建议不要使用它！我们应该尽可能少地在 UI 线程上工作。稍后，我们将使用一个单独的线程来展示如何正确地进行操作，并且我们也可以在该线程中实现我们的游戏逻辑。\n\
  \n**获取屏幕分辨率（和坐标系）**\n\n在第 2 章中，我们讨论了很多关于帧缓冲区及其属性的内容。请记住，帧缓冲区保存着要显示在屏幕上的像素颜色。我们可以使用的像素数量由屏幕分辨率定义，分辨率由屏幕的宽度和高度（以像素为单位）给出。\n\
  \n现在，通过我们的自定义`View`实现，我们实际上并没有直接渲染到帧缓冲区。但是，由于我们的`View`覆盖了整个屏幕，我们可以假装如此。为了知道我们可以在哪里渲染游戏元素，我们需要知道\
  \ x 轴和 y 轴上有多少个像素，也就是屏幕的宽度和高度。\n\n`Canvas`类有两个方法可以为我们提供这些信息：\n\n```\nint width =\
  \ canvas.getWidth();\nint height = canvas.getHeight();\n```\n\n这会返回`Canvas`实例渲染目标的宽度和高度（以像素为单位）。请注意，根据\
  \ Activity 的方向，宽度可能小于或大于高度。例如，HTC Thunderbolt 在竖屏模式下的分辨率为 480×800 像素，因此`Canvas.getWidth()`方法会返回`480`，而`Canvas.getHeight()`方法会返回`800`。在横屏模式下，这两个值会互换：`Canvas.getWidth()`会返回`800`，而`Canvas.getHeight()`会返回`480`。\n\
  \n\n\n我们需要知道的第二项信息是我们要渲染的坐标系的组织方式。首先，只有整数像素坐标才有意义（有一个叫做子像素的概念，但我们暂时忽略它）。我们还知道，无论纵向模式还是横向模式，该坐标系的原点`(0,0)`始终位于屏幕的左上角。`x`轴的正方向始终指向右侧，而`y`轴的正方向始终指向下方。图\
  \ 4-12 展示了一个假设的屏幕，其分辨率为 48×32 像素，处于横向模式。\n\n![A340874_3_En_4_Fig12_HTML.jpg](img/A340874_3_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12. 一个 48×32 像素屏幕的坐标系\n\n请注意，图 4-12 中坐标系的原点与屏幕左上角的像素重合。因此，屏幕左下角的像素并不像我们预期的那样位于`(48,32)`，而是位于`(47,31)`。通常，`(width\
  \ – 1, height – 1)`始终是屏幕右下角像素的位置。\n\n图 4-12 展示了一个横向模式下的假设屏幕坐标系。现在你应该能够想象出该坐标系在纵向模式下是什么样子了。\n\
  \n`Canvas`类的所有绘图方法都在这种坐标系统内操作。通常，我们可以处理的像素数量远多于 48×32 像素的例子（例如，800×480）。话虽如此，让我们最终开始绘制一些像素、线条、圆形和矩形。\n\
  \n注意\n\n你可能已经注意到，不同的设备可能有不同的屏幕分辨率。我们将在下一章探讨这个问题。现在，让我们专注于最终自主地在屏幕上绘制出内容。\n\n绘制基本形状\n\
  \n我们已经深入到了第 4 章，终于要开始绘制我们的第一个像素了。我们将快速浏览一下`Canvas`类提供给我们的一些绘图方法。\n\n绘制像素\n\n我们要解决的第一件事是如何绘制单个像素。这可以通过以下方法完成：\n\
  \n```\nCanvas.drawPoint(float x, float y, Paint paint);\n```\n\n需要立刻注意两件事：像素的坐标是用`float`类型指定的，并且`Canvas`类不让我们直接指定颜色，而是需要我们提供一个`Paint`类的实例。\n\
  \n不要因为我们将坐标指定为浮点数而感到困惑。`Canvas`类有一些非常高级的功能，允许我们渲染到非整数坐标，这就是浮点数的来源。不过，我们现在还不需要那个功能；我们将在下一章中再回到这个问题。\n\
  \n`Paint`类包含用于绘制形状、文本和位图的样式和颜色信息。对于绘制形状，我们只关心两件事：画笔持有的颜色和样式。由于像素没有样式，我们先集中讨论颜色。下面是我们如何实例化`Paint`类并设置颜色：\n\
  \n```\nPaint paint = new Paint();\npaint.setARGB(alpha, red, green, blue);\n```\n\
  \n实例化`Paint`类非常简单。`Paint.setARGB()`方法也应该很容易理解。每个参数分别代表颜色的一个分量，取值范围为 0 到 255。因此，我们指定了一个\
  \ ARGB8888 颜色。\n\n或者，我们可以使用以下方法来设置`Paint`实例的颜色：\n\n```\nPaint.setColor(0xff00ff00);\n\
  ```\n\n我们向这个方法传递一个 32 位整数。它再次编码了一个 ARGB8888 颜色；在这个例子中，它是绿色，alpha 值设置为完全不透明。`Color`类定义了一些用于编码标准颜色的静态常量，例如`Color.RED`、`Color.YELLOW`等。如果你不想自己指定十六进制值，可以使用这些常量。\n\
  \n绘制线条\n\n要绘制一条线，我们可以使用以下`Canvas`类方法：\n\n```\nCanvas.drawLine(float startX, float\
  \ startY, float stopX, float stopY, Paint paint);\n```\n\n前两个参数指定线条起点的坐标，接着两个参数指定线条终点的坐标，最后一个参数指定一个`Paint`实例。绘制出的线条将是一个像素宽。如果我们希望线条更粗，可以通过设置`Paint`实例的描边宽度来指定其以像素为单位的厚度：\n\
  \n```\nPaint.setStrokeWidth(float widthInPixels);\n```\n\n绘制矩形\n\n我们还可以使用以下`Canvas`类方法绘制矩形：\n\
  \n```\nCanvas.drawRect(float left, float top, float right, float bottom, Paint paint);\n\
  ```\n\n前两个参数指定矩形左上角的坐标，接着两个参数指定矩形右下角的坐标，`Paint`实例指定矩形的颜色和样式。那么，我们可以使用哪些样式，又如何设置呢？\n\
  \n要设置`Paint`实例的样式，我们调用以下方法：\n\n```\nPaint.setStyle(Style style);\n```\n\n`Style`是一个枚举类型，包含`Style.FILL`、`Style.STROKE`和`Style.FILL_AND_STROKE`这几个值。如果我们指定`Style.FILL`，矩形会使用画笔的颜色进行填充。如果我们指定`Style.STROKE`，则只绘制矩形的轮廓线，同样使用画笔的颜色和描边宽度。如果设置了`Style.FILL_AND_STROKE`，矩形将被填充，同时使用给定的颜色和描边宽度绘制轮廓线。\n\
  \n绘制圆形\n\n绘制圆形（填充或描边，或两者兼具）会更有趣：\n\n```\nCanvas.drawCircle(float centerX, float\
  \ centerY, float radius, Paint paint);\n```\n\n前两个参数指定圆心坐标，下一个参数指定以像素为单位的半径，最后一个参数同样是一个`Paint`实例。与`Canvas.drawRect()`方法一样，画笔的颜色和样式将用于绘制圆形。\n\
  \n混合\n\n最后一件重要的事情是，所有这些绘图方法都会执行 alpha 混合。只需将颜色的 alpha 值指定为除 255（`0xff`）以外的值，你的像素、线条、矩形和圆形就会变得半透明。\n\
  \n综合运用\n\n让我们编写一个快速的测试活动，来演示前面提到的方法。这一次，我们希望你先分析代码清单 4-13 中的代码。请思考在 480×800 像素、纵向模式的屏幕上，不同的形状会被绘制在什么位置。在进行图形编程时，最重要的事情之一就是想象你发出的绘图命令会如何执行。这需要一些练习，但确实会带来丰厚的回报。\n\
  \n\n```java\npackage com.badlogic.androidgames.ch04androidbasics;\nimport android.support.v7.app.AppCompatActivity;\n\
  import android.content.Context;\nimport android.graphics.Canvas;\nimport android.graphics.Color;\n\
  import android.graphics.Paint;\nimport android.graphics.Paint.Style;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  public class ShapeTest extends AppCompatActivity {\nclass RenderView extends View\
  \ {\nPaint paint;\npublic RenderView(Context context) {\nsuper(context);\npaint\
  \ = new Paint();\n}\nprotected void onDraw(Canvas canvas) {\ncanvas.drawRGB(255,\
  \ 255, 255);\npaint.setColor(Color.RED);\ncanvas.drawLine(0, 0, canvas.getWidth()-1,\
  \ canvas.getHeight()-1, paint);\npaint.setStyle(Style.STROKE);\npaint.setColor(0xff00ff00);\n\
  canvas.drawCircle(canvas.getWidth() / 2, canvas.getHeight() / 2, 40, paint);\npaint.setStyle(Style.FILL);\n\
  paint.setColor(0x770000ff);\ncanvas.drawRect(100, 100, 200, 200, paint);\ninvalidate()\
  \ ;\n}\n}\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  requestWindowFeature(Window.FEATURE_NO_TITLE);\ngetWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  WindowManager.LayoutParams.FLAG_FULLSCREEN);\nsetContentView(new RenderView(this));\n\
  }\n}\n代码清单 4-13.\nShapeTest.java：疯狂绘制图形\n\n你是否已在脑海中形成那个画面？接下来，我们快速分析一下`RenderView.onDraw()`方法，其余部分与上一个示例相同。\n\
  \n首先，我们用白色填充屏幕。接着，从原点开始绘制一条到屏幕右下角像素的直线。我们使用的画笔颜色设置为红色，因此直线将为红色。\n\n然后，我们稍微修改画笔，将其样式设置为`Style.STROKE`，颜色设为绿色，alpha\
  \ 值设为 255。使用刚修改的画笔，在屏幕中心绘制一个半径为 40 像素的圆。由于画笔的样式设置，只会绘制圆的轮廓。\n\n最后，我们再次修改画笔。将样式设为`Style.FILL`，颜色设为纯蓝色。注意，这次我们将\
  \ alpha 值设为`0x77`，相当于十进制中的 119。这意味着接下来调用绘制的图形将有大约 50%的透明度。\n\n图 4-13 展示了该测试活动在 480×800\
  \ 和 320×480 竖屏屏幕上的输出（黑色边框是后来添加的）。\n\n![A340874_3_En_4_Fig13_HTML.jpg](img/A340874_3_En_4_Fig13_HTML.jpg)\n\
  \n**图 4-13.** `ShapeTest`在 480×800 屏幕（左）和 320×480 屏幕（右）上的输出\n\n哦，天哪，这是怎么回事？这就是在不同屏幕分辨率下使用绝对坐标和尺寸进行渲染的结果。两张图片中唯一保持不变的是那条红色直线，它只是从左上角绘制到右下角。这个操作是与屏幕分辨率无关的。\n\
  \n矩形的位置在(100,100)。根据屏幕分辨率的不同，到屏幕中心的距离也会不同。矩形的大小为 100×100 像素。在大屏幕上，它占用的相对空间比小屏幕上要小得多。\n\
  \n圆的位置同样与屏幕分辨率无关，但其半径并非如此。因此，它在小屏幕上占用的相对空间比大屏幕上更大。\n\n我们已经看到，处理不同的屏幕分辨率可能是一个问题。如果再考虑不同的物理屏幕尺寸，情况会变得更糟。不过，我们将在下一章尝试解决这个问题。请记住，屏幕分辨率和物理尺寸都很重要。\n\
  \n**注意**  \n`Canvas`和`Paint`类提供的功能远不止我们刚才提到的那些。实际上，所有标准的 Android 视图都使用这个 API 来绘制自身，所以你可以想象其中还有更多内容。和往常一样，请查阅\
  \ Android 开发者网站了解更多信息。\n\n## 使用位图\n\n虽然用直线或圆等基本形状来制作游戏是可行的，但这并不出彩。我们希望有出色的艺术家为我们创建精灵、背景等素材，然后从\
  \ PNG 或 JPEG 文件中加载它们。在 Android 上，这非常容易。\n\n### 加载与检查位图\n\n`Bitmap`类将成为我们的最佳伙伴。我们通过使用`BitmapFactory`单例从文件加载位图。由于我们将图像以资源形式存储，下面介绍如何从`assets/`目录加载图像：\n\
  \n```java\nInputStream inputStream = assetManager.open(\"bob.png\");\nBitmap bitmap\
  \ = BitmapFactory.decodeStream(inputStream);\n```\n\n`Bitmap`类本身有一些我们感兴趣的方法。首先，我们想获取`Bitmap`实例的宽度和高度（以像素为单位）：\n\
  \n```java\nint width = bitmap.getWidth();\nint height = bitmap.getHeight();\n```\n\
  \n接下来，我们可能想知道`Bitmap`实例的颜色格式：\n\n```java\nBitmap.Config config = bitmap.getConfig();\n\
  ```\n\n`Bitmap.Config`是一个枚举，包含以下值：\n\n- `Config.ALPHA_8`\n- `Config.ARGB_4444`\n\
  - `Config.ARGB_8888`\n- `Config.RGB_565`\n\n从第 3 章你应该知道这些值的含义。如果不清楚，我们强烈建议你重新阅读第\
  \ 3 章的“数字颜色编码”部分。\n\n有趣的是，没有 RGB888 颜色格式。PNG 只支持 ARGB8888、RGB888 和调色板颜色。加载 RGB888\
  \ PNG 时会使用哪种颜色格式？答案是`Bitmap.Config.RGB_565`。对于通过`BitmapFactory`加载的任何 RGB888 PNG，都会自动进行这种转换。原因是大多数\
  \ Android 设备的实际帧缓冲区都使用这种颜色格式。如果以更高的每像素比特深度加载图像，会浪费内存，因为像素最终渲染时仍需转换为 RGB565。\n\n\
  那么，为什么会有`Config.ARGB_8888`配置呢？因为在将最终图像绘制到帧缓冲区之前，可以在 CPU 上完成图像合成。对于 alpha 分量，其比特深度远高于`Config.ARGB_4444`，这对于某些高质量的图像处理可能是必要的。\n\
  \nARGB8888 PNG 图像会以`Config.ARGB_8888`配置加载到`Bitmap`实例中。其他两种颜色格式很少使用。但是，我们可以告诉`BitmapFactory`尝试以特定的颜色格式加载图像，即使其原始格式不同。\n\
  \n```java\nInputStream inputStream = assetManager.open(\"bob.png\");\nBitmapFactory.Options\
  \ options = new BitmapFactory.Options();\noptions.inPreferredConfig = Bitmap.Config.ARGB_4444;\n\
  Bitmap bitmap = BitmapFactory.decodeStream(inputStream, null, options);\n```\n\n\
  我们使用重载的`BitmapFactory.decodeStream()`方法，通过`BitmapFactory.Options`类的实例向图像解码器传递一个提示。如前所示，我们可以通过`BitmapFactory.Options.inPreferredConfig`成员指定`Bitmap`实例所需的颜色格式。在这个假设的示例中，`bob.png`文件是\
  \ ARGB8888 PNG，我们希望`BitmapFactory`加载它并将其转换为 ARGB4444 位图。不过，`BitmapFactory`可以忽略这个提示。\n\
  \n这将释放该`Bitmap`实例使用的所有内存。当然，调用此方法后，不能再使用该位图进行渲染。\n\n你也可以使用以下静态方法创建一个空的`Bitmap`实例：\n\
  \n```java\nBitmap bitmap = Bitmap.createBitmap(int width, int height, Bitmap.Config\
  \ config);\n```\n\n如果你想自行进行实时图像合成，这会非常有用。`Canvas`类也可以用于位图：\n\n```java\nCanvas canvas\
  \ = new Canvas(bitmap);\n```\n\n然后你可以像修改视图内容一样修改你的位图。\n\n### 处理位图\n```\n\n\n`BitmapFactory`可以帮助我们在加载图像时减少内存占用。如第\
  \ 3 章所述，`Bitmap`会占用大量内存。通过使用较小的色彩格式来降低每像素位数（bits per pixel）确实有所帮助，但如果我们持续不断地加载一个又一个位图，最终仍会耗尽内存。因此，我们应始终通过以下方法释放不再需要的`Bitmap`实例：\n\
  \n```java\nBitmap.recycle();\n```\n\n### 绘制位图\n\n加载完位图后，我们可以通过`Canvas`类来绘制它们。最简单的方法如下：\n\
  \n```java\nCanvas.drawBitmap(Bitmap bitmap, float topLeftX, float topLeftY, Paint\
  \ paint);\n```\n\n第一个参数不言自明。参数`topLeftX`和`topLeftY`指定了位图左上角在屏幕上的坐标。最后一个参数可以为`null`。虽然我们可以使用`Paint`类指定一些非常高级的绘制参数，但通常并不需要。\n\
  \n另一个非常实用的方法如下：\n\n```java\nCanvas.drawBitmap(Bitmap bitmap, Rect src, Rect dst,\
  \ Paint paint);\n```\n\n这个方法非常强大。它允许我们通过第二个参数指定要绘制的`Bitmap`的一部分。`Rect`类保存了一个矩形的左上角和右下角坐标。当我们通过`src`指定`Bitmap`的一部分时，使用的是`Bitmap`自身的坐标系。如果指定为`null`，则会使用完整的`Bitmap`。\n\
  \n第三个参数定义了将`Bitmap`的这部分绘制到何处，同样是以`Rect`实例的形式给出。不过，这次给出的角坐标是在`Canvas`类目标对象（可以是`View`或另一个`Bitmap`）的坐标系中。最令人惊讶的是，这两个矩形的大小不必相同。如果目标矩形比源矩形小，`Canvas`类会自动为我们进行缩放；反之，如果目标矩形更大，也同样会进行缩放。我们通常会将最后一个参数设为`null`。但请注意，这种缩放操作开销很大，应仅在必要时使用。\n\
  \n那么，你可能会想，如果拥有不同色彩格式的`Bitmap`实例，是否需要先将它们转换为某种标准格式，然后才能通过`Canvas`类进行绘制？答案是不需要。`Canvas`类会自动为我们完成转换。当然，如果使用与原生帧缓冲区格式相同的色彩格式，速度会稍快一些。通常情况下，我们可以忽略这一点。\n\
  \n混合（Blending）默认也是启用的，因此如果图像包含每像素的 alpha 分量，它会被正确解析。\n\n## 综合运用\n\n了解了这些信息后，我们终于可以加载并渲染一些\
  \ Bob 图像了。清单 4-14 展示的是我们为演示目的而编写的`BitmapTest`活动（Activity）的源码。\n\n```java\npackage\
  \ com.badlogic.androidgames.ch04androidbasics;\nimport java.io.IOException;\nimport\
  \ java.io.InputStream;\nimport android.support.v7.app.AppCompatActivity;\nimport\
  \ android.content.Context;\nimport android.content.res.AssetManager;\nimport android.graphics.Bitmap;\n\
  import android.graphics.BitmapFactory;\nimport android.graphics.Canvas;\nimport\
  \ android.graphics.Rect;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.View;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  public class BitmapTest extends AppCompatActivity {\n    class RenderView extends\
  \ View {\n        Bitmap bob565;\n        Bitmap bob4444;\n        Rect dst = new\
  \ Rect();\n        public RenderView(Context context) {\n            super(context);\n\
  \            try {\n                AssetManager assetManager = context.getAssets();\n\
  \                InputStream inputStream = assetManager.open(\"bobrgb888.png\");\n\
  \                bob565 = BitmapFactory.decodeStream(inputStream);\n           \
  \     inputStream.close();\n                Log.d(\"BitmapText\",\n            \
  \        \"bobrgb888.png format: \" + bob565.getConfig());\n                inputStream\
  \ = assetManager.open(\"bobargb8888.png\");\n                BitmapFactory.Options\
  \ options = new BitmapFactory.Options();\n                options.inPreferredConfig\
  \ = Bitmap.Config.ARGB_4444;\n                bob4444 = BitmapFactory\n        \
  \            .decodeStream(inputStream, null, options);\n                inputStream.close();\n\
  \                Log.d(\"BitmapText\",\n                    \"bobargb8888.png format:\
  \ \" + bob4444.getConfig());\n            } catch (IOException e) {\n          \
  \      // silently ignored, bad coder monkey, baaad!\n            } finally {\n\
  \                // we should really close our input streams here.\n           \
  \ }\n        }\n        protected void onDraw(Canvas canvas) {\n            canvas.drawRGB(0,\
  \ 0, 0);\n            dst.set(50, 50, 350, 350);\n            canvas.drawBitmap(bob565,\
  \ null, dst, null);\n            canvas.drawBitmap(bob4444, 100, 100, null);\n \
  \           invalidate();\n        }\n    }\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \        WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n\n清单 4-14. `BitmapTest`活动（Activity）\n\nactivity\
  \ 中的`onCreate()`方法已是老生常谈，因此我们直接来看自定义视图。它包含两个`Bitmap`成员变量：一个以 RGB565 格式存储 Bob 图像（第\
  \ 3 章中介绍过），另一个以 ARGB4444 格式存储 Bob 图像。我们还有一个`Rect`成员变量，用于存储渲染的目标矩形。\n\n在`RenderView`类的构造函数中，我们首先将\
  \ Bob 图像加载到视图的`bob565`成员变量中。请注意，该图像是从一个 RGB888 的 PNG 文件加载的，`BitmapFactory`会自动将其转换为\
  \ RGB565 图像。为证明这一点，我们还将该`Bitmap`的`Bitmap.Config`输出到了 logcat 中。RGB888 版本的 Bob 图像具有不透明的白色背景，因此无需进行混合操作。\n\
  \n接下来，我们从存储在`assets/`目录下的 ARGB8888 PNG 文件中加载 Bob 图像。为了节省内存，我们指示`BitmapFactory`将此\
  \ Bob 图像转换为 ARGB4444 位图。不过，工厂可能会出于未知原因而拒绝此请求。为了确认它是否配合，我们也将其`Bitmap.Config`输出到了\
  \ logcat。\n\n`onDraw()`方法很简单。我们只是将屏幕填充为黑色，将`bob565`缩放至 250×250 像素（原图为 160×183 像素）进行绘制，然后将`bob4444`在`bob565`之上进行绘制，不缩放但进行混合（由`Canvas`类自动完成）。图\
  \ 4-14 展示了两位 Bob 的全貌。\n\n![A340874_3_En_4_Fig14_HTML.jpg](img/A340874_3_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14. 两位 Bob 叠在一起（在 480×800 像素分辨率下）\n\nLogcat 报告显示，`bob565`确实采用了`Config.RGB_565`色彩格式，而`bob4444`被转换成了`Config.ARGB_4444`。`BitmapFactory`没有让我们失望！\n\
  \n以下是你在本部分中应记住的一些要点：\n\n*   使用能接受的、最小的色彩格式以节省内存。但这可能会牺牲一定的视觉效果，并略微降低渲染速度。\n\n\n\n\
  ## 排版后的文档\n\n除非绝对必要，否则应避免绘制缩放后的位图。如果知道它们的缩放尺寸，请预先离线缩放或在加载时缩放。\n\n始终确保在不再需要位图时调用`Bitmap.recycle()`方法。否则，会导致内存泄漏或内存不足。\n\
  \n一直使用`logcat`进行文本输出有点繁琐。让我们看看如何通过`Canvas`类渲染文本。\n\n**注意**\n与其他类一样，`Bitmap`的内容远不止我们在这简短章节中所描述的。我们只介绍了编写\
  \ Mr. Nom 游戏所需的最低限度内容。如需更多信息，请查看 Android 开发者网站上的文档。\n\n### 渲染文本\n\n虽然我们在 Mr. Nom\
  \ 游戏中输出的文本将是手绘的，但了解如何通过 TrueType 字体绘制文本并无坏处。让我们从从`assets/`目录加载自定义 TrueType 字体文件开始。\n\
  \n#### 加载字体\n\nAndroid API 提供了一个名为`Typeface`的类，它封装了 TrueType 字体。它提供了一个简单的静态方法，用于从`assets/`目录加载此类字体文件：\n\
  \n```java\nTypeface font = Typeface.createFromAsset(context.getAssets(), \"font.ttf\"\
  );\n```\n\n有趣的是，如果字体文件无法加载，此方法不会抛出任何类型的异常。相反，会抛出一个`RuntimeException`。此方法为何不显式抛出异常有点神秘。\n\
  \n#### 使用字体绘制文本\n\n一旦我们有了字体，就将其设置为`Paint`实例的`Typeface`：\n\n```java\npaint.setTypeFace(font);\n\
  ```\n\n通过`Paint`实例，我们还指定了渲染字体的大小：\n\n```java\npaint.setTextSize(30);\n```\n\n最后，我们可以通过以下`Canvas`方法使用此字体绘制文本：\n\
  \n```java\ncanvas.drawText(\"This is a test!\", 100, 100, paint);\n```\n\n第一个参数是要绘制的文本。接下来的两个参数是文本应绘制位置的坐标。最后一个参数很熟悉：它是`Paint`实例，指定了要绘制文本的颜色、字体和大小。通过设置画笔的颜色，您同时也设置了要绘制文本的颜色。\n\
  \n#### 文本对齐与边界\n\n现在，您可能想知道上述方法中的坐标与文本字符串填充的矩形有何关系。它们是否指定了文本所在矩形的左上角？答案有点复杂。`Paint`实例有一个名为对齐设置的属性。它可以通过`Paint`类的此方法进行设置：\n\
  \n```java\nPaint.setTextAlign(Paint.Align align);\n```\n\n`Paint.Align`枚举有三个值：`Paint.Align.LEFT`、`Paint.Align.CENTER`和`Paint.Align.RIGHT`。根据设置的对齐方式，传递给`Canvas.drawText()`方法的坐标被解释为矩形的左上角、矩形的顶部中心像素或矩形的右上角。标准对齐方式是`Paint.Align.LEFT`。\n\
  \n有时，了解特定字符串的像素边界也很有用。为此，`Paint`类提供了以下方法：\n\n```java\nPaint.getTextBounds(String\
  \ text, int start, int end, Rect bounds);\n```\n\n第一个参数是我们想要获取其边界的字符串。第二个和第三个参数指定要测量的字符串内的起始字符和结束字符。结束参数是独占的。最后一个参数`bounds`是我们自己分配并传入方法的`Rect`实例。该方法会将边界矩形的宽度和高度写入`Rect.right`和`Rect.bottom`字段。为方便起见，我们可以调用`Rect.width()`和`Rect.height()`来获取相同的值。\n\
  \n请注意，所有这些方法仅适用于单行文本。如果我们要渲染多行，我们必须自己进行布局。\n\n## 综合运用\n\n说得够多了。让我们多写一些代码。清单 4-15\
  \ 展示了文本渲染的实际应用。\n\n```java\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.Context;\n\
  import android.graphics.Canvas;\nimport android.graphics.Color;\nimport android.graphics.Paint;\n\
  import android.graphics.Rect;\nimport android.graphics.Typeface;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  public class FontTest extends AppCompatActivity {\n    class RenderView extends\
  \ View {\n        Paint paint;\n        Typeface font;\n        Rect bounds = new\
  \ Rect();\n        public RenderView(Context context) {\n            super(context);\n\
  \            paint = new Paint();\n            font = Typeface.createFromAsset(context.getAssets(),\
  \ \"font.ttf\");\n        }\n        protected void onDraw(Canvas canvas) {\n  \
  \          canvas.drawRGB(0, 0, 0);\n            paint.setColor(Color.YELLOW);\n\
  \            paint.setTypeface(font);\n            paint.setTextSize(28);\n    \
  \        paint.setTextAlign(Paint.Align.CENTER);\n            canvas.drawText(\"\
  This is a test!\", canvas.getWidth() / 2, 100, paint);\n            String text\
  \ = \"This is another test o_O\";\n            paint.setColor(Color.WHITE);\n  \
  \          paint.setTextSize(18);\n            paint.setTextAlign(Paint.Align.LEFT);\n\
  \            paint.getTextBounds(text, 0, text.length(), bounds);\n            canvas.drawText(text,\
  \ canvas.getWidth() - bounds.width(), 140, paint);\n            invalidate();\n\
  \        }\n    }\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n**清单 4-15.** `FontTest`活动\n\n我们不会讨论活动的`onCreate()`方法，因为之前已经见过。\n\
  \n我们的`RenderView`实现有三个成员：`Paint`、`Typeface`和`Rect`，稍后将在其中存储文本字符串的边界。\n\n在构造函数中，我们创建一个新的`Paint`实例，并从`assets/`目录中的`font.ttf`文件加载字体。\n\
  \n在`onDraw()`方法中，我们用黑色清除屏幕，将`Paint`类设置为黄色，设置字体及其大小，并指定在调用`Canvas.drawText()`时解释坐标所使用的文本对齐方式。实际的绘制调用渲染了字符串`This\
  \ is a test!`，在 y 轴上的坐标 100 处水平居中。\n\n对于第二次文本渲染调用，我们做了些不同的事情。我们希望文本与屏幕右边缘右对齐。我们可以通过使用`Paint.Align.RIGHT`和\
  \ x 坐标为`Canvas.getWidth() - 1`来实现。相反，我们使用字符串的边界以困难的方式实现，以便稍微练习一下非常基本的文本布局。我们还更改了渲染的颜色和字体大小。图\
  \ 4-15 显示了此活动的输出。\n\n![A340874_3_En_4_Fig15_HTML.jpg](img/A340874_3_En_4_Fig15_HTML.jpg)\n\
  **图 4-15.** 文本的乐趣（480×800 像素分辨率）。\n\n`Typeface`类的另一个神秘之处是，它没有明确允许我们释放其所有资源。我们必须依赖垃圾收集器为我们完成这项脏活。\n\
  \n**注意**\n我们这里只是浅尝辄止地介绍了文本渲染。如果您想了解更多……好吧，现在您知道该去哪里找了。\n\n## 使用`SurfaceView`进行连续渲染\n\
  \n这是我们将成为真正男子汉和女强人的部分。它涉及线程，以及与之相关的所有痛苦。我们会挺过去的。我们保证！\n\n### 动机\n\n当我们在本章前面首次尝试进行连续渲染时，我们做错了。占用\
  \ UI 线程是不可接受的；我们需要一个在单独线程中完成所有脏活的解决方案。欢迎使用`SurfaceView`。\n\n\n\n### SurfaceView\
  \ 类\n\n顾名思义，`SurfaceView`类是一个处理`Surface`（Android API 的另一个类）的视图。什么是`Surface`？它是屏幕合成器用于渲染特定视图的原始缓冲区的一种抽象。屏幕合成器是\
  \ Android 上所有渲染背后的核心，它最终负责将所有像素推送到 GPU。`Surface`在某些情况下可以进行硬件加速。不过，我们并不太关心这一点。我们只需要知道，这是一种更直接的将内容渲染到屏幕上的方式。\n\
  \n我们的目标是在一个单独的线程中执行渲染，这样就不会占用忙于处理其他事务的 UI 线程。`SurfaceView`类为我们提供了一种从 UI 线程之外的线程向其渲染内容的方法。\n\
  \n### SurfaceHolder 和锁定\n\n为了从不同于 UI 线程的线程渲染到`SurfaceView`，我们需要获取`SurfaceHolder`类的实例，如下所示：\n\
  \n```\nSurfaceHolder holder = surfaceView.getHolder();\n```\n\n`SurfaceHolder`是`Surface`的一个包装器，它为我们执行一些记账工作。它为我们提供了两个方法：\n\
  \n```\nCanvas SurfaceHolder.lockCanvas();\nSurfaceHolder.unlockAndPost(Canvas canvas);\n\
  ```\n\n第一个方法锁定`Surface`用于渲染，并返回一个我们可以使用的`Canvas`实例。第二个方法再次解锁`Surface`，并确保我们通过`Canvas`实例绘制的内容显示在屏幕上。我们将在渲染线程中使用这两个方法来获取`Canvas`实例，使用它进行渲染，最后让刚刚渲染的图像在屏幕上可见。我们必须传递给`SurfaceHolder.unlockAndPost()`方法的`Canvas`实例必须是我们从`SurfaceHolder.lockCanvas()`方法接收到的那个。\n\
  \n当`SurfaceView`被实例化时，`Surface`类并不会立即创建。相反，它是异步创建的。`Surface`类会在每次 Activity 暂停时被销毁，并在\
  \ Activity 恢复时被重新创建。\n\n### Surface 创建与有效性\n\n只要`Surface`实例尚未有效，我们就无法从`SurfaceHolder`类获取`Canvas`实例。但是，我们可以通过以下语句检查`Surface`实例是否已创建：\n\
  \n```\nboolean isCreated = surfaceHolder.getSurface().isValid();\n```\n\n如果此方法返回`true`，我们就可以安全地锁定\
  \ surface 并通过我们接收到的`Canvas`实例绘制。我们必须绝对确保在调用`SurfaceHolder.lockCanvas()`之后再次解锁`Surface`类，否则我们的\
  \ Activity 可能会导致手机死锁！\n\n### 整合在一起\n\n那么，我们如何将所有这一切与一个单独的渲染线程以及 Activity 生命周期结合起来呢？弄清楚这个问题的最佳方法是查看一些实际代码。列表\
  \ 4-16 显示了一个完整的示例，该示例在`SurfaceView`类的单独线程中执行渲染。\n\n```\npackage com.badlogic.androidgames.ch04androidbasics;\n\
  import android.support.v7.app.AppCompatActivity;\nimport android.content.Context;\n\
  import android.graphics.Canvas;\nimport android.os.Bundle;\nimport android.view.SurfaceHolder;\n\
  import android.view.SurfaceView;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  public class SurfaceViewTest extends AppCompatActivity {\nFastRenderView renderView;\n\
  public void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  requestWindowFeature(Window.FEATURE_NO_TITLE);\ngetWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  WindowManager.LayoutParams.FLAG_FULLSCREEN);\nrenderView = new FastRenderView(this);\n\
  setContentView(renderView);\n}\nprotected void onResume() {\nsuper.onResume();\n\
  renderView.resume();\n}\nprotected void onPause() {\nsuper.onPause();\nrenderView.pause();\n\
  }\nclass FastRenderView extends SurfaceView implements Runnable {\nThread renderThread\
  \ = null;\nSurfaceHolder holder;\nvolatile boolean running = false;\npublic FastRenderView(Context\
  \ context) {\nsuper(context);\nholder = getHolder();\n}\npublic void resume() {\n\
  running = true;\nrenderThread = new Thread(this);\nrenderThread.start();\n}\npublic\
  \ void run() {\nwhile(running) {\nif(!holder.getSurface().isValid())\ncontinue;\n\
  Canvas canvas = holder.lockCanvas();\ncanvas.drawRGB(255, 0, 0);\nholder.unlockCanvasAndPost(canvas);\n\
  }\n}\npublic void pause() {\nrunning = false;\nwhile(true) {\ntry {\nrenderThread.join();\n\
  return;\n} catch (InterruptedException e) {\n// retry\n}\n}\n}\n}\n}\n列表 4-16. SurfaceViewTest\
  \ 活动\n```\n\n这看起来并不那么令人畏惧，不是吗？我们的 Activity 持有一个`FastRenderView`实例作为成员。这是一个自定义的`SurfaceView`子类，它将为我们处理所有线程事务和\
  \ surface 锁定。对于 Activity 来说，它看起来就像一个普通的`View`。\n\n在`onCreate()`方法中，我们启用全屏模式，创建`FastRenderView`实例，并将其设置为\
  \ Activity 的内容视图。\n\n这次我们还重写了`onResume()`方法。在此方法中，我们将通过调用`FastRenderView.resume()`方法间接启动渲染线程，该方法在内部完成了所有神奇的工作。这意味着当\
  \ Activity 最初创建时，线程将启动（因为`onCreate()`之后总是会调用`onResume()`）。当 Activity 从暂停状态恢复时，线程也会重新启动。\n\
  \n这当然意味着我们必须在某个地方停止线程；否则，每次调用`onResume()`时我们都会创建一个新线程。这就是`onPause()`的作用所在。它调用`FastRenderView.pause()`方法，该方法将完全停止线程。在线程完全停止之前，该方法不会返回。\n\
  \n那么，我们来看看这个示例的核心类：`FastRenderView`。它与我们之前几个示例中实现的`RenderView`类类似，因为它派生自另一个`View`类。在本例中，我们直接派生自`SurfaceView`类。它还实现了`Runnable`接口，以便我们可以将其传递给渲染线程，使其执行渲染线程逻辑。\n\
  \n`FastRenderView`类有三个成员。`renderThread`成员只是对`Thread`实例的引用，该实例将负责执行我们的渲染线程逻辑。`holder`成员是对`SurfaceHolder`实例的引用，我们从派生出的`SurfaceView`超类中获取该实例。最后，`running`成员是一个简单的布尔标志，我们将用它来向渲染线程发出信号，指示其应停止执行。`volatile`修饰符具有特殊含义，我们稍后会介绍。\n\
  \n在构造函数中，我们所做的就是调用超类构造函数，并将对`SurfaceHolder`的引用存储在`holder`成员中。\n\n\n\n接下来是`FastRenderView.resume()`方法。它负责启动渲染线程。注意，每次调用此方法时，我们都会创建一个新的`Thread`实例。这与我们之前讨论\
  \ Activity 的`onResume()`和`onPause()`方法时提到的内容一致。我们还将`running`标志设置为`true`。稍后你会看到它在渲染线程中的用途。最后需要理解的一点是，我们将`FastRenderView`实例本身设置为线程的`Runnable`接口。这将让新线程执行`FastRenderView`的下一个方法。\n\
  \n`FastRenderView.run()`方法是我们自定义`View`类的主力。它的主体在渲染线程中执行。如你所见，它仅由一个循环组成，一旦`running`标志被设置为`false`，循环就会停止执行。当这种情况发生时，线程也将停止并消亡。在`while`循环内部，我们首先检查`Surface`是否有效。如果有效，我们就锁定它、进行渲染，然后再次解锁，如前所述。在这个例子中，我们简单地将`Surface`填充为红色。\n\
  \n`FastRenderView.pause()`方法看起来有点奇怪。首先，我们将`running`标志设置为`false`。如果你向上看看代码，会发现`FastRenderView.run()`方法中的`while`循环最终会因此终止，从而停止渲染线程。在接下来的几行代码中，我们通过调用`Thread.join()`来等待线程完全消亡。这个方法会等待线程结束，但在线程实际结束前可能会抛出`InterruptedException`异常。由于在从该方法返回之前，我们必须绝对确保线程已死，因此我们在一个无限循环中执行`join()`，直到成功为止。\n\
  \n让我们回到`running`标志的`volatile`修饰符。为什么我们需要它？原因很微妙：如果编译器发现`FastRenderView.pause()`方法中的第一行与`while`块之间没有依赖关系，它可能会决定重排其中的语句。如果编译器认为这能使代码执行得更快，它就被允许这样做。然而，我们依赖于在该方法中指定的执行顺序。想象一下，如果`running`标志是在我们尝试`join()`线程之后才被设置的。那么由于线程永远不会终止，我们将陷入无限循环。\n\
  \n`volatile`修饰符阻止了这种情况的发生。任何引用此成员的语句都将按顺序执行。这让我们避免了一个讨厌的“海森堡”问题——一个无法被稳定复现、时有时无的\
  \ bug。\n\n还有一件事，你可能认为会导致这段代码崩溃。如果在调用`SurfaceHolder.getSurface().isValid()`和`SurfaceHolder.lock()`之间，`Surface`被销毁了怎么办？好吧，我们很幸运——这永远不会发生。要理解原因，我们得退一步，看看`Surface`的生命周期是如何工作的。\n\
  \n我们知道`Surface`是异步创建的。我们的渲染线程很可能在`Surface`生效之前就开始执行了。我们通过确保在`Surface`有效时才锁定它来防止这种情况。这涵盖了`Surface`创建的情况。\n\
  \n渲染线程代码不会因为在有效性检查和锁定之间`Surface`被销毁而出错，其原因与`Surface`被销毁的时间点有关。`Surface`总是在我们从 Activity\
  \ 的`onPause()`方法返回之后才被销毁。由于我们在该方法中通过调用`FastRenderView.pause()`等待线程结束，因此当`Surface`实际被销毁时，渲染线程将不再存活。这很性感，不是吗？但同时也很令人困惑。\n\
  \n我们现在以正确的方式执行连续渲染。我们不再占用 UI 线程，而是使用一个单独的渲染线程。我们也让它尊重 Activity 的生命周期，这样在 Activity\
  \ 暂停时，它就不会在后台运行、消耗电池。世界又变得美好了。当然，我们需要将 UI 线程中输入事件的处理与我们的渲染线程同步。这将变得非常简单，你将在下一章中看到，届时我们将基于你在本章中吸收的所有信息来实现我们的游戏框架。\n\
  \n## 硬件加速的 Canvas 渲染\n\nAndroid 3.0 (Honeycomb) 增加了一个了不起的特性，即为标准 2D 画布绘制调用启用 GPU\
  \ 硬件加速。这个特性的价值因应用和设备而异，有些设备在 CPU 上执行 2D 绘制实际性能更好，而另一些设备则能从 GPU 中获益。在底层，硬件加速会分析绘制调用并将其转换为\
  \ OpenGL。例如，如果我们指定一条线应从(0,0)绘制到(100,100)，那么硬件加速将使用 OpenGL 组合成一个特殊的画线调用，并将其绘制到一个硬件缓冲区中，该缓冲区随后会合成到屏幕上。\n\
  \n启用此硬件加速非常简单，只需在`AndroidManifest.xml`文件的`<application />`标签下添加以下内容：\n\n```\nandroid:hardwareAccelerated=\"\
  true\"\n```\n\n请务必在多种设备上分别测试开启和关闭加速时的游戏表现，以确定哪种方式适合你。将来，也许一直开启它也没问题，但任何事都一样，我们建议你自行测试和判断。当然，还有更多配置选项可以让你为特定的应用、Activity、窗口或视图设置硬件加速，但由于我们是做游戏，每种对象我们只计划有一个，因此通过应用全局设置它是最合理的。\n\
  \nAndroid 此项功能的开发者 Romain Guy，有一篇非常详细的博客文章，介绍了硬件加速的注意事项以及使用它获得不错性能的一些通用准则。该博客文章的\
  \ URL 是：[`android-developers.blogspot.com/2011/03/android-30-hardware-acceleration.html`](http://android-developers.blogspot.com/2011/03/android-30-hardware-acceleration.html)\n\
  \n## 最佳实践\n\nAndroid（或者说 Dalvik）有时会有一些奇怪的性能特征。在本节中，我们将向你介绍一些最重要的最佳实践，让你的游戏如丝般顺滑。\n\
  \n*   垃圾收集器是你最大的敌人。一旦它获得 CPU 时间来处理其“脏活”，它会停止所有线程长达 600 毫秒。这意味着你的游戏会有半秒钟无法更新或渲染。用户会抱怨的。尽可能避免创建对象，尤其是在你的内层循环中。\n\
  \n*   对象可能会在一些不那么明显的地方被创建，你需要避免这些情况。不要使用迭代器，因为它们会创建新对象。不要使用任何标准的`Set`或`Map`集合类，因为每次插入它们都会创建新对象；相反，请使用\
  \ Android API 提供的`SparseArray`类。使用`StringBuffer`来拼接字符串，而不是使用`+`运算符。后者每次都会创建一个新的`StringBuffer`。此外，看在上帝的份上，不要使用装箱的基本类型（boxed\
  \ primitives）！\n\n\n\n### 方法调用与性能\n\n*   在`Dalvik`虚拟机中，方法调用的开销比其他虚拟机更大。如果可能，尽量使用静态方法，因为它们的性能最佳。静态方法通常被认为是不好的设计，就像静态变量一样，因为它们会助长不良的设计风格，所以请尽量保持设计的整洁。或许你也应该避免使用\
  \ getter 和 setter 方法。在没有 JIT 编译器的情况下，直接访问字段的速度大约是方法调用的三倍，而在有 JIT 编译器的情况下，速度则大约是七倍。尽管如此，在移除所有\
  \ getter 和 setter 之前，请先考虑你的设计。\n*   在没有 JIT 编译器的旧设备或`Dalvik`版本（即 Android 2.2 版本之前的任何版本）上，浮点运算是在软件层面实现的。老派游戏开发者会立即回退到定点数学运算。但不要这样做，因为整数除法同样很慢。大多数情况下，使用浮点数就足够了，而且新设备都配备了浮点运算单元（FPU），一旦\
  \ JIT 编译器介入，这能极大地提升运算速度。\n*   尽量将频繁访问的值放入方法内部的局部变量中。访问局部变量比访问成员变量或调用 getter 方法更快。\n\
  \n当然，你还需要注意许多其他方面。在本书的其余部分，我们会在合适的上下文中穿插一些性能优化提示。如果你遵循了上述建议，基本上就能确保安全。只要别让垃圾收集器得逞就行！\n\
  \n## 总结\n\n本章涵盖了编写一个像样的 Android 2D 游戏所需的所有知识。我们了解了使用一些默认设置来创建一个新游戏项目是多么简单。我们讨论了神秘的\
  \ Activity 生命周期以及如何与之共存。我们与触摸事件（更重要的是多点触控）进行了“较量”，处理了按键事件，并通过加速度计检测了设备的方向。我们探索了如何读写文件。在\
  \ Android 上输出音频非常简单，除了`SurfaceView`的线程问题外，在屏幕上绘制内容也并不困难。现在，Mr. Nom 游戏终于可以成为现实了——一个糟糕透顶、令人饥肠辘辘的现实！\n\
  \n"
- "# 5. 一个 Android 游戏开发框架\n\n你可能已经注意到，我们已经度过了四个章节，却没有编写一行游戏代码。我们让你经受所有这些枯燥的理论并让你实现测试程序的原因很简单：如果你想编写游戏，就必须确切了解其中的原理。你不能只是从网上各处复制粘贴代码，就指望它能成为下一款第一人称射击大作。到现在，你应该已经牢牢掌握了如何从零开始设计一个简单的游戏，如何为\
  \ 2D 游戏开发构建一个良好的 API，以及哪些 Android API 能提供实现你想法的功能。\n\n为了让 Mr. Nom 成为现实，我们必须做两件事：实现我们在第\
  \ 3 章中设计的游戏框架接口和类，并在此基础上编写 Mr. Nom 的游戏逻辑。让我们先从游戏框架开始，将我们在第 3 章中设计的部分与我们在第 4 章中讨论的内容结合起来。其中百分之九十的代码你应该已经很熟悉了，因为我们在前一章的测试程序中已经涵盖了大部分内容。\n\
  \n## 行动计划\n\n在第 3 章中，我们为游戏框架设计了一个最小化的方案，该方案抽象了所有平台特性，以便我们能专注于核心任务：游戏开发。现在，我们将采用自底向上的方式，从最简单到最复杂，实现所有这些接口和抽象类。\n\
  \n如果你已经下载了本章的代码，第 3 章中的接口位于名为`com.badlogic.androidgames.framework`的包中。我们会将本章的实现代码放在`com.badlogic.androidgames.framework.impl`包中，这表明它是\
  \ Android 框架的实际实现。我们会在所有接口实现类名前加上`Android`前缀，以便将它们与接口区分开来。让我们从最简单的部分——文件 I/O——开始。\n\
  \n如果你没有下载本章的代码，只需创建一个新项目，并将刚才提到的两个包添加到其中。在第一个包中，添加第 3 章的接口代码。在第二个包中，你将放置本章的所有代码。本章和下一章的代码将合并到一个\
  \ Android Studio 项目中。现在，你可以按照第 4 章的步骤创建一个新的 Android 项目。此时，你为默认 Activity 取什么名字都无关紧要。\n\
  \n## `AndroidFileIO` 类\n\n原始的文件 I/O 接口简洁而高效。它包含四个方法：一个用于获取资源文件的`InputStream`，一个用于获取外部存储文件的`InputStream`，一个用于返回外部存储设备文件的`OutputStream`，以及最后一个用于获取游戏共享首选项的方法。在第\
  \ 4 章中，你学习了如何使用 Android API 打开资源文件和外部存储上的文件。以下代码清单 5-1 展示了基于第 4 章知识的文件 I/O 接口实现。\n\
  \n```\npackage com.badlogic.androidgames.framework.impl;\nimport java.io.File;\n\
  import java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
  import java.io.InputStream;\nimport java.io.OutputStream;\nimport android.content.Context;\n\
  import android.content.SharedPreferences;\nimport android.content.res.AssetManager;\n\
  import android.os.Environment;\nimport android.preference.PreferenceManager;\nimport\
  \ com.badlogic.androidgames.framework.FileIO;\npublic class AndroidFileIO implements\
  \ FileIO {\nContext context;\nAssetManager assets;\nString externalStoragePath;\n\
  public AndroidFileIO(Context context) {\nthis.context = context;\nthis.assets =\
  \ context.getAssets();\nthis.externalStoragePath = content.getExternalFilesDir(null)\n\
  .getAbsolutePath() + File.separator;\n}\npublic InputStream readAsset(String fileName)\
  \ throws IOException {\nreturn assets.open(fileName);\n}\npublic InputStream readFile(String\
  \ fileName) throws IOException {\nreturn new FileInputStream(externalStoragePath\
  \ + fileName);\n}\npublic OutputStream writeFile(String fileName) throws IOException\
  \ {\nreturn new FileOutputStream(externalStoragePath + fileName);\n}\npublic SharedPreferences\
  \ getPreferences() {\nreturn PreferenceManager.getDefaultSharedPreferences(context);\n\
  }\n}\n代码清单 5-1.\nAndroidFileIO.java: 实现 FileIO 接口\n```\n\n一切都很直接。我们实现了文件 I/O 接口，存储了`Context`实例（它是通往\
  \ Android 几乎所有功能的门户），存储了从`Context`实例获取的`AssetManager`，存储了特定于我们应用程序的外部存储路径，并基于此路径实现了四个方法。最后，我们传递了任何可能抛出的`IOException`，以便在调用方了解是否有任何异常情况。\n\
  \n我们的游戏接口实现将持有一个此类的实例，并通过`Game.getFileIO()`返回它。这也意味着，为了使`AndroidFileIO`实例正常工作，我们的游戏实现需要传递`Context`实例。\n\
  \n\n\n### 关于外部存储可用性的说明\n\n请注意，我们不会检查外部存储是否可用。如果外部存储不可用，或者我们忘记在清单文件中添加适当的权限，应用程序将抛出异常，因此错误检查是隐式完成的。现在，我们可以继续构建框架的下一部分——音频部分。\n\
