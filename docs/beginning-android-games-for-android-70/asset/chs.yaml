  HelpScreen.java: The first help screen\n```\n\n我们再次有一些成员变量，持有一个摄像机、一个`SpriteBatcher`、箭头按钮的矩形、触摸点的向量，以及用于帮助图像的`Texture`和`TextureRegion`。\n\
  \n```\npublic HelpScreen(Game game) {\nsuper(game);\nguiCam = new Camera2D(glGraphics,\
  \ 320, 480);\nnextBounds = new Rectangle(320 - 64, 0, 64, 64);\ntouchPoint = new\
  \ Vector2();\nbatcher = new SpriteBatcher(glGraphics, 1);\n}\n```\n\n在构造函数中，我们以与在`MainMenuScreen`中几乎相同的方式设置所有成员。\n\
  \n```\n@Override\npublic void resume() {\nhelpImage = new Texture(glGame, \"help1.png\"\
  \ );\nhelpRegion = new TextureRegion(helpImage, 0, 0, 320, 480);\n}\n@Override\n\
  public void pause() {\nhelpImage.dispose();\n}\n```\n\n在`resume()`方法中，我们加载实际的帮助屏幕纹理，并创建一个对应的`TextureRegion`用于与`SpriteBatcher`一起渲染。我们在此方法中进行加载，因为\
  \ OpenGL ES 上下文可能会丢失。背景和 UI 元素的纹理由`Assets`和`SuperJumper`类处理，如前所述。我们不需要在任何屏幕中处理它们。此外，我们在`pause()`方法中再次释放帮助图像纹理以清理内存。\n\
  \n```\n@Override\npublic void update(float deltaTime) {\nList touchEvents = game.getInput().getTouchEvents();\n\
  game.getInput().getKeyEvents();\nint len = touchEvents.size();\nfor(int i = 0; i\
  \ < len; i++) {\nTouchEvent event = touchEvents.get(i);\ntouchPoint.set(event.x,\
  \ event.y);\nguiCam.touchToWorld(touchPoint);\nif(event.type == TouchEvent.TOUCH_UP)\
  \ {\nif(OverlapTester.pointInRectangle(nextBounds, touchPoint)) {\nAssets.playSound(Assets.clickSound);\n\
  game.setScreen(new HelpScreen2(game));\nreturn;\n}\n}\n}\n}\n```\n\n接下来是`update()`方法，它仅仅检查箭头按钮是否被按下。如果被按下，我们就切换到下一个帮助屏幕。我们还会播放点击音效。\n\
  \n```\n@Override\npublic void present(float deltaTime) {\nGL10 gl = glGraphics.getGL();\n\
  gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\nguiCam.setViewportAndMatrices();\ngl.glEnable(GL10.GL_TEXTURE_2D);\n\
  batcher.beginBatch(helpImage);\nbatcher.drawSprite(160, 240, 320, 480, helpRegion);\n\
  batcher.endBatch();\ngl.glEnable(GL10.GL_BLEND);\ngl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\nbatcher.beginBatch(Assets.items);\nbatcher.drawSprite(320\
  \ - 32, 32, -64, 64, Assets.arrow);\nbatcher.endBatch();\ngl.glDisable(GL10.GL_BLEND);\n\
  }\n@Override\npublic void dispose() {\n}\n}\n```\n\n在`present()`方法中，我们清除屏幕，设置矩阵，在一个批次中渲染帮助图像，然后渲染箭头按钮。当然，我们不需要在这里渲染背景图像，因为帮助图像已经包含了它。\n\
  \n其他帮助屏幕是类似的，如前所述。\n\n##### 高分屏幕\n\n接下来是高分屏幕。这里，我们将使用主菜单 UI 标签的一部分（HIGHSCORES 部分），并通过存储在`Assets`类中的`Font`实例来渲染存储在`Settings`中的高分数据。当然，我们有一个箭头按钮，以便玩家可以返回主菜单。清单\
  \ 9-8 展示了代码。\n\n```\npackage com.badlogic.androidgames.jumper;\nimport java.util.List;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.gl.Camera2D;\n\
  import com.badlogic.androidgames.framework.gl.SpriteBatcher;\nimport com.badlogic.androidgames.framework.impl.GLScreen;\n\
  import com.badlogic.androidgames.framework.math.OverlapTester;\nimport com.badlogic.androidgames.framework.math.Rectangle;\n\
  import com.badlogic.androidgames.framework.math.Vector2;\npublic class HighscoreScreen\
  \ extends GLScreen {\nCamera2D guiCam;\nSpriteBatcher batcher;\nRectangle backBounds;\n\
  Vector2 touchPoint;\nString[] highScores;\nfloat xOffset = 0;\nListing 9-8.\nHighscoresScreen.java:\
  \ The high-scores screen\n```\n\n像往常一样，我们有一些成员变量用于摄像机、`SpriteBatcher`、箭头按钮的边界等。在`highScores`数组中，我们存储了为呈现给玩家的每个高分格式化的字符串。`xOffset`成员是我们计算出来的一个值，用于偏移每行文本的渲染，以使各行水平居中。\n\
  \n```\npublic HighscoreScreen(Game game) {\nsuper(game);\nguiCam = new Camera2D(glGraphics,\
  \ 320, 480);\nbackBounds = new Rectangle(0, 0, 64, 64);\ntouchPoint = new Vector2();\n\
  batcher = new SpriteBatcher(glGraphics, 100);\nhighScores = new String[5];\nfor(int\
  \ i = 0; i < 5; i++) {\nhighScores[i] = (i + 1) + \". \" + Settings.highscores[i];\n\
  xOffset = Math.max(highScores[i].length() * Assets.font.glyphWidth, xOffset);\n\
  }\nxOffset = 160 - xOffset / 2;\n}\n```\n\n在构造函数中，我们像往常一样设置所有成员，并计算`xOffset`值。我们通过评估为五个高分创建的五条字符串中最长字符串的大小来做到这一点。由于我们的位图字体是等宽的，我们可以通过将字符数乘以字形宽度来轻松计算单行文本所需的像素数。当然，这不会考虑非打印字符或\
  \ ASCII 字符集之外的字符。由于我们知道不会使用这些字符，因此可以通过这个简单的计算来实现目的。构造函数中的最后一行然后从 160（我们目标屏幕 320×480\
  \ 像素的水平中心）减去最长行宽度的一半，并通过减去字形宽度的一半来进一步调整。这是必要的，因为`Font.drawText()`方法使用的是字形中心而不是角点。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n```java\n@Override\n\
  public void update(float deltaTime) {\n    List touchEvents = game.getInput().getTouchEvents();\n\
  \    game.getInput().getKeyEvents();\n    int len = touchEvents.size();\n    for(int\
  \ i = 0; i < len; i++) {\n        TouchEvent event = touchEvents.get(i);\n     \
  \   touchPoint.set(event.x, event.y);\n        guiCam.touchToWorld(touchPoint);\n\
  \        if(event.type == TouchEvent.TOUCH_UP) {\n            if(OverlapTester.pointInRectangle(backBounds,\
  \ touchPoint)) {\n                game.setScreen(new MainMenuScreen(game));\n  \
  \              return;\n            }\n        }\n    }\n}\n```\n\n`update()` 方法只检查箭头按钮是否被按下。如果是，它会播放点击音效并切换回主菜单界面。\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    guiCam.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n    batcher.beginBatch(Assets.background);\n\
  \    batcher.drawSprite(160, 240, 320, 480, Assets.backgroundRegion);\n    batcher.endBatch();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    batcher.beginBatch(Assets.items);\n    batcher.drawSprite(160, 360, 300, 33,\
  \ Assets.highScoresRegion);\n    float y = 240;\n    for(int i = 4; i >= 0; i--)\
  \ {\n        Assets.font.drawText(batcher, highScores[i], xOffset, y);\n       \
  \ y += Assets.font.glyphHeight;\n    }\n    batcher.drawSprite(32, 32, 64, 64, Assets.arrow);\n\
  \    batcher.endBatch();\n    gl.glDisable(GL10.GL_BLEND);\n}\n\n@Override\npublic\
  \ void resume() {\n}\n\n@Override\npublic void pause() {\n}\n\n@Override\npublic\
  \ void dispose() {\n}\n```\n\n`present()` 方法同样非常直接。我们清屏、设置矩阵、渲染背景、渲染主菜单标签中的“高分”部分，然后使用在构造函数中计算的\
  \ `xOffset` 渲染五条高分记录。现在我们就能明白为什么 `Font` 不处理纹理绑定：我们可以将五次对 `Font.drawText()` 的调用进行批处理。当然，我们必须确保\
  \ `SpriteBatcher` 实例能够批处理渲染文本所需的尽可能多的精灵（或字形，在此例中）。我们在构造函数中创建它时，通过设置最大批处理大小为 100\
  \ 个精灵（字形）来确保这一点。\n\n现在，是时候看看我们模拟类的代码了。\n\n#### 模拟类\n\n在我们深入游戏屏幕之前，需要先创建模拟类。我们将遵循与\
  \ Mr. Nom 中相同的模式，为每个游戏对象创建一个类，并创建一个名为 `World` 的无所不知的父类，它将松散的部分联系起来并推动我们的游戏世界运转。我们需要为以下对象创建类：\n\
  \n*   Bob\n*   松鼠\n*   弹簧\n*   金币\n*   平台\n\nBob、松鼠和平台可以移动，因此我们将它们的类建立在第 8 章创建的\
  \ `DynamicGameObject` 类之上。弹簧和金币是静态的，因此它们将派生自 `GameObject` 类。每个模拟类的任务如下：\n\n*   存储对象的位置、速度和碰撞形状。\n\
  *   如果需要，存储对象的状态以及对象处于该状态的时长（状态时间）。\n*   提供一个 `update()` 方法，该方法将根据需要根据对象的行为推进对象。\n\
  *   提供改变对象状态的方法（例如，告诉 Bob 他死了或碰到了弹簧）。\n\n然后 `World` 类将跟踪这些对象的多个实例，每帧更新它们，检查对象与 Bob\
  \ 之间的碰撞，并执行碰撞响应（即，让 Bob 死亡、收集金币等）。接下来我们将从最简单到最复杂逐个讲解每个类。\n\n#### Spring 类\n\n让我们从\
  \ `Spring` 类开始，如代码清单 9-9 所示。\n\n```java\npackage com.badlogic.androidgames.jumper;\n\
  import com.badlogic.androidgames.framework.GameObject;\n\npublic class Spring extends\
  \ GameObject {\n    public static float SPRING_WIDTH = 0.3f;\n    public static\
  \ float SPRING_HEIGHT = 0.3f;\n\n    public Spring(float x, float y) {\n       \
  \ super(x, y, SPRING_WIDTH, SPRING_HEIGHT);\n    }\n}\n代码清单 9-9.\nSpring.java: Spring\
  \ 类\n```\n\n`Spring` 类派生自我们在第 8 章创建的 `GameObject` 类。因为弹簧不会移动，我们只需要一个位置和一个碰撞形状。\n\
  \n接下来，我们定义两个可公开访问的常量：弹簧的宽度和高度，单位是米。我们之前估算了这些值，这里直接复用它们。\n\n最后一部分是构造函数，它接收弹簧中心的 x\
  \ 和 y 坐标。我们用它调用父类 `GameObject` 的构造函数，该构造函数接收位置以及对象的宽度和高度，用于构建碰撞形状（一个以给定位置为中心的矩形）。有了这些信息，我们的\
  \ `Spring` 类就完整定义了，它拥有一个位置和用于碰撞检测的碰撞形状。\n\n#### Coin 类\n\n接下来是金币类，如代码清单 9-10 所示。\n\
  \n```java\npackage com.badlogic.androidgames.jumper;\nimport com.badlogic.androidgames.framework.GameObject;\n\
  \npublic class Coin extends GameObject {\n    public static final float COIN_WIDTH\
  \ = 0.5f;\n    public static final float COIN_HEIGHT = 0.8f;\n    public static\
  \ final int COIN_SCORE = 10;\n    float stateTime;\n\n    public Coin(float x, float\
  \ y) {\n        super(x, y, COIN_WIDTH, COIN_HEIGHT);\n        stateTime = 0;\n\
  \    }\n\n    public void update(float deltaTime) {\n        stateTime += deltaTime;\n\
  \    }\n}\n代码清单 9-10.\nCoin.java: Coin 类\n```\n\n`Coin` 类与 `Spring` 类非常相似，只有一个区别：我们跟踪金币已经存在的时间。当我们稍后要使用\
  \ `Animation` 渲染金币时，需要用到此信息。我们在第 8 章的最后一个示例中为我们的穴居人也做了同样的事情。这是一种我们将用于所有模拟类的技术。给定一个状态和状态时间，我们可以选择一个\
  \ `Animation`，以及该 `Animation` 的关键帧，用于渲染。金币只有一个状态，因此我们只需要跟踪状态时间即可。为此，我们提供了 `update()`\
  \ 方法，它将状态时间增加传递给它的增量时间。\n\n类顶部定义的常量指定了金币的宽度和高度（如前所述），以及 Bob 碰到金币后获得的分数。\n\n####\
  \ Castle 类\n\n接下来，我们有一个类用于表示我们世界顶部的城堡。代码清单 9-11 展示了代码。\n\n```java\npackage com.badlogic.androidgames.jumper;\n\
  import com.badlogic.androidgames.framework.GameObject;\n\npublic class Castle extends\
  \ GameObject {\n    public static float CASTLE_WIDTH = 1.7f;\n    public static\
  \ float CASTLE_HEIGHT = 1.7f;\n\n    public Castle(float x, float y) {\n       \
  \ super(x, y, CASTLE_WIDTH, CASTLE_HEIGHT);\n    }\n}\n代码清单 9-11.\nCastle.java:\
  \ Castle 类\n```\n\n不太复杂。我们需要存储的只是城堡的位置和边界。城堡的大小由常量 `CASTLE_WIDTH` 和 `CASTLE_HEIGHT`\
  \ 定义，使用的是我们之前讨论过的值。\n\n#### Squirrel 类\n\n接下来是 `Squirrel` 类，如代码清单 9-12 所示。\n\n\n\
  ```java\npackage com.badlogic.androidgames.jumper;\nimport com.badlogic.androidgames.framework.DynamicGameObject;\n\
  public class Squirrel extends DynamicGameObject {\npublic static final float SQUIRREL_WIDTH\
  \ = 1;\npublic static final float SQUIRREL_HEIGHT = 0.6f;\npublic static final float\
  \ SQUIRREL_VELOCITY = 3f;\nfloat stateTime = 0;\npublic Squirrel(float x, float\
  \ y) {\nsuper(x, y, SQUIRREL_WIDTH, SQUIRREL_HEIGHT);\nvelocity.set(SQUIRREL_VELOCITY,\
  \ 0);\n}\npublic void update(float deltaTime) {\nposition.add(velocity.x * deltaTime,\
  \ velocity.y * deltaTime);\nbounds.lowerLeft.set(position).sub(SQUIRREL_WIDTH /\
  \ 2, SQUIRREL_HEIGHT / 2);\nif(position.x < 0) {\nposition.x = SQUIRREL_WIDTH /\
  \ 2;\nvelocity.x = SQUIRREL_VELOCITY;\n}\nif(position.x > World.WORLD_WIDTH - SQUIRREL_WIDTH\
  \ / 2) {\nposition.x = World.WORLD_WIDTH - SQUIRREL_WIDTH / 2;\nvelocity.x = -SQUIRREL_VELOCITY;\n\
  }\nstateTime += deltaTime;\n}\n}\n```\n**代码清单 9-12.**\n`Squirrel.java`：`Squirrel`\
  \ 类\n\n松鼠是移动对象，因此我们让该类继承自 `DynamicGameObject`，它为我们提供了速度向量和加速度向量。我们首先要定义松鼠的大小及其速度。由于松鼠是动画对象，我们还需要跟踪它的状态时间。松鼠和硬币一样只有单一状态：水平移动。向左还是向右移动可以根据速度向量的\
  \ x 分量来判断，因此我们无需为此存储单独的状态成员。\n\n在构造函数中，我们调用父类的构造函数，传入松鼠的初始位置和大小。同时将速度向量设为（`SQUIRREL_VELOCITY`，0）。这样一来，所有松鼠一开始都会向右移动。\n\
  \n`update()` 方法根据速度和增量时间更新松鼠的位置和碰撞形状。这是我们标准的欧拉积分步骤，在第 8 章中我们讨论并多次使用过。我们还检查松鼠是否撞到了世界的左边缘或右边缘。如果撞到了，我们只需反转其速度向量，使其向相反方向移动。如前所述，我们世界的宽度固定为\
  \ 10 米。最后要做的是根据增量时间更新状态时间，以便后续判断需要使用哪个动画帧来渲染该松鼠。\n\n#### Platform 类\n\n`Platform`\
  \ 类如代码清单 9-13 所示。\n\n```java\npackage com.badlogic.androidgames.jumper;\nimport\
  \ com.badlogic.androidgames.framework.DynamicGameObject;\npublic class Platform\
  \ extends DynamicGameObject {\npublic static final float PLATFORM_WIDTH = 2;\npublic\
  \ static final float PLATFORM_HEIGHT = 0.5f;\npublic static final int PLATFORM_TYPE_STATIC\
  \ = 0;\npublic static final int PLATFORM_TYPE_MOVING = 1;\npublic static final int\
  \ PLATFORM_STATE_NORMAL = 0;\npublic static final int PLATFORM_STATE_PULVERIZING\
  \ = 1;\npublic static final float PLATFORM_PULVERIZE_TIME = 0.2f * 4;\npublic static\
  \ final float PLATFORM_VELOCITY = 2;\n```\n**代码清单 9-13.**\n`Platform.java`：`Platform`\
  \ 类\n\n当然，平台稍微复杂一些。我们逐一梳理该类中定义的常量。前两个常量定义了平台的宽度和高度，如前所述。平台有一个类型：可以是静态平台，也可以是移动平台。我们通过常量\
  \ `PLATFORM_TYPE_STATIC` 和 `PLATFORM_TYPE_MOVING` 来标识。平台还可以处于两种状态之一：正常状态（即静态放置或移动）或粉碎状态。状态通过常量\
  \ `PLATFORM_STATE_NORMAL` 或 `PLATFORM_STATE_PULVERIZING` 来编码。当然，粉碎是一个有时限的过程。因此我们定义了平台完全粉碎所需的时间，即\
  \ 0.8 秒。这个值是根据平台 `Animation` 中的帧数和每帧的持续时间简单计算得出的——这是在尝试遵循 MVC 模式时必须接受的小瑕疵之一。最后，如前所述，我们将移动平台的速度定义为\
  \ 2 米/秒。移动平台的行为与松鼠完全相同：它会朝一个方向移动，直到碰到世界的水平边界，然后反转方向。\n\n```java\nint type;\nint\
  \ state;\nfloat stateTime;\npublic Platform(int type, float x, float y) {\nsuper(x,\
  \ y, PLATFORM_WIDTH, PLATFORM_HEIGHT);\nthis.type = type;\nthis.state = PLATFORM_STATE_NORMAL;\n\
  this.stateTime = 0;\nif(type == PLATFORM_TYPE_MOVING) {\nvelocity.x = PLATFORM_VELOCITY;\n\
  }\n}\n```\n\n为了存储 `Platform` 实例的类型、状态和状态时间，我们需要三个成员变量。这些变量在构造函数中根据 `Platform` 的类型进行初始化，该类型是构造函数的参数之一，另一个参数是平台中心的位置。\n\
  \n```java\npublic void update(float deltaTime) {\nif(type == PLATFORM_TYPE_MOVING)\
  \ {\nposition.add(velocity.x * deltaTime, 0);\nbounds.lowerLeft.set(position).sub(PLATFORM_WIDTH\
  \ / 2, PLATFORM_HEIGHT / 2);\nif(position.x < 0) {\nposition.x = PLATFORM_WIDTH\
  \ / 2;\nvelocity.x = PLATFORM_VELOCITY;\n}\nif(position.x > World.WORLD_WIDTH -\
  \ PLATFORM_WIDTH / 2) {\nvelocity.x = -velocity.x;\nposition.x = World.WORLD_WIDTH\
  \ - PLATFORM_WIDTH / 2;\n}\n}\nstateTime += deltaTime;\n}\n```\n\n`update()` 方法会移动平台并检测是否超出世界边界，然后通过反转速度向量做出相应处理。这与我们在\
  \ `Squirrel.update()` 方法中所做的完全相同。我们还会在方法末尾更新状态时间。\n\n```java\npublic void pulverize()\
  \ {\nstate = PLATFORM_STATE_PULVERIZING;\nstateTime = 0;\nvelocity.x = 0;\n}\n}\n\
  ```\n\n该类的最后一个方法名为 `pulverize()`。它将状态从 `PLATFORM_STATE_NORMAL` 切换为 `PLATFORM_STATE_PULVERIZING`，并重置状态时间和速度。这意味着移动平台将停止移动。当\
  \ `World` 类检测到 Bob 与平台发生碰撞，并根据随机数决定粉碎该 `Platform` 时，会调用此方法。我们稍后会讨论这一点。首先，需要介绍 Bob。\n\
  \n#### Bob 类\n\n`Bob` 类如代码清单 9-14 所示。\n\n```java\npackage com.badlogic.androidgames.jumper;\n\
  import com.badlogic.androidgames.framework.DynamicGameObject;\npublic class Bob\
  \ extends DynamicGameObject{\npublic static final int BOB_STATE_JUMP = 0;\npublic\
  \ static final int BOB_STATE_FALL = 1;\npublic static final int BOB_STATE_HIT =\
  \ 2;\npublic static final float BOB_JUMP_VELOCITY = 11;\npublic static final float\
  \ BOB_MOVE_VELOCITY = 20;\npublic static final float BOB_WIDTH = 0.8f;\npublic static\
  \ final float BOB_HEIGHT = 0.8f;\n```\n**代码清单 9-14.**\n`Bob.java`\n\n我们再次从一组常量开始。Bob\
  \ 可以处于三种状态之一：向上跳跃、向下坠落或被击中。他还有一个垂直跳跃速度（仅应用于 y 轴）和一个水平移动速度（仅应用于 x 轴）。最后两个常量定义了 Bob\
  \ 在世界中的宽度和高度。当然，我们还必须存储 Bob 的状态和状态时间。\n\n\n```java\nint state;\nfloat stateTime;\n\
  public Bob(float x, float y) {\n    super(x, y, BOB_WIDTH, BOB_HEIGHT);\n    state\
  \ = BOB_STATE_FALL;\n    stateTime = 0;\n}\n```\n\n构造函数仅调用超类的构造函数，以确保 Bob 的中心位置和边界形状正确初始化，然后初始化`state`和`stateTime`成员变量。\n\
  \n```java\npublic void update(float deltaTime) {\n    velocity.add(World.gravity.x\
  \ * deltaTime, World.gravity.y * deltaTime);\n    position.add(velocity.x * deltaTime,\
  \ velocity.y * deltaTime);\n    bounds.lowerLeft.set(position).sub(bounds.width\
  \ / 2, bounds.height / 2);\n\n    if(velocity.y > 0 && state != BOB_STATE_HIT) {\n\
  \        if(state != BOB_STATE_JUMP) {\n            state = BOB_STATE_JUMP;\n  \
  \          stateTime = 0;\n        }\n    }\n\n    if(velocity.y < 0 && state !=\
  \ BOB_STATE_HIT) {\n        if(state != BOB_STATE_FALL) {\n            state = BOB_STATE_FALL;\n\
  \            stateTime = 0;\n        }\n    }\n\n    if(position.x < 0) position.x\
  \ = World.WORLD_WIDTH;\n    if(position.x > World.WORLD_WIDTH) position.x = 0;\n\
  \    stateTime += deltaTime;\n}\n```\n\n`update()`方法首先根据重力和 Bob 当前速度更新他的位置和边界形状。注意，速度是重力与\
  \ Bob 自身跳跃和水平移动的复合结果。接下来的两个大的条件块根据 Bob 速度的 y 分量，将他的状态设置为`BOB_STATE_JUMPING`或`BOB_STATE_FALLING`，并重新初始化他的状态时间。如果`velocity.y`大于零，Bob\
  \ 向上跳；如果小于零，则向下落。仅当 Bob 未受击且尚未处于正确状态时，我们才执行此操作；否则状态时间会总是被重置为零，这不利于后续 Bob 的动画表现。我们还处理了边界包裹：当\
  \ Bob 离开世界左边缘或右边缘时，会从另一侧出现。最后，我们再次更新`stateTime`成员。\n\n除了重力，Bob 的速度从何而来？这就是其他方法发挥作用的地方。\n\
  \n```java\npublic void hitSquirrel() {\n    velocity.set(0,0);\n    state = BOB_STATE_HIT;\n\
  \    stateTime = 0;\n}\n\npublic void hitPlatform() {\n    velocity.y = BOB_JUMP_VELOCITY;\n\
  \    state = BOB_STATE_JUMP;\n    stateTime = 0;\n}\n\npublic void hitSpring() {\n\
  \    velocity.y = BOB_JUMP_VELOCITY * 1.5f;\n    state = BOB_STATE_JUMP;\n    stateTime\
  \ = 0;\n}\n```\n\n当 Bob 碰到松鼠时，`World`类会调用`hitSquirrel()`方法。此时 Bob 停止自主移动，进入`BOB_STATE_HIT`状态。自此以后，只有重力会作用于\
  \ Bob；玩家无法再控制他，他也无法再与平台互动。这与超级马里奥被敌人击中后的行为类似——他直接坠落。\n\n当 Bob 在下落过程中碰到平台时，`World`类会调用`hitPlatform()`方法。我们将他的\
  \ y 速度设置为`BOB_JUMP_VELOCITY`，并相应地更新他的状态和状态时间。自此，Bob 将向上移动，直到重力再次占上风，使他开始下落。\n\n\
  最后一个方法`hitSpring()`由`World`类在 Bob 碰到弹簧时调用。它与`hitPlatform()`方法功能相同，唯有一个区别：初始向上的速度被设置为\
  \ 1.5 倍的`BOB_JUMP_VELOCITY`。这意味着 Bob 碰到弹簧时的跳跃高度比碰到平台时更高。\n\n#### World 类\n\n我们需要讨论的最后一个类是`World`类。它代码稍长，我们将分段讲解。清单\
  \ 9-15 展示了代码的第一部分。\n\n```java\npackage com.badlogic.androidgames.jumper;\n\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\nimport java.util.Random;\n\nimport\
  \ com.badlogic.androidgames.framework.math.OverlapTester;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class World {\n    public interface WorldListener {\n        void jump();\n\
  \        void highJump();\n        void hit();\n        void coin();\n    }\n```\n\
  \n**清单 9-15.** `World.java`节选：常量、成员和初始化\n\n首先定义的是一个名为`WorldListener`的接口。它的作用是什么？我们需要用它来解决一个\
  \ MVC 难题：何时播放音效？我们可以直接在相应的模拟类中添加`Assets.playSound()`调用，但这样做不够清晰。相反，我们允许`World`类的使用者注册一个`WorldListener`，当\
  \ Bob 从平台跳跃、从弹簧跳跃、被松鼠击中或收集金币时，该监听器会被调用。稍后我们会注册一个监听器，负责为这些事件播放正确的音效，从而使模拟类与渲染和音频播放保持完全解耦。\n\
  \n```java\n    public static final float WORLD_WIDTH = 10;\n    public static final\
  \ float WORLD_HEIGHT = 15 * 20;\n    public static final int WORLD_STATE_RUNNING\
  \ = 0;\n    public static final int WORLD_STATE_NEXT_LEVEL = 1;\n    public static\
  \ final int WORLD_STATE_GAME_OVER = 2;\n    public static final Vector2 gravity\
  \ = new Vector2(0, -12);\n```\n\n接下来，我们定义了几个常量。`WORLD_WIDTH`和`WORLD_HEIGHT`指定了世界的水平和垂直范围。回顾一下，我们的视景体将显示世界中的一个\
  \ 10×15 米区域。根据这里定义的常量，我们的世界将垂直跨越 20 个视景体或屏幕。同样，这也是我们通过调优得出的值。在讨论如何生成关卡时，我们还会回到这一点。世界可以处于三种状态之一：运行中、等待下一关卡开始，或游戏结束（当\
  \ Bob 掉出视景体范围时）。我们还在此处将重力加速度向量定义为常量。\n\n```java\n    public final Bob bob;\n   \
  \ public final List<Platform> platforms;\n    public final List<Spring> springs;\n\
  \    public final List<Squirrel> squirrels;\n    public final List<Coin> coins;\n\
  \    public Castle castle;\n    public final WorldListener listener;\n    public\
  \ final Random rand;\n    public float heightSoFar;\n    public int score;\n   \
  \ public int state;\n```\n\n`World`类的所有成员如下：它跟踪 Bob、所有平台、弹簧、松鼠、金币以及城堡。此外，还有一个`WorldListener`引用和一个`Random`实例，我们将使用它出于各种目的生成随机数。最后三个成员分别跟踪\
  \ Bob 到目前为止达到的最高高度、世界的状态以及获得的分数。\n\n```java\n    public World(WorldListener listener)\
  \ {\n        this.bob = new Bob(5, 1);\n        this.platforms = new ArrayList<Platform>();\n\
  \        this.springs = new ArrayList<Spring>();\n        this.squirrels = new ArrayList<Squirrel>();\n\
  \        this.coins = new ArrayList<Coin>();\n        this.listener = listener;\n\
  \        rand = new Random();\n        generateLevel();\n        this.heightSoFar\
  \ = 0;\n        this.score = 0;\n        this.state = WORLD_STATE_RUNNING;\n   \
  \ }\n```\n\n构造函数初始化所有成员，并存储作为参数传入的`WorldListener`。Bob 被水平放置在世界中央，略微高于地面，位置在(5,1)。其余部分不言自明，唯有一个例外：`generateLevel()`方法。\n\
  \n#### 生成世界\n\n你可能已经好奇我们实际上是如何创建并放置世界中的对象的。我们使用了一种称为程序化生成的方法。我们设计了一个简单的算法来为我们生成随机关卡。清单\
  \ 9-16 展示了相关代码。\n\n\n\n`private void generateLevel() {\n    float y = Platform.PLATFORM_HEIGHT\
  \ / 2;\n    float maxJumpHeight = Bob.BOB_JUMP_VELOCITY * Bob.BOB_JUMP_VELOCITY\n\
  \            / (2 * -gravity.y);\n    while (y < WORLD_HEIGHT - WORLD_HEIGHT / 4)\
  \ {\n        int type = rand.nextFloat() > 0.8f ? Platform.PLATFORM_TYPE_MOVING\n\
  \                : Platform.PLATFORM_TYPE_STATIC;\n        float x = rand.nextFloat()\n\
  \                * (WORLD_WIDTH - Platform.PLATFORM_WIDTH)\n                + Platform.PLATFORM_WIDTH\
  \ / 2;\n        Platform platform = new Platform(type, x, y);\n        platforms.add(platform);\n\
  \        if (rand.nextFloat() > 0.9f\n                && type != Platform.PLATFORM_TYPE_MOVING)\
  \ {\n            Spring spring = new Spring(platform.position.x,\n             \
  \       platform.position.y + Platform.PLATFORM_HEIGHT / 2\n                   \
  \         + Spring.SPRING_HEIGHT / 2);\n            springs.add(spring);\n     \
  \   }\n        if (y > WORLD_HEIGHT / 3 && rand.nextFloat() > 0.8f) {\n        \
  \    Squirrel squirrel = new Squirrel(platform.position.x\n                    +\
  \ rand.nextFloat(), platform.position.y\n                    + Squirrel.SQUIRREL_HEIGHT\
  \ + rand.nextFloat() * 2);\n            squirrels.add(squirrel);\n        }\n  \
  \      if (rand.nextFloat() > 0.6f) {\n            Coin coin = new Coin(platform.position.x\
  \ + rand.nextFloat(),\n                    platform.position.y + Coin.COIN_HEIGHT\n\
  \                            + rand.nextFloat() * 3);\n            coins.add(coin);\n\
  \        }\n        y += (maxJumpHeight - 0.5f);\n        y -= rand.nextFloat()\
  \ * (maxJumpHeight / 3);\n    }\n    castle = new Castle(WORLD_WIDTH / 2, y);\n\
  }\n```\n\n代码清单 9-16. 摘自 `World.java`：`generateLevel()` 方法\n\n让我们用通俗的语言概述该算法的基本思路：\n\
  \n1.  从世界底部 `y = 0` 开始。\n2.  只要尚未到达世界顶部，就执行以下操作：\n    1.  在当前的 y 位置，随机选择一个 x 位置，创建一个平台（移动或静止）。\n\
  \    2.  生成一个 0 到 1 之间的随机数，如果该数大于 0.9 且平台不是移动的，则在平台顶部创建一个弹簧。\n    3.  如果 y 坐标超过关卡高度的前三分之一，生成一个随机数，如果该数大于\
  \ 0.8，则在平台位置的基础上随机偏移，创建一只松鼠。\n    4.  生成一个随机数，如果该数大于 0.6，则在平台位置的基础上随机偏移，创建一个金币。\n\
  \    5.  将 y 增加鲍勃的最大常规跳跃高度，再随机减少一点——但减少量要确保 y 不低于上一个 y 值——然后返回步骤 2 的开头。\n3.  将城堡放置在最后一个\
  \ y 位置，水平居中。\n\n这个过程的最大秘密在于步骤 2e 中我们如何增加下一个平台的 y 位置。我们必须确保鲍勃能够从当前平台跳达每一个后续平台。考虑到他的初始垂直跳跃速度为\
  \ 11 米/秒，鲍勃的跳跃高度受重力限制。我们如何计算鲍勃能跳多高？可以通过以下公式计算：\n\n`高度 = 速度 × 速度 / (2 × 重力) = 11\
  \ × 11 / (2 × 13) ≈ 4.6 米`\n\n这意味着平台之间的垂直距离应为 4.6 米，这样鲍勃才能抵达。为了确保所有平台都可到达，我们使用一个略小于最大跳跃高度的值。这可以确保鲍勃总能从一个平台跳到下一个平台。平台的水平放置则是随机的。鉴于鲍勃的水平移动速度为\
  \ 20 米/秒，我们完全可以确信他不仅在垂直方向上，在水平方向上也能到达平台。\n\n其他对象则基于概率生成。方法 `Random.nextFloat()`\
  \ 每次调用都会返回一个介于 0 和 1 之间的随机数，每个数字出现的概率相同。只有当从 `Random` 获取的随机数大于 0.8 时，才会生成松鼠。这意味着我们生成松鼠的概率是\
  \ 20%（1 – 0.8）。其他所有随机创建的对象也是如此。通过调整这些数值，我们可以增加或减少世界中的对象数量。\n\n#### 更新世界\n\n一旦生成了世界，我们就可以更新其中的所有对象并检测碰撞。代码清单\
  \ 9-17 展示了 `World` 类的更新方法（含注释）。\n\n```\npublic void update(float deltaTime, float\
  \ accelX) {\n    updateBob(deltaTime, accelX);\n    updatePlatforms(deltaTime);\n\
  \    updateSquirrels(deltaTime);\n    updateCoins(deltaTime);\n    if (bob.state\
  \ != Bob.BOB_STATE_HIT)\n        checkCollisions();\n    checkGameOver();\n}\n```\n\
  \n代码清单 9-17. 摘自 `World.java`：更新方法\n\n`update()` 方法稍后由我们的游戏界面调用。它接收增量时间和加速度计在 x 轴上的加速度作为参数。它负责调用其他的更新方法，以及执行碰撞检测和游戏结束检测。我们为世界中的每种对象类型都提供了一个更新方法。\n\
  \n```\nprivate void updateBob(float deltaTime, float accelX) {\n    if (bob.state\
  \ != Bob.BOB_STATE_HIT && bob.position.y <= 0.5f)\n        bob.hitPlatform();\n\
  \    if (bob.state != Bob.BOB_STATE_HIT)\n        bob.velocity.x = -accelX / 10\
  \ * Bob.BOB_MOVE_VELOCITY;\n    bob.update(deltaTime);\n    heightSoFar = Math.max(bob.position.y,\
  \ heightSoFar);\n}\n```\n\n`updateBob()` 方法负责更新鲍勃的状态。它首先检查鲍勃是否碰到了世界的底部，如果是，则指示鲍勃跳跃。这意味着在每个关卡的开始，鲍勃都可以从世界的地面起跳。当然，一旦地面移出视野，这个方法就不再有效。接下来，我们更新鲍勃的水平速度，该速度基于作为参数传入的加速度计\
  \ x 轴数值。如前所述，我们将该数值从 -10 到 10 的范围归一化到 -1 到 1 的范围（从完全左倾到完全右倾），然后乘以鲍勃的标准移动速度。接着，我们通过调用\
  \ `Bob.update()` 方法让鲍勃更新自身状态。我们做的最后一件事是记录鲍勃到目前为止达到的最高 y 位置，以便稍后判断鲍勃是否掉落得太远。\n\n\
  ```\nprivate void updatePlatforms(float deltaTime) {\n    int len = platforms.size();\n\
  \    for (int i = 0; i < len; i++) {\n        Platform platform = platforms.get(i);\n\
  \        platform.update(deltaTime);\n        if (platform.state == Platform.PLATFORM_STATE_PULVERIZING\n\
  \                && platform.time > Platform.PLATFORM_PULVERIZE_TIME) {\n      \
  \      platforms.remove(platform);\n            len = platforms.size();\n      \
  \  }\n    }\n}\n```\n\n接下来，我们在 `updatePlatforms()` 中更新所有平台。我们遍历平台列表，为每个平台调用其 `update()`\
  \ 方法，并传入当前的增量时间。如果平台正处于粉碎过程中，我们检查该状态持续时间。如果平台处于 `PLATFORM_STATE_PULVERIZING` 状态的时间超过了\
  \ `PLATFORM_PULVERIZE_TIME`，我们就简单地将该平台从平台列表中移除。\n\n```\nprivate void updateSquirrels(float\
  \ deltaTime) {\n    int len = squirrels.size();\n    for (int i = 0; i < len; i++)\
  \ {\n        Squirrel squirrel = squirrels.get(i);\n        squirrel.update(deltaTime);\n\
  \    }\n}\n\nprivate void updateCoins(float deltaTime) {\n    int len = coins.size();\n\
  \    for (int i = 0; i < len; i++) {\n        Coin coin = coins.get(i);\n      \
  \  coin.update(deltaTime);\n    }\n}\n```\n\n在 `updateSquirrels()` 方法中，我们通过调用每个\
  \ `Squirrel` 实例的 `update()` 方法并传入当前增量时间来更新它们。我们在 `updateCoins()` 方法中对每个 `Coin` 实例执行相同操作。\n\
  \n##### 碰撞检测与响应\n\n回顾我们最初的 `World.update()` 方法，可以看到下一步是检测鲍勃与世界中所有其他可碰撞对象之间的碰撞。我们只在鲍勃的状态不等于`BOB_STATE_HIT`时才进行检测，因为在该状态下，他只会因重力而继续下落。让我们看看代码清单\
  \ 9-18 中的这些碰撞检测方法。\n\n```\nprivate void checkCollisions() {\n    checkPlatformCollisions();\n\
  \    checkSquirrelCollisions();\n    checkItemCollisions();\n    checkCastleCollisions();\n\
  }\n```\n\n代码清单 9-18. 摘自 `World.java`：碰撞检测方法\n\n\n\n`checkCollisions()`方法大致上是一个主方法，它会简单调用所有其他的碰撞检测方法。Bob\
  \ 在世界中可能碰撞的对象有：平台、松鼠、金币、弹簧和城堡。对于这些对象类型，我们都有对应的碰撞检测方法。请记住，我们在更新了世界中所有对象的位置和碰撞包围盒后再调用这个方法及其从属方法。可以将其视为在特定时间点对世界状态的一个快照。我们所做的只是观察这个静态画面，检查是否有重叠。然后我们可以在下一帧中采取行动，通过操纵碰撞对象的状态、位置、速度等来确保它们对这些重叠或碰撞做出反应。\n\
  \n```\nprivate void checkPlatformCollisions() {\nif (bob.velocity.y > 0)\nreturn;\n\
  int len = platforms.size();\nfor (int i = 0; i < len; i++) {\nPlatform platform\
  \ = platforms.get(i);\nif (bob.position.y > platform.position.y) {\nif (OverlapTester\n\
  .overlapRectangles(bob.bounds, platform.bounds)) {\nbob.hitPlatform();\nlistener.jump();\n\
  if (rand.nextFloat() > 0.5f) {\nplatform.pulverize();\n}\nbreak;\n}\n}\n}\n}\n```\n\
  \n在`checkPlatformCollisions()`方法中，我们检测 Bob 与世界中的任何平台之间是否有重叠。如果 Bob 正在上升途中，我们会提前退出该方法。这使得\
  \ Bob 能够从下方穿过平台。对于《超级跳跃者》来说，这是一种好的行为；而在像《超级马里奥兄弟》这样的游戏中，如果 Bob 从下方撞到方块，我们可能希望他掉落下来。\n\
  \n接下来，我们遍历所有平台，检查 Bob 是否在当前平台的上方。如果是，则测试他的包围矩形是否与平台的包围矩形重叠。如果重叠，我们通过调用`Bob.hitPlatform()`来通知\
  \ Bob 他撞到了平台。回顾该方法，它会触发一次跳跃并相应地设置 Bob 的状态。然后，我们调用`WorldListener.jump()`方法，通知监听器\
  \ Bob 刚刚又开始跳跃了。稍后我们将利用这一点在监听器中播放相应的音效。最后要做的，是获取一个随机数，如果它大于 0.5，就让平台粉碎。该平台会再存活`PLATFORM_PULVERIZE_TIME`秒（0.8\
  \ 秒），之后会在前面展示的`updatePlatforms()`方法中被移除。在渲染该平台时，我们会利用它的状态时间来决定播放哪个平台动画关键帧。\n\n```\n\
  private void checkSquirrelCollisions() {\nint len = squirrels.size();\nfor (int\
  \ i = 0; i < len; i++) {\nSquirrel squirrel = squirrels.get(i);\nif (OverlapTester.overlapRectangles(squirrel.bounds,\
  \ bob.bounds)) {\nbob.hitSquirrel();\nlistener.hit();\n}\n}\n}\n```\n\n`checkSquirrelCollisions()`方法检测\
  \ Bob 的包围矩形与每只松鼠的包围矩形是否重叠。如果 Bob 撞到了松鼠，我们就让他进入`BOB_STATE_HIT`状态，这将使 Bob 掉落下去，并且玩家无法再控制他。我们还会通知`WorldListener`，以便\
  \ Bob 可以播放一个音效，例如。\n\n```\nprivate void checkItemCollisions() {\nint len = coins.size();\n\
  for (int i = 0; i < len; i++) {\nCoin coin = coins.get(i);\nif (OverlapTester.overlapRectangles(bob.bounds,\
  \ coin.bounds)) {\ncoins.remove(coin);\nlistener.coin();\nbob.score += COIN_SCORE;\n\
  }\n}\nif (bob.velocity.y > 0)\nreturn;\nlen = springs.size();\nfor (int i = 0; i\
  \ < len; i++) {\nSpring spring = springs.get(i);\nif (bob.position.y > spring.position.y)\
  \ {\nif (OverlapTester.overlapRectangles(bob.bounds, spring.bounds)) {\nbob.hitSpring();\n\
  listener.highJump();\n}\n}\n}\n}\n```\n\n`checkItemCollisions()`方法检测 Bob 与世界中的所有金币和所有弹簧。如果\
  \ Bob 撞到金币，我们就从世界中移除该金币，通知监听器一枚金币被收集了，并将当前得分增加`COIN_SCORE`。如果 Bob 正在向下掉落，我们还会检测\
  \ Bob 与世界中的所有弹簧。如果他撞到一个弹簧，我们就通知他，以便他能比平时跳得更高。我们也会将此事件通知监听器。\n\n```\nprivate void\
  \ checkCastleCollisions() {\nif (OverlapTester.overlapRectangles(castle.bounds,\
  \ bob.bounds)) {\nstate = WORLD_STATE_NEXT_LEVEL;\n}\n}\n```\n\n最后一个方法检测 Bob 与城堡的碰撞。如果\
  \ Bob 撞到了城堡，我们将世界状态设置为`WORLD_STATE_NEXT_LEVEL`，向外部实体（例如游戏屏幕）发出信号，表明我们应该过渡到下一关，下一关将再次随机生成一个`World`实例。\n\
  \n游戏结束，伙计！\n\n`World`类中的最后一个方法，在`World.update()`方法的最后一行被调用，如清单 9-19 所示。\n\n```\n\
  private void checkGameOver() {\nif (heightSoFar - 7.5f > bob.position.y) {\nstate\
  \ = WORLD_STATE_GAME_OVER;\n}\n}\n}\n清单 9-19.\nWorld.java 的其余部分：游戏结束检测方法\n```\n\n\
  还记得我们如何定义游戏结束状态的吗：Bob 必须离开视景体裁剪面的底部。视景体裁剪面当然由`Camera2D`实例控制，该实例有一个位置。该位置的`y`坐标始终等于\
  \ Bob 迄今为止达到的最大`y`坐标，因此相机在一定程度上会跟随 Bob 向上移动。但是，由于我们希望保持渲染代码和模拟代码分离，所以我们在世界中没有相机的引用。因此，我们在`updateBob()`中跟踪\
  \ Bob 的最高`y`坐标，并将该值存储在`heightSoFar`中。我们知道视景体裁剪面的高度将为 15 米。因此，我们也知道如果 Bob 的`y`坐标低于`heightSoFar\
  \ - 7.5`，那么他就已经离开了视景体裁剪面的底部边缘。这时 Bob 被宣布死亡。当然，这有点取巧，因为它是基于这样的假设：视景体裁剪面的高度总是 15 米，并且相机将始终位于\
  \ Bob 到目前为止能够达到的最高`y`坐标处。如果我们允许缩放或使用不同的相机跟随方法，这个假设就不再成立。为了不过度复杂化事情，我们保持现状。在游戏开发中，你经常会面临这样的决策，因为有时很难从软件工程的角度保持一切清晰（正如我们过度使用`public`或包私有成员所证明的那样）。\n\
  \n你可能想知道为什么我们不使用在第 8 章中开发的`SpatialHashGrid`类。我们稍后会告诉你原因。让我们先通过实现`GameScreen`类来完成我们的游戏。\n\
  \n游戏屏幕\n\n我们即将完成《超级跳跃者》。我们需要实现的最后一件事情是游戏屏幕，它向玩家呈现实际的游戏世界并允许玩家与之交互。游戏屏幕由五个子屏幕组成，如本章前面图\
  \ 9-2 所示。我们有准备屏幕、正常运行屏幕、下一关屏幕、游戏结束屏幕和暂停屏幕。Mr. Nom 游戏中的游戏屏幕与此类似；它只是缺少了下一关屏幕，因为那里只有一个关卡。我们将采用与\
  \ Mr. Nom 游戏中相同的方法：我们将为所有子屏幕提供独立的更新和呈现方法，这些方法负责更新和渲染游戏世界，以及属于子屏幕的 UI 元素。由于游戏屏幕代码稍长，我们将其拆分为多个清单。清单\
  \ 9-20 展示了游戏屏幕的第一部分。\n\n\n\n```java\npackage com.badlogic.androidgames.jumper;\n\
  import java.util.List;\nimport javax.microedition.khronos.opengles.GL10;\nimport\
  \ com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  import com.badlogic.androidgames.jumper.World.WorldListener;\npublic class GameScreen\
  \ extends GLScreen {\nstatic final int GAME_READY = 0;\nstatic final int GAME_RUNNING\
  \ = 1;\nstatic final int GAME_PAUSED = 2;\nstatic final int GAME_LEVEL_END = 3;\n\
  static final int GAME_OVER = 4;\nint state;\nCamera2D guiCam;\nVector2 touchPoint;\n\
  SpriteBatcher batcher;\nWorld world;\nWorldListener worldListener;\nWorldRenderer\
  \ renderer;\nRectangle pauseBounds;\nRectangle resumeBounds;\nRectangle quitBounds;\n\
  int lastScore;\nString scoreString;\nListing 9-20.\nExcerpt from GameScreen.java:\
  \ Members and constructor\n```\n\n该类首先定义了一组常量，用于表示屏幕的五种状态。接下来是成员变量。我们有一个用于渲染 UI\
  \ 元素的摄像头，以及一个用于将触摸坐标转换为世界坐标的向量（如同在其他屏幕中一样，转换到 320×480 单位的视锥体，即我们的目标分辨率）。接着，我们有一个\
  \ `SpriteBatcher`、一个 `World` 实例和一个 `WorldListener`。`WorldRenderer` 类稍后我们会详细研究。它基本上只是接收一个\
  \ `World` 实例并将其渲染出来。请注意，它的构造函数也将指向 `SpriteBatcher` 的引用作为参数。这意味着我们将使用同一个 `SpriteBatcher`\
  \ 来渲染屏幕的 UI 元素和游戏世界。其余成员变量是用于不同 UI 元素（例如暂停子屏幕上的“继续”和“退出”菜单项）的 `Rectangle` 对象，以及两个用于追踪当前分数的成员变量。我们希望避免在每帧渲染分数时创建一个新的字符串，以便让垃圾回收器更顺畅运行。\n\
  \n```java\npublic GameScreen(Game game) {\nsuper(game);\nstate = GAME_READY;\nguiCam\
  \ = new Camera2D(glGraphics, 320, 480);\ntouchPoint = new Vector2();\nbatcher =\
  \ new SpriteBatcher(glGraphics, 1000);\nworldListener = new WorldListener() {\n\
  public void jump() {\nAssets.playSound(Assets.jumpSound);\n}\npublic void highJump()\
  \ {\nAssets.playSound(Assets.highJumpSound);\n}\npublic void hit() {\nAssets.playSound(Assets.hitSound);\n\
  }\npublic void coin() {\nAssets.playSound(Assets.coinSound);\n}\n};\nworld = new\
  \ World(worldListener);\nrenderer = new WorldRenderer(glGraphics, batcher, world);\n\
  pauseBounds = new Rectangle(320- 64, 480- 64, 64, 64);\nresumeBounds = new Rectangle(160\
  \ - 96, 240, 192, 36);\nquitBounds = new Rectangle(160 - 96, 240 - 36, 192, 36);\n\
  lastScore = 0;\nscoreString = \"分数：0\";\n}\n```\n\n在构造函数中，我们初始化了所有成员变量。这里唯一有趣的地方是\
  \ `WorldListener`，我们将其实现为一个匿名内部类。它被注册到了 `World` 实例中，并会根据报告给它的事件来播放音效。\n\n#### 更新\
  \ GameScreen\n\n接下来是更新方法，它们将确保正确处理所有用户输入，并在必要时更新 `World` 实例。清单 9-21 展示了相关代码。\n\n\
  ```java\n@Override\npublic void update(float deltaTime) {\nif(deltaTime > 0.1f)\n\
  deltaTime = 0.1f;\nswitch(state) {\ncase GAME_READY:\nupdateReady();\nbreak;\ncase\
  \ GAME_RUNNING:\nupdateRunning(deltaTime);\nbreak;\ncase GAME_PAUSED:\nupdatePaused();\n\
  break;\ncase GAME_LEVEL_END:\nupdateLevelEnd();\nbreak;\ncase GAME_OVER:\nupdateGameOver();\n\
  break;\n}\n}\nListing 9-21.\nExcerpt from GameScreen.java: The update methods\n\
  ```\n\n我们再次将 `GLScreen.update()` 方法作为主方法，它会根据屏幕的当前状态调用其他更新方法之一。注意，我们将增量时间限制为 0.1\
  \ 秒。我们为什么要这样做？在第七章中，我们讨论了 Android 1.5 版本中直接字节缓冲区存在的一个会产生垃圾对象的 bug。在运行 Android 1.5\
  \ 的设备的 *Super Jumper* 游戏中，我们也会遇到这个问题。游戏会不时地被垃圾回收器中断数百毫秒。这会反映在长达数百毫秒的增量时间上，导致鲍勃像传送一样从一个位置移动到另一个位置，而不是平滑地移动过去。这对玩家来说很烦人，并且还会影响我们的碰撞检测效果。鲍勃可能会因为单帧移动了很大距离而径直穿过平台，甚至不与平台发生重叠。通过将增量时间限制为合理的最大值\
  \ 0.1 秒，我们可以补偿这些效应。\n\n```java\nprivate void updateReady() {\nif(game.getInput().getTouchEvents().size()\
  \ > 0) {\nstate = GAME_RUNNING;\n}\n}\n```\n\n`updateReady()` 方法在暂停子屏幕中被调用。它所做的就是等待一个触摸事件，一旦发生触摸事件，就会将游戏屏幕的状态更改为\
  \ `GAME_RUNNING` 状态。\n\n```java\nprivate void updateRunning(float deltaTime) {\n\
  List touchEvents = game.getInput().getTouchEvents();\nint len = touchEvents.size();\n\
  for(int i = 0; i = Settings.highscores[4])\nscoreString = \"新纪录: \" + lastScore;\n\
  else\nscoreString = \"分数: \" + lastScore;\nSettings.addScore(lastScore);\nSettings.save(game.getFileIO());\n\
  }\n}\n```\n\n在 `updateRunning()` 方法中，我们首先检查用户是否触摸了右上角的暂停按钮。如果是这种情况，则游戏进入 `GAME_PAUSED`\
  \ 状态。否则，我们使用当前的增量时间以及加速度计的 X 轴数值来更新 `World` 实例，这两者负责控制鲍勃的水平移动。在世界更新之后，我们检查是否需要更新分数字符串。我们还会检查鲍勃是否到达了城堡；如果他到达了，我们就进入\
  \ `GAME_NEXT_LEVEL` 状态，该状态会在屏幕左上角（如图 9-2 所示）显示一条消息，并等待一个触摸事件来生成下一关。如果游戏结束，我们会根据所获得的分数是否是新纪录，将分数字符串设置为\
  \ `分数：#分数` 或 `新纪录：#分数`。然后我们将这个分数添加到 `Settings` 类中，并指示它将所有设置保存到 SD 卡。此外，我们将游戏屏幕状态设置为\
  \ `GAME_OVER`。\n\n```java\nprivate void updatePaused() {\nList touchEvents = game.getInput().getTouchEvents();\n\
  int len = touchEvents.size();\nfor(int i = 0; i < len; i++) {\nTouchEvent event\
  \ = touchEvents.get(i);\nif(event.type != TouchEvent.TOUCH_UP)\ncontinue;\ntouchPoint.set(event.x,\
  \ event.y);\nguiCam.touchToWorld(touchPoint);\nif(OverlapTester.pointInRectangle(resumeBounds,\
  \ touchPoint)) {\nAssets.playSound(Assets.clickSound);\nstate = GAME_RUNNING;\n\
  return;\n}\nif(OverlapTester.pointInRectangle(quitBounds, touchPoint)) {\nAssets.playSound(Assets.clickSound);\n\
  game.setScreen(new MainMenuScreen(game));\nreturn;\n}\n}\n}\n```\n\n在 `updatePaused()`\
  \ 方法中，我们检查用户是否触摸了“继续”元素或“退出”UI 元素，并做出相应的反应。\n\n```java\nprivate void updateLevelEnd()\
  \ {\nList touchEvents = game.getInput().getTouchEvents();\nint len = touchEvents.size();\n\
  for(int i = 0; i < len; i++) {\nTouchEvent event = touchEvents.get(i);\nif(event.type\
  \ != TouchEvent.TOUCH_UP)\ncontinue;\nworld = new World(worldListener);\nrenderer\
  \ = new WorldRenderer(glGraphics, batcher, world);\nworld.score = lastScore;\nstate\
  \ = GAME_READY;\n}\n}\n```\n\n\n```markdown\n\n在`updateLevelEnd()`方法中，我们检查触摸事件；如果发生触摸事件，则创建新的`World`和`WorldRenderer`实例。我们还通知`World`使用到目前为止获得的分数，并将游戏屏幕设置为`GAME_READY`状态，该状态将再次等待触摸事件。\n\
  \n```\nprivate void updateGameOver() {\nList touchEvents = game.getInput().getTouchEvents();\n\
  int len = touchEvents.size();\nfor(int i = 0; i < len; i++) {\nTouchEvent event\
  \ = touchEvents.get(i);\nif(event.type != TouchEvent.TOUCH_UP)\ncontinue;\ngame.setScreen(new\
  \ MainMenuScreen(game));\n}\n}\n```\n\n在`updateGameOver()`方法中，我们再次仅检查触摸事件，如果发生触摸事件，则直接返回到主菜单，如图\
  \ 9-2 所示。\n\n##### 渲染`GameScreen`\n\n完成所有更新后，游戏屏幕将通过调用`GameScreen.present()`来渲染自身。让我们看看清单\
  \ 9-22 中的这个方法。\n\n```\n@Override\npublic void present(float deltaTime) {\nGL10 gl\
  \ = glGraphics.getGL();\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\ngl.glEnable(GL10.GL_TEXTURE_2D);\n\
  renderer.render();\nguiCam.setViewportAndMatrices();\ngl.glEnable(GL10.GL_BLEND);\n\
  gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\nbatcher.beginBatch(Assets.items);\n\
  switch(state) {\ncase GAME_READY:\npresentReady();\nbreak;\ncase GAME_RUNNING:\n\
  presentRunning();\nbreak;\ncase GAME_PAUSED:\npresentPaused();\nbreak;\ncase GAME_LEVEL_END:\n\
  presentLevelEnd();\nbreak;\ncase GAME_OVER:\npresentGameOver();\nbreak;\n}\nbatcher.endBatch();\n\
  gl.glDisable(GL10.GL_BLEND);\n}\nListing 9-22.\nExcerpt from GameScreen.java: The\
  \ rendering methods\n```\n\n游戏屏幕的渲染分为两步。首先，我们通过`WorldRenderer`类渲染实际的游戏世界，然后根据游戏屏幕的当前状态，在游戏世界之上渲染所有\
  \ UI 元素。`render()`方法正是执行此操作。与我们的更新方法一样，每个子屏幕都有独立的渲染方法。\n\n```\nprivate void presentReady()\
  \ {\nbatcher.drawSprite(160, 240, 192, 32, Assets.ready);\n}\n```\n\n`presentRunning()`方法仅在右上角显示暂停按钮，并在左上角显示得分字符串。\n\
  \n```\nprivate void presentRunning() {\nbatcher.drawSprite(320 - 32, 480 - 32, 64,\
  \ 64, Assets.pause);\nAssets.font.drawText(batcher, scoreString, 16, 480-20);\n\
  }\n```\n\n在`presentRunning()`方法中，我们简单地渲染暂停按钮和当前得分字符串。\n\n```\nprivate void presentPaused()\
  \ {\nbatcher.drawSprite(160, 240, 192, 96, Assets.pauseMenu);\nAssets.font.drawText(batcher,\
  \ scoreString, 16, 480-20);\n}\n```\n\n`presentPaused()`方法显示暂停菜单 UI 元素并再次显示得分。\n\
  \n```\nprivate void presentLevelEnd() {\nString topText = \"the princess is ...\"\
  ;\nString bottomText = \"in another castle!\";\nfloat topWidth = Assets.font.glyphWidth\
  \ * topText.length();\nfloat bottomWidth = Assets.font.glyphWidth * bottomText.length();\n\
  Assets.font.drawText(batcher, topText, 160 - topWidth / 2, 480 - 40);\nAssets.font.drawText(batcher,\
  \ bottomText, 160 - bottomWidth / 2, 40);\n}\n```\n\n`presentLevelEnd()`方法在屏幕顶部渲染字符串“THE\
  \ PRINCESS IS …”，在屏幕底部渲染字符串“IN ANOTHER CASTLE!”，如图 9-2 所示。我们进行了一些计算以使这些字符串水平居中。\n\
  \n```\nprivate void presentGameOver() {\nbatcher.drawSprite(160, 240, 160, 96, Assets.gameOver);\n\
  float scoreWidth = Assets.font.glyphWidth * scoreString.length();\nAssets.font.drawText(batcher,\
  \ scoreString, 160 - scoreWidth / 2, 480-20);\n}\n```\n\n`presentGameOver()`方法显示游戏结束的\
  \ UI 元素以及得分字符串。请记住，计分屏幕是在`updateRunning()`方法中设置为`score: #score`或`new highscore:\
  \ #value`。\n\n#### 收尾工作\n\n这基本上就是我们的`GameScreen`类。它的其余代码在清单 9-23 中给出。\n\n```\n@Override\n\
  public void pause() {\nif(state == GAME_RUNNING)\nstate = GAME_PAUSED;\n}\n@Override\n\
  public void resume() {\n}\n@Override\npublic void dispose() {\n}\n}\nListing 9-23.\n\
  The Rest of GameScreen.java: The pause(), resume(), and dispose() methods\n```\n\
  \n我们只需确保当用户决定暂停应用程序时，我们的游戏屏幕处于暂停状态。\n\n最后要实现的是`WorldRenderer`类。\n\n### `WorldRenderer`类\n\
  \n这个类应该不会让人意外。它简单地使用我们在构造函数中传递的`SpriteBatcher`，并相应地渲染世界。清单 9-24 展示了代码的开头部分。\n\n\
  ```\npackage com.badlogic.androidgames.jumper;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import com.badlogic.androidgames.framework.gl.Animation;\nimport com.badlogic.androidgames.framework.gl.Camera2D;\n\
  import com.badlogic.androidgames.framework.gl.SpriteBatcher;\nimport com.badlogic.androidgames.framework.gl.TextureRegion;\n\
  import com.badlogic.androidgames.framework.impl.GLGraphics;\npublic class WorldRenderer\
  \ {\nstatic final float FRUSTUM_WIDTH = 10;\nstatic final float FRUSTUM_HEIGHT =\
  \ 15;\nGLGraphics glGraphics;\nWorld world;\nCamera2D cam;\nSpriteBatcher batcher;\n\
  public WorldRenderer(GLGraphics glGraphics, SpriteBatcher batcher, World world)\
  \ {\nthis.glGraphics = glGraphics;\nthis.world = world;\nthis.cam = new Camera2D(glGraphics,\
  \ FRUSTUM_WIDTH, FRUSTUM_HEIGHT);\nthis.batcher = batcher;\n}\nListing 9-24.\nExcerpt\
  \ from WorldRenderer.java: Constants, members, and constructor\n```\n\n像往常一样，我们首先定义一些常量。在这个例子中，我们将视锥体的宽度和高度分别定义为\
  \ 10 米和 15 米。我们还有一些成员——即一个`GLGraphics`实例和从游戏屏幕获得的`SpriteBatcher`引用。\n\n构造函数接收一个`GLGraphics`实例、一个`SpriteBatcher`以及`WorldRenderer`要绘制的`World`作为参数。我们相应地设置所有成员。清单\
  \ 9-25 展示了实际的渲染代码。\n\n```\npublic void render() {\nif(world.bob.position.y > cam.position.y\
  \ )\ncam.position.y = world.bob.position.y;\ncam.setViewportAndMatrices();\nrenderBackground();\n\
  renderObjects();\n}\nListing 9-25.\nThe rest of WorldRenderer.java: The actual rendering\
  \ code\n```\n\n`render()`方法将渲染分为两个批次：一个用于背景图像，另一个用于世界中的所有对象。它还根据 Bob 当前的 y 坐标更新摄像机位置。如果\
  \ Bob 的坐标高于摄像机的 y 坐标，则相应地调整摄像机位置。注意，这里我们使用了以世界单位工作的摄像机。我们仅为背景和对象设置一次矩阵。\n\n```\n\
  public void renderBackground() {\nbatcher.beginBatch(Assets.background);\nbatcher.drawSprite(0,\
  \ 0,\nFRUSTUM_WIDTH, FRUSTUM_HEIGHT,\nAssets.backgroundRegion);\nbatcher.endBatch();\n\
  }\n```\n\n`renderBackground()`方法简单地渲染背景，使其跟随摄像机。它不会滚动，而是始终渲染以填满整个屏幕。我们也没有为渲染背景使用任何混合，以便可以挤出一点性能。\n\
  \n```\npublic void renderObjects() {\nGL10 gl = glGraphics.getGL();\ngl.glEnable(GL10.GL_BLEND);\n\
  gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\nbatcher.beginBatch(Assets.items);\n\
  renderBob();\nrenderPlatforms();\nrenderItems();\nrenderSquirrels();\nrenderCastle();\n\
  batcher.endBatch();\ngl.glDisable(GL10.GL_BLEND);\n}\n```\n\n```\n\n\n`renderObjects()`\
  \ 方法负责渲染第二批次。这次我们使用混合，因为所有对象都有透明背景像素。所有对象都在一个批次中渲染。回顾 `GameScreen` 的构造函数，我们看到我们使用的\
  \ `SpriteBatcher` 可以处理一个批次中的 1000 个精灵——对于我们的世界来说绰绰有余。对于每种对象类型，我们都有一个单独的渲染方法。\n\n\
  ```java\nprivate void renderBob() {\n    TextureRegion keyFrame;\n    switch(world.bob.state)\
  \ {\n    case Bob.BOB_STATE_FALL:\n        keyFrame = Assets.bobFall.getKeyFrame(world.bob.stateTime,\
  \ Animation.ANIMATION_LOOPING);\n        break;\n    case Bob.BOB_STATE_JUMP:\n\
  \        keyFrame = Assets.bobJump.getKeyFrame(world.bob.stateTime, Animation.ANIMATION_LOOPING);\n\
  \        break;\n    case Bob.BOB_STATE_HIT:\n    default:\n        keyFrame = Assets.bobHit;\n\
  \    }\n    float side = world.bob.velocity.x < 0? -1: 1;\n    batcher.drawSprite(world.bob.position.x,\
  \ world.bob.position.y, side * 1, 1, keyFrame);\n}\n```\n\n`renderBob()` 方法负责渲染\
  \ Bob。根据 Bob 的状态和状态时间，我们从 Bob 总共的五个关键帧中选择一个（参见本章前面的图 9-9）。根据 Bob 速度的 x 分量，我们还会判断\
  \ Bob 的朝向。基于此，我们乘以 1 或 -1 来相应地翻转纹理区域。记住，我们只有 Bob 向右看的关键帧。另请注意，我们未使用 `BOB_WIDTH`\
  \ 或 `BOB_HEIGHT` 来指定我们为 Bob 绘制的矩形的大小。这些尺寸是碰撞形状的尺寸，不一定是渲染矩形的尺寸。相反，我们使用 1×1 米到 32×32\
  \ 像素的映射。这是我们所有精灵渲染都会采用的方法；我们将使用 1×1 矩形（Bob、硬币、松鼠、弹簧）、2×0.5 矩形（平台）或 2×2 矩形（城堡）。\n\
  \n```java\nprivate void renderPlatforms() {\n    int len = world.platforms.size();\n\
  \    for(int i = 0; i < len; i++) {\n        Platform platform = world.platforms.get(i);\n\
  \        TextureRegion keyFrame = Assets.platform;\n        if(platform.state ==\
  \ Platform.PLATFORM_STATE_PULVERIZING) {\n            keyFrame = Assets.brakingPlatform.getKeyFrame(platform.stateTime,\
  \ Animation.ANIMATION_NONLOOPING);\n        }\n        batcher.drawSprite(platform.position.x,\
  \ platform.position.y,\n            2, 0.5f, keyFrame);\n    }\n}\n```\n\n`renderPlatforms()`\
  \ 方法遍历世界中的所有平台，并根据平台的状态选择一个 `TextureRegion`。平台要么是粉碎状态，要么是非粉碎状态。在后一种情况下，我们直接使用第一个关键帧；在前一种情况下，我们根据平台的状态时间从粉碎动画中获取一个关键帧。\n\
  \n```java\nprivate void renderItems() {\n    int len = world.springs.size();\n \
  \   for(int i = 0; i < len; i++) {\n        Spring spring = world.springs.get(i);\n\
  \        batcher.drawSprite(spring.position.x, spring.position.y, 1, 1, Assets.spring);\n\
  \    }\n    len = world.coins.size();\n    for(int i = 0; i < len; i++) {\n    \
  \    Coin coin = world.coins.get(i);\n        TextureRegion keyFrame = Assets.coinAnim.getKeyFrame(coin.stateTime,\
  \ Animation.ANIMATION_LOOPING);\n        batcher.drawSprite(coin.position.x, coin.position.y,\
  \ 1, 1, keyFrame);\n    }\n}\n```\n\n`renderItems()` 方法渲染弹簧和硬币。对于弹簧，我们只使用在 `Assets`\
  \ 中定义的一个 `TextureRegion`；对于硬币，我们同样根据硬币的状态时间从动画中选择一个关键帧。\n\n```java\nprivate void\
  \ renderSquirrels() {\n    int len = world.squirrels.size();\n    for(int i = 0;\
  \ i < len; i++) {\n        Squirrel squirrel = world.squirrels.get(i);\n       \
  \ TextureRegion keyFrame = Assets.squirrelFly.getKeyFrame(squirrel.stateTime, Animation.ANIMATION_LOOPING);\n\
  \        float side = squirrel.velocity.x < 0?-1:1;\n        batcher.drawSprite(squirrel.position.x,\
  \ squirrel.position.y, side * 1, 1, keyFrame);\n    }\n}\n```\n\n`renderSquirrels()`\
  \ 方法渲染松鼠。我们再次根据松鼠的状态时间获取一个关键帧，判断其朝向，并通过 `SpriteBatcher` 渲染时相应调整宽度。这是必要的，因为我们在纹理图集中只有松鼠向左看的版本。\n\
  \n```java\nprivate void renderCastle() {\n    Castle castle = world.castle;\n  \
  \  batcher.drawSprite(castle.position.x, castle.position.y, 2, 2, Assets.castle);\n\
  }\n```\n\n最后一个方法 `renderCastle()` 简单地使用在 `Assets` 类中定义的 `TextureRegion` 绘制城堡。\n\n\
  这很简单，不是吗？我们只渲染两个批次：一个用于背景，一个用于对象。退一步看，我们还会为游戏画面的所有 UI 元素渲染第三个批次。这意味着三次纹理切换和三次向 GPU\
  \ 上传新顶点。理论上我们可以合并 UI 和对象批次，但这会很麻烦，并且会在代码中引入一些 hack。\n\n我们终于完成了。我们的第二个游戏《Super Jumper》现在可以玩了。根据第\
  \ 7 章的优化指南，我们应该拥有闪电般的渲染速度。让我们看看是否如此。\n\n## 总结\n\n我们借助 OpenGL ES 的强大功能创建了第二个游戏。得益于我们优秀的框架，实现起来非常轻松。使用纹理图集和\
  \ `SpriteBatcher` 带来了非常好的性能。我们还讨论了如何渲染固定宽度的 ASCII 位图字体。良好的游戏机制初始设计以及对世界单位与像素单位之间关系的清晰定义，使得开发游戏容易得多。想象一下，如果我们试图用像素来完成所有事情，那将是怎样的噩梦。我们所有的计算都将充满除法——而低端\
  \ Android 设备的 CPU 并不喜欢这样。我们还非常注意将逻辑与表现分离。总而言之，《Super Jumper》是成功的。\n\n现在是时候把旋钮调到最大了。让我们开始涉足\
  \ 3D 图形编程吧。\n\n# 10. OpenGL ES：进入 3D\n\n《Super Jumper》在 2D OpenGL ES 渲染引擎下运行得相当不错。现在，是时候全面进入\
  \ 3D 了。实际上，在定义视锥体和精灵顶点时，我们已经是在 3D 空间中工作了。在后一种情况下，每个顶点的 Z 坐标默认都设置为 0。与 2D 渲染的区别其实不大：\n\
  \n- 顶点不仅有 x 和 y 坐标，还有 z 坐标。\n- 使用透视投影而非正交投影。远离相机的物体看起来更小。\n- 变换（如旋转、平移和缩放）在 3D 中有更多自由度。我们不再局限于在\
  \ x-y 平面上移动顶点，而是可以在所有三个轴上自由移动。\n- 我们可以定义相机在 3D 空间中的任意位置和朝向。\n- 对象三角形的渲染顺序现在很重要。离相机较远的对象必须被离相机较近的对象遮挡。\n\
  \n最棒的是，我们已经为所有这些在我们的框架中奠定了基础。要进入 3D，我们只需要稍微调整几个类。\n\n## 开始之前\n\n与之前的章节一样，本章我们将编写几个示例。我们将遵循与之前相同的路线，通过一个启动活动来显示示例列表。我们将重用前三章创建的整个框架，包括\
  \ `GLGame`、`GLScreen`、`Texture` 和 `Vertices` 类。\n\n\n\n### 3D 顶点\n\n本章的启动活动名为 `GL3DBasicsStarter`。\
  \  \n我们可以重用第 7 章中 `GLBasicsStarter` 活动的代码，只需将示例类的包名改为 `com.badlogic.androidgames.gl3d`。此外，还需要以\
  \ `<activity>` 元素的形式，将每个测试添加到清单文件中。所有测试都将在固定的横屏方向下运行，我们会在每个 `<activity>` 元素中指定这一点。\n\
  \n每个测试都是 `GLGame` 抽象类的一个实例，实际的测试逻辑以 `GLScreen` 实例的形式实现，该实例包含在测试的 `GLGame` 实现中，如第\
  \ 9 章所示。为了节省篇幅，我们只展示 `GLScreen` 实例的相关部分。命名惯例依然是：每个测试的 `GLGame` 实现命名为 `XXXTest`，`GLScreen`\
  \ 实现命名为 `XXXScreen`。\n\n---\n\n## 3D 中的顶点\n\n在第 7 章中，你了解到一个顶点拥有以下几个属性：\n\n- 位置\n\
  - 颜色（可选）\n- 纹理坐标（可选）\n\n我们创建了一个名为 `Vertices` 的辅助类，它为我们处理了所有繁琐的细节。此前我们将顶点位置限制为仅包含\
  \ x 和 y 坐标。为了实现 3D，我们只需修改 `Vertices` 类，使其支持 3D 顶点位置。\n\n---\n\n## Vertices3：存储 3D\
  \ 位置\n\n让我们基于原来的 `Vertices` 类编写一个新的类 `Vertices3`，用于处理 3D 顶点。代码清单 10-1 展示了相关代码。\n\
  \n```\npackage com.badlogic.androidgames.framework.gl;\nimport java.nio.ByteBuffer;\n\
  import java.nio.ByteOrder;\nimport java.nio.IntBuffer;\nimport java.nio.ShortBuffer;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport com.badlogic.androidgames.framework.impl.GLGraphics;\n\
  public class Vertices3 {\n    final GLGraphics glGraphics;\n    final boolean hasColor;\n\
  \    final boolean hasTexCoords;\n    final int vertexSize;\n    final IntBuffer\
  \ vertices;\n    final int[] tmpBuffer;\n    final ShortBuffer indices;\n\n    public\
  \ Vertices3(GLGraphics glGraphics, int maxVertices, int maxIndices,\n          \
  \           boolean hasColor, boolean hasTexCoords) {\n        this.glGraphics =\
  \ glGraphics;\n        this.hasColor = hasColor;\n        this.hasTexCoords = hasTexCoords;\n\
  \        this.vertexSize = (3 + (hasColor ? 4 : 0) + (hasTexCoords ? 2 : 0)) * 4;\n\
  \        this.tmpBuffer = new int[maxVertices * vertexSize / 4];\n        ByteBuffer\
  \ buffer = ByteBuffer.allocateDirect(maxVertices * vertexSize);\n        buffer.order(ByteOrder.nativeOrder());\n\
  \        vertices = buffer.asIntBuffer();\n        if (maxIndices > 0) {\n     \
  \       buffer = ByteBuffer.allocateDirect(maxIndices * Short.SIZE / 8);\n     \
  \       buffer.order(ByteOrder.nativeOrder());\n            indices = buffer.asShortBuffer();\n\
  \        } else {\n            indices = null;\n        }\n    }\n\n    public void\
  \ setVertices(float[] vertices, int offset, int length) {\n        this.vertices.clear();\n\
  \        int len = offset + length;\n        for (int i = offset, j = 0; i < len;\
  \ i++, j++)\n            tmpBuffer[j] = Float.floatToRawIntBits(vertices[i]);\n\
  \        this.vertices.put(tmpBuffer, 0, length);\n        this.vertices.flip();\n\
  \    }\n\n    public void setIndices(short[] indices, int offset, int length) {\n\
  \        this.indices.clear();\n        this.indices.put(indices, offset, length);\n\
  \        this.indices.flip();\n    }\n\n    public void bind() {\n        GL10 gl\
  \ = glGraphics.getGL();\n        gl.glEnableClientState(GL10.GL_VERTEX_ARRAY);\n\
  \        vertices.position(0);\n        gl.glVertexPointer(3, GL10.GL_FLOAT, vertexSize,\
  \ vertices);\n        if (hasColor) {\n            gl.glEnableClientState(GL10.GL_COLOR_ARRAY);\n\
  \            vertices.position(3);\n            gl.glColorPointer(4, GL10.GL_FLOAT,\
  \ vertexSize, vertices);\n        }\n        if (hasTexCoords) {\n            gl.glEnableClientState(GL10.GL_TEXTURE_COORD_ARRAY);\n\
  \            vertices.position(hasColor ? 7 : 3);\n            gl.glTexCoordPointer(2,\
  \ GL10.GL_FLOAT, vertexSize, vertices);\n        }\n    }\n\n    public void draw(int\
  \ primitiveType, int offset, int numVertices) {\n        GL10 gl = glGraphics.getGL();\n\
  \        if (indices != null) {\n            indices.position(offset);\n       \
  \     gl.glDrawElements(primitiveType, numVertices,\n                    GL10.GL_UNSIGNED_SHORT,\
  \ indices);\n        } else {\n            gl.glDrawArrays(primitiveType, offset,\
  \ numVertices);\n        }\n    }\n\n    public void unbind() {\n        GL10 gl\
  \ = glGraphics.getGL();\n        if (hasTexCoords)\n            gl.glDisableClientState(GL10.GL_TEXTURE_COORD_ARRAY);\n\
  \        if (hasColor)\n            gl.glDisableClientState(GL10.GL_COLOR_ARRAY);\n\
  \    }\n\n    public int getNumIndices() {\n        return indices.limit();\n  \
  \  }\n\n    public int getNumVertices() {\n        return vertices.limit() / (vertexSize\
  \ / 4);\n    }\n}\n```\n*代码清单 10-1. `Vertices3.java`，现在支持更多坐标*\n\n与 `Vertices` 相比，除了一些小改动外，其余一切保持不变：\n\
  \n- 在构造函数中，我们计算 `vertexSize` 的方式有所不同，因为顶点位置现在占用三个浮点数而非两个。\n- 在 `bind()` 方法中，我们在调用\
  \ `glVertexPointer()` 时告诉 OpenGL ES，我们的顶点有三个坐标而非两个（第一个参数）。\n- 对于可选的颜色和纹理坐标分量，我们需要调整在\
  \ `vertices.position()` 调用中设置的偏移量。\n\n这就是我们需要做的全部。使用 `Vertices3` 类后，在调用 `Vertices3.setVertices()`\
  \ 方法时，我们必须为每个顶点指定 x、y 和 z 坐标。在使用方面，其他一切保持不变：我们可以拥有逐顶点颜色、纹理坐标、索引等。\n\n---\n\n## 示例\n\
  \n\n\n让我们编写一个名为 `Vertices3Test` 的简单示例。我们要绘制两个三角形，一个三角形的每个顶点 `z` 值为 –3，另一个三角形的每个顶点\
  \ `z` 值为 –5。此外，我们还将使用逐顶点颜色。由于我们尚未讨论如何使用透视投影，我们将使用一个具有适当近裁剪面和远裁剪面的正交投影，以便三角形位于视锥体内（即，近裁剪面为\
  \ 10，远裁剪面为 –10）。图 10-1 展示了该场景。\n\n![A340874_3_En_10_Fig1_HTML.jpg](img/A340874_3_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** 3D 空间中的红色三角形（前面）和绿色三角形（后面）\n\n红色三角形位于绿色三角形前面。之所以能说“在前面”，是因为在 OpenGL\
  \ ES（实际上它并没有摄像机的概念）中，默认情况下摄像机位于原点，并沿负 `z` 轴方向观察。绿色三角形还向右略微偏移了一些，这样我们从正面观看时能看到它的一部分。它的大部分区域应该被红色三角形遮挡。清单\
  \ 10-2 展示了渲染此场景的代码。\n\n```\npackage com.badlogic.androidgames.gl3d;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Screen;\n\
  import com.badlogic.androidgames.framework.gl.Vertices3;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\npublic class Vertices3Test\
  \ extends GLGame {\npublic Screen getStartScreen() {\nreturn new Vertices3Screen(this);\n\
  }\nclass Vertices3Screen extends GLScreen {\nVertices3 vertices;\npublic Vertices3Screen(Game\
  \ game) {\nsuper(game);\nvertices = new Vertices3(glGraphics, 6, 0, true, false);\n\
  vertices.setVertices(new float[] { -0.5f, -0.5f, -3, 1, 0, 0, 1,\n0.5f, -0.5f, -3,\
  \ 1, 0, 0, 1,\n0.0f,  0.5f, -3, 1, 0, 0, 1,\n0.0f,  -0.5f, -5, 0, 1, 0, 1,\n1.0f,\
  \  -0.5f, -5, 0, 1, 0, 1,\n0.5f,  0.5f, -5, 0, 1, 0, 1}, 0, 7 * 6);\n}\n@Override\n\
  public void present(float deltaTime) {\nGL10 gl = glGraphics.getGL();\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  gl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\ngl.glMatrixMode(GL10.GL_PROJECTION);\n\
  gl.glLoadIdentity();\ngl.glOrthof(-1, 1, -1, 1, 10, -10);\ngl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  gl.glLoadIdentity();\nvertices.bind();\nvertices.draw(GL10.GL_TRIANGLES, 0, 6);\n\
  vertices.unbind();\n}\n@Override\npublic void update(float deltaTime) {\n}\n@Override\n\
  public void pause() {\n}\n@Override\npublic void resume() {\n}\n@Override\npublic\
  \ void dispose() {\n}\n}\n}\n```\n\n**清单 10-2.** `Vertices3Test.java`：绘制两个三角形\n\n\
  如你所见，这是一个完整的源文件。接下来的示例只会展示该文件的相关部分，因为除了类名之外，其余部分基本保持不变。\n\n在 `Vertices3Screen` 中有一个\
  \ `Vertices3` 成员变量，我们在构造函数中对其进行了初始化。我们总共有六个顶点，每个顶点都有颜色，并且没有纹理坐标。由于两个三角形之间没有共享顶点，因此我们不使用索引几何体。这些信息被传递给了\
  \ `Vertices3` 的构造函数。接下来，我们通过调用 `Vertices3.setVertices()` 来设置实际的顶点。前三行指定了前面的红色三角形，另外三行指定了后面的绿色三角形，该三角形向右偏移了\
  \ 0.5 个单位。每行中的第三个浮点数是对应顶点的 `z` 坐标。\n\n在 `present()` 方法中，我们需要像往常一样首先清除屏幕并设置视口。接着，我们加载一个正交投影矩阵，设置一个足够大的视锥体以显示整个场景。最后，我们仅渲染\
  \ `Vertices3` 实例中包含的两个三角形。图 10-2 展示了该程序的输出。\n\n![A340874_3_En_10_Fig2_HTML.jpg](img/A340874_3_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2.** 两个三角形——但似乎有点问题\n\n现在，这有点奇怪。根据我们的理论，红色三角形（中间）应该位于绿色三角形前面。摄像机位于原点，沿负\
  \ `z` 轴方向观察，从图 10-1 我们可以看到红色三角形比绿色三角形更靠近原点。这是怎么回事呢？\n\nOpenGL ES 会按照我们在 `Vertices3`\
  \ 实例中指定的顺序来渲染三角形。由于我们先指定了红色三角形，因此它会先被绘制。我们可以改变三角形的顺序来解决这个问题。但是，如果我们的摄像机不是沿负 `z`\
  \ 轴方向观察，而是从后面观察呢？我们又不得不在渲染之前根据三角形与摄像机的距离对其进行排序。那可不是解决方案。事实上也并非如此。我们稍后会解决这个问题。首先，让我们去掉这个正交投影，改用透视投影。\n\
  \n**关于坐标系的说明：** 你可能会注意到，在我们的示例中，我们是从沿 `z` 轴方向开始观察的，其中 `z` 的值向我们增加，`x` 的值向右增加，`y`\
  \ 的值向上增加。这就是 OpenGL 使用的标准坐标系。记住这个坐标系的一个简单方法是使用右手定则。首先，将右手小指和无名指的指尖压向手掌。你的拇指代表 `x`\
  \ 轴，伸直的食指代表 `y` 轴，朝向你的中指代表 `z` 轴。参见图 10-3 的示例。只需记住这个规则，最终你会觉得它很自然。\n\n![A340874_3_En_10_Fig3_HTML.jpg](img/A340874_3_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3.** 右手定则\n\n## 透视投影：越近，越大\n\n到目前为止，我们一直使用正交投影，这意味着无论物体距离近裁剪面多远，它在屏幕上的大小始终不变。我们的眼睛所呈现的世界景象则不同。物体离得越远，在我们看来就越小。这被称为*透视投影*，我们在第\
  \ 7 章中简要讨论过。\n\n正交投影和透视投影之间的区别可以用视锥体的形状来解释。在正交投影中，视锥体是一个盒子。在透视投影中，视锥体是一个截顶的金字塔，其顶部为近裁剪面，底部为远裁剪面，侧面为左、右、上、下裁剪面。图\
  \ 10-4 展示了一个透视视锥体，我们可以通过它来观察场景。\n\n![A340874_3_En_10_Fig4_HTML.jpg](img/A340874_3_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4.** 包含场景的透视视锥体（左）；从上方观察的视锥体（右）\n\n透视视锥体由四个参数定义：\n\n1. 从摄像机到近裁剪面的距离\n2.\
  \ 从摄像机到远裁剪面的距离\n3. 视口的宽高比，它嵌入在近裁剪面中，由视口宽度除以视口高度得出\n4. 视野，它指定了视锥体的宽度，从而决定了场景中可见的范围\n\
  \n虽然我们一直在谈论“摄像机”，但这里还没有涉及这个概念。只需假设有一个摄像机固定在原点，沿负 `z` 轴方向观察，如图 10-4 所示。\n\n近裁剪面和远裁剪面的距离我们在第\
  \ 7 章中已经很熟悉了。我们只需要设置它们，使得整个场景都包含在视锥体内。查看图 10-4 右侧的图像时，视野也很容易理解。\n\n\n\n### 视口宽高比与透视投影\n\
  \n视口的宽高比（aspect ratio）并不那么直观。为什么需要它？它确保如果我们渲染到的屏幕的宽高比不等于 1，我们的世界不会被拉伸。\n\n之前，我们使用`glOrthof()`来以投影矩阵的形式指定正交视景体。对于透视视景体，我们可以使用一个称为`glFrustumf()`的方法。不过，有一种更简单的方法。\n\
  \n传统上，OpenGL ES 附带一个名为`GLU`的实用程序库。它包含一些辅助函数，用于设置投影矩阵和实现摄像机系统等。该库在 Android 上也可以使用，形式是一个名为`GLU`的类。它包含一些我们可以直接调用的静态方法，无需`GLU`实例。我们感兴趣的方法叫做`gluPerspective()`：\n\
  \n```\nGLU.gluPerspective(GL10 gl, float fieldOfView, float aspectRatio, float near,\
  \ float far);\n```\n\n这个方法会将当前激活的矩阵（即投影矩阵或模型视图矩阵）乘以一个透视投影矩阵，类似于`glOrthof()`。第一个参数是`GL10`的一个实例，通常用于所有其他与\
  \ OpenGL ES 相关的事务；第二个参数是视野（field of view），以角度为单位；第三个参数是视口的宽高比；最后两个参数指定了近裁剪平面和远裁剪平面到摄像机位置的距离。由于我们还没有摄像机，这些值是相对于世界原点给出的，强制我们沿负\
  \ Z 轴方向观察，如图 10-4 所示。目前这完全满足我们的需求；我们将确保我们渲染的所有对象都保持在这个固定且不可移动的视景体内。只要我们只使用`gluPerspective()`，就无法改变虚拟摄像机的位置或方向。当我们沿负\
  \ Z 轴方向观察时，我们始终只能看到世界的一部分。\n\n让我们修改列表 10-2，使其使用透视投影。首先，将`Vertices3Test`中的所有代码复制到一个名为`PerspectiveTest`的新类中，并将`Vertices3Screen`重命名为`PerspectiveScreen`。我们唯一需要修改的是`present()`方法。列表\
  \ 10-3 展示了相关代码。\n\n```\n@Override\npublic void present(float deltaTime) {\n    GL10\
  \ gl = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    gl.glViewport(0,\
  \ 0, glGraphics.getWidth(), glGraphics.getHeight());\n    gl.glMatrixMode(GL10.GL_PROJECTION);\n\
  \    gl.glLoadIdentity();\n    GLU.gluPerspective(gl, 67,\n        glGraphics.getWidth()\
  \ / (float)glGraphics.getHeight(),\n        0.1f, 10f);\n    gl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  \    gl.glLoadIdentity();\n    vertices.bind();\n    vertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 6);\n    vertices.unbind();\n}\n```\n列表 10-3. 摘自 `PerspectiveTest.java`：透视投影\n\
  \n与之前示例中`present()`方法的唯一区别是，我们现在使用`GLU.gluPerspective()`代替`glOrtho()`。我们使用 67 度的视野，这接近人类的平均视野。通过增大或减小这个值，你可以看到左右两侧更多或更少的区域。接下来我们指定的是宽高比，即屏幕宽度除以高度。请注意，这将是一个浮点数，因此我们必须先将其中一个值转换为`float`再进行除法。最后两个参数是近裁剪平面和远裁剪平面的距离。鉴于虚拟摄像机位于原点并沿负\
  \ Z 轴方向观察，任何 Z 值在-0.1 到-10 之间的物体都将位于近裁剪平面和远裁剪平面之间，因此是可能可见的。图 10-5 展示了这个示例的输出。\n\n\
  ![A340874_3_En_10_Fig5_HTML.jpg](img/A340874_3_En_10_Fig5_HTML.jpg)\n\n图 10-5. 透视投影（基本正确）\n\
  \n现在我们实际上是在进行正确的 3D 图形渲染。如你所见，我们的三角形仍然存在渲染顺序的问题。这可以通过使用强大的 Z 缓冲区来解决。\n\n## Z 缓冲区：恢复秩序\n\
  \n什么是 Z 缓冲区？在第 3 章中，我们讨论了帧缓冲区。它为屏幕上的每个像素存储颜色。当 OpenGL ES 将一个三角形渲染到帧缓冲区时，它只是改变构成该三角形的像素的颜色。\n\
  \nZ 缓冲区与帧缓冲区非常相似，它也为屏幕上的每个像素提供了一个存储位置。但它不是存储颜色，而是存储深度值。一个像素的深度值大致是 3D 空间中对应点到视景体近裁剪平面的归一化距离。\n\
  \n默认情况下，OpenGL ES 会为三角形的每个像素向 Z 缓冲区写入一个深度值（如果在创建帧缓冲区的同时也创建了 Z 缓冲区）。我们只需告诉 OpenGL\
  \ ES 使用这些信息来决定正在绘制的像素是否比当前已存在的像素更靠近近裁剪平面。为此，我们只需使用适当的参数调用`glEnable()`：\n\n```\n\
  GL10.glEnable(GL10.GL_DEPTH_TEST);\n```\n\n然后，OpenGL ES 会将新像素的深度与 Z 缓冲区中已有的像素深度进行比较。如果新像素的深度更小，那么它对应的像素就更靠近近裁剪平面，因此位于已在帧缓冲区和\
  \ Z 缓冲区中的像素之前。\n\n图 10-5 说明了这个过程。Z 缓冲区开始时的所有值都设置为无穷大（或一个非常大的数）。当你渲染第一个三角形时，将其每个像素的深度值与\
  \ Z 缓冲区中像素的值进行比较。如果某个像素的深度值小于 Z 缓冲区中的值，则此像素通过所谓的深度测试（depth test），或称 Z 测试（z-test）。该像素的颜色将被写入帧缓冲区，其深度将覆盖\
  \ Z 缓冲区中的对应值。如果测试失败，则该像素的颜色和深度值都不会被写入缓冲区。图 10-6 展示了渲染第二个三角形时的情景。一些像素的深度值较小，因此被渲染；其他像素则未通过测试。\n\
  \n![A340874_3_En_10_Fig6_HTML.jpg](img/A340874_3_En_10_Fig6_HTML.jpg)\n\n图 10-6.\
  \ 帧缓冲区中的图像（左）；渲染两个三角形后 Z 缓冲区的内容（右）\n\n与帧缓冲区一样，我们也必须在每一帧清除 Z 缓冲区；否则，上一帧的深度值将仍然保留。为此，我们可以按如下方式调用`glClear()`：\n\
  \n```\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT | GL10.GL_DEPTH_BUFFER_BIT);\n```\n\n\
  这将一次性清除帧缓冲区（或颜色缓冲区）和 Z 缓冲区（或深度缓冲区）。\n\n## 修复前一个示例\n\n让我们通过使用 Z 缓冲区来修复前一个示例的问题。只需将所有代码复制到一个名为`ZBufferTest`的新类中，并修改新的`ZBufferScreen`类的`present()`方法，如列表\
  \ 10-4 所示。\n\n```\n@Override\npublic void present(float deltaTime) {\n    GL10 gl\
  \ = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT | GL10.GL_DEPTH_BUFFER_BIT);\n\
  \    gl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\n    gl.glMatrixMode(GL10.GL_PROJECTION);\n\
  \    gl.glLoadIdentity();\n    GLU.gluPerspective(gl, 67,\n        glGraphics.getWidth()\
  \ / (float)glGraphics.getHeight(),\n        0.1f, 10f);\n    gl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  \    gl.glLoadIdentity();\n    gl.glEnable(GL10.GL_DEPTH_TEST);\n    vertices.bind();\n\
  \    vertices.draw(GL10.GL_TRIANGLES, 0, 6);\n    vertices.unbind();\n    gl.glDisable(GL10.GL_DEPTH_TEST);\n\
  }\n```\n列表 10-4. 摘自 `ZBufferTest.java`：使用 Z 缓冲区\n\n我们首先更改了`glClear()`调用的参数。现在两个缓冲区都被清除，而不仅仅是帧缓冲区。\n\
  \n\n\n在渲染两个三角形之前，我们首先启用深度测试。完成所有 3D 几何体的渲染后，我们再次禁用深度测试。为什么？假设我们想在 3D 场景之上渲染 2D UI\
  \ 元素（例如当前分数或按钮）。由于我们将使用`SpriteBatcher`来实现这一点，它仅在 2D 中工作，因此 2D 元素的顶点不会有任何有意义的`z`坐标。我们也不需要深度测试，因为我们会显式指定顶点绘制到屏幕的顺序。\n\
  \n该示例的输出如图 10-7 所示，结果符合预期。\n\n![A340874_3_En_10_Fig7_HTML.jpg](img/A340874_3_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7.** Z-buffer 的实际应用，使渲染顺序无关\n\n最终，由于我们的新朋友——z-buffer，中间的绿色三角形被正确地渲染在红色三角形之后。然而，与大多数朋友一样，有时你们的友谊也会因一些小问题而受到影响。让我们看看使用\
  \ z-buffer 时的一些注意事项。\n\n### 混合：你身后什么都没有\n\n假设我们想为场景中`z = -3`的红色三角形启用混合。比方说，我们将每个顶点颜色的\
  \ alpha 分量设置为`0.5f`，以便三角形背后的任何东西都能透视过来。在这种情况下，位于`z = -5`的绿色三角形应该能够透视过来。让我们思考一下 OpenGL\
  \ ES 将如何处理以及会发生什么：\n\n*   OpenGL ES 会将第一个三角形渲染到 z-buffer 和颜色缓冲中。\n*   接下来，OpenGL\
  \ ES 会渲染绿色三角形，因为它在我们的`Vertices3`实例中位于红色三角形之后。\n*   绿色三角形位于红色三角形背后的部分将不会显示在屏幕上，因为这些像素会被深度测试拒绝。\n\
  *   由于红色三角形在渲染时背后没有任何东西，所以不会有任何东西透过前面的红色三角形显示出来。\n\n当结合使用混合和 z-buffer 时，必须确保所有透明对象按与相机位置距离递增的顺序排序，并从后向前渲染。所有不透明对象必须在任何透明对象之前渲染。不过，不透明对象不需要排序。\n\
  \n让我们编写一个简单的示例来演示这一点。我们保留当前由两个三角形组成的场景，并将第一个三角形（`z = -3`）顶点颜色的 alpha 分量设置为`0.5f`。根据我们的规则，我们必须首先渲染不透明对象——本例中是绿色三角形（`z\
  \ = -5`）——然后从最远到最近渲染所有透明对象。在我们的场景中，只有一个透明对象：红色三角形。\n\n我们将列表 10-4 中的所有代码复制到一个名为`ZBlendingTest`的新类中，并将其中包含的`ZBufferScreen`重命名为`ZBlendingScreen`。我们现在只需要在`present()`方法中更改第一个三角形的顶点颜色，并以正确的顺序启用混合并渲染两个三角形。列表\
  \ 10-5 展示了这两个相关的方法。\n\n```\npublic ZBlendingScreen(Game game) {\n    super(game);\n\
  \    vertices = new Vertices3(glGraphics, 6, 0, true, false);\n    vertices.setVertices(new\
  \ float[] { -0.5f, -0.5f, -3, 1, 0, 0, 0.5f,\n            0.5f, -0.5f, -3, 1, 0,\
  \ 0, 0.5f,\n            0.0f,  0.5f, -3, 1, 0, 0, 0.5f,\n            0.0f,  -0.5f,\
  \ -5, 0, 1, 0, 1,\n            1.0f,  -0.5f, -5, 0, 1, 0, 1,\n            0.5f,\
  \  0.5f, -5, 0, 1, 0, 1}, 0, 7 * 6);\n}\n\n@Override\npublic void present(float\
  \ deltaTime) {\n    GL10 gl = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT\
  \ | GL10.GL_DEPTH_BUFFER_BIT);\n    gl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\n\
  \    gl.glMatrixMode(GL10.GL_PROJECTION);\n    gl.glLoadIdentity();\n    GLU.gluPerspective(gl,\
  \ 67,\n            glGraphics.getWidth() / (float)glGraphics.getHeight(),\n    \
  \        0.1f, 10f);\n    gl.glMatrixMode(GL10.GL_MODELVIEW);\n    gl.glLoadIdentity();\n\
  \    gl.glEnable(GL10.GL_DEPTH_TEST);\n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\n    vertices.bind();\n    vertices.draw(GL10.GL_TRIANGLES,\
  \ 3, 3);\n    vertices.draw(GL10.GL_TRIANGLES, 0, 3);\n    vertices.unbind();\n\
  \    gl.glDisable(GL10.GL_BLEND);\n    gl.glDisable(GL10.GL_DEPTH_TEST);\n}\n```\n\
  **列表 10-5.** 来自`ZBlendingTest.java`的摘录：启用 z-buffer 的混合\n\n在`ZBlendingScreen`类的构造函数中，我们将第一个三角形的顶点颜色的\
  \ alpha 分量更改为`0.5`。这将使第一个三角形变为透明。在`present()`方法中，我们执行常规操作，例如清除缓冲区和设置矩阵。我们还启用了混合并设置了正确的混合函数。有趣的是我们现在如何渲染这两个三角形。我们首先渲染绿色三角形，它是`Vertices3`实例中的第二个三角形，因为它是不透明的。所有不透明对象必须在任何透明对象渲染之前渲染。接下来，我们渲染透明三角形，它是`Vertices3`实例中的第一个三角形。对于这两个绘制调用，我们简单地使用适当的偏移量和顶点数量作为`vertices.draw()`方法的第二个和第三个参数。图\
  \ 10-8 显示了该程序的输出。\n\n![A340874_3_En_10_Fig8_HTML.jpg](img/A340874_3_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8.** 启用 z-buffer 的混合\n\n让我们反转绘制两个三角形的顺序，如下所示：\n\n```\nvertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 3);\nvertices.draw(GL10.GL_TRIANGLES, 3, 3);\n```\n\n因此，我们先绘制从顶点 0 开始的三角形，然后再绘制从顶点\
  \ 3 开始的第二个三角形。这将先渲染前面的红色三角形，再渲染后面的绿色三角形。图 10-9 显示了结果。\n\n![A340874_3_En_10_Fig9_HTML.jpg](img/A340874_3_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9.** 错误的混合方式；后面的三角形应该透视过来。\n\n到目前为止，对象仅由三角形组成，这当然有点过于简单。当我们渲染更复杂的形状时，我们将再次探讨与\
  \ z-buffer 结合使用的混合。现在，让我们总结一下如何在 3D 中处理混合：\n\n1. 渲染所有不透明对象。\n2. 将所有透明对象按与相机距离递增的顺序排序（从最远到最近）。\n\
  3. 按照排序后的顺序，从最远到最近渲染所有透明对象。\n\n在大多数情况下，排序可以基于对象中心到相机的距离。如果某个对象很大并且可能跨越多个其他对象，你会遇到问题。没有高级技巧，无法绕过这个问题。有几种可靠的解决方案在\
  \ OpenGL 桌面版上效果很好，但由于大多数 Android 设备 GPU 功能有限，这些方案无法实现。幸运的是，这种情况非常罕见，你几乎总是可以坚持使用简单的基于中心的排序。\n\
  \n### Z-buffer 精度与 Z-fighting\n\n\n\n#### Z-Buffer（深度缓冲）精度与 3D 网格\n\n#### 合适的裁剪平面距离\n\
  \n将远近裁剪平面设置得过大，以尽可能地展示我们宏伟的场景，这总是很有诱惑力。毕竟，我们投入了大量精力为世界添加了大量物体，这份努力理应被看到。唯一的问题在于，`z-buffer`（深度缓冲）的精度是有限的。在大多数\
  \ Android 设备上，`z-buffer` 中存储的每个深度值最多只有 16 位；也就是说最多只有 65,535 个不同的深度值。因此，我们不应将近裁剪平面距离设为\
  \ `0.00001`，远裁剪平面距离设为 `1000000`，而应坚持使用更合理的值。否则，我们很快就会体会到，一个配置不当的视景体与 `z-buffer`\
  \ 结合会产生多么糟糕的伪影。\n\n#### 量化问题\n\n问题是什么？想象一下，我们按照刚才说的那样设置了近和远裁剪平面。一个像素的深度值大致等于它到近裁剪平面的距离——距离越近，深度值越小。对于\
  \ 16 位的 `depthbuffer`，我们会将近远裁剪平面之间的深度值内部量化成 65,535 段；在我们的世界中，每一段占据 `1,000,000 /\
  \ 65,535 = 15` 个单位。如果我们选择的单位是米，并且我们的物体大小如常（比如 1×2×1 米），都落在同一个段内，那么 `z-buffer` 就帮不了我们大忙了，因为所有像素都将得到相同的深度值。\n\
  \n> **注意**  \n> `z-buffer` 中的深度值实际上是非线性的，但总体思路仍然是正确的。\n\n#### Z-Fighting（深度冲突）\n\
  \n使用 `z-buffer` 时的另一个相关问题是所谓的 `z-fighting`。图 10-10 展示了这个问题。\n\n![A340874_3_En_10_Fig10_HTML.jpg](img/A340874_3_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10.** Z-Fighting 现象\n\n图 10-10 中的两个矩形是共面的；也就是说，它们位于同一个平面上。由于它们重叠，它们也共享一些像素，这些像素本应具有相同的深度值。然而，由于有限的浮点精度，GPU\
  \ 可能无法为重叠的像素计算出相同的深度值。哪个像素能通过深度测试就变成了一场抽奖。通常可以通过将两个共面物体中的一个向另一个方向推开一小段距离来解决这个问题。这个偏移量取决于几个因素，所以通常最好通过实验来确定。\n\
  \n## 总结\n\n- 不要为近裁剪平面和远裁剪平面距离设置过小或过大的值。\n- 通过将共面物体稍微偏移来避免它们。\n\n---\n\n# 定义 3D 网格\n\
  \n到目前为止，我们只用了几个三角形作为世界中物体的占位符。那么更复杂的物体呢？\n\n我们已经讨论过，GPU 本质上就是一个庞大而强悍的三角形渲染机器。因此，我们所有的\
  \ 3D 物体也必须由三角形组成。在前面的章节中，我们用两个三角形来表示一个平面矩形。我们在那里使用的原理，如顶点定位、颜色、纹理和顶点索引，在 3D 中完全一样。只是我们的三角形不再局限于\
  \ `x-y` 平面了；我们可以自由地指定每个顶点在 3D 空间中的位置。\n\n那么，如何创建构成 3D 物体的这种三角形集合（Soup）呢？我们可以像为精灵创建矩形那样，通过编程方式来完成。我们也可以使用允许我们以所见即所得（WYSIWYG）方式雕琢\
  \ 3D 物体的软件。这些应用程序使用了多种范式，从操作独立的三角形到仅指定几个参数就能输出一个三角形网格（Triangle Mesh，对三角形列表的雅称）。\n\
  \n像 Blender、3ds Max、ZBrush 和 Wings 3D 这样的著名软件包为用户提供了大量创建 3D 物体的功能。其中一些是免费的（如 Blender\
  \ 和 Wings 3D），一些是商业软件（例如 3ds Max 和 ZBrush）。教会你如何使用这些程序之一超出了本书的范围。然而，所有这些程序都可以将 3D\
  \ 模型保存为不同的文件格式。网络上也有很多免费使用的 3D 模型。在下一章中，我们将为一种最简单、最常用的文件格式编写一个加载器。\n\n在本章中，我们将通过编程方式完成所有工作。让我们创建一个最简单的\
  \ 3D 物体：一个立方体。\n\n## 立方体：3D 世界中的 “Hello World”\n\n在前三章中，我们大量使用了模型空间（Model Space）的概念。它是定义模型的空间；它与世界空间（World\
  \ Space）完全无关。我们约定将所有物体围绕模型空间的原点构建，以便物体的中心与该原点重合。这样一个模型就可以被复用于在世界空间中不同位置和不同方向渲染多个物体，就像第\
  \ 7 章中庞大的 `BobTest` 示例那样。\n\n我们需要为立方体确定的第一件事就是它的角点。图 10-11 展示了一个边长为 1 个单位（例如 1 米）的立方体。我们还稍微展开了一下这个立方体，以便可以看到各个面分别由两个三角形组成。实际上，各面当然会在边和角点处交汇。\n\
  \n![A340874_3_En_10_Fig11_HTML.jpg](img/A340874_3_En_10_Fig11_HTML.jpg)\n\n**图 10-11.**\
  \ 一个立方体及其角点\n\n一个立方体有六个面，每个面由两个三角形组成。每个面的两个三角形共享两个顶点。对于立方体的正面，位于 `(-0.5, 0.5, 0.5)`\
  \ 和 `(0.5, -0.5, 0.5)` 的顶点是共享的。每个面我们只需要四个顶点；对于一个完整的立方体，总共是 6 × 4 = 24 个顶点。但是，我们需要指定\
  \ 36 个索引，而不仅仅是 24 个。这是因为有 6 × 2 个三角形，每个三角形使用我们 24 个顶点中的 3 个。我们可以使用顶点索引为这个立方体创建一个网格，如下所示：\n\
  \n```java\nfloat[] vertices = {\n    -0.5f, -0.5f,  0.5f,\n     0.5f, -0.5f,  0.5f,\n\
  \     0.5f,  0.5f,  0.5f,\n    -0.5f,  0.5f,  0.5f,\n     0.5f, -0.5f,  0.5f,\n\
  \     0.5f, -0.5f, -0.5f,\n     0.5f,  0.5f, -0.5f,\n     0.5f,  0.5f,  0.5f,\n\
  \     0.5f, -0.5f, -0.5f,\n    -0.5f, -0.5f, -0.5f,\n    -0.5f,  0.5f, -0.5f,\n\
  \     0.5f,  0.5f, -0.5f,\n    -0.5f, -0.5f, -0.5f,\n    -0.5f, -0.5f,  0.5f,\n\
  \    -0.5f,  0.5f,  0.5f,\n    -0.5f,  0.5f, -0.5f,\n    -0.5f,  0.5f,  0.5f,\n\
  \     0.5f,  0.5f,  0.5f,\n     0.5f,  0.5f, -0.5f,\n    -0.5f,  0.5f, -0.5f,\n\
  \    -0.5f, -0.5f,  0.5f,\n     0.5f, -0.5f,  0.5f,\n     0.5f, -0.5f, -0.5f,\n\
  \    -0.5f, -0.5f, -0.5f\n};\nshort[] indices = {\n     0,  1,  3,  1,  2,  3,\n\
  \     4,  5,  7,  5,  6,  7,\n     8,  9, 11,  9, 10, 11,\n    12, 13, 15, 13, 14,\
  \ 15,\n    16, 17, 19, 17, 18, 19,\n    20, 21, 23, 21, 22, 23,\n};\nVertices3 cube\
  \ = new Vertices3(glGraphics, 24, 36, false, false);\ncube.setVertices(vertices,\
  \ 0, vertices.length);\ncube.setIndices(indices, 0, indices.length);\n```\n\n在这个代码中，我们只指定了顶点位置。我们从正面及其左下角顶点\
