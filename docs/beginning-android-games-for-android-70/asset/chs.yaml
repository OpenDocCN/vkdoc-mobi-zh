  ```\n\n太棒了！现在我们有了一个功能齐全的 2D 数学库，可用于我们所有的小型物理模型和碰撞检测。我们准备更详细地研究粗检测阶段。\n\n## 粗检测阶段\n\
  \n那么，我们如何实现粗检测阶段所承诺的神奇效果呢？考虑图 8-16，它展示了一个典型的超级马里奥兄弟场景。\n\n![A340874_3_En_8_Fig16_HTML.jpg](img/A340874_3_En_8_Fig16_HTML.jpg)\n\
  \n*图 8-16。超级马里奥和他的敌人。对象周围的方框是它们的边界矩形；大框构成了施加在世界的网格。*\n\n你能猜到如何消除一些碰撞检查吗？图 8-16 中的网格代表了我们可以用来划分世界的单元。每个单元具有完全相同的大小，并且整个世界都被单元覆盖。马里奥当前位于其中两个单元中，而马里奥可能与之碰撞的其他对象位于不同的单元中。因此，你不需要检查任何碰撞，因为马里奥与场景中任何其他对象都不在同一个单元中。我们需要做的就是：\n\
  \n*   根据我们的物理和控制器步骤更新世界中的所有对象。\n*   根据对象的位置更新每个对象边界形状的位置。当然，我们也可以包含方向和缩放。\n*   根据边界形状确定每个对象包含在哪个或哪些单元中，并将它们添加到这些单元包含的对象列表中。\n\
  *   检查碰撞，但仅限于可以碰撞（例如，板栗仔不会与其他板栗仔碰撞）并且位于同一单元中的对象对之间。\n\n这被称为空间哈希网格粗检测阶段，实现起来非常简单。首先要定义每个单元的大小。这高度依赖于你为游戏世界使用的比例和单位。\n\
  \n## 一个详尽的例子\n\n我们将基于之前的炮弹示例（位于“实践出真知”部分）开发一个空间哈希网格粗检测阶段。我们将彻底重写它，以整合到目前为止本节涵盖的所有内容。除了大炮和炮弹，我们还想有目标。为了让生活更轻松，我们只使用\
  \ `0.5×0.5` 米的正方形作为目标。这些正方形不移动；它们是静态的。我们的大炮也是静态的。唯一移动的是炮弹本身。我们通常可以将游戏世界中的对象分类为静态对象或动态对象。让我们设计一个表示此类对象的类。\n\
  \n### `GameObject`、`DynamicGameObject` 和 `Cannon`\n\n让我们从静态情况或基本情况开始，如清单 8-7 所示。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的指示，完成以下中文翻译。\n\n---\n\n\n```java\npackage com.badlogic.androidgames.framework;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class GameObject {\npublic final Vector2 position;\npublic final Rectangle\
  \ bounds;\npublic GameObject(float x, float y, float width, float height) {\nthis.position\
  \ = new Vector2(x,y);\nthis.bounds = new Rectangle(x-width/2, y-height/2, width,\
  \ height);\n}\n}\n```\n**代码清单 8-7.** `GameObject.java`：一个带有位置和边界的静态游戏对象\n\n我们游戏中的每个对象都有一个与其中心重合的位置。此外，我们让每个对象都有一个单一的碰撞形状——在此例中是一个矩形。在构造函数中，我们根据参数设置位置和边界矩形（该矩形以对象中心为中心）。\n\
  \n对于动态对象（即移动的对象），我们还需要跟踪速度和加速度（如果对象实际上是被自身加速的，例如，通过引擎或推进器）。代码清单 8-8 展示了 `DynamicGameObject`\
  \ 类的代码。\n\n```java\npackage com.badlogic.androidgames.framework;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class DynamicGameObject extends GameObject {\npublic final Vector2 velocity;\n\
  public final Vector2 accel;\npublic DynamicGameObject(float x, float y, float width,\
  \ float height) {\nsuper(x, y, width, height);\nvelocity = new Vector2();\naccel\
  \ = new Vector2();\n}\n}\n```\n**代码清单 8-8.** `DynamicGameObject.java`：扩展 `GameObject`，添加速度和加速度向量\n\
  \n我们扩展了 `GameObject` 类以继承位置和边界成员。此外，我们为速度和加速度创建了向量。一个新的动态游戏对象在初始化后，其速度和加速度将为零。\n\
  \n在我们的炮弹示例中，我们有加农炮、炮弹和目标。炮弹是一个 `DynamicGameObject`，因为它根据我们简单的物理模型移动。目标是静态的，可以使用标准的\
  \ `GameObject` 来实现。加农炮也可以通过 `GameObject` 类来实现。我们将从 `GameObject` 类派生一个 `Cannon` 类，并添加一个存储加农炮当前角度的字段。代码清单\
  \ 8-9 展示了代码。\n\n```java\npackage com.badlogic.androidgames.gamedev2d;\npublic class\
  \ Cannon extends GameObject {\npublic float angle;\npublic Cannon(float x, float\
  \ y, float width, float height) {\nsuper(x, y, width, height);\nangle = 0;\n}\n\
  }\n```\n**代码清单 8-9.** `Cannon.java`：扩展 `GameObject`，添加一个角度\n\n这很好地封装了在加农炮世界中表示一个对象所需的所有数据。每当我们需要一个特殊类型的对象，比如加农炮时，如果它是静态对象，你可以简单地从\
  \ `GameObject` 派生一个；如果它有速度和加速度，则从 `DynamicGameObject` 派生。\n\n> **注意：** 过度使用继承可能会导致严重的头疼问题和非常丑陋的代码架构。不要为了使用而使用它。刚才使用的简单类层次结构没问题，但你不应让它变得更深（例如，扩展\
  \ `Cannon`）。还有其他通过组合来消除所有继承的游戏对象表示方法。不过，就你的目标而言，简单的继承就足够了。如果你对其他表示方法感兴趣，可以在网上搜索“composites”或“mixins”。\n\
  \n## 空间哈希网格\n\n我们的加农炮将受限于一个 1×1 米的矩形，炮弹的边界矩形为 0.2×0.2 米，而每个目标的边界矩形为 0.5×0.5 米。边界矩形以每个对象的位置为中心，这样能让我们的工作更简单一些。\n\
  \n当我们的加农炮示例启动时，我们可以简单地将一些目标放置在随机位置。以下是我们如何在世界中设置这些对象：\n\n```java\nCannon cannon\
  \ = new Cannon(0, 0, 1, 1);\nDynamicGameObject ball = new DynamicGameObject(0, 0,\
  \ 0.2f, 0.2f);\nGameObject[] targets = new GameObject[NUM_TARGETS];\nfor(int i =\
  \ 0; i < NUM_TARGETS; i++) {\n    targets[i] = new GameObject((float)Math.random()\
  \ * WORLD_WIDTH,\n                                (float)Math.random() * WORLD_HEIGHT,\n\
  \                                0.5f, 0.5f);\n}\n```\n\n常量 `WORLD_WIDTH` 和 `WORLD_HEIGHT`\
  \ 定义了游戏世界的大小。所有事情都应该发生在由 (0,0) 和 (`WORLD_WIDTH`, `WORLD_HEIGHT`) 界定的矩形内。图 8-17 展示了目前为止游戏世界的一个简单模型。\n\
  \n![A340874_3_En_8_Fig17_HTML.jpg](img/A340874_3_En_8_Fig17_HTML.jpg)\n\n**图 8-17.**\
  \ 游戏世界的模型图\n\n我们的世界稍后会看起来像这样，但现在我们可以覆盖一个空间哈希网格。哈希网格的单元应该有多大？没有万全之策，但一个好的启发式方法是让单元大小比场景中最大的对象大五倍。在我们的例子中，最大的对象是加农炮，但我们不让任何东西与加农炮碰撞，所以我们可以根据场景中第二大的对象（目标）来设定网格大小。这些目标的尺寸是\
  \ 0.5×0.5 米。因此，一个网格单元的大小应为 2.5×2.5 米。图 8-18 展示了覆盖在我们世界上的网格。\n\n![A340874_3_En_8_Fig18_HTML.jpg](img/A340874_3_En_8_Fig18_HTML.jpg)\n\
  \n**图 8-18.** 我们的加农炮世界覆盖了一个由 12 个单元组成的空间哈希网格\n\n我们有一个固定数量的单元——在加农炮世界的例子中，是 12 个。我们给每个单元一个唯一的编号，从左下角的单元开始，其\
  \ ID 为 0。注意，顶部的单元实际上扩展到了世界之外。这不是问题；我们只需要确保所有对象都保持在世界的边界内。\n\n我们想要做的是找出一个对象属于哪个（些）单元。理想情况下，我们希望计算包含该对象的单元的\
  \ ID。这使得我们可以使用以下简单的数据结构来存储单元：\n\n```\nList<GameObject>[] cells;\n```\n\n没错；我们将每个单元表示为一个\
  \ `GameObject` 列表。空间哈希网格本身仅由这些 `GameObject` 列表的数组组成。\n\n现在我们可以计算出一个对象所在单元的 ID。图\
  \ 8-18 展示了几个跨越两个单元的物体。事实上，一个小物体可以跨越最多四个单元，而一个比网格单元大的物体则可以跨越超过四个单元。通过选择网格单元大小为我们游戏中最大对象大小的倍数，我们可以确保这种情况永远不会发生。这样，一个对象最多只能被包含在四个单元中。\n\
  \n要计算一个对象的单元 ID，我们只需取边界矩形的四个角点，并检查每个角点位于哪个单元。确定一个点所在的单元很容易——我们只需用该点的坐标除以单元宽度。假设你有一个位于\
  \ (0.5, 0.8) 的点，单元大小为 2.5×2.5 米：该点将位于 ID 为 5 的单元中，如图 8-18 所示。\n\n我们可以将该点的每个坐标除以单元大小，得到二维整数坐标，如下所示：\n\
  \n```\ncellX = floor(point.x / cellSize) = floor(0.5 / 2.5) = 1\ncellY = floor(point.y\
  \ / cellSize) = floor(0.8 / 2.5) = 1\n```\n\n然后根据这些单元坐标，我们可以轻松地获得单元 ID：\n\n```\n\
  cellId = cellX + cellY × cellsPerRow = 1 + 1 × 4 = 5\n```\n\n常量 `cellsPerRow` 仅仅是我们需要覆盖\
  \ x 轴上世界所需的单元数量：\n\n```\ncellsPerRow = ceil(worldWidth / cellSize) = ceil(9.6 /\
  \ 2.5) = 4\n```\n\n我们可以像这样计算每列所需的单元数量：\n\n```\ncellsPerColumn = ceil(worldHeight\
  \ / cellSize) = ceil(6.4 / 2.5) = 3\n```\n\n\n\n基于此，我们可以相当轻松地实现空间哈希网格。我们通过设定世界的大小及所需的单元格尺寸来构建它。我们假设所有行动都发生在世界的正象限内，这意味着世界中所有点的`x`和`y`坐标都是正值。这是一个我们可以接受的约束条件。\n\
  \n根据这些参数，空间哈希网格可以计算出所需的单元格数量（`cellsPerRow` × `cellsPerColumn`）。我们还可以添加一个简单的方法来将物体插入网格，该方法会利用物体的边界来确定其所在的单元格。然后，该物体将被添加到每个单元格所包含物体的列表中。如果物体边界形状的某个角点位于网格之外，我们只需忽略该角点即可。\n\
  \n在每一帧中，我们在更新每个物体的位置后，重新将其插入空间哈希网格。不过，在我们的加农炮世界中存在不移动的物体，因此对每一帧都重新插入它们非常浪费资源。通过在每个单元格中存储两个列表，我们区分了动态物体和静态物体。一个列表会每帧更新，仅存放移动的物体；另一个列表则是静态的，只有当插入新静态物体时才会被修改。\n\
  \n最后，我们需要一个方法，该方法返回与目标物体可能发生碰撞的其他物体所在的单元格中的物体列表。这个方法所做的就是检查目标物体所在的单元格，获取这些单元格中的动态和静态物体列表，并将其返回给调用者。当然，我们必须确保不返回任何重复项——这种情况可能发生在物体位于多个单元格时。\n\
  \n清单 8-10 展示了相关代码（大部分代码）。`SpatialHashGrid.getCellIds()` 方法稍后会讨论，因为它稍微复杂一些。\n\n```\n\
  package com.badlogic.androidgames.framework;\nimport java.util.ArrayList;\nimport\
  \ java.util.List;\nimport com.badlogic.androidgames.framework.GameObject;\npublic\
  \ class SpatialHashGrid {\nList[] dynamicCells;\nList[] staticCells;\nint cellsPerRow;\n\
  int cellsPerCol;\nfloat cellSize;\nint[] cellIds = new int[4];\nList foundObjects;\n\
  Listing 8-10.\nExcerpt from SpatialHashGrid.java: A spatial hash grid implementation\n\
  ```\n\n如前所述，我们存储了两个单元格列表，一个用于动态物体，一个用于静态物体。我们还存储了每行和每列的单元格数量，以便后续判断我们检查的点是否在世界内部或外部。单元格尺寸也需要存储。`cellIds`\
  \ 数组是一个工作数组，用于临时存储某个 `GameObject` 所在的四个单元格的 ID。如果物体只位于一个单元格内，那么该数组的第一个元素将被设置为完全包含该物体的单元格的\
  \ ID。如果物体位于两个单元格中，则该数组的前两个元素将存放相应的单元格 ID，以此类推。为了指示单元格 ID 的数量，我们将数组中所有“空”元素设置为 `–1`。`foundObjects`\
  \ 列表也是一个工作列表，我们可以在调用 `getPotentialColliders()` 时返回它。为什么我们要保留这两个成员变量，而不是在每次需要时实例化一个新数组和列表呢？请记住垃圾回收器这个“怪物”。\n\
  \n```\n@SuppressWarnings(\"unchecked\")\npublic SpatialHashGrid(float worldWidth,\
  \ float worldHeight, float cellSize) {\nthis.cellSize = cellSize;\nthis.cellsPerRow\
  \ = (int)Math.ceil(worldWidth / cellSize);\nthis.cellsPerCol = (int)Math.ceil(worldHeight\
  \ / cellSize);\nint numCells = cellsPerRow * cellsPerCol;\ndynamicCells = new List[numCells];\n\
  staticCells = new List[numCells];\nfor(int i = 0; i < numCells; i++) {\ndynamicCells[i]\
  \ = new ArrayList(10);\nstaticCells[i] = new ArrayList(10);\n}\nfoundObjects = new\
  \ ArrayList(10);\n}\n```\n\n该类的构造函数接收世界的大小和所需的单元格尺寸。根据这些参数，我们计算出所需单元格的数量，并实例化单元格数组和存放每个单元格所包含物体对象的列表。同时初始化\
  \ `foundObjects` 列表。我们创建的所有 `ArrayList` 实例的初始容量都是十个 `GameObject` 实例，这样做是为了避免内存分配。我们假设单个单元格容纳超过十个\
  \ `GameObject` 实例的可能性很低。只要这个假设成立，数组列表就无需调整大小。\n\n```\npublic void insertStaticObject(GameObject\
  \ obj) {\nint[] cellIds = getCellIds(obj);\nint i = 0;\nint cellId = -1;\nwhile(i\
  \ <= 3 && (cellId = cellIds[i++]) != -1) {\nstaticCells[cellId].add(obj);\n}\n}\n\
  public void insertDynamicObject(GameObject obj) {\nint[] cellIds = getCellIds(obj);\n\
  int i = 0;\nint cellId = -1;\nwhile(i <= 3 && (cellId = cellIds[i++]) != -1) {\n\
  dynamicCells[cellId].add(obj);\n}\n}\n```\n\n接下来是 `insertStaticObject()` 和 `insertDynamicObject()`\
  \ 方法。它们通过调用 `getCellIds()` 计算出物体所在单元格的 ID，然后将物体插入到相应的列表中。`getCellIds()` 方法实际上会填充\
  \ `cellIds` 成员数组。\n\n```\npublic void removeObject(GameObject obj) {\nint[] cellIds\
  \ = getCellIds(obj);\nint i = 0;\nint cellId = -1;\nwhile(i <= 3 && (cellId = cellIds[i++])\
  \ != -1) {\ndynamicCells[cellId].remove(obj);\nstaticCells[cellId].remove(obj);\n\
  }\n}\n```\n\n我们还有一个 `removeObject()` 方法，它可以确定物体所在的单元格，然后将其从对应的动态或静态列表中删除。例如，当游戏对象被摧毁时，就需要用到此方法。\n\
  \n```\npublic void clearDynamicCells(GameObject obj) {\nint len = dynamicCells.length;\n\
  for(int i = 0; i < len; i++) {\ndynamicCells[i].clear();\n}\n}\n```\n\n`clearDynamicCells()`\
  \ 方法用于清空所有动态单元格列表。如前所述，我们需要在每一帧重新插入动态物体之前调用此方法。\n\n```\npublic List getPotentialColliders(GameObject\
  \ obj) {\nfoundObjects.clear();\nint[] cellIds = getCellIds(obj);\nint i = 0;\n\
  int cellId = -1;\nwhile(i <= 3 && (cellId = cellIds[i++]) != -1) {\nint len = dynamicCells\
  \ [cellId].size();\nfor(int j = 0; j < len; j++) {\nGameObject collider = dynamicCells[cellId].get(j);\n\
  if(!foundObjects.contains(collider))\nfoundObjects.add(collider);\n}\nlen = staticCells[cellId].size();\n\
  for(int j = 0; j < len; j++) {\nGameObject collider = staticCells[cellId].get(j);\n\
  if(!foundObjects.contains(collider))\nfoundObjects.add(collider);\n}\n}\nreturn\
  \ foundObjects;\n}\n```\n\n最后，`getPotentialColliders()` 方法接收一个物体，并返回与该物体位于相同单元格中的相邻物体列表。我们使用工作列表\
  \ `foundObjects` 来存储找到的物体列表。同样，我们不想在每次调用此方法时都实例化一个新列表。我们只需确定传递给该方法的物体所在的单元格。然后，我们将这些单元格中找到的所有动态和静态物体添加到\
  \ `foundObjects` 列表中，并确保没有重复项。使用 `foundObjects.contains()` 来检查重复项当然不是最优方案，但考虑到找到的物体数量永远不会很大，在这种情况下使用它是可以接受的。如果遇到性能问题，那么这将是我们的首选优化对象。遗憾的是，这并非易事。当然，我们可以使用\
  \ `Set`，但每次向 `Set` 添加对象时，它都会在内部分配新对象。目前，我们暂且保留现有实现，知道如果性能出现问题，我们可以回过头来处理它。\n\n剩下未提及的方法是\
  \ `SpatialHashGrid.getCellIds()`。清单 8-11 展示了其代码。不要害怕，它只是看起来有点吓人。\n\n\n\n```java\n\
  public int[] getCellIds(GameObject obj) {\nint x1 = (int)Math.floor(obj.bounds.lowerLeft.x\
  \ / cellSize);\nint y1 = (int)Math.floor(obj.bounds.lowerLeft.y / cellSize);\nint\
  \ x2 = (int)Math.floor((obj.bounds.lowerLeft.x + obj.bounds.width) / cellSize);\n\
  int y2 = (int)Math.floor((obj.bounds.lowerLeft.y + obj.bounds.height) / cellSize);\n\
  if(x1 == x2 && y1 == y2) {\nif(x1 >= 0 && x1 < cellsPerRow && y1 >= 0 && y1 < cellsPerCol)\n\
  cellIds[0] = x1 + y1 * cellsPerRow;\nelse\ncellIds[0] = -1;\n}\nelse if(x1 == x2)\
  \ {\nif(x1 >= 0 && x1 < cellsPerRow) {\nif(y1 >= 0 && y1 < cellsPerCol)\ncellIds[0]\
  \ = x1 + y1 * cellsPerRow;\nelse\ncellIds[0] = -1;\nif(y2 >= 0 && y2 < cellsPerCol)\n\
  cellIds[1] = x1 + y2 * cellsPerRow;\nelse\ncellIds[1] = -1;\n}\nelse {\ncellIds[0]\
  \ = -1;\ncellIds[1] = -1;\n}\n}\nelse if(y1 == y2) {\nif(y1 >= 0 && y1 < cellsPerCol)\
  \ {\nif(x1 >= 0 && x1 < cellsPerRow)\ncellIds[0] = x1 + y1 * cellsPerRow;\nelse\n\
  cellIds[0] = -1;\nif(x2 >= 0 && x2 < cellsPerRow)\ncellIds[1] = x2 + y1 * cellsPerRow;\n\
  else\ncellIds[1] = -1;\n}\nelse {\ncellIds[0] = -1;\ncellIds[1] = -1;\n}\n}\nelse\
  \ {\nint i = 0;\nint y1CellsPerRow = y1 * cellsPerRow;\nint y2CellsPerRow = y2 *\
  \ cellsPerRow;\nif(x1 >= 0 && x1 < cellsPerRow && y1 >= 0 && y1 < cellsPerCol)\n\
  cellIds[i++] = x1 + y1CellsPerRow;\nif(x2 >= 0 && x2 < cellsPerRow && y1 >= 0 &&\
  \ y1 < cellsPerCol)\ncellIds[i++] = x2 + y1CellsPerRow;\nif(x2 >= 0 && x2 < cellsPerRow\
  \ && y2 >= 0 && y2 < cellsPerCol)\ncellIds[i++] = x2 + y2CellsPerRow;\nif(x1 >=\
  \ 0 && x1 < cellsPerRow && y2 >= 0 && y2 < cellsPerCol)\ncellIds[i++] = x1 + y2CellsPerRow;\n\
  while(i <= 3) cellIds[i++] = -1;\n}\nreturn cellIds;\n}\n}\n代码清单 8-11.\nSpatialHashGrid.java\
  \ 的其余部分：实现 getCellIds()\n```\n\n该方法的头四行计算了物体包围盒左下角和右上角的单元格坐标。此计算方法之前已经讨论过。要理解该方法其余部分，需要思考一个物体如何与网格单元格重叠。一共有四种可能性：\n\
  \n*   物体包含在单个单元格内。因此，包围盒左下角和右上角的单元格坐标相同。\n*   物体在水平方向上重叠两个单元格。左下角在一个单元格中，右上角在其右侧的单元格中。\n\
  *   物体在垂直方向上重叠两个单元格。左下角在一个单元格中，右上角在其上方的单元格中。\n*   物体重叠四个单元格。左下角在一个单元格中，右下角在其右侧单元格中，右上角在该单元格上方的单元格中，左上角在第一个单元格上方的单元格中。\n\
  \n该方法所做的只是针对每种可能性进行特殊处理。第一个 `if` 语句处理单单元格的情况，第二个 `if` 语句处理水平方向双单元格的情况，第三个 `if` 语句处理垂直方向双单元格的情况，而\
  \ `else` 代码块处理物体重叠四个网格单元格的情况。在这四个代码块中，我们确保仅在相应单元格坐标位于世界范围内时才设置单元格 ID。这就是该方法的全部内容。\n\
  \n看起来，该方法应该需要消耗大量计算资源。确实如此，但消耗比其代码量给人的预期要少。最常见的情况是第一种，处理起来相当廉价。你能看出进一步优化此方法的机会吗？\n\
  \n## 整合所有内容\n\n让我们把本节学到的所有知识整合起来，形成一个不错的小例子。我们可以像前几页讨论的那样，扩展上一节的加农炮例子。我们用 `Cannon`\
  \ 对象表示加农炮，用 `DynamicGameObject` 对象表示炮弹，并用多个 `GameObject` 对象表示目标。每个目标的尺寸为 0.5×0.5\
  \ 米，并随机放置在世界中。\n\n我们希望能够击中这些目标。为此，我们需要碰撞检测。我们可以简单地遍历所有目标，将它们与炮弹进行检测，但那太枯燥了。我们使用新颖的\
  \ `SpatialHashGrid` 类来加速为当前炮弹位置寻找潜在碰撞目标的过程。不过，我们不将炮弹或加农炮插入网格，因为那并没有实际帮助。\n\n由于这个示例已经相当庞大，它被分割成多个代码片段。测试类命名为\
  \ `CollisionTest`，对应的屏幕类命名为 `CollisionScreen`。和往常一样，我们只看屏幕代码。让我们从代码清单 8-12 中的成员变量和构造函数开始。\n\
  \n```java\nclass CollisionScreen extends Screen {\nfinal int NUM_TARGETS = 20;\n\
  final float WORLD_WIDTH = 9.6f;\nfinal float WORLD_HEIGHT = 4.8f;\nGLGraphics glGraphics;\n\
  Cannon cannon;\nDynamicGameObject ball;\nList<GameObject> targets;\nSpatialHashGrid\
  \ grid;\nVertices cannonVertices;\nVertices ballVertices;\nVertices targetVertices;\n\
  Vector2 touchPos = new Vector2();\nVector2 gravity = new Vector2(0,-10);\npublic\
  \ CollisionScreen(Game game) {\nsuper(game);\nglGraphics = ((GLGame)game).getGLGraphics();\n\
  cannon = new Cannon(0, 0, 1, 1);\nball = new DynamicGameObject(0, 0, 0.2f, 0.2f);\n\
  targets = new ArrayList<GameObject>(NUM_TARGETS);\ngrid = new SpatialHashGrid(WORLD_WIDTH,\
  \ WORLD_HEIGHT, 2.5f);\nfor(int i = 0; i < NUM_TARGETS; i++) {\nGameObject target\
  \ = new GameObject((float)Math.random() * WORLD_WIDTH,\n(float)Math.random() * WORLD_HEIGHT,\n\
  0.5f, 0.5f);\ngrid.insertStaticObject(target);\ntargets.add(target);\n}\ncannonVertices\
  \ = new Vertices(glGraphics, 3, 0, false, false);\ncannonVertices.setVertices(new\
  \ float[] { -0.5f, -0.5f,\n0.5f, 0.0f,\n-0.5f, 0.5f }, 0, 6);\nballVertices = new\
  \ Vertices(glGraphics, 4, 6, false, false);\nballVertices.setVertices(new float[]\
  \ { -0.1f, -0.1f,\n0.1f, -0.1f,\n0.1f,  0.1f,\n-0.1f,  0.1f }, 0, 8);\nballVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\ntargetVertices = new Vertices(glGraphics,\
  \ 4, 6, false, false);\ntargetVertices.setVertices(new float[] { -0.25f, -0.25f,\n\
  0.25f, -0.25f,\n0.25f,  0.25f,\n-0.25f,  0.25f }, 0, 8);\ntargetVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n}\n代码清单 8-12.\nCollisionTest.java 摘录：成员变量和构造函数\n\
  ```\n\n我们可以从 `CannonGravityScreen` 移植大量代码。我们首先定义几个常量，用于控制目标数量和世界大小。接下来，我们有 `GLGraphics`\
  \ 实例，以及用于加农炮、炮弹和目标的存储在一个列表中的对象。当然，我们还有一个 `SpatialHashGrid`。为了渲染我们的世界，我们需要几个网格：一个用于加农炮，一个用于炮弹，一个用于渲染每个目标。回想一下，在\
  \ `BobTest` 中，我们只需要一个矩形就能在屏幕上渲染出 100 个 Bob。我们在这里复用这个原则。最后两个成员与 `CannonGravityTest`\
  \ 中的相同。我们使用它们来发射炮弹，并在用户触摸屏幕时应用重力。\n\n构造函数执行了之前讨论的所有操作：实例化世界对象和网格。唯一有趣的是，我们还将目标作为静态对象添加到了空间哈希网格中。\n\
  \n现在，来看代码清单 8-13 中 `CollisionTest` 类的下一个方法。\n\n```java\n@Override\npublic void update(float\
  \ deltaTime) {\nList<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n\
  game.getInput().getKeyEvents();\nint len = touchEvents.size();\nfor (int i = 0;\
  \ i < len; i++) {\nTouchEvent event = touchEvents.get(i);\ntouchPos.x = (event.x\
  \ / (float)glGraphics.getWidth()) * WORLD_WIDTH;\ntouchPos.y = (1 - event.y / (float)glGraphics.getHeight())\
  \ * WORLD_HEIGHT;\nif(event.type == TouchEvent.TOUCH_UP) {\nball.position.set(touchPos);\n\
  ball.velocity.set(cannon.angleVector).mul(10);\n}\n}\ncannon.angleVector.set(touchPos.sub(cannon.position)).nor();\n\
  ball.update(deltaTime, gravity);\nList<GameObject> colliders = grid.getPotentialColliders(ball);\n\
  len = colliders.size();\nfor(int i = 0; i < len; i++) {\nGameObject collider = colliders.get(i);\n\
  if(OverlapTester.overlapRectangles(ball.bounds, collider.bounds)) {\ngrid.removeObject(collider);\n\
  targets.remove(collider);\n}\n}\n}\n代码清单 8-13.\nCollisionTest.java 摘录：update() 方法\n\
  ```\n\n和往常一样，我们首先获取触摸和按键事件，并且只遍历触摸事件。触摸事件的处理方式与 `CannonGravityTest` 中几乎相同。唯一的区别在于，我们使用\
  \ `Cannon` 对象代替了旧示例中的向量，并且在触摸弹起事件后，当加农炮准备发射时，我们会重置炮弹的包围盒。\n\n\n\n下一个变化在于我们如何更新球体。我们没有使用直接的向量，而是使用了为球体实例化的`DynamicGameObject`类的成员。我们忽略了`DynamicGameObject.acceleration`成员，而是将重力添加到球体的速度中。我们将球体的速度乘以\
  \ 2，以使炮弹飞得更快一点。有趣的是，我们不仅更新了球体的位置，还更新了其包围矩形左下角的位置。这一点至关重要，否则我们的球体会移动，但其包围矩形不会移动。我们为什么不直接使用球体的包围矩形来存储球体的位置呢？因为一个对象可能附加多个包围形状。那么哪个包围形状会持有该对象的实际位置呢？因此，将这两者分开是有益的，并且仅引入轻微的计算开销。当然，我们可以通过仅将速度乘以增量时间一次来优化这一点。这样，开销将简化为两次额外的加法——这是为我们获得的灵活性所付出的微小代价。\n\
  \n该方法的最后一部分是我们的碰撞检测代码。我们在空间哈希网格中查找与炮弹位于相同单元格内的目标。我们使用`SpatialHashGrid.getPotentialColliders()`方法来实现这一点。由于该方法会直接评估球体所在单元格，因此我们不需要将球体插入到网格中。接下来，我们遍历所有潜在的碰撞体，并检查球体的包围矩形与潜在碰撞体的包围矩形之间是否确实存在重叠。如果存在重叠，我们只需将该目标从目标列表中移除。请记住，我们只将目标作为静态对象添加到网格中。\n\
  \n以上就是我们完整的游戏机制。最后一块拼图是实际的渲染，这应该不会让你感到惊讶。请参阅清单 8-14 中的代码。\n\n```java\n@Override\n\
  public void present(float deltaTime) {\nGL10 gl = glGraphics.getGL();\ngl.glViewport(0,\
  \ 0, glGraphics.getWidth(), glGraphics.getHeight());\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  gl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\ngl.glOrthof(0, WORLD_WIDTH,\
  \ 0, WORLD_HEIGHT, 1, -1);\ngl.glMatrixMode(GL10.GL_MODELVIEW);\ngl.glColor4f(0,\
  \ 1, 0, 1);\ntargetVertices.bind();\nint len = targets.size();\nfor(int i = 0; i\
  \ < len; i++) {\nGameObject target = targets.get(i);\ngl.glLoadIdentity();\ngl.glTranslatef(target.position.x,\
  \ target.position.y, 0);\ntargetVertices.draw(GL10.GL_TRIANGLES, 0, 6);\n}\ntargetVertices.unbind();\n\
  gl.glLoadIdentity();\ngl.glTranslatef(ball.position.x, ball.position.y, 0);\ngl.glColor4f(1,0,0,1);\n\
  ballVertices.bind();\nballVertices.draw(GL10.GL_TRIANGLES, 0, 6);\nballVertices.unbind();\n\
  gl.glLoadIdentity();\ngl.glTranslatef(cannon.position.x, cannon.position.y, 0);\n\
  gl.glRotatef(cannon.angle, 0, 0, 1);\ngl.glColor4f(1,1,1,1);\ncannonVertices.bind();\n\
  cannonVertices.draw(GL10.GL_TRIANGLES, 0, 3);\ncannonVertices.unbind();\n}\n```\n\
  清单 8-14. 摘自`CollisionTest.java`：`present()`方法\n\n这里没有什么新内容。和往常一样，我们首先设置投影矩阵和视口，并清除屏幕。接下来，我们渲染所有目标，重用存储在`targetVertices`中的矩形模型。这和我们在`BobTest`中所做的本质上是一样的，但这次我们渲染的是目标而不是其他内容。接着，我们像在`CollisionGravityTest`中那样渲染球体和炮台。\n\
  \n唯一需要注意的是，我们改变了绘制顺序，以便球体始终显示在目标之上，而炮台始终显示在球体之上。我们还通过调用`glColor4f()`将目标颜色设置为绿色。\n\
  \n这个小测试的输出与图 8-17 完全相同，因此我们可以避免重复。当我们发射炮弹时，它将穿过目标区域。任何被炮弹击中的目标都将从这个世界中移除。\n\n如果你对这个示例稍加打磨，并添加一些激励性的游戏机制，它实际上可以成为一个不错的游戏。你能想到一些改进吗？稍微玩玩这个示例，感受一下我们在过去几页中开发的新工具。\n\
  \n本章还有更多内容需要讨论：摄像机、纹理图集和精灵。这些使用了与图形相关的技巧，这些技巧与我们的游戏世界模型无关。是时候继续了！\n\n## 二维摄像机\n\n\
  到目前为止，我们的代码中还没有摄像机的概念；我们只是通过`glOrthof()`定义了我们视景体的范围，就像这样：\n\n```java\ngl.glMatrixMode(GL10.GL_PROJECTION);\n\
  gl.glLoadIdentity();\ngl.glOrthof(0, FRUSTUM_WIDTH, 0, FRUSTUM_HEIGHT, 1, -1);\n\
  ```\n\n从第 7 章我们知道，前两个参数定义了视景体在世界中左侧和右侧边缘的 x 坐标，接下来两个参数定义了视景体底部和顶部边缘的 y 坐标，最后两个参数定义了近裁剪平面和远裁剪平面。图\
  \ 8-19 再次展示了那个视景体。\n\n![A340874_3_En_8_Fig19_HTML.jpg](img/A340874_3_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19. 你的二维世界的视景体（再次展示）\n\n因此，我们只能看到世界 (0,0,1) 到 (`FRUSTUM_WIDTH`, `FRUSTUM_HEIGHT`,–1)\
  \ 的区域。如果我们能够移动视景体，比如说向左移动，那不是很棒吗？当然，这会很棒，而且实现起来也非常简单：\n\n```java\ngl.glOrthof(x,\
  \ x + FRUSTUM_WIDTH, 0, FRUSTUM_HEIGHT, 1, -1);\n```\n\n在这个例子中，`x`只是你定义的一个偏移量。当然，我们也可以在\
  \ x 轴和 y 轴上移动：\n\n```java\ngl.glOrthof(x, x + FRUSTUM_WIDTH, y, y +FRUSTUM_HEIGHT,\
  \ 1, -1);\n```\n\n图 8-20 展示了这代表什么。\n\n![A340874_3_En_8_Fig20_HTML.jpg](img/A340874_3_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20. 移动视景体\n\n我们只需在世界空间中指定视景体的左下角。这已经足以实现一个可自由移动的二维摄像机。但我们还能做得更好。如果不使用`x`和`y`指定视景体的左下角，而是指定视景体的中心呢？这样，我们可以轻松地将视景体聚焦在某个特定位置的对象上——比如前面例子中的炮弹：\n\
  \n```java\ngl.glOrthof(x – FRUSTUM_WIDTH / 2, x + FRUSTUM_WIDTH / 2, y – FRUSTUM_HEIGHT\
  \ / 2, y +FRUSTUM_HEIGHT / 2, 1, -1);\n```\n\n图 8-21 展示了这看起来像什么。\n\n![A340874_3_En_8_Fig21_HTML.jpg](img/A340874_3_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21. 根据视景体的中心来指定它\n\n这仍然不是我们能用`glOrthof()`做的全部。那缩放呢？想想看。我们知道，通过`glViewportf()`，你可以告诉\
  \ OpenGL ES 我们希望在屏幕的哪个部分渲染视景体内的内容。OpenGL ES 会自动拉伸和缩放输出以对齐到视口。现在，如果我们缩小视景体的宽度和高度，我们将在屏幕上显示世界的一个更小区域——这就是放大。如果我们增大视景体，我们可以显示更多世界内容——这就是缩小。因此，我们可以引入一个缩放因子，并将其乘以视景体的宽度和高度来实现放大和缩小。因子为\
  \ 1 将使用正常的视景体宽度和高度显示世界，如图 8-21 所示。因子小于 1 将聚焦于视景体的中心进行放大，而因子大于 1 则会缩小，显示更多世界内容（例如，将缩放因子设置为\
  \ 2 将显示两倍的世界内容）。以下是我们如何使用`glOrthof()`来实现这一点：\n\n```java\ngl.glOrthof(x – FRUSTUM_WIDTH\
  \ / 2 * zoom, x + FRUSTUM_WIDTH / 2 * zoom, y – FRUSTUM_HEIGHT / 2 * zoom, y +FRUSTUM_HEIGHT\
  \ / 2 * zoom, 1, -1);\n```\n\n\n\n太简单了！我们现在可以创建一个摄像机类，该类包含一个观察位置（视锥体的中心）、一个标准视锥体宽度和高度，以及一个缩放因子，该因子可以使视锥体变小或变大，从而显示更少的世界（放大）或更多的世界（缩小）。图\
  \ 8-22 展示了一个缩放因子为 0.5（内部灰色框）的视锥体，以及一个缩放因子为 1（外部透明框）的视锥体。\n\n![A340874_3_En_8_Fig22_HTML.jpg](img/A340874_3_En_8_Fig22_HTML.jpg)\n\
  \n**图 8-22.** 通过操作视锥体大小进行缩放\n\n为了完善我们的方案，我们还需要添加一个功能。想象一下，当我们触摸屏幕时，想要找出我们触摸的是 2D\
  \ 世界中的哪个点。在我们迭代改进的加农炮示例中，我们已经做过几次了。对于不考虑摄像机位置和缩放的视锥体配置，如图 8-19 所示，我们有以下方程（参见我们加农炮示例中的`update()`方法）：\n\
  \n```\nworldX = (touchX / Graphics.getWidth()) × FRUSTUM_WIDTH;\nworldY = (1 – touchY\
  \ / Graphics.getHeight()) × FRUSTUM_HEIGHT;\n```\n\n首先，我们将触摸点的`x`和`y`坐标除以屏幕的宽度和高度，归一化到\
  \ 0 到 1 的范围，然后通过乘以视锥体的宽度和高度，将它们转换到世界空间坐标。我们所要做的，就是将视锥体的位置以及缩放因子考虑进去。具体做法如下：\n\n\
  ```\nworldX = (touchX / Graphics.getWidth()) × FRUSTUM_WIDTH + x – FRUSTUM_WIDTH\
  \ / 2;\nworldY = (1 – touchY / Graphics.getHeight()) × FRUSTUM_HEIGHT + y – FRUSTUM_HEIGHT\
  \ / 2;\n```\n\n这里，`x`和`y`是摄像机在世界空间中的位置。\n\n## Camera2D 类\n\n让我们将所有这些整合到一个类中。我们希望该类存储摄像机的位置、标准视锥体宽度和高度以及缩放因子。我们还需要一个方便的方法来正确设置视口（始终使用整个屏幕）和投影矩阵。此外，我们还需要一个可以将触摸坐标转换为世界坐标的方法。代码清单\
  \ 8-15 展示了我们的新`Camera2D`类及其注释。\n\n```\npackage com.badlogic.androidgames.framework.gl;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport com.badlogic.androidgames.framework.impl.GLGraphics;\n\
  import com.badlogic.androidgames.framework.math.Vector2;\npublic class Camera2D\
  \ {\npublic final Vector2 position;\npublic float zoom;\npublic final float frustumWidth;\n\
  public final float frustumHeight;\nfinal GLGraphics glGraphics;\nListing 8-15.\n\
  Camera2D.java: 我们崭新的用于 2D 渲染的摄像机类\n```\n\n如上所述，我们将摄像机的位置、视锥体宽度和高度以及缩放因子作为成员存储。位置和缩放因子是公开的，因此我们可以轻松操作它们。我们还需要一个对`GLGraphics`的引用，这样我们就可以获取屏幕的实时像素宽度和高度，用于将触摸坐标转换为世界坐标。\n\
  \n```\npublic Camera2D(GLGraphics glGraphics, float frustumWidth, float frustumHeight)\
  \ {\nthis.glGraphics = glGraphics;\nthis.frustumWidth = frustumWidth;\nthis.frustumHeight\
  \ = frustumHeight;\nthis.position = new Vector2(frustumWidth / 2, frustumHeight\
  \ / 2);\nthis.zoom = 1.0f;\n}\n```\n\n在构造函数中，我们接收一个`GLGraphics`实例以及缩放因子为 1 时的视锥体宽度和高度作为参数。我们将它们存储起来，并将摄像机的位置初始化为观察由`(0,0,1)`和`(frustumWidth,\
  \ frustumHeight, -1)`界定的盒子的中心，如图 8-19 所示。初始缩放因子设置为 1。\n\n```\npublic void setViewportAndMatrices()\
  \ {\nGL10 gl = glGraphics.getGL();\ngl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\n\
  gl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\ngl.glOrthof(position.x\
  \ - frustumWidth * zoom / 2,\nposition.x + frustumWidth * zoom / 2,\nposition.y\
  \ - frustumHeight * zoom / 2,\nposition.y + frustumHeight * zoom / 2,\n1, -1);\n\
  gl.glMatrixMode(GL10.GL_MODELVIEW);\ngl.glLoadIdentity();\n}\n```\n\n`setViewportAndMatrices()`方法将视口设置为覆盖整个屏幕，并根据摄像机的参数设置投影矩阵，如前所述。在该方法的最后，我们告诉\
  \ OpenGL ES 之后的所有矩阵操作将针对模型-视图矩阵，并加载一个单位矩阵。我们每帧都调用此方法，以便我们可以从一个干净的状态开始——无需再直接调用 OpenGL\
  \ ES 来设置视口和投影矩阵。\n\n```\npublic void touchToWorld(Vector2 touch) {\ntouch.x = (touch.x\
  \ / (float) glGraphics.getWidth()) * frustumWidth * zoom;\ntouch.y = (1 - touch.y\
  \ / (float) glGraphics.getHeight()) * frustumHeight * zoom;\ntouch.add(position).sub(frustumWidth\
  \ * zoom / 2, frustumHeight * zoom / 2);\n}\n```\n\n`touchToWorld()`方法接收一个包含触摸坐标的`Vector2`实例，并将其向量转换到世界空间。这与我们刚才讨论的方法相同；唯一的区别是我们现在可以使用我们精巧的`Vector2`类。\n\
  \n## 一个示例\n\n现在，我们将在加农炮示例中使用`Camera2D`类。复制`CollisionTest`文件并将其重命名为`Camera2DTest`。将文件中的`GLGame`类重命名为`Camera2DTest`，并将`CollisionScreen`类重命名为`Camera2DScreen`。我们需要做一些小的改动来使用我们的新`Camera2D`类。\n\
  \n首先，我们向`Camera2DScreen`类添加一个新成员：\n\n```\nCamera2D camera;\n```\n\n我们在构造函数中初始化这个成员，如下所示：\n\
  \n```\ncamera = new Camera2D(glGraphics, WORLD_WIDTH, WORLD_HEIGHT);\n```\n\n我们传入`GLGraphics`实例以及世界的宽度和高度（此前我们在调用`glOrthof()`时将其用作视锥体的宽度和高度）。现在我们需要做的，就是在`present()`方法中替换掉我们直接调用\
  \ OpenGL ES 的代码，这些代码原本是这样的：\n\n```\ngl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\n\
  gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\ngl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\n\
  gl.glOrthof(0, WORLD_WIDTH, 0, WORLD_HEIGHT, 1, -1);\ngl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  ```\n\n我们将它们替换为：\n\n```\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\ncamera.setViewportAndMatrices();\n\
  ```\n\n当然，我们仍然需要清除帧缓冲区，但所有其他直接调用 OpenGL ES 的代码现在都优雅地封装在`Camera2D.setViewportAndMatrices()`方法内部。如果你运行这段代码，你会发现没有任何变化。一切和以前一样——我们所做的只是让事情更简洁、更灵活。\n\
  \n我们还可以简化测试中的`update()`方法。既然我们已经向`Camera2D`类添加了`Camera2D.touchToWorld()`方法，我们最好使用它。我们可以将`update()`方法中的这段代码片段：\n\
  \n```\ntouchPos.x = (event.x / (float) glGraphics.getWidth()) * WORLD_WIDTH;\ntouchPos.y\
  \ = (1 - event.y / (float) glGraphics.getHeight()) * WORLD_HEIGHT;\n```\n\n替换为：\n\
  \n```\ncamera.touchToWorld(touchPos.set(event.x, event.y));\n```\n\n很简洁——现在一切都完美地封装起来了。但是，如果我们不充分利用`Camera2D`类的特性，那就太无聊了。计划是这样的：只要炮弹没有飞出，我们就希望摄像机以“正常”的方式观察世界。这很简单；我们已经这样做了。我们可以通过检查炮弹位置的`y`坐标是否小于或等于零来确定炮弹是否在飞行。由于我们总是对炮弹施加重力，即使我们不发射它，它也会下落，所以这是一个检查状态的简便方法。\n\
  \n\n\n### 我们的新功能\n\n当炮弹在空中飞行时（即 y 坐标大于零），新增加的功能将生效。我们希望摄像机跟随炮弹。只需将摄像机的位置设置为炮弹的位置即可实现这一目标。这将始终使炮弹保持在屏幕中央。我们还希望尝试缩放功能，因此可以根据炮弹的\
  \ y 坐标增加缩放系数：炮弹离零点越远，缩放系数越大。如果炮弹的 y 坐标更高，这将使摄像机拉远。以下是我们需要在测试屏幕的`update()`方法末尾添加的内容：\n\
  \n```\nif(ball.position.y > 0) {\n    camera.position.set(ball.position);\n    camera.zoom\
  \ = 1 + ball.position.y / WORLD_HEIGHT;\n} else {\n    camera.position.set(WORLD_WIDTH\
  \ / 2, WORLD_HEIGHT / 2);\n    camera.zoom = 1;\n}\n```\n\n只要炮弹的 y 坐标大于零，摄像机就会跟随它并拉远。只需在标准缩放系数\
  \ 1 的基础上加上一个值即可。该值就是炮弹的 y 坐标与世界高度之间的比例关系。如果炮弹的 y 坐标等于`WORLD_HEIGHT`，缩放系数将为 2，这样我们就能看到更多游戏世界。这种实现方式非常灵活——我们可以自由选择任何计算公式，没有什么特别的限制。如果炮弹的\
  \ y 坐标小于或等于零，则按照之前示例中的方式正常显示世界。\n\n### 纹理图集：因为分享是关爱\n\n到目前为止，我们在程序中只使用了单一纹理。如果我们想渲染不仅仅是\
  \ Bob，还有其他超级英雄、敌人、爆炸或金币，该怎么办？我们可以使用多个纹理，每个纹理存储一种对象类型的图像。但 OpenGL ES 对此不太适应，因为每渲染一种对象类型，我们都需要切换纹理（例如，绑定\
  \ Bob 的纹理，渲染 Bob；绑定金币纹理，渲染金币，以此类推）。更高效的方式是将多个图像放入单一纹理中。这就是纹理图集：一个包含多个图像的单一纹理。我们只需绑定该纹理一次，即可渲染图集中包含图像的任何实体类型。这减少了状态切换的开销，提高了性能。图\
  \ 8-23 展示了这样一个纹理图集。\n\n![A340874_3_En_8_Fig23_HTML.jpg](img/A340874_3_En_8_Fig23_HTML.jpg)\n\
  \n**图 8-23. 纹理图集**\n\n图 8-23 中有三个对象：一门大炮、一个炮弹和 Bob。网格不是纹理的一部分，它只是为了说明我们通常如何手动创建纹理图集。\n\
  \n该纹理图集大小为 64×64 像素，每个网格单元为 32×32 像素。大炮占据两个网格单元，炮弹占据不到四分之一个单元，Bob 占据一个单元。现在，回顾一下之前如何定义大炮、炮弹和目标的边界（以及图形矩形），你会发现它们之间的尺寸关系与纹理图集中的网格关系非常相似。在游戏世界中，目标大小为\
  \ 0.5×0.5 米，大炮为 0.2×0.2 米。在我们的纹理图集中，Bob 占据 32×32 像素，炮弹略小于 16×16 像素。纹理图集与世界对象大小之间的关系应该很明确：图集中的\
  \ 32 像素对应世界中的 0.5 米。原始示例中大炮为 1×1 米，但当然我们可以更改此设置。根据我们的纹理图集，大炮占据 64×32 像素，因此在游戏世界中，大炮的大小应为\
  \ 1×0.5 米。这简直太简单了，不是吗？\n\n那么，为什么选择 32 像素对应世界中的 1 米呢？请记住，纹理的宽度和高度必须是 2 的幂次方。使用 32\
  \ 这样的 2 的幂次方像素单位来对应世界中的 0.5 米，是艺术家应对纹理尺寸限制的一种便捷方式。这也使得在像素艺术中更容易把握不同对象在游戏世界中的尺寸关系。\n\
  \n请注意，我们并非只能使用每个世界单位对应更多像素。我们可以选择 64 像素或 50 像素对应 0.5 米。那么，合适的像素与米的比例是多少呢？这同样取决于游戏运行的屏幕分辨率。让我们做一些计算。\n\
  \n大炮世界的左下角为(0,0)，右上角为(9.6,4.8)。这会被映射到屏幕上。我们可以计算出一台低端设备（横屏模式下 480×320 像素）屏幕上的每世界单位像素数：\n\
  \n`pixelsPerUnitX = screenWidth / worldWidth = 480 / 9.6 = 50 像素/米`\n\n`pixelsPerUnitY\
  \ = screenHeight / worldHeight = 320 / 6.4 = 50 像素/米`\n\n现在，大炮在世界中占据 1×0.5 米，因此在屏幕上将使用\
  \ 50×25 像素。我们从纹理中提取 64×32 像素的区域，因此在渲染大炮时实际上对纹理图像进行了一点缩小。这完全没问题——OpenGL ES 会自动为我们处理。根据我们为纹理设置的缩小过滤器，结果要么是清晰且像素化的（`GL_NEAREST`），要么是稍微平滑的（`GL_LINEAR`）。如果希望在\
  \ 480x320 像素的设备上实现像素完美渲染，我们需要对纹理图像进行一些缩放。我们可以使用 25×25 像素的网格大小，而不是 32×32 像素。然而，如果只是调整图集图像的大小（或者更确切地说是手动重新绘制所有内容），我们最终会得到一个\
  \ 50×50 像素的图像——这在 OpenGL ES 中是不可行的。我们需要在左侧和底部添加填充，以得到 64×64 像素的图像（因为 OpenGL ES 要求纹理宽度和高度为\
  \ 2 的幂次方）。因此，在低端设备上使用 OpenGL ES 对纹理图像进行缩小是没问题的。\n\n那么在更高分辨率的设备上，比如 HTC Desire HD（横屏模式下\
  \ 800×480 像素），情况又如何呢？让我们通过以下公式计算该屏幕配置的参数：\n\n`pixelsPerUnitX = screenWidth / worldWidth\
  \ = 800 / 9.6 = 83 像素/米`\n\n`pixelsPerUnitY = screenHeight / worldHeight = 480 /\
  \ 6.4 = 75 像素/米`\n\n我们在 x 轴和 y 轴上获得不同的每单位像素数，因为视锥体的宽高比（9.6 / 6.4 = 1.5）与屏幕的宽高比（800\
  \ / 480 = 1.66）不同。这在第 4 章中讨论过，当时概述了一些解决方案。那时，我们针对固定的像素大小和宽高比；现在，我们可以采用相同的方案，针对固定的视锥体宽度和高度。在\
  \ HTC Desire HD 的情况下，大炮、炮弹和 Bob 会因为更高的分辨率以及不同的宽高比而被放大和拉伸。我们接受这个事实，因为我们希望所有玩家都能看到相同的游戏世界区域。否则，拥有更高宽高比的玩家将拥有能够看到更多游戏世界的优势。\n\
  \n那么，如何使用这样的纹理图集呢？只需重新映射我们的矩形坐标。我们不再使用整个纹理，而只使用其中的一部分。为了计算纹理图集中图像角点的纹理坐标，我们可以复用前面示例中的公式。以下是快速回顾：\n\
  \n`u = x / imageWidth`\n`v = y / imageHeight`\n\n其中，`u`和`v`是纹理坐标，`x`和`y`是像素坐标。Bob\
  \ 在像素坐标系中的左上角坐标为(32,32)。如果将其代入上述公式，我们得到纹理坐标为(0.5,0.5)。我们可以对任何其他需要的角点执行相同操作，并据此为矩形的顶点设置正确的纹理坐标。\n\
  \n## 示例\n\n\n\n#### 纹理图集集成\n\n我们将这个纹理图集添加到先前的示例中，使其看起来更美观。`Bob` 将成为你的目标。\n\n复制 `Camera2DTest`\
  \ 并稍作修改。将副本放入名为 `TextureAtlasTest.java` 的文件中，并相应地重命名其中包含的两个类（`TextureAtlasTest`\
  \ 和 `TextureAtlasScreen`）。\n\n我们做的第一件事是向 `TextureAtlasScreen` 添加一个新成员：\n\n```\n\
  Texture texture;\n```\n\n我们不在构造函数中创建 `Texture`，而是在 `resume()` 方法中创建它。请记住，当应用程序从暂停状态恢复时，纹理将会丢失，因此我们必须在\
  \ `resume()` 方法中重新创建它们：\n\n```\n@Override\npublic void resume() {\n    texture =\
  \ new Texture(((GLGame)game), \"atlas.png\");\n}\n```\n\n将图 8-23 中的图片放入项目的 `assets/`\
  \ 文件夹中，并将其命名为 `atlas.png`。（当然，它不包含图中所示的网格线。）\n\n接下来，我们需要更改顶点的定义。我们为每种实体类型（炮台、炮弹和\
  \ Bob）提供一个 `Vertices` 实例；每个实例持有一个由四个顶点和六个索引组成的矩形，构成两个三角形。我们需要做的就是根据纹理图集为每个顶点添加纹理坐标。我们还将炮台从三角形改为\
  \ 1×0.5 米的矩形。以下是我们替换构造函数中旧顶点创建代码的内容：\n\n```\ncannonVertices = new Vertices(glGraphics,\
  \ 4, 6, false, true);\ncannonVertices.setVertices(new float[] { -0.5f, -0.25f, 0.0f,\
  \ 0.5f,\n                                         0.5f, -0.25f, 1.0f, 0.5f,\n  \
  \                                       0.5f,  0.25f, 1.0f, 0.0f,\n            \
  \                            -0.5f,  0.25f, 0.0f, 0.0f }, 0, 16);\ncannonVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n\nballVertices = new Vertices(glGraphics,\
  \ 4, 6, false, true);\nballVertices.setVertices(new float[] { -0.1f, -0.1f, 0.0f,\
  \ 0.75f,\n                                       0.1f, -0.1f, 0.25f, 0.75f,\n  \
  \                                     0.1f,  0.1f, 0.25f, 0.5f,\n              \
  \                        -0.1f,  0.1f, 0.0f, 0.5f }, 0, 16);\nballVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n\ntargetVertices = new Vertices(glGraphics,\
  \ 4, 6, false, true);\ntargetVertices.setVertices(new float[] { -0.25f, -0.25f,\
  \ 0.5f, 1.0f,\n                                         0.25f, -0.25f, 1.0f, 1.0f,\n\
  \                                         0.25f,  0.25f, 1.0f, 0.5f,\n         \
  \                               -0.25f,  0.25f, 0.5f, 0.5f }, 0, 16);\ntargetVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n```\n\n现在，我们的每个网格都由四个顶点组成，每个顶点都有一个 2D 位置和纹理坐标。我们向网格添加六个索引，指定要渲染的两个三角形。炮台在\
  \ y 轴上稍微小了一点。它现在的尺寸是 1×0.5 米，而不是 1×1 米。这也体现在先前的构造函数中 `Cannon` 对象的构造上：\n\n```\ncannon\
  \ = new Cannon(0, 0, 1, 0.5f);\n```\n\n因为我们没有对炮台本身进行碰撞检测，所以在该构造函数中设置什么尺寸并不重要；我们这样做只是为了保持一致性。\n\
  \n我们需要更改的最后一件事是渲染方法。以下是完整的渲染方法：\n\n```\n@Override\npublic void present(float deltaTime)\
  \ {\n    GL10 gl = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  \    camera.setViewportAndMatrices();\n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\n    gl.glEnable(GL10.GL_TEXTURE_2D);\n    texture.bind();\n\
  \    targetVertices.bind();\n    int len = targets.size();\n    for(int i = 0; i\
  \ < len; i++) {\n        GameObject target = targets.get(i);\n        gl.glLoadIdentity();\n\
  \        gl.glTranslatef(target.position.x, target.position.y, 0);\n        targetVertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 6);\n    }\n    targetVertices.unbind();\n    gl.glLoadIdentity();\n    gl.glTranslatef(ball.position.x,\
  \ ball.position.y, 0);\n    ballVertices.bind();\n    ballVertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 6);\n    ballVertices.unbind();\n    gl.glLoadIdentity();\n    gl.glTranslatef(cannon.position.x,\
  \ cannon.position.y, 0);\n    gl.glRotatef(cannon.angle, 0, 0, 1);\n    cannonVertices.bind();\n\
  \    cannonVertices.draw(GL10.GL_TRIANGLES, 0, 6);\n    cannonVertices.unbind();\n\
  }\n```\n\n在这里，我们启用了混合，设置了正确的混合函数，启用了纹理，并绑定了我们的图集纹理。我们稍微调整了 `cannonVertices.draw()`\
  \ 调用，现在它渲染两个三角形而不是一个。就是这样。图 8-24 展示了我们“整容”操作的结果。\n\n![A340874_3_En_8_Fig24_HTML.jpg](img/A340874_3_En_8_Fig24_HTML.jpg)\n\
  \n**图 8-24.** 使用纹理图集美化炮台示例\n\n关于纹理图集，还有几件事你需要了解：\n\n- 当你使用 `GL_LINEAR` 作为缩小和/或放大过滤器时，如果图集内的两个图像彼此接触，可能会出现伪影。这是因为纹理映射器实际上会为屏幕上的一个像素从纹理中获取最近的四个纹理元素。当它针对图像的边界执行此操作时，它也会从图集中的相邻图像获取纹理元素。你可以通过在图像之间引入\
  \ 2 像素的空边框来消除此问题。更好的是，你可以复制每个图像的边框像素。第一种解决方案更简单——只需确保你的纹理尺寸保持为 2 的幂即可。\n\n- 不需要将图集中的所有图像排列成固定的网格。你可以将任意大小的图像尽可能紧密地放入图集中。你只需要知道图像在图集中的起始和结束位置，以便为其计算正确的纹理坐标。然而，打包任意大小的图像是一个棘手的问题。网上有一些工具可以帮助你创建纹理图集；只需搜索一下，你就会发现大量的选择。\n\
  \n- 通常你无法将游戏中的所有图像分组到单个纹理图集中。请记住，不同设备支持的最大纹理尺寸有所不同。你可以放心地假设所有设备都支持 512×512 像素（甚至\
  \ 1024×1024 像素）的纹理尺寸。因此，你可以使用多个纹理图集。不过，你应该尝试将在屏幕上同时出现的对象分组到一个图集中——例如，第一关的所有对象放在一个图集中，第二关的所有对象放在另一个图集中，所有\
  \ UI 元素放在另一个图集中，以此类推。在最终确定美术资源之前，请先考虑逻辑分组。\n\n- 还记得我们在 `Mr. Nom` 中是如何动态绘制数字的吗？我们就是使用纹理图集来实现的。事实上，我们可以通过纹理图集执行所有动态文本渲染。只需将游戏所需的所有字符放入一个图集中，并通过将矩形映射到图集中的相应字符来按需渲染它们。你可以在网上找到一些工具，它们会为你生成位图字体。为了后续章节的目的，我们坚持使用\
  \ `Mr. Nom` 中使用的方法：静态文本将作为一个整体预渲染，只有动态文本（例如高分中的数字）才会通过图集渲染。\n\n你可能已经注意到，Bob 在被炮弹图形击中之前就消失了。这是因为我们的包围形状有点太大了。Bob\
  \ 和炮弹周围都有一些空白区域。解决方案是什么？只需让包围形状小一点即可。你应该对此有所感觉，所以调整源代码直到碰撞感觉合适。在开发游戏时，你经常会发现这类微调“机会”。微调可能除了良好的关卡设计之外，是游戏开发中最关键的环节之一。让事情感觉恰到好处可能很困难，但一旦你达到了像《超级马里奥兄弟》那样的完美境界，就会非常有成就感。遗憾的是，这是无法教授的，因为它取决于你游戏的外观和感觉。将其视为区分好游戏和坏游戏的魔法配方吧。\n\
  \n\n\n#### 处理图形消失问题\n\n为了处理刚才提到的消失问题，可将包围矩形制作得比图形表示稍小一些，以便在碰撞触发前允许一定的重叠。\n\n## 纹理区域、精灵与批处理器：隐藏\
  \ OpenGL ES\n\n到目前为止，在大炮示例中，我们的代码包含大量样板代码，其中部分是可以精简的。`Vertices` 实例的定义便是其中之一——仅定义一个带纹理的矩形就需要七行代码，这相当繁琐。另一个可改进之处是手动计算纹理图集中图像的纹理坐标。此外，在渲染\
  \ 2D 矩形时存在大量高度重复的代码，并且还有一种比每个对象一次绘制调用更好的渲染方式。我们可以通过引入几个新概念来解决这些问题：\n\n*   **纹理区域**：我们在上一个示例中已经接触过纹理区域。纹理区域是单个纹理内的一个矩形区域（例如，图集中包含大炮的区域）。我们需要一个优秀的类来封装将所有像素坐标转换为纹理坐标的繁琐计算。\n\
  \n*   **精灵**：精灵与游戏对象非常相似。它拥有位置（以及可选的朝向和缩放），以及图形范围。你通过一个矩形来渲染精灵，就像渲染 Bob 或大炮一样。事实上，Bob\
  \ 和其他对象的图形表示可以且应该被视为精灵。精灵也映射到纹理中的一个区域。这就是纹理区域的用武之地。虽然很诱人，但你应该避免在游戏中直接将精灵与游戏对象合并，而是遵循模型-视图-控制器模式。这种图形与模型代码的清晰分离能使设计更优。\n\
  \n*   **精灵批处理器**：精灵批处理器负责一次性渲染多个精灵。为此，精灵批处理器需要知道每个精灵的位置、大小和纹理区域。精灵批处理器将成为我们摆脱每个对象多次绘制调用和矩阵操作的神奇成分。\n\
  \n这些概念高度关联，将在下文讨论。\n\n### `TextureRegion` 类\n\n由于我们已经使用过纹理区域，因此应该很容易弄清楚我们所需的内容。我们知道如何从像素坐标转换到纹理坐标。我们需要一个类，在其中可以指定纹理图集中图像的像素坐标，然后该类会存储图集区域对应的纹理坐标，以供进一步处理（例如，当我们要渲染一个精灵时）。闲话少叙，清单\
  \ 8-16 展示了我们的 `TextureRegion` 类。\n\n```java\npackage com.badlogic.androidgames.framework.gl;\n\
  public class TextureRegion {\n    public final float u1, v1;\n    public final float\
  \ u2, v2;\n    public final Texture texture;\n    \n    public TextureRegion(Texture\
  \ texture, float x, float y, float width, float height) {\n        this.u1 = x /\
  \ texture.width;\n        this.v1 = y / texture.height;\n        this.u2 = this.u1\
  \ + width / texture.width;\n        this.v2 = this.v1 + height / texture.height;\n\
  \        this.texture = texture;\n    }\n}\n```\n\n*清单 8-16. TextureRegion.java：将像素坐标转换为纹理坐标*\n\
  \n`TextureRegion` 存储区域左上角 (`u1`, `v1`) 和右下角 (`u2`, `v2`) 的纹理坐标。构造函数接受一个 `Texture`\
  \ 以及左上角坐标、区域的宽度和高度（以像素坐标表示）。要为大炮构建一个纹理区域，我们可以这样做：\n\n```java\nTextureRegion cannonRegion\
  \ = new TextureRegion(texture, 0, 0, 64, 32);\n```\n\n类似地，我们可以为 Bob 构建一个区域：\n\n\
  ```java\nTextureRegion bobRegion = new TextureRegion(texture, 32, 32, 32, 32);\n\
  ```\n\n依此类推。我们可以在已创建的示例代码中使用它，并使用 `TextureRegion.u1`, `v1`, `u2` 和 `v2` 成员来指定矩形顶点的纹理坐标。但我们不需要这样做，因为我们希望彻底摆脱这些繁琐的定义。这正是我们可以使用精灵批处理器的地方。\n\
  \n### `SpriteBatcher` 类\n\n如前所述，精灵可以很容易地通过其位置、大小和纹理区域（以及可选的旋转和缩放）来定义。它只是我们世界空间中的一个图形矩形。为简化操作，我们坚持约定：位置是精灵的中心，矩形围绕该中心构建。现在我们可以有一个\
  \ `Sprite` 类并按如下方式使用它：\n\n```java\nSprite bobSprite = new Sprite(20, 20, 0.5f, 0.5f,\
  \ bobRegion);\n```\n\n这将构建一个新的精灵，其中心位于世界坐标 (20,20)，向每侧延伸 0.25 米，并使用 `bobRegion TextureRegion`。但我们可以这样做：\n\
  \n```java\nspriteBatcher.drawSprite(bob.x, bob.y, BOB_WIDTH, BOB_HEIGHT, bobRegion);\n\
  ```\n\n这看起来好多了。我们不需要构建另一个对象来表示对象的图形侧。相反，我们按需绘制 Bob 的一个实例。我们还可以有一个重载方法：\n\n```java\n\
  spriteBatcher.drawSprite(cannon.x, cannon.y, CANNON_WIDTH, CANNON_HEIGHT, cannon.angle,\
  \ cannonRegion);\n```\n\n这将绘制大炮，并根据其角度旋转。那么，我们如何实现精灵批处理器呢？`Vertices` 实例在哪里？让我们思考一下批处理器如何工作。\n\
  \n到底什么是批处理？在图形界，批处理被定义为将多次绘制调用合并为单次绘制调用。这使 GPU 更高效，如第 7 章所述。精灵批处理器提供了一种实现此目的的方法。其工作原理如下：\n\
  \n*   批处理器有一个缓冲区，最初为空（或在收到清除信号后变为空）。该缓冲区将保存顶点。在我们的例子中，它将是一个简单的浮点数组。\n\n*   每次我们调用\
  \ `SpriteBatcher.drawSprite()` 方法时，都会根据作为参数指定的位置、大小、方向和纹理区域，向缓冲区添加四个顶点。这也意味着我们必须手动旋转和平移顶点位置，而无需\
  \ OpenGL ES 的帮助。不过别担心，`Vector2` 类的代码将派上用场。这是消除所有绘制调用的关键。\n\n*   一旦我们指定了所有要渲染的精灵，我们就告诉精灵批处理器将精灵所有矩形的顶点一次性提交给\
  \ GPU，然后调用实际的 OpenGL ES 绘制方法来渲染所有矩形。为此，我们可以将浮点数组的内容传输到一个 `Vertices` 实例中，并使用它来渲染矩形。\n\
  \n> **注意**：你只能批处理使用相同纹理的精灵。不过，这并非大问题，因为无论如何你都会使用纹理图集。\n\n精灵批处理器的通常使用模式如下：\n\n```java\n\
  batcher.beginBatch(texture);\n// 根据需要频繁调用 batcher.drawSprite()，\n// 引用纹理中的区域\nbatcher.endBatch();\n\
  ```\n\n调用 `SpriteBatcher.beginBatch()` 告诉批处理器两件事：它应该清除其缓冲区，并且应该使用我们传入的纹理。为方便起见，我们将在此方法内绑定纹理。\n\
  \n接下来，我们根据需要渲染尽可能多引用此纹理中区域的精灵。这将填充缓冲区，每个精灵添加四个顶点。\n\n\n\n对 `SpriteBatcher.endBatch()`\
  \ 的调用向精灵批处理器发出信号，表示我们已完成当前批次精灵的渲染，它现在应将顶点上传到 GPU 进行实际渲染。我们将使用一个`Vertices`实例进行索引渲染，因此除了顶点之外，我们还需要在浮点数组缓冲区中指定索引。然而，由于我们总是渲染矩形，我们可以在`SpriteBatcher`的构造函数中预先一次性生成索引。\n\
  \n为此，我们需要知道批处理器每批能绘制多少个精灵。通过对每批可渲染的精灵数量设置硬性限制，我们不需要为其他缓冲区增长任何数组；我们只需在构造函数中一次性分配这些数组和缓冲区。\n\
  \n其通用机制相当简单。`SpriteBatcher.drawSprite()`方法可能看起来有些神秘，但（如果我们暂时忽略旋转和缩放）它并不是一个大问题。我们只需要根据参数计算顶点位置和纹理坐标。在之前的示例中，我们已经手动完成了这些操作——例如，在定义炮管、炮弹和\
  \ Bob 的矩形时。我们可以在`SpriteBatcher.drawSprite()`方法中做基本相同的事情，只是根据方法的参数自动完成。因此，让我们来检查一下`SpriteBatcher`。\n\
  \n代码清单 8-17 展示了代码。\n\n```\npackage com.badlogic.androidgames.framework.gl;\nimport\
  \ com.badlogic.androidgames.framework.impl.GLGraphics;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class SpriteBatcher {\nfinal float[] verticesBuffer;\nint bufferIndex;\n\
  Vertices vertices;\nint numSprites;\nListing 8-17.\nExcerpt from SpriteBatcher.java,\
  \ Without Rotation and Scaling\n```\n\n我们先来看成员变量。成员`verticesBuffer`是一个临时浮点数组，用于存储当前批次精灵的顶点。成员`bufferIndex`指示我们应在浮点数组中何处开始写入下一个顶点。成员`vertices`是用于渲染批次的`Vertices`实例。它还存储了我们稍后将定义的索引。成员`numSprites`保存当前批次中已绘制的精灵数量。\n\
  \n```\npublic SpriteBatcher(GLGraphics glGraphics, int maxSprites) {\nthis.verticesBuffer\
  \ = new float[maxSprites*4*4];\nthis.vertices = new Vertices(glGraphics, maxSprites*4,\
  \ maxSprites*6, false, true);\nthis.bufferIndex = 0;\nthis.numSprites = 0;\nshort[]\
  \ indices = new short[maxSprites*6];\nint len = indices.length;\nshort j = 0;\n\
  for (int i = 0; i < len; i += 6, j += 4) {\nindices[i + 0] = (short)(j + 0);\nindices[i\
  \ + 1] = (short)(j + 1);\nindices[i + 2] = (short)(j + 2);\nindices[i + 3] = (short)(j\
  \ + 2);\nindices[i + 4] = (short)(j + 3);\nindices[i + 5] = (short)(j + 0);\n}\n\
  vertices.setIndices(indices, 0, indices.length);\n}\n```\n\n转到构造函数，它有两个参数：创建`Vertices`实例所需的`GLGraphics`实例，以及批处理器每批能渲染的最大精灵数。我们在构造函数中做的第一件事是创建浮点数组。每个精灵有四个顶点，每个顶点占用四个浮点数（两个用于\
  \ x 和 y 坐标，另外两个用于纹理坐标）。我们最多可以有`maxSprites`个精灵，因此缓冲区需要 `4 × 4 × maxSprites` 个浮点数。\n\
  \n接下来，我们创建`vertices`实例。它需要存储 `maxSprites × 4` 个顶点和 `maxSprites × 6` 个索引。然后我们将`bufferIndex`和`numSprites`成员初始化为零。我们只需要执行一次，因为索引永远不会改变。批次中的第一个精灵始终具有索引\
  \ 0, 1, 2, 2, 3, 0；下一个精灵将具有索引 4, 5, 6, 6, 7, 4，依此类推。我们可以预先计算这些索引并将其存储在`Vertices`实例中。这样，我们只需设置它们一次，而不是每个精灵设置一次。\n\
  \n```\npublic void beginBatch(Texture texture) {\ntexture.bind();\nnumSprites =\
  \ 0;\nbufferIndex = 0;\n}\n```\n\n接下来是`beginBatch()`方法。它绑定纹理并重置`numSprites`和`bufferIndex`成员，以便第一个精灵的顶点将插入到`verticesBuffer`浮点数组的前面。\n\
  \n```\npublic void endBatch() {\nvertices.setVertices(verticesBuffer, 0, bufferIndex);\n\
  vertices.bind();\nvertices.draw(GL10.GL_TRIANGLES, 0, numSprites * 6);\nvertices.unbind();\n\
  }\n```\n\n下一个方法是`endBatch()`；我们将调用它来完成并绘制当前批次。它首先将为此批次定义的顶点从浮点数组传输到`Vertices`实例。剩下要做的就是绑定`Vertices`实例，绘制\
  \ `numSprites × 2` 个三角形，然后再次解绑`Vertices`实例。由于我们使用索引渲染，我们指定要使用的索引数量——每个精灵六个索引，乘以`numSprites`。这就是渲染的全部内容。\n\
  \n```\npublic void drawSprite(float x, float y, float width, float height, TextureRegion\
  \ region) {\nfloat halfWidth = width / 2;\nfloat halfHeight = height / 2;\nfloat\
  \ x1 = x - halfWidth;\nfloat y1 = y - halfHeight;\nfloat x2 = x + halfWidth;\nfloat\
  \ y2 = y + halfHeight;\nverticesBuffer[bufferIndex++] = x1;\nverticesBuffer[bufferIndex++]\
  \ = y1;\nverticesBuffer[bufferIndex++] = region.u1;\nverticesBuffer[bufferIndex++]\
  \ = region.v2;\nverticesBuffer[bufferIndex++] = x2;\nverticesBuffer[bufferIndex++]\
  \ = y1;\nverticesBuffer[bufferIndex++] = region.u2;\nverticesBuffer[bufferIndex++]\
  \ = region.v2;\nverticesBuffer[bufferIndex++] = x2;\nverticesBuffer[bufferIndex++]\
  \ = y2;\nverticesBuffer[bufferIndex++] = region.u2;\nverticesBuffer[bufferIndex++]\
  \ = region.v1;\nverticesBuffer[bufferIndex++] = x1;\nverticesBuffer[bufferIndex++]\
  \ = y2;\nverticesBuffer[bufferIndex++] = region.u1;\nverticesBuffer[bufferIndex++]\
  \ = region.v1;\nnumSprites++;\n}\n```\n\n下一个方法`drawSprite()`是`SpriteBatcher`类的主力。它接收精灵中心的\
  \ x 和 y 坐标、其宽度和高度以及它映射到的纹理区域。该方法的职责是从当前`bufferIndex`开始，向浮点数组添加四个顶点。这四个顶点形成一个纹理映射矩形。我们计算左下角\
  \ (`x1`, `y1`) 和右上角 (`x2`, `y2`) 的位置，并使用这四个变量以及来自`TextureRegion`的纹理坐标来构建顶点。顶点按逆时针顺序添加，从左下角顶点开始。一旦它们被添加到浮点数组，我们就递增`numSprites`计数器，并等待添加另一个精灵或批次完成。\n\
  \n这就是全部内容。我们通过简单的将预变换的顶点缓冲在浮点数组中并一次性渲染，消除了大量绘制方法。与我们之前使用的方法相比，这将显著提高我们的 2D 精灵渲染性能。更少的\
  \ OpenGL ES 状态更改和更少的绘制调用使 GPU 更加高效。\n\n我们还需要实现一个可以绘制旋转精灵的`SpriteBatcher.drawSprite()`方法。我们需要做的是构造四个角顶点而不添加位置，围绕原点旋转它们，然后添加精灵的位置以使顶点位于世界空间中，最后继续像之前的绘制方法那样进行。我们可以为此使用`Vector2.rotate()`，但这会引入额外的函数调用开销。因此，我们重新实现了`Vector2.rotate()`中的代码，并尽可能进行优化。`SpriteBatcher`类的最终方法如代码清单\
  \ 8-18 所示。\n\n\n\n```java\npublic void drawSprite(float x, float y, float width,\
  \ float height, float angle, TextureRegion region) {\n    float halfWidth = width\
  \ / 2;\n    float halfHeight = height / 2;\n    float rad = angle * Vector2.TO_RADIANS;\n\
  \    float cos = (float)Math.cos(rad);\n    float sin = (float)Math.sin(rad);\n\
  \    float x1 = -halfWidth * cos - (-halfHeight) * sin;\n    float y1 = -halfWidth\
  \ * sin + (-halfHeight) * cos;\n    float x2 = halfWidth * cos - (-halfHeight) *\
  \ sin;\n    float y2 = halfWidth * sin + (-halfHeight) * cos;\n    float x3 = halfWidth\
  \ * cos - halfHeight * sin;\n    float y3 = halfWidth * sin + halfHeight * cos;\n\
  \    float x4 = -halfWidth * cos - halfHeight * sin;\n    float y4 = -halfWidth\
  \ * sin + halfHeight * cos;\n    x1 += x;\n    y1 += y;\n    x2 += x;\n    y2 +=\
  \ y;\n    x3 += x;\n    y3 += y;\n    x4 += x;\n    y4 += y;\n    verticesBuffer[bufferIndex++]\
  \ = x1;\n    verticesBuffer[bufferIndex++] = y1;\n    verticesBuffer[bufferIndex++]\
  \ = region.u1;\n    verticesBuffer[bufferIndex++] = region.v2;\n    verticesBuffer[bufferIndex++]\
  \ = x2;\n    verticesBuffer[bufferIndex++] = y2;\n    verticesBuffer[bufferIndex++]\
  \ = region.u2;\n    verticesBuffer[bufferIndex++] = region.v2;\n    verticesBuffer[bufferIndex++]\
  \ = x3;\n    verticesBuffer[bufferIndex++] = y3;\n    verticesBuffer[bufferIndex++]\
  \ = region.u2;\n    verticesBuffer[bufferIndex++] = region.v1;\n    verticesBuffer[bufferIndex++]\
  \ = x4;\n    verticesBuffer[bufferIndex++] = y4;\n    verticesBuffer[bufferIndex++]\
  \ = region.u1;\n    verticesBuffer[bufferIndex++] = region.v1;\n    numSprites++;\n\
  }\n```\n\n**代码清单 8-18.** `SpriteBatcher.java` 的剩余部分：绘制旋转精灵的方法\n\n我们执行的操作与较简单的绘制方法相同，区别在于我们构建了所有四个角点，而不仅仅是两个对角。这是旋转所必需的。其余部分与之前相同。\n\
  \n缩放呢？我们不需要显式地编写另一个方法，因为缩放一个精灵只需要缩放其宽度和高度。我们可以在两个绘制方法之外完成这件事，因此无需再为缩放精灵绘制提供另一组方法。\n\
  \n这就是借助 OpenGL ES 实现闪电般快速精灵渲染的秘诀。\n\n#### 使用 `SpriteBatcher` 类\n\n现在我们可以将 `TextureRegion`\
  \ 和 `SpriteBatcher` 类整合到我们的火炮示例中。复制 `TextureAtlas` 示例并将其重命名为 `SpriteBatcherTest`。其中包含的类可以命名为\
  \ `SpriteBatcherTest` 和 `SpriteBatcherScreen`。\n\n我们移除 `Screen` 类中的 `Vertices` 成员。我们不再需要它们了，因为\
  \ `SpriteBatcher` 将为我们完成所有繁重的工作。取而代之，我们添加以下成员：\n\n```java\nTextureRegion cannonRegion;\n\
  TextureRegion ballRegion;\nTextureRegion bobRegion;\nSpriteBatcher batcher;\n```\n\
  \n现在，我们为图集中的三个对象各自设置了一个 `TextureRegion`，以及一个 `SpriteBatcher`。\n\n接下来，修改屏幕的构造函数。移除所有\
  \ `Vertices` 的实例化和初始化代码，并用一行代码替换：\n\n```java\nbatcher = new SpriteBatcher(glGraphics,\
  \ 100);\n```\n\n这将把我们的 `batcher` 成员设置为一个全新的 `SpriteBatcher` 实例，该实例可以在单次批量渲染中渲染 100\
  \ 个精灵。\n\n`TextureRegion` 在 `resume()` 方法中初始化，因为它们依赖于 `Texture`：\n\n```java\n@Override\n\
  public void resume() {\n    texture = new Texture(((GLGame)game), \"atlas.png\"\
  );\n    cannonRegion = new TextureRegion(texture, 0, 0, 64, 32);\n    ballRegion\
  \ = new TextureRegion(texture, 0, 32, 16, 16);\n    bobRegion = new TextureRegion(texture,\
  \ 32, 32, 32, 32);\n}\n```\n\n这里没什么意外。最后需要修改的是 `present()` 方法。你会惊讶于它现在看起来多么简洁。如下所示：\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    camera.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n    batcher.beginBatch(texture);\n    int\
  \ len = targets.size();\n    for(int i = 0; i < len; i++) {\n        GameObject\
  \ target = targets.get(i);\n        batcher.drawSprite(target.position.x, target.position.y,\
  \ 0.5f, 0.5f, bobRegion);\n    }\n    batcher.drawSprite(ball.position.x, ball.position.y,\
  \ 0.2f, 0.2f, ballRegion);\n    batcher.drawSprite(cannon.position.x, cannon.position.y,\
  \ 1, 0.5f, cannon.angle, cannonRegion);\n    batcher.endBatch();\n}\n```\n\n这简直太棒了。现在我们发出的唯一\
  \ OpenGL ES 调用包括清除屏幕、启用混合和纹理功能，以及设置混合函数。其余部分则完全是 `SpriteBatcher` 和 `Camera2D` 的功劳。由于我们所有的对象共享同一个纹理图集，因此我们可以在单次批量渲染中渲染它们。我们使用图集纹理调用\
  \ `batcher.beginBatch()`，使用简单的绘制方法渲染所有 Bob 目标，渲染球体（同样使用简单的绘制方法），最后使用能够旋转精灵的绘制方法渲染火炮。我们通过调用\
  \ `batcher.endBatch()` 来结束该方法，这会将精灵的几何图形实际传输到 GPU 并渲染所有内容。\n\n### 精灵动画\n\n如果你玩过任何\
  \ 2D 电子游戏，你会知道我们仍然缺少一个至关重要的组件：精灵动画。动画由关键帧组成，这些关键帧会产生运动的错觉。图 8-25 展示了由 Ari Feldmann（来自他免版税的\
  \ SpriteLib）制作的一个精美动画精灵。\n\n![A340874_3_En_8_Fig25_HTML.jpg](img/A340874_3_En_8_Fig25_HTML.jpg)\n\
  \n**图 8-25.** 一个行走的穴居人，由 Ari Feldmann 制作（原始图中无网格）\n\n这幅图像大小为 256×64 像素，每个关键帧为 64×64\
  \ 像素。要生成动画，我们只需使用第一个关键帧绘制一个精灵，持续一段时间（例如 0.25 秒），然后切换到下一个关键帧，依此类推。当到达最后一帧时，我们有几种选择：停留在最后一帧、从头开始循环（这称为循环动画），或者反向播放动画。\n\
  \n我们可以使用 `TextureRegion` 和 `SpriteBatcher` 类轻松实现这一点。通常，我们不仅只有单个动画（如图 8-25 所示），在同一图集中还会有更多动画。除了行走动画，我们还可以有跳跃动画、攻击动画等等。对于每个动画，我们需要知道帧持续时间，它告诉我们在切换到下一帧之前，动画的单个关键帧应保持使用多长时间。\n\
  \n### Animation 类\n\n让我们定义一个 `Animation` 类的要求，该类用于存储单个动画的数据，例如图 8-25 中的行走动画：\n\n\
  - 一个 `Animation` 包含多个 `TextureRegion`，这些 `TextureRegion` 存储了每个关键帧在纹理图集中的位置。`TextureRegion`\
  \ 的顺序与播放动画时使用的顺序相同。\n- `Animation` 还存储帧持续时间，在切换到下一帧之前，必须经过该持续时间。\n- `Animation`\
  \ 应提供一个方法，我们向该方法传递进入该 `Animation` 所代表状态（例如，向左行走）的时间，该方法将返回相应的 `TextureRegion`。该方法应考虑当动画结束时，我们是希望它循环播放，还是停留在最后一帧。\n\
  \n\n\n---\n\n最后一个要点至关重要，因为它允许我们存储一个单一的 `Animation` 实例，供世界中的多个对象使用。每个对象只需跟踪其当前状态，即它是在行走、射击还是跳跃，以及在该状态下已持续的时间。当渲染该对象时，我们使用状态来选择要播放的动画，再根据状态时间从\
  \ `Animation` 中获取正确的 `TextureRegion`。清单 8-19 展示了我们新的 `Animation` 类的代码。\n\n```\n\
  package com.badlogic.androidgames.framework.gl;\npublic class Animation {\npublic\
  \ static final int ANIMATION_LOOPING = 0;\npublic static final int ANIMATION_NONLOOPING\
  \ = 1;\nfinal TextureRegion[] keyFrames;\nfinal float frameDuration;\npublic Animation(float\
  \ frameDuration, TextureRegion ... keyFrames) {\nthis.frameDuration = frameDuration;\n\
  this.keyFrames = keyFrames;\n}\npublic TextureRegion getKeyFrame(float stateTime,\
  \ int mode) {\nint frameNumber = (int)(stateTime / frameDuration);\nif(mode == ANIMATION_NONLOOPING)\
  \ {\nframeNumber = Math.min(keyFrames.length-1, frameNumber);\n} else {\nframeNumber\
  \ = frameNumber % keyFrames.length;\n}\nreturn keyFrames[frameNumber];\n}\n}\n清单\
  \ 8-19.\nAnimation.java：一个简单的动画类\n```\n\n首先，我们定义了两个常量，用于 `getKeyFrame()` 方法。第一个常量表示动画应循环播放，第二个表示动画应在最后一帧停止。\n\
  \n接下来，我们定义了两个成员：一个存储 `TextureRegion` 的数组，以及一个存储帧持续时间的浮点数。\n\n我们将帧持续时间和包含关键帧的 `TextureRegion`\
  \ 数组传递给构造函数，构造函数直接存储它们。我们可以对 `keyFrames` 数组进行防御性复制，但这会分配新对象，可能会让垃圾回收器有些忙碌。\n\n关键部分是\
  \ `getKeyFrame()` 方法。我们传入对象处于该动画所代表状态的时间以及模式（`Animation.ANIMATION_LOOPING` 或 `ANIMATION_NONLOOPING`）。我们根据\
  \ `stateTime` 计算给定状态下已经播放的帧数。如果动画不应循环，我们直接将 `frameNumber` 钳制到 `TextureRegion` 数组的最后一个元素。否则，我们取模运算，这样会自动产生我们期望的循环效果（例如，`4\
  \ % 3 = 1`）。剩下的就是返回正确的 `TextureRegion`。\n\n## 示例\n\n本节将展示如何创建一个名为 `AnimationTest`\
  \ 的示例，并附带一个名为 `AnimationScreen` 的屏幕。一如既往，只讨论屏幕本身。\n\n我们想要渲染一群向左行走的原始人。我们的世界将与我们视锥体的大小相同，即\
  \ 4.8×3.2 米（这是任意设定的；我们可以使用任何尺寸）。一个原始人是一个大小为 1×1 米的 `DynamicGameObject`。我们将继承 `DynamicGameObject`\
  \ 并创建一个名为 `Caveman` 的新类，它将额外存储一个成员来跟踪原始人已行走的时间。每个原始人将以 0.5 米/秒的速度向左或向右移动。为 `Caveman`\
  \ 类添加一个 `update()` 方法，根据时间增量和速度更新原始人的位置。如果一个原始人到达世界的左边缘或右边缘，我们将他传送到世界的另一边。我们使用图\
  \ 8-25 中的图像，并相应地创建 `TextureRegion` 实例和一个 `Animation` 实例。为了渲染，我们使用 `Camera2D` 实例和\
  \ `SpriteBatcher`，因为更炫酷。清单 8-20 展示了 `Caveman` 类的代码。\n\n```\nstatic final float WORLD_WIDTH\
  \ = 4.8f;\nstatic final float WORLD_HEIGHT = 3.2f;\nstatic class Caveman extends\
  \ DynamicGameObject {\npublic float walkingTime = 0;\npublic Caveman(float x, float\
  \ y, float width, float height) {\nsuper(x, y, width, height);\nthis.position.set((float)Math.random()\
  \ * WORLD_WIDTH,\n(float)Math.random() * WORLD_HEIGHT);\nthis.velocity.set(Math.random()\
  \ > 0.5f?-0.5f:0.5f, 0);\nthis.walkingTime = (float)Math.random() * 10;\n}\npublic\
  \ void update(float deltaTime) {\nposition.add(velocity.x * deltaTime, velocity.y\
  \ * deltaTime);\nif(position.x  WORLD_WIDTH) position.x = 0;\nwalkingTime += deltaTime;\n\
  }\n}\n清单 8-20.\n摘自 AnimationTest.java：展示内部类 Caveman\n```\n\n两个常量 `WORLD_WIDTH` 和\
  \ `WORLD_HEIGHT` 是外部 `AnimationTest` 类的一部分，供内部类使用。我们的世界大小为 4.8×3.2 米。\n\n接下来是内部类\
  \ `Caveman`，它继承了 `DynamicGameObject`，因为我们将根据速度移动原始人。我们定义了一个额外的成员来跟踪原始人已行走的时间。在构造函数中，我们将原始人放置在一个随机位置，并让他向左或向右行走。我们将\
  \ `walkingTime` 成员初始化为 0 到 10 之间的随机数；这样我们的原始人就不会同步行走。\n\n`update()` 方法根据原始人的速度和时间增量来移动他。如果原始人离开世界，我们将他重置到左边缘或右边缘。我们将时间增量加到\
  \ `walkingTime` 上，以跟踪他行走的时间。\n\n清单 8-21 展示了 `AnimationScreen` 类。\n\n```\nclass AnimationScreen\
  \ extends Screen {\nstatic final int NUM_CAVEMEN = 10;\nGLGraphics glGraphics;\n\
  Caveman[] cavemen;\nSpriteBatcher batcher;\nCamera2D camera;\nTexture texture;\n\
  Animation walkAnim;\n清单 8-21.\n摘自 AnimationTest.java：AnimationScreen 类\n```\n\n\
  我们的屏幕类包含了通常的成员变量。我们有一个 `GLGraphics` 实例、一个 `Caveman` 数组、一个 `SpriteBatcher`、一个 `Camera2D`、包含行走关键帧的\
  \ `Texture` 纹理，以及一个 `Animation` 实例。\n\n```\npublic AnimationScreen(Game game) {\n\
  super(game);\nglGraphics = ((GLGame)game).getGLGraphics();\ncavemen = new Caveman[NUM_CAVEMEN];\n\
  for(int i = 0; i < NUM_CAVEMEN; i++) {\ncavemen[i] = new Caveman((float)Math.random(),\
  \ (float)Math.random(), 1, 1);\n}\nbatcher = new SpriteBatcher(glGraphics, NUM_CAVEMEN);\n\
  camera = new Camera2D(glGraphics, WORLD_WIDTH, WORLD_HEIGHT);\n}\n```\n\n在构造函数中，你创建了\
  \ `Caveman` 实例，以及 `SpriteBatcher` 和 `Camera2D`。\n\n```\n@Override\npublic void resume()\
  \ {\ntexture = new Texture(((GLGame)game), \"walkanim.png\");\nwalkAnim = new Animation(\
  \ 0.2f,\nnew TextureRegion(texture, 0, 0, 64, 64),\nnew TextureRegion(texture, 64,\
  \ 0, 64, 64),\nnew TextureRegion(texture, 128, 0, 64, 64),\nnew TextureRegion(texture,\
  \ 192, 0, 64, 64));\n}\n```\n\n在 `resume()` 方法中，我们从资产文件 `walkanim.png` 加载包含动画关键帧的纹理图集，该文件与图\
  \ 8-25 中显示的相同。之后，我们创建 `Animation` 实例，将帧持续时间设置为 0.2 秒，并为纹理图集中的每个关键帧传入一个 `TextureRegion`。\n\
  \n```\n@Override\npublic void update(float deltaTime) {\nint len = cavemen.length;\n\
  for(int i = 0; i < len; i++) {\ncavemen[i].update(deltaTime);\n}\n}\n```\n\n`update()`\
  \ 方法仅遍历所有 `Caveman` 实例，并使用当前时间增量调用它们的 `Caveman.update()` 方法。这将使原始人移动，并更新他们的行走时间。\n\
  \n\n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    camera.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n    batcher.beginBatch(texture);\n    int\
  \ len = cavemen.length;\n    for(int i = 0; i < len; i++) {\n        Caveman caveman\
  \ = cavemen[i];\n        TextureRegion keyFrame = walkAnim.getKeyFrame(caveman.walkingTime,\
  \ Animation.ANIMATION_LOOPING);\n        batcher.drawSprite(caveman.position.x,\
  \ caveman.position.y, caveman.velocity.x < 0?1:-1, 1, keyFrame);\n    }\n    batcher.endBatch();\n\
  }\n\n@Override\npublic void pause() {\n}\n\n@Override\npublic void dispose() {\n\
  }\n```\n\n最后，我们来看 `present()` 方法。对于每个穴居人，我们首先根据其行走时间从 `Animation` 实例中获取正确的关键帧，并将动画设置为循环播放。然后，使用正确的纹理区域在其位置绘制该穴居人。\n\
  \n但这里的 `width` 参数有何作用？请记住，我们的动画纹理仅包含“向左走”动画的关键帧。如果穴居人向右走，我们需要水平翻转纹理——只需指定一个负的宽度值即可实现。如果你对此存疑，可以回头查看\
  \ `SpriteBatcher` 的代码来验证。本质上，我们通过指定一个负的宽度值来翻转精灵的矩形范围。同理，指定一个负的高度值也可以垂直翻转。\n\n图 8-26\
  \ 展示了正在行走的穴居人效果。\n\n![A340874_3_En_8_Fig26_HTML.jpg](img/A340874_3_En_8_Fig26_HTML.jpg)\n\
  \n**图 8-26.** 穴居人行走效果\n\n以上就是使用 OpenGL ES 创建出色 2D 游戏所需的全部知识。请注意，我们依然将游戏逻辑与渲染表现分离。穴居人无需知晓自己被渲染的事实，因此它不持有任何与渲染相关的成员，例如\
  \ `Animation` 实例或 `Texture`。我们只需跟踪穴居人的状态及其持续时间，结合其位置和大小，便可通过我们的小型辅助类轻松渲染它。\n\n##\
  \ 本章小结\n\n现在，你应该具备创建几乎任何 2D 游戏的能力。我们已经学习了向量及其使用方法，并由此得到了一个可复用的 `Vector2` 类。我们还研究了基础物理知识，用于实现弹道炮弹等效果。碰撞检测同样是大多数游戏的核心部分，你现在应该知道如何通过\
  \ `SpatialHashGrid` 正确且高效地实现它。我们探索了一种通过创建 `GameObject` 和 `DynamicGameObject` 类来分离游戏逻辑与渲染的方法，这些类负责跟踪对象的状态和形状。我们介绍了通过\
  \ OpenGL ES 实现 2D 相机概念的简便性，这一切都基于一个名为 `glOrthof()` 的方法。我们学习了纹理图集的概念、使用原因及其用法，并进一步介绍了纹理区域、精灵以及如何通过\
  \ `SpriteBatcher` 高效渲染它们。最后，我们探讨了精灵动画的实现，事实证明这极其简单。\n\n值得注意的是，本章涵盖的所有主题（包括粗检测和精检测的碰撞检测、物理模拟、运动积分以及不同形状的边界）都在许多开源库（如\
  \ Box2D、Chipmunk Physics、Bullet Physics 等）中得到了稳健实现。这些库最初均使用 C 或 C++ 开发，但其中有若干库提供了\
  \ Android 封装或 Java 实现，值得你在规划游戏时参考使用。\n\n在下一章中，我们将使用新工具创建一款新游戏。届时你会惊讶地发现，这一切竟是如此简单。\n\
  \n## 9. 超级跳跃者：一款 2D OpenGL ES 游戏\n\n现在，是时候将你学到的所有 OpenGL ES 知识整合起来，创建一款游戏了。正如第 3\
  \ 章所述，在移动端开发游戏时，有几种非常流行的类型可供选择。对于我们的下一款游戏，我们决定采用休闲类型。我们将实现一款类似于《绑架》（Abduction）或《\
  \ doodle jump》的跳跃式游戏。与《诺姆先生》一样，我们将从定义游戏机制开始。\n\n### 核心游戏机制\n\n如果你不熟悉《绑架》，我们建议你在\
  \ Android 设备上安装并尝试一下（可在 Google Play 免费下载），或者至少在网络上观看该游戏的视频。以《绑架》为例，我们可以将游戏（名为《超级跳跃者》）的核心机制浓缩如下：\n\
  \n-   主角持续向上跳跃，在平台间移动。游戏世界垂直跨越多个屏幕。\n-   可以通过向左或向右倾斜手机来控制水平移动。\n-   当主角离开水平屏幕边界时，他会从屏幕对侧重新进入。\n\
  -   平台可以是静止的，也可以水平移动。\n-   部分平台会在主角碰撞时随机碎裂。\n-   在向上行进的过程中，主角可以收集物品来获得分数。\n-   除了金币，某些平台上还有弹簧，能让主角跳得更高。\n\
  -   邪恶势力在游戏世界中水平移动。当主角碰到它们时，角色死亡，游戏结束。\n-   当主角掉落到屏幕底部边缘以下时，游戏结束。\n-   关卡顶部设有某种目标。当主角碰到该目标时，新关卡开始。\n\
  \n虽然这份清单比我们为《诺姆先生》创建的更长，但似乎并未复杂太多。图 9-1 展示了核心原理的初始模型。这次我们直接使用 `Paint.NET` 创建了模型。接下来，让我们构思一个背景故事。\n\
  \n![A340874_3_En_9_Fig1_HTML.jpg](img/A340874_3_En_9_Fig1_HTML.jpg)\n\n**图 9-1.**\
  \ 初始游戏机制模型，展示了主角、平台、弹簧、金币、邪恶势力以及关卡顶部的目标\n\n## 构思背景故事与选择美术风格\n\n我们将在这里充分发挥创意，为游戏构思以下独特剧情。\n\
  \n我们的主角鲍勃患有慢性跳跃症。他每次触地都注定要跳起来。更糟糕的是，他心爱的公主（姓名暂且保密）被一支邪恶的飞行杀手松鼠军团绑架，并被囚禁在天空中的城堡里。鲍勃的病情最终证明是有益的，他开始了寻找爱人的征程，与邪恶的松鼠势力作战。\n\
  \n这个经典的游戏故事非常适合 8 位像素美术风格，这种风格在 NES 上的原版《超级马里奥兄弟》等游戏中可见一斑。图 9-1 中的模型展示了游戏中所有元素的最终美术效果。鲍勃、金币、飞行松鼠和碎裂平台当然都是动画化的。我们还会使用与视觉风格相符的音乐和音效。\n\
  \n### 定义屏幕与过渡\n\n现在，我们可以定义游戏中的屏幕与过渡。沿用我们在《诺姆先生》中使用过的相同模式，我们将包含以下元素：\n\n-   一个带有\
  \ Logo 的主屏幕，包含“开始游戏”、“最高分”和“帮助”菜单项，以及一个用于开启/关闭音效的按钮。\n-   一个游戏屏幕，要求玩家做好准备，并能优雅地处理运行、暂停、游戏结束和下一关卡等状态。与《诺姆先生》相比，唯一新增的是屏幕的“下一关卡”状态，该状态将在鲍勃碰到城堡时触发。在这种情况下，将生成新关卡，鲍勃将再次从世界底部开始，并保留他的分数。\n\
  ```\n\n\n### 游戏设计概述\n\n*   一个高分屏幕，显示玩家迄今取得的前五名成绩。\n*   帮助屏幕，向玩家介绍游戏机制和目标。我们会狡猾地省略如何控制玩家的描述。如今的孩子应该能够处理我们在\
  \ 80 年代和 90 年代初期面临的复杂性，当时游戏没有任何说明。\n\n这与`Mr. Nom`的设置大致相同。图 9-2 展示了所有屏幕和转换。请注意，除了暂停按钮外，我们在游戏屏幕或其子屏幕上没有任何按钮。当询问用户是否准备好时，他们会直观地触摸屏幕。\n\
  \n![A340874_3_En_9_Fig2_HTML.jpg](img/A340874_3_En_9_Fig2_HTML.jpg)\n\n**图 9-2.**\
  \ `Super Jumper`的所有屏幕和转换\n\n定义了屏幕和转换后，我们现在可以考虑游戏世界的大小和单位，以及这些大小和单位如何与图形资源相关联。\n\n\
  ### 定义游戏世界\n\n经典的“先有鸡还是先有蛋”问题再次困扰着我们。正如你在第 8 章学到的，我们在世界单位（例如，米）和像素之间存在对应关系。我们的对象是在世界空间中物理定义的。边界形状和位置以米为单位；速度以米/秒为单位。然而，对象的图形表示是以像素定义的，所以我们必须有某种映射。我们通过首先为图形资源定义目标分辨率来克服这个问题。与`Mr.\
  \ Nom`一样，我们将使用`320×480`像素的目标分辨率（宽高比为 1.5）。我们使用这个目标，因为它是最低的实用分辨率；如果你专门针对平板电脑，你可能想要使用诸如`800×1280`的分辨率，或者介于两者之间的分辨率，例如`480×800`（典型的\
  \ Android 手机）。无论你的目标分辨率如何，原理保持不变。\n\n接下来我们要做的是在我们的世界中建立像素和米之间的对应关系。图 9-1 中的模型给了我们一个概念，即不同对象使用了多少屏幕空间，以及它们相对于彼此的尺寸比例。我们建议为\
  \ 2D 游戏选择`32`像素对应`1`米的映射。那么，让我们将`320×380`像素大小的模型覆盖在一个网格上，其中每个单元格是`32×32`像素。在我们的世界空间中，这将映射到`1×1`米的单元格。图\
  \ 9-3 展示了我们的模型和网格。\n\n![A340874_3_En_9_Fig3_HTML.jpg](img/A340874_3_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3.** 覆盖有网格的模型。每个单元格是`32×32`像素，对应于游戏世界中`1×1`米的区域。\n\n我们在图 9-3 中稍微作弊了。我们以这样的方式排列图形，使它们与网格单元格完美对齐。在真实的游戏中，我们会将对象放置在非整数位置。\n\
  \n那么，我们从图 9-3 中能得到什么呢？首先，我们可以直接估算出世界中每个对象以米为单位的宽度和高度。以下是我们将用于对象边界矩形的值：\n\n*   `Bob`是`0.8×0.8`米；他没有完全占据一个完整的单元格。\n\
  *   一个平台是`2×0.5`米，水平占据两个单元格，垂直占据半个单元格。\n*   一个硬币是`0.8×0.5`米。它几乎垂直占据一个单元格，水平占据大约半个单元格。\n\
  *   一个弹簧是`0.5×0.5`米，在每个方向上占据半个单元格。弹簧实际上比其宽度要高一点。我们使其边界形状为正方形，以便碰撞测试更宽容一些。\n*   一只松鼠是`1×0.8`米。\n\
  *   一个城堡是`1.8×1.8`米。\n\n有了这些尺寸，我们也就有了用于碰撞检测的对象边界矩形的大小。如果它们在游戏过程中显得太大或太小，我们可以根据这些值进行调整。\n\
  \n从图 9-3 中我们还可以推导出视图截锥体的大小。它将显示我们世界的`10×15`米。\n\n唯一剩下要定义的是游戏中的速度和加速度。这些高度依赖于我们希望游戏给人的感觉。通常，你需要通过一些实验才能使这些值恰到好处。以下是经过几次调整迭代后我们得出的结果：\n\
  \n*   重力加速度向量是`(0,–13) m/s²`，略高于我们在地球上的值以及在第 8 章炮弹示例中使用的值。\n*   `Bob`的初始跳跃速度向量是`(0,11)\
  \ m/s`。注意，跳跃速度只影响`y`轴上的运动。水平运动将由当前的加速度计读数定义。\n*   当`Bob`碰到弹簧时，他的跳跃速度向量将是正常跳跃速度的`1.5`倍。即等效于`(0,16.5)\
  \ m/s`。同样，这个值纯粹来自实验。\n*   `Bob`的水平移动速度是`20 m/s`。请注意，这是一个无方向的速度，而不是向量。我们稍后将解释它是如何与加速度计协同工作的。\n\
  *   松鼠会不断地从左到右再返回巡逻。它们的恒定移动速度为`3 m/s`。表示为向量，如果松鼠向左移动，则是`(–3,0) m/s`；如果向右移动，则是`(3,0)\
  \ m/s`。\n\n那么，`Bob`的水平移动是如何工作的呢？我们之前定义的运动速度实际上是`Bob`的最大水平速度。根据玩家倾斜手机的程度，`Bob`的水平移动速度将在`0`（无倾斜）和`20\
  \ m/s`（完全向一侧倾斜）之间。\n\n我们将使用加速度计`x`轴的值，因为我们的游戏将以竖屏模式运行。当手机未倾斜时，该轴将报告加速度为`0 m/s²`。当完全向左倾斜使手机处于横屏方向时，该轴将报告加速度约为`–10\
  \ m/s²`。当完全向右倾斜时，该轴将报告加速度约为`10 m/s²`。我们需要做的就是通过除以最大绝对值（`10`）来归一化加速度计读数，然后将其乘以`Bob`的最大水平速度。因此，当手机完全向一侧倾斜时，`Bob`将以`20\
  \ m/s`的速度向左或向右移动；如果倾斜度较小，则移动速度较慢。当手机完全倾斜时，`Bob`可以每秒在屏幕上移动两次。\n\n我们将根据当前加速度计在`x`轴上的值，每帧更新此水平移动速度，并将其与`Bob`的垂直速度相结合，垂直速度是根据重力加速度和他的当前垂直速度推导出来的，正如我们在第\
  \ 8 章示例中对炮弹所做的那样。\n\n世界的一个基本方面是我们看到的部分。由于当`Bob`从屏幕底部边缘离开时会死亡，因此我们的摄像机也在游戏机制中扮演了角色。虽然我们将使用摄像机进行渲染并在`Bob`跳跃时向上移动它，但我们不会在世界模拟类中使用它。相反，我们记录`Bob`迄今为止的最高`y`坐标。如果他低于该值减去视图截锥体高度的一半，我们就知道他已离开屏幕。因此，我们在模型（我们的世界模拟类）和视图之间并没有完全清晰的分离，因为我们需要知道视图截锥体的高度来确定`Bob`是否死亡。我们可以接受这一点。\n\
  \n让我们来看看我们需要的资源。\n\n### 创建资源\n\n我们的新游戏有两种图形资源：UI 元素和实际的游戏元素（即世界元素）。让我们从 UI 元素开始。\n\
  \n##### UI 元素\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的指示，对给定的英文文本进行翻译。\n\n****\n\n首先要注意的是，用户界面（UI）元素（如按钮、徽标等）并不依赖于我们的像素到世界单位的映射。和`Mr.\
  \ Nom`一样，我们将其设计为适配目标分辨率，在示例中即`320×480`像素。查看图 9-2，我们可以确定我们拥有哪些 UI 元素。\n\n我们创建的第一个\
  \ UI 元素是不同屏幕所需的按钮。图 9-4 展示了游戏中的所有按钮。\n\n![A340874_3_En_9_Fig4_HTML.jpg](img/A340874_3_En_9_Fig4_HTML.jpg)\n\
  \n*图 9-4. 各种按钮，每个大小为`64×64`像素*\n\n我们倾向于在单元格大小为`32×32`或`64×64`像素的网格中创建所有图形资源。图 9-4\
  \ 中的按钮排列在一个网格中，每个单元格为`64×64`像素。顶行的按钮用于主菜单屏幕，指示声音是否已启用。左下角的箭头用于在多个屏幕中导航到下一个屏幕。右下角的按钮在游戏运行时出现，允许用户暂停游戏。\n\
  \n你可能想知道为什么没有指向右的箭头。请记住，在第 8 章中，通过我们巧妙的精灵批处理器，我们可以通过指定负的宽度和/或高度值来轻松翻转绘制的对象。我们将使用这个技巧来处理一些图形资源，以节省内存。\n\
  \n接下来是主菜单屏幕所需的元素：徽标、菜单项和背景图像。图 9-5 展示了所有这些元素。\n\n![A340874_3_En_9_Fig5_HTML.jpg](img/A340874_3_En_9_Fig5_HTML.jpg)\n\
  \n*图 9-5. 背景图像、主菜单项和徽标*\n\n背景图像不仅用于主菜单屏幕，也用于所有屏幕。它与目标分辨率大小相同，为`320×480`像素。主菜单项占据`300×110`像素。主菜单使用了黑色背景，因为白色背景上显示白色效果不好。在实际图像中，主菜单的背景当然是由透明像素组成的。徽标为`274×142`像素，角落有一些透明像素。\n\
  \n接下来是帮助屏幕图像。我们选择了一种懒人做法，没有将每个屏幕用多个元素组合，而是将它们全部制作为全屏图像，大小为`320×480`像素。这会在不显著增加程序大小的情况下，稍微降低绘制代码的复杂性。你可以在图\
  \ 9-2 中看到所有的帮助屏幕。我们唯一会与这些图像组合的元素就是箭头按钮。\n\n对于高分屏幕，我们将复用主菜单图像中标有“HIGHSCORES”的部分。实际分数将使用一种特殊的技术进行渲染，我们将在本章后面讨论。该屏幕的其余部分同样由背景图像和一个按钮组成。\n\
  \n游戏屏幕有一些更多的文本 UI 元素，即“READY?”标签、暂停状态的菜单项（“RESUME”和“QUIT”），以及“GAME OVER”标签。图 9-6\
  \ 展示了它们的全貌。\n\n![A340874_3_En_9_Fig6_HTML.jpg](img/A340874_3_En_9_Fig6_HTML.jpg)\n\
  \n*图 9-6. “READY?”、“RESUME”、“QUIT”和“GAME OVER”标签*\n\n## 使用位图字体处理文本\n\n那么，我们如何在游戏屏幕上渲染其他文本元素呢？我们使用与`Mr.\
  \ Nom`中渲染分数相同的技术。现在我们不仅有数字，还有字符。我们使用一个图像图集，其中每个子图像代表一个字符（例如，`0`或`a`）。这个图像图集被称为**位图字体**。图\
  \ 9-7 展示了我们将要使用的位图字体。\n\n![A340874_3_En_9_Fig7_HTML.jpg](img/A340874_3_En_9_Fig7_HTML.jpg)\n\
  \n*图 9-7. 一个位图字体*\n\n图 9-7 中的黑色背景和网格当然不是实际图像的一部分。使用位图字体是一种非常古老的技术，用于在游戏屏幕上渲染文本。位图字体通常包含一系列\
  \ ASCII 字符的图像。这种字符图像被称为**字形 (glyph)**。ASCII 是 Unicode 的前身之一。ASCII 字符集包含 128 个字符，如图\
  \ 9-8 所示。\n\n![A340874_3_En_9_Fig8_HTML.jpg](img/A340874_3_En_9_Fig8_HTML.jpg)\n\
  \n*图 9-8. ASCII 字符及其十进制、十六进制和八进制值*\n\n在这 128 个字符中，有 95 个是可打印字符（字符 32 到 126）。我们的位图字体只包含这些可打印字符。位图字体的第一行包含字符\
  \ 32 到 47，下一行包含字符 48 到 63，以此类推。ASCII 仅在您想要存储和显示使用标准拉丁字母的文本时有用。还有一种扩展的 ASCII 格式，使用值\
  \ 128 到 255 来编码西方语言的其他常见字符，例如`ö`和`é`。更具表现力的字符集（例如，用于中文或阿拉伯语）通过 Unicode 表示，并且无法通过\
  \ ASCII 进行编码。对于我们的游戏，标准的 ASCII 字符集就足够了。\n\n那么，我们如何使用位图字体渲染文本呢？事实证明这非常容易。首先，我们创建\
  \ 96 个纹理区域，每个区域映射到位图字体中的一个字形。我们可以将这些纹理区域存储在一个数组中，如下所示：\n\n```\nTextureRegion[] glyphs\
  \ = new TextureRegion[96];\n```\n\nJava 字符串使用 16 位 Unicode 进行编码。幸运的是，我们位图字体中的 ASCII\
  \ 字符在 ASCII 和 Unicode 中具有相同的值。要获取 Java 字符串中某个字符的区域，我们只需这样做：\n\n```\nint index =\
  \ string.charAt(i) – 32;\n```\n\n这为我们提供了一个直接索引到纹理区域数组的方式。我们只需从字符串中的当前字符中减去空格字符（`32`）的值。如果索引小于\
  \ 0 或大于 95，则说明我们遇到了一个不在位图字体中的 Unicode 字符。通常，我们会忽略这样的字符。\n\n要在一行中渲染多个字符，我们需要知道字符之间应该有多少空间。图\
  \ 9-7 中的位图字体是一种固定宽度的字体，意味着每个字形具有相同的宽度。我们的位图字体字形每个大小为`16×20`像素。当我们在字符串中从一个字符移动到下一个字符时，我们只需增加\
  \ 20 像素。我们将绘制位置从一个字符移动到另一个字符的像素数称为**前进量 (advance)**。对于我们的位图字体，它是固定的；然而，通常它取决于我们绘制的是哪个字符。一种更复杂的前进量计算方法会同时考虑当前要绘制的字符和下一个字符。如果你想在网络上查询，这种技术被称为**字距调整\
  \ (kerning)**。我们只使用固定宽度的位图字体，因为这会让我们的生活轻松很多。\n\n那么，我们是如何生成那个 ASCII 位图字体的？我们使用了网络上众多用于生成位图字体的工具之一。我们使用的工具叫做**Codehead\
  \ 的位图字体生成器 (CBFG)**，可在[`www.codehead.co.uk/cbfg/`](http://www.codehead.co.uk/cbfg/)免费获取。你可以选择硬盘上的一个字体文件，指定字体的高度，然后生成器将为其生成一个包含\
  \ ASCII 字符集的图像。该工具有许多选项，超出了我们这里的讨论范围。我们建议你下载`CBFG`并尝试一下。\n\n我们将使用这种技术绘制游戏中所有剩余的字符串。稍后，你将看到位图字体类的具体实现。现在，让我们回到创建资源的工作中。\n\
  \n\n\n\n#### 使用位图字体\n\n有了位图字体，我们就拥有了所有图形界面元素的资源。我们将通过精灵批处理程序来渲染它们，并使用一个相机来设置视锥体，使其直接对应到目标分辨率。这样一来，我们就可以用像素坐标来指定所有坐标。\n\
  \n##### 游戏元素\n\n实际游戏对象依赖于我们之前讨论过的像素与世界单位的映射关系。为了尽可能简化游戏元素的创建，我们采用了一个小技巧：在绘制每个图形时，都以一个\
  \ 32×32 像素的网格为单元。所有对象都居中放置在一个或多个这样的网格单元中，这样就能轻松对应它们在游戏世界中的物理尺寸。我们先从鲍勃开始，如图 9-9 所示。\n\
  \n![A340874_3_En_9_Fig9_HTML.jpg](img/A340874_3_En_9_Fig9_HTML.jpg)\n\n图 9-9. 鲍勃和他的五个动画帧\n\
  \n图 9-9 显示了跳跃时的两帧、下落时的两帧以及死亡时的一帧。每张图像尺寸为 160×32 像素，每个动画帧尺寸为 32×32 像素。背景像素是透明的。\n\
  \n鲍勃可以处于三种状态之一：跳跃、下落或死亡。我们为每种状态都准备了动画帧。诚然，两个跳跃帧和两个下落帧之间的区别很小——只是他的额发在摆动。我们将为鲍勃的三种动画分别创建一个`Animation`实例，并根据他的当前状态使用它们进行渲染。我们也没有为鲍勃朝左移动准备重复的帧。就像箭头按钮（如前图\
  \ 9-4 所示）那样，我们只需在调用 `SpriteBatcher.drawSprite()` 时指定一个负宽度，即可水平翻转鲍勃的图像。\n\n图 9-10\
  \ 描绘了邪恶飞鼠。我们再次使用了两个动画帧，这样飞鼠看起来就像在拍打它邪恶的翅膀。\n\n![A340874_3_En_9_Fig10_HTML.jpg](img/A340874_3_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 一只邪恶飞鼠及其两个动画帧\n\n图 9-10 中的图像尺寸为 64×32 像素，每个帧尺寸为 32×32 像素。\n\n图 9-11 所示的金币动画比较特殊。我们的关键帧序列不会是\
  \ 1、2、3、1，而是 1、2、3、2、1。否则，金币会从第 3 帧的收缩状态直接跳到第 1 帧的完全展开状态。通过复用第 2 帧，我们可以节省一点空间。\n\
  \n![A340874_3_En_9_Fig11_HTML.jpg](img/A340874_3_En_9_Fig11_HTML.jpg)\n\n图 9-11.\
  \ 金币及其动画帧\n\n图 9-11 中的图像尺寸为 96×32 像素，每个帧尺寸为 32×32 像素。\n\n关于图 9-12 中的弹簧图像，无需多言。弹簧就静静地待在图像中央。图像尺寸为\
  \ 32×32 像素。\n\n![A340874_3_En_9_Fig12_HTML.jpg](img/A340874_3_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 弹簧\n\n图 9-13 中的城堡也没有动画。它比其他对象大（64×64 像素）。\n\n![A340874_3_En_9_Fig13_HTML.jpg](img/A340874_3_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13. 城堡\n\n图 9-14 中的平台（64x64 像素）有四个动画帧。根据我们的游戏机制，某些平台在鲍勃撞击时会碎裂。在这种情况下，我们会完整播放一次该平台的动画。对于静态平台，我们只使用第一帧。\n\
  \n![A340874_3_En_9_Fig14_HTML.jpg](img/A340874_3_En_9_Fig14_HTML.jpg)\n\n图 9-14.\
  \ 平台及其动画帧\n\n## 纹理图集来救场\n\n既然我们已经确定了游戏中的所有图形资源，接下来需要讨论它们的纹理。我们之前已经讨论过，纹理的宽度和高度必须是\
  \ 2 的幂。我们的背景图像和所有帮助屏幕的尺寸为 320×480 像素。我们会将它们存放在 512×512 像素的图像中，以便作为纹理加载。这样就已经有了六张纹理。\n\
  \n我们是否也要为所有其他图像创建单独的纹理？不。我们创建一个单一的纹理图集。事实证明，所有其他元素都能完美地放入一个 512×512 像素的图集中，我们可以将其作为单一纹理加载——这会让\
  \ GPU 非常开心，因为除了背景和帮助屏幕图像外，我们只需为所有游戏元素绑定一个纹理。图 9-15 展示了这个图集。\n\n![A340874_3_En_9_Fig15_HTML.jpg](img/A340874_3_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15. 强大的纹理图集\n\n图 9-15 中的图像尺寸为 512×512 像素。网格和红色轮廓线并非图像的一部分，背景像素是透明的。UI 标签和位图字体的黑色背景像素也是如此。网格单元大小为\
  \ 32×32 像素。使用这样的纹理图集的酷炫之处在于，如果你想支持更高分辨率的屏幕，除了调整纹理图集的大小外，无需更改任何内容。你可以将其放大到 1024×1024\
  \ 像素，并使用更高保真度的图形，即使你的目标分辨率是 320×480，OpenGL ES 也能提供更佳的图形效果，而无需改动游戏！\n\n我们将图集中的所有图像放置在坐标为\
  \ 32 的倍数的角点上。这使得创建纹理区域变得更加容易。\n\n##### 音乐与音效\n\n我们还需要音效和音乐。由于我们的游戏是 8 位复古风格，因此使用合成器生成的芯片音乐、音效和音乐是非常合适的。最著名的芯片音乐是由任天堂的\
  \ NES、SNES 和 Game Boy 生成的。对于音效，我们使用了一个名为 as3sfxr 的工具（Tom Vian 制作的 sfxr 的 Flash 版本，sfxr\
  \ 由 Tomas Pettersson 创建）。该工具可以在 [`www.superflashbros.net/as3sfxr`](http://www.superflashbros.net/as3sfxr)\
  \ 找到。图 9-16 显示了它的用户界面。\n\n![A340874_3_En_9_Fig16_HTML.jpg](img/A340874_3_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16. as3sfxr，sfxr 的 Flash 移植版\n\n我们为跳跃、撞击弹簧、撞击金币和撞击松鼠创建了音效。我们还为点击 UI 元素创建了一个音效。我们所做的只是在\
  \ as3sfxr 中猛按左侧每个类别的按钮，直到找到合适的音效。\n\n游戏的音乐通常稍微难找一些。网上有一些网站提供适合《超级跳跃者》这类游戏的 8 位芯片音乐。我们将使用一首名为“New\
  \ Song”的歌曲，由 Geir Tjelta 创作。这首歌可以在 Free Music Archive（[`www.freemusicarchive.org`](http://www.freemusicarchive.org)）上找到。它遵循\
  \ [知识共享署名-非商业性使用-相同方式共享 3.0 美国许可协议](http://creativecommons.org/licenses/by-nc-nd/3.0/)（[`https://creativecommons.org/licenses/by-nc-sa/3.0/us/`](https://creativecommons.org/licenses/by-nc-sa/3.0/us/)）进行许可。这意味着我们可以在非商业项目中使用它，例如我们的开源游戏《超级跳跃者》，前提是注明\
  \ Geir 的署名并且不修改原作品。当你在网络上搜索用于游戏的音乐时，务必确保遵守许可协议。人们为他们的歌曲付出了很多心血。如果许可协议不符合你的项目（例如，你的游戏是商业项目），那么你就不能使用它。\n\
  \n## 实现《超级跳跃者》\n\n\n\n### 实现超级跳跃者\n\n实现超级跳跃者会非常简单。我们可以复用第[8]章的完整框架，并在高级层面上遵循 Mr.\
  \ Nom 的架构。这意味着每个屏幕都会有一个对应的类，每个类将实现该屏幕所需的逻辑和呈现效果。除此之外，我们还会按照标准项目设置，配置正确的清单文件，将所有资源放在`assets/`文件夹中，为应用程序设置图标等等。让我们从主要的`Assets`类开始。像之前一样设置项目，复制所有框架类，然后就可以开始编写这款精彩游戏的代码了。\n\
  \n### Assets 类\n\n在 Mr. Nom 中，我们已经有了一个`Assets`类，其中仅包含了存储在静态成员变量中的大量`Pixmap`和`Sound`引用。在超级跳跃者中我们也将采用同样的做法。不过这次我们会加入一些加载逻辑。清单\
  \ 9-1 展示了代码，其中混合了注释。\n\n```\npackage com.badlogic.androidgames.jumper;\nimport com.badlogic.androidgames.framework.Music;\n\
