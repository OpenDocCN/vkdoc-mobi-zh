  \ -position.z);\n}\n```\n\n`setMatrices()`方法仅按之前所述设置投影矩阵和模型-视图矩阵。投影矩阵通过基于构造函数中提供给摄像机的参数调用`gluPerspective()`来设置。模型-视图矩阵执行了我们在第\
  \ 10 章中讨论的世界移动技巧，即应用绕 x 轴和 y 轴的旋转以及平移。所有涉及的因子都被取反，以实现摄像机保持在世界原点、沿负 z 轴方向观察的效果。因此，我们是围绕摄像机旋转和平移物体，而非相反。\n\
  \n```\nfinal float[] matrix = new float[16];\nfinal float[] inVec = { 0, 0, -1,\
  \ 1 };\nfinal float[] outVec = new float[4];\nfinal Vector3 direction = new Vector3();\n\
  public Vector3 getDirection() {\nMatrix.setIdentityM(matrix, 0);\nMatrix.rotateM(matrix,\
  \ 0, yaw, 0, 1, 0);\nMatrix.rotateM(matrix, 0, pitch, 1, 0, 0);\nMatrix.multiplyMV(outVec,\
  \ 0, matrix, 0, inVec, 0);\ndirection.set(outVec[0], outVec[1], outVec[2]);\nreturn\
  \ direction;\n}\n}\n```\n\n最后是神秘的`getDirection()`方法。它伴随一些最终成员，我们用于方法内部的计算。这样做是为了避免每次调用该方法时都分配新的\
  \ float 数组和`Vector3`实例。将这些成员视为临时工作变量。\n\n在方法内部，我们首先设置一个包含绕 x 轴和 y 轴旋转的变换矩阵。我们不需要包含平移，因为我们只需要一个方向向量，而不是位置向量。摄像机的方向与其在世界中的位置无关。我们调用的`Matrix`方法应该是不言自明的。唯一奇怪的是我们实际上以相反的顺序应用它们，且没有对参数取反。我们在`setMatrices()`方法中做了相反的操作。这是因为我们现在实际上是以与变换虚拟摄像机相同的方式变换一个点，而虚拟摄像机不必位于原点或朝向负\
  \ z 轴方向。我们旋转的向量是`(0,0,–1)`，存储在`inVec`中。这是未应用任何旋转时摄像机的默认方向。矩阵乘法所做的就是将这个方向向量按摄像机的俯仰角和偏航角进行旋转，使其指向摄像机朝向的方向。最后，我们根据矩阵-向量乘法的结果设置一个`Vector3`实例，并将其返回给调用者。我们以后可以使用这个单位长度方向向量，让摄像机沿其朝向方向移动。\n\
