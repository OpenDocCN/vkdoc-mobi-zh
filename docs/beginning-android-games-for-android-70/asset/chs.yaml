  \n## `WorldRender` 类\n\n让我们回顾一下需要在 3D 中渲染的内容：\n\n*   **飞船**：使用飞船模型和纹理，并应用光照\n* \
  \  **入侵者**：使用入侵者模型和纹理，同样应用光照\n*   **所有场上的射击物**：基于射击物模型，这次不需要纹理，但需要光照\n*   **护盾方块**：基于护盾方块模型，同样不需要纹理，但需要光照和透明度（参见图\
  \ 12-3）\n*   **爆炸效果**：在飞船或入侵者爆炸时，用爆炸模型替换它们。爆炸当然不需要光照。\n\n我们已知如何编写列表中的前四项。但爆炸效果该如何处理呢？\n\
  \n\n事实证明，我们可以利用`SpriteBatcher`来实现这一点。根据爆炸中的飞船或入侵者的状态时间，我们可以从包含爆炸动画的`Animation`实例（参见`Assets`类）中获取一个`TextureRegion`。`SpriteBatcher`只能在\
  \ x-y 平面上渲染带纹理的矩形，因此我们必须找到一种方法，将这些矩形移动到空间中的任意位置（即爆炸中的飞船或入侵者所在位置）。通过`glTranslatef()`在渲染矩形之前对模型视图矩阵进行操作，我们可以轻松实现这一点！\n\
  \n其他对象的渲染设置则相当直接。我们有一个从右上方照射过来的定向光，以及一个环境光，用于对所有物体进行少量照明，无论其朝向如何。相机位于飞船上方偏后的位置，并注视着飞船前方的一点。我们使用`LookAtCamera`实例来实现这一效果。为了让相机跟随飞船，我们只需将其位置和注视点的\
  \ x 坐标与飞船的 x 坐标保持同步即可。\n\n为了增加一些视觉吸引力，我们会让入侵者绕 y 轴旋转，并根据飞船的当前速度让其绕 z 轴旋转，使其看起来像是朝着移动的方向倾斜。\n\
  \n让我们把这些想法转化为代码！清单 12-12 展示了 Android Invaders 的最终类。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\n\
  import java.util.List;\nimport javax.microedition.khronos.opengles.GL10;\nimport\
  \ com.badlogic.androidgames.framework.gl.AmbientLight;\nimport com.badlogic.androidgames.framework.gl.Animation;\n\
  import com.badlogic.androidgames.framework.gl.DirectionalLight;\nimport com.badlogic.androidgames.framework.gl.LookAtCamera;\n\
  import com.badlogic.androidgames.framework.gl.SpriteBatcher;\nimport com.badlogic.androidgames.framework.gl.TextureRegion;\n\
  import com.badlogic.androidgames.framework.impl.GLGraphics;\nimport com.badlogic.androidgames.framework.math.Vector3;\n\
  public class WorldRenderer {\nGLGraphics glGraphics;\nLookAtCamera camera;\nAmbientLight\
  \ ambientLight;\nDirectionalLight directionalLight;\nSpriteBatcher batcher;\nfloat\
  \ invaderAngle = 0;\n清单 12-12.\nWorldRenderer.java，世界渲染器\n```\n\n`WorldRenderer`维护了一个`GLGraphics`实例的引用，我们将从中获取`GL10`实例。我们还有一个`LookAtCamera`、一个`AmbientLight`、一个`DirectionalLight`和一个`SpriteBatcher`。最后，我们使用一个成员变量来记录当前所有入侵者的旋转角度。\n\
  \n```\npublic WorldRenderer(GLGraphics glGraphics) {\nthis.glGraphics = glGraphics;\n\
  camera = new LookAtCamera(67, glGraphics.getWidth()\n/ (float) glGraphics.getHeight(),\
  \ 0.1f, 100);\ncamera.getPosition().set(0, 6, 2);\ncamera.getLookAt().set(0, 0,\
  \ -4);\nambientLight = new AmbientLight();\nambientLight.setColor(0.2f, 0.2f, 0.2f,\
  \ 1.0f);\ndirectionalLight = new DirectionalLight();\ndirectionalLight.setDirection(-1,\
  \ -0.5f, 0);\nbatcher = new SpriteBatcher(glGraphics, 10);\n}\n```\n\n在构造函数中，我们像往常一样设置了所有成员。相机的视野为\
  \ 67 度，近裁剪面距离为 0.1 单位，远裁剪面距离为 100 单位。因此，观察截锥体可以轻松容纳整个游戏世界。我们将相机定位在飞船的上方和后方，并让它注视点位于\
  \ (0,0,–4)。环境光是微弱的灰色，定向光是白色，从右上方照射过来。最后，我们实例化`SpriteBatcher`，以便能够渲染爆炸矩形。\n\n```\n\
  public void render(World world, float deltaTime) {\nGL10 gl = glGraphics.getGL();\n\
  camera.getPosition().x = world.ship.position.x;\ncamera.getLookAt().x = world.ship.position.x;\n\
  camera.setMatrices(gl);\ngl.glEnable(GL10.GL_DEPTH_TEST);\ngl.glEnable(GL10.GL_TEXTURE_2D);\n\
  gl.glEnable(GL10.GL_LIGHTING);\ngl.glEnable(GL10.GL_COLOR_MATERIAL);\nambientLight.enable(gl);\n\
  directionalLight.enable(gl, GL10.GL_LIGHT0);\nrenderShip(gl, world.ship);\nrenderInvaders(gl,\
  \ world.invaders, deltaTime);\ngl.glDisable(GL10.GL_TEXTURE_2D);\nrenderShields(gl,\
  \ world.shields);\nrenderShots(gl, world.shots);\ngl.glDisable(GL10.GL_COLOR_MATERIAL);\n\
  gl.glDisable(GL10.GL_LIGHTING);\ngl.glDisable(GL10.GL_DEPTH_TEST);\n}\n```\n\n在`render()`方法中，我们首先将相机的\
  \ x 坐标设置为飞船的 x 坐标。当然，我们也会相应地设置相机注视点的 x 坐标。这样，相机就能跟随飞船。一旦位置和注视点更新完毕，我们就可以通过调用`LookAtCamera.setMatrices()`来设置投影矩阵和模型视图矩阵。\n\
  \n接下来，我们设置渲染所需的所有状态。我们需要深度测试、纹理映射、光照以及颜色材质功能，这样我们就不必通过`glMaterial()`为物体指定材质。接下来的两条语句激活了环境光和定向光。通过这些调用，一切都已设置完毕，我们可以开始渲染物体了。\n\
  \n我们渲染的第一件事是通过调用`renderShip()`来渲染飞船。接下来，通过调用`renderInvaders()`来渲染入侵者。\n\n由于护盾块和射击不需要纹理，我们简单地禁用它以节省一些计算。关闭纹理后，我们通过调用`renderShots()`和`renderShields()`来渲染射击和护盾。\n\
  \n最后，我们禁用之前设置的其他状态，以便在返回时保持干净的 OpenGL ES 状态给调用者。\n\n```\nprivate void renderShip(GL10\
  \ gl, Ship ship) {\nif (ship.state == Ship.SHIP_EXPLODING) {\ngl.glDisable(GL10.GL_LIGHTING);\n\
  renderExplosion(gl, ship.position, ship.stateTime);\ngl.glEnable(GL10.GL_LIGHTING);\n\
  } else {\nAssets.shipTexture.bind();\nAssets.shipModel.bind();\ngl.glPushMatrix();\n\
  gl.glTranslatef(ship.position.x, ship.position.y, ship.position.z);\ngl.glRotatef(ship.velocity.x\
  \ / Ship.SHIP_VELOCITY * 90, 0, 0, -1);\nAssets.shipModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\nAssets.shipModel.getNumVertices());\ngl.glPopMatrix();\nAssets.shipModel.unbind();\n\
  }\n}\n```\n\n`renderShip()`方法首先检查飞船的状态。如果飞船正在爆炸，我们会禁用光照，调用`renderExplosion()`在飞船位置渲染爆炸效果，然后重新启用光照。\n\
  \n如果飞船存活，我们会绑定其纹理和模型，压入模型视图矩阵，将其移动到其位置并根据其速度绕 z 轴旋转，然后绘制其模型。最后，我们弹出模型视图矩阵（只保留相机的视图），并解除绑定飞船模型的顶点。\n\
  \n```\nprivate void renderInvaders(GL10 gl, List invaders, float deltaTime) {\n\
  invaderAngle += 45 * deltaTime;\nAssets.invaderTexture.bind();\nAssets.invaderModel.bind();\n\
  int len = invaders.size();\nfor (int i = 0; i < len; i++) {\nInvader invader = invaders.get(i);\n\
  if (invader.state == Invader.INVADER_DEAD) {\ngl.glDisable(GL10.GL_LIGHTING);\n\
  Assets.invaderModel.unbind();\nrenderExplosion(gl, invader.position, invader.stateTime);\n\
  Assets.invaderTexture.bind();\nAssets.invaderModel.bind();\ngl.glEnable(GL10.GL_LIGHTING);\n\
  } else {\ngl.glPushMatrix();\ngl.glTranslatef(invader.position.x, invader.position.y,\n\
  invader.position.z);\ngl.glRotatef(invaderAngle, 0, 1, 0);\nAssets.invaderModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\nAssets.invaderModel.getNumVertices());\ngl.glPopMatrix();\n}\n}\nAssets.invaderModel.unbind();\n\
  }\n```\n\n\n\n`renderInvaders()` 方法与 `renderShip()` 方法在很大程度上是相同的。唯一的区别在于，它在渲染每个入侵者之前会绑定纹理和网格。这样做显著减少了绑定次数，并提升了渲染速度。对于每个入侵者，我们再次检查其状态，并选择渲染爆炸效果或普通的入侵者模型。由于我们在\
  \ `for` 循环外部绑定了模型和纹理，因此在渲染爆炸效果（而非入侵者）之前，我们必须先解绑再重新绑定。\n\n```\nprivate void renderShields(GL10\
  \ gl, List shields) {\ngl.glEnable(GL10.GL_BLEND);\ngl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\ngl.glColor4f(0, 0, 1, 0.4f);\nAssets.shieldModel.bind();\n\
  int len = shields.size();\nfor (int i = 0; i < len; i++) {\nShield shield = shields.get(i);\n\
  gl.glPushMatrix();\ngl.glTranslatef(shield.position.x, shield.position.y,\nshield.position.z);\n\
  Assets.shieldModel.draw(GL10.GL_TRIANGLES, 0,\nAssets.shieldModel.getNumVertices());\n\
  gl.glPopMatrix();\n}\nAssets.shieldModel.unbind();\ngl.glColor4f(1, 1, 1, 1f);\n\
  gl.glDisable(GL10.GL_BLEND);\n}\n```\n\n`renderShields()` 方法用于渲染护盾方块。我们应用了与渲染入侵者相同的原则：只绑定模型一次。由于没有纹理，我们无需绑定纹理。然而，我们需要启用混合。我们将全局顶点颜色设置为蓝色，alpha\
  \ 分量设为 0.4。这将使护盾方块变得略微透明。\n\n```\nprivate void renderShots(GL10 gl, List shots)\
  \ {\ngl.glColor4f(1, 1, 0, 1);\nAssets.shotModel.bind();\nint len = shots.size();\n\
  for (int i = 0; i < len; i++) {\nShot shot = shots.get(i);\ngl.glPushMatrix();\n\
  gl.glTranslatef(shot.position.x, shot.position.y, shot.position.z);\nAssets.shotModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\nAssets.shotModel.getNumVertices());\ngl.glPopMatrix();\n}\nAssets.shotModel.unbind();\n\
  gl.glColor4f(1, 1, 1, 1);\n}\n```\n\n在 `renderShots()` 中渲染射击与渲染护盾相同，只是我们不使用混合，并且使用了不同的顶点颜色（黄色）。\n\
  \n```\nprivate void renderExplosion(GL10 gl, Vector3 position, float stateTime)\
  \ {\nTextureRegion frame = Assets.explosionAnim.getKeyFrame(stateTime,\nAnimation.ANIMATION_NONLOOPING);\n\
  gl.glEnable(GL10.GL_BLEND);\ngl.glPushMatrix();\ngl.glTranslatef(position.x, position.y,\
  \ position.z);\nbatcher.beginBatch(Assets.explosionTexture);\nbatcher.drawSprite(0,\
  \ 0, 2, 2, frame);\nbatcher.endBatch();\ngl.glPopMatrix();\ngl.glDisable(GL10.GL_BLEND);\n\
  }\n}\n```\n\n最后，我们来看看神秘的 `renderExplosion()` 方法。我们获取想要渲染爆炸效果的位置，以及正在爆炸对象的 `stateTime`。后者用于从爆炸\
  \ `Animation` 中获取正确的 `TextureRegion`，正如在 Super Jumper 中为 Bob 所做的那样。\n\n我们首先要根据 `stateTime`\
  \ 获取爆炸动画帧。接着，我们启用混合，因为爆炸效果含有我们不希望渲染的透明像素。我们推入当前模型视图矩阵并调用 `glTranslatef()`，这样在此调用之后渲染的任何内容都将定位在给定的位置。我们通知\
  \ `SpriteBatcher`，我们将要使用爆炸纹理渲染一个矩形。\n\n接下来的调用是其神奇之处。我们告诉 `SpriteBatcher` 在坐标 (0,0,0)\
  \ 处（z 坐标未显式给出，但默认为零）渲染一个宽度和高度均为 2 个单位的矩形。因为我们使用了 `glTranslatef()`，该矩形将不会居中于原点，而是环绕我们在\
  \ `glTranslatef()` 中指定的位置，该位置正是爆炸的飞船或入侵者的位置。最后，我们弹出模型视图矩阵并再次禁用混合。\n\n就这样。十二个类构成了一个完整的\
  \ 3D 游戏，仿照了经典的 Space Invaders 游戏。试试看吧。等你回来，我们将探讨性能特性。\n\n#### 优化\n\n在考虑优化游戏之前，我们必须评估其性能表现。我们在\
  \ `GameScreen` 类中添加了一个 `FPSCounter`，让我们看看它在 Hero、Droid 和 Nexus One 上的输出。\n\n```\n\
  Hero (Android 1.5):\n02-17 00:59:04.180: DEBUG/FPSCounter(457): fps: 25\n02-17 00:59:05.220:\
  \ DEBUG/FPSCounter(457): fps: 26\n02-17 00:59:06.260: DEBUG/FPSCounter(457): fps:\
  \ 26\n02-17 00:59:07.280: DEBUG/FPSCounter(457): fps: 26\nNexus One (Android 2.2.1):\n\
  02-17 01:05:40.679: DEBUG/FPSCounter(577): fps: 41\n02-17 01:05:41.699: DEBUG/FPSCounter(577):\
  \ fps: 41\n02-17 01:05:42.729: DEBUG/FPSCounter(577): fps: 41\n02-17 01:05:43.729:\
  \ DEBUG/FPSCounter(577): fps: 40\nDroid (Android 2.1.1):\n02-17 01:47:44.096: DEBUG/FPSCounter(1758):\
  \ fps: 47\n02-17 01:47:45.112: DEBUG/FPSCounter(1758): fps: 47\n02-17 01:47:46.127:\
  \ DEBUG/FPSCounter(1758): fps: 47\n02-17 01:47:47.135: DEBUG/FPSCounter(1758): fps:\
  \ 46\n```\n\nHero 比较吃力，但游戏在 25 FPS 下仍可玩。Nexus One 达到了大约 41 FPS，而 Droid 达到了 47 FPS，非常流畅。还能更好吗？\n\
  \n就状态变化而言，这并非最差的情况。我们可以在此处和彼处减少一些冗余的状态变化，例如某些 `glEnable()`/`glDisable()` 调用，但从之前的优化尝试中我们知道，这样做并不会显著降低开销。\n\
  \n在 Hero 上，我们可以做一件事：禁用光照。一旦我们移除了 `WorldRenderer.render()`、`WorldRenderer.renderShip()`\
  \ 和 `WorldRenderer.renderInvaders()` 中相应的 `glEnable()`/`glDisable()` 调用，Hero 达到了以下帧率：\n\
  \n```\nHero (Android 1.5):\n02-17 01:14:44.580: DEBUG/FPSCounter(618): fps: 31\n\
  02-17 01:14:45.600: DEBUG/FPSCounter(618): fps: 31\n02-17 01:14:46.610: DEBUG/FPSCounter(618):\
  \ fps: 31\n02-17 01:14:47.630: DEBUG/FPSCounter(618): fps: 31\n```\n\n这有了相当大的提升，而我们所需要做的仅仅是关闭光照。虽然可以对特定设备的渲染代码进行特化处理，但最好避免这种做法。还有其他我们能做的事情吗？\n\
  \n在入侵者爆炸的情况下，我们渲染爆炸效果的方式并非最优。我们在渲染所有入侵者的过程中更改了模型和纹理绑定，这会使图形管线有点不稳定。然而，爆炸并不经常发生，且持续时间不长（1.6\
  \ 秒）。此外，刚刚展示的测量结果是在屏幕上没有爆炸效果的情况下取得的，所以这不是问题所在。\n\n事实是，我们每帧渲染的对象太多，导致了显著的调用开销并轻微停滞了管线。以我们目前对\
  \ OpenGL ES 的了解，对此我们无能为力。然而，考虑到游戏在所有设备上都“感觉”相当可玩，达到 60 FPS 并非绝对必要。Droid 和 Nexus\
  \ One 即使在渲染轻度复杂的 3D 场景时，也很难达到 60 FPS。因此，最后一个教训是：如果你的游戏不能以 60 FPS 运行，不要抓狂。如果视觉上流畅且玩起来不错，即使\
  \ 30 FPS 也完全可以接受。\n\n> **注意**  \n> 其他常见的优化策略包括使用剔除、顶点缓冲对象以及其他更高级的主题，这些在此不讨论。我们曾尝试将这些加入到我们的\
  \ Android Invaders 中——效果为零。这些设备都没有从这些优化中受益。但这并不意味着这些技术无用。这取决于很多因素及其副作用，并且很难预测特定配置会如何表现。如果你感兴趣，就在网上搜索这些术语，并自己尝试这些技术吧！\n\
  \n## 总结\n\n\n\n在本章中，我们完成了第三款游戏，一个功能完整的 3D 太空侵略者克隆版。我们运用了本书中学到的所有技巧和诀窍，最终成果相当令人满意。当然，这些并非\
  \ AAA 级大作。事实上，这些游戏都无法让人长时间乐在其中。这正是你的用武之地。发挥创意，扩展这些游戏，让它们变得有趣！你已掌握了所需的工具。\n\n## 13.\
  \ 使用 NDK 走向原生\n\n在经历了前三章所有的 3D 狂热之后，是时候探讨 Android 游戏编程的另一个方面了。虽然 Java 和 Dalvik VM\
  \ 在执行速度上足以满足许多游戏类型，但有些时候你需要更强大的性能。这对于物理模拟、复杂 3D 动画、碰撞检测等尤其如此。这类代码最好用更“贴近硬件”的语言编写，比如\
  \ C/C++ 甚至汇编语言。Android 原生开发套件（NDK）正是让我们做到这一点的工具。\n\n在 C/C++ 中实现 3D 动画或物理引擎远远超出了本书的范围。然而，在第\
  \ 8 章中，我们确定了一个可以通过少量原生代码修复的性能瓶颈。在 Android 上将`float`数组复制到`ByteBuffer`非常慢。我们的一些 OpenGL\
  \ ES 类依赖于这种机制。在本章中，我们将研究如何使用一点点 C/C++ 代码来解决这个问题！\n\n> **注意**\n> 以下章节将向你展示如何从 Java\
  \ 应用程序与 C/C++ 代码交互。如果你对深入这个主题感到不自信，请跳过本章，待你想了解更多时再回来阅读。\n\n### 什么是 Android NDK？\n\
  \nNDK 是 Android SDK 的一个补充，它允许你编写 C/C++ 和汇编代码，然后将其集成到你的 Android 应用程序中。NDK 包含一组 Android\
  \ 特定的 C 库、一个基于 GNU 编译器套件（GCC）的交叉编译工具链（可编译至 Android 支持的所有不同 CPU 架构：ARM、x86 和 MIPS），以及一个自定义构建系统，与编写自己的\
  \ Makefile 相比，它应能使编译 C/C++ 代码变得更加容易。\n\nNDK 并未暴露大多数 Android API，例如 UI 工具包。其主要目的是通过将缓慢的\
  \ Java 方法用 C/C++ 重写并从 Java 内部调用它们来加速这些方法。自 Android 2.3 起，通过使用`NativeActivity`类代替\
  \ Java Activity，几乎可以完全绕过 Java。`NativeActivity`类是专门为需要全窗口控制的游戏而设计的，但它完全不提供对 Java\
  \ 的访问，因此不能与其他基于 Java 的 Android 库一起使用。许多从 iOS 转来的游戏开发者选择这条路线，因为它让他们可以在 Android 上重用大部分\
  \ C/C++ 代码，而无需深入 Android Java API。然而，诸如 Facebook 认证或广告等服务集成仍然需要用 Java 完成，因此设计游戏从\
  \ Java 启动并通过 JNI 调用 C++ 通常是最兼容的方式。那么，如何使用 JNI 呢？\n\n### Java 原生接口\n\nJava 原生接口（JNI）是一种让虚拟机（以及\
  \ Java 代码）与 C/C++ 代码通信的方式。这是双向的；你可以从 Java 调用 C/C++ 代码，也可以从 C/C++ 调用 Java 方法。Android\
  \ 的许多库（例如 OpenGL ES 或音频解码器）都使用这种机制来暴露原生代码。\n\n一旦你使用 JNI，你的应用程序就由两部分组成：Java 代码和 C/C++\
  \ 代码。在 Java 端，你通过添加一个称为`native`的特殊限定符来声明那些将在原生代码中实现的类方法。这可能看起来像这样：\n\n```\npackage\
  \ com.badlogic.androidgames.ndk;\npublic class MyJniClass {\npublic native int add(int\
  \ a, int b);\n}\n```\n\n如你所见，我们声明的方法没有方法体。当运行你的 Java 代码的虚拟机在方法上看到这个限定符时，它会知道相应的实现位于一个共享库中，而不是在\
  \ JAR 文件或 APK 文件中。\n\n共享库与 Java 的 JAR 文件非常相似。它包含编译好的 C/C++ 代码，任何加载此共享库的程序都可以调用这些代码。在\
  \ Windows 上，这些共享库通常有`.dll`后缀；在 Unix 系统上，它们以`.so`结尾。\n\n在 C/C++ 端，我们有许多头文件和源文件，它们定义了\
  \ C 语言中原生方法的签名并包含实际的实现。上述代码中我们类的头文件看起来像这样：\n\n```\n/* DO NOT EDIT THIS FILE - it\
  \ is machine generated */\n#include \n/* Header for class com_badlogic_androidgames_ndk_MyJniClass\
  \ */\n#ifndef _Included_com_badlogic_androidgames_ndk_MyJniClass\n#define _Included_com_badlogic_androidgames_ndk_MyJniClass\n\
  #ifdef __cplusplus extern \"C\" {\n#endif\n/*\n* Class:       com_badlogic_androidgames_ndk_MyJniClass\n\
  * Method:      add\n* Signature: (II)I\n*/\nJNIEXPORT jint JNICALL Java_com_badlogic_androidgames_ndk_MyJniClass_add\n\
  (JNIEnv *, jobject, jint, jint);\n#ifdef __cplusplus\n}\n#endif\n#endif\n```\n\n\
  这个头文件是使用一个名为`javah`的 JDK 工具生成的。该工具以一个 Java 类作为输入，并为其找到的任何原生方法生成一个 C 函数签名。这里涉及很多内容，因为\
  \ C 代码需要遵循特定的命名方案，并且需要能够将 Java 类型封送（marshal）为其对应的 C 类型（例如，Java 的`int`在 C 中变为`jint`）。我们还得到了两个额外的参数，类型为`JNIEnv`和`jobject`。第一个可以被视为\
  \ VM 的句柄。它包含与 VM 通信的方法，例如调用一个类实例的方法。第二个参数是被调用该方法的类实例的句柄。我们可以结合使用它和`JNIEnv`参数，从 C\
  \ 代码中调用该类实例的其他方法。\n\n这个头文件尚未包含函数的实现。我们需要一个对应的 C/C++ 源文件来实现该函数：\n\n```\n#include\
  \ \"myjniclass.h\"\nJNIEXPORT jint JNICALL Java_com_badlogic_androidgames_ndk_MyJniClass_add\n\
  (JNIEnv * env, jobject obj, jint a, jint b) {\nreturn a + b;\n}\n```\n\n这些 C/C++\
  \ 源代码被编译成一个共享库，然后我们通过一个特定的 Java API 加载它，以便 VM 能够找到我们 Java 类中那些原生方法的实现：\n\n```\n\
  System.loadLibrary(\"myjnitest\");\nint result = new MyJniClass().add(12, 32);\n\
  ```\n\n调用`System.loadLibrary()`时，需要提供共享库的名称。VM 实现在一定程度上决定了它如何找到相应的文件。此方法仅在启动时调用一次，以便\
  \ VM 知道在哪里可以找到任何原生库的实现。如你所见，我们可以像调用任何其他 Java 类方法一样调用`MyJniClass.add()`方法！\n\n说了这么多，让我们用一点\
  \ C 代码在 Android 上实际动手操作一下！我们将编写几个简单的 C 函数，并希望从我们的 Java 应用程序中调用它们。我们将引导你完成编译共享库、加载它以及调用原生方法的整个过程。\n\
  \n### 设置 NDK\n\n在开始之前，我们必须安装 NDK。这实际上是一个相当简单的过程。\n\n1.  前往[`http://developer.android.com/tools/sdk/ndk/index.html`](http://developer.android.com/tools/sdk/ndk/index.html)，点击下载，并为你的平台选择归档文件。\n\
  2.  将归档文件解压到你喜欢的位置，并记下其路径。\n3.  将 NDK 的基础目录添加到你的系统路径中。\n\n\n\n1.  在 Linux 或 Mac\
  \ OS X 上，打开一个 shell，并将 NDK 安装目录的路径添加到你的 `$PATH` 环境变量中。通常是在 `.profile` 文件中，添加一行类似这样的内容：`export\
  \ PATH = $PATH:/ path/to/your/ndk/installation`\n\n2.  在 Windows 上，选择“控制面板” ➤ “系统和安全”\
  \ ➤ “系统” ➤ “高级系统设置” ➤ “环境变量” ➤ “系统变量”。在系统变量列表中选择 `Path`，点击“编辑”，并在变量值的末尾添加该目录，以分号开头（例如\
  \ `;c:\\Android_NDK`）。\n\n3.  要验证 NDK 是否已成功安装，请在终端中执行命令 `ndk-build`。它应该会输出一些关于缺少\
  \ Android 项目的提示信息。\n\n4.  在第二章 2 中，我们设置了 JDK，并将其 `bin/` 目录添加到了路径中。\n\n5.  通过执行命令\
  \ `javah` 来确保该目录中的工具仍然可用。它应该会打印出该工具的使用信息。我们稍后会用到它。\n\n## 设置 NDK Android 项目\n\n与之前的编码章节一样，你需要创建一个新的\
  \ Android 项目。从第十二章 12 复制所有框架代码。然后，创建一个名为 `com.badlogic.androidgames.ndk` 的新包，将之前章节中的一个启动器活动复制到其中，将其重命名为\
  \ `NdkStarter`，并将其设置为启动器活动。与往常一样，记得将任何新的测试项添加到清单文件和启动器活动中。\n\n为了更方便操作，你现在应该打开终端，并导航到该新项目的根目录。确保你的\
  \ `PATH` 环境变量中仍然包含正确的条目，以便能够调用 `ndk-build` 和 `javah` 工具。\n\n## 创建 Java 原生方法\n\n\
  如前所述，指定 Java 类的哪些方法由原生代码实现相当简单。但是，在定义传入方法的类型以及方法返回的类型时，我们需要小心谨慎。\n\n虽然我们可以向原生方法传递任何\
  \ Java 类型，但有些类型的处理难度远高于其他类型。最容易处理的类型是基本类型，例如 `int`、`byte`、`boolean`、`char` 等，它们直接对应于等效的\
  \ C 类型。其次较易在 C/C++ 端处理的类型是基本类型的一维数组，例如 `int[]` 或 `float[]`。\n\n这些数组可以通过我们之前看到的 `JNIEnv`\
  \ 类型提供的方法转换为 C 数组或指针。接下来较容易处理的是直接的 `ByteBuffer` 实例。与数组一样，它们可以很容易地转换为指针。根据具体用例，字符串也可以很容易地使用。对象和多维数组的处理难度则大得多。在\
  \ C/C++ 端处理这些内容类似于在 Java 端使用反射 API。\n\n我们也可以从原生方法返回任何 Java 类型。基本类型同样很容易处理。返回其他类型通常涉及在\
  \ C/C++ 端创建该类型的实例，这可能相当复杂。\n\n我们只会稍微探讨一下传递基本类型、数组、`ByteBuffer` 实例和字符串的情况。如果你想了解更多关于如何通过\
  \ JNI 处理类型的信息，我们推荐你参考（在线）书籍 *Java Native Interface 5.0 Specification*，网址在 [`http://docs.oracle.com/javase/1.5.0/docs/guide/jni/spec/jniTOC.html`](http://docs.oracle.com/javase/1.5.0/docs/guide/jni/spec/jniTOC.html)。\n\
  \n对于我们的 JNI 实验，我们将创建两个方法。一个方法在 C 代码中将 `float[]` 复制到一个直接的 `ByteBuffer` 中，另一个方法将字符串打印到\
  \ logcat。清单 13-1 展示了他的 `JniUtils` 类。\n\n```\npackage com.badlogic.androidgames.ndk;\n\
  import java.nio.ByteBuffer;\npublic class JniUtils {\nstatic {\nSystem.loadLibrary(\"\
  jniutils\");\n}\npublic static native void log(String tag, String message);\npublic\
  \ static native void copy(ByteBuffer dst, float[] src, int offset, int len);\n}\n\
  清单 13-1.\nJniUtils.java: 保持简单\n```\n\n该类以一个静态代码块开始。该代码块中的代码将在虚拟机首次遇到对 `JniUtils`\
  \ 类的引用时被调用。这里是调用 `System.loadLibrary()` 的绝佳位置，它将加载我们稍后将编译的共享库。我们传递给该方法的参数是共享库的纯名称。正如我们稍后将看到的，实际文件名是\
  \ `libjniutils.so`。该方法会自动处理这个问题。\n\n`log()` 方法模仿 Android Java 的 `Log.d()` 方法。它接收一个标签和一条消息，并将它们打印到\
  \ `logcat`。\n\n`copy()` 方法实际上很有用。在第八章 8 中，我们研究了 `FloatBuffer.put()` 方法的性能问题。我们求助于使用纯\
  \ Java 实现，该实现使用了 `IntBuffer` 和一些棘手的小技巧，以便在 `Vertices` 类中加快将 `float` 数组复制到直接 `ByteBuffer`\
  \ 的速度。现在，我们将实现一个方法，它接收一个直接的 `ByteBuffer` 和一个 `float` 数组，并将该数组复制到缓冲区中。这比使用相应的 Java\
  \ API 要快得多。稍后我们可以修改 `Vertices` 和 `Vertices3` 类来使用这个新功能。\n\n请注意，这两个方法都是静态方法，而不是实例方法。这意味着我们可以在没有\
  \ `JniTest` 类实例的情况下调用它们！这也会对我们的 C 函数签名产生轻微影响，稍后我们会看到。\n\n## 创建 C/C++ 头文件和实现\n\n\
  当我们开始编写 C/C++ 代码时，首先要做的事情是通过 JDK 命令行工具 `javah` 生成头文件。它接受几个对我们有用的参数：\n\n*   输出文件的名称，在我们的案例中是\
  \ `jni/jniutils.h`。如果 `jni/` 文件夹不存在，`javah` 工具会为我们创建它。\n\n*   包含应为其生成 C 头文件的 Java\
  \ 类的 `.class` 文件的路径。如果从项目的根目录调用 `javah`，这将是 `bin/classes`。这是 Eclipse 编译器编译我们的 Android\
  \ 项目任何源文件时的输出路径。\n\n*   该类的完全限定名，在我们的案例中是 `com.badlogic.androidgames.ndk.JniUtils`。\n\
  \n打开终端或命令提示符，并导航到 Android 项目的根文件夹。确保如前所述，NDK 和 JDK 已在你的 `$PATH` 中。现在执行以下命令：\n\n\
  ```\njavah -o jni/jniutils.h -classpath bin/classes com.badlogic.androidgames.ndk.JniUtils\n\
  ```\n\n这将在我们 Android 项目的 `jni/` 文件夹中创建一个名为 `jniutils.h` 的文件。清单 13-2 显示了其内容。\n\n\
  ```\n/* 不要编辑此文件 - 它是由机器生成的 */\n#include \n/* 用于类 com_badlogic_androidgames_ndk_JniUtils\
  \ 的头文件 */\n#ifndef _Included_com_badlogic_androidgames_ndk_JniUtils\n#define _Included_com_badlogic_androidgames_ndk_JniUtils\n\
  #ifdef __cplusplus extern \"C\" {\n#endif\n/*\n* 类:     com_badlogic_androidgames_ndk_JniUtils\n\
  * 方法:    log\n* 签名: (Ljava/lang/String;Ljava/lang/String;)V\n*/\nJNIEXPORT void\
  \ JNICALL Java_com_badlogic_androidgames_ndk_JniUtils_log\n(JNIEnv *, jclass, jstring,\
  \ jstring);\n/*\n* 类:     com_badlogic_androidgames_ndk_JniUtils\n* 方法:    copy\n\
  * 签名: (Ljava/nio/ByteBuffer;[FII)V\n*/\nJNIEXPORT void JNICALL Java_com_badlogic_androidgames_ndk_JniUtils_copy\n\
  (JNIEnv *, jclass, jobject, jfloatArray, jint, jint);\n#ifdef __cplusplus\n}\n#endif\n\
  #endif\n清单 13-2.\njniutils.h，包含实现我们原生方法的 C 函数\n```\n\n\n\n### 开始实现这些函数\n\n首先，我们在`jni/`文件夹中创建一个名为`jniutils.cpp`的新文件。清单\
  \ 13-3 展示了其内容。\n\n```cpp\n#include \n#include \n#include \"jniutils.h\"\n```\n\n\
  *清单 13-3. `jniutils.cpp`，`JniUtils`本地方法的实现*\n\n我们需要几个 C 语言头文件，即由 NDK 提供的`log.h`、`string.h`和我们自己的`jniutils.h`。第一个头文件让我们能够使用\
  \ Android 原生日志函数。第二个头文件让我们能够使用`memcpy()`。最后一个头文件导入了我们本地方法的签名以及包含 JNI API 的`jni.h`。\n\
  \n```cpp\nJNIEXPORT void JNICALL Java_com_badlogic_androidgames_ndk_JniUtils_log\n\
  (JNIEnv *env, jclass clazz, jstring tag, jstring message) {\n    const char *cTag\
  \ = env->GetStringUTFChars(tag, 0);\n    const char *cMessage = env->GetStringUTFChars(message,\
  \ 0);\n    __android_log_print(ANDROID_LOG_VERBOSE, cTag, cMessage);\n    env->ReleaseStringUTFChars(tag,\
  \ cTag);\n    env->ReleaseStringUTFChars(message, cMessage);\n}\n```\n\n该函数实现了`JniUtils.log()`方法，该方法的前两个参数是`JNIEnv`和`jclass`。`env`参数允许我们直接操作\
  \ JVM。`jclass`参数代表`JniUtils`类。请记住，我们的方法是静态方法。与前面的示例获取`jobject`不同，这里我们获取的是类。`tag`和`message`参数是我们从\
  \ Java 传入的两个字符串。\n\n`log.h`头文件定义了一个名为`android_log_print`的函数，它类似于标准 C 语言的`printf`函数。它接受一个日志级别和两个指向标签和消息的`char*`指针。我们的`tag`和`message`参数的类型是`jstring`，不能直接强制转换为`char*`指针。相反，我们必须通过`env`参数暴露的方法将它们临时转换为`char*`指针。这在函数的前两行通过调用`env->GetStringUTFChars()`和`env->ReleaseStringUTFChars()`完成。\n\
  \n接下来，我们直接调用日志方法，传入参数。最后，我们需要清理转换后的字符串，以防内存泄漏。这通过以下方式完成：\n\n```cpp\nJNIEXPORT void\
  \ JNICALL Java_com_badlogic_androidgames_ndk_JniUtils_copy\n(JNIEnv *env, jclass\
  \ clazz, jobject dst, jfloatArray src, jint offset, jint len) {\n    unsigned char*\
  \ pDst = (unsigned char*)env->GetDirectBufferAddress(dst);\n    float* pSrc = (float*)env->GetPrimitiveArrayCritical(src,\
  \ 0);\n    memcpy(pDst, pSrc + offset, len * 4);\n    env->ReleasePrimitiveArrayCritical(src,\
  \ pSrc, 0);\n}\n```\n\n第二个函数接受一个直接`ByteBuffer`、一个浮点数组、一个指向浮点数组的偏移量，以及要复制的浮点数个数。请注意，`ByteBuffer`的类型是`jobject`！当你传入除基本类型或数组之外的任何内容时，你都会得到一个`jobject`。你的\
  \ C/C++代码需要知道期望的类型！在我们的例子中，我们知道我们得到的是一个`ByteBuffer`实例。`ByteBuffer`实例只是原生内存区域的轻量级包装器。它们在\
  \ C 语言中非常容易处理；我们可以通过`env->GetDirectBufferAddress()`简单地获取指向其内存地址的指针。\n\n我们的浮点数组处理起来稍微复杂一些。`env->GetPrimitiveArrayCritical()`方法会锁定该数组并返回一个指向其第一个元素的指针。使用这个函数是危险的；你不应该尝试在\
  \ Java 中并发修改该数组。从这一点开始，调用任何其他 JNI 方法也是被禁止的。否则，你的 C/C++代码中会出现难以调试的行为！\n\n一旦我们有了指针，我们就简单地使用`memcpy()`将浮点数组的内容复制到`ByteBuffer`。请注意，我们不执行任何类型的边界检查，这意味着调用此方法的\
  \ Java 代码必须是万无一失的。尝试将比我们分配的空间更多的浮点数复制到`ByteBuffer`中可能会导致严重的段错误。当我们指定超出传入浮点数组范围的偏移量和长度时，情况也是如此。总的要点是，在使用\
  \ JNI 和 NDK 时，你必须清楚自己在做什么。否则，你的应用程序将会崩溃，并出现难以调试的错误！\n\n在函数末尾，我们通过调用`env->ReleasePrimitiveArrayCritical()`再次解锁浮点数组。你必须无条件地调用此方法；否则，你会遇到各种问题。\n\
  \n我们已经准备好了 C/C++头文件和源文件，现在可以构建共享库了。\n\n## 构建共享库\n\n如前所述，NDK 自带构建系统。虽然它在底层仍然使用标准的\
  \ makefile，但你作为用户不必处理它们的复杂性。相反，你需要编写两个文件：一个`Application.mk`文件，指定你要针对的 CPU 架构；一个`Android.mk`文件，定义你要链接哪些其他库、编译哪些源文件以及最终共享库应该如何命名。\n\
  \n`Application.mk`文件放置在`jni/`文件夹中。清单 13-4 展示了其内容。\n\n```\nAPP_ABI := armeabi armeabi-v7a\
  \ x86 mips\n```\n\n*清单 13-4. `Application.mk`，定义我们要针对的 CPU 架构*\n\n仅此而已！它所定义的全部内容就是我们的原生代码应该在四种架构上运行。ARM\
  \ 架构是最常见的目标——几乎所有当前的 Android 设备都有 ARM CPU。据传言，x86 架构可以在即将发布的英特尔设备中找到。也有一些模拟器镜像支持这种架构。MIPS\
  \ 架构目前被少数低端 Android 平板电脑使用。\n\n定义了架构之后，我们现在可以继续编写`Android.mk`文件，它指定了我们的原生代码应该如何构建。这个文件也位于`jni/`文件夹中。清单\
  \ 13-5 展示了其内容。\n\n```\nLOCAL_PATH:= $(call my-dir)\ninclude $(CLEAR_VARS)\nLOCAL_MODULE\
  \    := jniutils\nLOCAL_LDLIBS    := -llog\nLOCAL_ARM_MODE  := arm\nLOCAL_SRC_FILES\
  \ := jniutils.cpp\ninclude $(BUILD_SHARED_LIBRARY)\n```\n\n*清单 13-5. `Android.mk`，指定我们的构建过程*\n\
  \n前两行几乎是样板代码。它们确保路径被正确处理，并且各种变量被重置。\n\n下一行定义了我们的共享库的名称，在本例中是`jniutils`。\n\n接下来，我们指定要链接的库。我们使用原生\
  \ Android 日志功能，因此我们链接到 NDK 提供的`liblog`库。\n\n下一行是 ARM 架构特有的。它告诉构建系统我们要生成非 Thumb 代码。ARM\
  \ 处理器有两种运行模式：Thumb 和 32 位 ARM。前者生成的代码较小，但通常速度较慢。对于我们的 C/C++代码来说，这其实关系不大，但启用这个选项是一个好习惯。\n\
  \n接下来，我们指定要编译的 C/C++源文件。我们只有一个文件。要指定其他文件，只需将它们添加到同一行，用空格分隔，或者在新的一行添加。如果你选择第二种方式，则必须在上一行的末尾添加一个反斜杠。\n\
  \n最后一行告诉构建系统生成一个共享库。我们也可以让它生成一个静态库，然后我们可以将其与其他静态库一起编译成共享库。这是更复杂的 JNI 项目使用的一种机制。我们只需一个简单的共享库就足够了。\n\
  \n> **注意**\n\n\n\n### NDK 构建系统\n\n`NDK`构建系统实际上是一个相当复杂的“巨兽”。你可以通过`Android.mk`和`Application.mk`文件修改代码构建的几乎所有方面。如果你想了解更多关于构建系统的信息，请查看`NDK`安装目录下的`doc/`文件夹。\n\
  \n现在，是时候构建我们的共享库了。为此，请打开终端，确保你的`PATH`环境变量配置正确，导航到项目的根目录，然后执行以下命令：\n\n```\nndk-build\n\
  如果一切顺利，你应该会看到以下输出：\nCompile++ arm  : jniutils  libs/armeabi/libjniutils.so\nCompile++\
  \ arm  : jniutils  libs/armeabi-v7a/libjniutils.so\nCompile++ x86 : jniutils  libs/x86/libjniutils.so\n\
  Compile++ mips : jniutils  libs/mips/libjniutils.so\n```\n\n这段“神秘”的输出告诉我们几件事。首先，我们的代码分别针对四种不同的\
  \ CPU 架构进行了编译。生成的共享库都名为`libjniutils.so`，它们被放置在`libs/`文件夹中。每种架构都有一个子目录（例如`armeabi`或`x86`）。当我们编译\
  \ APK 时，这些共享库会与我们的应用程序一起打包。当我们调用`System.loadLibrary()`时（如清单 13-1 所示），`Android`知道如何为当前运行应用程序的架构找到正确的共享库。太棒了，让我们来测试一下吧！\n\
  \n**注意**\n\n每次修改 C/C++代码时，都必须通过调用`ndk-build`来重新构建共享库。如果你有多个源文件，并且只修改了其中一部分，构建工具将只重新编译已更改的文件，从而缩短编译时间。如果需要确保所有源文件都被重新编译，只需调用`ndk-build\
  \ clean`。\n\n### 整合测试\n\n我们现在已经准备好了一切，可以测试我们的原生方法了。让我们创建一个测试，调用`JniUtils`类的两个方法。我们将这个类命名为`JniUtilsTest`；它继承自`GLGame`类，并包含一个`GLScreen`实现，和往常一样。它简单地将一个`float[]`数组复制到一个直接的`ByteBuffer`中，然后通过另一个原生方法将`ByteBuffer`的内容输出到`logcat`。清单\
  \ 13-6 展示了完整的代码。不要忘记将其添加到`NdkStarter`类和清单文件中。\n\n```java\npackage com.badlogic.androidgames.ndk;\n\
  import java.nio.ByteBuffer;\nimport java.nio.ByteOrder;\nimport java.nio.FloatBuffer;\n\
  import com.badlogic.androidgames.framework.Game; \nimport com.badlogic.androidgames.framework.Screen;\
  \ \nimport com.badlogic.androidgames.framework.impl.GLGame;\nimport com.badlogic.androidgames.framework.impl.GLScreen;\n\
  public class JniUtilsTest extends GLGame {\n    public Screen getStartScreen() {\n\
  \        return new JniUtilsScreen(this);\n    }\n    class JniUtilsScreen extends\
  \ GLScreen {\n        public JniUtilsScreen(Game game) {\n            super(game);\n\
  \            float[] values = { 1.231f, 554.3f, 348.6f, 499.3f }; \n           \
  \ ByteBuffer buffer =\n                ByteBuffer.allocateDirect(3 * 4);\n     \
  \       buffer.order(ByteOrder.nativeOrder());\n            JniUtils.copy(buffer,\
  \ values, 1, 3);\n            FloatBuffer floatBuffer = buffer.asFloatBuffer();\n\
  \            for(int i = 0; i < 3; i++) {\n                JniUtils.log(\"JniUtilsTest\"\
  , Float.toString(floatBuffer.get(i)));\n            }\n        }\n        @Override\n\
  \        public void update(float deltaTime) {\n        }\n        @Override\n \
  \       public void present(float deltaTime) {\n        }\n        @Override\n \
  \       public void pause() {\n        }\n        @Override\n        public void\
  \ resume() {\n        }\n        @Override\n        public void dispose() {\n  \
  \      }\n    }\n}\n清单 13-6.\nJniUtilsTest.java：测试我们的原生方法\n```\n\n所有重要的操作都在屏幕的构造函数中发生。我们首先创建了一个包含一些虚拟值的`float[]`数组，以及一个可以容纳\
  \ 12 字节（即 4 个浮点数）的直接`ByteBuffer`实例。我们还确保`ByteBuffer`实例使用原生字节顺序，以避免在将其传递给 C/C++代码时出现一些棘手的问题。\n\
  \n然后，我们从`float[]`数组的索引 1 开始，复制三个浮点数到我们的`ByteBuffer`实例中。最后几行代码通过我们的原生日志方法输出复制的浮点数。在设备上执行此代码将在`logcat`中输出以下内容：\n\
  \n```\n08–15 17:28:31.953: V/JniUtilsTest(1901): 554.3\n08–15 17:28:31.953: V/JniUtilsTest(1901):\
  \ 348.6\n08–15 17:28:31.953: V/JniUtilsTest(1901): 499.3\n```\n\n这正是我们所期望的结果。\n\n\
  现在，你可以在游戏代码中使用`JniUtils`类，将`float[]`数组复制到直接的`ByteBuffer`实例中。请注意，我们手动设置了缓冲区的限制和位置。这是必要的，因为我们的\
  \ JNI 方法不会操作缓冲区的`position`和`limit`字段。不过，我们传递给`OpenGL ES`方法的缓冲区可能会用到这些信息。\n\n通过使用我们的原生`copy()`方法，我们可以获得相当大的速度提升，尤其是在通过`SpriteBatcher`类绘制大量精灵时。每帧都需要将顶点从\
  \ CPU 移动到 GPU 会降低性能，而如果先复制一份再全部转换为`int`，情况会更糟。我们的新`JniUtils`大大减少了复制量，同时比我们之前使用的`IntBuffer`技巧更快！\n\
  \n要测试我们的实现，只需从之前的章节中复制所有必要的资源。将它们与`NdkStarter`活动连接起来，然后在你的 Android 设备上试运行。\n\n##\
  \ 总结\n\n我们仅仅触及了 NDK 可能性的表面。但是，正如你亲眼所见，即使是轻量级地使用 NDK 也能带来相当可观的好处。我们的`copy()`方法实现简单，但由于比旧的、基于\
  \ Java 的实现快得多，让我们能够每帧显示更多的精灵。这是 NDK 开发中反复出现的主题：识别你的性能瓶颈，并在原生侧只实现非常小的一部分代码。不要过度使用，因为调用原生方法有开销。将所有方法都变成原生方法不太可能提高应用程序的性能。\n\
  \n现在是时候考虑我们游戏的营销策略了。\n\n"
- "# 14. 市场营销与盈利\n\n所以，在阅读了前 13 章之后，你现在已经具备了构建一款优秀 Android 游戏的技能和知识。这就像“做出游戏就能发财”一样简单吗？当然不是！通过市场营销和游戏盈利来赚钱本身就是一门技能，你需要学习很多东西才能成功——这不仅仅是在游戏完成后，甚至在你开始开发之前就要考虑。真正的赚钱机器通常是从规划阶段就设计好要变得流行并赚钱的，同时还要保证制作精良。\n\
  \n## 游戏盈利\n\n“盈利”是一个常用术语，大致可以理解为从产品或服务中赚钱的过程。当有人说“我需要让我的游戏盈利”时，他们的意思是，他们需要利用游戏当前的用户群，并找到一种方式开始从中赚取真金白银。\n\
  \n有多种方法可以让你的游戏盈利：\n\n- **横幅广告**：通常按点击付费的图形或文字广告。我们都曾在网页、应用和游戏中见过横幅广告，它们在网站上无处不在。\n\
  - **全屏广告**：与横幅广告类似，但它们需要用户更多的注意力，通常要求用户点击按钮或等待一定时间才能关闭。视频和注册表单在这种形式中很常见。\n- **应用内购买**：用户可以用真实货币购买内容、道具、升级或虚拟货币的选项。例如，花\
  \ 0.99 美元购买一个关卡包，或者花 1.99 美元购买一个“低重力”作弊。\n\n\n\n### 虚拟货币激励\n\n提供虚拟货币作为用户完成任务的奖励。例如，用户安装第三方应用即可获得\
  \ 50 枚游戏内金币，用于购买角色升级道具。\n\n在此场景中，第三方应用发布商会向服务商支付安装费用，而服务商再将其中一部分费用支付给您（游戏开发者）。这通常被称为“发现”服务，因为发布商付费是为了让更多新用户发现其应用。\n\
  \n### 直接销售\n\n用户直接付费购买并安装游戏。这是在广告和虚拟货币出现之前最早的变现方式。\n\n### 许可授权\n\n游戏开发者通过许可协议将游戏授权给其他公司，用于捆绑销售、预装或其他大规模分发渠道。\n\
  \n当然，通过游戏赚钱的方式远不止这些，但以上绝对是最常见的方法。后续将对这些方法进行更深入的探讨。\n\n### 广告\n\n广告是安卓游戏最早实现大规模变现的方式之一。根据经验，由于收入波动性较大，广告更适合作为辅助变现手段而非主要来源。移动广告空间的收入能力极不可靠，且竞争异常激烈。简而言之，大量移动应用在投放广告，但广告背后的资金却相对有限，导致整个生态系统的收益被稀释。这是否意味着免费安卓游戏不应投放广告？当然不是。虽然仅靠广告收入仍有可能获得可观收益，但您需要测试多种广告解决方案，才能找到最适合自身市场定位的方案。\n\
  \n#### 广告提供商\n\n广告提供商直接从广告主处获取广告内容，并根据点击量向您付费。您仅能获得广告主支付点击费用的一部分，剩余部分归广告提供商所有（这也是其盈利模式）。广告内容涵盖汽车配件到膳食补充剂等各类商品。通常您需要为应用配置关键词，以使广告内容与用户更相关。广告提供商使用多种格式，最常见的是横幅广告和全屏广告。行业变化迅速，以下是几家主要广告提供商示例：\n\
  \n- AdMob（谷歌旗下，[`www.admob.com`](http://www.admob.com)）\n- Millennial Media（[`www.millennialmedia.com`](http://www.millennialmedia.com)）\n\
  - Greystripe（[`www.greystripe.com`](http://www.greystripe.com)）\n\n#### 广告聚合服务\n\
  \n移动广告不仅仅是实现横幅或全屏广告。您可能还需要考虑使用广告聚合服务。聚合服务能为您的游戏从多个提供商处获取广告。这样，您只需设置一个广告位（如“顶部横幅”），聚合器会搜索不同广告提供商，为您的广告位匹配最有价值的广告，从而获得最高出价的展示。近年来涌现出许多此类服务，以下是当前主要参与者：\n\
  \n- MoPub（[`www.mopub.com`](http://www.mopub.com)）\n- AdWhirl（[`www.adwhirl.com`](http://www.adwhirl.com)）\n\
  - Inneractive（[`http://inner-active.com`](http://inner-active.com)）\n- Mobclix（[`www.mobclix.com`](http://www.mobclix.com)）\n\
  \n每项服务都有各自的`API`，大多数易于使用。如需获取具体服务的实现技术信息，请访问其官网并查看文档。\n\n#### 游戏广告技巧\n\n如果您决定在游戏中投放广告，最佳方式是什么？有时“少即是多”，以下列举了广告投放应避免的行为：\n\
  \n- 在玩家刚投入游戏时打断他们\n- 让玩家感到沮丧\n- 通过持续显示的广告破坏原本良好的游戏体验\n- 诱导用户误点击\n\n广告过度很容易发生。广告的目的是从游戏中赚钱，对吗？但广告越多并不意味着收入越多；相反，过多的广告通常会导致游戏评分降低，进而减少用户数量，这毫无益处。保持广告展示得体。用户期望在免费游戏中看到一定的广告。在空闲时间（如菜单界面顶部或底部）放置广告是不错的选择。\n\
  \n对于全屏广告，请耐心等待！您可能希望在用户启动游戏时立即展示广告，但这只会损害信誉。建议等到玩家第三次、第四次甚至第五次启动游戏时再显示全屏广告。\n\n\
  专注于打造优质的游戏体验，玩家会更信任您的广告。如果过于关注如何最大化收入，用户会感受到这一点，您的游戏也会因此受损。\n\n### 应用内产品\n\n应用内产品（`IAP`）可能带来巨大收益。其基本理念是：玩家想要游戏中的某些物品，并愿意为此支付少量费用。Google\
  \ Play 商店提供两种应用内产品选项：\n\n- **托管物品**：如角色、关卡或技能。托管物品只能购买一次，且绑定购买者账户而非设备。即使用户在多个设备上使用同一\
  \ Google 账户，购买的物品在所有设备上均可使用。\n- **非托管物品**：如虚拟货币、金币、消耗性升级道具、入场券等会被玩家“用尽”并需要“补充”的物品。非托管物品可重复购买，叠加至现有数量。同样绑定\
  \ Google 账户而非购买设备。\n\n此外，您还可以设置定期扣费的订阅服务。订阅在游戏中仅呈现“开启”或“关闭”状态，因此订阅期间您可向玩家提供任何内容、服务、升级或其他功能。\n\
  \n处理`IAP`的 Google Play 服务称为`In-app Billing`。Google Play 开发者控制台为您提供游戏内设置可购买物品的界面。最兼容的命名方式是使用应用包名作为前缀，例如`com.badlogicgames.awesomegame.300points`可用于\
  \ 300 积分的购买项。\n\n那么，设置可购买物品的最佳策略是什么？没有标准答案，因为这完全取决于您的游戏。一种非常有效的策略是围绕虚拟货币构建一切。\n\n\
  ### 虚拟货币\n\n虚拟货币（`VC`）是游戏内的金钱。无论您称之为金币、宝石、红宝石、积分、代币还是自定义名称，`VC`都是游戏为玩家存储的数字，允许玩家购买物品。您的`VC`无需与现实货币保持一一对应关系，只需与游戏内容建立清晰关联即可。虚拟货币的优势在于，获取它会成为游戏的主要或次要目标，您可以利用这一目标实现变现。不深入探讨心理学层面，人们购买`VC`的动机通常包括：希望获得游戏捷径、喜欢个性化游戏体验，或纯粹享受购物乐趣。\n\
  \n作为当前游戏中最受欢迎的可购买物品类型之一，`VC`通常以分级套餐形式出售，购买量越大折扣越高。例如：100 积分 0.99 美元、500 积分 3.99\
  \ 美元、5000 积分 29.99 美元，以此类推。\n\n\n\n### 手机游戏盈利策略\n\n许多游戏开发者常用的一种有效策略是，根据游戏内的行为发放`VC`（虚拟货币），例如击碎金砖或通关某一关卡。部分游戏设有计时关卡，玩家在更短时间内通关就能获得更多`VC`。还有些游戏设置了多种类型的`VC`，以便开发者控制不同`VC`的稀缺程度，迫使玩家在购买道具和升级之间做出更谨慎的选择，或者需要投入更多游戏时间来积攒足够的某种`VC`，才能购买特定的升级或物品。\n\
  \n另一种常见策略是让游戏免费，允许玩家自然积累`VC`并购买道具，但同时将快捷方式和作弊功能作为内购项目（`IAPs`）提供，例如让玩家选择更快推进游戏进度——本质上是用真实货币换取快速通关或获得更高分数的能力。这种策略及其变体是非常有效的盈利工具。\n\
  \n市面上有一些与`VC`相关的服务，例如 TapJoy（[`www.tapjoy.com`](http://www.tapjoy.com)），它们不仅能让你的游戏通过`VC`盈利，还能通过向玩家提供额外奖励`VC`的选项来创收。这些服务会提供激励措施，比如“安装这款其他游戏即可获得\
  \ 50 枚金币”或“点击此广告即可获得 25 枚金币”。目前来看，这类服务效果显著。服务商会根据这些行为向作为发行商的你支付等值的真实货币，而玩家们也很喜欢，因为他们无需花费真实货币就能获得梦寐以求的`VC`。\n\
  \n#### 收费与否\n\n在早期手机游戏市场，主要的收入模式是同时提供免费但功能有限的版本和付费的完整功能版本，目的是让玩家在试用版中上瘾后产生更多需求，从而购买付费版。\n\
  \n此后市场格局发生了巨大变化，游戏开发者越来越倾向于向用户“免费”提供更多功能，并更依赖上述“游戏盈利”章节中讨论的盈利模式。深入研究市场，观察新游戏直接采用付费模式后的表现至关重要。你只需查看\
  \ Google Play 商店中热门游戏的详情，就能收集到粗略的信息。如今，用户对从未体验过的付费内容比以往更加谨慎，并且他们拥有众多免费选择，因此可能会直接跳过新推出的付费游戏。\n\
  \n另一方面，Google Play 仍然设有“付费”专区，因此在某些情况下，发布一款你认为能在该专区脱颖而出的付费游戏也是合理的。无论如何，选择很大程度上取决于你产品的吸引力。例如，一款使用了知名授权角色的游戏，无论内容如何，很可能都能卖出销量。而一款没有过往记录的全新游戏，则可能难以售出任何拷贝。在做出决定时，你需要综合考虑所有市场营销因素。\n\
  \n#### 授权许可\n\n授权许可是快速实现游戏盈利的绝佳选择。这里所说的“授权许可”，是指达成一种协议，让另一家公司向你支付费用，以获得发行一定数量游戏副本的权利。例如，某家大型移动服务提供商或智能手机厂商希望在即将发布的新款手机上预装你的游戏，以此作为吸引潜在买家的额外卖点。在这种协议中，该公司可能会要求你允许他们免费预装游戏，或者要求你提供一定的单价报价。\n\
  \n这些公司愿意支付的单价通常比游戏的零售价低好几倍。例如，如果你的游戏售价为 2.99 美元，那么捆绑价格可能为每单位 20 到 50 美分。这完全取决于诸多因素，比如你的游戏受欢迎程度以及预计安装数量。显然，你会争取最有利的协议，但如果你将游戏设计为免费分发，并依赖`VC`和内购（`IAPs`）来盈利，那么你不仅能够承受免费赠送的成本，还能通过大幅扩大的用户基础获得丰厚回报。在这种情况下，最终是多方共赢。\n\
  \n签署任何协议时，务必仔细阅读合同，并协商出最适合自己的条款。这虽然需要前期多投入一些时间和精力，但从长远来看是值得的。\n\n#### 让游戏被发现\n\n\
  目前已有成千上万的安卓游戏在售，还有更多正在涌入。只需滚动浏览 Google Play 上最热门游戏的列表，你肯定会看到许多从未听说过的新游戏，它们来自一些你闻所未闻的新公司。有些开发者运气好，但大多数流行游戏并非偶然走红。它们的发行商懂得如何让游戏被用户发现。\n\
  \n如何让新用户发现你的游戏？“被发现”是任何游戏成功的关键，虽然你总是可以通过花钱购买广告来提高可见度，但这远不如接下来讨论的其他一些方式划算。\n\n#####\
  \ 社交网络整合\n\n如果你还没有使用 Facebook 和 Twitter，那么请立刻放下这本书，等注册完这两个平台后再回来。像这样的社交网站在推广你的游戏方面举足轻重。不过，具体策略一开始并不那么明显。你是否应该只为你的游戏创建一个\
  \ Facebook 页面，然后告诉所有朋友去点赞？这可能会带来几次下载，但仅此而已。发推文有帮助吗？有一点。但这两种方法都无法为你的游戏带来真正实现商业成功所需的可见度。\n\
  \n从营销角度来看，这两个社交网站的一些巨大优势在于：几乎所有人都在使用它们，它们是免费的服务，并且对创意性解决方案非常友好。以下是一些你可以利用这些网站推广游戏的示例：\n\
  - 向在 Facebook 上“点赞”你游戏的用户赠送 50 免费`VC`积分。\n- 向在推文中提及你游戏的用户赠送 50 免费`VC`积分。\n- 使用像\
  \ GREE 这样的服务，每月举办一次高分竞赛，奖品是一部新款安卓设备，并且只允许在 Facebook 上关注你的人报名参与。\n\n在最后一个例子中，你当然需要实际购买一台设备作为奖品，但就激励“点赞”而言，这种策略效果非常显著。创造激励措施，鼓励玩家互相分享你的游戏，这其实很容易，而这些社交网络正是实现此类信息分享的完美平台。\n\
  \nFacebook 和 Twitter 都提供了各自的安卓软件开发工具包（SDK），你可以下载并使用它们将社交网络整合到游戏中。相关具体技术细节经常变化，因此在此处记录意义不大。但两者都相当易用，所以没有理由不去尝试它们！\n\
  \n\n\n#### GREE 平台与发现服务\n\nGREE 近期收购了 OpenFeint，并将其用户迁移至 GREE 平台。GREE 提供虚拟货币、高分榜、成就系统、好友列表等服务。如需了解更多信息，请访问\
  \ GREE 开发者中心：[`https://developer.gree.net/en/`](https://developer.gree.net/en/)。\n\
  \n#### 发现服务\n\n诸如 AppBrain 等公司的唯一目标就是帮助你的游戏获得更多曝光。其他公司，如 TapJoy、Scoreloop 和 Flurry，也提供发现服务。这些服务大多能让你将游戏“嵌入网络”，从而通过其他游戏进行推广。你可以为安装付费并控制推广活动，让大量用户接触到你的游戏。还记得我们提过，TapJoy\
  \ 有一项服务，会让你的玩家因安装其他应用或游戏而获得虚拟货币奖励，并以此向你支付真金白银吗？这就是该模式的另一面：你作为需求方，向 TapJoy 付费，让玩家安装你的游戏，并回馈给玩家虚拟货币。\n\
  \n不同的公司提供不同的发现方法，但简而言之，如果你希望游戏能被发现，并且有预算支持，那么可以考虑使用其中一项或多项服务。当这类服务与良好的社交网络策略相结合时，你或许就能让雪球滚动起来，为游戏制造话题热度。\n\
  \n## 博客与传统网络媒体\n\n另一种让游戏被发现的方法是：为你的故事制作演示内容、创建演示视频，并将这些资料发送给那些评测新 Android 应用和游戏的博客。这些网站的编辑们每天都会收到大量的评测请求，因此请尽量为他们做足功课，一次性提供他们需要的全部信息。保持耐心，你或许能收获一些评测。单凭评测并不能决定一款游戏的成败，但它是创造雪球效应、最终成就一款成功作品的重要组成部分。\n\
  \n#### 可盈利的设计\n\n我们已经讨论了很多游戏盈利的方法，但有一点需要明确：设计一款易于盈利的游戏，远比试图将一款已完成的游戏强行套入盈利模式要容易得多。一款为盈利而设计的游戏可能包含以下一个或多个元素：\n\
  \n- 可影响游戏玩法的可选修改器：\n  - 增益效果\n  - 升级道具\n  - 作弊码\n- 不影响游戏玩法的可选内容：\n  - 皮肤\n  - 角色\n\
  \  - 效果相同的物品变体\n- 额外内容：\n  - 新关卡\n  - 新过场动画\n  - 可解锁的关卡部分\n  - 新部件\n- 具有以下特性的虚拟货币：\n\
  \  - 可通过常规游戏获取\n  - 用于购买升级道具\n  - 用于购买额外内容\n  - 可通过真实货币购买\n\n利用这些元素，你可以从设计之初就为用户提供极具吸引力的理由，促使他们在游戏中购买虚拟货币和虚拟商品。有时，由于新功能的出现或某家公司倒闭，你需要更换虚拟货币服务提供商。这种设计具有足够的普适性，能够在切换基于虚拟货币和购买服务时，避免因修改或删除内容而损害游戏，同时也不会因切换服务耗费过多的开发时间。因此，一款具备以下特性的游戏，可被称为“可盈利的设计”：\n\
  \n- 允许玩家购买虚拟商品和虚拟货币\n- 为玩家购买虚拟商品和虚拟货币提供激励\n\n这套方案并非唯一途径，但无疑是成功的方案之一。许多成功的 Android\
  \ 游戏都以某种形式采用了这套方案。我们建议你考虑它，或者至少留意其核心理念并将其应用到你的游戏中。\n\n#### 可被发现的设计\n\n一款永远无人问津的游戏又有何用？事实是，如今的游戏市场竞争异常激烈，免费的同类游戏多如牛毛。要让你的游戏大获成功，就必须在设计阶段就特别关注玩家将如何发现你的游戏。有些游戏似乎一夜爆红，只是偶然走红，但通常，这些游戏在设计时都对其可发现性进行了深思熟虑。\n\
  \n易于被发现的游戏，除了具备“惊艳”因素和出色的游戏设计外，还应包含其他元素。它们会激励玩家向他人推荐这款游戏。与专为盈利而设计的游戏类似，专为可发现性而设计的游戏也融合了大部分或全部相同的元素（虚拟货币、虚拟商品、可解锁内容、额外内容等），作为激励玩家口口相传的诱因。\n\
  \n以下是一些关于如何在游戏内容中融入激励机制、促使玩家与他人分享游戏的建议：\n\n- 制作只能通过输入其他玩家提供的推荐码才能解锁的内容。\n- 玩家在 Twitter\
  \ 上发布推文、在 Facebook 上分享或点赞游戏，即可获得额外内容或虚拟货币。\n- 玩家每成功推荐一位新用户，便奖励其虚拟货币。\n- 与 Facebook\
  \ 或其他社交媒体集成，自动发布成就和新的高分纪录。\n- 创建游戏在 Facebook 上的独立应用版本，但以某种方式与移动端游戏关联。\n\n增加激励的方式还有很多。只要你能创造性地思考如何奖励玩家分享你的游戏，你就走在了正确的轨道上，你的游戏也将自然而然地变得更受欢迎。\n\
  \n## 总结\n\n仅仅开发一款游戏并将其发布，并不足以让它获得关注或从中盈利。如果你能运用本章概述的一些策略，成功的几率将会大大提高。技术的潮流总是涨落不定，但本章所提供的一般性经验和思路应该是恒久有效的。请将你在这里学到的知识融会贯通，思考如何创造额外的应用和方法，来推广并盈利你的游戏。\n\
  \n"
- '# 15. 发布你的游戏


  成为 Android 游戏开发者的最后一步，就是将你的游戏交付到玩家手中。以下有两种途径可选：


  - 从项目的 `build/` 文件夹中取出 APK 文件，将其上传至网络，然后告诉你的朋友下载并安装到他们的设备上。

  - 像真正的专业人士一样，将你的应用发布到 Google Play 或 Amazon App Store。


  在将游戏发布到 Google Play 商店之前，第一种方案是让其他人测试你的应用的好方法。他们只需获取 APK 文件并安装到自己的设备上即可。真正的乐趣始于你的游戏准备公开发布的时候。


  ## 关于测试的一点说明


  正如我们在前几章中看到的，不同的设备之间存在各种差异。在发布你的应用之前，请确保它能在多种常见设备以及不同 Android 版本上良好运行。解决这个问题有几种方法。你可以购买一组配置不同硬件、运行不同版本
  Android 的设备，进行内部测试；或者，你也可以付费使用任何一种新型的 Android 测试服务。我们很幸运地拥有几款涵盖不同设备类型和世代的手机和平板进行测试。不过，取决于你的预算，这两种方法可能都不可行。你可能不得不依赖模拟器（但不要过度依赖，因为它确实不太可靠），或者最好请几位朋友帮忙。


  另一种测试应用的方法是将测试版发布到 Google Play 商店。Google Play 支持通过邀请制启用测试通道，你可以上传应用的可测试版本，并邀请其他人来测试。




  如果你寻找外部测试人员，请确保测试覆盖了大多数设备型号。较新的设备当然也应该在你的清单上，但这更多是出于兼容性测试而非性能测试的原因。至少，请确保你在一部分谷歌官方设备上进行了测试，包括
  Nexus Pixel、Nexus 6P，甚至 Nexus 6。如果你的游戏在这些设备上运行不佳，那么如果不做出改变，必定会遇到麻烦。


  最后，你必须接受一个事实：你无法在所有设备上测试你的应用程序。你很可能会收到一些无法解释的错误报告，这些错误很可能源于用户运行的定制 ROM 不符合预期行为。无论如何，不要惊慌；这在某种程度上是正常的。不过，如果错误问题过于严重，你就得想办法制定一个应对方案。幸运的是，Google
  Play 在这方面为我们提供了帮助。我们稍后会看到它是如何运作的。


  > **注意：** 除了 Google Play 的错误报告功能外，还有一个好用的解决方案叫做 Android 应用程序崩溃报告（ACRA），这是一个专门用于报告
  Android 应用程序所有崩溃的开源库。其网址为 `http://code.google.com/p/acra/`，并且非常易于使用。只需按照 Google
  Code 页面上的指南将其集成到你的应用程序中即可。


  ## 注册成为开发者


  谷歌使得将你的应用程序发布到 Google Play 商店变得非常简单。你只需注册一个 Android 开发者账户，并支付一次性的 25 美元费用即可。假设你生活在谷歌支持分发应用程序的众多国家/地区之一，该账户将允许你将应用发布到
  Google Play。至于你只能发布免费应用，还是既可以发布免费应用也可以发布付费应用，取决于你所在的国家/地区。要发布付费应用，你必须居住在谷歌那稍短一些的商户支持国家/地区列表中。谷歌还有单独的国家/地区列表，分别用于免费分发应用和付费分发应用。谷歌正在努力扩展这些列表，以便你的应用能够覆盖全球。


  你的 Google Play 商店发布者账户直接与一个 Google 账户绑定。除非限制被解除，否则你不能将发布者账户与 Google 账户分离。在决定是使用现有账户注册还是注册一个新的专用账户时，考虑这一点非常重要。请记住，如果你使用现有的
  Google 账户，并且由于某种原因你的发布者账户被暂停，你将失去对该现有 Google 账户的访问权限。一旦你做出决定并准备好你的 Google 账户，请访问
  `https://play.google.com/apps/publish/signup` 并按照那里的说明注册 Google Play 商店。


  除了你的 Android 开发者账户之外，如果你想销售应用程序，你还需要注册一个免费的 Google Checkout 商户账户。在开发者账户注册过程中，你会有选项执行此操作。我们不是律师，因此此时无法给你任何法律建议，但请确保在销售应用程序之前了解其法律影响。如有疑问，请考虑咨询相关专家。我们并不是想因此吓退你，因为整个过程通常非常顺畅，但你应该准备好向政府税务部门申报你的销售活动。


  谷歌会从你辛苦赚来的收入中抽取一定比例（截至本文撰写时为 30%），用于分发你的应用并提供基础设施。这似乎是各大平台所有应用商店普遍采取的标准分成比例。


  ## 签署你的游戏 APK


  在您成功注册为官方 Android 开发者后，就该准备将您的应用程序发布到 Google Play 了。为了发布你的应用程序，你必须签署 APK 文件。在此之前，你应确保一切就绪。以下是签署
  APK 文件之前需要完成的一系列事项清单：


  *   如果你的构建目标等于或高于 SDK 级别 8（Android 2.2），你还应确保 `<manifest>` 标记中的 `android:installLocation`
  属性设置为 `preferExternal` 或 `auto`。这将满足用户需求，确保你的应用程序在可能的情况下安装到外部存储设备上。


  *   确保只指定你的游戏真正需要的权限。用户不喜欢安装那些似乎要求不必要权限的应用程序。请检查你清单文件中的 `<uses-permission>` 标签。


  再次检查所有这些项目。完成之后，你终于可以按照以下步骤导出一个已签名的 APK 文件，该文件已准备好上传到 Google Play：


  1.  在 Android Studio 中，点击 **Build** ➤ **Generate signed APK**。这将打开生成签名 APK 对话框，如图
  15-1 所示。


  ![A340874_3_En_15_Fig1_HTML.jpg](img/A340874_3_En_15_Fig1_HTML.jpg)


  **图 15-1.** 签名导出对话框


  2.  点击 **Create new. . .** 按钮进入新密钥库对话框，如图 15-2 所示。


  ![A340874_3_En_15_Fig2_HTML.jpg](img/A340874_3_En_15_Fig2_HTML.jpg)


  **图 15-2.** 选择或创建密钥库


  3.  密钥库是一个受密码保护的文件，用于存储签署 APK 文件所用的密钥。由于你尚未创建密钥库，现在将在此对话框中进行创建。


  4.  要创建一个有效的密钥，你必须填写 **别名**、**密码** 和 **有效期（年）** 字段，并在 **名字与姓氏** 字段中输入一个名称。其余字段为可选，但最好还是填写完整。点击
  **下一步**，你将看到最终的对话框，如图 15-3 所示。


  ![A340874_3_En_15_Fig3_HTML.jpg](img/A340874_3_En_15_Fig3_HTML.jpg)


  **图 15-3.** 指定目标文件


  5.  指定导出的 APK 文件应存储的位置，并务必记下路径。稍后想要上传该 APK 时会用到它。点击 **完成**。


  当你想要发布先前已发布应用程序的新版本时，可以直接重复使用你第一次运行向导时创建的密钥库。启动向导，在出现图 15-1 所示的生成签名 APK 对话框时，选择
  **Choose existing. . .** 按钮，提供你之前创建的密钥库文件的位置，并输入该密钥库的密码。只需选择你之前创建的密钥，输入其密码，点击 **下一步**，然后像之前一样继续。在这两种情况下，结果都是一个已签名的
  APK 文件，可以上传到 Google Play。


  > **注意：** 一旦你上传了一个已签名的 APK，你必须使用相同的密钥来签署同一应用程序的任何后续版本。


  至此，你已经创建了第一个签名的 APK——恭喜！现在，我们要给工作带来一点复杂性，向你介绍一下多 APK 支持。对于一个应用，你可以创建多个 APK，这些 APK
  利用设备能力过滤功能，为每位安装你应用的用户提供“最佳适配”。这是一个很棒的特性，因为它意味着你可以执行如下操作：


  *   提供与特定 GPU 兼容的特定图像集

  *   拥有针对旧版 Android 的有限功能集

  *   为更大的屏幕尺寸提供更大尺寸的图形，为其他所有屏幕提供常规尺寸的图形




  随着时间的推移，谷歌无疑会增加更多的筛选条件，但仅凭此处列出的这些条件，你就能精准锁定目标设备（例如平板电脑），而无需大费周章地确保下载包在支持第一代设备的情况下保持合理大小。


  ## 将游戏发布到 Google Play


  现在，是时候登录你在 Google Play 网站上的开发者账户了。直接访问 [`https://play.google.com/apps/publish`](https://play.google.com/apps/publish)
  并进行注册。你将看到如图 15-4 所示的界面。


  ![A340874_3_En_15_Fig4_HTML.jpg](img/A340874_3_En_15_Fig4_HTML.jpg)


  图 15-4. 欢迎来到 Google Play，开发者！


  这个界面就是谷歌所称的 Android 开发者控制台，你在最初注册时已经见过它。现在，我们准备开始实际使用它。点击屏幕右上角的 `Add New Application`
  按钮即可开始操作。这将打开 `Add New Application` 对话框，如图 15-5 所示。


  ![A340874_3_En_15_Fig5_HTML.jpg](img/A340874_3_En_15_Fig5_HTML.jpg)


  图 15-5. Android 开发者控制台的“添加新应用”对话框


  填写完应用标题后，点击 `Upload APK` 按钮。


  此时你应该会看到如图 15-6 所示的界面。在这里，你可以上传你的 APK 文件并最终完成应用上架。


  ![A340874_3_En_15_Fig6_HTML.jpg](img/A340874_3_En_15_Fig6_HTML.jpg)


  图 15-6. 上传 APK


  在这里，你可以选择将 APK 文件上传到 `Production`、`Beta` 或 `Alpha` 渠道。谷歌让应用发布到 Google Play 变得非常简单。


  ## 发布！


  提供所有信息后，点击页面底部的巨大 `Publish` 按钮，让你的游戏触达全球数百万用户！审核流程已被取消，因此经过一两个小时的服务器传播后，你的游戏就会在
  Google Play 商店中面向所有支持的设备上线。


  ## 关于开发者控制台的更多信息


  一旦你的游戏在 Google Play 上发布，你肯定想追踪它的状态。到目前为止有多少人下载了它？是否发生过崩溃？用户们在说什么？你可以在 Android 开发者控制台（参见图
  15-4）中查看所有这些信息。


  对于你发布的每个应用，你可以获得以下几条信息：


  - 游戏的整体评分及评分数量

  - 用户评论（只需点击相应应用的 `Comments` 链接即可）

  - 应用的安装次数

  - 应用的活跃安装数

  - 错误报告


  ## 总结


  在 Google Play 上发布游戏轻而易举，而且门槛很低。现在，你已经拥有了在 Android 上设计、实现并发布你的第一款游戏所需的所有知识。愿原力与你同在！



