  \ 9-2.\nSettings.java，我们稍作修改的设置类，借用于 Mr. Nom\n```\n\n与此类在 Mr. Nom 版本中的唯一区别在于，我们读写设置的文件名发生了改变。我们现在使用的文件是`.superjumper`，而不是`.mrnom`。\n\
  \n## 主 Activity\n\n我们需要一个 `Activity` 类作为游戏的主入口点。我们将其命名为 `SuperJumper`。清单 9-3 展示了它的代码。\n\
  \n```\npackage com.badlogic.androidgames.jumper;\nimport javax.microedition.khronos.egl.EGLConfig;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport com.badlogic.androidgames.framework.Screen;\n\
  import com.badlogic.androidgames.framework.impl.GLGame;\npublic class SuperJumper\
  \ extends GLGame {\nboolean firstTimeCreate = true;\npublic Screen getStartScreen()\
  \ {\nreturn new MainMenuScreen(this);\n}\n@Override\npublic void onSurfaceCreated(GL10\
  \ gl, EGLConfig config) {\nsuper.onSurfaceCreated(gl,config);\nif(firstTimeCreate)\
  \ {\nSettings.load(getFileIO());\nAssets.load(this);\nfirstTimeCreate = false;\n\
  } else {\nAssets.reload();\n}\n}\n@Override\npublic void onPause() {\nsuper.onPause();\n\
  if(Settings.soundEnabled)\nAssets.music.pause();\n}\n}\n清单 9-3.\nSuperJumper.java，主入口点类\n\
  ```\n\n我们继承自 `GLGame`，并实现了 `getStartScreen()` 方法，该方法返回一个 `MainMenuScreen` 实例。另外两个方法则不那么显而易见。\n\
  \n我们重写了 `onSurfaceCreate()` 方法，这个方法在每次 OpenGL ES 上下文被重新创建时都会被调用（可对比第 7 章中 `GLGame`\
  \ 的代码）。如果这是该方法第一次被调用，我们使用 `Assets.load()` 方法加载所有资源，并尝试从 SD 卡上的设置文件加载设置。否则，我们只需要重新加载纹理，并通过\
  \ `Assets.reload()` 方法开始播放音乐。我们还重写了 `onPause()` 方法，以便在音乐正在播放时暂停它。我们这样做是为了避免在我们的屏幕的\
  \ `resume()` 和 `pause()` 方法中重复这些操作。\n\n在深入探讨屏幕实现之前，让我们先看看新的 `Font` 类。\n\n### Font\
  \ 类\n\n我们将使用位图字体来渲染任意（ASCII）文本。我们已经讨论了这在高级层面上的工作原理，现在让我们来看看清单 9-4 中的代码。\n\n```\n\
  package com.badlogic.androidgames.framework.gl;\npublic class Font {\npublic final\
  \ Texture texture;\npublic final int glyphWidth;\npublic final int glyphHeight;\n\
  public final TextureRegion[] glyphs = new TextureRegion[96];\n清单 9-4.\nFont.java：一个位图字体渲染类\n\
  ```\n\n该类存储了包含字体的纹理、单个字形的宽度和高度，以及一个 `TextureRegion` 实例数组——每个字形对应一个实例。数组中的第一个元素保存空格字形的区域，下一个元素保存感叹号字形的区域，以此类推。换句话说，第一个元素对应\
  \ ASCII 码为 32 的字符，最后一个元素对应 ASCII 码为 126 的字符。\n\n```\npublic Font(Texture texture,\n\
  int offsetX, int offsetY,\nint glyphsPerRow, int glyphWidth, int glyphHeight) {\n\
  this.texture = texture;\nthis.glyphWidth = glyphWidth;\nthis.glyphHeight = glyphHeight;\n\
  int x = offsetX;\nint y = offsetY;\nfor(int i = 0; i < 96; i++) {\nglyphs[i] = new\
  \ TextureRegion(texture, x, y, glyphWidth, glyphHeight);\nx += glyphWidth;\nif(x\
  \ == offsetX + glyphsPerRow * glyphWidth) {\nx = offsetX;\ny += glyphHeight;\n}\n\
  }\n}\n```\n\n在构造函数中，我们存储了位图字体的配置，并生成了字形区域。`offsetX` 和 `offsetY` 参数指定了纹理中位图字体区域的左上角坐标。在我们的纹理图集中，那是位于\
  \ (224,0) 的像素。参数 `glyphsPerRow` 告诉我们每行有多少个字型，而参数 `glyphWidth` 和 `glyphHeight` 则指定了单个字型的大小。由于我们使用的是固定宽度的位图字体，所有字型的大小都相同。`glyphWidth`\
  \ 也是我们在渲染多个字型时要前进的宽度值。\n\n```\npublic void drawText(SpriteBatcher batcher, String\
  \ text, float x, float y) {\nint len = text.length();\nfor(int i = 0; i < len; i++)\
  \ {\nint c = text.charAt(i) - ' ';\nif(c < 0 || c > glyphs.length - 1)\ncontinue;\n\
  TextureRegion glyph = glyphs[c];\nbatcher.drawSprite(x, y, glyphWidth, glyphHeight,\
  \ glyph);\nx += glyphWidth;\n}\n}\n```\n\n`drawText()` 方法接收一个 `SpriteBatcher` 实例、一行文本，以及开始绘制文本的\
  \ x 和 y 坐标。x 和 y 坐标指定了第一个字型的中心。我们要做的就是从字符串中获取每个字符的索引，检查是否有对应的字型，如果有，则通过 `SpriteBatcher`\
  \ 渲染它。然后我们按 `glyphWidth` 增加 x 坐标，以便开始渲染字符串中的下一个字符。\n\n你可能想知道为什么不需要绑定包含字型的纹理。我们假设这是在调用\
  \ `drawText()` 之前完成的。原因在于，文本渲染可能是某个批处理的一部分，在这种情况下，纹理必须已经绑定。为什么要在 `drawText()` 方法中不必要地再次绑定它呢？请记住，OpenGL\
  \ ES 最喜欢的就是尽可能少的状态变化。\n\n当然，我们只能通过这个类处理固定宽度的字体。如果我们想要支持更通用的字体，我们还需要知道每个字符的步进值。一种解决方案是使用字距调整，正如前面“使用位图字体处理文本”一节中所述。不过，我们对这个简单的解决方案很满意。\n\
  \n##### GLScreen 类\n\n在前两章的示例中，我们总是通过类型转换来获取 `GLGraphics` 的引用。让我们用一个名为 `GLScreen`\
  \ 的辅助类来解决这个问题，它将为我们完成这项工作，并将对 `GLGraphics` 的引用存储在一个成员变量中。清单 9-5 展示了代码。\n\n```\n\
  package com.badlogic.androidgames.framework.impl;\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Screen;\npublic abstract class GLScreen\
  \ extends Screen {\nprotected final GLGraphics glGraphics;\nprotected final GLGame\
  \ glGame;\npublic GLScreen(Game game) {\nsuper(game);\nglGame = (GLGame)game;\n\
  glGraphics = glGame.getGLGraphics();\n}\n}\n清单 9-5.\nGLScreen.java：一个小的辅助类\n```\n\
  \n\n\n我们在 `GLScreen` 类中存储了 `GLGraphics` 和 `GLGame` 实例。当然，如果作为参数传递给构造函数的 `Game` 实例不是\
  \ `GLGame`，这会导致崩溃，但我们会确保其类型正确。Super Jumper 的所有屏幕都将继承自此类。\n\n##### 主菜单屏幕\n\n主菜单屏幕是由\
  \ `SuperJumper.getStartScreen()` 返回的屏幕，因此它是玩家看到的第一个画面。它渲染背景和 UI 元素，并静静等待玩家点击任一 UI\
  \ 元素。根据被点击的元素，游戏要么更改配置（音效启用/禁用），要么切换到新屏幕。清单 9-6 展示了相关代码。\n\n```\npackage com.badlogic.androidgames.jumper;\n\
  import java.util.List;\nimport javax.microedition.khronos.opengles.GL10;\nimport\
  \ com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class MainMenuScreen extends GLScreen {\nCamera2D guiCam;\nSpriteBatcher\
  \ batcher;\nRectangle soundBounds;\nRectangle playBounds;\nRectangle highscoresBounds;\n\
  Rectangle helpBounds;\nVector2 touchPoint;\n清单 9-6.\nMainMenuScreen.java：主菜单屏幕\n\
  ```\n\n该类继承自 `GLScreen`，因此我们可以更方便地访问 `GLGraphics` 实例。\n\n该类中有几个成员。第一个是名为 `guiCam`\
  \ 的 `Camera2D` 实例。我们还需要一个 `SpriteBatcher` 来渲染背景和 UI 元素。我们将使用矩形来判断用户是否触摸了 UI 元素。由于使用了\
  \ `Camera2D`，我们还需要一个 `Vector2` 实例来将触摸坐标转换为世界坐标。\n\n```\npublic MainMenuScreen(Game\
  \ game) {\nsuper(game);\nguiCam = new Camera2D(glGraphics, 320, 480);\nbatcher =\
  \ new SpriteBatcher(glGraphics, 100);\nsoundBounds = new Rectangle(0, 0, 64, 64);\n\
  playBounds = new Rectangle(160 - 150, 200 + 18, 300, 36);\nhighscoresBounds = new\
  \ Rectangle(160 - 150, 200 - 18, 300, 36);\nhelpBounds = new Rectangle(160 - 150,\
  \ 200 - 18 - 36, 300, 36);\ntouchPoint = new Vector2();\n}\n```\n\n在构造函数中，我们简单地初始化所有成员。这里有一个惊喜：`Camera2D`\
  \ 实例允许我们在目标分辨率 320×480 像素下工作。我们只需将视锥体的宽度和高度设置为适当的值，其余工作由 OpenGL ES 实时完成。但请注意，原点仍在左下角，且\
  \ y 轴指向上方。我们将在所有包含 UI 元素的屏幕中使用这种 GUI 相机，以便以像素为单位而非世界坐标进行布局。当然，对于非 320×480 像素宽的屏幕，我们略作取巧，但正如在\
  \ Mr. Nom 中那样，我们不必为此感到不安。因此，为每个 UI 元素设置的矩形都以像素坐标给出。\n\n```\n@Override\npublic void\
  \ update(float deltaTime) {\nList touchEvents = game.getInput().getTouchEvents();\n\
  game.getInput().getKeyEvents();\nint len = touchEvents.size();\nfor(int i = 0; i\
  \ < len; i++) {\nTouchEvent event = touchEvents.get(i);\nif(event.type == TouchEvent.TOUCH_UP)\
  \ {\ntouchPoint.set(event.x, event.y);\nguiCam.touchToWorld(touchPoint);\nif(OverlapTester.pointInRectangle(playBounds,\
  \ touchPoint)) {\nAssets.playSound(Assets.clickSound);\ngame.setScreen(new GameScreen(game));\n\
  return;\n}\nif(OverlapTester.pointInRectangle(highscoresBounds, touchPoint)) {\n\
  Assets.playSound(Assets.clickSound);\ngame.setScreen(new HighscoreScreen(game));\n\
  return;\n}\nif(OverlapTester.pointInRectangle(helpBounds, touchPoint)) {\nAssets.playSound(Assets.clickSound);\n\
  game.setScreen(new HelpScreen(game));\nreturn;\n}\nif(OverlapTester.pointInRectangle(soundBounds,\
  \ touchPoint)) {\nAssets.playSound(Assets.clickSound);\nSettings.soundEnabled =\
  \ !Settings.soundEnabled;\nif(Settings.soundEnabled)\nAssets.music.play();\nelse\n\
  Assets.music.pause();\n}\n}\n}\n}\n```\n\n接下来是 `update()` 方法。我们遍历 `Input` 实例返回的\
  \ `TouchEvents`，并检查触摸事件。如果检测到此类事件，我们首先将触摸坐标转换为世界坐标。由于相机的设置使我们工作在目标分辨率下，这种转换在 320×480\
  \ 像素的屏幕上简化为对 y 坐标的翻转。在更大或更小的屏幕上，我们只需将触摸坐标转换到目标分辨率。获得世界触摸点后，我们将其与 UI 元素的矩形进行碰撞检测。如果点击了\
  \ PLAY、HIGHSCORES 或 HELP，则切换到相应屏幕。如果按下音效按钮，则更改设置，并继续播放或暂停音乐。另请注意，通过 `Assets.playSound()`\
  \ 方法，在按下 UI 元素时会播放点击音效。\n\n```\n@Override\npublic void present(float deltaTime)\
  \ {\nGL10 gl = glGraphics.getGL();\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\nguiCam.setViewportAndMatrices();\n\
  gl.glEnable(GL10.GL_TEXTURE_2D);\nbatcher.beginBatch(Assets.background);\nbatcher.drawSprite(160,\
  \ 240, 320, 480, Assets.backgroundRegion);\nbatcher.endBatch();\ngl.glEnable(GL10.GL_BLEND);\n\
  gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\nbatcher.beginBatch(Assets.items);\n\
  batcher.drawSprite(160, 480 - 10 - 71, 274, 142, Assets.logo);\nbatcher.drawSprite(160,\
  \ 200, 300, 110, Assets.mainMenu);\nbatcher.drawSprite(32, 32, 64, 64, Settings.soundEnabled?Assets.soundOn:Assets.soundOff);\n\
  batcher.endBatch();\ngl.glDisable(GL10.GL_BLEND);\n}\n```\n\n`present()` 方法在此时已无需过多解释，我们之前已经做过类似工作。我们清屏，通过相机设置投影矩阵，并渲染背景和\
  \ UI 元素。由于 UI 元素具有透明背景，我们临时启用混合来渲染它们。背景不需要混合，因此为了节省 GPU 周期，我们未使用混合。再次强调，UI 元素是在原点位于屏幕左下角、y\
  \ 轴指向上方的坐标系中渲染的。\n\n```\n@Override\npublic void pause() {\nSettings.save(game.getFileIO());\n\
  }\n@Override\npublic void resume() {\n}\n@Override\npublic void dispose() {\n}\n\
  ```\n\n最后一个实际执行操作的方法是 `pause()`。在这里，我们确保设置被保存到 SD 卡，因为玩家可以在此界面更改音效设置。\n\n##### 帮助屏幕\n\
  \n\n\n我们有总共五个帮助屏幕，它们的工作方式相同：加载帮助屏幕图像，将其与箭头按钮一起渲染，并等待触摸箭头按钮以移动到下一个屏幕。这些屏幕的不同之处仅在于每个屏幕加载的图像以及每个屏幕切换到的屏幕。出于这个原因，我们只查看第一个帮助屏幕的代码，如清单\
  \ 9-7 所示，该屏幕会切换到第二个帮助屏幕。帮助屏幕的图像文件被命名为`help1.png`、`help2.png`，以此类推，直到`help5.png`。相应的屏幕类被称为`HelpScreen`、`Help2Screen`，以此类推。最后一个屏幕`Help5Screen`会切换回`MainMenuScreen`。\n\
  \n```\npackage com.badlogic.androidgames.jumper;\nimport java.util.List;\nimport\
