  \ {\nif(event.x > 256 && event.y > 416 ) {\ngame.setScreen(new HelpScreen2(game));\n\
  if(Settings.soundEnabled)\nAssets.click.play(1);\nreturn;\n}\n}\n}\n}\n@Override\n\
  public void present(float deltaTime) {\nGraphics g = game.getGraphics();\ng.drawPixmap(Assets.background,\
  \ 0, 0);\ng.drawPixmap(Assets.help1, 64, 100);\ng.drawPixmap(Assets.buttons, 256,\
  \ 416, 0, 64, 64, 64);\n}\n@Override\npublic void pause() {\n}\n@Override\npublic\
  \ void resume() {\n}\n@Override\npublic void dispose() {\n}\n}\n```\n\n**清单 6-6.\
  \ HelpScreen.java：第一个帮助屏幕**\n\n再次强调，这非常简单。我们继承自`Screen`并实现了一个适当的构造函数。接下来是我们熟悉的`update()`方法，它只是检查底部的按钮是否被按下。如果是，我们播放点击声音并转换到`HelpScreen2`。\n\
  \n`present()`方法只是再次渲染背景，然后是帮助图像和按钮。\n\n`HelpScreen2`和`HelpScreen3`类看起来相同；唯一的区别是它们绘制的帮助图像以及转换到的屏幕。我们可以同意不必查看它们的代码。接下来进入高分屏幕！\n\
  \n##### 高分屏幕\n\n高分屏幕只是绘制存储在`Settings`类中的前五个高分，加上一个告诉玩家他/她正在高分屏幕上的花哨标题，以及在左下角的一个按钮，按下时将转换回主菜单。有趣的部分是我们如何渲染高分。让我们先看看我们在哪里渲染图像，如图\
  \ 6-4 所示。\n\n![A340874_3_En_6_Fig4_HTML.jpg](img/A340874_3_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4. 没有高分的高分屏幕**\n\n这看起来和我们实现的其他屏幕一样简单。但是，我们如何绘制动态分数呢？\n\n## 渲染数字：一个插曲\n\n\
  我们有一个名为`numbers.png`的资源图像，其中包含从 0 到 9 的所有数字以及一个点。每个数字是 20×32 像素，点是 10×32 像素。数字从左到右按升序排列。高分屏幕应显示五行，每行显示五个高分之一。其中一行将以高分的名次（例如“1.”或“5.”）开头，后跟一个空格，然后是该分数的实际值。我们该怎么做呢？\n\
  \n我们拥有两样东西：`numbers.png`图像和`Graphics.drawPixmap()`方法，该方法允许我们将图像的一部分绘制到屏幕上。假设我们希望默认高分的第一个字符串（值为“1.\
  \ 100”）在`(20,100)`处渲染，以便数字 1 的左上角与该坐标重合。我们像这样调用`Graphics.drawPixmap()`：\n\n```java\n\
  game.getGraphics().drawPixmap(Assets.numbers, 20, 100, 20, 0, 20, 32);\n```\n\n\
  我们知道数字 1 的宽度是 20 像素。字符串中的下一个字符必须在`(20+20,100)`处渲染。在字符串“1. 100”的情况下，这个字符是点，它在`numbers.png`图像中的宽度是\
  \ 10 像素：\n\n```java\ngame.getGraphics().drawPixmap(Assets.numbers, 40, 100, 200,\
  \ 0, 10, 32);\n```\n\n字符串中的下一个字符需要在`(20+20+10,100)`处渲染。该字符是一个空格，我们不需要绘制它。我们需要做的就是在\
  \ x 轴上再前进 20 像素，因为我们假设这就是空格字符的宽度。因此，下一个字符 1 将在`(20+20+10+20,100)`处渲染。看到规律了吗？\n\n\
  给定字符串中第一个字符的左上角坐标，我们可以遍历字符串的每个字符，绘制它，并根据刚刚绘制的字符将下一个要绘制字符的 x 坐标增加 20 或 10 像素。\n\n\
  我们还需要根据当前字符确定应该绘制`numbers.png`图像的哪个部分。为此，我们需要该部分左上角的 x 和 y 坐标，以及它的宽度和高度。y 坐标始终为\
  \ 0，这在看图 6-1 时应该是显而易见的。高度也是一个常量——在我们的例子中是 32。宽度要么是 20 像素（如果字符串的字符是数字），要么是 10 像素（如果是一个点）。我们唯一需要计算的是`numbers.png`图像中该部分的\
  \ x 坐标。我们可以通过使用以下巧妙的小技巧来实现。\n\n字符串中的字符可以解释为 Unicode 字符或 16 位整数。这意味着我们可以对这些字符代码进行计算。幸运的是，字符\
  \ 0 到 9 具有递增的整数表示形式。我们可以利用这一点来计算数字的`number.png`图像部分的 x 坐标，如下所示：\n\n```java\nchar\
  \ character = string.charAt(index);\nint x = (character - '0') * 20;\n```\n\n\n\n\
  表达式 `(character - '0')` 将 ASCII 字符转换为其数值。对于字符 `'0'`，这会得到 `0`；对于字符 `'3'`，这会得到 `3\
  \ * 20 = 60`，依此类推。这恰好是每个数字对应图块区域的 x 坐标。当然，这种方法对点号字符不起作用，所以我们需要特殊处理它。让我们将这个功能总结为一个方法，该方法可以根据给定的字符串行以及渲染起始位置的\
  \ `x` 和 `y` 坐标，渲染一条高分榜行：\n\n```java\npublic void drawText(Graphics g, String line,\
  \ int x, int y) {\n    int len = line.length();\n    for (int i = 0; i < len; i++)\
  \ {\n        char character = line.charAt(i);\n        if (character == ' ') {\n\
  \            x += 20;\n            continue;\n        }\n        int srcX;\n   \
  \     int srcWidth;\n        if (character == '.') {\n            srcX = 200;\n\
  \            srcWidth = 10;\n        } else {\n            srcX = (character - '0')\
  \ * 20;\n            srcWidth = 20;\n        }\n        g.drawPixmap(Assets.numbers,\
  \ x, y, srcX, 0, srcWidth, 32);\n        x += srcWidth;\n    }\n}\n```\n\n我们遍历字符串中的每个字符。如果当前字符是空格，我们只需将\
  \ `x` 坐标增加 20 像素。否则，我们计算当前字符在 `numbers.png` 图像中对应区域的 `x` 坐标和宽度。该字符要么是数字，要么是点号。然后我们渲染当前字符，并将渲染的\
  \ `x` 坐标增加刚刚绘制字符的宽度。如果我们的字符串包含空格、数字和点号以外的任何字符，此方法当然会出错。你能想出办法让它能处理任意字符串吗？\n\n##\
  \ 实现屏幕\n\n掌握了这些新知识，我们现在可以轻松地实现 `HighscoreScreen` 类，如代码清单 6-7 所示。\n\n```java\npackage\
  \ com.badlogic.androidgames.mrnom;\n\nimport java.util.List;\n\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Screen;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\n\npublic class HighscoreScreen\
  \ extends Screen {\n    String lines[] = new String[5];\n\n    public HighscoreScreen(Game\
  \ game) {\n        super(game);\n        for (int i = 0; i < 5; i++) {\n       \
  \     lines[i] = \"\" + (i + 1) + \". \" + Settings.highscores[i];\n        }\n\
  \    }\n}\n```\n\n*代码清单 6-7. `HighscoreScreen.java`：展示我们迄今为止的最佳成就*\n\n为了与垃圾回收器保持友好关系，我们将五条高分榜行的字符串存储在一个字符串数组成员中。我们在构造函数中，基于\
  \ `Settings.highscores` 数组构造这些字符串。\n\n```java\n    @Override\n    public void update(float\
  \ deltaTime) {\n        List touchEvents = game.getInput().getTouchEvents();\n \
  \       game.getInput().getKeyEvents();\n        int len = touchEvents.size();\n\
  \        for (int i = 0; i < len; i++) {\n            TouchEvent event = touchEvents.get(i);\n\
  \            if (event.type == TouchEvent.TOUCH_UP) {\n                if (event.x\
  \ < 64 && event.y > 416) {\n                    if(Settings.soundEnabled)\n    \
  \                    Assets.click.play(1);\n                    game.setScreen(new\
  \ MainMenuScreen(game));\n                    return;\n                }\n     \
  \       }\n        }\n    }\n```\n\n接下来，我们定义 `update()` 方法，它平淡无奇。我们所要做的只是检查是否有触摸抬起事件按下了左下角的按钮。如果是这种情况，我们就播放点击音效并切换回主菜单屏幕。\n\
  \n```java\n    @Override\n    public void present(float deltaTime) {\n        Graphics\
  \ g = game.getGraphics();\n        g.drawPixmap(Assets.background, 0, 0);\n    \
  \    g.drawPixmap(Assets.mainMenu, 64, 20, 0, 42, 196, 42);\n        int y = 100;\n\
  \        for (int i = 0; i < 5; i++) {\n            drawText(g, lines[i], 20, y);\n\
  \            y += 50;\n        }\n        g.drawPixmap(Assets.buttons, 0, 416, 64,\
  \ 64, 64, 64);\n    }\n```\n\n借助我们之前定义的强大 `drawText()` 方法，`present()` 方法相当简单。像往常一样，我们首先渲染背景图像，然后是\
  \ `Assets.mainmenu` 图像中的“HIGHSCORES”部分。我们本可以将它存储在单独的文件中，但为了释放更多内存而重用了它。\n\n接下来，我们遍历构造函数中为每条高分榜行创建的五个字符串。我们使用\
  \ `drawText()` 方法绘制每一行。第一行从 `(20,100)` 开始，下一行在 `(20,150)` 处渲染，依此类推。我们只是将文本渲染的 `y`\
  \ 坐标每行增加 50 像素，这样行与行之间就有了漂亮的垂直间距。最后，我们绘制按钮来结束此方法。\n\n```java\n    public void drawText(Graphics\
  \ g, String line, int x, int y) {\n        int len = line.length();\n        for\
  \ (int i = 0; i < len; i++) {\n            char character = line.charAt(i);\n  \
  \          if (character == ' ') {\n                x += 20;\n                continue;\n\
  \            }\n            int srcX = 0;\n            int srcWidth = 0;\n     \
  \       if (character == '.') {\n                srcX = 200;\n                srcWidth\
  \ = 10;\n            } else {\n                srcX = (character - '0') * 20;\n\
  \                srcWidth = 20;\n            }\n            g.drawPixmap(Assets.numbers,\
  \ x, y, srcX, 0, srcWidth, 32);\n            x += srcWidth;\n        }\n    }\n\n\
  \    @Override\n    public void pause() {\n    }\n\n    @Override\n    public void\
  \ resume() {\n    }\n\n    @Override\n    public void dispose() {\n    }\n}\n```\n\
  \n其余的方法应该不言自明。让我们进入 Mr. Nom 游戏中缺失的最后一部分：游戏屏幕。\n\n## 抽象 Mr. Nom 的世界：模型、视图、控制器\n\n\
  到目前为止，我们只实现了枯燥的 UI 内容以及一些用于资源和设置的管理代码。现在，我们将抽象 Mr. Nom 的世界及其中的所有对象。我们还将把 Mr. Nom\
  \ 从屏幕分辨率中解放出来，让它在自己独立的小世界中活动，使用它自己的小坐标系。\n\n如果你是一位资深程序员，你可能听说过设计模式。它们或多或少是针对特定场景设计代码的策略。其中一些是理论性的，另一些则在现实世界中有实际用途。对于游戏开发，我们可以从模型-视图-控制器（MVC）设计模式中借鉴一些理念。它经常被数据库和\
  \ Web 社区用来将数据模型与表示层和数据操作层分离。我们不会严格遵循这种设计模式，而是将其简化后加以应用。\n\n那么，这对 Mr. Nom 意味着什么呢？首先，我们需要一个世界的抽象表示，它独立于任何位图、声音、帧缓冲区或输入事件。相反，我们将以面向对象的方式，用几个简单的类来建模\
  \ Mr. Nom 的世界。我们将有一个用于世界中污渍的类，以及一个用于 Mr. Nom 本身的类。Mr. Nom 由一个头部和若干尾部部分组成，我们也用单独的类来表示它们。为了将所有内容联系在一起，我们将有一个无所不包的类来表示\
  \ Mr. Nom 的完整世界，包括污渍和 Mr. Nom 本身。所有这些构成了 MVC 中的模型部分。\n\nMVC 中的视图将是负责渲染 Mr. Nom 世界的代码。我们将有一个类或方法，它接收世界类，读取其当前状态，并将其渲染到屏幕上。如何渲染并不涉及模型类，这是从\
  \ MVC 中学到的最重要的经验。模型类独立于一切，但视图类和方法依赖于模型类。\n\n最后，我们有 MVC 中的控制器。它根据用户输入或时间流逝等因素，指示模型类改变其状态。模型类向控制器提供方法（例如，使用“让\
  \ Mr. Nom 向左转”这样的指令），控制器随后可以使用这些方法来修改模型的状态。我们在模型类中没有任何直接访问触摸屏或加速度计等内容的代码。这样，我们可以保持模型类不受任何外部依赖的影响。\n\
  \n\n\n### Mr. Nom 的世界：模型、视图与控制器\n\n这听起来可能有些复杂，您或许会疑惑为何要采用这种方式。然而，这种做法有许多好处。我们可以在无需了解图形、音频或输入设备的情况下实现所有游戏逻辑。我们可以修改游戏世界的渲染方式，而无需更改模型类本身。我们甚至可以用\
  \ 3D 世界渲染器替换 2D 世界渲染器。通过使用控制器，我们可以轻松添加对新输入设备的支持。控制器所做的一切就是将输入事件转换为模型类的方法调用。想通过加速度计控制\
  \ Mr. Nom？没问题——只需在控制器中读取加速度计数值，并将其转换为对 Mr. Nom 模型的“向左转”或“向右转”方法调用。想添加对 Zeemote 手柄的支持？也没问题，只需像处理加速度计那样做就行！使用控制器最棒的一点是，我们无需修改\
  \ Mr. Nom 的代码中的任何一行，就能实现这一切。\n\n让我们从定义 Mr. Nom 的世界开始。为此，我们将稍微偏离严格的 MVC 模式，借助图形素材来说明基本概念。这也有助于我们后续实现视图组件（将\
  \ Mr. Nom 的抽象世界渲染为像素）。\n\n图 6-5 显示了游戏屏幕，Mr. Nom 的世界以网格形式叠加在其上。\n\n![A340874_3_En_6_Fig5_HTML.jpg](img/A340874_3_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5.** Mr. Nom 的世界叠加在游戏屏幕上\n\n请注意，Mr. Nom 的世界被限定在一个 10×13 的网格中。我们使用坐标系来定位单元格，原点位于左上角`(0,0)`，延伸至右下角`(9,12)`。Mr.\
  \ Nom 的每个部分都必须位于这些单元格之一内，因此在这个世界中具有整数`x`和`y`坐标。这个世界的污渍也是如此。Mr. Nom 的每个部分都恰好占据一个\
  \ 1×1 单位的单元格。请注意，单位类型无关紧要——这是我们自己的想象世界，不受国际单位制或像素的束缚！\n\nMr. Nom 不能离开这个小世界。如果他穿过了某条边界，他就会从另一边出现，他的所有部位也会随之移动。（顺便说一句，我们在地球上也面临同样的问题——朝任何一个方向走足够远，你最终会回到起点。）Mr.\
  \ Nom 也只能一个单元格一个单元格地前进。他的所有部位始终位于整数坐标上。例如，他永远不可能占据两个半单元格。\n\n> **注意：** 如前所述，我们这里使用的并非严格的\
  \ MVC 模式。如果您对 MVC 模式的实际定义感兴趣，我们建议您阅读[Erich Gamma](http://www.amazon.com/Erich-Gamma/e/B000AQ3QWI/ref=ntt_athr_dp_pel_1)、[Richard\
  \ Helm](http://www.amazon.com/Richard-Helm/e/B000AQ1ZP8/ref=ntt_athr_dp_pel_2)、[Ralph\
  \ Johnson](http://www.amazon.com/Ralph-Johnson/e/B000AQ6RMY/ref=ntt_athr_dp_pel_3)和[John\
  \ M. Vlissides](http://www.amazon.com/s/ref=ntt_athr_dp_sr_4?_encoding=UTF8&sort=relevancerank&search-alias=books&field-author=John%20M.%20Vlissides)（即“四人帮”）合著的《设计模式：可复用面向对象软件的基础》（Addison-Wesley,\
  \ 1994）。在他们的书中，MVC 模式被称为观察者模式。\n\n### 污渍类\n\nMr. Nom 世界中最简单的对象是污渍。它只是静静地待在世界的某个单元格中，等待被吃掉。在设计\
  \ Mr. Nom 时，我们为污渍创建了三种不同的视觉表现形式。在 Mr. Nom 的世界中，污渍的类型并无区别，但我们仍然将其包含在`Stain`类中。代码清单\
  \ 6-8 展示了`Stain`类。\n\n```java\npackage com.badlogic.androidgames.mrnom;\npublic\
  \ class Stain {\n    public static final int TYPE_1 = 0;\n    public static final\
  \ int TYPE_2 = 1;\n    public static final int TYPE_3 = 2;\n    public int x, y;\n\
  \    public int type;\n    public Stain(int x, int y, int type) {\n        this.x\
  \ = x;\n        this.y = y;\n        this.type = type;\n    }\n}\n```\n\n**代码清单\
  \ 6-8.** `Stain.java`\n\n`Stain`类定义了三个公共静态常量，用于编码污渍的类型。每个`Stain`实例有三个成员：在 Mr. Nom\
  \ 世界中的`x`和`y`坐标，以及一个`type`，它是之前定义的某个常量。为了让代码更简洁，我们没有按照常规做法包含 getter 和 setter 方法。最后，我们添加了一个便捷的构造函数，可以轻松实例化`Stain`对象。\n\
  \n需要注意的是，该类与图形、声音或其他类没有任何关联。`Stain`类是独立的，自豪地编码了 Mr. Nom 世界中污渍的各个属性。\n\n### 蛇与蛇身部位类\n\
  \nMr. Nom 就像一条移动的链条，由相互连接的部位组成；当我们抓住一个部位并拖动它时，所有部位都会随之移动。每个部位占据 Mr. Nom 世界中的一个单元格，就像污渍一样。在我们的模型中，不区分头部和尾部，因此可以使用一个类来表示\
  \ Mr. Nom 的两种部位。代码清单 6-9 展示了`SnakePart`类，用于定义 Mr. Nom 的各个部位。\n\n```java\npackage\
  \ com.badlogic.androidgames.mrnom;\npublic class SnakePart {\n    public int x,\
  \ y;\n    public SnakePart(int x, int y) {\n        this.x = x;\n        this.y\
  \ = y;\n    }\n}\n```\n\n**代码清单 6-9.** `SnakePart.java`\n\n这基本上与`Stain`类相同——只是移除了`type`成员。Mr.\
  \ Nom 世界模型中第一个真正有趣的类是`Snake`类。让我们思考一下它需要具备哪些功能：\n\n* 必须存储头部和尾部部位。\n* 必须知道 Mr. Nom\
  \ 当前朝向哪个方向。\n* 当 Mr. Nom 吃掉污渍时，必须能够长出一个新的尾部。\n* 必须能够沿当前方向移动一个单元格。\n\n第一点和第二点很容易实现。我们只需要一个`SnakePart`实例的列表——列表中的第一个部位是头部，其余部位构成尾部。Mr.\
  \ Nom 可以向上、下、左、右移动。我们可以用一些常量来编码这些方向，并将当前方向存储在`Snake`类的成员中。\n\n第三点也并不复杂。我们只需在已有的部位列表中添加一个新的`SnakePart`。问题是，应该把这个新部位添加在什么位置？听起来可能有点令人惊讶，我们将它放在与列表中最后一个部位相同的位置。这样做的原因，在探讨如何实现最后一点（移动\
  \ Mr. Nom）时会变得更加清晰。\n\n图 6-6 显示了 Mr. Nom 的初始配置。他由三个部位组成：位于`(5,6)`的头部，以及位于`(5,7)`和`(5,8)`的两个尾部。\n\
  \n![A340874_3_En_6_Fig6_HTML.jpg](img/A340874_3_En_6_Fig6_HTML.jpg)\n\n**图 6-6.**\
  \ Mr. Nom 的初始配置\n\n列表中的部位是有序的，从头部开始，到最后一个尾部结束。当 Mr. Nom 前进一个单元格时，头部之后的所有部位都必须跟随。然而，Mr.\
  \ Nom 的部位可能并非像图 6-6 那样呈直线排列，因此仅仅将所有部位沿 Mr. Nom 前进的方向平移是不够的。我们需要采用更巧妙的方法。\n\n尽管听起来可能违反直觉，但我们需要从列表中的最后一个部位开始。我们将其移动到前一个部位的位置，并对列表中除头部外的所有其他部位重复此操作，因为头部之前没有部位。对于头部，我们检查\
  \ Mr. Nom 当前朝向哪个方向，并相应地修改头部的位置。图 6-7 用 Mr. Nom 的一个更复杂的配置来说明这一点。\n\n\n\n![A340874_3_En_6_Fig7_HTML.jpg](img/A340874_3_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** 诺姆先生前进并带动尾巴\n\n这种移动策略与我们的进食策略配合得很好。每次我们给诺姆先生添加一个新部位时，该部位在诺姆先生下一次移动时，会停留在其前一个部位所在的位置。此外，请注意，这将使我们能够轻松实现：如果诺姆先生越过世界边缘，他会从世界另一侧绕回来。我们只需相应地设置头部的位置，其余部分便会自动完成。\n\
  \n有了这些信息，我们现在可以实现代表诺姆先生的`Snake`类了。清单 6-10 展示了相关代码。\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  import java.util.ArrayList;\nimport java.util.List;\npublic class Snake {\npublic\
  \ static final int UP = 0;\npublic static final int LEFT = 1;\npublic static final\
  \ int DOWN = 2;\npublic static final int RIGHT = 3;\npublic List parts = new ArrayList();\n\
  public int direction;\nListing 6-10.\nSnake.java: 代码中的诺姆先生\n```\n\n首先，我们定义一组常量，用于编码诺姆先生的方向。请记住，诺姆先生只能左转和右转，因此我们定义常量值的方式至关重要。稍后，通过简单地将当前方向常量加一或减一，我们就能轻松地让方向旋转正负\
  \ 90 度。\n\n接下来，我们定义一个名为`parts`的列表，用于保存诺姆先生的所有部分。该列表中的第一项是头部，其余项是尾部各部分。`Snake`类的第二个成员变量保存了诺姆先生当前朝向的方向。\n\
  \n```\npublic Snake() {\ndirection = UP;\nparts.add(new SnakePart(5, 6));\nparts.add(new\
  \ SnakePart(5, 7));\nparts.add(new SnakePart(5, 8));\n}\n```\n\n在构造函数中，我们设定诺姆先生由他的头部和另外两个尾部部分组成，它们大致位于世界的中央，如前文图\
  \ 6-6 所示。我们还将方向设置为`Snake.UP`，这样下一次请求诺姆先生前进时，他就会向上移动一个单元格。\n\n```\npublic void turnLeft()\
  \ {\ndirection += 1;\nif(direction > RIGHT)\ndirection = UP;\n}\npublic void turnRight()\
  \ {\ndirection -= 1;\nif(direction < UP)\ndirection = RIGHT;\n}\n```\n\n`turnLeft()`和`turnRight()`方法仅修改`Snake`类的`direction`成员变量。左转时，我们将它加一；右转时，则减一。同时，如果`direction`值超出我们之前定义的常量范围，我们必须确保诺姆先生会绕回。\n\
  \n```\npublic void eat() {\nSnakePart end = parts.get(parts.size()-1);\nparts.add(new\
  \ SnakePart(end.x, end.y));\n}\n```\n\n接下来是`eat()`方法。它所做的一切就是在列表末尾添加一个新的`SnakePart`。这个新部位的位置将与当前末尾部位的位置相同。当下一次诺姆先生前进时，这两个重叠的部位将会分开，如前所述。\n\
  \n```\npublic void advance() {\nSnakePart head = parts.get(0);\nint len = parts.size()\
  \ - 1;\nfor(int i = len; i > 0; i--) {\nSnakePart before = parts.get(i-1);\nSnakePart\
  \ part = parts.get(i);\npart.x = before.x;\npart.y = before.y;\n}\nif(direction\
  \ == UP)\nhead.y -= 1;\nif(direction == LEFT)\nhead.x -= 1;\nif(direction == DOWN)\n\
  head.y += 1;\nif(direction == RIGHT)\nhead.x += 1;\nif(head.x < 0)\nhead.x = 9;\n\
  if(head.x > 9)\nhead.x = 0;\nif(head.y < 0)\nhead.y = 12;\nif(head.y > 12)\nhead.y\
  \ = 0;\n}\n```\n\n下一个方法`advance()`实现了图 6-7 所示的逻辑。首先，我们从最后一个部位开始，将每个部位移动到它前一个部位的位置。我们将头部排除在此机制之外。然后，根据诺姆先生当前的方向移动头部。最后，我们进行一些检查，确保诺姆先生不会离开他的世界。如果发生了这种情况，我们只需让他绕到世界的另一侧出现。\n\
  \n```\npublic boolean checkBitten() {\nint len = parts.size();\nSnakePart head =\
  \ parts.get(0);\nfor(int i = 1; i < len; i++) {\nSnakePart part = parts.get(i);\n\
  if(part.x == head.x && part.y == head.y)\nreturn true;\n}\nreturn false;\n}\n}\n\
  ```\n\n最后一个方法`checkBitten()`是一个辅助方法，用于检查诺姆先生是否咬到了自己的尾巴。它所做的就是检查是否有任何一个尾部部分与头部处于相同位置。如果是这样，诺姆先生就会死亡，游戏结束。\n\
  \n#### World 类\n\n我们模型类的最后一个是`World`类。`World`类需要完成以下几项任务：\n\n- 追踪诺姆先生（以`Snake`实例的形式）以及掉落在地图上的`Stain`实例。我们的世界中一次只会有一个污渍。\n\
  - 提供一个基于时间更新诺姆先生的方法（例如，他每 0.5 秒前进一个单元格）。此方法还将检查诺姆先生是否吃了一个污渍或是否咬到了自己。\n- 跟踪分数；这基本上就是迄今为止吃掉的污渍数量乘以\
  \ 10。\n- 在诺姆先生每吃掉十个污渍后增加他的速度。这会让游戏更具挑战性。\n- 跟踪诺姆先生是否还活着。稍后我们将使用它来判断游戏是否结束。\n- 在诺姆先生吃掉当前污渍后生成一个新的污渍（这是一项微妙但重要且出奇复杂的任务）。\n\
  \n这个任务列表中，我们尚未讨论的只有两项：基于时间更新世界以及放置新的污渍。\n\n### 诺姆先生的基于时间移动\n\n在第 3 章中，我们讨论了基于时间的移动。这基本上意味着我们定义所有游戏对象的速度，测量自上次更新以来经过的时间（即增量时间），并通过将速度乘以增量时间来移动对象。在第\
  \ 3 章的例子中，我们使用浮点值来实现这一点。然而，诺姆先生的各部分具有整数坐标，因此我们需要弄清楚如何在这种情况下移动对象。\n\n让我们先定义诺姆先生的速度。诺姆先生的世界存在时间，我们以秒为单位进行测量。最初，诺姆先生应该每\
  \ 0.5 秒前进一个单元格。我们需要做的就是跟踪自上次更新诺姆先生以来已经过去了多少时间。如果累积的时间超过我们 0.5 秒的阈值，我们就调用`Snake.advance()`方法并重置我们的时间累加器。这些增量时间从何而来？还记得`Screen.update()`方法吗？它获取帧的增量时间。我们只需将其传递给`World`类的`update()`方法，该方法将进行累加。为了使游戏更具挑战性，每次诺姆先生再吃掉十个污渍时，我们会将该阈值减少\
  \ 0.05 秒。当然，我们必须确保阈值不会降到 0，否则诺姆先生将以无限速度移动——这是爱因斯坦所无法容忍的。\n\n### 放置污渍\n\n我们必须解决的第二个问题是，当诺姆先生吃掉当前污渍后，如何放置一个新的污渍。它应该出现在世界上的一个随机单元格中。所以，我们只需用随机位置实例化一个新的`Stain`，对吧？遗憾的是，事情并没有那么简单。\n\
  \n想象一下，诺姆先生占据了相当多的单元格。那么污渍就有可能被放置在一个已被诺姆先生占据的单元格中，而且随着诺姆先生变得越来越大，这种可能性也会增加。因此，我们必须找到一个当前未被诺姆先生占据的单元格。这很容易，对吧？只需遍历所有单元格，使用第一个未被诺姆先生占据的单元格即可。\n\
  \n\n好的，这是根据您的要求和示例风格翻译的 Markdown 文档。\n\n\n再次强调，这种方式有点不太理想。如果每次从同一个位置开始搜索，污渍的放置就不是随机的了。相反，我们会从世界中的一个随机位置开始，扫描所有单元格直至世界边缘，如果还没有找到空闲单元格，再扫描起始位置以上的所有单元格。\n\
  \n如何检查一个单元格是否空闲？最天真的办法是遍历所有单元格，获取每个单元格的 `x` 和 `y` 坐标，然后用这些坐标去检查贪吃蛇先生的所有部分。我们有 10\
  \ × 13 = 130 个单元格，而贪吃蛇先生最多可以占据 55 个单元格。这意味着需要 130 × 55 = 7,150 次检查！诚然，大多数设备都能处理这个量级，但我们能做到更好。\n\
  \n我们将创建一个二维布尔数组，其中每个数组元素代表世界中的一个单元格。当我们需要放置一个新污渍时，首先遍历贪吃蛇先生的所有部分，并将数组中这些部分占据的元素设置为\
  \ `true`。然后，我们只需选择一个随机位置开始扫描，直到找到一个可以放置新污渍的空闲单元格。当贪吃蛇先生由 55 个部分组成时，这只需要 130 + 55\
  \ = 185 次检查，效率高多了！\n\n### 判断游戏何时结束\n\n还有最后一件事需要考虑：如果所有单元格都被贪吃蛇先生占据了怎么办？在这种情况下，游戏就结束了，因为贪吃蛇先生正式成为了整个世界。鉴于贪吃蛇先生每吃一个污渍，得分就增加\
  \ 10，那么最高可得分数为 ((10 × 13) – 3) × 10 = 1,270 分（请记住，贪吃蛇先生一开始就有三个部分）。\n\n### 实现 World\
  \ 类\n\n呼，有很多东西需要实现，让我们开始吧。清单 6-11 展示了 `World` 类的代码。\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  import java.util.Random;\npublic class World {\nstatic final int WORLD_WIDTH = 10;\n\
  static final int WORLD_HEIGHT = 13;\nstatic final int SCORE_INCREMENT = 10;\nstatic\
  \ final float TICK_INITIAL = 0.5f;\nstatic final float TICK_DECREMENT = 0.05f;\n\
  public Snake snake;\npublic Stain stain;\npublic boolean gameOver = false;;\npublic\
  \ int score = 0;\nboolean fields[][] = new boolean[WORLD_WIDTH][WORLD_HEIGHT];\n\
  Random random = new Random();\nfloat tickTime = 0;\nfloat tick = TICK_INITIAL;\n\
  Listing 6-11.\nWorld.java\n```\n\n一如既往，我们从定义一些常量开始——在本例中，它们分别是：世界的宽度和高度（以单元格为单位）、每次贪吃蛇先生吃到一个污渍时得分增加的数值、用于推进贪吃蛇先生的初始时间间隔（称为一个\
  \ tick）、以及每次贪吃蛇先生吃掉十个污渍后为了稍微加快速度而减少的 tick 值。\n\n接下来，是一些公共成员，它们保存了 `Snake` 实例、`Stain`\
  \ 实例、一个用于存储游戏是否结束的布尔值，以及当前得分。\n\n我们又定义了四个包级私有的成员：一个用于放置新污渍的二维数组；一个 `Random` 类的实例，用于生成随机数来放置污渍和生成其类型；一个时间累加器变量\
  \ `tickTime`，用于累加帧的增量时间；以及当前一个 tick 的持续时间，它定义了推进贪吃蛇先生的频率。\n\n```\npublic World()\
  \ {\nsnake = new Snake();\nplaceStain();\n}\n```\n\n在构造函数中，我们创建了一个 `Snake` 类的实例，它将呈现图\
  \ 6-6 所示的初始配置。我们还会通过 `placeStain()` 方法放置第一个随机污渍。\n\n```\nprivate void placeStain()\
  \ {\nfor (int x = 0; x = WORLD_WIDTH) {\nstainX = 0;\nstainY += 1;\nif (stainY >=\
  \ WORLD_HEIGHT) {\nstainY = 0;\n}\n}\n}\nstain = new Stain(stainX, stainY, random.nextInt(3));\n\
  }\n```\n\n`placeStain()` 方法实现了前面讨论过的放置策略。我们首先清空单元格数组。接着，将蛇身各部分占据的所有单元格设置为 `true`。最后，从随机位置开始扫描数组，寻找一个空闲单元格。一旦找到空闲单元格，我们就创建一个具有随机类型的\
  \ `Stain` 实例。请注意，如果所有单元格都被贪吃蛇先生占据，那么循环将永远不会终止。我们将在下一个方法中确保这种情况不会发生。\n\n```\npublic\
  \ void update(float deltaTime) {\nif (gameOver)\nreturn;\ntickTime += deltaTime;\n\
  while (tickTime > tick) {\ntickTime -= tick;\nsnake.advance();\nif (snake.checkBitten())\
  \ {\ngameOver = true;\nreturn;\n}\nSnakePart head = snake.parts.get(0);\nif (head.x\
  \ == stain.x && head.y == stain.y) {\nscore += SCORE_INCREMENT;\nsnake.eat();\n\
  if (snake.parts.size() == WORLD_WIDTH * WORLD_HEIGHT) {\ngameOver = true;\nreturn;\n\
  } else {\nplaceStain();\n}\nif (score % 100 == 0 && tick - TICK_DECREMENT > 0) {\n\
  tick -= TICK_DECREMENT;\n}\n}\n}\n}\n}\n```\n\n`update()` 方法负责根据传入的增量时间更新世界及其中的所有对象。此方法将在游戏画面的每一帧中被调用，以便世界持续更新。我们首先检查游戏是否结束。如果是，则无需更新任何内容。接着，将增量时间添加到累加器中。该\
  \ `while` 循环将消耗掉所有累积的 tick（例如，当 `tickTime` 是 1.2 且一个 tick 需要 0.5 秒时，我们可以更新世界两次，累加器中剩余\
  \ 0.2 秒）。这被称为固定时间步长模拟。\n\n在每次迭代中，我们首先从累加器中减去 tick 间隔。接着，让贪吃蛇先生前进。我们检查它是否咬到了自己，如果是，则设置游戏结束标志。最后，检查贪吃蛇先生的头部是否与污渍处于同一单元格。如果是，则增加得分，并让贪吃蛇先生长大。接着，我们检查贪吃蛇先生拥有的部分数量是否等于世界中的单元格总数。如果是，则游戏结束，我们从函数中返回。否则，我们使用\
  \ `placeStain()` 方法放置一个新污渍。最后要做的就是检查贪吃蛇先生是否刚刚又吃掉了十个污渍。如果是，并且我们的阈值大于零，则将其减少 0.05\
  \ 秒。这样 tick 将变得更短，从而使贪吃蛇先生移动得更快。\n\n这样就完成了一组模型类。我们需要实现的最后一个是游戏画面！\n\n#### GameScreen\
  \ 类\n\n只剩下一个画面需要实现了。让我们看看这个画面要做些什么：\n\n-   如第 3 章中《贪吃蛇先生》的设计所定义的，游戏画面可以处于四种状态之一：等待用户确认已准备就绪、运行游戏、处于暂停等待状态、或在游戏结束状态下等待用户点击按钮。\n\
  -   在就绪状态下，我们只需提示用户触摸屏幕以开始游戏。\n-   在运行状态下，我们更新世界、渲染世界，并且当玩家按下屏幕底部的按钮时，指示贪吃蛇先生向左或向右转。\n\
  -   在暂停状态下，我们简单地显示两个选项：一个是继续游戏，另一个是退出游戏。\n-   在游戏结束状态下，我们告诉用户游戏已结束，并提供一个触摸按钮，以便用户可以返回主菜单。\n\
  -   对于每种状态，我们都有不同的 `update()` 和 `present()` 方法需要实现，因为每种状态做的动作不同，显示的 UI 也不同。\n- \
  \  游戏结束后，我们必须确保在获得高分时将其存储起来。\n\n\n\n这确实是一份不小的责任，转化为了比平常更多的代码。因此，我们将拆分这个类的源代码清单。在深入代码之前，我们先规划一下如何在每个状态下排列不同的\
  \ UI 元素。图 6-8 展示了四种不同的状态。\n\n![A340874_3_En_6_Fig8_HTML.jpg](img/A340874_3_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8. 游戏屏幕的四种状态：准备、运行、暂停和游戏结束\n\n请注意，我们还在屏幕底部渲染了得分，以及一条将 Nom 先生的世界与底部按钮分隔开的线条。得分使用与\
  \ `HighscoreScreen` 中相同的例程进行渲染。此外，我们根据得分的字符串宽度将其水平居中。\n\n最后缺失的信息是如何根据 Nom 先生世界的模型来渲染它。这实际上相当简单。再次查看图\
  \ 6-1 和图 6-5。每个单元格的大小正好是 32×32 像素。污渍图像的大小也是 32×32 像素，Nom 先生的尾巴部分也是如此。Nom 先生各个方向的头部图像大小为\
  \ 42×42 像素，因此它们不能完全放入单个单元格中。不过这不成问题。要渲染 Nom 先生的世界，我们需要做的就是获取每个污渍和蛇的部分，并将其世界坐标乘以\
  \ 32，从而得到该物体在屏幕上的像素中心——例如，在世界坐标中 (3,2) 处的污渍，其中心在屏幕上位于 96×64。基于这些中心点，剩下要做的就是获取相应的资源，并以这些坐标为中心进行渲染。让我们开始编码吧。清单\
  \ 6-12 显示了 `GameScreen` 类。\n\n```\npackage com.badlogic.androidgames.mrnom;\nimport\
  \ java.util.List;\nimport android.graphics.Color;\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.Pixmap;\nimport com.badlogic.androidgames.framework.Screen;\n\
  public class GameScreen extends Screen {\nenum GameState {\nReady,\nRunning,\nPaused,\n\
  GameOver\n}\nGameState state = GameState.Ready;\nWorld world;\nint oldScore = 0;\n\
  String score = \"0\";\nListing 6-12. GameScreen.java\n```\n\n我们首先定义一个名为 `GameState`\
  \ 的枚举，它对我们的四种状态（准备、运行、暂停和游戏结束）进行了编码。接下来，我们定义一个成员来保存屏幕的当前状态，另一个成员保存 `World` 实例，还有两个成员分别以整数和字符串形式保存当前显示的得分。我们之所以需要最后两个成员，是因为我们不希望在每次绘制得分时，都从\
  \ `World.score` 成员中不断创建新的字符串。相反，我们将缓存该字符串，并且仅在得分发生变化时创建一个新的字符串。这样，我们就能很好地配合垃圾收集器。\n\
  \n```\npublic GameScreen(Game game) {\nsuper(game);\nworld = new World();\n}\n```\n\
  \n构造函数调用了父类构造函数，并创建了一个新的 `World` 实例。游戏屏幕在构造函数返回给调用者后，将处于准备状态。\n\n```\n@Override\n\
  public void update(float deltaTime) {\nList touchEvents = game.getInput().getTouchEvents();\n\
  game.getInput().getKeyEvents();\nif(state == GameState.Ready)\nupdateReady(touchEvents);\n\
  if(state == GameState.Running)\nupdateRunning(touchEvents, deltaTime);\nif(state\
  \ == GameState.Paused)\nupdatePaused(touchEvents);\nif(state == GameState.GameOver)\n\
  updateGameOver(touchEvents);\n}\n```\n\n接下来是屏幕的 `update()` 方法。它所做的就是从输入模块获取 `TouchEvent`\
  \ 和 `KeyEvent`，然后根据当前状态，将更新操作委托给我们实现的四个更新方法之一。\n\n```\nprivate void updateReady(List\
  \ touchEvents) {\nif(touchEvents.size() > 0)\nstate = GameState.Running;\n}\n```\n\
  \n下一个方法叫做 `updateReady()`。当屏幕处于准备状态时，它会被调用。它所做的就是检查屏幕是否被触摸。如果是，它将状态更改为运行。\n\n```\n\
  private void updateRunning(List touchEvents, float deltaTime) {\nint len = touchEvents.size();\n\
  for(int i = 0; i < len; i++) {\nTouchEvent event = touchEvents.get(i);\nif(event.type\
  \ == TouchEvent.TOUCH_UP) {\nif(event.x < 64 && event.y < 64) {\nif(Settings.soundEnabled)\n\
  Assets.click.play(1);\nstate = GameState.Paused;\nreturn;\n}\n}\nif(event.type ==\
  \ TouchEvent.TOUCH_DOWN) {\nif(event.x < 64 && event.y > 416) {\nworld.snake.turnLeft();\n\
  }\nif(event.x > 256 && event.y > 416) {\nworld.snake.turnRight();\n}\n}\n}\nworld.update(deltaTime);\n\
  if(world.gameOver) {\nif(Settings.soundEnabled)\nAssets.bitten.play(1);\nstate =\
  \ GameState.GameOver;\n}\nif(oldScore != world.score) {\noldScore = world.score;\n\
  score = \"\" + oldScore;\nif(Settings.soundEnabled)\nAssets.eat.play(1);\n}\n}\n\
  ```\n\n`updateRunning()` 方法首先检查屏幕左上角的暂停按钮是否被按下。如果是，它将状态设置为暂停。然后它检查屏幕底部的一个控制按钮是否被按下。请注意，我们这里检查的是触摸按下事件，而不是触摸抬起事件。如果其中任何一个按钮被按下，我们就通知世界的\
  \ `Snake` 实例向左或向右转。没错——`updateRunning()` 方法包含了我们 MVC 模式中的控制代码！检查完所有触摸事件后，我们通知世界用给定的增量时间更新自身。如果世界发出游戏结束的信号，我们就相应地更改状态，并播放\
  \ `bitten.ogg` 音效。接下来，我们检查缓存中的旧得分是否与世界存储的得分不同。如果是，我们就知道两件事：Nom 先生吃到了一个污渍，并且得分字符串必须更改。在这种情况下，我们会播放\
  \ `eat.ogg` 音效。这就是运行状态更新的全部内容。\n\n```\nprivate void updatePaused(List touchEvents)\
  \ {\nint len = touchEvents.size();\nfor(int i = 0; i < len; i++) {\nTouchEvent event\
  \ = touchEvents.get(i);\nif(event.type == TouchEvent.TOUCH_UP) {\nif(event.x > 80\
  \ && event.x < 240 && event.y > 100 && event.y < 148) {\nif(Settings.soundEnabled)\n\
  Assets.click.play(1);\nstate = GameState.Running;\nreturn;\n}\nif(event.x > 80 &&\
  \ event.x < 240 && event.y > 148 && event.y < 196) {\nif(Settings.soundEnabled)\n\
  Assets.click.play(1);\ngame.setScreen(new MainMenuScreen(game));\nreturn;\n}\n}\n\
  }\n}\n```\n\n`updatePaused()` 方法只检查是否触摸了菜单选项之一，并相应地更改状态。\n\n```\nprivate void updateGameOver(List\
  \ touchEvents) {\nint len = touchEvents.size();\nfor(int i = 0; i < len; i++) {\n\
  TouchEvent event = touchEvents.get(i);\nif(event.type == TouchEvent.TOUCH_UP) {\n\
  if(event.x >= 128 && event.x <= 192 && event.y >= 200 && event.y <= 264) {\nif(Settings.soundEnabled)\n\
  Assets.click.play(1);\ngame.setScreen(new MainMenuScreen(game));\nreturn;\n}\n}\n\
  }\n}\n```\n\n`updateGameOver()` 方法也检查屏幕中间的按钮是否被按下。如果被按下，我们就启动屏幕切换，回到主菜单屏幕。\n\n```\n\
  @Override\npublic void present(float deltaTime) {\nGraphics g = game.getGraphics();\n\
  g.drawPixmap(Assets.background, 0, 0);\ndrawWorld(world);\nif(state == GameState.Ready)\n\
  drawReadyUI();\nif(state == GameState.Running)\ndrawRunningUI();\nif(state == GameState.Paused)\n\
  drawPausedUI();\nif(state == GameState.GameOver)\ndrawGameOverUI();\ndrawText(g,\
  \ score, g.getWidth() / 2 - score.length()*20 / 2, g.getHeight() - 42);\n}\n```\n\
  \n接下来是渲染方法。`present()` 方法首先绘制背景图像，因为所有状态都需要它。然后，它根据当前状态调用相应的绘制方法。最后，它渲染 Nom 先生的世界，并在屏幕底部中央绘制得分。\n\
  \n\n\n```java\nprivate void drawWorld(World world) {\n    Graphics g = game.getGraphics();\n\
  \    Snake snake = world.snake;\n    SnakePart head = snake.parts.get(0);\n    Stain\
  \ stain = world.stain;\n    Pixmap stainPixmap = null;\n    if(stain.type == Stain.TYPE_1)\n\
  \        stainPixmap = Assets.stain1;\n    if(stain.type == Stain.TYPE_2)\n    \
  \    stainPixmap = Assets.stain2;\n    if(stain.type == Stain.TYPE_3)\n        stainPixmap\
  \ = Assets.stain3;\n    int x = stain.x * 32;\n    int y = stain.y * 32;\n    g.drawPixmap(stainPixmap,\
  \ x, y);\n    int len = snake.parts.size();\n    for(int i = 1; i < len; i++) {\n\
  \        SnakePart part = snake.parts.get(i);\n        x = part.x * 32;\n      \
  \  y = part.y * 32;\n        g.drawPixmap(Assets.tail, x, y);\n    }\n    Pixmap\
  \ headPixmap = null;\n    if(snake.direction == Snake.UP)\n        headPixmap =\
  \ Assets.headUp;\n    if(snake.direction == Snake.LEFT)\n        headPixmap = Assets.headLeft;\n\
  \    if(snake.direction == Snake.DOWN)\n        headPixmap = Assets.headDown;\n\
  \    if(snake.direction == Snake.RIGHT)\n        headPixmap = Assets.headRight;\n\
  \    x = head.x * 32 + 16;\n    y = head.y * 32 + 16;\n    g.drawPixmap(headPixmap,\
  \ x - headPixmap.getWidth() / 2, y - headPixmap.getHeight() / 2);\n}\n```\n\n`drawWorld()`方法绘制世界，正如我们刚才讨论的那样。它首先选择用于渲染污渍的像素图，然后绘制它并将其水平居中于屏幕位置。接下来，我们渲染\
  \ Mr. Nom 的所有尾部部分，这相当简单。最后，根据 Mr. Nom 的方向选择要使用的头部像素图，并在屏幕坐标中头部的中心绘制该像素图。与其他对象一样，我们也围绕该位置使图像居中。这就是\
  \ MVC 中视图的代码。\n\n```java\nprivate void drawReadyUI() {\n    Graphics g = game.getGraphics();\n\
  \    g.drawPixmap(Assets.ready, 47, 100);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n\
  }\n\nprivate void drawRunningUI() {\n    Graphics g = game.getGraphics();\n    g.drawPixmap(Assets.buttons,\
  \ 0, 0, 64, 128, 64, 64);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n    g.drawPixmap(Assets.buttons,\
  \ 0, 416, 64, 64, 64, 64);\n    g.drawPixmap(Assets.buttons, 256, 416, 0, 64, 64,\
  \ 64);\n}\n\nprivate void drawPausedUI() {\n    Graphics g = game.getGraphics();\n\
  \    g.drawPixmap(Assets.pause, 80, 100);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n\
  }\n\nprivate void drawGameOverUI() {\n    Graphics g = game.getGraphics();\n   \
  \ g.drawPixmap(Assets.gameOver, 62, 100);\n    g.drawPixmap(Assets.buttons, 128,\
  \ 200, 0, 128, 64, 64);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n}\n\npublic\
  \ void drawText(Graphics g, String line, int x, int y) {\n    int len = line.length();\n\
  \    for (int i = 0; i < len; i++) {\n        char character = line.charAt(i);\n\
  \        if (character == ' ') {\n            x += 20;\n            continue;\n\
  \        }\n        int srcX = 0;\n        int srcWidth = 0;\n        if (character\
  \ == '.') {\n            srcX = 200;\n            srcWidth = 10;\n        } else\
  \ {\n            srcX = (character - '0') * 20;\n            srcWidth = 20;\n  \
  \      }\n        g.drawPixmap(Assets.numbers, x, y, srcX, 0, srcWidth, 32);\n \
  \       x += srcWidth;\n    }\n}\n```\n\n方法`drawReadUI()`、`drawRunningUI()`、`drawPausedUI()`和`drawGameOverUI()`并不新鲜。它们根据图\
  \ 6-8 中所示的坐标执行与以往相同的 UI 渲染。`drawText()`方法与`HighscoreScreen`中的相同，因此我们也不再讨论它。\n\n\
  ```java\n@Override\npublic void pause() {\n    if(state == GameState.Running)\n\
  \        state = GameState.Paused;\n    if(world.gameOver) {\n        Settings.addScore(world.score);\n\
  \        Settings.save(game.getFileIO());\n    }\n}\n\n@Override\npublic void resume()\
  \ {\n}\n\n@Override\npublic void dispose() {\n}\n```\n\n最后，还有一个至关重要的方法`pause()`，当活动暂停或游戏屏幕被另一个屏幕替换时，会调用该方法。这是保存设置的绝佳位置。首先，我们将游戏状态设置为暂停。如果`pause()`方法是由于活动暂停而被调用，这将确保用户在返回游戏时会被提示恢复游戏。这是一种良好的行为，因为立即从离开游戏的地方继续会带来压力。接下来，我们检查游戏屏幕是否处于游戏结束状态。如果是，我们将玩家获得的分数添加到高分榜中（是否添加取决于其值），并将所有设置保存到外部存储。\n\
  \n就这样。我们从零开始为 Android 编写了一个完整的游戏！你可以为自己感到自豪，因为你已经掌握了创建几乎任何你喜欢的游戏所需的所有必要主题。从此以后，基本上就只剩下锦上添花了。\n\
  \n## 总结\n\n在本章中，我们在框架之上实现了一个功能完备的游戏，拥有所有必要的功能（除了音乐）。你了解了为什么将模型与视图和控制器分开是有意义的，并且你知道了不需要以像素为单位来定义你的游戏世界。我们可以采用这些代码，并将渲染部分替换为\
  \ OpenGL ES，让 Mr. Nom 进入 3D 世界。我们还可以通过添加动画、增加色彩、添加新的游戏机制等方式来提升当前渲染器的效果。然而，我们只是浅尝辄止了这些可能性。\n\
  \n在继续阅读本书之前，我们建议你尝试游戏代码并对其进行修改。添加一些新的游戏模式、能量道具和敌人——任何你能想到的东西。\n\n当你回来时，在下一章中，你将加深对图形编程的了解，使你的游戏看起来更华丽，并且你将迈出进入第三维度的第一步！\n\
  \n"
- "# 7. OpenGL ES：温和入门\n\nMr. Nom 取得了巨大成功。由于其坚实的初始设计和游戏框架，实现 Mr. Nom 对我们来说轻而易举。最重要的是，即使在低端设备上，游戏也能流畅运行。当然，Mr.\
  \ Nom 并不是一个非常复杂或图形密集型的游戏，因此使用`Canvas` API 进行渲染被证明是一个好主意。\n\n然而，当你想做更复杂的事情时，你会碰到一堵墙：`Canvas`无法跟上这类游戏的视觉复杂性。如果你想追求华丽的\
  \ 3D 效果，`Canvas`也无能为力。那么……你能做什么呢？\n\n这时 OpenGL ES 就派上了用场。在本章中，我们将首先简要了解 OpenGL ES\
  \ 是什么以及它做什么。然后，我们将专注于使用 OpenGL ES 进行 2D 图形处理，而无需深入使用 API 进行 3D 图形时涉及的更复杂的数学领域（我们将在后面的章节中讨论）。我们将循序渐进地学习，因为\
  \ OpenGL ES 可能会变得相当复杂。你准备好接触 OpenGL ES 了吗？\n\n## 什么是 OpenGL ES，为什么我要关心它？\n\nOpenGL\
  \ ES 是（3D）图形编程的行业标准。它特别针对移动和嵌入式设备。它由 Khronos Group 维护，这是一个行业联盟，其成员包括 ATI、NVIDIA\
  \ 和英特尔等公司；这些公司共同定义和扩展该标准。\n\n\n\n说到标准，`OpenGL ES` 目前有六个增量版本：1.0、1.1、2.0、3.0、3.1\
  \ 和 3.2。尽管 Android Nougat 刚刚发布并支持所有这些版本，但本书关注的是 `OpenGL ES` 1.0，因为它能提供最广泛的兼容性，无需担心支持问题。许多开发团队，尤其是那些专注于多平台游戏的团队，仍然在为\
  \ `OpenGL ES` 1.0 编写代码。这是因为它简单、灵活且实现标准化。所有 Android 设备都支持 `OpenGL ES` 1.0，大多数设备也支持\
  \ 2.0 版本（而 JellyBean 之后的任何设备都支持 `OpenGL ES` 3.0）。然而，`OpenGL ES` 2.0 与 1.x 版本不兼容。你可以使用\
  \ 1.x 或 2.0，但不能同时使用两者。原因在于，1.x 版本采用了一种称为固定功能管线的编程模型，而 2.0 及更高版本则允许你通过着色器以编程方式定义渲染管线的部分功能。\n\
  \n> **注意：** 模拟器支持所有版本的 `OpenGL ES`。然而，模拟并非完美无缺。此外，尽管 `OpenGL ES` 是一个标准，但不同的制造商对其有不同的解读，不同设备之间的性能差异也很大，因此请务必在多种设备上进行测试以确保兼容性。我们将设计一些在任何设备上都能工作的实用类。\n\
  \n`OpenGL ES` 是一个 API，它由 Khronos 集团提供的一组 C 头文件以及一份非常详细的规范组成，该规范描述了这些头文件中定义的 API\
  \ 应该如何运行。这包括像素和线条如何渲染等内容。然后，硬件制造商会依据这份规范，在 GPU 驱动程序之上为其 GPU 实现该 API。你可以在 [`http://www.khronos.org/opengles`](http://www.khronos.org/opengles)\
  \ 找到所有规范及更多信息。\n\n这些实现的质量略有差异：一些公司严格遵守标准（如 PowerVR），而另一些公司似乎难以做到。这有时会导致实现中出现与 GPU\
  \ 相关的错误，这些错误与 Android 本身无关，而是与制造商提供的硬件驱动有关。在你进入 `OpenGL ES` 领域的旅程中，我们会为你指出任何特定于设备的问题。\n\
  \n> **注意：** `OpenGL ES` 或多或少是功能更丰富的桌面版 `OpenGL` 标准的兄弟版本。它与其不同之处在于，某些功能被削减或完全移除。尽管如此，编写一个能同时兼容这两种规范的应用程序是可能的，如果你想将游戏移植到桌面平台，这将会非常棒。\n\
  \n那么，`OpenGL ES` 到底是做什么的呢？简而言之，它是一台精简而高效的三角形渲染机器。详细回答则要更深入一些。\n\n## 编程模型：一个类比\n\n\
  一般来说，`OpenGL ES` 是一个 3D 图形编程 API。因此，它拥有一个非常不错且易于理解的编程模型，我们可以用一个简单的类比来说明。\n\n将 `OpenGL\
  \ ES` 想象成一台相机的工作原理。要拍照，你必须前往想要拍摄的场景。你的场景由物体组成——比如，一张桌子上放着更多东西。它们都具有相对于你相机的位置和方向，以及不同的材质和纹理。玻璃是半透明且有反射的；桌子可能是木制的；杂志上有政治家最新的照片，等等。有些物体甚至可能移动（例如，一只果蝇）。你的相机也有属性，例如焦距、视野、图像分辨率、将要拍摄的照片大小，以及在世界中的特定位置和方向（相对于某个原点）。即使物体和相机都在移动，当你按下快门时，你会捕捉到场景的一个静止图像（暂时不考虑快门速度，它可能导致图像模糊）。在那个无限小的瞬间，一切都是静止且定义明确的，照片精确地反映了位置、方向、纹理、材质和光照的所有配置。图\
  \ 7-1 展示了一个包含相机、光源和三个具有不同材质的物体的抽象场景。\n\n![A340874_3_En_7_Fig1_HTML.jpg](img/A340874_3_En_7_Fig1_HTML.jpg)\n\
  \n*图 7-1. 一个抽象场景*\n\n每个物体都有相对于场景原点的位置和方向。由眼睛图形表示的相机，也有相对于场景原点的位置。图 7-1 中的棱锥体是所谓的视见体或视锥体，它显示了相机捕捉了多少场景以及相机是如何定向的。带有光线的小白色球体是场景中的光源，它也有相对于原点的位置。\n\
  \n我们可以将这个场景直接映射到 `OpenGL ES`，但为此我们需要定义以下内容：\n\n- **物体（又称模型）：** 这些通常由四组属性组成：几何、颜色、纹理和材质。几何体被指定为一组三角形。每个三角形由\
  \ 3D 空间中的三个点组成，因此我们有相对于坐标系原点定义的 `x`、`y` 和 `z` 坐标，如图 7-1 所示。请注意，`z` 轴指向我们。颜色通常指定为\
  \ RGB 三元组，这我们已经很熟悉了。纹理和材质则稍微复杂一些。我们稍后会讲到这些。\n- **光源：** `OpenGL ES` 提供了几种不同类型的光源，各有不同的属性。它们只是数学对象，在\
  \ 3D 空间中具有位置和/或方向，以及颜色等属性。\n- **相机：** 这也是一个数学对象，在 3D 空间中具有位置和方向。此外，它还有控制我们看到多少图像的参数，类似于真实相机。所有这些因素共同定义了一个视见体或视锥体（由图\
  \ 7-1 中截去顶部的棱锥体表示）。这个棱锥体内的任何东西都可以被相机看到；外部的任何东西都不会出现在最终图像中。\n- **视口：** 这定义了最终图像的尺寸和分辨率。可以把它想象成你放入模拟相机中的胶卷类型，或者你用数码相机拍照时获得的图像分辨率。\n\
  \n有了这些，`OpenGL ES` 就可以从相机的视角构建我们场景的 2D 位图。请注意，我们在 3D 空间中定义了一切。那么，`OpenGL ES` 如何将其映射到二维呢？\n\
  \n### 投影\n\n\n\n### OpenGL ES 中的投影与矩阵\n\n这种二维映射是通过称为投影的方式完成的。我们之前提到过，`OpenGL ES`\
  \ 主要处理三角形。单个三角形在三维空间中定义了三个点。要将这样的三角形渲染到帧缓冲区，`OpenGL ES` 需要知道这些三维点在帧缓冲区基于像素的坐标系中的坐标。一旦知道了这三个角点的坐标，它就可以直接绘制出帧缓冲区中位于三角形内部的像素。我们甚至可以通过\
  \ `Canvas` 将三维点投影到二维并绘制它们之间的连线，来编写一个简单的小型 `OpenGL ES` 实现。\n\n在三维图形中，通常使用两种投影：\n\n\
  - **平行（或正交）投影**：如果你曾经使用过 CAD 应用程序，你可能已经了解这种投影。平行投影不关心物体离摄像头有多远；物体在最终图像中的大小始终保持不变。这种投影通常用于在\
  \ `OpenGL ES` 中渲染二维图形。\n\n- **透视投影**：你的眼睛每天都在使用这种投影。离你较远的物体在你的视网膜上看起来更小。当我们使用 `OpenGL\
  \ ES` 进行三维图形渲染时，通常使用透视投影。\n\n在两种情况下，都需要一个称为投影平面的东西，它几乎与你的视网膜完全相同——光线在这里被实际记录以形成最终图像。虽然数学上的平面面积是无限的，但我们的视网膜是有限的。我们的\
  \ `OpenGL ES` “视网膜”相当于图 7-1 中视锥体顶部的矩形区域。视锥体的这一部分是 `OpenGL ES` 投影点的地方。这个区域被称为**近裁剪平面**，它拥有自己独立的二维坐标系。图\
  \ 7-2 再次从摄像头的视角展示了近裁剪平面，并叠加了坐标系。\n\n![A340874_3_En_7_Fig2_HTML.jpg](img/A340874_3_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** 近裁剪平面（也称为投影平面）及其坐标系\n\n请注意，这个坐标系绝不是固定的。我们可以对其进行操控，以便在任何我们喜欢的投影坐标系中工作；例如，我们可以指示\
  \ `OpenGL ES` 将原点设在左下角，让“视网膜”的可见区域在 x 轴上为 480 单位，在 y 轴上为 320 单位。听起来很熟悉？是的，`OpenGL\
  \ ES` 允许你为投影点指定任何你想要的坐标系。\n\n一旦我们指定了视锥体，`OpenGL ES` 就会获取三角形的每个点，并从该点向投影平面发射一条射线。平行投影和透视投影之间的区别在于这些射线方向是如何构建的。图\
  \ 7-3 从俯视角度展示了这两种投影的区别。\n\n![A340874_3_En_7_Fig3_HTML.jpg](img/A340874_3_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 透视投影（左）和平行投影（右）\n\n透视投影从三角形的点出发，穿过摄像头（或视点，在此例中）发射射线。因此，距离较远的物体在投影平面上会显得更小。当我们使用平行投影时，射线垂直于投影平面发射。在这种情况下，无论物体距离多远，它在投影平面上的大小都将保持不变。\n\
  \n如前所述，在 `OpenGL ES` 术语中，我们的投影平面被称为**近裁剪平面**。视锥体的所有侧面都有类似的名称。距离摄像头最远的那个面被称为**远裁剪平面**。其他的面被称为**左、右、上、下裁剪平面**。任何位于这些平面之外或之后的对象都不会被渲染。部分位于视锥体内的对象将根据这些平面进行裁剪，这意味着视锥体之外的部分会被切除。这就是**裁剪平面**名称的由来。\n\
  \n你可能想知道图 7-3 中平行投影的视锥体为什么是矩形的。事实证明，投影实际上是由我们定义裁剪平面的方式决定的。在透视投影的情况下，左、右、上、下裁剪平面并不垂直于近裁剪平面和远裁剪平面（参见图\
  \ 7-3，图中仅显示了左、右裁剪平面）。而在平行投影的情况下，这些平面是垂直的，这会告诉 `OpenGL ES` 无论物体离摄像头多远，都按相同大小渲染它。\n\
  \n#### 标准化设备空间和视口\n\n一旦 `OpenGL ES` 计算出三角形在近裁剪平面上的投影点，它就可以最终将这些点转换为帧缓冲区中的像素坐标。为此，它必须首先将这些点转换到所谓的**标准化设备空间**。这等同于图\
  \ 7-2 中描述的坐标系。基于这些标准化设备空间坐标，`OpenGL ES` 通过以下简单公式计算最终的帧缓冲区像素坐标：\n\n```\npixelX =\
  \ (norX + 1) / (viewportWidth + 1) + norX\npixelY = (norY + 1) / (viewportHeight\
  \ + 1) + norY\n```\n\n其中 `norX` 和 `norY` 是三维点的标准化设备坐标，`viewportWidth` 和 `viewportHeight`\
  \ 是视口在 x 轴和 y 轴上以像素为单位的大小。我们不需要过多担心标准化设备坐标，因为 `OpenGL` 会自动为我们完成转换。然而，我们真正关心的是视口和视锥体。稍后，你将看到如何指定视锥体，从而指定投影。\n\
  \n#### 矩阵\n\n`OpenGL ES` 以矩阵的形式表达投影。我们不需要了解矩阵的内部原理。我们只需要知道它们对我们场景中定义的点做了什么。以下是矩阵的要点总结：\n\
  \n- 矩阵编码了将要应用于点的变换。变换可以是投影、平移（移动点）、绕另一个点和轴旋转、缩放等。\n- 通过将这样的矩阵与点相乘，我们将变换应用于该点。例如，将一个点与一个编码了沿\
  \ x 轴平移 10 单位的矩阵相乘，将使该点沿 x 轴移动 10 单位，从而修改其坐标。\n- 我们可以通过矩阵乘法将存储在多个独立矩阵中的变换连接成一个矩阵。当我们用这个单一的连接矩阵与一个点相乘时，该矩阵中存储的所有变换都将应用于该点。变换应用的顺序取决于我们矩阵相乘的顺序。\n\
  - 有一种特殊的矩阵称为**单位矩阵**。如果我们将一个矩阵或一个点与它相乘，什么也不会发生。可以将点或矩阵与单位矩阵相乘想象为数字乘以 1。它没有任何效果。当你了解\
  \ `OpenGL ES` 如何处理矩阵时，单位矩阵的相关性就会变得清晰（参见“矩阵模式和活动矩阵”一节）——这是一个经典的“先有鸡还是先有蛋”问题。\n\n\
  ##### 注意\n\n当我们在上下文中讨论点时，实际上是指三维向量。\n\n\n\n### OpenGL ES 矩阵与渲染管线\n\n`OpenGL ES`\
  \ 有三种不同的矩阵，它们被应用到我们模型的点上：\n\n* **模型-视图矩阵（Model-view matrix）**：我们可以使用此矩阵来移动、旋转或缩放三角形顶点（这是模型-视图矩阵的“模型”部分）。此矩阵还用于指定相机的位置和朝向（这是“视图”部分）。\n\
  \n* **投影矩阵（Projection matrix）**：顾名思义，此矩阵编码了投影，从而定义了相机的视锥体（view frustum）。\n\n* **纹理矩阵（Texture\
  \ matrix）**：此矩阵允许我们操作纹理坐标（稍后将讨论）。不过，在本书中我们将避免使用此矩阵，因为由于驱动程序错误，`OpenGL ES` 的这一部分在某些设备上存在问题。\n\
  \n## 渲染管线（The Rendering Pipeline）\n\n`OpenGL ES` 会跟踪这三个矩阵。每当我们设置其中一个矩阵时，`OpenGL\
  \ ES` 都会记住它，直到我们再次更改该矩阵。用 `OpenGL ES` 的行话来说，这被称为“状态”。不过，`OpenGL` 不仅仅跟踪矩阵状态；它还跟踪我们是否想要对三角形进行\
  \ Alpha 混合、是否要考虑光照、应该将哪个纹理应用于几何体等等。事实上，`OpenGL ES` 是一个庞大的状态机；我们设置其当前状态，将对象的几何体输入其中，并让它为我们渲染图像。让我们看看一个三角形如何通过这个强大的三角形渲染机器。图\
  \ 7-4 展示了 `OpenGL ES` 流水线的一个非常高层级、简化的视图。\n\n![A340874_3_En_7_Fig4_HTML.jpg](img/A340874_3_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.**\n\n三角形在此流水线中的路径如下所示：\n\n1. 我们勇敢的三角形首先由模型-视图矩阵变换。这意味着其所有顶点都与此矩阵相乘。此乘法将有效地在世界中移动三角形的顶点。\n\
  \n2. 然后，产生的输出乘以投影矩阵，从而有效地将 3D 点变换到 2D 投影平面上。\n\n3. 在这两步之间（或并行地），当前设置的光照和材质也会应用到我们的三角形上，赋予其颜色。\n\
  \n4. 完成所有这些后，投影后的三角形会被裁剪到我们的“视网膜”上，并通过应用视口变换转换到帧缓冲坐标。\n\n5. 作为最后一步，`OpenGL` 根据光照阶段的颜色、要应用到三角形的纹理以及混合状态（三角形的每个像素可能会或可能不会与帧缓冲中的像素组合）来填充三角形的像素。\n\
  \n你只需要学习如何将几何体和纹理交给 `OpenGL ES`，以及如何设置前面每个步骤所使用的状态。在此之前，你需要了解 `Android` 如何授予你访问\
  \ `OpenGL ES` 的权限。\n\n> **注意**\n>\n> 虽然对 `OpenGL ES` 流水线的高层描述基本正确，但它被极大地简化了，并省略了一些将在后续章节中变得重要的细节。另一件需要注意的事情是，当\
  \ `OpenGL ES` 执行投影时，它实际上并非投影到 2D 坐标系，而是投影到称为**齐次坐标系**的东西，它实际上是四维的。这是一个非常复杂的数学话题，为了简单起见，我们将坚持简化后的说法，即\
  \ `OpenGL ES` 投影到 2D 坐标。\n\n## 开始之前（Before We Begin）\n\n在本章的其余部分，我们将提供许多简短的示例，就像我们在第\
  \ 4 章讨论 `Android API` 基础时那样。我们将使用与第 4 章相同的启动类，它会向您显示一个可以启动的启动活动列表。唯一会改变的是您通过反射实例化的活动的名称以及它们所在的包。本章其余部分的所有示例都将在包`com.badlogic.androidgames.glbasics`中。其余代码将保持不变。您的新启动活动将被命名为`GLBasicsStarter`。您还将复制第\
  \ 5 章的所有源代码，即`com.badlogic.androidgames.framework`包及其所有子包。在本章中，您将编写一些新的框架和辅助类，这些类将放入`com.badlogic.androidgames.framework`包及其子包中。\n\
  \n我们再次需要一个清单文件。由于以下每个示例都将是一个活动，我们还需要确保每个示例在清单中都有一个条目。所有示例都将使用固定的方向（纵向或横向，取决于示例）。这与我们在第\
  \ 4 章中使用的设置几乎完全相同。\n\n解决了这个问题之后，让乐趣开始吧！\n\n## GLSurfaceView：自 2008 年起让事情变得简单\n\n\
  我们首先需要的是某种类型的`View`，它允许我们通过 `OpenGL ES` 进行绘制。幸运的是，`Android API` 中就有这样一个`View`。它叫做`GLSurfaceView`，是`SurfaceView`类的后代，我们之前已经使用`SurfaceView`来绘制\
  \ Mr. Nom 的世界。\n\n我们还需要一个单独的主循环线程，这样就不会拖慢 UI 线程。惊喜的是：`GLSurfaceView`已经为我们设置好了这样一个线程！我们需要做的就是实现一个名为`GLSurfaceView.Renderer`的监听器接口，并将其注册到`GLSurfaceView`。该接口有三个方法：\n\
  \n```java\ninterface Renderer {\npublic void onSurfaceCreated(GL10 gl, EGLConfig\
  \ config);\npublic void onSurfaceChanged(GL10 gl, int width, int height);\npublic\
  \ void onDrawFrame(GL10 gl);\n}\n```\n\n`onSurfaceCreated()`方法在每次创建`GLSurfaceView`表面时被调用。这发生在我们第一次启动活动时，以及每次我们从暂停状态回到活动时。该方法接受两个参数：一个`GL10`实例和一个`EGLConfig`。`GL10`实例允许我们向\
  \ `OpenGL ES` 发出命令。`EGLConfig`实例则告诉我们表面的属性，例如颜色深度、深度缓冲等。我们通常忽略它。我们将在`onSurfaceCreated()`方法中设置几何体和纹理。\n\
  \n`onSurfaceChanged()`方法在每次表面大小改变时被调用。作为参数，我们得到表面的新宽度和高度（以像素为单位），以及一个`GL10`实例（如果我们想发出\
  \ `OpenGL ES` 命令的话）。\n\n`onDrawFrame()`方法是乐趣所在。它在精神上类似于我们的`Screen.render()`方法，由`GLSurfaceView`为我们设置的渲染线程尽可能频繁地调用。在这个方法中，我们执行所有的渲染工作。\n\
  \n除了注册一个`Renderer`监听器之外，我们还需要在我们的活动的`onPause()`/`onResume()`方法中调用`GLSurfaceView.onPause()`/`onResume()`。原因很简单。`GLSurfaceView`会启动其`onResume()`方法中的渲染线程，并在其`onPause()`方法中将其销毁。这意味着当我们的活动暂停时，我们的监听器不会被调用，因为调用我们监听器的渲染线程也会被暂停。\n\
  \n> **注意**\n\n\n\n实际上，`EGL`负责上下文的创建和销毁以及表面的创建与销毁。`EGL`是另一个 Khronos Group 标准；它定义了操作系统如何与`OpenGL\
  \ ES`协作，以及操作系统如何授予`OpenGL ES`对底层图形硬件的访问权限。这包括表面创建和上下文管理。由于`GLSurfaceView`为我们处理了所有与`EGL`相关的内容，因此在几乎所有情况下我们都可以安全地忽略它。\n\
  \n按照传统，我们编写一个小示例，该示例每帧用随机颜色清除屏幕。清单 7-1 展示了代码。该清单被拆分成多段，并穿插了注释。\n\n```\npackage com.badlogic.androidgames.glbasics;\n\
  import java.util.Random;\nimport javax.microedition.khronos.egl.EGLConfig;\nimport\
  \ javax.microedition.khronos.opengles.GL10;\nimport android.app.Activity;\nimport\
  \ android.opengl.GLSurfaceView;\nimport android.opengl.GLSurfaceView.Renderer;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.Window;\n\
  import android.view.WindowManager;\npublic class GLSurfaceViewTest extends Activity\
  \ {\nGLSurfaceView glView;\npublic void onCreate(Bundle savedInstanceState) {\n\
  super.onCreate(savedInstanceState);\nrequestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\nWindowManager.LayoutParams.FLAG_FULLSCREEN);\n\
  glView = new GLSurfaceView(this);\nglView.setRenderer(new SimpleRenderer());\nsetContentView(glView);\n\
  }\n```\n\n**清单 7-1** `GLSurfaceViewTest.java`：屏幕清除狂想曲\n\n我们将`GLSurfaceView`实例的引用作为类的成员变量保存。在`onCreate()`方法中，我们使应用程序全屏，创建`GLSurfaceView`，设置我们的`Renderer`实现，并将`GLSurfaceView`设置为活动的内容视图。\n\
  \n```\n@Override\npublic void onResume() {\nsuper.onResume();\nglView.onResume();\n\
  }\n@Override\npublic void onPause() {\nsuper.onPause();\nglView.onPause();\n}\n\
  ```\n\n在`onResume()`和`onPause()`方法中，我们调用父类方法以及相应的`GLSurfaceView`方法。这些方法将启动和拆除`GLSurfaceView`的渲染线程，这反过来将在适当的时间触发我们的`Renderer`实现的回调方法。\n\
  \n```\nstatic class SimpleRenderer implements Renderer {\nRandom rand = new Random();\n\
  public void onSurfaceCreated(GL10 gl, EGLConfig config) {\nLog.d(\"GLSurfaceViewTest\"\
  , \"surface created\");\n}\npublic void onSurfaceChanged(GL10 gl, int width, int\
  \ height) {\nLog.d(\"GLSurfaceViewTest\", \"surface changed: \" + width + \"x\"\n\
  + height);\n}\npublic void onDrawFrame(GL10 gl) {\ngl.glClearColor(rand.nextFloat(),\
  \ rand.nextFloat(),\nrand.nextFloat(), 1);\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  }\n}\n}\n```\n\n代码的最后一部分是我们的`Renderer`实现。它仅在`onSurfaceCreated()`和`onSurfaceChanged()`方法中记录一些信息。真正有趣的部分是`onDrawFrame()`方法。\n\
  \n如前所述，`GL10`实例使我们能够访问`OpenGL ES API`。`GL10`中的`10`表示它提供了`OpenGL ES 1.0`标准中定义的所有函数。目前，我们可以对此感到满意。该类的所有方法都映射到标准中定义的相应\
  \ C 函数。每个方法都以`gl`前缀开头，这是`OpenGL ES`的一个古老传统。\n\n我们调用的第一个`OpenGL ES`方法是`glClearColor()`。您可能已经知道它的作用。它设置了当我们发出清除屏幕命令时要使用的颜色。在`OpenGL\
  \ ES`中，颜色几乎总是 RGBA 格式，其中每个分量的取值范围是 0 到 1。也有其他定义颜色的方式，比如 RGB565，但我们现在先使用浮点数表示。我们只需设置一次用于清除的颜色，`OpenGL\
  \ ES`就会记住它。通过`glClearColor()`设置的颜色是`OpenGL ES`的状态之一。\n\n下一个调用实际上使用我们刚刚指定的清除颜色来清除屏幕。`glClear()`方法接受一个参数，该参数指定要清除哪个缓冲区。除了帧缓冲区，`OpenGL`还有一些其他缓冲区。您将在第\
  \ 10 章中了解它们，但现在，我们只关心保存像素的帧缓冲区，`OpenGL ES`称之为颜色缓冲区。为了告诉`OpenGL ES`我们要清除这个缓冲区，我们指定常量`GL10.GL_COLOR_BUFFER_BIT`。\n\
  \n`OpenGL ES`有很多常量，它们都定义为`GL10`接口的静态公共成员。与方法一样，每个常量都有`GL_`前缀。\n\n好了，这就是我们的第一个`OpenGL\
  \ ES`应用程序。我们就不展示令人印象深刻的截图了，因为您可能知道它是什么样子。\n\n> **注意**\n> \n> 你绝不能在另一个线程中调用`OpenGL\
  \ ES`！这是第一条也是最后一条戒律！原因是`OpenGL ES`被设计为仅在单线程环境中使用，并且它不是线程安全的。虽然可以在多个线程上使其在一定程度上工作，但许多驱动程序对此存在问题，而且这样做并没有真正的好处。\n\
  \n## `GLGame`：实现游戏接口\n\n在上一章中，我们实现了`AndroidGame`类，它整合了音频、文件 I/O、图形和用户输入处理的所有子模块。我们希望在我们即将推出的\
  \ 2D`OpenGL ES`游戏中重用其中的大部分内容，因此我们实现一个名为`GLGame`的新类，该类实现了我们之前定义的`game`接口、一个`GLSurfaceView`和一个`Renderer`。\n\
  \n您首先会注意到，以您目前对`OpenGL ES`的了解，您不可能实现图形接口。这里有一个惊喜：您不需要实现它。`OpenGL`不太适用于您的图形接口的编程模型；相反，我们将实现一个新类`GLGraphics`，它将跟踪我们从`GLSurfaceView`获得的`GL10`实例。清单\
  \ 7-2 展示了代码。\n\n```\npackage com.badlogic.androidgames.framework.impl;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import android.opengl.GLSurfaceView;\npublic class GLGraphics {\nGLSurfaceView glView;\n\
  GL10 gl;\nGLGraphics(GLSurfaceView glView) {\nthis.glView = glView;\n}\npublic GL10\
  \ getGL() {\nreturn gl;\n}\nvoid setGL(GL10 gl) {\nthis.gl = gl;\n}\npublic int\
  \ getWidth() {\nreturn glView.getWidth();\n}\npublic int getHeight() {\nreturn glView.getHeight();\n\
  }\n}\n```\n\n**清单 7-2** `GLGraphics.java`：跟踪`GLSurfaceView`和`GLES20`实例\n\n这个类只有几个\
  \ getter 和 setter 方法。请注意，我们将在`GLSurfaceView`设置的渲染线程中使用这个类。因此，调用主要位于 UI 线程上的`View`的方法可能会出现问题。在这种情况下，这是可以的，因为我们只查询`GLSurfaceView`的宽度和高度，所以不会出现问题。\n\
  \n`GLGame`类稍微复杂一些。它从`AndroidGame`类借用了大部分代码。渲染线程和 UI 线程之间的同步稍微复杂一些。让我们在清单 7-3 中看看它。\n\
  \n\n\n```java\npackage com.badlogic.androidgames.framework.impl;\nimport javax.microedition.khronos.egl.EGLConfig;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport android.app.Activity;\n\
  import android.content.Context;\nimport android.opengl.GLSurfaceView;\nimport android.opengl.GLSurfaceView.Renderer;\n\
  import android.os.Bundle;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  import com.badlogic.androidgames.framework.Audio;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Input;\nimport com.badlogic.androidgames.framework.Screen;\n\
  public abstract class GLGame extends Activity implements Game, Renderer {\nenum\
  \ GLGameState {\nInitialized,\nRunning,\nPaused,\nFinished,\nIdle\n}\nGLSurfaceView\
  \ glView;\nGLGraphics glGraphics;\nAudio audio;\nInput input;\nFileIO fileIO;\n\
  Screen screen;\nGLGameState state = GLGameState.Initialized;\nObject stateChanged\
  \ = new Object();\nlong startTime = System.nanoTime();\n```\n*列表 7-3.* `GLGame.java`：强大的\
  \ OpenGL ES 游戏实现\n\n该类继承 `Activity` 类并实现了 `Game` 和 `GLSurfaceView.Renderer` 接口。它有一个名为\
  \ `GLGameState` 的枚举，用于跟踪 `GLGame` 实例所处的状态。稍后将看到这些枚举的用法。\n\n该类的成员包括一个 `GLSurfaceView`\
  \ 实例和一个 `GLGraphics` 实例。该类还包含 `Audio`、`Input`、`FileIO` 和 `Screen` 实例，它们用于编写游戏，就像我们在\
  \ `AndroidGame` 类中所做的那样。`state` 成员通过 `GLGameState` 枚举之一来跟踪状态。`stateChanged` 成员是一个对象，我们将使用它来同步\
  \ UI 线程和渲染线程。\n\n```java\n@Override\nprotected void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nrequestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\nWindowManager.LayoutParams.FLAG_FULLSCREEN);\n\
  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);\nglView =\
  \ new GLSurfaceView(this);\nglView.setRenderer(this);\nsetContentView(glView);\n\
  glGraphics = new GLGraphics(glView);\nfileIO = new AndroidFileIO(this);\naudio =\
  \ new AndroidAudio(this);\ninput = new AndroidInput(this, glView, 1, 1);\n}\n```\n\
  \n在 `onCreate()` 方法中，我们执行了通常的设置流程。我们使 Activity 全屏，并实例化 `GLSurfaceView`，将其设置为内容视图。我们还实例化了所有其他实现框架接口的类，例如\
  \ `AndroidFileIO` 和 `AndroidInput` 类。请注意，我们重用了在 `AndroidGame` 类中使用的类，但 `AndroidGraphics`\
  \ 除外。另一个重要点是，我们不再让 `AndroidInput` 类像在 `AndroidGame` 中那样将触摸坐标缩放到目标分辨率。缩放值均为 1，因此我们将获得真实的触摸坐标。\n\
  \n```java\n@Override\npublic void onResume() {\nsuper.onResume();\nglView.onResume();\n\
  }\n```\n\n在 `onResume()` 方法中，我们让 `GLSurfaceView` 通过调用其 `onResume()` 方法来启动渲染线程。\n\
  \n```java\n@Override\npublic void onSurfaceCreated(GL10 gl, EGLConfig config) {\n\
  glGraphics.setGL(gl);\nsynchronized(stateChanged) {\nif(state == GLGameState.Initialized)\n\
  screen = getStartScreen();\nstate = GLGameState.Running;\nscreen.resume();\nstartTime\
  \ = System.nanoTime();\n}\n}\n```\n\n接下来将调用 `onSurfaceCreate()` 方法，该方法当然是在渲染线程上调用的。在这里，您可以看到\
  \ `state` 枚举的用法。如果应用程序是首次启动，`state` 将为 `GLGameState.Initialized`。在这种情况下，我们调用 `getStartScreen()`\
  \ 方法来返回游戏的起始屏幕。如果游戏不处于初始化状态但已在运行，我们知道我们刚刚从暂停状态恢复。无论如何，我们将 `state` 设置为 `GLGameState.Running`，并调用当前屏幕的\
  \ `resume()` 方法。我们还记录当前时间，以便稍后计算增量时间。\n\n同步是必要的，因为我们在同步块中操作的成员可能会在 UI 线程上的 `onPause()`\
  \ 方法中被操作。我们必须防止这种情况，因此我们使用一个对象作为锁。我们也可以使用 `GLGame` 实例本身或适当的锁。\n\n```java\n@Override\n\
  public void onSurfaceChanged(GL10 gl, int width, int height) {\n}\n```\n\n`onSurfaceChanged()`\
  \ 方法基本上只是一个存根。这里没有我们需要做的事情。\n\n```java\npublic void onDrawFrame(GL10 gl) {\nGLGameState\
  \ state = null;\nsynchronized(stateChanged) {\nstate = this.state;\n}\nif(state\
  \ == GLGameState.Running) {\nfloat deltaTime = (System.nanoTime()-startTime) / 1000000000.0f;\n\
  startTime = System.nanoTime();\nscreen.update(deltaTime);\nscreen.present(deltaTime);\n\
  }\nif(state == GLGameState.Paused) {\nscreen.pause();\nsynchronized(stateChanged)\
  \ {\nthis.state = GLGameState.Idle;\nstateChanged.notifyAll();\n}\n}\nif(state ==\
  \ GLGameState.Finished) {\nscreen.pause();\nscreen.dispose();\nsynchronized(stateChanged)\
  \ {\nthis.state = GLGameState.Idle;\nstateChanged.notifyAll();\n}\n}\n}\n```\n\n\
  `onDrawFrame()` 方法是执行大部分工作的地方。它由渲染线程尽可能频繁地调用。在这里，我们检查游戏所处的 `state` 并做出相应反应。由于 `state`\
  \ 可以通过 UI 线程上的 `onPause()` 方法设置，我们必须同步对其的访问。\n\n如果游戏正在运行，我们计算增量时间，并告诉当前屏幕更新和呈现自身。\n\
  \n如果游戏暂停，我们也告诉当前屏幕暂停自身。然后我们将状态更改为 `GLGameState.Idle`，表示我们已收到来自 UI 线程的暂停请求。由于我们在\
  \ UI 线程的 `onPause()` 方法中等待这种情况发生，我们通知 UI 线程现在可以真正暂停应用程序。此通知是必需的，因为如果我们的 Activity\
  \ 在 UI 线程上被暂停或关闭，我们必须确保渲染线程被正确暂停/关闭。\n\n如果 Activity 正在被关闭（而不是暂停），我们对 `GLGameState.Finished`\
  \ 做出反应。在这种情况下，我们告诉当前屏幕暂停并释放自身，然后向等待渲染线程正确关闭事物的 UI 线程发送另一个通知。\n\n```java\n@Override\n\
  public void onPause() {\nsynchronized(stateChanged) {\nif(isFinishing())\nstate\
  \ = GLGameState.Finished;\nelse\nstate = GLGameState.Paused;\nwhile(true) {\ntry\
  \ {\nstateChanged.wait();\nbreak;\n} catch(InterruptedException e) {\n}\n}\n}\n\
  glView.onPause();\nsuper.onPause();\n}\n```\n\n`onPause()` 方法是当 Activity 暂停时在 UI\
  \ 线程上调用的常规 Activity 通知方法。根据应用程序是关闭还是暂停，我们相应地设置 `state`，并等待渲染线程处理新状态。这是通过标准的 Java\
  \ wait/notify 机制实现的。\n\n最后，我们告诉 `GLSurfaceView` 和 `Activity` 暂停自身，从而有效地关闭渲染线程。\n\
  \n```java\npublic GLGraphics getGLGraphics() {\nreturn glGraphics;\n}\n```\n\n`getGLGraphics()`\
  \ 方法是一个只能通过 `GLGame` 类访问的新方法。它返回我们存储的 `GLGraphics` 实例，以便我们以后可以在 `Screen` 实现中访问 `GL10`\
  \ 接口。\n\n\n\n```java\npublic Input getInput() {\n    return input;\n}\npublic FileIO\
  \ getFileIO() {\n    return fileIO;\n}\npublic Graphics getGraphics() {\n    throw\
  \ new IllegalStateException(\"We are using OpenGL!\");\n}\npublic Audio getAudio()\
  \ {\n    return audio;\n}\npublic void setScreen(Screen newScreen) {\n    if (screen\
  \ == null)\n        throw new IllegalArgumentException(\"Screen must not be null\"\
  );\n    this.screen.pause();\n    this.screen.dispose();\n    newScreen.resume();\n\
  \    newScreen.update(0);\n    this.screen = newScreen;\n}\npublic Screen getCurrentScreen()\
  \ {\n    return screen;\n}\n```\n\n类的其余部分与之前一致。如果我们意外尝试访问标准的 `Graphics` 实例，会抛出一个异常，因为\
  \ `GLGame` 不支持该实例。我们将改用通过 `GLGame.getGLGraphics()` 方法获得的 `GLGraphics` 方法。\n\n为什么我们要费尽周折与渲染线程同步呢？好吧，这将使我们的\
  \ `Screen` 实现完全在渲染线程上运行。`Screen` 的所有方法都将在此执行，如果要访问 OpenGL ES 功能，这是必需的。请记住，我们只能在渲染线程上访问\
  \ OpenGL ES。\n\n让我们通过一个示例来收尾。清单 7-4 展示了本章第一个示例在使用 `GLGame` 和 `Screen` 时的样子。\n\n\
  ```java\npackage com.badlogic.androidgames.glbasics;\nimport java.util.Random;\n\
