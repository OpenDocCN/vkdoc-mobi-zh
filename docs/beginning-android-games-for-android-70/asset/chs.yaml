  \ + lastScore;\n    }\n    if (world.isGameOver()) {\n        state = GAME_OVER;\n\
  \    }\n}\n```\n\n`updateRunning()` 方法负责两件事：检查暂停按钮是否被按下（并相应处理）以及根据用户输入更新世界状态。第一部分很简单，让我们来看看世界更新机制。我们将加速度值的计算委托给一个名为\
  \ `calculateInputAcceleration()` 的方法。世界更新后，我们检查三个状态（生命值、波数和分数）是否发生变化，并相应地更新 `scoreString`。最后，我们检查游戏是否结束，如果结束则进入\
  \ `GameOver` 状态。\n\n```java\nprivate float calculateInputAcceleration() {\n    float\
  \ accelX = 0;\n    if (Settings.touchEnabled) {\n        for (int i = 0; i < 2;\
  \ i++) {\n            if (game.getInput().isTouchDown(i)) {\n                guiCam.touchToWorld(touchPoint.set(game.getInput()\n\
  \                        .getTouchX(i), game.getInput().getTouchY(i)));\n      \
  \          if (OverlapTester.pointInRectangle(leftBounds, touchPoint)) {\n     \
  \               accelX = -Ship.SHIP_VELOCITY / 5;\n                }\n         \
  \       if (OverlapTester.pointInRectangle(rightBounds, touchPoint)) {\n       \
  \             accelX = Ship.SHIP_VELOCITY / 5;\n                }\n            }\n\
  \        }\n    } else {\n        accelX = game.getInput().getAccelY();\n    }\n\
  \    return accelX;\n}\n```\n\n`calculateInputAcceleration()` 方法是我们实际解释用户输入的地方。如果启用了触摸，则检查屏幕上的左或右移动按钮是否被按下，如果按下，则将加速度值相应地设置为\
  \ -5（左）或 5（右）。如果使用加速度计，则直接返回其在 y 轴上的当前值（请记住，我们处于横屏模式）。\n\n```java\nprivate void\
  \ updateGameOver() {\n    List events = game.getInput().getTouchEvents();\n    int\
  \ len = events.size();\n    for (int i = 0; i < len; i++) {\n        TouchEvent\
  \ event = events.get(i);\n        if (event.type == TouchEvent.TOUCH_UP) {\n   \
  \         Assets.playSound(Assets.clickSound);\n            game.setScreen(new MainMenuScreen(game));\n\
  \        }\n    }\n}\n```\n\n`updateGameOver()` 方法同样简单，仅检查触摸事件，如果检测到则转换到 `MainMenuScreen`。\n\
