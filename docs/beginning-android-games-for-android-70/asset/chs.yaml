  \ OpenGL ES 中关于光照的全部内容！\n\n```java\n@Override\npublic void pause() {\n}\n@Override\n\
  public void dispose() {\n}\n}\n```\n\n类的其余部分为空；在暂停的情况下，我们无需做任何特殊处理。\n\n图 11-7 展示了我们示例的输出。\n\
  \n![A340874_3_En_11_Fig7_HTML.jpg](img/A340874_3_En_11_Fig7_HTML.jpg)\n\n图 11-7.\
  \ 图 11-6 中的场景，使用 OpenGL ES 渲染\n\n**关于 OpenGL ES 中光照的一些注意事项**\n\n虽然光照可以为你的游戏增添一些不错的视觉效果，但它也有其局限性和陷阱。以下几点你应该铭记于心：\n\
  \n*   光照开销很大，尤其是在低端设备上。请谨慎使用。你启用的光源越多，渲染场景所需的计算能力就越大。\n*   在指定点光源/方向光的位置/方向时，你必须在加载摄像机矩阵之后，并且在将模型视图矩阵与任何移动和旋转物体的矩阵相乘**之前**进行！这一点至关重要。如果不遵循这个方法，你将遇到一些无法解释的光照伪影。\n\
  *   当你使用 `glScalef()` 改变模型大小时，其法线也会被缩放。这很糟糕，因为 OpenGL ES 期望法线是单位长度。要解决这个问题，可以使用命令\
  \ `glEnable(GL10.GL_NORMALIZE)`，或者在特定情况下使用 `glEnable(GL10.GL_RESCALE_NORMAL)`。我们建议坚持使用前者，因为后者有一些限制和注意事项。问题在于，归一化或重新缩放法线的计算量很大。为了获得最佳性能，最好不对带光照的物体进行缩放。\n\
  \n## Mipmapping\n\n如果你在我们的先前示例中尝试过，并让立方体远离摄像机移动，你可能已经注意到，随着立方体变小，纹理开始看起来有颗粒感并且充满了微小的伪影。这种效应被称为混叠，是所有类型信号处理中一个显著的现象。图\
  \ 11-8 在右侧展示了这种效应，在左侧展示了应用一种称为 Mipmapping 技术的结果。\n\n![A340874_3_En_11_Fig8_HTML.jpg](img/A340874_3_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 右侧是混叠伪影；左侧是 Mipmapping 的结果\n\n我们不会深入探讨混叠产生的原因；你只需要知道如何让对象看起来更好。这正是 Mipmapping\
  \ 发挥作用的地方。\n\n解决混叠问题的关键在于，对屏幕上较小或距离视点较远的对象部分，使用较低分辨率的图像。这通常被称为 mipmap 金字塔或链。给定一个默认分辨率的图像，比如\
  \ 256×256 像素，我们创建其较小的版本，对于 mipmap 金字塔的每一级，边长都除以二。图 11-9 展示了具有不同 mipmap 级别的板条箱纹理。\n\
  \n![A340874_3_En_11_Fig9_HTML.jpg](img/A340874_3_En_11_Fig9_HTML.jpg)\n\n图 11-9.\
  \ 一个 Mipmap 链\n\n为了在 OpenGL ES 中使纹理支持 Mipmapping，我们必须做两件事：\n\n*   将缩小过滤器设置为 `GL_XXX_MIPMAP_XXX`\
  \ 常量之一，通常是 `GL_LINEAR_MIPMAP_NEAREST`。\n*   通过调整原始图像的大小，为每个 mipmap 链级别创建图像，然后将它们上传到\
  \ OpenGL ES。mipmap 链是附着在一个纹理上的，而不是多个纹理。\n\n为了调整 mipmap 链的基础图像大小，我们可以直接使用 Android\
  \ API 提供的 `Bitmap` 和 `Canvas` 类。让我们稍微修改一下 `Texture` 类。清单 11-8 展示了相关代码。\n\n\n```java\n\
  package com.badlogic.androidgames.framework.gl;\nimport java.io.IOException;\nimport\
  \ java.io.InputStream;\nimport javax.microedition.khronos.opengles.GL10;\nimport\
  \ android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport android.graphics.Canvas;\n\
  import android.graphics.Rect;\nimport android.opengl.GLUtils;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  import com.badlogic.androidgames.framework.impl.GLGame;\nimport com.badlogic.androidgames.framework.impl.GLGraphics;\n\
  public class Texture {\nGLGraphics glGraphics;\nFileIO fileIO;\nString fileName;\n\
  int textureId;\nint minFilter;\nint magFilter;\npublic int width;\npublic int height;\n\
  boolean mipmapped;\n}\n```\n\n**清单 11-8.** `Texture.java`：纹理类的最终版本\n\n我们只添加了一个名为\
  \ `mipmapped` 的新成员，用于存储纹理是否包含 mipmap 链。\n\n```java\npublic Texture(GLGame glGame,\
  \ String fileName) {\nthis(glGame, fileName, false);\n}\npublic Texture(GLGame glGame,\
  \ String fileName, boolean mipmapped) {\nthis.glGraphics = glGame.getGLGraphics();\n\
  this.fileIO = glGame.getFileIO();\nthis.fileName = fileName;\nthis.mipmapped = mipmapped;\n\
  load();\n}\n```\n\n为了保持兼容性，我们保留了旧的构造函数，它会调用新的构造函数。新的构造函数接受第三个参数，让我们可以指定是否希望为纹理生成\
  \ mipmap。\n\n```java\nprivate void load() {\nGL10 gl = glGraphics.getGL();\nint[]\
  \ textureIds = new int[1];\ngl.glGenTextures(1, textureIds, 0);\ntextureId = textureIds[0];\n\
  InputStream in = null;\ntry {\nin = fileIO.readAsset(fileName);\nBitmap bitmap =\
  \ BitmapFactory.decodeStream(in);\nif (mipmapped) {\ncreateMipmaps(gl, bitmap);\n\
  } else {\ngl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\nGLUtils.texImage2D(GL10.GL_TEXTURE_2D,\
  \ 0, bitmap, 0);\nsetFilters(GL10.GL_NEAREST, GL10.GL_NEAREST);\ngl.glBindTexture(GL10.GL_TEXTURE_2D,\
  \ 0);\nwidth = bitmap.getWidth();\nheight = bitmap.getHeight();\nbitmap.recycle();\n\
  }\n} catch (IOException e) {\nthrow new RuntimeException(\"无法加载纹理 '\" + fileName\
  \ + \"'\", e);\n} finally {\nif (in != null)\ntry {\nin.close();\n} catch (IOException\
  \ e) {\n}\n}\n}\n```\n\n`load()` 方法本质上保持不变。唯一的补充是，当纹理应该生成 mipmap 时，会调用 `createMipmaps()`。非\
  \ mipmap 的 `Texture` 实例的创建方式与之前相同。\n\n```java\nprivate void createMipmaps(GL10 gl,\
  \ Bitmap bitmap) {\ngl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\nwidth = bitmap.getWidth();\n\
  height = bitmap.getHeight();\nsetFilters(GL10.GL_LINEAR_MIPMAP_NEAREST, GL10.GL_LINEAR);\n\
  int level = 0;\nint newWidth = width;\nint newHeight = height;\nwhile (true) {\n\
  GLUtils.texImage2D(GL10.GL_TEXTURE_2D, level, bitmap, 0);\nnewWidth = newWidth /\
  \ 2;\nnewHeight = newHeight / 2;\nif (newWidth <= 0)\nbreak;\nBitmap newBitmap =\
  \ Bitmap.createBitmap(newWidth, newHeight,\nbitmap.getConfig());\nCanvas canvas\
  \ = new Canvas(newBitmap);\ncanvas.drawBitmap(bitmap,\nnew Rect(0, 0, bitmap.getWidth(),\
  \ bitmap.getHeight()),\nnew Rect(0, 0, newWidth, newHeight), null);\nbitmap.recycle();\n\
  bitmap = newBitmap;\nlevel++;\n}\ngl.glBindTexture(GL10.GL_TEXTURE_2D, 0);\nbitmap.recycle();\n\
  }\n```\n\n`createMipmaps()` 方法相当直接。我们首先绑定纹理，以便操作其属性。我们做的第一件事是记录位图的宽度和高度，并设置过滤器。注意，我们为缩小过滤器使用了\
  \ `GL_LINEAR_MIPMAP_NEAREST`。如果我们不使用这个过滤器，mipmapping 将无法工作，OpenGL ES 将回退到普通过滤，只使用基础图像。\n\
  \n`while` 循环也很直接。我们将当前位图作为当前级别的图像上传。我们从级别 0 开始，即具有原始图像的基础级别。一旦当前级别的图像上传完毕，我们就创建它的一个更小的版本，将其宽度和高度除以\
  \ 2。如果新宽度小于或等于 0，我们就可以跳出无限循环，因为我们已经为每个 mipmap 级别上传了图像（最后一个图像的大小是 1×1 像素）。我们使用 `Canvas`\
  \ 类来调整图像大小，并将结果存储在 `newBitmap` 中。然后我们回收旧的位图，以清理其占用的任何内存，并将 `newBitmap` 设置为当前位图。我们重复这个过程，直到图像小于\
  \ 1×1 像素。\n\n最后，我们解绑纹理并回收循环中创建的最后一个位图。\n\n```java\npublic void reload() {\nload();\n\
  bind();\nsetFilters(minFilter, magFilter);\nglGraphics.getGL().glBindTexture(GL10.GL_TEXTURE_2D,\
  \ 0);\n}\npublic void setFilters(int minFilter, int magFilter) {\nthis.minFilter\
  \ = minFilter;\nthis.magFilter = magFilter;\nGL10 gl = glGraphics.getGL();\ngl.glTexParameterf(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_MIN_FILTER,\nminFilter);\ngl.glTexParameterf(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_MAG_FILTER,\nmagFilter);\n}\npublic void bind() {\nGL10 gl = glGraphics.getGL();\n\
  gl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\n}\npublic void dispose() {\nGL10\
  \ gl = glGraphics.getGL();\ngl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\nint[]\
  \ textureIds = { textureId };\ngl.glDeleteTextures(1, textureIds, 0);\n}\n}\n```\n\
  \n类的其余部分与之前的版本相同。使用上的唯一区别在于我们如何调用构造函数。由于这非常简单，我们不会专门为 mipmapping 编写一个示例。我们将对我们用于\
  \ 3D 对象的所有纹理使用 mipmapping。在 2D 中，mipmapping 的用处不大。最后关于 mipmapping 的几点说明：\n\n*  \
  \ 如果你使用 mipmap 纹理绘制的对象很小，mipmapping 可以显著提高性能。原因是 GPU 需要从 mipmap 金字塔中的较小图像中获取更少的纹素。因此，明智的做法是始终对可能变小的对象使用\
  \ mipmap 纹理。\n*   与等效的非 mipmap 版本相比，mipmap 纹理占用内存多 33%。这种权衡通常是合理的。\n*   在 OpenGL\
  \ ES 1.x 中，mipmapping 仅适用于正方形纹理。这一点至关重要，务必记住。如果你的对象即使使用了漂亮的图像纹理，却仍然是白色的，那么你基本可以确定是忘了这个限制。\n\
  \n**注意**\n\n再次强调，因为这确实很重要：请记住，mipmapping 仅适用于正方形纹理！512×256 像素的图像将无法工作。\n\n## 简单摄像机\n\
  \n在上一章中，我们讨论了两种创建摄像机的方法。第一种是欧拉摄像机，类似于第一人称射击游戏中使用的。第二种是注视摄像机，用于电影式摄像机工作或跟踪对象。让我们创建两个辅助类来创建可以在游戏中使用的摄像机。\n\
  \n### 第一人称（或欧拉）摄像机\n\n第一人称（或欧拉）摄像机由以下属性定义：\n\n*   以度为单位的视野\n*   视口宽高比\n*   近裁剪面和远裁剪面\n\
  *   3D 空间中的位置\n*   围绕 y 轴的角度（偏航角）\n*   围绕 x 轴的角度（俯仰角）。此角度限制在 -90 到 +90 度范围内。想想你自己的头可以倾斜多远，并尝试超过那些角度！我们对任何伤害不承担责任。\n\
  \n前三个属性用于定义透视投影矩阵。我们在所有 3D 示例中都通过调用 `gluPerspective()` 来完成此操作。\n\n其他三个属性定义了摄像机在我们世界中的位置和方向。我们将据此构建一个矩阵，如第\
  \ 10 章所述。\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n---\n\n\n我们也希望能够让摄像机沿着它朝向的方向移动。为此，我们需要一个单位长度的方向向量，并将其添加到摄像机的位置向量中。我们可以借助\
  \ Android API 提供的`Matrix`类来创建这种向量。让我们暂时思考一下这个问题。\n\n在默认配置下，摄像机将沿负 z 轴方向观察，其方向向量为`(0,0,–1)`。当我们指定偏航角或俯仰角时，该方向向量将相应地旋转。为了计算方向向量，我们只需将其乘以一个旋转默认方向向量的矩阵，这与\
  \ OpenGL ES 旋转模型顶点的原理相同。\n\n让我们看看这一切在代码中是如何运作的。`EulerCamera`类见清单 11-9。\n\n```\n\
  package com.badlogic.androidgames.framework.gl;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import android.opengl.GLU;\nimport android.opengl.Matrix;\nimport com.badlogic.androidgames.framework.math.Vector3;\n\
  public class EulerCamera {\nfinal Vector3 position = new Vector3();\nfloat yaw;\n\
