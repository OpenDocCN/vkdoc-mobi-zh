  \n图 11-11. 一个简单的第一人称射击控制示例，为简洁起见未使用多点触控\n\n很不错，对吧？代码量也不大，这要感谢我们的辅助类所做的出色工作。当然，添加多点触控支持会更好。这里有一个提示：不要像上面的例子那样使用轮询，而是使用实际的触摸事件。在“触摸按下”事件中，检查按钮是否被击中。如果是，则标记与之关联的指针\
  \ ID，使其无法产生滑动手势，直到相应的“触摸抬起”事件被触发。来自所有其他指针 ID 的触摸事件都可以被解释为滑动手势！\n\n观察相机\n\n游戏中常用的第二种相机是简单的观察相机。它由以下要素定义：\n\
  \n*   空间中的一个位置\n*   一个向上向量。可以将其想象为，当相机平放在水平表面上时，你在相机背面贴一个“此面朝上”标签会看到的箭头。\n*   空间中的一个观察位置，或者一个方向向量。我们将使用前者。\n\
  *   视场角（以度为单位）\n*   视口宽高比\n*   近裁剪平面距离和远裁剪平面距离\n\n观察相机与欧拉相机的唯一区别在于编码相机朝向的方式。在本例中，我们通过向上向量和观察位置来指定朝向。让我们为这种类型的相机编写一个辅助类。清单\
  \ 11-11 展示了代码。\n\n```\npackage com.badlogic.androidgames.framework.gl;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import android.opengl.GLU;\nimport com.badlogic.androidgames.framework.math.Vector3;\n\
  public class LookAtCamera {\nfinal Vector3 position;\nfinal Vector3 up;\nfinal Vector3\
  \ lookAt;\nfloat fieldOfView;\nfloat aspectRatio;\nfloat near;\nfloat far;\npublic\
  \ LookAtCamera(float fieldOfView, float aspectRatio, float near, float far) {\n\
  this.fieldOfView = fieldOfView;\nthis.aspectRatio = aspectRatio;\nthis.near = near;\n\
  this.far = far;\nposition = new Vector3();\nup = new Vector3(0, 1, 0);\nlookAt =\
  \ new Vector3(0,0,-1);\n}\npublic Vector3 getPosition() {\nreturn position;\n}\n\
  public Vector3 getUp() {\nreturn up;\n}\npublic Vector3 getLookAt() {\nreturn lookAt;\n\
  }\npublic void setMatrices(GL10 gl) {\ngl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\n\
  GLU.gluPerspective(gl, fieldOfView, aspectRatio, near, far);\ngl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  gl.glLoadIdentity();\nGLU.gluLookAt(gl, position.x, position.y, position.z, lookAt.x,\
  \ lookAt.y, lookAt.z, up.x, up.y, up.z);\n}\n}\n清单 11-11. `LookAtCamera.java`：一个简单的不带额外功能的观察相机\n\
  ```\n\n这里没有什么意外之处。我们只是将`position`、`up`和`lookAt`值存储为`Vector3`实例，以及我们在`EulerCamera`类中也有的透视投影参数。此外，我们提供了一些\
  \ getter 方法，以便我们可以修改相机的属性。唯一有趣的方法是`setMatrices()`，但即使这个对我们来说也是老生常谈。我们首先根据视场角、宽高比以及近远裁剪平面距离，将投影矩阵设置为透视投影矩阵。然后，我们通过`gluLookAt()`将模型视图矩阵设置为包含相机位置和朝向矩阵，正如第\
  \ 10 章所讨论的那样。这实际上会产生一个与我们在`EulerCamera`示例中“手工制作”的矩阵非常相似的矩阵。它也会围绕相机旋转物体，而不是相反。然而，`gluLookAt()`方法的良好接口使我们免于处理诸如反转位置或角度之类的傻事。\n\
  \n事实上，我们可以像使用`EulerCamera`实例一样使用这个相机。我们只需要通过从相机的观察点减去其位置并归一化来创建一个方向向量。然后，我们只需根据偏航角和俯仰角旋转这个方向向量。最后，我们将新的观察位置设置为相机的位置加上方向向量。两种方法都会产生完全相同的变换矩阵。这只是处理相机朝向的两种不同方式。\n\
  \n我们将避免为`LookAtCamera`类编写一个明确的示例，因为它的接口非常简单。我们将在本书的最后一个游戏中使用它，让它跟随一艘漂亮的小飞船！如果你想稍微摆弄一下它，可以将其添加到我们之前编写的`LightTest`中，或者修改`EulerCameraTest`，使`LookAtCamera`类能够像第一人称射击相机一样使用，如上一段所述。\n\
  \n加载模型\n\n像我们的立方体那样在代码中定义模型是非常繁琐的。创建这类模型的更好方法是使用允许所见即所得创建复杂形状和物体的专用软件。有大量的软件可以用于此任务：\n\
  \n*   Blender，一个开源项目，用于许多游戏和电影制作。它功能强大且灵活，但也有点令人生畏。\n*   Wings3D，我们的首选武器，也是开源的。我们用它来对静态物体进行简单的低多边形（即：三角形数量不多）建模。它非常简单，但能完成任务。\n\
  *   3D Studio Max，业界事实上的标准之一。它是一个商业产品，但有学生版可用。\n\n\n\n*   `Maya`，另一款行业常用软件。它也是商业产品，但提供一些可能适合预算较小的定价选项。\n\
  \n以上仅是市面上较流行软件中的一部分。教您如何使用其中一款软件已远远超出本书的范围。然而，无论您使用什么软件，在某个时候，您都会将工作保存为某种格式。其中一种格式是`Wavefront\
  \ OBJ`，这是一种非常古老的纯文本格式，可以轻松解析并转换为我们的`Vertices3`实例。\n\n## Wavefront OBJ 格式\n\n我们将为此格式的一个子集实现一个加载器。我们的加载器将支持仅由三角形组成的模型，并且可以选择包含纹理坐标和法线。`OBJ`格式还支持存储任意凸多边形，但我们不涉及此内容。无论您是直接找到一个`OBJ`模型还是自己创建，只需确保它是三角化的——即仅由三角形组成。\n\
  \n`OBJ`格式是基于行的。以下是我们将要处理的语法部分：\n\n*   `v x y z`：`v`表示该行编码了一个顶点位置，而`x`、`y`和`z`是编码为浮点数的坐标。\n\
  *   `vn i j k`：`vn`表示该行编码了一个顶点法线，其中`i`、`j`和`k`是顶点法线的 x、y 和 z 分量。\n*   `vt u v`：`vt`表示该行编码了一个纹理坐标对，其中`u`和`v`是纹理坐标。\n\
  *   `f v1/vt1/vn1 v2/vt2/vn2 v3/vt3/vn3`：`f`表示该行编码了一个三角形。每个`v/vt/vn`块包含了该三角形某个顶点的位置、纹理坐标和顶点法线的索引。这些索引相对于之前由其他三种行格式定义的顶点位置、纹理坐标和顶点法线。可以省略`vt`和`vn`索引，以表示该三角形的特定顶点没有纹理坐标或法线。\n\
  \n我们将忽略任何不以`v`、`vn`、`vt`或`f`开头的行；如果任何允许的行不符合上述格式，我们还将输出错误。单行内的项目由空白字符分隔，可以包括空格、制表符等。\n\
  \n注意\n\n`OBJ`格式可以存储比我们在此处解析的多得多的信息。只要模型是三角化的并且具有法线和纹理坐标，我们只需解析此处显示的语法并忽略其他任何内容即可。\n\
  \n这是一个非常简单的示例，展示了带有法线的纹理三角形的`OBJ`格式：\n\n```\nv -0.5 -0.5 0\nv 0.5 -0.5 0\nv 0 0.5\
  \ 0\nvn 0 0 1\nvn 0 0 1\nvn 0 0 1\nvt 0 1\nvt 1 1\nvt 0.5 0\nf 1/1/1 2/2/2 3/3/3\n\
  ```\n\n请注意，顶点位置、纹理坐标和法线不必按如此整齐的顺序定义。如果保存文件的软件选择这样做，它们可以交织在一起。\n\n`f`语句中给出的索引是从 1\
  \ 开始的，而不是从 0 开始的（如 Java 数组的情况）。有些软件甚至会输出负索引。这是`OBJ`格式规范所允许的，但处理起来很麻烦。我们必须跟踪到目前为止已加载的顶点位置、纹理坐标或顶点法线的数量，然后根据该索引指示的是哪个顶点属性，将该负索引添加到相应的位置、纹理坐标或法线的数量上。\n\
  \n## 实现 OBJ 加载器\n\n我们的计划是将文件完全加载到内存中，并为每行创建一个字符串。我们还将为所有将要加载的顶点位置、纹理坐标和法线创建临时的浮点数组。它们的大小将等于`OBJ`文件中的行数乘以每个属性的分量数；即纹理坐标为\
  \ 2，法线为 3。通过这样做，我们分配的内存会超出存储数据所需的数量，但这仍然比每次数组填满时都分配新数组要好。\n\n对于定义每个三角形的索引，我们也采用同样的做法。虽然`OBJ`格式确实是一种索引格式，但我们不能直接将那些索引用于我们的`Vertices3`类。原因是一个顶点属性可能被多个顶点重复使用，因此存在一对多的关系，这在`OpenGL\
  \ ES`中是不允许的。因此，我们将使用一个非索引的`Vertices3`实例，并简单地复制顶点。对于我们的需求，这样做是可以的。\n\n让我们看看如何实现所有这些。代码如清单\
  \ 11-12 所示。\n\n```\npackage com.badlogic.androidgames.framework.gl;\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  public class ObjLoader {\npublic static Vertices3 load(GLGame game, String file)\
  \ {\nInputStream in = null;\ntry {\nin = game.getFileIO().readAsset(file);\nList\
  \ lines = readLines(in);\nfloat[] vertices = new float[lines.size()* 3];\nfloat[]\
  \ normals = new float[lines.size()* 3];\nfloat[] uv = new float[lines.size()* 2];\n\
  int numVertices = 0;\nint numNormals = 0;\nint numUV = 0;\nint numFaces = 0;\nint[]\
  \ facesVerts = new int[lines.size() * 3];\nint[] facesNormals = new int[lines.size()\
  \ * 3];\nint[] facesUV = new int[lines.size() * 3];\nint vertexIndex = 0;\nint normalIndex\
  \ = 0;\nint uvIndex = 0;\nint faceIndex = 0;\nListing 11-12.\nObjLoader.java：一个用于加载\
  \ OBJ 格式子集的简单类\n```\n\n我们首先打开一个`InputStream`到由`file`参数指定的资源文件。然后，我们使用一个名为`readLines()`的方法（在后续代码中定义）读取该文件的所有行。根据行数，我们分配浮点数组，这些数组将存储每个顶点位置的\
  \ x、y 和 z 坐标；每个顶点法线的 x、y 和 z 分量；以及每个顶点纹理坐标的 u 和 v 分量。由于我们不知道文件中有多少个顶点，我们只是分配比数组所需更多的空间。每个顶点属性都存储在三个数组的后续元素中。第一个读取的顶点的位置在`vertices[0]`、`vertices[1]`和`vertices[2]`中，依此类推。我们还跟踪三角形定义中每个顶点属性的索引。此外，我们还有几个计数器来跟踪已加载的内容数量。\n\
  \n```\nfor (int i = 0; i < lines.size(); i++) {\nString line = lines.get(i);\n```\n\
  \n接下来，我们有一个`for`循环，它遍历文件中的所有行。\n\n```\nif (line.startsWith(\"v \")) {\nString[]\
  \ tokens = line.split(\"[ ]+\");\nvertices[vertexIndex] = Float.parseFloat(tokens[1]);\n\
  vertices[vertexIndex + 1] = Float.parseFloat(tokens[2]);\nvertices[vertexIndex +\
  \ 2] = Float.parseFloat(tokens[3]);\nvertexIndex += 3;\nnumVertices++;\ncontinue;\n\
  }\n```\n\n如果当前行是顶点位置定义，我们按空白字符分割该行，读取 x、y 和 z 坐标，并将其存储在`vertices`数组中。\n\n\n```java\n\
  if (line.startsWith(\"vn \")) {\n    String[] tokens = line.split(\"[ ]+\");\n \
  \   normals[normalIndex] = Float.parseFloat(tokens[1]);\n    normals[normalIndex\
  \ + 1] = Float.parseFloat(tokens[2]);\n    normals[normalIndex + 2] = Float.parseFloat(tokens[3]);\n\
  \    normalIndex += 3;\n    numNormals++;\n    continue;\n}\nif (line.startsWith(\"\
  vt\")) {\n    String[] tokens = line.split(\"[ ]+\");\n    uv[uvIndex] = Float.parseFloat(tokens[1]);\n\
  \    uv[uvIndex + 1] = Float.parseFloat(tokens[2]);\n    uvIndex += 2;\n    numUV++;\n\
  \    continue;\n}\n```\n\n我们对法线和纹理坐标执行相同的操作。\n\n```java\nif (line.startsWith(\"\
  f \")) {\n    String[] tokens = line.split(\"[ ]+\");\n    String[] parts = tokens[1].split(\"\
  /\");\n    facesVerts[faceIndex] = getIndex(parts[0], numVertices);\n    if (parts.length\
  \ > 2)\n        facesNormals[faceIndex] = getIndex(parts[2], numNormals);\n    if\
  \ (parts.length > 1)\n        facesUV[faceIndex] = getIndex(parts[1], numUV);\n\
  \    faceIndex++;\n    parts = tokens[2].split(\"/\");\n    facesVerts[faceIndex]\
  \ = getIndex(parts[0], numVertices);\n    if (parts.length > 2)\n        facesNormals[faceIndex]\
  \ = getIndex(parts[2], numNormals);\n    if (parts.length > 1)\n        facesUV[faceIndex]\
  \ = getIndex(parts[1], numUV);\n    faceIndex++;\n    parts = tokens[3].split(\"\
  /\");\n    facesVerts[faceIndex] = getIndex(parts[0], numVertices);\n    if (parts.length\
  \ > 2)\n        facesNormals[faceIndex] = getIndex(parts[2], numNormals);\n    if\
  \ (parts.length > 1)\n        facesUV[faceIndex] = getIndex(parts[1], numUV);\n\
  \    faceIndex++;\n    numFaces++;\n    continue;\n}\n```\n\n在这段代码中，三角形的每个顶点（这里称为面，即\
  \ OBJ 格式中的术语）由指向顶点位置、纹理坐标和法线数组的三个索引值定义。纹理坐标和法线索引可以省略，因此我们对此进行了跟踪。索引也可以是负数，此时需要将其加到已加载的位置/纹理坐标/法线数量上。这正是\
  \ `getIndex()` 方法为我们所做的。\n\n```java\nfloat[] verts = new float[(numFaces * 3) *\
  \ (3 + (numNormals > 0 ? 3 : 0) + (numUV > 0 ? 2 : 0))];\n```\n\n一旦我们加载了所有顶点位置、纹理坐标、法线和三角形，就可以开始组装一个浮点数组，该数组以\
  \ `Vertices3` 实例所期望的格式保存顶点。存储这些顶点所需的浮点数量很容易根据加载的三角形数量以及是否提供法线和纹理坐标推导出来。\n\n```java\n\
  for (int i = 0, vi = 0; i < facesVerts.length; i++) {\n    int posIdx = facesVerts[i]\
  \ * 3;\n    verts[vi++] = positions[posIdx];\n    verts[vi++] = positions[posIdx\
  \ + 1];\n    verts[vi++] = positions[posIdx + 2];\n    if (numUV > 0) {\n      \
  \  int uvIdx = facesUV[i] * 2;\n        verts[vi++] = uv[uvIdx];\n        verts[vi++]\
  \ = 1 - uv[uvIdx + 1];\n    }\n    if (numNormals > 0) {\n        int normalIdx\
  \ = facesNormals[i] * 3;\n        verts[vi++] = normals[normalIdx];\n        verts[vi++]\
  \ = normals[normalIdx + 1];\n        verts[vi++] = normals[normalIdx + 2];\n   \
  \ }\n}\n```\n\n为了填充 `verts` 数组，我们只需遍历所有三角形，获取每个三角形顶点的顶点属性，然后按照通常用于 `Vertices3` 实例的布局将它们放入\
  \ `verts` 数组。\n\n```java\nVertices3 model = new Vertices3(game.getGLGraphics(),\
  \ numFaces * 3, 0, false, numUV > 0, numNormals > 0);\nmodel.setVertices(verts,\
  \ 0, verts.length);\nreturn model;\n```\n\n我们做的最后一件事是实例化 `Vertices3` 并设置顶点。\n\n\
  ```java\n} catch (Exception ex) {\n    throw new RuntimeException(\"couldn't load\
  \ '\" + file + \"'\", ex);\n} finally {\n    if (in != null)\n        try {\n  \
  \          in.close();\n        } catch (Exception ex) {\n        }\n}\n```\n\n\
  方法的其余部分仅处理异常处理和关闭 `InputStream`。\n\n```java\nstatic int getIndex(String index, int\
  \ size) {\n    int idx = Integer.parseInt(index);\n    if (idx < 0)\n        return\
  \ size + idx;\n    else\n        return idx - 1;\n}\n```\n\n`getIndex()` 方法接受三角形定义中顶点属性的一个索引值，以及已加载的属性数量，然后返回一个适当的索引，用于在我们的工作数组中引用该属性。\n\
  \n```java\nstatic List<String> readLines(InputStream in) throws IOException {\n\
  \    List<String> lines = new ArrayList<String>();\n    BufferedReader reader =\
  \ new BufferedReader(new InputStreamReader(in));\n    String line = null;\n    while\
  \ ((line = reader.readLine()) != null)\n        lines.add(line);\n    return lines;\n\
  }\n```\n\n最后，还有一个 `readLines()` 方法，它只读取文件的每一行，并将所有这些行作为字符串列表返回。\n\n要从 asset 资源加载\
  \ OBJ 文件，我们可以按如下方式使用 `ObjLoader`：\n\n```java\nVertices3 model = ObjLoader.load(game,\
  \ \"mymodel.obj\");\n```\n\n经过所有这些索引处理之后，这非常简单明了，对吧？不过，要渲染这个 `Vertices3` 实例，我们需要知道它有多少顶点。让我们再次扩展\
  \ `Vertices3` 类，添加两个方法，分别返回实例中当前定义的顶点数量和索引数量。清单 11-13 展示了代码。\n\n```java\npublic\
  \ int getNumIndices() {\n    return indices.limit();\n}\npublic int getNumVertices()\
  \ {\n    return vertices.limit() / (vertexSize / 4);\n}\n```\n*清单 11-13. 摘自 Vertices3.java：获取顶点和索引的数量*\n\
  \n对于索引数量，我们只需返回存储索引的 `ShortBuffer` 的 limit 值。对于顶点数量，我们也做同样的操作。然而，由于 limit 值是以 `FloatBuffer`\
  \ 中定义的浮点数数量来报告的，因此我们必须将其除以顶点大小。由于我们在 `vertexSize` 中以字节数存储这个值，所以我们将 `vertexSize`\
  \ 除以 4。\n\n## 使用 OBJ 加载器\n\n为了演示 OBJ 加载器，让我们重写前面的示例，创建一个名为 `ObjTest` 的新测试，以及一个 `ObjScreen`。复制前面示例的所有代码，只更改\
  \ `ObjScreen` 类构造函数中负责创建立方体的那一行：\n\n```java\ncube = ObjLoader.load(glGame, \"cube.obj\"\
  );\n```\n\n现在，我们不再使用 `createCube()` 方法（该方法已被移除），而是直接从名为 `cube.obj` 的 OBJ 文件加载模型。我们在\
  \ Wings3D 中创建了一个之前通过 `createCube()` 方法以编程方式指定的立方体的副本。你可以像其他所有资源一样，在 SVN 仓库中找到它。它拥有与手工制作版本相同的顶点位置、纹理坐标和法线。不出所料，当你运行\
  \ `ObjTest` 时，它的外观将与我们之前的 `EulerCameraTest` 完全相同。因此，我们不再提供必要的截图。\n\n## 关于加载模型的一些说明\n\
  \n对于我们在下一章中要编写的游戏来说，我们的加载器足够用了，但它远非健壮。这里有一些注意事项：\n\n- Android 中的字符串处理本身就比较慢。OBJ\
  \ 格式是一种纯文本格式，因此需要大量的解析工作。这会对加载时间产生负面影响。我们可以通过将 OBJ 模型转换为自定义二进制格式来规避这个问题。例如，我们可以直接序列化在\
  \ `ObjLoader.load()` 方法中填充的 `verts` 数组。\n\n- OBJ 格式还有很多我们没有利用的特性。如果你想扩展我们简单的加载器，可以在网上查找格式规范。添加更多功能应该很容易。\n\
  \n- OBJ 文件通常伴随一个所谓的材质文件。该文件定义了 OBJ 文件中顶点组要使用的颜色和纹理。我们不需要这个功能，因为我们知道特定 OBJ 文件应使用哪种纹理。对于一个更健壮的加载器，你还需要研究材质文件的规范。\n\
  \n## 3D 中的一点物理知识\n\n在第 8 章中，我们在 2D 中开发了一个非常简单的基于质点模型的物理系统。好消息是：所有内容在 3D 中都是一样的！\n\
  \n- 位置现在是 3D 向量，而不是 2D 向量。我们只需添加一个 z 坐标。\n- 速度仍然以每个轴上的米每秒表示。我们只需为 z 轴再添加一个分量！\n\n\
  \n*   加速度仍然以每轴每秒平方米（`m/s²`）为单位表示。同样，我们只需再增加一个坐标即可。\n\n在第 8 章中，我们用来描述物理模拟更新的伪代码如下所示：\n\
  \n```\nVector2 position = new Vector2();\nVector2 velocity = new Vector2();\nVector2\
  \ acceleration = new Vector2(0, -10);\nwhile(simulationRuns) {\nfloat deltaTime\
  \ = getDeltaTime();\nvelocity.add(acceleration.x * deltaTime, acceleration.y * deltaTime);\n\
  position.add(velocity.x * deltaTime, velocity.y * deltaTime);\n}\n```\n\n我们只需将 `Vector2`\
  \ 实例替换为 `Vector3` 实例，即可将其转换为三维空间中的代码：\n\n```\nVector3 position = new Vector3();\n\
  Vector3 velocity = new Vector3();\nVector3 acceleration = new Vector3(0, -10, 0);\n\
  while(simulationRuns) {\nfloat deltaTime = getDeltaTime();\nvelocity.add(acceleration.x\
  \ * deltaTime, acceleration.y * deltaTime, acceleration.z * deltaTime);\nposition.add(velocity.x\
  \ * deltaTime, velocity.y * deltaTime, velocity.z * deltaTime);\n}\n```\n\n就是这么简单！这个简单的物理模型对于许多简单的\
  \ 3D 游戏来说已经足够了。在本书的最终游戏中，由于游戏对象的性质，我们甚至不会使用任何加速度。\n\n当然，更复杂的 3D（以及 2D）物理实现起来要困难得多。为此，你通常更愿意使用第三方库，而不是自己重复造轮子。在\
  \ Android 上，由于涉及大量计算，基于 Java 的解决方案会过于缓慢。有一些针对 Android 的 2D 物理解决方案，它们通过 Java 本地接口（JNI）封装了像\
  \ Box2D 这样的原生 C++ 库，为 Java 应用程序提供原生 API。对于 3D 物理，有一个名为 `Bullet` 的库。然而，目前还没有可用于该库的、可用的\
  \ JNI 绑定。不过，这些主题远远超出了本书的范围，而且在许多情况下，我们并不需要复杂的刚体物理。\n\n## 3D 中的碰撞检测与对象表示\n\n在第 8\
  \ 章中，我们讨论了对象表示与碰撞检测之间的关系。我们力求使游戏世界中的对象尽可能独立于其图形表示。相反，我们希望根据它们的包围形状、位置和方向来定义它们。位置和方向不是大问题；我们可以将前者表示为一个\
  \ `Vector3` 实例，将后者表示为绕 x、y 和 z 轴的旋转（注意第 10 章中提到的潜在万向锁问题）。然而，让我们来看看包围形状。\n\n### 3D\
  \ 中的包围形状\n\n就包围形状而言，与 2D 编程一样，我们也有大量的选择。图 11-12 显示了 3D 编程中一些更常用的包围形状。\n\n*   **三角形网格**：这种形状尽可能紧密地包围对象。然而，基于三角形网格对两个对象进行碰撞检测的计算量很大。\n\
  *   **轴对齐包围盒**：这种形状松散地包围对象。其计算强度远低于三角形网格。\n*   **包围球**：这种形状对对象的包围效果更差，但它是检查碰撞的最快方法。\n\
  \n![A340874_3_En_11_Fig12_HTML.jpg](img/A340874_3_En_11_Fig12_HTML.jpg)\n\n图 11-12.\
  \ 各种包围形状。从左到右：三角形网格、轴对齐包围盒和包围球。\n\n三角形网格和包围盒的另一个问题是，每当我们旋转或缩放对象时，都必须重新调整它们的朝向，这与\
  \ 2D 中的情况类似。另一方面，如果我们旋转对象，包围球则无需任何修改。如果缩放对象，我们只需要缩放球的半径，这只是一个简单的乘法问题。\n\n### 包围球重叠测试\n\
  \n三角形网格和包围盒碰撞检测的数学原理可能相当复杂。对于我们的下一个游戏，包围球就足够了。我们还可以应用一个之前在《超级跳跃者》中使用过的小技巧：为了使包围球贴合得更好，我们将其做得比图形表示更小。图\
  \ 11-13 显示了在宇宙飞船的情况下可能的样子。\n\n![A340874_3_En_11_Fig13_HTML.jpg](img/A340874_3_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13. 缩小包围球以更好地贴合对象\n\n当然，这是一个非常廉价的技巧，但事实证明，在许多情况下，它足以维持近乎正确的碰撞检测的假象。\n\n那么，我们如何让两个球体相互碰撞呢？或者更确切地说，我们如何测试它们是否重叠？这与圆形情况下的方法完全相同！我们需要做的就是测量一个球体中心到另一个球体中心的距离。如果这个距离小于两个球体半径之和，那么就发生了碰撞。让我们创建一个简单的\
  \ `Sphere` 类。清单 11-14 展示了代码。\n\n```\npackage com.badlogic.androidgames.framework.math;\n\
  public class Sphere {\npublic final Vector3 center = new Vector3();\npublic float\
  \ radius;\npublic Sphere(float x, float y, float z, float radius) {\nthis.center.set(x,y,z);\n\
  this.radius = radius;\n}\n}\n清单 11-14.\nSphere.java：一个简单的包围球\n```\n\n这与我们在第 8 章的\
  \ `Circle` 类中使用的代码相同。我们所做的更改只是用来存放中心的向量，现在它是 `Vector3` 而不是 `Vector2`。\n\n让我们也扩展一下我们的\
  \ `OverlapTester` 类，添加用于检查两个球体是否重叠以及测试一个点是否在球体内部的方法。清单 11-15 展示了代码。\n\n```\npublic\
  \ static boolean overlapSpheres(Sphere s1, Sphere s2) {\nfloat distance = s1.center.distSquared(s2.center);\n\
  float radiusSum = s1.radius + s2.radius;\nreturn distance <= radiusSum * radiusSum;\n\
  }\npublic static boolean pointInSphere(Sphere c, Vector3 p) {\nreturn c.center.distSquared(p)\
  \ < c.radius * c.radius;\n}\npublic static boolean pointInSphere(Sphere c, float\
  \ x, float y, float z) {\nreturn c.center.distSquared(x, y, z) < c.radius * c.radius;\n\
  }\n清单 11-15.\nOverlapTester.java 节选：添加球体测试方法\n```\n\n这再次与圆形重叠测试的代码完全相同。我们只是使用了球体的中心，它们是\
  \ `Vector3` 实例，而不是像圆形情况下的 `Vector2` 实例。\n\n> **注：** 关于 3D 碰撞检测的主题已有整本书的篇幅。如果你想更深入地了解这个相当有趣的世界，我们推荐\
  \ Christer Ericson 所著的《*实时碰撞检测*》（Morgan Kaufmann，2005 年）。任何有自尊心的游戏开发者的书架上都应该有这本书！\n\
  \n## `GameObject3D` 和 `DynamicGameObject3D`\n\n现在我们为 3D 对象有了一个不错的包围形状，就可以轻松地编写与我们在\
  \ 2D 中使用的 `GameObject` 和 `DynamicGameObject` 类等效的类了。我们只需将所有 `Vector2` 实例替换为 `Vector3`\
  \ 实例，并使用 `Sphere` 类代替 `Rectangle` 类。清单 11-16 展示了 `GameObject3D` 类。\n\n```\npackage\
  \ com.badlogic.androidgames.framework;\nimport com.badlogic.androidgames.framework.math.Sphere;\n\
  import com.badlogic.androidgames.framework.math.Vector3;\npublic class GameObject3D\
  \ {\npublic final Vector3 position;\npublic final Sphere bounds;\npublic GameObject3D(float\
  \ x, float y, float z, float radius) {\nthis.position = new Vector3(x,y,z);\nthis.bounds\
  \ = new Sphere(x, y, z, radius);\n}\n}\n清单 11-16.\nGameObject3D.java：表示一个具有位置和边界的简单对象\n\
  ```\n\n\n\n这段代码非常简单，你可能不需要任何解释。唯一的小麻烦是，我们必须将同一位置存储两次：一次作为 `GameObject3D` 类中的 `position`\
  \ 成员，另一次作为 `GameObject3D` 类包含的 `Sphere` 实例中的 `position` 成员。这虽然有些丑陋，但为了清晰起见，我们仍将维持这种做法。\n\
  \n从该类派生一个 `DynamicGameObject3D` 类也很简单。清单 11-17 展示了代码。\n\n```\npackage com.badlogic.androidgames.framework;\n\
  import com.badlogic.androidgames.framework.math.Vector3;\npublic class DynamicGameObject3D\
  \ extends GameObject3D {\npublic final Vector3 velocity;\npublic final Vector3 accel;\n\
  public DynamicGameObject3D(float x, float y, float z, float radius) {\nsuper(x,\
  \ y, z, radius);\nvelocity = new Vector3();\naccel = new Vector3();\n}\n}\nListing\
  \ 11-17.\nDynamicGameObject3D.java: 与 GameObject3D 对应的动态版本\n```\n\n我们再次只需将所有 `Vector2`\
  \ 实例替换为 `Vector3` 实例，然后愉快地继续工作。\n\n在 2D 中，我们必须仔细考虑对象的图形表示（以像素为单位）与世界中模型使用的单位之间的关系。而在\
  \ 3D 中，我们可以摆脱这种束缚！我们从 OBJ 文件等加载的 3D 模型的顶点，可以按照我们想要的任何单位系统来定义。我们不再需要将像素转换为世界单位，反之亦然。这使得\
  \ 3D 工作稍微容易一些。我们只需要培训我们的美术人员，让他或她提供与我们的世界单位系统适当缩放的模型。\n\n## 总结\n\n我们在游戏编程的世界中再次揭示了许多奥秘。我们简单讨论了\
  \ 3D 中的向量，发现它们与 2D 中的向量一样易于使用。总体主题如下：只需添加一个 z 坐标！我们还了解了 OpenGL ES 中的光照。借助我们编写的用于表示材质和光源的辅助类，在场景中设置光照变得非常简单。为了获得更好的性能和更少的图形伪影，我们还在\
  \ `Texture` 类中实现了简单的 mipmapping。我们还探索了简单的欧拉相机和注视相机的实现，只使用了很少的代码，并借助了 `Matrix` 类。\n\
  \n由于在代码中手动创建 3D 网格很繁琐，我们还研究了最简单、最流行的 3D 文件格式之一：Wavefront OBJ。我们重新审视了简单的物理模型，并将其迁移到了\
  \ 3D 领域，发现这就像创建 3D 向量一样简单。\n\n我们议程上的最后一点是找出如何在 3D 中处理包围盒和对象表示。考虑到我们适度的需求，我们对这两个问题都找到了非常简单的解决方案，这些方案与我们在\
  \ 2D 中使用的方案非常相似，甚至完全相同。\n\n虽然 3D 编程涉及的内容远不止我们在此介绍的这些，但你现在已经对编写 3D 游戏所需的内容有了相当清晰的认识。一个重要的领悟是，2D\
  \ 游戏和 3D 游戏之间的差异并不大（当然，在一定的复杂度范围内）。我们不再需要畏惧 3D！在第 12 章中，我们将运用新学到的知识来编写本书的最后一款游戏：Droid\
  \ Invaders！\n\n## 12. 安卓入侵者：盛大终章\n\n我们终于准备好为本书创作最后一款游戏了。这次，我们将开发一款简单的动作/街机游戏，改编一款经典老游戏，并利用前两章讨论的技术赋予其出色的\
  \ 3D 视觉效果。\n\n### 核心游戏机制\n\n正如你可能从本章标题猜测到的那样，我们即将实现《太空入侵者》的一个变体，该游戏最初是 2D 形式（如图\
  \ 12-1 所示）。\n\n![A340874_3_En_12_Fig1_HTML.jpg](img/A340874_3_En_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 原始《太空入侵者》街机游戏\n\n\n\n这里有个小惊喜：我们将在大多数情况下继续停留在 2D 世界中。所有物体都将通过包围球和 3D\
  \ 空间坐标来定义 3D 边界，但运动仅发生在`x-z`平面上，这会让某些事情变得稍微简单一些。图 12-2 展示了经过适配的 3D 版《安卓侵略者》世界。该示意图使用\
  \ Wings3D 创建。\n\n![A340874_3_En_12_Fig2_HTML.jpg](img/A340874_3_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 3D 游戏场景示意图\n\n接下来定义游戏机制：\n\n- 飞船在游戏区域底部飞行，仅能在`x`轴方向上移动。\n- 移动范围受限于游戏区域边界。当飞船到达游戏区域左边界或右边界时，将直接停止移动。\n\
  - 我们希望为玩家提供两种操控选项：使用加速度计导航飞船，或使用屏幕上的左右移动按钮。\n- 飞船每秒可发射一次弹药。玩家通过按下屏幕上的按钮进行射击。\n-\
  \ 游戏区域底部设有三个护盾，每个护盾由五个立方体构成。\n- 侵略者初始配置如图 12-2 所示，随后将向左移动一段距离，再沿`z`轴正方向移动一段距离，最后向右移动一段距离。总共有\
  \ 32 个侵略者，排成四行，每行八个。\n- 侵略者会随机射击。\n- 当弹药击中飞船时，飞船爆炸并损失一条生命。\n- 当弹药击中护盾时，该护盾永久消失。\n\
  - 当弹药击中侵略者时，侵略者爆炸，得分增加 10 分。\n- 当所有侵略者被消灭后，新一波侵略者出现，移动速度比上一波略快。\n- 当侵略者直接与飞船碰撞时，游戏结束。\n\
  - 当飞船耗尽所有生命时，游戏结束。\n\n这个清单不算冗长吧？所有操作基本都能在 2D 中完成（在`x-z`平面而非`x-y`平面）。不过我们仍将使用 3D\
  \ 包围球。如果你愿意，可以在完成初次迭代后将其扩展为真正的 3D 游戏。现在，让我们继续构思背景故事和美术风格。\n\n## 构思背景故事与选择美术风格\n\n\
  我们将这款游戏命名为《安卓侵略者》，以此向 Android 系统和《太空侵略者》致敬。这个命名略显随意，但我们目前并不打算制作 3A 级大作。遵循《毁灭战士》等经典射击游戏的传统，背景故事将极为简洁，如下所示：\n\
  \n> 来自外太空的侵略者袭击了地球。你是唯一能抵御邪恶势力的勇士。\n\n这个设定对《毁灭战士》和《雷神之锤》来说已经足够，对《安卓侵略者》而言同样如此。\n\
  \n在图形用户界面方面，美术风格将带有一丝复古感，使用与第 9 章《超级跳跃者》相同的复古字体。而游戏世界本身将以华丽的 3D 形式呈现，采用带有纹理和光照效果的\
  \ 3D 模型。图 12-3 展示了游戏画面效果。\n\n![A340874_3_En_12_Fig3_HTML.jpg](img/A340874_3_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 《安卓侵略者》示意图，相当华丽！\n\n音乐将采用摇滚/金属混搭风格，音效则与游戏场景相匹配。\n\n## 定义屏幕与转场\n\n由于我们已经在第\
  \ 6 章的《Nom 先生》和第 9 章的《超级跳跃者》中两次实现了帮助屏幕和排行榜屏幕，因此在《安卓侵略者》中将不再重复这些功能——其实现原理始终相同，况且玩家看到游戏画面后理应立刻明白如何操作。取而代之的是，我们将添加一个设置屏幕，允许玩家选择输入方式（多点触控或加速度计），以及开启或关闭音效。以下是《安卓侵略者》的屏幕列表：\n\
  \n\n\n*   主界面包含一个标志，以及 `PLAY` 和 `SETTINGS` 选项。\n*   游戏界面会立即开始游戏（不再有 `READY?` 信号！），并能处理暂停状态（提供\
  \ `RESUME` 和 `QUIT` 选项），同时当飞船生命耗尽时显示 `GAME OVER`。\n*   设置界面会显示三个图标，分别代表配置选项（`multitouch`、`accelerometer`\
  \ 和 `sound`）。\n\n这与我们在前两款游戏中遇到的情况非常相似。图 12-4 展示了所有这些界面及它们之间的切换。\n\n![A340874_3_En_12_Fig4_HTML.jpg](img/A340874_3_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4. Android Invaders 的界面与切换\n\n### 定义游戏世界\n\n进行 3D 开发的乐趣之一在于我们摆脱了像素的束缚。我们可以用任意想要的单位来定义我们的世界。我们之前概述的游戏机制规定了一个有限的游戏区域，所以让我们先来定义这个区域。图\
  \ 12-5 展示了我们游戏世界中的游戏区域范围。\n\n![A340874_3_En_12_Fig5_HTML.jpg](img/A340874_3_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5. 游戏区域\n\n我们世界中的所有事件都将发生在这个 x-z 平面内的边界里。坐标在 x 轴上限制在 –14 到 14 之间，在 z 轴上限制在\
  \ 0 到 –15 之间。飞船将能够沿着游戏区域的底边移动，范围从 `(–14,0,0)` 到 `(14,0,0)`。\n\n接下来，我们定义世界中物体的大小：\n\
  \n*   飞船的半径为 `0.5` 个单位。\n*   入侵者的半径稍大，为 `0.75` 个单位。这使它们更容易被击中。\n*   每个护盾块的半径为 `0.5`\
  \ 个单位。\n*   每颗子弹的半径为 `0.1` 个单位。\n\n我们是如何得出这些数值的呢？我们只是将游戏世界划分为 1 单位乘以 1 单位的单元格，然后根据游戏区域的大小来确定每个游戏元素的尺寸。通常，你可以通过一些试验或使用像米这样的现实世界单位来得出这些测量值。在\
  \ Android Invaders 中，我们将使用无名称的通用单位。\n\n我们刚刚定义的半径当然可以直接转化为包围球。对于护盾块和飞船，我们可以稍微取巧一下，因为它们显然不是球形的。得益于我们世界的\
  \ 2D 特性，我们可以使用这个小技巧。对于入侵者而言，球体实际上已经是一个相当好的近似了。\n\n我们还需要定义移动物体的速度：\n\n*   飞船的最大移动速度为每秒\
  \ `20` 个单位。与 Super Jumper 类似，实际速度通常会较低，因为它取决于设备的倾斜角度。\n*   入侵者的初始移动速度为每秒 `1` 个单位。每波入侵都会略微提高这个速度。\n\
  *   子弹的移动速度为每秒 `10` 个单位。\n\n有了这些定义，我们就可以开始实现游戏世界的逻辑了。在开始实现逻辑之前，我们先创建资源。\n\n### 创建资源\n\
  \n与我们之前的游戏一样，我们有两种图形资源：UI 元素，例如标志和按钮，以及游戏中不同类型物体的模型。\n\n#### UI 资源\n\n我们将再次基于某个目标分辨率来创建\
  \ UI 资源。我们的游戏将以横屏模式运行，因此我们简单地选择 `480×320` 像素作为目标分辨率。图 12-4 中的界面展示了我们已经拥有的 UI 元素：一个标志、不同的菜单项、几个按钮和一些文本。对于文本，我们将重用\
  \ Super Jumper 中的字体。在之前的游戏中，我们已经完成了所有这些元素的合成工作，并且你已经了解到将它们放入纹理图集可以提高性能。我们将用于 Android\
  \ Invaders 的纹理图集，包含所有 UI 元素（以及游戏中所有界面使用的字体），如图 12-6 所示。\n\n![A340874_3_En_12_Fig6_HTML.jpg](img/A340874_3_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6. UI 元素图集，包含按钮、标志和字体。它存储在 `items.png` 文件中，尺寸为 `512×512` 像素。\n\n这基本上与我们在\
  \ Super Jumper 中使用的概念相同。我们还拥有一个在所有界面中都会渲染的背景。图 12-7 展示了这张图片。\n\n![A340874_3_En_12_Fig7_HTML.jpg](img/A340874_3_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7. 存储在 `background.jpg` 中的背景，尺寸为 `512×512` 像素\n\n如前文图 12-4 所示，我们只需要使用这张图片的左上角区域即可渲染出完整的帧（`480×320`\
  \ 像素）。\n\n这就是我们需要的所有 UI 元素了。现在，我们可以看看 3D 模型及其纹理了。\n\n#### 游戏资源\n\n正如第 11 章所述，详细讲解如何使用\
  \ Wings3D 等软件创建 3D 模型超出了本书的范围。如果你想创建自己的模型，请选择一个应用程序并学习一些教程，这些教程通常可以在互联网上免费获取。对于\
  \ Android Invaders 的模型，我们使用了 Wings3D，然后将其导出为 OBJ 格式，这样我们的框架就可以加载它们了。所有模型仅由三角形构成，并包含纹理坐标和法线。我们可能在某些模型中不需要纹理坐标，但有它们也无妨。\n\
  \n飞船模型及其纹理如图 12-8 所示。\n\n![A340874_3_En_12_Fig8_HTML.jpg](img/A340874_3_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8. 在 Wings3D 中的飞船模型（`ship.obj`）及其纹理（`ship.png`，`256×256` 像素）\n\n最关键的是，图 12-8\
  \ 中的飞船大致符合上一节中概述的“半径”。我们不需要缩放任何东西，也不需要在不同的坐标系之间转换尺寸和位置。飞船模型使用的单位与其包围球的单位相同！\n\n\
  图 12-9 展示了入侵者模型及其纹理。\n\n![A340874_3_En_12_Fig9_HTML.jpg](img/A340874_3_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9. 入侵者模型（`invader.obj`）及其纹理（`invader.png`，`256×256` 像素）\n\n入侵者模型遵循与飞船模型相同的原则。我们有一个\
  \ OBJ 文件存储顶点位置、纹理坐标、法线和面，以及一张纹理图像。\n\n护盾块和子弹被建模为立方体，并存储在 `shield.obj` 和 `shot.obj`\
  \ 文件中。尽管它们有纹理坐标，但在渲染时我们实际上并不使用纹理映射。我们只是将它们绘制成（半透明的）物体，并赋予特定的颜色（护盾块为蓝色，子弹为黄色）。\n\n\
  最后，我们还有爆炸效果（再次参见图 12-3）。我们如何建模它们呢？我们并不建模。我们采用在 2D 中相同的做法，简单地在 3D 世界中绘制一个具有适当 z 位置的矩形，然后使用包含爆炸动画帧的纹理图像进行纹理映射。这与我们在\
  \ Super Jumper 中用于动画对象的原理相同。唯一的区别是我们将矩形绘制在 z 值小于 `0` 的位置（即爆炸物体所在的位置）。我们甚至可以借此“滥用”\
  \ `SpriteBatcher` 类来实现这一点。万岁，OpenGL ES！图 12-10 展示了该纹理。\n\n![A340874_3_En_12_Fig10_HTML.jpg](img/A340874_3_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10. 爆炸动画纹理（`explode.png`，`256×256` 像素）\n\n动画的每一帧大小为 `64×64` 像素。我们需要做的就是为每一帧生成纹理区域，并将它们放入一个\
  \ `Animation` 实例中，这样我们就可以像在 Super Jumper 中处理松鼠和 Bob 动画一样，根据给定的动画时间获取正确的帧。\n\n####\
  \ 声音与音乐\n\n\n\n#### 音频资源\n\n对于音效，我们再次使用了`as3sfxr`。我们在网上找到了爆炸音效，这是一个公共领域的音效，因此可以在\
  \ Android Invaders 中使用。对于我们自己版本的 Android Invaders，我们使用真实乐器录制了音乐。是的——这非常复古。以下是 Android\
  \ Invaders 的音频文件列表：\n\n- `click.ogg`：用于菜单项/按钮的点击声音\n- `shot.ogg`：射击声音\n- `explosion.ogg`：爆炸声音\n\
  - `music.mp3`：我们为 Android Invaders 创作的摇滚/金属歌曲\n\n### 攻击计划\n\n确定了游戏机制、设计和素材后，我们可以开始编码了。像往常一样，我们创建一个新项目，复制所有框架代码，确保拥有正确的清单和图标等。现在，你应该对如何设置有了相当好的理解。Android\
  \ Invaders 的所有代码都将放在`com.badlogic.androidgames.androidinvaders`包中。素材存储在 Android\
  \ 项目的`assets/`目录中。我们使用了与 Super Jumper 相同的通用结构：一个继承自`GLGame`的默认 Activity；一组实现不同屏幕和转场效果的`GLScreen`实例，如图\
  \ 12-4 所示；用于加载素材和存储设置的类，以及游戏对象类；还有一个能以 3D 方式绘制游戏世界的渲染类。让我们从`Assets`类开始。\n\n## `Assets`类\n\
  \n好吧，我们之前在 Mr. Nom 和 Super Jumper 中已经做过同样的事，所以不要期待任何意外。清单 12-1 展示了`Assets`类的代码。\n\
  \n```java\npackage com.badlogic.androidgames.androidinvaders;\nimport com.badlogic.androidgames.framework.Music;\n\
  import com.badlogic.androidgames.framework.Sound;\nimport com.badlogic.androidgames.framework.gl.Animation;\n\
  import com.badlogic.androidgames.framework.gl.Font;\nimport com.badlogic.androidgames.framework.gl.ObjLoader;\n\
  import com.badlogic.androidgames.framework.gl.Texture;\nimport com.badlogic.androidgames.framework.gl.TextureRegion;\n\
  import com.badlogic.androidgames.framework.gl.Vertices3;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  public class Assets {\npublic static Texture background;\npublic static TextureRegion\
  \ backgroundRegion;\npublic static Texture items;\npublic static TextureRegion logoRegion;\n\
  public static TextureRegion menuRegion;\npublic static TextureRegion gameOverRegion;\n\
  public static TextureRegion pauseRegion;\npublic static TextureRegion settingsRegion;\n\
  public static TextureRegion touchRegion;\npublic static TextureRegion accelRegion;\n\
  public static TextureRegion touchEnabledRegion;\npublic static TextureRegion accelEnabledRegion;\n\
  public static TextureRegion soundRegion;\npublic static TextureRegion soundEnabledRegion;\n\
  public static TextureRegion leftRegion;\npublic static TextureRegion rightRegion;\n\
  public static TextureRegion fireRegion;\npublic static TextureRegion pauseButtonRegion;\n\
  public static Font font;\n```\n\n清单 12-1. `Assets.java`，一如既往地加载和存储素材\n\n我们有几个成员变量用于存储\
  \ UI 元素的纹理以及背景图像。我们还存储了一些`TextureRegion`以及一个`Font`实例。这涵盖了我们所有的 UI 需求。\n\n```java\n\
  public static Texture explosionTexture;\npublic static Animation explosionAnim;\n\
  public static Vertices3 shipModel;\npublic static Texture shipTexture;\npublic static\
  \ Vertices3 invaderModel;\npublic static Texture invaderTexture;\npublic static\
  \ Vertices3 shotModel;\npublic static Vertices3 shieldModel;\n```\n\n我们使用`Texture`实例和`Vertices3`实例来存储游戏对象的模型和纹理。我们使用一个`Animation`实例来保存爆炸动画的帧。\n\
  \n```java\npublic static Music music;\npublic static Sound clickSound;\npublic static\
  \ Sound explosionSound;\npublic static Sound shotSound;\n```\n\n我们使用一个`Music`实例和几个`Sound`实例来存储游戏的音频。\n\
  \n```java\npublic static void load(GLGame game) {\nbackground = new Texture(game,\
  \ \"background.jpg\", true);\nbackgroundRegion = new TextureRegion(background, 0,\
  \ 0, 480, 320);\nitems = new Texture(game, \"items.png\", true);\nlogoRegion = new\
  \ TextureRegion(items, 0, 256, 384, 128);\nmenuRegion = new TextureRegion(items,\
  \ 0, 128, 224, 64);\ngameOverRegion = new TextureRegion(items, 224, 128, 128, 64);\n\
  pauseRegion = new TextureRegion(items, 0, 192, 160, 64);\nsettingsRegion = new TextureRegion(items,\
  \ 0, 160, 224, 32);\ntouchRegion = new TextureRegion(items, 0, 384, 64, 64);\naccelRegion\
  \ = new TextureRegion(items, 64, 384, 64, 64);\ntouchEnabledRegion = new TextureRegion(items,\
  \ 0, 448, 64, 64);\naccelEnabledRegion = new TextureRegion(items, 64, 448, 64, 64);\n\
  soundRegion = new TextureRegion(items, 128, 384, 64, 64);\nsoundEnabledRegion =\
  \ new TextureRegion(items, 190, 384, 64, 64);\nleftRegion = new TextureRegion(items,\
  \ 0, 0, 64, 64);\nrightRegion = new TextureRegion(items, 64, 0, 64, 64);\nfireRegion\
  \ = new TextureRegion(items, 128, 0, 64, 64);\npauseButtonRegion = new TextureRegion(items,\
  \ 0, 64, 64, 64);\nfont = new Font(items, 224, 0, 16, 16, 20);\n```\n\n`load()`方法首先创建\
  \ UI 相关的内容。像往常一样，这只是一些纹理加载和区域创建。\n\n```java\nexplosionTexture = new Texture(game,\
  \ \"explode.png\", true);\nTextureRegion[] keyFrames = new TextureRegion[16];\n\
  int frame = 0;\nfor (int y = 0; y < 256; y += 64) {\nfor (int x = 0; x < 256; x\
  \ += 64) {\nkeyFrames[frame++] = new TextureRegion(explosionTexture, x, y, 64, 64);\n\
  }\n}\nexplosionAnim = new Animation(0.1f, keyFrames);\n```\n\n接下来，我们为爆炸动画创建`Texture`、每一帧的`TextureRegion`以及`Animation`实例。我们简单地以\
  \ 64 像素的步长，从左上角到右下角循环，为每一帧创建一个`TextureRegion`。然后，我们将所有区域提供给一个帧时长为 0.1 秒的`Animation`实例。\n\
  \n```java\nshipTexture = new Texture(game, \"ship.png\", true);\nshipModel = ObjLoader.load(game,\
  \ \"ship.obj\");\ninvaderTexture = new Texture(game, \"invader.png\", true);\ninvaderModel\
  \ = ObjLoader.load(game, \"invader.obj\");\nshieldModel = ObjLoader.load(game, \"\
  shield.obj\");\nshotModel = ObjLoader.load(game, \"shot.obj\");\n```\n\n接下来，我们加载飞船、入侵者、护盾块和子弹的模型和纹理。借助强大的`ObjLoader`，这非常简单，不是吗？请注意，我们对`Texture`使用了\
  \ mipmapping。\n\n```java\nmusic = game.getAudio().newMusic(\"music.mp3\");\nmusic.setLooping(true);\n\
  music.setVolume(0.5f);\nif (Settings.soundEnabled)\nmusic.play();\nclickSound =\
  \ game.getAudio().newSound(\"click.ogg\");\nexplosionSound = game.getAudio().newSound(\"\
  explosion.ogg\");\nshotSound = game.getAudio().newSound(\"shot.ogg\");\n}\n```\n\
  \n在这里，我们加载游戏的音乐和音效。对`Settings`类的引用与 Super Jumper 和 Mr. Nom 中的基本相同。当游戏启动时，此方法将在`AndroidInvaders`类中被调用一次，我们稍后将实现该类。一旦所有素材加载完毕，我们可以忘记其中大部分，除了`Texture`，因为如果游戏暂停然后恢复，我们需要重新加载它们。\n\
  \n```java\npublic static void reload() {\nbackground.reload();\nitems.reload();\n\
  explosionTexture.reload();\nshipTexture.reload();\ninvaderTexture.reload();\nif\
  \ (Settings.soundEnabled)\nmusic.play();\n}\n```\n\n这就是`reload()`方法的用途。我们在`AndroidInvaders.onResume()`方法中调用这个方法，以便重新加载纹理并恢复音乐播放。\n\
  \n```java\npublic static void playSound(Sound sound) {\nif (Settings.soundEnabled)\n\
  sound.play(1);\n}\n}\n```\n\n最后，我们拥有与 Super Jumper 中使用的相同的便捷方法，以简化播放音效的操作。当用户禁用声音时，此方法中不会播放任何内容。\n\
  \n> **注意**\n\n\n\n### 排版后内容\n\n虽然这种加载和管理资源的方法易于实现，但若资源数量稍多，就会变得混乱不堪。另一个问题是，有时所有资源无法同时全部载入内存。对于像本书中所开发的这类简单游戏而言，该方法尚可接受。我们在自己的游戏中也经常使用它。但对于大型游戏，你就需要考虑更复杂的资源管理策略了。\n\
  \n### Settings 类\n\n与 `Assets` 类类似，对于 `Settings` 类，我们可以在一定程度上复用之前游戏所编写的代码。现在我们可以额外存储一个布尔值，用于指示用户希望使用触摸屏还是加速计来控制飞船移动。我们可以放弃高分记录功能，因为无需追踪这项数据（当然，作为练习，你可以重新引入高分记录界面，并将这些分数保存到\
  \ SD 卡）。代码如 12-2 所示。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\n\
  import java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.IOException;\n\
  import java.io.InputStreamReader;\nimport java.io.OutputStreamWriter;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  public class Settings {\npublic static boolean soundEnabled = true;\npublic static\
  \ boolean touchEnabled = true;\npublic final static String file = \".androidinvaders\"\
  ;\nListing 12-2.\nSettings.java: 老样子\n```\n\n首先，我们存储音效是否启用，以及用户是否希望通过触摸输入来操控飞船。这些设置将保存在\
  \ SD 卡的 `.androidinvaders` 文件中。\n\n```\npublic static void load(FileIO files) {\n\
  BufferedReader in = null;\ntry {\nin = new BufferedReader(new InputStreamReader(files.readFile(file)));\n\
  soundEnabled = Boolean.parseBoolean(in.readLine());\ntouchEnabled = Boolean.parseBoolean(in.readLine());\n\
  } catch (IOException e) {\n// :( 没关系，我们有默认值\n} catch (NumberFormatException e) {\n\
  // :/ 没关系，默认值拯救了我们\n} finally {\ntry {\nif (in != null)\nin.close();\n} catch (IOException\
  \ e) {\n}\n}\n}\n```\n\n这一部分确实没什么需要赘述的；我们之前已经实现过。我们尝试从 SD 卡的文件中读取两个布尔值。如果读取失败，则回退到默认值。\n\
  \n```\npublic static void save(FileIO files) {\nBufferedWriter out = null;\ntry\
  \ {\nout = new BufferedWriter(new OutputStreamWriter(\nfiles.writeFile(file)));\n\
  out.write(Boolean.toString(soundEnabled));\nout.write(\"\\n\");\nout.write(Boolean.toString(touchEnabled));\n\
  } catch (IOException e) {\n} finally {\ntry {\nif (out != null)\nout.close();\n\
  } catch (IOException e) {\n}\n}\n}\n}\n```\n\n保存操作同样非常乏味。我们只是存储当前数据，如果失败就忽略错误。这又是一个值得改进的地方，因为你通常希望告知用户出现了问题。\n\
  \n## 主 Activity\n\n与往常一样，我们有一个派生自 `GLGame` 类的主 Activity。它负责在启动时通过调用 `Assets.load()`\
  \ 加载资源，并在 Activity 暂停或恢复时暂停或恢复音乐。作为开始界面，我们只返回 `MainMenuScreen`，稍后将实现它。另外需要留意的是，在清单文件的\
  \ Activity 定义中，务必将屏幕方向设置为 `landscape`。代码如 12-3 所示。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\n\
  import javax.microedition.khronos.egl.EGLConfig;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import com.badlogic.androidgames.framework.Screen;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  public class AndroidInvaders extends GLGame {\nboolean firstTimeCreate = true;\n\
  public Screen getStartScreen() {\nreturn new MainMenuScreen(this);\n}\n@Override\n\
  public void onSurfaceCreated(GL10 gl, EGLConfig config) {\nsuper.onSurfaceCreated(gl,\
  \ config);\nif (firstTimeCreate) {\nSettings.load(getFileIO());\nAssets.load(this);\n\
  firstTimeCreate = false;\n} else {\nAssets.reload();\n}\n}\n@Override\npublic void\
  \ onPause() {\nsuper.onPause();\nif (Settings.soundEnabled)\nAssets.music.pause();\n\
  }\n}\nListing 12-3.\nAndroidInvaders.java，主 Activity\n```\n\n这与《超级跳跃者》中的实现完全相同。当调用\
  \ `getStartScreen()` 时，我们返回一个 `MainMenuScreen` 的新实例，接下来将编写这个类。在 `onSurfaceCreated()`\
  \ 中，我们确保资源被重新加载；在 `onPause()` 中，如果音乐正在播放，则将其暂停。\n\n正如你所见，一旦你对如何实现简单游戏有了清晰思路，就会发现许多代码是可以重复利用的。思考一下，如何通过将更多代码迁移到框架中，进一步减少这些模板代码？\n\
  \n## 主菜单界面\n\n我们已经为之前的游戏编写过许多简单的界面。《安卓入侵者》也不例外。其原则始终如一：提供一些可点击的 UI 元素以触发屏幕切换或配置变更，并显示一些信息。主菜单界面仅展示游戏标志以及“开始游戏”和“设置”选项，如图\
  \ 12-4 所示。触摸其中一个按钮将触发跳转至 `GameScreen` 或 `SettingsScreen`。代码如 12-4 所示。\n\n```\npackage\
  \ com.badlogic.androidgames.androidinvaders;\nimport java.util.List;\nimport javax.microedition.khronos.opengles.GL10;\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class MainMenuScreen extends GLScreen {\nCamera2D guiCam;\nSpriteBatcher\
  \ batcher;\nVector2 touchPoint;\nRectangle playBounds;\nRectangle settingsBounds;\n\
  Listing 12-4.\nMainMenuScreen.java，主菜单界面\n```\n\n和往常一样，我们需要一个摄像机来设置视口，并需要 480×320\
  \ 像素的虚拟目标分辨率。我们使用 `SpriteBatcher` 来渲染 UI 元素和背景图片。`Vector2` 和 `Rectangle` 实例将帮助我们判断触摸是否命中了按钮。\n\
  \n```\npublic MainMenuScreen(Game game) {\nsuper(game);\nguiCam = new Camera2D(glGraphics,\
  \ 480, 320);\nbatcher = new SpriteBatcher(glGraphics, 10);\ntouchPoint = new Vector2();\n\
  playBounds = new Rectangle(240 - 112, 100, 224, 32);\nsettingsBounds = new Rectangle(240\
  \ - 112, 100 - 32, 224, 32);\n}\n```\n\n在构造函数中，我们像往常一样设置摄像机和 `SpriteBatcher`。根据我们\
  \ 480×320 目标分辨率下屏幕上两个元素的位置、宽度和高度，实例化 `Vector2` 和 `Rectangle` 对象。\n\n\n```java\n\
  @Override\npublic void update(float deltaTime) {\n    List events = game.getInput().getTouchEvents();\n\
  \    int len = events.size();\n    for(int i = 0; i < len; i++) {\n        TouchEvent\
  \ event = events.get(i);\n        if(event.type != TouchEvent.TOUCH_UP)\n      \
  \      continue;\n        guiCam.touchToWorld(touchPoint.set(event.x, event.y));\n\
  \        if(OverlapTester.pointInRectangle(playBounds, touchPoint)) {\n        \
  \    Assets.playSound(Assets.clickSound);\n            game.setScreen(new GameScreen(game));\n\
  \        }\n        if(OverlapTester.pointInRectangle(settingsBounds, touchPoint))\
  \ {\n            Assets.playSound(Assets.clickSound);\n            game.setScreen(new\
  \ SettingsScreen(game));\n        }\n    }\n}\n```\n\n在 `update()` 方法中，我们获取触摸事件并检查“触摸抬起”事件。如果存在这样的触摸事件，则将其真实坐标转换为相机设置的坐标系。接下来只需检查触摸点是否位于菜单项的两个矩形边界内。如果其中一个被击中，则播放点击声音并切换到相应屏幕。\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    guiCam.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n    batcher.beginBatch(Assets.background);\n\
  \    batcher.drawSprite(240, 160, 480, 320, Assets.backgroundRegion);\n    batcher.endBatch();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    batcher.beginBatch(Assets.items);\n    batcher.drawSprite(240, 240, 384, 128,\
  \ Assets.logoRegion);\n    batcher.drawSprite(240, 100, 224, 64, Assets.menuRegion);\n\
  \    batcher.endBatch();\n    gl.glDisable(GL10.GL_BLEND);\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n\
  }\n```\n\n`present()` 方法执行的操作与 Super Jumper 中的大多数屏幕相同。我们清除屏幕并通过相机设置投影矩阵。启用纹理后，立即通过\
  \ `SpriteBatcher` 和在 `Assets` 类中定义的 `TextureRegion` 渲染背景。菜单项具有半透明区域，因此在渲染它们之前启用混合。\n\
  \n```java\n@Override\npublic void pause() {\n}\n@Override\npublic void resume()\
  \ {\n}\n@Override\npublic void dispose() {\n}\n}\n```\n\n类的其余部分由不执行任何操作的样板方法组成。纹理重载在\
  \ `AndroidInvaders` 活动（`activity`）中完成，因此 `MainMenuScreen` 中无需处理其他事项。\n\n#### 设置屏幕\n\
  \n设置屏幕为玩家提供了更改输入方法以及启用或禁用音频的选项。我们使用三种不同的图标来表示这些选项（参见图 12-4）。触摸手形图标或倾斜设备图标可启用相应的输入方法。当前活动输入方法的图标将显示为金色。对于音频图标，我们执行与之前游戏相同的操作。\n\
  \n用户的选择通过设置 `Settings` 类中的相应布尔值来反映。我们还确保每当其中一项设置发生变化时，通过调用 `Settings.save()` 将这些设置立即保存到\
  \ SD 卡。列表 12-5 展示了代码。\n\n```java\npackage com.badlogic.androidgames.androidinvaders;\n\
  import java.util.List;\nimport javax.microedition.khronos.opengles.GL10;\nimport\
  \ com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  public class SettingsScreen extends GLScreen {\n    Camera2D guiCam;\n    SpriteBatcher\
  \ batcher;\n    Vector2 touchPoint;\n    Rectangle touchBounds;\n    Rectangle accelBounds;\n\
  \    Rectangle soundBounds;\n    Rectangle backBounds;\n}\n```\n\n列表 12-5. `SettingsScreen.java`，设置屏幕\n\
  \n与往常一样，我们有一个相机和一个 `SpriteBatcher` 来渲染 UI 元素和背景。为了检查触摸事件是否点击了按钮，我们存储了一个 `Vector2`\
  \ 实例和四个 `Rectangle` 实例，分别对应屏幕上的四个按钮。\n\n```java\npublic SettingsScreen(Game game)\
  \ {\n    super(game);\n    guiCam = new Camera2D(glGraphics, 480, 320);\n    batcher\
  \ = new SpriteBatcher(glGraphics, 10);\n    touchPoint = new Vector2();\n    touchBounds\
  \ = new Rectangle(120 - 32, 160 - 32, 64, 64);\n    accelBounds = new Rectangle(240\
  \ - 32, 160 - 32, 64, 64);\n    soundBounds = new Rectangle(360 - 32, 160 - 32,\
  \ 64, 64);\n    backBounds = new Rectangle(32, 32, 64, 64);\n}\n```\n\n在构造函数中，我们为屏幕设置所有成员。这里不涉及复杂的科学。\n\
  \n```java\n@Override\npublic void update(float deltaTime) {\n    List events = game.getInput().getTouchEvents();\n\
  \    int len = events.size();\n    for (int i = 0; i < len; i++) {\n        TouchEvent\
  \ event = events.get(i);\n        if (event.type != TouchEvent.TOUCH_UP)\n     \
  \       continue;\n        guiCam.touchToWorld(touchPoint.set(event.x, event.y));\n\
  \        if (OverlapTester.pointInRectangle(touchBounds, touchPoint)) {\n      \
  \      Assets.playSound(Assets.clickSound);\n            Settings.touchEnabled =\
  \ true;\n            Settings.save(game.getFileIO());\n        }\n        if (OverlapTester.pointInRectangle(accelBounds,\
  \ touchPoint)) {\n            Assets.playSound(Assets.clickSound);\n           \
  \ Settings.touchEnabled = false;\n            Settings.save(game.getFileIO());\n\
  \        }\n        if (OverlapTester.pointInRectangle(soundBounds, touchPoint))\
  \ {\n            Assets.playSound(Assets.clickSound);\n            Settings.soundEnabled\
  \ = !Settings.soundEnabled;\n            if (Settings.soundEnabled) {\n        \
  \        Assets.music.play();\n            } else {\n                Assets.music.pause();\n\
  \            }\n            Settings.save(game.getFileIO());\n        }\n      \
  \  if (OverlapTester.pointInRectangle(backBounds, touchPoint)) {\n            Assets.playSound(Assets.clickSound);\n\
  \            game.setScreen(new MainMenuScreen(game));\n        }\n    }\n}\n```\n\
  \n`update()` 方法获取触摸事件并检查是否已注册了“触摸抬起”事件。如果是，则将对触摸坐标转换到相机的坐标系。利用这些坐标，方法测试各个矩形以决定采取何种行动。\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    guiCam.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n    batcher.beginBatch(Assets.background);\n\
  \    batcher.drawSprite(240, 160, 480, 320, Assets.backgroundRegion);\n    batcher.endBatch();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    batcher.beginBatch(Assets.items);\n    batcher.drawSprite(240, 280, 224, 32,\
  \ Assets.settingsRegion);\n    batcher.drawSprite(120, 160, 64, 64,\n        Settings.touchEnabled\
  \ ? Assets.touchEnabledRegion : Assets.touchRegion);\n    batcher.drawSprite(240,\
  \ 160, 64, 64,\n        Settings.touchEnabled ? Assets.accelRegion\n           \
  \ : Assets.accelEnabledRegion);\n    batcher.drawSprite(360, 160, 64, 64,\n    \
  \    Settings.soundEnabled ? Assets.soundEnabledRegion : Assets.soundRegion);\n\
  \    batcher.drawSprite(32, 32, 64, 64, Assets.leftRegion);\n    batcher.endBatch();\n\
  \    gl.glDisable(GL10.GL_BLEND);\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n}\n```\n\
  \n`present()` 方法执行与 `MainMenuScreen.render()` 方法相同的操作。我们在需要时通过纹理和混合来渲染背景和按钮。根据当前设置，我们决定使用哪个\
  \ `TextureRegion` 来渲染三个设置按钮。\n\n```java\n@Override\npublic void pause() {\n}\n@Override\n\
  public void resume() {\n}\n@Override\npublic void dispose() {\n}\n}\n```\n\n类的其余部分同样由几个完全不包含任何功能的样板方法组成。\n\
  \n在创建 `GameScreen` 类之前，我们首先必须实现我们世界的逻辑和渲染。模型-视图-控制器（Model-View-Controller）来拯救！\n\
  \n#### 模拟类\n\n与往常一样，我们将为世界中的每个对象创建一个类：\n\n*   护盾方块\n*   子弹\n*   飞船\n*   入侵者\n\n\n\
  编排由全知全能的`World`类执行。正如我们在第 11 章中所见，在对象表示方面，2D 和 3D 之间实际上并没有那么大的差异。我们现在可以使用`GameObject3D`和`DynamicObject3D`，而不是`GameObject`和`DynamicObject`。唯一的区别是，我们使用`Vector3`实例而不是`Vector2`实例来存储位置、速度和加速度，并使用包围球体而不是包围矩形来表示对象的形状。剩下要做的就是实现我们世界中不同对象的行为。\n\
  \n### 盾牌方块类\n\n根据游戏机制的定义，我们了解盾牌方块的大小和行为。它们只是静静地待在我们世界中的某个位置，等待被飞船或入侵者的射击摧毁。它们没有太多逻辑，因此代码相当简洁。清单\
  \ 12-6 展示了盾牌方块的内部实现。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\n\
  import com.badlogic.androidgames.framework.GameObject3D;\npublic class Shield extends\
  \ GameObject3D {\nstatic float SHIELD_RADIUS = 0.5f;\npublic Shield(float x, float\
  \ y, float z) {\nsuper(x, y, z, SHIELD_RADIUS);\n}\n}\nListing 12-6.\nShield.java,\
  \ the shield block class\n```\n\n我们定义了盾牌的半径，并根据构造函数参数初始化了其位置和包围球体。仅此而已！\n\n### 射击类\n\
  \n`Shot`类同样简单。它继承自`DynamicGameObject3D`，因为它实际上是移动的。清单 12-7 展示了代码。\n\n```\npackage\
  \ com.badlogic.androidgames.androidinvaders;\nimport com.badlogic.androidgames.framework.DynamicGameObject3D;\n\
  public class Shot extends DynamicGameObject3D {\nstatic float SHOT_VELOCITY = 10f;\n\
  static float SHOT_RADIUS = 0.1f;\npublic Shot(float x, float y, float z, float velocityZ)\
  \ {\nsuper(x, y, z, SHOT_RADIUS);\nvelocity.z = velocityZ;\n}\npublic void update(float\
  \ deltaTime) {\nposition.z += velocity.z * deltaTime;\nbounds.center.set(position);\n\
  }\n}\nListing 12-7.\nShot.java, the shot class\n```\n\n在这里，我们定义了一些常量，即射击速度和半径。构造函数接受射击的初始位置以及其在\
  \ z 轴上的速度。等等，我们不是刚刚将速度定义为常量了吗？是的，但那会让我们的射击只沿着正 z 轴方向移动。这对于入侵者发射的射击没问题，但飞船发射的射击必须向相反方向移动。当我们创建射击时（在这个类外部），我们知道射击应该朝哪个方向移动。\n\
  \n`update()`方法只执行常规的质点物理学运算。其中不涉及加速度，因此我们只需将恒定速度乘以时间增量，然后加到射击的位置上。关键部分是，我们还需要根据射击的位置更新包围球体中心的位置。否则，包围球体将不会随射击移动。\n\
  \n### 飞船类\n\n`Ship`类负责更新飞船的位置，将其保持在游戏场地的边界内，并跟踪其所处的状态。它可以是存活或爆炸状态。在这两种情况下，我们都会跟踪飞船处于该状态的时间。然后，我们可以像在`Super\
  \ Jumper`及其`WorldRenderer`类中所做的那样，利用状态时间进行动画等操作。飞船将从外部获取其当前速度，该速度基于加速度计读数（就像我们对`Bob`所做的那样），或基于一个常量，具体取决于按下了哪个屏幕按钮。此外，飞船将跟踪其拥有的生命数，并为我们提供一种告知它已被击毁的方法。清单\
  \ 12-8 展示了代码。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\nimport\
  \ com.badlogic.androidgames.framework.DynamicGameObject3D;\npublic class Ship extends\
  \ DynamicGameObject3D {\nstatic float SHIP_VELOCITY = 20f;\nstatic int SHIP_ALIVE\
  \ = 0;\nstatic int SHIP_EXPLODING = 1;\nstatic float SHIP_EXPLOSION_TIME = 1.6f;\n\
  static float SHIP_RADIUS = 0.5f;\nListing 12-8.\nShip.java, the ship class\n```\n\
  \n我们首先定义一些常量，以指定最大飞船速度、两种状态（存活和爆炸）、飞船完全爆炸所需的时间以及飞船的包围球体半径。此外，我们让该类继承自`DynamicGameObject3D`，因为它具有位置、包围球体以及速度。存储在`DynamicGameObject3D`中的加速度向量将再次未被使用。\n\
  \n```\nint lives;\nint state;\nfloat stateTime = 0;\n```\n\n接下来，我们有成员变量，包括两个整数，用于跟踪飞船拥有的生命数及其状态（`SHIP_ALIVE`或`SHIP_EXPLODING`）。最后一个成员变量用于跟踪飞船处于当前状态已经过了多少秒。\n\
  \n```\npublic Ship(float x, float y, float z) {\nsuper(x, y, z, SHIP_RADIUS);\n\
  lives = 3;\nstate = SHIP_ALIVE;\n}\n```\n\n构造函数执行常规的父类构造函数调用，并初始化一些成员变量。飞船总共将拥有三条命。\n\
  \n```\npublic void update(float deltaTime, float accelY) {\nif (state == SHIP_ALIVE)\
  \ {\nvelocity.set(accelY / 10 * SHIP_VELOCITY, 0, 0);\nposition.add(velocity.x *\
  \ deltaTime, 0, 0);\nif (position.x < World.WORLD_MIN_X)\nposition.x = World.WORLD_MIN_X;\n\
  if (position.x > World.WORLD_MAX_X)\nposition.x = World.WORLD_MAX_X;\nbounds.center.set(position);\n\
  } else {\nif (stateTime >= SHIP_EXPLOSION_TIME) {\nlives--;\nstateTime = 0;\nstate\
  \ = SHIP_ALIVE;\n}\n}\nstateTime += deltaTime;\n}\n```\n\n`update()`方法非常简单。它接收时间增量和设备\
  \ y 轴上的当前加速度计读数（记住，我们处于横屏模式，因此加速度计的 y 轴对应我们屏幕的 x 轴）。如果飞船处于存活状态，我们根据加速度计值（范围在-10\
  \ 到 10 之间）设置其速度，就像我们在`Super Jumper`中对`Bob`所做的那样。此外，我们根据当前速度更新其位置。接下来，我们使用两个常量（稍后将在`World`类中定义）检查飞船是否离开了游戏场地的边界。位置固定后，我们可以更新飞船的包围球体中心。\n\
  \n如果飞船正在爆炸，我们会检查爆炸持续了多长时间。在爆炸状态持续 1.6 秒后，飞船爆炸完毕，失去一条命，并回到存活状态。\n\n最后，我们根据给定的时间增量更新`stateTime`成员变量。\n\
  \n```\npublic void kill() {\nstate = SHIP_EXPLODING;\nstateTime = 0;\nvelocity.x\
  \ = 0;\n}\n}\n```\n\n最后一个`kill()`方法将由`World`类调用，前提是它确定飞船与射击或入侵者之间发生了碰撞。它会将状态设置为爆炸，重置状态时间，并确保飞船在所有轴上的速度为零（我们从未设置速度向量的\
  \ y 和 z 分量，因为我们只在 x 轴上移动）。\n\n### 入侵者类\n\n入侵者只是根据预定义的漂浮在太空中。图 12-11 展示了这种模式。\n\n\
  ![A340874_3_En_12_Fig11_HTML.jpg](img/A340874_3_En_12_Fig11_HTML.jpg)\n\n**图 12-11.**\n\
  \n入侵者的移动：左、下、右、下、左、下、右、下...\n\n入侵者遵循一种极其简单的移动模式。从其初始位置开始，它首先向右移动一段距离。接着，它向下移动（在游戏场地上意味着沿正\
  \ z 轴方向），同样移动指定的距离。完成后，它开始向左移动，基本上回溯到它开始向右移动之前的相同 x 坐标。\n\n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的注意事项和示例，对给定的英文文本进行翻译。\n\
  \n\n```markdown\n左移和右移的距离总是相同的，除了开始时。图 12-11 说明了左上角入侵者的移动过程。它的第一次左移比后续所有向左或向右的移动都要短。水平移动距离是游戏区域宽度的一半，此处为\
  \ 14 个单位。对于第一次水平移动，入侵者需要移动的距离是此距离的一半，即 7 个单位。\n\n我们需要做的是跟踪入侵者的移动方向以及在该方向上已移动的距离。如果它达到了给定移动状态下的移动距离（水平移动为\
  \ 14 个单位，垂直移动为 1 个单位），它将切换到下一个移动状态。所有入侵者初始时，其移动距离都设置为游戏区域宽度的一半。再看一下图 12-11 就能理解为什么这样设置有效。这将使入侵者在游戏区域的左右边缘之间来回反弹。\n\
  \n入侵者也具有恒定速度。实际上，如果当前波次的所有入侵者都被消灭，每次生成新一波入侵者时，速度都会增加。我们只需将这个默认速度乘以一个从外部设置的常量（即负责更新所有入侵者的\
  \ `World` 类）即可实现这一点。\n\n最后，我们必须跟踪每个入侵者的状态，可以是存活或爆炸。我们将使用与飞船相同的机制，即包含一个状态和一个状态时间。清单\
  \ 12-9 展示了相关代码。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\nimport\
  \ com.badlogic.androidgames.framework.DynamicGameObject3D;\npublic class Invader\
  \ extends DynamicGameObject3D {\nstatic final int INVADER_ALIVE = 0;\nstatic final\
  \ int INVADER_DEAD = 1;\nstatic final float INVADER_EXPLOSION_TIME = 1.6f;\nstatic\
  \ final float INVADER_RADIUS = 0.75f;\nstatic final float INVADER_VELOCITY = 1;\n\
  static final int MOVE_LEFT = 0;\nstatic final int MOVE_DOWN = 1;\nstatic final int\
  \ MOVE_RIGHT = 2;\nListing 12-9.\nInvader.java, the invader class\n```\n\n我们从一些常量开始，这些常量定义了入侵者的状态、其爆炸持续时间、半径和默认速度，接着是三个常量，用于跟踪入侵者当前移动的方向。\n\
  \n```\nint state = INVADER_ALIVE;\nfloat stateTime = 0;\nint move = MOVE_LEFT;\n\
  boolean wasLastStateLeft = true;\nfloat movedDistance = World.WORLD_MAX_X / 2;\n\
  ```\n\n我们跟踪入侵者的状态、状态时间、移动方向和移动距离，移动距离初始应设置为游戏区域宽度的一半。我们还跟踪上一次水平移动是否是向左移动。这使我们能够在入侵者完成\
  \ z 轴上的垂直移动后决定其应朝哪个方向移动。\n\n```\npublic Invader(float x, float y, float z) {\nsuper(x,\
  \ y, z, INVADER_RADIUS);\n}\n```\n\n构造函数通过父类构造函数执行入侵者位置和包围体的常规设置。\n\n```\npublic\
  \ void update(float deltaTime, float speedMultiplier) {\nif (state == INVADER_ALIVE)\
  \ {\nmovedDistance += deltaTime * INVADER_VELOCITY * speedMultiplier;\nif (move\
  \ == MOVE_LEFT) {\nposition.x -= deltaTime * INVADER_VELOCITY * speedMultiplier;\n\
  if (movedDistance > World.WORLD_MAX_X) {\nmove = MOVE_DOWN;\nmovedDistance = 0;\n\
  wasLastStateLeft = true;\n}\n}\nif (move == MOVE_RIGHT) {\nposition.x += deltaTime\
  \ * INVADER_VELOCITY * speedMultiplier;\nif (movedDistance > World.WORLD_MAX_X)\
  \ {\nmove = MOVE_DOWN;\nmovedDistance = 0;\nwasLastStateLeft = false;\n}\n}\nif\
  \ (move == MOVE_DOWN) {\nposition.z += deltaTime * INVADER_VELOCITY * speedMultiplier;\n\
  if (movedDistance > 1) {\nif (wasLastStateLeft)\nmove = MOVE_RIGHT;\nelse\nmove\
  \ = MOVE_LEFT;\nmovedDistance = 0;\n}\n}\nbounds.center.set(position);\n}\nstateTime\
  \ += deltaTime;\n}\n```\n\n`update()` 方法接收当前时间增量和速度乘数，以使新一波入侵者移动得更快。当然，只有在入侵者存活时才执行移动。\n\
  \n我们首先计算本次更新中入侵者将要移动的单位数，并相应地增加 `movedDistance` 成员。如果它向左移动，我们通过从位置的 x 坐标中减去移动速度（乘以时间增量和速度乘数）来直接更新位置。如果它移动了足够远，我们通过将\
  \ `move` 成员设置为 `MOVE_DOWN` 来指示其开始垂直移动。同时，我们将 `wasLastStateLeft` 设置为 `true`，以便我们知道，在向下移动完成后，入侵者必须向右移动。\n\
  \n对于向右移动的处理，我们执行完全相同的操作。唯一的区别是我们从位置的 x 坐标中减去移动速度，并且一旦达到移动距离，就将 `wasLastStateLeft`\
  \ 设置为 `false`。\n\n如果入侵者向下移动，我们将操作入侵者位置的 z 坐标，并再次检查它在那个方向上移动了多远。如果它达到了向下移动的移动距离，我们将移动状态切换为\
  \ `MOVE_LEFT` 或 `MOVE_RIGHT`，具体取决于编码在 `wasLastStateLeft` 成员中的上一次水平移动方向。完成入侵者位置的更新后，我们设置包围球体的位置，就像为飞船所做的那样。最后，我们更新当前状态时间，并认为更新完成。\n\
  \n```\npublic void kill() {\nstate = INVADER_DEAD;\nstateTime = 0;\n}\n}\n```\n\n\
  这里的 `kill()` 方法的作用与 `Ship` 类的 `kill()` 方法相同。它允许我们通知入侵者它应该开始死亡。我们将它的状态设置为 `INVADER_DEAD`\
  \ 并重置其状态时间。然后，入侵者将停止移动，并且仅根据当前时间增量更新其状态时间。\n\n#### World 类\n\n`World` 类是这一切的核心。它存储飞船、入侵者和子弹，并负责更新它们以及检查碰撞。这与\
  \ Super Jumper 非常相似，只有一些细微的差别。护盾块和入侵者的初始放置也是 `World` 类的职责。我们创建了一个 `WorldListener`\
  \ 接口，以通知外部方我们世界中发生的事件，例如爆炸或发射子弹。这将使我们能够播放音效，就像在 Super Jumper 中一样。逐一阅读代码会有所帮助。清单\
  \ 12-10 展示了相关代码。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\nimport java.util.Random;\nimport\
  \ com.badlogic.androidgames.framework.math.OverlapTester;\npublic class World {\n\
  public interface WorldListener {\npublic void explosion();\npublic void shot();\n\
  }\nListing 12-10.\nWorld.java, the world class, tying everything together\n```\n\
  \n我们希望外部方知道爆炸何时发生或子弹何时被发射。为此，我们定义了一个监听器接口，我们可以实现该接口并将其注册到 `World` 实例，当这些事件之一发生时，该实例将被调用。这与\
  \ Super Jumper 非常相似，只是事件不同。\n\n```\nfinal static float WORLD_MIN_X = -14;\nfinal\
  \ static float WORLD_MAX_X = 14;\nfinal static float WORLD_MIN_Z = -15;\n```\n\n\
  我们还有几个常量，它们定义了世界的范围，如前文“定义游戏世界”部分所述。\n\n```\nWorldListener listener;\nint waves\
  \ = 1;\nint score = 0;\nfloat speedMultiplier = 1;\nfinal List shots = new ArrayList();\n\
  final List invaders = new ArrayList();\nfinal List shields = new ArrayList();\n\
  final Ship ship;\nlong lastShotTime;\nRandom random;\n```\n\n\n\n#### 世界状态管理\n\n\
  我们的世界会追踪几个关键要素。我们有一个`listener`，当发生爆炸或开火时会调用它。此外，我们还记录了玩家已经消灭了多少波入侵者。`score`成员记录了当前得分，而`speedMultiplier`成员允许我们加快入侵者的移动速度（还记得`Invaders.update()`方法吧）。同时，我们还存储了当前世界中所有存活着的子弹、入侵者和护盾区块的列表。最后，我们有一个`Ship`实例，并记录了飞船最后一次开火的时间。这个时间以纳秒为单位存储，由`System.nanoTime()`返回——因此使用了`long`数据类型。当我们决定入侵者是否应该开火时，`Random`实例会派上用场。\n\
  \n```\npublic World() {\n    ship = new Ship(0, 0, 0);\n    generateInvaders();\n\
  \    generateShields();\n    lastShotTime = System.nanoTime();\n    random = new\
  \ Random();\n}\n```\n\n在构造函数中，我们在初始位置创建`Ship`，生成入侵者和护盾，并初始化其余成员。\n\n```\nprivate\
  \ void generateInvaders() {\n    for (int row = 0; row < 4; row++) {\n        for\
  \ (int column = 0; column < 8; column++) {\n            Invader invader = new Invader(-WORLD_MAX_X\
  \ / 2 + column * 2f,\n                    0, WORLD_MIN_Z + row * 2f);\n        \
  \    invaders.add(invader);\n        }\n    }\n}\n```\n\n`generateInvaders()`方法简单地创建一个\
  \ 8 列 4 行的入侵者网格，其排列方式如图 12-11 所示。\n\n```\nprivate void generateShields() {\n   \
  \ for (int shield = 0; shield < 3; shield++) {\n        shields.add(new Shield(-10\
  \ + shield * 10 - 1, 0, -3));\n        shields.add(new Shield(-10 + shield * 10\
  \ + 0, 0, -3));\n        shields.add(new Shield(-10 + shield * 10 + 1, 0, -3));\n\
  \        shields.add(new Shield(-10 + shield * 10 - 1, 0, -2));\n        shields.add(new\
  \ Shield(-10 + shield * 10 + 1, 0, -2));\n    }\n}\n```\n\n`generateShields()`方法也做了几乎相同的事情：实例化三个护盾，每个护盾由五个护盾区块组成，布局如图\
  \ 12-2 所示。\n\n```\npublic void setWorldListener(WorldListener worldListener) {\n\
  \    this.listener = worldListener;\n}\n```\n\n我们还有一个设值方法，用于在世界对象上设置一个监听器。我们将利用它来获知世界中的事件，并做出相应反应；例如，播放音效。\n\
  \n```\npublic void update(float deltaTime, float accelX) {\n    ship.update(deltaTime,\
  \ accelX);\n    updateInvaders(deltaTime);\n    updateShots(deltaTime);\n    checkShotCollisions();\n\
  \    checkInvaderCollisions();\n    if (invaders.size() == 0) {\n        generateInvaders();\n\
  \        waves++;\n        speedMultiplier += 0.5f;\n    }\n}\n```\n\n`update()`方法出奇地简单。它使用当前的\
  \ delta 时间以及加速度计 y 轴的读数，我们可以将其传递给`Ship.update()`。飞船更新后，我们调用`updateInvaders()`和`updateShots()`，它们负责更新这两类对象。世界中的所有对象都更新完毕后，我们开始检测碰撞。`checkShotCollision()`方法将检测所有子弹与飞船和/或入侵者之间的碰撞。\n\
  \n最后，我们检查入侵者是否全部被消灭。如果是，则生成新一波入侵者。为了关照垃圾回收器（GC），我们可以重用旧的`Invader`实例；例如，通过`Pool`类。然而，为了保持简单，我们直接创建新实例。顺便说一句，对于子弹也是如此。鉴于在一次游戏会话中我们创建的对象数量很少，GC\
  \ 不太可能触发。如果你想真正让 GC 开心，只需使用一个`Pool`实例来重用已死亡的入侵者和子弹。另外，请注意，我们在这里增加了速度倍率！\n\n```\n\
  private void updateInvaders(float deltaTime) {\n    int len = invaders.size();\n\
  \    for (int i = 0; i < len; i++) {\n        Invader invader = invaders.get(i);\n\
  \        invader.update(deltaTime);\n        if (invader.state == Invader.INVADER_ALIVE)\
  \ {\n            if (random.nextFloat() < 0.001f) {\n                Shot shot =\
  \ new Shot(invader.position.x, invader.position.y,\n                        invader.position.z,\
  \ Shot.SHOT_VELOCITY);\n                shots.add(shot);\n                listener.shot();\n\
  \            }\n        }\n        if (invader.state == Invader.INVADER_DEAD &&\
  \ invader.stateTime > Invader.INVADER_EXPLOSION_TIME) {\n            invaders.remove(i);\n\
  \            i--;\n            len--;\n        }\n    }\n}\n```\n\n`updateInvaders()`方法有几个职责。它遍历所有入侵者并调用它们的`update()`方法。一旦某个`Invader`实例更新完毕，我们检查它是否还活着。如果是，则生成一个随机数来决定它是否开火。如果该数字低于\
  \ 0.001，它就开火。这意味着每个入侵者每帧有 0.1%的概率开火。如果发生开火，我们实例化一个新子弹，设置其速度使其沿 z 轴正方向移动，并告知监听器该事件。如果入侵者已死亡且爆炸动画结束，我们简单地从当前入侵者列表中移除它。\n\
  \n```\nprivate void updateShots(float deltaTime) {\n    int len = shots.size();\n\
  \    for (int i = 0; i < len; i++) {\n        Shot shot = shots.get(i);\n      \
  \  shot.update(deltaTime);\n        if (shot.position.z < WORLD_MIN_Z || shot.position.z\
  \ > WORLD_MAX_Z) {\n            shots.remove(i);\n            i--;\n           \
  \ len--;\n        }\n    }\n}\n```\n\n`updateShots()`方法同样简单。我们遍历所有子弹，更新它们，并检查每个子弹是否已离开游戏场地，如果是，则将其从子弹列表中移除。\n\
  \n```\nprivate void checkInvaderCollisions() {\n    if (ship.state == Ship.SHIP_EXPLODING)\n\
  \        return;\n    int len = invaders.size();\n    for (int i = 0; i < len; i++)\
  \ {\n        Invader invader = invaders.get(i);\n        if (OverlapTester.overlapSpheres(ship.bounds,\
  \ invader.bounds)) {\n            ship.lives = 1;\n            ship.kill();\n  \
  \          return;\n        }\n    }\n}\n```\n\n在`checkInvaderCollisions()`方法中，我们检查是否有任何入侵者与飞船发生了碰撞。这是一个相当简单的操作，因为我们需要做的只是遍历所有入侵者，并检查每个入侵者的包围球与飞船的包围球是否重叠。根据我们的游戏机制定义，如果飞船与入侵者碰撞，游戏结束。这就是为什么我们在调用`Ship.kill()`方法之前将飞船的生命值设为\
  \ 1。在该调用之后，飞船的`lives`成员被设为 0，我们将在另一个方法中使用它来检查游戏结束状态。\n\n```\nprivate void checkShotCollisions()\
  \ {\n    int len = shots.size();\n    for (int i = 0; i < len; i++) {\n        Shot\
  \ shot = shots.get(i);\n        boolean shotRemoved = false;\n        int len2 =\
  \ shields.size();\n        for (int j = 0; j < len2; j++) {\n            Shield\
  \ shield = shields.get(j);\n            if (OverlapTester.overlapSpheres(shield.bounds,\
  \ shot.bounds)) {\n                shields.remove(j);\n                shots.remove(i);\n\
  \                i--;\n                len--;\n                shotRemoved = true;\n\
  \                break;\n            }\n        }\n        if (shotRemoved)\n  \
  \          continue;\n        if (shot.velocity.z < 0) {\n            len2 = invaders.size();\n\
  \            for (int j = 0; j < len2; j++) {\n                Invader invader =\
  \ invaders.get(j);\n                if (OverlapTester.overlapSpheres(invader.bounds,\n\
  \                        shot.bounds)\n                        && invader.state\
  \ == Invader.INVADER_ALIVE) {\n                    invader.kill();\n           \
  \         listener.explosion();\n                    score += 10;\n            \
  \        shots.remove(i);\n                    i--;\n                    len--;\n\
  \                    break;\n                }\n            }\n        } else {\n\
  \            if (OverlapTester.overlapSpheres(shot.bounds, ship.bounds)\n      \
  \              && ship.state == Ship.SHIP_ALIVE) {\n                ship.kill();\n\
  \                listener.explosion();\n                shots.remove(i);\n     \
  \           i--;\n                len--;\n            }\n        }\n    }\n}\n```\n\
  \n`checkShotCollisions()`方法稍微复杂一些。它遍历每个`Shot`实例，并检查它与护盾区块、入侵者或飞船之间的重叠。护盾区块可以被飞船或入侵者发射的子弹击中。入侵者只能被飞船发射的子弹击中。而飞船只能被入侵者发射的子弹击中。为了区分子弹是由飞船还是入侵者发射的，我们只需查看其\
  \ z 轴速度。如果速度为正，则子弹朝飞船移动，因此是由入侵者发射的。如果速度为负，则是由飞船发射的。\n\n```\npublic boolean isGameOver()\
  \ {\n    return ship.lives == 0;\n}\n```\n\n`isGameOver()`方法简单地告知外部调用方飞船是否已失去所有生命。\n\
  \n```\npublic void shoot() {\n    if (ship.state == Ship.SHIP_EXPLODING)\n     \
  \   return;\n    int friendlyShots = 0;\n    int len = shots.size();\n    for (int\
  \ i = 0; i < len; i++) {\n        Shot shot = shots.get(i);\n        if (shot.velocity.z\
  \ < 0)\n            friendlyShots++;\n    }\n    if (lastShotTime == 0 || System.nanoTime()\
  \ - lastShotTime > 1000000000 || friendlyShots == 0) {\n        shots.add(new Shot(ship.position.x,\
  \ ship.position.y,\n                ship.position.z, -Shot.SHOT_VELOCITY));\n  \
  \      lastShotTime = System.nanoTime();\n        listener.shot();\n    }\n}\n```\n\
  \n\n\n最终，每当用户按下开火按钮时，就会从外部调用 `shoot()` 方法。正如“核心游戏机制”部分所述，飞船每秒可以发射一次，或者在没有已发射的飞船射击时也可开火。当然，飞船爆炸时无法开火，所以这是我们首先检查的内容。接着，我们遍历所有\
  \ `Shot` 实例，检查其中是否有飞船发出的射击。如果没有，我们可以立即开火。否则，我们检查上一次射击的时间。如果距离上次射击已超过一秒，我们就发射新的子弹。此时，我们将速度设置为\
  \ `-Shot.SHOT_VELOCITY`，使子弹沿 z 轴负方向朝入侵者移动。和往常一样，我们会调用监听器来通知该事件。\n\n以上就是构成我们游戏世界的所有类！将其与我们在\
  \ Super Jumper 中的实现进行比较。原理几乎相同，代码看起来也颇为相似。当然，Android Invaders 是一个非常简单的游戏，因此我们可以使用简单的解决方案，比如所有物体都使用包围球。对于许多简单的\
  \ 3D 游戏来说，这就足够了。接下来进入游戏的最后两个部分：`GameScreen` 类和 `WorldRenderer` 类！\n\n## `GameScreen`\
  \ 类\n\n一旦游戏切换到 `GameScreen` 类，玩家无需声明已准备就绪即可立即开始游戏。我们仅有以下状态：\n\n*   运行状态：我们渲染背景、世界和\
  \ UI 元素，如图 12-4 所示。\n*   暂停状态：我们渲染背景、世界和暂停菜单，如图 12-4 所示。\n*   游戏结束状态：我们渲染的内容与暂停状态基本相同。\n\
  \n我们将沿用 Super Jumper 中使用的模式，为这三种状态分别提供不同的 `update()` 和 `present()` 方法。\n\n该类最有趣的部分是我们如何处理用户输入以移动飞船。我们希望玩家能够通过屏幕上的按钮或加速度计来控制飞船。我们可以读取\
  \ `Settings.touchEnabled` 字段来确定用户在这方面的偏好。根据激活的输入方式，我们决定是否渲染屏幕按钮，并将适当的加速度计值传递给 `World.update()`\
  \ 方法来移动飞船。\n\n如果玩家选择屏幕按钮，我们当然不需要使用加速度计值；相反，我们只需将一个恒定的人造加速度值传递给 `World.update()`\
  \ 方法。该值必须在 –10（左移）到 10（右移）范围内。经过一些试验，我们最终确定通过屏幕按钮左移时值为 –5，右移时值为 5。\n\n该类的另一个有趣之处在于我们如何结合渲染\
  \ 3D 游戏世界和 2D UI 元素。让我们看看代码清单 12-11 中 `GameScreen` 类的代码。\n\n```\npackage com.badlogic.androidgames.androidinvaders;\n\
