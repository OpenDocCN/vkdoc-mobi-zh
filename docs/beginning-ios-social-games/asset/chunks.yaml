  trans: '

    # 对等选择器的优势


    自 iOS 4.0 引入以来，Game Kit 网络功能一直受到开发者社区的普遍忽视。这实在有失公允，因为 Game Kit 对于 iOS 开发者而言，依然是一个极其有用且便捷的工具。它仍然是向
    iOS 应用添加点对点、双人网络连接的最简单方式。


    在我开发的大多数多人应用中，我都同时实现了 iOS 的两种网络系统。Game Center 网络和 Game Kit 网络各有优劣，通常同时为你的用户提供这两种方式，要比因其中一种的局限性而被逼入死角更容易。以下列出了一些同时采用两者的理由：


    -   你的用户可能无法访问外部网络连接，但依然希望进行多人活动。这种情况可能发生在汽车或飞机上的乘客中，只要能允许在飞行期间开启蓝牙设备。

    -   你可能希望让用户轻松连接到附近其他（基于位置的）用户。虽然这可以通过 Game Center 的玩家群组来实现，但使用 Game Kit 要简单得多。

    -   你需要在两台设备之间寻找延迟更低的连接。

    -   你希望面向那些使用 iPod touch 或仅支持 Wi-Fi 的 iPad 的用户，他们可能无法稳定连接 Wi-Fi，或者根本无法访问蜂窝网络。

    -   实现 Game Kit 网络比用 Game Center 实现完整的多人游戏系统更快捷、更容易。


    正如你所见，用于查找对等玩家的“对等选择器”方法与 Game Center 的匹配系统存在一些重要差异。没有什么能阻止你同时实现这两种方式，而且至少在我看来，这是非常值得推荐的（即使苹果官方没有明确推荐）。


    在接下来的章节中，你将学习一些让这两个系统并行不悖的方法。然而，如果你只选择实现其中一种，请仔细权衡哪种方案更能满足用户的需求。例如，如果你有一个应用可以向遇到的人分享你乐队的
    MP3 文件，那么 Game Kit 将是更好的选择。


    # 现实世界示例


    自 iOS 3.0 发布以来，我们见证了 Game Kit 网络功能在非常意想不到的场景中得到应用。在本节中，我们将讨论一些使用 Game Kit 网络来增强用户体验的著名应用案例。我在这节中向您展示的两个应用，都更适合使用
    Game Kit 网络而非 Game Center 网络。


    首先，我们来看看 Black Pixel 公司开发的 Bistromath（见图 6-1）。这款应用的核心功能是在餐厅中为多位用餐者分摊账单。这个创意在 iPhone
    上已经被用滥了，App Store 上有数十款应用提供这种服务。然而，Bistromath 即使价格高于免费的竞争对手，依然广受欢迎。这是为什么呢？


    Bistromath 有其独特之处。它不仅设计精美、视觉吸引人，还提供了其他账单分摊应用所没有的功能：Game Kit 网络。Bistromath 使用 Game
    Kit 在多台设备之间建立 Wi-Fi 或蓝牙连接，允许用户登录“主机”应用并输入各自的餐品项目。


    ![A978-1-4302-4906-1_6_Fig1_HTML.jpg](img/A978-1-4302-4906-1_6_Fig1_HTML.jpg)


    图 6-1.


    来自 Black Pixel 的 Bistromath，它使用 Game Kit 网络来分摊账单


    这个简单的功能让 Bistromath 在其细分领域脱颖而出。加入 Game Kit 网络功能后，用户无需再拿着 iPhone 在餐桌上传递，让每个人输入自己点的菜。像这样对你的应用进行微小的补充，就能极大地提升其感知价值。


    Handshake（见图 6-2）是 Skorpiostech 公司在 App Store 早期开发的一款应用。它是第一款允许用户向其他用户发送自己名片的应用。为了支持
    Handshake 的网络连接，其服务器团队投入了超过六个月的工作。服务器需要支持大量客户端登录，并为地理位置相近的其他客户端提供匹配服务。


    ![A978-1-4302-4906-1_6_Fig2_HTML.jpg](img/A978-1-4302-4906-1_6_Fig2_HTML.jpg)


    图 6-2.


    来自 Skorpiostech 的 Handshake，它使用自己的服务器系统在两个本地设备之间共享数据


    每台设备会确定自己的位置，并告知服务器它的位置以及它在寻找对等用户。服务器随后会返回附近的用户，并允许应用在它们之间建立连接。如果在编写 Handshake
    时 Game Kit 网络就已可用，这个过程本可以在几天内完成，而不是几个月。Handshake 从未被重写以支持 Game Kit；不过，当苹果在 iOS
    3.0 中随 Game Kit 一起引入联系人共享功能时，它就被视为走到了生命尽头。


    > **注**: Game Kit 和 Game Center 并不仅限于游戏。虽然苹果最近开始打击在非游戏应用中使用排行榜和成就系统，但你总有理由说它们为你的应用增加了类游戏功能。而
    Game Kit 网络在任何应用中都不受限制。

    '
- fmt: "# Working with Sessions\n\nWhen working with Game Kit networking, you will\
    \ be using a `GKSession` object (see Figure [6-3](#A978-1-4302-4906-1_6_Chapter.html#Fig3))\
    \ to tie everything together. This object is used to create and manage an ad-hoc\
    \ Bluetooth or local wireless network connection between devices. Copies of your\
    \ app, running on multiple devices, can use these services to discover each other,\
    \ connect, handshake, exchange data, and gracefully disconnect.\n\n> **Note**\
    \  \n> Bluetooth networking is not supported on the original iPhone or the original\
    \ iPod touch.\n\n![A978-1-4302-4906-1_6_Fig3_HTML.jpg](A978-1-4302-4906-1_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3.** Peer-to-peer networking over Bluetooth using `GKSession`\n\n\
    A `GKSession` object primarily works with peers. A peer, in this context, is any\
    \ iOS device made visible by creating and configuring a `GKSession` object of\
    \ its own. Peers can only see other peers on apps that have the same bundle identifier\
    \ as each other.\n\nEach peer is represented by a `peerID` string, which will\
    \ always be unique. Your app can use a peer's `peerID` to obtain a user-readable\
    \ handle or name for that peer. Similarly, when your app begins a `GKSession`,\
    \ it creates a peer to represent the local user, and this peer becomes visible\
    \ to all nearby devices. Nearby devices, in this sense, would be any devices on\
    \ the same local Wi-Fi network or within the range of Bluetooth, as detailed in\
    \ Tables [6-1](#A978-1-4302-4906-1_6_Chapter.html#Tab1) and [6-2](#A978-1-4302-4906-1_6_Chapter.html#Tab2).\n\
    \n> **Note**  \n> Core Bluetooth was added to iDevices with iOS 5, which allows\
    \ direct interaction with the bluetooth layer. If your implementation of Bluetooth\
    \ is beyond the abilities of Game Kit, Core Bluetooth provides lower level functionality.\n\
    \n**Table 6-1.** Ranges of Standard Bluetooth Devices\n\n| Bluetooth Class | Milliwatts\
    \ (mW) | dBm (dBmW) | Approximate Range |\n| --- | --- | --- | --- |\n| Class\
    \ 1 (iPhone 4s/5) | 100 | 20 | ~100 Meters, or ~328 Feet |\n| Class 2 (iPhone)\
    \ | 2.5 | 4 | ~10 Meters, or ~32 Feet |\n| Class 3 | 1 | 0 | ~1 Meter, or ~3 Feet\
    \ |\n\n**Table 6-2.** Data Rates for Standard Bluetooth Versions\n\n| Version\
    \ | Data Rate | Maximum Application Throughput |\n| --- | --- | --- |\n| Version\
    \ 1.2 | 1 Mbit/s | 0.7 Mbit/s |\n| Version 2.0 + EDR (iPhone) | 3 Mbit/s | 1.4\
    \ Mbit/s |\n| Version 3.0 +HS | 24 Mbit/s | N/A |\n| Version 4.0 (BLE) (iPhone\
    \ 4s/5) | Variable | N/A |\n\nApple has recently enabled support for Bluetooth\
    \ connections between a device and the iOS Simulator. However, this support has\
    \ some limitations: most notably, a device cannot find the Simulator through Bluetooth,\
    \ so the Simulator will have to initiate the connection. Additionally, the iOS\
    \ Simulator doesn’t detect whether the Mac has Bluetooth enabled. Finally, when\
    \ the device receives a connection, it appears to come from the bundle ID string\
    \ and not the device name, as shown in Figure [6-10](#A978-1-4302-4906-1_6_Chapter.html#Fig10)\
    \ later in this chapter.\n\nPeers are discovered by other peers by using a unique\
    \ string to identify the service that they are implementing. This unique string\
    \ is the `sessionID` property. Sessions can be configured in one of three ways.\
    \ A session can be configured to broadcast its `sessionID`, making it a server;\
    \ or to search for other peers advertising with a `sessionID`, making it a client;\
    \ or, finally, as both a server and a client simultaneously, referred to as a\
    \ peer. In the next chapter we will explore network design on iOS in more depth.\n\
    \n`GKSession` has an associated `GKSessionDelegate` protocol. The delegate is\
    \ called whenever a new remote peer is discovered or attempts to connect, or when\
    \ the connection state of a peer has changed. In addition, you will have to set\
    \ a data-received handler to specify a delegate callback when new data is received.\
    \ This can be different than the main `GKSessionDelegate`. [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html)\
    \ explores exchanging data in complete detail.\n\n> **Note**  \n> `GKSession`\
    \ and its associated methods are thread-safe; however, the session will always\
    \ call its delegate methods on the main thread."
