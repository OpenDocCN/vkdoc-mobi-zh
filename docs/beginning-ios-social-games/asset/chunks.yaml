    block is easy to set up when you begin your chat, and it saves you from performing
    polling or delegate callbacks:


    `allChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState
    state)`


    `{`


            `switch (state)`


                    `{`


                            `case GKVoiceChatPlayerSpeaking:`


                                    `[self showSpeakingPlayer: playerID];`


                                    `break;`


