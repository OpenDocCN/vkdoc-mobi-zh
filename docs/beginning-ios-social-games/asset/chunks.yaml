- fmt: "# Quitting and Forfeiting\n\nA player can quit a match at any time by swiping\
    \ across it from the matchmaker view controller. However, it is recommended to\
    \ add a path for your users to forfeit or quit a match from inside of your game\
    \ itself. To allow a player to forfeit a match, use the following code snippet:\n\
    \n```\n- (IBAction)forfeit:(id)sender\n{\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\
    \ withCompletionHandler:^(NSError *error) {\n        if (error) {\n          \
    \  NSLog(@\"An error occurred ending match: %@\", [error localizedDescription]);\n\
    \        }\n    }];\n}\n```\n\n# Player Timeouts\n\nEarlier in this chapter, `endTurnWithNextParticipant:matchData:completionHandler:`\
    \ was discussed as the method for ending a turn. As of iOS 6 this method has been\
    \ deprecated and replaced with `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:`.\
    \ If your app is targeting iOS 5 you will need to continue to use the earlier\
    \ method; however, if you are targeting iOS 6 or higher you can begin to use the\
    \ new method, which allows for a player timeout.\n\nPrior to iOS 6 there was no\
    \ way to specify skipping a player in the turned-based lineup; if a player failed\
    \ to play their round the game would enter a state of limbo until the game was\
    \ forfeited. Using `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:`\
    \ allows an `NSTimeInterval` parameter. Once the time interval has passed, control\
    \ is sent to the next player in line and the behavior for a player missing their\
    \ turn can be handled.\n\n# Player Exchanges\n\nPrior to iOS 7 there was no way\
    \ for players who’s turn it was not to send an action, iOS 7 brought the ability\
    \ for Player Exchanges. Player Exchanges allow any player at anytime to initiate\
    \ actions, this can be used for simultaneous turns, chats, and trading between\
    \ players regardless of which player is currently waiting to move.\n\nAn exchange\
    \ request requires five steps to be completed successfully.\n\nThe initiator of\
    \ the exchange sends a request to the recipient. The recipient is notified that\
    \ there is a pending request. The receipt acts on the exchange and the response\
    \ is sent back the initiator. The initiator is then notified of the response.\
    \ The current player is finally notified of the completed exchange and updates\
    \ the match data.\n\nAny player, if your game allows it, may initiate an exchange\
    \ whether or not it is currently their turn. The initiator will need to pick one\
    \ or more recipients for the exchange request. The initiator also needs to specify\
    \ the type of trade, is it a chat message, a trade, request for help, or something\
    \ else. The exchange also needs to have a timeout set for how long the exchange\
    \ is valid for.\n\nA new method is available in iOS 7 for sending exchanges, `sendExchangeToParticipants:`.\
    \ This method takes several arguments, first an array of recipients that will\
    \ receive the request. Followed by an `NSData` block that represents the details\
    \ of the request. A localizable message is also attached as is a timeout in seconds:\n\
    \n```\n[GKTurnBasedExchange sendExchangeToParticipants:recipients data:data localizableMessageKey:key\n\
    arguments:arguments timeout:timeout completionHandler:^(GKTurnBasedExchange\n\
    *exchange, NSError *error) {\n    }];\n```\n\nNote\n\nExchange data is limited\
    \ to 1k as opposed to the 4k limit for general turn data.\n\nThe initating player\
    \ may cancel an exchange request anytime before the exchange is accepted and acted\
    \ on by the receiptant. This is done by using the `player:exchangeCanceled:match:`\
    \ method.\n\nThe receiving player will need to respond to the exchange request\
    \ using the following approach:\n\n```\n[GKTurnBasedExchange replyWithLocalizableMessageKey:key\
    \ arguments:arguments data:data\ncompletionHandler:^(NSError *error) {\n}]\n```\n\
    \nThe match data for the current game will need to be updated, if required, to\
    \ account for the exchange. It may therefore be necessary to include the current\
    \ player in the exchange recipients list so that the data can be updated as part\
    \ of their turn.\n\n# Player Reminders\n\niOS 7 also adds the ability to send\
    \ reminders to players about pending actions. These reminders will appear as push\
    \ notifications on their devices. The push notification will contain the referenced\
    \ localizable message, and considerations for the display size of that message\
    \ need to be taken into account. This allows the game to send reminders that a\
    \ turn or exchange action is required.\n\n```\n[GKTurnBasedMatch sendReminderToParticipants:(NSArray\
    \ *)participants localizableMessageKey:(NSString *)key  arguments:(NSArray *)arguments\
    \ completionHandler:(void(^)(NSError *error))completionHandler]\n```\n\n# Programmatic\
    \ Matches\n\nIf you want to bypass the `GKTurnBasedMatchmakerViewController` and\
    \ implement your own GUI, there is an option to do so. Using the following method\
    \ will create a new match without having the user go through the matchmaker:\n\
    \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
    \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n    [GKTurnBasedMatch\
    \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch *match, NSError\
    \ *error)  {\n        if (error == nil) {\n            //start new game with returned\
    \ match\n        } else {\n            NSLog(@\"An error occurred when finding\
    \ a match: %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\n\
    In addition to creating a game, you need to be able to load a list of existing\
    \ games for your local user. You can do so with the following method.\n\n```\n\
    - (void)loadMatches\n{\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray\
    \ *matches, NSError *error) {\n        if (error == nil) {\n            NSLog(@\"\
    Existing Matches: %@\", matches);\n        } else {\n            NSLog(@\"An error\
    \ occurred while loading matches: %@\", [error localizedDescription]);\n     \
    \   }\n    }];\n}\n```\n\nNote\n\nBecause both of these methods use background\
    \ tasks in order to handle the request, code that you implement within the block\
    \ needs to be thread-safe.\n\n# `GKTurnBasedEventHandler`\n\nThe `GKTurnedBasedEventHandler`\
    \ is a delegate protocol that is responsible for handling important messages related\
    \ to turn-based games. To set a delegate for events, use the following code.\n\
    \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
    ```\n\nThe protocol has three optional methods.\n\n- `handleInviteFromGameCenter`:\
    \ When your delegate receives this method, it should populate a new `GKMatchRequest`\
    \ with the `playersToInvite` that are passed in through the method. You then need\
    \ to begin a new match or present the matchmaker GUI. This method is called when\
    \ the user accepts a match invite from a friend.\n- `handleTurnEventForMatch`:\
    \ Your delegate receives this message when the user has accepted a push notification\
    \ for an in-progress match. You need to end whatever task you are performing and\
    \ display the game for the match that is passed in with this method.\n- `handleMatchEnded`:\
    \ When your delegate receives this message, it should display the match’s results\
    \ and game-over views to the player and allow the player the option of removing\
    \ the match data from Game Center.\n\n# Summary\n\nIn this chapter, you learned\
    \ about the turn-based gaming functionality of Game Center. We worked with our\
    \ existing `GameCenterManager` class and wrote an entirely new sample game to\
    \ work with the turn-based technology. You should now have a firm grasp on how\
    \ to create a new turn-based game, as well as retain and send turn data between\
    \ peers. With the skills learned in this chapter, you should now be able to easily\
    \ get the networking component of turned-based gaming up and running in a few\
    \ hours.\n\nIn the next chapter, we will look at another exciting topic: voice\
    \ chat. Apple has gone to tremendous lengths to make voice over IP easy to use\
    \ in iOS apps, and we will explore how to get VoIP up and running quickly in your\
    \ Game Center– or Game Kit–enabled apps."
