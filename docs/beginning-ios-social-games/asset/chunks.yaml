- fmt: "### Performing a Hit Test with a `UIImage`\n\nBefore we worry about how to\
    \ set up the cow abduction, there are preliminary steps for abducting the cow\
    \ itself. For starters, we must implement a `hitTest` method that is being called\
    \ from the `touchesBegan` event discussed earlier in this section.\n\n```\n- (UIImageView*)hitTest\n\
    {\n    if (!tractorBeamOn) {\n        return nil;\n    }\n    for (int x = 0;\
    \ x < [cowArray count]; x++) {\n        UIImageView *tempCow = [cowArray objectAtIndex:\
    \ x];\n        CALayer *cowLayer = [[tempCow layer] presentationLayer];\n    \
    \    CGRect cowFrame = [cowLayer frame];\n        if (CGRectIntersectsRect(cowFrame,\
    \ tractorBeamImageView.frame)) {\n            tempCow.frame = cowLayer.frame;\n\
    \            [tempCow.layer removeAllAnimations];\n            return tempCow;\n\
    \        }\n    }\n    return nil;\n}\n```\n\nThe first line is another sanity\
    \ check, this time to ensure that we are not calling the `hitTest` method when\
    \ the `tractorBeam` is not on. Once we know we are supposed to be checking for\
    \ the hit, we iterate through our array of cow objects. Since the cows are in\
    \ the middle of an animation, we cannot rely on the data from the frame, as it\
    \ will show where the cow will end up and not where the cow currently is.\n\n\
    To determine where the cow currently is, we ask for the `presentationLayer`. Core\
    \ Graphics provides a useful method for testing whether two `CGRect` intersect,\
    \ and that is what we will be using here. If we hit a cow, we return the object.\
    \ If we get to the end of our loop without passing a hit test, we return `nil`.\n\
    \n**Tip:** The `presentationLayer` method can be called on any `CALayer` to provide\
    \ a best guess for the current values of a layer that is in the process of being\
    \ animated.\n\n### Abducting a Cow\n\nIn our `touchesBegan` method, we tested\
    \ to see if `hitTest` returned a cow. If it did, we call `abductCow` with the\
    \ object that was returned. Here’s the code:\n\n```\n- (void)abductCow:(UIImageView\
    \ *)cowImageView;\n{\n    [UIView beginAnimations: @\"abduct\" context:nil];\n\
    \    [UIView setAnimationDuration: 4.0];\n    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n\
    \    [UIView setAnimationDelegate: self];\n    [UIView setAnimationDidStopSelector:\
    \ @selector(finishAbducting)];\n    [UIView setAnimationBeginsFromCurrentState:\
    \ YES];\n\n    CGRect frame = cowImageView.frame;\n    frame.origin.y = myPlayerImageView.frame.origin.y;\n\
    \    cowImageView.frame = frame;\n\n    [UIView commitAnimations];\n}\n```\n\n\
    We begin an animation event on our cow object (which is an `imageView`). We also\
    \ set a `didStopSelector`, which will be called once the animation has finished.\
    \ We set the new y axis coordinate for the cow to our UFO’s current y coordinate\
    \ and begin the animation.\n\nOnce the animation has stopped, we get a callback\
    \ to `finishAbducting`. This allows us to increase the score, clean up the abducting\
    \ code, and spawn a new cow.\n\n```\n- (void)finishAbducting;\n{\n    if (!currentAbductee\
    \ || !tractorBeamOn) {\n        return;\n    }\n    [cowArray removeObjectIdenticalTo:\
    \ currentAbductee];\n    [tractorBeamImageView removeFromSuperview];\n    tractorBeamOn\
    \ = NO;\n    score++;\n    [scoreLabel setText:[NSString stringWithFormat: @\"\
    SCORE %05.0f\", score]];\n\n    [[currentAbductee layer] removeAllAnimations];\n\
    \    [currentAbductee removeFromSuperview];\n    currentAbductee = nil;\n\n  \
    \  //make a new cow\n    [self spawnCow];\n}\n```\n\nAt the beginning of the method,\
    \ we check to see that the tractor beam is still on and that we have an abductee.\
    \ Just as we did when the user released their touch from the screen, we also want\
    \ to remove the tractor beam image from the view and correctly set the state variables.\
    \ We award the user with a single point for abducting a cow, and we update the\
    \ `scoreLabel` accordingly. We clean up the old cow image and set it back to `nil`.\
    \ Now we spawn a new cow to replace the abducted one.\n\n### Configuring iTunes\
    \ Connect for Game Center\n\nBefore your iOS app or game can access any of the\
    \ Game Center functionality, it will need to be configured in iTunes Connect.\
    \ iTunes Connect predates the App Store and iPhone; it was introduced as the portal\
    \ for musicians and media producers to upload their content to the iTunes Music\
    \ Store. It has since been adapted to allow developers to upload their iOS software\
    \ for sale on the App Store. iTunes Connect has evolved tremendously since being\
    \ offered to iPhone developers in July of 2008. Apple has begun using it as a\
    \ main source for app configuration. Such tools as In App Purchase (IAP), iAds,\
    \ and Game Center require iTunes Connect configuration.\n\n**Note:** You can still\
    \ use any stand-alone Game Kit functionality without setting up Game Center for\
    \ your app. See Chapters 6, 7, 8, and 10 for more information on Game Kit’s stand-alone\
    \ functionality.\n\n### Getting Started with iTunes Connect\n\nIf you have never\
    \ uploaded an app to the App Store, you might be unfamiliar with the iTunes Connect\
    \ Portal. However, if you have worked with iTunes Connect previously, you might\
    \ want to skip to the next section, “Configuring Game Center in iTunes Connect,”\
    \ as the following will be only a refresher for you.\n\niTunes Connect is a web\
    \ portal, accessed from any web browser at `http://itunesconnect.apple.com`. You\
    \ will use your existing AppleID, which you used to register as a developer (`http://developer.apple.com`),\
    \ to gain access to the portal. This is the same web application that you will\
    \ use when you want to upload new apps for sale on the App Store, as well as make\
    \ any changes to them, such as price or description. A view of the landing page\
    \ for iTunes Connect can be seen in Figure 1-4.\n\n![A978-1-4302-4906-1_1_Fig4_HTML.jpg](A978-1-4302-4906-1_1_Fig4_HTML.jpg)\n\
    \n*Figure 1-4. A view of iTunes Connect taken July 2013*\n\nWhen you log in to\
    \ iTunes Connect, you will be presented with a wealth of options. The most important\
    \ of these is setting up your contracts, tax, and banking information. While these\
    \ requirements do not have anything to do with Game Center per se, it is good\
    \ to get them out of the way.\n\nIt may take weeks for Apple to process this information,\
    \ so submit it as soon as possible. Until this information is processed and approved,\
    \ you will be unable to release software on the App Store. Once you have completed\
    \ all the requested information under this section, you can focus on the app development\
    \ itself.\n\n**Note:** If you plan on releasing only free iOS apps, you do not\
    \ need to complete the paid apps contracts. However, if you plan to release any\
    \ paid software in the future, these should be completed as soon as possible.\n\
    \nBefore you can access any Game Center–specific information, you will need to\
    \ create a new iOS app (or use an existing one). This is a straightforward process\
    \ that you will be walked through in iTunes Connect. You begin under the Manage\
    \ Your Applications section; there you will find an “Add New App” button. The\
    \ rest should be fairly self-explanatory.\n\nIf you are not yet ready to upload\
    \ an app, you can create placeholder data here to gain access to the Game Center\
    \ portal. Once your app has been created in iTunes Connect, you can begin to configure\
    \ the Game Center–specific information.\n\n**Caution:** If you create an app and\
    \ fail to upload a release build within 90 days, Apple will delete the app information\
    \ and restrict you from creating a new app with the same name in the future. This\
    \ was introduced in late 2010 as an effort to prevent people from “Domain Squatting”\
    \ app names."
  raw: '### Performing a Hit Test with a UIImage


    Before we worry about how to set up the cow abduction, there are preliminary steps
    for abducting the cow itself. For starters, we must implement a `hitTest` method
    that is being called from the `touchesBegan` event discussed earlier in this section.


    `- (UIImageView*)hitTest`


    `{`


            `if (!tractorBeamOn) {`


                    `return nil;`


            `}`


            `for (int x = 0; x < [cowArray count]; x++) {`


    `UIImageView *tempCow = [cowArray objectAtIndex: x];`


                    `CALayer *cowLayer= [[tempCow layer] presentationLayer];`


                    `CGRect cowFrame = [cowLayer frame];`


                    `if (CGRectIntersectsRect(cowFrame, tractorBeamImageView.frame))
    {`


    `tempCow.frame = cowLayer.frame;`


                            `[tempCow.layer removeAllAnimations];`


                            `return tempCow;`


                    `}`


            `}`


            `return nil;`


    `}`


    The first line is another sanity check, this time to ensure that we are not calling
    the `hitTest` method when the `tractorBeam` is not on. Once we know we are supposed
    to be checking for the hit, we iterate through our array of cow objects. Since
    the cows are in the middle of an animation, we cannot rely on the data from the
    frame, as it will show where the cow will end up and not where the cow currently
    is.


    To determine where the cow currently is, we ask for the `presentationLayer`. Core
    Graphics provides a useful method for testing whether two `GCRects` intersect,
    and that is what we will be using here. If we hit a cow, we return the object.
    If we get to the end of our loop without passing a hit test, we return `nil`.


    Tip


    The `presentationLayer` method can be called on any `CALayer` to provide a best
    guess for the current values of a layer that is in the process of being animated.


    ### Abducting a Cow


    In our `touchesBegan` method, we tested to see if `hitTest` returned a cow. If
    it did, we call `abductCow` with the object that was returned. Here’s the code:


    `- (void)abductCow:(UIImageView *)cowImageView;`


    `{`


            `[UIView beginAnimations: @"abduct" context:nil];`


            `[UIView setAnimationDuration: 4.0];`


            `[UIView setAnimationCurve:UIViewAnimationCurveEaseIn];`


            `[UIView setAnimationDelegate: self];`


            `[UIView setAnimationDidStopSelector: @selector(finishAbducting)];`


            `[UIView setAnimationBeginsFromCurrentState: YES];`


            `CGRect frame = cowImageView.frame;`


            `frame.origin.y = myPlayerImageView.frame.origin.y;`


            `cowImageView.frame = frame;`


            `[UIView commitAnimations];`


    `}`


    We begin an animation event on our cow object (which is an `imageView`). We also
    set a `didStopSelector`, which will be called once the animation has finished.
    We set the new y axis coordinate for the cow to our UFO’s current y coordinate
    and begin the animation.


    Once the animation has stopped, we get a callback to `finishAbducting`. This allows
    us to increase the score, clean up the abducting code, and spawn a new cow.


    `- (void)finishAbducting;`


    `{`


            `if (!currentAbductee || !tractorBeamOn) {`


    `return;`


            `}`


            `[cowArray removeObjectIdenticalTo: currentAbductee];`


            `[tractorBeamImageView removeFromSuperview];`


            `tractorBeamOn = NO;`


            `score++;`


            `[scoreLabel setText:[NSString stringWithFormat: @"SCORE %05.0f", score]];`


            `[[currentAbductee layer] removeAllAnimations];`


            `[currentAbductee removeFromSuperview];`


            `currentAbductee = nil;`


            `//make a new cow`


            `[self spawnCow];`


    `}`


    At the beginning of the method, we check to see that the tractor beam is still
    on and that we have an abductee. Just as we did when the user released their touch
    from the screen, we also want to remove the tractor beam image from the view and
    correctly set the state variables. We award the user with a single point for abducting
    a cow, and we update the `scoreLabel` accordingly. We clean up the old cow image
    and set it back to `nil`. Now we spawn a new cow to replace the abducted one.


    ### Configuring iTunes Connect for Game Center


    Before your iOS app or game can access any of the Game Center functionality, it
    will need to be configured in iTunes Connect. iTunes Connect predates the App
    Store and iPhone; it was introduced as the portal for musicians and media producers
    to upload their content to the iTunes Music Store. It has since been adapted to
    allow developers to upload their iOS software for sale on the App Store. iTunes
    Connect has evolved tremendously since being offered to iPhone developers in July
    of 2008\. Apple has begun using it as a main source for app configuration. Such
    tools as In App Purchase (IAP), iAds, and Game Center require iTunes Connect configuration.


    Note


    You can still use any stand-alone Game Kit functionality without setting up Game
    Center for your app. See Chapters 6, 7, 8, and 10 for more information on Game
    Kit’s stand-alone functionality.


    ## Getting Started with iTunes Connect


    If you have never uploaded an app to the App Store, you might be unfamiliar with
    the iTunes Connect Portal. However, if you have worked with iTunes Connect previously,
    you might want to skip to the next section, “Configuring Game Center in iTunes
    Connect,” as the following will be only a refresher for you.


    iTunes Connect is a web portal, accessed from any web browser at [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)
    . You will use your existing AppleID, which you used to register as a developer
    ( [`http://developer.apple.com`](http://developer.apple.com/) ), to gain access
    to the portal. This is the same web application that you will use when you want
    to upload new apps for sale on the App Store, as well as make any changes to them,
    such as price or description. A view of the landing page for iTunes Connect can
    be seen in Figure [1-4](#A978-1-4302-4906-1_1_Chapter.html#Fig4).


    ![A978-1-4302-4906-1_1_Fig4_HTML.jpg](A978-1-4302-4906-1_1_Fig4_HTML.jpg)


    Figure 1-4.


    A view of iTunes Connect taken July 2013


    When you log in to iTunes Connect, you will be presented with a wealth of options.
    The most important of these is setting up your contracts, tax, and banking information.
    While these requirements do not have anything to do with Game Center per se, it
    is good to get them out of the way.


    It may take weeks for Apple to process this information, so submit it as soon
    as possible. Until this information is processed and approved, you will be unable
    to release software on the App Store. Once you have completed all the requested
    information under this section, you can focus on the app development itself.


    Note


    If you plan on releasing only free iOS apps, you do not need to complete the paid
    apps contracts. However, if you plan to release any paid software in the future,
    these should be completed as soon as possible.


    Before you can access any Game Center–specific information, you will need to create
    a new iOS app (or use an existing one). This is a straightforward process that
    you will be walked through in iTunes Connect. You begin under the Manage Your
    Applications section; there you will find an “Add New App” button. The rest should
    be fairly self-explanatory.


    If you are not yet ready to upload an app, you can create placeholder data here
    to gain access to the Game Center portal. Once your app has been created in iTunes
    Connect, you can begin to configure the Game Center–specific information.


    Caution


    If you create an app and fail to upload a release build within 90 days, Apple
    will delete the app information and restrict you from creating a new app with
    the same name in the future. This was introduced in late 2010 as an effort to
    prevent people from “Domain Squatting” app names.'
  trans: "\n### 使用 `UIImage` 执行命中测试\n\n在考虑如何设置绑架奶牛之前，需要先完成一些绑架奶牛本身的预备步骤。首先，我们必须实现一个\
    \ `hitTest` 方法，该方法由本节前面讨论的 `touchesBegan` 事件调用。\n\n```\n- (UIImageView*)hitTest\n\
    {\n    if (!tractorBeamOn) {\n        return nil;\n    }\n    for (int x = 0;\
    \ x < [cowArray count]; x++) {\n        UIImageView *tempCow = [cowArray objectAtIndex:\
    \ x];\n        CALayer *cowLayer = [[tempCow layer] presentationLayer];\n    \
    \    CGRect cowFrame = [cowLayer frame];\n        if (CGRectIntersectsRect(cowFrame,\
    \ tractorBeamImageView.frame)) {\n            tempCow.frame = cowLayer.frame;\n\
    \            [tempCow.layer removeAllAnimations];\n            return tempCow;\n\
    \        }\n    }\n    return nil;\n}\n```\n\n第一行是另一个健全性检查，这次是为了确保我们不会在 `tractorBeam`\
    \ 未开启时调用 `hitTest` 方法。一旦确定我们应该进行命中检测，我们就遍历奶牛对象数组。由于奶牛正处于动画过程中，我们不能依赖 `frame` 中的数据，因为那将显示奶牛最终的位置，而不是当前的位置。\n\
    \n为了确定奶牛当前的位置，我们请求 `presentationLayer`。Core Graphics 提供了一个用于测试两个 `CGRect` 是否相交的有用方法，这正是我们将在这里使用的方法。如果命中了奶牛，就返回该对象。如果遍历完循环仍未通过命中测试，则返回\
    \ `nil`。\n\n**提示：** 可以在任何 `CALayer` 上调用 `presentationLayer` 方法，以提供对正在动画处理的图层当前值的最佳估计。\n\
    \n### 绑架奶牛\n\n在我们的 `touchesBegan` 方法中，我们测试了 `hitTest` 是否返回了一只奶牛。如果是，我们就用返回的对象调用\
    \ `abductCow`。代码如下：\n\n```\n- (void)abductCow:(UIImageView *)cowImageView;\n{\n\
    \    [UIView beginAnimations: @\"abduct\" context:nil];\n    [UIView setAnimationDuration:\
    \ 4.0];\n    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    [UIView\
    \ setAnimationDelegate: self];\n    [UIView setAnimationDidStopSelector: @selector(finishAbducting)];\n\
    \    [UIView setAnimationBeginsFromCurrentState: YES];\n\n    CGRect frame = cowImageView.frame;\n\
    \    frame.origin.y = myPlayerImageView.frame.origin.y;\n    cowImageView.frame\
    \ = frame;\n\n    [UIView commitAnimations];\n}\n```\n\n我们在奶牛对象（它是一个 `imageView`）上开始一个动画事件。同时设置一个\
    \ `didStopSelector`，动画完成后会调用该方法。我们将奶牛的新 y 轴坐标设置为 UFO 当前的 y 坐标，并开始动画。\n\n动画停止后，我们会收到\
    \ `finishAbducting` 的回调。这使我们能够增加分数、清理绑架代码并生成一头新奶牛。\n\n```\n- (void)finishAbducting;\n\
    {\n    if (!currentAbductee || !tractorBeamOn) {\n        return;\n    }\n   \
    \ [cowArray removeObjectIdenticalTo: currentAbductee];\n    [tractorBeamImageView\
    \ removeFromSuperview];\n    tractorBeamOn = NO;\n    score++;\n    [scoreLabel\
    \ setText:[NSString stringWithFormat: @\"SCORE %05.0f\", score]];\n\n    [[currentAbductee\
    \ layer] removeAllAnimations];\n    [currentAbductee removeFromSuperview];\n \
    \   currentAbductee = nil;\n\n    //生成一头新奶牛\n    [self spawnCow];\n}\n```\n\n\
    在方法开始时，我们检查牵引光束是否仍然开启，以及是否存在被绑架对象。就像用户从屏幕松开触摸时所做的处理一样，我们也要从视图中移除牵引光束图像，并正确设置状态变量。用户每绑架一头奶牛，我们奖励其\
    \ 1 分，并相应地更新 `scoreLabel`。我们清理旧的奶牛图像，并将其设置为 `nil`。然后生成一头新奶牛来替换被绑架的那头。\n\n### 配置\
    \ iTunes Connect 以支持 Game Center\n\n在你的 iOS 应用或游戏能够访问任何 Game Center 功能之前，需要在 iTunes\
    \ Connect 中进行配置。iTunes Connect 的出现早于 App Store 和 iPhone；它最初是作为音乐人和媒体制作人向 iTunes\
    \ 音乐商店上传内容而引入的门户。后来经过改造，允许开发者上传他们的 iOS 软件在 App Store 上销售。自 2008 年 7 月向 iPhone\
    \ 开发者开放以来，iTunes Connect 经历了巨大的演变。苹果已开始将其作为应用配置的主要来源。诸如应用内购买（IAP）、iAd 和 Game Center\
    \ 等功能都需要在 iTunes Connect 中进行配置。\n\n**注意：** 你仍然可以不设置为应用配置 Game Center 而独立使用任何 Game\
    \ Kit 功能。关于 Game Kit 独立功能的更多信息，请参阅第 6、7、8 和 10 章。\n\n### 开始使用 iTunes Connect\n\
    \n如果你从未向 App Store 上传过应用，那么可能对 iTunes Connect 门户不太熟悉。然而，如果你之前用过 iTunes Connect，可以跳到下一节“在\
    \ iTunes Connect 中配置 Game Center”，因为以下内容只是对你的一次回顾。\n\niTunes Connect 是一个 Web 门户，可以通过任何浏览器访问\
    \ `http://itunesconnect.apple.com`。你将使用已有的 Apple ID（即你注册为开发者时使用的那个，网址为 `http://developer.apple.com`）来访问该门户。当你想要在\
    \ App Store 上架新应用进行销售，或对其价格、描述等进行修改时，使用的也是同一个 Web 应用程序。iTunes Connect 的登录页面视图如图\
    \ 1-4 所示。\n\n![A978-1-4302-4906-1_1_Fig4_HTML.jpg](img/A978-1-4302-4906-1_1_Fig4_HTML.jpg)\n\
    \n*图 1-4. 2013 年 7 月拍摄的 iTunes Connect 视图*\n\n登录 iTunes Connect 后，你会看到大量选项。其中最重要的是设置你的合同、税务和银行信息。虽然这些要求本身与\
    \ Game Center 无关，但最好尽早处理掉。\n\n苹果可能需要数周时间来处理这些信息，所以请尽快提交。在这些信息处理完毕并获批之前，你将无法在 App\
    \ Store 上发布软件。一旦完成本部分下所有要求的信息填写，你就可以专注于应用开发本身了。\n\n**注意：** 如果你只打算发布免费的 iOS 应用，则无需完成付费应用合同。但如果你未来计划发布任何付费软件，则应尽快完成这些手续。\n\
    \n在访问任何 Game Center 特定信息之前，你需要创建一个新的 iOS 应用（或使用现有的应用）。这是一个直接了当的过程，iTunes Connect\
    \ 会引导你完成。你从“管理你的应用”部分开始；在那里你会找到“添加新应用”按钮。其余步骤应该相当直观。\n\n如果你尚未准备好上传应用，可以在此处创建占位数据以获取\
    \ Game Center 门户的访问权限。一旦在 iTunes Connect 中创建了应用，就可以开始配置 Game Center 的特定信息。\n\n\
    **警告：** 如果创建应用后 90 天内未上传发布版本，苹果将删除该应用信息，并限制你将来无法使用相同名称创建新应用。此规定于 2010 年底引入，旨在防止人们“域名抢注”应用名称。\n"
