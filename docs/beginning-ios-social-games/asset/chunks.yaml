    # Foreword: Better With Friends


    Games are social by nature. Games are a form of play, and play is always more
    fun and rewarding in groups. Even video games. I have fond memories of dumping
    bundles of quarters into machines at the arcade with my friends, and I still can''t
    bring myself to get rid of my NES, which saw countless hours of multiplayer action.
    It is virtually impossible for me to separate the experience of those games from
    the people I shared them with. Before we began to bury our faces into our iPhones,
    the most personal of devices, sharing and camaraderie were part of the video game
    experience.


    At their hearts, the iPhone and iPad are communication devices, and we should
    take advantage of their nature when designing our iOS games. Thankfully, Apple
    agrees, and it has provided powerful APIs that open up a world of social interaction
    when wielded correctly. It''s that wielding where Kyle and this book come in.


    When it comes to iOS, especially social iOS games, Kyle Richter is your man. He
    gave us Trivium, arguably the first social game on the platform. Before Apple
    provided any API for social games, Kyle was walking 10 miles, uphill, in the snow,
    barefoot to give gamers the social experience we crave. His experience runs deep,
    and his passion for games is matched only by his passion for iOS. He is also a
    wonderful teacher, and we get to benefit from all of this in the following pages.


    I love reading technical books because I always learn something new. This book
    is no exception. Game Kit and Game Center are filled to the brim with fun, powerful,
    easy-to-use APIs. I guarantee you will learn something new as you progress through
    the book, just like I did.


    A personal favorite topic of mine is Turn-Based Gaming (Chapter 9). Asynchronous,
    turn-based games are natural on mobile devices, but the overhead of running back-end
    services make such games difficult to build. The turn-based game API in GameKit
    takes the plumbing out of the equation and allows you to focus on making your
    game fun.


    Another favorite topic of mine, Voice Chat (Chapter 10), is one of the unsung
    heroes of GameKit. I am still surprised at how few games take advantage of voice
    chat. Thanks to this book, you have no excuse.


    After June 2013, no iOS game development book would be complete without a discussion
    about the new Game Controller framework, and Kyle gives us an entire chapter (Chapter
    15). Pair game controller support with AirPlay to an Apple TV (Chapter 14), and
    you have a full-fledged console game. No need to buy extra controllers. Your friends
    carry their controllers with them everywhere. Who needs a $300+ dedicated console?


    Games, like words, are better with friends, and even if you don''t have any friends,
    Matchmaking (Chapter 5) will help you find some. Thanks to Kyle and this book,
    your players can enjoy your games with their friends. Get to work!


    Nathan Eror


    Founder, Free Time Studios


