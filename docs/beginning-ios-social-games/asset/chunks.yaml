- fmt: "# Presenting a Match GUI\n\nWe begin by first working with the standard matchmaking\
    \ GUI provided by Apple. Start by first adding a new button to handle presenting\
    \ the view on the main screen of our test game. I have also gone ahead and renamed\
    \ the old Play button to Single Player, and created a new button called Multiplayer\
    \ (see Figure [5-1](#A978-1-4302-4906-1_5_Chapter.html#Fig1)). We will use the\
    \ `UFOViewController` to act as the delegate for our matchmaking behavior, so\
    \ set the view controller to conform to `GKMatchmakerViewControllerDelegate`.\
    \ Additionally, modify the action method of the multiplayer button we just added\
    \ to match the following code:\n\n```\n- (IBAction)multiplayerButtonPressed;\n\
    \n{\n\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\n\nrequest.minPlayers\
    \ = 2;\n\nrequest.maxPlayers = 2;\n\nGKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc] initWithMatchRequest:request];\n\nmmvc.matchmakerDelegate = self;\n\n\
    [request release];\n\n[self presentModalViewController:mmvc animated:YES];\n\n\
    [mmvc release];\n\n}\n```\n\n![A978-1-4302-4906-1_5_Fig1_HTML.jpg](A978-1-4302-4906-1_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. Adding a new button for multiplayer in the `UFOViewController.xib`\n\
    \nWe create a new instance of `GKMatchRequest`, as we did in the previous section.\
    \ Our demo game will consist of exactly two players, so we set the max and the\
    \ min both to two.\n\nIn the next part of the code snippet, we create a new instance\
    \ of `GKMatchViewController` and allocate and initialize it with the `GKMatchRequest`\
    \ we just created. We also set the delegate to our `UFOViewController` class.\
    \ When that is done, we present it as we present any other modal view. You should\
    \ have output that looks similar to Figure [5-2](#A978-1-4302-4906-1_5_Chapter.html#Fig2).\n\
    \n![A978-1-4302-4906-1_5_Fig2_HTML.jpg](A978-1-4302-4906-1_5_Fig2_HTML.jpg)\n\n\
    Figure 5-2. `MatchmakerViewController` creating a new match GUI with two players\n\
    \nIf you haven’t already done so, now would be a good time to populate your friends\
    \ list on your sandboxed Game Center account. It is helpful to have several unused\
    \ email addresses available for this process, as you don’t want to use any email\
    \ addresses that have previously been used with iTunes Connect or with Game Center.\
    \ Once you have populated a friend or two, you can go ahead and tap on the Invite\
    \ Friend button shown in Figure [5-2](#A978-1-4302-4906-1_5_Chapter.html#Fig2).\
    \ You’ll be provided with auto-match functionality automatically, assuming you\
    \ have followed the previous steps.\n\n**Reminder**: Do not use any email addresses\
    \ you have previously used in iTunes Connect or Game Center when creating sandboxed\
    \ accounts, as it can cause strange and unexpected behavior.\n\nYou should now\
    \ see a list of your friends and have the ability to invite them into your app,\
    \ as shown in Figure [5-3](#A978-1-4302-4906-1_5_Chapter.html#Fig3).\n\n![A978-1-4302-4906-1_5_Fig3_HTML.jpg](A978-1-4302-4906-1_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3. Inviting a friend from your Game Center friends list\n\nBefore we\
    \ can continue, we need to implement the required delegate methods for the `GKMatchmakerViewController`.\
    \ Specifically, we need to implement the following three methods before we can\
    \ continue working with matchmaking:\n\n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController\
    \ *)viewController\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
    \ didFailWithError:(NSError *)error\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:NULL];\n    if (error != nil)\n    {\n        NSString *message =\
    \ [NSString stringWithFormat:@\"An error occurred: %@\", [error localizedDescription]];\n\
    \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\"\n     \
    \                                                   message:message\n        \
    \                                               delegate:nil\n               \
    \                               cancelButtonTitle:@\"Dismiss\"\n             \
    \                                 otherButtonTitles:nil];\n        [alert show];\n\
    \        [alert release];\n    }\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController didFindMatch:(GKMatch *)match\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:NULL];\n}\n```\n\nThe first two methods handle user cancellations\
    \ and failures, while the third handles the successes. The last method will return\
    \ a `GKMatch` object upon success; we will use this object in the following chapters\
    \ to begin a new match.\n\nWhen working with a variable number of players allowed\
    \ per match, the user will have the option of adding and removing player slots\
    \ from the matchmaker view controller as shown in Figure [5-4](#A978-1-4302-4906-1_5_Chapter.html#Fig4).\n\
    \n![A978-1-4302-4906-1_5_Fig4_HTML.jpg](A978-1-4302-4906-1_5_Fig4_HTML.jpg)\n\n\
    Figure 5-4. A matchmaker screen with a variable number of players\n\nWhen inviting\
    \ friends into a Game Center match, you will have the option of supplying a short\
    \ message to be displayed with the invitation, as shown in Figure [5-5](#A978-1-4302-4906-1_5_Chapter.html#Fig5).\n\
    \n![A978-1-4302-4906-1_5_Fig5_HTML.jpg](A978-1-4302-4906-1_5_Fig5_HTML.jpg)\n\n\
    Figure 5-5. Sending an invitation method to a friend asking them to begin a match\
    \ with you. This message will be sent as a push notification and displayed as\
    \ an incoming text message on the invitee’s device, as shown later in Figure [5-6](#A978-1-4302-4906-1_5_Chapter.html#Fig6)"
