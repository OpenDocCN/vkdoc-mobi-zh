    SLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\
    \ requestMethod:SLRequestMethodGET URL:requestURL parameters:nil];\nrequest.account\
    \ = self.twitterAccount;\n```\n\n在 API 层面与 Twitter 交互，可以完全访问 Twitter SDK。这种直接访问方式让你的应用能够超越单纯的推文发布，与\
    \ Twitter 进行更深入的互动。例如，应用可以拉取用户所有好友的列表，或下载用户的头像用于游戏。\n\n`SLRequest` 的唯一限制在于它所交互的第三方\
    \ API 会不断演变。有关 `SLRequest` 和 Twitter 更多功能的详细信息，请参阅官方 Twitter API 文档：[`dev.twitter.com/docs/api`](https://dev.twitter.com/docs/api)。\n\
    \n# 本章小结\n\n在本章中，你学习了 Social Framework 和 Accounts Framework，以及如何利用它们与 Twitter\
    \ API 进行交互。我们涵盖了使用内置推文编辑器发布推文，以及使用自定义界面发布推文的方法。最后，我们简要介绍了通过 `SLRequest` 和 Twitter\
    \ API 实现的其他功能，例如获取好友列表和时间线历史记录。现在，你应该已经能够完全自如地为下一个应用或游戏添加 Twitter 功能。`SLRequest`\
    \ 会持续适应 Twitter API 的更新，这意味着即使 iOS 未发布新版本，社交网络也可能出现令人兴奋的新功能。下一章我们将探索 Facebook\
    \ 功能，它将拓展你在本章学到的社交网络知识。\n\n# 13. Facebook\n\n摘要\n\n> “想想人们如今在 Facebook 上做什么。他们与朋友和家人保持联系，同时也在为自己构建形象和身份——从某种意义上说，这就是他们的个人品牌。他们在与自己想要连接的受众建立联系。现在如果不用\
    \ Facebook，几乎可以说是一种劣势。”\n\n> ——马克·扎克伯格\n\nFacebook 成立于 2004 年 2 月，是西方世界最受欢迎的社交网络服务，拥有超过十亿活跃用户。Facebook\
    \ 已与现代文化和社会紧密交织，甚至催生了一部关于其不光彩历史的大制作电影。\n\n自移动设备在 2007 年开始普及以来，Facebook 一直是移动软件的核心组成部分，最初以移动版网站形式出现，并迅速转变为每个主流平台的原生服务。早在\
    \ iOS 2 时代，Facebook 的 API 就已可用，最初称为 Facebook Connect。随着 iOS 6 的推出，Facebook 的 API\
    \ 服务成为 iOS SDK 的内置组件。Facebook 功能是对最初为 iOS 5 引入、用于支持 Twitter 的 Social Framework\
    \ 的扩展。\n\n## 关于示例项目\n\n从第 12 章到本书结尾，示例代码不再基于之前的章节构建。本项目将是第 3 章示例项目的扩展；如果你打算跟随示例项目操作，请从该章的\
    \ Xcode 项目开始修改。\n\n当用户退出游戏并获得最终得分后，系统会提示他们选择是否将该分数发布到自己的 Facebook 主页，可以使用内置编辑器或编程式\
    \ API 方式。用户也可以选择不分享分数并返回主菜单视图。为实现这一更改，`exitAction:` 方法被修改为通过 `UIAlert` 向用户呈现这些选项。\n\
    \n```\n-(IBAction)exitAction:(id)sender;\n{\n    UIAlertView *alert = [[UIAlertView\
    \ alloc]\n    initWithTitle:@\"Facebook 分数\" message:@\"是否要将分数发布到您的 Facebook 主页？\"\
    \n    delegate:self cancelButtonTitle:@\"取消\"\n    otherButtonTitles:@\"Facebook\
    \ 编辑器\", @\"自定义发布\",\n    nil];\n    [alert show];\n    [alert release];\n}\n\
    ```\n\n`alert` 视图的代理也被配置为处理包含用户选择的回调。如果用户选择不在 Facebook 上分享分数，则将分数提交给 Game Center，并返回主菜单视图。\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n     //Facebook 编辑器\n    if(buttonIndex == 1)\n    {\n    }\n    //自定义发布\n\
    \    else if(buttonIndex == 2)\n    {\n    }\n    else if(buttonIndex == 0)\n\
    \    {\n        [[self navigationController] popViewControllerAnimated: YES];\n\
    \        [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n    }\n}\n```\n\n## iOS 上的 Facebook\n\n当 Twitter 作为 iOS 5 中 Social Framework\
    \ 的一部分被宣布时，许多人疑惑为什么没有同时包含 Facebook。苹果在 iOS 6 中解决了这个问题。与 Twitter 类似，Facebook 的设置需在“设置”应用内完成（图\
    \ 13-1）；用户无法直接从第三方应用登录。Facebook 配置还支持将日历和联系人与其 iOS 原生版本同步。虽然 Twitter 允许用户同时登录多个账户，但在\
    \ iOS 7 中，Facebook 一次只能链接一个账户。\n\n![A978-1-4302-4906-1_13_Fig1_HTML.jpg](img/A978-1-4302-4906-1_13_Fig1_HTML.jpg)\n\
    \n图 13-1. iOS 7 上 Facebook 的配置设置\n\n在应用中通过 Social Framework 发布内容到 Facebook 有两种系统实现方式。第一种是使用\
    \ `SLComposeViewController`，这在“Facebook 编辑器”一节中有描述。这是最容易实现的方式，用户将看到一个标准、熟悉的界面。第二种方式是使用\
    \ `SLRequest` 直接与 Facebook SDK 交互，这在“Facebook 权限”和“自定义 Facebook 发布”部分有介绍。与使用编辑器相比，使用\
    \ `SLRequest` 涉及多层认证和各种潜在问题；而编辑器则无需用户提供额外的认证或权限。\n"
- fmt: "# Facebook Composer\n\nThe Facebook Composer (Figure [13-2](#A978-1-4302-4906-1_13_Chapter.html#Fig2))\
    \ is the easiest method of allowing a user to post information from your app to\
    \ their Facebook wall. It provides options for selecting albums, setting location,\
    \ attaching images, and specifying an audience with no additional configuration\
    \ required. Additionally, it does not need the two extra permission requests that\
    \ the `SLRequest` approach requires.\n\n![A978-1-4302-4906-1_13_Fig2_HTML.jpg](A978-1-4302-4906-1_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2.\n\nThe Facebook Composer view\n\n> **Note:** Don’t forget to include\
    \ `Social.Framework` and import `social/Social.h` before working with the Facebook\
    \ Composer.\n\nPrior to working with the Facebook Composer, our code performs\
    \ a compatibility test to ensure that the device supports Facebook posting and\
    \ that an account has been properly set up and logged into.\n\n`[SLComposeViewController\
    \ isAvailableForServiceType:SLServiceTypeFacebook]`\n\nIf this call returns `NO`,\
    \ the most common reason is that the user has not set up a Facebook account in\
    \ `Settings.app`. Once it has been confirmed that everything is configured correctly\
    \ for Facebook, a new `SLComposeViewController` is created and its service type\
    \ set to `SLServiceTypeFacebook`.\n\n`SLComposeViewController *facebookController\
    \ = [SLComposeViewController composeViewControllerForServiceType: SLServiceTypeFacebook];`\n\
    \nA new block is created to handle the results of the Composer view. The sample\
    \ project handles two cases, cancelled and all other events. Under both cases\
    \ the score is submitted to Game Center, and the Composer view is dismissed.\n\
    \n```\nSLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult\
    \ result)\n{\n    if (result == SLComposeViewControllerResultCancelled)\n    {\n\
    \         NSLog(@\"Facebook Controller Canceled\");\n    }\n    else\n    {\n\
    \        NSLog(@\"Facebook Controller Done\");\n    }\n\n    [[self navigationController]\
    \ popViewControllerAnimated: YES];\n    [self.gcManager reportScore:score forCategory:@\"\
    com.dragonforged.ufo.single\"];\n    [facebookController dismissViewControllerAnimated:YES\
    \ completion:nil];\n};\n```\n\nThe newly created block is set to the `completionHandler`\
    \ property on the `facebookController`:\n\n`facebookController.completionHandler\
    \ = myBlock;`\n\nThere are a handful of attributes that can be supplied to appear\
    \ in the Composer view, the first being the initial text that appears in the share\
    \ controller. Keep in mind that the user will be able to go in and change these\
    \ values before they post. An optional `UIImage` can also be attached to the post,\
    \ which will appear as an uploaded image in Facebook. Finally, a URL can be added\
    \ to the post, using the `addURL:` method.\n\n```\n[facebookController setInitialText:[NSString\
    \ stringWithFormat: @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\", score]];\n\
    [facebookController addImage:[UIImage imageNamed:@\"Cow1.png\"]];\n[facebookController\
    \ addURL:[NSURL URLWithString:@\"http://bit.ly/19ak0Uv\"]];\n```\n\nOnce the Composer\
    \ view has been fully configured, it can be presented to the user with the following\
    \ code snippet:\n\n`[self presentViewController:facebookController animated:YES\
    \ completion:nil];`\n\nWhen the post has been successfully sent, it will play\
    \ the standard outgoing email sound from iOS to let the user know the action has\
    \ successfully completed. The result of this posting can be seen in Figure [13-3](#A978-1-4302-4906-1_13_Chapter.html#Fig3)\
    \ as visible on the Facebook website.\n\n![A978-1-4302-4906-1_13_Fig3_HTML.jpg](A978-1-4302-4906-1_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3.\n\nThe results of a Facebook Composer post viewed on the Facebook\
    \ website\n\n# Facebook Apps\n\nEvery app that should interact with the Facebook\
    \ API needs to have an associated Facebook app. (If your app is using the previously\
    \ described Facebook Composer approach, you will not need to create a dedicated\
    \ Facebook app.) You create a new Facebook app through the Facebook Developer\
    \ Portal ( [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)\
    \ ), shown in Figure [13-4](#A978-1-4302-4906-1_13_Chapter.html#Fig4).\n\n![A978-1-4302-4906-1_13_Fig4_HTML.jpg](A978-1-4302-4906-1_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4.\n\nCreating a new iOS app from the Facebook Developer Portal\n\n\
    Once a Facebook App has been created, you will need to capture the App ID (Figure\
    \ [13-5](#A978-1-4302-4906-1_13_Chapter.html#Fig5)), as it will be used throughout\
    \ the integration of Facebook to identify your app to the Facebook servers. Facebook\
    \ will also supply an App Secret; this is not required when working with the Social\
    \ Framework.\n\n![A978-1-4302-4906-1_13_Fig5_HTML.jpg](A978-1-4302-4906-1_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5.\n\nConfiguring a Facebook App to work as a native iOS app, as required\
    \ for the Social Framework\n\n> **Note:** Make sure the Bundle ID under the Native\
    \ iOS App section matches the Bundle ID found in the `info.plist` of the iOS app."
  raw: '## Facebook Composer


    The Facebook Composer (Figure [13-2](#A978-1-4302-4906-1_13_Chapter.html#Fig2))
    is the easiest method of allowing a user to post information from your app to
    their Facebook wall. It provides options for selecting albums, setting location,
    attaching images, and specifying an audience with no additional configuration
    required. Additionally, it does not need the two extra permission requests that
    the `SLRequest` approach requires.


    ![A978-1-4302-4906-1_13_Fig2_HTML.jpg](A978-1-4302-4906-1_13_Fig2_HTML.jpg)


    Figure 13-2.


    The Facebook Composer view Note


    Don’t forget to include `Social.Framework` and import `social/Social.h` before
    working with the Facebook Composer.


    Prior to working with the Facebook Composer, our code performs a compatibility
    test to ensure that the device supports Facebook posting and that an account has
    been properly set up and logged into.


    `[SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook]`


    If this call returns NO, the most common reason is that the user has not set up
    a Facebook account in Settings.app. Once it has been confirmed that everything
    is configured correctly for Facebook, a new `SLComposeViewController` is created
    and its service type set to `SLServiceTypeFacebook`.


    `SLComposeViewController *facebookController = [SLComposeViewController composeViewControllerForServiceType:
    SLServiceTypeFacebook];`


    A new block is created to handle the results of the Composer view. The sample
    project handles two cases, cancelled and all other events. Under both cases the
    score is submitted to Game Center, and the Composer view is dismissed.


      `SLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult
    result)`


    `{`


        `if (result == SLComposeViewControllerResultCancelled)`


        `{`


             `NSLog(@"Facebook Controller Canceled");`


        `}`


        `else`


        `{`


            `NSLog(@"Facebook Controller Done");`


        `}`


        `[[self navigationController] popViewControllerAnimated: YES];`


        `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


        `[facebookController dismissViewControllerAnimated:YES completion:nil];`


    `};`


    The newly created block is set to the `completionHandler` property on the `facebookController`:


    `facebookController.completionHandler = myBlock;`


    There are a handful of attributes that can be supplied to appear in the Composer
    view, the first being the initial text that appears in the share controller. Keep
    in mind that the user will be able to go in and change these values before they
    post. An optional UIImage can also be attached to the post, which will appear
    as an uploaded image in Facebook. Finally, a URL can be added to the post, using
    the `addURL:` method.


    `[facebookController setInitialText:[NSString stringWithFormat: @"I just abducted
    %0.0f cow(s) in UFOs for iPhone!", score]];`


    `[facebookController addImage:[UIImage imageNamed:@"Cow1.png"]];`


    `[facebookController addURL:[NSURL URLWithString:@"` [`http://bit.ly/19ak0Uv`](http://bit.ly/19ak0Uv)
    `"]];`


    Once the Composer view has been fully configured, it can be presented to the user
    with the following code snippet:


    `[self presentViewController:facebookController animated:YES completion:nil];`


    When the post has been successfully sent, it will play the standard outgoing email
    sound from iOS to let the user know the action has successfully completed. The
    result of this posting can be seen in Figure [13-3](#A978-1-4302-4906-1_13_Chapter.html#Fig3)
    as visible on the Facebook website.


    ![A978-1-4302-4906-1_13_Fig3_HTML.jpg](A978-1-4302-4906-1_13_Fig3_HTML.jpg)


    Figure 13-3.


    The results of a Facebook Composer post viewed on the Facebook website


    ## Facebook Apps


    Every app that should interact with the Facebook API needs to have an associated
    Facebook app. (If your app is using the previously described Facebook Composer
    approach, you will not need to create a dedicated Facebook app.) You create a
    new Facebook app through the Facebook Developer Portal ( [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)
    ), shown in Figure [13-4](#A978-1-4302-4906-1_13_Chapter.html#Fig4).


    ![A978-1-4302-4906-1_13_Fig4_HTML.jpg](A978-1-4302-4906-1_13_Fig4_HTML.jpg)


    Figure 13-4.


    Creating a new iOS app from the Facebook Developer Portal


    Once a Facebook App has been created, you will need to capture the App ID (Figure
    [13-5](#A978-1-4302-4906-1_13_Chapter.html#Fig5)), as it will be used throughout
    the integration of Facebook to identify your app to the Facebook servers. Facebook
    will also supply an App Secret; this is not required when working with the Social
    Framework.


    ![A978-1-4302-4906-1_13_Fig5_HTML.jpg](A978-1-4302-4906-1_13_Fig5_HTML.jpg)


    Figure 13-5.


    Configuring a Facebook App to work as a native iOS app, as required for the Social
    Framework Note


    Make sure the Bundle ID under the Native iOS App section matches the Bundle ID
    found in the `info.plist` of the iOS app.'
  trans: "\n# Facebook 分享器\n\nFacebook 分享器（图 13-2）是最简单的方式，让用户从你的应用向他们的 Facebook 涂鸦墙发布信息。它提供了选择相册、设置位置、附加图片以及指定可见范围的选项，无需额外配置。此外，它也不需要\
    \ `SLRequest` 方法所需的两个额外权限请求。\n\n![A978-1-4302-4906-1_13_Fig2_HTML.jpg](img/A978-1-4302-4906-1_13_Fig2_HTML.jpg)\n\
    \n图 13-2.\n\nFacebook 分享器视图\n\n> **注意：** 在使用 Facebook 分享器之前，别忘了引入 `Social.Framework`\
    \ 并导入 `social/Social.h`。\n\n在使用 Facebook 分享器之前，我们的代码会进行兼容性测试，以确保设备支持 Facebook\
    \ 发布，并且已正确设置并登录了账户。\n\n`[SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook]`\n\
    \n如果此调用返回 `NO`，最常见的原因是用户尚未在“设置”应用中设置 Facebook 账户。一旦确认所有内容已在 Facebook 中正确配置，就会创建一个新的\
    \ `SLComposeViewController`，并将其服务类型设置为 `SLServiceTypeFacebook`。\n\n`SLComposeViewController\
    \ *facebookController = [SLComposeViewController composeViewControllerForServiceType:\
    \ SLServiceTypeFacebook];`\n\n系统会创建一个新的代码块来处理分享器视图的结果。示例项目处理了两种情况：取消发布和其他所有事件。在这两种情况下，分数都会提交到游戏中心，并且分享器视图会被关闭。\n\
    \n```\nSLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult\
    \ result)\n{\n    if (result == SLComposeViewControllerResultCancelled)\n    {\n\
    \         NSLog(@\"Facebook 分享器已取消\");\n    }\n    else\n    {\n        NSLog(@\"\
    Facebook 分享器已完成\");\n    }\n\n    [[self navigationController] popViewControllerAnimated:\
    \ YES];\n    [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n    [facebookController dismissViewControllerAnimated:YES completion:nil];\n\
    };\n```\n\n这个新创建的代码块会被设置到 `facebookController` 的 `completionHandler` 属性上：\n\n\
    `facebookController.completionHandler = myBlock;`\n\n有若干属性可以提供给分享器视图显示，首先是显示在分享控制器中的初始文本。请记住，用户可以在发布之前进入并更改这些值。一个可选的\
    \ `UIImage` 也可以附加到发布内容中，它将作为上传的图片出现在 Facebook 上。最后，可以使用 `addURL:` 方法向发布内容添加一个\
    \ URL。\n\n```\n[facebookController setInitialText:[NSString stringWithFormat:\
    \ @\"我刚刚在 UFO 中为 iPhone 绑架了 %0.0f 头奶牛！\", score]];\n[facebookController addImage:[UIImage\
    \ imageNamed:@\"Cow1.png\"]];\n[facebookController addURL:[NSURL URLWithString:@\"\
    http://bit.ly/19ak0Uv\"]];\n```\n\n一旦分享器视图配置完成，就可以使用以下代码片段将其呈现给用户：\n\n`[self presentViewController:facebookController\
    \ animated:YES completion:nil];`\n\n当发布内容成功发送后，它会播放 iOS 中标准的发送邮件声音，告知用户操作已成功完成。此发布的结果如图\
    \ 13-3 所示，可在 Facebook 网站上看到。\n\n![A978-1-4302-4906-1_13_Fig3_HTML.jpg](img/A978-1-4302-4906-1_13_Fig3_HTML.jpg)\n\
    \n图 13-3.\n\n在 Facebook 网站上查看的 Facebook 分享器发布结果\n\n# Facebook 应用\n\n每个需要与 Facebook\
    \ API 交互的应用都必须有一个关联的 Facebook 应用。（如果你的应用使用的是前面描述的 Facebook 分享器方式，则不需要创建一个专用的 Facebook\
    \ 应用。）你通过 Facebook 开发者门户（ [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)\
    \ ）创建一个新的 Facebook 应用，如图 13-4 所示。\n\n![A978-1-4302-4906-1_13_Fig4_HTML.jpg](img/A978-1-4302-4906-1_13_Fig4_HTML.jpg)\n\
    \n图 13-4.\n\n从 Facebook 开发者门户创建新的 iOS 应用\n\n一旦创建了 Facebook 应用，你需要获取其应用 ID（图 13-5），因为在集成\
    \ Facebook 的过程中，会使用它向 Facebook 服务器标识你的应用。Facebook 还会提供一个应用密钥；但在使用社交框架时不需要它。\n\n\
    ![A978-1-4302-4906-1_13_Fig5_HTML.jpg](img/A978-1-4302-4906-1_13_Fig5_HTML.jpg)\n\
    \n图 13-5.\n\n按照社交框架的要求，将 Facebook 应用配置为原生 iOS 应用\n\n> **注意：** 请确保“原生 iOS 应用”部分下的\
    \ Bundle ID 与 iOS 应用的 `info.plist` 中的 Bundle ID 相匹配。\n"
- fmt: "# Facebook Permissions\n\nFacebook has a stacked system of permissions for\
    \ accessing and posting data. This means that in order to access high-level permissions\
    \ like posting, you first need lower-level permissions such as reading.\n\nThe\
    \ first set of permissions that needs to be requested are the general profile\
    \ read permissions, which allow the app to read basic user profile info such as\
    \ name, email, and friends list. There is an additional permission needed to read\
    \ wall posts, and even more permissions are required to make a post.\n\nTo add\
    \ to the complexity, basic read permissions need to be authorized before additional\
    \ permissions can be requested. It is not possible to group all permissions together\
    \ into a single call. The result of this is that to post to the user’s timeline,\
    \ two separate permissions need to be requested.\n\n**Note**\n\nThroughout this\
    \ sample project, the Facebook ID for UFOs (`165243936994502`) is used; make sure\
    \ that this value is correctly changed to the Facebook ID for your app during\
    \ development.\n\nThe first set of permissions that is requested is the basic\
    \ profile reading access group. Requesting any of the basic attribute fields will\
    \ grant access to the entire basic profile. In the following example the `email`\
    \ property is requested. Once a user has approved reading the `email` property,\
    \ the app will also gain access to read all basic profile info as well as the\
    \ friends list.\n\nA new `ACAccountStore` will need to be allocated and initialized,\
    \ and a new `ACAccountType` with the identifier `ACAccountTypeIdentifierFacebook`\
    \ is created. This will inform the API that you will be working with a Facebook\
    \ account.\n\nAn `options` dictionary is created next; it will contain three key/value\
    \ pairs. The first is the `audience` key; while the value is not crucial for this\
    \ step, since we aren’t posting new data, we specify `ACFacebookAudienceEveryone`.\
    \ The next value is the App ID, which was established in the previous section\
    \ by creating a new Facebook app. The final pair represents the permission name\
    \ that is requested, which will be `email` in the example project.\n\n```\nACAccountStore\
    \ *accountStore = [[ACAccountStore alloc] init];\nACAccountType *facebookAccountType\
    \ = [accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierFacebook];\n\
    NSDictionary *options = @{\n    ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n\
    \    ACFacebookAppIdKey : @\"165243936994502\",\n    ACFacebookPermissionsKey\
    \ : @[@\"email\"]};\n```\n\nOnce the parameters have been configured, the call\
    \ can be executed:\n\n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:options completion:^(BOOL granted, NSError *error){}];\n```\n\nThe user\
    \ will then be prompted to grant basic profile access for your app, as seen in\
    \ Figure [13-6](#A978-1-4302-4906-1_13_Chapter.html#Fig6).\n\n![A978-1-4302-4906-1_13_Fig6_HTML.jpg](A978-1-4302-4906-1_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6. UFOs requesting basic profile access to a Facebook account\n\n\
    Since basic permissions need to first be granted before the app can request additional\
    \ permissions, the request for publish-to-stream permission can be requested in\
    \ response to the user granting access to the basic profile. Modify the previous\
    \ block from the basic permission request to allow for publishing to the user’s\
    \ stream, as seen in the following code sample.\n\n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:options completion:^(BOOL granted, NSError *error)\n{\n    if (granted)\n\
    \    {\n        NSLog(@\"Basic access granted\");\n        NSDictionary *secondOptions\
    \ = @{\n            ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n    \
    \        ACFacebookAppIdKey : @\"165243936994502\",\n            ACFacebookPermissionsKey\
    \ : @[@\"publish_stream\"]};\n        [accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:secondOptions\n            completion:^(BOOL granted, NSError *error)\n\
    \            {\n                if (granted)\n                {\n            \
    \        NSLog(@\"Extended access granted\");\n                    NSArray *accounts\
    \ = [accountStore accountsWithAccountType:facebookAccountType];\n            \
    \        self.facebookAccount = [accounts lastObject];\n                    [self\
    \ performSelectorOnMainThread:@selector(postFromFacebook) withObject:nil\n   \
    \                     waitUntilDone:NO];\n                }\n                else\n\
    \                {\n                    [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
    \ withObject:error\n                        waitUntilDone:NO];\n             \
    \   }\n            }];\n    }\n    else\n    {\n        NSLog(@\"Basic access\
    \ denied: %@\", [error localizedDescription]);\n    }}];\n```\n\nOnce basic access\
    \ has been granted, a second request is created in the same way as the initial\
    \ permission request, with a single change. Instead of requesting `email` access,\
    \ we will request access to `publish_stream`; this will allow your app to post\
    \ on behalf of the user. The remainder of the code handles failures and informs\
    \ the user; remember that `UIAlert`s cannot be displayed from a block, so they\
    \ will need to be called on the main thread. Once the user has granted access\
    \ for your app the first time, they will not need to do so again unless they specifically\
    \ remove permissions at a later time."
  raw: '## Facebook Permissions


    Facebook has a stacked system of permissions for accessing and posting data. This
    means that in order to access high-level permissions like posting, you first need
    lower-level permissions such as reading.


    The first set of permissions that needs to be requested are the general profile
    read permissions, which allow the app to read basic user profile info such as
    name, email, and friends list. There is an additional permission needed to read
    wall posts, and even more permissions are required to make a post.


    To add to the complexity, basic read permissions need to be authorized before
    additional permissions can be requested. It is not possible to group all permissions
    together into a single call. The result of this is that to post to the user’s
    timeline, two separate permissions need to be requested.


    Note


    Throughout this sample project, the Facebook ID for UFOs (165243936994502) is
    used; make sure that this value is correctly changed to the Facebook ID for your
    app during development.


    The first set of permissions that is requested is the basic profile reading access
    group. Requesting any of the basic attribute fields will grant access to the entire
    basic profile. In the following example the `email` property is requested. Once
    a user has approved reading the `email` property, the app will also gain access
    to read all basic profile info as well as the friends list.


    A new `ACAccountStore` will need to be allocated and initialized, and a new `ACAccountType`
    with the identifier `ACAccountTypeIdentifierFacebook` is created. This will inform
    the API that you will be working with a Facebook account.


    An `options` dictionary is created next; it will contain three key/value pairs.
    The first is the `audience` key; while the value is not crucial for this step,
    since we aren’t posting new data, we specify `ACFacebookAudienceEveryone`. The
    next value is the App ID, which was established in the previous section by creating
    a new Facebook app. The final pair represents the permission name that is requested,
    which will be `email` in the example project.


    `ACAccountStore *accountStore = [[ACAccountStore alloc] init];`


    `ACAccountType *facebookAccountType = [accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierFacebook];`


    `NSDictionary *options = @{`


    `ACFacebookAudienceKey : ACFacebookAudienceEveryone,`


    `ACFacebookAppIdKey : @"165243936994502",`


    `ACFacebookPermissionsKey : @[@"email"]};`


    Once the parameters have been configured, the call can be executed:


    `[accountStore requestAccessToAccountsWithType:facebookAccountType options:options
    completion:^(BOOL granted, NSError *error){}];`


    The user will then be prompted to grant basic profile access for your app, as
    seen in Figure [13-6](#A978-1-4302-4906-1_13_Chapter.html#Fig6).


    ![A978-1-4302-4906-1_13_Fig6_HTML.jpg](A978-1-4302-4906-1_13_Fig6_HTML.jpg)


    Figure 13-6.


    UFOs requesting basic profile access to a Facebook account


    Since basic permissions need to first be granted before the app can request additional
    permissions, the request for publish-to-stream permission can be requested in
    response to the user granting access to the basic profile. Modify the previous
    block from the basic permission request to allow for publishing to the user’s
    stream, as seen in the following code sample.


    `[accountStore requestAccessToAccountsWithType:facebookAccountType options:options
    completion:^(BOOL granted, NSError *error)`


    `{`


    `if (granted)`


    `{`


    `NSLog(@"Basic access granted");`


    `NSDictionary *secondOptions = @{`


    `ACFacebookAudienceKey : ACFacebookAudienceEveryone,`


    `ACFacebookAppIdKey : @"165243936994502",`


    `ACFacebookPermissionsKey : @[@"publish_stream"]};`


    `[accountStore requestAccessToAccountsWithType:facebookAccountType options:secondOptions`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `if (granted)`


    `{`


    `NSLog(@"Extended access granted");`


    `NSArray *accounts = [accountStore accountsWithAccountType:facebookAccountType];`


    `self.facebookAccount = [accounts lastObject];`


    `[self performSelectorOnMainThread:@selector(postFromFacebook) withObject:nil`


    `waitUntilDone:NO];`


    `}`


    `else`


    `{`


    `[self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:error`


    `waitUntilDone:NO];`


    `}`


    `}];`


    `}`


    `else`


    `{`


    `NSLog(@"Basic access denied: %@", [error localizedDescription]);`


    `}}];`


    Once basic access has been granted, a second request is created in the same way
    as the initial permission request, with a single change. Instead of requesting
    email access, we will request access to `publish_stream`; this will allow your
    app to post on behalf of the user. The remainder of the code handles failures
    and informs the user; remember that UIAlerts cannot be displayed from a block,
    so they will need to be called on the main thread. Once the user has granted access
    for your app the first time, they will not need to do so again unless they specifically
    remove permissions at a later time.'
  trans: "\n# Facebook 权限\n\nFacebook 有一套分层的权限系统，用于访问和发布数据。这意味着，为了获取像发布内容这样的高级权限，你需要先拥有读取等低级权限。\n\
    \n第一组需要请求的权限是通用的个人资料读取权限，这些权限允许应用读取用户的基本个人资料信息，例如姓名、电子邮件和好友列表。还有一个额外的权限用于读取个人主页动态，而要发布动态则需要更多权限。\n\
    \n更为复杂的是，在请求额外权限之前，必须首先获得基本读取权限的授权。无法将所有权限合并到单个调用中。因此，要在用户的时间线上发布内容，需要分别请求两个独立的权限。\n\
    \n**注意**\n\n在本示例项目中，使用了 UFO 的 Facebook ID（`165243936994502`）；在开发过程中，请务必将此值正确更改为你应用的\
    \ Facebook ID。\n\n第一组被请求的权限是基本个人资料读取权限组。请求任何基本属性字段都将授予对整个基本个人资料的访问权限。在下面的示例中，请求了\
    \ `email` 属性。一旦用户批准读取 `email` 属性，应用也将获得读取所有基本个人资料信息以及好友列表的权限。\n\n需要分配并初始化一个新的\
    \ `ACAccountStore`，并创建一个标识符为 `ACAccountTypeIdentifierFacebook` 的新 `ACAccountType`。这将通知\
    \ API 你将要使用 Facebook 账户进行操作。\n\n接下来创建一个 `options` 字典；它将包含三对键/值。第一个是 `audience`\
    \ 键；由于我们此时不会发布新数据，因此该值在这一步骤中并不关键，我们指定为 `ACFacebookAudienceEveryone`。下一个值是应用 ID，这在之前通过创建新的\
    \ Facebook 应用时已确定。最后一对代表请求的权限名称，在示例项目中将是 `email`。\n\n```\nACAccountStore *accountStore\
    \ = [[ACAccountStore alloc] init];\nACAccountType *facebookAccountType = [accountStore\
    \ accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierFacebook];\nNSDictionary\
    \ *options = @{\n    ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n   \
    \ ACFacebookAppIdKey : @\"165243936994502\",\n    ACFacebookPermissionsKey : @[@\"\
    email\"]};\n```\n\n参数配置完成后，就可以执行调用：\n\n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:options completion:^(BOOL granted, NSError *error){}];\n```\n\n接着，系统会提示用户为你的应用授予基本个人资料访问权限，如图\
    \ 13-6 所示。\n\n![A978-1-4302-4906-1_13_Fig6_HTML.jpg](img/A978-1-4302-4906-1_13_Fig6_HTML.jpg)\n\
    \n图 13-6. UFO 请求对 Facebook 账户的基本个人资料访问权限\n\n由于在应用可以请求额外权限之前，需要先获得基本权限的授权，因此可以在用户授予基本个人资料访问权限的响应中，请求发布动态的权限。修改前面基本权限请求的代码块，以允许向用户动态发布内容，如下代码示例所示。\n\
    \n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType options:options\
    \ completion:^(BOOL granted, NSError *error)\n{\n    if (granted)\n    {\n   \
    \     NSLog(@\"基本访问权限已授予\");\n        NSDictionary *secondOptions = @{\n     \
    \       ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n            ACFacebookAppIdKey\
    \ : @\"165243936994502\",\n            ACFacebookPermissionsKey : @[@\"publish_stream\"\
    ]};\n        [accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:secondOptions\n            completion:^(BOOL granted, NSError *error)\n\
    \            {\n                if (granted)\n                {\n            \
    \        NSLog(@\"扩展访问权限已授予\");\n                    NSArray *accounts = [accountStore\
    \ accountsWithAccountType:facebookAccountType];\n                    self.facebookAccount\
    \ = [accounts lastObject];\n                    [self performSelectorOnMainThread:@selector(postFromFacebook)\
    \ withObject:nil\n                        waitUntilDone:NO];\n               \
    \ }\n                else\n                {\n                    [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
    \ withObject:error\n                        waitUntilDone:NO];\n             \
    \   }\n            }];\n    }\n    else\n    {\n        NSLog(@\"基本访问权限被拒绝: %@\"\
    , [error localizedDescription]);\n    }}];\n```\n\n一旦基本访问权限被授予，就会以与初始权限请求相同的方式创建第二个请求，但有一处更改。我们将请求\
    \ `publish_stream` 访问权限，而不是 `email`；这将允许你的应用代表用户发布内容。其余代码处理失败情况并通知用户；请记住，`UIAlert`\
    \ 不能从 block 中显示，因此需要在主线程上调用它们。一旦用户首次为你的应用授予了访问权限，除非他们以后特意移除权限，否则无需再次授予。\n"
- fmt: "# Custom Facebook Posts\n\nOnce permission has been granted to publish to\
    \ the user’s stream a custom post can be made. There are many circumstances where\
    \ it may be necessary to post to Facebook from a custom interface.\n\nUsing the\
    \ Accounts framework discussed in [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html),\
    \ with the user’s permission you can make post on their behalf with your own interface\
    \ or even with no interface at all. The Accounts approach is more complex that\
    \ the Facebook Composer but allows much more freedom.\n\n**Note:** Make sure to\
    \ include `Accounts.framework` and import `accounts/Accounts.h` when working with\
    \ custom status updates.\n\nBecause an `ACAccount` object was created when asking\
    \ for permission, a new object does not need to be created; however, you will\
    \ need a pointer to the account that was created while requesting permissions.\
    \ As Twitter did in [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html), Facebook\
    \ requires a different feed URL depending on whether the status update contains\
    \ media such as images or videos or if it contains only text. When you post status\
    \ updates that do not contain an image, the URL should be set to [`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed).\
    \ Otherwise, the URL needs to be set to [`https://graph.facebook.com/me/photos`](https://graph.facebook.com/me/photos).\
    \ Posting to the wrong URL will result in failure.\n\n```\nBOOL attachedImage\
    \ = YES;\nNSURL *feedURL = nil;\nif(attachedImage)\n{\n   feedURL = [NSURL URLWithString:\n\
    \     @\"https://graph.facebook.com/me/photos\"];\n}\nelse\n{\n   feedURL = [NSURL\
    \ URLWithString:\n     @\"https://graph.facebook.com/me/feed\"];\n}\n```\n\nOnce\
    \ the proper URL has been determined, the text for the message can be set. This\
    \ is done as part of the parameter dictionary. A new key named `message` is created,\
    \ and its value is set to the text that will be posted:\n\n```\nNSDictionary *parameters\
    \ = [NSDictionary dictionaryWithObject:[NSString stringWithFormat:\n   @\"I just\
    \ abducted %0.0f cow(s) in UFOs for iPhone!\", score] forKey:@\"message\"];\n\
    ```\n\nA new `SLRequest` object is created. The `SLRequest` object will contain\
    \ all the information required for interacting with the Facebook API and provides\
    \ a networking wrapper for those calls. The service type is specified as `SLServiceTypeFacebook`,\
    \ and the `requestMethod` is set to POST. The URL is set to the previously established\
    \ URL, depending on whether there is a media attachment, and finally the parameters\
    \ that were previously created are set:\n\n```\nSLRequest *feedRequest = [SLRequest\n\
    \   requestForServiceType:SLServiceTypeFacebook\n   requestMethod:SLRequestMethodPOST\n\
    \   URL:feedURL\n   parameters:parameters];\n```\n\nIf the status update contains\
    \ an attached image file, that image file will also need to be specified. The\
    \ image data is first converted to `NSData` in the form of a PNG representation.\
    \ It is then added to the `SLRequest` through the `addMultipartData:` method.\
    \ When adding an image, make sure the `withName` and type values appear exactly\
    \ as they are in the following code snippet. The `filename` property can be customized\
    \ to help identify the image.\n\n```\nif(attachedImage)\n{\n   NSData *imageData\
    \ = UIImagePNGRepresentation([UIImage\n      imageNamed:@\"Saucer1.png\"]);\n\
    \   [feedRequest addMultipartData:imageData\n      withName:@\"source\" type:@\"\
    multipart/form-data\"\n      filename:@\"Image\"];\n}\n```\n\nThe `account` property\
    \ of the `SLRequest` needs to be set to the previously authenticated account from\
    \ the section “Facebook Permissions.”\n\n```\nfeedRequest.account = self.facebookAccount;\n\
    ```\n\nOnce the `SLRequest` has been completely configured, it can then be sent\
    \ to Facebook’s servers for processing and posting. To post to Facebook, call\
    \ `performRequestWithHandler` on the `SLRequest` object. If the message is successfully\
    \ handled by Facebook, it will return a status code of 200. Any other status code\
    \ indicates a failure; a full list of possible HTTP response status codes can\
    \ be found at [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html).\n\
    \n```\n[feedRequest performRequestWithHandler:^(NSData *responseData,\n   NSHTTPURLResponse\
    \ *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post statusCode: %u\"\
    , [urlResponse statusCode]);\n   if([urlResponse statusCode] == 200)\n   {\n \
    \     [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n \
    \        withObject:@\"Your message has been posted to Facebook\" waitUntilDone:NO];\n\
    \   }\n   else if(error != nil)\n   {\n      [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n\
    \         withObject:error waitUntilDone:NO];\n   }\n}];\n```\n\nThe framework\
    \ does not provide any kind of user feedback upon a successful posting. The example\
    \ app provides the user with a `UIAlert` that informs them if the post was successful\
    \ or describes the error if one occurred. The result of a custom Facebook post\
    \ can be seen in Figure [13-7](#A978-1-4302-4906-1_13_Chapter.html#Fig7) as it\
    \ appears on the Facebook website. Note that the “posted via” line reflects the\
    \ app name set in the Facebook Developers Portal, while using the Composer simply\
    \ states “via iOS.”\n\n![A978-1-4302-4906-1_13_Fig7_HTML.jpg](A978-1-4302-4906-1_13_Fig7_HTML.jpg)\n\
    \n**Figure 13-7.** The result of a custom Facebook posting as seen from the Facebook\
    \ website\n\n## Going Further with Facebook\n\nPosting information to a user’s\
    \ wall will cover the use cases of most games, whether it is posting a score,\
    \ sharing a link to the game, or bragging about a reward. However, Facebook is\
    \ a huge social platform, which can handle many types of requests.\n\nFor example,\
    \ if you wanted to retrieve the user’s feed you could implement an `SLRequest`\
    \ in the following format. The Facebook Timeline is returned as a JSON object,\
    \ which is displayed in the console.\n\n```\nNSURL *feedURL = [NSURL URLWithString:@\"\
    https://graph.facebook.com/me/feed\"];\nSLRequest *feedRequest = [SLRequest\n\
    \   requestForServiceType:SLServiceTypeFacebook\n   requestMethod:SLRequestMethodGET\n\
    \   URL:feedURL\n   parameters:nil];\nfeedRequest.account = self.facebookAccount;\n\
    [feedRequest performRequestWithHandler:^(NSData *responseData,\n   NSHTTPURLResponse\
    \ *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post statusCode: %u\"\
    , [urlResponse statusCode]);\n   if([urlResponse statusCode] == 200)\n   {\n \
    \     NSLog(@\"Facebook Timeline: %@\", [[NSJSONSerialization JSONObjectWithData:responseData\n\
    \         options:NSJSONReadingMutableLeaves error:&error] objectForKey:@\"data\"\
    ]);\n   }\n}];\n```\n\nThere is a lot of flexibility and functionality in the\
    \ Facebook API, and it is updated more frequently than the iOS SDK. `SLRequest`\
    \ is a transparent wrapper class for interacting with the Facebook API, so any\
    \ changes that Facebook makes will be immediately available to you. A full list\
    \ of functions for Facebook can be found on its developer site at [`https://developers.facebook.com/docs/reference/api/`](https://developers.facebook.com/docs/reference/api/)."
  raw: '## Custom Facebook Posts


    Once permission has been granted to publish to the user’s stream a custom post
    can be made. There are many circumstances where it may be necessary to post to
    Facebook from a custom interface.


    Using the Accounts framework discussed in [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html),
    with the user’s permission you can make post on their behalf with your own interface
    or even with no interface at all. The Accounts approach is more complex that the
    Facebook Composer but allows much more freedom.


    Note


    Make sure to include `Accounts.framework` and import `accounts/Accounts.h` when
    working with custom status updates.


    Because an ACAccount object was created when asking for permission, a new object
    does not need to be created; however, you will need a pointer to the account that
    was created while requesting permissions. As Twitter did in [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html),
    Facebook requires a different feed URL depending on whether the status update
    contains media such as images or videos or if it contains only text. When you
    post status updates that do not contain an image, the URL should be set to [`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed)
    . Otherwise, the URL needs to be set to [`https://graph.facebook.com/me/photos`](https://graph.facebook.com/me/photos)
    . Posting to the wrong URL will result in failure.


    `BOOL attachedImage = YES;`


    `NSURL *feedURL = nil;`


    `if(attachedImage)`


    `{`


    `feedURL = [NSURL URLWithString:`


    `@"` [`https://graph.facebook.com/me/photos`](https://graph.facebook.com/me/photos)
    `"];`


    `}`


    `else`


    `{`


    `feedURL = [NSURL URLWithString:`


    `@"` [`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed)
    `"];`


    `}`


    Once the proper URL has been determined, the text for the message can be set.
    This is done as part of the parameter dictionary. A new key named `message` is
    created, and its value is set to the text that will be posted:


    `NSDictionary *parameters = [NSDictionary dictionaryWithObject:[NSString stringWithFormat:
    @"I just abducted %0.0f cow(s) in UFOs for iPhone!", score] forKey:@"message"];`


    A new `SLRequest` object is created. The `SLRequest` object will contain all the
    information required for interacting with the Facebook API and provides a networking
    wrapper for those calls. The service type is specified as `SLServiceTypeFacebook`,
    and the `requestMethod` is set to POST. The URL is set to the previously established
    URL, depending on whether there is a media attachment, and finally the parameters
    that were previously created are set:


    `SLRequest *feedRequest = [SLRequest`


    `requestForServiceType:SLServiceTypeFacebook`


    `requestMethod:SLRequestMethodPOST`


    `URL:feedURL`


    `parameters:parameters];`


    If the status update contains an attached image file, that image file will also
    need to be specified. The image data is first converted to NSData in the form
    of a PNG representation. It is then added to the `SLRequest` through the `addMultipartData:`
    method. When adding an image, make sure the `withName` and type values appear
    exactly as they are in the following code snippet. The `filename` property can
    be customized to help identify the image.


    `if(attachedImage)`


    `{`


    `NSData *imageData = UIImagePNGRepresentation([UIImage`


    `imageNamed:@"Saucer1.png"]);`


    `[feedRequest addMultipartData:imageData`


    `withName:@"source" type:@"multipart/form-data"`


    `filename:@"Image"];`


    `}`


    The `account` property of the SLRequest needs to be set to the previously authenticated
    account from the section “Facebook Permissions.”


    `feedRequest.account = self.facebookAccount;`


    Once the `SLRequest` has been completely configured, it can then be sent to Facebook’s
    servers for processing and posting. To post to Facebook, call `performRequestWithHandler`
    on the `SLRequest` object. If the message is successfully handled by Facebook,
    it will return a status code of 200\. Any other status code indicates a failure;
    a full list of possible HTTP response status codes can be found at [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)
    .


    `[feedRequest performRequestWithHandler:^(NSData *responseData,`


    `NSHTTPURLResponse *urlResponse, NSError *error)`


    `{`


    `NSLog(@"Facebook post statusCode: %u", [urlResponse statusCode]);`


    `if([urlResponse statusCode] == 200)`


    `{`


    `[self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:@"Your`


    `message has been posted to Facebook" waitUntilDone:NO];`


    `}`


    `else if(error != nil)`


    `{`


    `[self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:error`


    `waitUntilDone:NO];`


    `}`


    `}];`


    The framework does not provide any kind of user feedback upon a successful posting.
    The example app provides the user with a UIAlert that informs them if the post
    was successful or describes the error if one occurred. The result of a custom
    Facebook post can be seen in Figure [13-7](#A978-1-4302-4906-1_13_Chapter.html#Fig7)
    as it appears on the Facebook website. Note that the “posted via” line reflects
    the app name set in the Facebook Developers Portal, while using the Composer simply
    states “via iOS.”


    ![A978-1-4302-4906-1_13_Fig7_HTML.jpg](A978-1-4302-4906-1_13_Fig7_HTML.jpg)


    Figure 13-7.


    The result of a custom Facebook posting as seen from the Facebook website


    ## Going Further with Facebook


    Posting information to a user’s wall will cover the use cases of most games, whether
    it is posting a score, sharing a link to the game, or bragging about a reward.
    However, Facebook is a huge social platform, which can handle many types of requests.


    For example, if you wanted to retrieve the user’s feed you could implement an
    `SLRequest` in the following format. The Facebook Timeline is returned as a JSON
    object, which is displayed in the console.


    `NSURL *feedURL = [NSURL URLWithString:@"` [`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed)
    `"];`


    `SLRequest *feedRequest = [SLRequest`


                                  `requestForServiceType:SLServiceTypeFacebook`


                                  `requestMethod:SLRequestMethodGET`


                                  `URL:feedURL`


                                  `parameters:nil];`


        `feedRequest.account = self.facebookAccount;`


        `[feedRequest performRequestWithHandler:^(NSData *responseData,`


                                                 `NSHTTPURLResponse *urlResponse,
    NSError *error)`


         `{`


        `NSLog(@"Facebook post statusCode: %u", [urlResponse statusCode]);`


        `if([urlResponse statusCode] == 200)`


        `{`


            `NSLog(@"Facebook Timeline: [NSJSONSerialization JSONObjectWithData:responseData`


            `options:NSJSONReadingMutableLeaves error:&error] objectForKey:@"data"]);`


        `}`


    `}];`


    There is a lot of flexibility and functionality in the Facebook API, and it is
    updated more frequently than the iOS SDK. `SLRequest` is a transparent wrapper
    class for interacting with the Facebook API, so any changes that Facebook makes
    will be immediately available to you. A full list of functions for Facebook can
    be found on its developer site at [`https://developers.facebook.com/docs/reference/api/`](https://developers.facebook.com/docs/reference/api/)
    .'
  trans: "\n# 自定义 Facebook 帖子\n\n在获得向用户信息流发布内容的权限后，即可创建自定义帖子。许多场景下，可能需要通过自定义界面来发布帖子到\
    \ Facebook。\n\n使用第 12 章讨论的 Accounts 框架，在获得用户许可后，你可以通过自己的界面（甚至无需界面）代表他们发布内容。Accounts\
    \ 方法比 Facebook Composer 更复杂，但提供了更大的自由度。\n\n**注意：** 在处理自定义状态更新时，请确保包含`Accounts.framework`并导入`accounts/Accounts.h`。\n\
    \n因为在请求权限时已创建了`ACAccount`对象，所以无需再创建新对象；但你需要一个指向在请求权限时所创建账户的指针。与第 12 章中的 Twitter\
    \ 类似，Facebook 根据状态更新是否包含媒体（如图像或视频）或仅包含文本，要求使用不同的信息流 URL。当发布不包含图像的状态更新时，URL 应设置为[`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed)。否则，URL\
    \ 需要设置为[`https://graph.facebook.com/me/photos`](https://graph.facebook.com/me/photos)。将帖子发布到错误的\
    \ URL 会导致失败。\n\n```\nBOOL attachedImage = YES;\nNSURL *feedURL = nil;\nif(attachedImage)\n\
    {\n   feedURL = [NSURL URLWithString:\n     @\"https://graph.facebook.com/me/photos\"\
    ];\n}\nelse\n{\n   feedURL = [NSURL URLWithString:\n     @\"https://graph.facebook.com/me/feed\"\
    ];\n}\n```\n\n一旦确定了正确的 URL，就可以设置消息的文本。这是作为参数字典的一部分完成的。创建一个名为`message`的新键，并将其值设置为要发布的文本：\n\
    \n```\nNSDictionary *parameters = [NSDictionary dictionaryWithObject:[NSString\
    \ stringWithFormat:\n   @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\"\
    , score] forKey:@\"message\"];\n```\n\n创建一个新的`SLRequest`对象。`SLRequest`对象将包含与 Facebook\
    \ API 交互所需的所有信息，并为这些调用提供网络封装。服务类型指定为`SLServiceTypeFacebook`，`requestMethod`设置为\
    \ POST。URL 根据是否有媒体附件设置为先前确定的 URL，最后设置先前创建的参数：\n\n```\nSLRequest *feedRequest =\
    \ [SLRequest\n   requestForServiceType:SLServiceTypeFacebook\n   requestMethod:SLRequestMethodPOST\n\
    \   URL:feedURL\n   parameters:parameters];\n```\n\n如果状态更新包含附加的图像文件，还需要指定该图像文件。图像数据首先以\
    \ PNG 表示形式转换为`NSData`。然后通过`addMultipartData:`方法将其添加到`SLRequest`中。添加图像时，请确保`withName`和`type`的值与以下代码片段中的完全一致。`filename`属性可以自定义以帮助识别图像。\n\
    \n```\nif(attachedImage)\n{\n   NSData *imageData = UIImagePNGRepresentation([UIImage\n\
    \      imageNamed:@\"Saucer1.png\"]);\n   [feedRequest addMultipartData:imageData\n\
    \      withName:@\"source\" type:@\"multipart/form-data\"\n      filename:@\"\
    Image\"];\n}\n```\n\n`SLRequest`的`account`属性需要设置为在“Facebook 权限”部分中先前认证的账户。\n\n\
    ```\nfeedRequest.account = self.facebookAccount;\n```\n\n一旦`SLRequest`完全配置完毕，就可以将其发送到\
    \ Facebook 的服务器进行处理和发布。要发布到 Facebook，请在`SLRequest`对象上调用`performRequestWithHandler`。如果消息被\
    \ Facebook 成功处理，它将返回状态码 200。任何其他状态码表示失败；完整的 HTTP 响应状态码列表可在[`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)找到。\n\
    \n```\n[feedRequest performRequestWithHandler:^(NSData *responseData,\n   NSHTTPURLResponse\
    \ *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post statusCode: %u\"\
    , [urlResponse statusCode]);\n   if([urlResponse statusCode] == 200)\n   {\n \
    \     [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n \
    \        withObject:@\"Your message has been posted to Facebook\" waitUntilDone:NO];\n\
    \   }\n   else if(error != nil)\n   {\n      [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n\
    \         withObject:error waitUntilDone:NO];\n   }\n}];\n```\n\n该框架在成功发布后不提供任何用户反馈。示例应用为用户提供了一个`UIAlert`，告知他们帖子是否成功，或描述发生的错误。自定义\
    \ Facebook 帖子的结果如图 13-7 所示，该图显示在 Facebook 网站上。请注意，“通过...发布”一行显示的是在 Facebook 开发者门户中设置的应用名称，而使用\
    \ Composer 则仅显示“通过 iOS”。\n\n![A978-1-4302-4906-1_13_Fig7_HTML.jpg](img/A978-1-4302-4906-1_13_Fig7_HTML.jpg)\n\
    \n**图 13-7.** 在 Facebook 网站上看到的自定义 Facebook 帖子结果\n\n## 进一步探索 Facebook\n\n将信息发布到用户主页时间线可以满足大多数游戏的使用场景，无论是发布分数、分享游戏链接，还是炫耀奖励。然而，Facebook\
    \ 是一个庞大的社交平台，可以处理多种类型的请求。\n\n例如，如果你想获取用户的信息流，你可以按以下格式实现一个`SLRequest`。Facebook\
    \ 时间线以 JSON 对象的形式返回，并显示在控制台中。\n\n```\nNSURL *feedURL = [NSURL URLWithString:@\"\
    https://graph.facebook.com/me/feed\"];\nSLRequest *feedRequest = [SLRequest\n\
    \   requestForServiceType:SLServiceTypeFacebook\n   requestMethod:SLRequestMethodGET\n\
    \   URL:feedURL\n   parameters:nil];\nfeedRequest.account = self.facebookAccount;\n\
    [feedRequest performRequestWithHandler:^(NSData *responseData,\n   NSHTTPURLResponse\
    \ *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post statusCode: %u\"\
    , [urlResponse statusCode]);\n   if([urlResponse statusCode] == 200)\n   {\n \
    \     NSLog(@\"Facebook Timeline: %@\", [[NSJSONSerialization JSONObjectWithData:responseData\n\
    \         options:NSJSONReadingMutableLeaves error:&error] objectForKey:@\"data\"\
    ]);\n   }\n}];\n```\n\nFacebook API 具有极大的灵活性和功能，并且其更新频率高于 iOS SDK。`SLRequest`是一个透明的封装类，用于与\
    \ Facebook API 交互，因此 Facebook 所做的任何更改都会立即可用。Facebook 的完整功能列表可在其开发者网站上找到：[`https://developers.facebook.com/docs/reference/api/`](https://developers.facebook.com/docs/reference/api/)。\n"
- fmt: "# Summary\n\nThis chapter introduced the Facebook functionality added in iOS\
    \ 6. We began with a background in Facebook and an explanation of how it integrates\
    \ into the core system, and moved into interacting with the Facebook API. We also\
    \ covered the Facebook Composer, walking through the process of quickly and easily\
    \ adding Facebook posting support to your app. Finally, the chapter demonstrated\
    \ the process of creating a Facebook app through the developer portal and requesting\
    \ the required permissions to read and post to a user’s timeline.\n\nYou should\
    \ now be entirely comfortable with posting status updates to Facebook using either\
    \ the built-in Composer or a custom interface. You should also now have a firm\
    \ understanding of using the Facebook API to implement more advanced features.\n\
    \n# 14. AirPlay\n\n## Abstract\n\nAirPlay, introduced as part of iOS 4.3 and greatly\
    \ enhanced in iOS 5.0, allows for the sharing of audio or visual information with\
    \ compatible devices. These devices are most commonly the Apple TV for video and\
    \ audio and AirPlay-enabled sound systems for music playback.\n\nThis chapter\
    \ will cover working with AirPlay audio as well as handling mirroring and second-screen\
    \ technology. Starting with iOS 5.0, AirPlay buttons are available on any video\
    \ or audio playback on your app using `MPMoviePlayerController` or `UIWebViews`.\n\
    \nApple has made AirPlay one of the easiest technologies to use on the iOS platform.\
    \ Under most circumstances supporting AirPlay in your apps will require no additional\
    \ code, and even in the most complex circumstances AirPlay will require only a\
    \ few lines of code.\n\n## AirPlay for Built-In Players\n\nThree classes natively\
    \ support AirPlay output: `AVPlayer`, `MPMoviePlayerController`, and `UIWebView`.\
    \ AirPlay is on by default when playing media content; however, for copyright\
    \ or other reasons it may be necessary to modify this default behavior.\n\nAn\
    \ `AVPlayer` object has a property `allowsAirPlayVideo`, which accepts a Boolean\
    \ value to determine whether it presents the controls for AirPlay output. Likewise,\
    \ the `MPMoviePlayerController` class has a similar property, named `allowsAirPlay`.\
    \ Finally, a `UIWebView` uses the property `mediaPlaybackAllowsAirPlay`. When\
    \ disabling or enabling AirPlay in a `UIWebview`, be mindful of the content, which\
    \ can specifically disable AirPlay.\n\n> **Note:** AirPlay does not work in the\
    \ iOS Simulator; additionally, the AirPlay controls will show up only when a local\
    \ AirPlay device, such as an Apple TV, is available.\n\n### MPNowPlayingInfoCenter\n\
    \nMany AirPlay-enabled sound systems support metadata for the currently playing\
    \ item; this is often an LCD display that shows information such as song name\
    \ and artist. AirPlay allows this information to be set using the `MPNowPlayingInfoCenter`\
    \ class; this metadata can be set for display where applicable.\n\n```\nMPNowPlayingInfoCenter\
    \ *center = [MPNowPlayingInfoCenter defaultCenter];\n\nNSDictionary *songInfo\
    \ = [NSDictionary dictionaryWithObjectsAndKeys:\n    @\"Counting Crows\", MPMediaItemPropertyArtist,\n\
    \    @\"Rain King\", MPMediaItemPropertyTitle,\n    @\"August and Everything After\"\
    , MPMediaItemPropertyAlbumTitle, nil];\n\ncenter.nowPlayingInfo = songInfo;\n\
    ```\n\nThe physical device handling the playback determines which items are shown\
    \ on its display; however, the `MPNowPlayingInfoCenter` class provides optional\
    \ values for several items, which are detailed in Table 14-1.\n\n**Table 14-1.**\
    \ Available Constants for `MPNowPlayingInfoCenter` When Setting Metadata\n\n|\
    \ Constant | Description |\n| --- | --- |\n| `MPMediaItemPropertyAlbumTitle` |\
    \ An `NSString` representing the name of the album. |\n| `MPMediaItemPropertyAlbumTrackCount`\
    \ | An `NSNumber` representing the total number of tracks. |\n| `MPMediaItemPropertyAlbumTrackNumber`\
    \ | An `NSNumber` representing the current track number. |\n| `MPMediaItemPropertyArtist`\
    \ | An `NSString` representing the name of the artist. |\n| `MPMediaItemPropertyArtwork`\
    \ | An instance of `MPMediaItemArtwork` representing the artwork for the item\
    \ that is playing. |\n| `MPMediaItemPropertyComposer` | An `NSString` representing\
    \ the name of the composer. |\n| `MPMediaItemPropertyDiscCount` | An `NSNumber`\
    \ representing the total number of discs. |\n| `MPMediaItemPropertyDiscNumber`\
    \ | An `NSNumber` representing the current disc number. |\n| `MPMediaItemPropertyGenre`\
    \ | An `NSString` representing the name of the genre. |\n| `MPMediaItemPropertyPersistentID`\
    \ | An `NSNumber` which indicates the item being played. This identifier persist\
    \ across launches, but may be reset when syncing. |\n| `MPMediaItemPropertyPlaybackDuration`\
    \ | An `NSNumber` representing a `NSTimeInterval` in seconds for the current playback\
    \ duration. |\n| `MPMediaItemPropertyTitle` | An `NSString` representing the name\
    \ of the item being played, such as the filename. |\n\n### Responding to Remote\
    \ Events\n\nWhen AirPlay is playing back media, it is very likely that the device\
    \ handling output of the media can also accept user input such as changing tracks,\
    \ pausing, skipping, or scanning. It is important that your app responds to and\
    \ properly handles these events. Your app must first make the OS aware that it\
    \ is interested in receiving these notifications; this can be done by calling\
    \ `beginRecievingRemoteControlEvents` on the `UIApplication` singleton:\n\n```\n\
    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents];\n```\n\n\
    It is also important to remember to stop receiving notifications when your app\
    \ is no longer interested in them; to do this, call another method, `endReceivingRemoteControlEvents`,\
    \ as shown here:\n\n```\n[[UIApplication sharedApplication] endReceivingRemoteControlEvents];\n\
    ```\n\nThere are twelve types of events that your app can be notified about. When\
    \ these events occur, a call to `remoteControlReceivedWithEvent:` is processed.\
    \ The following example shows how to handle some of these events:\n\n```\n- (void)\
    \ remoteControlReceivedWithEvent: (UIEvent *) receivedEvent\n{\n    if (receivedEvent.type\
    \ == UIEventTypeRemoteControl)\n    {\n        switch (receivedEvent.subtype)\n\
    \        {\n            case UIEventSubtypeRemoteControlPlay:\n              \
    \  [self play];\n                break;\n            case UIEventSubtypeRemoteControlPause:\n\
    \                [self pause];\n                break;\n            case UIEventSubtypeRemoteControlNextTrack:\n\
    \                [self nextTrack];\n                break;\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
    \                [self previousTrack];\n                break;\n        }\n  \
    \  }\n}\n```"
  raw: '## Summary


    This chapter introduced the Facebook functionality added in iOS 6\. We began with
    a background in Facebook and an explanation of how it integrates into the core
    system, and moved into interacting with the Facebook API. We also covered the
    Facebook Composer, walking through the process of quickly and easily adding Facebook
    posting support to your app. Finally, the chapter demonstrated the process of
    creating a Facebook app through the developer portal and requesting the required
    permissions to read and post to a user’s timeline.


    You should now be entirely comfortable with posting status updates to Facebook
    using either the built-in Composer or a custom interface. You should also now
    have a firm understanding of using the Facebook API to implement more advanced
    features.


    # 14. AirPlay


    Abstract


    AirPlay, introduced as part of iOS 4.3 and greatly enhanced in iOS 5.0, allows
    for the sharing of audio or visual information with compatible devices. These
    devices are most commonly the Apple TV for video and audio and AirPlay-enabled
    sound systems for music playback.


    AirPlay, introduced as part of iOS 4.3 and greatly enhanced in iOS 5.0, allows
    for the sharing of audio or visual information with compatible devices. These
    devices are most commonly the Apple TV for video and audio and AirPlay-enabled
    sound systems for music playback.


    This chapter will cover working with AirPlay audio as well as handling mirroring
    and second-screen technology. Starting with iOS 5.0, AirPlay buttons are available
    on any video or audio playback on your app using `MPMoviePlayerController` or
    `UIWebViews`.


    Apple has made AirPlay one of the easiest technologies to use on the iOS platform.
    Under most circumstances supporting AirPlay in your apps will require no additional
    code, and even in the most complex circumstances AirPlay will require only a few
    lines of code.


    ## AirPlay for Built-In Players


    Three classes natively support AirPlay output: `AVPlayer`, `MPMoviePlayerController`,
    and `UIWebView`. AirPlay is on by default when playing media content; however,
    for copyright or other reasons it may be necessary to modify this default behavior.


    An `AVPlayer` object has a property `allowsAirPlayVideo`, which accepts a Boolean
    value to determine whether it presents the controls for AirPlay output. Likewise,
    the `MPMoviePlayerController` class has a similar property, named `allowsAirPlay`.
    Finally, a `UIWebView` uses the property `mediaPlaybackAllowsAirPlay`. When disabling
    or enabling AirPlay in a `UIWebview`, be mindful of the content, which can specifically
    disable AirPlay.


    Note


    AirPlay does not work in the iOS Simulator; additionally, the AirPlay controls
    will show up only when a local AirPlay device, such as an Apple TV, is available.


    ### MPNowPlayingInfoCenter


    Many AirPlay-enabled sound systems support metadata for the currently playing
    item; this is often an LCD display that shows information such as song name and
    artist. AirPlay allows this information to be set using the `MPNowPlayingInfoCenter`
    class; this metadata can be set for display where applicable.


    `MPNowPlayingInfoCenter *center = [MPNowPlayingInfoCenter defaultCenter];`


    `NSDictionary *songInfo = [NSDictionary dictionaryWithObjectsAndKeys:`


    `@"Counting Crows", MPMediaItemPropertyArtist,`


    `@"Rain King", MPMediaItemPropertyTitle,`


    `@"August and Everything After", MPMediaItemPropertyAlbumTitle, nil];`


    `center.nowPlayingInfo = songInfo;`


    The physical device handling the playback determines which items are shown on
    its display; however, the `MPNowPlayingInfoCenter` class provides optional values
    for several items, which are detailed in Table [14-1](#A978-1-4302-4906-1_14_Chapter.html#Tab1)
    .


    Table 14-1.


    Available Constants for `MPNowPlayingInfoCenter` When Setting Metadata


    | Constant | Description |

    | --- | --- |

    | `MPMediaItemPropertyAlbumTitle` | An `NSString` representing the name of the
    album. |

    | `MPMediaItemPropertyAlbumTrackCount` | An `NSNumber` representing the total
    number of tracks. |

    | `MPMediaItemPropertyAlbumTrackNumber` | An `NSNumber` representing the current
    track number. |

    | `MPMediaItemPropertyArtist` | An `NSString` representing the name of the artist.
    |

    | `MPMediaItemPropertyArtwork` | An instance of `MPMediaItemArtwork` representing
    the artwork for the item that is playing. |

    | `MPMediaItemPropertyComposer` | An `NSString` representing the name of the composer.
    |

    | `MPMediaItemPropertyDiscCount` | An `NSNumber` representing the total number
    of discs. |

    | `MPMediaItemPropertyDiscNumber` | An `NSNumber` representing the current disc
    number. |

    | `MPMediaItemPropertyGenre` | An `NSString` representing the name of the genre.
    |

    | `MPMediaItemPropertyPersistentID` | An `NSNumber` which indicates the item being
    played. This identifier persist across launches, but may be reset when syncing.
    |

    | `MPMediaItemPropertyPlaybackDuration` | An `NSNumber` representing a `NSTimeInterval`
    in seconds for the current playback duration. |

    | `MPMediaItemPropertyTitle` | An `NSString` representing the name of the item
    being played, such as the filename. |


    ### Responding to Remote Events


    When AirPlay is playing back media, it is very likely that the device handling
    output of the media can also accept user input such as changing tracks, pausing,
    skipping, or scanning. It is important that your app responds to and properly
    handles these events. Your app must first make the OS aware that it is interested
    in receiving these notifications; this can be done by calling `beginRecievingRemoteControlEvents`
    on the `UIApplication` singleton:


    `[[UIApplication sharedApplication] beginReceivingRemoteControlEvents];`


    It is also important to remember to stop receiving notifications when your app
    is no longer interested in them; to do this, call another method, `endReceivingRemoteControlEvents`,
    as shown here:


    `[[UIApplication sharedApplication] endReceivingRemoteControlEvents];`


    There are twelve types of events that your app can be notified about. When these
    events occur, a call to `remoteControlReceivedWithEvent:` is processed. The following
    example shows how to handle some of these events:


    `- (void) remoteControlReceivedWithEvent: (UIEvent *) receivedEvent`


    `{`


        `if (receivedEvent.type == UIEventTypeRemoteControl)`


        `{`


            `switch (receivedEvent.subtype)`


            `{`


                `case UIEventSubtypeRemoteControlPlay:`


                    `[self play];`


                    `break;`


                `case UIEventSubtypeRemoteControlPause:`


                    `[self pause];`


                    `break;`


                `case UIEventSubtypeRemoteControlNextTrack:`


                    `[self nextTrack];`


                    `break;`


                `case UIEventSubtypeRemoteControlPreviousTrack:`


                    `[self previousTrack];`


                    `break;`


            `}`


        `}`


    `}`'
  trans: "\n# 摘要\n\n本章介绍了 iOS 6 中新增的 Facebook 功能。我们从 Facebook 的背景知识以及它如何集成到核心系统开始讲起，进而介绍了如何与\
    \ Facebook API 交互。我们还涵盖了 Facebook Composer，逐步讲解了如何快速简便地为你的应用添加 Facebook 发布支持。最后，本章演示了通过开发者门户创建\
    \ Facebook 应用，以及请求读取和发布到用户时间线所需权限的过程。\n\n你现在应该已经完全能够熟练使用内置的 Composer 或自定义界面来发布状态更新到\
    \ Facebook 了。同时，你也应该对如何使用 Facebook API 实现更高级的功能有了扎实的理解。\n\n# 14. AirPlay\n\n##\
    \ 简介\n\nAirPlay 作为 iOS 4.3 的一部分推出，并在 iOS 5.0 中得到了极大增强，它允许与兼容设备共享音频或视频信息。这些设备最常见的是用于视频和音频的\
    \ Apple TV，以及用于音乐播放的、支持 AirPlay 的音响系统。\n\n本章将介绍如何处理 AirPlay 音频，以及如何处理镜像和第二屏技术。从\
    \ iOS 5.0 开始，使用 `MPMoviePlayerController` 或 `UIWebViews` 的应用中，任何视频或音频播放界面上都可以使用\
    \ AirPlay 按钮。\n\nApple 让 AirPlay 成为了 iOS 平台上最容易使用的技术之一。在大多数情况下，在你的应用中支持 AirPlay\
    \ 无需额外编写代码，即使是在最复杂的情况下，也只需要几行代码。\n\n## 内置播放器的 AirPlay\n\n有三个类原生支持 AirPlay 输出：`AVPlayer`、`MPMoviePlayerController`\
    \ 和 `UIWebView`。在播放媒体内容时，AirPlay 默认是开启的；但是，出于版权或其他原因，可能需要修改这种默认行为。\n\n一个 `AVPlayer`\
    \ 对象有一个属性 `allowsAirPlayVideo`，它接受一个布尔值，用于决定是否显示 AirPlay 输出的控件。同样地，`MPMoviePlayerController`\
    \ 类有一个类似的属性，名为 `allowsAirPlay`。最后，`UIWebView` 使用属性 `mediaPlaybackAllowsAirPlay`。在\
    \ `UIWebview` 中禁用或启用 AirPlay 时，请注意内容，内容本身可以专门禁用 AirPlay。\n\n> **注：** AirPlay 在\
    \ iOS 模拟器中无法工作；此外，只有当本地 AirPlay 设备（例如 Apple TV）可用时，AirPlay 控件才会显示。\n\n### MPNowPlayingInfoCenter\n\
    \n许多支持 AirPlay 的音响系统支持当前播放项目的元数据；这通常是一个 LCD 显示屏，用于显示歌曲名称和艺术家等信息。AirPlay 允许使用 `MPNowPlayingInfoCenter`\
    \ 类来设置这些信息；可以在适用的地方设置这些元数据以供显示。\n\n```\nMPNowPlayingInfoCenter *center = [MPNowPlayingInfoCenter\
    \ defaultCenter];\n\nNSDictionary *songInfo = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \    @\"Counting Crows\", MPMediaItemPropertyArtist,\n    @\"Rain King\", MPMediaItemPropertyTitle,\n\
    \    @\"August and Everything After\", MPMediaItemPropertyAlbumTitle, nil];\n\n\
    center.nowPlayingInfo = songInfo;\n```\n\n处理播放的物理设备决定了在其显示器上显示哪些项目；然而，`MPNowPlayingInfoCenter`\
    \ 类为几个项目提供了可选值，详情见表 14-1。\n\n**表 14-1.** 设置元数据时 `MPNowPlayingInfoCenter` 的可用常量\n\
    \n| 常量 | 描述 |\n| --- | --- |\n| `MPMediaItemPropertyAlbumTitle` | 一个 `NSString`，表示专辑的名称。\
    \ |\n| `MPMediaItemPropertyAlbumTrackCount` | 一个 `NSNumber`，表示曲目的总数。 |\n| `MPMediaItemPropertyAlbumTrackNumber`\
    \ | 一个 `NSNumber`，表示当前的曲目编号。 |\n| `MPMediaItemPropertyArtist` | 一个 `NSString`，表示艺术家的名称。\
    \ |\n| `MPMediaItemPropertyArtwork` | 一个 `MPMediaItemArtwork` 实例，表示正在播放项目的插图。\
    \ |\n| `MPMediaItemPropertyComposer` | 一个 `NSString`，表示作曲家的名称。 |\n| `MPMediaItemPropertyDiscCount`\
    \ | 一个 `NSNumber`，表示光盘的总数。 |\n| `MPMediaItemPropertyDiscNumber` | 一个 `NSNumber`，表示当前的光盘编号。\
    \ |\n| `MPMediaItemPropertyGenre` | 一个 `NSString`，表示流派名称。 |\n| `MPMediaItemPropertyPersistentID`\
    \ | 一个 `NSNumber`，指示正在播放的项目。此标识符在多次启动之间持续存在，但在同步时可能会重置。 |\n| `MPMediaItemPropertyPlaybackDuration`\
    \ | 一个 `NSNumber`，表示当前播放时长的 `NSTimeInterval`（单位：秒）。 |\n| `MPMediaItemPropertyTitle`\
    \ | 一个 `NSString`，表示正在播放项目的名称（例如文件名）。 |\n\n### 响应远程事件\n\n当 AirPlay 正在播放媒体时，处理媒体输出的设备很可能也能接受用户输入，例如切换曲目、暂停、跳过或快进。你的应用响应并正确处理这些事件非常重要。你的应用必须首先让操作系统知道它有兴趣接收这些通知；这可以通过在\
    \ `UIApplication` 单例上调用 `beginRecievingRemoteControlEvents` 来完成：\n\n```\n[[UIApplication\
    \ sharedApplication] beginReceivingRemoteControlEvents];\n```\n\n同样重要的是，当你的应用不再对这些通知感兴趣时，要记得停止接收它们；为此，调用另一个方法\
    \ `endReceivingRemoteControlEvents`，如下所示：\n\n```\n[[UIApplication sharedApplication]\
    \ endReceivingRemoteControlEvents];\n```\n\n有十二种类型的事件可以通知到你的应用。当这些事件发生时，会调用 `remoteControlReceivedWithEvent:`\
    \ 进行处理。以下示例展示了如何处理其中一些事件：\n\n```\n- (void) remoteControlReceivedWithEvent: (UIEvent\
    \ *) receivedEvent\n{\n    if (receivedEvent.type == UIEventTypeRemoteControl)\n\
    \    {\n        switch (receivedEvent.subtype)\n        {\n            case UIEventSubtypeRemoteControlPlay:\n\
    \                [self play];\n                break;\n            case UIEventSubtypeRemoteControlPause:\n\
    \                [self pause];\n                break;\n            case UIEventSubtypeRemoteControlNextTrack:\n\
    \                [self nextTrack];\n                break;\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
    \                [self previousTrack];\n                break;\n        }\n  \
    \  }\n}\n```\n"
- fmt: "# Enabling AirPlay in an App\n\nIf your app is not using one of the three\
    \ supported AirPlay classes, you can still present the user with AirPlay options.\
    \ To show the AirPlay device picker, use the `MPVolumeView` class. In the following\
    \ code snippet the volume slider bar is hidden to show just the device picker;\
    \ however, there is no requirement to hide the volume slider. The results can\
    \ be seen in Figure [14-1](#A978-1-4302-4906-1_14_Chapter.html#Fig1).\n\n```\n\
    MPVolumeView *volumeView = [[MPVolumeView alloc] initWithFrame:\nCGRectMake(15,\
    \ 15, 0, 0)];\n[volumeView setShowsVolumeSlider:NO];\n[self.view addSubview: volumeView];\n\
    [volumeView release];\n```\n\n![A978-1-4302-4906-1_14_Fig1_HTML.jpg](A978-1-4302-4906-1_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. Enabling an AirPlay picker, seen in the upper left corner, by using\
    \ the `MPVolumeView` class\n\nNote: To use AirPlay classes, the app must first\
    \ import the required Media Player headers by using `#import <MediaPlayer/MediaPlayer.h>`\
    \ as well as the `MediaPlayer.Framework`.\n\nSystem sounds such as keyboard clicks\
    \ and alert noises are not sent through AirPlay speakers; if your app is using\
    \ system sounds in a significant manner, they should be played as part of your\
    \ app’s normal audio to be sent with AirPlay.\n\n## AirPlay Mirroring\n\nAs of\
    \ iOS 7, an app cannot enable AirPlay Mirroring on its own and must use the system\
    \ tools in order to enable it. However, no additional development needs to be\
    \ done in order to enable mirroring.\n\nIn iOS 7, bring up the control panel by\
    \ swiping up from the bottom of the screen and select the AirPlay button. You\
    \ will be given the option of selecting an AirPlay-enabled device. If the device\
    \ supports AirPlay Mirroring (such as an Apple TV), you will be presented with\
    \ a toggle switch to enable it (Figure [14-2](#A978-1-4302-4906-1_14_Chapter.html#Fig2)).\
    \ iOS 6 users should double-tap the Home button and swipe left in the fast app\
    \ switcher to arrive on the playback controls, where another swipe to the right\
    \ will bring up the AirPlay Controls, and you will be able to turn on AirPlay\
    \ Mirroring.\n\n![A978-1-4302-4906-1_14_Fig2_HTML.jpg](A978-1-4302-4906-1_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. Enabling AirPlay Mirroring on iOS 7 through the Control Center\n\
    \n## AirPlay for a Second Screen\n\nIt may be prudent for your app to display\
    \ different content on the iOS device and the AirPlay device. While the user will\
    \ still need to turn on AirPlay monitoring as described in the previous section,\
    \ you can display entirely different content for each screen. First a test can\
    \ be performed to determine if the second screen is available.\n\n```\nif ([[UIScreen\
    \ screens] count] > 1)\n```\n\nA reference to the second screen needs to be set\
    \ up, and a new window must be created. Each screen needs to have a dedicated\
    \ window available to it:\n\n```\nUIScreen *secondScreen = [[UIScreen screens]\
    \ objectAtIndex:1];\nCGRect screenBounds = secondScreen.bounds;\nUIWindow * secondWindow\
    \ = [[UIWindow alloc] initWithFrame:screenBounds];\nsecondWindow.screen = secondScreen;\n\
    ```\n\nThe new window is by default hidden; to view the window on the external\
    \ display we must first set its `hidden` property to NO:\n\n```\nsecondWindow.hidden\
    \ = NO;\n```\n\nIf this code were run now, the AirPlay screen would show a blank,\
    \ black view, because the second window doesn’t have any views to display. Using\
    \ UFOs as an example, we can present the game data to the second screen. Modify\
    \ the existing `playButtonPressed` method to match the following:\n\n```\n-(IBAction)playButtonPressed\n\
    {\n    if([self checkForExistingScreenAndInitializeIfPresent])\n    {\n      \
    \  //Using second screen\n    }\n    else\n    {\n        gameViewController =\
    \ [[UFOGameViewController alloc]  init];\n        gameViewController.gcManager\
    \ = gcManager;\n        [self.navigationController pushViewController: gameViewController\
    \ animated:YES];\n    }\n}\n```\n\nA new method will also need to be added to\
    \ detect and set up the second screen; this method is titled `checkForExistingScreenAndInitializeIfPresent`\
    \ and returns a Boolean YES if a second screen is detected. If there is no second\
    \ screen, the game will continue using the single-screen approach. This method\
    \ follows the approach just shown for detecting and displaying a second window.\
    \ In addition, a new button is created to handle the firing of the tractor beam\
    \ on the AirPlay screen; it’s needed because the AirPlay screen doesn’t support\
    \ touch events. The tractor beam events are handled by calling the `touchesBegan`\
    \ and `touchesEnded` methods of the game controller. The `UFOGameViewController`\
    \ is also created, and its view is added to the second window.\n\n```\n- (bool)checkForExistingScreenAndInitializeIfPresent\n\
    {\n    if ([[UIScreen screens] count] > 1)\n    {\n        UIScreen *secondScreen\
    \ = [[UIScreen screens] objectAtIndex:1];\n        CGRect screenBounds = secondScreen.bounds;\n\
    \        UIWindow * secondWindow = [[UIWindow alloc] initWithFrame:screenBounds];\n\
    \        secondWindow.screen = secondScreen;\n        UIButton *button = [UIButton\
    \ buttonWithType:UIButtonTypeRoundedRect];\n        [button addTarget:self action:@selector(fire)\n\
    \            forControlEvents:UIControlEventTouchDown];\n        [button addTarget:self\
    \ action:@selector(fireStop)\n            forControlEvents:UIControlEventTouchUpInside\
    \ | UIControlEventTouchUpOutside];\n        [button setTitle:@\"Fire!\" forState:UIControlStateNormal];\n\
    \        button.frame = CGRectMake(80.0, 180.0, 160.0, 40.0);\n        [self.view\
    \ addSubview:button];\n        secondWindow.hidden = NO;\n        gameViewController\
    \ = [[UFOGameViewController alloc] init];\n        gameViewController.view.frame\
    \ = screenBounds;\n        gameViewController.gcManager = gcManager;\n       \
    \ [secondWindow addSubview:gameViewController.view];\n        return YES;\n  \
    \  }\n    return NO;\n}\n```\n\nIt is important to remember that Apple TV displays\
    \ may not conform to the normal screen sizes you may expect, and app elements\
    \ need to be set up to detect the bounds that they are appearing in and scale\
    \ accordingly. The result of displaying UFOs to an Apple TV hooked up to a widescreen\
    \ LCD TV can be seen in Figure [14-3](#A978-1-4302-4906-1_14_Chapter.html#Fig3).\n\
    \n![A978-1-4302-4906-1_14_Fig3_HTML.jpg](A978-1-4302-4906-1_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3. UFOs running on a widescreen TV through an Apple TV using AirPlay\n\
    \n## Responding to Screen Notifications\n\nIt may be necessary to detect the connection\
    \ and disconnection of external AirPlay screens. Apple provides a set of notifications\
    \ that can handle these events and inform your app for proper handling. To register\
    \ for these notifications, implement the following code:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self selector:@selector(handleScreenDidConnectNotification:)\
    \ name:UIScreenDidConnectNotification object:nil];\n[[NSNotificationCenter defaultCenter]\
    \ addObserver:self selector:@selector(handleScreenDidDisconnectNotification:)\
    \ name:UIScreenDidDisconnectNotification object:nil];\n```\n\nWhen a screen is\
    \ disconnected or connected, the app should create and remove the displayed `UIScreen`\
    \ as required. As the developer, you are solely responsible for cleaning up the\
    \ second window when it is not being used.\n\n## Summary\n\nThis chapter covered\
    \ all things AirPlay. Although AirPlay is a fairly simple and limited topic, this\
    \ feature can add a unique element to your game. Most developers have not yet\
    \ implemented custom AirPlay gaming elements into their products, and there is\
    \ a definite demand for them. Apple announced in early 2013 that it had sold 13\
    \ million Apple TVs. Being one of the first developers to support and understand\
    \ what AirPlay can add to a product will put you in a powerful position when Apple\
    \ moves the Apple TV from a hobby into a mainstream product."
  raw: '## Enabling AirPlay in an App


    If your app is not using one of the three supported AirPlay classes, you can still
    present the user with AirPlay options. To show the AirPlay device picker, use
    the `MPVolumeView` class. In the following code snippet the volume slider bar
    is hidden to show just the device picker; however, there is no requirement to
    hide the volume slider. The results can be seen in Figure [14-1](#A978-1-4302-4906-1_14_Chapter.html#Fig1).


    `MPVolumeView *volumeView = [[MPVolumeView alloc] initWithFrame:`


    `CGRectMake(15, 15, 0, 0)];`


    `[volumeView setShowsVolumeSlider:NO];`


    `[self.view addSubview: volumeView];`


    `[volumeView release];`


    ![A978-1-4302-4906-1_14_Fig1_HTML.jpg](A978-1-4302-4906-1_14_Fig1_HTML.jpg)


    Figure 14-1.


    Enabling an AirPlay picker, seen in the upper left corner, by using the `MPVolumeView`
    class Note


    To use AirPlay classes, the app must first import the required Media Player headers
    by using `#import <MediaPlayer/MediaPlayer.h>` as well as the MediaPlayer.Framework.


    System sounds such as keyboard clicks and alert noises are not sent through AirPlay
    speakers; if your app is using system sounds in a significant manner, they should
    be played as part of your app’s normal audio to be sent with AirPlay.


    ## AirPlay Mirroring


    As of iOS 7, an app cannot enable AirPlay Mirroring on its own and must use the
    system tools in order to enable it. However, no additional development needs to
    be done in order to enable mirroring.


    In iOS 7, bring up the control panel by swiping up from the bottom of the screen
    and select the AirPlay button. You will be given the option of selecting an AirPlay-enabled
    device. If the device supports AirPlay Mirroring (such as an Apple TV), you will
    be presented with a toggle switch to enable it (Figure [14-2](#A978-1-4302-4906-1_14_Chapter.html#Fig2)).
    iOS 6 users should double-tap the Home button and swipe left in the fast app switcher
    to arrive on the playback controls, where another swipe to the right will bring
    up the AirPlay Controls, and you will be able to turn on AirPlay Mirroring.


    ![A978-1-4302-4906-1_14_Fig2_HTML.jpg](A978-1-4302-4906-1_14_Fig2_HTML.jpg)


    Figure 14-2.


    Enabling AirPlay Mirroring on iOS 7 through the Control Center


    ## AirPlay for a Second Screen


    It may be prudent for your app to display different content on the iOS device
    and the AirPlay device. While the user will still need to turn on AirPlay monitoring
    as described in the previous section, you can display entirely different content
    for each screen. First a test can be performed to determine if the second screen
    is available.


    `if ([[UIScreen screens] count] > 1)`


    A reference to the second screen needs to be set up, and a new window must be
    created. Each screen needs to have a dedicated window available to it:


    `UIScreen *secondScreen = [[UIScreen screens] objectAtIndex:1];`


    `CGRect screenBounds = secondScreen.bounds;`


    `UIWindow * secondWindow = [[UIWindow alloc] initWithFrame:screenBounds];`


    `secondWindow.screen = secondScreen;`


    The new window is by default hidden; to view the window on the external display
    we must first set its `hidden` property to NO:


    `secondWindow.hidden = NO;`


    If this code were run now, the AirPlay screen would show a blank, black view,
    because the second window doesn’t have any views to display. Using UFOs as an
    example, we can present the game data to the second screen. Modify the existing
    `playButtonPressed` method to match the following:


    `-(IBAction)playButtonPressed`


    `{`


    `if([self checkForExistingScreenAndInitializeIfPresent])`


    `{`


    `//Using second screen`


    `}`


    `else`


    `{`


    `gameViewController = [[UFOGameViewController alloc]  init];`


    `gameViewController.gcManager = gcManager;`


    `[self.navigationController pushViewController: gameViewController animated:YES];`


    `}`


    `}`


    A new method will also need to be added to detect and set up the second screen;
    this method is titled `checkForExistingScreenAndInitializeIfPresent` and returns
    a Boolean YES if a second screen is detected. If there is no second screen, the
    game will continue using the single-screen approach. This method follows the approach
    just shown for detecting and displaying a second window. In addition, a new button
    is created to handle the firing of the tractor beam on the AirPlay screen; it’s
    needed because the AirPlay screen doesn’t support touch events. The tractor beam
    events are handled by calling the `touchesBegan` and `touchesEnded` methods of
    the game controller. The `UFOGameViewController` is also created, and its view
    is added to the second window.


    `- (bool)checkForExistingScreenAndInitializeIfPresent`


    `{`


    `if ([[UIScreen screens] count] > 1)`


    `{`


    `UIScreen *secondScreen = [[UIScreen screens] objectAtIndex:1];`


    `CGRect screenBounds = secondScreen.bounds;`


    `UIWindow * secondWindow = [[UIWindow alloc] initWithFrame:screenBounds];`


    `secondWindow.screen = secondScreen;`


    `UIButton *button = [UIButton buttonWithType:UIButtonTypeRoundedRect];`


    `[button addTarget:self action:@selector(fire)`


    `forControlEvents:UIControlEventTouchDown];`


    `[button addTarget:self action:@selector(fireStop)`


    `forControlEvents:UIControlEventTouchUpInside | UIControlEventTouchUpOutside];`


    `[button setTitle:@"Fire!" forState:UIControlStateNormal];`


    `button.frame = CGRectMake(80.0, 180.0, 160.0, 40.0);`


    `[self.view addSubview:button];`


    `secondWindow.hidden = NO;`


    `gameViewController = [[UFOGameViewController alloc] init];`


    `gameViewController.view.frame = screenBounds;`


    `gameViewController.gcManager = gcManager;`


    `[secondWindow addSubview:gameViewController.view];`


    `return YES;`


    `}`


    `return NO;`


    `}`


    It is important to remember that Apple TV displays may not conform to the normal
    screen sizes you may expect, and app elements need to be set up to detect the
    bounds that they are appearing in and scale accordingly. The result of displaying
    UFOs to an Apple TV hooked up to a widescreen LCD TV can be seen in Figure [14-3](#A978-1-4302-4906-1_14_Chapter.html#Fig3).


    ![A978-1-4302-4906-1_14_Fig3_HTML.jpg](A978-1-4302-4906-1_14_Fig3_HTML.jpg)


    Figure 14-3.


    UFOs running on a widescreen TV through an Apple TV using AirPlay


    ## Responding to Screen Notifications


    It may be necessary to detect the connection and disconnection of external AirPlay
    screens. Apple provides a set of notifications that can handle these events and
    inform your app for proper handling. To register for these notifications, implement
    the following code:


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(handleScreenDidConnectNotification:)
    name:UIScreenDidConnectNotification object:nil];`


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(handleScreenDidDisconnectNotification:)
    name:UIScreenDidDisconnectNotification object:nil];`


    When a screen is disconnected or connected, the app should create and remove the
    displayed `UIScreen` as required. As the developer, you are solely responsible
    for cleaning up the second window when it is not being used.


    ## Summary


    This chapter covered all things AirPlay. Although AirPlay is a fairly simple and
    limited topic, this feature can add a unique element to your game. Most developers
    have not yet implemented custom AirPlay gaming elements into their products, and
    there is a definite demand for them. Apple announced in early 2013 that it had
    sold 13 million Apple TVs. Being one of the first developers to support and understand
    what AirPlay can add to a product will put you in a powerful position when Apple
    moves the Apple TV from a hobby into a mainstream product.'
  trans: "\n# 在应用中启用 AirPlay\n\n如果你的应用未使用三种受支持的 AirPlay 类别之一，你仍然可以为用户提供 AirPlay 选项。要显示\
    \ AirPlay 设备选择器，请使用 `MPVolumeView` 类。在以下代码片段中，音量滑块条被隐藏以仅显示设备选择器；但并没有要求必须隐藏音量滑块。结果如图\
    \ 14-1 所示。\n\n```\nMPVolumeView *volumeView = [[MPVolumeView alloc] initWithFrame:\n\
    CGRectMake(15, 15, 0, 0)];\n[volumeView setShowsVolumeSlider:NO];\n[self.view\
    \ addSubview: volumeView];\n[volumeView release];\n```\n\n![A978-1-4302-4906-1_14_Fig1_HTML.jpg](img/A978-1-4302-4906-1_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 使用 `MPVolumeView` 类启用 AirPlay 选择器（显示在左上角）\n\n注意：要使用 AirPlay 类，应用必须首先通过\
    \ `#import <MediaPlayer/MediaPlayer.h>` 以及 `MediaPlayer.Framework` 导入所需的 Media\
    \ Player 头文件。\n\n系统声音（例如键盘敲击声和提示音）不会通过 AirPlay 扬声器发送；如果你的应用大量使用系统声音，则应将其作为应用正常音频的一部分进行播放，以便通过\
    \ AirPlay 发送。\n\n## AirPlay 屏幕镜像\n\n从 iOS 7 开始，应用无法自行启用 AirPlay 屏幕镜像，必须使用系统工具来启用它。不过，启用镜像功能无需进行额外的开发。\n\
    \n在 iOS 7 中，从屏幕底部向上滑动以调出控制面板，然后选择 AirPlay 按钮。你将可以选择一个支持 AirPlay 的设备。如果该设备支持 AirPlay\
    \ 屏幕镜像（例如 Apple TV），你将看到一个用于启用它的切换开关（图 14-2）。iOS 6 用户应双击 Home 键并在快速应用切换器中向左滑动，以到达播放控件，然后再次向右滑动以调出\
    \ AirPlay 控件，你便能够开启 AirPlay 屏幕镜像。\n\n![A978-1-4302-4906-1_14_Fig2_HTML.jpg](img/A978-1-4302-4906-1_14_Fig2_HTML.jpg)\n\
    \n图 14-2. 通过控制中心在 iOS 7 上启用 AirPlay 屏幕镜像\n\n## 第二屏幕的 AirPlay\n\n在你的应用中，在 iOS 设备和\
    \ AirPlay 设备上显示不同的内容可能是明智的做法。虽然用户仍需要按照上一节所述开启 AirPlay 监控，但你可以为每个屏幕显示完全不同的内容。首先，可以执行一项测试来确定第二屏幕是否可用。\n\
    \n```\nif ([[UIScreen screens] count] > 1)\n```\n\n需要设置对第二屏幕的引用，并且必须创建一个新的窗口。每个屏幕都需要有一个专用的窗口：\n\
    \n```\nUIScreen *secondScreen = [[UIScreen screens] objectAtIndex:1];\nCGRect\
    \ screenBounds = secondScreen.bounds;\nUIWindow * secondWindow = [[UIWindow alloc]\
    \ initWithFrame:screenBounds];\nsecondWindow.screen = secondScreen;\n```\n\n新窗口默认是隐藏的；要在外部显示器上查看该窗口，我们必须首先将其\
    \ `hidden` 属性设置为 NO：\n\n```\nsecondWindow.hidden = NO;\n```\n\n如果现在运行这段代码，AirPlay\
    \ 屏幕将显示一个空白的黑色视图，因为第二个窗口没有任何视图需要显示。以 UFO 游戏为例，我们可以将游戏数据显示到第二屏幕。修改现有的 `playButtonPressed`\
    \ 方法，使其与以下代码一致：\n\n```\n-(IBAction)playButtonPressed\n{\n    if([self checkForExistingScreenAndInitializeIfPresent])\n\
    \    {\n        // 使用第二屏幕\n    }\n    else\n    {\n        gameViewController\
    \ = [[UFOGameViewController alloc]  init];\n        gameViewController.gcManager\
    \ = gcManager;\n        [self.navigationController pushViewController: gameViewController\
    \ animated:YES];\n    }\n}\n```\n\n还需要添加一个新方法来检测并设置第二屏幕；该方法名为 `checkForExistingScreenAndInitializeIfPresent`，如果检测到第二屏幕则返回布尔值\
    \ YES。如果没有第二屏幕，游戏将继续使用单屏幕方式。该方法遵循刚刚展示的检测和显示第二窗口的方法。此外，还创建了一个新按钮来处理 AirPlay 屏幕上的牵引光束发射；之所以需要这个按钮，是因为\
    \ AirPlay 屏幕不支持触摸事件。牵引光束事件通过调用游戏控制器的 `touchesBegan` 和 `touchesEnded` 方法来处理。同时创建\
    \ `UFOGameViewController`，并将其视图添加到第二个窗口中。\n\n```\n- (bool)checkForExistingScreenAndInitializeIfPresent\n\
    {\n    if ([[UIScreen screens] count] > 1)\n    {\n        UIScreen *secondScreen\
    \ = [[UIScreen screens] objectAtIndex:1];\n        CGRect screenBounds = secondScreen.bounds;\n\
    \        UIWindow * secondWindow = [[UIWindow alloc] initWithFrame:screenBounds];\n\
    \        secondWindow.screen = secondScreen;\n        UIButton *button = [UIButton\
    \ buttonWithType:UIButtonTypeRoundedRect];\n        [button addTarget:self action:@selector(fire)\n\
    \            forControlEvents:UIControlEventTouchDown];\n        [button addTarget:self\
    \ action:@selector(fireStop)\n            forControlEvents:UIControlEventTouchUpInside\
    \ | UIControlEventTouchUpOutside];\n        [button setTitle:@\"发射！\" forState:UIControlStateNormal];\n\
    \        button.frame = CGRectMake(80.0, 180.0, 160.0, 40.0);\n        [self.view\
    \ addSubview:button];\n        secondWindow.hidden = NO;\n        gameViewController\
    \ = [[UFOGameViewController alloc] init];\n        gameViewController.view.frame\
    \ = screenBounds;\n        gameViewController.gcManager = gcManager;\n       \
    \ [secondWindow addSubview:gameViewController.view];\n        return YES;\n  \
    \  }\n    return NO;\n}\n```\n\n务必记住，Apple TV 显示屏可能不符合你预期的常规屏幕尺寸，应用元素需要设置为检测它们所出现的边界并相应地进行缩放。将\
    \ UFO 游戏显示在连接到宽屏液晶电视的 Apple TV 上的结果如图 14-3 所示。\n\n![A978-1-4302-4906-1_14_Fig3_HTML.jpg](img/A978-1-4302-4906-1_14_Fig3_HTML.jpg)\n\
    \n图 14-3. 通过 Apple TV 使用 AirPlay 在宽屏电视上运行的 UFO 游戏\n\n## 响应屏幕通知\n\n可能有必要检测外部 AirPlay\
    \ 屏幕的连接和断开。Apple 提供了一组通知，可以处理这些事件并通知你的应用进行妥善处理。要注册这些通知，请实现以下代码：\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self selector:@selector(handleScreenDidConnectNotification:)\
    \ name:UIScreenDidConnectNotification object:nil];\n[[NSNotificationCenter defaultCenter]\
    \ addObserver:self selector:@selector(handleScreenDidDisconnectNotification:)\
    \ name:UIScreenDidDisconnectNotification object:nil];\n```\n\n当屏幕断开或连接时，应用应根据需要创建和移除所显示的\
    \ `UIScreen`。作为开发者，你全权负责在不使用第二窗口时对其进行清理。\n\n## 总结\n\n本章涵盖了与 AirPlay 相关的所有内容。尽管\
    \ AirPlay 是一个相当简单且有限的主题，但这一功能可以为你的游戏增添独特的元素。大多数开发者尚未在其产品中实现自定义的 AirPlay 游戏元素，而市场对此类功能有明确的需求。Apple\
    \ 在 2013 年初宣布已售出 1300 万台 Apple TV。成为首批支持并理解 AirPlay 能为产品增添价值（当 Apple 将 Apple TV\
    \ 从副业产品转变为主流产品时）的开发者之一，将使你占据有利地位。\n"
- fmt: "# 15. Game Controllers\n\n## Abstract\n\nI cannot trust a man to control others\
    \ who cannot control himself.\n\n> —Robert E. Lee\n\niOS Game Controllers were\
    \ announced at the Apple Worldwide Developers Conference (WWDC) 2013 as part of\
    \ iOS 7, in response to one of the chief complaints that had arisen after the\
    \ launch of the iPhone in 2007 and the arrival of iPhone gaming in 2008: the lack\
    \ of tactile feedback. Focusing on the screen while not being able to feel where\
    \ gaming controls were proved difficult. While there have been many third-party\
    \ solutions, ranging from stickers placed on the iPhone screens to Bluetooth controllers,\
    \ there has not, until now, been a universal method of gaming input.\n\nThe primary\
    \ issue had been that every game needed to support every type of game controller,\
    \ all of which used different protocols. This resulted in a cluster of devices,\
    \ each of which supported only a handful of games. Apple was the only company\
    \ that could implement and enforce standards, and that is exactly what it did\
    \ in iOS 7. The new hardware would all conform to a universal protocol, freeing\
    \ developers to focus on the software instead of device support. If your game\
    \ supports one game controller, it will support them all.\n\nThis chapter and\
    \ associated source code was written before any game controller had yet reached\
    \ the consumer markets, although the ads for controllers were beginning to surface\
    \ (Figure [15-1](#A978-1-4302-4906-1_15_Chapter.html#Fig1)). While every effort\
    \ has been taken to ensure that the technical material discussed is accurate,\
    \ it is impossible to ensure that when faced with production hardware the game\
    \ will behave as expected.\n\n![A978-1-4302-4906-1_15_Fig1_HTML.jpg](A978-1-4302-4906-1_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1. The first ad by Logitech for the new iOS 7 physical game controllers\n\
    \n## Types of Game Controllers\n\nThere are two general types of game controllers,\
    \ standard and extended. These may also be made available in wired (dock connector)\
    \ or wireless (Bluetooth) models. Regardless of other physical and layout differences,\
    \ all controllers will conform to the same types of input. It is important to\
    \ note that extended controllers have more input controls than standard controllers.\n\
    \nStandard controllers feature a directional D-pad, four primary buttons (A, B,\
    \ X, and Y), two shoulder buttons (left and right), and a Pause button. Extended\
    \ controllers feature all the buttons found on the standard controller as well\
    \ as a second set of shoulder buttons and two directional thumb sticks. Wireless\
    \ controllers also feature a player indicator LED, which has four positions.\n\
    \n> **Note:** While a game controller can add a lot of functionality to your iOS\
    \ game, it is important to remember that it must be optional. In addition to any\
    \ game controller support, the game must also provide all the required functionality\
    \ through the touch screen or accelerometer.\n\nWhile several companies have announced\
    \ iOS game controllers, as of October 2013 none had yet made it to the consumer\
    \ market. During the announcement of support for game controllers in iOS 7, Apple\
    \ stated that the first hardware would be making its way into the public’s hands\
    \ during the fall of 2013.\n\n## Connecting to Game Controllers\n\nWhen a nonwireless\
    \ (dock connector) controller is connected to a device, it is automatically detected.\
    \ To detect a wireless controller, however, the app must specifically begin looking\
    \ for one. The sample app adds a new button in the upper-left corner of the menu\
    \ screen to toggle searching for a wireless controller, as shown in Figure [15-2](#A978-1-4302-4906-1_15_Chapter.html#Fig2).\n\
    \n> **Note:** Prior to making any Game Controller–specific calls, you will first\
    \ need to import the `GameController.Framework` into your project and include\
    \ the `GameController/GCController.h` header. Remember that game controllers are\
    \ available only on iOS 7 and greater.\n\n![A978-1-4302-4906-1_15_Fig2_HTML.jpg](A978-1-4302-4906-1_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. Adding a button for Find Wireless Controller to the existing UFO\
    \ main screen\n\nA new action is created for the Find Wireless Controller button.\
    \ When the user first taps the button, the class method `startWirelessControllerDiscoveryWithCompletionHandler`\
    \ is invoked. The second toggle will end the search process with the class method\
    \ `stopWirelessControllerDiscovery`.\n\n```\n- (IBAction)findWirelessController:(id)sender\n\
    {\n    findingWirelessController = !findingWirelessController;\n    if(findingWirelessController)\n\
    \    {\n        [GCController startWirelessControllerDiscoveryWithCompletionHandler:^{\n\
    \            NSLog(@\"Wireless controller searching has finished\");\n       \
    \ }];\n    }\n    else\n    {\n        [GCController stopWirelessControllerDiscovery];\n\
    \        NSLog(@\"Wireless controller stopped by user\");\n    }\n}\n```\n\nWhen\
    \ a new controller is detected, whether it is wireless or physically connected,\
    \ a notification is fired, `GCControllerDidConnectNotification`. This notification\
    \ and the partner notification for a game controller being disconnected should\
    \ be registered at the first chance possible. In the sample project we do this\
    \ in the `viewDidLoad:` method of the `UFOViewController` class:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self selector:@selector(setupControllers:) name:GCControllerDidConnectNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(setupControllers:)\
    \ name:GCControllerDidDisconnectNotification object:nil];\n```\n\n> **Note:**\
    \ When a controller is disconnected, it is recommended that the game automatically\
    \ pause to allow the player to either correct the issue with the controller or\
    \ return to touch-based game play. Do not forget to test disconnecting controllers\
    \ during game play as part of the quality assurance process.\n\nUpon receiving\
    \ either of these notifications, our code calls a new `setupControllers:` method.\
    \ This method allows the app to keep track of which controllers are connected\
    \ at any given time, as there may be more than one. The game controllers are available\
    \ via the `controllers` method on the `GCController` object; this method will\
    \ return an array of all the connected controllers. The value of the `controller`\
    \ array is also saved to an array property for later use in the sample app.\n\n\
    ```\n-(void)setupControllers:(NSNotification *)notif\n{\n    self.gameControllerArray\
    \ = [GCController controllers];\n    if([gameControllerArray count] > 0)\n   \
    \ {\n        NSLog(@\"Game Controllers Found: %i\",\n              [gameControllerArray\
    \ count]);\n    }\n    else\n    {\n        NSLog(@\"No game controllers found\"\
    );\n    }\n}\n```\n\n> **Note:** It is possible for the controllers to be detected\
    \ before the notification is set up, so it is important to check the contents\
    \ of the controller array when the notification is added to determine if there\
    \ are any currently connected controllers.\n\nAs a typical example, the user launches\
    \ an app before the game controller is connected. The app has already registered\
    \ for game controllers being connected, and the notifications described in this\
    \ section are fired.\n\nA counter example would be if the user already has the\
    \ game controller connected before launching the app. In this case the notification\
    \ is not fired, because the game controller was not connected after the notification\
    \ was configured. In this case the developer should manually test for any connected\
    \ game controllers."
  raw: '# 15. Game Controllers


    Abstract


    I cannot trust a man to control others who cannot control himself.


    I cannot trust a man to control others who cannot control himself.


    > —Robert E. Lee


    iOS Game Controllers were announced at the Apple Worldwide Developers Conference
    (WWDC) 2013 as part of iOS 7, in response to one of the chief complaints that
    had arisen after the launch of the iPhone in 2007 and the arrival of iPhone gaming
    in 2008: the lack of tactile feedback. Focusing on the screen while not being
    able to feel where gaming controls were proved difficult. While there have been
    many third-party solutions, ranging from stickers placed on the iPhone screens
    to Bluetooth controllers, there has not, until now, been a universal method of
    gaming input.


    The primary issue had been that every game needed to support every type of game
    controller, all of which used different protocols. This resulted in a cluster
    of devices, each of which supported only a handful of games. Apple was the only
    company that could implement and enforce standards, and that is exactly what it
    did in iOS 7\. The new hardware would all conform to a universal protocol, freeing
    developers to focus on the software instead of device support. If your game supports
    one game controller, it will support them all.


    This chapter and associated source code was written before any game controller
    had yet reached the consumer markets, although the ads for controllers were beginning
    to surface (Figure [15-1](#A978-1-4302-4906-1_15_Chapter.html#Fig1)). While every
    effort has been taken to ensure that the technical material discussed is accurate,
    it is impossible to ensure that when faced with production hardware the game will
    behave as expected.


    ![A978-1-4302-4906-1_15_Fig1_HTML.jpg](A978-1-4302-4906-1_15_Fig1_HTML.jpg)


    Figure 15-1.


    The first ad by Logitech for the new iOS 7 physical game controllers


    ## Types of Game Controllers


    There are two general types of game controllers, standard and extended. These
    may also be made available in wired (dock connector) or wireless (Bluetooth) models.
    Regardless of other physical and layout differences, all controllers will conform
    to the same types of input. It is important to note that extended controllers
    have more input controls than standard controllers.


    Standard controllers feature a directional D-pad, four primary buttons (A, B,
    X, and Y), two shoulder buttons (left and right), and a Pause button. Extended
    controllers feature all the buttons found on the standard controller as well as
    a second set of shoulder buttons and two directional thumb sticks. Wireless controllers
    also feature a player indicator LED, which has four positions.


    Note


    While a game controller can add a lot of functionality to your iOS game, it is
    important to remember that it must be optional. In addition to any game controller
    support, the game must also provide all the required functionality through the
    touch screen or accelerometer.


    While several companies have announced iOS game controllers, as of October 2013
    none had yet made it to the consumer market. During the announcement of support
    for game controllers in iOS 7, Apple stated that the first hardware would be making
    its way into the public’s hands during the fall of 2013.


    ## Connecting to Game Controllers


    When a nonwireless (dock connector) controller is connected to a device, it is
    automatically detected. To detect a wireless controller, however, the app must
    specifically begin looking for one. The sample app adds a new button in the upper-left
    corner of the menu screen to toggle searching for a wireless controller, as shown
    in Figure [15-2](#A978-1-4302-4906-1_15_Chapter.html#Fig2).


    Note


    Prior to making any Game Controller–specific calls, you will first need to import
    the `GameController.Framework` into your project and include the `Game Controller/GCController.h`
    header. Remember that game controllers are available only on iOS 7 and greater.


    ![A978-1-4302-4906-1_15_Fig2_HTML.jpg](A978-1-4302-4906-1_15_Fig2_HTML.jpg)


    Figure 15-2.


    Adding a button for Find Wireless Controller to the existing UFO main screen


    A new action is created for the Find Wireless Controller button. When the user
    first taps the button, the class method `startWirelessControllerDiscoveryWithCompletionHandler`
    is invoked. The second toggle will end the search process with the class method
    `stopWirelessControllerDiscovery`.


    `- (IBAction)findWirelessController:(id)sender`


    `{`


    `findingWirelessController = !findingWirelessController;`


    `if(findingWirelessController)`


    `{`


    `[GCController startWirelessControllerDiscoveryWithCompletionHandler:^{`


    `NSLog(@"Wireless controller searching has finished");`


    `}];`


    `}`


    `else`


    `{`


    `[GCController stopWirelessControllerDiscovery];`


    `NSLog(@"Wireless controller stopped by user");`


    `}`


    `}`


    When a new controller is detected, whether it is wireless or physically connected,
    a notification is fired, `GCControllerDidConnectNotification`. This notification
    and the partner notification for a game controller being disconnected should be
    registered at the first chance possible. In the sample project we do this in the
    `viewDidLoad:` method of the `UFOViewController` class:


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(setupControllers:)
    name:GCControllerDidConnectNotification object:nil];`


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(setupControllers:)
    name:GCControllerDidDisconnectNotification object:nil];`


    Note


    When a controller is disconnected, it is recommended that the game automatically
    pause to allow the player to either correct the issue with the controller or return
    to touch-based game play. Do not forget to test disconnecting controllers during
    game play as part of the quality assurance process.


    Upon receiving either of these notifications, our code calls a new `setup Controllers:`
    method This method allows the app to keep track of which controllers are connected
    at any given time, as there may be more than one. The game controllers are available
    via the `controllers` method on the `GCController` object; this method will return
    an array of all the connected controllers. The value of the `controller` array
    is also saved to an array property for later use in the sample app.


    `-(void)setupControllers:(NSNotification *)notif`


    `{`


    `self.gameControllerArray = [GCController controllers];`


    `if([gameControllerArray count] > 0)`


    `{`


    `NSLog(@"Game Controllers Found: %i",`


    `[gameControllerArray count]);`


    `}`


    `else`


    `{`


    `NSLog(@"No game controllers found");`


    `}`


    `}`


    Note


    It is possible for the controllers to be detected before the notification is set
    up, so it is important to check the contents of the controller array when the
    notification is added to determine if there are any currently connected controllers.


    As a typical example, the user launches an app before the game controller is connected.
    The app has already registered for game controllers being connected, and the notifications
    described in this section are fired.


    A counter example would be if the user already has the game controller connected
    before launching the app. In this case the notification is not fired, because
    the game controller was not connected after the notification was configured. In
    this case the developer should manually test for any connected game controllers.'
  trans: "\n# 15. 游戏控制器\n\n## 摘要\n\n我无法信任一个连自己都无法控制的人去控制他人。\n\n> —罗伯特·E·李\n\niOS 游戏控制器在\
    \ 2013 年苹果全球开发者大会（WWDC）上作为 iOS 7 的一部分发布，旨在回应当初 iPhone 于 2007 年发布、2008 年 iPhone\
    \ 游戏兴起后出现的主要批评之一：缺乏触觉反馈。在无法感知游戏控制键位置的情况下专注于屏幕，这被证明是很困难的。虽然市场上有许多第三方解决方案，从贴在 iPhone\
    \ 屏幕上的贴纸到蓝牙控制器，但直到现在，始终缺乏一种通用的游戏输入方法。\n\n主要问题在于，每款游戏都需要支持每种类型的游戏控制器，而所有这些控制器都使用不同的协议。这导致设备种类繁多，每款设备仅支持少数几款游戏。苹果是唯一能够实施并强制执行标准的公司，而这正是它在\
    \ iOS 7 中所做的。新的硬件都将遵循通用协议，使开发者得以专注于软件开发而非设备支持。如果你的游戏支持一款游戏控制器，它就能支持所有控制器。\n\n\
    本章及相关源代码编写于任何游戏控制器进入消费市场之前，尽管控制器的广告已经开始出现（图 15-1）。虽然已尽一切努力确保所讨论的技术材料准确无误，但无法保证面对生产硬件时游戏的行为会如预期所示。\n\
    \n![A978-1-4302-4906-1_15_Fig1_HTML.jpg](img/A978-1-4302-4906-1_15_Fig1_HTML.jpg)\n\
    \n图 15-1. 罗技为新型 iOS 7 实体游戏控制器发布的首个广告\n\n## 游戏控制器的类型\n\n游戏控制器主要有两种类型：标准型和扩展型。它们也可能以有线（底座连接器）或无线（蓝牙）型号提供。无论其他物理和布局差异如何，所有控制器都将遵循相同的输入类型。需要注意的是，扩展型控制器比标准型控制器拥有更多的输入控制键。\n\
    \n标准型控制器配备有方向键、四个主按钮（A、B、X 和 Y）、两个肩部按钮（左和右）以及一个暂停按钮。扩展型控制器则拥有标准型控制器的所有按钮，外加第二组肩部按钮和两个方向摇杆。无线控制器还配备一个玩家指示灯\
    \ LED，有四个位置。\n\n> **注意：** 虽然游戏控制器可以为你的 iOS 游戏增加很多功能，但切记它必须是可选的。除了支持游戏控制器外，游戏还必须通过触摸屏或加速度计提供所有必需的功能。\n\
    \n尽管有几家公司宣布了 iOS 游戏控制器，但截至 2013 年 10 月，尚未有任何产品进入消费市场。在宣布 iOS 7 支持游戏控制器时，苹果表示首批硬件将于\
    \ 2013 年秋季面世。\n\n## 连接到游戏控制器\n\n当非无线（底座连接器）控制器连接到设备时，它会自动被检测到。然而，要检测无线控制器，应用程序必须专门开始寻找。示例应用程序在菜单屏幕的左上角添加了一个新按钮，用于切换搜索无线控制器，如图\
    \ 15-2 所示。\n\n> **注意：** 在进行任何游戏控制器特定的调用之前，你首先需要将 `GameController.Framework` 导入到项目中，并包含\
    \ `GameController/GCController.h` 头文件。请记住，游戏控制器仅适用于 iOS 7 及更高版本。\n\n![A978-1-4302-4906-1_15_Fig2_HTML.jpg](img/A978-1-4302-4906-1_15_Fig2_HTML.jpg)\n\
    \n图 15-2. 在现有的 UFO 主屏幕中添加“查找无线控制器”按钮\n\n为“查找无线控制器”按钮创建了一个新的操作。当用户首次点击该按钮时，会调用类方法\
    \ `startWirelessControllerDiscoveryWithCompletionHandler`。第二次切换则会通过类方法 `stopWirelessControllerDiscovery`\
    \ 结束搜索过程。\n\n```\n- (IBAction)findWirelessController:(id)sender\n{\n    findingWirelessController\
    \ = !findingWirelessController;\n    if(findingWirelessController)\n    {\n  \
    \      [GCController startWirelessControllerDiscoveryWithCompletionHandler:^{\n\
    \            NSLog(@\"无线控制器搜索已完成\");\n        }];\n    }\n    else\n    {\n  \
    \      [GCController stopWirelessControllerDiscovery];\n        NSLog(@\"用户已停止无线控制器搜索\"\
    );\n    }\n}\n```\n\n当检测到新的控制器时，无论是无线连接还是有线连接，都会触发一个通知 `GCControllerDidConnectNotification`。这个通知以及对应的游戏控制器断开连接的通知应尽早注册。在示例项目中，我们在\
    \ `UFOViewController` 类的 `viewDidLoad:` 方法中执行此操作：\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self selector:@selector(setupControllers:) name:GCControllerDidConnectNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(setupControllers:)\
    \ name:GCControllerDidDisconnectNotification object:nil];\n```\n\n> **注意：** 当控制器断开连接时，建议游戏自动暂停，以便玩家能够解决控制器问题或返回基于触摸的游戏操作。作为质量保证流程的一部分，请务必测试游戏过程中断开控制器的情况。\n\
    \n收到这些通知后，我们的代码会调用一个新的 `setupControllers:` 方法。该方法允许应用程序随时跟踪哪些控制器已连接，因为可能存在多个控制器。游戏控制器可通过\
    \ `GCController` 对象上的 `controllers` 方法获取；此方法将返回所有已连接控制器的数组。该 `controller` 数组的值也会保存到一个数组属性中，供示例应用程序后续使用。\n\
    \n```\n-(void)setupControllers:(NSNotification *)notif\n{\n    self.gameControllerArray\
    \ = [GCController controllers];\n    if([gameControllerArray count] > 0)\n   \
    \ {\n        NSLog(@\"找到游戏控制器数量: %i\",\n              [gameControllerArray count]);\n\
    \    }\n    else\n    {\n        NSLog(@\"未找到游戏控制器\");\n    }\n}\n```\n\n> **注意：**\
    \ 控制器有可能在设置通知之前就被检测到，因此在添加通知时检查控制器数组的内容，以确定当前是否有任何已连接的控制器，这一点非常重要。\n\n一个典型的例子是，用户在游戏控制器连接之前启动了应用程序。应用程序已经注册了游戏控制器的连接事件，本节所述的通知将被触发。\n\
    \n一个反例是，用户在启动应用程序之前已经连接了游戏控制器。在这种情况下，通知不会触发，因为游戏控制器是在配置通知之前连接的。在这种情况下，开发者应手动检测任何已连接的游戏控制器。\n"
- fmt: "# Reading Data Through Polling\n\nOnce a controller has been connected to\
    \ a device, the input from that controller needs to be read. In the UFOs sample\
    \ app, accelerometer data is read every 0.05 seconds. Since not all users will\
    \ have access to game controllers, this behavior will still be needed even after\
    \ adding game controller support. This makes the accelerometer polling method\
    \ ideal for reading data from the game controller. If your game doesn’t have an\
    \ existing loop that can be tied into, a simple `NSTimer` can be set up. Modify\
    \ the existing `motionOccurred:` method in UFOs to add game controller functionality.\n\
    \nFirst the game must determine if the player is using a game controller. It does\
    \ this by determining if the device is currently connected to any game controllers;\
    \ in your own applications you may want to provide the user with an option. In\
    \ the event that more than one game controller is connected, the last one in the\
    \ array is used. In your own apps it may also be beneficial to allow the user\
    \ to select which controller they intend to use. A new `Controller` object is\
    \ created, and the last controller in the array is stored into it.\n\nThe UFOs\
    \ game has two primary functions. The first begins the tractor beam action, and\
    \ the second moves the ship from location to location on the screen. For the purposes\
    \ of the demo, the Y button on the controller will be used to engage the tractor\
    \ beam. Since the tractor beam remains on as long as the button is held down,\
    \ we create a `bool` to keep track of when the button is currently pressed. The\
    \ action from the button is simply passed to the `touchesBegan:` method, which\
    \ is the same method that controls the tractor beam when handling touch events.\
    \ The benefit of this approach is that the touch events will still work even with\
    \ a controller connected. Since both standard and extended game controllers have\
    \ a Y button, there is no specific code required to handle the different controllers.\n\
    \nWith a standard controller, the D-pad will be used for movement. However, the\
    \ thumb directional pads on the extended game controller make for a better experience\
    \ when controlling the ship, so the app will use those when available. The property\
    \ `extendedGamePad` controls this choice; if this value is non-nil, then an extended\
    \ controller is hooked up.\n\nLike the A, B, X, and Y buttons, the D-pad values\
    \ can be accessed via a property on the `GCController` object. However, the D-pad\
    \ returns a float value of 0.0 to 1.0 for the X and Y axes. This value can be\
    \ used in place of the accelerometer value used when a game controller is not\
    \ hooked up. The process of hooking up the values for the extended game controller’s\
    \ thumb stick is nearly identical, but the values are stored under `extendedGamepad`\
    \ instead of the root `gamepad` property.\n\n```\n-(void)motionOccurred:(CMAccelerometerData\
    \ *)accelerometerData;\n{\n  bool gameControllerBeingUsed = NO;\n  GCController\
    \ *myController = nil;\n\n  if([parentViewController.gameControllerArray count]\
    \ >  0)\n  {\n    gameControllerBeingUsed = YES;\n    myController = [parentViewController.gameControllerArray\
    \  lastObject];\n  }\n\n  if(gameControllerBeingUsed == YES)\n  {\n    //Testing\
    \ for button press\n    if(myController.gamepad.buttonY.pressed && gameControllerYHit\
    \ == NO)\n    {\n      gameControllerYHit = YES;\n      [self touchesBegan:nil\
    \ withEvent:nil];\n    }\n\n    if(!myController.gamepad.buttonY.pressed && gameControllerYHit\
    \ == YES)\n    {\n      gameControllerYHit = NO;\n      [self touchesEnded:nil\
    \ withEvent:nil];\n    }\n\n    //no extended gamepad\n    if(myController.extendedGamepad\
    \ == nil)\n    {\n      accel[0] = myController.gamepad.dpad.xAxis.value * accelerometerDamp\
    \ +             accel[0] * (1.0 - accelerometerDamp);\n      accel[1] = myController.gamepad.dpad.yAxis.value\
    \ * accelerometerDamp +             accel[1] * (1.0 - accelerometerDamp);\n  \
    \  }\n\n    //extended gamepad\n    else\n    {\n      GCExtendedGamepad *extendedGamePadProfile\
    \ = myController.extendedGamepad;\n      accel[0] = extendedGamePadProfile.leftThumbstick.xAxis.value\
    \ * accelerometerDamp +             accel[0] * (1.0 - accelerometerDamp);\n  \
    \    accel[1] = extendedGamePadProfile.leftThumbstick.yAxis.value * accelerometerDamp\
    \ +             accel[1] * (1.0 - accelerometerDamp);\n    }\n  }\n\n  else\n\
    \  {\n    //Use a basic low-pass filter to keep only the gravity in the accelerometer\
    \ values\n    accel[0] = accelerometerData.acceleration.x * accelerometerDamp\
    \ + accel[0] *         (1.0 - accelerometerDamp);\n    accel[1] = accelerometerData.acceleration.y\
    \ * accelerometerDamp + accel[1] *         (1.0 - accelerometerDamp);\n    accel[2]\
    \ = accelerometerData.acceleration.z * accelerometerDamp + accel[2] *        \
    \ (1.0 - accelerometerDamp);\n    if(!tractorBeamOn)\n      [self movePlayer:accel[0]\
    \ :accel[1]];\n  }\n}\n```\n\n> **Note**: The 0.0 value is determined when the\
    \ D-pad and thumb sticks are at rest. Before the Game Controller framework, developers\
    \ found it necessary to design a “dead zone” around the at-rest positions; this\
    \ is no longer necessary, and any value above 0.0 should be considered intended\
    \ movement.\n\n# Data Callbacks\n\nThere are many circumstances where it doesn’t\
    \ make sense to poll for game controller input each time the game loop cycles.\
    \ Luckily, Apple has provided functionality for callbacks that can be set upon\
    \ a value change on any physical button on a game controller. In the following\
    \ snippet a handler is set for the right shoulder button. When the button value\
    \ is changed, this method will call the `rightShoulderButtonAction`.\n\n```\n\
    myController.gamepad.rightShoulder.valueChangedHandler = ^(GCControllerButtonInput\
    \ *button, float value, BOOL pressed))\n    {\n      if(pressed)\n          [self\
    \ rightShoulderButtonAction];\n    };\n```\n\nIn addition to setting up a callback\
    \ per action, you can share the callback across multiple buttons at once. To do\
    \ this, create a new block and set it up as shown in the following code snippet.\
    \ Any action on the A, B, X, or Y button will then cause the log statement to\
    \ be printed.\n\n```\nvoid(^buttonHandler)(GCControllerButtonInput *, float, BOOL)\
    \ = ^(GCControllerButtonInput *button, float value, BOOL pressed)\n{\n    NSLog(@\"\
    Handle action for %@ pressed: %i, with value: %f\", button, pressed, value);\n\
    };\n\nmyController.gamepad.buttonA.valueChangedHandler = buttonHandler;\nmyController.gamepad.buttonB.valueChangedHandler\
    \ = buttonHandler;\nmyController.gamepad.buttonX.valueChangedHandler = buttonHandler;\n\
    myController.gamepad.buttonY.valueChangedHandler = buttonHandler;\n```\n\nIt is\
    \ also possible to set up data callbacks for dealing with changing axis values\
    \ with the D-pad or thumb sticks. To do so, use the following code snippet:\n\n\
    ```\nmyController.extendedGamepad.rightThumbstick.valueChangedHandler = ^(GCControllerDirectionPad\
    \ *dpad, float xValue, float yValue)\n{\n    NSLog(@\"Right Thumb Stick value\
    \ did change: %f, %f\", xValue, yValue);\n};\n```\n\n# Pausing\n\nIf your game\
    \ supports game controllers, it must also support the Pause button that is found\
    \ on all game controllers. Even if your game did not previously support Pause,\
    \ doing so becomes a requirement of having a game controller connected. Working\
    \ with the Pause button on a game controller is very simple and requires only\
    \ a couple of extra lines of code:\n\n```\nmyController.controllerPausedHandler\
    \ = ^(GCController *controller)\n {\n     [self togglePauseState];\n };\n```"
  raw: '## Reading Data Through Polling


    Once a controller has been connected to a device, the input from that controller
    needs to be read. In the UFOs sample app, accelerometer data is read every 0.05
    seconds. Since not all users will have access to game controllers, this behavior
    will still be needed even after adding game controller support. This makes the
    accelerometer polling method ideal for reading data from the game controller.
    If your game doesn’t have an existing loop that can be tied into, a simple `NSTimer`
    can be set up. Modify the existing `motionOccurred:` method in UFOs to add game
    controller functionality.


    First the game must determine if the player is using a game controller. It does
    this by determining if the device is currently connected to any game controllers;
    in your own applications you may want to provide the user with an option. In the
    event that more than one game controller is connected, the last one in the array
    is used. In your own apps it may also be beneficial to allow the user to select
    which controller they intend to use. A new `Controller` object is created, and
    the last controller in the array is stored into it.


    The UFOs game has two primary functions. The first begins the tractor beam action,
    and the second moves the ship from location to location on the screen. For the
    purposes of the demo, the Y button on the controller will be used to engage the
    tractor beam. Since the tractor beam remains on as long as the button is held
    down, we create a `bool` to keep track of when the button is currently pressed.
    The action from the button is simply passed to the `touchesBegan:` method, which
    is the same method that controls the tractor beam when handling touch events.
    The benefit of this approach is that the touch events will still work even with
    a controller connected. Since both standard and extended game controllers have
    a Y button, there is no specific code required to handle the different controllers.


    With a standard controller, the D-pad will be used for movement. However, the
    thumb directional pads on the extended game controller make for a better experience
    when controlling the ship, so the app will use those when available. The property
    `extendedGamePad` controls this choice; if this value is non-nil, then an extended
    controller is hooked up.


    Like the A, B, X, and Y buttons, the D-pad values can be accessed via a property
    on the `GCController` object. However, the D-pad returns a float value of 0.0
    to 1.0 for the X and Y axes. This value can be used in place of the accelerometer
    value used when a game controller is not hooked up. The process of hooking up
    the values for the extended game controller’s thumb stick is nearly identical,
    but the values are stored under `extendedGamepad` instead of the root `gamepad`
    property.


    `-(void)motionOccurred:(CMAccelerometerData *)accelerometerData;`


    `{`


    `bool gameControllerBeingUsed = NO;`


    `GCController *myController = nil;`


    `if([parentViewController.gameControllerArray count] >  0)`


    `{`


    `gameControllerBeingUsed = YES;`


    `myController = [parentViewController.gameControllerArray  lastObject];`


    `}`


    `if(gameControllerBeingUsed == YES)`


    `{`


    `//Testing for button press`


    `if(myController.gamepad.buttonY.pressed && gameControllerYHit == NO)`


    `{`


    `gameControllerYHit = YES;`


    `[self touchesBegan:nil withEvent:nil];`


    `}`


    `if(!myController.gamepad.buttonY.pressed && gameControllerYHit == YES)`


    `{`


    `gameControllerYHit = NO;`


    `[self touchesEnded:nil withEvent:nil];`


    `}`


    `//no extended gamepad`


    `if(myController.extendedGamepad == nil)`


    `{`


    `accel[0] = myController.gamepad.dpad.xAxis.value * accelerometerDamp +            
    accel[0] * (1.0 - accelerometerDamp);`


    `accel[1] = myController.gamepad.dpad.yAxis.value * accelerometerDamp +            
    accel[1] * (1.0 - accelerometerDamp);`


    `}`


    `//extended gamepad`


    `else`


    `{`


    `GCExtendedGamepad *extendedGamePadProfile = myController.extendedGamepad;`


    `accel[0] = extendedGamePadProfile.leftThumbstick.xAxis.value * accelerometerDamp
    +             accel[0] * (1.0 - accelerometerDamp);`


    `accel[1] = extendedGamePadProfile.leftThumbstick.yAxis.value * accelerometerDamp
    +             accel[1] * (1.0 - accelerometerDamp);`


    `}`


    `}`


    `else`


    `{`


    `//Use a basic low-pass filter to keep only the gravity in the accelerometer values`


    `accel[0] = accelerometerData.acceleration.x * accelerometerDamp + accel[0] *        
    (1.0 - accelerometerDamp);`


    `accel[1] = accelerometerData.acceleration.y * accelerometerDamp + accel[1] *        
    (1.0 - accelerometerDamp);`


    `accel[2] = accelerometerData.acceleration.z * accelerometerDamp + accel[2] *        
    (1.0 - accelerometerDamp);`


    `if(!tractorBeamOn)`


    `[self movePlayer:accel[0] :accel[1]];`


    `}`


    `}`


    Note


    The 0.0 value is determined when the D-pad and thumb sticks are at rest. Before
    the Game Controller framework, developers found it necessary to design a “dead
    zone” around the at-rest positions; this is no longer necessary, and any value
    above 0.0 should be considered intended movement.


    ## Data Callbacks


    There are many circumstances where it doesn’t make sense to poll for game controller
    input each time the game loop cycles. Luckily, Apple has provided functionality
    for callbacks that can be set upon a value change on any physical button on a
    game controller. In the following snippet a handler is set for the right shoulder
    button. When the button value is changed, this method will call the `rightShoulderButtonAction`.


    `myController.gamepad.rightShoulder.valueChangedHandler = ^(GCControllerButtonInput
    *button, float value, BOOL pressed))`


        `{`


          `if(pressed)`


              `[self rightShoulderButtonAction];`


        `};`


    In addition to setting up a callback per action, you can share the callback across
    multiple buttons at once. To do this, create a new block and set it up as shown
    in the following code snippet. Any action on the A, B, X, or Y button will then
    cause the log statement to be printed.


    `void(^buttonHandler)(GCControllerButtonInput *, float, BOOL) = ^(GCControllerButtonInput
    *button, float value, BOOL pressed)`


    `{`


        `NSLog(@"Handle action for %@ pressed: %i, with value: %f", button, pressed,
    value);`


    `};`


    `myController.gamepad.buttonA.valueChangedHandler = buttonHandler;`


    `myController.gamepad.buttonB.valueChangedHandler = buttonHandler;`


    `myController.gamepad.buttonX.valueChangedHandler = buttonHandler;`


    `myController.gamepad.buttonY.valueChangedHandler = buttonHandler;`


    It is also possible to set up data callbacks for dealing with changing axis values
    with the D-pad or thumb sticks. To do so, use the following code snippet:


    `myController.extendedGamepad.rightThumbstick.valueChangedHandler = ^(GCControllerDirectionPad
    *dpad, float xValue, float yValue)`


    `{`


        `NSLog(@"Right Thumb Stick value did change: %f, %f", xValue, yValue);`


    `};`


    ## Pausing


    If your game supports game controllers, it must also support the Pause button
    that is found on all game controllers. Even if your game did not previously support
    Pause, doing so becomes a requirement of having a game controller connected. Working
    with the Pause button on a game controller is very simple and requires only a
    couple of extra lines of code:


    `myController.controllerPausedHandler = ^(GCController *controller)`


     `{`


         `[self togglePauseState];`


     `};`'
  trans: "\n# 通过轮询读取数据\n\n当控制器连接到设备后，需要读取该控制器的输入。在 UFOs 示例应用中，加速度计数据每 0.05 秒读取一次。由于并非所有用户都有游戏控制器，因此在添加游戏控制器支持后，仍需保留此行为。这使得加速度计轮询方法非常适合从游戏控制器读取数据。如果你的游戏没有可以接入的现有循环，可以设置一个简单的\
    \ `NSTimer`。修改 UFOs 中现有的 `motionOccurred:` 方法，以添加游戏控制器功能。\n\n首先，游戏必须判断玩家是否正在使用游戏控制器。它通过检测设备当前是否已连接任何游戏控制器来实现这一点；在你自己的应用程序中，你可能希望给用户提供一个选项。如果连接了多个游戏控制器，则使用数组中的最后一个。在你自己的应用中，允许用户选择他们想要使用的控制器也可能是有益的。创建一个新的\
    \ `Controller` 对象，并将数组中的最后一个控制器存储到其中。\n\nUFOs 游戏有两个主要功能。第一个是启动牵引光束动作，第二个是在屏幕上将飞船从一个位置移动到另一个位置。出于演示目的，控制器上的\
    \ Y 按钮将用于启动牵引光束。由于只要按住按钮，牵引光束就会保持开启状态，我们创建一个 `bool` 来跟踪按钮当前是否被按下。按钮的动作直接传递给 `touchesBegan:`\
    \ 方法，该方法与处理触摸事件时控制牵引光束的方法是同一个。这种方法的好处是，即使连接了控制器，触摸事件仍然有效。由于标准版和扩展版游戏控制器都有 Y 按钮，因此不需要特定的代码来处理不同的控制器。\n\
    \n对于标准控制器，将使用方向键（D-pad）进行移动。然而，扩展版游戏控制器上的拇指摇杆方向键在控制飞船时能提供更好的体验，因此应用将在可用时使用它们。属性\
    \ `extendedGamePad` 控制此选择；如果此值非 nil，则表示已连接扩展控制器。\n\n与 A、B、X 和 Y 按钮类似，方向键的值可以通过\
    \ `GCController` 对象上的属性访问。但是，方向键针对 X 和 Y 轴返回的是 0.0 到 1.0 的浮点值。该值可以替代未连接游戏控制器时使用的加速度计值。为扩展版游戏控制器的拇指摇杆连接值的过程几乎相同，但值存储在\
    \ `extendedGamepad` 下，而不是根 `gamepad` 属性下。\n\n```\n-(void)motionOccurred:(CMAccelerometerData\
    \ *)accelerometerData;\n{\n  bool gameControllerBeingUsed = NO;\n  GCController\
    \ *myController = nil;\n\n  if([parentViewController.gameControllerArray count]\
    \ >  0)\n  {\n    gameControllerBeingUsed = YES;\n    myController = [parentViewController.gameControllerArray\
    \  lastObject];\n  }\n\n  if(gameControllerBeingUsed == YES)\n  {\n    //检测按钮按下\n\
    \    if(myController.gamepad.buttonY.pressed && gameControllerYHit == NO)\n  \
    \  {\n      gameControllerYHit = YES;\n      [self touchesBegan:nil withEvent:nil];\n\
    \    }\n\n    if(!myController.gamepad.buttonY.pressed && gameControllerYHit ==\
    \ YES)\n    {\n      gameControllerYHit = NO;\n      [self touchesEnded:nil withEvent:nil];\n\
    \    }\n\n    //非扩展版游戏手柄\n    if(myController.extendedGamepad == nil)\n    {\n\
    \      accel[0] = myController.gamepad.dpad.xAxis.value * accelerometerDamp +\
    \             accel[0] * (1.0 - accelerometerDamp);\n      accel[1] = myController.gamepad.dpad.yAxis.value\
    \ * accelerometerDamp +             accel[1] * (1.0 - accelerometerDamp);\n  \
    \  }\n\n    //扩展版游戏手柄\n    else\n    {\n      GCExtendedGamepad *extendedGamePadProfile\
    \ = myController.extendedGamepad;\n      accel[0] = extendedGamePadProfile.leftThumbstick.xAxis.value\
    \ * accelerometerDamp +             accel[0] * (1.0 - accelerometerDamp);\n  \
    \    accel[1] = extendedGamePadProfile.leftThumbstick.yAxis.value * accelerometerDamp\
    \ +             accel[1] * (1.0 - accelerometerDamp);\n    }\n  }\n\n  else\n\
    \  {\n    //使用一个基本的低通滤波器，仅保留加速度计值中的重力分量\n    accel[0] = accelerometerData.acceleration.x\
    \ * accelerometerDamp + accel[0] *         (1.0 - accelerometerDamp);\n    accel[1]\
    \ = accelerometerData.acceleration.y * accelerometerDamp + accel[1] *        \
    \ (1.0 - accelerometerDamp);\n    accel[2] = accelerometerData.acceleration.z\
    \ * accelerometerDamp + accel[2] *         (1.0 - accelerometerDamp);\n    if(!tractorBeamOn)\n\
    \      [self movePlayer:accel[0] :accel[1]];\n  }\n}\n```\n\n> **注意**：当方向键和拇指摇杆处于静止位置时，其值为\
    \ 0.0。在游戏控制器框架出现之前，开发者发现有必要在静止位置周围设计一个“死区”；现在这已不再必要，任何大于 0.0 的值都应被视为有意的移动。\n\n\
    # 数据回调\n\n在许多情况下，在每个游戏循环周期轮询游戏控制器输入是没有意义的。幸运的是，苹果提供了回调功能，可以在游戏控制器上任何物理按钮的值发生变化时进行设置。在以下代码片段中，为右肩部按钮设置了一个处理程序。当按钮值改变时，此方法将调用\
    \ `rightShoulderButtonAction`。\n\n```\nmyController.gamepad.rightShoulder.valueChangedHandler\
    \ = ^(GCControllerButtonInput *button, float value, BOOL pressed))\n    {\n  \
    \    if(pressed)\n          [self rightShoulderButtonAction];\n    };\n```\n\n\
    除了为每个动作设置回调外，您还可以同时在多个按钮之间共享回调。为此，创建一个新的代码块，并按照以下代码片段所示进行设置。对 A、B、X 或 Y 按钮的任何操作都将导致打印日志语句。\n\
    \n```\nvoid(^buttonHandler)(GCControllerButtonInput *, float, BOOL) = ^(GCControllerButtonInput\
    \ *button, float value, BOOL pressed)\n{\n    NSLog(@\"Handle action for %@ pressed:\
    \ %i, with value: %f\", button, pressed, value);\n};\n\nmyController.gamepad.buttonA.valueChangedHandler\
    \ = buttonHandler;\nmyController.gamepad.buttonB.valueChangedHandler = buttonHandler;\n\
    myController.gamepad.buttonX.valueChangedHandler = buttonHandler;\nmyController.gamepad.buttonY.valueChangedHandler\
    \ = buttonHandler;\n```\n\n也可以设置数据回调来处理方向键或拇指摇杆的轴值变化。为此，请使用以下代码片段：\n\n```\nmyController.extendedGamepad.rightThumbstick.valueChangedHandler\
    \ = ^(GCControllerDirectionPad *dpad, float xValue, float yValue)\n{\n    NSLog(@\"\
    Right Thumb Stick value did change: %f, %f\", xValue, yValue);\n};\n```\n\n# 暂停\n\
    \n如果你的游戏支持游戏控制器，那么它也必须支持所有游戏控制器上都有的暂停按钮。即使你的游戏之前不支持暂停，在连接了游戏控制器后，支持暂停也成为一个要求。处理游戏控制器上的暂停按钮非常简单，只需要额外几行代码：\n\
    \n```\nmyController.controllerPausedHandler = ^(GCController *controller)\n {\n\
    \     [self togglePauseState];\n };\n```\n"
- fmt: "## Player Indicator Lights\n\nWireless game controllers also feature player\
    \ indicator lights, as the Game Controller framework supports connecting multiple\
    \ controllers to a single device. Your game can support multiplayer functionality\
    \ using a single device through additional wireless controllers. Each wireless\
    \ controller will feature four LED lights, which will indicate the player number.\
    \ These lights are also used to let the user know they have successfully connected\
    \ a wireless controller, even in single-player mode. The following code illuminates\
    \ the first light of the wireless controller, letting the player know they are\
    \ successfully connected:\n\n```\nif(myController.playerIndex == GCControllerPlayerIndexUnset)\n\
    {\n        myController.playerIndex = 0;\n}\n```\n\nThe `playerIndex` property\
    \ can also be used to illuminate other player index values, from 0 to 3. Only\
    \ one player indicator light can be toggled on at a time per controller.\n\n##\
    \ Snapshotting\n\nIt may become necessary to create a snapshot of the controller\
    \ input state. This can be useful not only for debugging but also for creating\
    \ playback profiles or sending the controller data over a network. Snapshots are\
    \ stored through an `NSData` representation, as shown here:\n\n```\nGCGamepadSnapshot\
    \ *snapshot = [myController.gamepad saveSnapshot];\nNSData *snapshotData = snapshot.snapshotData;\n\
    ```\n\nOne of the benefits of a `GCGamePadSnapshot` is that it conforms as a subclass\
    \ of `GCGamePad`, so reading the data from it will not require any changes to\
    \ your game logic.\n\n## Summary\n\nIn this chapter you learned about the Game\
    \ Controller functionality of iOS 7, from the requirements of the framework to\
    \ connecting and reading data. This chapter also covered topics such as pausing,\
    \ player indicator lights, and snapshotting data. While these APIs are very new\
    \ and the hardware is not yet available, they open up a world of possibilities\
    \ for mobile gaming. Never before has there been a standardized input method for\
    \ game controllers for the iPhone and iPod. The addition of the Game Controller\
    \ framework is a large validation from Apple of the continuing trend of iOS gaming\
    \ and is the first step into these devices becoming the primary gaming machine\
    \ of the next generation. If you happen to be a Mac developer as well, the wireless\
    \ game controllers will also function for Mac-based games using the same code\
    \ and practices discussed in this chapter."
  raw: '## Player Indicator Lights


    Wireless game controllers also feature player indicator lights, as the Game Controller
    framework supports connecting multiple controllers to a single device. Your game
    can support multiplayer functionality using a single device through additional
    wireless controllers. Each wireless controller will feature four LED lights, which
    will indicate the player number. These lights are also used to let the user know
    they have successfully connected a wireless controller, even in single-player
    mode. The following code illuminates the first light of the wireless controller,
    letting the player know they are successfully connected:


    `if(myController.playerIndex == GCControllerPlayerIndexUnset)`


    `{`


            `myController.playerIndex = 0;`


    `}`


    The `playerIndex` property can also be used to illuminate other player index values,
    from 0 to 3\. Only one player indicator light can be toggled on at a time per
    controller.


    ## Snapshotting


    It may become necessary to create a snapshot of the controller input state. This
    can be useful not only for debugging but also for creating playback profiles or
    sending the controller data over a network. Snapshots are stored through an `NSData`
    representation, as shown here:


    `GCGamepadSnapshot *snapshot = [myController.gamepad saveSnapshot];`


    `NSData *snapshotData = snapshot.snapshotData;`


    One of the benefits of a `GCGamePadSnapshot` is that it conforms as a subclass
    of `GCGamePad`, so reading the data from it will not require any changes to your
    game logic.


    ## Summary


    In this chapter you learned about the Game Controller functionality of iOS 7,
    from the requirements of the framework to connecting and reading data. This chapter
    also covered topics such as pausing, player indicator lights, and snapshotting
    data. While these APIs are very new and the hardware is not yet available, they
    open up a world of possibilities for mobile gaming. Never before has there been
    a standardized input method for game controllers for the iPhone and iPod. The
    addition of the Game Controller framework is a large validation from Apple of
    the continuing trend of iOS gaming and is the first step into these devices becoming
    the primary gaming machine of the next generation. If you happen to be a Mac developer
    as well, the wireless game controllers will also function for Mac-based games
    using the same code and practices discussed in this chapter.'
  trans: "\n## 玩家指示灯\n\n无线游戏控制器还配备了玩家指示灯，因为游戏控制器框架支持将多个控制器连接到单一设备。你的游戏可以通过额外的无线控制器，利用单个设备实现多人游戏功能。每个无线控制器都会配备四个\
    \ LED 灯，用于指示玩家编号。这些灯也能让用户知道他们已成功连接无线控制器，即使在单人游戏模式下也是如此。以下代码会点亮无线控制器的第一个灯，让玩家知道他们已成功连接：\n\
    \n```\nif(myController.playerIndex == GCGameControllerPlayerIndexUnset)\n{\n \
    \       myController.playerIndex = 0;\n}\n```\n\n`playerIndex` 属性也可用于点亮其他玩家索引值，范围从\
    \ 0 到 3。每个控制器每次只能开启一个玩家指示灯。\n\n## 快照\n\n有时可能需要创建控制器输入状态的快照。这不仅有助于调试，还可用于创建回放配置文件或通过网络发送控制器数据。快照通过\
    \ `NSData` 表示形式存储，如下所示：\n\n```\nGCGamepadSnapshot *snapshot = [myController.gamepad\
    \ saveSnapshot];\nNSData *snapshotData = snapshot.snapshotData;\n```\n\n`GCGamePadSnapshot`\
    \ 的优点之一是，它作为 `GCGamePad` 的子类，因此从中读取数据无需对游戏逻辑进行任何更改。\n\n## 总结\n\n在本章中，你学习了 iOS\
    \ 7 的游戏控制器功能，从框架的要求到连接和读取数据。本章还涵盖了暂停、玩家指示灯和快照数据等主题。尽管这些 API 非常新，相关硬件尚未面市，但它们为移动游戏开启了无限可能。此前，iPhone\
    \ 和 iPod 从未有过标准化的游戏控制器输入方式。游戏控制器框架的加入，是 Apple 对 iOS 游戏持续发展趋势的有力认可，也是这些设备成为下一代主要游戏机的第一步。如果你恰好也是\
    \ Mac 开发者，无线游戏控制器也将使用本章讨论的相同代码和实践，在 Mac 游戏中发挥作用。\n"
