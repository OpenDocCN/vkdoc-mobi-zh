    \ UFOs[3000:207] All recent player activity: 3\n```\n\nSo now that we have player\
    \ activity for a specified player group, what do these numbers mean? Apple has\
    \ never specified the exact meaning of these numbers, but through careful research,\
    \ it appears that they represent the number of users who attempted to connect\
    \ to a game using the auto-matching feature in the last one to three minutes.\
    \ The numbers seem to reset at an undeterminable interval somewhere within that\
