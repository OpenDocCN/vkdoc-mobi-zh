    \ header file. Add the following two optional protocols.\n\n```\n- (void)playerActivity:(NSNumber\
    \ *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
    \ *)activityDict error:(NSError *)error;\n```\n\nImplement these new protocol\
    \ methods in your `UFOViewController` as follows:\n\n```\n- (void)playerActivity:(NSNumber\
    \ *)activity error:(NSError *)error\n{\n    if (error != nil) {\n        NSLog(@\"\
    An error occurred while querying player activity: %@\",\n        [error localizedDescription]);\n\
    \    } else {\n        NSLog(@\"All recent player activity: %@\", activity);\n\
    \    }\n}\n\n- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError\
