  trans: '

    # iOS 社交游戏入门


    ## 索引


    ### A, B


    - **成就系统**：添加钩子（`GameCenterManager.populateAchievementCache`）；在 UFO 中增加钩子（`achievementWithIdentifierIsComplete`）；苹果提供的界面（`didAuthenticate`、`finishAbducting`方法、`resetAchievement`方法、`UFOGameViewController`）

    - **苹果优势**：自定义图形用户界面

    - **图形用户界面**：自定义图形用户界面

    - **AchievementArray**（`GameCenterManager`、`NSArray`对象）

    - **UFOAchievementViewController**（`UFOViewController`、`UIViewController`）

    - **反馈机制**：`achievementCompletionLabel`、`achievementCompletionView`、`achievementEarned`方法；自定义横幅（`GameCenterManager`、`GKAchievement`、`IBOutlets`、`percentageComplete`、`submitAchievement:
    percentComplete`、`UIAlertView`）

    - **Foursquare**

    - **Game Center**：`GKAchievement`、`GKAchievementDescription`、`GKScore`对象、排行榜、程序化挑战、使用理由、重置、数据检索

    - **已获得描述**（`achievementArray`、`achievementWithIdentifierIsComplete`、`cellForRowAtIndexPath`方法）；自定义图形用户界面（`GameCenterManager`类、Game
    Center 服务器、`GKAchievementDescription`、`GKAchievement`对象、`loadImageWithCompletionHandler`、`numberOfRowsInSection`方法、`percentageComplete`、`percentageCompleteOfAchievementWithIdentifier`、`retrieveAchievementMetadata`方法、`submitAchievement:
    PercentComplete`、`textLabel`、`UFOAchievementViewController`、`unachievedDescription`、`userDefaults`、`viewWillAppear`）

    - **ShowsCompletionBanner**：基于时间的钩子（`tickThreeSeconds`、`UFOGameViewController`、`viewDidAppear`、`viewWillDisappear`）

    - **UITableViewCellSytleDefault**

    - **AddMultipartData**：方法

    - **AirPlay**：内置播放器（`AVPlayer`对象、元数据）；`MPMoviePlayerController`类；`MPNowPlayingInfoCenter`类；`remoteControlReceivedWithEvent`；`UIWebview`类；屏幕镜像（`MPVolumeView`类、通知）；第二屏幕（`hidden`属性、`playButtonPressed`方法、牵引光束事件、`UFOGameViewController`类）；宽屏、Apple
    TV

    - **应用程序编程接口**：自动匹配

    - **Clan Lord 游戏**：Composer 账户设置（`addURL:`方法、`completionHandler`属性、Game Center、`SLRequest`方法、`SLServiceTypeFacebook`创建）

    - **自定义推文**：`ACAccountype`账户、`endpoint`属性、`granted`变量、元数据（`NSData`、`postRequest`方法、`SLRequest`方法）、使用数组


    ### D


    - **委托回调**


    ### E


    - **数据交换**：`determineHost`方法；断线重连；多人模式的游戏引擎；`matchmakerViewController`；`peerIDString`与`peerMatch`；`generateAndSendHostNumber`方法；网络绑架代码（`abductCowFromNetworkAtIndex`、`beginTractorFromNetwork`、`endTractorFromNetwork`、`finishAbductingFromNetwork`、`hitTest`方法、修改、`touchesBegan:`与`touchesEnded:`方法、`updateCowPaths`方法）；选择主机；接收数据（`GameCenterManager`类、`receivedData`协议方法）；发送数据（`sendString`方法、`sendStringToAllPeers`方法）；分数共享；单人游戏修改；生成奶牛流程（`determineHost`方法、`receivedData`方法、`spawnCow`方法、修改）；同步奶牛移动（`updateCowPaths`方法）；UFO（`drawEnemyShipWithData`在`viewDidLoad`方法中、`movePlayer`方法、已更新、`receivedData`方法、使用`stringWithFormat`、`exitAction:`方法）


    ### F


    - **Facebook**：Composer 账户设置（`addURL:`方法、`completionHandler`属性、Game Center、`SLRequest`方法、`SLServiceTypeFacebook`创建）；自定义帖子（`ios`）；JSON
    对象；新 iOS 创建；权限（`ACAccountStore`电子邮件属性、高级权限、低级权限、`publish-to-stream`权限）；UFO 请求；UFO
    警告视图委托（`exitAction:`方法）；包装类


    ### G


    - **Game Center**：`authentication`（`callDelegateOnMainThread:`方法、来自`UFOViewController`的`delegate`属性、`GameCenterManager`类）；iOS
    6；iOS 6 之前版本；好友列表（`avatars`、`Game Center.app`、`GameKit.framework`、`GKLocalPlayer`对象、`GKPlayers`、`retrieveFriendsList`、`callDelegateOnMainThread`方法、`loadFriendsWithCompletionHandler`方法、沙盒状态变更）；测试（`gcClass`、`NSClassFromString`）

    - **游戏控制器**：数据回调；指示灯；问题；罗技；暂停按钮；数据读取与轮询；加速度计数据（`extendedGamePad`控件、`NSTimer`、`touchesBegan:`方法、牵引光束动作）；快照；类型（扩展控制器、标准控制器）；无线控制器（`controller`数组、`GCControllerDidConnectNotification`、`setupControllers:`方法、`startWirelessControllerDiscoveryWithCompletionHandler`、UFO
    主屏幕、`viewDidLoad:`方法）

    - **Game Kit**：网络与语音聊天；Game Kit 网络（`Bistromath`、握手、会话、蓝牙）；`GSessionDelegate`协议；限制；点对点网络；范围与数据传输速率；`GKVoiceChatService`类

    - **图形用户界面**：添加与移除玩家；取消与失败（`GKMatch`对象）；邀请好友与游戏（`iTunes Connect`、`MatchmakerViewController`创建、推送通知、`UFOViewController.xib`）


    ### H


    - **HTTP 响应**


    ### I, J, K


    - **应用内购买**：App ID；最畅销游戏；开发者审批；`Submit Now`选项；`Submit with Binary`选项；免费模式；UFO
    中的 GUI 截图（代码片段、`viewDidLoad`方法）；iOS 收据验证（`GUID`、`NSApplicationMain`函数、`NSBundle`）；iTunes
    Connect 配置（自动续期订阅、消耗型商品、初始配置、本地化描述、`manage`按钮、非消耗型商品、非续期订阅、截图、设置、订阅时长、产品展示、`productArray`类、`productsList`方法、`UITableViewCellStyleSubtitle`）；购买代码（沙盒、`SKPaymentTransactionObserver`协议、`UFOStoreViewController`类、`UIAlert`、购买多个商品、收据、沙盒服务器地址、`verifyReceipt`方法、`restoreCompletedTransactions`、获取产品列表、`viewDidLoad`方法、`viewDidUnload`方法、沙盒设置、`SKProductsRequestDelegate`、`StoreKit`框架、`UFOStoreViewController`、测试账户、登录）；最高收入应用下载；交易流程（`finishTransaction`方法、`NSUserDefaults`、`recordTransactionData`方法、`SKPaymentTransactionObserver`、`unlockContent`方法）；ngmoco
    的`We Rule`（`We Rule`内置商店）

    - **邀请**：`acceptInvite`参数（`GameCenterManager`类、`GKMatchmakerViewController`、`match:player:didChangeState`、`playersToInvite`参数、沙盒、`UFOViewController`）

    - **iTunes Connect**：成就进度；成就配置（`Achievement ID`属性、`Achievement Reference Name`属性、Game
    Center 门户、`Hidden`属性、`Points`属性）；配置成就（创建成就"绑架 25 头奶牛"、`Earned Description`属性、`Image`属性、`Language`属性、`Pre-earned
    Description`属性、`Title`属性）；Game Center 配置（`GameCenterManager`落地页）；加载成就（`earnedAchievementCache`、`GkAchievement`、`loadAchievementsWithCompletionHandler`、`percentComplete`、`reportAchievementWithCompletionHandler`、`submitAchievement:
    percentComplete`方法、修改）；成就进度；成就展示；苹果默认 GUI；苹果未获得成就图标（`GKAchievementViewController`、`GKGameCenterViewController`、`IBAction`触发器、`UFOViewController`、`UIButton`）


    ### L


    - **排行榜**：挑战；自定义（`GameCenterManager`类、`gcManager`、`retrieveScore`方法、分段控件）；Game
    Center 默认设置；苹果排行榜 GUI；自定义 GUI（`GKScore`对象、`GameCenterManager`类、`GKLeaderboardSet`）；高分方法；基于分数的系统；分数提交失败；基于计时器的系统（`UFOGameViewController`）；在
    iTunes Connect 中（添加新排行榜、组合排行榜、分数格式类型）；本地玩家分数（`Player IDs`、`cellForRow`方法、`GameCenterManagerDelegate`、`GKPlayer`对象、`NSMutableArray`、`playerNameforID`）；提交分数；展示（苹果
    GUI、社交应用或游戏中的自定义 GUI）


    ### M


    - **匹配机制**：自动匹配（`findMatchesForRequest`、`GKMatchmakerViewController`、`GKMatchRequest`、`GKMatchRequest`对象）；GUI
    添加与移除玩家；取消与失败（`GKMatch`对象）；邀请好友与游戏（`iTunes Connect`、`MatchmakerViewController`创建、推送通知、`UFOViewController.xib`）；邀请（参见"邀请"）；玩家属性（Game
    Center、`GameCenterManager`类、分组、主持匹配、限制、`playerGroup`属性、协议、规则、场景）；最畅销 PC 游戏；元数据；屏幕镜像


    ### N, O


    - **网络设计**：反作弊（`Clan Lord`）；客户端-主机网络（优势、可视化表示）；专用服务器（无头客户端）；混合网络；保活消息；网状/部分网状网络（数据包可靠性属性——排序属性、优先级属性、重试属性）；点对点网络（缺点、可视化表示、弱点与缺陷）；预测与推断；环形网络；数据发送；状态与服务器消息；`沉没成本谬论`；超时相关断线；树形网络


    ### P, Q


    - **Peer 选择器**：蓝牙对等设备优势；传入对等设备；查找 UIAlert；等待连接；启用蓝牙提示；Game Center 网络（`Bistromath`、握手、`GKPeerPickerConnectionTypeNearby`、`GKPeerPickerConnectionTypeOnline`、`GKPeerPickerControllerDelegate`、`peerPickerController`、`GKSession`对象、`localMultiplayerGameButtonPressed`）

    - **权限**：`ACAccountStore`电子邮件属性；高级权限；低级权限；`publish-to-stream`权限；UFO 请求；`PlayerIndex`属性


    ### R


    - **数据读取与轮询**：加速度计数据（`extendedGamePad`控件、`NSTimer`、`touchesBegan:`方法、牵引光束动作）


    ### S


    - **Sea Wolf 游戏**

    - **第二屏幕**：`hidden`属性；`playButtonPressed`方法；牵引光束事件；`UFOGameViewController`类；宽屏、Apple
    TV

    - **SLComposeViewController**

    - **快照**

    - **社交游戏**

    - **沉没成本谬论**


    ### T


    - **回合制游戏**：`GKTurnedBasedEventHandler`（`handleInviteFromGameCenter`、`handleMatchEnded`、`handleTurnEventForMatch`）；`GKTurnedBasedMatchmakerViewController`委托方法；`GKLocalPlayer`；`GKMatchRequest`；回合制比赛（基于比赛的代码片段、完成表单、`NSData`、`NSPropertyListSerialization`、`participants`数组、比赛结束`checkWinner`、`GKTurnBasedMatchOutcomeLost`、`GKTurnBasedMatchOutcomeWon`、`makeMove`方法）；基于导航控制器的项目（`authentication`方法、`delegate`方法、`GameCenterManager`类、游戏视图、`GKTurnedBasedMatchmakerViewController`的`IBAction`方法、井字游戏、`viewDidLoad`方法、`NSTimeInterval`、玩家交换、`initiator`、`recipients`、玩家提醒、玩家超时、程序化比赛、进度游戏数据字典、`gameDictionary`、比赛数据、退出或认输）；井字游戏示例应用（`IBAction`方法、界面构建器、`makeMove`方法、`tictactoeGameViewController`类）

    - **与好友拼词**：Tweet Composer（`addImage`、`addURL`、`completionHandler`属性、缺点、`setInitialText`、`SLComposeViewController`、`SLServiceTypeTwitter`、网站）；Twitter
    自定义推文（`ACAccountype`账户、`endpoint`属性、`granted`变量、元数据、`NSData`、`postRequest`方法、`SLRequest`方法、使用数组）；iOS
    7 Tweet Composer（`addImage`、`addURL`、`completionHandler`属性、缺点、`setInitialText`、`SLComposeViewController`、`SLServiceTypeTwitter`、网站）；UFO
    的`alertView`设置（`exitAction`函数）

    - **类型**：扩展控制器；标准控制器


    ### U


    - **UFO**：`abductCow`方法；`accelerometer`委托、设置（`viewDidLoad`方法）；警告视图委托（`exitAction:`方法）；文件结构；游戏视图组树结构（`UFOAppDelegate.h`与`UFOAppDelegate.m`文件）；组视图结构（`UFOGameViewController.m`文件）；`hitTest`方法；`insertSubview`方法；iTunes
    Connect 配置；`movePlayer`方法；`myPlayerImageView`；目标；分数标签；`shouldAutorotateToInterfaceOrientation`；生成与移动奶牛；`touchesBegan`事件；`UIAlert`；URL


    ### V


    - **语音聊天**：音频会话（Game Kit 的`channels`）；添加麦克风（`AVAudioSession`、`AVFoundation.framework`）；`GKVoiceChatClient`；对`GameCenterManager`类的修改；发送与接收语音数据；`setupVoiceChat`；`UFOVoiceChatClient`；`GKMatch`监控玩家状态变化；启动与停止方法；音量和静音；网络语音电话


