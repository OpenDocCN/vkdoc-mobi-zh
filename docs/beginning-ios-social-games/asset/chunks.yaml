- fmt: "### Displaying the Enemy UFO\n\nThe first thing we need to do is detect whether\
    \ this is a multiplayer game, and if so, we need to draw the enemy UFO in the\
    \ `viewDidLoad` method of `UFOGameViewController`. You will notice that this is\
    \ exactly the same code we use for drawing the player in single-player mode, except\
    \ that we use a different graphic asset:\n\n```\n-(void)viewDidLoad\n{\n    if\
    \ (self.gameIsMultiplayer)\n    {\n        CGRect otherPlayerFrame = CGRectMake(100,\
    \ 70, 80, 34);\n        otherPlayerImageView = [[UIImageView alloc] initWithFrame:otherPlayerFrame];\n\
    \        otherPlayerImageView.animationDuration = 0.75;\n        otherPlayerImageView.animationRepeatCount\
    \ = 99999;\n        NSArray *imageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed:@\"EnemySaucer1.png\"], [UIImage imageNamed: @\"EnemySaucer2.png\"\
    ], nil];\n        otherPlayerImageView.animationImages = imageArray;\n       \
    \ [otherPlayerImageView startAnimating];\n        [self.view addSubview: otherPlayerImageView];\n\
    \    }\n}\n```\n\nIf we were to run the game on two devices and begin a new multiplayer\
    \ game, we would now see a red enemy UFO that just sits in the sky. The next step\
    \ is to send our movement data to our peer so that they can update where the enemy\
    \ player is. To do so, we add a new code snippet to the end of our `movePlayer`\
    \ method:\n\n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n{\n\
    \    //... (Existing Move Player Code)\n    if (self.gameIsMultiplayer)\n    {\n\
    \        NSString *positionString = [NSString stringWithFormat:@\"$PlayerPosition:\
    \ %f %f\", playerFrame.origin.x, playerFrame.origin.y];\n        [self.gcManager\
    \ sendStringToAllPeers:positionString reliable:NO];\n    }\n}\n```\n\nThis code\
    \ sends your player’s x and y coordinates to the peer every time you move. The\
    \ data will be sent as unreliable, since if we fail, we can just use the next\
    \ packet; the data will always be updating while the player is moving. This would\
    \ be a great place to use predictive technology, as discussed in [Chapter 7](#A978-1-4302-4906-1_7_Chapter.html),\
    \ but for simplicity’s sake, we will be syncing every frame. In addition, there\
    \ are better ways to send the x and y coordinates to another device, such as a\
    \ dictionary or custom data format. However, encoding them into a string is the\
    \ easiest to understand. As you develop your game or app, you can design this\
    \ type of function to be more streamlined with less overhead.\n\n**Tip:** Using\
    \ `stringWithFormat` carries with it a lot of overhead. In practice, you should\
    \ use methods such as `stringByAppendingString` to further optimize this type\
    \ of code.\n\nWe also need to update our `receivedData` method to handle the new\
    \ type of data we are expecting. Modify that method to match the new one as follows.\
    \ In addition, we add a new method to parse the incoming data. Also add a new\
    \ method called `drawEnemyShipWithData`, as follows:\n\n```\n- (void)receivedData:(NSDictionary\
    \ *)dataDictionary;\n{\n    if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $Host:\"])\n    {\n        [self determineHost: dataDictionary];\n    }\n    else\
    \ if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$PlayerPosition:\"\
    ])\n    {\n        [self drawEnemyShipWithData: dataDictionary];\n    }\n    else\n\
    \    {\n        NSLog(@\"Unable to determine type of message: %@\", dataDictionary);\n\
    \    }\n}\n\n-(void)drawEnemyShipWithData:(NSDictionary *)dataDictionary\n{\n\
    \    NSArray *dataArray = [[dataDictionary objectForKey: @\"data\"] componentsSeparatedByString:@\"\
    \ \"];\n    float x = [[dataArray objectAtIndex: 1] floatValue];\n    float y\
    \ = [[dataArray objectAtIndex: 2] floatValue];\n    otherPlayerImageView.frame\
    \ = CGRectMake(x, y, 80, 34);\n}\n```\n\nThe updated `receivedData:` method parses\
    \ the incoming data from the network. We pull the x and y coordinates out of the\
    \ string that we received and update the enemy player’s frame with the new position\
    \ using the `drawEnemyShipWithData:` method. This approach syncs the two devices\
    \ frame by frame and is very inefficient. Given more time, this method should\
    \ be updated to use predictive technology to determine where the player is heading,\
    \ and only update the feed if the player goes against the prediction. However,\
    \ for the purposes of this demo, it suits our needs. For more information on predictive\
    \ networking see [Chapter 7](#A978-1-4302-4906-1_7_Chapter.html).\n\nIf you were\
    \ to run the game now and begin a new multiplayer game, you would see that each\
    \ device reflects the movement of its partnered device. We still need to spawn\
    \ the cows, add the tractor beam, and update the scores, but we have a functional\
    \ (albeit dull, for the time being) multiplayer game, as shown in Figure [8-1](#A978-1-4302-4906-1_8_Chapter.html#Fig1).\n\
    \n![A978-1-4302-4906-1_8_Fig1_HTML.jpg](A978-1-4302-4906-1_8_Fig1_HTML.jpg)\n\n\
    **Figure 8-1.** Adding a second player to UFOs. Each player can move around independently\
    \ and is kept in sync through the network."
