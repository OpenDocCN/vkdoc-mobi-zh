    \ *)voiceChatService\n    didStartWithParticipantID:(NSString *)participantID\n\
    {\n    NSLog(@\"已开始邀请\");\n}\n\n@end\n```\n\n**注意：** 确保你的 `voiceChatClient` 遵循\
    \ `GKVoiceChatClient` 协议。\n\n你还需要对 `GameCenterManager` 类进行一些细微的修改，以处理传入的语音数据。将现有的\
    \ `receiveData:fromPeer:inSession:Context:` 方法修改如下：\n\n```\n- (void)receiveData:(NSData\
    \ *)data fromPeer:(NSString *)peer inSession: (GKSession\n    *)session context:(void\
    \ *)context;\n{\n    NSString *dataString = [[NSString alloc] initWithData:data\n\
    \        encoding:NSUTF8StringEncoding];\n    if (dataString == nil)\n    {\n\
    \        [[GKVoiceChatService defaultVoiceChatService] receivedData:data\n   \
    \         fromParticipantID:peer];\n        [dataString release];\n        return;\n\
    \    }\n    NSArray *objects = [NSArray arrayWithObjects:dataString, peer, session,\
    \ nil];\n    NSArray *keys = [NSArray arrayWithObjects: @\"data\", @\"peer\",\
    \ @\"session\", nil];\n    NSDictionary *dataDictionary = [NSDictionary dictionaryWithObjects:objects\
    \ forKeys:keys];\n    [dataString release];\n    [self callDelegateOnMainThread:\
    \ @selector(receivedData:) withArg: dataDictionary\n        error: nil];\n}\n\
    ```\n\n注意我们添加了另一段代码，用于处理将数据传递给我们的 `defaultVoiceChatService` 客户端。如果我们无法从 `NSData`\
    \ 中解码出字符串，我们就判断该数据是否为语音数据。你的应用可能更复杂，可能需要一个前缀或其他类型的设计符来确定数据是否为语音，但对于 UFOs 这样简单的游戏来说，这种方法非常合适。\n\
    \n我们需要做的最后一件事是连接一个操作，以开启和关闭麦克风。我决定在 UFOs 中使用一个简单的切换按钮，但你可能会觉得需要实现不同的方法。添加一个新的按钮，如图\
    \ 10-1 所示，并连接接下来发布的新操作。\n\n![A978-1-4302-4906-1_10_Fig1_HTML.jpg](img/A978-1-4302-4906-1_10_Fig1_HTML.jpg)\n\
    \n*图 10-1.* 在我们的 UFO 游戏演示中添加一个麦克风按钮\n\n```\n-(IBAction)startVoice:(id)sender;\n\
    {\n    micOn = !micOn;\n    if (micOn)\n    {\n        [micButton setTitle:@\"\
    麦克风开\" forState:UIControlStateNormal];\n        //GameKit\n        if (self.peerIDString)\n\
    \        {\n            [GKVoiceChatService defaultVoiceChatService].microphoneMuted\
    \ =\n                NO;\n        }\n        //Game Center\n        else\n   \
    \     {\n            mainChannel.active = YES;\n        }\n    }\n    else\n \
    \   {\n        [micButton setTitle:@\"麦克风关\" forState:UIControlStateNormal];\n\
    \        //GameKit\n        if (self.peerIDString)\n        {\n            [GKVoiceChatService\
    \ defaultVoiceChatService].microphoneMuted =\n                YES;\n        }\n\
    \        //Game Center\n        else\n        {\n            mainChannel.active\
    \ = NO;\n        }\n    }\n}\n```\n\n该方法确定麦克风的当前状态（开/关），并将其切换到新状态。发生这种情况时，我们会更新按钮标题，并根据我们使用的网络类型打开或关闭麦克风。\n\
    \n这些是将语音聊天功能添加到我们 UFOs 示例项目中所需的所有步骤。如果你在两台设备上运行游戏，将能够通过语音双向通信。\n\n**注意：** 从说话到在对等设备上接收到语音数据的延迟可能在\
    \ 500 毫秒到数千毫秒之间。\n\n## 总结\n\n在本章中，你学习了如何以极少的代码工作，将一项传统上非常复杂的技术集成到我们的 iOS 应用中。我们探讨了在\
    \ Game Kit 和 Game Center 上使用语音聊天的差异，并在我们的 UFOs 演示游戏中实现了两个系统的示例。现在你已经掌握了为任何 iPhone\
    \ 或 iPad 应用添加全功能 VOIP 技术所需的技能。如果你一直在从头开始阅读本书，那么你现在已经具备在你的应用中实现 Game Kit 和 Game\
    \ Center 所有方面所需的所有技能。\n\n在下一章中，我们将探讨编写 iOS 游戏或应用时的另一项重要技术——StoreKit。利用 `StoreKit`\
    \ 技术，我们将探索如何为你的产品销售额外的功能和附件。"
- fmt: '# 11. In-App Purchase with StoreKit


    ## Abstract


    You don’t close a sale, you open a relationship if you want to build a long-term,
    successful enterprise.


    > —Patricia Fripp


    Throughout this book so far, we have been working with both Game Center and Game
    Kit to add rich social networking into your apps. However, there is another important
    feature slowly becoming more popular in modern software: in-app purchases. Allowing
    your users to purchase upgrades or additional content for your app, from directly
    within your app, opens up a potentially significant new revenue stream. Over the
    past few years, a new business model has emerged called freemium. Freemium is
    a new type of game or product that is offered to your users for free, but is monetized
    through selling add-ons. The 100 Top Grossing apps on the App Store consist mostly
    of free apps; when this chapter was written, 81 of the 100 Top Grossing apps were
    all free to download, seen in Figure 11-1.


    ![A978-1-4302-4906-1_11_Fig1_HTML.jpg](A978-1-4302-4906-1_11_Fig1_HTML.jpg)


    *Figure 11-1. Top Grossing apps on the App Store, showing the dominance of the
    free-to-play model*


    Let’s consider the popular We Rule by ngmoco:) as an example of a highly successful
    free-to-play game. The game is free to download and play on both iPhones and iPads.
    Each user is in control of a virtual kingdom, in which they are responsible for
    constructing buildings and growing crops. The user generates “mojo” over time
    and can use that in-app currency to create new structures and farms. However,
    some users want to construct faster than is normally allowed because of the restrictive
    nature of mojo, which accumulates slowly.


    These power users can visit the in-app store to purchase more mojo in bulk. Shown
    in Figure 11-2 is We Rule’s built-in store. It offers a number of purchases ranging
    from very affordable to shockingly expensive. It is important to cater to both
    types of users when working with sellable add-ons. Some of your users will be
    interested in spending one or two dollars occasionally, while others will be power
    users who want to spend one hundred dollars, or more, at a time.


    ![A978-1-4302-4906-1_11_Fig2_HTML.jpg](A978-1-4302-4906-1_11_Fig2_HTML.jpg)


    *Figure 11-2. The in-app purchase store, as seen in We Rule by ngmoco:)*


    The freemium model has become such a profitable approach that ngmoco:) has stopped
    working on games that do not fit into the model, going so far as to even cancel
    Rolando 3 in mid-development because it couldn’t be adapted to a freemium-type
    game. The model appears to be paying off well for ngmoco:). As shown in Figure
    11-3, the current highest-selling item in the We Rule store costs $9.99. This
    one in-app purchase is retailing for more than most stand-alone iOS games. It
    is able to get that sale because the customer becomes committed to the game while
    it is free.


    Not all games or apps supported by in-app purchase need to be free. In fact, until
    recently, you were not allowed to implement in-app purchase in free apps. You
    can easily add additional features or unlocks in a paid game, such as the Mighty
    Eagle in Angry Birds. In-app purchase is also not only just for games. Almost
    any software can benefit from it, whether you are unlocking pro-level features
    or charging users a subscription for push notification support. Throughout this
    chapter we will explore how to add a full-featured in-app store to your iOS software.


    ![A978-1-4302-4906-1_11_Fig3_HTML.jpg](A978-1-4302-4906-1_11_Fig3_HTML.jpg)


    *Figure 11-3. Current listing of the best-selling in-app purchases for We Rule
    by ngmoco:)*


    ## Setting Up Your App in iTunes Connect


    As with Game Center, the first step is a visit to iTunes Connect to configure
    your app for purchases.


    Log in to iTunes Connect ([http://itunesconnect.apple.com](http://itunesconnect.apple.com/)),
    as discussed in Chapter 2. You will need an existing project to work on. If you
    don’t have a project created in iTunes Connect yet, go ahead and create one. Select
    the project to which you want to add in-app purchase support. Then, click the
    button called Manage In-App Purchases, as shown in Figure 11-4.


    > **Important:** You have 90 days from creating an app to upload a binary for
    review. Make sure to save the in-app purchase configuration until you are within
    90 days of finishing your project.


    ![A978-1-4302-4906-1_11_Fig5_HTML.jpg](A978-1-4302-4906-1_11_Fig5_HTML.jpg)


    *Figure 11-5. Setting up your first in-app purchase in iTunes Connect*


    Selecting the Manage In-App Purchases button will bring you to a screen for setting
    up a new product, as shown in Figure 11-5. Once there, click the Create New button
    in the upper-left corner of the window.


    ![A978-1-4302-4906-1_11_Fig4_HTML.jpg](A978-1-4302-4906-1_11_Fig4_HTML.jpg)


    *Figure 11-4. App listing in iTunes Connect showing Manage In-App Purchases button*


    There are several types of in-app purchase products that you can configure:


    * **Non-Renewing Subscriptions:** For the most part, renewable subscriptions have
    eliminated the need for this model. A non-renewing subscription functions the
    same as an auto-renewable subscription, except that a user is required to renew
    it every time it is set to expire.


    ![A978-1-4302-4906-1_11_Fig7_HTML.jpg](A978-1-4302-4906-1_11_Fig7_HTML.jpg)


    *Figure 11-7. Setup screen for auto-renewable purchases in iTunes Connect*


    * **Non-Consumables:** A non-consumable purchase needs to be purchased only once
    by each user, and is often used for unlockable features. Examples of non-consumable
    purchases include additional levels, reusable power-ups, or additional content.
    The setup screen is the same as for consumables.

    * **Auto-Renewable Subscriptions:** An auto-renewable subscription allows the
    user to purchase in-app content for a set duration of time. At the end of that
    time, the subscription will automatically renew and charge the customer unless
    they opt out. Magazines and newspapers follow this model, delivering a new issue
    every week or month until the user opts out. Figure 11-7 shows the auto-renewable
    purchase setup screen.


    ![A978-1-4302-4906-1_11_Fig6_HTML.jpg](A978-1-4302-4906-1_11_Fig6_HTML.jpg)


    *Figure 11-6. Setup screen for both consumable and non-consumable purchases in
    iTunes Connect*


    * **Consumable:** A consumable in-app purchase must be purchased every time the
    user downloads it. These include in-game currency, as we saw in the We Rule example
    in the previous section. Figure 11-6 shows the consumable purchase setup screen.


    > **Note:** Auto-renewable subscriptions will be sent to all devices associated
    with the user’s Apple ID.


    We will begin by adding a non-consumable purchase item to our sample UFO game.


    The first item we want to add is a paid upgrade to the user’s current ship; name
    the item `com.dragonforged.ufo.newShip1`. In this example the same title is used
    for both the product ID and the reference name. The reference name is used when
    searching in iTunes Connect, whereas the product ID is what will be used in your
    code base to identify this item.


    After you have created a new item, you need to add at least one localized description
    and title, as shown in Figure 11-8. The last thing that you need to do is select
    a pricing tier for this item. You might have also noticed that there is a section
    for uploading a screenshot; this will be discussed in the later section “Submitting
    a Purchase GUI Screenshot.”'
