  trans: '

    ### 使用自有服务器（托管比赛）


    在通常情况下，Game Center 会为您托管比赛；然而，Apple 提供了一种技术，允许您实现自己的服务器来托管比赛。这种方法被称为“托管比赛”，可以在任何应用中实现，为基于
    Game Center 的多人在线网络功能增加更多灵活性。


    当使用 Game Center 托管比赛时，每台连接到比赛的设备都会创建一个 `GKMatch` 实例。`GKMatch` 类负责完成连接、握手、发送和接收数据以及处理错误等所有繁重工作。但有时您需要实现自己的服务器，最典型的场景是当您希望允许多于四人同时连接到同一比赛时。在这种情况下，您可以使用
    Game Center 为比赛查找玩家，并使用自己的服务器来连接这些玩家。


    > **提示：** 使用托管比赛最多可连接 16 名用户，而使用 Game Center 托管时只能连接四名。


    不过，使用自有服务器也存在一些缺点，最显著的是，您现在需要负责之前由 Game Center 免费提供的所有底层工作。具体来说，您需要处理以下事项：


    - 您必须自行设计并实现所有网络代码来连接玩家。Game Center 会为您查找比赛，但其作用到此为止。

    - 如果您的应用使用标准匹配界面，则您的服务器必须在有新玩家成功连接时通知应用，以便更新图形用户界面。

    - 语音聊天功能不再免费提供。不过，您仍然可以使用 `GKVoiceChatService` 类通过自己的网络系统发送语音数据。更多信息请参阅第 9 章。


    为了在设备端支持托管比赛，我们需要对代码库进行少量修改。首先，我们修改本章前面设置的多人按钮操作方法。


    ```

    - (IBAction)multiplayerButtonPressed


    {


    GKMatchRequest *request = [[GKMatchRequest alloc] init];


    request.minPlayers = 2;


    request.maxPlayers = 4;


    GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];


    [request release];


    mmvc.matchmakerDelegate = self;


    mmvc.hosted = YES;


    [self presentViewController:mmvc animated:YES completion:NULL];


    [mmvc release];


    }

    ```


    如您所见，我们新增了一行代码——`mmvc.hosted = YES`——这告诉匹配界面 GUI，该比赛将托管在我们自己的服务器上。除了将 `matchmakerViewController`
    设置为 `hosted` 之外，您还需要让每台设备连接到您的服务器。本节不涉及如何编写服务器端代码，因为这里可以采用数十种语言和方法。不过，在设备连接到您的服务器后，它需要使用加入玩家的
    `playerID` 调用以下方法。


    ```

    [matchmakerViewController setHostedPlayerReady: playerID ];

    ```


    这将更新所有已连接玩家屏幕上的 GUI，告知他们新玩家已准备好开始比赛。当所有玩家都连接到您的服务器并确认准备就绪后，您的委托方法会被调用来开始游戏。在使用
    Game Center 比赛时，我们使用委托回调 `matchmakerViewController:didFindMatch:` 来开始比赛。但对于托管游戏，我们使用以下方法：


    ```

    - (void)matchmakerViewController:(GKMatchmakerViewController *)viewController
    didFindPlayers:(NSArray *)playerIDs


    {


    [self dismissModalViewControllerAnimated:YES];


    NSLog(@"Players: %@", playerIDs);


    //开始托管游戏


    }

    ```


    此时，您可以开始游戏，由您的服务器处理已连接玩家之间的通信。此外，您还可以像本章前面介绍的 Game Center 托管比赛那样，以编程方式开始托管比赛。


    ```

    - (void)findProgrammaticHostedMatch


    {


    GKMatchRequest *request = [[GKMatchRequest alloc] init];


    request.minPlayers = 2;


    request.maxPlayers = 16;


    [[GKMatchmaker sharedMatchmaker] findPlayersForHostedMatchRequest:request withCompletionHandler:^(NSArray
    *playerIDs, NSError *error) {


    if (error) {


    NSLog(@"查找比赛时发生错误: %@", [error localizedDescription]);


    } else if (playerIDs != nil) {


    NSLog(@"已为比赛找到玩家: %@", playerIDs);


    }


    }];


    [request release];


    }

    ```


    如您所见，这与我们之前的方法非常相似，但不同的是，我们不再获得 `GKMatch` 对象，而是返回一个 `playerIDs` 数组。您还会注意到，我们可以将最大玩家数增加到
    16 人。


    ### 总结


    本章向您介绍了比赛匹配和邀请的概念。我们讨论了为您的 iOS 应用或游戏增加多人游戏功能的巨大优势，以及在此过程中可能需要克服的一些障碍。我们探讨了从呈现标准
    Apple GUI 到使用玩家分组和玩家属性进行高度自定义匹配的整个匹配流程。我们还回顾了如何处理各种可能场景下的邀请，以及如何查询玩家活动。最后，我们发现了如何实现自己的服务器来消除
    Game Center 的一些限制。我们扩展了可重用的 `GameCenterManager` 类，使其能够处理比赛匹配、邀请以及所需的开销，以便您可以快速为应用添加多人游戏功能。


    在本章中，我们深入探讨了如何创建比赛并为比赛填充玩家。在接下来的章节中，我们不仅将学习如何在玩家之间进行通信，还将探索查找通信玩家的新方法。下一章将介绍如何使用
    Game Kit 通过 Peer Picker 查找玩家。


    # 对等选择器


    > **摘要：**“我坚信，任何能够增强沟通的工具，都会对人们相互学习以及实现他们所追求的自由产生深远的影响。”

    >

    > ——比尔·盖茨


    在上一章中，我们探讨了如何使用 Game Center 查找比赛。在本章中，我们将了解 iOS 提供的另一种用于查找可连接玩家的系统。该系统称为对等选择器，可用于通过蓝牙或本地
    Wi-Fi 网络（局域网）在两个 iOS 设备之间建立连接。


    在我们开始编写实际代码之前，先快速回顾一下 Game Kit 和 Game Center 的发展历史。当 Apple 发布 iOS 3.0（当时称为 iPhone
    OS 3.0）时，它实现了一套新的 API 调用，统称为 Game Kit。在 3.0 时代，Game Kit 负责处理蓝牙、局域网联网和语音聊天服务。当
    Game Center 在 iOS 4.0/4.1 中加入时，它为 Game Kit 带来了显著的改进。Game Center 实际上可以看作是 Game
    Kit 的扩展，而不是一个全新的 API。从 iOS 5 到 iOS 6 和 iOS 7，Game Kit 的网络功能和对等选择器基本保持不变。


    在本章中，我们将学习如何使用蓝牙和 Wi-Fi 局域网建立新连接。在第 8 章中，您将学习如何使用共享方法发送数据，无论玩家是通过 Game Center
    还是 Game Kit 找到的。

    '
- fmt: '# Benefits of the Peer Picker


    Since the introduction of iOS 4.0, Game Kit networking has been generally neglected
    by the developer community. This is a great injustice, as Game Kit remains an
    extraordinarily helpful and useful tool for iOS developers. Game Kit remains the
    easiest way to add peer-to-peer, two-person networking to an iOS app.


    In most of the multiplayer apps that I have developed, I have implemented both
    systems of iOS networking. Game Center networking and Game Kit networking each
    have different strengths and weaknesses, and it is normally easier to provide
    both to your users than to be forced into a corner by the limitations of one.
    The following list offers some reasons for including both concurrently:


    - Your users might not have access to an outside network connection, but still
    want to engage in multiplayer activity. Such a scenario might occur with passengers
    in a car or in a plane that allows Bluetooth devices to be turned on during the
    flight.

    - You might want to allow users to connect easily to other nearby (location-based)
    users. Although this can be done through player groups with Game Center, it is
    much easier to do with Game Kit.

    - You are looking for a lower-latency connection between two devices.

    - You want to target users who have iPod touches or Wi-Fi iPads who might not
    have consistent access to Wi-Fi or might have no access to a cellular network.

    - Implementing Game Kit networking is quicker and easier than a full multiplayer
    system done with Game Center.


    As you can see, the Peer Picker approach to finding peers has some important differences
    from the Game Center matchmaker system. There is nothing in place to stop you
    from implementing both, and that approach is highly encouraged at least by me,
    if not by Apple as well.


    In the upcoming chapters, you will learn some methods for making it easy to have
    both systems side by side. However, if you choose to implement only one or the
    other, carefully consider your options for which one will better suit the needs
    of your users. For example, if you have an app that sends your band’s MP3 to people
    you meet, Game Kit would be the better approach.


    # Real-World Examples


    Since the release of iOS 3.0, we have seen Game Kit networking used in very unexpected
    ways. In this section we discuss some of the notable examples of apps that use
    Game Kit networking to enhance user experience. Both of the apps that I show you
    in this section are better suited for Game Kit networking than for Game Center
    networking.


    First, let’s take a look at Bistromath (see Figure [6-1](#A978-1-4302-4906-1_6_Chapter.html#Fig1))
    from Black Pixel. The central purpose of this app is to split up a bill among
    multiple diners at a restaurant. This idea has been done to death on the iPhone,
    and there are literally dozens of apps on the App Store that provide this service.
    Bistromath remains hugely popular, even at a higher price than the free competition.
    Why is this?


    Bistromath sets itself apart. Not only is it well designed and visually appealing,
    but it offers something that no other check splitter does: Game Kit networking.
    Bistromath uses Game Kit to establish a Wi-Fi or Bluetooth connection between
    multiple devices, allowing a user to log in to the “host” app and enter his or
    her meal items.


    ![A978-1-4302-4906-1_6_Fig1_HTML.jpg](A978-1-4302-4906-1_6_Fig1_HTML.jpg)


    Figure 6-1.


    Bistromath from Black Pixel, which uses Game Kit networking to split checks


    This simple feature has put Bistromath ahead of the curve in its niche. Adding
    in Game Kit networking removed the need for a user to pass an iPhone around the
    table and have everyone enter what they ordered. Small additions such as this
    to your app can make a major difference in its perceived value.


    Handshake (see Figure [6-2](#A978-1-4302-4906-1_6_Chapter.html#Fig2)) was an app
    that was developed by Skorpiostech in the early days of the App Store. It was
    the first app that allowed a user to send his or her business cards to another
    user. More than six months of work went into the server that powered Handshake’s
    network connections. The server needed to support a large number of clients logging
    in and provide matches to other clients who were physically located within a certain
    distance of each other.


    ![A978-1-4302-4906-1_6_Fig2_HTML.jpg](A978-1-4302-4906-1_6_Fig2_HTML.jpg)


    Figure 6-2.


    Handshake from Skorpiostech, which uses its own server system to share data between
    two local devices


    Each device would determine its location and inform the server where it was and
    that it was looking for peers. The server would then return nearby peers and allow
    the app to establish a connection between them. This process could have been accomplished
    in days rather than months if Game Kit networking had been available at the time
    Handshake was being written. Handshake was never rewritten to support Game Kit;
    however, it was considered end-of-life when Apple introduced contact sharing alongside
    Game Kit in iOS 3.0.


    > **Note**: Game Kit and Game Center are not restricted to just games. While Apple
    has recently cracked down on using leaderboards and achievements in apps other
    than games, the argument can always be made that they add gamelike functionality
    to your app. Game Kit networking remains unrestricted in any app.'
