    ## Adding Products to Your App


    Apple does not offer a predesigned GUI for in-app purchases. You, as the developer,
    are required to design a storefront for your user. In this section, you will learn
    how to get products that you have added in iTunes Connect to show up for sale
    in your app.


    Note


    It can take several hours for new purchases and changes to be reflected. If you
    double-check everything and are still not seeing products, wait a few hours and
    try again.


    ### App IDs and In-App Purchase


    When working with in-app purchases, Apple requires that your App ID does not include
    a wildcard, such as `76P4G6KX56.*`. You are required to have a unique App ID,
    such as `76P4G6KX56.com.dragonforged.ufo`. If you do not have a unique App ID,
    you need to create one. Use the following steps to create a new unique App ID.


    Navigate to [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)
    in your web browser and select the iPhone Developer Program Portal from the list
    on the right.   Select App ID from the column on the left, and select the New
    App ID button in the upper right.   Fill in the required information about your
    app.   Click Submit.   Click the Configure button next to the listing, and make
    sure In-App Purchase is turned on (it should be on by default).


    ### Setting Up


    We will begin by requesting a list of products from our app. First, add the StoreKit
    framework to your project. We will be modifying our existing UFO project from
    the previous chapter; you can follow along in your own project if that is more
    convenient.


    Important


    In-App Purchase does not work on the simulator; all testing needs to be done on
    a device.


    Create a new class called `UFOStoreViewController`. We will use this class to
    display a store to the user. Set up the header to match the following:


    `#import <UIKit/UIKit.h>`


    `#import <StoreKit/StoreKit.h>`


    `@interface UFOStoreViewController : UIViewController <SKProductsRequestDelegate>`


    `{`


        `SKProductsRequest *productsRequest`


    `}`


    `@end`


    As you can see, we imported the StoreKit headers. Set up the `SKProductsRequestDelegate`,
    and create a new object to hold the product request. We need to create a way for
    the user to access the store, so go ahead and add a button to the main screen
    and relevant code to present the new view controller (`UFOStoreViewController`).


    ### Retrieving the Product List


    Modify the `viewDidLoad` and `viewDidUnload` methods of our new store view controller
    to begin a new store request using the product identifiers that were set up in
    iTunes Connect. You may need to modify your product identifiers to match the ones
    that you set up in the previous section.


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `NSSet *productIdentifiers = [NSSet setWithObjects:`É


    `@"com.dragonforged.ufo.newShip1", @"com.dragonforged.ufo.subscription", nil];`


        `productsRequest = [[SKProductsRequest alloc]`É


     `initWithProductIdentifiers:productIdentifiers];`


        `productsRequest.delegate = self;`


        `[productsRequest start];`


    `}`


    `- (void)viewDidUnload`


    `{`


        `productsRequest.delegate = nil;`


    `}`


    The product request is released in the delegate callback, shown next. Right now,
    this method just prints your product information to the console and logs any invalid
    products.


    `- (void)productsRequest:(SKProductsRequest *)request`É


     `didReceiveResponse:(SKProductsResponse *)response`


    `{`


        `NSArray *productArray= [response products];`


        `for (SKProduct *product in productArray) {`


        `NSLog(@"Product title: %@" , product.localizedTitle);`


        `NSLog(@"Product description: %@" , product.localizedDescription);`


        `NSLog(@"Product price: %@" , product.price);`


        `NSLog(@"Product id: %@\n\n" , product.productIdentifier);`


        `}`


        `for (NSString *invalidProduct in response.invalidProductIdentifiers)`


        `{`


        `NSLog(@"Invalid: %@" , invalidProduct);`


        `}`


        `[request release];`


    `}`


    Note


    Although you can retrieve a list of invalid product identifiers using the code
    in this section, there are no associated errors to determine why a product is
    being flagged as invalid. Most often, the product ID is mistyped or not enough
    time has passed for the product to be distributed to the servers.


    If you were to run the game now and navigate to the store, you should get output
    similar to the following:


    `2011–08-19 17:31:23.970 UFOs[3580:707] Product title: Ship+`


    `2011–08-19 17:31:23.973 UFOs[3580:707] Product description: Paint your ship and
    show off to your friends`


    `2011–08-19 17:31:23.975 UFOs[3580:707] Product price: 8.99`


    `2011–08-19 17:31:23.977 UFOs[3580:707] Product id: com.dragonforged.ufo.newShip1`


