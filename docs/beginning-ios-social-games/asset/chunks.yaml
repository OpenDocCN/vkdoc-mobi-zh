  trans: "\n# 生成奶牛\n\n为了使奶牛的运动在各设备间保持同步，我们需要指定一台设备负责处理奶牛的生成和移动路径。我们已选定了一台主机设备，因此将由该主机决定奶牛的放置位置。首先，修改\
    \ `determineHost` 方法。如下代码所示，如果当前设备是主机，则开始正常的奶牛生成流程：\n\n```\n-(void)determineHost:(NSDictionary\
    \ *)dataDictionary\n{\n    NSString *dataString = [[dataDictionary objectForKey:\
    \ @\"data\"]\n        stringByReplacingOccurrencesOfString:@\"$Host:\" withString:@\"\
    \"];\n    if ([dataString doubleValue] == randomHostNumber)\n    {\n        NSLog(@\"\
    主机编号相同，需要重新生成\");\n        [self generateAndSendHostNumber];\n    }\n    else\
    \ if ([dataString doubleValue] > randomHostNumber)\n    {\n        isHost = YES;\n\
    \        for(int x = 0; x < 5; x++)\n        {\n            [self spawnCow];\n\
    \        }\n        [self updateCowPaths];\n    }\n    else if ([dataString doubleValue]\
    \ < randomHostNumber)\n    {\n        isHost = NO;\n    }\n}\n```\n\n我们还需要修改 `spawnCow`\
    \ 方法以支持新的网络行为。这里所做的只是判断当前是否处于网络游戏状态以及是否是主机，然后将数据发送给网络处理器：\n\n```\n-(void)spawnCow;\n\
    {\n    int x = arc4random()%480;\n    UIImageView *cowImageView = [[UIImageView\
    \ alloc] initWithFrame:CGRectMake(x, 260, 64, 42)];\n    cowImageView.image =\
    \ [UIImage imageNamed: @\"Cow1.png\"];\n    [self.view addSubview: cowImageView];\n\
    \    [cowArray addObject: cowImageView];\n    [cowImageView release];\n    if\
    \ (isHost && self.gameIsMultiplayer)\n    {\n        [gcManager sendStringToAllPeers:[NSString\
    \ stringWithFormat:@\"$spawnCow:%i\", x] reliable:YES];\n    }\n}\n```\n\n修改 `receivedData`\
    \ 方法以支持新的 `$spawnCow` 消息类型。我们还需要从消息中提取 x 轴坐标，并将其传递给一个处理网络生成奶牛的新方法。这两个方法如下所示。\n\
    \n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$spawnCow:\"\
    ])\n{\n    int x = [[[dataDictionary objectForKey: @\"data\"]\n        stringByReplacingOccurrencesOfString:@\"\
    $spawnCow:\" withString:@\"\"] intValue];\n    [self spawnCowFromNetwork: x];\n\
    }\n\n-(void)spawnCowFromNetwork:(int)x\n{\n    UIImageView *cowImageView = [[UIImageView\
    \ alloc] initWithFrame:CGRectMake(x, 260, 64, 42)];\n    cowImageView.image =\
    \ [UIImage imageNamed: @\"Cow1.png\"];\n    [self.view addSubview: cowImageView];\n\
    \    [cowArray addObject: cowImageView];\n    [cowImageView release];\n}\n```\n\
    \n**提示：** 我们的主机无需传递奶牛的 y 轴坐标，因为它们始终在同一 y 轴上生成。若能减少数据包中的信息，总是有益的。\n\n如果现在运行游戏，你会看到两台设备在完全相同的位置生成了奶牛，但只有主机设备负责奶牛的运动动画。\n\
    \n接下来，需要添加共享奶牛动画控制的逻辑。修改现有的 `updateCowPaths` 方法，将我们想要更新的 `newX` 和奶牛在数组中的位置发送出去。以下新代码应添加到\
    \ `for` 循环的末尾。\n\n```\nif (self.gameIsMultiplayer)\n{\n    NSString *dataString\
    \ = [NSString stringWithFormat:@\"$cowMove:%i:%f\", x, newX];\n    [gcManager\
    \ sendStringToAllPeers:dataString reliable:YES];\n}\n```\n\n**注意：** 由于我们将生成奶牛调用的数据设置为可靠传输，所以数据会按照发送顺序被接收。这可以确保两台设备上\
    \ `cowArray` 中的对象顺序一致。\n\n我们还需要在 `receivedData` 方法中添加一个新的数据处理器。为此，我们将整个字典传递给新的\
    \ `updateCowPathsFromNetwork` 方法：\n\n```\nelse if ([[dataDictionary objectForKey:\
    \ @\"data\"] hasPrefix:@\"$cowMove:\"])\n{\n    [self updateCowPathsFromNetwork:\
    \ dataDictionary];\n}\n\n-(void)updateCowPathsFromNetwork:(NSDictionary *)dataDictionary;\n\
    {\n    NSArray *dataArray = [[dataDictionary objectForKey: @\"data\"]\n      \
    \  componentsSeparatedByString:@\":\"];\n    int placeInArray = [[dataArray objectAtIndex:\
    \ 1] intValue];\n    UIImageView *tempCow = [cowArray objectAtIndex: placeInArray];\n\
    \    float currentX = tempCow.frame.origin.x;\n    [UIView beginAnimations:@\"\
    cowWalk\" context:nil];\n    [UIView setAnimationDuration: 3.0];\n    [UIView\
    \ setAnimationCurve:UIViewAnimationCurveLinear];\n    float newX = [[dataArray\
    \ objectAtIndex: 2] intValue];\n    if (tempCow != currentAbductee)\n    {\n \
    \       tempCow.frame = CGRectMake(newX, 260, 64, 42);\n    }\n    [UIView commitAnimations];\n\
    \    tempCow.animationDuration = 0.75;\n    tempCow.animationRepeatCount = 99999;\n\
    \    //翻转奶牛方向\n    if (newX < currentX)\n    {\n        NSArray *flippedCowImageArray\
    \ = [NSArray arrayWithObjects: [UIImage\n            imageNamed: @\"Cow1Reversed.png\"\
    ], [UIImage imageNamed: @\"Cow2Reversed.png\"],\n            [UIImage imageNamed:\
    \ @\"Cow3Reversed.png\"], nil];\n        tempCow.animationImages = flippedCowImageArray;\n\
    \    }\n    else\n    {\n        NSArray *cowImageArray = [NSArray arrayWithObjects:\
    \ [UIImage\n            imageNamed: @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"\
    ],\n            [UIImage imageNamed: @\"Cow3.png\"], nil];\n        tempCow.animationImages\
    \ = cowImageArray;\n    }\n    [tempCow startAnimating];\n}\n```\n\n此方法与现有的更新奶牛路径方法非常相似。两个区别在于：我们从网络获取奶牛在数组中的位置，并且不随机生成\
    \ `newX` 坐标。如果再次运行游戏，你会看到两组奶牛现在已经同步。当奶牛位置改变时，两台设备上的结果完全相同。图 8-2 展示了游戏当前状态。\n\n\
    ![A978-1-4302-4906-1_8_Fig2_HTML.jpg](img/A978-1-4302-4906-1_8_Fig2_HTML.jpg)\n\
    \n**图 8-2.** 在两台 iOS 设备间通过网络同步奶牛运动\n\n现在每位玩家都可以绑架奶牛并增加自己的分数。然而，还有两个问题需要解决。第一个是我们在设备之间不共享分数，第二个是我们不显示其他玩家的牵引光束，也不在绑架过程中将奶牛动画化到\
    \ UFO 中。我们先从添加对分数的支持开始。\n\n## 共享分数\n\n当分数增加时，我们将数据发送给对等设备。在 `finishAbducting`\
    \ 方法中，紧接在增加分数代码之后，添加以下代码片段。\n\n```\nif (self.gameIsMultiplayer)\n{\n    [gcManager\
    \ sendStringToAllPeers:[NSString stringWithFormat:@\"$score:%f\", score] reliable:YES];\n\
    }\n```\n\n再次，我们需要修改 `receivedData` 方法以支持新的 `$score` 消息。我选择在 `receivedData` 方法中增加对手的分数。当然，你也可以编写一个新方法来处理此功能。此外，我们需要为对手的分数添加一个新标签。该标签将放置在本机玩家分数下方。图\
    \ 8-3 展示了分数的显示位置。\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $score:\"])\n{\n    float enemyScore = [[[dataDictionary objectForKey: @\"data\"\
    ]\n        stringByReplacingOccurrencesOfString:@\"$score:\" withString:@\"\"\
    ] floatValue];\n    enemyScoreLabel.text = [NSString stringWithFormat: @\"ENEMY\
    \ %05.0f\", enemyScore];\n}\n```\n\n![A978-1-4302-4906-1_8_Fig3_HTML.jpg](img/A978-1-4302-4906-1_8_Fig3_HTML.jpg)\n\
    \n**图 8-3.** 为联网玩家添加分数\n\n**提示：** 从技术上讲，你不需要在网络调用中传递分数值，因为分数每次只增加 1；我们可以假设一条新的分数消息即为增加\
    \ 1 的指令。\n"
- fmt: "### Adding Network Abduction Code\n\nThe last thing that we need to handle\
    \ is tying in network support for the abduction code. We need to properly remove\
    \ and respawn cows as they are abducted, as well as show the enemy UFO using their\
    \ tractor beam and animating a cow into the ship.\n\nLet’s begin by showing and\
    \ hiding the tractor beam on each device. Because we start a tractor beam every\
    \ time a user touches the screen, and end it when the user releases that touch,\
    \ we can begin there. We have no values that need to be transmitted; the only\
    \ thing we need to be aware of is starting and stopping the animation itself.\
    \ Modify the `touchesBegan` and `touchesEnd` methods to send a message to the\
    \ peer, as follows:\n\n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
    \ *)event\n{\n    currentAbductee = nil;\n    tractorBeamOn = YES;\n    if (self.gameIsMultiplayer)\n\
    \    {\n        [gcManager sendStringToAllPeers:@\"$beginTractorBeam\"\n     \
    \                         reliable:YES];\n    }\n    tractorBeamImageView.frame\
    \ = CGRectMake(myPlayerImageView.frame.origin.x+25,\n                        \
    \                    myPlayerImageView.frame.origin.y+10, 28, 318);\n    tractorBeamImageView.animationDuration\
    \ = 0.5;\n    tractorBeamImageView.animationRepeatCount = 99999;\n    NSArray\
    \ *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n            \
    \                @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"],\
    \ nil];\n    tractorBeamImageView.animationImages = imageArray;\n    [tractorBeamImageView\
    \ startAnimating];\n    [self.view insertSubview:tractorBeamImageView atIndex:4];\n\
    \n    UIImageView *cowImageView = [self hitTest];\n    if (cowImageView)\n   \
    \ {\n        currentAbductee = cowImageView;\n        [self abductCow: cowImageView];\n\
    \    }\n}\n\n-(void)endTractorFromNetwork\n{\n    [otherPlayerTractorBeamImageView\
    \ removeFromSuperview];\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
    \ *)event\n{\n    tractorBeamOn = NO;\n    if (self.gameIsMultiplayer)\n    {\n\
    \        [gcManager sendStringToAllPeers:@\"$endTractorBeam\"\n              \
    \                reliable:YES];\n    }\n    [tractorBeamImageView removeFromSuperview];\n\
    \    if (currentAbductee)\n    {\n        [UIView beginAnimations: @\"dropCow\"\
    \ context:nil];\n        [UIView setAnimationDuration: 1.0];\n        [UIView\
    \ setAnimationCurve:UIViewAnimationCurveEaseIn];\n        [UIView setAnimationBeginsFromCurrentState:\
    \ YES];\n        CGRect frame = currentAbductee.frame;\n        frame.origin.y\
    \ = 260;\n        frame.origin.x = myPlayerImageView.frame.origin.x +15;\n   \
    \     currentAbductee.frame = frame;\n        [UIView commitAnimations];\n   \
    \ }\n    currentAbductee = nil;\n}\n```\n\nAs you can see in the preceding code,\
    \ we simply check to make sure that we have a network game, and then pass a message\
    \ to begin or end the tractor beams. Next, we add a handler to our `receivedData`\
    \ method to call two new methods that will display and animate the tractor beam\
    \ on the peer’s device. These two methods, `beginTractorFromNetwork` and `endTractorFromNetwork`,\
    \ are modifications of our current tractor beam animation methods and are shown\
    \ next for your convenience.\n\n```\n-(void)beginTractorFromNetwork\n{\n    otherPlayerTractorBeamImageView.frame\
    \ =\n        CGRectMake(otherPlayerImageView.frame.origin.x+25,\n            \
    \       otherPlayerImageView.frame.origin.y+10, 28, 318);\n    otherPlayerTractorBeamImageView.animationDuration\
    \ = 0.5;\n    otherPlayerTractorBeamImageView.animationRepeatCount = 99999;\n\
    \    NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n \
    \                           @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"\
    ], nil];\n    otherPlayerTractorBeamImageView.animationImages = imageArray;\n\
    \    [otherPlayerTractorBeamImageView startAnimating];\n    [self.view insertSubview:otherPlayerTractorBeamImageView\
    \ atIndex:4];\n}\n\n-(void)endTractorFromNetwork\n{\n    [otherPlayerTractorBeamImageView\
    \ removeFromSuperview];\n}\n```\n\nIf you were to run the game again, you would\
    \ see that when either user touches the screen, the tractor beam appears on both\
    \ devices. We don’t need to worry about locking the movement for the UFO while\
    \ the tractor beam is on, because this is handled for us in the single-player\
    \ game, and movements are only transmitted to another device if they are acceptable\
    \ in the single-player mode. Next, we need to add additional code to handle the\
    \ hit test, so modify the `hitTest` method, as follows:\n\n```\n-(UIImageView\
    \ *)hitTest\n{\n    if (!tractorBeamOn)\n    {\n        return nil;\n    }\n \
    \   for (int x = 0; x < [cowArray count]; x++)\n    {\n        UIImageView *tempCow\
    \ = [cowArray objectAtIndex: x];\n        CALayer *cowLayer= [[tempCow layer]\
    \ presentationLayer];\n        CGRect cowFrame = [cowLayer frame];\n        if\
    \ (CGRectIntersectsRect(cowFrame, tractorBeamImageView.frame))\n        {\n  \
    \          tempCow.frame = cowLayer.frame;\n            [tempCow.layer removeAllAnimations];\n\
    \            if (self.gameIsMultiplayer)\n            {\n                [gcManager\
    \ sendStringToAllPeers:[NSString\n                    stringWithFormat: @\"$abductCowAtIndex:%i\"\
    , x] reliable:YES];\n            }\n            return tempCow;\n        }\n \
    \   }\n    return nil;\n}\n```\n\nHere we are using the same trick that we used\
    \ earlier when we populated the cow array. Because we sent the data reliably to\
    \ enter objects into our array, we know that the order of the array is always\
    \ going to be the same. Because we know the order of the array, we can pass the\
    \ index of the cow we want to modify. In addition to sending the data, we also\
    \ need to write a new `if` statement to catch this message, as shown below. You\
    \ can see that this method is set up a lot like the score method, in which we\
    \ extract the value that we are interested in and call a new method using it.\n\
    \n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$abductCowAtIndex:\"\
    ])\n{\n    int index = [[[dataDictionary objectForKey: @\"data\"]\n          \
    \        stringByReplacingOccurrencesOfString:@\"$abductCowAtIndex:\" withString:@\"\
    \"] intValue];\n    [self abductCowFromNetworkAtIndex:index];\n}\n```\n\nThe following\
    \ two methods, `abductCowFromNetworkAtIndex` and `finishAbductingFromNetwork`,\
    \ handle the abduction animations that are received over the network. They are\
    \ both very similar to the methods that we use to animate an abduction event in\
    \ the single-player mode. You could even modify your existing methods to handle\
    \ the network behavior by calling them with a flag to indicate that they are coming\
    \ from a remote device.\n\n```\n-(void)abductCowFromNetworkAtIndex:(int)x\n{\n\
    \    otherPlayerCurrentAbductee = [cowArray objectAtIndex: x];\n    otherPlayerCurrentAbductee.frame\
    \ = otherPlayerCurrentAbductee.frame;\n    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n\
    \    [UIView beginAnimations: @\"abductNetwork\" context:nil];\n    [UIView setAnimationDuration:\
    \ 4.0];\n    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    [UIView\
    \ setAnimationDelegate: self];\n    [UIView setAnimationDidStopSelector: @selector(finishAbductingFromNetwork)];\n\
    \    [UIView setAnimationBeginsFromCurrentState: YES];\n    CGRect frame = otherPlayerCurrentAbductee.frame;\n\
    \    frame.origin.y = otherPlayerImageView.frame.origin.y;\n    otherPlayerCurrentAbductee.frame\
    \ = frame;\n    [UIView commitAnimations];\n}\n\n-(void)finishAbductingFromNetwork;\n\
    {\n    [cowArray removeObjectIdenticalTo:otherPlayerCurrentAbductee];\n    [self\
    \ endTractorFromNetwork];\n    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n\
    \    [otherPlayerCurrentAbductee removeFromSuperview];\n    otherPlayerCurrentAbductee\
    \ = nil;\n    if (isHost)\n    {\n        [self spawnCow];\n    }\n}\n```"
