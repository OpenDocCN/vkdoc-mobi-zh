       `}`


    ### Getting Things Running


    In addition to the three new methods that we implemented in the previous section,
    you will need to complete some additional steps to get everything up and running.
    First, you need to initialize a new instance of `GKVoiceChatClient`, which should
    be a custom subclass of `GKVoiceChatClient` that you create. For more information
    on this step, see the next section, “Putting It Together.”


    `GKVoiceChatClient *voiceChatClient = [[GKVoiceChatClient alloc] initWithSession:`


     `session];`


    `[GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;`


    After you have created a new instance of `GKVoiceChatClient`, you need to connect
