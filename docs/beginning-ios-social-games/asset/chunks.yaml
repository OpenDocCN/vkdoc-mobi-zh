    \ localizedDescription]);\n    }\n    [achievementTableView reloadData];\n}\n\
    ```\n\n对于 `numberOfRowsInSection` 方法，我们直接返回 `achievementArray` 的计数，如下所示：\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [[self achievementArray] count];\n}\n```\n\n我们还需要实现 `cellForRowAtIndexPath`\
    \ 方法。将以下方法也添加到实现中。添加完成后，我们将对其详细分析。\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  \
    \  static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil)\n \
    \   {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier] autorelease];\n\
    \        [cell setSelectionStyle:UITableViewCellSelectionStyleNone];\n    }\n\
    \    \n    GKAchievementDescription *achievementDescription = [[self achievementArray]\n\
    \                                                        objectAtIndex:[indexPath\
    \ row]];\n    [[cell textLabel] setText:[achievementDescription title]];\n   \
    \ if ([achievementDescription image] == nil)\n    {\n        [[cell imageView]\
    \ setImage:[GKAchievementDescription\n                                    placeholderCompletedAchievementImage]];\n\
    \        [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,\n\
    \                                                                 NSError *error)\
    \ {\n            if (error == nil)\n            {\n                [[cell imageView]\
    \ setImage:image];\n            }\n        }];\n    }\n    else\n    {\n     \
    \   [[cell imageView] setImage:[achievementDescription image]];\n    }\n    return\
    \ cell;\n}\n```\n\n该方法前半部分相当标准：要么创建一个新的表格单元格，要么从可重用集合中获取一个。这里我们使用默认的内置表格单元格来节省时间。我们创建一个新的\
    \ `GKAchievementDescription`，并根据 `achievementArray` 的行号填充数据。\n\n我们处理的第一个属性是标题，用它来设置单元格的\
    \ `textLabel`。在大多数情况下，你可能还需要使用 `achievedDescription` 或 `unachievedDescription`。为了简化，这里我们只使用标题。接下来，我们需要为成就设置图片。这部分稍微复杂一些。\n\
    \n`GKAchievementDescription` 有一个相关的图片属性，在填充之前该属性为 `nil`。首先检查该属性是否已被填充，只需一个简单的\
    \ nil 检查即可完成。如果已填充，我们将单元格图片设置为已缓存的那张。如果未填充，则需要从 Game Center 服务器加载图片。为此，我们在 `GKAchievementDescription`\
    \ 对象上调用 `loadImageWithCompletionHandler`。该方法会返回已获得的图片。请注意，我们使用了默认的占位图片，可以通过 `GKAchievementDescription`\
    \ 的类方法访问该图片。\n\n> **提示：**  \n> 在 `UITableViewCellSytleDefault` 单元格中设置图片时，不要将图片设为\
    \ `nil`。否则会导致单元格文本左对齐并移除图片视图。如果此时通过 block 加载图片，图片在单元格或表格重新加载之前都不会显示。这就是我们先设置占位图片的原因。\n\
    \n如果现在运行应用并查看自定义成就视图，它应该类似于图 4-14 所示。\n\n![A978-1-4302-4906-1_4_Fig14_HTML.jpg](img/A978-1-4302-4906-1_4_Fig14_HTML.jpg)\n\
    \n**图 4-14.** 自定义 GUI 中展示的成就数据\n\n目前我们只能看到成就列表及其关联图片，但无法查看用户解锁成就的进度。回想一下，本章前面我们编写了几个便捷方法，在这里会很有用。有两个方法可以返回成就的进度：`percentageCompleteOfAchievementWithIdentifier:`\
    \ 和 `achievementWithIdentifierIsComplete`。此外，如果需要访问整个 `GKAchievement` 对象，可以使用\
    \ `achievementForIdentifier`。接下来我们使用 `percentageCompleteOfAchievementWithIdentifier:`\
    \ 来显示完成百分比。修改 `cellForRowAtIndexPath:` 中设置单元格文本标签的代码段。新的代码段应如下所示：\n\n```\nNSString\
    \ *percentageCompleteString = [NSString stringWithFormat: @\" %.0f%% 完成\",\n \
    \                                     [[self gcManager] percentageCompleteOfAchievementWithIdentifier:\n\
    \                                       [achievementDescription identifier]]];\n\
    [[cell textLabel] setText:[[achievementDescription title]\n                  \
    \         stringByAppendingString:percentageCompleteString]];\n```\n\n再次运行游戏，你会发现输出信息更加实用，如图\
    \ 4-15 所示。\n\n![A978-1-4302-4906-1_4_Fig15_HTML.jpg](img/A978-1-4302-4906-1_4_Fig15_HTML.jpg)\n\
    \n**图 4-15.** 带有完成百分比的自定义 GUI 成就显示\n"
- fmt: "# Recovering from a Submit Failure\n\nDevelopers are solely responsible for\
    \ handling failures in submitting achievements. You do not want your users to\
    \ lose any achievement progress. Losing an achievement is very frustrating to\
    \ your users and should be avoided at all cost. To prevent this, take the same\
    \ approach that we used when working with score failures. The primary difference\
    \ is that there is no need to store the `GKAchievement` object, because it does\
    \ not contain any date information or time-sensitive information. We just need\
    \ to store the `percentageComplete` value. We will create a new method to handle\
    \ this behavior for us. Add the following method to the `GameCenterManager` class.\n\
    \n```\n-(void)storeAchievementToSubmitLater:(GKAchievement *)achievement\n\n{\n\
    \nNSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]\n\
    initWithArray:[[NSUserDefaults standardUserDefaults]\nobjectForKey:@\"savedAchievements\"\
    ]];\nif ([achievementDictionary objectForKey:[achievement identifier]] == nil)\n\
    \n{\n\n[achievementDictionary setObject:[NSNumber numberWithDouble:[achievement\n\
    percentComplete]] forKey:[achievement identifier]];\n\n}\n\nelse\n\n{\n\ndouble\
    \ storedProgress = [[achievementDictionary objectForKey:\nachievement.identifier]\
    \ doubleValue];\nif ([achievement percentComplete] > storedProgress)\n\n{\n\n\
    [achievementDictionary setObject:[NSNumber\nnumberWithDouble:[achievement percentComplete]]\n\
    forKey:[achievement identifier]];\n\n}\n\n}\n\n[[NSUserDefaults standardUserDefaults]\
    \ setObject:achievementDictionary\nforKey:@\"savedAchievements\"];\n[achievementDictionary\
    \ release];\n\n}\n```\n\nThis method will treat an achievement as an argument,\
    \ and verify whether it is already stored as a reference in our achievements that\
    \ have failed to properly be submitted. If it has failed, then we need to see\
    \ which one is progressed further so we do not have any instances in which we\
    \ delete a user’s progress. Once that is done, we store it into `userDefaults`\
    \ as a dictionary, using the identifier as the key and the percentage completed\
    \ as the value. We add a call to this method from an error in the `submitAchievement:PercentComplete:`\
    \ method. You can find the relevant snippet of code, as follows:\n\n```\nif (achievement!=\
    \ NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler: ^(NSError\
    \ *error) {\nif (error != nil)\n\n{\n\n[self storeAchievementToSubmitLater: achievement];\n\
    \n}\nif (percentComplete >= 100)\n\n{\n\n[GKAchievementDescription\nloadAchievementDescriptionsWithCompletionHandler:\n\
    ^(NSArray *descriptions, NSError *error) {\nfor (GKAchievementDescription *achievementDescription\
    \ in descriptions)\n\n{\n\nif (![[achievement identifier]\nisEqualToString:[achievementDescription\n\
    identifier]]) continue;\n[self callDelegateOnMainThread:\n@selector(achievementEarned:)\n\
    withArg:achievementDescription error:nil];\n\n}\n\n}];\n\n}\n[self callDelegateOnMainThread:\
    \ @selector(achievementSubmitted:error:)\nwithArg: achievement error: error];\n\
    \n}];\n\n}\n```\n\n**Tip**\n\nIt is recommended to inform your users that their\
    \ achievement could not be submitted at this time but has been saved and will\
    \ be submitted later. This lets the user know that any progress has not been lost.\n\
    \nWe also need a new method that will check to see whether we have uncommitted\
    \ achievement progress. There is no right answer for the best time to call this\
    \ method. You can typically get away with calling it after a user authenticates\
    \ with Game Center, but you may want to add additional methods that it is called\
    \ from, such as whenever the reachability status is updated. Add the following\
    \ method to your `GameCenterManager` class.\n\n```\n- (void)submitAllSavedAchievements\n\
    \n{\n\nNSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]\n\
    initWithArray:[[NSUserDefaults standardUserDefaults]\nobjectForKey:@\"savedAchievements\"\
    ]];\nNSArray *keys = [achievementDictionary allKeys];\nfor (int x = 0; x < [keys\
    \ count]; x++)\n\n{\n\n[self submitAchievement:[keys objectAtIndex:x] percentComplete:\n\
    [[achievementDictionary objectForKey:[keys objectAtIndex:x]] doubleValue]];\n\
    [[NSUserDefaults standardUserDefaults] removeObjectForKey:[keys\nobjectAtIndex:x]];\n\
    \n}\n[achievementDictionary release];\n\n}\n```\n\nThis method loads a copy of\
    \ our nonsubmitted progress and loops through each item, attempting to resubmit\
    \ them as they go. In the event that they fail to be submitted again, they will\
    \ be added back to our saved data.\n\n# Achievement Challenges\n\nWith the introduction\
    \ of iOS 6, achievements can now be issued as challenges to Game Center friends.\
    \ If your app is using the standard Apple-provided interface, you do not need\
    \ to make any changes in order to provide your users with Achievement Challenges.\n\
    \nIf you are working with an app that uses a custom interface for achievements,\
    \ or if you would otherwise prefer to enable programmatic challenges, you can\
    \ do so using the following code snippet:\n\n```\n[(GKAchievement *)achievement\
    \ issueChallengeToPlayers: (NSArray *)players message:@\"Think you can earn this\
    \ achievement!?\"];\n```\n\nYou may also want to retrieve a list of all players\
    \ who can be issued a current achievement challenge. The following code will take\
    \ an array of player IDs, such as your friends list, and return a list of players\
    \ who can accept a challenge. This is useful if your app is preventing users from\
    \ accepting Achievement Challenges for achievements they have already completed.\n\
    \n```\n[achievement selectChallengeablePlayerIDs: arrayOfPlayersToCheck withCompletionHandler:^(NSArray\
    \ *challengeablePlayerIDs, NSError *error)\n\n{\n\n     if(error != nil)\n\n \
    \    {\n\n                       NSLog(@\"An error occurred while retrieving a\
    \ list of\n        challengeable players: %@\", [error\n        localizedDescription]);\n\
    \n     }\n     NSLog(@\"The following players can be challenged: %@\",      challengeablePlayerIDs);\n\
    \n}];\n```\n\n**Note**\n\nIn order for users to accept challenges on achievements\
    \ they have previously completed, Achievable More Than Once needs to be checked\
    \ off in iTunes Connect for each achievement.\n\nIt is also possible to retrieve\
    \ an array of all pending `GKChallenge` items for the authenticated user, using\
    \ the following code snippet:\n\n```\n[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray\
    \ *challenges, NSError *error)\n\n{\n\n     if (error != nil)\n\n     {\n\n  \
    \        NSLog(@\"An error occurred: %@\", [error localizedDescription]);\n\n\
    \     }\n\n     else\n\n     {\n\n          NSLog(@\"Challenges: %@\", challenges);\n\
    \n     }\n\n}];\n```\n\nEach challenge has an associated state such as completed,\
    \ invalidated, declined, or pending. These can be polled in the following fashion:\n\
    \n```\nif(challenge.state == GKChallengeStateCompleted)\n     NSLog(@\"Challenge\
    \ Completed\");\n```\n\nFinally, it is also possible to decline an incoming challenge\
    \ by simply calling `decline` on it, as shown here:\n\n```\n[challenge decline];\n\
    ```\n\n# Summary\n\nYou now have all the tools you need to add rich and complex\
    \ achievements into your Game Center–enabled app. You know the value of adding\
    \ achievements, as well as how to set up and configure them in the iTunes Connect\
    \ Portal. We have discussed the pros and cons of using both Apple’s default GUI\
    \ for achievements and a custom GUI that you have designed. You now know how to\
    \ expand our `GameCenterManager` class to include posting achievement progress,\
    \ getting achievement feedback, and resetting achievement progress all together.\n\
    \nThe most important step you’ve completed in this chapter is expanding the reusable\
    \ `GameCenterManager` class in ways that will allow you to add achievements in\
    \ future projects easily. In the next chapter, we will explore Game Center’s matchmaking\
    \ and invitation systems so you can add multiplayer capabilities and other networking\
    \ features."
