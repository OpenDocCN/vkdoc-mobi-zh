    messages to other central points, and each tree branch passes messages back and
    forth along that branch. This type of network can be very beneficial when dealing
    with very large clusters of peers where latency isn’t critical.

    *   Hybrid Network—This type of network combines two or more technologies, such
    as two groups of peers that are linked together through a centralized server.


    This covers most of the networks you will encounter during a career in software
    engineering, until of course something better is invented. There is really no
    limit to the type of network that you can design, and every year better designs
    and flows become available. In the next section, we will look at the actual packets
    that will be sent and received on your network.'
  trans: '

    ### 客户端-主机网络


    客户端-主机网络指定一台设备作为主机。主机设备负责向所有连接的客户端发送信息。客户端之间从不直接通信，它们只与主机通信，由主机将所需信息转发给其他客户端。图
    7-2 展示了客户端-主机网络的典型结构。


    ![A978-1-4302-4906-1_7_Fig2_HTML.jpg](img/A978-1-4302-4906-1_7_Fig2_HTML.jpg)


    图 7-2. 使用五台 iOS 设备的客户端-主机网络示意图


    这种架构也被称为客户端-服务器网络，它简化了数据流。每个对等点或客户端只需关注自身和主机，无需了解网络中可能存在的其他设备。此类网络的优势在于，由一台设备负责同步所有信息并处理信息流，因此安全性极高（尤其在反作弊方面）。不过，在
    iOS 平台上作弊问题并不严重，因为该系统本身就是一个沙盒环境。


    这种网络还有其他优点，例如只需一台设备关注网络状态，且由该设备全权负责网络行为。这种网络简化了连接、断开、传输错误以及状态变化（如计算机控制的物体，比如人工智能）等事件的处理。然而，在
    iOS 平台上，同样的架构可能会带来麻烦：如果主机设备需要处理过多信息，其运行速度可能会变慢或耗电增加。此外，如果一台设备需要处理所有游戏信息，可能会导致该设备上的游戏或应用性能不佳。在传统的桌面计算机网络中，主机或服务器通常是专用设备，或主机设备的额外任务对可用资源的影响并不大。


    ### 环形网络


    环形网络（见图 7-3）没有主机和客户端之分。它的工作原理类似于对等网络，但每个对等点只负责与一个指定的对等点通信，并且只接收来自另一个独立指定的对等点的信息。信息像环一样在一组设备之间流动，因此得名。


    这种网络在 iOS 平台上并不常见，因为通常不需要它为断开的对等点提供冗余。Apple 已经做了大量基础工作来确保网络保持活跃和稳定，开发者无需额外投入设计时间来防止对等点之间失去联系。不过，在某些情况下，你可能会发现这种配置在
    iOS 平台上设计网络时很有用。虽然环形网络提高了稳定性和连接性，但代价是增加了延迟并降低了传输速度。在移动设备上，网络连接成功的关键限制因素通常是延迟，在选择网络方案时应牢记这一点。


    ![A978-1-4302-4906-1_7_Fig3_HTML.jpg](img/A978-1-4302-4906-1_7_Fig3_HTML.jpg)


    图 7-3. 使用六台 iOS 设备的环形网络示意图。注意，该图比图 7-1 所示的对等网络看起来简单得多


    ## 较少见的网络类型


    计算机科学中还有许多其他类型的网络设计和样式。有些更实用，有些则主要停留在理论层面。本节将介绍一些较为知名的“非主流”网络。虽然其中一些可以在 iOS 设备上实现，但大多数在普通的
    iOS 项目中可能不会带来实际好处。


    - **无头客户端**——客户端完全不拥有任何数据，由主机设备控制。你可以将这种设置视为从服务器磁盘启动的计算机终端。其工作方式与虚拟网络计算（`VNC`）客户端非常相似。

    - **专用服务器**——这种类型中的主机不参与游戏或活动，专门负责从对等点发送信息并收集新的输入。这通常由大型公司部署以创建游戏社区。虽然在 iOS 领域也可能见到，但这通常是一个远程的
    Ruby on Rails 或 Python 服务器在发送数据，而非另一台 iOS 设备。

    - **网状/部分网状网络**——这是一种对等网络，其中每个对等点可能不知道网络上存在的其他对等点。数据包被标记上目的地，每一跳都试图将数据包向目的地靠近。全网状网络意味着每个对等点都相互连接。

    - **树形网络**——这种网络由相互连接的对等点组成树状结构，每个对等点都由一个中心点控制。中心点将消息传递给其他中心点，每个树分支则在该分支内来回传递消息。当处理延迟要求不高的极大规模对等点集群时，这种网络非常有用。

    - **混合网络**——这种网络结合了两种或多种技术，例如通过一个中心服务器连接两个对等点组。


    这涵盖了你在软件工程职业生涯中会遇到的大部分网络类型，当然，直到有更好的发明出现为止。实际上，你可以设计的网络类型没有限制，每年都会出现更好的设计和信息流。在下一节中，我们将研究网络上实际发送和接收的数据包。

    '
- fmt: '# Reliable Data vs. Unreliable Data


    Packet reliability is an important topic for network design. When discussing packet
    reliability outside of the iOS platform, we are specifically referring to the
    priority of the data, the ordering of the packets, and the retry determination
    factor. Let’s look at all these attributes separately and how they relate to network
    design (see Table [7-1](#A978-1-4302-4906-1_7_Chapter.html#Tab1)) before digging
    into the specifics needed for our implementation within iOS.


    **Table 7-1.** Common Packet Attributes and How They Affect Network Behavior


    | Attribute | Relationship to Network Design |

    | --- | --- |

    | Priority | When you are working with low-level networking, you are dealing with
    packets. Each packet is a predetermined sized and contains information about the
    event that you want to send to another peer. Packets are typically sent to a queue
    and then sent out to the peer they are addressed for, but because networking isn’t
    precise (especially if you are trying to get the lowest latency), packets might
    not always be received in the order that they are generated or even sent. For
    example, in a standard online game, you might be passing two types of information,
    game state changes and chat information. Obviously, your character requesting
    an action, such as attacking an enemy or dodging an attack, is more important
    to have occur in a timely manner than a chat message. The solution to this type
    of problem is to set priority for packets. The peer will cycle through all its
    pending messages and send the highest-priority ones first. This allows the vital
    messages to be retried in the event of failure first, as well as bump the important
    packets to the top of the queue. |

    | Ordering | The order in which packets are received can be crucial. For example,
    if you are sending 10 packets, which together make up a very long chat message,
    then the order in which those packets are received is important to the receiving
    peer. If the packets aren’t received and processed in order, your message could
    appear scrambled. When this happens with packets controlling a state engine, very
    unpredictable behavior may follow. There is a certain cost overhead involved when
    ensuring packets are ordered, however. If you are waiting for packet 1 of 10,
    then you can’t do anything with the packets you might have already received. This
    creates a situation in which your network is only as fast as your slowest packet.
    If ordering isn’t critical to your network functioning correctly, then you should
    not worry about the order. |

    | Retry | Networks are, by nature, unreliable. Even a desktop machine hooked up
    to a dedicated connection will have lost packets and experience other failures.
    When you are dealing with network reliability on a mobile device, the only thing
    you can count on is failure. When you send a packet to another peer, you can handle
    it two ways: the first is a send-and-forget system; the second is a send-and-verify
    system. In the first approach, you send a packet and you don’t really care if
    it gets there. Let me clarify: you do care, but if it fails, there is nothing
    you can do about it. A good example of this type of acceptable failure is a voice
    chat packet. If it fails to reach the end of the line successfully, resending
    it will merely bring audio out of sync with real time; it is better to accept
    the skip in audio and continue on streaming the data. In the second approach,
    the packet is considered vital, such as the player opening a chest, searching
    a slain foe for treasure, or updating their direction of movement. The peer needs
    this data to be sent to continue smoothly executing the commands. If you skip
    this packet, it will be frustrating to the user, as they will have to retry the
    action themselves instead of having the network retry it for them. |


    Now that we have covered the important issues involved in sending the data packets
    from one device to another, we can look at how these principles apply to the iOS
    platform itself.


    There are two modes that data can be sent in with Game Kit: the first is `GKSendDataReliable`;
    the second is, naturally, `GKSendDataUnreliable`. For a look at what each of these
    modes does for us and how they fit in with the topics we just discussed, see Table
    [7-2](#A978-1-4302-4906-1_7_Chapter.html#Tab2).


    **Table 7-2.** Packet Attributes and How They Apply to Game Center


    | Attribute | `GKSendDataReliable` | `GKSendDataUnreliable` |

    | --- | --- | --- |

    | Priority | Game Kit networking doesn’t factor in any type of priority when dealing
    with packets. Packets are sent in the order that they are fed into the system.
    | Game Kit networking doesn’t factor in any type of priority when dealing with
    packets. Packets are sent in the order that they are fed into the system. |

    | Ordering | Packets will be received in the order that they are sent. | Packets
    using this method may not be received in the order that they are sent. |

    | Retry | A packet will be continuously retried until it is successfully received.
    The next packet will not be sent until the first one has been confirmed received.
    | A packet is sent and then removed from the queue. The API does not wait to receive
    a success notification before it sends the next packet. This is naturally faster
    than waiting for a response between each packet. |'
