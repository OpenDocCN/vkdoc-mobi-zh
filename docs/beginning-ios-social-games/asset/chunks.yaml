    `#define class_SquadLeader            0xFF000000`


    `#define class_Breacher               0x00FF0000`


    `#define class_Grenadier              0x0000FF00`


    `#define class_LightMachineGun        0x000000FF`


    We begin by defining a mask for each of our player attributes, which we will refer
    to as “classes” for the rest of this section. This example represents a standard
    squad in a modern military-style game. Each class is assigned a different value
    of a mask. Game Center uses an algorithm to match these players together, using
    the following rules:


    *   A match’s mask will always begin with the mask of the inviting player.

    *   Game Center will ignore all players who have not set a player attribute mask
    if the inviting player has set a player attribute mask.

    *   A player will be added to a match only if their player attribute mask doesn’t
    overlap any section of a mask from any players already invited into the match.

    *   After a player is added to the match, that player’s attributes value is logically
    ORed into the match’s mask.

    *   If a match’s mask value is equal to FFFFFFFF, then the match is considered
    complete and can begin; if the mask does not equal FFFFFFFF, then Game Center
    will continue searching for a player who can fill the match.

    *   There is no way to query Game Center to see which player is still currently
    being waited for.


    The following is based on the classes we just defined.


    A blank match will have the player attribute mask shown in Figure [5-7](#A978-1-4302-4906-1_5_Chapter.html#Fig7).


    ![A978-1-4302-4906-1_5_Fig7_HTML.jpg](A978-1-4302-4906-1_5_Fig7_HTML.jpg)


    Figure 5-7.


    An empty player attribute mask (0x00000000)


    Player 1 begins a new match and selects Squad Leader as his class. When that player
    creates the match, it will now have a player attribute mask that looks like the
    one shown in Figure [5-8](#A978-1-4302-4906-1_5_Chapter.html#Fig8).


    ![A978-1-4302-4906-1_5_Fig8_HTML.jpg](A978-1-4302-4906-1_5_Fig8_HTML.jpg)


    Figure 5-8.


    A player attribute mask representing the Squad Leader class (0xFF000000)


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask that looks like Figure [5-9](#A978-1-4302-4906-1_5_Chapter.html#Fig9).


    ![A978-1-4302-4906-1_5_Fig9_HTML.jpg](A978-1-4302-4906-1_5_Fig9_HTML.jpg)


    Figure 5-9.


    A player attribute mask representing the Grenadier class (0x0000FF00)


    When we compare this to the already existing match’s mask, as shown in Figure
    [5-10](#A978-1-4302-4906-1_5_Chapter.html#Fig10), we can see there are no overlaps,
    so that player can be invited into the game.


    ![A978-1-4302-4906-1_5_Fig10_HTML.jpg](A978-1-4302-4906-1_5_Fig10_HTML.jpg)


    Figure 5-10.


    Comparison of 0xFF000000 and 0x0000FF00


    When these masks are combined to form the new match mask, it will look like Figure
    [5-11](#A978-1-4302-4906-1_5_Chapter.html#Fig11).


    ![A978-1-4302-4906-1_5_Fig11_HTML.jpg](A978-1-4302-4906-1_5_Fig11_HTML.jpg)


    Figure 5-11.


    A new match mask, representing two players (0xFF00FF00)


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match’s mask to the Breacher’s mask, as shown in Figure
    [5-12](#A978-1-4302-4906-1_5_Chapter.html#Fig12).


    ![A978-1-4302-4906-1_5_Fig12_HTML.jpg](A978-1-4302-4906-1_5_Fig12_HTML.jpg)


    Figure 5-12.


    The top is the current match’s mask (0xFF00FF00), and the bottom is a Breacher’s
    mask (0x00FF0000)'
  trans: '

    ### 理解玩家属性限制


    `Player` 属性可用于为每位玩家分配这些值，从而让你能够平衡一支包含所需玩家的队伍。然而，自 iOS 7.0 起，使用 `Player` 属性存在若干限制；在开始使用
    `Player` 属性之前，理解这些限制非常重要。


    -   每个角色只能由一名玩家担任。例如，在一场足球比赛中，你不能要求有三名中场球员。

    -   所有角色都必须被填充后，游戏才被视为准备就绪。例如，你不能在缺少狙击手的情况下开始一款第一人称射击游戏（基于前面的例子）。

    -   每位玩家一次只能担任一个角色；玩家不能以填充多个角色的方式加入游戏。例如，你不能让一位第一人称射击游戏中的玩家既愿意当狙击手又愿意当医护兵；在比赛请求最终确定之前，他们需要选择其中一个。

    -   `Player` 属性在自动匹配期间会被使用。如果你邀请一位朋友加入游戏，系统不会检测他们是否匹配需要填充的角色。相反，他们会自动被分配一个随机角色。简而言之，朋友无法选择他们的
    `Player` 属性。

    -   在标准匹配图形用户界面中，角色不会在任何地方显示。你需要在进入此视图之前实现自己的系统，以允许用户选择他们的角色。

    -   `GKMatch` 对象不包含关于哪些玩家被分配了哪些角色的信息。你需要实现在比赛连接后自行确定谁扮演哪个角色的系统。

    -   没有现成的系统可以判断哪些角色需求过剩，或者哪些角色更难找到匹配。例如，在角色扮演游戏中，可能每个人都想玩法师，而没人想当治疗者；因此，法师要找到一个空位会困难得多，而治疗者则可以轻松找到。


    ### 使用玩家属性


    不要让这一长串限制吓退你使用 `Player` 属性。即使存在这些限制，它们对于创造更好的多人游戏体验仍然极具价值。让我们来看一个如何使用 `Player`
    属性构建匹配的示例。


    ```

    #define class_SquadLeader            0xFF000000

    #define class_Breacher               0x00FF0000

    #define class_Grenadier              0x0000FF00

    #define class_LightMachineGun        0x000000FF

    ```


    我们首先为每个 `Player` 属性定义一个掩码，在本节后续内容中，我们将称其为“兵种”。这个示例代表了一款现代军事风格游戏中的标准战斗小队。每个兵种被分配了一个不同的掩码值。Game
    Center 使用一种算法，根据以下规则来匹配这些玩家：


    -   匹配的掩码始终以邀请玩家的掩码开始。

    -   如果邀请玩家已设置了 `Player` 属性掩码，Game Center 将忽略所有未设置 `Player` 属性掩码的玩家。

    -   只有当玩家的 `Player` 属性掩码与已邀请到比赛中的任何玩家的掩码的任何部分都不重叠时，该玩家才会被加入比赛。

    -   在玩家加入比赛后，该玩家的属性值将通过逻辑或运算合并到比赛的掩码中。

    -   如果比赛的掩码值等于 `FFFFFFFF`，则认为比赛已完成并可以开始；如果掩码不等于 `FFFFFFFF`，Game Center 将继续搜索可以填充该比赛的玩家。

    -   无法向 Game Center 查询当前正在等待哪名玩家。


    以下内容基于我们刚刚定义的兵种。


    一个空白的比赛所拥有的 `Player` 属性掩码如图 5-7 所示。


    ![A978-1-4302-4906-1_5_Fig7_HTML.jpg](img/A978-1-4302-4906-1_5_Fig7_HTML.jpg)


    图 5-7. 一个空的玩家属性掩码 (`0x00000000`)


    玩家 1 开始一场新比赛，并选择班长作为其兵种。当该玩家创建比赛时，比赛的 `Player` 属性掩码将如图 5-8 所示。


    ![A978-1-4302-4906-1_5_Fig8_HTML.jpg](img/A978-1-4302-4906-1_5_Fig8_HTML.jpg)


    图 5-8. 代表班长兵种的玩家属性掩码 (`0xFF000000`)


    现在，比赛发起者使用 Game Center 自动匹配新玩家。Game Center 找到的第一个玩家选择了掷弹兵作为其兵种。掷弹兵的掩码将如图 5-9 所示。


    ![A978-1-4302-4906-1_5_Fig9_HTML.jpg](img/A978-1-4302-4906-1_5_Fig9_HTML.jpg)


    图 5-9. 代表掷弹兵兵种的玩家属性掩码 (`0x0000FF00`)


    当我们将其与已有比赛的掩码进行比较时（如图 5-10 所示），可以看到没有重叠，因此该玩家可以被邀请加入游戏。


    ![A978-1-4302-4906-1_5_Fig10_HTML.jpg](img/A978-1-4302-4906-1_5_Fig10_HTML.jpg)


    图 5-10. `0xFF000000` 与 `0x0000FF00` 的比较


    当这些掩码合并形成新的比赛掩码时，它将如图 5-11 所示。


    ![A978-1-4302-4906-1_5_Fig11_HTML.jpg](img/A978-1-4302-4906-1_5_Fig11_HTML.jpg)


    图 5-11. 一个新的比赛掩码，代表两名玩家 (`0xFF00FF00`)


    玩家 3 选择突击兵作为其兵种并搜索游戏。Game Center 找到了我们一直在处理的这个比赛，并通过比较比赛掩码和突击兵掩码来确定是否还有空位供突击兵加入，如图
    5-12 所示。


    ![A978-1-4302-4906-1_5_Fig12_HTML.jpg](img/A978-1-4302-4906-1_5_Fig12_HTML.jpg)


    图 5-12. 上方是当前比赛的掩码 (`0xFF00FF00`)，下方是突击兵的掩码 (`0x00FF0000`)

