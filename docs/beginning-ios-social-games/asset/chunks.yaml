    After we have determined who the users are, then we can allow them to make a move.
    We will modify the code for the action to which the nine game buttons are connected.
    First, let’s take a look at the method in its completed form. Then, we can break
    it down and look at each part in depth.


    `- (IBAction)makeMove:(id)sender`


    `{`


