    # 与玩家协作


    `Game Center`本质上是一种社交服务，因此其核心围绕玩家展开。你需要了解与`GKPlayer`对象相关的三个属性。`isFriend`属性是一个布尔值，用于返回该玩家是否为当前本地玩家的好友。另外两个属性分别处理玩家的名称和别名。`playerID`属性是静态的，始终指向同一个玩家。`playerID`字符串绝不应在你的应用中向用户显示。而`alias`属性是动态的，用户可随时更改。它绝不可用于验证用户身份，但应作为唯一用于向应用用户标识该玩家的字符串。


    > **警告**

    > 请勿对玩家标识符字符串的结构做任何假设。其格式和长度可能随时变更。


    之前检索好友列表时，我们返回的并非`GKPlayers`数组，而是他们的 ID 数组。这是 Game Center 的常见行为。为方便处理玩家数据，我们将添加两个便捷方法，用于将玩家
    ID 转换为`GKPlayer`对象。


    我们需要创建两个新方法：一个用于处理玩家 ID 数组，另一个用于处理单个玩家 ID。这将为后续工作省去额外步骤。我们将这些辅助方法添加到`GameCenterManager`类中。首先，新增协议方法，并修改`GameCenterManager.h`文件的相关部分，使其与以下代码一致：


    ```

    @protocol GameCenterManagerDelegate <NSObject>


    @optional


    - (void)processGameCenterAuthentication:(NSError*)error;


    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;


    - (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;


    @end

    ```


    我们还将向`GameCenterManager`类的实现文件添加以下两个新方法：


    ```

    - (void)playersForIDs:(NSArray *)playerIDs


    {


    [GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:^(NSArray
    *players, NSError *error) {


    [self callDelegateOnMainThread: @selector(playerDataLoaded:error:) withArg: players
    error: error];


    }];


    }


    - (void)playerforID:(NSString *)playerID


    {


    [GKPlayer loadPlayersForIdentifiers:[NSArray arrayWithObject:playerID] withCompletionHandler:^(NSArray
    *players, NSError *error) {


    [self callDelegateOnMainThread: @selector(playerDataLoaded:error:) withArg:players
    error:error];


    }];


    }

    ```


    这两个方法都将使用`loadPlayersForIdentifiers`。唯一的区别在于，一个方法接收字符串并将其转换为单元素数组，另一个则直接接收数组。同样，我们将使用线程安全的委托回调。


    最后一步是在`UFOViewController`中实现委托回调。首先修改好友加载方法，将好友列表转换为`GKPlayer`对象数组。请将`friendsFinishedLoading`方法修改为如下代码：


    ```

    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;


    {


    if (error != nil) {


    NSLog(@"An error occured during friends list request: %@", [error localizedDescription]);


    } else {


    [gcManager playersForIDs: friends];


    }


    }

    ```


    还需添加我们刚刚定义的新协议方法。请在`UFOViewController.m`文件中添加以下代码：


    ```

    - (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;


    {


    if (error != nil) {


    NSLog(@"An error occured during player lookup: %@", [error localizedDescription]);


    } else {


    NSLog(@"Players loaded: %@", players);


    }


    }

    ```


    现在运行应用（假设你的 Game Center 账户已关联好友），它将拉取好友的玩家 ID 列表，执行查找后将`GKPlayer`描述信息输出到控制台。输出内容应与以下示例类似：


    ```

    2011-02–01 14:20:23.335 UFOs[4038:207] Authentication Changed: <GKPlayer

    0x5f46fb0>(playerID: G:1092793231, alias: the_other_kyle, status: (null), rid:(null))

    2011-02–01 14:20:23.471 UFOs[4038:207] Players loaded: (

    "<GKPlayer 0x6a201e0>(playerID: G:1093075676, alias: johncash, status: (null),

    rid:(null))"

    )

    ```


    # 本章小结


    在本章中，你学习了如何检测 Game Center 兼容性以及为 iOS 6/7 及更早版本认证本地用户。现在你应该深刻理解如何使用`GameCenterManager`类，以及它对于创建整洁、易于在多个项目中复用的代码环境的优势。


    此外，你现在应能熟练使用`GKLocalPlayer`、`GKPlayer`和好友列表。下一章我们将深入探讨排行榜，并扩展本章所学的主题。如果你对本章讨论的任何内容有疑问，请记住，可获取的源代码（`www.apress.com`）包含了所有主题的工作示例。


    # 3. 排行榜


    > **摘要**

    > 古之所谓善战者，胜于易胜者也。

    >

    > ——[孙子](http://www.goodreads.com/author/show/1771.Sun_Tzu)，[《孙子兵法》](http://www.goodreads.com/work/quotes/3200649)


    排行榜的历史比电子游戏本身还要久远。正如我们所知，排行榜的起源可追溯到 20 世纪 50 年代的原始弹球机时代。弹球机制造商很快意识到，增加高分榜能提升竞争性，这意味着玩家游玩时间更长，收益也更多。


    20 世纪 70 年代，随着电子游戏开始兴起，排行榜迅速被这些新游戏采用，最早可追溯到 1976 年发布的游戏《Sea Wolf》（见图 3-1）。自此以后，排行榜成为游戏文化不可或缺的一部分。排行榜变得如此普及，以至于
    2007 年上映了全长纪录片《金刚之王》，记录了围绕任天堂《大金刚》高分榜的激烈竞争。如今排行榜已成为主流，不仅为玩家所期待，更是任何电子游戏的标配。


    ![A978-1-4302-4906-1_3_Fig1_HTML.jpg](img/A978-1-4302-4906-1_3_Fig1_HTML.jpg)


    **图 3-1.** 《Sea Wolf》（1976 年），首款包含高分功能的电子游戏


    iOS 的 Game Center 极大简化了在应用中添加排行榜的流程。考虑到此前开发者需要编写并维护服务器来存储和更新分数数据，这无疑是一个巨大的进步。本章将探讨在
    Game Center 下实现多个排行榜所需的步骤，以及所有必要的排行榜支持。你将学习如何提交分数、检索排行榜、自定义排行榜图形用户界面（GUI），以及处理创建适合你应用的排行榜所需的所有事项。


    ## 为何需要排行榜？


    在正式开始处理排行榜之前，理解为什么排行榜是你社交应用或游戏不可或缺的一部分至关重要。


    - 排行榜能在应用或游戏中营造社区感，否则你的用户可能无法直接与其他用户互动。

    - 排行榜能驱动用户返回你的应用，以超越自己的分数或朋友的高分。

    - 排行榜能在应用中创造目标感和成就感。

    - 排行榜使用户更易与朋友、家人和同事分享应用体验和进度。

    - Game Center 的排行榜易于实现，能快速让你的应用显得更精致、更完整。

    - 随着 iOS 6 中排行榜挑战功能的加入，玩家的朋友可能通过分数挑战促使他们重返你的游戏。'
- fmt: '# An Overview of Leaderboards in Game Center


    A leaderboard, in regards to Game Center, is an array of `GKScore` objects related
    to a specific leaderboard identifier, of which many can exist per app. Leaderboards
    can be retrieved and further filtered based on friend status and date submitted.


    `GKScore` objects represent each entry on a specific leaderboard. A `GKScore`
    always has a player ID associated with it. When the game center API submits a
    new `GKScore` to a leaderboard, the player ID is set automatically by the API
    and cannot be changed. There are also values for the date and rank that are automatically
    set and updated. You are required to set only the raw score value and leaderboard
    category to which the score belongs.


    There are two ways to retrieve and display leaderboards. The most common, and
    easiest, method is by using Apple’s leaderboard GUI. This will be the first approach
    we explore in the following sections. The second option is to retrieve the raw
    `GKScore` values and display them in your own GUI; this method is discussed later
    in the chapter.


    > **Note:** Game Center currently has a limit of 100 leaderboards per bundle ID
    with the introduction of iOS 7. iOS 6 and earlier carried a leaderboard limit
    of 25.


    ## Benefits of Using Apple’s Leaderboard GUI Compared to a Custom GUI


    Benefits of using Apple’s leaderboard GUI include the following:


    - The design was created by some of the best designers in the world.

    - It is very simple to implement and present the leaderboard.

    - Users will see a familiar interface that they already know how to interact with.


    Benefits of using a custom GUI include the following:


    - Your leaderboard can match the custom design of your app.

    - You have more freedom over the resulting data and can filter using additional
    criteria.

    - You can implement your own custom caching behavior.


    As you can see, each system has benefits and disadvantages, and there is no right
    answer to which one you should be using. By the end of this chapter, you will
    have a strong background in both options and will be able to decide correctly
    which method to implement based on the specific needs of your app.


    ## Configuring a Leaderboard in iTunes Connect


    Before working with the code side of leaderboards, you must first set up a new
    leaderboard in iTunes Connect. Log in to iTunes Connect ([http://itunesconnect.apple.com](http://itunesconnect.apple.com/))
    and select the app that we have already been working with from Chapters 1 and
    2. Once you have selected your app from the control panel, go to the Manage Game
    Center area.


    The Game Center portal for your app will have a section labeled Leaderboards.
    If this is the first leaderboard that you have set up for this app, you will see
    a button labeled Set Up. If you already have leaderboards in place, the steps
    here will be different and are covered later in this section.


    Once you are in the Leaderboards section (seen in Figure 3-2), select the Add
    Leaderboard button in the upper-left corner of the web page. You will be prompted
    to select either a single leaderboard or a combined leaderboard. A single leaderboard
    will be one collection of stored score objects that can be queried independently
    from other leaderboards. A combined leaderboard can also be accessed independently
    from other leaderboards; it is a collection of single leaderboards displayed together.
    The combined leaderboard is useful for showing data such as all-time high scores
    across all levels, or similar combined data.


    ![A978-1-4302-4906-1_3_Fig2_HTML.jpg](A978-1-4302-4906-1_3_Fig2_HTML.jpg)


    *Figure 3-2. Adding a new leaderboard in iTunes Connect*


    We begin by creating a new single leaderboard, as shown in Figure 3-3. The first
    thing you need to enter is the Leaderboard Reference Name. This value is used
    solely as a reference within iTunes Connect. The reference name is designed to
    help you quickly find leaderboards within iTunes Connect; the user never sees
    it. For this example, you can use the reference name “Leaderboard Foo.”


    ![A978-1-4302-4906-1_3_Fig3_HTML.jpg](A978-1-4302-4906-1_3_Fig3_HTML.jpg)


    *Figure 3-3. Creating a new single leaderboard in iTunes Connect*


    The next field is the Leaderboard ID, the value you will query in your code to
    retrieve a particular leaderboard. Apple recommends that you use a reverse-DNS
    entry format for this field, such as `com.company.appname.leaderboardname`. Fill
    in the appropriate values for your app here; it is not important what they are,
    but you will need to remember them throughout the remainder of this chapter.


    The Score Format Type is also required when creating a new leaderboard. Table
    3-1 shows the available data formats. Select the score format that meets the requirements
    for your score data.


    *Table 3-1. Score Format Types for Adding a New Leaderboard in iTunes Connect*


    | Score Format Type | Example Output |

    | --- | --- |

    | Integer | 12,345 |

    | Fixed Point - To 1 Decimal | 12,345.1 |

    | Fixed Point - To 2 Decimals | 12,345.12 |

    | Fixed Point - To 3 Decimals | 12,345.123 |

    | Elapsed Time - To the Minute | 3:45 |

    | Elapsed Time - To the Second | 3:45:55 |

    | Elapsed Time - To the Hundredth of a Second | 3:45:55.82 |

    | Money - Whole Numbers | $182,121 |

    | Money - To 2 Decimals | $182,121.68 |


    > **Tip:** If none of the provided format types match your requirements, select
    the one that best matches your needs. Later in this chapter, you will see how
    to customize these values by retrieving the raw score values.


    You also need to select whether you want the leaderboard to sort by ascending
    or descending order. Ascending order will display the lowest score first, as in
    a golf game or a lap around a track. Descending order will show the highest scores
    first, as in a game of football or a typical score in a first-person shooter.'
