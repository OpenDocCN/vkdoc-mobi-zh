  trans: "\n### 向用户展示你的产品\n\n首先，在商店视图控制器中添加一个表格视图。别忘了按需连接数据源和委托。我们还需要在类中添加一个新属性来存储产品。创建一个名为\
    \ `productArray` 的新类数组，并在 `productsRequest` 方法中将产品结果赋值给它。\n\n在你的类中添加两个必需的表格视图委托和数据源方法，如下列代码片段所示：\n\
    \n```objc\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [productArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
    \ *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier] autorelease];\n        cell.selectionStyle =\
    \ UITableViewCellSelectionStyleNone;\n    }\n\n    SKProduct *product = [self.productArray\
    \ objectAtIndex: [indexPath row]];\n    cell.textLabel.text = [NSString stringWithFormat:@\"\
    %@ - $%@\", product.localizedTitle, product.price];\n    cell.detailTextLabel.text\
    \ = product.localizedDescription;\n    return cell;\n}\n```\n\n第一个方法简单地返回从苹果服务器检索到的产品数量，这些产品用于表格的行数。当我们将其显示为单元格时，我们使用内置的\
    \ `UITableViewCellStyleSubtitle`。我们将主标签设置为产品标题和价格，并使用详细标签显示描述。剩下的工作就是在 `productsRequest`\
    \ 方法的末尾添加一个重新加载表格的方法。再次运行游戏时，你的输出应与图 11-11 所示类似。\n\n> **注意：** 虽然 API 返回本地化的标题和描述，但它不会本地化价格。在国际化应用中，你需要自己完成这额外的一步。\n\
    \n![A978-1-4302-4906-1_11_Fig11_HTML.jpg](img/A978-1-4302-4906-1_11_Fig11_HTML.jpg)\n\
    \n**图 11-11.** 在标准表格视图中显示产品列表\n\n## 购买产品\n\n在上一节中，你学习了如何将产品添加到你的应用中。如果没有购买这些产品的功能，我们的实现就只完成了一部分。在本节中，我们将探讨如何通过你的应用直接处理产品购买。\n\
    \n### 购买代码\n\n我们需要做的第一件事是让 `UFOStoreViewController` 类遵循 `SKPaymentTransactionObserver`\
    \ 协议。完成之后，我们修改现有的 `viewDidLoad` 方法。将 `self` 添加为新的交易观察者。此外，我们执行一个测试，确保可以在该设备上进行支付，如果不行，则显示一个\
    \ `UIAlert` 来通知用户。\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\n    if ([SKPaymentQueue\
    \ canMakePayments])\n    {\n        NSSet *productIdentifiers = [NSSet setWithObjects:@\"\
    com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\", nil];\n\
    \        productsRequest = [[SKProductsRequest alloc] initWithProductIdentifiers:productIdentifiers];\n\
    \        productsRequest.delegate = self;\n        [productsRequest start];\n\
    \    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:nil\
    \ message:@\"Unable to make purchases with this device.\" delegate:nil cancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles: nil];\n        [alert show];\n        [alert release];\n\
    \    }\n}\n```\n\n接下来，我们需要添加一个 `didSelectRowAtIndexPath` 方法来注册表格视图中的选择事件。\n\n\
    ```objc\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    SKProduct *product = [self.productArray objectAtIndex: [indexPath\
    \ row]];\n    SKPayment *payment = [SKPayment paymentWithProductIdentifier:product.productIdentifier];\n\
    \    [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\n如果现在运行应用并选择一个表行，你会看到一个确认提示，如图\
    \ 11-12 所示。然而，我们还没有编写任何处理该交易的代码，也没有设置测试用户，所以目前你只能进行到这一步。在快速查看多次购买同一商品的代码之后，我们将进入这些阶段。\n\
    \n![A978-1-4302-4906-1_11_Fig12_HTML.jpg](img/A978-1-4302-4906-1_11_Fig12_HTML.jpg)\n\
    \n**图 11-12.** 在沙盒环境中确认购买\n\n### 购买多个商品\n\n苹果让用户一次购买多个商品变得很简单。以下代码片段可用于一次批量购买多个数量的同一商品，例如用户购买五包\
    \ 100 金币：\n\n```objc\nSKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:com.dragonforged.rpg.100gold];\n\
    payment.quantity = 5;\n[[SKPaymentQueue defaultQueue] addPayment: payment];\n\
    ```\n"
- fmt: "### Processing a Transaction\n\nAfter the user has requested a purchase, there\
    \ are several steps needed in order to ensure that the purchase is completed successfully.\
    \ First, we implement the required method from the `SKPaymentTransactionObserver`.\
    \ As you can see in the following code example, we test the current transaction\
    \ state and then call some new methods, depending on whether the transaction succeeded,\
    \ failed, or restored:\n\n```objc\n- (void)paymentQueue:(SKPaymentQueue *)queue\
    \ updatedTransactions:(NSArray *)transactions\n{\n    for (SKPaymentTransaction\
    \ *transaction in transactions)\n    {\n        if ([transaction transactionState]\
    \ == SKPaymentTransactionStatePurchased)\n        {\n            [self transactionDidComplete:transaction];\n\
    \        }\n        else if ([transaction transactionState] == SKPaymentTransactionStateFailed)\n\
    \        {\n            [self transactionDidFail:transaction];\n        }\n  \
    \      else if ([transaction transactionState] == SKPaymentTransactionStateRestored)\n\
    \        {\n            [self transactionDidRestore:transaction];\n        }\n\
    \        else\n        {\n            NSLog(@\"Unhandled case: %@\", transaction);\n\
    \        }\n    }\n}\n```\n\nWe need to implement some convenience methods to\
    \ help streamline the process. If a transaction completed successfully or is restored,\
    \ we need to record the transaction event, unlock the content that the user purchased,\
    \ and perform some cleanup. If the transaction failed or was cancelled, we just\
    \ need to perform the cleanup and probably notify the user that something went\
    \ wrong. Here’s the code:\n\n```objc\n- (void)transactionDidComplete:(SKPaymentTransaction\
    \ *)transaction\n{\n    [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
    \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
    }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n  \
    \  [self recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
    \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
    \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
    {\n    if ([[transaction error] code] != SKErrorPaymentCancelled)\n    {\n   \
    \     [self finishTransaction:transaction withSuccess:NO];\n    }\n    // SKErrorPaymentCancelled\n\
    \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
    \    }\n}\n```\n\nNow let’s take a more detailed look at each of the methods that\
    \ we are calling, starting with the `recordTransactionData` method. The main purpose\
    \ of this method is to keep a virtual paper trail for our purchases. We are using\
    \ `NSUserDefaults` to hold on to an array of all completed transactions, which\
    \ allows us to check transaction data at any point in the future:\n\n```objc\n\
    - (void)recordTransactionData:(SKPaymentTransaction *)transaction\n{\n    NSArray\
    \ *transactions = [[NSUserDefaults standardUserDefaults] objectForKey:@\"transactions\"\
    ];\n    NSMutableArray *transactionArray = [transactions mutableCopy];\n    [transactionArray\
    \ addObject:[transaction transactionReceipt]];\n    [[NSUserDefaults standardUserDefaults]\
    \ setObject:transactionArray forKey:@\"transactions\"];\n    [transactionArray\
    \ release];\n}\n```\n\nNext, take a look at the `unlockContent` method. This is\
    \ where your app might differ. In this example, we set a flag in the `NSUserDefaults`\
    \ that we can check to see whether the user has purchased a feature. Depending\
    \ on how your app is structured, you might want to take a different approach to\
    \ unlocking content, but no matter what approach you take, remember that you need\
    \ to preserve the unlocked content through app restarts. See the section “Tying\
    \ Everything Together in UFOs” for a sample of how to implement this approach.\n\
    \n```objc\n- (void)unlockContent:(NSString *)productId\n{\n    if ([productId\
    \ isEqualToString:@\"com.dragonforged.ufo.newShip1\"])\n    {\n        [[NSUserDefaults\
    \ standardUserDefaults] setBool:YES forKey:@\"shipPlusAvailable\"];\n    }\n \
    \   if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"])\n\
    \    {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"\
    subscriptionAvailable\"];\n    }\n}\n```\n\nThe last step that is taken for both\
    \ successful and unsuccessful purchases is to perform a bit of cleanup on the\
    \ transaction process. The most important step in the following method is to call\
    \ the `finishTransaction` method. We also log the results of the transaction for\
    \ debugging purposes. Until you have called `finishTransaction`, the transaction\
    \ remains open and in the system.\n\n```objc\n- (void)finishTransaction:(SKPaymentTransaction\
    \ *)transaction withSuccess:(BOOL)success\n{\n    [[SKPaymentQueue defaultQueue]\
    \ finishTransaction:transaction];\n    NSDictionary *transactionDictionary = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:transaction, @\"transaction\", nil];\n    if (success)\n\
    \    {\n        NSLog(@\"Transaction was successful: %@\", transactionDictionary);\n\
    \    }\n    else\n    {\n        NSLog(@\"Transaction was unsuccessful: %@\",\
    \ transactionDictionary);\n    }\n}\n```\n\n### Restoring Previously Completed\
    \ Transactions\n\nOften, your users will need to restore purchases that they have\
    \ previously made. This could happen if they have reinstalled your app or have\
    \ begun using it on a different device. It is important to always add a path for\
    \ your user to download all of their content again. Luckily, Apple has planned\
    \ ahead for this scenario and has provided a simple method for restoring the user’s\
    \ purchases.\n\n```objc\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
    ```\n\nThis will repurchase all of your content as if the user had selected it\
    \ from your store. You will receive appropriate callbacks to the `paymentQueue:updatedTransactions`\
    \ method and can use your existing code to unlock content.\n\n## Test Accounts\
    \ and Testing Purchases\n\nIf you were to try to purchase one of your items in\
    \ the Sandbox now, you would receive an account error. You need to first create\
    \ a new test account in order to be able to test purchases without being charged\
    \ for them. To set up a new test user, you need to log in to iTunes Connect (\
    \ [`http://iTunesConnect.apple.com`](http://itunesconnect.apple.com/) ). Select\
    \ the Manage User section from the main screen of iTunes Connect; from here, select\
    \ the option for a new Test User.\n\nTest users do not need to use a real e-mail\
    \ address, and you will want to select something quick to type and easy to remember,\
    \ such as `abc@def.com`. Although you do need to enter a date of birth and other\
    \ identifying information, there is no reason you cannot fabricate this data.\
    \ Make sure to select the iTunes Store that is appropriate to test the app’s localization\
    \ against. You can make a new account for each region that you will test with.\n\
    \n### Signing In with a Test Account\n\nYou cannot simply sign in with your test\
    \ account in the Settings App. If you did, you would be forced to agree to the\
    \ standard user agreement and prompted to enter a credit card number. In order\
    \ to resolve this issue, you need to use the Settings App to log out of your existing\
    \ iTunes account. After you are logged out of an account, you will be prompted\
    \ to log in or create a new account during a purchase attempt. This is where you\
    \ will enter your test account credentials.\n\n**Note:** If you are testing on\
    \ your primary device, don’t forget to revisit the Settings App to log out of\
    \ your test account before making real purchases or downloading updates."
  raw: '### Processing a Transaction


    After the user has requested a purchase, there are several steps needed in order
    to ensure that the purchase is completed successfully. First, we implement the
    required method from the `SKPaymentTransactionObserver`. As you can see in the
    following code example, we test the current transaction state and then call some
    new methods, depending on whether the transaction succeeded, failed, or restored:


    `- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray *)transactions`


    `{`


    `for (SKPaymentTransaction *transaction in transactions)`


    `{`


    `if ([transaction transactionState] == SKPaymentTransactionStatePurchased)`


    `{`


    `[self transactionDidComplete:transaction];`


    `}`


    `else if ([transaction transactionState] == SKPaymentTransactionStateFailed)`


    `{`


    `[self transactionDidFail:transaction];`


    `}`


    `else if ([transaction transactionState] == SKPaymentTransactionStateRestored)`


    `{`


    `[self transactionDidRestore:transaction];`


    `}`


    `else`


    `{`


    `NSLog(@"Unhandled case: %@", transaction);`


    `}`


    `}`


    `}`


    We need to implement some convenience methods to help streamline the process.
    If a transaction completed successfully or is restored, we need to record the
    transaction event, unlock the content that the user purchased, and perform some
    cleanup. If the transaction failed or was cancelled, we just need to perform the
    cleanup and probably notify the user that something went wrong. Here’s the code:


    `- (void)transactionDidComplete:(SKPaymentTransaction *)transaction`


    `{`


    `[self recordTransactionData:transaction];`


    `[self unlockContent:[[transaction payment] productIdentifier]];`


    `[self finishTransaction:transaction withSuccess:YES];`


    `}`


    `- (void)transactionDidRestore:(SKPaymentTransaction *)transaction`


    `{`


    `[self recordTransactionData:transaction.originalTransaction];`


    `[self unlockContent:[[[transaction originalTransaction] payment]`É


    `productIdentifier]];`


    `[self finishTransaction:transaction withSuccess:YES];`


    `}`


    `- (void)transactionDidFail:(SKPaymentTransaction *)transaction`


    `{`


    `if ([[transaction error] code] != SKErrorPaymentCancelled)`


    `{`


    `[self finishTransaction:transaction withSuccess:NO];`


    `}`


    `//SKErrorPaymentCancelled`


    `else`


    `{`


    `[[SKPaymentQueue defaultQueue] finishTransaction:transaction];`


    `}`


    `}`


    Now let’s take a more detailed look at each of the methods that we are calling,
    starting with the `recordTransactionData` method. The main purpose of this method
    is to keep a virtual paper trail for our purchases. We are using `NSUserDefaults`
    to hold on to an array of all completed transactions, which allows us to check
    transaction data at any point in the future:


    `- (void)recordTransactionData:(SKPaymentTransaction *)transaction`


    `{`


    `NSArray *transactions = [[NSUserDefaults standardUserDefaults]`É


    `objectForKey:@"transactions"];`


    `NSMutableArray *transactionArray = [transactions mutableCopy];`


    `[transactionArray addObject:[transaction transactionReceipt]];`


    `[[NSUserDefaults standardUserDefaults] setObject:transactionArray`É


    `forKey:@"transactions"];`


    `[transactionArray release];`


    `}`


    Next, take a look at the `unlockContent` method. This is where your app might
    differ. In this example, we set a flag in the `NSUserDefaults` that we can check
    to see whether the user has purchased a feature. Depending on how your app is
    structured, you might want to take a different approach to unlocking content,
    but no matter what approach you take, remember that you need to preserve the unlocked
    content through app restarts. See the section “Tying Everything Together in UFOs”
    for a sample of how to implement this approach.


    `- (void)unlockContent:(NSString *)productId`


    `{`


    `if ([productId isEqualToString:@"com.dragonforged.ufo.newShip1"])`


    `{`


    `[[NSUserDefaults standardUserDefaults] setBool:YES forKey:`É


    `@"shipPlusAvailable" ];`


    `}`


    `if ([productId isEqualToString:@"com.dragonforged.ufo.subscription"])`


    `{`


    `[[NSUserDefaults standardUserDefaults] setBool:YES`É


    `forKey:@"subscriptionAvailable" ];`


    `}`


    `}`


    The last step that is taken for both successful and unsuccessful purchases is
    to perform a bit of cleanup on the transaction process. The most important step
    in the following method is to call the `finishTransaction` method. We also log
    the results of the transaction for debugging purposes. Until you have called `finishTransaction`,
    the transaction remains open and in the system.


    `- (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success`


    `{`


    `[[SKPaymentQueue defaultQueue] finishTransaction:transaction];`


    `NSDictionary *transactionDictionary = [NSDictionary`É


    `dictionaryWithObjectsAndKeys:transaction, @"transaction" , nil];`


    `if (success)`


    `{`


    `NSLog(@"Transaction was successful: %@", transactionDictionary);`


    `}`


    `else`


    `{`


    `NSLog(@"Transaction was unsuccessful: %@", transactionDictionary);`


    `}`


    `}`


    ### Restoring Previously Completed Transactions


    Often, your users will need to restore purchases that they have previously made.
    This could happen if they have reinstalled your app or have begun using it on
    a different device. It is important to always add a path for your user to download
    all of their content again. Luckily, Apple has planned ahead for this scenario
    and has provided a simple method for restoring the user’s purchases.


    `[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];`


    This will repurchase all of your content as if the user had selected it from your
    store. You will receive appropriate callbacks to the `paymentQueue:updatedTransactions`
    method and can use your existing code to unlockcontent.


    ## Test Accounts and Testing Purchases


    If you were to try to purchase one of your items in the Sandbox now, you would
    receive an account error. You need to first create a new test account in order
    to be able to test purchases without being charged for them. To set up a new test
    user, you need to log in to iTunes Connect ( [`http://iTunesConnect.apple.com`](http://itunesconnect.apple.com/)
    ). Select the Manage User section from the main screen of iTunes Connect; from
    here, select the option for a new Test User.


    Test users do not need to use a real e-mail address, and you will want to select
    something quick to type and easy to remember, such as `abc@def.com`. Although
    you do need to enter a date of birth and other identifying information, there
    is no reason you cannot fabricate this data. Make sure to select the iTunes Store
    that is appropriate to test the app’s localization against. You can make a new
    account for each region that you will test with.


    ### Signing In with a Test Account


    You cannot simply sign in with your test account in the Settings App. If you did,
    you would be forced to agree to the standard user agreement and prompted to enter
    a credit card number. In order to resolve this issue, you need to use the Settings
    App to log out of your existing iTunes account. After you are logged out of an
    account, you will be prompted to log in or create a new account during a purchase
    attempt. This is where you will enter your test account credentials.


    Note


    If you are testing on your primary device, don’t forget to revisit the Settings
    App to log out of your test account before making real purchases or downloading
    updates.'
  trans: "\n### 处理交易\n\n当用户发起购买请求后，需要执行若干步骤以确保购买成功完成。首先，我们需要实现`SKPaymentTransactionObserver`协议中要求的方法。如下方代码示例所示，我们检测当前交易状态，然后根据交易成功、失败或恢复来调用相应的方法：\n\
    \n```objc\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
    \ *)transactions\n{\n    for (SKPaymentTransaction *transaction in transactions)\n\
    \    {\n        if ([transaction transactionState] == SKPaymentTransactionStatePurchased)\n\
    \        {\n            [self transactionDidComplete:transaction];\n        }\n\
    \        else if ([transaction transactionState] == SKPaymentTransactionStateFailed)\n\
    \        {\n            [self transactionDidFail:transaction];\n        }\n  \
    \      else if ([transaction transactionState] == SKPaymentTransactionStateRestored)\n\
    \        {\n            [self transactionDidRestore:transaction];\n        }\n\
    \        else\n        {\n            NSLog(@\"未处理的情况: %@\", transaction);\n \
    \       }\n    }\n}\n```\n\n我们需要实现一些便捷方法来简化流程。如果交易成功完成或已恢复，我们需要记录交易事件、解锁用户购买的内容，并执行一些清理工作。如果交易失败或取消，我们只需执行清理操作，并可能通知用户发生了问题。相关代码如下：\n\
    \n```objc\n- (void)transactionDidComplete:(SKPaymentTransaction *)transaction\n\
    {\n    [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
    \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
    }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n  \
    \  [self recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
    \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
    \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
    {\n    if ([[transaction error] code] != SKErrorPaymentCancelled)\n    {\n   \
    \     [self finishTransaction:transaction withSuccess:NO];\n    }\n    // SKErrorPaymentCancelled\n\
    \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
    \    }\n}\n```\n\n现在让我们详细看看调用的每个方法，先从`recordTransactionData`方法开始。该方法的主要目的是为我们的购买行为保留一份虚拟的审计线索。我们使用`NSUserDefaults`来保存所有已处理交易的数组，这样我们可以在将来任意时刻检查交易数据：\n\
    \n```objc\n- (void)recordTransactionData:(SKPaymentTransaction *)transaction\n\
    {\n    NSArray *transactions = [[NSUserDefaults standardUserDefaults] objectForKey:@\"\
    transactions\"];\n    NSMutableArray *transactionArray = [transactions mutableCopy];\n\
    \    [transactionArray addObject:[transaction transactionReceipt]];\n    [[NSUserDefaults\
    \ standardUserDefaults] setObject:transactionArray forKey:@\"transactions\"];\n\
    \    [transactionArray release];\n}\n```\n\n接下来，看看`unlockContent`方法。这里就是你的应用可能有所不同的地方。在本示例中，我们在`NSUserDefaults`中设置一个标志，用于检查用户是否已购买某个功能。根据应用的结构不同，你可能需要采取不同的方式来解锁内容，但无论采用何种方法，请记住，你需要确保解锁的内容在应用重启后依然保留。请参阅“在\
    \ UFOs 中将所有内容整合在一起”一节，了解如何实现此方法的示例。\n\n```objc\n- (void)unlockContent:(NSString\
    \ *)productId\n{\n    if ([productId isEqualToString:@\"com.dragonforged.ufo.newShip1\"\
    ])\n    {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"\
    shipPlusAvailable\"];\n    }\n    if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"\
    ])\n    {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"\
    subscriptionAvailable\"];\n    }\n}\n```\n\n对于成功和不成功的购买，最后一步都是对交易过程进行一些清理。以下方法中最重要的步骤是调用`finishTransaction`方法。我们还会记录交易结果以供调试。在你调用`finishTransaction`之前，交易将保持开放状态并存在于系统中。\n\
    \n```objc\n- (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success\n\
    {\n    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n    NSDictionary\
    \ *transactionDictionary = [NSDictionary dictionaryWithObjectsAndKeys:transaction,\
    \ @\"transaction\", nil];\n    if (success)\n    {\n        NSLog(@\"交易成功: %@\"\
    , transactionDictionary);\n    }\n    else\n    {\n        NSLog(@\"交易失败: %@\"\
    , transactionDictionary);\n    }\n}\n```\n\n### 恢复之前完成的交易\n\n通常，用户需要恢复他们之前完成的购买。这可能在用户重新安装应用或在另一台设备上开始使用时发生。始终为用户提供下载所有内容的途径非常重要。幸运的是，Apple\
    \ 已经预见到了这一场景，并提供了一个简单的方法来恢复用户的购买。\n\n```objc\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
    ```\n\n这将重新购买你的所有内容，就像用户从你的商店中选择它们一样。你会收到`paymentQueue:updatedTransactions`方法的相应回调，并可以使用现有的代码来解锁内容。\n\
    \n## 测试账户与测试购买\n\n如果你现在尝试在沙盒环境中购买某个项目，将会收到账户错误。你需要先创建一个新的测试账户，才能在不产生实际费用的情况下测试购买。要设置新的测试用户，你需要登录\
    \ iTunes Connect（[`http://iTunesConnect.apple.com`](http://itunesconnect.apple.com/)）。从\
    \ iTunes Connect 主屏幕选择“管理用户”部分；在这里，选择“新测试用户”选项。\n\n测试用户无需使用真实的电子邮件地址，你应选择输入方便且容易记住的内容，例如`abc@def.com`。虽然你需要输入出生日期和其他身份信息，但完全可以虚构这些数据。请确保选择与测试应用本地化版本相对应的\
    \ iTunes Store。你可以为每个要测试的地区创建一个新账户。\n\n### 使用测试账户登录\n\n你不能直接在“设置”应用中登录测试账户。如果这样做，你将被迫同意标准用户协议，并提示输入信用卡号。为了解决这个问题，你需要使用“设置”应用退出当前的\
    \ iTunes 账户。退出账户后，在尝试购买时会提示你登录或创建新账户。此时你就可以输入测试账户的凭据。\n\n**注意：** 如果你在主要设备上进行测试，在进行真实购买或下载更新前，别忘了重新打开“设置”应用并退出测试账户。\n"
- fmt: "# Submitting a Purchase GUI Screenshot\n\nWe talked briefly about this step\
    \ earlier in this chapter. Apple requires that you submit a screenshot of your\
    \ in-app purchase before it will clear it for sale. There is some confusion about\
    \ what Apple is specifically looking for in this screenshot.\n\nApple is looking,\
    \ in the simplest terms, for a screen capture proving that your in-app purchase\
    \ is working as intended. For unlockable content, this would be a screenshot of\
    \ the item being used, such as the user playing a purchased level or using a purchased\
    \ item. However, sometimes your product might not be visible while being used.\
    \ In cases such as these, Apple has accepted a screenshot of the store showing\
    \ that the item has been purchased, an example of which is shown in Figure [11-13](#A978-1-4302-4906-1_11_Chapter.html#Fig13).\n\
    \n**Note:** You will not be required to submit a screenshot until you have finished\
    \ writing and debugging your app and are ready to submit it for review.\n\n![A978-1-4302-4906-1_11_Fig13_HTML.jpg](A978-1-4302-4906-1_11_Fig13_HTML.jpg)\n\
    \n*Figure 11-13.* An example of an acceptable screenshot for in-app purchase when\
    \ there isn’t an item to capture\n\n**Note:** When Apple test In App Purchase\
    \ during the review process they do so using a Sandbox account. This means that\
    \ apps shipped to Apple need to support both Sandbox and Production environments.\n\
    \n# Developer Approval\n\nThe last step that you need to take before your in-app\
    \ purchase is ready to go is developer approval. Return to iTunes Connect in your\
    \ web browser and navigate to the Manage In-App Purchase section of your app review\
    \ page. There will be a new green button in the upper-right corner of the screen.\n\
    \nYou will be prompted for how to submit your product. The following two options\
    \ are available.\n\n- **Submit with Binary:** This option will turn on in-app\
    \ purchase with your next binary upload.\n- **Submit Now:** This will allow you\
    \ to submit a new product to an existing app.\n\n**Note:** If you see the option\
    \ Submit with a New Binary, it could be because the last version of your App was\
    \ uploaded before in-app purchasing was available in iOS 3.0.\n\n# Receipts\n\n\
    When you successfully complete a transaction, you are provided with a receipt\
    \ as part of the competed transaction object. The following is a sample receipt\
    \ from one of the purchases in our UFOs demo project.\n\n```\n{\n\"signature\"\
    \ = \"\"\
    ;\n\"purchase-info\" = \"\"\
    ;\n\"environment\" = \"Sandbox\";\n\"pod\" = \"100\";\n\"signing-status\" = \"\
    0\";\n}\n```\n\nApple urges developers to check this receipt for validity. Although\
    \ this step remains optional, checking adds an extra layer of security and prevents\
    \ users from activating your in-app purchases without having to pay for the content.\
    \ Apple provides two servers for you to validate receipts against: one for Sandbox\
    \ environments, and one for shipping software, as described in Table [11-1](#A978-1-4302-4906-1_11_Chapter.html#Tab1).\n\
    \n*Table 11-1.* Server Addresses for Verifying Receipts with Apple\n\n| Environment\
    \ | Server Address |\n| --- | --- |\n| Sandbox | [`sandbox.itunes.apple.com`](http://sandbox.itunes.apple.com)\
    \ |\n| Production | [`buy.itunes.apple.com`](http://buy.itunes.apple.com) |\n\n\
    Joe D’Andrea has posted two methods to help you check for valid receipts on Stack\
    \ Overflow ( [`http://stackoverflow.com/questions/1298998`](http://stackoverflow.com/questions/1298998)\
    \ ). His approach is streamlined and efficient, so I have included it here for\
    \ your convenience.\n\n```objc\n-(BOOL)verifyReceipt:(SKPaymentTransaction *)transaction\n\
    {\n    NSString *jsonObjectString = [self encode:(uint8_t *)transaction.transactionReceipt.bytes\
    \ length:transaction.transactionReceipt.length];\n    NSString *completeString\
    \ = [NSString stringWithFormat:@\"http://url-for-your-php?receipt=%@\", jsonObjectString];\n\
    \    NSURL *urlForValidation = [NSURL URLWithString:completeString];\n    NSMutableURLRequest\
    \ *validationRequest = [[NSMutableURLRequest alloc] initWithURL:urlForValidation];\n\
    \    [validationRequest setHTTPMethod:@\"GET\"];\n    NSData *responseData = [NSURLConnection\
    \ sendSynchronousRequest:validationRequest returningResponse:nil error:nil];\n\
    \    [validationRequest release];\n    NSString *responseString = [[NSString alloc]\
    \ initWithData:responseData encoding:NSUTF8StringEncoding];\n    NSInteger response\
    \ = [responseString integerValue];\n    [responseString release];\n    return\
    \ (response == 0);\n}\n\n- (NSString *)encode:(const uint8_t *)input length:(NSInteger)length\n\
    {\n    static char table[] = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\"\
    ;\n    NSMutableData *data = [NSMutableData dataWithLength:((length + 2) / 3)\
    \ * 4];\n    uint8_t *output = (uint8_t *)data.mutableBytes;\n    \n    for (NSInteger\
    \ i = 0; i < length; i += 3) {\n        NSInteger value = 0;\n        for (NSInteger\
    \ j = i; j < (i + 3); j++) {\n            value <<= 8;\n            if (j < length)\
    \ {\n                value |= (0xFF & input[j]);\n            }\n        }\n \
    \       NSInteger index = (i / 3) * 4;\n        output[index + 0] = table[(value\
    \ >> 18) & 0x3F];\n        output[index + 1] = table[(value >> 12) & 0x3F];\n\
    \        output[index + 2] = (i + 1) < length ? table[(value >> 6) & 0x3F] : '=';\n\
    \        output[index + 3] = (i + 2) < length ? table[(value >> 0) & 0x3F] : '=';\n\
    \    }\n    return [[[NSString alloc] initWithData:data encoding:NSASCIIStringEncoding]\
    \ autorelease];\n}\n```\n\nAfter you have added these two methods to your project,\
    \ you simply need to call `verifyReceipt` with the transaction that was returned\
    \ to you, and then perform a Boolean test to see whether it is valid. This concludes\
    \ all the steps that you need to take to check a receipt for authenticity.\n\n\
    This method of verifying receipts requires you to host an intermediate server;\
    \ following is a very stripped-down PHP script to validate receipts:\n\n```php\n\
    $receipt = json_encode(array(\"receipt-data\" => $_GET[\"receipt\"]));\n// NOTE:\
    \ use \"buy\" vs \"sandbox\" in production.\n$url = \"https://sandbox.itunes.apple.com/verifyReceipt\"\
    ;\n$response_json = call-your-http-post-here($url, $receipt);\n$response = json_decode($response_json);\n\
    // Save the data here!\nprint $response->{'status'};\n```"
  raw: '## Submitting a Purchase GUI Screenshot


    We talked briefly about this step earlier in this chapter. Apple requires that
    you submit a screenshot of your in-app purchase before it will clear it for sale.
    There is some confusion about what Apple is specifically looking for in this screenshot.


    Apple is looking, in the simplest terms, for a screen capture proving that your
    in-app purchase is working as intended. For unlockable content, this would be
    a screenshot of the item being used, such as the user playing a purchased level
    or using a purchased item. However, sometimes your product might not be visible
    while being used. In cases such as these, Apple has accepted a screenshot of the
    store showing that the item has been purchased, an example of which is shown in
    Figure [11-13](#A978-1-4302-4906-1_11_Chapter.html#Fig13).


    Note


    You will not be required to submit a screenshot until you have finished writing
    and debugging your app and are ready to submit it for review.


    ![A978-1-4302-4906-1_11_Fig13_HTML.jpg](A978-1-4302-4906-1_11_Fig13_HTML.jpg)


    Figure 11-13.


    An example of an acceptable screenshot for in-app purchase when there isn’t an
    item to capture Note


    When Apple test In App Purchase during the review process they do so using a Sandbox
    account. This means that apps shipped to Apple need to support both Sandbox and
    Production enviroments.


    ## Developer Approval


    The last step that you need to take before your in-app purchase is ready to go
    is developer approval. Return to iTunes Connect in your web browser and navigate
    to the Manage In-App Purchase section of your app review page. There will be a
    new green button in the upper-right corner of the screen.


    You will be prompted for how to submit your product. The following two options
    are available.


    *   Submit with Binary: This option will turn on in-app purchase with your next
    binary upload.

    *   Submit Now: This will allow you to submit a new product to an existing app.


    Note


    If you see the option Submit with a New Binary, it could be because the last version
    of your App was uploaded before in-app purchasing was available in iOS 3.0.


    ## Receipts


    When you successfully complete a transaction, you are provided with a receipt
    as part of the competed transaction object. The following is a sample receipt
    from one of the purchases in our UFOs demo project.


    `{`


    `"signature" = "";`


    `"purchase-info" = "";`


    `"environment" = "Sandbox`


    `"pod" = "100";`


    `"signing-status" = "0";`


    `}`


    Apple urges developers to check this receipt for validity. Although this step
    remains optional, checking adds an extra layer of security and prevents users
    from activating your in-app purchases without having to pay for the content. Apple
    provides two servers for you to validate receipts against: one for Sandbox environments,
    and one for shipping software, as described in Table [11-1](#A978-1-4302-4906-1_11_Chapter.html#Tab1).


    Table 11-1.


    Server Addresses for Verifying Receipts with Apple


    | Environment | Server Address |

    | --- | --- |

    | Sandbox | [`sandbox.itunes.apple.com`](http://sandbox.itunes.apple.com) |

    | Production | [`buy.itunes.apple.com`](http://buy.itunes.apple.com) |


    Joe D’Andrea has posted two methods to help you check for valid receipts on Stack
    Overflow ( [`http://stackoverflow.com/questions/1298998`](http://stackoverflow.com/questions/1298998)
    ). His approach is streamlined and efficient, so I have included it here for your
    convenience.


    `-(BOOL)verifyReceipt:(SKPaymentTransaction *)transaction`


    `{`


    `NSString *jsonObjectString = [self encode:(uint8_t *)`É


    `transaction.transactionReceipt.bytes length:transaction.transactionReceipt.length];`


    `NSString *completeString = [NSString stringWithFormat:`É


    `@"` `http://url-for-your-php?receipt` `=%@", jsonObjectString];`


    `NSURL *urlForValidation = [NSURL URLWithString:completeString];`


    `NSMutableURLRequest *validationRequest = [[NSMutableURLRequest alloc]`É


    `initWithURL:urlForValidation];`


    `[validationRequest setHTTPMethod:@"GET"];`


    `NSData *responseData = [NSURLConnection sendSynchronousRequest:`É


    `validationRequest returningResponse:nil error:nil];`


    `[validationRequest release];`


    `NSString *responseString = [[NSString alloc] initWithData:responseData`É


    `encoding: NSUTF8StringEncoding];`


    `NSInteger response = [responseString integerValue];`


    `[responseString release];`


    `return (response == 0);`


    `}`


    `- (NSString *)encode:(const uint8_t *)input length:(NSInteger)length`


    `{`


    `static char table[] =`É


    `"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";`


    `NSMutableData *data = [NSMutableData dataWithLength:((length + 2) / 3) * 4];`


    `uint8_t *output = (uint8_t *)data.mutableBytes;`


    `for (NSInteger i = 0; i < length; i += 3) {`


    `NSInteger value = 0;`


    `for (NSInteger j = i; j < (i + 3); j++) {`


    `value <<= 8;`


    `if (j < length) {`


    `value |= (0xFF & input[j]);`


    `}`


    `}`


    `NSInteger index = (i / 3) * 4;`


    `output[index + 0] =                    table[(value >> 18) & 0x3F];`


    `output[index + 1] =                    table[(value >> 12) & 0x3F];`


    `output[index + 2] = (i + 1) < length ? table[(value >> 6)  & 0x3F] : ''='';`


    `output[index + 3] = (i + 2) < length ? table[(value >> 0)  & 0x3F] : ''='';`


    `}`


    `return [[[NSString alloc] initWithData:data encoding:NSASCIIStringEncoding]`É


    `autorelease];`


    `}`


    After you have added these two methods to your project, you simply need to call
    `verifyReceipt` with the transaction that was returned to you, and then perform
    a Boolean test to see whether it is valid. This concludes all the steps that you
    need to take to check a receipt for authenticity.


    This method of verifying receipts requires you to host an intermediate server;
    following is a very stripped-down PHP script to validate receipts:


    `$receipt = json_encode(array("receipt-data" => $_GET["receipt"]));`


    `// NOTE: use "buy" vs "sandbox" in production.`


    `$url = "` [`https://sandbox.itunes.apple.com/verifyReceipt`](https://sandbox.itunes.apple.com/verifyReceipt)
    `";`


    `$response_json = call-your-http-post-here($url, $receipt);`


    `$response = json_decode($response_json);`


    `// Save the data here!`


    `print $response->{''status''};`'
  trans: "\n# 提交购买界面截图\n\n我们在本章前面简要讨论过这一步骤。苹果要求你在应用内购买项目获得销售许可之前，先提交一张截图。关于苹果具体需要这张截图展示什么，存在一些困惑。\n\
    \n简单来说，苹果希望你能提供一张屏幕截图，证明你的应用内购买功能按预期工作。对于可解锁内容，这应该是一张正在使用该项目的截图，比如用户正在玩已购买的游戏关卡，或正在使用已购买的道具。然而，有时候你的产品在使用时可能并不可见。在这种情况下，苹果接受一张商店界面显示该项目已被购买的截图，如图\
    \ 11-13 所示。\n\n**注意：** 你需要等到完成应用的编写和调试，并准备提交审核时，才需要提交截图。\n\n![A978-1-4302-4906-1_11_Fig13_HTML.jpg](img/A978-1-4302-4906-1_11_Fig13_HTML.jpg)\n\
    \n*图 11-13.* 当没有可截取的使用中画面时，一张可被接受的应用内购买截图示例。\n\n**注意：** 苹果在审核过程中测试应用内购买时，会使用沙盒账户。这意味着提交给苹果的应用需要同时支持沙盒环境和生产环境。\n\
    \n# 开发者批准\n\n在应用内购买项目准备就绪之前的最后一步是获得开发者批准。回到网页浏览器中的 iTunes Connect，导航至应用审核页面的“管理应用内购买”部分。屏幕右上角会出现一个新的绿色按钮。\n\
    \n系统会提示你如何提交产品。有以下两种选项：\n\n-   **随二进制文件提交：** 此选项将在你下次上传二进制文件时启用应用内购买功能。\n-   **立即提交：**\
    \ 此选项允许你向现有应用提交新产品。\n\n**注意：** 如果你看到“随新二进制文件提交”选项，可能是因为你的上一个应用版本是在 iOS 3.0 引入应用内购买功能之前上传的。\n\
    \n# 收据\n\n当你成功完成一笔交易时，你会收到一张收据，作为已完成的交易对象的一部分。以下是我们 UFOs 演示项目中一次购买的收据样本。\n\n```\n\
    {\n\"signature\" = \"\"\
    ;\n\"purchase-info\" = \"\"\
    ;\n\"environment\" = \"Sandbox\";\n\"pod\" = \"100\";\n\"signing-status\" = \"\
    0\";\n}\n```\n\n苹果强烈建议开发者检查此收据的有效性。虽然这一步骤仍是可选的，但进行检查可以增加一层安全保障，防止用户在不付费的情况下激活你的应用内购买。苹果提供了两个用于验证收据的服务器：一个用于沙盒环境，另一个用于正式发布软件，如表\
    \ 11-1 所述。\n\n*表 11-1.* 用于向苹果验证收据的服务器地址\n\n| 环境 | 服务器地址 |\n| --- | --- |\n| 沙盒\
    \ | [`sandbox.itunes.apple.com`](http://sandbox.itunes.apple.com) |\n| 生产环境 |\
    \ [`buy.itunes.apple.com`](http://buy.itunes.apple.com) |\n\nJoe D’Andrea 在 Stack\
    \ Overflow ( [`http://stackoverflow.com/questions/1298998`](http://stackoverflow.com/questions/1298998)\
    \ ) 上发布了两种方法来帮助你检查有效收据。他的方法简洁高效，为了方便您使用，我已将其收录在此。\n\n```objc\n-(BOOL)verifyReceipt:(SKPaymentTransaction\
    \ *)transaction\n{\n    NSString *jsonObjectString = [self encode:(uint8_t *)transaction.transactionReceipt.bytes\
    \ length:transaction.transactionReceipt.length];\n    NSString *completeString\
    \ = [NSString stringWithFormat:@\"http://url-for-your-php?receipt=%@\", jsonObjectString];\n\
    \    NSURL *urlForValidation = [NSURL URLWithString:completeString];\n    NSMutableURLRequest\
    \ *validationRequest = [[NSMutableURLRequest alloc] initWithURL:urlForValidation];\n\
    \    [validationRequest setHTTPMethod:@\"GET\"];\n    NSData *responseData = [NSURLConnection\
    \ sendSynchronousRequest:validationRequest returningResponse:nil error:nil];\n\
    \    [validationRequest release];\n    NSString *responseString = [[NSString alloc]\
    \ initWithData:responseData encoding:NSUTF8StringEncoding];\n    NSInteger response\
    \ = [responseString integerValue];\n    [responseString release];\n    return\
    \ (response == 0);\n}\n\n- (NSString *)encode:(const uint8_t *)input length:(NSInteger)length\n\
    {\n    static char table[] = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\"\
    ;\n    NSMutableData *data = [NSMutableData dataWithLength:((length + 2) / 3)\
    \ * 4];\n    uint8_t *output = (uint8_t *)data.mutableBytes;\n    \n    for (NSInteger\
    \ i = 0; i < length; i += 3) {\n        NSInteger value = 0;\n        for (NSInteger\
    \ j = i; j < (i + 3); j++) {\n            value <<= 8;\n            if (j < length)\
    \ {\n                value |= (0xFF & input[j]);\n            }\n        }\n \
    \       NSInteger index = (i / 3) * 4;\n        output[index + 0] = table[(value\
    \ >> 18) & 0x3F];\n        output[index + 1] = table[(value >> 12) & 0x3F];\n\
    \        output[index + 2] = (i + 1) < length ? table[(value >> 6) & 0x3F] : '=';\n\
    \        output[index + 3] = (i + 2) < length ? table[(value >> 0) & 0x3F] : '=';\n\
    \    }\n    return [[[NSString alloc] initWithData:data encoding:NSASCIIStringEncoding]\
    \ autorelease];\n}\n```\n\n将这两个方法添加到你的项目之后，你只需调用`verifyReceipt`并传入你收到的交易对象，然后执行一个布尔值测试来判断收据是否有效。至此，就完成了验证收据真伪所需的所有步骤。\n\
    \n这种验证收据的方法要求你托管一个中间服务器；以下是一个非常精简的用于验证收据的 PHP 脚本：\n\n```php\n$receipt = json_encode(array(\"\
    receipt-data\" => $_GET[\"receipt\"]));\n// 注意：在生产环境中使用 \"buy\" 替代 \"sandbox\"\
    。\n$url = \"https://sandbox.itunes.apple.com/verifyReceipt\";\n$response_json\
    \ = call-your-http-post-here($url, $receipt);\n$response = json_decode($response_json);\n\
    // 在此处保存数据！\nprint $response->{'status'};\n```\n"
- fmt: "# iOS 7 Local Receipt Validation\n\niOS 7 added the ability to verify In App\
    \ Purchase receipts on the device without needing to go through a third party\
    \ server. Server receipt validation is still available and may even be the more\
    \ appropriate depending on the needs of your app.\n\nApple recommends validating\
    \ local receipts within the main function of your app before the `NSApplicationMain`\
    \ function is called. In order to verify a receipt it must first be located. `NSBundle`\
    \ contains a convenience helper, which will locate the receipt for you. In the\
    \ event that no receipt is found, verification has failed.\n\n`[[NSBundle mainBundle]\
    \ appStoreReceiptURL];`\n\nOnce a receipt has been located it needs to be checked\
    \ to make sure it has been properly signed by Apple. Apple provides sample code\
    \ for verifying the signature of receipts as part of the Receipt Validation Programming\
    \ Guide. That sample code is reprinted here for ease of access. The code will\
    \ verify the signature of the receipt using OpenSSL.\n\n```\n/* The PKCS #7 container\
    \ (the receipt) and the output of the verification. */\nBIO *b_p7;\nPKCS7 *p7;\n\
    \n/* The Apple root certificate, as raw data and in its OpenSSL representation.\
    \ */\nBIO *b_x509;\nX509 *Apple;\n\n/* The root certificate for chain-of-trust\
    \ verification. */\nX509_STORE *store = X509_STORE_new();\n\n/* ... Initialize\
    \ both BIO variables using BIO_new_mem_buf() with a buffer and its size ... */\n\
    \n/* Initialize b_out as an output BIO to hold the receipt payload extracted during\n\
    \   signature verification. */\nBIO *b_out = BIO_new(BIO_s_mem());\n\n/* Capture\
    \ the content of the receipt file and populate the p7 variable with the\n   PKCS\
    \ #7 container. */\np7 = d2i_PKCS7_bio(b_p7, NULL);\n\n/* ... Load the Apple root\
    \ certificate into b_X509 ... */\n\n/* Initialize b_x509 as an input BIO with\
    \ a value of the Apple root certificate\n   and load it into X509 data structure.\
    \ Then add the Apple root certificate\n   to the structure. */\nApple = d2i_X509_bio(b_x509,\
    \ NULL);\nX509_STORE_add_cert(store, Apple);\n\n/* Verify the signature. If the\
    \ verification is correct, b_out will contain the\n   PKCS #7 payload and rc will\
    \ be 1. */\nint rc = PKCS7_verify(p7, NULL, store, NULL, b_out, 0);\n\n/* For\
    \ additional security, you may verify the fingerprint of the root certificate\n\
    \   and verify the OIDs of the intermediate certificate and signing certificate.\n\
    \   The OID in the certificate policies extension of the intermediate certificate\n\
    \   is (1 2 840 113635 100 5 6 1), and the marker OID of the signing certificate\n\
    \   is (1 2 840 113635 100 6 11 1). */\n```\n\nThe next code sample will parse\
    \ the receipt payload using asn1c.\n\n```\n#include \"Payload.h\" /* This header\
    \ file is generated by asn1c. */\n\n/* The receipt payload and its size. */\n\
    void *pld = NULL;\nsize_t pld_sz;\n\n/* Variables used to parse the payload. Both\
    \ data types are declared in Payload.h. */\nPayload_t *payload = NULL;\nasn_dec_rval_t\
    \ rval;\n\n/* ... Load the payload from the receipt file into pld and set pld_sz\
    \ to the payload size ... */\n\n/* Parse the buffer using the decoder function\
    \ generated by asn1c.\n   The payload variable will contain the receipt attributes.\
    \ */\nrval = asn_DEF_Payload.ber_decoder(NULL, &asn_DEF_Payload, (void **)&payload,\
    \ pld,\n```\n\nThe following code sample extracts the receipt attributes.\n\n\
    ```\n/* Variables used to store the receipt attributes. */\nOCTET_STRING_t *bundle_id\
    \ = NULL;\nOCTET_STRING_t *bundle_version = NULL;\nOCTET_STRING_t *opaque = NULL;\n\
    OCTET_STRING_t *hash = NULL;\n\n/* Iterate over the receipt attributes, saving\
    \ the values needed to compute the\n   GUID hash. */\nsize_t i;\nfor (i = 0; i\
    \ < payload->list.count; i++) {\n    ReceiptAttribute_t *entry;\n    entry = payload->list.array[i];\n\
    \    switch (entry->type) {\n        case 2:\n            bundle_id = &entry->value;\n\
    \            break;\n        case 3:\n            bundle_version = &entry->value;\n\
    \            break;\n        case 4:\n            opaque = &entry->value;\n  \
    \          break;\n        case 5:\n            hash = &entry->value;\n      \
    \      break;\n    }\n}\n```\n\nNext the bundle identifier of the receipts needs\
    \ to be compared to the `CFBundleShortVersionString` value found in the `info.plist`\
    \ of the app. If these two identifiers do not match validation has failed.\n\n\
    Then verify that the version identifier string in the receipt also matches the\
    \ hard coded value found in the `CFBundleShortVersionString` of the `info.plist`.\
    \ If these values do not match verification has failed.\n\nFinally, check the\
    \ GUID of the receipt matches the GUID of the device. The GUID for the device\
    \ can be obtained using the following code. Once again if these two values do\
    \ not match then validation fails.\n\n`[[UIDevice currentDevice] identifierForVendor];`\n\
    \nIf the receipt is found and signed by Apple, the values for the bundle identifier,\
    \ version, and GUID all match then the receipt and purchase is valid.\n\n# Tying\
    \ Everything Together in UFOs\n\nDepending on the complexity of your in-app purchase,\
    \ it could be very easy or very difficult to integrate it into your code. In our\
    \ UFOs app, we have a very simple product, in which paying a one-time fee unlocks\
    \ a different colored ship. When the user purchases the product, we store a key\
    \ in our user defaults to reflect that. To unlock this purchase in code, we simply\
    \ check for that key, and then perform the required steps. To do this, we need\
    \ to add some new art assets to the project. These have already been included\
    \ in the [Chapter 11](#A978-1-4302-4906-1_11_Chapter.html) sample code (available\
    \ at the Apress web site).\n\nAfter this is done, we need to modify our `viewDidLoad`\
    \ method to change the ship's image. The following code snippet shows those changes:\n\
    \n```\n-(void)viewDidLoad\n{\n    purchasedUpgrade = [[NSUserDefaults standardUserDefaults]\n\
    \        boolForKey:@\"shipPlusAvailable\"];\n    CGRect playerFrame = CGRectMake(100,\
    \ 70, 80, 34);\n    myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
    \    myPlayerImageView.animationDuration = 0.75;\n    myPlayerImageView.animationRepeatCount\
    \ = 99999;\n    NSArray *imageArray;\n    if (purchasedUpgrade)\n    {\n     \
    \   imageArray = [NSArray arrayWithObjects:\n            [UIImage imageNamed:\
    \ @\"Ship1.png\"],\n            [UIImage imageNamed: @\"Ship2.png\"], nil];\n\
    \    }\n    else\n    {\n        imageArray = [NSArray arrayWithObjects:\n   \
    \         [UIImage imageNamed: @\"Saucer1.png\"],\n            [UIImage imageNamed:\
    \ @\"Saucer2.png\"], nil];\n    }\n    myPlayerImageView.animationImages = imageArray;\n\
    \    [myPlayerImageView startAnimating];\n    [self.view addSubview: myPlayerImageView];\n\
    }\n```\n\n# Summary\n\nIn this chapter, we covered StoreKit and in-app purchases.\
    \ By leveraging StoreKit, you gain a number of new ways to monetize your app,\
    \ from expandable content to special upgrades for your users. You should now feel\
    \ confident adding a variety of products to your own in-app store. Although StoreKit\
    \ isn't directly a part of Game Center or Game Kit, you will undoubtedly find\
    \ an in-app store an invaluable addition to your iOS software.\n\nWe spent some\
    \ time talking about ngmoco:) and its experiments and successes with the freemium\
    \ model. You should now feel confident with iTunes Connect and all the actions\
    \ that are required to fully set up an in-app purchase product, as well as the\
    \ required code to get that purchase to display.\n\nWe looked at how to handle\
    \ failures with purchasing and also the path of a success. We also explored some\
    \ of the advanced topics, such as validating receipts and multiple purchases at\
    \ once. Lastly, we saw how we integrated the entire experience into our UFOs demo\
    \ app."
  raw: '## iOS 7 Local Receipt Validation


    iOS 7 added the ability to verify In App Purchase receipts on the device without
    needing to go through a third party server. Server receipt validation is still
    available and may even by the more appropriate depending on the needs of your
    app.


    Apple recommends validating local receipts within the main function of your app
    before the NSApplicationMain function is called. In order to verify a receipt
    it must first be located. NSBundle contains a convenience helper, which will locate
    the reciept for you. In the event that no reciept is found, verification has failed.


    `[[NSBundle mainBundle] appStoreReceiptURL];`


    Once a reciept has been located it needs to be checked to make sure it has been
    properly been signed by Apple. Apple provides sample code for verifying the signature
    of receipts as part of the Receipt Validation Programming Guide. That sample code
    is reprinted here for ease of access. The code will verify the signature of the
    receipt using OpenSSL.


    `/* The PKCS #7 container (the receipt) and the output of the verification. */`


    `BIO *b_p7;`


    `PKCS7 *p7;`


    `/* The Apple root certificate, as raw data and in its OpenSSL representation.
    */`


    `BIO *b_x509;`


    `X509 *Apple;`


    `/* The root certificate for chain-of-trust verification. */`


    `X509_STORE *store = X509_STORE_new();`


    `/* ... Initialize both BIO variables using BIO_new_mem_buf() with a buffer and
    its size ... */`


    `/* Initialize b_out as an output BIO to hold the receipt payload extracted during`


    `signature verification. */`


    `BIO *b_out = BIO_new(BIO_s_mem());`


    `/* Capture the content of the receipt file and populate the p7 variable with
    the`


    `PKCS #7 container. */`


    `p7 = d2i_PKCS7_bio(b_p7, NULL);`


    `/* ... Load the Apple root certificate into b_X509 ... */`


    `/* Initialize b_x509 as an input BIO with a value of the Apple root certificate
    and load it into X509 data structure. Then add the Apple root certificate to the`


    `structure. */`


    `Apple = d2i_X509_bio(b_x509, NULL);`


    `X509_STORE_add_cert(store, Apple);`


    `/* Verify the signature. If the verification is correct, b_out will contain the`


    `PKCS #7 payload and rc will be 1\. */`


    `int rc = PKCS7_verify(p7, NULL, store, NULL, b_out, 0);`


    `/* For additional security, you may verify the fingerprint of the root certificate
    and verify the OIDs of the intermediate certificate and signing certificate. The
    OID in the certificate policies extension of the intermediate certificate is (1`


    `2 840 113635 100 5 6 1), and the marker OID of the signing certificate is (1
    2 840 113635 100 6 11 1). */`


    The next code sample will parse the receipt payload using asn1c.


    `#include "Payload.h" /* This header file is generated by asn1c. */`


    `/* The receipt payload and its size. */`


    `void *pld = NULL;`


    `size_t pld_sz;`


    `/* Variables used to parse the payload. Both data types are declared in Payload.h.
    */`


    `Payload_t *payload = NULL;`


    `asn_dec_rval_t rval;`


    `/* ... Load the payload from the receipt file into pld and set pld_sz to the
    payload size ... */`


    `/* Parse the buffer using the decoder function generated by asn1c.  The payload`


    `variable will contain the receipt attributes. */`


    `rval = asn_DEF_Payload.ber_decoder(NULL, &asn_DEF_Payload, (void **)&payload,
    pld,`


    The following code sample extracts the receipt attributes


    `/* Variables used to store the receipt attributes. */`


    `OCTET_STRING_t *bundle_id = NULL;`


    `OCTET_STRING_t *bundle_version = NULL;`


    `OCTET_STRING_t *opaque = NULL;`


    `OCTET_STRING_t *hash = NULL;`


    `/* Iterate over the receipt attributes, saving the values needed to compute the`


    `GUID hash. */`


    `size_t i;`


    `for (i = 0; i < payload->list.count; i++) {`


    `ReceiptAttribute_t *entry;`


    `entry = payload->list.array[i];`


    `switch (entry->type) {`


    `case 2:`


    `bundle_id = &entry->value;`


    `break;`


    `case 3:`


    `bundle_version = &entry->value;`


    `break;`


    `case 4:`


    `opaque = &entry->value;`


    `break;`


    `case 5:`


    `hash = &entry->value;`


    `break; }`


    `}`


    Next the bundle identifier of the receipts needs to be compared to the CFBundleShortVersionStrong
    value found in the info.plist of the app. If these two identifiers do not match
    validation has failed.


    Then verify that the version identifier string in the receipt also matches the
    hard coded value found in the CFBundleShortVersionString of the info.plist. If
    these values do not match verification has failed.


    Finally, check the GUID of the receipt matches the GUID of the device. The GUID
    for the device can be obtained using the following code. Once again if these two
    values do not match then validation fails.


    `[[UIDevice currentDevice] identifierForVendor];`


    If the receipt is found and signed by Apple, the values for the bundle identifier,
    version, and GUID all match than the receipt and purchase is valid.


    ## Tying Everything Together in UFOs


    Depending on the complexity of your in-app purchase, it could be very easy or
    very difficult to integrate it into your code. In our UFOs app, we have a very
    simple product, in which paying a one-time fee unlocks a different colored ship.
    When the user purchases the product, we store a key in our user defaults to reflect
    that. To unlock this purchase in code, we simply check for that key, and then
    perform the required steps. To do this, we need to add some new art assets to
    the project. These have already been included in the [Chapter 11](#A978-1-4302-4906-1_11_Chapter.html)
    sample code (available at the Apress web site).


    After this is done, we need to modify our `viewDidLoad` method to change the ship’s
    image. The following code snippet shows those changes:


    `-(void)viewDidLoad`


    `{`


        `purchasedUpgrade = [[NSUserDefaults standardUserDefaults]`É


     `boolForKey:@"shipPlusAvailable"];`


        `CGRect playerFrame = CGRectMake(100, 70, 80, 34);`


        `myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];`


        `myPlayerImageView.animationDuration = 0.75;`


        `myPlayerImageView.animationRepeatCount = 99999;`


        `NSArray *imageArray;`


        `if (purchasedUpgrade)`


       `{`


            `imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:`É


     `@"Ship1.png"], [UIImage imageNamed: @"Ship2.png"], nil];`


        `}`


       `else`


       `{`


            `imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:`É


     `@"Saucer1.png"], [UIImage imageNamed: @"Saucer2.png"], nil];`


        `}`


        `myPlayerImageView.animationImages = imageArray;`


        `[myPlayerImageView startAnimating];`


        `[self.view addSubview: myPlayerImageView];`


    `}`


    ## Summary


    In this chapter, we covered StoreKit and in-app purchases. By leveraging StoreKit,
    you gain a number of new ways to monetize your app, from expandable content to
    special upgrades for your users. You should now feel confident adding a variety
    of products to your own in-app store. Although StoreKit isn’t directly a part
    of Game Center or Game Kit, you will undoubtedly find an in-app store an invaluable
    addition to your iOS software.


    We spent some time talking about ngmoco:) and its experiments and successes with
    the freemium model. You should now feel confident with iTunes Connect and all
    the actions that are required to fully set up an in-app purchase product, as well
    as the required code to get that purchase to display.


    We looked at how to handle failures with purchasing and also the path of a success.
    We also explored some of the advanced topics, such as validating receipts and
    multiple purchases at once. Lastly, we saw how we integrated the entire experience
    into our UFOs demo app.'
  trans: "\n# iOS 7 本地收据验证\n\niOS 7 增加了在设备上验证应用内购买收据的功能，而无需通过第三方服务器。服务器收据验证仍然可用，甚至可能根据应用需求更为合适。\n\
    \n苹果建议在调用 `NSApplicationMain` 函数之前，在应用的主函数内验证本地收据。为了验证收据，首先必须定位它。`NSBundle` 包含一个便捷辅助方法，可以为你定位收据。如果未找到收据，则验证失败。\n\
    \n`[[NSBundle mainBundle] appStoreReceiptURL];`\n\n定位到收据后，需要检查以确保它已由苹果正确签名。苹果在《收据验证编程指南》中提供了验证收据签名的示例代码。此处转载该示例代码以便查阅。该代码将使用\
    \ OpenSSL 验证收据的签名。\n\n```\n/* PKCS #7 容器（收据）和验证输出。 */\nBIO *b_p7;\nPKCS7 *p7;\n\
    \n/* 苹果根证书，以原始数据及其 OpenSSL 表示形式。 */\nBIO *b_x509;\nX509 *Apple;\n\n/* 用于信任链验证的根证书。\
    \ */\nX509_STORE *store = X509_STORE_new();\n\n/* ... 使用 BIO_new_mem_buf() 函数并传入缓冲区及其大小来初始化两个\
    \ BIO 变量 ... */\n\n/* 将 b_out 初始化为输出 BIO，用于保存在签名验证期间提取的收据负载。 */\nBIO *b_out =\
    \ BIO_new(BIO_s_mem());\n\n/* 捕获收据文件的内容，并将 p7 变量填充为 PKCS #7 容器。 */\np7 = d2i_PKCS7_bio(b_p7,\
    \ NULL);\n\n/* ... 将苹果根证书加载到 b_X509 中 ... */\n\n/* 将 b_x509 初始化为输入 BIO，其值为苹果根证书，并将其加载到\
    \ X509 数据结构中。\n   然后将苹果根证书添加到该结构中。 */\nApple = d2i_X509_bio(b_x509, NULL);\nX509_STORE_add_cert(store,\
    \ Apple);\n\n/* 验证签名。如果验证正确，b_out 将包含 PKCS #7 负载，且 rc 将为 1。 */\nint rc = PKCS7_verify(p7,\
    \ NULL, store, NULL, b_out, 0);\n\n/* 为了增强安全性，你可以验证根证书的指纹，并验证中间证书和签名证书的 OID。\n\
    \   中间证书的证书策略扩展中的 OID 为 (1 2 840 113635 100 5 6 1)，\n   签名证书的标记 OID 为 (1 2 840\
    \ 113635 100 6 11 1)。 */\n```\n\n下一个代码示例将使用 asn1c 解析收据负载。\n\n```\n#include \"\
    Payload.h\" /* 此头文件由 asn1c 生成。 */\n\n/* 收据负载及其大小。 */\nvoid *pld = NULL;\nsize_t\
    \ pld_sz;\n\n/* 用于解析负载的变量。两种数据类型均在 Payload.h 中声明。 */\nPayload_t *payload = NULL;\n\
    asn_dec_rval_t rval;\n\n/* ... 将收据文件中的负载加载到 pld 中，并将 pld_sz 设置为负载大小 ... */\n\n\
    /* 使用 asn1c 生成的解码器函数解析缓冲区。\n   payload 变量将包含收据属性。 */\nrval = asn_DEF_Payload.ber_decoder(NULL,\
    \ &asn_DEF_Payload, (void **)&payload, pld,\n```\n\n以下代码示例提取收据属性。\n\n```\n/* 用于存储收据属性的变量。\
    \ */\nOCTET_STRING_t *bundle_id = NULL;\nOCTET_STRING_t *bundle_version = NULL;\n\
    OCTET_STRING_t *opaque = NULL;\nOCTET_STRING_t *hash = NULL;\n\n/* 遍历收据属性，保存计算\
    \ GUID 哈希所需的值。 */\nsize_t i;\nfor (i = 0; i < payload->list.count; i++) {\n  \
    \  ReceiptAttribute_t *entry;\n    entry = payload->list.array[i];\n    switch\
    \ (entry->type) {\n        case 2:\n            bundle_id = &entry->value;\n \
    \           break;\n        case 3:\n            bundle_version = &entry->value;\n\
    \            break;\n        case 4:\n            opaque = &entry->value;\n  \
    \          break;\n        case 5:\n            hash = &entry->value;\n      \
    \      break;\n    }\n}\n```\n\n接下来，需要将收据的包标识符与应用 `info.plist` 中的 `CFBundleShortVersionString`\
    \ 值进行比较。如果这两个标识符不匹配，则验证失败。\n\n然后，验证收据中的版本标识符字符串是否与 `info.plist` 中 `CFBundleShortVersionString`\
    \ 的硬编码值匹配。如果这些值不匹配，则验证失败。\n\n最后，检查收据的 GUID 是否与设备的 GUID 匹配。设备的 GUID 可以通过以下代码获得。同样，如果这两个值不匹配，则验证失败。\n\
    \n`[[UIDevice currentDevice] identifierForVendor];`\n\n如果收据已找到且由苹果签名，并且包标识符、版本和\
    \ GUID 的值全部匹配，则收据和购买有效。\n\n# 在 UFOs 中整合所有内容\n\n根据应用内购买的复杂程度，将其集成到代码中可能非常简单或非常困难。在我们的\
    \ UFOs 应用中，有一个非常简单的产品，用户支付一次性费用即可解锁不同颜色的飞船。当用户购买该产品时，我们在用户默认设置中存储一个键来反映这一点。要在代码中解锁此购买，我们只需检查该键，然后执行所需步骤。为此，我们需要向项目添加一些新的美术资源。这些已包含在第\
    \ 11 章的示例代码中（可从 Apress 网站获取）。\n\n完成此操作后，我们需要修改 `viewDidLoad` 方法来更改飞船图像。以下代码片段展示了这些更改：\n\
    \n```\n-(void)viewDidLoad\n{\n    purchasedUpgrade = [[NSUserDefaults standardUserDefaults]\n\
    \        boolForKey:@\"shipPlusAvailable\"];\n    CGRect playerFrame = CGRectMake(100,\
    \ 70, 80, 34);\n    myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
    \    myPlayerImageView.animationDuration = 0.75;\n    myPlayerImageView.animationRepeatCount\
    \ = 99999;\n    NSArray *imageArray;\n    if (purchasedUpgrade)\n    {\n     \
    \   imageArray = [NSArray arrayWithObjects:\n            [UIImage imageNamed:\
    \ @\"Ship1.png\"],\n            [UIImage imageNamed: @\"Ship2.png\"], nil];\n\
    \    }\n    else\n    {\n        imageArray = [NSArray arrayWithObjects:\n   \
    \         [UIImage imageNamed: @\"Saucer1.png\"],\n            [UIImage imageNamed:\
    \ @\"Saucer2.png\"], nil];\n    }\n    myPlayerImageView.animationImages = imageArray;\n\
    \    [myPlayerImageView startAnimating];\n    [self.view addSubview: myPlayerImageView];\n\
    }\n```\n\n# 总结\n\n在本章中，我们介绍了 StoreKit 和应用内购买。通过利用 StoreKit，你获得了许多新的应用变现方式，从可扩展内容到为用户提供的特殊升级。你现在应该能够自信地为自己的应用内商店添加各种产品。虽然\
    \ StoreKit 并非 Game Center 或 Game Kit 的直接组成部分，但你无疑会发现应用内商店是你 iOS 软件中一个宝贵的补充。\n\n\
    我们花了一些时间讨论 ngmoco:) 及其在免费增值模式上的实验和成功。你现在应该能够自信地使用 iTunes Connect 以及完全设置应用内购买产品所需的所有操作，以及显示该购买所需的代码。\n\
    \n我们了解了如何处理购买失败以及购买成功的路径。我们还探讨了一些高级主题，例如验证收据和同时进行多次购买。最后，我们看到了如何将整个体验集成到我们的 UFOs\
    \ 演示应用中。\n"
- fmt: "# 12. Twitter\n\n## Abstract\n\nThe qualities that make Twitter seem inane\
    \ and half-baked are what makes it so powerful.\n\n> —Jonathan Zittrain, Harvard\
    \ law professor\n\nTwitter was created in March 2006 by a small team of developers\
    \ in the San Francisco Bay Area. By 2012 it had more than 500 million registered\
    \ users with no drop-off in sight. Twitter allows registered users to post short,\
    \ 140-character messages to their timeline, where followers and the general public\
    \ can browse them. Apple began making a public push into social networking with\
    \ iOS 5 when they announced the addition of the Social Framework. The first supported\
    \ service would be Twitter, followed by Facebook in iOS 6. While Apple has had\
    \ third-party software on iOS since 2.0 with Google Maps, the integration of Twitter\
    \ marked a milestone. This was the first time that a previous third-party app\
    \ had become a core system component. While the Twitter app is not installed by\
    \ default it can very easily be installed through `Settings.app`.\n\nThis chapter\
    \ will walk you through the process of integrating Twitter into your apps. The\
    \ primary focus will be on the built-in Twitter Composer for quick implementation.\
    \ The section \"Going Further with Twitter\" will also provide a foundation for\
    \ working with Twitter on a more direct level.\n\n## UFOs\n\nUnlike previous chapters,\
    \ this chapter will not continue to build on the existing UFOs source code. Instead,\
    \ we will take the source code from [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)\
    \ and add Twitter functionality into it. The primary reason behind this change\
    \ of style was to cut down on the existing code base to make the project as easy\
    \ to consume as possible. While previously the code has continued to build upon\
    \ the lessons learned in the previous chapters, the remaining chapters all cover\
    \ topics that are essentially independent of each other. The following four chapters,\
    \ covering Twitter, Facebook, Airplay, and game controllers, will therefore all\
    \ be based on earlier versions of the UFOs sample code.\n\nWe will use Twitter\
    \ to post the user’s score to their Twitter timeline once a game has been completed.\
    \ This requires a single change to the behavior of the app from the [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)\
    \ sample project. The `exitAction:` function will be updated to prompt the user\
    \ to choose a Twitter posting method or an option to exit back to the main menu:\n\
    \n```\n-(IBAction)exitAction:(id)sender\n{\n    UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Tweet Score\" message:@\"Do you\n    want to tweet your\
    \ score on Twitter?\" delegate:self cancelButtonTitle:@\"Dismiss\"\n    otherButtonTitles:@\"\
    Tweet Composer\", @\"Custom Tweet\", nil];\n    [alert show];\n    [alert release];\n\
    }\n```\n\nA new delegate method for the `alertView` is set up to handle the callbacks\
    \ and determine the action required. The user is presented with three options\
    \ (Figure [12-1](#A978-1-4302-4906-1_12_Chapter.html#Fig1)). The two Twitter approaches\
    \ will be discussed in the sections \"Tweet Composer\" and \"Custom Tweets\";\
    \ the Dismiss action will perform the previous behavior of the `exitAction:` method\
    \ and submit the score while returning to the home screen:\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n     //tweet\
    \ composer\n    if(buttonIndex == 1) {\n    } else if(buttonIndex == 2) {//custom\
    \ tweet\n    } else if(buttonIndex == 0) {\n        [[self navigationController]\
    \ popViewControllerAnimated: YES];\n        [self.gcManager reportScore:score\
    \ forCategory:@\"com.dragonforged.ufo.single\"];\n    }\n}\n```\n\n![A978-1-4302-4906-1_12_Fig1_HTML.jpg](A978-1-4302-4906-1_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1.** Selecting a posting option for Twitter after the completion\
    \ of a game\n\n## Twitter on iOS\n\nTwitter has become an integral part of iOS\
    \ since its introduction in 2011. Game Center added built-in functionality to\
    \ share apps from within the combined Game Center view controller starting in\
    \ iOS 6. Twitter accounts are configured from within the `Settings.app` (Figure\
    \ [12-2](#A978-1-4302-4906-1_12_Chapter.html#Fig2)); as of iOS 7, it is not possible\
    \ to provide your users with a method of logging in via a third-party app, such\
    \ as your product.\n\n![A978-1-4302-4906-1_12_Fig2_HTML.jpg](A978-1-4302-4906-1_12_Fig2_HTML.jpg)\n\
    \n**Figure 12-2.** Configuration settings for Twitter on iOS 7\n\nTwitter for\
    \ iOS, through `Settings.app`, allows the user to configure multiple accounts,\
    \ although permission is granted for all accounts at once. Each app must request\
    \ permission to access the user’s Twitter accounts the first time Twitter functionality\
    \ is requested. A list of the apps that currently have access can be found in\
    \ `Settings.app` under the Twitter section; here the user may also revoke Twitter\
    \ access to a specific app at any time.\n\n`Social Framework` provides two methods\
    \ for posting items to a user’s timeline. The Tweet Composer uses a built-in Graphical\
    \ User Interface (GUI) that is similar to the email composer in functionality.\
    \ A preset message, attachments, and URL may be set, but the user is allowed to\
    \ modify the text prior to sending the tweet; this method is described in the\
    \ \"Tweet Composer\" section. You may also use a more customized approach, allowing\
    \ you to tweet from a customized user interface; this approach may send tweets\
    \ without the user needing to review the information beforehand. This approach\
    \ is described in the section \"Custom Tweets.\""
  raw: '# 12. Twitter


    Abstract


    The qualities that make Twitter seem inane and half-baked are what makes it so
    powerful.


    > —Jonathan Zittrain, Harvard law professor


    Twitter was created in March 2006 by a small team of developers in the San Francisco
    Bay Area. By 2012 it had more than 500 million registered users with no drop-off
    in sight. Twitter allows registered users to post short, 140-character messages
    to their timeline, where followers and the general public can browse them. Apple
    began making a public push into social networking with iOS 5 when they announced
    the addition of the Social Framework. The first supported service would be Twitter,
    followed by Facebook in iOS 6\. While Apple has had third-party software on iOS
    since 2.0 with Google Maps, the integration of Twitter marked a milestone. This
    was the first time that a previous third-party app had become a core system component.
    While the Twitter app is not installed by default it can very easily be installed
    through Settings.app.


    This chapter will walk you through the process of integrating Twitter into your
    apps. The primary focus will be on the built-in Twitter Composer for quick implementation.
    The section “Going Further with Twitter” will also provide a foundation for working
    with Twitter on a more direct level.


    ## UFOs


    Unlike previous chapters, this chapter will not continue to build on the existing
    UFOs source code. Instead, we will take the source code from [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    and add Twitter functionality into it. The primary reason behind this change of
    style was to cut down on the existing code base to make the project as easy to
    consume as possible. While previously the code has continued to build upon the
    lessons learned in the previous chapters, the remaining chapters all cover topics
    that are essentially independent of each other. The following four chapters, covering
    Twitter, Facebook, Airplay, and game controllers, will therefore all be based
    on earlier versions of the UFOs sample code.


    We will use Twitter to post the user’s score to their Twitter timeline once a
    game has been completed. This requires a single change to the behavior of the
    app from the [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html) sample project. The
    `exitAction:` function will be updated to prompt the user to choose a Twitter
    posting method or an option to exit back to the main menu:


    `-(IBAction)exitAction:(id)sender`


    `{`


        `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Tweet Score" message:@"Do
    you`


        `want to tweet your score on Twitter?" delegate:self cancelButtonTitle:@"Dismiss"`


        `otherButtonTitles:@"Tweet Composer", @"Custom Tweet", nil];`


        `[alert show];`


        `[alert release];`


    `}`


    A new delegate method for the `alertView` is set up to handle the callbacks and
    determine the action required. The user is presented with three options (Figure
    [12-1](#A978-1-4302-4906-1_12_Chapter.html#Fig1)). The two Twitter approaches
    will be discussed in the sections “Tweet Composer” and “Custom Tweets”; the Dismiss
    action will perform the previous behavior of the `exitAction:` method and submit
    the score while returning to the home screen:


    `- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex`


    `{`


         `//tweet composer`


        `if(buttonIndex == 1) {`


        `} else if(buttonIndex == 2) {//custom tweet`


        `} else if(buttonIndex == 0) {`


            `[[self navigationController] popViewControllerAnimated: YES];`


            `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


        `}`


    `}`


    ![A978-1-4302-4906-1_12_Fig1_HTML.jpg](A978-1-4302-4906-1_12_Fig1_HTML.jpg)


    Figure 12-1.


    Selecting a posting option for Twitter after the completion of a game


    ## Twitter on iOS


    Twitter has become an integral part of iOS since its introduction in 2011\. Game
    Center added built-in functionality to share apps from within the combined Game
    Center view controller starting in iOS 6\. Twitter accounts are configured from
    within the Settings.app (Figure [12-2](#A978-1-4302-4906-1_12_Chapter.html#Fig2));
    as of iOS 7, it is not possible to provide your users with a method of logging
    in via a third-party app, such as your product.


    ![A978-1-4302-4906-1_12_Fig2_HTML.jpg](A978-1-4302-4906-1_12_Fig2_HTML.jpg)


    Figure 12-2.


    Configuration settings for Twitter on iOS 7


    Twitter for iOS, through Settings.app, allows the user to configure multiple accounts,
    although permission is granted for all accounts at once. Each app must request
    permission to access the user’s Twitter accounts the first time Twitter functionality
    is requested. A list of the apps that currently have access can be found in Settings.app
    under the Twitter section; here the user may also revoke Twitter access to a specific
    app at any time.


    Social Framework provides two methods for posting items to a user’s timeline.
    The Tweet Composer uses a built-in Graphical User Interface(GUI) that is similar
    to the email composer in functionality. A preset message, attachments, and URL
    may be set, but the user is allowed to modify the text prior to sending the tweet;
    this method is described in the “Tweet Composer” section. You may also use a more
    customized approach, allowing you to tweet from a customized user interface; this
    approach may send tweets without the user needing to review the information beforehand.
    This approach is described in the section “Custom Tweets.”'
  trans: "\n# 12. Twitter\n\n## 摘要\n\n让 Twitter 显得无聊且半成品的特点，恰恰是其强大之处。\n\n> ——乔纳森·奇特林，哈佛法学教授\n\
    \nTwitter 于 2006 年 3 月由旧金山湾区的一个小开发团队创建。到 2012 年，其注册用户已超过 5 亿，且增长势头不减。注册用户可以在自己的时间线上发布\
    \ 140 字符的短消息，关注者和公众均可浏览这些消息。苹果在 iOS 5 中开始大力推动社交网络，并宣布添加 Social Framework。首个获得支持的服务是\
    \ Twitter，随后在 iOS 6 中支持了 Facebook。尽管自 iOS 2.0 起苹果就在 iOS 中集成了谷歌地图等第三方软件，但 Twitter\
    \ 的集成标志着一次里程碑。这是首次有第三方应用成为核心系统组件。虽然 Twitter 应用默认并未安装，但用户可以轻松通过 `Settings.app`\
    \ 安装。\n\n本章将引导您完成将 Twitter 集成到应用中的过程。主要重点是使用内置的 Twitter Composer 以实现快速集成。在“深入使用\
    \ Twitter”一节中，还将为在更直接层面使用 Twitter 提供基础。\n\n## UFO 游戏\n\n与之前的章节不同，本章不会继续基于现有的 UFO\
    \ 游戏源代码进行开发。相反，我们将从第三章的源代码出发，为其添加 Twitter 功能。这种风格变化的主要原因是为了精简现有代码库，使项目尽可能易于理解。虽然之前的代码是基于前几章的经验不断构建的，但剩余章节涵盖的主题本质上相互独立。因此，接下来四章（关于\
    \ Twitter、Facebook、Airplay 和游戏控制器）都将基于 UFO 游戏示例代码的早期版本。\n\n我们将在游戏结束后，使用 Twitter\
    \ 将用户分数发布到他们的时间线上。这需要对第三章示例项目中的应用行为做一处更改。`exitAction:` 函数将被更新，以提示用户选择一种 Twitter\
    \ 发布方法，或选择退出返回主菜单：\n\n```\n-(IBAction)exitAction:(id)sender\n{\n    UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Tweet Score\" message:@\"Do you\n\
    \    want to tweet your score on Twitter?\" delegate:self cancelButtonTitle:@\"\
    Dismiss\"\n    otherButtonTitles:@\"Tweet Composer\", @\"Custom Tweet\", nil];\n\
    \    [alert show];\n    [alert release];\n}\n```\n\n为 `alertView` 设置了一个新的委托方法来处理回调并确定所需执行的操作。用户将看到三个选项（图\
    \ 12-1）。两种 Twitter 方式将在“Tweet Composer”和“Custom Tweets”两节中讨论；“Dismiss”操作将执行 `exitAction:`\
    \ 方法先前的行为，即提交分数并返回主屏幕：\n\n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n     //tweet composer\n    if(buttonIndex == 1) {\n    } else if(buttonIndex\
    \ == 2) {//custom tweet\n    } else if(buttonIndex == 0) {\n        [[self navigationController]\
    \ popViewControllerAnimated: YES];\n        [self.gcManager reportScore:score\
    \ forCategory:@\"com.dragonforged.ufo.single\"];\n    }\n}\n```\n\n![A978-1-4302-4906-1_12_Fig1_HTML.jpg](img/A978-1-4302-4906-1_12_Fig1_HTML.jpg)\n\
    \n**图 12-1.** 游戏结束后选择 Twitter 发布选项\n\n## iOS 上的 Twitter\n\n自 2011 年引入以来，Twitter\
    \ 已成为 iOS 不可或缺的一部分。从 iOS 6 开始，Game Center 在合并的 Game Center 视图控制器内添加了共享应用的内置功能。Twitter\
    \ 账户配置可通过 `Settings.app`（图 12-2）进行；截至 iOS 7，尚无法为您的用户提供通过第三方应用（如您的产品）登录的方法。\n\n\
    ![A978-1-4302-4906-1_12_Fig2_HTML.jpg](img/A978-1-4302-4906-1_12_Fig2_HTML.jpg)\n\
    \n**图 12-2.** iOS 7 中 Twitter 的配置设置\n\n通过 `Settings.app`，iOS 上的 Twitter 允许用户配置多个账户，但授权是一次性授予所有账户的。首次请求\
    \ Twitter 功能时，每个应用都必须请求访问用户 Twitter 账户的权限。可以在 `Settings.app` 的 Twitter 部分找到当前拥有访问权限的应用列表；用户也可以随时撤销特定应用对\
    \ Twitter 的访问权限。\n\n`Social Framework` 提供了两种将内容发布到用户时间线的方法。Tweet Composer 使用内置图形用户界面，其功能类似于电子邮件编辑器。可以预设消息、附件和\
    \ URL，但用户在发送推文前可以修改文本；此方法将在“Tweet Composer”一节中描述。您还可以使用更定制化的方法，允许您通过自定义用户界面发送推文；此方法可在用户无需事先预览信息的情况下发送推文。此方法将在“Custom\
    \ Tweets”一节中描述。\n"
- fmt: '# Tweet Composer


    Tweet Composer（图 [12-3](#A978-1-4302-4906-1_12_Chapter.html#Fig3)）是允许用户向 Twitter
    发布状态的最简单方法。它提供了一个大多数用户已经熟悉的界面，并包含轻松包含图片、URL、位置和多个账户的控件和功能。主要缺点是用户需要自己阅读和发布推文内容。这意味着当发布像分数这样的项目时（如图
    [12-3](#A978-1-4302-4906-1_12_Chapter.html#Fig3) 所示），用户可能会输入虚假分数，或者根据自己的意愿修改文本。


    ![A978-1-4302-4906-1_12_Fig3_HTML.jpg](A978-1-4302-4906-1_12_Fig3_HTML.jpg)


    图 12-3. Tweet Composer 视图


    要开始使用 Tweet Composer，用户必须执行测试以确保其设备兼容。导致`isAvailableForServiceType`失败的最常见原因是用户尚未设置
    Twitter 账户或未通过`Settings.app`登录：


    `[SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter]`


    **注意**：在开始使用 Twitter Composer 之前，不要忘记引入`Social.Framework`并导入`social/Social.h`。


    一旦确认设备上 Twitter 可用且已正确登录，就可以创建新的`SLComposeViewController`。在本示例中，我们将指定`SLServiceTypeTwitter`，但其他类型也可用。在[第
    13 章](#A978-1-4302-4906-1_13_Chapter.html)中我们将使用 Facebook，而`SLComposeViewController`从
    iOS 7 开始也支持新浪微博、腾讯微博和 LinkedIn 的社交网络。


    `SLComposeViewController *tweetController = [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeTwitter];`


    创建用于处理`SLComposeViewController`完成的新块。在示例应用中，两种完成情况下都会将最高分发布到 Game Center，并将用户返回主菜单。


    ```

    SLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult
    result)

    {

    if (result == SLComposeViewControllerResultCancelled) {

    NSLog(@"Tweet Controller Canceled");

    [[self navigationController] popViewControllerAnimated: YES];

    [self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];

    } else {

    NSLog(@"Tweet Controller Done");

    [[self navigationController] popViewControllerAnimated: YES];

    [self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];

    }

    [tweetController dismissViewControllerAnimated:YES completion:nil];

    };

    ```


    新创建的块被设置为`SLComposeViewController`上的`completionHandler`属性：


    `tweetController.completionHandler = myBlock;`


    现在可以为 Tweet Composer 可选地设置默认值；这些值将预填充到 Composer 中供用户使用。有三个可用的值：`setInitialText:`
    将向用户提供推文文本，请记住有 140 个字符的限制。使用`addImage:`可以添加图片；这将为`UIImage`提供一个 Twitpic URL，该
    URL 将在提交推文时上传。最后，`addURL:`提供了添加 URL 的功能。


    ```

    [tweetController setInitialText:[NSString stringWithFormat: @"I just abducted
    %0.0f cow(s) in UFOs for iPhone!", score]];

    [tweetController addImage:[UIImage imageNamed:@"Cow1.png"]];

    [tweetController addURL:[NSURL URLWithString:@"http://bit.ly/19ak0Uv"]];

    ```


    自定义 Tweet Composer 后，像呈现其他模态视图一样呈现给用户：


    `[self presentViewController:tweetController animated:YES completion:nil];`


    当用户发送推文时，之前的块被调用，并执行指定的回调操作。用户还会听到一个简短的推文音效，以告知推文已成功发送。最终的推文产品可以在图 [12-4](#A978-1-4302-4906-1_12_Chapter.html#Fig4)
    中看到，该图截取自 Twitter 网站。


    ![A978-1-4302-4906-1_12_Fig4_HTML.jpg](A978-1-4302-4906-1_12_Fig4_HTML.jpg)


    图 12-4. 在 Twitter.com 上看到的来自 UFOs 应用的推文'
  raw: '## Tweet Composer


    The Tweet Composer (Figure [12-3](#A978-1-4302-4906-1_12_Chapter.html#Fig3)) is
    the easiest method of allowing users to post status to Twitter. It provides an
    interface most users will already be familiar with and has controls and functionality
    to easily include images, URLs, locations, and multiple accounts. The primary
    drawback is that users are required to read and post the tweet content themselves.
    This means that when posting items like scores, as shown in Figure [12-3](#A978-1-4302-4906-1_12_Chapter.html#Fig3),
    the user may enter a fake score or otherwise modify the text as they see fit.


    ![A978-1-4302-4906-1_12_Fig3_HTML.jpg](A978-1-4302-4906-1_12_Fig3_HTML.jpg)


    Figure 12-3.


    The Tweet Composer view


    In order to begin working with the Tweet Composer, the user must perform a test
    to ensure that their device is compatible. The most common reason that `isAvailableForServiceType`
    will fail is that the user has not set up a Twitter account or is not logged into
    it from Settings.app:


    `[SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter]`


    Note


    Don’t forget to include `Social.Framework` and import `social/Social.h` before
    working with the Twitter Composer.


    Once you have verified that Twitter is available and correctly logged in for the
    device, a new `SLComposeViewController` can be created. In this example we will
    be specifying `SLServiceTypeTwitter`, but other types are available. In [Chapter
    13](#A978-1-4302-4906-1_13_Chapter.html) we will work with Facebook, and the `SLComposeViewController`
    also supports social networking with Sina Weibo, Tencent Weibo, and LinkedIn as
    of iOS 7.


    `SLComposeViewController *tweetController = [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeTwitter];`


    A new block is created for handling the completion of the `SLComposeViewController`.
    In the sample app under both completion circumstances the high score will be posted
    to Game Center and the user will be returned to the main menu.


    `SLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult
    result)`


    `{`


    `if (result == SLComposeViewControllerResultCancelled) {`


    `NSLog(@"Tweet Controller Canceled");`


    `[[self navigationController] popViewControllerAnimated: YES];`


    `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


    `} else {`


    `NSLog(@"Tweet Controller Done");`


    `[[self navigationController] popViewControllerAnimated: YES];`


    `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


    `}`


    `[tweetController dismissViewControllerAnimated:YES completion:nil];`


    `};`


    The newly created block is set to the `completionHandler` property on the `SLComposeViewController`:


    `tweetController.completionHandler = myBlock;`


    Default values may now optionally be set for the Tweet Composer; these values
    will be prepopulated into the Composer for the user. Three values are available:
    `setInitialText:` will provide the user with the tweet text, and keep in mind
    there is a 140-character limit. With `addImage:` you can add an image; this will
    provide a Twitpic URL for a `UIImage`, which will be uploaded when the tweet is
    submitted. Finally, `addURL:` provides the ability to add a URL.


    `[tweetController setInitialText:[NSString stringWithFormat: @"I just abducted
    %0.0f cow(s) in UFOs for iPhone!", score]];`


    `[tweetController addImage:[UIImage imageNamed:@"Cow1.png"]];`


    `[tweetController addURL:[NSURL URLWithString:@"` [`http://bit.ly/19ak0Uv`](http://bit.ly/19ak0Uv)
    `"]];`


    After the Tweet Composer has been customized, it is presented to the user like
    any other modal view:


    `[self presentViewController:tweetController animated:YES completion:nil];`


    When the user sends the tweet, the previous block is invoked and any callback
    actions specified are performed. The user is also played a brief tweet sound effect
    to let them know the tweet has been successfully sent. The final tweet product
    can be seen in Figure [12-4](#A978-1-4302-4906-1_12_Chapter.html#Fig4) as captured
    on the Twitter website.


    ![A978-1-4302-4906-1_12_Fig4_HTML.jpg](A978-1-4302-4906-1_12_Fig4_HTML.jpg)


    Figure 12-4.


    A tweet sent from within UFOs visible on [`Twitter.com`](http://twitter.com/)'
