    \ 3-4。）你还需要提供`分数格式后缀`。当你获取格式化后的分数属性时，该字符串会附加到分数值的末尾。\n\n> **警告**\n> \n> 对于创建的每个排行榜，你都需要至少添加一种语言，否则该排行榜将被视为无效。\n\
