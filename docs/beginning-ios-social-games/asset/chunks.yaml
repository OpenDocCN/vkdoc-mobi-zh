    # 9. Turned-Based Gaming with Game Center


    Abstract


    As if you could kill time without injuring eternity.


    As if you could kill time without injuring eternity.


    > —Henry David Thoreau


    Apple announced iOS 5 at its own World Wide Developers Conference (WWDC) in 2011\.
    In addition to a number of smaller enhancements that this new SDK brought to Game
    Center, it included one very important new feature: turned-based gaming through
    Game Center. With turn-based gaming, you can provide your users with asynchronous
    gaming. Turned-based games are simply any game in which players take turns playing,
    such as in tic-tac-toe, chess, card games, Battleship, and Monopoly. Apple has
    continued to improve Turned Based Gaming in both iOS 6 and iOS 7, making it a
    featured point of the Game Center improvements that have accompanied each release.


    Turned-based gaming on iOS has become very popular in the past few years, starting
    with Words with Friends. Shown in Figure [9-1](#A978-1-4302-4906-1_9_Chapter.html#Fig1),
    this asynchronous word game from Zynga is similar to Scrabble. Each player receives
    a selection of letters that they must play, in turn, on a board to create a word.
    They are awarded points based on the difficulty of the word, as well as layout
    on the board. Turned-based gaming is traditionally done with a store-and-forward
    platform; the server holds on to the game data until the next client logs in and
    retrieves it. Asynchronous games have traditionally been casual games and don’t
    require all players to be present and connected throughout the gameplay.


    ![A978-1-4302-4906-1_9_Fig1_HTML.jpg](A978-1-4302-4906-1_9_Fig1_HTML.jpg)


    Figure 9-1.


    Words with Friends by Zynga


    Before the introduction of iOS 5, Game Center had provided only real-time gaming,
    in which all the devices involved need to be active and logged in continuously
    throughout the multiplayer experience. Turn-based gaming adds a more casual experience,
    letting people run up to 20 matches at a time and only playing when it is their
    turn in a particular match. Prior to the new Game Center enhancements, writing
    this type of game would have required you to write and deploy your own server
    to handle the game interaction. Now, you can add the networking component of turned-based
    gaming and be up and running in less than a day of work. In this chapter, we explore
    how to write a simple tic-tac-toe game using iOS 5 and Game Center’s new turned-based
    gaming APIs.'
  trans: "\n我们还需要做一些额外的工作，以确保不会引入新的错误。例如，我们添加了一个新的指针，用于追踪敌人当前正在绑架的奶牛（如果有的话）。如果你还记得，在`updateCowPaths`方法中，我们不想更新正在被绑架的奶牛的路径，因为这会破坏绑架过程中使用的动画。我们需要修改该方法，使其忽略敌人正在绑架的任何奶牛。如果你再次运行游戏，就会看到我们已经有了一个功能完整的多人游戏，如图\
    \ 8-4 所示。\n\n![A978-1-4302-4906-1_8_Fig4_HTML.jpg](img/A978-1-4302-4906-1_8_Fig4_HTML.jpg)\n\
    \n图 8-4. 一个功能完整的多人 UFO 游戏，两名玩家通过蓝牙连接进行游戏\n\n## 断连\n\n在实现多人支持时，我们需要做的最后一步是添加逻辑，以处理断连和其他无法恢复的故障。幸运的是，苹果的\
    \ API 处理了大部分基础工作。不过，我们仍然希望在 `GameCenterManager` 类中添加一个更通用的调用，以便简化我们的工作。\n\n```\n\
    - (void)disconnect;\n{\n        if ([self.matchOrSession isKindOfClass: [GKSession\
    \ class]])\n        {\n                        [self.matchOrSession disconnectFromAllPeers];\n\
    \        }\n        else if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n\
    \        {\n                        [self.matchOrSession disconnect];\n      \
    \  }\n}\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等方安全断开连接，并防止许多难以排查的问题。\n\n## 总结\n\n\
    在本章中，我们以非常紧凑的方式涵盖了大量信息。你学会了如何使用 Game Kit 网络和 Game Center 网络在两个或多个 iOS 设备之间发送和接收数据。此外，你还学会了如何处理网络状态变化，例如断连。我们将本章学到的原理应用到了\
    \ UFO 游戏中，在不到八章的篇幅内从头构建了一个多人 iOS 游戏。在下一章中，我们将探讨 iOS 5 发布时新增的 Game Center 回合制游戏\
    \ API。\n\n# 9. 使用 Game Center 进行回合制游戏\n\n摘要\n\n仿佛你能消磨时间而不伤害永恒。\n\n> —亨利·大卫·梭罗\n\
    \n苹果在 2011 年的全球开发者大会（WWDC）上发布了 iOS 5。新 SDK 为 Game Center 带来了许多较小的增强功能，其中还包括一个非常重要的新特性：通过\
    \ Game Center 进行回合制游戏。通过回合制游戏，你可以为用户提供异步游戏体验。回合制游戏就是指玩家轮流进行游戏的任何游戏，例如井字棋、国际象棋、纸牌游戏、战舰棋和地产大亨。苹果在\
    \ iOS 6 和 iOS 7 中持续改进了回合制游戏，使其成为每次 Game Center 更新的一个亮点功能。\n\niOS 上的回合制游戏在过去几年里变得非常流行，最初是从\
    \ Words with Friends 开始的。如图 9-1 所示，这款来自 Zynga 的异步文字游戏类似于拼字游戏。每位玩家会收到一组字母，他们需要轮流在棋盘上拼出一个单词，并根据单词的难度和棋盘布局来获得分数。回合制游戏传统上采用存储转发平台：服务器保存游戏数据，直到下一个客户端登录并获取为止。异步游戏通常属于休闲游戏，不需要所有玩家在整个游戏过程中都保持在线连接。\n\
    \n![A978-1-4302-4906-1_9_Fig1_HTML.jpg](img/A978-1-4302-4906-1_9_Fig1_HTML.jpg)\n\
    \n图 9-1. Zynga 的 Words with Friends\n\n在 iOS 5 推出之前，Game Center 只提供实时游戏，即所有涉及的设备在多人游戏过程中需要持续保持活跃和登录状态。回合制游戏则带来了一种更休闲的体验，允许玩家同时进行多达\
    \ 20 场比赛，并且只在轮到自己的回合时才开始操作。在新的 Game Center 增强功能出现之前，编写这类游戏需要你自行编写和部署服务器来处理游戏交互。而现在，你可以快速添加回合制游戏的网络组件，在不到一天的时间内就可以启动并运行。在本章中，我们将探索如何使用\
    \ iOS 5 和 Game Center 的新回合制游戏 API 编写一个简单的井字棋游戏。\n"
- fmt: "# A New Sample Project\n\nUnfortunately, our existing UFOs sample game is\
    \ not a suitable experience for testing turned-based gaming. It wouldn’t make\
    \ much sense to have each player make a move and then wait for the other player\
    \ to catch up. Luckily, there is another very simple type of game that we can\
    \ build a project around: tic-tac-toe. This classic children’s game is something\
    \ almost all of us have played, and we have experience with the rules and strategy.\n\
    \nWe begin by creating a new navigation controller-based project. There are three\
    \ views that we will be working with throughout the project:\n\n- Main View: This\
    \ view simply contains a button that launches the `GKTurnedBasedMatchmakerViewController`.\n\
    - `GKTurnedBasedMatchmakerViewController`: This is the view provided by Apple\
    \ to create and resume turned-based games. You will not need to create this view\
    \ yourself.\n- `Game View`: This is the class that handles user input, determining\
    \ winners and ties, and populating the game board at the start of each turn.\n\
    \nWe begin by working with the main view. These files will be created for you\
    \ when you create the new project. The very first thing we need to do is make\
    \ sure to import the proper Game Kit frameworks and add our reusable `GameCenterManager`\
    \ class that we have been working on throughout this book; you can include the\
    \ existing one from [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html). We also need\
    \ to create a single button in the view to start a new game, as shown in Figure\
    \ [9-2](#A978-1-4302-4906-1_9_Chapter.html#Fig2).\n\n![A978-1-4302-4906-1_9_Fig2_HTML.jpg](A978-1-4302-4906-1_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2. The main view for our new tic-tac-toe game\n\nThe header file for\
    \ the new base view controller class should match the following code snippet.\
    \ We need to adhere to the `GameCenterManagerDelegate` as well as the `GKTurnedBasedMatchmakerViewController`.\
    \ As in previous chapters, we also need to create a class instance of `GameCenterManager`.\
    \ The last thing that needs to be added is an `IBAction` method to begin a new\
    \ game. Make sure to hook up the Start New Game button to the `IBAction` in Interface\
    \ Builder.\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n#import\
    \ \"GameCenterManager.h\"\n\n@interface tictactoeViewController : UIViewController\
    \ <GameCenterManagerDelegate, GKTurnBasedMatchmakerViewControllerDelegate>\n{\n\
    \    GameCenterManager *gcManager;\n}\n\n-(IBAction)beginGame:(id)sender;\n@end\n\
    ```\n\nWe also need to modify the `viewDidLoad` method to check for and then authenticate\
    \ our local user with Game Center. This is the same approach that we followed\
    \ in [Chapter 2](#A978-1-4302-4906-1_2_Chapter.html). If you are supporting iOS\
    \ 6 or newer, you should use the new authentication methods outlined in [Chapter\
    \ 2](#A978-1-4302-4906-1_2_Chapter.html).\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    if ([GameCenterManager isGameCenterAvailable])\n \
    \   {\n        [[NSNotificationCenter defaultCenter] addObserver:self\n      \
    \                                           selector:@selector(localUserAuthenticationChanged:)\n\
    \                                                     name:GKPlayerAuthenticationDidChangeNotificationName\
    \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n      \
    \  [gcManager setDelegate: self];\n        [gcManager authenticateLocalUser];\n\
    \    }\n}\n```\n\nWe also need to implement two delegate methods to monitor for\
    \ successful authentication and local user changes. We are using both of these\
    \ methods to print some debugging output.\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n\
    {\n    NSLog(@\"Authenication Changed: %@\", notif.object);\n}\n```\n\nIn the\
    \ next section, we will see how to call the `GKTurnedBasedMatchmakerViewController`\
    \ and how to handle the delegate methods that are required in order to handle\
    \ errors when resuming or creating new matches.\n\n## `GKTurnedBasedMatchmakerViewController`\n\
    \nMuch as it does with leaderboards and achievements, Apple provides a default\
    \ class to present the GUI for creating a new turn-based match. To create a match\
    \ programmatically, see the later section “Programmatic Matches.”\n\nWe begin\
    \ by working with a new matchmaker object in the `IBAction` for the single button\
    \ that we created in the previous section. The approach that we use here is very\
    \ similar to Game Center matchmaking, as described in [Chapter 5](#A978-1-4302-4906-1_5_Chapter.html).\
    \ We first allocate and initialize a copy of `GKMatchRequest` and set the minimum\
    \ and maximum players. We then create a new `GKTurnedBasedMatchmakerViewController`\
    \ and initialize it with the match object that we just created. Finally, we set\
    \ the delegate to `self` and present the view modally to the user. This view will\
    \ be similar to the one shown in Figure [9-3](#A978-1-4302-4906-1_9_Chapter.html#Fig3).\n\
    \n```\n- (IBAction)beginGame:(id)sender\n{\n    GKMatchRequest *match = [[GKMatchRequest\
    \ alloc] init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\
    \    GKTurnBasedMatchmakerViewController *tmvc = nil;\n    tmvc = [[GKTurnBasedMatchmakerViewController\
    \ alloc] initWithMatchRequest:match];\n    [tmvc setTurnBasedMatchmakerDelegate:\
    \ self];\n    [self presentViewController:tmvc animated:YES completion: nil];\n\
    \    [tmvc release];\n    [match release];\n}\n```\n\n**Note:** A `GKLocalPlayer`\
    \ must first authenticate with Game Center before a new turned-based game match\
    \ can be created.\n\nThere are four delegate methods that need to be implemented\
    \ to conform to the `GKTurnedBasedMatchmakerViewControllerDelegate` protocol.\
    \ The first handles the user canceling in the matchmaker. The only requirement\
    \ is to call `dismissViewControllerAnimated:Completion:`. You may add additional\
    \ logic, as required, for your app.\n\n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:(GKTurnBasedMatchmakerViewController*)viewController\n\
    {\n    [self dismissViewControllerAnimated: YES completion: nil];\n}\n```\n\n\
    **Important:** The list of current games may not update until you close and reopen\
    \ the `GKTurnedBasedMatchmakerViewController`.\n\n![A978-1-4302-4906-1_9_Fig3_HTML.jpg](A978-1-4302-4906-1_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. Starting a new turned-based match\n\nWe also need to implement a\
    \ delegate method to catch any errors that occur during this phase. The following\
    \ method is called whenever an error is encountered during the matchmaking process.\
    \ For debugging purposes, we are printing the error to the console; however, in\
    \ practice you will want to inform the user that an error has occurred.\n\n```\n\
    - (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController*)viewController\
    \ didFailWithError:(NSError *)error\n{\n    NSLog(@\"Turned Based Matchmaker Failed\
    \ with Error: %@\", [error localizedDescription]);\n}\n```\n\nThe last delegate\
    \ method that is discussed in this section handles the user quitting a match from\
    \ the matchmaker screen. This is accomplished by swiping across a game and selecting\
    \ the Quit option. In the following method, we call `participantQuitOutOfTurnWithOutcome`\
    \ on the match object that is passed to us as part of the method. We pass in the\
    \ outcome of `GKTurnBasedMatchOutcomeQuit`. If you do not call the proper method\
    \ here, you will seemingly be able to quit a game, but it will reappear within\
    \ a few seconds.\n\n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController*)viewController\
    \ playerQuitForMatch:(GKTurnBasedMatch *)match\n{\n    [match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\n\
    \                        withCompletionHandler:^(NSError *error) {\n         \
    \                   if (error)\n                            {\n              \
    \                  NSLog(@\"An error occurred ending match: %@\", [error localizedDescription]);\n\
    \                            }\n                        }];\n}\n```\n\nThe final\
    \ required method, `didFindMatch`, is discussed in the next section, “Starting\
    \ a New Game.”"
  raw: '## A New Sample Project


    Unfortunately, our existing UFOs sample game is not a suitable experience for
    testing turned-based gaming. It wouldn’t make much sense to have each player make
    a move and then wait for the other player to catch up. Luckily, there is another
    very simple type of game that we can build a project around: tic-tac-toe. This
    classic children’s game is something almost all of us have played, and we have
    experience with the rules and strategy.


    We begin by creating a new navigation controller-based project. There are three
    views that we will be working with throughout the project:


    *   Main View: This view simply contains a button that launches the `GKTurnedBasedMatchmakerViewController`.

    *   `GKTurnedBasedMatchmakerViewController`: This is the view provided by Apple
    to create and resume turned-based games. You will not need to create this view
    yourself.

    *   `Game View`: This is the class that handles user input, determining winners
    and ties, and populating the game board at the start of each turn.


    We begin by working with the main view. These files will be created for you when
    you create the new project. The very first thing we need to do is make sure to
    import the proper Game Kit frameworks and add our reusable `GameCenterManager`
    class that we have been working on throughout this book; you can include the existing
    one from [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html). We also need to create
    a single button in the view to start a new game, as shown in Figure [9-2](#A978-1-4302-4906-1_9_Chapter.html#Fig2).


    ![A978-1-4302-4906-1_9_Fig2_HTML.jpg](A978-1-4302-4906-1_9_Fig2_HTML.jpg)


    Figure 9-2.


    The main view for our new tic-tac-toe game


    The header file for the new base view controller class should match the following
    code snippet. We need to adhere to the `GameCenterManagerDelegate` as well as
    the `GKTurnedBasedMatchmakerViewController`. As in previous chapters, we also
    need to create a class instance of GameCenterManager. The last thing that needs
    to be added is an `IBAction` method to begin a new game. Make sure to hook up
    the Start New Game button to the `IBAction` in Interface Builder.


    `#import <UIKit/UIKit.h>`


