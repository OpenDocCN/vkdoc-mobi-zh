    being inheritently wireless there are no differences from textbook networking
    examples. In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html), you will discover
    how to tie everything together and have your peers begin to communicate with each
    other.'
  trans: "\n# 点对点选择器委托\n\n在前面的章节中，我们看到使用 `GKPeerPickerController` 能免费获得许多功能。然而，在接受了来自其他用户的连接后，我们的应用还不知道该如何继续。\n\
    \n在本节中，我们将讨论 `GKPeerPickerControllerDelegate`。点对点选择器会调用此委托来创建新的会话对象，并用于处理正常网络连接过程中发生的状态变化。\n\
    \n`GKPeerPickerControllerDelegate` 有三个主要职责，你需要实现并响应它们。它需要创建会话、响应新的连接消息，以及处理用户取消点对点选择器的情况。\n\
    \n首先，我们来看 `peerPickerController:didSelectConnectionType:`。这个委托方法会告知我们用户选择了哪种连接类型。你可能还记得在之前的章节中，我们使用过\
    \ `connectionTypeMask`。如果你为用户提供了选择通过局域网还是蓝牙连接的选项，此委托方法将返回所选结果。如果用户选择在线连接，你应该关闭点对点选择器控制器，并显示你自己的局域网连接视图；以下是实现该行为的代码示例。\n\
    \n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\ndidSelectConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n    if (type == GKPeerPickerConnectionTypeOnline)\n    {\n        [picker dismiss];\n\
    \        [picker release];\n        // 在此处显示你自己的用户界面。\n    }\n}\n```\n\n`GKPeerPickerControllerDelegate`\
    \ 还负责返回一个 `GKSession`。当你的点对点选择器需要一个会话对象时，它会调用 `peerPickerController:sessionForConnectionType:`。如果你实现了这个方法，你必须创建一个或返回一个现有的\
    \ `GKSession`。\n\n**注意**\n\n如果在 `peerPickerController:sessionForConnectionType:`\
    \ 中创建新的 `GKSession`，那么你创建的会话必须将其自身声明为 `GKSessionModePeer`。如果你不需要实现 `peerPickerController:sessionForConnectionType:`，并且该会话使用的是蓝牙协议，则点对点控制器会使用默认的\
    \ `sessionID` 和 `displayName` 参数分配一个新的会话。如果你正在创建新的局域网连接，则需要实现 `peerPickerController:sessionForConnectionType:`\
    \ 并返回所需的 `GKSession`。\n\n你还需要实现 `peerPickerControllerDidCancel:`。尽管这个方法是可选的，但\
    \ Game Kit 期望它被实现。此方法返回后，点对点选择器将自动关闭，因此你不需要添加代码来处理此事件。\n\n在使用 `GKPeerPickerControllerDelegate`\
    \ 时，我们需要实现的最后一个委托方法是 `peerPickerController:didConnectPeer:toSession:`。每当有新的对等方连接到会话时，就会调用此方法。\n\
    \n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\ndidConnectPeer:(NSString*)peerID\n\
    toSession:(GKSession*)session\n{\n    currentSession = session;\n    // 保存会话和\
    \ peerID\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n当此方法被调用时，我们想要保留对会话和\
    \ `peerID` 的引用。我们将在接下来的章节中，开始处理双向发送数据时用到它们。一旦对等方成功连接，你的应用应该接管会话的所有权，并关闭点对点选择器。\n\
    \n图 6-11 展示了一个已进入连接状态并将其可用性标志设置为 NO 的对等 iPhone 设备的视图。\n\n![A978-1-4302-4906-1_6_Fig11_HTML.jpg](img/A978-1-4302-4906-1_6_Fig11_HTML.jpg)\n\
    \n图 6-11.\n\n名为 Miranda 的设备已将其可用性状态设置为 false。\n\n**注意**\n\n尽管 `peerPickerController:didConnectPeer:toSession:`\
    \ 是一个可选的协议方法，但在你完全启用 Game Kit 网络功能之前，你需要实现它。\n\n## 总结\n\n在本章中，你学习了如何使用 Game Kit\
    \ 网络功能，通过局域网（Wi-Fi）或蓝牙将两台设备连接在一起。在上一章中，我们介绍了匹配和邀请功能。通过这两种技术，我们完全涵盖了在 iOS 平台上使用\
    \ Game Center 和 Game Kit 技术查找并连接对等方的所有可用方法。\n\n我们还研究了一些真实的 iOS 应用案例，这些应用受益于 Game\
    \ Kit 网络集成，并且你已经看到，只需投入少量时间，就能轻松地将你的应用提升到更高的品质层级。\n\n此外，我们深入探讨了点对点选择器的工作原理，包括如何通过蓝牙或局域网请求新的会话，以及如何连接对等方。我们还涵盖了让你的应用快速启动并运行这些系统所需的全部委托和控制器开销。\n\
    \n在下一章中，我们将讨论如何为移动设备设计网络，首先概述网络类型，并包括移动网络设计的注意事项。在第 8 章中，我们将把所有已建立连接的对等方联系起来，并让它们开始彼此通信。\n\
    \n# 7. 网络设计概述\n\n**摘要**\n\n在前面的章节中，我们探讨了如何通过 Game Center 和 Game Kit 的各种方法来查找并与对等方建立连接。在本章中，我们将探讨如何不仅为\
    \ iOS 游戏，也为任何平台上的游戏设计网络体验。本章的设计风格与本书前几章略有不同。主要区别在于，本章不涉及相关源代码，并且我们只会简要提及 iOS 特有的网络主题。本章将重点放在网络设计的概念上，而不是应用内的实际网络实现。长期从事开发的开发者可能从之前的开发经验中已经熟悉这些网络类型，除了\
    \ iOS 天生是无线的之外，这与教科书中的网络示例并无差异。在第 8 章中，你将了解如何将所有内容整合在一起，让你的对等方开始相互通信。\n"
- fmt: '# Plan Ahead


    While it is entirely possible—and all too often done—to go ahead and just start
    writing networking logic, that approach will likely cause more trouble down the
    road. After all, you wouldn’t begin writing a new app or game without first planning
    out how it will function. Computer networking is a complex topic, and you should
    approach it with a plan; otherwise, you could find yourself rewriting an entire
    system after putting a significant amount of time and effort into it. You don’t
    want to find yourself up against a wall because the approach you took limited
    the options for future expandability. Just as with software, you shouldn’t jump
    right into writing code on the first day. You should whiteboard things out a little
    and get a feel for the requirements of the project.


    Take, for example, a desktop online role-playing game called `Clan Lord` that
    was written in the late 1990s for the Mac. `Clan Lord` has maintained a very dedicated
    fan base that has kept the game continuously active to the present day. However,
    when the game was originally written, many of the network-related issues were
    clearly not properly thought through.


    `Clan Lord` uses frame-by-frame syncing for all of its network calls. This means
    that every frame, every element visible on the player’s screen, has to be transmitted
    to all connected users. This approach works, and works well while you have a small
    game, a small user base, and limited functionality. However, when you are designing
    software, you cannot have a limited vision for the future. Always plan for the
    best, or depending on your perspective, the worst case. When designing a network,
    you must take into account what you will want to do six months, a year, or even
    ten years from now with your game or app.


    `Clan Lord` now suffers from several long-ingrained problems. For example, its
    rendering engine works at 8 frames per second (fps), because you cannot sync more
    than eight full frames of data per second on the average home network. This could
    have been prevented by implementing some logic into the client when the project
    was first started; for example, it would have been much more efficient to inform
    the client where objects are and when they move, instead of fully syncing everything
    each frame. In addition, player movement is limited to 8 fps because actions have
    to be synced back to the server, making it hard to react to events. This also
    could have been prevented by using prediction algorithms, discussed later in this
    chapter, to determine where a player will end up during movement.


    `Clan Lord` is one example of a game that was much more popular than planned,
    and lived a lot longer than anyone expected. Sadly, when this happens, you are
    limited to the vision and design that you had when the project was first started.
    It is much harder to undo something later than to do it initially. When designing
    the networking functionality of your game—your network—take time to do it carefully
    and intentionally, as the results can follow you around for a very long time.


    ## Three Types of Networks


    Although there are many different styles and types of network designs, there are
    three primary network types that you can implement when designing your game’s
    network. Almost all specific types of network configurations will inherit from
    these three primary types. Picking a primary type of network is a good place to
    start, as it will guide you toward the next step in the design process.


    We will be focusing on just three of the primary types of network design, but
    keep in mind that there are dozens of other well-known network configurations,
    some of which we will briefly touch on in this section. The three types of networks
    we will be discussing at length throughout this chapter are peer-to-peer, client-to-host,
    and ring networking.


    ### Peer-to-Peer Network


    A peer-to-peer network, shown in Figure [7-1](#A978-1-4302-4906-1_7_Chapter.html#Fig1),
    is the most common network that you will see on the iOS platform. No device is
    treated any differently than any other device, and each device is in charge of
    sending and receiving data to and from all the other peers it needs to communicate
    with.


    ![A978-1-4302-4906-1_7_Fig1_HTML.jpg](A978-1-4302-4906-1_7_Fig1_HTML.jpg)


    Figure 7-1. A visual representation of a peer-to-peer network using six iOS devices


    A peer-to-peer network is commonly used when dealing with Game Center networking
    because it is often the easiest to implement on the iOS platform. While this approach
    has the benefit of being extremely easy to set up, it has equally significant
    weaknesses and drawbacks. Primarily, it can cause a lot of redundant overhead.
    Each peer needs to inform every other peer about its actions. In a six-way network
    like the one shown in Figure [7-1](#A978-1-4302-4906-1_7_Chapter.html#Fig1), this
    means that each device needs to send out five messages every time it wants to
    update the game state. In addition, if you are implementing a system in which
    each peer confirms with a successful message, you will also need to receive five
    messages.


    Another disadvantage of a peer-to-peer network is that it can become very confusing
    to work with a large number of peers. As you can see from Figure [7-1](#A978-1-4302-4906-1_7_Chapter.html#Fig1),
    things can get complicated quickly. Unlike the other primary types of networks
    that we will discuss in this section, the peer-to-peer approach is the only one
    without a clear flow. Each peer can message any other peer, by definition. This
    also means that you have to keep track of what every peer needs to know. Under
    most circumstances, this is a perfectly acceptable approach. However, when you
    begin to deal with more complex networks, this configuration might no longer be
    ideal.


    In addition, no one device is in control of the state of the game. If there are
    artificial intelligence components, then you will need to figure out a system
    that will allow them to stay in sync between all the devices.'
