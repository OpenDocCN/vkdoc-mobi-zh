    Exchange data is limited to 1k as opposed to the 4k limit for general turn data.


    The initating player may cancel an exchange request anytime before the exchange
    is accepted and acted on by the receiptant. This is done by using the player:exchangeCanceled:
    match: method.


    The receiving player will need to respond to the exchange request using the following
    approach:


    `[GKTurnBasedExchange replyWithLocalizableMessageKey:key arguments:arguments data:data`


    `completionHandler:^(NSError *error) {`


    `}`


    The match data for the current game will need to be updated, if required, to account
    for the exchange. It may therefore be necessary to include the current player
    in the exchange recipients list so that the data can be updated as part of their
    turn.


    ## Player Reminders


    iOS 7 also adds the ability to send reminders to players about pending actions.
    These reminders will appear as push notifications on their devices. The push notification
    will contain the referenced localizable message, and considerations for the display
    size of that message need to be taken into account. This allows the game to send
    reminders that a turn or exchange action is required.


    `[GKTurnBasedMatch sendReminderToParticipants:(NSArray *)participants localizableMessageKey:(NSString
    *)key  arguments:(NSArray *)arguments completionHandler:(void(^)(NSError *error))completionHandler]`


    ## Programmatic Matches


    If you want to bypass the `GKTurnBasedMatchmakerViewController` and implement
    your own GUI, there is an option to do so. Using the following method will create
    a new match without having the user go through the matchmaker:


    `- (void)findMatch`


    `{`


        `GKMatchRequest *match = [[GKMatchRequest alloc] init];`


        `[match setMaxPlayers:2];`


        `[match setMinPlayers:2];`


        `[GKTurnBasedMatch findMatchForRequest:match` É `withCompletionHandler:^(GKTurnBasedMatch
    *match, NSError *error)  {`


            `if (error == nil) {`


                `//start new game with returned match`


            `} else {`


                `NSLog(@"An error occurred when finding a match: %@", [error localizedDescription]);`


            `}`


        `}];`


    `}`


    In addition to creating a game, you need to be able to load a list of existing
    games for your local user. You can do so with the following method.


    `- (void)loadMatches`


    `{`


        `[GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray *matches, NSError
    *error) {`


            `if (error == nil) {`


                `NSLog(@"Existing Matches: %@", matches);`


            `} else {`


                `NSLog(@"An error occurred while loading matches: %@", [error localizedDescription]);`


            `}`


        `}];`


    `}`


    Note


    Because both of these methods use background tasks in order to handle the request,
    code that you implement within the block needs to be thread-safe.


    ## GKTurnBasedEventHandler


    The `GKTurnedBasedEventHandler` is a delegate protocol that is responsible for
    handling important messages related to turn-based games. To set a delegate for
    events, use the following code.


    `[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];`


    The protocol has three optional methods.


    *   `handleInviteFromGameCenter`: When your delegate receives this method, it
    should populate a new `GKMatchRequest` with the `playersToInvite` that are passed
    in through the method. You then need to begin a new match or present the matchmaker
    GUI. This method is called when the user accepts a match invite from a friend.

    *   `handleTurnEventForMatch`: Your delegate receives this message when the user
    has accepted a push notification for an in-progress match. You need to end whatever
    task you are performing and display the game for the match that is passed in with
    this method.

    *   `handleMatchEnded`: When your delegate receives this message, it should display
    the match’s results and game-over views to the player and allow the player the
    option of removing the match data from Game Center.


    ## Summary


    In this chapter, you learned about the turn-based gaming functionality of Game
    Center. We worked with our existing `GameCenterManager` class and wrote an entirely
    new sample game to work with the turn-based technology. You should now have a
    firm grasp on how to create a new turn-based game, as well as retain and send
    turn data between peers. With the skills learned in this chapter, you should now
    be able to easily get the networking component of turned-based gaming up and running
    in a few hours.


    In the next chapter, we will look at another exciting topic: voice chat. Apple
    has gone to tremendous lengths to make voice over IP easy to use in iOS apps,
    and we will explore how to get VoIP up and running quickly in your Game Center–
    or Game Kit–enabled apps.'
  trans: "\n# 退出与弃权\n\n玩家可随时从匹配视图控制器中滑动屏幕退出比赛。但建议在游戏内部为用户提供弃权或退出比赛的路径。要允许玩家弃权比赛，请使用以下代码片段：\n\
    \n```\n- (IBAction)forfeit:(id)sender\n{\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\
    \ withCompletionHandler:^(NSError *error) {\n        if (error) {\n          \
    \  NSLog(@\"结束比赛时发生错误：%@\", [error localizedDescription]);\n        }\n    }];\n\
    }\n```\n\n# 玩家超时\n\n在本章前面部分，我们讨论了使用 `endTurnWithNextParticipant:matchData:completionHandler:`\
    \ 方法来结束回合。从 iOS 6 开始，该方法已被弃用，并替换为 `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:`。如果你的应用目标是\
    \ iOS 5，则需要继续使用先前的方法；但如果目标是 iOS 6 或更高版本，你可以开始使用这个允许玩家超时的新方法。\n\n在 iOS 6 之前，无法在回合制比赛中跳过某位玩家；如果某位玩家未能进行其回合，游戏将进入一种不确定状态，直到游戏被弃权。使用\
    \ `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:` 方法可以设置一个\
    \ `NSTimeInterval` 参数。一旦时间间隔过去，控制权将传递给队列中的下一位玩家，并且可以处理玩家错过其回合的行为。\n\n# 玩家交涉\n\n\
    在 iOS 7 之前，非当前回合的玩家无法发送任何操作。iOS 7 带来了玩家交涉功能。玩家交涉允许任何玩家在任何时候发起操作，这可用于同时回合、聊天以及玩家之间的交易，无论当前轮到谁行动。\n\
    \n一次交涉请求需要成功完成五个步骤。\n\n交涉发起者向接收者发送请求。接收者被告知有挂起的请求。接收者对交涉做出回应，并将响应发送回发起者。发起者随后收到响应通知。最后，当前玩家被告知交涉已完成，并更新比赛数据。\n\
    \n如果你的游戏允许，任何玩家都可以发起交涉，无论当前是否是他们的回合。发起者需要为交涉请求选择一个或多个接收者。发起者还需要指定交易类型，是聊天消息、交易、请求帮助，还是其他类型。交涉还需要设置一个超时时间，以确定交涉的有效时长。\n\
    \niOS 7 中提供了一种发送交涉的新方法，`sendExchangeToParticipants:`。该方法接受多个参数，首先是接收请求的接收者数组。随后是一个\
    \ `NSData` 块，代表请求的详细信息。还会附加一条可本地化的消息和一个以秒为单位的超时时间：\n\n```\n[GKTurnBasedExchange\
    \ sendExchangeToParticipants:recipients data:data localizableMessageKey:key\n\
    arguments:arguments timeout:timeout completionHandler:^(GKTurnBasedExchange\n\
    *exchange, NSError *error) {\n    }];\n```\n\n注意\n\n交涉数据限制为 1k，而常规回合数据的限制为 4k。\n\
    \n发起玩家可以在交涉被接收者接受并处理之前的任何时间取消交涉请求。这通过使用 `player:exchangeCanceled:match:` 方法完成。\n\
    \n接收玩家需要使用以下方式响应交涉请求：\n\n```\n[GKTurnBasedExchange replyWithLocalizableMessageKey:key\
    \ arguments:arguments data:data\ncompletionHandler:^(NSError *error) {\n}]\n```\n\
    \n如果需要，当前游戏的比赛数据必须进行更新，以反映交涉的结果。因此，可能有必要将当前玩家也包含在交涉接收者列表中，以便数据可以作为其回合的一部分进行更新。\n\
    \n# 玩家提醒\n\niOS 7 还增加了向玩家发送待处理操作提醒的功能。这些提醒将以推送通知的形式出现在他们的设备上。推送通知将包含引用的可本地化消息，并且需要考虑该消息的显示尺寸。这使得游戏可以发送提醒，提示需要进行回合或交涉操作。\n\
    \n```\n[GKTurnBasedMatch sendReminderToParticipants:(NSArray *)participants localizableMessageKey:(NSString\
    \ *)key  arguments:(NSArray *)arguments completionHandler:(void(^)(NSError *error))completionHandler]\n\
    ```\n\n# 编程式匹配\n\n如果你想绕过 `GKTurnBasedMatchmakerViewController` 并实现自己的图形界面，有办法可以做到。使用以下方法无需用户通过匹配界面即可创建新比赛：\n\
    \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
    \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n    [GKTurnBasedMatch\
    \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch *match, NSError\
    \ *error)  {\n        if (error == nil) {\n            // 使用返回的比赛开始新游戏\n     \
    \   } else {\n            NSLog(@\"寻找比赛时发生错误：%@\", [error localizedDescription]);\n\
    \        }\n    }];\n}\n```\n\n除了创建游戏，你还需要能够为本地用户加载现有游戏列表。可以通过以下方法实现：\n\n```\n\
    - (void)loadMatches\n{\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray\
    \ *matches, NSError *error) {\n        if (error == nil) {\n            NSLog(@\"\
    现有比赛：%@\", matches);\n        } else {\n            NSLog(@\"加载比赛时发生错误：%@\", [error\
    \ localizedDescription]);\n        }\n    }];\n}\n```\n\n注意\n\n由于这两种方法都使用后台任务来处理请求，你在块内实现的代码必须是线程安全的。\n\
    \n# `GKTurnBasedEventHandler`\n\n`GKTurnedBasedEventHandler` 是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码：\n\
    \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
    ```\n\n该协议有三个可选方法。\n\n- `handleInviteFromGameCenter`：当你的委托收到此方法时，它应该使用通过该方法传入的\
    \ `playersToInvite` 填充一个新的 `GKMatchRequest`。然后你需要开始一场新比赛或展示匹配界面。当用户接受来自朋友的比赛邀请时，会调用此方法。\n\
    - `handleTurnEventForMatch`：当用户接受了针对进行中比赛的推送通知时，你的委托会收到此消息。你需要结束正在进行的任何任务，并显示通过此方法传入的比赛对应的游戏。\n\
    - `handleMatchEnded`：当你的委托收到此消息时，它应向玩家显示比赛结果和游戏结束视图，并允许玩家选择从 Game Center 中移除比赛数据。\n\
    \n# 总结\n\n在本章中，你学习了 Game Center 的回合制游戏功能。我们与现有的 `GameCenterManager` 类协作，并编写了一个全新的示例游戏来使用回合制技术。现在，你应该对如何创建新的回合制游戏，以及在玩家之间保留和发送回合数据有了扎实的理解。掌握了本章所学的技能，你现在应该能够在几小时内轻松启动并运行回合制游戏的网络组件。\n\
    \n在下一章中，我们将探讨另一个激动人心的话题：语音聊天。Apple 投入了大量精力使 IP 语音在 iOS 应用中易于使用，我们将探索如何在你启用了 Game\
    \ Center 或 Game Kit 的应用中快速启动并运行 VoIP。\n"
- fmt: "# Voice Chat\n\n## Abstract\n\nGreat discoveries and improvements invariably\
    \ involve the cooperation of many minds. I may be given credit for having blazed\
    \ the trail, but when I look at the subsequent developments I feel the credit\
    \ is due to others rather than to myself.\n\n> —Alexander Graham Bell\n\nVoice\
    \ chat, more than any other service provided as part of Game Kit, is a true testament\
    \ to Apple engineering. Apple has turned one of the most complicated features\
    \ on other platforms into one of the easiest to implement on iOS. When working\
    \ with Voice over Internet Protocol (VOIP) on other platforms, it is often the\
    \ most complex and daunting task of an entire project. In this chapter, we will\
    \ explore how to add voice chat services to our UFOs game or to any iOS app. The\
    \ brevity of this chapter is evidence of how much work Apple has put into this\
    \ technology to bring it within the grasp of even the greenest of developers.\n\
    \nUnlike our strategy in preceding chapters, we will be dealing with Game Kit\
    \ Voice Chat and Game Center Voice Chat separately, instead of writing a shared\
    \ class as we did previously. While there are many similarities between the two\
    \ services, they differ enough that it makes sense to handle each one separately.\
    \ In addition, we will apply the topics covered in this chapter as we implement\
    \ voice chat into UFOs.\n\n## Voice Chat for Game Center\n\nWe will begin by looking\
    \ at voice chat for Game Center. Using a `GKMatch` to create a voice chat session\
    \ has many advantages, such as ease of use, quickness to implement, and reduced\
    \ overhead compared to using Game Kit or having to implement a custom solution.\
    \ A `GKMatch` voice chat can have multiple channels, each with an associated list\
    \ of recipients. For example, you could have one channel for teammates in a first-person\
    \ shooter game, and another channel for all players. This would allow you to talk\
    \ about tactics for winning the match without giving away information to the other\
    \ team.\n\n> **Note:** Voice chat using a `GKMatch` is only available to participants\
    \ who are connected to the Internet via Wi-Fi; voice chat does not support cellular\
    \ networks.\n\n### Creating an Audio Session\n\nBefore you can begin to work with\
    \ voice chat itself, you first need to create a new audio session. It is important\
    \ to do this before you begin any voice chat services. If you create the audio\
    \ session after you create the chat session, you will not be able to send or receive\
    \ voice data. In the following example, we create a new audio session that allows\
    \ our app to play and record audio, and then set it to active.\n\n> **Tip:** Your\
    \ app might already use an audio session for playing sound effects; if you have\
    \ already created an audio session, you are not required to make a new one. If\
    \ you are reusing an existing audio session, make sure that you set it to allow\
    \ both play and record functionality.\n\n```\nNSError *error = nil;\nAVAudioSession\
    \ *audioSession = [AVAudioSession sharedInstance];\nif(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error])\n{\n    if(error)\n    {\n        NSLog(@\"An error occurred\
    \ while starting audio session: %@\", [error localizedDescription]);\n    }\n\
    }\nif(![audioSession setActive: YES error: &error])\n{\n    if(error)\n    {\n\
    \        NSLog(@\"An error occurred while starting audio session: %@\", [error\
    \ localizedDescription]);\n    }\n}\n```\n\n### Creating New Voice Channels\n\n\
    You can have as many voice chat channels as you want in your app, and each peer\
    \ can register to be part of as many channels as they want. Channels are created\
    \ and organized by a name string. This is how we will determine what channels\
    \ we want the user to join. When two or more peers join a channel with the same\
    \ name, they are connected to the same chat.\n\nThe code snippet that follows\
    \ shows an example of how to create three different channels. Take note that the\
    \ channels are created with the `GKMatch` object that is returned to us when we\
    \ begin a new Game Center–based networking game.\n\n```\nGKVoiceChat *allChannel\
    \ = [[match voiceChatWithName:@\"allPlayers\"] retain];\nGKVoiceChat *teamChannel\
    \ = [[match voiceChatWithName:@\"blueTeam\"] retain];\nGKVoiceChat *squadChannel\
    \ = [[match voiceChatWithName:@\"BlueTeamSquad2\"] retain];\n```\n\nIn this example,\
    \ we have a channel for communicating with all players, a channel for communicating\
    \ with our entire team, and a third channel that is used to talk with our squad.\
    \ Just because channels have been created doesn’t mean that they are automatically\
    \ turned on. In the next section, we will look at how to start and stop communication\
    \ on a specific channel.\n\n### Starting and Stopping Voice Chat\n\nIn the previous\
    \ section, we created three new voice channels for use with Game Center–type voice\
    \ chat. When you want to transmit and receive voice on those channels, you need\
    \ to first tell the API that you want to begin using that channel. After you are\
    \ connected to a channel, you are able to send and receive data from that channel.\
    \ If you want to connect to a channel and do not want to transmit any voice audio,\
    \ see the following section on muting the microphone.\n\nTo begin using a voice\
    \ channel, you need to call the `start` method on the `GKVoiceChat` object that\
    \ was created in the previous section.\n\n```\n[allChannel start];\n[teamChannel\
    \ start];\n```\n\nWhen you want to leave a channel, you simply call the `stop`\
    \ method. This is a better approach than simply muting all participants in the\
    \ channel because the app will not be required to receive additional network data.\
    \ A stopped channel can be restarted at any time.\n\n```\n[allChannel stop];\n\
    [teamChannel stop];\n```\n\n> **Tip:** It is highly recommended that you provide\
    \ both visual and audio indicators when you are transmitting voice data, such\
    \ as a red light and a click sound. This reduces the chance that a user will accidentally\
    \ transmit voice data when they don’t intend to. Always remember that a user’s\
    \ microphone and transmitted voice should be treated as sensitive data.\n\n###\
    \ Chat Volume and Muting\n\nThe voice chat volume is set by channel. Each channel\
    \ has an associated property that can be used to lower the overall volume of that\
    \ chat. You cannot raise the volume past what the user has selected as the device’s\
    \ current volume. For example, if the user’s maximum audio is 70% and you set\
    \ the volume to 100%, it will scale itself down to 70%. To modify a channel’s\
    \ volume, add the following line of code:\n\n```\nallChannel.volume = 0.5; //half\
    \ of max volume\n```\n\nIn addition, you can mute individual players in a channel\
    \ by referencing their `playerID`. Players can be muted and unmuted using the\
    \ following two lines of code:\n\n```\n[teamChannel setMute:YES forPlayer: playerID];\n\
    [teamChannel setMute:NO forPlayer:playerID];\n```\n\nThere might also be circumstances\
    \ in which you do not want to transmit the user’s voice at all times. By default,\
    \ a user starts a chat in the muted state. You will need to unmute a user before\
    \ they can begin to transmit voice data.\n\n```\nsquadChannel.active = YES;\n\
    ```\n\n> **Important:** A user can only transmit voice on one channel at a time;\
    \ if you unmute a channel, the API will automatically mute all other channels.\n\
    \nThis is all that is required in order to completely enable voice chat in your\
    \ Game Center–based networking app. Everything else, including playback, sending,\
    \ and receiving the data, is handled for you by the APIs."
  raw: '# 10. Voice Chat


    Abstract


    Great discoveries and improvements invariably involve the cooperation of many
    minds. I may be given credit for having blazed the trail, but when I look at the
    subsequent developments I feel the credit is due to others rather than to myself.


    Great discoveries and improvements invariably involve the cooperation of many
    minds. I may be given credit for having blazed the trail, but when I look at the
    subsequent developments I feel the credit is due to others rather than to myself.


    > —Alexander Graham Bell


    Voice chat, more than any other service provided as part of Game Kit, is a true
    testament to Apple engineering. Apple has turned one of the most complicated features
    on other platforms into one of the easiest to implement on iOS. When working with
    Voice over Internet Protocol (VOIP) on other platforms, it is often the most complex
    and daunting task of an entire project. In this chapter, we will explore how to
    add voice chat services to our UFOs game or to any iOS app. The brevity of this
    chapter is evidence of how much work Apple has put into this technology to bring
    it within the grasp of even the greenest of developers.


    Unlike our strategy in preceding chapters, we will be dealing with Game Kit Voice
    Chat and Game Center Voice Chat separately, instead of writing a shared class
    as we did previously. While there are many similarities between the two services,
    they differ enough that it makes sense to handle each one separately. In addition,
    we will apply the topics covered in this chapter as we implement voice chat into
    UFOs.


    ## Voice Chat for Game Center


    We will begin by looking at voice chat for Game Center. Using a `GKMatch` to create
    a voice chat session has many advantages, such as ease of use, quickness to implement,
    and reduced overhead compared to using Game Kit or having to implement a custom
    solution. A `GKMatch` voice chat can have multiple channels, each with an associated
    list of recipients. For example, you could have one channel for teammates in a
    first-person shooter game, and another channel for all players. This would allow
    you to talk about tactics for winning the match without giving away information
    to the other team.


    Note


    Voice chat using a `GKMatch` is only available to participants who are connected
    to the Internet via Wi-Fi; voice chat does not support cellular networks.


    ### Creating an Audio Session


    Before you can begin to work with voice chat itself, you first need to create
    a new audio session. It is important to do this before you begin any voice chat
    services. If you create the audio session after you create the chat session, you
    will not be able to send or receive voice data. In the following example, we create
    a new audio session that allows our app to play and record audio, and then set
    it to active.


    Tip


    Your app might already use an audio session for playing sound effects; if you
    have already created an audio session, you are not required to make a new one.
    If you are reusing an existing audio session, make sure that you set it to allow
    both play and record functionality.


        `NSError *error = nil;`


        `AVAudioSession *audioSession = [AVAudioSession sharedInstance];`


            `if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])`


            `{`


                `if(error)`


                `{`


                    `NSLog(@"An error occurred while starting audio session: %@",
    [errorÉ localizedDescription]);`


                `}`


            `}`


            `if(![audioSession setActive: YES error: &error])`


            `{`


                `if(error)`


                `{`


                    `NSLog(@"An error occurred while starting audio session: %@",
    [errorÉ localizedDescription]);`


                `}`


            `}`


    ### Creating New Voice Channels


    You can have as many voice chat channels as you want in your app, and each peer
    can register to be part of as many channels as they want. Channels are created
    and organized by a name string. This is how we will determine what channels we
    want the user to join. When two or more peers join a channel with the same name,
    they are connected to the same chat.


    The code snippet that follows shows an example of how to create three different
    channels. Take note that the channels are created with the `GKMatch` object that
    is returned to us when we begin a new Game Center–based networking game.


    `GKVoiceChat *allChannel = [[match voiceChatWithName:@"allPlayers"] retain];`


    `GKVoiceChat *teamChannel = [[match voiceChatWithName:@"blueTeam"] retain];`


    `GKVoiceChat *squadChannel = [[match voiceChatWithName:@"BlueTeamSquad2"] retain];`


    In this example, we have a channel for communicating with all players, a channel
    for communicating with our entire team, and a third channel that is used to talk
    with our squad. Just because channels have been created doesn’t mean that they
    are automatically turned on. In the next section, we will look at how to start
    and stop communication on a specific channel.


    ### Starting and Stopping Voice Chat


    In the previous section, we created three new voice channels for use with Game
    Center–type voice chat. When you want to transmit and receive voice on those channels,
    you need to first tell the API that you want to begin using that channel. After
    you are connected to a channel, you are able to send and receive data from that
    channel. If you want to connect to a channel and do not want to transmit any voice
    audio, see the following section on muting the microphone.


    To begin using a voice channel, you need to call the `start` method on the `GKVoiceChat`
    object that was created in the previous section.


    `[allChannel start];`


    `[teamChannel start];`


    When you want to leave a channel, you simply call the `stop` method. This is a
    better approach than simply muting all participants in the channel because the
    app will not be required to receive additional network data. A stopped channel
    can be restarted at any time.


    `[allChannel stop];`


    `[teamChannel stop];`


    Tip


    It is highly recommended that you provide both visual and audio indicators when
    you are transmitting voice data, such as a red light and a click sound. This reduces
    the chance that a user will accidentally transmit voice data when they don’t intend
    to. Always remember that a user’s microphone and transmitted voice should be treated
    as sensitive data.


    ### Chat Volume and Muting


    The voice chat volume is set by channel. Each channel has an associated property
    that can be used to lower the overall volume of that chat. You cannot raise the
    volume past what the user has selected as the device’s current volume. For example,
    if the user’s maximum audio is 70% and you set the volume to 100%, it will scale
    itself down to 70%. To modify a channel’s volume, add the following line of code:


    `allChannel.volume = 0.5; //half of max volume`


    In addition, you can mute individual players in a channel by referencing their
    playerID. Players can be muted and unmuted using the following two lines of code:


    `[teamChannel setMute:YES forPlayer: playerID];`


    `[teamChannel setMute:NO forPlayer:playerID];`


    There might also be circumstances in which you do not want to transmit the user’s
    voice at all times. By default, a user starts a chat in the muted state. You will
    need to unmute a user before they can begin to transmit voice data.


    `squadChannel.active = YES;`


    Important


    A user can only transmit voice on one channel at a time; if you unmute a channel,
    the API will automatically mute all other channels.


    This is all that is required in order to completely enable voice chat in your
    Game Center–based networking app. Everything else, including playback, sending,
    and receiving the data, is handled for you by the APIs.'
  trans: "\n# 语音聊天\n\n## 摘要\n\n伟大的发现与进步总是离不开众多智慧的协作。或许人们认为是我开辟了道路，但当我回顾后续的发展时，深感这份荣誉应归属于他人而非我自己。\n\
    \n> ——亚历山大·格拉汉姆·贝尔\n\n语音聊天作为 Game Kit 提供的服务之一，比其他任何功能都更能证明苹果公司的工程实力。苹果将其他平台上最复杂的功能之一，变成了\
    \ iOS 上最容易实现的功能。当你在其他平台上处理基于互联网协议的语音传输（VOIP）时，这常常是整个项目中最复杂、最令人头疼的任务。在本章中，我们将探讨如何为我们的\
    \ UFOs 游戏或任何 iOS 应用添加语音聊天服务。本章的篇幅之短，足以证明苹果公司为此技术付出了多少努力，使其甚至能被最资浅的开发者轻松掌握。\n\n\
    与前几章的策略不同，我们将分别处理 Game Kit 语音聊天和 Game Center 语音聊天，而不是像之前那样编写一个共享类。虽然这两种服务有许多相似之处，但它们的差异足以让我们分别进行处理。此外，在本章中，我们将在\
    \ UFOs 游戏中实现语音聊天时应用所学的主题。\n\n## Game Center 的语音聊天\n\n首先，我们来看看 Game Center 的语音聊天。使用\
    \ `GKMatch` 创建语音聊天会话有很多优势，例如易于使用、实现快速，并且相比使用 Game Kit 或必须实现自定义解决方案，开销更少。一个 `GKMatch`\
    \ 语音聊天可以拥有多个频道，每个频道都关联着一个接收者列表。例如，在第一人称射击游戏中，你可以为队友设置一个频道，为所有玩家设置另一个频道。这样你就可以讨论获胜战术，而不会将信息泄露给其他队伍。\n\
    \n> **注意：** 使用 `GKMatch` 的语音聊天仅适用于通过 Wi-Fi 连接互联网的参与者；语音聊天不支持蜂窝网络。\n\n### 创建音频会话\n\
    \n在开始处理语音聊天本身之前，你首先需要创建一个新的音频会话。在开始任何语音聊天服务之前，这一点非常重要。如果你在创建聊天会话之后才创建音频会话，你将无法发送或接收语音数据。在下面的示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为活动状态。\n\
    \n> **提示：** 你的应用可能已经使用音频会话来播放音效；如果你已经创建了一个音频会话，则无需创建新的会话。如果你要重用现有的音频会话，请确保将其设置为允许播放和录制功能。\n\
    \n```\nNSError *error = nil;\nAVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
    if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n\
    {\n    if(error)\n    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n\
    \    }\n}\nif(![audioSession setActive: YES error: &error])\n{\n    if(error)\n\
    \    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n \
    \   }\n}\n```\n\n### 创建新的语音频道\n\n你的应用中可以拥有任意数量的语音聊天频道，每个对等方可以根据自己的意愿注册成为任意数量频道的一部分。频道通过名称字符串进行创建和组织。这就是我们确定用户要加入哪些频道的方式。当两个或更多对等方加入具有相同名称的频道时，它们就会连接到同一个聊天室。\n\
    \n下面的代码片段展示了如何创建三个不同的频道。请注意，这些频道是使用当我们开始一个基于 Game Center 的网络游戏时返回给我们的 `GKMatch`\
    \ 对象创建的。\n\n```\nGKVoiceChat *allChannel = [[match voiceChatWithName:@\"allPlayers\"\
    ] retain];\nGKVoiceChat *teamChannel = [[match voiceChatWithName:@\"blueTeam\"\
    ] retain];\nGKVoiceChat *squadChannel = [[match voiceChatWithName:@\"BlueTeamSquad2\"\
    ] retain];\n```\n\n在这个示例中，我们有一个用于与所有玩家通信的频道，一个用于与整个队伍通信的频道，以及第三个用于与小队通信的频道。仅仅创建了频道并不意味着它们会自动开启。在下一节中，我们将探讨如何在特定频道上开始和停止通信。\n\
    \n### 启动和停止语音聊天\n\n在上一节中，我们创建了三个用于 Game Center 类型语音聊天的新语音频道。当你想在这些频道上传输和接收语音时，你首先需要告诉\
    \ API 你想开始使用该频道。在你连接到某个频道后，你就可以从该频道发送和接收数据。如果你想连接到一个频道但不想传输任何语音音频，请参阅关于麦克风静音的下一节。\n\
    \n要开始使用语音频道，你需要在上一节创建的 `GKVoiceChat` 对象上调用 `start` 方法。\n\n```\n[allChannel start];\n\
    [teamChannel start];\n```\n\n当你想离开一个频道时，只需调用 `stop` 方法。这比简单地将频道中所有参与者静音更好的原因是，应用将无需接收额外的网络数据。已停止的频道可以随时重新启动。\n\
    \n```\n[allChannel stop];\n[teamChannel stop];\n```\n\n> **提示：** 强烈建议在传输语音数据时提供视觉和音频指示，例如红灯和咔嗒声。这可以减少用户无意中传输语音数据的可能性。永远记住，用户的麦克风和传输的语音应被视为敏感数据。\n\
    \n### 聊天音量和静音\n\n语音聊天的音量是按频道设置的。每个频道都有一个相关的属性，可以用来降低该聊天的整体音量。你不能将音量提高到超过用户当前设备所选择的音量。例如，如果用户的最大音频为\
    \ 70%，而你将音量设置为 100%，系统会自动将其缩放为 70%。要修改频道的音量，请添加以下代码行：\n\n```\nallChannel.volume\
    \ = 0.5; //最大音量的一半\n```\n\n此外，你可以通过引用玩家的 `playerID` 来静音频道中的单个玩家。可以使用以下两行代码来静音和取消静音玩家：\n\
    \n```\n[teamChannel setMute:YES forPlayer: playerID];\n[teamChannel setMute:NO\
    \ forPlayer:playerID];\n```\n\n在某些情况下，你可能不想一直传输用户的语音。默认情况下，用户启动聊天时处于静音状态。你需要先取消用户静音，他们才能开始传输语音数据。\n\
    \n```\nsquadChannel.active = YES;\n```\n\n> **重要：** 一个用户一次只能在一个频道上传输语音；如果你取消静音一个频道，API\
    \ 将自动静音所有其他频道。\n\n这就是在你的基于 Game Center 的网络应用中完全启用语音聊天所需的全部内容。其他一切，包括播放、发送和接收数据，都由\
    \ API 为你处理。\n"
- fmt: "### Monitoring Player State\n\nI mentioned earlier in this chapter that it\
    \ is important to let the user know that they are currently transmitting data.\
    \ Letting the player see who is speaking is also an important step. By monitoring\
    \ player state changes, you can determine which users are currently transmitting\
    \ voice and highlight them in a player list or perform some other kind of indication\
    \ of which player is speaking. The following block is easy to set up when you\
    \ begin your chat, and it saves you from performing polling or delegate callbacks:\n\
    \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
    \ state)\n{\n        switch (state)\n                {\n                     \
    \   case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
    \ playerID];\n                                break;\n                       \
    \ case GKVoiceChatPlayerSilent:\n                                [self stopShowingSpeakingPlayer:\
    \ playerID];\n                                break;\n         }\n    };\n```\n\
    \n> **Note:** Player state updates are handled per channel. You will need to configure\
    \ one for each channel on which you wish to watch for changes.\n\n## Voice Chat\
    \ for Game Kit\n\nWhen working with Game Kit Voice Chat, we will focus on the\
    \ `GKVoiceChatService` object. The fundamentals of Game Kit Voice Chat are very\
    \ similar to Game Center Voice Chat. A good starting point for implementing this\
    \ system is after you are returned a `GKSession` object, when you connect to another\
    \ player using the Peer Picker system. It is important to note that `GKVoiceChatService`\
    \ is designed to send data to only one peer at a time. Although this isn’t a limitation\
    \ yet, as Game Kit only supports two peers, it is important to keep in mind should\
    \ the API ever be expanded.\n\n> **Note:** Don’t forget to check `[GKVoiceChatService\
    \ isVoIPAllowed]` to make sure you are able to support voice chat before you continue.\
    \ Some devices, such as the first-generation iPod touch, are unable to support\
    \ voice chat.\n\n### Creating an Audio Session\n\nAs with Game Center, we can\
    \ begin to work with Game Kit Voice Chat by first creating a new `AVAudioSession`.\
    \ It is important to make sure that you create the session prior to beginning\
    \ any voice chat service calls.\n\n```\n    NSError *error = nil;\n    AVAudioSession\
    \ *audioSession = [AVAudioSession sharedInstance];\n        if(![audioSession\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n        {\n\
    \            if(error)\n            {\n                NSLog(@\"An error occurred\
    \ while starting audio session: %@\", [error localizedDescription]);\n       \
    \     }\n        }\n        if(![audioSession setActive: YES error: &error])\n\
    \        {\n            if(error)\n            {\n                NSLog(@\"An\
    \ error occurred while starting audio session: %@\", [error localizedDescription]);\n\
    \            }\n        }\n```\n\n### Required Overhead\n\nUnlike the Game Center\
    \ approach, Game Kit requires a bit more overhead to get things up and running.\
    \ The first thing you need to do is implement a few required methods. The following\
    \ first method posted returns the `peerID` for the player that you wish to communicate\
    \ with. This value is easily retrieved from your current `GKSession` object:\n\
    \n```\n- (NSString *)participantID\n{\n    return session.peerID;\n}\n```\n\n\
    You also need to implement a method to send the voice data to the connected peer,\
    \ and another that will handle receiving the data; both of these methods are available\
    \ in the following code snippets. Together, these two methods will handle the\
    \ sending and receiving of voice data for your app.\n\n```\n- (void)voiceChatService:(GKVoiceChatService\
    \ *)voiceChatService sendData:(NSData *)data toParticipantID:(NSString *)participantID\n\
    {\n    NSError *error = nil;\n    if(![self.session sendData:data toPeers:[NSArray\
    \ arrayWithObject: participantID] withDataMode:GKSendDataReliable error:&error])\n\
    \    {\n        NSLog(@\"Unable to send data to peers: %@\", [error localizedDescription]);\n\
    \    }\n}\n\n- (void) receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:\n\
    \    (GKSession *)session context:(void *)context;\n    {\n        [[GKVoiceChatService\
    \ defaultVoiceChatService] receivedData:data\n        fromParticipantID:peer];\n\
    \   }\n```\n\n### Getting Things Running\n\nIn addition to the three new methods\
    \ that we implemented in the previous section, you will need to complete some\
    \ additional steps to get everything up and running. First, you need to initialize\
    \ a new instance of `GKVoiceChatClient`, which should be a custom subclass of\
    \ `GKVoiceChatClient` that you create. For more information on this step, see\
    \ the next section, “Putting It Together.”\n\n```\nGKVoiceChatClient *voiceChatClient\
    \ = [[GKVoiceChatClient alloc] initWithSession:\n session];\n[GKVoiceChatService\
    \ defaultVoiceChatService].client = voiceChatClient;\n```\n\nAfter you have created\
    \ a new instance of `GKVoiceChatClient`, you need to connect your peer to it.\
    \ The following code demonstrates how to accomplish this.\n\n```\n[[GKVoiceChatService\
    \ defaultVoiceChatService] startVoiceChatWithParticipantID:\n [self  participantID]\
    \ error: &error];\n```\n\nTo end the voice chat session, you need to call a similar\
    \ method, as follows.\n\n```\n[[GKVoiceChatService defaultVoiceChatService] stopVoiceChatWithParticipantID:\n\
    \ [self  participantID]];\n```\n\nAfter you have established a connection to the\
    \ other peer, you will begin to receive voice chat data. If you want to send data,\
    \ all you need to do is unmute the microphone using the following code snippet:\n\
    \n```\n[GKVoiceChatService defaultVoiceChatService].microphoneMuted = NO;\n```\n\
    \nThese are all the steps that are required to get Game Kit Voice Chat up and\
    \ running. Although it is slightly more work than with Game Center Voice Chat,\
    \ it is still significantly easier than implementing your own VOIP system."
