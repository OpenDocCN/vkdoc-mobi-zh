    ], [UIImage imageNamed: @\"Cow3Reversed.png\"], nil];\n            [tempCow setAnimationImages:flippedCowImageArray];\n\
    \        } else {\n            NSArray *cowImageArray = [NSArray arrayWithObjects:\
