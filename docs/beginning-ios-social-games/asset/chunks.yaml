- fmt: "## Matching Programmatically\n\nIt is also possible for your app to find matches\
    \ programmatically, without using the matchmaker interface. You could use this\
    \ methodology to implement your own custom GUI for matchmaking or create an “instant\
    \ match” type action, in which users are automatically paired and a game begins\
    \ with no additional user interaction. We will not be using this style of matchmaking\
    \ in our demo app, but the following method will allow you to implement a match\
    \ programmatically:\n\n```\n- (void)findProgrammaticMatch\n{\n    GKMatchRequest\
    \ *request = [[GKMatchRequest alloc] init];\n    request.minPlayers = 2;\n   \
    \ request.maxPlayers = 4;\n    [[GKMatchmaker sharedMatchmaker] findMatchForRequest:request\
    \ withCompletionHandler:^(GKMatch *match, NSError *error) {\n        if (error)\
    \ {\n            NSLog(@\"An error occurrred during finding a match: %@\", [error\
    \ localizedDescription]);\n        } else if (match != nil) {\n            NSLog(@\"\
    A match has been found: %@\", match);\n        }\n    }];\n    [request release];\n\
    }\n```\n\nThe preceding code is fairly straightforward. We create a new `GKMatchRequest`\
    \ and set the minimum players to two and the maximum players to four. We then\
    \ call a new method, `findMatchesForRequest`. This will call our block when a\
    \ match is found, so it might be a good idea to provide an activity indicator\
    \ if a match isn’t returned quickly. After you have a `GKMatch`, you can begin\
    \ a new multiplayer game, as discussed in the following chapters.\n\nWhen working\
    \ with programmatically added matches, it is important to allow users a way to\
    \ cancel the match request if it is taking too long or if they have changed their\
    \ minds. That action can be accomplished with the following line of code:\n\n\
    ```\n[[GKMatchmaker sharedMatchmaker] cancel];\n```\n\n## Adding a Player to a\
    \ Match\n\nThere might be occasions in which you will want to add a new player\
    \ to a match after it has already been created. For example, maybe you have a\
    \ player drop out of a game and want to replace him without starting the game\
    \ over, or a player fails to connect after a game starts and you want to substitute\
    \ in a replacement. The following method will automatically add a new player to\
    \ the match using the auto-matching behavior:\n\n```\n- (void)addPlayerToMatch:(GKMatch\
    \ *)match withRequest:(GKMatchRequest *)request\n{\n    [[GKMatchmaker sharedMatchmaker]\
    \ addPlayersToMatch:match matchRequest:request completionHandler:^(NSError *error)\
    \ {\n        if (error) {\n            NSLog(@\"An error occurrred during adding\
    \ a player to match: %@\", [error localizedDescription]);\n        } else if (match\
    \ != nil) {\n            NSLog(@\"A player has been added to the match\");\n \
    \       }\n    }];\n}\n```\n\nAfter a player has been added to a match, you will\
    \ need to sync that player up with the current match. Adding a player will now\
    \ allow the player to receive and send data, but they will not have any access\
    \ to data that has already been sent through the match.\n\n## Reinviting Players\n\
    \nWith the release of iOS 5.0, Apple added the ability to automatically try to\
    \ reinivite a disconnected player. This method is only supported in two-person\
    \ Game Center matches. The following method is called when a player is disconnected;\
    \ Game Center will automatically try to reconnect to that player. If successful,\
    \ you will receive an additional call to `match:player:didChangeState:`.\n\n```\n\
    -(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString *)playerID\n{\n \
    \   return YES;\n}\n```\n\n## Player Groups\n\nPlayer groups allow you to specify\
    \ different classifications for each player. Game Center, by default, auto-matches\
    \ everyone into the same group. With player groups, you can specify that certain\
    \ players are looking for groups that contain only other players of that group.\n\
    \nFor example, players who want to play at a certain level of a dungeon or a specific\
    \ racetrack will be grouped together so they are paired up with other people who\
    \ want to play at that same level. Player groups can be used to segregate players\
    \ into many different types of groupings, such as these:\n\n* Players who wish\
    \ to play the same level of a map (such as a racecourse), area in an RPG, map\
    \ in a first-person shooter, or level in an action game.\n* Separate players based\
    \ on skill level. Either have players choose the skill level that they wish to\
    \ play at, or automatically determine their skill level based on past performance.\n\
    * Type of game that is being played. For example, players can be broken down into\
    \ who wants to play Capture the Flag, Team Deathmatch, Domination, or Last Man\
    \ Standing.\n* Players of the same clan, guild, team, or network who want to play\
    \ together.\n* Players who have purchased additional in-app content and can no\
    \ longer be paired up with those who have not.\n\nA player group isn’t restricted\
    \ to these items and can be used to group players together in whatever fashion\
    \ meets the needs of your app. A player group is represented by the `playerGroup`\
    \ property on a `GKMatchRequest`. The only restriction placed on this property\
    \ is that an `NSUInteger` must be used to represent it. Specifying a `playerGroup`\
    \ is rather straightforward, as you can see in the following example.\n\n```\n\
    #define kMyForestMap 123456789\n\nGKMatchRequest *request = [[GKMatchRequest alloc]\
    \ init];\nrequest.minPlayers = 2;\nrequest.maxPlayers = 4;\nrequest.playerGroup\
    \ = kMyForestMap;\n```\n\nUnder most circumstances, you will want to let your\
    \ users select the `playerGroup` that they belong to; however, there might be\
    \ instances in which this is not true, such as automatically determining a player’s\
    \ skill level.\n\n> **Caution:** After you set `playerGroup` to any nonzero value,\
    \ players will be matched only with other players of that group.\n\n## Player\
    \ Attributes\n\nSimilar to player groups, player attributes are used during matchmaking\
    \ to narrow down the possible available games to the user. Player attributes,\
    \ which generally function in the same way as player groups, do handle some things\
    \ differently. Some of the many uses for player attributes include the following:\n\
    \n* Often, in role-playing games, characters pick a class. It is common to require\
    \ a group of multiple classes—such as a healer, a fighter, and a mage—in order\
    \ to complete a quest.\n* Sports games often have various positions on a team,\
    \ such as goalkeeper, fullback, midfielder, and forward. A team will require a\
    \ mix of all of these to be able to play.\n* In a submarine simulator game, you\
    \ could also have various players, such as a captain, sonar operator, pilot, and\
    \ weapons systems.\n* In a first-person shooter game, you could need players in\
    \ roles such as close-quarter combat specialist, sniper, medic, and platoon leader."
  raw: '## Matching Programmatically


    It is also possible for your app to find matches programmatically, without using
    the matchmaker interface. You could use this methodology to implement your own
    custom GUI for matchmaking or create an “instant match” type action, in which
    users are automatically paired and a game begins with no additional user interaction.
    We will not be using this style of matchmaking in our demo app, but the following
    method will allow you to implement a match programmatically:


    `- (void)findProgrammaticMatch`


    `{`


            `GKMatchRequest *request = [[GKMatchRequest alloc] init];`


            `request.minPlayers = 2;`


            `request.maxPlayers = 4;`


            `[[GKMatchmaker sharedMatchmaker] findMatchForRequest:request withCompletionHandler:^(GKMatch
    *match, NSError *error) {`


                    `if (error) {`


                            `NSLog(@"An error occurrred during finding a match: %@",
    [error localizedDescription]);`


                    `} else if (match != nil) {`


                            `NSLog(@"A match has been found: %@", match);`


                    `}`


            `}];`


            `[request release];`


    `}`


    The preceding code is fairly straightforward. We create a new `GKMatchRequest`
    and set the minimum players to two and the maximum players to four. We then call
    a new method, `findMatchesForRequest`. This will call our block when a match is
    found, so it might be a good idea to provide an activity indicator if a match
    isn’t returned quickly. After you have a `GKMatch`, you can begin a new multiplayer
    game, as discussed in the following chapters.


    When working with programmatically added matches, it is important to allow users
    a way to cancel the match request if it is taking too long or if they have changed
    their minds. That action can be accomplished with the following line of code:


    `[[GKMatchmaker sharedMatchmaker] cancel];`


    ## Adding a Player to a Match


    There might be occasions in which you will want to add a new player to a match
    after it has already been created. For example, maybe you have a player drop out
    of a game and want to replace him without starting the game over, or a player
    fails to connect after a game starts and you want to substitute in a replacement.
    The following method will automatically add a new player to the match using the
    auto-matching behavior:


    `- (void)addPlayerToMatch:(GKMatch *)match withRequest:(GKMatchRequest *)request`


    `{`


            `[[GKMatchmaker sharedMatchmaker] addPlayersToMatch:match matchRequest:request
    completionHandler:^(NSError *error) {`


                    `if (error) {`


                            `NSLog(@"An error occurrred during adding a player to
    match: %@", [error localizedDescription]);`


                    `} else if (match != nil) {`


                            `NSLog(@"A player has been added to the match");`


                    `}`


            `}];`


    `}`


    After a player has been added to a match, you will need to sync that player up
    with the current match. Adding a player will now allow the player to receive and
    send data, but they will not have any access to data that has already been sent
    through the match.


    ## Reinviting Players


    With the release of iOS 5.0, Apple added the ability to automatically try to reinivite
    a disconnected player. This method is only supported in two-person Game Center
    matches. The following method is called when a player is disconnected; Game Center
    will automatically try to reconnect to that player. If successful, you will receive
    an additional call to `match:player:didChangeState:`.


    `-(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString *)playerID`


    `{`


         `return YES;`


    `}`


    ## Player Groups


    Player groups allow you to specify different classifications for each player.
    Game Center, by default, auto-matches everyone into the same group. With player
    groups, you can specify that certain players are looking for groups that contain
    only other players of that group.


    For example, players who want to play at a certain level of a dungeon or a specific
    racetrack will be grouped together so they are paired up with other people who
    want to play at that same level. Player groups can be used to segregate players
    into many different types of groupings, such as these:


    *   Players who wish to play the same level of a map (such as a racecourse), area
    in an RPG, map in a first-person shooter, or level in an action game.

    *   Separate players based on skill level. Either have players choose the skill
    level that they wish to play at, or automatically determine their skill level
    based on past performance.

    *   Type of game that is being played. For example, players can be broken down
    into who wants to play Capture the Flag, Team Deathmatch, Domination, or Last
    Man Standing.

    *   Players of the same clan, guild, team, or network who want to play together.

    *   Players who have purchased additional in-app content and can no longer be
    paired up with those who have not.


    A player group isn’t restricted to these items and can be used to group players
    together in whatever fashion meets the needs of your app. A player group is represented
    by the `playerGroup` property on a `GKMatchRequest`. The only restriction placed
    on this property is that an `NSUInteger` must be used to represent it. Specifying
    a `playerGroup` is rather straightforward, as you can see in the following example.


    `#define kMyForestMap 123456789`


    `GKMatchRequest *request = [[GKMatchRequest alloc] init];`


    `request.minPlayers = 2;`


    `request.maxPlayers = 4;`


    `request.playerGroup = kMyForestMap;`


    Under most circumstances, you will want to let your users select the `playerGroup`
    that they belong to; however, there might be instances in which this is not true,
    such as automatically determining a player’s skill level.


    Caution


    After you set `playerGroup` to any nonzero value, players will be matched only
    with other players of that group.


    ## Player Attributes


    Similar to player groups, player attributes are used during matchmaking to narrow
    down the possible available games to the user. Player attributes, which generally
    function in the same way as player groups, do handle some things differently.
    Some of the many uses for player attributes include the following:


    *   Often, in role-playing games, characters pick a class. It is common to require
    a group of multiple classes—such as a healer, a fighter, and a mage—in order to
    complete a quest.

    *   Sports games often have various positions on a team, such as goalkeeper, fullback,
    midfielder, and forward. A team will require a mix of all of these to be able
    to play.

    *   In a submarine simulator game, you could also have various players, such as
    a captain, sonar operator, pilot, and weapons systems.

    *   In a first-person shooter game, you could need players in roles such as close-quarter
    combat specialist, sniper, medic, and platoon leader.'
  trans: "\n## 以编程方式进行匹配\n\n你的应用也可以在不使用匹配界面接口的情况下，以编程方式查找匹配。你可以使用这种方法来实现自己的自定义匹配 GUI，或创建一种“立即匹配”类型的操作，在这种操作中，用户会被自动配对，然后在无需额外用户交互的情况下开始游戏。在我们的演示应用中不会使用这种匹配风格，但下面的方法将允许你以编程方式实现匹配：\n\
    \n```\n- (void)findProgrammaticMatch\n{\n    GKMatchRequest *request = [[GKMatchRequest\
    \ alloc] init];\n    request.minPlayers = 2;\n    request.maxPlayers = 4;\n  \
    \  [[GKMatchmaker sharedMatchmaker] findMatchForRequest:request withCompletionHandler:^(GKMatch\
    \ *match, NSError *error) {\n        if (error) {\n            NSLog(@\"在寻找匹配时发生错误:\
    \ %@\", [error localizedDescription]);\n        } else if (match != nil) {\n \
    \           NSLog(@\"已找到匹配: %@\", match);\n        }\n    }];\n    [request release];\n\
    }\n```\n\n上述代码相当直接明了。我们创建了一个新的 `GKMatchRequest`，并将最小玩家数设为 2，最大玩家数设为 4。然后我们调用了一个新方法\
    \ `findMatchesForRequest`。当找到匹配时，该方法会调用我们的代码块，因此如果匹配没有快速返回，提供一个活动指示器可能是个好主意。在你获得一个\
    \ `GKMatch` 之后，就可以开始一场新的多人游戏，正如后续章节所述。\n\n在使用以编程方式添加的匹配时，如果匹配耗时过长或用户改变了主意，允许用户取消匹配请求是很重要的。该操作可以通过以下代码行完成：\n\
    \n```\n[[GKMatchmaker sharedMatchmaker] cancel];\n```\n\n## 向匹配中添加玩家\n\n有时你可能希望在匹配创建后向其中添加新玩家。例如，也许有玩家退出游戏，而你希望在不重新开始游戏的情况下替换他；或者某个玩家在游戏开始后无法连接，你想用替补替代他。以下方法将使用自动匹配行为自动向匹配中添加新玩家：\n\
    \n```\n- (void)addPlayerToMatch:(GKMatch *)match withRequest:(GKMatchRequest *)request\n\
    {\n    [[GKMatchmaker sharedMatchmaker] addPlayersToMatch:match matchRequest:request\
    \ completionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
    在向匹配添加玩家时发生错误: %@\", [error localizedDescription]);\n        } else if (match\
    \ != nil) {\n            NSLog(@\"已向匹配添加了一名玩家\");\n        }\n    }];\n}\n```\n\
    \n在玩家被添加到匹配后，你需要将该玩家与当前匹配同步。添加玩家会使该玩家能够接收和发送数据，但他们无法访问任何已经通过匹配发送过的数据。\n\n## 重新邀请玩家\n\
    \n随着 iOS 5.0 的发布，Apple 增加了自动尝试重新邀请断开连接玩家的功能。此方法仅在两人 Game Center 匹配中受支持。当玩家断开连接时，会调用以下方法；Game\
    \ Center 将自动尝试重新连接该玩家。如果成功，你将收到对 `match:player:didChangeState:` 的额外调用。\n\n```\n\
    -(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString *)playerID\n{\n \
    \   return YES;\n}\n```\n\n## 玩家分组\n\n玩家分组允许你为每个玩家指定不同的分类。默认情况下，Game Center 会将所有人自动匹配到同一个组中。通过玩家分组，你可以指定某些玩家正在寻找只包含该组其他玩家的游戏组。\n\
    \n例如，想要在某个地下城特定层级或特定赛道上游戏的玩家将被分组在一起，以便他们与其他想要在同一层级游玩的玩家配对。玩家分组可用于将玩家划分到多种不同类型的分组中，例如：\n\
    \n*   想要玩同一地图层级（例如赛道）、RPG 中的同一区域、第一人称射击游戏中的同一地图或动作游戏中同一关卡的玩家。\n*   根据技能水平区分玩家。要么让玩家选择他们希望游玩的技能水平，要么根据过往表现自动确定他们的技能水平。\n\
    *   正在进行的游戏类型。例如，玩家可以分为想玩夺旗、团队死斗、占领或单人求生模式的群体。\n*   希望一起游戏的同一部落、公会、团队或网络中的玩家。\n\
    *   已购买额外应用内内容，不能再与未购买者配对的玩家。\n\n玩家分组并不局限于这些项目，可以根据应用的需求以任何方式将玩家分组。玩家分组通过 `GKMatchRequest`\
    \ 上的 `playerGroup` 属性表示。此属性的唯一限制是必须使用 `NSUInteger` 来表示。指定 `playerGroup` 相当直接，如下例所示。\n\
    \n```\n#define kMyForestMap 123456789\n\nGKMatchRequest *request = [[GKMatchRequest\
    \ alloc] init];\nrequest.minPlayers = 2;\nrequest.maxPlayers = 4;\nrequest.playerGroup\
    \ = kMyForestMap;\n```\n\n在大多数情况下，你会希望让用户选择他们所属的 `playerGroup`；然而，也可能存在并非如此的情况，例如自动确定玩家的技能水平。\n\
    \n> **警告：** 在将 `playerGroup` 设置为任何非零值后，玩家将只与同组的其他玩家进行匹配。\n\n## 玩家属性\n\n与玩家分组类似，玩家属性在匹配过程中用于缩小用户可能遇到的可用游戏范围。玩家属性通常与玩家分组功能相似，但在某些方面处理方式不同。玩家属性的众多用途包括以下内容：\n\
    \n*   在角色扮演游戏中，角色通常会选择职业。通常需要多种职业的组合——比如治疗者、战士和法师——才能完成一个任务。\n*   体育游戏中，团队通常有各种位置，如守门员、后卫、中场和前锋。一个团队需要所有这些位置的组合才能进行比赛。\n\
    *   在潜艇模拟游戏中，你也可以有不同的玩家角色，如船长、声呐操作员、领航员和武器系统操作员。\n*   在第一人称射击游戏中，你需要玩家扮演诸如近距离格斗专家、狙击手、医护兵和排长等角色。\n"
- fmt: '### Understanding Player Attribute Limitations


    `Player` attributes can be used to assign these values to each player so that
    you can balance a team that contains the required players. However, as of iOS
    7.0, there are a number of limitations when using `Player` attributes; it is important
    that you understand them before you begin working with `Player` attributes.


    - Only a single player may fill a role. For example, you cannot require three
    midfielders in a soccer game.

    - All roles must be filled before the game is considered ready to start. For example,
    you can’t have a first-person shooter without a sniper (based on the preceding
    example).

    - Each player can fill only one role at a time; players cannot offer to join a
    game in a position that would fill more than one role. For example, you couldn’t
    have a player in a first-person shooter willing to play either a sniper or a medic;
    they will need to pick one before the match request is finalized.

    - `Player` attributes are used during auto-matching. If you invite a friend into
    a game, they are not tested to see whether they match the role that needs to be
    filled. Instead, they will automatically be assigned a random role. In short,
    friends do not get to pick their `Player` attributes.

    - Roles are not displayed anywhere in the standard matchmaking graphical user
    interface. You will need to implement your own system prior to entering this view
    to allow users to select their roles.

    - The `GKMatch` object does not contain information about which players have been
    assigned which roles. You will need to implement your own system after the match
    is connected to determine who is playing which role.

    - There is no system in place to determine which roles are overfilled or which
    are harder to find matches for. For example, everyone might want to play a mage
    in a role-playing game and no one might want to be a healer; therefore, it would
    be much harder for a mage to find an open game, while a healer can easily find
    one.


    ### Working with Player Attributes


    Don’t let the long list of limitations scare you off from `Player` attributes.
    Even with the listed limitations, they can be extremely valuable in creating a
    better multiplayer experience. Let’s look at an example of how to build a match
    using `Player` attributes.


    ```

    #define class_SquadLeader            0xFF000000

    #define class_Breacher               0x00FF0000

    #define class_Grenadier              0x0000FF00

    #define class_LightMachineGun        0x000000FF

    ```


    We begin by defining a mask for each of our `Player` attributes, which we will
    refer to as “classes” for the rest of this section. This example represents a
    standard squad in a modern military-style game. Each class is assigned a different
    value of a mask. Game Center uses an algorithm to match these players together,
    using the following rules:


    - A match’s mask will always begin with the mask of the inviting player.

    - Game Center will ignore all players who have not set a `Player` attribute mask
    if the inviting player has set a `Player` attribute mask.

    - A player will be added to a match only if their `Player` attribute mask doesn’t
    overlap any section of a mask from any players already invited into the match.

    - After a player is added to the match, that player’s attributes value is logically
    ORed into the match’s mask.

    - If a match’s mask value is equal to `FFFFFFFF`, then the match is considered
    complete and can begin; if the mask does not equal `FFFFFFFF`, then Game Center
    will continue searching for a player who can fill the match.

    - There is no way to query Game Center to see which player is still currently
    being waited for.


    The following is based on the classes we just defined.


    A blank match will have the `Player` attribute mask shown in Figure 5-7.


    ![A978-1-4302-4906-1_5_Fig7_HTML.jpg](A978-1-4302-4906-1_5_Fig7_HTML.jpg)


    Figure 5-7. An empty player attribute mask (`0x00000000`)


    Player 1 begins a new match and selects Squad Leader as his class. When that player
    creates the match, it will now have a `Player` attribute mask that looks like
    the one shown in Figure 5-8.


    ![A978-1-4302-4906-1_5_Fig8_HTML.jpg](A978-1-4302-4906-1_5_Fig8_HTML.jpg)


    Figure 5-8. A player attribute mask representing the Squad Leader class (`0xFF000000`)


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask that looks like Figure 5-9.


    ![A978-1-4302-4906-1_5_Fig9_HTML.jpg](A978-1-4302-4906-1_5_Fig9_HTML.jpg)


    Figure 5-9. A player attribute mask representing the Grenadier class (`0x0000FF00`)


    When we compare this to the already existing match’s mask, as shown in Figure
    5-10, we can see there are no overlaps, so that player can be invited into the
    game.


    ![A978-1-4302-4906-1_5_Fig10_HTML.jpg](A978-1-4302-4906-1_5_Fig10_HTML.jpg)


    Figure 5-10. Comparison of `0xFF000000` and `0x0000FF00`


    When these masks are combined to form the new match mask, it will look like Figure
    5-11.


    ![A978-1-4302-4906-1_5_Fig11_HTML.jpg](A978-1-4302-4906-1_5_Fig11_HTML.jpg)


    Figure 5-11. A new match mask, representing two players (`0xFF00FF00`)


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match’s mask to the Breacher’s mask, as shown in Figure
    5-12.


    ![A978-1-4302-4906-1_5_Fig12_HTML.jpg](A978-1-4302-4906-1_5_Fig12_HTML.jpg)


    Figure 5-12. The top is the current match’s mask (`0xFF00FF00`), and the bottom
    is a Breacher’s mask (`0x00FF0000`)'
