            `{`


                  `achievement = [[[GKAchievement alloc] initWithIdentifier:identifier]
    autorelease];`


                  `[[self earnedAchievementCache] setObject:achievement forKey:[achievement`↲


               `identifier]];`


           `}`


           `return achievement;`


    `}`


    ### Providing Feedback on Completing an Achievement


    It is important to let users know when they have completed an achievement. However,
    you don’t want to just present a `UIAlertView`, as that would be very distracting,
    considering that most achievements are going to be completed in the middle of
    an action, such as completing 20 laps in a racing game. You wouldn’t want to take
    the user away from any interaction, so we need a better system. I have always
    been a fan of the small view that slides in from the bottom or top to inform the
    user of the accomplishment—very similar to the way you get feedback logging in
    to Game Center. Since iOS 5, Apple has provided a built in achievement banner;
    see the section “Achievement Completion Banners” later in this chapter for its
    use.


