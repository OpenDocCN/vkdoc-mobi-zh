    ![A978-1-4302-4906-1_12_Fig5_HTML.jpg](A978-1-4302-4906-1_12_Fig5_HTML.jpg)


    Figure 12-5.


    Being prompted to allow access to the device’s Twitter accounts


    The value of the `granted` variable will reflect the user’s decision about granting
    the app access to their Twitter information. This permission gives the app full
    access to post as well as read information from the account such as friends and
    timeline history.


    The user may have multiple Twitter accounts set up on a device and it is important
    to be able to determine which account the user wishes to post from. An array of
    the user’s accounts can be obtained with a `ccountsWithAccountType:`, for the
    purposes of the sample app, the last account in the array will be used by default:


    `NSArray *accounts = [account accountsWithAccountType:accountType];`


    Depending on whether the tweet has an attached image, there are two different
    endpoints that will need to be used. If a tweet is posted to the incorrect endpoint
    it will silently fail. For tweets containing image data, the endpoint is [`https://upload.twitter.com/1/statuses/update_with_media.json`](https://upload.twitter.com/1/statuses/update_with_media.json)
    , while tweets without image data should be posted to [`http://api.twitter.com/1/statuses/update.json`](http://api.twitter.com/1/statuses/update.json)
    . The following example demonstrates selecting and storing the proper endpoint:


    `NSURL *requestURL = nil;`


    `if (hasAttachment) {`


    `requestURL = [NSURL`


    `URLWithString:@"` [`https://upload.twitter.com/1/statuses/update_with_media.json`](https://upload.twitter.com/1/statuses/update_with_media.json)
    `"];`


    `} else {`


    `requestURL = [NSURL URLWithString:@"` [`http://api.twitter.com/1/statuses/update.json`](http://api.twitter.com/1/statuses/update.json)
    `"];`


    `}`


    Once the proper endpoint has been established, a new `SLRequest` is created. An
    `SLRequest` object will do all of the legwork when working both with Social Framework
    and with the account-based approach. It provides a wrapper for communicating with
    supported third-party APIs. The service type is set to `SLServiceTypeTwitter`
    and a post method is selected. The previously determined URL is set, and finally
    the additional parameters are set to nil:


    `SLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter
    requestMethod:SLRequestMethodPOST URL:requestURL parameters:nil];`


    Before the `SLRequest` can be submitted to Twitter’s servers, it must first have
    its metadata configured to provide information on the tweet text and any possible
    attachments. The specifications for the formatting of the tweet are taken from
    official Twitter API documentation. For specifics on API interaction, see [`https://dev.twitter.com/docs/api`](https://dev.twitter.com/docs/api)
    . The text of the tweet is encoded into `NSData` and submitted with the identifying
    name `"status"` of type `"multipart/form-data"`.


    `NSString *text = [NSString stringWithFormat: @"I just abducted %0.0f cow(s) in
    UFOs for iPhone!", score];`


    `NSData *textData = [text dataUsingEncoding:NSUTF8StringEncoding];`


    `[postRequest addMultipartData:textData withName:@"status" type:@"multipart/form-data"
    filename:nil];`


    If you want to provide an image attachment to the tweet, you may do so using the
    following approach. This will submit the image to Twitpic as part of the upload
    process:


    `NSData *imageData = UIImageJPEGRepresentation([UIImage imageNamed:@"Saucer1.png"],
    1.0);`


    `[postRequest addMultipartData:imageData withName:@"media" type:@"image/jpg" filename:@"Image.jpg"];`


    Before the tweet can be submitted, the `SLRequest` needs to be informed which
    account the tweet will be sent to, because `SLRequest` supports posting to only
    one account at a time. This approach will also provide the user with a chance
    to see and modify the tweet before it is posted. We provide this information by
    setting the `account` property on the `SLRequest` to the Twitter account that
    was retrieved from the array retrieved earlier in this section:


    `postRequest.account = twitterAccount;`


    Once the account and metadata have been supplied, the tweet can be posted. The
    method `performRequestWithHandler` is called on the `postRequest`, and a block
    is provided for callbacks. In the event that the post was successfully submitted,
    the returning status code will be 200\. Other error codes indicate an error; W3C
    (World Wide Web Consortium) maintains a standardized list of error codes and their
    meanings at [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)
    . Since the results are returned on a block, a convenience method is used to post
    the results to the user (Figure [12-6](#A978-1-4302-4906-1_12_Chapter.html#Fig6)).
    Unlike the Composer, this method plays no sound for the user on success, nor is
    there any other indication that a tweet has been successfully posted.


    `[postRequest performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse
    *urlResponse, NSError *error) {`


    `if (error != nil) {`


    `[self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:[NSString
    stringWithFormat: @"An error occurred: %@", [error localizedDescription]] waitUntilDone:NO];`


    `}`


    `if ([urlResponse statusCode] == 200) {`


    `[self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:@"Tweet
    was successfully posted" waitUntilDone:NO];`


    `}`


    `}];`


    ![A978-1-4302-4906-1_12_Fig6_HTML.jpg](A978-1-4302-4906-1_12_Fig6_HTML.jpg)


    Figure 12-6.


    Informing the user that a custom tweet has been posted successfully'
  trans: "\n# 自定义推文\n\n在许多情况下，可能需要通过自定义用户界面或完全无需用户界面来发布推文。iOS 将此功能作为账户框架的一部分提供。虽然基于账户的\
    \ Twitter 发布方法稍微复杂一些，并且需要用户明确授予应用程序权限，但它比前面讨论的推文编辑器提供了更多的自定义性和灵活性。\n\n**注意：**\
    \ 在处理自定义推文时，请确保包含 `Accounts.framework` 并导入 `accounts/Accounts.h`。\n\n与使用推文编辑器不同，在处理账户时，首先需要做的是创建一个推文来源账户的引用。这是通过创建一个新的\
    \ `ACAccountStore` 和一个新的 `ACAccountype` 来实现的，如下面的代码片段所示：\n\n```\nACAccountStore\
    \ *account = [[[ACAccountStore alloc] init] autorelease];\nACAccountType *accountType\
    \ = [account accountTypeWithAccountTypeIdentifier: ACAccountTypeIdentifierTwitter];\n\
    ```\n\n一旦指定了账户类型，用户需要授予应用程序与该账户交互的权限。在新创建的 `ACAccountStore` 上调用 `requestAccessToAccountsWithType:`\
    \ 即可实现此功能：\n\n```\naccount requestAccessToAccountsWithType:accountType options:nil\
    \ completion:^(BOOL granted, NSError *error)\n```\n\n系统将提示用户允许应用程序访问，如图 12-5 所示。\n\
    \n![A978-1-4302-4906-1_12_Fig5_HTML.jpg\n\n**图 12-5.** 被提示允许访问设备上的 Twitter 账户\n\
    \n`granted` 变量的值将反映用户是否同意允许应用程序访问他们的 Twitter 信息。此权限使应用程序能够完全访问账户，包括发布推文以及读取好友和时间线历史等信息。\n\
    \n用户可能在设备上设置了多个 Twitter 账户，因此能够确定用户想从哪个账户发布推文非常重要。可以使用 `accountsWithAccountType:`\
    \ 获取用户账户的数组，对于示例应用程序，默认将使用数组中的最后一个账户：\n\n```\nNSArray *accounts = [account accountsWithAccountType:accountType];\n\
    ```\n\n根据推文是否包含附加图片，需要使用两个不同的端点。如果推文被发布到错误的端点，会静默失败。对于包含图片数据的推文，端点是 `https://upload.twitter.com/1/statuses/update_with_media.json`；而不包含图片数据的推文应发布到\
    \ `http://api.twitter.com/1/statuses/update.json`。以下示例演示了如何选择并存储正确的端点：\n\n```\n\
    NSURL *requestURL = nil;\nif (hasAttachment) {\n    requestURL = [NSURL URLWithString:@\"\
    https://upload.twitter.com/1/statuses/update_with_media.json\"];\n} else {\n \
    \   requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
    ];\n}\n```\n\n一旦确定了正确的端点，就创建一个新的 `SLRequest`。`SLRequest` 对象在处理社交框架和基于账户的方法时，会完成所有繁重的工作。它为与受支持的第三方\
    \ API 通信提供了一个封装器。服务类型设置为 `SLServiceTypeTwitter`，并选择 POST 方法。设置之前确定的 URL，最后将其他参数设置为\
    \ nil：\n\n```\nSLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\
    \ requestMethod:SLRequestMethodPOST URL:requestURL parameters:nil];\n```\n\n在将\
    \ `SLRequest` 提交到 Twitter 服务器之前，必须首先配置其元数据，以提供推文文本和任何可能附件的信息。推文格式的规范来自官方 Twitter\
    \ API 文档。关于 API 交互的具体细节，请参阅 `https://dev.twitter.com/docs/api`。推文文本被编码为 `NSData`，并使用标识名称\
    \ `\"status\"` 和类型 `\"multipart/form-data\"` 进行提交。\n\n```\nNSString *text = [NSString\
    \ stringWithFormat: @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\", score];\n\
    NSData *textData = [text dataUsingEncoding:NSUTF8StringEncoding];\n[postRequest\
    \ addMultipartData:textData withName:@\"status\" type:@\"multipart/form-data\"\
    \ filename:nil];\n```\n\n如果你想为推文提供图片附件，可以使用以下方法。这将在上传过程中将图片提交到 Twitpic：\n\n```\n\
    NSData *imageData = UIImageJPEGRepresentation([UIImage imageNamed:@\"Saucer1.png\"\
    ], 1.0);\n[postRequest addMultipartData:imageData withName:@\"media\" type:@\"\
    image/jpg\" filename:@\"Image.jpg\"];\n```\n\n在提交推文之前，需要告知 `SLRequest` 该推文将发送到哪个账户，因为\
    \ `SLRequest` 一次只支持发布到一个账户。这种方法还可以让用户在发布前有机会查看和修改推文。我们通过将 `SLRequest` 的 `account`\
    \ 属性设置为之前从数组中检索到的 Twitter 账户来提供此信息：\n\n```\npostRequest.account = twitterAccount;\n\
    ```\n\n一旦提供了账户和元数据，就可以发布推文了。在 `postRequest` 上调用 `performRequestWithHandler` 方法，并提供一个用于回调的\
    \ block。如果帖子成功提交，返回的状态码将是 200。其他错误代码表示出错；W3C（万维网联盟）维护了一个标准化的错误代码及其含义列表，网址为 `http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`。由于结果是通过\
    \ block 返回的，因此使用一个便捷方法将结果发布给用户（图 12-6）。与编辑器不同，此方法在成功时不会为用户播放声音，也没有任何其他指示表明推文已成功发布。\n\
    \n```\n[postRequest performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\
    \ *urlResponse, NSError *error) {\n    if (error != nil) {\n        [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
    \ withObject:[NSString stringWithFormat: @\"一个错误发生了：%@\", [error localizedDescription]]\
    \ waitUntilDone:NO];\n    }\n    if ([urlResponse statusCode] == 200) {\n    \
    \    [self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:@\"\
    推文已成功发布\" waitUntilDone:NO];\n    }\n}];\n```\n\n![A978-1-4302-4906-1_12_Fig6_HTML.jpg](img/A978-1-4302-4906-1_12_Fig6_HTML.jpg)\n\
    \n**图 12-6.** 通知用户自定义推文已成功发布\n"
- fmt: "# Going Further with Twitter\n\nWhile posting to Twitter covers most of the\
    \ functionality many games will need, there are times when your app may be required\
    \ to pull down the user’s friends list or access their timeline data. The `SLRequest`\
    \ method provides access to these more advanced features. In this section both\
    \ of these topics are briefly demonstrated.\n\nIn order to retrieve the user’s\
    \ last fifty posts, the following method can be implemented:\n\n```\nNSURL *requestURL\
    \ = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/home_timeline.json\"\
    ];\nNSDictionary *options = @{@\"count\" : @\"50\",@\"include_entities\" : @\"\
    1\"};\nSLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\
    \ requestMethod:SLRequestMethodGET URL:requestURL parameters:options];\npostRequest.account\
    \ = twitterAccount;\n```\n\nIn order to retrieve a list of the user’s friends,\
    \ this method may be used:\n\n```\nNSURL *requestURL = [NSURL URLWithString:@\"\
    https://api.twitter.com/1.1/friends/list.json\"];\nSLRequest *postRequest = [SLRequest\
    \ requestForServiceType:SLServiceTypeTwitter requestMethod:SLRequestMethodGET\
    \ URL:requestURL parameters:nil];\nrequest.account = self.twitterAccount;\n```\n\
    \nWorking with Twitter on the API level allows complete access to the Twitter\
    \ SDK. This direct access allows your app to interact with Twitter beyond just\
    \ the posting of tweets. For example, the app may pull in a list of all the user’s\
    \ friends or download the user’s avatar for use in your game.\n\nAn `SLRequest`\
    \ is limited only by the ever-evolving third-party APIs that it interacts with.\
    \ For more information on what can be done with `SLRequest` and Twitter, see the\
    \ official Twitter API documentation at [https://dev.twitter.com/docs/api](https://dev.twitter.com/docs/api).\n\
    \n# Summary\n\nIn this chapter you learned about Social Framework as well as Accounts\
    \ Framework and how they can both be leveraged to interact with the Twitter API.\
    \ Posting using the built-in Tweet Composer was covered, as well as posting using\
    \ a customized interface. Finally, we touched briefly on additional functionality\
    \ that can be accomplished with `SLRequest` and the Twitter API, such as retrieving\
    \ a friends list and timeline history. You should now be completely comfortable\
    \ adding Twitter functionality to your next app or game. `SLRequest` continues\
    \ to adapt to updates from the Twitter API, which means that even if a new version\
    \ of iOS is not released, there may be new and exciting functionality available\
    \ for social networking. In the next chapter we will explore the Facebook functionality,\
    \ which expands upon the social networking knowledge you’ve gained in this chapter.\n\
    \n# 13. Facebook\n\nAbstract\n\n> “Think about what people are doing on Facebook\
    \ today. They’re keeping up with their friends and family, but they’re also building\
    \ an image and identity for themselves, which in a sense is their brand. They’re\
    \ connecting with the audience that they want to connect to. It’s almost a disadvantage\
    \ if you're not on it now.”\n\n> —Mark Zuckerberg\n\nFacebook, founded in February\
    \ 2004, is the most popular social networking service in the Western world, with\
    \ more than one billion active users. Facebook has become intertwined with modern\
    \ society and culture, even spawning a big budget motion picture about its sordid\
    \ history.\n\nFacebook has been a fixture of mobile software since mobile began\
    \ its popularity climb in 2007, beginning with a mobile version of its website\
    \ and quickly transitioning into native services for every major platform. Facebook’s\
    \ APIs were available as early as iOS 2 and were originally called Facebook Connect.\
    \ With the introduction of iOS 6, Facebook’s API services became a built-in component\
    \ of the iOS SDK. Facebook functionality was an expansion of the Social Framework\
    \ originally introduced for iOS 5 to support Twitter.\n\n## UFOs\n\nStarting with\
    \ [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html) and continuing through to\
    \ the conclusion of this book, the sample code is not built upon the previous\
    \ chapters. This project will be an extension of the [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)\
    \ sample project; if you plan to follow along with the sample project, begin by\
    \ modifying the Xcode project from that chapter.\n\nOnce the user has exited a\
    \ game and achieved a final score, they will be prompted to choose whether to\
    \ post that score to their Facebook wall, using either the built-in Composer or\
    \ a programmatic API approach. The user will also have the option of not sharing\
    \ their score and returning to the main menu view. In order to implement this\
    \ change, the `exitAction:` method is modified to present the user with these\
    \ options in the form of a `UIAlert`.\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n    UIAlertView *alert = [[UIAlertView alloc]\n    initWithTitle:@\"Facebook\
    \ Score\" message:@\"Do you want\n    to post your score to your Facebook wall?\"\
    \n    delegate:self cancelButtonTitle:@\"Dismiss\"\n    otherButtonTitles:@\"\
    Facebook Composer\", @\"Custom Post\",\n    nil];\n    [alert show];\n    [alert\
    \ release];\n}\n```\n\nThe `alert` view delegate is also configured to handle\
    \ the callback containing the user’s selection. If the user has opted not to share\
    \ their score on Facebook, the score is submitted to Game Center and the user\
    \ is returned to the main menu view.\n\n```\n- (void)alertView:(UIAlertView *)alertView\
    \ didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n     //Facebook composer\n\
    \    if(buttonIndex == 1)\n    {\n    }\n    //custom post\n    else if(buttonIndex\
    \ == 2)\n    {\n    }\n    else if(buttonIndex == 0)\n    {\n        [[self navigationController]\
    \ popViewControllerAnimated: YES];\n        [self.gcManager reportScore:score\
    \ forCategory:@\"com.dragonforged.ufo.single\"];\n    }\n}\n```\n\n## Facebook\
    \ on iOS\n\nWhen Twitter was announced as part of the Social Framework with iOS\
    \ 5, there were a lot of raised eyebrows about why Facebook was not included as\
    \ well. Apple rectified this problem with iOS 6. As in Twitter, Facebook settings\
    \ are input from within Settings.app (Figure 13-1); there is no way for the user\
    \ to log in directly from a third-party app. Facebook configuration also supports\
    \ the syncing of Calendars and Contacts with their native equivalents on iOS.\
    \ While Twitter allows a user to log into multiple accounts at once, as of iOS\
    \ 7 Facebook allows only a single account to be linked at a given time.\n\n![A978-1-4302-4906-1_13_Fig1_HTML.jpg](A978-1-4302-4906-1_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1. Configuration settings for Facebook on iOS 7\n\nThere are two systems\
    \ in place for posting to Facebook from within your app using the Social Framework.\
    \ The first is using `SLComposeViewController`, which is described in the section\
    \ “Facebook Composer.” This is the easiest system to implement, and the user will\
    \ be presented with a standard, familiar interface. The second system involves\
    \ using `SLRequest` to interact with the Facebook SDK directly; this approach\
    \ is described in the sections “Facebook Permissions” and “Custom Facebook Posts.”\
    \ When dealing with `SLRequest` over the Composer, there are multiple layers of\
    \ authentication and various pitfalls involved; on the other hand, the Composer\
    \ does not need the user to supply any additional authentication or permission."
  raw: '## Going Further with Twitter


    While posting to Twitter covers most of the functionality many games will need,
    there are times when your app may be required to pull down the user’s friends
    list or access their timeline data. The `SLRequest` methodprovides access to these
    more advanced features. In this section both of these topics are briefly demonstrated.


    In order to retrieve the user’s last fifty posts, the following method can be
    implemented:


    `NSURL *requestURL = [NSURL URLWithString:@"` [`http://api.twitter.com/1/statuses/home_timeline.json`](http://api.twitter.com/1/statuses/home_timeline.json)
    `"];`


    `NSDictionary *options = @{@"count" : @"50",@"include_entities" : @"1"};`


    `SLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter
    requestMethod:SLRequestMethodGET URL:requestURL parameters:options];`


    `postRequest.account = twitterAccount;`


    In order to retrieve a list of the user’s friends, this method may be used:


    `NSURL *requestURL = [NSURL URLWithString:@"` [`https://api.twitter.com/1.1/friends/list.json`](https://api.twitter.com/1.1/friends/list.json)
    `"];`


    `SLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter
    requestMethod:SLRequestMethodGET URL:requestURL parameters:nil];`


    `request.account = self.twitterAccount;`


    Working with Twitter on the API level allows complete access to the Twitter SDK.
    This direct access allows your app to interact with Twitter beyond just the posting
    of tweets. For example, the app may pull in a list of all the user’s friends or
    download the user’s avatar for use in your game.


    An `SLRequest` is limited only by the ever-evolving third-party APIs that it interacts
    with. For more information on what can be done with `SLRequest` and Twitter, see
    the official Twitter API documentation at [`https://dev.twitter.com/docs/api`](https://dev.twitter.com/docs/api)
    .


    ## Summary


    In this chapter you learned about Social Framework as well as Accounts Framework
    and how they can both be leveraged to interact with the Twitter API. Posting using
    the built-in Tweet Composer was covered, as well as posting using a customized
    interface. Finally, we touched briefly on additional functionality that can be
    accomplished with `SLRequest` and the Twitter API, such as retrieving a friends
    list and timeline history. You should now be completely comfortable adding Twitter
    functionality to your next app or game. `SLRequest` continues to adapt to updates
    from the Twitter API, which means that even if a new version of iOS is not released,
    there may be new and exciting functionality available for social networking. In
    the next chapter we will explore the Facebook functionality, which expands upon
    the social networking knowledge you’ve gained in this chapter.


    # 13. Facebook


    Abstract


    “Think about what people are doing on Facebook today. They’re keeping up with
    their friends and family, but they’re also building an image and identity for
    themselves, which in a sense is their brand. They’re connecting with the audience
    that they want to connect to. It’s almost a disadvantage if you''re not on it
    now.”


    “Think about what people are doing on Facebook today. They’re keeping up with
    their friends and family, but they’re also building an image and identity for
    themselves, which in a sense is their brand. They’re connecting with the audience
    that they want to connect to. It’s almost a disadvantage if you''re not on it
    now.”


    > —Mark Zuckerberg


    Facebook, founded in February 2004, is the most popular social networking service
    in the Western world, with more than one billion active users. Facebook has become
    intertwined with modern society and culture, even spawning a big budget motion
    picture about its sordid history.


    Facebook has been a fixture of mobile software since mobile began its popularity
    climb in 2007, beginning with a mobile version of its website and quickly transitioning
    into native services for every major platform. Facebook’s APIs were available
    as early as iOS 2 and were originally called Facebook Connect. With the introduction
    of iOS 6, Facebook’s API services became a built-in component of the iOS SDK.
    Facebook functionality was an expansion of the Social Framework originally introduced
    for iOS 5 to support Twitter.


    ## UFOs


    Starting with [Chapter 12](#A978-1-4302-4906-1_12_Chapter.html) and continuing
    through to the conclusion of this book, the sample code is not built upon the
    previous chapters. This project will be an extension of the [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    sample project; if you plan to follow along with the sample project, begin by
    modifying the Xcode project from that chapter.


    Once the user has exited a game and achieved a final score, they will be prompted
    to choose whether to post that score to their Facebook wall, using either the
    built-in Composer or a programmatic API approach. The user will also have the
    option of not sharing their score and returning to the main menu view. In order
    to implement this change, the `exitAction:` method is modified to present the
    user with these options in the form of a UIAlert.


    `-(IBAction)exitAction:(id)sender;`


    `{`


        `UIAlertView *alert = [[UIAlertView alloc]`


        `initWithTitle:@"Facebook Score" message:@"Do you want`


        `to post your score to your Facebook wall?"`


        `delegate:self cancelButtonTitle:@"Dismiss"`


        `otherButtonTitles:@"Facebook Composer", @"Custom Post",`


        `nil];`


        `[alert show];`


        `[alert release];`


    `}`


    The `alert` view delegate is also configured to handle the callback containing
    the user’s selection. If the user has opted not to share their score on Facebook,
    the score is submitted to Game Center and the user is returned to the main menu
    view.


    `- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex`


    `{`


         `//Facebook composer`


        `if(buttonIndex == 1)`


        `{`


        `}`


        `//custom post`


        `else if(buttonIndex == 2)`


        `{`


        `}`


        `else if(buttonIndex == 0)`


        `{`


            `[[self navigationController] popViewControllerAnimated: YES];`


            `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


        `}`


    `}`


    ## Facebook on iOS


    When Twitter was announced as part of the Social Framework with iOS 5, there were
    a lot of raised eyebrows about why Facebook was not included as well. Apple rectified
    this problem with iOS 6\. As in Twitter, Facebook settings are input from within
    Settings.app (Figure [13-1](#A978-1-4302-4906-1_13_Chapter.html#Fig1)); there
    is no way for the user to log in directly from a third-party app. Facebook configuration
    also supports the syncing of Calendars and Contacts with their native equivalents
    on iOS. While Twitter allows a user to log into multiple accounts at once, as
    of iOS 7 Facebook allows only a single account to be linked at a given time.


    ![A978-1-4302-4906-1_13_Fig1_HTML.jpg](A978-1-4302-4906-1_13_Fig1_HTML.jpg)


    Figure 13-1.


    Configuration settings for Facebook on iOS 7


    There are two systems in place for posting to Facebook from within your app using
    the Social Framework. The first is using `SLComposeViewController`, which is described
    in the section “Facebook Composer.” This is the easiest system to implement, and
    the user will be presented with a standard, familiar interface. The second system
    involves using `SLRequest` to interact with the Facebook SDK directly; this approach
    is described in the sections “Facebook Permissions” and “Custom Facebook Posts.”
    When dealing with `SLRequest` over the Composer, there are multiple layers of
    authentication and various pitfalls involved; on the other hand, the Composer
    does not need the user to supply any additional authentication or permission.'
