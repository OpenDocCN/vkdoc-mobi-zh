- fmt: '### Client-to-Host Network


    A client-to-host network designates one device to be the host. The host device
    is responsible for sending information to all the connected clients. The clients
    never speak to each other; they speak only to the host who then relays the required
    information back to the other clients. An example of what a client-to-host setup
    looks like is shown in Figure [7-2](#A978-1-4302-4906-1_7_Chapter.html#Fig2).


    ![A978-1-4302-4906-1_7_Fig2_HTML.jpg](A978-1-4302-4906-1_7_Fig2_HTML.jpg)


    Figure 7-2. A visual representation of a client-to-host network using five iOS
    devices


    Also known as a client-server network, this approach simplifies the flow of data.
    Each peer or client only needs to worry about itself and the host; they do not
    need to be aware of the other devices that might exist on the network. The benefit
    of this type of network is that one device keeps everything in sync and handles
    the flow of information; this makes it a very secure network (in the sense of
    anti-cheating). Cheating, however, is not a large concern on the iOS platform
    because it’s a sandboxed system to begin with.


    There are other benefits to this system as well, such as the fact that only one
    device needs to worry about the state of the network, and that sole device is
    in charge of the behavior of the network. This type of network simplifies events
    such as connections, disconnections, transmission errors, and other state changes
    such as computer-controlled objects like artificial intelligence. However, this
    same setup could be troublesome on the iOS platform; if the host device has too
    much information to process, that device could run slower or use more battery.
    Additionally, if one device needs to handle processing of all the game information,
    it may cause the game or app to perform poorly on that device. In typical desktop
    computer networking the host or server device is typically a dedicated machine
    or the additional duties of a host machine do not make much of an impact on available
    resources.


    ### Ring Network


    A ring network (see Figure [7-3](#A978-1-4302-4906-1_7_Chapter.html#Fig3)) has
    no host and no clients. It works similarly to a peer-to-peer network, but a peer
    is in charge of communicating with only one designated peer and will receive information
    from only another separately defined peer. The information flows through a group
    of devices in the shape of a ring; hence the name.


    This type of network isn’t very common on the iOS platform, as there is not a
    lot of need for the redundancy that it typically provides for disconnected peers.
    Apple has done a lot of the groundwork to ensure that networks remain active and
    stable, without the need for the developer to spend additional design hours ensuring
    that there won’t be instances where peers lose contact with other peers that are
    currently joined together. There are times, however, when you might find this
    type of configuration useful in designing your network on the iOS platform. While
    a ring network brings increased stability and connectivity, it does so with a
    penalty of latency and transfer speeds. On mobile devices a factor often limiting
    successful networking is latency, which should be kept in mind when choosing a
    networking approach.


    ![A978-1-4302-4906-1_7_Fig3_HTML.jpg](A978-1-4302-4906-1_7_Fig3_HTML.jpg)


    Figure 7-3. A visual representation of a ring network using six iOS devices. Notice
    how much simpler this diagram appears than the peer-to-peer network shown in Figure
    [7-1](#A978-1-4302-4906-1_7_Chapter.html#Fig1)


    ## Less Common Network Types


    There are many additional types of network designs and styles available in computer
    science. Some are more practical than others and some are mostly theoretical.
    This section covers some of the better-known “uncommon” networks. Although some
    of these can be implemented on iOS devices, most will likely not have any real
    benefit in the average iOS project.


    - **Headless Client**—The client has no data whatsoever, and is controlled by
    a host device. You can think of this type of setup as a computer terminal that
    is booted from a server disk. This type of setup functions very similarly to a
    Virtual Networking Computing (`VNC`) client.

    - **Dedicated Server**—The host in this type does not participate in the game
    or activity and is dedicated to sending the information out from the peers and
    collecting new input. This is typically seen deployed by large companies creating
    a gaming community. While you may see this in the iOS world, it is often an offsite
    Ruby on Rails or Python server sending data and not another iOS device.

    - **Mesh/Partial Mesh Network**—This is a peer-to-peer network in which each peer
    may not be aware of the other peers that exist on the network. The packets are
    tagged with a destination and every hop attempts to get the packet closer to the
    destination. A full-mesh network means that every peer is interconnected.

    - **Tree Network**—This type of network consist of a tree of peers interconnected
    to each other and each controlled by a centralized point. The central point passes
    messages to other central points, and each tree branch passes messages back and
    forth along that branch. This type of network can be very beneficial when dealing
    with very large clusters of peers where latency isn’t critical.

    - **Hybrid Network**—This type of network combines two or more technologies, such
    as two groups of peers that are linked together through a centralized server.


    This covers most of the networks you will encounter during a career in software
    engineering, until of course something better is invented. There is really no
    limit to the type of network that you can design, and every year better designs
    and flows become available. In the next section, we will look at the actual packets
    that will be sent and received on your network.'
