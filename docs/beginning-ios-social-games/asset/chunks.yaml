- fmt: "# Modifying a Single-Player Game\n\nThere are a few modifications that we\
    \ need to make to our single-player game in order to transform it into a multiplayer\
    \ game.\n\n- Once we connect to a new peer, we need to begin the game. We also\
    \ need a way to inform our existing engine that the new game is multiplayer.\n\
    - One device needs to be designated the host device. We will have this one device\
    \ control the movements of the cows, since both devices can't control cow movement\
    \ themselves. This is an important step if we want both devices to appear in sync.\n\
    - Each peer needs to inform the other peer(s) about its actions, such as movement\
    \ and tractor beam usage.\n- Each peer needs to parse the other peer's device\
    \ and update its own game state to keep both devices in sync with each other.\n\
    \nThese steps are a representation of the bare minimum that is typically required\
    \ to turn a single-player game into a peer-to-peer multiplayer game. Your particular\
    \ game or app might be much more complex. For example, your multiplayer experience\
    \ might be so different from your single-player gameplay that you cannot reuse\
    \ the same class for both modes. On the other hand, your game might be even simpler.\
    \ For example, a multiplayer game of Battleship wouldn't require either device\
    \ to be the host, because there are no computer-controlled elements that you need\
    \ to keep track of.\n\n# Setting Up Our Engine for Multiplayer\n\nThe very first\
    \ thing that we need to do is let our game engine know whether the game state\
    \ should be set to multiplayer or single player. There are complex ways and simple\
    \ ways of doing this. Depending on your needs, you will most likely be able to\
    \ get away with a simple state variable.\n\nA state variable is the approach that\
    \ we will use for our example, since our game is extremely straightforward. In\
    \ `UFOGameViewController.h`, we create a new ivar to represent a `BOOL`, which\
    \ will be set to inform the class whether we are in single-player or multiplayer\
    \ mode. Add the following two lines into our already existing header file, and\
    \ don't forget to synthesize `gameIsMultiplayer` in the implementation.\n\n```\n\
    @interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    GameCenterManagerDelegate>\n{\n    BOOL gameIsMultiplayer;\n}\n@property(nonatomic,\
    \ assign) BOOL gameIsMultiplayer;\n```\n\nWe will use this property throughout\
    \ our code base to determine whether the game is running in multiplayer mode.\n\
    \nWe have two existing methods that will be called when our game begins a new\
    \ multiplayer match. The first method, `matchmakerViewController`, is called when\
    \ Game Center finds a match, and the second, `peerPickerController`, will be used\
    \ when we find a peer through our Peer Picker. We will deal with two different\
    \ identifiers for our peers: Game Center returns a `GKMatch` object, and the Peer\
    \ Picker returns an `NSString` to represent the peer. We will also add some new\
    \ methods in our `GameCenterManager` class to handle using the same code to communicate\
    \ with both of these systems at once. For now, we will simply focus on getting\
    \ the game up and running in the new multiplayer state.\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\ndidFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
    \ completion: nil];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:(NSString\n*)peerID toSession:(GKSession *)session\n\
    {\n    currentSession = session;\n    [self dismissModalViewControllerAnimated:\
    \ YES completion: nil];\n}\n```\n\nNext, we add a section of code to the end of\
    \ each of these methods to begin a new multiplayer game after we find a peer that\
    \ we want to play against. Add the following snippet of code into each method.\n\
    \n```\nUFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\n\
    gameVC.gcManager = gcManager;\ngameVC.gameIsMultiplayer = YES;\n[self.navigationController\
    \ pushViewController:gameVC animated:YES];\n[gameVC release];\n```\n\nWe also\
    \ need to hold onto either the `GKMatch` or the `NSString` that represents a peer.\
    \ Create two new properties in the `UFOGameViewController`, named `peerIDString`\
    \ and `peerMatch`. Set these up in the same fashion that you did for the `gameIsMultiplayer`\
    \ ivar. The new section of your header should look like the following abstracted\
    \ snippet:\n\n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    GameCenterManagerDelegate>\n{\n    //...\n    NSString *peerIDString;\n    GKMatch\
    \ *peerMatch;\n}\n@property(nonatomic, retain) NSString *peerIDString;\n@property(nonatomic,\
    \ retain) GKMatch *peerMatch;\n```\n\nNow we need to add logic to set these properties\
    \ in both of the methods for beginning a new multiplayer game. These methods should\
    \ now look like the following code. As you can see, we nil out the unused property;\
    \ we will always have one of the two properties being set to `nil`, because you\
    \ can never have a game that is using both the Peer Picker and Game Center at\
    \ the same time.\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\ndidFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
    \ completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
    \ = YES;\n    gameVC.peerIDString = nil;\n    gameVC.peerMatch = match;\n    [self.navigationController\
    \ pushViewController:gameVC animated:YES];\n    [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n    currentSession = session;\n    [self dismissModalViewControllerAnimated:\
    \ YES completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
    \ = YES;\n    gameVC.peerIDString = peerID;\n    gameVC.peerMatch = nil;\n   \
    \ [self.navigationController pushViewController:gameVC animated:YES];\n    [gameVC\
    \ release];\n}\n```\n\nWhen we load our game view controller, we know whether\
    \ it is multiplayer or not, and we also have a reference to our peer or peers.\
    \ Our `GameViewController` now has all the information it needs to begin a new\
    \ multiplayer game."
  raw: '## Modifying a Single-Player Game


    There are a few modifications that we need to make to our single-player game in
    order to transform it into a multiplayer game.


    *   Once we connect to a new peer, we need to begin the game. We also need a way
    to inform our existing engine that the new game is multiplayer.

    *   One device needs to be designated the host device. We will have this one device
    control the movements of the cows, since both devices can’t control cow movement
    themselves. This is an important step if we want both devices to appear in sync.

    *   Each peer needs to inform the other peer(s) about its actions, such as movement
    and tractor beam usage.

    *   Each peer needs to parse the other peer’s device and update its own game state
    to keep both devices in sync with each other.


    These steps are a representation of the bare minimum that is typically required
    to turn a single-player game into a peer-to-peer multiplayer game. Your particular
    game or app might be much more complex. For example, your multiplayer experience
    might be so different from your single-player gameplay that you cannot reuse the
    same class for both modes. On the other hand, your game might be even simpler.
    For example, a multiplayer game of Battleship wouldn’t require either device to
    be the host, because there are no computer-controlled elements that you need to
    keep track of.


    ## Setting Up Our Engine for Multiplayer


    The very first thing that we need to do is let our game engine know whether the
    game state should be set to multiplayer or single player. There are complex ways
    and simple ways of doing this. Depending on your needs, you will most likely be
    able to get away with a simple state variable.


    A state variable is the approach that we will use for our example, since our game
    is extremely straightforward. In `UFOGameViewController.h`, we create a new ivar
    to represent a BOOL, which will be set to inform the class whether we are in single-player
    or multiplayer mode. Add the following two lines into our already existing header
    file, and don’t forget to synthesize gameIsMultiplayer in the implementation.


    `@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,`É


    `GameCenterManagerDelegate>`


    `{`


    `BOOL gameIsMultiplayer;`


    `}`


    `@property(nonatomic, assign) BOOL gameIsMultiplayer;`


    We will use this property throughout our code base to determine whether the game
    is running in multiplayer mode.


    We have two existing methods that will be called when our game begins a new multiplayer
    match. The first method, `matchmakerViewController`, is called when Game Center
    finds a match, and the second, `peerPickerController`, will be used when we find
    a peer through our Peer Picker. We will deal with two different identifiers for
    our peers: Game Center returns a `GKMatch` object, and the Peer Picker returns
    an `NSString` to represent the peer. We will also add some new methods in our
    `GameCenterManager` class to handle using the same code to communicate with both
    of these systems at once. For now, we will simply focus on getting the game up
    and running in the new multiplayer state.


    `- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController`É


    `didFindMatch:(GKMatch *)match`


    `{`


    `[self dismissModalViewControllerAnimated:YES completion: nil];`


    `}`


    `- (void)peerPickerController:(GKPeerPickerController *)picker didConnectPeer:(NSString`É


    `*)peerID toSession:(GKSession *)session`


    `{`


    `currentSession = session;`


    `[self dismissModalViewControllerAnimated: YES completion: nil];`


    `}`


    Next, we add a section of code to the end of each of these methods to begin a
    new multiplayer game after we find a peer that we want to play against. Add the
    following snippet of code into each method.


    `UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];`


    `gameVC.gcManager = gcManager;`


    `gameVC.gameIsMultiplayer = YES;`


    `[self.navigationController pushViewController:gameVC animated:YES];`


    `[gameVC release];`


    We also need to hold onto either the `GKMatch` or the `NSString` that represents
    a peer. Create two new properties in the `UFOGameViewController`, named `peerIDString`
    and `peerMatch`. Set these up in the same fashion that you did for the `gameIsMultiplayer`
    ivar. The new section of your header should look like the following abstracted
    snippet:


    `@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,`É


    `GameCenterManagerDelegate>`


    `{`


    `//...`


    `NSString *peerIDString;`


    `GKMatch *peerMatch;`


    `}`


    `@property(nonatomic, retain) NSString *peerIDString;`


    `@property(nonatomic, retain) GKMatch *peerMatch;`


    Now we need to add logic to set these properties in both of the methods for beginning
    a new multiplayer game. These methods should now look like the following code.
    As you can see, we nil out the unused property; we will always have one of the
    two properties being set to nil, because you can never have a game that is using
    both the Peer Picker and Game Center at the same time.


    `- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController`É


    `didFindMatch:(GKMatch *)match`


    `{`


    `[self dismissModalViewControllerAnimated:YES completion: nil];`


    `UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];`


    `gameVC.gcManager = gcManager;`


    `gameVC.gameIsMultiplayer = YES;`


    `gameVC.peerIDString = nil;`


    `gameVC.peerMatch = match;`


    `[self.navigationController pushViewController:gameVC animated:YES];`


    `[gameVC release];`


    `}`


    `- (void)peerPickerController:(GKPeerPickerController *)picker didConnectPeer:`É


    `(NSString *)peerID toSession:(GKSession *)session`


    `{`


    `currentSession = session;`


    `[self dismissModalViewControllerAnimated: YES completion: nil];`


    `UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];`


    `gameVC.gcManager = gcManager;`


    `gameVC.gameIsMultiplayer = YES;`


    `gameVC.peerIDString = peerID;`


    `gameVC.peerMatch = nil;`


    `[self.navigationController pushViewController:gameVC animated:YES];`


    `[gameVC release];`


    `}`


    When we load our game view controller, we know whether it is multiplayer or not,
    and we also have  a reference to our peer or peers. Our `GameViewController` now
    has all the information it needs to begin a new multiplayer game.'
  trans: "\n# 修改单人游戏\n\n要将单人游戏转换为多人游戏，我们需要进行一些修改。\n\n- 一旦连接到新的对等方，我们就需要开始游戏。我们还需要一种方法，让现有的游戏引擎知道新游戏是多人模式。\n\
    - 需要指定一台设备作为主机设备。我们将让这台设备控制牛群的运动，因为两台设备不能同时控制牛群的运动。如果我们希望两台设备保持同步，这是一个重要的步骤。\n\
    - 每个对等方都需要将自身的操作（如移动和使用牵引光束）告知其他对等方。\n- 每个对等方都需要解析其他对等方的设备，并更新自身的游戏状态，以使两台设备彼此保持同步。\n\
    \n这些步骤代表了将单人游戏转换为点对点多人游戏通常所需的最低要求。你的特定游戏或应用可能复杂得多。例如，你的多人游戏体验可能与单人游戏相差甚远，以至于无法为两种模式复用同一个类。另一方面，你的游戏也可能更简单。例如，一款多人海战游戏就不需要任何一台设备作为主机，因为其中没有需要你追踪的计算机控制元素。\n\
    \n# 为多人游戏设置引擎\n\n我们首先需要让游戏引擎知道游戏状态应设置为多人模式还是单人模式。实现这一点有复杂的方法，也有简单的方法。根据你的需求，使用一个简单的状态变量通常就足够了。\n\
    \n在我们的示例中，我们将使用状态变量这种方法，因为我们的游戏非常直接。在`UFOGameViewController.h`中，我们创建一个新的实例变量来表示一个`BOOL`值，该值将用于通知类当前是单人模式还是多人模式。将以下两行代码添加到已有的头文件中，并且别忘了在实现文件中`synthesize``gameIsMultiplayer`。\n\
    \n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    GameCenterManagerDelegate>\n{\n    BOOL gameIsMultiplayer;\n}\n@property(nonatomic,\
    \ assign) BOOL gameIsMultiplayer;\n```\n\n我们将在整个代码库中使用这个属性来判断游戏是否在多人模式下运行。\n\n\
    当游戏开始一场新的多人比赛时，有两个现有的方法会被调用。第一个方法`matchmakerViewController`会在 Game Center 找到比赛时被调用；第二个方法`peerPickerController`会在我们通过\
    \ Peer Picker 找到对等方时被调用。我们将为对等方处理两种不同的标识符：Game Center 返回一个`GKMatch`对象，Peer Picker\
    \ 返回一个`NSString`来表示对等方。我们还会在`GameCenterManager`类中添加一些新方法，以便使用相同的代码同时与这两个系统进行通信。现在，我们只需专注于让游戏在全新的多人状态下运行起来。\n\
    \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
    didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
    \ completion: nil];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:(NSString\n*)peerID toSession:(GKSession *)session\n\
    {\n    currentSession = session;\n    [self dismissModalViewControllerAnimated:\
    \ YES completion: nil];\n}\n```\n\n接下来，我们在每个方法的末尾添加一段代码，以便在找到想要与之对战的对等方后开始一场新的多人游戏。将以下代码片段添加到每个方法中。\n\
    \n```\nUFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\n\
    gameVC.gcManager = gcManager;\ngameVC.gameIsMultiplayer = YES;\n[self.navigationController\
    \ pushViewController:gameVC animated:YES];\n[gameVC release];\n```\n\n我们还需要持有代表对等方的`GKMatch`或`NSString`。在`UFOGameViewController`中创建两个新属性，分别命名为`peerIDString`和`peerMatch`。按照与设置`gameIsMultiplayer`实例变量相同的方式设置它们。头文件的新部分应该类似于下面这段抽象的代码片段：\n\
    \n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    GameCenterManagerDelegate>\n{\n    //...\n    NSString *peerIDString;\n    GKMatch\
    \ *peerMatch;\n}\n@property(nonatomic, retain) NSString *peerIDString;\n@property(nonatomic,\
    \ retain) GKMatch *peerMatch;\n```\n\n现在，我们需要在开始新多人游戏的两个方法中添加设置这些属性的逻辑。这些方法现在应该如下所示。如你所见，我们将未使用的属性设为`nil`；这两个属性中总有一个会被设为`nil`，因为你不可能同时使用\
    \ Peer Picker 和 Game Center 进行游戏。\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\ndidFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
    \ completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
    \ = YES;\n    gameVC.peerIDString = nil;\n    gameVC.peerMatch = match;\n    [self.navigationController\
    \ pushViewController:gameVC animated:YES];\n    [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n    currentSession = session;\n    [self dismissModalViewControllerAnimated:\
    \ YES completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
    \ = YES;\n    gameVC.peerIDString = peerID;\n    gameVC.peerMatch = nil;\n   \
    \ [self.navigationController pushViewController:gameVC animated:YES];\n    [gameVC\
    \ release];\n}\n```\n\n当加载游戏视图控制器时，我们就知道了它是否为多人模式，并且也拥有了指向对等方的引用。现在，`GameViewController`拥有了开始一场新多人游戏所需的所有信息。\n"
- fmt: "### Picking a Host\n\nPicking which device will be the host is harder than\
    \ it sounds. Both devices, when first connected together, are treated as equals.\
    \ How do we then determine which device will have more control than the other?\n\
    \nThe most straightforward and foolproof system is to have each device generate\
    \ a random number. Whichever device has the largest random number becomes the\
    \ host. In the very rare event that both devices generate the same random number,\
    \ we simply try again. In modern desktop games the host machine is normally determined\
    \ by the computer with the lowest latency or the fastest processor.\n\nAfter we\
    \ have determined the random number the device has picked for its chance at being\
    \ the host, we need to send that data to the other device. On the receiving side,\
    \ we need to process the data and have both devices come to the same conclusion\
    \ about which one has been selected as the host. This section deals only with\
    \ generating the host number; the following two sections handle how to send and\
    \ receive this data. We now add the following `generateAndSendHostNumber` method\
    \ to our `UFOGameCenterViewController` class:\n\n```\n-(void)generateAndSendHostNumber;\n\
    {\n        double randomHostNumber = arc4random();\n        NSString *randomNumberString\
    \ = [NSString stringWithFormat: @\"%d\",\n        randomHostNumber];\n       \
    \ [self.gcManager sendStringToAllPeers:randomNumberString reliable: YES];\n}\n\
    ```\n\nFor the purpose of this example, we will work with an `NSString` for sending\
    \ the data back and forth. You could easily send this as an `NSNumber` as well,\
    \ but whatever we send will first need to be converted to `NSData`, which we will\
    \ cover in the next section. In addition, we want to make sure this method is\
    \ called whenever we are dealing with a multiplayer game. To do so, we need to\
    \ add the following to the end of our `viewDidLoad` method. We also need to modify\
    \ slightly our logic to spawn cows. If it is a multiplayer game, only the host\
    \ is responsible for spawning and updating cow paths.\n\n> **Tip:** When you begin\
    \ to deal with more complex networking, it is often beneficial to switch to a\
    \ data type that can easily store more data with less parsing, such as a dictionary\
    \ or an array.\n\n```\n-(void)viewDidLoad\n{\n        //...\n        [self generateAndSendHostNumber];\n\
    \        if (self.gameIsMultiplayer == NO)\n        {\n                for (int\
    \ x = 0; x < 5; x++)\n                        {\n                            \
    \    [self spawnCow];\n                        }\n                        [self\
    \ updateCowPaths];\n        }\n}\n```\n\n### Sending Data\n\nWe will work with\
    \ two primary methods to send data to the connected peer(s). One will handle sending\
    \ data to every peer we are connected to, and the other will send data only to\
    \ specified peers, such as teammates or other groups of players. First, add the\
    \ following two methods to our `GameCenterManager` class. The following methods\
    \ will work for both Game Center and Game Kit networking.\n\n```\n-(void)sendStringToAllPeers:(NSString\
    \ *)dataString reliable:(BOOL)reliable;\n-(void)sendString:(NSString *)dataString\
    \ toPeers:(id)peers reliable:(BOOL)reliable;\n```\n\nWe will use these methods\
    \ to send strings back and forth, but you can add additional methods to accept\
    \ any type of input you want. Keep in mind that everything will need to be converted\
    \ to `NSData` along the way. You might also notice that the first method is the\
    \ same method we called previously from our `generateAndSendHostNumber`.\n\n>\
    \ **Tip:** It is a good idea to implement methods to handle arrays and dictionaries.\
    \ These are both very common data types when working with networking messages.\n\
    \nBefore we can really begin to send data back and forth, we need to know either\
    \ the `GKSession` or the `GKMatch` that was created for our multiplayer game.\
    \ To do this, we create a new ivar in the `GameCenterManager` class. We name it\
    \ `matchOrSession` and set it to an ID type. We need to set this property before\
    \ we begin a new multiplayer game, after we have been returned either a new `GKSession`\
    \ or `GKMatch`. Let’s first take a look at sending data to all peers. This new\
    \ `sendStringToAllPeers` method is printed here for your convenience. After you\
    \ have examined it, we will discuss it in further detail.\n\n```\n-(void)sendStringToAllPeers:(NSString\
    \ *)dataString reliable:(BOOL)reliable\n{\nif (self.matchOrSession == nil)\n{\n\
    NSLog(@\"Game Center Manager matchOrSession ivar was not set, this\nneeds to be\
    \ set with  the GKMatch or GKSession before sending or receiving data\");\nreturn;\n\
    }\nNSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];\n\
    GKSendDataMode mode;\nif (reliable)\n{\nmode = GKSendDataReliable;\n}\nelse\n\
    {\nmode = GKSendDataUnreliable;\n}\nNSError *error = nil;\nif ([self.matchOrSession\
    \ isKindOfClass: [GKSession class]])\n{\n[self.matchOrSession sendDataToAllPeers:dataToSend\
    \ withDataMode:\nmode error:&error];\n}\nelse if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])\n{\n[self.matchOrSession sendDataToAllPlayers:dataToSend withDataMode:\n\
    mode error:&error];\n}\nelse\n{\nNSLog(@\"Game Center Manager matchOrSession was\
    \ not a GKMatch or\na GKSession, we are unable to send data\");\n}\nif (error\
    \ != nil)\n{\nNSLog(@\"An error occurred while sending data: %@\", [error\nlocalizedDescription]);\n\
    }\n}\n```\n\nIn the `sendStringToAllPeers` method we need to make sure that we\
    \ have properly set the `matchOrSession` property. If we haven’t, we will not\
    \ be able to continue, as we will be using this object to send data. After we\
    \ have ensured that we have the proper information to continue, we then transform\
    \ our `NSString` to an `NSData` object. This encodes the string into a format\
    \ that is safe for sending over the network. We also need to set a reliability\
    \ mode, as discussed in [Chapter 7](#A978-1-4302-4906-1_7_Chapter.html).\n\nNow\
    \ that we have everything in place to actually send data, we first detect whether\
    \ we are working with a `GKMatch` from a Game Center type connection or a `GKSession`\
    \ from a Peer Picker type connection. All that is left to do is send the data\
    \ using the Game Kit APIs.\n\nNow is a good time to look at how we will selectively\
    \ send data only to certain peers. We can build from the example we already have\
    \ for sending data to all peers. Let’s take a look at the `sendString` method\
    \ in its entirety:\n\n```\n-(void)sendString:(NSString *)dataString toPeers:(id)peers\
    \ reliable:(BOOL)reliable\n{\nif (self.matchOrSession == nil)\n{\nNSLog(@\"Game\
    \ Center Manager matchOrSession ivar was not set, this\nneeds to be set with the\
    \ GKMatch or GKSession before sending or receiving data\");\nreturn;\n}\n```"
