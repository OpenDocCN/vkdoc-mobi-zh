  trans: "\n### 选择主机\n\n选择哪个设备作为主机比听起来要复杂。当两台设备首次连接时，它们被视为对等设备。那么我们如何确定哪个设备将拥有比另一个更高的控制权呢？\n\
    \n最直接且万无一失的方法是让每台设备生成一个随机数。随机数较大的设备成为主机。在极其罕见的情况下，如果两台设备生成了相同的随机数，我们只需重试。在现代桌面游戏中，主机通常由延迟最低或处理器速度最快的计算机决定。\n\
    \n在确定设备为其作为主机的机会选择的随机数后，我们需要将该数据发送到另一台设备。在接收端，我们需要处理数据，并使两台设备就哪个设备被选为主机得出相同的结论。本节仅涉及生成主机编号；接下来的两节将介绍如何发送和接收这些数据。现在我们向`UFOGameCenterViewController`类中添加以下`generateAndSendHostNumber`方法：\n\
    \n```\n-(void)generateAndSendHostNumber;\n{\n        double randomHostNumber =\
    \ arc4random();\n        NSString *randomNumberString = [NSString stringWithFormat:\
    \ @\"%d\",\n        randomHostNumber];\n        [self.gcManager sendStringToAllPeers:randomNumberString\
    \ reliable: YES];\n}\n```\n\n出于本示例的目的，我们将使用`NSString`来来回发送数据。你也可以轻松地将其作为`NSNumber`发送，但无论发送什么，首先需要将其转换为`NSData`，我们将在下一节中介绍。此外，我们要确保在处理多人游戏时调用此方法。为此，我们需要在`viewDidLoad`方法的末尾添加以下代码。我们还需要稍微修改生成牛的逻辑。如果是多人游戏，只有主机负责生成和更新牛的路径。\n\
    \n> **提示：** 当开始处理更复杂的网络通信时，切换到一种能够轻松存储更多数据且解析更少的数据类型通常是有益的，例如字典或数组。\n\n```\n-(void)viewDidLoad\n\
    {\n        //...\n        [self generateAndSendHostNumber];\n        if (self.gameIsMultiplayer\
    \ == NO)\n        {\n                for (int x = 0; x < 5; x++)\n           \
    \             {\n                                [self spawnCow];\n          \
    \              }\n                        [self updateCowPaths];\n        }\n\
    }\n```\n\n### 发送数据\n\n我们将使用两种主要方法向已连接的同伴发送数据。一种方法将处理向所有已连接的同伴发送数据，另一种方法仅向指定的同伴发送数据，例如队友或其他玩家组。首先，将以下两个方法添加到我们的`GameCenterManager`类中。以下方法适用于\
    \ Game Center 和 Game Kit 网络通信。\n\n```\n-(void)sendStringToAllPeers:(NSString *)dataString\
    \ reliable:(BOOL)reliable;\n-(void)sendString:(NSString *)dataString toPeers:(id)peers\
    \ reliable:(BOOL)reliable;\n```\n\n我们将使用这些方法来回发送字符串，但你可以添加额外的方法来接受任何你想要的输入类型。请记住，所有内容在传输过程中都需要转换为`NSData`。你可能还会注意到，第一个方法正是我们之前从`generateAndSendHostNumber`中调用的那个方法。\n\
    \n> **提示：** 实现处理数组和字典的方法是个好主意。在处理网络消息时，这两种都是非常常见的数据类型。\n\n在我们真正开始来回发送数据之前，我们需要知道为多人游戏创建的`GKSession`或`GKMatch`。为此，我们在`GameCenterManager`类中创建一个新的实例变量。我们将其命名为`matchOrSession`，并设置为\
    \ ID 类型。我们需要在开始新的多人游戏之前，在收到新的`GKSession`或`GKMatch`之后设置此属性。让我们先看看如何向所有同伴发送数据。为了方便阅读，这里打印了这个新的`sendStringToAllPeers`方法。在你检查之后，我们将进一步详细讨论它。\n\
    \n```\n-(void)sendStringToAllPeers:(NSString *)dataString reliable:(BOOL)reliable\n\
    {\nif (self.matchOrSession == nil)\n{\nNSLog(@\"Game Center Manager matchOrSession\
    \ 实例变量未设置，在发送或接收数据之前，需要使用 GKMatch 或 GKSession 进行设置\");\nreturn;\n}\nNSData *dataToSend\
    \ = [dataString dataUsingEncoding:NSUTF8StringEncoding];\nGKSendDataMode mode;\n\
    if (reliable)\n{\nmode = GKSendDataReliable;\n}\nelse\n{\nmode = GKSendDataUnreliable;\n\
    }\nNSError *error = nil;\nif ([self.matchOrSession isKindOfClass: [GKSession class]])\n\
    {\n[self.matchOrSession sendDataToAllPeers:dataToSend withDataMode:\nmode error:&error];\n\
    }\nelse if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n{\n[self.matchOrSession\
    \ sendDataToAllPlayers:dataToSend withDataMode:\nmode error:&error];\n}\nelse\n\
    {\nNSLog(@\"Game Center Manager matchOrSession 既不是 GKMatch 也不是 GKSession，我们无法发送数据\"\
    );\n}\nif (error != nil)\n{\nNSLog(@\"发送数据时发生错误：%@\", [error\nlocalizedDescription]);\n\
    }\n}\n```\n\n在`sendStringToAllPeers`方法中，我们需要确保已正确设置`matchOrSession`属性。如果没有设置，我们将无法继续，因为我们将使用此对象来发送数据。在确保我们拥有正确的信息可以继续后，我们将`NSString`转换为`NSData`对象。这会将字符串编码为适合通过网络发送的格式。我们还需要设置可靠性模式，如第\
    \ 7 章中所讨论的。\n\n现在我们已经准备好实际发送数据的所有条件，首先检测我们是在处理来自 Game Center 类型连接的`GKMatch`，还是来自\
    \ Peer Picker 类型连接的`GKSession`。剩下的就是使用 Game Kit API 发送数据。\n\n现在是时候看看如何有选择地仅向某些同伴发送数据了。我们可以从已有的向所有同伴发送数据的示例中构建。让我们完整地看一下`sendString`方法：\n\
    \n```\n-(void)sendString:(NSString *)dataString toPeers:(id)peers reliable:(BOOL)reliable\n\
    {\nif (self.matchOrSession == nil)\n{\nNSLog(@\"Game Center Manager matchOrSession\
    \ 实例变量未设置，在发送或接收数据之前，需要使用 GKMatch 或 GKSession 进行设置\");\nreturn;\n}\n```\n"
- fmt: "`}`\n\n`NSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];`\n\
    \n`GKSendDataMode mode;`\n\n`if (reliable)`\n\n`{`\n\n`mode = GKSendDataReliable;`\n\
    \n`}`\n\n`else`\n\n`{`\n\n`mode = GKSendDataUnreliable;`\n\n`}`\n\n`NSError *error\
    \ = nil;`\n\n`if ([self.matchOrSession isKindOfClass: [GKSession class]])`\n\n\
    `{`\n\n`if ([peers isKindOfClass:[NSArray class]])`\n\n`{`\n\n`[self.matchOrSession\
    \ sendData:dataToSend toPeers:peers withDataMode:mode error:&error];`\n\n`}`\n\
    \n`else`\n\n`{`\n\n`NSLog(@\"Game Kit requires peers be sent as an NSArray of\
    \ Peer ID Strings\");`\n\n`}`\n\n`}`\n\n`else if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])`\n\n`{`\n\n`if ([peers isKindOfClass:[NSArray class]])`\n\n\
    `{`\n\n`[self.matchOrSession sendData:dataToSend toPlayers:peers withDataMode:mode\
    \ error:&error];`\n\n`}`\n\n`else`\n\n`{`\n\n`NSLog(@\"Game Center requires peers\
    \ be sent as an NSArray of Peer ID Strings\");`\n\n`}`\n\n`}`\n\n`else`\n\n`{`\n\
    \n`NSLog(@\"Game Center Manager matchOrSession was not a GKMatch or a GKSession,\
    \ we are unable to send data\");`\n\n`}`\n\n`if (error != nil)`\n\n`{`\n\n`NSLog(@\"\
    An error occurred while sending data: %@\", [error localizedDescription]);`\n\n\
    `}`\n\n`}`\n\nThis method is very similar to the method for sending data to all\
    \ peers. The main difference is that we use a new API call and feed in an array\
    \ of peer IDs. You can, of course, change these methods to accept more than an\
    \ `NSString` when sending data, but for the simplicity of our test game, a string\
    \ is all we need.\n\nThis concludes everything you need to know about sending\
    \ data between two or more iOS devices. In the next section, we will look at how\
    \ to receive and parse the data that was received from another peer.\n\n### Receiving\
    \ Data\n\n`GKSession` and `GKMatch` each have their own systems for receiving\
    \ delegate callbacks for incoming data. Both of these systems depend on a delegate.\
    \ Game Center uses the same delegate that was used for the invitation handler\
    \ in [Chapter 5](#A978-1-4302-4906-1_5_Chapter.html); Game Kit allows us to use\
    \ a separate call, `setDataReceiveHandler:withContext:`, to specify the instance\
    \ that will be in charge of handling incoming data from the network.\n\nThe first\
    \ step in setting up our app to receive data is to set the receive data delegate\
    \ for both systems to our `GameCenterManager` class. We will use the `GameCenterManager`\
    \ class as a filter point for passing data back into our game. While you could\
    \ easily receive data in your game controller itself, if we pipe everything through\
    \ `GameCenterManager`, it will be much easier to plug this class into future apps,\
    \ and we can direct both Game Kit and Game Center networking to the same protocols\
    \ to make life easier when implementing.\n\nModify both `matchmakerViewController`\
    \ and `peerPickerController` of `UFOViewController.m` to match the following:\n\
    \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
    \ didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
    \ completion: nil];\n    gcManager.matchOrSession = match;\n    //Set a new received\
