  raw: '### A Time-Based Achievement Hook


    The last hook we add for this project handles the player for the five-minute achievement.
    Your first instinct is probably to keep track of time played, and submit it as
    progress when your user exits the game. This might not be the best approach. We
    want to inform the user when they complete an achievement. You don’t want them
    to have to wait until they finish a game to see which achievements they have earned.
    There are many approaches to this problem. For this example, we will fire an `NSTimer`
    every three seconds (which is one percent of five minutes) and update the achievement
    progress. Add the following code to `UFOGameViewController`.


    `- (void)tickThreeSeconds`


    `{`


            `if ([[self gcManager]achievementWithIdentifierIsComplete:`É


            `@"com.dragonforged.ufo.play5"]) return;`


           `double percentComplete = [[self gcManager]`É


             `percentageCompleteOfAchievementWithIdentifier:@"com.dragonforged.ufo.play5"];`


            `percentComplete++;`


             `[[self gcManager] submitAchievement:@"com.dragonforged.ufo.play5"`É


          `percentComplete:percentComplete];`


    `}`


    Here we start a three-second timer. Every time the timer fires, we call `tickThreeSeconds`.
    This gives us our current progress of the achievement, to which we add one percent,
    and then submits it back to the server. In the event that the achievement is already
    complete, the method simply returns. In addition, modify the `viewDidAppear` and
    `viewWillDisappear` methods to match the following:


    `-(void)viewDidAppear:(BOOL)animated`


    `{`


           `[super viewDidAppear: animated];`


          `timer = [NSTimer scheduledTimerWithTimeInterval:3.0 target:self`É


          `selector:@selector(tickThreeSeconds) userInfo:nil repeats:YES];`


    `}`


    `- (void)viewWillDisappear:(BOOL)animated`


    `{`


           `[super viewWillDisappear: animated];`


           `[timer invalidate];`


          `timer = nil;`


    `}`


