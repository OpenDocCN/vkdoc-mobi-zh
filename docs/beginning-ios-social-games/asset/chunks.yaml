    \ 4k 限制以内。\n\n填充游戏数据字典后，我们需要调用一个新的便捷方法，根据该字典填充游戏 GUI。该方法将遍历字典中的所有键，并用玩家的角色填充相应的游戏按钮。我们还将按钮的启用状态设置为`NO`，以防止玩家移动到对手的位置上。\n\
