  trans: "\n# 新示例项目\n\n遗憾的是，我们现有的 UFO 示例游戏并不适合测试回合制游戏。让每个玩家操作一步然后等待对方跟上进度，这显然不合逻辑。幸运的是，我们可以围绕另一种非常简单的游戏类型来构建项目：井字棋。这款经典儿童游戏几乎所有人都玩过，我们对它的规则和策略也相当熟悉。\n\
    \n我们首先创建一个基于导航控制器的新项目。整个项目将涉及三个视图：\n\n-   主视图：仅包含一个启动`GKTurnedBasedMatchmakerViewController`的按钮。\n\
    -   `GKTurnedBasedMatchmakerViewController`：这是苹果提供的用于创建和恢复回合制游戏的视图。你无需自行创建此视图。\n\
    -   `游戏视图`：负责处理用户输入、判定胜负和平局、以及在每回合开始时更新游戏面板的类。\n\n我们从主视图开始处理。创建新项目时，系统会自动生成这些文件。我们首先要做的是确保导入正确的\
    \ Game Kit 框架，并添加本书一直使用的可复用`GameCenterManager`类；你可以从第 8 章引入已有的类。同时，我们还需在视图中创建一个用于开始新游戏的按钮，如图\
    \ 9-2 所示。\n\n![A978-1-4302-4906-1_9_Fig2_HTML.jpg](img/A978-1-4302-4906-1_9_Fig2_HTML.jpg)\n\
    \n图 9-2. 新井字棋游戏的主视图\n\n新的基础视图控制器类的头文件应与以下代码片段一致。我们需要遵循`GameCenterManagerDelegate`和`GKTurnedBasedMatchmakerViewController`协议。与之前章节类似，我们还需要创建一个`GameCenterManager`的类实例。最后需要添加的是一个用于开始新游戏的`IBAction`方法。请确保在\
    \ Interface Builder 中将“开始新游戏”按钮连接到该`IBAction`。\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <GameKit/GameKit.h>\n#import \"GameCenterManager.h\"\n\n@interface tictactoeViewController\
    \ : UIViewController <GameCenterManagerDelegate, GKTurnBasedMatchmakerViewControllerDelegate>\n\
    {\n    GameCenterManager *gcManager;\n}\n\n-(IBAction)beginGame:(id)sender;\n\
    @end\n```\n\n我们还需要修改`viewDidLoad`方法，以检查本地用户身份并在 Game Center 中进行认证。这与第 2 章中的做法相同。如果你支持\
    \ iOS 6 或更高版本，应使用第 2 章中概述的新认证方法。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    if ([GameCenterManager isGameCenterAvailable])\n    {\n        [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \       selector:@selector(localUserAuthenticationChanged:)\n                \
    \                                     name:GKPlayerAuthenticationDidChangeNotificationName\
    \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n      \
    \  [gcManager setDelegate: self];\n        [gcManager authenticateLocalUser];\n\
    \    }\n}\n```\n\n此外，我们还需要实现两个委托方法来监控认证成功和本地用户变更。我们将使用这两个方法输出一些调试信息。\n\n```\n\
    - (void)processGameCenterAuthentication:(NSError*)error;\n{\n    if (error !=\
    \ nil)\n    {\n        NSLog(@\"认证过程中发生错误：%@\", [error localizedDescription]);\n\
    \    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n\
    {\n    NSLog(@\"认证状态已变更：%@\", notif.object);\n}\n```\n\n在下一节中，我们将了解如何调用`GKTurnedBasedMatchmakerViewController`，以及如何处理在恢复或创建新对战时所需的委托方法。\n\
    \n## `GKTurnedBasedMatchmakerViewController`\n\n与排行榜和成就类似，苹果提供了一个默认类来显示创建新回合制比赛的图形界面。若要编程方式创建比赛，请参见后面的“编程方式创建比赛”一节。\n\
    \n我们首先在前一节创建的单个按钮的`IBAction`方法中操作新的配对对象。这里使用的方法与第 5 章所述的 Game Center 配对非常相似。我们首先分配并初始化一个`GKMatchRequest`实例，设置最小和最大玩家数。然后创建一个新的`GKTurnedBasedMatchmakerViewController`，并用刚创建的配对对象进行初始化。最后，将委托设置为`self`，并以模态方式向用户呈现该视图。此视图将类似于图\
    \ 9-3 所示。\n\n```\n- (IBAction)beginGame:(id)sender\n{\n    GKMatchRequest *match\
    \ = [[GKMatchRequest alloc] init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\
    \    GKTurnBasedMatchmakerViewController *tmvc = nil;\n    tmvc = [[GKTurnBasedMatchmakerViewController\
    \ alloc] initWithMatchRequest:match];\n    [tmvc setTurnBasedMatchmakerDelegate:\
    \ self];\n    [self presentViewController:tmvc animated:YES completion: nil];\n\
    \    [tmvc release];\n    [match release];\n}\n```\n\n**注意：** 在创建新的回合制比赛之前，必须先让`GKLocalPlayer`在\
    \ Game Center 中进行认证。\n\n为了遵守`GKTurnedBasedMatchmakerViewControllerDelegate`协议，需要实现四个委托方法。第一个方法处理用户在配对界面取消操作。唯一的要求是调用`dismissViewControllerAnimated:Completion:`。你可以根据应用需求添加额外的逻辑。\n\
    \n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:(GKTurnedBasedMatchmakerViewController*)viewController\n\
    {\n    [self dismissViewControllerAnimated: YES completion: nil];\n}\n```\n\n\
    **重要：** 当前游戏的列表可能不会立即更新，你需要关闭并重新打开`GKTurnedBasedMatchmakerViewController`。\n\n\
    ![A978-1-4302-4906-1_9_Fig3_HTML.jpg](img/A978-1-4302-4906-1_9_Fig3_HTML.jpg)\n\
    \n图 9-3. 开始新的回合制比赛\n\n我们还需要实现一个委托方法，以捕获此阶段发生的任何错误。以下方法在配对过程中遇到错误时被调用。为了调试，我们将错误信息输出到控制台；但在实际应用中，你需要告知用户发生了错误。\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController*)viewController\
    \ didFailWithError:(NSError *)error\n{\n    NSLog(@\"回合制配对失败，错误信息：%@\", [error\
    \ localizedDescription]);\n}\n```\n\n本节讨论的最后一个委托方法处理用户在配对界面退出比赛的情况。这通过滑动游戏并选择“退出”选项来实现。在以下方法中，我们调用方法参数中传递的比赛对象的`participantQuitOutOfTurnWithOutcome`方法，并传入`GKTurnedBasedMatchOutcomeQuit`结果。如果此处未调用正确的方法，虽然看起来可以退出游戏，但几秒钟后游戏会重新出现。\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController*)viewController\
    \ playerQuitForMatch:(GKTurnedBasedMatch *)match\n{\n    [match participantQuitOutOfTurnWithOutcome:GKTurnedBasedMatchOutcomeQuit\n\
    \                        withCompletionHandler:^(NSError *error) {\n         \
    \                   if (error)\n                            {\n              \
    \                  NSLog(@\"结束比赛时发生错误：%@\", [error localizedDescription]);\n \
    \                           }\n                        }];\n}\n```\n\n最后一个必需的方法`didFindMatch`将在下一节“开始新游戏”中讨论。\n"
- fmt: "# Starting a New Game\n\nStarting a new match with turn-based gaming is a\
    \ very straightforward and relatively simple process. To do so, you need to implement\
    \ the following method. This new method dismisses the `GKTurnBasedMatchmakerViewController`,\
    \ and then passes a copy of the match object to your game controller. The following\
    \ code snippet is the procedure followed for the tic-tac-toe sample app.\n\n```\n\
    - (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\
    \ *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n     [self dismissViewControllerAnimated:\
    \ YES completion: nil];\n     tictactoeGameViewController *gameVC = [[tictactoeGameViewController\
    \ alloc] init];\n     gameVC.match = match;\n      [[self navigationController]\
    \ pushViewController:gameVC animated:YES];\n      [gameVC release];\n}\n```\n\n\
    Let’s now switch attention to the `tictactoeGameViewController` class. Starting\
    \ with the header file, we create a new property to hold on to the match object,\
    \ which we set in the previous method. We also create a new mutable dictionary\
    \ to hold on to our game data, which will be discussed in more depth throughout\
    \ the rest of this chapter.\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\
    \n@interface tictactoeGameViewController : UIViewController\n\n@property(nonatomic,\
    \ retain) NSMutableDictionary *gameDictionary;\n@property(nonatomic, retain) GKTurnBasedMatch\
    \ *match;\n\n@end\n```\n\n**Important**\n\nYou are strictly limited to passing\
    \ only 4k of data with each new turn. If you cannot limit your game data to less\
    \ than 4k, you can use a URL to point to a server holding the complete data set.\
    \ Alternatively, you could pass only the delta of the game state and store the\
    \ existing data locally.\n\nWe need to pause here to configure the actual game\
    \ view (`tictactoeGameViewController`). We need nine spots for the user to move\
    \ in the tic-tac-toe game, as well as a forfeit option and a label to inform the\
    \ players of whose turn it is.\n\nWe use simple `UIButton`s to handle user input.\
    \ Modify the XIB file with a layout similar to that pictured in Figure [9-4](#A978-1-4302-4906-1_9_Chapter.html#Fig4).\
    \ You need to create `IBOutlet`s for each of the buttons and the label as well\
    \ as new `IBAction` methods for both making a move and forfeiting. Connect all\
    \ the board buttons to the `makeMove` method that you previously created. We also\
    \ need to set tags on the `UIButton`s to help us locate them. Begin with tag 1\
    \ in the upper-left corner and move left to right, up to down, numbering them.\n\
    \n![A978-1-4302-4906-1_9_Fig4_HTML.jpg](A978-1-4302-4906-1_9_Fig4_HTML.jpg)\n\n\
    Figure 9-4.\n\nA view of the game board, as seen from Interface Builder\n\nYou\
    \ now have two new methods in your game view controller, as well as nine button\
    \ outlets and one label outlet. Now that you have seen how to begin a new turn-based\
    \ gaming match, in the next section, we look at how to make a move and pass control\
    \ to the next player.\n\n## Making the First Move\n\nThe first thing we need to\
    \ do in a new match-based game, before we make a move, is determine which avatar\
    \ the player is representing. In our example game, there are two sides: X and\
    \ O. We are going to set the first person to always be X, and the second to always\
    \ be O. This means that X will always make the first move. With this setup, it\
    \ becomes easy to determine who the player currently is representing using the\
    \ following code snippet:\n\n```\nif (match.currentParticipant == [match.participants\
    \ objectAtIndex:0])\n{\n    myPlayerCharacter = @\"X\";\n    identifyTeamLabel.text\
    \ = @\"It is X's Turn\";\n}\nelse\n{\n    myPlayerCharacter = @\"O\";\n    identifyTeamLabel.text\
    \ = @\"It is O's Turn\";\n}\n```\n\nAfter we have determined who the users are,\
    \ then we can allow them to make a move. We will modify the code for the action\
    \ to which the nine game buttons are connected. First, let’s take a look at the\
    \ method in its completed form. Then, we can break it down and look at each part\
    \ in depth.\n\n```\n- (IBAction)makeMove:(id)sender\n{\n    [sender setTitle:myPlayerCharacter\
    \ forState:UIControlStateNormal];\n    NSString *buttonIndexString = [NSString\
    \ stringWithFormat:@\"%d\", [sender tag]];\n    [gameDictionary setObject:myPlayerCharacter\
    \ forKey:buttonIndexString];\n    NSData *data = [NSPropertyListSerialization\
    \ dataFromPropertyList:gameDictionary format:NSPropertyListXMLFormat_v1_0 errorDescription:nil];\n\
    \    GKTurnBasedParticipant *nextPlayer;\n    if (match.currentParticipant ==\
    \ [match.participants objectAtIndex:0]) {\n        nextPlayer = [[match participants]\
    \ lastObject];\n    } else {\n        nextPlayer = [[match participants] objectAtIndex:0];\n\
    \    }\n    if ([self checkWinner] != nil) {\n        if ([[self checkWinner]\
    \ isEqualToString:@\"Tie\"]) {\n            UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Game Over\" message:@\"Its a draw\" delegate:nil cancelButtonTitle:@\"\
    Dimiss\" otherButtonTitles: nil];\n            [alert show];\n            [alert\
    \ release];\n        } else {\n            UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Game Over\" message:nil delegate:nil cancelButtonTitle:@\"\
    Dimiss\" otherButtonTitles: nil];\n            [alert show];\n            [alert\
    \ release];\n        }\n        [self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\
    \ nextParticipant:nextPlayer turnTimeout: 32000 matchData:data completionHandler:^(NSError\
    \ *error) {\n            if (error) {\n                NSLog(@\"An error occurred\
