    Peer-to-peer networking over Bluetooth using GKSession


    A `GKSession` object primarily works with peers. A peer, in this context, is any
    iOS device made visible by creating and configuring a `GKSession` object of its
    own. Peers can only see other peers on apps that have the same bundle identifier
    as each other.


    Each peer is represented by a `peerID` string, which will always be unique. Your
    app can use a peer’s `peerID` to obtain a user-readable handle or name for that
    peer. Similarly, when your app begins a `GKSession`, it creates a peer to represent
    the local user, and this peer becomes visible to all nearby devices. Nearby devices,
    in this sense, would be any devices on the same local Wi-Fi network or within
    the range of Bluetooth, as detailed in Tables [6-1](#A978-1-4302-4906-1_6_Chapter.html#Tab1)
    and [6-2](#A978-1-4302-4906-1_6_Chapter.html#Tab2).


    Note


    Core Bluetooth was added to iDevices with iOS 5, which allows direct interaction
    with the bluetooth layer. If your implementation of Bluetooth is beyond the abilities
    of Game Kit, Core Bluetooth provides lower level functionality.


    Table 6-1.


    Ranges of Standard Bluetooth Devices


    | Bluetooth Class | Milliwatts (mW) | dBm (dBmW) | Approximate Range |

    | --- | --- | --- | --- |

    | Class 1 (iPhone 4s/5) | 100 | 20 | ∼100 Meters, or ∼328 Feet |

    | Class 2 (iPhone) | 2.5 | 4 | ∼10 Meters, or ∼32 Feet |

    | Class 3 | 1 | 0 | ∼1 Meter, or ∼3 Feet |


    Table 6-2.


    Data Rates for Standard Bluetooth Versions


    | Version | Data Rate | Maximum Application Throughput |

    | --- | --- | --- |

    | Version 1.2 | 1 Mbit/s | 0.7 Mbit/s |

    | Version 2.0 + EDR (iPhone) | 3 Mbit/s | 1.4 Mbit/s |

    | Version 3.0 +HS | 24 Mbit/s | N/A |

    | Version 4.0 (BLE) (iPhone 4s/5) | Variable | N/A |


    Apple has recently enabled support for Bluetooth connections between a device
    and the iOS Simulator. However, this support has some limitations: most notably,
    a device cannot find the Simulator through Bluetooth, so the Simulator will have
    to initiate the connection. Additionally, the iOS Simulator doesn’t detect whether
    the Mac has Bluetooth enabled. Finally, when the device receives a connection,
    it appears to come from the bundle ID string and not the device name, as shown
    in Figure [6-10](#A978-1-4302-4906-1_6_Chapter.html#Fig10) later in this chapter.


    Peers are discovered by other peers by using a unique string to identify the service
    that they are implementing. This unique string is the `sessionID` property. Sessions
    can be configured in one of three ways. A session can be configured to broadcast
    its `sessionID`, making it a server; or to search for other peers advertising
    with a sessionID, making it a client; or, finally, as both a server and a client
    simultaneously, referred to as a peer. In the next chapter we will explore network
    design on iOS in more depth.


    `GKSession` has an associated `GKSessionDelegate` protocol. The delegate is called
    whenever a new remote peer is discovered or attempts to connect, or when the connection
    state of a peer has changed. In addition, you will have to set a data-received
    handler to specify a delegate callback when new data is received. This can be
    different than the main `GKSessionDelegate`. [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html)
    explores exchanging data in complete detail.


    Note


    `GKSession` and its associated methods are thread-safe; however, the session will
    always call its delegate methods on the main thread.'
  trans: "\n# 使用会话（Sessions）\n\n在使用 Game Kit 网络功能时，你需要使用一个 `GKSession` 对象（参见图 6-3）将所有内容串联起来。此对象用于创建和管理设备之间的临时蓝牙或本地无线网络连接。运行在多台设备上的同一应用副本，可以利用这些服务来发现彼此、连接、握手、交换数据并优雅地断开连接。\n\
    \n> **注意**  \n> 原始 iPhone 或原始 iPod touch 不支持蓝牙联网。\n\n![A978-1-4302-4906-1_6_Fig3_HTML.jpg](img/A978-1-4302-4906-1_6_Fig3_HTML.jpg)\n\
    \n**图 6-3.** 使用 `GKSession` 通过蓝牙进行的点对点联网\n\n一个 `GKSession` 对象主要与对等节点（peers）协同工作。在此上下文中，对等节点是指任何通过创建并配置自身的\
    \ `GKSession` 对象而使其可见的 iOS 设备。对等节点只能看到运行着相同 bundle 标识符（bundle identifier）的其它应用上的对等节点。\n\
    \n每个对等节点由一个 `peerID` 字符串表示，该字符串始终是唯一的。你的应用可以使用某个对等节点的 `peerID` 来获取该对等节点的用户可读句柄或名称。类似地，当你的应用启动一个\
    \ `GKSession` 时，它会创建一个对等节点来代表本地用户，并且该对等节点会变得对附近所有设备可见。此处的“附近设备”指的是同一本地 Wi-Fi 网络上的任何设备，或蓝牙范围内的任何设备，详见表格\
    \ 6-1 和 6-2。\n\n> **注意**  \n> 从 iOS 5 开始，Core Bluetooth 被添加到 iDevices 中，允许与蓝牙层直接交互。如果你的蓝牙实现超出了\
    \ Game Kit 的能力范围，Core Bluetooth 提供了更底层的功能。\n\n**表 6-1.** 标准蓝牙设备的范围\n\n| 蓝牙类别 |\
    \ 毫瓦 (mW) | dBm (dBmW) | 近似范围 |\n| --- | --- | --- | --- |\n| 1 类 (iPhone 4s/5)\
    \ | 100 | 20 | 约 100 米，或约 328 英尺 |\n| 2 类 (iPhone) | 2.5 | 4 | 约 10 米，或约 32 英尺\
    \ |\n| 3 类 | 1 | 0 | 约 1 米，或约 3 英尺 |\n\n**表 6-2.** 标准蓝牙版本的数据速率\n\n| 版本 | 数据速率\
    \ | 最大应用吞吐量 |\n| --- | --- | --- |\n| 1.2 版本 | 1 Mbit/s | 0.7 Mbit/s |\n| 2.0\
    \ + EDR 版本 (iPhone) | 3 Mbit/s | 1.4 Mbit/s |\n| 3.0 + HS 版本 | 24 Mbit/s | 不适用\
    \ |\n| 4.0 (BLE) 版本 (iPhone 4s/5) | 可变 | 不适用 |\n\n苹果最近启用了设备与 iOS Simulator 之间的蓝牙连接支持。然而，此支持存在一些限制：最值得注意的是，设备无法通过蓝牙找到\
    \ Simulator，因此 Simulator 必须发起连接。此外，iOS Simulator 不会检测 Mac 是否已启用蓝牙。最后，当设备收到连接时，连接的来源将显示为\
    \ bundle ID 字符串而非设备名称，如本章后面图 6-10 所示。\n\n对等节点通过使用一个唯一字符串来标识其所实现的服务，从而被其他对等节点发现。这个唯一字符串就是\
    \ `sessionID` 属性。会话可以配置为三种模式之一：会话可以配置为广播其 `sessionID`，从而充当服务器（server）；或者搜索其他使用\
    \ `sessionID` 进行广告宣传的对等节点，从而充当客户端（client）；最后，也可以同时充当服务器和客户端，这被称为对等节点（peer）。在下一章中，我们将更深入地探讨\
    \ iOS 上的网络设计。\n\n`GKSession` 有一个关联的 `GKSessionDelegate` 协议。每当发现新的远程对等节点、远程对等节点尝试连接，或某个对等节点的连接状态发生改变时，系统都会调用该委托。此外，你还需要设置一个数据接收处理程序（data-received\
    \ handler），以便在接收到新数据时指定委托回调。这个回调可以与主要的 `GKSessionDelegate` 不同。第 8 章 将详细探讨数据交换。\n\
    \n> **注意**  \n> `GKSession` 及其相关方法是线程安全的；然而，会话始终会在主线程上调用其委托方法。\n"
- fmt: "# Presenting a Peer Picker\n\nWe will begin, as we have in the past, by adding\
    \ a new button for our Peer Picker in our `UFOViewController.xib`, as shown in\
    \ Figure 6-4. Create a new action for the button and name it `localMultiplayerGameButtonPressed`.\
    \ In addition, you need to create two new class variables, one instance of `GKPeerPickerController`\
    \ and another for a `GKSession`. Name these `peerPickerController` and `currentSession`,\
    \ respectively. You also need to conform the `UFOViewController` to the delegate\
    \ `GKPeerPickerControllerDelegate`.\n\n![A978-1-4302-4906-1_6_Fig4_HTML.jpg](A978-1-4302-4906-1_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4. Adding a button for a local multiplayer game\n\nAdd the following\
    \ code to the action that you created for the new local button.\n\n```\n- (IBAction)localMultiplayerGameButtonPressed\n\
    {\n    peerPickerController = [[GKPeerPickerController alloc] init];\n    [peerPickerController\
    \ setDelegate:self];\n    [peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];\n\
    \    [peerPickerController show];\n}\n```\n\nThis code is fairly self-explanatory:\
    \ we `alloc` and `init` a new instance of `GKPeerPickerController`, and set its\
    \ delegate to `self`.\n\nWe do need to specify a mask for the connection type.\
    \ There are two options available to us, `GKPeerPickerConnectionTypeNearby` and\
    \ `GKPeerPickerConnectionTypeOnline`. In this example, we are using `GKPeerPickerConnectionTypeNearby`,\
    \ which will allow Bluetooth connections. The `GKPeerPickerConnectionTypeOnline`\
    \ constant will allow online connections through the local wireless network.\n\
    \nYou can also supply both and allow the user to select. After the user selects\
    \ an option, you can continue as if you had provided only one choice to the user.\
    \ If you were to run the app now and select Local, you should see a new `UIAlert`\
    \ that looks like Figure 6-5.\n\n![A978-1-4302-4906-1_6_Fig5_HTML.jpg](A978-1-4302-4906-1_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5. The alert shown while searching for Bluetooth peers. Notice that\
    \ the alert is gray instead of the blue usually seen with `UIAlert`s\n\nGo ahead\
    \ and install the app on a second device, or the Simulator if you don’t have a\
    \ second device. When the app is ready on both devices, launch it and select the\
    \ Local game option. You will, at first, see an image similar to that shown in\
    \ Figure 6-5. After several seconds, the devices should find each other, and you\
    \ should see an alert similar to that shown in Figure 6-6.\n\n> **Note:** It can\
    \ take up to 30 seconds for two Bluetooth devices to find each other. The farther\
    \ apart the devices are, the longer it can take to establish a connection.\n\n\
    ![A978-1-4302-4906-1_6_Fig6_HTML.jpg](A978-1-4302-4906-1_6_Fig6_HTML.jpg)\n\n\
    Figure 6-6. Finding a peer with the Peer Picker\n\nIf Bluetooth is turned off\
    \ on the user’s device and you begin a `GKSession`, the user will be prompted\
    \ to enable Bluetooth, as shown in Figure 6-7.\n\n![A978-1-4302-4906-1_6_Fig7_HTML.jpg](A978-1-4302-4906-1_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7. Prompting the user to enable Bluetooth on a device. You cannot enable\
    \ Bluetooth in any other manner from within your apps\n\nIf you select one of\
    \ the peers from the list of available peers, you will get a waiting message,\
    \ as shown in Figure 6-8. The device that was invited will see a message, as shown\
    \ in Figure 6-9; or, if invited by the Simulator, the device will show a message\
    \ such as that shown in Figure 6-10.\n\nWith the relatively small amount of code\
    \ we have written, all the functionality is provided to us via the API. If you\
    \ happen to tap on the Accept button, you will notice that nothing happens. In\
    \ the section \"The Peer Picker Delegate,\" we will implement the delegate calls\
    \ required to complete the functionality of the Peer Picker.\n\n![A978-1-4302-4906-1_6_Fig10_HTML.jpg](A978-1-4302-4906-1_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. Incoming invitation to a device from the Simulator. Notice the\
    \ bundle ID as the device name\n\n![A978-1-4302-4906-1_6_Fig9_HTML.jpg](A978-1-4302-4906-1_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9. Incoming invitation to a device from a peer device\n\n![A978-1-4302-4906-1_6_Fig8_HTML.jpg](A978-1-4302-4906-1_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8. Bluetooth waiting for a connection to be established\n\n# Advanced\
    \ `GKSession` Interaction\n\nThere may be times when you want to get your hands\
    \ dirty and dig into your `GKSession` object a little deeper than we saw with\
    \ the initial configuration. Table 6-3 lists the available properties for customization\
    \ of the `GKSession` object.\n\nTable 6-3. Properties Available on a `GKSession`\
    \ Object\n\n| Property Name | Description |\n| --- | --- |\n| `available` | The\
    \ `available` property is used to determine whether your peer is visible to other\
    \ peers looking for a connection. This property is typically set for you through\
    \ the Peer Picker, but you can set it yourself. After this Boolean value is set\
    \ to `YES`, you will remain connected to any peer that you have already connected\
    \ to, but you will not receive new connection requests. |\n| `delegate` | The\
    \ `GKSession` `delegate` property is discussed at length in the following section.\
    \ |\n| `disconnectTimeout` | The `disconnectTimeout` property is the timeout amount\
    \ in seconds that your session will wait before it disconnects a non-responsive\
    \ peer. Apple provides a default number for this value, which through testing,\
    \ appears to be between 20 and 30 seconds. The exact number is not disclosed in\
    \ the documentation. |\n| `displayName` | The `displayName` property is a read-only\
    \ `NSString` that represents the peer’s human-readable name; this is the property\
    \ that should be displayed to other users through your GUI. The `displayName`\
    \ property is the same as the name of the device as seen in iTunes. |\n| `peerID`\
    \ | The `peerID` property is a read-only string that identifies your session peer\
    \ to other devices. This value is unique. The `peerID` value should not be displayed\
    \ directly to users. |\n| `sessionID` | The `sessionID` property is used by sessions\
    \ configured as servers to advertise themselves to other peers, and by sessions\
    \ configured as clients to search for compatible servers. The `sessionID` should\
    \ be the short name of an approved Bonjour service type. |\n| `sessionMode` |\
    \ The `sessionMode` property is the session used to find other peers. This value\
    \ is read-only and is configured when you first initialize a new session. It has\
    \ three possible values: `GKSessionModeServer`, `GKSessionModeClient`, and `GKSessionModePeer`.\
    \ |"
  raw: '## Presenting a Peer Picker


    We will begin, as we have in the past, by adding a new button for our Peer Picker
    in our `UFOViewController.xib`, as shown in Figure [6-4](#A978-1-4302-4906-1_6_Chapter.html#Fig4).
    Create a new action for the button and name it `localMultiplayerGameButtonPressed`.
    In addition, you need to create two new class variables, one instance of `GKPeerPickerController`
    and another for a `GKSession`. Name these `peerPickerController` and `currentSession`,
    respectively. You also need to conform the `UFOViewController` to the delegate
    `GKPeerPickerControllerDelegate`.


    ![A978-1-4302-4906-1_6_Fig4_HTML.jpg](A978-1-4302-4906-1_6_Fig4_HTML.jpg)


    Figure 6-4.


    Adding a button for a local multiplayer game


    Add the following code to the action that you created for the new local button.


    `- (IBAction)localMultiplayerGameButtonPressed`


    `{`


    `peerPickerController = [[GKPeerPickerController alloc] init];`


    `[peerPickerController setDelegate:self];`


    `[peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];`


    `[peerPickerController show];`


    `}`


    This code is fairly self-explanatory: we `alloc` and `init` a new instance of
    GKPeerPickerController, and set its delegate to `self`.


    We do need to specify a mask for the connection type. There are two options available
    to us, `GKPeerPickerConnectionTypeNearby` and `GKPeerPickerConnectionTypeOnline`.
    In this example, we are using `GKPeerPickerConnectionTypeNearby`, which will allow
    Bluetooth connections. The `GKPeerPickerConnectionTypeOnline` constant will allow
    online connections through the local wireless network.


    You can also supply both and allow the user to select. After the user selects
    an option, you can continue as if you had provided only one choice to the user.
    If you were to run the app now and select Local, you should see a new UIAlert
    that looks like Figure [6-5](#A978-1-4302-4906-1_6_Chapter.html#Fig5).


    ![A978-1-4302-4906-1_6_Fig5_HTML.jpg](A978-1-4302-4906-1_6_Fig5_HTML.jpg)


    Figure 6-5.


    The alert shown while searching for Bluetooth peers. Notice that the alert is
    gray instead of the blue usually seen with UIAlerts


    Go ahead and install the app on a second device, or the Simulator if you don’t
    have a second device. When the app is ready on both devices, launch it and select
    the Local game option. You will, at first, see an image similar to that shown
    in Figure [6-5](#A978-1-4302-4906-1_6_Chapter.html#Fig5). After several seconds,
    the devices should find each other, and you should see an alert similar to that
    shown in Figure [6-6](#A978-1-4302-4906-1_6_Chapter.html#Fig6).


    Note


    It can take up to 30 seconds for two Bluetooth devices to find each other. The
    farther apart the devices are, the longer it can take to establish a connection.


    ![A978-1-4302-4906-1_6_Fig6_HTML.jpg](A978-1-4302-4906-1_6_Fig6_HTML.jpg)


    Figure 6-6.


    Finding a peer with the Peer Picker Tip


    If Bluetooth is turned off on the user’s device and you begin a `GKSession`, the
    user will be prompted to enable Bluetooth, as shown in Figure [6-7](#A978-1-4302-4906-1_6_Chapter.html#Fig7).


    ![A978-1-4302-4906-1_6_Fig7_HTML.jpg](A978-1-4302-4906-1_6_Fig7_HTML.jpg)


    Figure 6-7.


    Prompting the user to enable Bluetooth on a device. You cannot enable Bluetooth
    in any other manner from within your apps


    If you select one of the peers from the list of available peers, you will get
    a waiting message, as shown in Figure [6-8](#A978-1-4302-4906-1_6_Chapter.html#Fig8).
    The device that was invited will see a message, as shown in Figure [6-9](#A978-1-4302-4906-1_6_Chapter.html#Fig9);
    or, if invited by the Simulator, the device will show a message such as that shown
    in Figure [6-10](#A978-1-4302-4906-1_6_Chapter.html#Fig10).


    With the relatively small amount of code we have written, all the functionality
    is provided to us via the API. If you happen to tap on the Accept button, you
    will notice that nothing happens. In the section “The Peer Picker Delegate,” we
    will implement the delegate calls required to complete the functionality of the
    Peer Picker.


    ![A978-1-4302-4906-1_6_Fig10_HTML.jpg](A978-1-4302-4906-1_6_Fig10_HTML.jpg)


    Figure 6-10.


    Incoming invitation to a device from the Simulator. Notice the bundle ID as the
    device name


    ![A978-1-4302-4906-1_6_Fig9_HTML.jpg](A978-1-4302-4906-1_6_Fig9_HTML.jpg)


    Figure 6-9.


    Incoming invitation to a device from a peer device


    ![A978-1-4302-4906-1_6_Fig8_HTML.jpg](A978-1-4302-4906-1_6_Fig8_HTML.jpg)


    Figure 6-8.


    Bluetooth waiting for a connection to be established


    ## Advanced GKSession Interaction


    There may be times when you want to get your hands dirty and dig into your `GKSession`
    object a little deeper than we saw with the initial configuration. Table [6-3](#A978-1-4302-4906-1_6_Chapter.html#Tab3)
    lists the available properties for customization of the `GKSession` object.


    Table 6-3.


    Properties Available on a GKSession Object


    | Property Name | Description |

    | --- | --- |

    | `available` | The `available` property is used to determine whether your peer
    is visible to other peers looking for a connection. This property is typically
    set for you through the Peer Picker, but you can set it yourself. After this Boolean
    value is set to YES, you will remain connected to any peer that you have already
    connected to, but you will not receive new connection requests. |

    | `delegate` | The GKSession `delegate` property is discussed at length in the
    following section. |

    | `disconnectTimeout` | The `disconnectTimeout` property is the timeout amount
    in seconds that your session will wait before it disconnects a non-responsive
    peer. Apple provides a default number for this value, which through testing, appears
    to be between 20 and 30 seconds. The exact number is not disclosed in the documentation.
    |

    | `displayName` | The `displayName` property is a read-only `NSString` that represents
    the peer’s human-readable name; this is the property that should be displayed
    to other users through your GUI. The `displayName` property is the same as the
    name of the device as seen in iTunes. |

    | `peerID` | The `peerID` property is a read-only string that identifies your
    session peer to other devices. This value is unique. The `peerID` value should
    not be displayed directly to users. |

    | `sessionID` | The `sessionID` property is used by sessions configured as servers
    to advertise themselves to other peers, and by sessions configured as clients
    to search for compatible servers. The `sessionID` should be the short name of
    an approved Bonjour service type. |

    | `sessionMode` | The `sessionMode` property is the session used to find other
    peers. This value is read-only and is configured when you first initialize a new
    session. It has three possible values: `GKSessionModeServer`, `GKSessionModeClient`,
    and `GKSessonModePeer`. |'
  trans: "\n# 展示对等选择器\n\n与以往一样，我们将首先在`UFOViewController.xib`中为对等选择器添加一个新按钮，如图 6-4\
    \ 所示。为这个按钮创建一个新的操作方法，命名为`localMultiplayerGameButtonPressed`。此外，你需要创建两个新的类变量：一个是`GKPeerPickerController`的实例，另一个是`GKSession`的实例。分别将它们命名为`peerPickerController`和`currentSession`。你还需要让`UFOViewController`符合`GKPeerPickerControllerDelegate`委托协议。\n\
    \n![A978-1-4302-4906-1_6_Fig4_HTML.jpg](img/A978-1-4302-4906-1_6_Fig4_HTML.jpg)\n\
    \n图 6-4. 为本地多人游戏添加按钮\n\n将以下代码添加到新本地按钮对应的操作方法中。\n\n```\n- (IBAction)localMultiplayerGameButtonPressed\n\
    {\n    peerPickerController = [[GKPeerPickerController alloc] init];\n    [peerPickerController\
    \ setDelegate:self];\n    [peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];\n\
    \    [peerPickerController show];\n}\n```\n\n这段代码不言自明：我们`alloc`并`init`了一个`GKPeerPickerController`的新实例，并将其委托设置为`self`。\n\
    \n我们需要为连接类型指定一个掩码。有两个选项可供我们选择：`GKPeerPickerConnectionTypeNearby`和`GKPeerPickerConnectionTypeOnline`。在本例中，我们使用`GKPeerPickerConnectionTypeNearby`，这将启用蓝牙连接。而`GKPeerPickerConnectionTypeOnline`常量则允许通过本地无线网络进行在线连接。\n\
    \n你也可以同时提供这两个选项，让用户自行选择。用户选择后，你可以继续处理，就像只给用户提供了一个选项一样。如果你现在运行应用并选择“本地”，你应该会看到一个类似图\
    \ 6-5 的新`UIAlert`。\n\n![A978-1-4302-4906-1_6_Fig5_HTML.jpg](img/A978-1-4302-4906-1_6_Fig5_HTML.jpg)\n\
    \n图 6-5. 搜索蓝牙对等设备时显示的提示。注意，此提示显示为灰色，而非`UIAlert`通常的蓝色\n\n继续将应用安装到第二台设备上，如果没有第二台设备，也可以安装到模拟器上。当两台设备上的应用都准备就绪后，启动应用并选择“本地游戏”选项。起初，你会看到类似于图\
    \ 6-5 所示的画面。几秒钟后，两台设备应该能找到彼此，然后你应该会看到类似于图 6-6 所示的提示。\n\n> **注意：** 两台蓝牙设备相互发现可能需要长达\
    \ 30 秒的时间。设备之间的距离越远，建立连接所需的时间就可能越长。\n\n![A978-1-4302-4906-1_6_Fig6_HTML.jpg](img/A978-1-4302-4906-1_6_Fig6_HTML.jpg)\n\
    \n图 6-6. 使用对等选择器查找对等设备\n\n如果用户设备上的蓝牙已关闭，而你启动了`GKSession`，系统将提示用户启用蓝牙，如图 6-7 所示。\n\
    \n![A978-1-4302-4906-1_6_Fig7_HTML.jpg](img/A978-1-4302-4906-1_6_Fig7_HTML.jpg)\n\
    \n图 6-7. 提示用户在设备上启用蓝牙。你无法通过应用内的其他任何方式启用蓝牙\n\n如果你从可用对等设备列表中选择了其中一个，你会看到一条等待消息，如图\
    \ 6-8 所示。被邀请的设备会看到一条消息，如图 6-9 所示；或者，如果是由模拟器发出的邀请，设备会显示类似图 6-10 的消息。\n\n凭借我们编写的相对较少的代码，所有功能都已通过\
    \ API 提供给我们。如果你碰巧点击了“接受”按钮，你会发现没有任何反应。在“对等选择器委托”一节中，我们将实现完成对等选择器功能所需的委托调用。\n\n\
    ![A978-1-4302-4906-1_6_Fig10_HTML.jpg](img/A978-1-4302-4906-1_6_Fig10_HTML.jpg)\n\
    \n图 6-10. 从模拟器向设备发来的邀请。注意，设备名称显示为包标识符\n\n![A978-1-4302-4906-1_6_Fig9_HTML.jpg](img/A978-1-4302-4906-1_6_Fig9_HTML.jpg)\n\
    \n图 6-9. 从另一台对等设备向设备发来的邀请\n\n![A978-1-4302-4906-1_6_Fig8_HTML.jpg](img/A978-1-4302-4906-1_6_Fig8_HTML.jpg)\n\
    \n图 6-8. 蓝牙等待建立连接\n\n# 高级`GKSession`交互\n\n有时，你可能想要更深入地介入`GKSession`对象，而不只是我们之前看到的初始配置。表\
    \ 6-3 列出了可用于自定义`GKSession`对象的可用属性。\n\n表 6-3. `GKSession`对象上的可用属性\n\n| 属性名称 | 描述\
    \ |\n| --- | --- |\n| `available` | `available`属性用于判断你的对等设备是否对其他正在寻找连接的对等设备可见。通常，此属性会通过对等选择器为你设置，但你也自己设置。当此布尔值设置为`YES`后，你将继续保持与已经连接的任何对等设备的连接，但不会接收到新的连接请求。\
    \ |\n| `delegate` | `GKSession`的`delegate`属性将在下一节中详细讨论。 |\n| `disconnectTimeout`\
    \ | `disconnectTimeout`属性是超时时间（以秒为单位），即你的会话在断开无响应的对等设备之前等待的时间。Apple 为此值提供了一个默认值，经过测试，该值似乎在\
    \ 20 到 30 秒之间。文档中未透露确切数值。 |\n| `displayName` | `displayName`属性是一个只读的`NSString`，代表对等设备的人类可读名称；此属性应通过你的\
    \ GUI 显示给其他用户。`displayName`属性与 iTunes 中显示的设备名称相同。 |\n| `peerID` | `peerID`属性是一个只读字符串，用于向其他设备标识你的会话对等设备。该值是唯一的。`peerID`值不应直接显示给用户。\
    \ |\n| `sessionID` | `sessionID`属性由配置为服务器的会话用来向其他对等设备广播自身，以及由配置为客户端的会话用来搜索兼容的服务器。`sessionID`应为经过批准的\
    \ Bonjour 服务类型的简短名称。 |\n| `sessionMode` | `sessionMode`属性是用于查找其他对等设备的会话。此属性是只读的，在首次初始化新会话时进行配置。它有三个可能的值：`GKSessionModeServer`、`GKSessionModeClient`和`GKSessionModePeer`。\
    \ |\n"
- fmt: "# The Peer Picker Delegate\n\nIn the previous sections, we saw that we get\
    \ a lot for free when using a `GKPeerPickerController`. However, after we accepted\
    \ a connection from another user, our app didn’t yet know how to proceed.\n\n\
    In this section, we discuss the `GKPeerPickerControllerDelegate`. This delegate\
    \ is called by the Peer Picker to create a new session object and used to handle\
    \ state changes that occur throughout the course of normal networking.\n\nThe\
    \ `GKPeerPickerControllerDelegate` has three main responsibilities that you will\
    \ need to implement and respond to. It needs to create the session, respond to\
    \ new connection messages, and handle the user cancelling out of the Peer Picker.\n\
    \nFirst, let’s look at `peerPickerController:didSelectConnectionType:`. This delegate\
    \ method informs us what connection type the user has selected. You may recall\
    \ from earlier sections that we worked with `connectionTypeMask`. If you provide\
    \ the user with an option for selecting whether to connect using the LAN or Bluetooth,\
    \ this delegate method will return the selection. If the user selects an online\
    \ connection, you should dismiss the peerPicker controller and display your own\
    \ LAN connection view; see the following code snippet for an example of this behavior.\n\
    \n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\ndidSelectConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n    if (type == GKPeerPickerConnectionTypeOnline)\n    {\n        [picker dismiss];\n\
    \        [picker release];\n        // Display your own user interface here.\n\
    \    }\n}\n```\n\nThe `GKPeerPickerControllerDelegate` is also responsible for\
    \ returning a `GKSession`. When your Peer Picker needs a session object, it will\
    \ call `peerPickerController:sessionForConnectionType:`. If you are implementing\
    \ this method, you must either create or return an existing `GKSession`.\n\n**Note**\n\
    \nIf you are creating a new `GKSession` as part of `peerPickerController:sessionForConnectionType:`,\
    \ the session that you create must advertise itself as `GKSessionModePeer`. If\
    \ you do not need to implement `peerPickerController:sessionForConnectionType:`,\
    \ and the session is using the Bluetooth protocol, the peer controller allocates\
    \ a new session with the default `sessionID` and `displayName` parameters. If\
    \ you are creating a new LAN connection, you will need to implement `peerPickerController:sessionForConnectionType:`\
    \ and return the required `GKSession`.\n\nYou also need to implement `peerPickerControllerDidCancel:`.\
    \ Even though this method is optional, Game Kit expects it to be implemented.\
    \ After this method is returned, the Peer Picker will automatically be dismissed,\
    \ so you will not need to add code to handle this event.\n\nThe last delegate\
    \ method we need to implement when working with the `GKPeerPickerControllerDelegate`\
    \ is `peerPickerController:didConnectPeer:toSession:`. This method is called whenever\
    \ a new peer is connected to the session.\n\n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\n\
    didConnectPeer:(NSString*)peerID\ntoSession:(GKSession*)session\n{\n    currentSession\
    \ = session;\n    //hold on to session and peerID\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nWhen this method is called, we will want to keep a reference to the\
    \ session and `peerID`. We will use these in the upcoming chapters when we begin\
    \ to work with sending data back and forth. Once a peer has successfully connected,\
    \ your app should take ownership of the session and dismiss the Peer Picker.\n\
    \nFigure [6-11](#A978-1-4302-4906-1_6_Chapter.html#Fig11) represents viewing a\
    \ peer iPhone that has entered the connected state and set its availability flag\
    \ to NO.\n\n![A978-1-4302-4906-1_6_Fig11_HTML.jpg](A978-1-4302-4906-1_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11.\n\nThe device named Miranda has set its availability status to\
    \ false.\n\n**Note**\n\nAlthough `peerPickerController:didConnectPeer:toSession:`\
    \ is an optional protocol method, you will be required to implement it before\
    \ you can fully enable Game Kit networking.\n\n## Summary\n\nIn this chapter you\
    \ learned about using Game Kit networking to connect two devices together using\
    \ either the local area network (Wi-Fi) or Bluetooth. In the previous chapter,\
    \ we worked with matchmaking and invitations. Between these two technologies we\
    \ have completely covered all the methods available to find and connect to peers\
    \ using Game Center and Game Kit technology on the iOS platform.\n\nWe also looked\
    \ at some real-world examples of iOS apps that have benefited from Game Kit networking\
    \ integration, and you saw how easy it was to move your app up to the next tier\
    \ of quality with only a small amount of time invested.\n\nIn addition, we explored\
    \ the workings of the Peer Picker, including how to request a new session using\
    \ either Bluetooth or the LAN, and how to connect peers together. We also covered\
    \ the entire delegate and controller overhead required to get these systems up\
    \ and running quickly in your own apps.\n\nIn the next chapter, we will discuss\
    \ how to design a network for mobile devices, beginning with an overview of network\
    \ types and including the do’s and don’ts of mobile network design. In [Chapter\
    \ 8](#A978-1-4302-4906-1_8_Chapter.html), we will tie together all the peers that\
    \ we have been establishing connections with and have them begin to talk to each\
    \ other.\n\n# 7. Network Design Overview\n\n**Abstract**\n\nIn previous chapters,\
    \ we explored how to find and establish connections to peers through a variety\
    \ of methods using both Game Center and Game Kit. In this chapter, we will look\
    \ at how to design a networking experience for not just an iOS game but also a\
    \ game on any platform. This chapter is designed slightly differently than the\
    \ previous chapters in this book. Primarily, there will be no associated source\
    \ code with this chapter, and we will only briefly touch on any iOS-specific networking\
    \ topics. This chapter will focus instead on the concepts of network design, as\
    \ opposed to actual network implementation within an app. Long time developers\
    \ may be familiar with these network types from previous development, besides\
    \ iOS being inherently wireless there are no differences from textbook networking\
    \ examples. In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html), you will discover\
    \ how to tie everything together and have your peers begin to communicate with\
    \ each other."
  raw: '## The Peer Picker Delegate


    In the previous sections, we saw that we get a lot for free when using a `GKPeerPickerController`.
    However, after we accepted a connection from another user, our app didn’t yet
    know how to proceed.


    In this section, we discuss the `GKPeerPickerControllerDelegate`. This delegate
    is called by the Peer Picker to create a new session object and used to handle
    state changes that occur throughout the course of normal networking.


    The `GKPeerPickerControllerDelegate` has three main responsibilities that you
    will need to implement and respond to. It needs to create the session, respond
    to new connection messages, and handle the user cancelling out of the Peer Picker.


    First, let’s look at `peerPickerController:didSelectConnectionType:`. This delegate
    method informs us what connection type the user has selected. You may recall from
    earlier sections that we worked with `connectionTypeMask`. If you provide the
    user with an option for selecting whether to connect using the LAN or Bluetooth,
    this delegate method will return the selection. If the user selects an online
    connection, you should dismiss the peerPicker controller and display your own
    LAN connection view; see the following code snippet for an example of this behavior.


    `- (void)peerPickerController:(GKPeerPickerController*)picker`


    `didSelectConnectionType:(GKPeerPickerConnectionType)type`


    `{`


    `if (type == GKPeerPickerConnectionTypeOnline)`


    `{`


    `[picker dismiss];`


    `[picker release];`


    `// Display your own user interface here.`


    `}`


    `}`


    The `GKPeerPickerControllerDelegate` is also responsible for returning a `GKSession`.
    When your Peer Picker needs a session object, it will call `peerPickerController:sessionForConnectionType:`.
    If you are implementing this method, you must either create or return an existing
    `GKSession`.


    Note


    If you are creating a new `GKSession` as part of `peerPickerController:sessionForConnectionType:`,
    the session that you create must advertise itself as `GKSessionModePeer`. If you
    do not need to implement `peerPickerController:sessionForConnectionType:`, and
    the session is using the Bluetooth protocol, the peer controller allocates a new
    session with the default `sessionID` and `displayName` parameters. If you are
    creating a new LAN connection, you will need to implement `peerPickerController:sessionForConnectionType:`
    and return the required `GKSession`.


    You also need to implement `peerPickerControllerDidCancel:`. Even though this
    method is optional, Game Kit expects it to be implemented. After this method is
    returned, the Peer Picker will automatically be dismissed, so you will not need
    to add code to handle this event.


    The last delegate method we need to implement when working with the `GKPeerPickerControllerDelegate`
    is `peerPickerController:didConnectPeer:toSession:`. This method is called whenever
    a new peer is connected to the session.


    `- (void)peerPickerController:(GKPeerPickerController*)picker`


    `didConnectPeer:(NSString*)peerID`


    `toSession:(GKSession*)session`


    `{`


    `currentSession = session;`


    `//hold on to session and peerID`


    `[self dismissModalViewControllerAnimated:YES];`


    `}`


    When this method is called, we will want to keep a reference to the session and
    `peerID`. We will use these in the upcoming chapters when we begin to work with
    sending data back and forth. Once a peer has successfully connected, your app
    should take ownership of the session and dismiss the Peer Picker.


    Figure [6-11](#A978-1-4302-4906-1_6_Chapter.html#Fig11) represents viewing a peer
    iPhone that has entered the connected state and set its availability flag to NO.


    ![A978-1-4302-4906-1_6_Fig11_HTML.jpg](A978-1-4302-4906-1_6_Fig11_HTML.jpg)


    Figure 6-11.


    The device named Miranda has set its availability status to false. Note


    Although `peerPickerController:didConnectPeer:toSession:` is an optional protocol
    method, you will be required to implement it before you can fully enable Game
    Kit networking.


    ## Summary


    In this chapter you learned about using Game Kit networking to connect two devices
    together using either the local area network (Wi-Fi) or Bluetooth. In the previous
    chapter, we worked with matchmaking and invitations. Between these two technologies
    we have completely covered all the methods available to find and connect to peers
    using Game Center and Game Kit technology on the iOS platform.


    We also looked at some real-world examples of iOS apps that have benefited from
    Game Kit networking integration, and you saw how easy it was to move your app
    up to the next tier of quality with only a small amount of time invested.


    In addition, we explored the workings of the Peer Picker, including how to request
    a new session using either Bluetooth or the LAN, and how to connect peers together.
    We also covered the entire delegate and controller overhead required to get these
    systems up and running quickly in your own apps.


    In the next chapter, we will discuss how to design a network for mobile devices,
    beginning with an overview of network types and including the do’s and don’ts
    of mobile network design. In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html),
    we will tie together all the peers that we have been establishing connections
    with and have them begin to talk to each other.


    # 7. Network Design Overview


    Abstract


    In previous chapters, we explored how to find and establish connections to peers
    through a variety of methods using both Game Center and Game Kit. In this chapter,
    we will look at how to design a networking experience for not just an iOS game
    but also a game on any platform. This chapter is designed slightly differently
    than the previous chapters in this book. Primarily, there will be no associated
    source code with this chapter, and we will only briefly touch on any iOS-specific
    networking topics. This chapter will focus instead on the concepts of network
    design, as opposed to actual network implementation within an app. Long time developers
    may be familiar with these network types from previous development, besides iOS
    being inheritently wireless there are no differences from textbook networking
    examples. In Chapter 8, you will discover how to tie everything together and have
    your peers begin to communicate with each other.


