  trans: "\n![A978-1-4302-4906-1_11_Fig8_HTML.jpg](img/A978-1-4302-4906-1_11_Fig8_HTML.jpg)\n\
    \n**图 11-8.** 在 iTunes Connect 中为产品添加本地化描述\n\n添加消耗型产品的步骤与非消耗型产品相同。如果你想添加基于订阅的产品，需要注意几个新增的字段，如图\
    \ 11-9 所示。配置订阅时，你需要定义订阅时长。iTunes Connect 支持以下选项：一周、一个月、两个月、三个月、六个月或一年。如果用户同意参与营销活动（例如提供电子邮件地址），你还可以选择提供免费订阅。\n\
    \n![A978-1-4302-4906-1_11_Fig9_HTML.jpg](img/A978-1-4302-4906-1_11_Fig9_HTML.jpg)\n\
    \n**图 11-9.** 在 iTunes Connect 中配置订阅时长\n\n现在，你应该已经为应用内购买配置了至少一个产品。iTunes Connect\
    \ 中的界面应类似于图 11-10。这完成了启用应用内购买所需的 iTunes Connect 初始配置。在下一节中，我们将开始处理在设备上完成购买所需的代码。\n\
    \n> **注意：** 暂时不必为“等待截图”错误担心；这将在后续流程中处理。在等待上传截图期间，你仍然可以测试购买。\n\n![A978-1-4302-4906-1_11_Fig10_HTML.jpg](img/A978-1-4302-4906-1_11_Fig10_HTML.jpg)\n\
    \n**图 11-10.** 产品已设置完毕，准备在应用中使用\n\n## 向应用添加产品\n\n苹果并未为应用内购买提供预设计的图形界面。作为开发者，你需要自行设计用户商店界面。在本节中，你将学习如何将在\
    \ iTunes Connect 中添加的产品显示在应用内供用户购买。\n\n> **注意：** 新购买和更改可能需要数小时才能生效。如果反复检查后仍看不到产品，请等待几小时再试。\n\
    \n### 应用标识与内购\n\n处理应用内购买时，苹果要求你的应用标识（App ID）不能包含通配符，例如 `76P4G6KX56.*`。你必须有一个唯一的应用标识，例如\
    \ `76P4G6KX56.com.dragonforged.ufo`。如果没有唯一标识，则需要创建一个。请按照以下步骤创建新的唯一应用标识。\n\n在浏览器中访问\
    \ [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)，从右侧列表中选择“iPhone\
    \ 开发者计划门户”。从左侧列中选择“应用标识”，然后点击右上角的“新建应用标识”按钮。填写应用的相关信息，点击“提交”。接着点击列表旁的“配置”按钮，确保“应用内购买”已开启（默认应为开启状态）。\n\
    \n### 设置\n\n首先，我们将从应用中请求产品列表。首先，将 `StoreKit` 框架添加到你的项目中。我们将修改前一章节中已有的 UFO 项目；你也可以跟随自己的项目操作，这样更方便。\n\
    \n> **重要提示：** 应用内购买无法在模拟器上运行；所有测试必须在真机上进行。\n\n创建一个名为 `UFOStoreViewController`\
    \ 的新类。我们将使用此类向用户展示商店界面。头部文件设置如下：\n\n```\n#import <UIKit/UIKit.h>\n#import <StoreKit/StoreKit.h>\n\
    @interface UFOStoreViewController : UIViewController <SKProductsRequestDelegate>\n\
    {\n    SKProductsRequest *productsRequest\n}\n@end\n```\n\n如你所见，我们导入了 `StoreKit`\
    \ 头文件，设置了 `SKProductsRequestDelegate` 委托，并创建了一个对象来持有产品请求。我们需要为用户提供访问商店的途径，因此请为主屏幕添加一个按钮以及相关代码，以展示新的视图控制器（`UFOStoreViewController`）。\n\
    \n### 获取产品列表\n\n修改新商店视图控制器的 `viewDidLoad` 和 `viewDidUnload` 方法，使用在 iTunes Connect\
    \ 中设置的产品标识符发起新的商店请求。你可能需要修改产品标识符，使其与你之前设置的一致。\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n    NSSet *productIdentifiers = [NSSet setWithObjects:\n\
    \        @\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\"\
    , nil];\n    productsRequest = [[SKProductsRequest alloc]\n        initWithProductIdentifiers:productIdentifiers];\n\
    \    productsRequest.delegate = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n\
    {\n    productsRequest.delegate = nil;\n}\n```\n\n产品请求在下一步展示的委托回调中释放。目前，此方法仅将产品信息打印至控制台，并记录任何无效产品。\n\
    \n```\n- (void)productsRequest:(SKProductsRequest *)request\n    didReceiveResponse:(SKProductsResponse\
    \ *)response\n{\n    NSArray *productArray= [response products];\n    for (SKProduct\
    \ *product in productArray) {\n        NSLog(@\"Product title: %@\" , product.localizedTitle);\n\
    \        NSLog(@\"Product description: %@\" , product.localizedDescription);\n\
    \        NSLog(@\"Product price: %@\" , product.price);\n        NSLog(@\"Product\
    \ id: %@\\n\\n\" , product.productIdentifier);\n    }\n    for (NSString *invalidProduct\
    \ in response.invalidProductIdentifiers)\n    {\n        NSLog(@\"Invalid: %@\"\
    \ , invalidProduct);\n    }\n    [request release];\n}\n```\n\n> **注意：** 尽管可以使用本节代码获取无效产品标识符列表，但并没有关联的错误信息来判定产品为何被标记为无效。最常见的原因是产品\
    \ ID 输入错误，或者时间不足，产品尚未分发至服务器。\n\n如果你现在运行游戏并进入商店，应获得类似以下输出：\n\n```\n2011–08-19 17:31:23.970\
    \ UFOs[3580:707] 产品标题：Ship+\n2011–08-19 17:31:23.973 UFOs[3580:707] 产品描述：为飞船涂装并向朋友炫耀\n\
    2011–08-19 17:31:23.975 UFOs[3580:707] 产品价格：8.99\n2011–08-19 17:31:23.977 UFOs[3580:707]\
    \ 产品 ID：com.dragonforged.ufo.newShip1\n2011–08-19 17:31:23.979 UFOs[3580:707]\
    \ 产品标题：订阅服务\n2011–08-19 17:31:23.981 UFOs[3580:707] 产品描述：一项订阅服务\n2011–08-19 17:31:23.983\
    \ UFOs[3580:707] 产品价格：1.99\n2011–08-19 17:31:23.987 UFOs[3580:707] 产品 ID：com.dragonforged.ufo.subscription\n\
    ```\n\n> **注意：** 从产品请求获取响应可能需要数秒。最佳实践建议在加载期间向用户显示某种加载指示器。\n\n以上就是从苹果服务器获取产品所需的全部步骤。下一节中，我们将使用标准表格视图向用户展示这些数据。\n"
- fmt: "### Presenting Your Products to the User\n\nBegin by adding a table view to\
    \ the store view controller. Don’t forget to hook up the data source and delegates,\
    \ as required. We also add a new property to our class to hold the products. Create\
    \ a new class array named `productArray` and set the product results to it in\
    \ the `productsRequest` method.\n\nAdd the two required table view delegate and\
    \ data source methods to your class, as shown in the following code snippets:\n\
    \n```objc\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [productArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
    \ *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier] autorelease];\n        cell.selectionStyle =\
    \ UITableViewCellSelectionStyleNone;\n    }\n\n    SKProduct *product = [self.productArray\
    \ objectAtIndex: [indexPath row]];\n    cell.textLabel.text = [NSString stringWithFormat:@\"\
    %@ - $%@\", product.localizedTitle, product.price];\n    cell.detailTextLabel.text\
    \ = product.localizedDescription;\n    return cell;\n}\n```\n\nThe first method\
    \ simply returns the number of products that we retrieved from Apple’s servers\
    \ for the number of rows in the table. When we display them as a cell, we use\
    \ the built-in `UITableViewCellStyleSubtitle`. We set the main label to the product\
    \ title and price, and use the detail label to display the description. All that\
    \ remains is to add a reload table method to the end of the `productsRequest`\
    \ method. Upon running the game again, your output should look similar to that\
    \ shown in Figure [11-11](#A978-1-4302-4906-1_11_Chapter.html#Fig11).\n\n> **Note:**\
    \ Although the API returns a localized title and description, it doesn’t localize\
    \ the price. You need to take this extra step yourself in international apps.\n\
    \n![A978-1-4302-4906-1_11_Fig11_HTML.jpg](A978-1-4302-4906-1_11_Fig11_HTML.jpg)\n\
    \n**Figure 11-11.** Displaying a list of products in a standard table view\n\n\
    ## Purchasing a Product\n\nIn the previous section, you learned how to add products\
    \ to your app. Without the ability to purchase these products, our implementation\
    \ is only partially complete. In this section, we look at how to handle purchasing\
    \ products directly through your app.\n\n### Purchasing Code\n\nThe first thing\
    \ that we need to do is make the `UFOStoreViewController` class conform to the\
    \ `SKPaymentTransactionObserver` protocol. After that is done, we modify our existing\
    \ `viewDidLoad` method. Add `self` as a new transaction observer. Additionally,\
    \ we perform a test to make sure that we can make payments on this device, and\
    \ if not, display a `UIAlert` to inform the user.\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\
    \n    if ([SKPaymentQueue canMakePayments])\n    {\n        NSSet *productIdentifiers\
    \ = [NSSet setWithObjects:@\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\"\
    , nil];\n        productsRequest = [[SKProductsRequest alloc] initWithProductIdentifiers:productIdentifiers];\n\
    \        productsRequest.delegate = self;\n        [productsRequest start];\n\
    \    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:nil\
    \ message:@\"Unable to make purchases with this device.\" delegate:nil cancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles: nil];\n        [alert show];\n        [alert release];\n\
    \    }\n}\n```\n\nNext, we need to add a `didSelectRowAtIndexPath` method to register\
    \ selection events in the table view.\n\n```objc\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    SKProduct\
    \ *product = [self.productArray objectAtIndex: [indexPath row]];\n    SKPayment\
    \ *payment = [SKPayment paymentWithProductIdentifier:product.productIdentifier];\n\
    \    [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\nIf you were\
    \ to run the app now and select a table row, you would get a confirmation alert,\
    \ as shown in Figure [11-12](#A978-1-4302-4906-1_11_Chapter.html#Fig12). However,\
    \ we have not yet written any code to process this transaction, nor have you set\
    \ up a test user, so this is as far as you can currently go. We’ll move on to\
    \ those stages after a quick look at the code for multiple purchases of an item.\n\
    \n![A978-1-4302-4906-1_11_Fig12_HTML.jpg](A978-1-4302-4906-1_11_Fig12_HTML.jpg)\n\
    \n**Figure 11-12.** Confirming a purchase in the Sandbox\n\n### Purchasing Multiple\
    \ Items\n\nApple has made it easy to allow your users to purchase multiple items\
    \ at a time. The following code snippet can be used to bulk-purchase multiple\
    \ quantities of an item at one time, such as a user purchasing five packs of 100\
    \ gold:\n\n```objc\nSKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:com.dragonforged.rpg.100gold];\n\
    payment.quantity = 5;\n[[SKPaymentQueue defaultQueue] addPayment: payment];\n\
    ```"
