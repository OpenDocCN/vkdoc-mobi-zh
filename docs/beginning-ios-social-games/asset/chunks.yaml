    times.'
  trans: '

    # 5. 匹配与邀请


    ## 摘要


    谨慎选择你的敌人，因为他们将定义你。


    > ——U2 乐队，《黎巴嫩的雪松》


    从本章开始，并贯穿后续几章，我们将讨论如何将 Game Center 以及后来的 Game Kit 联网功能添加到你的应用或游戏中。在现代，为应用添加联网能力几乎被视为一项必备技术。添加联网支持的过程通常始于寻找可连接的对象。如今，几乎所有现代软件都包含某种联网组件，无论是与在线服务通信以检索或发布信息，还是直接与对等设备通信以交换数据。


    在接下来的章节中，我们将讨论与其他对等设备的通信，尽管并非我们所有的联网配置都是点对点的（关于网络设计的详细信息，请参见第 7 章）。


    尤其是本章，将探讨如何利用 Game Center 的邀请系统，使用 Game Center 来查找和邀请对等方进入你的应用。


    Game Center 为你提供了一个被严重低估的销售和分发工具，而你处理邀请的开销却非常小。当邀请非本地用户在你的游戏或应用中开始多人体验时，你可以选择邀请任何一位
    Game Center 好友。如果你邀请的好友当前未安装此应用，系统会提示他们立即购买应用并开始游戏。在 iPhone 上，没有其他方法能以此种方式向其他用户发送“立即购买”链接。此功能为发展你的用户群提供了一条绝佳途径——只需让你的用户为你销售即可。


    除了“立即购买”链接，Game Center 还允许用户直接从 Game Center 界面内为你的应用评分，并且自 iOS 6 起，它提供了通过 Twitter
    和 Facebook 分享你的应用的功能。单凭这些特性，就足以成为添加 Game Center 的有力理由，甚至无需涉及其提供的强大联网能力。


    ## 为什么要为你的应用添加联网功能？


    看看近年任何一年销量前十的 PC 或主机游戏列表，你会发现其中绝大多数都是非常注重多人互动体验的游戏。让我们快速浏览一下 2012 年销量最高的 PC 游戏《使命召唤：黑色行动
    2》。虽然这款游戏确实有单人模式，但它更像是游戏的一种附加功能，而非主要卖点。其重点显然在于多人游戏，甚至不惜牺牲单人战役。从《字母拼图》到《部落冲突》，多人在线
    iOS 游戏已经开始站稳脚跟。近年来，行业的焦点已从制作丰富、深刻的单人战役，转向将更多精力投入到多人模式上。对于这种新现象，有一个完全合理的解释：在多人模式上投入能获得更高的性价比。


    人类天生是社会性生物。我们渴望社交互动以促进健康的心理发展。电子游戏和其他社交软件正日益成为这种互动的出口。无论你是否同意这种说法背后的道理，但事实是多人游戏正变得越来越流行。无论是大型多人在线角色扮演游戏，还是你常见的、种类繁多的第一人称射击游戏，软件用户都越来越喜欢多人互动。


    为你的游戏增加多人元素可以将用户的游戏时间延长百倍。如果需要证据，看看 1999 年发布的《雷神之锤 3》或《虚幻竞技场》，它们在发布后的许多年里仍有用户登录。如果这些游戏只专注于单人模式，它们很可能不会有如此忠实的粉丝群。下面列出了一些其他理由，说明为什么通过
    Game Center 添加匹配和邀请功能对你的产品来说应该是一个简单的商业决策：


    -   为游戏添加多人组件是提升游戏品质的好方法。取决于你正在制作的游戏类型，添加多人元素可能只需要很少的额外工作。

    -   用户已经期望 App Store 上一流的游戏具备多人模式。

    -   如果你拥有制作精良的多人组件，就可以为你的应用定出更高的价格。

    -   没有什么比自动购买邀请系统更能让用户即时下载你的应用了。如果你能让潜在用户处于被邀请玩游戏并能立即购买的情景中，你完成销售的机会将大得多。

    -   如果你正在使用广告支持系统，增加应用或游戏中的游戏时间或使用时间，将带来更多收入。如果你销售的是付费应用，用户会觉得他们的钱花得更值。

    -   人类喜欢竞争，所以鼓励你的用户去做他们喜欢的事。多人模式或许不适合所有人，但对许多人来说，他们在选购新游戏时只对此感兴趣。

    -   多人模式也可能为未来的应用内购买打开大门，从而增加收入和盈利能力。


    > **提示：** 只要可能，也请为你的游戏用户提供单人游戏选项，因为仍然存在一个相当可观的、偏爱单人战役的用户群。此外，有些玩家可能并非时刻都能连接到互联网。

    '
- fmt: '# Common Matchmaking Scenarios


    Before we begin working with matches and invitations themselves, it is important
    to understand some of the scenarios that you might encounter in your quest to
    implement multiplayer networking in your iOS app or game.


    *   第一个，也是最常见的场景是：一个已经在你的应用中的玩家想要创建一个自动匹配的游戏。所有玩家都已经安装并加载了该应用，并且处于预期要开始网络会话的状态。被邀请的玩家会收到一个通知，询问他/她是否想要加入与邀请者的游戏。当双方都同意时，匹配
    GUI 将被关闭，并创建一个新的匹配。

    *   另一个常见场景是：用户创建一个新的匹配事件，并邀请其 Game Center 好友列表中的其他玩家。被邀请的好友会收到一个推送通知，告知他们被邀请加入一个游戏。如果这些好友已经安装了游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入匹配，游戏就会开始。如果他们尚未安装该游戏，系统将提示他们安装，并且在成功安装后游戏将自动启动。

    *   如果好友被邀请，但他们尚未安装应用并决定安装，则会发生略有不同的事件流程。安装过程结束后，应用将自动启动，然后你可以继续匹配事件的正常流程。

    *   玩家可以直接在 Game Center 应用中创建一个新的匹配事件。在这种场景下，所有玩家都会被启动到应用中，并收到加入匹配的邀请。这种情况最好的部分是：如果你的应用已经支持邀请，你无需编写任何额外的代码来支持此场景。

    *   玩家也可以邀请一个或多个好友，并使用自动匹配器填充剩余的空位。这是前两种场景的混合，如果已经添加了对这两种场景的支持，那么你无需为此场景进行额外的编程。

    *   你可能会遇到的最后一个场景（可选）是以编程方式自动匹配玩家。在这种情况下，请求会发送到 Game Center 服务器，然后匹配结果会返回给你。玩家不会看到任何标准
    GUI，你可以选择实现自己的界面。


    注意：匹配基于应用的 `bundle ID`；如果应用的 `bundle ID` 不匹配，则无法通过匹配系统进行通信。


    # Creating a New Match Request


    要创建新的匹配，你首先需要创建一个新的`GKMatchRequest`对象。该对象代表了你将要创建的新匹配的所需参数。`GKMatchRequest`既用于显示
    GUI，也用于以编程方式创建匹配。当你使用 GUI 时，你会将`GKMatchRequest`对象传递给`GKMatchmakerViewController`的新实例；另一方面，如果你以编程方式处理匹配，你会将该对象传递给`GKMatchmaker`的实例。有关程序化匹配交互的更多详细信息，请参阅后续章节。现在，让我们专注于如何在代码中创建一个新的匹配请求。请看下面的代码片段：


    ```

    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 2;

    request.maxPlayers = 2;

    ```


    这个例子是演示如何创建新匹配的最简单方式。你必须同时指定最大和最小玩家数量。在这个例子中，我们创建了一个正好需要两名玩家的新请求。


    `GKMatchRequest`还有一个名为`playersToInvite`的属性，你可以使用`GKPlayer`标识符数组来自动填充到一个新的匹配中。这在连续进行多个游戏并且希望保持相同玩家组时非常有用。当你的应用从
    Game Center 应用启动时，该属性也会被预填充为邀请你进入应用的玩家。


    注意：当接受与好友的匹配邀请时，该事件由 Game Center 应用处理，并且`playersToInvite`属性将被填充。


    `GKMatchRequest`还有另外两个属性：`playerAttributes`和`playerGroup`，你将在本章后面的部分中使用它们。这两个属性将在同名的章节中详细讨论。


    注意：如果你使用 Game Center 作为托管游戏的服务器，你最多只能有四名玩家。但是，如果你实现了自己的服务器（如本章“使用你自己的服务器”部分所述），则可以邀请最多
    16 名玩家。'
  raw: '## Common Matchmaking Scenarios


    Before we begin working with matches and invitations themselves, it is important
    to understand some of the scenarios that you might encounter in your quest to
    implement multiplayer networking in your iOS app or game.


    *   The first, and probably most common, scenario that you might encounter would
    be a player who is already in your app and want to create an auto-matched game.
    All the players will already have the app installed and loaded, as well as be
    in a place where it is expected that they will want to begin a networked session
    with each other. The invitee player will receive a notification asking whether
    he or she wants to join a game with the inviter. When both agree, the matchmaking
    GUI is dismissed and a new match is created.

    *   Another common scenario that you might encounter would be if the user creates
    a new matchmaking event and invites other players from their Game Center friends
    list. The invited friends will receive a push notification informing them that
    they have been invited to a game. If those friends already have the game installed
    and accept the invitation, the game will be launched. Once all invited players
    have entered the match, the game will begin. If they do not yet have the game
    installed, they will be prompted to install it and it will automatically be launched
    after it has been successfully installed.

    *   A slightly different event path would occur if a friend is invited, and they
    do not yet have the app installed, and have decided to install the app. After
    the install process, the app will automatically launch and you can continue with
    the normal flow of the matchmaking event.

    *   A player can create a new matchmaking event from within the Game Center.app
    itself. In this scenario, all players are launched into the app and receive an
    invitation to join the match. The best part about this scenario is that if your
    app already supports invitations; you don’t need to write any additional code
    to support this scenario.

    *   A player can also invite a friend or multiple friends and fill any remaining
    slots with the auto-matcher. This is a mix-and-match of the first two scenarios
    and, if support for both of them is added, you shouldn’t have any additional programming
    to do for this scenario.

    *   The last scenario you could encounter (optionally) is to programmatically
    auto-match players. In this case, a request would be sent to the Game Center servers
    and matches would be returned for you. The player would not see any standard GUI,
    and you have the option to implement your own interface.


    Note


    Matchmaking is based on the bundle ID of the app; apps without matching bundle
    IDs will not be able to communicate through the matchmaking system.


    ## Creating a New Match Request


    To create a new match, you first have to create a new `GKMatchRequest` object.
    This object represents the desired parameters for the new match that you will
    be creating. A `GKMatchRequest` is used both when presenting a GUI as well as
    when creating matches programmatically. When working with the GUI, you will pass
    the `GKMatchRequest` object to a new instance of `GKMatchmakerViewController`
    on the other hand, if you are handling the matchmaking programmatically, you will
    pass the object to an instance of `GKMatchmaker`. See the following sections for
    more details on programmatic match interaction. For the time being, let’s focus
    on how to create a new match request in your code. Take a look at the following
    code snippet:


    `GKMatchRequest *request = [[GKMatchRequest alloc] init];`


    `request.minPlayers = 2;`


    `request.maxPlayers = 2;`


    This example is the simplest demonstration of how to create a new match. You must
    specify the maximum number of players as well as the minimum. In this example,
    we are creating a new request that will require exactly two players.


    A `GKMatchRequest` also has a property titled `playersToInvite`, in which you
    can use an array of `GKPlayer` identifiers to automatically populate into a new
    match. This can be very helpful when playing multiple games that are chained back
    to back and you want to keep the same groups of players together. This property
    is also prepopulated when your app is launched from the Game Center.app with the
    players that invited you into the app.


    Note


    When accepting an invite to a match with a friend, the event is handled from the
    Game Center.app, and the `playersToInvite` property will be populated.


    `GKMatchRequest` also has an additional two properties, `playerAttributes` and
    `playerGroup`, which you will be working with in later sections of this chapter.
    These two properties are discussed at length in the sections that share their
    names.


    Note


    If you are using Game Center as your server for hosting games, you are limited
    to a maximum of four players. However, if you implement your own server as discussed
    in the “Using Your Own Server” section of this chapter, you can invite up to 16
    players.'
  trans: '

    # 通用匹配场景


    在开始处理匹配和邀请本身之前，理解在 iOS 应用或游戏中实现多人网络功能时可能遇到的一些场景至关重要。


    *   第一个，也是最常见的场景是：一个已经在你的应用中的玩家想要创建一个自动匹配的游戏。所有玩家都已经安装并加载了该应用，并且处于预期要开始网络会话的状态。被邀请的玩家会收到一个通知，询问他/她是否想要加入与邀请者的游戏。当双方都同意时，匹配
    GUI 将被关闭，并创建一个新的匹配。

    *   另一个常见场景是：用户创建一个新的匹配事件，并邀请其 Game Center 好友列表中的其他玩家。被邀请的好友会收到一个推送通知，告知他们被邀请加入一个游戏。如果这些好友已经安装了游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入匹配，游戏就会开始。如果他们尚未安装该游戏，系统将提示他们安装，并且在成功安装后游戏将自动启动。

    *   如果好友被邀请，但他们尚未安装应用并决定安装，则会发生略有不同的事件流程。安装过程结束后，应用将自动启动，然后你可以继续匹配事件的正常流程。

    *   玩家可以直接在 Game Center 应用中创建一个新的匹配事件。在这种场景下，所有玩家都会被启动到应用中，并收到加入匹配的邀请。这种情况最好的部分是：如果你的应用已经支持邀请，你无需编写任何额外的代码来支持此场景。

    *   玩家也可以邀请一个或多个好友，并使用自动匹配器填充剩余的空位。这是前两种场景的混合，如果已经添加了对这两种场景的支持，那么你无需为此场景进行额外的编程。

    *   你可能会遇到的最后一个场景（可选）是以编程方式自动匹配玩家。在这种情况下，请求会发送到 Game Center 服务器，然后匹配结果会返回给你。玩家不会看到任何标准
    GUI，你可以选择实现自己的界面。


    注意：匹配基于应用的 `bundle ID`；如果应用的 `bundle ID` 不匹配，则无法通过匹配系统进行通信。


    # 创建新的匹配请求


    要创建新的匹配，你首先需要创建一个新的 `GKMatchRequest` 对象。该对象代表了你将要创建的新匹配的所需参数。`GKMatchRequest`
    既用于显示 GUI，也用于以编程方式创建匹配。当你使用 GUI 时，你会将 `GKMatchRequest` 对象传递给 `GKMatchmakerViewController`
    的新实例；另一方面，如果你以编程方式处理匹配，你会将该对象传递给 `GKMatchmaker` 的实例。有关程序化匹配交互的更多详细信息，请参阅后续章节。现在，让我们专注于如何在代码中创建一个新的匹配请求。请看下面的代码片段：


    ```

    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 2;

    request.maxPlayers = 2;

    ```


    这个例子是演示如何创建新匹配的最简单方式。你必须同时指定最大和最小玩家数量。在这个例子中，我们创建了一个正好需要两名玩家的新请求。


    `GKMatchRequest` 还有一个名为 `playersToInvite` 的属性，你可以使用 `GKPlayer` 标识符数组来自动填充到一个新的匹配中。这在连续进行多个游戏并且希望保持相同玩家组时非常有用。当你的应用从
    Game Center 应用启动时，该属性也会被预填充为邀请你进入应用的玩家。


    注意：当接受与好友的匹配邀请时，该事件由 Game Center 应用处理，并且 `playersToInvite` 属性将被填充。


    `GKMatchRequest` 还有另外两个属性：`playerAttributes` 和 `playerGroup`，你将在本章后面的部分中使用它们。这两个属性将在同名的章节中详细讨论。


    注意：如果你使用 Game Center 作为托管游戏的服务器，你最多只能有四名玩家。但是，如果你实现了自己的服务器（如本章“使用你自己的服务器”部分所述），则可以邀请最多
    16 名玩家。

