- fmt: "# Presenting Achievements\n\nUnlike leaderboards, there will be plenty to\
    \ preview GUI-wise before we populate user data into our achievement system. It\
    \ is helpful to see the effects that modifying achievements will have on how they\
    \ are displayed through the default GUI. In this chapter, we will begin by presenting\
    \ Apple’s achievement GUI, then move on to submitting user data. We will also\
    \ cover custom GUI achievements later in this chapter.\n\nBefore we can begin,\
    \ we need to create a new `UIButton` that will trigger the achievement view. We\
    \ most likely want to do this outside the game screen, as we did with the two\
    \ leaderboard buttons. We begin by adding a new button to the `UFOViewController`\
    \ view, as shown in Figure [4-6](#A978-1-4302-4906-1_4_Chapter.html#Fig6).\n\n\
    You also need to create and hook up an `IBAction` to our new Achievements button.\
    \ Insert the following code into the action that you hooked up to the Achievements\
    \ button.\n\n```\n-(IBAction)achievementButtonPressed;\n\n{\n\n     GKAchievementViewController\
    \ *controller = nil;\n\n       controller = [[GKAchievementViewController alloc]\
    \ init];\n\n         [achievementViewController setAchievementDelegate:self];\n\
    \n         [self presentViewController:achievementViewController animated:YES\
    \ completion:nil];\n\n       [controller release];\n\n}\n```\n\n![A978-1-4302-4906-1_4_Fig6_HTML.jpg](A978-1-4302-4906-1_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6.\n\nAdding a new button to trigger our achievement view\n\n**Tip**\n\
    \nStarting with iOS 6, you can now create a game center view that can be used\
    \ for achievements, leaderboards and challenges, using `GKGameCenterViewController`.\
    \ Using `GKAchievementViewController` on iOS 6 will launch a `GKGameCenterViewController`\
    \ that is preselected to the achievements section, while maintaining backward-compatibility.\n\
    \nIn addition, we need to hook up a delegate callback to be used with the `GKAchievementViewController`.\
    \ Add the following method to your implementation file:\n\n```\n- (void)achievementViewControllerDidFinish:(GKAchievementViewController\
    \ *)viewController\n\n{\n\n     [self dismissViewControllerAnimated:YES completion:nil];\n\
    \n}\n```\n\nIf you were to run the app now and tap the Achievements button, you\
    \ would see a view similar to the one shown in Figure [4-7](#A978-1-4302-4906-1_4_Chapter.html#Fig7).\
    \ The achievements shown are using Apple’s unearned image. Apple recommends that\
    \ you always use its unearned image, but when working with a custom achievement\
    \ GUI, you can override this image and return your own.\n\nNext, recall that we\
    \ set up three achievements, one of them hidden. As you can see in Figure [4-7](#A978-1-4302-4906-1_4_Chapter.html#Fig7),\
    \ the provided view shows us only two achievements. Because we have not submitted\
    \ any kind of progress to the third achievement, its details are hidden from the\
    \ user. However, you can see that the top information line reflects that there\
    \ is a hidden achievement (1 of 3 Achievements). Also notice that the achievements\
    \ are using the localized unearned description that was set in iTunes Connect.\n\
    \n![A978-1-4302-4906-1_4_Fig7_HTML.jpg](A978-1-4302-4906-1_4_Fig7_HTML.jpg)\n\n\
    Figure 4-7.\n\nOur achievements, as shown with Apple’s default GUI\n\nThese are\
    \ the only necessary steps to show the user their achievement progress through\
    \ Apple’s built-in GUI. In the next section, we will look at how to update and\
    \ progress these achievements. Later in this chapter, you will learn how to present\
    \ achievements using a custom GUI.\n\n**Note**\n\nUsers can always see their achievement\
    \ progress in Game Center.app, but it is recommended to allow your user a way\
    \ to view their progress from within your app as well.\n\n# Modifying Achievement\
    \ Progress\n\nUnlike leaderboard entries, achievements can be constantly modified\
    \ and progressed through user interaction. As we’ve done with the other Game Center\
    \ functionality we have been working with, we will create a new method in our\
    \ `GameCenterManager` class to handle interacting with achievements. Once you\
    \ have added the following method, we will review the code to understand exactly\
    \ how it functions.\n\n**Tip**\n\nRemember that all of this source code is available\
    \ to you online, at [`http://apress.com`](http://apress.com). When dealing with\
    \ large methods, it might be easier to copy it from the downloaded source code.\n\
    \n```\n- (void)submitAchievement:(NSString*)identifier percentComplete:(double)percentComplete\n\
    \n{\n\nif ([self earnedAchievementCache] == NULL)\n\n{\n\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\n\
    *achievements, NSError *error) {\n\nif (error == NULL)\n\n{\n\nNSMutableDictionary\
    \ *tempCache = [NSMutableDictionary\ndictionaryWithCapacity:[achievements count]];\n\
    \nfor (GKAchievement* achievement in achievements)\n\n{\n\n[tempCache setObject:\
    \ achievement forKey:\n[achievement identifier]];\n\n}\n\n[self setEarnedAchievementCache:tempCache];\n\
    \n[self submitAchievement:identifier percentComplete:\npercentComplete];\n\n}\n\
    \nelse\n\n{\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted:\
    \ error:) withArg:NULL\nerror:error];\n\n}\n\n}];\n\n}\n\nelse\n\n{\n\nGKAchievement\
    \ *achievement = [[self earnedAchievementCache]\nobjectForKey:identifier];\n\n\
    if (achievement != NULL)\n\n{\n\nif (([achievement percentComplete] >= 100.0)\
    \ ||\n([achievement percentComplete] >= percentComplete))\n\n{\n\nachievement\
    \ = NULL;\n\n}\n\n[achievement setPercentComplete:percentComplete];\n\n}\n\nelse\n\
    \n{\n\nachievement = [[[GKAchievement alloc] initWithIdentifier:identifier]\n\
    autorelease];\n\n[achievement setPercentComplete:percentComplete];\n\n[[self earnedAchievementCache]\
    \ setObject:achievement\nforKey:[achievement identifier]];\n\n}\n\nif (achievement\
    \ != NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler:^(NSError\n\
    *error) {\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted:error:)\n\
    withArg: achievement error:error];\n\n}];\n\n}\n\n}\n\n}\n```\n\nBefore this code\
    \ can be executed, you need to add a new class property. Create a new mutable\
    \ dictionary (and don’t forget to synthesize it). The relevant section of the\
    \ header of `GameCenterManager` should now look like the following.\n\n```\n@interface\
    \ GameCenterManager : NSObject <GameCenterManagerDelegate>\n\n{\n\nid <GameCenterManagerDelegate,\
    \ NSObject> delegate;\n\nNSMutableDictionary* earnedAchievementCache;\n\n}\n\n\
    @property(nonatomic, retain) id <GameCenterManagerDelegate, NSObject> delegate;\n\
    \n@property(nonatomic, retain) NSMutableDictionary* earnedAchievementCache;\n\
    ```"
  raw: '### Presenting Achievements


    Unlike leaderboards, there will be plenty to preview GUI-wise before we populate
    user data into our achievement system. It is helpful to see the effects that modifying
    achievements will have on how they are displayed through the default GUI. In this
    chapter, we will begin by presenting Apple’s achievement GUI, then move on to
    submitting user data. We will also cover custom GUI achievements later in this
    chapter.


    Before we can begin, we need to create a new UIbutton that will trigger the achievement
    view. We most likely want to do this outside the game screen, as we did with the
    two leaderboard buttons. We begin by adding a new button to the `UFOViewController`
    view, as shown in Figure [4-6](#A978-1-4302-4906-1_4_Chapter.html#Fig6).


    You also need to create and hook up an `IBAction` to our new Achievements button.
    Insert the following code into the action that you hooked up to the Achievements
    button.


    `-(IBAction)achievementButtonPressed;`


    `{`


         `GKAchievementViewController *controller = nil;`


           `controller = [[GKAchievementViewController alloc] init];`


             `[achievementViewController setAchievementDelegate:self];`


             `[self presentViewController:achievementViewController animated:YES completion:nil];`


           `[controller release];`


    `}`


    ![A978-1-4302-4906-1_4_Fig6_HTML.jpg](A978-1-4302-4906-1_4_Fig6_HTML.jpg)


    Figure 4-6.


    Adding a new button to trigger our achievement view Tip


    Starting with iOS 6, you can now create a game center view that can be used for
    achievements, leaderboards and challenges, using `GKGameCenterViewController`.
    Using `GKAchievementViewController` on iOS 6 will launch a `GKGameCenterViewController`
    that is preselected to the achievements section, while maintaining backward-compatibility.


    In addition, we need to hook up a delegate callback to be used with the `GKAchievementViewController`.
    Add the following method to your implementation file:


    `- (void)achievementViewControllerDidFinish:(GKAchievementViewController *)viewController`


    `{`


         `[self dismissViewControllerAnimated:YES completion:nil];`


     `}`


    If you were to run the app now and tap the Achievements button, you would see
    a view similar to the one shown in Figure [4-7](#A978-1-4302-4906-1_4_Chapter.html#Fig7).
    The achievements shown are using Apple’s unearned image. Apple recommends that
    you always use its unearned image, but when working with a custom achievement
    GUI, you can override this image and return your own.


    Next, recall that we set up three achievements, one of them hidden. As you can
    see in Figure [4-7](#A978-1-4302-4906-1_4_Chapter.html#Fig7), the provided view
    shows us only two achievements. Because we have not submitted any kind of progress
    to the third achievement, its details are hidden from the user. However, you can
    see that the top information line reflects that there is a hidden achievement
    (1 of 3 Achievements). Also notice that the achievements are using the localized
    unearned description that was set in iTunes Connect.


    ![A978-1-4302-4906-1_4_Fig7_HTML.jpg](A978-1-4302-4906-1_4_Fig7_HTML.jpg)


    Figure 4-7.


    Our achievements, as shown with Apple’s default GUI


    These are the only necessary steps to show the user their achievement progress
    through Apple’s built-in GUI. In the next section, we will look at how to update
    and progress these achievements. Later in this chapter, you will learn how to
    present achievements using a custom GUI.


    Note


    Users can always see their achievement progress in Game Center.app, but it is
    recommended to allow your user a way to view their progress from within your app
    as well.


    ### Modifying Achievement Progress


    Unlike leaderboard entries, achievements can be constantly modified and progressed
    through user interaction. As we’ve done with the other Game Center functionality
    we have been working with, we will create a new method in our `GameCenterManager`
    class to handle interacting with achievements. Once you have added the following
    method, we will review the code to understand exactly how it functions.


    Tip


    Remember that all of this source code is available to you online, at [`http://apress.com`](http://apress.com)
    . When dealing with large methods, it might be easier to copy it from the downloaded
    source code.


