- fmt: "# Custom Tweets\n\nThere are many cases where it may be necessary to post\
    \ a tweet from a customized user interface, or from no user interface at all.\
    \ iOS provides this functionality as part of the Accounts Framework. While the\
    \ account-based approach to Twitter posting is a bit more complex and requires\
    \ the user to grant explicit permission for the app, it provides much more customization\
    \ and flexibility than the previously discussed Tweet Composer.\n\n**Note:** Make\
    \ sure to include `Accounts.framework` and import `accounts/Accounts.h` when working\
    \ with custom tweets.\n\nUnlike when working with the Tweet Composer, the first\
    \ thing that needs to be done when working with accounts is to create a reference\
    \ for the account from which the post will be originating. This is accomplished\
    \ by creating a new `ACAccountStore` and a new `ACAccountype` as in the following\
    \ code snippet:\n\n```\nACAccountStore *account = [[[ACAccountStore alloc] init]\
    \ autorelease];\nACAccountType *accountType = [account accountTypeWithAccountTypeIdentifier:\
    \ ACAccountTypeIdentifierTwitter];\n```\n\nOnce the account type has been specified,\
    \ the user needs to grant access for the app to interact with that account. Invoking\
    \ `requestAccessToAccountsWithType:` on the newly created `ACAccountStore` performs\
    \ this function:\n\n```\n[account requestAccessToAccountsWithType:accountType\
    \ options:nil completion:^(BOOL granted, NSError *error)\n```\n\nThe user will\
    \ be prompted to allow the app access, as shown in Figure 12-5.\n\n![A978-1-4302-4906-1_12_Fig5_HTML.jpg](A978-1-4302-4906-1_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** Being prompted to allow access to the device’s Twitter accounts\n\
    \nThe value of the `granted` variable will reflect the user’s decision about granting\
    \ the app access to their Twitter information. This permission gives the app full\
    \ access to post as well as read information from the account such as friends\
    \ and timeline history.\n\nThe user may have multiple Twitter accounts set up\
    \ on a device and it is important to be able to determine which account the user\
    \ wishes to post from. An array of the user’s accounts can be obtained with a\
    \ `ccountsWithAccountType:`, for the purposes of the sample app, the last account\
    \ in the array will be used by default:\n\n```\nNSArray *accounts = [account accountsWithAccountType:accountType];\n\
    ```\n\nDepending on whether the tweet has an attached image, there are two different\
    \ endpoints that will need to be used. If a tweet is posted to the incorrect endpoint\
    \ it will silently fail. For tweets containing image data, the endpoint is `https://upload.twitter.com/1/statuses/update_with_media.json`,\
    \ while tweets without image data should be posted to `http://api.twitter.com/1/statuses/update.json`.\
    \ The following example demonstrates selecting and storing the proper endpoint:\n\
    \n```\nNSURL *requestURL = nil;\nif (hasAttachment) {\n    requestURL = [NSURL\
    \ URLWithString:@\"https://upload.twitter.com/1/statuses/update_with_media.json\"\
    ];\n} else {\n    requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
    ];\n}\n```\n\nOnce the proper endpoint has been established, a new `SLRequest`\
    \ is created. An `SLRequest` object will do all of the legwork when working both\
    \ with Social Framework and with the account-based approach. It provides a wrapper\
    \ for communicating with supported third-party APIs. The service type is set to\
    \ `SLServiceTypeTwitter` and a post method is selected. The previously determined\
    \ URL is set, and finally the additional parameters are set to nil:\n\n```\nSLRequest\
    \ *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter requestMethod:SLRequestMethodPOST\
    \ URL:requestURL parameters:nil];\n```\n\nBefore the `SLRequest` can be submitted\
    \ to Twitter’s servers, it must first have its metadata configured to provide\
    \ information on the tweet text and any possible attachments. The specifications\
    \ for the formatting of the tweet are taken from official Twitter API documentation.\
    \ For specifics on API interaction, see `https://dev.twitter.com/docs/api`. The\
    \ text of the tweet is encoded into `NSData` and submitted with the identifying\
    \ name `\"status\"` of type `\"multipart/form-data\"`.\n\n```\nNSString *text\
    \ = [NSString stringWithFormat: @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\"\
    , score];\nNSData *textData = [text dataUsingEncoding:NSUTF8StringEncoding];\n\
    [postRequest addMultipartData:textData withName:@\"status\" type:@\"multipart/form-data\"\
    \ filename:nil];\n```\n\nIf you want to provide an image attachment to the tweet,\
    \ you may do so using the following approach. This will submit the image to Twitpic\
    \ as part of the upload process:\n\n```\nNSData *imageData = UIImageJPEGRepresentation([UIImage\
    \ imageNamed:@\"Saucer1.png\"], 1.0);\n[postRequest addMultipartData:imageData\
    \ withName:@\"media\" type:@\"image/jpg\" filename:@\"Image.jpg\"];\n```\n\nBefore\
    \ the tweet can be submitted, the `SLRequest` needs to be informed which account\
    \ the tweet will be sent to, because `SLRequest` supports posting to only one\
    \ account at a time. This approach will also provide the user with a chance to\
    \ see and modify the tweet before it is posted. We provide this information by\
    \ setting the `account` property on the `SLRequest` to the Twitter account that\
    \ was retrieved from the array retrieved earlier in this section:\n\n```\npostRequest.account\
    \ = twitterAccount;\n```\n\nOnce the account and metadata have been supplied,\
    \ the tweet can be posted. The method `performRequestWithHandler` is called on\
    \ the `postRequest`, and a block is provided for callbacks. In the event that\
    \ the post was successfully submitted, the returning status code will be 200.\
    \ Other error codes indicate an error; W3C (World Wide Web Consortium) maintains\
    \ a standardized list of error codes and their meanings at `http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`.\
    \ Since the results are returned on a block, a convenience method is used to post\
    \ the results to the user (Figure 12-6). Unlike the Composer, this method plays\
    \ no sound for the user on success, nor is there any other indication that a tweet\
    \ has been successfully posted.\n\n```\n[postRequest performRequestWithHandler:^(NSData\
    \ *responseData, NSHTTPURLResponse *urlResponse, NSError *error) {\n    if (error\
    \ != nil) {\n        [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
    \ withObject:[NSString stringWithFormat: @\"An error occurred: %@\", [error localizedDescription]]\
    \ waitUntilDone:NO];\n    }\n    if ([urlResponse statusCode] == 200) {\n    \
    \    [self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:@\"\
    Tweet was successfully posted\" waitUntilDone:NO];\n    }\n}];\n```\n\n![A978-1-4302-4906-1_12_Fig6_HTML.jpg](A978-1-4302-4906-1_12_Fig6_HTML.jpg)\n\
    \n**Figure 12-6.** Informing the user that a custom tweet has been posted successfully"
  raw: '## Custom Tweets


    There are many cases where it may be necessary to post a tweet from a customized
    user interface, or from no user interface at all. iOS provides this functionality
    as part of the Accounts Framework. While the account-based approach to Twitter
    posting is a bit more complex and requires the user to grant explicit permission
    for the app, it provides much more customization and flexibility than the previously
    discussed Tweet Composer.


    Note


    Make sure to include `Accounts.framework` and import `accounts/Accounts.h` when
    working with custom tweets.


    Unlike when working with the Tweet Composer, the first thing that needs to be
    done when working with accounts is to create a reference for the account from
    which the post will be originating. This is accomplished by creating a new `ACAccountStore`
    and a new `ACAccountype` as in the following code snippet:


    `ACAccountStore *account = [[[ACAccountStore alloc] init] autorelease];`


    `ACAccountType *accountType = [account accountTypeWithAccountTypeIdentifier: ACAccountTypeIdentifierTwitter];`


    Once the account type has been specified, the user needs to grant access for the
    app to interact with that account. Invoking `requestAccessToAccountsWithType:`
    on the newly created `ACAccountStore` performs this function:


    `[account requestAccessToAccountsWithType:accountType options:nil completion:^(BOOL
    granted, NSError *error)`


