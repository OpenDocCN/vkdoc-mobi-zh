    `}`


    Now our game controller class has a reference to the `GameCenterManager` that
    we will be using throughout the project. We also have to set a new delegate for
    `gcManager` in the `viewDidLoad` method of `UFOGameViewController`. We want to
    make sure that `UFOGameViewController` will be handling the callbacks for the
    score submitted. Add the following method to the implementation:


    `- (void)scoreReported: (NSError*) error;`


    `{`


    `if (error)`


    `{`


    `NSLog(@"There was an error in reporting the score: %@",É`


    `[error localizedDescription]);`


    `}`


    `else`


    `{`


    `NSLog(@"Score submitted");`


    `}`


    `[[self navigationController] popViewControllerAnimated: YES];`


    `}`


    We will also modify the `exitAction` method to only submit the score. To do so,
    replace the old `exitAction` method with the following. Notice that we are using
    the leaderboard ID that we set in iTunes Connect; make sure to use the same ID
    that you entered, as it will probably not match the one used here.


    `-(IBAction)exitAction:(id)sender;`


    `{`


    `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


    `}`


    When you now play and click Exit, you should see a console message that looks
    similar to the following output:


    `2011-02-10 12:32:47.629 UFOs[15092:207] Score submitted`


    Tip


    See the section “A Better Approach” at the end of this chapter for a more complex,
    but user-friendly, approach to submitting scores.


    Now that we have a score submitted to a leaderboard, in the following sections
    you will learn how to present this data back to the user. This action has been
    greatly simplified for the purpose of making this section as easy to learn as
    possible. This will not be the user experience you want to present to your user;
    we are simply trapping the user in the game screen while we wait for a network
    callback. In a real game, you will want to handle the delegate callback in the
    previous view. This ensures that the user is not waiting unnecessarily. For simplicity
    sake, we will continue to use the easier-to-follow methodology.


    Tip


    You can only have one score posted per leaderboard category for each player. You
    might notice that scores you submit never appear on the leaderboard. If this behavior
    occurs, make sure that the score you are submitting is higher than the highest
    score for that player.'
  trans: "\n# 为 UFO 游戏添加分数提交功能\n\n在我们的 UFO 游戏中添加计分功能有两种显而易见的方法。首先，我们可以实现一个系统，统计被绑架的奶牛数量，并将该数字作为分数提交。虽然这种方法对我们来说最容易实现，但并不是一种很有趣的游戏玩法，因为游戏没有合乎逻辑的结束点。第二种高分方法实现起来更困难，但更有意义。它会记录玩家绑架十头奶牛所花的时间；用时最短的玩家获胜。\n\
    \n在开发自己的应用时，必须仔细考虑这些主题。就本书而言，我们将演示第一种方法，即被绑架的奶牛数量就是玩家的分数。如果你打算实现基于计时器的系统，方法会非常相似：在回合开始时启动计时器，当十头奶牛被绑架后，提交计时器上的秒数作为时间。\n\
    \n为了实现基于分数的系统，我们需要为玩家添加一种结束游戏的方式。在实际游戏中，这可以通过让某些东西能够杀死玩家或设置时间限制来实现。然而，就本示例而言，我们将简单地添加一个“退出”按钮。这将允许用户模拟游戏结束事件，同时使代码专注于\
    \ Game Center，而无需增加额外的游戏复杂性。\n\n我们在 `UFOGameViewController.xib` 中添加一个“退出”按钮，如图\
    \ 3-6 所示。我们还需要为这个按钮创建一个新的 `IBAction`。将以下代码添加到 `UFOGameViewController` 中，并将我们的“退出”按钮连接到它。目前，我们只需将导航控制器弹回根视图。\n\
    \n```\n-(IBAction)exitAction:(id)sender;\n{\n  [[self navigationController] popViewControllerAnimated:YES];\n\
    }\n```\n\n> **注意：** 你不必等到游戏结束才提交新分数，但这通常被认为是一种良好实践。如果可能，应避免在单次游戏中多次提交新分数。\n>\n\
    > 一个值得注意的例外可能是持续性的角色扮演游戏，其中分数持续更新，并且在游戏过程中没有合适的结束点来提交分数。\n\n![A978-1-4302-4906-1_3_Fig6_HTML.jpg](img/A978-1-4302-4906-1_3_Fig6_HTML.jpg)\n\
    \n**图 3-6.** 添加退出游戏的功能，以便提交高分\n\n我们还需要将 `GameCenterManager` 类的协议方法添加到 `UFOGameViewController`\
    \ 中。将以下代码片段添加到 `UFOGameViewController.m` 中。\n\n```\n-(void)scoreReported: (NSError*)\
    \ error;\n{\n  if (error)\n  {\n    NSLog(@\"在报告分数时出现错误：%@\",\n          [error\
    \ localizedDescription]);\n  }\n  else\n  {\n    NSLog(@\"分数已提交\");\n  }\n}\n\
    ```\n\n剩下的最后一步是将分数提交到 Game Center；如果你还记得，我们已经在 `GameCenterManager` 类中编写了处理方法。我们已经在\
    \ `UFOViewController` 中使用了一个 `GameCenterManager` 类的实例来认证用户。我们将保留一个指向先前类中已创建对象实例的指针。\n\
    \n为 `UFOGameViewController` 创建一个新属性，使其成为 `GameCenterManager` 的实例，并像先前类中那样将其命名为\
    \ `GCManager`。一旦该属性被合成，我们就可以从先前的类中连接到它。修改 `UFOViewController` 的 `playButtonPressed`\
    \ 方法，使其与以下内容一致：\n\n```\n-(IBAction)playButtonPressed\n{\n  UFOGameViewController\
    \ *gameViewController = [[UFOGameViewController alloc]init];\n  gameViewController.gcManager\
    \ = gcManager; // 更改后的代码\n  [self.navigationController pushViewController: gameViewController\
    \ animated:YES];\n  [gameViewController release];\n}\n```\n\n现在，我们的游戏控制器类引用了我们将在整个项目中使用的\
    \ `GameCenterManager`。我们还必须在 `UFOGameViewController` 的 `viewDidLoad` 方法中为 `gcManager`\
    \ 设置一个新的委托。我们要确保 `UFOGameViewController` 将处理分数提交的回调。将以下方法添加到实现中：\n\n```\n- (void)scoreReported:\
    \ (NSError*) error;\n{\n  if (error)\n  {\n    NSLog(@\"在报告分数时出现错误：%@\",\n   \
    \       [error localizedDescription]);\n  }\n  else\n  {\n    NSLog(@\"分数已提交\"\
    );\n  }\n  [[self navigationController] popViewControllerAnimated: YES];\n}\n\
    ```\n\n我们还将修改 `exitAction` 方法，使其仅提交分数。为此，用以下内容替换旧的 `exitAction` 方法。请注意我们使用了在 iTunes\
    \ Connect 中设置排行榜 ID；务必使用你输入的那个相同 ID，因为它很可能与此处使用的 ID 不匹配。\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n  [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n}\n```\n\n现在，当你运行游戏并点击“退出”时，你应该会看到一条类似以下输出的控制台消息：\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n> **提示：** 请参阅本章末尾的“更好方法”一节，了解一种更复杂但对用户更友好的分数提交方法。\n\
    \n现在我们已经成功将分数提交到排行榜，在接下来的章节中，你将学习如何将这些数据呈现给用户。为了尽可能轻松地学习本节内容，此操作已被极大简化。这不是你希望向用户展示的用户体验；我们只是在等待网络回调时将用户困在游戏画面中。在真实的游戏中，你应该在之前的视图中处理委托回调。这可以确保用户不会无谓等待。为简单起见，我们将继续使用这种更易理解的实现方法。\n\
    \n> **提示：** 每个玩家每个排行榜类别只能发布一个分数。你可能会注意到你提交的分数从未出现在排行榜上。如果发生这种情况，请确保你提交的分数高于该玩家的最高分数。\n"
- fmt: "# Handling Failures When Submitting a Score\n\nIf a score fails to submit,\
    \ you as the developer are solely responsible for storing the score and resubmitting\
    \ it when the error has been resolved. Nothing is more frustrating to a user than\
    \ earning a new high score and losing it due to a network failure. This is also\
    \ a step that Apple likes to test for during app reviews.\n\nThere are many ways\
    \ to store the score information for resubmitting it later; however, I believe\
    \ the following approach is the easiest for the novice to implement. Feel free\
    \ to implement your own system if this one does not suit the needs or complexity\
    \ of your app.\n\nWe will use `NSKeyedArchiver` to store our `GKScore` object\
    \ for use later. The reason to serialize the object is to preserve the data that\
    \ is created for us once we initialize an instance of `GKScore`, namely the date.\
    \ Although you could simply store the raw score data, submitting the raw score\
    \ with a new `GKScore` object will use the current timestamp, instead of the time\
    \ when the score was actually earned. This provides a poor user experience, as\
    \ the first player to earn a high score might not be recognized as such.\n\nThere\
    \ are three steps that need to be completed to handle and recover from a score\
    \ submittal failure. The first step is to save the score data. Although we do\
    \ not inform the user of the failure in this example, it is a good idea to notify\
    \ the user that their score could not be submitted at this time, and that you\
    \ will automatically retry later. Modify the `reportScore` class in `GameCenterManager.m`\
    \ to match the following code:\n\n```\n- (void) reportScore: (int64_t) score forCategory:\
    \ (NSString*) category\n{\n    GKScore *scoreReporter = [[[GKScore alloc] initWithCategory:category]\
    \ autorelease];\n    scoreReporter.value = score;\n    [scoreReporter reportScoreWithCompletionHandler:\
    \ ^(NSError *error)\n    {\n        if (error != nil)\n        {\n           \
    \ NSData* savedScoreData = [NSKeyedArchiver archivedDataWithRootObject:scoreReporter];\n\
    \            [self storeScoreForLater: savedScoreData];\n        }\n        [self\
    \ callDelegateOnMainThread: @selector(scoreReported:) withArg: NULL error: error];\n\
    \    }];\n}\n```\n\nWe have added a few additional lines of code that will run\
    \ if an error is detected. The first line takes the `GKScore` object and encodes\
    \ it using `NSKeyedArchiver`, which will return an `NSData` object. We will later\
    \ retrieve the `GKScore` from this `NSData`. We also call a new method that we\
    \ have named `storeScoreForLater`. Let's take a look at that method now; add the\
    \ following method to the implementation of the `GameCenterManager` class:\n\n\
    ```\n- (void)storeScoreForLater:(NSData *)scoreData;\n{\n    NSUserDefaults *defaults\
    \ = [NSUserDefaults standardUserDefaults];\n    NSMutableArray *savedScores =\
    \ [[defaults arrayForKey:@\"savedScores\"] mutableCopy];\n    [savedScoreArray\
    \ addObject: scoreData];\n    [defaults setObject:savedScoreArray forKey:@\"savedScores\"\
    ];\n    [savedScoreArray release];\n}\n```\n\nThis snippet of code will save the\
    \ `NSData` that represents our score to the user defaults. You could also write\
    \ this data to a file or even store it in core data. Never assume the user has\
    \ only one unsubmitted score; they may have racked up a number of scores across\
    \ many different leaderboards while playing offline.\n\nSo far we have caught\
    \ a posting failure as well as saved the score to disk to be retried later. The\
    \ last remaining step is to attempt to resubmit the score to Game Center. This\
    \ step can be very complex, depending on how intelligent you want the system to\
    \ be. Most failures of score submissions are related to network access issues,\
    \ but they could also be caused by Game Center being down, or even a DNS issue.\n\
    \nThere is no correct answer in when to repost a score, but the guideline is that\
    \ you don't want to hold on to a score that could be submitted. Before we worry\
    \ about where to tie in the method to resubmit failed scores, let's first implement\
    \ a method to retry a score posting. Add the following method to your `GameCenterManager`\
    \ class.\n\n```\n-(void)submitAllSavedScores\n{\n    NSUserDefaults *defaults\
    \ = [NSUserDefaults standardUserDefaults];\n    NSArray *savedScores = [defaults\
    \ arrayForKey:@\"savedScores\"];\n    [defaults removeObjectForKey: @\"savedScores\"\
    ];\n    GKScore *scoreReporter = nil;\n    NSData *savedScoreData = nil;\n   \
    \ for (NSData *scoreData in savedScores)\n    {\n        scoreReporter = [NSKeyedUnarchiver\
    \ unarchiveObjectWithData: scoreData];\n        [scoreReporter reportScoreWithCompletionHandler:\
    \ ^(NSError *error)\n        {\n            if (error != nil)\n            {\n\
    \                savedScoreData = [NSKeyedArchiver archivedDataWithRootObject:scoreReporter];\n\
    \                [self storeScoreForLater: savedScoreData];\n            }\n \
    \           else\n            {\n                NSLog(@\"Saved score submitted\"\
    );\n            }\n        }];\n    }\n}\n```\n\nThis code will loop through all\
    \ of the saved scores and attempt to resubmit them. Because there is no delegate\
    \ for this behavior, we do not need to provide a delegate callback. We merely\
    \ log any successes and failures to add back to our array of non-submitted scores\
    \ for retrying again later.\n\nAs mentioned earlier, there are dozens of ways\
    \ to tie back in resubmitting failed scores. To keep it simple, we add a call\
    \ to the `submitAllSavedScores` method after we properly authenticate with Game\
    \ Center. Modify the `authenticateLocalUser` method of `GameCenterManager.m` to\
    \ match the following:\n\n```\nif ([[GKLocalPlayer localPlayer] authenticateHandler]\
    \ == nil)\n{\n    [[GKLocalPlayer localPlayer] setAuthenticateHandler:^(UIViewController\
    \ *viewController, NSError *error)\n    {\n        if (error != nil)\n       \
    \ {\n            if ([error code] == GKErrorNotSupported) {\n                UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Error\" message:@\"This device\
    \ does not support Game Center\" delegate:nil cancelButtonTitle:@\"Dismiss\" otherButtonTitles:nil];\n\
    \                [alert show];\n                [alert release];\n           \
    \ }\n            else if ([error code] == GKErrorCancelled)\n            {\n \
    \               UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error\"\
    \ message:@\"This device has failed login too many times from the app, you will\
    \ need to login from the Game Center.app\" delegate:nil cancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles:nil];\n                [alert show];\n           \
    \     [alert release];\n            }\n            else\n            {\n     \
    \           UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error\"\
    \ message:[error localizedDescription] delegate:nil cancelButtonTitle:@\"Dismiss\"\
    \ otherButtonTitles:nil];\n                [alert show];\n                [alert\
    \ release];\n            }\n        }\n        else\n        {\n            if\
    \ (viewController != nil)\n            {\n                [(UIViewController *)delegate\
    \ presentViewController:viewController animated:YES completion:NULL];\n      \
    \      }\n            [self submitAllSavedScores];\n        }\n    }];\n}\n```"
  raw: '## Handling Failures When Submitting a Score


    If a score fails to submit, you as the developer are solely responsible for storing
    the score and resubmitting it when the error has been resolved. Nothing is more
    frustrating to a user than earning a new high score and losing it due to a network
    failure. This is also a step that Apple likes to test for during app reviews.


    There are many ways to store the score information for resubmitting it later;
    however, I believe the following approach is the easiest for the novice to implement.
    Feel free to implement your own system if this one does not suit the needs or
    complexity of your app.


    We will use `NSKeyedArchiver` to store our `GKScore` object for use later. The
    reason to serialize the object is to preserve the data that is created for us
    once we initialize an instance of `GKScore`, namely the date. Although you could
    simply store the raw score data, submitting the raw score with a new `GKScore`
    object will use the current timestamp, instead of the time when the score was
    actually earned. This provides a poor user experience, as the first player to
    earn a high score might not be recognized as such.


    There are three steps that need to be completed to handle and recover from a score
    submittal failure. The first step is to save the score data. Although we do not
    inform the user of the failure in this example, it is a good idea to notify the
    user that their score could not be submitted at this time, and that you will automatically
    retry later. Modify the `reportScore` class in `GameCenterManager.m` to match
    the following code:


    `- (void) reportScore: (int64_t) score forCategory: (NSString*) category`


    `{`


    `GKScore *scoreReporter = [[[GKScore alloc] initWithCategory:category]É`


    `autorelease];`


    `scoreReporter.value = score;`


    `[scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)`


    `{`


    `if (error != nil)`


    `{`


    `NSData* savedScoreData = [NSKeyedArchiverÉ`


    `archivedDataWithRootObject:scoreReporter];`


    `[self storeScoreForLater: savedScoreData];`


    `}`


    `[self callDelegateOnMainThread: @selector(scoreReported:) withArg:É`


    `NULL error:  error];`


    `}];`


    `}`


    We have added a few additional lines of code that will run if an error is detected.
    The first line takes the `GKScore` object and encodes it using `NSKeyedArchiver`,
    which will return an `NSData` object. We will later retrieve the `GKScore` from
    this `NSData`. We also call a new method that we have named `storeScoreForLater`.
    Let’s take a look at that method now; add the following method to the implementation
    of the `GameCenterManager` class:


    `- (void)storeScoreForLater:(NSData *)scoreData;`


    `{`


    `NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];`


    `NSMutableArray *savedScores = [[defaults arrayForKey:@"savedScores"]É`


    `mutableCopy];`


    `[savedScoreArray addObject: scoreData];`


    `[defaults setObject:savedScoreArray forKey:@"savedScores"];`


    `[savedScoreArray release];`


    `}`


    This snippet of code will save the `NSData` that represents our score to the user
    defaults. You could also write this data to a file or even store it in core data.
    Never assume the user has only one unsubmitted score; they may have racked up
    a number of scores across many different leaderboards while playing offline.


    So far we have caught a posting failure as well as saved the score to disk to
    be retried later. The last remaining step is to attempt to resubmit the score
    to Game Center. This step can be very complex, depending on how intelligent you
    want the system to be. Most failures of score submissions are related to network
    access issues, but they could also be caused by Game Center being down, or even
    a DNS issue.


    There is no correct answer in when to repost a score, but the guideline is that
    you don’t want to hold on to a score that could be submitted. Before we worry
    about where to tie in the method to resubmit failed scores, let’s first implement
    a method to retry a score posting. Add the following method to your `GameCenterManager`
    class.


    `-(void)submitAllSavedScores`


    `{`


    `NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];`


    `NSArray *savedScores = [defaults arrayForKey@”savedScores”];`


    `[defaults removeObjectForKey: @"savedScores"];`


    `GKScore *scoreReporter = nil;`


    `NSData *savedScoreData = nil;`


    `for (NSData *scoreData in savedScores)`


    `{`


    `scoreReporter = [NSKeyedUnarchiver unarchiveObjectWithData: scoreData];`


    `[scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)`


    `{`


    `if (error != nil)`


    `{`


    `savedScoreData = [NSKeyedArchiverÉ`


    `archivedDataWithRootObject:scoreReporter];`


    `[self storeScoreForLater: savedScoreData];`


    `}`


    `else`


    `{`


    `NSLog(@"Saved score submitted");`


    `}`


    `}];`


    `}`


    `}`


    This code will loop through all of the saved scores and attempt to resubmit them.
    Because there is no delegate for this behavior, we do not need to provide a delegate
    callback. We merely log any successes and failures to add back to our array of
    non-submitted scores for retrying again later.


    As mentioned earlier, there are dozens of ways to tie back in resubmitting failed
    scores. To keep it simple, we add a call to the `submitAllSavedScores` method
    after we properly authenticate with Game Center. Modify the `authenticateLocalUser`
    method of `GameCenterManager.m` to match the following:


    `if ([[GKLocalPlayer localPlayer] authenticateHandler] == nil)`


    `{`


    `[[GKLocalPlayer localPlayer] setAuthenticateHandler:^(UIViewController *viewController,
    NSError *error)`


    `{`


    `if (error != nil)`


    `{`


    `if ([error code] == GKErrorNotSupported) {`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:@"This
    device does not support Game Center" delegate:nil cancelButtonTitle:@"Dismiss"
    otherButtonTitles:nil];`


    `[alert show];`


    `[alert release];`


    `}`


    `else if ([error code] == GKErrorCancelled)`


    `{`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:@"This
    device has failed login too many times from the app, you will need tologin from
    the Game Center.app" delegate:nil cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


    `[alert show];`


    `[alert release];`


    `}`


    `else`


    `{`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:[error
    localizedDescription] delegate:nil cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


    `[alert show];`


    `[alert release];`


    `}`


    `}`


    `else`


    `{`


    `if (viewController != nil)`


    `{`


    `[(UIViewController *)delegate presentViewController:viewController animated:YES
    completion:NULL];`


    `}`


    `[self submitAllSavedScores];`


    `}`


    `}];`


    `}`'
  trans: "\n# 处理成绩提交失败\n\n如果成绩提交失败，作为开发者的您需要全权负责存储该成绩，并在错误解决后重新提交。对用户而言，没有什么比获得新高分却因网络故障而丢失更令人沮丧的了。这也是苹果在应用审核期间喜欢测试的环节之一。\n\
    \n存储成绩信息以供稍后重新提交的方法有很多；不过，我认为以下方法对新手来说最容易实现。如果此方法不符合您应用的复杂程度或需求，您可以自由实现自己的系统。\n\
    \n我们将使用 `NSKeyedArchiver` 来存储 `GKScore` 对象以备后用。序列化该对象的原因是为了保留我们初始化 `GKScore` 实例时创建的数据，即日期。虽然您可以简单地存储原始成绩数据，但使用新的\
    \ `GKScore` 对象提交原始成绩会使用当前时间戳，而不是成绩实际获得的时间。这会带来糟糕的用户体验，因为第一个获得高分的玩家可能无法被识别为得分者。\n\
    \n要处理并从成绩提交失败中恢复，需要完成三个步骤。第一步是保存成绩数据。虽然在此示例中我们不会通知用户失败情况，但最好告知用户当前无法提交其成绩，并且您将稍后自动重试。修改\
    \ `GameCenterManager.m` 中的 `reportScore` 类，使其与以下代码一致：\n\n```\n- (void) reportScore:\
    \ (int64_t) score forCategory: (NSString*) category\n{\n    GKScore *scoreReporter\
    \ = [[[GKScore alloc] initWithCategory:category] autorelease];\n    scoreReporter.value\
    \ = score;\n    [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)\n\
    \    {\n        if (error != nil)\n        {\n            NSData* savedScoreData\
    \ = [NSKeyedArchiver archivedDataWithRootObject:scoreReporter];\n            [self\
    \ storeScoreForLater: savedScoreData];\n        }\n        [self callDelegateOnMainThread:\
    \ @selector(scoreReported:) withArg: NULL error: error];\n    }];\n}\n```\n\n\
    我们添加了几行额外的代码，这些代码将在检测到错误时运行。第一行获取 `GKScore` 对象并使用 `NSKeyedArchiver` 对其进行编码，这将返回一个\
    \ `NSData` 对象。稍后我们将从此 `NSData` 中检索 `GKScore`。我们还调用了一个我们命名为 `storeScoreForLater`\
    \ 的新方法。现在让我们看一下该方法；将以下方法添加到 `GameCenterManager` 类的实现中：\n\n```\n- (void)storeScoreForLater:(NSData\
    \ *)scoreData;\n{\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
    \    NSMutableArray *savedScoresd = [[defaults arrayForKey:@\"savedScores\"] mutableCopy];\n\
    \    [savedScoreArray addObject: scoreData];\n    [defaults setObject:savedScoreArray\
    \ forKey:@\"savedScores\"];\n    [savedScoreArray release];\n}\n```\n\n这段代码会将表示我们成绩的\
    \ `NSData` 保存到用户默认设置中。您也可以将此数据写入文件，甚至存储到核心数据中。永远不要假设用户只有一个未提交的成绩；他们在离线游戏时可能已经在多个不同的排行榜上积累了大量成绩。\n\
    \n到目前为止，我们已经捕获了发布失败的情况，并将成绩保存到磁盘以供稍后重试。最后一步是尝试将成绩重新提交到 Game Center。这一步可能非常复杂，具体取决于您希望系统有多智能。大多数成绩提交失败与网络访问问题有关，但也可能由\
    \ Game Center 宕机甚至 DNS 问题导致。\n\n何时重新提交成绩没有标准答案，但指导原则是：您不想保留一个本可以提交的成绩。在我们担心如何接入重新提交失败成绩的方法之前，让我们先实现一个重试成绩发布的方法。将以下方法添加到您的\
    \ `GameCenterManager` 类中。\n\n```\n-(void)submitAllSavedScores\n{\n    NSUserDefaults\
    \ *defaults = [NSUserDefaults standardUserDefaults];\n    NSArray *savedScores\
    \ = [defaults arrayForKey:@\"savedScores\"];\n    [defaults removeObjectForKey:\
    \ @\"savedScores\"];\n    GKScore *scoreReporter = nil;\n    NSData *savedScoreData\
    \ = nil;\n    for (NSData *scoreData in savedScores)\n    {\n        scoreReporter\
    \ = [NSKeyedUnarchiver unarchiveObjectWithData: scoreData];\n        [scoreReporter\
    \ reportScoreWithCompletionHandler: ^(NSError *error)\n        {\n           \
    \ if (error != nil)\n            {\n                savedScoreData = [NSKeyedArchiver\
    \ archivedDataWithRootObject:scoreReporter];\n                [self storeScoreForLater:\
    \ savedScoreData];\n            }\n            else\n            {\n         \
    \       NSLog(@\"已提交保存的成绩\");\n            }\n        }];\n    }\n}\n```\n\n这段代码将遍历所有已保存的成绩并尝试重新提交它们。由于这种行为没有委托，我们不需要提供委托回调。我们仅记录成功和失败情况，以便将失败的成绩重新添加到我们的未提交成绩数组中，以供稍后重试。\n\
    \n如前所述，接入重新提交失败成绩的方法有数十种。为简单起见，我们在成功通过 Game Center 进行身份验证后，添加对 `submitAllSavedScores`\
    \ 方法的调用。修改 `GameCenterManager.m` 中的 `authenticateLocalUser` 方法，使其与以下代码一致：\n\n\
    ```\nif ([[GKLocalPlayer localPlayer] authenticateHandler] == nil)\n{\n    [[GKLocalPlayer\
    \ localPlayer] setAuthenticateHandler:^(UIViewController *viewController, NSError\
    \ *error)\n    {\n        if (error != nil)\n        {\n            if ([error\
    \ code] == GKErrorNotSupported) {\n                UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"错误\" message:@\"此设备不支持 Game Center\" delegate:nil cancelButtonTitle:@\"\
    关闭\" otherButtonTitles:nil];\n                [alert show];\n                [alert\
    \ release];\n            }\n            else if ([error code] == GKErrorCancelled)\n\
    \            {\n                UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    错误\" message:@\"此设备已因来自应用的多次登录失败，您需要从 Game Center 应用登录\" delegate:nil cancelButtonTitle:@\"\
    关闭\" otherButtonTitles:nil];\n                [alert show];\n                [alert\
    \ release];\n            }\n            else\n            {\n                UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"错误\" message:[error localizedDescription]\
    \ delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n           \
    \     [alert show];\n                [alert release];\n            }\n       \
    \ }\n        else\n        {\n            if (viewController != nil)\n       \
    \     {\n                [(UIViewController *)delegate presentViewController:viewController\
    \ animated:YES completion:NULL];\n            }\n            [self submitAllSavedScores];\n\
    \        }\n    }];\n}\n```\n"
- fmt: "# Presenting a Leaderboard\n\nNow that we have a leaderboard in iTunes Connect,\
    \ and have populated a score into that leaderboard, it is time to present the\
    \ leaderboard to the user. There are two ways of presentation: the first is with\
    \ Apple’s GUI; the second is with a custom GUI. This section will take a look\
    \ at the implementation using Apple’s GUI. In the next section, you will learn\
    \ how to present a leaderboard with custom graphics.\n\nBefore we can begin, we\
    \ need to create a new button that will trigger the leaderboard. We want to do\
    \ this outside the game screen, because you do not want to drag the user away\
    \ from a game in progress to view a leaderboard. Begin by adding a new button\
    \ to the `UFOViewController` view, as shown in Figure 3-7.\n\n![A978-1-4302-4906-1_3_Fig7_HTML.jpg](A978-1-4302-4906-1_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7.** Adding a leaderboard button\n\nHook up the button to a new action\
    \ that matches the one shown next. Do not forget to change the category property\
    \ to the leaderboard that you set in iTunes Connect.\n\n```\n-(IBAction)leaderboardButtonPressed;\n\
    {\n        GKLeaderboardViewController *leaderboardController = nil;\n       \
    \ leaderboardController = [[GKLeaderboardViewController alloc] init];\n      \
    \  if (leaderboardController == NULL)\n                 return;\n        leaderboardController.category\
    \ = @\"com.dragonforged.ufo.single\";\n        leaderboardController.timeScope\
    \ = GKLeaderboardTimeScopeAllTime;\n        leaderboardController.leaderboardDelegate\
    \ = self;\n       [self presentViewController: leaderboardViewController animated:\
    \ YES completion: nil];\n}\n```\n\nYou also need to add in the delegate call for\
    \ `GKLeaderboardViewController`. To do so, add the following required method to\
    \ your implementation. Don’t forget to add `GKLeaderboardViewControllerDelegate`\
    \ to your header as well.\n\n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\
    \ *)viewController\n{\n     [self dismissViewControllerAnimated: YES completion:\
    \ nil];\n}\n```\n\nWhen you run the program and click the newly added Leaderboard\
    \ button, the result should look like Figure 3-8. As you can see, the title of\
    \ our leaderboard (as set in iTunes Connect) appears in the navigation bar. You\
    \ can also see the highest submitted score as well as the score suffix that was\
    \ set.\n\n![A978-1-4302-4906-1_3_Fig8_HTML.jpg](A978-1-4302-4906-1_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8.** A leaderboard being presented using Apple’s GUI\n\nThe GUI provides\
    \ a back button to take us to a list of all the leaderboards (see initial view\
    \ in Figure 3-9) that we have configured for the app. If you omit entering a category\
    \ when you create the `GKLeaderboardViewController` instance, you will be presented\
    \ with whatever leaderboard has been selected as the default leaderboard in iTunes\
    \ Connect.\n\nThis is all there is to creating and presenting a leaderboard using\
    \ Apple’s GUI. In the next section, we will look at how to customize a leaderboard\
    \ to match your own GUI.\n\n> **Note:** Remember that you cannot access any Game\
    \ Center functionality, including leaderboards, before a local user has authenticated.\
    \ If you try to do so, you will receive a `GKErrorNotAuthenticated` error.\n\n\
    ![A978-1-4302-4906-1_3_Fig9_HTML.jpg](A978-1-4302-4906-1_3_Fig9_HTML.jpg)\n\n\
    **Figure 3-9.** A collection of leaderboards, shown with Apple’s GUI\n\n> **Tip:**\
    \ You can change the order in which leaderboards appear (see Figure 3-9) by dragging\
    \ leaderboard entries up and down in iTunes Connect.\n\n## Customizing the Leaderboard\n\
    \nAs demonstrated in the previous section, presenting a leaderboard to the user\
    \ is straightforward. However, what if you want to customize the appearance of\
    \ a leaderboard? In this section, we will walk through the process of receiving\
    \ the raw leaderboard information so that you can present it in your app in whatever\
    \ fashion suits your needs.\n\nWe begin the process of adding a custom leaderboard\
    \ by adding a new button and associated action for it to `UFOViewController`.\
    \ Add a new button adjacent to the previous leaderboard button, and create a new\
    \ action for it.\n\nIn the previous example, Apple provides a view controller\
    \ for us. When we are working with our own custom leaderboards, we need to create\
    \ a view controller to handle the presentation. Create a new subclass of `UIViewController`\
    \ and name it `UFOLeaderboardViewController`. Modify the action of the new custom\
    \ leaderboard button to present a new instance of `UFOLeaderboardViewController`,\
    \ as seen in the following code snippet:\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n\
    {\nUFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController\
    \ alloc] init];\nleaderboardViewController.gcManager = gcManager;\n[self presentViewController:\
    \ leaderboardViewController animated: YES completion: nil];\n[leaderboardViewController\
    \ release];\n}\n```\n\nThe next step is to set up the xib for the new `UFOLeaderboardViewController`.\
    \ We will use the setup as shown in Figure 3-10; however, you may provide whatever\
    \ kind of customization you want here. Create the outlets and objects, as shown\
    \ in the figure, and hook up connections for all of them, including the delegate\
    \ and dataSource for the table.\n\n![A978-1-4302-4906-1_3_Fig10_HTML.jpg](A978-1-4302-4906-1_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10.** Creating the xib for a custom leaderboard\n\nThe first thing\
    \ that should be hooked up is the Dismiss button. Add the following code snippet\
    \ to your action that you connected to the Dismiss button:\n\n```\n-(IBAction)dismiss;\n\
    {\n[self dismissViewControllerAnimated: YES completion: nil];\n}\n```\n\nIf you\
    \ were to run the app at this point and click the Custom Leaderboard button, it\
    \ should launch a blank table in the correct orientation and allow you to dismiss\
    \ it to return to the first view.\n\nNow that we have got the view controller\
    \ overhead out of the way, we can begin to focus on the Game Center–specific features.\
    \ First, set up the table view delegate and datasource methods that we will be\
    \ using. We need to create a new class property to hold the score data for display.\
    \ Create a new `NSArray` object and name it `scoreArray`. Also create an associated\
    \ property for the array and synthesis it. Add the following two methods to your\
    \ implementation:\n\n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\nreturn [self.scoreArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:\n(NSIndexPath *)indexPath\n{\nstatic NSString\
    \ *CellIdentifier = @\"Cell\";\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
    CellIdentifier];\nif (cell == nil)\n{\ncell = [[[UITableViewCell alloc] initWithStyle:\n\
    UITableViewCellStyleSubtitle\nreuseIdentifier:\nCellIdentifier] autorelease];\n\
    cell.selectionStyle = UITableViewCellSelectionStyleNone;\n}\nGKScore *score =\
    \ [self.scoreArray objectAtIndex: indexPath.row];\ncell.textLabel.text = score.playerID;\n\
    cell.detailTextLabel.text = score.formattedValue;\nreturn cell;\n}\n```\n\nThe\
    \ first method returns the number of items in our table view. We deal with only\
    \ one section in this example, so the number of rows will always equal the number\
    \ of scores that are in our array. The next method displays the score into the\
    \ cell. We use `UITableViewCellStyleSubtitle` in this example, but in most cases,\
    \ you will want to create a more customized cell. The main label is set to the\
    \ player ID and the secondary label is set to the formatted score value. In the\
    \ previous chapter, it was noted that you should never show a player ID to the\
    \ user. We will add a method to convert a player ID to a player alias in the following\
    \ section; until then, we will use the player ID for debugging purposes."
  raw: '## Presenting a Leaderboard


    Now that we have a leaderboard in iTunes Connect, and have populated a score into
    that leaderboard, it is time to present the leaderboard to the user. There are
    two ways of presentation: the first is with Apple’s GUI; the second is with a
    custom GUI. This section will take a look at the implementation using Apple’s
    GUI. In the next section, you will learn how to present a leaderboard with custom
    graphics.


    Before we can begin, we need to create a new button that will trigger the leaderboard.
    We want to do this outside the game screen, because you do not want to drag the
    user away from a game in progress to view a leaderboard. Begin by adding a new
    button to the `UFOViewController` view, as shown in Figure [3-7](#A978-1-4302-4906-1_3_Chapter.html#Fig7).


    ![A978-1-4302-4906-1_3_Fig7_HTML.jpg](A978-1-4302-4906-1_3_Fig7_HTML.jpg)


    Figure 3-7.


    Adding a leaderboard button


    Hook up the button to a new action that matches the one shown next. Do not forget
    to change the category property to the leaderboard that you set in iTunes Connect.


    `-(IBAction)leaderboardButtonPressed;`


    `{`


            `GKLeaderboardViewController *leaderboardController = nil;`


            `leaderboardController = [[GKLeaderboardViewController alloc] init];`


            `if (leaderboardController == NULL)`


                     `return;`


            `leaderboardController.category = @"com.dragonforged.ufo.single";`


            `leaderboardController.timeScope = GKLeaderboardTimeScopeAllTime;`


            `leaderboardController.leaderboardDelegate = self;`


           `[self presentViewController: leaderboardViewController animated: YES completion:
    nil];`


    `}`


    You also need to add in the delegate call for `GKLeaderboardViewController`. To
    do so, add the following required method to your implementation. Don’t forget
    to add `GKLeaderboardViewControllerDelegate` to your header as well.


    `- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController *)viewController`


    `{`


         `[self dismissViewControllerAnimated: YES completion: nil];`


    `}`


    When you run the program and click the newly added Leaderboard button, the result
    should look like Figure [3-8](#A978-1-4302-4906-1_3_Chapter.html#Fig8). As you
    can see, the title of our leaderboard (as set in iTunes Connect) appears in the
    navigation bar. You can also see the highest submitted score as well as the score
    suffix that was set.


    ![A978-1-4302-4906-1_3_Fig8_HTML.jpg](A978-1-4302-4906-1_3_Fig8_HTML.jpg)


    Figure 3-8.


    A leaderboard being presented using Apple’s GUI


    The GUI provides a back button to take us to a list of all the leaderboards (see
    initial view in Figure [3-9](#A978-1-4302-4906-1_3_Chapter.html#Fig9)) that we
    have configured for the app. If you omit entering a category when you create the
    `GKLeaderboardViewController` instance, you will be presented with whatever leaderboard
    has been selected as the default leaderboard in iTunes Connect.


    This is all there is to creating and presenting a leaderboard using Apple’s GUI.
    In the next section, we will look at how to customize a leaderboard to match your
    own GUI.


    Note


    Remember that you cannot access any Game Center functionality, including leaderboards,
    before a local user has authenticated. If you try to do so, you will receive a
    `GKErrorNotAuthenticated` error.


    ![A978-1-4302-4906-1_3_Fig9_HTML.jpg](A978-1-4302-4906-1_3_Fig9_HTML.jpg)


    Figure 3-9.


    A collection of leaderboards, shown with Apple’s GUI Tip


    You can change the order in which leaderboards appear (see Figure [3-9](#A978-1-4302-4906-1_3_Chapter.html#Fig9))
    by dragging leaderboard entries up and down in iTunes Connect.


    ## Customizing the Leaderboard


    As demonstrated in the previous section, presenting a leaderboard to the user
    is straightforward. However, what if you want to customize the appearance of a
    leaderboard? In this section, we will walk through the process of receiving the
    raw leaderboard information so that you can present it in your app in whatever
    fashion suits your needs.


    We begin the process of adding a custom leaderboard by adding a new button and
    associated action for it to `UFOViewController`. Add a new button adjacent to
    the previous leaderboard button, and create a new action for it.


    In the previous example, Apple provides a view controller for us. When we are
    working with our own custom leaderboards, we need to create a view controller
    to handle the presentation. Create a new subclass of `UIViewController` and name
    it `UFOLeaderboardViewController`. Modify the action of the new custom leaderboard
    button to present a new instance of `UFOLeaderboardViewController`, as seen in
    the following code snippet:


    `-(IBAction)customLeaderboardButtonPressed;`


    `{`


    `UFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController
    alloc] init];`


    `leaderboardViewController.gcManager = gcManager;`


    `[self presentViewController: leaderboardViewController animated: YES completion:
    nil];`


    `[leaderboardViewController release];`


    `}`


    The next step is to set up the xib for the new `UFOLeaderboardViewController`.
    We will use the setup as shown in Figure [3-10](#A978-1-4302-4906-1_3_Chapter.html#Fig10);
    however, you may provide whatever kind of customization you want here. Create
    the outlets and objects, as shown in the figure, and hook up connections for all
    of them, including the delegate and dataSource for the table.


    ![A978-1-4302-4906-1_3_Fig10_HTML.jpg](A978-1-4302-4906-1_3_Fig10_HTML.jpg)


    Figure 3-10.


    Creating the xib for a custom leaderboard


    The first thing that should be hooked up is the Dismiss button. Add the following
    code snippet to your action that you connected to the Dismiss button:


    `-(IBAction)dismiss;`


    `{`


    `[self dismissViewControllerAnimated: YES completion: nil];`


    `}`


    If you were to run the app at this point and click the Custom Leaderboard button,
    it should launch a blank table in the correct orientation and allow you to dismiss
    it to return to the first view.


    Now that we have got the view controller overhead out of the way, we can begin
    to focus on the Game Center–specific features. First, set up the table view delegate
    and datasource methods that we will be using. We need to create a new class property
    to hold the score data for display. Create a new `NSArray` object and name it
    `scoreArray`. Also create an associated property for the array and synthesis it.
    Add the following two methods to your implementation:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `return [self.scoreArray count];`


    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:É`


    `(NSIndexPath *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:É`


    `CellIdentifier];`


    `if (cell == nil)`


    `{`


    `cell = [[[UITableViewCell alloc] initWithStyle:É`


    `UITableViewCellStyleSubtitle`


    `reuseIdentifier:É`


    `CellIdentifier] autorelease];`


    `cell.selectionStyle = UITableViewCellSelectionStyleNone;`


    `}`


    `GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];`


    `cell.textLabel.text = score.playerID;`


    `cell.detailTextLabel.text = score.formattedValue;`


    `return cell;`


    `}`


    The first method returns the number of items in our table view. We deal with only
    one section in this example, so the number of rows will always equal the number
    of scores that are in our array. The next method displays the score into the cell.
    We use `UITableViewCellStyleSubtitle` in this example, but in most cases, you
    will want to create a more customized cell. The main label is set to the player
    ID and the secondary label is set to the formatted score value. In the previous
    chapter, it was noted that you should never show a player ID to the user. We will
    add a method to convert a player ID to a player alias in the following section;
    until then, we will use the player ID for debugging purposes.'
  trans: "\n# 展示排行榜\n\n现在，我们已经在 iTunes Connect 中创建了一个排行榜并向其中添加了一条分数，是时候向用户展示排行榜了。展示方式有两种：第一种是使用\
    \ Apple 的图形界面；第二种是使用自定义图形界面。本节将介绍如何使用 Apple 的图形界面进行实现。下一节你将学习如何用自定义图形来展示排行榜。\n\
    \n在开始之前，我们需要创建一个新的按钮来触发排行榜。我们希望这个按钮位于游戏屏幕之外，因为不希望将正在游戏中的用户拖离当前进程去查看排行榜。首先，在 `UFOViewController`\
    \ 视图中添加一个新按钮，如图 3-7 所示。\n\n![A978-1-4302-4906-1_3_Fig7_HTML.jpg](img/A978-1-4302-4906-1_3_Fig7_HTML.jpg)\n\
    \n**图 3-7.** 添加排行榜按钮\n\n将该按钮连接到以下所示的新操作。不要忘记将类别属性更改为你在 iTunes Connect 中设置的排行榜。\n\
    \n```\n-(IBAction)leaderboardButtonPressed;\n{\n        GKLeaderboardViewController\
    \ *leaderboardController = nil;\n        leaderboardController = [[GKLeaderboardViewController\
    \ alloc] init];\n        if (leaderboardController == NULL)\n                \
    \ return;\n        leaderboardController.category = @\"com.dragonforged.ufo.single\"\
    ;\n        leaderboardController.timeScope = GKLeaderboardTimeScopeAllTime;\n\
    \        leaderboardController.leaderboardDelegate = self;\n       [self presentViewController:\
    \ leaderboardViewController animated: YES completion: nil];\n}\n```\n\n你还需要添加\
    \ `GKLeaderboardViewController` 的委托回调。为此，请在实现中添加以下必需方法。别忘了也要在头文件中添加 `GKLeaderboardViewControllerDelegate`。\n\
    \n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\
    \ *)viewController\n{\n     [self dismissViewControllerAnimated: YES completion:\
    \ nil];\n}\n```\n\n运行程序并点击新添加的“排行榜”按钮，结果应如图 3-8 所示。可以看到，我们的排行榜标题（在 iTunes Connect\
    \ 中设置）显示在导航栏中。同时还能看到已提交的最高分以及设置的后缀。\n\n![A978-1-4302-4906-1_3_Fig8_HTML.jpg](img/A978-1-4302-4906-1_3_Fig8_HTML.jpg)\n\
    \n**图 3-8.** 使用 Apple 图形界面展示的排行榜\n\n该图形界面提供了一个返回按钮，可以让我们进入所有排行榜的列表（见图 3-9 的初始视图），这些排行榜是为应用配置的。如果在创建\
    \ `GKLeaderboardViewController` 实例时省略了类别输入，则会显示在 iTunes Connect 中被选为默认排行榜的内容。\n\
    \n以上就是使用 Apple 图形界面创建和展示排行榜的全部内容。下一节我们将介绍如何自定义排行榜以匹配你自己的图形界面。\n\n> **注意：** 请记住，在本地用户认证之前，你不能访问任何\
    \ Game Center 功能，包括排行榜。如果尝试这样做，你会收到 `GKErrorNotAuthenticated` 错误。\n\n![A978-1-4302-4906-1_3_Fig9_HTML.jpg](img/A978-1-4302-4906-1_3_Fig9_HTML.jpg)\n\
    \n**图 3-9.** 使用 Apple 图形界面显示的排行榜合集\n\n> **提示：** 你可以通过在 iTunes Connect 中上下拖动排行榜条目来更改排行榜的显示顺序（见图\
    \ 3-9）。\n\n## 自定义排行榜\n\n如上一节所示，向用户展示排行榜非常直接。但是，如果你想自定义排行榜的外观呢？在本节中，我们将逐步讲解获取原始排行榜信息的过程，以便你可以根据自身需求以任何方式在应用中呈现。\n\
    \n我们通过向 `UFOViewController` 添加一个新按钮及其关联操作来开始添加自定义排行榜的流程。在前一个排行榜按钮旁添加一个新按钮，并为其创建一个新操作。\n\
    \n在前一个示例中，Apple 为我们提供了一个视图控制器。当处理自定义排行榜时，我们需要自己创建一个视图控制器来处理展示。创建 `UIViewController`\
    \ 的一个新子类，并将其命名为 `UFOLeaderboardViewController`。修改新自定义排行榜按钮的操作，使其展示 `UFOLeaderboardViewController`\
    \ 的一个新实例，如以下代码片段所示：\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n{\nUFOLeaderboardViewController\
    \ *leaderboardViewController = [[UFOLeaderboardViewController alloc] init];\n\
    leaderboardViewController.gcManager = gcManager;\n[self presentViewController:\
    \ leaderboardViewController animated: YES completion: nil];\n[leaderboardViewController\
    \ release];\n}\n```\n\n下一步是设置新 `UFOLeaderboardViewController` 的 xib。我们将使用如图 3-10\
    \ 所示的设置；当然，你也可以在这里进行任何形式的自定义。按照图中的指示创建输出口和对象，并连接所有连接，包括表格的委托和数据源。\n\n![A978-1-4302-4906-1_3_Fig10_HTML.jpg](img/A978-1-4302-4906-1_3_Fig10_HTML.jpg)\n\
    \n**图 3-10.** 为自定义排行榜创建 xib\n\n首先应该连接的是“关闭”按钮。将以下代码片段添加到你连接到关闭按钮的操作中：\n\n```\n\
    -(IBAction)dismiss;\n{\n[self dismissViewControllerAnimated: YES completion: nil];\n\
    }\n```\n\n如果此时运行应用并点击“自定义排行榜”按钮，它应能以一个正确的方向启动一个空白表格，并且你可以关闭它以返回第一个视图。\n\n现在，我们已经处理完了视图控制器的基本框架，可以开始专注于\
    \ Game Center 特有的功能了。首先，设置我们将要使用的表格视图委托和数据源方法。我们需要创建一个新的类属性来保存要显示的分数数据。创建一个新的\
    \ `NSArray` 对象，并命名为 `scoreArray`。同时为这个数组创建关联的属性并实现合成。在你的实现中添加以下两个方法：\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\nreturn [self.scoreArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:\n(NSIndexPath *)indexPath\n{\nstatic NSString\
    \ *CellIdentifier = @\"Cell\";\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
    CellIdentifier];\nif (cell == nil)\n{\ncell = [[[UITableViewCell alloc] initWithStyle:\n\
    UITableViewCellStyleSubtitle\nreuseIdentifier:\nCellIdentifier] autorelease];\n\
    cell.selectionStyle = UITableViewCellSelectionStyleNone;\n}\nGKScore *score =\
    \ [self.scoreArray objectAtIndex: indexPath.row];\ncell.textLabel.text = score.playerID;\n\
    cell.detailTextLabel.text = score.formattedValue;\nreturn cell;\n}\n```\n\n第一个方法返回表格视图中的项目数量。本例中我们只处理一个区段，因此行数始终等于数组中的分数个数。下一个方法将分数显示到单元格中。本例中我们使用\
    \ `UITableViewCellStyleSubtitle`，但在大多数情况下，你可能需要创建更自定义的单元格。主标签设置为玩家 ID，副标签设置为格式化的分数值。上一章曾提到，永远不应向用户显示玩家\
    \ ID。我们将在下一节中添加一个将玩家 ID 转换为玩家别名的方法；在此之前，我们先用玩家 ID 进行调试。\n"
- fmt: "# Modifying GameCenterManager\n\nLet’s take a moment to switch over to our\
    \ `GameCenterManager` class. In the header file, create a new optional protocol\
    \ as shown here:\n\n```\n(void)leaderboardUpdated: (NSArray *)scores error:(NSError\
    \ *)error;\n```\n\nNext, we create a new method to retrieve scores from the Game\
    \ Center servers. Add the following method to the implementation of the `GameCenterManager`\
    \ class:\n\n```\n- (void)retrieveScoresForCategory:(NSString *)category\n    \
    \            withPlayerScope:(GKLeaderboardPlayerScope)playerScope\n         \
    \             timeScope:(GKLeaderboardTimeScope)timeScope\n                  \
    \    withRange:(NSRange)range;\n{\n    GKLeaderboard *leaderboardRequest = [[GKLeaderboard\
    \ alloc] init];\n    leaderboardRequest.playerScope = playerScope;\n    leaderboardRequest.timeScope\
    \ = timeScope;\n    leaderboardRequest.range = range;\n    leaderboardRequest.category\
    \ = category;\n    [leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray\
    \ *scores,NSError*error)\n     {\n        [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)\n\
    \                               withArg:scores\n                             \
    \    error:error];\n     }];\n}\n```\n\nWe want to keep this call as generic as\
    \ possible because the ultimate goal of the `GameCenterManager` class is to be\
    \ a reusable class that can easily be dropped into any of your future projects.\n\
    \nThis method takes all the arguments that are required to create a new `GKLeaderboard`\
    \ object. Once we have created the object and set the properties that are required,\
    \ we can call the method `loadScoresWithCompletionHandler` on the `GKLeaderboard`\
    \ object. We will continue to use our standard thread-safe delegate callback.\
    \ These are all the modifications that are needed in the `GameCenterManager` class\
    \ for this section.\n\n# Filtering Results on a Custom Leaderboard\n\nLet’s shift\
    \ our focus back to the `UFOLeaderboardCiewController` class again. We will next\
    \ add an action for our segmented controller. This will allow the user to switch\
    \ between global scores and friends-only scores. Connect the following method\
    \ to the `valueChanged` action of the segmented controller:\n\n```\n-(IBAction)segementedControllerDidChange:(id)sender;\n\
    {\n    GKLeaderboardPlayerScope playerScope;\n    if ([scopeSegementedController\
    \ selectedSegmentIndex] == 0)\n    {\n        playerScope = GKLeaderboardPlayerScopeFriendsOnly;\n\
    \    }\n    else\n    {\n        playerScope = GKLeaderboardPlayerScopeGlobal;\n\
    \    }\n    self.scoreArray = nil;\n    [self.gcManager retrieveScoresForCategory:@\"\
    com.dragonforged.ufo.single\"\n                             withPlayerScope:playerScope\n\
    \                                   timeScope:GKLeaderboardTimeScopeAllTime\n\
    \                                   withRange:NSMakeRange(1,50)];\n    [leaderboardTableView\
    \ reloadData];\n}\n```\n\nThis method calls the `GameCenterManager` method to\
    \ retrieve the score array. The segmented control has two values: one for friends,\
    \ and one for everyone. You could easily modify the preceding code to retrieve\
    \ different time scopes as well, but in this example we request only the all-time\
    \ scope. An important step here that can be easy to overlook is setting the array\
    \ to nil and reloading the table. Doing so will remove the scores that are in\
    \ the table when the segmented controller value is changed.\n\nThe call to retrieve\
    \ scores is fairly straightforward. We use the category we set in iTunes Connect\
    \ for the leaderboard we wish to retrieve, and set our time and player scope.\
    \ The last argument on the method is a range. In this example, we return scores\
    \ from first place to fiftieth place.\n\nYou also need to create a new property\
    \ for the `UFOLeaderboardViewController` class; this will be a pointer to our\
    \ `GameCenterManager` class. This is done in exactly the same way as when we did\
    \ it for the `UFOGameViewController` class.\n\n> **Note:** Score ranges always\
    \ start at an index of 1. You could modify the previous example with a new range\
    \ of `NSMakeRange(50,50)`; this will retrieve scores from places 50 to 100. Make\
    \ sure you don’t request too many scores at a time, as the time it takes to retrieve\
    \ the score data is related to how many scores you are attempting to retrieve.\n\
    \n# Displaying the Custom Leaderboard\n\nIf you were to run this project now,\
    \ you would notice the table is always blank. This is caused by two different\
    \ omissions. The first is that we never set a value for our `gcManager`, and the\
    \ second is that we never called the `retrieveScore` method. To rectify this,\
    \ modify the `viewDidLoad` method of the `UFOLeaderboardViewController` implementation\
    \ to match the following. The `retrieveScore` method is called when the `segmentedControllerDidChange`\
    \ is invoked.\n\n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.gcManager.delegate\
    \ = self;\n    [self segementedControllerDidChange:nil];\n}\n```\n\nThe last step\
    \ is to pass a reference to the `gcManager` to our leaderboard class. We do this\
    \ in the `UFOViewController` class. Modify the existing `IBAction` method to set\
    \ the property for `gcManager` to the instance that exists in the `UFOViewController`.\
    \ Your code should look like the following example:\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n\
    {\n    UFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController\
    \ alloc] init];\n    leaderboardViewController.gcManager = gcManager;\n    [self\
    \ presentViewController: leaderboardViewController animated: YES completion: nil];\n\
    \    [leaderboardViewController release];\n}\n```\n\nIf you were to now run the\
    \ app again, you would see output similar to that shown in Figure [3-11](#A978-1-4302-4906-1_3_Chapter.html#Fig11).\
    \ The number of scores, the score values, and the player IDs will be different,\
    \ but you should be able to see at least one score listed.\n\n![A978-1-4302-4906-1_3_Fig11_HTML.jpg](A978-1-4302-4906-1_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11.** An initial view of our custom leaderboard\n\n> **Important:**\
    \ It cannot be guaranteed that you will not be returned cached data for a leaderboard\
    \ request. You should assume that the data you are retrieving is cached and might\
    \ not be the most up to date."
  raw: '### Modifying GameCenterManager


    Let’s take a moment to switch over to our `GameCenterManager` class. In the header
    file, create a new optional protocol as shown here:


    `(void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;`


    Next, we create a new method to retrieve scores from the Game Center servers.
    Add the following method to the implementation of the `GameCenterManager` class:


    `- (void)retrieveScoresForCategory:(NSString *)category`


                                `withPlayerScope:(GKLeaderboardPlayerScope)playerScope`


                                          `timeScope:(GKLeaderboardTimeScope)timeScope`


                                          `withRange:(NSRange)range;`


    `{`


            `GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];`


            `leaderboardRequest.playerScope = playerScope;`


            `leaderboardRequest.timeScope = timeScope;`


            `leaderboardRequest.range = range;`


            `leaderboardRequest.category = category;`


            `[leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray *scores,NSError*error)`


             `{`


                    `[self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)`


                                                           `withArg:scores`


                                                               `error:error];`


             `}];`


    `}`


    We want to keep this call as generic as possible because the ultimate goal of
    the `GameCenterManager` class is to be a reusable class that can easily be dropped
    into any of your future projects.


    This method takes all the arguments that are required to create a new `GKLeaderboard`
    object. Once we have created the object and set the properties that are required,
    we can call the method `loadScoresWithCompletionHandler` on the `GKLeaderboard`
    object. We will continue to use our standard thread-safe delegate callback. These
    are all the modifications that are needed in the `GameCenterManager` class for
    this section.


    ### Filtering Results on a Custom Leaderboard


    Let’s shift our focus back to the `UFOLeaderboardCiewController` class again.
    We will next add an action for our segmented controller. This will allow the user
    to switch between global scores and friends-only scores. Connect the following
    method to the `valueChanged` action of the segmented controller:


    `-(IBAction)segementedControllerDidChange:(id)sender;`


    `{`


            `GKLeaderboardPlayerScope playerScope;`


            `if ([scopeSegementedController selectedSegmentIndex] == 0)`


            `{`


                    `playerScope = GKLeaderboardPlayerScopeFriendsOnly;`


            `}`


            `else`


            `{`


                    `playerScope = GKLeaderboardPlayerScopeGlobal;`


            `}`


            `self.scoreArray = nil;`


             `[self.gcManager retrieveScoresForCategory:@"com.dragonforged.ufo.single"`


                                                              `withPlayerScope:playerScope`


                                                                        `timeScope:É`


    `GKLeaderboardTimeScopeAllTime`


                                                                        `withRange:É`


    `NSMakeRange(1,50)];`


            `[leaderboardTableView reloadData];`


    `}`


    This method calls the `GameCenterManager` method to retrieve the score array.
    The segmented control has two values: one for friends, and one for everyone. You
    could easily modify the preceding code to retrieve different time scopes as well,
    but in this example we request only the all-time scope. An important step here
    that can be easy to overlook is setting the array to nil and reloading the table.
    Doing so will remove the scores that are in the table when the segmented controller
    value is changed.


    The call to retrieve scores is fairly straightforward. We use the category we
    set in iTunes Connect for the leaderboard we wish to retrieve, and set our time
    and player scope. The last argument on the method is a range. In  this example,
    we return scores from first place to fiftieth place.


    You also need to create a new property for the `UFOLeaderboardViewController`
    class; this will be a pointer to our `GameCenterManager` class. This is done in
    exactly the same way as when we did it for the `UFOGameViewController` class.


    Note


    Score ranges always start at an index of 1\. You could modify the previous example
    with a new range of `NSMakeRange(50,50)`; this will retrieve scores from  places
    50 to 100\. Make sure you don’t request too many scores at a time, as the time
    it takes to retrieve the score data is related to how many scores you are attempting
    to retrieve.


    ### Displaying the Custom Leaderboard


    If you were to run this project now, you would notice the table is always blank.
    This is caused by two different omissions. The first is that we never set a value
    for our `gcManager`, and the second is that we never called the `retrieveScore`
    method. To rectify this, modify the `viewDidLoad` method of the `UFOLeaderboardViewController`
    implementation to match the following. The `retrieveScore` method is called when
    the segmentedControllerDidChange is invoked.


    `-(void)viewDidLoad`


    `{`


            `[super viewDidLoad];`


            `self.gcManager.delegate = self;`


            `[self segementedControllerDidChange:nil];`


    `}`


    The last step is to pass a reference to the `gcManager` to our leaderboard class.
    We do this in the `UFOViewController` class. Modify the existing `IBAction` method
    to set the property for `gcManager` to the instance that exists in the `UFOViewController`.
    Your code should look like the following example:


    `-(IBAction)customLeaderboardButtonPressed;`


    `{`


         `UFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController
    alloc] init];`


         `leaderboardViewController.gcManager = gcManager;`


             `[self presentViewController: leaderboardViewController animated: YES
    completion: nil];`


         `[leaderboardViewController release];`


    `}`


    If you were to now run the app again, you would see output similar to that shown
    in Figure [3-11](#A978-1-4302-4906-1_3_Chapter.html#Fig11). The number of scores,
    the score values, and the player IDs will be different, but you should be able
    to see at least one score listed.


    ![A978-1-4302-4906-1_3_Fig11_HTML.jpg](A978-1-4302-4906-1_3_Fig11_HTML.jpg)


    Figure 3-11.


    An initial view of our custom leaderboard Important


    It cannot be guaranteed that you will not be returned cached data for a leaderboard
    request. You should assume that the data you are retrieving is cached and might
    not be the most up to date.'
  trans: "\n# 修改 GameCenterManager\n\n现在让我们将注意力切换到 `GameCenterManager` 类。在头文件中，创建一个新的可选协议，如下所示：\n\
    \n```\n(void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n```\n\
    \n接下来，我们创建一个新方法，用于从 Game Center 服务器检索分数。将以下方法添加到 `GameCenterManager` 类的实现中：\n\n\
    ```\n- (void)retrieveScoresForCategory:(NSString *)category\n                withPlayerScope:(GKLeaderboardPlayerScope)playerScope\n\
    \                      timeScope:(GKLeaderboardTimeScope)timeScope\n         \
    \             withRange:(NSRange)range;\n{\n    GKLeaderboard *leaderboardRequest\
    \ = [[GKLeaderboard alloc] init];\n    leaderboardRequest.playerScope = playerScope;\n\
    \    leaderboardRequest.timeScope = timeScope;\n    leaderboardRequest.range =\
    \ range;\n    leaderboardRequest.category = category;\n    [leaderboardRequest\
    \ loadScoresWithCompletionHandler: ^(NSArray *scores,NSError*error)\n     {\n\
    \        [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)\n\
    \                               withArg:scores\n                             \
    \    error:error];\n     }];\n}\n```\n\n我们希望尽可能保持这个调用的通用性，因为 `GameCenterManager`\
    \ 类的最终目标是成为一个可复用的类，能够轻松地嵌入到你未来的任何项目中。\n\n此方法接收创建新 `GKLeaderboard` 对象所需的全部参数。一旦我们创建了对象并设置了必要的属性，就可以在\
    \ `GKLeaderboard` 对象上调用 `loadScoresWithCompletionHandler` 方法。我们将继续使用标准的线程安全委托回调。这就是本节在\
    \ `GameCenterManager` 类中所需的所有修改。\n\n# 在自定义排行榜上过滤结果\n\n让我们将注意力重新转回 `UFOLeaderboardCiewController`\
    \ 类。接下来，我们将为分段控制器添加一个操作。这将允许用户在**全局分数**和**仅好友分数**之间切换。将以下方法连接到分段控制器的 `valueChanged`\
    \ 操作：\n\n```\n-(IBAction)segementedControllerDidChange:(id)sender;\n{\n    GKLeaderboardPlayerScope\
    \ playerScope;\n    if ([scopeSegementedController selectedSegmentIndex] == 0)\n\
    \    {\n        playerScope = GKLeaderboardPlayerScopeFriendsOnly;\n    }\n  \
    \  else\n    {\n        playerScope = GKLeaderboardPlayerScopeGlobal;\n    }\n\
    \    self.scoreArray = nil;\n    [self.gcManager retrieveScoresForCategory:@\"\
    com.dragonforged.ufo.single\"\n                             withPlayerScope:playerScope\n\
    \                                   timeScope:GKLeaderboardTimeScopeAllTime\n\
    \                                   withRange:NSMakeRange(1,50)];\n    [leaderboardTableView\
    \ reloadData];\n}\n```\n\n此方法调用 `GameCenterManager` 方法来检索分数数组。分段控件有两个值：一个用于好友，一个用于所有人。你也可以轻松地修改上述代码来检索不同的时间范围，但在本例中，我们只请求**所有时间**的范围。这里容易忽略的一个重要步骤是将数组设置为\
    \ nil 并重新加载表格。这样做可以在分段控件值更改时移除表格中现有的分数。\n\n检索分数的调用相当直接。我们使用在 iTunes Connect 中为要检索的排行榜设置的类别，并设置时间和玩家范围。该方法的最后一个参数是一个范围。在本例中，我们返回从第一名到第五十名的分数。\n\
    \n你还需要为 `UFOLeaderboardViewController` 类创建一个新属性；这将是一个指向我们 `GameCenterManager`\
    \ 类的指针。其操作方式与我们在 `UFOGameViewController` 类中所做的方式完全相同。\n\n> **注意：** 分数范围始终从索引 1\
    \ 开始。你可以将前面的示例修改为新的范围 `NSMakeRange(50,50)`；这将检索从第 50 名到第 100 名的分数。请确保不要一次请求太多分数，因为检索分数数据所需的时间与你尝试检索的分数数量相关。\n\
    \n# 显示自定义排行榜\n\n如果你现在运行这个项目，你会发现表格始终是空白的。这由两个遗漏引起。首先，我们从未为 `gcManager` 设置值；其次，我们从未调用\
    \ `retrieveScore` 方法。为纠正此问题，请将 `UFOLeaderboardViewController` 实现的 `viewDidLoad`\
    \ 方法修改为如下所示。`retrieveScore` 方法会在调用 `segmentedControllerDidChange` 时被触发。\n\n```\n\
    -(void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.gcManager.delegate =\
    \ self;\n    [self segementedControllerDidChange:nil];\n}\n```\n\n最后一步是将 `gcManager`\
    \ 的引用传递给我们的排行榜类。我们在 `UFOViewController` 类中执行此操作。修改现有的 `IBAction` 方法，将 `gcManager`\
    \ 的属性设置为 `UFOViewController` 中已存在的实例。你的代码应如下例所示：\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n\
    {\n    UFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController\
    \ alloc] init];\n    leaderboardViewController.gcManager = gcManager;\n    [self\
    \ presentViewController: leaderboardViewController animated: YES completion: nil];\n\
    \    [leaderboardViewController release];\n}\n```\n\n如果你现在重新运行应用程序，你将看到类似于图 3-11\
    \ 所示的输出。分数的数量、分数值和玩家 ID 会有所不同，但你应该能够看到至少列出一个分数。\n\n![A978-1-4302-4906-1_3_Fig11_HTML.jpg](img/A978-1-4302-4906-1_3_Fig11_HTML.jpg)\n\
    \n**图 3-11.** 自定义排行榜的初始视图\n\n> **重要提示：** 无法保证你不会获得排行榜请求的缓存数据。你应该假设你检索的数据是缓存的，可能不是最新的。\n"
- fmt: "# Mapping a Player ID\n\nIn the previous section, we learned how to pull down\
    \ the raw score values of a leaderboard. However, we ended up with a leaderboard\
    \ that contained only player IDs rather than the aliases (which the user expects\
    \ to be shown). In this section, we will create a new method that will translate\
    \ player IDs into player aliases. We will begin this process by adding some new\
    \ methods to our `GameCenterManager` class. These will enable searching for both\
    \ single names and arrays of names. Add the following two methods to the `GameCenterManager`\
    \ class.\n\n```\n- (void)mapPlayerIDtoPlayer:(NSString*)playerID\n{\n    [GKPlayer\
    \ loadPlayersForIdentifiers: [NSArray arrayWithObject: playerID]\n           \
    \       withCompletionHandler:^(NSArray *playerArray, NSError*error)\n    {\n\
    \        GKPlayer* player = nil;\n        for (GKPlayer* tempPlayer in playerArray)\n\
    \        {\n            if ([tempPlayer.playerID isEqualToString: playerID] ==\
    \ nil)\n                continue;\n            player = tempPlayer;\n        \
    \    break;\n        }\n        [self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)\n\
    \                              withArg:player\n                              \
    \  error:error];\n    }];\n}\n\n- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs\n\
    {\n    [GKPlayer loadPlayersForIdentifiers: playerIDs withCompletionHandler:^(NSArray\
    \ *playerArray, NSError *error)\n    {\n        [self callDelegateOnMainThread:\
    \ @selector(mappedPlayerIDs:error:)\n                              withArg: playerArray\
    \ error: error];\n    }];\n}\n```\n\nThe first method will return a single `GKPlayer`\
    \ object, while the second method will return an array of `GKPlayer` objects.\
    \ We also need to add two new protocol methods to handle the delegate callbacks.\n\
    \nThough we could use the same callback and return a single-item array for the\
    \ first call, we will want to keep both methods around. Nothing prevents you from\
    \ passing a single player ID into the second method; however, the first method\
    \ will serve useful purposes from time to time as well. Do not forget we are building\
    \ a reusable library of Game Center calls.\n\nYour protocols for `GameCenterManagerDelegate`\
    \ should now look like the following code, assuming you have been following along\
    \ since the beginning of this book:\n\n```\n@protocol GameCenterManagerDelegate\
    \ <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n@end\n```\n\nOnce you have a `GKPlayer` object\
    \ for a given `playerID`, there are many ways to look up one based on the other.\
    \ Once again for simplicity’s sake, we will store all fetched players into an\
    \ array and use a simple lookup.\n\nThe first thing we need to do is add a new\
    \ `NSMutableArray` to our `UFOLeaderboardViewController` class. Let’s name this\
    \ new object `playerArray`. Don’t forget to allocate and initialize it in the\
    \ `viewDidLoad` method. Add a method for the new protocol that we just set up,\
    \ and initialize it as shown in the following:\n\n```\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error\n{\n    if (error != nil)\n    {\n        NSLog(@\"\
    Error during player mapping: %@\", [error localizedDescription]);\n    }\n   \
    \ else\n    {\n        [playerArray addObject: player];\n    }\n    [leaderboardTableView\
    \ reloadData];\n}\n```\n\nThis method merely stores the retrieved `GKPlayers`\
    \ into an array for future reference. If you were using the method that returns\
    \ an array of players, your delegate callback would look like the following instead:\n\
    \n```\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"Error during player mapping:\
    \ %@\", [error localizedDescription]);\n    }\n    else\n    {\n        [playerArray\
    \ addObjectsFromArray:players];\n    }\n    [leaderboardTableView reloadData];\n\
    }\n```\n\nWe also need to add a new method that will handle iterating through\
    \ our array and looking for a player match.\n\n```\n-(NSString *)playerNameforID:(NSString\
    \ *)playerID;\n{\n    for (GKPlayer *player in playerArray)\n    {\n        if\
    \ ([player.playerID isEqualToString: playerID])\n            continue;\n     \
    \   return player.alias;\n    }\n    return nil;\n}\n```\n\nThis method searches\
    \ through the player array for a match on the `playerID` and returns the alias\
    \ for that player. You could just as easily return the entire `GKPlayer` object\
    \ if you wanted more information in your table cell, such as whether they are\
    \ underage or are one of your friends.\n\nThe final step is to modify our `cellForRow`\
    \ method to handle the new name lookup code. The following method will replace\
    \ our old `cellForRow` method in `UFOLeaderboardViewController`.\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                       reuseIdentifier:CellIdentifier] autorelease];\n\
    \        cell.selectionStyle = UITableViewCellSelectionStyleNone;\n    }\n   \
    \ GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\n    NSString\
    \ *playerName = [self playerNameforID: score.playerID];\n    if (playerName ==\
    \ nil)\n    {\n        [self.gcManager mapPlayerIDtoPlayer: score.playerID];\n\
    \        cell.textLabel.text = @\"Loading Name…\";\n    }\n    else\n    {\n \
    \       cell.textLabel.text = playerName;\n    }\n    cell.detailTextLabel.text\
    \ = score.formattedValue;\n    return cell;\n}\n```\n\n> **Tip:** You can access\
    \ the raw score data with the `value` property on `GKScore`. This will allow you\
    \ to perform even more customization than is available in the score format type\
    \ in iTunes Connect.\n\nAs you can see, in this method, we get a `GKScore` as\
    \ we did in the previous example. We created a new string called `playerName`\
    \ and use our new method to populate it. The first time this method is called,\
    \ `playerNameforID` will return nil. During that event, we call our `mapPlayerIDtoPlayer`\
    \ method and set the text in the cell to \"Loading Name…\". This serves as a placeholder\
    \ until we can load in the full username. When we get a callback from the `GameCenterManager`,\
    \ we reload the table. At this point, `playerNameforID` should return the alias\
    \ for the player.\n\nIf the app is run again, you will see that we are now displaying\
    \ proper player aliases instead of the player IDs (see Figure 3-12).\n\n> **Note:**\
    \ Remember that the user can change their alias at any time, and you should always\
    \ display the most up-to-date alias. With this in mind, you should always attempt\
    \ to update the alias whenever displaying it. Do not cache once and then never\
    \ request an update.\n\n![A978-1-4302-4906-1_3_Fig12_HTML.jpg](A978-1-4302-4906-1_3_Fig12_HTML.jpg)\n\
    \n**Figure 3-12.** A custom leaderboard that properly maps player aliases"
  raw: '## Mapping a Player ID


    In the previous section, we learned how to pull down the raw score values of a
    leaderboard. However, we ended up with a leaderboard that contained only player
    IDs rather than the aliases (which the user expects to be shown). In this section,
    we will create a new method that will translate player IDs into player aliases.
    We will begin this process by adding some new methods to our `GameCenterManager`
    class. These will enable searching for both single names and arrays of names.
    Add the following two methods to the `GameCenterManager` class.


    `- (void)mapPlayerIDtoPlayer:(NSString*)playerID`


    `{`


    `[GKPlayer loadPlayersForIdentifiers: [NSArray arrayWithObject: playerID]`


    `withCompletionHandler:^(NSArray *playerArray, NSError*error)`


    `{`


    `GKPlayer* player = nil;`


    `for (GKPlayer* tempPlayer in playerArray)`


    `{`


    `if ([tempPlayer.playerID isEqualToString: playerID] == nil)`


    `continue;`


    `player = tempPlayer;`


    `break;`


    `}`


    `[self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)`


    `withArg:player`


    `error:error];`


    `}];`


    `}`


    `- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs`


    `{`


    `[GKPlayer loadPlayersForIdentifiers: playerIDs withCompletionHandler:^(NSArrayÉ`


    `*playerArray, NSError *error)`


    `{`


    `[self callDelegateOnMainThread: @selector(mappedPlayerIDs:error:) É`


    `withArg: playerArray error: error];`


    `}];`


    `}`


    The first method will return a single `GKPlayer` object, while the second method
    will return an array of `GKPlayer` objects. We also need to add two new protocol
    methods to handle the delegate callbacks.


    Though we could use the same callback and return a single-item array for the first
    call, we will want to keep both methods around. Nothing prevents you from passing
    a single player ID into the second method; however, the first method will serve
    useful purposes from time to time as well. Do not forget we are building a reusable
    library of Game Center calls.


    Your protocols for `GameCenterManagerDelegate` should now look like the following
    code, assuming you have been following along since the beginning of this book:


    `@protocol GameCenterManagerDelegate <NSObject>`


    `@optional`


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`


    `- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;`


    `- (void)scoreReported: (NSError*) error;`


    `- (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;`


    `- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error;`


    `- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error;`


    `@end`


    Once you have a `GKPlayer` object for a given `playerID`, there are many ways
    to look up one based on the other. Once again for simplicity’s sake, we will store
    all fetched players into an array and use a simple lookup.


    The first thing we need to do is add a new `NSMutableArray` to our `UFOLeaderboardViewController`
    class. Let’s name this new object `playerArray`. Don’t forget to allocate and
    initialize it in the `viewDidLoad` method. Add a method for the new protocol that
    we just set up, and initialize it as shown in the following:


    `- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error`


    `{`


    `if (error != nil)`


    `{`


    `NSLog(@"Error during player mapping: %@", [error localizedDescription]);`


    `}`


    `else`


    `{`


    `[playerArray addObject: player];`


    `}`


    `[leaderboardTableView reloadData];`


    `}`


    This method merely stores the retrieved `GKPlayers` into an array for future reference.
    If you were using the method that returns an array of players, your delegate callback
    would look like the following instead:


    `- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error`


    `{`


    `if (error != nil)`


    `{`


    `NSLog(@"Error during player mapping: %@", [error localizedDescription]);`


    `}`


    `else`


    `{`


    `[playerArray addObjectsFromArray:players];`


    `}`


    `[leaderboardTableView reloadData];`


    `}`


    We also need to add a new method that will handle iterating through our array
    and looking for a player match.


    `-(NSString *)playerNameforID:(NSString *)playerID;`


    `{`


    `for (GKPlayer *player in playerArray)`


    `{`


    `if ([player.playerID isEqualToString: playerID])`


    `continue;`


    `return player.alias;`


    `}`


    `return nil;`


    `}`


    This method searches through the player array for a match on the `playerID` and
    returns the alias for that player. You could just as easily return the entire
    `GKPlayer` object if you wanted more information in your table cell, such as whether
    they are underage or are one of your friends.


    The final step is to modify our `cellForRow` method to handle the new name lookup
    code. The following method will replace our old `cellForRow` method in `UFOLeaderboardViewController`.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`


    `cellForRowAtIndexPath:(NSIndexPath *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `if (cell == nil)`


    `{`


    `cell = [[[UITableViewCell alloc] initWithStyle:É`


    `UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier] autorelease];`


    `cell.selectionStyle = UITableViewCellSelectionStyleNone;`


    `}`


    `GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];`


    `NSString *playerName = [self playerNameforID: score.playerID];`


    `if (playerName == nil)`


    `{`


    `[self.gcManager mapPlayerIDtoPlayer: score.playerID];`


    `cell.textLabel.text = @"Loading Name…";`


    `}`


    `else`


    `{`


    `cell.textLabel.text = playerName;`


    `}`


    `cell.detailTextLabel.text = score.formattedValue;`


    `return cell;`


    `}`


    Tip


    You can access the raw score data with the value property on `GKScore`. This will
    allow you to perform even more customization than is available in the score format
    type in iTunes Connect.


    As you can see, in this method, we get `a GKScore` as we did in the previous example.
    We created a new string called `playerName` and use our new method to populate
    it. The first time this method is called, `playerNameforID` will return nil. During
    that event, we call our `mapPlayerIDtoPlayer` method and set the text in the cell
    to “Loading Name…”. This serves as a placeholder until we can load in the full
    username. When we get a callback from the `GameCenterManager`, we reload the table.
    At this point, `playerNameforID` should return the alias for the player.


    If the app is run again, you will see that we are now displaying proper player
    aliases instead of the player IDs (see Figure [3-12](#A978-1-4302-4906-1_3_Chapter.html#Fig12)).


    Note


    Remember that the user can change their alias at any time, and you should always
    display the most up-to-date alias. With this in mind, you should always attempt
    to update the alias whenever displaying it. Do not cache once and then never request
    an update.


    ![A978-1-4302-4906-1_3_Fig12_HTML.jpg](A978-1-4302-4906-1_3_Fig12_HTML.jpg)


    Figure 3-12.


    A custom leaderboard that properly maps player aliases'
  trans: "\n# 映射玩家 ID\n\n在上一节中，我们学习了如何获取排行榜的原始分数值。但最终得到的排行榜仅包含玩家 ID，而非用户期望显示的别名。本节我们将创建一个新方法，用于将玩家\
    \ ID 转换为玩家别名。首先，我们在`GameCenterManager`类中添加一些新方法，使其能够搜索单个名称和名称数组。请在`GameCenterManager`类中添加以下两个方法。\n\
    \n```\n- (void)mapPlayerIDtoPlayer:(NSString*)playerID\n{\n    [GKPlayer loadPlayersForIdentifiers:\
    \ [NSArray arrayWithObject: playerID]\n                  withCompletionHandler:^(NSArray\
    \ *playerArray, NSError*error)\n    {\n        GKPlayer* player = nil;\n     \
    \   for (GKPlayer* tempPlayer in playerArray)\n        {\n            if ([tempPlayer.playerID\
    \ isEqualToString: playerID] == nil)\n                continue;\n            player\
    \ = tempPlayer;\n            break;\n        }\n        [self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)\n\
    \                              withArg:player\n                              \
    \  error:error];\n    }];\n}\n\n- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs\n\
    {\n    [GKPlayer loadPlayersForIdentifiers: playerIDs withCompletionHandler:^(NSArray\
    \ *playerArray, NSError *error)\n    {\n        [self callDelegateOnMainThread:\
    \ @selector(mappedPlayerIDs:error:)\n                              withArg: playerArray\
    \ error: error];\n    }];\n}\n```\n\n第一个方法将返回单个`GKPlayer`对象，而第二个方法将返回`GKPlayer`对象数组。我们还需要添加两个新的协议方法来处理委托回调。\n\
    \n虽然我们可以使用相同的回调并为第一个调用返回一个单元素数组，但我们还是希望保留这两个方法。你完全可以向第二个方法传递单个玩家 ID；不过，第一个方法在某些情况下也同样实用。别忘了，我们正在构建一套可复用的\
    \ Game Center 调用库。\n\n假设你从本书开头一直跟随至今，`GameCenterManagerDelegate`的协议现在应如下所示：\n\n\
    ```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n@end\n```\n\n获取到与给定`playerID`对应的`GKPlayer`对象后，有多种方式可以基于其中一方查找另一方。再次为了简单起见，我们将所有已获取的玩家存储到一个数组中，并进行简单查找。\n\
    \n首先，我们需要在`UFOLeaderboardViewController`类中添加一个新的`NSMutableArray`。我们将这个新对象命名为`playerArray`。别忘了在`viewDidLoad`方法中为其分配内存并初始化。为刚刚设置的协议添加一个新方法，并按如下所示进行初始化：\n\
    \n```\n- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"映射玩家时出错：%@\", [error localizedDescription]);\n\
    \    }\n    else\n    {\n        [playerArray addObject: player];\n    }\n   \
    \ [leaderboardTableView reloadData];\n}\n```\n\n该方法仅将检索到的`GKPlayers`存储到数组中，以备后续使用。如果你使用的是返回玩家数组的方法，那么你的委托回调应如下所示：\n\
    \n```\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"映射玩家时出错：%@\", [error localizedDescription]);\n\
    \    }\n    else\n    {\n        [playerArray addObjectsFromArray:players];\n\
    \    }\n    [leaderboardTableView reloadData];\n}\n```\n\n我们还需要添加一个新方法，用于遍历数组并查找匹配的玩家。\n\
    \n```\n-(NSString *)playerNameforID:(NSString *)playerID;\n{\n    for (GKPlayer\
    \ *player in playerArray)\n    {\n        if ([player.playerID isEqualToString:\
    \ playerID])\n            continue;\n        return player.alias;\n    }\n   \
    \ return nil;\n}\n```\n\n该方法会在玩家数组中搜索与`playerID`匹配的项，并返回该玩家的别名。如果你希望表格单元格显示更多信息（例如玩家是否未成年或是你的好友），也可以直接返回完整的`GKPlayer`对象。\n\
    \n最后一步是修改我们的`cellForRow`方法，以处理新的名称查找代码。以下方法将替换`UFOLeaderboardViewController`中旧的`cellForRow`方法。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                       reuseIdentifier:CellIdentifier] autorelease];\n\
    \        cell.selectionStyle = UITableViewCellSelectionStyleNone;\n    }\n   \
    \ GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\n    NSString\
    \ *playerName = [self playerNameforID: score.playerID];\n    if (playerName ==\
    \ nil)\n    {\n        [self.gcManager mapPlayerIDtoPlayer: score.playerID];\n\
    \        cell.textLabel.text = @\"正在加载名称…\";\n    }\n    else\n    {\n       \
    \ cell.textLabel.text = playerName;\n    }\n    cell.detailTextLabel.text = score.formattedValue;\n\
    \    return cell;\n}\n```\n\n> **提示：** 你可以通过`GKScore`的`value`属性访问原始分数数据。这使你能进行比\
    \ iTunes Connect 中分数格式类型更丰富的自定义设置。\n\n如你所见，此方法中我们像之前的示例一样获取了一个`GKScore`对象。我们创建了一个名为`playerName`的新字符串，并使用新方法为其赋值。首次调用此方法时，`playerNameforID`将返回\
    \ nil。此时，我们调用`mapPlayerIDtoPlayer`方法，并将单元格文本设置为“正在加载名称…”。这作为占位符，直到我们加载完整的用户名。当从`GameCenterManager`收到回调时，我们重新加载表格。此时，`playerNameforID`应返回玩家的别名。\n\
    \n如果再次运行应用，你将看到现在显示的是正确的玩家别名，而非玩家 ID（见图 3-12）。\n\n> **注意：** 请记住，用户可以随时更改其别名，因此应始终显示最新别名。基于此，每次显示别名时都应尝试更新。切勿一次性缓存后便不再请求更新。\n\
    \n![A978-1-4302-4906-1_3_Fig12_HTML.jpg](img/A978-1-4302-4906-1_3_Fig12_HTML.jpg)\n\
    \n**图 3-12.** 正确映射玩家别名的自定义排行榜\n"
- fmt: "# Local Player Score\n\nThere are often times that you will want to know the\
    \ local player’s score on a given leaderboard. Maybe you want to display their\
    \ score at the top of your leaderboard, or perhaps you want to fetch a leaderboard\
    \ that shows other player scores that are close to your local player’s score.\n\
    \nApple has provided an easy technique for determining the local player’s score.\
    \ During any `GKLeaderboard` request, it contains a property for `localPlayerScore`.\
    \ We create a new method in our `GameCenterManager` to handle retrieving the local\
    \ player score for us. Add the following method to your `GameCenterManager` class:\n\
    \n```\n-(void)retrieveLocalScoreForCategory:(NSString *)category\n{\n        GKLeaderboard\
    \ *leaderboardRequest = [[GKLeaderboard alloc] init];\n        leaderboardRequest.category\
    \ = category;\n        [leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray\
    \ *scores,NSError*error)\n        {\n                [self callDelegateOnMainThread:@selector(localPlayerScore:error:)\
    \ withArg:É\n        leaderboardRequest.localPlayerScore error:error];\n     \
    \   }];\n}\n```\n\nThis method functions in almost the same way as our previous\
    \ score function. However, here we care about only the local player score for\
    \ the category we are requesting. We also need to add a new protocol method to\
    \ pass this data back to our delegate. Go ahead and set it, as shown in the following\
    \ code snippet:\n\n`(void)localPlayerScore:(GKScore *)score error:(NSError *)error;`\n\
    \nWe now need to add our protocol implementation to `UFOLeaderboardViewController`.\
    \ That method is presented next. We will not be directly using the local player’s\
    \ score in this demo, so we just print the value to the console.\n\n```\n- (void)localPlayerScore:(GKScore\
    \ *)score error:(NSError *)error;\n{\n        if (error != nil)\n        {\n \
    \               NSLog(@\"Error getting local score: %@\", [error localizedDescription]);\n\
    \        }\n        else\n        {\n                NSLog(@\"Local User Score:\
    \ %@\", score);\n        }\n}\n```\n\nNext, we call the `GameCenterManager` method\
    \ for retrieving our local user score. Let’s add that code to the `viewDidLoad`\
    \ method of `UFOLeaderboardviewController`. Don’t forget to change the category\
    \ to match the one for the leaderboard you want to request.\n\n`[self.gcManager\
    \ retrieveLocalScoreForCategory: @\"com.dragonforged.ufo.single\"];`\n\nIf you\
    \ run the app again, now you should see console output that looks similar to this:\n\
    \n```\n2011-02-14 14:38:41.940 UFOs[22485:207] Local User Score: GKScore player=G:200192907\
    \ rank=2 date=2011-02-14 04:08:04 +0000 value=3 formattedValue=3 Points\n```\n\
    \n# A Better Approach\n\nIn the section “Posting a Score,” earlier in this chapter,\
    \ we discovered how to post new scores to Game Center. Our methodology, while\
    \ simple, was not the best approach from a user-interaction standpoint. It is\
    \ now time to refactor the posting new score code to improve usability. This approach\
    \ is more complex, but delivers better performance and has less impact on the\
    \ user.\n\nThe first thing we need to do is move our `scoreReported` method from\
    \ `UFOGameViewController` to `UFOViewController`. We also want to modify the exit\
    \ action in the `UFOViewController`. Modify that method to match the following.\n\
    \n```\n-(IBAction)exitAction:(id)sender;\n{\n        [[self navigationController]\
    \ popViewControllerAnimated: YES];\n        [self.gcManager reportScore:score\
    \ forCategory:@\"com.dragonforged.ufo.single\"];\n}\n```\n\nWe also need to add\
    \ a single line of code to the `viewWillAppear` method, in `UFOViewController`,\
    \ as follows.\n\n`gcManager.delegate = self;`\n\nThis resets the delegate for\
    \ our Game Center calls back to the `UFOViewController`. This allows us to exit\
    \ the game without waiting for a network callback from the Game Center delegate.\
    \ This method is more user-friendly, but it involves some delegate switching.\n\
    \n# Challenges\n\niOS 6 introduced challenges to Game Center. A challenge allows\
    \ a player’s Game Center friend to compete with the local player to beat a high\
    \ score or achievements. There is no additional work to add a challenge to your\
    \ game or app if you are using Apple’s built in GUI, a new section appears as\
    \ part of the leaderboard view controllers to challenge a player, additionally\
    \ a user can initiate a challenge from the `Game Center.app`.\n\nIf you are using\
    \ a customized GUI for leaderboards, or if you would like to be able to issue\
    \ a challenge programmatically, there is a new method available as part of `GKScore`.\
    \ Creating a new challenge is as simple as using a `GKScore` object:\n\n`[(GKScore\
    \ *)score issueChallengeToPlayers: (NSArray *)players message:@\"Can you beat\
    \ me?\"];`\n\nThere are also circumstances where it may be important to see a\
    \ list of all the challenges that are currently pending for the local player;\
    \ this can be done using the following code snippet:\n\n```\n[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray\
    \ *challenges, NSError *error)\n{\n     if (error != nil)\n     {\n          NSLog(@\"\
    An error occurred: %@\", [error localizedDescription]);\n     }\n     else\n \
    \    {\n          NSLog(@\"Challenges: %@\", challenges);\n     }\n}];\n```\n\n\
    Each challenge also has an associated state, such as invalid, pending, or complete.\
    \ To see the current state of a challenge you can use the following code:\n\n\
    `if(challenge.state == GKChallengeStateCompleted)`\n     `NSLog(@\"Challenge Completed\"\
    );`\n\nFinally you can decline a pending challenge programmatically using this\
    \ statement:\n\n`[challenge decline];`\n\n**Tip**  \nWhen a player beats a challenge,\
    \ Game Center will automatically reissue the challenge back to the originating\
    \ player, informing them that they have been beaten and prompting them to accept\
    \ a new challenge.\n\nChallenges provide a great way to keep players engaged within\
    \ a game; your players will do the marketing for you by continually challenging\
    \ their friends. Challenges are offered to you automatically for any users running\
    \ iOS 6 or higher through the `Game Center.app` or the native Game Center GUI.\
    \ If you are using a custom leaderboard interface, the amount of time required\
    \ to incorporate a challenge system will pay off in dividends by increased user\
    \ interaction.\n\n# GKLeaderboard Sets\n\niOS 7 introduced an enhanced leaderboard\
    \ cap from the previous limit of 25 to 100. However iOS 7 also added a new class\
    \ `GKLeaderboardSet` that permits usage of up to 500 leaderboards. Once leaderboard\
    \ sets are enabled for an app all leaderboards used in the app must be organized\
    \ into a leaderboard set.\n\nFrom iTunes Connect a new option is present for move\
    \ all leaderboards into Display Sets, seen in Figure 3-13. When creating a leaderboard\
    \ set you will be prompted for a Display Set Reference Name and Display Set ID,\
    \ these are setup in the fashion as a typical leaderboard and a reverse DNS approach\
    \ is recommended.\n\nOnce a new leaderboard set is created additional display\
    \ sets can be added and configured just like a typical leaderboard. A display\
    \ set can contain multiple leaderboards and single leaderboards can belong to\
    \ multiple display sets.\n\nA new method is made available for retrieving a leaderboard\
    \ set `loadLeaderboardSetsWithCompletionHandler`. This will return an array of\
    \ `GKLeaderboardSet` objects which function in much the same manner as a single\
    \ leaderboard, with the addition of `groupIdentifier` property string which returns\
    \ the identifier for the leaderboard set that they belong to.\n\n![A978-1-4302-4906-1_3_Fig13_HTML.jpg](A978-1-4302-4906-1_3_Fig13_HTML.jpg)\n\
    \n**Figure 3-13.** Enabling Leaderboard Sets in iTunes Connect for iOS 7"
  raw: '## Local Player Score


    There are often times that you will want to know the local player’s score on a
    given leaderboard. Maybe you want to display their score at the top of your leaderboard,
    or perhaps you want to fetch a leaderboard that shows other player scores that
    are close to your local player’s score.


    Apple has provided an easy technique for determining the local player’s score.
    During any GKLeaderboard request, it contains a property for `localPlayerScore`.
    We create a new method in our `GameCenterManager` to handle retrieving the local
    player score for us. Add the following method to your `GameCenterManager` class:


    `-(void)retrieveLocalScoreForCategory:(NSString *)category`


    `{`


            `GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];`


            `leaderboardRequest.category = category;`


            `[leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray *scores,NSError*error)`


            `{`


                    `[self callDelegateOnMainThread:@selector(localPlayerScore:error:)
    withArg:É`


            `leaderboardRequest.localPlayerScore error:error];`


            `}];`


    `}`


    This method functions in almost the same way as our previous score function. However,
    here we care about only the local player score for the category we are requesting.
    We also need to add a new protocol method to pass this data back to our delegate.
    Go ahead and set it, as shown in the following code snippet:


    `(void)localPlayerScore:(GKScore *)score error:(NSError *)error;`


    We now need to add our protocol implementation to `UFOLeaderboardViewController`.
    That method is presented next. We will not be directly using the local player’s
    score in this demo, so we just print the value to the console.


    `- (void)localPlayerScore:(GKScore *)score error:(NSError *)error;`


    `{`


            `if (error != nil)`


            `{`


                    `NSLog(@"Error getting local score: %@", [error localizedDescription]);`


            `}`


            `else`


            `{`


                    `NSLog(@"Local User Score: %@", score);`


            `}`


    `}`


    Next, we call the `GameCenterManager` method for retrieving our local user score.
    Let’s add that code to the `viewDidLoad` method of `UFOLeaderboardviewController`.
    Don’t forget to change the category to match the one for the leaderboard you want
    to request.


    `[self.gcManager retrieveLocalScoreForCategory: @"com.dragonforged.ufo.single"];`


    If you run the app again, now you should see console output that looks similar
    to  this:


    `2011-02-14 14:38:41.940 UFOs[22485:207] Local User Score: GKScore player=G:200192907
    rank=2 date=2011-02-14 04:08:04 +0000 value=3 formattedValue=3 Points`


    ## A Better Approach


    In the section “Posting a Score,” earlier in this chapter, we discovered how to
    post new scores to Game Center. Our methodology, while simple, was not the  best
    approach from a user-interaction standpoint. It is now time to refactor the posting
    new score code to improve usability. This approach is more complex, but delivers
    better performance and has less impact on the user.


    The first thing we need to do is move our `scoreReported` method from `UFOGameViewController`
    to `UFOViewController`. We also want to modify the exit action in the `UFOViewController`.
    Modify that method to match the following.


    `-(IBAction)exitAction:(id)sender;`


    `{`


            `[[self navigationController] popViewControllerAnimated: YES];`


            `[self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];`


    `}`


    We also need to add a single line of code to the `viewWillAppear` method, in `UFOViewController`,
    as follows.


    `gcManager.delegate = self;`


    This resets the delegate for our Game Center calls back to the `UFOViewController`.
    This allows us to exit the game without waiting for a network callback from the
    Game Center delegate. This method is more user-friendly, but it involves some
    delegate switching.


    ## Challenges


    iOS 6 introduced challenges to Game Center. A challenge allows a player’s Game
    Center friend to compete with the local player to beat a high score or achievements.
    There is no additional work to add a challenge to your game or app if you are
    using Apple’s built in GUI, a new section appears as part of the leaderboard view
    controllers to challenge a player, additionally a user can initiate a challenge
    from the Game Center.app.


    If you are using a customized GUI for leaderboards, or if you would like to be
    able to issue a challenge programmatically, there is a new method available as
    part of `GKScore`. Creating a new challenge is as simple as using a `GKScore`
    object:


     `[(GKScore *)score issueChallengeToPlayers: (NSArray *)players message:@"Can
    you beat me?"];`


    There are also circumstances where it may be important to see a list of all the
    challenges that are currently pending for the local player; this can be done using
    the following code snippet:


     `[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray *challenges,
    NSError *error)`


    `{`


         `if (error != nil)`


         `{`


              `NSLog(@"An error occurred: %@", [error localizedDescription]);`


         `}`


         `else`


         `{`


              `NSLog(@"Challenges: %@", challenges);`


         `}`


    `}];`


    Each challenge also has an associated state, such as invalid, pending, or complete.
    To see the current state of a challenge you can use the following code:


    `if(challenge.state == GKChallengeStateCompleted)`


         `NSLog(@"Challenge Completed");`


    Finally you can decline a pending challenge programmatically using this statement:


    `[challenge decline];`


    Tip


    When a player beats a challenge, Game Center will automatically reissue the challenge
    back to the originating player, informing them that they have been beaten and
    prompting them to accept a new challenge.


    Challenges provide a great way to keep players engaged within a game; your players
    will do the marketing for you by continually challenging their friends. Challenges
    are offered to you automatically for any users running iOS 6 or higher through
    the Game Center.app or the native Game Center GUI. If you are using a custom leaderboard
    interface, the amount of time required to incorporate a challenge system will
    pay off in dividends by increased user interaction.


    ## GKLeaderboard Sets


    iOS 7 introduced an enhanced leaderboard cap from the previous limit of 25 to
    100\. However iOS 7 also added a new class GKLeaderboadSet that permits usage
    of up to 500 leaderboards. Once leaderboard sets are enabled for an app all leaderboards
    used in the app must be organized into a leaderboard set.


    From iTunes Connect a new option is present for move all leaderboards into Display
    Sets, seen in Figure [3-13](#A978-1-4302-4906-1_3_Chapter.html#Fig13). When creating
    a leaderboard set you will be prompted for a Display Set Reference Name and Display
    Set ID, these are setup in the fashion as a typical leaderboard and a reverse
    DNS approach is recommended.


    Once a new leaderboard set is created additional display sets can be added and
    configured just like a typical leaderboard. A display set can contain multiple
    leaderboards and single leaderboards can belong to multiple display sets.


    A new method is made available for retrieving a leaderboard set  loadLeaderboardSetsWithCompletionHandler.
    This will return an array of GKLeaderboardSet objects which function in much the
    same manner as a single leaderboard, with the addition of groupIdentifier property
    string which returns the identifier for the leaderboard set that they belong to.


    ![A978-1-4302-4906-1_3_Fig13_HTML.jpg](A978-1-4302-4906-1_3_Fig13_HTML.jpg)


    Figure 3-13.


    Enabling Leaderboard Sets in iTunes Connect for iOS 7'
  trans: "\n# 本地玩家分数\n\n很多时候您需要了解本地玩家在特定排行榜上的得分。也许您想在排行榜顶部显示他们的分数，或者想获取一个显示与本地玩家分数相近的其他玩家分数的排行榜。\n\
    \nApple 提供了一种简单的方法来确定本地玩家的分数。在任何 `GKLeaderboard` 请求中，都包含一个 `localPlayerScore`\
    \ 属性。我们在 `GameCenterManager` 中创建一个新方法，用于处理本地玩家分数的获取。请将以下方法添加到您的 `GameCenterManager`\
    \ 类中：\n\n```\n-(void)retrieveLocalScoreForCategory:(NSString *)category\n{\n \
    \       GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];\n  \
    \      leaderboardRequest.category = category;\n        [leaderboardRequest loadScoresWithCompletionHandler:\
    \ ^(NSArray *scores,NSError*error)\n        {\n                [self callDelegateOnMainThread:@selector(localPlayerScore:error:)\
    \ withArg:É\n        leaderboardRequest.localPlayerScore error:error];\n     \
    \   }];\n}\n```\n\n此方法的运作方式与我们之前的分数函数几乎相同。但在这里，我们只关心所请求类别的本地玩家分数。我们还需要添加一个新的协议方法，将此数据传回我们的委托。请继续设置它，如下代码片段所示：\n\
    \n`(void)localPlayerScore:(GKScore *)score error:(NSError *)error;`\n\n现在我们需要将协议实现添加到\
    \ `UFOLeaderboardViewController` 中。该方法如下所示。在此演示中，我们不会直接使用本地玩家的分数，因此我们仅将值打印到控制台。\n\
    \n```\n- (void)localPlayerScore:(GKScore *)score error:(NSError *)error;\n{\n\
    \        if (error != nil)\n        {\n                NSLog(@\"获取本地分数时出错: %@\"\
    , [error localizedDescription]);\n        }\n        else\n        {\n       \
    \         NSLog(@\"本地用户分数: %@\", score);\n        }\n}\n```\n\n接下来，我们调用 `GameCenterManager`\
    \ 方法来获取本地用户分数。让我们将该代码添加到 `UFOLeaderboardviewController` 的 `viewDidLoad` 方法中。别忘了更改分类，使其与您要请求的排行榜匹配。\n\
    \n`[self.gcManager retrieveLocalScoreForCategory: @\"com.dragonforged.ufo.single\"\
    ];`\n\n如果您再次运行应用，现在应该会看到类似如下的控制台输出：\n\n```\n2011-02-14 14:38:41.940 UFOs[22485:207]\
    \ 本地用户分数: GKScore player=G:200192907 rank=2 date=2011-02-14 04:08:04 +0000 value=3\
    \ formattedValue=3 Points\n```\n\n# 更好的方法\n\n在本章前面的“发布分数”一节中，我们了解了如何向 Game Center\
    \ 发布新分数。我们的方法虽然简单，但从用户交互的角度来看，并非最佳方案。现在是时候重构发布新分数的代码以改善可用性了。这种方法更复杂，但性能更好，且对用户的影响更小。\n\
    \n我们需要做的第一件事是将 `scoreReported` 方法从 `UFOGameViewController` 移动到 `UFOViewController`。我们还需要修改\
    \ `UFOViewController` 中的退出操作。请按如下方式修改该方法。\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n        [[self navigationController] popViewControllerAnimated: YES];\n   \
    \     [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n}\n```\n\n我们还需要在 `UFOViewController` 的 `viewWillAppear` 方法中添加一行代码，如下所示。\n\n\
    `gcManager.delegate = self;`\n\n这会将 Game Center 调用的委托重置为 `UFOViewController`。这允许我们退出游戏，而无需等待\
    \ Game Center 委托的网络回调。这种方法对用户更友好，但涉及一些委托切换。\n\n# 挑战\n\niOS 6 为 Game Center 引入了挑战功能。挑战允许玩家的\
    \ Game Center 好友与本地玩家竞争，以打破最高分或成就。如果您使用 Apple 内置的 GUI，则无需额外工作即可将挑战添加到您的游戏或应用中。排行榜视图控制器中会出现一个新的部分来挑战玩家，此外用户可以从\
    \ `Game Center.app` 发起挑战。\n\n如果您使用自定义的排行榜 GUI，或者希望以编程方式发布挑战，`GKScore` 提供了一个新方法。创建一个新挑战就像使用\
    \ `GKScore` 对象一样简单：\n\n`[(GKScore *)score issueChallengeToPlayers: (NSArray *)players\
    \ message:@\"你能打败我吗？\"];`\n\n在某些情况下，查看本地玩家当前所有待处理的挑战列表可能很重要；这可以通过以下代码片段实现：\n\n\
    ```\n[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray *challenges,\
    \ NSError *error)\n{\n     if (error != nil)\n     {\n          NSLog(@\"发生错误:\
    \ %@\", [error localizedDescription]);\n     }\n     else\n     {\n          NSLog(@\"\
    挑战: %@\", challenges);\n     }\n}];\n```\n\n每个挑战还有一个关联的状态，例如无效、待处理或已完成。要查看挑战的当前状态，您可以使用以下代码：\n\
    \n`if(challenge.state == GKChallengeStateCompleted)`\n     `NSLog(@\"挑战已完成\");`\n\
    \n最后，您可以使用以下语句以编程方式拒绝待处理的挑战：\n\n`[challenge decline];`\n\n**提示**  \n当玩家击败一个挑战时，Game\
    \ Center 会自动将该挑战重新发布给发起挑战的玩家，通知他们已被击败，并提示他们接受新的挑战。\n\n挑战是保持玩家在游戏中参与度的绝佳方式；您的玩家会通过不断挑战他们的朋友来为您进行营销。对于任何运行\
    \ iOS 6 或更高版本的用户，挑战会自动通过 `Game Center.app` 或原生 Game Center GUI 提供给您的应用。如果您使用自定义排行榜界面，整合挑战系统所需的时间将通过增加用户互动而获得丰厚回报。\n\
    \n# GKLeaderboard 集合\n\niOS 7 将排行榜上限从之前的 25 个提高到了 100 个。然而，iOS 7 还添加了一个新类 `GKLeaderboardSet`，允许使用多达\
    \ 500 个排行榜。一旦为应用启用了排行榜集合，应用中使用的所有排行榜都必须组织到一个排行榜集合中。\n\n在 iTunes Connect 中，现在有一个新选项可以将所有排行榜移入显示集合，如图\
    \ 3-13 所示。创建排行榜集合时，系统会提示您输入显示集合参考名称和显示集合 ID，其设置方式与典型排行榜相同，建议采用反向 DNS 方法。\n\n创建新的排行榜集合后，可以像配置典型排行榜一样添加和配置其他显示集合。一个显示集合可以包含多个排行榜，单个排行榜也可以属于多个显示集合。\n\
    \n有一个新方法 `loadLeaderboardSetsWithCompletionHandler` 可用于获取排行榜集合。这将返回一个 `GKLeaderboardSet`\
    \ 对象数组，其功能与单个排行榜非常相似，并增加了一个 `groupIdentifier` 属性字符串，该字符串返回它们所属的排行榜集合的标识符。\n\n\
    ![A978-1-4302-4906-1_3_Fig13_HTML.jpg](img/A978-1-4302-4906-1_3_Fig13_HTML.jpg)\n\
    \n**图 3-13.** 在 iTunes Connect 中为 iOS 7 启用排行榜集合\n"
- fmt: '# Summary


    This chapter introduced leaderboards in Game Center. We covered the benefits of
    using a leaderboard, as well as the two available types. We learned how to post
    a score and recover for any errors that occurred during posting. We also looked
    at the requirements of getting leaderboards up and running in your app, using
    either Apple’s provided GUI or a custom one.


    Throughout the chapter, we continued to build our `GameCenterManager` class, adding
    the required methods to post scores, retrieve scores both local and global, map
    player IDs to `GKPlayer` objects, and display custom and built-in leaderboards.


    You should now feel confident in adding a leaderboard to any existing or new iOS
    app. In the next chapter, we will explore all that Game Center achievements offer.


    # Achievements


    **Abstract**


    > “All men who have achieved great things have been great dreamers.”

    > —Orison Swett Marden


    The relatively new social gaming concept of achievements came along much later
    than the leaderboards we discussed in [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    and has gained a dramatic rise in popularity with the release of Microsoft’s Xbox
    360. Achievements offer a level of detail and accomplishment overlooked in leaderboards.
    Leaderboards show who possesses the leading score; on the other hand, achievements
    demonstrate a player’s skills and strengths by rewarding the player for completing
    tasks, quests, objectives, or levels. When the achievements start to serve in-game
    purposes, they become more of a power-up over other players. The ability to view
    the achievements of others gives players a type of “bragging rights.”


    As social network–enabled gaming spreads and becomes prevalent, the achievement
    system feature has skyrocketed into even greater popularity. Just as everyone
    receives a trophy at a high school sporting event, every player wants to earn
    an achievement in a game.


    Foursquare was one of the first websites to bring achievements out of the gaming
    world and into the social app universe. Foursquare calls its achievements “badges”
    (see Figure [4-1](#A978-1-4302-4906-1_4_Chapter.html#Fig1)), but the basic concept
    is the same. Players receive a reward for completing a task, but the number of
    badges does not affect gameplay, or in this case, the ability for the user to
    use the app in any direct manner.


    ![A978-1-4302-4906-1_4_Fig1_HTML.jpg](A978-1-4302-4906-1_4_Fig1_HTML.jpg)


    *Figure 4-1. Foursquare for iPhone showing badges or achievements*


    Game Center has made adding an achievement system to your iOS app simple. In this
    chapter, we will learn how to add achievements to our demo game, UFOs. You will
    learn everything needed to fully integrate an achievement system into your app
    quickly and easily. Notably, you will learn how to:


    - Create new achievements

    - Display achievement progress

    - Add achievement hooks into your app

    - Progress and reset achievements

    - Customize the appearance of achievements

    - Work with achievement challenges


    ## Why Achievements?


    If it is not already apparent what achievements can add to your social app or
    game, let’s take a moment to review some of the many benefits.


    - Achievements give your users an extra sense of accomplishment.

    - Achievements bring users back into your app more often. Users are more apt to
    return to your app to complete more achievements, making completing the game a
    more rewarding and fun process.

    - Achievements add an easy way for users to share experiences with other users.

    - Achievements in Game Center provide a polished look and feel to the product
    you’re shipping.

    - Achievements give users a greater sense of progression as they make their way
    through your app or game.

    - Achievements provide an alternative way to play the game. If users do not enjoy
    the campaign, they can enjoy a sense of accomplishment through your achievement
    system.

    - Achievements contribute to game brand awareness. As users share their accomplishments
    on Twitter and Facebook, name recognition increases, and with it sales.

    - Achievements can provide a goal or end to your game that otherwise might be
    open-ended. Games such as trivia or board games often do not have conventional
    endings.

    - Achievement challenges can help draw additional users into your product.


    ## An Overview of Achievements in Game Center


    Achievements, also known as badges, function slightly differently in Game Center
    than on other platforms. Like leaderboards, achievements first need to be configured
    in iTunes Connect on a per-app basis. You will be creating new instances of a
    `GKAchievement` object to report progress (more on this in the “Modifying Achievement
    Progress” section). Unlike leaderboard entries, which are created when a score
    is reached and submitted, achievements can report incremental progress.


    Another notable change from working with leaderboards (see [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    for more on leaderboards) is that you will use two types of objects to submit
    and retrieve achievements. `GKAchievement` is used to submit new achievements
    or update progress on achievements, and `GKAchievementDescription` is used to
    display achievement data to the user. This is contrary to what we saw when working
    with leaderboards, in which `GKScore` objects were used to submit data as well
    as retrieve it.


    As you can with leaderboards, you can show achievement progress using either Apple’s
    included graphical user interface (GUI) or a customized one that better matches
    the look and feel of your app. The benefits and disadvantages of each system are
    the same as with leaderboards. I’ll summarize those benefits and disadvantages,
    adding minor achievement-specific information where appropriate.


    ### Benefits of Using Apple’s Achievement GUI vs. a Custom GUI


    The following are some of the benefits that you will gain by using Apple’s included
    GUI for working with achievements.


    - The look and feel of your achievements is created by some of the best designers
    in the world.

    - The GUI is very simple to implement, making it easy to present the achievement
    progress to your users.

    - Users appreciate a familiar interface with which they already know how to interact.

    - Your app is more future-proof than it would be if you implemented your own system.

    - New features are automatically included as they become available, as seen with
    Challenges, added with the introduction of iOS 6.


    The following are a few of the benefits of using your own GUI when working with
    achievements on iOS devices.


    - Your achievement progress can match the custom design of your app.

    - You have more freedom over the returned data and can filter using additional
    criteria.

    - You can implement your own custom caching behavior.

    - You can use custom images for incomplete or in-progress achievements.


    As you can see, there are advantages and disadvantages of each system, and there
    is no right answer to which one you should be using. By the end of this chapter
    you will have a better understanding of the options and be better equipped to
    decide which approach is the best fit for your app.


    As mentioned at the beginning of this section, you will need to begin working
    with achievements in the same manner as we did for leaderboards, in iTunes Connect.'
  raw: '## Summary


    This chapter introduced leaderboards in Game Center. We covered the benefits of
    using a leaderboard, as well as the two available types. We learned how to post
    a score and recover for any errors that occurred during posting. We also looked
    at the requirements of getting leaderboards up and running in your app, using
    either Apple’s provided GUI or a custom one.


    Throughout the chapter, we continued to build our `GameCenterManager` class, adding
    the required methods to post scores, retrieve scores both local and global, map
    player IDs to `GKPlayer` objects, and display custom and built-in leaderboards.


    You should now feel confident in adding a leaderboard to any existing or new iOS
    app. In the next chapter, we will explore all that Game Center achievements offer.


    # 4. Achievements


    Abstract


    “All men who have achieved great things have been great dreamers.”


    “All men who have achieved great things have been great dreamers.”


    > —Orison Swett Marden


    The relatively new social gaming concept of achievements came along much later
    than the leaderboards we discussed in [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    and has gained a dramatic rise in popularity with the release of Microsoft’s Xbox
    360. Achievements offer a level of detail and accomplishment overlooked in leaderboards.
    Leaderboards show who possesses the leading score; on the other hand, achievements
    demonstrate a player’s skills and strengths by rewarding the player for completing
    tasks, quests, objectives, or levels. When the achievements start to serve in-game
    purposes, they become more of a power-up over other players. The ability to view
    the achievements of others gives players a type of “bragging rights.”


    As social network–enabled gaming spreads and becomes prevalent, the achievement
    system feature has skyrocketed into even greater popularity. Just as everyone
    receives a trophy at a high school sporting event, every player wants to earn
    an achievement in a game.


    Foursquare was one of the first websites to bring achievements out of the gaming
    world and into the social app universe. Foursquare calls its achievements “badges”
    (see Figure [4-1](#A978-1-4302-4906-1_4_Chapter.html#Fig1)), but the basic concept
    is the same. Players receive a reward for completing a task, but the number of
    badges does not affect gameplay, or in this case, the ability for the user to
    use the app in any direct manner.


    ![A978-1-4302-4906-1_4_Fig1_HTML.jpg](A978-1-4302-4906-1_4_Fig1_HTML.jpg)


    Figure 4-1.


    Foursquare for iPhone showing badges or achievements


    Game Center has made adding an achievement system to your iOS app simple. In this
    chapter, we will learn how to add achievements to our demo game, UFOs. You will
    learn everything needed to fully integrate an achievement system into your app
    quickly and easily. Notably, you will learn how to:


    *   Create new achievements

    *   Display achievement progress

    *   Add achievement hooks into your app

    *   Progress and reset achievements

    *   Customize the appearance of achievements

    *   Work with achievement challenges


    ## Why Achievements?


    If it is not already apparent what achievements can add to your social app or
    game, let’s take a moment to review some of the many benefits.


    *   Achievements give your users an extra sense of accomplishment.

    *   Achievements bring users back into your app more often. Users are more apt
    to return to your app to complete more achievements, making completing the game
    a more rewarding and fun process.

    *   Achievements add an easy way for users to share experiences with other users.

    *   Achievements in Game Center provide a polished look and feel to the product
    you’re shipping.

    *   Achievements give users a greater sense of progression as they make their
    way through your app or game.

    *   Achievements provide an alternative way to play the game. If users do not
    enjoy the campaign, they can enjoy a sense of accomplishment through your achievement
    system.

    *   Achievements contribute to game brand awareness. As users share their accomplishments
    on Twitter and Facebook, name recognition increases, and with it sales.

    *   Achievements can provide a goal or end to your game that otherwise might be
    open-ended. Games such as trivia or board games often do not have conventional
    endings.

    *   Achievement challenges can help draw additional users into your product.


    ## An Overview of Achievements in Game Center


    Achievements, also known as badges, function slightly differently in Game Center
    than on other platforms. Like leaderboards, achievements first need to be configured
    in iTunes Connect on a per-app basis. You will be creating new instances of a
    `GKAchievement` object to report progress (more on this in the “Modifying Achievement
    Progress” section). Unlike leaderboard entries, which are created when a score
    is reached and submitted, achievements can report incremental progress.


    Another notable change from working with leaderboards (see [Chapter 3](#A978-1-4302-4906-1_3_Chapter.html)
    for more on leaderboards) is that you will use two types of objects to submit
    and retrieve achievements. `GKAchievement` is used to submit new achievements
    or update progress on achievements, and `GKAchievementDescription` is used to
    display achievement data to the user. This is contrary to what we saw when working
    with leaderboards, in which `GKScore` objects were used to submit data as well
    as retrieve it.


    As you can with leaderboards, you can show achievement progress using either Apple’s
    included graphical user interface (GUI) or a customized one that better matches
    the look and feel of your app. The benefits and disadvantages of each system are
    the same as with leaderboards. I’ll summarize those benefits and disadvantages,
    adding minor achievement-specific information where appropriate.


    ### Benefits of Using Apple’s Achievement GUI vs. a Custom GUI


    The following are some of the benefits that you will gain by using Apple’s included
    GUI for working with achievements.


    *   The look and feel of your achievements is created by some of the best designers
    in the world.

    *   The GUI is very simple to implement, making it easy to present the achievement
    progress to your users.

    *   Users appreciate a familiar interface with which they already know how to
    interact.

    *   Your app is more future-proof than it would be if you implemented your own
    system.

    *   New features are automatically included as they become available, as seen
    with Challenges, added with the introduction of iOS 6.


    The following are a few of the benefits of using your own GUI when working with
    achievements on iOS devices.


    *   Your achievement progress can match the custom design of your app.

    *   You have more freedom over the returned data and can filter using additional
    criteria.

    *   You can implement your own custom caching behavior.

    *   You can use custom images for incomplete or in-progress achievements.


    As you can see, there are advantages and disadvantages of each system, and there
    is no right answer to which one you should be using. By the end of this chapter
    you will have a better understanding of the options and be better equipped to
    decide which approach is the best fit for your app.


    As mentioned at the beginning of this section, you will need to begin working
    with achievements in the same manner as we did for leaderboards, iniTunes Connect.'
  trans: '

    # 摘要


    本章介绍了 Game Center 中的排行榜。我们讨论了使用排行榜的优势，以及两种可用的排行榜类型。我们学习了如何提交分数以及处理提交过程中出现的任何错误。我们还了解了在你的应用中启动并运行排行榜所需满足的要求，无论是使用苹果提供的
    GUI 还是自定义 GUI。


    在本章中，我们持续构建了 `GameCenterManager` 类，添加了必要的方法来提交分数、检索本地和全局分数、将玩家 ID 映射到 `GKPlayer`
    对象，以及显示自定义和内置排行榜。


    现在，你应该有信心为任何现有或新的 iOS 应用添加排行榜了。在下一章中，我们将探索 Game Center 成就系统所提供的所有功能。


    # 成就


    **摘要**


    > “所有成就伟业的人，都曾是伟大的梦想家。”

    > ——奥里森·斯威特·马登


    相对较新的社交游戏概念“成就”出现的时间远比我们在第 3 章中讨论的排行榜要晚得多，并且随着微软 Xbox 360 的发布，其受欢迎程度急剧上升。成就提供了排行榜所忽略的细节层次和成就感。排行榜显示谁拥有领先的分数；而另一方面，成就通过奖励玩家完成特定任务、探险、目标或关卡来展示玩家的技能和优势。当成就可以服务于游戏内的目的时，它们就成了一种超越其他玩家的“能量提升”。能够查看他人的成就给了玩家一种“炫耀的资本”。


    随着社交网络游戏的发展和普及，成就系统功能的热度更是直线飙升。就像每个人在高中体育比赛中都能拿到一个奖杯一样，每个玩家都想在游戏中获得一项成就。


    Foursquare 是最早将成就从游戏世界带入社交应用领域的网站之一。Foursquare 将其成就称为“徽章”（见图 4-1），但其基本概念是相同的。玩家因完成任务而获得奖励，但徽章的数量并不会影响游戏玩法，或者在这个例子中，不会影响用户以任何直接方式使用应用的能力。


    ![A978-1-4302-4906-1_4_Fig1_HTML.jpg](img/A978-1-4302-4906-1_4_Fig1_HTML.jpg)


    *图 4-1. 展示徽章或成就的 iPhone 版 Foursquare*


    Game Center 让为你的 iOS 应用添加成就系统变得简单。在本章中，我们将学习如何为我们的演示游戏 UFOs 添加成就。你将学到快速轻松地将成就系统完全集成到你的应用中所需要的一切。特别是，你将学习如何：


    - 创建新的成就

    - 显示达成进度

    - 在应用中添加成就挂钩

    - 推进和重置成就

    - 自定义成就的外观

    - 处理成就挑战


    ## 为什么使用成就？


    如果成就对你的社交应用或游戏的作用还不够明显，那么让我们花点时间回顾一下它的诸多好处。


    -   成就让你的用户获得额外的成就感。

    -   成就能使用户更频繁地回到你的应用中。用户更愿意返回你的应用来完成更多成就，从而使完成游戏的过程更有回报、更有趣。

    -   成就为用户提供了一种与他人分享体验的简便方式。

    -   Game Center 中的成就为你发布的产品增添了精致的外观和感觉。

    -   成就让用户在探索你的应用或游戏时，有更强的进步感。

    -   成就提供了游戏的一种替代玩法。如果用户不喜欢战役模式，他们可以通过你的成就系统享受成就感。

    -   成就有助于建立游戏品牌认知度。当用户在 Twitter 和 Facebook 上分享他们的成就时，品牌知名度会提升，随之销量也会增加。

    -   成就可以为你的游戏提供一个目标或结局，否则游戏可能就变成了开放式结局。像问答游戏或棋盘游戏这类游戏通常没有传统的结局。

    -   成就挑战有助于吸引更多用户使用你的产品。


    ## Game Center 成就概览


    成就，也被称为徽章，在 Game Center 中的运作方式略不同于其他平台。与排行榜类似，首先需要在 iTunes Connect 中按应用进行成就配置。你需要创建
    `GKAchievement` 对象的新实例来报告进度（更多信息请参见“修改成就进度”部分）。与排行榜条目（在达到并提交分数时创建）不同，成就可以报告增量进度。


    与使用排行榜相比（更多关于排行榜的信息请参见第 3 章），另一个显著的变化是你将使用两种类型的对象来提交和检索成就。`GKAchievement` 用于提交新成就或更新成就进度，而
    `GKAchievementDescription` 用于向用户显示成就数据。这与我们在使用排行榜时看到的情况相反，那时我们使用 `GKScore` 对象来提交和检索数据。


    与排行榜一样，你可以使用苹果自带的图形用户界面 (GUI) 或更符合你应用外观和感觉的自定义 GUI 来显示成就进度。每种系统的优缺点也与排行榜相同。我将总结这些优缺点，并在适当之处补充一些成就相关的细节信息。


    ### 使用苹果成就 GUI 与自定义 GUI 的好处


    以下是在处理成就时使用苹果自带的 GUI 所带来的一些好处。


    -   你成就的外观和感觉是由世界上一些最优秀的设计师打造的。

    -   GUI 实现起来非常简单，使得向用户展示成就进度变得很容易。

    -   用户喜欢他们已熟悉如何操作的界面。

    -   与你自己实现系统相比，你的应用更能适应未来的变化。

    -   当新功能可用时（例如随着 iOS 6 的推出新增的“挑战”功能），它们会自动包含在内。


    以下是在 iOS 设备上处理成就时使用你自己的 GUI 所带来的几个好处。


    -   你的成就进度可以与应用的定制设计相匹配。

    -   你对返回的数据有更多控制权，并且可以使用额外的标准进行过滤。

    -   你可以实现自己的自定义缓存行为。

    -   你可以为未完成或进行中的成就使用自定义图像。


    如你所见，两种系统各有优缺点，对于应该使用哪一种并没有正确的答案。到本章结束时，你将对这些选项有更好的理解，并能够更有把握地决定哪种方法最适合你的应用。


    正如本节开头所提到的，你需要像处理排行榜一样，开始从 iTunes Connect 着手处理成就相关事宜。

    '
- fmt: '# Configuring Achievements in iTunes Connect


    As we saw with leaderboards, you cannot begin working with achievements without
    first setting up at least one new achievement in iTunes Connect. Log in to iTunes
    Connect (`itunesconnect.apple.com`) using your username and password, and select
    the app that we have already been working with from the previous chapters (see
    [Chapter 2](#A978-1-4302-4906-1_2_Chapter.html) for more information). Once you
    have selected your app from the control panel, return to the Manage Game Center
    area that was introduced earlier in this book.


    The Game Center portal for your app will have a section labeled Achievements.
    If this is the first time you’ve worked with achievements in this app, a button
    labeled Set Up will appear. If you already have achievements in place, the steps
    are different and will be covered later in this section.


    Clicking the Set Up button will bring up the Achievements Configuration screen.
    Select the Add New Achievement button in the upper-left corner of the page, as
    shown in Figure [4-2](#A978-1-4302-4906-1_4_Chapter.html#Fig2). This will bring
    you to the view shown in Figure [4-3](#A978-1-4302-4906-1_4_Chapter.html#Fig3).


    ![A978-1-4302-4906-1_4_Fig3_HTML.jpg](A978-1-4302-4906-1_4_Fig3_HTML.jpg)


    Figure 4-3. The configuration view for new achievements in iTunes Connect


    ![A978-1-4302-4906-1_4_Fig2_HTML.jpg](A978-1-4302-4906-1_4_Fig2_HTML.jpg)


    Figure 4-2. Adding a new achievement through the iTunes Connect Portal


    You might notice that there are a lot of similarities between this portal page
    and the leaderboard portal page. Table [4-1](#A978-1-4302-4906-1_4_Chapter.html#Tab1)
    summarizes the attributes.


    Table 4-1. Achievement Attributes in iTunes Connect


    | Attribute | Description |

    | --- | --- |

    | Achievement Reference Name | Not used outside of iTunes Connect, this string
    is used to easily locate and reference this achievement within iTunes Connect.
    |

    | Achievement ID | This is the identifier that you will refer to in your code.
    As with leaderboard categories, Apple recommends that you use a reverse DNS system,
    such as `com.company.appname.achievementname`. |

    | Hidden | If an achievement is hidden, the user will not see it in the achievement
    list until they have either completed it or increased their progress. |

    | Points | Achievements can be assigned points. Your app is allocated 1,000 points.
    Each completed achievement progresses the user toward that total. Once the user
    has reached 1,000 points, they have unlocked all achievements. You should assign
    more points to achievements that are more difficult to complete. This provides
    the user with a better sense of how valuable the achievement is. Point values
    are optional and can be ignored if you do not want to use them within your app.
    |


    Tip: You aren’t required to have your achievements add up to 1,000 total points,
    but you cannot exceed 1,000 points.


    ## Creating a New Achievement


    It is now time to make a new achievement. We will create an achievement that will
    be reached when the user abducts 25 cows. We will use `Abduct 25` for the achievement
    name so it will be easy to find when we have dozens of achievements. For our achievement
    ID, we will use `com.dragonforged.ufo.abduct25`. Feel free to use whatever ID
    you want here, but make sure to substitute it for `com.dragonforged.ufo.abduct25`
    in the upcoming examples. We will make this an unhidden achievement, and assign
    it a point value of 10.


    Note: No achievement can have more than 100 points awarded for completing it.


    For an achievement to be valid, you must configure at least one language. As you
    can see in Figure [4-4](#A978-1-4302-4906-1_4_Chapter.html#Fig4), the localization
    area of achievements is much different than that encountered when creating leaderboards
    in the previous chapter. Refer to Table [4-2](#A978-1-4302-4906-1_4_Chapter.html#Tab2)
    for information on each attribute.


    ![A978-1-4302-4906-1_4_Fig4_HTML.jpg](A978-1-4302-4906-1_4_Fig4_HTML.jpg)


    Figure 4-4. Localizing an achievement in iTunes Connect


    Note: Each game owns its achievement descriptions; you may not share achievement
    descriptions between multiple games.


    Table 4-2. Localized Achievement Attributes in iTunes Connect


    | Attribute | Description |

    | --- | --- |

    | Language | Select the language in which this achievement will appear. You must
    set up a language for each localization that you will support in your shipping
    product. |

    | Title | This is the title that will appear within the app to describe this achievement.
    |

    | Pre-earned Description | This is the description that appears when the achievement
    is unhidden and is unearned or only partially completed. |

    | Earned Description | This is the description that is shown when the achievement
    has been fully unlocked and completed. |

    | Image | This is the image that will be displayed to the user when the achievement
    is earned. Apple will supply the unearned image, or you can specify your own when
    working with a custom achievement GUI. This image must be 512 × 512 and 72 DPI.
    |

    | Achievable More Than Once | This allows the player to accept challenges on achievements
    that they have previously completed. For more details see the section “Achievement
    Challenges.” |


    For our purposes, we will configure this achievement for English. My example will
    use “Abduct 25 Cows” as the title, but you may use any title that you prefer.
    For the pre-earned description, I chose “Abduct 25 cows with your UFO.” For the
    earned description, I used “You have mastered the art of cow abduction.” I will
    also use a cow-crossing-road sign as the image. When you are done, you should
    have a fully set up achievement, which should look similar to the view shown in
    Figure [4-5](#A978-1-4302-4906-1_4_Chapter.html#Fig5).


    ![A978-1-4302-4906-1_4_Fig5_HTML.jpg](A978-1-4302-4906-1_4_Fig5_HTML.jpg)


    Figure 4-5. A new achievement, as shown in iTunes Connect


    We will want to work with a couple of different achievement setups for our game.
    Go ahead and create another new achievement for abducting a single cow; this will
    be our nonprogressive achievement. Then make a third achievement for five-minute
    play time and set it to hidden. This last achievement will let us work with timers,
    progressive achievements, and hidden achievements. You may select any point values,
    descriptions, titles, and images you want for these achievements, but make sure
    you make note of the achievement IDs.


    You should now have three achievements configured in iTunes Connect for our game.
    We can now get back into Xcode and begin working with these achievements at a
    code level.'
