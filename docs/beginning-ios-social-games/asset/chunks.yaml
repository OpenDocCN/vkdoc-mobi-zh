    *   Users have come to expect multiplayer from top-notch games on the App Store.

    *   You can justify a higher price if you have a well-done multiplayer component.

    *   There is no better way to have users download your app on the fly than the
    auto-buy invitation system. If you can set up prospective users for a situation
    in which they are invited to play and can purchase immediately, you will have
    a much better chance of closing the sale.

    *   You can increase playtime or use-time in your app or game, if you are using
    an ad-supported system. This will result in more income. If you are selling a
    paid app, users will feel they have gotten more for their money.

    *   Humans like to compete, so encourage your users to do what they enjoy. Multiplayer
