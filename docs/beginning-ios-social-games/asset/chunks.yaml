    ], [UIImage imageNamed: @\"EnemySaucer2.png\"], nil];\n        otherPlayerImageView.animationImages\
    \ = imageArray;\n        [otherPlayerImageView startAnimating];\n        [self.view\
    \ addSubview: otherPlayerImageView];\n    }\n}\n```\n\n如果我们现在在两台设备上运行游戏并开始一场新的多人游戏，就会看到一架红色的敌方\
    \ UFO 静静悬在空中。下一步是将我们的移动数据发送给对等设备，以便它们能更新敌方玩家的位置。为此，我们在 `movePlayer` 方法的末尾添加一段新代码：\n\
    \n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n{\n    //... (现有移动玩家代码)\n\
    \    if (self.gameIsMultiplayer)\n    {\n        NSString *positionString = [NSString\
    \ stringWithFormat:@\"$PlayerPosition: %f %f\", playerFrame.origin.x, playerFrame.origin.y];\n\
    \        [self.gcManager sendStringToAllPeers:positionString reliable:NO];\n \
    \   }\n}\n```\n\n这段代码会在你每次移动时，将玩家的 x 和 y 坐标发送给对等设备。数据将以不可靠方式发送，因为即使发送失败，我们也可以使用下一个数据包；当玩家持续移动时，数据会不断更新。正如第\
    \ 7 章中所讨论的，这里非常适合使用预测技术，但为简单起见，我们将逐帧同步。此外，还有更好的方法将 x 和 y 坐标发送到其他设备，例如使用字典或自定义数据格式。但将它们编码为字符串是最容易理解的方式。随着游戏或应用的开发，你可以设计这种类型的函数，使其更加精简，开销更小。\n\
    \n**提示：** 使用 `stringWithFormat` 会带来较大的开销。在实践中，你应该使用 `stringByAppendingString`\
    \ 等方法进一步优化这类代码。\n\n我们还需要更新 `receivedData` 方法，以处理预期收到的新数据类型。请将该方法修改为如下所示。此外，我们还要添加一个新方法来解析传入的数据，并添加一个名为\
    \ `drawEnemyShipWithData` 的新方法，如下所示：\n\n```\n- (void)receivedData:(NSDictionary\
    \ *)dataDictionary;\n{\n    if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $Host:\"])\n    {\n        [self determineHost: dataDictionary];\n    }\n    else\
    \ if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$PlayerPosition:\"\
    ])\n    {\n        [self drawEnemyShipWithData: dataDictionary];\n    }\n    else\n\
    \    {\n        NSLog(@\"无法确定消息类型: %@\", dataDictionary);\n    }\n}\n\n-(void)drawEnemyShipWithData:(NSDictionary\
    \ *)dataDictionary\n{\n    NSArray *dataArray = [[dataDictionary objectForKey:\
    \ @\"data\"] componentsSeparatedByString:@\" \"];\n    float x = [[dataArray objectAtIndex:\
    \ 1] floatValue];\n    float y = [[dataArray objectAtIndex: 2] floatValue];\n\
    \    otherPlayerImageView.frame = CGRectMake(x, y, 80, 34);\n}\n```\n\n更新后的 `receivedData:`\
    \ 方法会解析从网络传入的数据。我们从中提取 x 和 y 坐标，并使用 `drawEnemyShipWithData:` 方法用新位置更新敌方玩家的框架。这种方法逐帧同步两台设备，效率非常低下。如果时间更充裕，应该更新此方法以使用预测技术来确定玩家的移动方向，并且仅在玩家偏离预测时才更新数据。不过，就本演示而言，它已能满足我们的需求。有关预测性网络的更多信息，请参阅第\
    \ 7 章。\n\n如果你现在运行游戏并开始一场新的多人游戏，你会看到每台设备都能反映其配对设备的移动情况。我们仍然需要生成奶牛、添加牵引光束并更新分数，但我们已经拥有一个功能正常（尽管目前还很简陋）的多人游戏，如图\
    \ 8-1 所示。\n\n![A978-1-4302-4906-1_8_Fig1_HTML.jpg](img/A978-1-4302-4906-1_8_Fig1_HTML.jpg)\n\
    \n**图 8-1.** 在 UFO 游戏中添加第二名玩家。每个玩家都可以独立移动，并通过网络保持同步。\n"
- fmt: "# Spawning Cows\n\nBecause we want the cow movement to be synced between each\
    \ device, we need to dedicate one device to handling the cow spawning and movement\
    \ paths. We have already picked a host device, so we will let the host determine\
    \ where the cows will be placed. We begin by modifying the `determineHost` method.\
    \ As you can see in the following code, if we are the host, we begin our normal\
    \ spawn cow process:\n\n```\n-(void)determineHost:(NSDictionary *)dataDictionary\n\
    {\n    NSString *dataString = [[dataDictionary objectForKey: @\"data\"]\n    \
    \    stringByReplacingOccurrencesOfString:@\"$Host:\" withString:@\"\"];\n   \
    \ if ([dataString doubleValue] == randomHostNumber)\n    {\n        NSLog(@\"\
    Host numbers are equal, we need to reroll them\");\n        [self generateAndSendHostNumber];\n\
    \    }\n    else if ([dataString doubleValue] > randomHostNumber)\n    {\n   \
    \     isHost = YES;\n        for(int x = 0; x < 5; x++)\n        {\n         \
    \   [self spawnCow];\n        }\n        [self updateCowPaths];\n    }\n    else\
    \ if ([dataString doubleValue] < randomHostNumber)\n    {\n        isHost = NO;\n\
    \    }\n}\n```\n\nWe also need to modify our `spawnCow` method to support the\
    \ new networking behavior. All we are doing here is determining whether we are\
    \ a network game and whether we are the host, and then sending the data to our\
    \ network handlers:\n\n```\n-(void)spawnCow;\n{\n    int x = arc4random()%480;\n\
    \    UIImageView *cowImageView = [[UIImageView alloc] initWithFrame:CGRectMake(x,\
    \ 260, 64, 42)];\n    cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"\
    ];\n    [self.view addSubview: cowImageView];\n    [cowArray addObject: cowImageView];\n\
    \    [cowImageView release];\n    if (isHost && self.gameIsMultiplayer)\n    {\n\
    \        [gcManager sendStringToAllPeers:[NSString stringWithFormat:@\"$spawnCow:%i\"\
    , x] reliable:YES];\n    }\n}\n```\n\nModify the `receivedData` method to support\
    \ the new `$spawnCow` message type. We also want to extract the x-axis origin\
    \ from the message and pass it to a new method that will handle spawning a cow\
    \ from the network. Both of these methods are shown next.\n\n```\nelse if ([[dataDictionary\
    \ objectForKey: @\"data\"] hasPrefix:@\"$spawnCow:\"])\n{\n    int x = [[[dataDictionary\
    \ objectForKey: @\"data\"]\n        stringByReplacingOccurrencesOfString:@\"$spawnCow:\"\
    \ withString:@\"\"] intValue];\n    [self spawnCowFromNetwork: x];\n}\n\n-(void)spawnCowFromNetwork:(int)x\n\
    {\n    UIImageView *cowImageView = [[UIImageView alloc] initWithFrame:CGRectMake(x,\
    \ 260, 64, 42)];\n    cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"\
    ];\n    [self.view addSubview: cowImageView];\n    [cowArray addObject: cowImageView];\n\
    \    [cowImageView release];\n}\n```\n\n**Tip:** Our host doesn’t need to pass\
    \ the y-axis coordinate for the cows because they are always spawned on the same\
    \ y-axis. If you can eliminate data from a packet, it is always beneficial.\n\n\
    If you were to run the game now, you would see that both devices spawn cows in\
    \ the exact same location, but the host device is the only device that animates\
    \ the cow movements.\n\nThe next step is to add the logic to share the animation\
    \ control for the cows. Modify the existing `updateCowPaths` method to send the\
    \ `newX` and array position of the cow we want to update. The following new code\
    \ should be added to the end of the `for` loop.\n\n```\nif (self.gameIsMultiplayer)\n\
    {\n    NSString *dataString = [NSString stringWithFormat:@\"$cowMove:%i:%f\",\
    \ x, newX];\n    [gcManager sendStringToAllPeers:dataString reliable:YES];\n}\n\
    ```\n\n**Note:** Because we set the data for the spawn cow call to reliable, it\
    \ is guaranteed to be received in the order that it was sent. This means that\
    \ we can be assured that the objects in our `cowArray` on both devices will be\
    \ in the same order.\n\nWe also need to add a new data handler to our `receivedData`\
    \ method. To do that, we pass the entire dictionary to our new `updateCowPathsFromNetwork`\
    \ method:\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $cowMove:\"])\n{\n    [self updateCowPathsFromNetwork: dataDictionary];\n}\n\n\
    -(void)updateCowPathsFromNetwork:(NSDictionary *)dataDictionary;\n{\n    NSArray\
    \ *dataArray = [[dataDictionary objectForKey: @\"data\"]\n        componentsSeparatedByString:@\"\
    :\"];\n    int placeInArray = [[dataArray objectAtIndex: 1] intValue];\n    UIImageView\
    \ *tempCow = [cowArray objectAtIndex: placeInArray];\n    float currentX = tempCow.frame.origin.x;\n\
    \    [UIView beginAnimations:@\"cowWalk\" context:nil];\n    [UIView setAnimationDuration:\
    \ 3.0];\n    [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n    float\
    \ newX = [[dataArray objectAtIndex: 2] intValue];\n    if (tempCow != currentAbductee)\n\
    \    {\n        tempCow.frame = CGRectMake(newX, 260, 64, 42);\n    }\n    [UIView\
    \ commitAnimations];\n    tempCow.animationDuration = 0.75;\n    tempCow.animationRepeatCount\
    \ = 99999;\n    //flip cow\n    if (newX < currentX)\n    {\n        NSArray *flippedCowImageArray\
    \ = [NSArray arrayWithObjects: [UIImage\n            imageNamed: @\"Cow1Reversed.png\"\
    ], [UIImage imageNamed: @\"Cow2Reversed.png\"],\n            [UIImage imageNamed:\
    \ @\"Cow3Reversed.png\"], nil];\n        tempCow.animationImages = flippedCowImageArray;\n\
    \    }\n    else\n    {\n        NSArray *cowImageArray = [NSArray arrayWithObjects:\
    \ [UIImage\n            imageNamed: @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"\
    ],\n            [UIImage imageNamed: @\"Cow3.png\"], nil];\n        tempCow.animationImages\
    \ = cowImageArray;\n    }\n    [tempCow startAnimating];\n}\n```\n\nThis method\
    \ is very similar to our existing method for updating cow paths. The two differences\
    \ are that we get our place in the array from the network, and we don’t randomly\
    \ generate a `newX` position. If you were to run the game again, you would see\
    \ that both sets of cows are now in sync with each other. When a cow changes position,\
    \ the result is exactly the same on both devices. Figure [8-2](#A978-1-4302-4906-1_8_Chapter.html#Fig2)\
    \ shows the current state of the game.\n\n![A978-1-4302-4906-1_8_Fig2_HTML.jpg](A978-1-4302-4906-1_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2.** Syncing up the cow movements over the network between two iOS\
    \ devices\n\nEach player can now abduct cows and increment their score. There\
    \ are, however, still two remaining issues that need to be addressed. The first\
    \ is that we don’t share scores between devices, and the second is that we don’t\
    \ show the other player’s tractor beams or animate the cows into the UFO during\
    \ the abduction. Let’s start off by adding in support for the score.\n\n## Sharing\
    \ Scores\n\nWhen we increment the score, we send that data to our peers. Add the\
    \ following snippet of code to our `finishAbducting` method, right after we increment\
    \ the score.\n\n```\nif (self.gameIsMultiplayer)\n{\n    [gcManager sendStringToAllPeers:[NSString\
    \ stringWithFormat:@\"$score:%f\", score] reliable:YES];\n}\n```\n\nWe, again,\
    \ need to modify our `receivedData` method to support the new `$score` message.\
    \ I have chosen to increment the enemy score within the `receivedData` method.\
    \ You can, of course, write a new method to handle this functionality. In addition,\
    \ we need to add a new label for the enemy score. It will be placed directly below\
    \ the local player’s score. Figure [8-3](#A978-1-4302-4906-1_8_Chapter.html#Fig3)\
    \ shows the scores in place.\n\n```\nelse if ([[dataDictionary objectForKey: @\"\
    data\"] hasPrefix:@\"$score:\"])\n{\n    float enemyScore = [[[dataDictionary\
    \ objectForKey: @\"data\"]\n        stringByReplacingOccurrencesOfString:@\"$score:\"\
    \ withString:@\"\"] floatValue];\n    enemyScoreLabel.text = [NSString stringWithFormat:\
    \ @\"ENEMY %05.0f\", enemyScore];\n}\n```\n\n![A978-1-4302-4906-1_8_Fig3_HTML.jpg](A978-1-4302-4906-1_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3.** Adding the score for the networked player\n\n**Tip:** Technically,\
    \ you don’t need to pass the score value in with the network call, because scores\
    \ are always incremented by one; we can assume a new score message is an instruction\
    \ to increment the value by one."
