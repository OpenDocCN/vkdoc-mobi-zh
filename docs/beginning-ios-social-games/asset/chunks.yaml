    # 防止作弊与超时断线


    目前在 iOS 平台上，通过网络漏洞作弊还不是一个需要重点关注的问题。如果你是一位在线游戏玩家，可能对这种行为再熟悉不过了。精明的用户会分析网络行为模式，然后发送客户端本身绝不会发出的指令，例如`将生命值提升至浮点数上限`或`将重生时间缩短为零`。虽然你可能需要让服务器响应诸如`提升`或`降低生命值`这类指令，但必须确保服务器掌握控制权。举例来说，与其让客户端发送`“将移动速度提升至每秒五十英尺”`，不如设计成`“请求提升移动速度”`这样的消息格式，然后由服务器返回新的速度值。如果让客户端掌控变量，迟早会有人利用这一点来攻击你的系统。


    当客户端没有任何需要向服务器或对等节点发送的更新数据时，最佳实践是发送一条简单的消息表明`“我还在线，请不要断开我的连接”`，这类消息被称为`“保活”`消息。尽管在
    iOS 平台上你无需担心超时断线问题，但确保空闲对等节点之间保持通信线路畅通依然是明智之举。


    在设计消息架构时，你完全可以将其视为设计 API；两者存在大量相似之处，必须遵循相同准则。如果你在应用的第一版中发布了允许用户查询移动速度的指令，那么第二版就难以轻易移除该指令，因为旧版客户端可能仍然依赖于它。请遵循
    API 开发者采用的准则：全面测试所有功能，因为一旦发布到外部环境，就很难再收回了。


    # 万策尽时如何应对


    当你长期从事网络设计或软件开发工作后，必然会遇到这样一个问题：当设计的系统不再满足需求时该怎么办。我们来讨论一个可能让具备逻辑或商业训练背景的读者感到熟悉的症状。有一种被称为`“沉没成本谬误”`的现象，即人们在处理时间等不可退还资源时，会将其与可退还成本同等衡量。请看以下公式：


    - `收益 = 项目收入 - 开放成本`


    现在我们用实际数据来分析同样的案例。1968 年，研究人员诺克斯和英克斯特对 141 名赛马下注者进行了调查：其中 72 人刚在 30 秒内完成 2 美元下注，69
    人即将在 30 秒内下注 2 美元。假设认为，刚刚做出行动承诺的人会通过比以往任何时候都更坚信自己选中了赢家，来减少决策后的认知失调。诺克斯和英克斯特要求下注者按七分制评估自己选中的马匹获胜概率。他们发现：即将下注的人给出的平均评分为
    3.48，对应`“获胜机会尚可”`；而刚刚完成下注的人给出的平均评分为 4.81，对应`“获胜机会良好”`。这一假设得到证实：在投入 2 美元后，人们更加确信自己的下注会获得回报。诺克斯和英克斯特还对赛马场常客进行了辅助测试，并几乎完全重现了他们的发现。¹


    我们在这里讨论的是，何时应该接受现实、放弃并重新开始。当你对一匹“马”投入时间和金钱后，最终会认为它的价值高于实际价值。放弃从来都不是受欢迎的解决方案；我们的大脑天生抗拒这种做法。我们会盯着不可退回的成本，并将其计算为有利于自己的因素。一旦做出投入，就更容易将这项投入合理化并试图捍卫它。没有人愿意成为那个叫停项目、抛弃所有已投入时间和金钱的人；然而，当你将时间和资源投入开发项目时，这些投入已经消耗且无法收回。你无法仅仅基于已投入的时间来证明继续投入更多时间是正确的。


    何时该放弃并重新开始，没有绝对正确的答案，也没有绝对错误的答案。你唯一能做的就是客观审视问题：如果你尚未投入这个项目，你会选择什么解决方案？


    # 总结


    本章我们探讨了实际网络的设计，与本书其他章节中针对 iOS 的具体信息不同。即使没有本章内容，凭借常识和直觉，你也能够轻松设计出一个可运行的网络，但请牢记本章的核心经验：能工作，不代表工作得好。设计网络很容易；正确设计网络则非常困难。


    关于网络设计的信息量远不止一章甚至一本书所能容纳。如果只能留下一条最终建议：当你开始构思网络结构时，要边推进边全面思考，永远不要满足于你的第一个方案。


    下一章我们将正式开始实现设备间的消息传输。第 10 章还将对这项技术进行扩展，探讨如何为 iOS 应用添加语音聊天服务。


    ## 脚注


    ¹ Knox, R. E., & Inkster, J. A. (1968). `“Postdecision dissonance at post time.”`
    Journal of Personality and Social Psychology, 8, 319–323.


    # 8. 数据交换


    ## 摘要


    在过去的几章中，我们探讨了通过多种方式连接对等节点的方法。到目前为止，我们还未能充分利用这些连接。在本章中，你将了解到使用`Game Kit`和`Game
    Center`网络在节点间交换数据的所有知识。在前面的章节中，我们已经为 UFO 游戏添加了通过`Game Center`和`Peer Picker`（`Game
    Kit`）查找对等节点的功能。现在，我们将添加实际进行完整多人对战的能力。


    由于所有基础工作已在前面章节中完成，对于数据交换我们只需关注两个事项：首先，需要发送实际数据；其次，需要在接收端接收并处理这些数据。其他所需工作均已就绪，仅剩本章结尾将处理的断连逻辑。让我们直接开始修改第
    6 章的源代码。

