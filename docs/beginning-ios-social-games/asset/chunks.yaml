    | Title | This is the title that will appear within the app to describe this achievement.
    |

    | Pre-earned Description | This is the description that appears when the achievement
    is unhidden and is unearned or only partially completed. |

    | Earned Description | This is the description that is shown when the achievement
    has been fully unlocked and completed. |

    | Image | This is the image that will be displayed to the user when the achievement
    is earned. Apple will supply the unearned image, or you can specify your own when
    working with a custom achievement GUI. This image must be 512 × 512 and 72 DPI.
    |

    | Achievable More Than Once | This allows the player to accept challenges on achievements
    that they have previously completed. For more details see the section “Achievement
    Challenges.” |


    For our purposes, we will configure this achievement for English. My example will
    use “Abduct 25 Cows” as the title, but you may use any title that you prefer.
    For the pre-earned description, I chose “Abduct 25 cows with your UFO.” For the
    earned description, I used “You have mastered the art of cow abduction.” I will
    also use a cow-crossing-road sign as the image. When you are done, you should
    have a fully set up achievement, which should look similar to the view shown in
    Figure [4-5](#A978-1-4302-4906-1_4_Chapter.html#Fig5).


    ![A978-1-4302-4906-1_4_Fig5_HTML.jpg](A978-1-4302-4906-1_4_Fig5_HTML.jpg)


    Figure 4-5.


    A new achievement, as shown in iTunes Connect


    We will want to work with a couple of different achievement setups for our game.
    Go ahead and create another new achievement for abducting a single cow; this will
    be our nonprogressive achievement. Then make a third achievement for five-minute
    play time and set it to hidden. This last achievement will let us work with timers,
    progressive achievements, and hidden achievements. You may select any point values,
    descriptions, titles, and images you want for these achievements, but make sure
    you make note of the achievement IDs.


    You should now have three achievements configured in iTunes Connect for our game.
    We can now get back into Xcode and begin working with these achievements at a
    code level.'
  trans: '

    # 在 iTunes Connect 中配置成就


    正如我们在排行榜中所见，如果不先在 iTunes Connect 中至少设置一个新成就，就无法开始处理成就。使用您的用户名和密码登录 iTunes Connect
    (`itunesconnect.apple.com`)，然后选择我们在前面章节中一直在处理的应用程序（更多信息，请参见第 2 章）。从控制面板选择应用程序后，返回本书前面介绍的“管理
    Game Center”区域。


    您应用程序的 Game Center 门户将有一个标记为“成就”的版块。如果您是第一次在此应用程序中处理成就，将会出现一个标记为“设置”的按钮。如果您已有成就，步骤会有所不同，这将在本节稍后部分介绍。


    单击“设置”按钮将显示“成就配置”屏幕。选择页面左上角的“添加新成就”按钮，如图 4-2 所示。这将带您进入图 4-3 所示的视图。


    ![A978-1-4302-4906-1_4_Fig3_HTML.jpg](img/A978-1-4302-4906-1_4_Fig3_HTML.jpg)


    图 4-3. iTunes Connect 中新成就的配置视图


    ![A978-1-4302-4906-1_4_Fig2_HTML.jpg](img/A978-1-4302-4906-1_4_Fig2_HTML.jpg)


    图 4-2. 通过 iTunes Connect 门户添加新成就


    您可能会注意到，此门户页面与排行榜门户页面有很多相似之处。表 4-1 总结了这些属性。


    表 4-1. iTunes Connect 中的成就属性


    | 属性 | 描述 |

    | --- | --- |

    | 成就引用名称 | 仅在 iTunes Connect 内部使用，此字符串用于在 iTunes Connect 中轻松定位和引用此成就。 |

    | 成就 ID | 此标识符将在您的代码中引用。与排行榜类别一样，Apple 建议您使用反向 DNS 系统，例如 `com.company.appname.achievementname`。
    |

    | 隐藏 | 如果成就是隐藏的，用户将无法在成就列表中看到它，直到他们完成它或进度有所增加。 |

    | 积分 | 可为成就分配积分。您的应用程序被分配了 1000 积分。每完成一个成就，用户就会朝着该总分前进。一旦用户达到 1000 分，他们就已经解锁了所有成就。您应该为更难完成的成就分配更多积分。这能让用户更好地了解成就的价值。积分值是可选的，如果您不想在应用程序中使用它们，可以忽略。
    |


    提示：您不必让成就的总分加起来正好是 1000 分，但不能超过 1000 分。


    ## 创建新成就


    现在是时候创建新成就了。我们将创建一个成就，当用户绑架 25 头奶牛时达成。我们将 `绑架 25 头` 作为成就名称，这样当我们有几十个成就时，它也很容易找到。对于我们的成就
    ID，我们将使用 `com.dragonforged.ufo.abduct25`。您可以随意在此处使用任何 ID，但在接下来的示例中，请务必将其替换为 `com.dragonforged.ufo.abduct25`。我们将使其成为非隐藏成就，并为其分配
    10 积分。


    注意：完成任何成就所获得的积分不得超过 100 分。


    要使成就有效，您必须至少配置一种语言。如图 4-4 所示，成就的本地化区域与前一章创建排行榜时遇到的区域有很大不同。请参考表 4-2 了解每个属性的信息。


    ![A978-1-4302-4906-1_4_Fig4_HTML.jpg](img/A978-1-4302-4906-1_4_Fig4_HTML.jpg)


    图 4-4. 在 iTunes Connect 中本地化成就


    注意：每个游戏拥有其成就描述；您不能在多个游戏之间共享成就描述。


    表 4-2. iTunes Connect 中的本地化成就属性


    | 属性 | 描述 |

    | --- | --- |

    | 语言 | 选择此成就将显示的语言。您必须为您发布的产品中将支持的每种本地化设置一种语言。 |

    | 标题 | 这是将在应用程序内显示以描述此成就的标题。 |

    | 达成前描述 | 这是成就非隐藏且未完成或仅部分完成时显示的描述。 |

    | 达成后描述 | 这是成就已完全解锁并完成时显示的描述。 |

    | 图片 | 这是用户在获得成就时将显示的图片。Apple 将提供未获得的图片，或者您可以在使用自定义成就 GUI 时指定自己的图片。此图片必须为 512
    × 512 像素且分辨率为 72 DPI。 |

    | 可多次达成 | 这允许玩家接受他们已经完成过的成就上的挑战。更多详情请参阅“成就挑战”部分。 |


    出于我们的目的，我们将为这个成就配置英语。我的示例将使用“绑架 25 头奶牛”作为标题，但您可以使用您喜欢的任何标题。对于达成前描述，我选择了“用你的 UFO
    绑架 25 头奶牛”。对于达成后描述，我使用了“你已经掌握了绑架奶牛的艺术”。我还将使用一个奶牛过马路标志作为图片。完成后，您应该有一个完全设置好的成就，看起来应该类似于图
    4-5 中显示的视图。


    ![A978-1-4302-4906-1_4_Fig5_HTML.jpg](img/A978-1-4302-4906-1_4_Fig5_HTML.jpg)


    图 4-5. 在 iTunes Connect 中显示的新成就


    我们想要为我们的游戏处理几个不同的成就设置。继续创建另一个新成就，用于绑架一头奶牛；这将是我们的非进度型成就。然后创建第三个成就，用于五分钟的游戏时间，并将其设置为隐藏。这最后一个成就将让我们能够处理计时器、进度型成就和隐藏成就。您可以为这些成就选择任何积分值、描述、标题和图片，但请务必记下成就
    ID。


    现在，您应该在 iTunes Connect 中为我们的游戏配置了三个成就。我们现在可以返回 Xcode，并开始在代码层面处理这些成就。

