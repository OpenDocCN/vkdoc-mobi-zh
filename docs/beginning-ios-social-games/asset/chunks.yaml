  trans: "\n# 展示成就\n\n与排行榜不同，在将用户数据填充到成就系统之前，有大量的图形界面预览工作要做。观察修改成就对其通过默认 GUI 显示效果的影响，是很有帮助的。本章我们将首先展示苹果的成就\
    \ GUI，然后继续提交用户数据。本章稍后还会介绍自定义的成就 GUI。\n\n开始之前，我们需要创建一个新的`UIButton`来触发成就视图。我们很可能希望在游戏屏幕之外执行此操作，就像处理两个排行榜按钮时那样。首先，我们在`UFOViewController`视图中添加一个新按钮，如图\
    \ 4-6 所示。\n\n你还需要创建一个`IBAction`并将其连接到新的“成就”按钮。将以下代码插入到你连接到“成就”按钮的操作中。\n\n```\n\
    -(IBAction)achievementButtonPressed;\n\n{\n\n     GKAchievementViewController\
    \ *controller = nil;\n\n       controller = [[GKAchievementViewController alloc]\
    \ init];\n\n         [achievementViewController setAchievementDelegate:self];\n\
    \n         [self presentViewController:achievementViewController animated:YES\
    \ completion:nil];\n\n       [controller release];\n\n}\n```\n\n![A978-1-4302-4906-1_4_Fig6_HTML.jpg](img/A978-1-4302-4906-1_4_Fig6_HTML.jpg)\n\
    \n图 4-6.\n\n添加新按钮以触发成就视图\n\n**提示**\n\n从 iOS 6 开始，你可以使用`GKGameCenterViewController`创建一个可用于成就、排行榜和挑战的\
    \ Game Center 视图。在 iOS 6 上使用`GKAchievementViewController`会启动一个已预先选中成就部分的`GKGameCenterViewController`，同时保持向后兼容性。\n\
    \n此外，我们需要连接一个与`GKAchievementViewController`配合使用的委托回调。将以下方法添加到你的实现文件中：\n\n```\n\
    - (void)achievementViewControllerDidFinish:(GKAchievementViewController *)viewController\n\
    \n{\n\n     [self dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\
    \n如果你现在运行应用并点击“成就”按钮，将会看到一个类似于图 4-7 所示的视图。显示的成就使用的是苹果的“未获得”图像。苹果建议你始终使用其“未获得”图像，但当使用自定义成就\
    \ GUI 时，你可以覆盖此图像并返回自己的图像。\n\n接下来，回想一下我们设置了三个成就，其中一个是隐藏状态。如图 4-7 所示，提供的视图只向我们展示了两个成就。因为我们尚未向第三个成就提交任何进度，其详情对用户是隐藏的。不过，你可以看到顶部信息行反映出存在一个隐藏的成就（1/3\
    \ 成就）。同时注意，这些成就使用的是在 iTunes Connect 中设置的本地化“未获得”描述。\n\n![A978-1-4302-4906-1_4_Fig7_HTML.jpg](img/A978-1-4302-4906-1_4_Fig7_HTML.jpg)\n\
    \n图 4-7.\n\n使用苹果默认 GUI 显示的成就\n\n这是通过苹果内置 GUI 向用户展示其成就进度的全部必要步骤。下一节，我们将探讨如何更新和推进这些成就。在本章稍后部分，你将学习如何使用自定义\
    \ GUI 来展示成就。\n\n**注意**\n\n用户始终可以在 Game Center 应用中查看他们的成就进度，但仍建议你在自己的应用中提供让用户查看进度的方式。\n\
    \n# 修改成就进度\n\n与排行榜条目不同，成就可以通过用户交互不断修改和推进。就像我们处理其他 Game Center 功能一样，我们将在`GameCenterManager`类中创建一个新方法来处理与成就的交互。添加以下方法后，我们将审阅代码以了解其具体运作方式。\n\
    \n**提示**\n\n请记住，所有这些源代码都可以在线获取，网址为 [`http://apress.com`](http://apress.com)。处理大型方法时，从下载的源代码中复制可能会更简单。\n\
    \n```\n- (void)submitAchievement:(NSString*)identifier percentComplete:(double)percentComplete\n\
    \n{\n\nif ([self earnedAchievementCache] == NULL)\n\n{\n\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\n\
    *achievements, NSError *error) {\n\nif (error == NULL)\n\n{\n\nNSMutableDictionary\
    \ *tempCache = [NSMutableDictionary\ndictionaryWithCapacity:[achievements count]];\n\
    \nfor (GKAchievement* achievement in achievements)\n\n{\n\n[tempCache setObject:\
    \ achievement forKey:\n[achievement identifier]];\n\n}\n\n[self setEarnedAchievementCache:tempCache];\n\
    \n[self submitAchievement:identifier percentComplete:\npercentComplete];\n\n}\n\
    \nelse\n\n{\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted:\
    \ error:) withArg:NULL\nerror:error];\n\n}\n\n}];\n\n}\n\nelse\n\n{\n\nGKAchievement\
    \ *achievement = [[self earnedAchievementCache]\nobjectForKey:identifier];\n\n\
    if (achievement != NULL)\n\n{\n\nif (([achievement percentComplete] >= 100.0)\
    \ ||\n([achievement percentComplete] >= percentComplete))\n\n{\n\nachievement\
    \ = NULL;\n\n}\n\n[achievement setPercentComplete:percentComplete];\n\n}\n\nelse\n\
    \n{\n\nachievement = [[[GKAchievement alloc] initWithIdentifier:identifier]\n\
    autorelease];\n\n[achievement setPercentComplete:percentComplete];\n\n[[self earnedAchievementCache]\
    \ setObject:achievement\nforKey:[achievement identifier]];\n\n}\n\nif (achievement\
    \ != NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler:^(NSError\n\
    *error) {\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted:error:)\n\
    withArg: achievement error:error];\n\n}];\n\n}\n\n}\n\n}\n```\n\n在执行此代码之前，你需要添加一个新的类属性。创建一个新的可变字典（别忘了合成它）。`GameCenterManager`头文件的相关部分现在应如下所示。\n\
    \n```\n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n\n\
    {\n\nid <GameCenterManagerDelegate, NSObject> delegate;\n\nNSMutableDictionary*\
    \ earnedAchievementCache;\n\n}\n\n@property(nonatomic, retain) id <GameCenterManagerDelegate,\
    \ NSObject> delegate;\n\n@property(nonatomic, retain) NSMutableDictionary* earnedAchievementCache;\n\
    ```\n"
- fmt: "### Loading Achievements\n\nNow look at the `submitAchievement:percentComplete:`\
    \ method we added. There are two primary if/else blocks. The first one is executed\
    \ if `[self earnedAchievenmentCache]` is NULL, which it will always be the first\
    \ time this code is executed. Let’s take a look at that block of code now.\n\n\
    ```\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray *achievements,\
    \ NSError *error) {\n    if (error == NULL)\n    {\n        NSMutableDictionary\
    \ *tempCache = [NSMutableDictionary dictionaryWithCapacity: [achievements count]];\n\
    \        for (GKAchievement *achievement in achievements)\n        {\n       \
    \     [tempCache setObject:achievement forKey:[achievement identifier]];\n   \
    \     }\n        [self setEarnedAchievementCache:tempCache];\n        [self submitAchievement:identifier\
    \ percentComplete:percentComplete];\n    }\n    else\n    {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
    \ withArg:NULL error:error];\n    }\n}];\n```\n\n**Important**  \nThe array that\
    \ is returned by `loadAchievementsWithCompletionHandler` will not show any achievements\
    \ for which you have not yet submitted a `percentageCompleted`.\n\nThe primary\
    \ function of this code snippet is to load a list of achievements into the `earnedAchievementCache`.\
    \ We call `loadAchievementsWithCompletionHandler` on `GKAchievement`. This call\
    \ returns an array of all the achievements that were set up in iTunes Connect.\
    \ We then store the `GKAchievement` object into the dictionary with the identifier\
    \ as the key.\n\nAt this point, the code calls `submitAchievement:percentComplete`\
    \ again. This time, `earnedAchievementCache` is not NULL and the second set of\
    \ code is executed. If we encounter an error during this process, we use our standard\
    \ delegate callback to send the error back to our delegate.\n\nYou will need to\
    \ add a new protocol method to `GameCenterManager` to handle this delegate callback;\
    \ this is a good time to do that. Add the following optional protocol to the header\
    \ file:\n\n```\n- (void)achievementSubmitted:(GKAchievement*)achievement error:(NSError*)error;\n\
    ```\n\nNow let’s take a look at the second section of code. The following code,\
    \ when successfully executed, submits the achievement to the Game Center servers.\n\
    \n```\nGKAchievement *achievement = [[self earnedAchievementCache] objectForKey:identifier];\n\
    if (achievement != NULL)\n{\n    if ((achievement.percentComplete >= 100.0) ||\
    \ (achievement.percentComplete >= percentComplete))\n    {\n        achievement\
    \ = NULL;\n    }\n    [achievement setPercentComplete:percentComplete];\n}\nelse\n\
    {\n    achievement = [[[GKAchievement alloc] initWithIdentifier: identifier] autorelease];\n\
    \    [achievement setPercentComplete:percentComplete];\n    [[self earnedAchievementCache]\
    \ setObject:achievement forKey:[achievement identifier]];\n}\n\nif (achievement\
    \ != NULL)\n{\n    [achievement reportAchievementWithCompletionHandler: ^(NSError\
    \ *error) {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
    \ withArg:achievement error:error];\n    }];\n}\n```\n\nThe first line of code\
    \ retrieves a `GKAchievement` object from our `earnedAchievementCache`, based\
    \ on the identifier string that is passed into this method. If the achievement\
    \ is completed or the reported progress is equal to what we have on the Game Center\
    \ server, we set the achievement to NULL. This prevents us from tying up networking\
    \ time by submitting progress on something that will be ignored. We also set the\
    \ property for `percentComplete` on the `GKAchievement` object to the double that\
    \ was passed into this method.\n\nIn the event that the achievement doesn’t exist\
    \ in the cache, we allocate and initialize a new instance of it. In this event,\
    \ we also want to add it to our local achievement cache.\n\nThe final step, after\
    \ doing a NULL check, is to submit the achievement. We call `reportAchievementWithCompletionHandler`\
    \ on the achievement object. We then pass the results back to our delegate using\
    \ our existing protocol.\n\n**Note**  \nAll achievements have a `percentageComplete`,\
    \ regardless of whether they allow a percentage to be completed at a time. If\
    \ your achievement can only be completely earned or unearned, then you will want\
    \ to pass 100 for earned.\n\n### Achievement Protocol\n\nThe last thing that we\
    \ need to do in this section is implement our protocol method in `UFOGameViewController`.\
    \ Add the following method to the implementation of that file; all we will worry\
    \ about right now is printing the error and success information to the console.\n\
    \n```\n- (void)achievementSubmitted:(GKAchievement *)achievement error:(NSError\
    \ *)error;\n{\n    if (error)\n    {\n        NSLog(@\"There was an error in reporting\
    \ the achievement: %@\", [error localizedDescription]);\n    }\n    else\n   \
    \ {\n        NSLog(@\"achievement submitted\");\n    }\n}\n```\n\n## Resetting\
    \ Achievements\n\nThere are circumstances when you might want to reset user achievements.\
    \ Not only is doing so extremely helpful in debugging; you might find it also\
    \ useful to provide users with an option to reset. You might want to add a prestige\
    \ mode or give the users a chance to start your game over from the beginning.\
    \ The following code snippet will completely reset all achievements in your app\
    \ for the local user.\n\n```\n- (void)resetAchievements\n{\n    [self setEarnedAchievementCache:NULL];\n\
    \    [GKAchievement resetAchievementsWithCompletionHandler:^(NSError *error) {\n\
    \        if (error == NULL)\n        {\n            NSLog(@\"Achievements have\
    \ been reset\");\n        }\n        else\n        {\n            NSLog(@\"There\
    \ was an error in resetting the achievements: %@\", [error localizedDescription]);\n\
    \        }\n    }];\n}\n```\n\n**Important**  \nDon’t forget to remove the cached\
    \ information you have stored on the achievements, or you will not be able to\
    \ progress the reset achievements until the app is restarted."
