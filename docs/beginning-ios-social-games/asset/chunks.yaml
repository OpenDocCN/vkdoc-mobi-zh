- fmt: "# Creating a Single Leaderboard and Posting Scores\n\nThe last thing that\
    \ needs to be done when creating a new single leaderboard is entering the localized\
    \ score information, as shown in Figure [3-4](#A978-1-4302-4906-1_3_Chapter.html#Fig4).\
    \ `iTunes Connect` contains built-in localization support for Game Center; you\
    \ will need to create a new entry for each language you want to support.\n\nThe\
    \ `Name` field is the display name for your leaderboard in the chosen language.\
    \ The `Score Format` field will vary depending on the score format type you selected\
    \ on the previous screen. (See Figure [3-4](#A978-1-4302-4906-1_3_Chapter.html#Fig4)\
    \ for an example of money formatting.) You also need to provide a `Score Format\
    \ Suffix`. This string will be appended to the end of your score value when you\
    \ retrieve the formatted score property.\n\n> **Caution**\n> \n> You will need\
    \ to add at least one language for every leaderboard you create before it can\
    \ be considered valid.\n\n![A978-1-4302-4906-1_3_Fig4_HTML.jpg](A978-1-4302-4906-1_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4.** Editing the localization information on a new leaderboard\n\n\
    > **Tip**\n> \n> If you want a space to appear between the score and the score\
    \ format suffix in the formatted score value, don’t forget to add a space before\
    \ the beginning of the score suffix.\n\nYou now have a single leaderboard configured\
    \ for your app. In order to enable the combined leaderboard, we need at least\
    \ two leaderboards that share the same type of score format. Go ahead and create\
    \ a second single leaderboard now.\n\nOnce you have two leaderboards that share\
    \ the same score format type, you can create a combined leaderboard. Follow the\
    \ same procedure for creating a single leaderboard, as described in the previous\
    \ example. This area is similar to a single leaderboard creation screen. The main\
    \ difference is that you need to select the leaderboards you want to combine,\
