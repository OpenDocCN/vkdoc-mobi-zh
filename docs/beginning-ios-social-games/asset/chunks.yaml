    \     [self callDelegateOnMainThread:@selector(scoreReported:)\n             \
    \                                          withArg:nil\n                     \
    \                                  error:error];\n        }];\n}\n```\n\n这个新方法接收一个\
    \ `int64` 类型的分数和一个 `NSString` 类型的类别。然后，它分配并初始化一个新的 `GKScore` 实例。我们需要在 `GKScore`\
    \ 对象上设置的唯一属性是原始分数值。API 已经为我们设置了日期和用户值；当我们初始化 `GKScore` 对象时，我们使用一个类别参数进行初始化。我们将继续使用标准的回调块将结果传递给我们的委托。\n\
    \n我们还需要修改头文件，以纳入一个新的协议方法。修改 `GameCenterManager` 头文件中现有的协议声明区域，包含 `scoreReported`\
    \ 方法，如下代码片段所示：\n\n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n\
    - (void)processGameCenterAuthentication:(NSError*)error;\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray *)players\
    \ error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n@end\n```\n\
    \n至此，我们暂时完成了对 `GameCenterManager` 类所需的所有修改。现在，我们可以将注意力转回到游戏本身。我们首先需要实现一些新的游戏机制来处理高分。\n\
    \n## 设置默认排行榜\n\n自 iOS 5 的 Game Center 开始，你可以为本地用户设置一个默认的 Game Center 排行榜。如果你设置了默认排行榜，则在提交时可以为排行榜省略设置一个类别，系统会自动使用正确的默认排行榜。以下方法接收一个\
    \ `NSString` 标识符作为参数，用于指定你想要设置为本地玩家默认排行榜的排行榜：\n\n```\n[GKLeaderboard setDefaultLeaderboard:@\"\
    com.dragonforged.leaderboardToBeDefault\"\n  withCompletionHandler:^(NSError *error)\n\
    {\n        NSLog(@\"设置默认排行榜时发生错误：%@\",\n  [error localizedDescription]);\n}];\n\
    ```\n"
- fmt: "# Adding Score Posting to UFOs\n\nThere are two obvious ways that we can add\
    \ scoring to our UFOs game. First, we could implement a system that counted how\
    \ many cows were abducted and submit that number as the score. Although this approach\
    \ is the easiest to implement for us, it is not a very fun gameplay technique,\
    \ because there is no logical point at which the game ends. The second, high-score\
    \ method is harder to implement, but makes more sense. It clocks how long the\
    \ user took to abduct ten cows; the user with the lowest time is the winner.\n\
    \nThese are topics that must be carefully considered for your own app. For the\
    \ purpose of this book, we will demonstrate the first method, in which the number\
    \ of cows abducted is the user’s score. If you were going to implement a timer-based\
    \ system, the approach would be very similar: you would start a timer at the beginning\
    \ of the round, and when ten cows were abducted, you would submit the time in\
    \ seconds on the timer.\n\nIn order to implement our score-based system, we need\
    \ to add a way for the player to end a game. In an actual game, this could be\
    \ handled by something being able to kill your player, or a time limit. However,\
    \ for the purpose of this example, we will simply add an Exit button. This will\
    \ allow the user to simulate a game-over event, while keeping the code Game Center–focused\
    \ without adding any extra game complexity.\n\nWe add an Exit button in `UFOGameViewController.xib`,\
    \ as shown in Figure [3-6](#A978-1-4302-4906-1_3_Chapter.html#Fig6). We will need\
    \ to create a new `IBAction` for the button as well. Add the following code to\
    \ `UFOGameViewController` and connect our Exit button to it. For the time being,\
    \ we will just pop the navigation controller back to the root view.\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n  [[self navigationController] popViewControllerAnimated:YES];\n}\n```\n\n\
    > **Note:** You are not required to wait until the end of a game to submit a new\
    \ score, but it is generally thought of as good practice. You want to avoid submitting\
    \ a new score multiple times per game if it can be prevented.\n>\n> A notable\
    \ exception might be a continuous role-playing game in which the score continually\
    \ updates and there is no proper end point during the game to submit a score.\n\
    \n![A978-1-4302-4906-1_3_Fig6_HTML.jpg](A978-1-4302-4906-1_3_Fig6_HTML.jpg)\n\n\
    **Figure 3-6.** Adding the ability to exit the game so a high score can be submitted\n\
    \nWe will also want to add our protocol method from the `GameCenterManager` class\
    \ to `UFOGameViewController`. Add the following code snippet into `UFOGameViewController.m`.\n\
    \n```\n-(void)scoreReported: (NSError*) error;\n{\n  if (error)\n  {\n    NSLog(@\"\
    There was an error in reporting the score: %@\",\n          [error localizedDescription]);\n\
    \  }\n  else\n  {\n    NSLog(@\"Score submitted\");\n  }\n}\n```\n\nThe only remaining\
    \ step is to submit the score to Game Center; if you recall, we have already written\
    \ the method to handle this in our `GameCenterManager` class. We already have\
    \ an instance of our `GameCenterManager` class that we used in `UFOViewController`\
    \ to authenticate the user. We will want to keep a pointer to the instance of\
    \ our object that was already created in the previous class.\n\nCreate a new property\
    \ for `UFOGameViewController`, make it an instance of `GameCenterManager`, and\
    \ name it `GCManager` as we did in the previous class. Once the property has been\
    \ synthesized, we can hook into it from our previous class. Modify the `playButtonPressed`\
    \ method of `UFOViewController` to match the following:\n\n```\n-(IBAction)playButtonPressed\n\
    {\n  UFOGameViewController *gameViewController = [[UFOGameViewController alloc]init];\n\
    \  gameViewController.gcManager = gcManager; //Changed Code\n  [self.navigationController\
    \ pushViewController: gameViewController animated:YES];\n  [gameViewController\
    \ release];\n}\n```\n\nNow our game controller class has a reference to the `GameCenterManager`\
    \ that we will be using throughout the project. We also have to set a new delegate\
    \ for `gcManager` in the `viewDidLoad` method of `UFOGameViewController`. We want\
    \ to make sure that `UFOGameViewController` will be handling the callbacks for\
    \ the score submitted. Add the following method to the implementation:\n\n```\n\
    - (void)scoreReported: (NSError*) error;\n{\n  if (error)\n  {\n    NSLog(@\"\
    There was an error in reporting the score: %@\",\n          [error localizedDescription]);\n\
    \  }\n  else\n  {\n    NSLog(@\"Score submitted\");\n  }\n  [[self navigationController]\
    \ popViewControllerAnimated: YES];\n}\n```\n\nWe will also modify the `exitAction`\
    \ method to only submit the score. To do so, replace the old `exitAction` method\
    \ with the following. Notice that we are using the leaderboard ID that we set\
    \ in iTunes Connect; make sure to use the same ID that you entered, as it will\
    \ probably not match the one used here.\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n  [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n}\n```\n\nWhen you now play and click Exit, you should see a console message\
    \ that looks similar to the following output:\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n> **Tip:** See the section “A Better\
    \ Approach” at the end of this chapter for a more complex, but user-friendly,\
    \ approach to submitting scores.\n\nNow that we have a score submitted to a leaderboard,\
    \ in the following sections you will learn how to present this data back to the\
    \ user. This action has been greatly simplified for the purpose of making this\
    \ section as easy to learn as possible. This will not be the user experience you\
    \ want to present to your user; we are simply trapping the user in the game screen\
    \ while we wait for a network callback. In a real game, you will want to handle\
    \ the delegate callback in the previous view. This ensures that the user is not\
    \ waiting unnecessarily. For simplicity sake, we will continue to use the easier-to-follow\
    \ methodology.\n\n> **Tip:** You can only have one score posted per leaderboard\
    \ category for each player. You might notice that scores you submit never appear\
    \ on the leaderboard. If this behavior occurs, make sure that the score you are\
    \ submitting is higher than the highest score for that player."
