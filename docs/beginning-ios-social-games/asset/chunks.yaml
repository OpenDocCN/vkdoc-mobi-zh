  raw: '## Starting a New Game


    Starting a new match with turned-based gaming is a very straightforward and relatively
    simple process. To do so, you need to implement the following method. This new
    method dismisses the `GKTurnBasedMatchmakerViewController`, and then passes a
    copy of the match object to your game controller. The following code snippet is
    the procedure followed for the tic-tac-toe sample app.


    `- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController
    *)viewController didFindMatch:(GKTurnBasedMatch *)match`


    `{`


         `[self dismissViewControllerAnimated: YES completion: nil];`


         `tictactoeGameViewController *gameVC = [[tictactoeGameViewController alloc]
    init];`


         `gameVC.match = match;`


          `[[self navigationController] pushViewController:gameVC animated:YES];`


          `[gameVC release];`


    `}`


    Let’s now switch attention to the `tictactoeGameViewController` class. Starting
    with the header file, we create a new property to hold on to the match object,
    which we set in the previous method. We also create a new mutable dictionary to
    hold on to our game data, which will be discussed in more depth throughout the
    rest of this chapter.


    `#import <UIKit/UIKit.h>`


    `#import <GameKit/GameKit.h>`


    `@interface tictactoeGameViewController : UIViewController`


    `@property(nonatomic, retain) NSMutableDictionary *gameDictionary;`


    `@property(nonatomic, retain) GKTurnBasedMatch *match;`


    `@end`


    Important


    You are strictly limited to passing only 4k of data with each new turn. If you
    cannot limit your game data to less than 4k, you can use a URL to point to a server
    holding the complete data set. Alternatively, you could pass only the delta of
    the game state and store the existing data locally.


    We need to pause here to configure the actual game view (`tictactoeGameViewController`).
    We need nine spots for the user to move in the tic-tac-toe game, as well as a
    forfeit option and a label to inform the players of whose turn it is.


    We use simple UIButtons to handle user input. Modify the XIB file with a layout
    similar to that pictured in Figure [9-4](#A978-1-4302-4906-1_9_Chapter.html#Fig4).
    You need to create `IBOutlets` for each of the buttons and the label as well as
    new `IBAction` methods for both making a move and forfeiting. Connect all the
    board buttons to the `makeMove` method that you previously created. We also need
    to set tags on the UIButtons to help us locate them. Begin with tag 1 in the upper-left
    corner and move left to right, up to down, numbering them.


    ![A978-1-4302-4906-1_9_Fig4_HTML.jpg](A978-1-4302-4906-1_9_Fig4_HTML.jpg)


    Figure 9-4.


    A view of the game board, as seen from Interface Builder


    You now have two new methods in your game view controller, as well as nine button
    outlets and one label outlet. Now that you have seen how to begin a new turned-based
    gaming match, in the next section, we look at how to make a move and pass control
    to the next player.


    ## Making the First Move


    The first thing we need to do in a new match-based game, before we make a move,
    is determine which avatar the player is representing. In our example game, there
    are two sides: X and O. We are going to set the first person to always be X, and
    the second to always be O. This means that X will always make the first move.
    With this setup, it becomes easy to determine who the player currently is representing
    using the following code snippet:


    `if (match.currentParticipant == [match.participants objectAtIndex:0])`


    `{`


    `myPlayerCharacter = @"X";`


    `identifyTeamLabel.text = @"It is X''s Turn";`


