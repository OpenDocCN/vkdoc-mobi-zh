  trans: "\n# 从提交失败中恢复\n\n开发者全权负责处理成就提交失败的情况。你绝不能让用户丢失任何成就进度。丢失成就对用户来说是非常令人沮丧的，应不惜一切代价避免。为防止这种情况，可以采取与处理分数失败时相同的方法。主要区别在于无需存储`GKAchievement`对象，因为它不包含任何日期信息或时效性信息。我们只需存储`percentageComplete`值。我们将创建一个新方法来处理此行为。将以下方法添加到`GameCenterManager`类中。\n\
    \n```\n-(void)storeAchievementToSubmitLater:(GKAchievement *)achievement\n\n{\n\
    \nNSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]\n\
    initWithArray:[[NSUserDefaults standardUserDefaults]\nobjectForKey:@\"savedAchievements\"\
    ]];\nif ([achievementDictionary objectForKey:[achievement identifier]] == nil)\n\
    \n{\n\n[achievementDictionary setObject:[NSNumber numberWithDouble:[achievement\n\
    percentComplete]] forKey:[achievement identifier]];\n\n}\n\nelse\n\n{\n\ndouble\
    \ storedProgress = [[achievementDictionary objectForKey:\nachievement.identifier]\
    \ doubleValue];\nif ([achievement percentComplete] > storedProgress)\n\n{\n\n\
    [achievementDictionary setObject:[NSNumber\nnumberWithDouble:[achievement percentComplete]]\n\
    forKey:[achievement identifier]];\n\n}\n\n}\n\n[[NSUserDefaults standardUserDefaults]\
    \ setObject:achievementDictionary\nforKey:@\"savedAchievements\"];\n[achievementDictionary\
    \ release];\n\n}\n```\n\n此方法将一个成就作为参数，并验证该成就是否已作为引用存储在我们未能成功提交的成就集合中。如果提交失败，则需要查看哪个成就的进度更靠前，以避免出现删除用户进度的情况。完成后，我们将它作为字典存储到`userDefaults`中，使用标识符作为键，完成百分比作为值。我们在`submitAchievement:PercentComplete:`方法的错误处理中调用此方法。相关代码片段如下所示：\n\
    \n```\nif (achievement!= NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler:\
    \ ^(NSError *error) {\nif (error != nil)\n\n{\n\n[self storeAchievementToSubmitLater:\
    \ achievement];\n\n}\nif (percentComplete >= 100)\n\n{\n\n[GKAchievementDescription\n\
    loadAchievementDescriptionsWithCompletionHandler:\n^(NSArray *descriptions, NSError\
    \ *error) {\nfor (GKAchievementDescription *achievementDescription in descriptions)\n\
    \n{\n\nif (![[achievement identifier]\nisEqualToString:[achievementDescription\n\
    identifier]]) continue;\n[self callDelegateOnMainThread:\n@selector(achievementEarned:)\n\
    withArg:achievementDescription error:nil];\n\n}\n\n}];\n\n}\n[self callDelegateOnMainThread:\
    \ @selector(achievementSubmitted:error:)\nwithArg: achievement error: error];\n\
    \n}];\n\n}\n```\n\n**提示**\n\n建议通知用户，他们的成就当前无法提交，但已保存并稍后将重新提交。这能让用户知道任何进度都没有丢失。\n\
    \n我们还需要一个新方法，用于检查是否有未提交的成就进度。至于何时调用此方法最佳，并没有标准答案。通常可以在用户通过 Game Center 认证后调用它，但你可能还想从其他方法中调用它，例如每当网络可达性状态更新时。将以下方法添加到你的`GameCenterManager`类中。\n\
    \n```\n- (void)submitAllSavedAchievements\n\n{\n\nNSMutableDictionary *achievementDictionary\
    \ = [[NSMutableDictionary alloc]\ninitWithArray:[[NSUserDefaults standardUserDefaults]\n\
    objectForKey:@\"savedAchievements\"]];\nNSArray *keys = [achievementDictionary\
    \ allKeys];\nfor (int x = 0; x < [keys count]; x++)\n\n{\n\n[self submitAchievement:[keys\
    \ objectAtIndex:x] percentComplete:\n[[achievementDictionary objectForKey:[keys\
    \ objectAtIndex:x]] doubleValue]];\n[[NSUserDefaults standardUserDefaults] removeObjectForKey:[keys\n\
    objectAtIndex:x]];\n\n}\n[achievementDictionary release];\n\n}\n```\n\n此方法加载未提交进度的副本，并遍历每个项目，尝试逐一重新提交。如果再次提交失败，它们将被重新添加回已保存的数据中。\n\
    \n# 成就挑战\n\n随着 iOS 6 的推出，成就现在可以作为挑战发送给 Game Center 好友。如果你的应用使用 Apple 提供的标准界面，则无需做任何更改即可为用户提供成就挑战功能。\n\
    \n如果你正在开发的应用使用自定义成就界面，或者你更倾向于启用编程式挑战，则可以使用以下代码片段来实现：\n\n```\n[(GKAchievement *)achievement\
    \ issueChallengeToPlayers: (NSArray *)players message:@\"Think you can earn this\
    \ achievement!?\"];\n```\n\n你可能还想获取所有可以发送当前成就挑战的玩家列表。以下代码将接收一个玩家 ID 数组（例如你的好友列表），并返回一个可以接受挑战的玩家列表。如果你的应用阻止用户接受已完成的成就挑战，这将非常有用。\n\
    \n```\n[achievement selectChallengeablePlayerIDs: arrayOfPlayersToCheck withCompletionHandler:^(NSArray\
    \ *challengeablePlayerIDs, NSError *error)\n\n{\n\n     if(error != nil)\n\n \
    \    {\n\n                       NSLog(@\"An error occurred while retrieving a\
    \ list of\n        challengeable players: %@\", [error\n        localizedDescription]);\n\
    \n     }\n     NSLog(@\"The following players can be challenged: %@\",      challengeablePlayerIDs);\n\
    \n}];\n```\n\n**注意**\n\n为了让用户能够接受他们已经完成的成就挑战，需要在 iTunes Connect 中为每个成就勾选“可多次达成”选项。\n\
    \n还可以使用以下代码片段获取已验证用户所有待处理的`GKChallenge`项目数组：\n\n```\n[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray\
    \ *challenges, NSError *error)\n\n{\n\n     if (error != nil)\n\n     {\n\n  \
    \        NSLog(@\"An error occurred: %@\", [error localizedDescription]);\n\n\
    \     }\n\n     else\n\n     {\n\n          NSLog(@\"Challenges: %@\", challenges);\n\
    \n     }\n\n}];\n```\n\n每个挑战都有一个关联的状态，例如已完成、已作废、已拒绝或待处理。可以通过以下方式轮询这些状态：\n\n```\n\
    if(challenge.state == GKChallengeStateCompleted)\n     NSLog(@\"Challenge Completed\"\
    );\n```\n\n最后，也可以通过简单地对其调用`decline`来拒绝传入的挑战，如下所示：\n\n```\n[challenge decline];\n\
    ```\n\n# 总结\n\n现在，你已拥有所有必要的工具，可以为你的 Game Center 应用添加丰富且复杂的成就系统。你了解了添加成就的价值，以及如何在\
    \ iTunes Connect 门户中设置和配置它们。我们讨论了使用 Apple 默认成就图形界面和你自定义图形界面的优缺点。现在，你已知道如何扩展`GameCenterManager`类，以便在其中统一发布成就进度、获取成就反馈和重置成就进度。\n\
    \n你在本章中完成的最重要一步是扩展了可重用的`GameCenterManager`类，这使得你在未来的项目中可以轻松地添加成就功能。在下一章中，我们将探索\
    \ Game Center 的配对和邀请系统，以便你能够添加多人游戏功能和其他网络特性。\n"
- fmt: '# 5. Matchmaking and Invitations


    ## Abstract


    Choose your enemies carefully, ‘cause they will define you.


    > —U2, “Cedars Of Lebanon”


    Beginning with this chapter, and through the next few chapters, we will discuss
    how to add networking with Game Center, and later Game Kit, into your app or game.
    Adding networking capability to your app is considered almost essential technology
    in the modern era. The process of adding networking support normally begins with
    finding people to connect with. Virtually all modern software has some sort of
    networking component associated with it today, whether it is talking to an online
    service to retrieve or post information, or talking directly to a peer device
    to exchange data.


    In the following chapters we will discuss communicating with other peer devices,
    although not all of our networking configurations will be peer-to-peer (see [Chapter
    7](#A978-1-4302-4906-1_7_Chapter.html) for details on network design).


    This chapter, in particular, explores how to use Game Center to find and invite
    peers into your app using Game Center’s invitation system.


    Game Center provides an amazingly undervalued selling and distribution tool to
    you for very little overhead in handling invitations. When inviting nonlocal users
    to begin a multiplayer experience in your game or app, you have the option to
    invite any of your Game Center friends. If the friends that you invite do not
    currently have the app installed, they will be prompted to purchase the app instantly
    and begin playing. There are no other methods on the iPhone to send a “Buy Now”
    link to another user in this manner. This functionality provides a great way to
    grow your user base—just let your users do the selling for you.


    In addition to a “Buy Now” link, Game Center also allows users to rate your app
    directly from within the Game Center interface, and as of iOS 6 it has provided
    functionality to share your app via Twitter and Facebook. These features alone
    make a compelling argument to add Game Center without even diving into the incredible
    networking abilities it provides.


    ## Why Add Networking to Your App?


    When looking at the list of the top-ten selling PC or console games for any recent
    year, you will find it heavily dominated by games that demonstrate a strong focus
    on multiplayer interaction. Let’s take a quick look at the top-selling PC game
    for 2012, Call of Duty: Black Ops 2. While this game does feature a single-player
    mode, it is considered more of an add-on to the game than the primary selling
    point. The focus was obviously the multiplayer gaming, even at the sacrifice of
    the single-player campaign. Multiplayer iOS games have begun to find their footing
    from Letterpress to Clash of Clans. In recent years, the industry’s focus has
    shifted from creating rich and in-depth single-player campaigns to putting more
    effort into the multiplayer. There is a perfectly reasonable answer for this new
    phenomenon: you get more bang for the buck with multiplayer.


    Humans are, by nature, social creatures. We crave social interaction for healthy
    mental development. Video games and other social software are increasingly becoming
    an outlet for that interaction. Whether you agree with the politics of that statement
    is not what is important here, but the fact remains that multiplayer games are
    becoming more and more popular. Software users have grown increasingly fond of
    multiplayer interaction, whether in a massive multiplayer online role-playing
    game or your garden-variety first-person shooter.


    Adding a multiplayer element to your game can increase user playtime by a hundredfold.
    If you need proof, look at Quake 3 or Unreal Tournament, both of which were released
    in 1999 and both of which still had users logging in for many years after. If
    these games had focused solely on single-player, they most likely wouldn’t have
    had such a devoted fan base. Listed here are some additional reasons why adding
    matchmaking and invitations through Game Center should be a simple business decision
    for your products:


    - Adding a multiplayer component to a game is a great way to add additional polish.
    Depending on the type of game you are working with, it might be very minor additional
    work to add a multiplayer element.

    - Users have come to expect multiplayer from top-notch games on the App Store.

    - You can justify a higher price if you have a well-done multiplayer component.

    - There is no better way to have users download your app on the fly than the auto-buy
    invitation system. If you can set up prospective users for a situation in which
    they are invited to play and can purchase immediately, you will have a much better
    chance of closing the sale.

    - You can increase playtime or use-time in your app or game, if you are using
    an ad-supported system. This will result in more income. If you are selling a
    paid app, users will feel they have gotten more for their money.

    - Humans like to compete, so encourage your users to do what they enjoy. Multiplayer
    might not be for everyone, but for many, it is all they are interested in when
    shopping for a new game.

    - Multiplayer can also open the door for additional in-app purchases over time,
    which will increase revenue and profitability.


    > **Tip:** Whenever possible, also provide your users with a single-player option
    for your game, as there is still a noticeable user base that prefers single-player
    campaigns. In addition, some players may not have an Internet connection available
    at all times.'
