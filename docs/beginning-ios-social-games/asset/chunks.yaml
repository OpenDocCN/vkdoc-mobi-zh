    \ selected your app from within iTunes Connect, you will see a view similar to\
    \ Figure [1-5](#A978-1-4302-4906-1_1_Chapter.html#Fig5). In the upper-right area\
    \ of the app screen, you will notice a Manage Game Center button.\n\nIf you are\
    \ familiar with configuring iAds or In App Purchase in previous iOS apps, this\
    \ area will seem very familiar to you. The process for configuring iAds and IAP\
    \ is similar to working with Game Center.\n\nWhen entering the Game Center portal\
    \ for your app for the first time, you will be asked if you want to enable Game\
    \ Center, as shown in Figure [1-5](#A978-1-4302-4906-1_1_Chapter.html#Fig5). Once\
    \ it is enabled, you will be given an option to add a new leaderboard or achievement.\
    \ We will focus on these options more in later chapters (Chapter 3 covers leaderboards,\
    \ and [Chapter 4](#A978-1-4302-4906-1_4_Chapter.html) covers achievements). For\
    \ now, all we need to do is ensure that Game Center is enabled for our app.\n\n\
    ![A978-1-4302-4906-1_1_Fig5_HTML.jpg](A978-1-4302-4906-1_1_Fig5_HTML.jpg)\n\n\
    Figure 1-5.\n\nThe first view of the Game Center portal for a new app Tip\n\n\
    If you are having difficulty getting your app to acknowledge Game Center, the\
    \ most likely culprit is one of two common issues. Make sure your app is using\
    \ the same bundle ID that is shown in the App Info page (see Figure [1-6](#A978-1-4302-4906-1_1_Chapter.html#Fig6)).\
    \ The second issue may be that you have not let enough time pass. There can be\
    \ up to a 30-minute delay between making changes in iTunes Connect to Game Center\
    \ and having the iOS app notice those changes.\n\n![A978-1-4302-4906-1_1_Fig6_HTML.jpg](A978-1-4302-4906-1_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6.\n\nAn app-specific view, as seen in iTunes Connect. You can see\
    \ the Manage Game Center button in the upper right of the image\n\n## Summary\n\
    \nYou should now have a basic understanding of what Game Kit and Game Center have\
    \ to offer, as well as an in-depth understanding of the sample project you will\
    \ be working with throughout this book. Additionally, you should now be comfortable\
    \ setting up a new app in iTunes Connect for use with Game Center.\n\nIn the upcoming\
    \ chapters, you will learn how to incorporate all the functionality of Game Center,\
    \ Game Kit, and other social features into an iOS app. The iOS-based device families\
    \ are just starting to emerge from infancy, and Game Center is the first next-generation\
    \ API that has been made available for developers. These new technologies are\
    \ a glimpse at what the future holds for iOS developers. In the next chapter,\
    \ you will learn how to get Game Center incorporated into a project.\n\n# 2. Game\
    \ Center: Setting Up and Getting Started\n\nAbstract\n\nLike many of Apple’s integrated\
    \ technologies (iCloud, Push Notifications, Passbook), Game Center requires some\
    \ standard overhead before you can really begin to use it. Game Center is a large\
    \ and diverse technology that easily adds very complex functionality into your\
    \ social app. Once you have accomplished these basic steps it will be safe to\
    \ jump to any Game Center chapter and implement functionality specific to your\
    \ app.\n\nLike many of Apple’s integrated technologies (iCloud, Push Notifications,\
    \ Passbook), Game Center requires some standard overhead before you can really\
    \ begin to use it. Game Center is a large and diverse technology that easily adds\
    \ very complex functionality into your social app. Once you have accomplished\
    \ these basic steps it will be safe to jump to any Game Center chapter and implement\
    \ functionality specific to your app.\n\nIn [Chapter 1](#A978-1-4302-4906-1_1_Chapter.html),\
    \ you learned how to configure Game Center in iTunes Connect and began working\
    \ with the sample project, UFOs. In this chapter, we will discuss integrating\
    \ Game Center into our app, and get our hands dirty with some Game Center specific\
    \ code.\n\nYou will learn how to detect Game Center compatibility, explore the\
    \ limitations of the sandbox, authenticate a local player, work with sessions,\
    \ and retrieve a friends list. You will also create the `GameCenterManager` class\
    \ that we will be working with throughout the remanding Game Kit chapters.\n\n\
    ## Testing for Game Center\n\nBefore any Game Center–specific code can be called,\
    \ we need to perform a test to verify that the user has a version of iOS that\
    \ supports Game Center. The first thing we need to do to perform this check is\
    \ to create our new `GameCenterManager` class. We will use this class throughout\
    \ the remainder of this book to keep our Game Center functionality in one easy-to-access\
    \ class. This class will house all of our Game Center–specific code and callbacks,\
    \ and it can be easily shared across all of your apps. Most modern apps will be\
    \ targeting iOS 5 and higher and a Game Center check does not need to be performed,\
    \ however if your app is still targetting iOS 4 you should verfiy Game Center\
    \ is installed.\n\nFirst, create a new file in Xcode. You will want to select\
    \ the Objective-C class from the available templates. Make sure that you also\
    \ select `NSObject` from the Subclass Of pull-down menu. Name the new class `GameCenterManager`,\
    \ as shown in Figure [2-1](#A978-1-4302-4906-1_2_Chapter.html#Fig1).\n\n![A978-1-4302-4906-1_2_Fig1_HTML.jpg](A978-1-4302-4906-1_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1.\n\nCreating the `GameCenterManager` class\n\nAdd the following method\
    \ to your `GameCenterManager` class:\n\n```\n+ (BOOL) isGameCenterAvailable\n\n\
    {\n\n        Class gcClass = (NSClassFromString(@\"GKLocalPlayer\"));\n\n    \
    \    NSString *reqSysVer = @\"4.1\";\n\n        NSString *currSysVer = [[UIDevice\
    \ currentDevice] systemVersion];\n\nBOOL osVersionSupported = ([currSysVer compare:reqSysVer\
    \ options:NSNumericSearch] != NSOrderedAscending);\n\n        return (gcClass\
    \ && osVersionSupported);\n\n}\n```\n\nThis method creates a new class object\
    \ using the `NSClassFromString` function. If `GKLocalPlayer` exists in the API,\
    \ `gcClass` will not be nil. We also test against a minimum OS version. Since\
    \ many of the Game Center classes were included in the API prior to availability,\
    \ we need to perform two checks. The next three lines of code compare the current\
    \ iOS version to a version string we set at 4.1. The method returns the results,\
    \ which will be true if the device is set up to support Game Center.\n\nNote\n\
    \nYou always want to make every effort available to allow users to interact with\
    \ your app, regardless of whether they have a Game Center–enabled device. If a\
    \ user does not have a Game Center–enabled device, you still want to make sure\
    \ they are able to interact with the nonsocial features of your app.\n\nTip\n\n\
    If you do want to limit your app to users who have Game Center–enabled devices,\
    \ add a new key to your `info.plist` file called `UIRequiredDeviceCapabilities`.\
    \ Then, set the value for that key to “gamekit.” This will limit your app in the\
    \ App Store to be purchased only by people who have Game Center–enabled devices.\n\
    \nYou can now modify the `UFOViewController.m` file to perform the Game Center\
    \ availability check. Create a new `viewDidLoad` method, as shown in this code\
    \ snippet:\n\n```\n- (void)viewDidLoad\n\n{\n\n        [super viewDidLoad];\n\n\
    \        if ([GameCenterManager isGameCenterAvailable]) {\n\n                NSLog(@\"\
    Game Center is available\");\n\n        } else {\n\n                NSLog(@\"\
    Game Center not available\");\n\n        }\n\n}\n```\n\nCaution\n\nIf you notice\
    \ that the `isGameCenterAvailable` method is always returning NO even when Game\
    \ Center should be available, the most likely culprit is forgetting to include\
    \ `GameKit.framework` in your target.\n\nAt this point, all the code will do is\
    \ print whether Game Center is available to the console. We will be expanding\
    \ on this code in the next section."
  raw: '### Configuring Game Center in iTunes Connect


    Once you have created and selected your app from within iTunes Connect, you will
    see a view similar to Figure [1-5](#A978-1-4302-4906-1_1_Chapter.html#Fig5). In
    the upper-right area of the app screen, you will notice a Manage Game Center button.


    If you are familiar with configuring iAds or In App Purchase in previous iOS apps,
    this area will seem very familiar to you. The process for configuring iAds and
    IAP is similar to working with Game Center.


    When entering the Game Center portal for your app for the first time, you will
    be asked if you want to enable Game Center, as shown in Figure [1-5](#A978-1-4302-4906-1_1_Chapter.html#Fig5).
    Once it is enabled, you will be given an option to add a new leaderboard or achievement.
    We will focus on these options more in later chapters (Chapter 3 covers leaderboards,
    and [Chapter 4](#A978-1-4302-4906-1_4_Chapter.html) covers achievements). For
    now, all we need to do is ensure that Game Center is enabled for our app.


    ![A978-1-4302-4906-1_1_Fig5_HTML.jpg](A978-1-4302-4906-1_1_Fig5_HTML.jpg)


    Figure 1-5.


    The first view of the Game Center portal for a new app Tip


    If you are having difficulty getting your app to acknowledge Game Center, the
    most likely culprit is one of two common issues. Make sure your app is using the
    same bundle ID that is shown in the App Info page (see Figure [1-6](#A978-1-4302-4906-1_1_Chapter.html#Fig6)).
    The second issue may be that you have not let enough time pass. There can be up
    to a 30-minute delay between making changes in iTunes Connect to Game Center and
    having the iOS app notice those changes.


    ![A978-1-4302-4906-1_1_Fig6_HTML.jpg](A978-1-4302-4906-1_1_Fig6_HTML.jpg)


    Figure 1-6.


    An app-specific view, as seen in iTunes Connect. You can see the Manage Game Center
    button in the upper right of the image


    ## Summary


    You should now have a basic understanding of what Game Kit and Game Center have
    to offer, as well as an in-depth understanding of the sample project you will
    be working with throughout this book. Additionally, you should now be comfortable
    setting up a new app in iTunes Connect for use with Game Center.


    In the upcoming chapters, you will learn how to incorporate all the functionality
    of Game Center, Game Kit, and other social features into an iOS app. The iOS-based
    device families are just starting to emerge from infancy, and Game Center is the
    first next-generation API that has been made available for developers. These new
    technologies are a glimpse at what the future holds for iOS developers. In the
    next chapter, you will learn how to get Game Center incorporated into a project.


    # 2. Game Center: Setting Up and Getting Started


    Abstract


    Like many of Apple’s integrated technologies (iCloud, Push Notifications, Passbook),
    Game Center requires some standard overhead before you can really begin to use
    it. Game Center is a large and diverse technology that easily adds very complex
    functionality into your social app. Once you have accomplished these basic steps
    it will be safe to jump to any Game Center chapter and implement functionality
    specific to your app.


    Like many of Apple’s integrated technologies (iCloud, Push Notifications, Passbook),
    Game Center requires some standard overhead before you can really begin to use
    it. Game Center is a large and diverse technology that easily adds very complex
    functionality into your social app. Once you have accomplished these basic steps
    it will be safe to jump to any Game Center chapter and implement functionality
    specific to your app.


    In [Chapter 1](#A978-1-4302-4906-1_1_Chapter.html), you learned how to configure
    Game Center in iTunes Connect and began working with the sample project, UFOs.
    In this chapter, we will discuss integrating Game Center into our app, and get
    our hands dirty with some Game Center specific code.


    You will learn how to detect Game Center compatibility, explore the limitations
    of the sandbox, authenticate a local player, work with sessions, and retrieve
    a friends list. You will also create the `GameCenterManager` class that we will
    be working with throughout the remanding Game Kit chapters.


    ## Testing for Game Center


    Before any Game Center–specific code can be called, we need to perform a test
    to verify that the user has a version of iOS that supports Game Center. The first
    thing we need to do to perform this check is to create our new `GameCenterManager`
    class. We will use this class throughout the remainder of this book to keep our
    Game Center functionality in one easy-to-access class. This class will house all
    of our Game Center–specific code and callbacks, and it can be easily shared across
    all of your apps. Most modern apps will be targeting iOS 5 and higher and a Game
    Center check does not need to be performed, however if your app is still targetting
    iOS 4 you should verfiy Game Center is installed.


    First, create a new file in Xcode. You will want to select the Objective-C class
    from the available templates. Make sure that you also select NSObject from the
    Subclass Of pull-down menu. Name the new class `GameCenterManager`, as shown in
    Figure [2-1](#A978-1-4302-4906-1_2_Chapter.html#Fig1).


    ![A978-1-4302-4906-1_2_Fig1_HTML.jpg](A978-1-4302-4906-1_2_Fig1_HTML.jpg)


    Figure 2-1.


    Creating the GameCenterManager class


    Add the following method to your `GameCenterManager` class:


    `+ (BOOL) isGameCenterAvailable`


    `{`


            `Class gcClass = (NSClassFromString(@"GKLocalPlayer"));`


            `NSString *reqSysVer = @"4.1";`


            `NSString *currSysVer = [[UIDevice currentDevice] systemVersion];`


    `BOOL osVersionSupported = ([currSysVer compare:reqSysVer options:NSNumericSearch]
    !=`É


     `NSOrderedAscending);`


            `return (gcClass && osVersionSupported);`


    `}`


    This method creates a new class object using the `NSClassFromString` function.
    If `GKLocalPlayer` exists in the API, `gcClass` will not be nil. We also test
    against a minimum OS version. Since many of the Game Center classes were included
    in the API prior to availability, we need to perform two checks. The next three
    lines of code compare the current iOS version to a version string we set at 4.1\.
    The method returns the results, which will be true if the device is set up to
    support Game Center.


    Note


    You always want to make every effort available to allow users to interact with
    your app, regardless of whether they have a Game Center–enabled device. If a user
    does not have a Game Center–enabled device, you still want to make sure they are
    able to interact with the nonsocial features of your app.


    Tip


    If you do want to limit your app to users who have Game Center–enabled devices,
    add a new key to your `info.plist` file called `UIRequiredDeviceCapabilities`.
    Then, set the value for that key to “gamekit.” This will limit your app in the
    App Store to be purchased only by people who have Game Center–enabled devices.


    You can now modify the `UFOViewController.m` file to perform the Game Center availability
    check. Create a new `viewDidLoad` method, as shown in this code snippet:


    `- (void)viewDidLoad`


    `{`


            `[super viewDidLoad];`


            `if ([GameCenterManager isGameCenterAvailable]) {`


                    `NSLog(@"Game Center is available");`


            `} else {`


                    `NSLog(@"Game Center not available");`


            `}`


    `}`


    Caution


    If you notice that the `isGameCenterAvailable` method is always returning NO even
    when Game Center should be available, the most likely culprit is forgetting to
    include `GameKit.framework` in your target.


    At this point, all the code will do is print whether Game Center is available
    to the console. We will be expanding on this code in the next section.'
  trans: "\n### 在 iTunes Connect 中配置 Game Center\n\n在 iTunes Connect 中创建并选中你的应用后，你会看到一个类似图\
    \ 1-5 的界面。在该界面的右上角区域，你会看到一个“管理 Game Center”按钮。\n\n如果你之前曾在 iOS 应用中配置过 iAd 或 App\
    \ 内购买，那么对这个界面会感到非常熟悉。配置 iAd 和 IAP 的过程与操作 Game Center 类似。\n\n当首次进入应用的 Game Center\
    \ 门户时，系统会询问你是否要启用 Game Center，如图 1-5 所示。启用后，你将看到添加新排行榜或成就的选项。我们将在后续章节中重点介绍这些选项（第\
    \ 3 章介绍排行榜，第 4 章介绍成就）。眼下，我们只需确保为应用启用 Game Center。\n\n![A978-1-4302-4906-1_1_Fig5_HTML.jpg](img/A978-1-4302-4906-1_1_Fig5_HTML.jpg)\n\
    \n图 1-5. 新应用 Game Center 门户的初始视图  \n提示  \n如果应用无法识别 Game Center，最常见的原因可能出自以下两个问题之一。请确保你的应用使用的是“App\
    \ 信息”页面中显示的相同包 ID（见图 1-6）。第二个问题可能是等待时间不够。在 iTunes Connect 中对 Game Center 所做的更改，iOS\
    \ 应用可能需要最多 30 分钟才能感知到。\n\n![A978-1-4302-4906-1_1_Fig6_HTML.jpg](img/A978-1-4302-4906-1_1_Fig6_HTML.jpg)\n\
    \n图 1-6. 在 iTunes Connect 中看到的应用专属视图。你可以在该图右上角看到“管理 Game Center”按钮\n\n## 总结\n\n\
    现在，你应该对 Game Kit 和 Game Center 所提供的功能有了基本了解，同时对本书中你将使用的示例项目也有了深入认识。此外，你现在应该能够轻松地在\
    \ iTunes Connect 中为 Game Center 设置新应用。\n\n在接下来的章节中，你将学习如何将 Game Center、Game Kit\
    \ 以及其他社交功能的全部能力集成到 iOS 应用中。基于 iOS 的设备系列才刚刚起步，而 Game Center 是第一个面向开发者提供的下一代 API。这些新技术让我们得以一窥\
    \ iOS 开发者的未来。在下一章中，你将学习如何将 Game Center 集成到一个项目中。\n\n# 2. Game Center：设置与入门\n\n\
    摘要  \n与苹果的许多集成技术（iCloud、推送通知、Passbook）类似，在使用 Game Center 之前，需要先完成一些标准的准备工作。Game\
    \ Center 是一项庞大且多样化的技术，能够轻松为你的社交应用添加非常复杂的功能。完成这些基本步骤后，你就可以放心地跳转到任何 Game Center\
    \ 章节，实现特定于你应用的功能。\n\n与苹果的许多集成技术（iCloud、推送通知、Passbook）类似，在使用 Game Center 之前，需要先完成一些标准的准备工作。Game\
    \ Center 是一项庞大且多样化的技术，能够轻松为你的社交应用添加非常复杂的功能。完成这些基本步骤后，你就可以放心地跳转到任何 Game Center\
    \ 章节，实现特定于你应用的功能。\n\n在第 1 章中，你学习了如何在 iTunes Connect 中配置 Game Center，并开始使用示例项目\
    \ UFOs。在本章中，我们将讨论如何将 Game Center 集成到我们的应用中，并深入编写一些 Game Center 专属代码。\n\n你将学习如何检测\
    \ Game Center 兼容性，探索沙盒的限制，验证本地玩家身份，处理会话，以及获取好友列表。你还将创建 `GameCenterManager` 类，在后续的\
    \ Game Kit 章节中我们将一直使用这个类。\n\n## 测试 Game Center\n\n在调用任何 Game Center 专属代码之前，我们需要进行一项测试，以验证用户使用的\
    \ iOS 版本是否支持 Game Center。执行此项检查的第一步是创建新的 `GameCenterManager` 类。在本书的剩余部分，我们将使用这个类来将\
    \ Game Center 功能集中在一个易于访问的类中。这个类将包含所有 Game Center 专属代码和回调，并且可以轻松地在你的所有应用中共享。大多数现代应用的目标系统是\
    \ iOS 5 及以上版本，因此无需进行 Game Center 检查；但如果你的应用仍针对 iOS 4，则应验证 Game Center 是否已安装。\n\
    \n首先，在 Xcode 中创建一个新文件。你需要从可用模板中选择 **Objective-C class**。确保从 **Subclass Of** 下拉菜单中选择\
    \ `NSObject`。将新类命名为 `GameCenterManager`，如图 2-1 所示。\n\n![A978-1-4302-4906-1_2_Fig1_HTML.jpg](img/A978-1-4302-4906-1_2_Fig1_HTML.jpg)\n\
    \n图 2-1. 创建 `GameCenterManager` 类\n\n向你的 `GameCenterManager` 类中添加以下方法：\n\n```\n\
    + (BOOL) isGameCenterAvailable\n\n{\n\n        Class gcClass = (NSClassFromString(@\"\
    GKLocalPlayer\"));\n\n        NSString *reqSysVer = @\"4.1\";\n\n        NSString\
    \ *currSysVer = [[UIDevice currentDevice] systemVersion];\n\nBOOL osVersionSupported\
    \ = ([currSysVer compare:reqSysVer options:NSNumericSearch] != NSOrderedAscending);\n\
    \n        return (gcClass && osVersionSupported);\n\n}\n```\n\n此方法使用 `NSClassFromString`\
    \ 函数创建一个新的类对象。如果 API 中存在 `GKLocalPlayer`，则 `gcClass` 不会为 nil。我们还针对最低操作系统版本进行了测试。由于许多\
    \ Game Center 类在功能可用之前就已包含在 API 中，因此我们需要执行两项检查。接下来的三行代码将当前 iOS 版本与我们设置为 4.1 的版本字符串进行比较。该方法返回结果，如果设备已准备好支持\
    \ Game Center，则结果为 true。\n\n注意  \n无论用户是否拥有支持 Game Center 的设备，你始终应尽一切努力让用户能够与你的应用交互。如果用户没有支持\
    \ Game Center 的设备，你仍需确保他们能够使用你应用中非社交功能的部分。\n\n提示  \n如果你确实希望将应用限制为仅支持支持 Game Center\
    \ 设备的用户使用，请在 `info.plist` 文件中添加一个名为 `UIRequiredDeviceCapabilities` 的新键。然后，将该键的值设置为\
    \ `\"gamekit\"`。这将使你的应用在 App Store 中仅限拥有支持 Game Center 设备的用户购买。\n\n现在，你可以修改 `UFOViewController.m`\
    \ 文件，以执行 Game Center 可用性检查。创建一个新的 `viewDidLoad` 方法，如以下代码片段所示：\n\n```\n- (void)viewDidLoad\n\
    \n{\n\n        [super viewDidLoad];\n\n        if ([GameCenterManager isGameCenterAvailable])\
    \ {\n\n                NSLog(@\"Game Center is available\");\n\n        } else\
    \ {\n\n                NSLog(@\"Game Center not available\");\n\n        }\n\n\
    }\n```\n\n注意  \n如果你发现即使 Game Center 应可用，`isGameCenterAvailable` 方法也总是返回 NO，那么最常见的原因是在你的目标设置中忘记包含\
    \ `GameKit.framework`。\n\n目前，所有代码所做的只是在控制台输出 Game Center 是否可用。我们将在下一节中扩展此代码。\n"
- fmt: "## Authenticating with Game Center\n\nOnce your app has determined whether\
    \ the device is Game Center–capable, you can authenticate the user. The user who\
    \ is authenticated with Game Center will always be referred to as the local player\
    \ and will be represented by the class `GKLocalPlayer`. Before any other Game\
    \ Center functionality can be used, you must first authenticate a local player.\n\
    \nApple recommends that you authenticate with Game Center as early as possible\
    \ in your app. The primary reason to authenticate before the user needs to access\
    \ any Game Center behavior is to ensure that the user is not waiting for the network\
    \ callbacks to authenticate them at a time when they want to perform a Game Center\
    \ action. In addition, if you are working with Game Center invitations, you will\
    \ need to authenticate before you can process that launch event. Early authentication\
    \ also makes sure that the user is not prompted for a login in the middle of gameplay.\
    \ There are additional benefits that we will explore in upcoming chapters, such\
    \ as the ability to resubmit high scores that failed to submit earlier.\n\n###\
    \ Modifying the GameCenterManager Class\n\nBefore we can add in code to authenticate\
    \ with Game Center, we first need to set up some overhead calls to begin working\
    \ with the `GameCenterManager` class. `GameCenterManager` will be a reusable class\
    \ that adds numerous convenience methods to interact with Game Center; it is designed\
    \ to be easily dropped into any future project. Game Center–related code will\
    \ all be piped through the `GameCenterManager` class, making it easy to use it\
    \ throughout your app. The first step in setting up this reusable class is to\
    \ create the delegate callback system.\n\n**Note**\n\nBlocks can be slightly confusing\
    \ if you have never worked with them before. Game Center relies heavily on blocks,\
    \ and you will be seeing a lot of them throughout this book.\n\nThe best way to\
    \ approach blocks, in my experience, has been to view them as inline functions\
    \ that are executed upon completion of the method that calls them. In the preceding\
    \ example, after `authenticateWithCompletionHandler` finishes executing, it calls\n\
    \n`[self callDelegateOnMainThread: @selector(processGameCenterAuth:) withArg:\
    \ NULL error: error]`\n\nIt helps to have a solid background on blocks before\
    \ proceeding. If you feel unsure about the use of blocks, I recommend you read\
    \ the Apple Developer Connection article located at [http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html).\n\
    \nYou will need to add the following methods to `GameKitManager.m`. After you\
    \ have added them, we will discuss what their exact functions are.\n\n```\n- (void)\
    \ callDelegateOnMainThread: (SEL) selector withArg: (id) arg error: (NSError*)\
    \ err\n{\n    dispatch_async(dispatch_get_main_queue(), ^(void) {\n        [self\
    \ callDelegate: selector withArg: arg error: err];\n    });\n}\n```\n\nAll of\
    \ our delegate callbacks need to be performed on the main thread; Game Center\
    \ does not guarantee that the callback blocks will be executed on the main thread,\
    \ and they may be run from a background thread if not forced onto the main thread.\
    \ Since UIKit View Controllers can be safely accessed only on the main thread,\
    \ calling a delegate on a background thread can cause crashes and other unexpected\
    \ behavior. To avoid creating any threading-related bugs (which can be very hard\
    \ to track down and fix), we will call all of the delegate methods on the main\
    \ thread.\n\n**Note**\n\nThere are many different ways to force code to execute\
    \ on the main thread or to otherwise ensure thread safety. For our purposes, we\
    \ will use the preceding method. It will be easiest to comprehend for readers\
    \ who have less experience with threading on the iOS platform.\n\nThe following\
    \ method is called from within the `callDelegateOnMainThread` method after we\
    \ ensure that we are operating on the main app thread. This method checks to make\
    \ sure we are on the main thread and then calls our protocol method with the passed\
    \ information.\n\n```\n- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*)err\n\
    {\n    assert([NSThread isMainThread]);\n    if ([delegate respondsToSelector:\
    \ selector]) {\n        if (arg != NULL) {\n            [delegate performSelector:\
    \ selector withObject:arg withObject: err];\n        } else {\n            [delegate\
    \ performSelector: selector withObject: err];\n        }\n    } else {\n     \
    \   NSLog(@\"Missed Method\");\n    }\n}\n```\n\nIf you have not implemented the\
    \ delegate method, you will see an `NSLog` in the console for \"Missed Method.\"\
    \ This is provided solely to assist in debugging, and will save you some head-scratching\
    \ in trying to debug the protocol methods.\n\nThe last thing that we need to do\
    \ in our `GameCenterManager` class is to add the delegate property. Modify the\
    \ relevant parts of the header file to look like the following code:\n\n```\n\
    @interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n```\n\nIn addition\
    \ to these modifications, you also need to synthesize the delegate as well as\
    \ release it in deallocation. The `GameCenterManager` delegate will be set by\
    \ the class calling Game Center functions in order to get feedback about those\
    \ calls. This completes the required changes to the `GameCenterManager` class."
  raw: '## Authenticating with Game Center


    Once your app has determined whether the device is Game Center–capable, you can
    authenticate the user. The user who is authenticated with Game Center will always
    be referred to as the local player and will be represented by the class `GKLocalPlayer`.
    Before any other Game Center functionality can be used, you must first authenticate
    a local player.


    Apple recommends that you authenticate with Game Center as early as possible in
    your app. The primary reason to authenticate before the user needs to access any
    Game Center behavior is to ensure that the user is not waiting for the network
    callbacks to authenticate them at a time when they want to perform a Game Center
    action. In addition, if you are working with Game Center invitations, you will
    need to authenticate before you can process that launch event. Early authentication
    also makes sure that the user is not prompted for a login in the middle of gameplay.
    There are additional benefits that we will explore in upcoming chapters, such
    as the ability to resubmit high scores that failed to submit earlier.


    ### Modifying the GameCenterManager Class


    Before we can add in code to authenticate with Game Center, we first need to set
    up some overhead calls to begin working with the `GameCenterManager` class. `GameCenterManager`
    will be a reusable class that adds numerous convenience methods to interact with
    Game Center; it is designed to be easily dropped into any future project. Game
    Center–related code will all be piped through the `GameCenterManager` class, making
    it easy to use it throughout your app. The first step in setting up this reusable
    class is to create the delegate callback system.


    Note


    Blocks can be slightly confusing if you have never worked with them before. Game
    Center relies heavily on blocks, and you will be seeing a lot of them throughout
    this book.


    The best way to approach blocks, in my experience, has been to view them as inline
    functions that are executed upon completion of the method that calls them. In
    the preceding example, after `authenticateWithCompletionHandler` finishes executing,
    it calls


    `[self callDelegateOnMainThread: @selector(processGameCenterAuth:) withArg: NULL
    error: error];`


    It helps to have a solid background on blocks before proceeding. If you feel unsure
    about the use of blocks, I recommend you read the Apple Developer Connection article
    located at [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html)
    .


    You will need to add the following methods to `GameKitManager.m`. After you have
    added them, we will discuss what their exact functions are.


    `- (void) callDelegateOnMainThread: (SEL) selector withArg: (id) arg error:`É


    `(NSError*) err`


    `{`


    `dispatch_async(dispatch_get_main_queue(), ^(void) {`


    `[self callDelegate: selector withArg: arg error: err];`


    `});`


    `}`


    All of our delegate callbacks need to be performed on the main thread; Game Center
    does not guarantee that the callback blocks will be executed on the main thread,
    and they may be run from a background thread if not forced onto the main thread.
    Since UIKit View Controllers can be safely accessed only on the main thread, calling
    a delegate on a background thread can cause crashes and other unexpected behavior.
    To avoid creating any threading-related bugs (which can be very hard to track
    down and fix), we will call all of the delegate methods on the main thread.


    Note


    There are many different ways to force code to execute on the main thread or to
    otherwise ensure thread safety. For our purposes, we will use the preceding method.
    It will be easiest to comprehend for readers who have less experience with threading
    on the iOS platform.


    The following method is called from within the `callDelegateOnMathThread` method
    after we ensure that we are operating on the main app thread. This method checks
    to make sure we are on the main thread and then calls our protocol method with
    the passed information.


    `- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*)err`


    `{`


    `assert([NSThread isMainThread]);`


    `if ([delegate respondsToSelector: selector]) {`


    `if (arg != NULL) {`


    `[delegate performSelector: selector withObject:arg withObject: err];`


    `} else {`


    `[delegate performSelector: selector withObject: err];`


    `}`


    `} else {`


    `NSLog(@"Missed Method");`


    `}`


    `}`


    If you have not implemented the delegate method, you will see an NSLog in the
    console for “Missed Method.” This is provided solely to assist in debugging, and
    will save you some head-scratching in trying to debug the protocol methods.


    The last thing that we need to do in our `GameCenterManager` class is to add the
    delegate property. Modify the relevant parts of the header file to look like the
    following code:


    `@interface GameCenterManager : NSObject <GameCenterManagerDelegate>`


    `@property(nonatomic, retain) id <GameCenterManagerDelegate, NSObject> delegate;`


    In addition to these modifications, you also need to synthesize the delegate as
    well as release it in deallocation. The `GameCenterManager` delegate will be set
    by the class calling Game Center functions in order to get feedback about those
    calls. This completes the required changes to the `GameCenterManager` class.'
  trans: "\n## 使用 Game Center 进行身份验证\n\n当你的应用确认设备支持 Game Center 后，即可对用户进行身份验证。通过 Game\
    \ Center 完成身份验证的用户始终被称为本地玩家，并由 `GKLocalPlayer` 类表示。在使用任何其他 Game Center 功能之前，你必须首先验证本地玩家的身份。\n\
    \nApple 建议你在应用中尽早进行 Game Center 身份验证。在用户需要访问任何 Game Center 行为之前完成身份验证的主要原因是，确保用户在他们想要执行\
    \ Game Center 操作时，无需等待网络回调来完成身份验证。此外，如果你正在处理 Game Center 邀请，则需要在处理启动事件之前完成身份验证。尽早进行身份验证还能确保用户在游戏过程中不会被要求登录。在后续章节中，我们还将探讨其他好处，例如能够重新提交之前提交失败的高分。\n\
    \n### 修改 GameCenterManager 类\n\n在添加用于 Game Center 身份验证的代码之前，我们首先需要设置一些前置调用，以便开始使用\
    \ `GameCenterManager` 类。`GameCenterManager` 将是一个可复用的类，它为与 Game Center 交互添加了大量便捷方法；它的设计使其可以轻松地集成到任何未来的项目中。所有与\
    \ Game Center 相关的代码都将通过 `GameCenterManager` 类路由，这使得在整个应用中轻松使用它成为可能。设置这个可复用类的第一步是创建委托回调系统。\n\
    \n**注意**\n\n如果你之前没有接触过代码块（Blocks），它们可能会让你感到有些困惑。Game Center 高度依赖代码块，你将在本书中大量看到它们的使用。\n\
    \n根据我的经验，理解代码块的最佳方式是将它们视为内联函数，这些函数在调用它们的方法执行完成后被触发。在前面的示例中，当 `authenticateWithCompletionHandler`\
    \ 执行完毕后，它会调用\n\n`[self callDelegateOnMainThread: @selector(processGameCenterAuth:)\
    \ withArg: NULL error: error]`\n\n在继续之前，对代码块有扎实的掌握会很有帮助。如果你对代码块的使用感到不确定，我建议你阅读\
    \ Apple Developer Connection 上位于 [`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html)\
    \ 的文章。\n\n你需要将以下方法添加到 `GameKitManager.m` 中。添加完成后，我们将讨论它们的确切功能。\n\n```\n- (void)\
    \ callDelegateOnMainThread: (SEL) selector withArg: (id) arg error: (NSError*)\
    \ err\n{\n    dispatch_async(dispatch_get_main_queue(), ^(void) {\n        [self\
    \ callDelegate: selector withArg: arg error: err];\n    });\n}\n```\n\n我们所有的委托回调都必须在主线程上执行；Game\
    \ Center 并不保证回调代码块会在主线程上执行，如果不强制在主线程上运行，它们可能会在后台线程上执行。由于 UIKit 视图控制器只能在主线程上安全访问，因此在后台线程上调用委托可能会导致崩溃和其他意外行为。为了避免产生任何与线程相关的错误（这些错误可能非常难以追踪和修复），我们将在主线程上调用所有委托方法。\n\
    \n**注意**\n\n有许多不同的方法可以强制代码在主线程上执行或以其他方式确保线程安全。出于我们的目的，我们将使用上述方法。这对于 iOS 平台上线程经验较少的读者来说最容易理解。\n\
    \n下面的方法在确保我们在主应用线程上操作后，从 `callDelegateOnMainThread` 方法内部调用。此方法检查以确保我们在主线程上，然后使用传递的信息调用我们的协议方法。\n\
    \n```\n- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*)err\n\
    {\n    assert([NSThread isMainThread]);\n    if ([delegate respondsToSelector:\
    \ selector]) {\n        if (arg != NULL) {\n            [delegate performSelector:\
    \ selector withObject:arg withObject: err];\n        } else {\n            [delegate\
    \ performSelector: selector withObject: err];\n        }\n    } else {\n     \
    \   NSLog(@\"Missed Method\");\n    }\n}\n```\n\n如果你没有实现委托方法，你将在控制台中看到一条 \"Missed\
    \ Method\" 的 `NSLog` 消息。这仅仅是为了协助调试而提供的，可以为你节省一些在调试协议方法时绞尽脑汁的时间。\n\n在 `GameCenterManager`\
    \ 类中我们需要做的最后一件事情是添加委托属性。修改头文件的相关部分，使其看起来像以下代码：\n\n```\n@interface GameCenterManager\
    \ : NSObject <GameCenterManagerDelegate>\n@property(nonatomic, retain) id <GameCenterManagerDelegate,\
    \ NSObject> delegate;\n```\n\n除了这些修改之外，你还需要合成委托，并在 `deallocation` 中释放它。`GameCenterManager`\
    \ 委托将由调用 Game Center 函数的类来设置，以便获取关于这些调用的反馈。这样就完成了对 `GameCenterManager` 类所需的修改。\n"
- fmt: "# Authenticating on iOS 6 and iOS 7\n\niOS 6 brought with it a new method\
    \ of authentication, which streamlines the process of logging into Game Center.\
    \ If your app is using iOS 6 or newer the following method is more efficient;\
    \ however, if you need to authenticate on iOS 5 or even iOS 4 devices see the\
    \ next section, \"Authenticating Prior to iOS 6.\" Take a look at the following\
    \ method in its completeness:\n\n```\n- (void)authenticateLocalUserModern\n{\n\
    \  if ([[GKLocalPlayer localPlayer] authenticateHandler] == nil) {\n    [[GKLocalPlayer\
    \ localPlayer] setAuthenticateHandler:^(UIViewController *viewController, NSError\
    \ *error) {\n      if (error != nil) {\n        if ([error code] == GKErrorNotSupported)\
    \ {\n          UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error\"\
    \ message:@\"This device does not support Game Center\" delegate:nil cancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles:nil];\n          [alert show];\n          [alert release];\n\
    \        } else if ([error code] == GKErrorCancelled) {\n          UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Error\" message:@\"This device\
    \ has failed login too many times from the app, you will need tologin from the\
    \ Game Center.app\" delegate:nil cancelButtonTitle:@\"Dismiss\" otherButtonTitles:nil];\n\
    \          [alert show];\n          [alert release];\n        } else {\n     \
    \     UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error\" message:[error\
    \ localizedDescription] delegate:nil cancelButtonTitle:@\"Dismiss\" otherButtonTitles:nil];\n\
    \          [alert show];\n          [alert release];\n        }\n      } else\
    \ {\n        if (viewController != nil) {\n          [(UIViewController *)delegate\
    \ presentViewController:viewController animated:YES completion:NULL];\n      \
    \  }\n      }\n    }];\n  } else {\n    [[GKLocalPlayer localPlayer] authenticate];\n\
    \  }\n}\n```\n\niOS 6 brought a new property to `GKLocalPlayer`, the `authenticateHandler`.\
    \ In essence, this is a block that monitors for login errors and in certain cases\
    \ will display a `UIViewController` to the user. The first step is to make sure\
    \ that we have not set the `authenticateHandler` previously. If we have, a call\
    \ to `authenticate` will complete the login as seen in the `else` statement at\
    \ the bottom of the method. After it has been determined that an `authenticateHandler`\
    \ hasn't been set, one is set for the `GKLocalPlayer` singleton. The act of setting\
    \ an `authenticateHandler` will also prompt the user to log in to Game Center.\n\
    \nThe next three `if` statements (for `GKErrorNotSupported`, `GKErrorCancelled`,\
    \ and all other errors) all handle various types of errors that may be encountered\
    \ during authentication. The first error covered is simply that Game Center isn't\
    \ supported on the user's device for any reason. The next `if` statement handles\
    \ the tricky case of too many failed logins. This is a problem rarely seen by\
    \ users but often encountered by developers. The last error check handles any\
    \ additional errors and displays them to the user.\n\nIf no errors are encountered,\
    \ Game Center has successfully authenticated. However, if Game Center has returned\
    \ a `UIViewController`, it needs to be presented to the user; this is handled\
    \ using the new iOS 6 `presentViewController:` method. These are the only steps\
    \ needed to complete a Game Center login on iOS 6; for information on authenticating\
    \ before iOS 6, see the next section.\n\n**Tip:** Don't forget to import the `<GameKit/GameKit.h>`\
    \ header and the associated Game Kit framework; otherwise, `GKLocalPlayer` will\
    \ be undefined.\n\n# Authenticating Prior to iOS 6\n\nIf you app is supporting\
    \ a version of iOS prior to iOS 6, you will need to use the older style of authentication,\
    \ which is described in this section. Handling authentication requires adding\
    \ code to the `GameCenterManager` class. Define a new protocol and add the following\
    \ block of code above the `@interface` line in `GameCenterManager.h`. This will\
    \ create a new optional delegate callback method named `processGameCenterAuthentication`.\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    \n@end\n```\n\nIt is necessary to add a new method to the implementation of `GameCenterManager`.\
    \ Create a new method that consists of the following code:\n\n```\n- (void)authenticateLocalUser\n\
    {\n  if ([GKLocalPlayer localPlayer].authenticated) {\n    return;\n  }\n\n  [[GKLocalPlayer\
    \ localPlayer] authenticateWithCompletionHandler:^(NSError *error) {\n    [self\
    \ callDelegateOnMainThread: @selector(processGameCenterAuthentication:) withArg:NULL\
    \ error:error];\n  }];\n}\n```\n\nThis method will serve as a helper for authenticating\
    \ with Game Center. The first line of code checks with the `localPlayer` singleton\
    \ to see whether the user is already authenticated. If they are, the method is\
    \ complete. If the user is not already authenticated, the `authenticateWithCompletionHandler`\
    \ method is called.\n\nWhen `authenticateWithCompletionHandler` has finished executing,\
    \ we call `[self callDelegateOnMainThread: @selector(processGameCenterAuthentication:)\
    \ withArg: NULL error: error]`. In order to continue, we must implement this method.\n\
    \n**Tip:** If you are receiving warnings that `GameCenterManager` might not respond\
    \ to any of the methods we have implemented, make sure that you are adding them\
    \ to the interface file."
  raw: '### Authenticating on iOS 6 and iOS 7


    iOS 6 brought with it a new method of authentication, which streamlines the process
    of logging into Game Center. If your app is using iOS 6 or newer the following
    method is more efficient; however, if you need to authenticate on iOS 5 or even
    iOS 4 devices see the next section, “Authenticating Prior to iOS 6.” Take a look
    at the following method in its completeness:


    `- (void)authenticateLocalUserModern`


    `{`


      `if ([[GKLocalPlayer localPlayer] authenticateHandler] == nil) {`


        `[[GKLocalPlayer localPlayer] setAuthenticateHandler:^(UIViewController *viewController,
    NSError *error) {`


          `if (error != nil) {`


            `if ([error code] == GKErrorNotSupported) {`


              `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:@"This
    device does not support Game Center" delegate:nil cancelButtonTitle:@"Dismiss"
    otherButtonTitles:nil];`


              `[alert show];`


              `[alert release];`


            `} else if ([error code] == GKErrorCancelled) {`


              `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:@"This
    device has failed login too many times from the app, you will need tologin from
    the Game Center.app" delegate:nil cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


              `[alert show];`


              `[alert release];`


            `} else {`


              `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error" message:[error
    localizedDescription] delegate:nil cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


              `[alert show];`


              `[alert release];`


            `}`


          `} else {`


            `if (viewController != nil) {`


              `[(UIViewController *)delegate presentViewController:viewController
    animated:YES completion:NULL];`


            `}`


          `}`


        `}];`


      `} else {`


        `[[GKLocalPlayer localPlayer] authenticate];`


      `}`


    `}`


    iOS 6 brought a new property to `GKLocalPlayer`, the `authenticateHandler`. In
    essence, this is a block that monitors for login errors and in certain cases will
    display a `UIViewController` to the user. The first step is to make sure that
    we have not set the `authenticateHandler` previously. If we have, a call to authenticate
    will complete the login as seen in the `else` statement at the bottom of the method.
    After it has been determined that an `authenticateHandler` hasn’t been set, one
    is set for the `GKLocalPlayer` singleton. The act of setting an `authenticateHandler`
    will also prompt the user to log in to Game Center.


    The next three `if` statements (for `GKErrorNotSupported`, `GKErrorCancelled`,
    and all other errors) all handle various types of errors that may be encountered
    during authentication. The first error covered is simply that Game Center isn’t
    supported on the user’s device for any reason. The next `if` statement handles
    the tricky case of too many failed logins. This is a problem rarely seen by users
    but often encountered by developers. The last error check handles any additional
    errors and displays them to the user.


    If no errors are encountered, Game Center has successfully authenticated. However,
    if Game Center has returned a `UIViewController`, it needs to be presented to
    the user; this is handled using the new iOS 6 `presentViewController:` method.
    These are the only steps needed to complete a Game Center login on iOS 6; for
    information on authenticating before iOS 6, see the next section.


    Tip


    Don’t forget to import the `<GameKit/GameKit.h>` header and the associated Game
    Kit framework; otherwise, `GKLocalPlayer` will be undefined.


    ### Authenticating Prior to iOS 6


    If you app is supporting a version of iOS prior to iOS 6, you will need to use
    the older style of authentication, which is described in this section. Handling
    authentication requires adding code to the `GameCenterManager` class. Define a
    new protocol and add the following block of code above the `@interface` line in
    `GameCenterManager.h`. This will create a new optional delegate callback method
    named `processGameCenterAuthentication`.


    `@protocol GameCenterManagerDelegate <NSObject>`


    `@optional`


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `@end`


    It is necessary to add a new method to the implementation of `GameCenterManager`.
    Create a new method that consists of the following code:


    `- (void)authenticateLocalUser`


    `{`


      `if ([GKLocalPlayer localPlayer].authenticated) {`


        `return;`


      `}`


      `[[GKLocalPlayer localPlayer] authenticateWithCompletionHandler:^(NSError *error)
    {`


        `[self callDelegateOnMainThread: @selector(processGameCenterAuthentication:)
    withArg:NULL error:error];`


      `}];`


    `}`


    This method will serve as a helper for authenticating with Game Center. The first
    line of code checks with the `localPlayer` singleton to see whether the user is
    already authenticated. If they are, the method is complete. If the user is not
    already authenticated, the `authenticateWithCompletionHandler` method is called.


    When `authenticateWithCompletionHandler` has finished executing, we call `[self
    callDelegateOnMainThread: @selector(processGameCenterAuthentication:) withArg:
    NULL error: error]`. In order to continue, we must implement this method.


    Tip


    If you are receiving warnings that `GameCenterManager` might not respond to any
    of the methods we have implemented, make sure that you are adding them to the
    interface file.'
  trans: "\n# 在 iOS 6 和 iOS 7 上进行身份验证\n\niOS 6 引入了一种新的身份验证方法，简化了登录 Game Center 的流程。如果你的应用使用\
    \ iOS 6 或更高版本，以下方法更为高效；不过，如果你需要在 iOS 5 甚至 iOS 4 设备上进行身份验证，请参阅下一节“在 iOS 6 之前进行身份验证”。请查看以下完整的方法：\n\
    \n```\n- (void)authenticateLocalUserModern\n{\n  if ([[GKLocalPlayer localPlayer]\
    \ authenticateHandler] == nil) {\n    [[GKLocalPlayer localPlayer] setAuthenticateHandler:^(UIViewController\
    \ *viewController, NSError *error) {\n      if (error != nil) {\n        if ([error\
    \ code] == GKErrorNotSupported) {\n          UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"错误\" message:@\"此设备不支持 Game Center\" delegate:nil cancelButtonTitle:@\"\
    关闭\" otherButtonTitles:nil];\n          [alert show];\n          [alert release];\n\
    \        } else if ([error code] == GKErrorCancelled) {\n          UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"错误\" message:@\"此设备已因该应用登录失败次数过多，你需要从\
    \ Game Center.app 登录\" delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n\
    \          [alert show];\n          [alert release];\n        } else {\n     \
    \     UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"错误\" message:[error\
    \ localizedDescription] delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n\
    \          [alert show];\n          [alert release];\n        }\n      } else\
    \ {\n        if (viewController != nil) {\n          [(UIViewController *)delegate\
    \ presentViewController:viewController animated:YES completion:NULL];\n      \
    \  }\n      }\n    }];\n  } else {\n    [[GKLocalPlayer localPlayer] authenticate];\n\
    \  }\n}\n```\n\niOS 6 为 `GKLocalPlayer` 引入了一个新属性 `authenticateHandler`。本质上，这是一个用于监控登录错误的块，在某些情况下会向用户显示一个\
    \ `UIViewController`。第一步是确保我们之前没有设置过 `authenticateHandler`。如果设置过，调用 `authenticate`\
    \ 即可完成登录，如方法底部的 `else` 语句所示。在确定 `authenticateHandler` 尚未设置后，会为 `GKLocalPlayer`\
    \ 单例设置一个。设置 `authenticateHandler` 的操作也会提示用户登录 Game Center。\n\n接下来的三个 `if` 语句（分别处理\
    \ `GKErrorNotSupported`、`GKErrorCancelled` 以及其他所有错误）均用于处理身份验证过程中可能遇到的各种错误类型。第一个处理的错误是该用户设备因任何原因不支持\
    \ Game Center。下一个 `if` 语句处理登录失败次数过多的棘手情况。用户很少遇到此问题，但开发者经常遇到。最后一个错误检查处理所有其他错误并向用户显示。\n\
    \n如果未遇到任何错误，则表明 Game Center 已成功进行身份验证。然而，如果 Game Center 返回了一个 `UIViewController`，则需要将其展示给用户；这可以通过使用新的\
    \ iOS 6 方法 `presentViewController:` 来处理。这是在 iOS 6 上完成 Game Center 登录所需的全部步骤。有关\
    \ iOS 6 之前版本的身份验证信息，请参阅下一节。\n\n**提示：** 不要忘记导入 `<GameKit/GameKit.h>` 头文件和相关的 Game\
    \ Kit 框架，否则 `GKLocalPlayer` 将未定义。\n\n# 在 iOS 6 之前进行身份验证\n\n如果你的应用支持 iOS 6 之前的\
    \ iOS 版本，则需要使用较旧的身份验证方式，本节将对此进行描述。处理身份验证需要在 `GameCenterManager` 类中添加代码。定义一个协议，并将以下代码块添加到\
    \ `GameCenterManager.h` 中 `@interface` 行的上方。这将创建一个新的可选委托回调方法，名为 `processGameCenterAuthentication`。\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    \n@end\n```\n\n需要在 `GameCenterManager` 的实现中添加一个新方法。创建一个包含以下代码的新方法：\n\n```\n- (void)authenticateLocalUser\n\
    {\n  if ([GKLocalPlayer localPlayer].authenticated) {\n    return;\n  }\n\n  [[GKLocalPlayer\
    \ localPlayer] authenticateWithCompletionHandler:^(NSError *error) {\n    [self\
    \ callDelegateOnMainThread: @selector(processGameCenterAuthentication:) withArg:NULL\
    \ error:error];\n  }];\n}\n```\n\n该方法将作为与 Game Center 进行身份验证的辅助工具。第一行代码检查 `localPlayer`\
    \ 单例，以确认用户是否已通过身份验证。如果是，则方法结束。如果用户尚未通过身份验证，则调用 `authenticateWithCompletionHandler`\
    \ 方法。\n\n当 `authenticateWithCompletionHandler` 执行完毕后，我们调用 `[self callDelegateOnMainThread:\
    \ @selector(processGameCenterAuthentication:) withArg: NULL error: error]`。为了继续执行，我们必须实现此方法。\n\
    \n**提示：** 如果你收到警告，提示 `GameCenterManager` 可能不会响应我们已实现的任何方法，请确保已将相关方法添加到了接口文件中。\n"
- fmt: "### Authenticating from UFOViewController\n\nNow that we have modified the\
    \ `GameCenterManager` class to support authentication, we need to create a new\
    \ object to represent the `GameCenterManager` in the `UFOViewController` class.\n\
    \nImport the header for `GameCenterManager` and create a new `GameCenterManager`\
    \ object called `gcManager`. You also need to add the `GameCenterManagerDelegate`\
    \ to the interface of `UFOViewController.h`. When you are done, `UFOViewController.h`\
    \ should look like the following:\n\n```\n#import <UIKit/UIKit.h>\n#import \"\
    GameCenterManager.h\"\n@interface UFOViewController : UIViewController <GameCenterManagerDelegate>\n\
    @property (nonatomic, strong) GameCenterManager *gcManager;\n-(IBAction)playButtonPressed;\n\
    @end\n```\n\nYou will again be modifying the `viewDidLoad` method of `UFOViewController`.\
    \ Make the necessary changes to the `viewDidLoad` method to match the following\
    \ code snippet:\n\n```\n- (void)viewDidLoad\n{\n  [super viewDidLoad];\n  if (![GameCenterManager\
    \ isGameCenterAvailable]) {\n    return;\n  }\n  GameCenterManager  *manager =\
    \ [[GameCenterManager alloc] init];\n  [manager setDelegate:self];\n  [manager\
    \ authenticateLocalUser];\n  [self setGcManager:manager];\n}\n```\n\nThe first\
    \ new line of code that we added initializes and allocates an instance of `GameCenterManager`.\
    \ The next line sets `self` for the delegate to the `UFOViewController` class;\
    \ this will allow us to get callbacks from the `GameCenterManager`.\n\nOnce we\
    \ have completed these two steps, we can call our convenience method, `authenticateLocalUser`.\
    \ Game Center handles the required login views and authentication as well as any\
    \ account creation at this point. However, we do need to watch our delegate method\
    \ `processGameCenterAuthentication`, in order to catch any errors encountered\
    \ while authenticating.\n\nIf you are using the iOS 6 and newer method of authentication\
    \ you will not be required to implement the delegate callback and can simply replace\
    \ `[gcManager authenticateLocalUser];` with `[gcManager authenticateLocalUserModern];`\
    \ in the previous code snippet.\n\n**Caution**  \nIf you have cancelled a Game\
    \ Center login three or more times from within an app, you will not be able to\
    \ sign in from that app again until you have gone to the `GameCenter.app` and\
    \ signed in. This is an undocumented behavior and can be a real pain to trace\
    \ if you do not know what you are searching for. In addition, if you find you\
    \ are unable to sign in even from `GameCenter.app`, you can reset the simulator\
    \ or restore the device to resolve these issues.\n\nIf you try to run the app\
    \ again, you will see a console log stating “Missed Method.” This is because we\
    \ have not yet added the optional protocol method that is called when the authentication\
    \ is completed. We need to add the following method to `UFOViewController.m`:\n\
    \n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n{\n  if (error\
    \ != nil) {\n    NSLog(@\"An error occured during authentication: %@\", [error\
    \ localizedDescription]);\n  } else {\n    NSLog(@\"Successfully authenticated\"\
    );\n  }\n}\n```\n\nNow when you log in, you should see “Successfully authenticated”\
    \ printed to the console, as well as the image shown in Figure [2-2](#A978-1-4302-4906-1_2_Chapter.html#Fig2)\
    \ (with your Game Center name instead).\n\n**Caution**  \nWhen logging in to Game\
    \ Center for testing purposes, always create a new Apple ID. Never use an existing\
    \ Apple ID to log in to Game Center from the Sandbox environment.\n\n![A978-1-4302-4906-1_2_Fig2_HTML.jpg](A978-1-4302-4906-1_2_Fig2_HTML.jpg)\
    \  \n**Figure 2-2.** The standard “welcome back” message the user will see when\
    \ logging in to Game Center\n\n**Tip**  \nIf you are having trouble logging in,\
    \ make sure your bundle ID in the `info.plist` matches a bundle ID that has Game\
    \ Center enabled for it in iTunes Connect. See [Chapter 1](#A978-1-4302-4906-1_1_Chapter.html)\
    \ for more information on configuring Game Center in iTunes Connect.\n\n### The\
    \ Sandbox\n\nTo help test your app before it goes live, Apple has provided a Sandbox\
    \ environment for Game Center. The Sandbox functions exactly like the production\
    \ version of Game Center, while keeping all activity hidden from non-sandboxed\
    \ users.\n\nThe Sandbox allows the developer to work on new Game Center functionality\
    \ in secret, as well as not polluting the leaderboards and achievement systems\
    \ with their test data. When logging in to a Sandbox environment, the login alert\
    \ will state “\\*\\*\\* Sandbox \\*\\*\\*” at the top.\n\nOnce logged in, there\
    \ is no way to determine whether you are currently logged in to the Sandbox from\
    \ within the app. However, if you open `GameCenter.app`, you will see whether\
    \ you are in a Sandbox environment. The information in Table [2-1](#A978-1-4302-4906-1_2_Chapter.html#Tab1)\
    \ will help you determine what mode you are currently running in.\n\n**Table 2-1.**\
    \ Determining the Sandbox Status on Various Types of Builds\n\n| Type of Build\
    \ | Sandbox Status |\n| --- | --- |\n| iOS Device Simulator | Sandbox Environment\
    \ Only |\n| Developer Provisioned Build | Sandbox Environment Only |\n| Ad-Hoc\
    \ Distributed Build | Sandbox Environment Only |\n| Signed Distributed Build |\
    \ Production Environment Only |\n\n**Tip**  \nApple has also recently provided\
    \ the option of removing leaderboard and achievement progress for all users in\
    \ iTunes Connect. It is recommended that you reset before releasing a Game Center–enabled\
    \ app.\n\n### Watching for Status Changes\n\nBeginning with iOS 4.0, iOS devices\
    \ gained the ability to run multiple apps simultaneously. This can create some\
    \ complex behavioral bugs when dealing with state, especially if the user is accessing\
    \ two different Game Center–enabled apps at the same time. For example, the user\
    \ may log out of Game Center, or even log in as a different user, while your app\
    \ is in the background. Therefore, it is vital that you listen for changes to\
    \ the local user through the `NSNotification` system.\n\nIf you are using the\
    \ iOS 6 `authenticateHandler` method detailed earlier in this chapter, watching\
    \ and reacting to state changes for authentication events is optional and the\
    \ `authenticateHandler` will do all of the heavy lifting for you. You can still\
    \ monitor for state changes if your app needs to use this data in any additional\
    \ ways.\n\nAdd the following snippet of code in the `viewDidLoad` method of `UFOViewController.m`,\
    \ right after the test is performed to verify whether Game Center is available.\n\
    \n```\n[[NSNotificationCenter defaultCenter]\n                             addObserver:self\n\
    \                                selector:@selector(localUserAuthenticationChanged:)\n\
    \                                    name:GKPlayerAuthenticationDidChangeNotificationName\n\
    \                                  object:nil];\n```\n\n**Note**  \nDon’t forget\
    \ to remove the `NSNotification` observers in `viewDidUnload`, or you could experience\
    \ crashes and other unintended behavior.\n\nYou should also add a new method to\
    \ `UFOViewController`. This method will be called whenever player authentication\
    \ status changes.\n\n```\n-(void)localUserAuthenticationChanged:(NSNotification\
    \ *)notif;\n{\n        NSLog(@\"Authentication Changed: %@\", notif.object);\n\
    }\n```\n\nThis new method will print the description for the new `GKLocalPlayer`\
    \ when authentication changes. You will need to determine what special steps need\
    \ to be taken in your app to handle local player changes.\n\n**Tip**  \nDo not\
    \ forget to test user switching before shipping your app, as Apple will test it\
    \ in the review stage."
  raw: '### Authenticating from UFOViewController


    Now that we have modified the `GameCenterManager` class to support authentication,
    we need to create a new object to represent the `GameCenterManager` in the `UFOViewController`
    class.


    Import the header for `GameCenterManager` and create a new `GameCenterManager`
    object called `gcManager`. You also need to add `the GameCenterManagerDelegate`
    to the interface of `UFOViewController.h`. When you are done, `UFOViewController.h`
    should look like the following:


    `#import <UIKit/UIKit.h>`


    `#import "GameCenterManager.h"`


    `@interface UFOViewController : UIViewController <GameCenterManagerDelegate>`


    `@property (nonatomic, strong) GameCenterManager *gcManager;`


    `-(IBAction)playButtonPressed;`


    `@end`


    You will again be modifying the `viewDidLoad` method of `UFOViewController`. Make
    the necessary changes to the `viewDidLoad` method to match the following code
    snippet:


    `- (void)viewDidLoad`


    `{`


      `[super viewDidLoad];`


      `if (![GameCenterManager isGameCenterAvailable]) {`


        `return;`


      `}`


      `GameCenterManager  *manager = [[GameCenterManager alloc] init];`


      `[manager setDelegate:self];`


      `[manager authenticateLocalUser];`


      `[self setGcManager:manager];`


    `}`


    The first new line of code that we added initializes and allocates an instance
    of `GameCenterManager`. The next line sets `self` for the delegate to the `UFOViewController`
    class; this will allow us to get callbacks from the GameCenterManager.


    Once we have completed these two steps, we can call our convenience method, `authenticateLocalUser`.
    Game Center handles the required login views and authentication as well as any
    account creation at this point. However, we do need to watch our delegate method
    `processGameCenterAuthentication`, in order to catch any errors encountered while
    authenticating.


    If you are using the iOS 6 and newer method of authentication you will not be
    required to implement the delegate callback and can simply replace `[gcManager
    authenticateLocalUser];` with `[gcManager authenticateLocalUserModern];` in the
    previous code snippet.


    Caution


    If you have cancelled a Game Center login three or more times from within an app,
    you will not be able to sign in from that app again until you have gone to the
    GameCenter.app and signed in. This is an undocumented behavior and can be a real
    pain to trace if you do not know what you are searching for. In addition, if you
    find you are unable to sign in even from Game Center.app, you can reset the simulator
    or restore the device to resolve these issues.


    If you try to run the app again, you will see a console log stating “Missed Method.”
    This is because we have not yet added the optional protocol method that is called
    when the authentication is completed. We need to add the following method to `UFOViewController.m`:


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `{`


      `if (error != nil) {`


        `NSLog(@"An error occured during authentication: %@", [error localizedDescription]);`


      `} else {`


        `NSLog(@"Successfully authenticated");`


      `}`


    `}`


    Now when you log in, you should see “Successfully authenticated” printed to the
    console, as well as the image shown in Figure [2-2](#A978-1-4302-4906-1_2_Chapter.html#Fig2)
    (with your Game Center name instead).


    Caution


    When logging in to Game Center for testing purposes, always create a new Apple
    ID. Never use an existing Apple ID to log in to Game Center from the Sandbox environment.


    ![A978-1-4302-4906-1_2_Fig2_HTML.jpg](A978-1-4302-4906-1_2_Fig2_HTML.jpg)


    Figure 2-2.


    The standard “welcome back” message the user will see when logging in to Game
    Center Tip


    If you are having trouble logging in, make sure your bundle ID in the `info.plist`
    matches a bundle ID that has Game Center enabled for it in iTunes Connect. See
    [Chapter 1](#A978-1-4302-4906-1_1_Chapter.html) for more information on configuring
    Game Center in iTunes Connect.


    ## The Sandbox


    To help test your app before it goes live, Apple has provided a Sandbox environment
    for Game Center. The Sandbox functions exactly like the production version of
    Game Center, while keeping all activity hidden from non-sandboxed users.


    The Sandbox allows the developer to work on new Game Center functionality in secret,
    as well as not polluting the leaderboards and achievement systems with their test
    data. When logging in to a Sandbox environment, the login alert will state “***
    Sandbox ***” at the top.


    Once logged in, there is no way to determine whether you are currently logged
    in to the Sandbox from within the app. However, if you open Game Center.app, you
    will see whether you are in a Sandbox environment. The information in Table [2-1](#A978-1-4302-4906-1_2_Chapter.html#Tab1)
    will help you determine what mode you are currently running in.


    Table 2-1.


    Determining the Sandbox Status on Various Types of Builds


    | Type of Build | Sandbox Status |

    | --- | --- |

    | iOS Device Simulator | Sandbox Environment Only |

    | Developer Provisioned Build | Sandbox Environment Only |

    | Ad-Hoc Distributed Build | Sandbox Environment Only |

    | Signed Distributed Build | Production Environment Only |


    Tip


    Apple has also recently provided the option of removing leaderboard and achievement
    progress for all users in iTunes Connect. It is recommended that you reset before
    releasing a Game Center–enabled app.


    ## Watching for Status Changes


    Beginning with iOS 4.0, iOS devices gained the ability to run multiple apps simultaneously.
    This can create some complex behavioral bugs when dealing with state, especially
    if the user is accessing two different Game Center–enabled apps at the same time.
    For example, the user may log out of Game Center, or even log in as a different
    user, while your app is in the background. Therefore, it is vital that you listen
    for changes to the local user through the NSNotification system.


    If you are using the iOS 6 `authenticateHandler` method detailed earlier in this
    chapter, watching and reacting to state changes for authentication events is optional
    and the `authenticateHandler` will do all of the heavy lifting for you. You can
    still monitor for state changes if your app needs to use this data in any additional
    ways.


    Add the following snippet of code in the `viewDidLoad` method of `UFOViewController.m`,
    right after the test is performed to verify whether Game Center is available.


    `[[NSNotificationCenter defaultCenter]`


                                 `addObserver:self`


                                    `selector:@selector(localUserAuthenticationChanged:)`


                                        `name:GKPlayerAuthenticationDidChangeNotificationName`


                                      `object:nil];`


    Note


    Don’t forget to remove the NSNotification observers in `viewDidUnload`, or you
    could experience crashes and other unintended behavior.


    You should also add a new method to UFOViewController. This method will be called
    whenever player authentication status changes.


    `-(void)localUserAuthenticationChanged:(NSNotification *)notif;`


    `{`


            `NSLog(@"Authentication Changed: %@", notif.object);`


    `}`


    This new method will print the description for the new `GKLocalPlayer` when authentication
    changes. You will need to determine what special steps need to be taken in your
    app to handle local player changes.


    Tip


    Do not forget to test user switching before shipping your app, as Apple will test
    it in the review stage.'
  trans: "\n### 从 UFOViewController 进行身份验证\n\n现在我们已经修改了 `GameCenterManager` 类以支持身份验证，我们需要在\
    \ `UFOViewController` 类中创建一个新对象来表示 `GameCenterManager`。\n\n导入 `GameCenterManager`\
    \ 的头文件，并创建一个名为 `gcManager` 的新 `GameCenterManager` 对象。你还需要将 `GameCenterManagerDelegate`\
    \ 添加到 `UFOViewController.h` 的接口中。完成后，`UFOViewController.h` 应如下所示：\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"GameCenterManager.h\"\n@interface UFOViewController\
    \ : UIViewController <GameCenterManagerDelegate>\n@property (nonatomic, strong)\
    \ GameCenterManager *gcManager;\n-(IBAction)playButtonPressed;\n@end\n```\n\n\
    你将再次修改 `UFOViewController` 的 `viewDidLoad` 方法。对 `viewDidLoad` 方法进行必要的修改，使其与以下代码片段匹配：\n\
    \n```\n- (void)viewDidLoad\n{\n  [super viewDidLoad];\n  if (![GameCenterManager\
    \ isGameCenterAvailable]) {\n    return;\n  }\n  GameCenterManager  *manager =\
    \ [[GameCenterManager alloc] init];\n  [manager setDelegate:self];\n  [manager\
    \ authenticateLocalUser];\n  [self setGcManager:manager];\n}\n```\n\n我们添加的第一行新代码初始化并分配了一个\
    \ `GameCenterManager` 的实例。下一行将代理的 `self` 设置为 `UFOViewController` 类；这将使我们能够从 `GameCenterManager`\
    \ 获取回调。\n\n完成这两步后，我们就可以调用便捷方法 `authenticateLocalUser`。此时，Game Center 会处理所需的登录视图、身份验证以及任何账户创建。然而，我们确实需要关注代理方法\
    \ `processGameCenterAuthentication`，以便捕获在身份验证过程中遇到的任何错误。\n\n如果你使用 iOS 6 及更新版本的身份验证方法，则无需实现代理回调，只需将前面代码片段中的\
    \ `[gcManager authenticateLocalUser];` 替换为 `[gcManager authenticateLocalUserModern];`\
    \ 即可。\n\n**注意**  \n如果你在某个应用内取消 Game Center 登录三次或更多次，你将无法再次从该应用登录，除非你前往 `GameCenter.app`\
    \ 并登录。这是未记录的行为，如果你不知道自己在寻找什么，追踪起来会非常麻烦。此外，如果你发现即使从 `GameCenter.app` 也无法登录，可以重置模拟器或恢复设备来解决这些问题。\n\
    \n如果你尝试再次运行该应用，你会在控制台日志中看到“Missed Method”。这是因为我们尚未添加在身份验证完成时调用的可选协议方法。我们需要在 `UFOViewController.m`\
    \ 中添加以下方法：\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n  if (error != nil) {\n    NSLog(@\"身份验证过程中发生错误: %@\", [error localizedDescription]);\n\
    \  } else {\n    NSLog(@\"身份验证成功\");\n  }\n}\n```\n\n现在，当你登录时，你应该会在控制台看到“身份验证成功”的输出，以及图\
    \ 2-2 所示的图像（其中会显示你的 Game Center 名称）。\n\n**注意**  \n在出于测试目的登录 Game Center 时，请始终创建一个新的\
    \ Apple ID。切勿使用现有的 Apple ID 从沙盒环境登录 Game Center。\n\n![A978-1-4302-4906-1_2_Fig2_HTML.jpg](img/A978-1-4302-4906-1_2_Fig2_HTML.jpg)\
    \  \n**图 2-2.** 用户登录 Game Center 时将看到的标准“欢迎回来”信息\n\n**提示**  \n如果你在登录时遇到问题，请确保\
    \ `info.plist` 中的 bundle ID 与 iTunes Connect 中启用了 Game Center 的 bundle ID 相匹配。有关在\
    \ iTunes Connect 中配置 Game Center 的更多信息，请参阅第 1 章。\n\n### 沙盒\n\n为了帮助你在应用上线前进行测试，Apple\
    \ 为 Game Center 提供了沙盒环境。沙盒的功能与生产版本的 Game Center 完全相同，同时将所有活动对非沙盒用户隐藏。\n\n沙盒允许开发者秘密开发新的\
    \ Game Center 功能，并且避免测试数据污染排行榜和成就系统。登录沙盒环境时，登录提示的顶部会显示“\\*\\*\\* 沙盒 \\*\\*\\*”。\n\
    \n登录后，无法在应用内确定当前是否已登录到沙盒。但是，如果你打开 `GameCenter.app`，你将看到自己是否处于沙盒环境中。表 2-1 中的信息将帮助你确定当前运行的模式。\n\
    \n**表 2-1.** 确定各种类型构建的沙盒状态\n\n| 构建类型 | 沙盒状态 |\n| --- | --- |\n| iOS 设备模拟器 | 仅沙盒环境\
    \ |\n| 开发者预置描述文件构建 | 仅沙盒环境 |\n| Ad-Hoc 分发构建 | 仅沙盒环境 |\n| 签名分发构建 | 仅生产环境 |\n\n\
    **提示**  \nApple 最近还提供了在 iTunes Connect 中清除所有用户的排行榜和成就进度的选项。建议在发布启用 Game Center\
    \ 的应用之前进行重置。\n\n### 监控状态变化\n\n从 iOS 4.0 开始，iOS 设备获得了同时运行多个应用的能力。这在处理状态时可能会产生一些复杂的行为错误，尤其是当用户同时访问两个不同的启用\
    \ Game Center 的应用时。例如，当你的应用在后台运行时，用户可能会退出 Game Center，甚至以其他用户身份登录。因此，通过 `NSNotification`\
    \ 系统监听本地用户的变化至关重要。\n\n如果你使用的是本章前面详述的 iOS 6 `authenticateHandler` 方法，那么监听和响应身份验证事件的状态变化是可选的，并且\
    \ `authenticateHandler` 会为你处理所有繁重的工作。如果你的应用需要以其他方式使用这些数据，你仍然可以监控状态变化。\n\n在 `UFOViewController.m`\
    \ 的 `viewDidLoad` 方法中，在验证 Game Center 是否可用的测试之后，立即添加以下代码片段。\n\n```\n[[NSNotificationCenter\
    \ defaultCenter]\n                             addObserver:self\n            \
    \                    selector:@selector(localUserAuthenticationChanged:)\n   \
    \                                 name:GKPlayerAuthenticationDidChangeNotificationName\n\
    \                                  object:nil];\n```\n\n**注意**  \n不要忘记在 `viewDidUnload`\
    \ 中移除 `NSNotification` 观察者，否则你可能会遇到崩溃或其他意外行为。\n\n你还应该在 `UFOViewController` 中添加一个新方法。每当玩家身份验证状态发生变化时，都会调用此方法。\n\
    \n```\n-(void)localUserAuthenticationChanged:(NSNotification *)notif;\n{\n   \
    \     NSLog(@\"身份验证已更改: %@\", notif.object);\n}\n```\n\n当身份验证发生变化时，此新方法将打印新 `GKLocalPlayer`\
    \ 的描述。你需要确定在应用中需要采取哪些特殊步骤来处理本地玩家的变化。\n\n**提示**  \n在发布应用之前，不要忘记测试用户切换，因为 Apple\
    \ 会在审核阶段进行测试。\n"
- fmt: "# Working with GKLocalPlayer\n\nThe `GKLocalPlayer` object will always exist\
    \ and be non-nil when authenticated with Game Center; this object is a representation\
    \ of the user. You will never create an instance of `GKLocalPlayer`; this is handled\
    \ through the class method `localPlayer`. The `localPlayer` singleton will be\
    \ the only way that you will interact with the `GKLocalPlayer`.\n\nThe `GKLocalPlayer`\
    \ object has three properties associated with it: `authenticated`, `friends`,\
    \ and `underage`. We will be dealing with the `friends` property in the following\
    \ section. We have already worked with the `authenticated` Boolean in our authentication\
    \ code in the previous sections.\n\nThe `underage` property is useful for restricting\
    \ content in a Game Center–enabled app to users over the age of 17\\. The following\
    \ code performs an underage check:\n\n```\nif ([GKLocalPlayer localPlayer].underage)\n\
    {\n    NSLog(@\"User is underage\");\n}\n```\n\nThe `friends` property will return\
    \ nil until we complete the steps required to retrieve the user’s friends list.\
    \ Once this has been done, the `friends` property will return an array of the\
    \ local user’s friends. This procedure is detailed in the following section.\n\
    \n## Retrieving a Friends List\n\nThe friends list is an array of user IDs that\
    \ you have assigned as friends in `Game Center.app`. With this data, you can do\
    \ things such as create a friends list only in game voice channel, or highlight\
    \ your friends’ scores in the global scores list.\n\nWe will add a call to retrieve\
    \ the friends list in our sample project, but we won’t be doing anything specific\
    \ with the data in this chapter. For the time being, we will simply print the\
    \ information to the console.\n\nWe begin by modifying our `GameCenterManager`\
    \ class to add a new method for retrieving the local player’s friends list. Add\
    \ the following method to the implementation.\n\n```\n- (void)retrieveFriendsList;\n\
    {\n    if ([GKLocalPlayer localPlayer].authenticated == YES) {\n        [[GKLocalPlayer\
    \ localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends, NSError *error)\
    \ {\n            [self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:)\
    \ withArg:friends error:error];\n        }];\n    } else {\n        NSLog(@\"\
    You must authenticate first\");\n    }\n}\n```\n\nThis method looks a lot like\
    \ the previous `authentication` method that was added earlier in this chapter.\
    \ After determining that the `GKLocalPlayer` is authenticated, we can call `loadFriendsWithCompletionHandler`.\
    \ This method returns an array of player IDs. We will see how we can use these\
    \ player IDs to retrieve `GKPlayer` objects in the next section. We then use our\
    \ thread-safe `callDelegateOnMainThread` method to return the data to our delegate.\n\
    \nBefore this code will execute, we still need to modify the header file and add\
    \ a new protocol method to our delegate. We modify the header file to look like\
    \ the following code snippet:\n\n```\n@protocol GameCenterManagerDelegate <NSObject>\n\
    @optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n@end\n\n@interface GameCenterManager : NSObject\
    \ <GameCenterManagerDelegate>\n@property(nonatomic, retain) id <GameCenterManagerDelegate,\
    \ NSObject> delegate;\n+ (BOOL)isGameCenterAvailable;\n- (void)authenticateLocalUser;\n\
    - (void)callDelegateOnMainThread:(SEL)selector withArg:(id) arg error:(NSError*)\
    \ err;\n- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*) err;\n\
    - (void)retrieveFriendsList;\n@end\n```\n\nThe change we’ve made here adds a new\
    \ optional protocol, which will be called when the `friends` block is finished\
    \ executing. We return an array of friend IDs as well as any errors we encounter.\
    \ We will also add a new method called `retrieveFriendsList` to the class methods.\n\
    \nThe last thing that needs to be done before we can run the app is adding a call\
    \ to `retrieveFriendsList` and adding the protocol method to `UFOViewController.m`.\
    \ Since we are unable to make the call to retrieve the friends list until after\
    \ we have successfully authenticated with Game Center, we can add the call to\
    \ do so in the authentication callback. Modify that method to match the following\
    \ snippet:\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n    if (error != nil) {\n        NSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n    } else {\n        [gcManager retrieveFriendsList];\n\
    \    }\n}\n```\n\nWe will also add the protocol method that will print the friends\
    \ list to the console. Add the following method to `UFOViewController.m`:\n\n\
    ```\n- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n\
    {\n    if (error != nil) {\n        NSLog(@\"An error occured during friends list\
    \ request: %@\", [error localizedDescription]);\n    } else {\n        NSLog(@\"\
    Friends: %@\", friends);\n    }\n}\n```\n\nIf you have any friends in your friends\
    \ list, you should see output that looks similar to the following:\n\n```\n2011-02–01\
    \ 12:56:32.759 UFOs[3328:207] Friends: (\n    \"G:1093075676\"\n)\n```\n\n**Note:**\
    \ If you have not yet added any friends to your Sandbox environment, now is a\
    \ good time to do so. You can create new accounts in the `Game Center.app` and\
    \ add them as friends to your test account. Having a populated friends list will\
    \ be valuable throughout the Game Center sections of this book and in debugging\
    \ Game Center specific code.\n\nThe next section deals with working with the player\
    \ data that was retrieved from your friends list.\n\n## Friend List Avatars\n\n\
    With the introduction of iOS 5.0 Apple added support for friends’ avatars. Players\
    \ are optionally required to set their avatar in the Game Center app. If a player\
    \ has not yet set an avatar, Game Center will assign them a default avatar. To\
    \ access avatars in your app, you will need to be running on iOS 5.0 or newer,\
    \ and you will need to implement one new method. The following method is called\
    \ on an existing `GKPlayer` object (see the previous section for more information\
    \ on `GKPlayer`). There are two options for avatar image sizes: `GKPhotoSizeNormal`\
    \ and `GKPhotoSizeSmall`.\n\n```\n[player loadPhotoForSize:GKPhotoSizeNormal withCompletionHandler:\
    \ ^(UIImage *photo, NSError *error) {\n    if (error == nil) {\n        [playerAvatarImageView\
    \ setImage:photo];\n    } else {\n        NSLog(@\"An error occurred loading player\
    \ avatar: %@\", [error localizedDescription]);\n    }\n}];\n```"
  raw: '## Working with GKLocalPlayer


    The `GKLocalPlayer` object will always exist and be non-nil when authenticated
    with Game Center; this object is a representation of the user. You will never
    create an instance of `GKLocalPlayer`; this is handled through the class method
    `localPlayer`. The `localPlayer` singleton will be the only way that you will
    interact with the `localPlayer`.


    The `GKLocalPlayer` object has three properties associated with it: `authenticated`,
    `friends`, and `underage`. We will be dealing with the `friends` property in the
    following section. We have already worked with the `authenticated` Boolean in
    our authentication code in the previous sections.


    The `underage` property is useful for restricting content in a Game Center–enabled
    app to users over the age of 17\. The following code performs an underage check:


    `if ([GKLocalPlayer localPlayer].underage)`


    `{`


            `NSLog(@"User is underage");`


    `}`


    The `friends` property will return nil until we complete the steps required to
    retrieve the user’s friends list. Once this has been done, the `friends` property
    will return an array of the local user’s friends. This procedure is detailed in
    the following section.


    ## Retrieving a Friends List


    The friends list is an array of user IDs that you have assigned as friends in
    `Game Center.app`. With this data, you can do things such as create a friends
    list only in game voice channel, or highlight your friends’ scores in the global
    scores list.


    We will add a call to retrieve the friends list in our sample project, but we
    won’t be doing anything specific with the data in this chapter. For the time being,
    we will simply print the information to the console.


    We begin by modifying our `GameCenterManager` class to add a new method for retrieving
    the local player’s friends list. Add the following method to the implementation.


    `- (void)retrieveFriendsList;`


    `{`


    `if ([GKLocalPlayer localPlayer].authenticated == YES) {`


    `[[GKLocalPlayer localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends,
    NSError *error) {`


    `[self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:) withArg:friends
    error:error];`


    `}];`


    `} else {`


    `NSLog(@"You must authenticate first");`


    `}`


    `}`


    This method looks a lot like the previous `authentication` method that was added
    earlier in this chapter. After determining that `the GKLocalPlayer` is authenticated,
    we can call `loadFriendsWithCompletionHandler`. This method returns an array of
    player IDs. We will see how we can use these player IDs to retrieve `GKPlayer`
    objects in the next section. We then use our thread-safe `callDelegateOnMainThread`
    method to return the data to our delegate.


    Before this code will execute, we still need to modify the header file and add
    a new protocol method to our delegate. We modify the header file to look like
    the following code snippet:


    `@protocol GameCenterManagerDelegate <NSObject>`


    `@optional`


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`


    `@end`


    `@interface GameCenterManager : NSObject <GameCenterManagerDelegate>`


    `@property(nonatomic, retain) id <GameCenterManagerDelegate, NSObject> delegate;`


    `+ (BOOL)isGameCenterAvailable;`


    `- (void)authenticateLocalUser;`


    `- (void)callDelegateOnMainThread:(SEL)selector withArg:(id) arg error:(NSError*)
    err;`


    `- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*) err;`


    `- (void)retrieveFriendsList;`


    `@end`


    The change we’ve made here adds a new optional protocol, which will be called
    when the `friends` block is finished executing. We return an array of friend IDs
    as well as any errors we encounter. We will also add a new method called `retrieveFriendsList`
    to the class methods.


    The last thing that needs to be done before we can run the app is adding a call
    to `retrieveFriendsList` and adding the protocol method to `UFOViewController.m`.
    Since we are unable to make the call to retrieve the friends list until after
    we have successfully authenticated with Game Center, we can add the call to do
    so in the authentication callback. Modify that method to match the following snippet:


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `{`


    `if (error != nil) {`


    `NSLog(@"An error occured during authentication: %@", [error localizedDescription]);`


    `} else {`


    `[gcManager retrieveFriendsList];`


    `}`


    `}`


    We will also add the protocol method that will print the friends list to the console.
    Add the following method to `UFOViewController.m`:


    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`


    `{`


    `if (error != nil) {`


    `NSLog(@"An error occured during friends list request: %@", [error localizedDescription]);`


    `} else {`


    `NSLog(@"Friends: %@", friends);`


    `}`


    `}`


    If you have any friends in your friends list, you should see output that looks
    similar to the following:


    `2011-02–01 12:56:32.759 UFOs[3328:207] Friends: (`


    `"G:1093075676"`


    `)`


    Note


    If you have not yet added any friends to your Sandbox environment, now is a good
    time to do so. You can create new accounts in the `Game Center.app` and add them
    as friends to your test account. Having a populated friends list will be valuable
    throughout the Game Center sections of this book and in debugging Game Center
    specific code.


    The next section deals with working with the player data that was retrieved from
    your friends list.


    ## Friend List Avatars


    With the introduction of iOS 5.0 Apple added support for friends’ avatars. Players
    are optionally required to set their avatar in the Game Center app. If a player
    has not yet set an avatar, Game Center will assign them a default avatar. To access
    avatars in your app, you will need to be running on iOS 5.0 or newer, and you
    will need to implement one new method. The following method is called on an existing
    `GKPlayer` object (see the previous section for more information on `GKPlayer`).
    There are two options for avatar image sizes: `GKPhotoSizeNormal` and `GKPhotoSizeSmall`.


    `[player loadPhotoForSize:GKPhotoSizeNormal withCompletionHandler: ^(UIImage *photo,
    NSError *error) {`


      `if (error == nil) {`


        `[playerAvatarImageView setImage:photo];`


      `} else {`


        `NSLog(@"An error occurred loading player avatar: %@", [error localizedDescription]);`


      `}`


    `}];`'
  trans: "\n# 使用 GKLocalPlayer\n\n`GKLocalPlayer` 对象会一直存在，且在通过 Game Center 认证后不会为空；该对象代表当前用户。你永远不会直接创建\
    \ `GKLocalPlayer` 的实例，而是通过类方法 `localPlayer` 来处理。`localPlayer` 单例是与 `GKLocalPlayer`\
    \ 交互的唯一方式。\n\n`GKLocalPlayer` 对象有三个相关属性：`authenticated`、`friends` 和 `underage`。我们将在下一节处理\
    \ `friends` 属性。在前面的认证代码中，我们已经处理过布尔值型的 `authenticated` 属性。\n\n`underage` 属性用于限制\
    \ Game Center 应用中的内容仅供 17 岁以上用户访问。以下代码执行未成年人检查：\n\n```\nif ([GKLocalPlayer localPlayer].underage)\n\
    {\n    NSLog(@\"用户未满 18 岁\");\n}\n```\n\n在完成获取用户好友列表的步骤之前，`friends` 属性将返回 nil。完成该步骤后，`friends`\
    \ 属性将返回一个包含本地用户好友的数组。具体流程将在下一节详细说明。\n\n## 获取好友列表\n\n好友列表是一个用户 ID 数组，这些用户是你通过 `Game\
    \ Center.app` 设为好友的人。有了这些数据，你可以实现诸多功能，例如在游戏语音频道中仅创建好友列表，或在全局排行榜中高亮显示好友的分数。\n\n\
    我们将在示例项目中添加一个调用来获取好友列表，但本章不会对这些数据进行具体处理。目前，我们只需将信息打印到控制台即可。\n\n首先，修改 `GameCenterManager`\
    \ 类，添加一个获取本地玩家好友列表的新方法。在实现文件中添加以下方法：\n\n```\n- (void)retrieveFriendsList;\n{\n\
    \    if ([GKLocalPlayer localPlayer].authenticated == YES) {\n        [[GKLocalPlayer\
    \ localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends, NSError *error)\
    \ {\n            [self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:)\
    \ withArg:friends error:error];\n        }];\n    } else {\n        NSLog(@\"\
    必须先完成认证\");\n    }\n}\n```\n\n此方法与本章前面添加的 `authentication` 方法非常相似。确定 `GKLocalPlayer`\
    \ 已认证后，我们可以调用 `loadFriendsWithCompletionHandler`。该方法返回一个玩家 ID 数组。我们将在下一节学习如何使用这些玩家\
    \ ID 获取 `GKPlayer` 对象。接着，我们使用线程安全的 `callDelegateOnMainThread` 方法将数据返回给委托。\n\n\
    在运行此代码前，仍需修改头文件并为委托添加新的协议方法。将头文件修改为以下代码片段：\n\n```\n@protocol GameCenterManagerDelegate\
    \ <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n@end\n\
    \n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n+ (BOOL)isGameCenterAvailable;\n\
    - (void)authenticateLocalUser;\n- (void)callDelegateOnMainThread:(SEL)selector\
    \ withArg:(id) arg error:(NSError*) err;\n- (void)callDelegate:(SEL)selector withArg:(id)arg\
    \ error:(NSError*) err;\n- (void)retrieveFriendsList;\n@end\n```\n\n这里所做的修改是添加了一个新的可选协议，该协议将在\
    \ `friends` 代码块执行完成后被调用。我们将返回一个好友 ID 数组以及遇到的任何错误。同时，我们还会向类方法中添加一个名为 `retrieveFriendsList`\
    \ 的新方法。\n\n在运行应用前，最后需要做的事情是在 `UFOViewController.m` 中添加对 `retrieveFriendsList`\
    \ 的调用以及协议方法。由于必须成功认证 Game Center 后才能调用获取好友列表的方法，我们可以在认证回调中添加该调用。将方法修改为以下代码片段：\n\
    \n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n{\n    if (error\
    \ != nil) {\n        NSLog(@\"认证时发生错误：%@\", [error localizedDescription]);\n \
    \   } else {\n        [gcManager retrieveFriendsList];\n    }\n}\n```\n\n我们还需要添加一个协议方法，用于将好友列表打印到控制台。在\
    \ `UFOViewController.m` 中添加以下方法：\n\n```\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n{\n    if (error != nil) {\n        NSLog(@\"\
    请求好友列表时发生错误：%@\", [error localizedDescription]);\n    } else {\n        NSLog(@\"\
    好友列表：%@\", friends);\n    }\n}\n```\n\n如果你的好友列表中有任何好友，你应该会看到类似下面的输出：\n\n```\n\
    2011-02–01 12:56:32.759 UFOs[3328:207] 好友列表：(\n    \"G:1093075676\"\n)\n```\n\n\
    **注意：** 如果你尚未向沙盒环境添加任何好友，现在是添加的好时机。你可以在 `Game Center.app` 中创建新账户，并将它们添加为测试账户的好友。拥有一个非空的好友列表，对于本书的\
    \ Game Center 相关章节以及调试 Game Center 特定代码都很有价值。\n\n下一节将介绍如何处理从好友列表中获取的玩家数据。\n\n\
    ## 好友列表头像\n\n从 iOS 5.0 开始，Apple 增加了对好友头像的支持。玩家可以选择在 Game Center 应用中设置自己的头像。如果玩家尚未设置头像，Game\
    \ Center 会为其分配一个默认头像。要在你的应用中访问头像，你需要运行 iOS 5.0 或更高版本，并且需要实现一个新方法。以下方法在现有的 `GKPlayer`\
    \ 对象上调用（关于 `GKPlayer` 的更多信息，请参阅上一节）。头像图片大小有两种选项：`GKPhotoSizeNormal` 和 `GKPhotoSizeSmall`。\n\
    \n```\n[player loadPhotoForSize:GKPhotoSizeNormal withCompletionHandler: ^(UIImage\
    \ *photo, NSError *error) {\n    if (error == nil) {\n        [playerAvatarImageView\
    \ setImage:photo];\n    } else {\n        NSLog(@\"加载玩家头像时发生错误：%@\", [error localizedDescription]);\n\
    \    }\n}];\n```\n"
- fmt: '# Working with Players


    At the heart of the `Game Center` it is a social service, and as such, it revolves
    around players. You need to be aware of three properties associated with a `GKPlayer`
    object. The `isFriend` property is a Boolean that returns whether the player is
    a friend of the current local player. The other two properties handle the player’s
    name and alias. The `playerID` property is static and will always point to the
    same player. The `playerID` string should never be shown to the user in your app.
    The `alias` property, on the other hand, is dynamic and can be changed by the
    user at any time. It should never be used to test the identity of a user, but
    it should be the only string used to identify the player to your app’s user.


    > **Caution**

    > Do not make assumptions about the structure of the player identifier string.
    Its format and length are subject to change.


    When we retrieved the friends list, we did not get back an array of `GKPlayers`.
    Instead, we got back an array of their IDs. This is common behavior in Game Center.
    To help us work with players, we will add two additional convenience methods to
    translate player IDs into `GKPlayer` objects.


    We need to create two new methods: one will handle an array of player IDs, and
    the other will handle a single player ID. This will save us extra work down the
    road. We add the helper methods to our `GameCenterManager` class. First, add the
    new protocol method, and modify the relevant section of the `GameCenterManager.h`
    file to match the following code:


    ```

    @protocol GameCenterManagerDelegate <NSObject>


    @optional


    - (void)processGameCenterAuthentication:(NSError*)error;


    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;


    - (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;


    @end

    ```


    We will also add the following two new methods to the implementation file of the
    `GameCenterManager` class:


    ```

    - (void)playersForIDs:(NSArray *)playerIDs


    {


    [GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:^(NSArray
    *players, NSError *error) {


    [self callDelegateOnMainThread: @selector(playerDataLoaded:error:) withArg: players
    error: error];


    }];


    }


    - (void)playerforID:(NSString *)playerID


    {


    [GKPlayer loadPlayersForIdentifiers:[NSArray arrayWithObject:playerID] withCompletionHandler:^(NSArray
    *players, NSError *error) {


    [self callDelegateOnMainThread: @selector(playerDataLoaded:error:) withArg:players
    error:error];


    }];


    }

    ```


    Both methods will be using `loadPlayersForIdentifiers`. The only difference is
    that one will take a string and convert it to a single-item array, and the other
    will just take in an array. Again, we will use our thread-safe delegate callback.


    The last thing that we need to do is to implement the delegate callback in `UFOViewController`.
    We start by modifying the friends loaded method. This will translate our friends
    list into an array of `GKPlayer` objects. Modify your `friendsFinishedLoading`
    method to match the following:


    ```

    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;


    {


    if (error != nil) {


    NSLog(@"An error occured during friends list request: %@", [error localizedDescription]);


    } else {


    [gcManager playersForIDs: friends];


    }


    }

    ```


    You also need to add the new protocol method that we just defined. Add the following
    to the `UFOViewController.m` file.


    ```

    - (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;


    {


    if (error != nil) {


    NSLog(@"An error occured during player lookup: %@", [error localizedDescription]);


    } else {


    NSLog(@"Players loaded: %@", players);


    }


    }

    ```


    Now, when the app is run (assuming you have friends associated with your Game
    Center account), it will pull down a list of your friends’ player IDs, then perform
    a lookup and print the `GKPlayer` description to the console. Your output should
    look similar to the following.


    ```

    2011-02–01 14:20:23.335 UFOs[4038:207] Authentication Changed: <GKPlayer

    0x5f46fb0>(playerID: G:1092793231, alias: the_other_kyle, status: (null), rid:(null))

    2011-02–01 14:20:23.471 UFOs[4038:207] Players loaded: (

    "<GKPlayer 0x6a201e0>(playerID: G:1093075676, alias: johncash, status: (null),

    rid:(null))"

    )

    ```


    # Summary


    In this chapter, you learned how to test for Game Center compatibility and authenticate
    the local user for both iOS 6/7 and older versions. You should now have a strong
    grasp of how we will be using the `GameCenterManager` class and the benefits it
    will have on creating a clean code environment that will be easily reusable across
    multiple projects.


    In addition, you should now be comfortable working with `GKLocalPlayer`, `GKPlayer`,
    and the friends list. In the next chapter, we will take an in-depth look at leaderboards
    and expand on topics learned in this chapter. If you have any difficulty with
    anything discussed in this chapter, remember that the available source code (`www.apress.com`)
    contains working examples of all the topics discussed.


    # 3. Leaderboards


    > **Abstract**

    > What the ancients called a clever fighter is one who not only wins, but excels
    in winning with ease.

    >

    > —[Sun Tzu](http://www.goodreads.com/author/show/1771.Sun_Tzu), [The Art of War](http://www.goodreads.com/work/quotes/3200649)


    Leaderboards are older than video games themselves. The leaderboard, as we know
    it, goes back to the days of the original pinball games of the 1950s. The makers
    of these pinball games soon realized that adding a high-score list increased competition,
    which translates to more time played and more money earned.


    During the 1970s, when video games began to emerge, leaderboards were quickly
    adopted into these new games, making their first appearance as early as a game
    called Sea Wolf, released in 1976 (see Figure 3-1). Since then, they have played
    an integral part in the gaming culture. Leaderboards have become so widespread
    that, in 2007, The King of Kong, a full-length documentary, was released about
    the heated competition over the high score on Nintendo’s Donkey Kong. Leaderboards
    have become so mainstream that they are now not only desired but an expected part
    of any video game.


    ![A978-1-4302-4906-1_3_Fig1_HTML.jpg](A978-1-4302-4906-1_3_Fig1_HTML.jpg)


    **Figure 3-1.** Sea Wolf (1976), the first video game to feature a high score


    Game Center for iOS greatly simplifies adding leaderboards to an app. This is
    a huge improvement when you consider that, previously, the developer had to write
    and maintain a server to store and update score data. This chapter examines the
    steps required to implement multiple leaderboards under Game Center, as well as
    all the required leaderboard support. You will learn how to post scores, retrieve
    leaderboards, customize the graphical user interface (GUI) of leaderboards, and
    handle everything else needed to create leaderboards that are the right fit for
    your app.


    ## Why a Leaderboard?


    Before we get into working with leaderboards themselves, it is important to understand
    why leaderboards are an integral part of your social app or game.


    - Leaderboards create a sense of community in an app or game that, otherwise,
    might not allow your user to interact directly with other users.

    - Leaderboards drive users to return to your app in an effort to beat their own
    scores or their friend’s high scores.

    - Leaderboards create a sense of goal and accomplishment in an app.

    - Leaderboards make it easier for users to share their app experience and progress
    with their friends, family, and co-workers.

    - Leaderboards in Game Center are easy to implement and can make your app quickly
    feel more polished and finished.

    - With the addition of Leaderboard challenges in iOS 6, a player’s friends may
    drive them to return to your game through score challenges.'
