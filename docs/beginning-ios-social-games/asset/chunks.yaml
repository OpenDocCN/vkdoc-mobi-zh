  trans: "\n# 呈现匹配界面\n\n我们首先从使用 Apple 提供的标准匹配界面开始。首先添加一个新按钮，用于在我们的测试游戏主屏幕上呈现该视图。我还提前将旧的“开始游戏”按钮重命名为“单人游戏”，并创建了一个名为“多人游戏”的新按钮（见图\
    \ 5-1）。我们将使用 `UFOViewController` 作为匹配行为的委托，因此需要让该视图控制器遵循 `GKMatchmakerViewControllerDelegate`\
    \ 协议。此外，将刚刚添加的多人游戏按钮的操作方法修改为以下代码：\n\n```\n- (IBAction)multiplayerButtonPressed;\n\
    \n{\n\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\n\nrequest.minPlayers\
    \ = 2;\n\nrequest.maxPlayers = 2;\n\nGKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc] initWithMatchRequest:request];\n\nmmvc.matchmakerDelegate = self;\n\n\
    [request release];\n\n[self presentModalViewController:mmvc animated:YES];\n\n\
    [mmvc release];\n\n}\n```\n\n![A978-1-4302-4906-1_5_Fig1_HTML.jpg](img/A978-1-4302-4906-1_5_Fig1_HTML.jpg)\n\
    \n图 5-1. 在 `UFOViewController.xib` 中添加一个新的多人游戏按钮\n\n我们创建了一个新的 `GKMatchRequest`\
    \ 实例，正如上一节所做的那样。我们的演示游戏将正好包含两名玩家，因此我们将最大和最小玩家数都设置为 2。\n\n在代码片段的下一部分，我们创建了一个新的\
    \ `GKMatchViewController` 实例，并使用刚创建的 `GKMatchRequest` 对其进行分配和初始化。我们还将委托设置为我们的\
    \ `UFOViewController` 类。完成后，我们像呈现其他任何模态视图一样呈现它。你应该会看到类似图 5-2 的输出。\n\n![A978-1-4302-4906-1_5_Fig2_HTML.jpg](img/A978-1-4302-4906-1_5_Fig2_HTML.jpg)\n\
    \n图 5-2. `MatchmakerViewController` 创建包含两名玩家的新匹配界面\n\n如果你还没有这样做，现在正是为沙盒 Game Center\
    \ 账户填充好友列表的好时机。在这个过程中，手头有几个未使用的电子邮件地址会很有帮助，因为你不想使用之前与 iTunes Connect 或 Game Center\
    \ 关联过的任何电子邮件地址。一旦你添加了一两个好友，就可以继续点击图 5-2 中显示的“邀请好友”按钮。假设你已经完成了前面的步骤，系统将自动为你提供自动匹配功能。\n\
    \n**提醒**：在创建沙盒账户时，不要使用你之前在 iTunes Connect 或 Game Center 中使用过的任何电子邮件地址，否则可能会导致奇怪且意外的行为。\n\
    \n你现在应该能看到你的好友列表，并能够邀请他们进入你的应用，如图 5-3 所示。\n\n![A978-1-4302-4906-1_5_Fig3_HTML.jpg](img/A978-1-4302-4906-1_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 从你的 Game Center 好友列表中邀请一位好友\n\n在继续之前，我们需要实现 `GKMatchmakerViewController`\
    \ 的必需委托方法。具体来说，我们需要实现以下三个方法才能继续处理匹配：\n\n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController\
    \ *)viewController\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
    \ didFailWithError:(NSError *)error\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:NULL];\n    if (error != nil)\n    {\n        NSString *message =\
    \ [NSString stringWithFormat:@\"An error occurred: %@\", [error localizedDescription]];\n\
    \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\"\n     \
    \                                                   message:message\n        \
    \                                               delegate:nil\n               \
    \                               cancelButtonTitle:@\"Dismiss\"\n             \
    \                                 otherButtonTitles:nil];\n        [alert show];\n\
    \        [alert release];\n    }\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController didFindMatch:(GKMatch *)match\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:NULL];\n}\n```\n\n前两个方法处理用户取消和失败的情况，而第三个方法处理成功的情况。最后一个方法在成功时会返回一个\
    \ `GKMatch` 对象；我们将在后续章节中使用该对象来开始一场新的比赛。\n\n当每场比赛允许的玩家数量可变时，用户将可以选择在匹配视图控制器中添加或移除玩家槽位，如图\
    \ 5-4 所示。\n\n![A978-1-4302-4906-1_5_Fig4_HTML.jpg](img/A978-1-4302-4906-1_5_Fig4_HTML.jpg)\n\
    \n图 5-4. 具有可变玩家数量的匹配界面\n\n在邀请好友加入 Game Center 比赛时，你可以选择附带一条简短消息显示在邀请中，如图 5-5 所示。\n\
    \n![A978-1-4302-4906-1_5_Fig5_HTML.jpg](img/A978-1-4302-4906-1_5_Fig5_HTML.jpg)\n\
    \n图 5-5. 向好友发送邀请消息，请求他们与你开始一场比赛。此消息将作为推送通知发送，并在受邀者的设备上显示为一条传入的文本消息，如图 5-6 所示\n"
- fmt: "# Handling Incoming Invitations\n\nWhen implementing matchmaking into your\
    \ app, you must also implement a system to handle invitations from friends. The\
    \ invitee’s device will receive a push notification informing them that one of\
    \ their friends has invited them to play a game. Assuming they have the game installed\
    \ and accept the invitation, you will be required to handle connecting the two\
    \ players together via a new match. If the invitee does not have the game or app\
    \ installed, they will be instructed to download it. After the download is finished,\
    \ the normal invitation process is followed.\n\n> **Note**\n> \n> You will also\
    \ need to process invitations from new matches created within `Game Center.app`.\
    \ You most likely won’t need to write any additional code; however, you do want\
    \ to test this interaction path thoroughly.\n\nWe will process invitations using\
    \ an invitation handler (special thanks to Apple for the naming). The invitation\
    \ handler accepts two parameters; only one of these parameters will be non-nil,\
    \ depending on the type of invitation you are handling.\n\n- The `acceptInvite`\
    \ parameter is non-nil when the app receives an invitation from a Game Center\
    \ friend. The player who invited you has already created the match request, so\
    \ your app will not need to create its own when accepting the invitation.\n- The\
    \ `playersToInvite` parameter, which we discussed earlier in this chapter, is\
    \ non-nil when `Game Center.app` launches your app. The property contains an array\
    \ of player identifiers for the player to invite with a new `GKMatchRequest`.\
    \ When the `playersToInvite` property is non-nil, you will be required to create\
    \ a new `GKMatchRequest` and populate it with the players that you received here.\n\
    \n> **Important**\n> \n> When working with the sandboxed mode and invitations,\
    \ there can be some quirkiness. If you find yourself never getting the invited\
    \ push notification, open up the app on both devices and invite the other player\
    \ on both devices. After this has been done once, it restores the ability to test\
    \ invitations from the Springboard.\n\nNow that we know what kind of parameters\
    \ we will be working with, as well as the scenarios that we will encounter, we\
    \ can begin to write a new invitation handler. `GKMatchmaker` has a singleton\
    \ method called `sharedMatchmaker`, which accepts a property for `inviteHandler`.\
    \ We use a block here to set up and handle the invitations as they are received.\
    \ To keep things clean and simple, we wrap our invitation handler in its own method\
    \ in our `GameCenterManager` class. Add the following new method to `GameCenterManager`:\n\
    \n```\n- (void)setupInvitationHandler:(id)inivationHandler;\n\n{\n\n[GKMatchmaker\
    \ sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,É\n\nNSArray *playersToInvite)\n\
    \n{\n\nGKMatchmakerViewController *mmvc = nil;\n\nif (acceptedInvite) {\n\nmmvc\
    \ = [[GKMatchmakerViewController alloc] initWithInvite:acceptedInvite];\n\n} else\
    \ if (playersToInvite) {\n\nGKMatchRequest *request = [[GKMatchRequest alloc]\
    \ init];\n\nrequest.minPlayers = 2;\n\nrequest.maxPlayers = 2;\n\nrequest.playersToInvite\
    \ = playersToInvite;\n\nmmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];\n\
    \n[request release];\n\n}\n\nmmvc.matchmakerDelegate = inivationHandler;\n\n[inivationHandler\
    \ presentViewController:mmvc animated:YES completion:NULL];\n\n[mmvc release];\n\
    \n};\n\n}\n```\n\nLet’s break down this method to see exactly what is happening\
    \ at each step of the process. The first thing we do is set a block to the `inviteHandler`\
    \ property on the `shareMatchmaker` singleton. When this block is executed, which\
    \ will happen when a user accepts an invitation, we have two possible outcomes.\n\
    \nThe first is that `acceptedInvite` is not nil. In this scenario, we create a\
    \ new instance of `GKMatchmakerViewController` and initialize it with the invitation\
    \ that was accepted. We then present the view controller to the user.\n\nIn the\
    \ second scenario, `playersToInvite` is non-nil, in which case we then need to\
    \ create a new instance of `GKMatchRequest`. In our example game, we only ever\
    \ allow two players, but you will set this to the total maximum players that can\
    \ be played against here. We set the `playersToInvite` property of the request\
    \ to the array of player IDs that was passed in from the block. After we have\
    \ created the new request object, we can create a `GKMatchmakerViewController`\
    \ to present the information to our user. They will see the standard matchmaker\
    \ view with the players prepopulated for them.\n\n> **Important**\n> \n> You cannot\
    \ accept or otherwise process the invitation formally until you have authenticated\
    \ a local user with Game Center. It is, therefore, important to register an invitation\
    \ handler as soon after a successful authentication as possible.\n\nBecause we\
    \ want this to be called as soon as possible after authenticating with Game Center,\
    \ we add a call to the new `setupInvitationHandler:` method after we have successfully\
    \ authenticated. Modify the `processGameCenterAuthentication` method of `UFOViewController`\
    \ to match the following code:\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    \n{\n\nif (error != nil) {\n\nNSLog(@\"An error occured during authentication:\
    \ %@\",É\n\n[error localizedDescription]);\n\n} else {\n\n[gcManager setupInvitationHandler:self];\n\
    \n}\n\n}\n```\n\n> **Tip**\n> \n> If you don’t have two devices to test invitations\
    \ on, you can use the simulator as one of the devices. Don’t forget to sign in\
    \ to the simulator and your device from two different Game Center accounts, or\
    \ you won’t be able to invite each other.\n\nWe will use `self` (that is, `UFOViewController`)\
    \ as the delegate for our invitation handler. If you completed the required delegate\
    \ calls in the previous section, “Presenting a Match GUI,” you will not need to\
    \ make any additional changes to this class.\n\nCongratulations! You can now handle\
    \ incoming invitations to your app (see Figure [5-6](#A978-1-4302-4906-1_5_Chapter.html#Fig6)).\
    \ In the next section, we will explore how to configure auto-matching to populate\
    \ invitees for you.\n\n> **Note**\n> \n> The buy-now feature of invitations cannot\
    \ be tested in the sandboxed environment; it can be used only in live apps. The\
    \ app must be installed on every device being used in order to test invitations\
    \ while in sandbox.\n\n![A978-1-4302-4906-1_5_Fig6_HTML.jpg](A978-1-4302-4906-1_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6.** Receiving an invitation outside of your App. The name of your\
    \ app is automatically populated into the alert view. While inviting, you have\
    \ the option of specifying a message, as shown previously in Figure [5-5](#A978-1-4302-4906-1_5_Chapter.html#Fig5)\n\
    \n## Auto-Matching\n\nAuto-matching is a great feature provided to you for no\
    \ extra effort when working with Game Center. Game Center keeps an online queue\
    \ of people who are waiting to join a multiplayer game in your app. If you do\
    \ not fill up a new match request with all invited friends, the auto-matching\
    \ feature will automatically populate the remaining spots with other unmatched\
    \ players online.\n\nYou can filter down the auto-matched results using player\
    \ groups and player attributes, both of which will be discussed later in this\
    \ chapter. In addition, you can query the activity of any live player group to\
    \ see what the average wait time is to be paired up with a new match; this is\
    \ also discussed more in a later section."
  raw: '## Handling Incoming Invitations


    When implementing matchmaking into your app, you must also implement a system
    to handle invitations from friends. The invitee’s device will receive a push notification
    informing them that one of their friends has invited them to play a game. Assuming
    they have the game installed and accept the invitation, you will be required to
    handle connecting the two players together via a new match. If the invitee does
    not have the game or app installed, they will be instructed to download it. After
    the download is finished, the normal invitation process is followed.


    Note


    You will also need to process invitations from new matches created within Game
    Center.app. You most likely won’t need to write any additional code; however,
    you do want to test this interaction path thoroughly.


    We will process invitations using an invitation handler (special thanks to Apple
    for the naming). The invitation handler accepts two parameters; only one of these
    parameters will be non-nil, depending on the type of invitation you are handling.


    *   The `acceptInvite` parameter is non-nil when the app receives an invitation
    from a Game Center friend. The player who invited you has already created the
    match request, so your app will not need to create its own when accepting the
    invitation.

    *   The `playersToInvite` parameter, which we discussed earlier in this chapter,
    is non-nil when Game Center.app launches your app. The property contains an array
    of player identifiers for the player to invite with a new `GKMatchRequest`. When
    the `playersToInvite` property is non-nil, you will be required to create a new
    `GKMatchRequest` and populate it with the players that you received here.


    Important


    When working with the sandboxed mode and invitations, there can be some quirkiness.
    If you find yourself never getting the invited push notification, open up the
    app on both devices and invite the other player on both devices. After this has
    been done once, it restores the ability to test invitations from the Springboard.


    Now that we know what kind of parameters we will be working with, as well as the
    scenarios that we will encounter, we can begin to write a new invitation handler.
    `GKMatchmaker` has a singleton method called `sharedMatchmaker`, which accepts
    a property for `inviteHandler`. We use a block here to set up and handle the invitations
    as they are received. To keep things clean and simple, we wrap our invitation
    handler in its own method in our `GameCenterManager` class. Add the following
    new method to `GameCenterManager`:


    `- (void)setupInvitationHandler:(id)inivationHandler;`


    `{`


    `[GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,`É


    `NSArray *playersToInvite)`


    `{`


    `GKMatchmakerViewController *mmvc = nil;`


    `if (acceptedInvite) {`


    `mmvc = [[GKMatchmakerViewController alloc] initWithInvite:acceptedInvite];`


    `} else if (playersToInvite) {`


    `GKMatchRequest *request = [[GKMatchRequest alloc] init];`


    `request.minPlayers = 2;`


    `request.maxPlayers = 2;`


    `request.playersToInvite = playersToInvite;`


    `mmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];`


    `[request release];`


    `}`


    `mmvc.matchmakerDelegate = inivationHandler;`


    `[inivationHandler presentViewController:mmvc animated:YES completion:NULL];`


    `[mmvc release];`


    `};`


    `}`


    Let’s break down this method to see exactly what is happening at each step of
    the process. The first thing we do is set a block to the `inviteHandler` property
    on the `shareMatchmaker` singleton. When this block is executed, which will happen
    when a user accepts an invitation, we have two possible outcomes.


    The first is that `acceptedInvite` is not nil. In this scenario, we create a new
    instance of `GKMatchmakerViewController` and initialize it with the invitation
    that was accepted. We then present the view controller to the user.


    In the second scenario, `playersToInvite` is non-nil, in which case we then need
    to create a new instance of `GKMatchRequest`. In our example game, we only ever
    allow two players, but you will set this to the total maximum players that can
    be played against here. We set the `playersToInvite` property of the request to
    the array of player IDs that was passed in from the block. After we have created
    the new request object, we can create a `GKMatchmakerViewController` to present
    the information to our user. They will see the standard matchmaker view with the
    players prepopulated for them.


    Important


    You cannot accept or otherwise process the invitation formally until you have
    authenticated a local user with Game Center. It is, therefore, important to register
    an invitation handler as soon after a successful authentication as possible.


    Because we want this to be called as soon as possible after authenticating with
    Game Center, we add a call to the new `setupInvitationHandler:` method after we
    have successfully authenticated. Modify the `processGameCenterAuthentication`
    method of `UFOViewController` to match the following code:


    `- (void)processGameCenterAuthentication:(NSError*)error;`


    `{`


    `if (error != nil) {`


    `NSLog(@"An error occured during authentication: %@",`É


    `[error localizedDescription]);`


    `} else {`


    `[gcManager setupInvitationHandler:self];`


    `}`


    `}`


    Tip


    If you don’t have two devices to test invitations on, you can use the simulator
    as one of the devices. Don’t forget to sign in to the simulator and your device
    from two different Game Center accounts, or you won’t be able to invite each other.


    We will use `self` (that is, `UFOViewController`) as the delegate for our invitation
    handler. If you completed the required delegate calls in the previous section,
    “Presenting a Match GUI,” you will not need to make any additional changes to
    this class.


    Congratulations! You can now handle incoming invitations to your app (see Figure
    [5-6](#A978-1-4302-4906-1_5_Chapter.html#Fig6)). In the next section, we will
    explore how to configure auto-matching to populate invitees for you.


    Note


    The buy-now feature of invitations cannot be tested in the sandboxed environment;
    it can be used only in live apps. The app must be installed on every device being
    used in order to test invitations while in sandbox.


    ![A978-1-4302-4906-1_5_Fig6_HTML.jpg](A978-1-4302-4906-1_5_Fig6_HTML.jpg)


    Figure 5-6.


    Receiving an invitation outside of your App. The name of your app is automatically
    populated into the alert view. While inviting, you have the option of specifying
    a message, as shown previously in Figure [5-5](#A978-1-4302-4906-1_5_Chapter.html#Fig5)


    ## Auto-Matching


    Auto-matching is a great feature provided to you for no extra effort when working
    with Game Center. Game Center keeps an online queue of people who are waiting
    to join a multiplayer game in your app. If you do not fill up a new match request
    with all invited friends, the auto-matching feature will automatically populate
    the remaining spots with other unmatched players online.


    You can filter down the auto-matched results using player groups and player attributes,
    both of which will be discussed later in this chapter. In addition, you can query
    the activity of any live player group to see what the average wait time is to
    be paired up with a new match; this is also discussed more in a later section.'
