                                    `[self stopShowingSpeakingPlayer: playerID];`


                                    `break;`


             `}`


        `};`


    Note


    Player state updates are handled per channel. You will need to configure one for
    each channel on which you wish to watch for changes.


    ## Voice Chat for Game Kit


    When working with Game Kit Voice Chat, we will focus on the `GKVoiceChatService`
    object. The fundamentals of Game Kit Voice Chat are very similar to Game Center
    Voice Chat. A good starting point for implementing this system is after you are
    returned a `GKSession` object, when you connect to another player using the Peer
    Picker system. It is important to note that `GKVoiceChatService` is designed to
    send data to only one peer at a time. Although this isn’t a limitation yet, as
    Game Kit only supports two peers, it is important to keep in mind should the API
    ever be expanded.


    Note


    Don’t forget to check `[GKVoiceChatService isVoIPAllowed]` to make sure you are
    able to support voice chat before you continue. Some devices, such as the first-generation
    iPod touch, are unable to support voice chat.


    ### Creating an Audio Session


    As with Game Center, we can begin to work with Game Kit Voice Chat by first creating
    a new `AVAudioSession`. It is important to make sure that you create the session
    prior to beginning any voice chat service calls.


        `NSError *error = nil;`


        `AVAudioSession *audioSession = [AVAudioSession sharedInstance];`


            `if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])`


