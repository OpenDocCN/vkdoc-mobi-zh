    \n```\n-(void)viewDidLoad\n{\n    if (self.gameIsMultiplayer)\n    {\n       \
    \ CGRect otherPlayerFrame = CGRectMake(100, 70, 80, 34);\n        otherPlayerImageView\
    \ = [[UIImageView alloc] initWithFrame:otherPlayerFrame];\n        otherPlayerImageView.animationDuration\
