- fmt: '![A978-1-4302-4906-1_BookFrontmatter_Fig1_HTML.jpg](A978-1-4302-4906-1_BookFrontmatter_Fig1_HTML.jpg)
    Kyle Richter is the founder of Dragon Forged Software, an award-winning iOS and
    Mac development company, and co-founder of Empirical Development, a for-hire iOS
    shop. Kyle began writing code in the early 90s and has always been dedicated to
    the Mac platform. He is the author of Beginning iOS Game Center and Game Kit:
    For iPhone, iPad, and iPod touch and iOS Components (`http://amzn.to/1fi9Zdt`)
    and Frameworks: Understanding the Advanced Features of the iOS SDK (`http://amzn.to/19rcIiO`).
    Kyle also maintains a blog on the iOS development community, which can be found
    at `http://KyleRichter.com`. He manages a team of over 30 full-time iOS developers
    and runs day-to-day operations at two development companies. His early works include
    the first mobile location-based peer-to-peer service, the first iOS credit card
    processor, and the first multiplayer iOS game. Kyle travels the world speaking
    on development and entrepreneurship; currently he calls the Florida Keys his home,
    where he spends his time with his border collie. He can be found on Twitter @kylerichter.


    ## About the Technical Reviewers


    ![A978-1-4302-4906-1_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-4906-1_BookFrontmatter_Fig2_HTML.jpg)
    Marcus S. Zarra is co-owner of Empirical Development, LLC (`http://empiricaldevelopment.com`),
    based in Colorado. He has been developing Cocoa software since 2003 and Java software
    since 1996, and he has been in the industry since 1985. Currently Marcus is producing
    software for iOS and OS X. In addition to writing software, he assists other developers
    by blogging about development and supplying code samples on Cocoa Is My Girlfriend
    (`http://www.cimgf.com`). Marcus is also the author of Core Data (2nd edition):
    Data Storage and Management for iOS, OS X, and iCloud (`http://pragprog.com/book/mzcd2/core-data`)
    and co-author of Core Animation: Simplified Animation Techniques for Mac and iPhone
    Development (`http://amazon.com/Core-Animation-Simplified-Techniques-Development/dp/0321617754/ref=sr_1_1?ie=UTF8&qid=1307226039&sr=8-1`).
    You can find Marcus on Twitter (`https://twitter.com/mzarra`), on App.net (`https://alpha.app.net/mzarra`),
    and on StackOverflow (`http://stackoverflow.com/users/10673/marcus-s-zarra`).


    ![A978-1-4302-4906-1_BookFrontmatter_Fig3_HTML.jpg](A978-1-4302-4906-1_BookFrontmatter_Fig3_HTML.jpg)
    Lucas L. Jordan is a lifelong computer enthusiast who has worked for many years
    as a developer, with a focus on user interface. He is the author of JavaFX Special
    Effects: Taking Java RIA to the Extreme with Animation, Multimedia, and Game Elements
    and the co-author of Practical Android Projects, both by Apress. Lucas is interested
    in mobile application development in its many forms. He has recently quit his
    day job to pursue a career developing apps under the name ClayWare, LLC. Learn
    more at `http://claywaregames.com`.


    ## Introduction


    Mobile games are social and becoming more integrated into our social lives every
    day. Game Center and Game Kit are Apple’s answers to integrating social aspects
    into iOS games, making it easier than it has ever been before to add items like
    leaderboards, achievements, multiplayer, and voice chat. Social network integration
    exists on everything from cars to refrigerators, and adding Twitter and Facebook
    support to an iOS game has become just about a requirement. Airplay and game controllers
    may be the next great leap forward in mobile gaming, if history has taught us
    anything; those that are a step ahead of the future are positioned for success.


    ## Prerequisites


    This book assumes that you have the basic skills and understanding required to
    create an iOS app. It also assumes that you have the background necessary to work
    with Xcode 5.0. There will be no primer on how to define methods and variables,
    install and launch Xcode, or create and work with new classes. There are many
    excellent books on those topics. When you feel ready to begin working with some
    of the more advanced Cocoa technologies such as Game Center and Game Kit, be sure
    that you have the basics mastered to a degree that allows you to move through
    this book without consulting other texts for help.


    In addition to the basic requirements, Game Center and the other frameworks covered
    also heavily leverage blocks, which are a fairly new programming concept to Objective-C.
    If you haven’t yet worked with blocks, we recommend that you read Apple’s guide
    to them, which you can find by searching for blocks at `http://developer.apple.com`.
    You should also feel comfortable working with all the features that were introduced
    with the Objective-C 2.0 release.


    ## How This Book Is Organized


    As you begin working through this book, you will notice that its chapters are
    essentially standalone. Every effort has been made so that each chapter can be
    read independently of the others. If you have no experience with Game Center or
    Game Kit yet, it is highly recommended that you read the first two chapters before
    skipping around, as they will provide you with the basic information on how to
    get Game Center and Game Kit up and running in your development environment. The
    final four chapters are built on top of the sample code from Chapter 3 and do
    not continually build on the existing product.


    Each chapter follows along with a simple sample iOS game that is introduced in
    Chapter 1. Following along with the book from start to finish will walk you through
    the process of creating a fully functional Game Center and Game Kit–leveraged
    iOS game. In addition, each chapter will build onto a Game Center Manager class
    that is designed to be reusable across all of your projects. Chapters 12 and 13
    will introduce you to Social Framework and adding Twitter and Facebook support
    to the sample game. Chapters 14 and 15 cover Airplay and Game Controllers.


    If you already have a background in general iOS development or Game Center and
    are looking for help on a specific technology, each chapter is designed to walk
    you through its covered technology, as well as provide samples showing how to
    apply the technology to your software.


    ## Source Code


    The source code for the projects found in this book is available at `www.apress.com/source-code/`.
    Source code is made available in both ARC (Automatic Reference Counting) and non-ARC
    formats. The code examples used in the text of this book are non-ARC; this is
    done because it is easier to add ARC support then to remove it. While ARC is quickly
    becoming the standard there are developers, managers, and projects, which for
    one reason or another are not ARC ready yet.'
