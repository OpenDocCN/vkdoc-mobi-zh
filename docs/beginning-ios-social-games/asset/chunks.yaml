            `{`


                `if(error)`


                `{`


                    `NSLog(@"An error occurred while starting audio session: %@",
    [errorÉ localizedDescription]);`


                `}`


            `}`


    ### Required Overhead


    Unlike the Game Center approach, Game Kit requires a bit more overhead to get
    things up and running. The first thing you need to do is implement a few required
    methods. The following first method posted returns the peerID for the player that
    you wish to communicate with. This value is easily retrieved from your current
    `GKSession` object:


    `- (NSString *)participantID`


    `{`


        `return session.peerID;`


    `}`


    You also need to implement a method to send the voice data to the connected peer,
    and another that will handle receiving the data; both of these methods are available
    in the following code snippets. Together, these two methods will handle the sending
    and receiving of voice data for your app.


    `- (void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData
    *)data toParticipantID:(NSString *)participantID`


    `{`


