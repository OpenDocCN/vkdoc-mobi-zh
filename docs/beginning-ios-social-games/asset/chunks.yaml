    # 只发送必要的数据


    新手在设计网络时最容易犯的错误之一就是发送过多数据。把所有内容一股脑发出去确实简单。本章开头我们就讨论过一款存在这个问题的游戏。


    > “如果我有更多时间，我会写一封更短的信。” ——布莱兹·帕斯卡


    这句常被误引的名言，其实完全可以用来形容网络数据包。数据包的大小直接关系到网络的速度、稳定性和可扩展性。花时间弄清楚什么是最低限度的必要发送数据，这一点至关重要。


    来看一个你在设计游戏时可能遇到的虚构例子。假设你正在开发一款角色扮演游戏：你控制自己的英雄，引导他/她穿过一系列地下城。在这些地下城中，你可以与物品互动，并遭遇各种敌人，实时展开战斗。我们知道会有一些静态数据；例如，你在迷宫内时，迷宫布局很可能不会改变。因此，我们不应该每帧甚至定期将地图瓦片发送给客户端，而应该在玩家首次进入该区域时发送这些数据。或许会有一些移动的元素，但其行为我们可以无限预测，比如流动的河流或闪烁的火把。这些物品也可以一次性加载，同时带上它们保持同步所需的信息。


    当然，在玩家于地下城冒险的过程中，有些物品需要持续更新。玩家自身每次创建新动作时都需要更新。例如，如果你在向东跑，可以每帧发送一个数据包来告诉服务器你在向东跑。然而，处理这种交互更高效的方式是告诉服务器“开始以全速向东移动”。当你停止向东移动时，再通知服务器“停止”。这种交互方式能大幅减少完成相同任务所需发送给服务器的消息数量。正是诸如此类的优化，解释了为什么玩现代游戏时，你有时会看到断线的玩家冲着墙跑——服务器在客户端断线前从未收到过
    `stop-running` 命令。


    请花时间精心设计你网络数据的结构。你总可以随时添加更多信息，但随着网络设计深入，去除数据就会变得非常困难。始终寻找减小数据包大小的方法，因为数据包太小没有任何坏处，但一个过大的数据包会在未来给你和你的用户带来很多麻烦。


    ## 预测与外推


    再考虑另一个例子：这次是赛车游戏。每位玩家控制一辆赛车在赛道上行驶。我们知道每辆车在比赛开始时的位置。我们也知道，由于网络往返延迟，我们发送给服务器的任何消息都会带有固有延迟。难道我们不应该等待服务器告知后才更新赛车位置吗？那会导致游戏体验非常卡顿。为了解决这个常见问题，我们使用预测技术。


    我们知道，在接下来的几帧里，赛车十有八九会继续沿着当前路线行驶。我们会假设事物会保持当前状态，直到服务器另有通知；如果用户稍微向左或向右转向，这就是当服务器通知我们更新时需要进行的一个微小修正。运动中的物体在不受到外力作用时会保持运动状态，这不仅是物理定律，也是设计预测网络的第一个规则。


    物体完全逆转其当前路线的概率，远低于物体对其当前路线进行微调的概率。这样一来，如果服务器通知你某些状态不同步，处理这些微小变化就更容易了。如果玩家确实完全改变了方向，或者以其他方式打破了你对后续行为的预测，你的预测误差最多也就等于当前的延迟，这通常只是几分之一秒。如果你有一个很可能继续保持当前状态的对象——比如移动中的玩家、下落状态的物体、子弹轨迹或任何类型的物理模拟——最好的办法就是假设这些动作将继续，直到服务器通知你它们已改变。


    利用这些信息，你可以预测服务器将要传来的数据，你的网络看起来就会比实际速度快得多。预测网络技术就是为什么你在游戏中遇到延迟时，有时会看到玩家或物体轻微跳来跳去的原因。


    ## 消息格式化


    无论何时为游戏或类游戏应用程序设计网络，你都必须处理至少两种类型的消息。它们通常被称为状态消息和服务器消息。状态消息是直接影响游戏引擎的消息，例如玩家移动或开启宝箱。服务器消息处理的是将一切粘合在一起的“胶水”，例如连接、断开连接、心跳包和错误。


    快速将这些消息分派到不同的处理器至关重要。保持这些消息的解析代码放在不同位置是一个良好的设计模式。毕竟，你不会想在第一人称射击游戏中扫描所有聊天消息来寻找客户端超时消息。


    有许多不同的方法来实现这种分离，但我发现大多数情况下使用一个简单的前缀就足够了。如果你为所有状态消息添加一个服务器消息中不会出现的特殊字符前缀，就可以快速检查传入消息的第一个字符，确保每条消息都被送达正确的解析器。如果你在设计一个更复杂的网络，可以使用大量可能的前缀来确保消息送达正确的位置。在第
    8 章中，当我们开始发送和接收数据时，我们将研究消息格式化的实际示例。

    '
- fmt: '# Preventing Cheating and Preventing Timeout-Related Disconnections


    One thing that is not a big concern on the iOS platform, as of yet, is cheating
    through network exploits. If you are an online gamer, you are probably all too
    familiar with this behavior. A clever user will determine how the network behaves,
    and then send commands that the client itself would never send, such as `increase
    hit points to max float` or `decrease respawn time to zero`. Although you might
    need to have your server respond to things such as `increase` or `decrease hit
    points`, you want to make sure the server is in control. For example, instead
    of letting the client say `“increase moment speed to fifty feet per frame,”` you
    should set up the message to something like `“request increase moment speed”`
    and then have the server return the new speed. If you put clients in charge of
    variables, at some point someone will take advantage of this and exploit your
    system.


    If your client doesn’t have any updates to send out to the server or its peers,
    it is good practice to send a message that simply states, `“I’m still here don’t
    disconnect me,”` which is known as a `“keep alive”` message. Although you don’t
    have to worry about timeout disconnection on the iOS platform, it is still a good
    idea to make sure that you keep your own line of communication open between idle
    peers.


    When you are designing message architecture, you can really think of it as designing
    an API; there are a lot of similarities and you have to follow the same guidelines.
    If you ship version one of your app with a command that lets users query for their
    movement speed, you can’t easily pull out that command in version two, because
    previous clients might still be depending on it. Follow the same guidelines that
    API developers do: test everything thoroughly, because after it is out in the
    wild, it is very hard to get it back.


    # What to Do When All Else Fails


    An issue that is bound to come up when you have been working with network design
    or even software development long enough what to do when the system you have designed
    no longer meets your needs. Let’s discuss something that might be familiar to
    those of you who have some logic or business training. There is a syndrome known
    as the `“Sunk Cost Fallacy,”` where when dealing with nonrefundable resources,
    such as time; those costs are weighed as equally as refundable costs. Take a look
    at the following equation.


    - `Payoff = project revenue – open cost`


    Now let’s look at the same example using some real-world data. In 1968, two researchers,
    Knox and Inkster, approached 141 horse bettors: 72 of the people had just finished
    placing a $2.00 bet within the past 30 seconds, and 69 people were about to place
    a $2.00 bet within the next 30 seconds. The hypothesis was that people who had
    just committed themselves to a course of action would reduce post-decision dissonance
    by believing more strongly than ever that they had picked a winner. Knox and Inkster
    asked the bettors to rate their horse’s chances of winning on a seven-point scale.
    What they found was that people who were about to place a bet rated the chance
    that their horse would win at an average of 3.48, which corresponded to a `“fair
    chance of winning,”` whereas people who had just finished betting gave an average
    rating of 4.81, which corresponded to a `“good chance of winning.”` This hypothesis
    was confirmed: after making a $2.00 commitment, people became more confident that
    their bet would pay off. Knox and Inkster performed an ancillary test on the patrons
    of the horses themselves and managed to repeat their finding almost identically.[¹](#A978-1-4302-4906-1_7_Chapter.html#Fn1)


    What we are talking about is accepting when it is time to give up and start over.
    When you have invested time and money into a `“horse,”` you eventually feel that
    it is more valuable than it actually is. Giving up is never a popular solution;
    our brains are wired against it. We look at the nonrefundable cost and calculate
    that into our favor. Once you have already made an investment, it is easier to
    justify that investment and try to defend it. No one wants to be the person to
    call it quits and throw away all the time and money already invested into a project;
    however, when you spend time and resources on a development project, they are
    spent and they cannot be recouped. You cannot justify more time simply based on
    time spent.


    There is no right answer on when to give up and start over, and there is no wrong
    answer. The only thing you can do is look at the problem objectively. If you hadn’t
    already invested in this problem, what solution would you pick?


    # Summary


    In this chapter, we looked at the design of actual networks, as opposed to the
    iOS-specific information that we have dealt with in the rest of this book. You
    could easily design a working network without the information in this chapter,
    through common sense and gut instinct, but keep in mind the lesson learned throughout
    this chapter: just because something works, doesn’t mean it works well. Designing
    a network is easy; designing a network correctly is very difficult.


    There is significantly more information on network design than can easily fit
    into a single chapter, or even a single book. If I can leave you with a final
    piece of advice: when you begin to look at how to structure your network, think
    through everything as you go, and never feel the need to be satisfied with your
    first solution.


    In the next chapter, we will finally get to work with sending our messages from
    one device to another. [Chapter 10](#A978-1-4302-4906-1_10_Chapter.html) will
    also be an extension of that technology where we look into how to add voice chat
    services to your iOS app.


    ## Footnotes


    [¹](#A978-1-4302-4906-1_7_Chapter.html#Fn1_source) Knox, R. E., & Inkster, J.
    A. (1968). `“Postdecision dissonance at post time.”` Journal of Personality and
    Social Psychology, 8, 319–323.


    # 8. Exchanging Data


    ## Abstract


    In the past few chapters, we explored how to connect to peers through a variety
    of methods. So far, we have not been able to do much with that connection. In
    this chapter, you will learn all that there is to know about exchanging data between
    sets of peers using `Game Kit` and `Game Center` networking. In previous chapters
    we have already added to our UFO game the ability to find peers using both `Game
    Center` and the `Peer Picker` (`Game Kit`). We will now add the ability to actually
    play a complete multiplayer match.


    Because all the groundwork has already been laid out in previous chapters, there
    are only two items that we need to worry about for exchanging data. First, we
    need to send the actual data; second, we need to receive and process that data
    on the other side. Everything else that we need to do is already done, except
    some logic for disconnecting that we’ll address at the end of the chapter. Let’s
    jump right into it by modifying our source code from [Chapter 6](#A978-1-4302-4906-1_6_Chapter.html).'
