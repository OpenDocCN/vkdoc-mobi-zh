  trans: "\n### 将玩家绘制到视图上\n\n接下来，我们需要创建“玩家”：\n\n```\nCGRect playerFrame = CGRectMake(100,\
    \ 70, 80, 34);\nmyPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
    [myPlayerImageView setAnimationDuration:0.75];\n[myPlayerImageView setAnimationRepeatCount:99999];\n\
    NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Saucer1.png\"\
    ],\n [UIImage imageNamed: @\"Saucer2.png\"], nil];\n[myPlayerImageView setAnimationImages:imageArray];\n\
    [myPlayerImageView startAnimating];\n[self.view addSubview: myPlayerImageView];\n\
    ```\n\n为此，我们创建一个新的 `UIImageView`，并用预定义的 frame 对其进行初始化。接下来的四行代码是 `UIImageView`\
    \ 中一个鲜为人知但非常实用的功能：我们为 `UIImageView` 设置了一个图像数组，它会在这些图像之间循环切换。在本例中，我们设置了两张图像进行轮换。我们还需要指定完整动画的持续时长（此例中为\
    \ 3/4 秒），以及动画的重复次数。动画细节设置完成后，我们在 `UIImageView` 上调用 `startAnimating`。接下来，我们只需要将\
    \ `UIImageView` 添加到主视图中即可。这样，屏幕上就出现了一个正在播放动画的玩家！\n\n### 设置奶牛、牵引光束和得分\n\n我们需要创建并显示多个游戏元素。首先，我们来创建得分标签，它会向玩家通报游戏过程中的进度。\n\
    \n```\ncowArray = [[NSMutableArray alloc] init];\ntractorBeamImageView = [[UIImageView\
    \ alloc] initWithFrame: CGRectZero];\nscore = 0;\n[scoreLabel setText:[NSString\
    \ stringWithFormat: @\"SCORE %05.0f\", score]];\n```\n\n得分标签本身已经通过 Interface Builder\
    \ 放置在了视图上。\n\n```\nfor (int x = 0; x < 5; x++) {\n        [self spawnCow];\n}\n\
    [self updateCowPaths];\n```\n\n在 `viewDidLoad` 方法中，我们需要做的最后一件事是创建一些奶牛并将其放置在屏幕上。这里有一个辅助方法用于生成这些奶牛。每次调用该方法，它都会创建一头新奶牛并放置到屏幕上。我们将在本节的稍后部分详细了解这个方法。我们还会调用另一个辅助方法来更新奶牛的行走路径，稍后也会深入探讨这个方法。\n\
    \n### 处理旋转事件\n\n代码中出现的下一个方法是 `shouldAutorotateToInterfaceOrientation`，如下所示：\n\n\
    ```\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)\n\
    interfaceOrientation\n{\n        if (UIInterfaceOrientationIsLandscape(interfaceOrientation))\
    \ {\n                return YES;\n       }\n        return NO;\n}\n```\n\n虽然这看起来只是一小段代码，但它对于确保游戏不允许用户旋转到竖屏模式，同时允许用户在两种横屏方向下进行游戏，至关重要。\n\
    \n### 添加玩家移动\n\n这涵盖了所有初始化和设置代码。现在我们可以进入游戏更令人兴奋的部分了。首先，我们需要处理用户输入和操作，然后是游戏玩法功能。\n\
    \n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\n\
    \ *)acceleration\n{\n        accel[0] = acceleration.x * accelerometerDamp + accel[0]\
    \ * (1.0 –\n accelerometerDamp);\n        accel[1] = acceleration.y * accelerometerDamp\
    \ + accel[1] * (1.0 –\n accelerometerDamp);\n        accel[2] = acceleration.z\
    \ * accelerometerDamp + accel[2] * (1.0 –\n accelerometerDamp);\n        if (!tractorBeamOn)\
    \ {\n                [self movePlayer:accel[0] :accel[1]];\n        }\n}\n```\n\
    \n我们需要看的第一个方法是加速计的委托方法。我们获取加速计的值，并对其应用一个阻尼系数，以提供更真实的手感。然后，我们进行一项检查，确保牵引光束已关闭（如果光束开启，我们不希望能够移动\
    \ UFO），接着将这两个值传递给我们的 `movePlayer` 方法，该方法如下所示。\n\n```\n- (void)movePlayer:(float)vertical:(float)horizontal;\n\
    {\n        vertical += accelerometer0Angle;\n        if (vertical > .50)\n   \
    \     {\n                vertical = .50;\n        }\n        else if (vertical\
    \ < -.50)\n        {\n                vertical = -.50;\n        }\n        if\
    \ (horizontal > .50)\n        {\n                horizontal = .50;\n        }\n\
    \        else if (horizontal < -.50)\n        {\n                horizontal =\
    \ -.50;\n        }\n        CGRect playerFrame = myPlayerImageView.frame;\n  \
    \      if ((vertical < 0 && playerFrame.origin.y < 120) || (vertical > 0 &&\n\
    \ playerFrame.origin.y > 20))\n        {\n                playerFrame.origin.y\
    \ -= vertical*movementSpeed;\n        }\n        if ((horizontal < 0 && playerFrame.origin.x\
    \ < 440) || (horizontal > 0 &&\n playerFrame.origin.x > 0))\n        {\n     \
    \           playerFrame.origin.x -= horizontal*movementSpeed;\n        }\n   \
    \     myPlayerImageView.frame = playerFrame;\n}\n```\n\n这个方法初看起来可能比想象中简单得多。第一部分代码设置了我们的最大速度。下一部分确保用户无法将\
    \ UFO 移出屏幕。一旦通过这两项安全检查，我们就更新玩家的 frame，从而移动 UFO。\n"
- fmt: "### Watching for Touch Events\n\nThe next aspect of the game that we need\
    \ to worry about is touch events. We will be using a touch to initiate and control\
    \ the tractor beam. The first step is overriding the `touchesBegan` event.\n\n\
    ```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n   \
    \ currentAbductee = nil;\n    tractorBeamOn = YES;\n    tractorBeamImageView.frame\
    \ = CGRectMake(myPlayerImageView.frame.origin.x+25, myPlayerImageView.frame.origin.y+10,\
    \ 28, 318);\n    tractorBeamImageView.animationDuration = 0.5;\n    tractorBeamImageView.animationRepeatCount\
    \ = 99999;\n    NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:@\"\
    Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n    tractorBeamImageView.animationImages\
    \ = imageArray;\n    [tractorBeamImageView startAnimating];\n    [self.view insertSubview:tractorBeamImageView\
    \ atIndex:4];\n    UIImageView *cowImageView = [self hitTest];\n    if (cowImageView)\n\
    \    {\n        currentAbductee = cowImageView;\n        [self abductCow: cowImageView];\n\
    \    }\n}\n```\n\nWe first clear out the pointer to the current abducted cow.\
    \ This value should be `nil` already, but it is best to be diligent. We then set\
    \ a `BOOL` for whether the tractor beam is on to `YES`. At this point, we need\
    \ to draw the tractor beam. To do this, we set the frame for our `tractorBeamImageView`\
    \ to where the player’s UFO is currently located. We will be using the same animation\
    \ shortcut that was discussed earlier in this section to animate the tractor beam.\
    \ We then add the tractor beam `imageView` to the main view; we use an `insertSubview`\
    \ method here to make sure the tractor beam is below the cows but above the background.\
    \ Then we call our `hitTest` method, which we will look at a little later in this\
    \ chapter. If we get a result back from the `hitTest`, we call the `abductCow`\
    \ method.\n\nBefore we can move on to the `hitTest` and `abductCow` methods, we\
    \ must first finish handling the touch events. The only other touch event that\
    \ we are concerned with at this point is the `touchesEnded` delegate call. When\
    \ the user removes their finger from the screen, we want to remove the tractor\
    \ beam from the view and let the user resume movement.\n\n```\n- (void)touchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n    tractorBeamOn = NO;\n    [tractorBeamImageView\
    \ removeFromSuperview];\n    if (currentAbductee) {\n        [UIView beginAnimations:\
    \ @\"dropCow\" context:nil];\n        [UIView setAnimationDuration: 1.0];\n  \
    \      [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n        [UIView\
    \ setAnimationBeginsFromCurrentState: YES];\n        CGRect frame = currentAbductee.frame;\n\
    \        frame.origin.y = 260;\n        frame.origin.x = myPlayerImageView.frame.origin.x\
    \ +15;\n        currentAbductee.frame = frame;\n        [UIView commitAnimations];\n\
    \    }\n    currentAbductee = nil;\n}\n```\n\nSet your state variable for the\
    \ `tractorBeamOn` to `NO`. Then we can remove the tractor beam image from the\
    \ view. The next section of code drops the cow back to the ground (if there was\
    \ one midway in the air). To do this, we just begin a simple animation where we\
    \ return the cow to ground level. The last thing we need to do is reset the `currentAbductee`\
    \ pointer to `nil`.\n\n### Spawning and Moving Cows\n\nWe also have a convenient\
    \ method to spawn a new cow. This is the method we call from `viewDidLoad` to\
    \ give the player a base number of cows to try to abduct; we also call it whenever\
    \ we are finished abducting a cow.\n\n```\n- (void)spawnCow;\n{\n    UIImageView\
    \ *cowImageView = [[UIImageView alloc] initWithFrame:CGRectMake (arc4random()%480,\
    \ 260, 64, 42)];\n    cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"\
    ];\n    [[self view] addSubview: cowImageView];\n    [cowArray addObject: cowImageView];\n\
    \    [cowImageView release];\n}\n```\n\nTip\n\nThe `arc4Random()` function will\
    \ return a random number the same way that `rand()` or `random()` will, but it\
    \ will automatically seed itself when called for the first time.\n\nWe create\
    \ a new `imageView` that will represent the cow. We then use an `arc4Random()`\
    \ function to produce a random x position. We set the image that the cow will\
    \ be using and add it to the main view. The last thing we need to do here is add\
    \ the `imageView` to our `cowArray`. We will be using this for a hit test as well\
    \ as updating the movement paths.\n\nWhile UFOs is not designed to be an extremely\
    \ challenging game, we do want to add at least some aspects of difficulty to the\
    \ gameplay. The following method will cause our cows to wander randomly around\
    \ the screen.\n\n```\n- (void)updateCowPaths\n{\n    for (int x = 0; x < [cowArray\
    \ count]; x++) {\n        UIImageView *tempCow = [cowArray objectAtIndex: x];\n\
    \        if (tempCow != currentAbductee) {\n            continue;\n        }\n\
    \        [UIView beginAnimations:@\"cowWalk\" context:nil];\n        [UIView setAnimationDuration:\
    \ 3.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n    \
    \    float currentX = tempCow.frame.origin.x;\n        float newX = currentX +\
    \ arc4random()%100-50;\n        if (newX > 480) {\n            newX = 480;\n \
    \       }\n        if (newX < 0) {\n            newX = 0;\n        }\n       \
    \ if (tempCow != currentAbductee) {\n            tempCow.frame = CGRectMake(newX,\
    \ 260, 64, 42);\n        }\n        [UIView commitAnimations];\n        tempCow.animationDuration\
    \ = 0.75;\n        tempCow.animationRepeatCount = 99999;\n        //flip cow\n\
    \        if (newX < currentX) {\n            NSArray *flippedCowImageArray = [NSArray\
    \ arrayWithObjects: [UIImage imageNamed: @\"Cow1Reversed.png\"], [UIImage imageNamed:\
    \ @\"Cow2Reversed.png\"], [UIImage imageNamed: @\"Cow3Reversed.png\"], nil];\n\
    \            [tempCow setAnimationImages:flippedCowImageArray];\n        } else\
    \ {\n            NSArray *cowImageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed: @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"], [UIImage imageNamed:\
    \ @\"Cow3.png\"], nil];\n            [tempCow setAnimationImages:cowImageArray];\n\
    \        }\n        [tempCow startAnimating];\n    }\n    //change the paths for\
    \ the cows every 3 seconds\n    [self performSelector:@selector(updateCowPaths)\
    \ withObject:nil afterDelay:3.0];\n}\n```\n\nIn the first line of the `updateCowPaths`\
    \ method, we cycle through our array of cow objects. We then randomize a new x\
    \ position for the cow. A quick check ensures that we are not instructing the\
    \ cow to walk off the screen. Then we commit the animation. We also need to handle\
    \ the direction change for the cow.\n\nNote\n\nThe code that we use to handle\
    \ that event is not the most efficient way of flipping an image, but it is the\
    \ easiest to learn if you are new to this type of game.\n\nAs we did previously\
    \ with the tractor beam and the UFO images, we will add some animation frames\
    \ so the cows appear more interesting. The last thing we do is call `performSelector`\
    \ with a delay of three seconds. This will update the cow’s path every three seconds,\
    \ adding a slightly more challenging movement system."
