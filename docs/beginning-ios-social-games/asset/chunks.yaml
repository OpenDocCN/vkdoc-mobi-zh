    `@end`


    We also need to modify the `viewDidLoad` method to check for and then authenticate
    our local user with Game Center. This is the same approach that we followed in
    [Chapter 2](#A978-1-4302-4906-1_2_Chapter.html). If you are supporting iOS 6 or
    newer, you should use the new authentication methods outlined in [Chapter 2](#A978-1-4302-4906-1_2_Chapter.html).


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `if ([GameCenterManager isGameCenterAvailable])`


