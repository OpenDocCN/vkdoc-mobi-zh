- fmt: "### Retrieving Achievement Data\n\nBefore we can go on with our `UFOAchievementViewController`,\
    \ we need to move back into our `GameCenterManager` class. Add the following method\
    \ as an optional protocol to the `GameCenterManagerDelegate`:\n\n`- (void)achievementDescriptionsLoaded:(NSArray\
    \ *)descriptions error:(NSError *)error;`\n\nThen add the following new method\
    \ to the implementation of `GameCenterManager`:\n\n```\n- (void)retrieveAchievementMetadata\n\
    {\n    [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
    \     ^(NSArray *descriptions, NSError *error) {\n         [self callDelegateOnMainThread:@selector\n\
    \          (achievementDescriptionsLoaded:error:) withArg:descriptions error:error];\n\
    \     }];\n}\n```\n\nThis method will return every `GKAchievementDescription`\
    \ found on the Game Center server. We can now move back to our `UFOAchievementViewController`\
    \ class and finish implementing the custom achievement table.\n\n> **Important:**\
    \  \n> The `retrieveAchievementMetadata` method will return hidden achievements\
    \ as well. If you want to hide these from the user, you will have to filter them\
    \ out of the results.\n\nModify the `viewWillAppear:` method of `UFOAchievementViewController`\
    \ to match the following:\n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n \
    \   [[self gcManager] setDelegate:self];\n    [super viewWillAppear: YES];\n \
    \   [[self gcManager] retrieveAchievementMetadata];\n}\n```\n\nIn addition, add\
    \ the new protocol method that we created earlier. If we do not encounter any\
    \ errors, we simply set the returned descriptions to our local array. When we\
    \ get the new data, we will also want to refresh the table to show the data to\
    \ the user. Here’s the code:\n\n```\n- (void)achievementDescriptionsLoaded:(NSArray\
    \ *)descriptions error:(NSError *)error;\n{\n    if (error == nil)\n    {\n  \
    \      [self setAchievementArray:descriptions];\n    }\n    else\n    {\n    \
    \    NSLog(@\"An error occurred when retrieving the achievement descriptions:\
    \ %@\",\n              [error localizedDescription]);\n    }\n    [achievementTableView\
    \ reloadData];\n}\n```\n\nFor our `numberOfRowsInSection` method, we simply return\
    \ the count on the `achievementArray`, as follows.\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [[self achievementArray]\
    \ count];\n}\n```\n\nWe also need to implement a `cellForRowAtIndexPath` method.\
    \ Add the following method to the implementation as well. After it is added, we\
    \ will look at it in more detail.\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  \
    \  static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil)\n \
    \   {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier] autorelease];\n\
    \        [cell setSelectionStyle:UITableViewCellSelectionStyleNone];\n    }\n\
    \    \n    GKAchievementDescription *achievementDescription = [[self achievementArray]\n\
    \                                                        objectAtIndex:[indexPath\
    \ row]];\n    [[cell textLabel] setText:[achievementDescription title]];\n   \
    \ if ([achievementDescription image] == nil)\n    {\n        [[cell imageView]\
    \ setImage:[GKAchievementDescription\n                                    placeholderCompletedAchievementImage]];\n\
    \        [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,\n\
    \                                                                 NSError *error)\
    \ {\n            if (error == nil)\n            {\n                [[cell imageView]\
    \ setImage:image];\n            }\n        }];\n    }\n    else\n    {\n     \
    \   [[cell imageView] setImage:[achievementDescription image]];\n    }\n    return\
    \ cell;\n}\n```\n\nThe first half of this method is rather standard; we create\
    \ a new table cell or use one from our reusable collection. We are using the default\
    \ built-in table cell to save some time as well. We create a new `GKAchievementDescription`\
    \ and populate it based on the row number from our `achievementArray`.\n\nThe\
    \ first property we work with is the title, which we use to set the `textLabel`\
    \ of the cell. In most circumstances, you will want to use the `achievedDescription`\
    \ or `unachievedDescription` as well as the title. For the sake of simplicity\
    \ once again, we use only the title here. Next, we need to set the image for the\
    \ achievement. This is slightly more complex.\n\n`GKAchievementDescription` has\
    \ an image property associated with it, which is `nil` until you populate it.\
    \ First, check to see whether the property is populated; we can accomplish this\
    \ with a simple nil check. If it is populated, we set the cell image to the one\
    \ that we have cached. If not, we need to load an image from the Game Center servers.\
    \ To populate it, we call `loadImageWithCompletionHandler` on the `GKAchievementDescription`\
    \ object. This returns the earned image. Notice that we used the default placeholder\
    \ image, which we can access through a class method on `GKAchievementDescription`.\n\
    \n> **Tip:**  \n> When setting an image in the `UITableViewCellSytleDefault` cell,\
    \ do not set the image to `nil`. This will cause the cell to left align the text\
    \ and remove the image view. If we then use our block to load the image, it wouldn’t\
    \ appear until the cell or table has been reloaded. This is the reason we set\
    \ the placeholder image first.\n\nIf we were to run the app now and visit our\
    \ custom achievement view, it should look similar to the one shown in Figure 4-14.\n\
    \n![A978-1-4302-4906-1_4_Fig14_HTML.jpg](A978-1-4302-4906-1_4_Fig14_HTML.jpg)\n\
    \n**Figure 4-14.** Achievement data, as displayed in a custom GUI\n\nWe are able\
    \ to view only a list of achievements and associated images, but we cannot see\
    \ how far the user has progressed toward unlocking the achievements. If you recall,\
    \ earlier in this chapter we wrote a few convenience methods, which can be useful\
    \ here. We have two methods that will return just the progress for the achievement:\
    \ `percentageCompleteOfAchievementWithIdentifier:` and `achievementWithIdentifierIsComplete`.\
    \ In addition, if we want access to the entire `GKAchievement` object, we can\
    \ use `achievementForIdentifier`. Let’s use `percentageCompleteOfAchievementWithIdentifier:`\
    \ to display the percentage complete here. Modify the section of code in the `cellForRowAtIndexPath:`\
    \ that sets the text label of the cell. The new code snippet should look like\
    \ the following.\n\n```\nNSString *percentageCompleteString = [NSString stringWithFormat:\
    \ @\" %.0f%% Complete\",\n                                      [[self gcManager]\
    \ percentageCompleteOfAchievementWithIdentifier:\n                           \
    \            [achievementDescription identifier]]];\n[[cell textLabel] setText:[[achievementDescription\
    \ title]\n                           stringByAppendingString:percentageCompleteString]];\n\
    ```\n\nIf you run the game again, you will notice that the output is more helpful,\
    \ as shown in Figure 4-15.\n\n![A978-1-4302-4906-1_4_Fig15_HTML.jpg](A978-1-4302-4906-1_4_Fig15_HTML.jpg)\n\
    \n**Figure 4-15.** Achievements with custom GUI and completion percentage"
