  trans: '

    # 1. 社交游戏入门


    ## 摘要


    欢迎阅读《*iOS 社交游戏开发入门*》！本书旨在引导您将`Game Kit`、`Game Center`及其他社交功能集成到 iOS 应用和游戏中。全书围绕一个名为`UFOs`的示例游戏展开，您将在本章稍后部分了解该游戏。不过，如果您已有现成的应用或游戏并希望为其添加社交功能，也可以直接使用该项目。本书可作为参考手册和资源工具，助您完成向
    iOS 应用添加社交功能的流程。虽然我建议您从头到尾阅读以全面了解所涵盖的技术，但这并非强制要求。每一章均独立成篇，您可以直接跳至与项目需求相关的章节，并快速将该功能集成到应用中。


    本书虽涵盖社交游戏的多个方面，但重点在于 Apple 的社交游戏平台`Game Kit`，及其延伸部分`Game Center`。2009 年 3 月 17
    日，Apple 发布`Game Kit`时，将其定位为 iOS 设备实时联网难题的解决方案——而在此之前，实时联网一直颇具挑战。`Game Kit`增加了对蓝牙、局域网以及语音聊天服务的支持。不久后，Apple
    在 iOS 4.0 中宣布为`Game Kit`加入`Game Center`功能。借助新版 SDK，Apple 带来了丰富的新特性——其中`Game Center`对本书而言最为重要。在
    iOS 5 中，`Game Center`再次迎来更新，最显著的是增加了回合制游戏框架的支持。Apple 延续这一传统，在 iOS 6 中通过`Game Center
    Challenges`（游戏中心挑战）继续支持`Game Center`。除`Game Center`的变更外，Apple 还在 iOS 5 中增加了对 Twitter
    的 OS 级支持，并在 iOS 6 中增加了对 Facebook 的支持。随着 2013 年 WWDC 上 iOS 7 的发布，`Game Center`从底层进行了彻底重新设计，以匹配`UIKit`引入的扁平化视觉风格。


    通常，iOS 开发者社区倾向于将`Game Center`视为一套独立的应用程序编程接口（API）。这是一种误解。`Game Center`是`Game Kit`不可分割的一部分，两者相辅相成。在后续章节中，您将看到大量例证。为便于本书叙述，我们将把这两项技术统称为`Game
    Kit`；但涉及`Game Center`特有功能时，我们仍会使用其正式名称。


    本书前 10 章专注于`Game Kit`功能；其余章节涵盖其他社交元素，例如第 11 章中的`Store Kit`与应用内购买、第 12 章和第 13 章中的
    Twitter 与 Facebook 分享、第 14 章中的 AirPlay 镜像，以及第 15 章中的 iOS 7 游戏手柄。


    请注意，尽管名称如此，`Game Kit`和`Game Center`并不仅限于游戏。不过，近期 Apple 已开始打击在非游戏应用中使用`Game Center`技术的行为。部分开发者曾收到类似以下类型的
    Apple 拒绝邮件：


    > “Game Center 的预期用途是补充游戏应用或应用内的游戏功能。然而，我们注意到您的应用不包含任何游戏玩法或游戏特性。”


    这类拒绝似乎主要针对在非游戏应用中使用排行榜和成就系统。但可以合理辩称，在应用中加入排行榜或成就系统本身就增加了游戏性元素。如果您收到此类拒绝，仍有机会提出申诉；据我所知，目前尚未有开发者在此类申诉中失败。据我观察，也未有因在应用中使用`Game
    Kit`网络功能而遭拒绝的案例。


    ## Game Kit 概述


    `Game Kit`可分为三个独立部分：网络功能、`Game Center`和语音聊天。尽管所有这些服务协同工作，共同营造一个无缝环境，但分别审视每个部分仍大有裨益。虽然各领域可能存在重叠，但每个部分均可视为一个主要类别。尽管
    API 本身并未区分这些部分，但在学习和思考`Game Kit`开发时，将它们分开考虑会更有帮助。


    ### 网络功能


    `Game Kit`的网络功能允许您在一个或多个对等端之间发送和接收数据。`Game Kit`网络还提供一种连接协议，用于连接 Wi-Fi 网络上的本地客户端，或通过蓝牙进行本地连接。`Game
    Center`还通过广域网匹配扩展了此功能。


    `Game Kit`支持在两台 iOS 设备之间创建即席蓝牙或本地无线网络。随着 iOS 4.0 的发布，`Game Kit`开始支持在广域网上进行联网，最多可同时支持
    16 名玩家。`Game Kit`网络功能将在第 6、7、8 章中介绍。`Game Center`匹配功能将在第 5 章中介绍。


    ### Game Center


    `Game Center`负责处理身份验证、好友、排行榜、成就、挑战和邀请。从某种意义上说，`Game Center`为开发者提供了与社交互动相关的服务器服务。也可以说`Game
    Center`包含了自己的网络系统。虽然确实如此，但我们将该主题归入前文关于网络功能的章节，并在第 5 章中详细讨论。`Game Center`技术，如排行榜和成就，将在第
    3 章和第 4 章中介绍。


    > **注**

    > 在各类印刷和参考文档中，“`Game Center`”一词有时既指`Game Center` API 的集合，也指`Game Center`应用本身。


    ### 语音聊天


    Apple 所称的“Game Voice”允许任何应用（不仅限于游戏）通过网络连接提供语音通信。该 API 处理用户音频流的捕获和播放，并提供服务来处理连接、通信、错误和断开连接。这项技术将在第
    10 章中探讨。

    '
- fmt: "# Sample Game: UFOs\n\nIn my experience, most developers are “experience-type”\
    \ learners. This means that they learn best by doing, not by watching or listening.\
    \ When I first started to learn how to program, I would copy source code out of\
    \ code magazines line by line into a Commodore 64. The experience of physically\
    \ typing in each line of code is what made the information stick. Listening to\
    \ a lecture or watching someone else write code made it difficult to retain a\
    \ good deal of the information. I can’t imagine I would have stayed with this\
    \ career path if lectures and demonstrations were my only ways of learning. This\
    \ book is designed in the spirit of experience-type learners.\n\nThe first thing\
    \ we need to cover, before moving into Game Kit itself, is working with the supplied\
    \ sample game. The game, which we call “UFOs,” is designed not to be an award-winning,\
    \ addictive game, but rather to be simple enough that it can be thought of as\
    \ any generic project, and allow you to focus on the social gaming aspects. I\
    \ have made every effort to reduce the amount of code to less than 300 lines.\
    \ Although the game itself is simple, it is vital that all readers understand\
    \ the code as if they wrote it themselves. Keeping the example simple will allow\
    \ you, as the reader, to detach yourself from the project itself and focus on\
    \ the Game Kit–specific information. We start by playing the game, then looking\
    \ at the source code.\n\n**Note**\n\nThe source code for all the chapters, as\
    \ well as the sample project, is available at [`www.apress.com`](http://www.apress.com/).\
    \ The sample code is provided in two formats: one that supports Automatic Reference\
    \ Counting (ARC) environments, a feature added in iOS 5, and one using the manual\
    \ memory management system. Other than support for ARC, these projects are identical.\n\
    \nIt is important to note that the sample code that appears in print is the non-ARC\
    \ version. If you are using ARC, you will need to make adjustments. For more information,\
    \ see the Apple article on transitioning to ARC at [`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html).\n\
    \n## UFOs: Understanding the Game\n\nThe first thing you need to do is open the\
    \ base project that you downloaded from [`apress.com`](http://apress.com/). Figure\
    \ 1-1 shows the file structure for the project. We’ll quickly run the game to\
    \ see what it’s like.\n\n![A978-1-4302-4906-1_1_Fig1_HTML.jpg](A978-1-4302-4906-1_1_Fig1_HTML.jpg)\n\
    \n*Figure 1-1. The file structure for the UFO sample project, as seen by the Finder*\n\
    \nTo play the game, select Build and Run from Build menu bar. The game will launch\
    \ to a generic screen with one button labeled “Play.” Go ahead and select the\
