    Even with the limitations imposed by player activity, this feature can still be
    a very valuable tool for determining possible wait times for your users to find
    a match. However, you want to make sure these numbers are used for informational
    purposes only, as they tend to be just unreliable enough not to depend upon.


    Note


    You can implement your own server system to keep track of exactly how many players
    are waiting for a match if the Apple system does not provide specific enough information
    on player activity for the needs of your app. To build out a system like this,
    a remote server would be required to store the number of waiting players and relay
    it back for display.'
  trans: "\n各个掩码之间没有重叠，因此可以邀请`Breacher`加入游戏。玩家 4 选择了`Grenadier`职业，并让`Game Center`寻找对手。`Game\
    \ Center`会再次找到我们进行中的比赛，并尝试将新玩家加入其中。\n\n由于玩家 4 提供的掩码与比赛的掩码存在部分重叠（见图 5-13），因此该玩家无法加入。如果`Game\
    \ Center`无法为该玩家找到空闲的比赛，它就会开始寻找新玩家来填补该玩家比赛中的空缺。\n\n![A978-1-4302-4906-1_5_Fig13_HTML.jpg](img/A978-1-4302-4906-1_5_Fig13_HTML.jpg)\n\
    \n图 5-13. 上方是当前比赛的掩码（`0xFFFFFF00`），下方是`Grenadier`的掩码（`0x0000FF00`）\n\n玩家 5 选择了`Light\
    \ Machine Gun`作为其掩码，并开始寻找可加入的比赛。`Game Center`将其掩码与当前比赛的掩码进行比较，如图 5-14 所示。\n\n\
    ![A978-1-4302-4906-1_5_Fig14_HTML.jpg](img/A978-1-4302-4906-1_5_Fig14_HTML.jpg)\n\
    \n图 5-14. 上方是当前比赛的掩码（`0xFFFFFF00`），下方是`Light Machine Gun`的掩码（`0x000000FF`）\n\n\
    由于两组掩码之间没有重叠，玩家 5 可以加入比赛。这将为比赛创建一个完整的玩家属性掩码，如图 5-15 所示。\n\n![A978-1-4302-4906-1_5_Fig15_HTML.jpg](img/A978-1-4302-4906-1_5_Fig15_HTML.jpg)\n\
    \n图 5-15. 一个已完成的比赛掩码（`0xFFFFFFFF`）\n\n如果玩家 5 从未加入游戏，而最初的邀请者想用来自`Game Center`的朋友填补这个空位，那么被邀请的朋友将无法选择他的职业。在这种情况下，比赛的掩码将如图\
    \ 5-16 所示。随后，被邀请的朋友将被分配如图 5-17 所示的掩码，该掩码将补全比赛的掩码。这将完成所有玩家属性掩码，并允许游戏开始。\n\n![A978-1-4302-4906-1_5_Fig17_HTML.jpg](img/A978-1-4302-4906-1_5_Fig17_HTML.jpg)\n\
    \n图 5-17. 用于补全比赛掩码所需的`Machine Gun`的掩码（`0x000000FF`）\n\n![A978-1-4302-4906-1_5_Fig16_HTML.jpg](img/A978-1-4302-4906-1_5_Fig16_HTML.jpg)\n\
    \n图 5-16. 当前比赛的掩码（`0xFFFFFF00`）\n\n设置玩家属性非常直接，如下面的代码片段所示。\n\n```\n#define class_SquadLeader\
    \              0xFF000000\n#define class_Breacher                 0x00FF0000\n\
    #define class_Grenadier                0x0000FF00\n#define class_LightMachineGun\
    \          0x000000FF\n...\nGKMatchRequest *request = [[GKMatchRequest alloc]\
    \ init];\nrequest.minPlayers = 4;\nrequest.maxPlayers = 4;\nrequest.playerAttributes\
    \ = class_SquadLeader;\n```\n\n## 玩家活动\n\n`Game Center`提供了一种查询近期玩家活动的方法。你的用户通常希望尽可能多地了解在寻找多人比赛时需要等待多长时间。重要的是要明确：玩家活动指的是**近期**的活动，而非**当前**的活动。苹果没有提供确切判断有多少玩家正在等待比赛的方法，但它确实提供了一种方法来确定最近有多少用户寻找过比赛。让我们看看获取玩家活动所需的源代码。在你的`GameCenterManager`类的实现文件中添加以下两个新方法：\n\
    \n```\n- (void)findAllActivity\n{\n    [[GKMatchmaker sharedMatchmaker] queryActivityWithCompletionHandler:\n\
    \    ^(NSInteger activity, NSError *error) {\n        [self callDelegateOnMainThread:@selector(playerActivity:error:)\
    \ withArg:[NSNumber numberWithInt: activity] error:error];\n    }];\n}\n\n- (void)findActivityForPlayerGroup:(NSUInteger)playerGroup\n\
    {\n    [[GKMatchmaker sharedMatchmaker] queryPlayerGroupActivity:playerGroup withCompletionHandler:^(NSInteger\
    \ activity, NSError *error) {\n        NSDictionary *activityDictionary = [[NSDictionary\
    \ alloc] initWithObjects:\n        [NSArray arrayWithObjects:[NSNumber numberWithInt:\
    \ activity], [NSNumber numberWithInt: playerGroup], nil] forKeys:[NSArray arrayWithObjects:@\"\
    activity\", @\"group\", nil]];\n        [self callDelegateOnMainThread: @selector(playerActivityForGroup:error:)\
    \ withArg: activityDictionary error:error];\n        [activityDictionary release];\n\
    \    }];\n}\n```\n\n我们还需要在`GameCenterManager`的头文件中添加两个新的协议方法。添加以下两个可选协议。\n\n```\n\
    - (void)playerActivity:(NSNumber *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
    \ *)activityDict error:(NSError *)error;\n```\n\n在`UFOViewController`中实现这些新的协议方法，如下所示：\n\
    \n```\n- (void)playerActivity:(NSNumber *)activity error:(NSError *)error\n{\n\
    \    if (error != nil) {\n        NSLog(@\"查询玩家活动时发生错误: %@\",\n        [error\
    \ localizedDescription]);\n    } else {\n        NSLog(@\"近期所有玩家活动: %@\", activity);\n\
    \    }\n}\n\n- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError\
    \ *)error\n{\n    if (error != nil) {\n        NSLog(@\"查询玩家活动时发生错误: %@\", [error\
    \ localizedDescription]);\n    } else {\n        NSLog(@\"近期所有玩家活动: %@ 针对组别: %@\"\
    , [activityDict objectForKey:@\"activity\"], [activityDict objectForKey:@\"group\"\
    ]);\n    }\n}\n```\n\n你应该会得到类似如下的输出：\n\n```\n2011-03-08 11:11:04.007 UFOs[3000:207]\
    \ 近期所有玩家活动: 3 针对组别: 12345\n2011-03-08 11:11:04.008 UFOs[3000:207] 近期所有玩家活动: 3\n\
    ```\n\n那么，现在我们有了指定玩家组别的活动数据，这些数字究竟意味着什么呢？苹果从未明确说明这些数字的确切含义，但通过仔细研究，它们似乎代表了过去一到三分钟内尝试通过自动匹配功能连接游戏的用户数量。这些数字似乎在该时间范围内的某个不确定的间隔期重置。此外，当用户尝试加入比赛时，新数字的反映似乎会有\
    \ 15–30 秒的延迟。然后，可以通过多种方式（例如平均连接时间）将这些信息呈现给用户。\n\n即使玩家活动功能存在局限性，它仍然是判断用户寻找比赛时可能等待时间的一个非常有价值的工具。然而，你需要确保这些数字仅用于参考信息，因为它们往往不够可靠，不足以作为决策依据。\n\
    \n**注意**：如果苹果系统提供的玩家活动信息不足以满足你应用的需求，你可以实现自己的服务器系统来精确跟踪有多少玩家正在等待比赛。要构建这样的系统，需要一个远程服务器来存储等待玩家数量，并将其转发回来进行显示。\n"
- fmt: '### Using Your Own Server (Hosted Matches)


    Under normal circumstances, Game Center will host your match for you; however,
    Apple has provided a technique for implementing your own server to host a match.
    This approach is called a “hosted match,” and it can be implemented in any app
    to add increased flexibility to Game Center–based multiplayer networking.


    When using Game Center to host a match, every device that is connecting to that
    match creates an instance of `GKMatch`. The `GKMatch` class does all the legwork
    of connecting, handshaking, sending and receiving data, and handling errors. However,
    there are times when you will need to implement your own server, most notably
    if you want to allow more than four people to connect to a single match at a time.
    In this scenario, you can use Game Center to find peers for your match and use
    your own server to connect those peers.


    > **Tip:** Using a hosted match allows you to connect up to 16 users, instead
    of only four while using Game Center hosting.


    There are several downsides to using your own server, however, most notably that
    you are now responsible for all the legwork that was previously given to you for
    free by Game Center. Specifically, you need to handle the following:


    - You must design and implement all of your own networking code to connect the
    peers. Game Center will find the matches for you, but its involvement stops there.

    - If your app is using the standard matchmaking interface, your server must inform
    the app when a new peer successfully connects, so that it can update the GUI.

    - Voice chat is no longer provided for you free. You can still, however, use the
    `GKVoiceChatService` class to send voice data over your own networking system.
    See [Chapter 9](#A978-1-4302-4906-1_9_Chapter.html) for more information.


    We will need to make a handful of minor changes to our code base in order to support
    hosted matches on the device side. We begin by modifying the multiplayer button
    action method that we set up earlier in this chapter.


    ```

    - (IBAction)multiplayerButtonPressed


    {


    GKMatchRequest *request = [[GKMatchRequest alloc] init];


    request.minPlayers = 2;


    request.maxPlayers = 4;


    GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];


    [request release];


    mmvc.matchmakerDelegate = self;


    mmvc.hosted = YES;


    [self presentViewController:mmvc animated:YES completion:NULL];


    [mmvc release];


    }

    ```


    As you can see, we added a new line—`mmvc.hosted = YES`—which tells the matchmaker
    GUI that this match will be hosted on our own servers. In addition to setting
    the `matchmakerViewController` to `hosted`, you will need to have each device
    connect to your server. This section does not deal with how to code the server
    itself, as there are dozens of languages and approaches that can be taken here.
    However, after a device has connected to your server, it needs to call the following
    with the `playerID` of the player who is joining.


    ```

    [matchmakerViewController setHostedPlayerReady: playerID ];

    ```


    This will update the GUI on all the connected players’ screens, informing them
    that a new player is ready to begin a match. After all the players are connected
    to your server, and have confirmed that they are ready, your delegate is called
    to begin the game. When working with Game Center matches, we used the delegate
    callback `matchmakerViewController:didFindMatch:` to begin a match. However, for
    a hosted game we use the following:


    ```

    - (void)matchmakerViewController:(GKMatchmakerViewController *)viewController
    didFindPlayers:(NSArray *)playerIDs


    {


    [self dismissModalViewControllerAnimated:YES];


    NSLog(@"Players: %@", playerIDs);


    //Begin Hosted Game


    }

    ```


    At this point, you can begin the game with your server handling the communication
    between the connected players. In addition, you can begin a hosted match programmatically,
    as we saw with a Game Center–hosted match earlier in this chapter.


    ```

    - (void)findProgrammaticHostedMatch


    {


    GKMatchRequest *request = [[GKMatchRequest alloc] init];


    request.minPlayers = 2;


    request.maxPlayers = 16;


    [[GKMatchmaker sharedMatchmaker] findPlayersForHostedMatchRequest:request withCompletionHandler:^(NSArray
    *playerIDs, NSError *error) {


    if (error) {


    NSLog(@"An error occurrred during finding a match: %@", [error localizedDescription]);


    } else if (playerIDs != nil) {


    NSLog(@"Players have been found for match: %@", playerIDs);


    }


    }];


    [request release];


    }

    ```


    As you can see, it is very similar to our previous method; however, instead of
    getting back a `GKMatch` object, we are returned an array of `playerIDs`. You
    will also note that we can also increase the maximum players to 16.


    ### Summary


    In this chapter you were introduced to the concepts of matchmaking and invitations.
    We discussed the overwhelming benefits of adding multiplayer capacity to your
    iOS app or game, as well as some of the hurdles you might need to jump along the
    way. We explored the matchmaking process from presenting the standard Apple GUI
    to highly customized matches using player groups and player attributes. We reviewed
    how to process invitations in every possible scenario, as well as how to query
    for player activity. Finally, we discovered how it is possible to implement your
    own server to remove some of the limitations placed on Game Center. We expanded
    our reusable `GameCenterManager` class to handle matchmaking, invitations, and
    the required overhead, so that you can quickly add multiplayer ability to your
    apps.


    In this chapter, we deeply explored how to create matches and populate them with
    peers. In the upcoming chapters, we will not only learn how to communicate between
    the peers, but also explore new methods for locating peers with whom to communicate.
    The next chapter shows how to use Game Kit to find peers using the Peer Picker.


    # The Peer Picker


    > **Abstract:** “I’m a great believer that any tool that enhances communication
    has profound effects in terms of how people can learn from each other, and how
    they can achieve the kind of freedoms that they’re interested in.”

    >

    > —Bill Gates


    In previous chapter, we explored how to find matches using Game Center. In this
    chapter, we will look at the other system iOS provides for finding peers to connect
    with. This system is called the Peer Picker and can be used to create a connection
    between two iOS devices using either Bluetooth or a local Wi-Fi network (LAN).


    Before we begin working with the actual code, let’s take a quick look at the history
    surrounding Game Kit and Game Center. When Apple released iOS 3.0, at the time
    called iPhone OS 3.0, it implemented a new set of API calls, collectively referred
    to as Game Kit. Game Kit, in the 3.0 days, handled Bluetooth, LAN networking,
    and voice chat services. When Game Center was added in iOS 4.0/4.1, it brought
    with it significant improvements to Game Kit. Game Center can really be thought
    of as an extension to Game Kit rather than a completely new API. Through iOS 5,
    iOS 6, and iOS 7, Game Kit’s networking and the Peer Picker have remained largely
    unchanged.


    In this chapter, we will look at how to establish new connections using Bluetooth
    and a Wi-Fi local area network. In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html)
    you will learn how to use shared methods to send data, regardless of whether the
    peer was found via Game Center or Game Kit.'
