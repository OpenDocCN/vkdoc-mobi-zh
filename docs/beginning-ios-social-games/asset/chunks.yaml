  trans: "\n### 监测玩家状态\n\n我在本章前面提到过，让用户知道他们正在传输数据非常重要。让玩家看到谁在说话也是一个重要步骤。通过监测玩家状态的变化，你可以确定哪些用户当前正在传输语音，并在玩家列表中高亮显示他们，或通过其他方式指示哪个玩家正在说话。以下代码块在你开始聊天时很容易设置，它省去了你执行轮询或委托回调的麻烦：\n\
    \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
    \ state)\n{\n        switch (state)\n                {\n                     \
    \   case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
    \ playerID];\n                                break;\n                       \
    \ case GKVoiceChatPlayerSilent:\n                                [self stopShowingSpeakingPlayer:\
    \ playerID];\n                                break;\n         }\n    };\n```\n\
    \n> **注意：** 玩家状态更新是按频道处理的。你需要为你想要监测变化的每个频道配置一个。\n\n## 适用于 Game Kit 的语音聊天\n\n在使用\
    \ Game Kit 语音聊天时，我们将重点关注 `GKVoiceChatService` 对象。Game Kit 语音聊天的基本原理与 Game Center\
    \ 语音聊天非常相似。实现此系统的一个良好起点是，在你使用 Peer Picker 系统连接到另一个玩家并获取到 `GKSession` 对象之后。需要注意的是，`GKVoiceChatService`\
    \ 设计为一次只能向一个对等方发送数据。虽然这还不是一个限制（因为 Game Kit 目前只支持两个对等方），但如果将来 API 扩展，记住这一点很重要。\n\
    \n> **注意：** 在继续之前，别忘了检查 `[GKVoiceChatService isVoIPAllowed]` 以确保你的设备支持语音聊天。某些设备，例如第一代\
    \ iPod touch，不支持语音聊天。\n\n### 创建音频会话\n\n与 Game Center 一样，我们可以通过首先创建一个新的 `AVAudioSession`\
    \ 来开始使用 Game Kit 语音聊天。确保在开始任何语音聊天服务调用之前创建会话至关重要。\n\n```\n    NSError *error =\
    \ nil;\n    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
    \        if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n\
    \        {\n            if(error)\n            {\n                NSLog(@\"An\
    \ error occurred while starting audio session: %@\", [error localizedDescription]);\n\
    \            }\n        }\n        if(![audioSession setActive: YES error: &error])\n\
    \        {\n            if(error)\n            {\n                NSLog(@\"An\
    \ error occurred while starting audio session: %@\", [error localizedDescription]);\n\
    \            }\n        }\n```\n\n### 必需的额外设置\n\n与 Game Center 的方法不同，Game Kit\
    \ 需要更多的额外设置才能启动和运行。你需要做的第一件事是实现几个必要的方法。下面发布的第一个方法返回你希望与之通信的玩家的 `peerID`。这个值可以轻松地从你当前的\
    \ `GKSession` 对象中获取：\n\n```\n- (NSString *)participantID\n{\n    return session.peerID;\n\
    }\n```\n\n你还需要实现一个方法来将语音数据发送到已连接的对等方，以及另一个方法来处理接收数据；这两个方法都在下面的代码片段中给出。这两个方法将共同处理你的应用的语音数据发送和接收。\n\
    \n```\n- (void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData\
    \ *)data toParticipantID:(NSString *)participantID\n{\n    NSError *error = nil;\n\
    \    if(![self.session sendData:data toPeers:[NSArray arrayWithObject: participantID]\
    \ withDataMode:GKSendDataReliable error:&error])\n    {\n        NSLog(@\"Unable\
    \ to send data to peers: %@\", [error localizedDescription]);\n    }\n}\n\n- (void)\
    \ receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:\n    (GKSession\
    \ *)session context:(void *)context;\n    {\n        [[GKVoiceChatService defaultVoiceChatService]\
    \ receivedData:data\n        fromParticipantID:peer];\n   }\n```\n\n### 启动运行\n\
    \n除了我们在上一节中实现的三个新方法之外，你还需要完成一些额外的步骤才能使一切正常运行。首先，你需要初始化一个新的 `GKVoiceChatClient`\
    \ 实例，这应该是你创建的 `GKVoiceChatClient` 的自定义子类。有关此步骤的更多信息，请参阅下一节“整合在一起”。\n\n```\nGKVoiceChatClient\
    \ *voiceChatClient = [[GKVoiceChatClient alloc] initWithSession:\n session];\n\
    [GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;\n```\n\n\
    创建了 `GKVoiceChatClient` 的新实例后，你需要将你的对等方连接到它。以下代码演示了如何实现这一点。\n\n```\n[[GKVoiceChatService\
    \ defaultVoiceChatService] startVoiceChatWithParticipantID:\n [self  participantID]\
    \ error: &error];\n```\n\n要结束语音聊天会话，你需要调用一个类似的方法，如下所示。\n\n```\n[[GKVoiceChatService\
    \ defaultVoiceChatService] stopVoiceChatWithParticipantID:\n [self  participantID]];\n\
    ```\n\n在你与另一个对等方建立连接后，你将开始接收语音聊天数据。如果你想要发送数据，你需要做的就是使用以下代码片段取消麦克风静音：\n\n```\n\
    [GKVoiceChatService defaultVoiceChatService].microphoneMuted = NO;\n```\n\n以上就是启动并运行\
    \ Game Kit 语音聊天所需的所有步骤。虽然比使用 Game Center 语音聊天的工作量稍多一些，但它仍然比实现你自己的 VOIP 系统要容易得多。\n"
- fmt: "# Putting It Together\n\nIn this chapter, we modify our existing code base\
    \ from [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html). Begin there by creating\
    \ a new audio session for your voice chat service. Add the following block of\
    \ code to the `UFOGameViewController.m viewDidLoad:` method. In addition, you\
    \ need to add the `AVFoundation.framework` to your project. Modify the relevant\
    \ section of the `viewDidLoad` method to match the following.\n\n```\nif (self.gameIsMultiplayer\
    \ == NO)\n{\n    for (int x = 0; x < 5; x++)\n    {\n        [self spawnCow];\n\
    \    }\n    [self updateCowPaths];\n}\nelse\n{\n    [self generateAndSendHostNumber];\n\
    \    NSError *error = nil;\n    AudioSessionInitialize(NULL, NULL, NULL, self);\n\
    \    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n    if(![audioSession\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n    {\n    \
    \    if(error)\n        {\n            NSLog(@\"An error occurred while starting\
    \ audio session: %@\", [errorÉ localizedDescription]);\n        }\n    }\n   \
    \ if(![audioSession setActive: YES error: &error])\n    {\n        if(error)\n\
    \        {\n            NSLog(@\"An error occurred while starting audio session:\
    \ %@\", [errorÉ localizedDescription]);\n        }\n    }\n    [self setupVoiceChat];\n\
    }\n```\n\n**Caution:** Make sure the device you are building for has both a speaker\
    \ and a microphone available for use.\n\nYou also need to add a new method called\
    \ `setupVoiceChat`. This method will handle the basic configuration for both Game\
    \ Center and Game Kit.\n\n```\n-(void)setupVoiceChat\n{\n    //GameKit\n    if\
    \ (self.peerIDString)\n    {\n        NSError *error = nil;\n        UFOVoiceChatClient\
    \ *voiceChatClient = [[UFOVoiceChatClient alloc] init];\n        voiceChatClient.session\
    \ = self.gcManager.matchOrSession;\n        [GKVoiceChatService defaultVoiceChatService].client\
    \ = voiceChatClient;\n        [[GKVoiceChatService defaultVoiceChatService]É\n\
    \            startVoiceChatWithParticipantID:self.peerIDString error:&error];\n\
    \        [GKVoiceChatService defaultVoiceChatService].microphoneMuted = YES;\n\
    \        if (error)\n        {\n            NSLog(@\"An error occurred when setting\
    \ up voice chat: %@\",É\n                [error localizedDescription]);\n    \
    \    }\n    }\n    //Game Center\n    else\n    {\n        mainChannel = [[self.peerMatch\
    \ voiceChatWithName:@\"main\"] retain];\n        [mainChannel start];\n      \
    \  mainChannel.volume = 1.0;\n        mainChannel.active = NO;\n    }\n}\n```\n\
    \nYou might have noticed that in this code we have a new class type called `UFOVoiceChatClient`.\
    \ This is the class that we will use to handle the incoming and outgoing data\
    \ for voice, as well as other methods used to watch status and errors. The implementation\
    \ for that class follows.\n\n```\n@implementation UFOVoiceChatClient\n\n@synthesize\
    \ session;\n\n-(NSString *)participantID\n{\n    return self.session.peerID;\n\
    }\n\n- (void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData\
    \ *)dataÉ toParticipantID:(NSString *)participantID\n{\n    NSError *error = nil;\n\
    \    if(![self.session sendData:data toPeers:[NSArray arrayWithObject: participantID]\
    \ withDataMode:GKSendDataReliable error:&error])\n    {\n        NSLog(@\"Unable\
    \ to send data to peers: %@\", [error localizedDescription]);\n    }\n}\n\n- (void)receivedData:(NSData\
    \ *)arbitraryData fromParticipantID:(NSString *)participantID\n{\n    [[GKVoiceChatService\
    \ defaultVoiceChatService] receivedData:arbitraryDataÉ\n        fromParticipantID:participantID];\n\
    }\n\n- (void)voiceChatService:(GKVoiceChatService *)voiceChatServiceÉ\n    didReceiveInvitationFromParticipantID:(NSString\
    \ *)participantIDÉ\n    callID:(NSInteger)callID\n{\n    NSLog(@\"Did Recieve\
    \ Invitation\");\n}\n\n- (void)voiceChatService:(GKVoiceChatService *)voiceChatServiceÉ\n\
    \    didNotStartWithParticipantID:(NSString *)participantID error:É\n    (NSError\
    \ *)error\n{\n    NSLog(@\"Did Not Start Invitation\");\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
    \ *)voiceChatServiceÉ\n    didStartWithParticipantID:(NSString *)participantID\n\
    {\n    NSLog(@\"Did Start Invitation\");\n}\n\n@end\n```\n\n**Note:** Make sure\
    \ your `voiceChatClient` conforms to the `GKVoiceChatClient` protocol.\n\nYou\
    \ also need to make some slight modifications to the `GameCenterManager` class\
    \ to handle incoming voice data. Modify the existing `receiveData:fromPeer:inSession:Context:`\
    \ method to match the following:\n\n```\n- (void)receiveData:(NSData *)data fromPeer:(NSString\
    \ *)peer inSession: (GKSessionÉ\n    *)session context:(void *)context;\n{\n \
    \   NSString *dataString = [[NSString alloc] initWithData:dataÉ\n        encoding:NSUTF8StringEncoding];\n\
    \    if (dataString == nil)\n    {\n        [[GKVoiceChatService defaultVoiceChatService]\
    \ receivedData:dataÉ\n            fromParticipantID:peer];\n        [dataString\
    \ release];\n        return;\n    }\n    NSArray *objects = [NSArray arrayWithObjects:dataString,\
    \ peer, session, nil];\n    NSArray *keys = [NSArray arrayWithObjects: @\"data\"\
    , @\"peer\", @\"session\", nil];\n    NSDictionary *dataDictionary = [NSDictionary\
    \ dictionaryWithObjects:objects forKeys:keys];\n    [dataString release];\n  \
    \  [self callDelegateOnMainThread: @selector(receivedData:) withArg: dataDictionaryÉ\n\
    \        error: nil];\n}\n```\n\nNotice that we added another block of code that\
    \ handles passing the data to our `defaultVoiceChatService` client. If we cannot\
    \ decode a string from the `NSData`, we determine whether the data is voice data.\
    \ Your app may be more complex and require a prefix or other type of designator\
    \ to determine whether the data is voice, but this is very suitable for a simple\
    \ game like UFOs.\n\nThe last thing we need to do is hook up an action to turn\
    \ our microphone on and off. I have decided to go with a simple toggle button\
    \ for UFOs, but you may feel the need to implement a different approach. Add a\
    \ new button, as shown in Figure [10-1](#A978-1-4302-4906-1_10_Chapter.html#Fig1),\
    \ and hook up the new action posted next.\n\n![A978-1-4302-4906-1_10_Fig1_HTML.jpg](A978-1-4302-4906-1_10_Fig1_HTML.jpg)\n\
    \n*Figure 10-1.* Adding a microphone button to our UFO game demo\n\n```\n-(IBAction)startVoice:(id)sender;\n\
    {\n    micOn = !micOn;\n    if (micOn)\n    {\n        [micButton setTitle:@\"\
    Mic On\" forState:UIControlStateNormal];\n        //GameKit\n        if (self.peerIDString)\n\
    \        {\n            [GKVoiceChatService defaultVoiceChatService].microphoneMuted\
    \ =É\n                NO;\n        }\n        //Game Center\n        else\n  \
    \      {\n            mainChannel.active = YES;\n        }\n    }\n    else\n\
    \    {\n        [micButton setTitle:@\"Mic Off\" forState:UIControlStateNormal];\n\
    \        //GameKit\n        if (self.peerIDString)\n        {\n            [GKVoiceChatService\
    \ defaultVoiceChatService].microphoneMuted =É\n                YES;\n        }\n\
    \        //Game Center\n        else\n        {\n            mainChannel.active\
    \ = NO;\n        }\n    }\n}\n```\n\nThis method determines the current state\
    \ of the microphone (on/off) and toggles it to the new state. When that happens,\
    \ we update the button title and turn the microphone on or off for the type of\
    \ network that we are using.\n\nThese are all the required steps to add voice\
    \ chat into our UFOs example project. If you run the game on two devices, you\
    \ will be able to communicate with voice back and forth.\n\n**Note:** Latency\
    \ between speaking and receiving the voice data on the peer device may be anywhere\
    \ from 500 milliseconds up to several thousand milliseconds.\n\n## Summary\n\n\
    In this chapter, you learned how to incorporate a traditionally very complex technology\
    \ into our iOS app with very little work. We explored the differences with using\
    \ voice chat on both Game Kit and Game Center, as well as implemented examples\
    \ of both systems into our UFOs demo game. You now have the skills required to\
    \ add full-featured VOIP technology to any iPhone or iPad app. If you have been\
    \ following the book along from the beginning, you now have all the skills needed\
    \ to implement all aspects of Game Kit and Game Center into your apps.\n\nIn the\
    \ next chapter, we will look at another important technology when writing games\
    \ or apps for iOS—StoreKit. Using `StoreKit` technology, we will explore how to\
    \ sell additional features and add-ons to your product."
