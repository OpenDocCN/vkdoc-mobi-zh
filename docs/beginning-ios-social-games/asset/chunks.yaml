    # 序言：与友同乐


    游戏本质上是社交的。游戏是一种娱乐形式，而集体娱乐总是更有趣、更有收获。电子游戏也不例外。我至今记得和朋友在街机厅一起投币玩游戏的美好回忆，也仍然舍不得扔掉那台陪我度过无数小时多人游戏时光的
    NES。我几乎无法将游戏体验与一起分享的人分开。在我们把脸埋进 iPhone（最私人的设备）之前，分享和友情本就是电子游戏体验的一部分。


    从本质上讲，iPhone 和 iPad 是通讯设备，我们在设计 iOS 游戏时应充分利用这一特性。幸运的是，苹果也认同这一点，并提供了强大的 API，如果正确运用，就能开启一个充满社交互动的世界。正是这种运用方式，让凯尔和这本书应运而生。


    在 iOS 领域，特别是 iOS 社交游戏方面，凯尔·里克特是你要找的人。他为我们带来了 Trivium，可以说是该平台上第一款社交游戏。早在苹果为社交游戏提供任何
    API 之前，凯尔就已经不遗余力地努力，为玩家提供他们渴望的社交体验。他经验丰富，对游戏的热情丝毫不亚于对 iOS 的热情。他也是一位出色的老师，我们都能从接下来的章节中受益匪浅。


    我喜欢阅读技术书籍，因为我总能学到新东西。这本书也不例外。Game Kit 和 Game Center 充满了有趣、强大且易于使用的 API。我保证你会在阅读本书的过程中学到新东西，就像我一样。


    我个人非常喜欢的一个主题是回合制游戏（第 9 章）。异步回合制游戏在移动设备上很自然，但运行后端服务的开销使得这类游戏难以构建。GameKit 中的回合制游戏
    API 去除了繁琐的基础工作，让你能专注于让游戏变得有趣。


    我另一个喜欢的主题是语音聊天（第 10 章），它是 GameKit 中被低估的功能之一。我仍然惊讶于很少有游戏利用语音聊天。有了这本书，你再也找不到借口了。


    2013 年 6 月之后，任何 iOS 游戏开发书籍若不讨论新的游戏控制器框架都不算完整，凯尔用一整章（第 15 章）来讲解。将游戏控制器支持与 AirPlay
    结合到 Apple TV（第 14 章），你就拥有了一个功能齐全的主机游戏。无需再购买额外的控制器。你的朋友们随身带着他们的控制器。谁还需要一个 300 美元以上的专用主机呢？


    游戏，如同文字，与友同乐更佳。即使你没有朋友，匹配功能（第 5 章）也能帮你找到一些。感谢凯尔和这本书，你的玩家可以与朋友一起享受你的游戏。开始行动吧！


    内森·埃罗尔


    自由时间工作室 创始人


