    \n**图 9-5.** 通过比赛数据填充游戏棋盘\n\n## 结束比赛\n\n在“走出第一步”一节中，我们看到调用了名为`checkWinner`的方法。本节中，我们将更仔细地研究该方法。对于井字棋，我们采用暴力方法来检查是否有赢家：检查所有行和列中是否有三个重复的字符。如果没有任何地方可以落子，我们还需要检查是否平局。\n\
