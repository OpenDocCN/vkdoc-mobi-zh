  raw: '## Sample Game: UFOs


    In my experience, most developers are “experience-type” learners. This means that
    they learn best by doing, not by watching or listening. When I first started to
    learn how to program, I would copy source code out of code magazines line by line
    into a Commodore 64\. The experience of physically typing in each line of code
    is what made the information stick. Listening to a lecture or watching someone
    else write code made it difficult to retain a good deal of the information. I
    can’t imagine I would have stayed with this career path if lectures and demonstrations
    were my only ways of learning. This book is designed in the spirit of experience-type
    learners.


    The first thing we need to cover, before moving into Game Kit itself, is working
    with the supplied sample game. The game, which we call “UFOs,” is designed not
    to be an award-winning, addictive game, but rather to be simple enough that it
    can be thought of as any generic project, and allow you to focus on the social
    gaming aspects. I have made every effort to reduce the amount of code to less
    than 300 lines. Although the game itself is simple, it is vital that all readers
    understand the code as if they wrote it themselves. Keeping the example simple
    will allow you, as the reader, to detach yourself from the project itself and
    focus on the Game Kit–specific information. We start by playing the game, then
    looking at the source code.


    Note


    The source code for all the chapters, as well as the sample project, is available
    at [`www.apress.com`](http://www.apress.com/) . The sample code is provided in
    two formats: one that supports Automatic Reference Counting (ARC) environments,
    a feature added in iOS 5, and one using the manual memory management system. Other
    than support for ARC, these projects are identical.


    It is important to note that the sample code that appears in print is the non-ARC
    version. If you are using ARC, you will need to make adjustments. For more information,
    see the Apple article on transitioning to ARC at [`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html)
    .


