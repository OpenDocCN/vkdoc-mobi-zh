- fmt: "![A978-1-4302-4906-1_11_Fig8_HTML.jpg](A978-1-4302-4906-1_11_Fig8_HTML.jpg)\n\
    \n**Figure 11-8.** Adding a localized description to a product in iTunes Connect\n\
    \nAdding a consumable product follows the same procedure as adding a non-consumable\
    \ product. If you want to add a subscription-based product, there are a few new\
    \ fields that you need to be aware of, as shown in Figure [11-9](#A978-1-4302-4906-1_11_Chapter.html#Fig9).\
    \ When configuring a subscription, you need to define a duration. iTunes Connect\
    \ allows any of the following: one week, one month, two months, three months,\
    \ six months, or one year. You also have the option to offer a free subscription\
    \ if the user agrees to a marketing campaign, such as providing you with their\
    \ e-mail address.\n\n![A978-1-4302-4906-1_11_Fig9_HTML.jpg](A978-1-4302-4906-1_11_Fig9_HTML.jpg)\n\
    \n**Figure 11-9.** Configuring subscription duration in iTunes Connect\n\nYou\
    \ should now have at least one product configured for in-app purchase. Your screen\
    \ in iTunes Connect should look similar to Figure [11-10](#A978-1-4302-4906-1_11_Chapter.html#Fig10).\
    \ This completes the initial configuration that is needed in iTunes Connect to\
    \ get in-app purchases working. In the next section, we begin to work with the\
    \ code required to complete a purchase on a device.\n\n> **Note:** Don’t worry\
    \ about the “Waiting for Screenshot” error yet; this will be handled later in\
    \ the process. You will still be able to test your purchases while waiting to\
    \ upload a screenshot.\n\n![A978-1-4302-4906-1_11_Fig10_HTML.jpg](A978-1-4302-4906-1_11_Fig10_HTML.jpg)\n\
    \n**Figure 11-10.** Products set up and ready for use in our app\n\n## Adding\
    \ Products to Your App\n\nApple does not offer a predesigned GUI for in-app purchases.\
    \ You, as the developer, are required to design a storefront for your user. In\
    \ this section, you will learn how to get products that you have added in iTunes\
    \ Connect to show up for sale in your app.\n\n> **Note:** It can take several\
    \ hours for new purchases and changes to be reflected. If you double-check everything\
    \ and are still not seeing products, wait a few hours and try again.\n\n### App\
    \ IDs and In-App Purchase\n\nWhen working with in-app purchases, Apple requires\
    \ that your App ID does not include a wildcard, such as `76P4G6KX56.*`. You are\
    \ required to have a unique App ID, such as `76P4G6KX56.com.dragonforged.ufo`.\
    \ If you do not have a unique App ID, you need to create one. Use the following\
    \ steps to create a new unique App ID.\n\nNavigate to [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)\
    \ in your web browser and select the iPhone Developer Program Portal from the\
    \ list on the right. Select App ID from the column on the left, and select the\
    \ New App ID button in the upper right. Fill in the required information about\
    \ your app. Click Submit. Click the Configure button next to the listing, and\
    \ make sure In-App Purchase is turned on (it should be on by default).\n\n###\
    \ Setting Up\n\nWe will begin by requesting a list of products from our app. First,\
    \ add the `StoreKit` framework to your project. We will be modifying our existing\
    \ UFO project from the previous chapter; you can follow along in your own project\
    \ if that is more convenient.\n\n> **Important:** In-App Purchase does not work\
    \ on the simulator; all testing needs to be done on a device.\n\nCreate a new\
    \ class called `UFOStoreViewController`. We will use this class to display a store\
    \ to the user. Set up the header to match the following:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <StoreKit/StoreKit.h>\n@interface UFOStoreViewController : UIViewController\
    \ <SKProductsRequestDelegate>\n{\n    SKProductsRequest *productsRequest\n}\n\
    @end\n```\n\nAs you can see, we imported the `StoreKit` headers. Set up the `SKProductsRequestDelegate`,\
    \ and create a new object to hold the product request. We need to create a way\
    \ for the user to access the store, so go ahead and add a button to the main screen\
    \ and relevant code to present the new view controller (`UFOStoreViewController`).\n\
    \n### Retrieving the Product List\n\nModify the `viewDidLoad` and `viewDidUnload`\
    \ methods of our new store view controller to begin a new store request using\
    \ the product identifiers that were set up in iTunes Connect. You may need to\
    \ modify your product identifiers to match the ones that you set up in the previous\
    \ section.\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    NSSet\
    \ *productIdentifiers = [NSSet setWithObjects:\n        @\"com.dragonforged.ufo.newShip1\"\
    , @\"com.dragonforged.ufo.subscription\", nil];\n    productsRequest = [[SKProductsRequest\
    \ alloc]\n        initWithProductIdentifiers:productIdentifiers];\n    productsRequest.delegate\
    \ = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n{\n    productsRequest.delegate\
    \ = nil;\n}\n```\n\nThe product request is released in the delegate callback,\
    \ shown next. Right now, this method just prints your product information to the\
    \ console and logs any invalid products.\n\n```\n- (void)productsRequest:(SKProductsRequest\
    \ *)request\n    didReceiveResponse:(SKProductsResponse *)response\n{\n    NSArray\
    \ *productArray= [response products];\n    for (SKProduct *product in productArray)\
    \ {\n        NSLog(@\"Product title: %@\" , product.localizedTitle);\n       \
    \ NSLog(@\"Product description: %@\" , product.localizedDescription);\n      \
    \  NSLog(@\"Product price: %@\" , product.price);\n        NSLog(@\"Product id:\
    \ %@\\n\\n\" , product.productIdentifier);\n    }\n    for (NSString *invalidProduct\
    \ in response.invalidProductIdentifiers)\n    {\n        NSLog(@\"Invalid: %@\"\
    \ , invalidProduct);\n    }\n    [request release];\n}\n```\n\n> **Note:** Although\
    \ you can retrieve a list of invalid product identifiers using the code in this\
    \ section, there are no associated errors to determine why a product is being\
    \ flagged as invalid. Most often, the product ID is mistyped or not enough time\
    \ has passed for the product to be distributed to the servers.\n\nIf you were\
    \ to run the game now and navigate to the store, you should get output similar\
    \ to the following:\n\n```\n2011–08-19 17:31:23.970 UFOs[3580:707] Product title:\
    \ Ship+\n2011–08-19 17:31:23.973 UFOs[3580:707] Product description: Paint your\
    \ ship and show off to your friends\n2011–08-19 17:31:23.975 UFOs[3580:707] Product\
    \ price: 8.99\n2011–08-19 17:31:23.977 UFOs[3580:707] Product id: com.dragonforged.ufo.newShip1\n\
    2011–08-19 17:31:23.979 UFOs[3580:707] Product title: Subscription\n2011–08-19\
    \ 17:31:23.981 UFOs[3580:707] Product description: A subscription service\n2011–08-19\
    \ 17:31:23.983 UFOs[3580:707] Product price: 1.99\n2011–08-19 17:31:23.987 UFOs[3580:707]\
    \ Product id: com.dragonforged.ufo.subscription\n```\n\n> **Note:** It can take\
    \ several seconds to get a response from the product request. Best practices dictate\
    \ that you should present your user with some sort of loading indicator during\
    \ this loading time.\n\nThose are all the steps required to retrieve your products\
    \ from Apple’s servers. In the next section we present this data to the user with\
    \ a standard table view."
