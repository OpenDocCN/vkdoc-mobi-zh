  trans: "\n# 示例游戏：UFO\n\n根据我的经验，大多数开发者都是“体验型”学习者。这意味着他们通过实践而不是观看或聆听来学习效果最佳。当我最初学习编程时，我会逐行将杂志上的源代码抄写到\
    \ Commodore 64 中。手动输入每一行代码的体验使信息得以牢固记忆。而听讲座或看别人写代码则很难让我记住大量信息。如果只有讲课和演示的学习方式，我无法想象自己会坚持走这条职业道路。本书正是本着体验型学习者的精神而设计的。\n\
    \n在进入 Game Kit 本身之前，我们首先要讲解如何使用附带的示例游戏。这个名为“UFO”的游戏，并非设计成获奖级、令人上瘾的游戏，而是足够简单，可以将其视为任何通用项目，让您能专注于社交游戏方面的内容。我已尽最大努力将代码量控制在\
    \ 300 行以内。尽管游戏本身很简单，但所有读者都必须像自己编写一样理解这些代码，这一点至关重要。保持示例的简洁性将使您作为读者能够从项目本身抽离出来，专注于\
    \ Game Kit 特有的信息。我们将从玩游戏开始，然后查看源代码。\n\n**注意**\n\n所有章节的源代码以及示例项目均可在[`www.apress.com`](http://www.apress.com/)获取。示例代码提供两种格式：一种支持自动引用计数（ARC）环境（这是\
    \ iOS 5 新增的功能），另一种使用手动内存管理系统。除对 ARC 的支持外，这两个项目完全相同。\n\n需要特别说明的是，书中印刷的示例代码是非 ARC\
    \ 版本。如果您使用的是 ARC，则需要进行调整。更多信息，请参阅苹果公司关于过渡到 ARC 的文章，网址为[`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html)。\n\
    \n## UFO：理解游戏\n\n您首先需要打开从[`apress.com`](http://apress.com/)下载的基础项目。图 1-1 显示了项目的文件结构。我们将快速运行游戏，看看它的样子。\n\
    \n![A978-1-4302-4906-1_1_Fig1_HTML.jpg](img/A978-1-4302-4906-1_1_Fig1_HTML.jpg)\n\
    \n*图 1-1. Finder 中显示的 UFO 示例项目的文件结构*\n\n要玩游戏，请从“构建”菜单栏中选择“构建并运行”。游戏将启动到一个通用屏幕，上面有一个标有“Play”的按钮。请点击\
    \ Play 按钮。您将进入游戏屏幕，如图 1-2 所示。\n\n游戏的目标很典型：倾斜设备上下或左右移动飞船。一旦飞船定位到一头牛上方，点击屏幕任意位置并保持按住，直到牛被绑架。每绑架一头牛得一分。游戏没有结局。每次绑架一头牛后，就会生成一头新的牛并放置在草地上。\n\
    \n![A978-1-4302-4906-1_1_Fig2_HTML.jpg](img/A978-1-4302-4906-1_1_Fig2_HTML.jpg)\n\
    \n*图 1-2. UFO 示例项目的游戏画面视图*\n\n现在您了解了游戏玩法，可以查看驱动游戏引擎的源代码了。\n\n## UFO：检查源代码\n\n\
    在分组树中，您将看到我们将使用的三个类文件：`UFOAppDelegate`、`UFOViewController`和`UFOGameViewController`。这些文件都有对应的头文件（`.h`文件）和实现文件（`.m`文件）。分组树如图\
    \ 1-3 所示。\n\n![A978-1-4302-4906-1_1_Fig3_HTML.jpg](img/A978-1-4302-4906-1_1_Fig3_HTML.jpg)\n\
    \n*图 1-3. Xcode 中显示的示例项目分组树结构*\n\n首先，看一下`UFOAppDelegate.h`和`UFOAppDelegate.m`文件。这些文件应该让你感到熟悉，因为其他\
    \ iOS 开发工作中也常遇到。它们不过是`UINavigationController`的一个基础子类。如果您需要熟悉这里的代码，请查看苹果公司为新项目提供的示例代码（`https://developer.apple.com/library/ios/navigation/#section=Resource%20Types&topic=Sample%20Code`）。\n\
    \n下一组文件也相对简单：查看`UFOViewController.h`和`UFOViewController.m`。这些是与登录或主屏幕相关的类。目前这里只有一个\
    \ Play 按钮，但随着本书的深入，我们将在此视图中添加排行榜、成就和多人游戏控件。\n\n最后，我们将使用`UFOGameViewController.m`。这是驱动所有游戏玩法的主类，也是添加大部分\
    \ Game Kit 功能的地方。\n\n### 设置加速计委托\n\n我们将从下载的源文件顶部开始逐步讲解；在 Xcode 中打开`UFOGameViewController`文件。我们修改了`UFOGameViewController`的`init`方法，以注册加速计反馈。请看下面的代码片段，后续会详细讨论。\n\
    \n```\n- (id)init\n{\n    if (self != [super init]) {\n        return nil;\n \
    \   }\n    self.motionManager = [[CMMotionManager alloc] init];\n    self.motionManager.accelerometerUpdateInterval\
    \ = 0.05;\n    [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue\
    \ currentQueue]\n                                            withHandler:^(CMAccelerometerData\
    \ *accelerometerData, NSError *error)\n    {\n        [self motionOccurred:accelerometerData];\n\
    \        if(error)\n        {\n            NSLog(@\"%@\", error);\n        }\n\
    \    }];\n    return self;\n}\n```\n\n我们将使用核心运动框架来捕捉加速计数据并移动角色。输入频率设置为 0.05 秒，这将提供一个非常流畅、反应灵敏的控制系统。\n\
    \n接下来，看一下`viewDidLoad`方法。我们将其分解成几个部分，以准确理解这里发生了什么。\n\n```\naccelerometerDamp =\
    \ 0.3f;\naccelerometer0Angle = 0.6f;\nmovementSpeed = 15;\n```\n\n这里我们设置了一些类变量，用于存储开始处理加速计输入时所需的数据。当我们开始处理飞船移动时，将再次使用这些变量。目前，您不需要完全理解它们的作用，只需知道它们已被设置即可。我们创建了一个名为`motionOccurred:`的新方法，该方法将由核心运动框架调用以处理倾斜输入。先前定义的阻尼方法被应用，信息被传递给`movePlayer::`方法，该方法将在后续章节中讨论。\n\
    \n```\n-(void)motionOccurred:(CMAccelerometerData *)accelerometerData;\n{\n  \
    \  // 使用基本的低通滤波器，仅保留加速计数值中的重力分量\n    accel[0] = accelerometerData.acceleration.x\
    \ * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp);\n    accel[1] =\
    \ accelerometerData.acceleration.y * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp);\n\
    \    accel[2] = accelerometerData.acceleration.z * accelerometerDamp + accel[2]\
    \ * (1.0 - accelerometerDamp);\n    if(!tractorBeamOn)\n        [self movePlayer:accel[0]\
    \ :accel[1]];\n}\n```\n"
- fmt: "### Drawing the Player to the View\n\nNext we need to create our “player”:\n\
    \n```\nCGRect playerFrame = CGRectMake(100, 70, 80, 34);\nmyPlayerImageView =\
    \ [[UIImageView alloc] initWithFrame: playerFrame];\n[myPlayerImageView setAnimationDuration:0.75];\n\
    [myPlayerImageView setAnimationRepeatCount:99999];\nNSArray *imageArray = [NSArray\
    \ arrayWithObjects: [UIImage imageNamed: @\"Saucer1.png\"],\n [UIImage imageNamed:\
    \ @\"Saucer2.png\"], nil];\n[myPlayerImageView setAnimationImages:imageArray];\n\
    [myPlayerImageView startAnimating];\n[self.view addSubview: myPlayerImageView];\n\
    ```\n\nTo do this, we create a new `UIImageView` and initialize it with a predefined\
    \ frame. The next four lines of code are a little-known, but very useful, part\
    \ of `UIImageView`. We are setting an array of images that the `UIImageView` will\
    \ cycle through. In this example, we set two images to be rotated through. We\
    \ also specify how long we want the full animation to take (3/4 second for our\
    \ purposes), and the number of times we want the animation to repeat. Once we\
    \ have set up the animation details, we call `startAnimating` on the `UIImageView`.\
    \ Then, all that is left for us to do is add the `UIImageView` to the main view.\
    \ Now we have a player on the screen that is animating!\n\n### Setting Up Cows,\
    \ Beams, and Scores\n\nThere are a number of game play elements that we need to\
    \ create and display. We will begin by creating the score label that will inform\
    \ the user of their progress while playing.\n\n```\ncowArray = [[NSMutableArray\
    \ alloc] init];\ntractorBeamImageView = [[UIImageView alloc] initWithFrame: CGRectZero];\n\
    score = 0;\n[scoreLabel setText:[NSString stringWithFormat: @\"SCORE %05.0f\"\
    , score]];\n```\n\nThe score label itself has already been placed on the view\
    \ using Interface Builder.\n\n```\nFor (int x = 0; x < 5; x++) {\n        [self\
    \ spawnCow];\n}\n[self updateCowPaths];\n```\n\nThe last thing we need to do in\
    \ the `viewDidLoad` method is create some cows for placement on the screen. There\
    \ is a helper method to spawn these cows. Every time it is called, it will create\
    \ a new cow and place it on the screen. We will take a look at this a little later\
    \ in this section. We also call another helper method to update the walking path\
    \ for the cows, and we will look at this method in depth later in this section.\n\
    \n### Handling Rotation Events\n\nThe next method that appears in our code is\
    \ `shouldAutorotateToInterfaceOrientation`, listed here:\n\n```\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)\n\
    interfaceOrientation\n{\n        if (UIInterfaceOrientationIsLandscape(interfaceOrientation))\
    \ {\n                return YES;\n       }\n        return NO;\n}\n```\n\nWhile\
    \ this may appear to be a minor piece of code, it is important to make sure the\
    \ game doesn’t allow the user to rotate into portrait mode, while allowing the\
    \ user to play in either landscape orientation.\n\n### Adding Player Movements\n\
    \nThat takes care of all the initialization and setup code. Now we can move into\
    \ the more exciting parts of the game. First we need to look at user input and\
    \ actions, and then the gameplay functionality.\n\n```\n- (void)accelerometer:(UIAccelerometer\
    \ *)accelerometer didAccelerate:(UIAcceleration\n *)acceleration\n{\n        accel[0]\
    \ = acceleration.x * accelerometerDamp + accel[0] * (1.0 –\n accelerometerDamp);\n\
    \        accel[1] = acceleration.y * accelerometerDamp + accel[1] * (1.0 –\n accelerometerDamp);\n\
    \        accel[2] = acceleration.z * accelerometerDamp + accel[2] * (1.0 –\n accelerometerDamp);\n\
    \        if (!tractorBeamOn) {\n                [self movePlayer:accel[0] :accel[1]];\n\
    \        }\n}\n```\n\nThe first method to look at is the accelerometer delegate\
    \ method. We are taking the values of the accelerometer and applying a dampener\
    \ to them to give a more realistic feel. We then perform a test to make sure that\
    \ the tractor beam is off (we don’t want to be able to move the UFO if it is on),\
