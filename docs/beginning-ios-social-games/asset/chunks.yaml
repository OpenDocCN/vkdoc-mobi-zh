    the device has been designated as a host or the other device is the host. The
    `receivedData` method is very flawed, though, because it only works with the host
    data message. In the next section, we will refine this method to accept not only
    the host message, but also input for player movements, cow movements, and other
    game actions.


    You now have all the basic skills required to send data between two different
    iOS devices, as well as receive and parse that data and have your system react
    to it. If you want to experiment with working with these calls in practice, the
    next section will walk you through several examples of sending and receiving data
    in our UFO game.


    ## Putting Everything Together


    In the last section, you learned how to receive the data that has been sent to
    a device. In this section, we walk through the exercise of actually using received
    data in a useful way for our game. We add a second player, allow movement information
    to be sent over the network, sync state data across both devices (such as cow
    movement), track each player’s score, and complete various other required overhead
    tasks associated with our game.


    ### Selecting the Host


    Let’s start by improving the host selection logic that was implemented in the
    previous section. Right now, any data that we receive is assumed to be the host
    number. Because most of the data we receive will not be the host number, we need
    to find a way to filter that data to where it can be parsed. Modify the `generateAndSendHostNumber`
    method to match the following code block:


    `-(void)generateAndSendHostNumber;`


    `{`


            `randomHostNumber = arc4random();`


            `NSString *randomNumberString = [NSString stringWithFormat: @"$Host:%f",`É


            `randomHostNumber];`


            `[self.gcManager sendStringToAllPeers:randomNumberString reliable: YES];`


    `}`


    As you can see, we now add an identifier prefix to the message that we will send.
    I have chosen for this example the prefix of `“$Host:”`, but you can use whatever
    system you feel comfortable with. In addition, we need to modify the `receivedData`
    callback to support the new format.


    `- (void)receivedData:(NSDictionary *)dataDictionary;`


    `{`


            `if ([[dataDictionary objectForKey: @"data"] hasPrefix:@"$Host:"])`


            `{`


                            `[self determineHost: dataDictionary];`


            `}`


            `else`


            `{`


                            `NSLog(@"Unable to determine type of message: %@",`


    `dataDictionary);`


            `}`


    `}`


    If we determine that the message is a host message, we send it to a new helper
    method called `determineHost` to determine which device is the host. If we are
    unable to determine the type of message, we print a warning message to the console,
    which will help debugging as the system grows more complex. We need to move the
    old code from `receivedData` into `determineHost`. In addition to moving the code,
    we need to strip off the prefix. Although stripping off the prefix has a lot of
    overhead with `stringByReplacingOccurrencesOfString:`, it is the easiest way to
    accomplish this task. In more complex apps, you might need to design a more robust
    and efficient message system.


    `-(void)determineHost:(NSDictionary *)dataDictionary`


    `{`


            `NSString *dataString = [[dataDictionary objectForKey: @"data"]`É


            `stringByReplacingOccurrencesOfString:@"$Host:" withString:@""];`


            `if ([dataString doubleValue] == randomHostNumber)`


            `{`


                            `NSLog(@"Host numbers are equal, we need to reroll them");`


                            `[self generateAndSendHostNumber];`


            `}`


            `else if ([dataString doubleValue] > randomHostNumber)`


            `{`


                            `NSLog(@"We are the host");`


                            `isHost = YES;`


            `}`


            `else if ([dataString doubleValue] < randomHostNumber)`


            `{`


                            `NSLog(@"They are the host");`


                            `isHost = NO;`


            `}`


    `}`


    Now we can still determine who the host is, but we have opened the door to processing
    more than only this type of data.


    The next step will be transmitting and displaying our peer’s UFO into our game.
    In the source files for this chapter, I have added two new images to the project,
    `EnemySaucer1.png` and `EnemySaucer2.png`. These are the same as the originals,
    but with a different color scheme applied to them. We will use this new artwork
    to display and distinguish the opponent’s spacecraft.'
