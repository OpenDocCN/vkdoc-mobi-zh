    \ YES];\n        CGRect frame = currentAbductee.frame;\n        frame.origin.y\
    \ = 260;\n        frame.origin.x = myPlayerImageView.frame.origin.x +15;\n   \
    \     currentAbductee.frame = frame;\n        [UIView commitAnimations];\n   \
    \ }\n    currentAbductee = nil;\n}\n```\n\n如上述代码所示，我们只需检查是否为网络游戏，然后传递消息开始或结束牵引光束。接下来，在`receivedData`方法中添加一个处理程序，用于调用两个新方法，这两个方法将在对等设备上显示并动画化牵引光束。这两个方法`beginTractorFromNetwork`和`endTractorFromNetwork`是对当前牵引光束动画方法的修改，为方便查阅，现展示如下：\n\
    \n```\n-(void)beginTractorFromNetwork\n{\n    otherPlayerTractorBeamImageView.frame\
    \ =\n        CGRectMake(otherPlayerImageView.frame.origin.x+25,\n            \
    \       otherPlayerImageView.frame.origin.y+10, 28, 318);\n    otherPlayerTractorBeamImageView.animationDuration\
    \ = 0.5;\n    otherPlayerTractorBeamImageView.animationRepeatCount = 99999;\n\
    \    NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n \
    \                           @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"\
    ], nil];\n    otherPlayerTractorBeamImageView.animationImages = imageArray;\n\
    \    [otherPlayerTractorBeamImageView startAnimating];\n    [self.view insertSubview:otherPlayerTractorBeamImageView\
    \ atIndex:4];\n}\n\n-(void)endTractorFromNetwork\n{\n    [otherPlayerTractorBeamImageView\
    \ removeFromSuperview];\n}\n```\n\n如果再次运行游戏，你会看到当任一用户触摸屏幕时，牵引光束会同时出现在两个设备上。我们无需担心在牵引光束开启时锁定\
    \ UFO 的移动，因为这在单人游戏中已处理，并且只有在单人模式下可接受的移动才会传输到其他设备。接下来，我们需要添加额外的代码来处理碰撞检测，因此修改`hitTest`方法如下：\n\
    \n```\n-(UIImageView *)hitTest\n{\n    if (!tractorBeamOn)\n    {\n        return\
    \ nil;\n    }\n    for (int x = 0; x < [cowArray count]; x++)\n    {\n       \
    \ UIImageView *tempCow = [cowArray objectAtIndex: x];\n        CALayer *cowLayer=\
    \ [[tempCow layer] presentationLayer];\n        CGRect cowFrame = [cowLayer frame];\n\
    \        if (CGRectIntersectsRect(cowFrame, tractorBeamImageView.frame))\n   \
    \     {\n            tempCow.frame = cowLayer.frame;\n            [tempCow.layer\
    \ removeAllAnimations];\n            if (self.gameIsMultiplayer)\n           \
    \ {\n                [gcManager sendStringToAllPeers:[NSString\n             \
    \       stringWithFormat: @\"$abductCowAtIndex:%i\", x] reliable:YES];\n     \
    \       }\n            return tempCow;\n        }\n    }\n    return nil;\n}\n\
    ```\n\n这里我们使用了之前填充奶牛数组时的相同技巧。由于我们可靠地发送数据以将对象加入数组，因此知道数组的顺序始终相同。由于知道数组顺序，我们可以传递要修改的奶牛的索引。除了发送数据外，还需要编写一个新的`if`语句来捕获此消息，如下所示。可以看到，此方法的设置与分数方法非常相似，我们提取感兴趣的值，并使用它调用一个新方法。\n\
    \n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$abductCowAtIndex:\"\
    ])\n{\n    int index = [[[dataDictionary objectForKey: @\"data\"]\n          \
    \        stringByReplacingOccurrencesOfString:@\"$abductCowAtIndex:\" withString:@\"\
    \"] intValue];\n    [self abductCowFromNetworkAtIndex:index];\n}\n```\n\n以下两个方法`abductCowFromNetworkAtIndex`和`finishAbductingFromNetwork`处理通过网络接收的劫持动画。它们都与我们在单人模式下动画化劫持事件的方法非常相似。你甚至可以修改现有的方法，通过传递一个标志来指示它们来自远程设备，从而处理网络行为。\n\
    \n```\n-(void)abductCowFromNetworkAtIndex:(int)x\n{\n    otherPlayerCurrentAbductee\
    \ = [cowArray objectAtIndex: x];\n    otherPlayerCurrentAbductee.frame = otherPlayerCurrentAbductee.frame;\n\
    \    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n    [UIView beginAnimations:\
    \ @\"abductNetwork\" context:nil];\n    [UIView setAnimationDuration: 4.0];\n\
    \    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    [UIView setAnimationDelegate:\
    \ self];\n    [UIView setAnimationDidStopSelector: @selector(finishAbductingFromNetwork)];\n\
    \    [UIView setAnimationBeginsFromCurrentState: YES];\n    CGRect frame = otherPlayerCurrentAbductee.frame;\n\
    \    frame.origin.y = otherPlayerImageView.frame.origin.y;\n    otherPlayerCurrentAbductee.frame\
    \ = frame;\n    [UIView commitAnimations];\n}\n\n-(void)finishAbductingFromNetwork;\n\
    {\n    [cowArray removeObjectIdenticalTo:otherPlayerCurrentAbductee];\n    [self\
    \ endTractorFromNetwork];\n    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n\
    \    [otherPlayerCurrentAbductee removeFromSuperview];\n    otherPlayerCurrentAbductee\
    \ = nil;\n    if (isHost)\n    {\n        [self spawnCow];\n    }\n}\n```\n"
- fmt: "We will also need to do some overhead to make sure we don’t generate any new\
    \ bugs. For example, we add a new pointer to keep track of which cow the enemy\
    \ is currently abducting, if any. If you recall, in the `updateCowPaths` method\
    \ we don’t want to update the path for the cow that is being abducted because\
    \ it will break the animation that is being used for the abduction. We need to\
    \ modify that method to also ignore whatever cow the enemy happens to be abducting.\
    \ If you were to run the game again, you would now see that we have a fully functional\
    \ multiplayer game, as shown in Figure [8-4](#A978-1-4302-4906-1_8_Chapter.html#Fig4).\n\
    \n![A978-1-4302-4906-1_8_Fig4_HTML.jpg](A978-1-4302-4906-1_8_Fig4_HTML.jpg)\n\n\
    Figure 8-4. A fully functional multiplayer UFO game being played by two people\
    \ using a Bluetooth connection\n\n## Disconnections\n\nThe last step that we need\
    \ to take when working with multiplayer support is to add in logic to handle disconnections\
    \ and other failures that are unrecoverable. Luckily for us, Apple’s APIs handle\
    \ most of the legwork. We do, however, want to add a more universal call to our\
    \ `GameCenterManager` class to make things easier for us.\n\n```\n- (void)disconnect;\n\
    {\n        if ([self.matchOrSession isKindOfClass: [GKSession class]])\n     \
    \   {\n                        [self.matchOrSession disconnectFromAllPeers];\n\
    \        }\n        else if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n\
    \        {\n                        [self.matchOrSession disconnect];\n      \
    \  }\n}\n```\n\nThis method should be called whenever you wish to end a multiplayer\
    \ game. It will make sure that the peers are safely disconnected and prevent a\
    \ number of issues that would be very hard to troubleshoot.\n\n## Summary\n\n\
    In this chapter, we covered a lot of information in a very condensed manner. You\
    \ learned how to send and receive data between two or more iOS devices using both\
    \ Game Kit networking and Game Center networking. In addition, you learned how\
    \ to handle network state changes, such as disconnections. We put the principles\
    \ learned in this chapter into use in our UFO game, creating a multiplayer iOS\
    \ game from the ground up in less than eight chapters. In the next chapter, we\
    \ will explore Game Center’s turn-based gaming APIs, which were added with the\
    \ release of iOS 5.\n\n# 9. Turned-Based Gaming with Game Center\n\nAbstract\n\
    \nAs if you could kill time without injuring eternity.\n\n> —Henry David Thoreau\n\
    \nApple announced iOS 5 at its own World Wide Developers Conference (WWDC) in\
    \ 2011. In addition to a number of smaller enhancements that this new SDK brought\
    \ to Game Center, it included one very important new feature: turned-based gaming\
    \ through Game Center. With turn-based gaming, you can provide your users with\
    \ asynchronous gaming. Turned-based games are simply any game in which players\
    \ take turns playing, such as in tic-tac-toe, chess, card games, Battleship, and\
    \ Monopoly. Apple has continued to improve Turned Based Gaming in both iOS 6 and\
    \ iOS 7, making it a featured point of the Game Center improvements that have\
    \ accompanied each release.\n\nTurned-based gaming on iOS has become very popular\
    \ in the past few years, starting with Words with Friends. Shown in Figure [9-1](#A978-1-4302-4906-1_9_Chapter.html#Fig1),\
    \ this asynchronous word game from Zynga is similar to Scrabble. Each player receives\
    \ a selection of letters that they must play, in turn, on a board to create a\
    \ word. They are awarded points based on the difficulty of the word, as well as\
    \ layout on the board. Turned-based gaming is traditionally done with a store-and-forward\
    \ platform; the server holds on to the game data until the next client logs in\
    \ and retrieves it. Asynchronous games have traditionally been casual games and\
    \ don’t require all players to be present and connected throughout the gameplay.\n\
    \n![A978-1-4302-4906-1_9_Fig1_HTML.jpg](A978-1-4302-4906-1_9_Fig1_HTML.jpg)\n\n\
    Figure 9-1. Words with Friends by Zynga\n\nBefore the introduction of iOS 5, Game\
    \ Center had provided only real-time gaming, in which all the devices involved\
    \ need to be active and logged in continuously throughout the multiplayer experience.\
    \ Turn-based gaming adds a more casual experience, letting people run up to 20\
    \ matches at a time and only playing when it is their turn in a particular match.\
    \ Prior to the new Game Center enhancements, writing this type of game would have\
    \ required you to write and deploy your own server to handle the game interaction.\
    \ Now, you can add the networking component of turned-based gaming and be up and\
    \ running in less than a day of work. In this chapter, we explore how to write\
    \ a simple tic-tac-toe game using iOS 5 and Game Center’s new turned-based gaming\
    \ APIs."
