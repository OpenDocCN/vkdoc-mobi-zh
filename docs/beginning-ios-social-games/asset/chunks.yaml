    # 可靠数据 vs. 不可靠数据


    数据包可靠性是网络设计中的一个重要课题。在脱离 iOS 平台讨论数据包可靠性时，我们具体指代的是数据的优先级、数据包的排序以及重试判定因素。在深入探讨 iOS
    中实现所需的细节之前，我们先分别审视这些属性及其与网络设计的关系（见表 7-1）。


    **表 7-1.** 常见数据包属性及其对网络行为的影响


    | 属性 | 与网络设计的关系 |

    | --- | --- |

    | 优先级 | 在进行底层网络编程时，你处理的是数据包。每个数据包大小固定，包含你想发送给其他对等方的相关信息。数据包通常被发送到队列中，然后再发送给其目标对等方。但由于网络并非精确无误（尤其当你试图获取最低延迟时），数据包接收的顺序可能并不总是与生成甚至发送的顺序一致。例如，在一个标准的在线游戏中，你可能会传递两种信息：游戏状态变更信息和聊天信息。显然，你的角色请求某个动作（例如攻击敌人或躲避攻击）需要及时发生，这比一条聊天信息更重要。解决此类问题的方法是为数据包设置优先级。对等方会循环遍历其所有待处理消息，并优先发送优先级最高的消息。这样，在发送失败时可以优先重试关键消息，同时也能将重要数据包提升到队列顶端。
    |

    | 排序 | 数据包接收的顺序可能至关重要。例如，如果你发送了 10 个共同组成一条超长聊天消息的数据包，那么这些数据包的接收顺序对于接收方对等方来说就非常重要。如果数据包没有按顺序接收和处理，你的消息可能会变得杂乱无章。当这种情况发生在控制状态机的数据包上时，可能会出现非常不可预测的行为。然而，确保数据包有序是需要付出一定开销的。如果你正在等待
    10 个数据包中的第 1 个，那么你无法对可能已经收到的其他数据包做任何处理。这会造成一种局面：你的网络速度取决于最慢的那个数据包。如果排序对于你的网络正确运行并非至关重要，那你就不应过分担心顺序问题。
    |

    | 重试 | 网络本质上就是不可靠的。即使是连接到专用网络的台式机，也会出现丢包和其他故障。在处理移动设备上的网络可靠性时，唯一可以确定的就是故障的发生。当你向另一个对等方发送数据包时，有两种处理方式：第一种是发送即忘系统；第二种是发送并验证系统。在第一种方法中，你发送一个数据包，并不真正关心它是否到达。让我澄清一下：你确实关心，但如果发送失败，你也无能为力。这种可接受的失败的一个典型例子是语音聊天数据包。如果它未能成功到达终点，重新发送只会让音频与现实时间不同步；更好的做法是接受音频中的跳过，并继续传输数据流。在第二种方法中，数据包被认为是至关重要的，例如玩家打开一个宝箱、搜索被杀死的敌人寻找宝藏，或者更新他们的移动方向。对等方需要发送这些数据才能顺利执行命令。如果你跳过了这个数据包，将会让用户感到沮丧，因为他们不得不自己重试该动作，而不是让网络为他们重试。
    |


    现在我们已经涵盖了将数据包从一个设备发送到另一个设备所涉及的重要问题，我们可以来看看这些原则如何应用于 iOS 平台本身。


    在 Game Kit 中，数据可以通过两种模式发送：第一种是 `GKSendDataReliable`；第二种自然就是 `GKSendDataUnreliable`。若要了解每种模式为我们做了什么，以及它们如何与我们刚刚讨论的主题相契合，请参见表
    7-2。


    **表 7-2.** 数据包属性及其在 Game Center 中的应用


    | 属性 | `GKSendDataReliable` | `GKSendDataUnreliable` |

    | --- | --- | --- |

    | 优先级 | Game Kit 网络在处理数据包时不考虑任何类型的优先级。数据包按照它们被送入系统的顺序发送。 | Game Kit 网络在处理数据包时不考虑任何类型的优先级。数据包按照它们被送入系统的顺序发送。
    |

    | 排序 | 数据包将按照它们被发送的顺序接收。 | 使用此方法的数据包可能不会按照它们被发送的顺序接收。 |

    | 重试 | 数据包将持续重试，直到成功接收。在第一个数据包收到确认之前，不会发送下一个数据包。 | 数据包被发送后，立即从队列中移除。API 在发送下一个数据包之前，不会等待接收成功的通知。这自然比在每个数据包之间等待响应要快。
    |

    '
- fmt: '# Sending Only What Is Needed


    One of the most vital mistakes that first-timers make when designing a network
    is sending too much data. It is easy to just send everything. At the beginning
    of this chapter, we talked about a game that exhibited this very problem.


    > “If I had more time I would write a shorter letter.” —Blaise Pascal


    Pascal could have very well been talking about network packets, in this often-misattributed
    quote. The size of the packet can be directly related to the speed, stability,
    and scalability of your network. It is important to spend the time to figure out
    what the absolute bare minimum is that can be sent.


    Take a look at a hypothetical example that some of you might encounter while designing
    a game. For this example, let’s say you are working on a role-playing game. You
    control your hero and guide him or her through a series of dungeons. In these
    dungeons, you can interact with items and encounter various enemies, which you
    will fight in real time. Well, we know we will have some static data; for example,
    the layout of the dungeon probably will not be changing while you are inside it,
    so instead of sending the map tiles to the client every frame or even periodically,
    we should send that data when the player first enters the zone. There might be
    elements that will be moving, but we can predict their behavior infinitely, such
    as a river flowing or a torch flickering. These items can also be loaded once
    with the information they need to stay in sync.


    There are, of course, items that will need to be updated throughout the player’s
    adventures in the dungeon. The player himself will need to be updated every time
    the user creates a new action. For example, if you are running east, you could
    send a packet every frame to tell the server that you are running east. However,
    a much more efficient way to handle this interaction is to tell the server to
    begin moving east at full speed. When you are done moving east, you should inform
    the server that you want to stop. This type of interaction drastically reduces
    the number of messages that need to be sent to the server to accomplish the same
    task. Optimizations such as these are why, when playing modern games, you sometimes
    see disconnected players running into walls—the server never received a `stop-running`
    command before the client disconnected.


    Take the time to design carefully how you will structure your network data. You
    can always add more information, but it becomes very difficult to remove data
    as you dig deeper into your network design. Always look for a way to reduce packet
    size, as there is no downside to packets being too small, but a packet that is
    too large will cause you and your users a lot of suffering down the road.


    ## Prediction and Extrapolation


    Let’s consider another example: this time, a racing game. Each player controls
    a car that is guided around a track. We know where each car is at the start of
    the race. We also know that any messages we send to the server will have an inherited
    latency due to the round-trip network time. Should we not update the car positions
    until the server tells us to? That would result in a very choppy racing game.
    To account for this very common issue, we use predictive technology.


    We know that race cars will, more than likely, continue on a current course for
    the next handful of frames. We will assume things will continue doing what they
    are doing until the server tells us otherwise; if the user steers slightly to
    the left or right, that is a minor correction we will need to make when the server
    informs us of the update. The fact that an object in motion will stay in motion
    until acted on by an outside force is not just a law of physics; it is also the
    first rule of designing a predictive network.


    The chances of an object completely reversing its current course are much less
    than of the object slightly modifying its current course. This makes it easier
    to account for minor changes if the server informs you that things are out of
    sync. In the event that a player does completely change direction or otherwise
    break your prediction about which actions were going to continue, you are only
    off the mark by as much as your current latency, which is typically only a small
    fraction of a second. If you have an object that is likely to continue doing what
    it is doing—such as a player moving, objects in a falling state, bullet trajectory,
    or any type of physics simulation—the best bet is to assume that those actions
    will continue until the server informs you that they have changed.


    Using this information you can predict the information that will be coming from
    the server, and your network will have the appearance of being much faster than
    it actually is. Predictive networking technology is the reason you sometimes see
    players or objects jump around slightly when experiencing lag in games.


    ## Formatting Messages


    Whenever you are designing a network for a game or game-like application, you
    are guaranteed to be dealing with at least two types of messages. These are often
    referred to as state messages and server messages. A state message is a message
    that will directly affect your game engine, such as a player moving or opening
    a chest. Server messages deal with the glue that holds everything together, such
    as connections, disconnections, pings, and errors.


    It is important to quickly sort these messages to different handlers. It is a
    good design pattern to keep the parsing of these messages in different places.
    After all, you don’t want to be scanning all your chat messages in a first-person
    shooter for client timeout messages.


    There are many different methods to handle this segregation, but I have found
    a simple prefix is suitable for most cases. If you prefix all of your state messages
    with a special character that you will not see in server messages, you can quickly
    check the first character in incoming messages to make sure each is delivered
    to the correct parser. If you are designing a more complex network, you can use
    a large number of possible prefixes to make sure things get to the correct place.
    In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html) we will look at practical examples
    of message formatting when we begin to send and receive data.'
  raw: '## Sending Only What Is Needed


    One of the most vital mistakes that first-timers make when designing a network
    is sending too much data. It is easy to just send everything. At the beginning
    of this chapter, we talked about a game that exhibited this very problem.


    > “If I had more time I would write a shorter letter.” —Blaise Pascal


    Pascal could have very well been talking about network packets, in this often-misattributed
    quote. The size of the packet can be directly related to the speed, stability,
    and scalability of your network. It is important to spend the time to figure out
    what the absolute bare minimum is that can be sent.


    Take a look at a hypothetical example that some of you might encounter while designing
    a game. For this example, let’s say you are working on a role-playing game. You
    control your hero and guide him or her through a series of dungeons. In these
    dungeons, you can interact with items and encounter various enemies, which you
    will fight in real time. Well, we know we will have some static data; for example,
    the layout of the dungeon probably will not be changing while you are inside it,
    so instead of sending the map tiles to the client every frame or even periodically,
    we should send that data when the player first enters the zone. There might be
    elements that will be moving, but we can predict their behavior infinitely, such
    as a river flowing or a torch flickering. These items can also be loaded once
    with the information they need to stay in sync.


    There are, of course, items that will need to be updated throughout the player’s
    adventures in the dungeon. The player himself will need to be updated every time
    the user creates a new action. For example, if you are running east, you could
    send a packet every frame to tell the server that you are running east. However,
    a much more efficient way to handle this interaction is to tell the server to
    begin moving east at full speed. When you are done moving east, you should inform
    the server that you want to stop. This type of interaction drastically reduces
    the number of messages that need to be sent to the server to accomplish the same
    task. Optimizations such as these are why, when playing modern games, you sometimes
    see disconnected players running into walls—the server never received a stop-running
    command before the client disconnected.


    Take the time to design carefully how you will structure your network data. You
    can always add more information, but it becomes very difficult to remove data
    as you dig deeper into your network design. Always look for a way to reduce packet
    size, as there is no downside to packets being too small, but a packet that is
    too large will cause you and your users a lot of suffering down the road.


    ## Prediction and Extrapolation


    Let’s consider another example: this time, a racing game. Each player controls
    a car that is guided around a track. We know where each car is at the start of
    the race. We also know that any messages we send to the server will have an inherited
    latency due to the round-trip network time. Should we not update the car positions
    until the server tells us to? That would result in a very choppy racing game.
    To account for this very common issue, we use predictive technology.


    We know that race cars will, more than likely, continue on a current course for
    the next handful of frames. We will assume things will continue doing what they
    are doing until the server tells us otherwise; if the user steers slightly to
    the left or right, that is a minor correction we will need to make when the server
    informs us of the update. The fact that an object in motion will stay in motion
    until acted on by an outside force is not just a law of physics; it is also the
    first rule of designing a predictive network.


    The chances of an object completely reversing its current course are much less
    than of the object slightly modifying its current course. This makes it easier
    to account for minor changes if the server informs you that things are out of
    sync. In the event that a player does completely change direction or otherwise
    break your prediction about which actions were going to continue, you are only
    off the mark by as much as your current latency, which is typically only a small
    fraction of a second. If you have an object that is likely to continue doing what
    it is doing—such as a player moving, objects in a falling state, bullet trajectory,
    or any type of physics simulation—the best bet is to assume that those actions
    will continue until the server informs you that they have changed.


    Using this information you can predict the information that will be coming from
    the server, and your network will have the appearance of being much faster than
    it actually is. Predictive networking technology is the reason you sometimes see
    players or objects jump around slightly when experiencing lag in games.


    ## Formatting Messages


    Whenever you are designing a network for a game or game-like application, you
    are guaranteed to be dealing with at least two types of messages. These are often
    referred to as state messages and server messages. A state message is a message
    that will directly affect your game engine, such as a player moving or opening
    a chest. Server messages deal with the glue that holds everything together, such
    as connections, disconnections, pings, and errors.


    It is important to quickly sort these messages to different handlers. It is a
    good design pattern to keep the parsing of these messages in different places.
    After all, you don’t want to be scanning all your chat messages in a first-person
    shooter for client timeout messages.


    There are many different methods to handle this segregation, but I have found
    a simple prefix is suitable for most cases. If you prefix all of your state messages
    with a special character that you will not see in server messages, you can quickly
    check the first character in incoming messages to make sure each is delivered
    to the correct parser. If you are designing a more complex network, you can use
    a large number of possible prefixes to make sure things get to the correct place.
    In [Chapter 8](#A978-1-4302-4906-1_8_Chapter.html) we will look at practical examples
    of message formatting when we begin to send and receive data.'
