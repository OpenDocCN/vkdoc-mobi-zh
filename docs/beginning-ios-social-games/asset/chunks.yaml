    The last delegate method that is discussed in this section handles the user quitting
    a match from the matchmaker screen. This is accomplished by swiping across a game
    and selecting the Quit option. In the following method, we call `participantQuitOutOfTurnWithOutcome`
    on the match object that is passed to us as part of the method. We pass in the
