  trans: "\n### 加载成就\n\n现在来看我们添加的 `submitAchievement:percentComplete:` 方法。其中包含两个主要的\
    \ if/else 代码块。如果 `[self earnedAchievenmentCache]` 为 NULL，则会执行第一个代码块——在代码首次运行时，该缓存始终为\
    \ NULL。现在让我们看看这段代码。\n\n```\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\
    \ *achievements, NSError *error) {\n    if (error == NULL)\n    {\n        NSMutableDictionary\
    \ *tempCache = [NSMutableDictionary dictionaryWithCapacity: [achievements count]];\n\
    \        for (GKAchievement *achievement in achievements)\n        {\n       \
    \     [tempCache setObject:achievement forKey:[achievement identifier]];\n   \
    \     }\n        [self setEarnedAchievementCache:tempCache];\n        [self submitAchievement:identifier\
    \ percentComplete:percentComplete];\n    }\n    else\n    {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
    \ withArg:NULL error:error];\n    }\n}];\n```\n\n**重要**  \n`loadAchievementsWithCompletionHandler`\
    \ 返回的数组不会显示任何你尚未提交 `percentageCompleted` 的成就。\n\n这段代码的主要功能是将成就列表加载到 `earnedAchievementCache`\
    \ 中。我们调用了 `GKAchievement` 的 `loadAchievementsWithCompletionHandler` 方法。该调用会返回一个数组，其中包含在\
    \ iTunes Connect 中设置的所有成就。接着，我们将 `GKAchievement` 对象以标识符为键存入字典中。\n\n此时，代码再次调用了\
    \ `submitAchievement:percentComplete`。这一次，`earnedAchievementCache` 不为 NULL，因此会执行第二组代码。如果在此过程中遇到错误，我们会使用标准的委托回调将错误发送回委托。\n\
    \n你需要向 `GameCenterManager` 添加一个新的协议方法来处理这个委托回调；现在正是添加的好时机。将以下可选协议添加到头文件中：\n\n\
    ```\n- (void)achievementSubmitted:(GKAchievement*)achievement error:(NSError*)error;\n\
    ```\n\n现在我们来看第二段代码。以下代码成功执行后，会将成就提交到 Game Center 服务器。\n\n```\nGKAchievement *achievement\
    \ = [[self earnedAchievementCache] objectForKey:identifier];\nif (achievement\
    \ != NULL)\n{\n    if ((achievement.percentComplete >= 100.0) || (achievement.percentComplete\
    \ >= percentComplete))\n    {\n        achievement = NULL;\n    }\n    [achievement\
    \ setPercentComplete:percentComplete];\n}\nelse\n{\n    achievement = [[[GKAchievement\
    \ alloc] initWithIdentifier: identifier] autorelease];\n    [achievement setPercentComplete:percentComplete];\n\
    \    [[self earnedAchievementCache] setObject:achievement forKey:[achievement\
    \ identifier]];\n}\n\nif (achievement != NULL)\n{\n    [achievement reportAchievementWithCompletionHandler:\
    \ ^(NSError *error) {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
    \ withArg:achievement error:error];\n    }];\n}\n```\n\n第一行代码根据传入该方法的标识符字符串，从\
    \ `earnedAchievementCache` 中检索 `GKAchievement` 对象。如果成就已完成，或上报的进度与 Game Center\
    \ 服务器上的进度相同，我们将 achievement 设为 NULL。这样可以避免因提交将被忽略的进度而占用网络时间。同时，我们将 `GKAchievement`\
    \ 对象上的 `percentComplete` 属性设置为传入该方法的 double 值。\n\n如果缓存中不存在该成就，我们会分配并初始化一个新实例。在这种情况下，还需要将其添加到本地成就缓存中。\n\
    \n最后一步，在检查非 NULL 之后，提交成就。我们在成就对象上调用 `reportAchievementWithCompletionHandler`，然后通过现有协议将结果传回给委托。\n\
    \n**注意**  \n所有成就都有一个 `percentageComplete` 属性，无论它们是否允许分阶段完成进度。如果你的成就只能完全获得或未获得，那么对于已获得的成就，你需要传入\
    \ 100。\n\n### 成就协议\n\n本节中我们要做的最后一件事是在 `UFOGameViewController` 中实现协议方法。将以下方法添加到该文件的实现中；目前我们只需将错误和成功信息打印到控制台。\n\
    \n```\n- (void)achievementSubmitted:(GKAchievement *)achievement error:(NSError\
    \ *)error;\n{\n    if (error)\n    {\n        NSLog(@\"上报成就时发生错误：%@\", [error\
    \ localizedDescription]);\n    }\n    else\n    {\n        NSLog(@\"成就已提交\");\n\
    \    }\n}\n```\n\n## 重置成就\n\n在某些情况下，你可能需要重置用户的成就。这不仅对调试非常有用；你可能会发现为用户提供一个重置选项也很有用。你可能想添加一个威望模式，或者让用户有机会从头开始你的游戏。以下代码片段将完全重置本地用户在你应用中的所有成就。\n\
    \n```\n- (void)resetAchievements\n{\n    [self setEarnedAchievementCache:NULL];\n\
    \    [GKAchievement resetAchievementsWithCompletionHandler:^(NSError *error) {\n\
    \        if (error == NULL)\n        {\n            NSLog(@\"成就已重置\");\n     \
    \   }\n        else\n        {\n            NSLog(@\"重置成就时发生错误：%@\", [error localizedDescription]);\n\
    \        }\n    }];\n}\n```\n\n**重要**  \n不要忘记移除你存储的成就缓存信息，否则在应用重启之前，你将无法更新重置后的成就进度。\n"
- fmt: "# Adding Achievement Hooks\n\nThe biggest challenge in implementing achievements\
    \ into your app is adding the hooks to activate and progress those achievements\
    \ into your normal routines. I have found that adding these hooks when the program\
    \ is almost finished is easier than trying to add them in as you go.\n\nIn this\
    \ section, I will provide a number of examples of how to tie in achievements;\
    \ your own app may differ significantly, but you should be able to adapt the examples\
    \ easily to suit the specific needs of the achievements.\n\nTo make it easier\
    \ to retrieve achievement progress details, we first add a few convenience methods\
    \ to our `GameCenterManager` class. This is the first method we will use to populate\
    \ the local achievement cache.\n\n```\n- (void)populateAchievementCache\n{\n \
    \    if ([self earnedAchievementCache] == NULL)\n     {\n          [GKAchievement\
    \ loadAchievementsWithCompletionHandler:^(NSArray *achievements,\n          NSError\
    \ *error) {\n               if (error == NULL)\n               {\n           \
    \         NSMutableDictionary* tempCache= [NSMutableDictionary\n             \
    \       dictionaryWithCapacity: [achievements count]];\n                    for\
    \ (GKAchievement *achievement in achievements)\n                    {\n      \
    \                                  [tempCache setObject:achievement forKey:[achievement\n\
    \                                        identifier]];\n                    }\n\
    \                    [self setEarnedAchievementCache:tempCache];\n           \
    \    }\n               else\n               {\n                    NSLog(@\"An\
    \ error occurred while loading achievements: %@\",\n                     [error\
    \ localizedDescription]);\n               }\n          }];\n     }\n}\n```\n\n\
    This method functions very similarly to the cache population code in the submit\
    \ achievement progress method previewed in the previous section. We will need\
    \ to populate the local cache in order to work with the other two convenience\
    \ methods. We will want to call the `populateAchievementCache` as soon as we can\
    \ after authenticating; in our demo app, I have added a call to it from the local\
    \ player did authenticate method in `GameCenterManager`. Add the following method\
    \ as well.\n\n```\n- (double)percentageCompleteOfAchievementWithIdentifier:(NSString*)identifier\n\
    {\n     if ([self earnedAchievementCache] == NULL)\n     {\n          NSLog(@\"\
    Unable to determine achievement progress, local cache is empty\");\n     }\n \
    \    else\n     {\n          GKAchievement *achievement= [[self earnedAchievementCache]\n\
    \          objectForKey:identifier];\n          if (achievement != NULL)\n   \
    \       {\n               return [achievement percentComplete];\n          }\n\
    \          else\n          {\n               return 0;\n          }\n     }\n\
    \     return -1;\n}\n```\n\nThis method returns a double for the percent complete\
    \ for the achievement with the identifier passed to it. If it cannot find a copy\
    \ of the achievement in the local cache, we can assume the percent complete is\
    \ 0. The next method uses this method to return either `YES` or `NO` on whether\
    \ an achievement has been completed.\n\n```\n- (BOOL)achievementWithIdentifierIsComplete:\
    \ (NSString*)identifier\n{\n       if ([self percentageCompleteOfAchievementWithIdentifier:identifier]\
    \ >= 100)\n         {\n              return YES;\n       }\n         else\n  \
    \       {\n              return NO;\n       }\n}\n```\n\n> **Note:** Do not forget\
    \ to call `populateAchievementCache` as soon as possible after authentication.\
    \ Otherwise, these convenience methods will not return the correct achievement\
    \ data.\n\n## Adding Hooks in UFOs\n\nNow that we have some helper methods in\
    \ place, we can begin to hook up the achievement hooks for UFOs. We have three\
    \ achievements we need to tie in. The first two both have to do with the number\
    \ of cows that we have abducted, so let’s start there. Modify the `finishAbducting`\
    \ method of `UFOGameViewController` to match the following.\n\n```\n- (void)finishAbducting\n\
    {\n       if (!currentAbductee || !tractorBeamOn) return;\n       [cowArray removeObjectIdenticalTo:currentAbductee];\n\
    \       [tractorBeamImageView removeFromSuperview];\n      tractorBeamOn = NO;\n\
    \       score++;\n       [scoreLabel setText:[NSString stringWithFormat:@\"SCORE\
    \ %05.0f\", score]];\n       [[currentAbductee layer] removeAllAnimations];\n\
    \      [currentAbductee removeFromSuperview];\n       currentAbductee = nil;\n\
    \          [self spawnCow];\n       if (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    \        @\"com.dragonforged.ufo.aduct1\"])\n         {\n              [[self\
    \ gcManager] submitAchievement:@\"com.dragonforged.ufo.aduct1\"\n           percentComplete:100];\n\
    \       }\n}\n```\n\nWe are concerned with only the last few lines of this method\
    \ at this time. First, we call our convenience method `achievementWithIdentifierIsComplete`\
    \ on our identifier string for a single abduction. Because this is an earned or\
    \ unearned achievement, we don’t need to worry about current percentage complete.\
    \ To mark the achievement as complete, we set its percent complete to 100.\n\n\
    > **Note:** Don’t forget to change the identifier string from the example to the\
    \ one that you used (if different) in iTunes Connect for a single abduction.\n\
    \nThe next achievement is hooked up in a similar fashion; the only difference\
    \ is that we use incremental progress. Add the following code snippet to the end\
    \ of the `finishAbducting` method.\n\n```\nif (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    @\"com.dragonforged.ufo.abduct25\"])\n{\n       double percentComplete = [[self\
    \ gcManager]\n         percentageCompleteOfAchievementWithIdentifier: @\"com.dragonforged.ufo.abduct25\"\
    ];\n       percentComplete += 4;\n       [[self gcManager] submitAchievement:@\"\
    com.dragonforged.ufo.abduct25\"\n         percentComplete:percentComplete];\n\
    }\n```\n\nIn this code snippet, we use the same methodology that we did for submitting\
    \ a complete achievement, but with one main difference. We first need to determine\
    \ the current progress on the achievement. We then add 4 to it, since 4 percent\
    \ of 25 is one. To increment by a single abduction out of 25, we need to add 4\
    \ percent.\n\n> **Tip:** Do not forget about the `resetAchievement` method that\
    \ we added to `GameCenterManager`. It is very useful in debugging the submit code.\
    \ It is helpful to keep a call to this in the `didAuthenticate` section to always\
    \ put the app back to a clean state during debugging.\n\nGo ahead and run the\
    \ game and abduct a few cows. When you are done, you will notice that the achievement\
    \ screen now shows progress similar to that shown in Figure 4-8. If you abducted\
    \ at least one cow, you should have a complete achievement. If you abducted fewer\
    \ than 25 cows, you should have one progressed achievement. Notice that the user\
    \ is not informed when they complete an achievement; we will discuss a method\
    \ of notification in the later section “Providing Feedback on Completing an Achievement.”\n\
    \n![A978-1-4302-4906-1_4_Fig8_HTML.jpg](A978-1-4302-4906-1_4_Fig8_HTML.jpg)\n\n\
    **Figure 4-8.** View progressing achievements using the Apple-provided interface"
  raw: '## Adding Achievement Hooks


    The biggest challenge in implementing achievements into your app is adding the
    hooks to activate and progress those achievements into your normal routines. I
    have found that adding these hooks when the program is almost finished is easier
    than trying to add them in as you go.


    In this section, I will provide a number of examples of how to tie in achievements;
    your own app may differ significantly, but you should be able to adapt the examples
    easily to suit the specific needs of the achievements.


    To make it easier to retrieve achievement progress details, we first add a few
    convenience methods to our `GameCenterManager` class. This is the first method
    we will use to populate the local achievement cache.


    `- (void)populateAchievementCache`


    `{`


         `if ([self earnedAchievementCache] == NULL)`


         `{`


              `[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray *achievements,`
    É


              `NSError *error) {`


                   `if (error == NULL)`


                   `{`


                        `NSMutableDictionary* tempCache= [NSMutableDictionary` É


                        `dictionaryWithCapacity: [achievements count]];`


                        `for (GKAchievement *achievement in achievements)`


                        `{`


                                            `[tempCache setObject:achievement forKey:[achievement`


                                            `identifier]];`


                        `}`


                        `[self setEarnedAchievementCache:tempCache];`


                   `}`


                   `else`


                   `{`


                        `NSLog(@"An error occurred while loading achievements: %@",`
    É


                         `[error localizedDescription]);`


                   `}`


              `}];`


         `}`


    `}`


    This method functions very similarly to the cache population code in the submit
    achievement progress method previewed in the previous section. We will need to
    populate the local cache in order to work with the other two convenience methods.
    We will want to call the `populateAchievementCache` as soon as we can after authenticating;
    in our demo app, I have added a call to it from the local player did authenticate
    method in `GameCenterManager`. Add the following method as well.


    `- (double)percentageCompleteOfAchievementWithIdentifier:(NSString*)identifier`


    `{`


         `if ([self earnedAchievementCache] == NULL)`


         `{`


              `NSLog(@"Unable to determine achievement progress, local cache is empty");`


         `}`


         `else`


         `{`


              `GKAchievement *achievement= [[self earnedAchievementCache]`


              `objectForKey:identifier];`


              `if (achievement != NULL)`


              `{`


                   `return [achievement percentComplete];`


              `}`


              `else`


              `{`


                   `return 0;`


              `}`


         `}`


         `return -1;`


    `}`


    This method returns a double for the percent complete for the achievement with
    the identifier passed to it. If it cannot find a copy of the achievement in the
    local cache, we can assume the percent complete is 0\. The next method uses this
    method to return either YES or NO on whether an achievement has been completed.


    `- (BOOL)achievementWithIdentifierIsComplete: (NSString*)identifier`


    `{`


           `if ([self percentageCompleteOfAchievementWithIdentifier:identifier] >=
    100)`


             `{`


                  `return YES;`


           `}`


             `else`


             `{`


                  `return NO;`


           `}`


    `}`


    Note


    Do not forget to call `populateAchievementCache` as soon as possible after authentication.
    Otherwise, these convenience methods will not return the correct achievement data.


    ### Adding Hooks in UFOs


    Now that we have some helper methods in place, we can begin to hook up the achievement
    hooks for UFOs. We have three achievements we need to tie in. The first two both
    have to do with the number of cows that we have abducted, so let’s start there.
    Modify the `finishAbducting` method of `UFOGameViewController` to match the following.


    `- (void)finishAbducting`


    `{`


           `if (!currentAbductee || !tractorBeamOn) return;`


           `[cowArray removeObjectIdenticalTo:currentAbductee];`


           `[tractorBeamImageView removeFromSuperview];`


          `tractorBeamOn = NO;`


           `score++;`


           `[scoreLabel setText:[NSString stringWithFormat:@"SCORE %05.0f", score]];`


           `[[currentAbductee layer] removeAllAnimations];`


          `[currentAbductee removeFromSuperview];`


           `currentAbductee = nil;`


              `[self spawnCow];`


           `if (![[self gcManager] achievementWithIdentifierIsComplete:`É


            `@"com.dragonforged.ufo.aduct1"])`


             `{`


                  `[[self gcManager] submitAchievement:@"com.dragonforged.ufo.aduct1"`É


               `percentComplete:100];`


           `}`


    `}`


    We are concerned with only the last few lines of this method at this time. First,
    we call our convenience method `achievementWithIdentifierIsComplete` on our identifier
    string for a single abduction. Because this is an earned or unearned achievement,
    we don’t need to worry about current percentage complete. To mark the achievement
    as complete, we set its percent complete to 100.


    Note


    Don’t forget to change the identifier string from the example to the one that
    you used (if different) in iTunes Connect for a single abduction.


    The next achievement is hooked up in a similar fashion; the only difference is
    that we use incremental progress. Add the following code snippet to the end of
    the `finishAbducting` method.


    `if (![[self gcManager] achievementWithIdentifierIsComplete:`É


    `@"com.dragonforged.ufo.abduct25"])`


    `{`


           `double percentComplete = [[self gcManager]`É


             `percentageCompleteOfAchievementWithIdentifier: @"com.dragonforged.ufo.abduct25"];`


           `percentComplete += 4;`


           `[[self gcManager] submitAchievement:@"com.dragonforged.ufo.abduct25"`É


             `percentComplete:percentComplete];`


    `}`


    In this code snippet, we use the same methodology that we did for submitting a
    complete achievement, but with one main difference. We first need to determine
    the current progress on the achievement. We then add 4 to it, since 4 percent
    of 25 is one. To increment by a single abduction out of 25, we need to add 4 percent.


    Tip


    Do not forget about the `resetAchievement` method that we added to `GameCenterManager`.
    It is very useful in debugging the submit code. It is helpful to keep a call to
    this in the `didAuthenticate` section to always put the app back to a clean state
    during debugging.


    Go ahead and run the game and abduct a few cows. When you are done, you will notice
    that the achievement screen now shows progress similar to that shown in Figure
    [4-8](#A978-1-4302-4906-1_4_Chapter.html#Fig8). If you abducted at least one cow,
    you should have a complete achievement. If you abducted fewer than 25 cows, you
    should have one progressed achievement. Notice that the user is not informed when
    they complete an achievement; we will discuss a method of notification in the
    later section “Providing Feedback on Completing an Achievement.”


    ![A978-1-4302-4906-1_4_Fig8_HTML.jpg](A978-1-4302-4906-1_4_Fig8_HTML.jpg)


    Figure 4-8.


    View progressing achievements using the Apple-provided interface'
  trans: "\n# 添加成就挂钩\n\n在应用中实现成就功能时，最大的挑战在于如何将触发和推进成就的挂钩嵌入到常规操作流程中。我发现，在程序接近完成时添加这些挂钩比边开发边添加更容易。\n\
    \n本节将提供多个成就关联的示例；你的应用可能差异较大，但应能轻松调整这些示例以满足特定成就需求。\n\n为便于获取成就进度详情，我们首先在 `GameCenterManager`\
    \ 类中添加几个便捷方法。以下是用于填充本地成就缓存的第一个方法。\n\n```\n- (void)populateAchievementCache\n{\n\
    \     if ([self earnedAchievementCache] == NULL)\n     {\n          [GKAchievement\
    \ loadAchievementsWithCompletionHandler:^(NSArray *achievements,\n          NSError\
    \ *error) {\n               if (error == NULL)\n               {\n           \
    \         NSMutableDictionary* tempCache= [NSMutableDictionary\n             \
    \       dictionaryWithCapacity: [achievements count]];\n                    for\
    \ (GKAchievement *achievement in achievements)\n                    {\n      \
    \                                  [tempCache setObject:achievement forKey:[achievement\n\
    \                                        identifier]];\n                    }\n\
    \                    [self setEarnedAchievementCache:tempCache];\n           \
    \    }\n               else\n               {\n                    NSLog(@\"An\
    \ error occurred while loading achievements: %@\",\n                     [error\
    \ localizedDescription]);\n               }\n          }];\n     }\n}\n```\n\n\
    此方法的功能与上一节预览的提交成就进度方法中的缓存填充代码非常相似。为了使用其他两个便捷方法，我们需要先填充本地缓存。在身份验证完成后，应尽快调用 `populateAchievementCache`；在演示应用中，我在\
    \ `GameCenterManager` 的本地玩家身份验证方法中添加了该调用。请同时添加以下方法。\n\n```\n- (double)percentageCompleteOfAchievementWithIdentifier:(NSString*)identifier\n\
    {\n     if ([self earnedAchievementCache] == NULL)\n     {\n          NSLog(@\"\
    Unable to determine achievement progress, local cache is empty\");\n     }\n \
    \    else\n     {\n          GKAchievement *achievement= [[self earnedAchievementCache]\n\
    \          objectForKey:identifier];\n          if (achievement != NULL)\n   \
    \       {\n               return [achievement percentComplete];\n          }\n\
    \          else\n          {\n               return 0;\n          }\n     }\n\
    \     return -1;\n}\n```\n\n此方法返回传入标识符对应成就的完成百分比（双精度浮点数）。如果在本地缓存中找不到该成就副本，则假定完成百分比为\
    \ 0。下一个方法使用此方法返回布尔值，指示成就是否已完成。\n\n```\n- (BOOL)achievementWithIdentifierIsComplete:\
    \ (NSString*)identifier\n{\n       if ([self percentageCompleteOfAchievementWithIdentifier:identifier]\
    \ >= 100)\n         {\n              return YES;\n       }\n         else\n  \
    \       {\n              return NO;\n       }\n}\n```\n\n> **注：** 身份验证后请务必尽快调用\
    \ `populateAchievementCache`，否则这些便捷方法将无法返回正确的成就数据。\n\n## 在 UFO 游戏中添加挂钩\n\n现在我们已经准备好一些辅助方法，可以开始为\
    \ UFO 游戏关联成就挂钩。我们需要关联三个成就。前两个都与我们绑架的奶牛数量有关，因此从这里开始。修改 `UFOGameViewController`\
    \ 的 `finishAbducting` 方法如下：\n\n```\n- (void)finishAbducting\n{\n       if (!currentAbductee\
    \ || !tractorBeamOn) return;\n       [cowArray removeObjectIdenticalTo:currentAbductee];\n\
    \       [tractorBeamImageView removeFromSuperview];\n      tractorBeamOn = NO;\n\
    \       score++;\n       [scoreLabel setText:[NSString stringWithFormat:@\"SCORE\
    \ %05.0f\", score]];\n       [[currentAbductee layer] removeAllAnimations];\n\
    \      [currentAbductee removeFromSuperview];\n       currentAbductee = nil;\n\
    \          [self spawnCow];\n       if (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    \        @\"com.dragonforged.ufo.aduct1\"])\n         {\n              [[self\
    \ gcManager] submitAchievement:@\"com.dragonforged.ufo.aduct1\"\n           percentComplete:100];\n\
    \       }\n}\n```\n\n我们目前只关注此方法的最后几行。首先，我们对单次绑架的标识符字符串调用便捷方法 `achievementWithIdentifierIsComplete`。由于这是一个“已获得/未获得”类成就，我们无需关心当前的完成百分比。要将成就标记为已完成，将其完成百分比设置为\
    \ 100 即可。\n\n> **注：** 如果示例中的标识符字符串与您在 iTunes Connect 中为单次绑架使用的字符串不同，请务必进行相应更改。\n\
    \n下一个成就的挂钩方式类似，唯一区别在于我们使用增量进度。将以下代码片段添加到 `finishAbducting` 方法的末尾。\n\n```\nif (![[self\
    \ gcManager] achievementWithIdentifierIsComplete:\n@\"com.dragonforged.ufo.abduct25\"\
    ])\n{\n       double percentComplete = [[self gcManager]\n         percentageCompleteOfAchievementWithIdentifier:\
    \ @\"com.dragonforged.ufo.abduct25\"];\n       percentComplete += 4;\n       [[self\
    \ gcManager] submitAchievement:@\"com.dragonforged.ufo.abduct25\"\n         percentComplete:percentComplete];\n\
    }\n```\n\n此代码片段使用了与提交完整成就相同的方法，但有一个主要区别：我们需要先确定当前成就进度，然后在此基础上增加 4（因为 25 的 4% 等于\
    \ 1）。要递增 25 次绑架中的一次，就需要增加 4%。\n\n> **提示：** 别忘了我们在 `GameCenterManager` 中添加的 `resetAchievement`\
    \ 方法。它在调试提交代码时非常有用。建议在 `didAuthenticate` 部分保留对该方法的调用，以便在调试期间始终将应用恢复到干净状态。\n\n\
    现在运行游戏并绑架几只奶牛。完成后，您会注意到成就界面显示进度，如图 4-8 所示。如果至少绑架了一只奶牛，您应该会获得一个已完成成就。如果绑架的奶牛少于\
    \ 25 只，则应获得一个进度成就。请注意，用户完成成就时不会收到通知；我们将在后续章节“提供成就完成反馈”中讨论通知方法。\n\n![A978-1-4302-4906-1_4_Fig8_HTML.jpg](img/A978-1-4302-4906-1_4_Fig8_HTML.jpg)\n\
    \n**图 4-8.** 使用 Apple 提供的界面查看成就进度\n"
- fmt: "### A Time-Based Achievement Hook\n\nThe last hook we add for this project\
    \ handles the player for the five-minute achievement. Your first instinct is probably\
    \ to keep track of time played, and submit it as progress when your user exits\
    \ the game. This might not be the best approach. We want to inform the user when\
    \ they complete an achievement. You don't want them to have to wait until they\
    \ finish a game to see which achievements they have earned. There are many approaches\
    \ to this problem. For this example, we will fire an `NSTimer` every three seconds\
    \ (which is one percent of five minutes) and update the achievement progress.\
    \ Add the following code to `UFOGameViewController`.\n\n```\n- (void)tickThreeSeconds\n\
    {\n    if ([[self gcManager]achievementWithIdentifierIsComplete:\n        @\"\
    com.dragonforged.ufo.play5\"]) return;\n    double percentComplete = [[self gcManager]\n\
    \        percentageCompleteOfAchievementWithIdentifier:@\"com.dragonforged.ufo.play5\"\
    ];\n    percentComplete++;\n    [[self gcManager] submitAchievement:@\"com.dragonforged.ufo.play5\"\
    \n        percentComplete:percentComplete];\n}\n```\n\nHere we start a three-second\
    \ timer. Every time the timer fires, we call `tickThreeSeconds`. This gives us\
    \ our current progress of the achievement, to which we add one percent, and then\
    \ submits it back to the server. In the event that the achievement is already\
    \ complete, the method simply returns. In addition, modify the `viewDidAppear`\
    \ and `viewWillDisappear` methods to match the following:\n\n```\n-(void)viewDidAppear:(BOOL)animated\n\
    {\n    [super viewDidAppear: animated];\n    timer = [NSTimer scheduledTimerWithTimeInterval:3.0\
    \ target:self\n        selector:@selector(tickThreeSeconds) userInfo:nil repeats:YES];\n\
    }\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:\
    \ animated];\n    [timer invalidate];\n    timer = nil;\n}\n```\n\n### Another\
    \ Convenience Method\n\nThere might be occasions where you would like to get `GKAchievement`\
    \ but all you have available is an achievement identifier. The following method\
    \ will return a `GKAchievement` when passed an achievement identifier.\n\n```\n\
    - (GKAchievement*)achievementForIdentifier:(NSString*)identifier\n{\n    GKAchievement\
    \ *achievement = [[self earnedAchievementCache] objectForKey:identifier];\n  \
    \  if (achievement == nil)\n    {\n        achievement = [[[GKAchievement alloc]\
    \ initWithIdentifier:identifier] autorelease];\n        [[self earnedAchievementCache]\
    \ setObject:achievement forKey:[achievement identifier]];\n    }\n    return achievement;\n\
    }\n```\n\n### Providing Feedback on Completing an Achievement\n\nIt is important\
    \ to let users know when they have completed an achievement. However, you don't\
    \ want to just present a `UIAlertView`, as that would be very distracting, considering\
    \ that most achievements are going to be completed in the middle of an action,\
    \ such as completing 20 laps in a racing game. You wouldn't want to take the user\
    \ away from any interaction, so we need a better system. I have always been a\
    \ fan of the small view that slides in from the bottom or top to inform the user\
    \ of the accomplishment—very similar to the way you get feedback logging in to\
    \ Game Center. Since iOS 5, Apple has provided a built in achievement banner;\
    \ see the section \"Achievement Completion Banners\" later in this chapter for\
    \ its use.\n\nThe first thing we need to do in order to implement a feedback system\
    \ is add a new protocol method to `GameCenterManager`. We will use this to inform\
    \ the delegate that an achievement has been completed for the first time. Add\
    \ the following method to the header file, as an optional protocol:\n\n```\n-(void)achievementEarned:(GKAchievementDescription*)achievement;\n\
    ```\n\nIn addition, we need to modify our existing `submitAchievement:percentComplete:`\
    \ method. Take a look at the last `if` statement block of that method. We want\
    \ to modify it as shown next. Begin by adding an `if` statement to determine whether\
    \ we have a `percentageComplete` over 100, which will call our new protocol. Also\
    \ notice that we are using `GKAchievementDescription` instead of `GKAchievement`.\
    \ We will discuss this method further in the later section, \"Retrieving Achievement\
    \ Data.\"\n\n```\nif (achievement != NULL)\n{\n    [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n        if (percentComplete< 100)\n        {\n            [self callDelegateOnMainThread:\n\
    \                @selector(achievementSubmitted:error:)\n                withArg:achievement\
    \ error:error];\n            return;\n        }\n        [GKAchievementDescription\n\
    \            loadAchievementDescriptionsWithCompletionHandler:\n            ^(NSArray\
    \ *descriptions, NSError *error) {\n                for (GKAchievementDescription\
    \ *achievementDescription in descriptions)\n                {\n              \
    \      if (![[achievement identifier] isEqualToString:\n                     \
    \   [achievementDescription identifier]]) continue;\n                    [self\
    \ callDelegateOnMainThread:@selector\n                        (achievementEarned:)\n\
    \                        withArg:achievementDescription error:nil];\n        \
    \        }\n            }];\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\n\
    \            withArg:achievement error:error];\n    }];\n}\n```\n\nThis completes\
    \ the modifications that we need to make to the `GameCenterManager` class. Now\
    \ we need to hook up the visual feedback for the user. Move back into `UFOGameViewController.m`\
    \ and add our new protocol method, `achievementEarned:`. You could add any type\
    \ of feedback here, including a standard `UIAlertView`, but we will be exploring\
    \ something a little more user-friendly in this section.\n\nWe need to create\
    \ some new `IBOutlets` as part of our `UFOGameViewController`. Make a new view\
    \ and set its dimensions to 480 × 25. Then set the background of the view to black\
    \ with 70% opacity. We also create a new label, place it in the center of this\
    \ view, and set the text alignment to center. Your view should look similar to\
