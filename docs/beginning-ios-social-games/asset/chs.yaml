  \ UFO 静静悬在空中。下一步是将我们的移动数据发送给对等设备，以便它们能更新敌方玩家的位置。为此，我们在 `movePlayer` 方法的末尾添加一段新代码：\n\
  \n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n{\n    //... (现有移动玩家代码)\n\
  \    if (self.gameIsMultiplayer)\n    {\n        NSString *positionString = [NSString\
