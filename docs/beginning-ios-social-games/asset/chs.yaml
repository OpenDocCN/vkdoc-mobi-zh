  \ = cowImageArray;\n    }\n    [tempCow startAnimating];\n}\n```\n\n此方法与现有的更新奶牛路径方法非常相似。两个区别在于：我们从网络获取奶牛在数组中的位置，并且不随机生成\
  \ `newX` 坐标。如果再次运行游戏，你会看到两组奶牛现在已经同步。当奶牛位置改变时，两台设备上的结果完全相同。图 8-2 展示了游戏当前状态。\n\n![A978-1-4302-4906-1_8_Fig2_HTML.jpg](img/A978-1-4302-4906-1_8_Fig2_HTML.jpg)\n\
  \n**图 8-2.** 在两台 iOS 设备间通过网络同步奶牛运动\n\n现在每位玩家都可以绑架奶牛并增加自己的分数。然而，还有两个问题需要解决。第一个是我们在设备之间不共享分数，第二个是我们不显示其他玩家的牵引光束，也不在绑架过程中将奶牛动画化到\
  \ UFO 中。我们先从添加对分数的支持开始。\n\n### 共享分数\n\n当分数增加时，我们将数据发送给对等设备。在 `finishAbducting` 方法中，紧接在增加分数代码之后，添加以下代码片段。\n\
