  \ Game Center 功能，包括排行榜。如果尝试这样做，你会收到 `GKErrorNotAuthenticated` 错误。\n\n![A978-1-4302-4906-1_3_Fig9_HTML.jpg](img/A978-1-4302-4906-1_3_Fig9_HTML.jpg)\n\
  \n**图 3-9.** 使用 Apple 图形界面显示的排行榜合集\n\n> **提示：** 你可以通过在 iTunes Connect 中上下拖动排行榜条目来更改排行榜的显示顺序（见图\
  \ 3-9）。\n\n### 自定义排行榜\n\n如上一节所示，向用户展示排行榜非常直接。但是，如果你想自定义排行榜的外观呢？在本节中，我们将逐步讲解获取原始排行榜信息的过程，以便你可以根据自身需求以任何方式在应用中呈现。\n\
  \n我们通过向 `UFOViewController` 添加一个新按钮及其关联操作来开始添加自定义排行榜的流程。在前一个排行榜按钮旁添加一个新按钮，并为其创建一个新操作。\n\
  \n在前一个示例中，Apple 为我们提供了一个视图控制器。当处理自定义排行榜时，我们需要自己创建一个视图控制器来处理展示。创建 `UIViewController`\
  \ 的一个新子类，并将其命名为 `UFOLeaderboardViewController`。修改新自定义排行榜按钮的操作，使其展示 `UFOLeaderboardViewController`\
  \ 的一个新实例，如以下代码片段所示：\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n{\nUFOLeaderboardViewController\
  \ *leaderboardViewController = [[UFOLeaderboardViewController alloc] init];\nleaderboardViewController.gcManager\
  \ = gcManager;\n[self presentViewController: leaderboardViewController animated:\
  \ YES completion: nil];\n[leaderboardViewController release];\n}\n```\n\n下一步是设置新\
  \ `UFOLeaderboardViewController` 的 xib。我们将使用如图 3-10 所示的设置；当然，你也可以在这里进行任何形式的自定义。按照图中的指示创建输出口和对象，并连接所有连接，包括表格的委托和数据源。\n\
  \n![A978-1-4302-4906-1_3_Fig10_HTML.jpg](img/A978-1-4302-4906-1_3_Fig10_HTML.jpg)\n\
  \n**图 3-10.** 为自定义排行榜创建 xib\n\n首先应该连接的是“关闭”按钮。将以下代码片段添加到你连接到关闭按钮的操作中：\n\n```\n-(IBAction)dismiss;\n\
  {\n[self dismissViewControllerAnimated: YES completion: nil];\n}\n```\n\n如果此时运行应用并点击“自定义排行榜”按钮，它应能以一个正确的方向启动一个空白表格，并且你可以关闭它以返回第一个视图。\n\
  \n现在，我们已经处理完了视图控制器的基本框架，可以开始专注于 Game Center 特有的功能了。首先，设置我们将要使用的表格视图委托和数据源方法。我们需要创建一个新的类属性来保存要显示的分数数据。创建一个新的\
  \ `NSArray` 对象，并命名为 `scoreArray`。同时为这个数组创建关联的属性并实现合成。在你的实现中添加以下两个方法：\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\nreturn [self.scoreArray\
  \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:\n\
  (NSIndexPath *)indexPath\n{\nstatic NSString *CellIdentifier = @\"Cell\";\nUITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:\nCellIdentifier];\nif (cell\
  \ == nil)\n{\ncell = [[[UITableViewCell alloc] initWithStyle:\nUITableViewCellStyleSubtitle\n\
  reuseIdentifier:\nCellIdentifier] autorelease];\ncell.selectionStyle = UITableViewCellSelectionStyleNone;\n\
  }\nGKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\ncell.textLabel.text\
  \ = score.playerID;\ncell.detailTextLabel.text = score.formattedValue;\nreturn cell;\n\
  }\n```\n\n第一个方法返回表格视图中的项目数量。本例中我们只处理一个区段，因此行数始终等于数组中的分数个数。下一个方法将分数显示到单元格中。本例中我们使用\
  \ `UITableViewCellStyleSubtitle`，但在大多数情况下，你可能需要创建更自定义的单元格。主标签设置为玩家 ID，副标签设置为格式化的分数值。上一章曾提到，永远不应向用户显示玩家\
  \ ID。我们将在下一节中添加一个将玩家 ID 转换为玩家别名的方法；在此之前，我们先用玩家 ID 进行调试。\n\n\n\n### 修改 GameCenterManager\n\
  \n现在让我们将注意力切换到 `GameCenterManager` 类。在头文件中，创建一个新的可选协议，如下所示：\n\n```\n(void)leaderboardUpdated:\
  \ (NSArray *)scores error:(NSError *)error;\n```\n\n接下来，我们创建一个新方法，用于从 Game Center\
  \ 服务器检索分数。将以下方法添加到 `GameCenterManager` 类的实现中：\n\n```\n- (void)retrieveScoresForCategory:(NSString\
  \ *)category\n                withPlayerScope:(GKLeaderboardPlayerScope)playerScope\n\
  \                      timeScope:(GKLeaderboardTimeScope)timeScope\n           \
  \           withRange:(NSRange)range;\n{\n    GKLeaderboard *leaderboardRequest\
  \ = [[GKLeaderboard alloc] init];\n    leaderboardRequest.playerScope = playerScope;\n\
  \    leaderboardRequest.timeScope = timeScope;\n    leaderboardRequest.range = range;\n\
  \    leaderboardRequest.category = category;\n    [leaderboardRequest loadScoresWithCompletionHandler:\
  \ ^(NSArray *scores,NSError*error)\n     {\n        [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)\n\
  \                               withArg:scores\n                               \
  \  error:error];\n     }];\n}\n```\n\n我们希望尽可能保持这个调用的通用性，因为 `GameCenterManager` 类的最终目标是成为一个可复用的类，能够轻松地嵌入到你未来的任何项目中。\n\
  \n此方法接收创建新 `GKLeaderboard` 对象所需的全部参数。一旦我们创建了对象并设置了必要的属性，就可以在 `GKLeaderboard` 对象上调用\
  \ `loadScoresWithCompletionHandler` 方法。我们将继续使用标准的线程安全委托回调。这就是本节在 `GameCenterManager`\
  \ 类中所需的所有修改。\n\n### 在自定义排行榜上过滤结果\n\n让我们将注意力重新转回 `UFOLeaderboardCiewController` 类。接下来，我们将为分段控制器添加一个操作。这将允许用户在**全局分数**和**仅好友分数**之间切换。将以下方法连接到分段控制器的\
  \ `valueChanged` 操作：\n\n```\n-(IBAction)segementedControllerDidChange:(id)sender;\n\
  {\n    GKLeaderboardPlayerScope playerScope;\n    if ([scopeSegementedController\
  \ selectedSegmentIndex] == 0)\n    {\n        playerScope = GKLeaderboardPlayerScopeFriendsOnly;\n\
  \    }\n    else\n    {\n        playerScope = GKLeaderboardPlayerScopeGlobal;\n\
  \    }\n    self.scoreArray = nil;\n    [self.gcManager retrieveScoresForCategory:@\"\
  com.dragonforged.ufo.single\"\n                             withPlayerScope:playerScope\n\
  \                                   timeScope:GKLeaderboardTimeScopeAllTime\n  \
  \                                 withRange:NSMakeRange(1,50)];\n    [leaderboardTableView\
  \ reloadData];\n}\n```\n\n此方法调用 `GameCenterManager` 方法来检索分数数组。分段控件有两个值：一个用于好友，一个用于所有人。你也可以轻松地修改上述代码来检索不同的时间范围，但在本例中，我们只请求**所有时间**的范围。这里容易忽略的一个重要步骤是将数组设置为\
  \ nil 并重新加载表格。这样做可以在分段控件值更改时移除表格中现有的分数。\n\n检索分数的调用相当直接。我们使用在 iTunes Connect 中为要检索的排行榜设置的类别，并设置时间和玩家范围。该方法的最后一个参数是一个范围。在本例中，我们返回从第一名到第五十名的分数。\n\
  \n你还需要为 `UFOLeaderboardViewController` 类创建一个新属性；这将是一个指向我们 `GameCenterManager` 类的指针。其操作方式与我们在\
  \ `UFOGameViewController` 类中所做的方式完全相同。\n\n> **注意：** 分数范围始终从索引 1 开始。你可以将前面的示例修改为新的范围\
  \ `NSMakeRange(50,50)`；这将检索从第 50 名到第 100 名的分数。请确保不要一次请求太多分数，因为检索分数数据所需的时间与你尝试检索的分数数量相关。\n\
  \n### 显示自定义排行榜\n\n如果你现在运行这个项目，你会发现表格始终是空白的。这由两个遗漏引起。首先，我们从未为 `gcManager` 设置值；其次，我们从未调用\
  \ `retrieveScore` 方法。为纠正此问题，请将 `UFOLeaderboardViewController` 实现的 `viewDidLoad`\
  \ 方法修改为如下所示。`retrieveScore` 方法会在调用 `segmentedControllerDidChange` 时被触发。\n\n```\n\
  -(void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.gcManager.delegate = self;\n\
  \    [self segementedControllerDidChange:nil];\n}\n```\n\n最后一步是将 `gcManager` 的引用传递给我们的排行榜类。我们在\
  \ `UFOViewController` 类中执行此操作。修改现有的 `IBAction` 方法，将 `gcManager` 的属性设置为 `UFOViewController`\
  \ 中已存在的实例。你的代码应如下例所示：\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n{\n  \
  \  UFOLeaderboardViewController *leaderboardViewController = [[UFOLeaderboardViewController\
  \ alloc] init];\n    leaderboardViewController.gcManager = gcManager;\n    [self\
  \ presentViewController: leaderboardViewController animated: YES completion: nil];\n\
  \    [leaderboardViewController release];\n}\n```\n\n如果你现在重新运行应用程序，你将看到类似于图 3-11\
  \ 所示的输出。分数的数量、分数值和玩家 ID 会有所不同，但你应该能够看到至少列出一个分数。\n\n![A978-1-4302-4906-1_3_Fig11_HTML.jpg](img/A978-1-4302-4906-1_3_Fig11_HTML.jpg)\n\
  \n**图 3-11.** 自定义排行榜的初始视图\n\n> **重要提示：** 无法保证你不会获得排行榜请求的缓存数据。你应该假设你检索的数据是缓存的，可能不是最新的。\n\
  \n\n\n### 映射玩家 ID\n\n在上一节中，我们学习了如何获取排行榜的原始分数值。但最终得到的排行榜仅包含玩家 ID，而非用户期望显示的别名。本节我们将创建一个新方法，用于将玩家\
  \ ID 转换为玩家别名。首先，我们在`GameCenterManager`类中添加一些新方法，使其能够搜索单个名称和名称数组。请在`GameCenterManager`类中添加以下两个方法。\n\
  \n```\n- (void)mapPlayerIDtoPlayer:(NSString*)playerID\n{\n    [GKPlayer loadPlayersForIdentifiers:\
  \ [NSArray arrayWithObject: playerID]\n                  withCompletionHandler:^(NSArray\
  \ *playerArray, NSError*error)\n    {\n        GKPlayer* player = nil;\n       \
  \ for (GKPlayer* tempPlayer in playerArray)\n        {\n            if ([tempPlayer.playerID\
  \ isEqualToString: playerID] == nil)\n                continue;\n            player\
  \ = tempPlayer;\n            break;\n        }\n        [self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)\n\
  \                              withArg:player\n                                error:error];\n\
  \    }];\n}\n\n- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs\n{\n    [GKPlayer\
  \ loadPlayersForIdentifiers: playerIDs withCompletionHandler:^(NSArray *playerArray,\
  \ NSError *error)\n    {\n        [self callDelegateOnMainThread: @selector(mappedPlayerIDs:error:)\n\
  \                              withArg: playerArray error: error];\n    }];\n}\n\
  ```\n\n第一个方法将返回单个`GKPlayer`对象，而第二个方法将返回`GKPlayer`对象数组。我们还需要添加两个新的协议方法来处理委托回调。\n\n\
  虽然我们可以使用相同的回调并为第一个调用返回一个单元素数组，但我们还是希望保留这两个方法。你完全可以向第二个方法传递单个玩家 ID；不过，第一个方法在某些情况下也同样实用。别忘了，我们正在构建一套可复用的\
  \ Game Center 调用库。\n\n假设你从本书开头一直跟随至今，`GameCenterManagerDelegate`的协议现在应如下所示：\n\n\
  ```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
  \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
  - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
  \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players\
  \ error:(NSError *)error;\n@end\n```\n\n获取到与给定`playerID`对应的`GKPlayer`对象后，有多种方式可以基于其中一方查找另一方。再次为了简单起见，我们将所有已获取的玩家存储到一个数组中，并进行简单查找。\n\
  \n首先，我们需要在`UFOLeaderboardViewController`类中添加一个新的`NSMutableArray`。我们将这个新对象命名为`playerArray`。别忘了在`viewDidLoad`方法中为其分配内存并初始化。为刚刚设置的协议添加一个新方法，并按如下所示进行初始化：\n\
  \n```\n- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error\n\
  {\n    if (error != nil)\n    {\n        NSLog(@\"映射玩家时出错：%@\", [error localizedDescription]);\n\
  \    }\n    else\n    {\n        [playerArray addObject: player];\n    }\n    [leaderboardTableView\
  \ reloadData];\n}\n```\n\n该方法仅将检索到的`GKPlayers`存储到数组中，以备后续使用。如果你使用的是返回玩家数组的方法，那么你的委托回调应如下所示：\n\
  \n```\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error\n\
  {\n    if (error != nil)\n    {\n        NSLog(@\"映射玩家时出错：%@\", [error localizedDescription]);\n\
  \    }\n    else\n    {\n        [playerArray addObjectsFromArray:players];\n  \
  \  }\n    [leaderboardTableView reloadData];\n}\n```\n\n我们还需要添加一个新方法，用于遍历数组并查找匹配的玩家。\n\
  \n```\n-(NSString *)playerNameforID:(NSString *)playerID;\n{\n    for (GKPlayer\
  \ *player in playerArray)\n    {\n        if ([player.playerID isEqualToString:\
  \ playerID])\n            continue;\n        return player.alias;\n    }\n    return\
  \ nil;\n}\n```\n\n该方法会在玩家数组中搜索与`playerID`匹配的项，并返回该玩家的别名。如果你希望表格单元格显示更多信息（例如玩家是否未成年或是你的好友），也可以直接返回完整的`GKPlayer`对象。\n\
  \n最后一步是修改我们的`cellForRow`方法，以处理新的名称查找代码。以下方法将替换`UFOLeaderboardViewController`中旧的`cellForRow`方法。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
  \                                       reuseIdentifier:CellIdentifier] autorelease];\n\
  \        cell.selectionStyle = UITableViewCellSelectionStyleNone;\n    }\n    GKScore\
  \ *score = [self.scoreArray objectAtIndex: indexPath.row];\n    NSString *playerName\
  \ = [self playerNameforID: score.playerID];\n    if (playerName == nil)\n    {\n\
  \        [self.gcManager mapPlayerIDtoPlayer: score.playerID];\n        cell.textLabel.text\
  \ = @\"正在加载名称…\";\n    }\n    else\n    {\n        cell.textLabel.text = playerName;\n\
  \    }\n    cell.detailTextLabel.text = score.formattedValue;\n    return cell;\n\
  }\n```\n\n> **提示：** 你可以通过`GKScore`的`value`属性访问原始分数数据。这使你能进行比 iTunes Connect 中分数格式类型更丰富的自定义设置。\n\
  \n如你所见，此方法中我们像之前的示例一样获取了一个`GKScore`对象。我们创建了一个名为`playerName`的新字符串，并使用新方法为其赋值。首次调用此方法时，`playerNameforID`将返回\
  \ nil。此时，我们调用`mapPlayerIDtoPlayer`方法，并将单元格文本设置为“正在加载名称…”。这作为占位符，直到我们加载完整的用户名。当从`GameCenterManager`收到回调时，我们重新加载表格。此时，`playerNameforID`应返回玩家的别名。\n\
  \n如果再次运行应用，你将看到现在显示的是正确的玩家别名，而非玩家 ID（见图 3-12）。\n\n> **注意：** 请记住，用户可以随时更改其别名，因此应始终显示最新别名。基于此，每次显示别名时都应尝试更新。切勿一次性缓存后便不再请求更新。\n\
  \n![A978-1-4302-4906-1_3_Fig12_HTML.jpg](img/A978-1-4302-4906-1_3_Fig12_HTML.jpg)\n\
  \n**图 3-12.** 正确映射玩家别名的自定义排行榜\n\n\n\n### 本地玩家分数\n\n很多时候您需要了解本地玩家在特定排行榜上的得分。也许您想在排行榜顶部显示他们的分数，或者想获取一个显示与本地玩家分数相近的其他玩家分数的排行榜。\n\
  \nApple 提供了一种简单的方法来确定本地玩家的分数。在任何 `GKLeaderboard` 请求中，都包含一个 `localPlayerScore` 属性。我们在\
  \ `GameCenterManager` 中创建一个新方法，用于处理本地玩家分数的获取。请将以下方法添加到您的 `GameCenterManager` 类中：\n\
  \n```\n-(void)retrieveLocalScoreForCategory:(NSString *)category\n{\n        GKLeaderboard\
  \ *leaderboardRequest = [[GKLeaderboard alloc] init];\n        leaderboardRequest.category\
  \ = category;\n        [leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray\
  \ *scores,NSError*error)\n        {\n                [self callDelegateOnMainThread:@selector(localPlayerScore:error:)\
  \ withArg:É\n        leaderboardRequest.localPlayerScore error:error];\n       \
  \ }];\n}\n```\n\n此方法的运作方式与我们之前的分数函数几乎相同。但在这里，我们只关心所请求类别的本地玩家分数。我们还需要添加一个新的协议方法，将此数据传回我们的委托。请继续设置它，如下代码片段所示：\n\
  \n`(void)localPlayerScore:(GKScore *)score error:(NSError *)error;`\n\n现在我们需要将协议实现添加到\
  \ `UFOLeaderboardViewController` 中。该方法如下所示。在此演示中，我们不会直接使用本地玩家的分数，因此我们仅将值打印到控制台。\n\
  \n```\n- (void)localPlayerScore:(GKScore *)score error:(NSError *)error;\n{\n  \
  \      if (error != nil)\n        {\n                NSLog(@\"获取本地分数时出错: %@\", [error\
  \ localizedDescription]);\n        }\n        else\n        {\n                NSLog(@\"\
  本地用户分数: %@\", score);\n        }\n}\n```\n\n接下来，我们调用 `GameCenterManager` 方法来获取本地用户分数。让我们将该代码添加到\
  \ `UFOLeaderboardviewController` 的 `viewDidLoad` 方法中。别忘了更改分类，使其与您要请求的排行榜匹配。\n\n\
  `[self.gcManager retrieveLocalScoreForCategory: @\"com.dragonforged.ufo.single\"\
  ];`\n\n如果您再次运行应用，现在应该会看到类似如下的控制台输出：\n\n```\n2011-02-14 14:38:41.940 UFOs[22485:207]\
  \ 本地用户分数: GKScore player=G:200192907 rank=2 date=2011-02-14 04:08:04 +0000 value=3\
  \ formattedValue=3 Points\n```\n\n### 更好的方法\n\n在本章前面的“发布分数”一节中，我们了解了如何向 Game Center\
  \ 发布新分数。我们的方法虽然简单，但从用户交互的角度来看，并非最佳方案。现在是时候重构发布新分数的代码以改善可用性了。这种方法更复杂，但性能更好，且对用户的影响更小。\n\
  \n我们需要做的第一件事是将 `scoreReported` 方法从 `UFOGameViewController` 移动到 `UFOViewController`。我们还需要修改\
  \ `UFOViewController` 中的退出操作。请按如下方式修改该方法。\n\n```\n-(IBAction)exitAction:(id)sender;\n\
  {\n        [[self navigationController] popViewControllerAnimated: YES];\n     \
  \   [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n}\n```\n\n我们还需要在 `UFOViewController` 的 `viewWillAppear` 方法中添加一行代码，如下所示。\n\n\
  `gcManager.delegate = self;`\n\n这会将 Game Center 调用的委托重置为 `UFOViewController`。这允许我们退出游戏，而无需等待\
  \ Game Center 委托的网络回调。这种方法对用户更友好，但涉及一些委托切换。\n\n### 挑战\n\niOS 6 为 Game Center 引入了挑战功能。挑战允许玩家的\
  \ Game Center 好友与本地玩家竞争，以打破最高分或成就。如果您使用 Apple 内置的 GUI，则无需额外工作即可将挑战添加到您的游戏或应用中。排行榜视图控制器中会出现一个新的部分来挑战玩家，此外用户可以从\
  \ `Game Center.app` 发起挑战。\n\n如果您使用自定义的排行榜 GUI，或者希望以编程方式发布挑战，`GKScore` 提供了一个新方法。创建一个新挑战就像使用\
  \ `GKScore` 对象一样简单：\n\n`[(GKScore *)score issueChallengeToPlayers: (NSArray *)players\
  \ message:@\"你能打败我吗？\"];`\n\n在某些情况下，查看本地玩家当前所有待处理的挑战列表可能很重要；这可以通过以下代码片段实现：\n\n```\n\
  [GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray *challenges,\
  \ NSError *error)\n{\n     if (error != nil)\n     {\n          NSLog(@\"发生错误: %@\"\
  , [error localizedDescription]);\n     }\n     else\n     {\n          NSLog(@\"\
  挑战: %@\", challenges);\n     }\n}];\n```\n\n每个挑战还有一个关联的状态，例如无效、待处理或已完成。要查看挑战的当前状态，您可以使用以下代码：\n\
  \n`if(challenge.state == GKChallengeStateCompleted)`\n     `NSLog(@\"挑战已完成\");`\n\
  \n最后，您可以使用以下语句以编程方式拒绝待处理的挑战：\n\n`[challenge decline];`\n\n**提示**  \n当玩家击败一个挑战时，Game\
  \ Center 会自动将该挑战重新发布给发起挑战的玩家，通知他们已被击败，并提示他们接受新的挑战。\n\n挑战是保持玩家在游戏中参与度的绝佳方式；您的玩家会通过不断挑战他们的朋友来为您进行营销。对于任何运行\
  \ iOS 6 或更高版本的用户，挑战会自动通过 `Game Center.app` 或原生 Game Center GUI 提供给您的应用。如果您使用自定义排行榜界面，整合挑战系统所需的时间将通过增加用户互动而获得丰厚回报。\n\
  \n### GKLeaderboard 集合\n\niOS 7 将排行榜上限从之前的 25 个提高到了 100 个。然而，iOS 7 还添加了一个新类 `GKLeaderboardSet`，允许使用多达\
  \ 500 个排行榜。一旦为应用启用了排行榜集合，应用中使用的所有排行榜都必须组织到一个排行榜集合中。\n\n在 iTunes Connect 中，现在有一个新选项可以将所有排行榜移入显示集合，如图\
  \ 3-13 所示。创建排行榜集合时，系统会提示您输入显示集合参考名称和显示集合 ID，其设置方式与典型排行榜相同，建议采用反向 DNS 方法。\n\n创建新的排行榜集合后，可以像配置典型排行榜一样添加和配置其他显示集合。一个显示集合可以包含多个排行榜，单个排行榜也可以属于多个显示集合。\n\
  \n有一个新方法 `loadLeaderboardSetsWithCompletionHandler` 可用于获取排行榜集合。这将返回一个 `GKLeaderboardSet`\
  \ 对象数组，其功能与单个排行榜非常相似，并增加了一个 `groupIdentifier` 属性字符串，该字符串返回它们所属的排行榜集合的标识符。\n\n![A978-1-4302-4906-1_3_Fig13_HTML.jpg](img/A978-1-4302-4906-1_3_Fig13_HTML.jpg)\n\
  \n**图 3-13.** 在 iTunes Connect 中为 iOS 7 启用排行榜集合\n\n\n\n## 摘要\n\n本章介绍了 Game Center\
  \ 中的排行榜。我们讨论了使用排行榜的优势，以及两种可用的排行榜类型。我们学习了如何提交分数以及处理提交过程中出现的任何错误。我们还了解了在你的应用中启动并运行排行榜所需满足的要求，无论是使用苹果提供的\
  \ GUI 还是自定义 GUI。\n\n在本章中，我们持续构建了 `GameCenterManager` 类，添加了必要的方法来提交分数、检索本地和全局分数、将玩家\
  \ ID 映射到 `GKPlayer` 对象，以及显示自定义和内置排行榜。\n\n现在，你应该有信心为任何现有或新的 iOS 应用添加排行榜了。在下一章中，我们将探索\
  \ Game Center 成就系统所提供的所有功能。\n\n"
- "# 成就\n\n**摘要**\n\n> “所有成就伟业的人，都曾是伟大的梦想家。”\n> ——奥里森·斯威特·马登\n\n相对较新的社交游戏概念“成就”出现的时间远比我们在第\
  \ 3 章中讨论的排行榜要晚得多，并且随着微软 Xbox 360 的发布，其受欢迎程度急剧上升。成就提供了排行榜所忽略的细节层次和成就感。排行榜显示谁拥有领先的分数；而另一方面，成就通过奖励玩家完成特定任务、探险、目标或关卡来展示玩家的技能和优势。当成就可以服务于游戏内的目的时，它们就成了一种超越其他玩家的“能量提升”。能够查看他人的成就给了玩家一种“炫耀的资本”。\n\
  \n随着社交网络游戏的发展和普及，成就系统功能的热度更是直线飙升。就像每个人在高中体育比赛中都能拿到一个奖杯一样，每个玩家都想在游戏中获得一项成就。\n\nFoursquare\
  \ 是最早将成就从游戏世界带入社交应用领域的网站之一。Foursquare 将其成就称为“徽章”（见图 4-1），但其基本概念是相同的。玩家因完成任务而获得奖励，但徽章的数量并不会影响游戏玩法，或者在这个例子中，不会影响用户以任何直接方式使用应用的能力。\n\
  \n![A978-1-4302-4906-1_4_Fig1_HTML.jpg](img/A978-1-4302-4906-1_4_Fig1_HTML.jpg)\n\
  \n*图 4-1. 展示徽章或成就的 iPhone 版 Foursquare*\n\nGame Center 让为你的 iOS 应用添加成就系统变得简单。在本章中，我们将学习如何为我们的演示游戏\
  \ UFOs 添加成就。你将学到快速轻松地将成就系统完全集成到你的应用中所需要的一切。特别是，你将学习如何：\n\n- 创建新的成就\n- 显示达成进度\n-\
  \ 在应用中添加成就挂钩\n- 推进和重置成就\n- 自定义成就的外观\n- 处理成就挑战\n\n## 为什么使用成就？\n\n如果成就对你的社交应用或游戏的作用还不够明显，那么让我们花点时间回顾一下它的诸多好处。\n\
  \n-   成就让你的用户获得额外的成就感。\n-   成就能使用户更频繁地回到你的应用中。用户更愿意返回你的应用来完成更多成就，从而使完成游戏的过程更有回报、更有趣。\n\
  -   成就为用户提供了一种与他人分享体验的简便方式。\n-   Game Center 中的成就为你发布的产品增添了精致的外观和感觉。\n-   成就让用户在探索你的应用或游戏时，有更强的进步感。\n\
  -   成就提供了游戏的一种替代玩法。如果用户不喜欢战役模式，他们可以通过你的成就系统享受成就感。\n-   成就有助于建立游戏品牌认知度。当用户在 Twitter\
  \ 和 Facebook 上分享他们的成就时，品牌知名度会提升，随之销量也会增加。\n-   成就可以为你的游戏提供一个目标或结局，否则游戏可能就变成了开放式结局。像问答游戏或棋盘游戏这类游戏通常没有传统的结局。\n\
  -   成就挑战有助于吸引更多用户使用你的产品。\n\n## Game Center 成就概览\n\n成就，也被称为徽章，在 Game Center 中的运作方式略不同于其他平台。与排行榜类似，首先需要在\
  \ iTunes Connect 中按应用进行成就配置。你需要创建 `GKAchievement` 对象的新实例来报告进度（更多信息请参见“修改成就进度”部分）。与排行榜条目（在达到并提交分数时创建）不同，成就可以报告增量进度。\n\
  \n与使用排行榜相比（更多关于排行榜的信息请参见第 3 章），另一个显著的变化是你将使用两种类型的对象来提交和检索成就。`GKAchievement` 用于提交新成就或更新成就进度，而\
  \ `GKAchievementDescription` 用于向用户显示成就数据。这与我们在使用排行榜时看到的情况相反，那时我们使用 `GKScore` 对象来提交和检索数据。\n\
  \n与排行榜一样，你可以使用苹果自带的图形用户界面 (GUI) 或更符合你应用外观和感觉的自定义 GUI 来显示成就进度。每种系统的优缺点也与排行榜相同。我将总结这些优缺点，并在适当之处补充一些成就相关的细节信息。\n\
  \n### 使用苹果成就 GUI 与自定义 GUI 的好处\n\n以下是在处理成就时使用苹果自带的 GUI 所带来的一些好处。\n\n-   你成就的外观和感觉是由世界上一些最优秀的设计师打造的。\n\
  -   GUI 实现起来非常简单，使得向用户展示成就进度变得很容易。\n-   用户喜欢他们已熟悉如何操作的界面。\n-   与你自己实现系统相比，你的应用更能适应未来的变化。\n\
  -   当新功能可用时（例如随着 iOS 6 的推出新增的“挑战”功能），它们会自动包含在内。\n\n以下是在 iOS 设备上处理成就时使用你自己的 GUI 所带来的几个好处。\n\
  \n-   你的成就进度可以与应用的定制设计相匹配。\n-   你对返回的数据有更多控制权，并且可以使用额外的标准进行过滤。\n-   你可以实现自己的自定义缓存行为。\n\
  -   你可以为未完成或进行中的成就使用自定义图像。\n\n如你所见，两种系统各有优缺点，对于应该使用哪一种并没有正确的答案。到本章结束时，你将对这些选项有更好的理解，并能够更有把握地决定哪种方法最适合你的应用。\n\
  \n正如本节开头所提到的，你需要像处理排行榜一样，开始从 iTunes Connect 着手处理成就相关事宜。\n\n\n\n## 在 iTunes Connect\
  \ 中配置成就\n\n正如我们在排行榜中所见，如果不先在 iTunes Connect 中至少设置一个新成就，就无法开始处理成就。使用您的用户名和密码登录 iTunes\
  \ Connect (`itunesconnect.apple.com`)，然后选择我们在前面章节中一直在处理的应用程序（更多信息，请参见第 2 章）。从控制面板选择应用程序后，返回本书前面介绍的“管理\
  \ Game Center”区域。\n\n您应用程序的 Game Center 门户将有一个标记为“成就”的版块。如果您是第一次在此应用程序中处理成就，将会出现一个标记为“设置”的按钮。如果您已有成就，步骤会有所不同，这将在本节稍后部分介绍。\n\
  \n单击“设置”按钮将显示“成就配置”屏幕。选择页面左上角的“添加新成就”按钮，如图 4-2 所示。这将带您进入图 4-3 所示的视图。\n\n![A978-1-4302-4906-1_4_Fig3_HTML.jpg](img/A978-1-4302-4906-1_4_Fig3_HTML.jpg)\n\
  \n图 4-3. iTunes Connect 中新成就的配置视图\n\n![A978-1-4302-4906-1_4_Fig2_HTML.jpg](img/A978-1-4302-4906-1_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 通过 iTunes Connect 门户添加新成就\n\n您可能会注意到，此门户页面与排行榜门户页面有很多相似之处。表 4-1 总结了这些属性。\n\
