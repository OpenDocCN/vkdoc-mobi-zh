  , x] reliable:YES];\n    }\n}\n```\n\n修改 `receivedData` 方法以支持新的 `$spawnCow` 消息类型。我们还需要从消息中提取\
  \ x 轴坐标，并将其传递给一个处理网络生成奶牛的新方法。这两个方法如下所示。\n\n```\nelse if ([[dataDictionary objectForKey:\
  \ @\"data\"] hasPrefix:@\"$spawnCow:\"])\n{\n    int x = [[[dataDictionary objectForKey:\
