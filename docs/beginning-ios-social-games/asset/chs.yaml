  \ 8-3 展示了分数的显示位置。\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
  $score:\"])\n{\n    float enemyScore = [[[dataDictionary objectForKey: @\"data\"\
