- "# 2. Game Center：设置与入门\n\n摘要  \n与苹果的许多集成技术（iCloud、推送通知、Passbook）类似，在使用 Game Center\
  \ 之前，需要先完成一些标准的准备工作。Game Center 是一项庞大且多样化的技术，能够轻松为你的社交应用添加非常复杂的功能。完成这些基本步骤后，你就可以放心地跳转到任何\
  \ Game Center 章节，实现特定于你应用的功能。\n\n与苹果的许多集成技术（iCloud、推送通知、Passbook）类似，在使用 Game Center\
  \ 之前，需要先完成一些标准的准备工作。Game Center 是一项庞大且多样化的技术，能够轻松为你的社交应用添加非常复杂的功能。完成这些基本步骤后，你就可以放心地跳转到任何\
  \ Game Center 章节，实现特定于你应用的功能。\n\n在第 1 章中，你学习了如何在 iTunes Connect 中配置 Game Center，并开始使用示例项目\
  \ UFOs。在本章中，我们将讨论如何将 Game Center 集成到我们的应用中，并深入编写一些 Game Center 专属代码。\n\n你将学习如何检测\
  \ Game Center 兼容性，探索沙盒的限制，验证本地玩家身份，处理会话，以及获取好友列表。你还将创建 `GameCenterManager` 类，在后续的\
  \ Game Kit 章节中我们将一直使用这个类。\n\n## 测试 Game Center\n\n在调用任何 Game Center 专属代码之前，我们需要进行一项测试，以验证用户使用的\
  \ iOS 版本是否支持 Game Center。执行此项检查的第一步是创建新的 `GameCenterManager` 类。在本书的剩余部分，我们将使用这个类来将\
  \ Game Center 功能集中在一个易于访问的类中。这个类将包含所有 Game Center 专属代码和回调，并且可以轻松地在你的所有应用中共享。大多数现代应用的目标系统是\
  \ iOS 5 及以上版本，因此无需进行 Game Center 检查；但如果你的应用仍针对 iOS 4，则应验证 Game Center 是否已安装。\n\n\
  首先，在 Xcode 中创建一个新文件。你需要从可用模板中选择 **Objective-C class**。确保从 **Subclass Of** 下拉菜单中选择\
  \ `NSObject`。将新类命名为 `GameCenterManager`，如图 2-1 所示。\n\n![A978-1-4302-4906-1_2_Fig1_HTML.jpg](img/A978-1-4302-4906-1_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 创建 `GameCenterManager` 类\n\n向你的 `GameCenterManager` 类中添加以下方法：\n\n```\n\
  + (BOOL) isGameCenterAvailable\n\n{\n\n        Class gcClass = (NSClassFromString(@\"\
  GKLocalPlayer\"));\n\n        NSString *reqSysVer = @\"4.1\";\n\n        NSString\
  \ *currSysVer = [[UIDevice currentDevice] systemVersion];\n\nBOOL osVersionSupported\
  \ = ([currSysVer compare:reqSysVer options:NSNumericSearch] != NSOrderedAscending);\n\
  \n        return (gcClass && osVersionSupported);\n\n}\n```\n\n此方法使用 `NSClassFromString`\
  \ 函数创建一个新的类对象。如果 API 中存在 `GKLocalPlayer`，则 `gcClass` 不会为 nil。我们还针对最低操作系统版本进行了测试。由于许多\
  \ Game Center 类在功能可用之前就已包含在 API 中，因此我们需要执行两项检查。接下来的三行代码将当前 iOS 版本与我们设置为 4.1 的版本字符串进行比较。该方法返回结果，如果设备已准备好支持\
  \ Game Center，则结果为 true。\n\n注意  \n无论用户是否拥有支持 Game Center 的设备，你始终应尽一切努力让用户能够与你的应用交互。如果用户没有支持\
  \ Game Center 的设备，你仍需确保他们能够使用你应用中非社交功能的部分。\n\n提示  \n如果你确实希望将应用限制为仅支持支持 Game Center\
  \ 设备的用户使用，请在 `info.plist` 文件中添加一个名为 `UIRequiredDeviceCapabilities` 的新键。然后，将该键的值设置为\
  \ `\"gamekit\"`。这将使你的应用在 App Store 中仅限拥有支持 Game Center 设备的用户购买。\n\n现在，你可以修改 `UFOViewController.m`\
  \ 文件，以执行 Game Center 可用性检查。创建一个新的 `viewDidLoad` 方法，如以下代码片段所示：\n\n```\n- (void)viewDidLoad\n\
  \n{\n\n        [super viewDidLoad];\n\n        if ([GameCenterManager isGameCenterAvailable])\
  \ {\n\n                NSLog(@\"Game Center is available\");\n\n        } else {\n\
  \n                NSLog(@\"Game Center not available\");\n\n        }\n\n}\n```\n\
  \n注意  \n如果你发现即使 Game Center 应可用，`isGameCenterAvailable` 方法也总是返回 NO，那么最常见的原因是在你的目标设置中忘记包含\
  \ `GameKit.framework`。\n\n目前，所有代码所做的只是在控制台输出 Game Center 是否可用。我们将在下一节中扩展此代码。\n\n\
  \n\n## 使用 Game Center 进行身份验证\n\n当你的应用确认设备支持 Game Center 后，即可对用户进行身份验证。通过 Game Center\
  \ 完成身份验证的用户始终被称为本地玩家，并由 `GKLocalPlayer` 类表示。在使用任何其他 Game Center 功能之前，你必须首先验证本地玩家的身份。\n\
  \nApple 建议你在应用中尽早进行 Game Center 身份验证。在用户需要访问任何 Game Center 行为之前完成身份验证的主要原因是，确保用户在他们想要执行\
  \ Game Center 操作时，无需等待网络回调来完成身份验证。此外，如果你正在处理 Game Center 邀请，则需要在处理启动事件之前完成身份验证。尽早进行身份验证还能确保用户在游戏过程中不会被要求登录。在后续章节中，我们还将探讨其他好处，例如能够重新提交之前提交失败的高分。\n\
  \n### 修改 GameCenterManager 类\n\n在添加用于 Game Center 身份验证的代码之前，我们首先需要设置一些前置调用，以便开始使用\
  \ `GameCenterManager` 类。`GameCenterManager` 将是一个可复用的类，它为与 Game Center 交互添加了大量便捷方法；它的设计使其可以轻松地集成到任何未来的项目中。所有与\
  \ Game Center 相关的代码都将通过 `GameCenterManager` 类路由，这使得在整个应用中轻松使用它成为可能。设置这个可复用类的第一步是创建委托回调系统。\n\
  \n**注意**\n\n如果你之前没有接触过代码块（Blocks），它们可能会让你感到有些困惑。Game Center 高度依赖代码块，你将在本书中大量看到它们的使用。\n\
  \n根据我的经验，理解代码块的最佳方式是将它们视为内联函数，这些函数在调用它们的方法执行完成后被触发。在前面的示例中，当 `authenticateWithCompletionHandler`\
  \ 执行完毕后，它会调用\n\n`[self callDelegateOnMainThread: @selector(processGameCenterAuth:)\
  \ withArg: NULL error: error]`\n\n在继续之前，对代码块有扎实的掌握会很有帮助。如果你对代码块的使用感到不确定，我建议你阅读 Apple\
  \ Developer Connection 上位于 [`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html)\
  \ 的文章。\n\n你需要将以下方法添加到 `GameKitManager.m` 中。添加完成后，我们将讨论它们的确切功能。\n\n```\n- (void)\
  \ callDelegateOnMainThread: (SEL) selector withArg: (id) arg error: (NSError*) err\n\
  {\n    dispatch_async(dispatch_get_main_queue(), ^(void) {\n        [self callDelegate:\
  \ selector withArg: arg error: err];\n    });\n}\n```\n\n我们所有的委托回调都必须在主线程上执行；Game\
  \ Center 并不保证回调代码块会在主线程上执行，如果不强制在主线程上运行，它们可能会在后台线程上执行。由于 UIKit 视图控制器只能在主线程上安全访问，因此在后台线程上调用委托可能会导致崩溃和其他意外行为。为了避免产生任何与线程相关的错误（这些错误可能非常难以追踪和修复），我们将在主线程上调用所有委托方法。\n\
  \n**注意**\n\n有许多不同的方法可以强制代码在主线程上执行或以其他方式确保线程安全。出于我们的目的，我们将使用上述方法。这对于 iOS 平台上线程经验较少的读者来说最容易理解。\n\
  \n下面的方法在确保我们在主应用线程上操作后，从 `callDelegateOnMainThread` 方法内部调用。此方法检查以确保我们在主线程上，然后使用传递的信息调用我们的协议方法。\n\
  \n```\n- (void)callDelegate:(SEL)selector withArg:(id)arg error:(NSError*)err\n\
  {\n    assert([NSThread isMainThread]);\n    if ([delegate respondsToSelector: selector])\
  \ {\n        if (arg != NULL) {\n            [delegate performSelector: selector\
  \ withObject:arg withObject: err];\n        } else {\n            [delegate performSelector:\
  \ selector withObject: err];\n        }\n    } else {\n        NSLog(@\"Missed Method\"\
  );\n    }\n}\n```\n\n如果你没有实现委托方法，你将在控制台中看到一条 \"Missed Method\" 的 `NSLog` 消息。这仅仅是为了协助调试而提供的，可以为你节省一些在调试协议方法时绞尽脑汁的时间。\n\
  \n在 `GameCenterManager` 类中我们需要做的最后一件事情是添加委托属性。修改头文件的相关部分，使其看起来像以下代码：\n\n```\n@interface\
  \ GameCenterManager : NSObject <GameCenterManagerDelegate>\n@property(nonatomic,\
  \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n```\n\n除了这些修改之外，你还需要合成委托，并在\
  \ `deallocation` 中释放它。`GameCenterManager` 委托将由调用 Game Center 函数的类来设置，以便获取关于这些调用的反馈。这样就完成了对\
  \ `GameCenterManager` 类所需的修改。\n\n\n\n#### 在 iOS 6 和 iOS 7 上进行身份验证\n\niOS 6 引入了一种新的身份验证方法，简化了登录\
  \ Game Center 的流程。如果你的应用使用 iOS 6 或更高版本，以下方法更为高效；不过，如果你需要在 iOS 5 甚至 iOS 4 设备上进行身份验证，请参阅下一节“在\
  \ iOS 6 之前进行身份验证”。请查看以下完整的方法：\n\n```\n- (void)authenticateLocalUserModern\n{\n \
  \ if ([[GKLocalPlayer localPlayer] authenticateHandler] == nil) {\n    [[GKLocalPlayer\
  \ localPlayer] setAuthenticateHandler:^(UIViewController *viewController, NSError\
  \ *error) {\n      if (error != nil) {\n        if ([error code] == GKErrorNotSupported)\
  \ {\n          UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"错误\" message:@\"\
  此设备不支持 Game Center\" delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n\
  \          [alert show];\n          [alert release];\n        } else if ([error\
  \ code] == GKErrorCancelled) {\n          UIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"错误\" message:@\"此设备已因该应用登录失败次数过多，你需要从 Game Center.app 登录\" delegate:nil\
  \ cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n          [alert show];\n \
  \         [alert release];\n        } else {\n          UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"错误\" message:[error localizedDescription] delegate:nil\
  \ cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n          [alert show];\n \
  \         [alert release];\n        }\n      } else {\n        if (viewController\
  \ != nil) {\n          [(UIViewController *)delegate presentViewController:viewController\
  \ animated:YES completion:NULL];\n        }\n      }\n    }];\n  } else {\n    [[GKLocalPlayer\
  \ localPlayer] authenticate];\n  }\n}\n```\n\niOS 6 为 `GKLocalPlayer` 引入了一个新属性 `authenticateHandler`。本质上，这是一个用于监控登录错误的块，在某些情况下会向用户显示一个\
  \ `UIViewController`。第一步是确保我们之前没有设置过 `authenticateHandler`。如果设置过，调用 `authenticate`\
  \ 即可完成登录，如方法底部的 `else` 语句所示。在确定 `authenticateHandler` 尚未设置后，会为 `GKLocalPlayer` 单例设置一个。设置\
  \ `authenticateHandler` 的操作也会提示用户登录 Game Center。\n\n接下来的三个 `if` 语句（分别处理 `GKErrorNotSupported`、`GKErrorCancelled`\
  \ 以及其他所有错误）均用于处理身份验证过程中可能遇到的各种错误类型。第一个处理的错误是该用户设备因任何原因不支持 Game Center。下一个 `if` 语句处理登录失败次数过多的棘手情况。用户很少遇到此问题，但开发者经常遇到。最后一个错误检查处理所有其他错误并向用户显示。\n\
  \n如果未遇到任何错误，则表明 Game Center 已成功进行身份验证。然而，如果 Game Center 返回了一个 `UIViewController`，则需要将其展示给用户；这可以通过使用新的\
  \ iOS 6 方法 `presentViewController:` 来处理。这是在 iOS 6 上完成 Game Center 登录所需的全部步骤。有关 iOS\
  \ 6 之前版本的身份验证信息，请参阅下一节。\n\n**提示：** 不要忘记导入 `<GameKit/GameKit.h>` 头文件和相关的 Game Kit\
  \ 框架，否则 `GKLocalPlayer` 将未定义。\n\n#### 在 iOS 6 之前进行身份验证\n\n如果你的应用支持 iOS 6 之前的 iOS\
  \ 版本，则需要使用较旧的身份验证方式，本节将对此进行描述。处理身份验证需要在 `GameCenterManager` 类中添加代码。定义一个协议，并将以下代码块添加到\
  \ `GameCenterManager.h` 中 `@interface` 行的上方。这将创建一个新的可选委托回调方法，名为 `processGameCenterAuthentication`。\n\
  \n```\n@protocol GameCenterManagerDelegate <NSObject>\n\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  \n@end\n```\n\n需要在 `GameCenterManager` 的实现中添加一个新方法。创建一个包含以下代码的新方法：\n\n```\n- (void)authenticateLocalUser\n\
  {\n  if ([GKLocalPlayer localPlayer].authenticated) {\n    return;\n  }\n\n  [[GKLocalPlayer\
  \ localPlayer] authenticateWithCompletionHandler:^(NSError *error) {\n    [self\
  \ callDelegateOnMainThread: @selector(processGameCenterAuthentication:) withArg:NULL\
  \ error:error];\n  }];\n}\n```\n\n该方法将作为与 Game Center 进行身份验证的辅助工具。第一行代码检查 `localPlayer`\
  \ 单例，以确认用户是否已通过身份验证。如果是，则方法结束。如果用户尚未通过身份验证，则调用 `authenticateWithCompletionHandler`\
  \ 方法。\n\n当 `authenticateWithCompletionHandler` 执行完毕后，我们调用 `[self callDelegateOnMainThread:\
  \ @selector(processGameCenterAuthentication:) withArg: NULL error: error]`。为了继续执行，我们必须实现此方法。\n\
  \n**提示：** 如果你收到警告，提示 `GameCenterManager` 可能不会响应我们已实现的任何方法，请确保已将相关方法添加到了接口文件中。\n\n\
  \n\n### 从 UFOViewController 进行身份验证\n\n现在我们已经修改了 `GameCenterManager` 类以支持身份验证，我们需要在\
  \ `UFOViewController` 类中创建一个新对象来表示 `GameCenterManager`。\n\n导入 `GameCenterManager`\
  \ 的头文件，并创建一个名为 `gcManager` 的新 `GameCenterManager` 对象。你还需要将 `GameCenterManagerDelegate`\
  \ 添加到 `UFOViewController.h` 的接口中。完成后，`UFOViewController.h` 应如下所示：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n#import \"GameCenterManager.h\"\n@interface UFOViewController\
  \ : UIViewController <GameCenterManagerDelegate>\n@property (nonatomic, strong)\
  \ GameCenterManager *gcManager;\n-(IBAction)playButtonPressed;\n@end\n```\n\n你将再次修改\
  \ `UFOViewController` 的 `viewDidLoad` 方法。对 `viewDidLoad` 方法进行必要的修改，使其与以下代码片段匹配：\n\
  \n```\n- (void)viewDidLoad\n{\n  [super viewDidLoad];\n  if (![GameCenterManager\
  \ isGameCenterAvailable]) {\n    return;\n  }\n  GameCenterManager  *manager = [[GameCenterManager\
  \ alloc] init];\n  [manager setDelegate:self];\n  [manager authenticateLocalUser];\n\
  \  [self setGcManager:manager];\n}\n```\n\n我们添加的第一行新代码初始化并分配了一个 `GameCenterManager`\
  \ 的实例。下一行将代理的 `self` 设置为 `UFOViewController` 类；这将使我们能够从 `GameCenterManager` 获取回调。\n\
  \n完成这两步后，我们就可以调用便捷方法 `authenticateLocalUser`。此时，Game Center 会处理所需的登录视图、身份验证以及任何账户创建。然而，我们确实需要关注代理方法\
  \ `processGameCenterAuthentication`，以便捕获在身份验证过程中遇到的任何错误。\n\n如果你使用 iOS 6 及更新版本的身份验证方法，则无需实现代理回调，只需将前面代码片段中的\
  \ `[gcManager authenticateLocalUser];` 替换为 `[gcManager authenticateLocalUserModern];`\
  \ 即可。\n\n**注意**  \n如果你在某个应用内取消 Game Center 登录三次或更多次，你将无法再次从该应用登录，除非你前往 `GameCenter.app`\
  \ 并登录。这是未记录的行为，如果你不知道自己在寻找什么，追踪起来会非常麻烦。此外，如果你发现即使从 `GameCenter.app` 也无法登录，可以重置模拟器或恢复设备来解决这些问题。\n\
  \n如果你尝试再次运行该应用，你会在控制台日志中看到“Missed Method”。这是因为我们尚未添加在身份验证完成时调用的可选协议方法。我们需要在 `UFOViewController.m`\
  \ 中添加以下方法：\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n{\n\
  \  if (error != nil) {\n    NSLog(@\"身份验证过程中发生错误: %@\", [error localizedDescription]);\n\
  \  } else {\n    NSLog(@\"身份验证成功\");\n  }\n}\n```\n\n现在，当你登录时，你应该会在控制台看到“身份验证成功”的输出，以及图\
  \ 2-2 所示的图像（其中会显示你的 Game Center 名称）。\n\n**注意**  \n在出于测试目的登录 Game Center 时，请始终创建一个新的\
  \ Apple ID。切勿使用现有的 Apple ID 从沙盒环境登录 Game Center。\n\n![A978-1-4302-4906-1_2_Fig2_HTML.jpg](img/A978-1-4302-4906-1_2_Fig2_HTML.jpg)\
  \  \n**图 2-2.** 用户登录 Game Center 时将看到的标准“欢迎回来”信息\n\n**提示**  \n如果你在登录时遇到问题，请确保 `info.plist`\
  \ 中的 bundle ID 与 iTunes Connect 中启用了 Game Center 的 bundle ID 相匹配。有关在 iTunes Connect\
  \ 中配置 Game Center 的更多信息，请参阅第 1 章。\n\n### 沙盒\n\n为了帮助你在应用上线前进行测试，Apple 为 Game Center\
  \ 提供了沙盒环境。沙盒的功能与生产版本的 Game Center 完全相同，同时将所有活动对非沙盒用户隐藏。\n\n沙盒允许开发者秘密开发新的 Game Center\
  \ 功能，并且避免测试数据污染排行榜和成就系统。登录沙盒环境时，登录提示的顶部会显示“\\*\\*\\* 沙盒 \\*\\*\\*”。\n\n登录后，无法在应用内确定当前是否已登录到沙盒。但是，如果你打开\
  \ `GameCenter.app`，你将看到自己是否处于沙盒环境中。表 2-1 中的信息将帮助你确定当前运行的模式。\n\n**表 2-1.** 确定各种类型构建的沙盒状态\n\
  \n| 构建类型 | 沙盒状态 |\n| --- | --- |\n| iOS 设备模拟器 | 仅沙盒环境 |\n| 开发者预置描述文件构建 | 仅沙盒环境 |\n\
  | Ad-Hoc 分发构建 | 仅沙盒环境 |\n| 签名分发构建 | 仅生产环境 |\n\n**提示**  \nApple 最近还提供了在 iTunes Connect\
  \ 中清除所有用户的排行榜和成就进度的选项。建议在发布启用 Game Center 的应用之前进行重置。\n\n### 监控状态变化\n\n从 iOS 4.0\
  \ 开始，iOS 设备获得了同时运行多个应用的能力。这在处理状态时可能会产生一些复杂的行为错误，尤其是当用户同时访问两个不同的启用 Game Center 的应用时。例如，当你的应用在后台运行时，用户可能会退出\
  \ Game Center，甚至以其他用户身份登录。因此，通过 `NSNotification` 系统监听本地用户的变化至关重要。\n\n如果你使用的是本章前面详述的\
  \ iOS 6 `authenticateHandler` 方法，那么监听和响应身份验证事件的状态变化是可选的，并且 `authenticateHandler`\
  \ 会为你处理所有繁重的工作。如果你的应用需要以其他方式使用这些数据，你仍然可以监控状态变化。\n\n在 `UFOViewController.m` 的 `viewDidLoad`\
  \ 方法中，在验证 Game Center 是否可用的测试之后，立即添加以下代码片段。\n\n```\n[[NSNotificationCenter defaultCenter]\n\
  \                             addObserver:self\n                               \
  \ selector:@selector(localUserAuthenticationChanged:)\n                        \
  \            name:GKPlayerAuthenticationDidChangeNotificationName\n            \
  \                      object:nil];\n```\n\n**注意**  \n不要忘记在 `viewDidUnload` 中移除\
  \ `NSNotification` 观察者，否则你可能会遇到崩溃或其他意外行为。\n\n你还应该在 `UFOViewController` 中添加一个新方法。每当玩家身份验证状态发生变化时，都会调用此方法。\n\
  \n```\n-(void)localUserAuthenticationChanged:(NSNotification *)notif;\n{\n     \
  \   NSLog(@\"身份验证已更改: %@\", notif.object);\n}\n```\n\n当身份验证发生变化时，此新方法将打印新 `GKLocalPlayer`\
  \ 的描述。你需要确定在应用中需要采取哪些特殊步骤来处理本地玩家的变化。\n\n**提示**  \n在发布应用之前，不要忘记测试用户切换，因为 Apple 会在审核阶段进行测试。\n\
  \n\n\n## 使用 GKLocalPlayer\n\n`GKLocalPlayer` 对象会一直存在，且在通过 Game Center 认证后不会为空；该对象代表当前用户。你永远不会直接创建\
  \ `GKLocalPlayer` 的实例，而是通过类方法 `localPlayer` 来处理。`localPlayer` 单例是与 `GKLocalPlayer`\
  \ 交互的唯一方式。\n\n`GKLocalPlayer` 对象有三个相关属性：`authenticated`、`friends` 和 `underage`。我们将在下一节处理\
  \ `friends` 属性。在前面的认证代码中，我们已经处理过布尔值型的 `authenticated` 属性。\n\n`underage` 属性用于限制 Game\
  \ Center 应用中的内容仅供 17 岁以上用户访问。以下代码执行未成年人检查：\n\n```\nif ([GKLocalPlayer localPlayer].underage)\n\
  {\n    NSLog(@\"用户未满 18 岁\");\n}\n```\n\n在完成获取用户好友列表的步骤之前，`friends` 属性将返回 nil。完成该步骤后，`friends`\
  \ 属性将返回一个包含本地用户好友的数组。具体流程将在下一节详细说明。\n\n### 获取好友列表\n\n好友列表是一个用户 ID 数组，这些用户是你通过 `Game\
  \ Center.app` 设为好友的人。有了这些数据，你可以实现诸多功能，例如在游戏语音频道中仅创建好友列表，或在全局排行榜中高亮显示好友的分数。\n\n我们将在示例项目中添加一个调用来获取好友列表，但本章不会对这些数据进行具体处理。目前，我们只需将信息打印到控制台即可。\n\
  \n首先，修改 `GameCenterManager` 类，添加一个获取本地玩家好友列表的新方法。在实现文件中添加以下方法：\n\n```\n- (void)retrieveFriendsList;\n\
  {\n    if ([GKLocalPlayer localPlayer].authenticated == YES) {\n        [[GKLocalPlayer\
  \ localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends, NSError *error)\
  \ {\n            [self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:)\
  \ withArg:friends error:error];\n        }];\n    } else {\n        NSLog(@\"必须先完成认证\"\
  );\n    }\n}\n```\n\n此方法与本章前面添加的 `authentication` 方法非常相似。确定 `GKLocalPlayer` 已认证后，我们可以调用\
  \ `loadFriendsWithCompletionHandler`。该方法返回一个玩家 ID 数组。我们将在下一节学习如何使用这些玩家 ID 获取 `GKPlayer`\
  \ 对象。接着，我们使用线程安全的 `callDelegateOnMainThread` 方法将数据返回给委托。\n\n在运行此代码前，仍需修改头文件并为委托添加新的协议方法。将头文件修改为以下代码片段：\n\
  \n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n@end\n\
  \n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n@property(nonatomic,\
  \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n+ (BOOL)isGameCenterAvailable;\n\
  - (void)authenticateLocalUser;\n- (void)callDelegateOnMainThread:(SEL)selector withArg:(id)\
  \ arg error:(NSError*) err;\n- (void)callDelegate:(SEL)selector withArg:(id)arg\
  \ error:(NSError*) err;\n- (void)retrieveFriendsList;\n@end\n```\n\n这里所做的修改是添加了一个新的可选协议，该协议将在\
  \ `friends` 代码块执行完成后被调用。我们将返回一个好友 ID 数组以及遇到的任何错误。同时，我们还会向类方法中添加一个名为 `retrieveFriendsList`\
  \ 的新方法。\n\n在运行应用前，最后需要做的事情是在 `UFOViewController.m` 中添加对 `retrieveFriendsList` 的调用以及协议方法。由于必须成功认证\
  \ Game Center 后才能调用获取好友列表的方法，我们可以在认证回调中添加该调用。将方法修改为以下代码片段：\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  {\n    if (error != nil) {\n        NSLog(@\"认证时发生错误：%@\", [error localizedDescription]);\n\
  \    } else {\n        [gcManager retrieveFriendsList];\n    }\n}\n```\n\n我们还需要添加一个协议方法，用于将好友列表打印到控制台。在\
  \ `UFOViewController.m` 中添加以下方法：\n\n```\n- (void)friendsFinishedLoading:(NSArray\
  \ *)friends error:(NSError *)error;\n{\n    if (error != nil) {\n        NSLog(@\"\
  请求好友列表时发生错误：%@\", [error localizedDescription]);\n    } else {\n        NSLog(@\"\
  好友列表：%@\", friends);\n    }\n}\n```\n\n如果你的好友列表中有任何好友，你应该会看到类似下面的输出：\n\n```\n2011-02–01\
  \ 12:56:32.759 UFOs[3328:207] 好友列表：(\n    \"G:1093075676\"\n)\n```\n\n**注意：** 如果你尚未向沙盒环境添加任何好友，现在是添加的好时机。你可以在\
  \ `Game Center.app` 中创建新账户，并将它们添加为测试账户的好友。拥有一个非空的好友列表，对于本书的 Game Center 相关章节以及调试\
  \ Game Center 特定代码都很有价值。\n\n下一节将介绍如何处理从好友列表中获取的玩家数据。\n\n### 好友列表头像\n\n从 iOS 5.0\
  \ 开始，Apple 增加了对好友头像的支持。玩家可以选择在 Game Center 应用中设置自己的头像。如果玩家尚未设置头像，Game Center 会为其分配一个默认头像。要在你的应用中访问头像，你需要运行\
  \ iOS 5.0 或更高版本，并且需要实现一个新方法。以下方法在现有的 `GKPlayer` 对象上调用（关于 `GKPlayer` 的更多信息，请参阅上一节）。头像图片大小有两种选项：`GKPhotoSizeNormal`\
  \ 和 `GKPhotoSizeSmall`。\n\n```\n[player loadPhotoForSize:GKPhotoSizeNormal withCompletionHandler:\
  \ ^(UIImage *photo, NSError *error) {\n    if (error == nil) {\n        [playerAvatarImageView\
  \ setImage:photo];\n    } else {\n        NSLog(@\"加载玩家头像时发生错误：%@\", [error localizedDescription]);\n\
  \    }\n}];\n```\n\n\n\n## 与玩家协作\n\n`Game Center`本质上是一种社交服务，因此其核心围绕玩家展开。你需要了解与`GKPlayer`对象相关的三个属性。`isFriend`属性是一个布尔值，用于返回该玩家是否为当前本地玩家的好友。另外两个属性分别处理玩家的名称和别名。`playerID`属性是静态的，始终指向同一个玩家。`playerID`字符串绝不应在你的应用中向用户显示。而`alias`属性是动态的，用户可随时更改。它绝不可用于验证用户身份，但应作为唯一用于向应用用户标识该玩家的字符串。\n\
  \n> **警告**\n> 请勿对玩家标识符字符串的结构做任何假设。其格式和长度可能随时变更。\n\n之前检索好友列表时，我们返回的并非`GKPlayers`数组，而是他们的\
  \ ID 数组。这是 Game Center 的常见行为。为方便处理玩家数据，我们将添加两个便捷方法，用于将玩家 ID 转换为`GKPlayer`对象。\n\n\
  我们需要创建两个新方法：一个用于处理玩家 ID 数组，另一个用于处理单个玩家 ID。这将为后续工作省去额外步骤。我们将这些辅助方法添加到`GameCenterManager`类中。首先，新增协议方法，并修改`GameCenterManager.h`文件的相关部分，使其与以下代码一致：\n\
  \n```\n@protocol GameCenterManagerDelegate <NSObject>\n\n@optional\n\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  \n- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n\n\
  - (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;\n\n@end\n```\n\
  \n我们还将向`GameCenterManager`类的实现文件添加以下两个新方法：\n\n```\n- (void)playersForIDs:(NSArray\
  \ *)playerIDs\n\n{\n\n[GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:^(NSArray\
  \ *players, NSError *error) {\n\n[self callDelegateOnMainThread: @selector(playerDataLoaded:error:)\
  \ withArg: players error: error];\n\n}];\n\n}\n\n- (void)playerforID:(NSString *)playerID\n\
  \n{\n\n[GKPlayer loadPlayersForIdentifiers:[NSArray arrayWithObject:playerID] withCompletionHandler:^(NSArray\
  \ *players, NSError *error) {\n\n[self callDelegateOnMainThread: @selector(playerDataLoaded:error:)\
  \ withArg:players error:error];\n\n}];\n\n}\n```\n\n这两个方法都将使用`loadPlayersForIdentifiers`。唯一的区别在于，一个方法接收字符串并将其转换为单元素数组，另一个则直接接收数组。同样，我们将使用线程安全的委托回调。\n\
  \n最后一步是在`UFOViewController`中实现委托回调。首先修改好友加载方法，将好友列表转换为`GKPlayer`对象数组。请将`friendsFinishedLoading`方法修改为如下代码：\n\
  \n```\n- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n\
  \n{\n\nif (error != nil) {\n\nNSLog(@\"An error occured during friends list request:\
  \ %@\", [error localizedDescription]);\n\n} else {\n\n[gcManager playersForIDs:\
  \ friends];\n\n}\n\n}\n```\n\n还需添加我们刚刚定义的新协议方法。请在`UFOViewController.m`文件中添加以下代码：\n\
  \n```\n- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;\n\n{\n\
  \nif (error != nil) {\n\nNSLog(@\"An error occured during player lookup: %@\", [error\
  \ localizedDescription]);\n\n} else {\n\nNSLog(@\"Players loaded: %@\", players);\n\
  \n}\n\n}\n```\n\n现在运行应用（假设你的 Game Center 账户已关联好友），它将拉取好友的玩家 ID 列表，执行查找后将`GKPlayer`描述信息输出到控制台。输出内容应与以下示例类似：\n\
  \n```\n2011-02–01 14:20:23.335 UFOs[4038:207] Authentication Changed: <GKPlayer\n\
  0x5f46fb0>(playerID: G:1092793231, alias: the_other_kyle, status: (null), rid:(null))\n\
  2011-02–01 14:20:23.471 UFOs[4038:207] Players loaded: (\n\"<GKPlayer 0x6a201e0>(playerID:\
  \ G:1093075676, alias: johncash, status: (null),\nrid:(null))\"\n)\n```\n\n## 本章小结\n\
  \n在本章中，你学习了如何检测 Game Center 兼容性以及为 iOS 6/7 及更早版本认证本地用户。现在你应该深刻理解如何使用`GameCenterManager`类，以及它对于创建整洁、易于在多个项目中复用的代码环境的优势。\n\
  \n此外，你现在应能熟练使用`GKLocalPlayer`、`GKPlayer`和好友列表。下一章我们将深入探讨排行榜，并扩展本章所学的主题。如果你对本章讨论的任何内容有疑问，请记住，可获取的源代码（`www.apress.com`）包含了所有主题的工作示例。\n\
  \n"
- "# 3. 排行榜\n\n> **摘要**\n> 古之所谓善战者，胜于易胜者也。\n>\n> ——[孙子](http://www.goodreads.com/author/show/1771.Sun_Tzu)，[《孙子兵法》](http://www.goodreads.com/work/quotes/3200649)\n\
  \n排行榜的历史比电子游戏本身还要久远。正如我们所知，排行榜的起源可追溯到 20 世纪 50 年代的原始弹球机时代。弹球机制造商很快意识到，增加高分榜能提升竞争性，这意味着玩家游玩时间更长，收益也更多。\n\
  \n20 世纪 70 年代，随着电子游戏开始兴起，排行榜迅速被这些新游戏采用，最早可追溯到 1976 年发布的游戏《Sea Wolf》（见图 3-1）。自此以后，排行榜成为游戏文化不可或缺的一部分。排行榜变得如此普及，以至于\
  \ 2007 年上映了全长纪录片《金刚之王》，记录了围绕任天堂《大金刚》高分榜的激烈竞争。如今排行榜已成为主流，不仅为玩家所期待，更是任何电子游戏的标配。\n\n\
  ![A978-1-4302-4906-1_3_Fig1_HTML.jpg](img/A978-1-4302-4906-1_3_Fig1_HTML.jpg)\n\n\
  **图 3-1.** 《Sea Wolf》（1976 年），首款包含高分功能的电子游戏\n\niOS 的 Game Center 极大简化了在应用中添加排行榜的流程。考虑到此前开发者需要编写并维护服务器来存储和更新分数数据，这无疑是一个巨大的进步。本章将探讨在\
  \ Game Center 下实现多个排行榜所需的步骤，以及所有必要的排行榜支持。你将学习如何提交分数、检索排行榜、自定义排行榜图形用户界面（GUI），以及处理创建适合你应用的排行榜所需的所有事项。\n\
  \n## 为何需要排行榜？\n\n在正式开始处理排行榜之前，理解为什么排行榜是你社交应用或游戏不可或缺的一部分至关重要。\n\n- 排行榜能在应用或游戏中营造社区感，否则你的用户可能无法直接与其他用户互动。\n\
  - 排行榜能驱动用户返回你的应用，以超越自己的分数或朋友的高分。\n- 排行榜能在应用中创造目标感和成就感。\n- 排行榜使用户更易与朋友、家人和同事分享应用体验和进度。\n\
  - Game Center 的排行榜易于实现，能快速让你的应用显得更精致、更完整。\n- 随着 iOS 6 中排行榜挑战功能的加入，玩家的朋友可能通过分数挑战促使他们重返你的游戏。\n\
  \n\n## Game Center 排行榜概述\n\n在 Game Center 中，排行榜是与特定排行榜标识符相关的 `GKScore` 对象数组，每个应用可以包含多个排行榜。排行榜可以根据好友状态和提交日期进行检索和进一步筛选。\n\
  \n`GKScore` 对象代表特定排行榜上的每条记录。每个 `GKScore` 始终关联一个玩家 ID。当 Game Center API 向排行榜提交新的\
  \ `GKScore` 时，玩家 ID 由 API 自动设置，且无法更改。日期和排名等值也会自动设置并更新。你只需设置原始分数值和该分数所属的排行榜类别。\n\n\
  有两种方法可以检索和显示排行榜。最常见且最简单的方法是使用苹果的排行榜图形用户界面（GUI）。这将是我们在接下来几节中首先探讨的方法。第二种方法是检索原始的 `GKScore`\
  \ 值，并在你自己的 GUI 中显示它们；本章稍后将讨论这种方法。\n\n> **注意：** 随着 iOS 7 的推出，Game Center 目前对每个捆绑包\
  \ ID 的排行榜数量限制为 100 个。iOS 6 及更早版本的排行榜限制为 25 个。\n\n### 使用苹果排行榜 GUI 相比自定义 GUI 的优势\n\
  \n使用苹果排行榜 GUI 的优势包括：\n\n- 其设计出自世界顶级设计师之手。\n- 实现和展示排行榜非常简单。\n- 用户会看到他们熟悉且知道如何操作的界面。\n\
  \n使用自定义 GUI 的优势包括：\n\n- 你的排行榜可以与应用的自定义设计相匹配。\n- 你对最终数据有更多自由，并可以使用附加条件进行筛选。\n- 你可以实现自己的自定义缓存行为。\n\
  \n如你所见，每种系统都有其优缺点，至于应该使用哪种系统，并没有唯一的正确答案。到本章结束时，你将充分了解这两种选项，并能够根据应用的具体需求，正确决定应采用哪种方法。\n\
  \n## 在 iTunes Connect 中配置排行榜\n\n在开始处理排行榜的代码部分之前，你必须先在 iTunes Connect 中设置一个新的排行榜。登录\
  \ iTunes Connect（[`itunesconnect.apple.com`](http://itunesconnect.apple.com/)），然后选择我们在第\
  \ 1 章和第 2 章中一直在处理的应用。从控制面板中选择应用后，进入“管理 Game Center”区域。\n\n你的应用的 Game Center 门户将有一个名为“排行榜”的部分。如果这是你为此应用设置的第一个排行榜，你将看到一个标有“设置”的按钮。如果你已经有排行榜，这里的步骤会有所不同，将在本节后面介绍。\n\
  \n进入“排行榜”部分（如图 3-2 所示），选择网页左上角的“添加排行榜”按钮。系统会提示你选择单个排行榜或组合排行榜。单个排行榜是一组存储的分数对象集合，可以独立于其他排行榜进行查询。组合排行榜也可以独立于其他排行榜进行访问；它是多个单个排行榜的集合，一起显示。组合排行榜对于显示诸如所有关卡的历史最高分或类似的组合数据非常有用。\n\
  \n![A978-1-4302-4906-1_3_Fig2_HTML.jpg](img/A978-1-4302-4906-1_3_Fig2_HTML.jpg)\n\
  \n*图 3-2. 在 iTunes Connect 中添加新排行榜*\n\n我们从创建一个新的单个排行榜开始，如图 3-3 所示。首先需要输入的是排行榜引用名称。此值仅用作\
  \ iTunes Connect 中的参考。引用名称旨在帮助你快速在 iTunes Connect 中找到排行榜；用户永远不会看到它。对于本例，你可以使用引用名称“Leaderboard\
  \ Foo”。\n\n![A978-1-4302-4906-1_3_Fig3_HTML.jpg](img/A978-1-4302-4906-1_3_Fig3_HTML.jpg)\n\
  \n*图 3-3. 在 iTunes Connect 中创建新的单个排行榜*\n\n下一个字段是排行榜 ID，你将在代码中查询此值以检索特定的排行榜。苹果建议你为此字段使用反向\
  \ DNS 条目格式，例如 `com.company.appname.leaderboardname`。请在此处为你的应用填写相应的值；这些值具体是什么并不重要，但你在本章剩余部分需要记住它们。\n\
  \n创建新排行榜时，还需要选择分数格式类型。表 3-1 显示了可用的数据格式。选择符合你分数数据要求的分数格式。\n\n*表 3-1. 在 iTunes Connect\
  \ 中添加新排行榜的分数格式类型*\n\n| 分数格式类型 | 示例输出 |\n| --- | --- |\n| 整数 | 12,345 |\n| 定点数 -\
  \ 保留 1 位小数 | 12,345.1 |\n| 定点数 - 保留 2 位小数 | 12,345.12 |\n| 定点数 - 保留 3 位小数 | 12,345.123\
  \ |\n| 已用时间 - 精确到分钟 | 3:45 |\n| 已用时间 - 精确到秒 | 3:45:55 |\n| 已用时间 - 精确到百分之一秒 | 3:45:55.82\
  \ |\n| 货币 - 整数 | $182,121 |\n| 货币 - 保留 2 位小数 | $182,121.68 |\n\n> **提示：** 如果提供的格式类型都不符合你的要求，请选择最接近的类型。在本章后面，你将了解如何通过检索原始分数值来自定义这些值。\n\
  \n你还需要选择排行榜是按升序还是降序排序。升序排序将首先显示最低分，例如高尔夫比赛或赛道圈速。降序排序将首先显示最高分，例如足球比赛或第一人称射击游戏中的典型得分。\n\
  \n\n\n### 创建单个排行榜并提交分数\n\n创建新的单个排行榜时，最后需要完成的工作是输入本地化的分数信息，如图 3-4 所示。`iTunes Connect`\
  \ 内置了针对 Game Center 的本地化支持；你需要为每个想要支持的语言创建新条目。\n\n`名称`字段是排行榜在所选语言中的显示名称。`分数格式`字段取决于你在上一屏幕选择的分数格式类型。（有关货币格式的示例，请参见图\
  \ 3-4。）你还需要提供`分数格式后缀`。当你获取格式化后的分数属性时，该字符串会附加到分数值的末尾。\n\n> **警告**\n> \n> 对于创建的每个排行榜，你都需要至少添加一种语言，否则该排行榜将被视为无效。\n\
  \n![A978-1-4302-4906-1_3_Fig4_HTML.jpg](img/A978-1-4302-4906-1_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** 编辑新排行榜的本地化信息\n\n> **提示**\n> \n> 如果你希望在格式化后的分数值中，分数与分数格式后缀之间显示一个空格，请不要忘记在分数后缀开头前添加一个空格。\n\
  \n现在，你已为应用配置了一个单个排行榜。为了启用组合排行榜，我们至少需要两个共享相同分数格式类型的排行榜。现在继续创建第二个单个排行榜。\n\n一旦你拥有两个共享相同分数格式类型的排行榜，就可以创建一个组合排行榜。按照前面示例中描述的过程，遵循与创建单个排行榜相同的步骤。这个界面与创建单个排行榜的屏幕类似。主要区别在于，你需要选择要组合的排行榜，如图\
  \ 3-5 所示。你需要创建一个新的排行榜 ID，并为新的组合排行榜指定本地化数据。\n\n![A978-1-4302-4906-1_3_Fig5_HTML.jpg](img/A978-1-4302-4906-1_3_Fig5_HTML.jpg)\n\
  \n**图 3-5.** 创建组合排行榜\n\n我们还将添加最后一个单个排行榜，以便我们使用一个未组合的单个排行榜，因为之前创建的两个排行榜现在已变成附属排行榜。你的排行榜面板现在应该包含四个排行榜：两个附属排行榜、一个组合排行榜和一个单个排行榜。既然我们有了多个有效的排行榜可以操作，就可以回到\
  \ Xcode，开始处理与排行榜相关的代码。\n\n> **重要**\n> \n> 一旦排行榜在上架的应用中上线，就永远无法删除，因此在发布应用之前，请务必仔细检查你的排行榜信息。\n\
  \n#### 提交分数\n\n在排行榜提供任何实用功能之前，我们需要用一些分数数据来填充它。我们通过再次修改 `GameCenterManager` 类来开始这一过程。将以下方法添加到实现中；它应该看起来很熟悉，因为它遵循了我们在实现身份验证方法时使用的相同模式：\n\
  \n```\n- (void) reportScore: (int64_t) score forCategory: (NSString*) category\n\
  {\n        GKScore *scoreReporter = [[[GKScore alloc] initWithCategory:category]\
  \ autorelease];\n        scoreReporter.value = score;\n        [scoreReporter reportScoreWithCompletionHandler:\
  \ ^(NSError *error)\n        {\n                [self callDelegateOnMainThread:@selector(scoreReported:)\n\
  \                                                       withArg:nil\n          \
  \                                             error:error];\n        }];\n}\n```\n\
  \n这个新方法接收一个 `int64` 类型的分数和一个 `NSString` 类型的类别。然后，它分配并初始化一个新的 `GKScore` 实例。我们需要在\
  \ `GKScore` 对象上设置的唯一属性是原始分数值。API 已经为我们设置了日期和用户值；当我们初始化 `GKScore` 对象时，我们使用一个类别参数进行初始化。我们将继续使用标准的回调块将结果传递给我们的委托。\n\
  \n我们还需要修改头文件，以纳入一个新的协议方法。修改 `GameCenterManager` 头文件中现有的协议声明区域，包含 `scoreReported`\
  \ 方法，如下代码片段所示：\n\n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n\
  - (void)processGameCenterAuthentication:(NSError*)error;\n- (void)friendsFinishedLoading:(NSArray\
  \ *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray *)players\
  \ error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n@end\n```\n\
  \n至此，我们暂时完成了对 `GameCenterManager` 类所需的所有修改。现在，我们可以将注意力转回到游戏本身。我们首先需要实现一些新的游戏机制来处理高分。\n\
  \n#### 设置默认排行榜\n\n自 iOS 5 的 Game Center 开始，你可以为本地用户设置一个默认的 Game Center 排行榜。如果你设置了默认排行榜，则在提交时可以为排行榜省略设置一个类别，系统会自动使用正确的默认排行榜。以下方法接收一个\
  \ `NSString` 标识符作为参数，用于指定你想要设置为本地玩家默认排行榜的排行榜：\n\n```\n[GKLeaderboard setDefaultLeaderboard:@\"\
  com.dragonforged.leaderboardToBeDefault\"\n  withCompletionHandler:^(NSError *error)\n\
  {\n        NSLog(@\"设置默认排行榜时发生错误：%@\",\n  [error localizedDescription]);\n}];\n\
  ```\n\n\n\n## 为 UFO 游戏添加分数提交功能\n\n在我们的 UFO 游戏中添加计分功能有两种显而易见的方法。首先，我们可以实现一个系统，统计被绑架的奶牛数量，并将该数字作为分数提交。虽然这种方法对我们来说最容易实现，但并不是一种很有趣的游戏玩法，因为游戏没有合乎逻辑的结束点。第二种高分方法实现起来更困难，但更有意义。它会记录玩家绑架十头奶牛所花的时间；用时最短的玩家获胜。\n\
  \n在开发自己的应用时，必须仔细考虑这些主题。就本书而言，我们将演示第一种方法，即被绑架的奶牛数量就是玩家的分数。如果你打算实现基于计时器的系统，方法会非常相似：在回合开始时启动计时器，当十头奶牛被绑架后，提交计时器上的秒数作为时间。\n\
  \n为了实现基于分数的系统，我们需要为玩家添加一种结束游戏的方式。在实际游戏中，这可以通过让某些东西能够杀死玩家或设置时间限制来实现。然而，就本示例而言，我们将简单地添加一个“退出”按钮。这将允许用户模拟游戏结束事件，同时使代码专注于\
  \ Game Center，而无需增加额外的游戏复杂性。\n\n我们在 `UFOGameViewController.xib` 中添加一个“退出”按钮，如图 3-6\
  \ 所示。我们还需要为这个按钮创建一个新的 `IBAction`。将以下代码添加到 `UFOGameViewController` 中，并将我们的“退出”按钮连接到它。目前，我们只需将导航控制器弹回根视图。\n\
  \n```\n-(IBAction)exitAction:(id)sender;\n{\n  [[self navigationController] popViewControllerAnimated:YES];\n\
  }\n```\n\n> **注意：** 你不必等到游戏结束才提交新分数，但这通常被认为是一种良好实践。如果可能，应避免在单次游戏中多次提交新分数。\n>\n>\
  \ 一个值得注意的例外可能是持续性的角色扮演游戏，其中分数持续更新，并且在游戏过程中没有合适的结束点来提交分数。\n\n![A978-1-4302-4906-1_3_Fig6_HTML.jpg](img/A978-1-4302-4906-1_3_Fig6_HTML.jpg)\n\
  \n**图 3-6.** 添加退出游戏的功能，以便提交高分\n\n我们还需要将 `GameCenterManager` 类的协议方法添加到 `UFOGameViewController`\
  \ 中。将以下代码片段添加到 `UFOGameViewController.m` 中。\n\n```\n-(void)scoreReported: (NSError*)\
  \ error;\n{\n  if (error)\n  {\n    NSLog(@\"在报告分数时出现错误：%@\",\n          [error\
  \ localizedDescription]);\n  }\n  else\n  {\n    NSLog(@\"分数已提交\");\n  }\n}\n```\n\
  \n剩下的最后一步是将分数提交到 Game Center；如果你还记得，我们已经在 `GameCenterManager` 类中编写了处理方法。我们已经在 `UFOViewController`\
  \ 中使用了一个 `GameCenterManager` 类的实例来认证用户。我们将保留一个指向先前类中已创建对象实例的指针。\n\n为 `UFOGameViewController`\
  \ 创建一个新属性，使其成为 `GameCenterManager` 的实例，并像先前类中那样将其命名为 `GCManager`。一旦该属性被合成，我们就可以从先前的类中连接到它。修改\
  \ `UFOViewController` 的 `playButtonPressed` 方法，使其与以下内容一致：\n\n```\n-(IBAction)playButtonPressed\n\
  {\n  UFOGameViewController *gameViewController = [[UFOGameViewController alloc]init];\n\
  \  gameViewController.gcManager = gcManager; // 更改后的代码\n  [self.navigationController\
  \ pushViewController: gameViewController animated:YES];\n  [gameViewController release];\n\
  }\n```\n\n现在，我们的游戏控制器类引用了我们将在整个项目中使用的 `GameCenterManager`。我们还必须在 `UFOGameViewController`\
  \ 的 `viewDidLoad` 方法中为 `gcManager` 设置一个新的委托。我们要确保 `UFOGameViewController` 将处理分数提交的回调。将以下方法添加到实现中：\n\
  \n```\n- (void)scoreReported: (NSError*) error;\n{\n  if (error)\n  {\n    NSLog(@\"\
  在报告分数时出现错误：%@\",\n          [error localizedDescription]);\n  }\n  else\n  {\n \
  \   NSLog(@\"分数已提交\");\n  }\n  [[self navigationController] popViewControllerAnimated:\
  \ YES];\n}\n```\n\n我们还将修改 `exitAction` 方法，使其仅提交分数。为此，用以下内容替换旧的 `exitAction` 方法。请注意我们使用了在\
  \ iTunes Connect 中设置排行榜 ID；务必使用你输入的那个相同 ID，因为它很可能与此处使用的 ID 不匹配。\n\n```\n-(IBAction)exitAction:(id)sender;\n\
  {\n  [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n}\n```\n\n现在，当你运行游戏并点击“退出”时，你应该会看到一条类似以下输出的控制台消息：\n\n```\n2011-02-10 12:32:47.629\
  \ UFOs[15092:207] Score submitted\n```\n\n> **提示：** 请参阅本章末尾的“更好方法”一节，了解一种更复杂但对用户更友好的分数提交方法。\n\
  \n现在我们已经成功将分数提交到排行榜，在接下来的章节中，你将学习如何将这些数据呈现给用户。为了尽可能轻松地学习本节内容，此操作已被极大简化。这不是你希望向用户展示的用户体验；我们只是在等待网络回调时将用户困在游戏画面中。在真实的游戏中，你应该在之前的视图中处理委托回调。这可以确保用户不会无谓等待。为简单起见，我们将继续使用这种更易理解的实现方法。\n\
  \n> **提示：** 每个玩家每个排行榜类别只能发布一个分数。你可能会注意到你提交的分数从未出现在排行榜上。如果发生这种情况，请确保你提交的分数高于该玩家的最高分数。\n\
  \n\n\n### 处理成绩提交失败\n\n如果成绩提交失败，作为开发者的您需要全权负责存储该成绩，并在错误解决后重新提交。对用户而言，没有什么比获得新高分却因网络故障而丢失更令人沮丧的了。这也是苹果在应用审核期间喜欢测试的环节之一。\n\
  \n存储成绩信息以供稍后重新提交的方法有很多；不过，我认为以下方法对新手来说最容易实现。如果此方法不符合您应用的复杂程度或需求，您可以自由实现自己的系统。\n\n\
  我们将使用 `NSKeyedArchiver` 来存储 `GKScore` 对象以备后用。序列化该对象的原因是为了保留我们初始化 `GKScore` 实例时创建的数据，即日期。虽然您可以简单地存储原始成绩数据，但使用新的\
  \ `GKScore` 对象提交原始成绩会使用当前时间戳，而不是成绩实际获得的时间。这会带来糟糕的用户体验，因为第一个获得高分的玩家可能无法被识别为得分者。\n\
  \n要处理并从成绩提交失败中恢复，需要完成三个步骤。第一步是保存成绩数据。虽然在此示例中我们不会通知用户失败情况，但最好告知用户当前无法提交其成绩，并且您将稍后自动重试。修改\
  \ `GameCenterManager.m` 中的 `reportScore` 类，使其与以下代码一致：\n\n```\n- (void) reportScore:\
  \ (int64_t) score forCategory: (NSString*) category\n{\n    GKScore *scoreReporter\
  \ = [[[GKScore alloc] initWithCategory:category] autorelease];\n    scoreReporter.value\
  \ = score;\n    [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)\n\
  \    {\n        if (error != nil)\n        {\n            NSData* savedScoreData\
  \ = [NSKeyedArchiver archivedDataWithRootObject:scoreReporter];\n            [self\
  \ storeScoreForLater: savedScoreData];\n        }\n        [self callDelegateOnMainThread:\
  \ @selector(scoreReported:) withArg: NULL error: error];\n    }];\n}\n```\n\n我们添加了几行额外的代码，这些代码将在检测到错误时运行。第一行获取\
  \ `GKScore` 对象并使用 `NSKeyedArchiver` 对其进行编码，这将返回一个 `NSData` 对象。稍后我们将从此 `NSData` 中检索\
  \ `GKScore`。我们还调用了一个我们命名为 `storeScoreForLater` 的新方法。现在让我们看一下该方法；将以下方法添加到 `GameCenterManager`\
  \ 类的实现中：\n\n```\n- (void)storeScoreForLater:(NSData *)scoreData;\n{\n    NSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n    NSMutableArray *savedScoresd\
  \ = [[defaults arrayForKey:@\"savedScores\"] mutableCopy];\n    [savedScoreArray\
  \ addObject: scoreData];\n    [defaults setObject:savedScoreArray forKey:@\"savedScores\"\
  ];\n    [savedScoreArray release];\n}\n```\n\n这段代码会将表示我们成绩的 `NSData` 保存到用户默认设置中。您也可以将此数据写入文件，甚至存储到核心数据中。永远不要假设用户只有一个未提交的成绩；他们在离线游戏时可能已经在多个不同的排行榜上积累了大量成绩。\n\
  \n到目前为止，我们已经捕获了发布失败的情况，并将成绩保存到磁盘以供稍后重试。最后一步是尝试将成绩重新提交到 Game Center。这一步可能非常复杂，具体取决于您希望系统有多智能。大多数成绩提交失败与网络访问问题有关，但也可能由\
  \ Game Center 宕机甚至 DNS 问题导致。\n\n何时重新提交成绩没有标准答案，但指导原则是：您不想保留一个本可以提交的成绩。在我们担心如何接入重新提交失败成绩的方法之前，让我们先实现一个重试成绩发布的方法。将以下方法添加到您的\
  \ `GameCenterManager` 类中。\n\n```\n-(void)submitAllSavedScores\n{\n    NSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n    NSArray *savedScores =\
  \ [defaults arrayForKey:@\"savedScores\"];\n    [defaults removeObjectForKey: @\"\
  savedScores\"];\n    GKScore *scoreReporter = nil;\n    NSData *savedScoreData =\
  \ nil;\n    for (NSData *scoreData in savedScores)\n    {\n        scoreReporter\
  \ = [NSKeyedUnarchiver unarchiveObjectWithData: scoreData];\n        [scoreReporter\
  \ reportScoreWithCompletionHandler: ^(NSError *error)\n        {\n            if\
  \ (error != nil)\n            {\n                savedScoreData = [NSKeyedArchiver\
  \ archivedDataWithRootObject:scoreReporter];\n                [self storeScoreForLater:\
  \ savedScoreData];\n            }\n            else\n            {\n           \
  \     NSLog(@\"已提交保存的成绩\");\n            }\n        }];\n    }\n}\n```\n\n这段代码将遍历所有已保存的成绩并尝试重新提交它们。由于这种行为没有委托，我们不需要提供委托回调。我们仅记录成功和失败情况，以便将失败的成绩重新添加到我们的未提交成绩数组中，以供稍后重试。\n\
  \n如前所述，接入重新提交失败成绩的方法有数十种。为简单起见，我们在成功通过 Game Center 进行身份验证后，添加对 `submitAllSavedScores`\
  \ 方法的调用。修改 `GameCenterManager.m` 中的 `authenticateLocalUser` 方法，使其与以下代码一致：\n\n```\n\
  if ([[GKLocalPlayer localPlayer] authenticateHandler] == nil)\n{\n    [[GKLocalPlayer\
  \ localPlayer] setAuthenticateHandler:^(UIViewController *viewController, NSError\
  \ *error)\n    {\n        if (error != nil)\n        {\n            if ([error code]\
  \ == GKErrorNotSupported) {\n                UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"错误\" message:@\"此设备不支持 Game Center\" delegate:nil cancelButtonTitle:@\"\
  关闭\" otherButtonTitles:nil];\n                [alert show];\n                [alert\
  \ release];\n            }\n            else if ([error code] == GKErrorCancelled)\n\
  \            {\n                UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  错误\" message:@\"此设备已因来自应用的多次登录失败，您需要从 Game Center 应用登录\" delegate:nil cancelButtonTitle:@\"\
  关闭\" otherButtonTitles:nil];\n                [alert show];\n                [alert\
  \ release];\n            }\n            else\n            {\n                UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"错误\" message:[error localizedDescription]\
  \ delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n             \
  \   [alert show];\n                [alert release];\n            }\n        }\n\
  \        else\n        {\n            if (viewController != nil)\n            {\n\
  \                [(UIViewController *)delegate presentViewController:viewController\
  \ animated:YES completion:NULL];\n            }\n            [self submitAllSavedScores];\n\
  \        }\n    }];\n}\n```\n\n\n\n## 展示排行榜\n\n现在，我们已经在 iTunes Connect 中创建了一个排行榜并向其中添加了一条分数，是时候向用户展示排行榜了。展示方式有两种：第一种是使用\
  \ Apple 的图形界面；第二种是使用自定义图形界面。本节将介绍如何使用 Apple 的图形界面进行实现。下一节你将学习如何用自定义图形来展示排行榜。\n\n\
  在开始之前，我们需要创建一个新的按钮来触发排行榜。我们希望这个按钮位于游戏屏幕之外，因为不希望将正在游戏中的用户拖离当前进程去查看排行榜。首先，在 `UFOViewController`\
  \ 视图中添加一个新按钮，如图 3-7 所示。\n\n![A978-1-4302-4906-1_3_Fig7_HTML.jpg](img/A978-1-4302-4906-1_3_Fig7_HTML.jpg)\n\
