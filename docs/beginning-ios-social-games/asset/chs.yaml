  \ ID。\n\n现在，您应该在 iTunes Connect 中为我们的游戏配置了三个成就。我们现在可以返回 Xcode，并开始在代码层面处理这些成就。\n\n\
  \n\n## 展示成就\n\n与排行榜不同，在将用户数据填充到成就系统之前，有大量的图形界面预览工作要做。观察修改成就对其通过默认 GUI 显示效果的影响，是很有帮助的。本章我们将首先展示苹果的成就\
  \ GUI，然后继续提交用户数据。本章稍后还会介绍自定义的成就 GUI。\n\n开始之前，我们需要创建一个新的`UIButton`来触发成就视图。我们很可能希望在游戏屏幕之外执行此操作，就像处理两个排行榜按钮时那样。首先，我们在`UFOViewController`视图中添加一个新按钮，如图\
  \ 4-6 所示。\n\n你还需要创建一个`IBAction`并将其连接到新的“成就”按钮。将以下代码插入到你连接到“成就”按钮的操作中。\n\n```\n-(IBAction)achievementButtonPressed;\n\
  \n{\n\n     GKAchievementViewController *controller = nil;\n\n       controller\
  \ = [[GKAchievementViewController alloc] init];\n\n         [achievementViewController\
  \ setAchievementDelegate:self];\n\n         [self presentViewController:achievementViewController\
  \ animated:YES completion:nil];\n\n       [controller release];\n\n}\n```\n\n![A978-1-4302-4906-1_4_Fig6_HTML.jpg](img/A978-1-4302-4906-1_4_Fig6_HTML.jpg)\n\
  \n图 4-6.\n\n添加新按钮以触发成就视图\n\n**提示**\n\n从 iOS 6 开始，你可以使用`GKGameCenterViewController`创建一个可用于成就、排行榜和挑战的\
  \ Game Center 视图。在 iOS 6 上使用`GKAchievementViewController`会启动一个已预先选中成就部分的`GKGameCenterViewController`，同时保持向后兼容性。\n\
  \n此外，我们需要连接一个与`GKAchievementViewController`配合使用的委托回调。将以下方法添加到你的实现文件中：\n\n```\n-\
  \ (void)achievementViewControllerDidFinish:(GKAchievementViewController *)viewController\n\
  \n{\n\n     [self dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\
  \n如果你现在运行应用并点击“成就”按钮，将会看到一个类似于图 4-7 所示的视图。显示的成就使用的是苹果的“未获得”图像。苹果建议你始终使用其“未获得”图像，但当使用自定义成就\
  \ GUI 时，你可以覆盖此图像并返回自己的图像。\n\n接下来，回想一下我们设置了三个成就，其中一个是隐藏状态。如图 4-7 所示，提供的视图只向我们展示了两个成就。因为我们尚未向第三个成就提交任何进度，其详情对用户是隐藏的。不过，你可以看到顶部信息行反映出存在一个隐藏的成就（1/3\
  \ 成就）。同时注意，这些成就使用的是在 iTunes Connect 中设置的本地化“未获得”描述。\n\n![A978-1-4302-4906-1_4_Fig7_HTML.jpg](img/A978-1-4302-4906-1_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n\n使用苹果默认 GUI 显示的成就\n\n这是通过苹果内置 GUI 向用户展示其成就进度的全部必要步骤。下一节，我们将探讨如何更新和推进这些成就。在本章稍后部分，你将学习如何使用自定义\
  \ GUI 来展示成就。\n\n**注意**\n\n用户始终可以在 Game Center 应用中查看他们的成就进度，但仍建议你在自己的应用中提供让用户查看进度的方式。\n\
  \n## 修改成就进度\n\n与排行榜条目不同，成就可以通过用户交互不断修改和推进。就像我们处理其他 Game Center 功能一样，我们将在`GameCenterManager`类中创建一个新方法来处理与成就的交互。添加以下方法后，我们将审阅代码以了解其具体运作方式。\n\
  \n**提示**\n\n请记住，所有这些源代码都可以在线获取，网址为 [`http://apress.com`](http://apress.com)。处理大型方法时，从下载的源代码中复制可能会更简单。\n\
  \n```\n- (void)submitAchievement:(NSString*)identifier percentComplete:(double)percentComplete\n\
  \n{\n\nif ([self earnedAchievementCache] == NULL)\n\n{\n\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\n\
  *achievements, NSError *error) {\n\nif (error == NULL)\n\n{\n\nNSMutableDictionary\
  \ *tempCache = [NSMutableDictionary\ndictionaryWithCapacity:[achievements count]];\n\
  \nfor (GKAchievement* achievement in achievements)\n\n{\n\n[tempCache setObject:\
  \ achievement forKey:\n[achievement identifier]];\n\n}\n\n[self setEarnedAchievementCache:tempCache];\n\
  \n[self submitAchievement:identifier percentComplete:\npercentComplete];\n\n}\n\n\
  else\n\n{\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted: error:)\
  \ withArg:NULL\nerror:error];\n\n}\n\n}];\n\n}\n\nelse\n\n{\n\nGKAchievement *achievement\
  \ = [[self earnedAchievementCache]\nobjectForKey:identifier];\n\nif (achievement\
  \ != NULL)\n\n{\n\nif (([achievement percentComplete] >= 100.0) ||\n([achievement\
  \ percentComplete] >= percentComplete))\n\n{\n\nachievement = NULL;\n\n}\n\n[achievement\
  \ setPercentComplete:percentComplete];\n\n}\n\nelse\n\n{\n\nachievement = [[[GKAchievement\
  \ alloc] initWithIdentifier:identifier]\nautorelease];\n\n[achievement setPercentComplete:percentComplete];\n\
  \n[[self earnedAchievementCache] setObject:achievement\nforKey:[achievement identifier]];\n\
  \n}\n\nif (achievement != NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler:^(NSError\n\
  *error) {\n\n[self callDelegateOnMainThread:\n@selector(achievementSubmitted:error:)\n\
  withArg: achievement error:error];\n\n}];\n\n}\n\n}\n\n}\n```\n\n在执行此代码之前，你需要添加一个新的类属性。创建一个新的可变字典（别忘了合成它）。`GameCenterManager`头文件的相关部分现在应如下所示。\n\
  \n```\n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n\n{\n\
  \nid <GameCenterManagerDelegate, NSObject> delegate;\n\nNSMutableDictionary* earnedAchievementCache;\n\
  \n}\n\n@property(nonatomic, retain) id <GameCenterManagerDelegate, NSObject> delegate;\n\
  \n@property(nonatomic, retain) NSMutableDictionary* earnedAchievementCache;\n```\n\
  \n\n\n### 加载成就\n\n现在来看我们添加的 `submitAchievement:percentComplete:` 方法。其中包含两个主要的 if/else\
  \ 代码块。如果 `[self earnedAchievenmentCache]` 为 NULL，则会执行第一个代码块——在代码首次运行时，该缓存始终为 NULL。现在让我们看看这段代码。\n\
  \n```\n[GKAchievement loadAchievementsWithCompletionHandler:^(NSArray *achievements,\
  \ NSError *error) {\n    if (error == NULL)\n    {\n        NSMutableDictionary\
  \ *tempCache = [NSMutableDictionary dictionaryWithCapacity: [achievements count]];\n\
  \        for (GKAchievement *achievement in achievements)\n        {\n         \
  \   [tempCache setObject:achievement forKey:[achievement identifier]];\n       \
  \ }\n        [self setEarnedAchievementCache:tempCache];\n        [self submitAchievement:identifier\
  \ percentComplete:percentComplete];\n    }\n    else\n    {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
  \ withArg:NULL error:error];\n    }\n}];\n```\n\n**重要**  \n`loadAchievementsWithCompletionHandler`\
  \ 返回的数组不会显示任何你尚未提交 `percentageCompleted` 的成就。\n\n这段代码的主要功能是将成就列表加载到 `earnedAchievementCache`\
  \ 中。我们调用了 `GKAchievement` 的 `loadAchievementsWithCompletionHandler` 方法。该调用会返回一个数组，其中包含在\
  \ iTunes Connect 中设置的所有成就。接着，我们将 `GKAchievement` 对象以标识符为键存入字典中。\n\n此时，代码再次调用了 `submitAchievement:percentComplete`。这一次，`earnedAchievementCache`\
  \ 不为 NULL，因此会执行第二组代码。如果在此过程中遇到错误，我们会使用标准的委托回调将错误发送回委托。\n\n你需要向 `GameCenterManager`\
  \ 添加一个新的协议方法来处理这个委托回调；现在正是添加的好时机。将以下可选协议添加到头文件中：\n\n```\n- (void)achievementSubmitted:(GKAchievement*)achievement\
  \ error:(NSError*)error;\n```\n\n现在我们来看第二段代码。以下代码成功执行后，会将成就提交到 Game Center 服务器。\n\
  \n```\nGKAchievement *achievement = [[self earnedAchievementCache] objectForKey:identifier];\n\
  if (achievement != NULL)\n{\n    if ((achievement.percentComplete >= 100.0) || (achievement.percentComplete\
  \ >= percentComplete))\n    {\n        achievement = NULL;\n    }\n    [achievement\
  \ setPercentComplete:percentComplete];\n}\nelse\n{\n    achievement = [[[GKAchievement\
  \ alloc] initWithIdentifier: identifier] autorelease];\n    [achievement setPercentComplete:percentComplete];\n\
  \    [[self earnedAchievementCache] setObject:achievement forKey:[achievement identifier]];\n\
  }\n\nif (achievement != NULL)\n{\n    [achievement reportAchievementWithCompletionHandler:\
  \ ^(NSError *error) {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
  \ withArg:achievement error:error];\n    }];\n}\n```\n\n第一行代码根据传入该方法的标识符字符串，从 `earnedAchievementCache`\
  \ 中检索 `GKAchievement` 对象。如果成就已完成，或上报的进度与 Game Center 服务器上的进度相同，我们将 achievement 设为\
  \ NULL。这样可以避免因提交将被忽略的进度而占用网络时间。同时，我们将 `GKAchievement` 对象上的 `percentComplete` 属性设置为传入该方法的\
  \ double 值。\n\n如果缓存中不存在该成就，我们会分配并初始化一个新实例。在这种情况下，还需要将其添加到本地成就缓存中。\n\n最后一步，在检查非 NULL\
  \ 之后，提交成就。我们在成就对象上调用 `reportAchievementWithCompletionHandler`，然后通过现有协议将结果传回给委托。\n\
  \n**注意**  \n所有成就都有一个 `percentageComplete` 属性，无论它们是否允许分阶段完成进度。如果你的成就只能完全获得或未获得，那么对于已获得的成就，你需要传入\
  \ 100。\n\n### 成就协议\n\n本节中我们要做的最后一件事是在 `UFOGameViewController` 中实现协议方法。将以下方法添加到该文件的实现中；目前我们只需将错误和成功信息打印到控制台。\n\
  \n```\n- (void)achievementSubmitted:(GKAchievement *)achievement error:(NSError\
  \ *)error;\n{\n    if (error)\n    {\n        NSLog(@\"上报成就时发生错误：%@\", [error localizedDescription]);\n\
  \    }\n    else\n    {\n        NSLog(@\"成就已提交\");\n    }\n}\n```\n\n## 重置成就\n\n\
  在某些情况下，你可能需要重置用户的成就。这不仅对调试非常有用；你可能会发现为用户提供一个重置选项也很有用。你可能想添加一个威望模式，或者让用户有机会从头开始你的游戏。以下代码片段将完全重置本地用户在你应用中的所有成就。\n\
  \n```\n- (void)resetAchievements\n{\n    [self setEarnedAchievementCache:NULL];\n\
  \    [GKAchievement resetAchievementsWithCompletionHandler:^(NSError *error) {\n\
  \        if (error == NULL)\n        {\n            NSLog(@\"成就已重置\");\n       \
  \ }\n        else\n        {\n            NSLog(@\"重置成就时发生错误：%@\", [error localizedDescription]);\n\
  \        }\n    }];\n}\n```\n\n**重要**  \n不要忘记移除你存储的成就缓存信息，否则在应用重启之前，你将无法更新重置后的成就进度。\n\
  \n\n\n## 添加成就挂钩\n\n在应用中实现成就功能时，最大的挑战在于如何将触发和推进成就的挂钩嵌入到常规操作流程中。我发现，在程序接近完成时添加这些挂钩比边开发边添加更容易。\n\
  \n本节将提供多个成就关联的示例；你的应用可能差异较大，但应能轻松调整这些示例以满足特定成就需求。\n\n为便于获取成就进度详情，我们首先在 `GameCenterManager`\
  \ 类中添加几个便捷方法。以下是用于填充本地成就缓存的第一个方法。\n\n```\n- (void)populateAchievementCache\n{\n\
  \     if ([self earnedAchievementCache] == NULL)\n     {\n          [GKAchievement\
  \ loadAchievementsWithCompletionHandler:^(NSArray *achievements,\n          NSError\
  \ *error) {\n               if (error == NULL)\n               {\n             \
  \       NSMutableDictionary* tempCache= [NSMutableDictionary\n                 \
  \   dictionaryWithCapacity: [achievements count]];\n                    for (GKAchievement\
  \ *achievement in achievements)\n                    {\n                       \
  \                 [tempCache setObject:achievement forKey:[achievement\n       \
  \                                 identifier]];\n                    }\n       \
  \             [self setEarnedAchievementCache:tempCache];\n               }\n  \
  \             else\n               {\n                    NSLog(@\"An error occurred\
  \ while loading achievements: %@\",\n                     [error localizedDescription]);\n\
  \               }\n          }];\n     }\n}\n```\n\n此方法的功能与上一节预览的提交成就进度方法中的缓存填充代码非常相似。为了使用其他两个便捷方法，我们需要先填充本地缓存。在身份验证完成后，应尽快调用\
  \ `populateAchievementCache`；在演示应用中，我在 `GameCenterManager` 的本地玩家身份验证方法中添加了该调用。请同时添加以下方法。\n\
  \n```\n- (double)percentageCompleteOfAchievementWithIdentifier:(NSString*)identifier\n\
  {\n     if ([self earnedAchievementCache] == NULL)\n     {\n          NSLog(@\"\
  Unable to determine achievement progress, local cache is empty\");\n     }\n   \
  \  else\n     {\n          GKAchievement *achievement= [[self earnedAchievementCache]\n\
  \          objectForKey:identifier];\n          if (achievement != NULL)\n     \
  \     {\n               return [achievement percentComplete];\n          }\n   \
  \       else\n          {\n               return 0;\n          }\n     }\n     return\
  \ -1;\n}\n```\n\n此方法返回传入标识符对应成就的完成百分比（双精度浮点数）。如果在本地缓存中找不到该成就副本，则假定完成百分比为 0。下一个方法使用此方法返回布尔值，指示成就是否已完成。\n\
  \n```\n- (BOOL)achievementWithIdentifierIsComplete: (NSString*)identifier\n{\n \
  \      if ([self percentageCompleteOfAchievementWithIdentifier:identifier] >= 100)\n\
  \         {\n              return YES;\n       }\n         else\n         {\n  \
  \            return NO;\n       }\n}\n```\n\n> **注：** 身份验证后请务必尽快调用 `populateAchievementCache`，否则这些便捷方法将无法返回正确的成就数据。\n\
  \n### 在 UFO 游戏中添加挂钩\n\n现在我们已经准备好一些辅助方法，可以开始为 UFO 游戏关联成就挂钩。我们需要关联三个成就。前两个都与我们绑架的奶牛数量有关，因此从这里开始。修改\
  \ `UFOGameViewController` 的 `finishAbducting` 方法如下：\n\n```\n- (void)finishAbducting\n\
  {\n       if (!currentAbductee || !tractorBeamOn) return;\n       [cowArray removeObjectIdenticalTo:currentAbductee];\n\
  \       [tractorBeamImageView removeFromSuperview];\n      tractorBeamOn = NO;\n\
  \       score++;\n       [scoreLabel setText:[NSString stringWithFormat:@\"SCORE\
  \ %05.0f\", score]];\n       [[currentAbductee layer] removeAllAnimations];\n  \
  \    [currentAbductee removeFromSuperview];\n       currentAbductee = nil;\n   \
  \       [self spawnCow];\n       if (![[self gcManager] achievementWithIdentifierIsComplete:\n\
  \        @\"com.dragonforged.ufo.aduct1\"])\n         {\n              [[self gcManager]\
  \ submitAchievement:@\"com.dragonforged.ufo.aduct1\"\n           percentComplete:100];\n\
  \       }\n}\n```\n\n我们目前只关注此方法的最后几行。首先，我们对单次绑架的标识符字符串调用便捷方法 `achievementWithIdentifierIsComplete`。由于这是一个“已获得/未获得”类成就，我们无需关心当前的完成百分比。要将成就标记为已完成，将其完成百分比设置为\
  \ 100 即可。\n\n> **注：** 如果示例中的标识符字符串与您在 iTunes Connect 中为单次绑架使用的字符串不同，请务必进行相应更改。\n\
  \n下一个成就的挂钩方式类似，唯一区别在于我们使用增量进度。将以下代码片段添加到 `finishAbducting` 方法的末尾。\n\n```\nif (![[self\
  \ gcManager] achievementWithIdentifierIsComplete:\n@\"com.dragonforged.ufo.abduct25\"\
  ])\n{\n       double percentComplete = [[self gcManager]\n         percentageCompleteOfAchievementWithIdentifier:\
  \ @\"com.dragonforged.ufo.abduct25\"];\n       percentComplete += 4;\n       [[self\
  \ gcManager] submitAchievement:@\"com.dragonforged.ufo.abduct25\"\n         percentComplete:percentComplete];\n\
  }\n```\n\n此代码片段使用了与提交完整成就相同的方法，但有一个主要区别：我们需要先确定当前成就进度，然后在此基础上增加 4（因为 25 的 4% 等于\
  \ 1）。要递增 25 次绑架中的一次，就需要增加 4%。\n\n> **提示：** 别忘了我们在 `GameCenterManager` 中添加的 `resetAchievement`\
  \ 方法。它在调试提交代码时非常有用。建议在 `didAuthenticate` 部分保留对该方法的调用，以便在调试期间始终将应用恢复到干净状态。\n\n现在运行游戏并绑架几只奶牛。完成后，您会注意到成就界面显示进度，如图\
  \ 4-8 所示。如果至少绑架了一只奶牛，您应该会获得一个已完成成就。如果绑架的奶牛少于 25 只，则应获得一个进度成就。请注意，用户完成成就时不会收到通知；我们将在后续章节“提供成就完成反馈”中讨论通知方法。\n\
  \n![A978-1-4302-4906-1_4_Fig8_HTML.jpg](img/A978-1-4302-4906-1_4_Fig8_HTML.jpg)\n\
  \n**图 4-8.** 使用 Apple 提供的界面查看成就进度\n\n\n\n#### 基于时间的成就钩子\n\n我们为该项目添加的最后一个钩子，用于处理玩家达成五分钟成就的逻辑。你的第一反应可能是记录游戏时长，并在用户退出游戏时将其作为进度提交。这可能并非最佳方案。我们希望在玩家完成成就时立即通知他们，而不是让他们等到游戏结束后才能看到自己获得了哪些成就。解决这个问题有多种方法。在本示例中，我们将每三秒（即五分钟的百分之一）触发一个`NSTimer`，并更新成就进度。将以下代码添加到`UFOGameViewController`中。\n\
  \n```\n- (void)tickThreeSeconds\n{\n    if ([[self gcManager]achievementWithIdentifierIsComplete:\n\
  \        @\"com.dragonforged.ufo.play5\"]) return;\n    double percentComplete =\
  \ [[self gcManager]\n        percentageCompleteOfAchievementWithIdentifier:@\"com.dragonforged.ufo.play5\"\
  ];\n    percentComplete++;\n    [[self gcManager] submitAchievement:@\"com.dragonforged.ufo.play5\"\
  \n        percentComplete:percentComplete];\n}\n```\n\n这里我们启动了一个三秒定时器。每次定时器触发时，我们调用`tickThreeSeconds`方法。该方法会获取成就的当前进度，在此基础上增加百分之一，然后将其提交回服务器。如果成就已经完成，该方法会直接返回。此外，请将`viewDidAppear`和`viewWillDisappear`方法修改为如下所示：\n\
  \n```\n-(void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear: animated];\n\
  \    timer = [NSTimer scheduledTimerWithTimeInterval:3.0 target:self\n        selector:@selector(tickThreeSeconds)\
  \ userInfo:nil repeats:YES];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n\
  \    [super viewWillDisappear: animated];\n    [timer invalidate];\n    timer =\
  \ nil;\n}\n```\n\n#### 另一个便捷方法\n\n有时你可能想获取`GKAchievement`对象，但手头只有成就标识符。下面的方法在传入成就标识符时，会返回一个`GKAchievement`对象。\n\
  \n```\n- (GKAchievement*)achievementForIdentifier:(NSString*)identifier\n{\n   \
  \ GKAchievement *achievement = [[self earnedAchievementCache] objectForKey:identifier];\n\
  \    if (achievement == nil)\n    {\n        achievement = [[[GKAchievement alloc]\
  \ initWithIdentifier:identifier] autorelease];\n        [[self earnedAchievementCache]\
  \ setObject:achievement forKey:[achievement identifier]];\n    }\n    return achievement;\n\
  }\n```\n\n#### 完成成就时的反馈\n\n让用户知道他们何时完成了一项成就非常重要。然而，你不应该只是简单地弹出一个`UIAlertView`，因为考虑到大多数成就都是在游戏进行中完成的（例如在赛车游戏中完成\
  \ 20 圈），这会造成很大的干扰。你不想打断用户的操作，因此需要一个更好的系统。我一直很喜欢那种从底部或顶部滑入的小视图来告知用户成就达成——这与登录 Game\
  \ Center 时获得的反馈方式非常相似。自 iOS 5 起，Apple 提供了内置的成就横幅；本章后面“成就完成横幅”部分将介绍其用法。\n\n为了实现反馈系统，我们首先需要在`GameCenterManager`中添加一个新的协议方法。我们将用这个方法通知委托对象，用户首次完成了一个成就。在头文件中添加以下方法，作为可选协议：\n\
  \n```\n-(void)achievementEarned:(GKAchievementDescription*)achievement;\n```\n\n\
  此外，我们需要修改现有的`submitAchievement:percentComplete:`方法。查看该方法的最后一个`if`语句块。我们将其修改如下。首先，添加一个`if`语句来判断`percentageComplete`是否超过\
  \ 100，这将触发我们的新协议。同时请注意，我们使用的是`GKAchievementDescription`而非`GKAchievement`。我们将在后面的“检索成就数据”一节中进一步讨论这个方法。\n\
  \n```\nif (achievement != NULL)\n{\n    [achievement reportAchievementWithCompletionHandler:^(NSError\
  \ *error) {\n        if (percentComplete< 100)\n        {\n            [self callDelegateOnMainThread:\n\
  \                @selector(achievementSubmitted:error:)\n                withArg:achievement\
  \ error:error];\n            return;\n        }\n        [GKAchievementDescription\n\
  \            loadAchievementDescriptionsWithCompletionHandler:\n            ^(NSArray\
  \ *descriptions, NSError *error) {\n                for (GKAchievementDescription\
  \ *achievementDescription in descriptions)\n                {\n                \
  \    if (![[achievement identifier] isEqualToString:\n                        [achievementDescription\
  \ identifier]]) continue;\n                    [self callDelegateOnMainThread:@selector\n\
  \                        (achievementEarned:)\n                        withArg:achievementDescription\
  \ error:nil];\n                }\n            }];\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\n\
  \            withArg:achievement error:error];\n    }];\n}\n```\n\n这样就完成了对`GameCenterManager`类所需的修改。现在我们需要为用户连接视觉反馈。回到`UFOGameViewController.m`文件中，添加我们新的协议方法`achievementEarned:`。你可以在这里添加任何类型的反馈，包括标准的`UIAlertView`，但本节我们将探索一种更友好的方式。\n\
  \n我们需要在`UFOGameViewController`中创建一些新的`IBOutlets`。创建一个新视图，将其尺寸设置为 480×25。然后将视图的背景设置为黑色，不透明度为\
  \ 70%。我们还要创建一个新的标签，将其放置在该视图的中心位置，并将文本对齐方式设置为居中。你的视图应该类似于图 4-9 所示。\n\n![A978-1-4302-4906-1_4_Fig9_HTML.jpg](img/A978-1-4302-4906-1_4_Fig9_HTML.jpg)\n\
  \n**图 4-9.** 成就达成视图和标签\n\n将视图和标签分别连接到`IBOutlets`。在示例代码中，它们被命名为`achievementCompletionView`和`achievementCompletionLabel`。然后我们修改`achievementEarned:`方法，并添加另一个用于处理动画的方法。\n\
  \n```\n- (void)achievementEarned:(GKAchievementDescription *)achievement;\n{\n \
  \   [achievementCompletionView setFrame:CGRectMake(0, 320, 480, 25)];\n    [[self\
  \ view] addSubview:achievementCompletionView];\n    [achievementcompletionLabel\
  \ setText:[achievement achievedDescription]];\n    [UIView beginAnimations:@\"SlideInAchievement\"\
  \ context:nil];\n    [UIView setAnimationDuration:0.5];\n    [UIView setAnimationDelegate:self];\n\
  ```\n\n\n```markdown\n`[UIView setAnimationDidStopSelector:@selector(achievementEarnedAnimationDone)];`\n\
  \n`[achievementCompletionView setFrame:CGRectMake(0, 295, 480, 25)];`\n\n`[UIView\
  \ commitAnimations];`\n\n`}`\n\n```\n-(void)achievementEarnedAnimationDone\n{\n\
  \    [UIView beginAnimations:@\"SlideInAchievement\" context:nil];\n    [UIView\
  \ setAnimationDelay:5.0];\n    [UIView setAnimationDuration:1.0];\n    [achievementCompletionView\
  \ setFrame:CGRectMake(0, 320, 480, 25)];\n    [UIView commitAnimations];\n}\n```\n\
  \n这两种方法都相当直观。当应用从完成成就中收到代理回调时，我们会将 `achievementCompletionView` 添加到游戏视图中。然后，我们将其动画显示到视图的底部。在五秒延迟后，我们再将其动画移出视图。你还可以访问\
  \ `GKAchievementDescription` 中使用的图像。我们将在下一节进一步研究这些属性。\n\n> **提示：** 你可能需要重置成就才能看到任何完成进度。我发现创建一个用于测试期间重置成就的新按钮非常有用。\n\
  \n如果你现在运行应用并绑架一头牛（假设你尚未完成该成就），你应该会看到与图 4-10 所示非常相似的输出。\n\n![A978-1-4302-4906-1_4_Fig10_HTML.jpg](img/A978-1-4302-4906-1_4_Fig10_HTML.jpg)\n\
  \n**图 4-10.** 显示自定义的成就横幅\n\n### 添加成就完成横幅\n\n当 Game Center 首次发布时，开发者需要负责创建和显示用户的成就反馈。在\
  \ Game Center API 的首次更新后，苹果在 iOS 5 中为 `GKAchievement` 类添加了一个非常易于使用的属性，让你能够快速实现这一步骤：如以下代码片段所示，设置\
  \ `showsCompletionBanner` 属性会在成就完成时向用户显示一条消息。`showsCompletionBanner` 的默认属性是 `NO`。\n\
  \n```\nmyAchievement.showsCompletionBanner = YES;\n```\n\n### 自定义成就图形界面\n\n有时你可能希望自定义成就系统的外观，以匹配应用中的自定义图形界面。正如你在上一章的排行榜中看到的，我们可以处理原始数据并以自己选择的方式呈现。本节重点介绍使用你自己的图形界面将成就添加到应用中。与我们处理自定义排行榜时一样，首先需要添加一个新按钮来显示自定义的成就进度视图。添加一个新按钮及其关联操作，如图\
  \ 4-11 所示。\n\n![A978-1-4302-4906-1_4_Fig11_HTML.jpg](img/A978-1-4302-4906-1_4_Fig11_HTML.jpg)\n\
  \n**图 4-11.** 在 Interface Builder 中添加自定义成就按钮\n\n我们需要创建一个新类来处理成就进度信息的处理和显示。创建一个名为\
  \ `UFOAchievementViewController` 的新类，并将其设为 `UIViewController` 的子类。在 XIB 中为表格视图、导航栏和关闭按钮设置操作和输出口。同时不要忘记为表格视图设置数据源和代理。你的\
  \ XIB 应类似于图 4-12 所示。\n\n![A978-1-4302-4906-1_4_Fig12_HTML.jpg](img/A978-1-4302-4906-1_4_Fig12_HTML.jpg)\n\
  \n**图 4-12.** 在 Interface Builder 中显示的自定义成就进度视图\n\n我们还需要创建一个用于存储成就数据的数组。创建一个新的 `NSArray`\
  \ 对象，并将其命名为 `achievementArray`。同时需要导入 `GameCenterManager` 的头文件并遵循其协议。`UFOAchievementViewController`\
  \ 的头文件现在应类似于以下内容。\n\n```\n#import <UIKit/UIKit.h>\n#import \"GameCenterManager.h\"\
  \n\n@interface UFOAchievementViewController : UIViewController <UITableViewDelegate,\n\
  \    UITableViewDataSource, GameCenterManagerDelegate>\n{\n    GameCenterManager\
  \ *gcManager;\n    UITableView *achievementTableView;\n    NSArray *achievementArray;\n\
  }\n\n@property (nonatomic, retain) GameCenterManager *gcManager;\n@property (nonatomic,\
  \ retain) NSArray *achievementArray;\n@property (nonatomic, retain) IBOutlet UITableView\
  \ *achievementTableView;\n- (IBAction)dismissAction;\n\n@end\n```\n\n接下来，连接操作以呈现我们的新\
  \ `UFOAchievementViewController` 类。编辑在 `UFOViewController` 中创建的操作，以反映以下更改：\n\n```\n\
  - (IBAction)customAchievementButtonPressed;\n{\n    UFOAchievementViewController\
  \ *achievementViewController =\n        [[UFOAchievementViewController alloc] init];\n\
  \    [achievementViewController setGcManager:gcManager];\n    [self presentViewController:achievementViewController\
  \ animated:YES completion:nil];\n    [achievementViewController release];\n}\n```\n\
  \n让我们花点时间切换到 `UFOAchievementViewController` 的实现文件。首先，添加一个方法来确保视图正确设置为横向。添加以下方法：\n\
  \n```\n-(BOOL) shouldAutorotateToInterfaceOrientation:\n    (UIInterfaceOrientation)interfaceOrientation\n\
  {\n    if (UIInterfaceOrientationIsLandscape(interfaceOrientation)) return YES;\n\
  \    return NO;\n}\n```\n\n我们还需要一个关闭操作，因此也添加该方法：\n\n```\n- (IBAction)dismissAction\n\
  {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n如果你现在运行应用，应该会看到一个简单朴素的表格视图，类似于图\
  \ 4-13 所示。此外，关闭按钮现在应该可以工作了。\n\n![A978-1-4302-4906-1_4_Fig13_HTML.jpg](img/A978-1-4302-4906-1_4_Fig13_HTML.jpg)\n\
  \n**图 4-13.** 我们将用于自定义成就的空白自定义表格\n```\n\n\n### 获取成就数据\n\n在继续处理 `UFOAchievementViewController`\
  \ 之前，我们需要先回到 `GameCenterManager` 类中。将以下方法作为可选协议添加到 `GameCenterManagerDelegate`：\n\
  \n`- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError\
  \ *)error;`\n\n然后在 `GameCenterManager` 的实现中添加以下新方法：\n\n```\n- (void)retrieveAchievementMetadata\n\
  {\n    [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
  \     ^(NSArray *descriptions, NSError *error) {\n         [self callDelegateOnMainThread:@selector\n\
  \          (achievementDescriptionsLoaded:error:) withArg:descriptions error:error];\n\
  \     }];\n}\n```\n\n该方法会返回 Game Center 服务器上找到的所有 `GKAchievementDescription`。现在我们可以回到\
  \ `UFOAchievementViewController` 类中，完成自定义成就表格的实现。\n\n> **重要说明：**  \n> `retrieveAchievementMetadata`\
  \ 方法也会返回隐藏的成就。如果希望向用户隐藏这些成就，你需要将它们从结果中过滤掉。\n\n修改 `UFOAchievementViewController`\
  \ 的 `viewWillAppear:` 方法，使其与以下代码一致：\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [[self gcManager] setDelegate:self];\n    [super viewWillAppear: YES];\n\
  \    [[self gcManager] retrieveAchievementMetadata];\n}\n```\n\n此外，添加我们之前创建的新协议方法。如果没有遇到任何错误，我们只需将返回的描述数组赋值给本地数组。获取到新数据后，我们还需要刷新表格以向用户展示数据。代码如下：\n\
  \n```\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError\
  \ *)error;\n{\n    if (error == nil)\n    {\n        [self setAchievementArray:descriptions];\n\
  \    }\n    else\n    {\n        NSLog(@\"获取成就描述时发生错误: %@\",\n              [error\
  \ localizedDescription]);\n    }\n    [achievementTableView reloadData];\n}\n```\n\
  \n对于 `numberOfRowsInSection` 方法，我们直接返回 `achievementArray` 的计数，如下所示：\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [[self achievementArray]\
  \ count];\n}\n```\n\n我们还需要实现 `cellForRowAtIndexPath` 方法。将以下方法也添加到实现中。添加完成后，我们将对其详细分析。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                      reuseIdentifier:CellIdentifier] autorelease];\n\
  \        [cell setSelectionStyle:UITableViewCellSelectionStyleNone];\n    }\n  \
  \  \n    GKAchievementDescription *achievementDescription = [[self achievementArray]\n\
  \                                                        objectAtIndex:[indexPath\
  \ row]];\n    [[cell textLabel] setText:[achievementDescription title]];\n    if\
  \ ([achievementDescription image] == nil)\n    {\n        [[cell imageView] setImage:[GKAchievementDescription\n\
  \                                    placeholderCompletedAchievementImage]];\n \
  \       [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,\n\
  \                                                                 NSError *error)\
  \ {\n            if (error == nil)\n            {\n                [[cell imageView]\
  \ setImage:image];\n            }\n        }];\n    }\n    else\n    {\n       \
  \ [[cell imageView] setImage:[achievementDescription image]];\n    }\n    return\
  \ cell;\n}\n```\n\n该方法前半部分相当标准：要么创建一个新的表格单元格，要么从可重用集合中获取一个。这里我们使用默认的内置表格单元格来节省时间。我们创建一个新的\
  \ `GKAchievementDescription`，并根据 `achievementArray` 的行号填充数据。\n\n我们处理的第一个属性是标题，用它来设置单元格的\
  \ `textLabel`。在大多数情况下，你可能还需要使用 `achievedDescription` 或 `unachievedDescription`。为了简化，这里我们只使用标题。接下来，我们需要为成就设置图片。这部分稍微复杂一些。\n\
  \n`GKAchievementDescription` 有一个相关的图片属性，在填充之前该属性为 `nil`。首先检查该属性是否已被填充，只需一个简单的 nil\
  \ 检查即可完成。如果已填充，我们将单元格图片设置为已缓存的那张。如果未填充，则需要从 Game Center 服务器加载图片。为此，我们在 `GKAchievementDescription`\
  \ 对象上调用 `loadImageWithCompletionHandler`。该方法会返回已获得的图片。请注意，我们使用了默认的占位图片，可以通过 `GKAchievementDescription`\
  \ 的类方法访问该图片。\n\n> **提示：**  \n> 在 `UITableViewCellSytleDefault` 单元格中设置图片时，不要将图片设为\
  \ `nil`。否则会导致单元格文本左对齐并移除图片视图。如果此时通过 block 加载图片，图片在单元格或表格重新加载之前都不会显示。这就是我们先设置占位图片的原因。\n\
  \n如果现在运行应用并查看自定义成就视图，它应该类似于图 4-14 所示。\n\n![A978-1-4302-4906-1_4_Fig14_HTML.jpg](img/A978-1-4302-4906-1_4_Fig14_HTML.jpg)\n\
  \n**图 4-14.** 自定义 GUI 中展示的成就数据\n\n目前我们只能看到成就列表及其关联图片，但无法查看用户解锁成就的进度。回想一下，本章前面我们编写了几个便捷方法，在这里会很有用。有两个方法可以返回成就的进度：`percentageCompleteOfAchievementWithIdentifier:`\
  \ 和 `achievementWithIdentifierIsComplete`。此外，如果需要访问整个 `GKAchievement` 对象，可以使用 `achievementForIdentifier`。接下来我们使用\
  \ `percentageCompleteOfAchievementWithIdentifier:` 来显示完成百分比。修改 `cellForRowAtIndexPath:`\
  \ 中设置单元格文本标签的代码段。新的代码段应如下所示：\n\n```\nNSString *percentageCompleteString = [NSString\
  \ stringWithFormat: @\" %.0f%% 完成\",\n                                      [[self\
  \ gcManager] percentageCompleteOfAchievementWithIdentifier:\n                  \
  \                     [achievementDescription identifier]]];\n[[cell textLabel]\
  \ setText:[[achievementDescription title]\n                           stringByAppendingString:percentageCompleteString]];\n\
  ```\n\n再次运行游戏，你会发现输出信息更加实用，如图 4-15 所示。\n\n![A978-1-4302-4906-1_4_Fig15_HTML.jpg](img/A978-1-4302-4906-1_4_Fig15_HTML.jpg)\n\
  \n**图 4-15.** 带有完成百分比的自定义 GUI 成就显示\n\n\n\n## 从提交失败中恢复\n\n开发者全权负责处理成就提交失败的情况。你绝不能让用户丢失任何成就进度。丢失成就对用户来说是非常令人沮丧的，应不惜一切代价避免。为防止这种情况，可以采取与处理分数失败时相同的方法。主要区别在于无需存储`GKAchievement`对象，因为它不包含任何日期信息或时效性信息。我们只需存储`percentageComplete`值。我们将创建一个新方法来处理此行为。将以下方法添加到`GameCenterManager`类中。\n\
  \n```\n-(void)storeAchievementToSubmitLater:(GKAchievement *)achievement\n\n{\n\n\
  NSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]\ninitWithArray:[[NSUserDefaults\
  \ standardUserDefaults]\nobjectForKey:@\"savedAchievements\"]];\nif ([achievementDictionary\
  \ objectForKey:[achievement identifier]] == nil)\n\n{\n\n[achievementDictionary\
  \ setObject:[NSNumber numberWithDouble:[achievement\npercentComplete]] forKey:[achievement\
  \ identifier]];\n\n}\n\nelse\n\n{\n\ndouble storedProgress = [[achievementDictionary\
  \ objectForKey:\nachievement.identifier] doubleValue];\nif ([achievement percentComplete]\
  \ > storedProgress)\n\n{\n\n[achievementDictionary setObject:[NSNumber\nnumberWithDouble:[achievement\
  \ percentComplete]]\nforKey:[achievement identifier]];\n\n}\n\n}\n\n[[NSUserDefaults\
  \ standardUserDefaults] setObject:achievementDictionary\nforKey:@\"savedAchievements\"\
  ];\n[achievementDictionary release];\n\n}\n```\n\n此方法将一个成就作为参数，并验证该成就是否已作为引用存储在我们未能成功提交的成就集合中。如果提交失败，则需要查看哪个成就的进度更靠前，以避免出现删除用户进度的情况。完成后，我们将它作为字典存储到`userDefaults`中，使用标识符作为键，完成百分比作为值。我们在`submitAchievement:PercentComplete:`方法的错误处理中调用此方法。相关代码片段如下所示：\n\
  \n```\nif (achievement!= NULL)\n\n{\n\n[achievement reportAchievementWithCompletionHandler:\
  \ ^(NSError *error) {\nif (error != nil)\n\n{\n\n[self storeAchievementToSubmitLater:\
  \ achievement];\n\n}\nif (percentComplete >= 100)\n\n{\n\n[GKAchievementDescription\n\
  loadAchievementDescriptionsWithCompletionHandler:\n^(NSArray *descriptions, NSError\
  \ *error) {\nfor (GKAchievementDescription *achievementDescription in descriptions)\n\
  \n{\n\nif (![[achievement identifier]\nisEqualToString:[achievementDescription\n\
  identifier]]) continue;\n[self callDelegateOnMainThread:\n@selector(achievementEarned:)\n\
  withArg:achievementDescription error:nil];\n\n}\n\n}];\n\n}\n[self callDelegateOnMainThread:\
  \ @selector(achievementSubmitted:error:)\nwithArg: achievement error: error];\n\n\
  }];\n\n}\n```\n\n**提示**\n\n建议通知用户，他们的成就当前无法提交，但已保存并稍后将重新提交。这能让用户知道任何进度都没有丢失。\n\n\
  我们还需要一个新方法，用于检查是否有未提交的成就进度。至于何时调用此方法最佳，并没有标准答案。通常可以在用户通过 Game Center 认证后调用它，但你可能还想从其他方法中调用它，例如每当网络可达性状态更新时。将以下方法添加到你的`GameCenterManager`类中。\n\
  \n```\n- (void)submitAllSavedAchievements\n\n{\n\nNSMutableDictionary *achievementDictionary\
  \ = [[NSMutableDictionary alloc]\ninitWithArray:[[NSUserDefaults standardUserDefaults]\n\
  objectForKey:@\"savedAchievements\"]];\nNSArray *keys = [achievementDictionary allKeys];\n\
  for (int x = 0; x < [keys count]; x++)\n\n{\n\n[self submitAchievement:[keys objectAtIndex:x]\
  \ percentComplete:\n[[achievementDictionary objectForKey:[keys objectAtIndex:x]]\
  \ doubleValue]];\n[[NSUserDefaults standardUserDefaults] removeObjectForKey:[keys\n\
  objectAtIndex:x]];\n\n}\n[achievementDictionary release];\n\n}\n```\n\n此方法加载未提交进度的副本，并遍历每个项目，尝试逐一重新提交。如果再次提交失败，它们将被重新添加回已保存的数据中。\n\
  \n## 成就挑战\n\n随着 iOS 6 的推出，成就现在可以作为挑战发送给 Game Center 好友。如果你的应用使用 Apple 提供的标准界面，则无需做任何更改即可为用户提供成就挑战功能。\n\
  \n如果你正在开发的应用使用自定义成就界面，或者你更倾向于启用编程式挑战，则可以使用以下代码片段来实现：\n\n```\n[(GKAchievement *)achievement\
  \ issueChallengeToPlayers: (NSArray *)players message:@\"Think you can earn this\
  \ achievement!?\"];\n```\n\n你可能还想获取所有可以发送当前成就挑战的玩家列表。以下代码将接收一个玩家 ID 数组（例如你的好友列表），并返回一个可以接受挑战的玩家列表。如果你的应用阻止用户接受已完成的成就挑战，这将非常有用。\n\
  \n```\n[achievement selectChallengeablePlayerIDs: arrayOfPlayersToCheck withCompletionHandler:^(NSArray\
  \ *challengeablePlayerIDs, NSError *error)\n\n{\n\n     if(error != nil)\n\n   \
  \  {\n\n                       NSLog(@\"An error occurred while retrieving a list\
  \ of\n        challengeable players: %@\", [error\n        localizedDescription]);\n\
  \n     }\n     NSLog(@\"The following players can be challenged: %@\",      challengeablePlayerIDs);\n\
  \n}];\n```\n\n**注意**\n\n为了让用户能够接受他们已经完成的成就挑战，需要在 iTunes Connect 中为每个成就勾选“可多次达成”选项。\n\
  \n还可以使用以下代码片段获取已验证用户所有待处理的`GKChallenge`项目数组：\n\n```\n[GKChallenge loadReceivedChallengesWithCompletionHandler:^(NSArray\
  \ *challenges, NSError *error)\n\n{\n\n     if (error != nil)\n\n     {\n\n    \
  \      NSLog(@\"An error occurred: %@\", [error localizedDescription]);\n\n    \
  \ }\n\n     else\n\n     {\n\n          NSLog(@\"Challenges: %@\", challenges);\n\
  \n     }\n\n}];\n```\n\n每个挑战都有一个关联的状态，例如已完成、已作废、已拒绝或待处理。可以通过以下方式轮询这些状态：\n\n```\n\
  if(challenge.state == GKChallengeStateCompleted)\n     NSLog(@\"Challenge Completed\"\
  );\n```\n\n最后，也可以通过简单地对其调用`decline`来拒绝传入的挑战，如下所示：\n\n```\n[challenge decline];\n\
  ```\n\n## 总结\n\n现在，你已拥有所有必要的工具，可以为你的 Game Center 应用添加丰富且复杂的成就系统。你了解了添加成就的价值，以及如何在\
  \ iTunes Connect 门户中设置和配置它们。我们讨论了使用 Apple 默认成就图形界面和你自定义图形界面的优缺点。现在，你已知道如何扩展`GameCenterManager`类，以便在其中统一发布成就进度、获取成就反馈和重置成就进度。\n\
  \n你在本章中完成的最重要一步是扩展了可重用的`GameCenterManager`类，这使得你在未来的项目中可以轻松地添加成就功能。在下一章中，我们将探索 Game\
  \ Center 的配对和邀请系统，以便你能够添加多人游戏功能和其他网络特性。\n\n\n\n"
- "# 5. 匹配与邀请\n\n## 摘要\n\n谨慎选择你的敌人，因为他们将定义你。\n\n> ——U2 乐队，《黎巴嫩的雪松》\n\n从本章开始，并贯穿后续几章，我们将讨论如何将\
  \ Game Center 以及后来的 Game Kit 联网功能添加到你的应用或游戏中。在现代，为应用添加联网能力几乎被视为一项必备技术。添加联网支持的过程通常始于寻找可连接的对象。如今，几乎所有现代软件都包含某种联网组件，无论是与在线服务通信以检索或发布信息，还是直接与对等设备通信以交换数据。\n\
  \n在接下来的章节中，我们将讨论与其他对等设备的通信，尽管并非我们所有的联网配置都是点对点的（关于网络设计的详细信息，请参见第 7 章）。\n\n尤其是本章，将探讨如何利用\
  \ Game Center 的邀请系统，使用 Game Center 来查找和邀请对等方进入你的应用。\n\nGame Center 为你提供了一个被严重低估的销售和分发工具，而你处理邀请的开销却非常小。当邀请非本地用户在你的游戏或应用中开始多人体验时，你可以选择邀请任何一位\
  \ Game Center 好友。如果你邀请的好友当前未安装此应用，系统会提示他们立即购买应用并开始游戏。在 iPhone 上，没有其他方法能以此种方式向其他用户发送“立即购买”链接。此功能为发展你的用户群提供了一条绝佳途径——只需让你的用户为你销售即可。\n\
  \n除了“立即购买”链接，Game Center 还允许用户直接从 Game Center 界面内为你的应用评分，并且自 iOS 6 起，它提供了通过 Twitter\
  \ 和 Facebook 分享你的应用的功能。单凭这些特性，就足以成为添加 Game Center 的有力理由，甚至无需涉及其提供的强大联网能力。\n\n##\
  \ 为什么要为你的应用添加联网功能？\n\n看看近年任何一年销量前十的 PC 或主机游戏列表，你会发现其中绝大多数都是非常注重多人互动体验的游戏。让我们快速浏览一下\
  \ 2012 年销量最高的 PC 游戏《使命召唤：黑色行动 2》。虽然这款游戏确实有单人模式，但它更像是游戏的一种附加功能，而非主要卖点。其重点显然在于多人游戏，甚至不惜牺牲单人战役。从《字母拼图》到《部落冲突》，多人在线\
  \ iOS 游戏已经开始站稳脚跟。近年来，行业的焦点已从制作丰富、深刻的单人战役，转向将更多精力投入到多人模式上。对于这种新现象，有一个完全合理的解释：在多人模式上投入能获得更高的性价比。\n\
  \n人类天生是社会性生物。我们渴望社交互动以促进健康的心理发展。电子游戏和其他社交软件正日益成为这种互动的出口。无论你是否同意这种说法背后的道理，但事实是多人游戏正变得越来越流行。无论是大型多人在线角色扮演游戏，还是你常见的、种类繁多的第一人称射击游戏，软件用户都越来越喜欢多人互动。\n\
  \n为你的游戏增加多人元素可以将用户的游戏时间延长百倍。如果需要证据，看看 1999 年发布的《雷神之锤 3》或《虚幻竞技场》，它们在发布后的许多年里仍有用户登录。如果这些游戏只专注于单人模式，它们很可能不会有如此忠实的粉丝群。下面列出了一些其他理由，说明为什么通过\
  \ Game Center 添加匹配和邀请功能对你的产品来说应该是一个简单的商业决策：\n\n-   为游戏添加多人组件是提升游戏品质的好方法。取决于你正在制作的游戏类型，添加多人元素可能只需要很少的额外工作。\n\
  -   用户已经期望 App Store 上一流的游戏具备多人模式。\n-   如果你拥有制作精良的多人组件，就可以为你的应用定出更高的价格。\n-   没有什么比自动购买邀请系统更能让用户即时下载你的应用了。如果你能让潜在用户处于被邀请玩游戏并能立即购买的情景中，你完成销售的机会将大得多。\n\
  -   如果你正在使用广告支持系统，增加应用或游戏中的游戏时间或使用时间，将带来更多收入。如果你销售的是付费应用，用户会觉得他们的钱花得更值。\n-   人类喜欢竞争，所以鼓励你的用户去做他们喜欢的事。多人模式或许不适合所有人，但对许多人来说，他们在选购新游戏时只对此感兴趣。\n\
  -   多人模式也可能为未来的应用内购买打开大门，从而增加收入和盈利能力。\n\n> **提示：** 只要可能，也请为你的游戏用户提供单人游戏选项，因为仍然存在一个相当可观的、偏爱单人战役的用户群。此外，有些玩家可能并非时刻都能连接到互联网。\n\
  \n\n\n## 通用匹配场景\n\n在开始处理匹配和邀请本身之前，理解在 iOS 应用或游戏中实现多人网络功能时可能遇到的一些场景至关重要。\n\n*   第一个，也是最常见的场景是：一个已经在你的应用中的玩家想要创建一个自动匹配的游戏。所有玩家都已经安装并加载了该应用，并且处于预期要开始网络会话的状态。被邀请的玩家会收到一个通知，询问他/她是否想要加入与邀请者的游戏。当双方都同意时，匹配\
  \ GUI 将被关闭，并创建一个新的匹配。\n*   另一个常见场景是：用户创建一个新的匹配事件，并邀请其 Game Center 好友列表中的其他玩家。被邀请的好友会收到一个推送通知，告知他们被邀请加入一个游戏。如果这些好友已经安装了游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入匹配，游戏就会开始。如果他们尚未安装该游戏，系统将提示他们安装，并且在成功安装后游戏将自动启动。\n\
  *   如果好友被邀请，但他们尚未安装应用并决定安装，则会发生略有不同的事件流程。安装过程结束后，应用将自动启动，然后你可以继续匹配事件的正常流程。\n*  \
  \ 玩家可以直接在 Game Center 应用中创建一个新的匹配事件。在这种场景下，所有玩家都会被启动到应用中，并收到加入匹配的邀请。这种情况最好的部分是：如果你的应用已经支持邀请，你无需编写任何额外的代码来支持此场景。\n\
  *   玩家也可以邀请一个或多个好友，并使用自动匹配器填充剩余的空位。这是前两种场景的混合，如果已经添加了对这两种场景的支持，那么你无需为此场景进行额外的编程。\n\
  *   你可能会遇到的最后一个场景（可选）是以编程方式自动匹配玩家。在这种情况下，请求会发送到 Game Center 服务器，然后匹配结果会返回给你。玩家不会看到任何标准\
  \ GUI，你可以选择实现自己的界面。\n\n注意：匹配基于应用的 `bundle ID`；如果应用的 `bundle ID` 不匹配，则无法通过匹配系统进行通信。\n\
  \n### 创建新的匹配请求\n\n要创建新的匹配，你首先需要创建一个新的 `GKMatchRequest` 对象。该对象代表了你将要创建的新匹配的所需参数。`GKMatchRequest`\
  \ 既用于显示 GUI，也用于以编程方式创建匹配。当你使用 GUI 时，你会将 `GKMatchRequest` 对象传递给 `GKMatchmakerViewController`\
  \ 的新实例；另一方面，如果你以编程方式处理匹配，你会将该对象传递给 `GKMatchmaker` 的实例。有关程序化匹配交互的更多详细信息，请参阅后续章节。现在，让我们专注于如何在代码中创建一个新的匹配请求。请看下面的代码片段：\n\
  \n```\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\nrequest.minPlayers\
  \ = 2;\nrequest.maxPlayers = 2;\n```\n\n这个例子是演示如何创建新匹配的最简单方式。你必须同时指定最大和最小玩家数量。在这个例子中，我们创建了一个正好需要两名玩家的新请求。\n\
  \n`GKMatchRequest` 还有一个名为 `playersToInvite` 的属性，你可以使用 `GKPlayer` 标识符数组来自动填充到一个新的匹配中。这在连续进行多个游戏并且希望保持相同玩家组时非常有用。当你的应用从\
  \ Game Center 应用启动时，该属性也会被预填充为邀请你进入应用的玩家。\n\n注意：当接受与好友的匹配邀请时，该事件由 Game Center 应用处理，并且\
  \ `playersToInvite` 属性将被填充。\n\n`GKMatchRequest` 还有另外两个属性：`playerAttributes` 和 `playerGroup`，你将在本章后面的部分中使用它们。这两个属性将在同名的章节中详细讨论。\n\
  \n注意：如果你使用 Game Center 作为托管游戏的服务器，你最多只能有四名玩家。但是，如果你实现了自己的服务器（如本章“使用你自己的服务器”部分所述），则可以邀请最多\
  \ 16 名玩家。\n\n\n\n### 呈现匹配界面\n\n我们首先从使用 Apple 提供的标准匹配界面开始。首先添加一个新按钮，用于在我们的测试游戏主屏幕上呈现该视图。我还提前将旧的“开始游戏”按钮重命名为“单人游戏”，并创建了一个名为“多人游戏”的新按钮（见图\
  \ 5-1）。我们将使用 `UFOViewController` 作为匹配行为的委托，因此需要让该视图控制器遵循 `GKMatchmakerViewControllerDelegate`\
  \ 协议。此外，将刚刚添加的多人游戏按钮的操作方法修改为以下代码：\n\n```\n- (IBAction)multiplayerButtonPressed;\n\
  \n{\n\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\n\nrequest.minPlayers\
  \ = 2;\n\nrequest.maxPlayers = 2;\n\nGKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
  \ alloc] initWithMatchRequest:request];\n\nmmvc.matchmakerDelegate = self;\n\n[request\
  \ release];\n\n[self presentModalViewController:mmvc animated:YES];\n\n[mmvc release];\n\
  \n}\n```\n\n![A978-1-4302-4906-1_5_Fig1_HTML.jpg](img/A978-1-4302-4906-1_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 在 `UFOViewController.xib` 中添加一个新的多人游戏按钮\n\n我们创建了一个新的 `GKMatchRequest` 实例，正如上一节所做的那样。我们的演示游戏将正好包含两名玩家，因此我们将最大和最小玩家数都设置为\
  \ 2。\n\n在代码片段的下一部分，我们创建了一个新的 `GKMatchViewController` 实例，并使用刚创建的 `GKMatchRequest`\
  \ 对其进行分配和初始化。我们还将委托设置为我们的 `UFOViewController` 类。完成后，我们像呈现其他任何模态视图一样呈现它。你应该会看到类似图\
  \ 5-2 的输出。\n\n![A978-1-4302-4906-1_5_Fig2_HTML.jpg](img/A978-1-4302-4906-1_5_Fig2_HTML.jpg)\n\
  \n图 5-2. `MatchmakerViewController` 创建包含两名玩家的新匹配界面\n\n如果你还没有这样做，现在正是为沙盒 Game Center\
  \ 账户填充好友列表的好时机。在这个过程中，手头有几个未使用的电子邮件地址会很有帮助，因为你不想使用之前与 iTunes Connect 或 Game Center\
  \ 关联过的任何电子邮件地址。一旦你添加了一两个好友，就可以继续点击图 5-2 中显示的“邀请好友”按钮。假设你已经完成了前面的步骤，系统将自动为你提供自动匹配功能。\n\
  \n**提醒**：在创建沙盒账户时，不要使用你之前在 iTunes Connect 或 Game Center 中使用过的任何电子邮件地址，否则可能会导致奇怪且意外的行为。\n\
  \n你现在应该能看到你的好友列表，并能够邀请他们进入你的应用，如图 5-3 所示。\n\n![A978-1-4302-4906-1_5_Fig3_HTML.jpg](img/A978-1-4302-4906-1_5_Fig3_HTML.jpg)\n\
  \n图 5-3. 从你的 Game Center 好友列表中邀请一位好友\n\n在继续之前，我们需要实现 `GKMatchmakerViewController`\
  \ 的必需委托方法。具体来说，我们需要实现以下三个方法才能继续处理匹配：\n\n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController\
  \ *)viewController\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
  }\n\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
  \ didFailWithError:(NSError *)error\n{\n    [self dismissViewControllerAnimated:YES\
  \ completion:NULL];\n    if (error != nil)\n    {\n        NSString *message = [NSString\
  \ stringWithFormat:@\"An error occurred: %@\", [error localizedDescription]];\n\
  \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\"\n       \
  \                                                 message:message\n            \
  \                                           delegate:nil\n                     \
  \                         cancelButtonTitle:@\"Dismiss\"\n                     \
  \                         otherButtonTitles:nil];\n        [alert show];\n     \
  \   [alert release];\n    }\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
  \ *)viewController didFindMatch:(GKMatch *)match\n{\n    [self dismissViewControllerAnimated:YES\
  \ completion:NULL];\n}\n```\n\n前两个方法处理用户取消和失败的情况，而第三个方法处理成功的情况。最后一个方法在成功时会返回一个 `GKMatch`\
  \ 对象；我们将在后续章节中使用该对象来开始一场新的比赛。\n\n当每场比赛允许的玩家数量可变时，用户将可以选择在匹配视图控制器中添加或移除玩家槽位，如图 5-4\
  \ 所示。\n\n![A978-1-4302-4906-1_5_Fig4_HTML.jpg](img/A978-1-4302-4906-1_5_Fig4_HTML.jpg)\n\
  \n图 5-4. 具有可变玩家数量的匹配界面\n\n在邀请好友加入 Game Center 比赛时，你可以选择附带一条简短消息显示在邀请中，如图 5-5 所示。\n\
  \n![A978-1-4302-4906-1_5_Fig5_HTML.jpg](img/A978-1-4302-4906-1_5_Fig5_HTML.jpg)\n\
  \n图 5-5. 向好友发送邀请消息，请求他们与你开始一场比赛。此消息将作为推送通知发送，并在受邀者的设备上显示为一条传入的文本消息，如图 5-6 所示\n\n\
  \n\n### 处理收到的邀请\n\n在为你的应用实现匹配功能时，你还必须实现一个处理来自好友邀请的系统。被邀请者的设备将收到一条推送通知，告知他们有好友邀请他们玩游戏。假设他们已安装该游戏并接受邀请，你需要处理如何通过一场新的比赛将两位玩家连接起来。如果被邀请者未安装该游戏或应用，系统会引导他们进行下载。下载完成后，将按照正常的邀请流程进行处理。\n\
  \n> **注意**\n>\n> 你还需要处理来自 `Game Center.app` 中创建的新比赛的邀请。你可能不需要编写任何额外的代码；但是，你确实需要彻底测试这个交互路径。\n\
  \n我们将使用邀请处理器来处理邀请（特别感谢苹果公司提供的命名）。邀请处理器接受两个参数；根据你处理的邀请类型，这两个参数中只有一个会是非空值。\n\n-  \
  \ 当应用收到来自 Game Center 好友的邀请时，`acceptInvite` 参数为非空值。邀请你的玩家已经创建了比赛请求，因此你的应用在接接受邀请时无需自己创建。\n\
  -   `playersToInvite` 参数，我们在本章前面讨论过，当 `Game Center.app` 启动你的应用时，该参数为非空值。该属性包含一个玩家标识符数组，用于使用新的\
  \ `GKMatchRequest` 邀请这些玩家。当 `playersToInvite` 属性为非空值时，你需要创建一个新的 `GKMatchRequest`，并用你在这里收到的玩家填充它。\n\
  \n> **重要**\n>\n> 在处理沙盒模式与邀请时，可能会遇到一些古怪的情况。如果你发现自己始终收不到邀请的推送通知，请在两个设备上都打开该应用，并让双方互相邀请对方一次。完成此操作后，即可恢复从主屏幕测试邀请的功能。\n\
  \n现在我们已经了解了需要处理的参数类型，以及会遇到的各种场景，我们可以开始编写一个新的邀请处理器了。`GKMatchmaker` 有一个名为 `sharedMatchmaker`\
  \ 的单例方法，它接受一个 `inviteHandler` 属性。我们在此使用一个 block 来设置和处理接收到的邀请。为了保持简洁清晰，我们将邀请处理器封装在\
  \ `GameCenterManager` 类自身的一个方法中。将以下新方法添加到 `GameCenterManager` 中：\n\n```\n- (void)setupInvitationHandler:(id)inivationHandler;\n\
  \n{\n\n[GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,É\n\
  \nNSArray *playersToInvite)\n\n{\n\nGKMatchmakerViewController *mmvc = nil;\n\n\
  if (acceptedInvite) {\n\nmmvc = [[GKMatchmakerViewController alloc] initWithInvite:acceptedInvite];\n\
  \n} else if (playersToInvite) {\n\nGKMatchRequest *request = [[GKMatchRequest alloc]\
  \ init];\n\nrequest.minPlayers = 2;\n\nrequest.maxPlayers = 2;\n\nrequest.playersToInvite\
  \ = playersToInvite;\n\nmmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];\n\
  \n[request release];\n\n}\n\nmmvc.matchmakerDelegate = inivationHandler;\n\n[inivationHandler\
  \ presentViewController:mmvc animated:YES completion:NULL];\n\n[mmvc release];\n\
  \n};\n\n}\n```\n\n让我们分解这个方法，看看每一步具体发生了什么。我们做的第一件事是向 `shareMatchmaker` 单例的 `inviteHandler`\
  \ 属性设置一个 block。当这个 block 被执行时（这发生在用户接受邀请时），我们有两种可能的结果。\n\n第一种情况是 `acceptedInvite`\
  \ 不为 nil。在这种情况下，我们创建一个新的 `GKMatchmakerViewController` 实例，并用被接受的邀请对其进行初始化。然后我们向用户展示这个视图控制器。\n\
  \n在第二种情况下，`playersToInvite` 为非空值。此时，我们需要创建一个新的 `GKMatchRequest` 实例。在我们的示例游戏中，我们只允许最多两名玩家，但你应该将其设置为你游戏中允许的最大玩家数量。我们将请求的\
  \ `playersToInvite` 属性设置为从 block 传入的玩家 ID 数组。创建完新的请求对象后，我们可以创建一个 `GKMatchmakerViewController`\
  \ 来向用户展示相关信息。他们将看到标准的匹配视图，并且玩家列表已预先填充。\n\n> **重要**\n>\n> 在你通过 Game Center 认证本地用户之前，你无法正式接受或以其他方式处理邀请。因此，在成功认证后尽快注册一个邀请处理器非常重要。\n\
  \n因为我们希望在与 Game Center 认证成功后尽快调用此方法，所以在成功认证后添加对新的 `setupInvitationHandler:` 方法的调用。修改\
  \ `UFOViewController` 中的 `processGameCenterAuthentication` 方法，使其与以下代码一致：\n\n```\n\
  - (void)processGameCenterAuthentication:(NSError*)error;\n\n{\n\nif (error != nil)\
  \ {\n\nNSLog(@\"An error occured during authentication: %@\",É\n\n[error localizedDescription]);\n\
  \n} else {\n\n[gcManager setupInvitationHandler:self];\n\n}\n\n}\n```\n\n> **提示**\n\
  >\n> 如果你没有两台设备来测试邀请，你可以使用模拟器作为其中一台设备。别忘了使用两个不同的 Game Center 账户登录模拟器和你的设备，否则你们将无法互相邀请。\n\
  \n我们将使用 `self`（即 `UFOViewController`）作为邀请处理器的代理。如果你在上一节“呈现比赛 GUI”中完成了所需的代理调用，则无需对此类进行任何额外修改。\n\
  \n恭喜！你现在可以处理进入你应用的邀请了（参见图 5-6）。在下一节中，我们将探讨如何配置自动匹配功能，以便为你自动填充受邀者。\n\n> **注意**\n\
  >\n> 邀请的“立即购买”功能无法在沙盒环境中测试；它只能用于正式版应用。为了在沙盒中测试邀请，每个测试设备都必须安装此应用。\n\n![A978-1-4302-4906-1_5_Fig6_HTML.jpg](img/A978-1-4302-4906-1_5_Fig6_HTML.jpg)\n\
  \n**图 5-6.** 在你的应用外部收到邀请。你的应用名称会自动填入提示视图中。在邀请时，你可以选择指定一条消息，如前文图 5-5 所示。\n\n## 自动匹配\n\
  \n自动匹配是 Game Center 提供的一项优秀功能，无需你付出额外努力。Game Center 维护着一个在线队列，里面是正在等待加入你应用中多人游戏的玩家。如果你没有用所有已邀请的好友填满一个新的比赛请求，自动匹配功能将自动用其他在线的未匹配玩家填充剩余的空位。\n\
  \n你可以使用玩家组和玩家属性来筛选自动匹配的结果，这两者都将在本章后面讨论。此外，你可以查询任何活跃玩家组的活动情况，以了解匹配到新比赛的平均等待时间；这也会在后面的章节中进一步讨论。\n\
  \n\n\n## 以编程方式进行匹配\n\n你的应用也可以在不使用匹配界面接口的情况下，以编程方式查找匹配。你可以使用这种方法来实现自己的自定义匹配 GUI，或创建一种“立即匹配”类型的操作，在这种操作中，用户会被自动配对，然后在无需额外用户交互的情况下开始游戏。在我们的演示应用中不会使用这种匹配风格，但下面的方法将允许你以编程方式实现匹配：\n\
  \n```\n- (void)findProgrammaticMatch\n{\n    GKMatchRequest *request = [[GKMatchRequest\
  \ alloc] init];\n    request.minPlayers = 2;\n    request.maxPlayers = 4;\n    [[GKMatchmaker\
  \ sharedMatchmaker] findMatchForRequest:request withCompletionHandler:^(GKMatch\
  \ *match, NSError *error) {\n        if (error) {\n            NSLog(@\"在寻找匹配时发生错误:\
  \ %@\", [error localizedDescription]);\n        } else if (match != nil) {\n   \
  \         NSLog(@\"已找到匹配: %@\", match);\n        }\n    }];\n    [request release];\n\
  }\n```\n\n上述代码相当直接明了。我们创建了一个新的 `GKMatchRequest`，并将最小玩家数设为 2，最大玩家数设为 4。然后我们调用了一个新方法\
  \ `findMatchesForRequest`。当找到匹配时，该方法会调用我们的代码块，因此如果匹配没有快速返回，提供一个活动指示器可能是个好主意。在你获得一个\
  \ `GKMatch` 之后，就可以开始一场新的多人游戏，正如后续章节所述。\n\n在使用以编程方式添加的匹配时，如果匹配耗时过长或用户改变了主意，允许用户取消匹配请求是很重要的。该操作可以通过以下代码行完成：\n\
  \n```\n[[GKMatchmaker sharedMatchmaker] cancel];\n```\n\n## 向匹配中添加玩家\n\n有时你可能希望在匹配创建后向其中添加新玩家。例如，也许有玩家退出游戏，而你希望在不重新开始游戏的情况下替换他；或者某个玩家在游戏开始后无法连接，你想用替补替代他。以下方法将使用自动匹配行为自动向匹配中添加新玩家：\n\
  \n```\n- (void)addPlayerToMatch:(GKMatch *)match withRequest:(GKMatchRequest *)request\n\
  {\n    [[GKMatchmaker sharedMatchmaker] addPlayersToMatch:match matchRequest:request\
  \ completionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
  在向匹配添加玩家时发生错误: %@\", [error localizedDescription]);\n        } else if (match !=\
  \ nil) {\n            NSLog(@\"已向匹配添加了一名玩家\");\n        }\n    }];\n}\n```\n\n在玩家被添加到匹配后，你需要将该玩家与当前匹配同步。添加玩家会使该玩家能够接收和发送数据，但他们无法访问任何已经通过匹配发送过的数据。\n\
  \n## 重新邀请玩家\n\n随着 iOS 5.0 的发布，Apple 增加了自动尝试重新邀请断开连接玩家的功能。此方法仅在两人 Game Center 匹配中受支持。当玩家断开连接时，会调用以下方法；Game\
  \ Center 将自动尝试重新连接该玩家。如果成功，你将收到对 `match:player:didChangeState:` 的额外调用。\n\n```\n\
  -(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString *)playerID\n{\n   \
  \ return YES;\n}\n```\n\n## 玩家分组\n\n玩家分组允许你为每个玩家指定不同的分类。默认情况下，Game Center 会将所有人自动匹配到同一个组中。通过玩家分组，你可以指定某些玩家正在寻找只包含该组其他玩家的游戏组。\n\
  \n例如，想要在某个地下城特定层级或特定赛道上游戏的玩家将被分组在一起，以便他们与其他想要在同一层级游玩的玩家配对。玩家分组可用于将玩家划分到多种不同类型的分组中，例如：\n\
  \n*   想要玩同一地图层级（例如赛道）、RPG 中的同一区域、第一人称射击游戏中的同一地图或动作游戏中同一关卡的玩家。\n*   根据技能水平区分玩家。要么让玩家选择他们希望游玩的技能水平，要么根据过往表现自动确定他们的技能水平。\n\
  *   正在进行的游戏类型。例如，玩家可以分为想玩夺旗、团队死斗、占领或单人求生模式的群体。\n*   希望一起游戏的同一部落、公会、团队或网络中的玩家。\n\
  *   已购买额外应用内内容，不能再与未购买者配对的玩家。\n\n玩家分组并不局限于这些项目，可以根据应用的需求以任何方式将玩家分组。玩家分组通过 `GKMatchRequest`\
  \ 上的 `playerGroup` 属性表示。此属性的唯一限制是必须使用 `NSUInteger` 来表示。指定 `playerGroup` 相当直接，如下例所示。\n\
  \n```\n#define kMyForestMap 123456789\n\nGKMatchRequest *request = [[GKMatchRequest\
  \ alloc] init];\nrequest.minPlayers = 2;\nrequest.maxPlayers = 4;\nrequest.playerGroup\
  \ = kMyForestMap;\n```\n\n在大多数情况下，你会希望让用户选择他们所属的 `playerGroup`；然而，也可能存在并非如此的情况，例如自动确定玩家的技能水平。\n\
  \n> **警告：** 在将 `playerGroup` 设置为任何非零值后，玩家将只与同组的其他玩家进行匹配。\n\n## 玩家属性\n\n与玩家分组类似，玩家属性在匹配过程中用于缩小用户可能遇到的可用游戏范围。玩家属性通常与玩家分组功能相似，但在某些方面处理方式不同。玩家属性的众多用途包括以下内容：\n\
  \n*   在角色扮演游戏中，角色通常会选择职业。通常需要多种职业的组合——比如治疗者、战士和法师——才能完成一个任务。\n*   体育游戏中，团队通常有各种位置，如守门员、后卫、中场和前锋。一个团队需要所有这些位置的组合才能进行比赛。\n\
  *   在潜艇模拟游戏中，你也可以有不同的玩家角色，如船长、声呐操作员、领航员和武器系统操作员。\n*   在第一人称射击游戏中，你需要玩家扮演诸如近距离格斗专家、狙击手、医护兵和排长等角色。\n\
  \n\n\n### 理解玩家属性限制\n\n`Player` 属性可用于为每位玩家分配这些值，从而让你能够平衡一支包含所需玩家的队伍。然而，自 iOS 7.0\
  \ 起，使用 `Player` 属性存在若干限制；在开始使用 `Player` 属性之前，理解这些限制非常重要。\n\n-   每个角色只能由一名玩家担任。例如，在一场足球比赛中，你不能要求有三名中场球员。\n\
  -   所有角色都必须被填充后，游戏才被视为准备就绪。例如，你不能在缺少狙击手的情况下开始一款第一人称射击游戏（基于前面的例子）。\n-   每位玩家一次只能担任一个角色；玩家不能以填充多个角色的方式加入游戏。例如，你不能让一位第一人称射击游戏中的玩家既愿意当狙击手又愿意当医护兵；在比赛请求最终确定之前，他们需要选择其中一个。\n\
  -   `Player` 属性在自动匹配期间会被使用。如果你邀请一位朋友加入游戏，系统不会检测他们是否匹配需要填充的角色。相反，他们会自动被分配一个随机角色。简而言之，朋友无法选择他们的\
  \ `Player` 属性。\n-   在标准匹配图形用户界面中，角色不会在任何地方显示。你需要在进入此视图之前实现自己的系统，以允许用户选择他们的角色。\n\
  -   `GKMatch` 对象不包含关于哪些玩家被分配了哪些角色的信息。你需要实现在比赛连接后自行确定谁扮演哪个角色的系统。\n-   没有现成的系统可以判断哪些角色需求过剩，或者哪些角色更难找到匹配。例如，在角色扮演游戏中，可能每个人都想玩法师，而没人想当治疗者；因此，法师要找到一个空位会困难得多，而治疗者则可以轻松找到。\n\
  \n### 使用玩家属性\n\n不要让这一长串限制吓退你使用 `Player` 属性。即使存在这些限制，它们对于创造更好的多人游戏体验仍然极具价值。让我们来看一个如何使用\
  \ `Player` 属性构建匹配的示例。\n\n```\n#define class_SquadLeader            0xFF000000\n\
  #define class_Breacher               0x00FF0000\n#define class_Grenadier       \
  \       0x0000FF00\n#define class_LightMachineGun        0x000000FF\n```\n\n我们首先为每个\
  \ `Player` 属性定义一个掩码，在本节后续内容中，我们将称其为“兵种”。这个示例代表了一款现代军事风格游戏中的标准战斗小队。每个兵种被分配了一个不同的掩码值。Game\
  \ Center 使用一种算法，根据以下规则来匹配这些玩家：\n\n-   匹配的掩码始终以邀请玩家的掩码开始。\n-   如果邀请玩家已设置了 `Player`\
  \ 属性掩码，Game Center 将忽略所有未设置 `Player` 属性掩码的玩家。\n-   只有当玩家的 `Player` 属性掩码与已邀请到比赛中的任何玩家的掩码的任何部分都不重叠时，该玩家才会被加入比赛。\n\
  -   在玩家加入比赛后，该玩家的属性值将通过逻辑或运算合并到比赛的掩码中。\n-   如果比赛的掩码值等于 `FFFFFFFF`，则认为比赛已完成并可以开始；如果掩码不等于\
  \ `FFFFFFFF`，Game Center 将继续搜索可以填充该比赛的玩家。\n-   无法向 Game Center 查询当前正在等待哪名玩家。\n\n\
  以下内容基于我们刚刚定义的兵种。\n\n一个空白的比赛所拥有的 `Player` 属性掩码如图 5-7 所示。\n\n![A978-1-4302-4906-1_5_Fig7_HTML.jpg](img/A978-1-4302-4906-1_5_Fig7_HTML.jpg)\n\
