  \n如果现在运行游戏，你会看到两台设备在完全相同的位置生成了奶牛，但只有主机设备负责奶牛的运动动画。\n\n接下来，需要添加共享奶牛动画控制的逻辑。修改现有的\
  \ `updateCowPaths` 方法，将我们想要更新的 `newX` 和奶牛在数组中的位置发送出去。以下新代码应添加到 `for` 循环的末尾。\n\n\
  ```\nif (self.gameIsMultiplayer)\n{\n    NSString *dataString = [NSString stringWithFormat:@\"\
