  request.minPlayers = 4;\nrequest.maxPlayers = 4;\nrequest.playerAttributes = class_SquadLeader;\n\
  ```\n\n## 玩家活动\n\n`Game Center`提供了一种查询近期玩家活动的方法。你的用户通常希望尽可能多地了解在寻找多人比赛时需要等待多长时间。重要的是要明确：玩家活动指的是**近期**的活动，而非**当前**的活动。苹果没有提供确切判断有多少玩家正在等待比赛的方法，但它确实提供了一种方法来确定最近有多少用户寻找过比赛。让我们看看获取玩家活动所需的源代码。在你的`GameCenterManager`类的实现文件中添加以下两个新方法：\n\
  \n```\n- (void)findAllActivity\n{\n    [[GKMatchmaker sharedMatchmaker] queryActivityWithCompletionHandler:\n\
  \    ^(NSInteger activity, NSError *error) {\n        [self callDelegateOnMainThread:@selector(playerActivity:error:)\
  \ withArg:[NSNumber numberWithInt: activity] error:error];\n    }];\n}\n\n- (void)findActivityForPlayerGroup:(NSUInteger)playerGroup\n\
  {\n    [[GKMatchmaker sharedMatchmaker] queryPlayerGroupActivity:playerGroup withCompletionHandler:^(NSInteger\
  \ activity, NSError *error) {\n        NSDictionary *activityDictionary = [[NSDictionary\
  \ alloc] initWithObjects:\n        [NSArray arrayWithObjects:[NSNumber numberWithInt:\
  \ activity], [NSNumber numberWithInt: playerGroup], nil] forKeys:[NSArray arrayWithObjects:@\"\
  activity\", @\"group\", nil]];\n        [self callDelegateOnMainThread: @selector(playerActivityForGroup:error:)\
  \ withArg: activityDictionary error:error];\n        [activityDictionary release];\n\
  \    }];\n}\n```\n\n我们还需要在`GameCenterManager`的头文件中添加两个新的协议方法。添加以下两个可选协议。\n\n```\n\
  - (void)playerActivity:(NSNumber *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
  \ *)activityDict error:(NSError *)error;\n```\n\n在`UFOViewController`中实现这些新的协议方法，如下所示：\n\
  \n```\n- (void)playerActivity:(NSNumber *)activity error:(NSError *)error\n{\n \
  \   if (error != nil) {\n        NSLog(@\"查询玩家活动时发生错误: %@\",\n        [error localizedDescription]);\n\
  \    } else {\n        NSLog(@\"近期所有玩家活动: %@\", activity);\n    }\n}\n\n- (void)playerActivityForGroup:(NSDictionary\
  \ *)activityDict error:(NSError *)error\n{\n    if (error != nil) {\n        NSLog(@\"\
  查询玩家活动时发生错误: %@\", [error localizedDescription]);\n    } else {\n        NSLog(@\"\
  近期所有玩家活动: %@ 针对组别: %@\", [activityDict objectForKey:@\"activity\"], [activityDict\
  \ objectForKey:@\"group\"]);\n    }\n}\n```\n\n你应该会得到类似如下的输出：\n\n```\n2011-03-08\
  \ 11:11:04.007 UFOs[3000:207] 近期所有玩家活动: 3 针对组别: 12345\n2011-03-08 11:11:04.008 UFOs[3000:207]\
  \ 近期所有玩家活动: 3\n```\n\n那么，现在我们有了指定玩家组别的活动数据，这些数字究竟意味着什么呢？苹果从未明确说明这些数字的确切含义，但通过仔细研究，它们似乎代表了过去一到三分钟内尝试通过自动匹配功能连接游戏的用户数量。这些数字似乎在该时间范围内的某个不确定的间隔期重置。此外，当用户尝试加入比赛时，新数字的反映似乎会有\
  \ 15–30 秒的延迟。然后，可以通过多种方式（例如平均连接时间）将这些信息呈现给用户。\n\n即使玩家活动功能存在局限性，它仍然是判断用户寻找比赛时可能等待时间的一个非常有价值的工具。然而，你需要确保这些数字仅用于参考信息，因为它们往往不够可靠，不足以作为决策依据。\n\
  \n**注意**：如果苹果系统提供的玩家活动信息不足以满足你应用的需求，你可以实现自己的服务器系统来精确跟踪有多少玩家正在等待比赛。要构建这样的系统，需要一个远程服务器来存储等待玩家数量，并将其转发回来进行显示。\n\
  \n\n\n### 使用自有服务器（托管比赛）\n\n在通常情况下，Game Center 会为您托管比赛；然而，Apple 提供了一种技术，允许您实现自己的服务器来托管比赛。这种方法被称为“托管比赛”，可以在任何应用中实现，为基于\
  \ Game Center 的多人在线网络功能增加更多灵活性。\n\n当使用 Game Center 托管比赛时，每台连接到比赛的设备都会创建一个 `GKMatch`\
  \ 实例。`GKMatch` 类负责完成连接、握手、发送和接收数据以及处理错误等所有繁重工作。但有时您需要实现自己的服务器，最典型的场景是当您希望允许多于四人同时连接到同一比赛时。在这种情况下，您可以使用\
  \ Game Center 为比赛查找玩家，并使用自己的服务器来连接这些玩家。\n\n> **提示：** 使用托管比赛最多可连接 16 名用户，而使用 Game\
  \ Center 托管时只能连接四名。\n\n不过，使用自有服务器也存在一些缺点，最显著的是，您现在需要负责之前由 Game Center 免费提供的所有底层工作。具体来说，您需要处理以下事项：\n\
  \n- 您必须自行设计并实现所有网络代码来连接玩家。Game Center 会为您查找比赛，但其作用到此为止。\n- 如果您的应用使用标准匹配界面，则您的服务器必须在有新玩家成功连接时通知应用，以便更新图形用户界面。\n\
  - 语音聊天功能不再免费提供。不过，您仍然可以使用 `GKVoiceChatService` 类通过自己的网络系统发送语音数据。更多信息请参阅第 9 章。\n\n\
  为了在设备端支持托管比赛，我们需要对代码库进行少量修改。首先，我们修改本章前面设置的多人按钮操作方法。\n\n```\n- (IBAction)multiplayerButtonPressed\n\
  \n{\n\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\n\nrequest.minPlayers\
  \ = 2;\n\nrequest.maxPlayers = 4;\n\nGKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
  \ alloc] initWithMatchRequest:request];\n\n[request release];\n\nmmvc.matchmakerDelegate\
  \ = self;\n\nmmvc.hosted = YES;\n\n[self presentViewController:mmvc animated:YES\
  \ completion:NULL];\n\n[mmvc release];\n\n}\n```\n\n如您所见，我们新增了一行代码——`mmvc.hosted\
  \ = YES`——这告诉匹配界面 GUI，该比赛将托管在我们自己的服务器上。除了将 `matchmakerViewController` 设置为 `hosted`\
  \ 之外，您还需要让每台设备连接到您的服务器。本节不涉及如何编写服务器端代码，因为这里可以采用数十种语言和方法。不过，在设备连接到您的服务器后，它需要使用加入玩家的\
  \ `playerID` 调用以下方法。\n\n```\n[matchmakerViewController setHostedPlayerReady: playerID\
  \ ];\n```\n\n这将更新所有已连接玩家屏幕上的 GUI，告知他们新玩家已准备好开始比赛。当所有玩家都连接到您的服务器并确认准备就绪后，您的委托方法会被调用来开始游戏。在使用\
  \ Game Center 比赛时，我们使用委托回调 `matchmakerViewController:didFindMatch:` 来开始比赛。但对于托管游戏，我们使用以下方法：\n\
  \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
  \ didFindPlayers:(NSArray *)playerIDs\n\n{\n\n[self dismissModalViewControllerAnimated:YES];\n\
  \nNSLog(@\"Players: %@\", playerIDs);\n\n//开始托管游戏\n\n}\n```\n\n此时，您可以开始游戏，由您的服务器处理已连接玩家之间的通信。此外，您还可以像本章前面介绍的\
  \ Game Center 托管比赛那样，以编程方式开始托管比赛。\n\n```\n- (void)findProgrammaticHostedMatch\n\n\
  {\n\nGKMatchRequest *request = [[GKMatchRequest alloc] init];\n\nrequest.minPlayers\
  \ = 2;\n\nrequest.maxPlayers = 16;\n\n[[GKMatchmaker sharedMatchmaker] findPlayersForHostedMatchRequest:request\
  \ withCompletionHandler:^(NSArray *playerIDs, NSError *error) {\n\nif (error) {\n\
  \nNSLog(@\"查找比赛时发生错误: %@\", [error localizedDescription]);\n\n} else if (playerIDs\
  \ != nil) {\n\nNSLog(@\"已为比赛找到玩家: %@\", playerIDs);\n\n}\n\n}];\n\n[request release];\n\
  \n}\n```\n\n如您所见，这与我们之前的方法非常相似，但不同的是，我们不再获得 `GKMatch` 对象，而是返回一个 `playerIDs` 数组。您还会注意到，我们可以将最大玩家数增加到\
  \ 16 人。\n\n## 总结\n\n本章向您介绍了比赛匹配和邀请的概念。我们讨论了为您的 iOS 应用或游戏增加多人游戏功能的巨大优势，以及在此过程中可能需要克服的一些障碍。我们探讨了从呈现标准\
  \ Apple GUI 到使用玩家分组和玩家属性进行高度自定义匹配的整个匹配流程。我们还回顾了如何处理各种可能场景下的邀请，以及如何查询玩家活动。最后，我们发现了如何实现自己的服务器来消除\
  \ Game Center 的一些限制。我们扩展了可重用的 `GameCenterManager` 类，使其能够处理比赛匹配、邀请以及所需的开销，以便您可以快速为应用添加多人游戏功能。\n\
  \n在本章中，我们深入探讨了如何创建比赛并为比赛填充玩家。在接下来的章节中，我们不仅将学习如何在玩家之间进行通信，还将探索查找通信玩家的新方法。下一章将介绍如何使用\
  \ Game Kit 通过 Peer Picker 查找玩家。\n\n"
- "# 对等选择器\n\n> **摘要：**“我坚信，任何能够增强沟通的工具，都会对人们相互学习以及实现他们所追求的自由产生深远的影响。”\n>\n> ——比尔·盖茨\n\
  \n在上一章中，我们探讨了如何使用 Game Center 查找比赛。在本章中，我们将了解 iOS 提供的另一种用于查找可连接玩家的系统。该系统称为对等选择器，可用于通过蓝牙或本地\
  \ Wi-Fi 网络（局域网）在两个 iOS 设备之间建立连接。\n\n在我们开始编写实际代码之前，先快速回顾一下 Game Kit 和 Game Center\
  \ 的发展历史。当 Apple 发布 iOS 3.0（当时称为 iPhone OS 3.0）时，它实现了一套新的 API 调用，统称为 Game Kit。在 3.0\
  \ 时代，Game Kit 负责处理蓝牙、局域网联网和语音聊天服务。当 Game Center 在 iOS 4.0/4.1 中加入时，它为 Game Kit 带来了显著的改进。Game\
  \ Center 实际上可以看作是 Game Kit 的扩展，而不是一个全新的 API。从 iOS 5 到 iOS 6 和 iOS 7，Game Kit 的网络功能和对等选择器基本保持不变。\n\
  \n在本章中，我们将学习如何使用蓝牙和 Wi-Fi 局域网建立新连接。在第 8 章中，您将学习如何使用共享方法发送数据，无论玩家是通过 Game Center\
  \ 还是 Game Kit 找到的。\n\n\n\n## 对等选择器的优势\n\n自 iOS 4.0 引入以来，Game Kit 网络功能一直受到开发者社区的普遍忽视。这实在有失公允，因为\
  \ Game Kit 对于 iOS 开发者而言，依然是一个极其有用且便捷的工具。它仍然是向 iOS 应用添加点对点、双人网络连接的最简单方式。\n\n在我开发的大多数多人应用中，我都同时实现了\
  \ iOS 的两种网络系统。Game Center 网络和 Game Kit 网络各有优劣，通常同时为你的用户提供这两种方式，要比因其中一种的局限性而被逼入死角更容易。以下列出了一些同时采用两者的理由：\n\
  \n-   你的用户可能无法访问外部网络连接，但依然希望进行多人活动。这种情况可能发生在汽车或飞机上的乘客中，只要能允许在飞行期间开启蓝牙设备。\n-   你可能希望让用户轻松连接到附近其他（基于位置的）用户。虽然这可以通过\
  \ Game Center 的玩家群组来实现，但使用 Game Kit 要简单得多。\n-   你需要在两台设备之间寻找延迟更低的连接。\n-   你希望面向那些使用\
  \ iPod touch 或仅支持 Wi-Fi 的 iPad 的用户，他们可能无法稳定连接 Wi-Fi，或者根本无法访问蜂窝网络。\n-   实现 Game Kit\
  \ 网络比用 Game Center 实现完整的多人游戏系统更快捷、更容易。\n\n正如你所见，用于查找对等玩家的“对等选择器”方法与 Game Center\
  \ 的匹配系统存在一些重要差异。没有什么能阻止你同时实现这两种方式，而且至少在我看来，这是非常值得推荐的（即使苹果官方没有明确推荐）。\n\n在接下来的章节中，你将学习一些让这两个系统并行不悖的方法。然而，如果你只选择实现其中一种，请仔细权衡哪种方案更能满足用户的需求。例如，如果你有一个应用可以向遇到的人分享你乐队的\
  \ MP3 文件，那么 Game Kit 将是更好的选择。\n\n## 现实世界示例\n\n自 iOS 3.0 发布以来，我们见证了 Game Kit 网络功能在非常意想不到的场景中得到应用。在本节中，我们将讨论一些使用\
  \ Game Kit 网络来增强用户体验的著名应用案例。我在这节中向您展示的两个应用，都更适合使用 Game Kit 网络而非 Game Center 网络。\n\
  \n首先，我们来看看 Black Pixel 公司开发的 Bistromath（见图 6-1）。这款应用的核心功能是在餐厅中为多位用餐者分摊账单。这个创意在 iPhone\
  \ 上已经被用滥了，App Store 上有数十款应用提供这种服务。然而，Bistromath 即使价格高于免费的竞争对手，依然广受欢迎。这是为什么呢？\n\n\
  Bistromath 有其独特之处。它不仅设计精美、视觉吸引人，还提供了其他账单分摊应用所没有的功能：Game Kit 网络。Bistromath 使用 Game\
  \ Kit 在多台设备之间建立 Wi-Fi 或蓝牙连接，允许用户登录“主机”应用并输入各自的餐品项目。\n\n![A978-1-4302-4906-1_6_Fig1_HTML.jpg](img/A978-1-4302-4906-1_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n来自 Black Pixel 的 Bistromath，它使用 Game Kit 网络来分摊账单\n\n这个简单的功能让 Bistromath\
  \ 在其细分领域脱颖而出。加入 Game Kit 网络功能后，用户无需再拿着 iPhone 在餐桌上传递，让每个人输入自己点的菜。像这样对你的应用进行微小的补充，就能极大地提升其感知价值。\n\
  \nHandshake（见图 6-2）是 Skorpiostech 公司在 App Store 早期开发的一款应用。它是第一款允许用户向其他用户发送自己名片的应用。为了支持\
  \ Handshake 的网络连接，其服务器团队投入了超过六个月的工作。服务器需要支持大量客户端登录，并为地理位置相近的其他客户端提供匹配服务。\n\n![A978-1-4302-4906-1_6_Fig2_HTML.jpg](img/A978-1-4302-4906-1_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n来自 Skorpiostech 的 Handshake，它使用自己的服务器系统在两个本地设备之间共享数据\n\n每台设备会确定自己的位置，并告知服务器它的位置以及它在寻找对等用户。服务器随后会返回附近的用户，并允许应用在它们之间建立连接。如果在编写\
  \ Handshake 时 Game Kit 网络就已可用，这个过程本可以在几天内完成，而不是几个月。Handshake 从未被重写以支持 Game Kit；不过，当苹果在\
  \ iOS 3.0 中随 Game Kit 一起引入联系人共享功能时，它就被视为走到了生命尽头。\n\n> **注**: Game Kit 和 Game Center\
  \ 并不仅限于游戏。虽然苹果最近开始打击在非游戏应用中使用排行榜和成就系统，但你总有理由说它们为你的应用增加了类游戏功能。而 Game Kit 网络在任何应用中都不受限制。\n\
  \n\n\n## 使用会话（Sessions）\n\n在使用 Game Kit 网络功能时，你需要使用一个 `GKSession` 对象（参见图 6-3）将所有内容串联起来。此对象用于创建和管理设备之间的临时蓝牙或本地无线网络连接。运行在多台设备上的同一应用副本，可以利用这些服务来发现彼此、连接、握手、交换数据并优雅地断开连接。\n\
  \n> **注意**  \n> 原始 iPhone 或原始 iPod touch 不支持蓝牙联网。\n\n![A978-1-4302-4906-1_6_Fig3_HTML.jpg](img/A978-1-4302-4906-1_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** 使用 `GKSession` 通过蓝牙进行的点对点联网\n\n一个 `GKSession` 对象主要与对等节点（peers）协同工作。在此上下文中，对等节点是指任何通过创建并配置自身的\
  \ `GKSession` 对象而使其可见的 iOS 设备。对等节点只能看到运行着相同 bundle 标识符（bundle identifier）的其它应用上的对等节点。\n\
  \n每个对等节点由一个 `peerID` 字符串表示，该字符串始终是唯一的。你的应用可以使用某个对等节点的 `peerID` 来获取该对等节点的用户可读句柄或名称。类似地，当你的应用启动一个\
  \ `GKSession` 时，它会创建一个对等节点来代表本地用户，并且该对等节点会变得对附近所有设备可见。此处的“附近设备”指的是同一本地 Wi-Fi 网络上的任何设备，或蓝牙范围内的任何设备，详见表格\
  \ 6-1 和 6-2。\n\n> **注意**  \n> 从 iOS 5 开始，Core Bluetooth 被添加到 iDevices 中，允许与蓝牙层直接交互。如果你的蓝牙实现超出了\
  \ Game Kit 的能力范围，Core Bluetooth 提供了更底层的功能。\n\n**表 6-1.** 标准蓝牙设备的范围\n\n| 蓝牙类别 | 毫瓦\
  \ (mW) | dBm (dBmW) | 近似范围 |\n| --- | --- | --- | --- |\n| 1 类 (iPhone 4s/5) | 100\
  \ | 20 | 约 100 米，或约 328 英尺 |\n| 2 类 (iPhone) | 2.5 | 4 | 约 10 米，或约 32 英尺 |\n| 3\
  \ 类 | 1 | 0 | 约 1 米，或约 3 英尺 |\n\n**表 6-2.** 标准蓝牙版本的数据速率\n\n| 版本 | 数据速率 | 最大应用吞吐量\
  \ |\n| --- | --- | --- |\n| 1.2 版本 | 1 Mbit/s | 0.7 Mbit/s |\n| 2.0 + EDR 版本 (iPhone)\
  \ | 3 Mbit/s | 1.4 Mbit/s |\n| 3.0 + HS 版本 | 24 Mbit/s | 不适用 |\n| 4.0 (BLE) 版本 (iPhone\
  \ 4s/5) | 可变 | 不适用 |\n\n苹果最近启用了设备与 iOS Simulator 之间的蓝牙连接支持。然而，此支持存在一些限制：最值得注意的是，设备无法通过蓝牙找到\
  \ Simulator，因此 Simulator 必须发起连接。此外，iOS Simulator 不会检测 Mac 是否已启用蓝牙。最后，当设备收到连接时，连接的来源将显示为\
  \ bundle ID 字符串而非设备名称，如本章后面图 6-10 所示。\n\n对等节点通过使用一个唯一字符串来标识其所实现的服务，从而被其他对等节点发现。这个唯一字符串就是\
  \ `sessionID` 属性。会话可以配置为三种模式之一：会话可以配置为广播其 `sessionID`，从而充当服务器（server）；或者搜索其他使用 `sessionID`\
  \ 进行广告宣传的对等节点，从而充当客户端（client）；最后，也可以同时充当服务器和客户端，这被称为对等节点（peer）。在下一章中，我们将更深入地探讨 iOS\
  \ 上的网络设计。\n\n`GKSession` 有一个关联的 `GKSessionDelegate` 协议。每当发现新的远程对等节点、远程对等节点尝试连接，或某个对等节点的连接状态发生改变时，系统都会调用该委托。此外，你还需要设置一个数据接收处理程序（data-received\
  \ handler），以便在接收到新数据时指定委托回调。这个回调可以与主要的 `GKSessionDelegate` 不同。第 8 章 将详细探讨数据交换。\n\
  \n> **注意**  \n> `GKSession` 及其相关方法是线程安全的；然而，会话始终会在主线程上调用其委托方法。\n\n\n\n## 展示对等选择器\n\
  \n与以往一样，我们将首先在`UFOViewController.xib`中为对等选择器添加一个新按钮，如图 6-4 所示。为这个按钮创建一个新的操作方法，命名为`localMultiplayerGameButtonPressed`。此外，你需要创建两个新的类变量：一个是`GKPeerPickerController`的实例，另一个是`GKSession`的实例。分别将它们命名为`peerPickerController`和`currentSession`。你还需要让`UFOViewController`符合`GKPeerPickerControllerDelegate`委托协议。\n\
  \n![A978-1-4302-4906-1_6_Fig4_HTML.jpg](img/A978-1-4302-4906-1_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 为本地多人游戏添加按钮\n\n将以下代码添加到新本地按钮对应的操作方法中。\n\n```\n- (IBAction)localMultiplayerGameButtonPressed\n\
  {\n    peerPickerController = [[GKPeerPickerController alloc] init];\n    [peerPickerController\
  \ setDelegate:self];\n    [peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];\n\
  \    [peerPickerController show];\n}\n```\n\n这段代码不言自明：我们`alloc`并`init`了一个`GKPeerPickerController`的新实例，并将其委托设置为`self`。\n\
  \n我们需要为连接类型指定一个掩码。有两个选项可供我们选择：`GKPeerPickerConnectionTypeNearby`和`GKPeerPickerConnectionTypeOnline`。在本例中，我们使用`GKPeerPickerConnectionTypeNearby`，这将启用蓝牙连接。而`GKPeerPickerConnectionTypeOnline`常量则允许通过本地无线网络进行在线连接。\n\
  \n你也可以同时提供这两个选项，让用户自行选择。用户选择后，你可以继续处理，就像只给用户提供了一个选项一样。如果你现在运行应用并选择“本地”，你应该会看到一个类似图\
  \ 6-5 的新`UIAlert`。\n\n![A978-1-4302-4906-1_6_Fig5_HTML.jpg](img/A978-1-4302-4906-1_6_Fig5_HTML.jpg)\n\
