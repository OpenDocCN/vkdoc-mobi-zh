- "# 8. 数据交换\n\n## 摘要\n\n在过去的几章中，我们探讨了通过多种方式连接对等节点的方法。到目前为止，我们还未能充分利用这些连接。在本章中，你将了解到使用`Game\
  \ Kit`和`Game Center`网络在节点间交换数据的所有知识。在前面的章节中，我们已经为 UFO 游戏添加了通过`Game Center`和`Peer\
  \ Picker`（`Game Kit`）查找对等节点的功能。现在，我们将添加实际进行完整多人对战的能力。\n\n由于所有基础工作已在前面章节中完成，对于数据交换我们只需关注两个事项：首先，需要发送实际数据；其次，需要在接收端接收并处理这些数据。其他所需工作均已就绪，仅剩本章结尾将处理的断连逻辑。让我们直接开始修改第\
  \ 6 章的源代码。\n\n\n\n## 修改单人游戏\n\n要将单人游戏转换为多人游戏，我们需要进行一些修改。\n\n- 一旦连接到新的对等方，我们就需要开始游戏。我们还需要一种方法，让现有的游戏引擎知道新游戏是多人模式。\n\
  - 需要指定一台设备作为主机设备。我们将让这台设备控制牛群的运动，因为两台设备不能同时控制牛群的运动。如果我们希望两台设备保持同步，这是一个重要的步骤。\n-\
  \ 每个对等方都需要将自身的操作（如移动和使用牵引光束）告知其他对等方。\n- 每个对等方都需要解析其他对等方的设备，并更新自身的游戏状态，以使两台设备彼此保持同步。\n\
  \n这些步骤代表了将单人游戏转换为点对点多人游戏通常所需的最低要求。你的特定游戏或应用可能复杂得多。例如，你的多人游戏体验可能与单人游戏相差甚远，以至于无法为两种模式复用同一个类。另一方面，你的游戏也可能更简单。例如，一款多人海战游戏就不需要任何一台设备作为主机，因为其中没有需要你追踪的计算机控制元素。\n\
  \n## 为多人游戏设置引擎\n\n我们首先需要让游戏引擎知道游戏状态应设置为多人模式还是单人模式。实现这一点有复杂的方法，也有简单的方法。根据你的需求，使用一个简单的状态变量通常就足够了。\n\
  \n在我们的示例中，我们将使用状态变量这种方法，因为我们的游戏非常直接。在`UFOGameViewController.h`中，我们创建一个新的实例变量来表示一个`BOOL`值，该值将用于通知类当前是单人模式还是多人模式。将以下两行代码添加到已有的头文件中，并且别忘了在实现文件中`synthesize``gameIsMultiplayer`。\n\
  \n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
  GameCenterManagerDelegate>\n{\n    BOOL gameIsMultiplayer;\n}\n@property(nonatomic,\
  \ assign) BOOL gameIsMultiplayer;\n```\n\n我们将在整个代码库中使用这个属性来判断游戏是否在多人模式下运行。\n\n当游戏开始一场新的多人比赛时，有两个现有的方法会被调用。第一个方法`matchmakerViewController`会在\
  \ Game Center 找到比赛时被调用；第二个方法`peerPickerController`会在我们通过 Peer Picker 找到对等方时被调用。我们将为对等方处理两种不同的标识符：Game\
  \ Center 返回一个`GKMatch`对象，Peer Picker 返回一个`NSString`来表示对等方。我们还会在`GameCenterManager`类中添加一些新方法，以便使用相同的代码同时与这两个系统进行通信。现在，我们只需专注于让游戏在全新的多人状态下运行起来。\n\
  \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
  didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
  \ completion: nil];\n}\n\n- (void)peerPickerController:(GKPeerPickerController *)picker\
  \ didConnectPeer:(NSString\n*)peerID toSession:(GKSession *)session\n{\n    currentSession\
  \ = session;\n    [self dismissModalViewControllerAnimated: YES completion: nil];\n\
  }\n```\n\n接下来，我们在每个方法的末尾添加一段代码，以便在找到想要与之对战的对等方后开始一场新的多人游戏。将以下代码片段添加到每个方法中。\n\n```\n\
  UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\ngameVC.gcManager\
  \ = gcManager;\ngameVC.gameIsMultiplayer = YES;\n[self.navigationController pushViewController:gameVC\
  \ animated:YES];\n[gameVC release];\n```\n\n我们还需要持有代表对等方的`GKMatch`或`NSString`。在`UFOGameViewController`中创建两个新属性，分别命名为`peerIDString`和`peerMatch`。按照与设置`gameIsMultiplayer`实例变量相同的方式设置它们。头文件的新部分应该类似于下面这段抽象的代码片段：\n\
  \n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
  GameCenterManagerDelegate>\n{\n    //...\n    NSString *peerIDString;\n    GKMatch\
  \ *peerMatch;\n}\n@property(nonatomic, retain) NSString *peerIDString;\n@property(nonatomic,\
  \ retain) GKMatch *peerMatch;\n```\n\n现在，我们需要在开始新多人游戏的两个方法中添加设置这些属性的逻辑。这些方法现在应该如下所示。如你所见，我们将未使用的属性设为`nil`；这两个属性中总有一个会被设为`nil`，因为你不可能同时使用\
  \ Peer Picker 和 Game Center 进行游戏。\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
  \ *)viewController\ndidFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
  \ completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
  \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
  \ = YES;\n    gameVC.peerIDString = nil;\n    gameVC.peerMatch = match;\n    [self.navigationController\
  \ pushViewController:gameVC animated:YES];\n    [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
  \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
  {\n    currentSession = session;\n    [self dismissModalViewControllerAnimated:\
  \ YES completion: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
  \ alloc] init];\n    gameVC.gcManager = gcManager;\n    gameVC.gameIsMultiplayer\
  \ = YES;\n    gameVC.peerIDString = peerID;\n    gameVC.peerMatch = nil;\n    [self.navigationController\
  \ pushViewController:gameVC animated:YES];\n    [gameVC release];\n}\n```\n\n当加载游戏视图控制器时，我们就知道了它是否为多人模式，并且也拥有了指向对等方的引用。现在，`GameViewController`拥有了开始一场新多人游戏所需的所有信息。\n\
  \n\n\n### 选择主机\n\n选择哪个设备作为主机比听起来要复杂。当两台设备首次连接时，它们被视为对等设备。那么我们如何确定哪个设备将拥有比另一个更高的控制权呢？\n\
  \n最直接且万无一失的方法是让每台设备生成一个随机数。随机数较大的设备成为主机。在极其罕见的情况下，如果两台设备生成了相同的随机数，我们只需重试。在现代桌面游戏中，主机通常由延迟最低或处理器速度最快的计算机决定。\n\
  \n在确定设备为其作为主机的机会选择的随机数后，我们需要将该数据发送到另一台设备。在接收端，我们需要处理数据，并使两台设备就哪个设备被选为主机得出相同的结论。本节仅涉及生成主机编号；接下来的两节将介绍如何发送和接收这些数据。现在我们向`UFOGameCenterViewController`类中添加以下`generateAndSendHostNumber`方法：\n\
  \n```\n-(void)generateAndSendHostNumber;\n{\n        double randomHostNumber = arc4random();\n\
  \        NSString *randomNumberString = [NSString stringWithFormat: @\"%d\",\n \
  \       randomHostNumber];\n        [self.gcManager sendStringToAllPeers:randomNumberString\
  \ reliable: YES];\n}\n```\n\n出于本示例的目的，我们将使用`NSString`来来回发送数据。你也可以轻松地将其作为`NSNumber`发送，但无论发送什么，首先需要将其转换为`NSData`，我们将在下一节中介绍。此外，我们要确保在处理多人游戏时调用此方法。为此，我们需要在`viewDidLoad`方法的末尾添加以下代码。我们还需要稍微修改生成牛的逻辑。如果是多人游戏，只有主机负责生成和更新牛的路径。\n\
  \n> **提示：** 当开始处理更复杂的网络通信时，切换到一种能够轻松存储更多数据且解析更少的数据类型通常是有益的，例如字典或数组。\n\n```\n-(void)viewDidLoad\n\
  {\n        //...\n        [self generateAndSendHostNumber];\n        if (self.gameIsMultiplayer\
  \ == NO)\n        {\n                for (int x = 0; x < 5; x++)\n             \
  \           {\n                                [self spawnCow];\n              \
  \          }\n                        [self updateCowPaths];\n        }\n}\n```\n\
  \n### 发送数据\n\n我们将使用两种主要方法向已连接的同伴发送数据。一种方法将处理向所有已连接的同伴发送数据，另一种方法仅向指定的同伴发送数据，例如队友或其他玩家组。首先，将以下两个方法添加到我们的`GameCenterManager`类中。以下方法适用于\
  \ Game Center 和 Game Kit 网络通信。\n\n```\n-(void)sendStringToAllPeers:(NSString *)dataString\
  \ reliable:(BOOL)reliable;\n-(void)sendString:(NSString *)dataString toPeers:(id)peers\
  \ reliable:(BOOL)reliable;\n```\n\n我们将使用这些方法来回发送字符串，但你可以添加额外的方法来接受任何你想要的输入类型。请记住，所有内容在传输过程中都需要转换为`NSData`。你可能还会注意到，第一个方法正是我们之前从`generateAndSendHostNumber`中调用的那个方法。\n\
  \n> **提示：** 实现处理数组和字典的方法是个好主意。在处理网络消息时，这两种都是非常常见的数据类型。\n\n在我们真正开始来回发送数据之前，我们需要知道为多人游戏创建的`GKSession`或`GKMatch`。为此，我们在`GameCenterManager`类中创建一个新的实例变量。我们将其命名为`matchOrSession`，并设置为\
  \ ID 类型。我们需要在开始新的多人游戏之前，在收到新的`GKSession`或`GKMatch`之后设置此属性。让我们先看看如何向所有同伴发送数据。为了方便阅读，这里打印了这个新的`sendStringToAllPeers`方法。在你检查之后，我们将进一步详细讨论它。\n\
  \n```\n-(void)sendStringToAllPeers:(NSString *)dataString reliable:(BOOL)reliable\n\
  {\nif (self.matchOrSession == nil)\n{\nNSLog(@\"Game Center Manager matchOrSession\
  \ 实例变量未设置，在发送或接收数据之前，需要使用 GKMatch 或 GKSession 进行设置\");\nreturn;\n}\nNSData *dataToSend\
  \ = [dataString dataUsingEncoding:NSUTF8StringEncoding];\nGKSendDataMode mode;\n\
  if (reliable)\n{\nmode = GKSendDataReliable;\n}\nelse\n{\nmode = GKSendDataUnreliable;\n\
  }\nNSError *error = nil;\nif ([self.matchOrSession isKindOfClass: [GKSession class]])\n\
  {\n[self.matchOrSession sendDataToAllPeers:dataToSend withDataMode:\nmode error:&error];\n\
  }\nelse if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n{\n[self.matchOrSession\
  \ sendDataToAllPlayers:dataToSend withDataMode:\nmode error:&error];\n}\nelse\n\
  {\nNSLog(@\"Game Center Manager matchOrSession 既不是 GKMatch 也不是 GKSession，我们无法发送数据\"\
  );\n}\nif (error != nil)\n{\nNSLog(@\"发送数据时发生错误：%@\", [error\nlocalizedDescription]);\n\
  }\n}\n```\n\n在`sendStringToAllPeers`方法中，我们需要确保已正确设置`matchOrSession`属性。如果没有设置，我们将无法继续，因为我们将使用此对象来发送数据。在确保我们拥有正确的信息可以继续后，我们将`NSString`转换为`NSData`对象。这会将字符串编码为适合通过网络发送的格式。我们还需要设置可靠性模式，如第\
  \ 7 章中所讨论的。\n\n现在我们已经准备好实际发送数据的所有条件，首先检测我们是在处理来自 Game Center 类型连接的`GKMatch`，还是来自\
  \ Peer Picker 类型连接的`GKSession`。剩下的就是使用 Game Kit API 发送数据。\n\n现在是时候看看如何有选择地仅向某些同伴发送数据了。我们可以从已有的向所有同伴发送数据的示例中构建。让我们完整地看一下`sendString`方法：\n\
  \n```\n-(void)sendString:(NSString *)dataString toPeers:(id)peers reliable:(BOOL)reliable\n\
  {\nif (self.matchOrSession == nil)\n{\nNSLog(@\"Game Center Manager matchOrSession\
  \ 实例变量未设置，在发送或接收数据之前，需要使用 GKMatch 或 GKSession 进行设置\");\nreturn;\n}\n```\n\n\n\n\
  `}`\n\n`NSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];`\n\
  \n`GKSendDataMode mode;`\n\n`if (reliable)`\n\n`{`\n\n`mode = GKSendDataReliable;`\n\
  \n`}`\n\n`else`\n\n`{`\n\n`mode = GKSendDataUnreliable;`\n\n`}`\n\n`NSError *error\
  \ = nil;`\n\n`if ([self.matchOrSession isKindOfClass: [GKSession class]])`\n\n`{`\n\
  \n`if ([peers isKindOfClass:[NSArray class]])`\n\n`{`\n\n`[self.matchOrSession sendData:dataToSend\
  \ toPeers:peers withDataMode:mode error:&error];`\n\n`}`\n\n`else`\n\n`{`\n\n`NSLog(@\"\
  Game Kit requires peers be sent as an NSArray of Peer ID Strings\");`\n\n`}`\n\n\
  `}`\n\n`else if ([self.matchOrSession isKindOfClass: [GKMatch class]])`\n\n`{`\n\
  \n`if ([peers isKindOfClass:[NSArray class]])`\n\n`{`\n\n`[self.matchOrSession sendData:dataToSend\
  \ toPlayers:peers withDataMode:mode error:&error];`\n\n`}`\n\n`else`\n\n`{`\n\n\
  `NSLog(@\"Game Center requires peers be sent as an NSArray of Peer ID Strings\"\
  );`\n\n`}`\n\n`}`\n\n`else`\n\n`{`\n\n`NSLog(@\"Game Center Manager matchOrSession\
  \ was not a GKMatch or a GKSession, we are unable to send data\");`\n\n`}`\n\n`if\
  \ (error != nil)`\n\n`{`\n\n`NSLog(@\"An error occurred while sending data: %@\"\
  , [error localizedDescription]);`\n\n`}`\n\n`}`\n\n该方法与向所有对等方发送数据的方法非常相似。主要区别在于，我们使用了一个新的\
  \ API 调用，并传入一个对等方 ID 数组。当然，你可以修改这些方法，使其在发送数据时接受不仅仅是`NSString`类型的数据，但为了我们测试游戏的简便性，一个字符串就足够了。\n\
  \n以上内容涵盖了在两个或更多 iOS 设备之间发送数据所需了解的方方面面。在下一节中，我们将探讨如何接收和解析从另一个对等方接收到的数据。\n\n### 接收数据\n\
  \n`GKSession`和`GKMatch`各自拥有接收传入数据委托回调的系统。这两个系统都依赖于一个委托。Game Center 使用的是在第 5 章中用于邀请处理程序的同一个委托；Game\
  \ Kit 允许我们使用一个单独的调用`setDataReceiveHandler:withContext:`来指定负责处理来自网络的传入数据的实例。\n\n\
  设置我们的应用程序以接收数据的第一步，是将两个系统的接收数据委托都设置为我们的`GameCenterManager`类。我们将使用`GameCenterManager`类作为一个过滤点，将数据传回我们的游戏。虽然你也可以直接在游戏控制器中接收数据，但如果我们通过`GameCenterManager`来传递所有数据，将来将这个类插入到其他应用程序中会容易得多，而且我们可以将\
  \ Game Kit 和 Game Center 的网络通信导向相同的协议，从而使实现过程更轻松。\n\n修改`UFOViewController.m`中的`matchmakerViewController`和`peerPickerController`方法，使其与以下内容一致：\n\
  \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\
  \ didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES\
  \ completion: nil];\n    gcManager.matchOrSession = match;\n    //Set a new received\
  \ data handler\n    [gcManager setupInvitationHandler: gcManager];\n    UFOGameViewController\
  \ *gameVC = [[UFOGameViewController alloc] init];\n    gameVC.gameIsMultiplayer\
  \ = YES;\n    gameVC.peerIDString = nil;\n    gameVC.peerMatch = match;\n    [self.navigationController\
  \ pushViewController:gameVC animated:YES];\n    [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
  \ *)picker didConnectPeer:(NSString *)peerID toSession:(GKSession *)session\n{\n\
  \    [picker dismiss];\n    currentSession = session;\n    gcManager.matchOrSession\
  \ = session;\n    //Set a new received data handler\n    [session setDataReceiveHandler:\
  \ gcManager  withContext: nil];\n    UFOGameViewController *gameVC = [[UFOGameViewController\
  \ alloc] init];\n    gameVC.gameIsMultiplayer = YES;\n    gameVC.peerIDString =\
  \ peerID;\n    gameVC.peerMatch = nil;\n    [self.navigationController pushViewController:gameVC\
  \ animated:YES];\n    [gameVC release];\n}\n```\n\n上述两个方法中需要关注的重要变化是，将处理传入数据请求的委托设置为我们\
  \ 的`GameCenterManager`类。这使我们能够在一个集中的位置处理所有传入数据；然后我们可以将数据中继转发到应用程序的相关部分和类。\n\n接下来，你需要向`GameCenterManager`类中添加以下两个方法。第一个方法处理来自\
  \ Game Kit 的传入数据，第二个方法处理来自 Game Center 的传入数据。这两个方法都假设我们仅处理传入的字符串，因为这是我们设计游戏发送数据时选择的方案。你可以轻松地调整这些方法以处理接收其他类型的对象。此外，我们需要添加一个新的协议方法来处理将数据发送回我们的游戏类。你也可以进一步调整此设置，使用更复杂、更智能的数据解析系统，但对于我们\
  \ UFO 游戏的需求来说，这套方案已经足够适用。\n\n```\n- (void)receiveData:(NSData *)data fromPeer:(NSString\
  \ *)peer inSession: (GKSession *)session context:(void *)context;\n{\n    NSString\
  \ *dataString = [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
  \    NSDictionary *dataDictionary = [NSDictionary dictionaryWithObjects:\n     \
  \                               [NSArray arrayWithObjects:dataString, peer, session,\
  \ nil] forKeys:\n                                    [NSArray arrayWithObjects:@\"\
  data\", @\"peer\", @\"session\", nil]];\n    [dataString release];\n    [self callDelegateOnMainThread:\
  \ @selector(receivedData:) withArg: dataDictionary error: nil];\n}\n\n- (void)match:(GKMatch\
  \ *)match didReceiveData:(NSData *)data fromPlayer:(NSString *)playerID\n{\n   \
  \ NSString *dataString = [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
  }\n```\n\n\n```\n`NSDictionary *dataDictionary = [NSDictionary dictionaryWithObjects:`\n\
  \n`[NSArray arrayWithObjects:dataString, playerID, match, nil] forKeys:`\n\n`[NSArray\
  \ arrayWithObjects:@\"data\", @\"peer\", @\"session\", nil]];`\n\n`[dataString release];`\n\
  \n`[self callDelegateOnMainThread: @selector(receivedData:) withArg:`\n\n`dataDictionary\
  \ error: nil];`\n\n`}`\n\n**提示**：您可以使用 `context` 属性向接收到的委托方法传递任何附加数据。\n\n新的协议方法名为\
  \ `receivedData`，下文展示了它如何融入我们现有的可用协议列表：\n\n```objc\n@protocol GameCenterManagerDelegate\
  \ <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
  \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
  - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
  \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players\
  \ error:(NSError *)error;\n- (void)localPlayerScore:(GKScore *)score error:(NSError\
  \ *)error;\n- (void)achievementSubmitted:(GKAchievement *)achievement error:(NSError\
  \ *)error;\n- (void)achievementEarned:(GKAchievementDescription *)achievement;\n\
  - (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError *)error;\n\
  - (void)playerActivity:(NSNumber *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
  \ *)activityDict error:(NSError *)error;\n- (void)receivedData:(NSDictionary *)dataDictionary;\n\
  @end\n```\n\n现在只剩下实现接收数据的协议方法这一项任务了。我们需要在 `UFOGameViewController` 的实现文件中添加以下方法：\n\
  \n```objc\n- (void)receivedData:(NSDictionary *)dataDictionary;\n{\n    if ([[dataDictionary\
  \ objectForKey: @\"data\"] doubleValue] == randomHostNumber)\n    {\n        NSLog(@\"\
  主机数字相等，我们需要重新生成\");\n        [self generateAndSendHostNumber];\n    }\n    else\
  \ if ([[dataDictionary objectForKey: @\"data\"] doubleValue] >\n             randomHostNumber)\n\
  \    {\n        NSLog(@\"我们是主机\");\n        isHost = YES;\n    }\n    else if ([[dataDictionary\
  \ objectForKey: @\"data\"] doubleValue] <\n             randomHostNumber)\n    {\n\
  \        NSLog(@\"对方是主机\");\n        isHost = NO;\n    }\n}\n```\n\n如果你现在在两台设备上运行游戏，就可以看到每台设备的日志都反映了它是否被指定为主机。不过，目前的\
  \ `receivedData` 方法存在局限性，因为它只能处理主机数据消息。在下一节中，我们将优化这个方法，使其不仅能接收主机消息，还能处理玩家移动、奶牛移动以及其他游戏操作的输入数据。\n\
  \n你现在已经掌握了在两台 iOS 设备之间发送数据，以及接收、解析这些数据并让系统作出响应所需的所有基本技能。如果你想练习实际使用这些方法，下一节将引导你完成在\
  \ UFO 游戏中发送和接收数据的几个示例。\n\n## 整合所有功能\n\n在上一节中，你学习了如何接收发送到设备的数据。在本节中，我们将演练如何在实际游戏中有效利用接收到的数据。我们会添加第二个玩家，允许通过网络发送移动信息，同步两台设备之间的状态数据（例如奶牛移动），追踪每位玩家的得分，并完成游戏相关的其他必要开销任务。\n\
  \n### 选择主机\n\n让我们从改进上一节实现的主机选择逻辑开始。目前，我们假定接收到的任何数据都是主机数字。但由于我们接收到的大部分数据并非主机数字，因此需要找到一种方法来过滤这些数据，以便正确解析。请将\
  \ `generateAndSendHostNumber` 方法修改为如下代码块：\n\n```objc\n-(void)generateAndSendHostNumber;\n\
  {\n        randomHostNumber = arc4random();\n        NSString *randomNumberString\
  \ = [NSString stringWithFormat: @\"$Host:%f\",\n        randomHostNumber];\n   \
  \     [self.gcManager sendStringToAllPeers:randomNumberString reliable: YES];\n\
  }\n```\n\n如你所见，我们现在为要发送的消息添加了一个标识符前缀。在这个示例中，我选择了 `\"$Host:\"` 作为前缀，但你可以使用任何你觉得方便的系统。此外，我们还需要修改\
  \ `receivedData` 回调以支持新格式。\n\n```objc\n- (void)receivedData:(NSDictionary *)dataDictionary;\n\
  {\n        if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$Host:\"])\n\
  \        {\n                        [self determineHost: dataDictionary];\n    \
  \    }\n        else\n        {\n                        NSLog(@\"无法确定消息类型：%@\"\
  ,\ndataDictionary);\n        }\n}\n```\n\n如果我们确定消息是主机消息，就将其发送给一个名为 `determineHost`\
  \ 的新辅助方法，以确定哪台设备是主机。如果无法确定消息类型，我们将在控制台打印一条警告信息，这有助于在系统日益复杂时进行调试。我们需要将 `receivedData`\
  \ 中的旧代码移到 `determineHost` 中。除了移动代码，我们还需要去除前缀。虽然使用 `stringByReplacingOccurrencesOfString:`\
  \ 去除前缀的开销较大，但这是完成此任务最简单的方法。在更复杂的应用中，你可能需要设计一个更健壮、更高效的消息系统。\n\n```objc\n-(void)determineHost:(NSDictionary\
  \ *)dataDictionary\n{\n        NSString *dataString = [[dataDictionary objectForKey:\
  \ @\"data\"]\n        stringByReplacingOccurrencesOfString:@\"$Host:\" withString:@\"\
  \"];\n        if ([dataString doubleValue] == randomHostNumber)\n        {\n   \
  \                     NSLog(@\"主机数字相等，我们需要重新生成\");\n                        [self\
  \ generateAndSendHostNumber];\n        }\n        else if ([dataString doubleValue]\
  \ > randomHostNumber)\n        {\n                        NSLog(@\"我们是主机\");\n \
  \                       isHost = YES;\n        }\n        else if ([dataString doubleValue]\
  \ < randomHostNumber)\n        {\n                        NSLog(@\"对方是主机\");\n \
  \                       isHost = NO;\n        }\n}\n```\n\n现在，我们仍然可以确定谁是主机，但同时为处理更多类型的数据打开了大门。\n\
  \n下一步将是在游戏中传输并显示我们对手的 UFO。在本章的源文件中，我已经向项目添加了两个新图片：`EnemySaucer1.png` 和 `EnemySaucer2.png`。它们与原始图片相同，但应用了不同的配色方案。我们将使用这些新资源来显示和区分对手的飞船。\n\
  ```\n\n\n### 显示敌方 UFO\n\n我们需要做的第一件事是检测当前是否为多人游戏，如果是，则需要在 `UFOGameViewController`\
  \ 的 `viewDidLoad` 方法中绘制敌方 UFO。你会注意到，这段代码与单人模式下绘制玩家所用的代码完全相同，唯一的区别是我们使用了不同的图形资源：\n\
  \n```\n-(void)viewDidLoad\n{\n    if (self.gameIsMultiplayer)\n    {\n        CGRect\
