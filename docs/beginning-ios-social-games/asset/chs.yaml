- "# 1. 社交游戏入门\n\n## 摘要\n\n欢迎阅读《*iOS 社交游戏开发入门*》！本书旨在引导您将`Game Kit`、`Game Center`及其他社交功能集成到\
  \ iOS 应用和游戏中。全书围绕一个名为`UFOs`的示例游戏展开，您将在本章稍后部分了解该游戏。不过，如果您已有现成的应用或游戏并希望为其添加社交功能，也可以直接使用该项目。本书可作为参考手册和资源工具，助您完成向\
  \ iOS 应用添加社交功能的流程。虽然我建议您从头到尾阅读以全面了解所涵盖的技术，但这并非强制要求。每一章均独立成篇，您可以直接跳至与项目需求相关的章节，并快速将该功能集成到应用中。\n\
  \n本书虽涵盖社交游戏的多个方面，但重点在于 Apple 的社交游戏平台`Game Kit`，及其延伸部分`Game Center`。2009 年 3 月 17\
  \ 日，Apple 发布`Game Kit`时，将其定位为 iOS 设备实时联网难题的解决方案——而在此之前，实时联网一直颇具挑战。`Game Kit`增加了对蓝牙、局域网以及语音聊天服务的支持。不久后，Apple\
  \ 在 iOS 4.0 中宣布为`Game Kit`加入`Game Center`功能。借助新版 SDK，Apple 带来了丰富的新特性——其中`Game Center`对本书而言最为重要。在\
  \ iOS 5 中，`Game Center`再次迎来更新，最显著的是增加了回合制游戏框架的支持。Apple 延续这一传统，在 iOS 6 中通过`Game Center\
  \ Challenges`（游戏中心挑战）继续支持`Game Center`。除`Game Center`的变更外，Apple 还在 iOS 5 中增加了对 Twitter\
  \ 的 OS 级支持，并在 iOS 6 中增加了对 Facebook 的支持。随着 2013 年 WWDC 上 iOS 7 的发布，`Game Center`从底层进行了彻底重新设计，以匹配`UIKit`引入的扁平化视觉风格。\n\
  \n通常，iOS 开发者社区倾向于将`Game Center`视为一套独立的应用程序编程接口（API）。这是一种误解。`Game Center`是`Game Kit`不可分割的一部分，两者相辅相成。在后续章节中，您将看到大量例证。为便于本书叙述，我们将把这两项技术统称为`Game\
  \ Kit`；但涉及`Game Center`特有功能时，我们仍会使用其正式名称。\n\n本书前 10 章专注于`Game Kit`功能；其余章节涵盖其他社交元素，例如第\
  \ 11 章中的`Store Kit`与应用内购买、第 12 章和第 13 章中的 Twitter 与 Facebook 分享、第 14 章中的 AirPlay\
  \ 镜像，以及第 15 章中的 iOS 7 游戏手柄。\n\n请注意，尽管名称如此，`Game Kit`和`Game Center`并不仅限于游戏。不过，近期\
  \ Apple 已开始打击在非游戏应用中使用`Game Center`技术的行为。部分开发者曾收到类似以下类型的 Apple 拒绝邮件：\n\n> “Game\
  \ Center 的预期用途是补充游戏应用或应用内的游戏功能。然而，我们注意到您的应用不包含任何游戏玩法或游戏特性。”\n\n这类拒绝似乎主要针对在非游戏应用中使用排行榜和成就系统。但可以合理辩称，在应用中加入排行榜或成就系统本身就增加了游戏性元素。如果您收到此类拒绝，仍有机会提出申诉；据我所知，目前尚未有开发者在此类申诉中失败。据我观察，也未有因在应用中使用`Game\
  \ Kit`网络功能而遭拒绝的案例。\n\n## Game Kit 概述\n\n`Game Kit`可分为三个独立部分：网络功能、`Game Center`和语音聊天。尽管所有这些服务协同工作，共同营造一个无缝环境，但分别审视每个部分仍大有裨益。虽然各领域可能存在重叠，但每个部分均可视为一个主要类别。尽管\
  \ API 本身并未区分这些部分，但在学习和思考`Game Kit`开发时，将它们分开考虑会更有帮助。\n\n### 网络功能\n\n`Game Kit`的网络功能允许您在一个或多个对等端之间发送和接收数据。`Game\
  \ Kit`网络还提供一种连接协议，用于连接 Wi-Fi 网络上的本地客户端，或通过蓝牙进行本地连接。`Game Center`还通过广域网匹配扩展了此功能。\n\
  \n`Game Kit`支持在两台 iOS 设备之间创建即席蓝牙或本地无线网络。随着 iOS 4.0 的发布，`Game Kit`开始支持在广域网上进行联网，最多可同时支持\
  \ 16 名玩家。`Game Kit`网络功能将在第 6、7、8 章中介绍。`Game Center`匹配功能将在第 5 章中介绍。\n\n### Game Center\n\
  \n`Game Center`负责处理身份验证、好友、排行榜、成就、挑战和邀请。从某种意义上说，`Game Center`为开发者提供了与社交互动相关的服务器服务。也可以说`Game\
  \ Center`包含了自己的网络系统。虽然确实如此，但我们将该主题归入前文关于网络功能的章节，并在第 5 章中详细讨论。`Game Center`技术，如排行榜和成就，将在第\
  \ 3 章和第 4 章中介绍。\n\n> **注**\n> 在各类印刷和参考文档中，“`Game Center`”一词有时既指`Game Center` API\
  \ 的集合，也指`Game Center`应用本身。\n\n### 语音聊天\n\nApple 所称的“Game Voice”允许任何应用（不仅限于游戏）通过网络连接提供语音通信。该\
  \ API 处理用户音频流的捕获和播放，并提供服务来处理连接、通信、错误和断开连接。这项技术将在第 10 章中探讨。\n\n\n\n## 示例游戏：UFO\n\n\
  根据我的经验，大多数开发者都是“体验型”学习者。这意味着他们通过实践而不是观看或聆听来学习效果最佳。当我最初学习编程时，我会逐行将杂志上的源代码抄写到 Commodore\
  \ 64 中。手动输入每一行代码的体验使信息得以牢固记忆。而听讲座或看别人写代码则很难让我记住大量信息。如果只有讲课和演示的学习方式，我无法想象自己会坚持走这条职业道路。本书正是本着体验型学习者的精神而设计的。\n\
  \n在进入 Game Kit 本身之前，我们首先要讲解如何使用附带的示例游戏。这个名为“UFO”的游戏，并非设计成获奖级、令人上瘾的游戏，而是足够简单，可以将其视为任何通用项目，让您能专注于社交游戏方面的内容。我已尽最大努力将代码量控制在\
  \ 300 行以内。尽管游戏本身很简单，但所有读者都必须像自己编写一样理解这些代码，这一点至关重要。保持示例的简洁性将使您作为读者能够从项目本身抽离出来，专注于\
  \ Game Kit 特有的信息。我们将从玩游戏开始，然后查看源代码。\n\n**注意**\n\n所有章节的源代码以及示例项目均可在[`www.apress.com`](http://www.apress.com/)获取。示例代码提供两种格式：一种支持自动引用计数（ARC）环境（这是\
  \ iOS 5 新增的功能），另一种使用手动内存管理系统。除对 ARC 的支持外，这两个项目完全相同。\n\n需要特别说明的是，书中印刷的示例代码是非 ARC\
  \ 版本。如果您使用的是 ARC，则需要进行调整。更多信息，请参阅苹果公司关于过渡到 ARC 的文章，网址为[`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html)。\n\
  \n### UFO：理解游戏\n\n您首先需要打开从[`apress.com`](http://apress.com/)下载的基础项目。图 1-1 显示了项目的文件结构。我们将快速运行游戏，看看它的样子。\n\
  \n![A978-1-4302-4906-1_1_Fig1_HTML.jpg](img/A978-1-4302-4906-1_1_Fig1_HTML.jpg)\n\
  \n*图 1-1. Finder 中显示的 UFO 示例项目的文件结构*\n\n要玩游戏，请从“构建”菜单栏中选择“构建并运行”。游戏将启动到一个通用屏幕，上面有一个标有“Play”的按钮。请点击\
  \ Play 按钮。您将进入游戏屏幕，如图 1-2 所示。\n\n游戏的目标很典型：倾斜设备上下或左右移动飞船。一旦飞船定位到一头牛上方，点击屏幕任意位置并保持按住，直到牛被绑架。每绑架一头牛得一分。游戏没有结局。每次绑架一头牛后，就会生成一头新的牛并放置在草地上。\n\
  \n![A978-1-4302-4906-1_1_Fig2_HTML.jpg](img/A978-1-4302-4906-1_1_Fig2_HTML.jpg)\n\
  \n*图 1-2. UFO 示例项目的游戏画面视图*\n\n现在您了解了游戏玩法，可以查看驱动游戏引擎的源代码了。\n\n### UFO：检查源代码\n\n在分组树中，您将看到我们将使用的三个类文件：`UFOAppDelegate`、`UFOViewController`和`UFOGameViewController`。这些文件都有对应的头文件（`.h`文件）和实现文件（`.m`文件）。分组树如图\
  \ 1-3 所示。\n\n![A978-1-4302-4906-1_1_Fig3_HTML.jpg](img/A978-1-4302-4906-1_1_Fig3_HTML.jpg)\n\
  \n*图 1-3. Xcode 中显示的示例项目分组树结构*\n\n首先，看一下`UFOAppDelegate.h`和`UFOAppDelegate.m`文件。这些文件应该让你感到熟悉，因为其他\
  \ iOS 开发工作中也常遇到。它们不过是`UINavigationController`的一个基础子类。如果您需要熟悉这里的代码，请查看苹果公司为新项目提供的示例代码（`https://developer.apple.com/library/ios/navigation/#section=Resource%20Types&topic=Sample%20Code`）。\n\
  \n下一组文件也相对简单：查看`UFOViewController.h`和`UFOViewController.m`。这些是与登录或主屏幕相关的类。目前这里只有一个\
  \ Play 按钮，但随着本书的深入，我们将在此视图中添加排行榜、成就和多人游戏控件。\n\n最后，我们将使用`UFOGameViewController.m`。这是驱动所有游戏玩法的主类，也是添加大部分\
  \ Game Kit 功能的地方。\n\n#### 设置加速计委托\n\n我们将从下载的源文件顶部开始逐步讲解；在 Xcode 中打开`UFOGameViewController`文件。我们修改了`UFOGameViewController`的`init`方法，以注册加速计反馈。请看下面的代码片段，后续会详细讨论。\n\
  \n```\n- (id)init\n{\n    if (self != [super init]) {\n        return nil;\n   \
  \ }\n    self.motionManager = [[CMMotionManager alloc] init];\n    self.motionManager.accelerometerUpdateInterval\
  \ = 0.05;\n    [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue\
  \ currentQueue]\n                                            withHandler:^(CMAccelerometerData\
  \ *accelerometerData, NSError *error)\n    {\n        [self motionOccurred:accelerometerData];\n\
  \        if(error)\n        {\n            NSLog(@\"%@\", error);\n        }\n \
  \   }];\n    return self;\n}\n```\n\n我们将使用核心运动框架来捕捉加速计数据并移动角色。输入频率设置为 0.05 秒，这将提供一个非常流畅、反应灵敏的控制系统。\n\
  \n接下来，看一下`viewDidLoad`方法。我们将其分解成几个部分，以准确理解这里发生了什么。\n\n```\naccelerometerDamp = 0.3f;\n\
  accelerometer0Angle = 0.6f;\nmovementSpeed = 15;\n```\n\n这里我们设置了一些类变量，用于存储开始处理加速计输入时所需的数据。当我们开始处理飞船移动时，将再次使用这些变量。目前，您不需要完全理解它们的作用，只需知道它们已被设置即可。我们创建了一个名为`motionOccurred:`的新方法，该方法将由核心运动框架调用以处理倾斜输入。先前定义的阻尼方法被应用，信息被传递给`movePlayer::`方法，该方法将在后续章节中讨论。\n\
  \n```\n-(void)motionOccurred:(CMAccelerometerData *)accelerometerData;\n{\n    //\
  \ 使用基本的低通滤波器，仅保留加速计数值中的重力分量\n    accel[0] = accelerometerData.acceleration.x * accelerometerDamp\
  \ + accel[0] * (1.0 - accelerometerDamp);\n    accel[1] = accelerometerData.acceleration.y\
  \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp);\n    accel[2] = accelerometerData.acceleration.z\
  \ * accelerometerDamp + accel[2] * (1.0 - accelerometerDamp);\n    if(!tractorBeamOn)\n\
  \        [self movePlayer:accel[0] :accel[1]];\n}\n```\n\n\n\n#### 将玩家绘制到视图上\n\n\
  接下来，我们需要创建“玩家”：\n\n```\nCGRect playerFrame = CGRectMake(100, 70, 80, 34);\nmyPlayerImageView\
  \ = [[UIImageView alloc] initWithFrame: playerFrame];\n[myPlayerImageView setAnimationDuration:0.75];\n\
  [myPlayerImageView setAnimationRepeatCount:99999];\nNSArray *imageArray = [NSArray\
  \ arrayWithObjects: [UIImage imageNamed: @\"Saucer1.png\"],\n [UIImage imageNamed:\
  \ @\"Saucer2.png\"], nil];\n[myPlayerImageView setAnimationImages:imageArray];\n\
  [myPlayerImageView startAnimating];\n[self.view addSubview: myPlayerImageView];\n\
  ```\n\n为此，我们创建一个新的 `UIImageView`，并用预定义的 frame 对其进行初始化。接下来的四行代码是 `UIImageView` 中一个鲜为人知但非常实用的功能：我们为\
  \ `UIImageView` 设置了一个图像数组，它会在这些图像之间循环切换。在本例中，我们设置了两张图像进行轮换。我们还需要指定完整动画的持续时长（此例中为\
  \ 3/4 秒），以及动画的重复次数。动画细节设置完成后，我们在 `UIImageView` 上调用 `startAnimating`。接下来，我们只需要将 `UIImageView`\
  \ 添加到主视图中即可。这样，屏幕上就出现了一个正在播放动画的玩家！\n\n#### 设置奶牛、牵引光束和得分\n\n我们需要创建并显示多个游戏元素。首先，我们来创建得分标签，它会向玩家通报游戏过程中的进度。\n\
  \n```\ncowArray = [[NSMutableArray alloc] init];\ntractorBeamImageView = [[UIImageView\
  \ alloc] initWithFrame: CGRectZero];\nscore = 0;\n[scoreLabel setText:[NSString\
  \ stringWithFormat: @\"SCORE %05.0f\", score]];\n```\n\n得分标签本身已经通过 Interface Builder\
  \ 放置在了视图上。\n\n```\nfor (int x = 0; x < 5; x++) {\n        [self spawnCow];\n}\n\
  [self updateCowPaths];\n```\n\n在 `viewDidLoad` 方法中，我们需要做的最后一件事是创建一些奶牛并将其放置在屏幕上。这里有一个辅助方法用于生成这些奶牛。每次调用该方法，它都会创建一头新奶牛并放置到屏幕上。我们将在本节的稍后部分详细了解这个方法。我们还会调用另一个辅助方法来更新奶牛的行走路径，稍后也会深入探讨这个方法。\n\
  \n#### 处理旋转事件\n\n代码中出现的下一个方法是 `shouldAutorotateToInterfaceOrientation`，如下所示：\n\n\
  ```\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)\ninterfaceOrientation\n\
  {\n        if (UIInterfaceOrientationIsLandscape(interfaceOrientation)) {\n    \
  \            return YES;\n       }\n        return NO;\n}\n```\n\n虽然这看起来只是一小段代码，但它对于确保游戏不允许用户旋转到竖屏模式，同时允许用户在两种横屏方向下进行游戏，至关重要。\n\
  \n#### 添加玩家移动\n\n这涵盖了所有初始化和设置代码。现在我们可以进入游戏更令人兴奋的部分了。首先，我们需要处理用户输入和操作，然后是游戏玩法功能。\n\
  \n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\n\
  \ *)acceleration\n{\n        accel[0] = acceleration.x * accelerometerDamp + accel[0]\
  \ * (1.0 –\n accelerometerDamp);\n        accel[1] = acceleration.y * accelerometerDamp\
  \ + accel[1] * (1.0 –\n accelerometerDamp);\n        accel[2] = acceleration.z *\
  \ accelerometerDamp + accel[2] * (1.0 –\n accelerometerDamp);\n        if (!tractorBeamOn)\
  \ {\n                [self movePlayer:accel[0] :accel[1]];\n        }\n}\n```\n\n\
  我们需要看的第一个方法是加速计的委托方法。我们获取加速计的值，并对其应用一个阻尼系数，以提供更真实的手感。然后，我们进行一项检查，确保牵引光束已关闭（如果光束开启，我们不希望能够移动\
  \ UFO），接着将这两个值传递给我们的 `movePlayer` 方法，该方法如下所示。\n\n```\n- (void)movePlayer:(float)vertical:(float)horizontal;\n\
  {\n        vertical += accelerometer0Angle;\n        if (vertical > .50)\n     \
  \   {\n                vertical = .50;\n        }\n        else if (vertical < -.50)\n\
  \        {\n                vertical = -.50;\n        }\n        if (horizontal\
  \ > .50)\n        {\n                horizontal = .50;\n        }\n        else\
  \ if (horizontal < -.50)\n        {\n                horizontal = -.50;\n      \
  \  }\n        CGRect playerFrame = myPlayerImageView.frame;\n        if ((vertical\
  \ < 0 && playerFrame.origin.y < 120) || (vertical > 0 &&\n playerFrame.origin.y\
  \ > 20))\n        {\n                playerFrame.origin.y -= vertical*movementSpeed;\n\
  \        }\n        if ((horizontal < 0 && playerFrame.origin.x < 440) || (horizontal\
  \ > 0 &&\n playerFrame.origin.x > 0))\n        {\n                playerFrame.origin.x\
  \ -= horizontal*movementSpeed;\n        }\n        myPlayerImageView.frame = playerFrame;\n\
  }\n```\n\n这个方法初看起来可能比想象中简单得多。第一部分代码设置了我们的最大速度。下一部分确保用户无法将 UFO 移出屏幕。一旦通过这两项安全检查，我们就更新玩家的\
  \ frame，从而移动 UFO。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项，将给定的英文文本翻译成中文。\n\n\n#### 监听触摸事件\n\
  \n接下来我们需要关注游戏中的触摸事件。我们将使用触摸来启动和控制牵引光束。第一步是重写 `touchesBegan` 事件。\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n    currentAbductee = nil;\n    tractorBeamOn\
  \ = YES;\n    tractorBeamImageView.frame = CGRectMake(myPlayerImageView.frame.origin.x+25,\
  \ myPlayerImageView.frame.origin.y+10, 28, 318);\n    tractorBeamImageView.animationDuration\
  \ = 0.5;\n    tractorBeamImageView.animationRepeatCount = 99999;\n    NSArray *imageArray\
  \ = [NSArray arrayWithObjects: [UIImage imageNamed:@\"Tractor1.png\"], [UIImage\
  \ imageNamed: @\"Tractor2.png\"], nil];\n    tractorBeamImageView.animationImages\
  \ = imageArray;\n    [tractorBeamImageView startAnimating];\n    [self.view insertSubview:tractorBeamImageView\
  \ atIndex:4];\n    UIImageView *cowImageView = [self hitTest];\n    if (cowImageView)\n\
  \    {\n        currentAbductee = cowImageView;\n        [self abductCow: cowImageView];\n\
  \    }\n}\n```\n\n我们首先清除指向上一个被绑架奶牛的指针。这个值可能已经是 `nil`，但谨慎起见最好这样做。然后，我们将一个表示牵引光束是否开启的\
  \ `BOOL` 变量设为 `YES`。此时，我们需要绘制牵引光束。为此，我们设置 `tractorBeamImageView` 的 frame，使其与玩家 UFO\
  \ 当前所在位置一致。我们将使用与本节前面讨论的相同的动画快捷方式来为牵引光束添加动画。接着，我们将牵引光束的 `imageView` 添加到主视图；我们在这里使用\
  \ `insertSubview` 方法是为了确保牵引光束位于奶牛之下，但又在背景之上。然后我们调用 `hitTest` 方法，我们将在本章稍后部分看到这个方法。如果\
  \ `hitTest` 返回了结果，我们就调用 `abductCow` 方法。\n\n在继续介绍 `hitTest` 和 `abductCow` 方法之前，我们必须先完成对触摸事件的处理。我们在此关心的另一个触摸事件是\
  \ `touchesEnded` 委托回调。当用户将手指从屏幕上移开时，我们希望从视图中移除牵引光束，并让用户恢复移动。\n\n```\n- (void)touchesEnded:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n    tractorBeamOn = NO;\n    [tractorBeamImageView\
  \ removeFromSuperview];\n    if (currentAbductee) {\n        [UIView beginAnimations:\
  \ @\"dropCow\" context:nil];\n        [UIView setAnimationDuration: 1.0];\n    \
  \    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n        [UIView setAnimationBeginsFromCurrentState:\
  \ YES];\n        CGRect frame = currentAbductee.frame;\n        frame.origin.y =\
  \ 260;\n        frame.origin.x = myPlayerImageView.frame.origin.x +15;\n       \
  \ currentAbductee.frame = frame;\n        [UIView commitAnimations];\n    }\n  \
  \  currentAbductee = nil;\n}\n```\n\n将 `tractorBeamOn` 的状态变量设为 `NO`。然后我们可以从视图中移除牵引光束的图像。代码的下一部分是将奶牛送回地面（如果它当时在半空中的话）。为此，我们只需启动一个简单的动画，将奶牛送回地面水平。最后要做的是将\
  \ `currentAbductee` 指针重置为 `nil`。\n\n#### 生成和移动奶牛\n\n我们还有一个便捷的方法来生成新奶牛。我们在 `viewDidLoad`\
  \ 中调用此方法，为玩家提供初始数量的奶牛以供绑架；当我们完成绑架一头奶牛时，也会调用它。\n\n```\n- (void)spawnCow;\n{\n   \
  \ UIImageView *cowImageView = [[UIImageView alloc] initWithFrame:CGRectMake (arc4random()%480,\
  \ 260, 64, 42)];\n    cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"];\n\
  \    [[self view] addSubview: cowImageView];\n    [cowArray addObject: cowImageView];\n\
  \    [cowImageView release];\n}\n```\n\n提示\n\n`arc4Random()` 函数会像 `rand()` 或 `random()`\
  \ 一样返回一个随机数，但它会在首次调用时自动设定种子。\n\n我们创建一个表示奶牛的新 `imageView`。然后使用 `arc4Random()` 函数生成一个随机的\
  \ x 位置。我们设置奶牛将要使用的图像，并将其添加到主视图中。这里要做的最后一步是将 `imageView` 添加到我们的 `cowArray` 中。我们将使用这个数组进行碰撞检测以及更新移动路径。\n\
  \n虽然 UFO 游戏的设计目标并非极具挑战性，但我们确实希望至少为玩法增加一些难度。下面的方法将使奶牛在屏幕上随机游荡。\n\n```\n- (void)updateCowPaths\n\
  {\n    for (int x = 0; x < [cowArray count]; x++) {\n        UIImageView *tempCow\
  \ = [cowArray objectAtIndex: x];\n        if (tempCow != currentAbductee) {\n  \
  \          continue;\n        }\n        [UIView beginAnimations:@\"cowWalk\" context:nil];\n\
  \        [UIView setAnimationDuration: 3.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n\
  \        float currentX = tempCow.frame.origin.x;\n        float newX = currentX\
  \ + arc4random()%100-50;\n        if (newX > 480) {\n            newX = 480;\n \
  \       }\n        if (newX < 0) {\n            newX = 0;\n        }\n        if\
  \ (tempCow != currentAbductee) {\n            tempCow.frame = CGRectMake(newX, 260,\
  \ 64, 42);\n        }\n        [UIView commitAnimations];\n        tempCow.animationDuration\
  \ = 0.75;\n        tempCow.animationRepeatCount = 99999;\n        //flip cow\n \
  \       if (newX < currentX) {\n            NSArray *flippedCowImageArray = [NSArray\
  \ arrayWithObjects: [UIImage imageNamed: @\"Cow1Reversed.png\"], [UIImage imageNamed:\
  \ @\"Cow2Reversed.png\"], [UIImage imageNamed: @\"Cow3Reversed.png\"], nil];\n \
  \           [tempCow setAnimationImages:flippedCowImageArray];\n        } else {\n\
  \            NSArray *cowImageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\
  \ @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"], [UIImage imageNamed: @\"\
  Cow3.png\"], nil];\n            [tempCow setAnimationImages:cowImageArray];\n  \
  \      }\n        [tempCow startAnimating];\n    }\n    //change the paths for the\
  \ cows every 3 seconds\n    [self performSelector:@selector(updateCowPaths) withObject:nil\
  \ afterDelay:3.0];\n}\n```\n\n在 `updateCowPaths` 方法的第一行，我们遍历奶牛对象的数组。然后为奶牛随机化一个新的\
  \ x 位置。一个快速的检查确保我们不会指示奶牛走出屏幕。然后提交动画。我们还需要处理奶牛的方向变化。\n\n注意\n\n我们用来处理此事件的代码并不是翻转图像最有效的方法，但如果你是这类游戏的新手，它是最容易学习的。\n\
  \n与我们之前对牵引光束和 UFO 图像所做的操作一样，我们将添加一些动画帧，使奶牛看起来更有趣。最后要做的是调用 `performSelector`，并设置\
  \ 3 秒的延迟。这将每三秒更新一次奶牛的行进路线，为移动系统增加一点挑战性。\n\n\n\n#### 使用 `UIImage` 执行命中测试\n\n在考虑如何设置绑架奶牛之前，需要先完成一些绑架奶牛本身的预备步骤。首先，我们必须实现一个\
  \ `hitTest` 方法，该方法由本节前面讨论的 `touchesBegan` 事件调用。\n\n```\n- (UIImageView*)hitTest\n\
  {\n    if (!tractorBeamOn) {\n        return nil;\n    }\n    for (int x = 0; x\
  \ < [cowArray count]; x++) {\n        UIImageView *tempCow = [cowArray objectAtIndex:\
  \ x];\n        CALayer *cowLayer = [[tempCow layer] presentationLayer];\n      \
  \  CGRect cowFrame = [cowLayer frame];\n        if (CGRectIntersectsRect(cowFrame,\
  \ tractorBeamImageView.frame)) {\n            tempCow.frame = cowLayer.frame;\n\
  \            [tempCow.layer removeAllAnimations];\n            return tempCow;\n\
  \        }\n    }\n    return nil;\n}\n```\n\n第一行是另一个健全性检查，这次是为了确保我们不会在 `tractorBeam`\
  \ 未开启时调用 `hitTest` 方法。一旦确定我们应该进行命中检测，我们就遍历奶牛对象数组。由于奶牛正处于动画过程中，我们不能依赖 `frame` 中的数据，因为那将显示奶牛最终的位置，而不是当前的位置。\n\
  \n为了确定奶牛当前的位置，我们请求 `presentationLayer`。Core Graphics 提供了一个用于测试两个 `CGRect` 是否相交的有用方法，这正是我们将在这里使用的方法。如果命中了奶牛，就返回该对象。如果遍历完循环仍未通过命中测试，则返回\
  \ `nil`。\n\n**提示：** 可以在任何 `CALayer` 上调用 `presentationLayer` 方法，以提供对正在动画处理的图层当前值的最佳估计。\n\
  \n#### 绑架奶牛\n\n在我们的 `touchesBegan` 方法中，我们测试了 `hitTest` 是否返回了一只奶牛。如果是，我们就用返回的对象调用\
  \ `abductCow`。代码如下：\n\n```\n- (void)abductCow:(UIImageView *)cowImageView;\n{\n\
  \    [UIView beginAnimations: @\"abduct\" context:nil];\n    [UIView setAnimationDuration:\
  \ 4.0];\n    [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    [UIView\
  \ setAnimationDelegate: self];\n    [UIView setAnimationDidStopSelector: @selector(finishAbducting)];\n\
  \    [UIView setAnimationBeginsFromCurrentState: YES];\n\n    CGRect frame = cowImageView.frame;\n\
  \    frame.origin.y = myPlayerImageView.frame.origin.y;\n    cowImageView.frame\
  \ = frame;\n\n    [UIView commitAnimations];\n}\n```\n\n我们在奶牛对象（它是一个 `imageView`）上开始一个动画事件。同时设置一个\
  \ `didStopSelector`，动画完成后会调用该方法。我们将奶牛的新 y 轴坐标设置为 UFO 当前的 y 坐标，并开始动画。\n\n动画停止后，我们会收到\
  \ `finishAbducting` 的回调。这使我们能够增加分数、清理绑架代码并生成一头新奶牛。\n\n```\n- (void)finishAbducting;\n\
  {\n    if (!currentAbductee || !tractorBeamOn) {\n        return;\n    }\n    [cowArray\
  \ removeObjectIdenticalTo: currentAbductee];\n    [tractorBeamImageView removeFromSuperview];\n\
  \    tractorBeamOn = NO;\n    score++;\n    [scoreLabel setText:[NSString stringWithFormat:\
  \ @\"SCORE %05.0f\", score]];\n\n    [[currentAbductee layer] removeAllAnimations];\n\
  \    [currentAbductee removeFromSuperview];\n    currentAbductee = nil;\n\n    //生成一头新奶牛\n\
  \    [self spawnCow];\n}\n```\n\n在方法开始时，我们检查牵引光束是否仍然开启，以及是否存在被绑架对象。就像用户从屏幕松开触摸时所做的处理一样，我们也要从视图中移除牵引光束图像，并正确设置状态变量。用户每绑架一头奶牛，我们奖励其\
  \ 1 分，并相应地更新 `scoreLabel`。我们清理旧的奶牛图像，并将其设置为 `nil`。然后生成一头新奶牛来替换被绑架的那头。\n\n### 配置\
