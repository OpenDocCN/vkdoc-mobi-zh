  \ 1 的指令。\n\n\n\n### 添加网络劫持代码\n\n最后需要处理的是为劫持代码添加网络支持。我们需要在奶牛被劫持时正确移除和重新生成奶牛，同时显示敌方\
  \ UFO 使用牵引光束并将奶牛动画吸入飞船的过程。\n\n首先，在每个设备上显示和隐藏牵引光束。由于每次用户触摸屏幕时启动牵引光束，并在用户松开触摸时结束，我们可以从这里入手。这里不需要传输任何数值，唯一需要注意的是启动和停止动画本身。修改\
  \ `touchesBegan` 和 `touchesEnd` 方法，向对等设备发送消息，如下所示：\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n    currentAbductee = nil;\n    tractorBeamOn\
  \ = YES;\n    if (self.gameIsMultiplayer)\n    {\n        [gcManager sendStringToAllPeers:@\"\
  $beginTractorBeam\"\n                              reliable:YES];\n    }\n    tractorBeamImageView.frame\
  \ = CGRectMake(myPlayerImageView.frame.origin.x+25,\n                          \
  \                  myPlayerImageView.frame.origin.y+10, 28, 318);\n    tractorBeamImageView.animationDuration\
  \ = 0.5;\n    tractorBeamImageView.animationRepeatCount = 99999;\n    NSArray *imageArray\
  \ = [NSArray arrayWithObjects: [UIImage imageNamed:\n                          \
  \  @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n    tractorBeamImageView.animationImages\
  \ = imageArray;\n    [tractorBeamImageView startAnimating];\n    [self.view insertSubview:tractorBeamImageView\
  \ atIndex:4];\n\n    UIImageView *cowImageView = [self hitTest];\n    if (cowImageView)\n\
  \    {\n        currentAbductee = cowImageView;\n        [self abductCow: cowImageView];\n\
  \    }\n}\n\n-(void)endTractorFromNetwork\n{\n    [otherPlayerTractorBeamImageView\
  \ removeFromSuperview];\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event\n{\n    tractorBeamOn = NO;\n    if (self.gameIsMultiplayer)\n    {\n\
  \        [gcManager sendStringToAllPeers:@\"$endTractorBeam\"\n                \
  \              reliable:YES];\n    }\n    [tractorBeamImageView removeFromSuperview];\n\
  \    if (currentAbductee)\n    {\n        [UIView beginAnimations: @\"dropCow\"\
  \ context:nil];\n        [UIView setAnimationDuration: 1.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n\
  \        [UIView setAnimationBeginsFromCurrentState: YES];\n        CGRect frame\
  \ = currentAbductee.frame;\n        frame.origin.y = 260;\n        frame.origin.x\
  \ = myPlayerImageView.frame.origin.x +15;\n        currentAbductee.frame = frame;\n\
  \        [UIView commitAnimations];\n    }\n    currentAbductee = nil;\n}\n```\n\
  \n如上述代码所示，我们只需检查是否为网络游戏，然后传递消息开始或结束牵引光束。接下来，在`receivedData`方法中添加一个处理程序，用于调用两个新方法，这两个方法将在对等设备上显示并动画化牵引光束。这两个方法`beginTractorFromNetwork`和`endTractorFromNetwork`是对当前牵引光束动画方法的修改，为方便查阅，现展示如下：\n\
  \n```\n-(void)beginTractorFromNetwork\n{\n    otherPlayerTractorBeamImageView.frame\
  \ =\n        CGRectMake(otherPlayerImageView.frame.origin.x+25,\n              \
  \     otherPlayerImageView.frame.origin.y+10, 28, 318);\n    otherPlayerTractorBeamImageView.animationDuration\
  \ = 0.5;\n    otherPlayerTractorBeamImageView.animationRepeatCount = 99999;\n  \
  \  NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n     \
  \                       @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"\
  ], nil];\n    otherPlayerTractorBeamImageView.animationImages = imageArray;\n  \
  \  [otherPlayerTractorBeamImageView startAnimating];\n    [self.view insertSubview:otherPlayerTractorBeamImageView\
  \ atIndex:4];\n}\n\n-(void)endTractorFromNetwork\n{\n    [otherPlayerTractorBeamImageView\
  \ removeFromSuperview];\n}\n```\n\n如果再次运行游戏，你会看到当任一用户触摸屏幕时，牵引光束会同时出现在两个设备上。我们无需担心在牵引光束开启时锁定\
  \ UFO 的移动，因为这在单人游戏中已处理，并且只有在单人模式下可接受的移动才会传输到其他设备。接下来，我们需要添加额外的代码来处理碰撞检测，因此修改`hitTest`方法如下：\n\
  \n```\n-(UIImageView *)hitTest\n{\n    if (!tractorBeamOn)\n    {\n        return\
  \ nil;\n    }\n    for (int x = 0; x < [cowArray count]; x++)\n    {\n        UIImageView\
  \ *tempCow = [cowArray objectAtIndex: x];\n        CALayer *cowLayer= [[tempCow\
  \ layer] presentationLayer];\n        CGRect cowFrame = [cowLayer frame];\n    \
  \    if (CGRectIntersectsRect(cowFrame, tractorBeamImageView.frame))\n        {\n\
  \            tempCow.frame = cowLayer.frame;\n            [tempCow.layer removeAllAnimations];\n\
  \            if (self.gameIsMultiplayer)\n            {\n                [gcManager\
  \ sendStringToAllPeers:[NSString\n                    stringWithFormat: @\"$abductCowAtIndex:%i\"\
  , x] reliable:YES];\n            }\n            return tempCow;\n        }\n   \
  \ }\n    return nil;\n}\n```\n\n这里我们使用了之前填充奶牛数组时的相同技巧。由于我们可靠地发送数据以将对象加入数组，因此知道数组的顺序始终相同。由于知道数组顺序，我们可以传递要修改的奶牛的索引。除了发送数据外，还需要编写一个新的`if`语句来捕获此消息，如下所示。可以看到，此方法的设置与分数方法非常相似，我们提取感兴趣的值，并使用它调用一个新方法。\n\
  \n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$abductCowAtIndex:\"\
  ])\n{\n    int index = [[[dataDictionary objectForKey: @\"data\"]\n            \
  \      stringByReplacingOccurrencesOfString:@\"$abductCowAtIndex:\" withString:@\"\
  \"] intValue];\n    [self abductCowFromNetworkAtIndex:index];\n}\n```\n\n以下两个方法`abductCowFromNetworkAtIndex`和`finishAbductingFromNetwork`处理通过网络接收的劫持动画。它们都与我们在单人模式下动画化劫持事件的方法非常相似。你甚至可以修改现有的方法，通过传递一个标志来指示它们来自远程设备，从而处理网络行为。\n\
  \n```\n-(void)abductCowFromNetworkAtIndex:(int)x\n{\n    otherPlayerCurrentAbductee\
  \ = [cowArray objectAtIndex: x];\n    otherPlayerCurrentAbductee.frame = otherPlayerCurrentAbductee.frame;\n\
  \    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n    [UIView beginAnimations:\
  \ @\"abductNetwork\" context:nil];\n    [UIView setAnimationDuration: 4.0];\n  \
  \  [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    [UIView setAnimationDelegate:\
  \ self];\n    [UIView setAnimationDidStopSelector: @selector(finishAbductingFromNetwork)];\n\
  \    [UIView setAnimationBeginsFromCurrentState: YES];\n    CGRect frame = otherPlayerCurrentAbductee.frame;\n\
  \    frame.origin.y = otherPlayerImageView.frame.origin.y;\n    otherPlayerCurrentAbductee.frame\
  \ = frame;\n    [UIView commitAnimations];\n}\n\n-(void)finishAbductingFromNetwork;\n\
  {\n    [cowArray removeObjectIdenticalTo:otherPlayerCurrentAbductee];\n    [self\
  \ endTractorFromNetwork];\n    [otherPlayerCurrentAbductee.layer removeAllAnimations];\n\
  \    [otherPlayerCurrentAbductee removeFromSuperview];\n    otherPlayerCurrentAbductee\
  \ = nil;\n    if (isHost)\n    {\n        [self spawnCow];\n    }\n}\n```\n\n\n\n\
  我们还需要做一些额外的工作，以确保不会引入新的错误。例如，我们添加了一个新的指针，用于追踪敌人当前正在绑架的奶牛（如果有的话）。如果你还记得，在`updateCowPaths`方法中，我们不想更新正在被绑架的奶牛的路径，因为这会破坏绑架过程中使用的动画。我们需要修改该方法，使其忽略敌人正在绑架的任何奶牛。如果你再次运行游戏，就会看到我们已经有了一个功能完整的多人游戏，如图\
  \ 8-4 所示。\n\n![A978-1-4302-4906-1_8_Fig4_HTML.jpg](img/A978-1-4302-4906-1_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 一个功能完整的多人 UFO 游戏，两名玩家通过蓝牙连接进行游戏\n\n## 断连\n\n在实现多人支持时，我们需要做的最后一步是添加逻辑，以处理断连和其他无法恢复的故障。幸运的是，苹果的\
  \ API 处理了大部分基础工作。不过，我们仍然希望在 `GameCenterManager` 类中添加一个更通用的调用，以便简化我们的工作。\n\n```\n\
  - (void)disconnect;\n{\n        if ([self.matchOrSession isKindOfClass: [GKSession\
  \ class]])\n        {\n                        [self.matchOrSession disconnectFromAllPeers];\n\
  \        }\n        else if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n\
  \        {\n                        [self.matchOrSession disconnect];\n        }\n\
  }\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等方安全断开连接，并防止许多难以排查的问题。\n\n## 总结\n\n在本章中，我们以非常紧凑的方式涵盖了大量信息。你学会了如何使用\
  \ Game Kit 网络和 Game Center 网络在两个或多个 iOS 设备之间发送和接收数据。此外，你还学会了如何处理网络状态变化，例如断连。我们将本章学到的原理应用到了\
  \ UFO 游戏中，在不到八章的篇幅内从头构建了一个多人 iOS 游戏。在下一章中，我们将探讨 iOS 5 发布时新增的 Game Center 回合制游戏 API。\n\
  \n"
- "# 9. 使用 Game Center 进行回合制游戏\n\n摘要\n\n仿佛你能消磨时间而不伤害永恒。\n\n> —亨利·大卫·梭罗\n\n苹果在 2011\
  \ 年的全球开发者大会（WWDC）上发布了 iOS 5。新 SDK 为 Game Center 带来了许多较小的增强功能，其中还包括一个非常重要的新特性：通过\
  \ Game Center 进行回合制游戏。通过回合制游戏，你可以为用户提供异步游戏体验。回合制游戏就是指玩家轮流进行游戏的任何游戏，例如井字棋、国际象棋、纸牌游戏、战舰棋和地产大亨。苹果在\
  \ iOS 6 和 iOS 7 中持续改进了回合制游戏，使其成为每次 Game Center 更新的一个亮点功能。\n\niOS 上的回合制游戏在过去几年里变得非常流行，最初是从\
  \ Words with Friends 开始的。如图 9-1 所示，这款来自 Zynga 的异步文字游戏类似于拼字游戏。每位玩家会收到一组字母，他们需要轮流在棋盘上拼出一个单词，并根据单词的难度和棋盘布局来获得分数。回合制游戏传统上采用存储转发平台：服务器保存游戏数据，直到下一个客户端登录并获取为止。异步游戏通常属于休闲游戏，不需要所有玩家在整个游戏过程中都保持在线连接。\n\
  \n![A978-1-4302-4906-1_9_Fig1_HTML.jpg](img/A978-1-4302-4906-1_9_Fig1_HTML.jpg)\n\
  \n图 9-1. Zynga 的 Words with Friends\n\n在 iOS 5 推出之前，Game Center 只提供实时游戏，即所有涉及的设备在多人游戏过程中需要持续保持活跃和登录状态。回合制游戏则带来了一种更休闲的体验，允许玩家同时进行多达\
  \ 20 场比赛，并且只在轮到自己的回合时才开始操作。在新的 Game Center 增强功能出现之前，编写这类游戏需要你自行编写和部署服务器来处理游戏交互。而现在，你可以快速添加回合制游戏的网络组件，在不到一天的时间内就可以启动并运行。在本章中，我们将探索如何使用\
  \ iOS 5 和 Game Center 的新回合制游戏 API 编写一个简单的井字棋游戏。\n\n\n\n## 新示例项目\n\n遗憾的是，我们现有的 UFO\
  \ 示例游戏并不适合测试回合制游戏。让每个玩家操作一步然后等待对方跟上进度，这显然不合逻辑。幸运的是，我们可以围绕另一种非常简单的游戏类型来构建项目：井字棋。这款经典儿童游戏几乎所有人都玩过，我们对它的规则和策略也相当熟悉。\n\
  \n我们首先创建一个基于导航控制器的新项目。整个项目将涉及三个视图：\n\n-   主视图：仅包含一个启动`GKTurnedBasedMatchmakerViewController`的按钮。\n\
  -   `GKTurnedBasedMatchmakerViewController`：这是苹果提供的用于创建和恢复回合制游戏的视图。你无需自行创建此视图。\n\
  -   `游戏视图`：负责处理用户输入、判定胜负和平局、以及在每回合开始时更新游戏面板的类。\n\n我们从主视图开始处理。创建新项目时，系统会自动生成这些文件。我们首先要做的是确保导入正确的\
  \ Game Kit 框架，并添加本书一直使用的可复用`GameCenterManager`类；你可以从第 8 章引入已有的类。同时，我们还需在视图中创建一个用于开始新游戏的按钮，如图\
  \ 9-2 所示。\n\n![A978-1-4302-4906-1_9_Fig2_HTML.jpg](img/A978-1-4302-4906-1_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 新井字棋游戏的主视图\n\n新的基础视图控制器类的头文件应与以下代码片段一致。我们需要遵循`GameCenterManagerDelegate`和`GKTurnedBasedMatchmakerViewController`协议。与之前章节类似，我们还需要创建一个`GameCenterManager`的类实例。最后需要添加的是一个用于开始新游戏的`IBAction`方法。请确保在\
  \ Interface Builder 中将“开始新游戏”按钮连接到该`IBAction`。\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <GameKit/GameKit.h>\n#import \"GameCenterManager.h\"\n\n@interface tictactoeViewController\
  \ : UIViewController <GameCenterManagerDelegate, GKTurnBasedMatchmakerViewControllerDelegate>\n\
  {\n    GameCenterManager *gcManager;\n}\n\n-(IBAction)beginGame:(id)sender;\n@end\n\
  ```\n\n我们还需要修改`viewDidLoad`方法，以检查本地用户身份并在 Game Center 中进行认证。这与第 2 章中的做法相同。如果你支持\
  \ iOS 6 或更高版本，应使用第 2 章中概述的新认证方法。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    if ([GameCenterManager isGameCenterAvailable])\n    {\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \     selector:@selector(localUserAuthenticationChanged:)\n                    \
  \                                 name:GKPlayerAuthenticationDidChangeNotificationName\
  \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n        [gcManager\
  \ setDelegate: self];\n        [gcManager authenticateLocalUser];\n    }\n}\n```\n\
  \n此外，我们还需要实现两个委托方法来监控认证成功和本地用户变更。我们将使用这两个方法输出一些调试信息。\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  {\n    if (error != nil)\n    {\n        NSLog(@\"认证过程中发生错误：%@\", [error localizedDescription]);\n\
  \    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n{\n\
  \    NSLog(@\"认证状态已变更：%@\", notif.object);\n}\n```\n\n在下一节中，我们将了解如何调用`GKTurnedBasedMatchmakerViewController`，以及如何处理在恢复或创建新对战时所需的委托方法。\n\
  \n## `GKTurnedBasedMatchmakerViewController`\n\n与排行榜和成就类似，苹果提供了一个默认类来显示创建新回合制比赛的图形界面。若要编程方式创建比赛，请参见后面的“编程方式创建比赛”一节。\n\
  \n我们首先在前一节创建的单个按钮的`IBAction`方法中操作新的配对对象。这里使用的方法与第 5 章所述的 Game Center 配对非常相似。我们首先分配并初始化一个`GKMatchRequest`实例，设置最小和最大玩家数。然后创建一个新的`GKTurnedBasedMatchmakerViewController`，并用刚创建的配对对象进行初始化。最后，将委托设置为`self`，并以模态方式向用户呈现该视图。此视图将类似于图\
  \ 9-3 所示。\n\n```\n- (IBAction)beginGame:(id)sender\n{\n    GKMatchRequest *match\
  \ = [[GKMatchRequest alloc] init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\
  \    GKTurnBasedMatchmakerViewController *tmvc = nil;\n    tmvc = [[GKTurnBasedMatchmakerViewController\
  \ alloc] initWithMatchRequest:match];\n    [tmvc setTurnBasedMatchmakerDelegate:\
  \ self];\n    [self presentViewController:tmvc animated:YES completion: nil];\n\
  \    [tmvc release];\n    [match release];\n}\n```\n\n**注意：** 在创建新的回合制比赛之前，必须先让`GKLocalPlayer`在\
  \ Game Center 中进行认证。\n\n为了遵守`GKTurnedBasedMatchmakerViewControllerDelegate`协议，需要实现四个委托方法。第一个方法处理用户在配对界面取消操作。唯一的要求是调用`dismissViewControllerAnimated:Completion:`。你可以根据应用需求添加额外的逻辑。\n\
  \n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:(GKTurnedBasedMatchmakerViewController*)viewController\n\
  {\n    [self dismissViewControllerAnimated: YES completion: nil];\n}\n```\n\n**重要：**\
  \ 当前游戏的列表可能不会立即更新，你需要关闭并重新打开`GKTurnedBasedMatchmakerViewController`。\n\n![A978-1-4302-4906-1_9_Fig3_HTML.jpg](img/A978-1-4302-4906-1_9_Fig3_HTML.jpg)\n\
  \n图 9-3. 开始新的回合制比赛\n\n我们还需要实现一个委托方法，以捕获此阶段发生的任何错误。以下方法在配对过程中遇到错误时被调用。为了调试，我们将错误信息输出到控制台；但在实际应用中，你需要告知用户发生了错误。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController*)viewController\
  \ didFailWithError:(NSError *)error\n{\n    NSLog(@\"回合制配对失败，错误信息：%@\", [error localizedDescription]);\n\
  }\n```\n\n本节讨论的最后一个委托方法处理用户在配对界面退出比赛的情况。这通过滑动游戏并选择“退出”选项来实现。在以下方法中，我们调用方法参数中传递的比赛对象的`participantQuitOutOfTurnWithOutcome`方法，并传入`GKTurnedBasedMatchOutcomeQuit`结果。如果此处未调用正确的方法，虽然看起来可以退出游戏，但几秒钟后游戏会重新出现。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController*)viewController\
  \ playerQuitForMatch:(GKTurnedBasedMatch *)match\n{\n    [match participantQuitOutOfTurnWithOutcome:GKTurnedBasedMatchOutcomeQuit\n\
  \                        withCompletionHandler:^(NSError *error) {\n           \
  \                 if (error)\n                            {\n                  \
  \              NSLog(@\"结束比赛时发生错误：%@\", [error localizedDescription]);\n       \
  \                     }\n                        }];\n}\n```\n\n最后一个必需的方法`didFindMatch`将在下一节“开始新游戏”中讨论。\n\
  \n\n\n## 开始新游戏\n\n启动一场新的回合制游戏是一个直接且相对简单的过程。要实现这一点，你需要实现以下方法。这个新方法会关闭`GKTurnBasedMatchmakerViewController`，然后将比赛对象的副本传递给游戏控制器。以下代码片段是井字棋示例应用程序遵循的流程。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\
  \ *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n     [self dismissViewControllerAnimated:\
  \ YES completion: nil];\n     tictactoeGameViewController *gameVC = [[tictactoeGameViewController\
  \ alloc] init];\n     gameVC.match = match;\n      [[self navigationController]\
  \ pushViewController:gameVC animated:YES];\n      [gameVC release];\n}\n```\n\n\
  现在让我们将注意力转向`tictactoeGameViewController`类。从头文件开始，我们创建一个新属性来持有比赛对象，该对象在前一个方法中设置。我们还创建了一个新的可变字典来保存游戏数据，这将在本章后续内容中深入讨论。\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface tictactoeGameViewController\
  \ : UIViewController\n\n@property(nonatomic, retain) NSMutableDictionary *gameDictionary;\n\
  @property(nonatomic, retain) GKTurnBasedMatch *match;\n\n@end\n```\n\n**重要提示**\n\
  \n每轮新游戏你只能严格传递 4k 的数据。如果你无法将游戏数据限制在 4k 以内，可以使用一个指向持有完整数据集的服务器的 URL。或者，你也可以只传递游戏状态的增量变化，并将现有数据存储在本地。\n\
  \n我们需要在此暂停，配置实际的游戏视图（`tictactoeGameViewController`）。我们在井字棋游戏中需要九个落子位置，以及一个认输选项和一个告知玩家当前轮到谁的标签。\n\
  \n我们使用简单的`UIButton`来处理用户输入。修改 XIB 文件，布局类似图 9-4 所示。你需要为每个按钮和标签创建`IBOutlet`，并为落子和认输创建新的`IBAction`方法。将所有棋盘按钮连接到之前创建的`makeMove`方法。我们还需要在`UIButton`上设置标签，以便定位它们。从左上角开始设置标签\
  \ 1，从左到右、从上到下依次编号。\n\n![A978-1-4302-4906-1_9_Fig4_HTML.jpg](img/A978-1-4302-4906-1_9_Fig4_HTML.jpg)\n\
  \n图 9-4.\n\n游戏棋盘视图，如 Interface Builder 所示\n\n现在你的游戏视图控制器中有两个新方法，以及九个按钮出口和一个标签出口。你已经了解了如何开始一场新的回合制游戏，在下一节中，我们将看看如何落子并将控制权传递给下一个玩家。\n\
  \n### 落子\n\n在落子之前，我们在新的回合制游戏中需要做的第一件事是确定玩家代表的角色。在我们的示例游戏中，有两个阵营：X 和 O。我们将第一个玩家始终设为\
  \ X，第二个玩家始终设为 O。这意味着 X 将总是先手。通过这样的设置，使用以下代码片段就能轻松确定当前玩家代表的角色：\n\n```\nif (match.currentParticipant\
  \ == [match.participants objectAtIndex:0])\n{\n    myPlayerCharacter = @\"X\";\n\
  \    identifyTeamLabel.text = @\"轮到 X 落子\";\n}\nelse\n{\n    myPlayerCharacter =\
  \ @\"O\";\n    identifyTeamLabel.text = @\"轮到 O 落子\";\n}\n```\n\n确定玩家身份后，我们就可以让他们落子了。我们将修改与九个游戏按钮关联的操作代码。首先，让我们以完整形式查看这个方法。然后，我们可以分解它并深入分析每个部分。\n\
  \n```\n- (IBAction)makeMove:(id)sender\n{\n    [sender setTitle:myPlayerCharacter\
  \ forState:UIControlStateNormal];\n    NSString *buttonIndexString = [NSString stringWithFormat:@\"\
  %d\", [sender tag]];\n    [gameDictionary setObject:myPlayerCharacter forKey:buttonIndexString];\n\
  \    NSData *data = [NSPropertyListSerialization dataFromPropertyList:gameDictionary\
  \ format:NSPropertyListXMLFormat_v1_0 errorDescription:nil];\n    GKTurnBasedParticipant\
  \ *nextPlayer;\n    if (match.currentParticipant == [match.participants objectAtIndex:0])\
  \ {\n        nextPlayer = [[match participants] lastObject];\n    } else {\n   \
  \     nextPlayer = [[match participants] objectAtIndex:0];\n    }\n    if ([self\
  \ checkWinner] != nil) {\n        if ([[self checkWinner] isEqualToString:@\"Tie\"\
  ]) {\n            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\"\
  \ message:@\"平局\" delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles: nil];\n\
  \            [alert show];\n            [alert release];\n        } else {\n   \
  \         UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\" message:nil\
  \ delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles: nil];\n            [alert\
  \ show];\n            [alert release];\n        }\n        [self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\
  \ nextParticipant:nextPlayer turnTimeout: 32000 matchData:data completionHandler:^(NSError\
  \ *error) {\n            if (error) {\n                NSLog(@\"结束比赛时发生错误：%@\",\
  \ [error localizedDescription]);\n            }\n        }];\n    } else {\n   \
  \     [self.match endTurnWithNextParticipant:nextPlayer matchData:data completionHandler:^(NSError\
  \ *error) {\n            if (error) {\n                NSLog(@\"更新回合时发生错误：%@\",\
  \ [error localizedDescription]);\n            }\n            [self.navigationController\
  \ popViewControllerAnimated: YES];\n        }];\n    }\n}\n```\n\n这个方法乍看可能很复杂，但在我们逐步讲解完所有细节后，你会发现它其实相当简单。我们做的第一件事是将发送者（游戏按钮）的标题设置为我们的玩家角色，该角色通过前面的代码片段确定。\n\
  \n接下来，我们知道需要保存游戏数据以使其在每一轮中持续存在，因此我们将玩家的角色以按钮标签为键存储到字典中。这使得我们以后可以遍历字典并重新填充之前的落子（你将在下一节“继续进行中的游戏”中了解更多）。\n\
  \n现在我们需要准备并将游戏数据发送给下一个玩家。这需要几个步骤。由于我们需要以`NSData`格式发送游戏数据，我们将现有的游戏`NSDictionary`转换为`NSData`。我们使用`NSPropertyListSerialization`方法完成此操作。然后我们就可以发送并稍后检索这些数据。\n\
  \n\n\n下一步是确定谁将是下一位玩家。在双人游戏中，这很简单：我们查看参与者数组，找出不是我们的那一位，然后将其设为下一位玩家。当面对更多玩家时，你只需确定自己在比赛参与者数组中的当前索引，然后调用下一位玩家；或者，如果你是最后一位玩家，则调用第一位。\n\
  \n**注意：** 参与者数组的大小和顺序在比赛开始时确定，并在整个比赛过程中以及每台设备上保持一致。\n\n**提示：** 你可能会注意到参与者数组中存在`nil`对象；这些是未匹配玩家的占位符。Game\
  \ Center 只会在轮到新玩家行动时匹配他们。这意味着每次你被自动匹配时，都将轮到你行动。\n\n接下来的代码段检查比赛是否有赢家。我们将在本章的“结束比赛”部分更详细地讨论这一点。\n\
  \n每步操作结束时，我们要做的最后一件事情是将新的游戏数据发送给下一位玩家。这位玩家随后会更新游戏状态，并将其发送给再下一位玩家（恰好又是第一位玩家）。为此，我们在比赛对象上调用`endTurnWithNextParticipant`。我们需要传入之前在该方法中确定的下一位玩家。\n\
  \n## 继续进行中的游戏\n\n当你在下一回合恢复游戏时（假设这不是比赛的第一回合），你需要首先将游戏状态恢复到当前位置。为此，我们首先修改`viewDidLoad`方法以获取当前比赛数据。我们需要在比赛对象上调用`loadMatchDataWithCompletionHandler`。这会返回我们在上一步方法中发送给下一位玩家的数据。然后我们将`NSData`转换回`NSDictionary`，并将其添加到`gameDictionary`中。代码如下：\n\
  \n```\n- (void)viewDidLoad\n{\n    //Existing viewDidLoad code... // 现有的 viewDidLoad\
  \ 代码...\n    [self.match loadMatchDataWithCompletionHandler:^(NSData *matchData,\
  \ NSError *error) {\n        NSDictionary *myDict = nil;\n        myDict = [NSPropertyListSerialization\
  \ propertyListFromData:match.matchData\n                                       \
  \          mutabilityOption:NSPropertyListImmutable\n                          \
  \                                 format:nil\n                                 \
  \                errorDescription:nil];\n        [gameDictionary addEntriesFromDictionary:myDict];\n\
  \        [self populateExistingGameBoard];\n        if (error) {\n            NSLog(@\"\
  loadMatchData - %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\
  \n**提示：** 如果你在本地持久化游戏状态，则只需要更新自你上次行动以来发生的回合。这种方法有助于你将数据包大小控制在 4k 限制以内。\n\n填充游戏数据字典后，我们需要调用一个新的便捷方法，根据该字典填充游戏\
  \ GUI。该方法将遍历字典中的所有键，并用玩家的角色填充相应的游戏按钮。我们还将按钮的启用状态设置为`NO`，以防止玩家移动到对手的位置上。\n\n```\n\
  - (void)populateExistingGameBoard\n{\n    NSArray *dataArray = [gameDictionary allKeys];\n\
  \    for (NSString *key in dataArray) {\n        UIButton *button = (UIButton*)[self.view\
  \ viewWithTag: [key intValue]];\n        [button setTitle:[gameDictionary objectForKey:key]\
  \ forState:UIControlStateNormal];\n            [button setEnabled: NO];\n    }\n\
  }\n```\n\n有了这些代码，你现在就可以使用两个 Game Center 账号，完整地进行一局井字棋游戏；但是，游戏永远不会检测到赢家或平局。在下一节中，我们将探讨检测游戏结束事件所需的逻辑。图\
  \ 9-5 显示了一个已填充的游戏示例。\n\n![A978-1-4302-4906-1_9_Fig5_HTML.jpg](img/A978-1-4302-4906-1_9_Fig5_HTML.jpg)\n\
  \n**图 9-5.** 通过比赛数据填充游戏棋盘\n\n## 结束比赛\n\n在“走出第一步”一节中，我们看到调用了名为`checkWinner`的方法。本节中，我们将更仔细地研究该方法。对于井字棋，我们采用暴力方法来检查是否有赢家：检查所有行和列中是否有三个重复的字符。如果没有任何地方可以落子，我们还需要检查是否平局。\n\
  \n```\n- (NSString*)checkWinner\n{\n     //top row // 顶行\n         if ([gameButton1.titleLabel.text\
  \ isEqualToString:gameButton2.titleLabel.text] &&\n        [gameButton2.titleLabel.text\
  \ isEqualToString:gameButton3.titleLabel.text])\n                  return gameButton1.titleLabel.text;\n\
  \         //middle row // 中间行\n         if ([gameButton4.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
  \ &&\n        [gameButton5.titleLabel.text isEqualToString:gameButton6.titleLabel.text])\n\
  \                  return gameButton4.titleLabel.text;\n         //bottom row //\
  \ 底行\n        if ([gameButton7.titleLabel.text isEqualToString:gameButton8.titleLabel.text]\
  \ &&\n        [gameButton8.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
  \                  return gameButton7.titleLabel.text;\n         //first column\
  \ // 第一列\n         if ([gameButton1.titleLabel.text isEqualToString:gameButton4.titleLabel.text]\
  \ &&\n        [gameButton4.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
  \                  return gameButton1.titleLabel.text;\n         //middle column\
  \ // 中间列\n        if ([gameButton2.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
  \ &&\n        [gameButton5.titleLabel.text isEqualToString:gameButton8.titleLabel.text])\n\
  \                  return gameButton2.titleLabel.text;\n         //last column //\
  \ 最后一列\n        if ([gameButton3.titleLabel.text isEqualToString:gameButton6.titleLabel.text]\
  \ &&\n        [gameButton6.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
  \                return gameButton3.titleLabel.text;\n         //diagonal // 对角线\n\
  \        if ([gameButton1.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
  \ &&\n        [gameButton5.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
  \          return gameButton1.titleLabel.text;\n        if ([gameButton3.titleLabel.text\
  \ isEqualToString:gameButton5.titleLabel.text] &&\n        [gameButton5.titleLabel.text\
  \ isEqualToString:gameButton7.titleLabel.text])\n                return gameButton3.titleLabel.text;\n\
  \        if (gameButton1.titleLabel.text != nil && gameButton2.titleLabel.text !=\
  \ nil &&\n        gameButton3.titleLabel.text != nil && gameButton4.titleLabel.text\
  \ != nil &&\n        gameButton5.titleLabel.text != nil && gameButton6.titleLabel.text\
  \ != nil &&\n        gameButton7.titleLabel.text != nil && gameButton8.titleLabel.text\
  \ != nil &&\n        gameButton9.titleLabel.text != nil)\n                  return\
  \ @\"Tie\";\n    return nil;\n}\n```\n\n如果你将注意力转回上一节的`makeMove`方法，会看到如果我们判定玩家获胜，就会进行一次新的调用。我们需要调用`participantQuitInTurnWithOutcome`来结束比赛。我们传入`GKTurnBasedMatchOutcomeWon`作为参数，但如果出现玩家输掉的情况，我们也可以传入`GKTurnBasedMatchOutcomeLost`。\n\
  \n```\n[self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
  \ nextParticipant:nextPlayer turnTimeout: 32000 matchData:data completionHandler:^(NSError\
  \ *error)  {\n        if (error)\n        {\n                  NSLog(@\"An error\
  \ occurred ending match: %@\", [error localizedDescription]);\n         }\n}];\n\
  ```\n\n\n\n### 退出与弃权\n\n玩家可随时从匹配视图控制器中滑动屏幕退出比赛。但建议在游戏内部为用户提供弃权或退出比赛的路径。要允许玩家弃权比赛，请使用以下代码片段：\n\
  \n```\n- (IBAction)forfeit:(id)sender\n{\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\
  \ withCompletionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
  结束比赛时发生错误：%@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\n###\
  \ 玩家超时\n\n在本章前面部分，我们讨论了使用 `endTurnWithNextParticipant:matchData:completionHandler:`\
  \ 方法来结束回合。从 iOS 6 开始，该方法已被弃用，并替换为 `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:`。如果你的应用目标是\
  \ iOS 5，则需要继续使用先前的方法；但如果目标是 iOS 6 或更高版本，你可以开始使用这个允许玩家超时的新方法。\n\n在 iOS 6 之前，无法在回合制比赛中跳过某位玩家；如果某位玩家未能进行其回合，游戏将进入一种不确定状态，直到游戏被弃权。使用\
  \ `endTurnWithNextParticipants:turnTimeout:matchData:completionHandler:` 方法可以设置一个\
  \ `NSTimeInterval` 参数。一旦时间间隔过去，控制权将传递给队列中的下一位玩家，并且可以处理玩家错过其回合的行为。\n\n### 玩家交涉\n\n\
  在 iOS 7 之前，非当前回合的玩家无法发送任何操作。iOS 7 带来了玩家交涉功能。玩家交涉允许任何玩家在任何时候发起操作，这可用于同时回合、聊天以及玩家之间的交易，无论当前轮到谁行动。\n\
  \n一次交涉请求需要成功完成五个步骤。\n\n交涉发起者向接收者发送请求。接收者被告知有挂起的请求。接收者对交涉做出回应，并将响应发送回发起者。发起者随后收到响应通知。最后，当前玩家被告知交涉已完成，并更新比赛数据。\n\
  \n如果你的游戏允许，任何玩家都可以发起交涉，无论当前是否是他们的回合。发起者需要为交涉请求选择一个或多个接收者。发起者还需要指定交易类型，是聊天消息、交易、请求帮助，还是其他类型。交涉还需要设置一个超时时间，以确定交涉的有效时长。\n\
  \niOS 7 中提供了一种发送交涉的新方法，`sendExchangeToParticipants:`。该方法接受多个参数，首先是接收请求的接收者数组。随后是一个\
  \ `NSData` 块，代表请求的详细信息。还会附加一条可本地化的消息和一个以秒为单位的超时时间：\n\n```\n[GKTurnBasedExchange\
  \ sendExchangeToParticipants:recipients data:data localizableMessageKey:key\narguments:arguments\
  \ timeout:timeout completionHandler:^(GKTurnBasedExchange\n*exchange, NSError *error)\
  \ {\n    }];\n```\n\n注意\n\n交涉数据限制为 1k，而常规回合数据的限制为 4k。\n\n发起玩家可以在交涉被接收者接受并处理之前的任何时间取消交涉请求。这通过使用\
  \ `player:exchangeCanceled:match:` 方法完成。\n\n接收玩家需要使用以下方式响应交涉请求：\n\n```\n[GKTurnBasedExchange\
  \ replyWithLocalizableMessageKey:key arguments:arguments data:data\ncompletionHandler:^(NSError\
  \ *error) {\n}]\n```\n\n如果需要，当前游戏的比赛数据必须进行更新，以反映交涉的结果。因此，可能有必要将当前玩家也包含在交涉接收者列表中，以便数据可以作为其回合的一部分进行更新。\n\
  \n### 玩家提醒\n\niOS 7 还增加了向玩家发送待处理操作提醒的功能。这些提醒将以推送通知的形式出现在他们的设备上。推送通知将包含引用的可本地化消息，并且需要考虑该消息的显示尺寸。这使得游戏可以发送提醒，提示需要进行回合或交涉操作。\n\
  \n```\n[GKTurnBasedMatch sendReminderToParticipants:(NSArray *)participants localizableMessageKey:(NSString\
  \ *)key  arguments:(NSArray *)arguments completionHandler:(void(^)(NSError *error))completionHandler]\n\
  ```\n\n## 编程式匹配\n\n如果你想绕过 `GKTurnBasedMatchmakerViewController` 并实现自己的图形界面，有办法可以做到。使用以下方法无需用户通过匹配界面即可创建新比赛：\n\
  \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
  \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n    [GKTurnBasedMatch\
  \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch *match, NSError\
  \ *error)  {\n        if (error == nil) {\n            // 使用返回的比赛开始新游戏\n       \
  \ } else {\n            NSLog(@\"寻找比赛时发生错误：%@\", [error localizedDescription]);\n\
  \        }\n    }];\n}\n```\n\n除了创建游戏，你还需要能够为本地用户加载现有游戏列表。可以通过以下方法实现：\n\n```\n-\
  \ (void)loadMatches\n{\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray\
  \ *matches, NSError *error) {\n        if (error == nil) {\n            NSLog(@\"\
  现有比赛：%@\", matches);\n        } else {\n            NSLog(@\"加载比赛时发生错误：%@\", [error\
  \ localizedDescription]);\n        }\n    }];\n}\n```\n\n注意\n\n由于这两种方法都使用后台任务来处理请求，你在块内实现的代码必须是线程安全的。\n\
  \n## `GKTurnBasedEventHandler`\n\n`GKTurnedBasedEventHandler` 是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码：\n\
  \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
  ```\n\n该协议有三个可选方法。\n\n- `handleInviteFromGameCenter`：当你的委托收到此方法时，它应该使用通过该方法传入的 `playersToInvite`\
  \ 填充一个新的 `GKMatchRequest`。然后你需要开始一场新比赛或展示匹配界面。当用户接受来自朋友的比赛邀请时，会调用此方法。\n- `handleTurnEventForMatch`：当用户接受了针对进行中比赛的推送通知时，你的委托会收到此消息。你需要结束正在进行的任何任务，并显示通过此方法传入的比赛对应的游戏。\n\
  - `handleMatchEnded`：当你的委托收到此消息时，它应向玩家显示比赛结果和游戏结束视图，并允许玩家选择从 Game Center 中移除比赛数据。\n\
  \n## 总结\n\n在本章中，你学习了 Game Center 的回合制游戏功能。我们与现有的 `GameCenterManager` 类协作，并编写了一个全新的示例游戏来使用回合制技术。现在，你应该对如何创建新的回合制游戏，以及在玩家之间保留和发送回合数据有了扎实的理解。掌握了本章所学的技能，你现在应该能够在几小时内轻松启动并运行回合制游戏的网络组件。\n\
  \n在下一章中，我们将探讨另一个激动人心的话题：语音聊天。Apple 投入了大量精力使 IP 语音在 iOS 应用中易于使用，我们将探索如何在你启用了 Game\
  \ Center 或 Game Kit 的应用中快速启动并运行 VoIP。\n\n\n\n### 语音聊天\n\n## 摘要\n\n伟大的发现与进步总是离不开众多智慧的协作。或许人们认为是我开辟了道路，但当我回顾后续的发展时，深感这份荣誉应归属于他人而非我自己。\n\
  \n> ——亚历山大·格拉汉姆·贝尔\n\n语音聊天作为 Game Kit 提供的服务之一，比其他任何功能都更能证明苹果公司的工程实力。苹果将其他平台上最复杂的功能之一，变成了\
  \ iOS 上最容易实现的功能。当你在其他平台上处理基于互联网协议的语音传输（VOIP）时，这常常是整个项目中最复杂、最令人头疼的任务。在本章中，我们将探讨如何为我们的\
  \ UFOs 游戏或任何 iOS 应用添加语音聊天服务。本章的篇幅之短，足以证明苹果公司为此技术付出了多少努力，使其甚至能被最资浅的开发者轻松掌握。\n\n与前几章的策略不同，我们将分别处理\
  \ Game Kit 语音聊天和 Game Center 语音聊天，而不是像之前那样编写一个共享类。虽然这两种服务有许多相似之处，但它们的差异足以让我们分别进行处理。此外，在本章中，我们将在\
  \ UFOs 游戏中实现语音聊天时应用所学的主题。\n\n## Game Center 的语音聊天\n\n首先，我们来看看 Game Center 的语音聊天。使用\
  \ `GKMatch` 创建语音聊天会话有很多优势，例如易于使用、实现快速，并且相比使用 Game Kit 或必须实现自定义解决方案，开销更少。一个 `GKMatch`\
  \ 语音聊天可以拥有多个频道，每个频道都关联着一个接收者列表。例如，在第一人称射击游戏中，你可以为队友设置一个频道，为所有玩家设置另一个频道。这样你就可以讨论获胜战术，而不会将信息泄露给其他队伍。\n\
  \n> **注意：** 使用 `GKMatch` 的语音聊天仅适用于通过 Wi-Fi 连接互联网的参与者；语音聊天不支持蜂窝网络。\n\n### 创建音频会话\n\
  \n在开始处理语音聊天本身之前，你首先需要创建一个新的音频会话。在开始任何语音聊天服务之前，这一点非常重要。如果你在创建聊天会话之后才创建音频会话，你将无法发送或接收语音数据。在下面的示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为活动状态。\n\
  \n> **提示：** 你的应用可能已经使用音频会话来播放音效；如果你已经创建了一个音频会话，则无需创建新的会话。如果你要重用现有的音频会话，请确保将其设置为允许播放和录制功能。\n\
  \n```\nNSError *error = nil;\nAVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
  if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n\
  {\n    if(error)\n    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n\
  \    }\n}\nif(![audioSession setActive: YES error: &error])\n{\n    if(error)\n\
  \    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n   \
  \ }\n}\n```\n\n### 创建新的语音频道\n\n你的应用中可以拥有任意数量的语音聊天频道，每个对等方可以根据自己的意愿注册成为任意数量频道的一部分。频道通过名称字符串进行创建和组织。这就是我们确定用户要加入哪些频道的方式。当两个或更多对等方加入具有相同名称的频道时，它们就会连接到同一个聊天室。\n\
  \n下面的代码片段展示了如何创建三个不同的频道。请注意，这些频道是使用当我们开始一个基于 Game Center 的网络游戏时返回给我们的 `GKMatch`\
  \ 对象创建的。\n\n```\nGKVoiceChat *allChannel = [[match voiceChatWithName:@\"allPlayers\"\
  ] retain];\nGKVoiceChat *teamChannel = [[match voiceChatWithName:@\"blueTeam\"]\
  \ retain];\nGKVoiceChat *squadChannel = [[match voiceChatWithName:@\"BlueTeamSquad2\"\
  ] retain];\n```\n\n在这个示例中，我们有一个用于与所有玩家通信的频道，一个用于与整个队伍通信的频道，以及第三个用于与小队通信的频道。仅仅创建了频道并不意味着它们会自动开启。在下一节中，我们将探讨如何在特定频道上开始和停止通信。\n\
  \n### 启动和停止语音聊天\n\n在上一节中，我们创建了三个用于 Game Center 类型语音聊天的新语音频道。当你想在这些频道上传输和接收语音时，你首先需要告诉\
  \ API 你想开始使用该频道。在你连接到某个频道后，你就可以从该频道发送和接收数据。如果你想连接到一个频道但不想传输任何语音音频，请参阅关于麦克风静音的下一节。\n\
  \n要开始使用语音频道，你需要在上一节创建的 `GKVoiceChat` 对象上调用 `start` 方法。\n\n```\n[allChannel start];\n\
  [teamChannel start];\n```\n\n当你想离开一个频道时，只需调用 `stop` 方法。这比简单地将频道中所有参与者静音更好的原因是，应用将无需接收额外的网络数据。已停止的频道可以随时重新启动。\n\
  \n```\n[allChannel stop];\n[teamChannel stop];\n```\n\n> **提示：** 强烈建议在传输语音数据时提供视觉和音频指示，例如红灯和咔嗒声。这可以减少用户无意中传输语音数据的可能性。永远记住，用户的麦克风和传输的语音应被视为敏感数据。\n\
  \n### 聊天音量和静音\n\n语音聊天的音量是按频道设置的。每个频道都有一个相关的属性，可以用来降低该聊天的整体音量。你不能将音量提高到超过用户当前设备所选择的音量。例如，如果用户的最大音频为\
  \ 70%，而你将音量设置为 100%，系统会自动将其缩放为 70%。要修改频道的音量，请添加以下代码行：\n\n```\nallChannel.volume\
  \ = 0.5; //最大音量的一半\n```\n\n此外，你可以通过引用玩家的 `playerID` 来静音频道中的单个玩家。可以使用以下两行代码来静音和取消静音玩家：\n\
  \n```\n[teamChannel setMute:YES forPlayer: playerID];\n[teamChannel setMute:NO forPlayer:playerID];\n\
  ```\n\n在某些情况下，你可能不想一直传输用户的语音。默认情况下，用户启动聊天时处于静音状态。你需要先取消用户静音，他们才能开始传输语音数据。\n\n```\n\
  squadChannel.active = YES;\n```\n\n> **重要：** 一个用户一次只能在一个频道上传输语音；如果你取消静音一个频道，API\
  \ 将自动静音所有其他频道。\n\n这就是在你的基于 Game Center 的网络应用中完全启用语音聊天所需的全部内容。其他一切，包括播放、发送和接收数据，都由\
  \ API 为你处理。\n\n\n\n### 监测玩家状态\n\n我在本章前面提到过，让用户知道他们正在传输数据非常重要。让玩家看到谁在说话也是一个重要步骤。通过监测玩家状态的变化，你可以确定哪些用户当前正在传输语音，并在玩家列表中高亮显示他们，或通过其他方式指示哪个玩家正在说话。以下代码块在你开始聊天时很容易设置，它省去了你执行轮询或委托回调的麻烦：\n\
  \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
  \ state)\n{\n        switch (state)\n                {\n                       \
  \ case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
  \ playerID];\n                                break;\n                        case\
  \ GKVoiceChatPlayerSilent:\n                                [self stopShowingSpeakingPlayer:\
  \ playerID];\n                                break;\n         }\n    };\n```\n\n\
  > **注意：** 玩家状态更新是按频道处理的。你需要为你想要监测变化的每个频道配置一个。\n\n## 适用于 Game Kit 的语音聊天\n\n在使用 Game\
  \ Kit 语音聊天时，我们将重点关注 `GKVoiceChatService` 对象。Game Kit 语音聊天的基本原理与 Game Center 语音聊天非常相似。实现此系统的一个良好起点是，在你使用\
  \ Peer Picker 系统连接到另一个玩家并获取到 `GKSession` 对象之后。需要注意的是，`GKVoiceChatService` 设计为一次只能向一个对等方发送数据。虽然这还不是一个限制（因为\
  \ Game Kit 目前只支持两个对等方），但如果将来 API 扩展，记住这一点很重要。\n\n> **注意：** 在继续之前，别忘了检查 `[GKVoiceChatService\
  \ isVoIPAllowed]` 以确保你的设备支持语音聊天。某些设备，例如第一代 iPod touch，不支持语音聊天。\n\n### 创建音频会话\n\n\
  与 Game Center 一样，我们可以通过首先创建一个新的 `AVAudioSession` 来开始使用 Game Kit 语音聊天。确保在开始任何语音聊天服务调用之前创建会话至关重要。\n\
  \n```\n    NSError *error = nil;\n    AVAudioSession *audioSession = [AVAudioSession\
  \ sharedInstance];\n        if(![audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
  \ error:&error])\n        {\n            if(error)\n            {\n            \
  \    NSLog(@\"An error occurred while starting audio session: %@\", [error localizedDescription]);\n\
  \            }\n        }\n        if(![audioSession setActive: YES error: &error])\n\
  \        {\n            if(error)\n            {\n                NSLog(@\"An error\
  \ occurred while starting audio session: %@\", [error localizedDescription]);\n\
  \            }\n        }\n```\n\n### 必需的额外设置\n\n与 Game Center 的方法不同，Game Kit 需要更多的额外设置才能启动和运行。你需要做的第一件事是实现几个必要的方法。下面发布的第一个方法返回你希望与之通信的玩家的\
  \ `peerID`。这个值可以轻松地从你当前的 `GKSession` 对象中获取：\n\n```\n- (NSString *)participantID\n\
  {\n    return session.peerID;\n}\n```\n\n你还需要实现一个方法来将语音数据发送到已连接的对等方，以及另一个方法来处理接收数据；这两个方法都在下面的代码片段中给出。这两个方法将共同处理你的应用的语音数据发送和接收。\n\
  \n```\n- (void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData\
  \ *)data toParticipantID:(NSString *)participantID\n{\n    NSError *error = nil;\n\
  \    if(![self.session sendData:data toPeers:[NSArray arrayWithObject: participantID]\
  \ withDataMode:GKSendDataReliable error:&error])\n    {\n        NSLog(@\"Unable\
  \ to send data to peers: %@\", [error localizedDescription]);\n    }\n}\n\n- (void)\
  \ receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:\n    (GKSession\
  \ *)session context:(void *)context;\n    {\n        [[GKVoiceChatService defaultVoiceChatService]\
  \ receivedData:data\n        fromParticipantID:peer];\n   }\n```\n\n### 启动运行\n\n\
  除了我们在上一节中实现的三个新方法之外，你还需要完成一些额外的步骤才能使一切正常运行。首先，你需要初始化一个新的 `GKVoiceChatClient` 实例，这应该是你创建的\
  \ `GKVoiceChatClient` 的自定义子类。有关此步骤的更多信息，请参阅下一节“整合在一起”。\n\n```\nGKVoiceChatClient\
  \ *voiceChatClient = [[GKVoiceChatClient alloc] initWithSession:\n session];\n[GKVoiceChatService\
  \ defaultVoiceChatService].client = voiceChatClient;\n```\n\n创建了 `GKVoiceChatClient`\
  \ 的新实例后，你需要将你的对等方连接到它。以下代码演示了如何实现这一点。\n\n```\n[[GKVoiceChatService defaultVoiceChatService]\
  \ startVoiceChatWithParticipantID:\n [self  participantID] error: &error];\n```\n\
  \n要结束语音聊天会话，你需要调用一个类似的方法，如下所示。\n\n```\n[[GKVoiceChatService defaultVoiceChatService]\
  \ stopVoiceChatWithParticipantID:\n [self  participantID]];\n```\n\n在你与另一个对等方建立连接后，你将开始接收语音聊天数据。如果你想要发送数据，你需要做的就是使用以下代码片段取消麦克风静音：\n\
  \n```\n[GKVoiceChatService defaultVoiceChatService].microphoneMuted = NO;\n```\n\
  \n以上就是启动并运行 Game Kit 语音聊天所需的所有步骤。虽然比使用 Game Center 语音聊天的工作量稍多一些，但它仍然比实现你自己的 VOIP\
  \ 系统要容易得多。\n\n\n\n## 整合\n\n在本章中，我们在第 8 章的基础上修改现有代码库。首先，为你的语音聊天服务创建一个新的音频会话。将以下代码块添加到\
  \ `UFOGameViewController.m` 的 `viewDidLoad:` 方法中。此外，你还需要将 `AVFoundation.framework`\
  \ 添加到你的项目中。修改 `viewDidLoad` 方法的相关部分，使其与以下内容一致。\n\n```\nif (self.gameIsMultiplayer\
  \ == NO)\n{\n    for (int x = 0; x < 5; x++)\n    {\n        [self spawnCow];\n\
  \    }\n    [self updateCowPaths];\n}\nelse\n{\n    [self generateAndSendHostNumber];\n\
  \    NSError *error = nil;\n    AudioSessionInitialize(NULL, NULL, NULL, self);\n\
  \    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n    if(![audioSession\
  \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error])\n    {\n      \
  \  if(error)\n        {\n            NSLog(@\"启动音频会话时发生错误：%@\", [error localizedDescription]);\n\
  \        }\n    }\n    if(![audioSession setActive: YES error: &error])\n    {\n\
  \        if(error)\n        {\n            NSLog(@\"启动音频会话时发生错误：%@\", [error localizedDescription]);\n\
  \        }\n    }\n    [self setupVoiceChat];\n}\n```\n\n**警告：** 确保你正在构建的目标设备同时具备扬声器和麦克风可供使用。\n\
  \n你还需要添加一个名为 `setupVoiceChat` 的新方法。该方法将处理 Game Center 和 Game Kit 的基本配置。\n\n```\n\
  -(void)setupVoiceChat\n{\n    //GameKit\n    if (self.peerIDString)\n    {\n   \
  \     NSError *error = nil;\n        UFOVoiceChatClient *voiceChatClient = [[UFOVoiceChatClient\
  \ alloc] init];\n        voiceChatClient.session = self.gcManager.matchOrSession;\n\
  \        [GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;\n\
  \        [[GKVoiceChatService defaultVoiceChatService]\n            startVoiceChatWithParticipantID:self.peerIDString\
  \ error:&error];\n        [GKVoiceChatService defaultVoiceChatService].microphoneMuted\
  \ = YES;\n        if (error)\n        {\n            NSLog(@\"设置语音聊天时发生错误：%@\",\n\
  \                [error localizedDescription]);\n        }\n    }\n    //Game Center\n\
  \    else\n    {\n        mainChannel = [[self.peerMatch voiceChatWithName:@\"main\"\
  ] retain];\n        [mainChannel start];\n        mainChannel.volume = 1.0;\n  \
  \      mainChannel.active = NO;\n    }\n}\n```\n\n你可能已经注意到，这段代码中有一个新的类类型叫做 `UFOVoiceChatClient`。我们将使用这个类来处理语音的传入和传出数据，以及用于监控状态和错误的其他方法。该类的实现如下。\n\
  \n```\n@implementation UFOVoiceChatClient\n\n@synthesize session;\n\n-(NSString\
  \ *)participantID\n{\n    return self.session.peerID;\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
  \ *)voiceChatService sendData:(NSData *)data toParticipantID:(NSString *)participantID\n\
  {\n    NSError *error = nil;\n    if(![self.session sendData:data toPeers:[NSArray\
  \ arrayWithObject: participantID] withDataMode:GKSendDataReliable error:&error])\n\
  \    {\n        NSLog(@\"无法向对等端发送数据：%@\", [error localizedDescription]);\n    }\n\
  }\n\n- (void)receivedData:(NSData *)arbitraryData fromParticipantID:(NSString *)participantID\n\
  {\n    [[GKVoiceChatService defaultVoiceChatService] receivedData:arbitraryData\n\
  \        fromParticipantID:participantID];\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
  \ *)voiceChatService\n    didReceiveInvitationFromParticipantID:(NSString *)participantID\n\
  \    callID:(NSInteger)callID\n{\n    NSLog(@\"已收到邀请\");\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
  \ *)voiceChatService\n    didNotStartWithParticipantID:(NSString *)participantID\
  \ error:\n    (NSError *)error\n{\n    NSLog(@\"未开始邀请\");\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
  \ *)voiceChatService\n    didStartWithParticipantID:(NSString *)participantID\n\
  {\n    NSLog(@\"已开始邀请\");\n}\n\n@end\n```\n\n**注意：** 确保你的 `voiceChatClient` 遵循 `GKVoiceChatClient`\
  \ 协议。\n\n你还需要对 `GameCenterManager` 类进行一些细微的修改，以处理传入的语音数据。将现有的 `receiveData:fromPeer:inSession:Context:`\
  \ 方法修改如下：\n\n```\n- (void)receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:\
  \ (GKSession\n    *)session context:(void *)context;\n{\n    NSString *dataString\
  \ = [[NSString alloc] initWithData:data\n        encoding:NSUTF8StringEncoding];\n\
  \    if (dataString == nil)\n    {\n        [[GKVoiceChatService defaultVoiceChatService]\
  \ receivedData:data\n            fromParticipantID:peer];\n        [dataString release];\n\
  \        return;\n    }\n    NSArray *objects = [NSArray arrayWithObjects:dataString,\
  \ peer, session, nil];\n    NSArray *keys = [NSArray arrayWithObjects: @\"data\"\
  , @\"peer\", @\"session\", nil];\n    NSDictionary *dataDictionary = [NSDictionary\
  \ dictionaryWithObjects:objects forKeys:keys];\n    [dataString release];\n    [self\
  \ callDelegateOnMainThread: @selector(receivedData:) withArg: dataDictionary\n \
  \       error: nil];\n}\n```\n\n注意我们添加了另一段代码，用于处理将数据传递给我们的 `defaultVoiceChatService`\
  \ 客户端。如果我们无法从 `NSData` 中解码出字符串，我们就判断该数据是否为语音数据。你的应用可能更复杂，可能需要一个前缀或其他类型的设计符来确定数据是否为语音，但对于\
  \ UFOs 这样简单的游戏来说，这种方法非常合适。\n\n我们需要做的最后一件事是连接一个操作，以开启和关闭麦克风。我决定在 UFOs 中使用一个简单的切换按钮，但你可能会觉得需要实现不同的方法。添加一个新的按钮，如图\
  \ 10-1 所示，并连接接下来发布的新操作。\n\n![A978-1-4302-4906-1_10_Fig1_HTML.jpg](img/A978-1-4302-4906-1_10_Fig1_HTML.jpg)\n\
  \n*图 10-1.* 在我们的 UFO 游戏演示中添加一个麦克风按钮\n\n```\n-(IBAction)startVoice:(id)sender;\n\
  {\n    micOn = !micOn;\n    if (micOn)\n    {\n        [micButton setTitle:@\"麦克风开\"\
  \ forState:UIControlStateNormal];\n        //GameKit\n        if (self.peerIDString)\n\
  \        {\n            [GKVoiceChatService defaultVoiceChatService].microphoneMuted\
  \ =\n                NO;\n        }\n        //Game Center\n        else\n     \
  \   {\n            mainChannel.active = YES;\n        }\n    }\n    else\n    {\n\
  \        [micButton setTitle:@\"麦克风关\" forState:UIControlStateNormal];\n       \
  \ //GameKit\n        if (self.peerIDString)\n        {\n            [GKVoiceChatService\
  \ defaultVoiceChatService].microphoneMuted =\n                YES;\n        }\n\
  \        //Game Center\n        else\n        {\n            mainChannel.active\
  \ = NO;\n        }\n    }\n}\n```\n\n该方法确定麦克风的当前状态（开/关），并将其切换到新状态。发生这种情况时，我们会更新按钮标题，并根据我们使用的网络类型打开或关闭麦克风。\n\
  \n这些是将语音聊天功能添加到我们 UFOs 示例项目中所需的所有步骤。如果你在两台设备上运行游戏，将能够通过语音双向通信。\n\n**注意：** 从说话到在对等设备上接收到语音数据的延迟可能在\
  \ 500 毫秒到数千毫秒之间。\n\n## 总结\n\n在本章中，你学习了如何以极少的代码工作，将一项传统上非常复杂的技术集成到我们的 iOS 应用中。我们探讨了在\
  \ Game Kit 和 Game Center 上使用语音聊天的差异，并在我们的 UFOs 演示游戏中实现了两个系统的示例。现在你已经掌握了为任何 iPhone\
  \ 或 iPad 应用添加全功能 VOIP 技术所需的技能。如果你一直在从头开始阅读本书，那么你现在已经具备在你的应用中实现 Game Kit 和 Game Center\
  \ 所有方面所需的所有技能。\n\n在下一章中，我们将探讨编写 iOS 游戏或应用时的另一项重要技术——StoreKit。利用 `StoreKit` 技术，我们将探索如何为你的产品销售额外的功能和附件。\n\
  \n\n"
- "# 11. 使用 StoreKit 实现应用内购买\n\n## 摘要\n\n如果你想建立长期成功的企业，你不是在完成一笔销售，而是在开启一段关系。\n\n>\
  \ —帕特里夏·弗里普\n\n到目前为止，在本书中，我们一直在使用 Game Center 和 Game Kit 为你的应用添加丰富的社交网络功能。然而，还有一个在现代软件中逐渐流行的重要特性：应用内购买。允许用户直接从你的应用内购买升级或附加内容，可以开辟一条潜在的重要收入来源。在过去几年中，一种名为“免费增值”的新商业模式已经兴起。免费增值是一种新型的游戏或产品，免费提供给用户，但通过销售附加组件来盈利。App\
  \ Store 上收入最高的 100 款应用大部分都是免费应用；在编写本章时，收入前 100 名的应用中有 81 款是免费下载的，如图 11-1 所示。\n\n\
  ![A978-1-4302-4906-1_11_Fig1_HTML.jpg](img/A978-1-4302-4906-1_11_Fig1_HTML.jpg)\n\
  \n*图 11-1. App Store 上收入最高的应用，显示了免费游玩模式的统治地位*\n\n让我们以 ngmoco:) 的热门游戏《We Rule》为例，这是一个非常成功的免费游玩游戏。这款游戏在\
  \ iPhone 和 iPad 上均可免费下载和游玩。每个用户都控制着一个虚拟王国，负责建造建筑和种植作物。用户会随着时间的推移产生“魔力”，并可以使用这种应用内货币来建造新的建筑和农场。然而，由于魔力的限制性质（积累缓慢），一些用户希望比正常情况下更快地进行建造。\n\
  \n这些高级用户可以访问应用内商店批量购买更多魔力。图 11-2 展示了《We Rule》的内置商店。它提供了从非常便宜到贵得惊人的多种购买选项。在处理可销售的附加组件时，兼顾这两种类型的用户非常重要。你的一些用户可能偶尔有兴趣花一两美元，而另一些则是希望一次性花一百美元甚至更多的高级用户。\n\
  \n![A978-1-4302-4906-1_11_Fig2_HTML.jpg](img/A978-1-4302-4906-1_11_Fig2_HTML.jpg)\n\
  \n*图 11-2. ngmoco:) 的《We Rule》中的应用内购买商店*\n\n免费增值模式已成为一种利润丰厚的模式，以至于 ngmoco:) 已经停止开发不符合该模式的游戏，甚至在中途取消了《Rolando\
  \ 3》的开发，因为它无法改编成免费增值类型的游戏。这种模式似乎为 ngmoco:) 带来了丰厚的回报。如图 11-3 所示，当前《We Rule》商店中销量最高的商品售价为\
  \ 9.99 美元。这一单个应用内购买的价格就超过了大多数独立的 iOS 游戏。它之所以能够获得这笔销售，是因为用户在免费游戏的过程中已经投入其中。\n\n并非所有支持应用内购买的游戏或应用都需要是免费的。事实上，直到最近，你还不允许在免费应用中实现应用内购买。你可以在付费游戏中轻松添加额外功能或解锁内容，例如《愤怒的小鸟》中的神鹰。应用内购买也不仅限于游戏。几乎所有软件都能从中受益，无论是解锁专业级功能，还是向用户收取推送通知支持的订阅费。在本章中，我们将探讨如何为你的\
  \ iOS 软件添加一个功能齐全的应用内商店。\n\n![A978-1-4302-4906-1_11_Fig3_HTML.jpg](img/A978-1-4302-4906-1_11_Fig3_HTML.jpg)\n\
  \n*图 11-3. ngmoco:) 的《We Rule》当前最畅销的应用内购买列表*\n\n## 在 iTunes Connect 中设置你的应用\n\n\
  与 Game Center 一样，第一步是访问 iTunes Connect 来为你的应用配置购买项目。\n\n登录 iTunes Connect（[`itunesconnect.apple.com`](http://itunesconnect.apple.com/)），如第\
  \ 2 章所述。你需要有一个现有的项目来进行操作。如果你在 iTunes Connect 中还没有创建项目，请立即创建一个。选择你想要添加应用内购买支持的项目。然后，点击名为“管理应用内购买”的按钮，如图\
  \ 11-4 所示。\n\n> **重要提示：** 从创建应用起，你有 90 天的时间来上传二进制文件进行审核。请确保在你项目完成的 90 天内保存好应用内购买配置。\n\
  \n![A978-1-4302-4906-1_11_Fig5_HTML.jpg](img/A978-1-4302-4906-1_11_Fig5_HTML.jpg)\n\
  \n*图 11-5. 在 iTunes Connect 中设置你的第一个应用内购买*\n\n点击“管理应用内购买”按钮将带你进入一个用于设置新产品的屏幕，如图\
  \ 11-5 所示。进入后，点击窗口左上角的“创建新”按钮。\n\n![A978-1-4302-4906-1_11_Fig4_HTML.jpg](img/A978-1-4302-4906-1_11_Fig4_HTML.jpg)\n\
  \n*图 11-4. iTunes Connect 中的应用列表，显示“管理应用内购买”按钮*\n\n你可以配置几种类型的应用内购买产品：\n\n*   **非续期订阅：**\
  \ 在大多数情况下，可续期订阅已经消除了对这种模式的需求。非续期订阅的功能与自动续期订阅相同，只是用户每次到期时需要手动续订。\n\n![A978-1-4302-4906-1_11_Fig7_HTML.jpg](img/A978-1-4302-4906-1_11_Fig7_HTML.jpg)\n\
  \n*图 11-7. iTunes Connect 中自动续期购买的设置屏幕*\n\n*   **非消耗品：** 非消耗品购买只需要每个用户购买一次，通常用于可解锁功能。非消耗品购买的示例包括额外关卡、可重复使用的增强道具或附加内容。其设置屏幕与消耗品相同。\n\
  *   **自动续期订阅：** 自动续期订阅允许用户在一段设定的时间内购买应用内内容。在此期间结束时，除非用户选择退出，否则订阅将自动续期并向用户收费。杂志和报纸遵循这种模式，每周或每月发布新一期，直到用户取消订阅。图\
  \ 11-7 显示了自动续期购买的设置屏幕。\n\n![A978-1-4302-4906-1_11_Fig6_HTML.jpg](img/A978-1-4302-4906-1_11_Fig6_HTML.jpg)\n\
  \n*图 11-6. iTunes Connect 中消耗品和非消耗品购买的设置屏幕*\n\n*   **消耗品：** 消耗品应用内购买每次用户下载时都必须购买。这些包括游戏内货币，正如我们在上一节《We\
  \ Rule》示例中所见。图 11-6 显示了消耗品购买的设置屏幕。\n\n> **注意：** 自动续期订阅将发送到与该用户 Apple ID 关联的所有设备。\n\
  \n我们将从向我们的示例 UFO 游戏添加一个非消耗品购买项目开始。\n\n我们要添加的第一个项目是对用户当前飞船的付费升级；将该项目命名为 `com.dragonforged.ufo.newShip1`。在此示例中，产品\
  \ ID 和引用名称使用了相同的标题。引用名称用于在 iTunes Connect 中搜索，而产品 ID 将用于你的代码库中以标识此项目。\n\n创建新项目后，你需要添加至少一个本地化的描述和标题，如图\
  \ 11-8 所示。你需要做的最后一件事是为该项目选择一个定价等级。你可能还注意到有一个上传截图的区域；这将在后面的“提交购买 GUI 截图”一节中讨论。\n\n\
  \n\n![A978-1-4302-4906-1_11_Fig8_HTML.jpg](img/A978-1-4302-4906-1_11_Fig8_HTML.jpg)\n\
  \n**图 11-8.** 在 iTunes Connect 中为产品添加本地化描述\n\n添加消耗型产品的步骤与非消耗型产品相同。如果你想添加基于订阅的产品，需要注意几个新增的字段，如图\
  \ 11-9 所示。配置订阅时，你需要定义订阅时长。iTunes Connect 支持以下选项：一周、一个月、两个月、三个月、六个月或一年。如果用户同意参与营销活动（例如提供电子邮件地址），你还可以选择提供免费订阅。\n\
  \n![A978-1-4302-4906-1_11_Fig9_HTML.jpg](img/A978-1-4302-4906-1_11_Fig9_HTML.jpg)\n\
  \n**图 11-9.** 在 iTunes Connect 中配置订阅时长\n\n现在，你应该已经为应用内购买配置了至少一个产品。iTunes Connect\
  \ 中的界面应类似于图 11-10。这完成了启用应用内购买所需的 iTunes Connect 初始配置。在下一节中，我们将开始处理在设备上完成购买所需的代码。\n\
  \n> **注意：** 暂时不必为“等待截图”错误担心；这将在后续流程中处理。在等待上传截图期间，你仍然可以测试购买。\n\n![A978-1-4302-4906-1_11_Fig10_HTML.jpg](img/A978-1-4302-4906-1_11_Fig10_HTML.jpg)\n\
  \n**图 11-10.** 产品已设置完毕，准备在应用中使用\n\n## 向应用添加产品\n\n苹果并未为应用内购买提供预设计的图形界面。作为开发者，你需要自行设计用户商店界面。在本节中，你将学习如何将在\
  \ iTunes Connect 中添加的产品显示在应用内供用户购买。\n\n> **注意：** 新购买和更改可能需要数小时才能生效。如果反复检查后仍看不到产品，请等待几小时再试。\n\
  \n### 应用标识与内购\n\n处理应用内购买时，苹果要求你的应用标识（App ID）不能包含通配符，例如 `76P4G6KX56.*`。你必须有一个唯一的应用标识，例如\
  \ `76P4G6KX56.com.dragonforged.ufo`。如果没有唯一标识，则需要创建一个。请按照以下步骤创建新的唯一应用标识。\n\n在浏览器中访问\
  \ [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)，从右侧列表中选择“iPhone\
  \ 开发者计划门户”。从左侧列中选择“应用标识”，然后点击右上角的“新建应用标识”按钮。填写应用的相关信息，点击“提交”。接着点击列表旁的“配置”按钮，确保“应用内购买”已开启（默认应为开启状态）。\n\
  \n### 设置\n\n首先，我们将从应用中请求产品列表。首先，将 `StoreKit` 框架添加到你的项目中。我们将修改前一章节中已有的 UFO 项目；你也可以跟随自己的项目操作，这样更方便。\n\
  \n> **重要提示：** 应用内购买无法在模拟器上运行；所有测试必须在真机上进行。\n\n创建一个名为 `UFOStoreViewController` 的新类。我们将使用此类向用户展示商店界面。头部文件设置如下：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <StoreKit/StoreKit.h>\n@interface UFOStoreViewController\
  \ : UIViewController <SKProductsRequestDelegate>\n{\n    SKProductsRequest *productsRequest\n\
  }\n@end\n```\n\n如你所见，我们导入了 `StoreKit` 头文件，设置了 `SKProductsRequestDelegate` 委托，并创建了一个对象来持有产品请求。我们需要为用户提供访问商店的途径，因此请为主屏幕添加一个按钮以及相关代码，以展示新的视图控制器（`UFOStoreViewController`）。\n\
  \n### 获取产品列表\n\n修改新商店视图控制器的 `viewDidLoad` 和 `viewDidUnload` 方法，使用在 iTunes Connect\
  \ 中设置的产品标识符发起新的商店请求。你可能需要修改产品标识符，使其与你之前设置的一致。\n\n```\n- (void)viewDidLoad\n{\n \
  \   [super viewDidLoad];\n    NSSet *productIdentifiers = [NSSet setWithObjects:\n\
  \        @\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\"\
  , nil];\n    productsRequest = [[SKProductsRequest alloc]\n        initWithProductIdentifiers:productIdentifiers];\n\
  \    productsRequest.delegate = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n\
  {\n    productsRequest.delegate = nil;\n}\n```\n\n产品请求在下一步展示的委托回调中释放。目前，此方法仅将产品信息打印至控制台，并记录任何无效产品。\n\
  \n```\n- (void)productsRequest:(SKProductsRequest *)request\n    didReceiveResponse:(SKProductsResponse\
  \ *)response\n{\n    NSArray *productArray= [response products];\n    for (SKProduct\
  \ *product in productArray) {\n        NSLog(@\"Product title: %@\" , product.localizedTitle);\n\
  \        NSLog(@\"Product description: %@\" , product.localizedDescription);\n \
  \       NSLog(@\"Product price: %@\" , product.price);\n        NSLog(@\"Product\
  \ id: %@\\n\\n\" , product.productIdentifier);\n    }\n    for (NSString *invalidProduct\
  \ in response.invalidProductIdentifiers)\n    {\n        NSLog(@\"Invalid: %@\"\
  \ , invalidProduct);\n    }\n    [request release];\n}\n```\n\n> **注意：** 尽管可以使用本节代码获取无效产品标识符列表，但并没有关联的错误信息来判定产品为何被标记为无效。最常见的原因是产品\
  \ ID 输入错误，或者时间不足，产品尚未分发至服务器。\n\n如果你现在运行游戏并进入商店，应获得类似以下输出：\n\n```\n2011–08-19 17:31:23.970\
  \ UFOs[3580:707] 产品标题：Ship+\n2011–08-19 17:31:23.973 UFOs[3580:707] 产品描述：为飞船涂装并向朋友炫耀\n\
  2011–08-19 17:31:23.975 UFOs[3580:707] 产品价格：8.99\n2011–08-19 17:31:23.977 UFOs[3580:707]\
  \ 产品 ID：com.dragonforged.ufo.newShip1\n2011–08-19 17:31:23.979 UFOs[3580:707] 产品标题：订阅服务\n\
  2011–08-19 17:31:23.981 UFOs[3580:707] 产品描述：一项订阅服务\n2011–08-19 17:31:23.983 UFOs[3580:707]\
  \ 产品价格：1.99\n2011–08-19 17:31:23.987 UFOs[3580:707] 产品 ID：com.dragonforged.ufo.subscription\n\
  ```\n\n> **注意：** 从产品请求获取响应可能需要数秒。最佳实践建议在加载期间向用户显示某种加载指示器。\n\n以上就是从苹果服务器获取产品所需的全部步骤。下一节中，我们将使用标准表格视图向用户展示这些数据。\n\
  \n\n\n### 向用户展示你的产品\n\n首先，在商店视图控制器中添加一个表格视图。别忘了按需连接数据源和委托。我们还需要在类中添加一个新属性来存储产品。创建一个名为\
  \ `productArray` 的新类数组，并在 `productsRequest` 方法中将产品结果赋值给它。\n\n在你的类中添加两个必需的表格视图委托和数据源方法，如下列代码片段所示：\n\
  \n```objc\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return [productArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
  \ *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier] autorelease];\n        cell.selectionStyle = UITableViewCellSelectionStyleNone;\n\
  \    }\n\n    SKProduct *product = [self.productArray objectAtIndex: [indexPath\
  \ row]];\n    cell.textLabel.text = [NSString stringWithFormat:@\"%@ - $%@\", product.localizedTitle,\
  \ product.price];\n    cell.detailTextLabel.text = product.localizedDescription;\n\
  \    return cell;\n}\n```\n\n第一个方法简单地返回从苹果服务器检索到的产品数量，这些产品用于表格的行数。当我们将其显示为单元格时，我们使用内置的\
  \ `UITableViewCellStyleSubtitle`。我们将主标签设置为产品标题和价格，并使用详细标签显示描述。剩下的工作就是在 `productsRequest`\
  \ 方法的末尾添加一个重新加载表格的方法。再次运行游戏时，你的输出应与图 11-11 所示类似。\n\n> **注意：** 虽然 API 返回本地化的标题和描述，但它不会本地化价格。在国际化应用中，你需要自己完成这额外的一步。\n\
  \n![A978-1-4302-4906-1_11_Fig11_HTML.jpg](img/A978-1-4302-4906-1_11_Fig11_HTML.jpg)\n\
  \n**图 11-11.** 在标准表格视图中显示产品列表\n\n## 购买产品\n\n在上一节中，你学习了如何将产品添加到你的应用中。如果没有购买这些产品的功能，我们的实现就只完成了一部分。在本节中，我们将探讨如何通过你的应用直接处理产品购买。\n\
  \n### 购买代码\n\n我们需要做的第一件事是让 `UFOStoreViewController` 类遵循 `SKPaymentTransactionObserver`\
  \ 协议。完成之后，我们修改现有的 `viewDidLoad` 方法。将 `self` 添加为新的交易观察者。此外，我们执行一个测试，确保可以在该设备上进行支付，如果不行，则显示一个\
  \ `UIAlert` 来通知用户。\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\n    if ([SKPaymentQueue\
  \ canMakePayments])\n    {\n        NSSet *productIdentifiers = [NSSet setWithObjects:@\"\
  com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\", nil];\n\
  \        productsRequest = [[SKProductsRequest alloc] initWithProductIdentifiers:productIdentifiers];\n\
  \        productsRequest.delegate = self;\n        [productsRequest start];\n  \
  \  }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:nil\
  \ message:@\"Unable to make purchases with this device.\" delegate:nil cancelButtonTitle:@\"\
  Dismiss\" otherButtonTitles: nil];\n        [alert show];\n        [alert release];\n\
  \    }\n}\n```\n\n接下来，我们需要添加一个 `didSelectRowAtIndexPath` 方法来注册表格视图中的选择事件。\n\n```objc\n\
  - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    SKProduct *product = [self.productArray objectAtIndex: [indexPath\
  \ row]];\n    SKPayment *payment = [SKPayment paymentWithProductIdentifier:product.productIdentifier];\n\
  \    [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\n如果现在运行应用并选择一个表行，你会看到一个确认提示，如图\
  \ 11-12 所示。然而，我们还没有编写任何处理该交易的代码，也没有设置测试用户，所以目前你只能进行到这一步。在快速查看多次购买同一商品的代码之后，我们将进入这些阶段。\n\
  \n![A978-1-4302-4906-1_11_Fig12_HTML.jpg](img/A978-1-4302-4906-1_11_Fig12_HTML.jpg)\n\
  \n**图 11-12.** 在沙盒环境中确认购买\n\n### 购买多个商品\n\n苹果让用户一次购买多个商品变得很简单。以下代码片段可用于一次批量购买多个数量的同一商品，例如用户购买五包\
  \ 100 金币：\n\n```objc\nSKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:com.dragonforged.rpg.100gold];\n\
  payment.quantity = 5;\n[[SKPaymentQueue defaultQueue] addPayment: payment];\n```\n\
  \n\n\n### 处理交易\n\n当用户发起购买请求后，需要执行若干步骤以确保购买成功完成。首先，我们需要实现`SKPaymentTransactionObserver`协议中要求的方法。如下方代码示例所示，我们检测当前交易状态，然后根据交易成功、失败或恢复来调用相应的方法：\n\
  \n```objc\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
  \ *)transactions\n{\n    for (SKPaymentTransaction *transaction in transactions)\n\
  \    {\n        if ([transaction transactionState] == SKPaymentTransactionStatePurchased)\n\
  \        {\n            [self transactionDidComplete:transaction];\n        }\n\
  \        else if ([transaction transactionState] == SKPaymentTransactionStateFailed)\n\
  \        {\n            [self transactionDidFail:transaction];\n        }\n    \
  \    else if ([transaction transactionState] == SKPaymentTransactionStateRestored)\n\
  \        {\n            [self transactionDidRestore:transaction];\n        }\n \
  \       else\n        {\n            NSLog(@\"未处理的情况: %@\", transaction);\n    \
  \    }\n    }\n}\n```\n\n我们需要实现一些便捷方法来简化流程。如果交易成功完成或已恢复，我们需要记录交易事件、解锁用户购买的内容，并执行一些清理工作。如果交易失败或取消，我们只需执行清理操作，并可能通知用户发生了问题。相关代码如下：\n\
  \n```objc\n- (void)transactionDidComplete:(SKPaymentTransaction *)transaction\n\
  {\n    [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
  \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
  }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n    [self\
  \ recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
  \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
  \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
  {\n    if ([[transaction error] code] != SKErrorPaymentCancelled)\n    {\n     \
  \   [self finishTransaction:transaction withSuccess:NO];\n    }\n    // SKErrorPaymentCancelled\n\
  \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
  \    }\n}\n```\n\n现在让我们详细看看调用的每个方法，先从`recordTransactionData`方法开始。该方法的主要目的是为我们的购买行为保留一份虚拟的审计线索。我们使用`NSUserDefaults`来保存所有已处理交易的数组，这样我们可以在将来任意时刻检查交易数据：\n\
  \n```objc\n- (void)recordTransactionData:(SKPaymentTransaction *)transaction\n{\n\
  \    NSArray *transactions = [[NSUserDefaults standardUserDefaults] objectForKey:@\"\
  transactions\"];\n    NSMutableArray *transactionArray = [transactions mutableCopy];\n\
  \    [transactionArray addObject:[transaction transactionReceipt]];\n    [[NSUserDefaults\
  \ standardUserDefaults] setObject:transactionArray forKey:@\"transactions\"];\n\
  \    [transactionArray release];\n}\n```\n\n接下来，看看`unlockContent`方法。这里就是你的应用可能有所不同的地方。在本示例中，我们在`NSUserDefaults`中设置一个标志，用于检查用户是否已购买某个功能。根据应用的结构不同，你可能需要采取不同的方式来解锁内容，但无论采用何种方法，请记住，你需要确保解锁的内容在应用重启后依然保留。请参阅“在\
  \ UFOs 中将所有内容整合在一起”一节，了解如何实现此方法的示例。\n\n```objc\n- (void)unlockContent:(NSString\
  \ *)productId\n{\n    if ([productId isEqualToString:@\"com.dragonforged.ufo.newShip1\"\
  ])\n    {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"\
  shipPlusAvailable\"];\n    }\n    if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"\
  ])\n    {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"\
  subscriptionAvailable\"];\n    }\n}\n```\n\n对于成功和不成功的购买，最后一步都是对交易过程进行一些清理。以下方法中最重要的步骤是调用`finishTransaction`方法。我们还会记录交易结果以供调试。在你调用`finishTransaction`之前，交易将保持开放状态并存在于系统中。\n\
  \n```objc\n- (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success\n\
  {\n    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n    NSDictionary\
  \ *transactionDictionary = [NSDictionary dictionaryWithObjectsAndKeys:transaction,\
  \ @\"transaction\", nil];\n    if (success)\n    {\n        NSLog(@\"交易成功: %@\"\
  , transactionDictionary);\n    }\n    else\n    {\n        NSLog(@\"交易失败: %@\",\
  \ transactionDictionary);\n    }\n}\n```\n\n### 恢复之前完成的交易\n\n通常，用户需要恢复他们之前完成的购买。这可能在用户重新安装应用或在另一台设备上开始使用时发生。始终为用户提供下载所有内容的途径非常重要。幸运的是，Apple\
  \ 已经预见到了这一场景，并提供了一个简单的方法来恢复用户的购买。\n\n```objc\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
  ```\n\n这将重新购买你的所有内容，就像用户从你的商店中选择它们一样。你会收到`paymentQueue:updatedTransactions`方法的相应回调，并可以使用现有的代码来解锁内容。\n\
  \n## 测试账户与测试购买\n\n如果你现在尝试在沙盒环境中购买某个项目，将会收到账户错误。你需要先创建一个新的测试账户，才能在不产生实际费用的情况下测试购买。要设置新的测试用户，你需要登录\
  \ iTunes Connect（[`http://iTunesConnect.apple.com`](http://itunesconnect.apple.com/)）。从\
  \ iTunes Connect 主屏幕选择“管理用户”部分；在这里，选择“新测试用户”选项。\n\n测试用户无需使用真实的电子邮件地址，你应选择输入方便且容易记住的内容，例如`abc@def.com`。虽然你需要输入出生日期和其他身份信息，但完全可以虚构这些数据。请确保选择与测试应用本地化版本相对应的\
  \ iTunes Store。你可以为每个要测试的地区创建一个新账户。\n\n### 使用测试账户登录\n\n你不能直接在“设置”应用中登录测试账户。如果这样做，你将被迫同意标准用户协议，并提示输入信用卡号。为了解决这个问题，你需要使用“设置”应用退出当前的\
  \ iTunes 账户。退出账户后，在尝试购买时会提示你登录或创建新账户。此时你就可以输入测试账户的凭据。\n\n**注意：** 如果你在主要设备上进行测试，在进行真实购买或下载更新前，别忘了重新打开“设置”应用并退出测试账户。\n\
  \n\n\n#### 提交购买界面截图\n\n我们在本章前面简要讨论过这一步骤。苹果要求你在应用内购买项目获得销售许可之前，先提交一张截图。关于苹果具体需要这张截图展示什么，存在一些困惑。\n\
  \n简单来说，苹果希望你能提供一张屏幕截图，证明你的应用内购买功能按预期工作。对于可解锁内容，这应该是一张正在使用该项目的截图，比如用户正在玩已购买的游戏关卡，或正在使用已购买的道具。然而，有时候你的产品在使用时可能并不可见。在这种情况下，苹果接受一张商店界面显示该项目已被购买的截图，如图\
  \ 11-13 所示。\n\n**注意：** 你需要等到完成应用的编写和调试，并准备提交审核时，才需要提交截图。\n\n![A978-1-4302-4906-1_11_Fig13_HTML.jpg](img/A978-1-4302-4906-1_11_Fig13_HTML.jpg)\n\
  \n*图 11-13.* 当没有可截取的使用中画面时，一张可被接受的应用内购买截图示例。\n\n**注意：** 苹果在审核过程中测试应用内购买时，会使用沙盒账户。这意味着提交给苹果的应用需要同时支持沙盒环境和生产环境。\n\
  \n#### 开发者批准\n\n在应用内购买项目准备就绪之前的最后一步是获得开发者批准。回到网页浏览器中的 iTunes Connect，导航至应用审核页面的“管理应用内购买”部分。屏幕右上角会出现一个新的绿色按钮。\n\
  \n系统会提示你如何提交产品。有以下两种选项：\n\n-   **随二进制文件提交：** 此选项将在你下次上传二进制文件时启用应用内购买功能。\n-   **立即提交：**\
  \ 此选项允许你向现有应用提交新产品。\n\n**注意：** 如果你看到“随新二进制文件提交”选项，可能是因为你的上一个应用版本是在 iOS 3.0 引入应用内购买功能之前上传的。\n\
  \n#### 收据\n\n当你成功完成一笔交易时，你会收到一张收据，作为已完成的交易对象的一部分。以下是我们 UFOs 演示项目中一次购买的收据样本。\n\n\
  ```\n{\n\"signature\" = \"\"\
  ;\n\"purchase-info\" = \"\"\
  ;\n\"environment\" = \"Sandbox\";\n\"pod\" = \"100\";\n\"signing-status\" = \"0\"\
  ;\n}\n```\n\n苹果强烈建议开发者检查此收据的有效性。虽然这一步骤仍是可选的，但进行检查可以增加一层安全保障，防止用户在不付费的情况下激活你的应用内购买。苹果提供了两个用于验证收据的服务器：一个用于沙盒环境，另一个用于正式发布软件，如表\
  \ 11-1 所述。\n\n*表 11-1.* 用于向苹果验证收据的服务器地址\n\n| 环境 | 服务器地址 |\n| --- | --- |\n| 沙盒 |\
  \ [`sandbox.itunes.apple.com`](http://sandbox.itunes.apple.com) |\n| 生产环境 | [`buy.itunes.apple.com`](http://buy.itunes.apple.com)\
  \ |\n\nJoe D’Andrea 在 Stack Overflow ( [`http://stackoverflow.com/questions/1298998`](http://stackoverflow.com/questions/1298998)\
  \ ) 上发布了两种方法来帮助你检查有效收据。他的方法简洁高效，为了方便您使用，我已将其收录在此。\n\n```objc\n-(BOOL)verifyReceipt:(SKPaymentTransaction\
  \ *)transaction\n{\n    NSString *jsonObjectString = [self encode:(uint8_t *)transaction.transactionReceipt.bytes\
  \ length:transaction.transactionReceipt.length];\n    NSString *completeString =\
  \ [NSString stringWithFormat:@\"http://url-for-your-php?receipt=%@\", jsonObjectString];\n\
  \    NSURL *urlForValidation = [NSURL URLWithString:completeString];\n    NSMutableURLRequest\
  \ *validationRequest = [[NSMutableURLRequest alloc] initWithURL:urlForValidation];\n\
  \    [validationRequest setHTTPMethod:@\"GET\"];\n    NSData *responseData = [NSURLConnection\
  \ sendSynchronousRequest:validationRequest returningResponse:nil error:nil];\n \
  \   [validationRequest release];\n    NSString *responseString = [[NSString alloc]\
  \ initWithData:responseData encoding:NSUTF8StringEncoding];\n    NSInteger response\
  \ = [responseString integerValue];\n    [responseString release];\n    return (response\
  \ == 0);\n}\n\n- (NSString *)encode:(const uint8_t *)input length:(NSInteger)length\n\
  {\n    static char table[] = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\"\
  ;\n    NSMutableData *data = [NSMutableData dataWithLength:((length + 2) / 3) *\
  \ 4];\n    uint8_t *output = (uint8_t *)data.mutableBytes;\n    \n    for (NSInteger\
  \ i = 0; i < length; i += 3) {\n        NSInteger value = 0;\n        for (NSInteger\
  \ j = i; j < (i + 3); j++) {\n            value <<= 8;\n            if (j < length)\
  \ {\n                value |= (0xFF & input[j]);\n            }\n        }\n   \
  \     NSInteger index = (i / 3) * 4;\n        output[index + 0] = table[(value >>\
  \ 18) & 0x3F];\n        output[index + 1] = table[(value >> 12) & 0x3F];\n     \
  \   output[index + 2] = (i + 1) < length ? table[(value >> 6) & 0x3F] : '=';\n \
  \       output[index + 3] = (i + 2) < length ? table[(value >> 0) & 0x3F] : '=';\n\
  \    }\n    return [[[NSString alloc] initWithData:data encoding:NSASCIIStringEncoding]\
  \ autorelease];\n}\n```\n\n将这两个方法添加到你的项目之后，你只需调用`verifyReceipt`并传入你收到的交易对象，然后执行一个布尔值测试来判断收据是否有效。至此，就完成了验证收据真伪所需的所有步骤。\n\
  \n这种验证收据的方法要求你托管一个中间服务器；以下是一个非常精简的用于验证收据的 PHP 脚本：\n\n```php\n$receipt = json_encode(array(\"\
  receipt-data\" => $_GET[\"receipt\"]));\n// 注意：在生产环境中使用 \"buy\" 替代 \"sandbox\"。\n\
  $url = \"https://sandbox.itunes.apple.com/verifyReceipt\";\n$response_json = call-your-http-post-here($url,\
  \ $receipt);\n$response = json_decode($response_json);\n// 在此处保存数据！\nprint $response->{'status'};\n\
  ```\n\n\n\n### iOS 7 本地收据验证\n\niOS 7 增加了在设备上验证应用内购买收据的功能，而无需通过第三方服务器。服务器收据验证仍然可用，甚至可能根据应用需求更为合适。\n\
  \n苹果建议在调用 `NSApplicationMain` 函数之前，在应用的主函数内验证本地收据。为了验证收据，首先必须定位它。`NSBundle` 包含一个便捷辅助方法，可以为你定位收据。如果未找到收据，则验证失败。\n\
  \n`[[NSBundle mainBundle] appStoreReceiptURL];`\n\n定位到收据后，需要检查以确保它已由苹果正确签名。苹果在《收据验证编程指南》中提供了验证收据签名的示例代码。此处转载该示例代码以便查阅。该代码将使用\
  \ OpenSSL 验证收据的签名。\n\n```\n/* PKCS #7 容器（收据）和验证输出。 */\nBIO *b_p7;\nPKCS7 *p7;\n\n\
  /* 苹果根证书，以原始数据及其 OpenSSL 表示形式。 */\nBIO *b_x509;\nX509 *Apple;\n\n/* 用于信任链验证的根证书。\
  \ */\nX509_STORE *store = X509_STORE_new();\n\n/* ... 使用 BIO_new_mem_buf() 函数并传入缓冲区及其大小来初始化两个\
  \ BIO 变量 ... */\n\n/* 将 b_out 初始化为输出 BIO，用于保存在签名验证期间提取的收据负载。 */\nBIO *b_out = BIO_new(BIO_s_mem());\n\
  \n/* 捕获收据文件的内容，并将 p7 变量填充为 PKCS #7 容器。 */\np7 = d2i_PKCS7_bio(b_p7, NULL);\n\n/*\
  \ ... 将苹果根证书加载到 b_X509 中 ... */\n\n/* 将 b_x509 初始化为输入 BIO，其值为苹果根证书，并将其加载到 X509 数据结构中。\n\
  \   然后将苹果根证书添加到该结构中。 */\nApple = d2i_X509_bio(b_x509, NULL);\nX509_STORE_add_cert(store,\
  \ Apple);\n\n/* 验证签名。如果验证正确，b_out 将包含 PKCS #7 负载，且 rc 将为 1。 */\nint rc = PKCS7_verify(p7,\
  \ NULL, store, NULL, b_out, 0);\n\n/* 为了增强安全性，你可以验证根证书的指纹，并验证中间证书和签名证书的 OID。\n \
  \  中间证书的证书策略扩展中的 OID 为 (1 2 840 113635 100 5 6 1)，\n   签名证书的标记 OID 为 (1 2 840 113635\
  \ 100 6 11 1)。 */\n```\n\n下一个代码示例将使用 asn1c 解析收据负载。\n\n```\n#include \"Payload.h\"\
  \ /* 此头文件由 asn1c 生成。 */\n\n/* 收据负载及其大小。 */\nvoid *pld = NULL;\nsize_t pld_sz;\n\n\
  /* 用于解析负载的变量。两种数据类型均在 Payload.h 中声明。 */\nPayload_t *payload = NULL;\nasn_dec_rval_t\
  \ rval;\n\n/* ... 将收据文件中的负载加载到 pld 中，并将 pld_sz 设置为负载大小 ... */\n\n/* 使用 asn1c 生成的解码器函数解析缓冲区。\n\
  \   payload 变量将包含收据属性。 */\nrval = asn_DEF_Payload.ber_decoder(NULL, &asn_DEF_Payload,\
  \ (void **)&payload, pld,\n```\n\n以下代码示例提取收据属性。\n\n```\n/* 用于存储收据属性的变量。 */\nOCTET_STRING_t\
  \ *bundle_id = NULL;\nOCTET_STRING_t *bundle_version = NULL;\nOCTET_STRING_t *opaque\
  \ = NULL;\nOCTET_STRING_t *hash = NULL;\n\n/* 遍历收据属性，保存计算 GUID 哈希所需的值。 */\nsize_t\
  \ i;\nfor (i = 0; i < payload->list.count; i++) {\n    ReceiptAttribute_t *entry;\n\
  \    entry = payload->list.array[i];\n    switch (entry->type) {\n        case 2:\n\
  \            bundle_id = &entry->value;\n            break;\n        case 3:\n \
  \           bundle_version = &entry->value;\n            break;\n        case 4:\n\
  \            opaque = &entry->value;\n            break;\n        case 5:\n    \
  \        hash = &entry->value;\n            break;\n    }\n}\n```\n\n接下来，需要将收据的包标识符与应用\
  \ `info.plist` 中的 `CFBundleShortVersionString` 值进行比较。如果这两个标识符不匹配，则验证失败。\n\n然后，验证收据中的版本标识符字符串是否与\
  \ `info.plist` 中 `CFBundleShortVersionString` 的硬编码值匹配。如果这些值不匹配，则验证失败。\n\n最后，检查收据的\
  \ GUID 是否与设备的 GUID 匹配。设备的 GUID 可以通过以下代码获得。同样，如果这两个值不匹配，则验证失败。\n\n`[[UIDevice currentDevice]\
  \ identifierForVendor];`\n\n如果收据已找到且由苹果签名，并且包标识符、版本和 GUID 的值全部匹配，则收据和购买有效。\n\n"
- "# 在 UFOs 中整合所有内容\n\n根据应用内购买的复杂程度，将其集成到代码中可能非常简单或非常困难。在我们的 UFOs 应用中，有一个非常简单的产品，用户支付一次性费用即可解锁不同颜色的飞船。当用户购买该产品时，我们在用户默认设置中存储一个键来反映这一点。要在代码中解锁此购买，我们只需检查该键，然后执行所需步骤。为此，我们需要向项目添加一些新的美术资源。这些已包含在第\
  \ 11 章的示例代码中（可从 Apress 网站获取）。\n\n完成此操作后，我们需要修改 `viewDidLoad` 方法来更改飞船图像。以下代码片段展示了这些更改：\n\
  \n```\n-(void)viewDidLoad\n{\n    purchasedUpgrade = [[NSUserDefaults standardUserDefaults]\n\
  \        boolForKey:@\"shipPlusAvailable\"];\n    CGRect playerFrame = CGRectMake(100,\
  \ 70, 80, 34);\n    myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
  \    myPlayerImageView.animationDuration = 0.75;\n    myPlayerImageView.animationRepeatCount\
  \ = 99999;\n    NSArray *imageArray;\n    if (purchasedUpgrade)\n    {\n       \
  \ imageArray = [NSArray arrayWithObjects:\n            [UIImage imageNamed: @\"\
  Ship1.png\"],\n            [UIImage imageNamed: @\"Ship2.png\"], nil];\n    }\n\
  \    else\n    {\n        imageArray = [NSArray arrayWithObjects:\n            [UIImage\
  \ imageNamed: @\"Saucer1.png\"],\n            [UIImage imageNamed: @\"Saucer2.png\"\
  ], nil];\n    }\n    myPlayerImageView.animationImages = imageArray;\n    [myPlayerImageView\
  \ startAnimating];\n    [self.view addSubview: myPlayerImageView];\n}\n```\n\n##\
  \ 总结\n\n在本章中，我们介绍了 StoreKit 和应用内购买。通过利用 StoreKit，你获得了许多新的应用变现方式，从可扩展内容到为用户提供的特殊升级。你现在应该能够自信地为自己的应用内商店添加各种产品。虽然\
  \ StoreKit 并非 Game Center 或 Game Kit 的直接组成部分，但你无疑会发现应用内商店是你 iOS 软件中一个宝贵的补充。\n\n\
  我们花了一些时间讨论 ngmoco:) 及其在免费增值模式上的实验和成功。你现在应该能够自信地使用 iTunes Connect 以及完全设置应用内购买产品所需的所有操作，以及显示该购买所需的代码。\n\
  \n我们了解了如何处理购买失败以及购买成功的路径。我们还探讨了一些高级主题，例如验证收据和同时进行多次购买。最后，我们看到了如何将整个体验集成到我们的 UFOs\
  \ 演示应用中。\n\n\n\n"
- "# 12. Twitter\n\n## 摘要\n\n让 Twitter 显得无聊且半成品的特点，恰恰是其强大之处。\n\n> ——乔纳森·奇特林，哈佛法学教授\n\
  \nTwitter 于 2006 年 3 月由旧金山湾区的一个小开发团队创建。到 2012 年，其注册用户已超过 5 亿，且增长势头不减。注册用户可以在自己的时间线上发布\
  \ 140 字符的短消息，关注者和公众均可浏览这些消息。苹果在 iOS 5 中开始大力推动社交网络，并宣布添加 Social Framework。首个获得支持的服务是\
  \ Twitter，随后在 iOS 6 中支持了 Facebook。尽管自 iOS 2.0 起苹果就在 iOS 中集成了谷歌地图等第三方软件，但 Twitter\
  \ 的集成标志着一次里程碑。这是首次有第三方应用成为核心系统组件。虽然 Twitter 应用默认并未安装，但用户可以轻松通过 `Settings.app` 安装。\n\
  \n本章将引导您完成将 Twitter 集成到应用中的过程。主要重点是使用内置的 Twitter Composer 以实现快速集成。在“深入使用 Twitter”一节中，还将为在更直接层面使用\
  \ Twitter 提供基础。\n\n## UFO 游戏\n\n与之前的章节不同，本章不会继续基于现有的 UFO 游戏源代码进行开发。相反，我们将从第三章的源代码出发，为其添加\
  \ Twitter 功能。这种风格变化的主要原因是为了精简现有代码库，使项目尽可能易于理解。虽然之前的代码是基于前几章的经验不断构建的，但剩余章节涵盖的主题本质上相互独立。因此，接下来四章（关于\
  \ Twitter、Facebook、Airplay 和游戏控制器）都将基于 UFO 游戏示例代码的早期版本。\n\n我们将在游戏结束后，使用 Twitter\
  \ 将用户分数发布到他们的时间线上。这需要对第三章示例项目中的应用行为做一处更改。`exitAction:` 函数将被更新，以提示用户选择一种 Twitter\
  \ 发布方法，或选择退出返回主菜单：\n\n```\n-(IBAction)exitAction:(id)sender\n{\n    UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"Tweet Score\" message:@\"Do you\n\
  \    want to tweet your score on Twitter?\" delegate:self cancelButtonTitle:@\"\
  Dismiss\"\n    otherButtonTitles:@\"Tweet Composer\", @\"Custom Tweet\", nil];\n\
  \    [alert show];\n    [alert release];\n}\n```\n\n为 `alertView` 设置了一个新的委托方法来处理回调并确定所需执行的操作。用户将看到三个选项（图\
  \ 12-1）。两种 Twitter 方式将在“Tweet Composer”和“Custom Tweets”两节中讨论；“Dismiss”操作将执行 `exitAction:`\
  \ 方法先前的行为，即提交分数并返回主屏幕：\n\n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n     //tweet composer\n    if(buttonIndex == 1) {\n    } else if(buttonIndex\
  \ == 2) {//custom tweet\n    } else if(buttonIndex == 0) {\n        [[self navigationController]\
  \ popViewControllerAnimated: YES];\n        [self.gcManager reportScore:score forCategory:@\"\
  com.dragonforged.ufo.single\"];\n    }\n}\n```\n\n![A978-1-4302-4906-1_12_Fig1_HTML.jpg](img/A978-1-4302-4906-1_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 游戏结束后选择 Twitter 发布选项\n\n## iOS 上的 Twitter\n\n自 2011 年引入以来，Twitter\
  \ 已成为 iOS 不可或缺的一部分。从 iOS 6 开始，Game Center 在合并的 Game Center 视图控制器内添加了共享应用的内置功能。Twitter\
  \ 账户配置可通过 `Settings.app`（图 12-2）进行；截至 iOS 7，尚无法为您的用户提供通过第三方应用（如您的产品）登录的方法。\n\n![A978-1-4302-4906-1_12_Fig2_HTML.jpg](img/A978-1-4302-4906-1_12_Fig2_HTML.jpg)\n\
  \n**图 12-2.** iOS 7 中 Twitter 的配置设置\n\n通过 `Settings.app`，iOS 上的 Twitter 允许用户配置多个账户，但授权是一次性授予所有账户的。首次请求\
  \ Twitter 功能时，每个应用都必须请求访问用户 Twitter 账户的权限。可以在 `Settings.app` 的 Twitter 部分找到当前拥有访问权限的应用列表；用户也可以随时撤销特定应用对\
  \ Twitter 的访问权限。\n\n`Social Framework` 提供了两种将内容发布到用户时间线的方法。Tweet Composer 使用内置图形用户界面，其功能类似于电子邮件编辑器。可以预设消息、附件和\
  \ URL，但用户在发送推文前可以修改文本；此方法将在“Tweet Composer”一节中描述。您还可以使用更定制化的方法，允许您通过自定义用户界面发送推文；此方法可在用户无需事先预览信息的情况下发送推文。此方法将在“Custom\
  \ Tweets”一节中描述。\n\n\n\n### Tweet Composer\n\nTweet Composer（图 12-3）是允许用户向 Twitter\
  \ 发布状态的最简单方法。它提供了一个大多数用户已经熟悉的界面，并包含轻松包含图片、URL、位置和多个账户的控件和功能。主要缺点是用户需要自己阅读和发布推文内容。这意味着当发布像分数这样的项目时（如图\
  \ 12-3 所示），用户可能会输入虚假分数，或者根据自己的意愿修改文本。\n\n![A978-1-4302-4906-1_12_Fig3_HTML.jpg](img/A978-1-4302-4906-1_12_Fig3_HTML.jpg)\n\
  \n图 12-3. Tweet Composer 视图\n\n要开始使用 Tweet Composer，用户必须执行测试以确保其设备兼容。导致`isAvailableForServiceType`失败的最常见原因是用户尚未设置\
  \ Twitter 账户或未通过`Settings.app`登录：\n\n`[SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter]`\n\
  \n**注意**：在开始使用 Twitter Composer 之前，不要忘记引入`Social.Framework`并导入`social/Social.h`。\n\
  \n一旦确认设备上 Twitter 可用且已正确登录，就可以创建新的`SLComposeViewController`。在本示例中，我们将指定`SLServiceTypeTwitter`，但其他类型也可用。在第\
  \ 13 章中我们将使用 Facebook，而`SLComposeViewController`从 iOS 7 开始也支持新浪微博、腾讯微博和 LinkedIn\
  \ 的社交网络。\n\n`SLComposeViewController *tweetController = [SLComposeViewController\
  \ composeViewControllerForServiceType:SLServiceTypeTwitter];`\n\n创建用于处理`SLComposeViewController`完成的新块。在示例应用中，两种完成情况下都会将最高分发布到\
  \ Game Center，并将用户返回主菜单。\n\n```\nSLComposeViewControllerCompletionHandler myBlock\
  \ = ^(SLComposeViewControllerResult result)\n{\nif (result == SLComposeViewControllerResultCancelled)\
  \ {\nNSLog(@\"Tweet Controller Canceled\");\n[[self navigationController] popViewControllerAnimated:\
  \ YES];\n[self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n} else {\nNSLog(@\"Tweet Controller Done\");\n[[self navigationController] popViewControllerAnimated:\
  \ YES];\n[self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n}\n[tweetController dismissViewControllerAnimated:YES completion:nil];\n};\n\
  ```\n\n新创建的块被设置为`SLComposeViewController`上的`completionHandler`属性：\n\n`tweetController.completionHandler\
  \ = myBlock;`\n\n现在可以为 Tweet Composer 可选地设置默认值；这些值将预填充到 Composer 中供用户使用。有三个可用的值：`setInitialText:`\
  \ 将向用户提供推文文本，请记住有 140 个字符的限制。使用`addImage:`可以添加图片；这将为`UIImage`提供一个 Twitpic URL，该\
  \ URL 将在提交推文时上传。最后，`addURL:`提供了添加 URL 的功能。\n\n```\n[tweetController setInitialText:[NSString\
  \ stringWithFormat: @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\", score]];\n\
  [tweetController addImage:[UIImage imageNamed:@\"Cow1.png\"]];\n[tweetController\
  \ addURL:[NSURL URLWithString:@\"http://bit.ly/19ak0Uv\"]];\n```\n\n自定义 Tweet Composer\
  \ 后，像呈现其他模态视图一样呈现给用户：\n\n`[self presentViewController:tweetController animated:YES\
  \ completion:nil];`\n\n当用户发送推文时，之前的块被调用，并执行指定的回调操作。用户还会听到一个简短的推文音效，以告知推文已成功发送。最终的推文产品可以在图\
  \ 12-4 中看到，该图截取自 Twitter 网站。\n\n![A978-1-4302-4906-1_12_Fig4_HTML.jpg](img/A978-1-4302-4906-1_12_Fig4_HTML.jpg)\n\
  \n图 12-4. 在 Twitter.com 上看到的来自 UFOs 应用的推文\n\n\n\n### 自定义推文\n\n在许多情况下，可能需要通过自定义用户界面或完全无需用户界面来发布推文。iOS\
  \ 将此功能作为账户框架的一部分提供。虽然基于账户的 Twitter 发布方法稍微复杂一些，并且需要用户明确授予应用程序权限，但它比前面讨论的推文编辑器提供了更多的自定义性和灵活性。\n\
  \n**注意：** 在处理自定义推文时，请确保包含 `Accounts.framework` 并导入 `accounts/Accounts.h`。\n\n与使用推文编辑器不同，在处理账户时，首先需要做的是创建一个推文来源账户的引用。这是通过创建一个新的\
  \ `ACAccountStore` 和一个新的 `ACAccountype` 来实现的，如下面的代码片段所示：\n\n```\nACAccountStore\
  \ *account = [[[ACAccountStore alloc] init] autorelease];\nACAccountType *accountType\
  \ = [account accountTypeWithAccountTypeIdentifier: ACAccountTypeIdentifierTwitter];\n\
  ```\n\n一旦指定了账户类型，用户需要授予应用程序与该账户交互的权限。在新创建的 `ACAccountStore` 上调用 `requestAccessToAccountsWithType:`\
  \ 即可实现此功能：\n\n```\naccount requestAccessToAccountsWithType:accountType options:nil\
  \ completion:^(BOOL granted, NSError *error)\n```\n\n系统将提示用户允许应用程序访问，如图 12-5 所示。\n\
  \n![A978-1-4302-4906-1_12_Fig5_HTML.jpg\n\n**图 12-5.** 被提示允许访问设备上的 Twitter 账户\n\n\
  `granted` 变量的值将反映用户是否同意允许应用程序访问他们的 Twitter 信息。此权限使应用程序能够完全访问账户，包括发布推文以及读取好友和时间线历史等信息。\n\
  \n用户可能在设备上设置了多个 Twitter 账户，因此能够确定用户想从哪个账户发布推文非常重要。可以使用 `accountsWithAccountType:`\
  \ 获取用户账户的数组，对于示例应用程序，默认将使用数组中的最后一个账户：\n\n```\nNSArray *accounts = [account accountsWithAccountType:accountType];\n\
  ```\n\n根据推文是否包含附加图片，需要使用两个不同的端点。如果推文被发布到错误的端点，会静默失败。对于包含图片数据的推文，端点是 `https://upload.twitter.com/1/statuses/update_with_media.json`；而不包含图片数据的推文应发布到\
  \ `http://api.twitter.com/1/statuses/update.json`。以下示例演示了如何选择并存储正确的端点：\n\n```\n\
  NSURL *requestURL = nil;\nif (hasAttachment) {\n    requestURL = [NSURL URLWithString:@\"\
  https://upload.twitter.com/1/statuses/update_with_media.json\"];\n} else {\n   \
  \ requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
  ];\n}\n```\n\n一旦确定了正确的端点，就创建一个新的 `SLRequest`。`SLRequest` 对象在处理社交框架和基于账户的方法时，会完成所有繁重的工作。它为与受支持的第三方\
  \ API 通信提供了一个封装器。服务类型设置为 `SLServiceTypeTwitter`，并选择 POST 方法。设置之前确定的 URL，最后将其他参数设置为\
  \ nil：\n\n```\nSLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\
  \ requestMethod:SLRequestMethodPOST URL:requestURL parameters:nil];\n```\n\n在将 `SLRequest`\
  \ 提交到 Twitter 服务器之前，必须首先配置其元数据，以提供推文文本和任何可能附件的信息。推文格式的规范来自官方 Twitter API 文档。关于 API\
  \ 交互的具体细节，请参阅 `https://dev.twitter.com/docs/api`。推文文本被编码为 `NSData`，并使用标识名称 `\"status\"\
  ` 和类型 `\"multipart/form-data\"` 进行提交。\n\n```\nNSString *text = [NSString stringWithFormat:\
  \ @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\", score];\nNSData *textData\
  \ = [text dataUsingEncoding:NSUTF8StringEncoding];\n[postRequest addMultipartData:textData\
  \ withName:@\"status\" type:@\"multipart/form-data\" filename:nil];\n```\n\n如果你想为推文提供图片附件，可以使用以下方法。这将在上传过程中将图片提交到\
  \ Twitpic：\n\n```\nNSData *imageData = UIImageJPEGRepresentation([UIImage imageNamed:@\"\
  Saucer1.png\"], 1.0);\n[postRequest addMultipartData:imageData withName:@\"media\"\
  \ type:@\"image/jpg\" filename:@\"Image.jpg\"];\n```\n\n在提交推文之前，需要告知 `SLRequest`\
  \ 该推文将发送到哪个账户，因为 `SLRequest` 一次只支持发布到一个账户。这种方法还可以让用户在发布前有机会查看和修改推文。我们通过将 `SLRequest`\
  \ 的 `account` 属性设置为之前从数组中检索到的 Twitter 账户来提供此信息：\n\n```\npostRequest.account = twitterAccount;\n\
  ```\n\n一旦提供了账户和元数据，就可以发布推文了。在 `postRequest` 上调用 `performRequestWithHandler` 方法，并提供一个用于回调的\
  \ block。如果帖子成功提交，返回的状态码将是 200。其他错误代码表示出错；W3C（万维网联盟）维护了一个标准化的错误代码及其含义列表，网址为 `http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`。由于结果是通过\
  \ block 返回的，因此使用一个便捷方法将结果发布给用户（图 12-6）。与编辑器不同，此方法在成功时不会为用户播放声音，也没有任何其他指示表明推文已成功发布。\n\
  \n```\n[postRequest performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\
  \ *urlResponse, NSError *error) {\n    if (error != nil) {\n        [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
  \ withObject:[NSString stringWithFormat: @\"一个错误发生了：%@\", [error localizedDescription]]\
  \ waitUntilDone:NO];\n    }\n    if ([urlResponse statusCode] == 200) {\n      \
  \  [self performSelectorOnMainThread:@selector(displayAlertWithString:) withObject:@\"\
  推文已成功发布\" waitUntilDone:NO];\n    }\n}];\n```\n\n![A978-1-4302-4906-1_12_Fig6_HTML.jpg](img/A978-1-4302-4906-1_12_Fig6_HTML.jpg)\n\
  \n**图 12-6.** 通知用户自定义推文已成功发布\n\n\n\n### 深入探索 Twitter\n\n虽然发布推文功能已能满足多数游戏的需求，但有时你的应用可能需要获取用户的好友列表或访问其时间线数据。`SLRequest`\
  \ 方法为这些更高级的功能提供了访问途径。本节将简要演示这两个主题。\n\n若要获取用户最近五十条推文，可执行以下方法：\n\n```\nNSURL *requestURL\
  \ = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/home_timeline.json\"\
  ];\nNSDictionary *options = @{@\"count\" : @\"50\",@\"include_entities\" : @\"1\"\
  };\nSLRequest *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\
  \ requestMethod:SLRequestMethodGET URL:requestURL parameters:options];\npostRequest.account\
  \ = twitterAccount;\n```\n\n若要获取用户的好友列表，可以使用以下方法：\n\n```\nNSURL *requestURL = [NSURL\
  \ URLWithString:@\"https://api.twitter.com/1.1/friends/list.json\"];\nSLRequest\
  \ *postRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter requestMethod:SLRequestMethodGET\
  \ URL:requestURL parameters:nil];\nrequest.account = self.twitterAccount;\n```\n\
  \n在 API 层面与 Twitter 交互，可以完全访问 Twitter SDK。这种直接访问方式让你的应用能够超越单纯的推文发布，与 Twitter 进行更深入的互动。例如，应用可以拉取用户所有好友的列表，或下载用户的头像用于游戏。\n\
  \n`SLRequest` 的唯一限制在于它所交互的第三方 API 会不断演变。有关 `SLRequest` 和 Twitter 更多功能的详细信息，请参阅官方\
  \ Twitter API 文档：[`dev.twitter.com/docs/api`](https://dev.twitter.com/docs/api)。\n\
  \n## 本章小结\n\n在本章中，你学习了 Social Framework 和 Accounts Framework，以及如何利用它们与 Twitter API\
  \ 进行交互。我们涵盖了使用内置推文编辑器发布推文，以及使用自定义界面发布推文的方法。最后，我们简要介绍了通过 `SLRequest` 和 Twitter API\
  \ 实现的其他功能，例如获取好友列表和时间线历史记录。现在，你应该已经能够完全自如地为下一个应用或游戏添加 Twitter 功能。`SLRequest` 会持续适应\
  \ Twitter API 的更新，这意味着即使 iOS 未发布新版本，社交网络也可能出现令人兴奋的新功能。下一章我们将探索 Facebook 功能，它将拓展你在本章学到的社交网络知识。\n\
  \n"
- "# 13. Facebook\n\n摘要\n\n> “想想人们如今在 Facebook 上做什么。他们与朋友和家人保持联系，同时也在为自己构建形象和身份——从某种意义上说，这就是他们的个人品牌。他们在与自己想要连接的受众建立联系。现在如果不用\
  \ Facebook，几乎可以说是一种劣势。”\n\n> ——马克·扎克伯格\n\nFacebook 成立于 2004 年 2 月，是西方世界最受欢迎的社交网络服务，拥有超过十亿活跃用户。Facebook\
  \ 已与现代文化和社会紧密交织，甚至催生了一部关于其不光彩历史的大制作电影。\n\n自移动设备在 2007 年开始普及以来，Facebook 一直是移动软件的核心组成部分，最初以移动版网站形式出现，并迅速转变为每个主流平台的原生服务。早在\
  \ iOS 2 时代，Facebook 的 API 就已可用，最初称为 Facebook Connect。随着 iOS 6 的推出，Facebook 的 API\
  \ 服务成为 iOS SDK 的内置组件。Facebook 功能是对最初为 iOS 5 引入、用于支持 Twitter 的 Social Framework 的扩展。\n\
  \n## 关于示例项目\n\n从第 12 章到本书结尾，示例代码不再基于之前的章节构建。本项目将是第 3 章示例项目的扩展；如果你打算跟随示例项目操作，请从该章的\
  \ Xcode 项目开始修改。\n\n当用户退出游戏并获得最终得分后，系统会提示他们选择是否将该分数发布到自己的 Facebook 主页，可以使用内置编辑器或编程式\
  \ API 方式。用户也可以选择不分享分数并返回主菜单视图。为实现这一更改，`exitAction:` 方法被修改为通过 `UIAlert` 向用户呈现这些选项。\n\
  \n```\n-(IBAction)exitAction:(id)sender;\n{\n    UIAlertView *alert = [[UIAlertView\
  \ alloc]\n    initWithTitle:@\"Facebook 分数\" message:@\"是否要将分数发布到您的 Facebook 主页？\"\
  \n    delegate:self cancelButtonTitle:@\"取消\"\n    otherButtonTitles:@\"Facebook\
  \ 编辑器\", @\"自定义发布\",\n    nil];\n    [alert show];\n    [alert release];\n}\n```\n\
  \n`alert` 视图的代理也被配置为处理包含用户选择的回调。如果用户选择不在 Facebook 上分享分数，则将分数提交给 Game Center，并返回主菜单视图。\n\
  \n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n     //Facebook 编辑器\n    if(buttonIndex == 1)\n    {\n    }\n    //自定义发布\n  \
  \  else if(buttonIndex == 2)\n    {\n    }\n    else if(buttonIndex == 0)\n    {\n\
  \        [[self navigationController] popViewControllerAnimated: YES];\n       \
  \ [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n    }\n}\n```\n\n## iOS 上的 Facebook\n\n当 Twitter 作为 iOS 5 中 Social Framework\
  \ 的一部分被宣布时，许多人疑惑为什么没有同时包含 Facebook。苹果在 iOS 6 中解决了这个问题。与 Twitter 类似，Facebook 的设置需在“设置”应用内完成（图\
  \ 13-1）；用户无法直接从第三方应用登录。Facebook 配置还支持将日历和联系人与其 iOS 原生版本同步。虽然 Twitter 允许用户同时登录多个账户，但在\
  \ iOS 7 中，Facebook 一次只能链接一个账户。\n\n![A978-1-4302-4906-1_13_Fig1_HTML.jpg](img/A978-1-4302-4906-1_13_Fig1_HTML.jpg)\n\
  \n图 13-1. iOS 7 上 Facebook 的配置设置\n\n在应用中通过 Social Framework 发布内容到 Facebook 有两种系统实现方式。第一种是使用\
  \ `SLComposeViewController`，这在“Facebook 编辑器”一节中有描述。这是最容易实现的方式，用户将看到一个标准、熟悉的界面。第二种方式是使用\
  \ `SLRequest` 直接与 Facebook SDK 交互，这在“Facebook 权限”和“自定义 Facebook 发布”部分有介绍。与使用编辑器相比，使用\
  \ `SLRequest` 涉及多层认证和各种潜在问题；而编辑器则无需用户提供额外的认证或权限。\n\n\n\n### Facebook 分享器\n\nFacebook\
  \ 分享器（图 13-2）是最简单的方式，让用户从你的应用向他们的 Facebook 涂鸦墙发布信息。它提供了选择相册、设置位置、附加图片以及指定可见范围的选项，无需额外配置。此外，它也不需要\
  \ `SLRequest` 方法所需的两个额外权限请求。\n\n![A978-1-4302-4906-1_13_Fig2_HTML.jpg](img/A978-1-4302-4906-1_13_Fig2_HTML.jpg)\n\
  \n图 13-2.\n\nFacebook 分享器视图\n\n> **注意：** 在使用 Facebook 分享器之前，别忘了引入 `Social.Framework`\
  \ 并导入 `social/Social.h`。\n\n在使用 Facebook 分享器之前，我们的代码会进行兼容性测试，以确保设备支持 Facebook 发布，并且已正确设置并登录了账户。\n\
  \n`[SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook]`\n\n\
  如果此调用返回 `NO`，最常见的原因是用户尚未在“设置”应用中设置 Facebook 账户。一旦确认所有内容已在 Facebook 中正确配置，就会创建一个新的\
  \ `SLComposeViewController`，并将其服务类型设置为 `SLServiceTypeFacebook`。\n\n`SLComposeViewController\
  \ *facebookController = [SLComposeViewController composeViewControllerForServiceType:\
  \ SLServiceTypeFacebook];`\n\n系统会创建一个新的代码块来处理分享器视图的结果。示例项目处理了两种情况：取消发布和其他所有事件。在这两种情况下，分数都会提交到游戏中心，并且分享器视图会被关闭。\n\
  \n```\nSLComposeViewControllerCompletionHandler myBlock = ^(SLComposeViewControllerResult\
  \ result)\n{\n    if (result == SLComposeViewControllerResultCancelled)\n    {\n\
  \         NSLog(@\"Facebook 分享器已取消\");\n    }\n    else\n    {\n        NSLog(@\"\
  Facebook 分享器已完成\");\n    }\n\n    [[self navigationController] popViewControllerAnimated:\
  \ YES];\n    [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
  ];\n    [facebookController dismissViewControllerAnimated:YES completion:nil];\n\
  };\n```\n\n这个新创建的代码块会被设置到 `facebookController` 的 `completionHandler` 属性上：\n\n`facebookController.completionHandler\
  \ = myBlock;`\n\n有若干属性可以提供给分享器视图显示，首先是显示在分享控制器中的初始文本。请记住，用户可以在发布之前进入并更改这些值。一个可选的\
  \ `UIImage` 也可以附加到发布内容中，它将作为上传的图片出现在 Facebook 上。最后，可以使用 `addURL:` 方法向发布内容添加一个 URL。\n\
  \n```\n[facebookController setInitialText:[NSString stringWithFormat: @\"我刚刚在 UFO\
  \ 中为 iPhone 绑架了 %0.0f 头奶牛！\", score]];\n[facebookController addImage:[UIImage imageNamed:@\"\
  Cow1.png\"]];\n[facebookController addURL:[NSURL URLWithString:@\"http://bit.ly/19ak0Uv\"\
  ]];\n```\n\n一旦分享器视图配置完成，就可以使用以下代码片段将其呈现给用户：\n\n`[self presentViewController:facebookController\
  \ animated:YES completion:nil];`\n\n当发布内容成功发送后，它会播放 iOS 中标准的发送邮件声音，告知用户操作已成功完成。此发布的结果如图\
  \ 13-3 所示，可在 Facebook 网站上看到。\n\n![A978-1-4302-4906-1_13_Fig3_HTML.jpg](img/A978-1-4302-4906-1_13_Fig3_HTML.jpg)\n\
  \n图 13-3.\n\n在 Facebook 网站上查看的 Facebook 分享器发布结果\n\n### Facebook 应用\n\n每个需要与 Facebook\
  \ API 交互的应用都必须有一个关联的 Facebook 应用。（如果你的应用使用的是前面描述的 Facebook 分享器方式，则不需要创建一个专用的 Facebook\
  \ 应用。）你通过 Facebook 开发者门户（ [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)\
  \ ）创建一个新的 Facebook 应用，如图 13-4 所示。\n\n![A978-1-4302-4906-1_13_Fig4_HTML.jpg](img/A978-1-4302-4906-1_13_Fig4_HTML.jpg)\n\
  \n图 13-4.\n\n从 Facebook 开发者门户创建新的 iOS 应用\n\n一旦创建了 Facebook 应用，你需要获取其应用 ID（图 13-5），因为在集成\
  \ Facebook 的过程中，会使用它向 Facebook 服务器标识你的应用。Facebook 还会提供一个应用密钥；但在使用社交框架时不需要它。\n\n\
  ![A978-1-4302-4906-1_13_Fig5_HTML.jpg](img/A978-1-4302-4906-1_13_Fig5_HTML.jpg)\n\
  \n图 13-5.\n\n按照社交框架的要求，将 Facebook 应用配置为原生 iOS 应用\n\n> **注意：** 请确保“原生 iOS 应用”部分下的\
  \ Bundle ID 与 iOS 应用的 `info.plist` 中的 Bundle ID 相匹配。\n\n\n\n### Facebook 权限\n\n\
  Facebook 有一套分层的权限系统，用于访问和发布数据。这意味着，为了获取像发布内容这样的高级权限，你需要先拥有读取等低级权限。\n\n第一组需要请求的权限是通用的个人资料读取权限，这些权限允许应用读取用户的基本个人资料信息，例如姓名、电子邮件和好友列表。还有一个额外的权限用于读取个人主页动态，而要发布动态则需要更多权限。\n\
  \n更为复杂的是，在请求额外权限之前，必须首先获得基本读取权限的授权。无法将所有权限合并到单个调用中。因此，要在用户的时间线上发布内容，需要分别请求两个独立的权限。\n\
  \n**注意**\n\n在本示例项目中，使用了 UFO 的 Facebook ID（`165243936994502`）；在开发过程中，请务必将此值正确更改为你应用的\
  \ Facebook ID。\n\n第一组被请求的权限是基本个人资料读取权限组。请求任何基本属性字段都将授予对整个基本个人资料的访问权限。在下面的示例中，请求了\
  \ `email` 属性。一旦用户批准读取 `email` 属性，应用也将获得读取所有基本个人资料信息以及好友列表的权限。\n\n需要分配并初始化一个新的 `ACAccountStore`，并创建一个标识符为\
  \ `ACAccountTypeIdentifierFacebook` 的新 `ACAccountType`。这将通知 API 你将要使用 Facebook 账户进行操作。\n\
  \n接下来创建一个 `options` 字典；它将包含三对键/值。第一个是 `audience` 键；由于我们此时不会发布新数据，因此该值在这一步骤中并不关键，我们指定为\
  \ `ACFacebookAudienceEveryone`。下一个值是应用 ID，这在之前通过创建新的 Facebook 应用时已确定。最后一对代表请求的权限名称，在示例项目中将是\
  \ `email`。\n\n```\nACAccountStore *accountStore = [[ACAccountStore alloc] init];\n\
  ACAccountType *facebookAccountType = [accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierFacebook];\n\
  NSDictionary *options = @{\n    ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n\
  \    ACFacebookAppIdKey : @\"165243936994502\",\n    ACFacebookPermissionsKey :\
  \ @[@\"email\"]};\n```\n\n参数配置完成后，就可以执行调用：\n\n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType\
  \ options:options completion:^(BOOL granted, NSError *error){}];\n```\n\n接着，系统会提示用户为你的应用授予基本个人资料访问权限，如图\
  \ 13-6 所示。\n\n![A978-1-4302-4906-1_13_Fig6_HTML.jpg](img/A978-1-4302-4906-1_13_Fig6_HTML.jpg)\n\
  \n图 13-6. UFO 请求对 Facebook 账户的基本个人资料访问权限\n\n由于在应用可以请求额外权限之前，需要先获得基本权限的授权，因此可以在用户授予基本个人资料访问权限的响应中，请求发布动态的权限。修改前面基本权限请求的代码块，以允许向用户动态发布内容，如下代码示例所示。\n\
  \n```\n[accountStore requestAccessToAccountsWithType:facebookAccountType options:options\
  \ completion:^(BOOL granted, NSError *error)\n{\n    if (granted)\n    {\n     \
  \   NSLog(@\"基本访问权限已授予\");\n        NSDictionary *secondOptions = @{\n         \
  \   ACFacebookAudienceKey : ACFacebookAudienceEveryone,\n            ACFacebookAppIdKey\
  \ : @\"165243936994502\",\n            ACFacebookPermissionsKey : @[@\"publish_stream\"\
  ]};\n        [accountStore requestAccessToAccountsWithType:facebookAccountType options:secondOptions\n\
  \            completion:^(BOOL granted, NSError *error)\n            {\n       \
  \         if (granted)\n                {\n                    NSLog(@\"扩展访问权限已授予\"\
  );\n                    NSArray *accounts = [accountStore accountsWithAccountType:facebookAccountType];\n\
  \                    self.facebookAccount = [accounts lastObject];\n           \
  \         [self performSelectorOnMainThread:@selector(postFromFacebook) withObject:nil\n\
  \                        waitUntilDone:NO];\n                }\n               \
  \ else\n                {\n                    [self performSelectorOnMainThread:@selector(displayAlertWithString:)\
  \ withObject:error\n                        waitUntilDone:NO];\n               \
  \ }\n            }];\n    }\n    else\n    {\n        NSLog(@\"基本访问权限被拒绝: %@\",\
  \ [error localizedDescription]);\n    }}];\n```\n\n一旦基本访问权限被授予，就会以与初始权限请求相同的方式创建第二个请求，但有一处更改。我们将请求\
  \ `publish_stream` 访问权限，而不是 `email`；这将允许你的应用代表用户发布内容。其余代码处理失败情况并通知用户；请记住，`UIAlert`\
  \ 不能从 block 中显示，因此需要在主线程上调用它们。一旦用户首次为你的应用授予了访问权限，除非他们以后特意移除权限，否则无需再次授予。\n\n\n\n\
  ### 自定义 Facebook 帖子\n\n在获得向用户信息流发布内容的权限后，即可创建自定义帖子。许多场景下，可能需要通过自定义界面来发布帖子到 Facebook。\n\
  \n使用第 12 章讨论的 Accounts 框架，在获得用户许可后，你可以通过自己的界面（甚至无需界面）代表他们发布内容。Accounts 方法比 Facebook\
  \ Composer 更复杂，但提供了更大的自由度。\n\n**注意：** 在处理自定义状态更新时，请确保包含`Accounts.framework`并导入`accounts/Accounts.h`。\n\
  \n因为在请求权限时已创建了`ACAccount`对象，所以无需再创建新对象；但你需要一个指向在请求权限时所创建账户的指针。与第 12 章中的 Twitter\
  \ 类似，Facebook 根据状态更新是否包含媒体（如图像或视频）或仅包含文本，要求使用不同的信息流 URL。当发布不包含图像的状态更新时，URL 应设置为[`https://graph.facebook.com/me/feed`](https://graph.facebook.com/me/feed)。否则，URL\
  \ 需要设置为[`https://graph.facebook.com/me/photos`](https://graph.facebook.com/me/photos)。将帖子发布到错误的\
  \ URL 会导致失败。\n\n```\nBOOL attachedImage = YES;\nNSURL *feedURL = nil;\nif(attachedImage)\n\
  {\n   feedURL = [NSURL URLWithString:\n     @\"https://graph.facebook.com/me/photos\"\
  ];\n}\nelse\n{\n   feedURL = [NSURL URLWithString:\n     @\"https://graph.facebook.com/me/feed\"\
  ];\n}\n```\n\n一旦确定了正确的 URL，就可以设置消息的文本。这是作为参数字典的一部分完成的。创建一个名为`message`的新键，并将其值设置为要发布的文本：\n\
  \n```\nNSDictionary *parameters = [NSDictionary dictionaryWithObject:[NSString stringWithFormat:\n\
  \   @\"I just abducted %0.0f cow(s) in UFOs for iPhone!\", score] forKey:@\"message\"\
  ];\n```\n\n创建一个新的`SLRequest`对象。`SLRequest`对象将包含与 Facebook API 交互所需的所有信息，并为这些调用提供网络封装。服务类型指定为`SLServiceTypeFacebook`，`requestMethod`设置为\
  \ POST。URL 根据是否有媒体附件设置为先前确定的 URL，最后设置先前创建的参数：\n\n```\nSLRequest *feedRequest = [SLRequest\n\
  \   requestForServiceType:SLServiceTypeFacebook\n   requestMethod:SLRequestMethodPOST\n\
  \   URL:feedURL\n   parameters:parameters];\n```\n\n如果状态更新包含附加的图像文件，还需要指定该图像文件。图像数据首先以\
  \ PNG 表示形式转换为`NSData`。然后通过`addMultipartData:`方法将其添加到`SLRequest`中。添加图像时，请确保`withName`和`type`的值与以下代码片段中的完全一致。`filename`属性可以自定义以帮助识别图像。\n\
  \n```\nif(attachedImage)\n{\n   NSData *imageData = UIImagePNGRepresentation([UIImage\n\
  \      imageNamed:@\"Saucer1.png\"]);\n   [feedRequest addMultipartData:imageData\n\
  \      withName:@\"source\" type:@\"multipart/form-data\"\n      filename:@\"Image\"\
  ];\n}\n```\n\n`SLRequest`的`account`属性需要设置为在“Facebook 权限”部分中先前认证的账户。\n\n```\nfeedRequest.account\
  \ = self.facebookAccount;\n```\n\n一旦`SLRequest`完全配置完毕，就可以将其发送到 Facebook 的服务器进行处理和发布。要发布到\
  \ Facebook，请在`SLRequest`对象上调用`performRequestWithHandler`。如果消息被 Facebook 成功处理，它将返回状态码\
  \ 200。任何其他状态码表示失败；完整的 HTTP 响应状态码列表可在[`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)找到。\n\
  \n```\n[feedRequest performRequestWithHandler:^(NSData *responseData,\n   NSHTTPURLResponse\
  \ *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post statusCode: %u\",\
  \ [urlResponse statusCode]);\n   if([urlResponse statusCode] == 200)\n   {\n   \
  \   [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n     \
  \    withObject:@\"Your message has been posted to Facebook\" waitUntilDone:NO];\n\
  \   }\n   else if(error != nil)\n   {\n      [self performSelectorOnMainThread:@selector(displayAlertWithString:)\n\
  \         withObject:error waitUntilDone:NO];\n   }\n}];\n```\n\n该框架在成功发布后不提供任何用户反馈。示例应用为用户提供了一个`UIAlert`，告知他们帖子是否成功，或描述发生的错误。自定义\
  \ Facebook 帖子的结果如图 13-7 所示，该图显示在 Facebook 网站上。请注意，“通过...发布”一行显示的是在 Facebook 开发者门户中设置的应用名称，而使用\
  \ Composer 则仅显示“通过 iOS”。\n\n![A978-1-4302-4906-1_13_Fig7_HTML.jpg](img/A978-1-4302-4906-1_13_Fig7_HTML.jpg)\n\
  \n**图 13-7.** 在 Facebook 网站上看到的自定义 Facebook 帖子结果\n\n## 进一步探索 Facebook\n\n将信息发布到用户主页时间线可以满足大多数游戏的使用场景，无论是发布分数、分享游戏链接，还是炫耀奖励。然而，Facebook\
  \ 是一个庞大的社交平台，可以处理多种类型的请求。\n\n例如，如果你想获取用户的信息流，你可以按以下格式实现一个`SLRequest`。Facebook 时间线以\
  \ JSON 对象的形式返回，并显示在控制台中。\n\n```\nNSURL *feedURL = [NSURL URLWithString:@\"https://graph.facebook.com/me/feed\"\
  ];\nSLRequest *feedRequest = [SLRequest\n   requestForServiceType:SLServiceTypeFacebook\n\
  \   requestMethod:SLRequestMethodGET\n   URL:feedURL\n   parameters:nil];\nfeedRequest.account\
  \ = self.facebookAccount;\n[feedRequest performRequestWithHandler:^(NSData *responseData,\n\
  \   NSHTTPURLResponse *urlResponse, NSError *error)\n{\n   NSLog(@\"Facebook post\
  \ statusCode: %u\", [urlResponse statusCode]);\n   if([urlResponse statusCode] ==\
  \ 200)\n   {\n      NSLog(@\"Facebook Timeline: %@\", [[NSJSONSerialization JSONObjectWithData:responseData\n\
  \         options:NSJSONReadingMutableLeaves error:&error] objectForKey:@\"data\"\
  ]);\n   }\n}];\n```\n\nFacebook API 具有极大的灵活性和功能，并且其更新频率高于 iOS SDK。`SLRequest`是一个透明的封装类，用于与\
  \ Facebook API 交互，因此 Facebook 所做的任何更改都会立即可用。Facebook 的完整功能列表可在其开发者网站上找到：[`https://developers.facebook.com/docs/reference/api/`](https://developers.facebook.com/docs/reference/api/)。\n\
  \n\n\n## 摘要\n\n本章介绍了 iOS 6 中新增的 Facebook 功能。我们从 Facebook 的背景知识以及它如何集成到核心系统开始讲起，进而介绍了如何与\
  \ Facebook API 交互。我们还涵盖了 Facebook Composer，逐步讲解了如何快速简便地为你的应用添加 Facebook 发布支持。最后，本章演示了通过开发者门户创建\
  \ Facebook 应用，以及请求读取和发布到用户时间线所需权限的过程。\n\n你现在应该已经完全能够熟练使用内置的 Composer 或自定义界面来发布状态更新到\
  \ Facebook 了。同时，你也应该对如何使用 Facebook API 实现更高级的功能有了扎实的理解。\n\n"
- "# 14. AirPlay\n\n## 简介\n\nAirPlay 作为 iOS 4.3 的一部分推出，并在 iOS 5.0 中得到了极大增强，它允许与兼容设备共享音频或视频信息。这些设备最常见的是用于视频和音频的\
  \ Apple TV，以及用于音乐播放的、支持 AirPlay 的音响系统。\n\n本章将介绍如何处理 AirPlay 音频，以及如何处理镜像和第二屏技术。从\
  \ iOS 5.0 开始，使用 `MPMoviePlayerController` 或 `UIWebViews` 的应用中，任何视频或音频播放界面上都可以使用\
  \ AirPlay 按钮。\n\nApple 让 AirPlay 成为了 iOS 平台上最容易使用的技术之一。在大多数情况下，在你的应用中支持 AirPlay\
  \ 无需额外编写代码，即使是在最复杂的情况下，也只需要几行代码。\n\n## 内置播放器的 AirPlay\n\n有三个类原生支持 AirPlay 输出：`AVPlayer`、`MPMoviePlayerController`\
  \ 和 `UIWebView`。在播放媒体内容时，AirPlay 默认是开启的；但是，出于版权或其他原因，可能需要修改这种默认行为。\n\n一个 `AVPlayer`\
  \ 对象有一个属性 `allowsAirPlayVideo`，它接受一个布尔值，用于决定是否显示 AirPlay 输出的控件。同样地，`MPMoviePlayerController`\
  \ 类有一个类似的属性，名为 `allowsAirPlay`。最后，`UIWebView` 使用属性 `mediaPlaybackAllowsAirPlay`。在\
  \ `UIWebview` 中禁用或启用 AirPlay 时，请注意内容，内容本身可以专门禁用 AirPlay。\n\n> **注：** AirPlay 在 iOS\
  \ 模拟器中无法工作；此外，只有当本地 AirPlay 设备（例如 Apple TV）可用时，AirPlay 控件才会显示。\n\n### MPNowPlayingInfoCenter\n\
  \n许多支持 AirPlay 的音响系统支持当前播放项目的元数据；这通常是一个 LCD 显示屏，用于显示歌曲名称和艺术家等信息。AirPlay 允许使用 `MPNowPlayingInfoCenter`\
  \ 类来设置这些信息；可以在适用的地方设置这些元数据以供显示。\n\n```\nMPNowPlayingInfoCenter *center = [MPNowPlayingInfoCenter\
  \ defaultCenter];\n\nNSDictionary *songInfo = [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \    @\"Counting Crows\", MPMediaItemPropertyArtist,\n    @\"Rain King\", MPMediaItemPropertyTitle,\n\
  \    @\"August and Everything After\", MPMediaItemPropertyAlbumTitle, nil];\n\n\
  center.nowPlayingInfo = songInfo;\n```\n\n处理播放的物理设备决定了在其显示器上显示哪些项目；然而，`MPNowPlayingInfoCenter`\
  \ 类为几个项目提供了可选值，详情见表 14-1。\n\n**表 14-1.** 设置元数据时 `MPNowPlayingInfoCenter` 的可用常量\n\
  \n| 常量 | 描述 |\n| --- | --- |\n| `MPMediaItemPropertyAlbumTitle` | 一个 `NSString`，表示专辑的名称。\
  \ |\n| `MPMediaItemPropertyAlbumTrackCount` | 一个 `NSNumber`，表示曲目的总数。 |\n| `MPMediaItemPropertyAlbumTrackNumber`\
  \ | 一个 `NSNumber`，表示当前的曲目编号。 |\n| `MPMediaItemPropertyArtist` | 一个 `NSString`，表示艺术家的名称。\
  \ |\n| `MPMediaItemPropertyArtwork` | 一个 `MPMediaItemArtwork` 实例，表示正在播放项目的插图。 |\n\
  | `MPMediaItemPropertyComposer` | 一个 `NSString`，表示作曲家的名称。 |\n| `MPMediaItemPropertyDiscCount`\
  \ | 一个 `NSNumber`，表示光盘的总数。 |\n| `MPMediaItemPropertyDiscNumber` | 一个 `NSNumber`，表示当前的光盘编号。\
  \ |\n| `MPMediaItemPropertyGenre` | 一个 `NSString`，表示流派名称。 |\n| `MPMediaItemPropertyPersistentID`\
  \ | 一个 `NSNumber`，指示正在播放的项目。此标识符在多次启动之间持续存在，但在同步时可能会重置。 |\n| `MPMediaItemPropertyPlaybackDuration`\
  \ | 一个 `NSNumber`，表示当前播放时长的 `NSTimeInterval`（单位：秒）。 |\n| `MPMediaItemPropertyTitle`\
  \ | 一个 `NSString`，表示正在播放项目的名称（例如文件名）。 |\n\n### 响应远程事件\n\n当 AirPlay 正在播放媒体时，处理媒体输出的设备很可能也能接受用户输入，例如切换曲目、暂停、跳过或快进。你的应用响应并正确处理这些事件非常重要。你的应用必须首先让操作系统知道它有兴趣接收这些通知；这可以通过在\
  \ `UIApplication` 单例上调用 `beginRecievingRemoteControlEvents` 来完成：\n\n```\n[[UIApplication\
  \ sharedApplication] beginReceivingRemoteControlEvents];\n```\n\n同样重要的是，当你的应用不再对这些通知感兴趣时，要记得停止接收它们；为此，调用另一个方法\
  \ `endReceivingRemoteControlEvents`，如下所示：\n\n```\n[[UIApplication sharedApplication]\
  \ endReceivingRemoteControlEvents];\n```\n\n有十二种类型的事件可以通知到你的应用。当这些事件发生时，会调用 `remoteControlReceivedWithEvent:`\
  \ 进行处理。以下示例展示了如何处理其中一些事件：\n\n```\n- (void) remoteControlReceivedWithEvent: (UIEvent\
  \ *) receivedEvent\n{\n    if (receivedEvent.type == UIEventTypeRemoteControl)\n\
  \    {\n        switch (receivedEvent.subtype)\n        {\n            case UIEventSubtypeRemoteControlPlay:\n\
  \                [self play];\n                break;\n            case UIEventSubtypeRemoteControlPause:\n\
  \                [self pause];\n                break;\n            case UIEventSubtypeRemoteControlNextTrack:\n\
  \                [self nextTrack];\n                break;\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
  \                [self previousTrack];\n                break;\n        }\n    }\n\
  }\n```\n\n\n\n## 在应用中启用 AirPlay\n\n如果你的应用未使用三种受支持的 AirPlay 类别之一，你仍然可以为用户提供 AirPlay\
  \ 选项。要显示 AirPlay 设备选择器，请使用 `MPVolumeView` 类。在以下代码片段中，音量滑块条被隐藏以仅显示设备选择器；但并没有要求必须隐藏音量滑块。结果如图\
  \ 14-1 所示。\n\n```\nMPVolumeView *volumeView = [[MPVolumeView alloc] initWithFrame:\n\
  CGRectMake(15, 15, 0, 0)];\n[volumeView setShowsVolumeSlider:NO];\n[self.view addSubview:\
  \ volumeView];\n[volumeView release];\n```\n\n![A978-1-4302-4906-1_14_Fig1_HTML.jpg](img/A978-1-4302-4906-1_14_Fig1_HTML.jpg)\n\
  \n图 14-1. 使用 `MPVolumeView` 类启用 AirPlay 选择器（显示在左上角）\n\n注意：要使用 AirPlay 类，应用必须首先通过\
  \ `#import <MediaPlayer/MediaPlayer.h>` 以及 `MediaPlayer.Framework` 导入所需的 Media Player\
  \ 头文件。\n\n系统声音（例如键盘敲击声和提示音）不会通过 AirPlay 扬声器发送；如果你的应用大量使用系统声音，则应将其作为应用正常音频的一部分进行播放，以便通过\
  \ AirPlay 发送。\n\n## AirPlay 屏幕镜像\n\n从 iOS 7 开始，应用无法自行启用 AirPlay 屏幕镜像，必须使用系统工具来启用它。不过，启用镜像功能无需进行额外的开发。\n\
  \n在 iOS 7 中，从屏幕底部向上滑动以调出控制面板，然后选择 AirPlay 按钮。你将可以选择一个支持 AirPlay 的设备。如果该设备支持 AirPlay\
  \ 屏幕镜像（例如 Apple TV），你将看到一个用于启用它的切换开关（图 14-2）。iOS 6 用户应双击 Home 键并在快速应用切换器中向左滑动，以到达播放控件，然后再次向右滑动以调出\
  \ AirPlay 控件，你便能够开启 AirPlay 屏幕镜像。\n\n![A978-1-4302-4906-1_14_Fig2_HTML.jpg](img/A978-1-4302-4906-1_14_Fig2_HTML.jpg)\n\
  \n图 14-2. 通过控制中心在 iOS 7 上启用 AirPlay 屏幕镜像\n\n## 第二屏幕的 AirPlay\n\n在你的应用中，在 iOS 设备和\
  \ AirPlay 设备上显示不同的内容可能是明智的做法。虽然用户仍需要按照上一节所述开启 AirPlay 监控，但你可以为每个屏幕显示完全不同的内容。首先，可以执行一项测试来确定第二屏幕是否可用。\n\
  \n```\nif ([[UIScreen screens] count] > 1)\n```\n\n需要设置对第二屏幕的引用，并且必须创建一个新的窗口。每个屏幕都需要有一个专用的窗口：\n\
  \n```\nUIScreen *secondScreen = [[UIScreen screens] objectAtIndex:1];\nCGRect screenBounds\
  \ = secondScreen.bounds;\nUIWindow * secondWindow = [[UIWindow alloc] initWithFrame:screenBounds];\n\
  secondWindow.screen = secondScreen;\n```\n\n新窗口默认是隐藏的；要在外部显示器上查看该窗口，我们必须首先将其 `hidden`\
  \ 属性设置为 NO：\n\n```\nsecondWindow.hidden = NO;\n```\n\n如果现在运行这段代码，AirPlay 屏幕将显示一个空白的黑色视图，因为第二个窗口没有任何视图需要显示。以\
  \ UFO 游戏为例，我们可以将游戏数据显示到第二屏幕。修改现有的 `playButtonPressed` 方法，使其与以下代码一致：\n\n```\n-(IBAction)playButtonPressed\n\
  {\n    if([self checkForExistingScreenAndInitializeIfPresent])\n    {\n        //\
  \ 使用第二屏幕\n    }\n    else\n    {\n        gameViewController = [[UFOGameViewController\
  \ alloc]  init];\n        gameViewController.gcManager = gcManager;\n        [self.navigationController\
  \ pushViewController: gameViewController animated:YES];\n    }\n}\n```\n\n还需要添加一个新方法来检测并设置第二屏幕；该方法名为\
  \ `checkForExistingScreenAndInitializeIfPresent`，如果检测到第二屏幕则返回布尔值 YES。如果没有第二屏幕，游戏将继续使用单屏幕方式。该方法遵循刚刚展示的检测和显示第二窗口的方法。此外，还创建了一个新按钮来处理\
  \ AirPlay 屏幕上的牵引光束发射；之所以需要这个按钮，是因为 AirPlay 屏幕不支持触摸事件。牵引光束事件通过调用游戏控制器的 `touchesBegan`\
  \ 和 `touchesEnded` 方法来处理。同时创建 `UFOGameViewController`，并将其视图添加到第二个窗口中。\n\n```\n-\
  \ (bool)checkForExistingScreenAndInitializeIfPresent\n{\n    if ([[UIScreen screens]\
  \ count] > 1)\n    {\n        UIScreen *secondScreen = [[UIScreen screens] objectAtIndex:1];\n\
  \        CGRect screenBounds = secondScreen.bounds;\n        UIWindow * secondWindow\
  \ = [[UIWindow alloc] initWithFrame:screenBounds];\n        secondWindow.screen\
  \ = secondScreen;\n        UIButton *button = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \        [button addTarget:self action:@selector(fire)\n            forControlEvents:UIControlEventTouchDown];\n\
  \        [button addTarget:self action:@selector(fireStop)\n            forControlEvents:UIControlEventTouchUpInside\
  \ | UIControlEventTouchUpOutside];\n        [button setTitle:@\"发射！\" forState:UIControlStateNormal];\n\
  \        button.frame = CGRectMake(80.0, 180.0, 160.0, 40.0);\n        [self.view\
  \ addSubview:button];\n        secondWindow.hidden = NO;\n        gameViewController\
  \ = [[UFOGameViewController alloc] init];\n        gameViewController.view.frame\
  \ = screenBounds;\n        gameViewController.gcManager = gcManager;\n        [secondWindow\
  \ addSubview:gameViewController.view];\n        return YES;\n    }\n    return NO;\n\
  }\n```\n\n务必记住，Apple TV 显示屏可能不符合你预期的常规屏幕尺寸，应用元素需要设置为检测它们所出现的边界并相应地进行缩放。将 UFO 游戏显示在连接到宽屏液晶电视的\
  \ Apple TV 上的结果如图 14-3 所示。\n\n![A978-1-4302-4906-1_14_Fig3_HTML.jpg](img/A978-1-4302-4906-1_14_Fig3_HTML.jpg)\n\
  \n图 14-3. 通过 Apple TV 使用 AirPlay 在宽屏电视上运行的 UFO 游戏\n\n## 响应屏幕通知\n\n可能有必要检测外部 AirPlay\
  \ 屏幕的连接和断开。Apple 提供了一组通知，可以处理这些事件并通知你的应用进行妥善处理。要注册这些通知，请实现以下代码：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self selector:@selector(handleScreenDidConnectNotification:)\
  \ name:UIScreenDidConnectNotification object:nil];\n[[NSNotificationCenter defaultCenter]\
  \ addObserver:self selector:@selector(handleScreenDidDisconnectNotification:) name:UIScreenDidDisconnectNotification\
  \ object:nil];\n```\n\n当屏幕断开或连接时，应用应根据需要创建和移除所显示的 `UIScreen`。作为开发者，你全权负责在不使用第二窗口时对其进行清理。\n\
  \n## 总结\n\n本章涵盖了与 AirPlay 相关的所有内容。尽管 AirPlay 是一个相当简单且有限的主题，但这一功能可以为你的游戏增添独特的元素。大多数开发者尚未在其产品中实现自定义的\
  \ AirPlay 游戏元素，而市场对此类功能有明确的需求。Apple 在 2013 年初宣布已售出 1300 万台 Apple TV。成为首批支持并理解 AirPlay\
  \ 能为产品增添价值（当 Apple 将 Apple TV 从副业产品转变为主流产品时）的开发者之一，将使你占据有利地位。\n\n\n\n"
- "# 15. 游戏控制器\n\n## 摘要\n\n我无法信任一个连自己都无法控制的人去控制他人。\n\n> —罗伯特·E·李\n\niOS 游戏控制器在 2013\
  \ 年苹果全球开发者大会（WWDC）上作为 iOS 7 的一部分发布，旨在回应当初 iPhone 于 2007 年发布、2008 年 iPhone 游戏兴起后出现的主要批评之一：缺乏触觉反馈。在无法感知游戏控制键位置的情况下专注于屏幕，这被证明是很困难的。虽然市场上有许多第三方解决方案，从贴在\
  \ iPhone 屏幕上的贴纸到蓝牙控制器，但直到现在，始终缺乏一种通用的游戏输入方法。\n\n主要问题在于，每款游戏都需要支持每种类型的游戏控制器，而所有这些控制器都使用不同的协议。这导致设备种类繁多，每款设备仅支持少数几款游戏。苹果是唯一能够实施并强制执行标准的公司，而这正是它在\
  \ iOS 7 中所做的。新的硬件都将遵循通用协议，使开发者得以专注于软件开发而非设备支持。如果你的游戏支持一款游戏控制器，它就能支持所有控制器。\n\n本章及相关源代码编写于任何游戏控制器进入消费市场之前，尽管控制器的广告已经开始出现（图\
  \ 15-1）。虽然已尽一切努力确保所讨论的技术材料准确无误，但无法保证面对生产硬件时游戏的行为会如预期所示。\n\n![A978-1-4302-4906-1_15_Fig1_HTML.jpg](img/A978-1-4302-4906-1_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 罗技为新型 iOS 7 实体游戏控制器发布的首个广告\n\n## 游戏控制器的类型\n\n游戏控制器主要有两种类型：标准型和扩展型。它们也可能以有线（底座连接器）或无线（蓝牙）型号提供。无论其他物理和布局差异如何，所有控制器都将遵循相同的输入类型。需要注意的是，扩展型控制器比标准型控制器拥有更多的输入控制键。\n\
  \n标准型控制器配备有方向键、四个主按钮（A、B、X 和 Y）、两个肩部按钮（左和右）以及一个暂停按钮。扩展型控制器则拥有标准型控制器的所有按钮，外加第二组肩部按钮和两个方向摇杆。无线控制器还配备一个玩家指示灯\
  \ LED，有四个位置。\n\n> **注意：** 虽然游戏控制器可以为你的 iOS 游戏增加很多功能，但切记它必须是可选的。除了支持游戏控制器外，游戏还必须通过触摸屏或加速度计提供所有必需的功能。\n\
  \n尽管有几家公司宣布了 iOS 游戏控制器，但截至 2013 年 10 月，尚未有任何产品进入消费市场。在宣布 iOS 7 支持游戏控制器时，苹果表示首批硬件将于\
  \ 2013 年秋季面世。\n\n## 连接到游戏控制器\n\n当非无线（底座连接器）控制器连接到设备时，它会自动被检测到。然而，要检测无线控制器，应用程序必须专门开始寻找。示例应用程序在菜单屏幕的左上角添加了一个新按钮，用于切换搜索无线控制器，如图\
  \ 15-2 所示。\n\n> **注意：** 在进行任何游戏控制器特定的调用之前，你首先需要将 `GameController.Framework` 导入到项目中，并包含\
  \ `GameController/GCController.h` 头文件。请记住，游戏控制器仅适用于 iOS 7 及更高版本。\n\n![A978-1-4302-4906-1_15_Fig2_HTML.jpg](img/A978-1-4302-4906-1_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 在现有的 UFO 主屏幕中添加“查找无线控制器”按钮\n\n为“查找无线控制器”按钮创建了一个新的操作。当用户首次点击该按钮时，会调用类方法\
  \ `startWirelessControllerDiscoveryWithCompletionHandler`。第二次切换则会通过类方法 `stopWirelessControllerDiscovery`\
  \ 结束搜索过程。\n\n```\n- (IBAction)findWirelessController:(id)sender\n{\n    findingWirelessController\
  \ = !findingWirelessController;\n    if(findingWirelessController)\n    {\n    \
  \    [GCController startWirelessControllerDiscoveryWithCompletionHandler:^{\n  \
  \          NSLog(@\"无线控制器搜索已完成\");\n        }];\n    }\n    else\n    {\n      \
  \  [GCController stopWirelessControllerDiscovery];\n        NSLog(@\"用户已停止无线控制器搜索\"\
  );\n    }\n}\n```\n\n当检测到新的控制器时，无论是无线连接还是有线连接，都会触发一个通知 `GCControllerDidConnectNotification`。这个通知以及对应的游戏控制器断开连接的通知应尽早注册。在示例项目中，我们在\
  \ `UFOViewController` 类的 `viewDidLoad:` 方法中执行此操作：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self selector:@selector(setupControllers:) name:GCControllerDidConnectNotification\
  \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(setupControllers:)\
  \ name:GCControllerDidDisconnectNotification object:nil];\n```\n\n> **注意：** 当控制器断开连接时，建议游戏自动暂停，以便玩家能够解决控制器问题或返回基于触摸的游戏操作。作为质量保证流程的一部分，请务必测试游戏过程中断开控制器的情况。\n\
  \n收到这些通知后，我们的代码会调用一个新的 `setupControllers:` 方法。该方法允许应用程序随时跟踪哪些控制器已连接，因为可能存在多个控制器。游戏控制器可通过\
  \ `GCController` 对象上的 `controllers` 方法获取；此方法将返回所有已连接控制器的数组。该 `controller` 数组的值也会保存到一个数组属性中，供示例应用程序后续使用。\n\
  \n```\n-(void)setupControllers:(NSNotification *)notif\n{\n    self.gameControllerArray\
  \ = [GCController controllers];\n    if([gameControllerArray count] > 0)\n    {\n\
  \        NSLog(@\"找到游戏控制器数量: %i\",\n              [gameControllerArray count]);\n\
  \    }\n    else\n    {\n        NSLog(@\"未找到游戏控制器\");\n    }\n}\n```\n\n> **注意：**\
  \ 控制器有可能在设置通知之前就被检测到，因此在添加通知时检查控制器数组的内容，以确定当前是否有任何已连接的控制器，这一点非常重要。\n\n一个典型的例子是，用户在游戏控制器连接之前启动了应用程序。应用程序已经注册了游戏控制器的连接事件，本节所述的通知将被触发。\n\
  \n一个反例是，用户在启动应用程序之前已经连接了游戏控制器。在这种情况下，通知不会触发，因为游戏控制器是在配置通知之前连接的。在这种情况下，开发者应手动检测任何已连接的游戏控制器。\n\
  \n\n\n### 通过轮询读取数据\n\n当控制器连接到设备后，需要读取该控制器的输入。在 UFOs 示例应用中，加速度计数据每 0.05 秒读取一次。由于并非所有用户都有游戏控制器，因此在添加游戏控制器支持后，仍需保留此行为。这使得加速度计轮询方法非常适合从游戏控制器读取数据。如果你的游戏没有可以接入的现有循环，可以设置一个简单的\
  \ `NSTimer`。修改 UFOs 中现有的 `motionOccurred:` 方法，以添加游戏控制器功能。\n\n首先，游戏必须判断玩家是否正在使用游戏控制器。它通过检测设备当前是否已连接任何游戏控制器来实现这一点；在你自己的应用程序中，你可能希望给用户提供一个选项。如果连接了多个游戏控制器，则使用数组中的最后一个。在你自己的应用中，允许用户选择他们想要使用的控制器也可能是有益的。创建一个新的\
  \ `Controller` 对象，并将数组中的最后一个控制器存储到其中。\n\nUFOs 游戏有两个主要功能。第一个是启动牵引光束动作，第二个是在屏幕上将飞船从一个位置移动到另一个位置。出于演示目的，控制器上的\
  \ Y 按钮将用于启动牵引光束。由于只要按住按钮，牵引光束就会保持开启状态，我们创建一个 `bool` 来跟踪按钮当前是否被按下。按钮的动作直接传递给 `touchesBegan:`\
  \ 方法，该方法与处理触摸事件时控制牵引光束的方法是同一个。这种方法的好处是，即使连接了控制器，触摸事件仍然有效。由于标准版和扩展版游戏控制器都有 Y 按钮，因此不需要特定的代码来处理不同的控制器。\n\
  \n对于标准控制器，将使用方向键（D-pad）进行移动。然而，扩展版游戏控制器上的拇指摇杆方向键在控制飞船时能提供更好的体验，因此应用将在可用时使用它们。属性\
  \ `extendedGamePad` 控制此选择；如果此值非 nil，则表示已连接扩展控制器。\n\n与 A、B、X 和 Y 按钮类似，方向键的值可以通过 `GCController`\
  \ 对象上的属性访问。但是，方向键针对 X 和 Y 轴返回的是 0.0 到 1.0 的浮点值。该值可以替代未连接游戏控制器时使用的加速度计值。为扩展版游戏控制器的拇指摇杆连接值的过程几乎相同，但值存储在\
  \ `extendedGamepad` 下，而不是根 `gamepad` 属性下。\n\n```\n-(void)motionOccurred:(CMAccelerometerData\
  \ *)accelerometerData;\n{\n  bool gameControllerBeingUsed = NO;\n  GCController\
  \ *myController = nil;\n\n  if([parentViewController.gameControllerArray count]\
  \ >  0)\n  {\n    gameControllerBeingUsed = YES;\n    myController = [parentViewController.gameControllerArray\
  \  lastObject];\n  }\n\n  if(gameControllerBeingUsed == YES)\n  {\n    //检测按钮按下\n\
  \    if(myController.gamepad.buttonY.pressed && gameControllerYHit == NO)\n    {\n\
  \      gameControllerYHit = YES;\n      [self touchesBegan:nil withEvent:nil];\n\
  \    }\n\n    if(!myController.gamepad.buttonY.pressed && gameControllerYHit ==\
  \ YES)\n    {\n      gameControllerYHit = NO;\n      [self touchesEnded:nil withEvent:nil];\n\
  \    }\n\n    //非扩展版游戏手柄\n    if(myController.extendedGamepad == nil)\n    {\n \
  \     accel[0] = myController.gamepad.dpad.xAxis.value * accelerometerDamp +   \
  \          accel[0] * (1.0 - accelerometerDamp);\n      accel[1] = myController.gamepad.dpad.yAxis.value\
  \ * accelerometerDamp +             accel[1] * (1.0 - accelerometerDamp);\n    }\n\
  \n    //扩展版游戏手柄\n    else\n    {\n      GCExtendedGamepad *extendedGamePadProfile\
  \ = myController.extendedGamepad;\n      accel[0] = extendedGamePadProfile.leftThumbstick.xAxis.value\
  \ * accelerometerDamp +             accel[0] * (1.0 - accelerometerDamp);\n    \
  \  accel[1] = extendedGamePadProfile.leftThumbstick.yAxis.value * accelerometerDamp\
  \ +             accel[1] * (1.0 - accelerometerDamp);\n    }\n  }\n\n  else\n  {\n\
  \    //使用一个基本的低通滤波器，仅保留加速度计值中的重力分量\n    accel[0] = accelerometerData.acceleration.x\
  \ * accelerometerDamp + accel[0] *         (1.0 - accelerometerDamp);\n    accel[1]\
  \ = accelerometerData.acceleration.y * accelerometerDamp + accel[1] *         (1.0\
  \ - accelerometerDamp);\n    accel[2] = accelerometerData.acceleration.z * accelerometerDamp\
  \ + accel[2] *         (1.0 - accelerometerDamp);\n    if(!tractorBeamOn)\n    \
  \  [self movePlayer:accel[0] :accel[1]];\n  }\n}\n```\n\n> **注意**：当方向键和拇指摇杆处于静止位置时，其值为\
  \ 0.0。在游戏控制器框架出现之前，开发者发现有必要在静止位置周围设计一个“死区”；现在这已不再必要，任何大于 0.0 的值都应被视为有意的移动。\n\n###\
  \ 数据回调\n\n在许多情况下，在每个游戏循环周期轮询游戏控制器输入是没有意义的。幸运的是，苹果提供了回调功能，可以在游戏控制器上任何物理按钮的值发生变化时进行设置。在以下代码片段中，为右肩部按钮设置了一个处理程序。当按钮值改变时，此方法将调用\
  \ `rightShoulderButtonAction`。\n\n```\nmyController.gamepad.rightShoulder.valueChangedHandler\
  \ = ^(GCControllerButtonInput *button, float value, BOOL pressed))\n    {\n    \
  \  if(pressed)\n          [self rightShoulderButtonAction];\n    };\n```\n\n除了为每个动作设置回调外，您还可以同时在多个按钮之间共享回调。为此，创建一个新的代码块，并按照以下代码片段所示进行设置。对\
  \ A、B、X 或 Y 按钮的任何操作都将导致打印日志语句。\n\n```\nvoid(^buttonHandler)(GCControllerButtonInput\
  \ *, float, BOOL) = ^(GCControllerButtonInput *button, float value, BOOL pressed)\n\
  {\n    NSLog(@\"Handle action for %@ pressed: %i, with value: %f\", button, pressed,\
  \ value);\n};\n\nmyController.gamepad.buttonA.valueChangedHandler = buttonHandler;\n\
  myController.gamepad.buttonB.valueChangedHandler = buttonHandler;\nmyController.gamepad.buttonX.valueChangedHandler\
  \ = buttonHandler;\nmyController.gamepad.buttonY.valueChangedHandler = buttonHandler;\n\
  ```\n\n也可以设置数据回调来处理方向键或拇指摇杆的轴值变化。为此，请使用以下代码片段：\n\n```\nmyController.extendedGamepad.rightThumbstick.valueChangedHandler\
  \ = ^(GCControllerDirectionPad *dpad, float xValue, float yValue)\n{\n    NSLog(@\"\
  Right Thumb Stick value did change: %f, %f\", xValue, yValue);\n};\n```\n\n### 暂停\n\
  \n如果你的游戏支持游戏控制器，那么它也必须支持所有游戏控制器上都有的暂停按钮。即使你的游戏之前不支持暂停，在连接了游戏控制器后，支持暂停也成为一个要求。处理游戏控制器上的暂停按钮非常简单，只需要额外几行代码：\n\
  \n```\nmyController.controllerPausedHandler = ^(GCController *controller)\n {\n\
  \     [self togglePauseState];\n };\n```\n\n\n\n## 玩家指示灯\n\n无线游戏控制器还配备了玩家指示灯，因为游戏控制器框架支持将多个控制器连接到单一设备。你的游戏可以通过额外的无线控制器，利用单个设备实现多人游戏功能。每个无线控制器都会配备四个\
  \ LED 灯，用于指示玩家编号。这些灯也能让用户知道他们已成功连接无线控制器，即使在单人游戏模式下也是如此。以下代码会点亮无线控制器的第一个灯，让玩家知道他们已成功连接：\n\
  \n```\nif(myController.playerIndex == GCGameControllerPlayerIndexUnset)\n{\n   \
  \     myController.playerIndex = 0;\n}\n```\n\n`playerIndex` 属性也可用于点亮其他玩家索引值，范围从\
  \ 0 到 3。每个控制器每次只能开启一个玩家指示灯。\n\n## 快照\n\n有时可能需要创建控制器输入状态的快照。这不仅有助于调试，还可用于创建回放配置文件或通过网络发送控制器数据。快照通过\
  \ `NSData` 表示形式存储，如下所示：\n\n```\nGCGamepadSnapshot *snapshot = [myController.gamepad\
  \ saveSnapshot];\nNSData *snapshotData = snapshot.snapshotData;\n```\n\n`GCGamePadSnapshot`\
  \ 的优点之一是，它作为 `GCGamePad` 的子类，因此从中读取数据无需对游戏逻辑进行任何更改。\n\n## 总结\n\n在本章中，你学习了 iOS 7\
  \ 的游戏控制器功能，从框架的要求到连接和读取数据。本章还涵盖了暂停、玩家指示灯和快照数据等主题。尽管这些 API 非常新，相关硬件尚未面市，但它们为移动游戏开启了无限可能。此前，iPhone\
  \ 和 iPod 从未有过标准化的游戏控制器输入方式。游戏控制器框架的加入，是 Apple 对 iOS 游戏持续发展趋势的有力认可，也是这些设备成为下一代主要游戏机的第一步。如果你恰好也是\
  \ Mac 开发者，无线游戏控制器也将使用本章讨论的相同代码和实践，在 Mac 游戏中发挥作用。\n\n\n\n## iOS 社交游戏入门\n\n## 索引\n\
