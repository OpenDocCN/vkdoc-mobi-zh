- fmt: '# Lifecycle Aware Components


    Lifecycle aware components perform actions in response to a change in the lifecycle
    status of another component. If you’re familiar with the *observable-observer*
    design pattern, lifecycle aware components operate like that.


    We need to deal with some new vocabularies:


    * **Lifecycle owner** — A component that has a lifecycle like an `Activity` or
    a `Fragment`; it can enter various states in its lifecycle, for example, `CREATED`,
    `RESUMED`, `PAUSED`, `DESTROYED`, and so on. A lifecycle observer can tap into
    a lifecycle owner and be notified when the lifecycle status changes, for example,
    when the `Activity` enters the `CREATED` state—after it enters `onCreate()`, for
    example; I sometimes refer to the lifecycle owner as an observable.


    * **Lifecycle observer** — An object that listens to the changes in the lifecycle
    status of a **lifecycle owner**. It’s a class that implements the `LifecycleObserver`
    interface.


    With the lifecycle aware components, we can observe a component like `Activity`
    and perform actions as it enters any of its lifecycle statuses.


    It’s helpful to create a new project so you can follow the discussion in this
    chapter. Create a project with an empty `Activity`, then create another class
    named `MainActivityObserver`. You can create this class by right-clicking the
    project (as shown in Figure 16-1), then choosing **New** ➤ **Java Class**.


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig1_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig1_HTML.jpg)


    Figure 16-1 Add a Java class to the project


    Name the new class “MainActivityObserver.”


    Next, we need to add a dependency on the `build.gradle` file (module level). Edit
    the project’s Gradle file to match Listing 16-1.


    ```

    dependencies {

    def lifecycle_version = "2.2.0"

    implementation "androidx.lifecycle:lifecycle-extensions:$lifecycle_version"

    annotationProcessor "androidx.lifecycle:lifecycle-compiler:$lifecycle_version"

    ...

    }

    ```


    Listing 16-1 `build.gradle` file, module level


    > **Note:** The `lifecycle_version` at the time of writing is “2.2.0”; this will
    be different for you since you’ll be reading this at a later time. You can visit
    `https://bit.ly/lifecyclerelnotes` to find out the current version of the lifecycle
    libraries.


    Your project needs to refresh after editing the Gradle file.


    To demonstrate the lifecycle concepts, we will examine two classes:


    * **MainActivity** — This is a simple `Activity`, pretty much like any other `Activity`
    that the IDE generates when you create a project with an empty `Activity`. The
    code sample is shown in Listing 16-2.


    * **MainActivityObserver** — A Java class that will implement the `LifecycleObserver`
    interface; this will be our listener object. The code is listed and annotated
    in Listing 16-1.


    The classes `MainActivity` and `MainActivityObserver` show an example of setting
    up an *observer-observable* relationship between a *lifecycle owner* (`MainActivity`)
    and a *lifecycle observer* (`MainActivityObserver`). Edit the `MainActivityObserver`
    class to match Listing 16-2.


    |❶| If you want to observe other components’ lifecycle changes, you need to implement
    the `LifecycleObserver` interface. This line makes this class an *observer*.|

    |❷| Use the `OnLifecycleEvent` annotation to tell the Android Runtime that the
    decorated method is supposed to be called when the lifecycle event happens; in
    this case, we’re listening to the `ON_CREATE` event of the observed object. The
    parameter to the decorator indicates which lifecycle event we’re listening to.|

    |❸| This is the decorated method. It gets called when the object it is observing
    enters the `ON_CREATE` lifecycle status. You can name this method anything you
    want; I just named it `onCreateEvent()` because it’s descriptive. Otherwise, you’re
    free to name it to your liking; the method’s name doesn’t matter because you already
    decorated it, and the annotation is sufficient.|

    |❹| This is where you do something interesting in response to a lifecycle status
    change.|


    ```

    import androidx.lifecycle.Lifecycle;

    import androidx.lifecycle.LifecycleObserver;

    import androidx.lifecycle.OnLifecycleEvent;

    public class MainActivityObserver implements LifecycleObserver {  ❶

    @OnLifecycleEvent(Lifecycle.Event.ON_CREATE) ❷

    public void onCreateEvent() {  ❸

    System.out.println("EVENT: onCreate Event fired");  ❹

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_PAUSE)

    public void onPauseEvent() {

    System.out.println("EVENT: onPause Event fired");

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_RESUME)

    public void onResumeEvent() {

    System.out.println("EVENT: onResume Event fired");

    }

    }

    ```


    Listing 16-2 `MainActivityObserver` class


    Next, edit the `MainActivity` class to match Listing 16-3.


    |❶| From the point of view of the `MainActivity` (it’s the one being observed),
    the only thing we need to do here is to add an observer object using the `addObserver()`
    method of the `LifeCycleOwner` interface—yes, the `AppCompatActivity` implements
    `LifeCycleOwner`; that’s the reason we can call the `getLifecycle()` method within
    our `Activity`. You simply need to pass an instance of an observer class (in our
    case, it’s the `MainActivityObserver`) to set up lifecycle awareness between an
    `Activity` and a regular class.|


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    getLifecycle().addObserver(new MainActivityObserver()); ❶

    }

    }

    ```


    Listing 16-3 `MainActivity` class


    The application doesn’t do much. It merely logs messages to the Logcat window
    every time there is a change in the lifecycle state of `MainActivity`. Still,
    it demonstrates how we can add an observer to the lifecycle of any `Activity`.'
