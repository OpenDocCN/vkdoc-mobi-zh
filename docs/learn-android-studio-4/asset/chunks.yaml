    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig1_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Layout file, shown as text mode and in design mode


    In Figure [6-1](#457413_2_En_6_Chapter.xhtml#Fig1), the picture on the left shows
    the activity_main layout file as in XML mode (or code mode), and the one on the
    right shows the layout file in design mode. You can work with the layout file
    visually (click the “Design” button) or as raw XML code (click the “Code” button).
    When you change an element by editing the XML, Android Studio automatically updates
    the design view’s rendition. Similarly, when you make a change in the design view,
    the XML file gets updated.


    Listing [6-1](#457413_2_En_6_Chapter.xhtml#PC1) shows a typical layout file.


    ```


    Listing 6-1

    /res/layout/activity_main.xml

    ```


    A layout file generally has two parts: a declaration of a container and the declarations
    of each UI element inside. In Listing [6-1](#457413_2_En_6_Chapter.xhtml#PC1),
    the second line, which is also the root of the XML document, is the container’s
    declaration. The TextView element is declared as a child node of the container.
    This is how containers and UI elements are arranged in a layout file.'
