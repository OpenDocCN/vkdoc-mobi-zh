- fmt: '# 9. Fragments


    *What we’ll cover:*


    * Introduction to Fragments

    * The Fragment class and Fragment resource file

    * Adding Fragments to Activities dynamically


    In the early days of Android, when it ran only on phones, and there weren’t any
    high-resolution screens, activities were sufficient to compose the UI and interact
    with the user. Then came the tablets and high-resolution displays. It became increasingly
    difficult to create applications that can run well on both phones and tablets.
    Developers were faced with hard choices. Either you choose the least capable hardware
    as the target and make it like the least common denominator or make the app adapt
    to a range of form factors by removing and adding UI elements in response to the
    device’s capability, which proved to be very difficult to do manually. When API
    11 (Honeycomb) came out, Android solved this problem with Fragments; this is the
    topic of this chapter.


    ## Introduction to Fragments


    If we think of an activity as a composition unit for our UI, think of a fragment
    as a mini-activity—it’s a smaller composition unit. You will usually show (and
    hide) fragments during runtime in response to something that a user did, for example,
    tilting the device, switching from portrait to landscape orientation, thus making
    more screen space available. You may even use fragments as a strategy to adapt
    to device form factors. When the app is running on a smaller screen, you will
    show only some of the fragments.


    Like an activity, a fragment comprises two parts—a Java program and a layout file.
    The idea is almost the same—define the UI elements in an XML file and then inflate
    the XML file in a program file so that all the view objects in the XML will become
    an object. After that, we can reference each view object in the XML using the
    `R.class`. Think of a fragment as an ordinary view object that we can drag and
    drop on the main layout file.


    To create a Fragment, we generally do the following:


    1. Create an XML resource file and put it in the `/app/res/layout` folder, just
    like where we put `activity_main.xml`.

    2. Give the new resource file a descriptive name, say `fragment_booktitles`.

    3. Create the Fragment class; this class must inherit `androidx.fragment.app.Fragment`—all
    support libraries are now in the `androidx` package.

    4. Next, hook up the Fragment class with the XML resource layout. You can inflate
    the XML resource file in the `onCreate()` method of the Fragment class.

    5. Make some changes to `MainActivity`. The default `MainActivity` inherits from
    `AppCompatActivity`; this is usually fine, but we are using the Fragment class
    from the support library, which means we need to inherit from `FragmentActivity`
    instead of the default `AppCompatActivity`.

    6. Add the newly created Fragment.


    Let’s do them in Android Studio. First, create a project with an empty Activity,
    just like all the other projects we’ve created.


    Let’s create an XML resource file and put it in `/app/res/layout`. You can do
    that by right-clicking the project’s layout folder, then choosing **New** ➤ **Layout
    Resource File**, as shown in Figure 9-1.


    ![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig1_HTML.jpg](images/457413_2_En_9_Chapter/457413_2_En_9_Fig1_HTML.jpg)


    *Figure 9-1: New Layout Resource File*


    In the window that follows, type the filename of the new resource file (`fragment_booktitles`),
    as shown in Figure 9-2.


    ![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig2_HTML.jpg](images/457413_2_En_9_Chapter/457413_2_En_9_Fig2_HTML.jpg)


    *Figure 9-2: New Resource File*


    Next, let’s add a fragment class. To do that, add a Java class to the project
    by right-clicking the project’s package, then choosing **New** ➤ **Java Class**,
    as shown in Figure 9-3.


    ![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig3_HTML.jpg](images/457413_2_En_9_Chapter/457413_2_En_9_Fig3_HTML.jpg)


    *Figure 9-3: Add a Java class*


    In the pop-up window that follows, type the name of the new Java class (`BookTitle`),
    as shown in Figure 9-4.


    ![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig4_HTML.jpg](images/457413_2_En_9_Chapter/457413_2_En_9_Fig4_HTML.jpg)


    *Figure 9-4: New Java Class*


    Edit the `fragment_booktitles` layout file to match Listing 9-1. You can add whatever
    View component you want to add; for my purpose, I simply added a `TextView` object.


    ```

    Listing 9-1

    app/res/layout/fragment_booktitles.xml

    ```


    Next, modify the `BookTitle` class to match Listing 9-2.'
