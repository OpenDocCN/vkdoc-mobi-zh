    \ chapter is all about that.\n\n**Chapter 12: Debugging** —You will often make\
    \ coding mistakes. This chapter introduces you to the types of errors you may\
    \ encounter and how to use Android Studio’s debugging features to solve them.\n\
    \n**Chapter 13: Testing** —At some point, you have to test your code before you\
    \ release them. This chapter introduces you to the many kinds of testing you can\
    \ do to an app. More importantly, it introduces you to unit testing and Espresso\
