    # 18. 简短说明


    *本章涵盖的内容：*


    - 如何导入示例代码

    - 重构

    - 代码生成器

    - 动态模板

    - 代码编辑器偏好设置

    - 键盘快捷键


    我们已接近本书的尾声，但在结束之前，我想指出 `Android Studio` 的一些功能，它们能让编码生活轻松一些。


    ## 生产力特性


    我们通常所说的生产力，是指希望在尽可能短的时间内完成需要做的事情；这意味着要使用键盘快捷键、模板、代码片段等。在本节中，我们将一窥 `Android Studio`
    提供的一些功能，以提升我们的生产力。我们不会深入细节，这并非目的，而是向您展示有哪些可用的功能。


    ### 导入示例


    提高生产力的关键部分是学习如何创建事物并了解它们在 `Android` 中的工作原理。因此，我们的第一个生产力技巧是学习如何使用“导入示例”功能。您可以通过主菜单栏**File**
    ➤ **New** ➤ **Import Sample**访问此功能。图 `18-1` 显示了“导入示例”屏幕。


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig1_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig1_HTML.jpg)


    **图 18-1** 导入示例


    您在 `18-1` 中看到的是一个代码示例列表，您可以浏览这些示例，也可以将其作为本地项目创建。


    假设我想了解 `Autofill Framework` 的一些知识——如图 `18-1` 所示，您可以预览其外观，还可以点击“Browse source in
    GitHub”链接。当您点击**Next**时，会看到一个与创建新项目时类似的对话框，如图 `18-2` 所示。


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig2_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig2_HTML.jpg)


    **图 18-2** 导入示例，下一个窗口


    如果您在“导入示例”对话框中点击**Finish**，`Android Studio` 将在本地创建一个新项目，并从 `GitHub` 下载示例文件，以便您可以更仔细地查看并立即开始工作。


    ### 重构


    重构基本上是在不创建新功能的情况下重写和改进源代码；这种做法有助于使代码保持 `SOLID` 和 `DRY`（不要重复自己）原则，从而更易于维护。


    > **注意**

    > 我将 `SOLID` 全部大写，因为它也是一个缩写，代表**S**ingle Responsibility（单一职责）、**O**pen-Closed
    Principle（开闭原则）、**L**iskov Substitution Principle（里氏替换原则）、**I**nterface Segregation（接口隔离）和**D**ependency
    Inversion Principle（依赖反转原则）——这些是面向对象设计的原则，由 Robert C. Martin 推广。


    `Android Studio` 具有一些漂亮的重构功能。开始使用很简单；只需选择一段您想要重构的代码，然后使用上下文相关的右键菜单，如图 `18-3` 所示。另外，您也可以使用键盘快捷键——macOS
    上为**Ctrl + T**，Windows/Linux 上为**Ctrl + Alt + Shift + T**。


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig3_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig3_HTML.jpg)


    **图 18-3** 重构


    我相信您之前已经多次进行过重构，但让我们在此简单回顾一下。


    - **Rename**——这允许您安全地重命名变量和其他标识符等。您应该使用此功能而不是查找和替换。它适用于整个项目，而不仅仅是当前文件。

    - **Change Signature**——这允许您更改方法，无论是其名称还是参数。它也可以在类级别工作，例如，您可以将一个类转换为泛型类型并操作类型参数。

    - **Move**——移动一个元素；如果需要，您可以将一个方法移动到另一个类。

    - **Copy**——允许您复制元素，例如当前选中的类。

    - **Safe Delete**——如果您需要删除某些内容，`Android Studio` 将验证您要删除的内容在代码库中是否未被其他任何地方使用。如果正在使用，系统会提示您，以便在实际删除重要内容之前处理这些问题。

    - **Extract Constant**——避免使用硬编码的值。硬编码会使程序在以后需要更改值时难以修改。重构的提取选项不仅适用于常量，您还可以提取字段、方法、超类、变量、参数和接口。


    重构菜单中还有更多选项；请务必查看其他功能。'
  raw: '## Summary


    *   Before the users can experience your app, they will see the icons and other
    graphical assets first—make sure the graphical assets are just as polished as
    your code.


    *   Strip your code of all debug info and log statements before you build a release.


    *   Code review your own work. If you have buddies or other people who can review
    the code with you, that’s much better. If your app uses servers, RESTful URLs,
    and so on, make sure they are production ready and not sandboxes.


    *   Before you can upload your app to Google Play, you need to sign your app with
    a proper certificate.


    *   You’ll need a Google Play account if you want to sell your apps on Google
    Play. I paid a one-time fee of 25 USD, but that was a couple of years ago.


    *   Don’t forget to test your app on a real device.


    # 18. Short Takes


    *What we’ll cover:*


    *   How to import sample codes


    *   Refactoring


    *   Code generators


    *   Live templates


    *   Code editor preferences


    *   Keyboard shortcuts


    We’re at the end of the book, but before we conclude, I’d like to point out some
    features of Android Studio that make coding life a bit easier.


    ## Productivity Features


    What we usually mean when talking about productivity is that we want to do what
    we need to do in the shortest possible time; that means keyboard shortcuts, templates,
    snippets, and so on. In this section, we’ll take a peek at some of what Android
    Studio has to offer to give our productivity a little boost. We won’t go into
    detail; that’s not the goal, but rather just to show you what’s available.


    ### Importing Samples


    A key part of boosting your productivity is to actually learn how to create things
    and discover how they work in Android. So, our first productivity tip is learn
    how to use the “import sample” feature. You can get to this feature from the main
    menu bar, **File** ➤ **New** ➤ **Import Sample**. Figure [18-1](#457413_2_En_18_Chapter.xhtml#Fig1)
    shows the “Import Sample” screen.


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig1_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Import Sample


    What you see in Figure [18-1](#457413_2_En_18_Chapter.xhtml#Fig1) is a list of
    code samples you can either browse or create as a local project.


    Let’s say I’d like to learn something about the Autofill Framework—like what you
    see in Figure [18-1](#457413_2_En_18_Chapter.xhtml#Fig1), you can see a preview
    of what it looks like, and you can also click the “Browse source in GitHub” link.
    When you click *Next*, you’ll see a dialog that’s somewhat similar to when creating
    a new project, as shown in Figure [18-2](#457413_2_En_18_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig2_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig2_HTML.jpg)


    Figure 18-2


    Import Sample, next window


    If you click “Finish” on the “Import Sample” dialog, Android Studio will create
    a new project locally and download the sample file from GitHub so you can take
    a closer look at it and work on right away.


    ### Refactoring


    Refactoring is basically rewriting and improving your source code without creating
    a new functionality; this practice helps keep the code SOLID and DRY (don’t repeat
    yourself) and hence easier to maintain.


    Note


    I spelled SOLID in all caps because it’s also an acronym which stands for **S**ingle
    Responsibility, **O**pen-Closed Principle, **L**iskov Substitution Principle,
    **I**nterface Segregation and **D**ependency Inversion Principle—these are principles
    for object-oriented design which was popularized by Robert C. Martin.


    Android Studio has some nifty refactoring capabilities. It’s easy to get started;
    just select a piece of code that you’d like to refactor, then use the context-sensitive
    right-click, as shown in Figure [18-3](#457413_2_En_18_Chapter.xhtml#Fig3). Alternatively,
    you can also use the keyboard shortcuts—**Ctrl + T** for macOS and **Ctrl + Alt
    + Shift + T** if you’re on Windows/Linux.


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig3_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig3_HTML.jpg)


    Figure 18-3


    Refactor


    I’m sure you’ve done refactoring many times before, but let’s just jog our memories
    here .


    *   **Rename**—This will let you safely rename variables and other identifiers
    and so on. You should use this instead of Find and Replace. This works across
    the entire project and not only in the current file.


    *   **Change Signature**—This will let you change a method, either its name or
    the parameters. It also works at a class level, for example, you can turn a class
    into a generic type and manipulate the type parameters.


    *   **Move**—Moves an element; you can move a method to another class if you want
    to.


    *   **Copy**—Lets you copy elements, for example, currently selected class.


    *   **Safe Delete**—If you need to delete something, Android Studio will verify
    that what you’re deleting isn’t in use by anything else in the codebase. If it
    is in use, you’ll be prompted so you can address those things before you actually
    delete something important.


    *   **Extract Constant**—Avoid using hard-coded values. Hard coding makes it difficult
    to modify the program in case you want to change the value later on. The Extract
    option for refactoring works not only for constants, you can extract fields, methods,
    superclasses, variables, parameters, and interfaces.


    There are plenty more options in the Refactor menu; make sure to check the others
    out.'
