- fmt: '## LiveData


    回到我们的`RandomNumber`示例，我们有一个应用，每次启动时显示一个随机数。该应用已经使用了`ViewModel`，因此我们不会遇到每次`Activity`被销毁和重建时丢失数据的问题。基本数据流如图[16-2](#457413_2_En_16_Chapter.xhtml#Fig2)所示。


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig2_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig2_HTML.jpg)


    **Figure 16-2** RandomNumber示例的数据流


    但是，如果你需要获取另一个数字呢？为此，我们可以在`MainActivity`中添加一个触发机制（比如一个`Button`），然后它会调用`ViewModel`上的`getNumber()`——但我们如何在`MainActivity`中刷新`TextView`呢？已经有几种方法可以实现这一点，你可能已经遇到过它们。一种促进`ViewModel`和`Activity`之间数据交换的方法是巧妙使用接口（但我们不在这里讨论），或者使用像`Otto`这样的`EventBus`（我们也不在这里讨论）——但现在，幸运的是，由于架构组件，我们可以使用`LiveData`。新的数据流如图[16-3](#457413_2_En_16_Chapter.xhtml#Fig3)所示。


    | ❶ | 用户点击**FETCH**按钮，该按钮调用`getNumber()`函数；实际上，我们将首先调用`createNumber()`，然后调用`getNumber()`。这样，我们获取一个新的随机数。有更优雅的方法来实现这一点，但这是最快的方式，请耐心等待。
    |

    | ❷ | 我们的`ViewModel`对象获取一个新的随机数。这不再是一个简单的`String`；我们将把它改为`MutableLiveData`，使其变得*可观察*。
    |

    | ❸ | 在`MainActivity`中，我们将从`ViewModel`对象获取`LiveData`实例，并编写一些代码来*观察*它；接下来，我们只需对`LiveData`的变化做出反应。
    |


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig3_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig3_HTML.jpg)


    **Figure 16-3** 使用LiveData的RandomNumber示例


    让我们看看它在代码中如何工作。列表[16-9](#457413_2_En_16_Chapter.xhtml#PC9)和[16-10](#457413_2_En_16_Chapter.xhtml#PC10)分别显示了我们的`ViewModel`和`MainActivity`的代码。


    | ❶ | `mrandomnumber`的值是我们返回给`MainActivity`的内容。我们希望它是一个*可观察*的对象。为此，我们将其类型从`int`更改为`MutableLiveData`。
    |

    | ❷ | 我们也必须在这里进行类型更改，因为`mrandomnumber`现在是`MutableLiveData`；此函数必须返回`MutableLiveData`。
    |

    | ❸ | 要设置`MutableLiveData`的值，请使用`setValue()`方法。 |


    ```

    import androidx.lifecycle.MutableLiveData;

    import androidx.lifecycle.ViewModel;

    public class RNModel extends ViewModel {

    private String TAG = getClass().getSimpleName();

    MutableLiveData mrandomnumber = new MutableLiveData(); ❶

    boolean minitialized = false;

    MutableLiveData getNumber() { ❷

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber;

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber.setValue(random.nextInt(100) + ""); ❸

    minitialized = true;

    }

    }

    ```


    **Listing 16-9** 带LiveData的ViewModel


    现在我们可以继续看`MainActivity`中的更改。列表[16-10](#457413_2_En_16_Chapter.xhtml#PC10)显示了`MainActivity`的修改和注释代码。


    | ❶ | 让我们从`ViewModel`中获取随机数。随机数不再是`String`类型；它是`MutableLiveData`。 |

    | ❷ | 这是按钮点击的样板代码。我们需要这个触发器来从`ViewModel`中获取随机数。 |

    | ❸ | 要*观察*一个`LiveData`，我们调用`observe()`方法；该方法接受两个参数。第一个参数是生命周期所有者（`MainActivity`，所以我们传递`this`）；第二个参数是一个`Observer`对象。我们在这里使用匿名类来创建`Observer`对象。
    |

    | ❹ | 每次`ViewModel`中随机数（`mrandomnumber`）的值发生变化时，都会调用此`onChanged()`方法；所以，当它变化时，我们相应地设置`TextView`的值。
    |


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import androidx.lifecycle.MutableLiveData;

    import androidx.lifecycle.Observer;

