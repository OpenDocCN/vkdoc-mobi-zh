    ## Summary


    *   When you try to do too much on the main thread, the runtime may start dropping
    frame rates, which results in jank.


    *   The UI thread is responsible for creating the UI elements, among other things.
    Don’t overburden this thread. If you need to do some time-consuming or resource-consuming
    tasks, spawn a background thread and do that task there.


    # 12. Debugging


    *What we’ll cover:*


    *   Kinds of errors you’ll encounter


    *   Logging debug statements


    *   Using the debugger


    All but the most trivial programs are without errors. Dealing with errors will
    be a big part of your life as a developer. This chapter will discuss the kinds
    of errors you’ve faced and will still face in the foreseeable future. We will
    also discuss how you can use Android Studio to ease the difficulty of dealing
    with these errors.


    ## Types of Errors


    The three most common errors you’ll face in programming are


    *   Syntax errors


    *   Runtime errors


    *   Logic errors


    ### Syntax Errors


    Syntax errors are exactly what you think they are, errors in the syntax. It happens
    because you wrote something in the code that’s not allowed in the set of rules
    of the Java compiler. The compiler doesn’t understand it. The error can be as
    simple as forgetting to close a parenthesis or a missing pair of a curly brace.
    It can also be complex like passing the wrong type of argument to a function or
    a parameterized class when using generics.


    You can catch syntax errors with Android Studio with ease. Whenever you see red
    squiggly lines in on the main editor, like Figure [12-1](#457413_2_En_12_Chapter.xhtml#Fig1).


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig1_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Main editor showing error indicators


    It means something is syntactically wrong with the code. Android Studio puts the
    red squiggly lines very near the offending code. If you hover your mouse on the
    red squiggly line, most of the time, Android Studio can tell you, with a high
    degree of accuracy, what’s wrong with the code. What’s more, you can quickly fix
    these kinds of errors using a technique that’s aptly named “quick fix.”


    To do a quick fix, bring the cursor anywhere within the red squiggly lines, then
    press **Alt + Enter** (if you’re on Windows or Linux) or **Option + Enter** (if
    you’re on macOS), and the IDE takes care of the rest; if there’s more than one
    way to fix the error, the IDE will show you some options.


    ### Runtime Errors


    Runtime error happens when your code hits a situation it doesn’t expect. As the
    name implies, this error happens only when your program is running. It’s not something
    you’ll see during compilation.


    Java has two types of Exceptions, *checked* and *unchecked*. Android Studio gives
    you lots of assistance with checked Exceptions. Figure [12-2](#457413_2_En_12_Chapter.xhtml#Fig2)
    shows what happens in the main editor when you try to call a method that throws
    a checked Exception; with unchecked Exceptions, however, you’re still on your
    own.


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig2_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig2_HTML.jpg)


    Figure 12-2


    IDE reminder that you need to handle the Exception


    There are two ways to resolve the error shown in Figure [12-2](#457413_2_En_12_Chapter.xhtml#Fig2);
    we can enclose the openFileOutput() method call inside a *try-catch* structure
    or we add an Exception to the method signature, as shown in Figure [12-3](#457413_2_En_12_Chapter.xhtml#Fig3).


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig3_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Quick fix


    Listing [12-1](#457413_2_En_12_Chapter.xhtml#PC1) shows how to handle the FileNotFoundException
    by adding a throws clause to the method signature.


    ```

    import java.io.FileNotFoundException;

    ...

    void saveData() throws FileNotFoundException {

    String fn = "somefile.txt";

    FileOutputStream out = openFileOutput(fn, Context.MODE_APPEND);

    }

    Listing 12-1

    FileNotFoundException thrown in saveData()

    ```


    Listing [12-2](#457413_2_En_12_Chapter.xhtml#PC2) shows the code for handling
    the same Exception using a *try-catch* block.


    ```

    void saveData() {

    String fn = "somefile.txt";

    try {

    FileOutputStream out = openFileOutput(fn, Context.MODE_APPEND);

    } catch (FileNotFoundException e) {

    e.printStackTrace();

    }

    finally {

    ...

    }

    }

    Listing 12-2

    Handling an Exception using try-catch

    ```


    I would use a *try-catch* when I want to handle the Exception locally, meaning
    in the same block of code where the Exception might be thrown. Most of the time,
    the only things to do are to (1) log the error and (2) try to recover from the
    error, if at all possible, and let the user try again.


    Using a *throws* clause on the other hand means you don’t want to handle the error
    on the local block; you’d like the calling method to take care of the error instead.
    If the calling method also uses a throws clause in its signature, then the error
    handling is passed along up the call stack.'
