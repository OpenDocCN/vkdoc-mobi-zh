    Listing [15-1](#457413_2_En_15_Chapter.xhtml#PC1) shows an annotated manifest
    file.


    2.  Add a class (that extends the BrodcastReceiver class) to the project, then
    override the **onReceive()** method. Listing [15-2](#457413_2_En_15_Chapter.xhtml#PC2)
    shows a sample BroadcastReceiver class that logs and displays the contents of
    the broadcast. You can add a BroadcastReceiver class in either one of two ways;
    you can right-click the project’s package name (in the Project tool window), then
    choose **New** ➤ **Java Class**, as shown in Figure [15-1](#457413_2_En_15_Chapter.xhtml#Fig1),
    and then add the necessary code to subclass BroadcastReceiver. Alternatively,
    you can right-click the application’s package name, then choose **New** ➤ **Other**
    ➤ **BroadcastReceiver**. Whichever method you choose to add the BroadcastReceiver
    class, just make sure the class name is **MyReceiver**, if you want to follow
    the code examples in Listings [15-1](#457413_2_En_15_Chapter.xhtml#PC1) and [15-2](#457413_2_En_15_Chapter.xhtml#PC2).


    | ❶ | Just like an Activity, a **BroadcastReceiver** needs to be declared in the
    manifest. You have to declare it in its node. Like an Activity declaration, it
    needs to be a child node of the **application**. |

    | ❷ | **“.MyReceiver”** is the name of the BroadcastReceiver class. Presumably,
    there is a class in your app named MyReceiver, and it inherits BroadcastReceiver.
    We simply write it as “.MyReceiver” just like the Activity above it (“.MainActivity”).
    The complete form is actually `net.workingdev.ch15_broadcast.MyReceiver`, but
    we can use the short form because the package name is already declared earlier;
    look at the second line of the manifest, and you’ll find the complete name of
    the package. Any subsequent classes that need to be declared in the manifest can
    simply use the short form, like “.MyReceiver” or “.MainActivity”. |

    | ❸ | The **intent-filter** is how we register. We’re telling Android that we’re
    interested in the events `android.intent.action.BOOT_COMPLETED` and `android.intent.action.INPUT_METHOD_CHANGED`.
    In case those Intents are broadcasted, our app would like to respond to it. |


    ```


    ❸


    Listing 15-1

    Manifest registration

    ```


    | ❶ | Extend the BroadcastReceiver class. This class’ name has to be consistent
    with the **android:name** attribute in the **<receiver>** node of the manifest
    file in Listing [15-1](#457413_2_En_15_Chapter.xhtml#PC1). |

    | ❷ | Override the **onReceive()** method and implement your program logic in
    response to the broadcast message. In our case, we’re only displaying a Toast
    message. |


    ```

    import android.content.BroadcastReceiver;

    import android.content.Context;

    import android.content.Intent;

    import android.util.Log;

    import android.widget.Toast;

    public class MyReceiver extends BroadcastReceiver { ❶

    private final String TAG = getClass().getName();

    @Override

    public void onReceive(Context context, Intent intent) { ❷

    StringBuilder sb = new StringBuilder();

    sb.append("Action: " + intent.getAction() + "\n");

    sb.append("URI: " + intent.toUri(Intent.URI_INTENT_SCHEME).toString() + "\n");

    String log = sb.toString();

    Log.d(TAG, log);

    Toast.makeText(context, log, Toast.LENGTH_LONG).show();

    }

    }

    Listing 15-2

    BroadcastReceiver class

    ```


    When you declare a BroadcastReceiver in the manifest file, the runtime will launch
    your app (if it isn’t already running when the broadcast is sent).


    When a user installs this app on a device, Android’s package manager will register
    this app. The receiver then becomes a separate entry point into your app, which
    means the runtime can start the app and deliver the broadcast if your app isn’t
    currently running.


    The system creates a new BroadcastReceiver component object to handle each broadcast
    that it receives. This object is valid only for the duration of the call to **onReceive()**.
    Once your code returns from this method, the system considers the component no
    longer active.


    Now that we’ve seen how to register a BroadcastReceiver via the manifest, let’s
    see how to register a BroadcastReceiver via the Context. Context registration
    means registering programmatically—using either the Activity context or the Application
    context.


    Let’s create another project (with an empty Activity) for this, then add a Java
    class that extends the BroadcastReceiver, just like what we did in the previous
    project. You can name the BroadcastReceiver class MyReceiver as well. Open the
    MyReceiver class and edit it to match Listing [15-3](#457413_2_En_15_Chapter.xhtml#PC3).


    ```

    import android.content.BroadcastReceiver;

    import android.content.Context;

    import android.content.Intent;

    import android.widget.Toast;

    public class MyReceiver extends BroadcastReceiver {

    @Override

    public void onReceive(Context context, Intent intent) {

    Toast.makeText(context, "Got it", Toast.LENGTH_LONG).show();

    }

    }

    Listing 15-3

    MyReceiver class

    ```


    MyReceiver is very simple; it will display a “Got it” Toast message in response
    to a broadcast.


    To register the MyReceiver object via the Context, we will declare a member variable
    of type MyReceiver as a member of MainActivity, like so:


    ```

    MyReceiver receiver = null;

    ```


    We’re making it a member variable because we need to refer to it from a couple
    of Activity lifecycle callbacks.


    Inside the **onCreate()** callback of MainActivity, we will create an instance
    of the MyReceiver class, like this:


    ```

    receiver = new MyReceiver();

    ```


    We want to listen to broadcast messages only while the Activity is alive. When
    the Activity isn’t visible to the user, we don’t want to receive the messages.
    We will put the registration code inside the **onResume()** method of MainActivity;
    this method is called when the Activity is visible to the user. We will put the
    code to unregister the receiver inside the **onPause()** method of MainActivity
    because this method is called when the user is navigating away from the MainActivity.


    Let’s edit the MainActivity class. Listing [15-4](#457413_2_En_15_Chapter.xhtml#PC6)
    shows the annotated MainActivity class.'
