    # 15. BroadcastReceivers


    *What we’ll cover:*


    *   Introduction to BroadcastReceivers


    *   Custom and system broadcasts


    *   Manifest and Context registered receivers


    Android’s application model is unique in many ways, but what makes it stand out
    is how it lets you build an app using the functionalities of other apps that you
    didn’t make yourself—I don’t mean just libraries, I mean full apps. In Chapter
    [8](#457413_2_En_8_Chapter.xhtml), we learned how to use Intents to activate Activities.
    In this chapter, we will learn how to send and receive broadcast messages using
    Intents.


    A broadcast is an Intent that is sent either by the Android Runtime or other apps
    (your apps included) so that every application or component can hear it. Most
    applications will ignore the broadcast, but you can make your app listen to it.
    You can tune in to the message so you can respond to the broadcast. That is the
    topic of this chapter.


    ## Introduction to BroadcastReceivers


    Android apps can send or receive broadcast messages from the Android system and
    other apps (including ours). These broadcasts are sent when something interesting
    happens, for example, when the system boots up, when the device starts charging,
    when a file has finished downloading. This type of messaging model is called a
    *publish-subscribe* pattern; in this pattern, senders of messages (called publishers)
    do not target specific receivers (called subscribers), but instead categorize
    messages into classes without knowledge of which subscribers may be listening
    (if there are any at all). Similarly, subscribers express interest in one or more
    classes of messages by registering to listen to them without the publishers’ knowledge.


    ### System Broadcast vs. Custom Broadcast


    A broadcast can be sent either by the OS (system broadcast) or by applications.
    A system broadcast is sent by the OS whenever something interesting happens, for
    example, when WiFi is turned on (or off), when the battery goes down to a specified
    threshold, a headset is plugged, the device was switched to airplane mode, and
    so on. Some examples of broadcast actions from the system are as follows:


    *   android.app.action.ACTION_PASSWORD_CHANGED


    *   android.app.action.ACTION_PASSWORD_EXPIRING


    *   android.bluetooth.a2dp.profile.action.CONNECTION_STATE_CHANGED


    *   android.bluetooth.a2dp.profile.action.PLAYING_STATE_CHANGED


    *   android.bluetooth.adapter.action.CONNECTION_STATE_CHANGED


    *   android.intent.action.BATTERY_CHANGED


    *   android.intent.action.BATTERY_LOW


    *   android.intent.action.BATTERY_OKAY


    There are about 150+ of these listed on the documentation. You can find them on
    the **BROADCAST_ACTIONS.TXT** file in the Android SDK.


    A custom broadcast , on the other hand, is something you make up. These are intents
    that you send to notify some of your app’s components (or other apps that are
    tuned in) that something “interesting” happened, for example, a file has finished
    downloading, or you’ve finished calculating prime numbers, and so on.'
