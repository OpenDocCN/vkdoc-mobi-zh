    Alright, that single line of code reference from the previous section probably
    got you excited—and relieved. But it’s not the savings of keystrokes that’s the
    big picture here, it’s the fact that now we can get the best of both Activity-based
    and Fragment-based navigation. Now, Fragment navigation also has an easy API.


    But first, we need to understand a bit about Navigation components. It’s a small
    part of Architecture components, which is in turn a part of a bigger thing called
    Android Jetpack—we’re not getting into Jetpack nor Architecture components in
    detail here; they are large topics, but a brief background can’t hurt.


    At Google I/O 2017, Google introduces the Android Architecture components. These
    libraries are part of a larger collection called Android Jetpack. Together with
    Architecture components, there were others like Foundation, Behavior, and UI.


    Jetpack is a collection of Android software components. It helps us follow the
    best practices and lets us avoid writing too much boilerplate code. You’ll find
    the Jetpack codes in the **androidx.*** package libraries.


    Here’s a brief description of the Jetpack components:


    **Foundation**


    *   **AppCompat**—Lets you write code that degrade gracefully on older versions
    of Android


    *   **Android KTX**—So you write more concise, idiomatic Kotlin code, if you’re
    using Kotlin


    *   **Multidex**—Provides support for apps with multiple DEX files


    *   **Test**—A testing framework for unit and runtime UI tests


    **Behavior**


    *   **Download manager**—Lets you write programs that schedule and manage large
    downloads


    *   **Media and playback**—Backward-compatible APIs for media playback and routing


    *   **Notifications**—Provide a backward-compatible notification API with support
    for wear and auto


    *   **Permissions**—Compatibility APIs for checking and requesting app permissions


    *   **Preferences**—Create interactive settings screens


    *   **Sharing**—Provides a share action suitable for an app’s action bar


    *   **Slices**—Create flexible UI elements that can display app data outside the
    app


    **UI**


    *   **Animations and transitions**—Move widgets and transition between screens.


    *   **Auto**—If you’re working on apps that will run in vehicles’ infotainment
    consoles, you’ll need this. These are the components that help you build apps
    for Android Auto.


    *   **Emoji**—Enables an up-to-date emoji font on older platforms.


    *   **Fragment**—All the Fragment codes already moved here.


    *   **Layout**—Layout widgets using different algorithms.


    *   **Palette**—Pulls useful information out of color palettes.


    *   **TV**—Components to help develop apps for Android TV.


    *   **Wear OS by Google**—If you want to work with Android wearables like the
    watch, this is what you need.


    **Architecture**


    *   **Data binding**—Declaratively binds observable data to UI elements.


    *   **Lifecycles**—Manage Activity and Fragment lifecycles.


    *   **LiveData**—Notify views when underlying database changes.


    *   **Paging**—Gradually load information on demand from your data source; think
    when the user is scrolling through a list, this helps you handle the loading of
    data. It’s coupled with the Recycler view.


    *   **ViewModel**—Manages UI-related data in a lifecycle-conscious way.


    *   **WorkManager**—Manages background jobs.


    *   **Navigation**—Implementation of navigation in an app. Passes data between
    screens. Provides deep links from outside the app.


    *   **Room**—Think ORM for your SQLite database.


    There’s a lot to explore in Jetpack, so make sure you check them out.


    Going back to our topic, the Navigation components simplify the implementation
    of, well, navigation between destinations in an app. A destination is any place
    in your app. It could be an Activity, a fragment inside an Activity, or a custom
    view; and destinations are managed using a navigation graph.


    A navigation graph groups all the destinations and defines the different connections
    between the destinations; these connections are called **actions**. The graph
    is simply an XML resource file which represents all your app’s navigation paths.
    You can have more than one navigation graph in your app.'
  trans: '

    # 导航组件


    没错，上一节中那单行代码引用可能让你感到兴奋——也松了口气。但这不仅仅是减少敲击键盘次数的问题，关键在于现在我们能够兼顾基于 Activity 和基于 Fragment
    的导航优势。现在，Fragment 导航也有了简洁易用的 API。


    不过，我们首先要对导航组件有所了解。它是架构组件（Architecture Components）的一小部分，而架构组件又是名为 Android Jetpack
    的更大体系中的一部分——这里我们不深入探讨 Jetpack 或架构组件，它们是庞大的主题，但简要的背景介绍并无坏处。


    在 2017 年 Google I/O 大会上，Google 介绍了 Android 架构组件。这些库是名为 Android Jetpack 的庞大组件集合的一部分。与架构组件一同发布的还有
    Foundation（基础）、Behavior（行为）和 UI（界面）等类别。


    Jetpack 是一套 Android 软件组件，它能帮助我们遵循最佳实践，避免编写过多的样板代码。你可以在`androidx.*`包下的库中找到 Jetpack
    的代码。


    以下是 Jetpack 组件的简要说明：


    **基础**


    * **AppCompat**——让你编写的代码能向下兼容旧版 Android 系统

    * **Android KTX**——如果你使用 Kotlin，可以编写更简洁、更地道的 Kotlin 代码

    * **Multidex**——为使用多个 DEX 文件的应用程序提供支持

    * **Test**——用于单元测试和运行时 UI 测试的测试框架


    **行为**


    * **下载管理器**——让你编写调度和管理大规模下载任务的程序

    * **媒体与播放**——提供向后兼容的媒体播放与路由 API

    * **通知**——提供向后兼容的通知 API，支持可穿戴设备和汽车场景

    * **权限**——用于检查和请求应用权限的兼容性 API

    * **偏好设置**——创建交互式设置界面

    * **分享**——提供适合应用操作栏的分享操作

    * **切片**——创建灵活的用户界面元素，用于在应用外部显示应用数据


    **界面**


    * **动画与过渡**——实现控件移动及屏幕间的过渡效果

    * **汽车**——如果你开发在车辆信息娱乐系统上运行的应用，会用到它。这些组件能帮助你构建 Android Auto 应用

    * **表情符号**——在旧版平台上启用最新的表情符号字体

    * **Fragment**——所有 Fragment 相关代码已移至此处

    * **布局**——使用不同算法进行控件布局

    * **调色板**——从调色板中提取有用信息

    * **电视**——帮助开发 Android TV 应用的组件

    * **Google Wear OS**——如果你想开发手表等 Android 可穿戴设备应用，这就是你需要的


    **架构**


    * **数据绑定**——以声明方式将可观察数据绑定到 UI 元素

    * **生命周期**——管理 Activity 和 Fragment 的生命周期

    * **LiveData**——在底层数据库发生变化时通知视图

    * **分页**——按需从数据源逐步加载信息；当用户滚动列表时，它能帮助你处理数据加载。它与 Recycler 视图配合使用

    * **ViewModel**——以生命周期感知的方式管理 UI 相关数据

    * **WorkManager**——管理后台任务

    * **导航**——实现应用内的导航功能，在屏幕之间传递数据，并提供来自应用外部的深度链接

    * **Room**——可视为 SQLite 数据库的对象关系映射（ORM）


    Jetpack 值得探索的内容很多，请务必查阅相关文档。


    回到我们的主题，导航组件简化了应用内各目标（destination）之间的导航实现。目标指的是应用中的任意位置，可以是 Activity、Activity
    中的 Fragment 或自定义视图；这些目标通过导航图（navigation graph）进行管理。


    导航图整合了所有目标，并定义了目标之间的不同连接关系，这些连接称为动作（action）。导航图本质上是一个 XML 资源文件，展示了应用的所有导航路径。你可以在应用中拥有多个导航图。

    '
- fmt: '## Working with Jetpack Navigation


    To get a better appreciation of the Navigation components, it''s best if you can
    work on a small project. So, create a new empty project in Android Studio, as
    shown in Figure [10-2](#457413_2_En_10_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig2_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    New empty project


    Next, we need to add the Navigation component dependencies. You can do this in
    the module-level `build.gradle` file (shown in Figure [10-3](#457413_2_En_10_Chapter.xhtml#Fig3)).
    Mind that there are two `build.gradle` files; you want the one that says (Module:
    app).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig3_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig3_HTML.jpg)


    Figure 10-3


    `build.gradle` file (module level)


    Edit this file to match the code in Listing [10-5](#457413_2_En_10_Chapter.xhtml#PC5).


    ```

    dependencies {

    def nav_version = "2.2.2"

    implementation "androidx.navigation:navigation-fragment:$nav_version"

    implementation "androidx.navigation:navigation-ui:$nav_version"

    implementation fileTree(dir: "libs", include: ["*.jar"])

    implementation ''androidx.appcompat:appcompat:1.1.0''

    implementation ''androidx.constraintlayout:constraintlayout:1.1.3''

    testImplementation ''junit:junit:4.12''

    androidTestImplementation ''androidx.test.ext:junit:1.1.1''

    androidTestImplementation ''androidx.test.espresso:espresso-core:3.2.0''

    }

    ```


    Listing 10-5


    Add navigation to `build.gradle`


    At the time of writing, the stable release of Navigation components is `2.2.2`;
    there was also a beta release `2.3.0-beta01`. By the time you read this, the version
    may have moved. Make sure to check the official Android Developers website for
    more up-to-date information: [`https://developer.android.com/jetpack/androidx/releases/navigation`](https://developer.android.com/jetpack/androidx/releases/navigation).


    Next, let''s add a navigation graph to the project. You can create a navigation
    graph by creating a new resource file; right-click the project''s `res` folder,
    then select **New** ➤ **Android Resource File**, as shown in Figure [10-4](#457413_2_En_10_Chapter.xhtml#Fig4).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig4_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Add a new resource file


    On the "New Resource File" dialog, change the resource type to *Navigation* and
    supply the filename:


    * **Filename** — `nav_graph`

    * **Resource type** — *Navigation* (you must click the down arrow to select it)


    In the window that follows (shown in Figure [10-5](#457413_2_En_10_Chapter.xhtml#Fig5)),
    click OK.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig5_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    New Resource File


    When the resource is created, you''ll see a new folder (`navigation`) and a new
    file (`nav_graph.xml`) under the `res` folder of the project, as shown in Figure
    [10-6](#457413_2_En_10_Chapter.xhtml#Fig6). Android Studio will open the newly
    created navigation graph in the editor. Figure [10-6](#457413_2_En_10_Chapter.xhtml#Fig6)
    shows the newly created navigation graph—it''s empty, of course.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Navigation graph


    When you''re using Navigation components, navigation happens as an interaction
    between destinations. Destinations are what your users can navigate to, and destinations
    are connected via *actions*. At the moment, we don''t have any destination yet;
    so, let''s add one. Click the plus sign on the top panel of the navigation editor,
    as shown in Figure [10-7](#457413_2_En_10_Chapter.xhtml#Fig7), then choose "Create
    new destination."


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Create a new destination'
