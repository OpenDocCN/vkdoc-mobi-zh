  raw: '## ViewModel


    The Android framework manages the lifecycle of UI controllers like *Activities*
    and *Fragments*; it may decide to destroy or re-create an Activity (or Fragment)
    in response to some user actions, for example, clicking the back button, or device
    events, for example, rotating the screen. These configuration changes are out
    of your control.


    If the runtime decides to destroy the UI controller, any transient UI-related
    data that you’re currently storing in them will be lost.


    It’s best to create another project (with an empty Activity) to follow the discussion
    in this section; then add a Java class to the project and name it “RandomNumber.”
    Listings [16-4](#457413_2_En_16_Chapter.xhtml#PC4), [16-5](#457413_2_En_16_Chapter.xhtml#PC5),
    and [16-6](#457413_2_En_16_Chapter.xhtml#PC6) show a simple app that displays
    a random number every time the Activity is created.


    Listing [16-4](#457413_2_En_16_Chapter.xhtml#PC4) shows the code for the random
    number generator. It only has the two methods **getNumber()** and **createRandomNumber()**;
    each method leaves a Log statement, so we can inspect when and how many times
    the methods were called. The logic for the **getNumber()** method is simple—if
    the **minitialized** variable is false, that means we’re creating an instance
    of the RandomNumber class for the first time; so, we’ll create the random number
    and then simply return it. Otherwise, we’ll return whatever is the current value
    of the **minitialized** variable.


    ```

    import android.util.Log;

    import java.util.Random;

    public class RandomNumber  {

    private String TAG = getClass().getSimpleName();

    int mrandomnumber;

    boolean minitialized = false;

    String getNumber() {

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber + "";

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber = random.nextInt(100);

    minitialized = true;

    }

    }

    Listing 16-4

    RandomNumber class

    ```


    Listing [16-5](#457413_2_En_16_Chapter.xhtml#PC5) shows the code for our MainActivity.
    Everything happens inside the **onCreate()** method. When MainActivity enters
    the *CREATED* state, we create an instance of the RandomNumber class; we call
    the **getNumber()** method, and we set the value of the TextView to the result
    of the **getNumber()** method.


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data = new RandomNumber();

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    Listing 16-5

    MainActivity class

    ```


    Listing [16-6](#457413_2_En_16_Chapter.xhtml#PC6) shows the layout code for activity_main.


    ```


    Listing 16-6

    activity_main.xml

    ```


    When you run this code for the first time, you’ll see a random number displayed
    on the TextView, no surprises there. You’ll also see the Log entries for **createNumber()**
    and **getNumber()** in the Logcat window; no surprises there either. Now, while
    the app is running on the emulator, try to change the device’s orientation—you’ll
    notice that every time the screen orientation changes, the displayed number on
    the TextView changes as well. You’ll also see that additional logs for the **createNumber()**
    and **getNumber()** methods show up in Logcat. This is because the runtime destroys
    and re-creates the MainActivity every time the screen orientation changes. Our
    RandomNumber object also gets destroyed and re-created along with the MainActivity—our
    UI data cannot survive across orientation changes.


    This is a good case for using the ViewModel library so that the UI data can survive
    the destruction and re-creation of the Activity class. We only need to do three
    things to implement ViewModel:


    1.  Add the lifecycle extensions to our project’s dependencies, like what we did
    earlier. Go back to Listing [16-1](#457413_2_En_16_Chapter.xhtml#PC1) for instructions.


    2.  To make the RandomGenerator class a *ViewModel*, we will extend the ViewModel
    class from the AndroidX lifecycle libraries.


    3.  From the MainActivity, we’ll get an instance of the RandomNumber class using
    the factory method of the ViewModelProviders class, instead of merely creating
    an instance of the RandomNumber class.


    Listing [16-7](#457413_2_En_16_Chapter.xhtml#PC7) shows the changes in the RandomNumber
    class; the RandomNumber class is transformed automatically to a *ViewModel* object
    by extending the ViewModel class.


    ```

    import java.util.Random;

    import androidx.lifecycle.ViewModel;

    public class RandomNumber extends ViewModel {

    private String TAG = getClass().getSimpleName();

    int mrandomnumber;

    boolean minitialized = false;

    String getNumber() {

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber + "";

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber = random.nextInt(100);

    minitialized = true;

    }

    }

    Listing 16-7

    RandomNumber extends ViewModel

    ```


    The class remains mostly the same as its previous version shown in Listing [16-4](#457413_2_En_16_Chapter.xhtml#PC4);
    the only difference is that now it extends *ViewModel*.


    Now, let’s implement the changes on the MainActivity; Listing [16-8](#457413_2_En_16_Chapter.xhtml#PC8)
    shows the modified MainActivity which uses ViewModelProviders to get an instance
    of the RandomNumber class—which is our ViewModel object.


    | ❶ | This is the only change we need to do in MainActivity. Instead of directly
    managing the ViewModel object (the RandomNumber class) by creating an instance
    of it inside the onCreate() method, we’ll let the ViewModelProviders class manage
    the scope of our ViewModel object. |


    ```

    import androidx.lifecycle.ViewModelProviders;

    import android.os.Bundle;

    import android.widget.TextView;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data;

    data = ViewModelProviders.of(this).get(RandomNumber.class); ❶

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    Listing 16-8

    MainActivity and ViewModelProviders

    ```'
