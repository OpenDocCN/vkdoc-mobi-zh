    created navigation graph in the editor. Figure [10-6](#457413_2_En_10_Chapter.xhtml#Fig6)
    shows the newly created navigation graph—it’s empty, of course.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Navigation graph


    When you’re using Navigation components, navigation happens as an interaction
    between destinations. Destinations are what your users can navigate to, and destinations
    are connected via *actions* . At the moment, we don’t have any destination yet;
    so, let’s add one. Click the plus sign on the top panel of the navigation editor,
    as shown in Figure [10-7](#457413_2_En_10_Chapter.xhtml#Fig7), then choose “Create
    new destination.”


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Create a new destination'
  trans: '

    ## 使用 Jetpack Navigation


    为了更好地理解 Navigation 组件，最好能在一个小项目上实践。因此，请在 Android Studio 中创建一个新的空项目，如图 10-2 所示。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig2_HTML.jpg](img/457413_2_En_10_Fig2_HTML.jpg)


    图 10-2


    新建空项目


    接下来，我们需要添加 Navigation 组件依赖项。你可以在模块级别的 `build.gradle` 文件中完成此操作（如图 10-3 所示）。请注意，有两个
    `build.gradle` 文件，你需要选择标注了 (Module: app) 的那个。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig3_HTML.jpg](img/457413_2_En_10_Fig3_HTML.jpg)


    图 10-3


    `build.gradle` 文件（模块级别）


    编辑此文件，使其与代码清单 10-5 中的代码保持一致。


    ```

    dependencies {

    def nav_version = "2.2.2"

    implementation "androidx.navigation:navigation-fragment:$nav_version"

    implementation "androidx.navigation:navigation-ui:$nav_version"

    implementation fileTree(dir: "libs", include: ["*.jar"])

    implementation ''androidx.appcompat:appcompat:1.1.0''

    implementation ''androidx.constraintlayout:constraintlayout:1.1.3''

    testImplementation ''junit:junit:4.12''

    androidTestImplementation ''androidx.test.ext:junit:1.1.1''

    androidTestImplementation ''androidx.test.espresso:espresso-core:3.2.0''

    }

    ```


    代码清单 10-5


    向 `build.gradle` 添加导航


    在编写本书时，Navigation 组件的稳定版本是 `2.2.2`；此外还有一个测试版本 `2.3.0-beta01`。当你阅读本书时，版本可能已经更新。请务必查看官方
    Android 开发者网站以获取最新信息： [`https://developer.android.com/jetpack/androidx/releases/navigation`](https://developer.android.com/jetpack/androidx/releases/navigation)。


    接下来，让我们向项目添加导航图。你可以通过创建新的资源文件来创建导航图。右键单击项目的 `res` 文件夹，然后选择 **新建** ➤ **Android
    资源文件**，如图 10-4 所示。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig4_HTML.jpg](img/457413_2_En_10_Fig4_HTML.jpg)


    图 10-4


    添加新资源文件


    在“新建资源文件”对话框中，将资源类型更改为 *Navigation* 并提供文件名：


    * **文件名** — `nav_graph`

    * **资源类型** — *Navigation*（你必须点击下拉箭头进行选择）


    在接下来的窗口中（如图 10-5 所示），点击“确定”。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig5_HTML.jpg](img/457413_2_En_10_Fig5_HTML.jpg)


    图 10-5


    新建资源文件


    资源创建完成后，你会看到在项目 `res` 文件夹下出现了一个新文件夹(`navigation`)和一个新文件(`nav_graph.xml`)，如图 10-6
    所示。Android Studio 将在编辑器中打开新创建的导航图。图 10-6 显示了新创建的导航图——它当然是空的。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg](img/457413_2_En_10_Fig6_HTML.jpg)


    图 10-6


    导航图


    当你使用 Navigation 组件时，导航是通过目标之间的交互来完成的。目标是用户能够导航到的界面，而目标之间则通过*动作*进行连接。目前我们还没有任何目标，因此让我们添加一个。点击导航编辑器顶部面板上的加号，如图
    10-7 所示，然后选择“创建新目标”。


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg](img/457413_2_En_10_Fig7_HTML.jpg)


    图 10-7


    创建新目标

