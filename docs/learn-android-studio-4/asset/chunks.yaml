- fmt: '# Navigation Before Architecture Components


    In the early days of Android development, most nontrivial apps have more than
    one screen, and the UI was partitioned across multiple `Activity` classes. That
    meant you needed the skill to navigate from one `Activity` to another and back.
    So, during those days, you might have written something that looks like the code
    in Listing [10-1](#457413_2_En_10_Chapter.xhtml#PC1).


    ```

    class FirstActivity extends AppCompatActivity

    implements View.OnClickListener {

    public void onClick(View v) {

    Intent intent = new Intent(this, SecondActivity.class);

    startActivity(intent);

    }

    }

    // SecondActivity.java

    class SecondActivity extends AppCompatActivity { }

    Listing 10-1

    How to launch an Activity

    ```


    If you needed to pass data from one `Activity` to another, you might have coded
    it like the code snippet shown in Listing [10-2](#457413_2_En_10_Chapter.xhtml#PC2).


    ```

    Intent intent = new Intent(this, SecondActivity.class);

    Intent.putExtra("key", value);

    startActivity(intent);

    Listing 10-2

    How to pass data to another Activity

    ```


    This kind of screen management has the following advantages:


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig1_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Simple activity workflow


    * It’s simple to do; just call the `startActivity()` method from any `Activity`.

    * The currently running `Activity` can be closed programmatically by calling the
    `finish()` method. The user can also close the `Activity` by pressing the back
    button.

    * The back stack is completely managed by the Android Runtime; see Figure [10-1](#457413_2_En_10_Chapter.xhtml#Fig1).


    But not all is well; `Activity` navigation comes with some baggage. The disadvantages
    are:


    * We don’t have a clear idea which `Activity` classes are on the back stack—because
    we don’t manage it; here is an example of a trait being both an advantage and
    disadvantage at the same time.

    * Each screen requires a new `Activity`, which drains computing resources.

    * Each `Activity` was declared on the Android manifest file—which Android Studio
    does for you automatically each time you create an `Activity` using the wizards,
    so it’s not much of an issue; it was an issue before Android Studio came along.

    * It will be difficult for you to use the more modern navigation patterns like
    bottom navigation bar.


    Because of these limitations, another way of screen navigation emerged. Sometime
    in 2011 when Google released Android 4.0, we got `Fragment` classes. We just dealt
    with `Fragment` classes in the previous chapter, so I’m sure it’s still very fresh
    for you; an `Activity` is basically a composition unit for the UI, and the `Fragment`
    is just a smaller composition unit.


    A `Fragment`, like an `Activity`, is comprised of two parts—a Java or Kotlin program
    and a layout file. The idea is basically the same—define the UI in an XML file
    and then inflate the XML file during runtime so that all the UI in the XML file
    become actual Java objects.


    The idea is to create multiple fragments and contain them in a single `Activity`.
    You would generally hide or show a `Fragment` depending on either a user action,
    the orientation of the device, or the form factor of the device; and this is usually
    done with the `FragmentManager` and `FragmentTransaction` objects. The code snippet
    in Listing [10-3](#457413_2_En_10_Chapter.xhtml#PC3) is a typical fragment management
    code.


    ```

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    Listing 10-3

    Fragment snippet

    ```


    With `Fragment` classes, we know exactly what’s in the navigation stack, unlike
    when we’re using `Activity` navigation; but, as you can see in Listing [10-3](#457413_2_En_10_Chapter.xhtml#PC3),
    it can get cumbersome because we must manually manage the navigation stack.


    Thus far, we only had two options for navigation: either we use `Activity`-based
    navigation, which was easy and simple to use but we take some performance penalty
    and we don’t have control over the navigation stack, or we use `Fragment` classes
    which offered us full control of the navigation stack, but the API is cumbersome
    and prone to error.


    Fast forward to 2017 when Google introduced the Navigation components. Now we
    can use `Fragment` classes but without the baggage of the complicated API. With
    Navigation components, all the codes we’ve written in Listing [10-3](#457413_2_En_10_Chapter.xhtml#PC3)
    can now be replaced with a single line of code (see Listing [10-4](#457413_2_En_10_Chapter.xhtml#PC4)).


    ```

    findNavController().navigate(destination);

    // WE NO LONGER NEED THE FF CODES

    /*

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    */

    Listing 10-4

    Navigation component snippet

    ```'
