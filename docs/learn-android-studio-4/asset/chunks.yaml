    Since Android Studio 3.6, you can already replace **findViewById** calls with
    View binding; when it’s enabled for a module, it generates a binding class for
    each XML layout file that the module contains. Each binding class contains references
    to the root view and all views that have an ID. The name of the binding class
    is generated by converting the XML file’s name to camel case and adding the word
    "Binding" to the end—for example, in our project, we only have **activity_main.xml**;
    so, a class called **ActivityMainBinding** will be generated for us.


