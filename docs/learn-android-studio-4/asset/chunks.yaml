    \n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig12_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12\n\nSettings/Preferences window\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig11_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11\n\nHow to change Views in the Project tool window\n\n## Summary\n\
    \n*   You can see more of your codes by increasing the screen real estate for\
    \ the main editor. You can do this by\n    *   Collapsing all the tool windows\n\
    \n    *   Hiding the tool window bars\n\n    *   Entering distraction free mode\n\
    \n    *   Going to full screen mode\n\n*   You can change how you view the project\
    \ files from switching the view in the **Project tool window**.\n\n*   Adding\
    \ a TODO item is easy in Android Studio; just add a single line comment followed\
    \ by a TODO text, like this: // TODO This is my todo list.\n\n# 5. Android Application\
    \ Overview\n\n*What the chapter covers:*\n\n*   What makes up an Android project\n\
    \n*   Overview of Android components\n\n*   The manifest file\n\n*   Intents\n\
    \nNow that we know our way around Android Studio, let’s look closer at the structure\
    \ of an Android app.\n\n## What Makes Up an Android Project\n\nAn Android app\
    \ may look a lot like a desktop app; some may even think of them as mini desktop\
    \ apps, but that wouldn’t be correct. Android apps are structurally different\
    \ from their desktop or web counterparts. A desktop app generally contains all\
    \ the routines and subroutines it needs in order to function; occasionally, it\
    \ may rely on dynamically loaded libraries, but the executable file is self-contained.\
    \ An Android app, on the other hand, is made up of loosely coupled components\
    \ that communicate to each other using a message-passing mechanism. Figure [5-1](#457413_2_En_5_Chapter.xhtml#Fig1)\
    \ shows the logical structure of an app.\n\n![../images/457413_2_En_5_Chapter/457413_2_En_5_Fig1_HTML.jpg](images/457413_2_En_5_Chapter/457413_2_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nLogical representation of an Android app\n\nThe app in Figure\
