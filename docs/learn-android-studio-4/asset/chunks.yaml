    to `null` because we won’t instantiate here just yet. |

    | ❷ | We create an instance of the `MyReceiver` class inside the `onCreate()`
    method. |

    | ❸ | This statement is the programmatic equivalent of the `<intent-filter>` node
    we’ve seen earlier in Listing [15-1](#457413_2_En_15_Chapter.xhtml#PC1). To create
    an `IntentFilter` object, pass a broadcast action to its constructor. The broadcast
    action is the event you’d like to subscribe to. In this case, we’d like to be
    notified when the `Intent` whose action is `com.workingdev.SOMETHINGHAPPENED`
    is sent out; this `Intent` is an example of custom broadcast, not a system broadcast.
    As I mentioned previously, a custom broadcast action is just something you make
    up. As you can see in this example, the broadcast action is just a `String` object.
    |

    | ❹ | Use the `registerReceiver()` method of the `Activity` to register the receiver.
    The method takes two arguments: 1. An instance of `BroadcastReceiver` 2. An instance
    of an `IntentFilter` |

    | ❺ | Let’s call the `unregisterReceiver()` inside the `onPause()` callback. We
    don’t want to receive broadcast messages when `MainActivity` isn’t visible to
    the user. |


    ```java

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.IntentFilter;

    import android.os.Bundle;

    public class MainActivity extends AppCompatActivity {

    MyReceiver receiver = null; ❶

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    receiver = new MyReceiver(); ❷

    }

    @Override

    protected void onResume() {

    super.onResume();

    IntentFilter filter = new IntentFilter("com.workingdev.SOMETHINGHAPPENED"); ❸

    registerReceiver(receiver, filter); ❹

    }

    @Override

    protected void onPause() {

    super.onPause();

    unregisterReceiver(receiver); ❺

    }

    }

    ```


    Listing 15-4 - `MainActivity`


    To test our app, we need to do two things:


    1. Run our app in an emulator

    2. Send the custom broadcast message `com.workingdev.SOMETHINGHAPPENED`


    We can send the custom broadcast in either one of two ways. Firstly, we can programmatically
    send the custom broadcast message via an `Intent` object, like this:


    ```java

    Intent intent = new Intent("com.workingdev.SOMETHINGHAPPENED");

    sendBroadcastIntent(intent);

    ```


    You can put the two statements inside the click handler of a `Button` in an `Activity`
    class. You can put it inside the `MainActivity` of the current project or create
    a separate project for it altogether.


    Secondly, we can send the custom broadcast message via the Android Debug Bridge
    or `adb` for short. It’s a command-line tool that allows you to communicate with
    a device (physical or emulated). The `adb` can do quite a range of things like
    installing/uninstalling APKs, displaying logs, running Linux commands on the device,
    simulating phone calls, and many more. For our purpose, we’ll use the `adb` to
    send a broadcast `Intent`. You can find the `adb` program inside the `platform-tools`
    folder of the Android SDK. If you’ve forgotten where your Android SDK is located,
    go to Android Studio’s Settings (Windows or Linux) or Android Studio’s Preferences
    (macOS). You can do that by pressing the keys `Ctrl + Alt + S`, for Windows and
    Linux, or `Command + ,` (comma) for macOS; alternatively, you can also get to
    them using the main menu bar.


    The window that follows goes to **Appearance and Behavior** ➤ **System Settings**
    ➤ **Android SDK**, as shown in Figure [15-2](#457413_2_En_15_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_15_Chapter/457413_2_En_15_Fig2_HTML.jpg](images/457413_2_En_15_Chapter/457413_2_En_15_Fig2_HTML.jpg)


    Figure 15-2 - Location of the Android SDK


    Open a command-line window and switch to the directory of the Android SDK. From
    there, `cd` to `platform-tools`, run the following command:


    ```

    adb shell: a com.workingdev.SOMETHINGHAPPENED

    ```


    If you’re on macOS or Linux, you may have to prepend the command with a dot and
    forward slash, like this:


    ```

    ./adb shell am broadcast -a com.workingdev.SOMETHINGHAPPENED

    ```


    ## Summary


    * You can use `BroadcastReceiver`s and `Intent`s to create truly decoupled apps.

    * You can make your app listen to a specific broadcast and do something interesting
    when the broadcast is sent.

    * `BroadcastReceiver`s can be used to route program logic in your app. You can
    make the app behave in specific ways as a response to the changes in the runtime
    environment, for example, low battery, no WiFi connection.

    * `BroadcastReceiver`s can be registered via the manifest or via a `Context` object.


    # 16. Jetpack, LiveData, ViewModel, and Room


    *What we’ll cover:*


    * Lifecycle aware components

    * ViewModel

    * LiveData

    * Room


    We saw a bit of the Architecture components in Chapter [10](#457413_2_En_10_Chapter.xhtml).
    In this chapter, we’ll look at some other libraries in the Architecture components,
    namely, Room; it’s a persistence library that sits on top of SQLite. If you’ve
    used an ORM before (Object Relational Mapper), you can think of Room as something
    similar to that.


    In this chapter, we’ll also explore some more libraries in the Architecture components
    that go hand in hand with the Room libraries. We’ll look at lifecycle aware components,
    `LiveData`, and `ViewModel`; these, together with Room, are some of the libraries
    you’ll need to build a fluid and fluent database application.'
