- fmt: '# Intro to Event Handling


    The user interacts with your app by touching, clicking, swiping, or typing something.
    The Android framework captures, stores, processes, and sends these actions to
    your app as event objects. We respond to these events by writing methods that
    are specifically designed to handle them. Methods that handle events are written
    inside *listener objects* —and there’s quite a few of them. Figure [7-1](#457413_2_En_7_Chapter.xhtml#Fig1)
    shows a simplified model of how the Android framework and your app handle user
    actions.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig1_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig1_HTML.jpg)


    **Figure 7-1** — Simplified event handling model


    When a user does something with your app, like clicking a button, the Android
    framework catches that action and turns it into an event object. An event object
    contains data about the user’s action, for example, which button was clicked,
    the location of the button when it was clicked, and so on. Android sends this
    event object to the application, and it calls a specific method that corresponds
    with the user’s action. If the user *clicked* the button, Android would call the
    `onClick()` method on the `Button` object; if the user clicks the same button
    but holds it a bit longer, then the `onLongClick()` method will be called. `View`
    objects, like the `Button`, can respond to a range of events like clicks, keypresses,
    touch or swipes, and so on. Table [7-1](#457413_2_En_7_Chapter.xhtml#Tab1) lists
    some of the common events and their corresponding event handlers.


    **Table 7-1** — Common listener objects


    | Interface | Method | Description |

    | --- | --- | --- |

    | `View.OnClickListener` | `onClick()` | This gets called when the user either
    touches and holds the control (when in touch mode) or focuses upon the item with
    the navigation keys and then presses the ENTER key |

    | `View.OnLongClickListener` | `onLongClick()` | Almost the same as a click, but
    only longer |

    | `View.OnFocusChangeListener` | `onFocusChange()` | When the user navigates onto
    or away from the control |

    | `View.OnTouchListener` | `onTouch()` | Almost the same as the click action,
    but this handler lets you find out if the user swiped up or down. You can use
    this to respond to gestures |

    | `View.OnCreateContextMenuListener` | `onCreateContextMenu()` | Android calls
    this when a `ContextMenu` is being built, as a result of a long sustained click
    |


    To set up a listener, the `View` object can set or—more appropriately—register
    a *listener object*. Registering a listener means you tell the Android framework
    which method to call when the user interacts with the `View` object. Figure [7-2](#457413_2_En_7_Chapter.xhtml#Fig2)
    shows an annotated code for registering a listener object.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig2_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig2_HTML.jpg)


    **Figure 7-2** — Annotated event registration and handling


    The `setOnClickListener` is a member method of the `android.view.View` class,
    which means every child class of `View` has it. The method expects an `OnClickListener`
    object as an argument—this becomes the listener for the button control. When the
    button is clicked, the codes inside the `onClick` method will run.


    We created the listener object by creating an instance of an anonymous class that
    inherits from `View.OnClickListener`; this type is declared as a nested interface
    in the `View` class.


    Now that we know some bits about events, let’s put them into practice. Let’s create
    a new project; Table [7-2](#457413_2_En_7_Chapter.xhtml#Tab2) shows the details
    of the project.


    **Table 7-2** — Project details


    | Project detail | Value |

    | --- | --- |

    | Application name | `EventHandling` |

    | Company domain | Use your website name |

    | Language | `Java` |

    | Form factor | Phone and tablet only |

    | Minimum SDK | `API 29 (Q) Android 10` |

    | Type of activity | Empty |

    | Activity name | `MainActivity` |

    | Layout name | `activity_main` |


    The project will contain only two controls, the `TextView`, which came with the
    project when we used the wizard, and a `Button` view, which we are yet to add.
    The `Button` will intercept the events click and long click using an anonymous
    inner object.


    Open the `activity_main.xml` file in the main editor if it’s not opened yet. You
    can find it in the Project Explorer window under the `app` ➤ `res` ➤ `layout`
    folder.


    Add a `Button` object to the design surface and put some constraints on it. You
    can add a `Button` to the layout by dragging it from the palette and onto the
    design surface, just like you did in the previous chapter. Figure [7-3](#457413_2_En_7_Chapter.xhtml#Fig3)
    shows our project with an added `Button` object.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig3_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig3_HTML.jpg)


    **Figure 7-3** — Add a Button View to the project


    We want the `Button` to respond to the click event, so we’ll set up an `OnClickListener`
    object to do precisely this. Open the `MainActivity.java` in the main editor and
    add the event handling code, as shown in Listing [7-1](#457413_2_En_7_Chapter.xhtml#PC1).


    ```java

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    import android.widget.Toast;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button btn = (Button) findViewById(R.id.button); ❶

    btn.setOnClickListener(new View.OnClickListener(){ ❷

    @Override

    public void onClick(View view) { ❸

    Context ctx =  MainActivity.this;

    Toast.makeText(ctx, "Hello", Toast.LENGTH_LONG).show(); ❹

    }

    });

    }

    }

    ```


    **Listing 7-1** — `MainActivity.java`


    ❶   We get a reference to the `Button` View; `findViewById()` should do that job
    just fine.


    ❷   In this case, we set up a listener object, an `OnClickListener` object, because
    we want to listen to click events.


    ❸   We override the `onClick()` method of the `OnClickListener`; this is where
    we put the codes we want to run when the `Button` is clicked.


    ❹   We display a `Toast` message. A `Toast` is a small pop-up message that disappears
    after a couple of seconds. You can use it to send small feedback to the user.
    Showing a `Toast` message is a two-step process. The first step is to create a
    `Toast` message using the `makeText()` function. It takes three parameters: (1)
    the context of the application, which in our case is the instance of `MainActivity`,
    (2) the message to show, and (3) how long to display it. The second step is to
    make it visible by calling the `.show()` method.


    Figure [7-4](#457413_2_En_7_Chapter.xhtml#Fig4) shows the app when the `Button`
    is clicked.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig4_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig4_HTML.jpg)


    **Figure 7-4** — Toast message'
  raw: '## Intro to Event Handling


    The user interacts with your app by touching, clicking, swiping, or typing something.
    The Android framework captures, stores, processes, and sends these actions to
    your app as event objects. We respond to these events by writing methods that
    are specifically designed to handle them. Methods that handle events are written
    inside *listener objects* —and there’s quite a few of them. Figure [7-1](#457413_2_En_7_Chapter.xhtml#Fig1)
    shows a simplified model of how the Android framework and your app handle user
    actions.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig1_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Simplified event handling model


    When a user does something with your app, like clicking a button, the Android
    framework catches that action and turns it into an event object. An event object
    contains data about the user’s action, for example, which button was clicked,
    the location of the button when it was clicked, and so on. Android sends this
    event object to the application, and it calls a specific method that corresponds
    with the user’s action. If the user *clicked* the button, Android would call the
    **onClick()** method on the Button object; if the user clicks the same button
    but holds it a bit longer, then the **onLongClick()** method will be called. View
    objects, like the Button, can respond to a range of events like clicks, keypresses,
    touch or swipes, and so on. Table [7-1](#457413_2_En_7_Chapter.xhtml#Tab1) lists
    some of the common events and their corresponding event handlers.


    Table 7-1


    Common listener objects


    | Interface | Method | Description |

    | --- | --- | --- |

    | `View.OnClickListener` | `onClick()` | This gets called when the user either
    touches and holds the control (when in touch mode) or focuses upon the item with
    the navigation keys and then presses the ENTER key |

    | `View.OnLongClickListener` | `onLongClick()` | Almost the same as a click, but
    only longer |

    | `View.OnFocusChangeListener` | `onFocusChange()` | When the user navigates onto
    or away from the control |

    | `View.OnTouchListener` | `onTouch()` | Almost the same as the click action,
    but this handler lets you find out if the user swiped up or down. You can use
    this to respond to gestures |

    | `View.OnCreateContextMenuListener` | `onCreateContextMenu()` | Android calls
    this when a ContextMenu is being built, as a result of a long sustained click
    |


    To set up a listener, the View object can set or—more appropriately—register a
    *listener object* . Registering a listener means you tell the Android framework
    which method to call when the user interacts with the View object. Figure [7-2](#457413_2_En_7_Chapter.xhtml#Fig2)
    shows an annotated code for registering a listener object.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig2_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Annotated event registration and handling


    The **setOnClickListener** is a member method of the **android.view.View** class,
    which means every child class of View has it. The method expects an **OnClickListener**
    object as an argument—this becomes the listener for the button control. When the
    button is clicked, the codes inside the **onClick** method will run.


    We created the listener object by creating an instance of an anonymous class that
    inherits from **View.OnClickListener**; this type is declared as a nested interface
    in the View class.


    Now that we know some bits about events, let’s put them into practice. Let’s create
    a new project; Table [7-2](#457413_2_En_7_Chapter.xhtml#Tab2) shows the details
    of the project.


    Table 7-2


    Project details


    | Project detail | Value |

    | --- | --- |

    | Application name | EventHandling |

    | Company domain | Use your website name |

    | Language | Java |

    | Form factor | Phone and tablet only |

    | Minimum SDK | API 29 (Q) Android 10 |

    | Type of activity | Empty |

    | Activity name | MainActivity |

    | Layout name | activity_main |


    The project will contain only two controls, the TextView, which came with the
    project when we used the wizard, and a Button view, which we are yet to add. The
    Button will intercept the events click and long click using an anonymous inner
    object.


    Open the **activity_main.xml** file in the main editor if it’s not opened yet.
    You can find it in the Project Explorer window under the *app* ➤ *res* ➤ *layout*
    folder.


    Add a Button object to the design surface and put some constraints on it. You
    can add a Button to the layout by dragging it from the palette and onto the design
    surface, just like you did in the previous chapter. Figure [7-3](#457413_2_En_7_Chapter.xhtml#Fig3)
    shows our project with an added Button object.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig3_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Add a Button View to the project


    We want the Button to respond to the click event, so we’ll set up an **OnClickListener**
    object to do precisely this. Open the MainActivity.java in the main editor and
    add the event handling code, as shown in Listing [7-1](#457413_2_En_7_Chapter.xhtml#PC1).


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    import android.widget.Toast;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button btn = (Button) findViewById(R.id.button); ❶

    btn.setOnClickListener(new View.OnClickListener(){ ❷

    @Override

    public void onClick(View view) { ❸

    Context ctx =  MainActivity.this;

    Toast.makeText(ctx, "Hello", Toast.LENGTH_LONG).show(); ❹

    }

    });

    }

    }

    Listing 7-1

    MainActivity.java

    ```


    ❶   We get a reference to the Button View; `findViewById()` should do that job
    just fine.


    ❷   In this case, we set up a listener object, an **OnClickListener** object,
    because we want to listen to click events.


    ❸   We override the **onClick()** method of the **OnClickListener**; this is where
    we put the codes we want to run when the Button is clicked.


    ❹   We display a **Toast** message. A Toast is a small pop-up message that disappears
    after a couple of seconds. You can use it to send small feedback to the user.
    Showing a Toast message is a two-step process. The first step is to create a Toast
    message using the `makeText(`) function. It takes three parameters: (1) the context
    of the application, which in our case is the instance of MainActivity, (2) the
    message to show, and (3) how long to display it. The second step is to make it
    visible by calling the **.show()** method.


    Figure [7-4](#457413_2_En_7_Chapter.xhtml#Fig4) shows the app when the Button
    is clicked.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig4_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Toast message'
