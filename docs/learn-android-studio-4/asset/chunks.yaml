    \n*献给我的爱人和斯蒂芬妮。*\n\n# 引言\n\n欢迎阅读 *《学习 Android Studio 4》* 。本书将帮助你开启与绿色小机器人（Android）的编程之旅。你已经购买了这本书（非常感谢你），因此无需再向你说明移动平台编程为软件开发人员提供了许多机会。\n\
