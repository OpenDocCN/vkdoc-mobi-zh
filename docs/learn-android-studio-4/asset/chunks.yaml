    ## Summary\n\n*   When you try to do too much on the main thread, the runtime\
    \ may start dropping frame rates, which results in jank.\n*   The UI thread is\
    \ responsible for creating the UI elements, among other things. Don’t overburden\
    \ this thread. If you need to do some time-consuming or resource-consuming tasks,\
    \ spawn a background thread and do that task there.\n\n# 12. Debugging\n\n*What\
    \ we’ll cover:*\n\n*   Kinds of errors you’ll encounter\n*   Logging debug statements\n\
    *   Using the debugger\n\nAll but the most trivial programs are without errors.\
    \ Dealing with errors will be a big part of your life as a developer. This chapter\
    \ will discuss the kinds of errors you’ve faced and will still face in the foreseeable\
    \ future. We will also discuss how you can use Android Studio to ease the difficulty\
    \ of dealing with these errors.\n\n## Types of Errors\n\nThe three most common\
    \ errors you’ll face in programming are:\n\n*   Syntax errors\n*   Runtime errors\n\
    *   Logic errors\n\n### Syntax Errors\n\nSyntax errors are exactly what you think\
    \ they are, errors in the syntax. It happens because you wrote something in the\
    \ code that’s not allowed in the set of rules of the Java compiler. The compiler\
    \ doesn’t understand it. The error can be as simple as forgetting to close a parenthesis\
    \ or a missing pair of a curly brace. It can also be complex like passing the\
    \ wrong type of argument to a function or a parameterized class when using generics.\n\
    \nYou can catch syntax errors with Android Studio with ease. Whenever you see\
    \ red squiggly lines in the main editor, like Figure 12-1.\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig1_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1** Main editor showing error indicators\n\nIt means something is\
