    5. When you reach the end of the file, stop reading. Do what you need to do with\
    \ what you’ve read, and don’t forget to close it.\n\nListing 14-2 shows an annotated\
    \ code snippet on how to read `String` data from a file.\n\n| ❶ | We won’t be\
