    # 架构组件之前的导航方式


    在 Android 开发的早期，大多数有意义的应用都包含多个屏幕，UI 被分散在多个 `Activity` 类中。这意味着你需要掌握从一个 `Activity`
    导航到另一个并返回的技能。因此，在那个时期，你可能会写出类似于示例 10-1 中的代码。


    ```

    class FirstActivity extends AppCompatActivity

    implements View.OnClickListener {

    public void onClick(View v) {

    Intent intent = new Intent(this, SecondActivity.class);

    startActivity(intent);

    }

    }

    // SecondActivity.java

    class SecondActivity extends AppCompatActivity { }

    示例 10-1

    如何启动 Activity

    ```


    如果你需要将数据从一个 `Activity` 传递到另一个，可能会编写类似示例 10-2 中所示的代码片段。


    ```

    Intent intent = new Intent(this, SecondActivity.class);

    Intent.putExtra("key", value);

    startActivity(intent);

    示例 10-2

    如何将数据传递到另一个 Activity

    ```


    这种屏幕管理方式具有以下优势：


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig1_HTML.jpg](img/457413_2_En_10_Fig1_HTML.jpg)


    图 10-1


    简单的 Activity 工作流程


    *   实现简单；只需从任意 `Activity` 调用 `startActivity()` 方法即可。

    *   可以通过编程方式调用 `finish()` 方法关闭当前正在运行的 `Activity`。用户也可以按返回键关闭 `Activity`。

    *   返回栈完全由 Android 运行时管理；参见图 10-1。


    但并非一切完美；`Activity` 导航也带来了一些负担。其缺点如下：


    *   我们无法清晰了解返回栈中有哪些 `Activity` 类——因为我们不管理它；这里有一个特点既是优点也是缺点的例子。

    *   每个屏幕都需要一个新的 `Activity`，这会消耗计算资源。

    *   每个 `Activity` 都需要在 Android 清单文件中声明——不过当你使用向导创建 `Activity` 时，Android Studio
    会自动为你完成，因此这不算大问题；在 Android Studio 出现之前确实是个问题。

    *   你将难以使用更现代的导航模式，例如底部导航栏。


    由于这些限制，出现了另一种屏幕导航方式。大约在 2011 年，谷歌发布 Android 4.0 时，我们有了 `Fragment` 类。我们在上一章刚刚讨论过
    `Fragment` 类，所以我相信你对它还很熟悉；`Activity` 本质上是一个 UI 组合单元，而 `Fragment` 则是一个更小的组合单元。


    `Fragment` 和 `Activity` 一样，由两部分组成——一个 Java 或 Kotlin 程序以及一个布局文件。其基本思想相同——在 XML
    文件中定义 UI，然后在运行时加载该 XML 文件，这样 XML 文件中的所有 UI 就会变成实际的 Java 对象。


    其核心思想是创建多个 fragment 并将它们包含在一个 `Activity` 中。通常，根据用户操作、设备方向或设备外形，你需要隐藏或显示某个 `Fragment`；这通常通过
    `FragmentManager` 和 `FragmentTransaction` 对象来完成。示例 10-3 中的代码片段是典型的 fragment 管理代码。


    ```

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    示例 10-3

    Fragment 代码片段

    ```


    使用 `Fragment` 类时，我们确切知道导航栈中的内容，这与使用 `Activity` 导航不同；但是，如示例 10-3 所示，它可能变得笨拙，因为我们必须手动管理导航栈。


    到目前为止，我们只有两种导航选择：要么使用基于 `Activity` 的导航，简单易用，但会带来一些性能开销且无法控制导航栈；要么使用 `Fragment`
    类，它让我们完全控制导航栈，但 API 笨拙且容易出错。


    时间快进到 2017 年，谷歌引入了导航组件（Navigation components）。现在我们可以使用 `Fragment` 类，而无需处理复杂 API
    的负担。使用导航组件，我们在示例 10-3 中编写的所有代码现在都可以用一行代码替换（参见示例 10-4）。


    ```

    findNavController().navigate(destination);

    // 我们不再需要以下代码

    /*

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    */

    示例 10-4

    导航组件代码片段

    ```

    '
- fmt: '# Navigation Components


    Alright, that single line of code reference from the previous section probably
    got you excited—and relieved. But it’s not the savings of keystrokes that’s the
    big picture here, it’s the fact that now we can get the best of both Activity-based
    and Fragment-based navigation. Now, Fragment navigation also has an easy API.


    But first, we need to understand a bit about Navigation components. It’s a small
    part of Architecture components, which is in turn a part of a bigger thing called
    Android Jetpack—we’re not getting into Jetpack nor Architecture components in
    detail here; they are large topics, but a brief background can’t hurt.


    At Google I/O 2017, Google introduces the Android Architecture components. These
    libraries are part of a larger collection called Android Jetpack. Together with
    Architecture components, there were others like Foundation, Behavior, and UI.


    Jetpack is a collection of Android software components. It helps us follow the
    best practices and lets us avoid writing too much boilerplate code. You’ll find
    the Jetpack codes in the `androidx.*` package libraries.


    Here’s a brief description of the Jetpack components:


    **Foundation**


    * **AppCompat**—Lets you write code that degrade gracefully on older versions
    of Android

    * **Android KTX**—So you write more concise, idiomatic Kotlin code, if you’re
    using Kotlin

    * **Multidex**—Provides support for apps with multiple DEX files

    * **Test**—A testing framework for unit and runtime UI tests


    **Behavior**


    * **Download manager**—Lets you write programs that schedule and manage large
    downloads

    * **Media and playback**—Backward-compatible APIs for media playback and routing

    * **Notifications**—Provide a backward-compatible notification API with support
    for wear and auto

    * **Permissions**—Compatibility APIs for checking and requesting app permissions

    * **Preferences**—Create interactive settings screens

    * **Sharing**—Provides a share action suitable for an app’s action bar

    * **Slices**—Create flexible UI elements that can display app data outside the
    app


    **UI**


    * **Animations and transitions**—Move widgets and transition between screens

    * **Auto**—If you’re working on apps that will run in vehicles’ infotainment consoles,
    you’ll need this. These are the components that help you build apps for Android
    Auto

    * **Emoji**—Enables an up-to-date emoji font on older platforms

    * **Fragment**—All the Fragment codes already moved here

    * **Layout**—Layout widgets using different algorithms

    * **Palette**—Pulls useful information out of color palettes

    * **TV**—Components to help develop apps for Android TV

    * **Wear OS by Google**—If you want to work with Android wearables like the watch,
    this is what you need


    **Architecture**


    * **Data binding**—Declaratively binds observable data to UI elements

    * **Lifecycles**—Manage Activity and Fragment lifecycles

    * **LiveData**—Notify views when underlying database changes

    * **Paging**—Gradually load information on demand from your data source; think
    when the user is scrolling through a list, this helps you handle the loading of
    data. It’s coupled with the Recycler view

    * **ViewModel**—Manages UI-related data in a lifecycle-conscious way

    * **WorkManager**—Manages background jobs

    * **Navigation**—Implementation of navigation in an app. Passes data between screens.
    Provides deep links from outside the app

    * **Room**—Think ORM for your SQLite database


    There’s a lot to explore in Jetpack, so make sure you check them out.


    Going back to our topic, the Navigation components simplify the implementation
    of, well, navigation between destinations in an app. A destination is any place
    in your app. It could be an Activity, a fragment inside an Activity, or a custom
    view; and destinations are managed using a navigation graph.


    A navigation graph groups all the destinations and defines the different connections
    between the destinations; these connections are called actions. The graph is simply
    an XML resource file which represents all your app’s navigation paths. You can
    have more than one navigation graph in your app.'
