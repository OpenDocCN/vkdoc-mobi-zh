  trans: '

    ### Espresso 操作


    `Espresso Actions` 让你能够在测试期间以编程方式与 `View` 对象进行交互。前面我们已经使用了 `click`，但实际上 `ViewActions`
    还能让你做更多事情。方法名称非常具有描述性，因此无需额外解释；你可以从名称看出它们的作用。以下列举了其中一些方法：


    *   `clearText()`

    *   `closeSoftKeyboard()`

    *   `doubleClick()`

    *   `longClick()`

    *   `openLink()`

    *   `pressBack()` — 按下返回键

    *   `replaceText(String arg)`

    *   `swipeDown()`

    *   `swipeRight()`

    *   `swipeUp()`

    *   `typeText(String arg)`


    还有更多可用的操作，请务必查阅 `ViewAction` 对象的 API 文档。


    在本章结束之前，请务必访问 Android Developers 网站上关于 `Espresso` 的官方文档：[`https://bit.ly/androidstudioespresso`](https://bit.ly/androidstudioespresso)；我们在这里只是浅尝辄止地介绍了
    `Espresso`。


    ### 总结


    *   我们讨论了可以为应用进行的各种测试；你不必进行所有测试，但请确保执行适用于你应用的测试。

    *   开发测试（单元测试）应作为核心开发任务；尝试养成编写测试用例和实际代码的习惯。

    *   将 JVM 测试放在 `src/test` 目录下，将插桩测试放在 `src/androidTest` 目录下。

    *   你可以使用 `Espresso` 创建插桩测试；在 `Espresso` 中需要两个核心组件：`ViewMatchers` 和 `ViewActions`。

    *   编写 `Espresso` 测试的一般步骤如下：(1) 使用 `ViewMatchers` 找到 `View` 对象，(2) 使用 `ViewActions`
    对 `View` 执行操作，(3) 进行断言。

    *   创建 `Espresso` 测试的一个简便方法是使用 `Espresso` 录制器。


    # 14. 文件操作


    *本章将涵盖：*


    *   Android 文件 I/O 简介

    *   内部存储与外部存储

    *   如何使用内部存储


    当你需要处理视频、音频、json 或纯文本文件时，可以使用 Java 文件 I/O 操作本地文件。如果你之前使用过 Java 中的 `File`、`InputStream`、`OutputWriter`
    以及其他 I/O 类，那么在 Android 中也会用到相同的类。在 Android 中，不同之处在于文件的存储位置。在 Java 桌面应用程序中，你可以将文件存放在几乎任何地方。但在
    Android 中则不然。就像在 Java Web 应用程序中一样，Android 应用不能随意在任何地方创建和读取文件。应用只有在特定位置才拥有读写权限。


    ## 内部与外部存储


    Android 区分内部存储和外部存储。*内部*存储指的是闪存中所有已安装应用共享的那一部分。*外部*存储指的是用户可挂载的存储空间——通常是指 sdcard，但也不一定是。只要用户能够挂载，任何设备都可以；它甚至可以是内部闪存的一部分。


    两种选择各有优缺点，你需要根据应用的需求和每种存储的局限性进行权衡。以下列表展示了部分优缺点。


    **内部存储**


    *   应用始终可以访问该内存。不存在用户卸载 sdcard 或其他设备的风险。它能保证始终可用。

    *   存储空间比外部存储小，因为你的应用只会被分配与其他所有应用共享的一部分闪存空间。这在早期的 Android 版本中是个问题，但现在已不那么令人担忧。根据
    Android 兼容性定义，自 Android 6.0 起，Android 手机或平板电脑至少需要为 `/data` 分区预留 1.5GB 的非易失性空间。对于大多数应用来说，这个空间是足够的。你可以在此处阅读兼容性定义：[`bit.ly/android6compatibilitydefinition`](https://bit.ly/android6compatibilitydefinition)。

    *   当你的应用在此空间创建文件时，只有你的应用能够访问这些文件；除非手机已 root（大多数用户不会 root 手机，因此通常无需担心）。

    *   卸载应用时，它创建的所有文件都将被删除。


    **外部存储**


    *   通常比内部存储拥有更大的空间。

    *   可能并非始终可用，例如，当用户移除 sdcard 或将其作为 USB 驱动器挂载时。

    *   此处的所有文件对所有应用和用户都是可见的。任何人和任何应用都可以在此创建和保存文件。他们也可以删除文件。

    *   当应用在此空间创建文件时，文件的寿命可以超过应用本身；卸载应用时，其创建的文件不会被删除。


    ## 缓存目录


    无论你选择内部存储还是外部存储，可能还需要就文件位置做出另一个决定。你可以将文件放在缓存目录或更持久的位置。当空间不足时，Android 操作系统或第三方应用可能会回收缓存目录中的文件。除非你手动删除，否则不在缓存目录中的文件通常是安全的。在本章中，我们将不涉及缓存目录或外部存储。我们将只使用内部存储，并将文件放在标准位置。

    '
- fmt: "# How to Work with Internal Storage\n\nAs said earlier, working with file\
    \ storage in Android is like working with the usual classes in Java I/O. There\
    \ are few options to use like `openFileInput()` and `openFileOutput()` or other\
    \ ways to use `InputStreams` and `OutputStreams`. You just need to remember that\
    \ these calls will not let you specify the file paths. You can only provide the\
    \ filename; if you’re not concerned with that, go ahead and use them—it’s what\
    \ we will use in this chapter. If, on the other hand, you need more flexibility,\
    \ you can use the `getFilesDir()` or `getCacheDir()` to get a `File` object that\
    \ points to the root of your file locations—use `getCacheDir()` if you want to\
    \ work with the cache directories of the internal storage. When you have a `File`\
    \ object, you can create your directory and file structure from there.\n\nThat’s\
    \ the general lay of the territory when it comes to Android file storage. Again,\
    \ in this chapter, we’ll only work with internal storage in the standard location\
    \ (not cache).\n\nWriting to a file requires a few simple steps. You need to:\n\
    \n1. Decide on a filename\n2. Get a `FileOutputStream` object\n3. Convert your\
    \ content to a `ByteArray`\n4. Write the `ByteArray` using the `FileOutputStream`\n\
    5. Don’t forget to close the file\n\nListing 14-1 shows an annotated code snippet\
    \ on how to save `String` data to a file.\n\n| ❶ | Choose a filename. |\n| ❷ |\
    \ This is the `String` we want to save to a file. In a real app, you may be getting\
    \ this from the contents of an `EditText` component. |\n| ❸ | `openFileOutput()`\
    \ returns a `FileOutputStream`; we need this object so we can write to a file.\
    \ The first parameter of the call is the name of the file you want to create.\
    \ The second parameter is a `Context` mode. We’re using `MODE_PRIVATE` because\
    \ we want the file to be private to the app. We’re using the try-with-resources\
    \ block here; this way, we don’t have to bother closing the file. When the block\
    \ exits, it will close the file object for us automatically. |\n| ❹ | The `write()`\
    \ method expects a `ByteArray`. So, we need to convert the `String` to a byte\
    \ array. The `getBytes()` method should do that just fine. |\n\n```\nString filename\
    \ = \"myfile.txt\"; ❶\nString str = \"The quick brown fox jumped over the head\"\
    ; ❷\ntry (FileOutputStream out = openFileOutput(filename, Context.MODE_PRIVATE))\
    \ { ❸\n    out.write(str.getBytes()); ❹\n} catch (IOException e) {\n    e.printStackTrace();\n\
    }\nListing 14-1\nSaving String data to a file\n```\n\nReading from a file involves\
    \ more steps than writing to it. You generally need to do the following:\n\n1.\
    \ Get a `FileInputStream`.\n2. Read from the stream, one byte at a time.\n3. Keep\
    \ on reading until there’s nothing more to read. You’ll know when you’re at the\
    \ end of the file if the value of the last byte you’ve read is `-1`. It’s time\
    \ to stop by then.\n4. As you work your way to the end of the file, you need to\
    \ store the bytes you’re taking from the stream into a temporary container. A\
    \ `StringBuilder` or a `StringBuffer` should do the trick. Building a `String`\
    \ object using the `plus` operator is wasteful and inefficient because `Strings`\
    \ are immutable. Each time you use the `plus` operator, it creates a new `String`\
    \ object; if your file has 2000 characters, you would have created 2000 `String`\
