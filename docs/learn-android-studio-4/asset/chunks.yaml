    # 13. 测试


    *我们将涵盖：*


    * 测试类型

    * 单元测试

    * 测试基础

    * 关于插桩测试

    * 如何创建 UI 测试交互

    * 基本的测试交互

    * 实现测试验证

    * 测试录制


    在前面的章节中，我们完成了一些编程工作。接下来，我们将学习一些测试概念和技术。开发生命周期会经历一个测试阶段，以发现代码中的所有错误和不一致之处。一个完善的应用程序不应存在粗糙的边角。我们需要测试它、调试它，并确保它不会占用过多的计算资源。


    ## 测试类型


    **功能测试**。功能测试是测试应用程序的标准方法。之所以称为*功能性*测试，是因为我们测试的是应用程序的功能（也称为功能特性），这些功能在需求规格说明书中被指定——需求说明书是你在应用程序规划阶段或业务分析师编写的。需求说明书通常会记录在文档中（通常称为功能需求规格说明书）。功能规格说明书中可能包含的示例如：“用户必须在进入应用前登录服务器”、“用户必须提供有效的电子邮件进行注册”等等。执行这些测试的测试人员，通常被称为
    QA 或 QC（分别是质量保证和质量控制的缩写）。他们会创建测试资产、制定测试策略、执行测试，并最终报告执行结果。失败的测试通常会被指派回开发者（你）进行修复并重新提交。我这里描述的是拥有独立或专门测试团队的开发团队的典型做法；如果你是单人团队，那么
    QA 很可能也是你。测试是一项完全不同的技能，我强烈建议你寻求其他人的帮助，最好是有测试经验的人。


    **性能测试**。从名称上你可能就能猜到这类测试是做什么的。它将应用程序推向极限，观察其在压力下的表现。这里你想要看到的是应用在承受超常规条件时的响应情况。**浸泡测试或耐力测试**是一种性能测试；通常，你会让应用程序长时间运行，并在各种操作模式下运行，例如，让应用在暂停状态或标题画面长时间停留。你试图找出应用在这些条件下的响应方式，以及它如何利用系统资源，如内存、CPU、网络带宽等；你将使用
    *Android Profiler* 等工具来进行这些测量。


    另一种形式的性能测试是**容量测试**；如果你的应用使用了数据库，你可能想知道当数据加载到数据库时它如何响应。你检查的是系统在不同数据负载下的反应。


    **尖峰测试**或可扩展性测试也是性能测试的另一种形式。如果应用依赖于中央服务器，该测试通常会提高连接到中央服务器的用户（设备端点）数量。你需要观察用户数量的激增如何影响用户体验——应用是否仍然响应迅速？对每秒帧数是否有影响？是否存在延迟？等等。


    **兼容性测试**是检查应用在不同设备和硬件/软件配置下的表现。在这种情况下，AVD（Android 虚拟设备）会派上用场；因为 AVD 只是软件模拟器，你无需购买不同的设备。尽可能使用
    AVD。有些应用在模拟器上难以可靠测试；当遇到这种情况时，你必须花钱购买测试设备。


    **合规性或一致性测试**。如果你正在构建一款游戏应用，这是你根据 Google Play 关于应用或游戏的指南检查游戏的地方；请务必阅读 Google Play
    的开发者政策中心，网址为 [`https://bit.ly/developerpolicycenter`](https://bit.ly/developerpolicycenter)。确保你同时也熟悉
    PEGI（泛欧洲游戏信息组织）和 ESRB（娱乐软件分级委员会）。如果游戏应用包含与特定分级不符的不良内容，需要识别并报告。违规可能导致被拒，从而造成代价高昂的返工和重新提交。如果你正在收集用户数据，你可能需要审计应用以检查其是否符合适用的数据隐私法规。


    **本地化测试**至关重要，特别是对于面向全球市场的应用。应用的标题、内容和文本需要翻译成支持的语言并进行测试。


    **恢复测试**。这是将边界情况测试提升到另一个层次。在这里，强制应用失败，你观察应用在失败过程中的表现以及失败后如何恢复。它应该能让你了解是否编写了足够的
    `try-catch-finally` 块。应用应优雅地失败，而不是突然崩溃。只要可能，运行时错误应由 `try-catch` 块保护；当异常发生时，尝试写入日志并保存应用状态。


    **渗透测试或安全测试**。这类测试试图发现应用的弱点。它模拟潜在攻击者会采取的活动，以绕过应用的所有安全功能；例如，如果应用使用数据库存储数据，尤其是用户数据，渗透测试人员（从事渗透测试的专业人员）可能会在运行
    Wireshark 的同时使用该应用——Wireshark 是一种检查数据包的工具；它是一个网络协议分析器。如果你以明文形式存储密码，它将在这些测试中显现出来。


    **声音测试**。如果你的应用使用声音，检查加载文件时是否有错误；同时，听一下声音文件是否有爆裂声等。


    **开发者测试**。这是你（程序员）在向应用添加一层又一层代码时所进行的测试。这包括编写测试代码（同样使用 Java）来测试你的实际程序。这被称为单元测试。Android
    开发者通常执行 JVM 测试和插桩测试；我们将在后续章节中更详细地讨论单元测试。


    ## 单元测试


    单元测试是由开发者（而非 QA 或 QC）执行的功能测试。单元测试很简单；它测试的是某个方法可能执行或产生的特定行为。一个应用通常会有许多单元测试，因为每个测试都是一组非常狭窄定义的行为。因此，你需要大量测试来覆盖完整的功能。Android
    开发者通常使用 JUnit 来编写单元测试。


    JUnit 是由 Kent Beck 和 Erich Gamma 编写的回归测试框架。你可能还记得他们，除了其他成就外，前者是极限编程的创始人，后者是“四人帮”（GoF，设计模式）的成员之一。


    Java 开发者长期以来一直使用 JUnit 进行单元测试。Android Studio 内置了 JUnit，并且与其集成得非常好。我们无需在设置方面做太多工作。只需要编写我们的测试即可。

