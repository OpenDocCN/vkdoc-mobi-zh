    | ❸ | 该语句在程序上等同于我们之前在清单 15-1 中看到的 `<intent-filter>` 节点。要创建一个 `IntentFilter` 对象，需将一个广播动作传递给它对应的构造器。广播动作就是您希望订阅的事件。在这个例子中，我们希望收到动作名为
    `com.workingdev.SOMETHINGHAPPENED` 的 `Intent` 被发送时的通知；这个 `Intent` 是自定义广播的一个示例，而非系统广播。正如我之前提到的，自定义广播动作实际上就是您自己定义的内容。如本例所示，广播动作仅仅是一个
    `String` 对象。 |

    | ❹ | 使用 `Activity` 的 `registerReceiver()` 方法来注册接收器。该方法接受两个参数：1. `BroadcastReceiver`
    的实例 2. 一个 `IntentFilter` 的实例 |

    | ❺ | 让我们在 `onPause()` 回调中调用 `unregisterReceiver()`。我们不希望在 `MainActivity` 对用户不可见时接收到广播消息。
    |


    ```java

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.IntentFilter;

    import android.os.Bundle;

    public class MainActivity extends AppCompatActivity {

    MyReceiver receiver = null; ❶

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    receiver = new MyReceiver(); ❷

    }

    @Override

    protected void onResume() {

    super.onResume();

    IntentFilter filter = new IntentFilter("com.workingdev.SOMETHINGHAPPENED"); ❸

    registerReceiver(receiver, filter); ❹

    }

    @Override

    protected void onPause() {

    super.onPause();

    unregisterReceiver(receiver); ❺

    }

    }

    ```


    清单 15-4 - `MainActivity`


    要测试我们的应用，需要做两件事：


    1. 在模拟器中运行我们的应用

    2. 发送自定义广播消息 `com.workingdev.SOMETHINGHAPPENED`


    我们可以通过以下两种方式之一发送自定义广播。首先，可以通过 `Intent` 对象以编程方式发送自定义广播消息，如下所示：


    ```java

    Intent intent = new Intent("com.workingdev.SOMETHINGHAPPENED");

    sendBroadcastIntent(intent);

    ```


    您可以将这两条语句放入 `Activity` 类中某个 `Button` 的点击处理程序里。您可以将它们放在当前项目的 `MainActivity` 中，或者专门为此创建一个单独的项目。


    其次，我们可以通过 Android 调试桥（简称 `adb`）发送自定义广播消息。这是一个命令行工具，允许您与设备（物理设备或模拟设备）进行通信。`adb`
    可以执行多种操作，比如安装/卸载 APK、显示日志、在设备上运行 Linux 命令、模拟电话呼叫等等。针对我们的需求，我们将使用 `adb` 来发送广播 `Intent`。您可以在
    Android SDK 的 `platform-tools` 文件夹中找到 `adb` 程序。如果您忘记了 Android SDK 的位置，请前往 Android
    Studio 的“设置”（Windows 或 Linux）或 Android Studio 的“偏好设置”（macOS）。您可以通过按 `Ctrl + Alt
    + S`（Windows 和 Linux）或 `Command + ,`（逗号）（macOS）来打开它们；或者，您也可以使用主菜单栏找到它们。


    随后出现的窗口会导航到 **外观与行为** ➤ **系统设置** ➤ **Android SDK**，如图 15-2 所示。


    ![../images/457413_2_En_15_Chapter/457413_2_En_15_Fig2_HTML.jpg](img/457413_2_En_15_Fig2_HTML.jpg)


    图 15-2 - Android SDK 的位置


    打开一个命令行窗口，切换到 Android SDK 的目录。然后，从那里 `cd` 进入 `platform-tools`，运行以下命令：


    ```

    adb shell: a com.workingdev.SOMETHINGHAPPENED

    ```


    如果您使用的是 macOS 或 Linux，可能需要在命令前加上点号和斜杠，如下所示：


    ```

    ./adb shell am broadcast -a com.workingdev.SOMETHINGHAPPENED

    ```


    ## 总结


    * 您可以使用 `BroadcastReceiver` 和 `Intent` 来创建真正解耦的应用。

    * 您可以让您的应用监听特定的广播，并在广播发送时执行一些有趣的操作。

    * `BroadcastReceiver` 可用于路由您应用中的程序逻辑。您可以针对运行时环境的变化（例如，电量低、无 WiFi 连接）让应用以特定方式运行。

    * `BroadcastReceiver` 可以通过清单文件或通过 `Context` 对象进行注册。


    # 16. Jetpack、LiveData、ViewModel 和 Room


    *本章内容概要：*


    * 生命周期感知组件

    * ViewModel

    * LiveData

    * Room


    我们在第 10 章中稍微了解了一些架构组件。在本章中，我们将探讨架构组件中的其他一些库，即 Room；它是一个建立在 SQLite 之上的持久化库。如果您以前使用过
    ORM（对象关系映射器），您可以把 Room 想象成类似的东西。


    在本章中，我们还将探索架构组件中与 Room 库相辅相成的一些其他库。我们将研究生命周期感知组件、`LiveData` 和 `ViewModel`；这些库与
    Room 一起，构成了构建流畅顺滑的数据库应用程序所需的一些基础库。

