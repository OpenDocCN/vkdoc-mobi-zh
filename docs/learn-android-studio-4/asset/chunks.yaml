- fmt: '## Room


    If you want to include database functionalities to your app, you might want to
    look at `Room`. Before `Room`, the two popular ways to build database apps were
    either using `Realm` or just using good ole `SQLite`. Dealing with `SQLite` was
    considered to be a bit low level; it felt too close to the metal and, as such,
    was a bit cumbersome to use. `Realm` was quite popular among developers, but it
    wasn’t a first-party solution, no matter the popularity. Thankfully, we now have
    `Room`.


    `Room` is an abstraction on top of `SQLite`; if you’ve used an ORM before, like
    `Hibernate`, it’s similar to that. `Room` has several advantages over using plain
    vanilla `SQLite`; with `Room`:


    - You don’t have to deal with raw queries for basic database operations.

    - It verifies the SQL queries at compile time, so you don’t need to worry about
    SQL injection—remember those?

    - There is no impedance mismatch between your database objects and Java objects.
    `Room` takes care of it; you only need to deal with Java objects.


    `Room` has three major components, the `Entity`, the `Dao`, and the `Database`
    component. Their relationship with the application is shown in Figure [16-4](#457413_2_En_16_Chapter.xhtml#Fig4).


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig4_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig4_HTML.jpg)


    **Figure 16-4** Room components


    - **Entity**—An `Entity` is used to represent a database table. You code it as
    a class that’s decorated by the `@Entity` annotation.

    - **Dao** or Data Access Object is a class that contains methods to access the
    tables in the database. This is where you code your CRUD (create, read, update,
    and delete). This is an *interface* that’s decorated by the `@Dao` annotation.

    - **Database**—This component holds a reference to the database. It’s an abstract
    class that is annotated by the `@Database` annotation.


    Before you can use `Room` in a project, you need to add its dependencies to the
    `build.gradle` file (module level), as shown in Listing [16-11](#457413_2_En_16_Chapter.xhtml#PC11).


    ```

    dependencies {

    def room_version = "2.1.0-alpha07"

    implementation "androidx.room:room-runtime:$room_version"

    annotationProcessor "androidx.room:room-compiler:$room_version"

    . . .

    }

    ```


    **Listing 16-11** Room dependencies


    Listings [16-12](#457413_2_En_16_Chapter.xhtml#PC12), [16-13](#457413_2_En_16_Chapter.xhtml#PC13),
    [16-14](#457413_2_En_16_Chapter.xhtml#PC14), and [16-15](#457413_2_En_16_Chapter.xhtml#PC15)
    show the four Java source files that demonstrate `Room`’s basic usage.


    | ❶ | The `@Entity` annotation makes this an `Entity`. If you don’t pass the `tableName`
    argument, the table’s name will default to the name of the decorated class. You
    will only need to pass this argument if you want the table’s name to be different
    from the decorated class. So, what I wrote here is unnecessary and redundant because
    I set the value of `tableName` to “person,” which is the same as the decorated
    class name. |

    | ❷ | We’re making the `uid` member variable the primary key; we’re also saying
    it can’t be null. |

    | ❸ | The member variables of the class will automatically become the fields on
    the table. The column names on the table will take after the member variables’
    names unless you use the `@ColumnInfo` annotation. If you want the name of the
    table field (column) to be different from the name of the member variable, use
    the `@ColumnInfo` decoration, as shown here, and set the `name` to your preferred
    column name. |


    ```

    import androidx.annotation.NonNull;

    import androidx.room.Entity;

    import androidx.room.PrimaryKey;

    @Entity(tableName = "person") ❶

    public class Person {

    @PrimaryKey(autoGenerate = true) ❷

    @NonNull public int uid;

    @ColumnInfo(name="last_name") ❸

    public String last_name;

    public String first_name;

    public Person(String lname, String fname) {

    last_name = lname;

    first_name = fname;

    }

    public Person() {}

    }

    ```


    **Listing 16-12** Person class, the Entity


    | ❶ | A DAO needs to be annotated by the `@Dao` decorator. |

    | ❷ | Daos have to be written as interfaces. |

    | ❸ | Use the `@Insert` decorator to indicate that the decorated method will be
    used for inserting records to the table. Similarly, you will decorate methods
    for update, query, and delete with `@Update`, `@Query`, and `@Delete`, respectively.
    |

    | ❹ | Use the `@Query` to write SQL select statements. Each `@Query` is verified
    at compile time; if there is a problem with the query, a compilation error occurs
    instead of a runtime error. That should put your mind at ease. |


    ```

    import java.util.List;

    import androidx.room.Dao;

    import androidx.room.Delete;

    import androidx.room.Insert;

    import androidx.room.Query;

    import androidx.room.Update;

    @Dao ❶

    interface PersonDAO { ❷

    @Insert  ❸

    void insertPerson(Person person);

    @Update

    void updatePerson(Person person);

    @Delete

    void deletePerson(Person person);

    @Query("SELECT * FROM person") ❹

    public List listPeople();

    }

    ```


    **Listing 16-13** PersonDAO, the Data Access Object


    | ❶ | Use the `@Database` to signify that this class is the database holder. Use
    the `entities` argument to specify the Entities that are in the database. If you
    have more than one Entity, use commas to separate the list. The second argument
    is the `version`; this is an integer value that specifies the version of your
    DB. |

    | ❷ | A Database class is *abstract* and extends the `RoomDatabase`. |

    | ❸ | You need to provide an abstract class that will return an instance of the
    DAO object. |

    | ❹ | You need to provide a static method to get an instance of the Database.
    It doesn’t have to be a singleton, like what we did here, but I imagine you don’t
    want more than one instance of the Database class. |

    | ❺ | Use the `databaseBuilder()` method to create an instance of the `RoomDatabase`.
    There are three arguments to the builder method: (1) an application context; (2)
    the abstract class, which is annotated by `@Database`; and (3) the name of the
    database file. This will be the filename of `SQLite` dB. |


    ```

    import android.content.Context;

    import androidx.room.Database;

    import androidx.room.Room;

    import androidx.room.RoomDatabase;

    @Database(entities = {Person.class}, version = 1) ❶

    public abstract class AppDatabase extends RoomDatabase { ❷

    private static AppDatabase minstance;

    private static final String DB_NAME = "person_db";

    public abstract PersonDAO getPersonDAO(); ❸

    public static synchronized AppDatabase getInstance(Context ctx) { ❹

    if(minstance == null) {

    minstance = Room.databaseBuilder(ctx.getApplicationContext(), ❺

    AppDatabase.class,

    DB_NAME)

    .fallbackToDestructiveMigration()

    .build();

    }

    return minstance;

    }

    }

    ```


    **Listing 16-14** AppDatabase, the database holder


    Now that all our `Room` components are in place, we can use them from our app.
    Listing [16-15](#457413_2_En_16_Chapter.xhtml#PC15) shows how to use `Room` components
    from an `Activity`.


    | ❶ | To begin using the `RoomDatabase`, get an instance of using the factory
    method we coded in the `AppDatabase` earlier. |

    | ❷ | Let’s collect the data from the `TextViews`. |

    | ❸ | `Room` follows best practices, so it won’t allow you to run any database
    query on the main UI thread. You need to create a background thread and run all
    your `Room` commands in there. Here, I used a quick and dirty `Thread` and `Runnable`
    objects, but you’re free to use any other means of background execution, for example,
    `AsyncTask`. |

    | ❹ | Create a `Person` object using the inputs from the `TextViews`. |

    | ❺ | Let’s get an instance of the DAO. |

    | ❻ | Do an *insert* using the `insertPerson()` method we coded in the DAO earlier.
    |

    | ❼ | Let’s do a *SELECT*. |

    | ❽ | And list all entries in our `person` table. |'
