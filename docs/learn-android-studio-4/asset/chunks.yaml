- fmt: "# Handling Long Clicks\n\nView objects can handle more than one kind of event.\
    \ We can make our `Button` respond to both clicks (which we just did) and long\
    \ clicks (which we’re about to do).\n\nWe will set up another listener object\
    \ for the `Button` object, this time, a listener for long-click events. Like the\
    \ click listener, we will set up the long-click listener inside the `onCreate`\
    \ method of the `Activity` class, since the `Activity` doesn’t have to be visible\
    \ before we set up the listeners. If you feel that the `onCreate` method is getting\
    \ crowded already, feel free to refactor the method and relocate all the event\
    \ handling codes somewhere else. For our example, I’ll keep the event handling\
    \ codes inside the `onCreate` method. The code for the long-click listener is\
    \ shown in Listing [7-2](#457413_2_En_7_Chapter.xhtml#PC2).\n\n```\nbtn.setOnLongClickListener(new\
    \ View.OnLongClickListener() {\n@Override\npublic boolean onLongClick(View view)\
    \ {\nreturn true;\n}\n});\nListing 7-2\nLong-click listener\n```\n\nIt is very\
    \ similar to the click handler in construction; we call the `setXXXListener` method\
    \ and pass an instance of an anonymous listener class to it as an argument. We\
    \ override the method (`onLongClick`, in this case) of the same listener object\
    \ and put our codes in it—and that’s about it.\n\nWe could do another `Toast`\
    \ message here, but I thought it might be instructive to use a different feedback\
    \ mechanism, like `Snackbar`. `Snackbar` is like `Toast`, but instead of floating\
    \ the text message, `Snackbar`’s message is anchored at the bottom of the screen.\
    \ You can make it disappear after some timeout (just like `Toast`) or make the\
    \ user swipe it away. `Snackbar` is more capable than `Toast` because you can\
    \ include some actions in the message, like a small dialog box.\n\nBefore we can\
    \ proceed, we need to make two changes to the project. We need to:\n\n1.  Change\
    \ the value of the layout container’s `id` property. By default, the layout container\
    \ doesn’t have an `id`, and it’s usually okay because we didn’t have to refer\
    \ to it from our Java code. Now, we will have to. The `Snackbar`’s construction\
    \ requires that we refer to the layout container.\n2.  Add a dependency in our\
    \ Gradle file. The `Snackbar` isn’t readily available for use; you will have to\
    \ include it in the project’s dependency file.\n\nLet’s deal with the layout file\
    \ first. Open the `activity_main` layout file, then change the value of the main\
    \ layout file’s `id` property. By default, the layout container doesn’t have a\
    \ value on its `id` property; we need to give it one right now because we need\
    \ to reference it in code later.\n\nWhen `activity_main` is open in the main editor,\
    \ switch to design mode; click somewhere in the body of the layout container,\
    \ as shown in Figure [7-5](#457413_2_En_7_Chapter.xhtml#Fig5). In the Attributes\
    \ panel, edit the `id` property and set the value to `root_layout`.\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5  \nChange the `id` property of the layout container\n\nNext, open\
    \ the `build.gradle` file. There are two Gradle files: one is at the project’s\
    \ root folder, and the other is inside the app folder. It’s the latter that we\
    \ need to update. Open the module-level Gradle file by double-clicking the `build.gradle\
    \ (Module: App)`, as shown in Figure [7-6](#457413_2_En_7_Chapter.xhtml#Fig6).\n\
    \n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6  \n`build.gradle` file\n\nThen, add the `implementation 'com.google.android.material:material:1.0.0'`\
    \ line in the dependencies section, as shown in Listing [7-3](#457413_2_En_7_Chapter.xhtml#PC3).\
    \ This will make the `Snackbar` object available for use.\n\n```\ndependencies\
    \ {\nimplementation fileTree(dir: \"libs\", include: [\"*.jar\"])\nimplementation\
    \ 'androidx.appcompat:appcompat:1.1.0'\nimplementation 'androidx.constraintlayout:constraintlayout:1.1.3'\n\
    testImplementation 'junit:junit:4.12'\nandroidTestImplementation 'androidx.test.ext:junit:1.1.1'\n\
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'\nimplementation\
    \ 'com.google.android.material:material:1.0.0'\n}\nListing 7-3\nThe dependencies\
    \ section of build.gradle\n```\n\nNow that we fixed the Gradle file and the layout\
    \ container `id`, we can write the `Snackbar` code; Listing [7-4](#457413_2_En_7_Chapter.xhtml#PC4)\
    \ shows the code to display a `Snackbar`.\n\n```\nbtn.setOnLongClickListener(new\
    \ View.OnLongClickListener() {\n@Override\npublic boolean onLongClick(View view)\
    \ {\nView vtemp = findViewById(R.id.root_layout);\nSnackbar.make(vtemp,\"Long\
    \ click\", Snackbar.LENGTH_LONG).show();\nreturn true;\n}\n});\nListing 7-4\n\
    Codes for displaying Snackbar\n```\n\nThe `onLongClick` method returns a boolean\
    \ value. We returned `true` from the method to tell the Android Runtime that we\
    \ have already consumed it; there’s no need for other handlers (like `onClick`)\
    \ to consume it again. Had we returned `false`, the `onClick` handler would have\
    \ kicked right in after the `onLongClick` method returns.\n\nListing [7-5](#457413_2_En_7_Chapter.xhtml#PC5)\
    \ shows the full code of `MainActivity.java` for your reference.\n\n```\nimport\
    \ androidx.appcompat.app.AppCompatActivity;\nimport android.content.Context;\n\
    import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
    import android.widget.Toast;\nimport com.google.android.material.snackbar.Snackbar;\n\
    public class MainActivity extends AppCompatActivity {\n@Override\nprotected void\
    \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\nButton btn = (Button) findViewById(R.id.button);\n\
    btn.setOnClickListener(new View.OnClickListener(){\n@Override\npublic void onClick(View\
    \ view) {\nContext ctx =  MainActivity.this;\nToast.makeText(ctx, \"Hello\", Toast.LENGTH_LONG).show();\n\
    }\n});\nbtn.setOnLongClickListener(new View.OnLongClickListener() {\n@Override\n\
    public boolean onLongClick(View view) {\nView vtemp = findViewById(R.id.root_layout);\n\
    Snackbar.make(vtemp,\"Long click\", Snackbar.LENGTH_LONG).show();\nreturn true\
    \ ;\n}\n});\n}\n}\nListing 7-5\nComplete code for MainActivity.java\n```\n\nFigure\
    \ [7-7](#457413_2_En_7_Chapter.xhtml#Fig7) shows the app on the emulator after\
    \ a long click to the `Button`.\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7  \nApp showing the `Snackbar` message\n\n# Summary\n\n*   You can\
    \ set the `android:onClick` attribute to a name of a function if you want to handle\
    \ simple click events.\n*   Listener objects must be registered to the Android\
    \ Runtime if you’re going to intercept certain events.\n*   There are many kinds\
    \ of listener objects, and they are listed as nested interfaces in the `View`\
    \ class.\n*   You can associate multiple listeners to the same `View` object.\n\
    *   Make sure to return `false` on an `onLongClick` method, if you don’t want\
    \ other event handlers to handle it.\n\n# 8. Intents\n\n*What we’ll cover:*\n\n\
    *   Intent overview\n*   Explicit and implicit Intents\n*   Passing data between\
    \ activities\n*   Returning results from Intents\n\nAndroid’s architecture is\
    \ unique in the way it builds applications. It has this notion of components instead\
    \ of just plain objects. And the way that Android makes these components interact\
    \ is something that you can only find in the Android platform. Android uses Intents\
    \ as a way for its components to communicate; it uses it to pass messages across\
    \ components. In this chapter, we’ll look at Intents, what they are, and how we\
    \ use them."
  raw: '## Handling Long Clicks


    View objects can handle more than one kind of event. We can make our Button respond
    to both clicks (which we just did) and long clicks (which we’re about to do).


    We will set up another listener object for the Button object, this time, a listener
    for long-click events. Like the click listener, we will set up the long-click
    listener inside the onCreate method of the Activity class, since the Activity
    doesn’t have to be visible before we set up the listeners. If you feel that the
    **onCreate** method is getting crowded already, feel free to refactor the method
    and relocate all the event handling codes somewhere else. For our example, I’ll
    keep the event handling codes inside the **onCreate** method. The code for the
    long-click listener is shown in Listing [7-2](#457413_2_En_7_Chapter.xhtml#PC2).


    ```

    btn.setOnLongClickListener(new View.OnLongClickListener() {

    @Override

    public boolean onLongClick(View view) {

    return true;

    }

    });

    Listing 7-2

    Long-click listener

    ```


    It is very similar to the click handler in construction; we call the **setXXXListener**
    method and pass an instance of an anonymous *listener* class to it as an argument.
    We override the method (onLongClick, in this case) of the same listener object
    and put our codes in it—and that’s about it.


    We could do another Toast message here, but I thought it might be instructive
    to use a different feedback mechanism, like Snackbar. Snackbar is like Toast,
    but instead of floating the text message, Snackbar’s message is anchored at the
    bottom of the screen. You can make it disappear after some timeout (just like
    Toast) or make the user swipe it away. Snackbar is more capable than Toast because
    you can include some actions in the message, like a small dialog box.


    Before we can proceed, we need to make two changes to the project. We need to


    1.  Change the value of the layout container’s id property. By default, the layout
    container doesn’t have an id, and it’s usually okay because we didn’t have to
    refer to it from our Java code. Now, we will have to. The Snackbar’s construction
    requires that we refer to the layout container.


    2.  Add a dependency in our Gradle file. The Snackbar isn’t readily available
    for use; you will have to include it in the project’s dependency file.


    Let’s deal with the layout file first. Open the *activity_main* layout file, then
    change the value of the main layout file’s id property. By default, the layout
    container doesn’t have a value on its **id** property; we need to give it one
    right now because we need to reference it in code later.


    When activity_main is open in the main editor, switch to design mode; click somewhere
    in the body of the layout container, as shown in Figure [7-5](#457413_2_En_7_Chapter.xhtml#Fig5).
    In the Attributes panel, edit the **id** property and set the value to **root_layout**.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Change the id property of the layout container


    Next, open the **build.gradle** file. There are two gradle files: one is at the
    project’s root folder, and the other is inside the app folder. It’s the latter
    that we need to update. Open the module-level gradle file by double-clicking the
    **build.gradle (Module: App)**, as shown in Figure [7-6](#457413_2_En_7_Chapter.xhtml#Fig6).


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg)


    Figure 7-6


    build.gradle file


    Then, add the **implementation ''com.google.android.material:material:1.0.0''**
    line in the dependencies section, as shown in Listing [7-3](#457413_2_En_7_Chapter.xhtml#PC3).
    This will make the Snackbar object available for use.


    ```

    dependencies {

    implementation fileTree(dir: "libs", include: ["*.jar"])

    implementation ''androidx.appcompat:appcompat:1.1.0''

    implementation ''androidx.constraintlayout:constraintlayout:1.1.3''

    testImplementation ''junit:junit:4.12''

    androidTestImplementation ''androidx.test.ext:junit:1.1.1''

    androidTestImplementation ''androidx.test.espresso:espresso-core:3.2.0''

    implementation ''com.google.android.material:material:1.0.0''

    }

    Listing 7-3

    The dependencies section of build.gradle

    ```


    Now that we fixed the Gradle file and the layout container id, we can write the
    Snackbar code; Listing [7-4](#457413_2_En_7_Chapter.xhtml#PC4) shows the code
    to display a Snackbar.


    ```

    btn.setOnLongClickListener(new View.OnLongClickListener() {

    @Override

    public boolean onLongClick(View view) {

    View vtemp = findViewById(R.id.root_layout);

    Snackbar.make(vtemp,"Long click", Snackbar.LENGTH_LONG).show();

    return true;

    }

    });

    Listing 7-4

    Codes for displaying Snackbar

    ```


    The **onLongClick** method returns a boolean value. We returned *true* from the
    method to tell the Android Runtime that we have already consumed it; there’s no
    need for other handlers (like **onClick**) to consume it again. Had we returned
    false, the **onClick** handler would have kicked right in after the onLongClick
    method returns.


    Listing [7-5](#457413_2_En_7_Chapter.xhtml#PC5) shows the full code of MainActivity.java
    for your reference.


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Context;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    import android.widget.Toast;

    import com.google.android.material.snackbar.Snackbar;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button btn = (Button) findViewById(R.id.button);

    btn.setOnClickListener(new View.OnClickListener(){

    @Override

    public void onClick(View view) {

    Context ctx =  MainActivity.this;

    Toast.makeText(ctx, "Hello", Toast.LENGTH_LONG).show();

    }

    });

    btn.setOnLongClickListener(new View.OnLongClickListener() {

    @Override

    public boolean onLongClick(View view) {

    View vtemp = findViewById(R.id.root_layout);

    Snackbar.make(vtemp,"Long click", Snackbar.LENGTH_LONG).show();

    return true ;

    }

    });

    }

    }

    Listing 7-5

    Complete code for MainActivity.java

    ```


    Figure [7-7](#457413_2_En_7_Chapter.xhtml#Fig7) shows the app on the emulator
    after a long click to the Button.


    ![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg](images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    App showing the Snackbar message


    ## Summary


    *   You can set the **android:onClick** attribute to a name of a function if you
    want to handle simple click events.


    *   Listener objects must be registered to the Android Runtime if you’re going
    to intercept certain events.


    *   There are many kinds of listener objects, and they are listed as nested interfaces
    in the View class.


    *   You can associate multiple listeners to the same View object.


    *   Make sure to return false on an **onLongClick** method, if you don’t want
    other event handlers to handle it.


    # 8. Intents


    *What we’ll cover:*


    *   Intent overview


    *   Explicit and implicit Intents


    *   Passing data between activities


    *   Returning results from Intents


    Android’s architecture is unique in the way it builds applications. It has this
    notion of components instead of just plain objects. And the way that Android makes
    these components interact is something that you can only find in the Android platform.
    Android uses Intents as a way for its components to communicate; it uses it to
    pass messages across components. In this chapter, we’ll look at Intents, what
    they are, and how we use them.'
  trans: "\n# 处理长按点击\n\n视图对象可以处理多种类型的事件。我们可以让`Button`同时响应单击（刚才已经实现）和长按点击（即将实现）。\n\n\
    我们将为`Button`对象设置另一个监听器对象，这次是用于监听长按事件的监听器。与点击监听器类似，我们会在`Activity`类的`onCreate`方法中设置长按监听器，因为在设置监听器时`Activity`无需处于可见状态。如果你觉得`onCreate`方法已经变得过于拥挤，可以随时重构该方法，将所有事件处理代码迁移到其他地方。在本示例中，我将把事件处理代码保留在`onCreate`方法内。长按监听器的代码如代码清单\
    \ 7-2 所示。\n\n```\nbtn.setOnLongClickListener(new View.OnLongClickListener() {\n\
    @Override\npublic boolean onLongClick(View view) {\nreturn true;\n}\n});\n代码清单\
    \ 7-2\n长按监听器\n```\n\n这个监听器在结构上与点击处理程序非常相似；我们调用`setXXXListener`方法，并将一个匿名监听器类的实例作为参数传递进去。然后重写同一个监听器对象的方法（这里重写的是`onLongClick`方法），并将我们的代码写入其中——仅此而已。\n\
    \n我们也可以在这里再次使用`Toast`消息，但我认为使用另一种反馈机制（比如`Snackbar`）可能更具启发性。`Snackbar`与`Toast`类似，但与在屏幕上方悬浮显示文本消息不同，`Snackbar`的消息会固定在屏幕底部显示。你可以让它在超时后自动消失（就像`Toast`一样），或者让用户通过滑动将其关闭。`Snackbar`的功能比`Toast`更强大，因为您可以在消息中包含一些操作选项，就像一个小对话框一样。\n\
    \n在继续之前，我们需要对项目进行两处修改。我们需要：\n\n1.  更改布局容器的`id`属性值。默认情况下，布局容器没有设置`id`，这通常没问题，因为我们之前无需从\
    \ Java 代码中引用它。但现在我们需要这样做了。`Snackbar`的构造要求我们引用布局容器。\n2.  在 Gradle 文件中添加一个依赖项。`Snackbar`并不能直接使用；你需要将其包含在项目的依赖文件中。\n\
    \n我们先处理布局文件。打开`activity_main`布局文件，然后更改主布局文件`id`属性的值。默认情况下，布局容器的`id`属性没有值；我们现在需要给它设置一个值，因为稍后需要在代码中引用它。\n\
    \n当`activity_main`在主编辑器中打开时，切换到设计模式；点击布局容器主体内的任意位置，如图 7-5 所示。在属性面板中，编辑`id`属性并将其值设置为`root_layout`。\n\
    \n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg](img/457413_2_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5  \n更改布局容器的`id`属性\n\n接下来，打开`build.gradle`文件。这里有两个 Gradle 文件：一个位于项目的根文件夹中，另一个位于\
    \ app 文件夹内。我们需要更新的是后者。通过双击`build.gradle (Module: App)`打开模块级别的 Gradle 文件，如图 7-6\
    \ 所示。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg](img/457413_2_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6  \n`build.gradle`文件\n\n然后，在依赖项部分添加`implementation 'com.google.android.material:material:1.0.0'`这一行，如代码清单\
    \ 7-3 所示。这将使`Snackbar`对象可供使用。\n\n```\ndependencies {\nimplementation fileTree(dir:\
    \ \"libs\", include: [\"*.jar\"])\nimplementation 'androidx.appcompat:appcompat:1.1.0'\n\
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'\ntestImplementation\
    \ 'junit:junit:4.12'\nandroidTestImplementation 'androidx.test.ext:junit:1.1.1'\n\
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'\nimplementation\
    \ 'com.google.android.material:material:1.0.0'\n}\n代码清单 7-3\nbuild.gradle 文件中的\
    \ dependencies 部分\n```\n\n现在我们已经修复了 Gradle 文件和布局容器的`id`，可以编写`Snackbar`的代码了；代码清单\
    \ 7-4 展示了显示`Snackbar`的代码。\n\n```\nbtn.setOnLongClickListener(new View.OnLongClickListener()\
    \ {\n@Override\npublic boolean onLongClick(View view) {\nView vtemp = findViewById(R.id.root_layout);\n\
    Snackbar.make(vtemp,\"长按点击\", Snackbar.LENGTH_LONG).show();\nreturn true;\n}\n\
    });\n代码清单 7-4\n用于显示 Snackbar 的代码\n```\n\n`onLongClick`方法返回一个布尔值。我们从该方法返回`true`，是为了告知\
    \ Android 运行时我们已经处理了该事件；不需要其他处理程序（比如`onClick`）再次处理它。如果我们返回`false`，那么当`onLongClick`方法返回后，`onClick`处理程序就会立即生效。\n\
    \n代码清单 7-5 展示了`MainActivity.java`的完整代码，供你参考。\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.content.Context;\nimport android.os.Bundle;\nimport android.view.View;\n\
    import android.widget.Button;\nimport android.widget.Toast;\nimport com.google.android.material.snackbar.Snackbar;\n\
    public class MainActivity extends AppCompatActivity {\n@Override\nprotected void\
    \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\nButton btn = (Button) findViewById(R.id.button);\n\
    btn.setOnClickListener(new View.OnClickListener(){\n@Override\npublic void onClick(View\
    \ view) {\nContext ctx =  MainActivity.this;\nToast.makeText(ctx, \"你好\", Toast.LENGTH_LONG).show();\n\
    }\n});\nbtn.setOnLongClickListener(new View.OnLongClickListener() {\n@Override\n\
    public boolean onLongClick(View view) {\nView vtemp = findViewById(R.id.root_layout);\n\
    Snackbar.make(vtemp,\"长按点击\", Snackbar.LENGTH_LONG).show();\nreturn true ;\n}\n\
    });\n}\n}\n代码清单 7-5\nMainActivity.java 的完整代码\n```\n\n图 7-7 展示了在模拟器上对`Button`进行长按点击后应用的状态。\n\
    \n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg](img/457413_2_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7  \n应用显示`Snackbar`消息\n\n# 总结\n\n*   如果你想处理简单的点击事件，可以将`android:onClick`属性设置成一个函数名。\n\
    *   如果你打算拦截某些事件，必须将监听器对象注册到 Android 运行时。\n*   有多种类型的监听器对象，它们被列为`View`类中的嵌套接口。\n\
    *   你可以将多个监听器关联到同一个`View`对象上。\n*   如果你不希望其他事件处理程序处理该事件，请确保在`onLongClick`方法中返回`false`。\n\
    \n# 8. 意图\n\n*我们将涵盖的内容：*\n\n*   意图概述\n*   显式意图和隐式意图\n*   在活动之间传递数据\n*   从意图返回结果\n\
    \nAndroid 在构建应用程序的方式上独一无二。它引入了组件这一概念，而不仅仅是普通对象。而 Android 让这些组件进行交互的方式是 Android\
    \ 平台独有的。Android 使用意图作为其组件之间通信的方式；它通过意图在组件之间传递消息。在本章中，我们将探讨意图，了解它们是什么以及如何使用它们。\n"
- fmt: "# What Intents Are\n\nAn `Intent` is an abstract description of an operation\
    \ to be performed. It’s a unique Android concept because no other platform uses\
    \ the same thing as a means of component activation. In the earlier chapters,\
    \ we looked at what’s inside an Android application. You might remember that an\
    \ app is just a bunch of “components” (see Figure [8-1](#457413_2_En_8_Chapter.xhtml#Fig1))\
    \ that are loosely held together, and each component is declared in the `AndroidManifest`\
    \ file.\n\n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig1_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** Logical representation of an Android App\n\nLaunching an `Activity`\
    \ isn’t as simple as creating an instance of a particular `Activity` class. It’s\
    \ a bit more involved than that. An `Activity` isn’t merely an object; it’s a\
    \ component, and component activation in Android requires the use of `Intents`.\n\
    \nTo launch an `Activity`, we need to create an `Intent` object, tell this `Intent`\
    \ object what we want to activate, and then launch it. After that, the Android\
    \ Runtime tries to resolve the `Intent`, and if successful, the target component\
    \ gets activated. In code, it looks like this:\n\n```\nIntent intent = new Intent(context,\
    \ target);\nstartActivity(intent);\n```\n\nwhere:\n- **context** — Is a reference\
    \ to the component that wants to initiate or launch the `Intent`.\n- **target**\
    \ — Is a class object; this is the component you want to launch.\n\nA typical\
    \ scenario when launching an `Activity` (usually from the `MainActivity`) is when\
    \ a user clicks a button or selects a menu item.\n\nTo try this out, you will\
    \ need a project with two `Activities`. You already know how to create a project\
    \ with an empty `Activity`, so just create that; presumably, the first `Activity`\
    \ class’ name is `MainActivity`. To add another `Activity`, we can use the context\
    \ menu. On the Project tool window, right-click the **app** folder (assuming you’re\
    \ on the Android scope, which is the default), then choose **New** ➤ **Activity**\
    \ ➤ **Empty Activity**, as shown in Figure [8-2](#457413_2_En_8_Chapter.xhtml#Fig2).\n\
    \n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig2_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2** New Empty Activity\n\nIn the window that follows, type the second\
    \ `Activity` name, as shown in Figure [8-3](#457413_2_En_8_Chapter.xhtml#Fig3).\
    \ Adopt the suggested layout name (or change it to your liking), and make sure\
    \ it’s on the same Java package and that the source language is Java. Click **Finish**\
    \ to proceed.\n\n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig3_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3** New Android Activity\n\nNext, open `activity_main.xml` and edit\
    \ it to match Listing [8-1](#457413_2_En_8_Chapter.xhtml#PC2).\n\n```\nListing\
    \ 8-1\napp/res/layout/activity_main.xml\n```\n\nWhat I’ve done in the `activity_main`\
    \ layout was to remove the default `TextView` object and replaced it with a `Button`\
    \ View (whose **id** is `button`).\n\nNow we can work on `MainActivity`. We need\
    \ to attach a click handler to the `Button`, and on that handler, we create and\
    \ launch an `Intent`. Listing [8-2](#457413_2_En_8_Chapter.xhtml#PC3) shows the\
    \ annotated code to do that.\n\n| ❶ | Let’s get a reference to the `Button` View.\
    \ |\n| ❷ | Create an `OnClickListener` object and bind it to the `Button` object.\
    \ |\n| ❸ | Inside the `onClick()` method, let’s create an `Intent` object. The\
    \ first parameter is a `Context` object, which is supposed to refer to `MainActivity`.\
    \ I wrote `MainActivity.this` and not merely `this` because currently we’re making\
    \ the call inside a click handler (which is an anonymous class); `this` would\
    \ refer to the anonymous class’ instance and not to `MainActivity`. To be explicit,\
    \ we refer to the context of `MainActivity` as `MainActivity.this`. Alternatively,\
    \ you can also pass the Application Context as the first parameter. You can get\
    \ the Application Context using the method `getApplicationContext()`. The second\
    \ parameter is the class object of the component we want to launch, which is `SecondActivity`;\
    \ so, we pass `SecondActivity.class`. |\n| ❹ | Finally, we call the `startActivity()`\
    \ method of `MainActivity`, and we pass the `Intent` object as the parameter;\
    \ this will launch the `Intent`. |\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.content.Intent;\nimport android.os.Bundle;\nimport android.view.View;\n\
    import android.widget.Button;\n\npublic class MainActivity extends AppCompatActivity\
    \ {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n\
    \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \n        Button btn = findViewById(R.id.button); ❶\n\n        btn.setOnClickListener(new\
    \ View.OnClickListener() { ❷\n            @Override\n            public void onClick(View\
    \ view) {\n                Intent intent = new Intent(MainActivity.this, SecondActivity.class);\
    \ ❸\n                startActivity(intent); ❹\n            }\n        });\n  \
    \  }\n}\n```\n\n**Listing 8-2** MainActivity\n\nIf you run the app now, the `SecondActivity`\
    \ will launch when you click the `Button` on `MainActivity`. In this example,\
    \ we told the `Intent` object what component we wanted to activate (`SecondActivity`).\
    \ This kind of `Intent` object is called an **explicit Intent**, simply because\
    \ we’re very precise on what we want to activate. Another type of `Intent` is\
    \ called an **implicit Intent**, which is what we’ll discuss in the next section."
