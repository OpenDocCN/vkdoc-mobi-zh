    # Android 概述


    *本章涵盖内容：*


    - Android 简史

    - Android 操作系统


    自那个绿色小机器人掀起波澜并颠覆移动计算世界以来，已经过去相当长一段时间了。它最初是为手机设计的操作系统，但自那以后，已渗透到电视、车载系统、手表、电子阅读器、上网本和游戏机等各种设备之中。


    对许多人来说，Android 可能仅仅被视为一个操作系统，这在很大程度上也确实如此；但除了操作系统本身，Android 还包含软件开发工具包、库、应用程序框架和参考设计。


    ## 历史


    **2003 年**。安迪·鲁宾创立了 Android 公司；谷歌为其提供支持，但尚未完全拥有该公司。


    **2005 年**。谷歌收购了 Android 公司。


    **2007 年**。Android 被正式开源；谷歌将其所有权移交给开放手机联盟（Open Handset Alliance，OHA）。


    **2008 年**。Android v1.0 发布。当时的 Google Play 商店并非此名，而是被称为“市场”（Market）。


    **2009 年**。发布了 1.1、1.5（Cupcake）、1.6（Donut）和 2.0（Eclair）版本。Cupcake 是首个采用甜品命名方案的版本。这是一个重要的版本，因为它引入了屏幕键盘。Donut
    则作为首个包含“搜索框”的版本而被铭记。Eclair 是首个包含谷歌地图的版本，这开启了车载导航系统的没落，因为谷歌免费提供了地图服务。


    **2010 年**。发布了 2.2（Froyo）以及 2.3 至 2.3.7（Gingerbread）版本。Froyo 提升了 Android 体验；它将主屏幕从之前版本的三个增加到了五个。Gingerbread
    与 Nexus S（三星生产的那一款）的发布同步进行。Gingerbread 也因引入了对前置摄像头的支持而被铭记；自拍狂潮由此开始。


    **2011 年**。发布了 3.0（Honeycomb）以及 4.0 至 4.0.4（Ice Cream Sandwich）版本。此前所有 Android
    版本都（只）针对手机；Android 3.0 改变了这一局面，因为 Honeycomb 是为平板电脑设计的。它为未来版本的 Android 设计提供了线索。它取消了实体按键；主页、返回和菜单按钮都成为了软件的一部分。谷歌与三星再次合作推出了
    Galaxy Nexus（Nexus S 的继任者），其使用的操作系统是 Ice Cream Sandwich。


    **2012 年**。发布了 4.1 至 4.3.1（Jelly Bean）版本。Jelly Bean 引入了“Google Now”，可通过从主屏幕快速滑动访问；它让用户能够在单个屏幕上访问日历、事件、电子邮件和天气预报。这是谷歌助手的早期版本。同样在这个版本中，实现了“黄油计划”（Project
    Butter），为用户带来了更流畅的 Android 体验。


    **2013 年**。发布了 4.4 至 4.4.4（KitKat）版本。KitKat 是一次重大的外观升级；之前版本的蓝色调被更精致的白色调取代，许多系统自带应用也以更浅的配色方案重新设计。这个版本还带来了“Ok
    Google”搜索指令。


    **2014 年**。发布了 5.0–5.1/5.1.1（Lollipop）版本；Android 进入 64 位时代。Lollipop 首次采用了谷歌的 Material
    Design 设计理念。这些变化不仅仅是外观上的；在底层，Android 5 放弃了 Dalvik 虚拟机，转而使用 Android 运行时（ART）。Android
    TV 也在这一时期发布。


    **2015 年**。发布了 6.0 和 6.01（Marshmallow）版本。应用菜单发生了巨大变化，谷歌增加了搜索栏，方便用户快速找到应用。此版本引入了内存管理器，用户可以查看应用的内存使用情况。权限系统也进行了彻底改革；应用不能再批量请求权限；权限将在需要时被逐一请求（和授予）。


    **2016 年**。发布了 7.0–7.1.2（Nougat）版本。“Google Now”被“Google 助手”取代。改进的多任务系统支持分屏模式。


    **2017 年**。发布了 8.0 和 8.1（Oreo）版本；随之而来的是更多的多任务功能。画中画和原生分屏功能在此版本中引入。


    **2018 年**。Android 9.0（Pie）发布——恰好在 v1.0 发布 10 年之后。此版本带来了相当多的视觉变化，使其成为近年来最重要的更新。三键布局被替换为单个药丸形状的按钮以及用于控制多任务等操作的手势。


    **2019 年**。Android 10 发布；这对谷歌来说在版本命名上是一个转变。谷歌不再使用甜品名称，而是简单地根据版本号来命名。绿色机器人正在被重新塑造。此版本也标志着
    Android 导航按钮的终结。虽然 Android 9 保留了“返回”按钮，但 v10 已完全将其移除，并将使用手势替代。


    ## 操作系统


    Android 最显而易见的部分，至少对于开发者而言，是其操作系统。Android 操作系统可能看起来很复杂，但其目的很简单；它位于用户和硬件之间。这可能过于简化，但对我们来说已经足够了。这里说的“用户”，我并非字面意义上的终端用户或人；我指的是应用程序，即程序员创建的代码片段，比如文字处理器或电子邮件客户端。


    以电子邮件应用为例；当您键入每个字符时，应用需要与硬件通信，以便将信息传输到屏幕和硬盘，并最终通过网络发送到云端。这比我描述的更复杂，但基本思想如此。从最简单的层面讲，操作系统做三件事：


    -   代表应用程序管理硬件。

    -   为应用程序提供服务，如网络、安全、内存管理等。

    -   管理应用程序的执行；这部分使得我们能够（看似）几乎同时运行多个应用程序。


    图 1-1 展示了 Android 系统架构的逻辑图；它远非完整，因为并未显示 Android 平台中的所有应用、组件和库，但它应该能让您了解事物是如何组织的。


    ![../images/457413_2_En_1_Chapter/457413_2_En_1_Fig1_HTML.jpg](img/457413_2_En_1_Fig1_HTML.jpg)


    图 1-1


    平台架构


    图中最底层负责与硬件、各种服务（如内存管理）以及进程执行的接口交互。Android 操作系统的这一部分是 Linux。Linux 是一个非常稳定的操作系统，本身也相当普及。您可以在许多地方找到它，如数据中心的服务器硬件、家电、医疗设备等。Android
    使用 Linux 来处理硬件接口和其他一些内核功能。


    在 Linux 内核之上是低层库，例如 SQLite、OpenGL 等。它们不是 Linux 内核的一部分，但仍然处于低层，因此主要用 C/C++ 编写。在同一层，您会找到
    Android 运行时，这是运行 Android 应用程序的地方。


    接下来是应用程序框架层。它位于低层库和 Android 运行时之上，因为它两者都需要。作为应用程序开发者，这是我们将要与之交互的层，因为它包含了我们编写应用所需的所有库。


    最后，顶层是应用层。这是我们所有应用所在的位置，包括我们自己编写的和操作系统预装的。需要指出的是，设备自带的预装应用相对于我们将要编写的应用没有任何特权。如果您不喜欢手机自带的电子邮件应用，您可以自己编写一个来替换它。Android
    在这方面是民主的。

    '
- fmt: '## Summary


    - Android has gone a long way, from the clunky Cupcake version to Android 10,
    which is very advanced and provides a buttery smooth user experience. Android’s
    release cadence was frenetic during the early years, but it has since subsided
    and settled on a more uniform 12-month cycle.

    - Android isn’t just an OS, it also includes an application framework, software
    development kit, prebuilt applications, and a reference design.

    - Android uses the Linux OS for interfacing with hardware, memory management,
    and executions of processes.


    # 2. Android Studio


    *What the chapter covers:*


    - Getting Android Studio

    - Configuring the IDE

    - Basic parts of the IDE


    Developing Android applications wasn’t always done in Android Studio (AS). In
    the early days of Android, developers built apps using just the bare SDK, a bunch
    of command-line tools, and Ant build scripts (Apache Ant)—it was quite the old
    school; soon after, the Android Developer Tools (ADT) for Eclipse was released.
    Eclipse became the dominant tool for Android development until Android Studio
    came along.


    Android Studio came in 2013. To be sure, it was still on beta, but the writing
    on the wall was clear; it was going to be the official development tool for Android
    development. Android Studio is based on JetBrains’ IntelliJ; it’s a commercial
    Java IDE, which also has a nonpaid or community version. It was the community
    version of IntelliJ that served as the basis for Android Studio.


    ## Setup


    At the time of writing, Android Studio 4 was on preview release; the version I
    used for this book was Canary 9. Android Studio 4 might be on stable release by
    the time you’re reading this book; hopefully, the diagrams and screenshots won’t
    be too different by then. To download Android Studio 4 (preview release), you
    can go to [`https://developer.android.com/studio/preview`](https://developer.android.com/studio/preview).


    The installer is available for Windows (both 32- and 64-bit), macOS, and Linux.
    I ran the installation instructions on macOS (Catalina), Windows 10 64-bit, and
    Ubuntu 18. I work primarily in a macOS environment, which explains why most of
    the screen grabs for this book look like macOS. Android Studio looks, runs, and
    feels (mostly) the same in all three platforms, with very minor differences like
    key bindings and the main menu bar in macOS.


    Before we go further, let’s look at the system requirements for Android Studio;
    at a minimum, you’ll need either of the following:


    - Microsoft Windows 7, 8, or 10 (32- or 64-bit)

    - macOS 10.10 (Yosemite or higher)

    - Linux (Gnome or KDE Desktop), Ubuntu 14.04 or higher; 64-bit capable of running
    32-bit applications

    - GNU C Library (`glibc` 2.19 or later) if you’re on Linux


    For the hardware, your workstation needs to be at least:


    - 4GB RAM minimum (8GB or more recommended)

    - 2GB of available HDD space (4GB is recommended)

    - 1280 x 800 minimum screen resolution


    The preceding list came from the official Android website ([`https://developer.android.com/studio`](https://developer.android.com/studio));
    of course, more is better.


    There are no prerequisite software for Android Studio. It used to be that you
    needed to install a Java Development Kit prior to installing Android Studio; starting
    from Android Studio 2.2, the installer includes an embedded OpenJDK—you no longer
    need to bother with installing a separate JDK.


    Download the installer from [`https://developer.android.com/studio/`](https://developer.android.com/studio/),
    and get the proper binary file for your platform.


    If you’re on macOS, do the following:


    1. Unpack the installer zipped file.

    2. Drag the application file into the Applications folder.

    3. Launch Android Studio.


    Android Studio will prompt you to import some settings if you have a previous
    installation. You can import that—it’s the default option.


    > **Note:** If you have an existing installation of Android Studio, you can keep
    using that version and still install the preview edition. Android Studio 4 can
    coexist with your existing version of Android Studio; its settings will be kept
    in a different directory.


    If you’re on Windows, do the following:


    1. Unzip the installer file.

    2. Move the unzipped directory to a location of your choice, for example, `C:\Users\myname\AndroidStudio`.

    3. Drill down to the “AndroidStudio” folder; inside it, you’ll find `studio64.exe`.
    This is the file you need to launch. It’s a good idea to create a shortcut for
    this file—if you right-click `studio64.exe` and choose “Pin to Start Menu,” you
    can make Android Studio available from the Windows Start menu; alternatively,
    you can also pin it to the Taskbar.


    The Linux installation requires a bit more work than simply double-clicking and
    following the installer prompts. In future releases of Ubuntu (and its derivatives),
    this might change and become as simple and frictionless as its Windows and macOS
    counterparts, but for now, we need to do some tweaking. The extra activities on
    Linux are mostly because AS needs some 32-bit libraries and hardware acceleration.


    > **Note:** The installation instructions in this section are meant for Ubuntu
    64-bit and other Ubuntu derivatives, for example, Linux Mint, Lubuntu, Xubuntu,
    Ubuntu MATE, and so on. I chose this distribution because I assumed that it is
    a very common Linux flavor; hence, the readers of this book will be using that
    distribution. If you are running a 64-bit version of Ubuntu, you will need to
    pull some 32-bit libraries in order for AS to function well.


    To start pulling the 32-bit libraries for Linux, run the following commands on
    a terminal window:


    ```

    sudo apt-get update && sudo apt-get upgrade -y

    sudo dpkg --add-architecture i386

    sudo apt-get install libncurses5:i386 libstdc++6:i386 zlib1g:i386

    ```


    When all the prep work is done, you need to do the following:


    1. Unpack the downloaded installer file. You can unpack the file using command-line
    tools or using the GUI tools—you can, for example, right-click the file and select
    the “Unpack here” option, if your file manager has that.

    2. After unzipping the file, rename the folder to “AndroidStudio”.

    3. Move the folder to a location where you have read, write, and execute privileges.
    Alternatively, you can also move it to `/usr/local/AndroidStudio`.

    4. Open a terminal window and go to the `AndroidStudio/bin` folder, then run `./studio.sh`.

    5. At first launch, Android Studio will ask you if you want to import some settings;
    if you have installed a previous version of Android Studio, you may want to import
    those settings.'
  raw: '## Summary


    *   Android has gone a long way, from the clunky Cupcake version to Android 10,
    which is very advanced and provides a buttery smooth user experience. Android’s
    release cadence was frenetic during the early years, but it has since subsided
    and settled on a more uniform 12-month cycle.


    *   Android isn’t just an OS, it also includes an application framework, software
    development kit, prebuilt applications, and a reference design.


    *   Android uses the Linux OS for interfacing with hardware, memory management,
    and executions of processes.


    # 2. Android Studio


    *What the chapter covers:*


    *   Getting Android Studio


    *   Configuring the IDE


    *   Basic parts of the IDE


    Developing Android applications wasn’t always done in Android Studio (AS). In
    the early days of Android, developers built apps using just the bare SDK, a bunch
    of command-line tools, and Ant build scripts (Apache Ant)—it was quite the old
    school; soon after, the Android Developer Tools (ADT) for Eclipse was released.
    Eclipse became the dominant tool for Android development until Android Studio
    came along.


    Android Studio came in 2013\. To be sure, it was still on beta, but the writing
    on the wall was clear; it was going to be the official development tool for Android
    development. Android Studio is based on JetBrains’ IntelliJ; it’s a commercial
    Java IDE, which also has a nonpaid or community version. It was the community
    version of IntelliJ that served as the basis for Android Studio.


    ## Setup


    At the time of writing, Android Studio 4 was on preview release; the version I
    used for this book was Canary 9\. Android Studio 4 might be on stable release
    by the time you’re reading this book; hopefully, the diagrams and screenshots
    won’t be too different by then. To download Android Studio 4 (preview release),
    you can go to [`https://developer.android.com/studio/preview`](https://developer.android.com/studio/preview).


    The installer is available for Windows (both 32- and 64-bit), macOS, and Linux.
    I ran the installation instructions on macOS (Catalina), Windows 10 64-bit, and
    Ubuntu 18\. I work primarily in a macOS environment, which explains why most of
    the screen grabs for this book look like macOS. Android Studio looks, runs, and
    feels (mostly) the same in all three platforms, with very minor differences like
    key bindings and the main menu bar in macOS.


    Before we go further, let’s look at the system requirements for Android Studio;
    at a minimum, you’ll need either of the following:


    *   Microsoft Windows 7, 8, or 10 (32- or 64-bit)


    *   macOS 10.10 (Yosemite or higher)


    *   Linux (Gnome or KDE Desktop), Ubuntu 14.04 or higher; 64-bit capable of running
    32-bit applications


    *   GNU C Library (glibc 2.19 or later) if you’re on Linux


    For the hardware, your workstation needs to be at least


    *   4GB RAM minimum (8GB or more recommended)


    *   2GB of available HDD space (4GB is recommended)


    *   1280 x 800 minimum screen resolution


    The preceding list came from the official Android website ([`https://developer.android.com/studio`](https://developer.android.com/studio));
    of course, more is better.


    There are no prerequisite software for Android Studio. It used to be that you
    needed to install a Java Development Kit prior to installing Android Studio; starting
    from Android Studio 2.2, the installer includes an embedded OpenJDK—you no longer
    need to bother with installing a separate JDK.


    Download the installer from [`https://developer.android.com/studio/`](https://developer.android.com/studio/),
    and get the proper binary file for your platform.


    If you’re on macOS, do the following:


    1.  Unpack the installer zipped file.


    2.  Drag the application file into the Applications folder.


    3.  Launch Android Studio.


    Android Studio will prompt you to import some settings if you have a previous
    installation. You can import that—it’s the default option.


    Note


    If you have an existing installation of Android Studio, you can keep using that
    version and still install the preview edition. Android Studio 4 can coexist with
    your existing version of Android Studio; its settings will be kept in a different
    directory.


    If you’re on Windows, do the following:


    1.  Unzip the installer file.


    2.  Move the unzipped directory to a location of your choice, for example, `C:\Users\myname\AndroidStudio`.


    3.  Drill down to the “AndroidStudio” folder; inside it, you’ll find “studio64.exe”.
    This is the file you need to launch. It’s a good idea to create a shortcut for
    this file—if you right-click studio64.exe and choose “Pin to Start Menu,” you
    can make Android Studio available from the Windows Start menu; alternatively,
    you can also pin it to the Taskbar.


    The Linux installation requires a bit more work than simply double-clicking and
    following the installer prompts. In future releases of Ubuntu (and its derivatives),
    this might change and become as simple and frictionless as its Windows and macOS
    counterparts, but for now, we need to do some tweaking. The extra activities on
    Linux are mostly because AS needs some 32-bit libraries and hardware acceleration.


    Note


    The installation instructions in this section are meant for Ubuntu 64-bit and
    other Ubuntu derivatives, for example, Linux Mint, Lubuntu, Xubuntu, Ubuntu MATE,
    and so on. I chose this distribution because I assumed that it is a very common
    Linux flavor; hence, the readers of this book will be using that distribution.
    If you are running a 64-bit version of Ubuntu, you will need to pull some 32-bit
    libraries in order for AS to function well.


    To start pulling the 32-bit libraries for Linux, run the following commands on
    a terminal window:


    ```

    sudo apt-get update && sudo apt-get upgrade -y

    sudo dpkg --add-architecture i386

    sudo apt-get install libncurses5:i386 libstdc++6:i386 zlib1g:i386

    ```


    When all the prep work is done, you need to do the following:


    1.  Unpack the downloaded installer file. You can unpack the file using command-line
    tools or using the GUI tools—you can, for example, right-click the file and select
    the “Unpack here*”* option, if your file manager has that.


    2.  After unzipping the file, rename the folder to “AndroidStudio”.


    3.  Move the folder to a location where you have read, write, and execute privileges.
    Alternatively, you can also move it to `/usr/local/AndroidStudio`.


    4.  Open a terminal window and go to the AndroidStudio/bin folder, then run `./studio.sh`.


    5.  At first launch, Android Studio will ask you if you want to import some settings;
    if you have installed a previous version of Android Studio, you may want to import
    those settings.'
  trans: '

    ## 摘要


    - Android 经历了漫长的发展，从功能简陋的 Cupcake 版本一路演进到如今非常先进、能提供丝滑流畅用户体验的 Android 10。Android
    早期版本发布节奏十分激进，但此后逐渐放缓，并固定为更统一的 12 个月周期。

    - Android 不仅仅是一个操作系统，它还包含应用程序框架、软件开发工具包、预置应用程序和参考设计。

    - Android 利用 Linux 操作系统来管理硬件接口、内存管理和进程执行。


    # 2. Android Studio


    *本章涵盖内容：*


    - 获取 Android Studio

    - 配置 IDE

    - IDE 的基本组成部分


    开发 Android 应用程序并非一直都是在 Android Studio（AS）中完成的。在 Android 发展的早期，开发者仅使用纯粹的 SDK、一系列命令行工具和
    Ant 构建脚本来构建应用——这相当有年代感；不久之后，针对 Eclipse 的 Android 开发者工具（ADT）发布了。Eclipse 成为了 Android
    开发的主导工具，直到 Android Studio 的出现。


    Android Studio 于 2013 年问世。诚然，当时它仍处于测试阶段，但趋势已十分明显；它将成为 Android 开发的官方工具。Android
    Studio 基于 JetBrains 公司的 IntelliJ；这是一款商业化的 Java IDE，同时也有免费版或社区版。IntelliJ 的社区版正是
    Android Studio 的基础。


    ## 环境搭建


    在撰写本书时，Android Studio 4 正处于预览版阶段；我用于本书编写的版本是 Canary 9。当你阅读本书时，Android Studio 4
    可能已经发布了稳定版；希望届时相关的图表和截图不会与本书差别太大。要下载 Android Studio 4（预览版），你可以访问 [`https://developer.android.com/studio/preview`](https://developer.android.com/studio/preview)。


    安装程序适用于 Windows（32 位和 64 位）、macOS 和 Linux。我在 macOS（Catalina）、Windows 10 64 位和
    Ubuntu 18 上执行了安装说明。我主要工作在 macOS 环境下，这也解释了为什么本书中的大部分截图看起来都像 macOS。Android Studio
    在这三个平台上的外观、运行和操作体验（大体上）相同，仅有非常细微的差异，比如快捷键和 macOS 上的主菜单栏。


    在继续之前，我们先看一下 Android Studio 的系统要求；至少，你需要满足以下任一操作系统条件：


    - Microsoft Windows 7、8 或 10（32 位或 64 位）

    - macOS 10.10（Yosemite 或更高版本）

    - Linux（Gnome 或 KDE 桌面），Ubuntu 14.04 或更高版本；64 位系统需能运行 32 位应用程序

    - 如果你使用 Linux，则需要 GNU C 库（`glibc` 2.19 或更高版本）


    硬件方面，你的工作站至少需要满足：


    - 最低 4GB 内存（建议 8GB 或更多）

    - 至少 2GB 可用硬盘空间（建议 4GB）

    - 最低 1280 x 800 屏幕分辨率


    上述列表来自 Android 官方网站 ([`https://developer.android.com/studio`](https://developer.android.com/studio))；当然，配置越高越好。


    Android Studio 没有必备的软件先决条件。过去，你需要在安装 Android Studio 之前先安装 Java 开发工具包（JDK）；但从 Android
    Studio 2.2 开始，安装程序已经内置了 OpenJDK——你不再需要费心去单独安装 JDK 了。


    从 [`https://developer.android.com/studio/`](https://developer.android.com/studio/)
    下载安装程序，并获取适用于你平台的二进制文件。


    如果你使用的是 macOS，请执行以下步骤：


    1. 解压安装程序的压缩文件。

    2. 将应用程序文件拖入“应用程序”文件夹。

    3. 启动 Android Studio。


    如果你之前安装过旧版本，Android Studio 会提示你导入一些设置。你可以选择导入——这是默认选项。


    > **注意：** 如果你已安装了旧版本的 Android Studio，你可以继续使用旧版本，同时安装预览版。Android Studio 4 可以与现有的
    Android Studio 版本共存；它的设置将保存在不同的目录中。


    如果你使用的是 Windows，请执行以下步骤：


    1. 解压安装程序文件。

    2. 将解压后的目录移动到你选择的位置，例如`C:\Users\你的用户名\AndroidStudio`。

    3. 进入“AndroidStudio”文件夹；在里面你会找到`studio64.exe`。这就是你需要启动的文件。建议为这个文件创建一个快捷方式——右键单击`studio64.exe`并选择“固定到‘开始’菜单”，就可以让
    Android Studio 出现在 Windows 开始菜单中；或者，你也可以将其固定到任务栏。


    Linux 的安装过程比简单的双击并跟随安装程序提示要稍微复杂一些。在未来的 Ubuntu（及其衍生版）版本中，这种情况可能会改变，变得和 Windows、macOS
    一样简单流畅，但目前，我们还需要做一些调整。在 Linux 上进行这些额外的操作主要是因为 AS 需要一些 32 位库和硬件加速。


    > **注意：** 本节中的安装说明适用于 Ubuntu 64 位及其他 Ubuntu 衍生版，例如 Linux Mint、Lubuntu、Xubuntu、Ubuntu
    MATE 等。我选择这个发行版是因为我假设它是非常常见的 Linux 版本；因此，本书的读者可能会使用该发行版。如果你运行的是 64 位版本的 Ubuntu，你将需要拉取一些
    32 位库，以便 AS 能够良好运行。


    要开始为 Linux 拉取 32 位库，请在终端窗口中运行以下命令：


    ```

    sudo apt-get update && sudo apt-get upgrade -y

    sudo dpkg --add-architecture i386

    sudo apt-get install libncurses5:i386 libstdc++6:i386 zlib1g:i386

    ```


    当所有准备工作完成后，你需要执行以下步骤：


    1. 解压下载的安装程序文件。你可以使用命令行工具或 GUI 工具解压文件——例如，如果你的文件管理器有此功能，你可以右键单击文件并选择“在此解压”选项。

    2. 解压文件后，将文件夹重命名为“AndroidStudio”。

    3. 将文件夹移动到你拥有读取、写入和执行权限的位置。或者，你也可以将其移动到`/usr/local/AndroidStudio`路径下。

    4. 打开一个终端窗口，进入 `AndroidStudio/bin` 文件夹，然后运行 `./studio.sh`。

    5. 首次启动时，Android Studio 会询问你是否要导入一些设置；如果你安装过旧版本的 Android Studio，你可能想要导入这些设置。

