    \ composition unit but a smaller one. Like Activities, they also hold View objects.\
    \ Some apps use Fragments to address the problem of deploying them on multiple\
    \ form factors—Fragments can be turned on or off depending on the available screen\
    \ space and/or orientation.\n\n**Services**. With Services, we can run program\
    \ logic behind the scenes, without freezing the user interface. Services run in\
    \ the background; they can be very useful when your app is supposed to download\
    \ a file from the Web or maybe play music.\n\n**BroadcastReceivers**. With BroadcastReceivers,\
    \ our app can listen to messages from other applications or from the Android Runtime\
