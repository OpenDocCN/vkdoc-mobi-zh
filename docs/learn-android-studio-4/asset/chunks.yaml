    # 意图（Intents）


    如果你有过面向对象编程的经验，你可能习惯于通过简单地创建对象实例并调用其方法来激活对象行为的惯用方式——这是一种让对象相互通信的直截了当的方法；不幸的是，Android
    的组件并不遵循这种惯用方式。清单 5-2 中展示的代码，虽然符合面向对象的惯用写法，但在 Android 中却无法运行。


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button b = (Button) findViewById(R.id.button);

    b.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View v) {

    new SecondActivity(); // 无法运行

    }

    });

    }

    }

    ```


    清单 5-2：激活另一个 Activity 的错误方式


    Android 架构在构建应用程序方面非常独特。它采用了组件的概念，而不仅仅是普通对象。Android 使用 `Intents`（意图）作为其组件间通信的方式；它还使用相同的
    `Intents` 在组件之间传递消息。


    清单 5-2 无法运行的原因是 Android 的 `Activity` 不是一个简单的对象，而是一个组件。你不能简单地实例化一个组件来激活它。组件的激活是通过创建一个
    `Intent` 对象，然后将其传递给想要激活的组件来完成的，在我们当前的例子中，这个组件就是另一个 `Activity`。


    `Intents` 分为两种：显式 `Intent` 和隐式 `Intent`。清单 5-3 展示了一个示例代码，说明如何创建显式 `Intent` 以及如何使用它来激活另一个
    `Activity`——相关部分已用粗体标出。


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button b = (Button) findViewById(R.id.button);

    b.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View v) {

    Intent i = new Intent(v.getContext(), SecondActivity.class);

    v.getContext().startActivity(i);

    }

    });

    }

    }

    ```


    清单 5-3：如何激活另一个 Activity


    我们的示例代码看起来可能包含很多需要解读的内容，但别担心，随着我们在后续章节中深入探讨，我会在更完整的上下文中解释这些代码。


    ## 总结


    - Android 应用由松散耦合的组件构成。这些组件通过 `Intent` 对象进行通信。

    - 应用的入口点通常是一个启动器 `Activity`。这个启动器 `Activity` 在应用的 `AndroidManifest` 文件中指定。

    - 清单文件就像胶水一样，将应用的各个组件粘合在一起；应用所拥有、能做或不能做的一切都反映在清单文件中。


    # 6. 活动（Activities）与布局（Layouts）


    *我们将涵盖的内容：*


    - Android 活动概览

    - 布局文件

    - 视图（View）对象


    你将要构建的大多数应用都会包含用户界面（UI）。在上一章中，我们了解到，要创建一个带有界面的简单应用，我们需要：（1）一个 `Activity` 类，（2）该
    `Activity` 类的布局文件，以及（3）一个清单文件。幸运的是，我们可以通过项目创建向导获得这三样东西。


    在本章中，我们将更深入地研究 `Activity` 组件。我们将进一步了解 `Activity` 的组成部分：Java 类及其相关的布局文件。


    ## 活动（Activity）


    `Activity` 组件负责用户屏幕上看到的内容。它由一个 `Activity` 类和一个布局文件（一个包含按钮、文本字段等 UI 元素定义的 XML 文件）组成。


    ### 布局文件


    布局文件是一个 XML 文件。它包含了 UI 元素（如按钮、文本字段、下拉菜单、标签等）的定义。有些人可能会对仅使用 XML 编辑器手动构建界面感到畏惧，但别担心，Android
    Studio 让编写用户界面变得简单。你可以通过文本模式或设计模式（所见即所得）来处理布局文件，如图 6-1 所示。


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig1_HTML.jpg](img/457413_2_En_6_Fig1_HTML.jpg)


    图 6-1：布局文件，分别以文本模式和设计模式显示


    在图 6-1 中，左边的图片显示了 XML 模式（或代码模式）下的 `activity_main` 布局文件，右边的图片则显示了设计模式下的布局文件。你可以通过可视化方式（点击“Design”按钮）或原始
    XML 代码方式（点击“Code”按钮）来处理布局文件。当你通过编辑 XML 来更改元素时，Android Studio 会自动更新设计视图的呈现效果。同样地，当你在设计视图中进行更改时，XML
    文件也会相应更新。


    清单 6-1 展示了一个典型的布局文件。


    ```

    /res/layout/activity_main.xml

    ```


    清单 6-1：`/res/layout/activity_main.xml`


    一个布局文件通常包含两部分：容器的声明以及其中每个 UI 元素的声明。在清单 6-1 中，第二行（也是 XML 文档的根节点）是容器的声明。`TextView`
    元素被声明为容器的子节点。这就是容器和 UI 元素在布局文件中的组织方式。

