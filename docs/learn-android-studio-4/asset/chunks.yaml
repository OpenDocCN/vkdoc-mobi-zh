- fmt: 'This will show the dialog for creating a new Fragment. In the window that
    follows (Figure [10-8](#457413_2_En_10_Chapter.xhtml#Fig8)), choose a blank Fragment.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig8_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig8_HTML.jpg)


    **Figure 10-8** New Android Fragment


    In the window that follows, type the name of the Fragment and the name of the
    layout file and choose the source language, as shown in Figure [10-9](#457413_2_En_10_Chapter.xhtml#Fig9).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig9_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig9_HTML.jpg)


    **Figure 10-9** New Android Fragment, details


    *   **Fragment Name**—`One`

    *   **Fragment Layout Name**—`fragment_one`

    *   Keep the source language as **Java**


    Click **Finish** to start the creation of the new Fragment; this Fragment will
    become one of the destinations in your app. Create another destination and make
    the Fragment’s name “Two.” The navigation editor, by now, should look like Figure
    [10-10](#457413_2_En_10_Chapter.xhtml#Fig10).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig10_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig10_HTML.jpg)


    **Figure 10-10** Navigation editor


    Notice also there are two new Java classes (`One.java` and `Two.java`) and two
    new layout files (`fragment_one.xml` and `fragment_two.xml`). These files were
    generated when we created destinations `One` and `Two`. Notice in Figure [10-10](#457413_2_En_10_Chapter.xhtml#Fig10)
    that fragment `one` has the home icon beside it. This is only because we created
    it first. The home destination or start destination is the first screen that your
    users will see. You can change the start destination any time by right-clicking
    any destination and then clicking “Set as start destination”; but for now, we’ll
    keep `one` as the start destination.


    Our navigation graph doesn’t have a **NavHost** yet; it needs one. A NavHost acts
    like a viewport for all our destinations. It’s an empty container where destinations
    are swapped in and out as the user navigates through the app. The NavHost needs
    to be in an Activity. We’re going to put the NavHost in our `MainActivity`.


    Open the layout file for our `MainActivity`, it’s on `res/layout/activity_main.xml`,
    then edit in text mode. The default `activity_main` contains a single `TextView`
    object; remove it and replace it with the code snippet shown in Listing [10-6](#457413_2_En_10_Chapter.xhtml#PC6).


    | ❶ | It needs an id, just like any other element in the resource file. I just
    chose `nav_container` for this one. You can name what you like. |

    | ❷ | This is the fully qualified name of the `NavHostFragment` class. This belongs
    to the Navigation component, and this will be responsible for making our `MainActivity`
    the viewport for all our defined destinations. |

    | ❸ | The `app:navGraph` attribute tells the runtime which navigation graph we
    want to host in the `MainActivity`. Remember that you can have more than one navigation
    graph in the app; `nav_graph` is the name we gave to the navigation graph XML
    resource earlier. |

    | ❹ | When you set the `defaultNavHost` to `true`, this makes sure that the **NavHostFragment**
    intercepts the system back button; that way, when the user clicks the back button,
    Android will show you the previous screen in your app, and not an external app’s
    screen which happened to be on the back stack. |


    ```

    Listing 10-6

    Defining a NavHost in activity_main.xml

    ```


    Now it’s time to connect our two destinations. Open the navigation graph again—it’s
    on `res/navigation/nav_graph`.


    We want the user to navigate from destination `one` to destination `two`. So,
    hover your mouse over to destination one until a small circle appears on its right
    side. Click and drag this point over to destination two, so that the two destinations
    can be connected, as shown in Figure [10-11](#457413_2_En_10_Chapter.xhtml#Fig11).


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig11_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig11_HTML.jpg)


    **Figure 10-11** Connect one to two


    Destination one is now connected to destination two. If you select the connection
    between `one` and `two`, you’ll see that it has attributes you can set, as shown
    in Figure [10-12](#457413_2_En_10_Chapter.xhtml#Fig12). We won’t deal with the
    attributes; we just want to connect the two destinations.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig12_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig12_HTML.jpg)


    **Figure 10-12** Navigation graph


    To test this small app, I needed an object in the start destination that will
    trigger an action, like a Button (shown in Figure [10-13](#457413_2_En_10_Chapter.xhtml#Fig13)).
    I modified the layout of the two fragments as follows:


    **Fragment One**


    *   Changed the layout to `ConstraintLayout`, just because it’s easier to work
    with this kind of layout. Use the layout that’s appropriate for you.

    *   I removed the `TextView` and replaced it with a button and centered it.


    **Fragment Two**


    *   Like `fragment_one`, I also changed the layout to `ConstraintLayout`.

    *   I changed the text of the `TextView` and centered it.


    ![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig13_HTML.jpg](images/457413_2_En_10_Chapter/457413_2_En_10_Fig13_HTML.jpg)


    **Figure 10-13** Modified Fragments


    Next, we’ll add a click handler to our button, then add the code that will make
    `fragment_one` navigate to `fragment_two` when the button is clicked.


    Navigating to a destination is done using a **NavController**; it’s an object
    that manages app navigation within a NavHost. Each NavHost has its own corresponding
    NavController.


    A NavController lets you navigate to destinations in two ways: (1) navigate to
    a destination using an ID, which is what we will use here, and (2) navigate using
    a URI—which I will leave it up to you to explore.


    To add a click handler to our button, open `One.java`, which contains the Java
    source file for our `One` destination, and modify its `onCreateView()` method
    to match Listing [10-7](#457413_2_En_10_Chapter.xhtml#PC7).


    ```java

    @Override

    public View onCreateView(LayoutInflater inflater, ViewGroup container,

    Bundle savedInstanceState) {

    // Inflate the layout for this fragment

    final View view = inflater.inflate(R.layout.fragment_one, container, false);

    Button btn = (Button) view.findViewById(R.id.button);

    btn.setOnClickListener(new View.OnClickListener(){

    @Override

    public void onClick(View view) {

    Navigation.findNavController(view).navigate(R.id.action_one_to_two2);

    }

    });

    return view;

    }

    ```

    **Listing 10-7** Class `One.onCreateView()`


    The most important line of code in Listing [10-7](#457413_2_En_10_Chapter.xhtml#PC7)
    is the `navigate()` method of the **NavController** object. We simply passed the
    ID of the action we created in the navigation graph as a parameter to `navigate()`,
    and that already did the trick. You can now launch the emulator and test the app.


    This chapter merely scratched the surface of Navigation components; there’s a
    lot to discover in this area, so make sure you check them out.'
