- fmt: "### Generate\n\nAnother time-saving feature of Android Studio is the code\
    \ generator; it's aptly named because it does exactly what you think it does—it\
    \ generates code. Let's take an example; Figure [18-4](#457413_2_En_18_Chapter.xhtml#Fig4)\
    \ shows the mouse cursor inside the definition of the `Person` class. While the\
    \ cursor is within the class body, launch the Generator action; from the main\
    \ menu bar, go to **Code** ➤ **Generate**.\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig4_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig4_HTML.jpg)\n\
    \nFigure 18-4 Generate\n\nChoose \"Constructor\" as shown in Figure [18-4](#457413_2_En_18_Chapter.xhtml#Fig4).\
    \ If you have member variables in the class (which I have, in the `Person` class),\
    \ Android Studio will offer to initialize these variables. For our example, I\
    \ chose to initialize both of my member variables, as shown in Figure [18-5](#457413_2_En_18_Chapter.xhtml#Fig5).\n\
    \n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig5_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig5_HTML.jpg)\n\
    \nFigure 18-5 Choose fields to initialize\n\nAs you can see, you can generate\
    \ quite a lot of boilerplate code. When you choose any of the Generate options,\
    \ Android Studio will generate a generalized stub of code.\n\nLet's generate some\
    \ more code; this time, let's go with **getter and setter**. Go to the Generate\
    \ dialog again as we've done before; by the way, you can also get to the Generate\
    \ dialog using keyboard shortcuts (**Command + N** in macOS or **Alt + Insert**\
    \ if you're on Linux or Windows). Figure [18-6](#457413_2_En_18_Chapter.xhtml#Fig6)\
    \ shows the Generate dialog again.\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig6_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig6_HTML.jpg)\n\
    \nFigure 18-6 Generate getter and setter\n\nIn the following window, choose the\
    \ fields to generate getters and setters, as shown in Figure [18-7](#457413_2_En_18_Chapter.xhtml#Fig7).\n\
    \n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig7_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig7_HTML.jpg)\n\
    \nFigure 18-7 Select fields for getters and setters\n\nThe generator dialog shows\
    \ all the autodetected fields in the `Person` class. It shows us the `mFirstname`\
    \ and `mLastname` member variables; it also lets you do multiple selection. Select\
    \ both member variables and click OK. Listing [18-1](#457413_2_En_18_Chapter.xhtml#PC1)\
    \ shows the `Person` class after code generation.\n\n```\nclass Person {\n   \
    \ String mfirstname;\n    String mlastname;\n    public Person(String mfirstname,\
    \ String mlastname) {\n        this.mfirstname = mfirstname;\n        this.mlastname\
    \ = mlastname;\n    }\n    public String getMfirstname() {\n        return mfirstname;\n\
    \    }\n    public void setMfirstname(String mfirstname) {\n        this.mfirstname\
    \ = mfirstname;\n    }\n    public String getMlastname() {\n        return mlastname;\n\
    \    }\n    public void setMlastname(String mlastname) {\n        this.mlastname\
    \ = mlastname;\n    }\n}\n```\n\nListing 18-1 Person class\n\nThis is pretty neat\
    \ already. Anything that lets us save on keystrokes is a good thing. I'm guessing\
    \ you probably have just one thing to nitpick on this example; the method naming\
    \ isn't right. You probably would prefer to call `setLastname()` rather than `setmLastname()`,\
    \ don't you? We'll fix that in the next section.\n\n### Coding Styles\n\nIf you\
    \ go to Android Studio's Preferences or Settings, then go to **Editor** ➤ **Code\
    \ Style** ➤ **Java**, you'll find that there's plenty of things you can change\
    \ about how the editor behaves. Figure [18-8](#457413_2_En_18_Chapter.xhtml#Fig8)\
    \ shows the options for the Code Style, specifically the Java language.\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig8_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig8_HTML.jpg)\n\
    \nFigure 18-8 Preferences, Code Style, Java\n\nIf you want to change the number\
    \ of spaces for tabs and indents, you can do that in the Tabs and Indents area;\
    \ be sure to check out the other options in this dialog. What I'd like to do is\
    \ to go to the Code Generation tab (shown in Figure [18-9](#457413_2_En_18_Chapter.xhtml#Fig9)).\n\
    \n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig9_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig9_HTML.jpg)\n\
    \nFigure 18-9 Code Generation\n\nThis is where we can tell Android Studio how\
    \ we name our variables. If you go back to Listing [18-1](#457413_2_En_18_Chapter.xhtml#PC1),\
    \ you'll notice that I'd like to prefix my variables with `m`, like `mLastname`\
    \ and `mFirstname`. Initially, Android Studio didn't know about it; that's why\
    \ when I generated some getters and setters for the member vars, it gave us `setmLastname()`\
    \ instead of just `setLastname()`.\n\n> **Note:** Prefixing a member variable\
    \ with `m` comes from AOSP (Android Open Source Project). I used it here because\
    \ quite a lot of sample codes you will read online use this convention. You can\
    \ further read about it here: [`https://bit.ly/styleguideaosp`](https://bit.ly/styleguideaosp).\n\
    \nTo tell Android Studio that I prefix my variables with `m`, I'll put the `m`\
    \ in **Name prefix** for **Field**, as shown in Figure [18-9](#457413_2_En_18_Chapter.xhtml#Fig9).\
    \ Click OK when you're done. Now, if I generate some getters and setters, we'll\
    \ get the more appropriate method names.\n\n## Live Templates\n\nAnother time-saver\
    \ in Android Studio is live templates; they work a lot like those text expander\
    \ applications, if you have used some of them. The basic idea is when you type\
    \ a series of characters, for example, `datetoday`, then the editor will replace\
    \ it with the text of the actual date today—that's how live templates work.\n\n\
    If you've done some Android programming in the past, you've probably made this\
    \ mistake at least once:\n\n```\nToast.makeText(MainActivity.this, \"no show\"\
    );\n```\n\nThe preceding snippet won't work because (1) the third argument to\
    \ `makeText()` is missing and (2) you actually have to invoke the `show()` method\
    \ for the `Toast` to appear. This is easy enough to spot, but some other errors\
    \ may not be as obvious. Anyway, live templates can help you avoid these hassles.\
    \ Live templates are shortcuts that are displayed as code completion options;\
    \ for example, try typing `fbc` inside the `onCreate` method as shown in Figure\
    \ [18-10](#457413_2_En_18_Chapter.xhtml#Fig10).\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig10_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig10_HTML.jpg)\n\
    \nFigure 18-10 Live template sample\n\nYou'll see the code completion options;\
    \ try to press either the ENTER or TAB key to complete the action.\n\nSome of\
    \ the commonly used built-in templates are listed in Table [18-1](#457413_2_En_18_Chapter.xhtml#Tab1).\n\
    \n**Table 18-1** Common live templates\n\n| Abbreviation | Description | Code\
    \ |\n| --- | --- | --- |\n| `fbc` | Finds view by ID with cast | `($cast$) findViewById(R.id.$resId$);`\
    \ |\n| `const` | Defines an Android style constant | `private static final int\
    \ $name$ = $value$;` |\n| `toast` | Creates a new Toast | `Toast.makeText($classname$.this,\
    \ \"$text$\").show();` |\n| `fori` | Creates for-loop | `for(int $INDEX$ = 0;\
    \ $INDEX$ < $LIMIT$; $INDEX++$) { $END$ }` |\n\nMake sure you check out the other\
    \ live templates; go to the Settings or Preferences window. If you're on Windows\
    \ or Linux, go to the main menu bar, then **File** ➤ **Settings** ➤ **Editor**\
    \ ➤ **Live Templates**; if you're on macOS, it's **Android Studio** ➤ **Preferences**\
    \ ➤ **Editor** ➤ **Live Templates**—you can even create your own live templates\
    \ from there."
  raw: '### Generate


    Another time-saving feature of Android Studio is the code generator ; it’s aptly
    named because it does exactly what you think it does—it generates code. Let’s
    take an example; Figure [18-4](#457413_2_En_18_Chapter.xhtml#Fig4) shows the mouse
    cursor inside the definition of the Person class. While the cursor is within the
    class body, launch the Generator action; from the main menu bar, go to **Code**
    ➤ **Generate**.


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig4_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig4_HTML.jpg)


    Figure 18-4


    Generate


    Choose “Constructor” as shown in Figure [18-4](#457413_2_En_18_Chapter.xhtml#Fig4).
    If you have member variables in the class (which I have, in the Person class),
    Android Studio will offer to initialize these variables. For our example, I chose
    to initialize both of my member variables, as shown in Figure [18-5](#457413_2_En_18_Chapter.xhtml#Fig5).


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig5_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig5_HTML.jpg)


    Figure 18-5


    Choose fields to initialize


    As you can see, you can generate quite a lot of boilerplate code. When you choose
    any of the Generate options, Android Studio will generate a generalized stub of
    code.


    Let’s generate some more code; this time, let’s go with **getter and setter**.
    Go to the Generate dialog again as we’ve done before; by the way, you can also
    get to the Generate dialog using keyboard shortcuts (**Command + N** in macOS
    or **Alt + Insert** if you’re on Linux or Windows). Figure [18-6](#457413_2_En_18_Chapter.xhtml#Fig6)
    shows the Generate dialog again.


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig6_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig6_HTML.jpg)


    Figure 18-6


    Generate getter and setter


    In the following window, choose the fields to generate getters and setters, as
    shown in Figure [18-7](#457413_2_En_18_Chapter.xhtml#Fig7).


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig7_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig7_HTML.jpg)


    Figure 18-7


    Select fields for getters and setters


    The generator dialog shows all the autodetected fields in the Person class. It
    shows us the **mFirstname** and **mLastname** member variables; it also lets you
    do multiple selection. Select both member variables and click OK. Listing [18-1](#457413_2_En_18_Chapter.xhtml#PC1)
    shows the Person class after code generation.


    ```

    class Person {

    String mfirstname;

    String mlastname;

    public Person(String mfirstname, String mlastname) {

    this.mfirstname = mfirstname;

    this.mlastname = mlastname;

    }

    public String getMfirstname() {

    return mfirstname;

    }

    public void setMfirstname(String mfirstname) {

    this.mfirstname = mfirstname;

    }

    public String getMlastname() {

    return mlastname;

    }

    public void setMlastname(String mlastname) {

    this.mlastname = mlastname;

    }

    }

    Listing 18-1

    Person class

    ```


    This is pretty neat already. Anything that lets us save on keystrokes is a good
    thing. I’m guessing you probably have just one thing to nitpick on this example;
    the method naming isn’t right. You probably would prefer to call `setLastname()`
    rather than `setmLastname()`, don’t you? We’ll fix that in the next section .


    ### Coding Styles


    If you go to Android Studio’s Preferences or Settings, then go to **Editor** ➤
    **Code Style** ➤ **Java**, you’ll find that there’s plenty of things you can change
    about how the editor behaves. Figure [18-8](#457413_2_En_18_Chapter.xhtml#Fig8)
    shows the options for the Code Style, specifically the Java language.


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig8_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig8_HTML.jpg)


    Figure 18-8


    Preferences, Code Style, Java


    If you want to change the number of spaces for tabs and indents, you can do that
    in the Tabs and Indents area; be sure to check out the other options in this dialog.
    What I’d like to do is to go to the Code Generation tab (shown in Figure [18-9](#457413_2_En_18_Chapter.xhtml#Fig9)).


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig9_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig9_HTML.jpg)


    Figure 18-9


    Code Generation


    This is where we can tell Android Studio how we name our variables. If you go
    back to Listing [18-1](#457413_2_En_18_Chapter.xhtml#PC1), you’ll notice that
    I’d like to prefix my variables with **m**, like **mLastname** and **mFirstname**.
    Initially, Android Studio didn’t know about it; that’s why when I generated some
    getters and setters for the member vars, it gave us `setmLastname()` instead of
    just `setLastname()`.


    Note


    Prefixing a member variable with m comes from AOSP (Android Open Source Project).
    I used it here because quite a lot of sample codes you will read online use this
    convention. You can further read about it here: [`https://bit.ly/styleguideaosp`](https://bit.ly/styleguideaosp).


    To tell Android Studio that I prefix my variables with *m*, I’ll put the *m* in
    **Name prefix** for **Field**, as shown in Figure [18-9](#457413_2_En_18_Chapter.xhtml#Fig9).
    Click OK when you’re done.


    Now, if I generate some getters and setters, we’ll get the more appropriate method
    names.


    ## Live Templates


    Another time-saver in Android Studio is live templates; they work a lot like those
    text expander applications, if you have used some of them. The basic idea is when
    you type a series of characters, for example, *datetoday*, then the editor will
    replace it with the text of the actual date today—that’s how live templates work.


    If you’ve done some Android programming in the past, you’ve probably made this
    mistake at least once:


    ```

    Toast.makeText(MainActivity.this, "no show");

    ```


    The preceding snippet won’t work because (1) the third argument to **makeText()**
    is missing and (2) you actually have to invoke the show() method for the Toast
    to appear. This is easy enough to spot, but some other errors may not be as obvious.
    Anyway, live templates can help you avoid these hassles. Live templates are shortcuts
    that are displayed as code completion options; for example, try typing **fbc**
    inside the **onCreate** method as shown in Figure [18-10](#457413_2_En_18_Chapter.xhtml#Fig10).


    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig10_HTML.jpg](images/457413_2_En_18_Chapter/457413_2_En_18_Fig10_HTML.jpg)


    Figure 18-10


    Live template sample


    You’ll see the code completion options; try to press either the ENTER or TAB key
    to complete the action.


    Some of the commonly used built-in templates are listed in Table [18-1](#457413_2_En_18_Chapter.xhtml#Tab1).


    Table 18-1


    Common live templates


    | Abbreviation | Description | Code |

    | --- | --- | --- |

    | fbc | Finds view by ID with cast | `($cast$) findViewById(R.id.$resId$);` |

    | const | Defines an Android style constant | `private static final int $name$
    = $value$;` |

    | toast | Creates a new Toast | `Toast.makeText($classname$.this, "$text$").show();`
    |

    | fori | Creates for-loop | `for(int $INDEX$ = 0;$INDEX$<$LIMIT$;$INDEX++$ ) {``$END$``}`
    |


    Make sure you check out the other live templates; go to the Settings or Preferences
    window. If you’re on Windows or Linux, go to the main menu bar, then **File**
    ➤ **Settings** ➤ **Editor** ➤ **Live Templates**; if you’re on macOS, it’s **Android
    Studio** ➤ **Preferences** ➤ **Editor** ➤ **Live Templates**—you can even create
    your own live templates from there.'
  trans: "\n### 生成\n\nAndroid Studio 另一个省时的功能是代码生成器；它名副其实，因为它完全符合你的预期——它会生成代码。我们举个例子；图\
    \ 18-4 显示了鼠标光标位于 `Person` 类定义内部。当光标位于类体内时，启动生成器操作；从主菜单栏中，转到**代码** ➤ **生成**。\n\n\
    ![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig4_HTML.jpg](img/457413_2_En_18_Fig4_HTML.jpg)\n\
    \n图 18-4 生成\n\n如图 18-4 所示，选择“构造函数”。如果你在类中有成员变量（我在 `Person` 类中就有），Android Studio\
    \ 会提供初始化这些变量的选项。在我们的示例中，我选择初始化两个成员变量，如图 18-5 所示。\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig5_HTML.jpg](img/457413_2_En_18_Fig5_HTML.jpg)\n\
    \n图 18-5 选择要初始化的字段\n\n如你所见，你可以生成大量样板代码。当你选择任意生成选项时，Android Studio 都会生成一个通用的代码存根。\n\
    \n让我们生成更多代码；这次，我们选择**getter 和 setter**。像之前一样再次进入生成对话框；顺便说一句，你也可以使用键盘快捷键（macOS\
    \ 上为 **Command + N**，Linux 或 Windows 上为 **Alt + Insert**）打开生成对话框。图 18-6 再次显示了生成对话框。\n\
    \n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig6_HTML.jpg](img/457413_2_En_18_Fig6_HTML.jpg)\n\
    \n图 18-6 生成 getter 和 setter\n\n在接下来的窗口中，选择要为其生成 getter 和 setter 的字段，如图 18-7 所示。\n\
    \n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig7_HTML.jpg](img/457413_2_En_18_Fig7_HTML.jpg)\n\
    \n图 18-7 选择用于 getter 和 setter 的字段\n\n生成器对话框显示了 `Person` 类中所有自动检测到的字段。它向我们显示了 `mFirstname`\
    \ 和 `mLastname` 成员变量；它还允许你进行多项选择。选择这两个成员变量并单击“确定”。代码清单 18-1 展示了代码生成后的 `Person`\
    \ 类。\n\n```\nclass Person {\n    String mfirstname;\n    String mlastname;\n \
    \   public Person(String mfirstname, String mlastname) {\n        this.mfirstname\
    \ = mfirstname;\n        this.mlastname = mlastname;\n    }\n    public String\
    \ getMfirstname() {\n        return mfirstname;\n    }\n    public void setMfirstname(String\
    \ mfirstname) {\n        this.mfirstname = mfirstname;\n    }\n    public String\
    \ getMlastname() {\n        return mlastname;\n    }\n    public void setMlastname(String\
    \ mlastname) {\n        this.mlastname = mlastname;\n    }\n}\n```\n\n代码清单 18-1\
    \ Person 类\n\n这已经很简洁了。任何能让我们减少按键次数的事情都是好事。我猜你可能对这个示例只有一个可挑剔的地方；方法命名不正确。你可能更倾向于调用\
    \ `setLastname()` 而不是 `setmLastname()`，不是吗？我们将在下一节中修复这个问题。\n\n### 编码风格\n\n如果你进入\
    \ Android Studio 的偏好设置或设置，然后转到**编辑器** ➤ **代码风格** ➤ **Java**，你会发现有很多关于编辑器行为的内容可以更改。图\
    \ 18-8 展示了代码风格的选项，特别是针对 Java 语言。\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig8_HTML.jpg](img/457413_2_En_18_Fig8_HTML.jpg)\n\
    \n图 18-8 偏好设置，代码风格，Java\n\n如果你想更改制表符和缩进的空格数，可以在“制表符和缩进”区域中进行设置；请务必查看此对话框中的其他选项。我想做的是转到“代码生成”选项卡（如图\
    \ 18-9 所示）。\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig9_HTML.jpg](img/457413_2_En_18_Fig9_HTML.jpg)\n\
    \n图 18-9 代码生成\n\n在这里，我们可以告诉 Android Studio 我们如何命名变量。如果你回到代码清单 18-1，你会注意到我倾向于为变量添加\
    \ `m` 前缀，比如 `mLastname` 和 `mFirstname`。最初，Android Studio 并不知道这一点；这就是为什么当我为成员变量生成一些\
    \ getter 和 setter 时，它给出了 `setmLastname()` 而不是 `setLastname()`。\n\n> **注意：** 在成员变量前加\
    \ `m` 前缀源自 AOSP（Android 开源项目）。我在这里使用它，是因为你在网上会看到很多示例代码都遵循这个约定。你可以在此处进一步了解它：[`https://bit.ly/styleguideaosp`](https://bit.ly/styleguideaosp)。\n\
    \n为了告诉 Android Studio 我为变量添加了 `m` 前缀，我会将 `m` 放入**字段**的**名称前缀**中，如图 18-9 所示。完成后单击“确定”。现在，如果我生成一些\
    \ getter 和 setter，我们将得到更合适的方法名称。\n\n## 动态模板\n\nAndroid Studio 另一个省时的功能是动态模板；如果你使用过一些文本扩展应用程序，它们的工作原理非常相似。基本思想是，当你输入一系列字符时，例如\
    \ `datetoday`，编辑器会将其替换为当天的实际日期文本——这就是动态模板的工作原理。\n\n如果你过去做过一些 Android 编程，你可能至少犯过这个错误一次：\n\
    \n```\nToast.makeText(MainActivity.this, \"no show\");\n```\n\n上面的代码片段不会生效，因为\
    \ (1) `makeText()` 的第三个参数缺失，并且 (2) 实际上必须调用 `show()` 方法才能让 `Toast` 显示出来。这很容易发现，但其他一些错误可能就没那么明显了。无论如何，动态模板可以帮助你避免这些麻烦。动态模板是以代码补全选项形式显示的快捷方式；例如，尝试在\
    \ `onCreate` 方法内输入 `fbc`，如图 18-10 所示。\n\n![../images/457413_2_En_18_Chapter/457413_2_En_18_Fig10_HTML.jpg](img/457413_2_En_18_Fig10_HTML.jpg)\n\
    \n图 18-10 动态模板示例\n\n你将看到代码补全选项；尝试按 ENTER 或 TAB 键来完成操作。\n\n一些常用的内置模板列于表 18-1 中。\n\
    \n**表 18-1** 常用动态模板\n\n| 缩写 | 描述 | 代码 |\n| --- | --- | --- |\n| `fbc` | 通过带类型转换的\
    \ ID 查找视图 | `($cast$) findViewById(R.id.$resId$);` |\n| `const` | 定义一个 Android\
    \ 风格常量 | `private static final int $name$ = $value$;` |\n| `toast` | 创建一个新的 Toast\
    \ | `Toast.makeText($classname$.this, \"$text$\").show();` |\n| `fori` | 创建 for\
    \ 循环 | `for(int $INDEX$ = 0; $INDEX$ < $LIMIT$; $INDEX++$) { $END$ }` |\n\n请确保你查看了其他动态模板；进入“设置”或“偏好设置”窗口。如果你使用\
    \ Windows 或 Linux，请转到主菜单栏，然后选择**文件** ➤ **设置** ➤ **编辑器** ➤ **动态模板**；如果你使用 macOS，则选择**Android\
    \ Studio** ➤ **偏好设置** ➤ **编辑器** ➤ **动态模板**——你甚至可以在那里创建自己的动态模板。\n"
- fmt: '## Important Keyboard Shortcuts


    The Android Developers website maintains a page where you can find the keyboard
    shortcuts for Android Studio; it’s at [`http://bit.ly/androidstudiokbshortcuts`](http://bit.ly/androidstudiokbshortcuts).
    You should really make it a point to read that page; but before we close the chapter,
    I’d like to leave you with six shortcuts that I find to be very useful for me—it
    could be useful for you too. Table [18-2](#457413_2_En_18_Chapter.xhtml#Tab2)
    lists these shortcuts.


    **Table 18-2** Some useful keyboard shortcuts


    | Shortcut | What it does |

    | --- | --- |

    | Press `Shift` twice | It lets you search for a term everywhere. It searches
    assets folders, gradle files, image resources, codes, xml configuration files,
    etc. If you don’t know which folder to search, just use this |

    | `Ctrl + Space` &#124; `Command + Space` | Android Studio already has code completions
    and code hinting; this is just a little extra. If you forgot the parameters for
    a method that uses lots of parameters, you can use this to preview all the variants
    of the method and the corresponding parameters they expect |

    | `Alt + Insert` &#124; `Command + N` | We’ve used this in the previous section
    where we generated some code. This is the shortcut for the code generator |

    | `Ctrl + O` &#124; `Command + O` | When you want to override methods, use this
    shortcut |

    | `Ctrl + -` &#124; `Command + -` | You can use this to expand or collapse code
    blocks. It’s handy to be able to fold codes when you’re working with a large codebase;
    this shortcut will make your life a bit easier when you fold/unfold blocks |

    | `Ctrl + Alt + L` &#124; `Command + Option + L` | Don’t manually indent or reindent
    your code—if you messed up the indentation of a `for`-loop or nested conditional
    blocks, just highlight the code block and use this shortcut |


    ## Summary


    - You can avoid writing boilerplate codes like constructors, getters and setters,
    and so on by using code generators.

    - Android Studio has plenty of refactoring aids; before using the `Find/Replace`
    menu, consider using the refactoring options.

    - Live templates are like text expanders; they can save you time and let you avoid
    common coding mistakes—you should use them.

    - You can control how the Android Studio editor behaves; go to `Settings` or `Preferences`,
    then **Editor** ➤ **Code Style**.'
