  trans: '

    # 创建项目


    启动 Android Studio。点击“Start a new Android Studio Project”（启动新的 Android Studio 项目），如图
    3-1 所示。操作时必须保持在线，因为 Android Studio 的 Gradle（项目构建工具）会在你创建新项目时从在线仓库拉取大量文件。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig1_HTML.jpg](img/457413_2_En_3_Fig1_HTML.jpg)


    图 3-1


    启动界面


    在创建过程中，Android 会提示你选择要构建的项目类型；选择 **Phone and Tablet** ➤ **Empty Activity**，如图
    3-2 所示——我们将在后续章节讨论 Activity，但目前可以将 Activity 理解为一个屏幕或表单，它是用户能看到并进行交互的界面。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig2_HTML.jpg](img/457413_2_En_3_Fig2_HTML.jpg)


    图 3-2


    创建新项目；选择 Activity 类型


    在下一个界面中，我们需要配置项目。我们将设置应用名称、包名（域名）以及目标 Android 版本。图 3-3 展示了“Create New Project”（创建新项目）界面的详细说明图。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig3_HTML.jpg](img/457413_2_En_3_Fig3_HTML.jpg)


    图 3-3


    配置你的项目


    | ❶ | **Name（名称）**。这也称为项目名称；它同时会成为顶级文件夹的名称，该文件夹将包含项目的所有文件。如果你将应用发布到 Play 商店，此名称还将成为应用标识的一部分。
    |

    | ❷ | **Package name（包名）**。这是你的组织或公司域名，采用反向 DNS 表示法。如果你没有公司名称，可以使用任何类似网页域名的名称。目前，是否使用真实公司名无关紧要，因为我们不会将此应用发布到
    Play 商店。 |

    | ❸ | **Save location（保存位置）**。这是你本地目录中用于保存项目文件的位置。 |

    | ❹ | **Language（语言）**。你可以选择 Kotlin 或 Java；在本项目中，我们将使用 Java。 |

    | ❺ | **Minimum API level（最低 API 级别）**。最低 API 级别将决定你的应用可以运行的最低 Android 版本。你需要谨慎明智地选择，因为它可能会严重限制应用的潜在用户群体。
    |

    | ❻ | **Help me choose（帮我选择）**。此选项会显示你的应用可以支持的 Android 设备百分比。如果点击“Help me choose”链接，将打开一个窗口，按
    Android 版本显示 Android 设备的分布情况。 |

    | ❼ | **Legacy Android support libraries（旧版 Android 支持库）**。这些是支持库。引入它们是为了让你能够使用现代
    Android 库（例如 Android 9 中附带的库），同时还能让应用在较低 Android 版本的设备上运行。 |


    全部完成后，点击“Finish”（完成）开始创建项目。Android Studio 会搭建项目结构，并创建启动文件，例如主 Activity 文件、Android
    Manifest 以及其他支持项目启动的文件。构建工具（Gradle）会从在线仓库拉取大量文件，这可能需要一些时间。


    完成上述步骤后，希望项目已成功创建，你将看到 Android Studio 的主编辑器窗口，如图 3-4 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig4_HTML.jpg](img/457413_2_En_3_Fig4_HTML.jpg)


    图 3-4


    主编辑器窗口


    Android Studio 的界面由多个区域组成，这些区域可以根据你的需要折叠或展开。左侧区域（图 3-4）是项目面板。它采用树状结构，显示项目中所有（相关）文件。如果你想编辑某个特定文件，只需在项目面板中选择它并双击；此时，该文件将在主编辑器窗口中打开以供编辑。在图
    3-4 中，你可以看到 `MainActivity.java` 文件已可供编辑。在今后的工作中，我们将会花费大量时间在主编辑器窗口中编写代码，但目前我们只打算了解应用开发的基本流程。我们不会在
    Java 文件或项目中的任何其他文件中添加或修改任何内容。我们将保持它们原样不变。

    '
- fmt: '## Create an AVD


    The next step is to build and test the app. We can do that either by running it
    in an emulator or plugging in a physical Android device to your workstation. This
    section covers setting up an emulator.


    From Android Studio’s main menu bar, go to **Tools** ➤ **AVD Manager**, as shown
    in Figure [3-5](#457413_2_En_3_Chapter.xhtml#Fig5).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig5_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Menu bar, Tools, AVD Manager


    The AVD manager window launches; AVD stands for Android Virtual Device. It’s an
    emulator that runs a specific version of the Android OS, which we can use for
    testing the app. The AVD manager (shown in Figure [3-6](#457413_2_En_3_Chapter.xhtml#Fig6))
    shows all the defined emulators in the local development environment.


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig6_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    AVD manager


    As you can see, I’ve already created a couple of emulators, but let’s create another
    one; to do that, click the “+ Create Virtual Device” button, as shown in Figure
    [3-6](#457413_2_En_3_Chapter.xhtml#Fig6). That action launches the “Virtual Device
    Configuration” screen, as shown in Figure [3-7](#457413_2_En_3_Chapter.xhtml#Fig7).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig7_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Virtual Device Configuration


    Choose the “Phone” category and then choose the device resolution. I chose the
    Pixel 5.0” 420dpi screen. Click the “Next” button, and we get to choose the Android
    version for the emulator; we can do this on the “System Image” screen, shown in
    Figure [3-8](#457413_2_En_3_Chapter.xhtml#Fig8).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig8_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    System Image


    I want to use Android 10 (API level 29) or Q, as some may call it; but as you
    can see, I don’t have that system image in my machine just yet—when you can see
    the “Download” link next to the Android version, that means you don’t have that
    system image locally yet. To get the system image for Android 10, click the “Download”
    link. You need to agree to the license agreement before you can proceed. Click
    “Accept” and then click “Next,” as shown in Figure [3-9](#457413_2_En_3_Chapter.xhtml#Fig9).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig9_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig9_HTML.jpg)


    Figure 3-9


    SDK Quickfix Installation


    The download process can take some time, depending on your Internet speed; when
    it’s done, you’ll get back to the “System Image” selection screen, as shown in
    Figure [3-10](#457413_2_En_3_Chapter.xhtml#Fig10).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig10_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Virtual Device Configuration


    As you can see, we can now use Android 10 as a system image for our emulator.
    Select it, then click “Next.” The next screen shows a summary of our past choices
    for creating the emulator; the “Verify Configuration” screen is displayed next
    (Figure [3-11](#457413_2_En_3_Chapter.xhtml#Fig11)).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig11_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Verify Configuration


    The “Verify Configuration” screen not only shows the summary of our past choices,
    you can configure some additional functionalities here. If you click the “Show
    Advanced Settings” button, you can also configure the following:


    * Front and back camera

    * Emulated network speed

    * Emulated performance

    * Size of internal storage

    * Keyboard input (whether enabled or disabled)


    When you’re done, click the “Finish” button. When the AVD gets created, we’ll
    be back in the “Android Virtual Device Manager” screen, as shown in Figure [3-12](#457413_2_En_3_Chapter.xhtml#Fig12).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig12_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Android Virtual Device Manager


    Now we can see the emulator (Pixel API 29). Click the little green arrow on the
    “Actions” column to launch the emulator—the pencil icon edits the emulator’s configuration,
    and the green arrow launches it.


    When the emulator launches, you’ll see an image of the Pixel phone pop up on the
    desktop; it needs time to boot up completely. Go back to the main editor window
    of Android Studio to run the app.


    From the main menu bar, go to **Run** ➤ **Run** app, as shown in Figure [3-13](#457413_2_En_3_Chapter.xhtml#Fig13).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig13_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Main menu bar, Run


    Android Studio compiles the project; then, it looks for either a connected (physical)
    Android device or a running emulator. We already launched the emulator a while
    ago, so Android Studio should find it and install the app in that emulator instance.


    If all went well, you should see the Hello World app that Android Studio scaffolded
    for us, as shown in Figure [3-14](#457413_2_En_3_Chapter.xhtml#Fig14).


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig14_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Hello World


    ## Summary


    * An Android project (almost) always has an Activity. You can start with a basic
    project and choose “Empty Activity,” as we did in the examples. Then, build from
    there.

    * Pay some attention to the project package name during creation; if you release
    the project to Google Play, you won’t be able to change the package name; it will
    be part of your application.

    * Choose the minimum SDK carefully; it will limit the number of potential users
    of your app.

    * You can use an emulator to run the app and see how it’s shaping up. Testing
    using an emulator is much better if you have HAXM (emulator accelerator) enabled
    on your system; if you’re on Linux, you can have acceleration using KVM.


    # 4. Android Studio IDE


    *What the chapter covers:*


    * Working with files in Android Studio

    * The main editor

    * Working with layout files

    * The Project tool window


    Previously, we built a simple app by creating a project with an empty Activity,
    opened it in the main editor window (briefly), and ran it in an emulator. In this
    chapter, we’ll spend some time focused on the parts of IDE where you’ll spend
    most of the time.'
