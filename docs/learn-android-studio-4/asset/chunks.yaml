- fmt: "# Summary\n\n- 你仍然可以在应用中使用基于 Activity 或 Fragment 的导航；只需记住它们的优缺点。\n- 导航组件结合了基于\
    \ Activity 和基于 Fragment 的导航的最佳特性；API 易于使用，并且我们对返回栈有了更多控制。\n- 导航组件引入了*目标（destination）*\
    \ 的概念。*目标*可以是 Fragment、Activity 或自定义视图；它们是用户将要导航到的页面。\n- *目标*通过导航图进行分组；导航图是一个\
    \ XML 资源文件，其中包含了各目标之间的所有*动作（action）*。\n- *目标*之间通过*动作*相互连接。\n- 导航的基本思路如下：\n  1.\
    \  创建导航图。\n  2.  创建目标。\n  3.  连接各个目标；每次连接成为一个动作。\n  4.  使用`NavController`对象以编程方式从一个目标导航到另一个目标。你可以通过\
    \ ID 或 URI 进行导航。\n\n# 11. 在后台运行\n\n*本章将涵盖：*\n\n- 基本线程概念\n- UI 线程\n- 如何创建和使用 Java\
    \ 线程\n\n知道如何在后台运行代码是每位开发者必备的基本技能。熟练运用线程可以提升应用的性能，用户对此非常满意。当前对应用性能的要求非常高。没有人愿意使用一个运行缓慢如糖浆的应用。如今，卡顿和颠簸的应用会很快被遗忘。\n\
    \n在本章中，我们将探索精彩的线程世界。\n\n## 基本概念\n\n当你启动一个应用时，系统会创建一个进程，并为它分配一些资源，例如内存等。同时，它还会获得一个线程。\n\
    \n通俗地说，线程是一个指令序列。它是执行你代码的东西。在应用运行期间，这个线程将使用该进程的资源。它可能会读写内存、磁盘，甚至有时会进行网络 I/O。当线程与所有这些交互时，它只是在等待。在等待期间，它无法利用\
    \ CPU 周期。我们不能让这些 CPU 周期白白浪费，对吧？我们可以创建其他线程，这样当一个或多个线程在等待某件事时，其他线程可以利用 CPU。这就是多线程应用的情况。\n\
    \n当 Android 运行时创建一个应用实例时，该进程会被赋予一个线程。它被称为主线程；有些开发者称其为 UI 线程，但我们只会得到这一个线程，没有更多。好消息是我们可以创建更多的线程。UI\
    \ 线程可以创建其他线程。\n\n## UI 线程\n\nUI 线程，也称为主线程，负责启动主 Activity 并解析（XML）布局文件。解析布局文件意味着将所有\
    \ View 元素转换为实际的 Java 对象，例如 Button、TextView 等。简而言之，主线程负责显示 UI。当我们在`TextView`对象上调用`setText()`或`setHint()`等方法时，这些调用并不会立即执行；相反，流程如下：\n\
    \n1.  该调用被放入一个消息队列（`MessageQueue`）中。\n2.  它将停留在那里，直到某个 Handler 将其取出执行。\n3.  然后，它在主线程上执行。\n\
    \n主线程不仅用于显示 UI 元素，还用于应用中发生的所有其他事情。你可能还记得 Activity 有生命周期方法，例如`onCreate`、`onStop`、`onResume`、`onCreateOptionsMenu`、`onOptionsItemSelected`以及其他方法。每当代码在这些块中运行时，运行时无法处理队列中的任何消息。它处于*阻塞*状态；阻塞状态意味着主线程正在等待某件事完成，然后才能继续执行其任务——这对用户体验不好。\n\
    \n大多数情况下，我们调用的方法运行时间并不长。可以说，这些调用在计算资源方面是廉价的。所以，这通常不是什么大问题。当我们调用需要相当长时间才能完成的方法时，问题就来了。Android\
    \ 开发团队的指导原则是，我们应该将调用限制在不超过 15 毫秒；如果超过这个时间，我们应该考虑在后台线程中运行这些代码。这一指导原则来自 Project\
    \ Butter，它是在 Jelly Bean（Android 4.1）时期发布的；旨在提升 Android 应用的性能。当运行时检测到你在主线程上做了太多事情时，它就会开始丢弃帧。当你不进行耗时调用时，应用以非常流畅的每秒\
    \ 60 帧运行。如果你占用了主线程，你会开始注意到性能变慢，因为帧率开始下降。在 Android 世界中，这被称为卡顿（jank）。在主线程上进行过多处理会导致\
    \ UI 渲染缓慢，从而导致丢帧或跳帧，进而导致应用出现明显的卡顿现象。应用变得卡顿。\n\n> **注意**\n> 在 Project Butter 之前，如果\
    \ UI 线程检测到你在 UI 线程上做得太多，例如打开一个大文件、创建一个网络 socket 或任何需要长时间的操作，运行时可能会向你显示 ANR（应用无响应）屏幕。如今很少见到\
    \ ANR 了，更多的是卡顿问题。\n\n如果你想避免卡顿，你需要知道如何在后台运行耗时或与 I/O 相关的代码。\n\n你不需要过度兴奋并开始在后台运行所有东西。要合理并运用你的判断。例如，以下调用不需要在后台线程中：\n\
    \n```\ntxt1.setText(String.format(\"%d\", (2 * 2 * 2)));\n```\n\n它只是将一个`TextView`的文本属性设置为一个计算结果。这个计算并不复杂。\n\
    \n即使是列表 [11-1] 也不算耗时代码。它进行了一些基本的 GCF（最大公因数）计算，但使用了欧几里得算法来得到结果。这个算法运行高效。无论输入值有多大，循环次数都不会呈爆炸式增长；无论是求\
    \ 12 和 15 的 GCF，还是 16,848,662 和 24 的 GCF，其时间复杂度变化不大。因此，将它放在主线程中是完全可行的。"
  raw: "## Summary\n\n*   You can still use Activity-based or Fragment-based navigation\
    \ in your app; just remember their pros and cons.\n\n*   Navigation components\
    \ combine the best features of Activity-based and Fragment-based navigation; the\
    \ API is easy to work with, and we have more control on the back stack.\n\n* \
    \  Navigation components introduce the concept of *destinations*. *Destinations*\
    \ can be Fragments, Activities, or custom views; they are what your users will\
    \ navigate to.\n\n*   *Destinations* are grouped using a navigation graph; it’s\
    \ an XML resource file that contains all the *actions* between destinations.\n\
    \n*   *Destinations* are connected to each other by *actions*.\n\n*   The basic\
    \ ideas for navigation are to\n    1.  Create a navigation graph.\n\n    2.  Create\
    \ destinations.\n\n    3.  Connect the destinations; each connection becomes an\
    \ action.\n\n    4.  Navigate programmatically from one destination to another\
    \ using the NavController object. You can navigate using an ID or a URI.\n\n#\
    \ 11. Running in the Background\n\n*What we’ll cover:*\n\n*   Basic thread concepts\n\
    \n*   The UI thread\n\n*   How to create and use Java threads\n\nKnowing how to\
    \ run codes in the background is an essential skill for every developer. Making\
    \ adept use of threads can boost your app’s performance. Users love that. The\
    \ bar is very high right now on application performance. No one wants to use an\
    \ app that runs like molasses. Jittery and janky apps are quickly forgotten nowadays.\n\
    \nIn this chapter, we’ll explore the wonderful world of Threads.\n\n## Basic Concepts\n\
    \nWhen you launch an app, a process is created, and it’s allocated some resources\
    \ like memory, among other things. It’s also given one thread.\n\nA thread, loosely\
    \ speaking, is a sequence of instructions. It’s the thing that executes your code.\
    \ During the time the app is alive, this thread will utilize the process’ resources.\
    \ It may read or write data to memory, disk, or sometimes even the network I/O.\
    \ While the thread is interacting with all these, it is just waiting. It can’t\
    \ take advantage of CPU cycles while it’s waiting. We can’t let all those CPU\
    \ cycles go to waste. Can we? We can create other threads so that when one or\
    \ more threads are waiting for something, the other threads can utilize the CPU.\
    \ This is the case for multithreaded applications.\n\nWhen the Android Runtime\
    \ creates an instance of an app, that process will be given one thread. It’s called\
    \ the main thread; some developers call it the UI thread, but we’ll be given just\
    \ the one thread and no more. The good news is we can create more threads. The\
    \ UI thread is allowed to spawn other threads.\n\n## The UI Thread\n\nThe UI thread,\
    \ also known as the main thread, is responsible for launching the main activity\
    \ and inflating the (XML) layout file. Inflating the layout file means turning\
    \ all the View elements into actual Java objects, for example, Buttons, TextViews,\
    \ and so on. In short, the main thread is responsible for displaying the UI. When\
    \ we make calls like **setText()** or **setHint()** on a TextView object, these\
    \ calls aren’t executed right away; instead, it is as follows:\n\n1.  The call\
    \ is placed in a MessageQueue.\n\n2.  There it will stay until a handler picks\
    \ it up for execution.\n\n3.  Then, it gets executed on the main thread.\n\nThe\
    \ main thread is not only used for displaying UI elements, it’s also used for\
    \ everything else that happens in your app. You may recall that Activity has lifecycle\
    \ methods like onCreate, onStop, onResume, onCreateOptionsMenu, onOptionsItemSelected,\
    \ and other methods. Whenever the code runs on these blocks, the runtime cannot\
    \ process any message in the queue. It’s in a *blocked* state; a blocked state\
    \ means that the main thread is waiting for something to finish before it can\
    \ continue to go about its business—this is not good for user experience.\n\n\
    Most of the time, the calls we make don’t take that much time to run. The calls\
    \ are cheap, so to speak, in terms of computing resources. So, it’s not really\
    \ a big deal. It becomes a big deal when we make calls that take quite a while\
    \ to complete. The Android development team’s guidance is that we should limit\
    \ our calls to no more than 15 milliseconds; anything more than that, then we\
    \ should consider running those codes in a background thread. This guidance was\
    \ from Project Butter, which was released around the time of Jelly Bean (Android\
    \ 4.1); it was meant to improve Android apps’ performance. When the runtime senses\
    \ that you’re doing too much on the main thread, it’ll start dropping frames.\
    \ When you’re not making expensive calls, the app runs at a very smooth 60 frames\
    \ per second. If you hog the main thread, you will start noticing sluggish performances\
    \ because the frame rates begin to drop. In the Android world, this is known as\
    \ jank. Doing too much processing on the main thread will cause slow UI rendering,\
    \ which results in dropped or skipped frames, which results in the app’s perceived\
    \ stuttering. The app becomes janky.\n\nNote\n\nBefore Project Butter, if the\
    \ UI thread senses that you’re doing way too much on the UI thread, for example,\
    \ opening a large file, creating a network socket, or anything that takes a long\
    \ time, the runtime may slap you with the ANR (Android Not Responding) screen.\
    \ ANRs are rarely seen nowadays; jank is more the concern.\n\nIf you want to avoid\
    \ jank, you need to know how to run time-consuming or I/O-related codes in the\
    \ background.\n\nYou don’t need to get overexcited and start running everything\
    \ in the background. Be reasonable and use your judgment. The following call,\
    \ for example, doesn’t need to be in a background thread:\n\n```\ntxt1.setText(String.format(\"\
    %d\", (2 * 2 * 2)));\n```\n\nIt is merely setting the Text property of a TextView\
    \ to a calculated field. The calculation isn’t complex.\n\nEven Listing [11-1](#457413_2_En_11_Chapter.xhtml#PC2)\
    \ isn’t considered an expensive code to run. It does some rudimentary calculation\
    \ of the GCF (greatest common factor), but it uses the Euclidean algorithm to\
    \ get at the results. This algorithm performs efficiently. The number of loop\
    \ cycles doesn’t grow wildly regardless of how large the input values are; the\
    \ time complexity doesn’t change much whether we’re finding the GCF of 12 and\
    \ 15 or 16,848,662 and 24\\. So, it’s quite okay to put this in the main thread."
