    logic. When your code is not doing what you thought it should be doing, that’s
    logic error. There are many ways to cope with it, but in this section, we’ll take
    a look at two—printing debugging statements in certain places of your code and
    walking through your code using the debugger.


    As you inspect your codes, you will recognize certain areas where you’re pretty
    sure about what’s going on, and then there are areas where you are not so sure—you
    can place debugging statements in these areas. It’s like leaving breadcrumbs for
    you to follow. There are a couple of ways to print debugging statements. You can
    either use **println**, **Log**, or the **Logger** class.


    When you set Logcat’s mode to verbose, info, or debug, you will see all the messages
    that Android’s runtime generates. If you want to be able to filter our messages,
    for example, warn or error, you need to use either the Log or the Logger class.


    The Log class has five static methods; the usage is shown as follows:


    ```

    Log.v(TAG, message) // verbose

    Log.d(TAG, message) // debug

    Log.i(TAG, message) // info

    Log.w(TAG, message) // warning

    Log.e(TAG, message) // error

    ```


    In each case, **TAG** is a String literal or variable, typically the name of the
    class where Log is called. The **message** is also a String literal or variable
    which contains what you actually want to see in the log. Listing [12-3](#457413_2_En_12_Chapter.xhtml#PC4)
    shows a typical use of the Log class in code.


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Context;

    import android.os.Bundle;

    import android.util.Log;

    import java.io.FileOutputStream;

    import java.io.IOException;

    public class MainActivity extends AppCompatActivity {

    private final String TAG = getClass().getName();

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Log.d(TAG, "onCreate");

    }

    @Override

    protected void onStart() {

    super.onStart();

    Log.d(TAG, "onStart");

    }

    @Override

    protected void onResume() {

    super.onResume();

    Log.d(TAG, "onResume");

    }

    private void saveData(String fn) throws IOException {

    try (FileOutputStream fileos = openFileOutput(fn, Context.MODE_APPEND)) {

    Log.d(TAG, "Doing something with the file");

    }

    catch(IOException ioe) {

    Log.e(TAG, ioe.getMessage());

    // you can still re-throw the Exception here

    // or do some recovery

    }

    }

    }

    Listing 12-3

    Typical use of the Log class

    ```


    When the app runs, you can see the Log messages in the **Logcat** window, as shown
    in Figure [12-4](#457413_2_En_12_Chapter.xhtml#Fig4). You can get to the Logcat
    window either by clicking its tab in the menu strip at the bottom of the IDE or
    from the main menu bar, **View** ➤ **Tool Windows** ➤ **Logcat**.


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig4_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Logcat tool window


    ## Debugger


    Android Studio includes an interactive debugger which allows you to walk and step
    through the code while it’s running. With the interactive debugger, you can inspect
    snapshots of the application—values of variables, running threads, and so on—at
    specific locations in the code and at specific points in time. These specific
    locations in the code are called *breakpoints* ; you get to choose these breakpoints.


    To set a breakpoint, choose a line that has an executable statement and then click
    its line number in the gutter. When you set a breakpoint, there will be a pink
    circle icon in the gutter, and the whole line is lit in pink—as shown in Figure
    [12-5](#457413_2_En_12_Chapter.xhtml#Fig5).


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig5_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Debugger window


    After the breakpoints are set, you have to run the app in debug mode. Stop the
    app if it is currently running, and then from the main menu bar, click **Run**
    ➤ **Debug App**.


    Note


    Running the app in debug mode isn’t the only way to debug the app. You can also
    attach the debugger process in a currently running application. There are situations
    where this second technique is useful; for example, when the bug you are trying
    to solve occurs on very specific conditions, you may want to run the app for a
    while, and when you think you are close to the point of error, you can then attach
    the debugger.


    Use the application as usual. When the execution comes to a line where you set
    a breakpoint, the line turns from pink to blue. This is how you know the code
    execution is at your breakpoint. At this point, the debugger window opens, the
    execution stops, and Android Studio gets into interactive debugging mode. While
    you are here, the state of the application is displayed in the **Debug tool**
    **window** . During this time, you can inspect values of variables and even see
    the threads running in the app.


    You can even add variables or expression in the watch window by clicking the plus
    sign with the spectacles icon. There will be a text field where you can enter
    any valid expression. When you press **Enter**, Android Studio will evaluate the
    expression and show you the result. To remove a watch expression, select the expression
    and click the minus sign icon on the watch window.


    ### Single Stepping


    Like most debuggers, Android Studio lets you step line by line through your program.
    When the debugger stops at a breakpoint, you have a couple of tools at your disposal.
    You’d typically want to know how to do the following:


    *   **Resume**—Resumes execution until you get to the next breakpoint. If there
    aren’t any more breakpoints, then the program runs like it would in normal execution.


    *   **Step into**—If the next line has a method call, this will jump to the method
    and pause it at the first line.


    *   **Step over**—Executes whatever happens on the next line and then jumps to
    the next line.


    *   **Step out**—Executes the remainder of the current method and then pauses
    at the next statement after the method. It essentially gets out of the method.


    You can get to these actions from the main menu bar under the **Run** menu. You
    can also get to them from the Debugger toolbar (shown in Figure [12-6](#457413_2_En_12_Chapter.xhtml#Fig6)).


    ![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig6_HTML.jpg](images/457413_2_En_12_Chapter/457413_2_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Debugger toolbar


    Lastly, you can get the single-step actions via keyboard shortcuts, as shown in
    Table [12-1](#457413_2_En_12_Chapter.xhtml#Tab1).


    Table 12-1


    Debugger keyboard shortcuts


    |   | Windows/Linux | macOS |

    | --- | --- | --- |

    | Debug | Shift + F9 | Ctrl + D |

    | Resume | F9 | Command + Option + R |

    | Step into | F7 | F7 |

    | Step over | F8 | F8 |

    | Step out | Shift + F8 | Shift + F8 |


    You can learn about more keyboard shortcuts (not just for debugging) from the
    Android Developers website: [`https://developer.android.com/studio/intro/keyboard-shortcuts`](https://developer.android.com/studio/intro/keyboard-shortcuts).


    ## Summary


    *   The three kinds of errors you may encounter are compile type or syntax errors,
    runtime errors, and logic errors.


    *   Syntax errors are the easiest to fix; Android Studio itself bends over backward
    for you so you can quickly spot syntax errors. There are various ways to fix syntax
    errors with AS3, but most of the time, the **quick fix** should do it.


    *   You can walk through your code line by line by setting breakpoints and using
    the single-step actions.'
