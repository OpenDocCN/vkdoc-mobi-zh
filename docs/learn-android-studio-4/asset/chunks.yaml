- fmt: '# Intents


    If you have experience with object-oriented programming, you might be used to
    the idiom of activating an object’s behavior by simply creating an instance of
    the object and calling its methods—that’s a straightforward and simple way of
    making objects communicate to each other; unfortunately, Android’s components
    don’t follow that idiom. The code shown in Listing [5-2](#457413_2_En_5_Chapter.xhtml#PC2),
    while idiomatically object oriented, isn’t going to work in Android.


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button b = (Button) findViewById(R.id.button);

    b.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View v) {

    new SecondActivity(); // WON’T WORK

    }

    });

    }

    }

    ```


    Listing 5-2: Wrong way to activate another Activity


    Android’s architecture is quite unique in the way it builds application. It has
    this notion of components instead of just plain objects. Android uses `Intents`
    as a way for its components to communicate; it also uses the same `Intents` to
    pass messages across components.


    The reason Listing [5-2](#457413_2_En_5_Chapter.xhtml#PC2) won’t work is because
    an Android `Activity` isn’t a simple object, it’s a component. You cannot simply
    instantiate a component in order to activate it. Component activation is done
    by creating an `Intent` object and then passing it to the component you want to
    activate, which, in our case now, is another `Activity`.


    There are two kinds of `Intents`, an explicit `Intent` and an implicit `Intent`.
    Listing [5-3](#457413_2_En_5_Chapter.xhtml#PC3) shows a sample code on how to
    create an explicit `Intent` and how to use it to activate another `Activity`—highlighted
    in bold.


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button b = (Button) findViewById(R.id.button);

    b.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View v) {

    Intent i = new Intent(v.getContext(), SecondActivity.class);

    v.getContext().startActivity(i);

    }

    });

    }

    }

    ```


    Listing 5-3: How to activate another Activity


    It may look like there’s a lot of things to unpack on our sample codes, but don’t
    worry, I’ll explain the codes with more context as we move further along in the
    coming chapters.


    ## Summary


    - Android applications are made up of loosely coupled components. These components
    communicate via `Intent` objects.

    - An app’s entry point is usually a launcher `Activity`. This launcher `Activity`
    is designated in the app’s `AndroidManifest` file.

    - The manifest file is like a glue that holds together the components of the application;
    everything the application has, can do, or cannot do is reflected in the manifest.


    # 6. Activities and Layouts


    *What we’ll cover:*


    - Overview of Android activities

    - Layout files

    - View objects


    Most of the apps you will build will have a UI. In the previous chapter, we learned
    that to create a simple app with UI, we need (1) an `Activity` class, (2) a layout
    file for that `Activity` class, and (3) a manifest file. Thankfully, we get these
    three things from the project creation wizard.


    In this chapter, we will examine the `Activity` component a lot closer. We will
    learn more about the constituent parts of an `Activity`, the Java class, and its
    related layout file.


    ## Activity


    The `Activity` component is responsible for what the user sees on the screen.
    It’s made up of an `Activity` class and a layout file (an XML file that contains
    definitions for UI elements like buttons, text fields, etc.).


    ### Layout File


    The layout file is an XML file. It contains definitions of UI elements such as
    buttons, text fields, drop-downs, labels, and so on. Some people may cringe at
    the thought of composing UI by hand using only an XML editor, but don’t worry,
    Android Studio makes it easy to compose user interfaces. You can work with the
    layout file either in text mode or in design mode (WYSIWYG), as shown in Figure
    [6-1](#457413_2_En_6_Chapter.xhtml#Fig1).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig1_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig1_HTML.jpg)


    Figure 6-1: Layout file, shown as text mode and in design mode


    In Figure [6-1](#457413_2_En_6_Chapter.xhtml#Fig1), the picture on the left shows
    the `activity_main` layout file as in XML mode (or code mode), and the one on
    the right shows the layout file in design mode. You can work with the layout file
    visually (click the “Design” button) or as raw XML code (click the “Code” button).
    When you change an element by editing the XML, Android Studio automatically updates
    the design view’s rendition. Similarly, when you make a change in the design view,
    the XML file gets updated.


    Listing [6-1](#457413_2_En_6_Chapter.xhtml#PC1) shows a typical layout file.


    ```

    /res/layout/activity_main.xml

    ```


    Listing 6-1: `/res/layout/activity_main.xml`


    A layout file generally has two parts: a declaration of a container and the declarations
    of each UI element inside. In Listing [6-1](#457413_2_En_6_Chapter.xhtml#PC1),
    the second line, which is also the root of the XML document, is the container’s
    declaration. The `TextView` element is declared as a child node of the container.
    This is how containers and UI elements are arranged in a layout file.'
