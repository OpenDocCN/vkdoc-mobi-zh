    The Android Runtime will smack you with a **NetworkonMainThreadException** if
    you try to run this on the UI thread. Any code that uses network connectivity
    can’t run in the UI thread.


    When you find yourself in a situation where you either need to (1) fetch or write
    data using the network, (2) fetch or write data using file I/O, or (3) perform
    a resource-intensive operation (like in Listing [11-2](#457413_2_En_11_Chapter.xhtml#PC3)),
    you need to run that code in a background thread. There are a couple of ways to
    do that; see the list that follows:


    *   **Java threads**, which are from Java


    *   **AsyncTask**, which is part of the Android framework


    *   **Handlers and Messages**, which are also part of the Android framework


    Whichever technique you use, the principle will remain the same; and that is


    1.  Spawn a background thread when executing long-running or resource-consuming
    tasks.


    2.  If you need to do something in the UI thread (like setting the property of
    a View) while inside a background thread, you have to find a way to go back to
    the UI thread before working on the View element.


    Of all the ways to run codes in the background, the Thread will be the most familiar
    with Java programmers, but it will also be the most rudimentary.


    ## Threads and Runnables


    We can run statements in the background by spawning new threads. Thread objects
    are created either by extending the **java.lang.Thread** class or by implementing
    the Runnable interface. A thread object describes a single thread of execution,
    and that execution happens inside the Thread class’ **run()** method.


    Extending the Thread class is the simplest way to create a thread object. Listing
    [11-4](#457413_2_En_11_Chapter.xhtml#PC5) shows the typical structure of a Thread
    class.


    ```

    class Worker extends Thread {

    public void run() {

    // things you want to run in

    // background

    }

    }

    Listing 11-4

    class Worker

    ```


    The Worker class simply extends **java.lang.Thread**. You need to override the
    **run()** method of the thread and put all the statements you want to run in the
    background inside it. After that, what’s left to do is to instantiate Worker and
    run it, as shown in Listing [11-5](#457413_2_En_11_Chapter.xhtml#PC6).


    | ❶ | Create an instance of the Thread class. |

    | ❷ | Invoke the **start()** method. If you forget this, the thread won’t run.
    Calling the **start()** method kickstarts the thread. |


    ```

    Worker worker = new Worker(); ❶

    worker.start(); ❷

    Listing 11-5

    How to create and run a thread

    ```


    Another way to create a thread is by implementing the Runnable interface, as shown
    in Listing [11-6](#457413_2_En_11_Chapter.xhtml#PC7).


    ```

    class Worker implements Runnable {

    @Override

    public void run() {

    // things you want to run in

    // background

    }

    }

    Listing 11-6

    The Worker class implements the Runnable interface

    ```


    As you can see, it’s not that different from our previous sample; instead of extending
    the Thread, we simply implemented the Runnable interface. You still need to override
    the **run()** method and put the statement you’d like to run in the background
    in the **run()** method. The difference won’t be in the Worker class structure,
    but in how the Worker class is instantiated and ran, which is shown in Listing
    [11-7](#457413_2_En_11_Chapter.xhtml#PC8).


    | ❶ | Create an instance of the Worker. |

    | ❷ | Create an instance of a Thread class by passing an instance of the Runnable
    class (the Worker instance) to the Thread’s constructor. |

    | ❸ | Now we can kickstart the thread by calling the **start()** method. |


    ```

    Worker worker = new Worker(); ❶

    Thread thread = new Thread(worker); ❷

    thread.start(); ❸

    Listing 11-7

    How to use a Runnable object

    ```


