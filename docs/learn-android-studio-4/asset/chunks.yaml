    final RNModel data;

    data = ViewModelProviders.of(this).get(RNModel.class);

    final TextView txtnumber = (TextView) findViewById(R.id.txtrandom);

    MutableLiveData mnumber = data.getNumber(); ❶

    Button btn = (Button) findViewById(R.id.button);  ❷

    btn.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View v) {

    data.createRandomNumber();

    data.getNumber();

    }

    });

    mnumber.observe(this, new Observer() { ❸

    @Override

    public void onChanged(String val) { ❹

    txtnumber.setText(val);

    }

    });

    }

    }

    Listing 16-10

    MainActivity

    ```


    Cool, right? If you’re still not sold on using LiveData, here are a couple of
    things to consider. When you use LiveData


    *   You’re sure the UI **always matches the data** state. You’ve already seen
    this from the example. LiveData follows the Observer pattern; it notifies the
    observer when its value changes.


    *   There are **no memory leaks**. Observers are bound to lifecycle objects. If,
    for example, our MainActivity enters the paused state (for whatever reason, maybe
    another Activity is on the foreground), the LiveData won’t be observed; if the
    MainActivity is destroyed, the LiveData again won’t be observed, and it will clean
    up after itself—which also means we won’t need to handle the lifecycles of MainActivity
    and the ViewModel manually.'
