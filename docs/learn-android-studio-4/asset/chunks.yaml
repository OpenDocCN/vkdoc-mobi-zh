    ## Room


    如果你希望为应用添加数据库功能，`Room` 值得考虑。在 `Room` 出现之前，构建数据库应用的主流方式有两种：使用 `Realm` 或直接用传统的 `SQLite`。处理
    `SQLite` 被认为是比较底层的操作，过于贴近硬件，因此使用起来有些繁琐。`Realm` 在开发者中相当流行，但无论多受欢迎，它毕竟不是官方第一方解决方案。值得庆幸的是，我们现在有了
    `Room`。


    `Room` 是在 `SQLite` 基础上的一层抽象；如果你曾使用过类似 `Hibernate` 这样的 ORM（对象关系映射），那么它与这是相似的。与直接使用原生
    `SQLite` 相比，`Room` 拥有多项优势；使用 `Room`：


    - 你无需为基本的数据库操作编写原始查询。

    - 它在编译时验证 SQL 查询，因此你无需担心 SQL 注入——还记得这些吗？

    - 数据库对象与 Java 对象之间不存在阻抗不匹配问题。`Room` 会处理这一切；你只需与 Java 对象打交道即可。


    `Room` 包含三个主要组件：`Entity`（实体）、`Dao`（数据访问对象）和 `Database`（数据库）组件。它们与应用之间的关系如图 16-4
    所示。


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig4_HTML.jpg](img/457413_2_En_16_Fig4_HTML.jpg)


    **图 16-4** Room 组件


    - **Entity**——`Entity` 用于表示数据库表。你将其编写为一个由 `@Entity` 注解修饰的类。

    - **Dao** 或数据访问对象是一个包含用于访问数据库中表的方法的类。这是你编写 CRUD（创建、读取、更新、删除）操作的地方。这是一个由 `@Dao`
    注解修饰的*接口*。

    - **Database**——此组件持有对数据库的引用。这是一个由 `@Database` 注解修饰的抽象类。


    在项目中使用 `Room` 之前，你需要向 `build.gradle` 文件（模块级别）添加其依赖项，如代码清单 16-11 所示。


    ```

    dependencies {

    def room_version = "2.1.0-alpha07"

    implementation "androidx.room:room-runtime:$room_version"

    annotationProcessor "androidx.room:room-compiler:$room_version"

    . . .

    }

    ```


    **代码清单 16-11** Room 依赖项


    代码清单 16-12、16-13、16-14 和 16-15 展示了四个演示 `Room` 基本用法的 Java 源文件。


    | ❶ | `@Entity` 注解使其成为一个 `Entity`。如果不传入 `tableName` 参数，表名将默认使用被修饰的类名。仅当你希望表名与修饰的类名不同时，才需要传入此参数。所以，我在这里写的内容是多余且冗余的，因为我将
    `tableName` 的值设置为“person”，这与被修饰的类名相同。 |

    | ❷ | 我们将 `uid` 成员变量设为主键；同时声明它不能为空。 |

    | ❸ | 类的成员变量将自动成为表中的字段。除非使用 `@ColumnInfo` 注解，否则表上的列名将沿用成员变量的名称。如果你希望表字段（列）的名称与成员变量名称不同，请像这里展示的那样使用
    `@ColumnInfo` 修饰，并将 `name` 设置为你偏好的列名。 |


    ```

    import androidx.annotation.NonNull;

    import androidx.room.Entity;

    import androidx.room.PrimaryKey;

    @Entity(tableName = "person") ❶

    public class Person {

    @PrimaryKey(autoGenerate = true) ❷

    @NonNull public int uid;

    @ColumnInfo(name="last_name") ❸

    public String last_name;

    public String first_name;

    public Person(String lname, String fname) {

    last_name = lname;

    first_name = fname;

    }

    public Person() {}

    }

    ```


    **代码清单 16-12** Person 类，实体


    | ❶ | DAO 需要通过 `@Dao` 修饰符进行注解。 |

    | ❷ | DAO 必须以接口形式编写。 |

    | ❸ | 使用 `@Insert` 修饰符来指示被修饰的方法将用于向表中插入记录。类似地，你将分别使用 `@Update`、`@Query` 和 `@Delete`
    来修饰用于更新、查询和删除的方法。 |

    | ❹ | 使用 `@Query` 来编写 SQL select 语句。每个 `@Query` 在编译时都会得到验证；如果查询有问题，会发生编译错误，而不是运行时错误。这应该能让你安心。
    |


    ```

    import java.util.List;

    import androidx.room.Dao;

    import androidx.room.Delete;

    import androidx.room.Insert;

    import androidx.room.Query;

    import androidx.room.Update;

    @Dao ❶

    interface PersonDAO { ❷

    @Insert  ❸

    void insertPerson(Person person);

    @Update

    void updatePerson(Person person);

    @Delete

    void deletePerson(Person person);

    @Query("SELECT * FROM person") ❹

    public List listPeople();

    }

    ```


    **代码清单 16-13** PersonDAO，数据访问对象


    | ❶ | 使用 `@Database` 来表示此类是数据库持有者。使用 `entities` 参数来指定数据库中的 Entities。如果有多个 Entity，请使用逗号分隔列表。第二个参数是
    `version`；这是一个整数值，用于指定你的数据库版本。 |

    | ❷ | Database 类是*抽象的*，并扩展了 `RoomDatabase`。 |

    | ❸ | 你需要提供一个抽象方法，该方法将返回一个 DAO 对象的实例。 |

    | ❹ | 你需要提供一个静态方法来获取 Database 的实例。它不必像我们这里所做的那样是单例，但我设想你不希望有多个 Database 类的实例。
    |

    | ❺ | 使用 `databaseBuilder()` 方法来创建 `RoomDatabase` 的实例。构建器方法有三个参数：(1) 应用上下文；(2)
    由 `@Database` 注解的抽象类；(3) 数据库文件的名称。这将是 `SQLite` 数据库的文件名。 |


    ```

    import android.content.Context;

    import androidx.room.Database;

    import androidx.room.Room;

    import androidx.room.RoomDatabase;

    @Database(entities = {Person.class}, version = 1) ❶

    public abstract class AppDatabase extends RoomDatabase { ❷

    private static AppDatabase minstance;

    private static final String DB_NAME = "person_db";

    public abstract PersonDAO getPersonDAO(); ❸

    public static synchronized AppDatabase getInstance(Context ctx) { ❹

    if(minstance == null) {

    minstance = Room.databaseBuilder(ctx.getApplicationContext(), ❺

    AppDatabase.class,

    DB_NAME)

    .fallbackToDestructiveMigration()

    .build();

    }

    return minstance;

    }

    }

    ```


    **代码清单 16-14** AppDatabase，数据库持有者


    现在，我们所有的 `Room` 组件都已就位，我们可以从应用中使用它们了。代码清单 16-15 展示了如何从 `Activity` 中使用 `Room` 组件。


    | ❶ | 要开始使用 `RoomDatabase`，请使用我们之前在 `AppDatabase` 中编写的工厂方法获取一个实例。 |

    | ❷ | 让我们从 `TextViews` 中收集数据。 |

    | ❸ | `Room` 遵循最佳实践，因此它不允许你在主 UI 线程上运行任何数据库查询。你需要创建一个后台线程，并在其中运行所有 `Room` 命令。这里，我使用了快速且粗糙的
    `Thread` 和 `Runnable` 对象，但你也可以使用任何其他后台执行方式，例如 `AsyncTask`。 |

    | ❹ | 使用来自 `TextViews` 的输入创建一个 `Person` 对象。 |

    | ❺ | 让我们获取 DAO 的一个实例。 |

    | ❻ | 使用我们之前在 DAO 中编写的 `insertPerson()` 方法执行一次*插入*操作。 |

    | ❼ | 让我们执行一个 *SELECT*。 |

    | ❽ | 并列出我们 `person` 表中的所有条目。 |

