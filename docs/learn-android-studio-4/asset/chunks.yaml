- fmt: '# Configuring Android Studio


    Let’s configure a couple of things first before we go to coding. Let’s do the
    following:


    1. Get some more software that we need so we can build programs that target specific
    versions of Android.

    2. Make sure we have all the tools we need.

    3. (optionally) change the way we get updates.


    Launch Android Studio and click “Configure” (as shown in Figure [2-1](#457413_2_En_2_Chapter.xhtml#Fig1)),
    then choose “Preferences” from the drop-down list.


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig1_HTML.jpg](images/457413_2_En_2_Chapter/457413_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Go to “Preferences” from Android Studio’s opening dialog


    The “Preferences” option opens the *Preferences* dialog. On the left-hand side,
    go to **Appearance & Behavior** ➤ **System Settings** ➤ **Android SDK**, as shown
    in Figure [2-2](#457413_2_En_2_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig2_HTML.jpg](images/457413_2_En_2_Chapter/457413_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    SDK Platforms


    When you get to the SDK window, enable the "Show Package Details" option so you
    can see a more detailed view of each API level. We don’t need to download everything
    in the SDK window. We will get only the items we need.


    SDK levels or platform numbers are specific versions of Android. Android 10 is
    API level 29, Android 9 or “Pie” is API level 28, Android 8 or “Oreo” is API levels
    26 and 27, and Nougat is API levels 24 and 25. You don’t need to memorize the
    platform numbers, at least not anymore because the IDE shows the platform number
    with the corresponding Android nickname.


    Download the API levels you want to target for your applications, but for the
    purpose of this book, please download API level 29 (Android 10). That’s what we
    will use for the sample projects. Make sure that together with the platforms,
    you will also download "Google APIs Intel x86 Atom_64 System Image." We will need
    those when we get to the part where we test run our applications.


    Choosing an API level may not be a big deal right now because at this point, we’re
    simply working with practice apps. When you plan to release your application to
    the public, you may not be able to take this choice lightly. Choosing a minimum
    SDK or API level for your app will determine how many people will be able to use
    your application. At the time of writing, 17% of all Android devices are using
    “Marshmallow,” 19% for “Nougat,” 29% for “Oreo,” and only 10% for “Pie”; the stats
    for Android 10 were not out yet. These stats are from the dashboard page of the
    official Android website. It’s a good idea to check these statistics from time
    to time; you can find it here: [`http://bit.ly/droiddashboard`](http://bit.ly/droiddashboard).


    We go next to the “SDK Tools” section, as shown in Figure [2-3](#457413_2_En_2_Chapter.xhtml#Fig3).


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig3_HTML.jpg](images/457413_2_En_2_Chapter/457413_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    SDK Tools


    You don’t generally have to change anything on this window, but it wouldn’t hurt
    to check if you have the tools, as shown in the following list, marked as “Installed”:


    * Android SDK Build Tools

    * Android SDK Platform Tools

    * Android SDK Tools

    * Android Emulator

    * Support Repository

    * HAXM Installer


    Note


    If you are on the Linux platform, you cannot use HAXM even if you have an Intel
    processor. KVM will be used in Linux instead of HAXM.


    Once you’re happy with your selection, click the “OK” button to start downloading
    the packages.


    ## Hardware Acceleration


    As you create applications, it will be useful to test and run it sometimes in
    order to get immediate feedback and find out if it is running as expected or if
    it is running at all. To do this, you will use either a physical or a virtual
    device. Each option has its pros and cons, and you don’t have to choose one over
    the other; in fact, you will have to use both options eventually.


    An Android Virtual Device or AVD is an emulator where you can run your apps. Running
    on an emulator can sometimes be slow; this is the reason why Google and Intel
    came up with HAXM. It is an emulator acceleration tool that makes testing your
    app a bit more bearable. This is definitely a boon to developers. That is if you
    are using a machine that has an Intel processor which supports virtualization
    and that you are not on Linux. But don’t worry if you’re not lucky enough to fall
    on that part of the pie, there are ways to achieve emulator acceleration in Linux,
    as we’ll see later.


    macOS users probably have it the easiest because HAXM is automatically installed
    with Android Studio. They don’t have to do anything to get it; the installer took
    care of that for them.


    Windows users can get HAXM either by


    * Downloading it from [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android).
    Install it like you would any other Windows software, double-click, and follow
    the prompts.

    * Alternatively, you can get HAXM via the SDK manager; this is the recommended
    method.


    For Linux users, the recommended software is KVM instead. KVM (Kernel-based Virtual
    Machine) is a virtualization solution for Linux. It contains virtualization extensions
    (Intel VT or AMD-V).


    To get KVM, we need to pull some software from the repos; but even before you
    can do that, you need to do the following first:


    1. Make sure that virtualization is enabled on your BIOS or UEFI settings. Consult
    your hardware manual on how to get to these settings. It usually involves shutting
    down the PC, restarting it, and pressing an interrupt key like `F2` or `DEL` as
    soon as you hear the chime of your system speaker, but like I said, consult your
    hardware manual.


    2. Once you made your changes, and rebooted to Linux, find out if your system
    can run virtualization. This can be accomplished by running the following command
    from a terminal: `egrep –c ''(vmx|svm)'' /proc/cpuinfo`. If the result is a number
    higher than zero, that means you can go ahead with the installation.


    To install KVM, type the commands, as shown in Listing [2-1](#457413_2_En_2_Chapter.xhtml#PC2),
    on a terminal window.


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    Listing 2-1

    Commands to install KVM

    ```


    You may have to reboot the system to complete the installation.


    Hopefully, everything went well, and you now have a proper development environment.
    In the next chapter, we will familiarize ourselves with the various parts of Android
    Studio IDE.


    ## Summary


    * Android Studio is based on the community edition of IntelliJ. If you have used
    IntelliJ before, all the techniques and keyboard shortcuts you’ve learned can
    be used in Android Studio.

    * You can use different versions of Android Studio side by side; you don’t have
    to uninstall previous editions of Android Studio in order to try out the Preview
    edition.

    * Install the hardware accelerator (HAXM) if you can; it will make your testing
    activities a lot more pleasant. If you’re on Linux, use the Kernel-based Virtual
    Machine (KVM) instead of HAXM.


    # 3. Project Basics


    *What the chapter covers:*


    * Create a simple project in Android Studio

    * Create an emulator (an AVD or Android Virtual Device)

    * Run a test project in the emulator


    You can build many things in Android Studio, a business app, an ebook, a casual
    game (even triple AAA titles, why not?), and so on, but before you can do all
    that, you need to know the basics of creating, building, and testing an app in
    Android Studio. This chapter is all about that.'
