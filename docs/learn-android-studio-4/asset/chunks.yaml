- fmt: '### JVM Test vs. Instrumented Test


    If you look at any Android application, you’ll see that it has two parts: a Java-based
    and an Android-based one.


    The Java part is where we code business logic, calculations, and data transformations.
    The Android part is where we interact with the Android platform. This is where
    we get input from users or show results to them. It makes perfect sense to test
    the Java-based behavior separate from the Android part because it’s much quicker
    to execute. Fortunately, this is already the way it’s done in Android Studio.
    When you create a project, Android Studio creates two separate folders, one for
    the JVM tests and another for the instrumented tests. Figure [13-1](#457413_2_En_13_Chapter.xhtml#Fig1)
    shows the two test folders in the Android view, and Figure [13-2](#457413_2_En_13_Chapter.xhtml#Fig2)
    shows the same two folders in the Project view.


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig2_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig2_HTML.jpg)


    Figure 13-2


    JVM test and instrumented test in Project view


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig1_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig1_HTML.jpg)


    Figure 13-1


    JVM test and instrumented test in Android view


    As you can see from either Figure [13-1](#457413_2_En_13_Chapter.xhtml#Fig1) or
    [13-2](#457413_2_En_13_Chapter.xhtml#Fig2), Android Studio went the extra mile
    to generate sample test files for both the JVM and instrumented tests. The example
    files are there to serve as just quick references; it shows us what unit tests
    might look like.


    ### A Simple Demo


    To dive into this, create a project with an empty Activity. Add a Java class to
    the project and name the class `Factorial.java`; edit this class to match Listing
    [13-1](#457413_2_En_13_Chapter.xhtml#PC1).


    ```java

    public class Factorial {

    public static double factorial(int arg) {

    if (arg == 0) {

    return 1.0;

    }

    else {

    return arg + factorial(arg - 1);

    }

    }

    }

    Listing 13-1

    Factorial.java

    ```


    Ensure that `Factorial.java` is open in the main editor, as shown in Figure [13-3](#457413_2_En_13_Chapter.xhtml#Fig3);
    then, from the main menu bar, go to **Navigate** ➤ **Test**. Similarly, you can
    also create a test using the keyboard shortcut (**Shift + Command + T** for macOS
    and **Ctrl + Shift + T** for Linux and Windows).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig3_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Create a test for `Factorial.java`


    Right after you click **Test**, a pop-up dialog (Figure [13-4](#457413_2_En_13_Chapter.xhtml#Fig4))
    will prompt you to click another link—click **Create New Test**, as shown in Figure
    [13-4](#457413_2_En_13_Chapter.xhtml#Fig4).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig4_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Create New Test pop-up


    Right after creating a new test, you’ll see another pop-up dialog.


    In the window that follows (shown in Figure [13-5](#457413_2_En_13_Chapter.xhtml#Fig5)),
    create the new test.


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig5_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Create `FactorialTest`


    | ❶ | You can choose which testing library you want to use. You can choose JUnit
    3, 4, or 5. You can even choose Groovy JUnit, Spock, or TestNG. I used JUnit4
    because it comes installed with Android Studio. |

    | ❷ | The convention for naming a test class is “name of the class to test” +
    “Test.” Android Studio populates this field using that convention. |

    | ❸ | Leave this blank; we don’t need to inherit from anything. |

    | ❹ | We don’t need `setUp()` and `tearDown()` routines, for now, leaving them
    unchecked. |

    | ❺ | Let’s check the `factorial()` method because we want to generate a test
    for this. |


    When you click the **OK** button, Android Studio will ask where you want to save
    the test file. This is a JVM test, so we want to keep it in the “test” folder
    (not in `androidTest`). See Figure [13-6](#457413_2_En_13_Chapter.xhtml#Fig6).
    Click “OK.”


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig6_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Choose Destination Directory


    Android Studio will now create the test file for us. If you open `FactorialTest.java`,
    you’ll see the generated skeleton code— shown in Figure [13-7](#457413_2_En_13_Chapter.xhtml#Fig7).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig7_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig7_HTML.jpg)


    Figure 13-7


    `FactorialTest.java` in Project view and main editor


    | ❶ | The file `Factorial.java` was created under the `test` folder. |

    | ❷ | A `factorial()` method was created, and it’s annotated as `@Test`. This
    is how JUnit will know that this method is a unit test. You can prepend your method
    names with “test,” for example, `testFactorial()`, but that is not necessary;
    the `@Test` annotation is enough. |

    | ❸ | This is where we put our assertions. |


    See how simple that was? Creating a test case in Android Studio doesn’t involve
    that much in terms of setup and configuration. All we need to do now is write
    our test.'
