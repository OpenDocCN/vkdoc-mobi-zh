    If your Google account isn’t logged on to Chrome, you might see something like
    Figure [17-6](#457413_2_En_17_Chapter.xhtml#Fig6). Chrome will ask you to select
    an account (or create one).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig6_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig6_HTML.jpg)


