- fmt: '# Attributes Panel


    ## Collapsed State


    To inspect the View object properties in the Attributes panel, select the View
    object on the Design editor, and then open the Attributes panel. Figure [6-12](#457413_2_En_6_Chapter.xhtml#Fig12)
    shows the properties of the constraint of the TextView object. Make changes to
    constraint properties of both the Button and the TextView object as you see fit.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig12_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig12_HTML.jpg)


    *Figure 6-12*


    ## Open State


    The Attributes window contains all the properties for the selected View object,
    but it doesn’t show all of them by default. It shows only the properties we commonly
    use. To view all the properties, scroll further down on the Attributes panel to
    see the “All Attributes” button, as shown in Figure [6-13](#457413_2_En_6_Chapter.xhtml#Fig13).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig13_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig13_HTML.jpg)


    *Figure 6-13 — All attributes*


    Now that we can move around in the Design editor, we can make some changes. Try
    to do the following:


    1. Change the `id` property of the TextView object from `textView` to `textHello`.

    2. Change the `textSize` property of the TextView object to `36sp`.


    The View object’s `id` property is very important because we’ll refer to it later
    in our code (in the Activity class).


    We will also change the Button’s `onClick` property. Select the Button object,
    then find its `onClick` property, and then turn the value to `addNumber`, as shown
    in Figure [6-14](#457413_2_En_6_Chapter.xhtml#Fig14).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig14_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig14_HTML.jpg)


    *Figure 6-14 — onClick property*


    Setting the Button’s `onClick` property to `addNumber` associates the Button’s
    click event to a method called `addNumber()` in the Activity class. Of course,
    this method doesn’t exist yet; that’s why we need to implement it next. Open `MainActivity.java`
    and make the changes as shown in Listing [6-4](#457413_2_En_6_Chapter.xhtml#PC4).


    ```java

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.TextView;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    ((TextView) findViewById(R.id.textHello)).setText("1"); ❶

    }

    public void addNumber(View v) { ❷

    TextView tv = ((TextView) findViewById(R.id.textHello)); ❸

    int currVal = Integer.parseInt(tv.getText().toString()); ❹

    tv.setText((++currVal) + ""); ➀

    }

    }

    ```


    *Listing 6-4 — MainActivity.java*


    - ❶ This code sets the TextView’s text value to “1”. First, we get a reference
    to the TextView using its `id`. All View objects can be referenced at runtime
    using the `R.class`, so `R.id.textHello` refers to the instance of the TextView
    object at runtime. Next, we cast it to a `TextView` object; then, we call the
    `setText()` method.

    - ❷ This is the implementation of the `addNumber()` method; it takes a View object
    as a parameter. When this method is called, the Android Runtime will pass the
    instance of the Button object as an argument to this method.

    - ❸ This code gets the programmatic reference to the TextView object, the same
    idea as in ❶, but this time, we assign the object reference to a variable.

    - ❹ `tv.getText()` gets the current value of TextView. This call returns a `CharSequence`;
    that’s why I needed to call the `toString()` method on it to make it workable
    for our purpose. The `Integer.parseInt()` method converts an alphanumeric digit
    to an `integer`.

    - ➀ The `setText()` method sets the value of the TextView. The `++currVal + ""`
    expression increments the current value of the `currVal` variable and then converts
    it to a String object; adding an empty String literal to any primitive data type
    effectively converts it to a String.


    When you’re done with the edits, run the application on an emulator. Figure [6-15](#457413_2_En_6_Chapter.xhtml#Fig15)
    shows the project running on an emulator.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig15_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig15_HTML.jpg)


    *Figure 6-15 — ActivitySample on the emulator*


    ## Summary


    - A layout file describes the UI structure in an XML file. You can work with the
    layout file either in design mode (WYSIWYG) or raw XML mode.

    - Each View element in a layout file is described as an XML node, but the XML
    file is inflated during runtime. The inflation process produces the object representations
    of the UI elements.

    - You can reference UI elements programmatically using the `R.class`.

    - Composite views can be constructed by inheriting from the `ViewGroup` class.

    - Layout managers provide ways to arrange UI elements on a screen. The Android
    SDK has plenty of prebuilt managers we can use out of the box.


    # 7. Event Handling


    *What we’ll cover:*


    - Listener objects

    - Anonymous inner classes


    In the previous chapter, we already did some event handling. The part of the exercise
    where we incremented the TextView’s value for each button click was an exercise
    on *declarative event handling*. To bind a method name to a click event, we simply
    set a View’s `android:onClick` attribute to the name of a method in the associated
    Activity class. This is a low-ceremony and straightforward way to handle events
    but is limited to the “click” event. When you need to handle events like long
    clicks or gestures, you need to use event listeners—this is the topic of this
    chapter.'
