    order to get immediate feedback and find out if it is running as expected or if
    it is running at all. To do this, you will use either a physical or a virtual
    device. Each option has its pros and cons, and you don’t have to choose one over
    the other; in fact, you will have to use both options eventually.


    An Android Virtual Device or AVD is an emulator where you can run your apps. Running
    on an emulator can sometimes be slow; this is the reason why Google and Intel
    came up with HAXM. It is an emulator acceleration tool that makes testing your
    app a bit more bearable. This is definitely a boon to developers. That is if you
    are using a machine that has an Intel processor which supports virtualization
    and that you are not on Linux. But don’t worry if you’re not lucky enough to fall
    on that part of the pie, there are ways to achieve emulator acceleration in Linux,
    as we’ll see later.


    macOS users probably have it the easiest because HAXM is automatically installed
    with Android Studio. They don’t have to do anything to get it; the installer took
    care of that for them.


    Windows users can get HAXM either by


    *   Downloading it from [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android).
    Install it like you would any other Windows software, double-click, and follow
    the prompts.


    *   Alternatively, you can get HAXM via the SDK manager; this is the recommended
    method.


    For Linux users, the recommended software is KVM instead. KVM (Kernel-based Virtual
    Machine) is a virtualization solution for Linux. It contains virtualization extensions
    (Intel VT or AMD-V).


    To get KVM, we need to pull some software from the repos; but even before you
    can do that, you need to do the following first:


    1.  Make sure that virtualization is enabled on your BIOS or UEFI settings. Consult
    your hardware manual on how to get to these settings. It usually involves shutting
    down the PC, restarting it, and pressing an interrupt key like F2 or DEL as soon
    as you hear the chime of your system speaker, but like I said, consult your hardware
    manual.


    2.  Once you made your changes, and rebooted to Linux, find out if your system
    can run virtualization. This can be accomplished by running the following command
    from a terminal: `egrep –c ''(vmx|svm)'' /proc/cpuinfo`. If the result is a number
    higher than zero, that means you can go ahead with the installation.


    To install KVM, type the commands, as shown in Listing [2-1](#457413_2_En_2_Chapter.xhtml#PC2),
    on a terminal window.


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    Listing 2-1

    Commands to install KVM

    ```


    You may have to reboot the system to complete the installation.


    Hopefully, everything went well, and you now have a proper development environment.
    In the next chapter, we will familiarize ourselves with the various parts of Android
    Studio IDE.


    ## Summary


    *   Android Studio is based on the community edition of IntelliJ. If you have
    used IntelliJ before, all the techniques and keyboard shortcuts you’ve learned
    can be used in Android Studio.


    *   You can use different versions of Android Studio side by side; you don’t have
    to uninstall previous editions of Android Studio in order to try out the Preview
    edition.


    *   Install the hardware accelerator (HAXM) if you can; it will make your testing
    activities a lot more pleasant. If you’re on Linux, use the Kernel-based Virtual
    Machine (KVM) instead of HAXM.


    # 3. Project Basics


    *What the chapter covers:*


    *   Create a simple project in Android Studio


    *   Create an emulator (an AVD or Android Virtual Device)


    *   Run a test project in the emulator


    You can build many things in Android Studio, a business app, an ebook, a casual
    game (even triple AAA titles, why not?), and so on, but before you can do all
    that, you need to know the basics of creating, building, and testing an app in
    Android Studio. This chapter is all about that.'
  trans: '

    # 配置 Android Studio


    在开始编码之前，我们先配置一些东西。让我们执行以下操作：


    1.  获取一些我们需要的额外软件，以便构建针对特定 Android 版本的应用程序。

    2.  确保我们拥有所有需要的工具。

    3.  （可选）更改获取更新的方式。


    启动 Android Studio 并点击“Configure”（配置）（如图 2-1 所示），然后从下拉列表中选择“Preferences”（偏好设置）。


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig1_HTML.jpg](img/457413_2_En_2_Fig1_HTML.jpg)


    图 2-1


    从 Android Studio 的启动对话框进入“Preferences”（偏好设置）


    选择“Preferences”（偏好设置）后会打开 *Preferences*（偏好设置）对话框。在左侧，导航到 **Appearance & Behavior**（外观与行为）➤
    **System Settings**（系统设置）➤ **Android SDK**，如图 2-2 所示。


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig2_HTML.jpg](img/457413_2_En_2_Fig2_HTML.jpg)


    图 2-2


    SDK 平台


    当您进入 SDK 窗口时，启用“Show Package Details”（显示包详细信息）选项，以便查看每个 API 级别的更详细视图。我们不需要下载 SDK
    窗口中的所有内容。我们只获取需要的项目。


    SDK 级别或平台编号是 Android 的特定版本。Android 10 是 API 级别 29，Android 9（或“Pie”）是 API 级别 28，Android
    8（或“Oreo”）是 API 级别 26 和 27，Nougat 是 API 级别 24 和 25。您不需要记住平台编号，至少现在不需要，因为 IDE 会显示平台编号以及相应的
    Android 昵称。


    下载您希望应用程序针对的 API 级别，但就本书而言，请下载 API 级别 29（Android 10）。这是我们将用于示例项目的 API 级别。确保在下载平台的同时，也下载“Google
    APIs Intel x86 Atom_64 System Image”。当我们进行到测试运行应用程序的部分时，会用到它们。


    现在选择 API 级别可能不是什么大事，因为此时我们只是处理练习应用。当您计划向公众发布应用程序时，就不能轻视这个选择了。为您的应用选择最低 SDK 或 API
    级别将决定有多少人能使用您的应用。在撰写本文时，所有 Android 设备中有 17% 在使用“Marshmallow”，19% 使用“Nougat”，29%
    使用“Oreo”，只有 10% 使用“Pie”；Android 10 的统计数据尚未公布。这些统计数据来自官方 Android 网站的仪表板页面。时不时地查看这些统计数据是个好主意；您可以在这里找到：[`http://bit.ly/droiddashboard`](http://bit.ly/droiddashboard)。


    接下来我们转到“SDK Tools”（SDK 工具）部分，如图 2-3 所示。


    ![../images/457413_2_En_2_Chapter/457413_2_En_2_Fig3_HTML.jpg](img/457413_2_En_2_Fig3_HTML.jpg)


    图 2-3


    SDK 工具


    通常您不需要更改此窗口上的任何内容，但检查一下是否有如下列表中标记为“Installed”（已安装）的工具也无妨：


    * Android SDK Build Tools

    * Android SDK Platform Tools

    * Android SDK Tools

    * Android Emulator

    * Support Repository

    * HAXM Installer


    注意


    如果您使用的是 Linux 平台，即使有 Intel 处理器也无法使用 HAXM。在 Linux 中将使用 KVM 代替 HAXM。


    一旦对选择满意，点击“OK”（确定）按钮开始下载这些包。


    ## 硬件加速


    在创建应用程序时，有时为了获得即时反馈并检查其是否按预期运行或是否能够运行，进行测试和运行会很有用。为此，您将使用物理设备或虚拟设备。每种选择都有其优缺点，您不必只选其一；事实上，最终您将需要使用这两种选择。


    Android 虚拟设备（AVD）是一个可以运行应用的模拟器。在模拟器上运行有时可能会很慢；这就是 Google 和 Intel 推出 HAXM 的原因。它是一个模拟器加速工具，能让测试应用的过程稍微好受一些。这对开发者来说绝对是个福音。前提是您使用的机器拥有支持虚拟化的
    Intel 处理器，并且您不在 Linux 上。但如果您不幸不属于这部分用户，也别担心，在 Linux 中也有办法实现模拟器加速，我们稍后会看到。


    macOS 用户可能最轻松，因为 HAXM 会随 Android Studio 自动安装。他们无需做任何事即可获得它；安装程序已经为他们处理好了。


    Windows 用户可以通过以下方式获取 HAXM：


    * 从 [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android)
    下载。像安装其他 Windows 软件一样安装它，双击并按照提示操作。

    * 或者，您可以通过 SDK 管理器获取 HAXM；这是推荐的方法。


    对于 Linux 用户，推荐的软件是 KVM。KVM（基于内核的虚拟机）是 Linux 的虚拟化解决方案。它包含虚拟化扩展（Intel VT 或 AMD-V）。


    要获取 KVM，我们需要从软件仓库中获取一些软件；但在此之前，您需要先执行以下操作：


    1.  确保在 BIOS 或 UEFI 设置中启用了虚拟化。请查阅您的硬件手册以了解如何进入这些设置。这通常涉及关闭电脑、重新启动，并在听到系统扬声器提示音时立即按下中断键，如
    `F2` 或 `DEL`，但正如我所说，请查阅您的硬件手册。


    2.  完成更改并重新启动到 Linux 后，确定您的系统是否可以运行虚拟化。这可以通过在终端中运行以下命令来完成：`egrep –c ''(vmx|svm)''
    /proc/cpuinfo`。如果结果是一个大于零的数字，则表示您可以继续进行安装。


    要安装 KVM，请在终端窗口中输入代码清单 2-1 中所示的命令。


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    代码清单 2-1

    安装 KVM 的命令

    ```


    您可能需要重新启动系统以完成安装。


    希望一切顺利，您现在拥有了合适的开发环境。在下一章中，我们将熟悉 Android Studio IDE 的各个部分。


    ## 总结


    * Android Studio 基于 IntelliJ 社区版开发。如果您以前使用过 IntelliJ，您学过的所有技巧和键盘快捷键都可以在 Android
    Studio 中使用。

    * 您可以同时使用不同版本的 Android Studio；您无需卸载旧版本的 Android Studio 即可试用预览版。

    * 如果可以，请安装硬件加速器（HAXM）；它将使您的测试活动更加愉快。如果您使用 Linux，请使用基于内核的虚拟机（KVM）代替 HAXM。


    # 3. 项目基础


    *本章内容涵盖：*


    * 在 Android Studio 中创建一个简单项目

    * 创建一个模拟器（一个 AVD 或 Android 虚拟设备）

    * 在模拟器中运行一个测试项目


    您可以在 Android Studio 中构建许多东西：商业应用、电子书、休闲游戏（甚至 AAA 级大作，为什么不呢？），等等。但在您能做所有这些之前，您需要了解在
    Android Studio 中创建、构建和测试应用的基础知识。本章正是关于这些内容的。

    '
- fmt: '# Create a Project


    Launch Android Studio. Click “Start a new Android Studio Project,” as shown in
    Figure 3-1. You have to be online when you do this because Android Studio’s Gradle
    (a project build tool) pulls quite a few files from online repositories when you
    start a new project.


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig1_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Opening screen


    During the creation process, Android prompts for what kind of project you want
    to build; choose **Phone and Tablet** ➤ **Empty Activity**, as shown in Figure
    3-2—we’ll discuss Activities in the coming chapters, but for now, think of an
    Activity as a screen or a form; it’s something that the user sees and interacts
    with.


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig2_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Create a new project; choose an Activity type


    In the next screen, we get to configure the project. We set the app’s name, package
    name (domain), and the target Android version. Figure 3-3 shows the annotated
    picture of the “Create New Project” screen.


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig3_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Configure your project


    | ❶ | **Name**. This is also known as the project name; this also becomes the
    name of the top-level folder, which will contain all of the project’s files. This
    name also becomes part of the application’s identity, should you release it in
    the Play Store. |

    | ❷ | **Package name**. This is your organization or company’s domain name in
    reverse DNS notation. If you don’t have a company name, you can use anything that
    resembles a web domain. At the moment, it won’t matter if we use a real company
    name or not, since we won’t release this to the Play Store. |

    | ❸ | **Save location**. This is a location in your local directory where the
    project files will be kept. |

    | ❹ | **Language**. You can use either Kotlin or Java; for this project, we will
    use Java. |

    | ❺ | **Minimum API level**. The min API level will determine the lowest version
    of Android, which your application can run on. You need to choose wisely and prudently
    because it can severely limit the potential audience for your app. |

    | ❻ | **Help me choose**. This shows the percentage of Android devices that your
    app can run on. If you click the “Help me choose” link, it will open a window
    that shows the distribution of Android devices, per Android version. |

    | ❼ | **Legacy Android support libraries**. These are support libraries. They’re
    included so that you can use modern Android libraries (like the ones included
    in Android 9) but still allow your app to be run on devices with lower Android
    versions. |


    When you’re all done, click “Finish” to begin the project creation. Android Studio
    scaffolds the project and creates startup files like the main Activity file, Android
    manifest, and other files to get the project propped up. The build tool (Gradle)
    will pull quite a few files from online repos; it can take some time.


    After all that, hopefully, the project is created, and you get to see Android
    Studio’s main editor window, as shown in Figure 3-4.


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig4_HTML.jpg](images/457413_2_En_3_Chapter/457413_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Main editor window


    Android Studio’s screen is composed of several sections that can collapse and
    expand, depending on your needs. The section on the left (Figure 3-4) is the Project
    panel. It’s a tree-like structure that shows all the (relevant) files in the project.
    If you want to edit a particular file, simply select it in the Project panel and
    double-click; at that point, it will be opened for editing in the main editor
    window. In Figure 3-4, you can see the `MainActivity.java` file available for
    editing. Over time, we will spend a lot of hours doodling in the main editor window,
    but for now, we simply want to go through the basic process of application development.
    We won’t add or modify anything in the Java files or any other files in the project.
    We’ll leave them as is.'
