    *For Adrianne and Stephanie.*


    Introduction


    Welcome to *Learn Android Studio 4*. This book will help you get started in your
    programming journey with the little green robot. You already bought the book (many
    thanks to you), so you don’t need to be convinced that programming for the mobile
    platform offers many opportunities for software developers.


    The book is aimed at beginning Android programmers but not wholly new to programming.
    The book assumes that you have prior programming experience with any of the CFOL
    (C family of languages, e.g., C, C++, Java, C#, JavaScript). Ideally, you are
    already a Java programmer trying to get your feet wet in Android; if you’re not,
    don’t worry. Basic Java programming is covered in the Appendix, and you can refer
    to that as you try to feel your way into the language.


    The book covers two fronts: the fundamentals of Android programming and the use
    of Android Studio 4\. Android programming concepts and the use of the IDE are
    explained using a combination of graphics and code walk-throughs: there’s plenty
    of those in the book.


    ## Chapter Overview


    **Chapter** [**1**](#457413_2_En_1_Chapter.xhtml) **: Android Overview**—This
    chapter introduces Android. It deals with a bit of Android’s history and the technical
    makeup of its OS.


    **Chapter** [**2**](#457413_2_En_2_Chapter.xhtml) **: Android Studio**—If you
    haven’t set up your Android environment yet, don’t skip this chapter; it walks
    you through the setup of Android Studio, whether you’re on macOS, Windows, or
    Linux. It also introduces the essential parts of the IDE.


    **Chapter** [**3**](#457413_2_En_3_Chapter.xhtml) **: Project Basics**—This chapter
    introduces the concept and mechanics of an Android project. It walks through creating
    a project and running a project in an AVD (Android Virtual Device).


    **Chapter** [**4**](#457413_2_En_4_Chapter.xhtml) **: Android Studio IDE**—Android
    Studio is a full-fledged IDE; it has lots of features and parts. This chapter
    introduces you to the most common tools and windows of Android Studio.


    **Chapter** [**5**](#457413_2_En_5_Chapter.xhtml) **: Android Application Overview**—What
    makes up an Android project? What are components? What are Intents? These are
    some of the questions this chapter addresses. You’ll discover how different an
    Android app is from a desktop app.


    **Chapter** [**6**](#457413_2_En_6_Chapter.xhtml) **: Activities and Layouts**—We
    get into the basics of UI building. Activities are the primary means by which
    the user sees your app. We get to learn how to build these and other UI elements
    that are in common use.


    **Chapter** [**7**](#457413_2_En_7_Chapter.xhtml) **: Event Handling**—Handling
    user actions is a very common task in Android programming. This chapter walks
    you through the basics of listener objects, how to create them, and how to bind
    them to View elements (like Buttons).


    **Chapter** [**8**](#457413_2_En_8_Chapter.xhtml) **: Intents**—Intents are uniquely
    Android’s. See how this message-passing mechanism works in Android and how it
    glues all the other Android components.


    **Chapter** [**9**](#457413_2_En_9_Chapter.xhtml) **: Fragments**—Fragments are
    a granular way to compose a screen. This chapter walks through the fundamental
    concepts of Fragments.


    **Chapter** [**10**](#457413_2_En_10_Chapter.xhtml) **: Navigation**—Navigation
    components are quite new. They are a part of Jetpack. This chapter introduces
    you to the more modern ways on how to build multiscreen apps.


    **Chapter** [**11**](#457413_2_En_11_Chapter.xhtml) **: Running in the Background**—When
    you start building nontrivial apps, you will need to read or write from I/O sources,
    fetch data from the network, and so on. These activities take time, and they need
    to be run in the background. This chapter is all about that.


    **Chapter** [**12**](#457413_2_En_12_Chapter.xhtml) **: Debugging**—You will often
    make coding mistakes. This chapter introduces you to the types of errors you may
    encounter and how to use Android Studio’s debugging features to solve them.


    **Chapter** [**13**](#457413_2_En_13_Chapter.xhtml) **: Testing**—At some point,
    you have to test your code before you release them. This chapter introduces you
    to the many kinds of testing you can do to an app. More importantly, it introduces
    you to unit testing and Espresso testing.


    **Chapter** [**14**](#457413_2_En_14_Chapter.xhtml) **: Working with Files**—You’ll
    need to save to a text file or read from it; this chapter walks through the basics
    of file input and output in Android.


    **Chapter** [**15**](#457413_2_En_15_Chapter.xhtml) **: BroadcastReceivers**—One
    of Android’s foundational components is the BroadcastReceiver; this component
    lets you build decoupled apps by adopting the publish-subscribe pattern.


    **Chapter** [**16**](#457413_2_En_16_Chapter.xhtml) **: Jetpack, LiveData, ViewModel,
    and Room**—More goodies from Architecture components. This chapter walks through
    the basics of how to build components that have lifecycle awareness of other components
    and how to use Room.


    **Chapter** [**17**](#457413_2_En_17_Chapter.xhtml) **: Distributing Apps**—When
    you’re ready to distribute your app, you’ll need to sign it and list it in a marketplace
    like Google Play. This chapter walks you through the steps on how to do it.


    **Chapter** [**18**](#457413_2_En_18_Chapter.xhtml) **: Short Takes**—More Android
    Studio goodness.


    **Appendix**—The Appendix breezes through the Java language. It deals with some
    of the basic language concepts you will need to get started in Android programming.


    Acknowledgments


    To Stephanie and Adrianne, my thanks and my love.


    To Mark Powers and Steve Anglin, and to all who made this book possible. Many,
    many thanks.


