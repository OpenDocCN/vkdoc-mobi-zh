    \ in your app, just build what you need; but it’s worth our while to learn about\
    \ all of the components (some more than others), especially the basic ones like\
    \ Activities and Intents.\n\nNote\n\nAPK is short for Application Package Kit.\
    \ It’s the package file format that Android uses to distribute and install applications.\
    \ If Windows apps are packaged either via EXE or MSI and macOS apps use DMG, Android\
    \ uses APK.\n\nActivities, Services, BroadcastReceivers, and ContentProviders\
    \ are called *Android components*. They are the key building blocks of an application.\
    \ They are high-level abstractions of useful things like showing a screen to a\
