- fmt: "# How to Get More Screen Space for Codes\n\nYou can have more screen space\
    \ by closing all tool windows. Figure [4-7](#457413_2_En_4_Chapter.xhtml#Fig7)\
    \ shows a Java program opened in the main editor while all the tool windows are\
    \ closed. You can collapse any tool window by clicking its name, for example,\
    \ to collapse the Project tool window, click “Project.”\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig7_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7\n\nMain editor, with all tool windows closed\n\nYou can even get\
    \ more screen space by hiding all the tool window bars, as shown in Figure [4-8](#457413_2_En_4_Chapter.xhtml#Fig8).\n\
    \n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig8_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8\n\nMain editor, with all tool windows closed and toolbars hidden\n\
    \nYou’ll get even more screen by entering “distraction free mode,” as shown in\
    \ Figure [4-9](#457413_2_En_4_Chapter.xhtml#Fig9). You can enter distraction free\
    \ mode from the main menu bar, **View** ➤ **Enter Distraction Free Mode**. To\
    \ exit the mode, click **View** from the main menu bar, then **Exit Distraction\
    \ Free Mode**.\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig9_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9\n\nDistraction free mode\n\nYou may also try two other modes that\
    \ can increase the screen real estate. They’re also found on the View menu from\
    \ the main menu bar.\n\n*   Presentation mode\n*   Full screen\n\n## Project Tool\
    \ Window\n\nYou can work with the project’s files and assets via the Project tool\
    \ window, as shown in Figure [4-10](#457413_2_En_4_Chapter.xhtml#Fig10). It has\
    \ a tree-like structure and the sections are collapsible. You can launch any file\
    \ from this window. To open a file, just double-click it.\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig10_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig10_HTML.jpg)\n\
    \nFigure 4-10\n\nProject tool window\n\nBy default, Android Studio displays the\
    \ **Project Files** in *Android View*, as shown in Figure [4-10](#457413_2_En_4_Chapter.xhtml#Fig10).\
    \ The “Android View” is organized by modules to provide quick access to the project’s\
    \ most relevant files. You change how you view the project files by clicking the\
    \ down arrow on top of the Project window, as shown in Figure [4-11](#457413_2_En_4_Chapter.xhtml#Fig11).\n\
    \n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig12_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12\n\nSettings/Preferences window\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig11_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11\n\nHow to change Views in the Project tool window\n\n## Summary\n\
    \n*   You can see more of your codes by increasing the screen real estate for\
    \ the main editor. You can do this by:\n    *   Collapsing all the tool windows\n\
    \    *   Hiding the tool window bars\n    *   Entering distraction free mode\n\
    \    *   Going to full screen mode\n*   You can change how you view the project\
    \ files from switching the view in the **Project tool window**.\n*   Adding a\
    \ TODO item is easy in Android Studio; just add a single line comment followed\
    \ by a TODO text, like this: `// TODO This is my todo list.`\n\n# 5. Android Application\
    \ Overview\n\n*What the chapter covers:*\n\n*   What makes up an Android project\n\
    *   Overview of Android components\n*   The manifest file\n*   Intents\n\nNow\
    \ that we know our way around Android Studio, let’s look closer at the structure\
    \ of an Android app.\n\n## What Makes Up an Android Project\n\nAn Android app\
    \ may look a lot like a desktop app; some may even think of them as mini desktop\
    \ apps, but that wouldn’t be correct. Android apps are structurally different\
    \ from their desktop or web counterparts. A desktop app generally contains all\
    \ the routines and subroutines it needs in order to function; occasionally, it\
    \ may rely on dynamically loaded libraries, but the executable file is self-contained.\
    \ An Android app, on the other hand, is made up of loosely coupled components\
    \ that communicate to each other using a message-passing mechanism. Figure [5-1](#457413_2_En_5_Chapter.xhtml#Fig1)\
    \ shows the logical structure of an app.\n\n![../images/457413_2_En_5_Chapter/457413_2_En_5_Fig1_HTML.jpg](images/457413_2_En_5_Chapter/457413_2_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nLogical representation of an Android app\n\nThe app in Figure\
    \ [5-1](#457413_2_En_5_Chapter.xhtml#Fig1) is a big one—it’s got everything in\
    \ it. Your app doesn’t have to be as big. You don’t need to put all kinds of components\
    \ in your app, just build what you need; but it’s worth our while to learn about\
    \ all of the components (some more than others), especially the basic ones like\
    \ Activities and Intents.\n\n**Note:** APK is short for Application Package Kit.\
    \ It’s the package file format that Android uses to distribute and install applications.\
    \ If Windows apps are packaged either via EXE or MSI and macOS apps use DMG, Android\
    \ uses APK.\n\n`Activity`, `Service`, `BroadcastReceiver`, and `ContentProvider`\
    \ are called *Android components*. They are the key building blocks of an application.\
    \ They are high-level abstractions of useful things like showing a screen to a\
    \ user, running a task in the background, and broadcasting an event so that interested\
    \ applications may respond to them. Components are precoded or prebuilt classes\
    \ with very specific behavior, and we use them by extending them so we can add\
    \ the behavior that’s unique to our application.\n\nBuilding an Android app is\
    \ a lot like building a house. Some people build houses the traditional way—they\
    \ assemble beams, struts, floor panels, and so on. They build the doors and other\
    \ fittings from raw materials by hand, like an artisan. If we build Android applications\
    \ this way, it might take us a long time, and it also might be quite difficult.\
    \ The skill necessary to build applications from scratch could be out of reach\
    \ for some programmers. In Android, applications are built using components. Think\
    \ of components like prefabricated pieces of a house; the parts are manufactured\
    \ in advance, and all they require is assembly.\n\nAn `Activity` is where we put\
    \ together things that the user can see. It’s a focused thing that a user can\
    \ do. For example, an `Activity` can be made so a user can view a single email\
    \ or maybe fill up a form. In Figure [5-1](#457413_2_En_5_Chapter.xhtml#Fig1),\
    \ inside the `Activity`, there are *Views* and *Fragments*. Views are classes\
    \ that draw content to the screen; some examples of `View` objects are `Button`\
    \ and `TextView`. A `Fragment` is similar to an `Activity` in a way that it’s\
    \ also a composition unit but a smaller one. Like `Activity`, they also hold `View`\
    \ objects. Some apps use `Fragment` to address the problem of deploying them on\
    \ multiple form factors—`Fragment` can be turned on or off depending on the available\
    \ screen space and/or orientation.\n\n**Services**. With services, we can run\
    \ program logic behind the scenes, without freezing the user interface. Services\
    \ run in the background; they can be very useful when your app is supposed to\
    \ download a file from the Web or maybe play music.\n\n**BroadcastReceivers**.\
    \ With broadcast receivers, our app can listen to messages from other applications\
    \ or from the Android Runtime itself; a sample use case for this might be if you\
    \ want to display a warning message when the battery dips to below 10%."
  raw: "## How to Get More Screen Space for Codes\n\nYou can have more screen space\
