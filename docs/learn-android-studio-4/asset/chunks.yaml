  trans: '

    ## 创建 AVD


    下一步是构建并测试应用。我们可以通过模拟器运行，也可以将实体安卓设备连接到工作站来实现。本节介绍如何设置模拟器。


    在 Android Studio 的主菜单栏中，选择 **工具** ➤ **AVD 管理器**，如图 3-5 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig5_HTML.jpg](img/457413_2_En_3_Fig5_HTML.jpg)


    图 3-5


    菜单栏，工具，AVD 管理器


    AVD 管理器窗口会启动；AVD 代表 Android 虚拟设备。它是一个运行特定版本 Android 操作系统的模拟器，我们可以用它来测试应用。AVD 管理器（如图
    3-6 所示）会显示本地开发环境中所有已定义的模拟器。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig6_HTML.jpg](img/457413_2_En_3_Fig6_HTML.jpg)


    图 3-6


    AVD 管理器


    如您所见，我已经创建了几个模拟器，但让我们再创建一个；为此，请点击“+ 创建虚拟设备”按钮，如图 3-6 所示。该操作会启动“虚拟设备配置”界面，如图 3-7
    所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig7_HTML.jpg](img/457413_2_En_3_Fig7_HTML.jpg)


    图 3-7


    虚拟设备配置


    选择“手机”类别，然后选择设备分辨率。我选择了 Pixel 5.0 英寸 420dpi 屏幕。点击“下一步”按钮，我们就可以选择模拟器的 Android 版本；这可以在“系统映像”界面中完成，如图
    3-8 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig8_HTML.jpg](img/457413_2_En_3_Fig8_HTML.jpg)


    图 3-8


    系统映像


    我想使用 Android 10（API 级别 29），或者有人称之为 Q；但如您所见，我本地机器上还没有该系统映像——当您看到 Android 版本旁边有“下载”链接时，意味着您本地还没有该系统映像。要获取
    Android 10 的系统映像，请点击“下载”链接。在继续之前，您需要同意许可协议。点击“接受”，然后点击“下一步”，如图 3-9 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig9_HTML.jpg](img/457413_2_En_3_Fig9_HTML.jpg)


    图 3-9


    SDK 快速修复安装


    下载过程可能需要一些时间，具体取决于您的网速；下载完成后，您将回到“系统映像”选择界面，如图 3-10 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig10_HTML.jpg](img/457413_2_En_3_Fig10_HTML.jpg)


    图 3-10


    虚拟设备配置


    如您所见，我们现在可以使用 Android 10 作为模拟器的系统映像。选择它，然后点击“下一步”。下一个界面会显示我们之前创建模拟器的选择摘要；接下来显示的是“验证配置”界面（图
    3-11）。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig11_HTML.jpg](img/457413_2_En_3_Fig11_HTML.jpg)


    图 3-11


    验证配置


    “验证配置”界面不仅会显示我们之前的选择摘要，您还可以在这里配置一些附加功能。如果点击“显示高级设置”按钮，您还可以配置以下内容：


    * 前置和后置摄像头

    * 模拟网络速度

    * 模拟性能

    * 内部存储大小

    * 键盘输入（启用或禁用）


    完成后，点击“完成”按钮。当 AVD 创建成功后，我们将回到“Android 虚拟设备管理器”界面，如图 3-12 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig12_HTML.jpg](img/457413_2_En_3_Fig12_HTML.jpg)


    图 3-12


    Android 虚拟设备管理器


    现在我们可以看到模拟器（Pixel API 29）。点击“操作”列中的小绿色箭头来启动模拟器——铅笔图标用于编辑模拟器配置，绿色箭头用于启动它。


    当模拟器启动时，您会看到桌面上弹出一个 Pixel 手机的图像；它需要一些时间才能完全启动。回到 Android Studio 的主编辑器窗口来运行应用。


    从主菜单栏中，选择 **运行** ➤ **运行应用**，如图 3-13 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig13_HTML.jpg](img/457413_2_En_3_Fig13_HTML.jpg)


    图 3-13


    主菜单栏，运行


    Android Studio 会编译项目；然后，它会寻找已连接（实体）的安卓设备或正在运行的模拟器。我们之前已经启动了模拟器，所以 Android Studio
    应该能找到它，并将应用安装到该模拟器实例中。


    如果一切顺利，您应该会看到 Android Studio 为我们搭建的 Hello World 应用，如图 3-14 所示。


    ![../images/457413_2_En_3_Chapter/457413_2_En_3_Fig14_HTML.jpg](img/457413_2_En_3_Fig14_HTML.jpg)


    图 3-14


    Hello World


    ## 总结


    * 一个安卓项目（几乎）总是包含一个 Activity。您可以从一个基础项目开始，选择“Empty Activity”，就像我们在示例中所做的那样。然后在此基础上进行构建。

    * 在创建项目时，要特别注意项目包名；如果您将项目发布到 Google Play，将无法更改包名；它将作为您应用的一部分。

    * 仔细选择最低 SDK 版本；这将限制您应用的潜在用户数量。

    * 您可以使用模拟器来运行应用并查看其表现。如果您的系统上启用了 HAXM（模拟器加速器），那么使用模拟器进行测试效果会好得多；如果您使用 Linux，可以通过
    KVM 实现加速。


    # 4. Android Studio IDE


    *本章涵盖内容：*


    * 在 Android Studio 中处理文件

    * 主编辑器

    * 处理布局文件

    * 项目工具窗口


    之前，我们通过创建一个包含空 Activity 的项目构建了一个简单的应用，在主编辑器窗口中（简要地）打开了它，并在模拟器中运行了它。在本章中，我们将花一些时间重点了解
    IDE 中您最常使用的部分。

    '
- fmt: '# The IDE


    From the opening dialog of Android Studio, you can launch the previous project
    we created. Links to existing projects appear on the left panel of the opening
    dialog, as shown in Figure [4-1](#457413_2_En_4_Chapter.xhtml#Fig1).


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig1_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Welcome to Android Studio


    When you open a project, you’ll see the main editor window, the Project panel,
    and other panels that Android Studio opens by default. An annotated picture of
    an opened project is shown in Figure [4-2](#457413_2_En_4_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig2_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The Android Studio IDE


    | ❶ | **Main menu bar**. You can navigate Android Studio in various ways. Often,
    there’s more than one way to do a task, but the primary navigation is done in
    the main menu bar. If you’re on Linux or Windows, the main menu bar sits directly
    at the top of the IDE; if you’re on macOS, the main menu bar is disconnected from
    the IDE (which is how all macOS software works). |

    | ❷ | **Navigation bar**. This bar lets you navigate the project files. It’s a
    horizontally arranged collection of chevrons that resembles some sort of breadcrumb
    navigation. You can open your project files either through the navigation bar
    or the Project tool window. |

    | ❸ | **Toolbar**. This lets you do a wide range of actions (e.g., save files,
    run the app, open the AVD manager, open the SDK manager, undo, redo actions, etc.).
    |

    | ❹ | **Main editor window**. This is the most prominent window and has the most
    screen real estate. The editor window is where you can create and modify project
    files. It changes its appearance depending on what you are editing. If you’re
    working on a program source file, this window will show just the source files.
    When you are editing layout files, you may see either the raw XML file or a visual
    rendering of the layout. |

    | ❺ | **Project tool window**. This window shows the contents of the project folders;
    you’ll be able to see and launch all your project assets (source code, XML files,
    graphics, etc.) from here. |

    | ❻ | **Tool window bar**. The tool window bar runs along the perimeter of the
    IDE window. It contains the individual buttons you need to activate specific tool
    windows, for example, `TODO`, `Logcat`, Project window, `Connected Devices`, and
    so on. |

    | ❼ | **Show/hide tool window**. It shows (or hides) the tool window bar. It’s
    a toggle. |

    | ❽ | **Tool window**. You will find tool windows on the side bottom of Android
    Studio workspace. They’re secondary windows that let you look at the project from
    different perspectives. They also let you access the typical tools you need for
    development tasks, for example, debugging, integration with version control, looking
    at the build logs, inspecting `Logcat` dumps, looking at `TODO` items, and so
    on. Here are a couple of things you can do with the tool windows:• You can expand
    or collapse them by clicking the tool’s name in the tool window bar. You can also
    drag, pin, unpin, attach, and detach the tool windows.• You can rearrange the
    tool windows, but if you feel you need to restore the tool window to the default
    layout, you can do so from the main menu bar; click **Window** ➤ **Restore Default
    Layout**. Also, if you want to customize the “Default Layout,” you rearrange the
    windows to your liking; then, from the main menu bar, click **Window** ➤ **Store
    Current Layout as Default**. |


    ## Main Editor


    Like in most IDEs, you can modify and work with source files in the main editor
    window. What makes Android Studio stand out is how well it understands Android
    development files. Android Studio lets you work with a variety of file types,
    but you’ll probably spend most of your time editing these types:


    *   Java source files

    *   XML files

    *   UI layout files


    When working with Java programs, you get all the code hinting and completions
    that we’ve come to expect from a modern editor. What’s more, it gives us plenty
    of early warnings when something is wrong. Figure [4-3](#457413_2_En_4_Chapter.xhtml#Fig3)
    shows a Java class file opened in the main editor. The class file is an Activity
    and it’s missing a semicolon on one of the statements. You could see Android Studio
    peppering the IDE with (red) squiggly lines which means that the class won’t compile.


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig3_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Main editor showing error indicators


    Android Studio puts the squiggly lines very near the offending code. As you can
    see in Figure [4-3](#457413_2_En_4_Chapter.xhtml#Fig3), the squiggly lines are
    placed at the point where the semicolon is expected.


    ## Editing Layout Files


    What the user sees as screens or windows of your app are actually Android Activities.
    Activities are Android components that are made up of Java source files and XML
    layout files. Android Studio, undoubtedly, can edit XML files, but what sets it
    apart is how intuitively it can render the XML files in a WYSIWYG mode (what you
    see is what you get). Figure [4-4](#457413_2_En_4_Chapter.xhtml#Fig4) shows the
    two ways you can work with layout files.


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig4_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Design mode and text mode editing of layout files


    Figure [4-5](#457413_2_En_4_Chapter.xhtml#Fig5) shows the various parts of Android
    Studio that are relevant when working on a layout file during the design mode.


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig5_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Layout design tools of Android Studio


    *   **View palette**—The View palette contains the Views (widgets) that you can
    drag and drop on either the design surface or blueprint surface.

    *   **Design surface**—It acts like a real-world preview of your screen.

    *   **Blueprint surface**—Similar to the design surface, but it only contains
    the outlines of the UI elements.

    *   **Attributes window**—You can change the properties of the UI element (View)
    in here. When you make a change on properties of a View using the Attributes window,
    that change will be automatically reflected on the layout’s XML file. Similarly,
    when you make a change on the XML file, that will automatically be reflected on
    the Attributes window.


    ## TODO Items


    This may look like a trivial feature, but I hope you’ll find it useful—that’s
    why I squeezed in this section. Each one of us has a way of writing `TODO` items
    for whatever app we’re working on. There isn’t much fuss in writing `TODO` items;
    what’s difficult is consolidating them.


    In Android Studio, you don’t have to create a separate file to keep track of `TODO`
    items. Whenever you create a comment followed by a “TODO” text, like this


    ```

    // TODO This is a sample todo

    ```


    Android Studio will keep track of all the `TODO` comments in all of your source
    files. See Figure [4-6](#457413_2_En_4_Chapter.xhtml#Fig6).


    ![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig6_HTML.jpg](images/457413_2_En_4_Chapter/457413_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    TODO items


    To view all your `TODO` items, click the “TODO” tab in the tool window bar.'
