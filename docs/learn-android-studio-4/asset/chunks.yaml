    的日志条目，这同样不足为奇。现在，当应用在模拟器上运行时，尝试更改设备的屏幕方向——您会注意到，每次屏幕方向更改时，`TextView` 上显示的数字也会随之改变。您还会看到
    `createNumber()` 和 `getNumber()` 方法的额外日志出现在 Logcat 中。这是因为运行时每次屏幕方向更改时都会销毁并重新创建
    `MainActivity`。我们的 `RandomNumber` 对象也随着 `MainActivity` 被销毁并重新创建——我们的 UI 数据无法在屏幕方向更改后存活下来。


    这是使用 `ViewModel` 库的好场景，这样 UI 数据可以在 `Activity` 类销毁和重新创建后继续存在。我们只需要做三件事来实现 `ViewModel`：


    1.  将生命周期扩展添加到项目的依赖项中，就像我们之前做的那样。返回清单 [16-1](#457413_2_En_16_Chapter.xhtml#PC1)
    查看说明。

