    # 生命周期感知组件


    生命周期感知组件会响应其他组件生命周期状态的变化而执行相应操作。如果你熟悉**观察者-被观察者**设计模式，生命周期感知组件的运作方式与之类似。


    我们需要了解一些新的术语：


    *   **生命周期所有者** — 一个拥有生命周期的组件，例如 `Activity` 或 `Fragment`；它在其生命周期中可以进入各种状态，例如 `CREATED`、`RESUMED`、`PAUSED`、`DESTROYED`
    等。生命周期观察者可以接入生命周期所有者，并在生命周期状态发生变化时收到通知，例如当 `Activity` 进入 `CREATED` 状态时——比如在进入
    `onCreate()` 之后；我有时也将生命周期所有者称为可观察对象。


    *   **生命周期观察者** — 一个监听**生命周期所有者**生命周期状态变化的对象。它是一个实现了 `LifecycleObserver` 接口的类。


    借助生命周期感知组件，我们可以观察诸如 `Activity` 这样的组件，并在其进入任何生命周期状态时执行相应操作。


    创建一个新项目有助于你理解本章的讨论内容。创建一个包含空 `Activity` 的项目，然后创建另一个名为 `MainActivityObserver` 的类。你可以通过右键单击项目（如图
    16-1 所示），然后选择 **New** ➤ **Java Class** 来创建这个类。


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig1_HTML.jpg](img/457413_2_En_16_Fig1_HTML.jpg)


    图 16-1 向项目添加一个 Java 类


    将新类命名为 "MainActivityObserver"。


    接下来，我们需要向 `build.gradle` 文件（模块级别）添加一个依赖项。编辑项目的 Gradle 文件，使其与代码清单 16-1 一致。


    ```

    dependencies {

    def lifecycle_version = "2.2.0"

    implementation "androidx.lifecycle:lifecycle-extensions:$lifecycle_version"

    annotationProcessor "androidx.lifecycle:lifecycle-compiler:$lifecycle_version"

    ...

    }

    ```


    代码清单 16-1 `build.gradle` 文件，模块级别


    > **注意：** 编写本文时的 `lifecycle_version` 是 "2.2.0"；由于你阅读本文的时间较晚，版本可能会有所不同。你可以访问 `https://bit.ly/lifecyclerelnotes`
    来查找生命周期库的当前版本。


    编辑 Gradle 文件后，你的项目需要刷新。


    为了演示生命周期的概念，我们将研究两个类：


    *   **MainActivity** — 这是一个简单的 `Activity`，与使用空 `Activity` 创建项目时 IDE 生成的任何其他 `Activity`
    非常相似。示例代码如代码清单 16-2 所示。


    *   **MainActivityObserver** — 一个将实现 `LifecycleObserver` 接口的 Java 类；这将是我们的监听器对象。相关代码在代码清单
    16-1 中列出并附有注释。


    `MainActivity` 和 `MainActivityObserver` 这两个类展示了一个在**生命周期所有者**（`MainActivity`）和**生命周期观察者**（`MainActivityObserver`）之间建立**观察者-被观察者**关系的示例。编辑
    `MainActivityObserver` 类，使其与代码清单 16-2 一致。


    |❶| 如果你想观察其他组件的生命周期变化，需要实现 `LifecycleObserver` 接口。这一行使该类成为一个*观察者*。|

    |❷| 使用 `OnLifecycleEvent` 注解来告知 Android 运行时，当生命周期事件发生时，应该调用被注解的方法；在本例中，我们正在监听被观察对象的
    `ON_CREATE` 事件。装饰器的参数指示了我们正在监听哪个生命周期事件。|

    |❸| 这是被装饰的方法。当它正在观察的对象进入 `ON_CREATE` 生命周期状态时，该方法将被调用。你可以随意命名这个方法；我把它命名为 `onCreateEvent()`，因为这样描述性强。否则，你可以根据自己的喜好命名；方法名无关紧要，因为你已经对它进行了注解，而且注解本身就足够了。|

    |❹| 这是你响应生命周期状态变化而执行某些有趣操作的地方。|


    ```

    import androidx.lifecycle.Lifecycle;

    import androidx.lifecycle.LifecycleObserver;

    import androidx.lifecycle.OnLifecycleEvent;

    public class MainActivityObserver implements LifecycleObserver {  ❶

    @OnLifecycleEvent(Lifecycle.Event.ON_CREATE) ❷

    public void onCreateEvent() {  ❸

    System.out.println("EVENT: onCreate Event fired");  ❹

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_PAUSE)

    public void onPauseEvent() {

    System.out.println("EVENT: onPause Event fired");

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_RESUME)

    public void onResumeEvent() {

    System.out.println("EVENT: onResume Event fired");

    }

    }

    ```


    代码清单 16-2 `MainActivityObserver` 类


    接下来，编辑 `MainActivity` 类，使其与代码清单 16-3 一致。


    |❶| 从 `MainActivity` 的角度来看（它是被观察的对象），我们在这里唯一需要做的事情是使用 `LifeCycleOwner` 接口的 `addObserver()`
    方法添加一个观察者对象——没错，`AppCompatActivity` 实现了 `LifeCycleOwner`；这就是为什么我们可以在 `Activity`
    内部调用 `getLifecycle()` 方法。你只需要传递一个观察者类的实例（在我们的例子中是 `MainActivityObserver`），即可在
    `Activity` 和普通类之间建立生命周期感知。|


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    getLifecycle().addObserver(new MainActivityObserver()); ❶

    }

    }

    ```


    代码清单 16-3 `MainActivity` 类


    这个应用程序没有做太多事情。它只是在 `MainActivity` 的生命周期状态发生变化时，将消息记录到 Logcat 窗口。尽管如此，它演示了如何向任何
    `Activity` 的生命周期添加观察者。

    '
- fmt: '# ViewModel


    Android 框架管理 `Activity` 和 `Fragment` 等 UI 控制器的生命周期；它可能会根据某些用户操作（例如点击返回按钮）或设备事件（例如旋转屏幕）销毁或重新创建
    `Activity`（或 `Fragment`）。这些配置更改是您无法控制的。


    如果运行时代决定销毁 UI 控制器，那么您当前存储在其中的任何与 UI 相关的临时数据都将丢失。


    最好创建一个新项目（使用空 `Activity`）来跟随本节内容进行讨论；然后向项目中添加一个 Java 类并命名为 `RandomNumber`。清单 [16-4](#457413_2_En_16_Chapter.xhtml#PC4)、[16-5](#457413_2_En_16_Chapter.xhtml#PC5)
    和 [16-6](#457413_2_En_16_Chapter.xhtml#PC6) 展示了一个简单的应用，每次 `Activity` 创建时都会显示一个随机数。


    清单 [16-4](#457413_2_En_16_Chapter.xhtml#PC4) 展示了随机数生成器的代码。它只包含两个方法：`getNumber()`
    和 `createRandomNumber()`；每个方法都留有一条日志语句，以便我们检查方法被调用的时间和次数。`getNumber()` 方法的逻辑很简单——如果
    `minitialized` 变量为 `false`，意味着我们第一次创建 `RandomNumber` 类的实例；因此，我们将创建随机数然后直接返回它。否则，我们将返回
    `minitialized` 变量的当前值。


    ```java

    import android.util.Log;

    import java.util.Random;

    public class RandomNumber  {

    private String TAG = getClass().getSimpleName();

    int mrandomnumber;

    boolean minitialized = false;

    String getNumber() {

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber + "";

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber = random.nextInt(100);

    minitialized = true;

    }

    }

    ```


    *清单 16-4 RandomNumber 类*


    清单 [16-5](#457413_2_En_16_Chapter.xhtml#PC5) 展示了 `MainActivity` 的代码。所有操作都发生在 `onCreate()`
    方法内部。当 `MainActivity` 进入 *CREATED* 状态时，我们创建 `RandomNumber` 类的实例；调用 `getNumber()`
    方法，并将 `TextView` 的值设置为 `getNumber()` 方法的结果。


    ```java

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data = new RandomNumber();

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    ```


    *清单 16-5 MainActivity 类*


    清单 [16-6](#457413_2_En_16_Chapter.xhtml#PC6) 展示了 `activity_main` 的布局代码。


    ```

    清单 16-6 activity_main.xml

    ```


