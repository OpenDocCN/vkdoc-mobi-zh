  raw: '## How to Work with Internal Storage


    As said earlier, working with file storage in Android is like working with the
    usual classes in Java I/O. There are few options to use like **openFileInput()**
    and **openFileOutput()** or other ways to use **InputStreams** and **OutputStreams**.
    You just need to remember that these calls will not let you specify the file paths.
    You can only provide the filename; if you’re not concerned with that, go ahead
    and use them—it’s what we will use in this chapter. If, on the other hand, you
    need more flexibility, you can use the **getFilesDir()** or **getCacheDir()**
    to get a **File** object that points to the root of your file locations—use **getCacheDir()**
    if you want to work with the cache directories of the internal storage. When you
    have a **File** object, you can create your directory and file structure from
    there.


    That’s the general lay of the territory when it comes to Android file storage.
    Again, in this chapter, we’ll only work with internal storage in the standard
    location (not cache).


    Writing to a file requires a few simple steps. You need to


    1.  Decide on a filename


    2.  Get a FileOutputStream object


    3.  Convert your content to a ByteArray


    4.  Write the ByteArray using the FileOutputStream


    5.  Don’t forget to close the file


    Listing [14-1](#457413_2_En_14_Chapter.xhtml#PC1) shows an annotated code snippet
    on how to save String data to a file.


    | ❶ | Choose a filename. |

    | ❷ | This is the String we want to save to a file. In a real app, you may be
    getting this from the contents of an EditText component. |

    | ❸ | **openFileOutput()** returns a FileOutputStream; we need this object so
    we can write to a file. The first parameter of the call is the name of the file
    you want to create. The second parameter is a **Context mode**. We’re using **MODE_PRIVATE**
    because we want the file to be private to the app. We’re using the try-with-resources
    block here; this way, we don’t have to bother closing the file. When the block
    exits, it will close the file object for us automatically. |

    | ❸ | The write method expects a ByteArray. So, we need to convert the String
    to a byte array. The **getBytes()** method should do that just fine. |


    ```

    String filename = "myfile.txt"; ❶

    String str = "The quick brown fox jumped over the head"; ❷

    try (FileOutputStream out = openFileOutput(filename, Context.MODE_PRIVATE)) {
    ❸

    out.write(str.getBytes()); ❹

    } catch (IOException e) {

    e.printStackTrace();

    }

    Listing 14-1

    Saving String data to a file

    ```


    Reading from a file involves more steps than writing to it. You generally need
    to do the following:


    1.  Get a FileInputStream.


    2.  Read from the stream, one byte at a time.


    3.  Keep on reading until there’s nothing more to read. You’ll know when you’re
    at the end of the file if the value of the last byte you’ve read is **-1**. It’s
    time to stop by then.


    4.  As you work your way to the end of the file, you need to store the bytes you’re
    taking from the stream into a temporary container. A StringBuilder or a StringBuffer
    should do the trick. Building a String object using the plus operator is wasteful
    and inefficient because Strings are immutable. Each time you use the **plus**
    operator, it creates a new String object; if your file has 2000 characters, you
    would have created 2000 String objects. This will be the case if you’re reading
    a text file. If you’re reading something else like an audio or video file, you’ll
    use a different data structure.


    5.  When you reach the end of the file, stop reading. Do what you need to do with
    what you’ve read, and don’t forget to close it.


    Listing [14-2](#457413_2_En_14_Chapter.xhtml#PC2) shows an annotated code snippet
    on how to read String data from a file.


    | ❶ | We won’t be able to read the entire file in one fell swoop. We’ll read it
    by chunks. As we get some chunks, we’ll store them inside the StringBuilder object.
    |

    | ❷ | **openFileInput()** returns a FileInputStream; this is the object we need
    to read from a file. The only parameter it takes is the name of the file to read.
    Using the try-with-resources here spares us from writing the boilerplate codes
    for closing files. |

    | ❸ | The **read()** method reads a byte of data from the input stream and returns
    it as an integer. We need to keep reading from the stream one byte at a time until
    we reach the end of file (EOF) marker. When there are no more bytes to read from
    the stream, the EOF is marked as -1\. We will use this as the condition for the
    while loop. Until the **read()** method doesn’t return **-1**, we keep on reading.
    |

    | ❹ | The **read()** method returns an int; it’s the ASCII value of each letter
    in the file, returned as an integer. We have to cast it to a **char** before we
    can put it in the StringBuilder. |

    | ❺ | When we run out of bytes to read, we’ll get out of the loop and get the
    String out of the StringBuilder. Now, you can work with the contents of the file
    as a String. |


    ```

    String filename = "myfile.txt";

    StringBuilder sb = new StringBuilder(); ❶

    String output = "";

    try (FileInputStream in = openFileInput(filename)) { ❷

    int read = 0;

    while ((read = in.read()) != -1) { ❸

    sb.append((char) read); ❹

    }

    output = sb.toString(); ❺

    }

    catch(IOException ie) {

    Log.e(TAG, ie.getMessage());

    }

    Listing 14-2

    Reading from a file

    ```


    Let’s build a small project to put all these things together. Create a project
    with an empty Activity. Our small app will have the following View components:


    *   **EditText**—This will allow us to input some text.


    *   **TextView**—When we read data from a file, we will display the contents using
    this component.


    *   **Button**—This will trigger a user action to save the contents of the EditText
    to a file.


    Edit /app/res/layout/activity_main.xml to match the contents of Listing [14-3](#457413_2_En_14_Chapter.xhtml#PC3).


    ```


    Listing 14-3

    app/res/layout/activity_main.xml

    ```


    Next, edit MainActivity to match the contents of Listing [14-4](#457413_2_En_14_Chapter.xhtml#PC4).


    | ❶ | Declare the Button, EditText, TextView, the filename variable, and the TAG
    variable as class members; we will refer to them later. |

    | ❷ | Initialize the TextView and EditText variables inside the onCreate() callback.
    |

    | ❸ | Bind the Button to a listener object. When the Button is clicked, we will
    call a method that will contain the codes for saving the contents of **txtinput**
    to a file. |


    ```

    import android.content.Context;

    import android.os.Bundle;

    import android.util.Log;

    import android.view.View;

    import android.widget.Button;

    import android.widget.EditText;

    import android.widget.TextView;

    public class MainActivity extends AppCompatActivity {

    private Button btn;  ❶

    private TextView txtoutput;

    private EditText txtinput;

    private String filename = "myfile.txt";

    private String TAG = getClass().getName();

    @Override

    protected void onCreate(final Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    txtoutput = findViewById(R.id.txtoutput); ❷

    txtinput = findViewById(R.id.txtinput);

    btn = findViewById(R.id.btn);

    btn.setOnClickListener(new View.OnClickListener() { ❸

    @Override

    public void onClick(View v) {

    // this is where we trigger saving the data

    }

    });

    }

    }

    Listing 14-4

    MainActivity

    ```


    Next, add a method to MainActivity and name it **saveData()**. Edit it to match
    the codes, as shown in Listing [14-5](#457413_2_En_14_Chapter.xhtml#PC5). These
    are mostly the same codes as in Listing [14-1](#457413_2_En_14_Chapter.xhtml#PC1);
    the only difference is that we’re reading the String content from the EditText
    (txtinput) component.'
  trans: "\n# 如何使用内部存储\n\n如前所述，在 Android 中使用文件存储就像使用 Java I/O 中的常规类一样。有几种选项可供使用，例如\
    \ `openFileInput()` 和 `openFileOutput()`，或者使用 `InputStreams` 和 `OutputStreams`\
    \ 的其他方式。你只需要记住，这些调用不会让你指定文件路径。你只能提供文件名；如果你不关心这一点，那就放心使用它们吧——这也是我们在本章中将要使用的。另一方面，如果你需要更高的灵活性，你可以使用\
    \ `getFilesDir()` 或 `getCacheDir()` 来获取一个指向文件位置根目录的 `File` 对象——如果你想要使用内部存储的缓存目录，可以使用\
    \ `getCacheDir()`。当你有了一个 `File` 对象后，你就可以从中创建你的目录和文件结构。\n\n这就是 Android 文件存储的大致情况。再次说明，在本章中，我们只会使用标准位置（非缓存）的内部存储。\n\
    \n写入文件需要几个简单的步骤。你需要：\n\n1.  确定文件名\n2.  获取一个 `FileOutputStream` 对象\n3.  将你的内容转换为\
    \ `ByteArray`\n4.  使用 `FileOutputStream` 写入 `ByteArray`\n5.  不要忘记关闭文件\n\n清单 14-1\
    \ 展示了一段带有注释的代码片段，说明如何将 `String` 数据保存到文件中。\n\n| ❶ | 选择一个文件名。 |\n| :--- | :--- |\n\
    | ❷ | 这是我们要保存到文件的 `String`。在实际应用中，你可能从 `EditText` 组件的内容中获取它。 |\n| ❸ | `openFileOutput()`\
    \ 返回一个 `FileOutputStream`；我们需要这个对象，以便写入文件。调用的第一个参数是你要创建的文件名。第二个参数是 `Context` 模式。我们使用\
    \ `MODE_PRIVATE`，因为我们希望文件对应用程序私有。我们在这里使用了 try-with-resources 块；这样，我们就不必费心关闭文件了。当块退出时，它会自动为我们关闭文件对象。\
    \ |\n| ❹ | `write()` 方法需要一个 `ByteArray`。因此，我们需要将 `String` 转换为字节数组。`getBytes()`\
    \ 方法可以很好地完成这项工作。 |\n\n```\nString filename = \"myfile.txt\"; ❶\nString str = \"\
    The quick brown fox jumped over the head\"; ❷\ntry (FileOutputStream out = openFileOutput(filename,\
    \ Context.MODE_PRIVATE)) { ❸\n    out.write(str.getBytes()); ❹\n} catch (IOException\
    \ e) {\n    e.printStackTrace();\n}\n清单 14-1\n将字符串数据保存到文件\n```\n\n从文件读取涉及比写入更多的步骤。你通常需要执行以下操作：\n\
    \n1.  获取一个 `FileInputStream`。\n2.  从流中读取，一次一个字节。\n3.  持续读取，直到没有内容可读。如果你读取的最后一个字节的值为\
    \ `-1`，你就知道已经到达文件末尾了。这时就该停止了。\n4.  当你向文件末尾读取时，需要将从流中获取的字节存储到一个临时容器中。`StringBuilder`\
    \ 或 `StringBuffer` 可以完成这个任务。使用 `plus` 运算符构建 `String` 对象既浪费又低效，因为 `String` 是不可变的。每次使用\
    \ `plus` 运算符，它都会创建一个新的 `String` 对象；如果你的文件有 2000 个字符，你就会创建 2000 个 `String` 对象。如果你正在读取一个文本文件，就会发生这种情况。如果你正在阅读其他内容，比如音频或视频文件，你将使用不同的数据结构。\n\
    5.  当你到达文件末尾时，停止读取。对你已读取的内容进行必要的操作，并且不要忘记关闭它。\n\n清单 14-2 展示了一段带有注释的代码片段，说明如何从文件读取\
    \ `String` 数据。\n\n| ❶ | 我们无法一口气读取整个文件。我们会分块读取。当我们获取一些块时，我们将它们存储在 `StringBuilder`\
    \ 对象中。 |\n| :--- | :--- |\n| ❷ | `openFileInput()` 返回一个 `FileInputStream`；这是我们需要从文件读取的对象。它唯一的参数是要读取的文件名。在这里使用\
    \ try-with-resources 让我们免于编写关闭文件的样板代码。 |\n| ❸ | `read()` 方法从输入流中读取一个字节的数据，并将其作为整数返回。我们需要一次从流中读取一个字节，直到到达文件结束\
    \ (EOF) 标记。当没有更多字节可从流中读取时，EOF 被标记为 `-1`。我们将以此作为 `while` 循环的条件。直到 `read()` 方法不返回\
    \ `-1`，我们才继续读取。 |\n| ❹ | `read()` 方法返回一个 `int`；它是文件中每个字母的 ASCII 值，以整数形式返回。在将其放入\
    \ `StringBuilder` 之前，我们必须将其转换为 `char`。 |\n| ❺ | 当没有更多字节可读时，我们将退出循环，并从 `StringBuilder`\
    \ 中获取 `String`。现在，你可以将文件内容作为 `String` 来处理。 |\n\n```\nString filename = \"myfile.txt\"\
    ;\nStringBuilder sb = new StringBuilder(); ❶\nString output = \"\";\ntry (FileInputStream\
    \ in = openFileInput(filename)) { ❷\n    int read = 0;\n    while ((read = in.read())\
    \ != -1) { ❸\n        sb.append((char) read); ❹\n    }\n    output = sb.toString();\
    \ ❺\n}\ncatch(IOException ie) {\n    Log.e(TAG, ie.getMessage());\n}\n清单 14-2\n\
    从文件读取\n```\n\n让我们构建一个小项目来整合所有这些内容。创建一个带有空 Activity 的项目。我们的小应用将包含以下视图组件：\n\n* \
    \  `EditText` — 这将允许我们输入一些文本。\n*   `TextView` — 当我们从文件读取数据时，我们将使用此组件显示内容。\n* \
    \  `Button` — 这将触发用户操作，将 `EditText` 的内容保存到文件。\n\n编辑 `/app/res/layout/activity_main.xml`\
    \ 以匹配清单 14-3 的内容。\n\n```\n清单 14-3\napp/res/layout/activity_main.xml\n```\n\n接下来，编辑\
    \ `MainActivity` 以匹配清单 14-4 的内容。\n\n| ❶ | 将 `Button`、`EditText`、`TextView`、`filename`\
    \ 变量和 `TAG` 变量声明为类成员；我们稍后将引用它们。 |\n| :--- | :--- |\n| ❷ | 在 `onCreate()` 回调中初始化\
    \ `TextView` 和 `EditText` 变量。 |\n| ❸ | 将 `Button` 绑定到一个监听器对象。当 `Button` 被点击时，我们将调用一个方法，该方法包含用于将\
    \ `txtinput` 的内容保存到文件的代码。 |\n\n```\nimport android.content.Context;\nimport android.os.Bundle;\n\
    import android.util.Log;\nimport android.view.View;\nimport android.widget.Button;\n\
    import android.widget.EditText;\nimport android.widget.TextView;\n\npublic class\
    \ MainActivity extends AppCompatActivity {\n    private Button btn;  ❶\n    private\
    \ TextView txtoutput;\n    private EditText txtinput;\n    private String filename\
    \ = \"myfile.txt\";\n    private String TAG = getClass().getName();\n\n    @Override\n\
    \    protected void onCreate(final Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n\n        txtoutput = findViewById(R.id.txtoutput);\
    \ ❷\n        txtinput = findViewById(R.id.txtinput);\n        btn = findViewById(R.id.btn);\n\
    \n        btn.setOnClickListener(new View.OnClickListener() { ❸\n            @Override\n\
    \            public void onClick(View v) {\n                // 这是我们触发保存数据的地方\n\
    \            }\n        });\n    }\n}\n清单 14-4\nMainActivity\n```\n\n接下来，向 `MainActivity`\
    \ 添加一个方法并命名为 `saveData()`。编辑它以匹配清单 14-5 中所示的代码。这些代码与清单 14-1 中的代码基本相同；唯一的区别是我们正在从\
    \ `EditText` (`txtinput`) 组件读取 `String` 内容。\n"
- fmt: "```java\nprivate void saveData() {\n    String str = txtinput.getText().toString();\n\
    \    try (FileOutputStream out = openFileOutput(filename, Context.MODE_PRIVATE))\
    \ {\n        out.write(str.getBytes());\n        loadData();\n    } catch (IOException\
    \ e) {\n        Log.e(TAG, e.getMessage());\n    }\n}\n```\nListing 14-5: `saveData()`\n\
    \nNext, add another method to `MainActivity` and name it `loadData()`; the codes\
    \ are shown in Listing 14-6. These are the same codes as in Listing 14-2, but\
    \ this time, we’re setting the text of `txtinput` and `txtoutput` to the contents\
