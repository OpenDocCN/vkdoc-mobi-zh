    从图 13-1 或图 13-2 中可以看到，Android Studio 更进一步地为 JVM 测试和插桩测试生成了示例测试文件。这些示例文件仅作为快速参考；它们向我们展示了单元测试可能的样子。


    ### 简单示例


    为了深入探索，创建一个包含空白 Activity 的项目。向项目添加一个 Java 类，并将其命名为 `Factorial.java`；编辑此类以匹配代码清单
    13-1。


    ```java

    public class Factorial {

    public static double factorial(int arg) {

    if (arg == 0) {

    return 1.0;

    }

    else {

    return arg + factorial(arg - 1);

    }

    }

    }

    代码清单 13-1

    Factorial.java

    ```


    确保 `Factorial.java` 在主编辑器中打开，如图 13-3 所示；然后，从主菜单栏转到 **Navigate** ➤ **Test**。同样，你也可以使用键盘快捷键（macOS
