    现在，让我们在 `MainActivity` 中实现更改；清单 [16-8](#457413_2_En_16_Chapter.xhtml#PC8) 展示了修改后的
    `MainActivity`，它使用 `ViewModelProviders` 来获取 `RandomNumber` 类的实例——这就是我们的 `ViewModel`
    对象。


    | ❶ | 这是我们需要在 `MainActivity` 中做的唯一更改。我们不再通过直接在 `onCreate()` 方法中创建 `ViewModel`
    对象（`RandomNumber` 类）的实例来直接管理它，而是让 `ViewModelProviders` 类管理我们 `ViewModel` 对象的范围。
    |


    ```java

    import androidx.lifecycle.ViewModelProviders;

    import android.os.Bundle;

    import android.widget.TextView;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data;

    data = ViewModelProviders.of(this).get(RandomNumber.class); ❶

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    ```


