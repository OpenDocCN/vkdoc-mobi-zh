    In a real app, you probably wouldn’t access the database from a UI controller
    like an Activity; you might want to put in a ViewModel class. That way, the UI
    controller’s responsibility is strictly to present data and not to act as a model.


    If you use Room with ViewModel and LiveData, it can provide a more responsive
    UI experience. I didn’t cover it here, but it’s a great exercise to pursue after
    this chapter.


    ## Summary


    *   AppCompatActivity objects are now lifecycle owners. You can write another
    class and listen to the lifecycle changes of a lifecycle owner, then react accordingly;
    Fragments too are lifecycle owners—don’t forget to use *AndroidX artifacts* on
    your project when working with lifecycle aware components.


    *   ViewModel makes your UI data resilient to the destruction and re-creation
    of UI controllers (like Activities and Fragments).


    *   LiveData makes the relationship between your UI object and model data bidirectional.
    A change in one is automatically reflected in the other.


    *   Room is an ORM for SQLite. It’s a first-party solution and it’s part of the
    Architecture components—there’s little reason we shouldn’t use it.


    # 17. Distributing Apps


    *What we’ll cover:*


    *   Preparing for release


    *   Signing the app


    *   Google Play


    *   App bundle


    You can distribute your app quite freely and without much restrictions; you can
    let your users download it from your website, Google Drive, Dropbox, and so on.
    You may even email the app directly to the users, if you wish; but many developers
    choose to distribute their app on a marketplace like Google or Amazon to maximize
    reach. Another reason to put your app on the trusted digital marketplaces is,
    well, they’re trusted. When an app is not downloaded from a trusted source, the
    apps won’t be instantly usable; they will get a notification that the app is not
    from a trusted source.


    In this chapter, we’ll discuss the things you need to do to get your app out in
    Google Play.


    ## Prepare the App for Release


    A couple of things you need to mind when releasing an app to the public are


    1.  Prepare the material and assets for release


    2.  Configure the app for release


    3.  Build a release-ready app


    ### Prepare Material and Assets for Release


    Your code is great, and you might even think it’s clever, but the user will never
    see it. What they will see are your View objects, the icons, and the other graphical
    assets. You should polish them.


    If you think the app’s icon isn’t a big deal, that could be a mistake. The icons
    help the users identify your app as it sits on the home screen. This icon also
    appears on other areas like the launcher window and the download section, and
    more importantly, it appears on the store where the app was published. The app’s
    icon holds a lot of sway when creating the first impressions about an app. It’s
    a good idea to put some work into this and read Google’s guidelines regarding
    icons; you can read about it at [`http://bit.ly/androidreleaseiconguidelines`](http://bit.ly/androidreleaseiconguidelines).
    While you’re at it, also visit [`https://romannurik.github.io/AndroidAssetStudio/`](https://romannurik.github.io/AndroidAssetStudio/)—this
    resource will save you plenty of time when generating assets for your app.


    You also need to pay attention to the graphical assets like screen captures and
    the text for promotional copy. Make sure you read Google''s guidelines for graphical
    assets; you can read it here: [`http://bit.ly/androidreleasegraphicassets`](http://bit.ly/androidreleasegraphicassets).


    ### Configure the App for Release


    1.  **Check the package name**—The app may have started as an exercise or throwaway
    code, and then it grew and took on a life of its own. You may want to check the
    package name of the app. Make sure it isn’t still **com.example.myapp**. The package
    name makes the app unique across the Google marketplace; and once you decide on
    a package name, you can’t change it anymore. So, give it some thought. You already
    know how to change this; we covered this in the Gradle chapter; remember?


    2.  **Deal with the debug information**—Make sure the android:debuggable attribute
    in the `<application>` tag of the Manifest is removed; you just need to check,
    really, because Android Studio would have removed this automatically when you
    change the mode to “release.”


    3.  **Remove the Log statements**—Different developers do this differently. Some
    would go through the code and remove the statements (painfully) manually. Some
    would write *sed* or *awk* programs to strip away the log statements. Some would
    use *ProGuard* and others would use third-party tools like *Timber* to take care
    of logging activities. It’s up to you which you will use; but make sure that your
    users won’t accidentally see the log information—if you haven’t made up your mind
    yet, I would really urge you to try *Timber*.


    4.  **Check the application’s permissions**—Sometime during development, you may
    have experimented on some features of the application, and you may have set permissions
    on the manifest like permission to use the network, write to external storage,
    and so on. Review the `<uses-permission>` tag on the manifest and make sure that
    you don''t grant permissions that the application does not need.


    5.  **Check remote servers and URLs**—If your application relies on web APIs or
    cloud services, make sure that the release build of the app is using production
    URLs and not test paths. You may have been given sandboxes and test URLs during
    development; you need to switch them up to the production version.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项和示例，对给定的英文文本进行翻译。\n\n\n```java\npublic class\
    \ MainActivity extends AppCompatActivity {\n    private AppDatabase db;\n    @Override\n\
    \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n        Button btn = (Button)\
    \ findViewById(R.id.button);\n        btn.setOnClickListener(new View.OnClickListener()\
    \ {\n            @Override\n            public void onClick(View v) {\n      \
    \          saveData();\n                System.out.println(\"Clicked\");\n   \
    \         }\n        });\n        db = AppDatabase.getInstance(this);  // ❶\n\
    \    }\n\n    private void saveData() {\n        final String mlastname = ((TextView)\
    \ findViewById(R.id.txtlastname)).getText().toString();\n        final String\
    \ mfirstname = ((TextView) findViewById(R.id.txtfirstname)).getText().toString();\
    \ // ❷\n        new Thread(new Runnable() { // ❸\n            @Override\n    \
    \        public void run() {\n                Person person = new Person(mlastname,\
    \ mfirstname); // ❹\n                PersonDAO dao = db.getPersonDAO(); // ❺\n\
    \                dao.insertPerson(person); // ❻\n                List people =\
    \ dao.listPeople(); // ❼\n                for(Person p:people) { // ❽\n      \
    \              System.out.printf(\"%s , %s\\n\", p.last_name, p.first_name );\n\
    \                }\n            }\n        }).start();\n    }\n}\n```\n\n在实际应用中，您可能不会在像\
    \ Activity 这样的 UI 控制器中直接访问数据库；您可能希望将其放入 ViewModel 类中。这样，UI 控制器的职责就仅限于展示数据，而不是充当数据模型。\n\
    \n如果您将 Room 与 `ViewModel` 和 `LiveData` 结合使用，它可以提供响应更快的 UI 体验。我在这里没有涉及，但学完本章后，这是值得尝试的极佳练习。\n\
    \n## 总结\n\n*   `AppCompatActivity` 对象现在是生命周期所有者。您可以编写另一个类来监听生命周期所有者的生命周期变化，并做出相应的反应；`Fragment`\
    \ 也是生命周期所有者——在使用生命周期感知组件时，别忘了在您的项目中使用 `AndroidX artifacts`。\n\n*   `ViewModel`\
    \ 使您的 UI 数据能够抵御 UI 控制器（如 `Activity` 和 `Fragment`）的销毁和重建。\n\n*   `LiveData` 使您的\
    \ UI 对象和模型数据之间的关系变为双向。一方的变化会自动反映在另一方。\n\n*   Room 是用于 `SQLite` 的 ORM。它是一个官方解决方案，也是架构组件的一部分——我们几乎没有什么理由不使用它。\n\
    \n# 17. 发布应用\n\n*本章将涵盖：*\n\n*   发布前的准备\n*   为应用签名\n*   Google Play\n*   App bundle\n\
    \n您可以相当自由且不受太多限制地分发您的应用；您可以让用户从您的网站、Google Drive、Dropbox 等渠道下载。如果您愿意，甚至可以直接通过电子邮件将应用发送给用户；但许多开发者选择在\
    \ Google 或 Amazon 等市场上发布应用，以最大限度地扩大覆盖面。将应用发布在可信的数字市场上的另一个原因是，这些市场是值得信赖的。当应用不是从可信来源下载时，它不能立即使用；用户会收到一个通知，提示该应用并非来自可信来源。\n\
    \n在本章中，我们将讨论将您的应用发布到 Google Play 所需完成的工作。\n\n## 准备发布应用\n\n在向公众发布应用时，您需要注意以下几件事：\n\
    \n1.  准备发布所需的材料和素材\n2.  配置应用以进行发布\n3.  构建一个可以发布的应用\n\n### 准备发布材料和素材\n\n您的代码很优秀，您甚至可能认为它很巧妙，但用户永远看不到。用户看到的是您的\
    \ `View` 对象、图标和其他图形素材。您应该完善它们。\n\n如果您认为应用的图标无关紧要，那可能是个错误。图标有助于用户在主页屏幕上识别您的应用。这个图标还会出现在启动器窗口和下载区域等其他位置，更重要的是，它会出现在发布应用的商店中。在为用户建立对应用的第一印象时，应用图标起着很大的作用。在此方面投入一些精力并阅读\
    \ Google 关于图标的指南是个好主意；您可以访问 [`http://bit.ly/androidreleaseiconguidelines`](http://bit.ly/androidreleaseiconguidelines)\
    \ 了解相关信息。顺便，也请访问 [`https://romannurik.github.io/AndroidAssetStudio/`](https://romannurik.github.io/AndroidAssetStudio/)——在为您的小应用程序生成素材时，这个资源能为您节省大量时间。\n\
    \n您还需要关注图形素材，如屏幕截图和宣传文案的文本。请务必阅读 Google 关于图形素材的指南；您可以在此处阅读： [`http://bit.ly/androidreleasegraphicassets`](http://bit.ly/androidreleasegraphicassets)。\n\
    \n### 配置应用以进行发布\n\n1.  **检查包名**——应用开始可能只是一个练习或一次性代码，然后它逐渐发展壮大，拥有了自己的生命。您可能需要检查应用的包名。确保它不是仍然为\
    \ `com.example.myapp`。包名使应川在 Google 市场中具有唯一性；一旦您确定了包名，就无法再更改。所以，请三思而后行。您已经知道如何更改它；我们在\
    \ Gradle 章节中已经讲过，还记得吗？\n\n2.  **处理调试信息**——确保清单文件中 `<application>` 标签内的 `android:debuggable`\
    \ 属性已被移除；您只需要检查一下，因为当您将模式更改为“release”时，Android Studio 会自动将其移除。\n\n3.  **移除 Log\
    \ 语句**——不同的开发者有不同的做法。有些人会遍历代码并手动（痛苦地）删除语句。有些人会编写 `sed` 或 `awk` 程序来剥离日志语句。有些人会使用\
    \ `ProGuard`，还有其他人会使用像 `Timber` 这样的第三方工具来处理日志记录活动。使用哪种方法由您决定；但请确保您的用户不会意外看到日志信息——如果您还没想好，我强烈建议您尝试一下\
    \ `Timber`。\n\n4.  **检查应用的权限**——在开发过程中的某个时候，您可能测试了应用的某些功能，并且可能在清单文件中设置了权限，例如使用网络、写入外部存储的权限等。请检查清单文件中的\
    \ `<uses-permission>` 标签，确保没有授予应用不需要的权限。\n\n5.  **检查远程服务器和 URL**——如果您的应用程序依赖于\
    \ Web API 或云服务，请确保应用的发布版本使用的是生产环境的 URL，而不是测试路径。在开发过程中，您可能获得了沙盒环境和测试 URL；您需要将它们切换为生产版本。\n"
- fmt: '# Build a Release-Ready Application


    During development, `Android Studio` did quite a few things for you; it:


    1. Created a debug certificate

    2. Assembled all your project’s assets, config files, and runtime binaries into
    an `APK`

    3. Signed the `APK` using a debug certificate

    4. Deployed the `APK` to an emulator or a connected device


    All these things happened in the background; you didn’t have to do anything else
    but write your codes. Now, you need to take care of that certificate. `Google
    Play` and other similar marketplaces won’t distribute an app signed with a debug
    certificate. It needs to be a proper certificate. You don’t need a certificate
    authority like `Thawte` or `Verisign`; a self-signed certificate will suffice.


    In the next steps, we’ll generate a signed bundle or `APK`. You already know what
    an `APK` is—it’s the package that contains your application. It’s what you upload
    to `Google Play`. A bundle, on the other hand, is a lot like an `APK`, but it’s
    a newer upload format. Like the `APK`, it also includes all your app’s compiled
    code and resources, but it defers `APK` generation. It’s a new app serving model
    called `Dynamic Delivery`. It uses your app bundle to generate and serve optimized
    `APK` for each user’s device configuration—so they download only the code and
    resources that are needed to run your app. You don’t have to build, sign, and
    manage multiple `APK`s anymore.


    In `Android Studio`, the steps to generate an `APK` and a bundle are almost identical.
    In the following steps, we’ll see how to generate both the bundle and an `APK`.


    Launch `Android Studio`, if it isn’t open yet. Open the project, then from the
    main menu bar, go to **Build** ➤ **Generate Signed Bundle or APK**, as shown in
    Figure [17-1](#457413_2_En_17_Chapter.xhtml#Fig1).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig1_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig1_HTML.jpg)


    Figure 17-1 Generate signed APK


    Choose either **Bundle** or **APK**, then click **Next**; in this example, I chose
    to create a bundle. When you click **Next**, you will see the "Keystore" dialog,
    as shown in Figure [17-2](#457413_2_En_17_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig2_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig2_HTML.jpg)


    Figure 17-2 Keystore dialog


    The **Key store path** is asking where our Java Keystore (`JKS`) file is. At this
    point, you don’t have it yet. So, click **Create New**. You’ll see the dialog
    window for creating a new keystore, as shown in Figure [17-3](#457413_2_En_17_Chapter.xhtml#Fig3).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig3_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig3_HTML.jpg)


    Figure 17-3 New keystore


    Table [17-1](#457413_2_En_17_Chapter.xhtml#Tab1) shows the description for the
    input items of the keystore.


    Table 17-1 Keystore items and description


    | Keystore items | Description |

    | --- | --- |

    | `Keystore path` | The location where you want to keep the keystore. This is
    entirely up to you. Just make sure you remember this location |

    | `Password` | This is the password for the keystore; don’t lose this, and make
    sure you remember this one—otherwise, you’ll need to create another keystore file
    |

    | `Alias` | This alias identifies the key. It’s just a friendly name for it |

    | `(Key) Password` | This is the password for the key. This is NOT the same password
    as the keystore’s (but you can use the same password if you like) |

    | `Validity, in years` | The default is 25 years; you can just accept the default.
    If you publish on `Google Play`, the certificate must be valid until October of
    2033—so, 25 years should be fine |

    | `Other information` | Only the first and last name fields are required |


    When you’re done filling up the **New Key Store** dialog, click **OK**. This will
    bring you back to the **Generate Signed Bundle or APK** window, as shown in Figure
    [17-4](#457413_2_En_17_Chapter.xhtml#Fig4); but now, the `JKS` file is created
    and the **Keystore** dialog is populated with it.


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig4_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig4_HTML.jpg)


    Figure 17-4 Generate Signed Bundle or APK, populated


    Click **Next**. Now we choose the destination of the signed bundle as shown in
    Figure [17-5](#457413_2_En_17_Chapter.xhtml#Fig5).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig5_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig5_HTML.jpg)


    Figure 17-5 Signed APK, APK destination folder


    You need to remember the location of the "Destination Folder," as shown in Figure
    [17-5](#457413_2_En_17_Chapter.xhtml#Fig5). This is where `Android Studio` will
    store the signed bundle. Also, make sure that the **Build type** is set to "release."


    When you click **Finish**, `Android Studio` will generate the signed bundle for
    your app. This is the file that you will submit to `Google Play`.


    ## Releasing the App


    Before you can submit an app to `Google Play`, you’ll need a developer account.
    If you don’t have one yet, you can sign up at [`https://developer.android.com`](https://developer.android.com).
    There’s a lot of assumptions I’m making about the next activities. I’m assuming
    that:


    1. You already have a Google account (`Gmail`).

    2. You’re using `Google Chrome` to go to [`https://developer.android.com`](https://developer.android.com).

    3. Your Google account is logged on to `Chrome`.


    If your Google account isn’t logged on to `Chrome`, you might see something like
    Figure [17-6](#457413_2_En_17_Chapter.xhtml#Fig6). `Chrome` will ask you to select
    an account (or create one).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig6_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig6_HTML.jpg)


    Figure 17-6 Choose an account


    When you get your Google account sorted out, you’ll be taken to the [`https://developer.android.com`](https://developer.android.com)
    website, as shown in Figure [17-7](#457413_2_En_17_Chapter.xhtml#Fig7).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig7_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig7_HTML.jpg)


    Figure 17-7 Android Developers website


    Click **Google Play**, as shown in Figure [17-7](#457413_2_En_17_Chapter.xhtml#Fig7).


    Click **Launch Play Console**, as shown in Figure [17-8](#457413_2_En_17_Chapter.xhtml#Fig8).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig8_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig8_HTML.jpg)


    Figure 17-8 Launch Play Console


    You need to go through four steps to complete the registration (shown in Figure
    [17-9](#457413_2_En_17_Chapter.xhtml#Fig9)):


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig9_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig9_HTML.jpg)


    Figure 17-9 Google Play Console, sign up


    1. Sign in with your Google account.

    2. Accept the developer agreement.

    3. Pay the registration fee.

    4. Complete your account details.


    Once you have completed the registration and one-time payment, you will now have
    access to the `Google Play Console`, as shown in Figure [17-10](#457413_2_En_17_Chapter.xhtml#Fig10).


    ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig10_HTML.jpg](images/457413_2_En_17_Chapter/457413_2_En_17_Fig10_HTML.jpg)


    Figure 17-10 Google Play Console


    This is where you can start the process of submitting your app to the store. Click
    the "Create Application" button to get started.'
