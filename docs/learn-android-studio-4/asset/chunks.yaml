- fmt: '# View and ViewGroup Objects


    A UI is simply a collection of user interface elements such as text input element,
    text label, buttons, and so on. In the example code shown in Listing [6-1](#457413_2_En_6_Chapter.xhtml#PC1),
    we have one UI element, the `TextView`. This is the element that holds the text
    “Hello World.” In Android speak, the `TextView` is called a `View` object; some
    people also refer to these as widgets, and some others with web programming background
    may refer to these as input elements or form elements—we’re in Android world now,
    so we’ll call them `View` objects or simply `Views`.


    A `View` object is a composition unit. You build a UI by arranging one or more
    `View` objects alongside each other or sometimes embedded in each other. There
    are two kinds of views as the Android library defines it, a `View` and a `ViewGroup`.
    An example of a `View` object is a button or a text field. These objects are meant
    to be composed alongside other views, but they are not meant to contain child
    views; they are intended to stand alone. A `ViewGroup`, on the other hand, can
    contain child views—it’s the reason why they’re sometimes called containers.


    Figure [6-2](#457413_2_En_6_Chapter.xhtml#Fig2) shows the class hierarchy of some
    of the more common UI elements. Every item in a user interface is a child of the
    `android.view.View` class. We can use prebuilt user interface elements in the
    Android SDK such as `TextView`, `Button`, `ProgressBar`, and so on, or, if need
    be, we can construct custom controls (widgets or views are sometimes called “controls”)
    by either (1) subclassing existing elements like `TextView`, (2) subclassing the
    `View` class itself and ultimately drawing a custom widget from scratch, or (3)
    subclassing the `ViewGroup` and embedding other widgets in it; this is known as
    a *composite view* —the `RadioGroup` in Figure [6-2](#457413_2_En_6_Chapter.xhtml#Fig2)
    is an example of such.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig2_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig2_HTML.jpg)


    Figure 6-2 ViewGroup class hierarchy


    Each `View` object ultimately becomes a Java object at runtime, but we work with
    them as XML elements during design time. We don’t have to worry about how Android
    inflates the XML into Java objects because that process is invisible to us. It
    happens behind the scenes; Figure [6-3](#457413_2_En_6_Chapter.xhtml#Fig3) shows
    the logical representation of the Android compilation process.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig3_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig3_HTML.jpg)


    Figure 6-3 Android compilation process


    The compiler transforms the program source files into Java byte codes. The resulting
    byte codes are then further converted to a DEX file. A DEX file is a Dalvik Executable;
    it’s the executable format that the Android Runtime (ART) understands. Before
    the DEX files and other resources get wrapped into an Android package (APK), it
    also produces as a side effect a special file named `R.class`. We use the `R.class`
    to get a programmatic reference to the UI elements defined in the layout file.


    ## Containers


    Apart from creating composite views, the `ViewGroup` class has another use. They
    form the basis for layout managers. A layout manager is a container responsible
    for controlling how child views are positioned on the screen, relative to the
    container and each other. Android comes with a couple of prebuilt layout managers;
    Table [6-1](#457413_2_En_6_Chapter.xhtml#Tab1) shows us some of them.


    Table 6-2 Project information for the Hello app


    | Project detail | Value |

    | --- | --- |

    | Application name | ActivitySample |

    | Company domain | Use your website name |

    | Language | Java |

    | Form factor | Phone and tablet |

    | Minimum SDK | API 29 (Q) Android 10 |

    | Type of activity | Empty |

    | Activity name | MainActivity |

    | Layout name | activity_main |


    Table 6-1 Layout managers


    | Layout manager | Description |

    | --- | --- |

    | LinearLayout | Positions the widgets in single row or column, depending on the
    selected orientation. Each widget can be assigned a weight value which determines
    the amount of space the widget occupies compared to the other widgets |

    | TableLayout | Arranges the widgets in a grid format of rows and columns |

    | FrameLayout | Stacks child views on top of each other. The last entry on the
    XML layout file is the one on top of the stack |

    | RelativeLayout | Views are positioned relative to other views and the container
    by specifying alignments and margins on each view |

    | ConstraintLayout | The `ConstraintLayout` is the newest layout. It positions
    widgets relative to each other and the container (like `RelativeLayout`). But
    it accomplishes the layout management by using more than just alignments and margins.
    It introduces the idea of a “constraint” object, which anchors a widget to target.
    This target could be another widget or a container or another anchor point. This
    is the layout we will use for most of our examples in this book |


    There is more to learn about Views, containers, and layouts, but we know enough
    to create some decent projects. Let’s move on to the `Activity` class.


    ## Activity Class


    An `Activity` class must inherit from `android.app.Activity`, either directly
    or indirectly, but we usually don’t inherit from this class directly; instead,
    we extend the `AppCompatActivity` class to run the app on older versions of Android
    but still use modern UI elements. The “Compat” in the class name stands for “compatibility.”


    While the layout file contains the definitions for the Views (buttons, text fields,
    etc.), the `Activity` class is responsible for the behavior; this is where we
    write the codes when we want something to happen in response to a user action,
    like a button click. When you create an “empty Activity” project, the `Activity`
    class you’ll get looks like the code in Listing [6-2](#457413_2_En_6_Chapter.xhtml#PC2).


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    public class MainActivity extends AppCompatActivity { ❶

    @Override  ❷

    protected void onCreate(Bundle savedInstanceState) { ❸

    super.onCreate(savedInstanceState);  ❹

    setContentView(R.layout.activity_main); ➀

    }

    }

    Listing 6-2

    MainActivity.java

    ```


    ❶   We inherit from `AppCompatActivity`, which is a child class of `android.app.Activity`
    class. All `Activity` classes must inherit from `android.app.Activity` one way
    or another, but as you can see, the project creation wizard gave us `AppCompatActivity`.
    This is the recommended superclass for an `Activity`


    ❷   The `@Override` annotation tells the compiler that we intend to override the
    method immediately following the annotation.


    ❸   `onCreate()` is one of the lifecycle methods of the `Activity` class. The
    Android Runtime calls this method right after the user launches the app. This
    is a good place to write initialization codes.


    ❹   We call the `onCreate()` method in the superclass (`AppCompatActivity`). This
    is necessary, so we don’t break the chain of calls within the `onCreate` methods.
    If we don’t call this method, the codes inside the `onCreate` of `AppCompatActivity`
    (which is our superclass) won’t run; that will result in errors.


    ➀   The `setContentView` method selects which View resource to display when the
    `Activity` becomes visible to the user. This method is overloaded; you can pass
    an integer (which points to a resource ID) or an instance of a `View` object.
    In this case, we passed a resource ID. You may recall that our layout file is
    named `/res/layout/activity_main.xml`. You may also recall that during the compilation
    process, an `R.class` was generated for our convenience so we can reference UI
    resources programmatically—`R.layout.activity_main` points to the file `/res/layout/activity_main.xml`.
    In this statement, we are associating `MainActivity.java` with `activity_main.xml`.'
