  raw: '### Setting Up a Simple Test


    Let’s set up a simple project, something that has an empty Activity. Listing [13-4](#457413_2_En_13_Chapter.xhtml#PC6)
    shows the XML layout code, and Listing [13-5](#457413_2_En_13_Chapter.xhtml#PC7)
    shows the MainActivity code.


    ```


    Listing 13-4

    activity_main.xml

    ```


    The layout code is fairly simple, as you can see; it has one TextView and two
    Buttons. Both Buttons will call the **onClick()** method in MainActivity when
    the user clicks it.


    ```

    public class MainActivity extends AppCompatActivity {

    TextView txtview;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    txtview = (TextView) findViewById(R.id.textView);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.btnhello:

    txtview.setText("hello");

    break;

    case R.id.btnworld:

    txtview.setText("world");

    break;

    }

    }

    }

    Listing 13-5

    MainActivity

    ```


    The **onClick()** method in MainActivity tries to get the Button’s id that got
    clicked and routes program logic according to that. If *btnhello* were clicked,
    we would set the text content of the TextView to “hello,” and if *btnworld* were
    clicked, we’d set the content to “world”—it’s simple enough. To verify this behavior,
    we can set up an instrumented test.


    In the previous chapter, we wrote the test class in *src/test* because those were
    the JVM test. We will then write the test class inside *src/androidTest*; this
    will be an instrumented test. Listing [13-6](#457413_2_En_13_Chapter.xhtml#PC8)
    shows the code for our instrumented test class.


    | ❶ | You’d want to import the Espresso matchers, actions statically, and *asserts*
    so you won’t have to qualify them later in the code fully. |

    | ❷ | This just intercepts our test method calls and makes sure that the Activity
    is launched before we perform any test. |

    | ❸ | You need to annotate each test method with @Test. |

    | ❹ | Find the *btnhello* object using the **withId()** method. |

    | ❺ | Then we simulate a click using a **ViewAction.click()**. |

    | ❻ | Then we find the TextView, using a **withId()** method again. |

    | ❼ | Finally, we assert if the TextView contains the text “hello.” |


    ```

    import android.support.test.rule.ActivityTestRule;

    import android.support.test.runner.AndroidJUnit4;

    import org.junit.Rule;

    import org.junit.Test;

    import static android.support.test.espresso.Espresso.onView;  ❶

    import static android.support.test.espresso.action.ViewActions.click;

    import static android.support.test.espresso.assertion.ViewAssertions.matches;

    import static android.support.test.espresso.matcher.ViewMatchers.withId;

    import static android.support.test.espresso.matcher.ViewMatchers.withText;

    public class MainActivityTest {

    @Rule ❷

    public ActivityTestRule mActivityTestRule = new ActivityTestRule(MainActivity.class);

    @Test ❸

    public void buttonHelloTest() {

    onView(withId(R.id.btnhello)) ❹

    .perform(click());        ❺

    onView(withId(R.id.textView)) ❻

    .check(matches(withText("hello"))); ❼

    }

    @Test

    public void buttonWorldTest() {

    onView(withId(R.id.btnworld))

    .perform(click());

    onView(withId(R.id.textView))

    .check(matches(withText("world")));

    }

    }

    Listing 13-6

    MainActivityTest

    ```


    You can run the instrumented test the same way you run the JVM test. You can either


    *   Click the arrows in the IDE gutter.


    *   Right-click the test and use the context-sensitive menu, then choose “Run
    MainActivityTest.” or


    *   Go to the main menu bar, choose Run ➤ Run, then select MainActivityTest.


    ### Recording Espresso Tests


    Android Studio includes a feature where you can run your app, record the interaction,
    and create an Espresso test using the recording. Go to the main menu bar, then
    **Run** ➤ **Record Espresso Test**, as shown in Figure [13-12](#457413_2_En_13_Chapter.xhtml#Fig12).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig12_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig12_HTML.jpg)


    Figure 13-12


    Record Espresso Test


    After choosing the “Record Espresso Test,” you can now interact with the app,
    like usual, but this time, the interaction is recorded. If you click one of the
    buttons, say the “HELLO” button, the test recorder screen will pop up, as shown
    in Figure [13-13](#457413_2_En_13_Chapter.xhtml#Fig13).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig13_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig13_HTML.jpg)


    Figure 13-13


    Espresso recorder


    | ❶ | This section shows you each interaction you had with the app. At this point,
    I clicked the app once only; I clicked the “HELLO” button. |

    | ❷ | This section is the *ViewMatcher* but done visually. If you click the TextView,
    like what I did here, it goes over as an item to the “Edit Assertion” section.
    |

    | ❸ | The TextView is selected here because I clicked it in the ViewMatcher section
    (item 2). |

    | ❹ | This is where you choose the assertion. In this case, we’re merely using
    the “text is.” |

    | ❺ | This shows the actual value of the TextView we’d like to assert. |


    You can click “Save and Add Another” if you’d like to add another test or “Save
    Assertion” and finish the recording. Figure [13-14](#457413_2_En_13_Chapter.xhtml#Fig14)
    shows the next screen.


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig14_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig14_HTML.jpg)


    Figure 13-14


    Espresso recorder, assertion saved


    When you click OK, the recorder will prompt the class’ name, where it will save
    the recording as a test class, as shown in Figure [13-15](#457413_2_En_13_Chapter.xhtml#Fig15).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig15_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig15_HTML.jpg)


    Figure 13-15


    Espresso test, test saved


    When you go to the src/androidTest folder, you’ll find the newly generated test
    class from your recording. You can now run the generated test, the same way you
    ran MainActivityTest earlier.


    Note


    Two factoids about Espresso: (1) The Espresso recorder is one of the most used
    tools when using Espresso, according to Android Studio analytics; (2) Espresso
    recorder was originally named “cassette.”


    ### More on Espresso Matchers


    Espresso has a variety of matchers, but the one that’s commonly used is the ViewMatchers—it’s
    what we used in the earlier examples. Here are the other matchers in Espresso:


    *   **CursorMatchers**—You can use this for Android Adapter Views that are backed
    by Cursors to match specific data rows.


    *   **LayoutMatchers**—To match and detect typical layout issues, for example,
    TextViews that have ellipsis or multiline texts.


    *   **RootMatchers**—To match Root objects that are dialogs or Roots that can
    receive touch events.


    *   **PreferenceMatchers**—To match Android Preferences and let us find View components
    based on their key, summary text, and so on.


    *   **BoundedMatchers**—To create your custom matcher for a given type.


    In the previous examples, we used the ViewMatcher to find Views via their ids.
    We can find Views using other things such as


    *   **Its value**—You can use the **withText()** method to find a View that matches
    a certain String expression.


    *   **The number of its child**—Using the **hasChildCount()** method, you can
    match a View with a particular child count.


    *   **Its class name**—Using the **withClassName()** method


    ViewMatchers can also tell us whether a View object is


    *   **Enabled**—By using the **isEnabled()** method


    *   **Focusable**—By using the **isFocusable()** method


    *   **Displayed**—isDisplayed()


    *   **Checked**—isChecked()


    *   **Selected**—isSelected()


    There are plenty more methods you can use in the ViewMatchers class, so make sure
    to check them out at [`https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers`](https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers).'
