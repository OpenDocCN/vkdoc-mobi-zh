    \nFigure 4-9\n\nDistraction free mode\n\nYou may also try two other modes that\
    \ can increase the screen real estate. They’re also found on the View menu from\
    \ the main menu bar.\n\n*   Presentation mode\n\n*   Full screen\n\n## Project\
    \ Tool Window\n\nYou can work with the project’s files and assets via the Project\
    \ tool window, as shown in Figure [4-10](#457413_2_En_4_Chapter.xhtml#Fig10).\
