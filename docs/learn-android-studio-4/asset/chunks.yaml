    world\");\n                break;\n        }\n    }\n}\n清单 13-5\nMainActivity\n\
    ```\n\n`MainActivity` 中的 `onClick()` 方法会尝试获取被点击的 `Button` 的 id，并据此路由程序逻辑。如果点击了\
    \ `btnhello`，我们就将 `TextView` 的文本内容设置为“hello”；如果点击了 `btnworld`，则将其内容设置为“world”——这足够简单。为了验证这一行为，我们可以建立一个仪器化测试。\n\
    \n在上一章中，我们在 `src/test` 下编写测试类，因为那些是 JVM 测试。接下来，我们将在 `src/androidTest` 下编写测试类；这将是一个仪器化测试。清单\
    \ 13-6 展示了我们的仪器化测试类的代码。\n\n- ❶ 你需要静态导入 Espresso 的匹配器（matchers）、动作（actions）和断言（`asserts`），这样之后在代码中就无需使用完整限定名。\n\
    - ❷ 这行代码会拦截我们的测试方法调用，并确保在执行任何测试之前 `Activity` 已被启动。\n- ❸ 你需要使用 `@Test` 注解每个测试方法。\n\
    - ❹ 使用 `withId()` 方法找到 `btnhello` 对象。\n- ❺ 然后我们使用 `ViewAction.click()` 模拟一次点击。\n\
    - ❻ 接着，我们再次使用 `withId()` 方法找到 `TextView`。\n- ❼ 最后，我们断言 `TextView` 包含文本“hello”。\n\
    \n```\nimport android.support.test.rule.ActivityTestRule;\nimport android.support.test.runner.AndroidJUnit4;\n\
    import org.junit.Rule;\nimport org.junit.Test;\nimport static android.support.test.espresso.Espresso.onView;\
    \  ❶\nimport static android.support.test.espresso.action.ViewActions.click;\n\
    import static android.support.test.espresso.assertion.ViewAssertions.matches;\n\
    import static android.support.test.espresso.matcher.ViewMatchers.withId;\nimport\
    \ static android.support.test.espresso.matcher.ViewMatchers.withText;\npublic\
    \ class MainActivityTest {\n    @Rule ❷\n    public ActivityTestRule mActivityTestRule\
    \ = new ActivityTestRule(MainActivity.class);\n    @Test ❸\n    public void buttonHelloTest()\
    \ {\n        onView(withId(R.id.btnhello)) ❹\n        .perform(click());     \
    \   ❺\n        onView(withId(R.id.textView)) ❻\n        .check(matches(withText(\"\
    hello\"))); ❼\n    }\n    @Test\n    public void buttonWorldTest() {\n       \
    \ onView(withId(R.id.btnworld))\n        .perform(click());\n        onView(withId(R.id.textView))\n\
    \        .check(matches(withText(\"world\")));\n    }\n}\n清单 13-6\nMainActivityTest\n\
    ```\n\n你可以像运行 JVM 测试一样运行这个仪器化测试。你可以：\n\n- 点击 IDE 侧边栏的箭头。\n- 右键点击测试并使用上下文菜单，然后选择“Run\
    \ MainActivityTest”。\n- 前往主菜单栏，选择 `Run` ➤ `Run`，然后选择 `MainActivityTest`。\n\n###\
    \ 录制 Espresso 测试\n\nAndroid Studio 包含一项功能，你可以运行你的应用、记录交互，并利用录制内容创建 Espresso 测试。前往主菜单栏，然后选择\
    \ `Run` ➤ `Record Espresso Test`，如图 13-12 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig12_HTML.jpg](img/457413_2_En_13_Fig12_HTML.jpg)\n\
    \n*图 13-12: 录制 Espresso 测试*\n\n选择“Record Espresso Test”后，你现在可以像往常一样与应用交互，但这次交互会被记录下来。如果你点击其中一个按钮，比如“HELLO”按钮，测试录制器屏幕就会弹出，如图\
    \ 13-13 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig13_HTML.jpg](img/457413_2_En_13_Fig13_HTML.jpg)\n\
    \n*图 13-13: Espresso 录制器*\n\n- ❶ 这一部分显示了你与应用的每一次交互。此时，我只点击了应用一次；我点击了“HELLO”按钮。\n\
    - ❷ 这一部分是 `ViewMatcher`，但以可视化方式呈现。如果你像我一样点击 `TextView`，它就会作为一个项目添加到“Edit Assertion”部分。\n\
    - ❸ 此处选择了 `TextView`，因为我在 `ViewMatcher` 部分（第 2 项）点击了它。\n- ❹ 在这里选择断言。在这个例子中，我们仅使用“text\
    \ is”。\n- ❺ 这显示了我们要断言的 `TextView` 的实际值。\n\n如果你想添加另一个测试，可以点击“Save and Add Another”，或者点击“Save\
    \ Assertion”完成录制。图 13-14 显示了下一个界面。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig14_HTML.jpg](img/457413_2_En_13_Fig14_HTML.jpg)\n\
    \n*图 13-14: Espresso 录制器，断言已保存*\n\n当你点击 OK，录制器会提示输入类名，并将录制内容保存为一个测试类，如图 13-15\
    \ 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig15_HTML.jpg](img/457413_2_En_13_Fig15_HTML.jpg)\n\
    \n*图 13-15: Espresso 测试，测试已保存*\n\n当你前往 `src/androidTest` 文件夹时，会发现从录制内容中新生成的测试类。现在你可以像之前运行\
    \ `MainActivityTest` 一样运行这个生成的测试。\n\n**注意：**关于 Espresso 的两个小知识：(1) 根据 Android\
    \ Studio 分析数据，Espresso 录制器是使用 Espresso 时最常用的工具之一；(2) Espresso 录制器的原名叫“cassette”。\n\
    \n### 更多关于 Espresso 匹配器\n\nEspresso 有多种匹配器，但最常用的是 `ViewMatchers`——我们在之前的例子中使用的就是它。以下是\
    \ Espresso 中的其他匹配器：\n\n- `CursorMatchers` — 可用于由 Cursor 支持的 Android Adapter Views，以匹配特定的数据行。\n\
    - `LayoutMatchers` — 用于匹配和检测典型的布局问题，例如，含有省略号或多行文本的 TextViews。\n- `RootMatchers`\
    \ — 用于匹配作为对话框或可以接收触摸事件的 Root 对象。\n- `PreferenceMatchers` — 用于匹配 Android Preferences，并让我们根据其键、摘要文本等来查找\
    \ View 组件。\n- `BoundedMatchers` — 用于为给定类型创建自定义匹配器。\n\n在之前的示例中，我们使用 `ViewMatcher`\
    \ 通过 id 查找 Views。我们还可以通过其他方式来查找 Views，例如：\n\n- **其值** — 你可以使用 `withText()` 方法来查找与某个特定字符串表达式匹配的\
    \ View。\n- **其子元素的数量** — 使用 `hasChildCount()` 方法，你可以匹配具有特定子元素数量的 View。\n- **其类名**\
    \ — 使用 `withClassName()` 方法。\n\n`ViewMatchers` 还可以告诉我们一个 `View` 对象是否是：\n\n- **已启用**\
    \ — 通过使用 `isEnabled()` 方法\n- **可聚焦** — 通过使用 `isFocusable()` 方法\n- **已显示** — `isDisplayed()`\n\
    - **已勾选** — `isChecked()`\n- **已选中** — `isSelected()`\n\n在 `ViewMatchers` 类中还有更多方法可供使用，请务必通过\
    \ [`https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers`](https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers)\
    \ 进行查阅。\n"
- fmt: '### Espresso Actions


    `Espresso Actions` let you interact with `View` objects programmatically during
    a test. We’ve used the `click` earlier, but there’s a lot more that `ViewActions`
    will let you do. The method names are very descriptive, so they don’t need further
    explanations; you can see what they do. Here are a few of them:


    *   `clearText()`

    *   `closeSoftKeyboard()`

    *   `doubleClick()`

    *   `longClick()`

    *   `openLink()`

    *   `pressBack()` — Presses the back button

    *   `replaceText(String arg)`

    *   `swipeDown()`

    *   `swipeRight()`

    *   `swipeUp()`

    *   `typeText(String arg)`


    There are more actions available, so make sure you visit the API documentation
    for the `ViewAction` object.


    Before we close the chapter, make sure you visit the official documentation for
    `Espresso` on the Android Developers website: [`https://bit.ly/androidstudioespresso`](https://bit.ly/androidstudioespresso);
    we’ve only scratched the surface of `Espresso` here.


    ### Summary


    *   We’ve talked about various kinds of testing you can do for your apps; you
    don’t have to do them all, but make sure you do the test that applies to your
    app.

    *   Dev testing (unit testing) should be a core development task; try to get into
    the habit of writing your test cases and your actual codes.

    *   Put JVM tests in `src/test` and put instrumented tests in `src/androidTest`.

    *   You can use `Espresso` to create instrumented tests; the two things you’ll
    need in `Espresso` are the `ViewMatchers` and `ViewActions`.

    *   The general steps for writing `Espresso` tests are as follows: (1) find the
    `View` object using `ViewMatchers`, (2) perform an action on the `View` with `ViewActions`,
    and (3) do your assertions.

    *   An easy way to create `Espresso` tests is to use the `Espresso` recorder.


    # 14. Working with Files


    *What we’ll cover:*


    *   Introduction to file I/O of Android

    *   Internal vs. external storage

    *   How to use internal storage


    When you need to work with video, audio, json, or just plain text files, you can
    use the Java file I/O for local files. You’ll use the same `File`, `InputStream`,
    and `OutputWriter`, and other I/O classes in Java—if you’ve worked with them before.
    What will be different in Android is where you save them. In a Java desktop application,
    you can put your files practically anywhere you want. That’s not the case in Android.
    Just like in a Java web application, Android apps are not free to create and read
    files just about anywhere. There are certain places where your app has read and
    write access.


    ## Internal and External Storage


    Android differentiates between internal and external storage. The *internal* storage
    refers to that part of a flash drive that’s shared among all installed applications.
    The *external* storage refers to a storage space that can be mounted by the user—it’s
    typically an sdcard, but it doesn’t have to be. As long as the user can mount
    it, it could be anything; it could even be a portion of the internal flash drive.


    Each option has pros and cons, so you need to consider your app’s needs and each
    option’s limitation. The following list shows some of these pros and cons.


    **Internal storage**


    *   The memory is always available to your app. There is no danger of a user unmounting
    the sdcard or whatever device. It’s guaranteed to be there always.

    *   The storage space will be smaller in size than external storage because your
    app will be allocated only a portion of the flash storage shared by all the other
    apps. This was a concern in earlier versions of Android, but it’s less of a concern
    now. According to the Android Compatibility Definition, as of Android 6.0, an
    Android phone or tablet must have at least 1.5GB of nonvolatile space reserved
    for user space (the `/data` partition). This space should be plenty for most apps.
    You can read the compatibility definition here: [https://bit.ly/android6compatibilitydefinition](https://bit.ly/android6compatibilitydefinition).

    *   When your app creates files in this space, only your app can access them;
    except when the phone is rooted, but most users don’t root their phones, so generally
    it isn’t much of a concern.

    *   When you uninstall your app, all the files it created will be deleted.


    **External storage**


    *   It typically has more space than internal storage.

    *   It may not always be available, for example, when the user removes the sdcard
    or mounted as a USB drive.

    *   All files here are visible to all applications and the user. Anybody and any
    app can create and save files here. They can also delete files.

    *   When an app creates a file in this space, it can outlive the app; when you
    uninstall the app, the files it created won’t be removed.


    ## Cache Directory


    Whether you choose internal or external storage, you may still have to make one
    more decision on a file location. You can put your files on a cache directory
    or somewhere more permanent. The Android OS or third-party apps may reclaim files
    in a cache directory if space is needed. All files that are not in the cache directory
    are pretty safe unless you delete them manually. In this chapter, we won’t work
    with cache directories or external storage. We will use only the internal storage,
    and we’ll put the files in the standard location.'
