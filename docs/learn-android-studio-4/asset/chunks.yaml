  trans: "\n# 如何为代码获取更多屏幕空间\n\n你可以通过关闭所有工具窗口来获得更多屏幕空间。图 4-7 展示了一个在主编辑器中打开的 Java 程序，此时所有工具窗口均已关闭。你可以通过点击任意工具窗口的名称来将其折叠，例如，要折叠“项目”工具窗口，请点击“Project”。\n\
    \n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig7_HTML.jpg](img/457413_2_En_4_Fig7_HTML.jpg)\n\
    \n图 4-7\n\n主编辑器，所有工具窗口已关闭\n\n你甚至可以通过隐藏所有工具窗口栏来获得更多屏幕空间，如图 4-8 所示。\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig8_HTML.jpg](img/457413_2_En_4_Fig8_HTML.jpg)\n\
    \n图 4-8\n\n主编辑器，所有工具窗口已关闭且工具栏已隐藏\n\n进入“无干扰模式”可以获得更多屏幕空间，如图 4-9 所示。你可以通过主菜单栏进入无干扰模式：**View**\
    \ ➤ **Enter Distraction Free Mode**。要退出该模式，请点击主菜单栏中的 **View**，然后选择 **Exit Distraction\
    \ Free Mode**。\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig9_HTML.jpg](img/457413_2_En_4_Fig9_HTML.jpg)\n\
    \n图 4-9\n\n无干扰模式\n\n你还可以尝试另外两种可以增加屏幕空间的模式。它们同样位于主菜单栏的 View 菜单中。\n\n*   演示模式\n\
    *   全屏\n\n## 项目工具窗口\n\n你可以通过“项目”工具窗口处理项目的文件和资源，如图 4-10 所示。它具有树状结构，且各部分可以折叠。你可以在此窗口中启动任何文件。要打开文件，只需双击它。\n\
    \n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig10_HTML.jpg](img/457413_2_En_4_Fig10_HTML.jpg)\n\
    \n图 4-10\n\n项目工具窗口\n\n默认情况下，Android Studio 以 *Android 视图*显示**项目文件**，如图 4-10 所示。“Android\
    \ 视图”按模块组织，以便快速访问项目中最相关的文件。你可以通过点击项目窗口顶部的向下箭头来更改查看项目文件的方式，如图 4-11 所示。\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig12_HTML.jpg](img/457413_2_En_4_Fig12_HTML.jpg)\n\
    \n图 4-12\n\n设置/首选项窗口\n\n![../images/457413_2_En_4_Chapter/457413_2_En_4_Fig11_HTML.jpg](img/457413_2_En_4_Fig11_HTML.jpg)\n\
    \n图 4-11\n\n如何在项目工具窗口中更改视图\n\n## 总结\n\n*   你可以通过增加主编辑器的屏幕空间来查看更多代码。可以通过以下方式实现：\n\
    \    *   折叠所有工具窗口\n    *   隐藏工具窗口栏\n    *   进入无干扰模式\n    *   切换到全屏模式\n*   你可以通过在**项目工具窗口**中切换视图来更改查看项目文件的方式。\n\
    *   在 Android Studio 中添加 TODO 项很简单；只需添加一行注释，后跟 TODO 文本，如下所示：`// TODO This is my\
    \ todo list.`\n\n# 5. Android 应用程序概述\n\n*本章涵盖内容：*\n\n*   Android 项目的构成\n*   Android\
    \ 组件概览\n*   清单文件\n*   意图\n\n既然我们已熟悉 Android Studio，那就让我们更仔细地看看 Android 应用程序的结构。\n\
    \n## Android 项目的构成\n\n一个 Android 应用可能看起来很像一个桌面应用；有些人甚至可能认为它们是微型桌面应用，但这种想法并不正确。Android\
    \ 应用在结构上与其桌面或网络应用对应物不同。桌面应用通常包含其运行所需的所有例程和子例程；偶尔，它可能依赖于动态加载的库，但可执行文件是自包含的。另一方面，Android\
    \ 应用由松散耦合的组件组成，这些组件通过消息传递机制相互通信。图 5-1 展示了一个应用的逻辑结构。\n\n![../images/457413_2_En_5_Chapter/457413_2_En_5_Fig1_HTML.jpg](img/457413_2_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\nAndroid 应用的逻辑表示\n\n图 5-1 中的应用是一个大型应用——它包含了所有内容。你的应用不必这么大。你无需在应用中包含所有类型的组件，只需构建你需要的即可；但学习所有组件（有些需要多了解些）是值得的，尤其是像\
    \ Activities 和 Intents 这样的基础组件。\n\n**注意：** APK 是 Application Package Kit 的缩写。它是\
    \ Android 用于分发和安装应用的包文件格式。如果 Windows 应用通过 EXE 或 MSI 打包，macOS 应用使用 DMG，那么 Android\
    \ 则使用 APK。\n\n`Activity`、`Service`、`BroadcastReceiver` 和 `ContentProvider` 被称为\
    \ *Android 组件*。它们是应用的关键构建块。它们是对有用功能的高级抽象，例如向用户显示屏幕、在后台运行任务以及广播事件以便感兴趣的应用程序可以响应它们。组件是具有非常特定行为的预编码或预构建类，我们通过扩展它们来使用，以便可以添加我们应用程序特有的行为。\n\
    \n构建 Android 应用很像建造房屋。有些人用传统方式建造房屋——他们组装梁、支柱、地板面板等等。他们像工匠一样用原材料手工制作门和其他配件。如果我们用这种方式构建\
    \ Android 应用，可能会花费很长时间，而且可能相当困难。从头开始构建应用所需的技能对于某些程序员来说可能难以掌握。在 Android 中，应用是使用组件构建的。可以把组件想象成房屋的预制件；这些部件是预先制造好的，只需要组装。\n\
    \n`Activity` 是我们放置用户可以看到的内容的地方。它是用户可以执行的特定任务。例如，可以创建一个 `Activity` 让用户查看单个电子邮件或填写表单。在图\
    \ 5-1 中，`Activity` 内部包含 *Views* 和 *Fragments*。Views 是将内容绘制到屏幕上的类；`View` 对象的一些例子包括\
    \ `Button` 和 `TextView`。`Fragment` 在某些方面类似于 `Activity`，它也是一个组成单元，但更小。和 `Activity`\
    \ 一样，它们也包含 `View` 对象。一些应用使用 `Fragment` 来解决在不同外形设备上部署的问题——`Fragment` 可以根据可用的屏幕空间和/或方向来启用或禁用。\n\
    \n**Services**。通过服务，我们可以在后台运行程序逻辑，而不会冻结用户界面。服务在后台运行；当你的应用需要从网络下载文件或播放音乐时，它们会非常有用。\n\
    \n**BroadcastReceivers**。通过广播接收器，我们的应用可以监听来自其他应用或 Android 运行时本身的消息；一个典型的用例是，当电池电量低于\
    \ 10% 时，你可能想要显示一条警告消息。\n"
- fmt: '**ContentProviders** 让你可以编写能与其他应用共享数据的应用，而无需暴露应用 SQL 结构的内部细节。它管理对某种中央数据存储库的访问。数据库访问的细节对其他应用完全隐藏。一个作为
    `ContentProvider` 的预构建应用示例是 Android 中的“联系人”应用。


    你的应用可能需要一些视觉或音频资源；这些就是在图 [5-1](#457413_2_En_5_Chapter.xhtml#Fig1) 中我们所说的“资源”。


    `AndroidManifest` 正如其名；它是一个清单文件，并且是用 XML 编写的。它声明了关于应用的许多内容，例如：


    *   应用的名称。

    *   用户启动应用时首先显示的 `Activity`。

    *   应用中包含哪些类型的组件。如果它包含 `Activity`，清单会声明它们——类名等等。如果应用包含服务，它们的类名也会在清单中声明。

    *   应用能做什么？它有哪些权限？它是否允许访问互联网或相机？它能否记录 GPS 位置等等？

    *   它是否使用了外部库？

    *   此应用将运行在哪些 Android 版本上？

    *   它是否支持特定类型的输入设备？

    *   此应用是否需要特定的屏幕密度？


    如你所见，清单是一个繁忙的地方；有很多东西需要关注。但不必过于担心，这里的大多数条目都是由 Android Studio 的创建向导自动处理的。你可能需要与之交互的少数情况之一，是当你需要为应用添加权限时。


    当 Google Play 在商店中展示你的应用时，清单也很重要。你的应用不会显示在不满足清单文件中规定要求的设备上。


    ## 应用入口点


    一个应用通常与用户交互，并通过 `Activity` 组件来实现。这类应用通常至少包含以下三样东西：


    1.  一个 `Activity` 类，用户在应用启动后首先看到它。

    2.  一个用于该 `Activity` 类的布局文件，其中包含所有 UI 定义，如文本视图、按钮等。

    3.  `AndroidManifest` 文件，它将所有项目资源和组件整合在一起。


    当应用启动时，Android 运行时创建一个 `Intent` 对象并检查清单文件。它寻找 `intent-filter` 节点（在 xml 文件中）的特定值。运行时试图确定应用是否有一个定义的入口点，类似于
    *main function*。代码清单 [5-1](#457413_2_En_5_Chapter.xhtml#PC1) 显示了 Android 清单文件的一个摘录。


    ```

    代码清单 5-1

    Excerpt from AndroidManifest.xml

    ```


    如果应用有多个 `Activity`，那么清单文件中就会有多个 `activity` 节点，每个 `Activity` 对应一个节点。定义的第一行有一个名为
    *android:name* 的属性；这指向一个 `Activity` 的类名。在这个例子中，类的名称是“MainActivity”。


    第二行声明了 *intent-filter*，当你在 `intent-filter` 节点上看到类似 `android.intent.action.MAIN`
    的内容时，这意味着该 `Activity` 是应用的入口点。当应用启动时，用户将看到这个 `Activity`。


    ## 活动（Activities）


    你可以将 `Activity` 视为一个屏幕或窗口。它是一个用户可以与之交互的东西。这是应用的 UI。`Activity` 是一个继承自 *android.app.Activity*
    类的类（以某种方式），但我们通常扩展 `AppCompatActivity` 类（而不是 `Activity`），这样我们既可以使用现代 UI 元素，又能让应用在较旧的
    Android 版本上运行；因此，名称 `AppCompatActivity` 中有“Compat”，它代表“compatibility”。


    一个 `Activity` 组件由两部分组成：一个 Java 类（如果你选择 Kotlin 也可以是 Kotlin 类）和一个 XML 格式的布局文件。布局文件是你放置所有
    UI 定义的地方，例如，文本框、按钮、标签等。Java 类是你编写 UI 所有行为部分代码的地方，例如，按钮被点击时发生什么、在字段中输入文本时发生什么、用户改变设备方向时发生什么、另一个组件向
    `Activity` 发送消息时发生什么，等等。


    与 Android 中的任何其他组件一样，`Activity` 有一个生命周期。每个生命周期事件在 `Activity` 的 Java 类中都有一个关联的方法；我们可以使用这些方法来定制应用的行为。图
    [5-2](#457413_2_En_5_Chapter.xhtml#Fig2) 显示了 `Activity` 的生命周期。


    ![../images/457413_2_En_5_Chapter/457413_2_En_5_Fig2_HTML.jpg](images/457413_2_En_5_Chapter/457413_2_En_5_Fig2_HTML.jpg)


    图 5-2


    Activity 生命周期


    在图 [5-2](#457413_2_En_5_Chapter.xhtml#Fig2) 中，方框显示了 `Activity` 在特定存在阶段的状态。方法调用的名称嵌入在连接这些阶段的箭头中。


    当 Android 运行时启动应用时，它会调用主 `Activity` 的 `onCreate()` 方法，这会将 `Activity` 的状态变为“已创建”。你可以使用此方法执行初始化例程，比如准备事件处理代码等。


    `Activity` 进入下一个状态，即“已启动”；此时 `Activity` 对用户可见，但尚未准备好进行交互。下一个状态是“已恢复”；这是应用与用户交互的状态。


    如果用户点击任何使焦点离开该 `Activity` 的内容（接听电话或启动另一个应用），运行时会暂停当前的 `Activity`，它进入“已暂停”状态。从那里，如果用户返回该
    `Activity`，`onResume()` 函数会被调用，`Activity` 再次 *运行*。另一方面，如果用户决定打开另一个应用，Android 运行时可能会“停止”并最终“销毁”该应用。'
  raw: '**ContentProviders** lets you write apps that can share data to other apps
    without exposing the underbellies of your apps’ SQL structure. It manages access
    to some sort of central data repository. The details of database access are completely
    hidden from other apps. An example of a prebuilt application that is a ContentProvider
    is the “Contacts” app in Android.


    Your application may need some visual or audio assets; these are the kinds of
    things we mean by “Resources” in Figure [5-1](#457413_2_En_5_Chapter.xhtml#Fig1).


    The AndroidManifest is exactly what its name implies; it’s a manifest and it’s
    written in XML. It declares quite a few things about the application, like


    *   The name of the app.


    *   Which Activity will show up first when the user launches the app.


    *   What kind of components are in the app. If it has activities, the manifest
    declares them—names of classes and all. If the app has services, their class names
    will also be declared in manifest.


    *   What kinds of things can the app do? What are its permissions? Is it allowed
    to access the Internet or the camera? Can it record GPS locations and so on?


    *   Does it use external libraries?


    *   What version(s) of Android will this app run on?


    *   Does it support a specific type of input device?


    *   Are there specific screen densities that this application requires?


    As you can see, the manifest is a busy place; there’s a lot of things to keep
    an eye on. But don’t worry too much, most of the entries here are automatically
    taken care of by the creation wizards of Android Studio. One of the few occasions
    you will interact with it is probably when you need to add permissions to your
    app.


    The manifest is also important for Google Play when it displays your app on the
    store. Your app won’t appear to devices that do not meet the requirements stipulated
    in your manifest file.


    ## Application Entry Point


    An app typically interacts with a user, and it does so using Activity components.
    These kinds of apps usually have, at least, these three things. They have


    1.  An Activity class that the user sees first as soon as the app launches


    2.  A layout file for the Activity class which contains all the UI definitions
    like text views, buttons, and so on


    3.  The AndroidManifest file, which ties all the project resources and components
    together


    When an application is launched, the Android Runtime creates an Intent object
    and inspects the manifest file. It’s looking for a specific value of the `intent-filter`
    node (in the xml file). The runtime is trying to see if the application has a
    defined entry point, something like a *main function*. Listing [5-1](#457413_2_En_5_Chapter.xhtml#PC1)
    shows an excerpt from the Android manifest file.


    ```


    Listing 5-1

    Excerpt from AndroidManifest.xml

    ```


    If the application has more than one Activity, there will be several activity
    nodes in the manifest file, one node for each Activity. The first line of the
    definition has an attribute called *android:name*; this points to the class name
    of an Activity. In this example, the name of the class is “MainActivity.”


    The second line declares the *intent-filter*, when you see something like `android.intent.action.MAIN`,
    on the intent-filter node, it means the Activity is the entry point for the application.
    When the app launches, this is the Activity that the user will see.


    ## Activities


    You can think of an Activity as a screen or a window. It’s something that a user
    can interact with. This is the UI of the app. An Activity is a class that inherits
    from the *android.app.Activity* class (one way or another), but we usually extend
    the *AppCompatActivity* class (instead of Activity) so we can use modern UI elements
    but still make the app run on older Android versions; hence, “Compat” in the name
    AppCompatActivity, which stands for “compatibility.”


    An Activity component has two parts, a Java class (or Kotlin if that’s your language
    of choice) and a layout file in XML format. The layout file is where you put all
    the definitions of the UI, for example, the text box, button, labels, and so on.
    The Java class is where you code all the behavior parts of the UI, for example,
    what happens when the button is clicked, when text is entered into the field,
    when the user changes the orientation of the device, when another component sends
    a message to the Activity, and so on.


    An Activity, like any other component in Android, has a lifecycle. Each lifecycle
    event has an associated method in the Activity’s Java class; we can use these
    methods to customize the behavior of the application. Figure [5-2](#457413_2_En_5_Chapter.xhtml#Fig2)
    shows the Activity lifecycle.


    ![../images/457413_2_En_5_Chapter/457413_2_En_5_Fig2_HTML.jpg](images/457413_2_En_5_Chapter/457413_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Activity lifecycle


    In Figure [5-2](#457413_2_En_5_Chapter.xhtml#Fig2), the boxes show the state of
    an Activity on a particular stage of existence. The name of the method calls are
    embedded in the directional arrows which connect the stages.


    When the Android Runtime launches the app, it calls the `onCreate()` method of
    the main Activity which brings the state of the Activity to “created.” You can
    use this method to perform initialization routines like preparing event handling
    codes and so on.


    The Activity proceeds to the next state which is “started”; the Activity is visible
    to the user at this point, but it’s not yet ready for interaction. The next state
    is “resumed”; this is the state where the app is interacting with the user.


    If the user clicks anything that takes the focus away from the Activity (answering
    a phone call or launching another app), the runtime pauses the current Activity
    and it enters the “paused” state. From there, if the user goes back to the Activity,
    the `onResume()` function is called, and the Activity *runs* again. On the other
    hand, if the user decides to open a different application, the Android Runtime
    may “stop” and eventually “destroy” the application.'
