    and so on by using code generators.


    *   Android Studio has plenty of refactoring aids; before using the Find/Replace
    menu, consider using the refactoring options.


    *   Live templates are like text expanders; they can save you time and let you
    avoid common coding mistakes—you should use them.


    *   You can control how the Android Studio editor behaves; go to Settings or Preferences,
    then **Editor** ➤ **Code Style**.'
  trans: '

    ## 重要快捷键


    Android 开发者网站维护了一个页面，你可以在其中找到 Android Studio 的快捷键；地址是 [`http://bit.ly/androidstudiokbshortcuts`](http://bit.ly/androidstudiokbshortcuts)。你真的应该认真阅读那个页面；但在结束本章之前，我想向你介绍六个我觉得非常实用的快捷键——它们可能对你也有用。表
    18-2 列出了这些快捷键。


    **表 18-2** 一些有用的快捷键


    | 快捷键 | 功能说明 |

    | --- | --- |

    | 按 `Shift` 两次 | 允许你在所有位置搜索内容。它会搜索资源文件夹、gradle 文件、图片资源、代码、xml 配置文件等。如果你不知道要搜索哪个文件夹，直接使用这个即可
    |

    | `Ctrl + Space` &#124; `Command + Space` | Android Studio 已有代码补全和代码提示功能；这只是额外的补充。如果你忘记了某个需要大量参数的方法的参数，可以使用此快捷键预览该方法的全部变体及其期望的对应参数
    |

    | `Alt + Insert` &#124; `Command + N` | 我们在上一节生成代码时使用过这个。这是代码生成器的快捷键 |

    | `Ctrl + O` &#124; `Command + O` | 当你想重写方法时，使用此快捷键 |

    | `Ctrl + -` &#124; `Command + -` | 你可以用它来展开或折叠代码块。在处理大型代码库时，能够折叠代码非常方便；在折叠/展开代码块时，这个快捷键能让你的工作更轻松
    |

    | `Ctrl + Alt + L` &#124; `Command + Option + L` | 不要手动缩进或重新缩进代码——如果你搞乱了 `for`
    循环或嵌套条件块的缩进，只需高亮选中代码块，然后使用此快捷键 |


    ## 总结


    - 使用代码生成器可以避免编写样板代码，例如构造函数、getter 和 setter 等。

    - Android Studio 提供了大量重构辅助工具；在使用 `查找/替换` 菜单之前，请考虑使用重构选项。

    - 动态模板就像文本展开器；它们可以节省你的时间，并帮助你避免常见的编码错误——你应该使用它们。

    - 你可以控制 Android Studio 编辑器的行为；前往 `设置` 或 `偏好设置`，然后选择 **编辑器** ➤ **代码样式**。

    '
