    how a spike in the number of users affects the user experience—is the app still
    responsive, was there an effect on frames per second, are there lags, and so on.


    **Compatibility testing** is where you check how the app behaves on different
    devices and configurations of hardware/software. This is the situation where AVDs
    (Android Virtual Devices) will come in handy; because AVDs are simply software
    emulators, you don’t have to buy different devices. Use the AVDs whenever you
    can. Some apps will be difficult to test reliably on emulators; when you’re in
    that situation, you have to fork over money for testing devices.


    **Compliance or conformance testing**. If you’re building a game app, this is
    where you check the game against Google Play guidelines on apps or games; make
    sure you read Google Play’s Developer Policy Center at [`https://bit.ly/developerpolicycenter`](https://bit.ly/developerpolicycenter).
    Ensure you are also acquainted with PEGI (Pan European Game Information) and ESRB
    (Entertainment Software Rating Board). If the game app has objectionable content
    that’s not aligned with a specific rating, they need to be identified and reported.
    Violations could be a cause for rejection, which may result in costly rework and
    resubmission. If you’re collecting data from the users, you might want to audit
    the app to check if it is compliant with applicable data privacy regulations.


    **Localization testing** is essential, especially if the app is for global markets.
    App titles, contents, and texts need to be translated and tested in the supported
    languages.


    **Recovery testing**. This is taking edge case testing to another level. Here,
    the app is forced to fail, and you’re observing how the application behaves as
    it fails and how it comes back after it fails. It should give you insight into
    whether you’ve written enough **try-catch-finally** blocks or not. Apps should
    fail gracefully, not abruptly. Whenever possible, runtime errors should be guarded
    by try-catch blocks; when the exception happens, try to write a log and save the
    app’s state.


    **Penetration or security testing**. This kind of testing tries to discover the
    weaknesses of the app. It simulates the activities that a would-be attacker will
    do to circumvent all the security features of the app; for example, if the app
    uses a database to store data, especially user data, a pen tester (a professional
    who practices penetration testing) might use the app while Wireshark is running—Wireshark
    is a tool that inspects packets; it’s a network protocol analyzer. If you stored
    passwords in clear text, it would show up in these tests.


    **Sound testing**. If your app uses sounds, check if any errors are loading the
    files; also, listen to the sound files if there’s a cracking sound and so on.


    **Developer testing**. This is the kind of testing you (the programmer) do as
    you add layers and layers of code to the app. This involves writing test codes
    (in Java as well) to test your actual program. This is known as unit testing.
    Android developers usually perform JVM testing and instrumented testing; we’ll
    discuss unit testing more in the following sections.


    ## Unit Testing


    Unit testing is a functional testing that a developer performs, not the QA or
    QC. A unit test is simple; it’s a particular thing that a method might do or produce.
    An application typically has many unit tests because each test is a very narrowly
    defined set of behavior. So, you’ll need lots of tests to cover the complete functionality.
    Android developers usually use JUnit to write unit tests.


    JUnit is a regression testing framework written by Kent Beck and Erich Gamma.
    You might remember them as the one who created extreme programming and the other
    from Gang of Four (GoF, Design Patterns), respectively, among other things.


    Java developers have long used JUnit for unit testing. Android Studio comes with
    JUnit and is very well integrated into it. We don’t have to do much by way of
    setup. We only need to write our tests.'
