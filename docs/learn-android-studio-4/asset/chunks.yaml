    Launching an Activity isn’t as simple as creating an instance of a particular
    Activity class. It’s a bit more involved than that. An Activity isn’t merely an
    object; it’s a component, and component activation in Android requires the use
    of Intents.


    To launch an Activity, we need to create an Intent object, tell this Intent object
    what we want to activate, and then launch it. After that, the Android Runtime
    tries to resolve the Intent, and if successful, the target component gets activated.
    In code, it looks like this:


    ```

    Intent intent = new Intent(context, target);

    startActivity(intent);

    ```


    where


    *   **context**—Is a reference to the component that wants to initiate or launch
    the Intent.


    *   **target**—Is a class object; this is the component you want to launch.


    A typical scenario when launching an Activity (usually from the MainActivity)
    is when a user clicks a button or selects a menu item.


    To try this out, you will need a project with two Activities. You already know
    how to create a project with an empty Activity, so just create that; presumably,
    the first Activity class’ name is MainActivity. To add another Activity, we can
    use the context menu. On the Project tool window, right-click the app folder (assuming
    you’re on the Android scope, which is the default), then choose **New** ➤ **Activity**
    ➤ **Empty Activity**, as shown in Figure [8-2](#457413_2_En_8_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig2_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    New Empty Activity


    In the window that follows, type the second Activity name, as shown in Figure
    [8-3](#457413_2_En_8_Chapter.xhtml#Fig3). Adopt the suggested layout name (or
    change it to your liking), and make sure it’s on the same Java package and that
    the source language is Java. Click **Finish** to proceed.


    ![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig3_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    New Android Activity


    Next, open *activity_main.xml* and edit it to match Listing [8-1](#457413_2_En_8_Chapter.xhtml#PC2).


    ```


    Listing 8-1

    app/res/layout/activity_main.xml

    ```


    What I’ve done in the activity_main layout was to remove the default TextView
    object and replaced it with a Button View (whose **id** is *button*).


    Now we can work on MainActivity. We need to attach a click handler to the Button,
    and on that handler, we create and launch an Intent. Listing [8-2](#457413_2_En_8_Chapter.xhtml#PC3)
    shows the annotated code to do that.


    | ❶ | Let’s get a reference to the Button View. |

    | ❷ | Create an OnClickListener object and bind it to the Button object. |

    | ❸ | Inside the **onClick()** method, let’s create an Intent object. The first
    parameter is a Context object, which is supposed to refer to MainActivity. I wrote
    **MainActivity.this** and not merely **this** because currently we’re making the
    call inside a click handler (which is an anonymous class); **this** would refer
    to the anonymous class’ instance and not to MainActivity. To be explicit, we refer
    to the context of MainActivity as **MainActivity.this**. Alternatively, you can
    also pass the Application Context as the first parameter. You can get the Application
    Context using the method `getApplicationContext()` . The second parameter is the
    class object of the component we want to launch, which is SecondActivity; so,
    we pass **SecondActivity.class**. |

    | ❹ | Finally, we call the **startActivity()** method of MainActivity, and we
    pass the Intent object as the parameter; this will launch the Intent. |


    ```

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Intent;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    Button btn = findViewById(R.id.button); ❶

    btn.setOnClickListener(new View.OnClickListener() { ❷

    @Override

    public void onClick(View view) {

    Intent intent = new Intent(MainActivity.this, SecondActivity.class); ❸

    startActivity(intent); ❹

    }

    });

    }

    }

    Listing 8-2

    MainActivity

    ```


    If you run the app now, the SecondActivity will launch when you click the Button
    on MainActivity. In this example, we told the Intent object what component we
    wanted to activate (SecondActivity). This kind of Intent object is called an explicit
    Intent, simply because we’re very precise on what we want to activate. Another
    type of Intent is called an implicit Intent, which is what we’ll discuss in the
    next section.'
  trans: "\n# 什么是 Intent\n\n`Intent` 是对要执行操作的抽象描述。这是一个独特的 Android 概念，因为没有其他平台使用相同的方式作为组件激活的手段。在前面的章节中，我们了解了\
