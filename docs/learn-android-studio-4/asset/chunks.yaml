- fmt: '### Implementing the Test


    JUnit supplies several static methods that we can use in our test to make assertions
    about our code’s behavior. We use assertions to show an expected result, which
    is our control data. It’s usually calculated independently and is known to be
    true or correct—that’s why you use it as a control data. When the expected data
    is returned from the assertion, the test passes; otherwise, the test fails. Table
    [13-1](#457413_2_En_13_Chapter.xhtml#Tab1) shows the common assert methods you
    might need for your code.


    **Table 13-1** Common assert methods


    | Method | Description |

    | --- | --- |

    | `assertEquals()` | Returns true if two objects or primitives have the same value
    |

    | `assertNotEquals()` | The reverse of `assertEquals()` |

    | `assertSame()` | Returns true if two references point to the same object |

    | `assertNotSame()` | Reverse of `assertSame()` |

    | `assertTrue()` | Tests a Boolean expression to see if it’s true |

    | `assertFalse()` | Reverse of `assertTrue()` |

    | `assertNull()` | Tests for a null object |

    | `assertNotNull()` | Reverse of `assertNull()` |


    Now that we know a couple of assert methods, we’re ready to write some tests.
    Listing [13-2](#457413_2_En_13_Chapter.xhtml#PC2) shows the code for `FactorialTest.java`.


    ```java

    import org.junit.Test;

    import static org.junit.Assert.*;

    public class FactorialTest {

    @Test

    public void factorial() {

    assertEquals(1.0, Factorial.factorial(1),0.0);

    assertEquals(120.0, Factorial.factorial(5), 0.0);

    }

    }

    ```


    **Listing 13-2** `FactorialTest.java`


    Our `FactorialTest` class has only one method because it’s for illustration purposes
    only. Real-world codes would have many more methods than this, to be sure.


    Notice that each test (method) is annotated by `@Test`. This is how JUnit knows
    that `factorial()` is a test case. Notice also that `assertEquals()` is a method
    of the `Assert` class, but we’re not writing the fully qualified name here because
    we’ve got a static import on `Assert`—it certainly makes life easier.


    The `assertEquals()` method takes three parameters; they’re illustrated in Figure
    [13-8](#457413_2_En_13_Chapter.xhtml#Fig8).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig8_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig8_HTML.jpg)


    **Figure 13-8** `assertEquals` method


    | ❶ | The **Expected** value is your control data; this is usually hard-coded
    in the test. |

    | ❷ | The **Actual** value is what your method returns. If the expected value
    is the same as the actual value, the `assertEquals()` passes—your code behaves
    as expected. |

    | ❸ | **Delta** is intended to reflect how close the *actual* and *expected* values
    can be and still be considered equal. Some developers call this parameter the
    “fuzz” factor. When the difference between the expected and actual values is higher
    than the “fuzz factor,” then `assertEquals()` will fail. I used 0.0 here because
    I don’t want to tolerate any kind of deviation. You can use other values like
    0.001, 0.002, and so on; it depends on your use case and how much fuzz your app
    is willing to tolerate. |


    Now, our code is complete. You can insert a couple more asserts in the code so
    you can get into the groove of things if you prefer.


    There are a couple of things I did not include in this sample code. I did not
    override the `setUp()` and `tearDown()` methods because I didn’t need it. You
    will typically use the `setUp()` method to set up database connections, network
    connections, and so on. Use the `tearDown()` method to close whatever it is you
    opened in the `setUp()`.


    Now, we’re ready to run the test.


    ### Running a Unit Test


    You can run just one test or all the tests in the class. The little green arrows
    in the gutter of the main editor are clickable. When you click the small arrow
    beside the class’ name, that will run all the tests in the class. When you click
    the one beside the test method’s name, that will run only that test case. See
    Figure [13-9](#457413_2_En_13_Chapter.xhtml#Fig9).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig9_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig9_HTML.jpg)


    **Figure 13-9** `FactorialTest.java` in the main editor


    Similarly, you can also run the main menu bar test and go to **Run** ➤ **Run**.


    Figure [13-10](#457413_2_En_13_Chapter.xhtml#Fig10) shows the result of the test
    execution.


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig10_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig10_HTML.jpg)


    **Figure 13-10** Result of running `FactorialTest.java`


    Android Studio gives you plenty of cues so you can tell if your tests are passing
    or failing. Our first run tells us that there’s something wrong with `Factorial.java`;
    the `assertEquals()` has failed.


    > **Tip:** When a test fails, it’s best to use the debugger to investigate the
    code. `FactorialTest.java` is no different than any other class in our project;
    it’s just another Java file; we can debug it. Put some breakpoints on your test
    code’s strategic places, and then instead of “running” it, run the “debugger”
    so you can walk through it.


    Our test failed because the factorial of 1 isn’t 2, it’s 1\. If you look closer
    at `Factorial.java`, you’ll notice that the factorial value isn’t calculated correctly.


    Edit the `Factorial.java` file, then change this line


    ```java

    return arg + factorial(arg - 1);

    ```


    to this line


    ```java

    return arg * factorial(arg - 1);

    ```


    If we rerun the test, we see successful results, as shown in Figure [13-11](#457413_2_En_13_Chapter.xhtml#Fig11).


    ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig11_HTML.jpg](images/457413_2_En_13_Chapter/457413_2_En_13_Fig11_HTML.jpg)


    **Figure 13-11** Successful test


    Instead of yellow exclamation marks, we now see green checkmarks. Instead of seeing
    “Test failed,” we now see “Test passed.” Now we know that our code works as expected.


    ## Instrumented Testing


    Unit testing that interacts with the Android platform is known as instrumented
    testing; we will use the Espresso framework to do this.


    `Espresso` is a testing framework for Android to make it easy to write reliable
    and concise user interface tests. Google released the `Espresso` framework in
    2013\. Since its 2.0 release, `Espresso` became part of the Android Support Repository.


    `Espresso` automatically synchronizes your test actions with the user interface
    of your application. The framework also ensures that your activity is started
    before the tests run. It also lets the test wait until all observed background
    activities have finished.


    The general steps when working with `Espresso` tests are the following:


    * **Match**—Use a matcher to target a specific component, for example, a button
    or textview. A `ViewMatcher` lets you find a `View` object in the hierarchy.

    * **Act**—Use a `ViewAction` object to perform an action, for example, a click,
    on a targeted `View` object.

    * **Assert**—Use an assertion on the state of a `View`.


    Imagine if we have a simple screen that has a `Button` and a `TextView`. When
    we click the `Button`, we’ll write the text “Hello World” on the `TextView`. We
    can write the test, as shown in Listing [13-3](#457413_2_En_13_Chapter.xhtml#PC5).


    | ❶ | Use a `ViewMatcher` to find a `View` object. We’re looking for a `View`
    with an id of `button`. Remember that when you’re using `onView()`, Espresso waits
    until all synchronization conditions are met before performing the corresponding
    UI action. |

    | ❷ | When we find it, use a `ViewAction` to do something with it; in this case,
    we want to click it. |

    | ❸ | Once again, we use a `ViewMatcher` to find a `View` object; this time, we’re
    trying to find a `TextView` with an id of `textview`. |

    | ❹ | When we find it, we want to check if its text property matches “Hello World.”
    |


    ```java

    @Test

    public void sampleTest() {

    onView(withId(R.id.button))   ❶

    .perform(Click());       ❷

    onView(withId(R.id.textview)) ❸

    .check(matches(withText("Hello World"))); ❹

    }

    ```


    **Listing 13-3** `sampleTest`'
