- fmt: '# Implicit Intents


    There are two kinds of `Intent`, an implicit and an explicit one. You can think
    of the two types of `Intent` this way; let’s imagine asking someone to buy some
    sugar. If we instruct “could you please buy some sugar” with no further details,
    this would be equivalent to an implicit `Intent` because that person could buy
    the sugar anywhere. On the other hand, if we gave instructions like “could you
    please go to the ABC store on third street and buy some sugar,” this would be
    equivalent to an explicit `Intent`. Our earlier example in Listing [8-2](#457413_2_En_8_Chapter.xhtml#PC3)
    is an explicit `Intent` because we told the `Intent` specifically which component
    to activate.


    Implicit `Intents`, on the other hand, are very powerful because they allow an
    application to take advantage of other applications. Your app can gain functionalities
    that you did not write yourself. For example, you can create an `Intent` that
    opens the camera, shoots, and saves a photo, without writing any camera-specific
    code.


    The purpose of implicit `Intent` is for you to use a functionality that doesn’t
    exist within your app, because if the feature exists within your app, you would
    have used explicit `Intents` in the first place. Using an implicit `Intent` is
    a way to ask the Android Runtime to find an application somewhere on the device
    that can service your request.


    In an explicit `Intent`, we tell the `Intent` which specific component to activate.
    In an implicit `Intent`, we tell the `Intent` what we’d like to do instead; for
    example, if we wanted to launch a browser and navigate to [`https://apress.com`](https://apress.com),
    here’s how to do it:


    1. Create an `Intent` object.

    2. Tell it what to do by specifying some actions, for example, “view a map,” “call
    a number,” “take a picture,” “view a web page,” and so on.

    3. Give it some information or data; for example, if we want to launch a browser
    and navigate to a specific web page, we need to tell the `Intent` the URI of the
    web page.

    4. Finally, we launch the `Intent`.


    Listing [8-3](#457413_2_En_8_Chapter.xhtml#PC4) shows how to do this in code.


    | ❶ | Create the `Intent` object using the no-arg constructor. |

    |---|---|

    | ❷ | Set the `Intent` action. In this example, we’d like to view something; it
    could be a contact, a web page, a map, a picture somewhere, and so on. At this
    point, the Android Runtime doesn’t know yet what you want to view. `ACTION_VIEW`
    is one of the many Intent Actions you can use. You can find other kinds of Action
    in the official Android’s website: [`https://developer.android.com/guide/components/intents-common`](https://developer.android.com/guide/components/intents-common).
    |

    | ❸ | Set its data. At this point, the Android Runtime has a pretty good idea
    of what you want to do. In this example, the `Uri` is a web page. Android is pretty
    smart to figure out that we’d like to view a web page. |

    | ❹ | Android will search every app on the device, which will best match this
    request. If it finds more than one app, it will let the user choose which one.
    If it finds only one, it will simply launch that app. |


    ```

    Intent intent = new Intent(); ❶

    intent.setAction(Intent.ACTION_VIEW); ❷

    intent.setData(Uri.parse("https://apress.com")); ❸

    startActivity(intent); ❹

    Listing 8-3

    Example Intent to browse a web page

    ```


    Alternatively, you can set the `Intent`’s action and data by passing them to the
    `Intent`’s constructor, like this:


    ```

    Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://apress.com"));

    ```


    Any component that can respond to this `Intent` does not need to be running to
    receive the `Intent`. Remember that all applications need to have a manifest file.
    Each application declares its capabilities in the manifest file, specifically
    through the `<intent-filter>` section. Android’s package manager has all the info
    of all the applications installed on the device. Android’s runtime only needs
    the information on the manifest file to see which among the apps are capable or
    eligible to respond to the `Intent`. The Android Runtime inspects the `Intent`
    object’s content and then compares it to the Intent filters of all components.
    An Intent filter is a way for Android components to declare their capabilities
    to the Android system.


    To see this in action, let’s create another project with an empty Activity. Assuming
    you’ve already done that, let’s work on the `MainActivity` class. We will create
    three action triggers; we could use Buttons, but let’s use the Options menu for
    this exercise. Listing [8-4](#457413_2_En_8_Chapter.xhtml#PC6) shows the annotated
    code for `MainActivity`.


    | ❶ | Let’s override the `onCreateOptionsMenu()` callback; this will be called
    shortly after the `onCreate()` callback. Overriding this method allows us to build
    a dynamic menu programmatically. |

    |---|---|

    | ❷ | Add a menu item dynamically. |

    | ❸ | Whenever the user clicks one of the Menu Items, the `onOptionsItemSelected`
    is called; this is where we will handle the menu clicks. |

    | ❹ | The `item` parameter can tell us which Menu Item was clicked. We’re converting
    it to `String` to use it to route our program logic using a `switch` statement.
    |

    | ❺ | Create an `Intent` and set its action and data to view the Apress website.
    |

    | ❻ | Create an `Intent` and set its action and data to view a location. |

    | ❼ | Create an `Intent` and set its action and data to call a specific number.
    |


    ```

    import androidx.annotation.NonNull;

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Intent;

    import android.net.Uri;

    import android.os.Bundle;

    import android.util.Log;

    import android.view.Menu;

    import android.view.MenuItem;

    public class MainActivity extends AppCompatActivity {

    private final String TAG = getClass().getName();

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    @Override

    public boolean onCreateOptionsMenu(Menu menu) { ❶

    menu.add("View Apress"); ❷

    menu.add("View Map");

    menu.add("Call number");

    return super.onCreateOptionsMenu(menu);

    }

    @Override

    public boolean onOptionsItemSelected(@NonNull MenuItem item) { ❸

    Intent intent = null;

    Uri uri;

    switch(item.toString()) {  ❹

    case "View Apress":

    Log.d(TAG, "View Action");

    uri = Uri.parse("https://apress.com");

    intent = new Intent(Intent.ACTION_VIEW, uri); ➀

    break;

    case "View Map":

    uri = Uri.parse(("geo:40.7113399,-74.0263469"));

    intent = new Intent(Intent.ACTION_VIEW, uri); ➁

    break;

    case "Call number":

    Log.d(TAG, "Call number");

    uri = Uri.parse(("tel:639285083333"));

    intent = new Intent(Intent.ACTION_CALL, uri); ➂

    }

    startActivity(intent);

    return true;

    }

    }

    Listing 8-4

    MainActivity

    ```


    Figure [8-4](#457413_2_En_8_Chapter.xhtml#Fig4) shows the app at runtime.


    ![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig4_HTML.jpg](images/457413_2_En_8_Chapter/457413_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Implicit Intent project, running


    ## Summary


    * Intents are used for component activation.

    * There are two kinds of Intents, implicit and explicit ones.

    * Explicit Intents let us work with multiple activities. You can activate a specific
    Activity using an explicit Intent.

    * Implicit Intents extend the functionality of your application. They allow your
    application to do things that are outside the functionality of your app.'
