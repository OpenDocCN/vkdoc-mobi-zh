  raw: '## LiveData


    Going back to our RandomNumber example, we have an app that shows a random number
    every time the app is launched. The app uses ViewModel already, so we don’t have
    the problem of losing data every time the Activity is destroyed and re-created.
    The basic data flow is shown in Figure [16-2](#457413_2_En_16_Chapter.xhtml#Fig2).


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig2_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Data flow for the RandomNumber example


    But what if you need to fetch another number? For that, we may add a trigger on
    the MainActivity, like a Button, and then it will call **getNumber()** on the
    ViewModel—but how are we going to refresh the TextView in the MainActivity? There
    are already a couple of ways to do this, and you might have encountered them already.
    One way to facilitate data exchange between our ViewModel and Activity is the
    creative use of interfaces (but we won’t discuss that here) or by using an EventBus
    like Otto (we also won’t discuss that here)—but now, thankfully, because of Architecture
    components, we can use LiveData. The new data flow is depicted in Figure [16-3](#457413_2_En_16_Chapter.xhtml#Fig3).


    | ❶ | The user clicks the **FETCH** button, which calls the **getNumber()** function;
    actually, we’re going to call the **createNumber()** first, then call the **getNumber()**.
    This way, we’re fetching a new random number. There are ways to do this more elegantly,
    but this is the quickest way to do it, so bear with me. |

    | ❷ | Our ViewModel object gets a new random number. This isn’t a simple String
    anymore; we’re going to change it to a MutableLiveData to become *observable*.
    |

    | ❸ | From the MainActivity, we’ll get an instance of the LiveData coming from
    our ViewModel object and write some codes to *observe* it; next, we simply react
    to changes on the LiveData. |


    ![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig3_HTML.jpg](images/457413_2_En_16_Chapter/457413_2_En_16_Fig3_HTML.jpg)


    Figure 16-3


    RandomNumber sample with LiveData


    Let’s see how that works in code. Listings [16-9](#457413_2_En_16_Chapter.xhtml#PC9)
    and [16-10](#457413_2_En_16_Chapter.xhtml#PC10) show the code for our ViewModel
    and MainActivity, respectively.


    | ❶ | The value of mrandomnumber is what we return to the MainActivity. We want
    this to be an *observable* object. To do this, we change its type from *int* to
    *MutableLiveData*. |

    | ❷ | We have to make that type change here too since mrandomnumber is now *MutableLiveData*;
    this function has to return *MutableLiveData*. |

    | ❸ | To set the value of the *MutableLiveData*, use the setValue() method. |


    ```

    import androidx.lifecycle.MutableLiveData;

    import androidx.lifecycle.ViewModel;

    public class RNModel extends ViewModel {

    private String TAG = getClass().getSimpleName();

    MutableLiveData mrandomnumber = new MutableLiveData(); ❶

    boolean minitialized = false;

    MutableLiveData getNumber() { ❷

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber;

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber.setValue(random.nextInt(100) + ""); ❸

    minitialized = true;

    }

    }

    Listing 16-9

    ViewModel with LiveData

    ```


    Now we can move on to the changes in MainActivity. Listing [16-10](#457413_2_En_16_Chapter.xhtml#PC10)
    shows the modified and annotated code for MainActivity.


    | ❶ | Let’s fetch the random number from the ViewModel. The random number isn’t
    of String type anymore; it’s MutableLiveData. |

    | ❷ | This is the boilerplate code for a button click. We need this trigger to
    fetch a random number from the ViewModel. |

    | ❸ | To *observe* a LiveData, we call the **observe()** method; the method takes
    two arguments. The first argument is the lifecycle owner (MainActivity, so we
    pass *this*); the second argument is an Observer object. We used an anonymous
    class here to create the Observer object. |

    | ❹ | This **onChanged()** method is called every time the value of the random
    number (mrandomnumber) in the ViewModel changes; so, when it changes, we set the
