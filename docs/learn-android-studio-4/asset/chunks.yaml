    \ 编译过程的逻辑表示。\n\n![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig3_HTML.jpg](img/457413_2_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3 Android 编译过程\n\n编译器将程序源文件转换为 Java 字节码。生成的字节码随后会进一步转换成 DEX 文件。DEX 文件是 Dalvik\
    \ 可执行文件；它是 Android 运行时（ART）能够识别的可执行格式。在 DEX 文件和其他资源被打包成 Android 安装包（APK）之前，它还会作为一个副产品生成一个名为`R.class`的特殊文件。我们使用`R.class`来获得对布局文件中定义的\
    \ UI 元素的程序化引用。\n\n## 容器\n\n除了创建组合视图之外，`ViewGroup`类还有另一个用途。它们构成了布局管理器的基础。布局管理器是一个容器，负责控制子视图相对于容器以及其他子视图在屏幕上的定位方式。Android\
    \ 自带了一些预构建的布局管理器；表 6-1 展示了其中的一部分。\n\n表 6-2 Hello 应用的项目信息\n\n| 项目详情 | 值 |\n| ---\
    \ | --- |\n| 应用名称 | ActivitySample |\n| 公司域名 | 请使用你的网站名称 |\n| 编程语言 | Java |\n\
    | 外形因素 | 手机和平板 |\n| 最低 SDK | API 29 (Q) Android 10 |\n| 活动类型 | 空白 |\n| 活动名称 |\
    \ MainActivity |\n| 布局名称 | activity_main |\n\n表 6-1 布局管理器\n\n| 布局管理器 | 描述 |\n\
    | --- | --- |\n| LinearLayout | 根据所选方向，将控件排成单行或单列。可以为每个控件分配一个权重值，该值决定了该控件相对于其他控件所占用的空间大小\
    \ |\n| TableLayout | 将控件排列成行和列的网格格式 |\n| FrameLayout | 将子视图堆叠在一起。XML 布局文件中最后一个条目位于堆栈顶部\
    \ |\n| RelativeLayout | 通过指定每个视图的对齐方式和边距，使视图相对于其他视图和容器进行定位 |\n| ConstraintLayout\
    \ | `ConstraintLayout` 是最新的布局。它使控件相对于彼此和容器进行定位（类似于`RelativeLayout`）。但它不仅仅通过对齐和边距来实现布局管理。它引入了“约束”对象的概念，该对象将控件锚定到一个目标上。这个目标可以是另一个控件、容器或另一个锚点。本书中的大部分示例都将使用此布局\
    \ |\n\n关于视图、容器和布局，还有更多内容需要学习，但目前我们掌握的知识已经足够创建一些像样的项目了。接下来让我们学习`Activity`类。\n\n\
    ## Activity 类\n\n`Activity`类必须直接或间接地继承自`android.app.Activity`，但我们通常不直接继承这个类；相反，我们扩展`AppCompatActivity`类，以便在较旧版本的\
    \ Android 上运行应用，同时仍能使用现代化的 UI 元素。类名中的“Compat”代表“兼容性”。\n\n虽然布局文件包含了视图（按钮、文本字段等）的定义，但`Activity`类负责行为逻辑；当我们想要针对用户操作（例如按钮点击）产生响应时，我们就在这里编写代码。当你创建一个“空\
    \ Activity”项目时，得到的`Activity`类代码看起来就像 6-2 中的代码一样。\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.os.Bundle;\npublic class MainActivity extends AppCompatActivity\
    \ { ❶\n    @Override  ❷\n    protected void onCreate(Bundle savedInstanceState)\
    \ { ❸\n        super.onCreate(savedInstanceState);  ❹\n        setContentView(R.layout.activity_main);\
    \ ➀\n    }\n}\n代码清单 6-2\nMainActivity.java\n```\n\n❶ 我们继承自`AppCompatActivity`，它是`android.app.Activity`类的子类。所有`Activity`类都必须以某种方式继承自`android.app.Activity`，但正如你所见，项目创建向导为我们提供了`AppCompatActivity`。这是`Activity`类推荐的超类。\n\
    \n❷ `@Override`注解告诉编译器，我们打算重写紧随该注解之后的方法。\n\n❸ `onCreate()`是`Activity`类的生命周期方法之一。Android\
    \ 运行时在用户启动应用后立即调用此方法。这是编写初始化代码的好地方。\n\n❹ 我们调用超类（`AppCompatActivity`）中的`onCreate()`方法。这是必要的，这样我们就不会破坏`onCreate`方法内部的调用链。如果我们不调用此方法，`AppCompatActivity`（即我们的超类）中`onCreate`里的代码将不会运行；这会导致错误。\n\
    \n➀ `setContentView`方法用于选择当`Activity`对用户可见时要显示的视图资源。此方法已重载；你可以传入一个整数（指向资源 ID）或一个`View`对象实例。在这个例子中，我们传入了一个资源\
    \ ID。你可能还记得，我们的布局文件名为`/res/layout/activity_main.xml`。你可能还记得，在编译过程中，为了方便我们使用，生成了一个`R.class`文件，这样我们就可以通过编程方式引用\
    \ UI 资源——`R.layout.activity_main`指向文件`/res/layout/activity_main.xml`。在这个语句中，我们将`MainActivity.java`与`activity_main.xml`关联了起来。\n"
- fmt: '# Hello World


    Now that we have some working knowledge about Activities and layouts, let’s explore
    them in a sample project.


    When the project is created, you will see a bunch of files in the project window,
    but we’re only interested in three. Figure [6-4](#457413_2_En_6_Chapter.xhtml#Fig4)
    shows the location of (1) the main program file, (2) the manifest file, and (3)
    the main layout file in the project file window.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig4_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    ActivitySample project


    The main layout file, named `activity_main.xml`, is inside the `app` → `res` →
    `layout` folder. All user interface elements are written in an XML layout file.


    The main program file, `MainActivity.java`, is found in `app` → `java` → `package
    name` folder (your package name will be different from mine). This Java file is
    the Activity class. If you want to do something as a reaction to a user action,
    like clicking a button, this is where we write that program logic.


    The manifest file describes the app’s essential information to the Android build
    tools, Android OS, and Google Play. Looking at Figure [6-4](#457413_2_En_6_Chapter.xhtml#Fig4),
    it appears as if the manifest file is in `app` → `manifests` → `AndroidManifest.xml`.
    You need to remember that what we’re looking at is the “Android View” of the Project
    window. It’s a logical representation of the project files; it’s not the literal
    arrangements of the files with respect to the root folder of the project. If you
    want to see the actual location of the project files, switch to “Project view,”
    as shown in Figure [6-5](#457413_2_En_6_Chapter.xhtml#Fig5).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig5_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Project view


    We’ve got a pretty good map of where things are. We know the location of the manifest
    file, the `MainActivity` (Java) file, and the `activity_main` (layout) file. Since
    we’ve already examined the contents of the `MainActivity` file earlier, let’s
    explore the `activity_main` layout file (shown in Listing [6-3](#457413_2_En_6_Chapter.xhtml#PC3)).


    ```

    Listing 6-3

    Annotated activity_main

    ```


    ❶ Root node of the layout file, which also declares what kind of layout manager
    is in effect. In this case, we are using the `ConstraintLayout` manager.


    ❷ Declaration of the `TextView` object. It’s a child node of the layout manager.


    ❸ Defines one of the constraints of the `TextView` object. It says, there’s an
    anchor point to the bottom of the `TextView`, and it anchored to the bottom of
    the container.


    Try to run the project in an emulator just to make sure that nothing is broken,
    and then we will make some modifications.


    ## Modifying Hello World


    We’ll make some minor changes to both the layout file and the Activity. We’ll
    do the following:


    1. Change the text in the `TextView` control.

    2. Add a `Button` View to the screen; we’ll place it right below the `TextView`.

    3. Add a function to the Activity. The function, when called, will increment the
    value of the `TextView`.

    4. We will associate the new function to the `Button`. Every time we click the
    button, the value of the `TextView` will change.


    Figure [6-6](#457413_2_En_6_Chapter.xhtml#Fig6) shows the general layout of the
    project. Currently, we’re looking at `activity_main.xml` in design mode. While
    in this mode, we can see the view palette, design surface, and blueprint surface.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig6_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    ActivitySample project shown in design view


    To add a `Button` control, drag and drop the `Button` from the View palette to
    the design surface as shown in Figure [6-7](#457413_2_En_6_Chapter.xhtml#Fig7)—you
    can also drop it in the blueprint surface, which will work.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig7_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Drag and drop controls from the View palette


    If you try to run the project at this point in the emulator, you’ll see that the
    button won’t be where you expect it to be. Even if you dragged and dropped the
    `Button` right below the `TextView`, at runtime, any View object that’s not “constrained”
    will be anchored at the top-left location of the screen, as shown in Figure [6-8](#457413_2_En_6_Chapter.xhtml#Fig8).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig8_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Button View without constraint


    The `Hello` `TextView` is nicely centered in the screen because it has four anchor
    points (constraints). The `Button` appears right below the `Hello` text in design
    time, but in runtime, it’s on position 0,0 (top left) of the screen—this is how
    controls are positioned at runtime when they don’t have constraints.


    The `Button` control doesn’t have any constraint yet because we didn’t put any.
    Constraints are not automatically added when you add a control to the design surface.
    The `TextView` has constraints because that was generated by the wizard when we
    created the project.


    Let’s start fresh. Remove all existing constraints on the design surface. You
    can do this by selecting all the View objects and clicking “clear constraints”
    on the design toolbar, as shown in Figure [6-9](#457413_2_En_6_Chapter.xhtml#Fig9).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig9_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig9_HTML.jpg)


    Figure 6-9


    TextView with constraints


    When all the constraints are removed, reposition the controls on the design surface
    in the way you would like them to appear during runtime. Next, select all the
    controls again—you can do this by clicking and dragging the mouse around the controls.


    To “magically” add all the constraints for our controls, click “infer constraints”
    as shown in Figure [6-10](#457413_2_En_6_Chapter.xhtml#Fig10). Android Studio
    will try to best guess the needed constraints for the controls that will match
    your arrangement in the design surface.


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig10_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Infer constraints


    The properties of the controls can be set in the “Attributes” window. We need
    to change some properties of the `TextView` and the `Button` controls. An object’s
    properties will appear on the Attributes panel when the object is selected in
    the design surface. The Attributes panel is collapsed by default. To open the
    Attributes panel, you need to click the panel to open it, as shown in Figure [6-11](#457413_2_En_6_Chapter.xhtml#Fig11).


    ![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig11_HTML.jpg](images/457413_2_En_6_Chapter/457413_2_En_6_Fig11_HTML.jpg)


    Figure 6-11'
