    ### 注册广播的两种方式


    如果你想跟着代码示例操作，需要创建一个项目（带空 Activity）。


    要响应广播，你需要先监听它，而监听广播就需要注册一个接收器。接收器是一个继承自 `BroadcastReceiver` 类的类；你需要在你的应用中添加这样一个类来响应广播消息。


    注册有两种方式：通过清单文件（Manifest）或通过 `Context`（上下文）。


    ### 清单注册


    顾名思义，清单注册是通过应用的清单文件完成的。要通过清单注册来监听广播消息，我们需要执行以下操作：


    ![../images/457413_2_En_15_Chapter/457413_2_En_15_Fig1_HTML.jpg](img/457413_2_En_15_Fig1_HTML.jpg)


    **图 15-1** – 创建一个新的 Java 类


    1.  在应用的 `AndroidManifest` 文件中添加 `<receiver>` 元素；代码清单 15-1 展示了一个带有注释的清单文件。


    2.  向项目中添加一个类（继承自 `BroadcastReceiver` 类），然后重写 `onReceive()` 方法。代码清单 15-2 展示了一个示例
    `BroadcastReceiver` 类，它会记录并显示广播的内容。你可以通过以下两种方式之一添加 `BroadcastReceiver` 类：右键单击项目的包名（在项目工具窗口中），然后依次选择
    **New** ➤ **Java Class**，如图 15-1 所示，然后添加必要的代码来创建 `BroadcastReceiver` 的子类。或者，你也可以右键单击应用的包名，然后依次选择
    **New** ➤ **Other** ➤ **BroadcastReceiver**。无论你选择哪种方式添加 `BroadcastReceiver` 类，如果你想按照代码清单
    15-1 和 15-2 中的代码示例操作，请确保类名为 `MyReceiver`。


    | ❶ | 就像 Activity 一样，`BroadcastReceiver` 也需要在清单中声明。你必须在它的节点中声明它。与 Activity 声明一样，它需要作为
    `application` 的子节点。 |

    | ❷ | `.MyReceiver` 是 `BroadcastReceiver` 类的名称。可以假设你的应用中有一个名为 `MyReceiver` 的类，它继承了
    `BroadcastReceiver`。我们只需像其上面的 Activity（`.MainActivity`）一样将其写为 `.MyReceiver`。完整形式实际上是
    `net.workingdev.ch15_broadcast.MyReceiver`，但我们可以使用简短形式，因为包名已经在前面声明过了；查看清单的第二行，你就能找到包的完整名称。任何后续需要在清单中声明的类都可以简单地使用简短形式，比如
    `.MyReceiver` 或 `.MainActivity`。 |

    | ❸ | `intent-filter` 是我们注册的方式。我们告诉 Android，我们对 `android.intent.action.BOOT_COMPLETED`
    和 `android.intent.action.INPUT_METHOD_CHANGED` 事件感兴趣。如果这些 Intent 被广播，我们的应用将希望响应它。
    |


    ```

    ❸


    代码清单 15-1

    清单注册

    ```


    | ❶ | 继承 `BroadcastReceiver` 类。这个类的名称必须与代码清单 15-1 清单文件中 `<receiver>` 节点的 `android:name`
    属性一致。 |

    | ❷ | 重写 `onReceive()` 方法，并实现你的程序逻辑来响应广播消息。在我们的示例中，我们只是显示一条 Toast 消息。 |


    ```

    import android.content.BroadcastReceiver;

    import android.content.Context;

    import android.content.Intent;

    import android.util.Log;

    import android.widget.Toast;

    public class MyReceiver extends BroadcastReceiver { ❶

    private final String TAG = getClass().getName();

    @Override

    public void onReceive(Context context, Intent intent) { ❷

    StringBuilder sb = new StringBuilder();

    sb.append("Action: " + intent.getAction() + "\n");

    sb.append("URI: " + intent.toUri(Intent.URI_INTENT_SCHEME).toString() + "\n");

    String log = sb.toString();

    Log.d(TAG, log);

    Toast.makeText(context, log, Toast.LENGTH_LONG).show();

    }

    }

    代码清单 15-2

    BroadcastReceiver 类

    ```


    当你在清单文件中声明一个 `BroadcastReceiver` 时，运行时将启动你的应用（如果发送广播时应用尚未运行）。


    当用户在设备上安装此应用时，Android 的包管理器将注册此应用。该接收器随后成为你应用的一个独立入口点，这意味着如果应用当前未运行，运行时可以启动应用并传递广播。


    系统会创建一个新的 `BroadcastReceiver` 组件对象来处理它接收到的每个广播。该对象仅在 `onReceive()` 调用期间有效。一旦你的代码从该方法返回，系统就会认为该组件不再处于活动状态。


    ### Context 注册


    我们已经了解了如何通过清单注册 `BroadcastReceiver`，现在我们来看看如何通过 `Context` 注册 `BroadcastReceiver`。Context
    注册意味着以编程方式进行注册——使用 Activity 上下文或 Application 上下文。


    让我们为此创建另一个项目（带空 Activity），然后添加一个继承自 `BroadcastReceiver` 的 Java 类，就像我们在上一个项目中所做的那样。你也可以将
    `BroadcastReceiver` 类命名为 `MyReceiver`。打开 `MyReceiver` 类并编辑它，使其与代码清单 15-3 匹配。


    ```

    import android.content.BroadcastReceiver;

    import android.content.Context;

    import android.content.Intent;

    import android.widget.Toast;

    public class MyReceiver extends BroadcastReceiver {

    @Override

    public void onReceive(Context context, Intent intent) {

    Toast.makeText(context, "Got it", Toast.LENGTH_LONG).show();

    }

    }

    代码清单 15-3

    MyReceiver 类

    ```


    `MyReceiver` 非常简单；它会在响应广播时显示一条 "Got it" 的 Toast 消息。


    要通过 `Context` 注册 `MyReceiver` 对象，我们将声明一个类型为 `MyReceiver` 的成员变量，作为 `MainActivity`
    的成员，如下所示：


    ```

    MyReceiver receiver = null;

    ```


    我们将其设为成员变量，是因为我们需要在几个 Activity 生命周期回调中引用它。


    在 `MainActivity` 的 `onCreate()` 回调中，我们将创建一个 `MyReceiver` 类的实例，如下所示：


    ```

    receiver = new MyReceiver();

    ```


    我们只想在 Activity 存活期间监听广播消息。当 Activity 对用户不可见时，我们不想接收消息。我们将注册代码放在 `MainActivity`
    的 `onResume()` 方法中；当 Activity 对用户可见时会调用此方法。我们将取消注册接收器的代码放在 `MainActivity` 的 `onPause()`
    方法中，因为当用户离开 `MainActivity` 时会调用此方法。


    让我们编辑 `MainActivity` 类。代码清单 15-4 展示了带有注释的 `MainActivity` 类。

