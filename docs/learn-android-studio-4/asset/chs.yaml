  \n我们还将更改 Button 的`onClick`属性。选择 Button 对象，找到其`onClick`属性，然后将值改为`addNumber`，如图 6-14\
  \ 所示。\n\n![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig14_HTML.jpg](img/457413_2_En_6_Fig14_HTML.jpg)\n\
  \n*图 6-14 — onClick 属性*\n\n将 Button 的`onClick`属性设置为`addNumber`，会将按钮的点击事件关联到 Activity\
  \ 类中一个名为`addNumber()`的方法。当然，这个方法目前还不存在；因此我们接下来需要实现它。打开`MainActivity.java`，按照代码清单\
  \ 6-4 进行修改。\n\n```java\nimport androidx.appcompat.app.AppCompatActivity;\nimport\
  \ android.os.Bundle;\nimport android.view.View;\nimport android.widget.TextView;\n\
  public class MainActivity extends AppCompatActivity {\n@Override\nprotected void\
  \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  ((TextView) findViewById(R.id.textHello)).setText(\"1\"); ❶\n}\npublic void addNumber(View\
  \ v) { ❷\nTextView tv = ((TextView) findViewById(R.id.textHello)); ❸\nint currVal\
  \ = Integer.parseInt(tv.getText().toString()); ❹\ntv.setText((++currVal) + \"\"\
  ); ➀\n}\n}\n```\n\n*代码清单 6-4 — MainActivity.java*\n\n- ❶ 这行代码将 TextView 的文本值设置为“1”。首先，我们通过其`id`获取对\
  \ TextView 的引用。所有视图对象都可以在运行时通过`R.class`引用，因此`R.id.textHello`在运行时指向 TextView 对象的实例。接着，我们将其强制转换为`TextView`对象；然后，调用`setText()`方法。\n\
  - ❷ 这是`addNumber()`方法的实现；它接受一个视图对象作为参数。当该方法被调用时，Android 运行时会将 Button 对象的实例作为参数传递给该方法。\n\
  - ❸ 这行代码获取对 TextView 对象的编程引用，思路与❶相同，但这次我们将对象引用赋值给一个变量。\n- ❹ `tv.getText()`获取 TextView\
  \ 的当前值。此调用返回一个`CharSequence`；因此我需要在它上面调用`toString()`方法，使其便于我们使用。`Integer.parseInt()`方法将数字字符转换为`integer`。\n\
  - ➀ `setText()`方法设置 TextView 的值。表达式`++currVal + \"\"`先对`currVal`变量的当前值执行自增操作，然后将其转换为字符串对象；将空字符串字面量附加到任何原始数据类型上，都可以有效地将其转换为字符串。\n\
  \n完成编辑后，在模拟器上运行该应用程序。图 6-15 展示了项目在模拟器上运行的情况。\n\n![../images/457413_2_En_6_Chapter/457413_2_En_6_Fig15_HTML.jpg](img/457413_2_En_6_Fig15_HTML.jpg)\n\
  \n*图 6-15 — 模拟器上的 ActivitySample*\n\n## 本章小结\n\n- 布局文件以 XML 文件形式描述 UI 结构。你可以使用设计模式（所见即所得）或原始\
  \ XML 模式来处理布局文件。\n- 布局文件中的每个视图元素都被描述为一个 XML 节点，但 XML 文件在运行时才会被解析。解析过程会生成 UI 元素的对象表示。\n\
  - 你可以通过`R.class`以编程方式引用 UI 元素。\n- 可以通过继承`ViewGroup`类来构建复合视图。\n- 布局管理器提供了在屏幕上排列 UI\
  \ 元素的方法。Android SDK 提供了许多我们可以开箱即用的预构建管理器。\n\n"
- "# 7. 事件处理\n\n*本章内容：*\n\n- 监听器对象\n- 匿名内部类\n\n在上一章中，我们已经进行了一些事件处理。其中每次点击按钮都递增 TextView\
  \ 值的练习部分，就是一种*声明式事件处理*。要将方法名绑定到点击事件，我们只需将视图的`android:onClick`属性设置为关联 Activity 类中方法的名称即可。这是一种简洁直接的事件处理方式，但仅限于“点击”事件。当需要处理长按或手势等事件时，你就需要使用事件监听器——这正是本章的主题。\n\
  \n\n\n## 事件处理简介\n\n用户通过触摸、点击、滑动或输入内容来与你的应用进行交互。Android 框架会捕获、存储、处理这些操作，并将其作为事件对象发送给你的应用。我们通过编写专门处理这些事件的方法来响应它们。处理事件的方法写在*监听器对象*内部——这样的对象数量不少。图\
  \ 7-1 展示了一个简化的模型，说明了 Android 框架和你的应用如何处理用户操作。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig1_HTML.jpg](img/457413_2_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1** —— 简化的事件处理模型\n\n当用户在你的应用中执行某个操作（例如点击按钮）时，Android 框架会捕获该操作并将其转换为一个事件对象。事件对象包含关于用户操作的数据，例如，哪个按钮被点击、按钮被点击时的位置等等。Android\
  \ 将此事件对象发送给应用，然后应用会调用一个与用户操作相对应的特定方法。如果用户*点击*了按钮，Android 就会调用`Button`对象上的`onClick()`方法；如果用户点击了同一个按钮但按住的时间稍长一些，那么`onLongClick()`方法就会被调用。像`Button`这样的`View`对象可以响应一系列事件，例如点击、按键、触摸或滑动等。表\
  \ 7-1 列出了一些常见事件及其对应的事件处理程序。\n\n**表 7-1** —— 常见的监听器对象\n\n| 接口 | 方法 | 描述 |\n| ---\
  \ | --- | --- |\n| `View.OnClickListener` | `onClick()` | 当用户触摸并按住控件（在触摸模式下）或者使用导航键聚焦到该项然后按下\
  \ ENTER 键时，会调用此方法 |\n| `View.OnLongClickListener` | `onLongClick()` | 与点击几乎相同，但按住时间更长\
  \ |\n| `View.OnFocusChangeListener` | `onFocusChange()` | 当用户导航到或离开控件时调用 |\n| `View.OnTouchListener`\
  \ | `onTouch()` | 与点击操作几乎相同，但此处理程序能让你判断用户是向上滑动还是向下滑动。你可以用它来响应手势 |\n| `View.OnCreateContextMenuListener`\
  \ | `onCreateContextMenu()` | 当由于长时间持续点击而正在构建`ContextMenu`时，Android 会调用此方法 |\n\n\
  要设置监听器，`View`对象可以设置——或者更准确地说是注册——一个*监听器对象*。注册监听器意味着你告诉 Android 框架当用户与`View`对象交互时要调用哪个方法。图\
  \ 7-2 展示了用于注册监听器对象的带注释代码。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig2_HTML.jpg](img/457413_2_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2** —— 带注释的事件注册与处理\n\n`setOnClickListener`是`android.view.View`类的一个成员方法，这意味着`View`的每个子类都拥有它。该方法需要一个`OnClickListener`对象作为参数——此对象成为按钮控件的监听器。当按钮被点击时，`onClick`方法内的代码将会执行。\n\
  \n我们通过创建一个继承自`View.OnClickListener`的匿名类的实例来创建监听器对象；这种类型在`View`类中被声明为一个嵌套接口。\n\n\
  现在我们已经了解了一些关于事件的知识，让我们把它们付诸实践。让我们创建一个新项目；表 7-2 显示了项目的详细信息。\n\n**表 7-2** —— 项目详情\n\
  \n| 项目详情 | 值 |\n| --- | --- |\n| 应用名称 | `EventHandling` |\n| 公司域名 | 使用你的网站名称 |\n\
  | 语言 | `Java` |\n| 设备规格 | 仅限手机和平板 |\n| 最低 SDK | `API 29 (Q) Android 10` |\n| 活动类型\
  \ | 空白活动 |\n| 活动名称 | `MainActivity` |\n| 布局名称 | `activity_main` |\n\n该项目将只包含两个控件：使用向导创建项目时自带的`TextView`，以及我们即将添加的一个`Button`视图。`Button`将使用一个匿名内部对象来拦截点击和长按事件。\n\
  \n如果`activity_main.xml`文件尚未打开，请在主编辑器中打开它。你可以在项目资源管理器窗口中的`app` ➤ `res` ➤ `layout`文件夹下找到它。\n\
  \n在设计界面上添加一个`Button`对象，并为其添加一些约束。你可以像上一章那样，通过将`Button`从组件面板拖放到设计界面上来将其添加到布局中。图 7-3\
  \ 显示了添加了`Button`对象后的项目。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig3_HTML.jpg](img/457413_2_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3** —— 向项目中添加一个 Button 视图\n\n我们希望`Button`能够响应点击事件，因此我们将设置一个`OnClickListener`对象来精确地完成这项工作。在主编辑器中打开`MainActivity.java`并添加事件处理代码，如代码清单\
  \ 7-1 所示。\n\n```java\nimport androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.widget.Button;\nimport android.widget.Toast;\n\
  public class MainActivity extends AppCompatActivity {\n@Override\nprotected void\
  \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  Button btn = (Button) findViewById(R.id.button); ❶\nbtn.setOnClickListener(new View.OnClickListener(){\
  \ ❷\n@Override\npublic void onClick(View view) { ❸\nContext ctx =  MainActivity.this;\n\
  Toast.makeText(ctx, \"Hello\", Toast.LENGTH_LONG).show(); ❹\n}\n});\n}\n}\n```\n\
  \n**代码清单 7-1** —— `MainActivity.java`\n\n❶   我们获取对`Button`视图的引用；`findViewById()`可以很好地完成这项工作。\n\
  \n❷   在这种情况下，我们设置了一个监听器对象，即一个`OnClickListener`对象，因为我们想要监听点击事件。\n\n❸   我们重写了`OnClickListener`的`onClick()`方法；这是我们放置当`Button`被点击时要运行的代码的地方。\n\
  \n❹   我们显示一条`Toast`消息。`Toast`是一个小型弹出消息，几秒钟后会自动消失。你可以用它向用户发送简短的反馈。显示`Toast`消息分为两步。第一步是使用`makeText()`函数创建一个`Toast`消息。它接受三个参数：(1)\
  \ 应用的上下文，在我们的例子中是`MainActivity`的实例，(2) 要显示的消息，以及 (3) 显示的时间长度。第二步是通过调用`.show()`方法使其可见。\n\
  \n图 7-4 显示了点击`Button`时的应用界面。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig4_HTML.jpg](img/457413_2_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4** —— Toast 消息\n\n\n\n## 处理长按点击\n\n视图对象可以处理多种类型的事件。我们可以让`Button`同时响应单击（刚才已经实现）和长按点击（即将实现）。\n\
  \n我们将为`Button`对象设置另一个监听器对象，这次是用于监听长按事件的监听器。与点击监听器类似，我们会在`Activity`类的`onCreate`方法中设置长按监听器，因为在设置监听器时`Activity`无需处于可见状态。如果你觉得`onCreate`方法已经变得过于拥挤，可以随时重构该方法，将所有事件处理代码迁移到其他地方。在本示例中，我将把事件处理代码保留在`onCreate`方法内。长按监听器的代码如代码清单\
  \ 7-2 所示。\n\n```\nbtn.setOnLongClickListener(new View.OnLongClickListener() {\n\
  @Override\npublic boolean onLongClick(View view) {\nreturn true;\n}\n});\n代码清单 7-2\n\
  长按监听器\n```\n\n这个监听器在结构上与点击处理程序非常相似；我们调用`setXXXListener`方法，并将一个匿名监听器类的实例作为参数传递进去。然后重写同一个监听器对象的方法（这里重写的是`onLongClick`方法），并将我们的代码写入其中——仅此而已。\n\
  \n我们也可以在这里再次使用`Toast`消息，但我认为使用另一种反馈机制（比如`Snackbar`）可能更具启发性。`Snackbar`与`Toast`类似，但与在屏幕上方悬浮显示文本消息不同，`Snackbar`的消息会固定在屏幕底部显示。你可以让它在超时后自动消失（就像`Toast`一样），或者让用户通过滑动将其关闭。`Snackbar`的功能比`Toast`更强大，因为您可以在消息中包含一些操作选项，就像一个小对话框一样。\n\
  \n在继续之前，我们需要对项目进行两处修改。我们需要：\n\n1.  更改布局容器的`id`属性值。默认情况下，布局容器没有设置`id`，这通常没问题，因为我们之前无需从\
  \ Java 代码中引用它。但现在我们需要这样做了。`Snackbar`的构造要求我们引用布局容器。\n2.  在 Gradle 文件中添加一个依赖项。`Snackbar`并不能直接使用；你需要将其包含在项目的依赖文件中。\n\
  \n我们先处理布局文件。打开`activity_main`布局文件，然后更改主布局文件`id`属性的值。默认情况下，布局容器的`id`属性没有值；我们现在需要给它设置一个值，因为稍后需要在代码中引用它。\n\
  \n当`activity_main`在主编辑器中打开时，切换到设计模式；点击布局容器主体内的任意位置，如图 7-5 所示。在属性面板中，编辑`id`属性并将其值设置为`root_layout`。\n\
  \n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig5_HTML.jpg](img/457413_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5  \n更改布局容器的`id`属性\n\n接下来，打开`build.gradle`文件。这里有两个 Gradle 文件：一个位于项目的根文件夹中，另一个位于\
  \ app 文件夹内。我们需要更新的是后者。通过双击`build.gradle (Module: App)`打开模块级别的 Gradle 文件，如图 7-6 所示。\n\
  \n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig6_HTML.jpg](img/457413_2_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6  \n`build.gradle`文件\n\n然后，在依赖项部分添加`implementation 'com.google.android.material:material:1.0.0'`这一行，如代码清单\
  \ 7-3 所示。这将使`Snackbar`对象可供使用。\n\n```\ndependencies {\nimplementation fileTree(dir:\
  \ \"libs\", include: [\"*.jar\"])\nimplementation 'androidx.appcompat:appcompat:1.1.0'\n\
  implementation 'androidx.constraintlayout:constraintlayout:1.1.3'\ntestImplementation\
  \ 'junit:junit:4.12'\nandroidTestImplementation 'androidx.test.ext:junit:1.1.1'\n\
  androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'\nimplementation\
  \ 'com.google.android.material:material:1.0.0'\n}\n代码清单 7-3\nbuild.gradle 文件中的 dependencies\
  \ 部分\n```\n\n现在我们已经修复了 Gradle 文件和布局容器的`id`，可以编写`Snackbar`的代码了；代码清单 7-4 展示了显示`Snackbar`的代码。\n\
  \n```\nbtn.setOnLongClickListener(new View.OnLongClickListener() {\n@Override\n\
  public boolean onLongClick(View view) {\nView vtemp = findViewById(R.id.root_layout);\n\
  Snackbar.make(vtemp,\"长按点击\", Snackbar.LENGTH_LONG).show();\nreturn true;\n}\n});\n\
  代码清单 7-4\n用于显示 Snackbar 的代码\n```\n\n`onLongClick`方法返回一个布尔值。我们从该方法返回`true`，是为了告知\
  \ Android 运行时我们已经处理了该事件；不需要其他处理程序（比如`onClick`）再次处理它。如果我们返回`false`，那么当`onLongClick`方法返回后，`onClick`处理程序就会立即生效。\n\
  \n代码清单 7-5 展示了`MainActivity.java`的完整代码，供你参考。\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
  import android.content.Context;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.widget.Button;\nimport android.widget.Toast;\nimport com.google.android.material.snackbar.Snackbar;\n\
  public class MainActivity extends AppCompatActivity {\n@Override\nprotected void\
  \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  Button btn = (Button) findViewById(R.id.button);\nbtn.setOnClickListener(new View.OnClickListener(){\n\
  @Override\npublic void onClick(View view) {\nContext ctx =  MainActivity.this;\n\
  Toast.makeText(ctx, \"你好\", Toast.LENGTH_LONG).show();\n}\n});\nbtn.setOnLongClickListener(new\
  \ View.OnLongClickListener() {\n@Override\npublic boolean onLongClick(View view)\
  \ {\nView vtemp = findViewById(R.id.root_layout);\nSnackbar.make(vtemp,\"长按点击\"\
  , Snackbar.LENGTH_LONG).show();\nreturn true ;\n}\n});\n}\n}\n代码清单 7-5\nMainActivity.java\
  \ 的完整代码\n```\n\n图 7-7 展示了在模拟器上对`Button`进行长按点击后应用的状态。\n\n![../images/457413_2_En_7_Chapter/457413_2_En_7_Fig7_HTML.jpg](img/457413_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7  \n应用显示`Snackbar`消息\n\n## 总结\n\n*   如果你想处理简单的点击事件，可以将`android:onClick`属性设置成一个函数名。\n\
  *   如果你打算拦截某些事件，必须将监听器对象注册到 Android 运行时。\n*   有多种类型的监听器对象，它们被列为`View`类中的嵌套接口。\n\
  *   你可以将多个监听器关联到同一个`View`对象上。\n*   如果你不希望其他事件处理程序处理该事件，请确保在`onLongClick`方法中返回`false`。\n\
  \n"
- "# 8. 意图\n\n*我们将涵盖的内容：*\n\n*   意图概述\n*   显式意图和隐式意图\n*   在活动之间传递数据\n*   从意图返回结果\n\
  \nAndroid 在构建应用程序的方式上独一无二。它引入了组件这一概念，而不仅仅是普通对象。而 Android 让这些组件进行交互的方式是 Android 平台独有的。Android\
  \ 使用意图作为其组件之间通信的方式；它通过意图在组件之间传递消息。在本章中，我们将探讨意图，了解它们是什么以及如何使用它们。\n\n\n\n## 什么是 Intent\n\
  \n`Intent` 是对要执行操作的抽象描述。这是一个独特的 Android 概念，因为没有其他平台使用相同的方式作为组件激活的手段。在前面的章节中，我们了解了\
  \ Android 应用的内部结构。你可能还记得，应用只是一堆松散组合的“组件”（见图 8-1），每个组件都在 `AndroidManifest` 文件中声明。\n\
  \n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig1_HTML.jpg](img/457413_2_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** Android 应用的逻辑表示\n\n启动一个 `Activity` 并不像创建某个特定 `Activity` 类的实例那么简单，它比这要复杂一些。`Activity`\
  \ 不仅仅是一个对象，它是一个组件，而在 Android 中激活组件需要使用 `Intent`。\n\n要启动一个 `Activity`，我们需要创建一个 `Intent`\
  \ 对象，告诉这个 `Intent` 对象我们要激活什么，然后启动它。之后，Android 运行时会尝试解析这个 `Intent`，如果成功，目标组件就会被激活。在代码中，它看起来是这样的：\n\
  \n```\nIntent intent = new Intent(context, target);\nstartActivity(intent);\n```\n\
  \n其中：\n- **context** — 是对要发起或启动 `Intent` 的组件的引用。\n- **target** — 是一个类对象，也就是你想要启动的组件。\n\
  \n启动 `Activity`（通常是从 `MainActivity` 启动）的典型场景是用户点击按钮或选择菜单项时。\n\n要尝试这个操作，你需要一个包含两个\
  \ `Activity` 的项目。你已经知道如何创建一个包含空白 `Activity` 的项目，所以直接创建一个即可；假设第一个 `Activity` 类的名称是\
  \ `MainActivity`。要添加另一个 `Activity`，我们可以使用上下文菜单。在 Project 工具窗口中，右键单击 **app** 文件夹（假设你处于\
  \ Android 作用域，这是默认设置），然后选择 **New** ➤ **Activity** ➤ **Empty Activity**，如图 8-2 所示。\n\
  \n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig2_HTML.jpg](img/457413_2_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** 新建空白 Activity\n\n在接下来的窗口中，输入第二个 `Activity` 的名称，如图 8-3 所示。采用建议的布局名称（或根据喜好更改），确保它在同一个\
  \ Java 包中，并且源语言是 Java。点击 **Finish** 继续。\n\n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig3_HTML.jpg](img/457413_2_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3** 新建 Android Activity\n\n接下来，打开 `activity_main.xml` 并进行编辑，使其与代码清单 8-1\
  \ 匹配。\n\n```\n代码清单 8-1\napp/res/layout/activity_main.xml\n```\n\n我在 `activity_main`\
  \ 布局中所做的是移除了默认的 `TextView` 对象，并用一个 `Button` 视图（其 **id** 为 `button`）替换了它。\n\n现在我们可以处理\
  \ `MainActivity` 了。我们需要为 `Button` 绑定一个点击处理器，并在该处理器中创建并启动一个 `Intent`。代码清单 8-2 展示了实现此功能的注解代码。\n\
  \n| ❶ | 获取对 `Button` 视图的引用。 |\n| ❷ | 创建一个 `OnClickListener` 对象并将其绑定到 `Button` 对象。\
  \ |\n| ❸ | 在 `onClick()` 方法内部，创建一个 `Intent` 对象。第一个参数是一个 `Context` 对象，应该引用 `MainActivity`。我写了\
  \ `MainActivity.this` 而不仅仅是 `this`，因为当前我们在一个点击处理器（这是一个匿名类）内部进行调用；`this` 将引用匿名类的实例，而不是\
  \ `MainActivity`。为了明确，我们将 `MainActivity` 的上下文引用为 `MainActivity.this`。或者，你也可以将应用上下文作为第一个参数传递。你可以使用\
  \ `getApplicationContext()` 方法获取应用上下文。第二个参数是我们想要启动的组件的类对象，即 `SecondActivity`；因此，我们传递\
  \ `SecondActivity.class`。 |\n| ❹ | 最后，我们调用 `MainActivity` 的 `startActivity()` 方法，并将\
  \ `Intent` 对象作为参数传递；这将启动该 `Intent`。 |\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
  import android.content.Intent;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.widget.Button;\n\npublic class MainActivity extends AppCompatActivity\
  \ {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n \
  \       super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
  \n        Button btn = findViewById(R.id.button); ❶\n\n        btn.setOnClickListener(new\
  \ View.OnClickListener() { ❷\n            @Override\n            public void onClick(View\
  \ view) {\n                Intent intent = new Intent(MainActivity.this, SecondActivity.class);\
  \ ❸\n                startActivity(intent); ❹\n            }\n        });\n    }\n\
  }\n```\n\n**代码清单 8-2** MainActivity\n\n如果你现在运行这个应用，当你在 `MainActivity` 上点击 `Button`\
  \ 时，`SecondActivity` 将会启动。在这个例子中，我们告诉 `Intent` 对象我们想要激活哪个组件（`SecondActivity`）。这种\
  \ `Intent` 对象被称为**显式 Intent**，仅仅是因为我们非常精确地指定了要激活的内容。另一种 `Intent` 被称为**隐式 Intent**，这将在下一节中讨论。\n\
  \n\n\n## 隐式 Intent\n\n`Intent` 分为两种：隐式 Intent 和显式 Intent。你可以这样理解这两种 `Intent`：假设我们请某人帮忙买些糖。如果我们只说“请帮我买些糖”，没有提供更多细节，这就相当于一个隐式\
  \ `Intent`，因为那个人可以在任何地方买到糖。反之，如果我们给出这样的指令：“请去第三街的 ABC 商店买些糖”，这就相当于一个显式 `Intent`。我们在清单\
  \ 8-2 中的早期示例就是一个显式 `Intent`，因为我们明确告知了 `Intent` 要激活哪个组件。\n\n另一方面，隐式 `Intent` 非常强大，因为它们允许应用程序利用其他应用程序的功能。你的应用可以获得并非由你自己编写的功能。例如，你可以创建一个\
  \ `Intent` 来打开相机、拍照并保存照片，而无需编写任何相机相关的代码。\n\n隐式 `Intent` 的目的是让你使用应用中不存在的功能，因为如果该功能存在于你的应用内部，你首先就会使用显式\
  \ `Intent`。使用隐式 `Intent` 是一种请求 Android 运行时在设备上找到某个能处理你请求的应用程序的方式。\n\n在显式 `Intent`\
  \ 中，我们告诉 `Intent` 要激活哪个特定组件。而在隐式 `Intent` 中，我们告诉 `Intent` 我们想要做什么；例如，如果我们想启动一个浏览器并导航到\
  \ [`https://apress.com`](https://apress.com)，可以这样做：\n\n1.  创建一个 `Intent` 对象。\n2.\
  \  通过指定某些操作告诉它要做什么，例如“查看地图”、“拨打电话”、“拍照”、“查看网页”等。\n3.  提供一些信息或数据；例如，如果我们想启动一个浏览器并导航到某个特定网页，我们需要告诉\
  \ `Intent` 该网页的 URI。\n4.  最后，启动该 `Intent`。\n\n清单 8-3 展示了如何在代码中实现这一点。\n\n| ❶ | 使用无参构造函数创建\
  \ `Intent` 对象。 |\n|---|---|\n| ❷ | 设置 `Intent` 的 action。在此示例中，我们想要查看某些内容；可以是联系人、网页、地图、某处的图片等。此时，Android\
  \ 运行时还不知道你想查看什么。`ACTION_VIEW` 是你可以使用的众多 Intent Action 之一。你可以在 Android 官方网站上找到其他类型的\
  \ Action：[`https://developer.android.com/guide/components/intents-common`](https://developer.android.com/guide/components/intents-common)。\
  \ |\n| ❸ | 设置其数据。此时，Android 运行时已经很清楚你想要做什么。在此示例中，`Uri` 是一个网页。Android 非常智能，能识别出我们想要查看一个网页。\
  \ |\n| ❹ | Android 将搜索设备上所有应用，找出最符合此请求的应用。如果找到多个应用，它将让用户选择使用哪一个。如果只找到一个，它将直接启动该应用。\
  \ |\n\n```\nIntent intent = new Intent(); ❶\nintent.setAction(Intent.ACTION_VIEW);\
  \ ❷\nintent.setData(Uri.parse(\"https://apress.com\")); ❸\nstartActivity(intent);\
  \ ❹\n清单 8-3\n用于浏览网页的 Intent 示例\n```\n\n或者，你也可以通过将 action 和 data 传递给 `Intent` 的构造函数来设置，如下所示：\n\
  \n```\nIntent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(\"https://apress.com\"\
  ));\n```\n\n任何能够响应此 `Intent` 的组件无需在运行中即可接收该 `Intent`。请记住，所有应用程序都需要有一个清单文件。每个应用程序都在清单文件中声明其能力，特别是通过\
  \ `<intent-filter>` 部分。Android 的包管理器拥有设备上所有已安装应用的全部信息。Android 运行时仅需清单文件中的信息，即可查看哪些应用能够或有资格响应此\
  \ `Intent`。Android 运行时检查 `Intent` 对象的内容，然后将其与所有组件的 Intent 过滤器进行比较。Intent 过滤器是 Android\
  \ 组件向 Android 系统声明其能力的一种方式。\n\n为了实际演示这一点，让我们创建另一个带有空 Activity 的项目。假设你已经创建好了，现在我们来处理\
  \ `MainActivity` 类。我们将创建三个动作触发器；我们可以使用按钮，但在此练习中，我们使用选项菜单。清单 8-4 显示了 `MainActivity`\
  \ 的带注释代码。\n\n| ❶ | 让我们重写 `onCreateOptionsMenu()` 回调；它将在 `onCreate()` 回调之后不久被调用。重写此方法允许我们以编程方式构建动态菜单。\
  \ |\n|---|---|\n| ❷ | 动态添加一个菜单项。 |\n| ❸ | 每当用户点击某个菜单项时，`onOptionsItemSelected` 就会被调用；这是我们处理菜单点击的地方。\
  \ |\n| ❹ | `item` 参数可以告诉我们哪个菜单项被点击了。我们将其转换为 `String`，以便使用 `switch` 语句来路由程序逻辑。 |\n\
  | ❺ | 创建一个 `Intent`，并设置其 action 和 data 以查看 Apress 网站。 |\n| ❻ | 创建一个 `Intent`，并设置其\
  \ action 和 data 以查看一个位置。 |\n| ❼ | 创建一个 `Intent`，并设置其 action 和 data 以拨打特定号码。 |\n\n\
  ```\nimport androidx.annotation.NonNull;\nimport androidx.appcompat.app.AppCompatActivity;\n\
  import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.view.Menu;\nimport android.view.MenuItem;\n\
  public class MainActivity extends AppCompatActivity {\nprivate final String TAG\
  \ = getClass().getName();\n@Override\nprotected void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  }\n@Override\npublic boolean onCreateOptionsMenu(Menu menu) { ❶\nmenu.add(\"View\
  \ Apress\"); ❷\nmenu.add(\"View Map\");\nmenu.add(\"Call number\");\nreturn super.onCreateOptionsMenu(menu);\n\
  }\n@Override\npublic boolean onOptionsItemSelected(@NonNull MenuItem item) { ❸\n\
  Intent intent = null;\nUri uri;\nswitch(item.toString()) {  ❹\ncase \"View Apress\"\
  :\nLog.d(TAG, \"View Action\");\nuri = Uri.parse(\"https://apress.com\");\nintent\
  \ = new Intent(Intent.ACTION_VIEW, uri); ➀\nbreak;\ncase \"View Map\":\nuri = Uri.parse((\"\
  geo:40.7113399,-74.0263469\"));\nintent = new Intent(Intent.ACTION_VIEW, uri); ➁\n\
  break;\ncase \"Call number\":\nLog.d(TAG, \"Call number\");\nuri = Uri.parse((\"\
  tel:639285083333\"));\nintent = new Intent(Intent.ACTION_CALL, uri); ➂\n}\nstartActivity(intent);\n\
  return true;\n}\n}\n清单 8-4\nMainActivity\n```\n\n图 8-4 展示了运行时的应用程序。\n\n![../images/457413_2_En_8_Chapter/457413_2_En_8_Fig4_HTML.jpg](img/457413_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n隐式 Intent 项目，运行中\n\n### 摘要\n\n*   Intent 用于组件激活。\n*   Intent 有两种类型：隐式\
  \ Intent 和显式 Intent。\n*   显式 Intent 允许我们与多个 Activity 协同工作。你可以使用显式 Intent 激活特定的 Activity。\n\
  *   隐式 Intent 扩展了应用程序的功能。它们使你的应用能够执行其自身功能范围之外的操作。\n\n\n\n"
- "# 9. 片段\n\n*本章内容概要：*\n\n* 片段简介\n* Fragment 类与 Fragment 资源文件\n* 向 Activity 中动态添加\
  \ Fragment\n\n在 Android 早期，当它只在手机上运行且没有高分辨率屏幕时，Activity 足以构建用户界面并与用户交互。随后出现了平板电脑和高分辨率显示屏。创建能在手机和平板上都能良好运行的应用程序变得越来越困难。开发者面临艰难的选择：要么选择功能最弱的硬件作为目标，将其视为最低标准；要么让应用通过根据设备能力移除和添加\
  \ UI 元素来适应一系列形态因素，而事实证明手动执行此操作非常困难。当 API 11（Honeycomb）推出时，Android 使用 Fragment 解决了这个问题；这也是本章的主题。\n\
  \n## 片段简介\n\n如果我们将 Activity 视为 UI 的组成单元，那么可以将 Fragment 视为一个微型 Activity——它是一个更小的组成单元。通常，你会在运行时根据用户的操作（例如倾斜设备、从竖屏切换到横屏，从而获得更多屏幕空间）来显示（和隐藏）Fragment。你甚至可以将\
  \ Fragment 用作适应设备形态因素的策略。当应用在较小屏幕上运行时，你只会显示部分 Fragment。\n\n与 Activity 类似，Fragment\
  \ 由两部分组成——一个 Java 程序和一个布局文件。其思想几乎相同：在 XML 文件中定义 UI 元素，然后在程序文件中展开 XML 文件，使 XML 中的所有视图对象都成为对象。之后，我们可以通过\
  \ `R.class` 引用 XML 中的每个视图对象。可以将 Fragment 想象成一个可以拖放到主布局文件上的普通视图对象。\n\n要创建 Fragment，我们通常执行以下步骤：\n\
  \n1. 创建一个 XML 资源文件，并将其放入 `/app/res/layout` 文件夹，就像放置 `activity_main.xml` 一样。\n2.\
  \ 为新的资源文件赋予一个描述性名称，例如 `fragment_booktitles`。\n3. 创建 Fragment 类；此类必须继承 `androidx.fragment.app.Fragment`——所有支持库现在都在\
  \ `androidx` 包中。\n4. 接下来，将 Fragment 类与 XML 资源布局连接起来。你可以在 Fragment 类的 `onCreate()`\
  \ 方法中展开 XML 资源文件。\n5. 对 `MainActivity` 进行一些修改。默认的 `MainActivity` 继承自 `AppCompatActivity`；这通常没问题，但我们使用的是支持库中的\
  \ Fragment 类，这意味着我们需要继承 `FragmentActivity` 而不是默认的 `AppCompatActivity`。\n6. 添加新创建的\
  \ Fragment。\n\n让我们在 Android Studio 中操作。首先，创建一个带有空 Activity 的项目，就像我们之前创建的其他项目一样。\n\
  \n让我们创建一个 XML 资源文件并将其放入 `/app/res/layout`。你可以通过右键单击项目的布局文件夹，然后选择 **New** ➤ **Layout\
  \ Resource File** 来执行此操作，如图 9-1 所示。\n\n![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig1_HTML.jpg](img/457413_2_En_9_Fig1_HTML.jpg)\n\
  \n*图 9-1：新建布局资源文件*\n\n在随之出现的窗口中，输入新资源文件的文件名（`fragment_booktitles`），如图 9-2 所示。\n\n\
  ![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig2_HTML.jpg](img/457413_2_En_9_Fig2_HTML.jpg)\n\
  \n*图 9-2：新资源文件*\n\n接下来，让我们添加一个 fragment 类。为此，通过右键单击项目的包，然后选择 **New** ➤ **Java Class**\
  \ 来添加一个 Java 类，如图 9-3 所示。\n\n![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig3_HTML.jpg](img/457413_2_En_9_Fig3_HTML.jpg)\n\
  \n*图 9-3：添加 Java 类*\n\n在随之出现的弹出窗口中，输入新 Java 类的名称（`BookTitle`），如图 9-4 所示。\n\n![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig4_HTML.jpg](img/457413_2_En_9_Fig4_HTML.jpg)\n\
  \n*图 9-4：新建 Java 类*\n\n编辑 `fragment_booktitles` 布局文件以匹配清单 9-1。你可以添加任何想要的 View 组件；就我而言，我简单地添加了一个\
  \ `TextView` 对象。\n\n```\n清单 9-1\napp/res/layout/fragment_booktitles.xml\n```\n\n\
  接下来，修改 `BookTitle` 类以匹配清单 9-2。\n\n\n```markdown\n\n```\nimport android.os.Bundle;\n\
  import android.view.LayoutInflater;\nimport android.view.View;\nimport android.view.ViewGroup;\n\
  import androidx.annotation.NonNull;\nimport androidx.annotation.Nullable;\nimport\
  \ androidx.fragment.app.Fragment;\nimport static com.example.ch9fragments.R.layout.*;\n\
  public class BookTitle extends Fragment {\n@Nullable\n@Override\npublic View onCreateView(@NonNull\
  \ LayoutInflater inflater,\n@Nullable ViewGroup container,\n@Nullable Bundle savedInstanceState)\
  \ {\nfinal View view = inflater.inflate(fragment_booktitles, container, false);\n\
  return view;\n}\n}\n```\n*清单 9-2* `BookTitle` 类\n\n我们可以通过将布局文件填充并返回给`onCreateView()`回调来关联片段布局文件（`fragment_booktitles`）与片段类（`BookTitle`）。\n\
  \n`onCreateView()`回调与`Activity`类的`onCreate()`方法类似，但要注意此时不能引用任何`View`元素，因为它们尚未就绪。如果需要引用片段布局文件中的任何`View`元素，则必须在`onViewCreated()`回调（此处未显示）中执行。不能在`onCreateView()`回调中引用任何`View`元素的原因是此时布局资源文件尚未填充，因此它们自然不存在。\n\
  \n接下来，让我们编辑`MainActivity`。我们需要将`MainActivity`的父类从`AppCompactActivity`更改为`FragmentActivity`——因为我们正在使用片段。清单\
  \ 9-3 展示了`MainActivity`的代码。\n\n```\nimport androidx.fragment.app.FragmentActivity;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
  public class MainActivity extends FragmentActivity {\n@Override\nprotected void\
  \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  }\n}\n```\n*清单 9-3* `MainActivity`\n\n如果想显示我们创建的片段，可以编辑`activity_main`布局文件，然后从面板（如图\
  \ 9-5 所示）拖放`<fragment>`元素。运行应用时，片段将像其他`View`元素一样在`Activity`中显示。\n\n![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig5_HTML.jpg](img/457413_2_En_9_Fig5_HTML.jpg)\n\
  \n*图 9-5* `<fragment>`\n\n或者，您可以通过编程方式显示片段。为此，我们需要为片段准备一个占位符，可能还需要一个`Button`元素（作为显示片段时的操作触发器）。编辑`activity_main.xml`以匹配清单\
  \ 9-4。\n\n```\n*清单 9-4* `app/res/layout/activity_main`\n```\n\n我在`activity_main`中添加了一个`Button`和一个`FrameLayout`容器。我给了`FrameLayout`一个`id`为`fragplaceholder`（您可以随意命名），以便稍后引用它。\n\
  \n向`MainActivity`（动态地）添加片段需要使用`FragmentTransaction`对象。要获取`FragmentTransaction`对象，我们还需要一个`FragmentManager`对象。通常这样做：\n\
  \n```\nFragmentManager fm = getSupportFragmentManager();\nFragmentTransaction ft\
  \ = fm.beginTransaction();\n```\n\n现在，我们可以进行片段事务了。要将`BookTitle`片段添加到`MainActivity`，我们需要两件事：\n\
  \n1.  一个`BookTitle`实例\n2.  一个用于放置片段的`ViewGroup`；这就是我们的`FrameLayout`对象\n\n在代码中，它看起来像这样：\n\
  \n```\nBookTitle booktitle = new BookTitle();\nFragmentManager fm = getSupportFragmentManager();\n\
  FragmentTransaction ft = fm.beginTransaction();\nft.add(R.id.fragplaceholder, booktitle);\n\
  ft.commit();\n```\n\n为了全面说明，将`MainActivity`编辑为清单 9-5 所示，其中包含我们片段小型演示应用的完整代码。\n\n\
  ```\nimport androidx.fragment.app.FragmentActivity;\nimport androidx.fragment.app.FragmentManager;\n\
  import androidx.fragment.app.FragmentTransaction;\nimport android.os.Bundle;\nimport\
  \ android.view.View;\nimport android.widget.Button;\npublic class MainActivity extends\
  \ FragmentActivity {\n@Override\nprotected void onCreate(Bundle savedInstanceState)\
  \ {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  Button btn = findViewById(R.id.button);\nbtn.setOnClickListener(new View.OnClickListener()\
  \ {\n@Override\npublic void onClick(View v) {\nBookTitle booktitle = new BookTitle();\n\
  FragmentManager fm = getSupportFragmentManager();\nFragmentTransaction ft = fm.beginTransaction();\n\
  ft.add(R.id.fragplaceholder, booktitle);\nft.commit();\n}\n});\n}\n}\n```\n*清单 9-5*\
  \ `MainActivity`，完整代码\n\n当应用运行时，它不会立即显示片段。当您单击`Button`时，`BookTitle`片段将显示。\n\n图 9-6\
  \ 显示了在模拟器中运行的片段应用。\n\n![../images/457413_2_En_9_Chapter/457413_2_En_9_Fig6_HTML.jpg](img/457413_2_En_9_Fig6_HTML.jpg)\n\
  \n*图 9-6* 片段应用\n\n## 总结\n\n*   要创建片段，您需要一个布局资源文件和一个 Java 类（继承自`androidx.fragment.app.FragmentActivity`）。\n\
  *   要将`Fragment`类与片段布局文件关联，请在该类的`onCreateView()`回调方法内填充布局文件。\n*   要以编程方式添加片段，您需要使用`FragmentManager`和`FragmentTransaction`对象。\n\
  \n# 10. 导航\n\n*我们将涵盖：*\n\n*   Android 导航技术回顾\n*   Jetpack 中的导航组件\n\n```\n\n\n##\
  \ 架构组件之前的导航方式\n\n在 Android 开发的早期，大多数有意义的应用都包含多个屏幕，UI 被分散在多个 `Activity` 类中。这意味着你需要掌握从一个\
  \ `Activity` 导航到另一个并返回的技能。因此，在那个时期，你可能会写出类似于示例 10-1 中的代码。\n\n```\nclass FirstActivity\
  \ extends AppCompatActivity\nimplements View.OnClickListener {\npublic void onClick(View\
  \ v) {\nIntent intent = new Intent(this, SecondActivity.class);\nstartActivity(intent);\n\
  }\n}\n// SecondActivity.java\nclass SecondActivity extends AppCompatActivity { }\n\
  示例 10-1\n如何启动 Activity\n```\n\n如果你需要将数据从一个 `Activity` 传递到另一个，可能会编写类似示例 10-2 中所示的代码片段。\n\
  \n```\nIntent intent = new Intent(this, SecondActivity.class);\nIntent.putExtra(\"\
  key\", value);\nstartActivity(intent);\n示例 10-2\n如何将数据传递到另一个 Activity\n```\n\n这种屏幕管理方式具有以下优势：\n\
  \n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig1_HTML.jpg](img/457413_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\n简单的 Activity 工作流程\n\n*   实现简单；只需从任意 `Activity` 调用 `startActivity()`\
  \ 方法即可。\n*   可以通过编程方式调用 `finish()` 方法关闭当前正在运行的 `Activity`。用户也可以按返回键关闭 `Activity`。\n\
  *   返回栈完全由 Android 运行时管理；参见图 10-1。\n\n但并非一切完美；`Activity` 导航也带来了一些负担。其缺点如下：\n\n*\
  \   我们无法清晰了解返回栈中有哪些 `Activity` 类——因为我们不管理它；这里有一个特点既是优点也是缺点的例子。\n*   每个屏幕都需要一个新的\
  \ `Activity`，这会消耗计算资源。\n*   每个 `Activity` 都需要在 Android 清单文件中声明——不过当你使用向导创建 `Activity`\
  \ 时，Android Studio 会自动为你完成，因此这不算大问题；在 Android Studio 出现之前确实是个问题。\n*   你将难以使用更现代的导航模式，例如底部导航栏。\n\
  \n由于这些限制，出现了另一种屏幕导航方式。大约在 2011 年，谷歌发布 Android 4.0 时，我们有了 `Fragment` 类。我们在上一章刚刚讨论过\
  \ `Fragment` 类，所以我相信你对它还很熟悉；`Activity` 本质上是一个 UI 组合单元，而 `Fragment` 则是一个更小的组合单元。\n\
  \n`Fragment` 和 `Activity` 一样，由两部分组成——一个 Java 或 Kotlin 程序以及一个布局文件。其基本思想相同——在 XML\
  \ 文件中定义 UI，然后在运行时加载该 XML 文件，这样 XML 文件中的所有 UI 就会变成实际的 Java 对象。\n\n其核心思想是创建多个 fragment\
  \ 并将它们包含在一个 `Activity` 中。通常，根据用户操作、设备方向或设备外形，你需要隐藏或显示某个 `Fragment`；这通常通过 `FragmentManager`\
  \ 和 `FragmentTransaction` 对象来完成。示例 10-3 中的代码片段是典型的 fragment 管理代码。\n\n```\nFragmentManager\
  \ fm = getFragmentManager();\nFragmentTransaction ft = fm.beginTransaction();\n\
  Fragment fragment = new FirstFragment();\nft.add(R.id.fragment_container, fragment);\n\
  ft.commit();\n示例 10-3\nFragment 代码片段\n```\n\n使用 `Fragment` 类时，我们确切知道导航栈中的内容，这与使用\
  \ `Activity` 导航不同；但是，如示例 10-3 所示，它可能变得笨拙，因为我们必须手动管理导航栈。\n\n到目前为止，我们只有两种导航选择：要么使用基于\
  \ `Activity` 的导航，简单易用，但会带来一些性能开销且无法控制导航栈；要么使用 `Fragment` 类，它让我们完全控制导航栈，但 API 笨拙且容易出错。\n\
  \n时间快进到 2017 年，谷歌引入了导航组件（Navigation components）。现在我们可以使用 `Fragment` 类，而无需处理复杂 API\
  \ 的负担。使用导航组件，我们在示例 10-3 中编写的所有代码现在都可以用一行代码替换（参见示例 10-4）。\n\n```\nfindNavController().navigate(destination);\n\
  // 我们不再需要以下代码\n/*\nFragmentManager fm = getFragmentManager();\nFragmentTransaction\
  \ ft = fm.beginTransaction();\nFragment fragment = new FirstFragment();\nft.add(R.id.fragment_container,\
  \ fragment);\nft.commit();\n*/\n示例 10-4\n导航组件代码片段\n```\n\n\n\n## 导航组件\n\n没错，上一节中那单行代码引用可能让你感到兴奋——也松了口气。但这不仅仅是减少敲击键盘次数的问题，关键在于现在我们能够兼顾基于\
  \ Activity 和基于 Fragment 的导航优势。现在，Fragment 导航也有了简洁易用的 API。\n\n不过，我们首先要对导航组件有所了解。它是架构组件（Architecture\
  \ Components）的一小部分，而架构组件又是名为 Android Jetpack 的更大体系中的一部分——这里我们不深入探讨 Jetpack 或架构组件，它们是庞大的主题，但简要的背景介绍并无坏处。\n\
  \n在 2017 年 Google I/O 大会上，Google 介绍了 Android 架构组件。这些库是名为 Android Jetpack 的庞大组件集合的一部分。与架构组件一同发布的还有\
  \ Foundation（基础）、Behavior（行为）和 UI（界面）等类别。\n\nJetpack 是一套 Android 软件组件，它能帮助我们遵循最佳实践，避免编写过多的样板代码。你可以在`androidx.*`包下的库中找到\
  \ Jetpack 的代码。\n\n以下是 Jetpack 组件的简要说明：\n\n**基础**\n\n* **AppCompat**——让你编写的代码能向下兼容旧版\
  \ Android 系统\n* **Android KTX**——如果你使用 Kotlin，可以编写更简洁、更地道的 Kotlin 代码\n* **Multidex**——为使用多个\
  \ DEX 文件的应用程序提供支持\n* **Test**——用于单元测试和运行时 UI 测试的测试框架\n\n**行为**\n\n* **下载管理器**——让你编写调度和管理大规模下载任务的程序\n\
  * **媒体与播放**——提供向后兼容的媒体播放与路由 API\n* **通知**——提供向后兼容的通知 API，支持可穿戴设备和汽车场景\n* **权限**——用于检查和请求应用权限的兼容性\
  \ API\n* **偏好设置**——创建交互式设置界面\n* **分享**——提供适合应用操作栏的分享操作\n* **切片**——创建灵活的用户界面元素，用于在应用外部显示应用数据\n\
  \n**界面**\n\n* **动画与过渡**——实现控件移动及屏幕间的过渡效果\n* **汽车**——如果你开发在车辆信息娱乐系统上运行的应用，会用到它。这些组件能帮助你构建\
  \ Android Auto 应用\n* **表情符号**——在旧版平台上启用最新的表情符号字体\n* **Fragment**——所有 Fragment 相关代码已移至此处\n\
  * **布局**——使用不同算法进行控件布局\n* **调色板**——从调色板中提取有用信息\n* **电视**——帮助开发 Android TV 应用的组件\n\
  * **Google Wear OS**——如果你想开发手表等 Android 可穿戴设备应用，这就是你需要的\n\n**架构**\n\n* **数据绑定**——以声明方式将可观察数据绑定到\
  \ UI 元素\n* **生命周期**——管理 Activity 和 Fragment 的生命周期\n* **LiveData**——在底层数据库发生变化时通知视图\n\
  * **分页**——按需从数据源逐步加载信息；当用户滚动列表时，它能帮助你处理数据加载。它与 Recycler 视图配合使用\n* **ViewModel**——以生命周期感知的方式管理\
  \ UI 相关数据\n* **WorkManager**——管理后台任务\n* **导航**——实现应用内的导航功能，在屏幕之间传递数据，并提供来自应用外部的深度链接\n\
  * **Room**——可视为 SQLite 数据库的对象关系映射（ORM）\n\nJetpack 值得探索的内容很多，请务必查阅相关文档。\n\n回到我们的主题，导航组件简化了应用内各目标（destination）之间的导航实现。目标指的是应用中的任意位置，可以是\
  \ Activity、Activity 中的 Fragment 或自定义视图；这些目标通过导航图（navigation graph）进行管理。\n\n导航图整合了所有目标，并定义了目标之间的不同连接关系，这些连接称为动作（action）。导航图本质上是一个\
  \ XML 资源文件，展示了应用的所有导航路径。你可以在应用中拥有多个导航图。\n\n\n\n### 使用 Jetpack Navigation\n\n为了更好地理解\
  \ Navigation 组件，最好能在一个小项目上实践。因此，请在 Android Studio 中创建一个新的空项目，如图 10-2 所示。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig2_HTML.jpg](img/457413_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n\n新建空项目\n\n接下来，我们需要添加 Navigation 组件依赖项。你可以在模块级别的 `build.gradle` 文件中完成此操作（如图\
  \ 10-3 所示）。请注意，有两个 `build.gradle` 文件，你需要选择标注了 (Module: app) 的那个。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig3_HTML.jpg](img/457413_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n\n`build.gradle` 文件（模块级别）\n\n编辑此文件，使其与代码清单 10-5 中的代码保持一致。\n\n```\ndependencies\
  \ {\ndef nav_version = \"2.2.2\"\nimplementation \"androidx.navigation:navigation-fragment:$nav_version\"\
  \nimplementation \"androidx.navigation:navigation-ui:$nav_version\"\nimplementation\
  \ fileTree(dir: \"libs\", include: [\"*.jar\"])\nimplementation 'androidx.appcompat:appcompat:1.1.0'\n\
  implementation 'androidx.constraintlayout:constraintlayout:1.1.3'\ntestImplementation\
  \ 'junit:junit:4.12'\nandroidTestImplementation 'androidx.test.ext:junit:1.1.1'\n\
  androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'\n}\n```\n\
  \n代码清单 10-5\n\n向 `build.gradle` 添加导航\n\n在编写本书时，Navigation 组件的稳定版本是 `2.2.2`；此外还有一个测试版本\
  \ `2.3.0-beta01`。当你阅读本书时，版本可能已经更新。请务必查看官方 Android 开发者网站以获取最新信息： [`https://developer.android.com/jetpack/androidx/releases/navigation`](https://developer.android.com/jetpack/androidx/releases/navigation)。\n\
  \n接下来，让我们向项目添加导航图。你可以通过创建新的资源文件来创建导航图。右键单击项目的 `res` 文件夹，然后选择 **新建** ➤ **Android\
  \ 资源文件**，如图 10-4 所示。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig4_HTML.jpg](img/457413_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n\n添加新资源文件\n\n在“新建资源文件”对话框中，将资源类型更改为 *Navigation* 并提供文件名：\n\n* **文件名**\
  \ — `nav_graph`\n* **资源类型** — *Navigation*（你必须点击下拉箭头进行选择）\n\n在接下来的窗口中（如图 10-5 所示），点击“确定”。\n\
  \n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig5_HTML.jpg](img/457413_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n新建资源文件\n\n资源创建完成后，你会看到在项目 `res` 文件夹下出现了一个新文件夹(`navigation`)和一个新文件(`nav_graph.xml`)，如图\
  \ 10-6 所示。Android Studio 将在编辑器中打开新创建的导航图。图 10-6 显示了新创建的导航图——它当然是空的。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig6_HTML.jpg](img/457413_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6\n\n导航图\n\n当你使用 Navigation 组件时，导航是通过目标之间的交互来完成的。目标是用户能够导航到的界面，而目标之间则通过*动作*进行连接。目前我们还没有任何目标，因此让我们添加一个。点击导航编辑器顶部面板上的加号，如图\
  \ 10-7 所示，然后选择“创建新目标”。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig7_HTML.jpg](img/457413_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7\n\n创建新目标\n\n\n\n此操作将弹出用于创建新 Fragment 的对话框。在接下来显示的窗口中（图 10-8），选择一个空白 Fragment。\n\
  \n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig8_HTML.jpg](img/457413_2_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8** 新建 Android Fragment\n\n在接下来显示的窗口中，输入 Fragment 的名称和布局文件的名称，并选择源语言，如图\
  \ 10-9 所示。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig9_HTML.jpg](img/457413_2_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9** 新建 Android Fragment，详细信息\n\n*   **Fragment 名称** — `One`\n*   **Fragment\
  \ 布局名称** — `fragment_one`\n*   将源语言保留为 **Java**\n\n点击 **完成** 开始创建新的 Fragment；此 Fragment\
  \ 将成为您应用中的一个目的地。创建另一个目的地，并将其 Fragment 名称设为 “Two”。此时，导航编辑器应如图 10-10 所示。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig10_HTML.jpg](img/457413_2_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** 导航编辑器\n\n另请注意，有两个新的 Java 类（`One.java` 和 `Two.java`）和两个新的布局文件（`fragment_one.xml`\
  \ 和 `fragment_two.xml`）。这些文件是在我们创建目的地 `One` 和 `Two` 时生成的。请注意在图 10-10 中，fragment\
  \ `one` 旁边有一个主页图标。这只是因为我们是第一个创建它的。主页目的地或起始目的地是用户将看到的第一个屏幕。您可以随时通过右键单击任何目的地，然后点击\
  \ “设为主页目的地” 来更改起始目的地；但现在，我们将保持 `one` 为起始目的地。\n\n我们的导航图还没有 **NavHost**；它需要一个。NavHost\
  \ 充当所有目的地的视口。它是一个空容器，当用户在应用中导航时，目的地可以在此容器中交换进出。NavHost 需要放在一个 Activity 中。我们将把 NavHost\
  \ 放入我们的 `MainActivity`。\n\n打开我们 `MainActivity` 的布局文件，它位于 `res/layout/activity_main.xml`，然后在文本模式下编辑。默认的\
  \ `activity_main` 包含一个 `TextView` 对象；将其删除，并替换为清单 10-6 中显示的代码片段。\n\n| ❶ | 它需要一个 ID，就像资源文件中的任何其他元素一样。我这里选择了\
  \ `nav_container`。您可以命名任何您喜欢的名称。 |\n| ❷ | 这是 `NavHostFragment` 类的完全限定名。它属于导航组件，负责使我们的\
  \ `MainActivity` 成为我们所有定义目的地的视口。 |\n| ❸ | `app:navGraph` 属性告诉运行时我们想要在 `MainActivity`\
  \ 中托管哪个导航图。请记住，您可以在应用中拥有多个导航图；`nav_graph` 是我们之前给导航图 XML 资源起的名字。 |\n| ❹ | 当您将 `defaultNavHost`\
  \ 设置为 `true` 时，这可确保 **NavHostFragment** 拦截系统返回按钮；这样，当用户点击返回按钮时，Android 将显示您应用中的上一个屏幕，而不是恰好在返回堆栈中的外部应用屏幕。\
  \ |\n\n```\n清单 10-6\n在 activity_main.xml 中定义 NavHost\n```\n\n现在是时候连接我们的两个目的地了。再次打开导航图——它位于\
  \ `res/navigation/nav_graph`。\n\n我们希望用户从目的地 `one` 导航到目的地 `two`。因此，将鼠标悬停到目的地一，直到其右侧出现一个小圆圈。单击并拖动此点到目的地二，以便两个目的地可以连接起来，如图\
  \ 10-11 所示。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig11_HTML.jpg](img/457413_2_En_10_Fig11_HTML.jpg)\n\
  \n**图 10-11** 连接 one 和 two\n\n目的地一现已连接到目的地二。如果您选择 `one` 和 `two` 之间的连接，您将看到它拥有可以设置的属性，如图\
  \ 10-12 所示。我们不会处理这些属性；我们只想连接这两个目的地。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig12_HTML.jpg](img/457413_2_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12** 导航图\n\n为了测试这个小应用，我需要在起始目的地中有一个能触发操作的对象，比如一个按钮（如图 10-13 所示）。我修改了两个\
  \ fragment 的布局，具体如下：\n\n**Fragment One**\n\n*   将布局改为 `ConstraintLayout`，只是因为使用这种布局更容易。请使用适合您的布局。\n\
  *   我删除了 `TextView`，并用一个按钮替换了它，并将其居中。\n\n**Fragment Two**\n\n*   像 `fragment_one`\
  \ 一样，我也将布局改为 `ConstraintLayout`。\n*   我更改了 `TextView` 的文本并将其居中。\n\n![../images/457413_2_En_10_Chapter/457413_2_En_10_Fig13_HTML.jpg](img/457413_2_En_10_Fig13_HTML.jpg)\n\
  \n**图 10-13** 修改后的 Fragment\n\n接下来，我们将为按钮添加一个点击处理器，然后添加代码，使得在点击按钮时，`fragment_one`\
  \ 能够导航到 `fragment_two`。\n\n导航到目的地是通过 **NavController** 实现的；它是一个在 NavHost 内管理应用导航的对象。每个\
  \ NavHost 都有自己对应的 NavController。\n\nNavController 允许您通过两种方式导航到目的地：(1) 使用 ID 导航到目的地，这也是我们在这里将要使用的；以及\
  \ (2) 使用 URI 导航——我将留待您自行探索。\n\n要为按钮添加点击处理器，请打开 `One.java`（其中包含我们 `One` 目的地的 Java\
  \ 源文件），并修改其 `onCreateView()` 方法，使其与清单 10-7 匹配。\n\n```java\n@Override\npublic View\
  \ onCreateView(LayoutInflater inflater, ViewGroup container,\nBundle savedInstanceState)\
  \ {\n// 为此 fragment 填充布局\nfinal View view = inflater.inflate(R.layout.fragment_one,\
  \ container, false);\nButton btn = (Button) view.findViewById(R.id.button);\nbtn.setOnClickListener(new\
  \ View.OnClickListener(){\n@Override\npublic void onClick(View view) {\nNavigation.findNavController(view).navigate(R.id.action_one_to_two2);\n\
  }\n});\nreturn view;\n}\n```\n**清单 10-7** 类 `One.onCreateView()`\n\n清单 10-7 中最重要的一行代码是\
  \ **NavController** 对象的 `navigate()` 方法。我们简单地将我们在导航图中创建的操作的 ID 作为参数传递给 `navigate()`，这就已经搞定了。您现在可以启动模拟器并测试该应用了。\n\
  \n本章仅仅触及了导航组件的表面；在这个领域还有很多东西有待发现，所以请务必去探索一下。\n\n\n\n## 总结\n\n-   你仍然可以在应用中使用基于 Activity\
  \ 或 Fragment 的导航；只需记住它们的优缺点。\n-   导航组件结合了基于 Activity 和基于 Fragment 的导航的最佳特性；API 易于使用，并且我们对返回栈有了更多控制。\n\
  -   导航组件引入了*目标（destination）* 的概念。*目标*可以是 Fragment、Activity 或自定义视图；它们是用户将要导航到的页面。\n\
  -   *目标*通过导航图进行分组；导航图是一个 XML 资源文件，其中包含了各目标之间的所有*动作（action）*。\n-   *目标*之间通过*动作*相互连接。\n\
  -   导航的基本思路如下：\n    1.  创建导航图。\n    2.  创建目标。\n    3.  连接各个目标；每次连接成为一个动作。\n    4.\
  \  使用`NavController`对象以编程方式从一个目标导航到另一个目标。你可以通过 ID 或 URI 进行导航。\n\n"
- "# 11. 在后台运行\n\n*本章将涵盖：*\n\n-   基本线程概念\n-   UI 线程\n-   如何创建和使用 Java 线程\n\n知道如何在后台运行代码是每位开发者必备的基本技能。熟练运用线程可以提升应用的性能，用户对此非常满意。当前对应用性能的要求非常高。没有人愿意使用一个运行缓慢如糖浆的应用。如今，卡顿和颠簸的应用会很快被遗忘。\n\
  \n在本章中，我们将探索精彩的线程世界。\n\n## 基本概念\n\n当你启动一个应用时，系统会创建一个进程，并为它分配一些资源，例如内存等。同时，它还会获得一个线程。\n\
  \n通俗地说，线程是一个指令序列。它是执行你代码的东西。在应用运行期间，这个线程将使用该进程的资源。它可能会读写内存、磁盘，甚至有时会进行网络 I/O。当线程与所有这些交互时，它只是在等待。在等待期间，它无法利用\
  \ CPU 周期。我们不能让这些 CPU 周期白白浪费，对吧？我们可以创建其他线程，这样当一个或多个线程在等待某件事时，其他线程可以利用 CPU。这就是多线程应用的情况。\n\
  \n当 Android 运行时创建一个应用实例时，该进程会被赋予一个线程。它被称为主线程；有些开发者称其为 UI 线程，但我们只会得到这一个线程，没有更多。好消息是我们可以创建更多的线程。UI\
  \ 线程可以创建其他线程。\n\n## UI 线程\n\nUI 线程，也称为主线程，负责启动主 Activity 并解析（XML）布局文件。解析布局文件意味着将所有\
  \ View 元素转换为实际的 Java 对象，例如 Button、TextView 等。简而言之，主线程负责显示 UI。当我们在`TextView`对象上调用`setText()`或`setHint()`等方法时，这些调用并不会立即执行；相反，流程如下：\n\
  \n1.  该调用被放入一个消息队列（`MessageQueue`）中。\n2.  它将停留在那里，直到某个 Handler 将其取出执行。\n3.  然后，它在主线程上执行。\n\
  \n主线程不仅用于显示 UI 元素，还用于应用中发生的所有其他事情。你可能还记得 Activity 有生命周期方法，例如`onCreate`、`onStop`、`onResume`、`onCreateOptionsMenu`、`onOptionsItemSelected`以及其他方法。每当代码在这些块中运行时，运行时无法处理队列中的任何消息。它处于*阻塞*状态；阻塞状态意味着主线程正在等待某件事完成，然后才能继续执行其任务——这对用户体验不好。\n\
  \n大多数情况下，我们调用的方法运行时间并不长。可以说，这些调用在计算资源方面是廉价的。所以，这通常不是什么大问题。当我们调用需要相当长时间才能完成的方法时，问题就来了。Android\
  \ 开发团队的指导原则是，我们应该将调用限制在不超过 15 毫秒；如果超过这个时间，我们应该考虑在后台线程中运行这些代码。这一指导原则来自 Project Butter，它是在\
  \ Jelly Bean（Android 4.1）时期发布的；旨在提升 Android 应用的性能。当运行时检测到你在主线程上做了太多事情时，它就会开始丢弃帧。当你不进行耗时调用时，应用以非常流畅的每秒\
  \ 60 帧运行。如果你占用了主线程，你会开始注意到性能变慢，因为帧率开始下降。在 Android 世界中，这被称为卡顿（jank）。在主线程上进行过多处理会导致\
  \ UI 渲染缓慢，从而导致丢帧或跳帧，进而导致应用出现明显的卡顿现象。应用变得卡顿。\n\n> **注意**\n> 在 Project Butter 之前，如果\
  \ UI 线程检测到你在 UI 线程上做得太多，例如打开一个大文件、创建一个网络 socket 或任何需要长时间的操作，运行时可能会向你显示 ANR（应用无响应）屏幕。如今很少见到\
  \ ANR 了，更多的是卡顿问题。\n\n如果你想避免卡顿，你需要知道如何在后台运行耗时或与 I/O 相关的代码。\n\n你不需要过度兴奋并开始在后台运行所有东西。要合理并运用你的判断。例如，以下调用不需要在后台线程中：\n\
  \n```\ntxt1.setText(String.format(\"%d\", (2 * 2 * 2)));\n```\n\n它只是将一个`TextView`的文本属性设置为一个计算结果。这个计算并不复杂。\n\
  \n即使是列表 [11-1] 也不算耗时代码。它进行了一些基本的 GCF（最大公因数）计算，但使用了欧几里得算法来得到结果。这个算法运行高效。无论输入值有多大，循环次数都不会呈爆炸式增长；无论是求\
  \ 12 和 15 的 GCF，还是 16,848,662 和 24 的 GCF，其时间复杂度变化不大。因此，将它放在主线程中是完全可行的。\n\n\n\n`private\
  \ void gcfCalculate(int firstNo, int secondNo) {\nint rem, bigno, smallno = 1;\n\
  if (firstNo > secondNo) { bigno = firstNo; smallno = secondNo;}\nelse {bigno = secondNo;\
  \ smallno = firstNo;}\nwhile(!((rem = bigno  % smallno) == 0)) {\nbigno = smallno;\n\
  smallno = rem;\n}\nString msg = String.format(\"GCF = %s\", smallno);\nToast.makeText(this,\
  \ msg, Toast.LENGTH_LONG).show();\n}\n清单 11-1\nGCF 计算\n`\n\n`清单 11-2`，另一方面，则是一个昂贵的调用。它现在看起来有些牵强，但当你经常参加代码审查时，你会惊讶地发现这类代码实际上存在，并且可能比你想象的更常见——到时你就会明白我的意思。无论如何，你需要警惕这类代码，因为即使它没有网络或\
  \ I/O 调用，它也会占用 UI 线程来计算笛卡尔积——这是一种数学集合，是其他集合相乘的结果。结构类似的代码最好放在后台线程中执行。\n\n```\nprivate\
  \ void nestedCall() {\nfor(int i = 1; i < 10000; i++) {\nfor(int j = 1; j < 10000;\
  \ j++) {\nfor(int k = 1; k < 10000; k++) {\nSystem.out.printf(\"%d\", i * j * k);\n\
  }\n}\n}\n}\n清单 11-2\n嵌套调用\n```\n\n另一个需要在后台运行的代码示例是`清单 11-3`。它使用互联网从 GitHub 获取信息。\n\
  \n```\nprivate String fetch(String gitHubId) {\nString userInfo = \"\";\nString\
  \ url = String.format(\"https://api.github.com/users/%s\", gitHubId);\nOkHttpClient\
  \ client = new OkHttpClient();\nRequest request = new Request.Builder()\n.url(url)\n\
  .build();\ntry(Response response = client.newCall(request).execute()) {\nuserInfo\
  \ = response.body().string();\n}\ncatch(IOException ioe) {\nLog.e(TAG, ioe.getMessage());\n\
  }\nreturn userInfo;\n}\n清单 11-3\n获取 GitHub 信息\n```\n\n如果你尝试在 UI 线程上运行此代码，Android\
  \ 运行时将会抛出`NetworkonMainThreadException`。任何使用网络连接的代码都不能在 UI 线程中运行。\n\n当遇到以下情况时：（1）需要通过网络获取或写入数据；（2）需要通过文件\
  \ I/O 获取或写入数据；（3）执行资源密集型操作（如`清单 11-2`所示），你需要将该代码放在后台线程中运行。有几种方法可以实现这一点，请参见下面的列表：\n\
  \n*   **Java 线程**，来自 Java\n*   **AsyncTask**，属于 Android 框架的一部分\n*   **Handler 和\
  \ Message**，也属于 Android 框架的一部分\n\n无论使用哪种技术，原理都是一样的，即：\n\n1.  在执行长时间运行或消耗资源的任务时，生成一个后台线程。\n\
  2.  如果在后台线程中需要执行 UI 线程上的操作（例如设置 View 的属性），则在处理 View 元素之前，必须找到一种方法回到 UI 线程。\n\n在所有后台运行代码的方法中，`Thread`对\
  \ Java 程序员来说最为熟悉，但它也是最基础的。\n\n## 线程与可运行对象\n\n我们可以通过生成新线程来在后台运行语句。`Thread`对象可以通过扩展`java.lang.Thread`类或实现`Runnable`接口来创建。`Thread`对象描述单个执行线程，该执行发生在`Thread`类的`run()`方法中。\n\
  \n扩展`Thread`类是创建线程对象最简单的方式。`清单 11-4`展示了`Thread`类的典型结构。\n\n```\nclass Worker extends\
  \ Thread {\npublic void run() {\n// 你想在后台运行的内容\n}\n}\n清单 11-4\nWorker 类\n```\n\n\
  `Worker`类简单地扩展了`java.lang.Thread`。你需要重写线程的`run()`方法，并将所有希望在后台运行的语句放入其中。之后，只需实例化`Worker`并运行它，如`清单\
  \ 11-5`所示。\n\n| ❶ | 创建一个 `Thread` 类的实例。 |\n| ❷ | 调用 `start()` 方法。如果忘记这一步，线程将不会运行。调用\
  \ `start()` 方法可以启动线程。 |\n\n```\nWorker worker = new Worker(); ❶\nworker.start();\
  \ ❷\n清单 11-5\n如何创建并运行一个线程\n```\n\n另一种创建线程的方式是实现`Runnable`接口，如`清单 11-6`所示。\n\n```\n\
  class Worker implements Runnable {\n@Override\npublic void run() {\n// 你想在后台运行的内容\n\
  }\n}\n清单 11-6\nWorker 类实现了 Runnable 接口\n```\n\n如你所见，这与之前的示例没有太大区别；我们没有扩展`Thread`，而是简单地实现了`Runnable`接口。你仍然需要重写`run()`方法，并将希望在后台运行的语句放入`run()`方法中。区别不在于`Worker`类的结构，而在于`Worker`类的实例化和运行方式，如`清单\
  \ 11-7`所示。\n\n| ❶ | 创建一个 `Worker` 的实例。 |\n| ❷ | 通过将一个 `Runnable` 类（`Worker` 实例）的实例传递给\
  \ `Thread` 的构造函数来创建一个 `Thread` 类的实例。 |\n| ❸ | 现在我们可以通过调用 `start()` 方法来启动线程。 |\n\n\
  ```\nWorker worker = new Worker(); ❶\nThread thread = new Thread(worker); ❷\nthread.start();\
  \ ❸\n清单 11-7\n如何使用 Runnable 对象\n```\n\n现在我们对如何使用`Thread`有了概念性的了解，让我们用它从 GitHub 获取用户信息。`清单\
  \ 11-8`展示了如何使用`OkHttpClient`调用 GitHub API 的步骤。\n\n| ❶ | 我们希望将 GitHub `userid` 作为参数。\
  \ |\n| ❷ | 我们来构造一个包含 GitHub `userid` 的字符串 URL。 |\n| ❸ | 我们将使用来自 Square 公司的 `OkHttpClient`。`OkHttpClient`\
  \ 是一个开源项目，旨在成为高效的 HTTP 客户端。它支持 SPDY 协议。SPDY 是 HTTP 2.0 的基础，允许通过一个套接字连接复用多个 HTTP\
  \ 请求；你可以在 [`https://en.wikipedia.org/wiki/SPDY`](https://en.wikipedia.org/wiki/SPDY)\
  \ 了解更多关于 SPDY 的信息。从 Android 5.0 开始，`OkHttpClient` 成为 Android 平台的一部分，并被用于所有 HTTP\
  \ 调用。此示例取自 `OkHttpClient` 的网页 [`https://square.github.io/okhttp/`](https://square.github.io/okhttp/)。\
  \ |\n| ❹ | 我们使用 `try with resources` 代码块，这样我们就不必担心后续清理工作；当 `try 代码块` 超出作用域时，我们在该块内打开的所有资源将自动关闭。\
  \ |\n| ❺ | 如果之前的所有设置都顺利，我们就可以从 GitHub API 获取响应。 |\n\n\n\n```java\nprivate String\
  \ fetchUserInfo(String gitHubId) {\n  String userInfo = \"\";\n  String url = String.format(\"\
  https://api.github.com/users/%s\", gitHubId);\n  Log.d(TAG, String.format(\"URL:\
  \ %s\", url));\n  OkHttpClient client = new OkHttpClient();\n  Request request =\
  \ new Request.Builder()\n      .url(url)\n      .build();\n  try(Response response\
  \ = client.newCall(request).execute()) {\n    userInfo = response.body().string();\n\
  \  }\n  catch(IOException ioe) {\n    Log.e(TAG, ioe.getMessage());\n  }\n  return\
  \ userInfo;\n}\n```\n清单 11-8：`fetchUserInfo()`\n\n我们需要在后台线程中运行`fetchUserInfo()`方法，以触发`NetworkOnMainThreadException`错误。接下来创建一个小型演示项目来实现这一目的。创建一个包含空白\
  \ Activity 的项目，并构建一个包含以下元素的简单 UI：\n\n- `EditText`——用于输入 GitHub 用户 ID。\n- `Button`——用于触发用户操作。\n\
  - `TextView`——用于显示从 GitHub 获取的结果。\n- `ScrollView`——包裹`TextView`，实现多行显示和可滚动效果。\n\n\
