  **New** ➤ **Java Class**，如图 15-1 所示，然后添加必要的代码来创建 `BroadcastReceiver` 的子类。或者，你也可以右键单击应用的包名，然后依次选择
  **New** ➤ **Other** ➤ **BroadcastReceiver**。无论你选择哪种方式添加 `BroadcastReceiver` 类，如果你想按照代码清单
