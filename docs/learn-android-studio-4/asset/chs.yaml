  \n*图 6-13 — 所有属性*\n\n既然我们已能在设计编辑器中自由操作，现在就可以做些改动了。请尝试执行以下操作：\n\n1. 将 TextView 对象的`id`属性从`textView`改为`textHello`。\n\
