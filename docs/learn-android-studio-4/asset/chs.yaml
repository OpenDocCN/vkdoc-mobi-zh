  \    private TextView txtUserInfo;\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        ...\n\
  \    }\n    class RunBackground extends Thread { ❶\n        String userName;\n \
  \       RunBackground(String userName) { ❷\n            this.userName = userName;\n\
  \        }\n        public void run() {  ❸\n            String userInfo = fetchUserInfo(userName);\
  \ ❹\n            Log.d(TAG, userInfo);\n            Log.d(TAG,\"Run in thread\"\
  );\n            try {\n                final JSONObject jsonreader = new JSONObject(userInfo);\
  \ ❺\n                Log.d(TAG, jsonreader.toString());\n                runOnUiThread(new\
  \ Thread() { ❻\n                    public void run() {\n                      \
  \  Log.d(TAG, \"runOnUiThread\");\n                        txtUserInfo.setText(jsonreader.toString());\
  \ ❼\n                    }\n                });\n            }\n            catch(JSONException\
  \ e) {\n                Log.e(TAG, e.getMessage());\n            }\n        }\n\
  \    }\n    private String fetchUserInfo(String gitHubId) {\n        ...\n    }\n\
  }\n```\n\n清单 11-13 `RunBackground` 内部类\n\n现在，在模拟器或真实设备上运行该应用，并尝试获取你自己的 GitHub 信息。\n\
  \n## 本章小结\n\n*   当你试图在主线程上执行过多任务时，运行时可能会开始掉帧，从而导致卡顿。\n*   UI 线程负责创建 UI 元素等任务。不要给这个线程过重负担。如果需要执行一些耗时或消耗资源的任务，应创建一个后台线程并在其中执行该任务。\n\
  \n"
- "# 12. 调试\n\n*本章涵盖内容：*\n\n*   你将遇到的错误类型\n*   记录调试语句\n*   使用调试器\n\n除了最简单的程序外，几乎所有程序都存在错误。处理错误将是你作为开发者日常工作中的重要部分。本章将讨论你过去遇到过、并且在可预见的未来仍会面对的各种错误类型。我们还将探讨如何利用\
  \ Android Studio 来简化处理这些错误的难度。\n\n## 错误类型\n\n编程中最常见的三种错误是：\n\n*   语法错误\n*   运行时错误\n\
  *   逻辑错误\n\n## 语法错误\n\n语法错误正如其名，是语法上的错误。之所以发生这种错误，是因为你在代码中编写了 Java 编译器规则集不允许的内容。编译器无法理解它。这种错误可能简单到忘记闭合括号或缺少一对花括号，也可能很复杂，例如向函数传递错误类型的参数，或在使用泛型时传递了错误的参数化类。\n\
  \n你可以轻松地在 Android Studio 中发现语法错误。当你在主编辑器中看到红色波浪线时（如图 12-1 所示）。\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig1_HTML.jpg](img/457413_2_En_12_Fig1_HTML.jpg)\n\
  \n**图 12-1** 主编辑器显示的错误指示符\n\n这意味着代码在语法上存在错误。Android Studio 会将红色波浪线放置在非常接近错误代码的位置。如果将鼠标悬停在红色波浪线上，大多数情况下，Android\
  \ Studio 都能以很高的准确度告诉你代码出了什么问题。更重要的是，你可以使用一种被恰当地命名为“快速修复”的技术来快速修复这类错误。\n\n要进行快速修复，请将光标置于红色波浪线内的任意位置，然后按\
  \ **Alt + Enter**（如果你使用的是 Windows 或 Linux）或 **Option + Enter**（如果你使用的是 macOS），IDE\
  \ 会处理其余操作；如果有多种修复错误的方法，IDE 会显示一些选项供你选择。\n\n## 运行时错误\n\n运行时错误发生在你的代码遇到意料之外的情况时。顾名思义，这种错误只会在程序运行时发生。在编译期间你不会看到这类错误。\n\
  \nJava 有两种类型的异常：*受检异常* 和 *非受检异常*。Android Studio 为受检异常提供了大量帮助。图 12-2 显示了当你尝试调用一个会抛出受检异常的方法时，主编辑器中的显示情况；然而，对于非受检异常，你仍需自行处理。\n\
  \n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig2_HTML.jpg](img/457413_2_En_12_Fig2_HTML.jpg)\n\
  \n**图 12-2** IDE 提醒你需要处理该异常\n\n解决图 12-2 所示错误有两种方法：我们可以将 `openFileOutput()` 方法调用包裹在\
  \ *try-catch* 结构中，或者向方法签名中添加一个异常，如图 12-3 所示。\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig3_HTML.jpg](img/457413_2_En_12_Fig3_HTML.jpg)\n\
  \n**图 12-3** 快速修复\n\n清单 12-1 展示了如何通过向方法签名添加 `throws` 子句来处理 `FileNotFoundException`。\n\
  \n```java\nimport java.io.FileNotFoundException;\n...\nvoid saveData() throws FileNotFoundException\
  \ {\n    String fn = \"somefile.txt\";\n    FileOutputStream out = openFileOutput(fn,\
  \ Context.MODE_APPEND);\n}\n```\n\n清单 12-1 在 `saveData()` 中抛出 `FileNotFoundException`\n\
  \n清单 12-2 展示了使用 *try-catch* 块处理相同异常的代码。\n\n```java\nvoid saveData() {\n    String\
  \ fn = \"somefile.txt\";\n    try {\n        FileOutputStream out = openFileOutput(fn,\
  \ Context.MODE_APPEND);\n    } catch (FileNotFoundException e) {\n        e.printStackTrace();\n\
  \    }\n    finally {\n        ...\n    }\n}\n```\n\n清单 12-2 使用 `try-catch` 处理异常\n\
  \n当我想在本地处理异常时，即在与可能抛出异常的同一代码块中处理，我会使用 *try-catch*。大多数情况下，唯一能做的事情是：(1) 记录错误日志，(2)\
  \ 尽可能尝试从错误中恢复，并让用户重试。\n\n另一方面，使用 `throws` 子句意味着你不想在本地代码块中处理错误；你希望调用方法来处理这个错误。如果调用方法也在其签名中使用了\
  \ `throws` 子句，那么错误处理将会沿着调用栈向上传递。\n\n\n\n## 逻辑错误\n\n逻辑错误是最难发现的。顾名思义，它是你逻辑上出现的错误。当你的代码没有按照你预期的方式执行时，那就是逻辑错误。应对逻辑错误的方法有很多种，但在本节中，我们将介绍两种方法——在代码的特定位置打印调试语句，以及使用调试器单步执行代码。\n\
  \n在检查代码时，你会发现有些区域你很清楚发生了什么，而有些区域则不那么确定——你可以将调试语句放置在这些区域。这就像留下面包屑供你追踪。打印调试语句有几种方法。你可以使用\
  \ `println`、`Log` 或 `Logger` 类。\n\n当你将 Logcat 的模式设置为详细、信息或调试时，你将看到 Android 运行时生成的所有消息。如果你希望能够过滤消息，例如仅查看警告或错误，则需要使用\
  \ `Log` 或 `Logger` 类。\n\n`Log` 类有五个静态方法；用法如下所示：\n\n```\nLog.v(TAG, message) // 详细\n\
  Log.d(TAG, message) // 调试\nLog.i(TAG, message) // 信息\nLog.w(TAG, message) // 警告\n\
  Log.e(TAG, message) // 错误\n```\n\n在每种情况下，`TAG` 都是一个字符串字面量或变量，通常是调用 `Log` 的类的名称。`message`\
  \ 也是一个字符串字面量或变量，包含你实际希望在日志中看到的内容。清单 12-3 展示了代码中 `Log` 类的典型用法。\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\n\
  import android.content.Context;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import java.io.FileOutputStream;\nimport java.io.IOException;\npublic class MainActivity\
  \ extends AppCompatActivity {\nprivate final String TAG = getClass().getName();\n\
  @Override\nprotected void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  setContentView(R.layout.activity_main);\nLog.d(TAG, \"onCreate\");\n}\n@Override\n\
  protected void onStart() {\nsuper.onStart();\nLog.d(TAG, \"onStart\");\n}\n@Override\n\
  protected void onResume() {\nsuper.onResume();\nLog.d(TAG, \"onResume\");\n}\nprivate\
  \ void saveData(String fn) throws IOException {\ntry (FileOutputStream fileos =\
  \ openFileOutput(fn, Context.MODE_APPEND)) {\nLog.d(TAG, \"Doing something with\
  \ the file\");\n}\ncatch(IOException ioe) {\nLog.e(TAG, ioe.getMessage());\n// 你可以在此处重新抛出异常\n\
  // 或进行一些恢复操作\n}\n}\n}\n清单 12-3\nLog 类的典型用法\n```\n\n当应用运行时，你可以看到 `Logcat` 窗口中的日志消息，如图\
  \ 12-4 所示。你可以通过单击 IDE 底部菜单栏中的 Logcat 选项卡，或从主菜单栏中选择 **视图** ➤ **工具窗口** ➤ **Logcat**\
  \ 来打开 Logcat 窗口。\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig4_HTML.jpg](img/457413_2_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\nLogcat 工具窗口\n\n## 调试器\n\nAndroid Studio 包含一个交互式调试器，允许你在代码运行时遍历并单步执行代码。借助交互式调试器，你可以在代码的特定位置和特定时间点检查应用程序的快照——例如变量的值、正在运行的线程等。代码中的这些特定位置被称为*断点*；你可以自行选择这些断点。\n\
  \n要设置断点，选择包含可执行语句的行，然后单击其行号（位于行号栏中）。当你设置断点时，行号栏中会出现一个粉色圆形图标，并且整行会以粉色高亮显示——如图 12-5\
  \ 所示。\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig5_HTML.jpg](img/457413_2_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5\n\n调试器窗口\n\n设置好断点后，你需要在调试模式下运行应用。如果应用正在运行，请先停止它，然后从主菜单栏中点击 **运行** ➤ **调试应用**。\n\
  \n注意\n\n在调试模式下运行应用并不是调试应用的唯一方法。你也可以将调试器进程附加到当前正在运行的应用程序上。在某些情况下，第二种技术会很有用；例如，当你试图解决的错误发生在非常特定的条件下时，你可能希望先运行应用一段时间，当你认为接近错误点时，再附加调试器。\n\
  \n像往常一样使用应用程序。当执行到达你设置了断点的行时，该行会从粉色变为蓝色。这就是你知道代码执行已到达你的断点的方式。此时，调试器窗口打开，执行暂停，Android\
  \ Studio 进入交互式调试模式。此时，应用程序的状态会显示在 `调试工具窗口` 中。在此期间，你可以检查变量的值，甚至查看应用中正在运行的线程。\n\n\
  你甚至可以通过单击带有眼镜图标的加号向监视窗口添加变量或表达式。将出现一个文本字段，你可以在其中输入任何有效的表达式。当你按下 **回车键** 时，Android\
  \ Studio 将计算该表达式并显示结果。要移除监视表达式，请选中该表达式，然后单击监视窗口上的减号图标。\n\n### 单步执行\n\n与大多数调试器一样，Android\
  \ Studio 允许你逐行单步执行程序。当调试器在断点处停止时，你可以在几个工具之间进行选择。你通常需要知道如何执行以下操作：\n\n*   **恢复程序**\
  \ — 恢复执行，直到到达下一个断点。如果没有更多断点，程序将像正常执行一样运行。\n*   **步入** — 如果下一行有方法调用，此操作将跳转到该方法，并在第一行暂停。\n\
  *   **单步跳过** — 执行下一行上发生的任何操作，然后跳转到下一行。\n*   **步出** — 执行当前方法的剩余部分，然后在方法之后的下一个语句处暂停。它本质上是从方法中跳出来。\n\
  \n你可以从主菜单栏的 `运行` 菜单下找到这些操作。你也可以从调试器工具栏（如图 12-6 所示）中找到它们。\n\n![../images/457413_2_En_12_Chapter/457413_2_En_12_Fig6_HTML.jpg](img/457413_2_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n\n调试器工具栏\n\n最后，你可以通过键盘快捷键使用单步执行操作，如表 12-1 所示。\n\n表 12-1\n\n调试器键盘快捷键\n\n\
  |  | Windows/Linux | macOS |\n| --- | --- | --- |\n| 调试 | `Shift + F9` | `Ctrl +\
  \ D` |\n| 恢复程序 | `F9` | `Command + Option + R` |\n| 步入 | `F7` | `F7` |\n| 单步跳过 |\
  \ `F8` | `F8` |\n| 步出 | `Shift + F8` | `Shift + F8` |\n\n你可以从 Android 开发者网站了解更多的键盘快捷键（不仅仅是用于调试）：[`https://developer.android.com/studio/intro/keyboard-shortcuts`](https://developer.android.com/studio/intro/keyboard-shortcuts)。\n\
  \n## 总结\n\n*   你可能遇到的三种错误类型是编译类型错误（也称为语法错误）、运行时错误和逻辑错误。\n*   语法错误最容易修复；Android Studio\
  \ 本身提供了极大的便利，让你能够快速发现语法错误。使用 AS3 有多种修复语法错误的方法，但大多数情况下，`快速修复` 功能就能解决问题。\n*   你可以通过设置断点并使用单步执行操作来逐行遍历代码。\n\
  \n\n\n"
- "# 13. 测试\n\n*我们将涵盖：*\n\n* 测试类型\n* 单元测试\n* 测试基础\n* 关于插桩测试\n* 如何创建 UI 测试交互\n* 基本的测试交互\n\
  * 实现测试验证\n* 测试录制\n\n在前面的章节中，我们完成了一些编程工作。接下来，我们将学习一些测试概念和技术。开发生命周期会经历一个测试阶段，以发现代码中的所有错误和不一致之处。一个完善的应用程序不应存在粗糙的边角。我们需要测试它、调试它，并确保它不会占用过多的计算资源。\n\
  \n## 测试类型\n\n**功能测试**。功能测试是测试应用程序的标准方法。之所以称为*功能性*测试，是因为我们测试的是应用程序的功能（也称为功能特性），这些功能在需求规格说明书中被指定——需求说明书是你在应用程序规划阶段或业务分析师编写的。需求说明书通常会记录在文档中（通常称为功能需求规格说明书）。功能规格说明书中可能包含的示例如：“用户必须在进入应用前登录服务器”、“用户必须提供有效的电子邮件进行注册”等等。执行这些测试的测试人员，通常被称为\
  \ QA 或 QC（分别是质量保证和质量控制的缩写）。他们会创建测试资产、制定测试策略、执行测试，并最终报告执行结果。失败的测试通常会被指派回开发者（你）进行修复并重新提交。我这里描述的是拥有独立或专门测试团队的开发团队的典型做法；如果你是单人团队，那么\
  \ QA 很可能也是你。测试是一项完全不同的技能，我强烈建议你寻求其他人的帮助，最好是有测试经验的人。\n\n**性能测试**。从名称上你可能就能猜到这类测试是做什么的。它将应用程序推向极限，观察其在压力下的表现。这里你想要看到的是应用在承受超常规条件时的响应情况。**浸泡测试或耐力测试**是一种性能测试；通常，你会让应用程序长时间运行，并在各种操作模式下运行，例如，让应用在暂停状态或标题画面长时间停留。你试图找出应用在这些条件下的响应方式，以及它如何利用系统资源，如内存、CPU、网络带宽等；你将使用\
  \ *Android Profiler* 等工具来进行这些测量。\n\n另一种形式的性能测试是**容量测试**；如果你的应用使用了数据库，你可能想知道当数据加载到数据库时它如何响应。你检查的是系统在不同数据负载下的反应。\n\
  \n**尖峰测试**或可扩展性测试也是性能测试的另一种形式。如果应用依赖于中央服务器，该测试通常会提高连接到中央服务器的用户（设备端点）数量。你需要观察用户数量的激增如何影响用户体验——应用是否仍然响应迅速？对每秒帧数是否有影响？是否存在延迟？等等。\n\
  \n**兼容性测试**是检查应用在不同设备和硬件/软件配置下的表现。在这种情况下，AVD（Android 虚拟设备）会派上用场；因为 AVD 只是软件模拟器，你无需购买不同的设备。尽可能使用\
  \ AVD。有些应用在模拟器上难以可靠测试；当遇到这种情况时，你必须花钱购买测试设备。\n\n**合规性或一致性测试**。如果你正在构建一款游戏应用，这是你根据\
  \ Google Play 关于应用或游戏的指南检查游戏的地方；请务必阅读 Google Play 的开发者政策中心，网址为 [`https://bit.ly/developerpolicycenter`](https://bit.ly/developerpolicycenter)。确保你同时也熟悉\
  \ PEGI（泛欧洲游戏信息组织）和 ESRB（娱乐软件分级委员会）。如果游戏应用包含与特定分级不符的不良内容，需要识别并报告。违规可能导致被拒，从而造成代价高昂的返工和重新提交。如果你正在收集用户数据，你可能需要审计应用以检查其是否符合适用的数据隐私法规。\n\
  \n**本地化测试**至关重要，特别是对于面向全球市场的应用。应用的标题、内容和文本需要翻译成支持的语言并进行测试。\n\n**恢复测试**。这是将边界情况测试提升到另一个层次。在这里，强制应用失败，你观察应用在失败过程中的表现以及失败后如何恢复。它应该能让你了解是否编写了足够的\
  \ `try-catch-finally` 块。应用应优雅地失败，而不是突然崩溃。只要可能，运行时错误应由 `try-catch` 块保护；当异常发生时，尝试写入日志并保存应用状态。\n\
  \n**渗透测试或安全测试**。这类测试试图发现应用的弱点。它模拟潜在攻击者会采取的活动，以绕过应用的所有安全功能；例如，如果应用使用数据库存储数据，尤其是用户数据，渗透测试人员（从事渗透测试的专业人员）可能会在运行\
  \ Wireshark 的同时使用该应用——Wireshark 是一种检查数据包的工具；它是一个网络协议分析器。如果你以明文形式存储密码，它将在这些测试中显现出来。\n\
  \n**声音测试**。如果你的应用使用声音，检查加载文件时是否有错误；同时，听一下声音文件是否有爆裂声等。\n\n**开发者测试**。这是你（程序员）在向应用添加一层又一层代码时所进行的测试。这包括编写测试代码（同样使用\
  \ Java）来测试你的实际程序。这被称为单元测试。Android 开发者通常执行 JVM 测试和插桩测试；我们将在后续章节中更详细地讨论单元测试。\n\n##\
  \ 单元测试\n\n单元测试是由开发者（而非 QA 或 QC）执行的功能测试。单元测试很简单；它测试的是某个方法可能执行或产生的特定行为。一个应用通常会有许多单元测试，因为每个测试都是一组非常狭窄定义的行为。因此，你需要大量测试来覆盖完整的功能。Android\
  \ 开发者通常使用 JUnit 来编写单元测试。\n\nJUnit 是由 Kent Beck 和 Erich Gamma 编写的回归测试框架。你可能还记得他们，除了其他成就外，前者是极限编程的创始人，后者是“四人帮”（GoF，设计模式）的成员之一。\n\
  \nJava 开发者长期以来一直使用 JUnit 进行单元测试。Android Studio 内置了 JUnit，并且与其集成得非常好。我们无需在设置方面做太多工作。只需要编写我们的测试即可。\n\
  \n\n\n### JVM 测试 vs. 插桩测试\n\n如果你查看任何 Android 应用程序，你会发现它由两部分组成：基于 Java 的部分和基于 Android\
  \ 的部分。\n\nJava 部分是我们编写业务逻辑、计算和数据转换的地方。Android 部分是我们与 Android 平台交互的地方。在这里，我们获取用户输入或向用户显示结果。将基于\
  \ Java 的行为与 Android 部分分开测试是很有意义的，因为前者的执行速度要快得多。幸运的是，Android Studio 已经采用了这种方式。当你创建项目时，Android\
  \ Studio 会创建两个独立的文件夹，一个用于 JVM 测试，另一个用于插桩测试。图 13-1 展示了 Android 视图中的两个测试文件夹，而图 13-2\
  \ 展示了项目视图中的相同两个文件夹。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig2_HTML.jpg](img/457413_2_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n项目视图中的 JVM 测试和插桩测试\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig1_HTML.jpg](img/457413_2_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\nAndroid 视图中的 JVM 测试和插桩测试\n\n从图 13-1 或图 13-2 中可以看到，Android Studio 更进一步地为\
  \ JVM 测试和插桩测试生成了示例测试文件。这些示例文件仅作为快速参考；它们向我们展示了单元测试可能的样子。\n\n### 简单示例\n\n为了深入探索，创建一个包含空白\
  \ Activity 的项目。向项目添加一个 Java 类，并将其命名为 `Factorial.java`；编辑此类以匹配代码清单 13-1。\n\n```java\n\
  public class Factorial {\npublic static double factorial(int arg) {\nif (arg ==\
  \ 0) {\nreturn 1.0;\n}\nelse {\nreturn arg + factorial(arg - 1);\n}\n}\n}\n代码清单\
  \ 13-1\nFactorial.java\n```\n\n确保 `Factorial.java` 在主编辑器中打开，如图 13-3 所示；然后，从主菜单栏转到\
  \ **Navigate** ➤ **Test**。同样，你也可以使用键盘快捷键（macOS 为 **Shift + Command + T**，Linux 和\
  \ Windows 为 **Ctrl + Shift + T**）创建测试。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig3_HTML.jpg](img/457413_2_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n为 `Factorial.java` 创建测试\n\n点击 **Test** 后，会立即弹出一个对话框（图 13-4），提示你点击另一个链接——点击\
  \ **Create New Test**，如图 13-4 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig4_HTML.jpg](img/457413_2_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n创建新测试弹出窗口\n\n创建新测试后，你会立即看到另一个弹出对话框。\n\n在接下来的窗口（如图 13-5 所示）中，创建新测试。\n\n\
  ![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig5_HTML.jpg](img/457413_2_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5\n创建 `FactorialTest`\n\n| ❶ | 你可以选择要使用的测试库。你可以选择 JUnit 3、4 或 5。你甚至可以选择 Groovy\
  \ JUnit、Spock 或 TestNG。我使用 JUnit4，因为它随 Android Studio 一起安装。 |\n| ❷ | 测试类的命名约定是“待测试类的名称”\
  \ + “Test”。Android Studio 使用此约定自动填充此字段。 |\n| ❸ | 此项留空；我们不需要继承任何类。 |\n| ❹ | 我们目前不需要\
  \ `setUp()` 和 `tearDown()` 例程，将它们保持未选中状态。 |\n| ❺ | 让我们勾选 `factorial()` 方法，因为我们想为此方法生成一个测试。\
  \ |\n\n当你点击 **OK** 按钮时，Android Studio 会询问你想将测试文件保存在哪里。这是一个 JVM 测试，因此我们希望将其保存在“test”文件夹中（而不是\
  \ `androidTest` 文件夹）。见图 13-6。点击“OK”。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig6_HTML.jpg](img/457413_2_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6\n选择目标目录\n\n现在，Android Studio 将为我们创建测试文件。如果你打开 `FactorialTest.java`，你将看到生成的骨架代码——如图\
  \ 13-7 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig7_HTML.jpg](img/457413_2_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7\n项目视图和主编辑器中的 `FactorialTest.java`\n\n| ❶ | 文件 `Factorial.java` 创建在 `test`\
  \ 文件夹下。 |\n| ❷ | 创建了一个 `factorial()` 方法，并使用 `@Test` 进行了注解。这样 JUnit 就能知道此方法是一个单元测试。你可以为方法名添加“test”前缀，例如\
  \ `testFactorial()`，但这并非必需；`@Test` 注解就足够了。 |\n| ❸ | 这是放置断言的地方。 |\n\n看，这多简单？在 Android\
  \ Studio 中创建测试用例并不涉及太多的设置和配置。我们现在需要做的只是编写测试。\n\n\n\n### 执行测试\n\nJUnit 提供了多个静态方法，供我们在测试中验证代码的行为。我们使用断言来展示预期结果，也就是我们的**控制数据**。该数据通常是独立计算得出的，且已知为真或正确——这便是将其用作控制数据的原因。当断言返回预期数据时，测试通过；否则测试失败。表\
  \ 13-1 展示了你可能需要的常用断言方法。\n\n**表 13-1** 常用断言方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `assertEquals()`\
  \ | 如果两个对象或基本类型值相等，则返回 true |\n| `assertNotEquals()` | `assertEquals()` 的反向操作 |\n\
  | `assertSame()` | 如果两个引用指向同一个对象，则返回 true |\n| `assertNotSame()` | `assertSame()`\
  \ 的反向操作 |\n| `assertTrue()` | 测试布尔表达式，判断其是否为 true |\n| `assertFalse()` | `assertTrue()`\
  \ 的反向操作 |\n| `assertNull()` | 测试对象是否为 null |\n| `assertNotNull()` | `assertNull()`\
  \ 的反向操作 |\n\n现在我们已经了解了几种断言方法，可以开始编写测试了。清单 13-2 展示了 `FactorialTest.java` 的代码。\n\n\
  ```java\nimport org.junit.Test;\nimport static org.junit.Assert.*;\npublic class\
  \ FactorialTest {\n@Test\npublic void factorial() {\nassertEquals(1.0, Factorial.factorial(1),0.0);\n\
  assertEquals(120.0, Factorial.factorial(5), 0.0);\n}\n}\n```\n\n**清单 13-2** `FactorialTest.java`\n\
  \n我们的 `FactorialTest` 类只有一个方法，因为这仅用于演示。可以肯定的是，实际项目中的代码会有更多方法。\n\n请注意，每个测试（方法）都带有\
  \ `@Test` 注解。JUnit 正是通过它来识别 `factorial()` 是一个测试用例。同时注意，`assertEquals()` 是 `Assert`\
  \ 类的一个方法，但我们这里没有使用全限定名，因为我们已经对 `Assert` 进行了静态导入——这无疑让代码编写更简便。\n\n`assertEquals()`\
  \ 方法接受三个参数；如图 13-8 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig8_HTML.jpg](img/457413_2_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8** `assertEquals` 方法\n\n| ❶ | **期望值**是你的控制数据；这通常在测试中是硬编码的。 |\n| ❷ | **实际值**是你的方法返回的值。如果期望值与实际值相同，`assertEquals()`\
  \ 通过——你的代码行为符合预期。 |\n| ❸ | **Delta** 旨在反映 *实际值* 和 *期望值* 可以有多接近仍被视为相等。有些开发者称此参数为“模糊”因子。当期望值与实际值之间的差异大于“模糊因子”时，`assertEquals()`\
  \ 将失败。我这里使用了 0.0，因为我不允许任何偏差。你可以使用其他值，如 0.001、0.002 等；这取决于你的使用场景以及你的应用能够容忍的模糊程度。\
  \ |\n\n至此，我们的代码就完成了。如果你愿意，可以在代码中再插入几个断言，以便更好地掌握要领。\n\n在这个示例代码中，我省略了一些内容。我没有重写 `setUp()`\
  \ 和 `tearDown()` 方法，因为我不需要。你通常会用 `setUp()` 方法来设置数据库连接、网络连接等。使用 `tearDown()` 方法来关闭你在\
  \ `setUp()` 中打开的所有资源。\n\n现在，我们准备运行测试。\n\n### 运行单元测试\n\n你可以运行类中的单个测试，也可以运行所有测试。主编辑器左侧的绿色小箭头是可以点击的。点击类名旁边的小箭头，将运行该类中的所有测试。点击测试方法名旁边的小箭头，则只运行该测试用例。见图\
  \ 13-9。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig9_HTML.jpg](img/457413_2_En_13_Fig9_HTML.jpg)\n\
  \n**图 13-9** 主编辑器中的 `FactorialTest.java`\n\n类似地，你也可以通过主菜单栏运行测试，选择 **Run** ➤ **Run**。\n\
  \n图 13-10 显示了测试执行的结果。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig10_HTML.jpg](img/457413_2_En_13_Fig10_HTML.jpg)\n\
  \n**图 13-10** 运行 `FactorialTest.java` 的结果\n\nAndroid Studio 提供了丰富的提示，帮助你判断测试是通过还是失败。首次运行告诉我们\
  \ `Factorial.java` 存在问题；`assertEquals()` 失败了。\n\n> **提示：** 当测试失败时，最好使用调试器来检查代码。`FactorialTest.java`\
  \ 与我们项目中的其他类并无不同；它只是另一个 Java 文件；我们可以对其进行调试。在测试代码的战略位置设置一些断点，然后不“运行”它，而是运行“调试器”，以便能够逐步执行。\n\
  \n我们的测试失败，因为 1 的阶乘不是 2，而是 1。如果你仔细查看 `Factorial.java`，会发现阶乘值的计算不正确。\n\n编辑 `Factorial.java`\
  \ 文件，然后将这一行\n\n```java\nreturn arg + factorial(arg - 1);\n```\n\n改为这一行\n\n```java\n\
  return arg * factorial(arg - 1);\n```\n\n如果我们重新运行测试，将会看到成功的结果，如图 13-11 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig11_HTML.jpg](img/457413_2_En_13_Fig11_HTML.jpg)\n\
  \n**图 13-11** 测试成功\n\n现在，我们看到的不再是黄色的感叹号，而是绿色的对勾。不再是“测试失败”，而是“测试通过”。现在我们知道代码按预期工作了。\n\
  \n## 仪器化测试\n\n与 Android 平台交互的单元测试称为仪器化测试；我们将使用 Espresso 框架来进行此类测试。\n\n`Espresso`\
  \ 是一个 Android 测试框架，旨在简化编写可靠且简洁的用户界面测试。Google 于 2013 年发布了 `Espresso` 框架。自 2.0 版本发布以来，`Espresso`\
  \ 已成为 Android 支持仓库的一部分。\n\n`Espresso` 会自动将你的测试操作与应用程序的用户界面同步。该框架还会确保你的 Activity\
  \ 在测试运行之前启动。它还允许测试等待，直到所有观察到的后台活动完成。\n\n使用 `Espresso` 测试的一般步骤如下：\n\n* **匹配**——使用匹配器定位特定组件，例如按钮或\
  \ TextView。`ViewMatcher` 允许你在视图层次结构中查找 `View` 对象。\n* **执行**——使用 `ViewAction` 对象对目标\
  \ `View` 对象执行操作，例如点击。\n* **断言**——对 `View` 的状态进行断言。\n\n假设我们有一个包含 `Button` 和 `TextView`\
  \ 的简单屏幕。当我们点击 `Button` 时，会在 `TextView` 上写入文本“Hello World”。我们可以编写测试，如清单 13-3 所示。\n\
  \n| ❶ | 使用 `ViewMatcher` 查找 `View` 对象。我们正在寻找一个 id 为 `button` 的 `View`。请记住，当你使用 `onView()`\
  \ 时，Espresso 会等到所有同步条件都满足后，才会执行相应的 UI 操作。 |\n| ❷ | 找到它后，使用 `ViewAction` 对其执行操作；在本例中，我们想要点击它。\
  \ |\n| ❸ | 再次使用 `ViewMatcher` 查找 `View` 对象；这次，我们试图找到一个 id 为 `textview` 的 `TextView`。\
  \ |\n| ❹ | 找到它后，我们想检查其文本属性是否匹配“Hello World”。 |\n\n```java\n@Test\npublic void sampleTest()\
  \ {\nonView(withId(R.id.button))   ❶\n.perform(Click());       ❷\nonView(withId(R.id.textview))\
  \ ❸\n.check(matches(withText(\"Hello World\"))); ❹\n}\n```\n\n**清单 13-3** `sampleTest`\n\
  \n\n\n### 搭建一个简单的测试\n\n我们来搭建一个简单的项目，其中包含一个空的 `Activity`。清单 13-4 展示了 XML 布局代码，清单\
  \ 13-5 展示了 `MainActivity` 代码。\n\n```\n清单 13-4\nactivity_main.xml\n```\n\n如你所见，布局代码相当简单；它包含一个\
  \ `TextView` 和两个 `Buttons`。当用户点击这两个 `Buttons` 中的任意一个时，都会调用 `MainActivity` 中的 `onClick()`\
  \ 方法。\n\n```\npublic class MainActivity extends AppCompatActivity {\n    TextView\
  \ txtview;\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
  \        txtview = (TextView) findViewById(R.id.textView);\n    }\n    public void\
  \ onClick(View view) {\n        switch(view.getId()) {\n            case R.id.btnhello:\n\
  \                txtview.setText(\"hello\");\n                break;\n         \
  \   case R.id.btnworld:\n                txtview.setText(\"world\");\n         \
  \       break;\n        }\n    }\n}\n清单 13-5\nMainActivity\n```\n\n`MainActivity`\
  \ 中的 `onClick()` 方法会尝试获取被点击的 `Button` 的 id，并据此路由程序逻辑。如果点击了 `btnhello`，我们就将 `TextView`\
  \ 的文本内容设置为“hello”；如果点击了 `btnworld`，则将其内容设置为“world”——这足够简单。为了验证这一行为，我们可以建立一个仪器化测试。\n\
  \n在上一章中，我们在 `src/test` 下编写测试类，因为那些是 JVM 测试。接下来，我们将在 `src/androidTest` 下编写测试类；这将是一个仪器化测试。清单\
  \ 13-6 展示了我们的仪器化测试类的代码。\n\n- ❶ 你需要静态导入 Espresso 的匹配器（matchers）、动作（actions）和断言（`asserts`），这样之后在代码中就无需使用完整限定名。\n\
  - ❷ 这行代码会拦截我们的测试方法调用，并确保在执行任何测试之前 `Activity` 已被启动。\n- ❸ 你需要使用 `@Test` 注解每个测试方法。\n\
  - ❹ 使用 `withId()` 方法找到 `btnhello` 对象。\n- ❺ 然后我们使用 `ViewAction.click()` 模拟一次点击。\n\
  - ❻ 接着，我们再次使用 `withId()` 方法找到 `TextView`。\n- ❼ 最后，我们断言 `TextView` 包含文本“hello”。\n\
  \n```\nimport android.support.test.rule.ActivityTestRule;\nimport android.support.test.runner.AndroidJUnit4;\n\
  import org.junit.Rule;\nimport org.junit.Test;\nimport static android.support.test.espresso.Espresso.onView;\
  \  ❶\nimport static android.support.test.espresso.action.ViewActions.click;\nimport\
  \ static android.support.test.espresso.assertion.ViewAssertions.matches;\nimport\
  \ static android.support.test.espresso.matcher.ViewMatchers.withId;\nimport static\
  \ android.support.test.espresso.matcher.ViewMatchers.withText;\npublic class MainActivityTest\
  \ {\n    @Rule ❷\n    public ActivityTestRule mActivityTestRule = new ActivityTestRule(MainActivity.class);\n\
  \    @Test ❸\n    public void buttonHelloTest() {\n        onView(withId(R.id.btnhello))\
  \ ❹\n        .perform(click());        ❺\n        onView(withId(R.id.textView))\
  \ ❻\n        .check(matches(withText(\"hello\"))); ❼\n    }\n    @Test\n    public\
  \ void buttonWorldTest() {\n        onView(withId(R.id.btnworld))\n        .perform(click());\n\
  \        onView(withId(R.id.textView))\n        .check(matches(withText(\"world\"\
  )));\n    }\n}\n清单 13-6\nMainActivityTest\n```\n\n你可以像运行 JVM 测试一样运行这个仪器化测试。你可以：\n\
  \n- 点击 IDE 侧边栏的箭头。\n- 右键点击测试并使用上下文菜单，然后选择“Run MainActivityTest”。\n- 前往主菜单栏，选择 `Run`\
  \ ➤ `Run`，然后选择 `MainActivityTest`。\n\n### 录制 Espresso 测试\n\nAndroid Studio 包含一项功能，你可以运行你的应用、记录交互，并利用录制内容创建\
  \ Espresso 测试。前往主菜单栏，然后选择 `Run` ➤ `Record Espresso Test`，如图 13-12 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig12_HTML.jpg](img/457413_2_En_13_Fig12_HTML.jpg)\n\
  \n*图 13-12: 录制 Espresso 测试*\n\n选择“Record Espresso Test”后，你现在可以像往常一样与应用交互，但这次交互会被记录下来。如果你点击其中一个按钮，比如“HELLO”按钮，测试录制器屏幕就会弹出，如图\
  \ 13-13 所示。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig13_HTML.jpg](img/457413_2_En_13_Fig13_HTML.jpg)\n\
  \n*图 13-13: Espresso 录制器*\n\n- ❶ 这一部分显示了你与应用的每一次交互。此时，我只点击了应用一次；我点击了“HELLO”按钮。\n\
  - ❷ 这一部分是 `ViewMatcher`，但以可视化方式呈现。如果你像我一样点击 `TextView`，它就会作为一个项目添加到“Edit Assertion”部分。\n\
  - ❸ 此处选择了 `TextView`，因为我在 `ViewMatcher` 部分（第 2 项）点击了它。\n- ❹ 在这里选择断言。在这个例子中，我们仅使用“text\
  \ is”。\n- ❺ 这显示了我们要断言的 `TextView` 的实际值。\n\n如果你想添加另一个测试，可以点击“Save and Add Another”，或者点击“Save\
  \ Assertion”完成录制。图 13-14 显示了下一个界面。\n\n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig14_HTML.jpg](img/457413_2_En_13_Fig14_HTML.jpg)\n\
  \n*图 13-14: Espresso 录制器，断言已保存*\n\n当你点击 OK，录制器会提示输入类名，并将录制内容保存为一个测试类，如图 13-15 所示。\n\
  \n![../images/457413_2_En_13_Chapter/457413_2_En_13_Fig15_HTML.jpg](img/457413_2_En_13_Fig15_HTML.jpg)\n\
  \n*图 13-15: Espresso 测试，测试已保存*\n\n当你前往 `src/androidTest` 文件夹时，会发现从录制内容中新生成的测试类。现在你可以像之前运行\
  \ `MainActivityTest` 一样运行这个生成的测试。\n\n**注意：**关于 Espresso 的两个小知识：(1) 根据 Android Studio\
  \ 分析数据，Espresso 录制器是使用 Espresso 时最常用的工具之一；(2) Espresso 录制器的原名叫“cassette”。\n\n###\
  \ 更多关于 Espresso 匹配器\n\nEspresso 有多种匹配器，但最常用的是 `ViewMatchers`——我们在之前的例子中使用的就是它。以下是\
  \ Espresso 中的其他匹配器：\n\n- `CursorMatchers` — 可用于由 Cursor 支持的 Android Adapter Views，以匹配特定的数据行。\n\
  - `LayoutMatchers` — 用于匹配和检测典型的布局问题，例如，含有省略号或多行文本的 TextViews。\n- `RootMatchers`\
  \ — 用于匹配作为对话框或可以接收触摸事件的 Root 对象。\n- `PreferenceMatchers` — 用于匹配 Android Preferences，并让我们根据其键、摘要文本等来查找\
  \ View 组件。\n- `BoundedMatchers` — 用于为给定类型创建自定义匹配器。\n\n在之前的示例中，我们使用 `ViewMatcher`\
  \ 通过 id 查找 Views。我们还可以通过其他方式来查找 Views，例如：\n\n- **其值** — 你可以使用 `withText()` 方法来查找与某个特定字符串表达式匹配的\
  \ View。\n- **其子元素的数量** — 使用 `hasChildCount()` 方法，你可以匹配具有特定子元素数量的 View。\n- **其类名**\
  \ — 使用 `withClassName()` 方法。\n\n`ViewMatchers` 还可以告诉我们一个 `View` 对象是否是：\n\n- **已启用**\
  \ — 通过使用 `isEnabled()` 方法\n- **可聚焦** — 通过使用 `isFocusable()` 方法\n- **已显示** — `isDisplayed()`\n\
  - **已勾选** — `isChecked()`\n- **已选中** — `isSelected()`\n\n在 `ViewMatchers` 类中还有更多方法可供使用，请务必通过\
  \ [`https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers`](https://developer.android.com/reference/android/support/test/espresso/matcher/ViewMatchers)\
  \ 进行查阅。\n\n\n\n### Espresso 操作\n\n`Espresso Actions` 让你能够在测试期间以编程方式与 `View` 对象进行交互。前面我们已经使用了\
  \ `click`，但实际上 `ViewActions` 还能让你做更多事情。方法名称非常具有描述性，因此无需额外解释；你可以从名称看出它们的作用。以下列举了其中一些方法：\n\
  \n*   `clearText()`\n*   `closeSoftKeyboard()`\n*   `doubleClick()`\n*   `longClick()`\n\
  *   `openLink()`\n*   `pressBack()` — 按下返回键\n*   `replaceText(String arg)`\n*  \
  \ `swipeDown()`\n*   `swipeRight()`\n*   `swipeUp()`\n*   `typeText(String arg)`\n\
  \n还有更多可用的操作，请务必查阅 `ViewAction` 对象的 API 文档。\n\n在本章结束之前，请务必访问 Android Developers 网站上关于\
  \ `Espresso` 的官方文档：[`https://bit.ly/androidstudioespresso`](https://bit.ly/androidstudioespresso)；我们在这里只是浅尝辄止地介绍了\
  \ `Espresso`。\n\n## 总结\n\n*   我们讨论了可以为应用进行的各种测试；你不必进行所有测试，但请确保执行适用于你应用的测试。\n*  \
  \ 开发测试（单元测试）应作为核心开发任务；尝试养成编写测试用例和实际代码的习惯。\n*   将 JVM 测试放在 `src/test` 目录下，将插桩测试放在\
  \ `src/androidTest` 目录下。\n*   你可以使用 `Espresso` 创建插桩测试；在 `Espresso` 中需要两个核心组件：`ViewMatchers`\
  \ 和 `ViewActions`。\n*   编写 `Espresso` 测试的一般步骤如下：(1) 使用 `ViewMatchers` 找到 `View`\
  \ 对象，(2) 使用 `ViewActions` 对 `View` 执行操作，(3) 进行断言。\n*   创建 `Espresso` 测试的一个简便方法是使用\
  \ `Espresso` 录制器。\n\n"
- "# 14. 文件操作\n\n*本章将涵盖：*\n\n*   Android 文件 I/O 简介\n*   内部存储与外部存储\n*   如何使用内部存储\n\n\
  当你需要处理视频、音频、json 或纯文本文件时，可以使用 Java 文件 I/O 操作本地文件。如果你之前使用过 Java 中的 `File`、`InputStream`、`OutputWriter`\
  \ 以及其他 I/O 类，那么在 Android 中也会用到相同的类。在 Android 中，不同之处在于文件的存储位置。在 Java 桌面应用程序中，你可以将文件存放在几乎任何地方。但在\
  \ Android 中则不然。就像在 Java Web 应用程序中一样，Android 应用不能随意在任何地方创建和读取文件。应用只有在特定位置才拥有读写权限。\n\
  \n## 内部与外部存储\n\nAndroid 区分内部存储和外部存储。*内部*存储指的是闪存中所有已安装应用共享的那一部分。*外部*存储指的是用户可挂载的存储空间——通常是指\
  \ sdcard，但也不一定是。只要用户能够挂载，任何设备都可以；它甚至可以是内部闪存的一部分。\n\n两种选择各有优缺点，你需要根据应用的需求和每种存储的局限性进行权衡。以下列表展示了部分优缺点。\n\
  \n**内部存储**\n\n*   应用始终可以访问该内存。不存在用户卸载 sdcard 或其他设备的风险。它能保证始终可用。\n*   存储空间比外部存储小，因为你的应用只会被分配与其他所有应用共享的一部分闪存空间。这在早期的\
  \ Android 版本中是个问题，但现在已不那么令人担忧。根据 Android 兼容性定义，自 Android 6.0 起，Android 手机或平板电脑至少需要为\
  \ `/data` 分区预留 1.5GB 的非易失性空间。对于大多数应用来说，这个空间是足够的。你可以在此处阅读兼容性定义：[`bit.ly/android6compatibilitydefinition`](https://bit.ly/android6compatibilitydefinition)。\n\
  *   当你的应用在此空间创建文件时，只有你的应用能够访问这些文件；除非手机已 root（大多数用户不会 root 手机，因此通常无需担心）。\n*   卸载应用时，它创建的所有文件都将被删除。\n\
  \n**外部存储**\n\n*   通常比内部存储拥有更大的空间。\n*   可能并非始终可用，例如，当用户移除 sdcard 或将其作为 USB 驱动器挂载时。\n\
  *   此处的所有文件对所有应用和用户都是可见的。任何人和任何应用都可以在此创建和保存文件。他们也可以删除文件。\n*   当应用在此空间创建文件时，文件的寿命可以超过应用本身；卸载应用时，其创建的文件不会被删除。\n\
  \n## 缓存目录\n\n无论你选择内部存储还是外部存储，可能还需要就文件位置做出另一个决定。你可以将文件放在缓存目录或更持久的位置。当空间不足时，Android\
  \ 操作系统或第三方应用可能会回收缓存目录中的文件。除非你手动删除，否则不在缓存目录中的文件通常是安全的。在本章中，我们将不涉及缓存目录或外部存储。我们将只使用内部存储，并将文件放在标准位置。\n\
  \n\n\n## 如何使用内部存储\n\n如前所述，在 Android 中使用文件存储就像使用 Java I/O 中的常规类一样。有几种选项可供使用，例如 `openFileInput()`\
  \ 和 `openFileOutput()`，或者使用 `InputStreams` 和 `OutputStreams` 的其他方式。你只需要记住，这些调用不会让你指定文件路径。你只能提供文件名；如果你不关心这一点，那就放心使用它们吧——这也是我们在本章中将要使用的。另一方面，如果你需要更高的灵活性，你可以使用\
  \ `getFilesDir()` 或 `getCacheDir()` 来获取一个指向文件位置根目录的 `File` 对象——如果你想要使用内部存储的缓存目录，可以使用\
  \ `getCacheDir()`。当你有了一个 `File` 对象后，你就可以从中创建你的目录和文件结构。\n\n这就是 Android 文件存储的大致情况。再次说明，在本章中，我们只会使用标准位置（非缓存）的内部存储。\n\
  \n写入文件需要几个简单的步骤。你需要：\n\n1.  确定文件名\n2.  获取一个 `FileOutputStream` 对象\n3.  将你的内容转换为\
  \ `ByteArray`\n4.  使用 `FileOutputStream` 写入 `ByteArray`\n5.  不要忘记关闭文件\n\n清单 14-1\
  \ 展示了一段带有注释的代码片段，说明如何将 `String` 数据保存到文件中。\n\n| ❶ | 选择一个文件名。 |\n| :--- | :--- |\n\
  | ❷ | 这是我们要保存到文件的 `String`。在实际应用中，你可能从 `EditText` 组件的内容中获取它。 |\n| ❸ | `openFileOutput()`\
  \ 返回一个 `FileOutputStream`；我们需要这个对象，以便写入文件。调用的第一个参数是你要创建的文件名。第二个参数是 `Context` 模式。我们使用\
  \ `MODE_PRIVATE`，因为我们希望文件对应用程序私有。我们在这里使用了 try-with-resources 块；这样，我们就不必费心关闭文件了。当块退出时，它会自动为我们关闭文件对象。\
  \ |\n| ❹ | `write()` 方法需要一个 `ByteArray`。因此，我们需要将 `String` 转换为字节数组。`getBytes()` 方法可以很好地完成这项工作。\
  \ |\n\n```\nString filename = \"myfile.txt\"; ❶\nString str = \"The quick brown\
  \ fox jumped over the head\"; ❷\ntry (FileOutputStream out = openFileOutput(filename,\
  \ Context.MODE_PRIVATE)) { ❸\n    out.write(str.getBytes()); ❹\n} catch (IOException\
  \ e) {\n    e.printStackTrace();\n}\n清单 14-1\n将字符串数据保存到文件\n```\n\n从文件读取涉及比写入更多的步骤。你通常需要执行以下操作：\n\
  \n1.  获取一个 `FileInputStream`。\n2.  从流中读取，一次一个字节。\n3.  持续读取，直到没有内容可读。如果你读取的最后一个字节的值为\
  \ `-1`，你就知道已经到达文件末尾了。这时就该停止了。\n4.  当你向文件末尾读取时，需要将从流中获取的字节存储到一个临时容器中。`StringBuilder`\
  \ 或 `StringBuffer` 可以完成这个任务。使用 `plus` 运算符构建 `String` 对象既浪费又低效，因为 `String` 是不可变的。每次使用\
  \ `plus` 运算符，它都会创建一个新的 `String` 对象；如果你的文件有 2000 个字符，你就会创建 2000 个 `String` 对象。如果你正在读取一个文本文件，就会发生这种情况。如果你正在阅读其他内容，比如音频或视频文件，你将使用不同的数据结构。\n\
  5.  当你到达文件末尾时，停止读取。对你已读取的内容进行必要的操作，并且不要忘记关闭它。\n\n清单 14-2 展示了一段带有注释的代码片段，说明如何从文件读取\
  \ `String` 数据。\n\n| ❶ | 我们无法一口气读取整个文件。我们会分块读取。当我们获取一些块时，我们将它们存储在 `StringBuilder`\
  \ 对象中。 |\n| :--- | :--- |\n| ❷ | `openFileInput()` 返回一个 `FileInputStream`；这是我们需要从文件读取的对象。它唯一的参数是要读取的文件名。在这里使用\
  \ try-with-resources 让我们免于编写关闭文件的样板代码。 |\n| ❸ | `read()` 方法从输入流中读取一个字节的数据，并将其作为整数返回。我们需要一次从流中读取一个字节，直到到达文件结束\
  \ (EOF) 标记。当没有更多字节可从流中读取时，EOF 被标记为 `-1`。我们将以此作为 `while` 循环的条件。直到 `read()` 方法不返回\
  \ `-1`，我们才继续读取。 |\n| ❹ | `read()` 方法返回一个 `int`；它是文件中每个字母的 ASCII 值，以整数形式返回。在将其放入\
  \ `StringBuilder` 之前，我们必须将其转换为 `char`。 |\n| ❺ | 当没有更多字节可读时，我们将退出循环，并从 `StringBuilder`\
  \ 中获取 `String`。现在，你可以将文件内容作为 `String` 来处理。 |\n\n```\nString filename = \"myfile.txt\"\
  ;\nStringBuilder sb = new StringBuilder(); ❶\nString output = \"\";\ntry (FileInputStream\
  \ in = openFileInput(filename)) { ❷\n    int read = 0;\n    while ((read = in.read())\
  \ != -1) { ❸\n        sb.append((char) read); ❹\n    }\n    output = sb.toString();\
  \ ❺\n}\ncatch(IOException ie) {\n    Log.e(TAG, ie.getMessage());\n}\n清单 14-2\n\
  从文件读取\n```\n\n让我们构建一个小项目来整合所有这些内容。创建一个带有空 Activity 的项目。我们的小应用将包含以下视图组件：\n\n*   `EditText`\
  \ — 这将允许我们输入一些文本。\n*   `TextView` — 当我们从文件读取数据时，我们将使用此组件显示内容。\n*   `Button` — 这将触发用户操作，将\
  \ `EditText` 的内容保存到文件。\n\n编辑 `/app/res/layout/activity_main.xml` 以匹配清单 14-3 的内容。\n\
  \n```\n清单 14-3\napp/res/layout/activity_main.xml\n```\n\n接下来，编辑 `MainActivity` 以匹配清单\
  \ 14-4 的内容。\n\n| ❶ | 将 `Button`、`EditText`、`TextView`、`filename` 变量和 `TAG` 变量声明为类成员；我们稍后将引用它们。\
  \ |\n| :--- | :--- |\n| ❷ | 在 `onCreate()` 回调中初始化 `TextView` 和 `EditText` 变量。 |\n\
  | ❸ | 将 `Button` 绑定到一个监听器对象。当 `Button` 被点击时，我们将调用一个方法，该方法包含用于将 `txtinput` 的内容保存到文件的代码。\
  \ |\n\n```\nimport android.content.Context;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.View;\nimport android.widget.Button;\nimport android.widget.EditText;\n\
  import android.widget.TextView;\n\npublic class MainActivity extends AppCompatActivity\
  \ {\n    private Button btn;  ❶\n    private TextView txtoutput;\n    private EditText\
  \ txtinput;\n    private String filename = \"myfile.txt\";\n    private String TAG\
  \ = getClass().getName();\n\n    @Override\n    protected void onCreate(final Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
  \n        txtoutput = findViewById(R.id.txtoutput); ❷\n        txtinput = findViewById(R.id.txtinput);\n\
  \        btn = findViewById(R.id.btn);\n\n        btn.setOnClickListener(new View.OnClickListener()\
  \ { ❸\n            @Override\n            public void onClick(View v) {\n      \
  \          // 这是我们触发保存数据的地方\n            }\n        });\n    }\n}\n清单 14-4\nMainActivity\n\
  ```\n\n接下来，向 `MainActivity` 添加一个方法并命名为 `saveData()`。编辑它以匹配清单 14-5 中所示的代码。这些代码与清单\
  \ 14-1 中的代码基本相同；唯一的区别是我们正在从 `EditText` (`txtinput`) 组件读取 `String` 内容。\n\n\n```java\n\
  private void saveData() {\n    String str = txtinput.getText().toString();\n   \
  \ try (FileOutputStream out = openFileOutput(filename, Context.MODE_PRIVATE)) {\n\
  \        out.write(str.getBytes());\n        loadData();\n    } catch (IOException\
  \ e) {\n        Log.e(TAG, e.getMessage());\n    }\n}\n```\n列表 14-5：`saveData()`\n\
  \n接下来，在 `MainActivity` 中添加另一个方法，将其命名为 `loadData()`；代码如列表 14-6 所示。这些代码与列表 14-2 中的代码相同，但这次，我们将\
  \ `txtinput` 和 `txtoutput` 的文本设置为刚读取的文件内容。\n\n```java\nprivate void loadData() {\n\
  \    StringBuilder sb = new StringBuilder();\n    try (FileInputStream in = openFileInput(filename))\
  \ {\n        int read = 0;\n        while ((read = in.read()) != -1) {\n       \
  \     sb.append((char) read);\n        }\n        txtoutput.setText(sb.toString());\n\
  \        txtinput.setText(sb.toString());\n    }\n    catch(IOException ie) {\n\
  \        Log.e(TAG, ie.getMessage());\n    }\n}\n```\n列表 14-6：`loadData()`\n\n我们希望应用打开时能显示\
  \ `myfile.txt` 的内容。可以通过在 `MainActivity` 的 `onResume()` 回调中调用 `loadData()` 来实现。覆盖\
  \ `onResume()` 回调并调用 `loadData()` 方法，如列表 14-7 所示。\n\n```java\n@Override\nprotected\
  \ void onResume() {\n    super.onResume();\n    loadData();\n}\n```\n列表 14-7：`onResume()`\n\
  \n至此，我们基本完成了。图 14-1 显示了我们的应用在模拟器中的运行效果。\n\n![../images/457413_2_En_14_Chapter/457413_2_En_14_Fig1_HTML.jpg](img/457413_2_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1：完成的应用\n\n您可以使用设备资源管理器查看本地文件的内容。从主菜单栏中选择 **View** ➤ **Tool Windows** ➤ **Device\
  \ Explorer**。设备资源管理器工具窗口将在 IDE 中弹出，如图 14-2 所示。\n\n![../images/457413_2_En_14_Chapter/457413_2_En_14_Fig2_HTML.jpg](img/457413_2_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2：设备资源管理器\n\n依次展开 **data** ➤ **data** ➤ （应用包名）➤ **files**。双击文件即可查看其内容；Android\
  \ Studio 将显示这些内容。\n\n## 总结\n\n*   您可以将文件存储在始终可用但空间有限的内部存储器中，也可以存储在空间更大但可能被卸载的外部存储器中。\n\
  *   Java I/O 调用会抛出 `Exception`；请妥善处理它们。\n\n"
- '# 15. BroadcastReceivers


  *我们将涵盖的内容：*


  *   `BroadcastReceiver` 简介

  *   自定义广播与系统广播

  *   清单注册与上下文注册的接收器


  Android 的应用模型在很多方面都独具特色，但其最突出之处在于，它允许您利用自己未编写的其他应用的功能来构建应用——我指的不只是库，而是完整的应用程序。在第
  8 章中，我们学习了如何使用 `Intent` 来激活 `Activity`。在本章中，我们将学习如何使用 `Intent` 发送和接收广播消息。


  广播是一种由 Android 运行时或其它应用（包括您的应用）发送的 `Intent`，以便每个应用或组件都能听到它。大多数应用会忽略此广播，但您可以让自己的应用监听它。您可以调谐到该消息，以便对广播做出响应。这就是本章的主题。


  ## `BroadcastReceiver` 简介


  Android 应用可以发送或接收来自 Android 系统和其他应用（包括我们自己的应用）的广播消息。当某些有趣的事情发生时，就会发送这些广播，例如，系统启动时、设备开始充电时、文件下载完成时。这种消息传递模型被称为*发布-订阅*模式；在这种模式下，消息的发送者（称为发布者）并不针对特定的接收者（称为订阅者），而是将消息分类成不同的类别，且不知道哪些订阅者可能正在监听（如果有的话）。同样，订阅者通过注册来监听一个或多个类别的消息来表达兴趣，而无需发布者知晓。


  ### 系统广播与自定义广播


  广播可以由操作系统（系统广播）或应用程序发送。每当发生某些有趣的事件时，操作系统就会发送系统广播，例如，WiFi 打开（或关闭）、电池电量降至指定阈值、插入耳机、设备切换到飞行模式等。以下是系统广播操作的一些示例：


  *   `android.app.action.ACTION_PASSWORD_CHANGED`

  *   `android.app.action.ACTION_PASSWORD_EXPIRING`

  *   `android.bluetooth.a2dp.profile.action.CONNECTION_STATE_CHANGED`

  *   `android.bluetooth.a2dp.profile.action.PLAYING_STATE_CHANGED`

  *   `android.bluetooth.adapter.action.CONNECTION_STATE_CHANGED`

  *   `android.intent.action.BATTERY_CHANGED`

  *   `android.intent.action.BATTERY_LOW`

  *   `android.intent.action.BATTERY_OKAY`


  文档中列出了大约 150 多个此类操作。您可以在 Android SDK 的 `BROADCAST_ACTIONS.TXT` 文件中找到它们。


  另一方面，自定义广播是您自己创建的。这些是您发送的 `Intent`，用于通知您的应用的某些组件（或调谐到同一频道的其他应用）发生了“有趣”的事情，例如，文件已下载完成，或您完成了质数计算等。



  ### 注册广播的两种方式


  如果你想跟着代码示例操作，需要创建一个项目（带空 Activity）。


  要响应广播，你需要先监听它，而监听广播就需要注册一个接收器。接收器是一个继承自 `BroadcastReceiver` 类的类；你需要在你的应用中添加这样一个类来响应广播消息。


  注册有两种方式：通过清单文件（Manifest）或通过 `Context`（上下文）。


  ### 清单注册


  顾名思义，清单注册是通过应用的清单文件完成的。要通过清单注册来监听广播消息，我们需要执行以下操作：


  ![../images/457413_2_En_15_Chapter/457413_2_En_15_Fig1_HTML.jpg](img/457413_2_En_15_Fig1_HTML.jpg)


  **图 15-1** – 创建一个新的 Java 类


  1.  在应用的 `AndroidManifest` 文件中添加 `<receiver>` 元素；代码清单 15-1 展示了一个带有注释的清单文件。


  2.  向项目中添加一个类（继承自 `BroadcastReceiver` 类），然后重写 `onReceive()` 方法。代码清单 15-2 展示了一个示例
