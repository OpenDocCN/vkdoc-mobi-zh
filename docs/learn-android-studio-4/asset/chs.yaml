  \ 的生命周期状态发生变化时，将消息记录到 Logcat 窗口。尽管如此，它演示了如何向任何 `Activity` 的生命周期添加观察者。\n\n\n\n##\
  \ ViewModel\n\nAndroid 框架管理 `Activity` 和 `Fragment` 等 UI 控制器的生命周期；它可能会根据某些用户操作（例如点击返回按钮）或设备事件（例如旋转屏幕）销毁或重新创建\
  \ `Activity`（或 `Fragment`）。这些配置更改是您无法控制的。\n\n如果运行时代决定销毁 UI 控制器，那么您当前存储在其中的任何与 UI\
  \ 相关的临时数据都将丢失。\n\n最好创建一个新项目（使用空 `Activity`）来跟随本节内容进行讨论；然后向项目中添加一个 Java 类并命名为 `RandomNumber`。清单\
  \ 16-4、16-5 和 16-6 展示了一个简单的应用，每次 `Activity` 创建时都会显示一个随机数。\n\n清单 16-4 展示了随机数生成器的代码。它只包含两个方法：`getNumber()`\
  \ 和 `createRandomNumber()`；每个方法都留有一条日志语句，以便我们检查方法被调用的时间和次数。`getNumber()` 方法的逻辑很简单——如果\
  \ `minitialized` 变量为 `false`，意味着我们第一次创建 `RandomNumber` 类的实例；因此，我们将创建随机数然后直接返回它。否则，我们将返回\
  \ `minitialized` 变量的当前值。\n\n```java\nimport android.util.Log;\nimport java.util.Random;\n\
  public class RandomNumber  {\nprivate String TAG = getClass().getSimpleName();\n\
  int mrandomnumber;\nboolean minitialized = false;\nString getNumber() {\nif(!minitialized)\
  \ {\ncreateRandomNumber();\n}\nLog.i(TAG, \"RETURN Random number\");\nreturn mrandomnumber\
  \ + \"\";\n}\nvoid createRandomNumber() {\nLog.i(TAG, \"CREATE NEW Random number\"\
  );\nRandom random = new Random();\nmrandomnumber = random.nextInt(100);\nminitialized\
  \ = true;\n}\n}\n```\n\n*清单 16-4 RandomNumber 类*\n\n清单 16-5 展示了 `MainActivity` 的代码。所有操作都发生在\
  \ `onCreate()` 方法内部。当 `MainActivity` 进入 *CREATED* 状态时，我们创建 `RandomNumber` 类的实例；调用\
  \ `getNumber()` 方法，并将 `TextView` 的值设置为 `getNumber()` 方法的结果。\n\n```java\npublic class\
  \ MainActivity extends AppCompatActivity {\n@Override\nprotected void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
  RandomNumber data = new RandomNumber();\n((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());\n\
  }\n}\n```\n\n*清单 16-5 MainActivity 类*\n\n清单 16-6 展示了 `activity_main` 的布局代码。\n\n\
  ```\n清单 16-6 activity_main.xml\n```\n\n第一次运行此代码时，您会在 `TextView` 上看到一个随机数，这并不奇怪。您还会在\
  \ Logcat 窗口中看到 `createNumber()` 和 `getNumber()` 的日志条目，这同样不足为奇。现在，当应用在模拟器上运行时，尝试更改设备的屏幕方向——您会注意到，每次屏幕方向更改时，`TextView`\
  \ 上显示的数字也会随之改变。您还会看到 `createNumber()` 和 `getNumber()` 方法的额外日志出现在 Logcat 中。这是因为运行时每次屏幕方向更改时都会销毁并重新创建\
  \ `MainActivity`。我们的 `RandomNumber` 对象也随着 `MainActivity` 被销毁并重新创建——我们的 UI 数据无法在屏幕方向更改后存活下来。\n\
  \n这是使用 `ViewModel` 库的好场景，这样 UI 数据可以在 `Activity` 类销毁和重新创建后继续存在。我们只需要做三件事来实现 `ViewModel`：\n\
  \n1.  将生命周期扩展添加到项目的依赖项中，就像我们之前做的那样。返回清单 16-1 查看说明。\n2.  为了使 `RandomGenerator` 类成为\
  \ *ViewModel*，我们将扩展来自 AndroidX 生命周期库的 `ViewModel` 类。\n3.  在 `MainActivity` 中，我们将使用\
  \ `ViewModelProviders` 类的工厂方法获取 `RandomNumber` 类的实例，而不是仅仅创建 `RandomNumber` 类的实例。\n\
  \n清单 16-7 展示了 `RandomNumber` 类中的更改；`RandomNumber` 类通过扩展 `ViewModel` 类自动转换为 *ViewModel*\
  \ 对象。\n\n```java\nimport java.util.Random;\nimport androidx.lifecycle.ViewModel;\n\
  public class RandomNumber extends ViewModel {\nprivate String TAG = getClass().getSimpleName();\n\
  int mrandomnumber;\nboolean minitialized = false;\nString getNumber() {\nif(!minitialized)\
  \ {\ncreateRandomNumber();\n}\nLog.i(TAG, \"RETURN Random number\");\nreturn mrandomnumber\
  \ + \"\";\n}\nvoid createRandomNumber() {\nLog.i(TAG, \"CREATE NEW Random number\"\
  );\nRandom random = new Random();\nmrandomnumber = random.nextInt(100);\nminitialized\
  \ = true;\n}\n}\n```\n\n*清单 16-7 RandomNumber 扩展 ViewModel*\n\n该类与其先前版本（如清单 16-4\
  \ 所示）大致相同；唯一的区别是现在它扩展了 *ViewModel*。\n\n现在，让我们在 `MainActivity` 中实现更改；清单 16-8 展示了修改后的\
  \ `MainActivity`，它使用 `ViewModelProviders` 来获取 `RandomNumber` 类的实例——这就是我们的 `ViewModel`\
  \ 对象。\n\n| ❶ | 这是我们需要在 `MainActivity` 中做的唯一更改。我们不再通过直接在 `onCreate()` 方法中创建 `ViewModel`\
  \ 对象（`RandomNumber` 类）的实例来直接管理它，而是让 `ViewModelProviders` 类管理我们 `ViewModel` 对象的范围。\
  \ |\n\n```java\nimport androidx.lifecycle.ViewModelProviders;\nimport android.os.Bundle;\n\
  import android.widget.TextView;\npublic class MainActivity extends AppCompatActivity\
  \ {\n@Override\nprotected void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  setContentView(R.layout.activity_main);\nRandomNumber data;\ndata = ViewModelProviders.of(this).get(RandomNumber.class);\
  \ ❶\n((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());\n}\n}\n\
  ```\n\n*清单 16-8 MainActivity 和 ViewModelProviders*\n\n\n\n## LiveData\n\n回到我们的`RandomNumber`示例，我们有一个应用，每次启动时显示一个随机数。该应用已经使用了`ViewModel`，因此我们不会遇到每次`Activity`被销毁和重建时丢失数据的问题。基本数据流如图\
  \ 16-2 所示。\n\n![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig2_HTML.jpg](img/457413_2_En_16_Fig2_HTML.jpg)\n\
  \n**图 16-2** RandomNumber 示例的数据流\n\n但是，如果你需要获取另一个数字呢？为此，我们可以在`MainActivity`中添加一个触发机制（比如一个`Button`），然后它会调用`ViewModel`上的`getNumber()`——但我们如何在`MainActivity`中刷新`TextView`呢？已经有几种方法可以实现这一点，你可能已经遇到过它们。一种促进`ViewModel`和`Activity`之间数据交换的方法是巧妙使用接口（但我们不在这里讨论），或者使用像`Otto`这样的`EventBus`（我们也不在这里讨论）——但现在，幸运的是，由于架构组件，我们可以使用`LiveData`。新的数据流如图\
  \ 16-3 所示。\n\n| ❶ | 用户点击**FETCH**按钮，该按钮调用`getNumber()`函数；实际上，我们将首先调用`createNumber()`，然后调用`getNumber()`。这样，我们获取一个新的随机数。有更优雅的方法来实现这一点，但这是最快的方式，请耐心等待。\
  \ |\n| ❷ | 我们的`ViewModel`对象获取一个新的随机数。这不再是一个简单的`String`；我们将把它改为`MutableLiveData`，使其变得*可观察*。\
  \ |\n| ❸ | 在`MainActivity`中，我们将从`ViewModel`对象获取`LiveData`实例，并编写一些代码来*观察*它；接下来，我们只需对`LiveData`的变化做出反应。\
  \ |\n\n![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig3_HTML.jpg](img/457413_2_En_16_Fig3_HTML.jpg)\n\
  \n**图 16-3** 使用 LiveData 的 RandomNumber 示例\n\n让我们看看它在代码中如何工作。列表 16-9 和 16-10 分别显示了我们的`ViewModel`和`MainActivity`的代码。\n\
  \n| ❶ | `mrandomnumber`的值是我们返回给`MainActivity`的内容。我们希望它是一个*可观察*的对象。为此，我们将其类型从`int`更改为`MutableLiveData`。\
  \ |\n| ❷ | 我们也必须在这里进行类型更改，因为`mrandomnumber`现在是`MutableLiveData`；此函数必须返回`MutableLiveData`。\
  \ |\n| ❸ | 要设置`MutableLiveData`的值，请使用`setValue()`方法。 |\n\n```\nimport androidx.lifecycle.MutableLiveData;\n\
  import androidx.lifecycle.ViewModel;\npublic class RNModel extends ViewModel {\n\
  private String TAG = getClass().getSimpleName();\nMutableLiveData mrandomnumber\
  \ = new MutableLiveData(); ❶\nboolean minitialized = false;\nMutableLiveData getNumber()\
  \ { ❷\nif(!minitialized) {\ncreateRandomNumber();\n}\nLog.i(TAG, \"RETURN Random\
  \ number\");\nreturn mrandomnumber;\n}\nvoid createRandomNumber() {\nLog.i(TAG,\
  \ \"CREATE NEW Random number\");\nRandom random = new Random();\nmrandomnumber.setValue(random.nextInt(100)\
  \ + \"\"); ❸\nminitialized = true;\n}\n}\n```\n\n**列表 16-9** 带 LiveData 的 ViewModel\n\
  \n现在我们可以继续看`MainActivity`中的更改。列表 16-10 显示了`MainActivity`的修改和注释代码。\n\n| ❶ | 让我们从`ViewModel`中获取随机数。随机数不再是`String`类型；它是`MutableLiveData`。\
  \ |\n| ❷ | 这是按钮点击的样板代码。我们需要这个触发器来从`ViewModel`中获取随机数。 |\n| ❸ | 要*观察*一个`LiveData`，我们调用`observe()`方法；该方法接受两个参数。第一个参数是生命周期所有者（`MainActivity`，所以我们传递`this`）；第二个参数是一个`Observer`对象。我们在这里使用匿名类来创建`Observer`对象。\
  \ |\n| ❹ | 每次`ViewModel`中随机数（`mrandomnumber`）的值发生变化时，都会调用此`onChanged()`方法；所以，当它变化时，我们相应地设置`TextView`的值。\
  \ |\n\n```\nimport androidx.appcompat.app.AppCompatActivity;\nimport androidx.lifecycle.MutableLiveData;\n\
  import androidx.lifecycle.Observer;\nimport androidx.lifecycle.ViewModelProviders;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
  import android.widget.TextView;\npublic class MainActivity extends AppCompatActivity\
  \ {\n@Override\nprotected void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  setContentView(R.layout.activity_main);\nfinal RNModel data;\ndata = ViewModelProviders.of(this).get(RNModel.class);\n\
  final TextView txtnumber = (TextView) findViewById(R.id.txtrandom);\nMutableLiveData\
  \ mnumber = data.getNumber(); ❶\nButton btn = (Button) findViewById(R.id.button);\
  \  ❷\nbtn.setOnClickListener(new View.OnClickListener() {\n@Override\npublic void\
  \ onClick(View v) {\ndata.createRandomNumber();\ndata.getNumber();\n}\n});\nmnumber.observe(this,\
  \ new Observer() { ❸\n@Override\npublic void onChanged(String val) { ❹\ntxtnumber.setText(val);\n\
  }\n});\n}\n}\n```\n\n**列表 16-10** MainActivity\n\n很酷，对吧？如果你仍然不相信使用`LiveData`，这里有几件事需要考虑。当你使用`LiveData`时：\n\
  \n*   你确信 UI**始终匹配数据**状态。你已经从示例中看到了这一点。`LiveData`遵循观察者模式；当其值发生变化时，它会通知观察者。\n*  \
  \ **没有内存泄漏**。观察者绑定到生命周期对象。例如，如果我们的`MainActivity`进入暂停状态（无论出于何种原因，也许另一个`Activity`位于前台），`LiveData`将不会被观察；如果`MainActivity`被销毁，`LiveData`同样不会被观察，并且它会自行清理——这也意味着我们不需要手动处理`MainActivity`和`ViewModel`的生命周期。\n\
  \n\n\n## Room\n\n如果你希望为应用添加数据库功能，`Room` 值得考虑。在 `Room` 出现之前，构建数据库应用的主流方式有两种：使用 `Realm`\
  \ 或直接用传统的 `SQLite`。处理 `SQLite` 被认为是比较底层的操作，过于贴近硬件，因此使用起来有些繁琐。`Realm` 在开发者中相当流行，但无论多受欢迎，它毕竟不是官方第一方解决方案。值得庆幸的是，我们现在有了\
  \ `Room`。\n\n`Room` 是在 `SQLite` 基础上的一层抽象；如果你曾使用过类似 `Hibernate` 这样的 ORM（对象关系映射），那么它与这是相似的。与直接使用原生\
  \ `SQLite` 相比，`Room` 拥有多项优势；使用 `Room`：\n\n- 你无需为基本的数据库操作编写原始查询。\n- 它在编译时验证 SQL 查询，因此你无需担心\
  \ SQL 注入——还记得这些吗？\n- 数据库对象与 Java 对象之间不存在阻抗不匹配问题。`Room` 会处理这一切；你只需与 Java 对象打交道即可。\n\
  \n`Room` 包含三个主要组件：`Entity`（实体）、`Dao`（数据访问对象）和 `Database`（数据库）组件。它们与应用之间的关系如图 16-4\
  \ 所示。\n\n![../images/457413_2_En_16_Chapter/457413_2_En_16_Fig4_HTML.jpg](img/457413_2_En_16_Fig4_HTML.jpg)\n\
  \n**图 16-4** Room 组件\n\n- **Entity**——`Entity` 用于表示数据库表。你将其编写为一个由 `@Entity` 注解修饰的类。\n\
  - **Dao** 或数据访问对象是一个包含用于访问数据库中表的方法的类。这是你编写 CRUD（创建、读取、更新、删除）操作的地方。这是一个由 `@Dao` 注解修饰的*接口*。\n\
  - **Database**——此组件持有对数据库的引用。这是一个由 `@Database` 注解修饰的抽象类。\n\n在项目中使用 `Room` 之前，你需要向\
  \ `build.gradle` 文件（模块级别）添加其依赖项，如代码清单 16-11 所示。\n\n```\ndependencies {\ndef room_version\
  \ = \"2.1.0-alpha07\"\nimplementation \"androidx.room:room-runtime:$room_version\"\
  \nannotationProcessor \"androidx.room:room-compiler:$room_version\"\n. . .\n}\n\
  ```\n\n**代码清单 16-11** Room 依赖项\n\n代码清单 16-12、16-13、16-14 和 16-15 展示了四个演示 `Room`\
  \ 基本用法的 Java 源文件。\n\n| ❶ | `@Entity` 注解使其成为一个 `Entity`。如果不传入 `tableName` 参数，表名将默认使用被修饰的类名。仅当你希望表名与修饰的类名不同时，才需要传入此参数。所以，我在这里写的内容是多余且冗余的，因为我将\
  \ `tableName` 的值设置为“person”，这与被修饰的类名相同。 |\n| ❷ | 我们将 `uid` 成员变量设为主键；同时声明它不能为空。 |\n\
  | ❸ | 类的成员变量将自动成为表中的字段。除非使用 `@ColumnInfo` 注解，否则表上的列名将沿用成员变量的名称。如果你希望表字段（列）的名称与成员变量名称不同，请像这里展示的那样使用\
  \ `@ColumnInfo` 修饰，并将 `name` 设置为你偏好的列名。 |\n\n```\nimport androidx.annotation.NonNull;\n\
  import androidx.room.Entity;\nimport androidx.room.PrimaryKey;\n@Entity(tableName\
  \ = \"person\") ❶\npublic class Person {\n@PrimaryKey(autoGenerate = true) ❷\n@NonNull\
  \ public int uid;\n@ColumnInfo(name=\"last_name\") ❸\npublic String last_name;\n\
  public String first_name;\npublic Person(String lname, String fname) {\nlast_name\
  \ = lname;\nfirst_name = fname;\n}\npublic Person() {}\n}\n```\n\n**代码清单 16-12**\
  \ Person 类，实体\n\n| ❶ | DAO 需要通过 `@Dao` 修饰符进行注解。 |\n| ❷ | DAO 必须以接口形式编写。 |\n| ❸ |\
  \ 使用 `@Insert` 修饰符来指示被修饰的方法将用于向表中插入记录。类似地，你将分别使用 `@Update`、`@Query` 和 `@Delete`\
  \ 来修饰用于更新、查询和删除的方法。 |\n| ❹ | 使用 `@Query` 来编写 SQL select 语句。每个 `@Query` 在编译时都会得到验证；如果查询有问题，会发生编译错误，而不是运行时错误。这应该能让你安心。\
  \ |\n\n```\nimport java.util.List;\nimport androidx.room.Dao;\nimport androidx.room.Delete;\n\
  import androidx.room.Insert;\nimport androidx.room.Query;\nimport androidx.room.Update;\n\
  @Dao ❶\ninterface PersonDAO { ❷\n@Insert  ❸\nvoid insertPerson(Person person);\n\
  @Update\nvoid updatePerson(Person person);\n@Delete\nvoid deletePerson(Person person);\n\
  @Query(\"SELECT * FROM person\") ❹\npublic List listPeople();\n}\n```\n\n**代码清单\
  \ 16-13** PersonDAO，数据访问对象\n\n| ❶ | 使用 `@Database` 来表示此类是数据库持有者。使用 `entities` 参数来指定数据库中的\
  \ Entities。如果有多个 Entity，请使用逗号分隔列表。第二个参数是 `version`；这是一个整数值，用于指定你的数据库版本。 |\n| ❷ |\
  \ Database 类是*抽象的*，并扩展了 `RoomDatabase`。 |\n| ❸ | 你需要提供一个抽象方法，该方法将返回一个 DAO 对象的实例。\
  \ |\n| ❹ | 你需要提供一个静态方法来获取 Database 的实例。它不必像我们这里所做的那样是单例，但我设想你不希望有多个 Database 类的实例。\
  \ |\n| ❺ | 使用 `databaseBuilder()` 方法来创建 `RoomDatabase` 的实例。构建器方法有三个参数：(1) 应用上下文；(2)\
  \ 由 `@Database` 注解的抽象类；(3) 数据库文件的名称。这将是 `SQLite` 数据库的文件名。 |\n\n```\nimport android.content.Context;\n\
  import androidx.room.Database;\nimport androidx.room.Room;\nimport androidx.room.RoomDatabase;\n\
  @Database(entities = {Person.class}, version = 1) ❶\npublic abstract class AppDatabase\
  \ extends RoomDatabase { ❷\nprivate static AppDatabase minstance;\nprivate static\
  \ final String DB_NAME = \"person_db\";\npublic abstract PersonDAO getPersonDAO();\
  \ ❸\npublic static synchronized AppDatabase getInstance(Context ctx) { ❹\nif(minstance\
  \ == null) {\nminstance = Room.databaseBuilder(ctx.getApplicationContext(), ❺\n\
  AppDatabase.class,\nDB_NAME)\n.fallbackToDestructiveMigration()\n.build();\n}\n\
  return minstance;\n}\n}\n```\n\n**代码清单 16-14** AppDatabase，数据库持有者\n\n现在，我们所有的 `Room`\
  \ 组件都已就位，我们可以从应用中使用它们了。代码清单 16-15 展示了如何从 `Activity` 中使用 `Room` 组件。\n\n| ❶ | 要开始使用\
  \ `RoomDatabase`，请使用我们之前在 `AppDatabase` 中编写的工厂方法获取一个实例。 |\n| ❷ | 让我们从 `TextViews`\
  \ 中收集数据。 |\n| ❸ | `Room` 遵循最佳实践，因此它不允许你在主 UI 线程上运行任何数据库查询。你需要创建一个后台线程，并在其中运行所有 `Room`\
  \ 命令。这里，我使用了快速且粗糙的 `Thread` 和 `Runnable` 对象，但你也可以使用任何其他后台执行方式，例如 `AsyncTask`。 |\n\
  | ❹ | 使用来自 `TextViews` 的输入创建一个 `Person` 对象。 |\n| ❺ | 让我们获取 DAO 的一个实例。 |\n| ❻ | 使用我们之前在\
  \ DAO 中编写的 `insertPerson()` 方法执行一次*插入*操作。 |\n| ❼ | 让我们执行一个 *SELECT*。 |\n| ❽ | 并列出我们\
  \ `person` 表中的所有条目。 |\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项和示例，对给定的英文文本进行翻译。\n\n\n\
  ```java\npublic class MainActivity extends AppCompatActivity {\n    private AppDatabase\
  \ db;\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n\
  \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
  \        Button btn = (Button) findViewById(R.id.button);\n        btn.setOnClickListener(new\
  \ View.OnClickListener() {\n            @Override\n            public void onClick(View\
  \ v) {\n                saveData();\n                System.out.println(\"Clicked\"\
  );\n            }\n        });\n        db = AppDatabase.getInstance(this);  //\
  \ ❶\n    }\n\n    private void saveData() {\n        final String mlastname = ((TextView)\
  \ findViewById(R.id.txtlastname)).getText().toString();\n        final String mfirstname\
  \ = ((TextView) findViewById(R.id.txtfirstname)).getText().toString(); // ❷\n  \
  \      new Thread(new Runnable() { // ❸\n            @Override\n            public\
  \ void run() {\n                Person person = new Person(mlastname, mfirstname);\
  \ // ❹\n                PersonDAO dao = db.getPersonDAO(); // ❺\n              \
  \  dao.insertPerson(person); // ❻\n                List people = dao.listPeople();\
  \ // ❼\n                for(Person p:people) { // ❽\n                    System.out.printf(\"\
  %s , %s\\n\", p.last_name, p.first_name );\n                }\n            }\n \
  \       }).start();\n    }\n}\n```\n\n在实际应用中，您可能不会在像 Activity 这样的 UI 控制器中直接访问数据库；您可能希望将其放入\
  \ ViewModel 类中。这样，UI 控制器的职责就仅限于展示数据，而不是充当数据模型。\n\n如果您将 Room 与 `ViewModel` 和 `LiveData`\
  \ 结合使用，它可以提供响应更快的 UI 体验。我在这里没有涉及，但学完本章后，这是值得尝试的极佳练习。\n\n## 总结\n\n*   `AppCompatActivity`\
  \ 对象现在是生命周期所有者。您可以编写另一个类来监听生命周期所有者的生命周期变化，并做出相应的反应；`Fragment` 也是生命周期所有者——在使用生命周期感知组件时，别忘了在您的项目中使用\
  \ `AndroidX artifacts`。\n\n*   `ViewModel` 使您的 UI 数据能够抵御 UI 控制器（如 `Activity` 和 `Fragment`）的销毁和重建。\n\
  \n*   `LiveData` 使您的 UI 对象和模型数据之间的关系变为双向。一方的变化会自动反映在另一方。\n\n*   Room 是用于 `SQLite`\
  \ 的 ORM。它是一个官方解决方案，也是架构组件的一部分——我们几乎没有什么理由不使用它。\n\n"
- '# 17. 发布应用


  *本章将涵盖：*


  *   发布前的准备

  *   为应用签名

  *   Google Play

  *   App bundle


  您可以相当自由且不受太多限制地分发您的应用；您可以让用户从您的网站、Google Drive、Dropbox 等渠道下载。如果您愿意，甚至可以直接通过电子邮件将应用发送给用户；但许多开发者选择在
  Google 或 Amazon 等市场上发布应用，以最大限度地扩大覆盖面。将应用发布在可信的数字市场上的另一个原因是，这些市场是值得信赖的。当应用不是从可信来源下载时，它不能立即使用；用户会收到一个通知，提示该应用并非来自可信来源。


  在本章中，我们将讨论将您的应用发布到 Google Play 所需完成的工作。


  ## 准备发布应用


  在向公众发布应用时，您需要注意以下几件事：


  1.  准备发布所需的材料和素材

  2.  配置应用以进行发布

  3.  构建一个可以发布的应用


  ### 准备发布材料和素材


  您的代码很优秀，您甚至可能认为它很巧妙，但用户永远看不到。用户看到的是您的 `View` 对象、图标和其他图形素材。您应该完善它们。


  如果您认为应用的图标无关紧要，那可能是个错误。图标有助于用户在主页屏幕上识别您的应用。这个图标还会出现在启动器窗口和下载区域等其他位置，更重要的是，它会出现在发布应用的商店中。在为用户建立对应用的第一印象时，应用图标起着很大的作用。在此方面投入一些精力并阅读
  Google 关于图标的指南是个好主意；您可以访问 [`http://bit.ly/androidreleaseiconguidelines`](http://bit.ly/androidreleaseiconguidelines)
  了解相关信息。顺便，也请访问 [`https://romannurik.github.io/AndroidAssetStudio/`](https://romannurik.github.io/AndroidAssetStudio/)——在为您的小应用程序生成素材时，这个资源能为您节省大量时间。


  您还需要关注图形素材，如屏幕截图和宣传文案的文本。请务必阅读 Google 关于图形素材的指南；您可以在此处阅读： [`http://bit.ly/androidreleasegraphicassets`](http://bit.ly/androidreleasegraphicassets)。


  ### 配置应用以进行发布


  1.  **检查包名**——应用开始可能只是一个练习或一次性代码，然后它逐渐发展壮大，拥有了自己的生命。您可能需要检查应用的包名。确保它不是仍然为 `com.example.myapp`。包名使应川在
  Google 市场中具有唯一性；一旦您确定了包名，就无法再更改。所以，请三思而后行。您已经知道如何更改它；我们在 Gradle 章节中已经讲过，还记得吗？


  2.  **处理调试信息**——确保清单文件中 `<application>` 标签内的 `android:debuggable` 属性已被移除；您只需要检查一下，因为当您将模式更改为“release”时，Android
  Studio 会自动将其移除。


  3.  **移除 Log 语句**——不同的开发者有不同的做法。有些人会遍历代码并手动（痛苦地）删除语句。有些人会编写 `sed` 或 `awk` 程序来剥离日志语句。有些人会使用
  `ProGuard`，还有其他人会使用像 `Timber` 这样的第三方工具来处理日志记录活动。使用哪种方法由您决定；但请确保您的用户不会意外看到日志信息——如果您还没想好，我强烈建议您尝试一下
  `Timber`。


  4.  **检查应用的权限**——在开发过程中的某个时候，您可能测试了应用的某些功能，并且可能在清单文件中设置了权限，例如使用网络、写入外部存储的权限等。请检查清单文件中的
  `<uses-permission>` 标签，确保没有授予应用不需要的权限。


  5.  **检查远程服务器和 URL**——如果您的应用程序依赖于 Web API 或云服务，请确保应用的发布版本使用的是生产环境的 URL，而不是测试路径。在开发过程中，您可能获得了沙盒环境和测试
  URL；您需要将它们切换为生产版本。




  ### 构建一个可供发布的应用程序


  在开发过程中，`Android Studio` 为你处理了不少事务；它负责：


  1.  创建调试证书

  2.  将所有项目资产、配置文件和运行时二进制文件组装成一个 `APK`

  3.  使用调试证书为 `APK` 签名

  4.  将 `APK` 部署到模拟器或连接的设备上


  所有这些操作都在后台完成；你只需编写代码，无需操劳其他事情。而现在，你需要亲自处理这个证书了。`Google Play` 及其他类似的应用市场不会分发使用调试证书签名的应用。这需要一个正式的证书。你无需像
  `Thawte` 或 `Verisign` 这样的证书颁发机构；一个自签名证书就足够了。


  在接下来的步骤中，我们将生成一个签名的软件包或 `APK`。你已经知道 `APK` 是什么——它是包含你应用程序的包，也是你要上传到 `Google Play`
  的文件。而软件包（Bundle）则与 `APK` 非常相似，但它是一种较新的上传格式。与 `APK` 一样，它也包含你应用程序的所有编译代码和资源，但它推迟了
  `APK` 的生成。这是一种名为 `Dynamic Delivery` 的新型应用服务模型。它利用你的应用程序包，为每个用户的设备配置生成并提供优化的 `APK`——这样用户只需下载运行应用所需的代码和资源。你不再需要构建、签名和管理多个
  `APK`。


  在 `Android Studio` 中，生成 `APK` 和软件包的步骤几乎相同。在接下来的步骤中，我们将演示如何生成软件包和 `APK`。


  启动 `Android Studio`（如果尚未打开）。打开项目，然后从主菜单栏导航到 **构建(Build)** ➤ **生成签名软件包或 APK(Generate
  Signed Bundle or APK)**，如图 17-1 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig1_HTML.jpg](img/457413_2_En_17_Fig1_HTML.jpg)


  图 17-1 生成签名的 APK


  选择 **软件包(Bundle)** 或 **APK**，然后点击 **下一步(Next)**；在此示例中，我选择创建一个软件包。点击 **下一步(Next)**
  后，你将看到“密钥库(Keystore)”对话框，如图 17-2 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig2_HTML.jpg](img/457413_2_En_17_Fig2_HTML.jpg)


  图 17-2 密钥库对话框


  **密钥库路径(Key store path)** 询问的是你的 Java 密钥库 (`JKS`) 文件位置。此时，你还没有这个文件。因此，请点击 **创建新密钥库(Create
  New)**。你将看到用于创建新密钥库的对话框窗口，如图 17-3 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig3_HTML.jpg](img/457413_2_En_17_Fig3_HTML.jpg)


  图 17-3 新密钥库


  表 17-1 展示了密钥库输入项的说明。


  表 17-1 密钥库项目与说明


  | 密钥库项目 | 说明 |

  | --- | --- |

  | `密钥库路径(Keystore path)` | 你希望存储密钥库的位置。这完全由你决定。请务必记住此位置 |

  | `密码(Password)` | 这是密钥库的密码；不要丢失，并确保记住它——否则，你需要创建另一个密钥库文件 |

  | `别名(Alias)` | 此别名用于标识密钥。它只是一个友好的名称 |

  | `(密钥)密码((Key) Password)` | 这是密钥的密码。这与密钥库的密码**不同**（但如果你愿意，也可以使用相同的密码） |

  | `有效期(年)(Validity, in years)` | 默认是 25 年；你可以接受默认值。如果你在 `Google Play` 上发布，证书必须在
  2033 年 10 月之前有效——所以 25 年应该没问题 |

  | `其他信息(Other information)` | 只有姓名(First and Last name)字段是必填的 |


  填写完**新密钥库(New Key Store)**对话框后，点击 **确定(OK)**。这将使你返回到**生成签名软件包或 APK(Generate Signed
  Bundle or APK)** 窗口，如图 17-4 所示；但现在，`JKS` 文件已创建，并且**密钥库(Keystore)** 对话框中已填充了该文件。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig4_HTML.jpg](img/457413_2_En_17_Fig4_HTML.jpg)


  图 17-4 填充后的“生成签名软件包或 APK”窗口


  点击 **下一步(Next)**。现在我们选择签名软件包的目标位置，如图 17-5 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig5_HTML.jpg](img/457413_2_En_17_Fig5_HTML.jpg)


  图 17-5 签名的 APK，APK 目标文件夹


  你需要记住“目标文件夹(Destination Folder)”的位置，如图 17-5 所示。这是 `Android Studio` 将存储签名软件包的地方。同时，请确保
  **构建类型(Build type)** 设置为“release”。


  当你点击 **完成(Finish)** 时，`Android Studio` 将为你的应用生成签名的软件包。这就是你将提交给 `Google Play` 的文件。


  ## 发布应用


  在你可以向 `Google Play` 提交应用之前，你需要一个开发者账户。如果你还没有账户，可以在 [`https://developer.android.com`](https://developer.android.com)
  注册。对于接下来的操作，我需要做一些假设。我假设：


  1.  你已经拥有一个 Google 账户 (`Gmail`)。

  2.  你正在使用 `Google Chrome` 访问 [`https://developer.android.com`](https://developer.android.com)。

  3.  你的 Google 账户已登录到 `Chrome`。


  如果你的 Google 账户未登录 `Chrome`，你可能会看到类似图 17-6 的提示。`Chrome` 会要求你选择一个账户（或创建一个账户）。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig6_HTML.jpg](img/457413_2_En_17_Fig6_HTML.jpg)


  图 17-6 选择一个账户


  当你处理好 Google 账户后，你将被带到 [`https://developer.android.com`](https://developer.android.com)
  网站，如图 17-7 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig7_HTML.jpg](img/457413_2_En_17_Fig7_HTML.jpg)


  图 17-7 Android 开发者网站


  点击 **Google Play**，如图 17-7 所示。


  点击 **启动 Play 管理中心(Launch Play Console)**，如图 17-8 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig8_HTML.jpg](img/457413_2_En_17_Fig8_HTML.jpg)


  图 17-8 启动 Play 管理中心


  你需要完成四个步骤来完成注册（如图 17-9 所示）：


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig9_HTML.jpg](img/457413_2_En_17_Fig9_HTML.jpg)


  图 17-9 Google Play 管理中心，注册


  1.  使用你的 Google 账户登录。

  2.  接受开发者协议。

  3.  支付注册费。

  4.  完善你的账户详细信息。


  完成注册和一次性付费后，你将可以访问 `Google Play 管理中心`，如图 17-10 所示。


  ![../images/457413_2_En_17_Chapter/457413_2_En_17_Fig10_HTML.jpg](img/457413_2_En_17_Fig10_HTML.jpg)


  图 17-10 Google Play 管理中心


  在这里，你可以开始将应用提交到商店的流程。点击“创建应用(Create Application)”按钮开始操作。




  ### 摘要


  - 在用户能够体验您的应用之前，他们会首先看到图标和其他图形资源——请确保这些图形资源与您的代码一样精致。

  - 在构建发布版本之前，请从代码中移除所有调试信息和日志语句。

  - 对自己的代码进行审查。如果有朋友或其他人能与您一同审查代码，效果会更好。如果您的应用使用了服务器、`RESTful URL` 等，请确保它们已准备好用于生产环境，而非沙箱。

  - 在将应用上传到 `Google Play` 之前，您需要使用正确的证书对应用进行签名。

  - 如果您想在 `Google Play` 上销售应用，则需要一个 `Google Play` 账户。我支付了一次性费用 `25 USD`，但那是几年前的事了。

  - 不要忘记在真实设备上测试您的应用。


