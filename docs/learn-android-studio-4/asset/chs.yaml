  图 2-3


  SDK 工具


  通常您不需要更改此窗口上的任何内容，但检查一下是否有如下列表中标记为“Installed”（已安装）的工具也无妨：


  * Android SDK Build Tools

  * Android SDK Platform Tools

  * Android SDK Tools

  * Android Emulator

  * Support Repository

  * HAXM Installer


  注意


  如果您使用的是 Linux 平台，即使有 Intel 处理器也无法使用 HAXM。在 Linux 中将使用 KVM 代替 HAXM。


  一旦对选择满意，点击“OK”（确定）按钮开始下载这些包。


  ### 硬件加速


  在创建应用程序时，有时为了获得即时反馈并检查其是否按预期运行或是否能够运行，进行测试和运行会很有用。为此，您将使用物理设备或虚拟设备。每种选择都有其优缺点，您不必只选其一；事实上，最终您将需要使用这两种选择。


  Android 虚拟设备（AVD）是一个可以运行应用的模拟器。在模拟器上运行有时可能会很慢；这就是 Google 和 Intel 推出 HAXM 的原因。它是一个模拟器加速工具，能让测试应用的过程稍微好受一些。这对开发者来说绝对是个福音。前提是您使用的机器拥有支持虚拟化的
  Intel 处理器，并且您不在 Linux 上。但如果您不幸不属于这部分用户，也别担心，在 Linux 中也有办法实现模拟器加速，我们稍后会看到。


  macOS 用户可能最轻松，因为 HAXM 会随 Android Studio 自动安装。他们无需做任何事即可获得它；安装程序已经为他们处理好了。


  Windows 用户可以通过以下方式获取 HAXM：


  * 从 [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android)
  下载。像安装其他 Windows 软件一样安装它，双击并按照提示操作。

  * 或者，您可以通过 SDK 管理器获取 HAXM；这是推荐的方法。


  对于 Linux 用户，推荐的软件是 KVM。KVM（基于内核的虚拟机）是 Linux 的虚拟化解决方案。它包含虚拟化扩展（Intel VT 或 AMD-V）。


  要获取 KVM，我们需要从软件仓库中获取一些软件；但在此之前，您需要先执行以下操作：


  1.  确保在 BIOS 或 UEFI 设置中启用了虚拟化。请查阅您的硬件手册以了解如何进入这些设置。这通常涉及关闭电脑、重新启动，并在听到系统扬声器提示音时立即按下中断键，如
  `F2` 或 `DEL`，但正如我所说，请查阅您的硬件手册。


  2.  完成更改并重新启动到 Linux 后，确定您的系统是否可以运行虚拟化。这可以通过在终端中运行以下命令来完成：`egrep –c ''(vmx|svm)''
  /proc/cpuinfo`。如果结果是一个大于零的数字，则表示您可以继续进行安装。


  要安装 KVM，请在终端窗口中输入代码清单 2-1 中所示的命令。


  ```

  sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

  sudo adduser your_user_name kvm

  sudo adduser your_user_name libvirtd

  代码清单 2-1

  安装 KVM 的命令

  ```


  您可能需要重新启动系统以完成安装。


  希望一切顺利，您现在拥有了合适的开发环境。在下一章中，我们将熟悉 Android Studio IDE 的各个部分。


  ## 总结


  * Android Studio 基于 IntelliJ 社区版开发。如果您以前使用过 IntelliJ，您学过的所有技巧和键盘快捷键都可以在 Android
  Studio 中使用。

  * 您可以同时使用不同版本的 Android Studio；您无需卸载旧版本的 Android Studio 即可试用预览版。

  * 如果可以，请安装硬件加速器（HAXM）；它将使您的测试活动更加愉快。如果您使用 Linux，请使用基于内核的虚拟机（KVM）代替 HAXM。


