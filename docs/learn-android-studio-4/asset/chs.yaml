  图 11-1：应用布局\n\n打开`activity_main.xml`进行编辑，并将其修改为与清单 11-9 一致。\n\n```\nListing 11-9\n\
  activity_main.xml\n```\n\n接下来处理清单文件。在调用 GitHub API 时需要访问互联网，因此需要在`AndroidManifest`文件中声明该权限。在清单中插入`INTERNET`使用权限，如清单\
