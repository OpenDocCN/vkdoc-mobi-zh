    of other operations. As an example, the following statement pauses the current
    thread for 5 seconds.


    ```

    [NSThread sleepForTimeInterval:5.0];

    ```


    Thread Synchronization


    If you decide to use threads for concurrent programming, the Objective-C platform
    provides several mechanisms to manage shared state and perform synchronization
    between threads. Specifically, the Foundation Framework includes a set of lock
    and condition variable APIs that provide object-oriented implementations of these
    mechanisms, as you will see next.


    Locks


    The Foundation Framework includes several classes (`NSLock`, `NSRecursiveLock`,
    `NSConditionLock`, `NSDistributedLock`) that implement various types of locks
    for synchronizing access to shared state. A lock is used to protect a *critical
    section*, that is, a section of code that accesses shared data or a resource,
    which must not be concurrently executed by multiple threads.


    `NSLock` implements a basic mutual exclusion (mutex) lock for concurrent programming.
    It conforms to the `NSLocking` protocol and thus implements the `lock` and `unlock`
    methods to acquire and release a lock accordingly. Earlier in this chapter, you
    learned about the `@synchronized` primitive, an Objective-C language feature that
    implements a mutex lock comparable to `NSLock`. Key differences between the two
    is that 1) the `@synchronized` directive implicitly creates the lock, whereas
    the `NSLock` API directly creates the lock, and 2) the `@synchronized` directive
    implicitly provides an exception handler for the critical section, whereas the
    `NSLock` class does not provide this functionality. [Listing 17-8](#9781430250500_Ch17.xhtml#list8)
    illustrates use of the `NSLock` APIs to protect a critical section.


    [*Listing 17-8.*](#9781430250500_Ch17.xhtml#_list8)  Using an NSLock Instance
    to Protect a Critical Section


    ```

    NSLock *computeLock = [NSLock new];

    ...

    [computeLock lock];

    // Critical section code

    ...

    [computeLock unlock];

    ```


    The `NSDistributedLock` class defines a lock that can be used by multiple applications
    on multiple hosts to control access to a shared resource. Unlike the `NSLock`
    class, an `NSDistributedLock` instance doesn’t enforce mutual exclusion, but rather
    it reports when the lock is busy and it is up to the code using the lock to proceed
    appropriately based on the lock status. [Listing 17-9](#9781430250500_Ch17.xhtml#list9)
    creates a distributed lock using the path of a file (named `/hello.lck`) that
    you would like to use as the locking system object.


    [*Listing 17-9.*](#9781430250500_Ch17.xhtml#_list9)  Using an NSDistributedLock
    Instance to Control Access to a Resource


    ```

    NSDistributedLock *fileLock = [NSDistributedLock lockWithPath:@"/hello.lck"];

    // Access resource

    ...

    ...

    // Unlock resource

    [fileLock unlock];

    ```


    The `NSDistributedLock` does not conform to the `NSLocking` protocol. Also, because
    this lock is implemented using the file system, the lock must be released explicitly.
    If an application terminates while holding a distributed lock, other clients must
    use the NSDistributedLock `breakLock` method to break a lock in this scenario.


    The `NSConditionLock` class defines a mutex lock that can be acquired and released
    only under certain conditions, where the condition is an integer value that you
    define. Condition locks are normally used to ensure that tasks are performed in
    a specific order; for example, in a producer-consumer flow between threads. [Listing
    17-10](#9781430250500_Ch17.xhtml#list10) creates a conditional lock that is used
    to acquire a lock when a specified condition occurs.


    [*Listing 17-10.*](#9781430250500_Ch17.xhtml#_list10)  Using an NSConditionLock
    Instance to Control Access to a Resource


    ```

    NSConditionLock *datalock = [[NSConditionLock alloc] initWithCondition:NO];

    ...

    // Acquire lock - no data in buffer

    [dataLock lock];

    // Add data to buffer

    ...

    // Unlock with condition - data in buffer

    [dataLock unlockWithCondition:YES];

    ```


    The `NSRecursiveLock` class defines a lock that can be acquired multiple times
    by the same thread without causing deadlock. It keeps track of how many times
    it was acquired and must be balanced by corresponding calls to unlock the object
    before the lock is released.


    Conditions


    Condition variables are a type of lock that can be used to synchronize the order
    in which operations proceed. In contrast to a lock, a thread trying to acquire
    a condition remains blocked until that condition is explicitly signaled by another
    thread. In addition, a thread waiting on a condition remains blocked until that
    condition is explicitly signaled by another thread. In effect, condition variables
    allow threads to synchronize based upon the actual value of data.


    The Foundation Framework `NSCondition` class implements a condition variable.
    The logic for using a condition object is as follows:


    1.  Lock the condition object and check its corresponding `BOOL` conditional expression.

    2.  If the conditional expression evaluates to `YES`, perform associated task
    and then go to step 4.

    3.  If the conditional expression evaluates to `NO`, block the thread using the
    condition object’s `wait` or `waitUntilDate:` methods, then retest (step 2).

    4.  Optionally, signal the condition object again using its `signal` or `broadcast`
    methods, or change the value of the conditional expression.

    5.  Unlock the condition object.


    [Listing 17-11](#9781430250500_Ch17.xhtml#list11) provides the template for an
    entry-point routine that uses an `NSCondition` object named `condition` to consume
    and process data.


    [*Listing 17-11.*](#9781430250500_Ch17.xhtml#_list11)  Using an NSCondition Instance
    to Synchronize Consumer Operations on Shared Data


    ```

    - (void)consumerTask

    {

      @autoreleasepool

      {

        // Acquire lock for condition and test boolean condition

        [condition lock];

        while (!self.dataAvailable)

        {

          [condition wait];

        }


    // Data available, now process it (code not provided here)

        ...


    // Finished processing, update predicate value and signal condition

        self.dataAvailable = NO;

        [condition signal];


    // Unlock condition

        [condition unlock];

      }

    }

    ```


    The corresponding entry-point routine that produces data for processing by the
    `consumerTask` method is shown in [Listing 17-12](#9781430250500_Ch17.xhtml#list12).


    [*Listing 17-12.*](#9781430250500_Ch17.xhtml#_list12)  Using an NSCondition Instance
    to Synchronize Producer Operations on Shared Data


    ```

    - (void)producerTask

    {

      @autoreleasepool

      {

        // Acquire lock for condition and test boolean condition

        [condition lock];

        while (self.dataAvailable)

        {

          [condition wait];

        }


    // Retrieve data for processing (code not provided here)

        ....


    // Finished retrieving data, update predicate value and signal condition

        self.dataAvailable = YES;

        [condition signal];'
