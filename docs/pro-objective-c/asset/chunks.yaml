    KVO Design and Implementation


    Key-value observing is implemented through the power of the Objective-C runtime.
    When you register an observer on an object, the KVO infrastructure dynamically
    creates a new subclass of the object’s original class. It then adjusts the `isa`
    pointer of the object to point to the subclass; thus messages to the original
    class will actually be sent to the subclass. You may recall from [Chapter 8](#9781430250500_Ch08.xhtml)
    that the `isa` pointer points to the object’s class and this class maintains a
    dispatch table with pointers to the methods the class implements. The new subclass
    implements the KVO infrastructure. It intercepts messages to the object and inspects
    them for those matching certain patterns (such as the getters, setters, and collection
    access), posting notifications to observers, and so forth. This technique of dynamically
    swapping out the class that the `isa` pointer points to is called `isa-swizzling`.


    Using Key-Value Programming


