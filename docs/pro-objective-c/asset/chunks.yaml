    project, notice how it significantly reduced the amount of code you had to write.
    As your projects grow in size and complexity, the advantages of ARC become even
    more pronounced. Because ARC can be selected on a file-by-file basis and ARC-compiled
    code can be used alongside existing code built using MRR, there’s no reason not
    to use it on your projects. In fact, ARC is the Apple-recommended mechanism for
    memory management on new Objective-C projects.


    ## Avoiding Circular References


    The Objective-C reference counting model is implemented by taking ownership interest
    in an object (via a `retain` message), and then releasing ownership interest (via
    a `release` message) when that object is no longer needed. This process is automated
    with ARC, which automatically inserts `retain`/`release`/`autorelease` messages
    in the code where needed. However, in an object graph, a problem of circular references
    can arise if two objects in the graph have circular references. For example, in
    the preceding ARC Orders project, an `OrderEntry` object has an `OrderItem` instance
    variable, which is by default a strong reference. Now if an `OrderItem` object
    also had an `OrderItem` instance variable, this could create a circular reference
    between the two objects. If this were to occur, neither object could ever be deallocated,
    therefore causing a memory leak. In effect, the `OrderEntry` object could not
    be released until the `OrderItem` object is released, and the `OrderItem` object
    couldn’t be released until the `OrderEntry` object is released. The solution to
    this problem is to use weak references. A weak reference is a *non-owning relationship*;
    that is, the object declared as a weak reference is not owned by the declaring
    object, hence eliminating the circular reference. The Apple Objective-C convention
    for object graphs is for the parent object to maintain a strong reference to each
    of its child objects, while the child objects maintain a weak reference (if necessary)
    to the parent object. Thus, in this example, the `OrderEntry` object would have
    a strong reference to its `OrderItem` object, while the `OrderItem` object would
    have a weak reference to its parent, `OrderEntry` object. A weak reference would
    be declared in the `OrderItem` class (as shown in Listing 4-15).


    ### Listing 4-15 Declaring a Weak Reference


    ```

    #import <Foundation/Foundation.h>


    @interface OrderItem : NSObject


    {

    @public NSString *name;

    OrderEntry *__weak entry;

    }


    - (id) initWithName:(NSString *)itemName;


    @end

    ```


    When destroyed, the `entry` variable is set to `nil`, thereby avoiding a circular
    reference.


    ## Roundup


    This chapter examined the details of Objective-C memory management, including
    the Objective-C memory model, how memory is allocated and released for Objective-C
    programs, and how to use the two methods provided for Objective-C memory management.
    The following are the key takeaways:


    - At runtime, an Objective-C program creates objects (via the `NSObject alloc`
    method) stored in dynamically allocated memory referred to as the program heap.
    Dynamic object creation implies the need for memory management, because objects
    created on the heap never go out of scope. Typical results of incorrect or no
    memory management include memory leaks and dangling pointers.

    - Objective-C memory management is implemented using reference counting, a technique
    whereby unique references to an object are used to determine whether or not an
    object is still in use. If an object’s reference count drops to zero, it is considered
    no longer in use and its memory is deallocated by the runtime system.

    - The Apple Objective-C development environment provides two mechanisms that can
    be used for memory management: Manual Retain-Release (MRR) and Automatic Reference
    Counting (ARC).

    - With MRR, you write your code to explicitly manage the life cycle of objects,
    obtaining an ownership interest in objects that you create/need to use, and releasing
    that ownership interest when you no longer need the object(s).

    - ARC employs the same reference counting model as MRR, but utilizes the compiler
    to manage the object life cycle. At program compilation, the compiler analyzes
    the source code, determines the life cycle requirements for dynamically created
    objects, and then automatically inserts retain and release messages where necessary
    in the compiled code.

    - ARC is augmented with new object lifetime qualifiers that are used to explicitly
    declare the lifetime of object variables and properties, and also includes functionality
    (weak references) that can be used to prevent circular references in object graphs.

    - ARC can be used across a project or on a per-file basis, thereby enabling code
    that uses ARC to still work with existing code that is not ARC-compliant. Apple
    also provides a conversion tool for migrating existing Objective-C code to ARC.
    ARC is the recommended tool for memory management on all new Objective-C projects.


    Memory management is very important for Objective-C software development. It has
    a major impact on the application user experience and the overall system operation.
    A well-written Objective-C program uses only as much memory as it requires, and
    doesn’t leak memory or try to access objects that are no longer in use. You now
    understand the Objective-C memory model and the methods provided for application
    memory management: MRR and ARC (the Apple-recommended approach). In the next chapter,
    you’re going to tackle another key element of the Objective-C platform—the preprocessor.
    And guess what? This means that you’ll be learning a new programming language
    as well! So why not take a break and give yourself a well-deserved rest. When
    you’re ready, turn the page to begin the next chapter.


    # Chapter 5: The Preprocessor


    The Objective-C programming language includes a preprocessor that is used to translate
    source files prior to compilation. Some of the translation is performed automatically,
    and a portion is performed based on the preprocessor language elements that you
    include in your source files. If you look at publicly available Objective-C source
    code, such as Apple’s Objective-C source code for example, you’ll most likely
    observe liberal use of the preprocessor language. So you may be wondering, what
    are the features of the preprocessor and how do you best use this language in
    your programs? Those are the subjects of this chapter, so let’s get started!


    ## Overview


    The general process of source code compilation takes input source files and transforms
    them into output files that can be executed on a target computing platform. The
    Objective-C compiler divides this process into several phases, as shown in Figure
    5-1.


