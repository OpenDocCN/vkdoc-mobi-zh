    Conditional Compilation


    The *conditional compilation* directives (`#if, #elif, #else, #endif, #ifdef,
    #ifndef`) enable you to include or exclude part of the source text if a certain
    condition is met.


    The `#if` directive enables you to test the value of an expression and include/exclude
    a portion of the source text based on the result. The syntax for using this directive
    is shown in [Listing 5-3](#9781430250500_Ch05.xhtml#list3).


    [*Listing 5-3.*](#9781430250500_Ch05.xhtml#_list3)  Syntax for the #if Preprocessor
    Directive


    ```

    #if ArithmeticExpression

    // conditional text (preprocessor or Objective-C source code)

    ...

    #endif

    ```


    An `#if` directive is used to test an arithmetic expression. As shown in [Listing
    5-3](#9781430250500_Ch05.xhtml#list3), it is paired with an `#endif` directive,
    which together enclose conditional text. The arithmetic expression is of integer
    type and may contain the following elements:


    *   Integer and character constants.

    *   Arithmetic operators, bitwise operations, shifts, comparisons, and logical
    operations (as defined in [Appendix A](#9781430250500_AppA.xhtml)).

    *   Preprocessor macros. The macros are expanded before computation of the expression.

    *   Uses of the *defined* operator, which is used to check whether a macro is
    defined.

    *   Identifiers that are not macros, which are all assigned the value zero when
    being evaluated.


    The preprocessor evaluates the expression according to these rules. If the result
    of the evaluation is nonzero, the conditional text (typically source code but
    possibly also other preprocessor directives) is included for compilation or further
    preprocessing; otherwise, it is skipped. Look at the following example:


    ```

    #if INPUT_ARGS <= 0

    #warning "No input arguments defined"

    #endif

    ```


    The preprocessor would process these lines as follows:


    1.  Expand the identifier `INPUT_ARGS`. If identifier is a macro, it is replaced
    with its corresponding value; if it is not a macro or the macro has no value,
    the identifier is replaced with the value zero.

    2.  Calculate the value of the expression. If the value is nonzero (i.e., the
    value of the `INPUT_ARGS` identifier is less than or equal to zero), the text
    between the `#if` directive statement and the `#endif` directive is included (i.e.,
    not filtered by the preprocessor). In this case (due to the `#warning` message),
    it would ultimately cause the compiler to generate a warning message.


    This type of directive is often used to perform conditional compilation of platform-specific
    code for a designated target environment. For example, if you have Objective-C
    code that has customizations for several different compilers, these could be encapsulated
    using `#if` directives and the appropriate compiler-specific identifiers.


    The `#elif` directive stands for “else if”; it augments the `#if` directive by
    enabling you to check for two or more possible conditions. It is placed between
    the `#if` and `#endif` directives; the conditional text following the `#elif`
    directive is processed only if the original `#if` directive (and any preceding
    `#elif` directive(s)) failed. The syntax for the `#elif` directive is shown in
    [Listing 5-4](#9781430250500_Ch05.xhtml#list4).


    [*Listing 5-4.*](#9781430250500_Ch05.xhtml#_list4)  Syntax for the #elif Preprocessor
    Directive


    ```

    #if ArithmeticExpression1

    // Conditional text 1

    ...

    #elif ArithmeticExpression2

    // Conditional text 2

    ...

    #elif ArithmeticExpressionN

    // Conditional text N

    ...

    #endif

    ```


    The preprocessor would process the text of [Listing 5-4](#9781430250500_Ch05.xhtml#list4)
    as follows: if `ArithmeticExpression1` succeeds then `Conditional text 1` is processed;
    else if `ArithmeticExpression2` succeeds then `Conditional text 2` is processed;
    else if `ArithmeticExpressionN` succeeds then `Conditional text N` is processed.
    If multiple conditional expressions within the group of `#if-#elif` would succeed,
    only the first will be processed.


    The `#else` directive augments the `#if` and `#elif` directives by providing a
    mechanism for conditional text to be executed if none of the associated `#if`
    and `#elif` expressions succeed. It is placed between the `#if`, `#elif` (if any
    `#elif` directives provided), and `#elif` directives, as the last directive immediately
    preceding the `#endif`. The syntax for the `#else` directive is shown in [Listing
    5-5](#9781430250500_Ch05.xhtml#list5).


    [*Listing 5-5.*](#9781430250500_Ch05.xhtml#_list5)  Syntax for the #else Preprocessor
    Directive


    ```

    #if ArithmeticExpression1

    // Conditional text 1

    ...

    #elif ArithmeticExpression2

    // Conditional text 2

    ...

    #else

    // Else conditional text

    ...

    #endif

    ```


    The preprocessor would process the `Else conditional text` of [Listing 5-5](#9781430250500_Ch05.xhtml#list5)
