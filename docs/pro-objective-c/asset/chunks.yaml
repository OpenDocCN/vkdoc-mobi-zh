    NSError *error;

    NSString *value = @"San Jose";

    BOOL result = [address validateValue:&value forKey:@"city" error:&error];

    if (result)

    {

      [address setValue:value forKey:@"city"];

    }

    ```


    Key-Value Coding Collection Operators


    Key-value coding includes a set of operators that allow actions to be performed
    on the items of a collection using key path dot notation. The format of the specialized
    key path for the KVC collection operators is


    ```

    collectionKeyPath.@operator.propertyKeyPath

    ```


    This specialized key path is used as a parameter of the `valueForKeyPath:` method
    to perform collection operations. Note that components of this key path are separated
    by a period. The `collectionKeyPath`, if provided, is the key path of the array
    or set (relative to the receiver) on which the operation is performed. The `operator`
    (preceded by an ampersand) is the operation performed on the collection. Finally,
    the `propertyKeyPath` is the key path for the property of the collection that
    the operator uses. There are several types of collection operators: simple collection
    operators that operate on the properties of a collection, object operators that
    provide results when the operator is applied on a single collection instance,
    and collection operators that operate on nested collections and return an array
    or set depending on the operator.


    The best way to illustrate how the collection operators work is by example, so
    that’s what you’ll do here. [Listing 18-11](#9781430250500_Ch18.xhtml#list11)
    declares the interface to an `OrderItem` class that includes several properties.


    [*Listing 18-11.*](#9781430250500_Ch18.xhtml#_list11)  OrderItem Class Interface


    ```

    @interface OrderItem : NSObject


    @property NSString *description;

    @property NSUInteger *quantity;

    @property float *price;


    @end

    ```


    Given a collection of `OrderItem` instances stored in an `NSArray` object named
    `orderItems`, the following expression uses the KVC `valueForKeyPath:` expression
    with the `@sum` collection operator to sum the prices of the items.


    ```

    NSNumber *totalPrice = [orderItems valueForKeyPath:@"@sum.price"];

    ```


    The number of objects in the `orderItems` collection can be determined using the
    `@count` collection operator, as follows:


    ```

    NSNumber *totalItems = [orderItems valueForKeyPath:@"@count"];

    ```


    The number of distinct order items, each with a different description, can be
    obtained by using the `@distinctUnionOfObjects` operator, as follows:


    ```

    NSArray *itemTypes = [orderItems

                          valueForKeyPath:@"@distinctUnionOfObjects.description"];

    ```


    Now let’s look at an example that uses a collection operator on a collection property.
    [Listing 18-12](#9781430250500_Ch18.xhtml#list12) declares the interface to an
    `Order` class with a single property.


    [*Listing 18-12.*](#9781430250500_Ch18.xhtml#_list12)  Order Class Interface


    ```

    @interface Order : NSObject


    @property NSArray *items;


    @end

    ```


    Given an `Order` instance named `order`, the `@count` operator can be used to
    determine the number of objects in the key path collection. In this case, the
    key path consists of the key path to the collection (items), followed by the `@count`
    operator.


    ```

    NSNumber *totalItems = [order valueForKeyPath:@"items.@count"];

    ```


    The preceding examples demonstrate usage of a subset of the available KVC collection
    operators. The Apple Key-Value Programming Guide provides a complete reference
    of the collection operators.


    Key-Value Observing


    Key-value observing (KVO) is a mechanism that enables objects to be notified of
    changes to the properties of other objects. It is essentially an implementation
    of the observer software design pattern, and is implemented in numerous software
    libraries and frameworks. In fact, it is a key component of the model-view-controller
    (MVC) design pattern, a central component of the Cocoa and Cocoa Touch frameworks.
    Key-value observing provides numerous benefits, including the decoupling of observer
    objects from the object being observed (i.e., the subject), framework-level support,
    and a full-featured set of APIs. The following example uses key-value observing
    to register an `Administrator` object as an observer of the `name` property of
    a `Person` instance named `person`.


    ```

    Administrator *admin = [Administrator new];

    [person addObserver:admin

             forKeyPath:@"name"

                options:NSKeyValueObservingOptionNew

                context:NULL];

    ```


    Invoking the `addObserver:forKeyPath:options:context:` method creates a connection
    between the subject and the observer object. When the value of the observed property
    changes, the subject invokes the observer’s `observeValueForKeyPath:ofObject:change:context:`
    method. In this method, an observer class implements logic to handle the property
    change. A subject automatically invokes this method when the value of an observed
    property is changed in a KVO-compliant manner, or the key on which it depends
    is changed. Observers must implement this method for key-value observing to work
    properly. [Listing 18-13](#9781430250500_Ch18.xhtml#list13) provides an example
    implementation of this method for the `Administrator` class.


    [*Listing 18-13.*](#9781430250500_Ch18.xhtml#_list13)  Example Implementation
    of observeValueForKeyPath:ofObject:change:context: Method


    ```

    @implementation Administrator


    ...

    - (void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object

            change:(NSDictionary *)change context:(void *)context

    {

      if ([@"name" isEqual:keyPath])

      {

        // Insert logic to handle update of person''s name

        ....

      }

      // Invoke the superclass''s implementation if it implements this!

      [super observeValueForKeyPath:keyPath

                           ofObject:object

                             change:change

                            context:context];

    }

    ...


    @end

    ```


    The `NSKeyValueObserving` informal protocol defines the API for key-value observing.
    Its methods enable change notification, registering observers, notifying observers
    of changes, and customizing observing. `NSObject` provides the default implementation
    of the `NSKeyValueObserving` protocol, and thus any class that descends from `NSObject`
    has built-in support for key-value observing. In addition, you can further refine
    notifications by disabling automatic observer notifications and implementing manual
    notifications using the methods in this protocol.


    Key-Value Observing or Notifications'
  trans: "\n如上文方法实现所示，该方法返回布尔值 `YES` 或 `NO`。如果对象值无效且无法创建并返回有效值，则返回 `NO`。在此情况下，还会返回一个\
    \ `NSError` 对象（通过双重间接引用），用于指示验证失败的原因。验证方法在以下场景中返回 `YES`：\n\n- 如果输入对象值有效，则返回 `YES`。\n\
    - 如果输入对象值无效，但创建并返回了有效的新对象值，则在将输入值设置为新的有效值后返回 `YES`。\n\n通过调用相应的 `validate<Key>:error:`\
    \ 方法执行属性验证的 KVC 方法声明如下：\n\n```\n- (BOOL)validate<Key>:(id *)value error:(NSError\
    \ **)error;\n```\n\n请注意，键值编码不会自动调用属性验证方法。您的代码必须手动执行属性验证，通常通过直接调用其验证方法或使用 KVC 验证\
    \ API 来完成。列表 18-10 演示了在名为 `address` 的 `Address` 实例上使用键值验证的示例，用于在将值设置到名为 `city`\
    \ 的 `Address` 属性之前对其进行验证。\n\n*列表 18-10.* 使用键值验证\n\n```\nNSError *error;\nNSString\
    \ *value = @\"San Jose\";\nBOOL result = [address validateValue:&value forKey:@\"\
    city\" error:&error];\nif (result)\n{\n  [address setValue:value forKey:@\"city\"\
    ];\n}\n```\n\n## 键值编码集合运算符\n\n键值编码包含一组运算符，允许使用键路径点表示法对集合中的项目执行操作。KVC 集合运算符专用键路径的格式如下：\n\
    \n```\ncollectionKeyPath.@operator.propertyKeyPath\n```\n\n此专用键路径用作 `valueForKeyPath:`\
    \ 方法的参数来执行集合操作。请注意，此键路径的组件由句点分隔。如果提供了 `collectionKeyPath`，则它是执行操作的数组或集合（相对于接收者）的键路径。`operator`（前面带有\
    \ `@` 符号）是对集合执行的操作。最后，`propertyKeyPath` 是运算符所使用的集合属性的键路径。集合运算符分为几种类型：对集合属性进行操作的简单集合运算符、将运算符应用于单个集合实例时提供结果的对象运算符，以及对嵌套集合进行操作并根据运算符返回数组或集合的集合运算符。\n\
    \n通过示例最能说明集合运算符的工作方式，因此下面将采用这种方式。列表 18-11 声明了一个包含多个属性的 `OrderItem` 类的接口。\n\n*列表\
    \ 18-11.* OrderItem 类接口\n\n```\n@interface OrderItem : NSObject\n\n@property NSString\
    \ *description;\n@property NSUInteger *quantity;\n@property float *price;\n\n\
    @end\n```\n\n给定一组存储在名为 `orderItems` 的 `NSArray` 对象中的 `OrderItem` 实例，以下表达式使用带有\
    \ `@sum` 集合运算符的 KVC `valueForKeyPath:` 表达式来计算这些商品的价格总和。\n\n```\nNSNumber *totalPrice\
    \ = [orderItems valueForKeyPath:@\"@sum.price\"];\n```\n\n`orderItems` 集合中的对象数量可以使用\
    \ `@count` 集合运算符确定，如下所示：\n\n```\nNSNumber *totalItems = [orderItems valueForKeyPath:@\"\
    @count\"];\n```\n\n可以通过使用 `@distinctUnionOfObjects` 运算符来获取具有不同描述的不同订单商品的数量，如下所示：\n\
    \n```\nNSArray *itemTypes = [orderItems\n                      valueForKeyPath:@\"\
    @distinctUnionOfObjects.description\"];\n```\n\n现在，让我们看一个对集合属性使用集合运算符的示例。列表 18-12\
    \ 声明了一个具有单个属性的 `Order` 类的接口。\n\n*列表 18-12.* Order 类接口\n\n```\n@interface Order\
    \ : NSObject\n\n@property NSArray *items;\n\n@end\n```\n\n给定一个名为 `order` 的 `Order`\
    \ 实例，可以使用 `@count` 运算符来确定键路径集合中的对象数量。在此情况下，键路径由指向集合的键路径（`items`）后跟 `@count` 运算符组成。\n\
    \n```\nNSNumber *totalItems = [order valueForKeyPath:@\"items.@count\"];\n```\n\
    \n前面的示例演示了可用 KVC 集合运算符子集的使用。Apple 的《键值编程指南》提供了集合运算符的完整参考。\n\n## 键值观察\n\n键值观察是一种使对象能够被通知其他对象属性更改的机制。它本质上是观察者软件设计模式的一种实现，并在众多软件库和框架中实现。事实上，它是模型-视图-控制器（MVC）设计模式的关键组成部分，而\
    \ MVC 是 Cocoa 和 Cocoa Touch 框架的核心组件。键值观察提供了诸多优势，包括将观察者对象与被观察对象（即主题）解耦、框架级支持以及功能完备的\
    \ API 集。以下示例使用键值观察将 `Administrator` 对象注册为名为 `person` 的 `Person` 实例的 `name` 属性的观察者。\n\
    \n```\nAdministrator *admin = [Administrator new];\n[person addObserver:admin\n\
    \         forKeyPath:@\"name\"\n            options:NSKeyValueObservingOptionNew\n\
    \            context:NULL];\n```\n\n调用 `addObserver:forKeyPath:options:context:`\
    \ 方法会在主题与观察者对象之间建立连接。当被观察属性的值发生变化时，主题会调用观察者的 `observeValueForKeyPath:ofObject:change:context:`\
    \ 方法。在此方法中，观察者类实现处理属性更改的逻辑。当被观察属性的值以 KVO 兼容的方式被更改，或其依赖的键被更改时，主题会自动调用此方法。观察者必须实现此方法才能使键值观察正常工作。列表\
    \ 18-13 为 `Administrator` 类提供了此方法的示例实现。\n\n*列表 18-13.* `observeValueForKeyPath:ofObject:change:context:`\
    \ 方法的示例实现\n\n```\n@implementation Administrator\n\n...\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath ofObject:(id)object\n        change:(NSDictionary *)change context:(void\
    \ *)context\n{\n  if ([@\"name\" isEqual:keyPath])\n  {\n    // 插入处理人员姓名更新的逻辑\n\
    \    ....\n  }\n  // 如果父类实现了此方法，则调用父类的实现！\n  [super observeValueForKeyPath:keyPath\n\
    \                       ofObject:object\n                         change:change\n\
    \                        context:context];\n}\n...\n\n@end\n```\n\n`NSKeyValueObserving`\
    \ 非正式协议定义了键值观察的 API。其方法支持更改通知、注册观察者、向观察者通知更改以及自定义观察。`NSObject` 提供了 `NSKeyValueObserving`\
    \ 协议的默认实现，因此任何继承自 `NSObject` 的类都内置了对键值观察的支持。此外，您可以通过禁用自动观察者通知并使用此协议中的方法实现手动通知，来进一步细化通知。\n\
    \n## 键值观察还是通知\n"
- fmt: "# Key-Value Observing vs. Foundation Framework Notifications\n\nIn [Chapter\
    \ 12](#9781430250500_Ch12.xhtml), you learned about the Foundation Framework notification\
    \ classes (`NSNotification`, `NSNotificationCenter`, `NSNotificationQueue`). These\
    \ APIs provide a mechanism for passing information between objects, similar to\
    \ key-value observing. Because this is somewhat similar to the function of key-value\
    \ observing, you may be wondering, \"How do these two mechanisms compare, and\
    \ which do you use?\" Well, there are a variety of differences between key-value\
    \ observing and the notification APIs that will influence which you choose for\
    \ the scenario in question, so I'll compare the two here.\n\nAn `NSNotification`\
    \ instance encapsulates generic information, so it supports a wide class of system\
    \ events (including property changes), whereas key-value observing is strictly\
    \ for notification of changes to properties of objects. As such, the KVO API is\
    \ potentially simpler to use (vs. the notifications API) for property changes\
    \ alone.\n\nThe notification classes employ a broadcast model of interaction,\
    \ whereby information (encapsulated in an `NSNotification` object) is distributed\
    \ via a centralized notification center (`NSNotificationCenter` instance). It\
    \ allows a message to be sent to more than one object, and doesn't even require\
    \ receivers to be registered to support notifications. The notification classes\
    \ support both synchronous and asynchronous (using an `NSNotificationQueue` instance)\
    \ posting of notifications. Key-value observing, on the other hand, utilizes a\
    \ point-to-point interaction model, whereby the subject directly sends a notification\
    \ to registered observers when a property changes, and blocks until the corresponding\
    \ method finishes execution. Both mechanisms provide loose coupling; however,\
    \ the notification APIs also provide nonblocking (i.e., asynchronous) interactions,\
    \ and thus have the potential to provide greater application responsiveness.\n\
    \nBecause the notification mechanism completely decouples the sender and receiver\
    \ of notification events, there is no mechanism for direct, two-way communication\
    \ between the two; both must register for notifications in order to provide bidirectional\
    \ communication. Key-value observing, on the other hand, enables the observer\
    \ to send a message to the subject, because the subject is provided as a parameter\
    \ to the observer's `observeValueForKeyPath:ofObject:change:context:` method.\n\
    \nA notification is distinguished by its name, and hence the name must be unique\
    \ to ensure that posted notifications are received by the correct observer(s).\
    \ Apple specifies a set of naming conventions in the Coding Guidelines for Cocoa\
    \ document to minimize the possibility of notification name collisions. Because\
    \ property names are specific to a class (i.e., have class namespace) and subjects\
    \ are directly bound to observers, naming collisions are not a concern.\n\n##\
    \ Key-Value Observing APIs\n\nThe `NSKeyValueObserving` protocol APIs provide\
    \ methods to both add and remove observers for an input key path. Invoking the\
    \ `addObserver:forKeyPath:options:context:` method creates a connection between\
    \ the subject and the observer object. Because this creates a strong reference\
    \ to the observer, an object should be removed as an observer prior to the subject\
    \ being deallocated. The `removeObserver:forKeyPath:` method performs this function.\
    \ It stops an object from receiving change notifications for a property with the\
    \ specified key path. The `addObserver:forKeyPath:context:` performs the same\
    \ function relative to a receiver and a context. When the same observer is registered\
    \ for the same key-path multiple times, but with different contexts, the context\
    \ pointer can be used to determine which observer to remove. [Listing 18-14](#9781430250500_Ch18.xhtml#list14)\
    \ demonstrates the use of these APIs to add and remove an `Administrator` object\
    \ as an observer of the `name` property of a `Person` instance named `person`.\n\
    \n*Listing 18-14.* KVO Adding and Removing an Observer\n\n```\nAdministrator *admin\
    \ = [Administrator new];\n[person addObserver:admin\n         forKeyPath:@\"name\"\
    \n            options:NSKeyValueObservingOptionNew\n            context:NULL];\n\
    [person removeObsserver:admin forKeyPath:@\"name\"];\n```\n\nKey-value observing\
    \ provides APIs (declared in the `NSKeyValueObserving` protocol) to support both\
    \ automatic and manual key-value change notification. They enable an observer\
    \ to perform logic both before and after a property value is changed. The APIs\
    \ support attributes, to-one, and to-many relationship properties.\n\n- APIs for\
    \ attributes and to-one relationship properties:\n  - `willChangeValueForKey:`\n\
    \  - `didChangeValueForKey:`\n\n- APIs for to-many, ordered relationship properties:\n\
    \  - `willChange:valuesAtIndexes:forKey:`\n  - `didChange:valuesAtIndexes:forKey:`\n\
    \n- APIs for to-many, unordered relationship properties:\n  - `willChangeValueForKey:withSetMutation:usingObjects:`\n\
    \  - `didChangeValueForKey:withSetMutation:usingObjects:`\n\nThe default `NSObject`\
    \ implementation automatically invokes the correct change notification methods\
    \ on an observer when a corresponding property value is changed. Automatic/manual\
    \ change notification is configured with the `NSKeyValueObserving` `automaticallyNotifiesObserversForKey:`\
    \ method. The default `NSObject` implementation returns `YES` for this method,\
    \ hence it performs automatic change notification. To perform manual change notification,\
    \ your class must override the `NSKeyValueObserving` `automaticallyNotifiesObserversForKey:`\
    \ method. For properties, you want to perform manual change notification; the\
    \ method should return `NO`. In this case, your code must invoke the `NSKeyValueObserving`\
    \ protocol method `willChange:` before changing the property value, and the `didChange:`\
    \ method after changing the value. [Listing 18-15](#9781430250500_Ch18.xhtml#list15)\
    \ provides an example implementation of manual change notification for the `name`\
    \ property of the `Person` class, as shown in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1).\n\
    \n*Listing 18-15.* Example Implementation of KVO Manual Change Notification\n\n\
    ```\n- (void)changeName:(Name *)newName\n{\n  [self willChangeValueForKey:@\"\
    name\"];\n  self.name = newName;\n  [self didChangeValueForKey:@\"name\"];\n}\n\
    ```\n\nSo why would you want to perform manual change notification? Reasons include\
    \ more fine-grained control over the sending of change notifications, eliminating\
    \ unnecessary notifications (e.g., cases when the new property value is the same\
    \ as its old value), and grouping notifications.\n\nThe `NSKeyValueObserving`\
    \ protocol also provides several methods for customizing observing. The `keyPathsForValuesAffectingValueForKey:`\
    \ method retrieves the key paths for all properties whose values affect the value\
    \ of the input key. This method is used to register dependent keys, when the value\
    \ of one property depends upon that of one or more properties in another object.\
    \ For to-one relationship properties, this method should be overridden to enable\
    \ your code to return the appropriate set of dependent keys for the property.\
    \ As an example, the `Address` class, as shown in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1),\
    \ declares `street`, `city`, `state`, and `zip` properties. A `zip` property depends\
    \ on the other three properties; thus, an application observing the `zip` property\
    \ should be notified if any of the other address properties changes. This can\
    \ be accomplished by having the `Address` class override the method to return\
    \ a collection of key paths consisting of the keys `street`, `city` and `state`,\
    \ as shown in [Listing 18-16](#9781430250500_Ch18.xhtml#list16).\n\n*Listing 18-16.*\
    \ Registering Dependent Keys for To-One Relationship Properties"
