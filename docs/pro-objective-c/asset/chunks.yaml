    \ in [Listing 2-2](#9781430250500_Ch02.xhtml#list2).\n\n[*Listing 2-2.*](#9781430250500_Ch02.xhtml#_list2)\
    \  Class Interface Syntax\n\n```\n@interface ClassName : SuperclassName\n// Property\
    \ and method declarations\n@end\n```\n\nSo, you can see from [Listing 2-1](#9781430250500_Ch02.xhtml#list1)\
    \ that the `Atom` class has a superclass named `NSObject`. A superclass establishes\
    \ a common interface and implementation, which specialized subclasses can inherit,\
    \ modify, and supplement. Hence, the `Atom` class *inherits* the functionality\
    \ of the `NSObject` class. `NSObject` is the root (i.e., base) class of most Foundation\
    \ Framework class hierarchies and it provides a basic interface to the Objective-C\
    \ runtime. Thus, the vast majority of the classes you implement here will descend\
