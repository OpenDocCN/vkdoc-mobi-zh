    \ The dot notation syntax for getting and setting a property of an object named\
    \ `myObject` would be\n\n```\nmyObject.propertyName;\nmyObject.propertyName =\
    \ propertyValue;\n```\n\nThe first statement invokes the getter accessor method\
    \ to retrieve the value of the property and the second invokes the setter accessor\
    \ method to set the property to the value of `propertyValue`.\n\nIn general, properties\
    \ should be accessed using the two mechanisms mentioned. However, if the object\
    \ associated with a property is not (or may not be) fully constructed, these mechanisms\
    \ should not be used, and the property-backed instance variable should be used\
    \ instead. This means that within a class `init` method or `dealloc` method, the\
    \ instance variable should be accessed directly, as shown with the `Atom` class\
    \ `_chemicalElement` instance variable in [Listing 2-5](#9781430250500_Ch02.xhtml#list5).\n\
    \nMethods"
