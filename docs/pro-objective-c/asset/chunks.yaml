    piano, or guitar. In his spare time, Felipe loves to read and learn new programming
    languages and technologies.


    Felipe likes to write on his blog at `http://iFe.li`, create iOS tutorials and
    articles as a member of Ray Wenderlich’s blog at `www.raywenderlich.com`, and
    work as a technical reviewer for Objective-C and iOS–related books. You can find
    him on Twitter as `@Airjordan12345`, on Facebook under his name, or on App.net
    as `@iFeli`.


    ## Acknowledgments

    This book would not exist without the encouragement and understanding of my wife
    Dinavia. You supported this work and the long hours it required, providing whatever
    I needed to see this through to the end. I am always and forever grateful.


    Writing a book is a lot of work! I have been very fortunate in this endeavor to
    work with a great team at Apress. Douglas Pundick, development editor, and Mark
    Powers, coordinating editor, have been instrumental in keeping the book on track.
    Felipe Laso Marsetti was especially helpful with his detailed technical review
    of the book’s chapters and the code. Kimberly Burton-Weisman did an excellent
    job performing the copyediting in a timely, efficient manner. In fact, the entire
    Apress editorial board was instrumental in making this process run smoothly and
    seamlessly. Thank you is not enough!


    Finally, I would like to thank Apple, in particular Steve Jobs and Steve Wozniak,
    for this amazing technology that we are so fortunate to be able to use. Many years
    ago, I bought my first computer, a Mac SE 30, as a college student. From that
    point on, I have always been impressed by the quality of the systems, hardware,
    software, and the engineering that goes into each Apple product. Thanks to the
    vision and the perseverance of these pioneers, I have been able to write this
    book.


    ## Introduction

    The Objective-C programming language continues to grow in popularity and usage.
    This is due to the power and ease-of-use of the language itself, along with the
    numerous features that continue to be added to the platform. Many programmers
    have developed a basic knowledge of the language and now want to further their
    expertise. Pro Objective-C will take you to the next level.


    ### What This Book Is

    *Pro Objective-C* provides an in-depth, comprehensive guide to the language, its
    runtime, and key APIs. It explains the key concepts of Objective-C in a clear,
    easy-to-understand manner, along with detailed coverage of its more complex features.
    Its key topics include:


    *   Objective-C fundamentals and key language elements

    *   The Objective-C runtime system

    *   Foundation Framework APIs

    *   Objective-C advanced language features


    The book also includes numerous practical examples—code excerpts and complete
    applications—that demonstrate how to apply in code what you’re learning.


    Each topic is covered clearly, concisely, and is packed with the details you need
    to develop Objective-C code effectively. The most important features are given
    in-depth treatment, and each chapter contains numerous examples that clearly demonstrate
    the use of Objective-C.


    ### Who This Book Is For

    This book is geared toward intermediate to advanced developers who already have
    some Objective-C experience. It’s also great for developers who have not used
    Objective-C but have some C programming experience and also understand object-oriented
    programming.


    ### What You Need

    Before you begin writing Objective-C code for the Apple OS X and iOS platforms,
    you’ll need an Intel-based Mac computer (MacBook, iMac, Mac Pro, etc.) running
    OS X Mountain Lion (OS X 10.6.8) or later. You will also need Xcode, Apple’s toolset
    for iOS and Mac software development. [Chapter 1](#9781430250500_Ch01.xhtml) provides
    instructions for obtaining and installing Xcode.


    ### What’s in This Book

    Here’s a brief overview of the chapters of this book.


    #### Chapter 1

    This chapter introduces the Objective-C programming language and development environment.
    You will also download and install Xcode and write your first Objective-C program.


    #### Chapter 2

    Chapter 2 is all about classes, the major building block for object-oriented programming.
    It covers the key elements and unique features Objective-C provides for developing
    classes.


    #### Chapter 3

    In Chapter 2 you learned how to create classes; in this chapter you learn how
    to use them. Specifically, you learn about the concepts and details around Objective-C
    object creation, initialization, and messaging.


    #### Chapter 4

    Proper memory management is key to developing programs that perform both correctly
    and efficiently. In this chapter you’ll learn how computer memory is allocated
    and released for Objective-C programs, the Objective-C memory model, and how to
    write programs that perform memory management properly.


    #### Chapter 5

    Objective-C includes a preprocessor that is used to translate source files prior
    to compilation. In this chapter you will learn how the preprocessor works and
    how the preprocessor language is used in Objective-C source files.


    #### Chapter 6

    As you learned earlier in this book, ARC is the recommended approach for Objective-C
    memory management. In this Expert Section chapter you will learn some of the finer
    details surrounding ARC memory management, as well as how to use ARC with toll-free
    bridged objects.


    #### Chapter 7

    Chapter 7 begins our study of the Objective-C runtime system by providing an in-depth
    exploration of the dynamic features of the Objective-C language. This includes
    runtime type determination, method resolution, object introspection, dynamic code
    loading, and other features.


    #### Chapter 8

    In Chapter 8 you will learn about the architecture and design of the Objective-C
    runtime system, and how its dynamic features are implemented. The chapter also
    shows how your code interacts with the runtime, both at compile time and during
    program execution.


    #### Chapter 9

    In this Expert Section chapter you will enhance your knowledge of the runtime
    system by developing several example programs that exercise some of its key features
    and APIs.


