    Interprocess Communication


    The Foundation Framework includes a collection of classes that support process-to-process
    communication. Specifically, they provide facilities for creating and using communication
    channels.


    Communication via Pipes


    The `NSPipe` class encapsulates a *pipe*, a one-way channel for communication
    between processes. The API includes methods to create and initialize a pipe, and
    retrieve the corresponding `NSFileHandle` instance for a pipe. The `NSTask` class
    provides several methods for setting the input and output channels for a process
    (`setStandardOutput:`, `setStandardInput:`). [Listing 11-18](#9781430250500_Ch11.xhtml#list18)
    demonstrates the use of the `NSTask` and `NSPipe` APIs to create and launch a
    task (the Unix command `/bin/ls` simply lists the files in the current directory),
    set the task’s standard output, and then retrieve and log the standard output
    written to the pipe after task completion.


    [*Listing 11-18.*](#9781430250500_Ch11.xhtml#_list18)  Using NSPipe and NSTask
    to Invoke a Process


    ```

    NSTask *task = [[NSTask alloc] init];

    [task setLaunchPath:@"/bin/ls"];

    NSPipe *outPipe = [NSPipe pipe];

    [task setStandardOutput:outPipe];

    [task launch];

    NSData *output = [[outPipe fileHandleForReading] readDataToEndOfFile];

    NSString *lsout = [[NSString alloc] initWithData:output

                                            encoding:NSUTF8StringEncoding];

    NSLog(@"/bin/ls output:\n%@", lsout);

    ```


    Communication via Ports


    `NSPort`, `NSMachPort`, `NSMessagePort`, and `NSSocketPort` provide low-level
    mechanisms for communication between threads or processes, typically via `NSPortMessage`
    objects.


    `NSPort` is an abstract class. It includes methods to create and initialize a
    port, create connections to a port, set port information, and monitor a port.
    `NSMachPort`, `NSMessagePort`, and `NSSocketPort` are concrete subclasses of `NSPort`
    used for specific types of communication ports. `NSMachPort` and `NSMessagePort`
    allow local (on the same machine) communication only. In addition, `NSMachPort`
    is used with Mach ports, the fundamental communication port in OS X. `NSSocketPort`
    allows both local and remote communication, but may be less efficient than the
    others when used for local communication. Port instances can be supplied as parameters
    when creating an `NSConnection` instance (using the `initWithReceivePort:sendPort:`
    method). You can also add a port to a run loop via the NSPort `scheduleInRunLoop:forMode:`
    method.


    As ports are a very low-level interprocess communication mechanism, you should
    implement interapplication communication using distributed objects whenever possible
    and use `NSPort` objects only when necessary. In addition, when you are finished
    using a port object, you must explicitly invalidate the object via the NSPort
    `invalidate` method.


    The `NSSocketPort` and `NSPortMessage` classes are only available for use on the
    OS X platform.


    Port Registration


    `NSPortNameServer`, `NSMachBootstrapServer`, `NSMessagePortNameServer`, and `NSSocketPortNameServer`
    provide an interface to the port registration service, used to retrieve instances
    of `NSMachPort`, `NSMessagePort`, and `NSSocketPort` *.*


    `NSPortNameServer` provides an object-oriented interface to the port registration
    service used by the distributed objects system. `NSConnection` objects use it
    to contact each other and to distribute objects over the network. You should rarely
    need to interact directly with an `NSPortNameServer` instance. `NSMachBootstrapServer`,
    `NSMessagePortNameServer`, and `NSSocketPortNameServer` are subclasses of `NSPortNameServer`
    that return corresponding port instances (`NSMachPort`, `NSMessagePort`, `NSSocketPort`).


    The `NSPortNameServer`, `NSMachBootstrapServer`, `NSMessagePortNameServer`, and
    `NSSocketPortNameServer` classes are only available for use on the OS X platform.


    Roundup


    In this chapter, you began your review of the Foundation Framework, focusing on
    classes that provide common, general-purpose functionality required for most Objective-C
    programs. You should now be familiar with Foundation Framework classes that provide
    the following functionality:


    *   Network services

    *   Application services

    *   File system utilities

    *   URL handling

    *   Interprocess communication

    *   Concurrency and threading


    Chapter     12


    Foundation Framework Specialized Services


    In this chapter, you will explore several Foundation Framework classes that provide
    specialized system services. These classes implement functionality to support
    event-driven programming via notifications, object persistence via archiving and
    serialization, and distributed programming with distributed objects.


    Notifications


    The Foundation Framework includes a collection of APIs—the *notifications support*
    *classes*—that provide a powerful mechanism for event-driven programming. A *notification*
    encapsulates information about an event. It can be sent to one or more observing
    objects in response to an event that occurs within a program. The notifications
    architecture follows a broadcast model; hence objects receiving events are decoupled
    from those sending them. The notification support classes enable the creation
    and posting of notifications, sending and receiving notifications, and asynchronous
    posting of notifications via queues. The APIs also support registering for notifications
    and the delivery of notifications to specific threads.


    `NSNotification` encapsulates the information sent by a notification object. It
    consists of a unique name, the posting object, and (optionally) a dictionary of
    supplementary information. The class includes methods for creating and initializing
    notifications, and retrieving notification information. [Listing 12-1](#9781430250500_Ch12.xhtml#list1)
    creates a notification named `ApplicationDidHandleGreetingNotification` for a
    simple greeting.


    [*Listing 12-1.*](#9781430250500_Ch12.xhtml#_list1)  Retrieving the Network Host
    Name Using NSHost


    ```

    NSString *nName = @"ApplicationDidHandleGreetingNotification";

    NSNotification *notif = [NSNotification notificationWithName:nName

                                                          object:@"Hello, World!"];

    ```


    So you may be wondering, why the long name for the notification? Well, Apple has
    provided some guidelines for the names of notifications. It recommends that a
    notification name be composed of the following elements:


    *   Name of the associated class

    *   The word *Did* or *Will*

    *   Unique part of the name

    *   The word *Notification*


    These guidelines are designed to facilitate the creation of unique notification
    names that are self-descriptive*.*'
  trans: "\n# Foundation 框架：URL 处理与进程间通信\n\nFoundation 框架中的 `NSURLProtocol` 和 `NSURLProtocolClient`\
    \ 类支持创建用于从 URL 加载数据的自定义协议。`NSURLProtocol` 是一个抽象类，提供了执行特定协议 URL 加载的基本结构。它包含了用于创建\
    \ `NSURLProtocol` 对象、注册/注销协议类、请求管理、获取协议属性以及启动/停止下载的方法。`NSURLProtocolClient` 是一个由\
    \ `NSURLProtocol` 子类使用，用于与 URL 加载系统通信的协议。\n\n## 进程间通信\n\nFoundation 框架包含一组支持进程间通信的类。具体来说，它们提供了创建和使用通信通道的功能。\n\
    \n### 通过管道通信\n\n`NSPipe` 类封装了一个*管道*，这是一种用于进程间通信的单向通道。其 API 包括创建和初始化管道的方法，以及获取管道对应\
    \ `NSFileHandle` 实例的方法。`NSTask` 类提供了几个方法，用于设置进程的输入和输出通道（`setStandardOutput:`、`setStandardInput:`）。清单\
    \ 11-18 演示了如何使用 `NSTask` 和 `NSPipe` API 创建并启动一个任务（Unix 命令 `/bin/ls` 仅列出当前目录中的文件）、设置任务的标准输出，然后在任务完成后检索并记录写入管道的标准输出。\n\
    \n*清单 11-18.* 使用 `NSPipe` 和 `NSTask` 调用进程\n\n```\nNSTask *task = [[NSTask alloc]\
    \ init];\n[task setLaunchPath:@\"/bin/ls\"];\nNSPipe *outPipe = [NSPipe pipe];\n\
    [task setStandardOutput:outPipe];\n[task launch];\nNSData *output = [[outPipe\
    \ fileHandleForReading] readDataToEndOfFile];\nNSString *lsout = [[NSString alloc]\
    \ initWithData:output\n                                        encoding:NSUTF8StringEncoding];\n\
    NSLog(@\"/bin/ls output:\\n%@\", lsout);\n```\n\n### 通过端口通信\n\n`NSPort`、`NSMachPort`、`NSMessagePort`\
    \ 和 `NSSocketPort` 提供了用于线程或进程间通信的底层机制，通常通过 `NSPortMessage` 对象实现。\n\n`NSPort` 是一个抽象类。它包含创建和初始化端口、创建到端口的连接、设置端口信息以及监视端口的方法。`NSMachPort`、`NSMessagePort`\
    \ 和 `NSSocketPort` 是 `NSPort` 的具体子类，用于特定类型的通信端口。`NSMachPort` 和 `NSMessagePort`\
    \ 仅允许本地（同一台机器上）通信。此外，`NSMachPort` 用于 Mach 端口，这是 OS X 中的基本通信端口。`NSSocketPort` 既允许本地通信也允许远程通信，但在本地通信时效率可能低于其他端口。在创建\
    \ `NSConnection` 实例时，可以将端口实例作为参数提供（使用 `initWithReceivePort:sendPort:` 方法）。您还可以通过\
    \ `NSPort` 的 `scheduleInRunLoop:forMode:` 方法将端口添加到运行循环中。\n\n由于端口是一种非常底层的进程间通信机制，您应尽可能使用分布式对象来实现应用程序间通信，仅在必要时才使用\
    \ `NSPort` 对象。此外，当您使用完端口对象后，必须通过 `NSPort` 的 `invalidate` 方法显式地使该对象失效。\n\n`NSSocketPort`\
    \ 和 `NSPortMessage` 类仅可在 OS X 平台上使用。\n\n### 端口注册\n\n`NSPortNameServer`、`NSMachBootstrapServer`、`NSMessagePortNameServer`\
    \ 和 `NSSocketPortNameServer` 提供了端口注册服务的接口，用于检索 `NSMachPort`、`NSMessagePort` 和\
    \ `NSSocketPort` 的实例。\n\n`NSPortNameServer` 为分布式对象系统使用的端口注册服务提供了一个面向对象的接口。`NSConnection`\
    \ 对象使用它来相互联系并在网络上分发对象。您很少需要直接与 `NSPortNameServer` 实例交互。`NSMachBootstrapServer`、`NSMessagePortNameServer`\
    \ 和 `NSSocketPortNameServer` 是 `NSPortNameServer` 的子类，它们返回相应的端口实例（`NSMachPort`、`NSMessagePort`、`NSSocketPort`）。\n\
    \n`NSPortNameServer`、`NSMachBootstrapServer`、`NSMessagePortNameServer` 和 `NSSocketPortNameServer`\
    \ 类仅可在 OS X 平台上使用。\n\n### 小结\n\n在本章中，您开始了对 Foundation 框架的回顾，重点介绍了为大多数 Objective-C\
    \ 程序提供通用、常用功能的类。现在，您应该熟悉提供以下功能的 Foundation 框架类：\n\n- 网络服务\n- 应用程序服务\n- 文件系统工具\n\
    - URL 处理\n- 进程间通信\n- 并发与线程\n\n# 第 12 章：Foundation 框架专用服务\n\n在本章中，您将探索几个提供专用系统服务的\
    \ Foundation 框架类。这些类实现了功能，以支持通过通知进行事件驱动编程、通过归档和序列化实现对象持久化，以及通过分布式对象实现分布式编程。\n\n\
    ## 通知\n\nFoundation 框架包含一组 API——*通知支持类*——它们为事件驱动编程提供了强大的机制。*通知*封装了关于某个事件的信息。它可以发送给一个或多个观察对象，以响应程序中发生的事件。通知架构遵循广播模型；因此，接收事件的对象与发送事件的对象是解耦的。通知支持类支持创建和发布通知、发送和接收通知，以及通过队列异步发布通知。这些\
    \ API 还支持注册通知以及将通知投递到特定线程。\n\n`NSNotification` 封装了通知对象发送的信息。它由唯一的名称、发布对象以及（可选）一个补充信息字典组成。该类包含创建和初始化通知以及检索通知信息的方法。清单\
    \ 12-1 为一个简单的问候语创建了一个名为 `ApplicationDidHandleGreetingNotification` 的通知。\n\n*清单\
    \ 12-1.* 使用 `NSHost` 检索网络主机名\n\n```\nNSString *nName = @\"ApplicationDidHandleGreetingNotification\"\
    ;\nNSNotification *notif = [NSNotification notificationWithName:nName\n      \
    \                                                object:@\"Hello, World!\"];\n\
    ```\n\n那么您可能会想，为什么通知的名称这么长？嗯，Apple 提供了一些关于通知命名的指南。它建议通知名称应由以下元素组成：\n\n- 关联类的名称\n\
    - 单词 *Did* 或 *Will*\n- 名称的唯一部分\n- 单词 *Notification*\n\n这些指南旨在促进创建具有自描述性的唯一通知名称。\n"
- fmt: '# NSNotificationCenter 和 NSDistributedNotificationCenter


    `NSNotificationCenter`和`NSDistributedNotificationCenter`类提供了向感兴趣的观察者广播通知的机制。它们包含用于获取通知中心实例、添加和移除通知观察者以及发布通知的方法。`NSDistributedNotificationCenter`是`NSNotificationCenter`的子类，提供了向其他进程广播通知的机制。类方法`defaultCenter`用于检索与应用程序关联的默认通知中心实例，如下所示：


    ```

    [NSNotificationCenter defaultCenter];

    ```


    `NSNotificationCenter`提供了几种发布通知的方法。以下语句使用`postNotification:`方法发布在[清单 12-1](#9781430250500_Ch12.xhtml#list1)中创建的通知：


    ```

    [[NSNotificationCenter defaultCenter] postNotification:notif];

    ```


    `NSNotificationCenter`还提供了通过单个方法创建和发布通知的方法。以下语句使用`postNotificationName:object:`方法，使用在[清单
    12-1](#9781430250500_Ch12.xhtml#list1)中创建的通知名称来创建和发布通知：


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:nName

                                                        object:@"Salut!"];

    ```


    `NSNotificationCenter`包含了几种管理通知观察者的方法。您可以使用`addObserver:selector:name:object:`方法注册一个对象以接收通知。此方法接受参数，指定接收通知的观察者对象、要发送给观察者的消息、要为其注册观察者的通知名称，以及观察者希望从中接收通知的发送者。[清单
    12-2](#9781430250500_Ch12.xhtml#list2) 注册了一个名为`handler`的对象（`Greeter`类的实例），以从名为`nName`的变量（参见[清单
    12-1](#9781430250500_Ch12.xhtml#list1)）接收通知，并将消息`handleGreeting:`发送给观察者。


    *[清单 12-2.](#9781430250500_Ch12.xhtml#_list2)*  注册通知观察者


    ```

    Greeter *handler = [Greeter new];

    [[NSNotificationCenter defaultCenter] addObserver:handler

                                            selector:@selector(handleGreeting:)

                                                name:nName

                                              object:nil];

    ```


    接收通知事件的类必须实现具有以下签名的方法：


    ```

    - (void) methodName :(NSNotification *)notification;

    ```


    `methodName`是方法的名称。在[清单 12-2](#9781430250500_Ch12.xhtml#list2)中，`Greeter`类实现了一个名为`handleGreeting:`的通知处理方法。


    `NSNotificationCenter`还提供了移除观察者的方法；`removeObserver:`方法取消注册观察者，使其不再接收之前注册的通知。`removeObserver:name:object:`方法则更精细，它移除与指定观察者、通知名称和发送者匹配的条目。以下语句为名为`handler`的观察者移除了变量名为`nName`的通知：


    ```

    [[NSNotificationCenter defaultCenter] removeObserver:handler

                                                    name:uName

                                                  object:nil];

    ```


    # NSNotificationQueue


    `NSNotificationQueue`类为通知中心提供了一个队列，从而支持异步发布和/或合并通知。*合并*是一个过程，使您能够（从队列中）过滤与先前排队的通知在某种程度上相似的通知。该类包括获取通知队列实例以及在队列中添加/移除通知的方法。类方法`defaultQueue`用于检索当前线程的默认通知队列实例，如下所示：


    ```

    [NSNotificationQueue defaultQueue];

    ```


    方法`initWithNotificationCenter:`提供了为指定通知中心创建通知队列的能力。[清单 12-3](#9781430250500_Ch12.xhtml#list3)
    检索默认通知中心，然后创建一个与其关联的通知队列。


    *[清单 12-3.](#9781430250500_Ch12.xhtml#_list3)*  为指定通知中心创建通知队列


    ```

    NSNotificationCenter *notifier = [NSNotificationCenter defaultCenter];

    NSNotificationQueue *queue = [[NSNotificationQueue alloc]

                                  initWithNotificationCenter:notifier];

    ```


    `NSNotificationQueue`包含两种发布通知的方法。`enqueueNotification:postingStyle:coalesceMask:forModes:`方法使您能够指定发布通知的发布风格、合并选项以及支持的运行模式。合并选项是常量值，定义如下：


    *   `NSNotificationNoCoalescing`：不合并通知，发布所有通知。

    *   `NSNotificationCoalescingOnName`：合并具有相同名称的通知，以便只发布一个。

    *   `NSNotificationCoalescingOnSender`：合并具有相同发送者的通知，以便只发布一个。


    发布风格定义了用于排队通知的交互模式（同步/异步、空闲时/尽快）。这些选项指定为常量值，如下所示：


    *   `NSPostASAP`：在相应运行循环的当前迭代完成后，尽快异步发布。

    *   `NSPostWhenIdle`：在运行循环等待输入源或定时器事件时异步发布。

    *   `NSPostNow`：排队的通知（在合并后）立即发布，有效提供同步行为。此行为不需要运行循环。


    [清单 12-4](#9781430250500_Ch12.xhtml#list4) 同步排队列分配给变量`notif`的通知（参见[清单 12-1](#9781430250500_Ch12.xhtml#list1)），合并具有相同名称的通知。


    *[清单 12-4.](#9781430250500_Ch12.xhtml#_list4)*  使用合并将通知发布到队列


    ```

    [[NSNotificationQueue defaultQueue]

        enqueueNotification:notif

               postingStyle:NSPostNow

               coalesceMask:NSNotificationCoalescingOnName

                   forModes:nil];

    ```


    `NSNotificationQueue`还包含一个从队列中移除通知的方法。以下语句使用`dequeueNotificationsMatching:coalesceMask:`方法，在不进行合并的情况下，移除去队列分配给变量`notif`的通知。


    ```

    [[NSNotificationQueue defaultQueue]

         dequeueNotificationsMatching:notif

                         coalesceMask:NSNotificationNoCoalescing];

    ```


