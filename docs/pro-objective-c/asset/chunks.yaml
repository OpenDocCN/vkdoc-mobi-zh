    \ 文件并更新 `main()` 函数，如清单 16-21 所示。\n\n*清单 16-21.* RegEdit main() 函数\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n#import \"RegEdit.h\"\n#import \"CLIParser.h\"\
    \n\nint main(int argc, const char * argv[])\n{\n    @autoreleasepool\n    {\n\
    \        // 首先使用 CLI 解析器检索命令行参数\n        CLIParser *parser = [[CLIParser alloc]\
    \ initWithCount:argc arguments:argv];\n        uint32 registerValue;\n       \
    \ NSInteger registerByte;\n        unsigned int byteValue;\n        BOOL isSetByte;\n\
    \        NSError *error;\n        BOOL success = [parser parseWithRegister:&registerValue\n\
    \                                      byteNumber:&registerByte\n            \
    \                           doSetByte:&isSetByte\n                           \
    \            byteValue:&byteValue\n                                          \
    \ error:&error];\n        if (!success)\n        {\n            // 记录错误并退出\n \
    \           if (error)\n            {\n                NSLog(@\"%@\", [error localizedDescription]);\n\
    \                return -1;\n            }\n        }\n        else\n        {\n\
    \            // 现在创建 RegEdit 实例并设置其初始值\n            RegEdit *regEdit = [[RegEdit\
    \ alloc] initWithValue:registerValue];\n            NSLog(@\"Initial register\
    \ settings -> 0x%X\", (uint32)[regEdit regSetting]);\n\n            // 使用自定义下标获取选中的寄存器字节\n\
    \            NSNumber *byte = regEdit[registerByte];\n            NSLog(@\"Byte\
    \ %ld value retrieved -> 0x%X\", (long)registerByte,\n                  [byte\
    \ intValue]);\n\n            // 使用自定义下标将选中的寄存器字节设置为输入值\n            if (isSetByte)\n\
    \            {\n                NSLog(@\"Setting byte %d value to -> 0x%X\", (int)registerByte,\
    \ byteValue);\n                regEdit[registerByte] = [NSNumber numberWithUnsignedInt:byteValue];\n\
    \                NSLog(@\"Updated register settings -> 0x%X\", [regEdit regSetting]);\n\
    \            }\n        }\n    }\n    return 0;\n}\n```\n\n`main()` 函数首先创建了一个\
    \ `CLIParser` 对象。它解析命令行参数，如果参数未能成功解析，则记录错误。然后它创建一个 `RegEdit` 实例，并根据命令行参数指定，在寄存器中获取/设置一个字节。\n\
    \n现在，你将编辑项目 scheme（就像之前在第 9 章的示例中所做的那样），为程序的命令行参数设置值。在 Xcode 中，在工具栏顶部的 **Scheme**\
    \ 按钮中选择 **RegEdit**，然后从 scheme 下拉菜单中选择 **Edit Scheme …**（如图 16-1 所示）。\n\n![9781430250500_Fig16-01.jpg](img/9781430250500_Fig16-01.jpg)\n\
    \n图 16-1. 编辑 RegEdit 项目 scheme\n\n在 Scheme 编辑对话框中，选择 **Arguments** 选项卡来编辑程序启动时传递的参数。在\
    \ **Arguments Passed on Launch**（启动时传递的参数）部分下，选择 **+** 按钮来添加参数值。如图 16-2 所示，初始寄存器设置通过\
    \ `-n` 参数指定，寄存器字节通过 `-b` 参数指定，字节值通过 `-v` 参数指定。\n\n![9781430250500_Fig16-02.jpg](img/9781430250500_Fig16-02.jpg)\n\
    \n图 16-2. 使用 Scheme 编辑器添加命令行参数\n\n图 16-2 中提供的命令行参数设置为：\n\n```\n-n 1FB2C3A6 -b\
    \ 0 -v A5\n```\n\n因此，初始寄存器设置为 0x1FB2C3A6，选中的寄存器字节为 0，该字节的值将更新为 0xA5。\n\n现在，这些命令行参数将在启动时传递给\
    \ RegEdit 程序。编译并运行程序时，你应该会在输出面板中看到如图 16-3 所示的消息。\n\n![9781430250500_Fig16-03.jpg](img/9781430250500_Fig16-03.jpg)\n\
