    not impossible) to achieve, and also makes it difficult for the debugger to remain
    current with changes to the language and/or compiler. These factors, among others,
    make it difficult to write and maintain a debugger.


    LLDB mitigates these issues by utilizing the LLVM Clang compiler front end; specifically,
    it converts debugging information into Clang data types. This enables LLDB to
    use Clang to parse command expressions and thus directly support the latest C,
    C++, Objective C, and Objective C++ language features and runtimes. Debugger error
    reporting is improved because it is identical to that provided by the compiler.
    LLDB also leverages the compiler for other functionalities, including making function
    calls within expressions and disassembling instructions.


    Plug-in Architecture'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    *   `Clang 编译器`：Clang 是一种用于 C、Objective-C 和 C++ 编程语言的现代编译器。它负责对输入代码进行解析、验证和错误诊断，然后将解析后的代码转换为
    LLVM 中间表示 (IR)。与 LLVM 项目一样，Clang 本身也被划分为模块化的、可重用的库，这些库公开了公共 API。

    *   `优化器`：LLVM 优化器执行代码优化，遍历部分代码以收集信息或执行转换。其特性包括编译时优化、链接时优化以及跨语言边界的优化。

    *   `代码生成器`：LLVM 与目标无关的代码生成器是一个框架，提供了一套可重用的组件，用于将 LLVM 内部表示转换为特定目标的机器码——无论是汇编形式（适用于静态编译器）还是二进制机器码形式（适用于
    JIT 编译器）。

    *   `反汇编器`：反汇编器接收一个 LLVM 位码文件，并将其转换为人类可读的 LLVM 汇编语言。

    *   `JIT`：LLVM 即时 (JIT) 编译器在运行时将 LLVM IR 代码转换为机器码。它还会基于动态信息执行运行时优化。


    如图 图 C-1 所示，使用 LLVM 项目组件构建的一些工具包括 LLVM 编译器（Xcode 的标准编译器）、静态分析器（也用于 Xcode）以及 LLDB
    调试器。Xcode 与 LLVM 组件和工具的集成，除了 Objective-C 源代码编译之外，还提供了许多好处。这些好处包括：在您键入代码时实时通知警告和错误、针对编码错误的建议修正、改进的代码补全、源代码静态分析，以及对使用
    Xcode 默认调试器 LLDB 进行程序调试的全面支持。


    ## LLDB


    LLDB 是一种用于 C、C++ 和 Objective-C 编程语言的现代、高性能调试器。它被构建为一组可重用的组件，这些组件利用了 LLVM 项目（Clang
    编译器、JIT、反汇编器等）的现有组件和库。LLDB 提供最新的 C、C++ 和 Objective-C 语言支持，支持可声明局部变量和类型的表达式、表达式的即时编译以提高性能，以及一个公共
    API，使得 LLDB 除了调试之外，还可用于其他目的（如反汇编、对象和符号文件内省等）。整个 LLDB API 也可以通过脚本桥接接口以 Python 函数的形式提供。这意味着
    LLDB API 可以直接从 Python 中使用，或者，也可以在 LLDB 命令行工具内部使用 Python。LLDB 可以通过其命令行工具独立运行，也可以直接在
    Xcode 内运行。


    ## 设计


    LLDB 采用面向对象的设计实践开发，包括数据封装（无全局变量）和基于插件的架构，以促进模块化和可扩展性。接下来的几段将概述组成 LLDB 的各个库，并更详细地审视其一些重要的设计元素。


    ### 库


    LLDB 被设计为一组逻辑分组的库，如下所示：


    *   `API`：LLDB 的公共接口，目前用 C++ 编写。此 API 使得 LLDB 能被其他程序重用。它也被 LLDB 命令行工具所使用。

    *   `Breakpoint`：实现调试断点的类集合。LLDB 支持行断点、符号断点和异常断点。每当抛出或捕获异常时，都会命中异常断点。当遇到符号名称（例如，方法调用或函数调用）时，符号断点会导致程序执行暂停。

    *   `Commands`：实现 LLDB 命令行工具文本命令功能的类集合。

    *   `Core`：实现 LLDB 所需基本功能的类。

    *   `Data formatters`：为 LLDB 实现数据格式化器的类集合。这些用于定义调试变量的自定义显示选项。

    *   `Expressions`：这些类用于执行表达式解析。它们可以使用 Clang 编译器前端来评估从 DWARF 表达式到编程语言（例如，Objective-C）表达式。DWARF
    是一种通用调试文件格式，用于支持源代码级调试。DWARF 表达式描述了在调试程序期间如何计算值或如何命名位置。表达式类支持多种特性，包括多行表达式、局部变量支持、流程控制和持久的表达式全局变量。

    *   `Host`：一组提供对运行 LLDB 的主机（系统函数等）进行抽象的类。

    *   `Interpreter`：负责作为每个命令对象所需基类的类集合。它负责跟踪和运行命令行命令。

    *   `Symbol`：提供解析目标文件和调试符号所需一切的类。此部分包含编译单元（一个源文件的代码和调试信息）、函数、函数内的词法块、内联函数、类型、声明位置和变量所需的所有类。

    *   `Target`：一组封装调试目标数据（目标、进程、线程、堆栈帧等）的类。

    *   `Utility`：LLDB 工具类（字符串数据提取器等）。


    ### 表达式解析


    调试器最重要的特性之一是能够显示目标程序中对象的值，这也称为 *表达式求值*。因此，调试器的表达式求值能力是其设计和实现的关键要素。大多数调试器实现自定义的表达式解析器，因此也会创建解析器使用的自定义类型表示。结果，对这些类型表示的更改（例如，由于编程语言的更改）需要更改解析器。此外，表达式解析器追求编译器级别的准确性。这种准确度极难实现（如果不是不可能的话），并且也使调试器难以跟上语言和/或编译器的变更。这些因素及其他因素使得编写和维护调试器变得困难。


    LLDB 通过利用 LLVM Clang 编译器前端来缓解这些问题；具体来说，它将调试信息转换为 Clang 数据类型。这使得 LLDB 能够使用 Clang
    来解析命令表达式，从而直接支持最新的 C、C++、Objective-C 和 Objective-C++ 语言特性和运行时。调试器错误报告也得到了改进，因为其与编译器提供的完全相同。LLDB
    还利用编译器实现其他功能，包括在表达式内进行函数调用以及反汇编指令。


    ### 插件架构

