    \ `NSArray` 方法 `objectAtIndexedSubscript:` 的表达式。实际上，以下两个表达式是等价的：\n\n```\nNSString\
    \ *word = words[0]\nNSString *word = [words objectAtIndexedSubscript:1]\n```\n\
    \n对于写入（即设置）操作，编译器会将其转换为使用 `NSMutableArray` 方法 `setObject:atIndexedSubscript:`\
    \ 的表达式。实际上，以下两个表达式是等价的：\n\n```\nwords[1] = @\"Earthlings\";\n[words setObject:@\"\
    Earthlings\" atIndexedSubscript:1];\n```\n\n`NSArray` 方法 `objectAtIndexedSubscript:`\
    \ 接受一个 `NSUInteger`（例如，无符号整数）作为其输入参数，并返回某种 Objective-C 对象指针类型的值。`NSMutableArray`\
    \ 方法 `setObject:atIndexedSubscript:` 接受一个 Objective-C 指针类型作为其第一个参数，并接受一个 `NSUInteger`\
    \ 作为其第二个参数。\n\n## NSDictionary 下标引用\n\n当应用于 `NSDictionary` 和 `NSMutableDictionary`\
    \ 对象时，下标操作数必须是 Objective-C 指针类型。`NSDictionary` 支持使用下标操作数获取字典中的元素。如代码清单 16-14 所示的示例创建了一个\
    \ `NSDictionary` 字面量，然后使用下标引用从结果数组中检索元素。\n\n*代码清单 16-14.* 使用下标引用检索 `NSDictionary`\
    \ 元素\n\n```\nNSDictionary *order1 = @{@1111:@\"1 Cheeseburger\",\n           \
    \              @1112:@\"2 Hot dogs\"};\nNSString *order = order1[@1111];\n```\n\
    \n`NSMutableDictionary` 同时支持使用下标操作数获取和设置数组中的元素。代码清单 16-15 从一个 `NSDictionary` 字面量创建了一个可变字典，然后将数组中的一个元素设置为新值。\n\
    \n*代码清单 16-15.* 使用下标引用设置 `NSMutableDictionary` 元素\n\n```\nNSMutableDictionary\
    \ *order1 = [@{@1111:@\"1 Cheeseburger\",\n                                 @1112:@\"\
    2 Hot dogs\"} mutableCopy];\norder1[@1112] = @\"1 Cheese pizza\";\n```\n\n`NSDictionary`\
    \ 和 `NSMutableDictionary` 类使用下标操作数（即键）来访问其集合中的相应元素。下标运算符不允许你向可变数组添加元素；它只允许你替换现有元素。对于\
    \ `NSDictionary` 或 `NSMutableDictionary` 实例，如果输入键没有关联的值，则尝试通过下标引用检索元素会返回 `nil`。当使用下标引用设置\
    \ `NSMutableDictionary` 元素时，如果键或对象为 `nil`，该方法会引发 `NSInvalidArgument` 异常。\n\n当下标操作数应用于\
    \ `NSDictionary` 或 `NSMutableDictionary` 对象时，表达式会被重写，根据元素是被读取还是被写入，使用两种不同的选择器之一。对于读取（即获取）操作，编译器会将其转换为使用\
    \ `NSDictionary` 方法 `objectForKeyedSubscript:` 的表达式。实际上，以下两个表达式是等价的：\n\n```\n\
    NSString *order = order1[@1111];\nNSString *order = [order1 objectForKeyedSubscript:@1111];\n\
    ```\n\n对于写入（即设置）操作，编译器会将其转换为使用 `NSMutableDictionary` 方法 `setObject:forKeyedSubscript:`\
    \ 的表达式。实际上，以下两个表达式是等价的：\n\n```\norder[@1111] = @\"1 Cheeseburger\";\n[order setObject:@\"\
    1 Cheeseburger\" forKeyedSubscript:@1111];\n```\n\n`NSDictionary` 方法 `objectForKeyedSubscript:`\
    \ 接受一个遵循 `NSCopying` 协议的 Objective-C 指针类型作为其输入参数，并返回某种 Objective-C 对象指针类型的值。`NSMutableDictionary`\
    \ 方法 `setObject:forKeyedSubscript:` 接受一个 Objective-C 指针类型作为其第一个参数，并接受一个遵循 `NSCopying`\
    \ 协议的 Objective-C 指针类型作为其第二个参数。\n\n与 Objective-C 字面量一样，对象下标操作是在运行时评估的；因此，它们不是编译时常量，也不能用于初始化静态或全局变量。\n\
    \n## 自定义下标引用\n\n如前所述，对象下标运算符支持任何类型的 Objective-C 对象。编译器将这些运算符转换为消息选择器，你的代码通过实现一个或多个相应的方法来支持对象下标引用。实际上，有两种类型的下标表达式：*数组样式*\
    \ 和 *字典样式*。你在前面介绍的 `NSArray` 和 `NSDictionary` 下标操作中已经了解过这一点。总之，数组样式的下标表达式使用整数类型的下标，而字典样式的下标表达式使用\
    \ Objective-C 对象指针类型的下标（即键）。每种类型的下标表达式都使用预定义的选择器映射到消息发送操作。\n\n数组样式下标引用的实例方法如下：\n\
    \n```\n- (id)objectAtIndexedSubscript:(NSUInteger)index\n- (void)setObject:(id)anObject\
    \ atIndexedSubscript:(NSUInteger)index\n```\n\n`objectAtIndexedSubscript:` 方法检索指定索引处的值，而\
    \ `setObject:atIndexedSubscript:` 方法设置指定索引处的值。例如，给定一个名为 `Hello` 的类，它支持数组样式的下标引用，下面的赋值语句中使用了一个数组样式的下标表达式来返回值。\n\
    \n```\nid value = helloObject[2];           // helloObject 是一个 Hello 类实例\n```\n"
- fmt: "# Using Custom Subscripting in Objective-C\n\nIn this case (i.e., retrieving\
    \ a value for an associated index), the subscript expression (`helloObject[2]`)\
    \ is translated by the compiler into a message send with the selector `objectAtIndexedSubscript:`,\
    \ and is thus equivalent to the statement\n\n```\nid value = [helloObject objectAtIndexedSubscript:2];\n\
    ```\n\nIn the next example, an array-style subscript expression is used to set\
    \ a value in an assignment statement.\n\n```\nhelloObject[2] = @\"Howdy\";\n```\n\
    \nWhen setting a value via an array-style subscript expression, the expression\
    \ (in this case `helloObject[2]`) is translated by the compiler into a message\
    \ send with the selector `setObject:atIndexedSubscript:`, and is thus equivalent\
    \ to the statement\n\n```\n[helloObject setObject:@\"Howdy\" atIndexedSubscript:2];\n\
    ```\n\nThe message-send operations are type-checked and performed just like explicit\
    \ Objective-C message sends. The implementing class determines the meaning of\
    \ the index.\n\nThe instance methods for dictionary-style subscripting are\n\n\
    ```\n- (id)objectForKeyedSubscript:(id)key\n- (void)setObject:(id)anObject forKeyedSubscript:(id<NSCopying>)key\n\
    ```\n\nThese methods are analogous to the array-style subscripting methods, using\
    \ a key (of type `id`—i.e., an object pointer) instead of an index to get or set\
    \ the associated value. Given a class named `Order` that supports dictionary-style\
    \ subscripting, a dictionary-style subscript expression is used to return a value\
    \ in the following statement.\n\n```\nid item = orderObject[@\"1234\"];      //\
    \ orderObject is an Order class instance\n```\n\nIn this case, the subscript expression\
    \ (`orderObject[@\"1234\"]`) is translated by the compiler into a message send\
    \ with the selector `objectForKeyedSubscript:`, and is thus equivalent to the\
    \ statement\n\n```\nid item = [orderObject objectForKeyedSubscript:@\"1234\"];\n\
    ```\n\nConversely, a dictionary-style subscript expression is used to set a value\
    \ in the following assignment statement.\n\n```\norderObject[@\"1234\"] = @\"\
    Cheeseburger\";\n```\n\nIn this case, the subscript expression (`orderObject[@\"\
    1234\"]`) is translated by the compiler into a message send with the selector\
    \ `setObject:forKeyedSubscript:`, and is thus equivalent to the statement.\n\n\
    ```\n[orderObject setObject:@\"Cheeseburger\" forKeyedSubscript:@\"1234\"];\n\
    ```\n\nAs shown in these examples, the custom subscripting operations should be\
    \ used to get and set the elements of an object, and not for other purposes (e.g.,\
    \ appending or deleting objects, etc.). This enables the syntax to remain consistent\
    \ with its intent, and thus identical to that employed for the Foundation Framework\
    \ array and dictionary subscript operations.\n\n## Editing Register Values Using\
    \ Custom Subscripting\n\nNow you will create a program that demonstrates the use\
    \ of custom subscripting. In addition, it also features extensive use of several\
    \ Foundation Framework APIs presented in earlier chapters. The program you’ll\
    \ create is called `RegEdit` and consists of a header file along with two classes.\
    \ `RegEdit` simulates a 32-bit wide computer memory register. It supports operations\
    \ for setting and manipulating the register’s contents. The program has three\
    \ command-line inputs: the initial register settings (a 32-bit hexadecimal value),\
    \ the selected register byte to get/set, and the (optional) register (hexadecimal)\
    \ byte value to set.\n\nIn Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)\
    \ **Project …** from the Xcode File menu. In the **New Project Assistant** pane,\
    \ create a command-line application. In the **Project Options** window, specify\
    \ `RegEdit` for the Product Name, choose **Foundation** for the Project Type,\
    \ and select ARC memory management by checking the **Use Automatic Reference Counting**\
    \ check box. Specify the location in your file system where you want the project\
    \ to be created (if necessary, select **New Folder** and enter the name and location\
    \ for the folder), uncheck the **Source Control** check box, and then click the\
    \ **Create** button.\n\nFirst, you’re going to create a header file that defines\
    \ several constants used in other classes. Select **New** ![image](images/arrow.jpg)\
    \ **File …** from the Xcode File menu, select **Header File template** (from the\
    \ OS X C and C++ selection), and name the header file `RegEditConstants`. Select\
    \ the `RegEdit` folder for the files location and the `RegEdit` project as the\
    \ target, and then click the **Create** button. Next, in the Xcode project navigator\
    \ pane, select the resulting header file named `RegEditConstants.h` and update\
    \ the interface, as shown in [Listing 16-16](#9781430250500_Ch16.xhtml#list16).\n\
    \n*Listing 16-16.*  RegEditConstants Interface\n\n```\n#ifndef RegEdit_RegEditConstants_h\n\
    #define RegEdit_RegEditConstants_h\n\n#define kByteMultiplier  0xFF\n#define kRegisterSize\
    \ (sizeof(uint32))\n\n#endif\n```\n\n[Listing 16-16](#9781430250500_Ch16.xhtml#list16)\
    \ shows that the include guard prevents recursive inclusion of the header file\
    \ (necessary if the file is imported using the `#include` directive). The header\
    \ file defines two constants: `kByteMultiplier` is used to perform register bit\
    \ manipulation operations, and `kRegisterSize` defines the width (in bits) of\
    \ the register. Next, you’re going to create a class used to parse command-line\
    \ inputs for the program. Select **New** ![image](images/arrow.jpg) **File …**\
    \ from the Xcode File menu, select the **Objective-C** class template, and name\
    \ the class `CLIParser`. Make the class a subclass of `NSObject`, select the `RegEdit`\
    \ folder for the files location and the `RegEdit` project as the target, and then\
    \ click the **Create** button. In the Xcode project navigator pane, select the\
    \ resulting header file named `CLIParser.h` and update the interface, as shown\
    \ in [Listing 16-17](#9781430250500_Ch16.xhtml#list17).\n\n*Listing 16-17.*  CLIParser\
    \ Interface\n\n```\n#import <Foundation/Foundation.h>\n\n@interface CLIParser\
    \ : NSObject\n\n- (id) initWithCount:(int)argc arguments:(const char *[])argv;\n\
    - (BOOL) parseWithRegister:(uint32 *)registerValue\n                byteNumber:(NSInteger\
    \ *)byteN\n                 doSetByte:(BOOL *)doSet\n                 byteValue:(unsigned\
    \ int *)byteValue\n                     error:(NSError **)anError;\n\n@end\n```\n\
    \nThe `initWithCount:arguments:` method initializes a `CLIParser` object, setting\
    \ its state to the input parameter values. The `parseWithRegister:byteNumber:doSetByte:`\
    \ method parses the command-line inputs, setting the value of the input parameters\
    \ by indirection. The actual implementation of the class will be discussed later,\
    \ but for now let’s create the actual `RegEdit` class. Select **New** ![image](images/arrow.jpg)\
    \ **File …** from the Xcode File menu, select the **Objective-C** class template,\
    \ and name the class `RegEdit`. Make the class a subclass of `NSObject`, select\
    \ the `RegEdit` folder for the files location and the `RegEdit` project as the\
    \ target, and then click the **Create** button. Next, in the Xcode project navigator\
    \ pane, select the resulting header file named `RegEdit.h` and update the interface,\
    \ as shown in [Listing 16-18](#9781430250500_Ch16.xhtml#list18).\n\n*Listing 16-18.*\
    \  RegEdit Interface\n\n```\n#import <Foundation/Foundation.h>\n\n@interface RegEdit\
    \ : NSObject\n\n@property (readonly) uint32 regSetting;\n\n- (id) initWithValue:(uint32)value;\n\
    - (id) objectAtIndexedSubscript:(NSInteger)index;\n- (void) setObject:(id)newValue\
    \ atIndexedSubscript:(NSInteger)index;\n\n@end\n```"
