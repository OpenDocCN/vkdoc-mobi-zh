    thereby serving as a parameter of a function or method invocation. The recommended
    practice in these scenarios is to use only one block literal as a parameter to
    a function or method, and that it be the last parameter in the list (if the function/method
    has other parameters). [Listing 15-8](#9781430250500_Ch15.xhtml#list8) invokes
    an instance method (from the class interface shown in [Listing 15-1](#9781430250500_Ch15.xhtml#list1))
    that creates a block literal expression and uses it as a parameter to a method
    invocation.


    [*Listing 15-8.*](#9781430250500_Ch15.xhtml#_list8)  Block Literal Expression
    in a Method Invocation


    ```

    Calculator calc = [Calculator new];

    int value = [calc process:2

                    withBlock:^(int addend)

                    {

                      return addend + 1;

                    }];

    ```


    Many Objective-C APIs, including the Foundation Framework, contain methods that
    take a block as a parameter. Later in this chapter, you will develop several programs
    with blocks, so take your time and review this material as long as necessary until
    you thoroughly grasp the syntax.


    Blocks Are Closures!


    As stated earlier in this chapter, a block is an implementation of a *closure,*
    a function that allows access to local variables declared outside of its typical
    scope. To understand what this means, let’s take a moment to understand scope
    and visibility rules. The *visibility* of a variable refers to the portion(s)
    of a program in which it can be accessed; this is also referred to as a variable’s
    *scope*. For example, variables declared within a C function definition have local
    scope, meaning that they are visible and accessible within the function, and not
    accessible elsewhere. (Note that a function can also reference global variables.)
    A block augments the visibility of variables compared to C functions through several
    features, as follows:


    *   Support for *lexical scope*. This is the ability to reference local variables
    and parameters from an enclosing scope.

    *   `__block` variables. The `__block` keyword, applied to a variable outside
    a block but within the same lexical scope, enables this variable to be modified
    within a block.

    *   Instance variable access. A block defined within an object’s method implementation
    can access the object’s instance variables.

    *   `const` imports. Constant variables imported through a header file (via an
    `#import` or `#include` directive) are visible within a block literal expression.


    Lexical Scope


    One of the unique features of blocks is its support for lexical scoping. In contrast,
    C functions do not have access to local variables declared outside of their definition.
    The example shown in [Listing 15-9](#9781430250500_Ch15.xhtml#list9) will not
    compile because the local variable `myVar` is not visible within the `logValue`
    function definition.


    [*Listing 15-9.*](#9781430250500_Ch15.xhtml#_list9)  C Function Attempting to
    Access a Local Variable Outside Its Scope


    ```

    void logValue()

    {

      // ERROR, illegal access of myVar, not within scope

      NSLog(@"Variable value = %d", myVar);

    }


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        int myVar = 10;

        logValue();

      }

      return 0;

    }

    ```


    A block supports lexical scoping, thus a block literal expression has access to
    variables declared within the same lexical scope. In addition, blocks can be defined
    anywhere other variables can; for example, within other blocks, functions, and
    methods. C functions, on the other hand, cannot be defined within other functions
    or methods. [Listing 15-10](#9781430250500_Ch15.xhtml#list10) compiles and runs
    successfully because the variable `myVar` is declared within the same lexical
    scope as the block `logValueBlock`.


    [*Listing 15-10.*](#9781430250500_Ch15.xhtml#_list10)  Block Accessing Local Variable
    Through Lexical Scoping


    ```

    {

      int myVar = 10;

      void (^logValueBlock)(void) = ^{

        NSLog(@"Variable value = %d", myVar);

      };

      logValueBlock();

    }

    ```


    [Listing 15-10](#9781430250500_Ch15.xhtml#list10) shows that a block has access
    to local variables declared outside its definition. Specifically, these local
    variables are declared (and initialized) within an enclosing scope, *prior to*
    the block literal expression. Braces delimit a local scope; in addition scopes
    may be nested. Referring again to [Listing 15-10](#9781430250500_Ch15.xhtml#list10),
    the variable `myVar` is declared at the same scope as the block definition assigned
    to `logValueBlock`, prior to the literal expression, and thus can be used within
    the expression. On the other hand, [Listing 15-11](#9781430250500_Ch15.xhtml#list11)
    will not compile, because the local variable `myVar` is declared and initialized
    after the block literal expression.


    [*Listing 15-11.*](#9781430250500_Ch15.xhtml#_list11)  Illegal Access of Local
    Variable in Block, Declared After Block Literal Expression


    ```

    void (^logValueBlock)(void) = ^{

      // ERROR, illegal access of myVar, declared after literal expression

      NSLog(@"Variable value = %d", myVar);

    };

    int myVar = 10;

    logValueBlock();

    ```


    Local variables accessed through lexical scoping behave as constant values (for
    primitive types) or by reference variables (for objects) within a block literal
    expression. [Listing 15-12](#9781430250500_Ch15.xhtml#list12) will not compile
    because a primitive variable accessed through lexical scoping cannot be modified
    within a block literal.


    [*Listing 15-12.*](#9781430250500_Ch15.xhtml#_list12)  Block Attempting to Modify
    a Local Variable Accessed Through Lexical Scoping


    ```

    int myVar = 10;

    void (^logValueBlock)(void) = ^{

      // ERROR, lexical scope variable not assignable

      myVar = 5;

      NSLog(@"Variable value = %d", myVar);

    };

    logValueBlock();

    ```


    As local scopes can be nested, a block can capture local variables within multiple
    (nested) scopes. This is demonstrated in the code from [Listing 15-13](#9781430250500_Ch15.xhtml#list13).


    [*Listing 15-13.*](#9781430250500_Ch15.xhtml#_list13)  Block Capturing Local Variables
    Within Multiple Nested Scopes


    ```

    for (int ii=0; ii<2; ii++)

    {

      for (int jj=0; jj<3; jj++)

      {

        void (^logValueBlock)(void) = ^{

          NSLog(@"Variable values = %d, %d", ii, jj);

        };

        logValueBlock();

      }

    }

    ```


    Mutable __block Variables


    By default, block local variables accessed through lexical scoping are visible
    but not writeable within a block literal expression. The `__block` storage type
    modifier can be used to make these variables read-write (i.e., mutable). The `__block`
    modifier can be used on all supported Objective-C types, except for C variable-length
    arrays (an array with a length that is not a constant expression) and C structures
    that contain variable-length arrays. Its use cannot be combined with the existing
    local storage modifiers `auto`, `register`, and `static`. [Listing 15-14](#9781430250500_Ch15.xhtml#list14)
    illustrates the use of a `__block` variable.


    [*Listing 15-14.*](#9781430250500_Ch15.xhtml#_list14)  Correct Use of __block
    Storage


    ```

    __block int myVar = 10;

    void (^incBlock)(int) = ^(int amount){

      myVar += amount;

      NSLog(@"New value = %d", myVar);

    };

    incBlock(5);

    ```


    Variables qualified with the `__block` storage type are copied to the heap if
    the referencing block is copied to heap storage. This last point brings up the
    topic of memory management with blocks, the subject of the next section.


    Memory Management with Blocks'
  trans: "\n# 方法调用中的块字面量表达式\n\n块表达式也可以内联定义为*匿名函数*，从而作为函数或方法调用的参数。在这些场景中，推荐的做法是只使用一个块字面量作为函数或方法的参数，并且它应是参数列表中的最后一个参数（如果该函数/方法还有其他参数）。清单\
    \ 15-8 调用了一个实例方法（来自清单 15-1 所示的类接口），该方法创建了一个块字面量表达式并将其用作方法调用的参数。\n\n*清单 15-8.*\
    \ 方法调用中的块字面量表达式\n\n```\nCalculator calc = [Calculator new];\nint value = [calc\
    \ process:2\n                withBlock:^(int addend)\n                {\n    \
    \              return addend + 1;\n                }];\n```\n\n许多 Objective-C\
    \ API（包括 Foundation 框架）都包含以块作为参数的方法。在本章后面，你将会使用块开发几个程序，所以请花时间仔细阅读本材料，直到完全掌握其语法。\n\
    \n## 块就是闭包！\n\n如本章前面所述，块是*闭包*的一种实现，闭包是一种允许访问在其典型作用域之外声明的局部变量的函数。为了理解这意味着什么，我们先来了解一下作用域和可见性规则。变量的*可见性*指的是程序中可以访问该变量的部分；这也被称为变量的*作用域*。例如，在\
    \ C 函数定义内声明的变量具有局部作用域，这意味着它们在该函数内可见且可访问，但在其他地方不可访问。（注意，函数也可以引用全局变量。）与 C 函数相比，块通过以下几个特性增强了变量的可见性，具体如下：\n\
    \n- **支持词法作用域**。这是指能够从封闭作用域中引用局部变量和参数。\n- **`__block` 变量**。`__block` 关键字应用于块外部但位于同一词法作用域内的变量，可以使该变量在块内被修改。\n\
    - **实例变量访问**。在对象的方法实现中定义的块可以访问该对象的实例变量。\n- **`const` 导入**。通过头文件（通过 `#import` 或\
    \ `#include` 指令）导入的常量变量在块字面量表达式内是可见的。\n\n## 词法作用域\n\n块的独特特性之一是其对词法作用域的支持。相比之下，C\
    \ 函数无法访问在其定义之外声明的局部变量。清单 15-9 中所示的示例将无法编译，因为局部变量 `myVar` 在 `logValue` 函数定义内不可见。\n\
    \n*清单 15-9.* C 函数尝试访问其作用域外的局部变量\n\n```\nvoid logValue()\n{\n  // 错误，非法访问 myVar，不在作用域内\n\
    \  NSLog(@\"Variable value = %d\", myVar);\n}\n\nint main(int argc, const char\
    \ * argv[])\n{\n  @autoreleasepool\n  {\n    int myVar = 10;\n    logValue();\n\
    \  }\n  return 0;\n}\n```\n\n块支持词法作用域，因此块字面量表达式可以访问在同一词法作用域内声明的变量。此外，块可以像其他变量一样在任何地方定义；例如，可以在其他块、函数和方法中定义。而\
    \ C 函数则不能在其他函数或方法中定义。清单 15-10 可以成功编译和运行，因为变量 `myVar` 与块 `logValueBlock` 声明在同一个词法作用域内。\n\
    \n*清单 15-10.* 块通过词法作用域访问局部变量\n\n```\n{\n  int myVar = 10;\n  void (^logValueBlock)(void)\
    \ = ^{\n    NSLog(@\"Variable value = %d\", myVar);\n  };\n  logValueBlock();\n\
    }\n```\n\n清单 15-10 显示，块可以访问在其定义之外声明的局部变量。具体来说，这些局部变量是在封闭作用域内、*在*块字面量表达式*之前*声明（并初始化）的。花括号界定了一个局部作用域；此外，作用域可以嵌套。再次参考清单\
    \ 15-10，变量 `myVar` 在与分配给 `logValueBlock` 的块定义相同的作用域内，在字面量表达式之前声明，因此可以在该表达式内使用。另一方面，清单\
    \ 15-11 将无法编译，因为局部变量 `myVar` 是在块字面量表达式之后才声明和初始化的。\n\n*清单 15-11.* 块中非法访问在块字面量表达式之后声明的局部变量\n\
    \n```\nvoid (^logValueBlock)(void) = ^{\n  // 错误，非法访问 myVar，其在字面量表达式之后声明\n  NSLog(@\"\
    Variable value = %d\", myVar);\n};\nint myVar = 10;\nlogValueBlock();\n```\n\n\
    通过词法作用域访问的局部变量，在块字面量表达式内表现为常量值（对于基本类型）或引用变量（对于对象）。清单 15-12 将无法编译，因为通过词法作用域访问的基本类型变量不能在块字面量内被修改。\n\
    \n*清单 15-12.* 块试图修改通过词法作用域访问的局部变量\n\n```\nint myVar = 10;\nvoid (^logValueBlock)(void)\
    \ = ^{\n  // 错误，词法作用域变量不可赋值\n  myVar = 5;\n  NSLog(@\"Variable value = %d\", myVar);\n\
    };\nlogValueBlock();\n```\n\n由于局部作用域可以嵌套，块可以在多个（嵌套的）作用域内捕获局部变量。清单 15-13 中的代码演示了这一点。\n\
    \n*清单 15-13.* 块在多个嵌套作用域内捕获局部变量\n\n```\nfor (int ii=0; ii<2; ii++)\n{\n  for (int\
    \ jj=0; jj<3; jj++)\n  {\n    void (^logValueBlock)(void) = ^{\n      NSLog(@\"\
    Variable values = %d, %d\", ii, jj);\n    };\n    logValueBlock();\n  }\n}\n```\n\
    \n## 可变的 `__block` 变量\n\n默认情况下，通过词法作用域访问的块局部变量在块字面量表达式内是可见但不可写的。`__block` 存储类型修饰符可用于使这些变量可读写（即可变）。`__block`\
    \ 修饰符可用于所有支持的 Objective-C 类型，但 C 变长数组（长度不是常量表达式的数组）和包含变长数组的 C 结构体除外。它不能与现有的局部存储修饰符\
    \ `auto`、`register` 和 `static` 结合使用。清单 15-14 说明了 `__block` 变量的用法。\n\n*清单 15-14.*\
    \ 正确使用 `__block` 存储\n\n```\n__block int myVar = 10;\nvoid (^incBlock)(int) = ^(int\
    \ amount){\n  myVar += amount;\n  NSLog(@\"New value = %d\", myVar);\n};\nincBlock(5);\n\
    ```\n\n使用 `__block` 存储类型修饰的变量，如果引用它的块被复制到堆存储，则这些变量也会被复制到堆中。最后这一点引出了块的内存管理话题，这是下一节的主题。\n\
    \n## 块的内存管理\n"
- fmt: "# Block Literals and Memory Management Considerations\n\nAt runtime, a block\
    \ literal expression is allocated on the stack and thus has the same lifetime\
    \ as a local variable. As a result, it must be copied to permanent storage (i.e.,\
    \ onto the heap) to be used outside of the scope in which it is defined. For example,\
    \ if you want to return a block literal from a method or save it for later use,\
    \ then the block must be copied onto the heap and subsequently released when no\
    \ longer in use. [Listing 15-15](#9781430250500_Ch15.xhtml#list15) illustrates\
    \ a block literal that’s used outside its scope. This may result in a dangling\
    \ pointer that causes the program to crash.\n\n[*Listing 15-15.*](#9781430250500_Ch15.xhtml#_list15)\
    \ Block Literal Used Outside of Its Lexical Scope\n\n```\nvoid (^greetingBlock)(void);\n\
    {  // scope begins, local variables pushed onto stack\n  greetingBlock = ^{\n\
    \    NSLog(@\"Hello, World!\");\n  };\n}  // scope ends, stack variables (e.g.\
    \ the block literal) popped off stack\ngreetingBlock();  // Block invocation may\
    \ cause the program to crash!\n```\n\n[Listing 15-15](#9781430250500_Ch15.xhtml#list15)\
    \ shows that the block literal expression assigned to the variable `greetingBlock`\
    \ has the same lifetime as a local variable; it thus no longer exists outside\
    \ of its lexical scope. Objective-C includes copy (`Block_copy()`) and release\
    \ (`Block_release()`) operations that provide memory management for block literals.\n\
    \nThe `Block_copy()` operation copies a block literal onto the heap. It is implemented\
    \ as a function that takes a block literal reference as its parameter and returns\
    \ a block reference of the same type.\n\nThe `Block_release()` operation releases\
    \ a block literal from the heap so that its memory is reclaimed. It is implemented\
    \ as a function that takes a block reference as its parameter. A block reference\
    \ is released from the heap if it matches a corresponding block reference that\
    \ was copied to the heap; otherwise, the function call has no effect. In order\
    \ to avoid a memory leak, a `Block_copy()` call must be balanced by a corresponding\
    \ `Block_release()`. The Foundation Framework defines `copy` and `release` methods\
    \ for blocks that are the functional equivalent of the `Block_copy()` and `Block_release()`\
    \ functions. [Listing 15-16](#9781430250500_Ch15.xhtml#list16) updates the code\
    \ in [Listing 15-15](#9781430250500_Ch15.xhtml#list15) with the appropriate block\
    \ copy operations.\n\n[*Listing 15-16.*](#9781430250500_Ch15.xhtml#_list16) Using\
    \ the Block Copy and Release Methods\n\n```\nvoid (^greetingBlock)(void);\n{\n\
    \  greetingBlock = [^{\n    NSLog(@\"Hello, World!\");\n  } copy];\n}\ngreetingBlock();\
    \          // Block invocation works (uses heap storage)\n[greetingBlock release];\
    \  // released block to prevent memory leak\n```\n\nWith ARC memory management,\
    \ the compiler automatically performs the block copy and release operations as\
    \ long as the block does not return an `id` type or pass an `id` type as a parameter.\
    \ In either case, the copy and release operations must be performed manually,\
    \ as with MRR memory management. [Listing 15-17](#9781430250500_Ch15.xhtml#list17)\
    \ demonstrates the use of these operations for a block that passes an `id` type\
    \ as a parameter.\n\n[*Listing 15-17.*](#9781430250500_Ch15.xhtml#_list17) Using\
    \ the `Block_copy` and `Block_release` Functions for Blocks with an `id` Type\
    \ Parameter\n\n```\nvoid (^greetingBlock)(id salutation);\n{\n  greetingBlock\
    \ = Block_copy(^(id salutation){\n  NSLog(@\"%@, World!\", salutation);\n  });\n\
    }\ngreetingBlock(@\"Hello\");\nBlock_release(greetingBlock);\n```\n\nVariables\
    \ declared with the `__block` storage type have different semantics, depending\
    \ on whether or not MRR or ARC memory management is in use. Under MRR, `__block`\
    \ variables *are not* retained if used within a block literal; however, under\
    \ ARC, `__block` variables *are* retained if used within a block literal. What\
    \ this means is that if you are using ARC memory management and don’t want a `__block`\
    \ variable to be retained (for example, to avoid circular references), the `__weak`\
    \ storage type should also be applied to the variable."
  raw: 'At runtime, a block literal expression is allocated on the stack and thus
    has the same lifetime as a local variable. As a result, it must be copied to permanent
    storage (i.e., onto the heap) to be used outside of the scope in which it is defined.
    For example, if you want to return a block literal from a method or save it for
    later use, then the block must be copied onto the heap and subsequently released
    when no longer in use. [Listing 15-15](#9781430250500_Ch15.xhtml#list15) illustrates
    a block literal that’s used outside its scope. This may result in a dangling pointer
    that causes the program to crash.


    [*Listing 15-15.*](#9781430250500_Ch15.xhtml#_list15)  Block Literal Used Outside
    of Its Lexical Scope


    ```

    void (^greetingBlock)(void);

    {  // scope begins, local variables pushed onto stack

      greetingBlock = ^{

        NSLog(@"Hello, World!");

      };

    }  // scope ends, stack variables (e.g. the block literal) popped off stack

    greetingBlock();  // Block invocation may cause the program to crash!

    ```


    [Listing 15-15](#9781430250500_Ch15.xhtml#list15) shows that the block literal
    expression assigned to the variable `greetingBlock` has the same lifetime as a
    local variable; it thus no longer exists outside of its lexical scope. Objective-C
    includes copy (`Block_copy()`) and release (`Block_release()`) operations that
    provide memory management for block literals.


    The `Block_copy()` operation copies a block literal onto the heap. It is implemented
    as a function that takes a block literal reference as its parameter and returns
    a block reference of the same type.


    The `Block_release()` operation releases a block literal from the heap so that
    its memory is reclaimed. It is implemented as a function that takes a block reference
    as its parameter. A block reference is released from the heap if it matches a
    corresponding block reference that was copied to the heap; otherwise, the function
    call has no effect. In order to avoid a memory leak, a `Block_copy()` call must
    be balanced by a corresponding `Block_release()`. The Foundation Framework defines
    `copy` and `release` methods for blocks that are the functional equivalent of
    the `Block_copy()` and `Block_release()` functions. [Listing 15-16](#9781430250500_Ch15.xhtml#list16)
    updates the code in [Listing 15-15](#9781430250500_Ch15.xhtml#list15) with the
    appropriate block copy operations.


    [*Listing 15-16.*](#9781430250500_Ch15.xhtml#_list16)  Using the Block Copy and
    Release Methods


    ```

    void (^greetingBlock)(void);

    {

      greetingBlock = [^{

        NSLog(@"Hello, World!");

      } copy];

    }

    greetingBlock();          // Block invocation works (uses heap storage)

    [greetingBlock release];  // released block to prevent memory leak

    ```


    With ARC memory management, the compiler automatically performs the block copy
    and release operations as long as the block does not return an `id` type or pass
    an `id` type as a parameter. In either case, the copy and release operations must
    be performed manually, as with MRR memory management. [Listing 15-17](#9781430250500_Ch15.xhtml#list17)
    demonstrates the use of these operations for a block that passes an `id` type
    as a parameter.


    [*Listing 15-17.*](#9781430250500_Ch15.xhtml#_list17)  Using the Block_copy and
    Block_release Functions for Blocks with an id Type Parameter


    ```

    void (^greetingBlock)(id salutation);

    {

      greetingBlock = Block_copy(^(id salutation){

      NSLog(@"%@, World!", salutation);

      });

    }

    greetingBlock(@"Hello");

    Block_release(greetingBlock);

    ```


    Variables declared with the `__block` storage type have different semantics, depending
    on whether or not MRR or ARC memory management is in use. Under MRR, `__block`
    variables *are not* retained if used within a block literal; however, under ARC,
    `__block` variables *are* retained if used within a block literal. What this means
    is that if you are using ARC memory management and don’t want a `__block` variable
    to be retained (for example, to avoid circular references), the `__weak` storage
    type should also be applied to the variable.'
  trans: "\n# 块字面量与内存管理注意事项\n\n在运行时，块字面量表达式会在栈上分配内存，因此其生命周期与局部变量相同。因此，若要在其定义的作用域之外使用，必须将其复制到永久存储区（即堆上）。例如，如果要从方法中返回块字面量或将其保存供以后使用，则必须将该块复制到堆上，并在不再使用时释放。代码清单\
    \ 15-15 演示了一个在其作用域之外使用的块字面量。这可能导致野指针，进而使程序崩溃。\n\n*代码清单 15-15* 在其词法作用域之外使用的块字面量\n\
    \n```\nvoid (^greetingBlock)(void);\n{  // 作用域开始，局部变量压入栈\n  greetingBlock = ^{\n\
    \    NSLog(@\"Hello, World!\");\n  };\n}  // 作用域结束，栈变量（例如该块字面量）弹出栈\ngreetingBlock();\
    \  // 调用该块可能导致程序崩溃！\n```\n\n代码清单 15-15 展示了赋值给变量 `greetingBlock` 的块字面量表达式与局部变量具有相同的生命周期；因此，在其词法作用域之外，该表达式不再存在。Objective-C\
    \ 提供了 copy（`Block_copy()`）和 release（`Block_release()`）操作，用于对块字面量进行内存管理。\n\n`Block_copy()`\
    \ 操作将块字面量复制到堆上。它被实现为一个函数，该函数接受一个块字面量引用作为参数，并返回一个相同类型的块引用。\n\n`Block_release()`\
    \ 操作从堆上释放块字面量，从而回收其内存。它被实现为一个函数，该函数接受一个块引用作为参数。如果该块引用与之前复制到堆上的某个块引用匹配，则从堆上释放该块引用；否则，该函数调用不产生任何效果。为了避免内存泄漏，`Block_copy()`\
    \ 调用必须与对应的 `Block_release()` 调用成对出现。Foundation 框架为块定义了 `copy` 和 `release` 方法，这些方法在功能上等同于\
    \ `Block_copy()` 和 `Block_release()` 函数。代码清单 15-16 使用适当的块复制操作更新了代码清单 15-15 中的代码。\n\
    \n*代码清单 15-16* 使用块的 Copy 和 Release 方法\n\n```\nvoid (^greetingBlock)(void);\n{\n\
    \  greetingBlock = [^{\n    NSLog(@\"Hello, World!\");\n  } copy];\n}\ngreetingBlock();\
    \          // 调用块正常工作（使用堆存储）\n[greetingBlock release];  // 释放块以防止内存泄漏\n```\n\n\
    在使用 ARC 内存管理时，只要块不返回 `id` 类型或传递 `id` 类型的参数，编译器就会自动执行块的复制和释放操作。在这两种情况下，都需要像 MRR\
    \ 内存管理那样手动执行复制和释放操作。代码清单 15-17 演示了如何为传递 `id` 类型参数的块使用这些操作。\n\n*代码清单 15-17* 为带有\
    \ `id` 类型参数的块使用 `Block_copy` 和 `Block_release` 函数\n\n```\nvoid (^greetingBlock)(id\
    \ salutation);\n{\n  greetingBlock = Block_copy(^(id salutation){\n  NSLog(@\"\
    %@, World!\", salutation);\n  });\n}\ngreetingBlock(@\"Hello\");\nBlock_release(greetingBlock);\n\
    ```\n\n使用 `__block` 存储类型声明的变量，其语义会因是否使用 MRR 或 ARC 内存管理而有所不同。在 MRR 下，如果在块字面量中使用\
    \ `__block` 变量，*不会*保留该变量；然而在 ARC 下，如果在块字面量中使用 `__block` 变量，*会*保留该变量。这意味着，如果你正在使用\
    \ ARC 内存管理，并且不希望保留某个 `__block` 变量（例如，为了避免循环引用），则还应对该变量应用 `__weak` 存储类型。\n"
- fmt: "# Using Blocks\n\nNow that you understand the syntax for coding blocks and\
    \ some of the key concerns with respect to their semantics and memory management,\
    \ you can begin exploring how to best use blocks in your code. Apple developed\
    \ blocks for use with Grand Central Dispatch (GCD) to support concurrent programming,\
    \ and these APIs use blocks to schedule code for execution (GCD is covered in\
    \ more detail in [Chapter 17](#9781430250500_Ch17.xhtml)). However, there are\
    \ many other ways to use blocks, both within existing APIs and in your own classes.\
    \ In general, blocks are most naturally used to implement small, self-contained\
    \ pieces of code that encapsulate units of work. They are typically executed concurrently\
    \ (for example, via GCD) over the items of a collection or as a callback when\
    \ an operation has finished. Because blocks can be defined inline, they can eliminate\
    \ the need to create entirely separate classes and methods for context-sensitive\
    \ code, such as asynchronous completion handlers. They also enable related code\
    \ to be kept together, and not scattered among multiple files. As noted before,\
    \ many Apple APIs (and an increasing number of third-party APIs) now use blocks.\
    \ The next few sections will demonstrate these common usage scenarios as you implement\
    \ several programs that use blocks.\n\n## Sorting an Array Using Blocks\n\nNow\
    \ you will create a program that demonstrates array sorting using blocks. In Xcode,\
    \ create a new project by selecting **New ![image](images/arrow.jpg) Project .\
    \ . .** from the Xcode File menu. In the **New Project Assistant** pane, create\
    \ a command-line application. In the **Project Options** window, specify **BlockArraySorter**\
    \ for the Product Name, choose **Foundation** for the Project Type, and select\
    \ ARC memory management by checking the **Use Automatic Reference Counting** check\
    \ box. Specify the location in your file system where you want the project to\
    \ be created (if necessary, select **New Folder** and enter the name and location\
    \ for the folder), uncheck the **Source Control** check box, and then click the\
    \ **Create** button.\n\nIn the Xcode project navigator, select the `main.m` file\
    \ and update the file, as shown in [Listing 15-18](#9781430250500_Ch15.xhtml#list18).\n\
    \n*Listing 15-18.* BlockArraySorter main.m File\n\n```\n#import <Foundation/Foundation.h>\n\
    #include <stdlib.h>\n\n#define ArrayElements 10\n\nint main(int argc, const char\
    \ * argv[])\n{\n  @autoreleasepool\n  {\n    // Create an array of numbers with\
    \ random values (0-99)\n    NSMutableArray *numbers = [NSMutableArray arrayWithCapacity:ArrayElements];\n\
    \    for (int elem=0; elem<ArrayElements; elem++)\n    {\n      unsigned int value\
    \ = arc4random() % 100;\n      [numbers addObject:[NSNumber numberWithUnsignedInt:value]];\n\
    \    }\n    NSLog(@\"Values: %@\", numbers);      // Log the numbers unsorted\n\
    \n    // Sort the array of numbers in ascending order\n    [numbers sortUsingComparator:^(id\
