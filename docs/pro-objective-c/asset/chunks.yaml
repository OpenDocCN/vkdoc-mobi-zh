- fmt: "# Proper Formatting of Markdown Document\n\nHaving to go through all of this\
    \ trouble to code values for simple datatypes would quickly discourage you from\
    \ programming. Thus the advantages of literal notation are self-evident. Now this\
    \ may seem pretty obvious to you. After all, don’t all programming languages support\
    \ coding literal values? Well, in fact, the extent of support for literal notation\
    \ differs among the various languages.\n\nTraditionally, the Objective-C language\
    \ has provided support for literal notation of primitive/scalar types (i.e., `int`,\
    \ `float`, `Boolean` types), along with text strings (`NSString` instances). Objective-C\
    \ Literals enable the creation of object literals; specifically, `NSNumber` literals,\
    \ collection literals, (boxed) expression literals, and (boxed) C-string literals.\
    \ In the next few sections, you will learn how to use these object literals in\
    \ code.\n\n## NSNumber Literals\n\nYou may recall that [Chapter 10](#9781430250500_Ch10.xhtml)\
    \ provided a brief overview of `NSNumber` literals. To recap, the Foundation Framework\
    \ class `NSNumber` is a container for primitive (i.e., scalar) types. An instance\
    \ of `NSNumber` provides an object wrapper of a scalar value (integer value, floating-point\
    \ value, or Boolean value). `NSNumber` objects are useful in a variety of scenarios;\
    \ for example, with the Foundation Framework collection classes that can’t hold\
    \ primitive types. However, the creation and initialization of an `NSNumber` requires\
    \ the use of the `NSNumber` APIs, which can be tedious for cases with a lot of\
    \ objects (e.g., a collection class initialized with many `NSNumber` objects).\n\
    \nAn `NSNumber` literal uses a simple notation for creating and initializing an\
    \ `NSNumber` object from a scalar literal expression, its syntax is\n\n```\n@ScalarValue\n\
    ```\n\nThe literal begins with the ampersand (`@`) symbol, followed by a `ScalarValue`\
    \ that represents any character, numeric, or Boolean literal value. [Listing 16-2](#9781430250500_Ch16.xhtml#list2)\
    \ demonstrates the use of `NSNumber` literals in a statement that creates an `NSArray`\
    \ object named `numbers`.\n\n*[Listing 16-2.](#9781430250500_Ch16.xhtml#_list2)*\
    \  Creating an `NSArray` Instance Using `NSNumber` Literals\n\n```\nNSArray *numbers\
    \ = [NSArray arrayWithObjects:@'A', @YES, @-3, @21U, @250L,\n                \
    \    @9876543210LL, @3.14F, @-52.687, nil];\n```\n\nThe use of `NSNumber` literals\
    \ in the preceding statement greatly simplifies the amount of code you have to\
    \ write, thereby reducing the chance for errors. So that’s all well and good,\
    \ but you may be wondering, how does this all work? Well, the compiler translates\
    \ each `NSNumber` literal into a convenience constructor that creates the corresponding\
    \ `NSNumber` instance at runtime. In effect, the following two expressions are\
    \ equivalent:\n\n```\n@17\n[NSNumber numberWithInt:17]\n```\n\nThe same is true\
    \ for scalar data types with modifiers; the next two expressions are also equivalent:\n\
    \n```\n@3.14f\n[NSNumber numberWithFloat:3.14]\n```\n\nSo when you write the `NSNumber`\
    \ literal `@17` in code, the compiler translates that into the expression `[NSNumber\
    \ numberWithInt:17]`. In effect, the literal notation is a shortcut for an `NSNumber`\
    \ object creation.\n\nAs `NSNumber` literals are, in effect, `NSNumber` objects,\
    \ they have available the full range of `NSNumber` APIs; for example, the following\
    \ statement compares the values of two `NSNumber` literals.\n\n```\nNSComparisonResult\
    \ comparison = [@17 compare:@16];\n```\n\nNote that `NSNumber` literal objects\
    \ are created from scalar values, not expressions. Also be aware that `NSNumber`\
    \ literals are evaluated at runtime; as such, they are not compile-time constants\
    \ and hence cannot be used to initialize static or global variables. The following\
    \ statement will not compile:\n\n```\nstatic NSNumber *badNumber = @0;       \
    \       // ERROR!\n```\n\n## Container Literals\n\nObjective-C provides support\
    \ for the creation of a variety of container literals; specifically, literal notation\
    \ for arrays and dictionaries (i.e., `NSArray` and `NSDictionary` objects).\n\n\
    ### NSArray Literals"
  raw: 'Having to go through all of this trouble to code values for simple datatypes
    would quickly discourage you from programming. Thus the advantages of literal
    notation are self-evident. Now this may seem pretty obvious to you. After all,
    don’t all programming languages support coding literal values? Well, in fact,
    the extent of support for literal notation differs among the various languages.


    Traditionally, the Objective-C language has provided support for literal notation
    of primitive/scalar types (i.e., `int`, `float`, `Boolean` types), along with
    text strings (`NSString` instances). Objective-C Literals enable the creation
    of object literals; specifically, NSNumber literals, collection literals, (boxed)
    expression literals, and (boxed) C-string literals. In the next few sections,
    you will learn how to use these object literals in code.


    NSNumber Literals


    You may recall that [Chapter 10](#9781430250500_Ch10.xhtml) provided a brief overview
    of NSNumber literals. To recap, the Foundation Framework class `NSNumber` is a
    container for primitive (i.e., scalar) types. An instance of `NSNumber` provides
    an object wrapper of a scalar value (integer value, floating-point value, or Boolean
    value). `NSNumber` objects are useful in a variety of scenarios; for example,
    with the Foundation Framework collection classes that can’t hold primitive types.
    However, the creation and initialization of an `NSNumber` requires the use of
    the `NSNumber` APIs, which can be tedious for cases with a lot of objects (e.g.,
    a collection class initialized with many `NSNumber` objects).


    An NSNumber literal uses a simple notation for creating and initializing an `NSNumber`
    object from a scalar literal expression, its syntax is


    ```

    @ScalarValue

    ```


    The literal begins with the ampersand (`@`) symbol, followed by a `ScalarValue`
    that represents any character, numeric, or Boolean literal value. [Listing 16-2](#9781430250500_Ch16.xhtml#list2)
    demonstrates the use of NSNumber literals in a statement that creates an `NSArray`
    object named `numbers`.


    [*Listing 16-2.*](#9781430250500_Ch16.xhtml#_list2)  Creating an NSArray Instance
    Using NSNumber Literals


    ```

    NSArray *numbers = [NSArray arrayWithObjects:@''A'', @YES, @-3, @21U, @250L,

                        @9876543210LL, @3.14F, @-52.687, nil];

    ```


    The use of NSNumber literals in the preceding statement greatly simplifies the
    amount of code you have to write, thereby reducing the chance for errors. So that’s
    all well and good, but you may be wondering, how does this all work? Well, the
    compiler translates each NSNumber literal into a convenience constructor that
    creates the corresponding `NSNumber` instance at runtime. In effect, the following
    two expressions are equivalent:


    ```

    @17

    [NSNumber numberWithInt:17]

    ```


    The same is true for scalar data types with modifiers; the next two expressions
    are also equivalent:


    ```

    @3.14f

    [NSNumber numberWithFloat:3.14]

    ```


    So when you write the NSNumber literal `@17` in code, the compiler translates
    that into the expression `[NSNumber numberWithInt:17]`. In effect, the literal
    notation is a shortcut for an `NSNumber` object creation.


    As NSNumber literals are, in effect, `NSNumber` objects, they have available the
    full range of `NSNumber` APIs; for example, the following statement compares the
    values of two NSNumber literals.


    ```

    NSComparisonResult comparison = [@17 compare:@16];

    ```


    Note that NSNumber literal objects are created from scalar values, not expressions.
    Also be aware that NSNumber literals are evaluated at runtime; as such, they are
    not compile-time constants and hence cannot be used to initialize static or global
    variables. The following statement will not compile:


    ```

    static NSNumber *badNumber = @0;              // ERROR!

    ```


    Container Literals


    Objective-C provides support for the creation of a variety of container literals;
    specifically, literal notation for arrays and dictionaries (i.e., `NSArray` and
    `NSDictionary` objects).


    NSArray Literals'
  trans: "\n# Markdown 文档的规范格式\n\n如果需要通过编码为简单数据类型赋值而经历所有这些麻烦，这会很快打消你编程的积极性。因此，字面量表示法的优势不言而喻。现在，这对你来说可能显而易见。毕竟，难道不是所有编程语言都支持编码字面量值吗？事实上，不同语言对字面量表示法的支持程度各不相同。\n\
    \n传统上，Objective-C 语言为基本/标量类型（即 `int`、`float`、`Boolean` 类型）以及文本字符串（`NSString` 实例）提供了字面量表示法支持。Objective-C\
    \ 字面量支持创建对象字面量；具体来说，包括 `NSNumber` 字面量、集合字面量、（装箱后的）表达式字面量以及（装箱后的）C 字符串字面量。在接下来的几节中，你将学会如何在代码中使用这些对象字面量。\n\
    \n## NSNumber 字面量\n\n你可能还记得，第 10 章 简要介绍了 `NSNumber` 字面量。回顾一下，Foundation 框架中的 `NSNumber`\
    \ 类是一个用于存放基本（即标量）类型的容器。`NSNumber` 实例为标量值（整型值、浮点值或布尔值）提供了对象包装器。`NSNumber` 对象在多种场景下非常有用；例如，与无法容纳基本类型的\
    \ Foundation 框架集合类一起使用时。然而，创建和初始化 `NSNumber` 需要使用 `NSNumber` API，当需要处理大量对象时（例如，用许多\
    \ `NSNumber` 对象初始化的集合类）会变得繁琐。\n\n`NSNumber` 字面量使用一种简单的表示法，从标量字面量表达式创建并初始化 `NSNumber`\
    \ 对象，其语法如下：\n\n```\n@标量值\n```\n\n该字面量以 `@` 符号开头，后跟一个 `标量值`，该值表示任意字符、数值或布尔字面量值。代码清单\
    \ 16-2 演示了如何在使用 `NSNumber` 字面量的语句中创建一个名为 `numbers` 的 `NSArray` 对象。\n\n*代码清单 16-2.*\
    \  使用 `NSNumber` 字面量创建 `NSArray` 实例\n\n```\nNSArray *numbers = [NSArray arrayWithObjects:@'A',\
    \ @YES, @-3, @21U, @250L,\n                    @9876543210LL, @3.14F, @-52.687,\
    \ nil];\n```\n\n在前述语句中使用 `NSNumber` 字面量极大地简化了需要编写的代码量，从而减少了出错的可能性。这看起来很不错，但你可能会好奇，这一切是如何运作的呢？实际上，编译器会将每个\
    \ `NSNumber` 字面量转换为一个便捷构造器，该构造器在运行时创建相应的 `NSNumber` 实例。实际上，以下两个表达式是等价的：\n\n```\n\
    @17\n[NSNumber numberWithInt:17]\n```\n\n对于带修饰符的标量数据类型也是如此；以下两个表达式也是等价的：\n\n```\n\
    @3.14f\n[NSNumber numberWithFloat:3.14]\n```\n\n因此，当你在代码中编写 `NSNumber` 字面量 `@17`\
    \ 时，编译器会将其转换为表达式 `[NSNumber numberWithInt:17]`。实际上，字面量表示法是 `NSNumber` 对象创建的快捷方式。\n\
    \n由于 `NSNumber` 字面量实际上就是 `NSNumber` 对象，因此它们拥有完整的 `NSNumber` API；例如，以下语句比较了两个 `NSNumber`\
    \ 字面量的值：\n\n```\nNSComparisonResult comparison = [@17 compare:@16];\n```\n\n请注意，`NSNumber`\
    \ 字面量对象是从标量值生成的，而不是表达式。同时要注意，`NSNumber` 字面量是在运行时计算的；因此，它们不是编译时常量，不能用于初始化静态或全局变量。以下语句将无法编译：\n\
    \n```\nstatic NSNumber *badNumber = @0;              // 错误！\n```\n\n## 容器字面量\n\
    \nObjective-C 支持创建多种容器字面量；具体来说，包括数组和字典的字面量表示法（即 `NSArray` 和 `NSDictionary` 对象）。\n\
    \n### NSArray 字面量\n"
- fmt: '# Chapter 10: NSArray Literals


    [Chapter 10](#9781430250500_Ch10.xhtml) provided a brief overview of `NSArray`
    literals. This notation simplifies the creation of `NSArray` instances. The syntax
    for an array literal is


    ```

    @[firstObj, secondObj, ...]

    ```


    An `NSArray` literal begins with an ampersand (`@`) symbol, followed by a comma-separated
    list of objects enclosed in brackets. The list of objects *is not* terminated
    with a `nil`. As with the `NSArray` APIs, the objects of the array must be Objective-C
    object pointer types, including other Objective-C Literals (`NSNumber` literals,
    `NSArray` literals, etc.). [Listing 16-3](#9781430250500_Ch16.xhtml#list3) modifies
    the example shown in [Listing 16-2](#9781430250500_Ch16.xhtml#list2), this time
    using array literal notation to create an `NSArray` object.


    **[*Listing 16-3.*](#9781430250500_Ch16.xhtml#_list3)  Creating an NSArray Literal**


    ```

    NSArray *numbers = @[@''A'', @YES, @-3, @21U, @250L,

                        @9876543210LL, @3.14F, @-52.687];

    ```


    Array literals can be nested, thereby enabling the creation of arrays within arrays.
    [Listing 16-4](#9781430250500_Ch16.xhtml#list4) demonstrates the creation of a
    nested `NSArray` literal.


    **[*Listing 16-4.*](#9781430250500_Ch16.xhtml#_list4)  Nested NSArray Literals**


    ```

    NSArray *groups = @[@[@0, @1, @2], @[@"alpha", @"beta"]];

    ```


    As the previous examples demonstrate, `NSArray` literal notation both simplifies
    the creation of arrays and reduces programmer errors.


    The compiler translates each `NSArray` literal into the `NSArray` convenience
    constructor `arrayWithObjects:count:`. This method is invoked at runtime to create
    the corresponding `NSArray` instance. In effect, the `NSArray` literal


    ```

    @[@"Hello", @"World"];

    ```


    is equivalent to the code fragment shown in [Listing 16-5](#9781430250500_Ch16.xhtml#list5).


    **[*Listing 16-5.*](#9781430250500_Ch16.xhtml#_list5)  Creating an NSArray Instance
    (Without Array Literal Notation)**


    ```

    NSString *strings[2];

    strings[0] = @"Hello";

    strings[1] = @"World";

    [NSArray arrayWithObjects:strings count:2];

    ```


    Array literal notation is used to create immutable array instances. You can create
    a mutable array (e.g., an `NSMutableArray`) from an array literal by sending it
    a `mutableCopy` message, as follows.


    ```

    NSMutableArray *mutableWords = [@[@"Hello", @"World"] mutableCopy];

    ```


    # NSDictionary Literals


    Objective-C also provides support for creating `NSDictionary` literals. The syntax
    for a dictionary literal is


    ```

    @{keyObj:valueObj, ...}

    ```


    An `NSDictionary` literal begins with an ampersand symbol, followed by one or
    more comma-separated key-value pairs, all enclosed in braces. For each key-value
    pair, a colon is placed between the key and its corresponding value. Each key
    must be an object pointer type that conforms to the `NSCopying` protocol, and
    each value must be an object pointer type. Neither keys nor values in a dictionary
    literal can have a `nil` value; `NSNull` must be used to represent null objects
    in a container. [Listing 16-6](#9781430250500_Ch16.xhtml#list6) creates a simple
    dictionary literal with two entries—an order for one cheeseburger and an order
    for two hot dogs.


    **[*Listing 16-6.*](#9781430250500_Ch16.xhtml#_list6)  Creating an NSDictionary
    Literal**


    ```

    NSDictionary *orders = @{@1111:@"1 Cheeseburger",

                             @1112:@"2 Hot dogs"};

    ```


    Notice that the `NSDictionary` literal syntax for key-value pairs is key:value,
    whereas the standard `NSDictionary` APIs use a value, key syntax for creating
    a dictionary instance (e.g., the `NSDictionary` method `dictionaryWithObjects:forKeys:`).
    As with array literals, dictionary literals can be nested; that is, the value
    in the key-value pair can be a container instance (including another `NSDictionary`
    literal). [Listing 16-7](#9781430250500_Ch16.xhtml#list7) demonstrates the creation
    of a nested `NSDictionary` literal (`currentOrders`) with two entries, where the
    value for each entry is an `NSDictionary` literal.


    **[*Listing 16-7.*](#9781430250500_Ch16.xhtml#_list7)  Nested NSDictionary Literal**


    ```

    NSDictionary *order1 = @{@1111:@"1 Cheeseburger",

                             @1112:@"2 Hot dogs"};

    NSDictionary *order2 = @{@1113:@"1 large cheese pizza"};

    NSDictionary *currentOrders = @{@"table1":order1, @"table2":order2};

    ```


    The compiler translates each `NSDictionary` literal expression into the `NSDictionary`
    convenience constructor `dictionaryWithObjects:forKeys:count:`. This method is
    invoked at runtime to create the corresponding `NSDictionary` instance—in effect,
    the following dictionary literal:


    ```

    @{@1111:@"1 Cheeseburger"}

    ```


    is equivalent to the code fragment shown in [Listing 16-8](#9781430250500_Ch16.xhtml#list8).


    **[*Listing 16-8.*](#9781430250500_Ch16.xhtml#_list8)  Creating an NSDictionary
    Instance (Without Dictionary Literal Notation)**


    ```

    NSString *values[1];

    values[0] = @"1 Cheeseburger";

    NSNumber *keys[1];

    keys[0] = @1111;

    [NSDictionary dictionaryWithObjects:values forKeys:keys count:1];

    ```


    Dictionary literal notation is used to create immutable dictionary instances.
    As specified with array literals, you can create a mutable dictionary (e.g., an
    `NSMutableDictionary`) from a dictionary literal by sending it a `mutableCopy`
    message.


    # Expression Literals


    Expression literals, also known as *boxed expressions*, enable you to create literals
    from parentheses-enclosed expressions. The syntax of an expression literal is


    ```

    @( <expression> )

    ```


    The expression evaluates to either a scalar (numeric, enumerations, `BOOL`) or
    C-string pointer type. The type of the resultant object corresponds to the type
    of the expression. Scalar types produce `NSNumber` instances and C strings produce
    `NSString` objects using UTF-8 character encoding. The following statement creates
    an `NSNumber` instance using a boxed expression.


    ```

    NSNumber *degrees2Radians = @( M_PI / 180.0 );

    ```


    In the preceding example, the arithmetic expression `M_PI/180.0` is evaluated
    and the result is *boxed*; that is, it is used to create an `NSNumber` instance.
    The equivalent statement for this boxed expression is


    ```

    NSNumber *degrees2Radians = [NSNumber numberWithDouble:(M_PI / 180.0)];

    ```


    The next example creates an `NSString` instance using a boxed expression.


    ```

    NSString *currentUser = @(getenv("USER"));

    ```


    The `getenv()` function retrieves the value of an environment variable, where
    the input parameter is the name of the variable to be retrieved. The return value
    to the function is a pointer to a C string.


    Although enumerations are typically used to define constant scalar values, they
    cannot be used directly to create `NSNumber` literals; for example, the following
    attempt to create an `NSNumber` literal from an enum (shown in [Listing 16-9](#9781430250500_Ch16.xhtml#list9))
    will not compile.


    **[*Listing 16-9.*](#9781430250500_Ch16.xhtml#_list9)  Attempt to Create an NSNumber
    Literal from an enum**


    ```

    enum

    {

      Zero = 0,

      One

    };

    NSNumber *zeroNumber = @Zero;      // Error!

    ```


    Instead, an enum value must be placed inside an expression literal (i.e., a *boxed
    enum*) to create an `NSNumber` instance. [Listing 16-10](#9781430250500_Ch16.xhtml#list10)
    corrects the example shown in [Listing 16-9](#9781430250500_Ch16.xhtml#list9)
    to create an `NSNumber` instance from a boxed enum.


    **[*Listing 16-10.*](#9781430250500_Ch16.xhtml#_list10)  Creating an NSNumber
    from a Boxed enum**


    ```

    enum

    {

      Zero = 0,

      One

    };

    NSNumber *zeroNumber = @(Zero);      // Correct!

    ```


    If an enum has a *fixed underlying type* (i.e., it specifies the type used to
    store its values), the `NSNumber` instance will be created with the corresponding
    type. The example shown in [Listing 16-11](#9781430250500_Ch16.xhtml#list11) creates
    an `NSNumber` instance from a boxed enum; as the enumeration is of type `unsigned
    int`, the `NSNumber` instance is created with the corresponding type.


    **[*Listing 16-11.*](#9781430250500_Ch16.xhtml#_list11)  Creating an NSNumber
    from a Boxed enum with a Fixed Underlying Type**'
