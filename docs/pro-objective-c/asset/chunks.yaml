  raw: 'Each method specifies a selector for a method on the receiver object that
    will be invoked with a thread. This method is also known as a *thread entry-point
    routine*. The selector message is queued on the run loop of the thread, and the
    method is executed on the thread as part of the run loop’s standard processing.
    These message-passing methods enable you to specify whether the thread is invoked
    asynchronously or synchronously. Synchronous invocation results in the current
    thread blocking until the method finishes execution. Because these methods are
    defined for the `NSObject` class, they are provided for all classes that descend
    from `NSObject` (i.e., the majority of the Foundation Framework APIs and most
    of the custom classes that you will implement). [Listing 17-3](#9781430250500_Ch17.xhtml#list3)
    depicts use of the `performSelector:onThread:` method to asynchronously invoke
    the `downloadTask` method on a thread named `secondaryThread`, where this method
    is defined for a custom class named `ConcurrentProcessor`.


    [*Listing 17-3.*](#9781430250500_Ch17.xhtml#_list3)  NSObject performSelector:onThread:withObject:waitUntilDone:
    Method Invocation


    ```

    ConcurrentProcessor *processor = [ConcurrentProcessor new];

    [processor performSelector:@selector(downloadTask)

                      onThread:secondaryThread

                    withObject:nil

                 waitUntilDone:NO];

    ```


    As shown in [Listing 17-3](#9781430250500_Ch17.xhtml#list3), the `waitUntilDone:`
    parameter specifies asynchronous/synchronous operation. In this example, the input
    value is set to `NO`, thus the current thread returns immediately.


    When you create a thread, you can configure portions of its runtime environment
    (e.g., stack size, thread-local storage, thread priority, etc.). It is also important
    to configure the thread context appropriately by implementing the thread entry-point
    routine with the following functionality (as necessary):


    *   *An autorelease pool*: An autorelease pool should be created at the beginning
    of the entry-point routine, and destroyed at the end of the routine.

    *   *An exception handler*: If the application catches and handles exceptions,
    the entry-point routine should be configured to catch any exceptions that can
    occur. [Chapter 14](#9781430250500_Ch14.xhtml) discusses the Objective-C mechanisms
    for exception handling.

    *   *A run loop*: In order to have a thread process requests dynamically as they
    arrive, you can setup a run loop in the entry-point routine. [Chapter 11](#9781430250500_Ch11.xhtml)
    covers the use of the Foundation Framework `NSRunLoop` class.


    [Listing 17-4](#9781430250500_Ch17.xhtml#list4), the `ConcurrentProcessor downloadTask`
    method, demonstrates implementation of an entry-point routine per the guidelines
    documented earlier.


    [*Listing 17-4.*](#9781430250500_Ch17.xhtml#_list4)  ConcurrentProcessor downloadTask
    Method


    ```

    @implementation ConcurrentProcessor

    ...

    - (void)downloadTask

    {

      @autoreleasepool

      {

        NSURL *url = [NSURL URLWithString:@"http://www.apress.com"];

        NSString *str = [NSString stringWithContentsOfURL:url

                                                 encoding:NSUTF8StringEncoding

                                                    error:nil];

        NSLog(@"URL Contents:\n%@", str);

        self.isLoaded = YES;

      }

    }

    @end

    ```


    The NSObject `performSelectorOnMainThread:` methods are typically used to return
    values (status, results, etc.) from secondary thread objects to main (application)
    thread objects. This enables the implementation of communication between secondary
    threads and the main thread. This API is especially important for objects (such
    as those of the UIKit) that should only be used from the application’s main thread.


    Threads


    As mentioned earlier in this chapter, a thread is a logical control flow that
    executes within the context of a single process. The Apple OS X and iOS operating
    systems provide direct support for the creation, management, and execution of
    threads. At the application layer, the Foundation Framework provides APIs for
    creating and managing threads, and also a collection of APIs to synchronize shared
    data access between concurrent threads.


    NSObject Threads


    The `NSObject` method `performSelectorInBackground:withObject:` enables you to
    implicitly create and start a new thread that is used to execute a method on an
    object. The thread begins immediately as a secondary background thread, and the
    current thread returns immediately.


    [Listing 17-5](#9781430250500_Ch17.xhtml#list5) depicts use of the `performSelectorInBackground:withObject:`
    method to asynchronously invoke the `downloadTask` method, on an instance of the
    `ConcurrentProcessor` class.


    [*Listing 17-5.*](#9781430250500_Ch17.xhtml#_list5)  NSObject performSelectorInBackground:withObject:
    Method Invocation


    ```

    ConcurrentProcessor *processor = [ConcurrentProcessor new];

    [processor performSelectorInBackground:@selector(downloadTask)

                                withObject:nil];

    while (!processor.isLoaded)

      ;

    ```


    This method provides a simple mechanism for executing a method on an object with
    a new background thread. As noted earlier, the thread instance is created implicitly,
    hence you do not use the thread APIs directly. The thread’s context should be
    configured in the method (the thread’s entry-point routine), with an autorelease
    pool, an exception handler, and a run loop, as necessary.


    NSThread


    The `NSThread` class provides APIs that can be used to *explicitly* create and
    manage threads. The class includes methods to create and initialize an `NSThread`
    object (attached to an object instance method), start and stop a thread, configure
    a thread, and query a thread and its execution environment.


    The `NSThread` APIs to create and initialize a thread are


    *   `detachNewThreadSelector:toTarget:withObject:`

    *   `initWithTarget:selector:object:`


    The `detachNewThreadSelector:toTarget:withObject: class` method creates and starts
    a new thread. Its input parameters are the selector to use as the thread entry-point
    and the target of the selector on the new thread. [Listing 17-6](#9781430250500_Ch17.xhtml#list6)
    modifies the code in [Listing 17-5](#9781430250500_Ch17.xhtml#list5) to invoke
    the `downloadTask` method on a thread using the `detachNewThreadSelector:toTarget:withObject:`
    method.


    [*Listing 17-6.*](#9781430250500_Ch17.xhtml#_list6)  Using the NSThread detachNewThreadSelector:toTarget:withObject:
    Method


    ```

    ConcurrentProcessor *processor = [ConcurrentProcessor new];

    [NSThread detachNewThreadSelector:@selector(downloadTask)

                             toTarget:processor

                           withObject:nil];

    ```


    This method both creates the new thread and invokes the receiver’s entry-point
    routine (i.e., the method mapped to its selector). The `detachNewThreadSelector:toTarget:withObject:`
    method is functionally equivalent to the NSObject `performSelectorInBackground:withObject:`
    method. The NSThread `initWithTarget:selector:object:` method, by contrast, creates
    a new thread object but does not start it. The NSThread `start` instance method
    is invoked on an initialized thread to begin executing the receiver’s entry-point
    routine, as shown in [Listing 17-7](#9781430250500_Ch17.xhtml#list7).


    [*Listing 17-7.*](#9781430250500_Ch17.xhtml#_list7)  Using the NSThread initWithTarget:selector:object:
    Method


    ```

    ConcurrentProcessor *processor = [ConcurrentProcessor new];

    NSThread *computeThread = [[NSThread alloc] initWithTarget:processor

                                                      selector:@selector(computeTask:)

                                                        object:nil];

    [computeThread setThreadPriority:0.5];

    [computeThread start];

    ```'
