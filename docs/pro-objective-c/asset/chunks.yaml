  raw: 'OK, so this is great: Objective-C (and the Foundation Framework) provides
    everything you need to create objects. But what about initialization? Well, Objective-C
    also provides mechanisms to initialize newly created objects. You’ll look at these
    next.


    Object Initialization


    The `alloc` method allocates storage for an object and sets its instance variables
    to zero, but it doesn’t initialize the object’s instance variables to appropriate
    values nor does it prepare any other necessary objects or resources needed by
    the object. Therefore, your classes should implement a method to complete the
    initialization process. `NSObject` implements an `init` method that provides the
    foundation for object initialization, and at a minimum, your classes should override
    this method to provide any custom initialization behavior required for them. The
    syntax for the `NSObject init` method is


    ```

    - (id) init

    ```


    Notice that `init` is an instance method, and like the `alloc` method, it returns
    objects of type `id` that are related result types. Remember the `init` method
    you developed in [Chapter 2](#9781430250500_Ch02.xhtml) for the `Atom` class?
    It’s shown in [Listing 3-1](#9781430250500_Ch03.xhtml#list1).


    [*Listing 3-1.*](#9781430250500_Ch03.xhtml#_list1)   Atom Class init Method


    ```

    - (id) init

    {

      if ((self = [super init]))

      {

        // Initialization code here.

        _chemicalElement = @"None";

      }


    return self;

    }

    ```


    Let’s examine this code in detail to get a better understanding for the responsibilities
    of the `init` method. This line combines several operations in a single line of
    code:


    ```

    if ((self = [super init]))

    ```


    The expression within brackets `[super init]` performs initialization of the calling
    object using the `init` method of its parent class. Since this is the first statement
    in an `init` method, it guarantees a series of initializations for an object all
    the way up its inheritance chain to the root object of the hierarchy (see [Figure
    3-1](#9781430250500_Ch03.xhtml#Fig1)).


    ![9781430250500_Fig03-01.jpg](images/9781430250500_Fig03-01.jpg)


    [Figure 3-1](#9781430250500_Ch03.xhtml#_Fig1). Object initializations via init
    methods


    The result returned from the `init` method invocation is assigned to the special
    Objective-C `self` parameter. Each method has an implicit `self` parameter (it’s
    not in the method declaration), which is a pointer to the object that received
    the message. So, the assignment statement


    ```

    self = [super init]

    ```


    invokes the superclass’s `init` method and assigns the result to the calling object,
    thereby guaranteeing (see [Figure 3-1](#9781430250500_Ch03.xhtml#Fig1)) that any
    initialization required throughout the object’s class hierarchy is performed.


    Looking back at [Listing 3-1](#9781430250500_Ch03.xhtml#list1), you see that the
    result of this assignment is surrounded (in parentheses) by a conditional `if`
    statement (Appendix A provides a complete overview of Objective-C conditional
    statements). This has the effect of performing conditional logic. In effect, if
    the superclass initialization succeeds (i.e., the expression `[super init]` returns
    a valid object), the custom initialization for the object is performed; otherwise,
    the `init` method returns `nil`.


    By convention, the name of an initializer always begins with `init`. An initializer
    with no input parameters is simply named `init`. If the initializer requires one
    or more input parameters, the name is lengthened accordingly to incorporate the
    input parameters. A sample declaration of an initializer with one input parameter
    is


    ```

    -(id)initWithNeutrons:(NSUInteger) neutrons

    ```


    As object allocation is coupled with initialization, the two methods are usually
    performed together in a single line of code; for example,


    ```

    Atom *atom = [[Atom alloc] init];

    ```


    Extending the Elements Project


    Now you’re going to put into practice what you’ve learned about object allocation
    and initialization by extending the Elements project. In [Chapter 2](#9781430250500_Ch02.xhtml),
    you created an `Atom` class. Let’s subclass this to create different types of
    atomic chemical elements!


    Start Xcode and reopen the Elements project by selecting **Open** ... from the
    Xcode File menu. In the navigator area of the Xcode workspace window, select the
    **Elements** project, and then create a new file by selecting **New** ![image](images/arrow.jpg)
    **File** ... from the Xcode File menu. As you did when creating the `Atom` class,
    create an Objective-C class with implementation and header files. Next, in the
    window where you choose options for your class, enter **Hydrogen** for the class
    name, select **Atom** from the subclass drop-down list, and then click **Next**
    (see [Figure 3-2](#9781430250500_Ch03.xhtml#Fig2)).


    ![9781430250500_Fig03-02.jpg](images/9781430250500_Fig03-02.jpg)


    [Figure 3-2](#9781430250500_Ch03.xhtml#_Fig2). Specifying the Hydrogen class options


    At the next prompt, leave the location as the Elements folder and the project
    target as the Elements project, and then click the **Create** button to create
    the `Hydrogen` class.


    In the Xcode navigator pane, you see that two new files (`Hydrogen.h` and `Hydrogen.m`)
    have been created. Shortly, you are going to create an `init` method for the class
    and also a factory method that will both allocate and initialize new `Hydrogen`
    objects; but before doing that, you need to refactor the `Atom` class.


    Refactoring the Atom Class


    *Refactoring* means to restructure existing code without changing its external
    behavior. It’s something that you’ll do often while developing software to improve
    its design, facilitate the addition of new features, and so forth. In this case,
    you are going to refactor the `Atom` class so that its subclasses can access and
    update its instance variables during object initialization.


    As shown in [Chapter 2](#9781430250500_Ch02.xhtml)’s [Listing 2-3](#9781430250500_Ch02.xhtml#list3),
    the `Atom` class interface declares a single property named `chemicalElement`,
    which is defined using autosynthesis. When the compiler automatically synthesizes
    a property, it creates a backing instance variable whose scope is declared as
    *private*. A private instance variable cannot be directly accessed by its subclasses,
    so you need to refactor the class to enable instance variable access from its
    subclasses. You’ll declare the variable in the instance variable declaration block
    with `protected` scope. In order to connect the property method generated using
    autosynthesis to the instance variable, you’ll name it according to the standard
    property-backed instance variable naming conventions (e.g., the variable name
    will be the same as the property name, prefaced with an underscore).


    So let’s update the Atom interface accordingly. You’ll also add another read-only
    property (and the corresponding instance variable). In the project navigator pane,
    select the **Atom.h** file, and then in the editor pane, update the Atom interface
    as shown in [Listing 3-2](#9781430250500_Ch03.xhtml#list2) (code updates are shown
    in **bold**).


    [*Listing 3-2.*](#9781430250500_Ch03.xhtml#_list2)   Refactored Atom Interface
    with Protected Variables


    ```

    @interface Atom : NSObject


    // Property-backed instance variables, only accessible in the class hierarchy

    {

      @protected NSUInteger _protons;

      @protected NSUInteger _neutrons;

      @protected NSUInteger _electrons;

      @protected NSString *_chemicalElement;

      @protected NSString *_atomicSymbol;

    }


    @property (readonly) NSUInteger protons;

    @property (readonly) NSUInteger neutrons;

    @property (readonly) NSUInteger electrons;

    @property (readonly) NSString *chemicalElement;

    @property (readonly) NSString *atomicSymbol;


    - (NSUInteger) massNumber;


    @end

    ```'
  trans: "好的，作为高级文档工程师和翻译员，我已仔细阅读您提供的注意事项和示例。下面是根据您的要求，对给定英文文本进行的精确翻译和格式化。\n\n\n好，没问题。作为高级文档工程师，我将遵循您的规则，对提供的文本进行排版。\n\
    \nOK，这很棒：**Objective-C**（以及 Foundation 框架）提供了创建对象所需的一切。但初始化呢？同样，**Objective-C**\
    \ 也提供了机制来初始化新创建的对象。接下来你将了解这些内容。\n\n## 对象初始化\n\n`alloc` 方法为对象分配存储空间，并将其实例变量设置为零，但它不会将对象的实例变量初始化为适当的值，也不会准备对象所需的任何其他必要对象或资源。因此，你的类应该实现一个方法来完善初始化过程。`NSObject`\
    \ 实现了一个 `init` 方法，它为对象初始化提供了基础，你的类至少应该重写此方法，以提供它们所需的任何自定义初始化行为。`NSObject init`\
    \ 方法的语法是：\n\n```\n- (id) init\n```\n\n注意，`init` 是一个实例方法，并且与 `alloc` 方法一样，它返回类型为\
    \ `id` 的对象，这些对象是相关结果类型。还记得你在第 2 章中为 `Atom` 类编写的 `init` 方法吗？它显示在**清单 3-1** 中。\n\
    \n*Listing 3-1.* Atom 类的 init 方法\n\n```\n- (id) init\n{\n  if ((self = [super\
    \ init]))\n  {\n    // Initialization code here.\n    _chemicalElement = @\"None\"\
    ;\n  }\n\nreturn self;\n}\n```\n\n让我们详细分析这段代码，以便更好地理解 `init` 方法的职责。这一行代码将多个操作合并到一行中：\n\
    \n```\nif ((self = [super init]))\n```\n\n方括号内的表达式 `[super init]` 使用其父类的 `init`\
    \ 方法执行调用对象的初始化。由于这是 `init` 方法中的第一条语句，它保证了对象沿着其继承链一直到层次结构的根对象的一系列初始化（参见**图 3-1**）。\n\
    \n![9781430250500_Fig03-01.jpg](img/9781430250500_Fig03-01.jpg)\n\n**图 3-1**.\
    \ 通过 init 方法进行的对象初始化\n\n`init` 方法调用返回的结果被赋值给特殊的 Objective-C 参数 `self`。每个方法都有一个隐式的\
    \ `self` 参数（它不在方法声明中），它是指向接收消息的对象的指针。因此，赋值语句\n\n```\nself = [super init]\n```\n\
    \n调用父类的 `init` 方法，并将结果赋值给调用对象，从而保证（参见**图 3-1**）完成整个类层次结构中所需的所有初始化。\n\n回头看**清单\
    \ 3-1**，你会发现这个赋值的结果被一个条件 `if` 语句（在圆括号内）包围（附录 A 提供了 Objective-C 条件语句的完整概述）。这产生了执行条件逻辑的效果。实际上，如果父类初始化成功（即表达式\
    \ `[super init]` 返回一个有效对象），则执行该对象的自定义初始化；否则，`init` 方法返回 `nil`。\n\n按照惯例，初始化方法的名称总是以\
    \ `init` 开头。没有输入参数的初始化方法就直接命名为 `init`。如果初始化方法需要一个或多个输入参数，则名称会相应延长以包含这些输入参数。一个带有一个输入参数的初始化方法声明的示例如下：\n\
    \n```\n-(id)initWithNeutrons:(NSUInteger) neutrons\n```\n\n由于对象分配与初始化是耦合的，这两个方法通常在一行代码中一起执行；例如：\n\
    \n```\nAtom *atom = [[Atom alloc] init];\n```\n\n## 扩展 Elements 项目\n\n现在，你将通过扩展\
    \ Elements 项目来实践你所学的关于对象分配和初始化的知识。在第 2 章中，你创建了一个 `Atom` 类。让我们继承这个类来创建不同类型的原子化学元素！\n\
    \n启动 Xcode 并通过从 Xcode 的“文件”菜单中选择“打开...”来重新打开 Elements 项目。在 Xcode 工作区窗口的导航区域中，选择\
    \ **Elements** 项目，然后通过从 Xcode 的“文件”菜单中选择“新建”![image](img/arrow.jpg)“文件...”来创建一个新文件。像创建\
    \ `Atom` 类时那样，创建一个带有实现文件和头文件的 Objective-C 类。接下来，在为你选择的类选项的窗口中，输入 **Hydrogen**\
    \ 作为类名，从子类下拉列表中选择 **Atom**，然后点击 **Next**（参见**图 3-2**）。\n\n![9781430250500_Fig03-02.jpg](img/9781430250500_Fig03-02.jpg)\n\
    \n**图 3-2**. 指定 Hydrogen 类选项\n\n在下一个提示窗口中，将位置保留为 Elements 文件夹，项目目标保留为 Elements\
    \ 项目，然后点击 **Create** 按钮来创建 `Hydrogen` 类。\n\n在 Xcode 导航窗格中，你会看到两个新文件（`Hydrogen.h`\
    \ 和 `Hydrogen.m`）已被创建。稍后，你将为此类创建一个 `init` 方法，还将创建一个工厂方法，该方法将同时分配和初始化新的 `Hydrogen`\
    \ 对象；但在那之前，你需要重构 `Atom` 类。\n\n## 重构 Atom 类\n\n*重构*是指在不改变现有代码外部行为的情况下重组代码。在开发软件时，你会经常这样做，以改进其设计、促进新功能的添加等等。在此例中，你将重构\
    \ `Atom` 类，以便其子类可以在对象初始化期间访问和更新其实例变量。\n\n如第 2 章的**清单 2-3** 所示，`Atom` 类接口声明了一个名为\
    \ `chemicalElement` 的属性，该属性使用自动合成定义。当编译器自动合成属性时，它会创建一个作用域声明为*私有*的后备实例变量。私有实例变量不能被其子类直接访问，因此你需要重构该类以允许从其子类访问实例变量。你将在实例变量声明块中以\
    \ `protected` 作用域声明该变量。为了将使用自动合成生成的属性方法连接到实例变量，你需要根据标准的属性备用实例变量命名约定来命名它（例如，变量名将与属性名相同，前面加下划线）。\n\
    \n那么，让我们相应地更新 `Atom` 接口。你还要添加另一个只读属性（以及相应的实例变量）。在项目导航窗格中，选择 **Atom.h** 文件，然后在编辑器窗格中，按照**清单\
    \ 3-2** 所示更新 `Atom` 接口（代码更新以**粗体**显示）。\n\n*Listing 3-2.* 重构后的 Atom 接口（带有受保护变量）\n\
    \n```\n@interface Atom : NSObject\n\n// Property-backed instance variables, only\
    \ accessible in the class hierarchy\n{\n  @protected NSUInteger _protons;\n  @protected\
    \ NSUInteger _neutrons;\n  @protected NSUInteger _electrons;\n  @protected NSString\
    \ *_chemicalElement;\n  @protected NSString *_atomicSymbol;\n}\n\n@property (readonly)\
    \ NSUInteger protons;\n@property (readonly) NSUInteger neutrons;\n@property (readonly)\
    \ NSUInteger electrons;\n@property (readonly) NSString *chemicalElement;\n@property\
    \ (readonly) NSString *atomicSymbol;\n\n- (NSUInteger) massNumber;\n\n@end\n```\n"
- fmt: "在[清单 3-2](#9781430250500_Ch03.xhtml#list2)中，你现在声明了具有`protected`作用域的属性支持的实例变量，从而使子类能够直接访问（和更新）它们。你还添加了一个新属性，用于检索`Atom`对象的原子符号。\n\
    \n接下来，让我们更新`Atom`实现以反映这些更改。选择**Atom.m**文件，然后更新`massNumber`实例方法的`Atom`实现，如[清单 3-3](#9781430250500_Ch03.xhtml#list3)所示。\n\
    \n[***清单 3-3***](#9781430250500_Ch03.xhtml#_list3) Atom 实现 `massNumber` 方法\n\n\
    ```\n- (NSUInteger) massNumber\n{\n  return self.protons + self.neutrons;\n}\n\
    ```\n\n如你所见，原子的质量数计算为其拥有的质子数与中子数之和。好的，这就是你现在要对`Atom`类进行的所有重构。接下来让我们更新`Hydrogen`类。\n\
    \n### 创建 Hydrogen 初始化方法\n\n现在你将针对`Hydrogen`类创建一个新的`init`方法。它将使用输入的中子数初始化一个`Hydrogen`对象，并适当地设置化学元素名称和原子符号。选择**Hydrogen.h**文件。在编辑器窗格中，更新接口，如[清单\
    \ 3-4](#9781430250500_Ch03.xhtml#list4)所示。\n\n[***清单 3-4***](#9781430250500_Ch03.xhtml#_list4)\
    \ Hydrogen 接口\n\n```\n#import \"Atom.h\"\n\n@interface Hydrogen : Atom\n\n- (id)\
    \ initWithNeutrons:(NSUInteger)neutrons;\n\n@end\n```\n\n这个接口声明了一个`Hydrogen`的`init`方法，其中带有一个指定原子中子数的输入参数。接下来，选择实现文件（**Hydrogen.m**）并更新实现，如[清单\
    \ 3-5](#9781430250500_Ch03.xhtml#list5)所示。\n\n[***清单 3-5***](#9781430250500_Ch03.xhtml#_list5)\
    \ Hydrogen 实现\n\n```\n#import \"Hydrogen.h\"\n\n@implementation Hydrogen\n\n-\
    \ (id) initWithNeutrons:(NSUInteger)neutrons\n{\n  if ((self = [super init]))\n\
    \  {\n    _chemicalElement = @\"Hydrogen\";\n    _atomicSymbol = @\"H\";\n   \
    \ _protons = 1;\n    _neutrons = neutrons;\n  }\n\nreturn self;\n}\n\n@end\n```\n\
    \n`initWithNeutrons:`方法首先调用父类`Atom`的`init`方法，然后适当地设置其初始值。对于`Hydrogen`对象，这意味着设置化学元素名称（Hydrogen）、其原子符号（H）、质子数（根据定义，氢有一个质子）以及作为输入参数提供的中子数。\n\
    \n### 创建 Hydrogen 工厂方法\n\n类*工厂*方法是用于执行类创建和初始化的便捷方法。它们是类方法，通常遵循以下约定命名：\n\n```\n\
    + (id) className...\n```\n\n其中`className`是类的名称，并以小写字母开头。现在，你将为`Hydrogen`类实现一个工厂创建方法。在`Hydrogen`接口文件中，添加[清单\
    \ 3-6](#9781430250500_Ch03.xhtml#list6)所示的方法。\n\n[***清单 3-6***](#9781430250500_Ch03.xhtml#_list6)\
    \ 带有工厂创建方法的 Hydrogen 接口\n\n```\n#import \"Atom.h\"\n\n@interface Hydrogen : Atom\n\
    \n- (id) initWithNeutrons:(NSUInteger)neutrons;\n+ (id) hydrogenWithNeutrons:(NSUInteger)neutrons;\n\
    \n@end\n```\n\n一个名为`hydrogenWithNeutrons:`的类实例方法被添加到接口中。注意，工厂创建方法的名字与`init`方法类似，但它以类名作为前缀。此方法创建一个新的`Hydrogen`对象并使用输入参数进行初始化。打开`Hydrogen`实现文件并添加方法定义，如[清单\
    \ 3-7](#9781430250500_Ch03.xhtml#list7)所示。\n\n[***清单 3-7***](#9781430250500_Ch03.xhtml#_list7)\
    \ 带有工厂创建方法的 Hydrogen 实现\n\n```\n+ (id) hydrogenWithNeutrons:(NSUInteger)neutrons\n\
    {\n  return [[[self class] alloc] initWithNeutrons:neutrons];\n}\n```\n\n观察到该方法为`Hydrogen`对象分配内存，在这个新实例上调用`initWithNeutrons:`方法，然后返回新创建并初始化后的对象。还要注意使用了表达式`[self\
    \ class]`来获取当前类实例。使用这个表达式（而不是直接指定类），如果该类被继承且工厂方法被子类调用，则返回的实例将具有与子类相同的类型。现在让我们测试这个新类。选择**main.m**文件并更新`main()`函数，如[清单\
    \ 3-8](#9781430250500_Ch03.xhtml#list8)所示。\n\n[***清单 3-8***](#9781430250500_Ch03.xhtml#_list8)\
    \ 测试 Hydrogen 类\n\n```\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    Atom *atom = [Hydrogen hydrogenWithNeutrons:0];\n    [atom logInfo];\n\
    \nid atom1 = [[Hydrogen alloc] initWithNeutrons:1];\n    [atom1 logInfo];\n\n\
    Hydrogen *atom2 = [Hydrogen hydrogenWithNeutrons:2];\n    [atom2 logInfo];\n \
    \ }\n\nreturn 0;\n}\n```\n\n`main()`函数同时使用了`Hydrogen`的`init`方法和类工厂方法来创建和初始化`Hydrogen`对象，然后在\
    \ Xcode 输出窗口中显示对象信息。现在保存所有项目文件，然后编译并运行程序（通过点击工具栏中的**Run**按钮或从 Xcode 的 Product\
    \ 菜单中选择**Run**）。输出窗格应显示如[图 3-3](#9781430250500_Ch03.xhtml#Fig3)所示的结果。\n\n![9781430250500_Fig03-03.jpg](images/9781430250500_Fig03-03.jpg)\n\
    \n[***图 3-3***](#9781430250500_Ch03.xhtml#_Fig3) 测试 Hydrogen 类\n\n太棒了！你创建了一个具有自定义初始化和工厂方法的`Hydrogen`类，并对其进行了测试以验证其按预期工作。既然你已经熟悉了使用\
    \ Objective-C 进行对象创建和初始化，接下来让我们专注于对象消息传递。\n\n## 消息分发\n\n消息传递是面向对象编程中的一个基本概念。它是用于在对象上调用方法的机制。消息的接收对象（即接收者）在运行时确定要调用其哪个实例方法。实例方法可以访问对象的实例变量及其实例方法。用于向对象发送消息（即在对象上调用方法）的\
    \ Objective-C 语法是：\n\n```\n[receiver messageNameParams]\n```\n\n其中`receiver`是消息发送到的对象。`messageNameParams`信息标识了方法的实际名称和参数值（如果有）；并且括号将消息括起来。`messageNameParams`的语法是：\n\
    \n```\nkeyword1:value1 keyword2:value2 ... keywordN:valueN\n```\n\n冒号分隔每个方法签名关键字及其关联的参数值。它声明需要一个参数。如果方法没有参数，则省略冒号（并且该方法只有一个关键字）。以下面的消息为例：\n\
    \n```\n[orderObject addItem:burgerObject forPrice:3.50];\n```\n\n消息名称是`addItem:forPrice:`；消息的接收者是`orderObject`。消息参数值是`burgerObject`（对应关键字`addItem`）和`3.50`（对应关键字`atPrice`）。在正常情况下，只有当一个接收对象具有与消息名称相对应的方法时，才能成功地向该对象调用特定的消息。此外，Objective-C\
    \ 支持类型多态性，不同的接收者可以对同一方法有不同的实现。接收者的类型是在运行时确定的；因此，不同的接收者可以对同一消息做出不同的事情。总之，消息的结果不能仅通过消息或方法名称来计算；它还取决于接收消息的对象。\n\
    \n正如你在[第 2 章](#9781430250500_Ch02.xhtml)中学到的，Objective-C 为一种替代语法（点符号）提供了语言级别的支持，该语法简化了属性访问器方法的调用。用于检索属性值的点语法是：\n\
    \n```\nobjectName.propertyName\n```"
  raw: 'In [Listing 3-2](#9781430250500_Ch03.xhtml#list2), you now declare the property-backed
    instance variables with `protected` scope, thereby enabling them to be directly
    accessed (and updated) by subclasses. You also added a new property that retrieves
    the atomic symbol for an `Atom` object.


    Next, let’s update the Atom implementation to reflect these changes. Select the
    **Atom.m** file and then update the Atom implementation of the `massNumber` instance
    method, as shown in [Listing 3-3](#9781430250500_Ch03.xhtml#list3).


    [*Listing 3-3.*](#9781430250500_Ch03.xhtml#_list3)   Atom Implementation massNumber
    Method


    ```

    - (NSUInteger) massNumber

    {

      return self.protons + self.neutrons;

    }

    ```


    As you can see, the mass number of an atom is computed as the sum of the number
    of protons and neutrons it has. OK, that’s all the refactoring you’ll do on the
    `Atom` class for now. Let’s update the `Hydrogen` class next.


    Creating the Hydrogen Initializer Method


    Now you’ll create a new `init` method for the `Hydrogen` class. It will initialize
    a `Hydrogen` object with the input number of neutrons, and set the chemical element
    name and atomic symbol appropriately. Select the **Hydrogen.h** file. In the editor
    pane, update the interface as shown in [Listing 3-4](#9781430250500_Ch03.xhtml#list4).


    [*Listing 3-4.*](#9781430250500_Ch03.xhtml#_list4)   Hydrogen Interface


    ```

    #import "Atom.h"


    @interface Hydrogen : Atom


    - (id) initWithNeutrons:(NSUInteger)neutrons;


    @end

    ```


    This interface declares a Hydrogen `init` method with an input parameter that
    specifies the number of neutrons for the atom. Next, select the implementation
    file (**Hydrogen.m**) and update the implementation as shown in [Listing 3-5](#9781430250500_Ch03.xhtml#list5).


    [*Listing 3-5.*](#9781430250500_Ch03.xhtml#_list5)   Hydrogen Implementation


    ```

    #import "Hydrogen.h"


    @implementation Hydrogen


    - (id) initWithNeutrons:(NSUInteger)neutrons

    {

      if ((self = [super init]))

      {

        _chemicalElement = @"Hydrogen";

        _atomicSymbol = @"H";

        _protons = 1;

        _neutrons = neutrons;

      }


    return self;

    }


    @end

    ```


    The `initWithNeutrons:` method first invokes the `init` method for the superclass
    Atom and then sets its initial values appropriately. For a `Hydrogen` object,
    this means setting the chemical element name (Hydrogen), its atomic symbol (H),
    the number of protons (by definition, hydrogen has one proton), and the number
    of neutrons provided as an input parameter.


    Creating a Hydrogen Factory Method


    Class *factory* methods are convenience methods used to perform class creation
    and initialization. They are class methods that are typically named following
    the convention


    ```

    + (id) className...

    ```


    `className` is the name of the class and begins in lowercase. Now you’re going
    to implement a factory create method for the `Hydrogen` class. In the Hydrogen
    interface file, add the method shown in [Listing 3-6](#9781430250500_Ch03.xhtml#list6).


    [*Listing 3-6.*](#9781430250500_Ch03.xhtml#_list6)   Hydrogen Interface with Factory
    Create Method


    ```

    #import "Atom.h"


    @interface Hydrogen : Atom


    - (id) initWithNeutrons:(NSUInteger)neutrons;

    + (id) hydrogenWithNeutrons:(NSUInteger)neutrons;


    @end

    ```


    A class instance method named `hydrogenWithNeutrons:` was added to the interface.
    Notice that the name of the factory create method name is similar to that of the
    `init` method, but it is prefixed by the name of the class. This method creates
    a new `Hydrogen` object and initializes it using the input parameter. Open the
