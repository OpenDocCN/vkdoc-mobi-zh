  raw: 'A `Hydrogen` object is created and assigned to a variable named `atom`. Since
    the object is created with an `alloc` message, `atom` has an ownership interest
    in this object. Later in the code, a variable named `href` takes an ownership
    interest in this object, thereby increasing the retain count (i.e., the number
    of ownership interests) in the object. Later, a `release` message is sent to the
    `atom` variable. As `href` still has an ownership interest in the object, it is
    not deallocated. Once `href` sends a `release` message to the object, its retain
    count drops to zero and it can be deallocated by the runtime.


    Deallocating Memory


    When an object’s retain count drops to zero, the runtime frees the memory it uses
    via the `NSObject dealloc` method. This method also provides a framework for your
    subclasses to relinquish ownership of any objects it owns. Each of your classes
    (which nominally descend from `NSObject`) should override the `dealloc` method,
    invoking the `release` method on each object it has an ownership interest in,
    and then call the `dealloc` method of its superclass. This approach enables each
    of your classes to properly relinquish ownership of any objects it owns throughout
    its class hierarchy, as shown in [Figure 4-2](#9781430250500_Ch04.xhtml#Fig2).


    ![9781430250500_Fig04-02.jpg](images/9781430250500_Fig04-02.jpg)


    [Figure 4-2](#9781430250500_Ch04.xhtml#_Fig2). A dealloc method implementation


    Delayed Release via Autorelease


    `NSObject` provides an `autorelease` method that is used to invoke the release
    method on an object at the end of an autorelease pool block. *Autorelease pool
    blocks* provide a mechanism that enables you to relinquish ownership of an object
    at some time in the future, thereby eliminating the need to explicitly invoke
    the `release` method on the object and also avoiding the possibility of it being
    deallocated immediately. Autorelease pool blocks are defined using the `@autorelease`
    directive, as shown in [Listing 4-3](#9781430250500_Ch04.xhtml#list3).


    [*Listing 4-3.*](#9781430250500_Ch04.xhtml#_list3)  Autorelease Pool Block Syntax


    ```

    @autorelease

    {

      // Code that creates autoreleased objects

      ...

    }

    ```


    Autoreleased objects should always be coded within an autorelease pool block,
    otherwise they will not receive `release` messages and would therefore leak memory.
    The Apple UI frameworks used to create iOS and Mac OS X apps (specifically AppKit
    and UI Kit) provide autorelease blocks automatically; hence, you would normally
    only code an autorelease block if


    *   You are writing a program that is not based on a UI framework, such as a command-line
    tool.

    *   Your implementation logic includes a loop that creates many temporary objects.
    In order to reduce the maximum memory footprint of an application, you may use
    an autorelease pool block inside a loop to dispose of those objects before the
    next iteration.

    *   Your application spawns one or more secondary threads. You must create your
    own autorelease pool block as soon as a thread begins executing; otherwise, your
    application will leak memory.


    In the example shown in [Listing 4-4](#9781430250500_Ch04.xhtml#list4), the autorelease
    block surrounds all the code within the `main()` function, and an object is dynamically
    allocated with the `autorelease` message.


    [*Listing 4-4.*](#9781430250500_Ch04.xhtml#_list4)  Command-Line Program with
    Autorelease Block


    ```

    int main(int argc, const char * argv[])

    {

      @autorelease

      {

        Hydrogen *atom = [[[Hydrogen alloc] init] autorelease];

        ...

      }

      return 0;

    }

    ```


    Note that the autorelease message is sent immediately after the object has been
    created and initialized, usually in a single, combined statement. This design
    ensures that any objects created with autorelease will be released at the end
    of the autorelease block, prior to program end.


    Using MRR


    Now that you’ve gone over Objective-C memory management and MRR, it’s time to
    apply what you’ve learned by developing an example program! This example will
    demonstrate the application of the MRR basic memory-management rules, along with
    usage of the corresponding APIs. Briefly, the program consists of three classes:
    an `OrderEntry` class used to record product orders, and the dependent classes
    `OrderItem` and `Address`. The `OrderItem` class encapsulates the state and behaviors
    specific to an order entry item, and the `Address` class consists of the state
    and behavior associated with an order entry shipping address. Each `OrderEntry`
    object has a corresponding `OrderItem` object and `Address` object (as shown in
    [Figure 4-3](#9781430250500_Ch04.xhtml#Fig3)).


    ![9781430250500_Fig04-03.jpg](images/9781430250500_Fig04-03.jpg)


    [Figure 4-3](#9781430250500_Ch04.xhtml#_Fig3). Order entry classes


    You will develop these classes using MRR memory management, and then test them
    to demonstrate proper use of this memory-management technique. In Xcode, create
