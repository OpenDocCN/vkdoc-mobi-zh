    \n```\n\nThe error message is surrounded in double-quotes. This directive is commonly\
    \ used if a conditional compilation check fails; for example, the following code\
    \ fragment\n\n```c\n#ifndef    INPUT_ARGS\n#error \"No input arguments provided\"\
    \n#endif\n```\n\ncauses compilation to fail and generates an error message (“No\
    \ input arguments provided”) if the macro `INPUT_ARGS` is not defined.\n\nThe\
    \ `#warning` directive causes the preprocessor to generate a compile-time warning\
    \ message, but allows compilation to continue. The syntax for this directive is\n\
    \n```\n#warning \"WarningMessage\"\n```\n\nThe warning message is surrounded in\
    \ double-quotes. The following code fragment\n\n```c\n#ifndef    OUTPUT_FILE\n\
    #warning \"Output filename not provided\"\n#endif\n```\n\ngenerates a warning\
    \ message (“Output filename not provided”) if the macro `OUTPUT_ARGS` is not defined;\
    \ compilation will continue.\n\nThe `#line` directive is used to supply a line\
    \ number for compiler messages. If an error happens during the compiling process,\
    \ the compiler shows an error message with references to the name of the file\
    \ where the error happened and a corresponding line number, thereby making it\
    \ easier to find the code that generated the error. The syntax for the `#line`\
    \ directive is\n\n```\n#line LineNumber \"FileName\"\n```\n\n`LineNumber` is the\
    \ new line number that will be assigned to the next code line. The line numbers\
    \ of successive lines will be increased one by one from this point on. The “`FileName`”\
    \ (surrounded in double-quotes) is an optional parameter that enables you to redefine\
    \ the file name that will be displayed. Xcode and the Objective-C compiler use\
