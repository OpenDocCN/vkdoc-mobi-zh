    \nGrand Central Dispatch（GCD）是一套语言特性、基于 C 语言的 API 以及系统增强功能，支持使用调度队列执行任务。GCD 调度队列可用于同步或异步地执行代码，以及串行或并发地执行任务。与操作队列一样，调度队列比线程更容易使用，并且在执行异步或并发任务时效率更高。\n\
    \nApple 提供了关于 GCD API 及其在并发编程中使用的完整文档。为了在并发编程中提供一个使用操作队列和调度队列的简单比较，您现在将重新实现之前开发的\
    \ `ConcurrentOperations` 程序，这次使用调度队列。\n\n### 使用调度队列\n\n在 Xcode 中，通过从 Xcode 的 **File**\
    \ 菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在 **New Project\
    \ Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为产品名称指定 `ConcurrentDispatch`，为项目类型选择\
    \ `Foundation`，并通过勾选 **Use Automatic Reference Counting** 复选框选择 ARC 内存管理。在文件系统中指定您希望创建项目的位置（如有必要，选择\
    \ **New Folder** 并输入文件夹名称和位置），取消勾选 **Source Control** 复选框，然后单击 **Create** 按钮。\n\
    \n在 Xcode 项目导航器中，选择 `main.m` 文件并按列表 17-24 所示进行更新。\n\n*列表 17-24.*  `ConcurrentDispatch`\
    \ 的 `main.m` 文件\n\n```objc\n#import <Foundation/Foundation.h>\ntypedef void (^ComputeTask)(void);\n\
    \n/* 获取用于下载 URL 的块 */\nComputeTask getComputeTask(NSInteger *result, NSUInteger\
    \ computation)\n{\n  NSInteger *computeResult = result;\n  NSUInteger computations\
    \ = computation;\n  return ^{\n    [NSThread sleepForTimeInterval:1.0];\n    NSLog(@\"\
    正在执行 %ld 次计算\", computations);\n    for (int ii=0; ii<computations; ii++)\n  \
    \  {\n      *computeResult = *computeResult + 1;\n    }\n  };\n}\n\nint main(int\
    \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    NSInteger computeResult;\n\
    \n// 创建串行队列和组\n    dispatch_queue_t serialQueue = dispatch_queue_create(\"MySerialQueue\"\
    ,\n                                                         DISPATCH_QUEUE_SERIAL);\n\
    \    dispatch_group_t group = dispatch_group_create();\n\n// 将任务添加到队列\n    dispatch_group_async(group,\
    \ serialQueue, getComputeTask(&computeResult, 5));\n    dispatch_group_async(group,\
    \ serialQueue, getComputeTask(&computeResult, 10));\n    dispatch_group_async(group,\
    \ serialQueue, getComputeTask(&computeResult, 20));\n\n// 阻塞直到组中所有任务完成，然后显示结果\n\
    \    dispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n    NSLog(@\"计算结果 = %ld\"\
    , computeResult);\n\n}\n  return 0;\n}\n```\n\n该列表除了 `main()` 函数外，还包含一个名为 `computeTask`\
    \ 的函数，其功能与 `ConcurrentOperations` 程序中 `main` 方法（如列表 17-22 所示）中的任务完全相同。\n\n`main()`\
    \ 函数使用 GCD API 创建三个任务并以异步方式分派给串行队列执行，从而正确协调执行并防止对共享数据的并发访问。它创建了一个串行调度队列和一个调度组。\n\
    \n```objc\ndispatch_queue_t serialQueue = dispatch_queue_create(\"MySerialQueue\"\
    ,\n                                                     DISPATCH_QUEUE_SERIAL);\n\
    dispatch_group_t group = dispatch_group_create();\n```\n\n然后，代码将三个任务分派到队列。\n\n\
    ```objc\ndispatch_group_async(group, serialQueue, getComputeTask(&computeResult,\
    \ 5));\ndispatch_group_async(group, serialQueue, getComputeTask(&computeResult,\
    \ 10));\ndispatch_group_async(group, serialQueue, getComputeTask(&computeResult,\
    \ 20));\n```\n\n请注意，要执行的任务由 `computeTask()` 函数返回的块字面量指定，每次为计算次数提供不同的参数。同样，这与 `ConcurrentOperations`\
    \ 程序中的操作相同。GCD 的 `dispatch_group_async()` 函数使这些任务异步执行，并且由于队列是串行队列，因此按串行顺序执行。接下来，使用\
    \ GCD 的 `dispatch_group_wait()` 函数来阻塞主线程，直到任务完成。\n\n```objc\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\n```\n\n现在保存、编译并运行 `BlockConcurrentTasks` 程序，并观察输出面板中的消息（如图\
    \ 17-8 所示）。\n\n![9781430250500_Fig17-08.jpg](img/9781430250500_Fig17-08.jpg)\n"
- fmt: '# Key-Value Programming


    ## Choosing the Right API for Concurrent Programming


    This chapter has covered a variety of approaches for concurrent programming, so
    you have several options to choose from. To recap, the following are the available
    options:


    - **Asynchronous APIs**. The Foundation Framework (along with the Cocoa and Cocoa
    Touch frameworks) includes a variety of APIs that perform asynchronous processing;
    examples include the `NSURLConnection`, `NSFileHandle`, and `NSPort` classes.

    - **Threads**. APIs that use threads to implement concurrent programming. This
    includes the Foundation Framework message passing APIs, the `NSThread` class,
    and the synchronization mechanisms.

    - **Operation queues**. `NSOperation` and `NSOperationQueue` are Objective-C APIs
    that can be used to implement concurrent programming using queues.

    - **Dispatch queues**. Grand Central Dispatch is a C-based API and set of services
    that can be used to implement concurrent programming using dispatch queues.


    In general, you should use the asynchronous APIs to implement asynchronous/concurrent
    processing if possible. These APIs use various technologies (threads, queues,
    etc.) to provide concurrency that scales with the capabilities of the system and
    enable your program design to align with the program style and capabilities of
    the Objective-C platform.


    Although the Objective-C platform provides a number of language features and APIs
    to support thread-based concurrent programming, threads are not the recommended
    approach for concurrent programming. Operation queues and dispatch queues are
    the preferred mechanism for asynchronous, concurrent processing. These should
    be used to concurrently perform tasks that are not supported by the asynchronous
    APIs, such as executing a long computation, background data processing, and so
    forth.


    Operation and dispatch queues provide an asynchronous, queue-based approach that
    eliminates the need for low-level thread management and maximizes system utilization
    and efficiency compared to thread-based programming. Operation queues, being object-based,
    have more overhead and utilize more resources than GCD dispatch queues. However,
    the higher-level, object-oriented API is consistent with the Objective-C platform
    and may be easier to use. In addition, operation queues provide support for complex
    inter-operation dependencies, constraint-based execution, and management of operation
    objects.


    GCD, as it provides a lower-level (C-based) API, is lightweight and provides better
    performance than operation queues. As shown by the example `ConcurrentDispatch`
    program, the GCD block-based approach can result in fewer lines of code that may
    minimize overall program complexity.


    Finally, as operation and dispatch queues do not address real-time constraints,
    threads are still an appropriate mechanism for concurrent programming of real-time
    systems.


    ## Roundup


    In this chapter, you learned about concurrent programming and the various mechanisms
    and APIs available to support asynchronous/concurrent processing. As the chapter
    has shown, there are numerous options to choose from. In addition, concurrent
    programming is challenging and it is very important to understand the tradeoffs
    involved with each option under consideration. The following are key takeaways
    from this chapter:


    - Concurrent processing implies the simultaneous execution of multiple tasks.
    It is a function of design, whereas parallel computing is a function of hardware.
    The motivations for concurrent processing are numerous, some of which include
    increased application throughput, increased system utilization, improved application
    responsiveness, and better mapping to the problem domain.

    - Concurrent processing refers to multiple logical control flows that may execute
    in parallel. Asynchronous processing, on the other hand, is effectively a mechanism
    for the asynchronous (i.e., nonblocking) invocation of methods/functions. In other
    words, the caller invokes the method and can continue processing while the method
    is being executed. Asynchronous processing can be implemented using a variety
    of devices, including concurrent programming APIs and services.

    - The most common mechanisms used to implement concurrent programming in Objective-C
    are message passing, threads, synchronization mechanisms, operation queues, and
    dispatch queues.

    - The Foundation Framework `NSObject` class includes a collection of methods that
    use the message-passing paradigm to invoke a method on an object with a thread.

    - The `NSThread` class provides APIs that can be used to explicitly create and
    manage threads. The Objective-C language and Foundation Framework also include
    mechanisms for synchronizing shared data/resource access between concurrent threads.

    - Operation objects and operation queues provide an object-oriented mechanism
    for performing asynchronous/concurrent programming. They eliminate the need for
    low-level thread management, and simplify synchronization and coordination of
    execution for multiple interdependent tasks.

    - Grand Central Dispatch (GCD) is a set of language features, C-based APIs, and
    system enhancements that support the use of dispatch queues for executing tasks.
    GCD dispatch queues can be used to execute code synchronously or asynchronously,
    and to perform tasks serially or concurrently. Dispatch queues are easier to use
    than threads and more efficient at executing asynchronous or concurrent tasks.


    Congratulations! You have just completed this detailed examination of concurrent
    programming on the Objective-C platform. This chapter was by far the longest to
    date and the material is a lot to absorb, so don’t feel as if you have to master
    this all at once. Take your time to review its contents, and tinker with the examples
    to let it all sink in. When you’re ready, turn the page to begin the final chapter
    on key-value programming.


    # Chapter 18: Key-Value Programming


    Here you are, at the start of the final chapter of this book. Congratulations
    on the great job you’ve done throughout this journey! The advanced topic for this
    chapter is key-value programming, a set of language mechanisms and APIs that can
    enable you to both simplify program design and also implement more extensible
    and reusable code. The Objective-C key-value programming features are collectively
    referred to as key-value coding (KVC) and key-value observing (KVO). Key-value
    coding enables your code to access and manipulate an object’s properties indirectly,
    by name (i.e., key), rather than through accessor methods or backing instance
    variables. Key-value observing enables objects to be notified of changes to the
    properties of other objects. In this chapter, you will learn the fundamentals
    of these technologies, key implementation details, and how to use them in your
    programs.


    ## Key-Value Coding'
