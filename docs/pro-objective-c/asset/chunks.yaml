    instance has not finished browsing for services. It then creates a service browser
    instance and assigns it to the corresponding property, setting itself as the delegate
    object. This means that the `BrowserClient` instance will implement the necessary
    `NSNetServiceBrowserDelegate` protocol methods, thereby responding to asynchronous
    events when its service browser instance is searching for registered services.


    The `netServiceBrowserWillSearch:` message is sent to the delegate by the service
    browser instance when it begins searching for services. The implementation here
    just logs a message to the output pane, indicating that the browser is beginning
    a search for services.


    The `netServiceBrowser:didFindService:moreComing:` message is sent to the delegate
    by the service browser instance when it finds a registered service. The method
    implementation here just logs the method found to the output pane, and then performs
    a conditional check to see if the service browser is waiting for additional services.
    If there are no more services available, the browser is sent a `stop` message
    with the following statement.


    ```

    [self.serviceBrowser stop];

    ```


    The `netServiceBrowserDidStopSearch:` message is sent to the delegate by the service
    browser instance when a search for services is stopped. The implementation logs
    a message to the output pane, indicating that the search was stopped, and then
    sets the `finishedLoading` property to `YES`.


    OK, now that you have implemented the `BonjourClient` class, let’s use this to
    search for registered services using the `Bonjour` protocol.  In the Xcode project
    navigator, select the **main.m** file and update the `main()` function, as shown
    in [Listing 11-12](#9781430250500_Ch11.xhtml#list12).


    [*Listing 11-12.*](#9781430250500_Ch11.xhtml#_list12)  BonjourClient main( ) Function


    ```

    #import <Foundation/Foundation.h>

    #import "BonjourClient.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Retrieve the current run loop for browsing

        NSRunLoop *loop = [NSRunLoop currentRunLoop];

        // Create a browser client and add its service browser to the current run
    loop

        BonjourClient *client = [[BonjourClient alloc] init];

        // Browse for the specified service types

        [client.serviceBrowser searchForServicesOfType:@"_ipp._tcp."

                                              inDomain:@"local."];

        // Loop until the browser is stopped

        while (!client.finishedLoading &&

               [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);

      }

      return 0;

    }

    ```


    The `main()` function begins by retrieving the current run loop, required for
    asynchronous URL loading with `NSNetServiceBrowser` objects. Next, a `BonjourClient`
    instance is created and initialized. Then the service browser begins browsing
    for registered services using the `searchForServicesOfType:inDomain:` method.
    Here you specify as types services those that use the IPP (internet printing protocol,
    used for printers) and TCP (transport control protocol) protocols, and are registered
    in the local domain. The next statement is a run loop used to keep the application
    running until the service browser has finished searching for registered services.


    ```

    while (!client.finishedLoading &&

           [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);

    ```


    The *while* loop has a conditional expression composed of two parts, and is followed
    by a semicolon, signifying an empty statement. Thus there is no logic executed
    within the body of the while loop; it is used just to keep the application running
    until the asynchronous search being performed by the service browser has finished.
    The first part of the conditional expression, `!client.finishedLoading`, checks
    the value of this Boolean property. If it is `YES`, then the while loop is exited;
    otherwise, you continue on to process the remainder of the expression.'
