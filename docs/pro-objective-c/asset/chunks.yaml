  raw: 'Using Blocks


    Now that you understand the syntax for coding blocks and some of the key concerns
    with respect to their semantics and memory management, you can begin exploring
    how to best use blocks in your code. Apple developed blocks for use with Grand
    Central Dispatch (GCD) to support concurrent programming, and these APIs use blocks
    to schedule code for execution (GCD is covered in more detail in [Chapter 17](#9781430250500_Ch17.xhtml)).
    However, there are many other ways to use blocks, both within existing APIs and
    in your own classes. In general, blocks are most naturally used to implement small,
    self-contained pieces of code that encapsulate units of work. They are typically
    executed concurrently (for example, via GCD) over the items of a collection or
    as a callback when an operation has finished. Because blocks can be defined inline,
    they can eliminate the need to create entirely separate classes and methods for
    context-sensitive code, such as asynchronous completion handlers. They also enable
    related code to be kept together, and not scattered among multiple files. As noted
    before, many Apple APIs (and an increasing number of third-party APIs) now use
    blocks. The next few sections will demonstrate these common usage scenarios as
    you implement several programs that use blocks.


    Sorting an Array Using Blocks


    Now you will create a program that demonstrates array sorting using blocks. In
    Xcode, create a new project by selecting **New ![image](images/arrow.jpg) Project
    . . .** from the Xcode File menu. In the **New Project Assistant** pane, create
    a command-line application. In the **Project Options** window, specify **BlockArraySorter**
    for the Product Name, choose **Foundation** for the Project Type, and select ARC
    memory management by checking the **Use Automatic Reference Counting** check box.
    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    In the Xcode project navigator, select the **main.m** file and update the file,
    as shown in [Listing 15-18](#9781430250500_Ch15.xhtml#list18).


    [*Listing 15-18.*](#9781430250500_Ch15.xhtml#_list18)  BlockArraySorter main.m
    File


    ```

    #import <Foundation/Foundation.h>

    #include <stdlib.h>


    #define ArrayElements 10


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create an array of numbers with random values (0-99)

        NSMutableArray *numbers = [NSMutableArray arrayWithCapacity:ArrayElements];

        for (int elem=0; elem<ArrayElements; elem++)

        {

          unsigned int value = arc4random() % 100;

          [numbers addObject:[NSNumber numberWithUnsignedInt:value]];

        }

        NSLog(@"Values: %@", numbers);      // Log the numbers unsorted


    // Sort the array of numbers in ascending order

        [numbers sortUsingComparator:^(id obj1, id obj2){

          if ([obj1 integerValue] > [obj2 integerValue])

          {

            return (NSComparisonResult)NSOrderedDescending;

          }

          if ([obj1 integerValue] < [obj2 integerValue])

          {

            return (NSComparisonResult)NSOrderedAscending;

          }

          return (NSComparisonResult)NSOrderedSame;

        }];

        NSLog(@"Values: %@", numbers);      // Log the numbers sorted

      }

      return 0;

    }

    ```


    First, the file imports the `stdlib.h` header file via an `#include` preprocessor
    directive. This header file is required for the `arc4random()` function used later
    in the code. Next, the file defines a constant value, `ArrayElements`, which is
    used to control the number of elements in an array.


    The `main()` function contains the body of the program logic. It first creates
    an `NSMutableArray` object and then adds 10 elements to the array; each element
    is an `NSNumber` object with a random number. The random number, obtained using
    the `arc4random()` function, is constrained to a value between 0–99 (inclusive)
    with the following statement.


    ```

    unsigned int value = arc4random() % 100;

    ```


    The values of the array are then logged to the output pane. Because the numbers
    were randomly selected and the array has not been sorted, the order of the values
    displayed in the output pane is random. Next, the array is sorted using the NSMutableArray
    `sortUsingComparator:` method. This method sorts the array using the comparison
    method specified by the block literal input parameter. The full method signature
    is


    ```

    - (void)sortUsingComparator:(NSComparator)cmptr

    ```


    Thus the block literal expression is of block type `NSComparator`, a Foundation
    Framework data type whose type definition is


    ```

    typedef NSComparisonResult (^NSComparator)(id obj1, id obj2);

    ```


    So an `NSComparator` is a block type that takes two parameters of type `id` and
    returns a value of type `NSComparisonResult`. `NSComparisonResult` is a Foundation
    Framework enumeration used to indicate the ordering of items in a request, its
    values are as follows:


    *   `NSOrderedAscending` (the left operand is smaller than the right)

    *   `NSOrderedSame` (the left and right operands are equal)

    *   `NSOrderedDescending` (the left operand is larger than the right)


    The block literal performs a comparison between array element values and returns
    the appropriate `NSComparisonResult` to sort the array elements based on ascending
    (numerical) order, as shown in [Listing 15-18](#9781430250500_Ch15.xhtml#list18).


    ```

    [numbers sortUsingComparator:^(id obj1, id obj2){

      if ([obj1 integerValue] > [obj2 integerValue])

      {

        return (NSComparisonResult)NSOrderedDescending;

      }

      if ([obj1 integerValue] < [obj2 integerValue])

      {

        return (NSComparisonResult)NSOrderedAscending;

      }

      return (NSComparisonResult)NSOrderedSame;

    }];

    ```


    Now save, compile, and run the `BlockArraySorter` program and observe the messages
    in the output pane (as shown in [Figure 15-3](#9781430250500_Ch15.xhtml#Fig3)).


    ![9781430250500_Fig15-03.jpg](images/9781430250500_Fig15-03.jpg)


    [Figure 15-3](#9781430250500_Ch15.xhtml#_Fig3). Testing the BlockArraySorter project


    The messages in the output pane show that the array was correctly sorted using
    the block literal expression. It first displays the values for the unsorted array
    elements and then redisplays the array elements, this time sorted based on the
    numeric value of each element. Many of the Foundation Framework collection classes
    (`NSArray`, `NSDictionary`) contain methods that use a block literal to sort their
    elements, so this demonstrates a common use of blocks that you will encounter.
    Perfect. Now that you have one example under your belt, let’s develop another
    program that uses a block to perform an asynchronous callback function.


    Loading a URL Using Blocks


    Next, you will create a program that uses a block to asynchronously load a URL
    request, executing the block when the request has finished loading. In Xcode,
    create a new project by selecting **New ![image](images/arrow.jpg) Project . .
    .** from the Xcode File menu. In the **New Project Assistant** pane, create a
    command-line application. In the **Project Options** window, specify **BlockURLLoader**
    for the Product Name, choose **Foundation** for the Project Type, and select ARC
    memory management by checking the **Use Automatic Reference Counting** check box.
    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    In the Xcode project navigator, select the **main.m** file and update the file,
    as shown in [Listing 15-19](#9781430250500_Ch15.xhtml#list19).


    [*Listing 15-19.*](#9781430250500_Ch15.xhtml#_list19)  BlockURLLoader main.m File


    ```

    #import <Foundation/Foundation.h>


    #define IndexURL       @"http://www.wikipedia.com/index.html"'
  trans: "\n# 使用块\n\n现在你已经了解了代码块的语法，以及关于其语义和内存管理的一些关键问题，可以开始探索如何在代码中最好地使用块了。苹果开发块是为了配合\
    \ Grand Central Dispatch（GCD）使用，以支持并发编程，这些 API 使用块来调度代码执行（GCD 将在第 17 章中更详细地介绍）。然而，无论是在现有\
    \ API 中，还是在你自己的类中，都有许多其他使用块的方式。一般来说，块最自然地用于实现封装工作单元的小型、自包含代码片段。它们通常并发执行（例如，通过\
    \ GCD），对集合中的每个元素执行，或在操作完成时作为回调执行。由于块可以内联定义，因此对于上下文敏感的代码（例如异步完成处理程序），无需创建完全独立的类和方法。它们还使得相关代码能够保持在一起，而不是分散在多个文件中。如前所述，许多苹果\
    \ API（以及越来越多的第三方 API）现在都使用块。接下来几节将通过实现几个使用块的程序来演示这些常见的使用场景。\n\n## 使用块对数组进行排序\n\
    \n现在，你将创建一个演示使用块进行数组排序的程序。在 Xcode 中，从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg)\
    \ Project . . .** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project\
    \ Options** 窗口中，为 Product Name 指定 **BlockArraySorter**，为 Project Type 选择 **Foundation**，并通过勾选\
    \ **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。在文件系统中指定你希望创建项目的位置（如有必要，选择\
    \ **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
    \n在 Xcode 项目导航器中，选择 `main.m` 文件并更新该文件，如代码清单 15-18 所示。\n\n*代码清单 15-18.* BlockArraySorter\
    \ main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n#include <stdlib.h>\n\n\
    #define ArrayElements 10\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // 创建一个包含随机值（0-99）的数字数组\n    NSMutableArray *numbers = [NSMutableArray\
    \ arrayWithCapacity:ArrayElements];\n    for (int elem=0; elem<ArrayElements;\
    \ elem++)\n    {\n      unsigned int value = arc4random() % 100;\n      [numbers\
    \ addObject:[NSNumber numberWithUnsignedInt:value]];\n    }\n    NSLog(@\"Values:\
    \ %@\", numbers);      // 记录未排序的数字\n\n    // 对数字数组按升序排序\n    [numbers sortUsingComparator:^(id\
    \ obj1, id obj2){\n      if ([obj1 integerValue] > [obj2 integerValue])\n    \
    \  {\n        return (NSComparisonResult)NSOrderedDescending;\n      }\n     \
    \ if ([obj1 integerValue] < [obj2 integerValue])\n      {\n        return (NSComparisonResult)NSOrderedAscending;\n\
    \      }\n      return (NSComparisonResult)NSOrderedSame;\n    }];\n    NSLog(@\"\
    Values: %@\", numbers);      // 记录已排序的数字\n  }\n  return 0;\n}\n```\n\n首先，该文件通过一条\
    \ `#include` 预处理指令引入了 `stdlib.h` 头文件。该头文件是稍后在代码中使用的 `arc4random()` 函数所必需的。接下来，该文件定义了一个常量\
    \ `ArrayElements`，用于控制数组中的元素数量。\n\n`main()` 函数包含了程序逻辑的主体。它首先创建一个 `NSMutableArray`\
    \ 对象，然后向数组中添加 10 个元素；每个元素都是一个包含随机数的 `NSNumber` 对象。使用 `arc4random()` 函数获取的随机数被限制在\
    \ 0 到 99（包含）之间，通过以下语句实现：\n\n```\nunsigned int value = arc4random() % 100;\n```\n\
    \n然后将数组的值记录到输出窗格。由于数字是随机选择的，并且数组尚未排序，因此输出窗格中显示的值顺序是随机的。接下来，使用 `NSMutableArray`\
    \ 的 `sortUsingComparator:` 方法对数组进行排序。此方法使用块字面量输入参数指定的比较方法对数组进行排序。完整的方法签名是：\n\n\
    ```\n- (void)sortUsingComparator:(NSComparator)cmptr\n```\n\n因此，块字面量表达式的块类型是 `NSComparator`，这是\
    \ Foundation 框架的一种数据类型，其类型定义是：\n\n```\ntypedef NSComparisonResult (^NSComparator)(id\
    \ obj1, id obj2);\n```\n\n所以，`NSComparator` 是一种块类型，它接受两个 `id` 类型的参数，并返回一个 `NSComparisonResult`\
    \ 类型的值。`NSComparisonResult` 是 Foundation 框架中的一个枚举，用于指示请求中项目的排序顺序，其值如下：\n\n* `NSOrderedAscending`（左操作数小于右操作数）\n\
    * `NSOrderedSame`（左操作数和右操作数相等）\n* `NSOrderedDescending`（左操作数大于右操作数）\n\n块字面量对数组元素值进行比较，并返回相应的\
    \ `NSComparisonResult`，以根据升序（数值）顺序对数组元素进行排序，如代码清单 15-18 所示。\n\n```\n[numbers sortUsingComparator:^(id\
    \ obj1, id obj2){\n  if ([obj1 integerValue] > [obj2 integerValue])\n  {\n   \
    \ return (NSComparisonResult)NSOrderedDescending;\n  }\n  if ([obj1 integerValue]\
    \ < [obj2 integerValue])\n  {\n    return (NSComparisonResult)NSOrderedAscending;\n\
    \  }\n  return (NSComparisonResult)NSOrderedSame;\n}];\n```\n\n现在，保存、编译并运行 `BlockArraySorter`\
    \ 程序，并观察输出窗格中的消息（如图 15-3 所示）。\n\n![9781430250500_Fig15-03.jpg](img/9781430250500_Fig15-03.jpg)\n\
    \n图 15-3. 测试 BlockArraySorter 项目\n\n输出窗格中的消息显示，数组已使用块字面量表达式正确排序。它首先显示未排序数组元素的值，然后重新显示数组元素，这次是根据每个元素的数值排序后的结果。Foundation\
    \ 框架的许多集合类（`NSArray`、`NSDictionary`）都包含使用块字面量对其元素进行排序的方法，因此这展示了你将遇到的一种常见块用法。完美。既然你已经掌握了一个例子，让我们开发另一个使用块执行异步回调函数的程序。\n\
    \n## 使用块加载 URL\n\n接下来，你将创建一个程序，该程序使用块异步加载一个 URL 请求，并在请求完成加载时执行该块。在 Xcode 中，从 Xcode\
    \ 的 File 菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在 **New\
    \ Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为 Product Name\
    \ 指定 **BlockURLLoader**，为 Project Type 选择 **Foundation**，并通过勾选 **Use Automatic\
    \ Reference Counting** 复选框来选择 ARC 内存管理。在文件系统中指定你希望创建项目的位置（如有必要，选择 **New Folder**\
    \ 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\n在 Xcode 项目导航器中，选择\
    \ `main.m` 文件并更新该文件，如代码清单 15-19 所示。\n\n*代码清单 15-19.* BlockURLLoader main.m 文件\n\
    \n```\n#import <Foundation/Foundation.h>\n\n#define IndexURL       @\"http://www.wikipedia.com/index.html\"\
    \n```\n"
- fmt: "```objective-c\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // Retrieve the current run loop for the connection\n    NSRunLoop *loop\
    \ = [NSRunLoop currentRunLoop];\n    BOOL __block downloadComplete = NO;\n\n \
    \   // Create the request\n    NSURLRequest *request = [NSURLRequest\n       \
    \                      requestWithURL:[NSURL URLWithString:IndexURL]];\n    [NSURLConnection\
    \ sendAsynchronousRequest:request\n                                       queue:[NSOperationQueue\
    \ currentQueue]\n                           completionHandler:^(NSURLResponse\
    \ *response,\n                                               NSData *data, NSError\
    \ *error)\n    {\n      if (data == nil)\n      {\n        NSLog(@\"Error loading\
    \ request %@\", [error localizedDescription]);\n      }\n      else\n      {\n\
    \        NSLog(@\"\\n\\tDownloaded %lu bytes from request %@\",\n            \
    \  [data length], [request URL]);\n      }\n      downloadComplete = YES;\n  \
    \  }];\n\n    // Loop until finished downloading the resource\n    while ( !downloadComplete\
    \ &&\n           [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n\
    \  }\n  return 0;\n}\n```\n\nAfter the Foundation Framework import, the file defines\
    \ a constant value, `IndexURL`, for the URL to be downloaded.\n\nThe `main()`\
    \ function contains the body of the program logic. It begins by retrieving the\
    \ current run loop, required for asynchronous URL loading with `NSURLConnection`\
    \ objects. It also declares and initializes a `BOOL` variable named `downloadComplete`.\
    \ This variable is declared with `__block` storage type, thereby enabling its\
    \ value to be changed within a block literal of the same scope. Next, an `NSURLRequest`\
    \ instance is created (its URL is specified by the `#define` constant) using the\
    \ convenience constructor `requestWithURL:`. Then the code creates an `NSURLConnection`\
    \ object to load the request. It uses the `sendAsynchronousRequest:queue:completionHandler:`\
    \ method. The completion handler is the handler block literal that is executed.\
    \ The queue is an `NSOperationQueue` instance to which the handler block is dispatched\
    \ when the request completes or fails. It is used to enable the execution of asynchronous\
    \ operations. The block literal checks the return value of the download request\
    \ (`NSData *`). If its value is `nil`, then an error occurred during the download\
    \ and this is logged to the console; otherwise, the download was successful and\
    \ the number of bytes downloaded is logged to the console.\n\n```\nif (data ==\
    \ nil)\n{\n  NSLog(@\"Error loading request %@\", [error localizedDescription]);\n\
    }\nelse\n{\n  NSLog(@\"\\n\\tDownloaded %lu bytes from request %@\",\n       \
    \ [data length], [request URL]);\n}\ndownloadComplete = YES;\n```\n\nThe next\
    \ statement is a loop used to keep the application running until the connection\
    \ has finished loading the resource.\n\n```\nwhile (!downloadComplete &&\n   \
    \    [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n\
    ```\n\nThis statement was used in examples in previous chapters. To summarize,\
    \ it runs the loop, receiving events from its input sources and executing any\
    \ corresponding delegate or callback methods until the connection has finished\
    \ loading the resource.\n\nNow save, compile, and run the `BlockURLLoader` program\
    \ and observe the messages in the output pane (as shown in [Figure 15-4](#9781430250500_Ch15.xhtml#Fig4)).\n\
    \n![9781430250500_Fig15-04.jpg](images/9781430250500_Fig15-04.jpg)\n\n[Figure\
    \ 15-4](#9781430250500_Ch15.xhtml#_Fig4). Testing the BlockURLLoader project\n\
    \nThe messages in the output pane show that the URL was successfully downloaded\
