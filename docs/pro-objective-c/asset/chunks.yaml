    ```

    NSException *exception = [NSException exceptionWithName:NSGenericException

                                                     reason:@"Test exception"

                                                   userInfo:nil];

    ```


    该方法的参数包括：异常名称（`exceptionWithName:`）、异常原因（`reason:`）以及一个包含用户自定义信息的字典（`userInfo:`）。在上述示例中，异常名称为`NSGenericException`，这是Foundation常量中的通用异常名称之一。[清单14-9](#9781430250500_Ch14.xhtml#list9)
    使用`raise:format:`类方法创建并引发了一个异常。该异常在对应的`@catch()`代码块中被捕获并处理。


