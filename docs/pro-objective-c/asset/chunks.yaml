    in the following statement which sets the thread `myThread` to a priority of 1.0,
    the highest priority.


    ```

    [myThread setThreadPriority:1.0];

    ```


    A thread can be signaled to cancel with `cancel` method; the following statement
    sends this message to the thread `myThread`.


