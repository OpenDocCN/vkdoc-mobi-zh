    [[NSOperationQueue mainQueue] addOperation:greetingOp];

    ```


    操作队列提供了一种更简单、更高效的并发实现机制，因此建议在实现并发编程时使用操作队列来替代线程。


    ## 锁


    `NSLock`、`NSDistributedLock`、`NSConditionLock` 和 `NSRecursiveLock` 用于创建锁，以同步代码执行。`NSLock`
    为并发编程实现了一个基本的互斥锁。它遵循 `NSLocking` 协议，因此实现了 `lock` 和 `unlock` 方法，用于相应地获取和释放锁。


    `NSDistributedLock` 类定义了一个锁，可以被多个主机上的多个应用程序用来控制对共享资源的访问。


    `NSConditionLock` 类定义了一个只能在特定条件下获取和释放的锁。


    `NSRecursiveLock` 类定义了一个锁，可以被同一个线程多次获取而不会导致死锁。它会跟踪被获取的次数，并且在释放锁之前，必须通过相应的解锁调用来平衡。


    ## 定时器和运行循环


    *运行循环*是一种基于线程的机制，用于调度工作和协调输入事件的接收。如果程序线程需要响应传入事件，则需要将其附加到运行循环，以便在新事件到达时唤醒该线程。iOS
    `UIApplication` 类（或 OS X 中的 `NSApplication`）的 run 方法会在正常的启动序列中启动应用程序的主循环；因此，如果你使用
    Xcode 模板项目创建 iOS 或 OS X 程序，通常不需要在代码中创建运行循环。在其他场景中——例如，创建命令行程序时——如果你的程序需要响应来自输入源的事件，则需要创建一个运行循环。Foundation
    框架包含许多异步提供输入的类（例如，网络、URL 处理和流 I/O API），因此你将使用运行循环与这些类的实例配合工作。


    `NSRunLoop` 类提供了管理运行循环的 API。该类包含访问运行循环和模式、管理定时器和端口、运行循环以及管理消息的方法。NSRunLoop 的 `currentRunLoop`
    方法检索当前运行循环，即当前线程的 `NSRunLoop` 对象。如果该线程尚不存在运行循环，则会创建并返回一个。以下语句检索当前线程的运行循环。


    ```objc

    NSRunLoop *loop = [NSRunLoop currentRunLoop];

    ```


    运行模式定义了运行循环的一组输入源。Foundation 框架定义了一组常量，用于指定可用的运行循环模式。常量 `NSDefaultRunLoopMode`
    是最常用的运行循环模式。


    有几种 `NSRunLoop` 方法用于运行循环。`run` 方法将线程置于 `NSDefaultRunLoopMode` 下的永久循环中，在此期间它会处理来自所有输入源的事件。如果你希望运行循环终止，则不应使用此方法，而应使用其他方法之一，这些方法根据输入接收和/或指定时间过去来有条件地运行循环。


    `runMode:beforeDate:` 方法在 `NSDefaultRunLoopMode` 下运行一次循环，阻塞等待输入，直到从附加的输入源接收到事件或
    `beforeDate:` 参数指定的日期到来。以下语句调用此方法，无限期等待直到收到输入。


    ```objc

    [loop runMode: NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]];

    ```


    提供日期参数值 `[NSDate distantFuture]` 意味着无限期等待，直到收到输入。


    `NSTimer` 类用于创建定时器，这些定时器在经过一定时间后向目标对象发送指定消息。它们与 `NSRunLoop` 对象配合工作，向线程提供同步的事件传递。一个
    `NSTimer` 决定了运行循环对象应等待输入的最大时间。`NSTimer` 包含创建和初始化定时器、触发定时器、停止定时器以及检索定时器信息的方法。`scheduledTimerWithTimeInterval:invocation:repeats:`
    方法创建一个在指定时间间隔后触发的定时器，使用指定的调用，并在请求时重复定时器。`invalidate` 方法停止定时器再次触发。`isValid` 方法返回一个布尔值，指示定时器当前是否有效。


