    ## Roundup


    In this chapter, you learned about Objective-C Literals, a recent addition to
    the Objective-C language. It covered the new literal syntax and the new object
    literals for creating `NSNumber`, `NSArray`, and `NSDictionary` instances. It
    also examined expression literals, object subscripting, and extending object subscripting
    in your own classes with the custom subscripting APIs. The key takeaways from
    this chapter include:


    *   `NSNumber` literals provide simple, concise notation for creating and initializing
    `NSNumber` objects from scalar literal expression. `NSNumber` literals can be
    created for any character, numeric, or Boolean literal value.

    *   `NSArray` literals simplify the creation of `NSArray` instances. The objects
    of the array must be Objective-C object pointer types. Array literals can be nested,
    thereby enabling the creation of arrays within arrays.

    *   `NSDictionary` literals simplify the creation of `NSDictionary` instances.
    Each key in the literal must be an object pointer type that conforms to the `NSCopying`
    protocol, and each value must be an object pointer type.

    *   The object literals (`NSNumber`, `NSArray`, `NSDictionary`) are evaluated
    at runtime; as such, they are not compile-time constants and cannot be used to
    initialize static or global variables.

    *   Expression literals (i.e., boxed expressions) enable you to create literals
    from parentheses-enclosed expressions. The expression evaluates to either a scalar
    (numeric, enumerations, `BOOL`) or C-string pointer type. The type of the resultant
    object corresponds to the type of the expression; scalar types produce `NSNumber`
    instances and C strings produce `NSString` objects using UTF-8 character encoding.

    *   Object subscripting provides a simple, concise syntax for getting and setting
    the elements of a Foundation Framework array and dictionary (e.g., `NSArray` and
    `NSDictionary`). In addition, the subscripting operators are generic, and thus
    enable the corresponding methods to be implemented by any class to provide custom
    subscripting.

    *   The custom subscripting operations should be used to get and set the elements
    of an object, and not for other purposes (e.g., appending or deleting objects,
    etc.). This enables the syntax to remain consistent with that employed for the
    Foundation Framework array and dictionary subscript operations, and thus provide
    ease of use.


    Now you should be well on your way to mastering Objective-C object literals and
    object subscripting. Feel free to review the material of this chapter and tinker
    with the program and examples to let it all sink in. The topic of the next chapter
    is concurrent programming, so when you’re ready, turn the page to begin.


    # Chapter 17: Concurrent Programming


    In computer science, *concurrent processing* refers to logical control flows (implemented
    in software) whose execution overlaps in time. Concurrent processing can occur
    at many different levels of a computer system, from the hardware level up to and
    including the application layer. From a programmer perspective, application-level
    concurrency enables you to develop applications that perform numerous operations
    in parallel, including responding to asynchronous events, accessing I/O devices,
    servicing network requests, parallel computing, and so forth.


    The Objective-C platform provides a variety of language extensions, APIs, and
    operating system services that are designed to enable you to safely and efficiently
    implement concurrent programming. In this chapter, you will explore this technology
    in depth and apply what you learn with several example programs.


    ## Concurrent Programming Fundamentals


    Concurrent programming is a broad field with many concepts and ideas that have
    various interpretations. Therefore, it’s important to understand some basic terminology,
    along with identifying some of the benefits and design concepts for concurrent
    programming.


    Let’s begin by differentiating concurrent from sequential processing. Basically,
    sequential processing refers to logical control flows that execute sequentially
    (i.e., one after the other), as shown in [Figure 17-1](#9781430250500_Ch17.xhtml#Fig1).


    ![9781430250500_Fig17-01.jpg](images/9781430250500_Fig17-01.jpg)


    [Figure 17-1](#9781430250500_Ch17.xhtml#_Fig1). Sequential processing of control
    flows


    This contrasts with the concurrent processing, which refers to logical control
    flows that may execute in parallel, as depicted in [Figure 17-2](#9781430250500_Ch17.xhtml#Fig2).


    ![9781430250500_Fig17-02.jpg](images/9781430250500_Fig17-02.jpg)


    [Figure 17-2](#9781430250500_Ch17.xhtml#_Fig2). Concurrent processing of control
    flows


    So, concurrent computing implies the simultaneous execution of multiple tasks.
    But in fact, whether a program designed to take advantage of concurrency actually
    executes multiple tasks in parallel is a function of the computer system on which
    it runs. This brings up another distinction that should be pointed out, and that’s
    the difference between concurrent and parallel computing. Broadly speaking, concurrent
    computing is a function of design, whereas parallel computing is a function of
    hardware.


    *Parallel computing* refers to software that executes multiple operations or tasks
    simultaneously. The ability to perform parallel computing (i.e., parallel processing)
    is directly a function of the computer system hardware. For example, most modern
    computers have multiple cores (CPUs) and/or multiple processors. This enables
    them to simultaneously execute multiple instructions. On the other hand, concurrent
    computing refers to software that is designed and implemented to be able to perform
    multiple operations or tasks simultaneously. If your software is designed and
    implemented using *concurrent programming* principles and mechanisms, then some/all
    of its component parts may execute concurrently depending upon the capabilities
    of the underlying computer system. Therefore, in order to realize the benefits
    of concurrency, you have to design and implement your software appropriately,
    and execute it on hardware that supports parallel processing.


    Finally, before you go any further, it’s important for you to understand the difference
    between concurrent and asynchronous programming. As I defined earlier, concurrent
    processing refers to multiple logical control flows that may execute in parallel.
    *Asynchronous processing*, on the other hand, is effectively a mechanism for the
    asynchronous (i.e., nonblocking) invocation of methods/functions. In other words,
    the caller invokes the method and can continue processing while the method is
    being executed. This approach can improve application responsiveness, system throughput,
    and so forth, while abstracting the underlying implementation mechanisms. Asynchronous
    processing can be implemented using a variety of devices, including concurrent
    programming APIs and services.


