    # 图 4-7 测试 `ARC OrderEntry` 项目


    这些消息显示了初始化与释放动态创建对象时的调用序列。可以看到 ARC 内存管理正确执行，所有动态创建的对象在不使用时均被释放。你还可以通过选择 Xcode
    Product 菜单中的 **Analyze** 选项，对程序的内存管理进行初步检查。对比 MRR Orders 项目和 ARC Orders 项目，可以发现后者显著减少了需要编写的代码量。随着项目规模与复杂度的增长，ARC
    的优势会愈发明显。由于 ARC 可以按单个文件启用，且使用 ARC 编译的代码能与基于 MRR 构建的现有代码共存，因此没有理由不在你的项目中使用它。事实上，对于新的
    Objective-C 项目，苹果推荐采用 ARC 作为内存管理机制。


    ## 避免循环引用


    Objective-C 的引用计数模型通过获取对象的所有权（通过 `retain` 消息）并在不再需要该对象时释放所有权（通过 `release` 消息）来实现。这一过程在
    ARC 中被自动化，ARC 会自动在代码中插入所需的 `retain`/`release`/`autorelease` 消息。然而，在对象图中，如果两个对象之间存在循环引用，就会产生循环引用问题。例如，在前面的
    ARC Orders 项目中，`OrderEntry` 对象拥有一个 `OrderItem` 实例变量，默认情况下这是一个强引用。现在，如果 `OrderItem`
    对象也拥有一个 `OrderItem` 实例变量，就会在这两个对象之间形成循环引用。如果这种情况发生，两个对象都将永远无法被释放，从而导致内存泄漏。实际上，`OrderEntry`
    对象必须等到 `OrderItem` 对象被释放后才能释放，而 `OrderItem` 对象也必须等到 `OrderEntry` 对象被释放后才能释放。解决此问题的方法是使用弱引用。弱引用是一种*非拥有关系*；也就是说，声明为弱引用的对象并不由声明对象所拥有，从而消除了循环引用。苹果在
    Objective-C 中对对象图的约定是：父对象对其每个子对象保持强引用，而子对象（如有必要）对父对象保持弱引用。因此，在本例中，`OrderEntry`
    对象会对其 `OrderItem` 对象保持强引用，而 `OrderItem` 对象则对其父对象 `OrderEntry` 保持弱引用。弱引用将在 `OrderItem`
    类中声明（如列表 4-15 所示）。


    ### 列表 4-15 声明弱引用


    ```

    #import <Foundation/Foundation.h>


    @interface OrderItem : NSObject


    {

    @public NSString *name;

    OrderEntry *__weak entry;

    }


    - (id) initWithName:(NSString *)itemName;


    @end

    ```


    当 `entry` 变量被销毁时，它会被设置为 `nil`，从而避免循环引用。


    ## 总结


    本章详细介绍了 Objective-C 内存管理的细节，包括 Objective-C 内存模型、Objective-C 程序中内存的分配与释放方式，以及如何使用
    Objective-C 提供的两种内存管理方法。以下是关键要点：


    - 在运行时，Objective-C 程序会创建对象（通过 `NSObject alloc` 方法），这些对象存储在称为“程序堆”的动态分配内存中。动态创建对象意味着需要进行内存管理，因为在堆上创建的对象永远不会超出作用域。不正确或缺乏内存管理的典型结果包括内存泄漏和野指针。

    - Objective-C 内存管理使用引用计数来实现，这是一种通过对象的唯一引用计数来判断对象是否仍在使用的技术。如果一个对象的引用计数降至零，它就被认为不再被使用，其内存将由运行时系统释放。

    - Apple 的 Objective-C 开发环境提供了两种内存管理机制：手动保留-释放（MRR）和自动引用计数（ARC）。

    - 使用 MRR 时，你通过编写代码显式管理对象的生命周期：对你创建/需要使用的对象获取所有权，并在不再需要这些对象时释放该所有权。

    - ARC 采用了与 MRR 相同的引用计数模型，但利用编译器来管理对象的生命周期。在程序编译时，编译器分析源代码，确定动态创建对象的生命周期需求，然后在编译后的代码中自动插入必要的
    retain 和 release 消息。

    - ARC 通过新的对象生命周期限定符得到了增强，这些限定符用于显式声明对象变量和属性的生命周期，并且还包括用于防止对象图中循环引用的功能（弱引用）。

    - ARC 可以在整个项目中使用，也可以按单个文件启用，从而使使用 ARC 的代码能够与不符合 ARC 要求的现有代码协同工作。苹果还提供了一个用于将现有
    Objective-C 代码迁移到 ARC 的转换工具。对于所有新的 Objective-C 项目，ARC 是推荐的内存管理工具。


    内存管理对于 Objective-C 软件开发非常重要。它对应用程序的用户体验以及整个系统的运行都有重大影响。一个编写良好的 Objective-C 程序只会使用其所需的内存，不会发生内存泄漏，也不会尝试访问不再使用的对象。现在你已经了解了
    Objective-C 内存模型以及应用程序内存管理所提供的方法：MRR 和 ARC（苹果推荐的方法）。在下一章中，你将探讨 Objective-C 平台的另一个关键元素——预处理器。猜猜看？这意味着你还将学习一门新的编程语言！所以，何不休息一下，给自己一个应得的放松呢？当你准备好了，翻到下一页开始下一章。


    # 第 5 章：预处理器


    Objective-C 编程语言包含一个预处理器，用于在编译之前翻译源文件。部分翻译是自动执行的，另一部分则基于你在源文件中包含的预处理器语言元素。如果你查看公开可用的
    Objective-C 源代码，例如苹果的 Objective-C 源代码，你很可能会发现大量使用预处理器语言的情况。那么，你可能会好奇：预处理器的特性是什么？如何在程序中最佳地使用这种语言？这些正是本章的主题，让我们开始吧！


    ## 概述


    源代码编译的一般过程是：将输入的源文件转换成可在目标计算平台上执行的文件。Objective-C 编译器将此过程分为几个阶段，如图 5-1 所示。


    ![9781430250500_Fig05-01.jpg](img/9781430250500_Fig05-01.jpg)


    ### 图 5-1 编译 Objective-C 源文件

