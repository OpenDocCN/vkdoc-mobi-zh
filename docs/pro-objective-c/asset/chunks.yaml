    The file begins by declaring a class extension that enables write access for the
    `computeResult` property. Next, the implementation begins by declaring several
    private instance variables used for thread management and synchronization. Of
    note is the `computeTasks` variable; it contains a count of the number of threads
    concurrently executing the `computeTask:` method. The `init` method initializes
    `ConcurrentProcessor` objects, setting variables to the appropriate initial values.


    Now let’s examine the `computeTask:` method. First, observe that the method is
    surrounded by an autorelease pool and a try-catch exception block. These are required
    to ensure that objects are not leaked from the thread in which the method executes
    and that it handles any thrown exceptions (each thread is responsible for handling
    its own exceptions). Because this method can be executed concurrently by multiple
    threads and it also accesses and updates shared data, access to this data must
    be synchronized. The code uses the `@synchronized` directive to control access
    to the `computeTasks` variable, thereby enabling it to be updated by one thread
    at a time.


    ```

    @synchronized(computeID)

    {

      computeTasks++;

    }

    ```


    The method is also implemented to support thread cancellation, and thus periodically
    checks the state of the thread and exits if it is cancelled.


    ```

    if ([[NSThread currentThread] isCancelled])

    {

      return;

    }

    ```


    Next, the method contains code to perform its computations. This simple computation
    merely increments the value of the `computeResult` property the number of times
    specified by the method’s input parameter. This code must be performed within
    a critical section to enforce synchronized access to its shared data. The code
    acquires a lock to the `NSLock` instance. Once the lock is obtained, it tests
    to see if the thread has been cancelled, and if so, it releases the lock and exits
    the thread without performing its computations.


    ```

    [computeLock lock];

    if ([[NSThread currentThread] isCancelled])

    {

      [computeLock unlock];

      return;

    }

    ```


    The code then performs its computations and releases the lock. Next, the thread
    pauses for one second to simulate additional processing performed outside of the
    critical section (hence concurrently).


    ```

    [computeLock unlock];

    [NSThread sleepForTimeInterval:1.0];

    ```


    The method concludes by decrementing the number of threads executing it, and setting
    the `isFinished` property if none remain. This logic is all implemented within
    a synchronized block to ensure access by only one thread at a time.


    ```

    @synchronized(computeID)

    {

      computeTasks--;

      if (!computeTasks)

      {

        self.isFinished = YES;

      }

    }

    ```


