  raw: '*   *Object-oriented programming*: The Objective-C programming language provides
    complete support for object-oriented programming (OOP), including capabilities
    such as object messaging, encapsulation, inheritance, polymorphism, and open recursion.

    *   *Object messaging*: Object messaging enables objects to collaborate by passing
    messages between themselves. In effect, Objective-C code (e.g., a class/object
    method or a function) sends a message to a receiving object *(the receiver)* and
    the receiver uses the message to invoke its corresponding method, returning a
    result if required. If the receiver does not have a corresponding method, it can
    handle the message in other ways, such as forwarding it to another object, broadcasting
    it to other objects, introspecting it and applying custom logic, and so forth.

    *   *Dynamic runtime*: Compared to many other languages that support OOP, Objective-C
    is very dynamic. It shifts much of the responsibility for type, message, and method
    resolution to the runtime, rather than compile or link time. These capabilities
    can be used to facilitate developing and updating programs both in real time,
    without the need to recompile and redeploy software, and over time, with minimal
    or no impact to the existing software.

    *   *Memory management*: Objective-C provides a memory management capability,
    Automatic Reference Counting (ARC), which both simplifies application development
    and improves application performance. ARC is a compile-time technology that incorporates
    many of the benefits of traditional automatic memory management mechanisms (i.e.,
    garbage collectors). However, compared to these traditional technologies, ARC
    provides better performance (memory management code is interleaved with your program
    code at compile time), however, and it doesn’t introduce memory management-induced
    pauses into program execution.

    *   *Introspection and Reflection*: The Objective-C language includes features
    that enable a program to query an object at runtime, provide information (its
    type, properties, and the methods it supports), and modify its structure and behavior.
    This enables a program to be modified during its lifetime of execution.

    *   *C language support*: Objective-C is primarily an object-oriented extension
    to the C language. It constitutes a superset of C. This means that the raw power
    of C is available and that C libraries can be accessed directly.

    *   *Apple technologies*: Apple provides a wealth of software libraries and tools
    for Objective-C application development. The development kits have frameworks
    and libraries that include the infrastructure, enabling you to focus on developing
    your application-specific logic. Xcode, Apple’s integrated development environment,
    provides all the tools you’ll need to develop great applications using Objective-C.


    These are just some of the reasons why Objective-C continues to grow in popularity
    among developers—and I’m sure you’ll discover more as you continue through this
    book. OK, enough talk. Now let’s use Xcode to take Objective-C out for a test
    drive and find out what it’s really capable of!


    Developing a Simple Objective-C Program


    The best way to become proficient in a programming language is to learn by doing,
    so now you are going to start writing some code! But first, let’s download and
    install Xcode.


    Xcode is a complete IDE for Objective-C software development on the Mac. It is
    fully integrated with both iOS and OS X, and it includes all the tools necessary
    for writing and compiling source code, developing sophisticated user interfaces,
    software testing and debugging, release build and version management, project
    management, and a host of other features. Xcode is a free download for all members
    of the Apple iOS and Mac Developer Programs. If you are not a member of either
    program, it is also available as a free download from the Mac App Store. The examples
    in this book were developed using Xcode 4.5, the current release. This version
    of the IDE will run on any Intel Mac computer that has OS X Lion or later installed.


    Creating the Project


    Once you have downloaded and installed Xcode, launch the program. The Xcode welcome
    window shown in [Figure 1-1](#9781430250500_Ch01.xhtml#Fig1) will display.


    ![9781430250500_Fig01-01.jpg](images/9781430250500_Fig01-01.jpg)


    [Figure 1-1](#9781430250500_Ch01.xhtml#_Fig1). Xcode welcome window


