  raw: 'What result would you get if you later wrote the following statement in your
    source code?


    ```

    int product = SQUARE(4 + 2);

    ```


    Guess what? It’s not 36! Let’s see exactly how the macro works. Remember, it simply
    substitutes the macro for the corresponding code; hence, the statement is macro-expanded
    to


    ```

    int product = 4 + 2 * 4 + 2;

    ```


    Due to Objective-C operator precedence and associativity rules (listed in [Appendix
    A](#9781430250500_AppA.xhtml)), in the preceding statement, the multiplication
    of 2 * 4 is performed before the addition; thus, this statement will return a
    value of 14—probably not what you expect! To avoid these types of issues (due
    to macro expansion), you can surround the macro arguments and the macro itself
    with parentheses, as shown in the initial definition for the `ADD` macro.


    ```

    #define SQUARE(x)  ((x) * (x))

    ```


    In fact, parentheses should be used for both function-like and object-like macros.
    On the other hand, multiline function-like macros that are being used to perform
    a computation rather than return a value should be surrounded by curly braces
    ({ }). For example, the following macro is surrounded with curly braces:


    ```

    #define SWAP(a, b)  {a^=b; b^=a; a^=b;}

    ```


    Function-like macro definitions accept two special operators (# and ##) in the
    replacement sequence. The *stringification* operator (represented by the `#` symbol)
    is used to replace a macro input parameter with the corresponding text string
    (surrounded by double-quotes). The *concatenation* operator (represented by the
    `##` symbol) is used to concatenate two tokens, leaving no blank space between
    them.


    Warning, Don’t Overuse Macros!


    Macros, particularly function-like macros, are a powerful feature, but can be
    very dangerous to use. Because preprocessor replacements happen before the source
    is parsed, it can be difficult to define macros that correctly expand in all cases.
    It is often problematic to pass arguments with *side effects* (i.e., changes the
    value of an argument(s)) to function-like macros. This can result in one or more
    of these arguments being evaluated multiple times (i.e., duplication of side effects),
    and therefore making unexpected changes to their values, which are difficult to
    diagnose.


    Finally, code that relies heavily on complicated macros may be difficult to maintain
    because their syntax is, on many occasions, different from that used in Objective-C.


    Roundup


    This has been fun. You just learned a programming language in one chapter! Well,
    perhaps it hasn’t been that extreme, but now you have a good understanding of
    how the Objective-C preprocessor works and how the preprocessor language is used
    in Objective-C source files. Particularly, if you want to understand many publicly
    available software libraries and frameworks, or would like to examine Apple’s
    Objective-C source code, detailed knowledge of the preprocessor language is invaluable.
    To summarize, the following are the key takeaways from this chapter:


    *   The preprocessor is used during the lexical analysis phase of compilation,
    which occurs prior to parsing. It works by substituting the input character sequences
    (of source files) for other character sequences, according to a set of predefined
    rules. These operations perform textual translation, token conversion, and preprocessor-based
    language transformation.

    *   The preprocessor language is a separate programming language that’s distinct
    from Objective-C. The source file transformations performed using the language
    are primarily source file inclusions, conditional compilation, and macro expansions.

    *   The preprocessor language defines *directives* to be executed and *macros*
    to be expanded. A preprocessor directive is a command that is executed by the
    preprocessor, not the compiler. A preprocessor macro is a named code fragment.
    Wherever the name is used in the source code, the code fragment is substituted
    for it.

    *   Preprocessor directives perform header file inclusion, conditional processing,
    diagnostics, and platform-specific operations (pragmas).

    *   A preprocessor macro is a named code fragment. Wherever the name is used in
    a source file, the code fragment is substituted for it. Preprocessor macros define
    constant values and/or provide function-like substitutions complete with input
    parameter values.

    *   Macros, particularly function-like macros, are a powerful feature, but can
    be very dangerous. Improper use can cause misnesting, operator precedence problems,
    duplication of side effects, and other problems. In addition, code that relies
    heavily on complicated macros may be difficult to maintain because their syntax
    is often different from that used in Objective-C. In general, you should minimize
    your use of macros in your Objective-C source code.


    Chapter     6


    Expert Section Using ARC


    Believe it or not, you’re approaching the end of Part 1 in this book. So far,
    so good! Part 1 concludes with this Expert Section chapter. *Expert Section* chapters
    are designed to provide additional details and more in-depth coverage of a subject
    presented earlier in the book. In this chapter, you’ll learn some of the finer
    details surrounding ARC memory management. You’ll review some key points about
    ARC memory management and object ownership, and also learn how to use ARC with
    toll-free bridged objects.


    ARC and Object Ownership


    Recall from [Chapter 4](#9781430250500_Ch04.xhtml) that Objective-C code creates
    objects stored in dynamically allocated memory (the heap). Objects created on
    the heap never go out of scope, thus application memory management is required
    to ensure that these objects are removed from memory when no longer in use, and
    that a program doesn’t erroneously free objects still being used. Objective-C
    implements memory management using a reference counting model, whereby unique
    references to an object are used to determine whether or not an object is still
    in use. ARC automates this task by inserting code (at compile time) to properly
    balance `retain` and `release` messages on objects, per the reference counting
    model. ARC prohibits programmatic control of object life cycle. Specifically,
    you can’t send `retain` or `release` messages to control ownership interest in
    objects. Hence, it is very important to understand the rules pertaining to object
    ownership under ARC.


    Claiming Ownership Interest in Objects


    Your Objective-C code takes an ownership interest in any object that it creates
    using any method that has a name beginning with `alloc`, `new`, `copy`, or `mutableCopy`.
    The `main()` function shown in [Listing 6-1](#9781430250500_Ch06.xhtml#list1)
    creates an `Atom` object using the `alloc` method, and thus claims an ownership
    interest in this object.


    [*Listing 6-1.*](#9781430250500_Ch06.xhtml#_list1)  Creating an Atom Object


    ```

    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        Atom *atom = [[Atom alloc] init];

        [atom logInfo];

      }


    return 0;

    }

    ```'
  trans: "\n# 排版后的内容\n\n如果你在源代码中写入以下语句，会得到什么结果？\n\n```\nint product = SQUARE(4 + 2);\n\
    ```\n\n猜猜看？结果不是 `36`！让我们看看宏究竟如何工作。记住，它只是简单地将宏替换为对应的代码；因此，该语句会宏展开为：\n\n```\nint\
    \ product = 4 + 2 * 4 + 2;\n```\n\n由于 Objective-C 的运算符优先级和结合性规则（列于附录 A），在上述语句中，`2\
    \ * 4` 的乘法会在加法之前执行；因此，该语句将返回值 `14`——这可能不是你期望的结果！为了避免这些由于宏展开导致的问题，你可以用括号将宏参数和宏本身包围起来，如下面\
    \ `ADD` 宏的初始定义所示：\n\n```\n#define SQUARE(x)  ((x) * (x))\n```\n\n事实上，函数式宏和对象式宏都应该使用括号。另一方面，用于执行计算而非返回值（例如执行一系列操作）的多行函数式宏，应该用花括号（`{\
    \ }`）包围。例如，下面的宏用花括号包围：\n\n```\n#define SWAP(a, b)  {a^=b; b^=a; a^=b;}\n```\n\n\
    函数式宏定义在替换序列中接受两个特殊运算符（`#` 和 `##`）。*字符串化*运算符（用 `#` 符号表示）用于将宏输入参数替换为对应的文本字符串（用双引号包围）。*连接*运算符（用\
