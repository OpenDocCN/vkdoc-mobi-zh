  trans: "\n# 类与对象的代码生成\n\n当编译器解析包含类定义和对象的 Objective-C 代码时，会生成对应的运行时数据结构。一个 Objective-C\
    \ 类对应一个运行时库中的 `Class` 数据类型。根据 Apple 运行时参考文档，`Class` 数据类型是指向一个标识符为 `objc_class`\
    \ 的不透明类型的指针。\n\n```\ntypedef struct objc_class *Class;\n```\n\n*不透明数据类型* 是指在其接口中定义不完整的\
    \ C 语言 `struct` 类型。不透明类型提供了一种数据隐藏的形式，因为它们的变量只能通过专门为其设计的函数来访问。运行时库函数用于访问 `Class`（即\
    \ `objc_class`）数据类型的变量。\n\n正如 Objective-C 类拥有运行时数据类型一样，Objective-C 对象也拥有对应的运行时数据类型。当编译器解析对象的\
    \ Objective-C 代码时，会生成创建运行时对象类型的代码。在代码清单 8-1 中定义的这一数据类型，是一个标识符为 `objc_object` 的\
    \ C 语言 `struct`。\n\n*代码清单 8-1.* `objc_object` 数据类型\n\n```\nstruct objc_object\n\
    {\n  Class isa;\n  /* ...可变长度数据，包含实例变量的值...  */\n};\n```\n\n当你创建一个对象时，会为 `objc_object`\
    \ 类型分配内存，该类型由一个 `isa` 指针以及紧随其后的对象实例变量数据组成。\n\n请注意，与 `Class` 数据类型类似，`objc_object`\
    \ 类型包含一个名为 `isa` 的 `Class` 类型变量；换句话说，就是一个指向 `objc_class` 类型变量的指针。实际上，所有 Objective-C\
    \ 对象和类的运行时数据类型都以一个 `isa` 指针开头。例如，Objective-C 中 `id` 类型在运行时的等价物是一个定义为指向 `objc_object`\
    \ 指针的 C 语言 `struct`。\n\n*代码清单 8-2.* `id` 类型定义\n\n```\ntypedef struct objc_object\n\
    {\n  Class isa;\n} *id;\n```\n\n换句话说，`id` 仅仅是一个指向标识符为 `objc_object` 的 C 语言 `struct`\
    \ 的指针。Objective-C 块对象的运行时数据结构遵循同样的约定，从而使它们也能够被运行时系统正确管理。\n\n# 查看运行时数据结构\n\n在进一步探讨这些概念之前，让我们创建一个示例，让你了解\
    \ Objective-C 对象和类如何映射到之前讨论的运行时数据结构。在 Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New**\
    \ ![image](img/arrow.jpg) **Project …** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序（从\
    \ Mac OS X 应用程序选项中选择 **Command Line Tool**），然后点击 **Next**。在 **Project Options**\
    \ 窗口中，将产品名称指定为 **Runspector**，选择 **Foundation** 作为项目类型，通过勾选 **Use Automatic Reference\
    \ Counting** 复选框选择 ARC 内存管理，然后点击 **Next**。\n\n在文件系统中指定你想要创建项目的位置（如有必要，选择 **New\
    \ Folder** 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\n现在让我们来实现代码。在导航窗格中选择\
    \ **main.m** 文件，然后添加代码清单 8-3 中所示的代码。\n\n*代码清单 8-3.* Runspector `main.m` 文件\n\n\
    ```\n#import <Foundation/Foundation.h>\n#import <objc/runtime.h>\n\n// 测试类 1\n\
    @interface TestClass1 : NSObject { @public int myInt; }\n@end\n@implementation\
    \ TestClass1\n@end\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // 创建一个类的几个实例并显示其数据\n    TestClass1 *tc1A = [[TestClass1 alloc] init];\n\
    \    tc1A->myInt = 0xa5a5a5a5;\n    TestClass1 *tc1B = [[TestClass1 alloc] init];\n\
    \    tc1B->myInt = 0xc3c3c3c3;\n    long tc1Size = class_getInstanceSize([TestClass1\
    \ class]);\n    NSData *obj1Data = [NSData dataWithBytes:(__bridge const void\
    \ *)(tc1A)\n                                     length:tc1Size];\n    NSData\
    \ *obj2Data = [NSData dataWithBytes:(__bridge const void *)(tc1B)\n          \
    \                            length:tc1Size];\n    NSLog(@\"TestClass1 对象 tc1\
    \ 包含 %@\", obj1Data);\n    NSLog(@\"TestClass1 对象 tc2 包含 %@\", obj2Data);\n  \
    \  NSLog(@\"TestClass1 内存地址 = %p\", [TestClass1 class]);\n  }\n  return 0;\n}\n\
    ```\n\n好的，我们来回顾一下这段代码。在 `main.m` 文件的开头，注意导入语句\n\n```\n#import <objc/runtime.h>\n\
    ```\n\n这条语句是为了在文件中包含运行时库的 API。在导入语句之后，代码定义了类 `TestClass1`。这个简单的类没有方法，只有一个公有的实例变量。在\
    \ `main()` 函数中，创建并初始化了两个 `TestClass1` 对象，并为每个对象的实例变量赋值。对象创建后，使用 Foundation 框架的\
    \ `NSData` 类来获取每个对象的数据（以字节为单位）。运行时库函数 `class_getInstanceSize()` 用于获取类实例的大小（以字节为单位）。数据检索完成后，使用\
    \ Foundation 框架的 `NSLog` 函数将其显示在输出窗格中。当你编译并运行程序时，应该会看到类似于图 8-1 所示的输出。\n\n![9781430250500_Fig08-01.jpg](img/9781430250500_Fig08-01.jpg)\n\
    \n图 8-1. Runspector 程序，对象检查\n\n在输出窗格中，`TestClass1` 对象包含代码清单 8-4 中的数据。\n\n*代码清单\
    \ 8-4.* Runspector 程序输出的 TestClass1\n\n```\nTestClass1 对象 tc1 包含 <78110000 01000000\
    \ a5a5a5a5 00000000>\nTestClass1 对象 tc2 包含 <78110000 01000000 c3c3c3c3 00000000>\n\
    TestClass1 内存地址 = 0x100001178\n```\n\n让我们来分析这些数据。在代码清单 8-2 中已经表明，当编译器解析一个对象时，会生成一个\
    \ `objc_object` 类型的实例，其内容包含一个 `isa` 指针和该对象实例变量的值。因此，查看程序的输出（参见代码清单 8-4），`TestClass1`\
    \ 对象 1 (`tc1`) 的数据包含两个项目：一个 `isa` 指针（`78110000 01000000`）和分配给其实例变量的值（`a5a5a5a5\
    \ 00000000`）。类似地，`TestClass1` 对象 2 (`tc2`) 的数据包含一个 `isa` 指针（`78110000 01000000`）和分配给其实例变量的值（`c3c3c3c3\
    \ 00000000`）。请注意，对象 `objc_object` 数据结构中的第一项就是它的 `isa` 指针。同时还要注意，两个实例的 `isa` 指针是相同的。这正如预期，因为它们是同一个类的实例，因此应具有相同的指针值。现在，一个\
    \ `isa` 指针指向一个类在内存中的地址，如代码清单 8-4 的最后一行所示。\n\n```\nTestClass1 内存地址 = 0x100001178\n\
    ```\n"
- fmt: "您可能在想：“这个内存地址与`isa`指针显示的值不一样！”实际上是一样的：运行此程序的Mac Pro计算机采用*小端序*，这意味着它反转了内存中存储的字节顺序。因此，`isa`指针显示的地址字节序（`0x78110000\
    \ 01`）与实际内存地址的字节序是相反的。好吧，希望这一切开始变得清晰了。我们继续深入。通过添加[代码清单8-5](#9781430250500_Ch08.xhtml#list5)中的代码来更新`main()`函数。\n\
    \n*[代码清单 8-5.](#9781430250500_Ch08.xhtml#_list5)*  Runspector程序`main()`函数，类数据类型\n\
    \n```\n// Retrieve and display the data for the TestClass1 class object\nid testClz\
    \ = objc_getClass(\"TestClass1\");\nlong tcSize = class_getInstanceSize([testClz\
    \ class]);\nNSData *tcData = [NSData dataWithBytes:(__bridge const void *)(testClz)\n\
    \                                 length:tcSize];\nNSLog(@\"TestClass1 class contains\
    \ %@\", tcData);\nNSLog(@\"TestClass1 superclass memory address = %p\", [TestClass1\
    \ superclass]);\n```\n\n在[代码清单8-5](#9781430250500_Ch08.xhtml#list5)中，你添加了代码来检索并显示`TestClass1`类对象的数据字节。运行时函数`objc_getClass()`用于获取`TestClass1`类，然后通过`NSData`实例和`NSLog`函数显示其数据。代码还显示了`TestClass1`超类的内存地址。当你编译并运行程序时，应该会看到类似[图8-2](#9781430250500_Ch08.xhtml#Fig2)所示的输出。\n\
    \n![9781430250500_Fig08-02.jpg](images/9781430250500_Fig08-02.jpg)\n\n*[图 8-2.](#9781430250500_Ch08.xhtml#_Fig2)*\
    \  Runspector程序，对象和类检查\n\n输出窗格显示[代码清单8-6](#9781430250500_Ch08.xhtml#list6)中的结果。\n\
    \n*[代码清单 8-6.](#9781430250500_Ch08.xhtml#_list6)*  Runspector程序的TestClass1输出\n\
    \n```\nTestClass1 object tc1 contains <88110000 01000000 a5a5a5a5 00000000>\n\
    TestClass1 object tc2 contains <88110000 01000000 c3c3c3c3 00000000>\nTestClass1\
    \ memory address = 0x100001188\nTestClass class contains <60110000 01000000 4028a271\
    \ ff7f0000>\nTestClass1 superclass memory address = 0x7fff71a22840\n```\n\n`TestClass1`对象的数据与你之前观察到的一致——每个对象都包含一个`isa`指针以及赋值给其实例变量的值。`TestClass1`类对象的数据由一个`isa`指针（`60110000\
    \ 01000000`）和另一个值（`4028a271 ff7f0000`）组成。这个额外的值实际上是指向对象超类的指针。之前你了解到类的数据结构有一个`isa`指针（参考[代码清单8-1](#9781430250500_Ch08.xhtml#list1)），因此这个结果也与预期值一致。列出的超类内存地址确认了你在类对象数据中看到的内容。\n\
    \n好了，你现在应该对编译器在Objective-C运行时中的角色有了很好的理解。你还实现了一个程序，使用了一些运行时API来检查编译器生成的数据结构。干得漂亮！现在让我们继续学习运行时库，并研究它的一些实现细节。\n\
    \n## 运行时库\n\nApple的Objective-C运行时库实现了Objective-C语言的面向对象特性和动态属性。在大多数情况下，运行时库在后台运行，但它也包含一个公共API，可以直接在你的代码中使用。\n\
    \n这个API是用C语言表达的，由一组函数、数据类型和语言常量组成。你在上一节中了解了一些关键的运行时数据类型（例如`objc_object`、`objc_class`），并使用了一些这些函数。总的来说，运行时库的数据类型可以分组如下：\n\
    \n*   类定义数据结构（`class`、`method`、`ivar`、`category`、`IMP`、`SEL`等）\n*   实例数据类型（`id`、`objc_object`、`objc_super`）\n\
    *   值（`BOOL`）\n\n函数属于以下类别：\n\n*   对象消息传递\n*   类函数\n*   实例函数\n*   协议函数\n*   方法函数\n\
    *   属性函数\n*   选择子函数\n\n运行时库还定义了多个布尔常量（`YES`、`NO`）和空值（`NULL`、`nil`、`Nil`）。\n\n\
    运行时库的公共API在头文件`runtime.h`中声明。Apple的运行时库可以在`http://opensource.apple.com`上查阅。它结合了多种设计元素和系统服务，以提供出色的性能和可扩展性，满足Objective-C语言随时间的演变。在本章后面，你将了解运行时库实现的元素。现在，让我们通过开发一个使用这些API的程序来获得一些实践经验。\n\
    \n## 使用运行时库API创建类\n\n现在你将创建一个程序，使用运行时API动态创建类。在Xcode中，通过从Xcode文件菜单中选择**新建** ![image](images/arrow.jpg)\
    \ **项目…** 来创建一个新项目。在**新项目助手**窗格中，创建一个命令行应用程序（从Mac OS X应用程序选择中选择**命令行工具**），然后点击**下一步**。在**项目选项**窗口中，指定产品名称为**DynaClass**，选择项目类型为**Foundation**，通过勾选**使用自动引用计数**复选框来选择ARC内存管理，然后点击**下一步**。\n\
    \n在文件系统中指定你想要创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消勾选**源代码管理**复选框，然后点击**创建**按钮。\n\
    \n好了，现在让我们实现代码。在导航器窗格中选择**main.m**文件，然后添加[代码清单8-7](#9781430250500_Ch08.xhtml#list7)中显示的代码。\n\
    \n*[代码清单 8-7.](#9781430250500_Ch08.xhtml#_list7)*  DynaClass项目的main.m文件\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <objc/runtime.h>\n#import <objc/message.h>\n\
    \nNSString *greeting(id self, SEL _cmd)\n{\n  return [NSString  stringWithFormat:\
    \ @\"Hello, World!\"];\n}\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // Dynamically create a class\n    Class dynaClass = objc_allocateClassPair([NSObject\
    \ class], \"DynaClass\", 0);\n\n// Dynamically add a method, use existing method\
    \ (description) to retrieve signature\n    Method description = class_getInstanceMethod([NSObject\
    \ class], @selector(description));\n    const char *types = method_getTypeEncoding(description);\n\
    \    class_addMethod(dynaClass, @selector(greeting), (IMP)greeting, types);\n\n\
    // Register the class\n    objc_registerClassPair(dynaClass);\n\n// Now use the\
    \ class - create an instance and send it a message\n    id dynaObj = [[dynaClass\
    \ alloc] init];\n    NSLog(@\"%@\", objc_msgSend(dynaObj, NSSelectorFromString(@\"\
    greeting\")));\n\n}\n  return 0;\n}\n```\n\n注意文件顶部的这个额外导入语句：\n\n```\n#import <objc/message.h>\n\
    ```"
  raw: 'You may be thinking, “That memory address isn’t the same as the value shown
    for the `isa` pointer!” Well actually it is: the Mac Pro computer on which this
    program was run is *little-endian*, which means that it reverses the order of
    bytes as stored in memory. Thus, the byte order of the address displayed by the
    `isa` pointer (`0x78110000 01`) is the reverse of the actual memory address. Well,
    hopefully this is all starting to make more sense. Let’s go a little further.
    Update the `main()` function by adding the code shown in [Listing 8-5](#9781430250500_Ch08.xhtml#list5).


    [*Listing 8-5.*](#9781430250500_Ch08.xhtml#_list5)  Runspector main() Function,
    Class Data Type


    ```

    // Retrieve and display the data for the TestClass1 class object

    id testClz = objc_getClass("TestClass1");

    long tcSize = class_getInstanceSize([testClz class]);

    NSData *tcData = [NSData dataWithBytes:(__bridge const void *)(testClz)

                                     length:tcSize];

    NSLog(@"TestClass1 class contains %@", tcData);

    NSLog(@"TestClass1 superclass memory address = %p", [TestClass1 superclass]);

    ```


    In [Listing 8-5](#9781430250500_Ch08.xhtml#list5), you added code to retrieve
    and display the data bytes for the `TestClass1` class object. The runtime `objc_getClass()`
    function is used to retrieve the `TestClass1` class, and then its data is displayed
    with an `NSData` instance and the `NSLog` function. The code also displays the
    memory address for the `TestClass1` superclass. When you compile and run the program,
    you should observe output similar to that shown in [Figure 8-2](#9781430250500_Ch08.xhtml#Fig2).


    ![9781430250500_Fig08-02.jpg](images/9781430250500_Fig08-02.jpg)


    [Figure 8-2](#9781430250500_Ch08.xhtml#_Fig2). Runspector program, object and
    class inspection


    The output pane displays the results shown in [Listing 8-6](#9781430250500_Ch08.xhtml#list6).


    [*Listing 8-6.*](#9781430250500_Ch08.xhtml#_list6)  TestClass1 Output from Runspector
    Program


    ```

    TestClass1 object tc1 contains <88110000 01000000 a5a5a5a5 00000000>

    TestClass1 object tc2 contains <88110000 01000000 c3c3c3c3 00000000>

    TestClass1 memory address = 0x100001188

    TestClass class contains <60110000 01000000 4028a271 ff7f0000>

    TestClass1 superclass memory address = 0x7fff71a22840

    ```


    The data of `TestClass1` objects are consistent with what you observed before—each
    contains an `isa` pointer and the value assigned to its instance variable. The
    data for the `TestClass1` class object consists of an `isa` pointer (`60110000
    01000000`) and another value (`4028a271 ff7f0000`). This additional value is actually
    the pointer to the object’s superclass. Earlier, you learned that the data structure
    for a class has an `isa` pointer (refer back to [Listing 8-1](#9781430250500_Ch08.xhtml#list1)),
    so this result is also consistent with the expected values. The memory address
    listed for the superclass confirms what you see in the data for the class object.


    Well, you should now have a good understanding of the role of the compiler within
    the Objective-C runtime. You also implemented a program that used a few of the
    runtime APIs to inspect the data structures generated by the compiler. Great job!
    Now let’s move on to runtime library and examine some of its implementation details.


    Runtime Library


    The Apple Objective-C runtime library implements the object-oriented features
    and dynamic properties of the Objective-C language. For the most part, the runtime
    library acts behind the scenes, but it also includes a public API that enables
    it to be used directly in your code.


    This API is expressed in C and consists of a set of functions, data types, and
    language constants. You learned about some of the key runtime data types (e.g.,
    `objc_object`, `objc_class`) and used a few of these functions in the previous
    section. Overall, the runtime library data types can be grouped as follows:


    *   Class definition data structures (`class`, `method`, `ivar`, `category`, `IMP`,
    `SEL`, etc.)

    *   Instance data types (`id`, `objc_object`, `objc_super`)

    *   Values (`BOOL`)


    The functions fall into the following categories:


    *   Object messaging

    *   Class functions

    *   Instance functions

    *   Protocol functions

    *   Method functions

    *   Property functions

    *   Selector functions


    The runtime library also defines several Boolean constants (`YES`, `NO`) and null
    values (`NULL`, `nil`, `Nil`).


    The runtime library public API is declared in the `runtime.h` header file. Apple’s
    runtime library is available for examination at `http://opensource.apple.com`.
    It incorporates a variety of design elements and system services to provide excellent
    performance and extensibility as the Objective-C language evolves over time. Later
    in this chapter, you’ll look at elements of the runtime library implementation.
    For now, let’s get a little hands-on experience by developing a program that uses
    these APIs.


    Creating a Class Using the Runtime Library APIs


    Now you are going to create a program that dynamically creates a class using the
    runtime APIs. In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)
    **Project …** from the Xcode File menu. In the **New Project Assistant** pane,
    create a command-line application (choose **Command Line Tool** from the Mac OS
    X Application selection) and click **Next**. In the **Project Options** window,
    specify **DynaClass** for the Product Name, choose **Foundation** for the Project
    Type, select ARC memory management by checking the **Use Automatic Reference Counting**
    check box, and then click **Next**.


    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    OK, now let’s implement the code. Select the **main.m** file in the navigator
    pane, and then add the code shown in [Listing 8-7](#9781430250500_Ch08.xhtml#list7).


    [*Listing 8-7.*](#9781430250500_Ch08.xhtml#_list7)  DynaClass main.m File


    ```

    #import <Foundation/Foundation.h>

    #import <objc/runtime.h>

    #import <objc/message.h>


    NSString *greeting(id self, SEL _cmd)

    {

      return [NSString  stringWithFormat: @"Hello, World!"];

    }


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Dynamically create a class

        Class dynaClass = objc_allocateClassPair([NSObject class], "DynaClass", 0);


    // Dynamically add a method, use existing method (description) to retrieve signature

        Method description = class_getInstanceMethod([NSObject class], @selector(description));

        const char *types = method_getTypeEncoding(description);

        class_addMethod(dynaClass, @selector(greeting), (IMP)greeting, types);


    // Register the class

        objc_registerClassPair(dynaClass);


    // Now use the class - create an instance and send it a message

        id dynaObj = [[dynaClass alloc] init];

        NSLog(@"%@", objc_msgSend(dynaObj, NSSelectorFromString(@"greeting")));


    }

      return 0;

    }

    ```


    Note this additional import statement at the top of the file:


    ```

    #import <objc/message.h>

    ```'
