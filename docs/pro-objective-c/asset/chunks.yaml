    in the `AspectProxy` object. Whew. When you’ve had enough time to digest this,
    let’s move on to the `main.m` file and test out your program!


    Testing the AspectProxy


    Let’s test the AspectProxy, but first let’s add a target class to the proxy. You’ll
    use the `Calculator` class that you implemented in [Chapter 7](#9781430250500_Ch07.xhtml).
    It declares the following methods:


    ```

    - (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2;

    - (NSNumber *) sumAddend1:(NSNumber *)adder1 :(NSNumber *)adder2;

    ```


    As you learned earlier in this chapter, Xcode provides a simple mechanism for
    importing files into a project. Hold down the Ctrl key and (from the Xcode project
    navigator pane) select the AspectProxy project. A drop-down window displays a
    set of options. Select the **Add Files to “AspectProxy” …** option. Navigate over
    to the Calculator project folder, select the **Calculator.h** and **Calculator.m**
    files, and click the **Add** button to add them to your AspectProxy project. OK,
    now with that done, let’s update the `main()`function to create a calculator proxy
    and invoke its methods, causing the AOP `AuditingInvoker` methods to be invoked
    as well. In the project navigator pane, select the **main.m** file and update
    it as shown in [Listing 9-15](#9781430250500_Ch09.xhtml#list15).


    [*Listing 9-15.*](#9781430250500_Ch09.xhtml#_list15)  AspectProxy main() Function


    ```

    #import <Foundation/Foundation.h>

    #import "AspectProxy.h"

    #import "AuditingInvoker.h"

    #import "Calculator.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create Calculator object

        id calculator = [[Calculator alloc] init];

        NSNumber *addend1 = [NSNumber numberWithInteger:-25];

        NSNumber *addend2 = [NSNumber numberWithInteger:10];

        NSNumber *addend3 = [NSNumber numberWithInteger:15];


    // Create proxy for object

        NSValue* selValue1 = [NSValue valueWithPointer:@selector(sumAddend1:addend2:)];

        NSArray *selValues = @[selValue1];

        AuditingInvoker *invoker = [[AuditingInvoker alloc] init];

        id calculatorProxy = [[AspectProxy alloc] initWithObject:calculator

                                                       selectors:selValues

                                                      andInvoker:invoker];


    // Send message to proxy with given selector

        [calculatorProxy sumAddend1:addend1 addend2:addend2];


    // Now send message to proxy with different selector, no special processing!

        [calculatorProxy sumAddend1:addend2 :addend3];


    // Register another selector for proxy and repeat message

        [calculatorProxy registerSelector:@selector(sumAddend1::)];

        [calculatorProxy sumAddend1:addend1 :addend3];


    }

      return 0;

    }

    ```


    First, the code creates a `Calculator` object and some data values. Next, it creates
    a proxy for the `Calculator` object, initializing it with a selector for the `sumAddend1:addend2:`
    method and an `AuditingInvoker` instance. Notice the following statement:


    ```

    NSArray *selValues = @[selValue1];

    ```


    The notation `@[]` is used to create an array literal. In Part 4 of this book,
    you’ll examine Objective-C literals in depth. The `sumAddend1:addend2:` message
    is sent to the proxy. This causes the proxy to perform the AOP functionality of
    the `AuditingInvoker` instance in addition to the method on the `Calculator` object.
    Next, the `sumAddend1::` message is sent to the proxy; because this method is
    not yet registered on the proxy when it is invoked, the AOP functionality is not
    performed. Finally, the `sumAddend1::` selector is added to the proxy and the
    message is resent to the proxy; because the selector is now registered, the AOP
    functionality is now performed. When you compile and run the AspectProxy program,
    you should observe the messages in the output pane shown in [Figure 9-14](#9781430250500_Ch09.xhtml#Fig14).


    ![9781430250500_Fig09-14.jpg](images/9781430250500_Fig09-14.jpg)


    [Figure 9-14](#9781430250500_Ch09.xhtml#_Fig14). AspectProxy program output


    Observe from the messages in the output pane that invoking the `sumAddend1:addend2:`
    method on the calculator proxy results in the proxy calling the `preInvoke:` method
    on the `AuditorInvoker` object, followed by the target method `sumAddend1:addend2:`
    method on the real subject (`Calculator` object), and finally the `postInvoke:`
    method on the `AuditorInvoker` object. Because the `sumAddend1:addend2:` method
    was registered with the calculator proxy, this matches the expected behavior.
    Next, the `sumAddend1::` method is invoked on the calculator proxy. Because this
    method is not registered with the proxy, it only forwards this method call to
    the `Calculator` object, and does not call the `AuditorInvoker` methods. Finally,
    the `sumAddend1::` method is registered with the proxy and the method is called
    again. This time, it calls the AOP methods on the `AuditorInvoker` object and
    the `sumAddend1::` method on the real subject, as expected.


    Roundup


    In this chapter, you implemented three programs that together use numerous features
    of the Objective-C runtime system and its APIs. You also learned how to create
    loadable bundles and import code into a project using Xcode. You should now have
    a good understanding of the runtime system, its place in the Objective-C platform,
    and how to use its features and low-level APIs in your own programs. I recommend
    that you review these programs carefully, modify them to try out other features/behaviors,
    and become very familiar with the concepts demonstrated here. Now that you have
    these skills under you belt, why not take a break and give yourself a chance to
    let this all soak in. In Part 3, you’ll explore the Foundation Framework.


    Chapter     10


    Foundation Framework General Purpose Classes


    The Foundation Framework defines a base layer of APIs that can be used for any
    type of Objective-C program. It includes root object classes, classes for basic
    data types such as strings, wrapper classes for primitive data types, and collection
    classes for storing and manipulating other objects, as well as classes for system
    information, networking, and other functionality. Mastering the Foundation Framework
    APIs is one of the keys to becoming a proficient Objective-C programmer. Part
    3 will help you get there as you examine these APIs in depth.


    The Foundation Framework evolved from the NeXTSTEP OpenStep APIs, created in 1993\.
    These APIs included application layer Objective-C libraries, divided into the
    Foundation Kit and the Application Kit. They also established the “NS” prefix-naming
    convention used for these APIs. When Apple acquired NeXT Software in 1996, the
    Foundation Kit served as the basis for the existing Foundation Framework.


    In this chapter, you will explore Foundation Framework classes that provide common,
    general-purpose functionality required by most Objective-C programs. OK, let’s
    get started!


