    an assertion failed, indicating that the sum returned was not the expected value.
    Now you will use the debugger to determine the cause of the problem. In the breakpoint
    navigator, add an exception breakpoint by clicking the plus (+) symbol at the
    bottom left of the navigator pane and selecting **Add Exception Breakpoint . .
    .** from the pop-up menu (as shown in [Figure C-10](#9781430250500_AppC.xhtml#Fig10)).


    ![9781430250500_AppC-10.jpg](images/9781430250500_AppC-10.jpg)


    [Figure C-10](#9781430250500_AppC.xhtml#_Fig10). Adding an exception breakpoint


    In the exception breakpoint dialog, there are several settings. For **Exception**,
    select **All** (set on all exceptions), and for **Break**, select **On Throw**
    (set breakpoint when exception is thrown). When you compile and run the program,
    you should observe that the program pauses in the main function at the following
    line:


    ```

    NSCAssert(([sum2 intValue] == 15),  @"Invalid sum computed");

    ```


    You can see that this assertion fails, causing the exception to be thrown. Now
    you will set some line breakpoints to troubleshoot the program. You set a line
    breakpoint in Xcode by clicking the gutter next to the corresponding line in your
    source code. In the project navigator, select the **Calculator.m** file and set
    a breakpoint at the line with the following statement:


    ```

    return [NSNumber numberWithInteger:([adder1 integerValue] +

                                        [adder2 integerValue])];

    ```


    Next, in the `main()` function, set a breakpoint at the line with the following
    statement:


    ```

    NSCAssert(([sum1 intValue] == 25), @"Invalid sum computed");

    ```


    Now edit this breakpoint to add a breakpoint action, as shown in [Figure C-11](#9781430250500_AppC.xhtml#Fig11).


    ![9781430250500_AppC-11.jpg](images/9781430250500_AppC-11.jpg)


    [Figure C-11](#9781430250500_AppC.xhtml#_Fig11). Edit breakpoint action for calculator
    sum


    This breakpoint action executes a debugger command that logs the value stored
    in variable `sum1`.


    ```

    expr (void)NSLog(@"Sum 1 = %@", sum1)

    ```


    Notice that the return type must be specified in debugger command expressions.
    In this case, the type is `void`, signifying that the `NSLog` function doesn’t
    return a value. Also note that the breakpoint option is set to automatically continue
    after executing. Effectively, this enables you to display the value of a program
    variable without having to write `NSLog` statements in your code, and hence avoid
    cluttering your code with debugging statements! When you compile and run the program,
    it pauses execution at the line breakpoint set for the `sumAddend1:addend2:` method,
    as shown in [Figure C-12](#9781430250500_AppC.xhtml#Fig12).


    ![9781430250500_AppC-12.jpg](images/9781430250500_AppC-12.jpg)


    [Figure C-12](#9781430250500_AppC.xhtml#_Fig12). Pausing execution at line breakpoint
    in sumAddend1:addend2: method


    In the debug area content pane, you can see that the values for variables `adder1`
    and `adder2` are as expected. Now you would like to validate the return value
    from this method. This can be done with the step-out command (located in the debug
    bar). This command executes the remaining lines of a method/function in which
    the current execution point lies, and then displays the next statement following
    the method/function call. Select this button two times. After that is done, the
    return value is displayed in the content pane display area (**Return Value**),
    as shown in [Figure C-13](#9781430250500_AppC.xhtml#Fig13).


    ![9781430250500_AppC-13.jpg](images/9781430250500_AppC-13.jpg)


    [Figure C-13](#9781430250500_AppC.xhtml#_Fig13). Displaying the return value of
    a method using the debugger


    The return value of 25 (shown in Figure C-13) is correct. Next, select **continue**
    in the debug bar (you may have to click the button two or three times). The output
    console logs `Sum 1 = 25`, per the breakpoint action debugger command that you
    configured earlier. Now observe that the debugger has paused again at the line
    breakpoint set for the `sumAddend1:addend2:` method. This time, use the debugger
    `po` command in the debug area content pane to display the values for the two
    parameters:


    ```

    po adder1

    po adder2

    ```


    The output of these commands is shown in [Figure C-14](#9781430250500_AppC.xhtml#Fig14).


    ![9781430250500_AppC-14.jpg](images/9781430250500_AppC-14.jpg)


    [Figure C-14](#9781430250500_AppC.xhtml#_Fig14). Displaying the value of variables
    using Xcode debugger commands


    These values (10, –25) are as expected, so select **continue** to advance the
    program. Next, the debugger pauses at the `NSCAssert`. Using the `po` command,
    the variable `sum2` displays a value of –15 (as shown in [Figure C-15](#9781430250500_AppC.xhtml#Fig15)).


    ![9781430250500_AppC-15.jpg](images/9781430250500_AppC-15.jpg)


    [Figure C-15](#9781430250500_AppC.xhtml#_Fig15). Displaying a value using the
    po command


    This is the expected value, so why is the assertion failing? Looking at the assertion
    statement, you can see that the conditional expression is expecting a value of
    15, when it should be –15!


    ```

    NSCAssert(([sum2 intValue] == 15),  @"Invalid sum computed");

    ```


    When you correct the assertion (by changing the value to –15) and run the program
    again, you will see that it runs successfully. Now even though this was a very
    contrived example, it illustrates a few of the capabilities of debugging in Xcode
    using LLDB. Apple provides a variety of documentation on Xcode debugging using
    LLDB, and the LLDB web site is an essential reference for more information.


    Roundup


    In this appendix, you learned about debugging using LLDB, the default debugger
    for Xcode. Debugging is a mandatory part of software development, so it’s vital
    to master this skill to become a more efficient, productive programmer. By now
    I hope that you are convinced of the power and capability of LLDB, and that you
    will take the time to become skilled at using it on all of your Objective-C software
    development projects.


    You have now reached the end of this book. I hope that it has been (and will continue
    to be) of use as you develop more OS X and iOS applications. Please feel free
    to contact me at `ProObjectiveC@icloud.com` with any questions or comments about
    this book or about Objective-C in general. Thank you for taking part in this wonderful
    journey, now signing out!!


