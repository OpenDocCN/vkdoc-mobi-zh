    Byte Ordering


    The Foundation Framework includes a set of functions that perform byte ordering;
    specifically, these functions can be used to swap the order of bytes of a number
    as stored in memory. Byte ordering is important when a binary file created on
    one computer is read on another computer with a different byte order. Big endian
    machines (such as a Motorola 680x0 CPU) store data with the most significant byte
    in the lowest memory address. A little endian machine (such as an Intel CPU) stores
    the most significant byte in the highest memory address. For example, the decimal
    value of 4132 (hexadecimal 1024) would be stored as shown in [Table 13-3](#9781430250500_Ch13.xhtml#Tab3).


    [Table 13-3](#9781430250500_Ch13.xhtml#_Tab3). Byte Ordering for Big Endian and
    Little Endian Machines


    ![table](images/Table13-3.jpg)


    In order for binary files to be successfully transferred and processed between
    these big and little endian machines, the byte ordering of the data needs to be
    swapped. The `NSSwap` byte ordering functions perform big to little and little
    to big endian byte ordering for the following data types: short, int, long, long
    long, float, and double. The `NSSwapHost` functions swap from the current endian
    format to that specified for the input data type. The `NSHostByteOrder` function
    determines the host endian format. It returns a Foundation constant value of `NS_LittleEndian`
    or `NS_BigEndian`.


    Interacting with the Runtime


    The Foundation Framework includes several functions that utilize the Objective-C
    runtime library. These functions enable dynamic operations.


    The `NSGetSizeAndAlignment` function is used to get the size of a character array
    in bytes. The following functions retrieve a string representation of a corresponding
    Objective-C type:


    *   `NSStringFromSelector`

    *   `NSStringFromProtocol`

    *   `NSStringFromClass`


    The following statement retrieves a text string (`sayHello:`) for a selector specified
    with the `@selector` directive, and assigns this string to the variable `methodName`.


    ```

    NSString *methodName = NSStringFromSelector(@selector(sayHello:));

    ```


    The next set of functions perform the converse operation; they retrieve an Objective-C
    type from a string representation:


    *   `NSSelectorFromString`

    *   `NSProtocolFromString`

    *   `NSClassFromString`


    The following statement dynamically retrieves a selector from the input string.


    ```

    SEL methodSel = NSSelectorFromString(@"sayHello:");

    ```


    File Paths


    A set of Foundation functions provides operations for managing file paths, including
    retrieving the user name, home directory, temporary directory, and directory search
    paths. The following statement demonstrates use of the `NSFullUserName` function
    to retrieve the full name of the current user.


    ```

    NSString *fullName = NSFullUserName();

    ```


    The `NSUserName` function, in comparison, returns the logon name of the current
    user.


    The following statement demonstrates use of the `NSHomeDirectory` function to
    retrieve the home directory for the current user.


    ```

    NSString *homeDir = NSHomeDirectory();

    ```


    The `NSHomeDirectoryForUser` function retrieves the home directory for the user
    specified in the input argument.


    The `NSTemporaryDirectory` function retrieves the full path to the temporary directory
    for the current user.


    The `NSSearchPathForDirectoriesInDomains` function returns a list of directory
    search paths for the specified directories in the specified domains. The syntax
    for the function is


    ```

    NSSearchPathForDirectoriesInDomains(

      NSSearchPathDirectory directory,

      NSSearchPathDomainMask domainMask,

      BOOL expandTilde);

    ```


    The `NSSearchPathDirectory` is a Foundation constant that specifies a variety
    of directories in the file system, for example the `Documents` directory. The
    `NSSearchPathDomainMask` is a Foundation constant used to specify the domain for
    the search; for example, the user’s home directory. The `BOOL` argument is set
    to `YES` if the paths returned should be expanded. [Listing 13-6](#9781430250500_Ch13.xhtml#list6)
    demonstrates the use of the function to retrieve the documents directory for the
    current user.


    [*Listing 13-6.*](#9781430250500_Ch13.xhtml#_list6)  Retrieving the Documents
    Directory Using the NSSearchPathForDirectoriesInDomains Function


    ```

    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                                                         NSUserDomainMask, YES);

    NSString *documentsDirectory = paths[0];

    ```


