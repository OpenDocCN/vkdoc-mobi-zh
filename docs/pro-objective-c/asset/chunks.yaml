    This is just a sample of the `NSObject` methods for performing object introspection.
    In Part 3 of this book, you’ll look at the NSObject APIs in more detail.


    Roundup


    In this chapter, you examined in detail the features of the Objective-C runtime
    and reviewed the key components of the runtime system architecture. To recap,
    the following are the key takeaways:


    *   Objective-C message passing (e.g., object messaging) is used to invoke methods
    on both classes and objects. Object messaging is implemented as a dynamic feature—the
    actual type of the receiver of the message and the corresponding method to be
    invoked on the receiver is determined at runtime.

    *   A message-passing expression consists of a receiver (the target object/class
    of the message) and the message itself. The message is composed of a selector
    along with any corresponding input parameters.

    *   A selector is represented as a text string broken up into segments, with a
    colon placed at the end of each segment that is followed by a parameter. A selector
    with more than one segment can have empty selector segments (i.e., segments without
    names).

    *   A selector type (`SEL`) is a special Objective-C type that represents a unique
    identifier that replaces a selector value when the source code is compiled. A
    variable of type `SEL` can be created using the `@selector` keyword or with the
    Foundation Framework function `NSSelectorFromString()`.

    *   A *method signature* defines the data type(s) for the input parameters of
    a method along with its returned result (if any). Method signature mismatch—where
    the compiler can’t determine the appropriate method for an object message, or
    there’s a mismatch between the declarations it sees and the method that will actually
    be executed at runtime—can result in anything from compiler warnings to runtime
    errors. To avoid this scenario, it’s best to try to ensure that methods with different
    signatures also have different names.

    *   Dynamic typing enables the runtime to determine the type of an object at runtime,
    thereby letting runtime factors dictate what kind of object is to be used in your
    code. Objective-C provides support for dynamic typing via the `id` data type.

    *   Dynamic binding is the process of mapping a message to a method at runtime,
    rather than at compile time. Dynamic binding enables OOP polymorphism and allows
    new objects and code to be interfaced with or added to a system without affecting
    existing code, therefore decreasing coupling between objects.

    *   Dynamic method resolution enables you to provide the implementation of a method
    dynamically. Objective-C includes the `@dynamic` directive, which tells the compiler
    that the methods associated with a property will be provided dynamically. The
    `NSObject` class includes the methods `resolveInstanceMethod:` and `resolveClassMethod:`
    to dynamically provide an implementation for a given selector for an instance
    and class method, respectively.

    *   Dynamic loading enables an Objective-C program to load both executable code
    and resources, as they are needed, instead of having to load all program components
    at application startup. Apple provides the bundle mechanism to support the dynamic
    loading of software on the iOS and OS X platforms. The Foundation Framework `NSBundle`
    class can be used to manage bundles. An `NSBundle` object represents a location
    in the file system that groups code and resources that can be used in a program.

    *   The Foundation Framework NSObject APIs include numerous methods for performing
    object introspection. These APIs dynamically query the runtime for information
    about methods. They also perform tests for object inheritance, behavior, and conformance.


    Now that you know the features of the runtime system and how they can be used
    in your programs, let’s examine the runtime system’s architecture and implementation.
    When you’re ready, turn the page to begin!


    Chapter     8


    Runtime Architecture


    The runtime system is a key element of the Objective-C platform. It’s what implements
    the dynamic features and object-oriented capabilities of the language. Its structure
    enables you to develop Objective-C code without being exposed to the internals
    of the runtime, yet also provides a public API that enables you to write code
    to directly invoke runtime services.


    In the last chapter, you reviewed the dynamic features of Objective-C; in this
    one, you’ll explore the architecture and design of the runtime system and how
    it implements these features. You’ll identify the runtime’s major components,
    examine key implementation details, and then look at how your code interacts with
    the runtime, both at compile time and during program execution. By the end of
    this chapter, you’ll have a thorough understanding of the function of the runtime
    system in the Objective-C language.


    Runtime Components


    The Objective-C runtime system has two main components: the compiler and the runtime
    library. Let’s take out a magnifying glass to examine these in more detail and
    see how they are used to implement the runtime system.


    Compiler


    In [Chapter 5](#9781430250500_Ch05.xhtml), you briefly reviewed the general process
    of Objective-C source code compilation. As depicted in Figure 5-1, the compilation
    process takes input Objective-C source files and proceeds, in multiple phases
    (consisting of lexical analysis, syntax analysis, code generation and optimization,
    assembly, and linking operations), to produce the output binaries that form an
    executable program.


    Just as the C standard library provides a standard API and implementation for
    the C programming language, the runtime library provides a standard API and implementation
    for the object-oriented features of Objective-C. This library is linked (during
    the linking phase) to all Objective-C programs. It’s the job of the compiler to
    take your input source code and generate code that uses the runtime library to
    produce a valid, executable Objective-C program.


    Both the object-oriented elements and dynamic features of the Objective-C language
    are implemented by the runtime system. Together, this consists of the following:


    *   Class elements (interface, implementation, protocols, categories, methods,
    properties, instance variables)

    *   Class instances (objects)

    *   Object messaging (including dynamic typing and binding)

    *   Dynamic method resolution

    *   Dynamic loading

    *   Object introspection


    In summary, when the compiler parses Objective-C source code that uses these language
    elements and features, it generates code with the appropriate runtime library
    data structures and function calls to implement the language-specified behaviors.
    To clarify how this works, let’s look at a few examples that demonstrate how the
    compiler generates code for Objective-C classes and objects, and how it performs
    object messaging.


    Object Messaging Code Generation


    When the compiler parses an object message (a *message send* expression), such
    as


    ```

    [receiver message]

    ```


    for example, it generates code that calls the runtime library function `objc_msgSend()`.
    This function takes as its input parameters the receiver and the selector of the
    message, along with any parameters passed in the message. Thus the compiler converts
    each messaging expression in the source code (i.e., of the form `[receiver message]`)
    to a call on the runtime library messaging function `objc_msgSend(...)`, passing
    along any supplied parameters to the call. Each message is dynamically resolved,
    meaning that the message receiver type and the actual method implementation to
    be invoked are determined at runtime. For each class and object in the source
    code, the compiler builds the data structures required to perform object messaging.'
