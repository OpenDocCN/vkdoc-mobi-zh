    \ language. The chapter explores block syntax and semantics, memory management,\
    \ how to develop blocks in your own code, and how to use blocks in existing APIs\
    \ (such as the Foundation Framework).\n\nSimply put, blocks provide a way to create\
    \ a group of statements (i.e., a block of code) and assign those statements to\
    \ a variable, which can subsequently be invoked. In this way, they are similar\
    \ to functions and methods, but in addition to executable code, they may also\
    \ contain variable bindings to stack or heap memory. A block is an implementation\
    \ of a *closure* *,* a function that allows access to variables outside its typical\
    \ scope. In addition, an Objective-C block is actually an object; it is a subclass\
    \ of `NSObject` and has all of its associated properties (you can send messages\
    \ to it, etc.). Apple developed blocks as an extension to the C family of programming\
    \ languages (C, Objective-C, and C++). They are available for use with Mac OS\
    \ X v10.6 and later, as well as iOS 4.0 and later.\n\nBlock Syntax\n\nOne of the\
    \ most difficult things about learning how to program with blocks is mastering\
    \ their syntax. This section explains block syntax in depth and provides numerous\
    \ examples to illustrate their application in code.\n\nThe syntactic features\
    \ added to support blocks enable the declaration of variables of block type and\
    \ the definition of block literals.\n\nThe *block type* consists of a return value\
    \ type and a list of parameter types. A caret symbol (`^`) operator is used to\
    \ declare a variable of block type. [Figure 15-1](#9781430250500_Ch15.xhtml#Fig1)\
    \ illustrates the syntax for a block type declaration.\n\n![9781430250500_Fig15-01.jpg](images/9781430250500_Fig15-01.jpg)\n\
    \n[Figure 15-1](#9781430250500_Ch15.xhtml#_Fig1). Block type declaration syntax\n\
    \n[Figure 15-1](#9781430250500_Ch15.xhtml#Fig1) shows that the `returnType` is\
    \ the type of the value returned by the block when it is invoked. The block variable\
    \ named `blockName` is preceded by a caret and enclosed in parentheses. As mentioned\
    \ previously, a variable of block type may have parameters. The list of parameter\
    \ types is enclosed in parentheses and follows the block name, where the `parameterTypes`\
    \ are each separated by a comma. If a block variable declaration has no parameters,\
    \ its list of parameter types should be specified as `void` (enclosed in parentheses).\
    \ OK, that summarizes the syntax for declaring variables of block type. Now let’s\
    \ look at some examples. The following statement declares a block variable named\
    \ `oneParamBlock` that has a single parameter of type `int` and returns a value\
    \ of type `int`.\n\n```\nint (^oneParamBlock)(int);\n```\n\nAs stated, a block\
    \ variable with no return value has its return type specified as `void` in its\
    \ declaration. The next example declares a block variable named `twoParamsBlock`\
    \ that takes two parameters of type `int` and returns nothing.\n\n```\nvoid (^twoParamsBlock)(int,\
    \ int);\n```"
  trans: "\n| 异常名称 | 描述 |\n| --- | --- |\n| `NSGenericException` | 异常的通用名称。 |\n| `NSRangeException`\
    \ | 当尝试访问某些数据（如数组或字符串）边界之外时发生的异常。 |\n| `NSInvalidArgumentException` | 当向方法传递无效参数时发生的异常。\
    \ |\n| `NSInternalInconsistencyException` | 当内部断言失败时发生的异常（例如，通过 `NSAssert` 函数），表示代码中存在意外情况。\
    \ |\n| `NSObjectInaccessibleException` | 当从不应访问远程对象的线程访问该对象时发生的异常。 |\n| `NSObjectNotAvailableException`\
    \ | 一种分布式对象异常，当 `NSConnection` 的远程端拒绝向对象发送消息，因为该对象尚未被提供时发生。 |\n| `NSDestinationInvalidException`\
    \ | 一种分布式对象异常，当内部断言失败时发生。 |\n| `NSPortTimeoutException` | 在发送或接收操作期间，端口上设置的超时已过期。\
    \ |\n| `NSInvalidSendPortException` | `NSConnection` 对象的发送端口已变为无效。 |\n| `NSInvalidRecievePortException`\
    \ | `NSConnection` 对象的接收端口已变为无效。 |\n| `NSPortSendException` | 向端口发送消息时发生的特定于 `NSPort`\
    \ 的通用错误。 |\n| `NSPortReceiveException` | 从端口接收消息时发生的特定于 `NSPort` 的通用错误。 |\n\n\
    ## 错误处理指南\n\n现在您已经很好地理解了错误对象和异常，以及相应的 Foundation 框架 API。那么您可能会想，“我应该用哪一个来检测和处理错误呢？”\
    \ 在提供指南和建议之前，让我们先回顾一下关于错误对象和异常的一些关键点。\n\n### 错误对象\n\n*   **优点：**\n    *   封装错误信息（代码、域、用户信息）\n\
    \    *   提供恢复机制的基础结构\n    *   受 Cocoa 框架支持\n*   **缺点：**\n    *   将错误处理逻辑与业务逻辑耦合\n\
    \    *   劳动密集，难以理解\n    *   难以维护和/或修改\n\n### 异常\n\n*   **优点：**\n    *   解耦异常条件的检测和处理，从而改进程序设计和维护。\n\
    \    *   自动化从检测点到处理点的传播过程。\n*   **缺点：**\n    *   展开调用栈，导致性能损失。\n    *   使用更多资源（略微增加可执行文件的大小）。\n\
    \    *   仍然需要参数/结果检查。\n    *   Cocoa 框架（包括 Foundation 框架）并非异常安全。\n\n### 指南与建议\n\
    \n错误对象应用于检测和处理 Objective-C 程序中预期可能发生的、有（潜在）恢复可能的错误。断言应作为编程辅助手段，用于检查程序不变量、条件、假设等。请注意，由于断言可能在编译前被禁用（生产版本中通常如此），因此它们不应用于公共\
    \ API 的参数检查。异常应仅用于检测无法恢复的编程错误或意外的运行时错误，这些错误应通过立即终止应用程序来处理。\n\n## 总结\n\n在本章中，您学习了用于错误处理和异常处理的\
    \ Foundation 框架 API。您现在应该熟悉提供以下功能的 Foundation 框架类：\n\n*   使用错误对象进行错误处理\n*   异常处理\n\
    *   使用断言、错误对象和异常的指南\n\n既然您已经完成了对 Foundation 框架 API 的回顾，是时候进入本书的第四部分了，该部分重点关注 Objective-C\
    \ 的新主题和高级主题。不过，在此之前，现在或许是回顾一下所学内容的好时机，然后给自己一个应得的休息。当您准备好后，翻页继续深入吧！\n\n# 第 15 章：块\n\
    \n欢迎回来。祝贺你走到了这一步！到目前为止，你已经涵盖了 Objective-C 平台的所有基本元素。但你猜怎么着？你还没有到达终点线！这是因为 Objective-C\
    \ 还有各种额外的、高级的特性，一旦掌握，就能让你将编程提升到新的水平。在本书的第四部分，你将探索其中几个特性，并学习如何在程序中使用它们。\n\n在本章中，你将学习如何使用\
    \ *块* 进行编程，这是 Objective-C 语言中一个强大的特性。本章将探讨块的语法和语义、内存管理、如何在你的代码中开发块，以及如何在现有 API（如\
    \ Foundation 框架）中使用块。\n\n简单来说，块提供了一种创建一组语句（即一段代码）并将这些语句赋值给一个变量的方法，该变量随后可以被调用。在这方面，它们类似于函数和方法，但除了可执行代码之外，它们还可以包含对栈内存或堆内存的变量绑定。块是\
    \ *闭包* 的一种实现，闭包是一种允许访问其典型作用域外部变量的函数。此外，Objective-C 块实际上是一个对象；它是 `NSObject` 的子类，拥有其所有相关属性（你可以向它发送消息等）。苹果公司将块作为\
    \ C 系列编程语言（C、Objective-C 和 C++）的扩展进行开发。它们可用于 Mac OS X v10.6 及更高版本，以及 iOS 4.0 及更高版本。\n\
    \n## 块语法\n\n学习如何使用块进行编程最困难的事情之一就是掌握它们的语法。本节将深入解释块的语法，并提供大量示例来说明它们在代码中的应用。\n\n\
    为支持块而添加的语法特性允许声明块类型的变量以及定义块字面量。\n\n*块类型* 由一个返回值类型和一个参数类型列表组成。使用脱字符号（`^`）运算符来声明块类型的变量。图\
    \ 15-1 展示了块类型声明的语法。\n\n![9781430250500_Fig15-01.jpg](img/9781430250500_Fig15-01.jpg)\n\
    \n图 15-1。块类型声明语法\n\n图 15-1 显示 `returnType` 是块被调用时返回值的类型。名为 `blockName` 的块变量前面有一个脱字符号，并括在括号中。如前所述，块类型的变量可以带有参数。参数类型列表括在括号中，跟在块名称后面，`parameterTypes`\
    \ 之间用逗号分隔。如果块变量声明没有参数，其参数类型列表应指定为 `void`（括在括号中）。好了，这总结了声明块类型变量的语法。现在让我们看一些例子。以下语句声明了一个名为\
    \ `oneParamBlock` 的块变量，它有一个 `int` 类型的参数，并返回一个 `int` 类型的值。\n\n```\nint (^oneParamBlock)(int);\n\
    ```\n\n如所述，没有返回值的块变量在其声明中将其返回类型指定为 `void`。下一个例子声明了一个名为 `twoParamsBlock` 的块变量，它接受两个\
    \ `int` 类型的参数，并且不返回任何内容。\n\n```\nvoid (^twoParamsBlock)(int, int);\n```\n"
- fmt: "块声明也可以包含参数名称，类似于 Objective-C 方法声明。下面展示了带有命名输入参数的先前示例。\n\n```\nvoid (^twoParamsBlock)(int\
    \ parm1, int parm2);\n```\n\n下一个示例声明了一个名为`noParamsBlock`的块变量，它没有参数，且返回类型为`int`。\n\
    \n```\nint (^noParamsBlock)(void);\n```\n\n由于变量可以用块类型声明，因此块变量可以作为函数参数或方法参数。在这些情况下，通常通过`typedef`语句创建类型定义，为块类型提供替代名称，从而简化其在代码中的后续使用。[列表15-1](#9781430250500_Ch15.xhtml#list1)演示了如何声明一个以块作为参数的方法。\n\
    \n[*列表15-1.*](#9781430250500_Ch15.xhtml#_list1) 方法声明中的块变量\n\n```\ntypedef int\
    \ (^AdderBlock)(int);\n@interface Calculator : NSObject\n- (int)process:(int)count\
    \ withBlock:(AdderBlock)adder;\n@end\n```\n\n[列表15-1](#9781430250500_Ch15.xhtml#list1)展示了使用`typedef`语句创建名为`AdderBlock`的块类型。该类型随后被用作方法声明中的参数类型。\n\
    \n块字面量表达式定义了对块的引用。它以脱字符运算符开头，后跟返回类型、参数列表，以及用花括号括起来的一组语句（块语句体）。块字面量表达式的语法如图15-2所示。\n\
    \n![9781430250500_Fig15-02.jpg](images/9781430250500_Fig15-02.jpg)\n\n[图15-2](#9781430250500_Ch15.xhtml#_Fig2).\
    \ 块字面量表达式语法\n\n如[图15-2](#9781430250500_Ch15.xhtml#Fig2)所示，表达式开头的脱字符表示块字面量表达式的开始，可选的`returnType`指定了语句体返回值的类型。块参数（传入块体的参数）放在圆括号内，每个参数都有类型和名称，用逗号分隔。块代码（用花括号括起来）包含了块被调用时执行的语句。如果块定义指定了返回类型，则代码中包含一个带有指定`returnType`值的`return`语句。如果块字面量表达式中有多个`return`语句，则每个语句指定的返回类型必须相同。现在让我们来看几个简单的块字面量表达式。[列表15-2](#9781430250500_Ch15.xhtml#list2)接受一个类型为`int`的单一参数，并返回一个等于输入参数加1的值。\n\
    \n[*列表15-2.*](#9781430250500_Ch15.xhtml#_list2) 块字面量表达式\n\n```\n^int (int addend)\n\
    {\n  return addend + 1;\n}\n```\n\n如前所述，块定义中不必指定返回类型，因为编译器会从块体中的`return`语句推断出返回类型。[列表15-3](#9781430250500_Ch15.xhtml#list3)修改了[列表15-2](#9781430250500_Ch15.xhtml#list2)，在表达式中不指定返回类型。\n\
    \n[*列表15-3.*](#9781430250500_Ch15.xhtml#_list3) 块字面量表达式，无返回类型\n\n```\n^(int addend)\n\
    {\n  return addend + 1;\n}\n```\n\n如果块字面量表达式没有参数，则不需要带圆括号的参数列表。[列表15-4](#9781430250500_Ch15.xhtml#list4)提供了一个没有参数且没有返回值的块字面量示例，该块向控制台输出一条问候语。\n\
    \n[*列表15-4.*](#9781430250500_Ch15.xhtml#_list4) 块字面量定义，无参数\n\n```\n^{\n  NSLog(@\"\
    Hello, World!\");\n}\n```\n\n块字面量可以赋值给相应的块变量声明。[列表15-5](#9781430250500_Ch15.xhtml#list5)演示了名为`oneParamBlock`的块变量的声明和后续定义。\n\
    \n[*列表15-5.*](#9781430250500_Ch15.xhtml#_list5) 块的声明与定义\n\n```\nint (^oneParamBlock)(int);\n\
    oneParamBlock = ^(int param1)\n{\n  return param1 * param1;\n};\n```\n\n正如所料，块声明和定义可以合并为一条语句。[列表15-6](#9781430250500_Ch15.xhtml#list6)演示了名为`incBlock`的块变量的复合声明与定义。\n\
    \n[*列表15-6.*](#9781430250500_Ch15.xhtml#_list6) 复合块声明与定义\n\n```\nint (^incBlock)\
    \ (int) = ^(int addend)\n{\n  return addend + 1;\n};\n```\n\n如[列表15-6](#9781430250500_Ch15.xhtml#list6)所示，块字面量表达式的参数类型和返回类型必须与相应的块变量声明一致。\n\
    \n比较[图15-1](#9781430250500_Ch15.xhtml#Fig1)和[图15-2](#9781430250500_Ch15.xhtml#Fig2)，你会发现块变量声明与块字面量表达式之间存在若干语法差异。例如，块变量的参数类型列表是必需的；如果没有参数，则必须提供一个单一的`void`参数类型。相比之下，块字面量表达式的参数列表是可选的——如果没有参数，则可以省略列表。[表15-1](#9781430250500_Ch15.xhtml#Tab1)总结了块变量声明和块字面量表达式语法的主要差异。\n\
    \n[表15-1](#9781430250500_Ch15.xhtml#_Tab1). 块语法元素比较\n\n| 块语法元素 | 块变量声明 | 块字面量表达式\
    \ |\n| --- | --- | --- |\n| 脱字符运算符 | 开始一个块变量声明。脱字符位于变量名之前，两者都括在圆括号中。 | 开始一个块字面量表达式。\
    \ |\n| 名称 | 块变量名称是必需的。 | 块字面量表达式是匿名的。 |\n| 返回类型 | 块变量声明中需要返回类型。没有返回值的块变量声明为`void`返回类型。\
    \ | 块字面量表达式中的返回类型是可选的，因为编译器会从表达式语句体中的返回值类型推断出来。如果表达式语句体中有多个`return`语句，它们必须都是同一类型。\
    \ |\n| 参数 | 块变量声明中参数类型列表是强制性的。如果块变量没有参数，则声明的参数类型列表为`void`。 | 没有参数的块字面量表达式不需要参数列表。\
    \ |\n\n一旦声明了块类型的变量并赋值给了符合要求的块字面量表达式，就可以直接使用`invoke`运算符调用它。此语法类似于C函数调用语法，参数列表与块声明对应。（返回值类型（如果有）也与块类型声明对应。）以下语句调用了[列表15-6](#9781430250500_Ch15.xhtml#list6)中的块，并将结果赋值给变量`myValue`。\n\
    \n```\nint myValue = incBlock(5);\n```\n\n块表达式也可以在一个语句中定义并调用。回想一下，块表达式是匿名的；因此，`invoke`运算符接受一个匿名（即无名称）函数，后跟一个与块表达式对应的参数列表。[列表15-7](#9781430250500_Ch15.xhtml#list7)定义了一个块表达式，并在单个语句中调用它，向控制台输出消息“Greetings,\
    \ Earthling!”。\n\n[*列表15-7.*](#9781430250500_Ch15.xhtml#_list7) 块表达式定义与调用\n\n\
    ```\n^(NSString *user)\n{\n  NSLog(@\"Greetings, %@!\", user);\n}(@\"Earthling\"\
    );\n```"
  raw: 'A block declaration can also include parameter names, similar to an Objective-C
    method declaration. The following shows the previous example with named input
    parameters.


    ```

    void (^twoParamsBlock)(int parm1, int parm2);

    ```


    The next example declares a block variable named `noParamsBlock` with no parameters
    and that returns a value of type `int`.


    ```

    int (^noParamsBlock)(void);

    ```


    Because variables can be declared with block type, a block variable can serve
    as a function argument or method parameter. In these cases, it is common to create
    a type definition (via a `typedef` statement) to provide an alternate name for
    a block type, thereby simplifying its subsequent usage in your code. [Listing
    15-1](#9781430250500_Ch15.xhtml#list1) demonstrates the declaration of a method
    that takes a block as a method parameter.


    [*Listing 15-1.*](#9781430250500_Ch15.xhtml#_list1)  Block Variable in a Method
    Declaration


    ```

    typedef int (^AdderBlock)(int);

    @interface Calculator : NSObject

    - (int)process:(int)count withBlock:(AdderBlock)adder;

    @end

    ```


    [Listing 15-1](#9781430250500_Ch15.xhtml#list1) shows that a `typedef` statement
    is used to create a block type named `AdderBlock`. This type is subsequently used
    as the parameter type in a method declaration.


    A block literal expression defines a reference to a block. It begins with the
    caret operator, followed by a return type, the list of parameters, and then a
    collection of statements (the block statement body) enclosed in braces. The syntax
    for a block literal expression is shown in [Figure 15-2](#9781430250500_Ch15.xhtml#Fig2).


    ![9781430250500_Fig15-02.jpg](images/9781430250500_Fig15-02.jpg)


    [Figure 15-2](#9781430250500_Ch15.xhtml#_Fig2). Block literal expression syntax


    As you see in [Figure 15-2](#9781430250500_Ch15.xhtml#Fig2), the caret symbol
    at the beginning of the expression indicates the beginning of a block literal
    expression, with the optional `returnType` specifying the type of the return value
    of the statement body. The block parameters (passed into the body of the block)
    are enclosed in parentheses with a type and a name for each, separated by commas.
    The block code (enclosed within braces) comprises the *statements* executed when
    the block is invoked. If the block definition specifies a return type, the code
    includes a `return` statement with a value of the specified `returnType`. If there
    are multiple return statements in a block literal expression, the return type
    specified must be identical for each. Now let’s examine a few simple block literal
    expressions. [Listing 15-2](#9781430250500_Ch15.xhtml#list2) takes a single parameter
    of type `int` and returns a value that equals its input parameter incremented
    by 1.


    [*Listing 15-2.*](#9781430250500_Ch15.xhtml#_list2)  Block Literal Expression


    ```

    ^int (int addend)

    {

      return addend + 1;

    }

    ```


    As mentioned previously, it is not required to specify the return type for a block
    definition, because the compiler will infer it from the return statement within
    the body of the block. [Listing 15-3](#9781430250500_Ch15.xhtml#list3) modifies
    [Listing 15-2](#9781430250500_Ch15.xhtml#list2) by not specifying the return type
    in the expression.


    [*Listing 15-3.*](#9781430250500_Ch15.xhtml#_list3)  Block Literal Expression,
    No Return Type


    ```

    ^(int addend)

    {

      return addend + 1;

    }

    ```


    If a block literal expression has no parameters, then the parenthesized parameter
    list is not required. [Listing 15-4](#9781430250500_Ch15.xhtml#list4) provides
    an example of a block literal with no parameters and no return value, and that
    logs a greeting to the console.


    [*Listing 15-4.*](#9781430250500_Ch15.xhtml#_list4)  Block Literal Definition,
    No Parameters


    ```

    ^{

      NSLog(@"Hello, World!");

    }

    ```


    A block literal can be assigned to a corresponding block variable declaration.
    [Listing 15-5](#9781430250500_Ch15.xhtml#list5) demonstrates the declaration and
    subsequent definition of a block variable named `oneParamBlock`.


    [*Listing 15-5.*](#9781430250500_Ch15.xhtml#_list5)  Block Declaration and Definition


    ```

    int (^oneParamBlock)(int);

    oneParamBlock = ^(int param1)

    {

      return param1 * param1;

    };

    ```


    As you would expect, the block declaration and definition can be combined into
    one statement. [Listing 15-6](#9781430250500_Ch15.xhtml#list6) demonstrates the
    compound declaration and definition of a block variable named `incBlock`.


    [*Listing 15-6.*](#9781430250500_Ch15.xhtml#_list6)  Compound Block Declaration
    and Definition


    ```

    int (^incBlock) (int) = ^(int addend)

    {

      return addend + 1;

    };

    ```


    As shown in [Listing 15-6](#9781430250500_Ch15.xhtml#list6), the block literal
    expression parameter type(s) and return type must conform to the corresponding
    block variable declaration.


    Comparing [Figures 15-1](#9781430250500_Ch15.xhtml#Fig1) and [15-2](#9781430250500_Ch15.xhtml#Fig2),
    you will note that there are several differences between the syntax of a block
    variable declaration and a block literal expression. For example, a block variable
    parameter types list is not optional; if there are no parameters, then a single
    `void` parameter type must be provided. Contrast that with a block literal expression
    for which the parameter list is optional—if there are no parameters, then the
    list may be omitted. [Table 15-1](#9781430250500_Ch15.xhtml#Tab1) summarizes key
    differences in the syntax of block variable declarations and block literal expressions.


    [Table 15-1](#9781430250500_Ch15.xhtml#_Tab1). Comparison of Block Syntactic Elements


    | Block Syntactic Element | Block Variable Declaration | Block Literal Expression
    |

    | --- | --- | --- |

    | Caret operator | Begins a block variable declaration. The caret precedes the
    variable name, both of which are enclosed in parenthesis. | Begins a block literal
    expression. |

    | Name | The block variable name is required. | Block literal expressions are
    nameless. |

    | Return type | The return type is required in a block variable declaration. A
    block variable with no return value has a declared return type of void. | The
    return type is optional in a block literal expression because the compiler will
    infer it from the type of the return value in the expression statement body. If
    the expression statement body has more than one return statement, they all must
    be of the same type. |

    | Parameters | The parameter type list is mandatory in a block variable declaration.
    If the block variable has no parameters, then the declared parameter type list
    is void. | A parameter list is not required in a block literal expression that
    has no parameters. |


    Once a variable of block type has been declared and assigned to a conforming block
    literal expression, it can be invoked directly with the `invoke` operator. This
    syntax is similar to a C function call syntax, with a list of parameters corresponding
    to the block declaration. (The type of the return value, if any, also corresponds
    to the block type declaration.) The following statement invokes the block in [Listing
    15-6](#9781430250500_Ch15.xhtml#list6) and assigns the result to the variable
    `myValue`.


    ```

    int myValue = incBlock(5);

    ```


    A block expression can also be defined and invoked in a single statement. Recall
    that a block expression is anonymous; hence, the `invoke` operator takes an anonymous
    (i.e., nameless) function followed by a parameter list that corresponds to the
    block expression. [Listing 15-7](#9781430250500_Ch15.xhtml#list7) defines a block
    expression and invokes it in a single statement that logs the message “Greetings,
    Earthling!” to the console.


    [*Listing 15-7.*](#9781430250500_Ch15.xhtml#_list7)  Block Expression Definition
    and Invocation


    ```

    ^(NSString *user)

    {

      NSLog(@"Greetings, %@!", user);

    }(@"Earthling");

    ```'
