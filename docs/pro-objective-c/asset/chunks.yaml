    Chapter     2


    Using Classes


    Classes are the building block for object-oriented programming (OOP). In fact,
    programs created using OOP consist primarily of a network of interacting *class
    instances* (i.e., objects). The Objective-C language provides full support for
    OOP, including language features that enable design-time specification of classes
    and the runtime creation of class instances, along with multiple mechanisms to
    support object interaction.


    This chapter focuses on Objective-C’s key elements and unique features for developing
    classes. It covers key areas such as Objective-C class structure, class design
    and implementation, and some additional language features that support class development
    and OOP. The chapter also includes plenty of examples (along with a program that
    you will develop) to reinforce your understanding of the concepts. Sounds like
    fun, right? OK, so let’s get started!


    Developing Your First Class


    Object-oriented programming is a style of computer programming that emphasizes
    the creation and use of software objects to write programs. A *software object*
    provides a representation of the characteristics or attributes of the thing/concept
    being modeled (its *state*) along with a definition of the things it can do (its
    *methods*). With Objective-C, you create the specification or blueprint for an
    object with a class *interface* and a corresponding *implementation*. In the interface,
    you specify the structure of the class (i.e., its properties and methods). In
    the implementation, you specify the variables that store the classes’ internal
    state, and implement its logic by defining its properties and methods. The Objective-C
    language also provides several additional features for developing classes, specifically
    *protocols* and *categories*, which you’ll learn about later in this chapter.
    For now, let’s start with the basics by adding a class to the Elements project.


    Adding a Class to the Project


    From Xcode, select the **Elements** folder in the navigator area and then create
    a new file by selecting **New ![image](images/arrow.jpg) File . . .** from the
    Xcode File menu. The New File template will be displayed. Next, select **Cocoa**
    under OS X; this reveals templates for Objective-C class elements. Select the
    **Objective-C class icon** to create an Objective-C class with implementation
    and header files, and then click the **Next** button (as shown in [Figure 2-1](#9781430250500_Ch02.xhtml#Fig1)).


    ![9781430250500_Fig02-01.jpg](images/9781430250500_Fig02-01.jpg)


    [Figure 2-1](#9781430250500_Ch02.xhtml#_Fig1). Creating an Objective-C class'
  trans: "\n在文件系统中指定您希望创建项目的位置（如有必要，请选择**新建文件夹**，并输入文件夹的名称和位置）；同时务必取消选中**源代码控制**复选框。接下来，单击**创建**按钮。项目（工作区）窗口随即打开，如图\
    \ 1-5 所示。\n\n![9781430250500_Fig01-05.jpg](img/9781430250500_Fig01-05.jpg)\n\n\
    图 1-5. Xcode 项目窗口\n\n## Xcode 工作区\n\n项目窗口由一个工具栏和三个主要区域组成，如图 1-6 所示。\n\n![9781430250500_Fig01-06.jpg](img/9781430250500_Fig01-06.jpg)\n\
    \n图 1-6. 项目窗口主要元素\n\n工具栏包含用于启动和停止项目运行的控件（**运行**和**停止**按钮）；一个用于选择要运行的**方案**的弹出菜单（方案定义了用于构建和执行一个或多个目标的信息）；一个用于在调试程序时切换断点开/关的**断点**按钮；工具栏中部的**活动视图**；一组**编辑器**按钮；一组**视图**按钮；以及一个**管理器**按钮。\n\
    \n工具栏下方的三个区域分别是导航器区域、编辑器区域和工具区域。*导航器区域*用于查看和访问项目中的不同资源（文件等）。*编辑器区域*是您编写大部分程序的地方。*工具区域*用于查看和访问帮助及其他检查器，并可在项目中使用现成的资源。\n\
    \n以上是对组成 Xcode 工作区的元素进行的（非常）高层概述，所以不必马上理解所有内容。随着您阅读本书并开发代码，您将获得大量使用 Xcode 及其相关工具的经验。\n\
    \n## 完成您的试运行\n\n您现在已经创建了一个名为 `Elements` 的 Xcode 项目。如果您查看项目窗口的导航器区域，顶部会看到一个由七个按钮组成的选择栏，其下方是主导航器区域。单击最左侧的按钮（文件夹图标）即可查看项目导航器视图。项目导航器显示项目或\
    \ Xcode 工作区的内容（文件、资源等）。现在，通过单击 `Elements` 文件夹图标旁的展开三角形来打开 `Elements` 文件夹。在该文件夹中，选择名为\
    \ `main.m` 的文件；该文件包含您程序的 `main()` 函数。\n\n如果您已经熟悉 Objective-C 或任何 C 系列语言，您就会知道\
    \ `main()` 函数是程序的起点，并且程序开始执行时会调用该函数。一个可执行的 Objective-C 程序必须有一个 `main()` 函数。在编辑器区域中，观察代码清单\
    \ 1-1 中显示的代码。\n\n*代码清单 1-1.* Hello, World!\n\n```\n// insert code here...\nNSLog(@\"\
    Hello, World!\");\n```\n\n是的，这就是无处不在的 Hello, World! 问候语。当您使用 Xcode 创建一个命令行程序时，它会创建一个包含\
    \ `main()` 函数的 `main.m` 文件，该函数带有此默认代码。现在，让我们为您的简单程序实际编写一点代码。按照代码清单 1-2 所示更新 `main()`\
    \ 函数。\n\n*代码清单 1-2.* Hello, World!（含当前日期）\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    NSLog(@\"\
    Hello, World!\");\n\n// Display the current date, formatted nicely\n    NSDate\
    \ *dateTime = [NSDate date];\n    NSDateFormatter *dateFormat = [[NSDateFormatter\
    \ alloc]init];\n    [dateFormat setDateFormat:@\"EEE MMM d, yyyy\"];\n    NSString\
    \ *dateString = [dateFormat stringFromDate:dateTime];\n    NSLog(@\"Today's date\
    \ is %@\", dateString);\n  }\n  return 0;\n}\n```\n\n除了 Hello, World! 之外，该程序还会显示当前的星期和日期。现在，您可以单击工具栏上的**运行**按钮（或从\
    \ Xcode 的 Product 菜单中选择**运行**）来编译并运行此程序。输出窗格（位于编辑器区域下方）会显示 Hello, World! 消息和日期（请参见图\
    \ 1-7）。\n\n![9781430250500_Fig01-07.jpg](img/9781430250500_Fig01-07.jpg)\n\n图\
    \ 1-7. Hello, World! 示例\n\n完美。您已经学会了如何创建一个 Xcode 项目，以及如何编译和运行一个简单的 Objective-C\
    \ 程序。请随意继续探索 Xcode 项目窗口，以更加熟悉其内容。\n\n## 总结\n\n本章介绍了 Objective-C。您下载并安装了 Xcode，并使用它编写了一个\
    \ Objective-C 程序。Objective-C 语言，结合 Apple 提供的工具和软件，使其成为一个出色的软件开发平台。完成此介绍后，您现在已准备好深入学习该语言。准备好后，请翻到下一页，让我们开始开发一些类吧！\n\
    \n# 第 2 章：使用类\n\n类是面向对象编程（OOP）的构建块。实际上，使用 OOP 创建的程序主要由一个相互作用的*类实例*（即对象）网络组成。Objective-C\
    \ 语言为 OOP 提供了全面支持，包括支持在设计时指定类和运行时创建类实例的语言特性，以及支持对象交互的多种机制。\n\n本章重点介绍 Objective-C\
    \ 用于开发类的关键元素和独特特性。它涵盖了 Objective-C 类结构、类设计与实现等关键领域，以及一些支持类开发和 OOP 的附加语言特性。本章还包含大量示例（以及您将开发的一个程序），以加深您对这些概念的理解。听起来很有趣，对吧？好的，那么让我们开始吧！\n\
    \n## 开发您的第一个类\n\n面向对象编程是一种强调创建和使用软件对象来编写程序的计算机编程风格。一个*软件对象*提供了对被建模事物/概念的特征或属性（其*状态*）的表示，以及对其所能执行操作（其*方法*）的定义。使用\
    \ Objective-C，您可以通过类*接口*和相应的*实现*来创建对象的规范或蓝图。在接口中，您指定类的结构（即其属性和方法）。在实现中，您指定存储类内部状态的变量，并通过定义其属性和方法来实现其逻辑。Objective-C\
    \ 语言还提供了几个用于开发类的附加特性，特别是*协议*和*类别*，您将在本章后面部分了解它们。现在，让我们从基础知识开始，向 `Elements` 项目添加一个类。\n\
    \n### 向项目添加一个类\n\n在 Xcode 中，选择导航器区域中的 **Elements** 文件夹，然后通过从 Xcode 的 File 菜单中选择\
    \ **New ![image](img/arrow.jpg) File . . .** 来创建一个新文件。将显示新建文件模板。接下来，在 OS X 下选择\
    \ **Cocoa**；这会显示 Objective-C 类元素的模板。选择 **Objective-C class 图标**来创建一个包含实现文件和头文件的\
    \ Objective-C 类，然后单击**下一步**按钮（如图 2-1 所示）。\n\n![9781430250500_Fig02-01.jpg](img/9781430250500_Fig02-01.jpg)\n\
    \n图 2-1. 创建 Objective-C 类\n"
