    \n```\nwhile (!netConnect.finishedLoading &&\n       [loop runMode:NSDefaultRunLoopMode\
    \ beforeDate:[NSDate distantFuture]]);\n```\n\n看起来很熟悉，对吧？这个循环与你在本章前面实现的 Bonjour\
    \ 服务浏览器程序中使用的循环完全相同。它运行循环，接收来自输入源的事件并执行相应的委托方法，直到连接完成资源加载。下一条语句将缓存内存使用情况记录到输出面板，使我们能够查看缓存利用率。然后你重新加载请求。如代码清单\
    \ 11-16 所示，下一组语句重新加载 URL。由于数据已存储在缓存中，并且缓存策略指定应使用缓存值，因此会立即从缓存中检索数据，而无需从 URL 加载。最后，内存中的缓存被清零，从而释放这部分内存。现在，当你编译并运行\
    \ NetConnector 程序时，你应该会在输出面板中看到消息，如图图 11-2 所示。\n\n![9781430250500_Fig11-02.jpg](img/9781430250500_Fig11-02.jpg)\n\
    \n图 11-2. NetConnector 程序输出\n\n.\n\n如输出面板所示，数据下载后响应被缓存。然后，数据总量与请求的 URL 一起记录到控制台。接下来，输出缓存内存利用率。这与下载的数据量相同。然后重新加载请求。由于响应已经在缓存中，因此会从缓存中检索（请注意，委托方法`connection:willCacheResponse:`未被调用）。好吧，这相当复杂，不是吗？现在你已经很好地掌握了如何使用\
    \ URL 加载 API 异步下载 URL。准备好了之后，让我们继续研究在尝试加载资源时如何处理身份验证挑战。\n\n## 身份验证和凭据管理\n\n身份验证和凭据类（`NSURLProtectionSpace`、`NSURLCredentialStorage`、`NSURLCredential`、`NSURLAuthenticationChallenge`、和`NSURLAuthenticationChallengeSender`）为验证请求访问受保护\
    \ URL 的用户提供支持。需要身份验证的资源会向尝试加载该资源的客户端请求凭据。Foundation 框架的`NSURLAuthenticationChallenge`类封装了来自服务器的挑战，要求客户端进行身份验证。`NSURLCredential`表示用户为响应身份验证挑战而返回的身份验证凭据。当连接请求发出身份验证挑战时，`NSURLConnection`和`NSURLDownload`实例的委托协议会收到消息。应实现相应的方法以返回适当的凭据。\n\
    \n对于`NSURLConnectionDelegate`协议，应实现消息`connection:willSendRequestForAuthenticationChallenge:`以返回适当的凭据。NetConnector\
    \ 程序中该方法的一个示例实现如代码清单 11-17 所示。\n\n*代码清单 11-17.*  处理身份验证挑战\n\n```\n- (void)connection:(NSURLConnection\
    \ *)connection\nwillSendRequestForAuthenticationChallenge:(NSURLAuthenticationChallenge\
    \ *)challenge\n{\n  NSURLCredential *credential =\n    [NSURLCredential credentialWithUser:@\"\
    TestUser\"\n                               password:@\"TestPassword\"\n      \
    \                      persistence:NSURLCredentialPersistenceForSession];\n  [[challenge\
    \ sender] useCredential:credential\n         forAuthenticationChallenge:challenge];\n\
    }\n```\n\n如代码清单 11-17 所示，该方法创建了一个凭据，用户名为`TestUser`，密码为`TestPassword`。`useCredential:forAuthenticationChallenge:`消息使用此凭据来响应连接的身份验证挑战。\n\
    \n## Cookie 管理\n\nFoundation 框架类`NSHTTPCookie`和`NSHTTPCookieStorage`简化了*HTTP cookie*的创建和管理，这些\
    \ cookie 用于在 URL 请求间提供数据的持久存储。`NSHTTPCookie`实例表示一个 cookie，而`NSHTTPCookieStorage`是一个用于管理\
    \ cookie 的单例对象。对于 OS X 应用程序，cookie 在进程间共享并保持同步。会话 cookie 是单个进程本地的，不在程序之间共享。`NSHTTPCookie`类提供了创建\
    \ cookie、将 cookie 转换为请求头以及检索 cookie 属性的方法。`NSHTTPCookieStorage`类提供了检索共享 cookie\
    \ 存储实例、管理 cookie 接受策略以及管理（即添加、移除、检索）cookie 的方法。\n\n## 协议支持\n```"
- fmt: "# Foundation Framework: URL Handling and Interprocess Communication\n\nThe\
    \ Foundation Framework classes `NSURLProtocol` and `NSURLProtocolClient` enable\
    \ the creation of custom protocols for loading data from a URL. `NSURLProtocol`\
    \ is an abstract class that provides the basic structure to perform protocol-specific\
    \ URL loading. It includes methods for creating `NSURLProtocol` objects, registering/unregistering\
    \ protocol classes, request management, retrieving protocol attributes, and starting/stopping\
    \ downloads. `NSURLProtocolClient` is a protocol used by `NSURLProtocol` subclasses\
    \ to communicate with the URL loading system.\n\n## Interprocess Communication\n\
    \nThe Foundation Framework includes a collection of classes that support process-to-process\
    \ communication. Specifically, they provide facilities for creating and using\
    \ communication channels.\n\n### Communication via Pipes\n\nThe `NSPipe` class\
    \ encapsulates a *pipe*, a one-way channel for communication between processes.\
    \ The API includes methods to create and initialize a pipe, and retrieve the corresponding\
    \ `NSFileHandle` instance for a pipe. The `NSTask` class provides several methods\
    \ for setting the input and output channels for a process (`setStandardOutput:`,\
    \ `setStandardInput:`). [Listing 11-18](#9781430250500_Ch11.xhtml#list18) demonstrates\
    \ the use of the `NSTask` and `NSPipe` APIs to create and launch a task (the Unix\
    \ command `/bin/ls` simply lists the files in the current directory), set the\
    \ task’s standard output, and then retrieve and log the standard output written\
    \ to the pipe after task completion.\n\n[*Listing 11-18.*](#9781430250500_Ch11.xhtml#_list18)\
    \ Using `NSPipe` and `NSTask` to Invoke a Process\n\n```\nNSTask *task = [[NSTask\
    \ alloc] init];\n[task setLaunchPath:@\"/bin/ls\"];\nNSPipe *outPipe = [NSPipe\
    \ pipe];\n[task setStandardOutput:outPipe];\n[task launch];\nNSData *output =\
    \ [[outPipe fileHandleForReading] readDataToEndOfFile];\nNSString *lsout = [[NSString\
    \ alloc] initWithData:output\n                                        encoding:NSUTF8StringEncoding];\n\
    NSLog(@\"/bin/ls output:\\n%@\", lsout);\n```\n\n### Communication via Ports\n\
    \n`NSPort`, `NSMachPort`, `NSMessagePort`, and `NSSocketPort` provide low-level\
    \ mechanisms for communication between threads or processes, typically via `NSPortMessage`\
    \ objects.\n\n`NSPort` is an abstract class. It includes methods to create and\
    \ initialize a port, create connections to a port, set port information, and monitor\
    \ a port. `NSMachPort`, `NSMessagePort`, and `NSSocketPort` are concrete subclasses\
    \ of `NSPort` used for specific types of communication ports. `NSMachPort` and\
    \ `NSMessagePort` allow local (on the same machine) communication only. In addition,\
    \ `NSMachPort` is used with Mach ports, the fundamental communication port in\
    \ OS X. `NSSocketPort` allows both local and remote communication, but may be\
    \ less efficient than the others when used for local communication. Port instances\
    \ can be supplied as parameters when creating an `NSConnection` instance (using\
    \ the `initWithReceivePort:sendPort:` method). You can also add a port to a run\
    \ loop via the `NSPort` `scheduleInRunLoop:forMode:` method.\n\nAs ports are a\
    \ very low-level interprocess communication mechanism, you should implement interapplication\
    \ communication using distributed objects whenever possible and use `NSPort` objects\
    \ only when necessary. In addition, when you are finished using a port object,\
    \ you must explicitly invalidate the object via the `NSPort` `invalidate` method.\n\
    \nThe `NSSocketPort` and `NSPortMessage` classes are only available for use on\
    \ the OS X platform.\n\n### Port Registration\n\n`NSPortNameServer`, `NSMachBootstrapServer`,\
    \ `NSMessagePortNameServer`, and `NSSocketPortNameServer` provide an interface\
    \ to the port registration service, used to retrieve instances of `NSMachPort`,\
    \ `NSMessagePort`, and `NSSocketPort`.\n\n`NSPortNameServer` provides an object-oriented\
    \ interface to the port registration service used by the distributed objects system.\
    \ `NSConnection` objects use it to contact each other and to distribute objects\
    \ over the network. You should rarely need to interact directly with an `NSPortNameServer`\
    \ instance. `NSMachBootstrapServer`, `NSMessagePortNameServer`, and `NSSocketPortNameServer`\
    \ are subclasses of `NSPortNameServer` that return corresponding port instances\
    \ (`NSMachPort`, `NSMessagePort`, `NSSocketPort`).\n\nThe `NSPortNameServer`,\
    \ `NSMachBootstrapServer`, `NSMessagePortNameServer`, and `NSSocketPortNameServer`\
    \ classes are only available for use on the OS X platform.\n\n### Roundup\n\n\
    In this chapter, you began your review of the Foundation Framework, focusing on\
    \ classes that provide common, general-purpose functionality required for most\
    \ Objective-C programs. You should now be familiar with Foundation Framework classes\
    \ that provide the following functionality:\n\n- Network services\n- Application\
    \ services\n- File system utilities\n- URL handling\n- Interprocess communication\n\
    - Concurrency and threading\n\n# Chapter 12: Foundation Framework Specialized\
    \ Services\n\nIn this chapter, you will explore several Foundation Framework classes\
    \ that provide specialized system services. These classes implement functionality\
    \ to support event-driven programming via notifications, object persistence via\
    \ archiving and serialization, and distributed programming with distributed objects.\n\
    \n## Notifications\n\nThe Foundation Framework includes a collection of APIs—the\
    \ *notifications support classes*—that provide a powerful mechanism for event-driven\
    \ programming. A *notification* encapsulates information about an event. It can\
    \ be sent to one or more observing objects in response to an event that occurs\
    \ within a program. The notifications architecture follows a broadcast model;\
    \ hence objects receiving events are decoupled from those sending them. The notification\
    \ support classes enable the creation and posting of notifications, sending and\
    \ receiving notifications, and asynchronous posting of notifications via queues.\
    \ The APIs also support registering for notifications and the delivery of notifications\
    \ to specific threads.\n\n`NSNotification` encapsulates the information sent by\
    \ a notification object. It consists of a unique name, the posting object, and\
    \ (optionally) a dictionary of supplementary information. The class includes methods\
    \ for creating and initializing notifications, and retrieving notification information.\
    \ [Listing 12-1](#9781430250500_Ch12.xhtml#list1) creates a notification named\
    \ `ApplicationDidHandleGreetingNotification` for a simple greeting.\n\n[*Listing\
    \ 12-1.*](#9781430250500_Ch12.xhtml#_list1) Retrieving the Network Host Name Using\
    \ `NSHost`\n\n```\nNSString *nName = @\"ApplicationDidHandleGreetingNotification\"\
    ;\nNSNotification *notif = [NSNotification notificationWithName:nName\n      \
    \                                                object:@\"Hello, World!\"];\n\
    ```\n\nSo you may be wondering, why the long name for the notification? Well,\
    \ Apple has provided some guidelines for the names of notifications. It recommends\
    \ that a notification name be composed of the following elements:\n\n- Name of\
    \ the associated class\n- The word *Did* or *Will*\n- Unique part of the name\n\
    - The word *Notification*\n\nThese guidelines are designed to facilitate the creation\
    \ of unique notification names that are self-descriptive."
