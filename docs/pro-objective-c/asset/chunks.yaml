- fmt: "# Block Literal Expressions in Method Invocations\n\nA block expression can\
    \ also be defined inline as an *anonymous function*, thereby serving as a parameter\
    \ of a function or method invocation. The recommended practice in these scenarios\
    \ is to use only one block literal as a parameter to a function or method, and\
    \ that it be the last parameter in the list (if the function/method has other\
    \ parameters). [Listing 15-8](#9781430250500_Ch15.xhtml#list8) invokes an instance\
    \ method (from the class interface shown in [Listing 15-1](#9781430250500_Ch15.xhtml#list1))\
    \ that creates a block literal expression and uses it as a parameter to a method\
    \ invocation.\n\n[*Listing 15-8.*](#9781430250500_Ch15.xhtml#_list8) Block Literal\
    \ Expression in a Method Invocation\n\n```\nCalculator calc = [Calculator new];\n\
    int value = [calc process:2\n                withBlock:^(int addend)\n       \
    \         {\n                  return addend + 1;\n                }];\n```\n\n\
    Many Objective-C APIs, including the Foundation Framework, contain methods that\
    \ take a block as a parameter. Later in this chapter, you will develop several\
    \ programs with blocks, so take your time and review this material as long as\
    \ necessary until you thoroughly grasp the syntax.\n\n## Blocks Are Closures!\n\
    \nAs stated earlier in this chapter, a block is an implementation of a *closure*,\
    \ a function that allows access to local variables declared outside of its typical\
    \ scope. To understand what this means, let’s take a moment to understand scope\
    \ and visibility rules. The *visibility* of a variable refers to the portion(s)\
    \ of a program in which it can be accessed; this is also referred to as a variable’s\
    \ *scope*. For example, variables declared within a C function definition have\
    \ local scope, meaning that they are visible and accessible within the function,\
    \ and not accessible elsewhere. (Note that a function can also reference global\
    \ variables.) A block augments the visibility of variables compared to C functions\
    \ through several features, as follows:\n\n- **Support for lexical scope**. This\
    \ is the ability to reference local variables and parameters from an enclosing\
    \ scope.\n- **`__block` variables**. The `__block` keyword, applied to a variable\
    \ outside a block but within the same lexical scope, enables this variable to\
    \ be modified within a block.\n- **Instance variable access**. A block defined\
    \ within an object’s method implementation can access the object’s instance variables.\n\
    - **`const` imports**. Constant variables imported through a header file (via\
    \ an `#import` or `#include` directive) are visible within a block literal expression.\n\
    \n## Lexical Scope\n\nOne of the unique features of blocks is its support for\
    \ lexical scoping. In contrast, C functions do not have access to local variables\
    \ declared outside of their definition. The example shown in [Listing 15-9](#9781430250500_Ch15.xhtml#list9)\
    \ will not compile because the local variable `myVar` is not visible within the\
    \ `logValue` function definition.\n\n[*Listing 15-9.*](#9781430250500_Ch15.xhtml#_list9)\
    \ C Function Attempting to Access a Local Variable Outside Its Scope\n\n```\n\
    void logValue()\n{\n  // ERROR, illegal access of myVar, not within scope\n  NSLog(@\"\
    Variable value = %d\", myVar);\n}\n\nint main(int argc, const char * argv[])\n\
    {\n  @autoreleasepool\n  {\n    int myVar = 10;\n    logValue();\n  }\n  return\
    \ 0;\n}\n```\n\nA block supports lexical scoping, thus a block literal expression\
    \ has access to variables declared within the same lexical scope. In addition,\
    \ blocks can be defined anywhere other variables can; for example, within other\
    \ blocks, functions, and methods. C functions, on the other hand, cannot be defined\
    \ within other functions or methods. [Listing 15-10](#9781430250500_Ch15.xhtml#list10)\
    \ compiles and runs successfully because the variable `myVar` is declared within\
    \ the same lexical scope as the block `logValueBlock`.\n\n[*Listing 15-10.*](#9781430250500_Ch15.xhtml#_list10)\
    \ Block Accessing Local Variable Through Lexical Scoping\n\n```\n{\n  int myVar\
    \ = 10;\n  void (^logValueBlock)(void) = ^{\n    NSLog(@\"Variable value = %d\"\
    , myVar);\n  };\n  logValueBlock();\n}\n```\n\n[Listing 15-10](#9781430250500_Ch15.xhtml#list10)\
    \ shows that a block has access to local variables declared outside its definition.\
    \ Specifically, these local variables are declared (and initialized) within an\
    \ enclosing scope, *prior to* the block literal expression. Braces delimit a local\
    \ scope; in addition scopes may be nested. Referring again to [Listing 15-10](#9781430250500_Ch15.xhtml#list10),\
    \ the variable `myVar` is declared at the same scope as the block definition assigned\
    \ to `logValueBlock`, prior to the literal expression, and thus can be used within\
    \ the expression. On the other hand, [Listing 15-11](#9781430250500_Ch15.xhtml#list11)\
    \ will not compile, because the local variable `myVar` is declared and initialized\
    \ after the block literal expression.\n\n[*Listing 15-11.*](#9781430250500_Ch15.xhtml#_list11)\
    \ Illegal Access of Local Variable in Block, Declared After Block Literal Expression\n\
    \n```\nvoid (^logValueBlock)(void) = ^{\n  // ERROR, illegal access of myVar,\
    \ declared after literal expression\n  NSLog(@\"Variable value = %d\", myVar);\n\
    };\nint myVar = 10;\nlogValueBlock();\n```\n\nLocal variables accessed through\
    \ lexical scoping behave as constant values (for primitive types) or by reference\
    \ variables (for objects) within a block literal expression. [Listing 15-12](#9781430250500_Ch15.xhtml#list12)\
    \ will not compile because a primitive variable accessed through lexical scoping\
    \ cannot be modified within a block literal.\n\n[*Listing 15-12.*](#9781430250500_Ch15.xhtml#_list12)\
    \ Block Attempting to Modify a Local Variable Accessed Through Lexical Scoping\n\
    \n```\nint myVar = 10;\nvoid (^logValueBlock)(void) = ^{\n  // ERROR, lexical\
    \ scope variable not assignable\n  myVar = 5;\n  NSLog(@\"Variable value = %d\"\
    , myVar);\n};\nlogValueBlock();\n```\n\nAs local scopes can be nested, a block\
    \ can capture local variables within multiple (nested) scopes. This is demonstrated\
    \ in the code from [Listing 15-13](#9781430250500_Ch15.xhtml#list13).\n\n[*Listing\
    \ 15-13.*](#9781430250500_Ch15.xhtml#_list13) Block Capturing Local Variables\
    \ Within Multiple Nested Scopes\n\n```\nfor (int ii=0; ii<2; ii++)\n{\n  for (int\
    \ jj=0; jj<3; jj++)\n  {\n    void (^logValueBlock)(void) = ^{\n      NSLog(@\"\
    Variable values = %d, %d\", ii, jj);\n    };\n    logValueBlock();\n  }\n}\n```\n\
    \n## Mutable `__block` Variables\n\nBy default, block local variables accessed\
    \ through lexical scoping are visible but not writeable within a block literal\
    \ expression. The `__block` storage type modifier can be used to make these variables\
    \ read-write (i.e., mutable). The `__block` modifier can be used on all supported\
    \ Objective-C types, except for C variable-length arrays (an array with a length\
    \ that is not a constant expression) and C structures that contain variable-length\
    \ arrays. Its use cannot be combined with the existing local storage modifiers\
    \ `auto`, `register`, and `static`. [Listing 15-14](#9781430250500_Ch15.xhtml#list14)\
    \ illustrates the use of a `__block` variable.\n\n[*Listing 15-14.*](#9781430250500_Ch15.xhtml#_list14)\
    \ Correct Use of `__block` Storage\n\n```\n__block int myVar = 10;\nvoid (^incBlock)(int)\
    \ = ^(int amount){\n  myVar += amount;\n  NSLog(@\"New value = %d\", myVar);\n\
    };\nincBlock(5);\n```\n\nVariables qualified with the `__block` storage type are\
    \ copied to the heap if the referencing block is copied to heap storage. This\
    \ last point brings up the topic of memory management with blocks, the subject\
    \ of the next section.\n\n## Memory Management with Blocks"
