    接下来，表达式`[[NSRunLoop currentRunLoop] runMode:NSDefaultRunLoopMode beforeDate:[NSDate
    distantFuture]]`执行运行循环一次，并阻塞以等待输入源的输入（例如，接收到`NSNetServiceBrowser`消息）。一旦接收到输入，消息会在当前线程上被处理（即，调用对应的委托方法），然后循环重新开始。因此，`while`循环直到设置了`finishedLoading`属性后才会退出。如清单
    11-10 所示，该属性由`BonjourClient`的委托方法`netServiceBrowserDidStopSearch:`设置，当服务浏览器完成搜索时，会发送匹配的消息。


    在本章前面部分，你了解到`Bonjour`协议能够检测连接到网络上的设备（例如计算机和打印机）。因此，如果可能，请在测试此程序时确保你的局域网中连接了一个或多个设备。完成这些配置步骤并编译运行`BonjourClient`程序后，你应该会在输出面板中看到类似图
