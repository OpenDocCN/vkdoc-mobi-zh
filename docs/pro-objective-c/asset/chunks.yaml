  raw: '`ClassName` is name/type of the class (`OrderEntry`, etc.), `qualifier` is
    the ARC lifetime qualifier (as previously listed), and `varName` is the name of
    the variable. If no qualifier is specified, the default is `__strong`. The ARC-specific
    lifetime qualifiers for properties are as follows:


    *   `strong`: The `strong` attribute is equivalent to the `retain` attribute (the
    complete list of property attributes is provided in Appendix A).

    *   `weak`: The `weak` attribute is similar to the `assign` attribute, except
    that if the affected property instance is deallocated, its instance variable is
    set to `nil`.


    Under ARC, `strong` is the default ownership attribute for object-type properties.


    Using ARC


    Now you are going to develop an example program that uses ARC. You’ll take the
    program you built earlier that uses MRR memory management (`OrderEntry`) and create
    a new version that uses ARC memory management. This will enable you to get some
    hands-on experience programming with ARC and also see how it simplifies application
    memory management. As you may recall, the OrderEntry program you developed earlier
    consists of three classes: an `OrderEntry` class used to record product orders,
    and the dependent classes `OrderItem` and `Address`.


    In Xcode, create a new project by selecting **New ![image](images/arrow.jpg) Project
    ...** from the Xcode File menu. In the New Project Assistant pane, create a command-line
    application (choose **Command Line Tool** from the Mac OS X Application selection)
    and click **Next**. In the Project Options window, specify **ARC Orders** for
    the Product Name and select ARC memory management by checking the **Use Automatic
    Reference Counting** check box, and then click **Next**.


    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    Now let’s add the `OrderEntry`, `OrderItem`, and `Address` classes. As you’ve
    done before, add each class to the project by selecting **New ![image](images/arrow.jpg)
    File ...** from the Xcode File menu, selecting the Objective-C class template,
    naming the class appropriately (each is a subclass of `NSObject`), and then selecting
    the ARC Orders folder for the files location and the ARC Orders project as the
    target.


    Your project now has files for three classes along with the `main.m` file. Next,
    implement the `Address` class. Proceeding as you did with the MRR Orders project,
    you’ll edit the `Address` class implementation by overriding the default `init`
    and `dealloc` methods provided by its superclass (`NSObject`). Select the **Address.m**
    file in the navigator pane, and then add the code, as shown in [Listing 4-11](#9781430250500_Ch04.xhtml#list11).


    [*Listing 4-11.*](#9781430250500_Ch04.xhtml#_list11)  ARC Address Class Implementation


    ```

    #import "Address.h"


    @implementation Address

    - (id) init

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing Address object");

      }

      return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating Address object");

    }

    @end

    ```


    [Listing 4-11](#9781430250500_Ch04.xhtml#list11) shows the `init` method is the
    same as that provided for MRR `Address` class. The `dealloc` method is different;
    it does not invoke `dealloc` on its superclass because this is automatically performed
    by ARC. Now let’s implement the ARC `OrderItem` class.


    The ARC OrderItem interface is the same as that provided for the MRR `OrderItem`
    class. Select the **OrderItem.h** file and copy the interface shown in [Listing
    4-6](#9781430250500_Ch04.xhtml#list6). Next, select the **ARC OrderItem.m** file
    and implement the `OrderItem` class, as shown in [Listing 4-12](#9781430250500_Ch04.xhtml#list12).


    [*Listing 4-12.*](#9781430250500_Ch04.xhtml#_list12)  ARC OrderItem Class Implementation


    ```

    #import "OrderItem.h"


    @implementation OrderItem

    - (id) initWithName:(NSString *)itemName

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing OrderItem object");

        name = itemName;

    }

      return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderItem object);

    }

    @end

    ```


    The custom initializer is very similar to that provided for the MRR `OrderItem`
    class. It differs in that it doesn’t invoke the `retain` method on the `name`
    instance variable, as you cannot send `retain`, `release`, or `autorelease` messages
    with ARC. The `dealloc` method is also different from that provided for the MRR
    `OrderItem` class; it merely logs a message to the output console. ARC automatically
    sends a `release` message to all the objects that the `OrderItem` class has an
    ownership interest in, and also invokes `dealloc` on its superclass.


    Now you’ll implement the ARC `OrderEntry` class. The interface is identical to
    that of the MRR `OrderEntry` class. Select the **ARC OrderEntry interface** (`OrderEntry.h`)
    and copy the interface shown in [Listing 4-8](#9781430250500_Ch04.xhtml#list8).


    Next, select the **OrderEntry.m** file and implement the `OrderEntry` class, as
    shown in [Listing 4-13](#9781430250500_Ch04.xhtml#list13).


    [*Listing 4-13.*](#9781430250500_Ch04.xhtml#_list13)  ARC OrderEntry Class Implementation


    ```

    #import "OrderEntry.h"


    @implementation OrderEntry

    - (id) initWithId:(NSString *)oid

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing OrderEntry object");

        orderId = oid;

        item = [[OrderItem alloc] initWithName:@"Doodle"];

        shippingAddress = [[Address alloc] init];

      }


    return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderEntry object with ID %@", orderId);

    }

    @end

    ```


    The custom initializer is very similar to that provided for the MRR `OrderEntry`
    class. It differs in that it doesn’t invoke the `retain` method on the `orderId`
    instance variable; as noted previously, you cannot send `retain`/`release`/`autorelease`
    messages with ARC. The `dealloc` method is also different from that provided for
    the MRR `OrderEntry` class; it merely logs a message to the output console. ARC
    automatically sends a `release` message to all the objects that the `OrderItem`
    class has an ownership interest in, and also invokes `dealloc` on its superclass.


    Now let’s implement the ARC Orders `main()` function. Select the **main.m** file
    in the navigator pane, and then update the `main()` function, as shown in [Listing
    4-14](#9781430250500_Ch04.xhtml#list14).


    [*Listing 4-14.*](#9781430250500_Ch04.xhtml#_list14)  ARC main() Function Implementation


    ```

    #import <Foundation/Foundation.h>

    #import "OrderEntry.h"


    int main(int argc, const char * argv[])

    {


    @autoreleasepool

      {

        // Create an OrderEntry object for manual release

        NSString *a1 = @"A1";

        NSString *orderId = [[NSString alloc] initWithString:a1];

        OrderEntry *entry = [[OrderEntry alloc] initWithId:orderId];


    // Set ID to nil to verify that value was retained by ARC!

        a1 = nil;


    // View results for new order entry, should display valid ID!

        NSLog(@"New order, ID = %@, item: %@", entry->orderId, entry->item->name);


    // Now set OrderEntry object to nil, it can now be deallocated by ARC!

        entry = nil;


    // Create another OrderEntry object

        OrderEntry *autoEntry = [[OrderEntry alloc] initWithId:@"A2"];

        NSLog(@"New order, ID = %@, item: %@", autoEntry->orderId,          autoEntry->item->name);

      }

      return 0;

    }

    ```


    The `main()` function demonstrates ARC memory management by creating `OrderEntry`
    objects. They are automatically released by ARC when the objects are no longer
    in use. The function also demonstrates that classes developed with ARC acquire
    ownership interest in dependent objects as necessary, thereby preventing objects
    from being changed or deallocated while they are still in use.


    Now save, compile, and run the ARC Orders program, and observe the messages in
    the output pane (as shown in [Figure 4-7](#9781430250500_Ch04.xhtml#Fig7)).


