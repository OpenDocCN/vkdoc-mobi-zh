    \ the Xcode menu. In the preferences pane, select the **Location** tab, and then\
    \ select **Default** from the **Derived Data:** drop-down list (as shown in [Figure\
    \ B-7](#9781430250500_AppB.xhtml#Fig7)).\n\n![9781430250500_AppB-07.jpg](images/9781430250500_AppB-07.jpg)\n\
    \n[Figure B-7](#9781430250500_AppB.xhtml#_Fig7). Xcode Preferences Derived Data\
    \ Location\n\nOK, now that the workspace is properly configured, you will create\
    \ projects.\n\nCreating a Static Library\n\nNow you will create a static library.\n\
    \n1.  In Xcode, create a new project by selecting **New ![image](images/arrow.jpg)\
    \ Project …** from the Xcode File menu.\n2.  In the **New Project Assistant**\
    \ pane, create a Cocoa library by first selecting **Framework &** **Library**\
    \ (under the Mac OS X section), and then selecting the **Cocoa Library** icon\
    \ in the upper-right pane (as shown in [Figure B-8](#9781430250500_AppB.xhtml#Fig8)).\n\
    \n![9781430250500_AppB-08.jpg](images/9781430250500_AppB-08.jpg)\n\n[Figure B-8](#9781430250500_AppB.xhtml#_Fig8).\
    \ Creating a Cocoa Library\n\n3.  The Project Options window is then displayed.\
    \ Specify the Product Name as **HelloLib**, the Type drop-down list as **Static**\
    \ (to create a static library), and select the check box to specify that the project\
    \ will use **Automatic Reference Counting** for memory management. Do not select\
    \ the check box for Include Unit Tests, and accept the defaults for the rest of\
    \ the options.\n4.  Now click **Next** to bring up the **Project Options** window.\
    \ In this window, specify **Hello** for location of the project, select **HelloSpace**\
    \ in the **Add to:** drop-down list (to add this library to the HelloSpace workspace),\
    \ and then click the **Create** button.\n5.  In the Xcode project navigator, observe\
    \ that an empty `HelloLib` class is created. Select **HelloLib.h** and update\
    \ the class interface as shown in [Listing B-2](#9781430250500_AppB.xhtml#list2).\n\
    \n[*Listing B-2.*](#9781430250500_AppB.xhtml#_list2)  HelloLib Class Interface\n\
    \n```\n    #import <Foundation/Foundation.h>\n\n@interface HelloLib : NSObject\n\
    \n- (NSString *) greeting:(NSString *)salutation;\n\n@end\n    ```\n\n6.  The\
    \ interface declares a single method named `greeting:` that takes an `NSString`\
    \ object as its argument. Now select **HelloLib.m** and update the class implementation\
    \ as shown in [Listing B-3](#9781430250500_AppB.xhtml#list3).\n\n[*Listing B-3.*](#9781430250500_AppB.xhtml#_list3)  HelloLib\
    \ Class Implementation\n\n```\n    #import \"HelloLib.h\"\n\n@implementation HelloLib\n\
    \n- (NSString *) greeting:(NSString *)salutation\n    {\n      return [NSString\
    \ stringWithFormat:@\"%@, World!\", salutation];\n    }\n\n@end\n    ```\n\nThe\
    \ method returns a greeting that includes the input parameter. This completes\
    \ the implementation of the static library. Now you need to make the header publicly\
    \ available to users of the library.\n\n1.  In the project editor pane of the\
    \ workspace window (under **Targets**), select the **HelloLib** target, and then\
    \ the **Build Phases** tab.\n2.  Delete the **Copy Headers** phase (if provided),\
    \ and then add the **Copy Files** build phase using the **Add Build Phase** icon\
    \ (as shown in [Figure B-9](#9781430250500_AppB.xhtml#Fig9)).\n\n![9781430250500_AppB-09.jpg](images/9781430250500_AppB-09.jpg)\n\
    \n[Figure B-9](#9781430250500_AppB.xhtml#_Fig9). Adding the Copy Files build phase\n\
    \n3.  Now disclose for the **Copy Files** phase by clicking the neighboring triangle.\
    \ You will see a location for adding files at the bottom of the window (it’s labeled\
    \ **Add files here**). From the project navigator, drag a copy of the **HelloLib.h**\
    \ header into this area and release it. This will make this header file available\
    \ to clients.\n4.  In the Copy Files area, set the **Subpath** to **include/${PRODUCT_NAME}**,\
    \ and select **Products Directory** in the Destination drop-down list. The workspace\
    \ window should now look as shown in [Figure B-10](#9781430250500_AppB.xhtml#Fig10).\n\
    \n![9781430250500_AppB-10.jpg](images/9781430250500_AppB-10.jpg)\n\n[Figure B-10](#9781430250500_AppB.xhtml#_Fig10).\
    \ Updating the Copy Files build phase\n\n**Note**   The subpath setting will copy\
    \ files into a folder named after the library (i.e., `HelloLib`), inside a folder\
    \ named `include`, inside the workspace built products directory. This setting\
    \ enables you to organize header files for different libraries by library name.\
    \ The `include` folder inside a build products directory is in the default header\
    \ search path for applications.\n\n5.  Finally, you should share the library,\
    \ thereby making it available to any project using the workspace. In Xcode, select\
    \ **Scheme ![image](images/arrow.jpg) Manage Schemes …** from the Xcode Product\
    \ menu. The Manage Schemes dialog will be displayed. Then locate the **HelloLib**\
    \ scheme in this dialog and click the **Shared** check box.\n6.  Now select the\
    \ **Build Settings** tab. Use the Search tool to find the **Skip Install** setting\
    \ and set that to **Yes**; this prevents Xcode from creating a multiapplication\
    \ bundle when projects that use this library are archived. This setting must be\
    \ made for both the `HelloLib` project and `HelloLib` target.\n\nWith those steps\
    \ completed, your static library is properly configured. Now let’s create the\
    \ app.\n\nCreating the App\n\nNow you will create the application that uses the\
    \ static library.\n\n1.  In Xcode, create a new project by selecting **New ![image](images/arrow.jpg)\
    \ Project …** from the Xcode File menu.\n2.  In the **New Project Assistant**\
    \ pane, create a command-line application by selecting the **Command Line Tool**\
    \ icon (from the **Application** selection under OS X template groups).\n3.  In\
    \ the **Project Options** window, specify **HelloApp** for the Product Name, choose\
    \ **Foundation** for the Project Type, and select ARC memory management by checking\
    \ the **Use Automatic Reference Counting** check box. Specify the location in\
    \ your file system where you want the project to be created (if necessary, select\
    \ **New Folder** and enter the name and location for the folder) and uncheck the\
    \ **Source Control** check box.\n4.  Finally, select **HelloSpace** in the **Add\
    \ to:** and **Group:** drop-down lists (to add this library to the HelloSpace\
    \ workspace), and then click the **Create** button.\n\nThe first thing you’ll\
    \ do is link the app against the static library.\n\n1.  Select the **HelloApp**\
    \ project in the project navigator, and then select the **HelloApp** target in\
    \ the project editor.\n2.  Select the **Build Phases** tab, disclose the **Link\
    \ Binaries With Libraries** phase, and click the plus (+) button.\n3.  In the\
    \ window, choose **libHelloLib.a** and click **Add** to add the library.\n\nNext\
    \ you’ll update build configuration settings to link the library:\n\n1.  Select\
    \ the **Build Settings** tab.\n2.  Find the **Other Linker Flags** build setting\
    \ (using the search tool) and add the flag\n\n`-ObjC` to this setting’s value,\
    \ if not present (as shown in [Figure B-11](#9781430250500_AppB.xhtml#Fig11)).\n\
    \n![9781430250500_AppB-11.jpg](images/9781430250500_AppB-11.jpg)\n\n[Figure B-11](#9781430250500_AppB.xhtml#_Fig11).\
    \ Updating the Copy Files build phase\n\nThe `-ObjC` flag will tell the linker\
    \ to link all Objective-C classes and categories from static libraries into your\
    \ application, even if the linker can’t tell that they are used (e.g., categories\
    \ and/or classes added dynamically).\n\nNow you need to import the header file\
    \ for the static library.\n\nThe build products for all the projects in a workspace\
    \ are located in the workspace build directory. Earlier, you copied the `HelloLib.h`\
    \ header file into the Products Directory `include` directory. This directory\
    \ is automatically included in the search path for all projects in the workspace.\
    \ Because you specified a subdirectory named after the `PRODUCT_NAME` build setting\
    \ (e.g., `include/${PRODUCT_NAME}`) in the subpath, the import statement should\
    \ include that directory, for example:\n\n```\n#import \"HelloLib/HelloLib.h\"\
    \n```"
  trans: "\n3. 在 Xcode 中，从 Xcode 菜单中选择 **偏好设置…** 打开偏好设置窗口。在偏好设置窗口中，选择 **位置** 标签页，然后从\
    \ **派生数据：** 下拉列表中选择 **默认**（如图 B-7 所示）。\n\n![9781430250500_AppB-07.jpg](img/9781430250500_AppB-07.jpg)\n\
    \n图 B-7 Xcode 偏好设置中的派生数据位置\n\n好了，现在工作区已正确配置，接下来你将创建项目。\n\n## 创建静态库\n\n现在你将创建一个静态库。\n\
    \n1. 在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg) 项目…** 来创建一个新项目。\n\
    2. 在 **新建项目助手** 面板中，首先选择 **框架与库**（在 Mac OS X 部分下），然后选择右上方面板中的 **Cocoa 库** 图标来创建一个\
    \ Cocoa 库（如图 B-8 所示）。\n\n![9781430250500_AppB-08.jpg](img/9781430250500_AppB-08.jpg)\n\
    \n图 B-8 创建 Cocoa 库\n\n3. 接着会显示 **项目选项** 窗口。将产品名称指定为 **HelloLib**，类型下拉列表指定为 **静态**（以创建静态库），并选中复选框以指定项目将使用\
    \ **自动引用计数** 进行内存管理。不要选中“包含单元测试”复选框，其余选项接受默认设置。\n4. 现在点击 **下一步** 以打开 **项目选项**\
    \ 窗口。在此窗口中，为项目位置指定 **Hello**，在 **添加到：** 下拉列表中选择 **HelloSpace**（将此库添加到 HelloSpace\
    \ 工作区），然后点击 **创建** 按钮。\n5. 在 Xcode 的项目导航器中，注意到创建了一个空的 `HelloLib` 类。选择 `HelloLib.h`\
    \ 并更新类接口，如 列表 B-2 所示。\n\n*列表 B-2.*  HelloLib 类接口\n\n```\n    #import <Foundation/Foundation.h>\n\
    \n@interface HelloLib : NSObject\n\n- (NSString *) greeting:(NSString *)salutation;\n\
    \n@end\n```\n\n6. 该接口声明了一个名为 `greeting:` 的单一方法，该方法接受一个 `NSString` 对象作为其参数。现在选择\
    \ `HelloLib.m` 并更新类实现，如 列表 B-3 所示。\n\n*列表 B-3.*  HelloLib 类实现\n\n```\n    #import\
    \ \"HelloLib.h\"\n\n@implementation HelloLib\n\n- (NSString *) greeting:(NSString\
    \ *)salutation\n    {\n      return [NSString stringWithFormat:@\"%@, World!\"\
    , salutation];\n    }\n\n@end\n```\n\n该方法返回一个包含输入参数的问候语。这样就完成了静态库的实现。现在你需要使该头文件对库的用户公开可用。\n\
    \n1. 在工作区窗口的项目编辑器面板中（在 **目标** 下），选择 **HelloLib** 目标，然后选择 **构建阶段** 标签页。\n2. 删除\
    \ **复制头文件** 阶段（如果存在），然后使用 **添加构建阶段** 图标添加 **复制文件** 构建阶段（如图 B-9 所示）。\n\n![9781430250500_AppB-09.jpg](img/9781430250500_AppB-09.jpg)\n\
    \n图 B-9 添加“复制文件”构建阶段\n\n3. 现在点击旁边的三角形以展开 **复制文件** 阶段。你会在窗口底部看到一个用于添加文件的位置（标有 **在此处添加文件**）。从项目导航器中，将\
    \ `HelloLib.h` 头文件的一个副本拖入此区域并释放。这将使该头文件对客户端可用。\n4. 在“复制文件”区域，将 **子路径** 设置为 `include/${PRODUCT_NAME}`，并在“目标”下拉列表中选择\
    \ **产品目录**。此时工作区窗口应如图 B-10 所示。\n\n![9781430250500_AppB-10.jpg](img/9781430250500_AppB-10.jpg)\n\
    \n图 B-10 更新“复制文件”构建阶段\n\n**注意**   子路径设置会将文件复制到工作区构建产品目录内的 `include` 文件夹下、以库名命名的文件夹（例如\
    \ `HelloLib`）中。此设置使你能够按库名组织不同库的头文件。构建产品目录内的 `include` 文件夹位于应用程序的默认头文件搜索路径中。\n\n\
    5. 最后，你应该共享该库，从而使其可供使用该工作区的任何项目使用。在 Xcode 中，从 Xcode 产品菜单中选择 **方案 ![image](img/arrow.jpg)\
    \ 管理方案…**。将显示“管理方案”对话框。然后在此对话框中找到 **HelloLib** 方案，并点击 **共享** 复选框。\n6. 现在选择 **构建设置**\
    \ 标签页。使用搜索工具找到 **跳过安装** 设置，并将其设置为 **是**；这可以防止 Xcode 在归档使用此库的项目时创建多应用程序捆绑包。此设置必须同时对\
    \ `HelloLib` 项目和 `HelloLib` 目标进行。\n\n完成这些步骤后，你的静态库就配置好了。现在让我们来创建应用程序。\n\n## 创建应用程序\n\
    \n现在你将创建使用该静态库的应用程序。\n\n1. 在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg)\
    \ 项目…** 来创建一个新项目。\n2. 在 **新建项目助手** 面板中，选择 **命令行工具** 图标（来自 OS X 模板组下的 **应用程序**\
    \ 选择）来创建一个命令行应用程序。\n3. 在 **项目选项** 窗口中，将产品名称指定为 **HelloApp**，为项目类型选择 **Foundation**，并通过选中\
    \ **使用自动引用计数** 复选框选择 ARC 内存管理。在文件系统中指定你要创建项目的位置（如有必要，选择 **新建文件夹** 并输入文件夹的名称和位置），并取消选中\
    \ **源代码控制** 复选框。\n4. 最后，在 **添加到：** 和 **群组：** 下拉列表中选择 **HelloSpace**（将此库添加到 HelloSpace\
    \ 工作区），然后点击 **创建** 按钮。\n\n你要做的第一件事是将应用程序与静态库链接。\n\n1. 在项目导航器中选择 **HelloApp** 项目，然后在项目编辑器中选择\
    \ **HelloApp** 目标。\n2. 选择 **构建阶段** 标签页，展开 **将二进制文件与库链接** 阶段，并点击加号 (+) 按钮。\n3.\
    \ 在窗口中，选择 `libHelloLib.a`，然后点击 **添加** 以添加该库。\n\n接下来，你将更新构建设置以链接该库：\n\n1. 选择 **构建设置**\
    \ 标签页。\n2. 找到 **其他链接器标志** 构建设置（使用搜索工具），如果不存在，则将标志\n\n`-ObjC` 添加到此设置的值中（如图 B-11\
    \ 所示）。\n\n![9781430250500_AppB-11.jpg](img/9781430250500_AppB-11.jpg)\n\n图 B-11\
    \ 更新“复制文件”构建阶段\n\n`-ObjC` 标志会告诉链接器将静态库中的所有 Objective-C 类和类别链接到你的应用程序中，即使链接器无法判断它们是否被使用（例如，动态添加的类别和/或类）。\n\
    \n现在你需要导入静态库的头文件。\n\n工作区中所有项目的构建产品都位于工作区的构建目录中。之前，你将 `HelloLib.h` 头文件复制到了产品目录的\
    \ `include` 目录中。此目录会自动包含在工作区中所有项目的搜索路径中。由于你在子路径中指定了一个以 `PRODUCT_NAME` 构建设置命名的子目录（例如\
    \ `include/${PRODUCT_NAME}`），导入语句应包含该目录，例如：\n\n```\n#import \"HelloLib/HelloLib.h\"\
    \n```\n"
- fmt: "# Adding Code to the App\n\nOK, now you will add the code to the app to demonstrate\
    \ use of the static library. In the project navigator, select the `main.m` file\
    \ for the HelloApp and make the updates shown in [Listing B-4](#9781430250500_AppB.xhtml#list4).\n\
    \n[*Listing B-4.*](#9781430250500_AppB.xhtml#_list4) HelloApp `main()` Function\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"HelloLib/HelloLib.h\"\n\n\
    int main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    HelloLib\
    \ *hello = [HelloLib new];\n    NSLog(@\"%@\", [hello greeting:@\"Hello\"]);\n\
    \  }\n  return 0;\n}\n```\n\nThe header file for the HelloLib static library is\
    \ imported with the statement:\n\n```\n#import \"HelloLib/HelloLib.h\"\n```\n\n\
    The `main()` function creates a `HelloLib` instance and invokes its `greeting:`\
    \ method. When you compile and run the program, you should observe the messages\
    \ in the output pane shown in [Figure B-12](#9781430250500_AppB.xhtml#Fig12).\n\
    \n![9781430250500_AppB-12.jpg](images/9781430250500_AppB-12.jpg)\n\n[Figure B-12](#9781430250500_AppB.xhtml#_Fig12).\
    \ HelloApp program output\n\nCool. This demonstrates how to incorporate static\
    \ libraries into your projects using Xcode workspaces. The same techniques apply\
    \ for other reusable software libraries (dynamic libraries, frameworks, bundles,\
    \ etc.).\n\n# Schemes\n\nAn Xcode scheme groups one or more targets with a build\
    \ configuration and an environment execution configuration, with respect to the\
    \ purpose (i.e., action) for which you are building the product.\n\nYou can have\
    \ as many schemes as you want, but only one can be active at a time. You can specify\
    \ whether a scheme should be stored in a project—in which case it’s available\
    \ in every workspace that includes that project, or in the workspace—in which\
    \ case it’s available only in that workspace. When you select an active scheme,\
    \ you also select a run destination (that is, the architecture of the hardware\
    \ for which the products are built).\n\nTo edit a scheme, select **Edit Scheme…**\
    \ from the Scheme toolbar menu in the Xcode workspace window, as shown in [Figure\
    \ B-13](#9781430250500_AppB.xhtml#Fig13).\n\n![9781430250500_AppB-13.jpg](images/9781430250500_AppB-13.jpg)\n\
    \n[Figure B-13](#9781430250500_AppB.xhtml#_Fig13). Selecting Edit Scheme using\
    \ the scheme toolbar menu\n\nThe Scheme pop-up dialog allows you to specify many\
    \ settings that affect product build and the actions performed on a product. As\
    \ shown in [Figure B-14](#9781430250500_AppB.xhtml#Fig14), the left column lists\
    \ actions that correspond to commands in the Product menu: Run, Test, Profile,\
    \ Analyze, and Archive. The Build option allows you to select the targets to build\
    \ for each of these actions.\n\n![9781430250500_AppB-14.jpg](images/9781430250500_AppB-14.jpg)\n\
    \n[Figure B-14](#9781430250500_AppB.xhtml#_Fig14). Scheme pop-up dialog\n\nAs\
    \ shown in [Figure B-14](#9781430250500_AppB.xhtml#Fig14), the tabs at the top\
    \ of the scheme dialog vary according to the action performed on the product.\
    \ They enable you to configure the build and the execution environment appropriately.\n\
    \n# Actions\n\nIn Xcode, an action builds a target (thereby creating a product)\
    \ and processes the product accordingly. Xcode defines the Build, Run, Test, Profile,\
    \ Analyze, and Archive actions.\n\n- The **Build action** builds one or more targets,\
    \ creating the associated products. This step is performed automatically by all\
    \ the other actions.\n- The **Run action** builds and then runs the product in\
    \ the debugger. This is the default action.\n- The **Test action** builds and\
    \ runs the unit test features of a project. If the project doesn’t include a unit-testing\
    \ target, this action does nothing.\n- The **Profile action** builds the product,\
    \ launches the selected Instruments profiling and testing application, and then\
    \ loads the product into it. Instruments can be used to perform a variety of profiling\
    \ and testing activities on the product, including performance analysis, stress\
    \ testing, memory usage, leak detection, and general troubleshooting.\n- The **Analyze\
    \ action** builds the product and then runs the static code analyzer on it.\n\
    - Finally, the **Archive action** builds and packages the product so that it is\
    \ ready for distribution, adding it to the archive list in the Xcode Organizer.\n\
    \n# Roundup\n\nIn this appendix, you learned about some of key features of Xcode\
    \ and how they can be used to make you a more efficient and productive programmer.\
    \ You now have a good understanding of Xcode projects, workspaces, targets, schemes,\
    \ and actions, and how they can be used. Apple provides a complete set of reference\
    \ documents that will be of great assistance for more complex software development\
    \ scenarios and project configurations. The following lists several of these documents.\n\
    \n- Xcode User Guide\n- Xcode Release Notes\n- Xcode Build Setting Reference\n\
    - Instruments User Guide\n- Instruments User Reference\n- App Distribution Guide\n\
    \n# Appendix C: Using LLDB\n\nSoftware development can be a complex and (at times)\
    \ error-prone process. As you have learned over the course of reading this book,\
    \ the Objective-C platform provides a myriad of features to make you a more efficient,\
    \ productive programmer. However, the bottom line is that the programs you write\
    \ will have bugs; so the question is how do you mitigate them? Specifically, how\
    \ do you detect bugs, validate program correctness, and analyze program control\
    \ flow? Or perhaps of even greater importance, what is the process you use for\
    \ debugging code? For example, do you analyze program state by inserting debugging\
    \ statements in your source code? The Xcode debugger is the key tool for detecting\
    \ runtime and logical errors in your software. In addition, it provides a variety\
    \ of features that can also make you better at debugging.\n\nIn this appendix,\
    \ you will learn about debugging your programs in Xcode using the LLVM Debugger\
    \ (LLDB). We’ll begin by briefly reviewing the LLVM compiler infrastructure, several\
    \ of whose components are leveraged by LLDB. Next, you will explore the design\
    \ of LLDB and review its key components. You will then learn how Xcode supports\
    \ debugging with LLDB, and finally debug a few example programs with LLDB, thereby\
    \ becoming familiar with some of its key features. By the end of this appendix,\
    \ you should be convinced of the power and capability of LLDB, and will use it\
    \ whenever you program with Xcode using Objective-C.\n\n## LLVM Overview\n\nLLVM\
    \ (originally an acronym for *Low Level Virtual Machine*) was conceived as a compiler\
    \ framework for programs written in arbitrary languages. Currently, the LLVM project\
    \ consists of a collection of modular, reusable components (libraries, toolsets,\
    \ runtimes) used for program analysis and compilation (as shown in [Figure C-1](#9781430250500_AppC.xhtml#Fig1)).\n\
    \n![9781430250500_AppC-01.jpg](images/9781430250500_AppC-01.jpg)\n\n[Figure C-1](#9781430250500_AppC.xhtml#_Fig1).\
    \ LLVM project components\n\nThese components can be used as infrastructure to\
    \ implement a variety of capabilities, such as compilers, optimizers, and debuggers.\
    \ The following are brief definitions for several of the components under the\
    \ LLVM project:"
