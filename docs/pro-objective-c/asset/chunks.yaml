    \nYou now have a good understanding of error objects and exceptions, along with\
    \ the corresponding Foundation Framework APIs. So now you may be wondering, “Which\
    \ do I use for detecting and handling errors?” Before I provide guidelines and\
    \ recommendations, let’s begin by reviewing some of the key points regarding error\
    \ objects and exceptions.\n\n### Error Objects\n\n*   **Pros:**\n    *   Encapsulates\
    \ error info (code, domain, user info)\n    *   Provides infrastructure for recovery\n\
    \    *   Supported by the Cocoa frameworks\n*   **Cons:**\n    *   Couples error-handling\
    \ logic with business logic\n    *   Labor intensive, difficult to understand\n\
    \    *   Difficult to maintain and/or modify\n\n### Exceptions\n\n*   **Pros:**\n\
    \    *   Decouples detection and handling of exception conditions, thereby improving\
    \ program design and maintenance.\n    *   Automates propagation from the point\
    \ of detection to handling.\n*   **Cons:**\n    *   Unwinds stack, resulting in\
    \ a performance hit.\n    *   Uses more resources (slightly increases the size\
    \ of the executable).\n    *   Still requires parameter/result checks.\n    *\
    \   Cocoa frameworks (including the Foundation Framework) are not exception-safe.\n\
    \n### Guidelines and Recommendations\n\nError objects should be used to detect\
    \ and handle expected errors within an Objective-C program that can (potentially)\
    \ be recovered from. Assertions should be used as a programming aid to check program\
    \ invariants, conditions, assumptions, and so forth. Note that because assertions\
    \ may be disabled prior to compilation (as is often the case for production releases),\
    \ they should not be used for parameter checking of public APIs. Exceptions should\
    \ only be used to detect programming or unexpected runtime errors that cannot\
    \ be recovered from, and which should be handled by immediately terminating the\
    \ application.\n\n## Roundup\n\nIn this chapter, you examined the Foundation Framework\
    \ APIs for error handling and exception processing. You should now be familiar\
    \ with Foundation Framework classes that provide the following functionality:\n\
    \n*   Error handling using error objects\n*   Exception processing\n*   Guidelines\
    \ for using assertions, error objects, and exceptions\n\nNow that you have concluded\
    \ this review of the Foundation Framework APIs, it’s time to move on to Part 4\
    \ of this book, which focuses on new and advanced topics in Objective-C. Before\
    \ you do that, however, perhaps now’s a good time to review what you’ve covered\
    \ so far and then give yourself a well-deserved break. When you’re ready, turn\
    \ the page and dive in!\n\n# Chapter 15: Blocks\n\nWelcome back. Congratulations\
    \ on making it to this point! So far, you have covered all the fundamental elements\
    \ of the Objective-C platform. But guess what? You haven’t reached the finish\
    \ line just yet! That’s because Objective-C has a variety of additional, advanced\
    \ features that, once mastered, will enable you to take your programming to the\
    \ next level. In Part 4 of this book, you will explore several of these features\
    \ and learn how to use them in your programs.\n\nIn this chapter, you will learn\
    \ how to program with *blocks*, a powerful feature available for the Objective-C\
    \ language. The chapter explores block syntax and semantics, memory management,\
    \ how to develop blocks in your own code, and how to use blocks in existing APIs\
    \ (such as the Foundation Framework).\n\nSimply put, blocks provide a way to create\
    \ a group of statements (i.e., a block of code) and assign those statements to\
    \ a variable, which can subsequently be invoked. In this way, they are similar\
    \ to functions and methods, but in addition to executable code, they may also\
    \ contain variable bindings to stack or heap memory. A block is an implementation\
    \ of a *closure*, a function that allows access to variables outside its typical\
    \ scope. In addition, an Objective-C block is actually an object; it is a subclass\
    \ of `NSObject` and has all of its associated properties (you can send messages\
    \ to it, etc.). Apple developed blocks as an extension to the C family of programming\
    \ languages (C, Objective-C, and C++). They are available for use with Mac OS\
    \ X v10.6 and later, as well as iOS 4.0 and later.\n\n## Block Syntax\n\nOne of\
    \ the most difficult things about learning how to program with blocks is mastering\
    \ their syntax. This section explains block syntax in depth and provides numerous\
    \ examples to illustrate their application in code.\n\nThe syntactic features\
    \ added to support blocks enable the declaration of variables of block type and\
    \ the definition of block literals.\n\nThe *block type* consists of a return value\
    \ type and a list of parameter types. A caret symbol (`^`) operator is used to\
    \ declare a variable of block type. [Figure 15-1](#9781430250500_Ch15.xhtml#Fig1)\
    \ illustrates the syntax for a block type declaration.\n\n![9781430250500_Fig15-01.jpg](images/9781430250500_Fig15-01.jpg)\n\
    \n[Figure 15-1](#9781430250500_Ch15.xhtml#_Fig1). Block type declaration syntax\n\
    \n[Figure 15-1](#9781430250500_Ch15.xhtml#Fig1) shows that the `returnType` is\
    \ the type of the value returned by the block when it is invoked. The block variable\
    \ named `blockName` is preceded by a caret and enclosed in parentheses. As mentioned\
    \ previously, a variable of block type may have parameters. The list of parameter\
    \ types is enclosed in parentheses and follows the block name, where the `parameterTypes`\
    \ are each separated by a comma. If a block variable declaration has no parameters,\
    \ its list of parameter types should be specified as `void` (enclosed in parentheses).\
    \ OK, that summarizes the syntax for declaring variables of block type. Now let’s\
    \ look at some examples. The following statement declares a block variable named\
    \ `oneParamBlock` that has a single parameter of type `int` and returns a value\
    \ of type `int`.\n\n```\nint (^oneParamBlock)(int);\n```\n\nAs stated, a block\
    \ variable with no return value has its return type specified as `void` in its\
    \ declaration. The next example declares a block variable named `twoParamsBlock`\
    \ that takes two parameters of type `int` and returns nothing.\n\n```\nvoid (^twoParamsBlock)(int,\
    \ int);\n```"
