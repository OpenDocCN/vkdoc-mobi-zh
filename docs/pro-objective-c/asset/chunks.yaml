  raw: 'The Foundation Framework archives and serialization classes implement mechanisms
    for converting an object (i.e., an object graph) into an architecture-independent
    byte buffer. This data can then be written to a file or transmitted to another
    process, potentially over a network. Later, the data can be converted back into
    objects, preserving the associated object graph. In this way, these classes provide
    a lightweight means of data persistence. The serialization process preserves the
    data and the positions of objects in an object hierarchy, whereas the archiving
    process is more general purpose—it preserves the data, data types, and the relations
    between the objects in an object hierarchy.


    Archiving


    `NSCoder` is an abstract class that declares the interface used to both *marshal*
    and *unmarshall* object graphs. The marshalling process converts an object’s information
    into a series of bytes, and the unmarshalling process creates an object from a
    (previously marshalled) series of bytes. `NSCoder` includes methods for encoding
    and decoding data of various types, testing an `NSCoder` instance, and provides
    support for secure coding. The Foundation Framework includes four concrete subclasses
    of `NSCoder`: `NSArchiver`, `NSUnarchiver`, `NSKeyedArchiver`, and `NSKeyedUnarchiver`.


    Sequential Archives


    `NSArchiver` and `NSUnarchiver` are used to create *sequential* archives, which
    means that the objects and values of a sequential archive must be decoded in the
    same order that they were encoded. In addition, when decoding a sequential archive,
    the entire object graph must be decoded. `NSArchiver` is used to encode objects
    for writing to a file or some other use, and `NSUnarchiver` is used to decode
    objects from an archive. `NSArchiver` includes methods for initialization, archiving
    data, retrieving archived data, and substituting classes or objects in an archive.
    `NSUnarchiver` includes methods for initialization, decoding objects, substituting
    classes or objects, and management.


    Keyed Archives


    Whereas `NSArchiver` and `NSUnarchiver` are sequential archives, `NSKeyedArchiver`
    and `NSKeyedUnarchiver` are keyed archives—each value in the archive can be individually
    named/keyed. The key must be unique within the scope of the object in which the
    value is being encoded/decoded. When decoding a keyed archive, the values can
    be decoded out of sequence or not at all. Hence, keyed archives provide better
    support for forward and backward compatibility and are recommended over the sequential
    archiving classes. `NSKeyedArchiver` includes methods for initialization, archiving
    data, encoding data and objects, and management. `NSKeyedUnarchiver` includes
    methods for initialization, unarchiving data, decoding objects, and management.


    The code shown in [Listing 12-5](#9781430250500_Ch12.xhtml#list5) uses the NSKeyedArchiver
    `archiveRootObject:` method to archive an `NSString` instance named `greeting`
    to a file in the current directory named `greeting.archive`.


    [*Listing 12-5.*](#9781430250500_Ch12.xhtml#_list5)  Archiving an Object with
    NSKeyedArchiver


    ```

    NSString *greeting = @"Hello, World!";

    NSString *cwd = [[NSFileManager defaultManager] currentDirectoryPath];

    NSString *archivePath = [cwd stringByAppendingString:@"/greeting.archive"];

    BOOL result = [NSKeyedArchiver archiveRootObject:greeting toFile:archivePath];

    ```


    The next code fragment uses the NSKeyedUnarchiver `unarchiveObjectWithFile:` method
    to decode an `NSString` object named `greeting` from an archive stored in the
    file `archivePath`.


    ```

    NSString *greeting = [NSKeyedUnarchiver unarchiveObjectWithFile:archivePath];

    ```


    Encoding and Decoding Objects


    While the `NSKeyedArchiver` and `NSKeyedUnarchiver` classes are responsible for
    the archiving process, a class must conform to the `NSCoding` protocol to support
    enconding/decoding of class instances. This protocol declares two methods, `encodeWithCoder:`
    and `initWithCoder:`, that encode/decode an object’s state (e.g., its properties
    and instance variables). When a *coder object* (i.e., an `NSKeyedArchiver` or
    `NSKeyedUnarchiver` instance) archives an object, it instructs the object to encode
    its state by invoking its `encodeWithCoder:` method. Hence, a class must implement
    the appropriate encode and decode method(s) because these will be called by the
    selected coder object. [Listing 12-6](#9781430250500_Ch12.xhtml#list6) depicts
    an implementation of a class named `MyType` that conforms to the `NSCoding` protocol.


    [*Listing 12-6.*](#9781430250500_Ch12.xhtml#_list6)  Implementing the NSCoding
    Protocol Methods


    ```

    @interface MyType : NSObject <NSCoding>


    @property NSString *type;


    @end


    @implementation MyType


    - (void)encodeWithCoder:(NSCoder *)coder

    {

      [coder encodeObject:self.type forKey:@"TYPE_KEY"];

    }


    - (id)initWithCoder:(NSCoder *)coder

    {

      if ((self = [super init]))

      {

        type = [coder decodeObjectForKey:@"TYPE_KEY"];

      }

      return self;

    }


    @end

    ```


    Property List Serialization


    Property list serialization provides a means of converting a *property list*,
    a structured collection of data organized as name-value pairs, to/from an architecture-independent
    byte stream. The Foundation Framework `NSPropertyListSerialization` class provides
    methods to serialize and deserialize property lists directly and validate a property
    list. It also supports conversion of property lists to/from XML or an optimized
    binary format. In contrast to archiving, basic serialization does not record the
    data type of the values nor the relationships between them; only the values themselves
    are recorded. Hence, you must write your code to deserialize data with the proper
    types and in the proper order.


    A property list organizes data as named values and collections of values. They
    are frequently used to store, organize, and access standard types of data. Property
    lists can be created programmatically, or more commonly, as XML files.


    XML Property Lists


    Property lists are most commonly stored in XML files, referred to as *XML plist*
    files. The `NSArray` and `NSDictionary` classes both have methods to persist themselves
    as XML property list files and to create class instances from XML plists.


    NSPropertyListSerialization


    The `NSPropertyListSerialization` class enables the programmatic creation of property
    lists. This class supports the following Foundation data types (the corresponding
    Core Foundation toll-free bridged data types are provided in parentheses):


    *   `NSData` (`CFData`)

    *   `NSDate` (`CFDate`)

    *   `NSNumber`: integer, float, and Boolean values (`CFNumber`, `CFBoolean`)

    *   `NSString` (`CFString`)

    *   `NSArray` (`CFArray`)

    *   `NSDictionary` (`CFDictionary`)


    Because the supported data types include the collection classes `NSArray` and
    `NSDictionary`, each of which can contain other collections, an `NSPropertyListSerialization`
    object can be used to create hierarchies of data. As a property list is structured
    as a collection of name-value pairs, a dictionary is used to programmatically
    create property list data. [Listing 12-7](#9781430250500_Ch12.xhtml#list7) demonstrates
    the use of the instance method `dataWithPropertyList:format:options:error:` to
    serialize an `NSDictionary` property list collection of name-value pairs to a
    data buffer named `plistData`.


    [*Listing 12-7.*](#9781430250500_Ch12.xhtml#_list7)  Property List Serialization
    of Name-Value Pairs


    ```

    NSError *errorStr;

    NSDictionary *data = @{ @"FirstName" : @"John", @"LastName" : @"Doe" };

    NSData *plistData = [NSPropertyListSerialization dataWithPropertyList:data

                         format:NSPropertyListXMLFormat_v1_0

                         options:0

                         error:&errorStr];

    ```'
  trans: "\n# Foundation 框架归档与序列化\n\nFoundation 框架中的归档和序列化类实现了将对象（即对象图）转换为与架构无关的字节缓冲区的机制。这些数据可以写入文件或通过网络传输到另一个进程。随后，这些数据可以转换回对象，并保留相关的对象图。通过这种方式，这些类提供了一种轻量级的数据持久化方法。序列化过程保留数据以及对象层次结构中对象的位置，而归档过程则更为通用——它保留数据、数据类型以及对象层次结构中对象之间的关系。\n\
    \n## 归档\n\n`NSCoder` 是一个抽象类，声明了用于**编组**（*marshal*）和**解组**（*unmarshall*）对象图的接口。编组过程将对象的信息转换为一系列字节，解组过程则从（先前编组的）字节序列中创建对象。`NSCoder`\
    \ 包含用于编码和解码各种数据类型的方法，用于测试 `NSCoder` 实例，并提供对安全编码的支持。Foundation 框架包含 `NSCoder` 的四个具体子类：`NSArchiver`、`NSUnarchiver`、`NSKeyedArchiver`\
    \ 和 `NSKeyedUnarchiver`。\n\n### 顺序归档\n\n`NSArchiver` 和 `NSUnarchiver` 用于创建*顺序*归档，这意味着顺序归档中的对象和值必须以与编码时相同的顺序进行解码。此外，在解码顺序归档时，必须解码整个对象图。`NSArchiver`\
    \ 用于编码对象以写入文件或用于其他用途，而 `NSUnarchiver` 用于从归档中解码对象。`NSArchiver` 包含用于初始化、归档数据、检索归档数据以及在归档中替换类或对象的方法。`NSUnarchiver`\
    \ 包含用于初始化、解码对象、替换类或对象以及管理的方法。\n\n### 键控归档\n\n`NSArchiver` 和 `NSUnarchiver` 是顺序归档，而\
    \ `NSKeyedArchiver` 和 `NSKeyedUnarchiver` 是键控归档——归档中的每个值都可以单独命名/键控。键必须在正在编码/解码值的对象作用域内唯一。在解码键控归档时，值可以不按顺序解码，或者根本不解码。因此，键控归档提供了更好的向前和向后兼容性支持，并且推荐使用它们而不是顺序归档类。`NSKeyedArchiver`\
    \ 包含用于初始化、归档数据、编码数据和对象以及管理的方法。`NSKeyedUnarchiver` 包含用于初始化、解归档数据、解码对象以及管理的方法。\n\
    \n列表 12-5 中显示的代码使用 `NSKeyedArchiver` 的 `archiveRootObject:` 方法，将名为 `greeting`\
    \ 的 `NSString` 实例归档到当前目录下名为 `greeting.archive` 的文件中。\n\n*列表 12-5.*  使用 `NSKeyedArchiver`\
    \ 归档对象\n\n```objc\nNSString *greeting = @\"Hello, World!\";\nNSString *cwd = [[NSFileManager\
    \ defaultManager] currentDirectoryPath];\nNSString *archivePath = [cwd stringByAppendingString:@\"\
    /greeting.archive\"];\nBOOL result = [NSKeyedArchiver archiveRootObject:greeting\
    \ toFile:archivePath];\n```\n\n下一个代码片段使用 `NSKeyedUnarchiver` 的 `unarchiveObjectWithFile:`\
    \ 方法，从存储在文件 `archivePath` 中的归档中解码一个名为 `greeting` 的 `NSString` 对象。\n\n```objc\n\
    NSString *greeting = [NSKeyedUnarchiver unarchiveObjectWithFile:archivePath];\n\
    ```\n\n## 编码和解码对象\n\n虽然 `NSKeyedArchiver` 和 `NSKeyedUnarchiver` 类负责归档过程，但一个类必须遵循\
    \ `NSCoding` 协议才能支持类实例的编码/解码。该协议声明了两个方法，`encodeWithCoder:` 和 `initWithCoder:`，用于编码/解码对象的状态（例如，其属性和实例变量）。当一个*编码器对象*（即\
    \ `NSKeyedArchiver` 或 `NSKeyedUnarchiver` 实例）归档一个对象时，它会通过调用该对象的 `encodeWithCoder:`\
    \ 方法指示其编码自身状态。因此，一个类必须实现适当的编码和解码方法，因为这些方法将由所选的编码器对象调用。列表 12-6 展示了一个名为 `MyType`\
    \ 的类的实现，该类遵循 `NSCoding` 协议。\n\n*列表 12-6.*  实现 `NSCoding` 协议方法\n\n```objc\n@interface\
    \ MyType : NSObject <NSCoding>\n\n@property NSString *type;\n\n@end\n\n@implementation\
    \ MyType\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [coder encodeObject:self.type\
    \ forKey:@\"TYPE_KEY\"];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self\
    \ = [super init]))\n  {\n    type = [coder decodeObjectForKey:@\"TYPE_KEY\"];\n\
    \  }\n  return self;\n}\n\n@end\n```\n\n## 属性列表序列化\n\n属性列表序列化提供了一种将*属性列表*（一种按名称-值对组织的数据结构集合）转换为与架构无关的字节流或从字节流转换的方法。Foundation\
    \ 框架的 `NSPropertyListSerialization` 类提供了直接序列化和反序列化属性列表以及验证属性列表的方法。它还支持属性列表与 XML\
    \ 或优化的二进制格式之间的转换。与归档相比，基本序列化不记录值的数据类型及其之间的关系；只记录值本身。因此，您必须编写代码以正确的类型和正确的顺序反序列化数据。\n\
    \n属性列表将数据组织为命名值以及值的集合。它们常用于存储、组织和访问标准类型的数据。属性列表可以通过编程方式创建，或者更常见的是作为 XML 文件创建。\n\
    \n### XML 属性列表\n\n属性列表最常见的形式是存储在 XML 文件中，称为 *XML plist* 文件。`NSArray` 和 `NSDictionary`\
    \ 类都有方法可以将自身持久化为 XML 属性列表文件，以及从 XML plist 创建类实例。\n\n### `NSPropertyListSerialization`\n\
    \n`NSPropertyListSerialization` 类支持以编程方式创建属性列表。该类支持以下 Foundation 数据类型（括号中提供了相应的\
    \ Core Foundation 免费桥接数据类型）：\n\n*   `NSData` (`CFData`)\n*   `NSDate` (`CFDate`)\n\
    *   `NSNumber`：整数、浮点数和布尔值 (`CFNumber`、`CFBoolean`)\n*   `NSString` (`CFString`)\n\
    *   `NSArray` (`CFArray`)\n*   `NSDictionary` (`CFDictionary`)\n\n由于支持的数据类型包括集合类\
    \ `NSArray` 和 `NSDictionary`，而它们各自又可以包含其他集合，因此 `NSPropertyListSerialization` 对象可用于创建数据层次结构。由于属性列表结构化为名称-值对的集合，因此在编程创建属性列表数据时使用字典。列表\
    \ 12-7 演示了如何使用实例方法 `dataWithPropertyList:format:options:error:` 将名-值对的 `NSDictionary`\
    \ 属性列表集合序列化到名为 `plistData` 的数据缓冲区。\n\n*列表 12-7.*  名称-值对的属性列表序列化\n\n```objc\nNSError\
    \ *errorStr;\nNSDictionary *data = @{ @\"FirstName\" : @\"John\", @\"LastName\"\
    \ : @\"Doe\" };\nNSData *plistData = [NSPropertyListSerialization dataWithPropertyList:data\n\
    \                     format:NSPropertyListXMLFormat_v1_0\n                  \
    \   options:0\n                     error:&errorStr];\n```\n"
- fmt: "`format:`参数指定属性列表格式，类型为枚举`NSPropertyListFormat`。允许的值如下：\n\n- `NSPropertyListOpenStepFormat`：传统ASCII属性列表格式。\n\
    - `NSPropertyListXMLFormat_v1_0`：XML属性列表格式。\n- `NSPropertyListBinaryFormat_v1_0`：二进制属性列表格式。\n\
    \n`options:`参数用于指定选定的属性列表写入选项。此参数目前未使用，应设置为0。如果该方法未成功完成，则会在`error:`参数中返回一个`NSError`对象，用于描述错误情况。[Listing\
    \ 12-8](#9781430250500_Ch12.xhtml#list8)演示了如何使用`propertyListWithData:options:format:error:`方法从[Listing\
    \ 12-7](#9781430250500_Ch12.xhtml#list7)的`plistData`数据缓冲区反序列化属性列表。\n\n[*Listing\
    \ 12-8.*](#9781430250500_Ch12.xhtml#_list8) 属性列表反序列化\n\n```\nNSError *errorStr;\n\
    NSDictionary *plist = [NSPropertyListSerialization\n                       propertyListWithData:plistData\n\
    \                       options:NSPropertyListImmutable\n                    \
    \   format:NULL\n                       error:&errorStr];\n```\n\n`options:`参数指定属性列表读取选项。此值可以是枚举类型`NSPropertyListMutabilityOptions`中的任意值。可能的值如下：\n\
    \n- `NSPropertyListImmutable`：返回的属性列表包含不可变对象。\n- `NSPropertyListMutableContainers`：返回的属性列表具有可变容器，但叶子节点不可变。\n\
    - `NSPropertyListMutableContainersAndLeaves`：返回的属性列表具有可变容器和可变叶子节点。\n\n`format:`参数包含属性列表存储的格式。如果提供值`NULL`，则无需知道格式。格式可能的非`NULL`值属于枚举类型`NSPropertyListFormat`。\n\
    \n属性列表序列化不会保留对象的完整类标识，仅保留其一般类型。换句话说，属性列表对象可以是前述任何支持的类型。当集合类作为属性列表存储时，其元素也必须在支持的属性列表数据类型列表中。此外，`NSDictionary`属性列表对象的键必须是字符串类型（`NSString`）。因此，如果对属性列表进行序列化然后再反序列化，结果属性列表中的对象可能与原始属性列表中的对象不属于同一类。特别地，当属性列表被序列化时，容器对象（即`NSDictionary`和`NSArray`对象）的可变性不会被保留。然而，在反序列化时，你可以选择将所有容器对象创建为可变或不可变。\n\
    \n属性列表序列化也不会追踪多次引用的对象。属性列表中对某个对象的每个引用都会分别进行序列化，导致反序列化时产生多个实例。\n\n归档对象图\n\n好了，现在你已经对归档和序列化类有了很好的了解，接下来将创建一个程序来演示\
    \ Foundation 框架归档 API 的使用。该程序将从类层次结构创建一个对象图，然后对对象图进行编码和解码。你将开发的类在图 12-1 中进行了说明。\n\
    \n![9781430250500_Fig12-01.jpg](images/9781430250500_Fig12-01.jpg)\n\n[图12-1](#9781430250500_Ch12.xhtml#_Fig1).\
    \ ArchiveCat 程序类层次结构\n\n如图12-1所示，该程序包含一个类层次结构（`Subfamily`-`Family`-`Order`类）和一个用于归档此类层次结构实例的类（`Archiver`）。在\
    \ Xcode 中，通过从 Xcode 文件菜单中选择 **New ![image](images/arrow.jpg) Project . . .** 来创建新项目。在\
    \ **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，将产品名称指定为\
    \ **ArchiveCat**，选择 **Foundation** 作为项目类型，并通过选中 **Use Automatic Reference Counting**\
    \ 复选框选择 ARC 内存管理。指定你希望项目在文件系统中创建的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消选中\
    \ **Source Control** 复选框，然后点击 **Create** 按钮。\n\n接下来，你将创建对象图的类层次结构。先从基类开始，然后依次实现其余子类。从\
    \ Xcode 文件菜单中选择 **New ![image](images/arrow.jpg) File . . .**，选择 **Objective-C**\
    \ 类模板，并将类命名为 **Order**。选择 **ArchiveCat** 文件夹作为文件位置，选择 **ArchiveCat** 项目作为目标，然后点击\
    \ **Create** 按钮。接着，在 Xcode 项目导航器窗格中，选择生成的标题文件 **Order.h** 并更新接口，如 [Listing 12-9](#9781430250500_Ch12.xhtml#list9)\
    \ 所示。\n\n[*Listing 12-9.*](#9781430250500_Ch12.xhtml#_list9) Order 接口\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Order : NSObject <NSCoding>\n\n\
    @property (readonly) NSString *order;\n\n- (id)initWithOrder:(NSString *)order;\n\
    \n@end\n```\n\n`Order`接口采用了`NSCoding`协议，这是支持归档的类所必需的。只读属性`order`标识生物学分类中的目组。`initWithOrder:`方法初始化一个`Order`对象，将该属性设置为输入参数值。现在选择\
    \ **Order.m** 文件并更新实现，如 [Listing 12-10](#9781430250500_Ch12.xhtml#list10) 所示。\n\
    \n[*Listing 12-10.*](#9781430250500_Ch12.xhtml#_list10) Order 实现\n\n```\n#import\
    \ \"Order.h\"\n\n@implementation Order\n\n- (id)initWithOrder:(NSString *)order\n\
    {\n  if ((self = [super init]))\n  {\n    _order = order;\n  }\n\nreturn self;\n\
    }\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super init]))\n \
    \ {\n    _order = [coder decodeObjectForKey:@\"ORDER_KEY\"];\n  }\n  return self;\n\
    }\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [coder encodeObject:self.order\
    \ forKey:@\"ORDER_KEY\"];\n}\n\n- (NSString *) description\n{\n  return [NSString\
    \ stringWithFormat:@\"Order:%@\", self.order];\n}\n\n@end\n```\n\n`initWithOrder:`的实现与你本书其他部分开发的`init`方法非常相似。它只是将`order`输入参数赋值给`order`属性的后备实例变量。\n\
    \n`initWithCoder:`方法由`NSCoding`协议声明，它使用归档状态初始化对象。其输入参数`coder`是用于解码`Order`实例归档的`NSCoder`实例。`Order`的父类是`NSObject`；由于`NSObject`没有采用`NSCoding`协议，`self`变量被赋值为父类`init`调用的返回值。\n\
    \n```\nself = [super init]\n```\n\n接下来，`Order`类的状态（由其属性和实例变量表示）被解码和初始化。由于`Order`类有一个名为`order`的属性，该属性的实例变量被赋值为`decodeObjectForKey:`方法解码的值，其中键名为`ORDER_KEY`。"
  raw: 'The `format:` parameter specifies the property list format, of type enum `NSPropertyListFormat`.
    The allowed values are as follows:


    *   `NSPropertyListOpenStepFormat`: Legacy ASCII property list format.

    *   `NSPropertyListXMLFormat_v1_0`: XML property list format.

    *   `NSPropertyListBinaryFormat_v1_0`: Binary property list format.


    The `options:` parameter is meant to specify the selected property list write
    option. This parameter is currently unused and should be set to 0\. If the method
    does not complete successfully, an `NSError` object is returned in the `error:`
    parameter that describes the error condition. [Listing 12-8](#9781430250500_Ch12.xhtml#list8)
    demonstrates use of the `propertyListWithData:options:format:error:` method to
    deserialize a property list from the `plistData` data buffer of [Listing 12-7](#9781430250500_Ch12.xhtml#list7).


    [*Listing 12-8.*](#9781430250500_Ch12.xhtml#_list8)  Property List Deserialization


    ```

    NSError *errorStr;

    NSDictionary *plist = [NSPropertyListSerialization

                           propertyListWithData:plistData

                           options:NSPropertyListImmutable

                           format:NULL

                           error:&errorStr];

    ```


    The `options:` parameter specifies the property list read option. This value can
    be any of those for the enum type `NSPropertyListMutabilityOptions`. The possible
    values are as follows:


    *   `NSPropertyListImmutable`: The returned property list contains immutable objects.

    *   `NSPropertyListMutableContainers`: The returned property list has mutable
    containers but immutable leaves.

    *   `NSPropertyListMutableContainersAndLeaves`: The returned property list has
    mutable containers and mutable leaves.


    The `format:` parameter contains the format that the property list was stored
    in. If the value `NULL` is provided, then it is not necessary to know the format.
    The possible non-`NULL` values for the format are of enum type `NSPropertyListFormat`.


    Property list serialization does not preserve the full class identity of its objects,
    only its general kind. In other words, a property list object may be any of the
    preceding supported types. When a collection class is stored as a property list,
    its elements must also be in the list of supported property list data types. In
    addition, the keys for `NSDictionary` property list objects must be of type string
    (`NSString`). As a result, if a property list is serialized and then deserialized,
    the objects in the resulting property list might not be of the same class as the
    objects in the original property list. In particular, when a property list is
    serialized, the mutability of the container objects (i.e., `NSDictionary` and
    `NSArray` objects) is not preserved. When deserializing, though, you can choose
    to have all container objects created mutable or immutable.


    Property list serialization also does not track the presence of objects referenced
    multiple times. Each reference to an object within the property list is serialized
    separately, resulting in multiple instances when deserialized.


    Archiving an Object Graph


    OK, now that you have a good handle on the archiving and serialization classes,
    you’re going to create a program that demonstrates use of the Foundation Framework
    Archiving APIs. This program will create an object graph from a class hierarchy
    and then encode and decode the object graph from an archive. The classes that
    you’ll develop are diagrammed in [Figure 12-1](#9781430250500_Ch12.xhtml#Fig1).


    ![9781430250500_Fig12-01.jpg](images/9781430250500_Fig12-01.jpg)


    [Figure 12-1](#9781430250500_Ch12.xhtml#_Fig1). ArchiveCat program class hierarchy


    As shown in [Figure 12-1](#9781430250500_Ch12.xhtml#Fig1), the program consists
    of a class hierarchy (the `Subfamily`-`Family`-`Order` classes) and a class (`Archiver`)
    that’s used to archive instances of this hierarchy. In Xcode, create a new project
    by selecting **New ![image](images/arrow.jpg) Project . . .** from the Xcode File
    menu. In the **New Project Assistant** pane, create a command-line application.
    In the **Project Options** window, specify **ArchiveCat** for the Product Name,
    choose **Foundation** for the Project Type, and select ARC memory management by
    selecting the **Use Automatic Reference Counting** check box. Specify the location
    in your file system where you want the project to be created (if necessary, select
    **New Folder** and enter the name and location for the folder), uncheck the **Source
    Control** check box, and then click the **Create** button.


    Next, you’re going to create the class hierarchy for the object graph. You’ll
    start with the base class and then successively implement the remaining subclasses.
    Select **New ![image](images/arrow.jpg) File . . .** from the Xcode File menu,
    select the **Objective-C** class template, and name the class **Order**. Select
    the **ArchiveCat** folder for the files location and the **ArchiveCat** project
    as the target, and then click the **Create** button. Next, in the Xcode project
    navigator pane, select the resulting header file named **Order.h** and update
    the interface, as shown in [Listing 12-9](#9781430250500_Ch12.xhtml#list9).


    [*Listing 12-9.*](#9781430250500_Ch12.xhtml#_list9)  Order Interface


    ```

    #import <Foundation/Foundation.h>


    @interface Order : NSObject <NSCoding>


    @property (readonly) NSString *order;


    - (id)initWithOrder:(NSString *)order;


    @end

    ```


    The `Order` interface adopts the `NSCoding` protocol, as required for classes
    that support archiving. The read-only property `order` identifies the order group
    in biological classification. The `initWithOrder:` method initializes an `Order`
    object, setting the property to the input parameter value. Now select the **Order.m**
    file and update the implementation, as shown in [Listing 12-10](#9781430250500_Ch12.xhtml#list10).


    [*Listing 12-10.*](#9781430250500_Ch12.xhtml#_list10)  Order Implementation


    ```

    #import "Order.h"


    @implementation Order


    - (id)initWithOrder:(NSString *)order

    {

      if ((self = [super init]))

      {

        _order = order;

      }


    return self;

    }


    - (id)initWithCoder:(NSCoder *)coder

    {

      if ((self = [super init]))

      {

        _order = [coder decodeObjectForKey:@"ORDER_KEY"];

      }

      return self;

    }


    - (void)encodeWithCoder:(NSCoder *)coder

    {

      [coder encodeObject:self.order forKey:@"ORDER_KEY"];

    }


    - (NSString *) description

    {

      return [NSString stringWithFormat:@"Order:%@", self.order];

    }


    @end

    ```


    The `initWithOrder:` implementation is very similar to `init` methods you’ve developed
    elsewhere in this book. It simply assigns the `order` input parameter to the order
    property’s backing instance variable.


    The `initWithCoder:` method, declared by the `NSCoding` protocol, initializes
    the object using the archived state. Its input parameter, `coder`, is the `NSCoder`
    instance used to decode the `Order` instance archive. The superclass of `Order`
    is `NSObject`; because `NSObject` doesn’t adopt the `NSCoding` protocol, the `self`
    variable is assigned the returned value of the superclass `init` call.


    ```

    self = [super init]

    ```


    Next, the `Order` class state (represented by its properties and instance variables)
    is decoded and initialized. As the `Order` class has a single property named `order`,
    the property’s instance variable is assigned to the value decoded by the `decodeObjectForKey:`
    method, where the key is named `ORDER_KEY`.'
  trans: "\n`format:`参数指定属性列表格式，类型为枚举`NSPropertyListFormat`。允许的值如下：\n\n- `NSPropertyListOpenStepFormat`：传统\
    \ ASCII 属性列表格式。\n- `NSPropertyListXMLFormat_v1_0`：XML 属性列表格式。\n- `NSPropertyListBinaryFormat_v1_0`：二进制属性列表格式。\n\
    \n`options:`参数用于指定选定的属性列表写入选项。此参数目前未使用，应设置为 0。如果该方法未成功完成，则会在`error:`参数中返回一个`NSError`对象，用于描述错误情况。Listing\
    \ 12-8 演示了如何使用`propertyListWithData:options:format:error:`方法从 Listing 12-7 的`plistData`数据缓冲区反序列化属性列表。\n\
    \n*Listing 12-8.* 属性列表反序列化\n\n```\nNSError *errorStr;\nNSDictionary *plist = [NSPropertyListSerialization\n\
    \                       propertyListWithData:plistData\n                     \
    \  options:NSPropertyListImmutable\n                       format:NULL\n     \
    \                  error:&errorStr];\n```\n\n`options:`参数指定属性列表读取选项。此值可以是枚举类型`NSPropertyListMutabilityOptions`中的任意值。可能的值如下：\n\
    \n- `NSPropertyListImmutable`：返回的属性列表包含不可变对象。\n- `NSPropertyListMutableContainers`：返回的属性列表具有可变容器，但叶子节点不可变。\n\
    - `NSPropertyListMutableContainersAndLeaves`：返回的属性列表具有可变容器和可变叶子节点。\n\n`format:`参数包含属性列表存储的格式。如果提供值`NULL`，则无需知道格式。格式可能的非`NULL`值属于枚举类型`NSPropertyListFormat`。\n\
    \n属性列表序列化不会保留对象的完整类标识，仅保留其一般类型。换句话说，属性列表对象可以是前述任何支持的类型。当集合类作为属性列表存储时，其元素也必须在支持的属性列表数据类型列表中。此外，`NSDictionary`属性列表对象的键必须是字符串类型（`NSString`）。因此，如果对属性列表进行序列化然后再反序列化，结果属性列表中的对象可能与原始属性列表中的对象不属于同一类。特别地，当属性列表被序列化时，容器对象（即`NSDictionary`和`NSArray`对象）的可变性不会被保留。然而，在反序列化时，你可以选择将所有容器对象创建为可变或不可变。\n\
    \n属性列表序列化也不会追踪多次引用的对象。属性列表中对某个对象的每个引用都会分别进行序列化，导致反序列化时产生多个实例。\n\n归档对象图\n\n好了，现在你已经对归档和序列化类有了很好的了解，接下来将创建一个程序来演示\
    \ Foundation 框架归档 API 的使用。该程序将从类层次结构创建一个对象图，然后对对象图进行编码和解码。你将开发的类在图 12-1 中进行了说明。\n\
    \n![9781430250500_Fig12-01.jpg](img/9781430250500_Fig12-01.jpg)\n\n图 12-1. ArchiveCat\
    \ 程序类层次结构\n\n如图 12-1 所示，该程序包含一个类层次结构（`Subfamily`-`Family`-`Order`类）和一个用于归档此类层次结构实例的类（`Archiver`）。在\
    \ Xcode 中，通过从 Xcode 文件菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建新项目。在\
    \ **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，将产品名称指定为\
    \ **ArchiveCat**，选择 **Foundation** 作为项目类型，并通过选中 **Use Automatic Reference Counting**\
    \ 复选框选择 ARC 内存管理。指定你希望项目在文件系统中创建的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消选中\
    \ **Source Control** 复选框，然后点击 **Create** 按钮。\n\n接下来，你将创建对象图的类层次结构。先从基类开始，然后依次实现其余子类。从\
    \ Xcode 文件菜单中选择 **New ![image](img/arrow.jpg) File . . .**，选择 **Objective-C**\
    \ 类模板，并将类命名为 **Order**。选择 **ArchiveCat** 文件夹作为文件位置，选择 **ArchiveCat** 项目作为目标，然后点击\
    \ **Create** 按钮。接着，在 Xcode 项目导航器窗格中，选择生成的标题文件 **Order.h** 并更新接口，如 Listing 12-9\
    \ 所示。\n\n*Listing 12-9.* Order 接口\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @interface Order : NSObject <NSCoding>\n\n@property (readonly) NSString *order;\n\
    \n- (id)initWithOrder:(NSString *)order;\n\n@end\n```\n\n`Order`接口采用了`NSCoding`协议，这是支持归档的类所必需的。只读属性`order`标识生物学分类中的目组。`initWithOrder:`方法初始化一个`Order`对象，将该属性设置为输入参数值。现在选择\
    \ **Order.m** 文件并更新实现，如 Listing 12-10 所示。\n\n*Listing 12-10.* Order 实现\n\n```\n\
    #import \"Order.h\"\n\n@implementation Order\n\n- (id)initWithOrder:(NSString\
    \ *)order\n{\n  if ((self = [super init]))\n  {\n    _order = order;\n  }\n\n\
    return self;\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super\
    \ init]))\n  {\n    _order = [coder decodeObjectForKey:@\"ORDER_KEY\"];\n  }\n\
    \  return self;\n}\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [coder encodeObject:self.order\
    \ forKey:@\"ORDER_KEY\"];\n}\n\n- (NSString *) description\n{\n  return [NSString\
    \ stringWithFormat:@\"Order:%@\", self.order];\n}\n\n@end\n```\n\n`initWithOrder:`的实现与你本书其他部分开发的`init`方法非常相似。它只是将`order`输入参数赋值给`order`属性的后备实例变量。\n\
    \n`initWithCoder:`方法由`NSCoding`协议声明，它使用归档状态初始化对象。其输入参数`coder`是用于解码`Order`实例归档的`NSCoder`实例。`Order`的父类是`NSObject`；由于`NSObject`没有采用`NSCoding`协议，`self`变量被赋值为父类`init`调用的返回值。\n\
    \n```\nself = [super init]\n```\n\n接下来，`Order`类的状态（由其属性和实例变量表示）被解码和初始化。由于`Order`类有一个名为`order`的属性，该属性的实例变量被赋值为`decodeObjectForKey:`方法解码的值，其中键名为`ORDER_KEY`。\n"
- fmt: "`encodeWithCoder:` 方法用于归档 `Order` 类的状态，其输入参数 `coder` 是用于编码 `Order` 实例归档的 `NSCoder`\
    \ 实例。由于 `Order` 的父类未采用 `NSCoding` 协议，此方法不会调用父类的 `encodeWithCoder:` 方法，仅编码 `Order`\
    \ 类的状态。具体而言，该方法为每个需要归档的属性/变量调用编码器上的 `encodeWithCoder:` 方法。\n\n```\n[coder encodeObject:self.order\
    \ forKey:@\"ORDER_KEY\"];\n```\n\n最后，该类重写了（继承自父类的）`description` 方法，返回一个列出 `order`\
    \ 属性值的文本字符串。\n\n现在您将实现层级结构中的下一个类。从 Xcode 的 File 菜单中选择 **New ![image](images/arrow.jpg)\
    \ File . . .**，选择 **Objective-C** 类模板，并将类命名为 **Family**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat**\
    \ 项目作为目标，然后点击 **Create** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Family.h**，并更新接口，如\
    \ [清单 12-11](#9781430250500_Ch12.xhtml#list11) 所示。\n\n[*Listing 12-11.*](#9781430250500_Ch12.xhtml#_list11)  Family\
    \ Interface\n\n```\n#import \"Order.h\"\n\n@interface Family : Order\n\n@property(readonly)\
    \ NSString *family;\n\n- (id)initWithFamily:(NSString *)family order:(NSString\
    \ *)order;\n\n@end\n```\n\n`Family` 接口继承自 `Order` 类，因此采用了 `NSCoding` 协议。只读属性 `family`\
    \ 指定了生物分类中的科属分组。`initWithFamily:order:` 方法初始化一个 `Family` 对象，将 `family` 和 `order`\
    \ 属性设置为提供的输入参数值。现在选择 **Family.m** 文件并更新实现，如 [清单 12-12](#9781430250500_Ch12.xhtml#list12)\
    \ 所示。\n\n[*Listing 12-12.*](#9781430250500_Ch12.xhtml#_list12)  Family Implementation\n\
    \n```\n#import \"Family.h\"\n\n@implementation Family\n\n- (id)initWithFamily:(NSString\
    \ *)family order:(NSString *)order\n{\n  if ((self = [super initWithOrder:order]))\n\
    \  {\n    _family = family;\n  }\n\nreturn self;\n}\n\n- (id)initWithCoder:(NSCoder\
    \ *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n  {\n    _family =\
    \ [coder decodeObjectForKey:@\"FAMILY_KEY\"];\n  }\n  return self;\n}\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n  [super encodeWithCoder:coder];\n  [coder encodeObject:self.family\
    \ forKey:@\"FAMILY_KEY\"];\n}\n\n- (NSString *) description\n{\n  return [NSString\
    \ stringWithFormat:@\"Family:%@, %@\", self.family,\n          [super description]];\n\
    }\n\n@end\n```\n\n此实现与 `Order` 类非常相似，因此您只需关注关键差异。`initWithFamily:order:` 调用父类\
    \ `initWithOrder:` 方法以正确初始化父类状态，然后将 `family` 输入参数赋值给属性的后备实例变量。\n\n`initWithCoder:`\
    \ 方法与为 `Order` 类提供的方法（如 [清单 12-10](#9781430250500_Ch12.xhtml#list10) 所示）非常相似。然而，由于\
    \ `Family` 类的父类（`Order`）采用了 `NSCoding` 协议，`self` 变量被赋值为父类 `initWithCoder:` 调用的返回值。\n\
    \n```\nself = [super initWithCoder:coder]\n```\n\n通过这种方式，父类状态（`order` 属性）被正确初始化。接下来，`Family`\
    \ 类的状态（由其属性和实例变量表示）被解码并初始化。由于 `Family` 类只有一个名为 `family` 的属性，该属性的实例变量被赋值为编码器的 `decodeObjectForKey:`\
    \ 方法解码后的值，其中键名为 `FAMILY_KEY`。\n\n`encodeWithCoder:` 方法用于归档 `Family` 类的状态。因为 `Family`\
    \ 的父类（`Order` 类）采用了 `NSCoding` 协议，此方法首先调用父类的 `encodeWithCoder:` 方法。接着，它为每个需要归档的属性/变量调用编码器上的\
    \ `encodeWithCoder:` 方法；在本例中，即 `family` 属性。\n\n与 `Order` 类一样，`description` 方法返回一个文本字符串，由\
    \ `family` 属性值与其父类的描述值拼接而成。\n\n```\nreturn [NSString stringWithFormat:@\"Family:%@,\
    \ %@\", self.family,\n        [super description]];\n```\n\n现在您将实现层级结构中的最后一个类。从\
    \ Xcode 的 File 菜单中选择 **New ![image](images/arrow.jpg) File . . .**，选择 **Objective-C**\
    \ 类模板，并将类命名为 **Subfamily**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat** 项目作为目标，然后点击\
    \ **Create** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Subfamily.h**，并更新接口，如 [清单 12-13](#9781430250500_Ch12.xhtml#list13)\
    \ 所示。\n\n[*Listing 12-13.*](#9781430250500_Ch12.xhtml#_list13)  Subfamily Interface\n\
    \n```\n#import \"Family.h\"\n\n@interface Subfamily : Family\n\n@property(readonly)\
    \ NSString *genus;\n@property(readonly) NSString *species;\n\n- (id)initWithSpecies:(NSString\
    \ *)species\n             genus:(NSString *)genus\n            family:(NSString\
    \ *)family\n             order:(NSString *)order;\n\n@end\n```\n\n`Subfamily`\
    \ 接口继承自 `Family` 类。只读属性 `genus` 和 `species` 指定了生物分类中动物群的属和种。`initWithSpecies:family:order:`\
    \ 方法初始化一个 `Subfamily` 对象，类似于 `Family` 和 `Order` 类的对应方法。现在选择 **Subfamily.m** 文件并更新实现，如\
    \ [清单 12-14](#9781430250500_Ch12.xhtml#list14) 所示。\n\n[*Listing 12-14.*](#9781430250500_Ch12.xhtml#_list14)  Subfamily\
    \ Implementation\n\n```\n#import \"Subfamily.h\"\n\n@implementation Subfamily\n\
    \n- (id)initWithSpecies:(NSString *)species\n             genus:(NSString *)genus\n\
    \            family:(NSString *)family\n             order:(NSString *)order\n\
    {\n  if ((self = [super initWithFamily:family order:order]))\n  {\n    _species\
    \ = species;\n    _genus = genus;\n  }\n\nreturn self;\n}\n\n- (id)initWithCoder:(NSCoder\
    \ *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n  {\n    _species =\
    \ [coder decodeObjectForKey:@\"SPECIES_KEY\"];\n    _genus = [coder decodeObjectForKey:@\"\
    GENUS_KEY\"];\n  }\n  return self;\n}\n\n- (void)encodeWithCoder:(NSCoder *)coder\n\
    {\n  [super encodeWithCoder:coder];\n  [coder encodeObject:self.species forKey:@\"\
    SPECIES_KEY\"];\n  [coder encodeObject:self.genus forKey:@\"GENUS_KEY\"];\n}\n\
    \n- (NSString *) description\n{\n  return [NSString stringWithFormat:@\"Animal\
    \ - Species:%@ Genus:%@, %@\",\n          self.species, self.genus, [super description]];\n\
    }\n\n@end\n```\n\n此实现与 `Family` 类非常相似，主要区别在于 `Subfamily` 类的状态（`genus` 和 `species`\
    \ 属性）。在其他所有方面，逻辑都是相同的，您可以比较 [清单 12-12](#9781430250500_Ch12.xhtml#list12) 和 [清单\
    \ 12-14](#9781430250500_Ch12.xhtml#list14) 来验证。现在您将实现用于归档该层级结构的类。从 Xcode 的 File\
    \ 菜单中选择 **New ![image](images/arrow.jpg) File . . .**，选择 **Objective-C** 类模板，并将类命名为\
    \ **Archiver**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat** 项目作为目标，然后点击 **Create**\
    \ 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Archiver.h**，并更新接口，如 [清单 12-15](#9781430250500_Ch12.xhtml#list15)\
    \ 所示。\n\n[*Listing 12-15.*](#9781430250500_Ch12.xhtml#_list15)  Archiver Interface"
  raw: 'The `encodeWithCoder:` method is used to archive the `Order` class state,
    its input parameter, `coder`, is the `NSCoder` instance used to encode the `Order`
    instance archive. Because the superclass of `Order` doesn’t adopt the `NSCoding`
    protocol, this method doesn’t invoke the superclass’s `encodeWithCoder:` method,
    but just encodes the `Order` class state. Specifically, the method invokes the
    `encodeWithCoder:` method on the coder for each property/variable that needs to
    be archived.


    ```

    [coder encodeObject:self.order forKey:@"ORDER_KEY"];

    ```


    Finally, the class overrides the description method (inherited from its superclass)
    to return a text string listing the value for the order property.


    Now you’ll implement the next class in the hierarchy. Select **New ![image](images/arrow.jpg)
    File . . .** from the Xcode File menu, select the **Objective-C** class template,
    and name the class **Family**. Select the **ArchiveCat** folder for the files
    location and the **ArchiveCat** project as the target, and then click the **Create**
    button. Next, in the Xcode project navigator pane, select the resulting header
    file named **Family.h** and update the interface, as shown in [Listing 12-11](#9781430250500_Ch12.xhtml#list11).


    [*Listing 12-11.*](#9781430250500_Ch12.xhtml#_list11)  Family Interface


    ```

    #import "Order.h"


    @interface Family : Order


    @property(readonly) NSString *family;


    - (id)initWithFamily:(NSString *)family order:(NSString *)order;


    @end

    ```


    The `Family` interface subclasses the `Order` class, and hence adopts the `NSCoding`
    protocol. The read-only property `family` specifies the family group in a biological
    classification. The `initWithFamily:order:` method initializes a `Family` object,
    setting the family and order properties to the input parameter values provided.
    Now select the **Family.m** file and update the implementation, as shown in [Listing
    12-12](#9781430250500_Ch12.xhtml#list12).


    [*Listing 12-12.*](#9781430250500_Ch12.xhtml#_list12)  Family Implementation


    ```

    #import "Family.h"


    @implementation Family


    - (id)initWithFamily:(NSString *)family order:(NSString *)order

    {

      if ((self = [super initWithOrder:order]))

      {

        _family = family;

      }


    return self;

    }


    - (id)initWithCoder:(NSCoder *)coder

    {

      if ((self = [super initWithCoder:coder]))

      {

        _family = [coder decodeObjectForKey:@"FAMILY_KEY"];

      }

      return self;

    }


    - (void)encodeWithCoder:(NSCoder *)coder

    {

      [super encodeWithCoder:coder];

      [coder encodeObject:self.family forKey:@"FAMILY_KEY"];

    }


    - (NSString *) description

    {

      return [NSString stringWithFormat:@"Family:%@, %@", self.family,

              [super description]];

    }


    @end

    ```


    This implementation is very similar to that of the `Order` class, so you’ll just
    focus on the key differences. The `initWithFamily:order:` invokes the superclass
    `initWithOrder:` method to initialize the superclass state properly, and then
    assigns the `family` input parameter to the property’s backing instance variable.


    The `initWithCoder:` method is very similar to that provided for the `Order` class
    (as shown in [Listing 12-10](#9781430250500_Ch12.xhtml#list10)). However, as the
    superclass of the `Family` class (`Order`) adopts the `NSCoding` protocol, the
    *self* variable is assigned the returned value of the superclass `initWithCoder:`
    call.


    ```

    self = [super initWithCoder:coder]

    ```


    In this way, the superclass state (the `order` property) is initialized properly.
    Next, the `Family` class state (represented by its properties and instance variables)
    is decoded and initialized. As the `Family` class has a single property named
    `family`, the property’s instance variable is assigned to the value decoded by
    the coder’s `decodeObjectForKey:` method, where the key is named `FAMILY_KEY`.


    The `encodeWithCoder:` method is used to archive the `Family` class state. Because
    the superclass of `Family` (the `Order` class) adopts the `NSCoding` protocol,
    this method first invokes invoke the superclass’s `encodeWithCoder:` method. Next,
    it invokes the `encodeWithCoder:` method on the coder for each property/variable
    that needs to be archived; in this case, the `family` property.


    As with the `Order` class, the `description` method returns a text string consisting
    of the value of the `family` property concatenated with the value of the description
    for its superclass.


    ```

    return [NSString stringWithFormat:@"Family:%@, %@", self.family,

            [super description]];

    ```


    Now you’ll implement the final class in the hierarchy. Select **New ![image](images/arrow.jpg)
    File . . .** from the Xcode File menu, select the **Objective-C** class template,
    and name the class **Subfamily**. Select the **ArchiveCat** folder for the files
    location and the **ArchiveCat** project as the target, and then click the **Create**
    button. Next, in the Xcode project navigator pane, select the resulting header
    file named **Subfamily.h** and update the interface, as shown in [Listing 12-13](#9781430250500_Ch12.xhtml#list13).


    [*Listing 12-13.*](#9781430250500_Ch12.xhtml#_list13)  Subfamily Interface


    ```

    #import "Family.h"


    @interface Subfamily : Family


    @property(readonly) NSString *genus;

    @property(readonly) NSString *species;


    - (id)initWithSpecies:(NSString *)species

                 genus:(NSString *)genus

                family:(NSString *)family

                 order:(NSString *)order;


    @end

    ```


    The `Subfamily` interface subclasses the `Family` class. The read-only properties
    `genus` and `species` specifies the genus and species for an animal group in a
    biological classification. The `initWithSpecies:family:order:` method initializes
    a `Subfamily` object, similar to the corresponding methods for the `Family` and
    `Order` classes. Now select the **Subfamily.m** file and update the implementation,
    as shown in [Listing 12-14](#9781430250500_Ch12.xhtml#list14).


    [*Listing 12-14.*](#9781430250500_Ch12.xhtml#_list14)  Subfamily Implementation


    ```

    #import "Subfamily.h"


    @implementation Subfamily


    - (id)initWithSpecies:(NSString *)species

                 genus:(NSString *)genus

                family:(NSString *)family

                 order:(NSString *)order

    {

      if ((self = [super initWithFamily:family order:order]))

      {

        _species = species;

        _genus = genus;

      }


    return self;

    }


    - (id)initWithCoder:(NSCoder *)coder

    {

      if ((self = [super initWithCoder:coder]))

      {

        _species = [coder decodeObjectForKey:@"SPECIES_KEY"];

        _genus = [coder decodeObjectForKey:@"GENUS_KEY"];

      }

      return self;

    }


    - (void)encodeWithCoder:(NSCoder *)coder

    {

      [super encodeWithCoder:coder];

      [coder encodeObject:self.species forKey:@"SPECIES_KEY"];

      [coder encodeObject:self.genus forKey:@"GENUS_KEY"];

    }


    - (NSString *) description

    {

      return [NSString stringWithFormat:@"Animal - Species:%@ Genus:%@, %@",

              self.species, self.genus, [super description]];

    }


    @end

    ```


    This implementation is very similar to that of the `Family` class, differing primarily
    in the `Subfamily` class state (the `genus` and `species` properties). In all
    other respects, the logic is identical, as you’ll see if you compare [Listing
    12-12](#9781430250500_Ch12.xhtml#list12) and [Listing 12-14](#9781430250500_Ch12.xhtml#list14).
    Now you’ll implement the class used to archive the hierarchy. Select **New ![image](images/arrow.jpg)
    File . . .** from the Xcode File menu, select the **Objective-C** class template,
    and name the class **Archiver**. Select the **ArchiveCat** folder for the files
    location and the **ArchiveCat** project as the target, and then click the **Create**
    button. Next, in the Xcode project navigator pane, select the resulting header
    file named **Archiver.h** and update the interface, as shown in [Listing 12-15](#9781430250500_Ch12.xhtml#list15).


    [*Listing 12-15.*](#9781430250500_Ch12.xhtml#_list15)  Archiver Interface'
  trans: "\n`encodeWithCoder:` 方法用于归档 `Order` 类的状态，其输入参数 `coder` 是用于编码 `Order` 实例归档的\
    \ `NSCoder` 实例。由于 `Order` 的父类未采用 `NSCoding` 协议，此方法不会调用父类的 `encodeWithCoder:` 方法，仅编码\
    \ `Order` 类的状态。具体而言，该方法为每个需要归档的属性/变量调用编码器上的 `encodeWithCoder:` 方法。\n\n```\n[coder\
    \ encodeObject:self.order forKey:@\"ORDER_KEY\"];\n```\n\n最后，该类重写了（继承自父类的）`description`\
    \ 方法，返回一个列出 `order` 属性值的文本字符串。\n\n现在您将实现层级结构中的下一个类。从 Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg)\
    \ 文件 . . .**，选择 **Objective-C** 类模板，并将类命名为 **Family**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat**\
    \ 项目作为目标，然后点击 **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Family.h**，并更新接口，如 清单\
    \ 12-11 所示。\n\n*清单 12-11.*  Family 接口\n\n```\n#import \"Order.h\"\n\n@interface\
    \ Family : Order\n\n@property(readonly) NSString *family;\n\n- (id)initWithFamily:(NSString\
    \ *)family order:(NSString *)order;\n\n@end\n```\n\n`Family` 接口继承自 `Order` 类，因此采用了\
    \ `NSCoding` 协议。只读属性 `family` 指定了生物分类中的科属分组。`initWithFamily:order:` 方法初始化一个 `Family`\
    \ 对象，将 `family` 和 `order` 属性设置为提供的输入参数值。现在选择 **Family.m** 文件并更新实现，如 清单 12-12 所示。\n\
    \n*清单 12-12.*  Family 实现\n\n```\n#import \"Family.h\"\n\n@implementation Family\n\
    \n- (id)initWithFamily:(NSString *)family order:(NSString *)order\n{\n  if ((self\
    \ = [super initWithOrder:order]))\n  {\n    _family = family;\n  }\n\nreturn self;\n\
    }\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n\
    \  {\n    _family = [coder decodeObjectForKey:@\"FAMILY_KEY\"];\n  }\n  return\
    \ self;\n}\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [super encodeWithCoder:coder];\n\
    \  [coder encodeObject:self.family forKey:@\"FAMILY_KEY\"];\n}\n\n- (NSString\
    \ *) description\n{\n  return [NSString stringWithFormat:@\"Family:%@, %@\", self.family,\n\
    \          [super description]];\n}\n\n@end\n```\n\n此实现与 `Order` 类非常相似，因此您只需关注关键差异。`initWithFamily:order:`\
    \ 调用父类 `initWithOrder:` 方法以正确初始化父类状态，然后将 `family` 输入参数赋值给属性的后备实例变量。\n\n`initWithCoder:`\
    \ 方法与为 `Order` 类提供的方法（如 清单 12-10 所示）非常相似。然而，由于 `Family` 类的父类（`Order`）采用了 `NSCoding`\
    \ 协议，`self` 变量被赋值为父类 `initWithCoder:` 调用的返回值。\n\n```\nself = [super initWithCoder:coder]\n\
    ```\n\n通过这种方式，父类状态（`order` 属性）被正确初始化。接下来，`Family` 类的状态（由其属性和实例变量表示）被解码并初始化。由于\
    \ `Family` 类只有一个名为 `family` 的属性，该属性的实例变量被赋值为编码器的 `decodeObjectForKey:` 方法解码后的值，其中键名为\
    \ `FAMILY_KEY`。\n\n`encodeWithCoder:` 方法用于归档 `Family` 类的状态。因为 `Family` 的父类（`Order`\
    \ 类）采用了 `NSCoding` 协议，此方法首先调用父类的 `encodeWithCoder:` 方法。接着，它为每个需要归档的属性/变量调用编码器上的\
    \ `encodeWithCoder:` 方法；在本例中，即 `family` 属性。\n\n与 `Order` 类一样，`description` 方法返回一个文本字符串，由\
    \ `family` 属性值与其父类的描述值拼接而成。\n\n```\nreturn [NSString stringWithFormat:@\"Family:%@,\
    \ %@\", self.family,\n        [super description]];\n```\n\n现在您将实现层级结构中的最后一个类。从\
    \ Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg) 文件 . . .**，选择 **Objective-C**\
    \ 类模板，并将类命名为 **Subfamily**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat** 项目作为目标，然后点击\
    \ **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Subfamily.h**，并更新接口，如 清单 12-13 所示。\n\
    \n*清单 12-13.*  Subfamily 接口\n\n```\n#import \"Family.h\"\n\n@interface Subfamily\
    \ : Family\n\n@property(readonly) NSString *genus;\n@property(readonly) NSString\
    \ *species;\n\n- (id)initWithSpecies:(NSString *)species\n             genus:(NSString\
    \ *)genus\n            family:(NSString *)family\n             order:(NSString\
    \ *)order;\n\n@end\n```\n\n`Subfamily` 接口继承自 `Family` 类。只读属性 `genus` 和 `species`\
    \ 指定了生物分类中动物群的属和种。`initWithSpecies:family:order:` 方法初始化一个 `Subfamily` 对象，类似于 `Family`\
    \ 和 `Order` 类的对应方法。现在选择 **Subfamily.m** 文件并更新实现，如 清单 12-14 所示。\n\n*清单 12-14.*  Subfamily\
    \ 实现\n\n```\n#import \"Subfamily.h\"\n\n@implementation Subfamily\n\n- (id)initWithSpecies:(NSString\
    \ *)species\n             genus:(NSString *)genus\n            family:(NSString\
    \ *)family\n             order:(NSString *)order\n{\n  if ((self = [super initWithFamily:family\
    \ order:order]))\n  {\n    _species = species;\n    _genus = genus;\n  }\n\nreturn\
    \ self;\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n\
    \  {\n    _species = [coder decodeObjectForKey:@\"SPECIES_KEY\"];\n    _genus\
    \ = [coder decodeObjectForKey:@\"GENUS_KEY\"];\n  }\n  return self;\n}\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n  [super encodeWithCoder:coder];\n  [coder encodeObject:self.species\
    \ forKey:@\"SPECIES_KEY\"];\n  [coder encodeObject:self.genus forKey:@\"GENUS_KEY\"\
    ];\n}\n\n- (NSString *) description\n{\n  return [NSString stringWithFormat:@\"\
    Animal - Species:%@ Genus:%@, %@\",\n          self.species, self.genus, [super\
    \ description]];\n}\n\n@end\n```\n\n此实现与 `Family` 类非常相似，主要区别在于 `Subfamily` 类的状态（`genus`\
    \ 和 `species` 属性）。在其他所有方面，逻辑都是相同的，您可以比较 清单 12-12 和 清单 12-14 来验证。现在您将实现用于归档该层级结构的类。从\
    \ Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg) 文件 . . .**，选择 **Objective-C**\
    \ 类模板，并将类命名为 **Archiver**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat** 项目作为目标，然后点击\
    \ **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Archiver.h**，并更新接口，如 清单 12-15 所示。\n\
    \n*清单 12-15.*  Archiver 接口\n"
- fmt: "```objectivec\n#import <Foundation/Foundation.h>\n\n@interface Archiver :\
    \ NSObject\n\n@property (readwrite) NSString *path;\n\n- (BOOL) encodeArchive:(id)data\
    \ toFile:(NSString *)file;\n- (id) decodeArchiveFromFile:(NSString *) file;\n\n\
    @end\n```\n\n`Archiver`接口有一个名为`path`的属性，该属性定义了存档文件的写入路径。`encodeArchive:toFile:`和`decodeArchiveFromFile:`方法用于在文件系统中对存档进行编码/解码。现在选择`Archiver.m`文件并更新其实现，如[列表12-16](#9781430250500_Ch12.xhtml#list16)所示。\n\
    \n[*列表12-16.*](#9781430250500_Ch12.xhtml#_list16) `Archiver`实现\n\n```objectivec\n\
    #import \"Archiver.h\"\n\n@implementation Archiver\n\n- (id) init\n{\n  if ((self\
    \ = [super init]))\n  {\n    _path = NSTemporaryDirectory();\n  }\n\nreturn self;\n\
    }\n\n- (BOOL) encodeArchive:(id)objectGraph toFile:(NSString *)file\n{\n  NSString\
    \ *archivePath = [self.path stringByAppendingPathComponent:file];\n\n// 创建用于编码数据的归档器\n\
    \  NSMutableData *mdata = [[NSMutableData alloc] init];\n  NSKeyedArchiver *archiver\
    \ = [[NSKeyedArchiver alloc]\n                               initForWritingWithMutableData:mdata];\n\
    \n// 使用简单字符串作为键来编码数据\n  [archiver encodeObject:objectGraph forKey:@\"FELINE_KEY\"\
    ];\n  [archiver finishEncoding];\n\n// 将编码后的数据写入文件，并返回写入状态\n  BOOL result = [mdata\
    \ writeToFile:archivePath atomically:YES];\n  return result;\n}\n\n- (id) decodeArchiveFromFile:(NSString\
    \ *) file\n{\n  // 获取存档文件的路径\n  NSString *archivePath = [self.path stringByAppendingPathComponent:file];\n\
    \n// 创建用于解码数据的解档器\n  NSData *data = [[NSMutableData alloc] initWithContentsOfFile:archivePath];\n\
    \  NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver alloc]\n              \
    \                     initForReadingWithData:data];\n\n// 使用简单字符串作为键来解码数据\n  id\
    \ result = [unarchiver decodeObjectForKey:@\"FELINE_KEY\"];\n  [unarchiver finishDecoding];\n\
    \n// 返回解码后的数据\n  return result;\n}\n\n@end\n```\n\n如[列表12-16](#9781430250500_Ch12.xhtml#list16)所示，`init`方法设置了`path`属性的值。它使用Foundation框架中的`NSTemporaryDirectory()`函数创建指向用户临时目录的路径，并将该值赋给属性对应的实例变量。\n\
    \n`encodeArchive:toFile:`方法将对象图编码到文件中。它通过将`path`属性与输入的文件名拼接来创建文件路径，然后创建一个可变数据对象用于归档对象图。接着，它创建一个以该数据对象初始化的`NSKeyArchiver`实例来执行归档操作。它使用键`FELINE_KEY`将对象图编码到数据对象中，然后完成编码。最后，它将归档后的数据对象写入文件，并返回一个布尔值指示写入成功/失败。\n\
    \n`decodeArchiveFromFile:`方法从文件中解码存档，并返回初始化的对象图。它通过将`path`属性与输入的文件名拼接来创建文件路径，然后创建一个用于解档的数据对象。接着，它创建一个以该数据对象初始化的`NSKeyUnarchiver`实例来执行解档操作。它使用键`FELINE_KEY`将对象图解码到数据对象中，完成解码，然后返回初始化的对象图。\n\
    \n就是这样！现在你已经实现了类层次结构及归档类，接下来让我们用它来归档一个对象图。在Xcode项目导航器中，选择`main.m`文件并更新`main()`函数，如[列表12-17](#9781430250500_Ch12.xhtml#list17)所示。\n\
    \n[*列表12-17.*](#9781430250500_Ch12.xhtml#_list17) `ArchiveCat`的`main()`函数\n\n\
    ```objectivec\n#import <Foundation/Foundation.h>\n#import \"Archiver.h\"\n#import\
    \ \"Subfamily.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // 创建一个Archiver对象用于编码/解码对象图\n    Archiver *archiver = [[Archiver alloc]\
    \ init];\n\n// 创建一个对象图并将其归档到文件\n    id animal = [[Subfamily alloc] initWithSpecies:@\"\
    Lion\"\n                                             genus:@\"Panther\"\n    \
    \                                        family:@\"Felid\"\n                 \
    \                            order:@\"Carnivore\"];\n    NSLog(@\"\\n%@\", [animal\
    \ description]);\n    NSString *file = @\"data.archive\";\n\n// 显示结果\n    if ([archiver\
    \ encodeArchive:animal toFile:file])\n    {\n      NSLog(@\"You encoded an archive\
    \ to file %@\",\n            [[archiver path] stringByAppendingString:file]);\n\
    \    }\n\n// 从存档中解码对象图并记录其描述\n    id data = [archiver decodeArchiveFromFile:file];\n\
    \    if ([archiver decodeArchiveFromFile:file])\n    {\n      NSLog(@\"You decoded\
    \ an archive from file %@\\n%@\",\n            [[archiver path] stringByAppendingString:file],\
    \ [data description]);\n    }\n\n}\n  return 0;\n}\n```\n\n如[列表12-17](#9781430250500_Ch12.xhtml#list17)所示，`main()`函数首先创建一个`Archiver`对象。然后创建对象图，将其描述输出到控制台，并命名存档文件。接着，将对象图归档到指定的存档文件，如果成功，则在控制台中输出一条消息。\n\
    \n接下来的一组语句从存档中解码对象图。首先，它使用`Archiver`的`decodeArchiveFromFile:`方法解码存档。然后对方法调用的结果进行条件检查，如果返回了对象图（意味着操作成功完成），则将对象图的描述输出到控制台。现在编译并运行`ArchiveCat`程序，你应该能在输出面板中看到类似于[图12-2](#9781430250500_Ch12.xhtml#Fig2)所示的消息。\n\
    \n![9781430250500_Fig12-02.jpg](images/9781430250500_Fig12-02.jpg)\n\n[图12-2](#9781430250500_Ch12.xhtml#_Fig2).\
    \ `ArchiveCat`程序输出\n\n如输出面板所示，创建了一个`Subfamily`对象（即对象图）并用输入参数进行初始化，其描述被输出到控制台。接着，对象被归档到指定文件，存档文件的完整路径被输出到控制台。然后从存档中解码出一个对应的对象，其描述也被输出到控制台。由于最初创建的对象与从存档中解码出的对象描述完全相同，这验证了存档被正确编码和解码。这展示了如何使用归档API对存档进行编码/解码。请仔细查看这段代码，确保你对归档过程有很好的理解。准备好后，我们接着讨论分布式对象。\n\
    \n分布式对象\n\n分布式对象类提供了分布式对象通信的功能；本质上是一个进程中的对象向另一个进程中的对象发送消息。`NSConnection`类管理不同线程和/或进程中分布式对象之间的连接。`NSDistantObject`是`NSProxy`的子类，为其他线程或进程中的分布式对象定义代理。`NSProtocolChecker`也是`NSProxy`的子类，它定义一个对象来限制可以发送给另一个对象（其代理）的消息。协议检查器是一种代理，它只将收到的消息转发给目标对象，当且仅当这些消息包含在其指定的协议中。"
  raw: '```

    #import <Foundation/Foundation.h>


    @interface Archiver : NSObject


    @property (readwrite) NSString *path;


    - (BOOL) encodeArchive:(id)data toFile:(NSString *)file;

    - (id) decodeArchiveFromFile:(NSString *) file;


    @end

    ```


    The `Archiver` interface has a single property, `path`, which defines the path
    for the file the archive is written to. The methods `encodeArchive:toFile:` and
    `decodeArchiveFromFile:` are used to encode/decode an archive to/from a file on
    the file system. Now select the **Archiver.m** file and update the implementation,
    as shown in [Listing 12-16](#9781430250500_Ch12.xhtml#list16).


    [*Listing 12-16.*](#9781430250500_Ch12.xhtml#_list16)  Archiver Implementation


    ```

    #import "Archiver.h"


    @implementation Archiver


    - (id) init

    {

      if ((self = [super init]))

      {

        _path = NSTemporaryDirectory();

      }


    return self;

    }


    - (BOOL) encodeArchive:(id)objectGraph toFile:(NSString *)file

    {

      NSString *archivePath = [self.path stringByAppendingPathComponent:file];


    // Create an archiver for encoding data

      NSMutableData *mdata = [[NSMutableData alloc] init];

      NSKeyedArchiver *archiver = [[NSKeyedArchiver alloc]

                                   initForWritingWithMutableData:mdata];


    // Encode the data, keyed with a simple string

      [archiver encodeObject:objectGraph forKey:@"FELINE_KEY"];

      [archiver finishEncoding];


    // Write the encoded data to a file, returning status of the write

      BOOL result = [mdata writeToFile:archivePath atomically:YES];

      return result;

    }


    - (id) decodeArchiveFromFile:(NSString *) file

    {

      // Get path to file with archive

      NSString *archivePath = [self.path stringByAppendingPathComponent:file];


    // Create an unarchiver for decoding data

      NSData *data = [[NSMutableData alloc] initWithContentsOfFile:archivePath];

      NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver alloc]

                                       initForReadingWithData:data];


    // Decode the data, keyed with simple string

      id result = [unarchiver decodeObjectForKey:@"FELINE_KEY"];

      [unarchiver finishDecoding];


    // Return the decoded data

      return result;

    }


    @end

    ```


    As shown in [Listing 12-16](#9781430250500_Ch12.xhtml#list16), the `init` method
    sets the value for the path property. It uses the Foundation `NSTemporaryDirectory()`
    function to create a path to the user’s temporary directory on the file system,
    and assigns that value to the property’s backing instance variable.


    The `encodeArchive:toFile:` method encodes an object graph to a file. It creates
    a file path by prepending the path property to the input file string. It then
    creates a mutable data object for archiving the graph. Next, it creates an `NSKeyArchiver`
    instance to perform the archiving, initialized with the data object. It encodes
    the graph to the data object with the key `FELINE_KEY`, and then finishes the
    encoding. Finally, it writes the archived data object to the file, returning a
    Boolean that indicates the success/failure of the write.


    The `decodeArchiveFromFile:` method decodes an archive from a file, returning
    the initialized object graph. It creates a file path by prepending the path property
    to the input file string. It then creates a data object for unarchiving the graph.
    Next, it creates an `NSKeyUnarchiver` instance to perform the unarchiving, initialized
    with the data object. It decodes the graph to a data object with the key `FELINE_KEY`,
    finishes the decoding, and then returns the initialized data object.


    And that’s it! Now that you have implemented the class hierarchy and the archiver
    class, let’s use this to archive an object graph. In the Xcode project navigator,
    select the **main.m** file and update the `main()` function, as shown in [Listing
    12-17](#9781430250500_Ch12.xhtml#list17).


    [*Listing 12-17.*](#9781430250500_Ch12.xhtml#_list17)  ArchiveCat main( ) Function


    ```

    #import <Foundation/Foundation.h>

    #import "Archiver.h"

    #import "Subfamily.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create an Archiver to encode/decode an object graph

        Archiver *archiver = [[Archiver alloc] init];


    // Create an object graph and archive it to a file

        id animal = [[Subfamily alloc] initWithSpecies:@"Lion"

                                                 genus:@"Panther"

                                                family:@"Felid"

                                                 order:@"Carnivore"];

        NSLog(@"\n%@", [animal description]);

        NSString *file = @"data.archive";


    // Display results

        if ([archiver encodeArchive:animal toFile:file])

        {

          NSLog(@"You encoded an archive to file %@",

                [[archiver path] stringByAppendingString:file]);

        }


    // Decode object graph from archive and log its description

        id data = [archiver decodeArchiveFromFile:file];

        if ([archiver decodeArchiveFromFile:file])

        {

          NSLog(@"You decoded an archive from file %@\n%@",

                [[archiver path] stringByAppendingString:file], [data description]);

        }


    }

      return 0;

    }

    ```


    As shown in [Listing 12-17](#9781430250500_Ch12.xhtml#list17), the `main()` function
    begins by creating an `Archiver` object. It then creates an object graph, logs
    its description to the output pane, and names the archive file. Next, the graph
    is archived to the named archive file, and if successful, a message is logged
    to the console.


    The next set of statements decodes an object graph from the archive. First, it
    decodes the archive using the Archiver `decodeArchiveFromFile:` method. It then
    performs a condition check on the result of the method call, and if it returns
    an object graph (meaning the operation completed successfully), it logs a description
    of the object graph to the output pane. Now when you compile and run the ArchiveCat
    program, you should observe messages in the output pane comparable to those shown
    in [Figure 12-2](#9781430250500_Ch12.xhtml#Fig2).


    ![9781430250500_Fig12-02.jpg](images/9781430250500_Fig12-02.jpg)


    [Figure 12-2](#9781430250500_Ch12.xhtml#_Fig2). ArchiveCat program output


    As shown in the output pane, a `Subfamily` object (i.e., object graph) is created
    and initialized with its input parameters, and its description is logged to the
    output pane. Next, the object is archived to the specified file, and the full
    path of the archive file is logged to the output pane. A corresponding object
    is then decoded from the archive and its description is logged to the output pane.
    As the description for the initially created object and the object decoded from
    the archive is identical, this validates that the archive was correctly encoded
    and decoded. This demonstrates use of the Archiving APIs to encode/decode an archive.
    Look this code over for a while and make sure that you have a good handle on the
    archiving process. When you’re ready, let’s move on to distributed objects.


    Distributed Objects


    The Distributed Objects classes provide functionality for distributed object communication;
    in essence, an object in one process sending a message to an object in a different
    process. The `NSConnection` class manages connections between distributed objects
    in different threads and/or processes. `NSDistantObject` is a subclass of `NSProxy`
    that defines proxies for distributed objects in other threads or processes. The
    `NSProtocolChecker`, also a subclass of `NSProxy`, defines an object that restricts
    the messages that can be sent to another object (its delegate). A protocol checker
    acts as a type of proxy that only forwards the messages it receives to its target
    if they are in its designated protocol.'
