  trans: "\n# 键值编码与键值观察\n\n*   键值编码使您的代码能够通过名称（即键）间接访问和操作对象的属性，而非通过访问器方法或后备实例变量。\n\
    *   键值编码允许您使用可在运行时变化的字符串来访问属性，从而为访问和操作对象状态提供了一种更动态、更灵活的方法。其主要优势包括：松耦合、基于配置的属性访问以及代码简化。\n\
    *   键值编码使用键和键路径进行属性访问。键是标识特定属性的字符串。键路径则指定了（在对象图中）为标识特定属性而遍历的一系列对象属性。KVC API 支持访问对象的单个属性和多个属性。这些属性可以是基本类型、C\
    \ 结构体、对象类型（包括集合）。基本类型和结构体会自动与相应的对象类型进行相互包装。\n*   `NSKeyValueCoding` 非正式协议定义了通过名称/键间接访问对象的机制。此协议声明了键值编码\
    \ API，包含类方法和实例方法以及常量值。这些方法使您能够获取和设置属性值、执行属性验证，并更改用于获取属性值的键值编码方法的默认行为。\n*   键值编码利用一种机制将键映射到相应的属性访问器方法和/或属性后备变量。此机制利用了一套依赖于属性访问器方法命名约定的标准搜索模式。\n\
    *   键值编码还包含了用于验证属性值的基础架构。KVC 验证机制由一组 API 和一个用于自定义属性验证方法的标准约定组成。KVC 验证方法可以被直接或间接调用。\n\
    *   键值编码集合运算符允许通过键路径点符号对集合中的项目执行操作。\n*   键值观察使其他对象能够获知其他对象属性的变更。它本质上是一种观察者软件设计模式的实现，并在众多软件库和框架中得到应用。实际上，它是模型-视图-控制器（MVC）设计模式的关键组成部分，也是\
    \ Cocoa 和 Cocoa Touch 框架的核心组件。键值观察建立在键值编码之上。\n*   键值观察提供了众多优势，包括将观察者对象与被观察对象（即主题）解耦、框架级别的支持以及一套功能完备的\
    \ API。它提供事件通知，类似于 Foundation 框架的通知 API，但具有不同的特性集。因此，在决定在程序中使用哪一种之前，您应该比较两者。\n\
    *   键值观察提供了支持自动和手动键值属性变更通知的 API。它们使观察者能够在属性值变更之前和之后执行逻辑。这些 API 支持属性、一对一和一对多关系属性。自动属性变更通知由默认的\
    \ `NSObject` KVO 实现提供。手动变更通知则提供了对发送变更通知的更细粒度控制，消除了不必要的通知（例如，当新属性值与旧值相同时），并允许您将多个通知分组。\n\
    \n恭喜，您现在应该已经掌握了 Objective-C 语言！也许有些内容您想再复习一遍，或者您只是想让自己刚收获颇丰的大脑好好休息一下。请便吧，但请务必利用众多的代码清单和程序来深入探索所涵盖的主题。您做得越多，您的\
    \ Objective-C 编程技能就会越娴熟。\n\n这是本书的最后一章——但您猜怎么着，任务还没结束。下一站是附录，您将在那里探索各种其他主题，这些主题将进一步提升您的\
    \ Objective-C 技能。\n\n## 附录 A — 语言元素\n\n附录 A 提供了 Objective-C 语言基本元素的简明总结。其范围是 Objective-C\
    \ 对 ANSI C 的语言扩展。这里不涵盖 C 编程语言的基本元素；这些内容可以在许多其他参考资料中找到。\n\n### 变量\n\nObjective-C\
    \ 中变量名的词法规则与 ANSI C 相同 —— 变量由字母或下划线开头，后跟字母、下划线和数字 0-9 的任意组合。字母区分大小写。\n\n### Objective-C\
    \ 保留字\n\n在编程语言中，保留字是在该语言中具有特殊含义的符号，因此不应将其用作变量名。Objective-C 在已为 ANSI C 定义的保留字基础上增加了一些保留字；这些在表\
    \ A-1 中列出。\n\n**表 A-1.** 未用于变量名的 Objective-C 保留字\n\n![table](img/TableA-1.jpg)\n\
    \n### 变量作用域\n\n变量的可见性和可访问性取决于其作用域。变量可以存在于语句块、函数、方法、对象实例（或相关对象）内、单个文件内，或跨多个文件。ANSI\
    \ C 定义了四种作用域：\n\n*   **块**：在语句块内声明的变量具有块作用域。在块内声明的变量仅在该块内可见和可访问。\n*   **文件**：具有文件作用域的变量仅对声明该变量的文件内的代码可见和可访问。\n\
    *   **函数**：在函数/方法内声明的变量具有函数作用域。这些变量仅在相关的函数/方法内可见和可访问。\n*   **函数原型**：在函数/方法原型的参数列表中声明的变量具有函数原型作用域。这些变量在相关的函数/方法内可见和可访问。\n\
    \nObjective-C 增加了一组访问修饰符指令，使您能够对实例变量提供细粒度的访问控制。\n\n### 访问修饰符\n\nObjective-C 定义了多个编译器指令来控制实例变量的作用域；即变量在整个程序中的可见性。\n\
    \n*   `@private`：该实例变量仅能在声明它的类以及该类类型的其他实例内部访问。\n*   `@protected`：该实例变量可在声明它的类及其任何子类的实例方法中访问。如果未为实例变量指定保护级别，则这是默认作用域。\n\
    *   `@public`：该实例变量可以在任何地方访问。\n*   `@package`：该实例变量可以在任何其他类实例或函数中访问，但在包外部，它被视为私有的。此作用域对于库或框架类可能很有用。\n\
    \n这些指令被称为*访问修饰符*，并用于在实例变量声明块内声明的实例变量上。代码清单 A-1 的类实例变量声明声明了一个类型为 `int`、可在任何地方访问的\
    \ `counter` 变量，一个类型为 `float`、可在声明它的类及其任何子类中访问的 `temperature` 变量，以及一个类型为 `NSString*`、仅在声明它的类内可访问的\
    \ `description` 变量。\n\n**代码清单 A-1. 带访问修饰符的实例变量声明**\n\n```\n{\n  @public int counter;\n\
    \  @protected float temperature;\n  @private NSString *description;\n}\n```\n\n\
    ### 数据类型\n"
- fmt: "由于 Objective-C 是 C 编程语言的严格超集，它支持所有标准的 ANSI C 数据类型和类型限定符。Objective-C 还定义了许多特定语言的数据类型（`BOOL`类型、类实例类型、`id`类型、类定义类型、块类型）。这些内容将在以下段落中讨论。\n\
    \n## `BOOL`类型\n\n`BOOL`是一种 Objective-C 类型，用于保存布尔值，该值只能包含两个可能的值：`true`或`false`。对于\
    \ Objective-C 的`BOOL`类型，这些值被定义为`YES`和`NO`，而不是`true`（1）或`false`（0）。分配给`BOOL`的存储空间大小为\
    \ 1 字节。Objective-C 也支持 C99 类型`_Bool`和`bool`，尽管`BOOL`是在 Objective-C 程序中最常用的布尔类型。\n\
    \n## 类实例类型\n\n类实例类型表示对象、类和超类。Objective-C 运行时具有几个类实例类型，其中最常用的是`id`类型。\n\n### `id`类型\n\
    \n`id`类型是所有 Objective-C 对象指针的最终超类型，可用于保存对任何 Objective-C 对象的引用，无论其类型如何。以下语句声明了一个名为`myObject`的`id`类型变量。\n\
    \n```\nid myObject;\n```\n\n为此变量实例化的对象可以是任何类型。\n\n在运行时，Objective-C 的`id`类型等价于一个\
    \ C 结构体，该结构体定义为指向`objc_object`的指针（如[列表 A-2](#9781430250500_AppA.xhtml#list2)所示）。\n\
    \n*[列表 A-2.](#9781430250500_AppA.xhtml#_list2)* `id`类型定义\n\n```\ntypedef struct\
    \ objc_object\n{\n  Class isa;\n} *id;\n```\n\n换句话说，`id`只是一个指向标识符为`objc_object`的\
    \ C 结构体的指针。\n\n### `instancetype`关键字\n\n`instancetype`关键字是一个上下文关键字，可以用作方法的结果类型；它表示该方法返回一个*相关结果类型*。在[第\
    \ 3 章](#9781430250500_Ch03.xhtml)中，您了解到当一个方法返回一个相关结果类型时，它返回一个对象，该对象是接收类类型的实例。对于以下类型的方法，可以推断出相关结果类型：\n\
    \n-   以`alloc`或`new`开头的类方法。\n-   以`autorelease`、`init`、`retain`或`self`开头的实例方法。\n\
    \n以下语句使用`new`关键字创建一个`OrderItem`对象。\n\n```\nOrderItem *item = [OrderItem new];\n\
    ```\n\n尽管`NSObject`的`new`方法将`id`指定为返回类型，但编译器会根据名为`item`的接收类实例的类型，推断出正确的结果类型（在本例中为`OrderItem\
    \ *`）。\n\n`instancetype`关键字可用于显式指示方法返回相关结果类型。[列表 A-3](#9781430250500_AppA.xhtml#list3)\
    \ 提供了一个名为`OrderItem`的类的示例，其接口声明了一个返回相关结果类型的方法。\n\n*[列表 A-3.](#9781430250500_AppA.xhtml#_list3)*\
    \ 使用`instancetype`关键字返回相关结果类型\n\n```\n@interface OrderItem : NSObject\n+ (instancetype)orderItemWithDescription:(NSString\
    \ *)description price:(float)cost;\n@end\n```\n\n## 类定义类型\n\n类定义类型定义了 Objective-C\
    \ 运行时数据结构。它们包括`SEL`、`IMP`、`Class`和`objc_object`类型。\n\n### `SEL`类型\n\n`SEL`类型表示方法选择器，这是一种在\
    \ Objective-C 运行时中表示方法名称的类型。可以使用`@selector`编译器指令为名为`helloWorld`的方法选择器创建一个`SEL`类型的变量。\n\
    \n```\nSEL myHelloMethod = @selector(helloWorld);\n```\n\n此选择器可用于在对象上调用`helloWorld`方法。\n\
    \n### `IMP`类型\n\n`IMP`类型表示一个方法指针，指向实现方法的函数在内存中的起始地址。`IMP`定义如下：\n\n```\ntypedef\
    \ id (*IMP)(id, SEL, ...);\n```\n\n正如前面的类型定义所示，由`IMP`指向的函数接受一个`id`、一个方法选择器（`SEL`）、可变参数（由可变参数`...`符号表示）作为其参数，并返回一个`id`。\n\
    \n### `Class`类型\n\n`Class`类型表示一个 Objective-C 类实例（即一个对象），并由各种数据元素组成。`Class`数据类型定义如下：\n\
    \n```\ntypedef struct objc_class *Class;\n```\n\n正如前面的类型定义所示，`Class`数据类型是指向一个标识符为`objc_class`的`opaque`类型的指针。`objc_class`结构体的成员只能通过为其专门定义的函数访问，特别是使用\
    \ Objective-C 运行时库函数。\n\n### `objc_object`类型\n\nObjective-C 对象有一个对应的运行时数据类型。当编译器解析对象的\
    \ Objective-C 代码时，它会生成创建运行时对象类型`objc_object`的代码。此数据类型在[列表 A-4](#9781430250500_AppA.xhtml#list4)\
    \ 中声明，是一个标识符为`objc_object`的 C 结构体类型。\n\n*[列表 A-4.](#9781430250500_AppA.xhtml#_list4)*\
    \ `objc_object`数据类型\n\n```\nstruct objc_object\n{\n  Class isa;\n  /* ...variable\
    \ length data containing instance variable values...  */\n};\n```\n\n`objc_object`类型包含一个名为`isa`的`Class`类型变量；换句话说，是一个指向`objc_class`类型变量的指针。\n\
    \n## 块类型\n\n块提供了一种创建一组语句（即一个代码块）并将这些语句赋值给一个变量的方法，然后可以调用该变量。它们类似于标准的 C 函数，但除了可执行代码外，它们还可能包含指向栈或堆内存的变量绑定。块是一个\
    \ Objective-C 对象（块类型），并且像所有 Objective-C 对象一样，通过指针访问。与 Objective-C 对象一样，`id`类型可用于引用块对象。以下语句声明了一个名为`incrementSum`的`Block`变量，该变量有一个`int`类型的参数并且不返回任何值。\n\
    \n```\nvoid (^incrementSum)(int);\n```\n\n`__block`存储修饰符可用于创建可变的块变量。它应用于`Block`字面量外部但在同一词法作用域内的变量，并允许在`Block`内修改此变量。此存储修饰符不能与局部存储修饰符`auto`、`register`和`static`同时应用于同一变量。[列表\
    \ A-5](#9781430250500_AppA.xhtml#list5) 说明了`__block`变量的使用。\n\n*[列表 A-5.](#9781430250500_AppA.xhtml#_list5)*\
    \ `__block`存储的正确使用\n\n```\n__block int totalSum = 0;\nvoid (^incrementSum)(int)\
    \ = ^(int amount){\n  totalSum += amount;\n  NSLog(@\"Current total = %d\", totalSum);\n\
    };\nincrementSum(5);\n```\n\n当执行[列表 A-5](#9781430250500_AppA.xhtml#list5) 中显示的代码片段时，它输出以下内容：\n\
    \n```\nCurrent total = 5\n```\n\n因此，块变量`totalSum`被初始化为值 0，然后在调用块字面量时被修改。\n\n##\
    \ 枚举类型\n\nObjective-C 支持标准的 C 枚举类型，还提供了为枚举指定类型的支持。枚举类型由一组命名值（也称为*枚举器*）组成，这些值使用`enum`关键字定义。声明为枚举的变量可以被赋值为任何枚举器值。[列表\
    \ A-6](#9781430250500_AppA.xhtml#list6) 定义了一个枚举，其中包含一组值：`Red`、`Green`和`Blue`，用于名为`color`的变量。\n\
    \n*[列表 A-6.](#9781430250500_AppA.xhtml#_list6)* 示例`enum`类型定义\n\n```\nenum\n{\n\
    \  Red,\n  Green,\n  Blue\n} color;\n```"
  raw: 'As Objective-C is a strict superset of the C programming language. It supports
    all of the standard ANSI C data types and type qualifiers. Objective-C also defines
    a number of language-specific data types (`BOOL` type, class instance types, `id`
    type, class definition types, block type). These are discussed in the following
    paragraphs.


    BOOL Type


    `BOOL` is an Objective-C type used to hold a Boolean value that can hold only
    two possible values: `true` or `false`. For the Objective-C `BOOL` type, these
    values are defined as `YES` and `NO` rather than `true` (1) or `false` (0). The
    amount of storage allocated for a `BOOL` is 1 byte. Objective-C also supports
    the C99 types `_Bool` and `bool`, although `BOOL` is the preferred Boolean type
    to use in Objective-C programs.


    Class Instance Types


    The class instance types represent objects, classes, and superclasses. The Objective-C
    runtime has several class instance types, of which the most commonly used is the
    `id` type.


    id Type


    The `id` type is the final supertype of all Objective-C object pointers and can
    be used to hold a reference to any Objective-C object, regardless of its type.
    The following statement declares a variable named `myObject` of type `id`.


    ```

    id myObject;

    ```


    The object instantiated for this variable can be of any type.


    The runtime equivalent for the Objective-C `id` type is a C struct defined as
    a pointer to an `objc_object` (as shown in [Listing A-2](#9781430250500_AppA.xhtml#list2)).


    [*Listing A-2.*](#9781430250500_AppA.xhtml#_list2)  id Type Definition


    ```

    typedef struct objc_object

    {

      Class isa;

    } *id;

    ```


    In other words, an `id` is just a pointer to a C struct with the identifier `objc_object`.


    instancetype Keyword


    The `instancetype` keyword is a contextual keyword that can be used as the result
    type of a method; it signals that the method returns a *related result type*.
    In [Chapter 3](#9781430250500_Ch03.xhtml), you learned that when a method returns
    a related result type, it returns an object that is an instance of the receiving
    class’s type. A related result type can be inferred for the following types of
    methods:


    *   Class methods that begin with the words `alloc` or `new`.

    *   Instance methods that begin with the words `autorelease`, `init`, `retain`,
    or `self`.


    The following statement creates an `OrderItem` object using the `new` keyword.


    ```

    OrderItem *item = [OrderItem new];

    ```


    Although the NSObject `new` method specifies `id` as the return type, the compiler
    infers the correct result type (in this case `OrderItem *`) based on the type
    of the receiving class instance named *item*.


    The `instancetype` keyword can be used to explicitly indicate that a method returns
    a related result type. [Listing A-3](#9781430250500_AppA.xhtml#list3) provides
    an example of a class named `OrderItem`, whose interface declares a method that
    returns a related result type.


    [*Listing A-3.*](#9781430250500_AppA.xhtml#_list3)  Use of the instancetype Keyword
    to Return a Related Result Type


    ```

    @interface OrderItem : NSObject

    + (instancetype)orderItemWithDescription:(NSString *)description price:(float)cost;

    @end

    ```


    Class Definition Types


    The class definition types define Objective-C runtime data structures. They include
    the `SEL`, `IMP`, `Class`, and `objc_object` types.


    SEL Type


    The `SEL` type represents a method selector, a type that represents the name of
    a method in the Objective-C runtime. A variable of type `SEL` for a method selector
    named `helloWorld` can be created using the `@selector` compiler directive.


    ```

    SEL myHelloMethod = @selector(helloWorld);

    ```


    This selector can be used to invoke the `helloWorld` method on an object.


    IMP Type


    The `IMP` type represents a method pointer that points to the beginning address
    in memory for a function that implements a method. An `IMP` is defined as follows:


    ```

    typdef id (*IMP)(id, SEL, ...);

    ```


    As shown by the preceding type definition, the function pointed to by an `IMP`
    takes as its parameters an `id`, a method selector (`SEL`), variable arguments
    (represented by the variadic arguments `...` symbol), and returns an `id`.


    Class Type


    The `Class` type represents an Objective-C class instance (i.e., an object) and
    is composed of various data elements. The `Class` data type is defined as follows:


    ```

    typedef struct objc_class *Class;

    ```


    As shown by the preceding type definition, the `Class` data type is a pointer
    to an `opaque` type with an identifier of `objc_class`. The members of the `objc_class`
    struct can only be accessed through functions defined specifically for it, specifically
    using the Objective-C runtime library functions.


    objc_object Type


    Objective-C objects have a corresponding runtime data type. When the compiler
    parses Objective-C code for objects, it generates code that creates a runtime
    object type, the `objc_object` type. This data type, declared in [Listing A-4](#9781430250500_AppA.xhtml#list4),
    is a C struct type with an identifier of `objc_object`.


    [*Listing A-4.*](#9781430250500_AppA.xhtml#_list4)  objc_object Data Type


    ```

    struct objc_object

    {

      Class isa;

      /* ...variable length data containing instance variable values...  */

    };

    ```


    The `objc_object` type contains a variable named `isa` of type `Class`; in other
    words, a pointer to a variable of type `objc_class`.


    Block Type


    Blocks provide a way to create a group of statements (i.e., a block of code) and
    assign those statements to a variable, which can subsequently be invoked. They
    are similar to standard C functions, but in addition to executable code, they
    may also contain variable bindings to stack or heap memory. A block is an Objective-C
    object (of block type), and like all Objective-C objects, it is accessed via a
    pointer. As with Objective-C objects, the `id` type can be used to refer to a
    block object. The following statement declares a `Block` variable named `incrementSum`
    that has a single parameter of type `int` and returns nothing.


    ```

    void (^incrementSum)(int);

    ```


    The `__block` storage modifier can be used to create mutable block variables.
    It is applied to a variable outside of a `Block` literal but within the same lexical
    scope, and enables this variable to be modified within the `Block`. This storage
    modifier cannot be combined with the local storage modifiers `auto`, `register`,
    and `static` on the same variable. [Listing A-5](#9781430250500_AppA.xhtml#list5)
    illustrates the use of a `__block` variable.


    [*Listing A-5.*](#9781430250500_AppA.xhtml#_list5)  Correct Use of __block Storage


    ```

    __block int totalSum = 0;

    void (^incrementSum)(int) = ^(int amount){

      totalSum += amount;

      NSLog(@"Current total = %d", totalSum);

    };

    incrementSum(5);

    ```


    When the code fragment displayed in [Listing A-5](#9781430250500_AppA.xhtml#list5)
    is executed, it outputs the following:


    ```

    Current total = 5

    ```


    Hence, the block variable `totalSum` is initialized with a value of 0 and then
    modified when the block literal is invoked.


    Enumeration Types


    Objective-C supports the standard C enumeration types and also provides support
    for specifying the type for an enumeration. An enumeration type consists of a
    set of named values (aka *enumerators*) that are defined using the `enum` keyword.
    A variable declared as an enumeration can be assigned any of the enumerator values.
    [Listing A-6](#9781430250500_AppA.xhtml#list6) defines an enumeration with a set
    of values: `Red`, `Green`, and `Blue` for the variable named `color` *.*


    [*Listing A-6.*](#9781430250500_AppA.xhtml#_list6)  Example enum Type Definition


    ```

    enum

    {

      Red,

      Green,

      Blue

    } color;

    ```'
  trans: "\n由于 Objective-C 是 C 编程语言的严格超集，它支持所有标准的 ANSI C 数据类型和类型限定符。Objective-C 还定义了许多特定语言的数据类型（`BOOL`类型、类实例类型、`id`类型、类定义类型、块类型）。这些内容将在以下段落中讨论。\n\
    \n## `BOOL`类型\n\n`BOOL`是一种 Objective-C 类型，用于保存布尔值，该值只能包含两个可能的值：`true`或`false`。对于\
    \ Objective-C 的`BOOL`类型，这些值被定义为`YES`和`NO`，而不是`true`（1）或`false`（0）。分配给`BOOL`的存储空间大小为\
    \ 1 字节。Objective-C 也支持 C99 类型`_Bool`和`bool`，尽管`BOOL`是在 Objective-C 程序中最常用的布尔类型。\n\
    \n## 类实例类型\n\n类实例类型表示对象、类和超类。Objective-C 运行时具有几个类实例类型，其中最常用的是`id`类型。\n\n### `id`类型\n\
    \n`id`类型是所有 Objective-C 对象指针的最终超类型，可用于保存对任何 Objective-C 对象的引用，无论其类型如何。以下语句声明了一个名为`myObject`的`id`类型变量。\n\
    \n```\nid myObject;\n```\n\n为此变量实例化的对象可以是任何类型。\n\n在运行时，Objective-C 的`id`类型等价于一个\
    \ C 结构体，该结构体定义为指向`objc_object`的指针（如列表 A-2 所示）。\n\n*列表 A-2.* `id`类型定义\n\n```\n\
    typedef struct objc_object\n{\n  Class isa;\n} *id;\n```\n\n换句话说，`id`只是一个指向标识符为`objc_object`的\
    \ C 结构体的指针。\n\n### `instancetype`关键字\n\n`instancetype`关键字是一个上下文关键字，可以用作方法的结果类型；它表示该方法返回一个*相关结果类型*。在第\
    \ 3 章中，您了解到当一个方法返回一个相关结果类型时，它返回一个对象，该对象是接收类类型的实例。对于以下类型的方法，可以推断出相关结果类型：\n\n- \
    \  以`alloc`或`new`开头的类方法。\n-   以`autorelease`、`init`、`retain`或`self`开头的实例方法。\n\n\
    以下语句使用`new`关键字创建一个`OrderItem`对象。\n\n```\nOrderItem *item = [OrderItem new];\n\
    ```\n\n尽管`NSObject`的`new`方法将`id`指定为返回类型，但编译器会根据名为`item`的接收类实例的类型，推断出正确的结果类型（在本例中为`OrderItem\
    \ *`）。\n\n`instancetype`关键字可用于显式指示方法返回相关结果类型。列表 A-3 提供了一个名为`OrderItem`的类的示例，其接口声明了一个返回相关结果类型的方法。\n\
    \n*列表 A-3.* 使用`instancetype`关键字返回相关结果类型\n\n```\n@interface OrderItem : NSObject\n\
    + (instancetype)orderItemWithDescription:(NSString *)description price:(float)cost;\n\
    @end\n```\n\n## 类定义类型\n\n类定义类型定义了 Objective-C 运行时数据结构。它们包括`SEL`、`IMP`、`Class`和`objc_object`类型。\n\
    \n### `SEL`类型\n\n`SEL`类型表示方法选择器，这是一种在 Objective-C 运行时中表示方法名称的类型。可以使用`@selector`编译器指令为名为`helloWorld`的方法选择器创建一个`SEL`类型的变量。\n\
    \n```\nSEL myHelloMethod = @selector(helloWorld);\n```\n\n此选择器可用于在对象上调用`helloWorld`方法。\n\
    \n### `IMP`类型\n\n`IMP`类型表示一个方法指针，指向实现方法的函数在内存中的起始地址。`IMP`定义如下：\n\n```\ntypedef\
    \ id (*IMP)(id, SEL, ...);\n```\n\n正如前面的类型定义所示，由`IMP`指向的函数接受一个`id`、一个方法选择器（`SEL`）、可变参数（由可变参数`...`符号表示）作为其参数，并返回一个`id`。\n\
    \n### `Class`类型\n\n`Class`类型表示一个 Objective-C 类实例（即一个对象），并由各种数据元素组成。`Class`数据类型定义如下：\n\
    \n```\ntypedef struct objc_class *Class;\n```\n\n正如前面的类型定义所示，`Class`数据类型是指向一个标识符为`objc_class`的`opaque`类型的指针。`objc_class`结构体的成员只能通过为其专门定义的函数访问，特别是使用\
    \ Objective-C 运行时库函数。\n\n### `objc_object`类型\n\nObjective-C 对象有一个对应的运行时数据类型。当编译器解析对象的\
    \ Objective-C 代码时，它会生成创建运行时对象类型`objc_object`的代码。此数据类型在列表 A-4 中声明，是一个标识符为`objc_object`的\
    \ C 结构体类型。\n\n*列表 A-4.* `objc_object`数据类型\n\n```\nstruct objc_object\n{\n  Class\
    \ isa;\n  /* ...variable length data containing instance variable values...  */\n\
    };\n```\n\n`objc_object`类型包含一个名为`isa`的`Class`类型变量；换句话说，是一个指向`objc_class`类型变量的指针。\n\
    \n## 块类型\n\n块提供了一种创建一组语句（即一个代码块）并将这些语句赋值给一个变量的方法，然后可以调用该变量。它们类似于标准的 C 函数，但除了可执行代码外，它们还可能包含指向栈或堆内存的变量绑定。块是一个\
    \ Objective-C 对象（块类型），并且像所有 Objective-C 对象一样，通过指针访问。与 Objective-C 对象一样，`id`类型可用于引用块对象。以下语句声明了一个名为`incrementSum`的`Block`变量，该变量有一个`int`类型的参数并且不返回任何值。\n\
    \n```\nvoid (^incrementSum)(int);\n```\n\n`__block`存储修饰符可用于创建可变的块变量。它应用于`Block`字面量外部但在同一词法作用域内的变量，并允许在`Block`内修改此变量。此存储修饰符不能与局部存储修饰符`auto`、`register`和`static`同时应用于同一变量。列表\
    \ A-5 说明了`__block`变量的使用。\n\n*列表 A-5.* `__block`存储的正确使用\n\n```\n__block int totalSum\
    \ = 0;\nvoid (^incrementSum)(int) = ^(int amount){\n  totalSum += amount;\n  NSLog(@\"\
    Current total = %d\", totalSum);\n};\nincrementSum(5);\n```\n\n当执行列表 A-5 中显示的代码片段时，它输出以下内容：\n\
    \n```\nCurrent total = 5\n```\n\n因此，块变量`totalSum`被初始化为值 0，然后在调用块字面量时被修改。\n\n##\
    \ 枚举类型\n\nObjective-C 支持标准的 C 枚举类型，还提供了为枚举指定类型的支持。枚举类型由一组命名值（也称为*枚举器*）组成，这些值使用`enum`关键字定义。声明为枚举的变量可以被赋值为任何枚举器值。列表\
    \ A-6 定义了一个枚举，其中包含一组值：`Red`、`Green`和`Blue`，用于名为`color`的变量。\n\n*列表 A-6.* 示例`enum`类型定义\n\
    \n```\nenum\n{\n  Red,\n  Green,\n  Blue\n} color;\n```\n"
- fmt: "枚举器的默认类型是`int`。Objective-C 提供了对显式指定枚举类型（也称为*具有固定底层类型的枚举*）的支持。枚举支持的类型包括任何有符号或无符号整数类型（`char`、`short`、`int`和`long`）。类型应在`enum`关键字后指定，并以冒号为前缀。[列表\
    \ A-7](#9781430250500_AppA.xhtml#list7) 定义了一个枚举，其值为`Red`、`Green`和`Blue`，类型为`unsigned\
    \ char`，用于名为`color`的变量。\n\n[*列表 A-7.*](#9781430250500_AppA.xhtml#_list7)  具有固定底层类型的枚举示例\n\
    \n```\nenum : unsigned char\n{\n  Red,\n  Green,\n  Blue\n} color;\n```\n\n通常，使用类型定义来声明枚举类型。[列表\
    \ A-8](#9781430250500_AppA.xhtml#list8) 为一个枚举声明了类型定义，该枚举具有`Red`、`Green`和`Blue`（其类型为`unsigned\
    \ char`）的值，然后声明了一个该类型的变量`color`。\n\n[*列表 A-8.*](#9781430250500_AppA.xhtml#_list8)\
    \  具有固定底层类型的 typedef 枚举示例\n\n```\ntypedef enum : unsigned char\n{\n  Red,\n  Green,\n\
    \  Blue\n} ColorType;\nColorType color;\n```\n\n在 Objective-C 中定义枚举类型的首选方法是使用`NS_ENUM`宏。这提供了一种便捷的机制，可以在单个语句中声明枚举值的底层类型并定义新类型的名称。[列表\
    \ A-9](#9781430250500_AppA.xhtml#list9) 演示了使用`NS_ENUM`宏来定义在[列表 A-8](#9781430250500_AppA.xhtml#list8)\
    \ 中先前定义的枚举类型。\n\n[*列表 A-9.*](#9781430250500_AppA.xhtml#_list9)  使用 NS_ENUM 宏定义的枚举示例\n\
    \n```\ntypedef NS_ENUM(unsigned char, ColorType)\n{\n  Red,\n  Green,\n  Blue\n\
    };\n```\n\n[列表 A-9](#9781430250500_AppA.xhtml#list9) 表明宏的第一个参数是底层类型，而第二个参数是新类型的名称。值像往常一样存储在块内。\n\
    \n## 运算符\n\nObjective-C 支持 ANSI C 定义的运算符，具体来说包括：\n\n*   赋值运算符\n*   算术运算符\n*  \
    \ 复合赋值运算符\n*   自增和自减运算符\n*   逻辑比较运算符\n*   逻辑布尔运算符\n*   位运算符\n*   复合位运算符\n*   三元运算符\n\
    *   类型转换运算符\n*   `sizeof`运算符\n*   取地址（`&`）运算符\n*   间接引用（`*`）运算符\n*   逗号运算符\n\n\
    算术转换规则以及运算符优先级和结合性的规则与 ANSI C 的规定相同。\n\n脱字符（`^`）运算符用于块对象，具体用于声明块类型的对象和定义块字面量。\n\
    \n## 语句\n\nObjective-C 支持 ANSI C 定义的条件、循环和跳转语句，具体来说包括：\n\n*   条件语句（`if`、`if else`、`if\
    \ else if`、`switch`）\n*   循环语句（`for`、`while`、`do while`）\n*   跳转语句（`return`、`goto`、`break`、`continue`）\n\
    \n## 类元素\n\n一个 Objective-C 类由多个结构元素组成，这些元素逻辑上组织成不同的部分。本节提供了这些基本类元素的概述。\n\n###\
    \ 实例变量\n\n实例变量，有时也称为 *ivars*，是为类声明的变量，它们在整个类实例的生命周期内存在并保持其值。实例变量使用的内存在对象首次创建时分配，并在对象释放时回收。实例变量具有与对象对应的隐式作用域和命名空间。实例变量可以在类接口、实现或扩展的实例变量声明块内声明。实例变量（ivar）声明块必须紧邻对应的接口、实现或类扩展声明之下。[列表\
    \ A-10](#9781430250500_AppA.xhtml#list10) 展示了`Hello`类的示例 ivar 声明块。\n\n[*列表 A-10.*](#9781430250500_AppA.xhtml#_list10)\
    \  Hello 类实现实例变量声明块\n\n```\n@implementation Hello\n{\n  // 在此处声明实例变量。\n  ...\n\
    }\n...\n@end\n```\n\n推荐的做法是在类实现（而非公开的类接口）中声明实例变量。对于仅在对应类实现文件中使用的变量，实例变量通常声明在扩展中。\n\
    \n### 实例变量所有权限定符\n\nObjective-C 所有权限定符是一种类型限定符，仅适用于可保留的对象指针类型。在变量声明中，所有权限定符放置在对象指针类型之前，以指定变量的所有权规则。[表\
    \ A-2](#9781430250500_AppA.xhtml#Tab2) 列出了四种所有权限定符。\n\n**表 A-2.** 对象指针变量所有权限定符\n\
    \n| 限定符 | 描述 |\n| --- | --- |\n| `__autoreleasing` | 当变量被赋新值时，新值会被保留并自动释放，而先前的值会收到一条\
    \ release 消息。 |\n| `__weak` | 变量使用简单赋值（即，输入值不会被复制或保留）。如果对象被释放，相应的变量值会被设置为`nil`。\
    \ |\n| `__unsafe_unretained` | 变量使用简单赋值（即，输入值不会被复制或保留）。 |\n| `__strong` | 当变量被赋新值时，新值会被保留，而先前的值会收到一条\
    \ release 消息。 |\n\n默认的所有权限定符（如果没有提供）是`__strong`。以下语句声明了一个名为`hello`（类型为`Hello *`）的变量，其所有权限定符为`__weak`。\n\
    \n```\n__weak Hello *hello;\n```\n\n### 属性\n\n在 Objective-C 中，属性以访问器方法（即 *getter*\
    \ 和 *setter*）的形式提供了一种便捷的机制，用于访问对象的共享状态。属性与实例变量的不同之处在于它不直接访问对象的内部状态。Objective-C\
    \ 声明的属性使编译器能够根据您提供的规范自动生成这些方法。\n\n属性使用`@property`关键字声明，后跟一组可选的属性（括在圆括号内）、属性类型及其名称。\n\
    \n```\n@property (attributes) type propertyName;\n```\n\n属性声明属性用于指定与属性相关的存储语义和其他行为。[表\
    \ A-3](#9781430250500_AppA.xhtml#Tab3) 提供了可用的属性列表。\n\n**表 A-3.** 属性"
  raw: 'The default type for enumerators is `int`. Objective-C provides support for
    explicitly specifying the type for an enumeration, also referred to as *enumerations
    with a fixed underlying type*. The types supported for an enumeration are any
    signed or unsigned integer type (`char`, `short`, `int`, and `long`). The type
    should be specified after the `enum` keyword, prefixed by a colon. [Listing A-7](#9781430250500_AppA.xhtml#list7)
    defines an enumeration with a set of values `Red`, `Green`, and `Blue` whose type
    is `unsigned char for` the variable named `color`.


    [*Listing A-7.*](#9781430250500_AppA.xhtml#_list7)  Example enum with a Fixed
    Underlying Type


    ```

    enum : unsigned char

    {

      Red,

      Green,

      Blue

    } color;

    ```


    Typically, a type definition is used to declare an enumeration type. [Listing
    A-8](#9781430250500_AppA.xhtml#list8) declares a type definition for an enumeration
    with a set of values `Red`, `Green`, and `Blue` (whose type is `unsigned char`),
    and then declares a variable named `color` of that type.


    [*Listing A-8.*](#9781430250500_AppA.xhtml#_list8)  Example typedef enum with
    a Fixed Underlying Type


    ```

    typedef enum : unsigned char

    {

      Red,

      Green,

      Blue

    } ColorType;

    ColorType color;

    ```


    The preferred approach in Objective-C for defining enumeration types is to use
    the `NS_ENUM` macro. This provides a convenient mechanism to declare the underlying
    type for the enumeration values and define the name of the new type in a single
    statement. [Listing A-9](#9781430250500_AppA.xhtml#list9) illustrates use of the
    `NS_ENUM` macro to define the enumeration type previously defined in [Listing
    A-8](#9781430250500_AppA.xhtml#list8).


    [*Listing A-9.*](#9781430250500_AppA.xhtml#_list9)  Example enum Definition Using
    the NS_ENUM Macro


    ```

    typedef NS_ENUM(unsigned char, ColorType)

    {

      Red,

      Green,

      Blue

    };

    ```


    [Listing A-9](#9781430250500_AppA.xhtml#list9) shows that the first argument for
    the macro is the underlying type; whereas the second argument is the name of the
    new type. The values are stored inside the block, as usual.


    Operators


    Objective-C supports the operators defined for ANSI C, specifically


    *   Assignment operators

    *   Arithmetic operators

    *   Compound assignment operators

    *   Increment and decrement operators

    *   Logical comparison operators

    *   Logical Boolean operators

    *   Bitwise operators

    *   Compound bitwise operators

    *   Ternary operators

    *   Type cast operators

    *   sizeof operators

    *   Address (`&`) operators

    *   Indirection (`*`) operators

    *   Comma operators


    The rules for arithmetic conversions, along with those for operator precedence
    and associativity, are as specified for ANSI C.


    The caret (`^`) operator is used with block objects; specifically to declare objects
    of block type and to define block literals.


    Statements


    Objective-C supports the conditional, looping, and jump statements defined for
    ANSI C, specifically


    *   Conditional statements (`if`, `if else`, `if else if`, `switch`)

    *   Loop statements (`for`, `while`, `do while`)

    *   Jump statements (`return`, `goto`, `break`, `continue`)


    Class Elements


    An Objective-C class is comprised of several structural elements, which are logical
    organized into sections. This section provides an overview of these fundamental
    class elements.


    Instance Variables


    Instance variables, sometimes referred to as *ivars*, are variables declared for
    a class that exist and hold their value throughout the life of a class instance.
    The memory used for instance variables is allocated when an object is first created,
    and freed when the object is dellocated. Instance variables have an implicit scope
    and namespace corresponding to the object. Instance variables can be declared
    within the instance variable declaration block of a class interface, implementation,
    or extension. The ivar declaration block must be placed immediately below the
    corresponding interface, implementation, or class extension declaration. [Listing
    A-10](#9781430250500_AppA.xhtml#list10) depicts an example ivar declaration block
    for the `Hello` class.


    [*Listing A-10.*](#9781430250500_AppA.xhtml#_list10)  Hello Class Implementation
    Instance Variable Declaration Block


    ```

    @implementation Hello

    {

      // declare instance variables here.

      ...

    }

    ...

    @end

    ```


    The recommended practice is to declare instance variables in the class implementation
    (rather than the public class interface). Instance variables are commonly declared
    in an extension for variables solely used within the corresponding class implementation
    file.


    Instance Variables Ownership Qualifiers


    An Objective-C ownership qualifier is a type qualifier that applies only to retainable
    object pointer types. An ownership qualifier is placed before an object pointer
    type in a variable declaration to specify the variable’s ownership rules. [Table
    A-2](#9781430250500_AppA.xhtml#Tab2) lists the four ownership qualifiers.


    Table A-2\. Object Pointer Variable Ownership Qualifiers


    | Qualifier | Description |

    | --- | --- |

    | `__autoreleasing` | When the variable is assigned a new value, the new value
    is retained and autoreleased, and the previous value is sent a release message.
    |

    | `__weak` | The variable uses simple assignment (i.e., the input value is not
    copied or retained). If the object is deallocated, the corresponding variable
    value is set to `nil`. |

    | `__unsafe_unretained` | The variable uses simple assignment (i.e., the input
    value is not copied or retained). |

    | `__strong` | When the variable is assigned a new value, the new value is retained
    and the previous value is sent a release message. |


    The default ownership qualifier (if none is provided) is `__strong`. The following
    statement declares a variable named `hello` (of type `Hello *`) with an ownership
    qualifier of `__weak`.


    ```

    __weak Hello *hello;

    ```


    Properties


    In Objective-C a property provides a convenient mechanism, in the form of accessor
    methods (i.e., *getters* and *setters*), for accessing an object’s shared state.
    A property differs from an instance variable in that it doesn’t directly access
    an object’s internal state. Objective-C declared properties enable the compiler
    to generate these methods automatically according to your provided specification.


    A property is declared using the `@property` keyword, followed by an optional
    set of attributes (enclosed within parentheses), the property type, and its name.


    ```

    @property (attributes) type propertyName;

    ```


    Property declaration attributes are used to specify the storage semantics and
    other behaviors associated with a property. [Table A-3](#9781430250500_AppA.xhtml#Tab3)
    provides a list of the available property attributes.


    Table A-3\. Property Attributes'
  trans: "\n枚举器的默认类型是`int`。Objective-C 提供了对显式指定枚举类型（也称为*具有固定底层类型的枚举*）的支持。枚举支持的类型包括任何有符号或无符号整数类型（`char`、`short`、`int`和`long`）。类型应在`enum`关键字后指定，并以冒号为前缀。列表\
    \ A-7 定义了一个枚举，其值为`Red`、`Green`和`Blue`，类型为`unsigned char`，用于名为`color`的变量。\n\n*列表\
    \ A-7.*  具有固定底层类型的枚举示例\n\n```\nenum : unsigned char\n{\n  Red,\n  Green,\n  Blue\n\
    } color;\n```\n\n通常，使用类型定义来声明枚举类型。列表 A-8 为一个枚举声明了类型定义，该枚举具有`Red`、`Green`和`Blue`（其类型为`unsigned\
    \ char`）的值，然后声明了一个该类型的变量`color`。\n\n*列表 A-8.*  具有固定底层类型的 typedef 枚举示例\n\n```\n\
    typedef enum : unsigned char\n{\n  Red,\n  Green,\n  Blue\n} ColorType;\nColorType\
    \ color;\n```\n\n在 Objective-C 中定义枚举类型的首选方法是使用`NS_ENUM`宏。这提供了一种便捷的机制，可以在单个语句中声明枚举值的底层类型并定义新类型的名称。列表\
    \ A-9 演示了使用`NS_ENUM`宏来定义在列表 A-8 中先前定义的枚举类型。\n\n*列表 A-9.*  使用 NS_ENUM 宏定义的枚举示例\n\
    \n```\ntypedef NS_ENUM(unsigned char, ColorType)\n{\n  Red,\n  Green,\n  Blue\n\
    };\n```\n\n列表 A-9 表明宏的第一个参数是底层类型，而第二个参数是新类型的名称。值像往常一样存储在块内。\n\n## 运算符\n\nObjective-C\
    \ 支持 ANSI C 定义的运算符，具体来说包括：\n\n*   赋值运算符\n*   算术运算符\n*   复合赋值运算符\n*   自增和自减运算符\n\
    *   逻辑比较运算符\n*   逻辑布尔运算符\n*   位运算符\n*   复合位运算符\n*   三元运算符\n*   类型转换运算符\n*   `sizeof`运算符\n\
    *   取地址（`&`）运算符\n*   间接引用（`*`）运算符\n*   逗号运算符\n\n算术转换规则以及运算符优先级和结合性的规则与 ANSI C\
    \ 的规定相同。\n\n脱字符（`^`）运算符用于块对象，具体用于声明块类型的对象和定义块字面量。\n\n## 语句\n\nObjective-C 支持 ANSI\
    \ C 定义的条件、循环和跳转语句，具体来说包括：\n\n*   条件语句（`if`、`if else`、`if else if`、`switch`）\n\
    *   循环语句（`for`、`while`、`do while`）\n*   跳转语句（`return`、`goto`、`break`、`continue`）\n\
    \n## 类元素\n\n一个 Objective-C 类由多个结构元素组成，这些元素逻辑上组织成不同的部分。本节提供了这些基本类元素的概述。\n\n###\
    \ 实例变量\n\n实例变量，有时也称为 *ivars*，是为类声明的变量，它们在整个类实例的生命周期内存在并保持其值。实例变量使用的内存在对象首次创建时分配，并在对象释放时回收。实例变量具有与对象对应的隐式作用域和命名空间。实例变量可以在类接口、实现或扩展的实例变量声明块内声明。实例变量（ivar）声明块必须紧邻对应的接口、实现或类扩展声明之下。列表\
    \ A-10 展示了`Hello`类的示例 ivar 声明块。\n\n*列表 A-10.*  Hello 类实现实例变量声明块\n\n```\n@implementation\
    \ Hello\n{\n  // 在此处声明实例变量。\n  ...\n}\n...\n@end\n```\n\n推荐的做法是在类实现（而非公开的类接口）中声明实例变量。对于仅在对应类实现文件中使用的变量，实例变量通常声明在扩展中。\n\
    \n### 实例变量所有权限定符\n\nObjective-C 所有权限定符是一种类型限定符，仅适用于可保留的对象指针类型。在变量声明中，所有权限定符放置在对象指针类型之前，以指定变量的所有权规则。表\
    \ A-2 列出了四种所有权限定符。\n\n**表 A-2.** 对象指针变量所有权限定符\n\n| 限定符 | 描述 |\n| --- | --- |\n\
    | `__autoreleasing` | 当变量被赋新值时，新值会被保留并自动释放，而先前的值会收到一条 release 消息。 |\n| `__weak`\
    \ | 变量使用简单赋值（即，输入值不会被复制或保留）。如果对象被释放，相应的变量值会被设置为`nil`。 |\n| `__unsafe_unretained`\
    \ | 变量使用简单赋值（即，输入值不会被复制或保留）。 |\n| `__strong` | 当变量被赋新值时，新值会被保留，而先前的值会收到一条 release\
    \ 消息。 |\n\n默认的所有权限定符（如果没有提供）是`__strong`。以下语句声明了一个名为`hello`（类型为`Hello *`）的变量，其所有权限定符为`__weak`。\n\
    \n```\n__weak Hello *hello;\n```\n\n### 属性\n\n在 Objective-C 中，属性以访问器方法（即 *getter*\
    \ 和 *setter*）的形式提供了一种便捷的机制，用于访问对象的共享状态。属性与实例变量的不同之处在于它不直接访问对象的内部状态。Objective-C\
    \ 声明的属性使编译器能够根据您提供的规范自动生成这些方法。\n\n属性使用`@property`关键字声明，后跟一组可选的属性（括在圆括号内）、属性类型及其名称。\n\
    \n```\n@property (attributes) type propertyName;\n```\n\n属性声明属性用于指定与属性相关的存储语义和其他行为。表\
    \ A-3 提供了可用的属性列表。\n\n**表 A-3.** 属性\n"
- fmt: "| Attribute | Description | Comments |\n| --- | --- | --- |\n| `readwrite`\
    \ | Required. | Access qualifier. The default setting. |\n| `readonly` | Required.\
    \ | Access qualifier. Cannot select both `readwrite` and `readonly`. |\n| `assign`\
    \ | The `setter` method uses simple assignment (i.e., the input value is not copied\
    \ or retained). | Ownership qualifier. Used under Manual Retain-Release (MRR)\
    \ memory management. The default setting under MRR. |\n| `weak` | The `setter`\
    \ method uses simple assignment (i.e., the input value is not copied or retained).\
    \ If the property instance is deallocated, its value is set to `nil`. | Ownership\
    \ qualifier. Used under ARC memory management. |\n| `unsafe_unretained` | The\
    \ `setter` method uses simple assignment (i.e., the input value is not copied\
    \ or retained). | Ownership qualifier. Used under ARC memory management. |\n|\
    \ `copy` | In the `setter` method, a `copy` method should be called for assignment\
    \ and the old value should be sent a `release` message. | Ownership qualifier.\
    \ |\n| `retain` | In the `setter` method, the previous value will be sent a `release`\
    \ message and the property uses `retain` on assignment. | Ownership qualifier.\
    \ Similar to the `strong` attribute (used under Manual Retain-Release memory management).\
    \ |\n| `strong` | In the `setter` method, the previous value will be sent a `release`\
    \ message and the property uses `retain` on assignment. | Ownership qualifier\
    \ Used under ARC memory management. The default setting under ARC. |\n| `getter=getterName`\
    \ | Names the `getter` method the specified `getterName`. |  |\n| `setter=setterName`\
    \ | Names the `setter` method the specified `setterName`. |  |\n| `nonatomic`\
    \ | Specifies that the accessor methods for this property are not `atomic` (the\
    \ default). The `nonatomic` property setting has better performance, but does\
    \ not guarantee that a whole value is always returned from a property getter or\
    \ setter when being accessed by multiple threads. |  |\n\nA property definition\
    \ is performed in the implementation section of a class. In most cases, a property\
    \ is backed by an instance variable, hence the property definition includes defining\
    \ `getter` and setter methods for the property, declaring an instance variable,\
    \ and using that variable in the `getter`/`setter` methods. Objective-C provides\
    \ three methods for defining a property: explicit definition, synthesis via keyword,\
    \ or autosynthesis.\n\n## Methods\n\nObjective-C supports both instance methods\
    \ and class methods. Instance methods are invoked on class instances (objects);\
    \ as such, instance methods have direct access to an object’s instance variables.\
    \ Class methods are invoked on classes. Methods can be declared in a class interface,\
    \ a protocol, and/or a category. Methods thus declared are defined in a corresponding\
    \ class/category implementation.\n\nA method declaration specifies the method\
    \ type, a return type, its name, its parameter(s), and the corresponding parameter\
    \ types. The *method type* identifier specifies whether the method is a class\
    \ or instance method. A class method is declared with a plus (`+`) sign and indicates\
    \ that the method has class scope, meaning that it operates at the class level\
    \ and does not have access to the instance variables of the class (unless they\
    \ are passed as parameters to the method). An instance method is declared with\
    \ a minus (`-`) sign and indicates that the method has object scope. It operates\
    \ at the instance level and has direct access to the instance variables of the\
    \ object and its parent objects (subject to the access controls on the instance\
    \ variables).\n\nThe method name includes parameters as part of its name, using\
    \ colons. For each parameter, its type is specified in parentheses, followed by\
    \ the method prototype parameter. The parameter name and type are separated by\
    \ a colon; for example, in the following method declaration:\n\n```\n- (void)incrementSum:(int)value;\n\
    ```\n\nThe method name is `incrementSum:` and it has a single parameter of type\
    \ `int` named `value`. Multiple parameters require multiple name-parameter pairs;\
    \ for example, the method declaration\n\n```\n- (int)addAddend1:(int)a1 addend2:(int)a2;\n\
    ```\n\nThe method name is `addAddend1:addend2:` and it has two parameters of type\
    \ `int` named `a1` and `a2`.\n\nThe *return type* indicates the type of the returned\
    \ variable from the method, if any. The return type is specified within parentheses,\
    \ following the method type. If the method does not return anything, its return\
    \ type is declared as `void`.\n\nThe following statement provides an example class\
    \ method declaration for a method named `hydrogenWithProtons:neutrons:` that has\
    \ two parameters of type `unsigned int` named `nProtons` and `nNeutrons`.\n\n\
    ```\n+ (id) hydrogenWithProtons:(unsigned)nProtons neutrons:(unsigned)nNeutrons;\n\
    ```\n\n## Interface\n\nA class interface specifies state and behavior of a class;\
    \ encapsulated in its instance variables, properties and methods. A class interface\
    \ declaration begins with the `@interface` directive and the name of the class;\
    \ it ends with the `@end` directive. The formal syntax for declaring a class interface\
    \ is shown in [Listing A-11](#9781430250500_AppA.xhtml#list11).\n\n[*Listing A-11.*](#9781430250500_AppA.xhtml#_list11)\
    \ Class Interface Syntax\n\n```\n@interface ClassName : SuperclassName\n{\n  //\
    \ instance variable declarations\n}\n\n// Property and method declarations\n@end\n\
    ```\n\nA superclass establishes a common interface and implementation, which specialized\
    \ subclasses can inherit, modify, and supplement. Most classes inherit from the\
    \ `NSObject` class, the root (i.e., base) class of most Foundation Framework class\
    \ hierarchies, which provides a basic interface to the Objective-C runtime.\n\n\
    ### Forward Declarations\n\nThe `@class` directive is used to declare a class\
    \ (in a class interface) prior to obtaining its complete specification. This tells\
    \ the compiler that a class exists (and thus enables it to perform static type\
    \ checking) without having to import its corresponding header file. Forward declarations\
    \ can be useful in resolving circular dependencies between files.\n\n### Implementation\n\
    \nA class implementation defines a class’s behavior by implementing defining its\
    \ properties and implementing its methods. A class implementation declaration\
    \ begins with the `@implementation` directive and the name of the class; it ends\
    \ with the `@end` directive. The formal syntax for declaring a class implementation\
    \ is shown in [Listing A-12](#9781430250500_AppA.xhtml#list12).\n\n[*Listing A-12.*](#9781430250500_AppA.xhtml#_list12)\
    \ Class Implementation Syntax\n\n```\n@implementation ClassName\n{\n  // instance\
    \ variable declarations\n}\n\n// Property and method definitions\n@end\n```\n\n\
    The methods defined in a class implementation must directly map to its corresponding\
    \ interface; for example, [Listing A-13](#9781430250500_AppA.xhtml#list13) depicts\
    \ a `Greeting` class interface and its corresponding implementation.\n\n[*Listing\
    \ A-13.*](#9781430250500_AppA.xhtml#_list13) Greeting Class Interface and Implementation\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface Greeting : NSObject\n\n@property(readwrite)\
    \ NSString *salutation;\n- (void)hello:(NSString *)user;\n\n@end\n\n#import \"\
    Greeting.h\"\n@implementation Greeting\n- (void)hello:(NSString *)user\n{\n  NSLog(@\"\
    %@, %@\", self.salutation, user);\n}\n@end\n```\n\n### Protocol\n\nA protocol\
    \ declares methods and properties that can be implemented by any class. A protocol\
    \ declaration begins with the `@protocol` directive followed by the name of the\
    \ protocol. It ends with the `@end` directive. Protocols can have both *required*\
    \ and *optional* methods; optional methods do not require that an implementation\
    \ of the protocol implement these methods. The directives `@required` and `@optional`\
    \ (followed by the method name(s)) are used to mark a method appropriately. If\
    \ neither keyword is specified, the default behavior is `@required`. The syntax\
    \ of a protocol declaration is shown in [Listing A-14](#9781430250500_AppA.xhtml#list14)."
