    \ in [Listing 2-6](#9781430250500_Ch02.xhtml#list6).\n\n[*Listing 2-6.*](#9781430250500_Ch02.xhtml#_list6)\
    \  Atom Project main() Method\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"Atom.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    Atom *atom = [[Atom alloc] init];\n    NSLog(@\"Atom chemical element\
    \ name: %@\", atom.chemicalElement);\n  }\n\nreturn 0;\n}\n```"
