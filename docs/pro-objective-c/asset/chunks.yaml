    \ **Foundation**，通过勾选**使用自动引用计数**复选框来选择 ARC 内存管理，然后点击**下一步**。\n\n在文件系统中指定项目要创建的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消勾选**源代码控制**复选框，然后点击**创建**按钮。\n\
    \n现在让我们来实现代码。在导航窗格中选择 **main.m** 文件，然后添加代码清单 8-10 中显示的代码。\n\n*代码清单 8-10.*  Introspector\
    \ main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n\n// 测试类 1\n@interface\
    \ Greeter : NSObject\n@property (readwrite, strong) NSString *salutation;\n- (NSString\
    \ *)greeting:(NSString *)recipient;\n@end\n@implementation Greeter\n- (NSString\
    \ *)greeting:(NSString *)recipient\n{\n  return [NSString stringWithFormat:@\"\
    %@, %@\", [self salutation], recipient];\n}\n@end\n\nint main(int argc, const\
    \ char * argv[])\n{\n  @autoreleasepool\n  {\n    Greeter *greeter = [[Greeter\
    \ alloc] init];\n    [greeter setSalutation:@\"Hello\"];\n\nif ([greeter respondsToSelector:@selector(greeting:)]\
    \ &&\n        [greeter conformsToProtocol:@protocol(NSObject)])\n    {\n     \
    \ id result = [greeter performSelector:@selector(greeting:) withObject:@\"Monster!\"\
    ];\n      NSLog(@\"%@\", result);\n    }\n  }\n  return 0;\n}\n```\n\n紧接在 `import`\
    \ 语句之后，代码定义了 `Greeter` 类。这个类定义了一个属性以及一个返回简单问候语的方法。在 `main()` 函数中，你首先创建了一个 `Greeter`\
    \ 实例并设置了该属性的值。接着，你使用了 `NSObject` 运行时方法来执行对象内省。具体来说，你测试了 `NSObject` 的 `respondsToSelector:`\
    \ 和 `conformsToProtocol:` 方法。如果这两个条件表达式返回的结果都是 `YES`，则代码会使用 `NSObject` 运行时方法 `performSelector:withObject:`\
    \ 向 `Greeter` 实例发送一条消息。最后，该方法返回的结果会被记录到输出窗格中。编译并运行程序后，你应该会看到类似于图 8-8 所示的输出。\n\n\
    ![9781430250500_Fig08-08.jpg](img/9781430250500_Fig08-08.jpg)\n\n图 8-8.  Introspector\
    \ 程序输出\n\n`NSObject` 运行时方法的完整列表定义在 `NSObject` 类参考和 `NSObject` 协议参考中。这些内容可以在 Foundation\
    \ 框架参考指南中找到。\n\n## 总结\n\n在本章中，你详细研究了运行时系统架构的关键组成部分。现在，你应该对运行时系统如何实现该语言的面向对象和动态特性有了很好的理解。回顾一下，以下是关键要点：\n\
    \n*   Objective-C 运行时系统有两个主要组成部分：编译器和运行时库。编译器接收输入的 Objective-C 源代码，并生成由运行时库执行的代码。该库在链接阶段会链接到所有\
    \ Objective-C 程序。两者共同实现了该语言的所有面向对象和动态特性。\n*   运行时库 API 定义了一组数据类型、函数和常量。其中许多数据类型和函数对应着\
    \ Objective-C 语言元素（例如对象、类、协议、方法、实例变量等）。运行时库的公共 API 是用 C 语言表达的。\n*   运行时库的实现包含了多种特性和机制，用于增强应用程序的性能和可扩展性。例如方法缓存、虚函数表\
    \ (vtable) 以及 `dyld` 共享缓存的使用。\n*   运行时库利用元类来查找和调用类方法。元类是一种特殊类型的类对象，它存储了使运行时能够查找并调用\
    \ Objective-C 类的类方法所需的信息。\n*   Foundation 框架的 `NSObject` 类提供了一组用于调用运行时系统功能和行为的方法。这些方法执行对象内省、动态方法解析、动态加载和消息转发。\n\
    \n至此，你对运行时系统的深入探讨就完成了。请随时回顾你在最后两章中所学的内容，并尝试运行示例程序。理解运行时系统对于精通 Objective-C 程序开发非常重要。\n\
    \n# 第 9 章\n\n## 专家篇：使用运行时 API\n\n在第 7 章和第 8 章中，你学习了 Objective-C 的动态特性以及实现这些特性的运行时系统的设计和架构。在本专家篇章节中，你将通过几个示例程序来完成本书的第二部分，这将使你能够获得更多关于运行时系统特性及其\
    \ API 的实践经验。你将使用 `NSInvocation` API 创建一个动态代理，使用 `NSBundle` API 执行自定义框架 bundle\
    \ 的动态加载，并创建一个广泛使用运行时库 API 的程序。相信我，完成本章之后，你将很好地掌握 Objective-C 运行时系统的复杂之处！\n\n###\
    \ 使用可加载 Bundle 扩展程序\n\nObjective-C 提供了许多动态编程特性。这些特性增强了语言的能力和灵活性，并使你能够在程序执行期间对其进行修改。在第\
    \ 7 章中，你讨论了动态加载，并简要描述了如何使用 Foundation 框架的 `NSBundle` 类来管理 bundle。现在，你将创建一个程序，利用这些特性通过可加载\
    \ bundle 来扩展正在运行的程序。\n\n#### 方法\n\n对于这个示例，你实际上需要开发两个项目。在一个项目中，你将编写使用可加载 bundle\
    \ 的程序；在另一个项目中，你将创建可加载的 bundle。具体步骤如下：\n"
- fmt: "1.  In Project 1, develop a protocol and a class that conforms to this protocol.\n\
    2.  In Project 2, develop a loadable bundle comprised of a different class conforming\
    \ to this protocol.\n3.  In Project 1, use the `NSBundle` class to find and load\
    \ this bundle, create an object from a class in the bundle (developed in step\
    \ 2), and then invoke a method on this object.\n\nSounds like fun, right? OK,\
    \ let’s get started!\n\n## Step 1: Laying the Foundation\n\nIn Xcode, create a\
    \ new project by selecting **New** ![image](images/arrow.jpg) **Project …** from\
    \ the Xcode File menu. In the **New Project Assistant** pane, create a command-line\
    \ application. In the **Project Options** window, specify **DynaLoader** for the\
    \ Product Name, choose **Foundation** for the Project Type, and select ARC memory\
    \ management by selecting the **Use Automatic Reference Counting** check box.\
    \ Specify the location in your file system where you want the project to be created\
    \ (if necessary, select **New Folder** and enter the name and location for the\
    \ folder), uncheck the **Source Control** check box, and then click the **Create**\
    \ button.\n\nNow you’re going to create a protocol and a class that conforms to\
    \ the protocol. You probably recall from [Chapter 2](#9781430250500_Ch02.xhtml)\
    \ that a protocol declares methods and properties that can be implemented by any\
    \ class. Combined with dynamic typing, this provides an idea mechanism for specifying\
    \ a set of methods implemented by a class that is dynamically loaded from a bundle.\
    \ Select **New** ![image](images/arrow.jpg) **File …** from the Xcode File menu,\
    \ select the **Objective-C** protocol template, name the protocol **Greeter**,\
    \ select the **DynaLoader** folder for the files location and the **DynaLoader**\
    \ project as the target, and then click the **Create** button. A header file named\
    \ `Greeter.h` has been added to the Xcode project navigator pane. Click this file\
    \ to display the `Greeter` protocol (see [Listing 9-1](#9781430250500_Ch09.xhtml#list1)).\n\
    \n[*Listing 9-1.*](#9781430250500_Ch09.xhtml#_list1)  Greeter Protocol Template\
    \ File\n\n```\n#import <Foundation/Foundation.h>\n\n@protocol Greeter <NSObject>\n\
    \n@end\n```\n\nIn the editor pane, update the `Greeter.h` file as shown in [Listing\
    \ 9-2](#9781430250500_Ch09.xhtml#list2).\n\n[*Listing 9-2.*](#9781430250500_Ch09.xhtml#_list2)\
    \  Greeter Protocol Updates\n\n```\n#import <Foundation/Foundation.h>\n\n@protocol\
    \ Greeter <NSObject>\n\n- (NSString *) greeting:(NSString *)salutation;\n\n@end\n\
    ```\n\nThis protocol declares a method named `greeting:` that takes an `NSString`\
    \ pointer as its parameter and returns an `NSString` pointer. Now let’s implement\
    \ a class that conforms to the `Greeter` protocol. Select **New** ![image](images/arrow.jpg)\
    \ **File …** from the Xcode File menu, select the **Objective-C** class template,\
    \ name the class **BasicGreeter** (select **NSObject** in the **Subclass of**\
    \ drop-down list), select the **DynaLoader** folder for the files location and\
    \ the **DynaLoader** project as the target, and then click the **Create** button.\
    \ Next, in the Xcode project navigator pane, select the resulting header file\
    \ named **BasicGreeter.h** and update the interface as shown in [Listing 9-3](#9781430250500_Ch09.xhtml#list3).\n\
    \n[*Listing 9-3.*](#9781430250500_Ch09.xhtml#_list3)  BasicGreeter Interface\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Greeter.h\"\n\n@interface\
    \ BasicGreeter : NSObject <Greeter>\n\n@end\n```\n\nThe template `BasicGreeter`\
    \ interface has been updated to adopt the `Greeter` protocol; now select the `BasicGreeter.m`\
    \ file and update the implementation as shown in [Listing 9-4](#9781430250500_Ch09.xhtml#list4).\n\
    \n[*Listing 9-4.*](#9781430250500_Ch09.xhtml#_list4)  BasicGreeter Implementation\n\
    \n```\n#import \"BasicGreeter.h\"\n\n@implementation BasicGreeter\n\n- (NSString\
    \ *) greeting:(NSString *)salutation\n{\n  return [NSString stringWithFormat:@\"\
    %@, World!\", salutation];\n}\n\n@end\n```\n\nThe `BasicGreeter` implementation\
    \ defines the `greeting:` method (and thus conforms to the `Greeter` protocol),\
    \ returning a text string that begins with the method’s input parameter. Now let’s\
    \ test this class. Select the `main.m` file and update the `main()` function,\
    \ as shown in [Listing 9-5](#9781430250500_Ch09.xhtml#list5).\n\n[*Listing 9-5.*](#9781430250500_Ch09.xhtml#_list5)\
    \  BasicGreeter main() Function\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"BasicGreeter.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    id<Greeter> greeter = [[BasicGreeter alloc] init];\n    NSLog(@\"%@\"\
    , [greeter greeting:@\"Hello\"]);\n  }\n  return 0;\n}\n```\n\nFirst, the function\
    \ creates a `BasicGreeter` object and assigns it to a variable named `greeter`.\
    \ This variable is declared to be of type `id` and conforms to the `Greeter` protocol.\
    \ It then invokes the `greeting:` method on the object, and logs the result in\
    \ the output pane. By declaring the variable as\n\n```\nid<Greeter> greeter\n\
    ```\n\nit can be assigned to any Objective-C object that conforms to the `Greeter`\
    \ protocol. If you compile and run the program now, the output pane displays “Hello,\
    \ World!” (see [Figure 9-1](#9781430250500_Ch09.xhtml#Fig1)).\n\n![9781430250500_Fig09-01.jpg](images/9781430250500_Fig09-01.jpg)\n\
    \n[Figure 9-1](#9781430250500_Ch09.xhtml#_Fig1). DynaLoader program output\n\n\
    Great! You have completed step 1. Now you will create another class that conforms\
    \ to the `Greeter` protocol, this time packaged in a loadable bundle.\n\n## Step\
    \ 2: Creating a Loadable Bundle\n\nXcode makes it easy to create a loadable bundle.\
    \ It’s simply another type of project. First, create a new project by selecting\
    \ **New** ![image](images/arrow.jpg) **Project …** from the Xcode File menu. In\
    \ the **New Project Assistant** pane under OS X, select **Framework & Library**,\
    \ and then select **Bundle** (see [Figure 9-2](#9781430250500_Ch09.xhtml#Fig2)).\n\
    \n![9781430250500_Fig09-02.jpg](images/9781430250500_Fig09-02.jpg)\n\n[Figure\
    \ 9-2](#9781430250500_Ch09.xhtml#_Fig2). Xcode New Project Assistant, selecting\
    \ a Bundle project template\n\nNext, in the **Project Options** window, specify\
    \ **CustomGreeter** for the Product Name, an **Organization Name** (optional value),\
    \ and a **Company Identifier** (the default value is fine, but any name will suffice).\
    \ Select **Cocoa** for the Framework the bundle will link against, and select\
    \ ARC memory management by checking the **Use Automatic Reference Counting** check\
    \ box. Specify the location in your file system where you want the project to\
    \ be created (if necessary, select **New Folder** and enter the name and location\
    \ for the folder), uncheck the **Source Control** check box, *do not* add to any\
    \ project or workspace, and then click the **Create** button. The workspace window\
    \ shown in [Figure 9-3](#9781430250500_Ch09.xhtml#Fig3) is displayed.\n\n![9781430250500_Fig09-03.jpg](images/9781430250500_Fig09-03.jpg)\n\
    \n[Figure 9-3](#9781430250500_Ch09.xhtml#_Fig3). CustomGreeter bundle template\n\
    \nCool. Xcode created an empty bundle. In the project navigator pane under the\
    \ Products group, notice the `CustomGreeter.bundle` file. This is the bundle to\
    \ which you’ll add your code and resources. Also note the `CustomGreeter-Info.plist`\
    \ file. It is a required file that contains information about the bundle’s configuration.\
    \ Now let’s add a class to this bundle that implements the `Greeter` protocol.\
    \ First, you need to include the `Greeter.h` header file in the bundle. Fortunately,\
    \ Xcode provides a simple mechanism for importing files into a project. Hold down\
    \ the Ctrl key and (from the Xcode project navigator pane) select the **CustomGreeter**\
    \ project. A drop-down window then displays a set of options. Select the **Add\
    \ Files to “CustomGreeter” …** option (see [Figure 9-4](#9781430250500_Ch09.xhtml#Fig4)).\n\
    \n![9781430250500_Fig09-04.jpg](images/9781430250500_Fig09-04.jpg)\n\n[Figure\
    \ 9-4](#9781430250500_Ch09.xhtml#_Fig4). Adding files to CustomGreeter option"
  raw: '1.  In Project 1, develop a protocol and a class that conforms to this protocol.

    2.  In Project 2, develop a loadable bundle comprised of a different class conforming
    to this protocol.

    3.  In Project 1, use the NSBundle class to find and load this bundle, create
    an object from a class in the bundle (developed in step 2), and then invoke a
    method on this object.


    Sounds like fun, right? OK, let’s get started!


    Step 1: Laying the Foundation


    In Xcode, create a new project by selecting **New ![image](images/arrow.jpg) Project
    …** from the Xcode File menu. In the **New Project Assistant** pane, create a
    command-line application. In the **Project Options** window, specify **DynaLoader**
    for the Product Name, choose **Foundation** for the Project Type, and select ARC
    memory management by selecting the **Use Automatic Reference Counting** check
    box. Specify the location in your file system where you want the project to be
    created (if necessary, select **New Folder** and enter the name and location for
    the folder), uncheck the **Source Control** check box, and then click the **Create**
    button.


    Now you’re going to create a protocol and a class that conforms to the protocol.
    You probably recall from [Chapter 2](#9781430250500_Ch02.xhtml) that a protocol
    declares methods and properties that can be implemented by any class. Combined
    with dynamic typing, this provides an idea mechanism for specifying a set of methods
    implemented by a class that is dynamically loaded from a bundle. Select **New
    ![image](images/arrow.jpg) File …** from the Xcode File menu, select the **Objective-C**
    protocol template, name the protocol **Greeter**, select the **DynaLoader** folder
    for the files location and the **DynaLoader** project as the target, and then
    click the **Create** button. A header file named `Greeter.h` has been added to
    the Xcode project navigator pane. Click this file to display the `Greeter` protocol
    (see [Listing 9-1](#9781430250500_Ch09.xhtml#list1)).


    [*Listing 9-1.*](#9781430250500_Ch09.xhtml#_list1)  Greeter Protocol Template
    File


    ```

    #import <Foundation/Foundation.h>


    @protocol Greeter <NSObject>


    @end

    ```


    In the editor pane, update the `Greeter.h` file as shown in [Listing 9-2](#9781430250500_Ch09.xhtml#list2).


    [*Listing 9-2.*](#9781430250500_Ch09.xhtml#_list2)  Greeter Protocol Updates


    ```

    #import <Foundation/Foundation.h>


    @protocol Greeter <NSObject>


    - (NSString *) greeting:(NSString *)salutation;


    @end

    ```


    This protocol declares a method named `greeting` that takes an `NSString` pointer
    as its parameter and returns an `NSString` pointer. Now let’s implement a class
    that conforms to the `Greeter` protocol. Select **New ![image](images/arrow.jpg)
    File …** from the Xcode File menu, select the **Objective-C** class template,
    name the class **BasicGreeter** (select **NSObject** in the **Subclass of** drop-down
    list), select the **DynaLoader** folder for the files location and the **DynaLoader**
    project as the target, and then click the **Create** button. Next, in the Xcode
    project navigator pane, select the resulting header file named **BasicGreeter.h**
    and update the interface as shown in [Listing 9-3](#9781430250500_Ch09.xhtml#list3).


    [*Listing 9-3.*](#9781430250500_Ch09.xhtml#_list3)  BasicGreeter Interface


    ```

    #import <Foundation/Foundation.h>

    #import "Greeter.h"


    @interface BasicGreeter : NSObject <Greeter>


    @end

    ```


    The template `BasicGreeter` interface has been updated to adopt the `Greeter`
    protocol; now select the **BasicGreeter.m** file and update the implementation
    as shown in [Listing 9-4](#9781430250500_Ch09.xhtml#list4).


    [*Listing 9-4.*](#9781430250500_Ch09.xhtml#_list4)  BasicGreeter Implementation


    ```

    #import "BasicGreeter.h"


    @implementation BasicGreeter


    - (NSString *) greeting:(NSString *)salutation

    {

      return [NSString stringWithFormat:@"%@, World!", salutation];

    }


    @end

    ```


    The `BasicGreeter` implementation defines the `greeting:` method (and thus conforms
    to the `Greeter` protocol), returning a text string that begins with the method’s
    input parameter. Now let’s test this class. Select the **main.m** file and update
    the `main()` function, as shown in [Listing 9-5](#9781430250500_Ch09.xhtml#list5).


    [*Listing 9-5.*](#9781430250500_Ch09.xhtml#_list5)  BasicGreeter main() Function


    ```

    #import <Foundation/Foundation.h>

    #import "BasicGreeter.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        id<Greeter> greeter = [[BasicGreeter alloc] init];

        NSLog(@"%@", [greeter greeting:@"Hello"]);

      }

      return 0;

    }

    ```


    First, the function creates a `BasicGreeter` object and assigns it to a variable
    named `greeter`. This variable is declared to be of type `id` and conforms to
    the `Greeter` protocol. It then invokes the `greeting:` method on the object,
    and logs the result in the output pane. By declaring the variable as


    ```

    id<Greeter> greeter

    ```


    it can be assigned to any Objective-C object that conforms to the `Greeter` protocol.
    If you compile and run the program now, the output pane displays “Hello, World!”
    (see [Figure 9-1](#9781430250500_Ch09.xhtml#Fig1)).


    ![9781430250500_Fig09-01.jpg](images/9781430250500_Fig09-01.jpg)


    [Figure 9-1](#9781430250500_Ch09.xhtml#_Fig1). DynaLoader program output


    Great! You have completed step 1\. Now you will create another class that conforms
    to the Greeter protocol, this time packaged in a loadable bundle.


    Step 2: Creating a Loadable Bundle


    Xcode makes it easy to create a loadable bundle. It’s simply another type of project.
    First, create a new project by selecting **New ![image](images/arrow.jpg) Project
    …** from the Xcode File menu. In the **New Project Assistant** pane under OS X,
    select **Framework & Library**, and then select **Bundle** (see [Figure 9-2](#9781430250500_Ch09.xhtml#Fig2)).


    ![9781430250500_Fig09-02.jpg](images/9781430250500_Fig09-02.jpg)


    [Figure 9-2](#9781430250500_Ch09.xhtml#_Fig2). Xcode New Project Assistant, selecting
    a Bundle project template


    Next, in the **Project Options** window, specify **CustomGreeter** for the Product
    Name, an **Organization Name** (optional value), and a **Company Identifier**
    (the default value is fine, but any name will suffice). Select **Cocoa** for the
    Framework the bundle will link against, and select ARC memory management by checking
    the **Use Automatic Reference Counting** check box. Specify the location in your
    file system where you want the project to be created (if necessary, select **New
    Folder** and enter the name and location for the folder), uncheck the **Source
    Control** check box, *do not* add to any project or workspace, and then click
    the **Create** button. The workspace window shown in [Figure 9-3](#9781430250500_Ch09.xhtml#Fig3)
    is displayed.


    ![9781430250500_Fig09-03.jpg](images/9781430250500_Fig09-03.jpg)


    [Figure 9-3](#9781430250500_Ch09.xhtml#_Fig3). CustomGreeter bundle template


    Cool. Xcode created an empty bundle. In the project navigator pane under the Products
    group, notice the `CustomGreeter.bundle` file. This is the bundle to which you’ll
    add your code and resources. Also note the `CustomGreeter-Info.plist` file. It
    is a required file that contains information about the bundle’s configuration.
    Now let’s add a class to this bundle that implements the `Greeter` protocol. First,
    you need to include the `Greeter.h` header file in the bundle. Fortunately, Xcode
    provides a simple mechanism for importing files into a project. Hold down the
    Ctrl key and (from the Xcode project navigator pane) select the **CustomGreeter**
    project. A drop-down window then displays a set of options. Select the **Add Files
    to “CustomGreeter” …** option (see [Figure 9-4](#9781430250500_Ch09.xhtml#Fig4)).


    ![9781430250500_Fig09-04.jpg](images/9781430250500_Fig09-04.jpg)


    [Figure 9-4](#9781430250500_Ch09.xhtml#_Fig4). Adding files to CustomGreeter option'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n1.  在项目 1 中，开发一个协议以及一个遵循该协议的类。\n\
    2.  在项目 2 中，开发一个可加载的 bundle，其中包含一个遵循此协议的不同类。\n3.  在项目 1 中，使用 `NSBundle` 类来查找并加载此\
    \ bundle，从 bundle 中的类（步骤 2 中开发的）创建一个对象，然后调用该对象上的一个方法。\n\n听起来很有趣，对吧？好的，让我们开始吧！\n\
    \n## 步骤 1：奠定基础\n\n在 Xcode 中，通过从 Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg)\
    \ **项目…** 来创建一个新项目。在“新建项目助理”窗格中，创建一个命令行应用程序。在“项目选项”窗口中，将 **DynaLoader** 指定为产品名称，选择\
    \ **Foundation** 作为项目类型，并通过选中**使用自动引用计数**复选框来选择 ARC 内存管理。在文件系统中指定你想要创建项目的位置（如有需要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，然后单击**创建**按钮。\n\
    \n现在，你将创建一个协议和一个遵循该协议的类。你可能还记得第 2 章中提到，协议声明了任何类都可以实现的方法和属性。结合动态类型，这为指定一个从 bundle\
    \ 动态加载的类所实现的一组方法提供了一种理想的机制。从 Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg) **文件…**，选择\
    \ **Objective-C** 协议模板，将协议命名为 **Greeter**，选择 **DynaLoader** 文件夹作为文件位置，选择 **DynaLoader**\
    \ 项目作为目标，然后单击**创建**按钮。一个名为 `Greeter.h` 的头文件已被添加到 Xcode 项目导航器窗格中。点击此文件以显示 `Greeter`\
    \ 协议（参见列表 9-1）。\n\n*列表 9-1.* Greeter 协议模板文件\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@protocol Greeter <NSObject>\n\n@end\n```\n\n在编辑器窗格中，按照列表 9-2 所示更新 `Greeter.h`\
    \ 文件。\n\n*列表 9-2.* Greeter 协议更新\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @protocol Greeter <NSObject>\n\n- (NSString *) greeting:(NSString *)salutation;\n\
    \n@end\n```\n\n此协议声明了一个名为 `greeting:` 的方法，该方法接受一个 `NSString` 指针作为参数，并返回一个 `NSString`\
    \ 指针。现在让我们实现一个遵循 `Greeter` 协议的类。从 Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg)\
    \ **文件…**，选择 **Objective-C** 类模板，将类命名为 **BasicGreeter**（在**子类于**下拉列表中选择 **NSObject**），选择\
    \ **DynaLoader** 文件夹作为文件位置，选择 **DynaLoader** 项目作为目标，然后单击**创建**按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件\
    \ **BasicGreeter.h**，并按照列表 9-3 所示更新接口。\n\n*列表 9-3.* BasicGreeter 接口\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"Greeter.h\"\n\n@interface BasicGreeter\
    \ : NSObject <Greeter>\n\n@end\n```\n\n模板 `BasicGreeter` 接口已更新以采用 `Greeter` 协议；现在选择\
    \ `BasicGreeter.m` 文件，并按照列表 9-4 所示更新实现。\n\n*列表 9-4.* BasicGreeter 实现\n\n```\n\
    #import \"BasicGreeter.h\"\n\n@implementation BasicGreeter\n\n- (NSString *) greeting:(NSString\
    \ *)salutation\n{\n  return [NSString stringWithFormat:@\"%@, World!\", salutation];\n\
    }\n\n@end\n```\n\n`BasicGreeter` 实现定义了 `greeting:` 方法（从而遵循了 `Greeter` 协议），返回一个以方法输入参数开头的文本字符串。现在让我们测试这个类。选择\
    \ `main.m` 文件，并按照列表 9-5 所示更新 `main()` 函数。\n\n*列表 9-5.* BasicGreeter main() 函数\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"BasicGreeter.h\"\n\nint main(int\
    \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    id<Greeter> greeter\
    \ = [[BasicGreeter alloc] init];\n    NSLog(@\"%@\", [greeter greeting:@\"Hello\"\
    ]);\n  }\n  return 0;\n}\n```\n\n首先，该函数创建一个 `BasicGreeter` 对象并将其分配给一个名为 `greeter`\
    \ 的变量。该变量被声明为 `id` 类型并遵循 `Greeter` 协议。然后，它调用该对象上的 `greeting:` 方法，并将结果记录在输出窗格中。通过将变量声明为\n\
    \n```\nid<Greeter> greeter\n```\n\n它可以被分配给任何遵循 `Greeter` 协议的 Objective-C 对象。如果你现在编译并运行程序，输出窗格将显示“Hello,\
    \ World!”（参见图 9-1）。\n\n![9781430250500_Fig09-01.jpg](img/9781430250500_Fig09-01.jpg)\n\
    \n图 9-1. DynaLoader 程序输出\n\n太棒了！你已经完成了步骤 1。现在你将创建另一个遵循 `Greeter` 协议的类，这次将其打包到一个可加载的\
    \ bundle 中。\n\n## 步骤 2：创建可加载的 Bundle\n\nXcode 使得创建可加载的 bundle 变得简单。它只是另一种类型的项目。首先，通过从\
    \ Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg) **项目…** 来创建一个新项目。在 OS X 下的“新建项目助理”窗格中，选择**框架与库**，然后选择**Bundle**（参见图\
    \ 9-2）。\n\n![9781430250500_Fig09-02.jpg](img/9781430250500_Fig09-02.jpg)\n\n图\
    \ 9-2. Xcode 新建项目助理，选择 Bundle 项目模板\n\n接下来，在“项目选项”窗口中，将 **CustomGreeter** 指定为产品名称，**组织名称**（可选值），以及**公司标识符**（默认值即可，但任何名称都可以）。选择\
    \ **Cocoa** 作为 bundle 将链接的框架，并通过选中**使用自动引用计数**复选框来选择 ARC 内存管理。在文件系统中指定你想要创建项目的位置（如有需要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，*不要*添加到任何项目或工作区，然后单击**创建**按钮。将显示图\
    \ 9-3 所示的工作区窗口。\n\n![9781430250500_Fig09-03.jpg](img/9781430250500_Fig09-03.jpg)\n\
    \n图 9-3. CustomGreeter bundle 模板\n\n真酷。Xcode 创建了一个空的 bundle。在“产品”组下的项目导航器窗格中，注意\
    \ `CustomGreeter.bundle` 文件。这是你将添加代码和资源的 bundle。还要注意 `CustomGreeter-Info.plist`\
    \ 文件。这是一个必需的文件，包含有关 bundle 配置的信息。现在让我们向这个 bundle 添加一个实现 `Greeter` 协议的类。首先，你需要在\
    \ bundle 中包含 `Greeter.h` 头文件。幸运的是，Xcode 提供了一种简单的机制来将文件导入项目。按住 Ctrl 键，并（从 Xcode\
    \ 项目导航器窗格中）选择 **CustomGreeter** 项目。然后会显示一个下拉窗口，其中包含一组选项。选择**将文件添加到“CustomGreeter”…**\
    \ 选项（参见图 9-4）。\n\n![9781430250500_Fig09-04.jpg](img/9781430250500_Fig09-04.jpg)\n\
    \n图 9-4. 向 CustomGreeter 选项添加文件\n"
- fmt: "`Greeter.h`文件位于您在步骤1中创建的`DynaLoader`项目文件夹下。导航到此项目文件夹，选中该文件，并点击 **Add** 按钮（见图\
    \ [9-5](#9781430250500_Ch09.xhtml#Fig5)）将其添加到`CustomGreeter`包中。\n\n![9781430250500_Fig09-05.jpg](images/9781430250500_Fig09-05.jpg)\n\
    \n**图 9-5.** 将`Greeter.h`文件添加到`CustomGreeter`包\n\n现在，为这个包添加一个遵循此协议的新类。从 Xcode\
    \ 的 File 菜单中，选择 **New ![image](images/arrow.jpg) File …**，选择 **Objective-C** 类模板，将类命名为\
    \ `CustomGreeter`（在 **Subclass of** 下拉列表中选择 `NSObject`），选择 `CustomGreeter` 文件夹作为文件位置，选择\
    \ `CustomGreeter` 项目作为目标，然后点击 **Create** 按钮。在 Xcode 的项目导航窗格中，选择生成的头文件 `CustomGreeter.h`，并更新接口，如下面的代码清单\
    \ [9-6](#9781430250500_Ch09.xhtml#list6) 所示。\n\n**代码清单 9-6.** `CustomGreeter`\
    \ 接口\n\n```objc\n#import <Foundation/Foundation.h>\n#import \"Greeter.h\"\n\n\
    @interface CustomGreeter : NSObject <Greeter>\n\n@end\n```\n\n与 `BasicGreeter`\
    \ 类一样，模板化的 `CustomGreeter` 接口已经更新，以遵行 `Greeter` 协议。现在选择 `CustomGreeter.m` 文件，并更新其实现，如下面的代码清单\
    \ [9-7](#9781430250500_Ch09.xhtml#list7) 所示。\n\n**代码清单 9-7.** `CustomGreeter`\
    \ 实现\n\n```objc\n#import \"CustomGreeter.h\"\n\n@implementation CustomGreeter\n\
    \n- (NSString *) greeting:(NSString *)salutation\n{\n  return [NSString stringWithFormat:@\"\
    %@, Universe!\", salutation];\n}\n\n@end\n```\n\n`CustomGreeter` 实现定义了 `greeting:`\
    \ 方法（因此遵行了 `Greeter` 协议），返回一个以方法输入参数开头的文本字符串。现在，通过从 Xcode 的 Product 菜单中选择 **Build**\
    \ 来编译这个包。这样就完成了——您创建了一个可加载的包，其中包含一个遵行 `Greeter` 协议的类（`CustomGreeter`）。在 Xcode\
    \ 的项目导航窗格中，注意 Products 组中的 `CustomGreeter.bundle` 文件。选中这个包文件，并在 Xcode 的文件检查器（Xcode\
    \ 工作区窗口的右侧）中注意图 [9-6](#9781430250500_Ch09.xhtml#Fig6) 中所示的完整路径。这指示了在使用 `NSBundle`\
    \ 类加载包时所需的 `CustomGreeter.bundle` 文件的路径。\n\n![9781430250500_Fig09-06.jpg](images/9781430250500_Fig09-06.jpg)\n\
    \n**图 9-6.** `CustomGreeter.bundle` 的完整路径\n\n### 步骤 3：动态加载包\n\n现在您已经创建了一个可加载的包，让我们使用它来动态创建一个对象（来自包中的类）并调用其方法。在\
    \ Xcode 中，返回到 `DynaLoader` 项目，在项目导航窗格中选择 `main.m` 文件，并更新 `main()` 函数，如下面的代码清单\
    \ [9-8](#9781430250500_Ch09.xhtml#list8) 所示。\n\n**代码清单 9-8.** 使用 `NSBundle` 加载包\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"BasicGreeter.h\"\n\nint\
    \ main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    id<Greeter>\
    \ greeter = [[BasicGreeter alloc] init];\n    NSLog(@\"%@\", [greeter greeting:@\"\
    Hello\"]);\n\n// Now create a bundle at the specified path (retrieved from input\
    \ argument)\n    NSString *bundlePath;\n    if (argc != 2)\n    {\n      // No\
    \ bundle path provided, exit\n      NSLog(@\"Please provide a path for the bundle\"\
    );\n    }\n    else\n    {\n      bundlePath = [NSString stringWithUTF8String:argv[1]];\n\
    \      NSBundle *greeterBundle = [NSBundle bundleWithPath:bundlePath];\n     \
    \ if (greeterBundle == nil)\n      {\n        NSLog(@\"Bundle not found at path\"\
    );\n      }\n      else\n      {\n        // Dynamically load bundle\n       \
    \ NSError *error;\n        BOOL isLoaded = [greeterBundle loadAndReturnError:&error];\n\
    \        if (!isLoaded)\n        {\n          NSLog(@\"Error = %@\", [error localizedDescription]);\n\
    \        }\n        else\n        {\n          // Bundle loaded, create an object\
    \ using bundle and send it a message\n          Class greeterClass = [greeterBundle\
    \ classNamed:@\"CustomGreeter\"];\n          greeter = [[greeterClass alloc] init];\n\
    \          NSLog(@\"%@\", [greeter greeting:@\"Hello\"]);\n\n// Done with dynamically\
    \ loaded bundle, now unload it\n          // First release any objects whose class\
    \ is defined in the bundle!\n          greeter = nil;\n          BOOL isUnloaded\
    \ = [greeterBundle unload];\n          if (!isUnloaded)\n          {\n       \
    \     NSLog(@\"Couldn't unload bundle\");\n          }\n        }\n      }\n \
    \   }\n  }\n  return 0;\n}\n```\n\n我知道您在这里添加了很多代码，但不用担心。我们将一步一步地讲解。从功能上讲，这些更新实现了以下逻辑：\n\
    \n1.  检索包路径参数\n2.  创建 `NSBundle` 对象\n3.  加载包\n4.  获取包中的类\n5.  卸载包\n6.  设置包路径参数\n\
    \n接下来，我们依次讨论每部分的代码。\n\n### 检索包路径参数\n\n您可能已经注意到，Objective-C 的 `main()` 函数指定了两个参数：`argc`\
    \ 和 `argv`。这些参数使您能够在程序执行时向其传递参数。\n\n```objc\nint main(int argc, const char * argv[])\n\
    ```\n\n参数 `argc` 是程序的参数数量，以空格分隔的参数值存储在 `argv` 数组中。`argv` 数组中的第一个参数（`argv[0]`）是程序可执行文件的名称，因此\
    \ `argc` 参数的值始终大于或等于一。例如，假设 `DynaLoader` 程序是从命令行执行的，如下所示：\n\n```\n> DynaLoader\
    \ /CustomGreeter.bundle\n```\n\n此时，`main()` 函数中的变量 `argc` 将为 2，`argv` 数组将包含两个元素：第一个元素的值为\
    \ `DynaLoader`，第二个元素的值为 `/CustomGreeter.bundle`。`main()` 函数已更新，要求将包路径作为输入参数提供给程序。以下来自代码清单\
    \ [9-8](#9781430250500_Ch09.xhtml#list8) 的代码验证了程序具有正确的参数数量，然后创建了该路径。\n\n```objc\n\
    NSString *bundlePath;\nif (argc != 2)\n{\n  // No bundle path provided, exit\n\
    \  NSLog(@\"Please provide a path for the bundle\");\n}\nelse\n{\n  bundlePath\
    \ = [NSString stringWithUTF8String:argv[1]];\n```\n\n条件逻辑（`if (argc != 2)`）检查\
    \ `argc` 计数是否为 2（一个用于程序名称，一个用于包路径）。如果计数不等于 2，则向输出面板记录一条消息并退出程序；否则，将路径分配给正确的输入参数（`argv[1]`），程序继续执行。\n\
    \n### 创建 `NSBundle` 对象\n\n下一组语句使用包路径创建了一个 `NSBundle` 对象，并验证该对象是否成功创建。代码使用了一个 `NSBundle`\
    \ 便利类方法，为指定路径的包创建并初始化类实例。\n\n```objc\n+ (NSBundle *) bundleWithPath:(NSString\
    \ *) fullPath;\n```\n\n该代码尝试使用提供的路径创建一个包对象；如果不成功，它会向输出面板记录一条消息。"
  raw: 'The `Greeter.h` file is located under the DynaLoader project folder that you
    created in step 1\. Navigate to this project folder, select the file, and click
    the **Add** button (see [Figure 9-5](#9781430250500_Ch09.xhtml#Fig5)) to add it
    to the `CustomGreeter` bundle.


    ![9781430250500_Fig09-05.jpg](images/9781430250500_Fig09-05.jpg)


    [Figure 9-5](#9781430250500_Ch09.xhtml#_Fig5). Adding the Greeter.h file to the
    CustomGreeter bundle


    Now add a new class to the bundle that conforms to this protocol. Select **New
    ![image](images/arrow.jpg) File …** from the Xcode File menu, select the **Objective-C**
    class template, name the class **CustomGreeter** (select NSObject in the **Subclass
    of** drop-down list), select the **CustomGreeter** folder for the files location
    and the **CustomGreeter** project as the target, and then click the **Create**
    button. In the Xcode project navigator pane, select the resulting header file
    named `CustomGreeter.h` and update the interface, as shown in [Listing 9-6](#9781430250500_Ch09.xhtml#list6).


    [*Listing 9-6.*](#9781430250500_Ch09.xhtml#_list6)  CustomGreeter Interface


    ```

    #import <Foundation/Foundation.h>

    #import "Greeter.h"


    @interface CustomGreeter : NSObject <Greeter>


    @end

    ```


    As with the `BasicGreeter` class, the template CustomGreeter interface has been
    updated to adopt the `Greeter` protocol. Now select the `CustomGreeter.m` file
    and update the implementation as shown in [Listing 9-7](#9781430250500_Ch09.xhtml#list7).


    [*Listing 9-7.*](#9781430250500_Ch09.xhtml#_list7)  CustomGreeter Implementation


    ```

    #import "CustomGreeter.h"


    @implementation CustomGreeter


    - (NSString *) greeting:(NSString *)salutation

    {

      return [NSString stringWithFormat:@"%@, Universe!", salutation];

    }


    @end

    ```


    The `CustomGreeter` implementation defines the `greeting:` method (and thus conforms
    to the `Greeter` protocol), returning a text string that begins with the method’s
    input parameter. Now compile the bundle by selecting **Build** from the Xcode
    Product menu. And that’s it—you’ve created a loadable bundle that includes a class
    (`CustomGreeter`) that conforms to the `Greeter` protocol. In the Xcode project
    navigator pane, note the `CustomGreeter.bundle` file in the Products group. Select
    this bundle file and note in the Xcode file inspector (on the right side of the
    Xcode workspace window) the full path shown in [Figure 9-6](#9781430250500_Ch09.xhtml#Fig6).
    This indicates the path to `the CustomGreeter.bundle` file that you’ll need when
    you load the bundle using the `NSBundle` class.


    ![9781430250500_Fig09-06.jpg](images/9781430250500_Fig09-06.jpg)


    [Figure 9-6](#9781430250500_Ch09.xhtml#_Fig6). CustomGreeter.bundle full path


    Step 3: Dynamically Loading the Bundle


    Now that you have created a loadable bundle, let’s use it to dynamically create
    an object (from a bundle class) and invoke a method on it. In Xcode, return to
    the DynaLoader project, select the **main.m** file in the project navigator pane,
    and update the `main()` function as shown in [Listing 9-8](#9781430250500_Ch09.xhtml#list8).


    [*Listing 9-8.*](#9781430250500_Ch09.xhtml#_list8)  Using NSBundle to Load a Bundle


    ```

    #import <Foundation/Foundation.h>

    #import "BasicGreeter.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        id<Greeter> greeter = [[BasicGreeter alloc] init];

        NSLog(@"%@", [greeter greeting:@"Hello"]);


    // Now create a bundle at the specified path (retrieved from input argument)

        NSString *bundlePath;

        if (argc != 2)

        {

          // No bundle path provided, exit

          NSLog(@"Please provide a path for the bundle");

        }

        else

        {

          bundlePath = [NSString stringWithUTF8String:argv[1]];

          NSBundle *greeterBundle = [NSBundle bundleWithPath:bundlePath];

          if (greeterBundle == nil)

          {

            NSLog(@"Bundle not found at path");

          }

          else

          {

            // Dynamically load bundle

            NSError *error;

            BOOL isLoaded = [greeterBundle loadAndReturnError:&error];

            if (!isLoaded)

            {

              NSLog(@"Error = %@", [error localizedDescription]);

            }

            else

            {

              // Bundle loaded, create an object using bundle and send it a message

              Class greeterClass = [greeterBundle classNamed:@"CustomGreeter"];

              greeter = [[greeterClass alloc] init];

              NSLog(@"%@", [greeter greeting:@"Hello"]);


    // Done with dynamically loaded bundle, now unload it

              // First release any objects whose class is defined in the bundle!

              greeter = nil;

              BOOL isUnloaded = [greeterBundle unload];

              if (!isUnloaded)

              {

                NSLog(@"Couldn''t unload bundle");

              }

            }

          }

        }

      }

      return 0;

    }

    ```


    I know, you added a lot of code here, but don’t worry. You’ll take this one step
    at a time. Functionally, the updates implement the following logic:


    1.  Retrieve the bundle path argument

    2.  Create an `NSBundle` object

    3.  Load the bundle

    4.  Get a bundle class

    5.  Unload the bundle

    6.  Set the bundle path argument


    Let’s discuss the code for each of these in turn.


    Retrieving the Bundle Path Argument


    As you’ve probably observed by now, an Objective-C `main()` function specifies
    two parameters: `argc` and `argv`. These parameters enable you to pass arguments
    to the program on execution.


    ```

    int main(int argc, const char * argv[])

    ```


    The parameter `argc` is the number of arguments to the program, and the space-separated
    argument values are stored in the `argv` array. The first argument in the `argv`
    array (`argv[0]`) is the name of the program executable, thus the value of the
    `argc` parameter is always one or more. Consider, for example, that the DynaLoader
    program was executed from the command line as follows:


    ```

    > DynaLoader /CustomGreeter.bundle

    ```


    The `main()` function variable `argc` would have a value of 2 and the `argv` array
    would have two elements: the value of the first would be `DynaLoader` and the
    second would be `/CustomGreeter.bundle`. The `main()` function has been updated
    to require that the bundle path be provided as an input argument to the program.
    The following code from [Listing 9-8](#9781430250500_Ch09.xhtml#list8) verifies
    that the program has the correct number of arguments and then creates the path.


    ```

    NSString *bundlePath;

    if (argc != 2)

    {

      // No bundle path provided, exit

      NSLog(@"Please provide a path for the bundle");

    }

    else

    {

      bundlePath = [NSString stringWithUTF8String:argv[1]];

    ```


    The conditional logic (**if (argc != 2)**) checks to make sure that the `argc`
    count is two (one for the program name and one for the bundle path). If the count
    is not equal to two, a message is logged to the output pane and the program exits;
    otherwise, the path is assigned to the proper input parameter (`argv[1]`) and
    the program continues.


    Creating an NSBundle Object


    The next set of statements creates an `NSBundle` object using the bundle path
    and verifies that the object was successfully created. The code uses an `NSBundle`
    convenience class method to create and initialize the class instance for the bundle
    at the specified path.


    ```

    + (NSBundle *) bundleWithPath:(NSString *) fullPath;

    ```


    The code attempts to create a bundle object using the provided path; if it is
    not successful, it logs a message to the output pane.'
