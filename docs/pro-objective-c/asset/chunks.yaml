    \ 数值运算与字节序\n*   运行时操作\n\n### 断言\n\n断言是放置在代码中的一条语句，用于检查某个条件是否存在。断言用于提供运行时验证，验证那些如果不成立就应导致程序终止的假设。使用断言进行编程是检测和纠正错误最快、最有效的方法之一。断言还可以记录程序的逻辑，从而提高可维护性。\n\
    \n每个断言包含一个布尔表达式，你相信当断言执行时该表达式为真。如果表达式为假，系统将抛出一个错误。通过验证表达式确实为真，断言确认了你对程序行为的假设，增加了你对程序没有错误的信心。\n\
    \n以下是应该使用断言的场景示例：\n\n*   *内部不变性*：关于程序行为的假设。这种假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。\n\
    *   *控制流不变性*：关于控制流的假设，特别是代码中不应达到的位置。\n*   *前置条件*：在调用方法之前必须为真的条件。\n*   *后置条件*：在调用方法之后必须为真的条件。\n\
    *   *类不变性*：对每个类实例都必须为真的条件。\n\n*内部不变性*的一个示例是 Listing 13-1 中的条件表达式。\n\n*Listing\
    \ 13-1.* 包含内部不变性的条件表达式示例\n\n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  // value\
    \ must be negative\n  ...\n}\n```\n\n如 Listing 13-1 所示，这些假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。Listing\
    \ 13-1 的代码片段在 Listing 13-2 中被更新，使用断言来表达该不变性。\n\n*Listing 13-2.* 使用断言表达内部不变性的示例\n\
    \n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  NSAssert((value < 0), @\"Value\
    \ not valid here, should be negative\");\n  ...\n}\n```\n\n一种常见的前置条件是检查方法（或函数）输入参数的条件。对于公有方法，前置条件在代码中显式检查，如果条件不满足则抛出适当的异常，因此不应使用断言来检查。断言可用于检查私有方法和函数的前置条件。\n\
    \n断言可用于测试公有和私有方法/函数的后置条件。\n\n*类不变性*约束了每个类实例的属性（即内部状态）和行为。断言可以以类似于表达前面讨论的其他场景的方式来定义类不变性。\n"
- fmt: "# Assertion Macros\n\nThe Foundation assertion functions are, in fact, macros\
    \ that enable the creation of assertions in Objective-C code. Each assertion macro\
    \ evaluates a condition and, if the condition evaluates to false, passes a string\
    \ (and possibly additional `printf`-style arguments formatted into the string)\
    \ describing the failure to an `NSAssertionHandler` instance. `NSAssertionHandler`\
    \ is a Foundation Framework class used to handle false assertions, and each program\
    \ thread has its own `NSAssertionHandler` object. So, when the condition of a\
    \ Foundation assertion macro evaluates to false, it passes the condition describing\
    \ the error to the `NSAssertionHandler` object for the current thread. This object\
    \ in turn logs the error and then raises an exception (specifically, an `NSInternalInconsistencyException`)\
    \ that causes the program to terminate. `NSAssertionHandler` instances are generally\
    \ not created programmatically, but rather by an assertion function.\n\nThere\
    \ are multiple Foundation assertion macros to support the creation of assertions\
    \ within Objective-C methods and functions. Each assertion macro has at least\
    \ one argument: a conditional expression that evaluates to true or false. Most\
    \ also include an argument that contains a format string describing the error\
    \ condition. The assertion macros support the substitution of zero to five arguments\
    \ in a format string. The complete list of Foundation assertions functions is\
    \ provided in [Table 13-1](#9781430250500_Ch13.xhtml#Tab1).\n\n[Table 13-1](#9781430250500_Ch13.xhtml#_Tab1).\
    \ Foundation Assertion Functions\n| Foundation Function | Description |\n| ---\
    \ | --- |\n| `NSAssert` | Generates an assertion for an Objective-C method if\
    \ a given condition evaluates to `NO` (false). Its arguments include the conditional\
    \ expression and a format string (with no format specifier) that describes the\
    \ error. |\n| `NSAssert1` | Similar to `NSAssert`, its arguments include the conditional\
    \ expression, a format string (with one format specifier), and an argument to\
    \ be inserted into the format string. |\n| `NSAssert2`, `NSAssert3`, `NSAssert4`,\
    \ `NSAssert5` | Similar to `NSAssert`, its arguments include the conditional expression,\
    \ a format string (with two, three, four, or five format specifiers), and two,\
    \ three, four, or five arguments to be inserted into the format string. |\n| `NSParameterAssert`\
    \ | Generates an assertion for the parameter of an Objective-C method. Its arguments\
    \ are the conditional expression for a parameter. |\n| `NSCAssert` | Generates\
    \ an assertion for an Objective-C function: if a given condition evaluates to\
    \ `NO` (false). Its arguments include the conditional expression and a format\
    \ string (with no format specifier) that describes the error. |\n| `NSCAssert1`\
    \ | Similar to `NSCAssert`, its arguments include the conditional expression,\
    \ a format string (with one format specifier), and an argument to be inserted\
    \ into the format string. |\n| `NSCAssert2`, `NSCAssert3`, `NSCAssert4`, `NSCAssert5`\
    \ | Similar to `NSCAssert`, its arguments include the conditional expression,\
    \ a format string (with two, three, four, or five format specifiers), and two,\
    \ three, four, or five arguments to be inserted into the format string. |\n| `NSCParameterAssert`\
    \ | Generates an assertion for the parameter of an Objective-C function. Its arguments\
    \ are the conditional expression for a parameter. |\n\nThe following statement\
    \ uses the `NSAssert` function to assert that the value of the variable named\
    \ `age` is within the prescribed range.\n\n```\nNSAssert((age > 0) && (age <=18),\
    \ @\"Variable age not within prescribed range\");\n```\n\nIn the next statement,\
    \ the same assertion is performed again, this time using the `NSAssert1` function\
    \ to log the value of the variable if the assertion fails.\n\n```\nNSAssert1((age\
    \ > 0) && (age <=18),\n  @\"Value %d for age not within prescribed range\", age);\n\
    ```\n\nAssertions can be used to check parameters of private methods or functions.\
    \ Parameter checking for public methods/functions is normally part of the corresponding\
    \ published API; hence, these should be checked whether or not assertions are\
    \ enabled. [Listing 13-3](#9781430250500_Ch13.xhtml#list3) uses the `NSParameterAssert`\
    \ function to assert that the parameters for the method `encodeArchive:toFile:`\
    \ have valid values.\n\n[*Listing 13-3.*](#9781430250500_Ch13.xhtml#_list3)  Asserting\
    \ Method Parameter Values Using NSParameterAssert\n\n```\n- (BOOL) encodeArchive:(id)objectGraph\
    \ toFile:(NSString *)file\n{\n  NSParameterAssert(file != nil);\n  NSParameterAssert([objectGraph\
    \ conformsToProtocol:@protocol(NSCoding)]);\n ...\n}\n```\n\nYou can disable assertions\
    \ in your code by defining the preprocessor macro; `NS_BLOCK_ASSERTIONS`, for\
    \ example.\n\n```\n#define NS_BLOCK_ASSERTIONS\n```\n\n## Logging\n\nThe Foundation\
    \ Framework includes two functions, `NSLog` and `NSLogv`, for logging output to\
    \ the system log facility. In Xcode, error messages from these functions are displayed\
    \ in the Xcode output pane. By now you have become familiar with the `NSLog` function\
    \ through the example source code provided in this book, so here you’ll examine\
    \ the `NSLogv` function.\n\n`NSLogv`, as with `NSLog`, logs an error message to\
    \ the system log facility. It differs from `NSLog` in that it supports a variable\
    \ argument list. The declaration for the `NSLog` function is\n\n```\nvoid NSLogv(NSString\
    \ *format, va_list args);\n```\n\nThe variable `format` is a format string, and\
    \ the variable `args` is a data type used for providing a list of (variable) arguments\
    \ to functions. So you may be wondering, when would you use `NSLogv`? If you have\
    \ a method or function that takes a variable argument list, then `NSLogv` can\
    \ be used to log messages with this list. For example, the variadic function `printArgs`\
    \ declared as follows:\n\n```\nvoid printArgs(int numArgs, ...);\n```\n\nlogs\
    \ a number of function arguments to the system log facility, where the arguments\
    \ are a variable list (specified by the `...` variable argument symbol) and the\
    \ number of arguments from this list to be logged (specified by the `numArgs`\
    \ function argument). Given this function declaration, [Listing 13-4](#9781430250500_Ch13.xhtml#list4)\
    \ demonstrates how this function is implemented using the `NSLogv` function.\n\
    \n[*Listing 13-4.*](#9781430250500_Ch13.xhtml#_list4)  Using NSLogv to Log a variadic\
    \ Argument List\n\n```\nvoid printArgs(int numArgs, ...)\n{\n  va_list args;\n\
    \  va_start(args, numArgs);\n  va_end(args);\n  NSMutableString *format = [[NSMutableString\
    \ alloc] init];\n  [format appendString:@\"Arguments: \"];\n  for (int ii=0; ii<numArgs-1;\
    \ ii++)\n  {\n    [format appendString:@\"%@, \"];\n  }\n  if (numArgs > 1)\n\
    \  {\n    [format appendString:@\"%@\"];\n  }\n  NSLogv(format, args);\n}\n```\n\
    \nIf this function is invoked as follows:\n\n```\nprintArgs(3, @\"Hello\", @\"\
    Objective-C\", @\"World!\");\n```\n\nIt logs to the console the following message:\n\
    \n```\nArguments: Hello, Objective-C, World!\n```\n\n## Bundles\n\nThe Foundation\
    \ Framework includes several function macros for retrieving localized strings.\
    \ They are used to load strings from a program’s strings files. Before you begin\
    \ examining these macros, let’s take a moment to discuss internationalization\
    \ and localization.\n\nInternationalization is the process of designing an application\
    \ so that it can serve different languages and regions (i.e., locales) without\
    \ being changed. *Localization* is the adaptation of an internationalized application\
    \ to a local market. Localization can be applied to many parts of an application,\
    \ including its visible text, icons and graphics, views, and data.\n\n### Localizing\
    \ Strings"
