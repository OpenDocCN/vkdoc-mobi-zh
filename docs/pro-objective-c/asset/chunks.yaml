- fmt: "`ClassName`是类的名称/类型（如`OrderEntry`等），`qualifier`是ARC生命周期限定符（如前所述），`varName`是变量名称。如果未指定限定符，则默认为`__strong`。属性的ARC特定生命周期限定符如下：\n\
    \n- `strong`：`strong`属性等同于`retain`属性（属性完整列表见附录A）。\n- `weak`：`weak`属性类似于`assign`属性，区别在于如果受影响属性实例被释放，其实例变量将被设置为`nil`。\n\
    \n在ARC下，`strong`是对象类型属性的默认所有权属性。\n\n## 使用ARC\n\n现在，你将开发一个使用ARC的示例程序。你将采用之前使用MRR内存管理的程序（`OrderEntry`），创建一个使用ARC内存管理的新版本。这将让你获得一些使用ARC编程的实践经验，并了解它如何简化应用程序的内存管理。你可能还记得，之前开发的`OrderEntry`程序包含三个类：一个用于记录产品订单的`OrderEntry`类，以及依赖类`OrderItem`和`Address`。\n\
    \n在Xcode中，通过从Xcode的“文件”菜单中选择**新建 ![image](images/arrow.jpg) 项目...**来创建一个新项目。在新建项目助手窗格中，创建一个命令行应用程序（从Mac\
    \ OS X应用程序选项中选择**命令行工具**），然后点击**下一步**。在项目选项窗口中，将产品名称指定为**ARC Orders**，并通过勾选**使用自动引用计数**复选框选择ARC内存管理，然后点击**下一步**。\n\
    \n在文件系统中指定项目创建的位置（如有必要，选择**新建文件夹**并输入文件夹名称和位置），取消勾选**源代码控制**复选框，然后点击**创建**按钮。\n\
    \n现在让我们添加`OrderEntry`、`OrderItem`和`Address`类。像之前一样，通过从Xcode的“文件”菜单中选择**新建 ![image](images/arrow.jpg)\
    \ 文件...**，选择Objective-C类模板，适当命名类（每个类都是`NSObject`的子类），然后选择ARC Orders文件夹作为文件位置，并选择ARC\
    \ Orders项目作为目标，将每个类添加到项目中。\n\n你的项目现在包含三个类的文件以及`main.m`文件。接下来，实现`Address`类。像处理MRR\
    \ Orders项目一样，通过重写其父类（`NSObject`）提供的默认`init`和`dealloc`方法，来编辑`Address`类的实现。在导航器窗格中选择**Address.m**文件，然后添加代码，如[代码清单4-11](#9781430250500_Ch04.xhtml#list11)所示。\n\
    \n[*代码清单4-11.*](#9781430250500_Ch04.xhtml#_list11)  ARC Address类实现\n\n```\n#import\
    \ \"Address.h\"\n\n@implementation Address\n- (id) init\n{\n  if ((self = [super\
    \ init]))\n  {\n    NSLog(@\"Initializing Address object\");\n  }\n  return self;\n\
    }\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating Address object\");\n}\n@end\n\
    ```\n\n[代码清单4-11](#9781430250500_Ch04.xhtml#list11)展示了`init`方法与MRR `Address`类提供的相同。`dealloc`方法则不同；它不会在其父类上调用`dealloc`，因为这由ARC自动执行。现在让我们实现ARC\
    \ `OrderItem`类。\n\nARC OrderItem接口与MRR `OrderItem`类提供的接口相同。选择**OrderItem.h**文件并复制[代码清单4-6](#9781430250500_Ch04.xhtml#list6)中显示的接口。接下来，选择**ARC\
    \ OrderItem.m**文件并实现`OrderItem`类，如[代码清单4-12](#9781430250500_Ch04.xhtml#list12)所示。\n\
    \n[*代码清单4-12.*](#9781430250500_Ch04.xhtml#_list12)  ARC OrderItem类实现\n\n```\n\
    #import \"OrderItem.h\"\n\n@implementation OrderItem\n- (id) initWithName:(NSString\
    \ *)itemName\n{\n  if ((self = [super init]))\n  {\n    NSLog(@\"Initializing\
    \ OrderItem object\");\n    name = itemName;\n}\n  return self;\n}\n\n- (void)dealloc\n\
    {\n  NSLog(@\"Deallocating OrderItem object);\n}\n@end\n```\n\n自定义初始化方法与MRR `OrderItem`类提供的方法非常相似。不同之处在于它没有在`name`实例变量上调用`retain`方法，因为你不能使用ARC发送`retain`、`release`或`autorelease`消息。`dealloc`方法也与MRR\
    \ `OrderItem`类提供的不同；它仅在输出控制台记录一条消息。ARC会自动向`OrderItem`类拥有所有权的所有对象发送`release`消息，并调用其父类的`dealloc`方法。\n\
    \n现在你将实现ARC `OrderEntry`类。其接口与MRR `OrderEntry`类相同。选择**ARC OrderEntry接口**（`OrderEntry.h`）并复制[代码清单4-8](#9781430250500_Ch04.xhtml#list8)中显示的接口。\n\
    \n接下来，选择**OrderEntry.m**文件并实现`OrderEntry`类，如[代码清单4-13](#9781430250500_Ch04.xhtml#list13)所示。\n\
    \n[*代码清单4-13.*](#9781430250500_Ch04.xhtml#_list13)  ARC OrderEntry类实现\n\n```\n\
    #import \"OrderEntry.h\"\n\n@implementation OrderEntry\n- (id) initWithId:(NSString\
    \ *)oid\n{\n  if ((self = [super init]))\n  {\n    NSLog(@\"Initializing OrderEntry\
    \ object\");\n    orderId = oid;\n    item = [[OrderItem alloc] initWithName:@\"\
    Doodle\"];\n    shippingAddress = [[Address alloc] init];\n  }\n\nreturn self;\n\
    }\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating OrderEntry object with ID %@\"\
    , orderId);\n}\n@end\n```\n\n自定义初始化方法与MRR `OrderEntry`类提供的方法非常相似。不同之处在于它没有在`orderId`实例变量上调用`retain`方法；如前所述，你不能使用ARC发送`retain`/`release`/`autorelease`消息。`dealloc`方法也与MRR\
    \ `OrderEntry`类提供的不同；它仅在输出控制台记录一条消息。ARC会自动向`OrderItem`类拥有所有权的所有对象发送`release`消息，并调用其父类的`dealloc`方法。\n\
    \n现在让我们实现ARC Orders的`main()`函数。在导航器窗格中选择**main.m**文件，然后更新`main()`函数，如[代码清单4-14](#9781430250500_Ch04.xhtml#list14)所示。\n\
    \n[*代码清单4-14.*](#9781430250500_Ch04.xhtml#_list14)  ARC `main()`函数实现\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"OrderEntry.h\"\n\nint main(int argc,\
    \ const char * argv[])\n{\n\n@autoreleasepool\n  {\n    // Create an OrderEntry\
    \ object for manual release\n    NSString *a1 = @\"A1\";\n    NSString *orderId\
    \ = [[NSString alloc] initWithString:a1];\n    OrderEntry *entry = [[OrderEntry\
    \ alloc] initWithId:orderId];\n\n// Set ID to nil to verify that value was retained\
    \ by ARC!\n    a1 = nil;\n\n// View results for new order entry, should display\
    \ valid ID!\n    NSLog(@\"New order, ID = %@, item: %@\", entry->orderId, entry->item->name);\n\
    \n// Now set OrderEntry object to nil, it can now be deallocated by ARC!\n   \
    \ entry = nil;\n\n// Create another OrderEntry object\n    OrderEntry *autoEntry\
    \ = [[OrderEntry alloc] initWithId:@\"A2\"];\n    NSLog(@\"New order, ID = %@,\
    \ item: %@\", autoEntry->orderId,          autoEntry->item->name);\n  }\n  return\
    \ 0;\n}\n```\n\n`main()`函数通过创建`OrderEntry`对象演示了ARC内存管理。当对象不再使用时，它们会被ARC自动释放。该函数还展示了使用ARC开发的类会根据需要获取依赖对象的所有权，从而防止对象在仍被使用时被更改或释放。\n\
    \n现在保存、编译并运行ARC Orders程序，观察输出窗格中的消息（如[图4-7](#9781430250500_Ch04.xhtml#Fig7)所示）。\n\
