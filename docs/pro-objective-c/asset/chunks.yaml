- fmt: '# 第1章 入门


    欢迎Objective-C的新朋友们！在本章中，你将了解该语言的介绍，然后通过编写一些代码直接上手。我们将从Apple Objective-C开发环境概述开始，讨论Objective-C为何成为应用程序开发如此流行的语言。接着，你将开始使用Apple的集成开发环境（IDE）`Xcode`，并了解它如何使Objective-C编程既愉快又高效。


    ## 引言


    Objective-C是在Apple `OS X`和`iOS`（`iPod`、`iPhone`、`iPad`）平台上开发应用程序的主要编程语言。近年来，这些平台已成为一些最流行的应用程序开发环境。这一成功的关键原因之一实际上归功于Objective-C语言的功能。


