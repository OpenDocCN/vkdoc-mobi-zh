    \ setter 方法、声明一个实例变量，并在`getter`/`setter`方法中使用该变量。Objective-C 提供了三种定义属性的方法：显式定义、通过关键字合成或自动合成。\n\
    \n## 方法\n\nObjective-C 同时支持实例方法和类方法。实例方法在类的实例（对象）上调用；因此，实例方法可以直接访问对象的实例变量。类方法在类上调用。方法可以在类接口、协议和/或类别中声明。这样声明的方法将在相应的类/类别实现中定义。\n\
    \n方法声明指定了方法类型、返回类型、方法名、参数以及相应的参数类型。*方法类型*标识符指定该方法是类方法还是实例方法。类方法用加号（`+`）声明，表示该方法具有类作用域，意味着它在类级别上操作，并且无法访问类的实例变量（除非它们作为参数传递给该方法）。实例方法用减号（`-`）声明，表示该方法具有对象作用域。它在实例级别上操作，并且可以直接访问对象及其父对象的实例变量（受实例变量的访问控制限制）。\n\
    \n方法名将参数作为其名称的一部分，并使用冒号。对于每个参数，其类型在括号中指定，后跟方法原型参数。参数名和类型用冒号分隔；例如，在以下方法声明中：\n\n\
    ```\n- (void)incrementSum:(int)value;\n```\n\n方法名是`incrementSum:`，它有一个类型为`int`、名为`value`的单一参数。多个参数需要多个名称-参数对；例如，方法声明：\n\
    \n```\n- (int)addAddend1:(int)a1 addend2:(int)a2;\n```\n\n方法名是`addAddend1:addend2:`，它有两个类型为`int`、名为`a1`和`a2`的参数。\n\
    \n*返回类型*指示方法返回的变量类型（如果有的话）。返回类型在方法类型之后的括号内指定。如果方法不返回任何内容，则其返回类型声明为`void`。\n\n\
    以下语句为一个名为`hydrogenWithProtons:neutrons:`的类方法提供了一个示例声明，该方法有两个类型为`unsigned int`、名为`nProtons`和`nNeutrons`的参数。\n\
    \n```\n+ (id) hydrogenWithProtons:(unsigned)nProtons neutrons:(unsigned)nNeutrons;\n\
    ```\n\n## 接口\n\n类的接口指定了类的状态和行为；封装在其实例变量、属性和方法中。类接口声明以`@interface`指令和类名开头；以`@end`指令结尾。声明类接口的正式语法如列表\
    \ A-11 所示。\n\n*列表 A-11.* 类接口语法\n\n```\n@interface ClassName : SuperclassName\n\
    {\n  // 实例变量声明\n}\n\n// 属性和方法声明\n@end\n```\n\n超类建立了一个公共接口和实现，专门的子类可以继承、修改和补充。大多数类继承自`NSObject`类，它是大多数\
    \ Foundation 框架类层次结构的根（即基）类，提供了 Objective-C 运行时的基本接口。\n\n### 前置声明\n\n`@class`指令用于在获取类的完整规范之前声明一个类（在类接口中）。这告诉编译器存在一个类（从而使其能够执行静态类型检查），而无需导入其对应的头文件。前置声明在解决文件之间的循环依赖时非常有用。\n\
    \n### 实现\n\n类的实现通过实现其定义的属性及其方法，来定义类的行为。类实现声明以`@implementation`指令和类名开头；以`@end`指令结尾。声明类实现的正式语法如列表\
    \ A-12 所示。\n\n*列表 A-12.* 类实现语法\n\n```\n@implementation ClassName\n{\n  // 实例变量声明\n\
    }\n\n// 属性和方法定义\n@end\n```\n\n在类实现中定义的方法必须直接映射到其对应的接口；例如，列表 A-13 描述了一个`Greeting`类接口及其对应的实现。\n\
    \n*列表 A-13.* Greeting 类接口与实现\n\n```\n#import <Foundation/Foundation.h>\n@interface\
    \ Greeting : NSObject\n\n@property(readwrite) NSString *salutation;\n- (void)hello:(NSString\
    \ *)user;\n\n@end\n\n#import \"Greeting.h\"\n@implementation Greeting\n- (void)hello:(NSString\
    \ *)user\n{\n  NSLog(@\"%@, %@\", self.salutation, user);\n}\n@end\n```\n\n###\
    \ 协议\n\n协议声明了任何类都可以实现的方法和属性。协议声明以`@protocol`指令开头，后跟协议名称。它以`@end`指令结尾。协议可以包含*必需*和*可选*方法；可选方法不要求协议的实现者必须实现这些方法。指令`@required`和`@optional`（后跟方法名）用于适当地标记方法。如果未指定任一关键字，则默认行为是`@required`。协议声明的语法如列表\
    \ A-14 所示。\n"
- fmt: "*Listing A-14.* Protocol Declaration Syntax\n\n```\n@protocol ProtocolName\n\
    // Property declarations\n@required\n// Method declarations\n@optional\n// Method\
    \ declarations\n@end\n```\n\n一个协议可以通过在括号内指定每个声明协议的名称来合并其他协议；这被称为*采纳*协议。使用逗号分隔多个协议（如*Listing\
    \ A-15*所示）。\n\n*Listing A-15.* Incorporating Other Protocols\n\n```\n@protocol\
    \ ProtocolName<ProtocolName(s)>\n// Method declarations\n@end\n```\n\n一个接口可以使用类似的语法*采纳*其他协议（如*Listing\
    \ A-16*所示）。\n\n*Listing A-16.* Interface Adopting a Protocol\n\n```\n@interface\
    \ ClassName : Parent <ProtocolName(s)>\n// Method declarations\n@end\n```\n\n\
    通常，一个类的接口及其对应的实现在物理上被组织成单独的文件；接口放在以`.h`为后缀的头文件中，而实现文件放在以`.m`为后缀的文件中。\n\n## Category\n\
    \n`Category`允许在不进行子类化的情况下向现有类添加新功能。`Category`中的方法成为类类型的一部分（在程序范围内），并被其所有子类继承。\n\
    \n一个`Category`接口声明以`@interface`关键字开头，后跟现有类的名称，以及括号中的`Category`名称，再后跟它采纳的协议（如果有）。它以`@end`关键字结束。在这些语句之间提供了方法声明。`Category`声明的语法如*Listing\
    \ A-17*所示。\n\n*Listing A-17.* Category Declaration Syntax\n\n```\n@interface ClassName\
    \ (CategoryName)\n// Method declarations\n@end\n```\n\n`Category`的实现类似于类实现，定义了在`Category`接口中声明的方法。其语法为：\n\
    \n```\n@implementation ClassName (CategoryName)\n// Method declarations\n@end\n\
    ```\n\n## Class Extension\n\n一个类*扩展*可以被视为一个匿名（即未命名）的`Category`。在扩展中声明的方法*必须*在相应类的主`@implementation`块中实现。与`Category`相反，扩展可以声明实例变量和属性。类扩展的语法如*Listing\
    \ A-18*所示。\n\n*Listing A-18.* Extension Declaration Syntax\n\n```\n@interface\
    \ ClassName ()\n{\n  // Instance variable declarations\n}\n\n// Property declarations\n\
    // Method declarations\n@end\n```\n\n类扩展通常放在与类实现文件相同的文件中，用于组合和声明额外的、必需的私有方法（例如，不属于公开声明的`API`），仅供类内部使用。\n\
    \n## Appendix B\n\n## Xcode Xposed!\n\n`Xcode`是一个用于开发、管理和维护在`Apple OS X`和`iOS`平台上运行的软件产品的综合性工具集。它包括一个`IDE`、编译器、调试器以及众多其他工具。`Xcode`还捆绑了`OS\
    \ X`和`iOS`软件开发工具包（`SDK`），其中包括`Cocoa`和`Cocoa Touch`框架。您一直在使用`Xcode`来开发和运行本书中提供的示例应用程序，因此到现在为止，您已经熟悉了它的几个基本功能。在本附录中，您将“看看引擎盖下面”，深入探索`Xcode`的一些关键特性。具体来说，您将检查构成`Xcode`基础的关键概念，并通过这样做，更熟悉它的一些关键工具。\n\
    \n## 基本概念\n\n从用户的角度来看，`Xcode`围绕几个基本概念组织：项目、工作区、目标、方案和动作。在接下来的几段中，您将了解更多关于这些概念以及它们在`Xcode`中如何使用的内容。\n\
    \n## 目标\n\n一个*目标*是`Xcode`中的基本概念。它由用于构建软件产品的一组指令组成。一个目标由关于如何构建产品的规则和设置组成，并定义了一组*构建阶段*，即用于执行实际软件构建的步骤序列。\n\
    \n每个目标接收一组输入（源文件、资源、构建指令等）并生成一个产品作为其输出。产品可以是一个应用程序、软件库等等。一个`Xcode`项目可以有多个目标，每个目标都可以有自己的一套用于构建软件产品的指令。\n\
    \n一个目标可以依赖于其他目标（例如，*依赖目标*）。当选中目标被构建时，`Xcode`会自动构建其依赖目标。`Xcode`提供了管理目标（创建、更新、删除、管理它们之间的依赖关系）和管理目标文件（添加、删除、设置头文件角色）的功能。\n\
    \n## 构建阶段\n\n构建阶段定义了构建产品的各个阶段。其中三个阶段——`Compile Sources`、`Link Binary With Libraries`和`Copy\
    \ Bundle Resources`——是必需的，其他阶段可以根据需要添加。由于构建阶段定义了目标将如何被构建，更改构建阶段会改变构建过程。\n\n##\
    \ 构建设置\n\n构建设置定义了在构建过程的各个阶段要做什么，从而提供了一种自定义该过程的方法。实际上有多个构建设置值列表，每个列表被称为一个*构建配置*。构建配置是一个命名的构建设置集合，用于以特定方式构建目标产品。它们提供了一种机制来构建同一目标的不同版本。您还可以创建构建配置文件。这些文件使您能够轻松地在目标、项目和开发人员之间共享一组构建设置定义。\n\
    \n## 构建配置\n\n项目构建配置用于构建软件产品。它包含构建设置定义。这些可以嵌入在`Xcode`项目文件中，或存储在单独的配置设置文件中。当您创建一个项目时，`Xcode`提供两个默认的嵌入式构建配置：*Debug*和*Release*，它们主要在是否包含调试信息以及构建的优化程度上有所不同。*Debug*配置通常在整个开发过程中使用，而*Release*配置用于后期测试阶段，当您想在设备上检查性能时。*Debug*配置的一些构建设置如*Listing\
    \ B-1*所示。\n\n*Listing B-1.* Debug Build Configuration Settings\n\n```\nONLY_ACTIVE_ARCH=YES\n\
    CONFIGURATION_BUILD_DIR=build/Debug\nCOPY_PHASE_STRIP=NO\nGCC_OPTIMIZATION_LEVEL=0\n\
    GCC_PREPROCESSOR_DEFINITIONS=DEBUG=1\n```\n\n配置设置文件是一个纯文本文件，每行指定一个构建设置定义。如果您要从现有的构建配置中创建一个新的构建配置，它必须仅基于您项目中的配置文件，而不能是外部文件。\n\
    \n## 构建规则\n\n构建规则提供了在逐个目标的基础上处理文件的指令。`Xcode`提供了一组默认的构建规则，您可以添加自己的自定义构建规则，以对特定文件类型执行自定义处理。\n\
    \n构建规则规定了特定类型的文件如何处理，以及在构建阶段使用哪个工具来处理文件。每个构建规则由一个条件和一个动作组成。条件通常指定一个文件类型，决定一个源文件是否与关联的动作一起被处理。"
  raw: '[*Listing A-14.*](#9781430250500_AppA.xhtml#_list14)  Protocol Declaration
    Syntax


    ```

    @protocol ProtocolName

    // Property declarations

    @required

    // Method declarations

    @optional

    // Method declarations

    @end

    ```


    One protocol can incorporate other protocols by specifying the name of each declared
    protocol within braces; this is referred to as *adopting* a protocol. Commas are
    used to separate multiple protocols (as shown in [Listing A-15](#9781430250500_AppA.xhtml#list15)).


    [*Listing A-15.*](#9781430250500_AppA.xhtml#_list15)  Incorporating Other Protocols


    ```

    @protocol ProtocolName<ProtocolName(s)>

    // Method declarations

    @end

    ```


    An interface can *adopt* other protocols using similar syntax (shown in [Listing
    A-16](#9781430250500_AppA.xhtml#list16)).


    [*Listing A-16.*](#9781430250500_AppA.xhtml#_list16)  Interface Adopting a Protocol


    ```

    @interface ClassName : Parent <ProtocolName(s)>

    // Method declarations

    @end

    ```


    Typically, a class interface and its corresponding implementation are physically
    organized in separate files; the interface in a header file suffixed with `.h`,
    and an implementation file suffixed with `.m`.


    Category


    A category enables the addition of new functionality to an existing class without
    subclassing it. The methods in a category become part of the class type (within
    the scope of the program) and are inherited by all its subclasses.


    A category interface declaration begins with the `@interface` keyword, followed
    by the name of the existing class, and the category name in parentheses, followed
    by the protocols it adopts (if any). It ends with the `@end` keyword. Between
    these statements the method declarations are provided. The syntax of a category
    declaration is shown in [Listing A-17](#9781430250500_AppA.xhtml#list17).


    [*Listing A-17.*](#9781430250500_AppA.xhtml#_list17)  Category Declaration Syntax


    ```

    @interface ClassName (CategoryName)

    // Method declarations

    @end

    ```


    A category implementation is comparable to a class implementation, defining methods
    declared in a category interface. Its syntax is


    ```

    @implementation ClassName (CategoryName)

    // Method declarations

    @end

    ```


    Class Extension


    A class *extension* can be considered as an anonymous (i.e., unnamed) category.
    The methods declared in an extension *must* be implemented in the main `@implementation`
    block for the corresponding class. As opposed to a category, an extension can
    declare instance variables and properties. The syntax of a class extension is
    shown in [Listing A-18](#9781430250500_AppA.xhtml#list18).


    [*Listing A-18.*](#9781430250500_AppA.xhtml#_list18)  Extension Declaration Syntax


    ```

    @interface ClassName ()

    {

      // Instance variable declarations

    }


    // Property declarations

    // Method declarations

    @end

    ```


    A class extension is commonly placed in the same file as the class implementation
    file, and is used to group and declare additional required, private methods (e.g.,
    not part of the publicly declared API) for use solely within a class.


    Appendix     B


    Xcode Xposed!


    Xcode is a comprehensive toolset for the development, management, and maintenance
    of software products that run on the Apple OS X and iOS platforms. It includes
    an IDE, compiler, debugger, and numerous other tools. Xcode also bundles the OS
    X and iOS Software Development Kits (SDKs) that comprise the Cocoa and Cocoa Touch
    frameworks. You have been using Xcode to develop and run the example applications
    presented throughout this book, so by now, you’re already familiar with several
    of its basic features. In this appendix, you are going to “look under the hood”
    to explore some of Xcode’s key features in depth. Specifically, you will examine
    the key concepts that form the foundation of Xcode and, by doing this, become
    more familiar with some of its key tools.


    Basic Concepts


    From a user perspective, Xcode is organized around several basic concepts: projects,
    workspaces, targets, schemes, and actions. In the next few paragraphs, you will
    learn more about these concepts and how they are used within Xcode.


    Targets


    A *target* is a fundamental concept in Xcode. It consists of a collection of instructions
    for building a software product. A target is comprised of rules and settings for
    how to build a product, and defines a set of *build phases*, the sequence of steps
    used to perform the actual software build.


    Each target takes a collection of inputs (source files, resources, build instructions,
    etc.) and produces a product as its output. The product can be an application,
    software library, and so forth. An Xcode project can have multiple targets, each
    of which can have its own set of instructions for building a software product.


    A target can have dependencies on other targets (e.g., *dependent targets*). Xcode
    automatically builds dependent targets when the selected target is built. Xcode
    provides capabilities for managing targets (create, update, delete, managing dependencies
    between them) and managing the files of a target (add, delete, setting role of
    header files).


    Build Phases


    Build phases define the stages by which your product is built. Three of these
    phases—Compile Sources, Link Binary With Libraries, and Copy Bundle Resources—are
    required, and others can be added as necessary. As build phases define how the
    target will be built, changing the build phases changes the build process.


    Build Settings


    Build settings define what to do at various stages of the build process, and hence
    provide a means of customizing this process. There are actually multiple lists
    of build setting values, each of which is called a *build configuration*. A build
    configuration is a named collection of build settings that are used to build a
    target’s product in a particular way. They provide a mechanism for building different
    versions of the same target. You can also create build configuration files. These
    enable you to easily share a set of build setting definitions across targets,
    projects, and among developers.


    Build Configurations


    A project build configuration is used to build a software product. It contains
    build-setting definitions. These can be embedded in an Xcode project file or stored
    in a separate configuration settings file. When you create a project, Xcode provides
    two default embedded build configurations: *Debug* and *Release*, which differ
    primarily in the inclusion of debug information and in the degree to which the
    build is optimized. The *Debug* configuration is typically used throughout the
    development process, whereas the *Release* configuration is used for late-stage
    testing, when you want to check performance on a device. Several of the build
    settings for the Debug configuration are shown in [Listing B-1](#9781430250500_AppB.xhtml#list1).


    [*Listing B-1.*](#9781430250500_AppB.xhtml#_list1)  Debug Build Configuration
    Settings


    ```

    ONLY_ACTIVE_ARCH=YES

    CONFIGURATION_BUILD_DIR=build/Debug

    COPY_PHASE_STRIP=NO

    GCC_OPTIMIZATION_LEVEL=0

    GCC_PREPROCESSOR_DEFINITIONS=DEBUG=1

    ```


    A configuration settings file is a plain text file that specifies a list of build-setting
    definitions, one per line. If you are creating a new build configuration from
    an existing one, it must be based only on a configuration file that is in your
    project, not an external file.


    Build Rules


    Build rules provide instructions for processing files on a per-target basis. Xcode
    provides a set of default build rules, and you can add your own custom build rules
    to perform custom processing for specific file types.


    Build rules specify how particular types of files are processed and which tool
    is used to process files during build phases. Each build rule consists of a condition
    and an action. The condition, which usually specifies a file type, determines
    whether a source file is processed with the associated action.'
