    # 第 14 章


    ## 专家部分：错误处理


    代码如何处理错误对于实现高质量软件至关重要。影响程序运行和/或性能的运行时错误可能由多种原因导致，例如用户输入错误、系统问题或编程错误。Foundation
    框架包含多个用于处理运行时错误条件的 API。


    在本专家章节中，您将深入探讨这些 API。本章将探讨运行时错误的原因、用于错误处理的编程选项，以及用于处理错误和异常条件的 Foundation 框架 API。完成本章后，您将能够使用
    Foundation 框架的错误处理和异常处理 API 来编写程序，使其能够在错误发生时做出适当响应，甚至提供错误恢复支持。


    ### 运行时错误条件


    *运行时错误*是在程序运行时发生的错误；它与程序执行之前发生的其他类别的程序错误（例如语法错误和链接错误）形成对比。运行时错误通常由以下类型的条件引起：


    *   *逻辑错误*：由于代码未正确实现相应程序逻辑而导致的错误。此类错误在程序执行期间表现为未能产生预期输出。

    *   *语义错误*：由于程序语句使用不当（例如，执行除以零的操作或变量初始化不当）而导致的错误。

    *   *用户输入错误*：由于无效用户输入而导致的错误。


    如果发生上述任何一种条件且未得到处理，可能导致各种不良后果，包括程序终止或运行异常。因此，计算机编程中已开发出多种机制来检测和响应错误。对于 Objective-C，Foundation
    框架包含多个用于错误处理的 API，分为以下几类：


    *   断言

    *   错误码

    *   错误对象

    *   异常


    在详细探讨这些 API 之前，让我们先简要回顾每种错误类型及其用法。


    ### 断言


    断言用于在运行时检查某个条件，如果该条件不成立，则会导致程序终止。断言可以通过编译器指令禁用；因此，它们应仅用于检测编程逻辑和语义错误，而不用于因无效用户输入等导致的运行时错误。在第
    13 章中，您了解了 Foundation 框架断言函数。这些函数支持为 Objective-C 方法和函数创建断言。


    ### 错误码

    '
- fmt: '# Error Codes, Error Objects, Exceptions, and `NSError`


    Error codes are unique integer values used to identify and perhaps convey information
    about a particular error that occurs during program execution. Error codes are
    a simple mechanism for reporting errors but are limited in the amount of information
    they can provide for error handling.


    ## Error Objects


    Error objects are used to both encapsulate and convey information about runtime
    errors that users need to know about. An error object is made up of an error code
    and additional information related to the error, some of which can potentially
    be used for recovering from the error. Because they are objects, error objects
    also benefit from the basic properties of OOP (encapsulation, inheritance, subclassing,
    etc.). The Foundation Framework includes several APIs to support error objects:
    the `NSError` class for creating and manipulating error objects, and a set of
    standard error codes.


    ## Exceptions


    In computer programming, an exception is an anomalous, unexpected event that occurs
    during program execution and requires special processing. Exception handling typically
    changes program flow, with control being passed to special code designated for
    this purpose. Exception processing logic varies depending upon the severity of
    the event, ranging from simple logging to attempting recovery and to program termination.
    The Foundation Framework includes several APIs to support exception processing:
    the `NSException` class for creating and manipulating exceptions, and a set of
    standard exception names. The Objective-C language includes a set of directives
    that are used with the Foundation Framework exception APIs to perform exception
    processing.


    ## `NSError`


    The Foundation Framework `NSError` class is used to create error objects. The
    properties of this class are an error code, the error domain, and a dictionary
    of user information. The class includes methods for creating and initializing
    error objects, retrieving error properties, getting a localized error description,
    and facilitating error recovery.


    An error domain is a mechanism used to organize error codes according to a system,
    subsystem, framework, and so forth. Error domains enable you to identify the subsystem,
    framework, and so forth, that detected the error. They also help prevent naming
    collisions between error codes, because error codes between different domains
    can have the same value. The user info dictionary is an `NSDictionary` instance
    that holds error information beyond the code and domain. The types of information
    that can be stored in this dictionary include localized error information and
    references to supporting objects. The following statement creates an error object
    using the `NSError` class factory method `errorWithDomain:code:userInfo:`.


    ```

    NSError *err = [NSError errorWithDomain:NSCocoaErrorDomain

                                       code:NSFileNoSuchFileError

                                   userInfo:nil];

    ```


    This particular error would be created if, for example, a file is not found at
    the path specified. Notice that the user info dictionary is not provided (the
    `userInfo` parameter is set to `nil`). [Listing 14-1](#9781430250500_Ch14.xhtml#list1)
    creates the same error object, this time with a user info dictionary.


    [*Listing 14-1.*](#9781430250500_Ch14.xhtml#_list1)  Creating an `NSError` Object


    ```

    NSString *desc = NSLocalizedString(@"FileNotFound", @"");

    NSDictionary *info = @{NSLocalizedDescriptionKey:desc};

    NSError *err = [NSError errorWithDomain:NSCocoaErrorDomain

                                       code:NSFileNoSuchFileError

                                   userInfo:info];

    ```


    [Listing 14-1](#9781430250500_Ch14.xhtml#list1) shows the user info dictionary
    for this example consists of one entry, the key-value pair for a localized description.
    The localized string is created using the Foundation `NSLocalizedString` function.
    The constant `NSLocalizedDescriptionKey` is a standard user info dictionary key
    defined in the `NSError` class.


    The Foundation Framework declares four major error domains:


    *   `NSMachErrorDomain`: OS kernel error codes.

    *   `NSPOSIXErrorDomain`: Error codes derived from standard POSIX-conforming versions
    of Unix, such as BSD.

    *   `NSOSStatusErrorDomain`: Error codes specific to Apple OS X Core Services
    and the Carbon framework.

    *   `NSCocoaErrorDomain`: All of the error codes for the Cocoa frameworks (this
    includes the Foundation Framework and other Objective-C frameworks).


    In addition to the major error domains presented here, there are also error domains
    for frameworks, groups of classes, and even individual classes. The `NSError`
    class also enables you to create your own error domain when creating and initializing
    an `NSError` object. As mentioned previously, [Listing 14-1](#9781430250500_Ch14.xhtml#list1)
    uses the constant `NSLocalizedDescriptionKey`. The `NSError` class defines a set
    of common user info dictionary keys that can be used to create the key-value pairs
    for the user info dictionary. These keys are listed in [Table 14-1](#9781430250500_Ch14.xhtml#Tab1).


    [Table 14-1](#9781430250500_Ch14.xhtml#_Tab1). `NSError` Standard User Info Dictionary
    Keys


    | Key | Value Description |

    | --- | --- |

    | `NSLocalizedDescriptionKey` | Localized string representation of the error.
    |

    | `NSFilePathErrorKey` | The file path of the error. |

    | `NSStringEncodingErrorKey` | An `NSNumber` object containing the string encoding
    value. |

    | `NSUnderlyingErrorKey` | The error encountered in an underlying implementation
    (which caused this error). |

    | `NSURLErroKey` | An `NSURL` object. |

    | `NSLocalizedFailureReasonErroryKey` | Localized string representation of the
    reason that caused the error. |

    | `NSLocalizedRecoverySuggestionErrorKey` | Localized recovery suggestion for
    the error. |

    | `NSLocalizedRecoveryOptionsErrorKey` | `NSArray` containing the localized titles
    of buttons for display in an alert panel. |

    | `NSRecoveryAttempterErrorKey` | An object that conforms to the `NSErrorRecoveryAttempting`
    protocol. |

    | `NSHelpAnchorErrorKey` | Localized string representation of help information
    for a help button. |

    | `NSURLErrorFailingURLString` | `NSURL` object containing the URL that caused
    the load to fail. |

    | `NSURLErrorFailingURLStringErrorKey` | String for the URL that caused the load
    to fail. |

    | `NSURLErrorFailingURLPeerTrustErrorKey` | `SecTrustRef` object representing
    the state of a failed SSL handshake. |


    ## Using Error Objects


    OK, so now you know how to create `NSError` objects, but how do you use them?
    In general, there are two scenarios for obtaining `NSError` objects:


    *   `Delegation`: An error object passed as a parameter to a delegation method
    that you implement.

    *   `Indirection`: An error object retrieved via indirection from a method that
    your code invokes.


    The delegation pattern is a design pattern whereby an object (the delegator) delegates
    one or more tasks to another delegate object. The tasks are encapsulated in the
    method(s) of the delegate object. When necessary, the delegator invokes the appropriate
    method on the delegate object, providing any required parameters. Many Foundation
    Framework classes implement the delegation pattern to enable custom error handling.
    The delegating Foundation object invokes a method on a delegate object (custom
    code that you implement) that includes an error object as a parameter.


    The `NSURLConnectionDelegate` protocol declares a delegation method (`connection:didFailWithError:`)
    that returns an error object:


    ```

    - (void)connection:(NSURLConnection *)connection didFailWithError:(NSError *)error;

    ```


    This protocol is used for asynchronously loading a URL request via an `NSURLConnection`
    object. Your code implements a delegate object that conforms to this protocol
    and sets it as the delegate of the `NSURLConnection` object. Your code then loads
    the URL request asynchronously, and if an error occurs, the delegating (`NSURLConnection`)
    object invokes the `connection:didFailWithError:` method on your delegate object.'
