    The `OrderItem` class adds a public instance variable named *name* of type (`NSString
    *`), and a custom initializer (`initWithName:`) that takes an input parameter
    also of type (`NSString *`). Next, select the **OrderItem.m** file and implement
    the `OrderItem` class, as shown in [Listing 4-7](#9781430250500_Ch04.xhtml#list7).


    [*Listing 4-7.*](#9781430250500_Ch04.xhtml#_list7)  MRR OrderItem Class Implementation


    ```

    #import "OrderItem.h"


    @implementation OrderItem

    - (id) initWithName:(NSString *)itemName

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing OrderItem object");

        name = itemName;

        [name retain];

      }

      return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderItem object");

      [name release];

      [super dealloc];

    }

    @end

    ```


    The custom initializer assigns the instance variable to the input parameter. Since
    the `OrderItem` object did not create the input parameter, it doesn’t have an
    ownership interest in it. However, as you don’t want this object to be deallocated
    as a side effect of some other operation (and also require it to be valid throughout
    the object’s lifetime), you send a `retain` message to the `name` variable, thereby
    taking an ownership interest in the object. In the `dealloc` method, you send
    a `release` message to the `name` object, then invoke `dealloc` on its superclass
    to relinquish the `OrderItem` object’s memory.


    Now let’s implement the `OrderEntry` class. Select the **OrderEntry.h** file and
    code the interface (as shown in [Listing 4-8](#9781430250500_Ch04.xhtml#list8)).


    [*Listing 4-8.*](#9781430250500_Ch04.xhtml#_list8)  MRR OrderEntry Class Interface


    ```

    #import <Foundation/Foundation.h>

    #import "OrderItem.h"

    #import "Address.h"


    @interface OrderEntry : NSObject

    {

    @public OrderItem *item;

    NSString *orderId;

    Address *shippingAddress;

    }


    - (id) initWithId:(NSString *)oid;

    @end

    ```


    [Listing 4-8](#9781430250500_Ch04.xhtml#list8) shows that an `OrderEntry` object
    has three instance variables and a custom initializer (`initWithId:`). Next, select
    the **OrderEntry.m** file and implement the `OrderEntry` class, as shown in [Listing
    4-9](#9781430250500_Ch04.xhtml#list9).


    [*Listing 4-9.*](#9781430250500_Ch04.xhtml#_list9)  MRR OrderEntry Class Implementation


    ```

    #import "OrderEntry.h"


    @implementation OrderEntry

    - (id) initWithId:(NSString *)oid

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing OrderEntry object");

        orderId = oid;

        [orderId retain];

        item = [[OrderItem alloc] initWithName:@"Doodle"];

        shippingAddress = [[Address alloc] init];

      }


    return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderEntry object");

      [item release];

      [orderId release];

      [shippingAddress release];

      [super dealloc];

    }

    @end

    ```


    The custom initializer assigns the input parameter to the `orderId` instance variable,
    and then creates and initializes `OrderItem` and `Address` objects. As the `OrderEntry`
    object has an ownership interest in the `OrderItem` and `Address` objects, and
    also the `orderId` instance, it is responsible for releasing them prior to it
    being deallocated. This is accomplished in the `dealloc` method, which then invokes
    `dealloc` on its superclass to relinquish the `OrderEntry` object’s memory.


    So you’ve implemented the order entry classes, now test the classes to validate
    the implementation and also verify that you used MRR correctly. Select the **main.m**
    file in the navigator pane, and then update the `main()` function as shown in
    [Listing 4-10](#9781430250500_Ch04.xhtml#list10).


    [*Listing 4-10.*](#9781430250500_Ch04.xhtml#_list10)  MRR main() Function Implementation


    ```

    #import <Foundation/Foundation.h>

    #import "OrderEntry.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create an OrderEntry object for manual release

        NSString *orderId = [[NSString alloc] initWithString:@"A1"];

        OrderEntry *entry = [[OrderEntry alloc] initWithId:orderId];


    // Release orderId (retained by OrderEntry, so object not deallocated!)

        [orderId release];

        NSLog(@"New order, ID = %@, item: %@", entry->orderId, entry->item->name);


    // Must manually release OrderEntry!

        [entry release];


    // Create an autorelease OrderEntry object, released at the end of

        // the autorelease pool block

        OrderEntry *autoEntry = [[[OrderEntry alloc] initWithId:@"A2"] autorelease];

        NSLog(@"New order, ID = %@, item: %@", autoEntry->orderId, autoEntry->item->name);

      }

      return 0;

    }

    ```


    The `main()` function demonstrates MRR memory management by creating `OrderEntry`
    objects and releasing them, along with the objects it has an ownership interest
    in, according to the memory-management rules. The first `OrderEntry` object is
    manually released, while the second is created with autorelease, and thus is released
    at the end of its surrounding autorelease pool block.


