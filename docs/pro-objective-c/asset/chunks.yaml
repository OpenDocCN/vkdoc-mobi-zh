- fmt: '# 排版后的内容


    At runtime, the Objective-C language performs many common behaviors—such as type
    determination and method resolution—that other languages perform during program
    compilation or linking, if at all. It also provides APIs that enable you to perform
    additional runtime operations such as object introspection and the dynamic creation
    and loading of code. These features are made possible through the architecture
    and implementation of the Objective-C runtime. In the next few sections, you’ll
    examine these features in more detail and learn how they are used in your programs.


    ## Object Messaging


    In OOP terminology, *message passing* is a style of communication used to send
    and receive messages between objects. Objective-C message passing (e.g., object
    messaging) is used to invoke methods on both classes and class instances (i.e.,
    objects). The example in [Figure 7-1](#9781430250500_Ch07.xhtml#Fig1) depicts
    the syntax for sending a message to an object/class.


    ![9781430250500_Fig07-01.jpg](images/9781430250500_Fig07-01.jpg)


    [Figure 7-1](#9781430250500_Ch07.xhtml#_Fig1). Objective-C message passing


    In the message-passing expression shown in [Figure 7-1](#9781430250500_Ch07.xhtml#Fig1),
    the *receiver* (adder) is the target of the message (i.e., the object or class),
    and the message itself (`addend1:25 addend2:10`) is composed of a *selector* along
    with any corresponding input parameters.


    Object messaging is implemented as a dynamic feature—the actual type of the receiver
    of the message and the corresponding method to be invoked on the receiver is determined
    at runtime (see [Figure 7-2](#9781430250500_Ch07.xhtml#Fig2)).


    ![9781430250500_Fig07-02.jpg](images/9781430250500_Fig07-02.jpg)


    [Figure 7-2](#9781430250500_Ch07.xhtml#_Fig2). Objective-C object messaging


    [Figure 7-2](#9781430250500_Ch07.xhtml#Fig2) depicts how the Objective-C runtime
    implements the mapping of messages to method calls via dynamic typing and dynamic
    binding, both of which you’ll look at shortly. Object messaging provides tremendous
    flexibility with its dynamic programming features. In addition to simplifying
    the programming interface, these capabilities also enable the development of modular
    applications that can be modified and/or updated during program execution.


    Because Objective-C method calls are resolved at runtime, there is a certain amount
    of overhead associated with dynamic binding. The Objective-C runtime system caches
    method calls—saving the message-to-method association in memory—to reduce this
    overhead.


    The other consequence of runtime resolution of method calls is that the receiver
    is not guaranteed to be able to respond to a message. If it cannot, it will raise
    a runtime exception. The Objective-C language provides several features (e.g.,
    object introspection and message forwarding) that can be used to mitigate this
    scenario.


    To summarize, the following are the key elements of Objective-C object messaging:


    *   *Message*: A name (the selector) and a set of parameters sent to an object/class.

    *   *Method*: An Objective-C class or instance method that has a specific declaration
    comprised of a name, input parameters, a return value, and the method signature
    (the data type(s) for the input parameters and return value).

    *   *Method binding*: The process of taking a message sent to a particular receiver
    and finding and executing the appropriate method. The Objective-C runtime performs
    dynamic binding of messages to method calls.


    You’re probably pretty comfortable with methods, receivers, and messages because
    you’ve discussed these terms throughout this book, but what about selectors and
    method signatures? Let’s look at these in the coming paragraphs.


    ## Selectors


    In Objective-C object messaging, a *selector* is a text string that refers to
    a method and can be sent to an object or a class. The Objective-C runtime uses
    selectors to retrieve the correct method implementation for a target object/class.
    A selector is represented as a text string broken up into segments, with a colon
    placed at the end of each segment that is followed by a parameter:


    ```

    nameSegment1:nameSegment2:nameSegment3:

    ```


    This selector has three segments, each of which is followed by a colon, thereby
    indicating that the corresponding message has three input parameters. The number
    of parameters for a message corresponds to the number of segments in its selector.
    If a message has no parameters, the selector has one segment without a colon.
    Some examples of valid selectors are shown in [Listing 7-1](#9781430250500_Ch07.xhtml#list1).


    [*Listing 7-1.*](#9781430250500_Ch07.xhtml#_list1)  Example Valid Selectors


    ```

    description

    description:

    setValue:

    sumAddend1:addend2:

    sumAddend1::

    ```


    In Objective-C source code, a message selector directly maps to one or more class/instance
    method declaration. [Listing 7-2](#9781430250500_Ch07.xhtml#list2) depicts a class
    interface that includes a single instance method declaration.


    [*Listing 7-2.*](#9781430250500_Ch07.xhtml#_list2)  Calculator Class Interface


    ```

    @interface Calculator : NSObject

    - (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;

    @end

    ```


    The selector for the `Calculator` class instance method shown in [Listing 7-2](#9781430250500_Ch07.xhtml#list2)
    is `sumAddend1:addend2:`. If a `Calculator` object is instantiated and assigned
    to a variable named `myCalculator`, this instance method is invoked using the
    receiver object (`myCalculator`) followed by the selector with the desired input
    parameters, as in the following, for example:


    ```

    [myCalculator sumAddend1:25 addend2:10];

    ```


    OK, so this is all well and good. These examples show the role of selectors in
    object messaging, but you may still be wondering how all this stuff works. You
    probably guessed it: the Objective-C runtime! When your source code is compiled,
    the compiler (a component of the runtime) creates data structures and function
    calls that support the dynamic mapping of receiver class/objects and message selectors
    to method implementations. When your code is executed, the runtime library (another
    component of the runtime) uses this information to find and invoke the appropriate
    method. Later in this chapter, you’ll review the components of the Objective-C
    runtime in detail.


    ## Empty Selector Segments


    If you were really paying attention in the previous section, you may have noticed
    one of the examples in [Listing 7-1](#9781430250500_Ch07.xhtml#list1) has a selector
    that looks a little different from the others; it’s the example `sumAddend1::`.
    For this selector, the first name segment has a text string (`sumAddend1`) but
    the second one doesn’t! Actually, a method declaration with more than one argument
    can have empty argument names; hence a selector with more than one segment can
    have *empty selector segments* (i.e., segments without names). [Listing 7-3](#9781430250500_Ch07.xhtml#list3)
    extends the `Calculator` class interface with an instance method that includes
    an empty segment.


    [*Listing 7-3.*](#9781430250500_Ch07.xhtml#_list3)  Instance Method with Empty
    Selector Segment


    ```

    @interface Calculator : NSObject

    - (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;

    - (int) sumAddend1:(NSInteger)a1 :(NSInteger)a2;

    @end

    ```


    This instance method can be invoked with the following expression:


    ```

    [myCalculator sumAddend1:25 :10]

    ```'
