    \   }\n   else\n   {\n     self.receivedData = [[NSMutableData alloc] initWithData:data];\n\
    \   }\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n\
    {\n  NSUInteger length = [self.receivedData length];\n  NSLog(@\"Downloaded %lu\
    \ bytes from request %@\", length, self.request);\n  // 数据加载完成，设置标志以退出运行循环\n \
    \ self.finishedLoading = YES;\n}\n\n- (void)connection:(NSURLConnection *)connection\
    \ didFailWithError:(NSError *)error\n{\n  NSLog(@\"Error loading request %@\"\
    , [error localizedDescription]);\n  self.finishedLoading = YES;\n}\n\n@end\n```\n\
    \n好的，我知道代码很多，但别担心，我们将一步一步来。文件以一个分类扩展开始，该扩展声明了`NetConnector`实现中使用的私有属性。实现定义了接口声明的方法和`NSURLConnectionDelegate`协议声明的方法。`initWithRequest:`方法将输入的`NSURLRequest`赋值给私有的`NetConnector`的`request`属性，创建并初始化一个用于缓存响应的`NSURLCache`实例，最后创建一个`NSURLConnection`对象并开始下载URL。来自[清单11-15](#9781430250500_Ch11.xhtml#list15)的以下语句创建了缓存，为其配置了内存存储，然后将其设置为连接使用的共享缓存。\n\
    \n```\nNSURLCache *URLCache = [[NSURLCache alloc] init];\n[URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];\n\
    [NSURLCache setSharedURLCache:URLCache];\n```\n\n`reloadRequest`方法重新加载URL。它首先重置`finishedLoading`标志，然后使用保存的请求创建一个新的`NSURLConnection`对象并下载URL。\n\
    \n这里实现的其余方法是`NSURLConnectionDelegate`协议方法。当连接能够向请求发送响应时，会发送`connection:didReceiveResponse:`消息。如[清单11-15](#9781430250500_Ch11.xhtml#list15)所示，该方法将`receivedData`对象的长度设置为零，从而丢弃从先前请求接收到的数据。\n\
    \n在连接将响应存储到缓存之前，会发送`connection:willCacheResponse:`消息。这使得方法实现能够修改响应或阻止其被缓存。如[清单11-15](#9781430250500_Ch11.xhtml#list15)所示，该方法执行条件逻辑，根据URL的协议是否为`http`来启用/禁用响应的缓存。\n\
    \n当从资源接收到数据时，会发送`connection:didReceiveData:`消息。如果数据是增量接收的，此方法可能在单个请求期间被多次调用。如[清单11-15](#9781430250500_Ch11.xhtml#list15)所示，该方法将接收到的数据追加到`receivedData`对象。\n\
    \n当连接成功完成数据加载时，会发送`connectionDidFinishLoading:`消息。这里的实现只是在输出窗格中记录一条消息，指示连接已完成资源加载，然后设置用于退出运行循环的`finishedLoading`标志。\n\
    \n最后，当连接无法成功加载请求时，会发送`connection:didFailWithError:`消息。这里你只是在输出窗格中记录一条消息，指示发生的错误，并设置`finishedLoading`标志。\n\
    \n好的，现在你已经实现了`NetConnector`类，让我们用它来加载一个URL。在Xcode的项目导航器中，选择`main.m`文件并更新`main()`函数，如[清单11-16](#9781430250500_Ch11.xhtml#list16)所示。\n\
    \n[*清单11-16.*](#9781430250500_Ch11.xhtml#_list16)  NetConnector的`main()`函数\n\n\
    ```\n#import <Foundation/Foundation.h>\n#import \"NetConnector.h\"\n\n#define\
    \ INDEX_URL       @\"http://www.wikipedia.com/index.html\"\n```"
  raw: 'In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)
    **Project . . .** from the Xcode File menu. In the **New Project Assistant** pane
    create a command-line application. In the **Project Options** window, specify
    **NetConnector** for the Product Name, choose **Foundation** for the Project Type,
    and select ARC memory management by selecting the **Use Automatic Reference Counting**
    check box. Specify the location in your file system where you want the project
    to be created (if necessary select **New Folder** and enter the name and location
    for the folder), uncheck the **Source Control** check box, and then click the
    **Create** button.


    Now you’re going to create a class that downloads a URL resource using the URL
    loading APIs. Select **New** ![image](images/arrow.jpg) **File . . .** from the
    Xcode File menu, select the **Objective-C** class template, and name the class
    **NetConnector**. Select the **NetConnector** folder for the files location and
    the **NetConnector** project as the target, and then click the **Create** button.
    Next, in the Xcode project navigator pane, select the resulting header file named
    **NetConnector.h** and update the interface, as shown in [Listing 11-14](#9781430250500_Ch11.xhtml#list14).


    [*Listing 11-14.*](#9781430250500_Ch11.xhtml#_list14)  NetConnector Interface


    ```

    #import <Foundation/Foundation.h>

    #define HTTP_SCHEME       @"http"

    #define CACHE_MEMORY_SIZE (4 * 1024 * 1024)


    @interface NetConnector : NSObject <NSURLConnectionDelegate>


    @property (readonly) BOOL finishedLoading;


    - (id) initWithRequest:(NSURLRequest *)request;

    - (void) reloadRequest;


    @end

    ```


    The `NetConnector` interface adopts the `NSURLConnectionDelegate` protocol, thereby
    enabling it to asynchronously load data from an `NSURLConnection` instance. The
    property `finishedLoading` is used to indicate when the `NSURLConnection` instance
    is finished loading data. The `initWithRequest:` method initializes a `NetConnector`
    object and loads a URL using the input `NSURLRequest`. The `reloadRequest` method
    is used to reload the input `NSURLRequest`. Now select the **NetConnector.m**
    file and update the implementation, as shown in [Listing 11-15](#9781430250500_Ch11.xhtml#list15).


    [*Listing 11-15.*](#9781430250500_Ch11.xhtml#_list15)  NetConnector Implementation


    ```

    #import "NetConnector.h"


    // Extension to declare provide properties

    @interface NetConnector()


    @property NSURLRequest *request;

    @property BOOL finishedLoading;

    @property NSURLConnection *connector;

    @property NSMutableData *receivedData;


    @end


    @implementation NetConnector


    - (id) initWithRequest:(NSURLRequest *)request

    {

      if ((self = [super init]))

      {

        _request = request;

        // Create URL cache with appropriate in-memory storage

        NSURLCache *URLCache = [[NSURLCache alloc] init];

        [URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];

        [NSURLCache setSharedURLCache:URLCache];

        // Create connection and begin downloading data from resource

        _connector = [NSURLConnection connectionWithRequest:request delegate:self];

      }

      return self;

    }


    - (void) reloadRequest

    {

      self.finishedLoading = NO;

      self.connector = [NSURLConnection connectionWithRequest:self.request

                                                     delegate:self];

    }


    #pragma mark -

    #pragma mark Delegate methods


    - (void)connection:(NSURLConnection *)connection

    didReceiveResponse:(NSURLResponse *)response

    {

      if (self.receivedData != nil)

      {

        [self.receivedData setLength:0];

      }

    }


    - (NSCachedURLResponse *)connection:(NSURLConnection *)connection

                      willCacheResponse:(NSCachedURLResponse *)cachedResponse

    {

      NSURLResponse *response = [cachedResponse response];

      NSURL *url = [response URL];

      if ([[url scheme] isEqualTo:HTTP_SCHEME])

      {

        NSLog(@"Downloaded data, caching response");

        return cachedResponse;

      }

      else

      {

        NSLog(@"Downloaded data, not caching response");

        return nil;

      }

    }


    - (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data

    {

       if (self.receivedData != nil)

       {

         [self.receivedData appendData:data];

       }

       else

       {

         self.receivedData = [[NSMutableData alloc] initWithData:data];

       }

    }


    - (void)connectionDidFinishLoading:(NSURLConnection *)connection

    {

      NSUInteger length = [self.receivedData length];

      NSLog(@"Downloaded %lu bytes from request %@", length, self.request);

      // Loaded data, set flag to exit run loop

      self.finishedLoading = YES;

    }


    - (void)connection:(NSURLConnection *)connection didFailWithError:(NSError *)error

    {

      NSLog(@"Error loading request %@", [error localizedDescription]);

      self.finishedLoading = YES;

    }


    @end

    ```


    OK, so I know that this is a lot of code, but don’t worry, you’ll take it one
    step at a time!. The file begins with a category extension that declares private
    properties used within the `NetConnector` implementation. The implementation defines
    both the methods declared by the interface and methods declared by the `NSURLConnectionDelegate`
    protocol. The `initWithRequest:` method assigns the input `NSURLRequest` to the
    private NetConnector `request` property, creates and initializes an `NSURLCache`
    instance for caching responses, and ends by creating an `NSURLConnection` object
    and starting the download of the URL. The following statements from [Listing 11-15](#9781430250500_Ch11.xhtml#list15)
    create the cache, configure it with in-memory storage, and then set it to be the
    shared cache used with the connection.


    ```

    NSURLCache *URLCache = [[NSURLCache alloc] init];

    [URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];

    [NSURLCache setSharedURLCache:URLCache];

    ```


    The `reloadRequest` method reloads the URL. It first resets the `finishedLoading`
    flag, and then creates a new `NSURLConnection` object with the saved request and
    downloads the URL.


    The remaining methods implemented here are `NSURLConnectionDelegate` protocol
    methods. The `connection:didReceiveResponse:` message is sent when a connection
    is able to send a response to the request. As shown in [Listing 11-15](#9781430250500_Ch11.xhtml#list15),
    this method sets the `receivedData` object to a length of zero, thereby discarding
    data received from previous requests.


    The `connection:willCacheResponse:` message is sent before a connection stores
    the response in the cache. This enables the method implementation to modify the
    response or prevent it from being cached. As shown in [Listing 11-15](#9781430250500_Ch11.xhtml#list15),
    the method performs conditional logic that enables/disables caching of the response
    based on whether or not the scheme for the URL is `http`.


    The `connection:didReceiveData:` message is sent as the data is received from
    the resource. This method may be called multiple times during a single request
    if the data is received incrementally. As shown in [Listing 11-15](#9781430250500_Ch11.xhtml#list15),
    the method appends the received data to the `receivedData` object.


