- fmt: "你的代码也可以通过使用`copy`消息创建`block`对象，从而获得该对象的所有权。\n\n**注意**：*block* 是闭包的一种实现，是一种允许访问其正常作用域外部变量的函数。Block\
    \ 可以动态分配在堆上，并且与标准的 Objective-C 对象一样，由 ARC 管理。本书第 4 部分将深入介绍 block 的编程。\n\n## 释放对象的所有权\n\
    \n如前所述，ARC 禁止在对象上编程使用`release`、`autorelease`、`dealloc`或相关消息。当你的代码执行以下任一操作时，它放弃了对对象的所有权：1)\
    \ 变量重新赋值，2) `nil`赋值，或 3) 其所有者被释放。\n\n### 变量重新赋值\n\n如果一个指向动态创建对象的变量被更改为指向另一个对象，则该对象失去一个所有者。在编译时，ARC\
    \ 会插入代码向此对象发送`release`消息。此时，如果该对象没有其他所有者，它将被释放。[Listing 6-2](#9781430250500_Ch06.xhtml#list2)\
    \ 演示了变量重新赋值的示例。\n\n[*Listing 6-2.*](#9781430250500_Ch06.xhtml#_list2)  对象所有权——变量重新赋值\n\
    \n```\nAtom *myAtom = [[Atom alloc] initWithName:@\"Atom 1\"];\n// 其他代码\n...\n\
    myAtom = [[Atom alloc] initWithName:@\"Atom 2\"];\n```\n\n在 [Listing 6-2](#9781430250500_Ch06.xhtml#list2)\
    \ 中，创建了一个`Atom`对象（我们称其为`Atom 1`）并赋值给`myAtom`变量；稍后在代码中，此变量被赋值为另一个`Atom`对象（我们称其为`Atom\
    \ 2`）。由于`myAtom`变量已重新赋值为`Atom 2`，`Atom 1`失去一个所有者，如果该对象没有其他所有者，它将被释放。\n\n### nil\
    \ 赋值\n\n如果一个当前指向动态创建对象的变量的值被设置为`nil`，则该对象失去一个所有者。[Listing 6-3](#9781430250500_Ch06.xhtml#list3)\
    \ 演示了`nil`赋值的示例。\n\n[*Listing 6-3.*](#9781430250500_Ch06.xhtml#_list3)  对象所有权——nil\
    \ 重新赋值\n\n```\nAtom *myAtom = [[Atom alloc] init];\n// 其他代码\n...\nmyAtom = nil;\n\
    ```\n\n在 [Listing 6-3](#9781430250500_Ch06.xhtml#list3) 中，创建了一个`Atom`对象并赋值给`myAtom`变量；稍后在代码中，此变量被设置为`nil`。由于`myAtom`变量已设置为`nil`，该`Atom`对象失去一个所有者。同样，在将`myAtom`变量设置为`nil`的语句之后，ARC\
    \ 会插入代码向此对象发送`release`消息。\n\n### 所有者释放\n\n*所有者释放*。这听起来不太令人愉快，不是吗？实际上，这个术语指的是对象所有权，以及\
    \ ARC 如何透明地管理对象图和集合的对象生命周期。面向对象的程序由相互关联的对象网络组成。这些对象通过 OOP 继承和/或组合连接在一起，统称为*对象图*。在对象图中，对象通过组合原理包含对其他（子）对象的引用。如果一个（父）对象创建了另一个（子）对象，它就声称拥有该子对象的所有权。在[第\
    \ 4 章](#9781430250500_Ch04.xhtml)中，你创建了一个程序，其中包含一个由`OrderEntry`类和两个依赖（子）类组成的对象图；其对象图如[Figure\
    \ 6-1](#9781430250500_Ch06.xhtml#Fig1) 所示。\n\n![9781430250500_Fig06-01.jpg](images/9781430250500_Fig06-01.jpg)\n\
    \n[Figure 6-1](#9781430250500_Ch06.xhtml#_Fig1). OrderEntry 对象图\n\n当创建并初始化一个`OrderEntry`对象时，其`init`方法也会创建其两个子类的实例；因此，`OrderEntry`对象声称拥有这些子对象中每一个的所有权。稍后，当释放一个`OrderEntry`对象时，ARC\
    \ 会自动向其每个子对象发送`release`消息。具体来说，在编译时，ARC 会创建代码，为`OrderEntry`对象插入一个`dealloc`方法（如果该方法尚不存在），为其拥有的每个子对象插入一条`release`消息，然后向`OrderEntry`对象的超类发送一条`dealloc`消息。因此，ARC\
    \ 会自动管理对象图的生命周期。\n\nApple 基础框架包含各种集合类，之所以这样命名，是因为它们用于保存其他对象的实例。当一个对象存储在一个集合类的实例中时，该集合类声称拥有该对象的所有权。相反，当释放一个集合类实例时，ARC\
    \ 会自动向集合中的每个对象发送一条`release`消息。\n\n## 创建多个订单条目\n\n为了说明 ARC 内存管理和所有者释放的用法，你将扩展在第\
    \ 4 章中创建的 Order Entry 项目，添加收集和存储多个订单条目的功能。你将使用一个集合类来存储这些条目，然后演示 ARC 如何对集合类及其存储的对象执行内存管理。\n\
    \n在 Xcode 中，通过从 Xcode 文件菜单中选择 **Open Recent ![image](images/arrow.jpg) ARC Orders.xcodeproj**\
    \ 来打开 ARC Orders 项目（如果尚未打开）。该项目的源代码由七个文件组成，这些文件实现了`OrderEntry`、`OrderItem`和`Address`类，以及`main`函数。让我们从对`OrderItem`类进行一些更新开始。在导航器窗格中选择\
    \ **OrderItem.h** 文件，然后更新 OrderItem 接口，如 [Listing 6-4](#9781430250500_Ch06.xhtml#list4)\
    \ 所示。\n\n[*Listing 6-4.*](#9781430250500_Ch06.xhtml#_list4)  ARC OrderItem 类接口\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface OrderItem : NSObject\n\n\
    @property (readonly) NSString *name;\n\n- (id) initWithName:(NSString *)itemName;\n\
    \n@end\n```\n\n在 [Listing 6-4](#9781430250500_Ch06.xhtml#list4) 中，实例变量`name`已更改为只读属性。接下来，选择\
    \ **OrderItem.m** 文件并更新`OrderItem`实现，如 [Listing 6-5](#9781430250500_Ch06.xhtml#list5)\
    \ 所示。\n\n[*Listing 6-5.*](#9781430250500_Ch06.xhtml#_list5)  ARC OrderItem 类实现\n\
    \n```\n#import \"OrderItem.h\"\n\n@implementation OrderItem\n\n- (id) initWithName:(NSString\
