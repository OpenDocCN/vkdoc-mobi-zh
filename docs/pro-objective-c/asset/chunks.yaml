    \ [orderObject objectForKeyedSubscript:@\"1234\"];\n```\n\n相反，字典风格的下标表达式用于在以下赋值语句中设置值。\n\
    \n```\norderObject[@\"1234\"] = @\"Cheeseburger\";\n```\n\n在此情况下，下标表达式（`orderObject[@\"\
