  trans: "\n| 类别 | 属性 | 描述 |\n| --- | --- | --- |\n| 原子性 | `nonatomic` | 访问器不是原子的，因此当多个线程同时访问时，可能会产生不同的结果。如果未指定，访问器是原子的；也就是说，它们的值总是被完整地设置/获取。\
    \ |\n| 设置器语义 | `assign` | 设置器方法对属性值执行简单的赋值，不使用 `copy` 或 `retain`。这是默认设置。 |\n|\
    \  | `retain` | 赋值时，输入值将收到一条 `retain` 消息，而先前的值将收到一条 `release` 消息。 |\n|  | `copy`\
    \ | 赋值时，将设置新消息的一个副本，而先前的值将收到一条 `release` 消息。 |\n|  | `strong` | 此属性（在属性上应用 ARC\
    \ 内存管理时使用）等同于 `retain` 属性。 |\n|  | `weak` | 此属性（在属性上应用 ARC 内存管理时使用）类似于 `assign`\
    \ 属性，不同之处在于，如果受影响的属性被释放，其值会被设置为 `nil`。 |\n| 读/写 | `readwrite` | 该属性可读可写。必须同时实现\
    \ getter 和 setter 方法。这是默认设置。 |\n|  | `read-only` | 该属性只可读取，不可写入。必须实现 getter 方法。\
    \ |\n| 方法名称 | `getter=getterName` | 将 getter 重命名为指定的 `getterName`。 |\n|  | `setter=setterName`\
    \ | 将 setter 重命名为指定的 `setterName`。 |\n\n## 属性定义\n\n属性定义在类的实现部分进行。在大多数情况下，属性由一个实例变量支持；因此，属性定义包括为该属性定义\
    \ getter 和 setter 方法、声明一个实例变量，以及在 getter/setter 方法中使用该变量。Objective-C 提供了几种定义属性的方法：显式定义、通过关键字合成以及自动合成。\n\
    \n## 显式定义\n\n对于这种属性定义方法，其方法在相应的类实现中被显式定义。例如，名为 `myIntProperty` 的属性的 setter 方法可以如代码清单\
    \ 2-11 所示进行定义。\n\n*代码清单 2-11.* 属性设置器方法定义\n\n```\n-(void) setMyIntProperty:(int)\
    \ value\n{\n  _myIntProperty = value;\n{\n```\n\n与属性对应的变量名称以下划线开头。此命名反映了 Objective-C\
    \ 中属性实例变量的标准命名约定，即变量名称为属性名称，并加上下划线前缀。\n\n## 通过关键字合成\n\n通过使用 `@synthesize` 关键字，编译器可以自动生成属性定义。属性在相应的类实现部分被合成。通过关键字合成属性的语法是\n\
    \n```\n@synthesize propertyName [= instanceVariableName];\n```\n\n如果未提供可选的 `instanceVariableName`\
    \ 赋值，编译器将遵循属性支持实例变量的标准命名约定自动生成实例变量名称。如果提供了 `instanceVariableName` 值，编译器将使用提供的名称创建实例变量。对于名为\
    \ `myIntProperty` 的属性，使用以下语句将自动生成 getter 和 setter 方法：\n\n```\n@synthesize myIntProperty;\n\
    ```\n\n编译器将创建一个名为 `_myIntProperty` 的相应实例变量。\n\n## 自动合成\n\n推荐的 Apple Objective-C\
    \ 编译器 Clang/LLVM（4.2 版本及以上）支持对已声明属性进行自动合成。这意味着编译器将自动合成那些既不是：1）通过关键字合成（例如，使用 `@synthesis`）；2）动态生成（通过\
    \ `@dynamic` 属性指令）；也不是 3）具有用户提供的 getter 和 setter 方法的已声明属性。因此，在使用此功能时，无需包含代码来合成已声明的属性。一个已声明的属性连同相应的实例变量会被编译器自动合成。之前实现的\
    \ `Atom` 类（参见代码清单 2-3）对其声明的属性使用了自动合成。\n\n## 动态生成\n\n属性的访问器方法可以在运行时被委托或动态创建。在这些情况下，可以使用\
    \ `@dynamic` 属性指令来防止编译器自动生成访问器方法。如果编译器找不到与名称跟在 `@dynamic` 属性后的属性相关联的访问器方法的实现，它不会生成警告。相反，开发者负责通过直接编写访问器方法实现、使用其他方式派生它们（例如动态代码加载或动态方法解析），或利用动态生成这些方法的软件库（例如\
    \ Apple Core Data 框架）来创建这些方法。\n\n## 属性支持的实例变量\n\n大多数属性由一个实例变量支持，因此这是属性隐藏对象内部状态的机制。除非另有说明，实例变量应与属性同名，但带有下划线前缀。在代码清单\
    \ 2-5 所示的 `Atom` 类实现中，`init` 方法访问 `chemicalElement` 属性的实例变量，该变量名为 `_chemicalElement`。\n\
    \n## 属性访问\n\nObjective-C 提供了两种访问属性的机制：访问器方法和点表示法。由编译器合成的访问器方法遵循标准命名约定：\n\n*  \
    \ 用于访问值的方法（*getter* 方法）与属性同名。\n*   用于设置值的方法（*setter* 方法）以单词“set”开头，后接属性名，且属性名的首字母大写。\n\
    \n使用这些约定，名为 `color` 的属性的 getter 方法将被命名为 `color`，其 setter 方法将被命名为 `setColor`。因此，对于一个名为\
    \ `myObject` 的对象，其 getter 和 setter 访问器方法将如下调用：\n\n```\n[myObject color];\n[myObject\
    \ setColor:value];\n```\n\nObjective-C 为访问器方法提供了一种简洁的替代方案：*点表示法*。用于获取和设置名为 `myObject`\
    \ 的对象的属性的点表示法语法是：\n\n```\nmyObject.propertyName;\nmyObject.propertyName = propertyValue;\n\
    ```\n\n第一条语句调用 getter 访问器方法来检索属性的值，第二条语句调用 setter 访问器方法将属性设置为 `propertyValue`\
    \ 的值。\n\n通常，应使用上述两种机制来访问属性。但是，如果与属性关联的对象尚未（或可能尚未）完全构造，则不应使用这些机制，而应改用属性支持的实例变量。这意味着在类的\
    \ `init` 方法或 `dealloc` 方法中，应直接访问实例变量，如代码清单 2-5 中 `Atom` 类的 `_chemicalElement`\
    \ 实例变量所示。\n\n方法\n"
- fmt: '# Methods


    Methods define the behavior exhibited by classes and class instances (objects)
    at runtime. They are directly associated with either an Objective-C class (class
    method) or object (instance method). Instance methods have direct access to an
    object’s instance variables. Methods can be declared in a class interface, a protocol,
    and/or a category. Methods thus declared are defined in a corresponding class
    implementation.


    ## Syntax


    A method declaration consists of a method type, a return type, and one or more
    method segments that provide name, parameter, and parameter type information (see
    [Figure 2-5](#9781430250500_Ch02.xhtml#Fig5)).


    ![9781430250500_Fig02-05.jpg](images/9781430250500_Fig02-05.jpg)


    [Figure 2-5](#9781430250500_Ch02.xhtml#_Fig5). Method declaration syntax


    The *method type* identifier specifies whether the method is a class or an instance
    method. A class method is declared with a `+` (plus) sign and indicates that the
    method has *class scope*, meaning that it operates at the class level and does
    not have access to the instance variables of the class (unless they are passed
    as parameters to the method). An instance method is declared with a `–` (minus)
    sign and indicates that the method has *object scope*. It operates at the instance
    level and has direct access to the instance variables of the object and its parent
    objects (subject to the access controls on the instance variables).


    The *return type* indicates the type of the returned variable from the method,
    if any. The return type is specified within parentheses, following the method
    type. If the method does not return anything, the return type is declared as `void`.
    [Figure 2-5](#9781430250500_Ch02.xhtml#Fig5). declares a class method with two
    parameters whose names are `np` and `nn`, each of which takes a non-negative integer
    value, and returns a value of type `id`, a special Objective-C type that I will
    discuss in the next chapter.


    The method definition syntax is identical to that of the declaration syntax, but
    instead of a terminating semicolon, it is followed by the implementation logic
    enclosed within curly braces. The `Atom` class declares an instance method named
    `massNumber`; the implementation of this method is shown in [Listing 2-5](#9781430250500_Ch02.xhtml#list5).


    ## Invoking Methods


    In Objective-C, an object (the *sender*) interacts with another object (the *receiver*)
    by sending it a message, thus causing the receiver to invoke a specific method.
    The syntax for invoking a method on an object is


    ```

    [receiver methodSegmentName:parameterValue ...];

    ```


    Braces surround the message. If the method has multiple segments, its name and
    parameter values are listed consecutively, each separated by a space. An example
    method invocation with multiple name/parameter value pairs is


    ```

    [Atom withProtons:6 neutrons:6 electrons:6];

    ```


    This method invocation has three segments and thus takes three input parameters:
    an integer number of protons, neutrons, and electrons.


    ## Protocol


    You have learned about the basic elements and structure of Objective-C classes,
    but the language provides several additional features for developing classes.
    In this section, you’ll learn about one of these: protocols.


    A *protocol* declares methods and properties that can be implemented by any class.
    A class interface is directly associated with a specific class and, hence, a class
    hierarchy. On the other hand, a protocol is not associated with any particular
    class, thus it can be used to capture similarities among classes that are not
    hierarchically related. Protocols provide Objective-C with the capability to support
    the concept of multiple inheritance of specification (i.e., of method declarations).
    A protocol can also be used to define the messages that an object can send (by
    specifying properties that conform to a protocol).


    ### Syntax


    A protocol declaration begins with the `@protocol` directive followed by the name
    of the protocol. It ends with the `@end` directive. Protocols can have both *required*
    and *optional* methods; optional methods do not require that an implementation
    of the protocol implement these methods. The directives `@required` and `@optional`
    (followed by the method name(s)) are used to mark a method appropriately. If neither
    keyword is specified, the default behavior is required. The syntax of a protocol
    declaration is shown in [Listing 2-12](#9781430250500_Ch02.xhtml#list12).


    [*Listing 2-12.*](#9781430250500_Ch02.xhtml#_list12) Protocol Declaration Syntax


    ```

    @protocol ProtocolName

    // Property declarations

    @required

    // Method declarations

    @optional

    // Method declarations

    @end

    ```


    One protocol can incorporate other protocols by specifying the name of each declared
    protocol within braces; this is referred to as *adopting* a protocol. Commas are
    used to separate multiple protocols (see [Listing 2-13](#9781430250500_Ch02.xhtml#list13)).


    [*Listing 2-13.*](#9781430250500_Ch02.xhtml#_list13) Incorporating Other Protocols


    ```

    @protocol ProtocolName<ProtocolName(s)>

    // Method declarations

    @end

    ```


    An interface can adopt other protocols using similar syntax (see [Listing 2-14](#9781430250500_Ch02.xhtml#list14)).


    [*Listing 2-14.*](#9781430250500_Ch02.xhtml#_list14) Interface Adopting a Protocol


    ```

    @interface ClassName : Parent <ProtocolName(s)>

    // Method declarations

    @end

    ```


    To put this theory into action, you are going to add a protocol to the `Atom`
    project and have the `Atom` implementation conform to (i.e., implement) the required
    methods of this protocol. From the Xcode workspace window, select the **Elements**
    folder in the navigator area and then create a new file (by selecting **New ![image](images/arrow.jpg)
    File . . .** from the Xcode File menu) just as you did earlier. The New File template
    will be displayed. As before, select **Cocoa** under OS X, but instead of creating
    an Objective-C class, select the **Objective-C protocol icon** to create a protocol
    that conforms to the `NSObject` protocol. Next, click the **Next** button (see
    [Figure 2-6](#9781430250500_Ch02.xhtml#Fig6)).


    ![9781430250500_Fig02-06.jpg](images/9781430250500_Fig02-06.jpg)


    [Figure 2-6](#9781430250500_Ch02.xhtml#_Fig6). Create a protocol using Xcode


    In the next window that specifies options for your new file, enter **Writer**
    for the protocol name and click the **Next** button. Next, you’ll be prompted
    to specify where in your file system to save the class files and the project target
    for the class. Leave the location as the **Elements** folder, select **Elements**
    as the project target (if not already selected), and click the **Create** button.
    A header file named `Writer.h` has been added to the Xcode project navigator pane.
    Click this file to display the Writer protocol (see [Listing 2-15](#9781430250500_Ch02.xhtml#list15)).


    [*Listing 2-15.*](#9781430250500_Ch02.xhtml#_list15) Protocol Template File


    ```

    #import <Foundation/Foundation.h>


    @protocol Writer <NSObject>


    @end

    ```


    In the editor pane, update the `Writer.h` file as shown in [Listing 2-16](#9781430250500_Ch02.xhtml#list16)
    (the code updates are shown in **bold**).


    [*Listing 2-16.*](#9781430250500_Ch02.xhtml#_list16) Protocol Method Declarations


    ```

    #import <Foundation/Foundation.h>


    @protocol Writer <NSObject>


    - (void)write:(NSFileHandle *)file;


    @end

    ```


    This protocol declares a method named `write` that takes a reference to an `NSFileHandle`
    as its parameter and returns nothing. To make the `Atom` interface adopt this
    protocol, select the `Atom.h` file in the navigator pane and then make the updates
    shown in **bold** (see [Listing 2-17](#9781430250500_Ch02.xhtml#list17)).


    [*Listing 2-17.*](#9781430250500_Ch02.xhtml#_list17) Adopting a Protocol


    ```

    #import <Foundation/Foundation.h>

    #import "Writer.h"


    @interface Atom : NSObject <Writer>

    ```'
