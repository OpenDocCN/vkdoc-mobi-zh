    uncheck the **Source Control** check box, and then click the **Create** button.


    Next, you’ll create a `Calculator` class. Add the class to the project. Select
    **New** ![image](images/arrow.jpg) **File ...** from the Xcode File menu, select
    the **Objective-C** class template, name the class **Calculator** (in the Subclass
    Of drop-down list, select **NSObject**), select the **Calculator** folder for
    the files location and the **Calculator** project as the target, and then click
    the **Create** button.


    You’re done creating the program files, now let’s implement the code. Select the
    **Calculator.h** file in the navigator pane, and then add the code shown in [Listing
    7-5](#9781430250500_Ch07.xhtml#list5).


    [*Listing 7-5.*](#9781430250500_Ch07.xhtml#_list5)  Calculator Class Interface


    ```

    #import <Foundation/Foundation.h>


    @interface Calculator : NSObject'
  trans: "\n与任何消息传递表达式一样，每个选择器名称段后面都跟着一个参数。在包含一个或多个空段的选择器中，名称段虽然不提供，但参数仍然必须存在，因此前面的示例中出现了消息\
    \ `sumAddend1:25 :10`。通常情况下，你不会看到很多带空参数名（即空选择器段）的方法声明，因为用于调用此类方法的对象消息中的一个拼写错误，很容易导致难以调试的错误。\n\
    \n## SEL 类型\n\n到目前为止，你将选择器定义为消息传递表达式中消息的一部分文本字符串；现在，你将深入了解选择器类型。*选择器类型*（`SEL`）是一种特殊的\
    \ Objective-C 类型，它表示一个唯一标识符，在源代码编译时会替换选择器的值。所有具有相同选择器值的方法都拥有相同的 `SEL` 标识符。Objective-C\
    \ 运行时系统确保每个选择器标识符都是唯一的。可以使用 `@selector` 关键字创建 `SEL` 类型的变量。\n\n```\nSEL myMethod\
    \ = @selector(myMethod);\n```\n\n那么，为什么要创建 `SEL` 变量呢？实际上，Objective-C 运行时系统（通过\
    \ `NSObject`）包含许多方法，这些方法将 `SEL` 类型的变量作为参数用于动态方法。除了获取对象和类的信息外，`NSObject` 还提供了几种方法，用于通过选择器参数调用对象上的方法。下面的示例使用了\
    \ `NSObject` 实例方法 `performSelector:withObject:withObject:` 来调用由选择器变量指定的方法。\n\n\
    ```\n[myCalculator performSelector:@selector(sumAddend1::) withObject:[NSNumber\
    \ numberWithInteger:25]\n                         withObject:[NSNumber numberWithInteger:10]];\n\
    ```\n\n`@selector` 指令会在编译时创建一个选择器变量。你也可以在运行时使用 Foundation 框架中的 `NSSelectorFromString`\
    \ 函数创建选择器。在这种情况下，前面的示例更新如下：\n\n```\n SEL selector = NSSelectorFromString(@\"sumAddend1::\"\
    );\n [myCalculator performSelector:selector withObject:[NSNumber numberWithInteger:25]\n\
    \                         withObject:[NSNumber numberWithInteger:10]];\n```\n\n\
    ## 方法签名\n\n现在你已经了解了消息接收者、选择器和 `SEL` 类型，接下来让我们看看方法签名及其在对象消息传递中的作用。*方法签名*定义了方法输入参数的数据类型及其返回结果（如果有）。你可能会想：好吧，这都挺好，但这对向对象发送消息有什么重要性呢？要理解这一点，我们花点时间讨论一下运行时系统实现对象消息传递的一些内部机制。\n\
    \n**注意** 在下一章中，你将深入研究运行时系统的细节，以及其动态行为（如对象消息传递）是如何实现的。在本章中，你将重点放在运行时系统架构上，而不是其实现细节上。\n\
    \n编译器将形式为 `[receiver message]` 的对象消息转换为一个（ANSI）C 函数调用，该调用的声明包含方法签名。因此，为了生成正确的对象消息传递代码，编译器需要知道选择器值和方法签名。选择器很容易从对象消息表达式中提取出来，但编译器如何确定方法签名呢？毕竟，消息可能包含输入参数，但除非在运行时确定接收者（以及相应的方法），否则你无法知道这些类型如何映射到实际要调用的方法。好吧，为了确定正确的方法签名，编译器会根据其迄今解析过的声明中能看到的方法进行猜测。如果找不到，或者它看到的声明与实际在运行时执行的方法之间存在不匹配，则可能发生方法签名不匹配，从而导致从编译器警告到运行时错误的各种问题。\n\
    \n为了演示可能导致方法签名不匹配的场景，假设你的程序使用了三个类，其接口如清单 7-4 所示。\n\n*清单 7-4.* 计算器类方法\n\n```\n\
    @interface Calculator1 : NSObject\n- (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n\
    @end\n\n@interface Calculator2 : NSObject\n- (float) sumAddend1:(float)a1 addend2:(float)a2;\n\
    @end\n\n@interface Calculator3 : NSObject\n- (NSInteger) sumAddend1:(NSInteger)a1\
    \ addend2:(NSInteger)a2;\n@end\n```\n\n那么，当你的代码发送消息 `[receiver sumAddend1:25 addend2:10]`，而接收者的类型是\
    \ `id` 时，会发生什么？根据你的代码导入的接口以及接收者的运行时类型（使用清单 7-4，接收者可以是 `Calculator1`、`Calculator2`\
    \ 或 `Calculator3` 类型），可能会发生方法签名不匹配。这种情况会导致各种错误，例如堆栈溢出、无效的方法输入或无效的返回结果。\n\n这个例子说明了方法签名不匹配的危险性。为了避免这种情况，最好尽量确保具有不同签名的方法也具有不同的名称。\n\
    \n## 使用对象消息传递\n\n现在，你将创建一个示例程序来说明选择器和 `SEL` 类型的使用。在 Xcode 中，通过从 Xcode 文件菜单中选择\
    \ **新建** ![image](img/arrow.jpg) **项目...** 来创建一个新项目。在 **新建项目助手** 窗格中，创建一个命令行应用程序（从\
    \ OS X 应用程序选择中选择 **命令行工具**），然后点击 **下一步**。在 **项目选项** 窗口中，将产品名称指定为 **Calculator**，将项目类型选择为\
    \ **Foundation**，通过勾选 **使用自动引用计数** 复选框选择 ARC 内存管理，然后点击 **下一步**。\n\n在文件系统中指定项目创建的位置（如果需要，选择\
    \ **新建文件夹** 并输入文件夹的名称和位置），取消勾选 **源代码控制** 复选框，然后点击 **创建** 按钮。\n\n接下来，你将创建一个 `Calculator`\
    \ 类。将类添加到项目中。从 Xcode 文件菜单中选择 **新建** ![image](img/arrow.jpg) **文件...**，选择 **Objective-C**\
    \ 类模板，将类命名为 **Calculator**（在“子类化自”下拉列表中，选择 **NSObject**），选择 **Calculator** 文件夹作为文件位置，选择\
    \ **Calculator** 项目作为目标，然后点击 **创建** 按钮。\n\n至此，你已经完成了程序文件的创建，现在开始实现代码。在导航器窗格中选择\
    \ **Calculator.h** 文件，然后添加如清单 7-5 所示的代码。\n\n*清单 7-5.* Calculator 类接口\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Calculator : NSObject\n```\n"
- fmt: "```objc\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2;\n\
    - (NSNumber *) sumAddend1:(NSNumber *)adder1 :(NSNumber *)adder2;\n\n@end\n```\n\
    \nThe `Calculator` class adds two instance methods: `sumAddend1:addend2:` and\
    \ `sumAddend1::`. Each method takes two input parameters of type `NSNumber *`\
    \ and returns an `NSNumber *`. Also note that the second parameter for the second\
    \ method takes an empty argument name. Now select the `Calculator.m` file and\
    \ implement the `Calculator` class, as shown in [Listing 7-6](#9781430250500_Ch07.xhtml#list6).\n\
    \n[*Listing 7-6.*](#9781430250500_Ch07.xhtml#_list6) Calculator Class Implementation\n\
    \n```objc\n#import \"Calculator.h\"\n\n@implementation Calculator\n\n- (NSNumber\
    \ *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2\n{\n  NSLog(@\"\
    Invoking method on %@ object with selector %@\", [self className],\n        NSStringFromSelector(_cmd));\n\
    \  return [NSNumber numberWithInteger:([adder1 integerValue] +\n             \
    \                         [adder2 integerValue])];\n}\n\n- (NSNumber *) sumAddend1:(NSNumber\
    \ *)adder1 :(NSNumber *)adder2\n{\n  NSLog(@\"Invoking method on %@ object with\
    \ selector %@\", [self className],\n        NSStringFromSelector(_cmd));\n  return\
    \ [NSNumber numberWithInteger:([adder1 integerValue] +\n                     \
    \                 [adder2 integerValue])];\n}\n\n@end\n```\n\nEach method simply\
    \ returns the sum of the two input parameters. The methods also log to the console\
    \ the class name of the (receiver) object and a selector text string. This string\
    \ is obtained using the Foundation function `NSStringFromSelector`.\n\n```\nNSStringFromSelector(_cmd)\n\
    ```\n\nThe input parameter for this function is a variable of type `SEL`. So what’s\
    \ this `_cmd` parameter and where did it come from? Well, `_cmd` is an implicit\
    \ parameter (available in the implementation of every Objective-C method but not\
    \ declared in its interface) that holds the selector of the message being sent.\
    \ Thus, the expression `NSStringFromSelector(_cmd)` returns a text string for\
    \ the selector of the method being invoked.\n\nYou’ve implemented the `Calculator`\
    \ class, now let’s implement the `main()` function. Select the `main.m` file in\
    \ the navigator pane and then update the `main()` function, as shown in [Listing\
    \ 7-7](#9781430250500_Ch07.xhtml#list7).\n\n[*Listing 7-7.*](#9781430250500_Ch07.xhtml#_list7)\
    \ Calculator `main()` Function Implementation\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import \"Calculator.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    Calculator *calc = [[Calculator alloc] init];\n    NSNumber *addend1\
