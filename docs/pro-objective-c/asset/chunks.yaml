    \ properties:\n    *   `willChange:valuesAtIndexes:forKey:`\n    *   `didChange:valuesAtIndexes:forKey:`\n\
    \n*   APIs for to-many, unordered relationship properties:\n    *   `willChangeValueForKey:withSetMutation:usingObjects:`\n\
    \    *   `didChangeValueForKey:withSetMutation:usingObjects:`\n\nThe default `NSObject`\
    \ implementation automatically invokes the correct change notification methods\
    \ on an observer when a corresponding property value is changed. Automatic/manual\
    \ change notification is configured with the NSKeyValueObserving `automaticallyNotifiesObserversForKey:`\
    \ method. The default `NSObject` implementation returns `YES` for this method,\
    \ hence it performs automatic change notification. To perform manual change notification,\
    \ your class must override the NSKeyValueObserving `automaticallyNotifiesObserversForKey:`\
    \ method. For properties, you want to perform manual change notification; the\
    \ method should return `NO`. In this case, your code must invoke the `NSKeyValueObserving`\
    \ protocol method `willChange:` before changing the property value, and the `didChange:`\
    \ method after changing the value. [Listing 18-15](#9781430250500_Ch18.xhtml#list15)\
    \ provides an example implementation of manual change notification for the `name`\
    \ property of the `Person` class, as shown in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1).\n\
    \n[*Listing 18-15.*](#9781430250500_Ch18.xhtml#_list15)  Example Implementation\
    \ of KVO Manual Change Notification\n\n```\n- (void)changeName:(Name *)newName\n\
    {\n  [self willChangeValueForKey:@\"name\"];\n  self.name = newName;\n  [self\
    \ didChangeValueForKey:@\"name\"];\n}\n```\n\nSo why would you want to perform\
    \ manual change notification? Reasons include more fine-grained control over the\
    \ sending of change notifications, eliminating unnecessary notifications (e.g.,\
    \ cases when the new property value is the same as its old value), and grouping\
    \ notifications.\n\nThe `NSKeyValueObserving` protocol also provides several methods\
    \ for customizing observing. The `keyPathsForValuesAffectingValueForKey:` method\
    \ retrieves the key paths for all properties whose values affect the value of\
    \ the input key. This method is used to register dependent keys, when the value\
    \ of one property depends upon that of one or more properties in another object.\
    \ For to-one relationship properties, this method should be overridden to enable\
    \ your code to return the appropriate set of dependent keys for the property.\
    \ As an example, the `Address` class, as shown in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1),\
    \ declares `street` *,* `city` *,* `state`, and `zip` properties. A `zip` property\
    \ depends on the other three properties; thus, an application observing the `zip`\
    \ property should be notified if any of the other address properties changes.\
    \ This can be accomplished by having the `Address` class override the method to\
    \ return a collection of key paths consisting of the keys `street` *,* `city`\
    \ and `state`, as shown in [Listing 18-16](#9781430250500_Ch18.xhtml#list16).\n\
    \n[*Listing 18-16.*](#9781430250500_Ch18.xhtml#_list16)  Registering Dependent\
    \ Keys for To-One Relationship Properties"
  trans: "\n# 键值观察 vs. Foundation 框架通知\n\n在第 12 章中，你学习了 Foundation 框架的通知类（`NSNotification`、`NSNotificationCenter`、`NSNotificationQueue`）。这些\
    \ API 提供了一种在对象之间传递信息的机制，功能类似于键值观察。由于这与键值观察的功能有些相似，你可能会想：\"这两种机制如何比较，又该选择哪一种？\"\
    \ 事实上，键值观察与通知 API 之间存在多种差异，这些差异将影响你在特定场景下的选择，因此我在此对两者进行比较。\n\n`NSNotification`实例封装的是通用信息，因此它支持广泛的系统事件（包括属性变更），而键值观察严格用于通知对象属性的变更。因此，仅针对属性变更而言，KVO\
    \ API 比通知 API 可能更易于使用。\n\n通知类采用广播式的交互模型，信息（封装在`NSNotification`对象中）通过一个集中的通知中心（`NSNotificationCenter`实例）进行分发。它允许一条消息发送给多个对象，甚至不要求接收方已注册来支持通知。通知类既支持同步发布通知，也支持异步（使用`NSNotificationQueue`实例）发布通知。而键值观察则采用点对点的交互模型，当属性发生变更时，主体直接向已注册的观察者发送通知，并阻塞直至对应方法执行完毕。这两种机制都提供了松耦合；不过，通知\
    \ API 还提供了非阻塞（即异步）交互，因此有可能让应用获得更高的响应性。\n\n由于通知机制完全解耦了通知事件的发送方和接收方，两者之间不存在直接的双向通信机制；要实现双向通信，双方都必须注册通知。而键值观察则允许观察者向主体发送消息，因为主体作为参数传递给了观察者的`observeValueForKeyPath:ofObject:change:context:`\
    \ 方法。\n\n通知通过其名称来区分，因此名称必须唯一，以确保发布的通知能被正确的观察者接收。苹果公司在《Cocoa 编码规范》文档中指定了一套命名约定，以最大程度减少通知名称冲突的可能性。由于属性名称是特定于类的（即具有类命名空间），并且主体直接与观察者绑定，因此命名冲突不是问题。\n\
    \n## 键值观察 API\n\n`NSKeyValueObserving`协议 API 提供了为输入键路径添加和移除观察者的方法。调用`addObserver:forKeyPath:options:context:`\
    \ 方法会在主体和观察者对象之间建立连接。由于这会创建对观察者的强引用，因此应在主体被释放之前将对象作为观察者移除。`removeObserver:forKeyPath:`\
    \ 方法执行此功能。它会阻止对象接收指定键路径属性的变更通知。`addObserver:forKeyPath:context:` 方法与接收器和上下文执行相同的功能。当同一观察者针对同一键路径注册多次但带有不同上下文时，可以使用上下文指针来确定要移除哪个观察者。代码清单\
    \ 18-14 演示了如何使用这些 API，将一个`Administrator`对象添加为名为`person`的`Person`实例的`name`属性的观察者，然后将其移除。\n\
    \n*代码清单 18-14.* KVO 添加和移除观察者\n\n```\nAdministrator *admin = [Administrator new];\n\
    [person addObserver:admin\n         forKeyPath:@\"name\"\n            options:NSKeyValueObservingOptionNew\n\
    \            context:NULL];\n[person removeObsserver:admin forKeyPath:@\"name\"\
    ];\n```\n\n键值观察提供了（在`NSKeyValueObserving`协议中声明的）API，以支持自动和手动的键值变更通知。这些 API 使观察者能够在属性值变更前后执行逻辑。这些\
    \ API 支持属性、一对一关系和一对多关系属性。\n\n- 用于属性和一对一关系属性的 API：\n  - `willChangeValueForKey:`\n\
    \  - `didChangeValueForKey:`\n\n- 用于一对多、有序关系属性的 API：\n  - `willChange:valuesAtIndexes:forKey:`\n\
    \  - `didChange:valuesAtIndexes:forKey:`\n\n- 用于一对多、无序关系属性的 API：\n  - `willChangeValueForKey:withSetMutation:usingObjects:`\n\
    \  - `didChangeValueForKey:withSetMutation:usingObjects:`\n\n当相应属性值发生变更时，默认的`NSObject`实现会自动在观察者上调用正确的变更通知方法。自动/手动变更通知通过`NSKeyValueObserving`的`automaticallyNotifiesObserversForKey:`\
    \ 方法进行配置。默认的`NSObject`实现对此方法返回`YES`，因此它执行自动变更通知。要执行手动变更通知，你的类必须重写`NSKeyValueObserving`的`automaticallyNotifiesObserversForKey:`\
    \ 方法。对于你想要执行手动变更通知的属性，该方法应返回`NO`。在这种情况下，你的代码必须在更改属性值之前调用`NSKeyValueObserving`协议方法`willChange:`，并在更改值之后调用`didChange:`\
    \ 方法。代码清单 18-15 为`Person`类的`name`属性提供了手动变更通知的示例实现，如图 18-1 所示。\n\n*代码清单 18-15.*\
    \ KVO 手动变更通知的示例实现\n\n```\n- (void)changeName:(Name *)newName\n{\n  [self willChangeValueForKey:@\"\
    name\"];\n  self.name = newName;\n  [self didChangeValueForKey:@\"name\"];\n}\n\
    ```\n\n那么，为什么要执行手动变更通知呢？原因包括对变更通知的发送进行更精细的控制、消除不必要的通知（例如，新属性值与旧值相同的情况），以及将通知分组。\n\
    \n`NSKeyValueObserving`协议还提供了几种用于自定义观察的方法。`keyPathsForValuesAffectingValueForKey:`\
    \ 方法检索影响输入键值所有属性的键路径。当一个属性的值依赖于另一个对象中的一个或多个属性时，此方法用于注册依赖键。对于一对一关系属性，应重写此方法，以使你的代码能为该属性返回适当的依赖键集合。例如，`Address`类（如图\
    \ 18-1 所示）声明了`street`、`city`、`state`和`zip`属性。`zip`属性依赖于其他三个属性；因此，如果任何其他地址属性发生更改，则应通知观察`zip`属性的应用。这可以通过让`Address`类重写该方法，以返回一个包含键`street`、`city`和`state`的键路径集合来实现，如代码清单\
    \ 18-16 所示。\n\n*代码清单 18-16.* 为一对一关系属性注册依赖键\n"
- fmt: "```objective-c\n+ (NSSet *)keyPathsForValuesAffectingValueForKey:(NSString\
    \ *)key\n{\n  NSSet *keyPaths = [super keyPathsForValuesAffectingValueForKey:key];\n\
    \  if ([key isEqualToString:@\"zip\"])\n  {\n    NSArray *affectingKeys = @[@\"\
    street\", @\"city\", @\"state\"];\n    keyPaths = [keyPaths setByAddingObjectsFromArray:affectingKeys];\n\
    \  }\n  return keyPaths;\n}\n```\n\nIt is also possible to register dependent\
    \ keys for to-one relationship properties by implementing a class method that\
    \ follows the naming convention `keyPathsForValuesAffecting<Key>`, where `<Key>`\
    \ is the name of the attribute that is dependent on the values. Comparable methods\
    \ and techniques are provided to register dependent keys for to-many relationship\
    \ properties.\n\nThe `observationInfo` and `setObservationInfo:` methods enable\
    \ you to get/set observation information about all the observers that are registered\
    \ with the subject.\n\n## KVO Design and Implementation\n\nKey-value observing\
    \ is implemented through the power of the Objective-C runtime. When you register\
    \ an observer on an object, the KVO infrastructure dynamically creates a new subclass\
    \ of the object’s original class. It then adjusts the `isa` pointer of the object\
    \ to point to the subclass; thus messages to the original class will actually\
    \ be sent to the subclass. You may recall from [Chapter 8](#9781430250500_Ch08.xhtml)\
    \ that the `isa` pointer points to the object’s class and this class maintains\
    \ a dispatch table with pointers to the methods the class implements. The new\
    \ subclass implements the KVO infrastructure. It intercepts messages to the object\
    \ and inspects them for those matching certain patterns (such as the getters,\
    \ setters, and collection access), posting notifications to observers, and so\
    \ forth. This technique of dynamically swapping out the class that the `isa` pointer\
    \ points to is called `isa-swizzling`.\n\n## Using Key-Value Programming\n\nNow\
