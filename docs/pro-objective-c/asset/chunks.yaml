    | `weak` | The `setter` method uses simple assignment (i.e., the input value is
    not copied or retained). If the property instance is deallocated, its value is
    set to `nil`. | Ownership qualifier. Used under ARC memory management. |

    | `unsafe_unretained` | The `setter` method uses simple assignment (i.e., the
    input value is not copied or retained). | Ownership qualifier. Used under ARC
    memory management. |

    | `copy` | In the `setter` method, a copy method should be called for assignment
    and the old value should be sent a release message. | Ownership qualifier. |

    | `retain` | In the `setter` method, the previous value will be sent a release
    message and the property uses retain on assignment. | Ownership qualifier. Similar
    to the strong attribute (used under Manual Retain-Release memory management).
    |

    | `strong` | In the `setter` method, the previous value will be sent a release
    message and the property uses retain on assignment. | Ownership qualifier Used
    under ARC memory management. The default setting under ARC. |

    | `getter=getterName` | Names the `getter` method the specified `getterName`.
    |  |

    | `setter=setterName` | Names the `setter` method the specified `setterName`.
    |  |

    | `nonatomic` | Specifies that the accessor methods for this property are not
    `atomic` (the default). The `nonatomic` property setting has better performance,
    but does not guarantee that a whole value is always returned from a property getter
    or setter when being accessed by multiple threads. |  |


    A property definition is performed in the implementation section of a class. In
    most cases, a property is backed by an instance variable, hence the property definition
    includes defining `getter` and setter methods for the property, declaring an instance
    variable, and using that variable in the `getter`/`setter` methods. Objective-C
    provides three methods for defining a property: explicit definition, synthesis
    via keyword, or autosynthesis.


    Methods


    Objective-C supports both instance methods and class methods. Instance methods
    are invoked on class instances (objects); as such, instance methods have direct
    access to an object’s instance variables. Class methods are invoked on classes.
    Methods can be declared in a class interface, a protocol, and/or a category. Methods
    thus declared are defined in a corresponding class/category implementation.


    A method declaration specifies the method type, a return type, its name, its parameter(s),
    and the corresponding parameter types. The *method type* identifier specifies
    whether the method is a class or instance method. A class method is declared with
    a plus (`+)` sign and indicates that the method has class scope, meaning that
    it operates at the class level and does not have access to the instance variables
    of the class (unless they are passed as parameters to the method). An instance
    method is declared with a minus (`–)` sign and indicates that the method has object
    scope. It operates at the instance level and has direct access to the instance
    variables of the object and its parent objects (subject to the access controls
    on the instance variables).


    The method name includes parameters as part of its name, using colons. For each
    parameter, its type is specified in parentheses, followed by the method prototype
    parameter. The parameter name and type are separated by a colon; for example,
    in the following method declaration:


    ```

    - (void)incrementSum:(int)value;

    ```


    The method name is `incrementSum:` and it has a single parameter of type `int`
    named `value`. Multiple parameters require multiple name-parameter pairs; for
    example, the method declaration


    ```

    - (int)addAddend1:(int)a1 addend2:(int)a2;

    ```


    The method name is `addAddend1:addend2:` and it has two parameters of type `int`
    named `a1` and `a2`.


    The *return type*indicates the type of the returned variable from the method,
    if any. The return type is specified within parentheses, following the method
    type. If the method does not return anything, its return type is declared as `void`.


    The following statement provides an example class method declaration for a method
    named `hydrogenWithProtons:neutrons:` that has two parameters of type `unsigned
    int` named `nProtons` and `nNeutrons`.


    ```

    + (id) hydrogenWithProtons:(unsigned)nProtons neutrons:(unsigned)nNeutrons;

    ```


    Interface


    A class interface specifies state and behavior of a class; encapsulated in its
    instance variables, properties and methods. A class interface declaration begins
    with the `@interface` directive and the name of the class; it ends with the `@end`
    directive. The formal syntax for declaring a class interface is shown in [Listing
    A-11](#9781430250500_AppA.xhtml#list11).


    [*Listing A-11.*](#9781430250500_AppA.xhtml#_list11)  Class Interface Syntax


    ```

    @interface ClassName : SuperclassName

    {

      // instance variable declarations

    }


    // Property and method declarations

    @end

    ```


    A superclass establishes a common interface and implementation, which specialized
    subclasses can inherit, modify, and supplement. Most classes inherit from the
    `NSObject` class, the root (i.e., base) class of most Foundation Framework class
    hierarchies, which provides a basic interface to the Objective-C runtime.


    Forward Declarations


    The `@class` directive is used to declare a class (in a class interface) prior
    to obtaining its complete specification. This tells the compiler that a class
    exists (and thus enables it to perform static type checking) without having to
    import its corresponding header file. Forward declarations can be useful in resolving
    circular dependencies between files.


    Implementation


    A class implementation defines a class’s behavior by implementing defining its
    properties and implementing its methods. A class implementation declaration begins
    with the `@implementation` directive and the name of the class; it ends with the
    `@end` directive. The formal syntax for declaring a class implementation is shown
    in [Listing A-12](#9781430250500_AppA.xhtml#list12).


    [*Listing A-12.*](#9781430250500_AppA.xhtml#_list12)  Class Implementation Syntax


    ```

    @implementation ClassName

    {

      // instance variable declarations

    }


    // Property and method definitions

    @end

    ```


    The methods defined in a class implementation must directly map to its corresponding
    interface; for example, [Listing A-13](#9781430250500_AppA.xhtml#list13) depicts
    a `Greeting` class interface and its corresponding implementation.


    [*Listing A-13.*](#9781430250500_AppA.xhtml#_list13)  Greeting Class Interface
    and Implementation


    ```

    #import <Foundation/Foundation.h>

    @interface Greeting : NSObject


    @property(readwrite) NSString *salutation;

    - (void)hello:(NSString *)user;


    @end


    #import "Greeting.h"

    @implementation Greeting

    - (void)hello:(NSString *)user

    {

      NSLog(@"%@, %@", self.salutation, user);

    }

    @end

    ```


    Protocol


    A protocol declares methods and properties that can be implemented by any class.
    A protocol declaration begins with the `@protocol` directive followed by the name
    of the protocol. It ends with the `@end` directive. Protocols can have both *required*
    and *optional* methods; optional methods do not require that an implementation
    of the protocol implement these methods. The directives `@required` and `@optional`
    (followed by the method name(s)) are used to mark a method appropriately. If neither
    keyword is specified, the default behavior is `@required`. The syntax of a protocol
    declaration is shown in [Listing A-14](#9781430250500_AppA.xhtml#list14).'
