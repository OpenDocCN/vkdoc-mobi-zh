    ## 并发操作


    `NSOperation`、`NSBLockOperation` 和 `NSInvocationOperation` 用于管理一个或多个与单个任务关联的操作、代码和数据的并发执行。操作队列是一个
    Objective-C 对象，提供并发执行任务的能力。每个任务（即操作）定义了要执行的工作及其关联数据，并封装在一个块对象或 `NSOperation` 的具体子类中。`NSOperation`
    是一个抽象类，封装了与单个任务相关的代码和数据。对于非并发任务，具体子类通常只需重写 main 方法即可。对于并发任务，你至少必须重写 `start`、`isConcurrent`、`isExecuting`
    和 `isFinished` 方法。列表 11-8 提供了 `GreetingOperation` 类的实现，它是 `NSOperation` 的一个具体子类，用于在输出窗格中记录一条简单的问候语。


    *列表 11-8.* GreetingOperation 类


