    A thread is an operating system mechanism that enables the concurrent execution
    of multiple sequences of instructions. A thread is typically implemented as a
    lightweight process, in that multiple threads can exist concurrently within the
    same process. Threads within a process can share computer memory and other resources.
    `NSThread` is used to create and control threads. The class includes methods to
    create and initialize an `NSThread` object, start and stop a thread, configure
    a thread, and query a thread and its execution environment. The `NSThread` class
    method `detachNewThreadSelector:toTarget:withObject:` is used to create and start
    a new thread. The following statement uses this method to create and start a new
    thread on the `execute:` method of an object named `processEngine`, with an input
    parameter of `myData`.


    ```objc

    NSThread *myThread = [NSThread detachNewThreadSelector:@selector(execute:)

                                                  toTarget:processEngine

                                                withObject:myData];

    ```


    The thread priority can be set with the `setThreadPriority:` method, as shown
    in the following statement which sets the thread `myThread` to a priority of 1.0,
    the highest priority.


    ```objc

    [myThread setThreadPriority:1.0];

    ```


    A thread can be signaled to cancel with `cancel` method; the following statement
    sends this message to the thread `myThread`.


    ```objc

    [myThread cancel];

    ```


    ## Concurrent Operations


    `NSOperation`, `NSBLockOperation`, and `NSInvocationOperation` are used to manage
    concurrent execution of one or more operations, code, and data associated with
    a single task. An operation queue is an Objective-C object that provides the ability
    to execute tasks concurrently. Each task (i.e., operation) defines the work to
    be performed, along with its associated data, and is encapsulated in either a
    block object or a concrete subclass of `NSOperation`. `NSOperation` is an abstract
    class that encapsulates the code and data associated with a single task. For nonconcurrent
    tasks, a concrete subclass typically only needs to override the main method. For
    concurrent tasks, you must override at a minimum the methods `start`, `isConcurrent`,
    `isExecuting`, and `isFinished`. [Listing 11-8](#9781430250500_Ch11.xhtml#list8)
    provides an implementation of the class `GreetingOperation`, a concrete subclass
    of `NSOperation` that logs a simple greeting to the output pane.


    [*Listing 11-8.*](#9781430250500_Ch11.xhtml#_list8) GreetingOperation Class


    ```objc

    @interface GreetingOperation : NSOperation

    @end


    @implementation GreetingOperation

    - (void)main

    {

      NSLog(@"Hello, world!");

    }

    @end

    ```


    `NSOperationQueue` controls the execution of `NSOperation` objects through a queuing
    system. Operation queues may employ threads to execute their operations; however,
    this implementation detail is hidden, thereby simplifying application development
    and reducing the potential for errors. [Listing 11-9](#9781430250500_Ch11.xhtml#list9)
    creates an instance of a `GreetingOperation`, and then submits it to an `NSOperationQueue`
    to execute concurrently.


    [*Listing 11-9.*](#9781430250500_Ch11.xhtml#_list9) Submitting GreetingOperation
    Instance to a Queue


    ```objc

    NSOperation *greetingOp = [[GreetingOperation alloc] init];

    [[NSOperationQueue mainQueue] addOperation:greetingOp];

    ```


    Operation queues provide a simpler, more efficient mechanism for implementing
    concurrency and are therefore recommended in lieu of threads for implementing
    concurrent programming.


    ## Locking


    `NSLock`, `NSDistributedLock`, `NSConditionLock`, and `NSRecursiveLock` are used
    to create locks for synchronizing code execution. `NSLock` implements a basic
    mutual exclusion (mutex) lock for concurrent programming. It conforms to the `NSLocking`
    protocol and thus implements the `lock` and `unlock` methods to acquire and release
    a lock accordingly.


    The `NSDistributedLock` class defines a lock that can be used by multiple applications
    on multiple hosts to control access to a shared resource.


    The `NSConditionLock` class defines a lock that can be acquired and released only
    under certain conditions.


    The `NSRecursiveLock` class defines a lock that can be acquired multiple times
    by the same thread without causing deadlock. It keeps track of the number of times
    it was acquired, and must be balanced by corresponding calls to unlock the object
    before the lock is released.


    ## Timers and Run Loops


    A *run loop* is a thread-based mechanism used to schedule work and coordinate
    the receipt of input events. If a program thread needs to respond to incoming
    events, you need to attach it to a run loop in order to wake up this thread when
    new events arrive. The run method of the iOS `UIApplication` class (or `NSApplication`
    in OS X) starts an application’s main loop as part of the normal startup sequence;
    hence, if you use the Xcode template projects for creating iOS or OS X programs,
    you typically won’t need to create a run loop in your code. In other scenarios—when
    creating a command-line program, for example—you need to create a run loop if
    your program needs to respond to events from input sources. The Foundation Framework
    includes numerous classes that provide inputs asynchronously (for example, the
    networking, URL handling, and stream I/O APIs), so you would use a run loop in
    conjunction with instances of these classes.


    The `NSRunLoop` class provides the API for managing run loops. This class includes
    methods to access run loops and modes, manage timers and ports, run a loop, and
    manage messages. The NSRunLoop `currentRunLoop` method retrieves the current run
    loop, the `NSRunLoop` object for the current thread. If a run loop doesn’t already
    exist for the thread, it is created and returned. The following statement retrieves
    the run loop for the current thread.


    ```objc

    NSRunLoop *loop = [NSRunLoop currentRunLoop];

    ```


    The run mode defines the set of input sources for a run loop. The Foundation Framework
    defines a set of constants that specify the available run loop modes. The constant
    `NSDefaultRunLoopMode` is the most commonly used run-loop mode.


    There are several `NSRunLoop` methods used to run a loop. The `run` method puts
    the thread in a permanent loop in the `NSDefaultRunLoopMode`, during which it
    processes events from all input sources. If you want a run loop to terminate,
    you shouldn’t use this method, but rather one of the other methods used to conditionally
    run a loop based on receipt of input and/or a specified amount of time has elapsed.


    The `runMode:beforeDate:` method runs the loop once in the `NSDefaultRunLoopMode`,
    blocking for input until an event is received from an attached input source or
    the date specified by the `beforeDate:` parameter arrives. The following statement
    invokes this method, waiting indefinitely until input is received.


    ```objc

    [loop runMode: NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]];

    ```


    Providing a date parameter value of `[NSDate distantFuture]` evaluates to an infinite
    wait until input is received.


    The `NSTimer` class is used to create timers that send a specified message to
    a target object after a certain time has elapsed. They work in conjunction with
    `NSRunLoop` objects to provide synchronous delivery of events to a thread. An
    `NSTimer` determines the maximum amount of time a run loop object should wait
    for input. `NSTimer` includes methods to create and initialize a timer, fire a
    timer, stop a timer, and retrieve information about a timer. The `scheduledTimerWithTimeInterval:invocation:repeats:`
    method creates a timer that fires after the specified interval, using the invocation
    specified, and repeating the timer if requested. The `invalidate` method stops
    a timer from firing again. The `isValid` method returns a Boolean value indicating
    whether or not the timer is currently valid.


