    \ 提供了几个编译器指令，用于显式指定实例变量的作用域（即控制访问权限）：\n\n*   `@private`：实例变量仅能在声明它的类及该类的其他实例内部访问。\n\
    *   `@protected`：实例变量能在声明它的类及其任何子类的实例方法内部访问。如果未为实例变量指定保护级别，这是默认作用域。\n*   `@public`：实例变量可以在任何地方访问。\n\
    *   `@package`：实例变量可以从任何其他类实例或函数访问，但在包外部，它被视为`private`。此作用域对库或框架类很有用。\n\n### 声明实例变量\n\
    \n实例变量可以在类接口或实现中声明；然而，在类的公共接口中声明它们会违反 OOP（面向对象编程）的关键原则之一——封装。因此，推荐的做法是在类实现中声明实例变量；具体来说，是在紧跟在类`@implementation`指令之后的语句块内。声明语法如列表\
    \ 2-7 所示。\n\n*列表 2-7.* 实例变量声明语法\n\n```\n@implementation ClassName\n{\n  // Instance\
    \ variable declarations\n}\n...\n@end\n```\n\n如果使用了访问控制编译器指令，则在语句块中声明每个实例变量的语法会更新，如列表\
    \ 2-8 所示。\n\n*列表 2-8.* 带有访问控制指令的实例变量声明\n\n```\n{\n  protection_directive ivar_declaration_list\n\
    \  protection_directive ivar_declaration_list\n  ...\n}\n```\n\n一个使用访问控制编译器指令声明实例变量的示例类，如列表\
    \ 2-9 所示。\n\n*列表 2-9.* 带有实例变量声明的示例类\n\n```\n@implementation MyTestClass\n{\n \
    \ @protected\n    int myInt1;\n    int myInt2;\n  @private\n    float myFloat;\n\
    \  @package\n    double myDouble;\n}\n...\n@end\n```\n\n这个类声明了两个受保护的变量`myInt1`和`myInt2`；一个私有变量`myFloat`；以及一个包保护变量`myDouble`。\n\
    \n### 访问实例变量\n\n实例变量直接绑定到对应的对象并存在于其上下文中。因此，对象的实例方法可以直接访问其实例变量。例如，如果列表 2-9 中所示的`MyTestClass`类定义了一个实例方法`myTestMethod`，该方法可以直接访问实例变量`myInt1`（参见列表\
    \ 2-10）。\n\n*列表 2-10.* 实例变量访问声明\n\n```\n-(void) myTestMethod\n{\n  myInt1 = 1;\n\
    \  ...\n}\n```\n\n尽管实例变量提供了对对象状态的便捷、直接访问，但它们暴露了类的内部细节——这违反了 OOP 的封装原则。因此，只有在必要时才应声明实例变量，并且声明应放在类实现中，而不是公共接口中。公开暴露对象内部状态的首选方法是通过*声明属性*。下面我们来看看这些。\n\
    \n## 属性\n\n在许多编程语言中，访问对象内部状态的方法（通常称为*getter/setter 方法*）必须手动编码。Objective-C 提供了声明属性来自动化和简化此任务。属性与实例变量的不同之处在于，它不直接访问对象的内部状态，而是提供一种便捷的机制（即\
    \ getter/setter 方法）来访问这些数据，因此可能包含其他逻辑。Objective-C 的*声明属性*使编译器能够根据你提供的规范自动生成这些方法。这减少了你需要编写和维护的代码量，并提高了程序的一致性和可靠性。\n\
    \n### 属性声明\n\n属性使用`@property`关键字声明，后跟一组可选的属性（用括号括起来）、属性类型及其名称。\n\n```\n@property\
    \ (attributes) type propertyName;\n```\n\n例如，你之前开发的`Atom`类（参见列表 2-3）声明了属性`chemicalElement`、`protons`、`neutrons`和`electrons`。属性可以在*类接口*、*类别接口*或*协议*中声明。该声明设置了与属性关联的\
    \ getter/setter 方法的签名，但不会生成实际的方法定义。\n\n### 属性特性\n\n属性声明特性用于指定与属性相关的存储语义和其他行为。最常用的属性特性在表\
    \ 2-1 中进行了描述。\n\n表 2-1 属性特性  \n"
- fmt: "| Category | Attribute | Description |\n| --- | --- | --- |\n| Atomicity |\
    \ `nonatomic` | Accessors are not atomic and, consequently, could provide different\
    \ results when accessed concurrently by multiple threads. If not specified, accessors\
    \ are atomic; that is, their values are always fully set/retrieved. |\n| Setter\
    \ Semantics | `assign` | The setter method performs a simple assignment of the\
    \ property value without using `copy` or `retain`. This is the default setting.\
    \ |\n|  | `retain` | On assignment, the input value will be sent a `retain` message\
    \ and the previous value will be sent a `release` message. |\n|  | `copy` | A\
    \ copy of the new message will be set on assignment and the previous value will\
    \ be sent a `release` message. |\n|  | `strong` | This attribute (used when ARC\
    \ memory management is applied on a property) is equivalent to the `retain` attribute.\
    \ |\n|  | `weak` | This attribute (used when ARC memory management is applied\
    \ on a property) is similar to the `assign` attribute except that if the affect\
    \ property is released, its value is set to `nil`. |\n| Read/Write | `readwrite`\
    \ | The property can be read or written to. Both getter and setter methods must\
    \ be implemented. This is the default setting. |\n|  | `read-only` | The property\
    \ can be read but not written to. The getter method must be implemented. |\n|\
    \ Method names | `getter=getterName` | Renames the getter to the specified `getterName`.\
    \ |\n|  | `setter=setterName` | Renames the setter to the specified `setterName`.\
    \ |\n\n## Property Definition\n\nA property definition is performed in the implementation\
    \ section of a class. In most cases, a property is backed by an instance variable;\
    \ hence, the property definition includes defining getter and setter methods for\
    \ the property, declaring an instance variable, and using that variable in the\
    \ getter/setter methods. Objective-C provides several methods for defining a property:\
    \ explicit definition, synthesis via keyword, and autosynthesis.\n\n## Explicit\
    \ Definition\n\nFor this method of defining a property, its methods are explicitly\
    \ defined in the corresponding class implementation. As an example, the setter\
    \ method for a property named `myIntProperty` can be defined as shown in [Listing\
    \ 2-11](#9781430250500_Ch02.xhtml#list11).\n\n[*Listing 2-11.*](#9781430250500_Ch02.xhtml#_list11)\
    \ Property Setter Method Definition\n\n```\n-(void) setMyIntProperty:(int) value\n\
    {\n  _myIntProperty = value;\n{\n```\n\nThe name of the variable corresponding\
    \ to the property is prefaced with an underscore. This name reflects the Objective-C\
    \ standard naming convention for property instance variables, whereby the name\
    \ of the variable is that of the property name, prefaced with an underscore.\n\
    \n## Synthesis via Keyword\n\nThrough use of the `@synthesize` keyword, the compiler\
    \ can autogenerate property definitions. A property is synthesized in the corresponding\
    \ class implementation section. The syntax for synthesizing a property via keyword\
    \ is\n\n```\n@synthesize propertyName [= instanceVariableName];\n```\n\nIf the\
    \ optional `instanceVariableName` assignment is not provided, the compiler will\
    \ automatically generate the instance variable name following the standard naming\
    \ convention for property-backed instance variables. If an `instanceVariableName`\
    \ value is provided, the compiler will create the instance variable with the name\
    \ provided. For a property named `myIntProperty`, the getter and setter methods\
    \ will be autogenerated with the statement\n\n```\n@synthesize myIntProperty;\n\
    ```\n\nThe compiler will create a corresponding instance variable named `_myIntProperty`.\n\
    \n## Autosynthesis\n\nThe recommended Apple Objective-C compiler, Clang/LLVM (versions\
    \ 4.2 and above) provides support for autosynthesis of declared properties. This\
    \ means that the compiler will automatically synthesize declared properties that\
    \ are neither: 1) synthesized by keyword (e.g., using `@synthesis`); 2) generated\
    \ dynamically (via the `@dynamic` property directive); nor 3) having user-provided\
    \ getter and setter methods. Thus, there is no need to include code to synthesize\
    \ a declared property when using this feature. A declared property is automatically\
    \ synthesized by the compiler, along with the corresponding instance variable.\
    \ The `Atom` class implemented earlier (see [Listing 2-3](#9781430250500_Ch02.xhtml#list3))\
    \ uses autosynthesis of its declared properties.\n\n## Dynamic Generation\n\n\
    Accessor methods for a property can be delegated or dynamically created at runtime.\
    \ The `@dynamic` property directive can be used to prevent compiler autogeneration\
    \ of accessor methods in these cases. The compiler will not generate a warning\
    \ if it cannot find implementations of accessor methods associated with the properties\
    \ whose names follow the `@dynamic` property. Instead, the developer is responsible\
    \ for creating these methods by either writing the accessor method implementations\
    \ directly, using some other means to derive them (such as dynamic code loading\
    \ or dynamic method resolution), or leveraging a software library (e.g., the Apple\
    \ Core Data framework) that dynamically generates these methods.\n\n## Property-Backed\
    \ Instance Variables\n\nMost properties are backed by an instance variable, hence\
    \ the mechanism by which properties hide the internal state of an object. Unless\
    \ specified otherwise, the instance variable should have the same name as the\
    \ property, but with an underscore prefix. In the `Atom` class implementation\
    \ shown in [Listing 2-5](#9781430250500_Ch02.xhtml#list5), the `init` method accesses\
    \ the instance variable for the `chemicalElement` property, which is named `_chemicalElement`.\n\
    \n## Property Access\n\nObjective-C provides two mechanisms for accessing properties:\
    \ accessor methods and dot notation. Accessor methods synthesized by the compiler\
    \ follow standard naming conventions:\n\n*   The method used to access the value\
    \ (the *getter* method) has the same name as the property.\n*   The method used\
    \ to set the value (the *setter* method) starts with the word “set” prepended\
    \ to the property name, with the first letter of the property name capitalized.\n\
    \nUsing these conventions, the getter method for a property named `color` would\
    \ be called `color`, and its setter method would be called `setColor`. So, for\
    \ an object named `myObject`, the getter and setter accessor methods would be\
    \ invoked as follows:\n\n```\n[myObject color];\n[myObject setColor:value];\n\
