    \ within a class definition don’t conflict with names assigned anywhere outside\
    \ it. This is true both of the instance variables in an object’s data structure\
    \ and of the object’s methods. Hence, the meaning of a message must be understood\
    \ relative to the particular object that receives the message. The same message\
    \ sent to two different objects can invoke two distinct methods. This is a fundamental\
    \ feature of OOP and simplifies a class interface, because the same names (corresponding\
    \ to desired operations) can be reused in different classes.\n\nThe Foundation\
    \ Framework provides functionality that simplifies object creation. Specifically,\
    \ the `NSObject` class includes methods that are used to create class instances.\
    \ The `NSObject alloc` class method returns a new instance of the specified class\
    \ type; its syntax is\n\n```\n+ (id) alloc\n```\n\nAn `id` is an Objective-C type\
    \ used to hold a reference to any Objective-C object, regardless of its class.\
    \ The `alloc` method can be invoked as\n\n```\nid varName = [ClassName alloc];\n\
    ```\n\nThis creates an object of type `ClassName` and assigns it to a variable\
    \ named `varName` of type `id`. You could also create the object as follows:\n\
    \n```\nClassName *varName = [ClassName alloc];\n```\n\nThis would also create\
    \ an object of type `ClassName` and assign it to a variable named `varName`; however,\
    \ in this case, the variable is of type `ClassName *` (i.e., a pointer to a class\
    \ of type `ClassName`). Explicitly defining the type for the variable provides\
    \ static type checking, at the expense of flexibility. We’ll discuss this more\
    \ in Part 2 of the book, which explores the Objective-C runtime. In either case,\
    \ the `alloc` method returns objects that are an instance of the receiving class’s\
    \ type, also known as a *related result type*. This means that the object returned\
    \ from sending the `alloc` message will have the same type as that of the receiving\
    \ class. Now in [Chapter 2](#9781430250500_Ch02.xhtml), you developed an `Atom`\
    \ class. You can create an `Atom` object and assign it to a variable named `atom`\
    \ using the `alloc` method.\n\n```\nAtom *atom = [Atom alloc];\n```\n\nAs the\
    \ receiving class of the `alloc` message is `Atom`, the created object will be\
    \ of type `Atom`. Memory is allocated for the object and its instance variables\
    \ are set to default values (zero)."
