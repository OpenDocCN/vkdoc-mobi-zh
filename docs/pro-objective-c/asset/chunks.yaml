    X applications, cookies are shared and kept in sync across processes. Session
    cookies are local to a single process and not shared between programs. The `NSHTTPCookie`
    class provides methods to create cookies, convert cookies to request headers,
    and retrieve cookie properties. The `NSHTTPCookieStorage` class provides methods
    for retrieving the shared cookie storage instance, managing the cookie accept
    policy, and managing (i.e., adding, removing, retrieving) cookies.


