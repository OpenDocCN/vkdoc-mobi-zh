    Note that as `NSProxy` is a base class, there is no call to `[super init]` at
    the beginning of these methods. The `registerSelector:` method adds another selector
    to the collection, as mentioned earlier. The implementation of `methodSignatureForSelector:`
    returns an `NSMethodSignature` instance for the method to be invoked on the target
    object. The runtime system requires that this method be implemented when performing
