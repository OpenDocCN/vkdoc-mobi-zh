  trans: '

    # 第 10 章：NSArray 字面量


    第 10 章简要概述了 `NSArray` 字面量。这种表示法简化了 `NSArray` 实例的创建过程。数组字面量的语法如下：


    ```

    @[firstObj, secondObj, ...]

    ```


    `NSArray` 字面量以`@`符号开头，后跟一个用方括号括起来的、以逗号分隔的对象列表。该对象列表*不*以 `nil` 结尾。与 `NSArray` API
    相同，数组中的对象必须是 Objective-C 对象指针类型，包括其他 Objective-C 字面量（`NSNumber` 字面量、`NSArray`
    字面量等）。代码清单 16-3 修改了代码清单 16-2 中的示例，这次使用数组字面量表示法来创建一个 `NSArray` 对象。


    ***代码清单 16-3.*  创建一个 NSArray 字面量**


    ```

    NSArray *numbers = @[@''A'', @YES, @-3, @21U, @250L,

                        @9876543210LL, @3.14F, @-52.687];

    ```


    数组字面量可以嵌套，从而可以创建数组中的数组。代码清单 16-4 演示了如何创建一个嵌套的 `NSArray` 字面量。


    ***代码清单 16-4.*  嵌套的 NSArray 字面量**


    ```

    NSArray *groups = @[@[@0, @1, @2], @[@"alpha", @"beta"]];

    ```


    如前例所示，`NSArray` 字面量表示法既简化了数组的创建过程，又减少了程序员的错误。


    编译器会将每个 `NSArray` 字面量转换为 `NSArray` 便捷构造器 `arrayWithObjects:count:`。此方法在运行时被调用，以创建相应的
    `NSArray` 实例。实际上，`NSArray` 字面量


    ```

    @[@"Hello", @"World"];

    ```


    等价于代码清单 16-5 中所示的代码片段。


    ***代码清单 16-5.*  创建一个 NSArray 实例（不使用数组字面量表示法）**


    ```

    NSString *strings[2];

    strings[0] = @"Hello";

    strings[1] = @"World";

    [NSArray arrayWithObjects:strings count:2];

    ```


    数组字面量表示法用于创建不可变数组实例。你可以通过向数组字面量发送 `mutableCopy` 消息，从中创建一个可变数组（例如 `NSMutableArray`），如下所示。


    ```

    NSMutableArray *mutableWords = [@[@"Hello", @"World"] mutableCopy];

    ```


    # NSDictionary 字面量


    Objective-C 还提供了对创建 `NSDictionary` 字面量的支持。字典字面量的语法如下：


    ```

    @{keyObj:valueObj, ...}

    ```


    `NSDictionary` 字面量以`@`符号开头，后跟一个或多个用逗号分隔的键值对，所有这些都用大括号括起来。对于每个键值对，在键与其对应的值之间放置一个冒号。每个键必须是符合
    `NSCopying` 协议的对象指针类型，每个值必须是对象指针类型。字典字面量中的键和值都不能为 `nil`；在容器中必须使用 `NSNull` 来表示空对象。代码清单
    16-6 创建了一个包含两个条目的简单字典字面量——一个奶酪汉堡的订单和两个热狗的订单。


    ***代码清单 16-6.*  创建一个 NSDictionary 字面量**


    ```

    NSDictionary *orders = @{@1111:@"1 个奶酪汉堡",

                             @1112:@"2 个热狗"};

    ```


    请注意，`NSDictionary` 字面量的键值对语法是 key:value，而标准的 `NSDictionary` API 在创建字典实例时使用的是 value,
    key 语法（例如，`NSDictionary` 方法 `dictionaryWithObjects:forKeys:`）。与数组字面量一样，字典字面量也可以嵌套；也就是说，键值对中的值可以是一个容器实例（包括另一个
    `NSDictionary` 字面量）。代码清单 16-7 演示了如何创建一个包含两个条目的嵌套 `NSDictionary` 字面量（`currentOrders`），其中每个条目的值都是一个
    `NSDictionary` 字面量。


    ***代码清单 16-7.*  嵌套的 NSDictionary 字面量**


    ```

    NSDictionary *order1 = @{@1111:@"1 个奶酪汉堡",

                             @1112:@"2 个热狗"};

    NSDictionary *order2 = @{@1113:@"1 个大号奶酪披萨"};

    NSDictionary *currentOrders = @{@"table1":order1, @"table2":order2};

    ```


    编译器会将每个 `NSDictionary` 字面量表达式转换为 `NSDictionary` 便捷构造器 `dictionaryWithObjects:forKeys:count:`。此方法在运行时被调用，以创建相应的
    `NSDictionary` 实例——实际上，以下字典字面量：


    ```

    @{@1111:@"1 个奶酪汉堡"}

    ```


    等价于代码清单 16-8 中所示的代码片段。


    ***代码清单 16-8.*  创建一个 NSDictionary 实例（不使用字典字面量表示法）**


    ```

    NSString *values[1];

    values[0] = @"1 个奶酪汉堡";

    NSNumber *keys[1];

    keys[0] = @1111;

    [NSDictionary dictionaryWithObjects:values forKeys:keys count:1];

    ```


    字典字面量表示法用于创建不可变字典实例。如数组字面量所述，你可以通过向字典字面量发送 `mutableCopy` 消息，从中创建一个可变字典（例如 `NSMutableDictionary`）。


    # 表达式字面量


    表达式字面量，也称为*装箱表达式*，使您能够从括号括起来的表达式中创建字面量。表达式字面量的语法如下：


    ```

    @( <expression> )

    ```


    该表达式的计算结果为标量（数字、枚举、`BOOL`）或 C 字符串指针类型。所得对象的类型与表达式的类型相对应。标量类型生成 `NSNumber` 实例，而
    C 字符串则使用 UTF-8 字符编码生成 `NSString` 对象。以下语句使用装箱表达式创建了一个 `NSNumber` 实例。


    ```

    NSNumber *degrees2Radians = @( M_PI / 180.0 );

    ```


    在前面的示例中，算术表达式 `M_PI/180.0` 被求值，其结果被*装箱*；也就是说，它被用来创建一个 `NSNumber` 实例。此装箱表达式的等价语句是：


    ```

    NSNumber *degrees2Radians = [NSNumber numberWithDouble:(M_PI / 180.0)];

    ```


    下一个示例使用装箱表达式创建了一个 `NSString` 实例。


    ```

    NSString *currentUser = @(getenv("USER"));

    ```


    `getenv()` 函数检索环境变量的值，输入参数是要检索的变量名称。函数的返回值是一个指向 C 字符串的指针。


    尽管枚举通常用于定义常量标量值，但它们不能直接用于创建 `NSNumber` 字面量；例如，以下尝试从一个枚举创建 `NSNumber` 字面量（如代码清单
    16-9 所示）将无法编译。


    ***代码清单 16-9.*  尝试从枚举创建 NSNumber 字面量**


    ```

    enum

    {

      Zero = 0,

      One

    };

    NSNumber *zeroNumber = @Zero;      // 错误！

    ```


    相反，必须将枚举值放在表达式字面量（即*装箱枚举*）内部，以创建 `NSNumber` 实例。代码清单 16-10 修正了代码清单 16-9 中的示例，以从装箱枚举创建一个
    `NSNumber` 实例。


    ***代码清单 16-10.*  从装箱枚举创建 NSNumber**


    ```

    enum

    {

      Zero = 0,

      One

    };

    NSNumber *zeroNumber = @(Zero);      // 正确！

    ```


    如果枚举具有*固定的底层类型*（即它指定了用于存储其值的类型），则 `NSNumber` 实例将使用相应的类型创建。代码清单 16-11 中所示的示例从装箱枚举创建了一个
    `NSNumber` 实例；由于枚举类型为 `unsigned int`，因此 `NSNumber` 实例使用相应的类型创建。


    ***代码清单 16-11.*  从具有固定底层类型的装箱枚举创建 NSNumber**

