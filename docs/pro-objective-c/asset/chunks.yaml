    ## Roundup


    This Expert Section chapter explored some of the finer details surrounding ARC
    memory management. Because ARC is the Apple-recommended approach for memory management
    on all new Objective-C projects, it is critical to have a good understanding of
    how to use this technology. In this chapter, you focused on the details of ARC
    object ownership, `block` objects, and toll-free bridging. To recap, the following
    are the key takeaways:


    - ARC prohibits programmatic use of the `release`, `autorelease`, `dealloc`, or
    related messages on an object. Your code gives up ownership interest in an object
    when it performs any of the following: 1) variable reassignment, 2) `nil` assignment,
    or 3) its owner is deallocated.

    - Variable reassignment occurs when a variable that points to a dynamically created
    object is changed to point to another object. At this point, the object loses
    an owner; at compile time, ARC inserts code to send a `release` message to this
    object.

    - `nil` assignment occurs when the value of a variable that currently points to
    a dynamically created object is set to `nil`. At this point, the object loses
    an owner. At compile time, ARC inserts code to send a release message to this
    object.

    - Owner deallocation occurs for collection class instances. When a collection
    class instance is deallocated, ARC automatically sends a release message to each
    of the objects in the collection.

    - Apple includes numerous software libraries (i.e., frameworks and services) that
    provide the interfaces needed to write software for the OS X and iOS platforms.
    The APIs for the majority of these libraries are written in ANSI C, and thus these
    libraries can be used in your Objective-C programs. The Apple software libraries
    with C-based APIs do not integrate with ARC; so your code is responsible for programmatically
    performing memory management when dynamically allocating memory with these C-based
    APIs.

    - When using ARC, it is prohibited to perform standard casts between pointers
    of Objective-C objects and pointers of other types (e.g., one that is a part of
    an Apple C-based API). Apple provides several mechanisms (toll-free bridging and
    ARC bridged casts) to facilitate the use of C-based APIs in Objective-C programs.

    - Toll-free bridging, provided for a number of data types in the Core Foundation
    and Foundation Frameworks, enables your code to use the same data type as the
    parameter to a Core Foundation function call or as the receiver of an Objective-C
    message. You can cast one type to the other to suppress compiler warnings. Under
    ARC memory management, you cannot directly cast toll-free bridged types; they
    must be prepended with special ARC bridged cast annotations.

    - ARC bridged casts enable the use of toll-free bridged types when using ARC.
    These casting operations are prefaced with the special annotations `__bridge`
    , `__bridge_retained` , and `__bridge_transfer`.


    Well, Part 1 has been quite a journey! You have learned many of the fundamentals
    of the Objective-C language. Take your time to review everything that you have
    learned in these six chapters, because having a sound foundation with this material
    is critical to becoming proficient in programming with Objective-C. Next up is
    Part Two, where you explore the Objective-C Runtime. When you’re ready, turn the
    page and let’s begin!


    # Chapter 7: Runtime System


    Objective-C has a considerable number of *dynamic features*, which are functionality
    and behaviors that are executed at runtime, rather than when the code is compiled
    or linked. These features are implemented by the Objective-C runtime system, and
    are what provides much of the power and flexibility of the language. They can
    be used to facilitate developing and updating programs both in real time, without
    the need to recompile and redeploy software, and over time, with minimal or no
    impact to the existing software.


    Understanding how the Objective-C runtime works will help you gain a much deeper
    understanding of the language and how your programs are run. In this chapter,
    you will explore the dynamic features of the language in detail and demonstrate
    how you can use them in your programs.


    ## Dynamic Features'
