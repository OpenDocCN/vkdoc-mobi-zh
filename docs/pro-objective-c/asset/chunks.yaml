    comparison methods that enable you to perform localized comparisons, case insensitive
    comparisons, and other options.


    String I/O


    NSString includes methods for both reading and writing a string to/from a file
    or a URL. The `writeToFile:atomically:encoding:error:` method writes a string
    to a file at the specified path. This method also specifies the encoding to use
    if the file is written atomically (to prevent the file from being corrupted if
    the system crashes while the file is being written), and an error object that
    describes the problem if an error occurs while writing the file. The method returns
    `YES` if the string is written to the file successfully. The `writeToURL:atomically:encoding:error:`
    method writes a string to a given URL. The NSString `stringWithContentsOfFile:`,
    `stringWithContentsOfURL:`, `initWithContentsOfFile:`, and `initWithContentsOfURL:`
    methods create and initialize a string from a file or URL.


    Introspection


    The `NSString` class includes numerous methods for obtaining information about
    an `NSString` object. The following statement uses the NSString `length` method
    to retrieve the number of characters in the string `"Hello, World!"`.


    ```

    int len = [@"Hello, World!" length];

    ```


    The following statement uses the NSString `hasPrefix:` method to return a Boolean
    value indicating whether the `"Hello, World!"` string has a prefix of `"Hello"`.


    ```

    BOOL hasPrefix = [@"Hello, World!" hasPrefix:@"Hello"];

    ```


    Modifying a String


    `NSMutableString` adds several methods to those provided by `NSString` for modifying
    a string. These methods enable you to append a string or a format string, to insert
    or delete characters in a string, to replace characters or a string within a string,
    or to set a string to a new value. The following code fragment creates a mutable
    string named `"Hello"` and then appends the string, `"World!"` to it.


    ```

    NSMutableString *mgreet = [@"Hello" mutableCopy];

    [mgreet appendString:@", World!"];

    ```


    NSAttributedString


    `NSAttributedString` and `NSMutableAttributedString` provide the APIs for Objective-C
    objects that manage strings and associated sets of attributes. The NSAttributedString
    class manages *immutable* strings, while the `NSMutableAttributedString` class
    manages *mutable* strings.


    The methods provided for the `NSAttributedString` class enable the creation and
    initialization of strings, retrieval of string and attribute information, and
    enumerating over attributes in a string using a block object. The `initWithString:attributes:`
    method initializes an `NSAttributeString` instance with attributes, where the
    attributes are provided in an `NSDictionary` instance. The following code fragment
    creates and initializes an `NSAttributedString` with the string `"Hello"` and
    a single attribute (`locale = en-US`).


    ```

    NSDictionary *attrs = @{@"locale":@"en-US"};

    NSAttributedString *greeting = [[NSAttributedString alloc] initWithString:@"Hello"

                                                                   attributes:attrs];

    ```


    The next statement retrieves the value of the attribute (using the key `"locale"`)
    from the attribute string and also sets the range of the attribute to the variable
    of type `NSRange` named `range`.


    ```

    NSRange range;

    id value = [greeting attribute:@"locale" atIndex:0 effectiveRange:&range];

    ```


    NSString Literals


    Objective-C provides language-level support for creating `NSString` literals using
    the `@` symbol followed by a text string enclosed in double-quotes. The following
    statement creates an `NSString` object named book using an `NSString` literal.


    ```

    NSString *book = @"Pro Objective-C";

    ```


    `NSString` literals are compile-time constants. They are allocated at compile
    time and exist for the lifetime of the program.


    Format Strings


    The `NSString` class includes several methods for formatting string objects using
    a format string that is composed of ordinary text characters and zero or more
    format specifiers. A *format specifier* is a specification for converting an argument
    in a format string to a character string. Each format specifier begins with a
    `%` character that specifies a placeholder for an argument value, immediately
    followed by a character sequence that indicates the type of the argument. The
    list of format specifiers supported by the NSString formatting methods include
    those defined by the IEEE printf specification along with the format specifier
    `''%@''`, which is used to format an Objective-C object. For example, the format
    string `@"%d"` expects an argument of integer type to be substituted for the format
    string. The NSString `stringWithFormat:` method and other related methods create
    and initialize `NSString` objects using format strings. The syntax for the `stringWithFormat`
    method is


    ```

    + (id)stringWithFormat:(NSString *)format, ...

    ```


    Where `format` is the format string and `...` specifies the comma-separated list
    of argument(s) to substitute into the format. The following example creates an
    `NSString` object assigned to the variable `magicNumber` with the text `"Your
    number is 17"`.


    ```

    NSString *magicNumber = [NSString stringWithFormat: @"Your number is %d", 17];

    ```


    In this example the format string, `@"Your number is %d"`, contains ordinary text
    and a single format specifier, `%d`, that is substituted for the argument `17`.
    The next example creates a string formatted using the `NSString` object `magicNumber`.


    ```

    NSString *description = [NSString stringWithFormat:

                             @"Description is %@", magicNumber];

    ```


    The `%@` format specifier substitutes the string returned by invoking either the
    `descriptionWithLocale:` (if available) or `description` method on the object.


    The Foundation Framework includes several classes (`NSFormatter`, `NSDateFormatter`,
    `NSNumberFormatter`) that provide additional functionality for interpreting and
    creating `NSString` objects that represent other values.


