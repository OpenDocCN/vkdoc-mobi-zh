    \n## 动态类型"
- fmt: "# Dynamic Typing\n\n`Dynamic typing` enables the runtime to determine the\
    \ type of an object at runtime; thereby letting runtime factors dictate what kind\
    \ of object is to be used in your code. This is particularly beneficial when it\
    \ isn’t known in advance the type of object that needs to be assigned to a variable,\
    \ such as when passing arguments to methods. Objective-C supports both static\
    \ and dynamic typing. When a variable is statically typed, its type is specified\
    \ upon variable declaration. For example, the following statement declares that\
    \ the variable `myAtom` is a pointer to an object of type `Atom`.\n\n```\nAtom\
    \ *myAtom;\n```\n\nWith static typing, the compiler can perform type checking\
    \ at compile time and thus detect type errors prior to program execution. With\
    \ dynamic typing, on the other hand, type checking is performed at runtime. Objective-C\
    \ provides support for dynamic typing via the `id` data type. The `id` type is\
    \ a unique Objective-C type that can hold a pointer to any type of Objective-C\
    \ object, regardless of its class. The following statement declares that the variable\
    \ `myAtom` is a pointer to an object of type `id`.\n\n```\nid *myAtom;\n```\n\n\
    Hence, the variable `myAtom` may actually point to an object of type `Atom`, `Hydrogen`,\
    \ and so forth—the actual type of the variable is determined at runtime. Dynamic\
    \ typing permits associations between objects to be determined at runtime rather\
    \ than forcing them to be encoded in a static design. This can make it much easier\
    \ to write a single method that can handle an object from any class, rather than\
    \ write a different method for each class in an application. For example, the\
    \ following instance method declaration uses dynamic typing, thereby enabling\
    \ the single input parameter to be an object from any class.\n\n```\n- (NSInteger)\
    \ computeValue:(id)parameter;\n```\n\nDynamic typing can be used to simplify your\
    \ class interfaces because there is no need to create a different method declaration\
    \ for each possible input parameter type. Dynamic typing also gives you much greater\
    \ flexibility because the types used by a program can evolve during its execution\
    \ and new types may be introduced without the need to recompile or redeploy. Because\
    \ Objective-C supports both static and dynamic typing, you can provide different\
    \ levels of type information to a method declaration; for example, the previous\
    \ method declaration is modified to specify that the input parameter may be an\
    \ object of any type that conforms to the `NSDecimalNumberBehaviors` protocol.\n\
    \n```\n- (NSInteger) computeValue:(id<NSDecimalNumberBehaviors>)parameter;\n```\n\
    \nNext, the method declaration is modified to specify that the input parameter\
    \ is a pointer to an object of type `NSNumber`.\n\n```\n- (NSInteger) computeValue:(NSNumber\
    \ *)parameter;\n```\n\nFinally, the method declaration is further refined to specify\
    \ that the input parameter is a pointer to an object of type `NSNumber` that conforms\
    \ to the `NSDecimalNumberBehaviors` protocol.\n\n```\n- (NSInteger) computeValue:(NSNumber<NSDecimalNumberBehaviors>\
    \ *)parameter;\n```\n\nObjective-C also provides APIs for runtime object introspection\
    \ (for example, asking a dynamically typed, anonymous object what its class is)\
    \ to partially mitigate the loss of static type checks. Introspection enables\
    \ the runtime to verify the type of an object and thus validate its suitability\
    \ for a particular operation. You’ll learn about object introspection later in\
    \ this chapter.\n\n# Dynamic Binding\n\n`Dynamic binding` is the process of mapping\
    \ a message to a method at runtime, rather than at compile time. In effect, the\
    \ message and the object receiving the message aren’t set until the program is\
    \ running and the message is sent. Since the same method could be implemented\
    \ by potentially many (receiver) objects, the exact method invoked can vary dynamically.\
    \ Dynamic binding thus enables OOP polymorphism. Dynamic binding allows new objects\
    \ and code to be interfaced with or added to a system without affecting existing\
    \ code, therefore decreasing coupling between objects. It also enables a reduction\
    \ in program complexity by eliminating the need for conditional logic to handle\
    \ multiple-choice scenarios (typically implemented with a `switch` statement).\
    \ Dynamic binding implies the use of dynamic typing. In the following code fragment,\
    \ the variable `atom` of type `id` is sent the message `logInfo`.\n\n```\nid atom\
    \ = [[Hydrogen alloc] initWithNeutrons:1];\n[atom logInfo];\n```\n\nWhen this\
    \ code executes, the runtime determines the actual type of the variable `atom`\
    \ (via dynamic typing), and then uses the message selector (`logInfo`) to map\
    \ the message to a corresponding instance method implementation for the receiver\
    \ object `atom`. In this case, the variable `atom` resolves to the type `Hydrogen\
    \ *`, hence the runtime searches for a `Hydrogen` instance method `logInfo`. If\
    \ none is found, it searches for a corresponding instance method in its superclass.\
    \ The runtime continues searching the class hierarchy until it finds the instance\
    \ method (see [Figure 7-6](#9781430250500_Ch07.xhtml#Fig6)).\n\n![9781430250500_Fig07-06.jpg](images/9781430250500_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781430250500_Ch07.xhtml#_Fig6). Objective-C dynamic binding\n\
    \nDynamic binding is an inherent feature of Objective-C and it doesn’t require\
    \ any special APIs. Dynamic binding even allows the message that’s sent (the message\
    \ *selector*) to be a variable determined at runtime.\n\n# Dynamic Method Resolution\n\
    \n`Dynamic method resolution` enables you to provide the implementation of a method\
    \ dynamically. Objective-C includes the `@dynamic` directive, which tells the\
    \ compiler that the methods associated with a property will be provided dynamically.\
    \ The Apple Core Data Framework makes use of the `@dynamic` directive to generate\
    \ efficient attribute accessor methods and relationship accessor methods for managed\
    \ object classes.\n\nThe `NSObject` class includes the methods `resolveInstanceMethod:`\
    \ and `resolveClassMethod:` to dynamically provide an implementation for a given\
    \ selector for an instance and class method, respectively. You override one or\
    \ both of these methods to dynamically implement instance/class methods. In the\
    \ next section, you’ll learn how to use these methods by developing code to dynamically\
    \ resolve a method implementation for a selector.\n\n## Providing a Method Implementation\
    \ Dynamically\n\nNow you’re going to demonstrate dynamic method resolution by\
    \ updating the Calculator program to dynamically provide the implementation of\
    \ a method. Start Xcode (if not already started) and open the Calculator project\
    \ by selecting **Open Recent** ![image](images/arrow.jpg) **Calculator.xcodeproj**\
    \ from the Xcode File menu. First, you’ll update the `Calculator` class implementation.\
    \ Select the `Calculator.m` file in the navigator pane and then update the `Calculator`\
    \ implementation by overriding the `resolveInstanceMethod:` class method, as shown\
    \ in [Listing 7-10](#9781430250500_Ch07.xhtml#list10).\n\n[*Listing 7-10.*](#9781430250500_Ch07.xhtml#_list10)  Calculator\
    \ Class Dynamic Method\n\n```\n#import <objc/runtime.h>\n...\n+ (BOOL) resolveInstanceMethod:(SEL)aSEL\n\
    {\n  NSString *method = NSStringFromSelector(aSEL);\n\nif ([method hasPrefix:@\"\
    absoluteValue\"])\n  {\n    class_addMethod([self class], aSEL, (IMP)absoluteValue,\
    \ \"@@:@\");\n    NSLog(@\"Dynamically added instance method %@ to class %@\"\
    , method,\n          [self className]);\n    return YES;\n  }\n  return [super\
    \ resolveInstanceMethod:aSEL];\n}\n```"
  raw: '*Dynamic typing* enables the runtime to determine the type of an object at
    runtime; thereby letting runtime factors dictate what kind of object is to be
    used in your code. This is particularly beneficial when it isn’t known in advance
    the type of object that needs to be assigned to a variable, such as when passing
    arguments to methods. Objective-C supports both static and dynamic typing. When
    a variable is statically typed, its type is specified upon variable declaration.
    For example, the following statement declares that the variable `myAtom` is a
    pointer to an object of type `Atom`.


    ```

    Atom *myAtom;

    ```


    With static typing, the compiler can perform type checking at compile time and
    thus detect type errors prior to program execution. With dynamic typing, on the
    other hand, type checking is performed at runtime. Objective-C provides support
    for dynamic typing via the `id` data type. The `id` type is a unique Objective-C
    type that can hold a pointer to any type of Objective-C object, regardless of
    its class. The following statement declares that the variable `myAtom` is a pointer
    to an object of type `id`.


    ```

    id *myAtom;

    ```


    Hence, the variable `myAtom` may actually point to an object of type `Atom`, `Hydrogen`,
    and so forth—the actual type of the variable is determined at runtime. Dynamic
    typing permits associations between objects to be determined at runtime rather
    than forcing them to be encoded in a static design. This can make it much easier
    to write a single method that can handle an object from any class, rather than
    write a different method for each class in an application. For example, the following
    instance method declaration uses dynamic typing, thereby enabling the single input
    parameter to be an object from any class.


    ```

    - (NSInteger) computeValue:(id)parameter;

    ```


    Dynamic typing can be used to simplify your class interfaces because there is
    no need to create a different method declaration for each possible input parameter
    type. Dynamic typing also gives you much greater flexibility because the types
    used by a program can evolve during its execution and new types may be introduced
    without the need to recompile or redeploy. Because Objective-C supports both static
    and dynamic typing, you can provide different levels of type information to a
    method declaration; for example, the previous method declaration is modified to
    specify that the input parameter may be an object of any type that conforms to
    the `NSDecimalNumberBehaviors` protocol.


    ```

    - (NSInteger) computeValue:(id<NSDecimalNumberBehaviors>)parameter;

    ```


    Next, the method declaration is modified to specify that the input parameter is
    a pointer to an object of type `NSNumber`.


    ```

    - (NSInteger) computeValue:(NSNumber *)parameter;

    ```


    Finally, the method declaration is further refined to specify that the input parameter
    is a pointer to an object of type `NSNumber` that conforms to the `NSDecimalNumberBehaviors`
    protocol.


    ```

    - (NSInteger) computeValue:(NSNumber<NSDecimalNumberBehaviors> *)parameter;

    ```


    Objective-C also provides APIs for runtime object introspection (for example,
    asking a dynamically typed, anonymous object what its class is) to partially mitigate
    the loss of static type checks.  Introspection enables the runtime to verify the
    type of an object and thus validate its suitability for a particular operation.
    You’ll learn about object introspection later in this chapter.


    Dynamic Binding


    *Dynamic binding* is the process of mapping a message to a method at runtime,
    rather than at compile time. In effect, the message and the object receiving the
    message aren’t set until the program is running and the message is sent. Since
    the same method could be implemented by potentially many (receiver) objects, the
    exact method invoked can vary dynamically. Dynamic binding thus enables OOP polymorphism.
    Dynamic binding allows new objects and code to be interfaced with or added to
    a system without affecting existing code, therefore decreasing coupling between
    objects. It also enables a reduction in program complexity by eliminating the
    need for conditional logic to handle multiple-choice scenarios (typically implemented
    with a switch statement). Dynamic binding implies the use of dynamic typing. In
    the following code fragment, the variable `atom` of type `id` is sent the message
    `logInfo`.


    ```

    id atom = [[Hydrogen alloc] initWithNeutrons:1];

    [atom logInfo];

    ```


    When this code executes, the runtime determines the actual type of the variable
    `atom` (via dynamic typing), and then uses the message selector (`logInfo`) to
    map the message to a corresponding instance method implementation for the receiver
    object `atom`. In this case, the variable `atom` resolves to the type `Hydrogen
    *`, hence the runtime searches for a Hydrogen instance method `logInfo`. If none
    is found, it searches for a corresponding instance method in its superclass. The
    runtime continues searching the class hierarchy until it finds the instance method
    (see [Figure 7-6](#9781430250500_Ch07.xhtml#Fig6)).


    ![9781430250500_Fig07-06.jpg](images/9781430250500_Fig07-06.jpg)


    [Figure 7-6](#9781430250500_Ch07.xhtml#_Fig6). Objective-C dynamic binding


    Dynamic binding is an inherent feature of Objective-C and it doesn’t require any
    special APIs. Dynamic binding even allows the message that’s sent (the message
    *selector*) to be a variable determined at runtime.


    Dynamic Method Resolution


    *Dynamic method resolution* enables you to provide the implementation of a method
    dynamically. Objective-C includes the `@dynamic` directive, which tells the compiler
    that the methods associated with a property will be provided dynamically. The
    Apple Core Data Framework makes use of the `@dynamic` directive to generate efficient
    attribute accessor methods and relationship accessor methods for managed object
    classes.


    The `NSObject` class includes the methods `resolveInstanceMethod:` and `resolveClassMethod:`
    to dynamically provide an implementation for a given selector for an instance
    and class method, respectively. You override one or both of these methods to dynamically
    implement instance/class methods. In the next section, you’ll learn how to use
    these methods by developing code to dynamically resolve a method implementation
    for a selector.


    Providing a Method Implementation Dynamically


    Now you’re going to demonstrate dynamic method resolution by updating the Calculator
    program to dynamically provide the implementation of a method. Start Xcode (if
    not already started) and open the Calculator project by selecting **Open Recent**
    ![image](images/arrow.jpg) **Calculator.xcodeproj** from the Xcode File menu.
    First, you’ll update the `Calculator` class implementation. Select the **Calculator.m**
    file in the navigator pane and then update the `Calculator` implementation by
    overriding the `resolveInstanceMethod:` class method, as shown in [Listing 7-10](#9781430250500_Ch07.xhtml#list10).


    [*Listing 7-10.*](#9781430250500_Ch07.xhtml#_list10)  Calculator Class Dynamic
    Method


    ```

    #import <objc/runtime.h>

    ...

    + (BOOL) resolveInstanceMethod:(SEL)aSEL

    {

      NSString *method = NSStringFromSelector(aSEL);


    if ([method hasPrefix:@"absoluteValue"])

      {

        class_addMethod([self class], aSEL, (IMP)absoluteValue, "@@:@");

        NSLog(@"Dynamically added instance method %@ to class %@", method,

              [self className]);

        return YES;

      }

      return [super resolveInstanceMethod:aSEL];

    }

    ```'
  trans: "\n# 动态类型\n\n`动态类型`使得运行时能够在执行期间确定对象的类型，从而让运行时因素决定代码中应使用何种对象。当无法预先确定需要赋值给变量的对象类型时（例如向方法传递参数），这一特性尤为有用。Objective-C\
    \ 同时支持静态类型和动态类型。当变量被静态类型化时，其类型在变量声明时即被指定。例如，以下声明语句表明变量 `myAtom` 是一个指向 `Atom` 类型对象的指针。\n\
    \n```\nAtom *myAtom;\n```\n\n采用静态类型时，编译器可在编译时执行类型检查，从而在程序执行前检测类型错误。而采用动态类型时，类型检查则在运行时执行。Objective-C\
    \ 通过 `id` 数据类型为动态类型提供支持。`id` 类型是 Objective-C 特有的类型，它可以容纳指向任意类型 Objective-C 对象的指针，无论该对象属于哪个类。以下声明语句表明变量\
    \ `myAtom` 是一个指向 `id` 类型对象的指针。\n\n```\nid *myAtom;\n```\n\n因此，变量 `myAtom` 实际上可以指向\
    \ `Atom`、`Hydrogen` 等类型的对象——变量的实际类型在运行时决定。动态类型允许在运行时确定对象之间的关联关系，而不是强制将其编码在静态设计中。这使得编写一个能处理任意类对象的单一方法变得更加容易，而无需为应用程序中的每个类分别编写不同的方法。例如，以下实例方法声明使用了动态类型，从而使得单个输入参数可以是来自任意类的对象。\n\
    \n```\n- (NSInteger) computeValue:(id)parameter;\n```\n\n动态类型可用于简化类接口，因为无需为每种可能的输入参数类型创建不同的方法声明。动态类型还赋予了更大的灵活性，因为程序使用的类型可以在执行过程中演变，并且可以在无需重新编译或重新部署的情况下引入新类型。由于\
    \ Objective-C 同时支持静态类型和动态类型，你可以为方法声明提供不同层次的类型信息；例如，修改前面的方法声明以指定输入参数可以是符合 `NSDecimalNumberBehaviors`\
    \ 协议的任意类型的对象。\n\n```\n- (NSInteger) computeValue:(id<NSDecimalNumberBehaviors>)parameter;\n\
    ```\n\n接下来，修改方法声明以指定输入参数是一个指向 `NSNumber` 类型对象的指针。\n\n```\n- (NSInteger) computeValue:(NSNumber\
    \ *)parameter;\n```\n\n最后，进一步优化方法声明，指定输入参数是一个指向符合 `NSDecimalNumberBehaviors` 协议的\
    \ `NSNumber` 类型对象的指针。\n\n```\n- (NSInteger) computeValue:(NSNumber<NSDecimalNumberBehaviors>\
    \ *)parameter;\n```\n\nObjective-C 还提供了运行时对象自省（例如，询问一个动态类型化、匿名的对象其所属类）的 API，以部分弥补静态类型检查的缺失。自省使运行时能够验证对象的类型，从而确认其是否适用于特定操作。你将在本章后面学习对象自省的相关内容。\n\
    \n# 动态绑定\n\n`动态绑定`是在运行时（而非编译时）将消息映射到方法的过程。实际上，消息和接收消息的对象直到程序运行并发送消息时才能确定。由于相同的方法可能被多个（接收者）对象实现，因此实际调用的方法可以动态变化。动态绑定因此实现了面向对象编程的多态性。动态绑定允许新对象和代码与系统接口或添加到系统中，而不会影响现有代码，从而降低了对象间的耦合度。它还通过消除处理多选场景（通常使用\
    \ `switch` 语句实现）的条件逻辑需求，降低了程序复杂度。动态绑定意味着需要使用动态类型。在以下代码片段中，类型为 `id` 的变量 `atom`\
    \ 被发送了 `logInfo` 消息。\n\n```\nid atom = [[Hydrogen alloc] initWithNeutrons:1];\n\
    [atom logInfo];\n```\n\n当这段代码执行时，运行时通过动态类型确定变量 `atom` 的实际类型，然后使用消息选择器（`logInfo`）将消息映射到接收者对象\
    \ `atom` 的对应实例方法实现。在此例中，变量 `atom` 解析为类型 `Hydrogen *`，因此运行时查找 `Hydrogen` 的实例方法\
    \ `logInfo`。如果未找到，则在其超类中查找对应的实例方法。运行时继续在类层次结构中搜索，直到找到该实例方法（参见图 7-6）。\n\n![9781430250500_Fig07-06.jpg](img/9781430250500_Fig07-06.jpg)\n\
    \n图 7-6。 Objective-C 动态绑定\n\n动态绑定是 Objective-C 的固有特性，无需任何特殊 API。动态绑定甚至允许发送的消息（消息*选择器*）是一个在运行时确定的变量。\n\
    \n# 动态方法解析\n\n`动态方法解析`使你能够动态提供方法的实现。Objective-C 包含 `@dynamic` 指令，用于告知编译器与属性相关联的方法将动态提供。Apple\
    \ Core Data 框架利用 `@dynamic` 指令为托管对象类生成高效的属性访问方法和关系访问方法。\n\n`NSObject` 类包含了 `resolveInstanceMethod:`\
    \ 和 `resolveClassMethod:` 方法，分别用于动态地为实例方法和类方法提供给定选择器的实现。你可以重写其中一个或两个方法，以动态实现实例/类方法。在下一节中，你将通过编写代码动态解析方法选择器的实现，学习如何使用这些方法。\n\
    \n## 动态提供方法实现\n\n现在，你将通过更新 Calculator 程序来动态提供方法的实现，以此演示动态方法解析。启动 Xcode（如果尚未启动），然后从\
    \ Xcode 的文件菜单中选择 **Open Recent** ![image](img/arrow.jpg) **Calculator.xcodeproj**\
    \ 打开 Calculator 项目。首先，更新 `Calculator` 类的实现。在导航器窗格中选择 `Calculator.m` 文件，然后通过重写\
    \ `resolveInstanceMethod:` 类方法更新 `Calculator` 实现，如代码清单 7-10 所示。\n\n*代码清单 7-10.*\
    \ Calculator 类动态方法\n\n```\n#import <objc/runtime.h>\n...\n+ (BOOL) resolveInstanceMethod:(SEL)aSEL\n\
    {\n  NSString *method = NSStringFromSelector(aSEL);\n\nif ([method hasPrefix:@\"\
    absoluteValue\"])\n  {\n    class_addMethod([self class], aSEL, (IMP)absoluteValue,\
    \ \"@@:@\");\n    NSLog(@\"已动态添加实例方法 %@ 到类 %@\", method,\n          [self className]);\n\
    \    return YES;\n  }\n  return [super resolveInstanceMethod:aSEL];\n}\n```\n"
- fmt: "在[表7-10](#9781430250500_Ch07.xhtml#list10)中，运行时库的导入指令被添加到类实现中（`#import <objc/runtime.h>`）；这会将运行时系统API添加到你的代码中。在`resolveInstanceMethod:`类方法中，运行时API`class_addMethod()`用于将函数作为实例方法动态添加到类中。该函数接收以下输入参数：要添加方法的类、新方法的`selector`、函数的地址，以及描述方法参数类型的一个字符数组。从[表7-10](#9781430250500_Ch07.xhtml#list10)中可以看出，作为实例方法添加的函数被称为`absoluteValue`；它接收`id`作为输入参数，并返回`id`作为结果。现在，将`absoluteValue()`函数添加到`Calculator`类实现中。请添加[表7-11](#9781430250500_Ch07.xhtml#list11)中所示的代码。\n\
    \n[*表7-11.*](#9781430250500_Ch07.xhtml#_list11) `Calculator`类动态方法\n\n```\nid absoluteValue(id\
    \ self, SEL _cmd, id value)\n{\n  NSInteger intVal = [value integerValue];\n \
    \ if (intVal < 0)\n  {\n    return [NSNumber numberWithInteger:(intVal * -1)];\n\
    \  }\n  return value;\n}\n```\n\n注意，函数的输入参数包含隐式参数`self`和`_cmd`；`self`是接收方对象，`_cmd`是该方法的`selector`。\n\
    \n现在更新`main()`函数以测试动态方法解析。从导航面板中选择**main.m**文件，并更新函数，如[表7-12](#9781430250500_Ch07.xhtml#list12)所示。\n\
    \n[*表7-12.*](#9781430250500_Ch07.xhtml#_list12) 带有动态方法的`Calculator`类`main()`函数\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Calculator.h\"\n\nint main(int\
    \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    Calculator *calc\
    \ = [[Calculator alloc] init];\n    NSNumber *addend1 = [NSNumber numberWithInteger:-25];\n\
    \    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n    NSNumber *addend3\
    \ = [NSNumber numberWithInteger:15];\n\n#pragma clang diagnostic push\n#pragma\
    \ clang diagnostic ignored \"-Warc-performSelector-leaks\"\n    SEL selector1\
    \ = @selector(sumAddend1:addend2:);\n    id sum1 = [calc performSelector:selector1\
    \ withObject:addend1\n               withObject:addend2];\n    NSLog(@\"Sum of\
    \ %@ + %@ = %@\", addend1, addend2, sum1);\n\nSEL selector2 = NSSelectorFromString(@\"\
    sumAddend1::\");\n    id sum2 = [calc performSelector:selector2 withObject:addend1\n\
    \               withObject:addend3];\n    NSLog(@\"Sum of %@ + %@ = %@\", addend1,\
    \ addend3, sum2);\n\nSEL selector3 = NSSelectorFromString(@\"absoluteValue:\"\
    );\n    NSLog(@\"Invoking instance method %@ on object of class %@\",\n      \
    \    NSStringFromSelector(selector3), [calc className]);\n    id sum3 = [calc\
    \ performSelector:selector3 withObject:sum2];\n    NSLog(@\"Absolute value of\
    \ %@ = %@\", sum2, sum3);\n#pragma clang diagnostic pop\n  }\n  return 0;\n}\n\
    ```\n\n该代码动态地创建了新方法的`selector`，然后使用该`selector`调用实例方法。动态解析会将方法添加到运行时并调用它，返回其结果。结果随后会显示在输出面板中。现在，保存、编译并运行更新后的`Calculator`程序，并观察输出面板中的消息（参见[图7-7](#9781430250500_Ch07.xhtml#Fig7)）。\n\
    \n![9781430250500_Fig07-07.jpg](images/9781430250500_Fig07-07.jpg)\n\n[图7-7](#9781430250500_Ch07.xhtml#_Fig7)\
    \ Objective-C动态方法解析\n\n正如你在输出面板中观察到的，当使用`selector` `absoluteValue:`的消息通过`performSelector:withObject:`方法被动态调用时，新方法`absoluteValue:`由Objective-C运行时添加到了`Calculator`类中。如本例所示，动态方法解析可用于在运行时向类添加方法。\n\
    \n## 动态加载\n\n*动态加载*使得Objective-C程序能够在需要时加载可执行代码和资源，而不是在应用程序启动时加载所有程序组件。可执行代码（在加载前已链接）可以包含新类，这些新类会集成到程序的运行时映像中。这种程序代码和资源的*懒加载*通过对系统提出更低的内存需求，改善了整体性能。同时这也增强了程序的可扩展性，因为可以在不修改现有程序的情况下动态添加新软件。Apple提供了`bundle`机制来支持iOS和OS\
    \ X平台上的软件动态加载。\n\n`bundle`是一种软件交付机制。它由一个具有标准化层级结构的目录组成，其中包含可执行代码以及该代码使用的资源。一个`bundle`可以包含可执行代码、图片、声音文件或任何其他类型的代码或资源。它还包括一个名为信息属性列表（`Info.plist`）的运行时配置文件。`bundle`定义了组织与软件相关的代码和资源的基本结构；它们有几种类型：\n\
    \n*   *应用程序`bundle`*：应用程序`bundle`管理与进程（例如，一个程序）相关的代码和资源。\n*   *框架`bundle`*：框架`bundle`管理动态共享库及其相关资源，例如头文件。应用程序可以链接一个或多个框架，例如`Foundation`框架。\n\
