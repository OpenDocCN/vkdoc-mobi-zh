- fmt: "This statement is required to include the runtime library messaging API (e.g.,\
    \ `objc_msgSend()`) in the file. Immediately after the import statements, the\
    \ code defines the function `greeting()` that returns a simple greeting. This\
    \ function will be used for the method implementation that will be dynamically\
    \ added to the class. The `main()` function contains the logic for creating a\
    \ new class using the runtime API. It creates a class pair (the class and its\
    \ metaclass), adds a method to it that points to the `greeting()` function defined\
    \ earlier, and then registers the class pair in the runtime, thereby enabling\
    \ you to create instances of the class. Notice that the method signature is obtained\
    \ by using that of a method (the `NSObject` description method) with the same\
    \ signature. The next few lines create an instance of the class and send it a\
    \ message, with the output from the method invocation logged to the output pane.\
    \ When you compile and run the program, you should observe output similar to that\
    \ shown in [Figure 8-3](#9781430250500_Ch08.xhtml#Fig3).\n\n![9781430250500_Fig08-03.jpg](images/9781430250500_Fig08-03.jpg)\n\
    \n[Figure 8-3](#9781430250500_Ch08.xhtml#_Fig3). DynaClass program, dynamic class\
    \ creation\n\nGreat job! You have now completed your overview of the runtime APIs\
    \ and their usage. Please refer to the Apple Runtime Reference for a complete\
    \ definition of these APIs. Now let’s examine some of the runtime library design\
    \ and implementation details.\n\n## Implementing Runtime Object Messaging\n\n\
    The runtime library includes functions that provide access to the following information\
    \ (the functions are identified in parentheses):\n\n*   The class definition of\
    \ an object (`objc_getClass`)\n*   The superclass for a class (`class_getSuperclass`)\n\
    *   The metaclass definition of an object (`objc_getMetaClass`)\n*   The name\
    \ of a class (`class_getName`)\n*   The version information for a class (`class_getVersion`)\n\
    *   The size of a class in bytes (`class_getInstanceSize`)\n*   The list of instance\
    \ variables for a class (`class_copyIvarList`)\n*   The list of methods for a\
    \ class (`class_copyMethodList`)\n*   The list of protocols for a class (`class_copyProtocolList`)\n\
    *   The list of properties for a class (`class_copyProperyList`)\n\nTaken together,\
    \ the runtime data types and functions give the runtime library the information\
    \ it requires to implement various Objective-C features, such as object messaging\
    \ (see [Figure 8-4](#9781430250500_Ch08.xhtml#Fig4)).\n\n![9781430250500_Fig08-04.jpg](images/9781430250500_Fig08-04.jpg)\n\
    \n[Figure 8-4](#9781430250500_Ch08.xhtml#_Fig4). Runtime system messaging operation\n\
    \nWhen you send a message to an object, the runtime looks up the instance methods\
    \ for the class via custom code that leverages the class method cache and its\
    \ vtable. It searches the entire class hierarchy for the corresponding method,\
    \ and when found, jumps to the method implementation. The runtime library includes\
    \ numerous design mechanisms to implement object messaging. You’ll look at a few\
    \ of these, beginning with vtables.\n\n## Method Lookup via vtables\n\nThe runtime\
    \ library defines a method data type (`objc_method`), as shown in [Listing 8-7](#9781430250500_Ch08.xhtml#list7).\n\
    \n*Listing 8-7.*  Runtime Library Method Data Type\n\n```\nstruct objc_method\n\
    {\n  SEL method_name;\n  char * method_types;\n  IMP method_imp;\n};\ntypedef\
    \ objc_method Method;\n```\n\n`method_name` is a variable of type `SEL` that describes\
    \ the method name; `method_types` describe the data types of the parameters of\
    \ the method; and `method_imp` is a variable of type `IMP` that provides the address\
    \ of the function invoked when the method is selected for invocation (recall that\
    \ Objective-C methods are, in fact, C functions that take at least two arguments:\
    \ `self` and `_cmd`). Because method invocation occurs potentially millions of\
    \ times during the execution of a program, the runtime system requires a fast,\
    \ efficient mechanism for method lookup and invocation. A **vtable**, also called\
    \ a **dispatch table**, is a mechanism commonly used in programming languages\
    \ to support dynamic binding. The Objective-C runtime library implements a custom\
    \ vtable dispatching mechanism designed to maximize both performance and flexibility.\
    \ A **vtable** is an array of `IMPs` (Objective-C method implementations). Every\
    \ runtime `Class` instance (`objc_class`) has a pointer to a vtable.\n\nEach `Class`\
    \ instance also includes a cache of pointers to recently used methods. This provides\
    \ performance optimization for method calls. The logic implemented by the runtime\
    \ library to perform method lookup is shown in [Figure 8-5](#9781430250500_Ch08.xhtml#Fig5).\n\
    \n![9781430250500_Fig08-05.jpg](images/9781430250500_Fig08-05.jpg)\n\n[Figure\
    \ 8-5](#9781430250500_Ch08.xhtml#_Fig5). Runtime library method lookup\n\nIn [Figure\
    \ 8-5](#9781430250500_Ch08.xhtml#Fig5), the runtime library first searches the\
    \ cache for the method `IMP` (pointer to the start of the method implementation).\
    \ If not found, it then looks for the method `IMP` in its vtable, and if found,\
    \ the `IMP` is then stored in the cache for future lookups. This design enables\
    \ the runtime to perform a fast and an efficient method lookup.\n\n## Selector\
    \ Uniquing via the dyld Shared Cache\n\nThe startup overhead for an Objective-C\
    \ program is directly proportional to the amount of time required for **selector\
    \ uniquing**. A selector name must be unique across an executable program, however,\
    \ your custom classes and every shared library in your program contain their own\
    \ copies of selector names, many of which may be duplicates (i.e., `alloc`, `init`,\
    \ etc.). The runtime needs to choose a single canonical `SEL` pointer value for\
    \ each selector name, and then update the metadata for every call site and method\
    \ list to use the unique value. This process must be performed at application\
    \ startup and uses up system resources (memory and program startup time). To make\
    \ this process more efficient, the runtime performs selector uniquing through\
    \ use of the dyld shared cache. **dyld** is a system service that locates and\
    \ loads dynamic libraries. It includes a shared cache that enables these libraries\
    \ to be shared across processes. The **dyld shared cache** also includes a selector\
    \ table, thereby enabling selectors for shared libraries and your custom classes\
    \ to be accessed from the cache. Thus, the runtime is able to retrieve selectors\
    \ for shared libraries from the dyld shared cache, and only needs to update selectors\
    \ for your app’s custom classes.\n\n## Message Dispatching"
