    #pragma mark -

    #pragma mark Delegate methods


    - (void)connection:(NSURLConnection *)connection didFailWithError:(NSError *)error

    {

      NSString *description = [error localizedDescription];

      NSString *domain = [error domain];

      NSInteger code = [error code];

      NSDictionary *info = [error userInfo];

      NSURL *failedUrl = (NSURL *)[info objectForKey:NSURLErrorFailingURLErrorKey];

      NSLog(@"\n*** ERROR ***\nDescription-> %@\nURL-> %@\nDomain-> %@\nCode-> %li",

            description, failedUrl, domain, code);

      self.finishedLoading = YES;

    }


    - (void)connection:(NSURLConnection *)connection

    didReceiveResponse:(NSURLResponse *)response

    {

      if (self.receivedData != nil)

      {

        [self.receivedData setLength:0];

      }

    }


    - (NSCachedURLResponse *)connection:(NSURLConnection *)connection

                      willCacheResponse:(NSCachedURLResponse *)cachedResponse

    {

      NSURLResponse *response = [cachedResponse response];

      NSURL *url = [response URL];

      if ([[url scheme] isEqualTo:HTTP_SCHEME])

      {

        NSLog(@"Downloaded data, caching response");

        return cachedResponse;

      }

      else

      {

        NSLog(@"Downloaded data, not caching response");

        return nil;

      }

    }


    - (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data

    {

       if (self.receivedData != nil)

       {

         [self.receivedData appendData:data];

       }

       else

       {

         self.receivedData = [[NSMutableData alloc] initWithData:data];

       }

    }


    - (void)connectionDidFinishLoading:(NSURLConnection *)connection

    {

      NSUInteger length = [self.receivedData length];

      NSLog(@"Downloaded %lu bytes from request %@", length, self.request);


    // Loaded data, set flag to exit run loop

      self.finishedLoading = YES;

    }


    @end

    ```


    An `NSURLConnection` sends the `connection:didFailWithError:` message to its delegate
    object if the connection doesn’t load its request successfully. As shown in [Listing
    14-4](#9781430250500_Ch14.xhtml#list4), the `NetConnector` class is set as the
    delegate for its `NSURLConnection` object, and hence its `connection:didFailWithError:`
    method will be invoked on request load errors. The method implementation retrieves
    the properties of the `NSError` object: description, domain, code, and user info.
    The URL of the failed load request is stored in the user info dictionary. Its
    key is `NSURLErrorFailingURLErrorKey`, one of the `NSError` standard user info
    dictionary keys listed in [Table 14-1](#9781430250500_Ch14.xhtml#Tab1). The method
    logs the values of this data to the output pane.


    Next, you will update the `main()` function, but before you do that, you need
    to create a page with a valid URL that cannot be loaded. Doing this forces an
    error to occur when you attempt to load the page using an `NSURLConnection` object.
    Open an OS X terminal window and enter the Unix commands shown in [Listing 14-5](#9781430250500_Ch14.xhtml#list5).


    [*Listing 14-5.*](#9781430250500_Ch14.xhtml#_list5) Using the Mac OS X Terminal
    Utility to Create a File


    ```

    touch /tmp/ProtectedPage.html

    chmod u-r /tmp/ProtectedPage.html

    ```


    The `touch` command creates a new, empty file. As shown in [Listing 14-6](#9781430250500_Ch14.xhtml#list6),
    the full path for the file is `/tmp/ProtectedPage.html`. The `chmod u-r` command
    removes read access to the file for the current user. The corresponding URL for
    this resource is `file:///tmp/ProtectedPage.html`. OK, now that this resource
    is configured properly, let’s update the `main()` function. Select the **main.m**
    file in the navigator pane, and then update the `main()` function, as shown in
    [Listing 14-6](#9781430250500_Ch14.xhtml#list6).


    [*Listing 14-6.*](#9781430250500_Ch14.xhtml#_list6) NetConnector main( ) Function
    Implementation


    ```

    #import <Foundation/Foundation.h>

    #import "NetConnector.h"


    #define INDEX_URL       @"file:///tmp/ProtectedPage.html"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Retrieve the current run loop for the connection

        NSRunLoop *loop = [NSRunLoop currentRunLoop];


    // Create the request with specified cache policy, then begin downloading!

        NSURLRequest *request = [NSURLRequest

                                 requestWithURL:[NSURL URLWithString:INDEX_URL]

                                    cachePolicy:NSURLRequestReturnCacheDataElseLoad

                                timeoutInterval:5];

        NetConnector *netConnect = [[NetConnector alloc] initWithRequest:request];


    // Loop until finished loading the resource

        while (!netConnect.finishedLoading &&

               [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);


    // Zero out cache

        [[NSURLCache sharedURLCache] removeAllCachedResponses];

      }

      return 0;

    }

    ```


    The key change in the `main()` function is the URL. It is updated to the URL for
    the resource that you created earlier, `file:///tmp/ProtectedPage.html`. The code
    will attempt to asynchronously load this resource (with an `NSURLConnection` object)
    using the `NetConnector initWithRequest:` method. As shown in [Listing 14-4](#9781430250500_Ch14.xhtml#list4),
    the `NetConnector` class implements the `connection:didFailWithError:` method
    to handle errors loading a URL.


    Now save, compile, and run the updated `NetConnector` program and observe the
    messages in the output pane (as shown in [Figure 14-1](#9781430250500_Ch14.xhtml#Fig1)).


    ![9781430250500_Fig14-01.jpg](images/9781430250500_Fig14-01.jpg)


    [Figure 14-1](#9781430250500_Ch14.xhtml#_Fig1). Testing the `NSError` portion
    of the updated `NetConnector` project


    The messages in the output pane show that the `NSURLConnection` failed to load
    the URL, and hence sent the `connection:didFailWithError:` message to its delegate
    object—in this case, the `NetConnector` instance. As shown in the method implementation
    of [Listing 14-4](#9781430250500_Ch14.xhtml#list4), the error description, failed
    URL, error code, and domain are logged to the output pane. OK, great. Now that
