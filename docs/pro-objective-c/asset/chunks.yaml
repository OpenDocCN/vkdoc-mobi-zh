    | --- | --- | --- |

    | `readwrite` | Required. | Access qualifier. The default setting. |

    | `readonly` | Required. | Access qualifier. Cannot select both `readwrite` and
    `readonly`. |

    | `assign` | The `setter` method uses simple assignment (i.e., the input value
