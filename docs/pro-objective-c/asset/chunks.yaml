    [orderObject setObject:@\"Cheeseburger\" forKeyedSubscript:@\"1234\"];\n```\n\n\
    如这些示例所示，自定义下标操作应仅用于获取和设置对象的元素，而不应用于其他目的（例如，追加或删除对象等）。这有助于保持语法与其意图一致，从而与 Foundation\
