    Roundup


    In this chapter, you began your review of the Foundation Framework, focusing on
    classes that provide common, general-purpose functionality required for most Objective-C
    programs. You should now be familiar with Foundation Framework classes that provide
    the following functionality:


    *   Root classes

    *   Working with strings

    *   Numbers and value objects

    *   Collections

    *   XML processing


    Chapter     11


    Foundation Framework System Services


    In this chapter, you will learn about Foundation Framework classes that provide
    system services. These classes implement a variety of operating system services
    for networking, file management, interprocess communication, system information
    retrieval, text processing, threading, and concurrency.


    Network Services


    The Foundation Framework includes various APIs to support network services. In
    the next few chapters, you’ll learn about APIs used to access network host information,
    and explore how to utilize the Bonjour network protocol to publish and discover
    network services.


    NSHost


    The `NSHost` class contains methods to access information for a *network host*,
    which is a collection of network names and addresses for a computer or device
    connected to a network. An `NSHost` object represents an individual network host.
    Its methods can be used to look up the network name and address information for
    the host or other objects on a network. The code in [Listing 11-1](#9781430250500_Ch11.xhtml#list1)
    uses the NSHost `currentHost` and `name` methods to retrieve the `NSHost` object
    for the host the program is running on, and then logs the host name to the console.


    [*Listing 11-1.*](#9781430250500_Ch11.xhtml#_list1)  Retrieving the Network Host
    Name Using NSHost


    ```

    NSHost myHost = [NSHost currentHost];

    NSLog(@"Host name is %@", [myHost name]);

    ```


    [Listing 11-2](#9781430250500_Ch11.xhtml#list2) uses the NSHost `hostWithName:`
    and address methods to create an `NSHost` object with the domain name `www.apress.com`,
    and then logs the host address to the console.


    [*Listing 11-2.*](#9781430250500_Ch11.xhtml#_list2)  Retrieving a Host Address
    Using NSHost


    ```

    NSHost *apress = [NSHost hostWithName:@"www.apress.com"];

    NSLog(@"Apress host address is %@", [apress address]);

    ```


    Bonjour Network Services


    Bonjour is a protocol that automatically creates a functional IP network without
    the need for configuration or manual intervention, also known as *zero configuration
    networking*. Bonjour is designed to enable devices, such as computers and printers,
    to connect to a network automatically. It performs a variety of functions, including
    service discovery, address assignment, and hostname resolution.


    The `NSNetService` and `NSNetServiceBrowser` classes provide functionality to
    manage Bonjour network services. The `NSNetService` class represents a network
    service that an application publishes or uses as a client. A service can be either
    a local service that your application is publishing or a remote service that your
    application wants to use. The `NSNetServiceBrowser` class is used to find published
    network services. Each class must provide a delegate object that performs processing
    upon completion of method invocation. The methods for each class are invoked asynchronously
    and performed within a *run loop*. Later in this chapter, you’ll learn how to
    use the `NSRunLoop` class to manage run loops.


    Application Services


    These classes consist of several general-purpose APIs used to retrieve and/or
    set information associated with an application process. The `NSProcessInfo` class
    is used to retrieve information about the currently executing program (i.e., process).
    The class method `processInfo` retrieves the single `NSNProcessInfo` object for
    the current process. `NSProcessInfo` includes instance methods used to retrieve
    process information, such as its command-line arguments, environment variables,
    host name, process name, and so forth. The following statement uses the `processInfo`
    and `processName` methods to retrieve the name of the current process.


    ```

    NSString *name = [[NSProcessInfo processInfo] processName];

    ```


    The `NSUserDefaults` class provides an API for managing *user preferences*, information
    stored persistently on the local file system and used to configure an application.
    An application provides preferences to enable users to customize its behavior.
    `NSUserDefaults` includes methods to both set and retrieve preferences, and manage
    other aspects of the preferences system. The set and retrieve methods support
    primitive types along with objects that are property list types (i.e., objects
    of type `NSData`, `NSString`, `NSNumber`, `NSDate`, `NSArray`, or `NSDictionary`).
    Preferences are stored in a user’s defaults database as key-value pairs.


    The code in [Listing 11-3](#9781430250500_Ch11.xhtml#list3) uses the `standardUserDefaults`,
    `setObject:forKey:` and `objectForKey:` methods to set a user preference, and
    then retrieve and log the value set to the console.


    [*Listing 11-3.*](#9781430250500_Ch11.xhtml#_list3)  Managing User Preferences
    Using NSUserDefaults


    ```

    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];

    [defaults setObject:@"Hello" forKey:@"USER_SALUTATION"];

    NSLog(@"Salutation is %@", [defaults objectForKey:@" USER_SALUTATION"];

    ```


    Regular Expressions and Text Processing


    `NSRegularExpression` is used to apply *regular expression* processing on strings.
    A regular expression is a pattern that provides a means of both specifying and
    identifying text. The class includes methods to create and initialize an `NSRegularExpression`
    object, and methods to perform a variety of regular expression operations (find
    matches, number of matches, etc.).


    The Foundation Framework `NSOrthography`, `NSSpellServer`, and `NSTextCheckingResult`
    classes are primarily used for text processing. `NSOrthography` describes the
    linguistic content of text (the scripts the text contains, the dominant language
    and possibly other languages for the scripts, the dominant script and language
    for the text overall). `NSSpellServer` provides a mechanism for making an application’s
    spell checker available to any application as a spelling service. It includes
    methods for configuring a spelling server, providing spelling services, and managing
    the spell-checking process. The `NSSpellServer` class is available for use on
    the OS X platform only. The `NSTextCheckingResult` class is used to describe the
    items located by text checking. Each object represents the occurrence of the requested
    text found during the analysis of a block of text. The code in [Listing 11-4](#9781430250500_Ch11.xhtml#list4)
    uses an `NSRegularExpression` object to retrieve an `NSTextCheckingResult` object
    and display its data.


    [*Listing 11-4.*](#9781430250500_Ch11.xhtml#_list4)  Retrieving an NSTextCheckingResult
    from a Regular Expression


    ```

    NSError *error;

    NSRegularExpression *regex = [NSRegularExpression

      regularExpressionWithPattern:@"World"

                           options:NSRegularExpressionCaseInsensitive

                             error:&error];

    NSString *greeting = @"Hello, World!";

    NSTextCheckingResult *match = [regex

      firstMatchInString:greeting

                 options:0

                   range:NSMakeRange(0, [greeting length])];

    NSRange range = [match range];

    NSLog(@"Match begins at %ldth character in string",

      (unsigned long)range.location);

    ```'
  trans: "\n# Foundation 框架\n\n## 总结\n\n在本章中，你开始了对 Foundation 框架的复习，重点关注那些为大多数 Objective-C\
    \ 程序提供通用、常用功能的类。现在，你应该已经熟悉了提供以下功能的 Foundation 框架类：\n\n- 根类\n- 字符串处理\n- 数字与值对象\n\
    - 集合\n- XML 处理\n\n# 第 11 章：Foundation 框架系统服务\n\n在本章中，你将学习提供系统服务的 Foundation 框架类。这些类实现了多种操作系统服务，用于网络通信、文件管理、进程间通信、系统信息检索、文本处理、线程以及并发操作。\n\
    \n## 网络服务\n\nFoundation 框架包含多种用于支持网络服务的 API。在接下来的几章中，你将学习用于访问网络主机信息的 API，并探索如何利用\
    \ Bonjour 网络协议来发布和发现网络服务。\n\n### `NSHost`\n\n`NSHost` 类包含用于访问**网络主机**信息的方法。网络主机是指连接到网络的计算机或设备所拥有的网络名称和地址的集合。一个\
    \ `NSHost` 对象代表一个单独的网络主机。其方法可用于查询该主机或网络上其他对象的网络名称和地址信息。代码清单 11-1 中的代码使用了 `NSHost`\
    \ 的 `currentHost` 和 `name` 方法来获取程序当前运行所在主机的 `NSHost` 对象，并将主机名记录到控制台。\n\n**代码清单\
    \ 11-1.** 使用 `NSHost` 检索网络主机名\n\n```\nNSHost myHost = [NSHost currentHost];\n\
    NSLog(@\"Host name is %@\", [myHost name]);\n```\n\n代码清单 11-2 使用了 `NSHost` 的 `hostWithName:`\
    \ 和 `address` 方法来创建一个包含域名 `www.apress.com` 的 `NSHost` 对象，并将主机地址记录到控制台。\n\n**代码清单\
    \ 11-2.** 使用 `NSHost` 检索主机地址\n\n```\nNSHost *apress = [NSHost hostWithName:@\"\
    www.apress.com\"];\nNSLog(@\"Apress host address is %@\", [apress address]);\n\
    ```\n\n### Bonjour 网络服务\n\nBonjour 是一种能够自动创建一个功能完整的 IP 网络而无需配置或手动干预的协议，也称为**零配置网络**。Bonjour\
    \ 旨在让计算机和打印机等设备自动连接到网络。它执行多种功能，包括服务发现、地址分配和主机名解析。\n\n`NSNetService` 和 `NSNetServiceBrowser`\
    \ 类提供了管理 Bonjour 网络服务的功能。`NSNetService` 类代表应用程序作为客户端发布或使用的网络服务。一个服务既可以是你的应用程序正在发布的本地服务，也可以是你的应用程序希望使用的远程服务。`NSNetServiceBrowser`\
    \ 类用于查找已发布的网络服务。每个类都必须提供一个委托对象，该对象在方法调用完成后执行处理。每个类的方法都是异步调用的，并在**运行循环**内执行。在本章后面，你将学习如何使用\
    \ `NSRunLoop` 类来管理运行循环。\n\n## 应用程序服务\n\n这些类包含几个通用 API，用于检索和/或设置与应用程序进程相关的信息。`NSProcessInfo`\
    \ 类用于检索当前正在执行的程序（即进程）的信息。类方法 `processInfo` 检索当前进程的单个 `NSNProcessInfo` 对象。`NSProcessInfo`\
    \ 包含用于检索进程信息的实例方法，例如其命令行参数、环境变量、主机名、进程名等。下面的语句使用 `processInfo` 和 `processName`\
    \ 方法检索当前进程的名称。\n\n```\nNSString *name = [[NSProcessInfo processInfo] processName];\n\
    ```\n\n`NSUserDefaults` 类提供了一个用于管理**用户偏好设置**的 API，这些偏好设置是持久存储在本地文件系统中的信息，用于配置应用程序。应用程序提供偏好设置以使用户能够自定义其行为。`NSUserDefaults`\
    \ 包含用于设置和检索偏好设置，以及管理偏好设置系统其他方面的方法。设置和检索方法支持原始类型以及属性列表类型的对象（即类型为 `NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`\
    \ 或 `NSDictionary` 的对象）。偏好设置以键值对的形式存储在用户的默认设置数据库中。\n\n代码清单 11-3 中的代码使用了 `standardUserDefaults`、`setObject:forKey:`\
    \ 和 `objectForKey:` 方法来设置一个用户偏好，然后检索并将设置的值记录到控制台。\n\n**代码清单 11-3.** 使用 `NSUserDefaults`\
    \ 管理用户偏好设置\n\n```\nNSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
    [defaults setObject:@\"Hello\" forKey:@\"USER_SALUTATION\"];\nNSLog(@\"Salutation\
    \ is %@\", [defaults objectForKey:@\" USER_SALUTATION\"]);\n```\n\n## 正则表达式与文本处理\n\
    \n`NSRegularExpression` 用于对字符串应用**正则表达式**处理。正则表达式是一种用于指定和识别文本的模式。该类包含创建和初始化 `NSRegularExpression`\
    \ 对象的方法，以及执行各种正则表达式操作（查找匹配、匹配次数等）的方法。\n\nFoundation 框架中的 `NSOrthography`、`NSSpellServer`\
    \ 和 `NSTextCheckingResult` 类主要用于文本处理。`NSOrthography` 描述文本的语言学内容（文本包含的文字系统、主导语言以及该文字系统可能包含的其他语言、整个文本的主导文字系统和语言）。`NSSpellServer`\
    \ 提供了一种机制，使应用程序的拼写检查器可以作为拼写服务供任何应用程序使用。它包含用于配置拼写服务器、提供拼写服务以及管理拼写检查过程的方法。`NSSpellServer`\
    \ 类仅适用于 OS X 平台。`NSTextCheckingResult` 类用于描述文本检查所定位到的项目。每个对象代表在分析文本块期间找到的所请求文本的出现位置。代码清单\
    \ 11-4 中的代码使用 `NSRegularExpression` 对象来获取一个 `NSTextCheckingResult` 对象并显示其数据。\n\
    \n**代码清单 11-4.** 从正则表达式中检索 `NSTextCheckingResult`\n\n```\nNSError *error;\nNSRegularExpression\
    \ *regex = [NSRegularExpression\n  regularExpressionWithPattern:@\"World\"\n \
    \                      options:NSRegularExpressionCaseInsensitive\n          \
    \               error:&error];\nNSString *greeting = @\"Hello, World!\";\nNSTextCheckingResult\
    \ *match = [regex\n  firstMatchInString:greeting\n             options:0\n   \
    \            range:NSMakeRange(0, [greeting length])];\nNSRange range = [match\
    \ range];\nNSLog(@\"Match begins at %ldth character in string\",\n  (unsigned\
    \ long)range.location);\n```\n"
- fmt: "As shown in [Listing 11-4](#9781430250500_Ch11.xhtml#list4), a regular expression\
    \ is created using the `NSRegularExpression` `regularExpressionWithPattern:` method.\
    \ Next, the code uses the `firstMatchInString:options:range:` method to retrieve\
    \ the result of the regular expression query as an `NSTextCheckingResult`. The\
    \ pattern located by the query is then logged to the console with the `NSTextCheckingResult`\
    \ `range` method.\n\n## File System Utilities\n\nThe File I/O classes consist\
    \ of a collection of APIs for using files and directories. The classes enable\
    \ you to represent file paths, perform basic operations with files and directories,\
    \ find directories on the system, and use streams to perform input/output (I/O)\
    \ operations with files, in-memory, or to/from a network resource.\n\n## Application\
    \ Bundles\n\nThe `NSBundle` class groups code and resources that can be used in\
    \ a program. They are used to locate program resources, dynamically load and unload\
    \ executable code, and assist in localization. The `NSBundle` class includes methods\
    \ that enable you to create and initialize a bundle, retrieve a bundle or bundle\
    \ class, load a bundle’s code, find resources in a bundle, retrieve bundle information,\
    \ and manage localization. In Chapters 7 and 9, you learned about loadable bundles\
    \ and used the `NSBundle` class to dynamically load a bundle and create an object\
    \ from a bundle class, so you can refer to these chapters for further information\
    \ and code examples.\n\n## File Management\n\nThe `NSFileHandle` class provides\
    \ low-level file management utilities. An `NSFileHandle` class instance is an\
    \ object-oriented wrapper for a file descriptor. It includes methods for creating\
    \ and initializing file handlers, retrieving a file descriptor, performing file\
    \ I/O using a file handler, and closing a file when you are done. It also supports\
    \ asynchronous file operations. Many of the `NSFileHandle` creation methods also\
    \ acquire ownership of the file descriptor, and automatically close the file when\
    \ the object is deallocated. The class also includes methods to create an `NSFileHandle`\
    \ object with an input file descriptor. In these scenarios, the `closeFile` method\
    \ can be used to close the descriptor. [Listing 11-5](#9781430250500_Ch11.xhtml#list5)\
    \ demonstrates the use of `NSFileHandle` APIs to read a file named `Example.txt`\
    \ from the system’s default location to store temporary files.\n\n[*Listing 11-5.*](#9781430250500_Ch11.xhtml#_list5)\
    \ Using `NSFileHandle` to Read a File\n\n```\nNSString *tmpDir = NSTemporaryDirectory();\n\
    NSString *myFile = [NSString stringWithFormat:@\"%@/%@\", tmpDir,\n          \
    \         @\"Example.txt\"];\nNSFileHandle *fileHandle = [NSFileHandle fileHandleForReadingAtPath:myFile];\n\
    if (fileHandle)\n{\n  NSData *fileData = [fileHandle readDataToEndOfFile];\n \
    \ NSLog(@\"%lu bytes read from file %@\", [fileData length], myFile);\n}\n```\n\
    \nThe `NSFileManager` class provides general-purpose methods for performing basic\
    \ file-system operations. It includes methods to create a file manager, locate\
    \ directories, query directory contents, manage file and directory items, create\
    \ soft/hard links to files, query file access, get/set file system attributes,\
    \ and even manage iCloud-storage items. [Listing 11-6](#9781430250500_Ch11.xhtml#list6)\
    \ uses the `NSFileManager` APIs to list the contents at the current directory\
    \ path, and then query whether the first file found in this directory is executable.\n\
    \n[*Listing 11-6.*](#9781430250500_Ch11.xhtml#_list6) Using `NSFileManager` to\
    \ List the Contents of a Directory\n\n```\nNSFileManager *filemgr = [NSFileManager\
    \ defaultManager];\nNSString *currentPath = [filemgr currentDirectoryPath];\n\
    NSArray *contents = [filemgr contentsOfDirectoryAtPath:currentPath error:&error];\n\
    NSLog(@\"Contents: %@\", contents);\nif (contents)\n{\n  NSString *file = [NSString\
    \ stringWithFormat:@\"%@/%@\", currentPath, contents[0]];\n  if ([filemgr isExecutableFileAtPath:file])\n\
    \  {\n    NSLog(@\"%@ is executable\", file);\n  }\n}\n```\n\n## Stream Input-Output\n\
    \nStreams provide a convenient mechanism for reading and writing data sequentially,\
    \ whether that data be located in memory, a file, or over a network. The `NSStream`,\
    \ `NSInputStream`, and `NSOutputStream` classes provide functionality for reading\
    \ from/writing to streams. `NSStream` is an abstract class, and `NSInputStream`\
    \ and `NSOutputStream` are its concrete subclasses. A stream can be read/written\
    \ asynchronously (usually the preferred approach) or synchronously by polling.\
    \ To access a stream asynchronously, a delegate object is set for the stream (i.e.,\
    \ an `NSInputStream` or `NSOutputStream` object) and the stream is then scheduled\
    \ in a run loop. The delegate conforms to the `NSStreamDelegate` protocol. The\
    \ run loop invokes its `stream:handleEvent:` to handle stream events (status,\
    \ data available, error conditions). [Listing 11-7](#9781430250500_Ch11.xhtml#list7)\
    \ demonstrates use of the `NSInputStream` APIs to create an input stream from\
    \ a file, and then synchronously read data from a file named `Example.txt` (stored\
    \ in the current directory) into a buffer.\n\n[*Listing 11-7.*](#9781430250500_Ch11.xhtml#_list7)\
    \ Using `NSInputStream` to Read a File\n\n```\nNSString *currentPath = [[NSFileManager\
    \ defaultManager] currentDirectoryPath];\nNSString *myFile = [NSString stringWithFormat:@\"\
    %@/%@\", currentPath,\n                   @\"Example.txt\"];\nNSInputStream *ins\
    \ = [NSInputStream inputStreamWithFileAtPath:myFile];\n[ins open];\nif (ins &&\
    \ [ins hasBytesAvailable])\n{\n  uint8_t buffer[1024];\n  NSUInteger len = [ins\
    \ read:buffer maxLength:1024];\n  NSLog(@\"Bytes read = %lu\", len);\n}\n```\n\
    \nAfter creating the input stream, the stream is opened. Next, the `NSInputStream`\
    \ `hasBytesAvailable` method is used to determine whether the stream has any bytes\
    \ to read, and if so, the `NSInputStream` `read` method is used to read the data\
    \ into a buffer. Finally, the number of bytes read is logged to the console.\n\
    \n## Metadata Queries\n\nThe `NSMetadataItem` and `NSMetadataQuery` set of classes\
    \ provide APIs for metadata queries that enable an application to search for files\
    \ based on data that is part of the file or file system. Together they provide\
