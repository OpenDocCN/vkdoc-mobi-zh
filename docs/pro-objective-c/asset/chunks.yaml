    \ URL。它还使用多个`NSDate`API 计算下载 URL 所花费的时间。时间间隔以`NSTimeInterval`值计算。注意，块使用词法作用域捕获\
    \ URL 字符串（作为函数的参数提供）。\n\n`main()`函数使用 GCD API 创建并调度两个任务以并发执行。它首先创建两个全局并发调度队列，用于并行执行任务。\n\
    \n```\ndispatch_queue_t queue1 =\n  dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\ndispatch_queue_t queue2 =\n  dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n```\n\n接下来，它创建一个*任务组*，用于对任务进行分组，并且对于将任务排队以执行异步执行、等待一组已排队的任务等非常有用。然后代码将这两个任务分派到任务组。\n\
    \n```\ndispatch_group_async(group, queue1, getDownloadURLBlock(YahooURL));\ndispatch_group_async(group,\
    \ queue2, getDownloadURLBlock(ApressURL));\n```\n\n注意，要执行的任务由`getDownloadURLBlock()`函数检索到的块字面量指定；一个使用\
    \ Yahoo URL，另一个使用 Apress URL。GCD 的`dispatch_group_async()`函数使这些任务并发执行。接下来，GCD\
    \ 的`dispatch_group_wait()`函数用于阻塞主线程，直到两个并发任务都完成。\n\n```\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\n```\n\n最后，计算两个并发任务完成所花费的时间，并记录到控制台。现在，保存、编译并运行`BlockConcurrentTasks`程序，在输出窗格中观察消息（如图\
    \ [Figure 15-5](#9781430250500_Ch15.xhtml#Fig5) 所示）。\n\n![9781430250500_Fig15-05.jpg](images/9781430250500_Fig15-05.jpg)\n\
