- fmt: 'A common Objective-C programming convention for methods that return an error
    object is to make this the last parameter of the method and to specify the type
    of this parameter as a pointer to an error object pointer (also known as *double-indirection*).
    The following example declares a method named `getGreeting` that has an error
    object of type `NSError` as its parameter.


    ```

    - (NSString *)getGreeting(NSError **error);

    ```


    This approach enables the called method to modify the pointer the error object
    points to, and if an error occurs, return an error object specific to the method
    call.


    A return value for the method is required. It is either an object pointer or a
    Boolean value. Your code invokes such a method by including a reference to an
    error object as its last parameter, or providing `NULL` as the last parameter
    if you don’t need to access the error. After the method is invoked, the result
    is inspected. If the value is `NO` or `nil`, then the error object should be processed;
    else no error object was returned. Many Foundation classes have methods that return
    an error object by indirection. In addition, your classes can use this convention
    to implement methods that return an error object.


    [Listing 14-2](#9781430250500_Ch14.xhtml#list2) depicts a class named `FileWriter`,
    which declares a method that (indirectly) returns an error object.


    [*Listing 14-2.*](#9781430250500_Ch14.xhtml#_list2)  FileWriter Interface with
    Method That Returns an NSError Object


    ```

    @interface FileWriter : NSObject

    + (BOOL) writeData:(NSData *)data toFile:(NSString *)path error:(NSError **)err;

    @end

    ```


    For your code to call this method on a `FileWriter` object, it must first declare
    an `NSError` object, as shown in [Listing 14-3](#9781430250500_Ch14.xhtml#list3),
    and then check the return value to see if an error occurred.


    [*Listing 14-3.*](#9781430250500_Ch14.xhtml#_list3)  Invoking FileWriter Method
    That Returns an NSError Object


    ```

    NSError *writeErr;

    NSData *greeting = [@"Hello, World" dataUsingEncoding:NSUTF8StringEncoding];

    BOOL success = [FileWriter writeData:greeting

                                  toFile:NSTemporaryDirectory()

                                   error:&writeErr];

    if (!success)

    {

      // Process error

      ...

    }

    ```


