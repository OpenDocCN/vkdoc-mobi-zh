    test


    Roundup


    This chapter examined the concepts and details around Objective-C object creation,
    initialization, and messaging. The following are the key takeaways:


    *   The `NSObject alloc` method is used to allocate memory for an object, initializing
    its instance variables to zero. The method returns objects that are an instance
    of the receiving class’s type, also known as a “related result type.”

    *   `NSObject` provides an `init` method that serves the foundation for object
    initialization. Your classes should override this method to provide any custom
    initialization behavior required for them. Typically, instance allocation and
    initialization are performed with a single line of code: `[[ClassName alloc] init]`.

    *   Initializer methods should be implemented such that they perform a series
    of initializations for an object all the way up its inheritance chain to the root
    object of the hierarchy.

    *   Objective-C messaging supports OOP type polymorphism, whereby different receivers
    can have different implementations of the same method. In addition, the type of
    the receiver is determined at runtime. Consequently, different receivers can do
    different things in response to the same message.

    *   Objective-C message forwarding enables an object to perform user-defined processing
    when it receives a message not mapped to its set of methods. Message forwarding
    can be used to provide many of the features typically associated with OOP multiple
    inheritance.

    *   Objective-C provides two types of message forwarding: fast forwarding and
    normal (full) forwarding. Both are implemented by overriding the appropriate `NSObject`
    instance method, along with implementing any required supporting classes.


    In the last two chapters, you learned the ins and outs of developing classes using
    Objective-C: class design and implementation, object creation and initialization,
    and object interaction. In fact, why not take a moment to look back over what
    you have covered so far. This is a great time to go over your example programs
    and tinker with them to get a better feel for the language. Coming soon (in the
    next chapter, to be precise), you’ll explore another key topic of Objective-C
    programming: memory management.


    Chapter     4


    Memory Management


    So far, you’ve learned how to develop classes and create and initialize objects.
    Now is a great time to study the details of Objective-C memory management. Proper
    memory management is key to developing programs that perform both correctly and
    efficiently. In this chapter, you’ll look into how computer memory is allocated
    and released for Objective-C programs, the Objective-C memory model, and how to
    write programs that perform memory management properly.


    The overall quality of a program is often directly related to its management of
    system resources. A computer’s operating system allocates a finite amount of main
    memory for program execution, and if a program attempts to use more memory than
    the amount allocated by the O/S, it will not operate correctly. Hence, a program
    should use only as much memory as needed, neither allocating memory that it does
    not use nor trying to use memory that is no longer available. The Objective-C
    language and runtime provide mechanisms to support application memory management
    in alignment with these goals.


    Program Memory Usage


    In order to better understand the role of memory management, you need to understand
    how a program is stored and used in computer memory. An executable Objective-C
    program is composed of (executable) code, initialized and unitialized program
    data, linking information, relocation information, local data, and dynamic data.
    The program data includes statically-declared variables and program literals (e.g.,
    constant values in the code that are set during program compilation).


    The executable code and program data, along with the linking and relocation information,
    are statically allocated in memory and persist for the lifetime of the program.'
  trans: "\n太好了！你已经为`Hydrogen`类实现了快速转发。现在让我们使用快速转发来测试这个类。选择**main.m**文件并更新`main()`函数，如代码清单\
    \ 3-12 所示。\n\n*代码清单 3-12.* 测试氢类的快速转发\n\n```\nint main(int argc, const char * argv[])\n\
    {\n  @autoreleasepool\n  {\n    Atom *atom = [Hydrogen hydrogenWithNeutrons:0];\n\
    \    [atom logInfo];\n\n    id atom1 = [[Hydrogen alloc] initWithNeutrons:1];\n\
    \    [atom1 logInfo];\n\n    // 使用消息转发获取关于氢的一个事实\n    Hydrogen *atom2 = [Hydrogen\
    \ hydrogenWithNeutrons:2];\n    NSString *fact = [atom2 factoid];\n    [atom2\
    \ logInfo:fact];\n  }\n\n  return 0;\n}\n```\n\n在编辑器窗格的左侧，你可能会在`NSString *fact\
    \ = [atom2 factoid]`这一行看到一个红色圆圈内的感叹号。如果你点击这个感叹号，将会看到一个错误信息（见图 3-5）。\n\n![9781430250500_Fig03-05.jpg](img/9781430250500_Fig03-05.jpg)\n\
    \n图 3-5 氢类对象消息传递错误\n\n这个错误“No visible @interface for 'Hydrogen' declares the selector\
    \ 'factoid'”的发生是因为`Hydrogen`类在其接口中没有声明`factoid`实例方法。编译器需要知道程序可能发送的每条消息的完整方法签名——即使是那些被转发的消息。解决方案是在类接口或类别中声明该未知方法。在\
    \ Xcode 中，创建一个新的 Objective-C 类别，输入`Helper`作为名称，并在类别下拉列表中选择`Atom`。将 Elements 项目设为目标，并将\
    \ Elements 文件夹设为文件保存位置。在 Xcode 项目导航器窗格中，有两个新文件被添加到了 Elements 文件夹中：`Atom+Helper.h`和`Atom+Helper.m`。这些分别是类别接口和实现文件。由于你不需要实现，请在导航器窗格中选择`Atom+Helper.m`文件，然后从\
    \ Xcode 的 Edit 菜单中选择`Delete`来删除它。接下来，在`Atom+Helper.h`头文件中，按代码清单 3-13 所示更新类别接口。\n\
    \n*代码清单 3-13.* 原子辅助类别接口\n\n```\n#import \"Atom.h\"\n\n@interface Atom (Helper)\n\
    \n- (NSString *) factoid;\n\n@end\n```\n\n在代码清单 3-13 中，`factoid`方法已被添加到类别接口中。由于`Hydrogen`类是`Atom`类的子类，编译器现在会看到`factoid`方法，从而解决了错误。`main.m`文件应该在其导入列表中包含`Atom`辅助类别接口（见代码清单\
    \ 3-14）。\n\n*代码清单 3-14.* `main()`函数的导入语句\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Atom.h\"\n#import \"Atom+Nuclear.h\"\n#import \"Atom+Helper.h\"\n#import\
    \ \"Hydrogen.h\"\n\nint main(int argc, const char * argv[])\n{\n  ...\n}\n```\n\
    \n如果你编译并运行该项目，输出应如图 3-6 所示。\n\n![9781430250500_Fig03-06.jpg](img/9781430250500_Fig03-06.jpg)\n\
    \n图 3-6 带消息转发测试的氢类\n\n## 总结\n\n本章探讨了 Objective-C 对象创建、初始化和消息传递的概念及细节。以下是关键要点：\n\
    \n*   `NSObject`的`alloc`方法用于为对象分配内存，并将其实例变量初始化为零。该方法返回接收类类型（也称为“相关结果类型”）的实例对象。\n\
    *   `NSObject`提供了一个`init`方法，作为对象初始化的基础。你的类应该重写此方法以提供所需的任何自定义初始化行为。通常，实例分配和初始化通过一行代码完成：`[[ClassName\
    \ alloc] init]`。\n*   初始化方法的实现应确保对对象执行一系列初始化操作，沿着其继承链一直追溯到层次结构中的根对象。\n*   Objective-C\
    \ 消息传递支持 OOP 类型多态，即不同的接收者可以对同一方法有不同的实现。此外，接收者的类型是在运行时确定的。因此，不同的接收者可以对相同的消息做出不同的响应。\n\
    *   Objective-C 消息转发使对象在接收到未映射到其方法集的消息时能够执行用户定义的处理。消息转发可用于提供通常与 OOP 多重继承相关的许多功能。\n\
    *   Objective-C 提供了两种类型的消息转发：快速转发和普通（完整）转发。两者都是通过重写相应的`NSObject`实例方法以及实现任何必需的辅助类来完成的。\n\
    \n在最后两章中，你学习了使用 Objective-C 开发类的方方面面：类的设计和实现、对象的创建和初始化，以及对象的交互。事实上，为什么不花点时间回顾一下到目前为止你学到的内容呢？现在是复习示例程序并动手修改它们以更好地感受这门语言的好时机。很快（准确地说，是在下一章），你将探索\
    \ Objective-C 编程的另一个关键主题：内存管理。\n\n## 第 4 章：内存管理\n\n到目前为止，你已经学习了如何开发类以及创建和初始化对象。现在是研究\
    \ Objective-C 内存管理细节的好时机。正确的内存管理是开发既正确又高效的程序的关键。在本章中，你将了解计算机内存是如何为 Objective-C\
    \ 程序分配和释放的、Objective-C 内存模型，以及如何编写正确执行内存管理的程序。\n\n程序的整体质量通常与其管理系统资源的能力直接相关。计算机操作系统会为程序执行分配有限的主内存量，如果程序尝试使用的内存超过操作系统分配的量，它将无法正常运行。因此，程序应只使用所需的内存，既不分配不使用的内存，也不尝试使用不再可用的内存。Objective-C\
    \ 语言和运行时提供了支持应用程序内存管理的机制，以符合这些目标。\n\n### 程序内存使用\n\n为了更好地理解内存管理的作用，你需要了解程序是如何在计算机内存中存储和使用的。一个可执行的\
    \ Objective-C 程序由（可执行）代码、已初始化和未初始化的程序数据、链接信息、重定位信息、局部数据和动态数据组成。程序数据包括静态声明的变量和程序字面量（例如，在编译期间在代码中设置的常量值）。\n\
    \n可执行代码和程序数据，以及链接和重定位信息，是静态分配在内存中的，并在程序的整个生命周期中持续存在。\n"
- fmt: "# Objective-C Memory Management\n\n## Local (Automatic) Data\n\nLocal (i.e.,\
    \ automatic) data consists of data whose scope is delimited by the statement block\
    \ within which it is declared and is not retained after the block has been executed.\
    \ Syntactically, an Objective-C *compound statement block* is a collection of\
    \ statements delimited by braces (as shown in [Listing 4-1](#9781430250500_Ch04.xhtml#list1)).\n\
    \n[*Listing 4-1.*](#9781430250500_Ch04.xhtml#_list1) Example Statement Block\n\
    \n```\n{\n  int myInt = 1;\n  float myFloat = 5.0f;\n  NSLog(@\"Float = %f, integer\
    \ =  %d\", myFloat, myInt);\n}\n```\n\nThe example in [Listing 4-1](#9781430250500_Ch04.xhtml#list1)\
    \ includes two local variables, `myInt` and `myFloat`, which exist within this\
    \ statement block and are not retained after the block has been executed. Automatic\
    \ data resides in the program *stack*, a block of memory whose size is usually\
    \ set prior to program/thread execution. The stack is used to store local variables\
    \ and context data for method/function invocation. This context data consists\
    \ of method input parameters, return values, and the return address where the\
    \ program should continue execution after the method completes. The operating\
    \ system automatically manages this memory; it is allocated on the stack for and\
    \ subsequently deallocated at the end of the scope where it was declared.\n\n\
    ## Heap Memory and Dynamic Objects\n\nAt runtime, an Objective-C program creates\
    \ objects (via the `NSObject alloc` method, as discussed in [Chapter 3](#9781430250500_Ch03.xhtml))\
    \ stored in dynamically allocated memory referred to as the program *heap*. Dynamic\
    \ object creation implies the need for memory management, because objects created\
    \ on the heap never go out of scope.\n\nA diagram depicting the allocation and\
    \ usage of memory during program execution is shown in [Figure 4-1](#9781430250500_Ch04.xhtml#Fig1).\n\
    \n![9781430250500_Fig04-01.jpg](images/9781430250500_Fig04-01.jpg)\n\n[Figure\
    \ 4-1](#9781430250500_Ch04.xhtml#_Fig1). Objective-C program memory usage\n\n\
    The memory allocated for the program code is set at compilation time and, hence,\
    \ accounted for in the overall amount of system memory used. The memory allocated\
    \ on the program stack (usually) has a maximum size determined at program startup,\
    \ and is automatically managed by the O/S. On the other hand, Objective-C objects\
    \ are dynamically created during program execution and are not automatically reclaimed\
    \ by the O/S. Thus, Objective-C programs require memory management to ensure proper\
    \ utilization of system memory. Typical results of no or incorrect program memory\
    \ management include the following:\n\n- **Memory leaks**: These are caused when\
    \ a program does not free unused objects. If a program allocates memory that it\
    \ doesn’t use, memory resources are wasted; if it continually allocates memory\
    \ without releasing it, the program will eventually run out of memory.\n- **Dangling\
    \ pointers**: These are caused when a program frees objects still being used.\
    \ This condition results in a dangling pointer; if the program attempts to access\
    \ these objects later, a program error will result.\n\n## Objective-C Memory Model\n\
    \nObjective-C memory management is implemented using reference counting, a technique\
    \ whereby unique references to an object are used to determine whether or not\
    \ an object is still in use. If an object’s reference count drops to zero, it\
    \ is considered no longer in use and its memory will be deallocated by the runtime\
    \ system.\n\nThe Apple Objective-C development environment (for both the OS X\
    \ and iOS platforms) provides two mechanisms that can be used for memory management:\
    \ Manual Retain-Release and Automatic Reference Counting. In the next few paragraphs,\
    \ you’ll learn how these work and you’ll develop a few programs to become familiar\
    \ with their usage.\n\n## Implementing Manual Retain-Release\n\n*Manual Retain-Release\
    \ (MRR)* is a memory-management mechanism based on the concept of object ownership:\
    \ as long as there are one or more owners of an object, it will not be deallocated\
    \ by the Objective-C runtime. You write your code to explicitly manage the life\
    \ cycle of objects, obtaining an ownership interest in objects that you create/need\
    \ to use, and releasing that ownership interest when you no longer need the object(s).\
    \ To see how this is applied, first you need to understand how objects are accessed\
    \ and used, and the difference between object access and ownership.\n\n### Object\
    \ Reference and Object Ownership\n\nAn Objective-C object is accessed by *indirection*\
    \ through a variable that points to the memory address of the Objective-C object.\
    \ This variable, also called a *pointer*, is declared by prefixing its name with\
    \ an asterisk. The following statement\n\n```\nHydrogen *atom;\n```\n\ndeclares\
    \ a pointer variable named `atom` that points to an object of type `Hydrogen`.\
    \ Note that pointers and indirection can be used for any Objective-C data type,\
    \ including primitives and C data types; however, object pointers are used specifically\
    \ for interacting with Objective-C objects.\n\nAn *object pointer* enables access\
    \ to an Objective-C object, but does not by itself manage ownership. Look at the\
    \ following code:\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen *href\
    \ = atom;\n```\n\nThe pointer `href` is declared and assigned to a `Hydrogen`\
    \ object named `atom`, but `href` does not (by assignment) claim an ownership\
    \ interest in this object. Hence, if `atom` is deallocated, `href` will no longer\
    \ point to a valid object. Thus, to manage the life cycle (i.e., the existence)\
    \ of an object using MRR, your code must observe a set of memory management rules.\
    \ You’ll look at these next.\n\n### Basic Memory Management Rules\n\nTo use MRR\
    \ correctly, your code needs to balance ownership claims on an object with those\
    \ releasing ownership claims on the object. In order to support this requirement,\
    \ you should write your code observing the MRR basic memory-management rules,\
    \ as follows:\n\n- **Claim ownership interest in any object that you create.**\
    \ You create an Objective-C object with a method whose name begins with `alloc`,\
    \ `new`, `copy`, or `mutableCopy`. You also dynamically create an Objective-C\
    \ block object by sending the `copy` message to the block.\n- **Take ownership\
    \ interest in an object (that you don’t already own) using the `retain` method.**\
    \ `NSObject` implements a `retain` method that is used to take ownership interest\
    \ in an object. Under normal circumstances, an object is guaranteed to remain\
    \ valid both within the method it is received (as a parameter), and as a return\
    \ value. The `retain` method is used to take ownership of an object that you want\
    \ to use over a long period of time, typically to store it as a property value,\
    \ or to prevent it from being deallocated as a side effect of some other operation.\n\
    - **You must relinquish ownership of objects you own when no longer needed.**\
    \ `NSObject` implements the `release` and `autorelease` methods that are used\
    \ to relinquish ownership interest in an object. The `autorelease` method relinquishes\
    \ ownership interest of an object at the end of the current autorelease block.\
    \ The `release` method immediately relinquishes ownership interest in an object.\
    \ Both methods send the `dealloc` method on an object if its retain count equals\
    \ zero.\n- **You must not relinquish ownership of objects you do not own.** This\
    \ could cause such objects to be released prematurely. If a program attempts to\
    \ access an object that has already been deallocated, it will cause an error.\n\
    \n[Listing 4-2](#9781430250500_Ch04.xhtml#list2) shows an example that illustrates\
    \ application of the MRR basic memory-management rules.\n\n[*Listing 4-2.*](#9781430250500_Ch04.xhtml#_list2)\
    \ MRR Example Usage\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen *href\
    \ = [atom retain];\n...\n[atom release];\n...\n[href release];\n```"
  raw: 'Local (i.e., automatic) data consists of data whose scope is delimited by
    the statement block within which it is declared and is not retained after the
    block has been executed. Syntactically, an Objective-C *compound statement block*
    is a collection of statements delimited by braces (as shown in [Listing 4-1](#9781430250500_Ch04.xhtml#list1)).


    [*Listing 4-1.*](#9781430250500_Ch04.xhtml#_list1)  Example Statement Block


    ```

    {

      int myInt = 1;

      float myFloat = 5.0f;

      NSLog(@"Float = %f, integer =  %d", myFloat, myInt);

    }

    ```


    The example in [Listing 4-1](#9781430250500_Ch04.xhtml#list1) includes two local
    variables, `myInt` and `myFloat`, which exist within this statement block and
    are not retained after the block has been executed. Automatic data resides in
    the program *stack*, a block of memory whose size is usually set prior to program/thread
    execution. The stack is used to store local variables and context data for method/function
    invocation. This context data consists of method input parameters, return values,
    and the return address where the program should continue execution after the method
    completes. The operating system automatically manages this memory; it is allocated
    on the stack for and subsequently deallocated at the end of the scope where it
    was declared.


    At runtime, an Objective-C program creates objects (via the `NSObject alloc` method,
    as discussed in [Chapter 3](#9781430250500_Ch03.xhtml)) stored in dynamically
    allocated memory referred to as the program *heap*. Dynamic object creation implies
    the need for memory management, because objects created on the heap never go out
    of scope.


    A diagram depicting the allocation and usage of memory during program execution
    is shown in [Figure 4-1](#9781430250500_Ch04.xhtml#Fig1).


    ![9781430250500_Fig04-01.jpg](images/9781430250500_Fig04-01.jpg)


    [Figure 4-1](#9781430250500_Ch04.xhtml#_Fig1). Objective-C program memory usage


    The memory allocated for the program code is set at compilation time and, hence,
    accounted for in the overall amount of system memory used. The memory allocated
    on the program stack (usually) has a maximum size determined at program startup,
    and is automatically managed by the O/S. On the other hand, Objective-C objects
    are dynamically created during program execution and are not automatically reclaimed
    by the O/S. Thus, Objective-C programs require memory management to ensure proper
    utilization of system memory. Typical results of no or incorrect program memory
    management include the following:


    *   *Memory leaks*: These are caused when a program does not free unused objects.
    If a program allocates memory that it doesn’t use, memory resources are wasted;
    if it continually allocates memory without releasing it, the program will eventually
    run out of memory.

    *   *Dangling pointers*: These are caused when a program frees objects still being
    used. This condition results in a dangling pointer; if the program attempts to
    access these objects later, a program error will result.


    Objective-C Memory Model


    Objective-C memory management is implemented using reference counting, a technique
    whereby unique references to an object are used to determine whether or not an
    object is still in use. If an object’s reference count drops to zero, it is considered
    no longer in use and its memory will be deallocated by the runtime system.


    The Apple Objective-C development environment (for both the OS X and iOS platforms)
    provides two mechanisms that can be used for memory management: Manual Retain-Release
    and Automatic Reference Counting. In the next few paragraphs, you’ll learn how
    these work and you’ll develop a few programs to become familiar with their usage.


    Implementing Manual Retain-Release


    *Manual Retain-Release (MRR)* is a memory-management mechanism based on the concept
    of object ownership: as long as there are one or more owners of an object, it
    will not be deallocated by the Objective-C runtime. You write your code to explicitly
    manage the life cycle of objects, obtaining an ownership interest in objects that
    you create/need to use, and releasing that ownership interest when you no longer
    need the object(s). To see how this is applied, first you need to understand how
    objects are accessed and used, and the difference between object access and ownership.


    Object Reference and Object Ownership


    An Objective-C object is accessed by *indirection* through a variable that points
    to the memory address of the Objective-C object. This variable, also called a
    *pointer*, is declared by prefixing its name with an asterisk. The following statement


    ```

    Hydrogen *atom;

    ```


    declares a pointer variable named `atom` that points to an object of type `Hydrogen`.
    Note that pointers and indirection can be used for any Objective-C data type,
    including primitives and C data types; however, object pointers are used specifically
    for interacting with Objective-C objects.


    An *object pointer* enables access to an Objective-C object, but does not by itself
    manage ownership. Look at the following code:


    ```

    Hydrogen *atom = [Hydrogen init];

    ...

    Hydrogen *href = atom;

    ```


    The pointer `href` is declared and assigned to a `Hydrogen` object named `atom`,
    but `href` does not (by assignment) claim an ownership interest in this object.
    Hence, if `atom` is deallocated, `href` will no longer point to a valid object.
    Thus, to manage the life cycle (i.e., the existence) of an object using MRR, your
    code must observe a set of memory management rules. You’ll look at these next.


    Basic Memory Management Rules


    To use MRR correctly, your code needs to balance ownership claims on an object
    with those releasing ownership claims on the object. In order to support this
    requirement, you should write your code observing the MRR basic memory-management
    rules, as follows:


    *   *Claim ownership* *interest in any object that you create.* You create an
    Objective-C object with a method whose name begins with `alloc`, `new`, `copy`,
    or `mutableCopy`. You also dynamically create an Objective-C block object by sending
    the `copy` message to the block.

    *   *Take ownership* *interest in an object (that you don’t already own) using
    the* `retain` *method*. `NSObject` implements a `retain` method that is used to
    take ownership interest in an object. Under normal circumstances, an object is
    guaranteed to remain valid both within the method it is received (as a parameter),
    and as a return value. The `retain` method is used to take ownership of an object
    that you want to use over a long period of time, typically to store it as a property
    value, or to prevent it from being deallocated as a side effect of some other
    operation.

    *   *You must relinquish ownership* *of objects you own when no longer needed.*
    `NSObject` implements the `release` and `autorelease` methods that are used to
    relinquish ownership interest in an object. The `autorelease` method relinquishes
    ownership interest of an object at the end of the current autorelease block. The
    `release` method immediately relinquishes ownership interest in an object. Both
    methods send the `dealloc` method on an object if its retain count equals zero.

    *   *You must not relinquish ownership of objects you do not own*. This could
    cause such objects to be released prematurely. If a program attempts to access
    an object that has already been deallocated, it will cause an error.


    [Listing 4-2](#9781430250500_Ch04.xhtml#list2) shows an example that illustrates
    application of the MRR basic memory-management rules.


    [*Listing 4-2.*](#9781430250500_Ch04.xhtml#_list2)  MRR Example Usage


    ```

    Hydrogen *atom = [Hydrogen init];

    ...

    Hydrogen *href = [atom retain];

    ...

    [atom release];

    ...

    [href release];

    ```'
  trans: "\n# Objective-C 内存管理\n\n## 局部（自动）数据\n\n局部（即自动）数据是指其作用域限定在声明它的语句块内的数据，并且在块执行完毕后不会被保留。从语法上讲，Objective-C\
    \ 的*复合语句块*是用花括号分隔的一系列语句的集合（如代码清单 4-1 所示）。\n\n*代码清单 4-1.* 示例语句块\n\n```\n{\n  int\
    \ myInt = 1;\n  float myFloat = 5.0f;\n  NSLog(@\"浮点数 = %f, 整数 = %d\", myFloat,\
    \ myInt);\n}\n```\n\n代码清单 4-1 中的示例包含两个局部变量 `myInt` 和 `myFloat`，它们存在于该语句块内，并在块执行完毕后不会被保留。自动数据位于程序的*栈*中，这是一块内存，其大小通常在程序/线程执行前设定。栈用于存储局部变量以及方法/函数调用的上下文数据。该上下文数据包括方法输入参数、返回值以及方法执行完毕后程序应继续执行的返回地址。操作系统会自动管理这块内存；它在声明变量的作用域内被分配在栈上，并在该作用域结束时自动释放。\n\
    \n## 堆内存与动态对象\n\n在运行时，Objective-C 程序会创建存储在动态分配内存中的对象（通过 `NSObject alloc` 方法，如第\
    \ 3 章所述），这部分内存被称为程序*堆*。动态对象创建意味着需要进行内存管理，因为在堆上创建的对象永远不会超出作用域。\n\n图 4-1 展示了一张描述程序执行期间内存分配与使用情况的示意图。\n\
    \n![9781430250500_Fig04-01.jpg](img/9781430250500_Fig04-01.jpg)\n\n图 4-1. Objective-C\
    \ 程序内存使用情况\n\n为程序代码分配的内存在编译时设定，因此会被计入系统使用的总内存量中。分配在程序栈上的内存（通常）具有在程序启动时确定的最大大小，并由操作系统自动管理。另一方面，Objective-C\
    \ 对象在程序执行期间动态创建，并且不会由操作系统自动回收。因此，Objective-C 程序需要进行内存管理，以确保系统内存的正确使用。内存管理不当或缺失的典型后果包括以下方面：\n\
    \n- **内存泄漏**：当程序未释放不再使用的对象时导致。如果程序分配了内存却不使用，就会浪费内存资源；如果程序持续分配内存而不释放，最终将会耗尽内存。\n\
    - **野指针**：当程序释放了仍在使用的对象时导致。这种情况会产生野指针；如果程序后续尝试访问这些对象，将会导致程序错误。\n\n## Objective-C\
    \ 内存模型\n\nObjective-C 的内存管理通过引用计数实现，这是一种利用对象的唯一引用计数来确定对象是否仍在使用的技术。如果对象的引用计数降为零，则认为它不再被使用，运行时系统将释放其内存。\n\
    \n苹果的 Objective-C 开发环境（适用于 OS X 和 iOS 平台）提供了两种可用于内存管理的机制：手动保留释放（MRR）和自动引用计数（ARC）。在接下来的几段内容中，你将了解它们的工作原理，并编写几个程序来熟悉其用法。\n\
    \n## 实现手动保留释放\n\n*手动保留释放（MRR）*是一种基于对象所有权概念的内存管理机制：只要一个对象存在一个或多个所有者，它就不会被 Objective-C\
    \ 运行时释放。你需要编写代码来显式管理对象的生命周期，对你创建或需要使用的对象声明所有权，并在不再需要这些对象时释放所有权。要了解如何应用这一点，首先需要理解对象的访问与使用方式，以及对象访问与所有权的区别。\n\
    \n### 对象引用与对象所有权\n\nObjective-C 对象通过指向对象内存地址的变量进行*间接*访问。这种变量也称为*指针*，通过在变量名前加星号来声明。以下语句\n\
    \n```\nHydrogen *atom;\n```\n\n声明了一个名为 `atom` 的指针变量，它指向一个类型为 `Hydrogen` 的对象。请注意，指针和间接访问可用于任何\
    \ Objective-C 数据类型，包括基本类型和 C 数据类型；但对象指针专门用于与 Objective-C 对象交互。\n\n*对象指针*允许访问 Objective-C\
    \ 对象，但本身并不管理所有权。请看以下代码：\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen\
    \ *href = atom;\n```\n\n指针 `href` 被声明并赋值给名为 `atom` 的 `Hydrogen` 对象，但 `href`（通过赋值的方式）并未对该对象主张所有权。因此，如果\
    \ `atom` 被释放，`href` 将不再指向一个有效的对象。因此，要使用 MRR 管理对象的生命周期（即对象的存续），你的代码必须遵守一组内存管理规则。接下来你将看到这些规则。\n\
    \n### 基本内存管理规则\n\n要正确使用 MRR，你的代码需要在对象的所有权声明与所有权释放声明之间保持平衡。为了满足这一要求，你应该编写代码遵守以下\
    \ MRR 基本内存管理规则：\n\n- **对你创建的任何对象主张所有权。** 你通过名称以 `alloc`、`new`、`copy` 或 `mutableCopy`\
    \ 开头的方法创建 Objective-C 对象。你也可以通过向块发送 `copy` 消息来动态创建 Objective-C 块对象。\n- **使用 `retain`\
    \ 方法对你尚未拥有的对象主张所有权。** `NSObject` 实现了一个 `retain` 方法，用于对对象主张所有权。在正常情况下，可以保证一个对象在其被接收的方法（作为参数）内以及作为返回值时都是有效的。`retain`\
    \ 方法用于对你想要长期使用的对象主张所有权，通常是为了将其存储为属性值，或防止它因其他操作的副作用而被释放。\n- **当你不再需要拥有的对象时，必须释放其所有权。**\
    \ `NSObject` 实现了 `release` 和 `autorelease` 方法，用于释放对对象的所有权。`autorelease` 方法会在当前自动释放块结束时释放对象的所有权。`release`\
    \ 方法会立即释放对对象的所有权。如果对象的引用计数为零，这两种方法都会对对象发送 `dealloc` 消息。\n- **你绝不能释放你不拥有的对象的所有权。**\
    \ 这可能导致这些对象被过早释放。如果程序尝试访问一个已被释放的对象，将导致错误。\n\n代码清单 4-2 展示了一个说明 MRR 基本内存管理规则应用的示例。\n\
    \n*代码清单 4-2.* MRR 使用示例\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen\
    \ *href = [atom retain];\n...\n[atom release];\n...\n[href release];\n```\n"
- fmt: "一个`Hydrogen`对象被创建并赋值给一个名为`atom`的变量。由于该对象是通过`alloc`消息创建的，`atom`拥有对该对象的所有权。在后续代码中，一个名为`href`的变量也获得了对该对象的所有权，从而增加了对象的保留计数（即所有权数量）。随后，向`atom`变量发送了`release`消息。由于`href`仍然持有该对象的所有权，因此对象不会被释放。当`href`向对象发送`release`消息后，其保留计数降至零，运行时便会将其释放。\n\
    \n## 释放内存\n\n当对象的保留计数降为零时，运行时通过`NSObject dealloc`方法释放其占用的内存。该方法也为您的子类提供了一个框架，用于放弃其拥有的任何对象的所有权。您的每个类（通常继承自`NSObject`）都应重写`dealloc`方法，调用其拥有所有权的每个对象的`release`方法，然后再调用其父类的`dealloc`方法。这种方法使得每个类都能在其整个类层次结构中适当地放弃对其拥有所有权的任何对象，如图\
    \ [4-2](#9781430250500_Ch04.xhtml#Fig2) 所示。\n\n![9781430250500_Fig04-02.jpg](images/9781430250500_Fig04-02.jpg)\n\
    \n[图 4-2](#9781430250500_Ch04.xhtml#_Fig2) dealloc 方法实现\n\n## 通过自动释放实现延迟释放\n\n\
    `NSObject`提供了一个`autorelease`方法，用于在自动释放池块结束时对对象调用`release`方法。*自动释放池块*提供了一种机制，允许您在未来的某个时间点放弃对象的所有权，从而避免显式调用对象的`release`方法，并防止其立即被释放。自动释放池块使用`@autorelease`指令定义，如\
    \ [列表 4-3](#9781430250500_Ch04.xhtml#list3) 所示。\n\n[*列表 4-3*](#9781430250500_Ch04.xhtml#_list3)\
    \ 自动释放池块语法\n\n```\n@autorelease\n{\n  // 创建自动释放对象的代码\n  ...\n}\n```\n\n自动释放的对象应始终在自动释放池块内编码，否则它们将不会收到`release`消息，从而导致内存泄漏。用于创建\
    \ iOS 和 Mac OS X 应用的 Apple UI 框架（特别是 AppKit 和 UIKit）会自动提供自动释放池块；因此，通常仅在以下情况才需要手动编码自动释放池块：\n\
    \n*   您编写的程序不基于 UI 框架，例如命令行工具。\n*   您的实现逻辑包含一个创建许多临时对象的循环。为了降低应用程序的最大内存占用，您可以在循环内使用自动释放池块，在下一次迭代之前释放这些对象。\n\
    *   您的应用程序生成了一个或多个辅助线程。在线程开始执行时，您必须立即创建自己的自动释放池块；否则，您的应用程序将发生内存泄漏。\n\n在 [列表 4-4](#9781430250500_Ch04.xhtml#list4)\
    \ 所示的示例中，自动释放池块包围了`main()`函数内的所有代码，并且通过`autorelease`消息动态分配了一个对象。\n\n[*列表 4-4*](#9781430250500_Ch04.xhtml#_list4)\
    \ 带自动释放池块的命令行程序\n\n```\nint main(int argc, const char * argv[])\n{\n  @autorelease\n\
    \  {\n    Hydrogen *atom = [[[Hydrogen alloc] init] autorelease];\n    ...\n \
    \ }\n  return 0;\n}\n```\n\n请注意，`autorelease`消息通常在一个组合语句中，于对象创建并初始化后立即发送。这种设计确保使用`autorelease`创建的任何对象都将在自动释放池块结束时、程序结束前被释放。\n\
    \n## 使用 MRR\n\n现在您已经学习了 Objective-C 内存管理和 MRR，可以开始通过开发一个示例程序来应用所学知识了！这个示例将演示 MRR\
    \ 基本内存管理规则的应用以及相应 API 的使用。简要来说，该程序包含三个类：用于记录产品订单的`OrderEntry`类，以及依赖类`OrderItem`和`Address`。`OrderItem`类封装了订单条目的特定状态和行为，而`Address`类则包含与订单发货地址相关的状态和行为。每个`OrderEntry`对象都对应一个`OrderItem`对象和一个`Address`对象（如图\
    \ [4-3](#9781430250500_Ch04.xhtml#Fig3) 所示）。\n\n![9781430250500_Fig04-03.jpg](images/9781430250500_Fig04-03.jpg)\n\
    \n[图 4-3](#9781430250500_Ch04.xhtml#_Fig3) 订单条目类\n\n您将使用 MRR 内存管理来开发这些类，然后进行测试以证明该内存管理技术的正确使用。在\
    \ Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](images/arrow.jpg) 项目...** 来创建一个新项目。在新建项目助手面板中，创建一个命令行应用程序（从\
    \ Mac OS X 应用程序选择中选择 **命令行工具**），然后点击 **下一步**。在项目选项窗口中，指定产品名称为 `MRR Orders`，将类型设置为\
    \ `Foundation`，通过取消选中 **使用自动引用计数** 复选框（如图 [4-4](#9781430250500_Ch04.xhtml#Fig4)\
    \ 所示）来选择 MRR 内存管理，然后点击 **下一步**。\n\n![9781430250500_Fig04-04.jpg](images/9781430250500_Fig04-04.jpg)\n\
    \n[图 4-4](#9781430250500_Ch04.xhtml#_Fig4) 创建一个 MRR 订单条目项目\n\n在文件系统中指定您希望创建项目的位置（如有需要，选择\
    \ **新建文件夹** 并输入文件夹的名称和位置），取消选中 **源代码控制** 复选框，然后点击 **创建** 按钮。\n\n现在让我们添加`OrderEntry`、`OrderItem`和`Address`类。按照之前章节的做法，通过选择\
    \ **新建 ![image](images/arrow.jpg) 文件...** 从 Xcode 文件菜单中，选择 Objective-C 类模板，适当地命名该类（每个类都是`NSObject`的子类），然后选择\
    \ `MRR Orders` 文件夹作为文件位置，并将 `MRR Orders` 项目作为目标，将每个类添加到项目中。\n\n您项目现在包含三个类的文件以及`main.m`文件。接下来，让我们实现`Address`类。您不会向该类添加任何实例变量、属性或方法，因此无需编辑\
    \ `Address` 接口。但是，您需要通过重写其父类（`NSObject`）提供的默认`init`和`dealloc`方法来编辑`Address`的实现。在导航器面板中选择**Address.m**文件，然后添加\
    \ [列表 4-5](#9781430250500_Ch04.xhtml#list5) 中所示的代码。\n\n[*列表 4-5*](#9781430250500_Ch04.xhtml#_list5)\
    \ MRR Address 类实现\n\n```\n#import \"Address.h\"\n\n@implementation Address\n-\
    \ (id) init\n{\n  if ((self = [super init]))\n  {\n    NSLog(@\"Initializing Address\
    \ object\");\n  }\n  return self;\n}\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating\
    \ Address object\");\n  [super dealloc];\n}\n@end\n```\n\n如 [列表 4-5](#9781430250500_Ch04.xhtml#list5)\
    \ 所示，`init`和`dealloc`方法都会在控制台记录一条消息以显示方法的进入。当您测试程序时，这使您能够看到运行时何时调用这些方法。此外，`dealloc`方法调用其父类的`dealloc`，从而确保对象的内存被回收。好了，`Address`类已经完成；现在让我们实现`OrderItem`类。\n\
