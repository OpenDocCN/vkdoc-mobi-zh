    reusable libraries that expose public APIs.

    *   `Optimizers`: The LLVM optimizers perform code optimization, traversing some
    portion of code to either collect information or perform transformations. Their
    features include compile-time optimization, link-time optimization, and optimization
    across language boundaries.

    *   `Code generator`: The LLVM target-independent code generator is a framework
    that provides a suite of reusable components for translating the LLVM internal
    representation to the machine code for a specified target—either in assembly form
    (suitable for a static compiler) or in binary machine code form (usable for a
    JIT compiler).

    *   `Disassembler`: The disassembler takes an LLVM bitcode file and converts it
    into human-readable LLVM assembly language.

    *   `JIT`: The LLVM Just-in-Time (JIT) compiler performs runtime translation of
    LLVM IR code into machine code. It also performs runtime optimization based on
    dynamic information.


    As depicted in [Figure C-1](#9781430250500_AppC.xhtml#Fig1), a few of the tools
    that have been built using the LLVM project components include the LLVM compiler
    (the standard compiler for Xcode), the static analyzer (also used by Xcode), and
    the LLDB debugger. Xcode’s integration with LLVM components and tools provides
    many benefits in addition to Objective-C source code compilation. These benefits
    include real-time notification of warnings and errors as you type your code, suggested
    corrections for coding mistakes, improved code completion, source code static
    analysis, and comprehensive support for program debugging with LLDB, the default
    debugger for Xcode.


    ## LLDB


    LLDB is a modern, high-performance debugger for the C, C++, and Objective-C programming
    languages. It is built as a set of reusable components that leverage existing
    components and libraries of the LLVM Project (Clang compiler, JIT, disassembler,
    etc.). LLDB provides up-to-date C, C++, and Objective-C language support, support
    for expressions that can declare local variables and types, just-in-time compilation
    of expressions for improved performance, and a public API that enables LLDB to
    be used for other purposes (disassembly, object and symbol file introspection,
    etc.) in addition to debugging. The entire LLDB API is also available as Python
    functions through a script-bridging interface. This means the LLDB API’s can be
    used directly from Python or, alternatively, Python can be used within the LLDB
    command-line tool. LLDB can be run standalone via its command-line tool or directly
    within Xcode.


    ## Design


    LLDB was developed using object-oriented design practices, including data encapsulation
    (no global variables) and a plug-in based architecture that facilitates modularity
    and extensibility. The next few paragraphs provide an overview of the libraries
    that comprise LLDB and examine in more detail a few of its significant design
    elements.


    ### Libraries


    LLDB is designed as a collection of libraries that are logically grouped, as follows:


    *   `API`: The LLDB public interface, currently written in C++. This API enables
    LLDB to be reused by other programs. It is also used by the LLDB command-line
    tool.

    *   `Breakpoint`: A collection of classes that implement debugging breakpoints.
    LLDB supports line breakpoints, symbolic breakpoints, and exception breakpoints.
    Exception breakpoints are hit anytime an exception is thrown or caught. Symbolic
    breakpoints cause program execution to pause when a symbol name (e.g., a method
    invocation or function call) is encountered.

    *   `Commands`: A collection of classes that implement the functionality for the
    textual commands of the LLDB command-line tool.

    *   `Core`: Classes that implement basic functionality required by LLDB.

    *   `Data formatters`: A collection of classes that implement the data formatters
    for LLDB. These are used to define custom display options for debugging variables.

    *   `Expressions`: These classes are used to perform expression parsing. They
    can evaluate DWARF expressions up to programming language (e.g., Objective-C)
    expressions using the Clang compiler front end. DWARF is a general-purpose debugging
    file format used to support source-level debugging. DWARF expressions describe
    how to compute a value or how to name a location during the debugging of a program.
    The expression classes enable a variety of features, including multiline expressions,
    local variable support, flow control, and persistent expression global variables.

    *   `Host`: A set of classes that provide an abstraction from the host on which
    LLDB is running (system functions, etc.).

    *   `Interpreter`: A collection of classes responsible for being the base classes
    needed for each command object. It is responsible for tracking and running command-line
    commands.

    *   `Symbol`: Classes that provide everything needed in order to parse object
    files and debug symbols. All the needed classes for compilation units (code and
    debug info for a source file), functions, lexical blocks within functions, inlined
    functions, types, declaration locations, and variables are in this section.

    *   `Target`: A set of classes that encapsulate data for a debug target (target,
    process, thread, stack frames, etc.).

    *   `Utility`: LLDB utility classes (string data extractors, etc.).


    ### Expression Parsing


    One of the most important features of a debugger is its ability to display the
    values of objects from the target program, also referred to as *expression evaluation*.
    Hence, a debugger’s expression evaluation capabilities are a key element of its
    design and implementation. Most debuggers implement a custom expression parser,
    and thus also create custom type representations used by the parser. As a consequence,
    changes to these type representations (e.g., as a result of programming language
    changes) requires changes to the parser. In addition, the expression parser aims
    for compiler-level accuracy. This level of accuracy is extremely difficult (if
    not impossible) to achieve, and also makes it difficult for the debugger to remain
    current with changes to the language and/or compiler. These factors, among others,
    make it difficult to write and maintain a debugger.


    LLDB mitigates these issues by utilizing the LLVM Clang compiler front end; specifically,
    it converts debugging information into Clang data types. This enables LLDB to
    use Clang to parse command expressions and thus directly support the latest C,
    C++, Objective C, and Objective C++ language features and runtimes. Debugger error
    reporting is improved because it is identical to that provided by the compiler.
    LLDB also leverages the compiler for other functionalities, including making function
    calls within expressions and disassembling instructions.


    ### Plug-in Architecture'
