    # 输出面板


    输出面板会适当地显示初始寄存器设置、检索到的字节以及更新后的寄存器设置（包含新的字节值）。尝试使用不同的输入来运行程序，观察其运行方式，一旦你熟悉了自定义下标，可以随意添加其他功能来增强它。酷。做得好，你已经走到这一步了！这个程序演示了
    Objective-C 字面量和对象下标的使用。


    ## 总结


    在本章中，你学习了 Objective-C 字面量，这是 Objective-C 语言的一个较新特性。本章介绍了新的字面量语法，以及用于创建 `NSNumber`、`NSArray`
    和 `NSDictionary` 实例的新对象字面量。还探讨了表达式字面量、对象下标，以及如何使用自定义下标 API 在你的类中扩展对象下标。本章的关键要点包括：


    *   `NSNumber` 字面量提供了一种简单、简洁的表示法，用于从标量字面量表达式创建和初始化 `NSNumber` 对象。可以为任何字符、数值或布尔字面量值创建
    `NSNumber` 字面量。

    *   `NSArray` 字面量简化了 `NSArray` 实例的创建。数组中的对象必须是 Objective-C 对象指针类型。数组字面量可以嵌套，从而可以创建数组中的数组。

    *   `NSDictionary` 字面量简化了 `NSDictionary` 实例的创建。字面量中的每个键必须是符合 `NSCopying` 协议的对象指针类型，每个值也必须是对象指针类型。

    *   对象字面量（`NSNumber`、`NSArray`、`NSDictionary`）在运行时求值；因此，它们不是编译时常量，不能用于初始化静态变量或全局变量。

    *   表达式字面量（即装箱表达式）允许你从括号括起来的表达式创建字面量。该表达式的求值结果是标量（数值、枚举、`BOOL`）或 C 字符串指针类型。结果对象的类型与表达式的类型相对应；标量类型生成
    `NSNumber` 实例，C 字符串则使用 UTF-8 字符编码生成 `NSString` 对象。

    *   对象下标提供了一种简单、简洁的语法，用于获取和设置 Foundation 框架数组和字典（例如 `NSArray` 和 `NSDictionary`）中的元素。此外，下标运算符是通用的，因此任何类都可以实现相应的方法来提供自定义下标。

    *   自定义下标操作应仅用于获取和设置对象的元素，而不应用于其他目的（例如，追加或删除对象等）。这使该语法与 Foundation 框架数组和字典的下标操作保持一致，从而易于使用。


    现在，你应该已经为掌握 Objective-C 对象字面量和对象下标打下了良好基础。请随意复习本章材料，并尝试修改程序和示例，以便深入理解。下一章的主题是并发编程，所以当你准备好时，请翻到下一页开始学习。


    # 第 17 章：并发编程


    在计算机科学中，*并发处理* 指的是在时间上重叠执行的逻辑控制流（通过软件实现）。并发处理可以发生在计算机系统的多个不同层面，从硬件层一直到应用层。从程序员的角度来看，应用层并发使您能够开发并行执行多项操作的应用程序，包括响应异步事件、访问
    I/O 设备、服务网络请求、并行计算等等。


    Objective-C 平台提供了多种语言扩展、API 和操作系统服务，旨在使您能够安全、高效地实现并发编程。在本章中，您将深入探讨这项技术，并通过几个示例程序应用所学知识。


    ## 并发编程基础


    并发编程是一个广泛的领域，包含许多具有不同解释的概念和思想。因此，理解一些基本术语，并了解并发编程的一些好处和设计概念非常重要。


    让我们从区分并发处理和顺序处理开始。基本上，顺序处理指的是顺序执行（即一个接一个）的逻辑控制流，如图 17-1 所示。


    ![9781430250500_Fig17-01.jpg](img/9781430250500_Fig17-01.jpg)


    图 17-1. 控制流的顺序处理


    这与并发处理形成对比，后者指的是可能并行执行的逻辑控制流，如图 17-2 所示。


    ![9781430250500_Fig17-02.jpg](img/9781430250500_Fig17-02.jpg)


    图 17-2. 控制流的并发处理


    所以，并发计算意味着多个任务的同时执行。但实际上，一个旨在利用并发优势的程序是否真的并行执行多个任务，取决于其运行所在的计算机系统。这引出了另一个需要指出的区别，即并发计算和并行计算之间的区别。广义上讲，并发计算是设计上的问题，而并行计算是硬件上的问题。


    *并行计算* 指的是同时执行多个操作或任务的软件。执行并行计算（即并行处理）的能力直接取决于计算机系统的硬件。例如，大多数现代计算机拥有多个核心（CPU）和/或多个处理器。这使它们能够同时执行多条指令。另一方面，并发计算指的是经过设计和实现，能够同时执行多个操作或任务的软件。如果你的软件是使用*并发编程*
    原理和机制设计和实现的，那么其部分或全部组件是否可以并发执行，将取决于底层计算机系统的能力。因此，为了充分利用并发的优势，你必须恰当地设计和实现你的软件，并在支持并行处理的硬件上运行它。


    最后，在继续深入之前，理解并发编程和异步编程之间的区别非常重要。正如我之前定义的，并发处理指的是可能并行执行的多个逻辑控制流。而*异步处理* 实际上是一种用于异步（即非阻塞）调用方法/函数的机制。换句话说，调用者发起方法调用后，可以在方法执行的同时继续进行处理。这种方法可以提高应用程序的响应能力、系统吞吐量等，同时抽象了底层的实现机制。异步处理可以通过多种方式实现，包括使用并发编程
    API 和服务。


    ## 并发的优势

    '
- fmt: '应用级并发处理使您能够开发可并行执行多个操作的程序。然而，这些功能并非没有代价；必须根据底层计算系统的能力，将并发性纳入软件设计和实现中。虽然这在开发程序时听起来可能是一种负担，但并发处理的动机有很多，其中包括以下几点：


    - **提高应用吞吐量**。由于并发处理支持并行执行任务，与顺序处理相比，整体**应用吞吐量**（定义为应用在一段时间内可执行的任务数量）得以提高。

    - **改善系统利用率**。并行执行多个任务能够使系统资源得到更持续且更高效的利用。

    - **提升整体应用响应性**。任务的并发执行使得当一个任务正在等待（输入等）时，其他任务可以继续运行。因此，整体应用空闲时间减少，应用响应性提高。

    - **更好地映射问题域**。某些问题，特别是在科学、数学和人工智能领域，可以建模为一组同时执行的任务。这使得使用并发编程进行解决方案实现（在代码层面）成为更自然、更首选的方法。


    ## 实现并发


    好了，既然您（希望如此）已经信服于并发处理的好处，那么下一个问题是：如何做到这一点？有多种方法可以在计算机系统中实现并发，从专门的编程语言到包括并行化计算机系统在内的高层方案。一些更常见的方法包括：


    - **分布式计算**：在这种并发处理形式中，多个任务被分发到多台通过网络连接并通信的计算机上执行。

    - **并行编程**：在这种并发处理形式中，多个计算同时执行，通常在多核CPU和可编程GPU上。这种方法利用并行计算来提高性能，并提供由计算密集型算法实现的功能。

    - **多进程**：在这种并发处理形式中，多个任务被分发到单台计算机上的多个软件进程中以并发执行。每个进程拥有独立的资源和独立的地址空间，由操作系统管理。

    - **多线程**：也称为**多线程**，在这种方法中，任务被映射到多个配置为并发执行的线程。这些线程在单个程序（即进程）的上下文中执行，因此共享其资源（地址空间、内存等）。


    > **注意**：术语`thread`指代可以独立执行的指令序列。线程有时被称为轻量级进程，多个线程可以共享一个地址空间。而`process`是一个正在运行的计算机程序，拥有自己的地址空间和系统资源分配。一个进程可以拥有多个按顺序、并发或两者组合方式执行的线程。`task`指代一个逻辑工作单元，可以由一个线程或一个进程执行。


    这些方法各有其特定的应用和使用场景。虽然OS X和iOS都在不同程度上支持上述每种并发计算方法，但您在本章中将考察的并发编程机制均基于多线程方法，因此这也是您在这里将探索的内容。


    ## 并发面临的挑战


    尽管有诸多好处，但并发程序的正确实现却相当困难。这主要是由于在并发执行的**控制线程**（即逻辑控制流）之间同步操作和共享信息所带来的挑战。同步用于控制不同线程中操作发生的相对顺序，而信息共享则使线程间能够通信。此外，由于多个控制线程的同时执行，整个程序的执行顺序是非确定性的。因此，同一程序的不同执行可能会产生不同的结果。如此一来，并发程序中的错误可能难以检测和复现。此外，多线程及其潜在交互所引入的复杂性使得这些程序的分析和推理变得更加困难。


    有多种机制用于应对这些挑战；其中较为常见的两种是共享内存和消息传递。共享内存编程模型意味着**共享状态**——即部分程序数据可被多个线程访问。由于程序的线程使用共同的地址空间，共享内存是信息共享的自然机制。它也是快速且高效的。


    ### 共享数据


    共享内存模型需要一种机制来协调线程之间的共享数据访问。这通常使用同步机制实现；例如锁（`lock`）或条件变量（`condition`）。`lock`是一种用于控制多个线程对共享数据或资源访问的机制。一个线程获取对共享资源的锁，执行操作，然后释放锁，从而允许其他线程访问该资源。`condition`变量是一种同步机制，它使线程等待直到指定条件发生。条件变量通常使用锁来实现。


    #### 锁的问题


    锁是用于控制对共享数据访问的最常见机制之一。它们强制执行**互斥**策略，从而防止对受保护数据/资源的并发访问。不幸的是，使用锁来协调对共享数据的访问引入了死锁（`deadlock`）、活锁（`live-lock`）或资源饥饿（`resource
    starvation`）的可能性——这些情况都可能导致程序执行停滞。`deadlock`是一种两个或多个线程各自被阻塞，等待获取由另一个线程占有的资源，从而阻止被阻塞线程完成执行的情况。死锁的一个例子是循环等待。下图`[Figure
    17-3](#9781430250500_Ch17.xhtml#Fig3)`展示了访问共享数据的并发线程之间可能发生的死锁情况。


    ![9781430250500_Fig17-03.jpg](images/9781430250500_Fig17-03.jpg)


    `[Figure 17-3](#9781430250500_Ch17.xhtml#_Fig3)`. 两个访问共享数据的线程之间的死锁情况


    `live-lock`是一种线程因响应另一个（或多个）线程的动作而无法继续执行的情况。处于活锁状态的线程并未被阻塞，它将其全部计算时间用于响应其他线程以恢复正常执行。


    `resource starvation`是一种线程无法获得对共享资源的定期访问的情况，通常是因为该资源正被其他线程占用，导致其无法按预期执行。如果有一个或多个其他线程长时间占用共享资源，就可能发生这种情况。实际上，您可以将活锁视为资源饥饿的一种形式。


    随着您开发更大、更复杂的、使用共享数据的并发程序，您的代码导致死锁的可能性也随之增加。以下是防止这些情况的一些最常见建议：'
  raw: 'Application-level concurrent processing enables you to develop programs that
    can perform multiple operations in parallel. However, these features do not come
    for free; concurrency must be factored into both software design and implementation,
    given the capabilities of the underlying computing system. Now this may sound
    like a burden when it comes to developing programs, however, the motivations for
    concurrent processing are numerous, some of which include the following:


    *   *Increased application throughput*. As concurrent processing enables the parallel
    execution of tasks, overall *application throughput*, defined as the number of
    tasks that an application can execute over time, is increased compared to sequential
    processing.

    *   *Improved system utilization*. The execution of multiple tasks in parallel
    enables system resources to be more consistently and efficiently utilized.

    *   *Improved overall application responsiveness*. Concurrent execution of tasks
    enables other tasks to continue running if one is waiting (for input, etc.) Thus
    overall application idle time decreases and application responsiveness is increased.

    *   *Better mapping to the problem domain*. Certain problems, particularly in
    the scientific, mathematical, and artificial intelligence fields, can be modeled
    as a collection of simultaneously executing tasks. This makes solution implementation
    (in code) with concurrent programming the more natural, preferred approach.


    Implementing Concurrency


    OK, so now that you are (hopefully) convinced of the benefits of concurrent processing,
    the next question is: How do you do it? Well, there are numerous ways to implement
    concurrency in computer systems, from specialized programming languages up to
    and including parallelized computer systems. Some of the more common approaches
    include the following:


    *   *Distributed computing*: In this form of concurrent processing, a number of
    tasks are distributed to and executed on multiple, networked computers that communicate
    by message passing.

    *   *Parallel programming*: In this form of concurrent processing, a number of
    calculations are performed simultaneously, typically on multicore CPUs and programmable
    GPUs. This approach utilizes parallel computing to improve performance and deliver
    features made possible by compute-intensive algorithms.

    *   *Multiple processes*: In this form of concurrent processing a number of tasks
    is distributed to multiple software processes on a single computer for concurrent
    execution. Each process has separate resources and a separate address space, managed
    by the operating system.

    *   *Multiple threads*: Also known as *multithreading*, in this approach tasks
    are mapped to multiple threads, which are configured to execute concurrently.
    The threads execute within the context of a single program (i.e., process) and
    thus share its resources (address space, memory, etc.).


    **Note**   The term *thread* refers to a sequence of instructions that can be
    executed independently. A thread is sometimes referred to as a lightweight process,
    and multiple threads may share an address space. A *process* is a running computer
    program with its own address space and allocation of system resources. A process
    may have multiple threads that execute sequentially, concurrently, or a combination
    of the two. A *task* refers to a logical unit of work. A task may be executed
    by a thread or a process.


    Each of these approaches has its specific applications and usage scenarios. Whereas
    OS X and iOS both support (to different extents) each of the concurrent computing
    approaches presented earlier, the concurrent programming mechanisms that you will
    examine in this chapter are all based on the multithreading approach, so that’s
    what you’ll be exploring here.


    Challenges with Concurrency


    For all of its benefits, concurrent programming is difficult to implement correctly.
    This is primarily due to the challenges of synchronizing operations and sharing
    information between concurrently executing *threads of control* (i.e., logical
    control flows). Synchronization is required to control the relative order in which
    operations occur in different threads, while information sharing enables communication
    between threads. In addition, the overall program execution order is nondeterministic
    due to the simultaneous execution of multiple threads of control. Thus, different
    executions of the same program may produce different results. As a result, bugs
    in concurrent programs may be difficult to detect and reproduce. Furthermore,
    the complexity introduced by multiple threads and their potential interactions
    makes these programs much more difficult to analyze and reason.


    There are a variety of mechanisms used to address these challenges; two of the
    more common are shared memory and message passing. The shared-memory programming
    model implies *shared state*—that is, some of the program data is accessible to
    multiple threads. As the threads of a program utilize a common address space,
    shared memory is a natural mechanism for information sharing. It’s also fast and
    efficient.


    Shared Data


    The shared-memory model requires a mechanism to coordinate shared data access
    between the threads. This is commonly implemented using a synchronization mechanism;
    for example, a lock or a condition. A *lock* is a mechanism used to control access
    to data or a resource shared by multiple threads. A thread acquires a lock to
    a shared resource, performs operations on the resource, and then releases the
    lock, thereby enabling other threads to access the resource. A *condition* variable
    is a synchronization mechanism that causes a thread to wait until a specified
    condition occurs. Condition variables are commonly implemented using locks.


    The Problems with Locks


    Locks are one of the most common mechanisms used for controlling access to shared
    data. They enforce a *mutual exclusion* policy, thereby preventing concurrent
    access to the protected data/resource. Unfortunately, using locks to coordinate
    access to shared data introduces the possibility of deadlock, live-lock, or resource
    starvation—any of which can halt program execution. A *deadlock* is a situation
    in which two or more threads are each blocked, waiting to acquire a resource locked
    by another, thus preventing the blocked threads from finishing. An example of
    a deadlock condition is a circular wait. [Figure 17-3](#9781430250500_Ch17.xhtml#Fig3)
    illustrates a deadlock condition that can occur between concurrent threads accessing
    shared data.


    ![9781430250500_Fig17-03.jpg](images/9781430250500_Fig17-03.jpg)


    [Figure 17-3](#9781430250500_Ch17.xhtml#_Fig3). A deadlock condition between two
    threads accessing shared data


    A *live-lock* is a situation where a thread is unable to progress because it is
    responding to the action of another thread(s). A live-locked thread is not blocked.
    It is spending all of its computing time responding to other threads to resume
    normal execution.


    *Resource starvation* is a condition where a thread is not able to gain regular
    access to a shared resource, typically because it is being used by other threads
    and thus cannot execute as intended. This can happen if one or more other threads
    hold onto shared resources for an inordinate amount of time. In effect, you can
    look at live-lock as a form of resource starvation.


    As you develop larger and more complex concurrent programs that use shared data,
    the potential for your code to cause a deadlock condition increases. The following
    are some of the most common recommendations for preventing these conditions:'
