    一种常见的 Objective-C 编程约定是，将返回错误对象的方法的最后一个参数设为错误对象，并将此参数的类型指定为指向错误对象指针的指针（也称为*双重间接引用*）。以下示例声明了一个名为
    `getGreeting` 的方法，该方法包含一个类型为 `NSError` 的错误对象作为参数。


    ```

    - (NSString *)getGreeting(NSError **error);

    ```


    这种方式允许被调用的方法修改错误对象所指向的指针，并且如果发生错误，可以返回特定于该调用的错误对象。


    方法需要一个返回值，可以是对象指针或布尔值。你的代码调用此类方法时，需将错误对象的引用作为最后一个参数传入，或者如果不需要访问错误，则传入 `NULL`。方法调用后，检查其返回值。如果值为
    `NO` 或 `nil`，则需处理错误对象；否则未返回错误对象。许多 Foundation 类都包含通过间接引用返回错误对象的方法。此外，你的类也可以采用此约定来实现返回错误对象的方法。


