  raw: 'Your code can also take an ownership interest in a `block` object if it creates
    one using a `copy` message.


    **Note**   A *block* is an implementation of a closure, a function that permits
    access to variables outside of their typical scope. Blocks can be dynamically
    allocated on the heap and are also managed by ARC, as with standard Objective-C
    objects. Programming with blocks will be covered in depth in Part 4 of this book.


    Releasing Ownership Interest in Objects


    As mentioned previously, ARC prohibits programmatic use of the `release`, `autorelease`,
    `dealloc`, or related messages on an object. Your code gives up ownership interest
    in an object when it performs any of the following: 1) variable reassignment,
    2) `nil` assignment, or 3) its owner is deallocated.


    Variable Reassignment


    If a variable that points to a dynamically created object is changed to point
    to another object, the object loses an owner. At compile time, ARC inserts code
    to send a `release` message to this object. At this point, if there are no more
    owners of the object, it will be deallocated. [Listing 6-2](#9781430250500_Ch06.xhtml#list2)
    illustrates an example of variable reassignment.


    [*Listing 6-2.*](#9781430250500_Ch06.xhtml#_list2)  Object Ownership—Variable
    Reassignment


    ```

    Atom *myAtom = [[Atom alloc] initWithName:@"Atom 1"];

    // Other code

    ...

    myAtom = [[Atom alloc] initWithName:@"Atom 2"];

    ```


    In [Listing 6-2](#9781430250500_Ch06.xhtml#list2), an `Atom` object (let’s call
    it `Atom 1`) is created and assigned to the `myAtom` variable; later in the code,
    this variable is assigned to another `Atom` object (let’s call it `Atom 2`). Because
    the `myAtom` variable has been reassigned to `Atom 2`, `Atom 1` loses an owner
    and will be deallocated if there are no other owners of this object.


    nil Assignment


    If the value of a variable that currently points to a dynamically created object
    is set to `nil`, the object loses an owner. [Listing 6-3](#9781430250500_Ch06.xhtml#list3)
    illustrates an example of `nil` assignment.


    [*Listing 6-3.*](#9781430250500_Ch06.xhtml#_list3)  Object Ownership—nil Reassignment


    ```

    Atom *myAtom = [[Atom alloc] init];

    // Other code

    ...

    myAtom = nil;

    ```


    In [Listing 6-3](#9781430250500_Ch06.xhtml#list3), an `Atom` object is created
    and assigned to the `myAtom` variable; later in the code, this variable is set
    to `nil`. Because the `myAtom` variable has been set to `nil`, the `Atom` object
    loses an owner. Again, ARC inserts code to send a `release` message to this object
    after the statement that sets the `myAtom` variable to `nil`.


    Owner Deallocation


    *Owner deallocation*. Now that doesn’t sound very pleasant, does it? Actually
    this phrase refers to object ownership and how ARC transparently manages the object
    life cycle of both object graphs and collections. Object-oriented programs consist
    of webs of interrelated objects. These objects are linked together through OOP
    inheritance and/or composition, collectively referred to as an *object graph*.
    In an object graph, objects contain references to other (child) objects through
    the principle of composition. If a (parent) object creates another (child) object,
    it has claimed an ownership interest in it. In [Chapter 4](#9781430250500_Ch04.xhtml),
    you created a program with an object graph consisting of an `OrderEntry` class
    and two dependent (child) classes; its object graph is depicted in [Figure 6-1](#9781430250500_Ch06.xhtml#Fig1).


    ![9781430250500_Fig06-01.jpg](images/9781430250500_Fig06-01.jpg)


    [Figure 6-1](#9781430250500_Ch06.xhtml#_Fig1). OrderEntry object graph


    When an `OrderEntry` object is created and initialized, its `init` method also
    creates instances of its two child classes; thus, the `OrderEntry` object claims
    an ownership interest in each of these objects. Later, when an `OrderEntry` object
    is deallocated, ARC automatically sends a `release` message to each of its child
    objects. Specifically, at compile time, ARC creates code that inserts a `dealloc`
    method for the `OrderEntry` object (if one doesn’t already exist), inserts a `release`
    message for each child object it owns, and then sends a `dealloc` message to the
    superclass of the `OrderEntry` object. Hence, ARC automatically manages the life
    cycle of object graphs.


    The Apple Foundation Framework includes a variety of collection classes, so named
    because they are used to hold instances of other objects. When an object is stored
    in an instance of a collection class, the collection class claims an ownership
    interest in the object. Conversely, when a collection class instance is deallocated,
    ARC automatically sends a `release` message to each of the objects in the collection.


    Creating Multiple Order Entries


    To illustrate the use of ARC memory management and owner deallocation, you are
    going to extend the Order Entry project created in [Chapter 4](#9781430250500_Ch04.xhtml)
    by adding the capability to collect and store multiple order entries. You’ll use
    a collection class to store the entries, and then demonstrate how ARC performs
    memory management with collection classes and the objects stored therein.


    In Xcode, open the ARC Orders project (if not already opened) by selecting **Open
    Recent ![image](images/arrow.jpg) ARC Orders.xcodeproj** from the Xcode File menu.
    The source code for the project consists of seven files that implement the `OrderEntry`,
    `OrderItem`, and `Address` classes, and the `main` function. Let’s start by making
    some updates to the `OrderItem` class. Select the **OrderItem.h** file in the
    navigator pane and then update the OrderItem interface, as shown in [Listing 6-4](#9781430250500_Ch06.xhtml#list4).


    [*Listing 6-4.*](#9781430250500_Ch06.xhtml#_list4)  ARC OrderItem Class Interface


    ```

    #import <Foundation/Foundation.h>


    @interface OrderItem : NSObject


    @property (readonly) NSString *name;


    - (id) initWithName:(NSString *)itemName;


    @end

    ```


    In [Listing 6-4](#9781430250500_Ch06.xhtml#list4), the instance variable `name`
    has been changed to a read-only property. Next, select the **OrderItem.m** file
    and update the `OrderItem` implementation, as shown in [Listing 6-5](#9781430250500_Ch06.xhtml#list5).


    [*Listing 6-5.*](#9781430250500_Ch06.xhtml#_list5)  ARC OrderItem Class Implementation


    ```

    #import "OrderItem.h"


    @implementation OrderItem


    - (id) initWithName:(NSString *)itemName

    {

      if ((self = [super init]))

      {

        _name = itemName;

        NSLog(@"Initializing OrderItem object %@", _name);

      }

      return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderItem object %@", self.name);

    }


    @end

    ```


    This code is very similar to the original implementation; the `custom initializer`
    method (`initWithName:`) has been modified to initialize the property-backed instance
    variable. The log messages have also been slightly updated to display the `OrderItem`
    object name. Recall from [Chapter 3](#9781430250500_Ch03.xhtml), that for an autosynthesized
    property, the standard naming convention for its instance variable is the property
    name prefaced with an underscore. Now let’s update the `OrderEntry` class. Select
    the **OrderEntry.h** file in the navigator pane and then update the OrderEntry
    interface, as shown in [Listing 6-6](#9781430250500_Ch06.xhtml#list6).


    [*Listing 6-6.*](#9781430250500_Ch06.xhtml#_list6)  ARC OrderEntry Class Interface


    ```

    #import <Foundation/Foundation.h>

    #import "OrderItem.h"

    #import "Address.h"


    @interface OrderEntry : NSObject


    {

      Address *shippingAddress;

    }


    @property (readonly) NSString *orderId;

    @property (readonly) OrderItem *item;


    - (id) initWithId:(NSString *)oid name:(NSString *)order;


    @end

    ```'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n你的代码也可以通过使用`copy`消息创建`block`对象，从而获得该对象的所有权。\n\
    \n**注意**：*block* 是闭包的一种实现，是一种允许访问其正常作用域外部变量的函数。Block 可以动态分配在堆上，并且与标准的 Objective-C\
    \ 对象一样，由 ARC 管理。本书第 4 部分将深入介绍 block 的编程。\n\n## 释放对象的所有权\n\n如前所述，ARC 禁止在对象上编程使用`release`、`autorelease`、`dealloc`或相关消息。当你的代码执行以下任一操作时，它放弃了对对象的所有权：1)\
    \ 变量重新赋值，2) `nil`赋值，或 3) 其所有者被释放。\n\n### 变量重新赋值\n\n如果一个指向动态创建对象的变量被更改为指向另一个对象，则该对象失去一个所有者。在编译时，ARC\
    \ 会插入代码向此对象发送`release`消息。此时，如果该对象没有其他所有者，它将被释放。Listing 6-2 演示了变量重新赋值的示例。\n\n*Listing\
    \ 6-2.*  对象所有权——变量重新赋值\n\n```\nAtom *myAtom = [[Atom alloc] initWithName:@\"Atom\
    \ 1\"];\n// 其他代码\n...\nmyAtom = [[Atom alloc] initWithName:@\"Atom 2\"];\n```\n\
    \n在 Listing 6-2 中，创建了一个`Atom`对象（我们称其为`Atom 1`）并赋值给`myAtom`变量；稍后在代码中，此变量被赋值为另一个`Atom`对象（我们称其为`Atom\
    \ 2`）。由于`myAtom`变量已重新赋值为`Atom 2`，`Atom 1`失去一个所有者，如果该对象没有其他所有者，它将被释放。\n\n### nil\
    \ 赋值\n\n如果一个当前指向动态创建对象的变量的值被设置为`nil`，则该对象失去一个所有者。Listing 6-3 演示了`nil`赋值的示例。\n\n\
    *Listing 6-3.*  对象所有权——nil 重新赋值\n\n```\nAtom *myAtom = [[Atom alloc] init];\n\
    // 其他代码\n...\nmyAtom = nil;\n```\n\n在 Listing 6-3 中，创建了一个`Atom`对象并赋值给`myAtom`变量；稍后在代码中，此变量被设置为`nil`。由于`myAtom`变量已设置为`nil`，该`Atom`对象失去一个所有者。同样，在将`myAtom`变量设置为`nil`的语句之后，ARC\
    \ 会插入代码向此对象发送`release`消息。\n\n### 所有者释放\n\n*所有者释放*。这听起来不太令人愉快，不是吗？实际上，这个术语指的是对象所有权，以及\
    \ ARC 如何透明地管理对象图和集合的对象生命周期。面向对象的程序由相互关联的对象网络组成。这些对象通过 OOP 继承和/或组合连接在一起，统称为*对象图*。在对象图中，对象通过组合原理包含对其他（子）对象的引用。如果一个（父）对象创建了另一个（子）对象，它就声称拥有该子对象的所有权。在第\
    \ 4 章中，你创建了一个程序，其中包含一个由`OrderEntry`类和两个依赖（子）类组成的对象图；其对象图如 Figure 6-1 所示。\n\n![9781430250500_Fig06-01.jpg](img/9781430250500_Fig06-01.jpg)\n\
    \nFigure 6-1. OrderEntry 对象图\n\n当创建并初始化一个`OrderEntry`对象时，其`init`方法也会创建其两个子类的实例；因此，`OrderEntry`对象声称拥有这些子对象中每一个的所有权。稍后，当释放一个`OrderEntry`对象时，ARC\
    \ 会自动向其每个子对象发送`release`消息。具体来说，在编译时，ARC 会创建代码，为`OrderEntry`对象插入一个`dealloc`方法（如果该方法尚不存在），为其拥有的每个子对象插入一条`release`消息，然后向`OrderEntry`对象的超类发送一条`dealloc`消息。因此，ARC\
    \ 会自动管理对象图的生命周期。\n\nApple 基础框架包含各种集合类，之所以这样命名，是因为它们用于保存其他对象的实例。当一个对象存储在一个集合类的实例中时，该集合类声称拥有该对象的所有权。相反，当释放一个集合类实例时，ARC\
    \ 会自动向集合中的每个对象发送一条`release`消息。\n\n## 创建多个订单条目\n\n为了说明 ARC 内存管理和所有者释放的用法，你将扩展在第\
    \ 4 章中创建的 Order Entry 项目，添加收集和存储多个订单条目的功能。你将使用一个集合类来存储这些条目，然后演示 ARC 如何对集合类及其存储的对象执行内存管理。\n\
    \n在 Xcode 中，通过从 Xcode 文件菜单中选择 **Open Recent ![image](img/arrow.jpg) ARC Orders.xcodeproj**\
    \ 来打开 ARC Orders 项目（如果尚未打开）。该项目的源代码由七个文件组成，这些文件实现了`OrderEntry`、`OrderItem`和`Address`类，以及`main`函数。让我们从对`OrderItem`类进行一些更新开始。在导航器窗格中选择\
    \ **OrderItem.h** 文件，然后更新 OrderItem 接口，如 Listing 6-4 所示。\n\n*Listing 6-4.*  ARC\
    \ OrderItem 类接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface OrderItem\
    \ : NSObject\n\n@property (readonly) NSString *name;\n\n- (id) initWithName:(NSString\
    \ *)itemName;\n\n@end\n```\n\n在 Listing 6-4 中，实例变量`name`已更改为只读属性。接下来，选择 **OrderItem.m**\
    \ 文件并更新`OrderItem`实现，如 Listing 6-5 所示。\n\n*Listing 6-5.*  ARC OrderItem 类实现\n\n\
    ```\n#import \"OrderItem.h\"\n\n@implementation OrderItem\n\n- (id) initWithName:(NSString\
    \ *)itemName\n{\n  if ((self = [super init]))\n  {\n    _name = itemName;\n  \
    \  NSLog(@\"Initializing OrderItem object %@\", _name);\n  }\n  return self;\n\
    }\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating OrderItem object %@\", self.name);\n\
    }\n\n@end\n```\n\n这段代码与原始实现非常相似；自定义初始化方法（`initWithName:`）已被修改，以初始化属性支持的实例变量。日志消息也略有更新，以显示`OrderItem`对象的名称。回顾第\
    \ 3 章，对于自动合成的属性，其实例变量的标准命名约定是属性名前加下划线。现在让我们更新`OrderEntry`类。在导航器窗格中选择 **OrderEntry.h**\
    \ 文件，然后更新 OrderEntry 接口，如 Listing 6-6 所示。\n\n*Listing 6-6.*  ARC OrderEntry 类接口\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"OrderItem.h\"\n#import \"\
    Address.h\"\n\n@interface OrderEntry : NSObject\n\n{\n  Address *shippingAddress;\n\
    }\n\n@property (readonly) NSString *orderId;\n@property (readonly) OrderItem *item;\n\
    \n- (id) initWithId:(NSString *)oid name:(NSString *)order;\n\n@end\n```\n"
- fmt: "`OrderEntry`接口现在有一个实例变量、两个只读属性和一个更新后的自定义初始化器（`initWithId:name:`）。这些属性是只读的，它们替换了[第4章](#9781430250500_Ch04.xhtml)原始接口中的两个实例变量。接下来，你将更新类的实现。在导航窗格中选择`OrderEntry.m`文件，并更新实现，如[列表6-7](#9781430250500_Ch06.xhtml#list7)所示。\n\
    \n[列表6-7.](#9781430250500_Ch06.xhtml#_list7) ARC OrderEntry 类实现\n\n```\n#import\
    \ \"OrderEntry.h\"\n\n@implementation OrderEntry\n\n- (id) initWithId:(NSString\
    \ *)oid name:(NSString *)order;\n{\n  if ((self = [super init]))\n  {\n    NSLog(@\"\
    Initializing OrderEntry object\");\n    _orderId = oid;\n    _item = [[OrderItem\
    \ alloc] initWithName:order];\n    shippingAddress = [[Address alloc] init];\n\
    \  }\n\nreturn self;\n}\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating OrderEntry\
    \ object with ID %@\",\n        self.orderId);\n}\n\n@end\n```\n\n自定义初始化器方法（`initWithId:name:`）已被修改，用于初始化两个由属性支持的实例变量。日志消息也略有更新，以使用属性`getter`方法显示`OrderEntry`\
    \ ID。\n\n现在你已经更新了类，让我们更新`main`函数，以创建一些订单条目并将它们存储在集合类中。在导航窗格中选择`main.m`文件，然后更新`main`函数，如[列表6-8](#9781430250500_Ch06.xhtml#list8)所示。\n\
    \n[列表6-8.](#9781430250500_Ch06.xhtml#_list8) ARC Orders `main()` 函数实现\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"OrderEntry.h\"\n\nint main(int argc,\
    \ const char * argv[])\n{\n\n@autoreleasepool\n  {\n    // Create an OrderEntry\
    \ object\n    OrderEntry *entry1 = [[OrderEntry alloc] initWithId:@\"A-1\"\n \
    \                                                  name:@\"2 Hot dogs\"];\n  \
    \  NSLog(@\"Order 1, ID = %@, item: %@\", entry1.orderId, entry1.item.name);\n\
    \n// Create another OrderEntry object\n    OrderEntry *entry2 = [[OrderEntry alloc]\
    \ initWithId:@\"A-2\"\n                                                   name:@\"\
    1 Cheeseburger\"];\n    NSLog(@\"Order 2, ID = %@, item: %@\", entry2.orderId,\
    \ entry2.item.name);\n\n// Add the order entries to a collection\n    NSArray\
    \ *entries = [[NSArray alloc] initWithObjects:entry1, entry2, nil];\n    NSLog(@\"\
    Number of order entries = %li\", [entries count]);\n\n// Set OrderEntry object\
    \ to nil, ARC sends a release message to the object!\n    NSLog(@\"Setting entry2\
    \ variable to nil\");\n    entry2 = nil;\n\n// Set collection to nil, ARC sends\
    \ a release message to all objects\n    NSLog(@\"Setting entries collection variable\
    \ to nil\");\n    entries = nil;\n\n// Set OrderEntry object to nil, ARC sends\
    \ a release message to the object!\n    NSLog(@\"Setting entry1 variable to nil\"\
    );\n    entry1 = nil;\n\n// Exit autoreleasepool block\n    NSLog(@\"Leaving autoreleasepool\
    \ block\");\n  }\n  return 0;\n}\n```\n\n对`main()`函数的更新内容较多，因此你将逐行进行复习。首先，代码创建了两个`OrderEntry`对象，每次都会在控制台记录一条消息，显示条目的ID和名称。接下来，代码创建并初始化了一个包含两个订单条目的`NSArray`对象。`NSArray`是Foundation框架中的一个类，用于管理对象的顺序集合（你将在本书的第3部分学习`NSArray`和其他Foundation框架集合类）。正如你之前所了解的，当一个对象存储在集合类的实例中时，集合类会声称对该对象拥有所有权权益。因此，`NSArray`对象声称对每个订单条目拥有所有权权益。接下来，当前指向其中一个`OrderEntry`对象（`entry2`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。由于`NSArray`对象仍然“拥有”`entry2`对象，因此它不会被释放。接着，指向`NSArray`对象的变量被设置为`nil`，从而释放了对`entry2`对象以及它所声称拥有所有权的所有对象的所有权权益。最后，指向另一个`OrderEntry`对象（`entry1`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。在离开自动释放池块之前，也会立即在控制台记录一条消息。\n\
    \n现在，保存、编译并运行更新后的ARC Orders程序，观察输出窗格中的消息（参见[图6-2](#9781430250500_Ch06.xhtml#Fig2)）。\n\
    \n![9781430250500_Fig06-02.jpg](images/9781430250500_Fig06-02.jpg)\n\n[图6-2](#9781430250500_Ch06.xhtml#_Fig2).\
    \ 测试更新后的ARC Order Entry项目\n\n输出窗格中的消息（在[图6-3](#9781430250500_Ch06.xhtml#Fig3)中更详细地展示）显示了初始化并释放动态创建对象的调用序列。\n\
    \n![9781430250500_Fig06-03.jpg](images/9781430250500_Fig06-03.jpg)\n\n[图6-3](#9781430250500_Ch06.xhtml#_Fig3).\
    \ ARC对象释放\n\n在[图6-3](#9781430250500_Ch06.xhtml#Fig3)中，一系列消息显示了两个`OrderEntry`对象图的初始化过程，包括它们对应的依赖对象（`OrderItem`和`Address`）。接下来显示一条指示存储在`NSArray`集合类中订单条目数量的消息。然后，`entry2`变量（对应于一个`OrderEntry`对象）被设置为`nil`；然而，由于`NSArray`实例仍然对这个`OrderEntry`对象拥有所有权权益，因此它不会被释放。随后，`entries`变量（对应于`NSArray`实例）被设置为`nil`。这导致`NSArray`实例被释放，并向该集合中的每个对象发送一条`release`消息。此时，对应于`entry2`变量的`OrderEntry`对象不再有所有者，因此它及其依赖对象被释放。接下来，`entry1`变量被设置为`nil`，导致向其对应的`OrderEntry`对象发送一条`release`消息。由于此对象现在没有所有者，它及其依赖对象也被释放。输出窗格现在显示一条消息，指示代码正在离开自动释放池块。在此消息之后，每个`OrderEntry`对象对应的`OrderItem`对象被释放。"
  raw: 'The OrderEntry interface now has a single instance variable, two read-only
    properties, and an updated custom initializer (`initWithId:name:`). The properties
    are read-only and they replace two of the instance variables in the original interface
    from [Chapter 4](#9781430250500_Ch04.xhtml). Next, you’ll update the class implementation.
    Select the **OrderEntry.m** file in the navigator pane and update the implementation,
    as shown in [Listing 6-7](#9781430250500_Ch06.xhtml#list7).


    [*Listing 6-7.*](#9781430250500_Ch06.xhtml#_list7)  ARC OrderEntry Class Implementation


    ```

    #import "OrderEntry.h"


    @implementation OrderEntry


    - (id) initWithId:(NSString *)oid name:(NSString *)order;

    {

      if ((self = [super init]))

      {

        NSLog(@"Initializing OrderEntry object");

        _orderId = oid;

        _item = [[OrderItem alloc] initWithName:order];

        shippingAddress = [[Address alloc] init];

      }


    return self;

    }


    - (void)dealloc

    {

      NSLog(@"Deallocating OrderEntry object with ID %@",

            self.orderId);

    }


    @end

    ```


    The `custom initializer` method (`initWithId:name:`) has been modified to initialize
    the two property-backed instance variables. The log message has also been slightly
    updated to display the `OrderEntry` ID using the property `getter` method.


    Now that you’ve updated the classes, let’s update the `main` function to create
    some order entries and store them in a collection class. Select the **main.m**
    file in the navigator pane and then update the `main` function, as shown in [Listing
    6-8](#9781430250500_Ch06.xhtml#list8).


    [*Listing 6-8.*](#9781430250500_Ch06.xhtml#_list8)  ARC Orders main( ) Function
    Implementation


    ```

    #import <Foundation/Foundation.h>

    #import "OrderEntry.h"


    int main(int argc, const char * argv[])

    {


    @autoreleasepool

      {

        // Create an OrderEntry object

        OrderEntry *entry1 = [[OrderEntry alloc] initWithId:@"A-1"

                                                       name:@"2 Hot dogs"];

        NSLog(@"Order 1, ID = %@, item: %@", entry1.orderId, entry1.item.name);


    // Create another OrderEntry object

        OrderEntry *entry2 = [[OrderEntry alloc] initWithId:@"A-2"

                                                       name:@"1 Cheeseburger"];

        NSLog(@"Order 2, ID = %@, item: %@", entry2.orderId, entry2.item.name);


    // Add the order entries to a collection

        NSArray *entries = [[NSArray alloc] initWithObjects:entry1, entry2, nil];

        NSLog(@"Number of order entries = %li", [entries count]);


    // Set OrderEntry object to nil, ARC sends a release message to the object!

        NSLog(@"Setting entry2 variable to nil");

        entry2 = nil;


    // Set collection to nil, ARC sends a release message to all objects

        NSLog(@"Setting entries collection variable to nil");

        entries = nil;


    // Set OrderEntry object to nil, ARC sends a release message to the object!

        NSLog(@"Setting entry1 variable to nil");

        entry1 = nil;


    // Exit autoreleasepool block

        NSLog(@"Leaving autoreleasepool block");

      }

      return 0;

    }

    ```


    The updates to the `main()` function are extensive, so you’ll go over them line
    by line. First, the code creates two `OrderEntry` objects, each time logging a
    message to the console displaying the ID and name for the entry. Next, the code
    creates and initializes an `NSArray` object with the two order entries. An `NSArray`
    is a Foundation Framework class for managing order collections of objects (you’ll
    learn about `NSArray` and other Foundation Framework collection classes in Part
    3 of this book). As you learned earlier, when an object is stored in an instance
    of a collection class, the collection class claims an ownership interest in the
    object. Thus, the `NSArray` object claims an ownership interest in each order
    entry. Next, the variable currently pointing to one of the `OrderEntry` objects
    (`entry2`) is set to `nil`, thereby releasing an ownership interest in the object.
    Because the `NSArray` object still “owns” the entry2 object, it is not deallocated.
    Next, the variable pointing to the `NSArray` object is set to `nil`, thereby releasing
    ownership interest in the entry2 object and in all objects for which it claims
    an ownership interest. Finally, the variable pointing to the other `OrderEntry`
    object (`entry1`) is set to `nil`, thereby releasing an ownership interest in
    that object. A message is also logged to the console immediately before leaving
    the autorelease pool block.


    Now save, compile, and run the updated ARC Orders program and observe the messages
    in the output pane (see [Figure 6-2](#9781430250500_Ch06.xhtml#Fig2)).


    ![9781430250500_Fig06-02.jpg](images/9781430250500_Fig06-02.jpg)


    [Figure 6-2](#9781430250500_Ch06.xhtml#_Fig2). Testing the updated ARC Order Entry
    project


    The messages in the output pane (depicted in more detail in [Figure 6-3](#9781430250500_Ch06.xhtml#Fig3))
    show the sequence of calls to initialize and deallocate the dynamically created
    objects.


    ![9781430250500_Fig06-03.jpg](images/9781430250500_Fig06-03.jpg)


    [Figure 6-3](#9781430250500_Ch06.xhtml#_Fig3). ARC object deallocation


    In [Figure 6-3](#9781430250500_Ch06.xhtml#Fig3), a series of messages show the
    initialization of two `OrderEntry` object graphs, including their corresponding
    dependent objects (`OrderItem` and `Address`). A message indicating the number
    of order entries stored in the `NSArray` collection class is then displayed. Next,
    the `entry2` variable (corresponding to an `OrderEntry` object) is set to `nil`;
    however, because the `NSArray` instance still has an ownership interest in this
    `OrderEntry` object, it is not deallocated. The entries variable (corresponding
    to the `NSArray` instance) is then set to `nil`. This causes the `NSArray` instance
    to be deallocated and a `release` message to be sent to each of the objects in
    this collection. At this point, the `OrderEntry` object corresponding to the `entry2`
    variable has no more owners, so it is deallocated, along with its dependent objects.
    Next, the `entry1` variable is set to `nil`, causing a `release` message to be
    sent to its corresponding `OrderEntry` object. Because this object now has no
    owners, it is also deallocated along with its dependent objects. The output pane
    now displays a message indicating that the code is leaving the autorelease pool
    block. Following this message, the corresponding `OrderItem` object for each of
    the `OrderEntry` objects is deallocated.'
  trans: "\n`OrderEntry`接口现在有一个实例变量、两个只读属性和一个更新后的自定义初始化器（`initWithId:name:`）。这些属性是只读的，它们替换了第\
    \ 4 章原始接口中的两个实例变量。接下来，你将更新类的实现。在导航窗格中选择`OrderEntry.m`文件，并更新实现，如列表 6-7 所示。\n\n\
    列表 6-7. ARC OrderEntry 类实现\n\n```\n#import \"OrderEntry.h\"\n\n@implementation\
    \ OrderEntry\n\n- (id) initWithId:(NSString *)oid name:(NSString *)order;\n{\n\
    \  if ((self = [super init]))\n  {\n    NSLog(@\"Initializing OrderEntry object\"\
    );\n    _orderId = oid;\n    _item = [[OrderItem alloc] initWithName:order];\n\
    \    shippingAddress = [[Address alloc] init];\n  }\n\nreturn self;\n}\n\n- (void)dealloc\n\
    {\n  NSLog(@\"Deallocating OrderEntry object with ID %@\",\n        self.orderId);\n\
    }\n\n@end\n```\n\n自定义初始化器方法（`initWithId:name:`）已被修改，用于初始化两个由属性支持的实例变量。日志消息也略有更新，以使用属性`getter`方法显示`OrderEntry`\
    \ ID。\n\n现在你已经更新了类，让我们更新`main`函数，以创建一些订单条目并将它们存储在集合类中。在导航窗格中选择`main.m`文件，然后更新`main`函数，如列表\
    \ 6-8 所示。\n\n列表 6-8. ARC Orders `main()` 函数实现\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"OrderEntry.h\"\n\nint main(int argc, const char * argv[])\n{\n\n@autoreleasepool\n\
    \  {\n    // Create an OrderEntry object\n    OrderEntry *entry1 = [[OrderEntry\
    \ alloc] initWithId:@\"A-1\"\n                                               \
    \    name:@\"2 Hot dogs\"];\n    NSLog(@\"Order 1, ID = %@, item: %@\", entry1.orderId,\
    \ entry1.item.name);\n\n// Create another OrderEntry object\n    OrderEntry *entry2\
    \ = [[OrderEntry alloc] initWithId:@\"A-2\"\n                                \
    \                   name:@\"1 Cheeseburger\"];\n    NSLog(@\"Order 2, ID = %@,\
    \ item: %@\", entry2.orderId, entry2.item.name);\n\n// Add the order entries to\
    \ a collection\n    NSArray *entries = [[NSArray alloc] initWithObjects:entry1,\
    \ entry2, nil];\n    NSLog(@\"Number of order entries = %li\", [entries count]);\n\
    \n// Set OrderEntry object to nil, ARC sends a release message to the object!\n\
    \    NSLog(@\"Setting entry2 variable to nil\");\n    entry2 = nil;\n\n// Set\
    \ collection to nil, ARC sends a release message to all objects\n    NSLog(@\"\
    Setting entries collection variable to nil\");\n    entries = nil;\n\n// Set OrderEntry\
    \ object to nil, ARC sends a release message to the object!\n    NSLog(@\"Setting\
    \ entry1 variable to nil\");\n    entry1 = nil;\n\n// Exit autoreleasepool block\n\
    \    NSLog(@\"Leaving autoreleasepool block\");\n  }\n  return 0;\n}\n```\n\n\
    对`main()`函数的更新内容较多，因此你将逐行进行复习。首先，代码创建了两个`OrderEntry`对象，每次都会在控制台记录一条消息，显示条目的 ID\
    \ 和名称。接下来，代码创建并初始化了一个包含两个订单条目的`NSArray`对象。`NSArray`是 Foundation 框架中的一个类，用于管理对象的顺序集合（你将在本书的第\
    \ 3 部分学习`NSArray`和其他 Foundation 框架集合类）。正如你之前所了解的，当一个对象存储在集合类的实例中时，集合类会声称对该对象拥有所有权权益。因此，`NSArray`对象声称对每个订单条目拥有所有权权益。接下来，当前指向其中一个`OrderEntry`对象（`entry2`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。由于`NSArray`对象仍然“拥有”`entry2`对象，因此它不会被释放。接着，指向`NSArray`对象的变量被设置为`nil`，从而释放了对`entry2`对象以及它所声称拥有所有权的所有对象的所有权权益。最后，指向另一个`OrderEntry`对象（`entry1`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。在离开自动释放池块之前，也会立即在控制台记录一条消息。\n\
    \n现在，保存、编译并运行更新后的 ARC Orders 程序，观察输出窗格中的消息（参见图 6-2）。\n\n![9781430250500_Fig06-02.jpg](img/9781430250500_Fig06-02.jpg)\n\
    \n图 6-2. 测试更新后的 ARC Order Entry 项目\n\n输出窗格中的消息（在图 6-3 中更详细地展示）显示了初始化并释放动态创建对象的调用序列。\n\
    \n![9781430250500_Fig06-03.jpg](img/9781430250500_Fig06-03.jpg)\n\n图 6-3. ARC\
    \ 对象释放\n\n在图 6-3 中，一系列消息显示了两个`OrderEntry`对象图的初始化过程，包括它们对应的依赖对象（`OrderItem`和`Address`）。接下来显示一条指示存储在`NSArray`集合类中订单条目数量的消息。然后，`entry2`变量（对应于一个`OrderEntry`对象）被设置为`nil`；然而，由于`NSArray`实例仍然对这个`OrderEntry`对象拥有所有权权益，因此它不会被释放。随后，`entries`变量（对应于`NSArray`实例）被设置为`nil`。这导致`NSArray`实例被释放，并向该集合中的每个对象发送一条`release`消息。此时，对应于`entry2`变量的`OrderEntry`对象不再有所有者，因此它及其依赖对象被释放。接下来，`entry1`变量被设置为`nil`，导致向其对应的`OrderEntry`对象发送一条`release`消息。由于此对象现在没有所有者，它及其依赖对象也被释放。输出窗格现在显示一条消息，指示代码正在离开自动释放池块。在此消息之后，每个`OrderEntry`对象对应的`OrderItem`对象被释放。\n"
- fmt: "ARC memory management has properly managed the life cycle of this object graph\
    \ and the collection class. However, if you look closely at the output from the\
    \ output pane, you may have noticed that the `OrderItem` objects were deallocated\
    \ at the end of the autorelease pool (as shown by the log messages in [Figure\
    \ 6-3](#9781430250500_Ch06.xhtml#Fig3)). So why weren’t they deallocated when\
    \ the corresponding `OrderEntry` parent objects were deallocated? The answer lies\
    \ in how ARC manages the life cycle of property accessors—specifically in this\
    \ case, property `get` methods. Your code needs to claim an ownership interest\
    \ in any object it obtains (i.e., hasn’t created programmatically via a method\
    \ beginning with `alloc`, `new`, `copy`, or `mutableCopy`) and may use over a\
    \ long period of time. Because ARC prohibits you from programmatically sending\
    \ `retain` messages to objects, it must be capable of detecting these scenarios\
    \ and inserting the necessary code to manage object life cycle appropriately.\
    \ Specifically, if an object is retrieved via a property `get` method, ARC detects\
    \ this and automatically inserts code to send `retain` and `autorelease` messages\
    \ to this object, thereby preventing it from being deallocated prematurely. Recall\
    \ from [Listing 6-6](#9781430250500_Ch06.xhtml#list6) that the `OrderEntry` interface\
    \ declares a (read-only) property named `item` of type `OrderItem`. In [Listing\
    \ 6-8](#9781430250500_Ch06.xhtml#list8), the following statement retrieves the\
    \ `OrderItem` object `item` via the property `get` method (`entry1.item`):\n\n\
    ```\nNSLog(@\"Order 1, ID = %@, item: %@\", entry1.orderId, entry1.item.name);\n\
    ```\n\nAt compile time, ARC will automatically insert code that sends `retain`\
    \ and `autorelease` messages to this `OrderItem` object. Later in the code, the\
    \ `OrderItem` object (`entry2.item`) is retrieved with the following statement:\n\
    \n```\nNSLog(@\"Order 2, ID = %@, item: %@\", entry2.orderId, entry2.item.name);\n\
    ```\n\nIn sum, when an object is retrieved via a property getter, ARC sends `retain`\
    \ and `autorelease` messages to the object to prevent it from being deallocated.\
    \ This explains why the `OrderItem` objects were deallocated at the end of the\
    \ autorelease pool block, and not when the parent (`OrderEntry`) objects were\
    \ deallocated.\n\nLet’s comment-out the preceding two log statements and then\
    \ save, compile, and rerun the program. Because the `OrderItem` objects are no\
    \ longer retrieved via a property `get` method, you should observe that the `OrderItem`\
    \ objects are now deallocated when the corresponding `OrderEntry` objects are\
    \ deallocated, not at the end of the autorelease pool block (see [Figure 6-4](#9781430250500_Ch06.xhtml#Fig4)).\n\
    \n![9781430250500_Fig06-04.jpg](images/9781430250500_Fig06-04.jpg)\n\n[Figure\
    \ 6-4](#9781430250500_Ch06.xhtml#_Fig4). Running the updated ARC Order Entry project\n\
    \nThis example demonstrates the details of how code compiled using ARC can programmatically\
    \ release ownership interest in objects and how ARC manages object life cycle\
    \ for both object graphs and collections. Understanding these details will become\
    \ invaluable as you develop larger and more complex Objective-C applications.\n\
    \n## Using ARC with Apple Frameworks and Services\n\nApple includes numerous software\
    \ libraries (i.e., frameworks and services) that provide the interfaces needed\
    \ to write software for the OS X and iOS platforms. Some of the most commonly\
    \ used libraries for application development are depicted in [Figure 6-5](#9781430250500_Ch06.xhtml#Fig5).\n\
    \n![9781430250500_Fig06-05.jpg](images/9781430250500_Fig06-05.jpg)\n\n[Figure\
    \ 6-5](#9781430250500_Ch06.xhtml#_Fig5). Apple Application frameworks and services\n\
    \nThe application programming interfaces (APIs) for some of these libraries are\
    \ written in Objective-C, and thus may be used directly in your Objective-C programs.\
    \ The APIs for the majority of these libraries are written in ANSI C, and hence\
    \ may also be used directly in your Objective-C programs.\n\nYou may recall from\
    \ [Chapter 4](#9781430250500_Ch04.xhtml) that ARC provides automatic memory management\
    \ for Objective-C objects and block objects. The Apple software libraries with\
    \ C-based APIs do not integrate with ARC. Thus, you are responsible for programmatically\
    \ performing memory management when dynamically allocating memory with these C-based\
    \ APIs. In fact, when using ARC, it is prohibited to perform standard casts between\
    \ pointers of Objective-C objects and pointers of other types (e.g., one that\
    \ is a part of an Apple C–based API). Apple provides several mechanisms (toll-free\
    \ bridging and ARC bridged casts) to facilitate the use of C-based APIs in Objective-C\
    \ programs. You will look at these next.\n\n### Objective-C Toll Free Bridging\n\
    \nInteroperability is provided for a number of data types in the C-based Core\
    \ Foundation Framework and the Objective-C-based Foundation Framework. This capability,\
    \ referred to as *toll-free bridging*, allows you to use the same data type as\
    \ the parameter to a Core Foundation function call or as the receiver of an Objective-C\
    \ message. You can cast one type to the other to suppress compiler warnings. Some\
    \ of the more commonly used toll-free bridged data types are listed in [Table\
    \ 6-1](#9781430250500_Ch06.xhtml#Tab1); it includes the Core Foundation type and\
    \ the corresponding Foundation Framework type.\n\n[Table 6-1](#9781430250500_Ch06.xhtml#_Tab1).\
    \ Toll-Free Bridging Data Types\n\n| Core Foundation Type | Foundation Type |\n\
    | --- | --- |\n| `CFArrayRef` | `NSArray` |\n| `CFDataRef` | `NSData` |\n| `CFDateRef`\
    \ | `NSDate` |\n| `CFDictionaryRef` | `NSDictionary` |\n| `CFMutableArrayRef`\
    \ | `NSMutableArray` |\n| `CFMutableDataRef` | `NSMutableData` |\n| `CFMutableDictionaryRef`\
    \ | `NSMutableDictionary` |\n| `CFMutableSetRef` | `NSMutableSet` |\n| `CFMutableStringRef`\
    \ | `NSMutableString` |\n| `CFNumberRef` | `NSNumber` |\n| `CFReadStreamRef` |\
    \ `NSInputStream` |\n| `CFSetRef` | `NSSet` |\n| `CFStringRef` | `NSString` |\n\
    | `CFWriteStreamRef` | `NSOutputStream` |\n\nWith toll-free bridging, the compiler\
    \ implicitly casts between Core Foundation and Foundation types. For example,\
    \ a variable of type `CFStringRef` is used as an argument to an Objective-C method\
    \ in [Listing 6-9](#9781430250500_Ch06.xhtml#list9).\n\n[*Listing 6-9.*](#9781430250500_Ch06.xhtml#_list9)\
    \ Toll-Free Bridging Implicit Cast\n\n```\nCFStringRef cstr = CFStringCreateWithCString(NULL,\
    \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
    NSArray *data = [NSArray arrayWithObject:cstr];\n```\n\nThe `[NSArray arrayWithObject:]`\
    \ class method takes a parameter of type `id` (in other words, an Objective-C\
    \ object pointer) as an argument, but is passed as `CFStringRef`. Because `CFStringRef`\
    \ is a toll-free bridged data type, the `cstr` parameter is implicitly cast to\
    \ an `NSString` object (see [Table 6-1](#9781430250500_Ch06.xhtml#Tab1)). To remove\
    \ the compiler warning for the implicit cast, the parameter is cast, as shown\
    \ in [Listing 6-10](#9781430250500_Ch06.xhtml#list10).\n\n[*Listing 6-10.*](#9781430250500_Ch06.xhtml#_list10)\
    \ Toll-Free Bridging Explicit Cast\n\n```\nCFStringRef cstr = CFStringCreateWithCString(NULL,\
    \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
    NSArray *data = [NSArray arrayWithObject:(NSString *)cstr];\n```\n\nAs mentioned\
    \ in the previous section, the Objective-C compiler does not automatically manage\
    \ the lifetimes of Core Foundation data types. Therefore, to use Core Foundation\
    \ toll-free bridged types in ARC memory managed Objective-C programs, it is necessary\
    \ to indicate the ownership semantics involved with these types. In fact, the\
    \ code in [Listing 6-10](#9781430250500_Ch06.xhtml#list10), as is, will not compile\
    \ when using ARC! For Objective-C programs that use ARC memory management, you\
    \ must indicate whether the life cycle of a toll-free bridged type is to be managed\
    \ by ARC or managed programmatically. You do this by using ARC bridged casts.\n\
    \n### ARC Bridged Casts"
  raw: 'ARC memory management has properly managed the life cycle of this object graph
    and the collection class. However, if you look closely at the output from the
    output pane, you may have noticed that the `OrderItem` objects were deallocated
    at the end of the autorelease pool (as shown by the log messages in [Figure 6-3](#9781430250500_Ch06.xhtml#Fig3)).
    So why weren’t they deallocated when the corresponding `OrderEntry` parent objects
    were deallocated? The answer lies in how ARC manages the life cycle of property
    accessors—specifically in this case, property `get` methods. Your code needs to
    claim an ownership interest in any object it obtains (i.e., hasn’t created programmatically
    via a method beginning with `alloc`, `new`, `copy`, or `mutableCopy`) and may
    use over a long period of time. Because ARC prohibits you from programmatically
    sending `retain` messages to objects, it must be capable of detecting these scenarios
    and inserting the necessary code to manage object life cycle appropriately. Specifically,
    if an object is retrieved via a property `get` method, ARC detects this and automatically
    inserts code to send `retain` and `autorelease` messages to this object, thereby
    preventing it from being deallocated prematurely. Recall from [Listing 6-6](#9781430250500_Ch06.xhtml#list6)
    that the OrderEntry interface declares a (read-only) property named `item` of
    type `OrderItem`. In [Listing 6-8](#9781430250500_Ch06.xhtml#list8), the following
    statement retrieves the `OrderItem` object `item` via the property `get` method
    (`entry1.item`):


    ```

    NSLog(@"Order 1, ID = %@, item: %@", entry1.orderId, entry1.item.name);

    ```


    At compile time, ARC will automatically insert code that sends `retain` and `autorelease`
    messages to this `OrderItem o`bject. Later in the code, the `OrderItem` object
    (`entry2.item`) is retrieved with the following statement:


    ```

    NSLog(@"Order 2, ID = %@, item: %@", entry2.orderId, entry2.item.name);

    ```


    In sum, when an object is retrieved via a property getter, ARC sends `retain`
    and `autorelease` messages to the object to prevent it from being deallocated.
    This explains why the `OrderItem` objects were deallocated at the end of the autorelease
    pool block, and not when the parent (`OrderEntry`) objects were deallocated.


    Let’s comment-out the preceding two log statements and then save, compile, and
    rerun the program. Because the `OrderItem` objects are no longer retrieved via
    a property `get` method, you should observe that the `OrderItem` objects are now
    deallocated when the corresponding `OrderEntry` objects are deallocated, not at
    the end of the autorelease pool block (see [Figure 6-4](#9781430250500_Ch06.xhtml#Fig4)).


    ![9781430250500_Fig06-04.jpg](images/9781430250500_Fig06-04.jpg)


    [Figure 6-4](#9781430250500_Ch06.xhtml#_Fig4). Running the updated ARC Order Entry
    project


    This example demonstrates the details of how code compiled using ARC can programmatically
    release ownership interest in objects and how ARC manages object life cycle for
    both object graphs and collections. Understanding these details will become invaluable
    as you develop larger and more complex Objective-C applications.


    Using ARC with Apple Frameworks and Services


    Apple includes numerous software libraries (i.e., frameworks and services) that
    provide the interfaces needed to write software for the OS X and iOS platforms.
    Some of the most commonly used libraries for application development are depicted
    in [Figure 6-5](#9781430250500_Ch06.xhtml#Fig5).


    ![9781430250500_Fig06-05.jpg](images/9781430250500_Fig06-05.jpg)


    [Figure 6-5](#9781430250500_Ch06.xhtml#_Fig5). Apple Application frameworks and
    services


    The application programming interfaces (APIs) for some of these libraries are
    written in Objective-C, and thus may be used directly in your Objective-C programs.
    The APIs for the majority of these libraries are written in ANSI C, and hence
    may also be used directly in your Objective-C programs.


    You may recall from [Chapter 4](#9781430250500_Ch04.xhtml) that ARC provides automatic
    memory management for Objective-C objects and block objects. The Apple software
    libraries with C-based APIs do not integrate with ARC. Thus, you are responsible
    for programmatically performing memory management when dynamically allocating
    memory with these C-based APIs. In fact, when using ARC, it is prohibited to perform
    standard casts between pointers of Objective-C objects and pointers of other types
    (e.g., one that is a part of an Apple C–based API). Apple provides several mechanisms
    (toll-free bridging and ARC bridged casts) to facilitate the use of C-based APIs
    in Objective-C programs. You will look at these next.


    Objective-C Toll Free Bridging


    Interoperability is provided for a number of data types in the C-based Core Foundation
    Framework and the Objective-C-based Foundation Framework. This capability, referred
    to as *toll-free bridging*, allows you to use the same data type as the parameter
    to a Core Foundation function call or as the receiver of an Objective-C message.
    You can cast one type to the other to suppress compiler warnings. Some of the
    more commonly used toll-free bridged data types are listed in [Table 6-1](#9781430250500_Ch06.xhtml#Tab1);
    it includes the Core Foundation type and the corresponding Foundation Framework
    type.


    [Table 6-1](#9781430250500_Ch06.xhtml#_Tab1). Toll-Free Bridging Data Types


    | Core Foundation Type | Foundation Type |

    | --- | --- |

    | *CFArrayRef* | *NSArray* |

    | CFDataRef | *NSData* |

    | CFDateRef | *NSDate* |

    | CFDictionaryRef | *NSDictionary* |

    | CFMutableArrayRef | *NSMutableArray* |

    | CFMutableDataRef | *NSMutableData* |

    | CFMutableDictionaryRef | *NSMutableDictionary* |

    | CFMutableSetRef | *NSMutableSet* |

    | CFMutableStringRef | *NSMutableString* |

    | CFNumberRef | *NSNumber* |

    | CFReadStreamRef | *NSInputStream* |

    | CFSetRef | *NSSet* |

    | CFStringRef | *NSString* |

    | CFWriteStreamRef | *NSOutputStream* |


    With toll-free bridging, the compiler implicitly casts between Core Foundation
    and Foundation types. For example, a variable of type `CFStringRef` is used as
    an argument to an Objective-C method in [Listing 6-9](#9781430250500_Ch06.xhtml#list9).


    [*Listing 6-9.*](#9781430250500_Ch06.xhtml#_list9)  Toll-Free Bridging Implicit
    Cast


    ```

    CFStringRef cstr = CFStringCreateWithCString(NULL, "Hello, World!",

                                                     kCFStringEncodingASCII);

    NSArray *data = [NSArray arrayWithObject:cstr];

    ```


    The `[NSArray arrayWithObject:]` class method takes a parameter of type `id` (in
    other words, an Objective-C object pointer) as an argument, but is passed as `CFStringRef`.
    Because `CFStringRef` is a toll-free bridged data type, the `cstr` parameter is
    implicitly cast to an `NSString` object (see [Table 6-1](#9781430250500_Ch06.xhtml#Tab1)).
    To remove the compiler warning for the implicit cast, the parameter is cast, as
    shown in [Listing 6-10](#9781430250500_Ch06.xhtml#list10).


    [*Listing 6-10.*](#9781430250500_Ch06.xhtml#_list10)  Toll-Free Bridging Explicit
    Cast


    ```

    CFStringRef cstr = CFStringCreateWithCString(NULL, "Hello, World!",

                                                     kCFStringEncodingASCII);

    NSArray *data = [NSArray arrayWithObject:(NSString *)cstr];

    ```


    As mentioned in the previous section, the Objective-C compiler does not automatically
    manage the lifetimes of Core Foundation data types. Therefore, to use Core Foundation
    toll-free bridged types in ARC memory managed Objective-C programs, it is necessary
    to indicate the ownership semantics involved with these types. In fact, the code
    in [Listing 6-10](#9781430250500_Ch06.xhtml#list10), as is, will not compile when
    using ARC! For Objective-C programs that use ARC memory management, you must indicate
    whether the life cycle of a toll-free bridged type is to be managed by ARC or
    managed programmatically. You do this by using ARC bridged casts.


    ARC Bridged Casts'
