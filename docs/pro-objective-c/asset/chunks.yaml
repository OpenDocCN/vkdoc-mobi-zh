    Implementing Concurrent Operations


    Now you will create a program that implements a custom, concurrent operation.
    It will provide the same functionality as the program shown in [Listing 17-14](#9781430250500_Ch17.xhtml#list14)
    and enable you to compare the differences between the two implementations. In
    Xcode, create a new project by selecting **New ![image](images/arrow.jpg) Project
    . . .** from the Xcode File menu. In the **New Project Assistant** pane, create
    a command-line application. In the **Project Options** window, specify **GreetingOperation**
    for the Product Name, choose **Foundation** for the Project Type, and select ARC
    memory management by checking the **Use Automatic Reference Counting** check box.
    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    Next you will create the custom operation class. Select **New ![image](images/arrow.jpg)
    File . . .** from the Xcode File menu, select the **Objective-C** class template,
    and name the class **GreetingOperation**. Make the class a subclass of **NSOperation**,
    select the **GreetingOperation** folder for the files location and the **GreetingOperation**
    project as the target, and then click the **Create** button. In the Xcode project
    navigator pane, select the **GreetingOperation.m** file and update the class implementation,
    as shown in [Listing 17-19](#9781430250500_Ch17.xhtml#list19).


    [*Listing 17-19.*](#9781430250500_Ch17.xhtml#_list19)  GreetingOperation Implementation


    ```

    #import "GreetingOperation.h"


    @implementation GreetingOperation

    {

      BOOL finished;

      BOOL executing;

    }


    - (id)init

    {

      if ((self = [super init]))

      {

        executing = NO;

        finished = NO;

      }

      return self;

    }


    - (void)start

    {

      // If cancelled just return

      if ([self isCancelled])

      {

        [self willChangeValueForKey:@"isFinished"];

        finished = YES;

        [self didChangeValueForKey:@"isFinished"];

        return;

      }


    // Now execute in main method a separate thread

      [self willChangeValueForKey:@"isExecuting"];

      [NSThread detachNewThreadSelector:@selector(main) toTarget:self withObject:nil];

      executing = YES;

      [self didChangeValueForKey:@"isExecuting"];

    }


    - (void)main

    {

      @autoreleasepool

      {

        @try

        {

          if (![self isCancelled])

          {

            NSLog(@"Hello, World!");

            // Pause to simulate processing being performed by task

            [NSThread sleepForTimeInterval:3.0];

            NSLog(@"Goodbye, World!");


    [self willChangeValueForKey:@"isFinished"];

            [self willChangeValueForKey:@"isExecuting"];

            executing = NO;

            finished = YES;

            [self didChangeValueForKey:@"isExecuting"];

            [self didChangeValueForKey:@"isFinished"];

          }

        }

        @catch (NSException *ex) {}

      }

    }


    - (BOOL)isConcurrent

    {

      return YES;

    }


    - (BOOL)isExecuting

    {

      return executing;

    }


    - (BOOL)isFinished

    {

      return finished;

    }


    @end

    ```


    Compared to the nonconcurrent `GreetingOperation` implementation in [Listing 17-17](#9781430250500_Ch17.xhtml#list17),
    there are a number of changes. First, observe the declaration of two private variables.


    ```

    {

      BOOL finished;

      BOOL executing;

    }

    ```


    These variables are used to set and return the appropriate values for the `isFinished`
    and `isExecuting` methods. Recall that these methods (along with the `isConcurrent`
    method) must be overridden for concurrent operations. Now let’s look at the implementation
    of the `start` method. This was not implemented for the nonconcurrent version
    of the `GreetingOperation` class. First, it checks to see whether or not the operation
    has been cancelled; if it has, it simply sets the finished variable appropriately
    for KVO notifications and returns.


    ```

    if ([self isCancelled])

