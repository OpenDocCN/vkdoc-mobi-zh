    ## 线程同步


    如果您决定使用线程进行并发编程，Objective-C 平台提供了几种机制来管理共享状态并在线程之间执行同步。具体来说，Foundation 框架包含一组锁和条件变量
    API，它们提供了这些机制的面向对象实现，您将在接下来看到。


    ### 锁


    Foundation 框架包含几个类（`NSLock`、`NSRecursiveLock`、`NSConditionLock`、`NSDistributedLock`），它们实现了多种类型的锁，用于同步对共享状态的访问。锁用于保护*临界区*，即访问共享数据或资源的代码段，该代码段不能被多个线程并发执行。


    `NSLock` 为并发编程实现了一个基本的互斥锁。它符合 `NSLocking` 协议，因此实现了 `lock` 和 `unlock` 方法来分别获取和释放锁。在本章前面，您学习了
    `@synchronized` 原语，这是一个 Objective-C 语言特性，它实现了一个与 `NSLock` 相当的互斥锁。两者之间的主要区别在于：1）`@synchronized`
    指令隐式地创建锁，而 `NSLock` API 直接创建锁；2）`@synchronized` 指令为临界区隐式地提供了一个异常处理程序，而 `NSLock`
    类不提供此功能。代码清单 17-8 演示了如何使用 `NSLock` API 保护临界区。


    *代码清单 17-8.*  使用 NSLock 实例保护临界区


    ```

    NSLock *computeLock = [NSLock new];

    ...

    [computeLock lock];

    // 临界区代码

    ...

    [computeLock unlock];

    ```


    `NSDistributedLock` 类定义了一个锁，可供多个主机上的多个应用程序使用，以控制对共享资源的访问。与 `NSLock` 类不同，`NSDistributedLock`
    实例并不强制互斥，而是报告锁何时被占用，由使用该锁的代码根据锁状态适当地进行处理。代码清单 17-9 使用一个文件的路径（名为`/hello.lck`）创建了一个分布式锁，您希望将该文件用作锁定系统对象。


    *代码清单 17-9.*  使用 NSDistributedLock 实例控制对资源的访问


    ```

    NSDistributedLock *fileLock = [NSDistributedLock lockWithPath:@"/hello.lck"];

    // 访问资源

    ...

    ...

    // 解锁资源

    [fileLock unlock];

    ```


    `NSDistributedLock` 不遵循 `NSLocking` 协议。此外，由于此锁是使用文件系统实现的，因此必须显式地释放锁。如果应用程序在持有分布式锁时终止，其他客户端必须使用
    `NSDistributedLock` 的 `breakLock` 方法来解除此场景下的锁。


    `NSConditionLock` 类定义了一个互斥锁，它只能在特定条件下被获取和释放，该条件是一个您定义的整数值。条件锁通常用于确保任务按特定顺序执行；例如，在线程间的生产者-消费者流程中。代码清单
    17-10 创建了一个条件锁，用于在指定条件发生时获取锁。


    *代码清单 17-10.*  使用 NSConditionLock 实例控制对资源的访问


    ```

    NSConditionLock *datalock = [[NSConditionLock alloc] initWithCondition:NO];

    ...

    // 获取锁 - 缓冲区中无数据

    [dataLock lock];

    // 将数据添加到缓冲区

    ...

    // 带条件解锁 - 缓冲区中有数据

    [dataLock unlockWithCondition:YES];

    ```


    `NSRecursiveLock` 类定义了一个锁，它可以被同一个线程多次获取而不会导致死锁。它会跟踪被获取的次数，并且在释放锁之前，必须通过相应次数的 `unlock`
    调用来平衡。


    ### 条件


    条件变量是一种锁，可用于同步操作的执行顺序。与锁相比，试图获取条件的线程会保持阻塞状态，直到该条件被另一个线程显式地发出信号。此外，等待某个条件的线程会保持阻塞状态，直到该条件被另一个线程显式地发出信号。实际上，条件变量允许线程根据数据的实际值进行同步。


    Foundation 框架的 `NSCondition` 类实现了一个条件变量。使用条件对象的逻辑如下：


    1.  锁定条件对象并检查其对应的 `BOOL` 条件表达式。

    2.  如果条件表达式计算结果为 `YES`，则执行相关任务，然后转到步骤 4。

    3.  如果条件表达式计算结果为 `NO`，则使用条件对象的 `wait` 或 `waitUntilDate:` 方法阻塞线程，然后重新测试（步骤 2）。

    4.  可选地，再次使用条件对象的 `signal` 或 `broadcast` 方法发出信号，或更改条件表达式的值。

    5.  解锁条件对象。


    代码清单 17-11 提供了一个入口点例程的模板，该例程使用名为 `condition` 的 `NSCondition` 对象来消费和处理数据。


    *代码清单 17-11.*  使用 NSCondition 实例同步对共享数据的消费者操作


    ```

    - (void)consumerTask

    {

      @autoreleasepool

      {

        // 为条件变量获取锁并测试布尔条件

        [condition lock];

        while (!self.dataAvailable)

        {

          [condition wait];

        }


    // 数据可用，现在处理它（此处未提供代码）

        ...


    // 处理完成，更新谓词值并发出条件信号

        self.dataAvailable = NO;

        [condition signal];


    // 解锁条件变量

        [condition unlock];

      }

    }

    ```


    相应的用于生成数据供 `consumerTask` 方法处理的入口点例程如代码清单 17-12 所示。


    *代码清单 17-12.*  使用 NSCondition 实例同步对共享数据的生产者操作


    ```

    - (void)producerTask

    {

      @autoreleasepool

      {

        // 为条件变量获取锁并测试布尔条件

        [condition lock];

        while (self.dataAvailable)

        {

          [condition wait];

        }


    // 检索数据以供处理（此处未提供代码）

        ....


    // 检索数据完成，更新谓词值并发出条件信号

        self.dataAvailable = YES;

        [condition signal];

    ```

