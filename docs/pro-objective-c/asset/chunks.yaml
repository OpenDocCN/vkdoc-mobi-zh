    \ 对象。\n\n## ARC 与对象所有权\n\n回顾第 4 章，Objective-C 代码创建存储在动态分配内存（堆）中的对象。在堆上创建的对象永远不会超出作用域，因此需要应用程序内存管理来确保这些对象在不再使用时从内存中移除，并且程序不会错误地释放仍在使用的对象。Objective-C\
    \ 使用引用计数模型实现内存管理，通过对对象的唯一引用来判断对象是否仍在使用。ARC 通过在编译时插入代码来自动化此任务，根据引用计数模型，正确地平衡对象上的\
    \ `retain` 和 `release` 消息。ARC 禁止对对象生命周期进行编程控制。具体来说，你不能发送 `retain` 或 `release`\
    \ 消息来控制对象的所有权权益。因此，理解 ARC 下关于对象所有权的规则非常重要。\n\n### 声称对象的所有权权益\n\n你的 Objective-C\
    \ 代码对使用任何以 `alloc`、`new`、`copy` 或 `mutableCopy` 开头的方法创建的任何对象拥有所有权权益。如清单 6-1 所示的\
    \ `main()` 函数使用 `alloc` 方法创建了一个 `Atom` 对象，因此声称对该对象拥有所有权权益。\n\n*清单 6-1.*  创建 Atom\
    \ 对象\n\n```\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    Atom *atom = [[Atom alloc] init];\n    [atom logInfo];\n  }\n\nreturn\
