- fmt: '# Objective-C 特性


    - **面向对象编程（Object-oriented programming）**：`Objective-C`编程语言提供了对面向对象编程（OOP）的完整支持，包括对象消息传递、封装、继承、多态和开放递归等能力。

    - **对象消息传递（Object messaging）**：对象消息传递使对象能够通过相互传递消息来进行协作。实际上，`Objective-C`代码（例如，一个类/对象方法或一个函数）向接收对象（*receiver*）发送一条消息，接收者使用该消息调用其对应的方法，如果需要则返回结果。如果接收者没有对应的方法，它可以通过其他方式处理该消息，例如将其转发给另一个对象、广播给其他对象、内省并应用自定义逻辑等。

    - **动态运行时（Dynamic runtime）**：与许多其他支持OOP的语言相比，`Objective-C`非常动态。它将类型、消息和方法解析的大部分责任转移到了运行时，而不是编译时或链接时。这些能力可用于促进程序的实时开发和更新（无需重新编译和重新部署软件），以及长期演进（对现有软件影响极小或无影响）。

    - **内存管理（Memory management）**：`Objective-C`提供了一种内存管理能力，即自动引用计数（`ARC`），它既简化了应用程序开发，又提高了应用程序性能。`ARC`是一种编译时技术，融合了传统自动内存管理机制（即垃圾回收器）的许多优点。然而，与传统技术相比，`ARC`提供了更好的性能（内存管理代码在编译时与程序代码交错），并且不会在程序执行中引入内存管理引起的暂停。

    - **内省与反射（Introspection and Reflection）**：`Objective-C`语言包含一些特性，使程序能够在运行时查询对象，提供信息（其类型、属性和支持的方法），并修改其结构和行为。这使得程序可以在其执行生命周期中被修改。

    - **C语言支持（C language support）**：`Objective-C`主要是C语言的面向对象扩展。它是C的超集。这意味着可以使用C语言的原始能力，并且可以直接访问C库。

    - **苹果技术（Apple technologies）**：苹果为`Objective-C`应用程序开发提供了丰富的软件库和工具。开发套件包含框架和库，这些框架和库提供了基础设施，使您能够专注于开发特定于应用程序的逻辑。苹果的集成开发环境`Xcode`提供了开发优秀`Objective-C`应用程序所需的所有工具。


    这些只是`Objective-C`在开发者中持续受欢迎的众多原因中的一部分——我相信随着您继续阅读本书，您会发现更多原因。好了，说够了。现在让我们用`Xcode`来实际体验一下`Objective-C`，看看它到底能做什么！


    # 开发一个简单的 Objective-C 程序


    掌握编程语言的最佳方法是通过实践来学习，所以现在您将开始编写一些代码！但首先，让我们下载并安装`Xcode`。


    `Xcode`是一个完整的`Objective-C`软件开发集成开发环境（IDE），适用于Mac。它与iOS和OS X完全集成，并包含编写和编译源代码、开发复杂用户界面、软件测试和调试、发布构建和版本管理、项目管理以及许多其他功能所需的所有工具。`Xcode`对所有苹果iOS和Mac开发者计划的成员免费提供。如果您不是任一计划的成员，也可以从Mac
    App Store免费下载。本书中的示例是使用当前版本`Xcode 4.5`开发的。此版本的IDE可以在任何安装了OS X Lion或更高版本的Intel
    Mac计算机上运行。


    ## 创建项目


    下载并安装`Xcode`后，启动该程序。将显示[图 1-1](#9781430250500_Ch01.xhtml#Fig1)中所示的`Xcode`欢迎窗口。


    ![9781430250500_Fig01-01.jpg](images/9781430250500_Fig01-01.jpg)


    [图 1-1](#9781430250500_Ch01.xhtml#_Fig1). `Xcode`欢迎窗口


    **注意**：如果您有iOS设备（例如`iPhone`/`iPod`/`iPad`）连接到计算机，您可能会看到一条消息询问您是否要使用该设备进行开发。由于您不会在此处开发移动应用，您应该单击*Ignore*按钮。


    此屏幕为您提供了多种选项：您可以访问苹果开发者门户，了解更多关于`Xcode`的信息等。因为您要创建一个新的应用程序，请选择**Create a new Xcode
    project**选项，方法是从`Xcode`的**文件**菜单中选择**New** ![image](images/arrow.jpg) **Project...**。将显示`Xcode`工作区窗口，随后在其顶部显示新建项目助手窗格，如[图
    1-2](#9781430250500_Ch01.xhtml#Fig2)所示。


    ![9781430250500_Fig01-02.jpg](images/9781430250500_Fig01-02.jpg)


    [图 1-2](#9781430250500_Ch01.xhtml#_Fig2). `Xcode`新建项目助手


    新建项目助手的左侧分为iOS和OS X两部分。您将开始创建一个命令行应用程序，因此在OS X部分下选择**Application**。在右上角窗格中，您会看到几个图标，每个图标代表一个项目模板，这些模板是创建OS
    X应用程序的起点。选择**Command Line Tool**并单击**Next**。将显示项目选项窗口（如[图 1-3](#9781430250500_Ch01.xhtml#Fig3)所示），供您输入项目特定信息。


    ![9781430250500_Fig01-03.jpg](images/9781430250500_Fig01-03.jpg)


    [图 1-3](#9781430250500_Ch01.xhtml#_Fig3). `Xcode`项目选项窗口


    请指定以下内容：


    - **Product Name**（产品名称）：项目的名称（在此示例中为`Elements`）。

    - **Organization Name**（组织名称）：开发者的标识符（通常是一个人或者组织）；此名称将包含在源文件顶部的版权注释中。

    - **Company Identifier**（公司标识符）：用于为应用程序提供标识符的名称；通常输入类似您的域名反向顺序的内容，但任何名称都可以。

    - **Type**（类型）：应用程序的类型（`Xcode`支持多种应用程序类型，包括C、C++等；此处为使用`Foundation`框架的`Objective-C`项目选择**Foundation**）。

    - 最后，选中复选框以指定项目将使用**Automatic Reference Counting**（自动引用计数）进行内存管理。


    提供此信息后，单击**Next**以显示输入项目名称和位置的窗口（请参见[图 1-4](#9781430250500_Ch01.xhtml#Fig4)）。


    ![9781430250500_Fig01-04.jpg](images/9781430250500_Fig01-04.jpg)


