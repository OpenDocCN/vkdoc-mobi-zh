  trans: "\nXcode 提供处理多种文件类型的默认构建规则，包括基于 C 的文件（如 Objective-C 文件）和汇编文件。你可以为每个目标添加自定义构建规则来处理其他类型的文件。这些规则在编辑器窗口的**构建规则**窗格中添加，如图\
    \ B-1 所示。构建规则按照它们在规则窗格中出现的顺序进行处理。\n\n![9781430250500_AppB-01.jpg](img/9781430250500_AppB-01.jpg)\n\
    \n图 B-1. 构建规则编辑窗格\n\n## 创建配置文件设置文件\n\n在此示例中，你将使用 Xcode 为项目创建一个纯文本的构建设置配置文件。\n\n\
    1.  在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg) 项目…**来创建一个新项目。\n\
    2.  在**新项目助手**窗格中，创建一个命令行应用程序。\n3.  在**项目选项**窗口中，为产品名称指定 **ConfigSettingsProject**，为项目类型选择\
    \ **Foundation**，并通过选中**使用自动引用计数**复选框来选择 ARC 内存管理。\n4.  在文件系统中指定要创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，然后单击**创建**按钮。\n\
    5.  现在你将创建配置文件设置文件。从 Xcode 文件菜单中选择**新建 ![image](img/arrow.jpg) 文件…**，然后从 OS X\
    \ 下的**其他**选项中选择**配置文件设置文件**模板（如图 B-2 所示）。\n\n![9781430250500_AppB-02.jpg](img/9781430250500_AppB-02.jpg)\n\
    \n图 B-2. 选择配置文件设置文件\n\n6.  将文件命名为 **Test**，选择 **ConfigSettingsProject** 文件夹作为文件位置，选择\
    \ **ConfigSettingsProject** 项目作为目标，然后单击**创建**按钮。\n7.  这将创建一个名为 `Test.xconfig`\
    \ 的空配置文件设置文件。现在更新此文件以支持测试期间的代码覆盖率。这可以通过将配置标志设置为**启用测试覆盖率**和**检测程序流程**来实现。\n\n\
    ```\n    GCC_GENERATE_TEST_COVERAGE_FILES=YES\n    GCC_INSTRUMENT_PROGRAM_FLOW_ARCS=YES\n\
    ```\n\n8.  在 Xcode 中，选择并更新 `Test.xconfig` 文件，如图 B-3 所示。\n\n![9781430250500_AppB-03.jpg](img/9781430250500_AppB-03.jpg)\n\
    \n图 B-3. 编辑配置文件设置文件以支持代码覆盖率\n\n现在你需要将此文件中的设置添加到项目的当前构建配置中。\n\n1.  在 Xcode 项目导航器中，选择\
    \ **ConfigSettingsProject**，然后在项目编辑器中选择 **ConfigSettingsProject**，最后在编辑器窗口中选择**信息**标签。注意，**调试**配置（在编辑器窗口中的**配置**下）未设置任何配置。\n\
    2.  点击调试旁边的箭头以显示 ConfigSettingsProject，然后在配置文件下拉列表中选择 **Test**（如图 B-4 所示），以使用\
    \ `Test.xconfig` 文件中的值更新调试配置设置。\n\n![9781430250500_AppB-04.jpg](img/9781430250500_AppB-04.jpg)\n\
    \n图 B-4. 将配置文件设置分配给构建配置\n\n调试配置的设置现已更新。你可以通过查看更新后的测试覆盖率构建设置来进行检查（参见图 B-5）。\n\n\
    ![9781430250500_AppB-05.jpg](img/9781430250500_AppB-05.jpg)\n\n图 B-5. 更新后的测试覆盖率构建设置\n\
    \nXcode 构建设置参考提供了 Xcode 可用的各种构建设置的全面参考。\n\n## 项目\n\n一个 Xcode 项目由一个或多个软件产品的工件以及用于构建这些产品并对其执行操作的机制组成。因此，它不仅包含了构建一个或多个软件产品的所有元素，还维护了这些元素之间的关系。每个\
    \ Xcode 项目由以下项目组成：\n\n*   *项目内容*。项目内容包括源文件、资源、属性列表设置文件、预编译头文件、本地化文件等）。\n*   *测试内容*。测试内容包括自动化测试源文件和任何所需的测试资源。\n\
    *   *Xcode 项目文件*。Xcode 项目文件实际上是一个子目录。它包含与其所属项目相关的各种文件和目录。项目文件工件提供了构建产品并对其执行选定操作所需的基础设施。Xcode\
    \ 项目文件的命名遵循约定 `ProjectName.xcodeproj`，其中 `ProjectName` 是 Xcode 项目的名称。Xcode 项目文件中的文件（和目录）包含以下信息：\n\
    \    *   对项目内容和测试内容（源代码、库和框架（内部和外部）、资源文件、故事板和 nib 文件）的引用。\n    *   用于组织源文件的组文件夹。\n\
    \    *   目标，每个目标包含对该项目构建的一个产品、构建该产品所需的源文件的引用以及可用于构建该产品的构建配置的引用。\n    *   项目级别的构建配置。\n\
    \    *   可执行环境。\n\n例如，一个名为 `GreetingProject` 的 Xcode 项目将由以下文件和目录组成：\n\n*   一个名为\
    \ `GreetingProject` 的子目录，其中存储了所有项目内容文件。\n*   一个名为 `GreetingProjectTests` 的子目录，其中存储了所有测试内容文件。\n\
    *   一个名为 `GreetingProject.xcodeproj` 的 Xcode 项目文件，其中包含前面列出的 Xcode 项目文件信息。\n\n\
    Xcode 项目可以是独立的，也可以包含在工作区中。你将在本附录后面了解工作区。\n\n## 可执行环境\n\n可执行环境定义了用于从 Xcode 运行软件产品的配置。该配置指定了在运行/调试产品时要启动的可执行文件、要传递给可执行文件的命令行参数（如果有的话），以及在运行程序时要设置的任何环境变量。可执行环境设置通过项目*方案*进行编辑。你将在本附录稍后了解方案。\n\
    \n## 工作区\n\n工作区是 Xcode 用于支持和组织多个项目的机制。工作区将项目和其他相关文档分组，从而促进多产品开发。你可以共享项目之间的代码，而无需手动复制和粘贴项目依赖项（例如，库及其对应的公共头文件），同时仍然可以单独管理每个项目。Xcode\
    \ 工作区可以发现项目之间的隐式依赖关系，从而在构建期间自动解决这些依赖关系。此外，工作区还使你能够更轻松地创建和使用外部（即第三方）软件库。\n\n实际上，每个工作区都是一个由元数据组成的\
    \ Xcode 文档，其中可以包含任意数量的 Xcode 项目，以及你想要包含的任何其他文件。除了组织每个 Xcode 项目中的所有文件之外，工作区还提供了所包含项目及其目标之间的隐式和显式关系。工作区文档包含指向所包含项目和其他文件的指针，但不包含其他数据。一个项目可以属于多个工作区。\n"
- fmt: 'You can include a project in a workspace by simply dragging the project file
    into the workspace (or by using an Xcode command to add files to a workspace)
    and it becomes available for use by all other projects in the workspace. However,
    projects in a workspace are still managed separately, and builds of software products
    within a workspace will automatically resolve dependencies between projects (and
    recompile these projects as necessary if their contents have been updated).


    By default, all the Xcode projects in a workspace are built in the same directory,
    referred to as the *workspace build directory*. Each workspace has its own build
    directory. Because all of the files in all of the projects in a workspace are
    in the same build directory, all of these files are visible to each project. Therefore,
    if two or more projects use the same libraries, you don’t need to copy them into
    each project folder separately.


    `Xcode` examines the files in the build directory to discover implicit dependencies.
    For example, if one project included in a workspace builds a library that is linked
    against another project in the same workspace, `Xcode` automatically builds the
    library before building the other project, even if the build configuration does
    not make this dependency explicit. You can override such implicit dependencies
    with explicit build settings, if necessary. For explicit dependencies, you must
    create project references.


    Each project in a workspace continues to have its own independent identity. To
    work on a project without affecting—or being affected by—the other projects in
    the workspace, you can open the project without opening the workspace, or you
    can add the project to another workspace. Because a project can belong to more
    than one workspace, you can work on your projects in any number of combinations
    without having to reconfigure any of the projects or workspaces.


    You can use the workspace''s default build directory or you can specify one. If
    a project specifies a build directory, the build directory of whatever workspace
    the project is in at the time you build the project overrides that directory.


    ## Adding an Existing Project to a Workspace


    In Xcode, perform the following steps to add an existing project to a workspace:


    1. In the project navigator, Control-click in the empty space below the projects
    in the list. In the pop-up menu that follows, select **Add Files to “<WorkspaceName>”…**,
    where *WorkspaceName* is the name of the workspace.

    2. Navigate to the folder containing the corresponding Xcode project file (it
    ends with `.xcodeproj`).

    3. Select the project file and click **Add**.


    The project is now part of the workspace, and thus its contents can be shared
    with other projects in the workspace.


    ## Using Static Libraries in a Workspace


    Now you will learn how to incorporate static libraries into a workspace. Briefly,
    the steps you will perform are as follows:


    1. Create workspace.

    2. Create static library.

    3. Create app.


    **Note**   The following example program was developed using Xcode version 4.6.3.
    Xcode version 4.5 or greater is required for the configuration steps documented
    in this example (particularly those used to share static libraries) to work properly.


    ### Creating a Workspace


    First, you will create a workspace that you will use for the library and app.


    1. In Xcode, create a new workspace by selecting **New ![image](images/arrow.jpg)
    Workspace …** from the Xcode File menu.

    2. Save the workspace as **HelloSpace** in a new folder named `Hello`. As shown
    in [Figure B-6](#9781430250500_AppB.xhtml#Fig6), a new workspace named `HelloSpace.xcworkspace`
    is displayed in the Xcode window.


    ![9781430250500_AppB-06.jpg](images/9781430250500_AppB-06.jpg)


    [Figure B-6](#9781430250500_AppB.xhtml#_Fig6). HelloSpace workspace


    As you learned earlier, a workspace builds its projects in a *Derived Data* directory.
    The location for this directory must be identical at the project level and as
    specified in the Xcode preferences pane.'
