    programming* (AOP) in Objective-C. AOP is a programming paradigm that aims to
    increase program modularity by separating *cross-cutting* functionality (that
    rely on or affect many parts of a program) from its other parts. `NSProxy` is
    a Foundation Framework class specifically designed for proxying. It functions
    as the interface to the real class. Here, you create a subclass of `NSProxy` and
    implement the `forwardInvocation:` method, thereby enabling messages sent to the
    real (i.e., subject) class to be decorated with the desired cross-cutting functionality.
    An overall diagram of the components that you’ll implement in this program and
