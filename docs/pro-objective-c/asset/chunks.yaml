    \ 方法与标准对象消息的不同之处在于，它允许你在运行时发送消息，因为可以传递一个变量选择器值作为参数。\n\n`NSObject` 协议中声明了 `performSelector:`\
    \ 方法的几种变体。这些变体在消息指定的参数数量（0–2）上有所不同（`performSelector:`、`performSelector:withObject:`、`performSelector:withObject:withObject:`）。`NSObject`\
    \ 类还定义了多个 `performSelector:` 方法。这些方法在向对象发送消息时提供了额外的功能，具体包括：\n\n*   线程选择（当前线程、后台线程、用户指定线程）\n\
    *   方法调用语义（同步、阻塞）\n*   事件处理模式\n*   方法调用延迟\n\n例如，`performSelector:withObject:afterDelay:`\
    \ 方法在指定延迟后向对象发送消息。以下语句演示了如何使用此方法在延迟 5 秒后向对象发送消息。\n\n```\n[atom performSelector:@selector(logInfo)\
    \ withObject:nil afterDelay:5.0];\n```\n\n### 创建和初始化\n\n现在，我们来学习几个用于类加载和初始化的 `NSObject`\
    \ 方法。`initialize` 类方法用于在类加载后、首次使用前（即在该类或其任何继承类接收到第一条消息之前）对其进行初始化。此方法在程序执行期间最多对每个类调用一次；实际上，如果该类未被使用，则不会调用该方法。`initialize`\
    \ 方法是线程安全的，并且总是在发送给类本身之前，先发送给该类的所有超类。为了防止该方法被调用两次（由超类以及目标类调用），应使用验证调用者是否为目标类（而非超类）的逻辑来实现\
    \ `initialize` 方法（如代码清单 10-1 所示）。\n\n*代码清单 10-1.*  NSObject initialize 方法设计\n\n\
    ```\n+ (void)initialize\n{\n  if (self == [MyClass class])\n  {\n    // 初始化逻辑\n\
    \  }\n}\n```\n\n代码清单 10-1 展示了条件测试确保了初始化逻辑仅在接收者的类是实现 `initialize` 方法的类时才执行。\n\n\
    如果实现了，`NSObject` 的 `load` 类方法也会在类加载后被调用一次。它与 `initialize` 方法在以下几个方面有所不同：\n\n*\
    \   `load` 方法在类加载后很快被调用，早于 `initialize` 方法。实际上，对于静态链接的类（即属于程序可执行文件一部分的类），`load`\
    \ 方法会在 `main()` 函数之前被调用。如果 `load` 方法实现在可加载包中的类里，它将在该包被动态加载时运行。使用 `load` 方法需要非常小心，因为它在应用程序启动的早期就被调用了。具体来说，当调用此方法时，程序的自动释放池（通常）尚不存在，其他类可能尚未加载，等等。\n\
    *   `load` 方法可以同时为类和分类实现；实际上，一个类的每个分类都可以实现自己的 `load` 方法。`initialize` 方法绝不应在分类中被重写。\n\
    *   `load` 方法（如果实现了）在类加载后被调用一次。`initialize` 方法（如果实现了）在类接收到第一条消息时被调用一次；如果该类未被使用，则不会调用该方法。\n\
    \n`NSObject` 的 `new` 类方法分配一个新的对象实例然后初始化它。它在一个单独的方法中结合了 `alloc` 和 `init` 方法。以下两条对象创建和初始化语句是等价的。\n\
    \n```\nAtom *atom = [[Atom alloc] init];\nAtom *atom = [Atom new];\n```\n\n`new`\
    \ 方法调用类的默认 `init` 方法；它不会调用自定义的 `init` 方法。\n\n## NSProxy\n"
- fmt: '`NSProxy`类是一个用于实现代理模式的*抽象*根类。它实现了一组最小的方法，从而使得几乎所有发送给它的消息都能被捕获并转发给目标主体。`NSProxy`实现了`NSObject`协议中声明的方法，并声明了两个必须由子类实现的方法：


    ```

    - (void)forwardInvocation:(NSInvocation *)anInvocation;

    - (NSMethodSignature *)methodSignatureForSelector:(SEL)aSelector;

    ```


    **注意** *抽象类*被定义为不能直接实例化的类；它可能没有实现或只有不完整的实现。它也可能有需要被实现的方法。Objective-C 在语言层面没有对抽象类的支持；按照惯例，你在
    Objective-C 中将一个没有初始化方法并且有一个或多个需要实现的方法的类指定为抽象类。因此，一个抽象类（例如，`NSProxy`）的具体子类必须实现未实现的方法以及至少一个初始化方法（即一个`init`方法）。


    此外，`NSProxy`子类（即*具体子类*）应声明并实现至少一个`init`方法，以符合 Objective-C 关于对象创建和初始化的约定。Foundation
    框架包含几个`NSProxy`的具体子类：


    *   `NSDistantObject`：定义用于其他应用或线程中对象的代理。

    *   `NSProtocolChecker`：定义一个限制可以发送给另一个对象的消息的对象。


    在第 9 章中，你实现了一个`NSProxy`的具体子类`AspectProxy`，以在代理对象周围提供横切（AOP）功能。这些例子仅仅说明了`NSProxy`类的众多用途中的一小部分。


    ## 字符串


    Foundation 框架包含一组用于操作字符串的 API。这些类支持的操作包括：


    *   创建、转换和格式化字符串

    *   从文件或资源读取字符串以及写入字符串

    *   字符串查询、排序和比较


    在 Objective-C 中，字符串被表示为一个对象。这意味着字符串可以在任何其他对象可以使用的地方使用（例如在集合中）。每个字符串对象由一个 Unicode（即文本）字符数组组成。Foundation
    框架的`NSString`和`NSMutableString`类为字符串对象提供 API。`NSAttributedString`和`NSMutableAttributedString`类管理具有相关属性（例如，字体、段落样式、前景色等）的字符串。这些属性通过名称标识，并存储在
    Foundation 框架的`NSDictionary`对象中。


    **注意** `NSString`和`NSMutableString`是`NSString`类簇的成员。*类簇*设计模式在 Foundation 框架中被广泛使用，用于将许多具有公共基接口的相关类分组。同样地，`NSAttributedString`和`NSMutableAttributedString`是`NSAttributeString`类簇的成员。在这两个类簇中，每个配对中的可变类声明了额外的方法，允许修改其（字符串）内容。


    这个类家族支持创建不可变和可变的字符串对象、属性字符串以及 Unicode 字符。


    ### NSString


    `NSString`和`NSMutableString`为管理字符串的 Objective-C 对象提供 API。`NSString`类管理*不可变*字符串，这些字符串在创建时定义，随后无法更改。`NSMutableString`是`NSString`的*可变*（其内容可以被编辑）子类。


    `NSMutableString`在其超类（`NSString`）定义的方法之上添加了用于创建和初始化（可变）字符串以及修改字符串的方法。


    #### 创建和初始化


    `NSString`类定义了许多用于创建和初始化字符串的方法。`NSString`的`init`方法返回一个没有字符的已初始化的`NSString`对象。`NSString`类还定义了众多带参数的初始化方法。这些方法都以`init`开头，使您能够用字符、字节缓冲区、文件内容、URL
    内容、C 字符串、UTF8 字符串等来初始化`NSString`对象。


    #### 扫描值


    `NSString`类包含许多用于从字符串对象中检索原始值的方法。这些方法支持基本的原始类型（即`int`、`float`等）和 Foundation 框架的`NSInteger`类型。这些方法遵循一种命名约定，即返回类型构成方法名称的前缀。相应的方法签名如**列表
    10-2**所示。


    [*列表 10-2.*] NSString 用于检索原始值的方法


    ```

    - (int) intValue;

    - (float) floatValue;

    - (double) doubleValue;

    - (long long) longLongValue;

    - (bool) boolValue;

    - (NSInteger) integerValue;

    ```


    以下示例为字符串`"17"`返回一个分配给变量`myValue`的`int`类型的结果。


    ```

    int myValue = [@"17" intValue];

    ```


    如果字符串不以有效的十进制数字文本表示开头，这些方法中的每一个都会返回值 0。另请注意，这些方法不支持本地化。Foundation 框架的`NSScanner`类提供了用于将`NSString`对象读取并转换为数字和字符串值的附加功能（包括本地化）。以下代码片段使用`NSScanner`类为字符串`"17"`设置变量`myValue`（`int`类型）。


    ```

    NSScanner *scanner = [NSScanner scannerWithString:@"17"];

    BOOL success = [scanner scanInt:&myValue];

    ```


    `NSScanner`的`scanInt:`方法在被扫描的字符串是数字时返回`YES`的`BOOL`值；如果返回`NO`，则存储在变量`myValue`中的值无效。


    #### 字符串搜索和比较


    `NSString`类包含几个用于在字符串对象内搜索子字符串的方法。`rangeOfString:`方法都返回一个*范围*，用于标识输入字符串在接收器对象中首次出现的位置。返回的值是一个`NSRange`实例，这是一个
    Foundation 框架的数据类型，用于描述一系列内容的一部分。`NSRange`被定义为一个包含两个元素的结构：


    *   *location*：一个`NSUInteger`，指定范围的起始位置。

    *   *length*：一个`NSUInteger`，指定范围的长度。


    以下代码片段返回一个分配给变量`worldRange`的`NSRange`实例，该实例标识字符串`"World"`在字符串`"Hello, World!"`中首次出现的位置。


    ```

    NSString *greeting = @"Hello, World!";

    NSRange worldRange = [greeting rangeWithString:@"World"];

    ```


    在前面的例子中，`worldRange`的元素的值分别是*六*（location）和 5（length）。几个`rangeOfString:`方法提供了额外的参数，使您能够指定字符串比较选项、要在接收器对象中搜索的范围以及用于搜索的区域设置。


    `NSString`的`rangeOfCharacterFromSet:`方法也执行基于范围的搜索。它们与`rangeOfString:`方法的不同之处在于，它们返回一个范围，该范围指定在接收器字符串中从给定字符集中找到的第一个字符的位置。字符集输入参数是`NSCharacterSet`类型，这是一组（符合
    Unicode 标准的）字符。以下代码片段返回一个`NSRange`实例，该实例标识字符串`"Hello, World!"`中标点符号（例如，句号、感叹号等）首次出现的位置。


    ```

    NSCharacterSet *chars = [NSCharacterSet punctuationCharacterSet];

    NSRange charRange = [@"Hello, World!" rangeOfCharacterFromSet:chars];

    ```'
  raw: 'The `NSProxy` class is an *abstract* root class used to implement the proxy
    pattern. It implements a minimal set of methods, thereby enabling almost all messages
    sent to it being captured and proxied to the target subject. `NSProxy` implements
    the methods declared by the `NSObject` protocol and declares two methods that
    must be implemented by subclasses:


    ```

    - (void)forwardInvocation:(NSInvocation *)anInvocation;

    - (NSMethodSignature *)methodSignatureForSelector:(SEL)aSelector;

    ```


    **Note**   An *abstract class* is defined as a class that cannot be directly instantiated;
    it may have either no implementation or an incomplete implementation. It may also
    have methods that are required to be implemented. Objective-C does not have language-level
    support for abstract classes; by convention, you specify an abstract class in
    Objective-C as one with no initializer and one or more methods that require implementation.
    Hence, a concrete subclass for an abstract class (e.g., `NSProxy`) must implement
    the unimplemented methods and at least one initializer (i.e., one `init` method).


    Additionally, an `NSProxy` subclass (i.e., a *concrete subclass*) should declare
    and implement at least one `init` method to conform to Objective-C conventions
    for object creation and initialization. The Foundation Framework includes several
    concrete subclasses of `NSProxy`:


    *   `NSDistantObject`: Defines proxies for objects in other applications or threads.

    *   `NSProtocolChecker`: Defines an object that restricts the messages that can
    be sent to another object.


    In [Chapter 9](#9781430250500_Ch09.xhtml), you implemented an `NSProxy` concrete
    subclass, `AspectProxy`, to provide cross-cutting (AOP) functionality around a
    proxied object. These examples illustrate just a few of the many uses for the
    `NSProxy` class.


    Strings


    The Foundation Framework includes a set of APIs used to manipulate character strings.
    The operations supported by these classes include:


    *   Creating, converting, and formatting strings

    *   Reading and writing strings to/from a file or resource

    *   String query, sorting, and comparison


    In Objective-C a string is represented as an object. This means that strings can
    be used wherever other objects can be used (in collections, etc.). Each string
    object is composed of an array of Unicode (i.e., text) characters. The Foundation
    Framework `NSString` and `NSMutableString` classes provide the APIs for string
    objects. The classes `NSAttributedString` and `NSMutableAttributedString` manage
    strings that have associated attributes (e.g., font, paragraph style, foreground
    color, etc.). The attributes are identified by name and stored in a Foundation
    Framework `NSDictionary` object.


    **Note**   `NSString` and `NSMutableString` are members of the `NSString` class
    cluster. The *class cluster* design pattern is used extensively in the Foundation
    Framework for grouping a number of related classes with a common base interface.
    Likewise, `NSAttributedString` and `NSMutableAttributedString` are members of
    the `NSAttributeString` class cluster. In the case of these two class clusters,
    the mutable class of each pair declares additional methods that allow their (string)
    contents to be modified.


    This family of classes supports the creation of immutable and mutable string objects,
    attributed strings, and Unicode characters.


    NSString


    `NSString` and `NSMutableString` provide the APIs for Objective-C objects that
    manage strings. The `NSString` class manages *immutable* strings, strings that
    are defined when they are created and, subsequently, can’t be changed. `NSMutableString`
    is the *mutable* (its contents can be edited) subclass of `NSString`.


    `NSMutableString` adds methods above those defined by its superclass (`NSString`)
    to create and initialize a (mutable) string, and to modify a string.


    Creation and Initialization


    The `NSString` class defines numerous methods for creating and initializing strings.
    The `NSString init` method returns an initialized `NSString` object with no characters.
    The `NSString` class also defines numerous initializers with parameters. These
    methods all begin with `init` and enable you to initialize an `NSString` object
    with characters, a byte buffer, contents of a file, contents of a URL, a C string,
    a UTF8 string, and so forth.


    Scanning Values


    The `NSString` class contains numerous methods for retrieving a primitive value
    from a string object. These methods support basic primitives (i.e., `int`, `float`,
    etc.) and the Foundation Framework `NSInteger` type. These methods follow a naming
    convention whereby the return type forms the prefix of the method name. The corresponding
    method signatures are shown in [Listing 10-2](#9781430250500_Ch10.xhtml#list2).


    [*Listing 10-2.*](#9781430250500_Ch10.xhtml#_list2)  NSString Methods for Retrieving
    Primitive Values


    ```

    - (int) intValue;

    - (float) floatValue;

    - (double) doubleValue;

    - (long long) longLongValue;

    - (bool) boolValue;

    - (NSInteger) integerValue;

    ```


    The following example returns a result of type `int` assigned to the variable
    `myValue` for the string `"17"`.


    ```

    int myValue = [@"17" intValue];

    ```


    Each of these methods returns a value of 0 if the string doesn’t begin with a
    valid decimal text representation of a number. Also note that these methods don’t
    support localization. The Foundation Framework `NSScanner` class provides additional
    functionality (including localization) for reading and converting `NSString` objects
    into numeric and string values. The following code fragment uses the `NSScanner`
    class to set the variable `myValue` (of type `int`) for the string `"17"`.


    ```

    NSScanner *scanner = [NSScanner scannerWithString:@"17"];

    BOOL success = [scanner scanInt:&myValue];

    ```


    The NSScanner `scanInt:` method returns a `BOOL` value of `YES` if the scanned
    string is numeric; if it returns `NO`, then the value stored in the variable `myValue`
    is not valid.


    String Search and Comparison


    The `NSString` class includes several methods to search for a substring within
    a string object. The `rangeOfString:` methods each return a *range* that identifies
    the first occurrence of an input string within the receiver object. The returned
    value is an `NSRange` instance, a Foundation Framework data type used to describe
    a portion of a series. NSRange is defined as a structure with two elements:


    *   *location*: An `NSUInteger` that specifies the start of the range.

    *   *length*: An `NSUInteger` that specifies the length of the range.


    The following code fragment returns an `NSRange` instance assigned to the variable
    `worldRange` that identifies the first occurrence of the string `"World"` within
    the string `"Hello, World!"`.


    ```

    NSString *greeting = @"Hello, World!";

    NSRange worldRange = [greeting rangeWithString:@"World"];

    ```


    In the preceding example, the elements of `worldRange` have the values *six* (location)
    and 5 (length). Several of the `rangeOfString:` methods provide additional parameters
    that enable you to specify string comparison options, the range within the receiver
    object to search, and the locale to use for the search.


    The NSString `rangeOfCharacterFromSet:` methods also perform range-based searches.
    They differ from the `rangeOfString:` methods in that they return a range that
    specifies the location (in the receiver string) of the first character found from
    a given character set. The character set input parameter is of type `NSCharacterSet`,
    a set of (Unicode-compliant) characters. The following code fragment returns an
    NSRange instance that identifies the first occurrence of a punctuation symbol
    (e.g., period, exclamation point, etc.) within the string "`Hello, World!"`.


    ```

    NSCharacterSet *chars = [NSCharacterSet punctuationCharacterSet];

    NSRange charRange = [@"Hello, World!" rangeOfCharacterFromSet:chars];

    ```'
