    13-1](#9781430250500_Ch13.xhtml#Tab1).


    [Table 13-1](#9781430250500_Ch13.xhtml#_Tab1). Foundation Assertion Functions


    | Foundation Function | Description |

    | --- | --- |

    | `NSAssert` | Generates an assertion for an Objective-C method if a given condition
