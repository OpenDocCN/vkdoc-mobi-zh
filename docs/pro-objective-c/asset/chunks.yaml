    \ product = 4 + 2 * 4 + 2;\n```\n\n由于 Objective-C 的运算符优先级和结合性规则（列于[附录 A](#9781430250500_AppA.xhtml)），在上述语句中，`2\
    \ * 4`的乘法会在加法之前执行；因此，该语句将返回值 `14`——这可能不是你期望的结果！为了避免这些由于宏展开导致的问题，你可以用括号将宏参数和宏本身包围起来，如下面\
    \ `ADD` 宏的初始定义所示：\n\n```\n#define SQUARE(x)  ((x) * (x))\n```\n\n事实上，函数式宏和对象式宏都应该使用括号。另一方面，用于执行计算而非返回值（例如执行一系列操作）的多行函数式宏，应该用花括号（`{\
    \ }`）包围。例如，下面的宏用花括号包围：\n\n```\n#define SWAP(a, b)  {a^=b; b^=a; a^=b;}\n```\n\n\
    函数式宏定义在替换序列中接受两个特殊运算符（`#`和`##`）。*字符串化*运算符（用`#`符号表示）用于将宏输入参数替换为对应的文本字符串（用双引号包围）。*连接*运算符（用`##`符号表示）用于连接两个符号（token），它们之间不留空格。\n\
