    \ *`，以及一个自定义初始化方法`initWithName:`，该方法也接受一个`NSString *`类型的输入参数。接下来，选择`OrderItem.m`文件并实现`OrderItem`类，如代码清单\
    \ 4-7 所示。\n\n*代码清单 4-7*  MRR OrderItem 类实现\n\n```objectivec\n#import \"OrderItem.h\"\
    \n\n@implementation OrderItem\n- (id) initWithName:(NSString *)itemName\n{\n \
    \ if ((self = [super init]))\n  {\n    NSLog(@\"Initializing OrderItem object\"\
    );\n    name = itemName;\n    [name retain];\n  }\n  return self;\n}\n\n- (void)dealloc\n\
    {\n  NSLog(@\"Deallocating OrderItem object\");\n  [name release];\n  [super dealloc];\n\
    }\n@end\n```\n\n自定义初始化方法将实例变量赋值给输入参数。由于`OrderItem`对象并未创建输入参数，因此它对此参数没有所有权。但是，为了确保该对象不会因其他操作的副作用而被释放，并且在整个对象生命周期内保持有效，你需要向`name`变量发送`retain`消息，从而获得该对象的所有权。在`dealloc`方法中，你向`name`对象发送`release`消息，然后在其父类上调用`dealloc`以释放`OrderItem`对象的内存。\n\
    \n现在，让我们实现`OrderEntry`类。选择`OrderEntry.h`文件并编写接口（如代码清单 4-8 所示）。\n\n*代码清单 4-8* \
    \ MRR OrderEntry 类接口\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import\
    \ \"OrderItem.h\"\n#import \"Address.h\"\n\n@interface OrderEntry : NSObject\n\
    {\n@public OrderItem *item;\nNSString *orderId;\nAddress *shippingAddress;\n}\n\
    \n- (id) initWithId:(NSString *)oid;\n@end\n```\n\n代码清单 4-8 显示，`OrderEntry`对象有三个实例变量和一个自定义初始化方法`initWithId:`。接下来，选择`OrderEntry.m`文件并实现`OrderEntry`类，如代码清单\
    \ 4-9 所示。\n\n*代码清单 4-9*  MRR OrderEntry 类实现\n\n```objectivec\n#import \"OrderEntry.h\"\
    \n\n@implementation OrderEntry\n- (id) initWithId:(NSString *)oid\n{\n  if ((self\
    \ = [super init]))\n  {\n    NSLog(@\"Initializing OrderEntry object\");\n   \
    \ orderId = oid;\n    [orderId retain];\n    item = [[OrderItem alloc] initWithName:@\"\
    Doodle\"];\n    shippingAddress = [[Address alloc] init];\n  }\n\nreturn self;\n\
    }\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating OrderEntry object\");\n  [item\
    \ release];\n  [orderId release];\n  [shippingAddress release];\n  [super dealloc];\n\
    }\n@end\n```\n\n自定义初始化方法将输入参数赋值给`orderId`实例变量，然后创建并初始化`OrderItem`和`Address`对象。由于`OrderEntry`对象拥有`OrderItem`和`Address`对象以及`orderId`实例的所有权，因此它负责在自身被释放之前释放它们。这在`dealloc`方法中完成，该方法随后在其父类上调用`dealloc`以释放`OrderEntry`对象的内存。\n\
    \n现在你已经实现了订单相关的类，接下来通过测试来验证实现并确认你正确使用了 MRR。在导航窗格中选择`main.m`文件，然后按照代码清单 4-10 所示更新`main()`函数。\n\
    \n*代码清单 4-10*  MRR main() 函数实现\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"OrderEntry.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    // 创建一个 OrderEntry 对象用于手动释放\n    NSString *orderId = [[NSString alloc]\
    \ initWithString:@\"A1\"];\n    OrderEntry *entry = [[OrderEntry alloc] initWithId:orderId];\n\
    \n// 释放 orderId（已被 OrderEntry 保留，因此对象不会被释放！）\n    [orderId release];\n    NSLog(@\"\
    New order, ID = %@, item: %@\", entry->orderId, entry->item->name);\n\n// 必须手动释放\
    \ OrderEntry！\n    [entry release];\n\n// 创建一个自动释放的 OrderEntry 对象，在自动释放池块结束时释放\n\
    \    OrderEntry *autoEntry = [[[OrderEntry alloc] initWithId:@\"A2\"] autorelease];\n\
    \    NSLog(@\"New order, ID = %@, item: %@\", autoEntry->orderId, autoEntry->item->name);\n\
    \  }\n  return 0;\n}\n```\n\n`main()`函数通过创建`OrderEntry`对象并根据内存管理规则释放它们以及它所拥有的对象，演示了\
    \ MRR 内存管理。第一个`OrderEntry`对象是手动释放的，而第二个对象是通过`autorelease`创建的，因此它会在其所在的自动释放池块结束时被释放。\n\
    \n现在，保存、编译并运行 MRR Orders 程序，观察输出窗格中的消息（如图 4-5 所示）。\n\n![9781430250500_Fig04-05.jpg](img/9781430250500_Fig04-05.jpg)\n\
    \n图 4-5  测试 MRR OrderEntry 项目\n\n消息显示了初始化与释放动态创建对象的调用顺序。看起来所有的对象创建/保留和释放消息都正确平衡，你运行的测试也显示了正确的输出，所以一切就绪了，对吗？嗯，不一定。毕竟，你怎么能确定程序没有内存泄漏呢——它可以显示正确的输出但仍然存在未检测到的问题。那么，如何验证程序没有泄漏内存或存在其他未检测到的问题？Xcode\
    \ 提供了一套可用于分析程序并检测潜在问题的工具。在附录 B 中，你将学习如何使用 Xcode Instruments 工具来做到这一点，但在这里你将使用\
    \ Xcode 的“构建并分析”工具对应用程序进行初步检查。\n\n从 Xcode 的“Product”菜单中选择“Analyze”。该工具会对程序进行分析，在检测到任何潜在的内存泄漏或野指针等问题时会予以识别。现在观察工具栏中间的“Activity\
    \ View”，它应该显示“Analyze Succeeded”，这意味着没有检测到内存管理错误。在`main()`函数中，注释掉`[orderId release]`语句，然后再次运行“构建并分析”工具。它应该会显示图\
    \ 4-6 所示的消息。\n\n![9781430250500_Fig04-06.jpg](img/9781430250500_Fig04-06.jpg)\n\
    \n图 4-6  分析 OrderEntry 项目的 MRR\n\n如图 4-6 所示，当动态分配的对象（本例中为`orderId`）的保留/释放消息不匹配时，会检测到潜在的内存泄漏。这表明“构建并分析”工具非常适合对程序内存管理进行初步检查。现在，继续从你的程序中移除注释标记——你已经证明它使用\
    \ MRR 正确地管理了内存。干得好！\n\n## 使用自动引用计数\n```"
- fmt: '# 使用 ARC 进行内存管理


    采用 MRR 内存管理方式时，你需要直接负责管理程序对象的生命周期。这样可以实现精细的内存使用控制，但代价是给程序员带来了沉重的负担。即使是你刚刚实现的简单示例，也需要非常谨慎（并使用合适的工具进行测试）来确保适时且正确地平衡
    `retain` 和 `release` 操作。通常，手动引用计数是一项容易出错的任务，如果处理不当，可能导致程序内存泄漏和/或崩溃。实际上，这类基础设施最好交给工具处理，从而让程序员能够专注于程序旨在实现的实际业务逻辑。于是，自动引用计数（ARC）应运而生，它是一种自动执行此任务的内存管理增强技术，从而免除了程序员的这一责任。ARC
    采用与 MRR 相同的引用计数模型，但利用编译器来管理对象生命周期。具体来说，在程序编译时，编译器会分析源代码，确定动态创建的对象的生命周期需求，然后在编译后的代码中自动在必要时插入
    `retain` 和 `release` 消息。ARC 还提供了其他好处：应用程序性能（可能）得到提升，并且消除了与内存管理相关的错误（例如，释放仍在使用的对象，保留不再使用的对象）。此外，与垃圾回收技术不同，ARC
    是确定性的（语句在编译时插入），并且不会因垃圾回收而引入程序执行暂停。


    ARC 为 Objective-C 对象和 block 对象提供自动内存管理。它是新 Objective-C 项目中推荐的内存管理方法。如果某些情况下需要手动引用计数，ARC
    可以在整个项目中使用，也可以在逐个文件的基础上使用。请注意，ARC 不会自动处理对象存在循环引用的引用循环。Objective-C 提供了语言特性，用于在必要时声明对象的弱引用，以手动打破这些循环。你将在本章稍后部分了解这些内容。


    ## 使用 ARC 的规则和约定


    如前所述，与 MRR 方法相比，ARC 极大地简化了内存管理。因此，在 ARC 下针对对象内存管理存在不同的规则集。这些规则如下：


    - 你不能发送`retain`、`retainCount`、`release`、`autorelease`或`dealloc`消息。ARC 禁止对对象生命周期进行程序化控制，并在编译期间自动在需要时插入这些消息。这包括`@selector(retain)`、`@selector(release)`及相关方法。如果你需要管理实例变量以外的资源，可以实现`dealloc`方法。ARC
    会在你的类中（如果未提供）自动创建一个`dealloc`方法来释放其拥有的对象，并在你的`dealloc`方法实现中调用`[super dealloc]`。

    - 你不能在`id`和`(void *)`类型之间直接转换。ARC 只管理 Objective-C 对象和 block，因此编译器需要知道它正在处理的对象的类型。因为*指向
    void 的指针*（`void *`）是一种泛型指针类型，可以转换为任何其他指针类型（甚至那些不是 Objective-C 指针类型的类型），所以这一限制是必要的。这种情况在
    Foundation 框架对象和 Core Foundation 类型（Core Foundation 是一个提供 C 语言 API 的 Apple 软件库）之间进行转换时很常见。提供了一组
    API 用于在 ARC 和非 ARC 环境之间进行变量的所有权转移。

    - 应使用自动释放池块来执行 ARC 管理的对象的自动释放。

    - 你不能调用 Foundation 框架函数`NSAllocateObject`和`NSDeallocateObject`。这些函数提供了在特定内存区域中为对象分配和释放内存的能力。由于基于区域的内存不再被支持，因此不能使用这些函数。

    - 你不能在 C 结构体（`struct`）中使用对象指针。ARC 不为动态分配的 C 结构体执行内存管理，因此编译器无法确定在哪里插入必要的`retain`和`release`消息。

    - 你不能使用内存区域（`NSZone`）。如前所述，基于区域的内存不再被支持。

    - 为了与非 ARC 代码正确协作，你不能创建以“copy”开头的方法或声明属性（除非你明确选择不同的 getter）。

    - 默认情况下，ARC 不是异常安全的：它不会结束因异常而异常终止其作用域的`__strong`变量的生命周期，也不会执行在完整表达式抛出异常时本应在该表达式末尾发生的对象释放。可以使用编译器选项`-fobjc-arc-exceptions`来为
    ARC 代码启用异常处理。当异常终止弱引用的作用域时，ARC 会结束这些弱引用的生命周期，除非在编译器中禁用了异常。


    ## ARC 生命周期限定符


    有一组特定于 ARC 的限定符，用于声明常规变量和属性的对象生命周期。以下是用于常规变量的限定符：


    - `__strong`：使用`alloc`/`init`创建的任何对象在其当前作用域的生命周期内被保留。这是常规变量的默认设置。“当前作用域”通常指声明该变量的花括号内（例如方法、`for`循环、`if`块等）。

    - `__weak`：对象可以随时被销毁。这仅在对象在其他地方被强引用时才有用。当对象被销毁时，带有`__weak`的变量会被设置为`nil`。

    - `__unsafe_unretained`：这很像`__weak`，但在对象被释放时，指针不会被设置为`nil`。相反，指针会变成悬空指针（即，它不再指向任何有用的东西）。

    - `__autoreleasing`：不要与在从方法返回对象前对其调用`autorelease`相混淆，这用于通过引用传递对象。


    使用 ARC 生命周期限定符为 Objective-C 对象声明变量时，正确的语法是：


    ```

    ClassName *qualifier varName;

    ```'
  raw: 'With MRR memory management, you are directly responsible for managing the
    life cycle of your program’s objects. This enables fine-grain control of memory
    usage, at the cost of placing a significant burden on the programmer. Even with
    the simple example you just implemented, it requires a lot of diligence (and testing
    with the proper tools) to make sure that you are balancing your retains and releases
    properly and in a timely manner. In general, manual reference counting is an error-prone
    task, which, if not done correctly, can cause a program to leak memory and/or
    crash. In fact, this type of infrastructure is best relegated to a tool, thereby
    freeing programmers to focus on the actual business logic your programs are designed
    to implement. Enter Automatic Reference Counting (ARC), a memory-management enhancement
    that automates this task, thereby eliminating the responsibility for the programmer.
    ARC employs the same reference counting model as MRR, but utilizes the compiler
    to manage the object life cycle. Specifically, at program compilation, the compiler
    analyzes the source code, determines the life cycle requirements for dynamically
    created objects, and then automatically inserts retain and release messages where
    necessary in the compiled code. ARC provides other benefits as well: application
    performance is (potentially) improved and errors associated with memory management
    (e.g., releasing an object that is still in use, retaining an object no longer
    in use) are eliminated. In addition, as opposed to garbage collection technology,
    ARC is deterministic (the statements are inserted at compile time) and doesn’t
    introduce pauses into program execution for garbage collection.


    ARC provides automatic memory management for Objective-C objects and block objects.
    It is the recommended approach for memory management in new Objective-C projects.
    ARC can be used across a project or on a per-file basis if there is a need for
    manual reference counting in some cases. Note that ARC does not automatically
    handle reference cycles, where objects have circular references. Objective-C provides
    language features for declaring weak references on objects as necessary to manually
    break these cycles. You’ll look at these later in this chapter.


    Rules and Conventions for Using ARC


    As mentioned, ARC greatly simplifies memory management with respect to the MRR
    method. As a result, there are different sets of rules for object memory management
    under ARC. These rules are as follows:


    *   You cannot send `retain`, `retainCount`, `release`, `autorelease`, or `dealloc`
    messages. ARC forbids programmatic control of an object life cycle and automatically
    inserts these messages where required during compilation. This includes `@selector(retain)`,
    `@selector(release)`, and related methods. You may implement a `dealloc` method
    if you need to manage resources other than instance variables. ARC automatically
    creates a `dealloc` method in your classes (if not provided) to release the objects
    it owns, and invokes [`super dealloc]` in your implementation(s) of the `dealloc`
    method.

    *   You can’t cast directly between `id` and `(void *)` types. ARC only manages
    Objective-C objects and blocks, thus the compiler needs to know the types of the
    objects it is processing. Because a *pointer to void* (`void *`) is a generic
    pointer type that can be converted to any other pointer type (even those that
    are not Objective-C pointer types), this restriction is necessary. This scenario
    is common when casting between Foundation Framework objects and Core Foundation
    types (Core Foundation is an Apple software library that provides C-language APIs).
    A set of APIs is provided for ownership transfer of variables between ARC and
    non-ARC environments.

    *   Autorelease pool blocks should be used to perform ARC-managed autorelease
    of objects.

    *   You cannot call the Foundation Framework functions `NSAllocateObject` and
    `NSDeallocateObject`. These functions provide the capability to allocate and deallocate
    memory for an object in a specific memory zone. Because zone-based memory is no
    longer supported, these functions cannot be used.

    *   You cannot use object pointers in C structures (structs). ARC does not perform
    memory management for dynamically allocated C structures, thus the compiler cannot
    determine where to insert the necessary `retain` and `release` messages.

    *   You cannot use memory zones (`NSZone`). As mentioned, zone-based memory is
    no longer supported.

    *   To properly cooperate with non-ARC code, you cannot create a method or a declared
    property (unless you explicitly choose a different getter) that begins with “copy”.

    *   By default, ARC is not exception-safe: it does not end the lifetime of `__strong`
    variables whose scope is abnormally terminated by an exception, and it does not
    perform releases of objects that would occur at the end of a full-expression if
    that full-expression throws an exception. The compiler option `-fobjc-arc-exceptions`
    can be used to enable exception handling for ARC code. ARC does end the lifetimes
    of weak references when an exception terminates their scope, unless exceptions
    are disabled in the compiler.


    ARC Lifetime Qualifiers


    There are a set of ARC-specific qualifiers that declare the object lifetime for
    both regular variables and properties. The following are those for regular variables:


    *   `__strong`: Any object created using `alloc` */* `init` is retained for the
    lifetime of its current scope. This is the default setting for regular variables.
    The “current scope” usually means the braces in which the variable is declared
    (a method, `for` loop, `if` block, etc.)

    *   `__weak`: The object can be destroyed at anytime. This is only useful if the
    object is somehow strongly referenced somewhere else. When destroyed, a variable
    with `__weak` is set to `nil`.

    *   `__unsafe_unretained`: This is just like `__weak` but the pointer is not set
    to `nil` when the object is deallocated. Instead, the pointer is left dangling
    (i.e., it no longer points to anything useful).

    *   `__autoreleasing`: Not to be confused with calling `autorelease` on an object
    before returning it from a method, this is used for passing objects by reference.


    When using ARC lifetime qualifiers to declare variables for Objective-C objects,
    the correct syntax is


    ```

    ClassName *qualifier varName;

    ```'
