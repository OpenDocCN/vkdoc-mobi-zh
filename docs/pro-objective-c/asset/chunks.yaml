    \n[*清单11-14.*](#9781430250500_Ch11.xhtml#_list14)  NetConnector接口\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#define HTTP_SCHEME       @\"http\"\n#define CACHE_MEMORY_SIZE\
    \ (4 * 1024 * 1024)\n\n@interface NetConnector : NSObject <NSURLConnectionDelegate>\n\
    \n@property (readonly) BOOL finishedLoading;\n\n- (id) initWithRequest:(NSURLRequest\
    \ *)request;\n- (void) reloadRequest;\n\n@end\n```\n\n`NetConnector`接口采用了`NSURLConnectionDelegate`协议，从而使其能够异步加载来自`NSURLConnection`实例的数据。`finishedLoading`属性用于指示`NSURLConnection`实例何时完成数据加载。`initWithRequest:`方法初始化一个`NetConnector`对象，并使用输入的`NSURLRequest`加载一个URL。`reloadRequest`方法用于重新加载输入的`NSURLRequest`。现在选择`NetConnector.m`文件，并更新实现，如[清单11-15](#9781430250500_Ch11.xhtml#list15)所示。\n\
    \n[*清单11-15.*](#9781430250500_Ch11.xhtml#_list15)  NetConnector实现\n\n```\n#import\
    \ \"NetConnector.h\"\n\n// 扩展以声明提供的属性\n@interface NetConnector()\n\n@property\
    \ NSURLRequest *request;\n@property BOOL finishedLoading;\n@property NSURLConnection\
    \ *connector;\n@property NSMutableData *receivedData;\n\n@end\n\n@implementation\
    \ NetConnector\n\n- (id) initWithRequest:(NSURLRequest *)request\n{\n  if ((self\
    \ = [super init]))\n  {\n    _request = request;\n    // 创建具有适当内存存储的URL缓存\n  \
    \  NSURLCache *URLCache = [[NSURLCache alloc] init];\n    [URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];\n\
    \    [NSURLCache setSharedURLCache:URLCache];\n    // 创建连接并开始从资源下载数据\n    _connector\
    \ = [NSURLConnection connectionWithRequest:request delegate:self];\n  }\n  return\
    \ self;\n}\n\n- (void) reloadRequest\n{\n  self.finishedLoading = NO;\n  self.connector\
    \ = [NSURLConnection connectionWithRequest:self.request\n                    \
    \                             delegate:self];\n}\n\n#pragma mark -\n#pragma mark\
    \ 代理方法\n\n- (void)connection:(NSURLConnection *)connection\ndidReceiveResponse:(NSURLResponse\
    \ *)response\n{\n  if (self.receivedData != nil)\n  {\n    [self.receivedData\
    \ setLength:0];\n  }\n}\n\n- (NSCachedURLResponse *)connection:(NSURLConnection\
    \ *)connection\n                  willCacheResponse:(NSCachedURLResponse *)cachedResponse\n\
    {\n  NSURLResponse *response = [cachedResponse response];\n  NSURL *url = [response\
    \ URL];\n  if ([[url scheme] isEqualTo:HTTP_SCHEME])\n  {\n    NSLog(@\"Downloaded\
    \ data, caching response\");\n    return cachedResponse;\n  }\n  else\n  {\n \
    \   NSLog(@\"Downloaded data, not caching response\");\n    return nil;\n  }\n\
    }\n\n- (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n\
