- fmt: "# 排版后内容\n\n要`vend`一个对象（即，使一个对象实例分布式化，以便其他应用可以通过网络调用它），应首先将该对象配置为`NSConnection`实例的根对象，然后将该连接注册到网络上。[Listing\
    \ 12-18](#9781430250500_Ch12.xhtml#list18) 导出了一个名为`helloServiceObj`的对象，并将其注册在名称`HelloService`下。\n\
    \n[*Listing 12-18.*](#9781430250500_Ch12.xhtml#_list18) 注册 HelloService 分布式对象\n\
    \n```\nNSConnection *connection = [NSConnection defaultConnection];\n[connection\
    \ setRootObject:helloServiceObj];\n[connection registerName:@\"HelloService\"\
    ];\n```\n\n注册使得分布式对象对远程客户端可用。连接必须在运行循环（即一个`NSRunLoop`实例）内启动，以捕获对分布式对象的传入请求。\n\n\
    客户端可以通过获取分布式对象的代理来调用其上的方法。以下语句获取了 [Listing 12-18](#9781430250500_Ch12.xhtml#list18)\
    \ 中所示分布式对象在本地主机上的代理。\n\n```\nNSDistantObject *helloProxy =\n  [NSConnection rootProxyForConnectionWithRegisteredName:@\"\
    HelloService\"\n                                                    host:nil];\n\
    ```\n\n`NSDistantObject`的`setProtocolForProxy:`方法用于设置由分布式对象处理的方法。如果 [Listing 12-18](#9781430250500_Ch12.xhtml#list18)\
    \ 中的分布式对象采用了名为`HelloProtocol`的协议，并且其方法包含了客户端可用的方法，那么可以使用以下语句来配置名为`helloProxy`的代理以支持该协议。\n\
    \n```\n[helloProxy setProtocolForProxy: @protocol (HelloProtocol)];\n```\n\n`NSInvocation`和`NSMethodSignature`类用于支持\
    \ Foundation 框架的分布式对象系统。`NSInvocation`类在[第9章](#9781430250500_Ch09.xhtml)中介绍过，其中你了解到`NSInvocation`对象由\
    \ Objective-C 消息的所有元素组成：接收（目标）对象、选择器、参数和返回值。`NSMethodSignature`用于转发接收（分布式）对象无法响应的消息。它包含方法参数和返回值的类型信息。\n\
    \n分布式对象类仅在 Mac OS X 平台上可用。\n\n## 脚本化\n\nFoundation 框架的脚本化类支持创建*可脚本化应用程序*，即可以通过\
    \ AppleScript（一种编程语言，能够直接控制可脚本化应用程序以及 Apple OS X 中可脚本化的部分）进行控制的应用程序。\n\n`NSScriptCommand`及其子类实现了标准的\
    \ AppleScript 命令。`NSScriptObjectSpecifier`及其子类定位可脚本化对象。`NSScriptCoercionHandler`和`NSScriptKeyValueCoding`执行与脚本化相关的基本功能。\n\
    \n脚本化类仅在 OS X 平台上可用。\n\n## 总结\n\n在本章中，你继续回顾了 Foundation 框架，重点介绍了为 Objective-C\
    \ 程序提供特定系统服务的类。你现在应该熟悉提供以下功能的 Foundation 框架类：\n\n*   通知\n*   归档与序列化\n*   分布式对象\n\
    *   脚本化\n\n---\n\n# 第 13 章 Foundation 函数与数据类型\n\nFoundation 框架不仅由类组成，还包括大量的函数、数据类型和常量。现在你可能会想：“为什么我还需要这些额外的\
    \ API？毕竟，Objective-C 是一种面向对象的编程语言，Foundation 框架已经提供了完整的类集。” 实际上，这些 API 是 Foundation\
    \ 框架的重要组成部分，它们共同为 Objective-C 软件开发提供了各种基本功能。在本章中，你将探索这些 API 以及提供的示例代码，了解如何在你的程序中使用它们。\n\
    \n## Foundation 函数\n\nFoundation 框架定义了许多函数和类似函数的宏。Apple Foundation Functions Reference\
    \ 为这些函数提供了权威指南。在这里，你将学习执行以下任务的 Foundation 函数：\n\n*   断言与日志记录\n*   字符串本地化\n*  \
    \ 数值运算与字节序\n*   运行时操作\n\n### 断言\n\n断言是放置在代码中的一条语句，用于检查某个条件是否存在。断言用于提供运行时验证，验证那些如果不成立就应导致程序终止的假设。使用断言进行编程是检测和纠正错误最快、最有效的方法之一。断言还可以记录程序的逻辑，从而提高可维护性。\n\
    \n每个断言包含一个布尔表达式，你相信当断言执行时该表达式为真。如果表达式为假，系统将抛出一个错误。通过验证表达式确实为真，断言确认了你对程序行为的假设，增加了你对程序没有错误的信心。\n\
    \n以下是应该使用断言的场景示例：\n\n*   *内部不变性*：关于程序行为的假设。这种假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。\n\
    *   *控制流不变性*：关于控制流的假设，特别是代码中不应达到的位置。\n*   *前置条件*：在调用方法之前必须为真的条件。\n*   *后置条件*：在调用方法之后必须为真的条件。\n\
    *   *类不变性*：对每个类实例都必须为真的条件。\n\n*内部不变性*的一个示例是 [Listing 13-1](#9781430250500_Ch13.xhtml#list1)\
    \ 中的条件表达式。\n\n[*Listing 13-1.*](#9781430250500_Ch13.xhtml#_list1) 包含内部不变性的条件表达式示例\n\
    \n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  // value must be negative\n  ...\n\
    }\n```\n\n如 [Listing 13-1](#9781430250500_Ch13.xhtml#list1) 所示，这些假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。[Listing\
    \ 13-1](#9781430250500_Ch13.xhtml#list1) 的代码片段在 [Listing 13-2](#9781430250500_Ch13.xhtml#list2)\
    \ 中被更新，使用断言来表达该不变性。\n\n[*Listing 13-2.*](#9781430250500_Ch13.xhtml#_list2) 使用断言表达内部不变性的示例\n\
    \n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  NSAssert((value < 0), @\"Value\
    \ not valid here, should be negative\");\n  ...\n}\n```\n\n一种常见的前置条件是检查方法（或函数）输入参数的条件。对于公有方法，前置条件在代码中显式检查，如果条件不满足则抛出适当的异常，因此不应使用断言来检查。断言可用于检查私有方法和函数的前置条件。\n\
    \n断言可用于测试公有和私有方法/函数的后置条件。\n\n*类不变性*约束了每个类实例的属性（即内部状态）和行为。断言可以以类似于表达前面讨论的其他场景的方式来定义类不变性。"
  raw: 'To *vend* an object (i.e., to make an object instance distributed so that
    it can be invoked by other applications over a network), the object should first
    be configured as the root object of an `NSConnection` instance and the connection
    should then be registered on the network. [Listing 12-18](#9781430250500_Ch12.xhtml#list18)
    vends an object named `helloServiceObj` and registers it under the name `HelloService`.


    [*Listing 12-18.*](#9781430250500_Ch12.xhtml#_list18)  Registering the HelloService
    Distributed Object


    ```

    NSConnection *connection = [NSConnection defaultConnection];

    [connection setRootObject:helloServiceObj];

    [connection registerName:@"HelloService"];

    ```


    Registration makes the distributed object available to remote clients. The connection
    must be started within a run loop (i.e., an `NSRunLoop` instance) to capture incoming
    requests for the distributed object.


    A client can invoke methods on a distributed object by obtaining a proxy for it.
    The following statement obtains a proxy on the local host for the distributed
    object shown in [Listing 12-18](#9781430250500_Ch12.xhtml#list18).


    ```

    NSDistantObject *helloProxy =

      [NSConnection rootProxyForConnectionWithRegisteredName:@"HelloService"

                                                        host:nil];

    ```


    The NSDistantObject `setProtocolForProxy:` method is used to set the methods handled
    by the distributed object. If the distributed object from [Listing 12-18](#9781430250500_Ch12.xhtml#list18)
    adopts a protocol named `HelloProtocol` and its methods comprise those available
    for clients, and then the following statement can be used to configure the proxy
    named `helloProxy` to support this protocol.


    ```

    [helloProxy setProtocolForProxy: @protocol (HelloProtocol)];

    ```


    The `NSInvocation` and `NSMethodSignature` classes are used to support the Foundation
    Framework’s distributed object system. The `NSInvocation` class was introduced
    in [Chapter 9](#9781430250500_Ch09.xhtml), where you learned that an `NSInvocation`
    object is composed of all the elements of an Objective-C message: the receiving
    (target) object, selector, parameters, and return value. `NSMethodSignature` is
    used to forward messages that a receiving (distributed) object does not respond
    to. It contains type information for the arguments and return value of a method.


    The distributed object classes are only available for use on the Mac OS X platform.


    Scripting


    The Foundation Framework scripting classes support the creation of *scriptable
    applications*, that is, applications that can be controlled with AppleScript—a
    scripting language that makes possible direct control of scriptable applications
    and scriptable parts of Apple OS X.


    `NSScriptCommand` and its subclasses implement standard AppleScript commands.
    `NSScriptObjectSpecifier` and its subclasses locate scriptable objects. `NSScriptCoercionHandler`
    and `NSScriptKeyValueCoding` perform essential functions related to scripting.


    The scripting classes are only available for use on the OS X platform.


    Roundup


    In this chapter, you continued your review of the Foundation Framework, focusing
    on classes that provide specialized system services for Objective-C programs.
    You should now be familiar with Foundation Framework classes that provide the
    following functionality:


    *   Notifications

    *   Archives and Serialization

    *   Distributed Objects

    *   Scripting


    Chapter     13


    Foundation Functions and Data Types


    The Foundation Framework is not only composed of classes, it also includes numerous
    functions, data types, and constants. Now you may be thinking, “Why do I need
    these additional APIs? After all, Objective-C is an object-oriented programming
    language and the Foundation Framework provides a complete set of classes.” Well,
    these APIs are, in fact, an important part of the Foundation Framework, and together
    they provide a variety of essential functionality for Objective-C software development.
    In this chapter, you will explore these APIs and the provided sample code to learn
    how they can be used in your programs.


    Foundation Functions


    The Foundation Framework defines a number of functions and function-like macros.
    The Apple Foundation Functions Reference provides a definitive guide for these
    functions. Here you’ll examine Foundation functions that perform the following
    tasks:


    *   Assertions and logging

    *   String localization

    *   Numerical operations and byte ordering

    *   Runtime operations


    Assertions


    An assertion is a statement placed in code to check the existence of a condition.
    Assertions are used to provide runtime verification of assumptions that, if not
    present, should cause the program to terminate. Coding with assertions is one
    of the quickest and most effective ways to detect and correct bugs. Assertions
    can also document the logic of your program, thereby enhancing maintainability.


    Each assertion contains a Boolean expression that you believe will be true when
    the assertion executes. If it is not true, the system will throw an error. By
    verifying that the expression is indeed true, the assertion confirms your assumptions
    about the behavior of your program, increasing your confidence that the program
    is free of errors.


    The following are examples of situations where you would use assertions:


    *   *Internal invariant*: An assumption concerning program behavior. This assumption
    is often indicated with comments in code, but it can be documented and validated
    at runtime with an assertion.

    *   *Control-flow invariant*: An assumption concerning control flow, specifically
    locations in your code that should not be reached.

    *   *Precondition*: A condition that must be true before a method is invoked.

    *   *Postcondition*: A condition that must be true after a method is invoked.

    *   *Class invariant*: A condition that must be true for each class instance.


    An example of an *internal invariant* is the conditional expression in [Listing
    13-1](#9781430250500_Ch13.xhtml#list1).


    [*Listing 13-1.*](#9781430250500_Ch13.xhtml#_list1)  Example of a Conditional
    Expression with an Internal Invariant


    ```

    if (value >= 0)

    {

      ...

    }

    else

    {

      // value must be negative

      ...

    }

    ```


    As shown in [Listing 13-1](#9781430250500_Ch13.xhtml#list1), these assumptions
    are often indicated with comments in code, but can be documented and validated
    at runtime with an assertion. The code excerpt from [Listing 13-1](#9781430250500_Ch13.xhtml#list1)
    is updated in [Listing 13-2](#9781430250500_Ch13.xhtml#list2) to express the invariant
    with an assertion.


    [*Listing 13-2.*](#9781430250500_Ch13.xhtml#_list2)  Example of an Internal Invariant
    Expressed with an Assertion


    ```

    if (value >= 0)

    {

      ...

    }

    else

    {

      NSAssert((value < 0), @"Value not valid here, should be negative");

      ...

    }

    ```


    A common type of precondition is a conditional check of the input parameters for
    a method (or function). For public methods, preconditions are explicitly checked
    in code and throw the appropriate exception if the condition is not satisfied,
    hence they should not be checked with assertions. Assertions can be used to check
    preconditions for private methods and functions.


    Assertions can be used to test postconditions for both public and private methods/functions.


    A *class invariant* constrains the properties (i.e., internal state) and behavior
    of each instance of a class. Assertions can be used to define class invariants
    in a manner similar to that used to express the other situations discussed earlier.'
