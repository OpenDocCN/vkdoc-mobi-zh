    the task is implemented in the `main` method. Note that this method includes an
    autorelease pool and a try-catch block. The autorelease pool prevents memory leaks
    from the associated thread, while the try-catch block is required to prevent any
    exceptions from leaving the scope of this thread. The `main` method also checks
    if the operation is cancelled in order to quickly terminate its execution if it
    is no longer needed. To invoke this operation asynchronously, you can add it to
