    # Foundation 框架函数


    Foundation 框架包含一些函数，用于对点、范围、矩形和尺寸执行几何计算。点表示二维欧几里得几何中的一个位置，具有 x 和 y 坐标。范围表示从指定位置开始、具有指定长度的一维量。尺寸表示具有指定宽度和高度的二维量。


    针对点、范围和尺寸的 Foundation 函数可执行创建、获取、相等性测试以及返回这些量的字符串表示等操作。Foundation 数据类型 `NSPoint`
    表示点，`NSRange` 表示范围，`NSSize` 表示尺寸。


    以下语句根据指定的值创建一个新的 `NSPoint`。


    ```

    NSPoint point = NSMakePoint(0, 5);

    ```


    Foundation 框架还包含大量用于操作矩形的函数，包括创建、获取、获取分量、查询、相等性测试以及返回字符串表示等操作。还有一些函数用于执行几何运算（相交测试、合并、分割、矩形内点测试等）。Foundation
    数据类型 `NSRect` 表示矩形。


    以下语句创建一个位于点 {0, 0}、尺寸为 [5, 10] 的矩形。


    ```

    NSRect rect1 = NSMakeRect(0.0, 0.0, 5.0, 10.0);

    ```


    下一组语句创建一个位于点 {2.5, 5}、尺寸为 [5, 10] 的新矩形，然后计算这两个矩形的交集。


    ```

    NSRect rect2 = NSMakeRect(2.5, 5.0, 5.0, 10.0);

    NSRect rect3 = NSIntersectionRect(rect1, rect2);

    ```


    ## 数据类型


    Foundation 框架定义了许多自定义数据类型，其中许多与 Foundation 函数一起使用。这些数据类型包括表示数字、几何概念和通用结构的数据类型。这些数据类型主要是
    C 语言结构体。一些更常用的数据类型列在表 13-4 中。


    表 13-4. 常用的 Foundation 数据类型


    | Foundation 函数 | 描述 |

    | --- | --- |

    | `NSInteger` | 用于在不同处理器架构上表示整数值的数据类型。在 32 位机器上，`NSInteger` 是一个 32 位整数；而在 64 位机器上，它是一个
    64 位整数。 |

    | `NSUInteger` | 用于在不同处理器架构上表示无符号整数值的数据类型。 |

    | `NSDecimal` | 用于表示十进制数的 C 语言结构体数据类型。 |

    | `NSPoint` | 用于表示二维欧几里得空间中点的 C 语言结构体数据类型。 |

    | `NSRange` | 用于表示范围（从指定位置开始、具有指定长度的一维量）的 C 语言结构体数据类型。 |

    | `NSSize` | 用于表示尺寸（具有指定宽度和高度的二维量）的 C 语言结构体数据类型。 |

    | `NSRect` | 用于表示二维欧几里得空间中矩形的 C 语言结构体数据类型。 |

    | `NSComparator` | 用于比较操作的块对象数据类型。该块返回一个 Foundation 常量 `NSComparisonResult`，指示所比较的两个对象的顺序。
    |

    | `NSTimeInterval` | 用于指定时间间隔（以秒为单位）的 Foundation 类型（`double` 类型）。 |

    | `NSStringEncoding` | 用于表示字符串编码值的 Foundation 类型（`NSUInteger` 类型）。 |


    ## 常量


    Foundation 常量包括枚举、全局变量、几何和数值常量、异常以及 Foundation 框架版本号。枚举定义了 Foundation 框架 API 使用的枚举。全局变量定义了通用常量。几何常量定义了矩形对齐选项以及最小/最大边缘。数值常量定义了
    `NSDecimal`、`NSInteger`、`NSUInteger` 和 `NSMapTable` 数据类型的常量。异常常量定义了标准异常。版本号常量定义了
    Foundation 框架的版本号列表。Foundation 常量的权威参考是 Foundation 常量参考。


    ## 总结


    在本章中，您学习了 Foundation 函数、数据类型和常量，并了解了如何使用它们来开发 Objective-C 程序。当有多个可用选项时（例如，Foundation
    类与函数），您还熟悉了选择适当 API 所需权衡的一些考虑因素。现在，您应该熟悉以下 Foundation 框架 API：


    *   Foundation 函数

    *   Foundation 数据类型

    *   Foundation 常量


    这些 API 的权威参考请参见 Apple Foundation 函数参考。


