    ## Debug Area


    The debug area is comprised of the debug bar (toolbar located at the top of the
    debug area), and the content pane (the remainder of the area). The debug bar is
    used to control program execution and to navigate through source code. The left
    side of the content pane is used to view program variables and registers. The
    right side of the content pane is used to view console output and interact with
    the debugger. The debug area is depicted in [Figure C-7](#9781430250500_AppC.xhtml#Fig7).


    ![9781430250500_AppC-07.jpg](images/9781430250500_AppC-07.jpg)


    [Figure C-7](#9781430250500_AppC.xhtml#_Fig7). Debug area


    The debug bar is used to control target program execution and to navigate through
    its source code. There are five buttons on the left of the debug bar; from left
    to right, these buttons are used to:


    * Show/hide the debug area.

    * Pause/resume program execution.

    * Step over (i.e., execute) an instruction. If the instruction is a method/function
    call, it causes the whole method/function to be executed.

    * Step into (i.e., execute) an instruction. If the instruction is a method/function
    call, it causes the debugger to jump to the first line of the method/function.

    * Step out of the method/function. This causes the debugger to complete execution
    of the current method/function and jump to the next calling method/function or
    back to the method/function that called it.


    The remainder of the debug area displays a pop-up menu that enables you to choose
    a thread in the program to debug.


    The content pane is used to display variables and also provide a command-line
    interface for entering debugging commands. As depicted in [Figure C-7](#9781430250500_AppC.xhtml#Fig7),
    the left side of the content pane displays the *variables view* (for displaying
    values the variables in the current context), while the right side displays the
    output console (for the LLDB command-line interface in which debugger commands
    are executed).


    ## Disassembly View


    Xcode provides a disassembly view that enables you to view the set of assembly-language
    instructions seen by the debugger while your program is running. You can configure
    Xcode to display disassembly only, or both the source code and corresponding disassembly.
    To choose the disassembly view, select **Debug Workflow ![image](images/arrow.jpg)
    Show Disassembly When Debugging** from the Xcode Product menu. [Figure C-8](#9781430250500_AppC.xhtml#Fig8)
    displays both the source and disassembly view in the Xcode split editor pane.


    ![9781430250500_AppC-08.jpg](images/9781430250500_AppC-08.jpg)


    [Figure C-8](#9781430250500_AppC.xhtml#_Fig8). Disassembly view


    ## Using LLDB in Xcode


    Now that you have received an overview of LLDB and debugging with Xcode, you will
    debug a program using Xcode. In Xcode, create a new project by selecting **New
    ![image](images/arrow.jpg) Project . . .** from the Xcode File menu. In the **New
    Project Assistant** pane, create a command-line application by selecting the **Command
    Line Tool** icon (from the **Application** selection under OS X template groups).
    In the **Project Options** window, specify `BrokenCalculator` for the Product
    Name, choose `Foundation` for the Project Type, and select ARC memory management
    by selecting the **Use Automatic Reference Counting** check box. Specify the location
    in your file system where you want the project to be created (if necessary, select
    **New Folder** and enter the name and location for the folder) and uncheck the
    **Source Control** check box.


    Now create the calculator class. Select **New ![image](images/arrow.jpg) File
    . . .** from the Xcode File menu, select the **Objective-C** class template, and
    name the class `Calculator`. Select the `BrokenCalculator` folder for the files
    location and the `BrokenCalculator` project as the target, and then click the
    **Create** button. Next, in the project navigator pane, select the `Calculator.h`
    file and update the class interface as shown in [Listing C-2](#9781430250500_AppC.xhtml#list2).


    [*Listing C-2.*](#9781430250500_AppC.xhtml#_list2)  Calculator Class Interface


    ```

    #import <Foundation/Foundation.h>


    @interface Calculator : NSObject


    - (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2;


    @end

    ```


    The class declares a single instance method for returning the sum of two numbers.
    Next, use the Xcode project navigator to select the `Calculator.m` file and code
    the implementation as shown in [Listing C-3](#9781430250500_AppC.xhtml#list3).


    [*Listing C-3.*](#9781430250500_AppC.xhtml#_list3)  Calculator Class Implementation


    ```

    #import "Calculator.h"


    @implementation Calculator


    - (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2

    {

      return [NSNumber numberWithInteger:([adder1 integerValue] +

                                          [adder2 integerValue])];

    }

    @end

    ```


    The method returns the sum of the integer values of the two input parameters.
    OK, that’s pretty straightforward, now let’s move on to the `main()` function.
    In the project navigator, select the `main.m` file and update the `main()` function
    as shown in [Listing C-4](#9781430250500_AppC.xhtml#list4).


    [*Listing C-4.*](#9781430250500_AppC.xhtml#_list4)  BrokenCalculator `main()`
    Function


    ```

    #import <Foundation/Foundation.h>

    #import "Calculator.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create instance and numbers to add

        Calculator *calculator = [[Calculator alloc] init];

        NSNumber *addend1 = [NSNumber numberWithInteger:10];

        NSNumber *addend2 = [NSNumber numberWithInteger:15];

        NSNumber *addend3 = [NSNumber numberWithInteger:-25];


    // Add numbers and validate correct sum returned

        NSNumber *sum1 = [calculator sumAddend1:addend1 addend2:addend2];

        NSCAssert(([sum1 intValue] == 25), @"Invalid sum computed");


    NSNumber *sum2 = [calculator sumAddend1:addend1 addend2:addend3];

        NSCAssert(([sum2 intValue] == 15),  @"Invalid sum computed");

      }

      return 0;

    }

    ```


    The method creates a `Calculator` instance and `NSNumber` instances, and then
    adds two numbers and validates that the correct sum is returned. When you compile
    and run the program, you should observe the messages in the output pane, as shown
    in [Figure C-9](#9781430250500_AppC.xhtml#Fig9).


    ![9781430250500_AppC-09.jpg](images/9781430250500_AppC-09.jpg)


    [Figure C-9](#9781430250500_AppC.xhtml#_Fig9). BrokenCalculator program output'
