- fmt: "# NSPointerArray\n\n`NSPointerArray` is a mutable collection similar to `NSDictionary`\
    \ that provides additional storage options. Specifically, it can store arbitrary\
    \ pointers. It can also store weakly referenced keys and/or values.\n\n# NSSet\n\
    \n`NSSet` and `NSMutableSet` manage unordered collections of objects that do not\
    \ have to be of the same type. The objects stored in an `NSSet` are unique. The\
    \ operations supported by `NSSet` include creation and initialization, finding\
    \ an object in a set, comparing, and sorting (using the `NSSet` `sortedArrayUsingDescriptors:`\
    \ method). If the objects in the set have a good hash function, accessing an element,\
    \ setting an element, and removing an element all take constant time. With a poor\
    \ hash function (one that causes frequent hash collisions), these operations take\
    \ up linear time.\n\nSets, excluding `NSCountedSet`s, ensure that no object is\
    \ represented more than once, and there is no net effect for adding an object\
    \ more than once. The following statement uses the `NSSet` `setWithObjects:` convenience\
    \ constructor to create an `NSSet` object assigned to the variable `mySet` initialized\
    \ with `NSNumber` literals.\n\n```objectivec\nNSSet *mySet = [NSSet setWithObjects:@1,\
    \ @2, nil];\n```\n\n# NSCountedSet\n\n`NSCountedSet` is a mutable set that allows\
    \ an object to be added multiple times (i.e., its elements aren’t required to\
    \ be distinct). Each distinct object has an associated counter. An `NSCountedSet`\
    \ object keeps track of the number of times each distinct object is inserted and\
    \ requires a corresponding object(s) to be removed the same number of times.\n\
    \n# NSHashTable\n\n`NSHashTable` is a mutable collection similar to `NSSet` that\
    \ provides different options. Specifically, it can store arbitrary pointers. It\
    \ can also store weakly referenced keys and/or values.\n\n# NSPointerFunctions\n\
    \nThe `NSPointerFunctions` class defines functions for managing pointer functions.\
    \ An `NSHashTable`, `NSMapTable`, or `NSPointerArray` object typically uses an\
    \ `NSPointerFunctions` instance to define behavior for the pointers it manages.\n\
    \n# XML Processing\n\nThe Foundation Framework XML processing classes support\
    \ general-purpose XML document management and parsing functionality. The classes\
    \ logically represent an XML document as a hierarchical tree structure and support\
    \ the query and manipulation of XML document nodes. These classes support several\
    \ XML-related technologies and standards, such as XQuery, XPath, XInclude, XSLT,\
    \ DTD, and XHTML.\n\nClasses `NSXMLDTD` and `NSXMLDTDNode` are used for creating\
    \ and modifying XML Document Type Definitions (DTDs). `NSXMLDocument`, `NSXMLNode`,\
    \ and `NSXMLElement` are used for tree-based processing of XML documents. Instances\
    \ of `NSXMLParser` are used to parse XML documents in an event-driven manner.\n\
    \n## XML DTD Processing\n\nThe `NSXMLDTD` classes (`NSXMLDTD` and `NSXMLDTDNode`)\
    \ represent a Document Type Definition (DTD). They are used for creating and modifying\
    \ DTDs. The XML DTD processing classes (`NSXMLDTD`, `NSXMLDTDNode`) are available\
    \ for use on the Apple OS X platform only (i.e., these classes are not available\
    \ for the iOS platform).\n\n## Tree-Based XML Processing\n\nThe Foundation `NSXML`\
    \ classes enable you to create, manipulate, modify, and query XML documents. These\
    \ classes employ a Document Object Model (DOM) styled, tree-based data model that\
    \ represents an XML document as a tree of nodes. Each node of the tree corresponds\
    \ to an XML construct—an Element, an Attribute, Text, a Comment, a Processing\
    \ Instruction, or a Namespace. An `NSXMLDocument` object represents an entire\
    \ XML document as a logical tree structure. The code fragment shown in [Listing\
    \ 10-6](#9781430250500_Ch10.xhtml#list6) creates an `NSXMLDocument` for the URL\
    \ `http://www.apress.com/proobjectivec.xml`.\n\n*[Listing 10-6.](#9781430250500_Ch10.xhtml#_list6)\
    \ Creating an NSXMLDocument Object*\n\n```objectivec\nNSURL *url = [NSURL URLWithString:@\"\
    http://www.apress.com/proobjectivec.xml\"];\nNSError *err;\nNSXMLDocument *xmlDoc\
    \ = [[NSXMLDocument alloc]\n                          initWithContentsOfURL:url\n\
    \                                        options:NSXMLDocumentValidate\n     \
    \                                     error:&err];\n```\n\n`NSXMLNode`, the superclass\
    \ of `NSXMLDocument`, includes methods for navigating a tree of nodes from an\
    \ XML document. The following code fragment uses an `NSXMLNode` method, `nextNode`,\
    \ to retrieve the next node in an XML document.\n\n```objectivec\nNSXMLNode *node\
    \ = [xmlDoc nextNode];\n```\n\n`NSXMLElement`, a subclass of `NSXMLNode`, represents\
    \ element nodes in an XML tree structure. It includes methods for managing child\
    \ elements and attributes of an XML document. The following code fragment gets\
    \ the `NSXMLElement` object with the given tag name of `\"test\"` and then uses\
    \ this object to retrieve the child element nodes (an `NSArray` object) that have\
    \ the specified name.\n\n```objectivec\nNSXMLElement *testElem = [NSXMLNode elementWithName:@\"\
    test\"];\nNSArray *children = [noteElem elementsForName:@\"item\"];\n```\n\nThe\
    \ XML processing classes (`NSXMLDocument`, `NSXMLNode`, `NSXMLElement`) are available\
    \ for use on the Apple OS X platform only (i.e., these classes are not available\
    \ for the iOS platform).\n\n## Event-Driven XML Processing\n\nThe `NSXMLParser`\
    \ class is used to parse XML documents, including DTD documents, in an event-driven\
    \ manner. An `NSXMLParser` instance is configured with a *delegate*, an object\
    \ that implements certain methods that are invoked on it while the `NSXMLParser`\
    \ instance is processing an XML document. The delegate must conform to the `NSXMLParserDelegate`\
    \ protocol, thereby enabling it to respond to events (i.e., method invocations)\
    \ when the parser begins/ends processing the document, processes XML elements\
    \ and attributes, and so forth. The method shown in [Listing 10-7](#9781430250500_Ch10.xhtml#list7)\
    \ demonstrates the creation, initialization, and use of an `NSXMLParser` instance\
    \ to parse an XML document.\n\n*[Listing 10-7.](#9781430250500_Ch10.xhtml#_list7)\
    \ Parsing an XML Document*\n\n```objectivec\n- (void) parseXMLInfoset:(NSString\
    \ *)file\n{\n  NSURL *infoset = [NSURL fileURLWithPath:file];\n  NSXMLParser *parser\
    \ = [[NSXMLParser alloc]\n    initWithContentsOfURL:infoset];\n  [parser setDelegate:self];\n\
    \  [parser setShouldResolveExternalEntities:YES];\n  [parser parse];\n}\n```\n\
    \nAs mentioned earlier, a delegate object must conform to the `NSXMLParserDelegate`\
    \ protocol to be able to process document parsing events (e.g., begin parsing\
    \ a document, end parsing a document, start parsing an element, start mapping\
    \ a namespace prefix, end mapping a namespace prefix) from an `NSXMLParser` instance.\
    \ Unlike the `NSXML` (tree-based XML processing classes), the event-driven XML\
    \ parser classes enable you to read XML documents but not create or update them.\n\
    \nThe `NSXMLParser` class is available for use on both the Apple OS X and iOS\
    \ platform. The other XML processing classes mentioned here are only available\
    \ for use on the OS X platform.\n\n# Predicates\n\nThis collection of classes\
    \ provides a general means of specifying queries using predicates and expressions.\
    \ A *predicate* is a logical operator that returns either a true or false value\
    \ and is composed of one or more *expressions*. Predicates are used to constrain\
    \ a search for a query or to provide filtering of returned results. The `NSExpression`\
    \ class is used to represent expressions in a predicate, and it supports multiple\
    \ expression types. `NSPredicate`, `NSComparisonPredicate`, and `NSCompoundPredicate`\
    \ are used to create predicates. The code fragment shown in [Listing 10-8](#9781430250500_Ch10.xhtml#list8)\
    \ creates and initializes an array, then creates a predicate that searches for\
    \ elements in the array with a value greater than 1, and then creates a new, filtered\
    \ array using this predicate.\n\n*[Listing 10-8.](#9781430250500_Ch10.xhtml#_list8)\
    \ Creating a Filtered Array Using a Predicate*"
  raw: '`NSPointerArray` is a mutable collection similar to `NSDictionary` that provides
    additional storage options. Specifically, it can store arbitrary pointers. It
    can also store weakly referenced keys and/or values.


    NSSet


    `NSSet` and `NSMutableSet` manage unordered collections of objects that do not
    have to be of the same type. The objects stored in an `NSSet` are unique. The
    operations supported by `NSSet` include creation and initialization, finding an
    object in a set, comparing, and sorting (using the NSSet `sortedArrayUsingDescriptors:`
    method). If the objects in the set have a good hash function, accessing an element,
    setting an element, and removing an element all take constant time. With a poor
    hash function (one that causes frequent hash collisions), these operations take
    up linear time.


    Sets, excluding `NSCountedSets`, ensure that no object is represented more than
    once, and there is no net effect for adding an object more than once. The following
    statement uses the NSSet set`WithObjects:` convenience constructor to create an
    NSSet object assigned to the variable `mySet` initialized with `NSNumber` literals.


    ```

    NSSet *mySet = [NSSet setWithObjects:@1, @2, nil];

    ```


    NSCountedSet


    `NSCountedSet` is a mutable set that allows an object to be added multiple times
    (i.e., its elements aren’t required to be distinct). Each distinct object has
    an associated counter. An `NSSet` object keeps track of the number of times each
    distinct object is inserted and requires a corresponding object(s) to be removed
    the same number of times.


    NSHashTable


    `NSHashTable` is a mutable collection similar to `NSSet` that provides different
    options. Specifically, it can store arbitrary pointers. It can also store weakly
    referenced keys and/or values.


    NSPointerFunctions


    The `NSPointerFunctions` class defines functions for managing pointer functions.
    An `NSHashTable` *,* `NSMapTable` *,* or `NSPointerArray` object typically uses
    an `NSPointerFunctions` instance to define behavior for the pointers it manages.


    XML Processing


    The Foundation Framework XML processing classes support general-purpose XML document
    management and parsing functionality. The classes logically represent an XML document
    as a hierarchical tree structure and support the query and manipulation of XML
    document nodes. These classes support several XML-related technologies and standards,
    such as XQuery, XPath, XInclude, XSLT, DTD, and XHTML.


    Classes `NSXMLDTD` and `NSXMLDTDNode` are used for creating and modifying XML
    Document Type Definitions (DTDs). `NSXMLDocument`, `NSXMLNode`, and `NSXMLElement`
    are used for tree-based processing of XML documents. Instances of `NSXMLParser`
    are used to parse XML documents in an event-driven manner.


    XML DTD Processing


    The `NSXMLDTD` classes (`NSXMLDTD` and `NSXMLDTDNode`) represent a Document Type
    Definition (DTD). They are used for creating and modifying DTDs. The XML DTD processing
    classes (`NSXMLDTD`, `NSXMLDTDNode`) are available for use on the Apple OS X platform
    only (i.e., these classes are not available for the iOS platform).


    Tree-Based XML Processing


    The Foundation `NSXML` classes enable you to create, manipulate, modify, and query
    XML documents. These classes employ a Document Object Model (DOM) styled, tree-based
    data model that represents an XML document as a tree of nodes. Each node of the
    tree corresponds to an XML construct—an Element, an Attribute, Text, a Comment,
    a Processing Instruction, or a Namespace. An `NSXMLDocument` object represents
    an entire XML document as a logical tree structure. The code fragment shown in
    [Listing 10-6](#9781430250500_Ch10.xhtml#list6) creates an NSXMLDocument for the
    URL `http://www.apress.com/proobjectivec.xml`.


    [*Listing 10-6.*](#9781430250500_Ch10.xhtml#_list6)  Creating an NSXMLDocument
    Object


    ```

    NSURL *url = [NSURL URLWithString:@"http://www.apress.com/proobjectivec.xml"];

    NSError *err;

    NSXMLDocument *xmlDoc = [[NSXMLDocument alloc]

                              initWithContentsOfURL:url

                                            options:NSXMLDocumentValidate

                                              error:&err];

    ```


    `NSXMLNode`, the superclass of `NSXMLDocument`, includes methods for navigating
    a tree of nodes from an XML document. The following code fragment uses an `NSXMLNode`
    method, `nextNode`, to retrieve the next node in an XML document.


    ```

    NSXMLNode *node = [xmlDoc nextNode];

    ```


    `NSXMLElement`, a subclass of `NSXMLNode`, represents element nodes in an XML
    tree structure. It includes methods for managing child elements and attributes
    of an XML document. The following code fragment gets the `NSXMLElement` object
    with the given tag name of `"test"` and then uses this object to retrieve the
    child element nodes (an `NSArray` object) that have the specified name.


    ```

    NSXMLElement *testElem = [NSXMLNode elementWithName:@"test"];

    NSArray *children = [noteElem elementsForName:@"item"];

    ```


    The XML processing classes (`NSXMLDocument`, `NSXMLNode`, `NSXMLElement`) are
    available for use on the Apple OS X platform only (i.e., these classes are not
    available for the iOS platform).


    Event-Driven XML Processing


    The `NSXMLParser` class is used to parse XML documents, including DTD documents,
    in an event-driven manner. An `NSXMLParser` instance is configured with a *delegate*,
    an object that implements certain methods that are invoked on it while the `NSXMLParser`
    instance is processing an XML document. The delegate must conform to the `NSXMLParserDelegate`
    protocol, thereby enabling it to respond to events (i.e., method invocations)
    when the parser begins/ends processing the document, processes XML elements and
    attributes, and so forth. The method shown in [Listing 10-7](#9781430250500_Ch10.xhtml#list7)
    demonstrates the creation, initialization, and use of an `NSXMLParser` instance
    to parse an XML document.


    [*Listing 10-7.*](#9781430250500_Ch10.xhtml#_list7)  Parsing an XML Document


    ```

    - (void) parseXMLInfoset:(NSString *)file

    {

      NSURL *infoset = [NSURL fileURLWithPath:file];

      NSXMLParser *parser = [[NSXMLParser alloc]

        initWithContentsOfURL:infoset];

      [parser setDelegate:self];

      [parser setShouldResolveExternalEntities:YES];

      [parser parse];

    }

    ```


    As mentioned earlier, a delegate object must conform to the `NSXMLParserDelegate`
    protocol to be able to process document parsing events (e.g., begin parsing a
    document, end parsing a document, start parsing an element, start mapping a namespace
    prefix, end mapping a namespace prefix) from an `NSXMLParser` instance. Unlike
    the NSXML (tree-based XML processing classes), the event-driven XML parser classes
    enable you to read XML documents but not create or update them.


    The `NSXMLParser` class is available for use on both the Apple OS X and iOS platform.
    The other XML processing classes mentioned here are only available for use on
    the OS X platform.


    Predicates


    This collection of classes provides a general means of specifying queries using
    predicates and expressions. A *predicate* is a logical operator that returns either
    a true or false value and is composed of one or more *expressions*. Predicates
    are used to constrain a search for a query or to provide filtering of returned
    results. The `NSExpression` class is used to represent expressions in a predicate,
    and it supports multiple expression types. `NSPredicate`, `NSComparisonPredicate`,
    and `NSCompoundPredicate` are used to create predicates. The code fragment shown
    in [Listing 10-8](#9781430250500_Ch10.xhtml#list8) creates and initializes an
    array, then creates a predicate that searches for elements in the array with a
    value greater than 1, and then creates a new, filtered array using this predicate.


    [*Listing 10-8.*](#9781430250500_Ch10.xhtml#_list8)  Creating a Filtered Array
    Using a Predicate'
  trans: "\n# NSPointerArray\n\n`NSPointerArray` 是一个类似于 `NSDictionary` 的可变集合，提供了额外的存储选项。具体来说，它可以存储任意指针，还可以存储弱引用的键和/或值。\n\
    \n# NSSet\n\n`NSSet` 和 `NSMutableSet` 管理无序的对象集合，这些对象不必属于同一类型。存储在 `NSSet` 中的对象是唯一的。`NSSet`\
    \ 支持的操作包括创建和初始化、在集合中查找对象、比较以及排序（使用 `NSSet` 的 `sortedArrayUsingDescriptors:` 方法）。如果集合中的对象具有良好的哈希函数，访问元素、设置元素和删除元素的时间复杂度均为常数。如果哈希函数不佳（容易导致哈希冲突），这些操作的时间复杂度将变为线性。\n\
    \n集合（不包括 `NSCountedSet`）确保每个对象不会出现多次，因此重复添加对象不会产生任何效果。以下语句使用 `NSSet` 的 `setWithObjects:`\
    \ 便捷构造器创建了一个 `NSSet` 对象，该对象被赋值给变量 `mySet`，并使用 `NSNumber` 字面量进行初始化。\n\n```objectivec\n\
    NSSet *mySet = [NSSet setWithObjects:@1, @2, nil];\n```\n\n# NSCountedSet\n\n\
    `NSCountedSet` 是一个可变集合，允许一个对象被多次添加（即其元素不必是互异的）。每个不同的对象都关联一个计数器。`NSCountedSet`\
    \ 对象会跟踪每个不同对象被插入的次数，并且需要相应对象被移除相同次数。\n\n# NSHashTable\n\n`NSHashTable` 是一个类似于\
    \ `NSSet` 的可变集合，提供了不同的选项。具体来说，它可以存储任意指针，还可以存储弱引用的键和/或值。\n\n# NSPointerFunctions\n\
    \n`NSPointerFunctions` 类定义了用于管理指针函数的函数。`NSHashTable`、`NSMapTable` 或 `NSPointerArray`\
    \ 对象通常使用 `NSPointerFunctions` 实例来定义其所管理指针的行为。\n\n# XML 处理\n\nFoundation 框架的 XML\
    \ 处理类支持通用 XML 文档管理和解析功能。这些类在逻辑上将 XML 文档表示为层次化的树状结构，并支持 XML 文档节点的查询和操作。这些类支持多种\
    \ XML 相关技术和标准，例如 XQuery、XPath、XInclude、XSLT、DTD 和 XHTML。\n\n`NSXMLDTD` 和 `NSXMLDTDNode`\
    \ 类用于创建和修改 XML 文档类型定义（DTD）。`NSXMLDocument`、`NSXMLNode` 和 `NSXMLElement` 用于基于树的\
    \ XML 文档处理。`NSXMLParser` 的实例用于以事件驱动的方式解析 XML 文档。\n\n## XML DTD 处理\n\n`NSXMLDTD`\
    \ 类（`NSXMLDTD` 和 `NSXMLDTDNode`）表示文档类型定义（DTD）。它们用于创建和修改 DTD。XML DTD 处理类（`NSXMLDTD`、`NSXMLDTDNode`）仅在\
    \ Apple OS X 平台上可用（即这些类不适用于 iOS 平台）。\n\n## 基于树的 XML 处理\n\nFoundation 的 `NSXML`\
    \ 类使您能够创建、操作、修改和查询 XML 文档。这些类采用文档对象模型（DOM）风格的、基于树的数据模型，将 XML 文档表示为节点的树。树中的每个节点对应一个\
    \ XML 结构——元素、属性、文本、注释、处理指令或命名空间。`NSXMLDocument` 对象将整个 XML 文档表示为逻辑树结构。代码清单 10-6\
    \ 中显示的代码片段为 URL `http://www.apress.com/proobjectivec.xml` 创建了一个 `NSXMLDocument`。\n\
    \n*代码清单 10-6. 创建 NSXMLDocument 对象*\n\n```objectivec\nNSURL *url = [NSURL URLWithString:@\"\
    http://www.apress.com/proobjectivec.xml\"];\nNSError *err;\nNSXMLDocument *xmlDoc\
    \ = [[NSXMLDocument alloc]\n                          initWithContentsOfURL:url\n\
    \                                        options:NSXMLDocumentValidate\n     \
    \                                     error:&err];\n```\n\n`NSXMLNode` 是 `NSXMLDocument`\
    \ 的父类，包含用于遍历 XML 文档节点树的方法。以下代码片段使用 `NSXMLNode` 的方法 `nextNode` 来检索 XML 文档中的下一个节点。\n\
    \n```objectivec\nNSXMLNode *node = [xmlDoc nextNode];\n```\n\n`NSXMLElement` 是\
    \ `NSXMLNode` 的子类，代表 XML 树结构中的元素节点。它包含管理 XML 文档子元素和属性的方法。以下代码片段获取标签名为 `\"test\"\
    ` 的 `NSXMLElement` 对象，然后使用该对象检索具有指定名称的子元素节点（一个 `NSArray` 对象）。\n\n```objectivec\n\
    NSXMLElement *testElem = [NSXMLNode elementWithName:@\"test\"];\nNSArray *children\
    \ = [noteElem elementsForName:@\"item\"];\n```\n\nXML 处理类（`NSXMLDocument`、`NSXMLNode`、`NSXMLElement`）仅在\
    \ Apple OS X 平台上可用（即这些类不适用于 iOS 平台）。\n\n## 事件驱动的 XML 处理\n\n`NSXMLParser` 类用于以事件驱动的方式解析\
    \ XML 文档，包括 DTD 文档。一个 `NSXMLParser` 实例配置了一个*委托*，该委托是一个实现了某些方法的对象，当 `NSXMLParser`\
    \ 实例处理 XML 文档时，这些方法会被调用。委托必须符合 `NSXMLParserDelegate` 协议，从而使其能够响应事件（即方法调用），例如解析器开始/结束处理文档、处理\
    \ XML 元素和属性等。代码清单 10-7 中显示的方法演示了创建、初始化并使用 `NSXMLParser` 实例解析 XML 文档的过程。\n\n*代码清单\
    \ 10-7. 解析 XML 文档*\n\n```objectivec\n- (void) parseXMLInfoset:(NSString *)file\n\
    {\n  NSURL *infoset = [NSURL fileURLWithPath:file];\n  NSXMLParser *parser = [[NSXMLParser\
    \ alloc]\n    initWithContentsOfURL:infoset];\n  [parser setDelegate:self];\n\
    \  [parser setShouldResolveExternalEntities:YES];\n  [parser parse];\n}\n```\n\
    \n如前所述，委托对象必须符合 `NSXMLParserDelegate` 协议，才能处理来自 `NSXMLParser` 实例的文档解析事件（例如，开始解析文档、结束解析文档、开始解析元素、开始映射命名空间前缀、结束映射命名空间前缀）。与\
    \ `NSXML`（基于树的 XML 处理类）不同，事件驱动的 XML 解析器类使您能够读取 XML 文档，但不能创建或更新它们。\n\n`NSXMLParser`\
    \ 类同时适用于 Apple OS X 和 iOS 平台。此处提到的其他 XML 处理类仅适用于 OS X 平台。\n\n# 谓词\n\n这组类提供了一种使用谓词和表达式指定查询的通用方法。*谓词*\
    \ 是一个逻辑运算符，返回 true 或 false 值，并由一个或多个*表达式*组成。谓词用于约束查询的搜索范围或过滤返回的结果。`NSExpression`\
    \ 类用于表示谓词中的表达式，并支持多种表达式类型。`NSPredicate`、`NSComparisonPredicate` 和 `NSCompoundPredicate`\
    \ 用于创建谓词。代码清单 10-8 中显示的代码片段创建并初始化了一个数组，然后创建了一个谓词来搜索数组中值大于 1 的元素，最后使用该谓词创建了一个新的过滤后数组。\n\
    \n*代码清单 10-8. 使用谓词创建过滤后的数组*\n"
- fmt: "# Foundation Framework\n\n## Roundup\n\nIn this chapter, you began your review\
    \ of the Foundation Framework, focusing on classes that provide common, general-purpose\
    \ functionality required for most Objective-C programs. You should now be familiar\
    \ with Foundation Framework classes that provide the following functionality:\n\
    \n- Root classes\n- Working with strings\n- Numbers and value objects\n- Collections\n\
    - XML processing\n\n# Chapter 11: Foundation Framework System Services\n\nIn this\
    \ chapter, you will learn about Foundation Framework classes that provide system\
    \ services. These classes implement a variety of operating system services for\
    \ networking, file management, interprocess communication, system information\
    \ retrieval, text processing, threading, and concurrency.\n\n## Network Services\n\
    \nThe Foundation Framework includes various APIs to support network services.\
    \ In the next few chapters, you’ll learn about APIs used to access network host\
    \ information, and explore how to utilize the Bonjour network protocol to publish\
    \ and discover network services.\n\n### `NSHost`\n\nThe `NSHost` class contains\
    \ methods to access information for a **network host**, which is a collection\
    \ of network names and addresses for a computer or device connected to a network.\
    \ An `NSHost` object represents an individual network host. Its methods can be\
    \ used to look up the network name and address information for the host or other\
    \ objects on a network. The code in [Listing 11-1](#9781430250500_Ch11.xhtml#list1)\
    \ uses the `NSHost` `currentHost` and `name` methods to retrieve the `NSHost`\
    \ object for the host the program is running on, and then logs the host name to\
    \ the console.\n\n**Listing 11-1.** Retrieving the Network Host Name Using `NSHost`\n\
    \n```\nNSHost myHost = [NSHost currentHost];\nNSLog(@\"Host name is %@\", [myHost\
    \ name]);\n```\n\n[Listing 11-2](#9781430250500_Ch11.xhtml#list2) uses the `NSHost`\
    \ `hostWithName:` and `address` methods to create an `NSHost` object with the\
    \ domain name `www.apress.com`, and then logs the host address to the console.\n\
    \n**Listing 11-2.** Retrieving a Host Address Using `NSHost`\n\n```\nNSHost *apress\
    \ = [NSHost hostWithName:@\"www.apress.com\"];\nNSLog(@\"Apress host address is\
    \ %@\", [apress address]);\n```\n\n### Bonjour Network Services\n\nBonjour is\
    \ a protocol that automatically creates a functional IP network without the need\
    \ for configuration or manual intervention, also known as **zero configuration\
    \ networking**. Bonjour is designed to enable devices, such as computers and printers,\
    \ to connect to a network automatically. It performs a variety of functions, including\
    \ service discovery, address assignment, and hostname resolution.\n\nThe `NSNetService`\
    \ and `NSNetServiceBrowser` classes provide functionality to manage Bonjour network\
    \ services. The `NSNetService` class represents a network service that an application\
    \ publishes or uses as a client. A service can be either a local service that\
