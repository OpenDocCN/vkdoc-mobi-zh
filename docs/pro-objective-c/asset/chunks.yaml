  raw: '**Note**   Key-value coding can be used to access three different categories
    of properties: simple attributes, to-one relationships, or to-many relationships.  An
    *attribute* is a property that is a primitive (i.e., basic type), Boolean, string
    (`NSString`), or value object (`NSDate`, `NSNumber`, `NSDecimalNumber`, `NSValue`).
    A property that conforms to a *to-one relationship* is an object type and (potentially)
    has properties of its own. This includes framework classes (e.g., Foundation Framework)
    and your own custom classes. A property that conforms to a *to-many relationship*
    consists of a collection of similar type objects. These are most commonly collection
    types (`NSArray`, `NSSet`, etc.).


    Property Accessor Naming Conventions


    As you learned in the last section, the default `NSObject` key-value coding implementation
    relies on key-value compliant properties. Specifically, such properties must comply
    with the standard Cocoa naming conventions for property accessor methods. These
    can be summarized as follows:


    *   A getter method should use the `<key>` accessor form, where the method and
    property name are identical. For a property named `firstName`, the getter method
    should also be named `firstName`. This is true for all data types except for Boolean
    properties, for which the getter method should be prepended with the word `is`
    (e.g., `isFirstName` in the previous example).

    *   The setter method for a property should use the `set<key>` form, where the
    method name is the same as the property, prepended with the word `set`. For a
    property named `firstName`, the setter method should be named `setFirstName:`.


    These conventions should be used for attribute and to-one relationship properties.
    As an example, given a property named `person` of type `Type`, the getter and
    setter accessor methods for the property should be named as follows:


    ```

    - (Type)person;

    - (void)setPerson:(Type)newValue;

    ```


    In the preceding example, if the type of the property `person` is Boolean, the
    getter method could instead be named as follows:


    ```

    - (BOOL)isPerson;

    ```


    As another example, a property of type `NSString *` named `address` would have
    accessors with the following names:


    ```

    - (NSString *)address

    - (void)setAddress:(NSString *)

    ```


    Note that if your properties are defined by autosynthesis (as explained in [Chapter
    2](#9781430250500_Ch02.xhtml)), the compiler automatically generates accessor
    methods that follow this convention.


    Key-value coding depends on these naming conventions; hence, your code must follow
    these in order for key-value coding to work properly.


    To-Many Property Accessor Naming Conventions


    In addition to the `<key>` and `set<key>` accessor forms, to-many relationship
    properties (i.e., collections) should implement an additional set of accessor
    methods. These additional methods can improve the performance of KVC mutable collection
    APIs, enable you to model to-many relationships with classes beyond `NSArray`
    or `NSSet` (i.e., your own custom classes), and enable your code to use the KVC
    accessor methods to make modifications to collections.


    To-many relationship properties have several accessor patterns, depending upon
    the type of collection. A class with properties that maintain an ordered, to-many
    relationship (these are typically of type `NSArray` or `NSMutableArray`) should
    implement the methods listed in [Table 18-1](#9781430250500_Ch18.xhtml#Tab1).


    [Table 18-1](#9781430250500_Ch18.xhtml#_Tab1). Methods to Implement for Ordered,
    To-Many Relationship Properties


    | Method | Ordered, To-Many Relationship | Mutable Ordered, To-Many Relationship
    |

    | --- | --- | --- |

    | `countOf<Key>` | Required | Required |

    | `objectIn<Key>AtIndex:` `(or` <`key>AtIndexes:)` | Required | Required |

    | `get<Key>:range:` | Optional | Optional |

    | `insertObject:in<Key>AtIndex:` `(or insert<Key>:atIndexes:)` |  | Required |

    | `removeObjectFrom<Key>AtIndex:` `(or remove<Key>AtIndexes:)` |  | Required |

    | `replaceObjectIn<Key>AtIndex:withObject:` `(or replaceKeyAtIndexes:with<Key>:)`
    |  | Optional |


    Implementing the optional methods of [Table 18-1](#9781430250500_Ch18.xhtml#Tab1)
    can improve performance when accessing collection elements. Recall that [Figure
    18-1](#9781430250500_Ch18.xhtml#Fig1) depicts the object graph for a `Person`
    class. Imagine a to-many property named `people` (of type `NSArray *`). [Listing
    18-7](#9781430250500_Ch18.xhtml#list7) provides implementations of the `countOf<Key>`
    and `objectIn<Key>AtIndex:` methods for this property.


    [*Listing 18-7.*](#9781430250500_Ch18.xhtml#_list7)  Example Implementations of
    Accessors for an Ordered, To-Many Property


    ```

    - (NSUInteger)countOfPeople

    {

      return [self.people count];

    }


    - (Person *)objectInPeopleAtIndex:(NSUInteger)index

    {

      return [self.people objectAtIndex:index];

    }

    ```


    A class with properties that maintain an unordered, to-many relationship (typically
    of type `NSSet` or `NSMutableSet`) should implement the methods listed in [Table
    18-2](#9781430250500_Ch18.xhtml#Tab2).


    [Table 18-2](#9781430250500_Ch18.xhtml#_Tab2). Methods to Implement for Unordered,
    To-many Relationship Properties


    | Method | Ordered, To-Many Relationship | Mutable Ordered, To-Many Relationship
    |

    | --- | --- | --- |

    | `countOf<Key>` | Required | Required |

    | `enumeratorOf<Key>` | Required | Required |

    | `memberOf<Key>:` | Optional | Optional |

    | `add<Key>Object: (or add<Key>:)` |  | Required |

    | `remove<Key>Object: (or remove<Key>:)` |  | Required |


    Imagine that the to-many property named `people` is of type `NSSet *` (i.e., an
    unordered, to-many relationship property). [Listing 18-8](#9781430250500_Ch18.xhtml#list8)
    provides implementations of the `enumeratorOf<Key>` and `memberOf<Key>` methods
    for this property.


    [*Listing 18-8.*](#9781430250500_Ch18.xhtml#_list8)  Example Implementations of
    Accessors for an Unordered, To-Many Property


    ```

    - (NSEnumerator *)enumeratorOfPeople

    {

      return [self.people objectEnumerator];

    }


    - (Person *)memberOfPeople:(Person *)obj

    {

      return [self.people member:obj];

    }

    ```


    Key-Value Validation


    Key-value coding also provides infrastructure for validating property values.
    The KVC validation mechanism comprises a set of APIs and a standard convention
    for custom property validation methods. The KVC validation methods can be called
    directly, or indirectly by invoking the KVC `validateValue:forKey:error:` method.


    Key-value validation specifies a convention for naming a property’s validation
    method. The selector for a validation method is


    ```

    validate<Key>:error:

    ```


    `<Key>` is the name of the property. For example, given a property named `person`,
    its validation method is `validatePerson:error:`. [Listing 18-9](#9781430250500_Ch18.xhtml#list9)
    provides an example implementation of the validation method for the `city` property
    of the `Address` class shown in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1).


    [*Listing 18-9.*](#9781430250500_Ch18.xhtml#_list9)  Example Validation Method
    Implementation for the City Property


    ```

    - (BOOL)validateCity:(id *)value error:(NSError * __autoreleasing *)error

    {

      if (*value == nil)

      {

        if (error != NULL)

        {

          *error = [NSError errorWithDomain:@"Invalid Property Value (nil)"

                                       code:1

                                   userInfo:nil];

        }

        return NO;

      }

      return YES;

    }

    ```'
  trans: "\n# 键值编码\n\n**注意**：键值编码可用于访问三类不同的属性：简单属性、对一关系和对多关系。*属性*是原始类型（即基本类型）、布尔值、字符串（`NSString`）或值对象（`NSDate`、`NSNumber`、`NSDecimalNumber`、`NSValue`）。符合*对一关系*的属性是一种对象类型，并且（可能）拥有自己的属性。这包括框架类（例如\
    \ Foundation 框架）和你自己的自定义类。符合*对多关系*的属性由一组相似类型的对象组成。最常见的集合类型有 `NSArray`、`NSSet`\
    \ 等。\n\n## 属性访问器命名约定\n\n如上一节所述，默认的 `NSObject` 键值编码实现依赖于键值兼容的属性。具体来说，此类属性必须符合 Cocoa\
    \ 关于属性访问器方法的标准命名约定。这些约定可以总结如下：\n\n*   取值方法应使用 `<key>` 访问器形式，其中方法名和属性名相同。对于名为 `firstName`\
    \ 的属性，取值方法也应命名为 `firstName`。这对于除布尔值属性外的所有数据类型都适用；对于布尔值属性，取值方法应添加前缀 `is`（例如，前述示例中的\
    \ `isFirstName`）。\n*   属性的设值方法应使用 `set<key>` 形式，其中方法名与属性名相同，并添加前缀 `set`。对于名为 `firstName`\
    \ 的属性，设值方法应命名为 `setFirstName:`。\n\n这些约定应适用于属性和对一关系属性。例如，对于名为 `person`、类型为 `Type`\
    \ 的属性，其取值方法和设值方法应如下命名：\n\n```\n- (Type)person;\n- (void)setPerson:(Type)newValue;\n\
    ```\n\n在前面的例子中，如果属性 `person` 的类型是布尔值，则取值方法可以改为如下命名：\n\n```\n- (BOOL)isPerson;\n\
    ```\n\n再比如，一个类型为 `NSString *`、名为 `address` 的属性，其访问器命名如下：\n\n```\n- (NSString *)address\n\
    - (void)setAddress:(NSString *)\n```\n\n请注意，如果你的属性是通过自动合成定义的（详见第 2 章），编译器会自动生成遵循此约定的访问器方法。\n\
    \n键值编码依赖于这些命名约定；因此，你的代码必须遵循这些约定，才能确保键值编码正常工作。\n\n## 对多属性访问器命名约定\n\n除了 `<key>`\
    \ 和 `set<key>` 访问器形式外，对多关系属性（即集合）还应实现一组额外的访问器方法。这些额外的方法可以提升 KVC 可变集合类的性能，使你能够使用除\
    \ `NSArray` 或 `NSSet` 之外的类（即你自己的自定义类）来建模对多关系，并使你的代码能够使用 KVC 访问器方法对集合进行修改。\n\n\
    根据集合类型的不同，对多关系属性有几种访问器模式。维护有序对多关系的类（这些通常是 `NSArray` 或 `NSMutableArray` 类型）应实现表\
    \ 18-1 中列出的方法。\n\n表 18-1. 有序对多关系属性需实现的方法\n\n| 方法 | 有序对多关系 | 可变有序对多关系 |\n| ---\
    \ | --- | --- |\n| `countOf<Key>` | 必需 | 必需 |\n| `objectIn<Key>AtIndex:` `(或 <key>AtIndexes:)`\
    \ | 必需 | 必需 |\n| `get<Key>:range:` | 可选 | 可选 |\n| `insertObject:in<Key>AtIndex:`\
    \ `(或 insert<Key>:atIndexes:)` |  | 必需 |\n| `removeObjectFrom<Key>AtIndex:` `(或\
    \ remove<Key>AtIndexes:)` |  | 必需 |\n| `replaceObjectIn<Key>AtIndex:withObject:`\
    \ `(或 replaceKeyAtIndexes:with<Key>:)` |  | 可选 |\n\n实现表 18-1 中的可选方法可以在访问集合元素时提升性能。回顾\
    \ 图 18-1 描绘了 `Person` 类的对象图。设想一个名为 `people`（类型为 `NSArray *`）的对多属性。代码清单 18-7 提供了该属性的\
    \ `countOf<Key>` 和 `objectIn<Key>AtIndex:` 方法的实现。\n\n*代码清单 18-7.*  有序对多属性访问器的示例实现\n\
    \n```\n- (NSUInteger)countOfPeople\n{\n  return [self.people count];\n}\n\n- (Person\
    \ *)objectInPeopleAtIndex:(NSUInteger)index\n{\n  return [self.people objectAtIndex:index];\n\
    }\n```\n\n维护无序对多关系的类（通常是 `NSSet` 或 `NSMutableSet` 类型）应实现表 18-2 中列出的方法。\n\n表 18-2.\
    \ 无序对多关系属性需实现的方法\n\n| 方法 | 有序对多关系 | 可变有序对多关系 |\n| --- | --- | --- |\n| `countOf<Key>`\
    \ | 必需 | 必需 |\n| `enumeratorOf<Key>` | 必需 | 必需 |\n| `memberOf<Key>:` | 可选 | 可选\
    \ |\n| `add<Key>Object: (或 add<Key>:)` |  | 必需 |\n| `remove<Key>Object: (或 remove<Key>:)`\
    \ |  | 必需 |\n\n设想名为 `people` 的对多属性是 `NSSet *` 类型（即无序对多关系属性）。代码清单 18-8 提供了该属性的\
    \ `enumeratorOf<Key>` 和 `memberOf<Key>` 方法的实现。\n\n*代码清单 18-8.*  无序对多属性访问器的示例实现\n\
    \n```\n- (NSEnumerator *)enumeratorOfPeople\n{\n  return [self.people objectEnumerator];\n\
    }\n\n- (Person *)memberOfPeople:(Person *)obj\n{\n  return [self.people member:obj];\n\
    }\n```\n\n## 键值验证\n\n键值编码还提供了用于验证属性值的框架。KVC 验证机制由一组 API 和一套用于自定义属性验证方法的标准约定组成。KVC\
    \ 验证方法可以直接调用，也可以通过调用 `validateValue:forKey:error:` 方法间接调用。\n\n键值验证指定了属性验证方法的命名约定。验证方法的\
    \ selector 为\n\n```\nvalidate<Key>:error:\n```\n\n其中 `<Key>` 是属性名称。例如，对于名为 `person`\
    \ 的属性，其验证方法为 `validatePerson:error:`。代码清单 18-9 为 图 18-1 中所示的 `Address` 类的 `city`\
    \ 属性提供了一个验证方法的示例实现。\n\n*代码清单 18-9.*  City 属性的示例验证方法实现\n\n```\n- (BOOL)validateCity:(id\
    \ *)value error:(NSError * __autoreleasing *)error\n{\n  if (*value == nil)\n\
    \  {\n    if (error != NULL)\n    {\n      *error = [NSError errorWithDomain:@\"\
    Invalid Property Value (nil)\"\n                                   code:1\n  \
    \                             userInfo:nil];\n    }\n    return NO;\n  }\n  return\
    \ YES;\n}\n```\n"
- fmt: "As shown in the preceding method implementation, the method returns a Boolean\
    \ value of `YES` or `NO`. It returns `NO` if the object value is not valid and\
    \ a valid value cannot be created and returned. In this case, an `NSError` object\
    \ is also returned (via double-indirection) that indicates the reason that validation\
    \ failed. A validation method returns `YES` under the following scenarios:\n\n\
    - If the input object value is valid, `YES` is returned.\n- If the input object\
    \ value is not valid, but a new object value that is valid is created and returned,\
    \ then `YES` is returned after setting the input value to the new, valid value.\n\
    \nThe KVC method that performs property validation (by invoking the corresponding\
    \ `validate<Key>:error:` method) is declared as follows:\n\n```\n- (BOOL)validate<Key>:(id\
    \ *)value error:(NSError **)error;\n```\n\nNote that key-value coding does not\
    \ automatically invoke a property validation method. Your code must manually perform\
    \ property validation, typically by calling its validation method directly or\
    \ using the KVC validation API. [Listing 18-10](#9781430250500_Ch18.xhtml#list10)\
    \ illustrates an example usage of key-value validation on an `Address` instance\
    \ named `address` to validate a value before setting it on the `Address` property\
    \ named `city`.\n\n[*Listing 18-10.*](#9781430250500_Ch18.xhtml#_list10)  Using\
    \ Key-Value Validation\n\n```\nNSError *error;\nNSString *value = @\"San Jose\"\
    ;\nBOOL result = [address validateValue:&value forKey:@\"city\" error:&error];\n\
    if (result)\n{\n  [address setValue:value forKey:@\"city\"];\n}\n```\n\n## Key-Value\
    \ Coding Collection Operators\n\nKey-value coding includes a set of operators\
    \ that allow actions to be performed on the items of a collection using key path\
    \ dot notation. The format of the specialized key path for the KVC collection\
    \ operators is:\n\n```\ncollectionKeyPath.@operator.propertyKeyPath\n```\n\nThis\
    \ specialized key path is used as a parameter of the `valueForKeyPath:` method\
    \ to perform collection operations. Note that components of this key path are\
    \ separated by a period. The `collectionKeyPath`, if provided, is the key path\
    \ of the array or set (relative to the receiver) on which the operation is performed.\
    \ The `operator` (preceded by an ampersand) is the operation performed on the\
    \ collection. Finally, the `propertyKeyPath` is the key path for the property\
    \ of the collection that the operator uses. There are several types of collection\
    \ operators: simple collection operators that operate on the properties of a collection,\
    \ object operators that provide results when the operator is applied on a single\
    \ collection instance, and collection operators that operate on nested collections\
    \ and return an array or set depending on the operator.\n\nThe best way to illustrate\
    \ how the collection operators work is by example, so that’s what you’ll do here.\
    \ [Listing 18-11](#9781430250500_Ch18.xhtml#list11) declares the interface to\
    \ an `OrderItem` class that includes several properties.\n\n[*Listing 18-11.*](#9781430250500_Ch18.xhtml#_list11)\
    \  OrderItem Class Interface\n\n```\n@interface OrderItem : NSObject\n\n@property\
    \ NSString *description;\n@property NSUInteger *quantity;\n@property float *price;\n\
    \n@end\n```\n\nGiven a collection of `OrderItem` instances stored in an `NSArray`\
    \ object named `orderItems`, the following expression uses the KVC `valueForKeyPath:`\
    \ expression with the `@sum` collection operator to sum the prices of the items.\n\
    \n```\nNSNumber *totalPrice = [orderItems valueForKeyPath:@\"@sum.price\"];\n\
    ```\n\nThe number of objects in the `orderItems` collection can be determined\
    \ using the `@count` collection operator, as follows:\n\n```\nNSNumber *totalItems\
    \ = [orderItems valueForKeyPath:@\"@count\"];\n```\n\nThe number of distinct order\
    \ items, each with a different description, can be obtained by using the `@distinctUnionOfObjects`\
    \ operator, as follows:\n\n```\nNSArray *itemTypes = [orderItems\n           \
    \           valueForKeyPath:@\"@distinctUnionOfObjects.description\"];\n```\n\n\
    Now let’s look at an example that uses a collection operator on a collection property.\
    \ [Listing 18-12](#9781430250500_Ch18.xhtml#list12) declares the interface to\
    \ an `Order` class with a single property.\n\n[*Listing 18-12.*](#9781430250500_Ch18.xhtml#_list12)\
    \  Order Class Interface\n\n```\n@interface Order : NSObject\n\n@property NSArray\
    \ *items;\n\n@end\n```\n\nGiven an `Order` instance named `order`, the `@count`\
    \ operator can be used to determine the number of objects in the key path collection.\
    \ In this case, the key path consists of the key path to the collection (`items`),\
    \ followed by the `@count` operator.\n\n```\nNSNumber *totalItems = [order valueForKeyPath:@\"\
    items.@count\"];\n```\n\nThe preceding examples demonstrate usage of a subset\
    \ of the available KVC collection operators. The Apple Key-Value Programming Guide\
    \ provides a complete reference of the collection operators.\n\n## Key-Value Observing\n\
    \nKey-value observing (KVO) is a mechanism that enables objects to be notified\
    \ of changes to the properties of other objects. It is essentially an implementation\
    \ of the observer software design pattern, and is implemented in numerous software\
    \ libraries and frameworks. In fact, it is a key component of the model-view-controller\
    \ (MVC) design pattern, a central component of the Cocoa and Cocoa Touch frameworks.\
    \ Key-value observing provides numerous benefits, including the decoupling of\
    \ observer objects from the object being observed (i.e., the subject), framework-level\
    \ support, and a full-featured set of APIs. The following example uses key-value\
    \ observing to register an `Administrator` object as an observer of the `name`\
    \ property of a `Person` instance named `person`.\n\n```\nAdministrator *admin\
    \ = [Administrator new];\n[person addObserver:admin\n         forKeyPath:@\"name\"\
    \n            options:NSKeyValueObservingOptionNew\n            context:NULL];\n\
    ```\n\nInvoking the `addObserver:forKeyPath:options:context:` method creates a\
    \ connection between the subject and the observer object. When the value of the\
    \ observed property changes, the subject invokes the observer’s `observeValueForKeyPath:ofObject:change:context:`\
    \ method. In this method, an observer class implements logic to handle the property\
    \ change. A subject automatically invokes this method when the value of an observed\
    \ property is changed in a KVO-compliant manner, or the key on which it depends\
    \ is changed. Observers must implement this method for key-value observing to\
    \ work properly. [Listing 18-13](#9781430250500_Ch18.xhtml#list13) provides an\
    \ example implementation of this method for the `Administrator` class.\n\n[*Listing\
    \ 18-13.*](#9781430250500_Ch18.xhtml#_list13)  Example Implementation of `observeValueForKeyPath:ofObject:change:context:`\
    \ Method\n\n```\n@implementation Administrator\n\n...\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath ofObject:(id)object\n        change:(NSDictionary *)change context:(void\
    \ *)context\n{\n  if ([@\"name\" isEqual:keyPath])\n  {\n    // Insert logic to\
    \ handle update of person's name\n    ....\n  }\n  // Invoke the superclass's\
    \ implementation if it implements this!\n  [super observeValueForKeyPath:keyPath\n\
    \                       ofObject:object\n                         change:change\n\
    \                        context:context];\n}\n...\n\n@end\n```\n\nThe `NSKeyValueObserving`\
    \ informal protocol defines the API for key-value observing. Its methods enable\
    \ change notification, registering observers, notifying observers of changes,\
    \ and customizing observing. `NSObject` provides the default implementation of\
    \ the `NSKeyValueObserving` protocol, and thus any class that descends from `NSObject`\
    \ has built-in support for key-value observing. In addition, you can further refine\
    \ notifications by disabling automatic observer notifications and implementing\
    \ manual notifications using the methods in this protocol.\n\n## Key-Value Observing\
    \ or Notifications"
