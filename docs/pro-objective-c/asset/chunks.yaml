    3-11](#9781430250500_Ch03.xhtml#list11) (updates are shown in **bold**).


    [*Listing 3-11.*](#9781430250500_Ch03.xhtml#_list11)   Hydrogen Class Message
    Fast Forwarding Updates


    ```

    @implementation Hydrogen

    {

    @private HydrogenHelper *helper;

    }

    ...

    - (id) initWithNeutrons:(NSUInteger)neutrons

    {

      if ((self = [super init]))

      {

        // Initialization code here.

        _chemicalElement = @"Hydrogen";

        _atomicSymbol = @"H";

        _protons = 1;

        _neutrons = neutrons;


    // Create helper for message forwarding

        helper = [[HydrogenHelper alloc] init];

      }


    return self;

    }


    - (id) forwardingTargetForSelector:(SEL)aSelector

    {

      if ([helper respondsToSelector:aSelector])

      {

        return helper;

      }

      return nil;

    }

    ...

    @end

    ```


    First, the `Hydrogen` class adds a `HydrogenHelper*` instance variable. Next,
    in the `init` method, the `HydrogenHelper` object is created and initialized.
    This is the target object that will be used for message forwarding. Finally, the
    `forwardingTargetForSelector:` method is implemented. The method first checks
    to see if the message is one that the target (`HydrogenHelper`) object can process.
    If it can, it returns that object; otherwise, it returns `nil`. Recall that the
    `HydrogenHelper` class has a single instance method, `factoid`. Thus if a `Hydrogen`
    object receives a message for an instance method named `factoid`, it will be redirected
    to send that message to its `HydrogenHelper` object (see [Figure 3-4](#9781430250500_Ch03.xhtml#Fig4)).


    ![9781430250500_Fig03-04.jpg](images/9781430250500_Fig03-04.jpg)


    [Figure 3-4](#9781430250500_Ch03.xhtml#_Fig4). Fast forwarding the factoid method
    for the Hydrogen class'
  trans: "\n`objectName` 是实例变量名，`propertyName` 是属性名。设置属性值的点语法如下：\n\n```\nobjectName.propertyName\
    \ = Value\n```\n\n点语法只是一种替代语法，并非直接访问属性支持的实例变量的机制。编译器会将这些语句转换为相应的属性访问器方法。\n\nObjective-C\
    \ 还提供了对*类方法*的语言级支持。这些方法是在类级别定义的，并直接在类上调用。调用类方法的语法为：\n\n```\n[className messageNameParams]\n\
    ```\n\n类方法的工作方式与实例方法相同，区别在于它们是在类上调用的，而非对象。因此，类方法无法访问为该类定义的实例变量和方法。它们通常用于创建类的新实例（即作为工厂方法），或访问与类关联的共享信息。\n\
    \n通过将消息（请求的行为）与接收者（能够响应请求的方法的拥有者）分离，对象消息传递直接支持了面向对象编程的封装范式。\n\nObjective-C 通过语言级特性增强了对对象消息传递的支持，使你能够在运行时确定要调用的方法，甚至更改方法的实现。你将在本书第二部分探索这些特性；但现在，让我们先学习如何处理对象收到无法处理的消息的情况。\n\
    \n## 消息转发\n\nObjective-C 的对象消息传递根据对象接收到的消息，查找并执行该对象上的方法。对象类型可以在代码中指定并在编译时静态绑定（*静态类型*），也可以不指定类型而在运行时解析其类型（*动态类型*）。无论哪种情况，运行时接收消息的对象都会解释该消息以确定要调用哪个方法。这种方法调用的运行时解析使得程序可以轻松动态更改和/或扩展，但同时也带来一定风险：它允许程序向可能没有对应方法的对象发送消息。在默认情况下，如果发生这种情况，会抛出运行时异常。然而，Objective-C\
    \ 提供了另一种选择：通过一种称为*消息转发*的机制，可以配置对象在收到未映射到其方法集的消息时执行用户定义的处理。消息转发使对象能够对其收到的任何无法识别的消息执行多种逻辑，比如将其分发给能够响应该消息的不同接收者，将所有无法识别的消息发送到同一目标，或者简单地静默“吞掉”该消息（即既不执行处理，也不引发运行时错误）。\n\
    \n## 转发选项\n\nObjective-C 提供了两种消息转发选项供你使用。\n\n- *快速转发*：继承自 `NSObject` 的类可以通过重写\
    \ `NSObject` 的 `forwardingTargetForSelector:` 方法来实现快速转发，将方法转发给另一个对象。这种技术使得你的对象和转发对象的实现看起来像是合并在一起。这模拟了类实现的多继承行为。如果你有一个目标类定义了你的对象可能消费的所有消息，这种方法会很有效。\n\
    - *正常（完整）转发*：继承自 `NSObject` 的类可以通过重写 `NSObject` 的 `forwardInvocation:` 方法来实现正常转发。这种技术使你的对象能够使用消息的完整内容（目标、方法名、参数）。\n\
    \n如果你有一个目标类定义了你的对象可能消费的所有消息，快速转发会很有效。如果你没有这样的目标类，或者希望在收到消息时执行其他处理（例如，仅记录并吞掉消息），则应使用完整转发。\n\
    \n## 为 Hydrogen 类添加快速转发\n\n为了让你了解如何使用消息转发，我们将为刚刚实现的 `Hydrogen` 类添加这一能力。我们将扩展该类以提供快速转发，然后创建一个辅助目标类，通过实现相应的方法来处理转发的消息。\n\
    \n### 消息转发辅助类\n\n首先，创建辅助类。在 Xcode 中，新建一个 Objective-C 类。将其命名为 `HydrogenHelper`，并将\
    \ Elements 项目设定为其目标。在 Xcode 导航窗格中，可以看到已创建了两个新文件（`HydrogenHelper.h` 和 `HydrogenHelper.m`）。选择\
    \ `HydrogenHelper.h` 文件，然后在编辑窗格中，按代码清单 3-9 所示更新其接口。\n\n*代码清单 3-9.* HydrogenHelper\
    \ 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface HydrogenHelper :\
    \ NSObject\n\n- (NSString *) factoid;\n\n@end\n```\n\n该接口声明了一个实例方法 `factoid`，该方法返回一个指向\
    \ `NSString` 的指针（`NSString *`）。接下来，选择实现文件（`HydrogenHelper.m`），并按代码清单 3-10 所示定义\
    \ `factoid` 方法。\n\n*代码清单 3-10.* HydrogenHelper 实现\n\n```\n#import \"HydrogenHelper.h\"\
    \n\n@implementation HydrogenHelper\n\n- (NSString *) factoid\n{\n  return @\"\
    最轻的元素和含量最丰富的化学物质。\";\n}\n```\n\n如代码清单 3-10 所示，`HydrogenHelper` 的 `factoid` 方法返回关于氢元素的一个简单事实。现在，你将更新\
    \ `Hydrogen` 类以支持快速转发。在 Hydrogen 实现文件（`Hydrogen.m`）中，添加以下代码来重写 `forwardingTargetForSelector:`\
    \ 方法的默认实现，如代码清单 3-11 所示（更新部分以粗体显示）。\n\n*代码清单 3-11.* Hydrogen 类消息快速转发更新\n\n```\n\
    @implementation Hydrogen\n{\n@private HydrogenHelper *helper;\n}\n...\n- (id)\
    \ initWithNeutrons:(NSUInteger)neutrons\n{\n  if ((self = [super init]))\n  {\n\
    \    // 初始化代码在此处添加。\n    _chemicalElement = @\"Hydrogen\";\n    _atomicSymbol\
    \ = @\"H\";\n    _protons = 1;\n    _neutrons = neutrons;\n\n// 创建用于消息转发的辅助对象\n\
    \    helper = [[HydrogenHelper alloc] init];\n  }\n\nreturn self;\n}\n\n- (id)\
    \ forwardingTargetForSelector:(SEL)aSelector\n{\n  if ([helper respondsToSelector:aSelector])\n\
    \  {\n    return helper;\n  }\n  return nil;\n}\n...\n@end\n```\n\n首先，`Hydrogen`\
    \ 类增加了一个 `HydrogenHelper*` 类型的实例变量。接着在 `init` 方法中，创建并初始化了 `HydrogenHelper` 对象。这就是将用于消息转发的目标对象。最后，实现了\
    \ `forwardingTargetForSelector:` 方法。该方法首先检查该消息是否是目标对象（`HydrogenHelper`）能够处理的消息。如果是，则返回该目标对象；否则返回\
    \ `nil`。回顾一下，`HydrogenHelper` 类只有一个实例方法 `factoid`。因此，如果某个 `Hydrogen` 对象收到一个名为\
    \ `factoid` 的实例方法的消息，它将被重定向，将这条消息发送给它的 `HydrogenHelper` 对象（参见图 3-4）。\n\n![9781430250500_Fig03-04.jpg](img/9781430250500_Fig03-04.jpg)\n\
    \n图 3-4. 为 Hydrogen 类快速转发 factoid 方法\n"
- fmt: "Great! You have implemented fast forwarding for the `Hydrogen` class. Now\
    \ let’s test the class using fast forwarding. Select the **main.m** file and update\
    \ the `main()` function, as shown in [Listing 3-12](#9781430250500_Ch03.xhtml#list12).\n\
    \n[*Listing 3-12.*](#9781430250500_Ch03.xhtml#_list12) Testing Fast Forwarding\
    \ of the Hydrogen Class\n\n```\nint main(int argc, const char * argv[])\n{\n \
    \ @autoreleasepool\n  {\n    Atom *atom = [Hydrogen hydrogenWithNeutrons:0];\n\
    \    [atom logInfo];\n\n    id atom1 = [[Hydrogen alloc] initWithNeutrons:1];\n\
    \    [atom1 logInfo];\n\n    // Use message forwarding to get a fact about Hydrogen\n\
    \    Hydrogen *atom2 = [Hydrogen hydrogenWithNeutrons:2];\n    NSString *fact\
    \ = [atom2 factoid];\n    [atom2 logInfo:fact];\n  }\n\n  return 0;\n}\n```\n\n\
    On the left side of the editor pane, you’ll probably see an exclamation point\
    \ in a red circle located on the line `NSString *fact = [atom2 factoid]`. If you\
    \ click this exclamation point, you will see an error message (see [Figure 3-5](#9781430250500_Ch03.xhtml#Fig5)).\n\
    \n![9781430250500_Fig03-05.jpg](images/9781430250500_Fig03-05.jpg)\n\n[Figure\
    \ 3-5](#9781430250500_Ch03.xhtml#_Fig5). Hydrogen class object messaging error\n\
    \nThis error, “No visible @interface for ‘Hydrogen’ declares the selector ‘factoid’,”\
    \ occurs because the `Hydrogen` class does not have a `factoid` instance method\
    \ declared in its interface. The compiler needs to know the full method signature\
    \ of every message that a program can possibly send—even those that are forwarded.\
    \ The solution is to declare the unknown method, either in a class interface or\
    \ in a category. In Xcode, create a new Objective-C category, enter `Helper` for\
    \ the name, and select `Atom` in the category drop-down list. Make the Elements\
    \ project its target and the Elements folder the location where the files will\
    \ be saved. In the Xcode project navigator pane, two new files have been added\
    \ to the Elements folder: `Atom+Helper.h` and `Atom+Helper.m`. These files are\
    \ the category interface and implementation files. Because you don’t need the\
    \ implementation, delete the `Atom+Helper.m` file by selecting it in the navigator\
    \ pane and then selecting `Delete` from the Xcode Edit menu. Next, in the `Atom+Helper.h`\
    \ header file, update the category interface as shown in [Listing 3-13](#9781430250500_Ch03.xhtml#list13).\n\
    \n[*Listing 3-13.*](#9781430250500_Ch03.xhtml#_list13) Atom Helper Category Interface\n\
    \n```\n#import \"Atom.h\"\n\n@interface Atom (Helper)\n\n- (NSString *) factoid;\n\
    \n@end\n```\n\nIn [Listing 3-13](#9781430250500_Ch03.xhtml#list13), the `factoid`\
    \ method has been added to the category interface. Since the `Hydrogen` class\
    \ is a subclass of the `Atom` class, the compiler will now see the `factoid` method,\
    \ thereby resolving the error. The `main.m` file should include the `Atom` helper\
    \ category interface in its list of imports (see [Listing 3-14](#9781430250500_Ch03.xhtml#list14)).\n\
    \n[*Listing 3-14.*](#9781430250500_Ch03.xhtml#_list14) Imports for `main()` function\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Atom.h\"\n#import \"Atom+Nuclear.h\"\
    \n#import \"Atom+Helper.h\"\n#import \"Hydrogen.h\"\n\nint main(int argc, const\
    \ char * argv[])\n{\n  ...\n}\n```\n\nIf you compile and run the project, the\
    \ output should be as shown in [Figure 3-6](#9781430250500_Ch03.xhtml#Fig6).\n\
    \n![9781430250500_Fig03-06.jpg](images/9781430250500_Fig03-06.jpg)\n\n[Figure\
    \ 3-6](#9781430250500_Ch03.xhtml#_Fig6). Hydrogen class with message forwarding\
    \ test\n\n## Roundup\n\nThis chapter examined the concepts and details around\
    \ Objective-C object creation, initialization, and messaging. The following are\
    \ the key takeaways:\n\n*   The `NSObject alloc` method is used to allocate memory\
    \ for an object, initializing its instance variables to zero. The method returns\
    \ objects that are an instance of the receiving class’s type, also known as a\
    \ “related result type.”\n*   `NSObject` provides an `init` method that serves\
    \ the foundation for object initialization. Your classes should override this\
    \ method to provide any custom initialization behavior required for them. Typically,\
    \ instance allocation and initialization are performed with a single line of code:\
    \ `[[ClassName alloc] init]`.\n*   Initializer methods should be implemented such\
    \ that they perform a series of initializations for an object all the way up its\
    \ inheritance chain to the root object of the hierarchy.\n*   Objective-C messaging\
    \ supports OOP type polymorphism, whereby different receivers can have different\
    \ implementations of the same method. In addition, the type of the receiver is\
    \ determined at runtime. Consequently, different receivers can do different things\
    \ in response to the same message.\n*   Objective-C message forwarding enables\
    \ an object to perform user-defined processing when it receives a message not\
    \ mapped to its set of methods. Message forwarding can be used to provide many\
    \ of the features typically associated with OOP multiple inheritance.\n*   Objective-C\
    \ provides two types of message forwarding: fast forwarding and normal (full)\
    \ forwarding. Both are implemented by overriding the appropriate `NSObject` instance\
    \ method, along with implementing any required supporting classes.\n\nIn the last\
    \ two chapters, you learned the ins and outs of developing classes using Objective-C:\
    \ class design and implementation, object creation and initialization, and object\
    \ interaction. In fact, why not take a moment to look back over what you have\
    \ covered so far. This is a great time to go over your example programs and tinker\
    \ with them to get a better feel for the language. Coming soon (in the next chapter,\
    \ to be precise), you’ll explore another key topic of Objective-C programming:\
    \ memory management.\n\n## Chapter 4: Memory Management\n\nSo far, you’ve learned\
    \ how to develop classes and create and initialize objects. Now is a great time\
    \ to study the details of Objective-C memory management. Proper memory management\
    \ is key to developing programs that perform both correctly and efficiently. In\
    \ this chapter, you’ll look into how computer memory is allocated and released\
    \ for Objective-C programs, the Objective-C memory model, and how to write programs\
    \ that perform memory management properly.\n\nThe overall quality of a program\
    \ is often directly related to its management of system resources. A computer’s\
    \ operating system allocates a finite amount of main memory for program execution,\
    \ and if a program attempts to use more memory than the amount allocated by the\
    \ O/S, it will not operate correctly. Hence, a program should use only as much\
    \ memory as needed, neither allocating memory that it does not use nor trying\
    \ to use memory that is no longer available. The Objective-C language and runtime\
    \ provide mechanisms to support application memory management in alignment with\
    \ these goals.\n\n### Program Memory Usage\n\nIn order to better understand the\
    \ role of memory management, you need to understand how a program is stored and\
    \ used in computer memory. An executable Objective-C program is composed of (executable)\
    \ code, initialized and unitialized program data, linking information, relocation\
    \ information, local data, and dynamic data. The program data includes statically-declared\
    \ variables and program literals (e.g., constant values in the code that are set\
    \ during program compilation).\n\nThe executable code and program data, along\
    \ with the linking and relocation information, are statically allocated in memory\
    \ and persist for the lifetime of the program."
