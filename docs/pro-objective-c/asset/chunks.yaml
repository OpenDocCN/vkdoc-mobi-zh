    Defining a Method Implementation


    As you saw in [Chapter 8](#9781430250500_Ch08.xhtml), an Objective-C method is
    simply a C-language function that takes at least two arguments: `self` and `_cmd`.
    Immediately after the import statements, the code in [Listing 9-9](#9781430250500_Ch09.xhtml#list9)
    defines a function that you’ll use to add a method to a class.


    ```

    // Method implementation function for the display selector

    static void display(id self, SEL _cmd)

    {

      NSLog(@"Invoking method with selector %@ on %@ instance",

            NSStringFromSelector(_cmd), [self className]);

    }

    ```


    Creating and Registering a Class


    To dynamically create a class with the runtime APIs, you must perform the following
    steps:


    1.  Create a new class and metaclass.

    2.  Add methods and instance variables to the class (if any).

    3.  Register the newly created class.


    This functionality is implemented with the following code from [Listing 9-9](#9781430250500_Ch09.xhtml#list9).


    ```

    // Create a class pair

    Class WidgetClass = objc_allocateClassPair([NSObject class], "Widget", 0);


    // Add a method to the class

    const char *types = "v@:";

    class_addMethod(WidgetClass, @selector(display), (IMP)display, types);


    // Add an ivar to the class

    const char *height = "height";

    class_addIvar(WidgetClass, height, sizeof(id), rint(log2(sizeof(id))),

                  @encode(id));


    // Register the class

    objc_registerClassPair(WidgetClass);

    ```


    The runtime `class_addMethod` function takes as arguments the class to which the
    method should be added, the selector that specifies the name of the method being
    added, the function that implements the method, and a character string—known as
    *type encodings—*that describes the types of arguments and the return value of
    the method. Each possible type is represented by a type code; for example, the
    character “`v`” is the code for a `void`, “`@`” is the code for an object (whether
    a pointer to an Objective-C class or the `id` type), and “`:`” is the code for
    the `SEL` type. The complete list of type encodings are specified in the Apple
    Objective-C Runtime Programming Guide. The codes in the `types` parameter of the
    `class_addMethod` must be arranged in a defined order: the first code is for the
    return type, the second code is for method’s implicit `self` parameter (the `id`
    type), the third code is for the type of the method’s implicit `_cmd` parameter
    (the `SEL` type), and the remaining codes are for the types of each of the explicit
    parameters of the method. Thus for the `display` method, the corresponding `types`
    array has a value of “`v@:`.”


    Creating a Class Instance


    The code creates an instance of the dynamically added class, sets its instance
    variable to a value, and then invokes the instance method. It also logs messages
    to the output pane to show the instance variable value and the method invocation.


    Dynamically Adding a Variable to a Class Instance


    Objective-C does not provide the capability for adding instance variables to an
    object; however, a feature of the runtime—associated objects—can be used to effectively
    mimic this functionality. An *associated object* is an object that is attached
    to a class instance, referenced by a key. This can be used in a variety of scenarios;
    for example, with Objective-C categories that don’t permit instance variables.
    When you create an associated object, you specify the key mapped for the association,
    the memory management policy for the associated object, and its value. The following
    code from [Listing 9-9](#9781430250500_Ch09.xhtml#list9) demonstrates use of the
    runtime APIs for associated objects.


    ```

    // Dynamically add a variable (an associated object) to the widget

    NSNumber *width = [NSNumber numberWithInt:10];

    objc_setAssociatedObject(widget, @"width", width,

                             OBJC_ASSOCIATION_RETAIN_NONATOMIC);


    // Retrieve the variable''s value and display it

    id result = objc_getAssociatedObject(widget, @"width");

    NSLog(@"Widget instance width = %@", result);

    ```


    The runtime APIs include an enum that lists the possible values for the memory
    management policy. In this policy, `OBJC_ASSOCIATION_RETAIN_NONATOMIC`, assigns
    a nonatomic `strong` reference to the associated object. This is similar to creating
    a property with the attributes `nonatomic, strong`. When you compile and run the
    RuntimeWidget program, you should observe the messages in the output pane shown
    in [Figure 9-12](#9781430250500_Ch09.xhtml#Fig12).


    ![9781430250500_Fig09-12.jpg](images/9781430250500_Fig09-12.jpg)


    [Figure 9-12](#9781430250500_Ch09.xhtml#_Fig12). RuntimeWidget program output


    This example demonstrates how to use the runtime APIs to dynamically create classes,
    class instances, and associated objects. Please refer to the Apple Objective-C
    Runtime Reference for the complete guide to the runtime APIs.


    Creating a Dynamic Proxy


    The final program demonstrates dynamic message forwarding using the Foundation
    Framework `NSInvocation` and `NSProxy` classes. In [Chapter 3](#9781430250500_Ch03.xhtml),
    you learned that Objective-C provides several types of message forwarding options:
    fast forwarding using the `NSObject forwardingTargetForSelector:` method and normal
    (full) forwarding using the `NSObject forwardInvocation:` method.


    One of the benefits of normal forwarding is that it enables you to perform additional
    processing on an object message, its arguments, and return value. Used in conjunction
