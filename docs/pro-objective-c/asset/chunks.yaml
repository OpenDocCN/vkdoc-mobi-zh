    Cookie Management


    The Foundation Framework classes `NSHTTPCookie` and `NSHTTPCookieStorage` facilitate
    the creation and management of *HTTP cookies*, which are used to provide persistent
    storage of data across URL requests. An `NSHTTPCookie` instance represents a cookie,
