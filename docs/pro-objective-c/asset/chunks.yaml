    Property Definition


    A property definition is performed in the implementation section of a class. In
    most cases, a property is backed by an instance variable; hence, the property
    definition includes defining getter and setter methods for the property, declaring
    an instance variable, and using that variable in the getter/setter methods. Objective-C
    provides several methods for defining a property: explicit definition, synthesis
    via keyword, and autosynthesis.


    Explicit Definition


    For this method of defining a property, its methods are explicitly defined in
    the corresponding class implementation. As an example, the setter method for a
    property named `myIntProperty` can be defined as shown in [Listing 2-11](#9781430250500_Ch02.xhtml#list11).


    [*Listing 2-11.*](#9781430250500_Ch02.xhtml#_list11)  Property Setter Method Definition


    ```

    -(void) setMyIntProperty:(int) value

    {

      _myIntProperty = value;

    {

    ```


    The name of the variable corresponding to the property is prefaced with an underscore.
    This name reflects the Objective-C standard naming convention for property instance
    variables, whereby the name of the variable is that of the property name, prefaced
    with an underscore.


    Synthesis via Keyword


    Through use of the `@synthesize` keyword, the compiler can autogenerate property
    definitions. A property is synthesized in the corresponding class implementation
    section. The syntax for synthesizing a property via keyword is


    ```

    @synthesize propertyName [= instanceVariableName];

    ```


    If the optional `instanceVariableName` assignment is not provided, the compiler
    will automatically generate the instance variable name following the standard
    naming convention for property-backed instance variables. If an `instanceVariableName`
    value is provided, the compiler will create the instance variable with the name
    provided. For a property named `myIntProperty`, the getter and setter methods
    will be autogenerated with the statement


    ```

    @synthesize myIntProperty;

    ```


    The compiler will create a corresponding instance variable named `_myIntProperty`.


    Autosynthesis


    The recommended Apple Objective-C compiler, Clang/LLVM (versions 4.2 and above)
    provides support for autosynthesis of declared properties. This means that the
    compiler will automatically synthesize declared properties that are neither: 1)
    synthesized by keyword (e.g., using `@synthesis`); 2) generated dynamically (via
    the `@dynamic` property directive); nor 3) having user-provided getter and setter
    methods. Thus, there is no need to include code to synthesize a declared property
    when using this feature. A declared property is automatically synthesized by the
    compiler, along with the corresponding instance variable. The `Atom` class implemented
    earlier (see [Listing 2-3](#9781430250500_Ch02.xhtml#list3)) uses autosynthesis
    of its declared properties.


    Dynamic Generation


    Accessor methods for a property can be delegated or dynamically created at runtime.
    The `@dynamic` property directive can be used to prevent compiler autogeneration
    of accessor methods in these cases. The compiler will not generate a warning if
    it cannot find implementations of accessor methods associated with the properties
    whose names follow the `@dynamic` property. Instead, the developer is responsible
    for creating these methods by either writing the accessor method implementations
    directly, using some other means to derive them (such as dynamic code loading
    or dynamic method resolution), or leveraging a software library (e.g., the Apple
    Core Data framework) that dynamically generates these methods.


    Property-Backed Instance Variables


    Most properties are backed by an instance variable, hence the mechanism by which
    properties hide the internal state of an object. Unless specified otherwise, the
    instance variable should have the same name as the property, but with an underscore
    prefix. In the `Atom` class implementation shown in [Listing 2-5](#9781430250500_Ch02.xhtml#list5),
    the `init` method accesses the instance variable for the `chemicalElement` property,
    which is named `_chemicalElement`.


    Property Access


    Objective-C provides two mechanisms for accessing properties: accessor methods
    and dot notation. Accessor methods synthesized by the compiler follow standard
    naming conventions:


    *   The method used to access the value (the *getter* method) has the same name
    as the property.

    *   The method used to set the value (the *setter* method) starts with the word
    “set” prepended to the property name, with the first letter of the property name
    capitalized.


    Using these conventions, the getter method for a property named `color` would
    be called `color`, and its setter method would be called `setColor`. So, for an
    object named `myObject`, the getter and setter accessor methods would be invoked
    as follows:


    ```

    [myObject color];

    [myObject setColor:value];

    ```


    Objective-C provides a concise alternative to accessor methods: *dot notation*.
    The dot notation syntax for getting and setting a property of an object named
    `myObject` would be


    ```

    myObject.propertyName;

    myObject.propertyName = propertyValue;

    ```


    The first statement invokes the getter accessor method to retrieve the value of
    the property and the second invokes the setter accessor method to set the property
    to the value of `propertyValue`.


    In general, properties should be accessed using the two mechanisms mentioned.
    However, if the object associated with a property is not (or may not be) fully
    constructed, these mechanisms should not be used, and the property-backed instance
    variable should be used instead. This means that within a class `init` method
    or `dealloc` method, the instance variable should be accessed directly, as shown
    with the `Atom` class `_chemicalElement` instance variable in [Listing 2-5](#9781430250500_Ch02.xhtml#list5).


