- fmt: '# Foundation Framework Functions


    The Foundation Framework includes functions that assist in the performance of
    geometric calculations on points, ranges, rectangles, and sizes. A point represents
    a location in two-dimensional Euclidean geometry with x and y coordinates. A range
    represents a one-dimensional quantity beginning at a specified location of a specified
    length. A size represents a two-dimensional quantity of specified width and height.


    The point, range, and size Foundation functions perform operations to create,
    retrieve, test for equality, and return string representations of these quantities.
    The Foundation data types `NSPoint` represents points, `NSRange` represents ranges,
    and `NSSize` represents sizes.


    The following statement creates a new `NSPoint` from the specified values.


    ```

    NSPoint point = NSMakePoint(0, 5);

    ```


    The Foundation framework also includes numerous functions for manipulating rectangles,
    including operations to create, get, get components, query, test for equality,
    and return string representations. There are also functions that perform geometric
    operations (test for intersection, union, divide, point in rectangle, etc.). The
    Foundation data type `NSRect` represents rectangles.


    The following statement creates a rectangle at point {0, 0} and size [5, 10].


    ```

    NSRect rect1 = NSMakeRect(0.0, 0.0, 5.0, 10.0);

    ```


    The next set of statements creates a new rectangle at point {2.5, 5} and size
    [5, 10], and then calculates the intersection of the two rectangles.


    ```

    NSRect rect2 = NSMakeRect(2.5, 5.0, 5.0, 10.0);

    NSRect rect3 = NSIntersectionRect(rect1, rect2);

    ```


    ## Data Types


    The Foundation Framework defines a number of custom data types, many of which
    are used in conjunction with the Foundation functions. These include data types
    that represent numbers, geometric concepts, and general structures. These data
    types are primarily C structures. Some of the more common are listed in [Table
    13-4](#9781430250500_Ch13xhtml#Tab4).


    [Table 13-4](#9781430250500_Ch13xhtml#_Tab4). Common Foundation Data Types


    | Foundation Function | Description |

    | --- | --- |

    | `NSInteger` | Data type used to represent an integer value across different
    processor architectures. On 32-bit machines, `NSInteger` is a 32-bit integer;
    whereas on 64-bit machines, it is a 64-bit integer. |

    | `NSUInteger` | Data type used to represent an unsigned integer value across
    different processor architectures. |

    | `NSDecimal` | C struct data type used to represent a decimal number. |

    | `NSPoint` | C struct data type used to represent a point in two-dimensional
    Euclidean space. |

    | `NSRange` | C struct data type used to represent a range, a one-dimensional
    quantity beginning at a specified location of a specified length. |

    | `NSSize` | C struct data type used to represent a size, two-dimensional quantity
    of specified width and height. |

    | `NSRect` | C struct data type used to represent a rectangle in two-dimensional
    Euclidean space. |

    | `NSComparator` | A block object data type used for comparison operations. The
    block returns a Foundation constant `NSComparisonResult` that indicates the ordering
    of the two objects compared. |

    | `NSTimeInterval` | A Foundation type (of type double) used to specify a time
    interval, in seconds. |

    | `NSStringEncoding` | A Foundation type (of type `NSUInteger`) used to represent
    string encoding values. |


    ## Constants


    The Foundation constants include enumerations, global variables, geometric and
    numeric constants, exceptions, and Foundation framework version numbers. The enumerations
    define enumerations used by the Foundation Framework APIs. The global variables
    define general constants. The geometric constants define alignment options and
    minimum/maximum edges for rectangles. The numeric constants define constants for
    `NSDecimal`, `NSInteger`, `NSUInteger`, and `NSMapTable` data types. The exception
    constants define standard exceptions. The version number constants define the
    list of version numbers for the Foundation Framework. The definitive reference
    for the Foundation constants is the Foundation Constants Reference.


    ## Roundup


    In this chapter, you examined the Foundation functions, data types, and constants,
    and learned how they can be used to develop Objective-C programs. You also became
    familiar with some of the trade-offs involved in choosing the appropriate API
    when multiple choices are available (e.g., Foundation class versus function).
    You should now be familiar with the following Foundation Framework APIs:


    *   Foundation functions

    *   Foundation data types

    *   Foundation constants


    The definitive reference for these APIs is provided in the Apple Foundation Functions
    Reference.


    ---


    # Chapter 14


    ## Expert Section: Error Handling


    How your code deals with errors is critical to implementing quality software.
    Runtime errors that impact the operation and/or performance of a program can be
    due to a variety of causes, such as incorrect user input, system issues, or programming
    errors. The Foundation Framework includes several APIs for handling runtime error
    conditions.


    In this Expert Section chapter, you will examine these APIs in depth. The chapter
    explores the causes of runtime errors, the programming options for error handling,
    and the Foundation Framework APIs for handling errors and exception conditions.
    After completing this chapter, you will be able to use the Foundation Framework
    error handling and exception processing APIs to write programs that respond properly
    to errors as they arise, and even provide support for error recovery.


    ### Runtime Error Conditions


    A *runtime error* is an error that occurs while a program is running; it contrasts
    with other categories of program errors, such as syntax and linking errors, which
    occur prior to program execution. Runtime errors are generally due to the following
    types of conditions:


    *   *Logical error*: An error due to the fact that the code doesn’t correctly
    implement the corresponding program logic. This type of error is manifested during
    program execution when it doesn’t produce the expected output.

    *   *Semantic error*: An error due to the improper use of program statements (for
    example, performing division by zero or the improper initialization of a variable).

    *   *User input error*: An error due to invalid user input.


    If any of these conditions occurs and is not handled, it can result in a variety
    of adverse consequences, including program termination or improper operation.
    As a result, a variety of mechanisms have been developed in computer programming
    to detect and respond to errors. For Objective-C, the Foundation Framework includes
    several APIs for error handling, grouped into the following categories:


    *   Assertions

    *   Error codes

    *   Error objects

    *   Exceptions


    Before examining these APIs in detail, let’s briefly review each of these error
    types and how they are used.


    ### Assertions


    An assertion is used to provide a runtime check of a condition that, if not present,
    should cause the program to terminate. Assertions can be disabled via a compiler
    directive; hence, they should only be used to detect programming logic and semantic
    errors, not runtime errors due to invalid user input, and so forth. In [Chapter
    13](#9781430250500_Ch13xhtml), you learned about the Foundation Framework assertion
    functions. These support the creation of assertions for both Objective-C methods
    and functions.


    ### Error Codes'
