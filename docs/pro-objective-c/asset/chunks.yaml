    |  | `strong` | This attribute (used when ARC memory management is applied on
    a property) is equivalent to the `retain` attribute. |

    |  | `weak` | This attribute (used when ARC memory management is applied on a
    property) is similar to the `assign` attribute except that if the affect property
    is released, its value is set to `nil`. |

    | Read/Write | `readwrite` | The property can be read or written to. Both getter
    and setter methods must be implemented. This is the default setting. |

    |  | `read-only` | The property can be read but not written to. The getter method
    must be implemented. |

