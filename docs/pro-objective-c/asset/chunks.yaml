    ## Error Recovery


    The `NSError` class provides a mechanism for recovering from errors. The `NSErrorRecoveryAttempting`
    informal protocol provides methods that are implemented to perform error recovery.
    An object that adopts this protocol must implement at least one of its two methods
    for attempting recovery from errors. The user info dictionary of an `NSError`
    object that supports error recovery must contain, at a minimum, the following
    three entries:


    *   The recovery attempter object (retrieved using the key `NSRecoveryAttempterErrorKey`)

    *   The recovery options (retrieved using the key `NSLocalizedRecoveryOptionsErrorKey`)

    *   A localized recovery suggestion string (retrieved using the key `NSLocalizedRecoverySuggestionErrorKey`)


    The recovery attempter may implement any logic appropriate for error recovery.
    Note that the error recovery functionality is only available on the Apple OS X
    platform.


    ## Error Responders


    The Application Kit provides APIs and mechanisms that can be used to respond to
    errors encapsulated in `NSError` objects. The `NSResponder` class defines an error
    responder chain used to pass events and action messages up the view hierarchy.
    It includes methods to display information in the associated `NSError` object,
    and then forwards the error message to the next responder. This enables each object
    in the hierarchy to handle the error appropriately, perhaps by adding additional
    information pertaining to the error. Note that the error responder functionality
    is available only on the Apple OS X platform.


    ## NSError Codes


    The Foundation Framework defines a number of standard `NSError` codes as Foundation
    constants. These errors are enumerations defined for the following `NSError` class
    error domains, as follows:


    *   Cocoa (`NSErrorCocoaDomain`)

    *   URL Loading System (`NSURLDomain`)


    ## Exception Processing


    Objective-C provides mechanisms for handling exception conditions during program
    execution. An exception condition can be defined as an unrecoverable programming
    or runtime error. Examples include errors such as an unimplemented (abstract)
    method, or runtime errors such as an out-of-bounds collection access. The compiler
    directives `@try`, `@catch()`, `@throw`, and `@finally` provide runtime support
    for exception handling, and the `NSException` class encapsulates information pertinent
    to an exception.


    When an exception is raised, program control flow transfers to the local exception
    handler. The program stack frame is also unwound between where the exception was
    raised and where it was caught and handled. As a result, resources that are not
    automatically managed (e.g., Foundation Framework objects, objects created using
    manual reference counting, and any C language–specific resources, such as structures)
    may not be cleaned up properly. Specifically, the Foundation Framework APIs are
    not exception-safe; thus if used within an exception-handling domain and an exception
    is thrown, they may leak memory and/or have corrupted content. Thus, the general
    rule is that when an exception is raised, no attempt at recovery should be made
    and the application should be exited promptly.


    The `@try`, `@catch`, and `@finally` directives make up a control structure for
    code that executes within the boundaries of the exception handling logic. The
    `@try` directive defines a statement block (also referred to as an exception-handling
    domain) that can potentially throw an exception. The `@catch()` directive defines
    a statement block containing code for handling an exception thrown within the
    preceding `@try` block. The parameter of the `@catch()` directive is the exception
    object thrown locally, usually an `NSException` object. A `@finally` directive
    defines a statement block (after the preceding `@try` block) that is subsequently
    executed whether or not the associated exception is thrown. The `@finally` block
    is commonly used to perform any cleanup actions for its corresponding `@try` and
    `@catch()` blocks (e.g., releasing resources, etc.). The syntax for code that
    uses the exception compiler directives is depicted in [Listing 14-8](#9781430250500_Ch14.xhtml#list8).


    [*Listing 14-8.*](#9781430250500_Ch14.xhtml#_list8)  Exception Handling Using
    Compiler Directives


    ```

    @try

    {

      // Code implementing solution logic (may throw exceptions)

      ...

    }

    @catch (NSException *exception)

    {

      // Exception handling code

      ...

    }

    @finally

    {

      // Cleanup code

      ...

    }

    ```


    The `@throw` directive is used to throw an exception, usually an `NSException`
    object but may, in fact, be other types of objects. When an exception is thrown
    within the body of a `@try` block, the program jumps immediately to the nearest
    `@catch()` block to handle the exception (if one exists).


    The Cocoa frameworks come with a large set of predefined exception names that
    describe specific error states. These should be used (where applicable) when creating
    an exception.


