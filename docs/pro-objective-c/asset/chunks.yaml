    ## 关于作者

    ![image](img/9781430250500_unFM-01.jpg)


    **基思·李**是一名技术专家，长期以来对苹果产品以及软件开发充满热情。他在设备和桌面端软件系统的设计与实现方面拥有超过 20 年的经验，同时还涉足服务器端开发。如今，他主要专注于
    OS X 和 iOS 平台上的软件开发以及新兴编程语言。基思还是一位知名的作曲家，他曾为多种不同的合奏团体创作过作品，这些作品在美国和海外都曾演出过。他与妻子和女儿居住在加利福尼亚州，可以通过电子邮件
    `ProObjectiveC@icloud.com` 联系到他。


    ## 关于技术审阅者

    ![image](img/9781430250500_unFM-02.jpg)


    **费利佩·拉索·马塞蒂** 是一名 iOS 程序员，就职于 Lextech Global Services 公司。他热爱与苹果相关的一切，同时也喜欢电子游戏、烹饪以及演奏小提琴、钢琴或吉他。在业余时间，费利佩喜欢阅读和学习新的编程语言和技术。


    费利佩喜欢在自己的博客 `http://iFe.li` 上撰写文章，作为 Ray Wenderlich 博客团队的一员在 `www.raywenderlich.com`
    上创作 iOS 教程和文章，并且担任 Objective-C 和 iOS 相关书籍的技术审阅者。你可以在 Twitter 上通过 `@Airjordan12345`
    找到他，在 Facebook 上搜索他的名字，或者在 App.net 上通过 `@iFeli` 找到他。


    ## 致谢

    没有我妻子迪纳维亚的鼓励和理解，这本书不可能问世。你支持了这项工作以及它所需的漫长时光，提供了我完成这一切所需的一切。我永远、永远感激不尽。


    写一本书是一项艰巨的工作！我很幸运在这次努力中能与 Apress 出色的团队合作。开发编辑道格拉斯·庞迪克和协调编辑马克·鲍尔斯在确保本书按计划进行方面起到了关键作用。费利佩·拉索·马塞蒂对本书各章节和代码所做的详细技术审阅尤其有帮助。金伯利·伯顿-韦斯曼以高效且及时的方式出色地完成了文字编辑工作。事实上，整个
    Apress 编辑委员会在使这一过程顺利流畅地进行方面都起到了关键作用。仅仅说声谢谢是不够的！


    最后，我要感谢苹果公司，特别是史蒂夫·乔布斯和史蒂夫·沃兹尼亚克，感谢他们创造了这项我们能够有幸使用的惊人技术。多年前，当我还是大学生时，我买了我的第一台电脑——Mac
    SE 30。从那时起，我对苹果系统、硬件、软件以及每款苹果产品背后所蕴含的工程质量的印象就一直非常深刻。感谢这些先驱者的远见和毅力，我才能够写出这本书。


    ## 简介

    Objective-C 编程语言的受欢迎程度和使用率持续增长。这得益于语言本身的强大和易用性，以及不断添加到平台上的众多功能。许多程序员已经掌握了该语言的基础知识，现在希望进一步提升他们的专业技能。《Pro
    Objective-C》将带你进入下一个层次。


    ### 本书内容

    *《Pro Objective-C》* 提供了一本关于该语言、其运行时和关键 API 的深入、全面的指南。它以清晰、易于理解的方式解释了 Objective-C
    的关键概念，并详细介绍了其更复杂的特性。其主要主题包括：


    *   Objective-C 基础知识和关键语言元素

    *   Objective-C 运行时系统

    *   Foundation 框架 API

    *   Objective-C 高级语言特性


    本书还包含大量实用示例——代码片段和完整的应用程序——展示了如何将你所学的内容应用到实际代码中。


    每个主题都清晰、简洁地进行了讲解，并包含了你有效开发 Objective-C 代码所需的细节。最重要的特性都得到了深入的探讨，并且每章都包含大量示例，清晰地展示了
    Objective-C 的用法。


    ### 本书读者对象

    本书面向已有一定 Objective-C 经验的中高级开发者。对于没有使用过 Objective-C，但具备一些 C 语言编程经验并理解面向对象编程的开发者来说，本书也非常适合。


    ### 你需要准备什么

    在开始为 Apple OS X 和 iOS 平台编写 Objective-C 代码之前，你需要一台运行 OS X Mountain Lion（OS X 10.6.8）或更高版本的基于
    Intel 的 Mac 电脑（MacBook、iMac、Mac Pro 等）。你还需要 Xcode，即苹果公司用于 iOS 和 Mac 软件开发的工具集。第
    1 章 提供了获取和安装 Xcode 的说明。


    ### 本书内容概览

    以下是本书各章节的简要概述。


    #### 第 1 章

    本章介绍 Objective-C 编程语言和开发环境。你还将下载并安装 Xcode，并编写你的第一个 Objective-C 程序。


    #### 第 2 章

    第 2 章全部关于类，这是面向对象编程的主要构建块。它涵盖了 Objective-C 为开发类提供的关键元素和独特特性。


    #### 第 3 章

    在第 2 章中，你学会了如何创建类；在本章中，你将学习如何使用它们。具体来说，你将学习关于 Objective-C 对象创建、初始化和消息传递的概念和细节。


    #### 第 4 章

    正确的内存管理是开发既正确又高效的程序的关键。在本章中，你将了解计算机内存是如何为 Objective-C 程序分配和释放的，Objective-C 的内存模型，以及如何编写正确进行内存管理的程序。


    #### 第 5 章

    Objective-C 包含一个预处理器，用于在编译之前对源文件进行转换。在本章中，你将学习预处理器的工作原理，以及如何在 Objective-C 源文件中使用预处理器语言。


    #### 第 6 章

    正如你在本书前面所了解到的，ARC 是 Objective-C 内存管理的推荐方法。在本专家章节中，你将学习围绕 ARC 内存管理的一些更细致的细节，以及如何将
    ARC 用于免桥接对象。


    #### 第 7 章

    第 7 章开始我们对 Objective-C 运行时系统的研究，深入探索 Objective-C 语言的动态特性。这包括运行时类型确定、方法解析、对象自省、动态代码加载以及其他特性。


    #### 第 8 章

    在第 8 章中，你将了解 Objective-C 运行时系统的架构和设计，以及其动态特性是如何实现的。本章还展示了你的代码在编译时和程序执行期间是如何与运行时交互的。


    #### 第 9 章

    在本专家章节中，你将通过开发几个运用其一些关键特性和 API 的示例程序，来增强你对运行时系统的了解。


    #### 第 10 章

