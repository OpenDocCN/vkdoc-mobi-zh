    \ you rarely have need to use this directive in your source files.\n\n## Pragma\n\
    \nThe *pragma* directive (`#pragma`) is used to specify additional options to\
    \ the compiler, beyond that conveyed by the Objective-C language itself. These\
    \ options are specific for the platform and the compiler being used. The syntax\
    \ for the `#pragma` directive is\n\n```\n#pragma PragmaOptions(s)\n```\n\nThe\
    \ pragma options are a series of characters that correspond to a specific compiler\
    \ instruction (and arguments, if any), and cause an implementation-defined action.\
    \ If the compiler does not support a specific argument for a `#pragma` directive,\
    \ it is ignored and no error is generated.\n\nThe Apple Objective-C compiler supports\
    \ numerous pragma options; the exact options available can be found in the reference\
    \ documentation for the compiler.\n\nXcode includes support for several `#pragma\
    \ mark` directives. You would use these directives in implementation source files\
    \ to categorize methods when viewing them within the IDE. Let’s look at an example\
    \ to see how this works. The Xcode workspace window contains a *jump bar* at the\
