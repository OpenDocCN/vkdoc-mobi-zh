    ## 异常与内存管理


    处理异常时必须仔细考虑内存管理，尤其是在使用手动引用计数（MRR）内存管理时。由于异常处理会改变程序流程控制，[清单14-11](#9781430250500_Ch14.xhtml#list11)
    演示了在方法中（使用MRR内存管理时）发生的异常如何导致对象内存泄漏。


    [*清单14-11*](#9781430250500_Ch14.xhtml#_list11)  异常处理与内存泄漏


    ```

    - (void) processOrderWithItem:(OrderItem *)item

    {

      Order *order = [[Order alloc] initWithItem:item];

      [order process];

      [order release];

    }

    ```


    如果`process`方法抛出异常，`Order`对象将不会被释放，从而导致内存泄漏。为防止这种情况，解决方案是将方法语句封装在一个异常处理域中，并在其`@finally`代码块中释放已分配的对象，如[清单14-12](#9781430250500_Ch14.xhtml#list12)所示。


    [*清单14-12*](#9781430250500_Ch14.xhtml#_list12)  使用异常处理域防止内存泄漏


    ```

    - (void) processOrderWithItem:(OrderItem *)item

    {

      Order *order = nil;

      @try

      {

        order = [[Order alloc] initWithItem:item];

        [order process];

        [order release];

      }

      @finally

      {

        [order release];

      }

    }

    ```


    默认情况下，ARC内存管理并非异常安全。如果使用`-fobjc-arc-exceptions`选项编译程序，则可以使ARC程序异常安全。这会增加程序资源占用并略微降低性能，因此必须谨慎使用。


