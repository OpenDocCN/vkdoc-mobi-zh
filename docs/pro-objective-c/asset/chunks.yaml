    断点操作弹出窗口使您能够选择在目标程序到达断点时需执行的命令类型。您可以配置一个定义额外断点行为的选项，并设置所选的断点类型专属的其他属性。图 C-6 展示了一个配置为执行调试器命令的断点操作，该命令会打印`_chemicalElement`实例变量的值，并在命令执行后自动继续执行程序。


    ![9781430250500_AppC-06.jpg](img/9781430250500_AppC-06.jpg)


    图 C-6。配置断点操作


    ## 调试区


    调试区由调试栏（位于调试区顶部的工具栏）和内容面板（该区域的剩余部分）组成。调试栏用于控制程序执行和浏览源代码。内容面板的左侧用于查看程序变量和寄存器。内容面板的右侧用于查看控制台输出并与调试器交互。图
    C-7 中描绘了调试区。


    ![9781430250500_AppC-07.jpg](img/9781430250500_AppC-07.jpg)


    图 C-7。调试区


    调试栏用于控制目标程序的执行并浏览其源代码。调试栏左侧有五个按钮；从左到右，这些按钮的用途如下：


    *   显示/隐藏调试区。

    *   暂停/恢复程序执行。

    *   单步跳过（即执行）一条指令。如果该指令是方法/函数调用，则会导致整个方法/函数被执行。

    *   单步进入（即执行）一条指令。如果该指令是方法/函数调用，则会导致调试器跳转到该方法/函数的第一行。

    *   单步跳出方法/函数。这会导致调试器完成当前方法/函数的执行，并跳转到下一个调用方法/函数，或返回到调用它的方法/函数。


    调试区的其余部分显示一个弹出菜单，使您能够选择程序中要调试的线程。


    内容面板用于显示变量，并提供用于输入调试命令的命令行界面。如图 C-7 所示，内容面板的左侧显示*变量视图*（用于显示当前上下文中的变量值），而右侧显示输出控制台（用于执行调试器命令的
    LLDB 命令行界面）。


    ## 反汇编视图


    Xcode 提供了一个反汇编视图，使您能够在程序运行时查看调试器看到的一组汇编语言指令。您可以配置 Xcode 仅显示反汇编，或同时显示源代码和相应的反汇编。要选择反汇编视图，请从
    Xcode 的 Product 菜单中选择 **Debug Workflow ![image](img/arrow.jpg) Show Disassembly
    When Debugging**。图 C-8 在 Xcode 的分裂编辑面板中显示了源代码和反汇编视图。


    ![9781430250500_AppC-08.jpg](img/9781430250500_AppC-08.jpg)


    图 C-8。反汇编视图


    ## 在 Xcode 中使用 LLDB


    现在您已经对 LLDB 以及使用 Xcode 进行调试有了大致了解，接下来将使用 Xcode 调试一个程序。在 Xcode 中，通过从 Xcode 的 File
    菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在 **New Project Assistant**
    面板中，通过选择 **Command Line Tool** 图标（来自 OS X 模板组下的 **Application** 选项）来创建一个命令行应用程序。在
    **Project Options** 窗口中，将产品名称指定为 `BrokenCalculator`，将项目类型选择为 `Foundation`，并通过选中
    **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。在您的文件系统中指定您希望创建项目的位置（如有必要，选择
    **New Folder** 并输入文件夹的名称和位置），并取消选中 **Source Control** 复选框。


    现在创建计算器类。从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg) File . . .**，选择 **Objective-C**
    类模板，并将类命名为 `Calculator`。选择 `BrokenCalculator` 文件夹作为文件位置，选择 `BrokenCalculator`
    项目作为目标，然后点击 **Create** 按钮。接下来，在项目导航器面板中，选择 `Calculator.h` 文件并更新类接口，如代码清单 C-2 所示。


    *代码清单 C-2.*  计算器类接口


    ```

    #import <Foundation/Foundation.h>


    @interface Calculator : NSObject


    - (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2;


    @end

    ```


    该类声明了一个用于返回两个数之和的实例方法。接下来，使用 Xcode 项目导航器选择 `Calculator.m` 文件并编写实现代码，如代码清单 C-3
    所示。


    *代码清单 C-3.*  计算器类实现


    ```

    #import "Calculator.h"


    @implementation Calculator


    - (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2

    {

      return [NSNumber numberWithInteger:([adder1 integerValue] +

                                          [adder2 integerValue])];

    }

    @end

    ```


    该方法返回两个输入参数的整数值之和。好的，这非常简单，现在让我们转到 `main()` 函数。在项目导航器中，选择 `main.m` 文件并更新 `main()`
    函数，如代码清单 C-4 所示。


    *代码清单 C-4.*  BrokenCalculator 的 `main()` 函数


    ```

    #import <Foundation/Foundation.h>

    #import "Calculator.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // 创建实例和要相加的数字

        Calculator *calculator = [[Calculator alloc] init];

        NSNumber *addend1 = [NSNumber numberWithInteger:10];

        NSNumber *addend2 = [NSNumber numberWithInteger:15];

        NSNumber *addend3 = [NSNumber numberWithInteger:-25];


    // 相加数字并验证返回正确的总和

        NSNumber *sum1 = [calculator sumAddend1:addend1 addend2:addend2];

        NSCAssert(([sum1 intValue] == 25), @"计算出的总和无效");


    NSNumber *sum2 = [calculator sumAddend1:addend1 addend2:addend3];

        NSCAssert(([sum2 intValue] == 15),  @"计算出的总和无效");

      }

      return 0;

    }

    ```


    该方法创建了一个 `Calculator` 实例和 `NSNumber` 实例，然后将两个数字相加并验证返回了正确的总和。当您编译并运行该程序时，应在输出面板中观察到消息，如图
    C-9 所示。


    ![9781430250500_AppC-09.jpg](img/9781430250500_AppC-09.jpg)


    图 C-9。BrokenCalculator 程序输出

