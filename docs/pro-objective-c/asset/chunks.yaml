    \ (the code updates are shown in bold).\n\n[*Listing 2-3.*](#9781430250500_Ch02.xhtml#_list3)\
    \  Atom Interface\n\n```\n@interface Atom : NSObject\n@property (readonly) NSUInteger\
    \ protons;\n@property (readonly) NSUInteger neutrons;\n@property (readonly) NSUInteger\
    \ electrons;\n@property (readonly) NSString *chemicalElement;\n\n- (NSUInteger)\
    \ massNumber;\n@end\n```\n\nThis code adds several properties and an *instance*\
    \ method to the class declaration. The property `chemicalElement` is of type `NSString\
    \ *` (i.e., a pointer to a text string) and has a `readonly` attribute, meaning\
    \ that you can retrieve its value but cannot set it. The properties `protons`,\
    \ `neutrons`, and `electrons` are each of type `NSUInteger` (i.e., non-negative\
    \ integer values) and are read-only. The instance method, named `massNumber`,\
    \ returns a non-negative integer value. You’ll learn the specifics on declaring\
    \ class properties and methods later in this chapter. In the meantime, let’s complete\
    \ this example by coding the class implementation.\n\n## Coding the Atom Class\
    \ Implementation\n\nThe implementation for the `Atom` class is provided in the\
    \ `Atom.m` file. In the project navigator pane, select the `Atom.m` file and view\
    \ the base Atom implementation in the editor pane, as shown in [Listing 2-4](#9781430250500_Ch02.xhtml#list4).\n\
    \n[*Listing 2-4.*](#9781430250500_Ch02.xhtml#_list4)  Atom Class Base Implementation\n\
    \n```\n#import \"Atom.h\"\n\n@implementation Atom\n@end\n```\n\nThe `import` directive\
    \ includes the contents of the `Atom.h` header file (i.e., its preprocessor directives,\
    \ interface declarations, and other included header files).  Now let’s define\
    \ the custom properties and methods for the `Atom` class that were declared in\
    \ the Atom interface. In the editor pane, update the `Atom.m` file as shown in\
    \ [Listing 2-5](#9781430250500_Ch02.xhtml#list5) (the code updates are displayed\
    \ in bold).\n\n[*Listing 2-5.*](#9781430250500_Ch02.xhtml#_list5)  Atom Class\
    \ Implementation\n\n```\n@implementation Atom\n\n- (id) init\n{\n  if ((self =\
    \ [super init]))\n  {\n    _chemicalElement = @\"None\";\n  }\n\nreturn self;\n\
    }\n\n- (NSUInteger) massNumber\n{\n  return 0;\n}\n\n@end\n```\n\nAll methods\
    \ declared in a class interface must be defined in its class implementation. Hence,\
    \ the Atom implementation in [Listing 2-5](#9781430250500_Ch02.xhtml#list5) defines\
    \ two methods: `init()` and `atomicMass()`. The `massNumber()` method is declared\
    \ in the Atom interface, so the actual program logic for the method is defined\
    \ here; it just returns the value 0 for the atomic mass number. The `init()` method\
    \ is also defined here, but why? After all, this method isn’t declared in the\
    \ Atom interface. Well, the `init()` method is declared in `NSObject`, which is\
    \ a subclass (i.e., parent) of the `Atom` class. The `NSObject init()` method\
