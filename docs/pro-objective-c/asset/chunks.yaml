- fmt: "# Key-Value Coding Basics\n\nAs stated earlier, key-value coding is a mechanism\
    \ for accessing an object’s properties. In [Chapter 2](#9781430250500_Ch02.xhtml)\
    \ of this book, you learned that properties encapsulate an object’s internal state.\
    \ This state is not accessed directly, but rather using properties’ accessor methods\
    \ (also known as *getter* and *setter* methods). The compiler can generate these\
    \ methods automatically (according to the property declaration). This reduces\
    \ the amount of code to write and also facilitates program consistency and maintainability.\
    \ In the following code fragment, a class named `Hello` declares a property named\
    \ `greeting` of type `NSString`.\n\n```\n@interface Hello : NSObject\n@property\
    \ NSString *greeting;\n...\n@end\n```\n\nThis property can be accessed using either\
    \ standard property accessors or dot notation syntax (recall that the compiler\
    \ transforms property dot notation expressions into their corresponding accessor\
    \ method invocations). Given a `Hello` instance named `helloObject`, the value\
    \ for the `greeting` property can be retrieved using either of the following expressions:\n\
    \n```\n[helloObject greeting]\nhelloObject.greeting\n```\n\nConversely, the value\
    \ for the `greeting` property can be set using either of the following expressions:\n\
    \n```\n[helloObject setGreeting:newValue]\nhelloObject.greeting = newValue\n```\n\
    \nRecall that a property's backing instance variable can also be accessed directly\
    \ if the object associated with the property is not fully constructed (i.e., if\
    \ the variable is accessed within a class `init` or `dealloc` method). The `init`\
    \ method for the `Hello` class accesses the backing instance variable of the `greeting`\
    \ property in [Listing 18-1](#9781430250500_Ch18.xhtml#list1).\n\n[*Listing 18-1.*](#9781430250500_Ch18.xhtml#_list1)\
    \ Accessing a Property’s Backing Instance Variable\n\n```\n@implementation Hello\n\
    - (id)init\n{\n  if ((self = [super init]))\n  {\n    _greeting = @\"Hello\";\n\
    ...\n}\n```\n\nNote that these mechanisms for accessing a property are compile-time\
    \ expressions, and hence tightly couple the calling code to the receiver object.\
    \ With that background, you can now examine key-value coding. In a nutshell, it\
    \ provides a key-value pair mechanism for accessing a property, where the `key`\
    \ is the property’s name and the `value` is the property value. Now this mechanism\
    \ should already be familiar to you, as it is identical to that used to access\
    \ entries in a dictionary (e.g., an `NSDictionary` instance). For example, given\
    \ a `Hello` instance named `helloObject`, the following expression uses key-value\
    \ coding APIs to retrieve the value of the `greeting` property.\n\n```\n[helloObject\
    \ valueForKey:@\"greeting\"]\n```\n\nObserve that the key provided is the name\
    \ of the property, in this case `greeting`. Key-value coding APIs can also be\
    \ used to set the value for the `greeting` property.\n\n```\n[helloObject setValue:@\"\
    Hello\" forKey:@\"greeting\"]\n```\n\nOK, so this is all fine and good, but you\
    \ may still be wondering, “What’s the advantage of using KVC to access properties\
    \ versus the standard property accessor methods?” Well to begin with, key-value\
    \ coding allows you to access a property using a string that can be varied at\
    \ runtime, and thus provides a more dynamic, flexible approach for accessing and\
    \ manipulating an object’s state. The following are several of the key benefits\
    \ to key-value coding:\n\n* Configuration-based property access. KVC enables your\
    \ code to access properties using a parameter-driven, common API.\n* Loose coupling.\
    \ Use of KVC for property access reduces coupling between software components,\
    \ thereby improving software maintainability.\n* Simplifies code. KVC can reduce\
    \ the amount of code that you have to write, particularly in scenarios where you\
    \ need to access a specific property based on a variable. Instead of using conditional\
    \ expressions to determine the correct property accessor method to invoke, you\
    \ can employ one KVC expression using the variable as its parameter.\n\nLet’s\
    \ say that you need to dynamically update the state of a model based on an input\
    \ from the user. [Listing 18-2](#9781430250500_Ch18.xhtml#list2) provides an implementation\
    \ of this logic using standard property accessors.\n\n[*Listing 18-2.*](#9781430250500_Ch18.xhtml#_list2)\
    \ Updating Model State Using Standard Property Accessors\n\n```\n- (void)updateModel:(NSString\
    \ *)value forState:(NSString *)state\n{\n  if ([state isEqualToString:@\"species\"\
    ])\n  {\n    [self setSpecies:value];\n  }\n  else if ([state isEqualToString:@\"\
    genus\"])\n  {\n    [self setGenus:value];\n  }\n  ...\n}\n```\n\nAs shown in\
    \ [Listing 18-2](#9781430250500_Ch18.xhtml#list2), this method uses conditional\
    \ expressions and standard property accessors to update the value of the correct\
    \ property. Although functional, this implementation doesn’t scale well and is\
    \ difficult to maintain because the code must be updated whenever the property\
    \ names and/or number of properties changes. Contrast that with [Listing 18-3](#9781430250500_Ch18.xhtml#list3),\
    \ which implements the same logic using key-value coding.\n\n[*Listing 18-3.*](#9781430250500_Ch18.xhtml#_list3)\
    \ Updating Model State Using Key-Value Coding\n\n```\n- (void)updateModel:(NSString\
    \ *)value forState:(NSString *)state\n{\n  [self setValue:value forKey:state];\n\
    }\n```\n\nComparing the two listings, it should be pretty obvious to you that\
    \ the KVC-based implementation is a vast simplification over the earlier approach.\
    \ As shown in [Listing 18-3](#9781430250500_Ch18.xhtml#list3), KVC can greatly\
    \ reduce the amount of code that you have to write to implement this type of logic.\
    \ Compared to [Listing 18-2](#9781430250500_Ch18.xhtml#list2), it is also easier\
    \ to both maintain and evolve because changing the properties of the model does\
    \ not require any updates to the method (shown in [Listing 18-3](#9781430250500_Ch18.xhtml#list3))\
    \ that uses KVC.\n\n## Keys and Key Paths\n\nKey-value coding uses keys and key\
    \ paths for property access. A *key* is a string that identifies a specific property.\
    \ A *key path* specifies a sequence of object properties to traverse. The KVC\
    \ APIs support accessing both individual and multiple properties of an object.\
    \ The properties can be object types, basic types, or C structs; basic types and\
    \ structs are automatically wrapped to/from corresponding object types.\n\nJust\
    \ as dot notation syntax enables you to traverse nested properties in an object\
    \ graph, KVC provides this capability through key paths. As an example, imagine\
    \ a `Person` class that declares a property named `name` of type `Name`, and the\
    \ `Name` class declares a property named `firstName` of type `NSString` (see [Figure\
    \ 18-1](#9781430250500_Ch18.xhtml#Fig1)).\n\n![9781430250500_Fig18-01.jpg](images/9781430250500_Fig18-01.jpg)\n\
    \n[Figure 18-1](#9781430250500_Ch18.xhtml#_Fig1). Person object graph\n\nThe object-oriented\
    \ principle of composition is used here to create an object graph comprised of\
    \ a `Person` object that has a `Name` instance and an `Address` instance. Given\
    \ this object graph, for a `Person` instance named `person`, dot notation syntax\
    \ could be used to retrieve the value of the `firstName` property, and then set\
    \ the value of the `firstName` property as follows:\n\n```\nperson.name.firstName\
    \ = @\"Bob\";\n```\n\nThe key-value coding mechanism includes an API that provides\
    \ the same functionality (i.e., the `setValue:forKeyPath:` method). Its arguments\
    \ include a key path that also uses dot notation.\n\n```\n[person setValue:@\"\
    Bob\" forKeyPath:@\"name.firstName\"];\n```\n\nThe `valueForKeyPath:` API would\
    \ be used to retrieve a property value specified by a key path, for example\n\n\
    ```\nNSString *name = [person valueForKeyPath:@\"name.firstName\"];\n```"
  raw: 'As stated earlier, key-value coding is a mechanism for accessing an object’s
    properties. In [Chapter 2](#9781430250500_Ch02.xhtml) of this book, you learned
    that properties encapsulate an object’s internal state. This state is not accessed
    directly, but rather using properties’ accessor methods (also known as *getter*
    and *setter* methods). The compiler can generate these methods automatically (according
    to the property declaration). This reduces the amount of code to write and also
    facilitates program consistency and maintainability. In the following code fragment,
    a class named `Hello` declares a property named `greeting` of type `NSString`.


    ```

    @interface Hello : NSObject

    @property NSString *greeting;

    ...

    @end

    ```


    This property can be accessed using either standard property accessors or dot
    notation syntax (recall that the compiler transforms property dot notation expressions
    into their corresponding accessor method invocations). Given a `Hello` instance
    named `helloObject`, the value for the `greeting` property can be retrieved using
    either of the following expressions:


    ```

    [helloObject greeting]

    helloObject.greeting

    ```


    Conversely, the value for the `greeting` property can be set using either of the
    following expressions:


    ```

    [helloObject setGreeting:newValue]

    helloObject.greeting = newValue

    ```


    Recall that a property''s backing instance variable can also be accessed directly
    if the object associated with the property is not fully constructed (i.e., if
    the variable is accessed within a class `init` or `dealloc` method). The `init`
    method for the `Hello` class accesses the backing instance variable of the `greeting`
    property in [Listing 18-1](#9781430250500_Ch18.xhtml#list1).


    [*Listing 18-1.*](#9781430250500_Ch18.xhtml#_list1)  Accessing a Property’s Backing
    Instance Variable


    ```

    @implementation Hello

    - (id)init

    {

      if ((self = [super init]))

      {

        _greeting = @"Hello";

    ...

    }

    ```


    Note that these mechanisms for accessing a property are compile-time expressions,
    and hence tightly couple the calling code to the receiver object. With that background,
    you can now examine key-value coding. In a nutshell, it provides a key-value pair
    mechanism for accessing a property, where the `key` is the property’s name and
    the `value` is the property value. Now this mechanism should already be familiar
    to you, as it is identical to that used to access entries in a dictionary (e.g.,
    an `NSDictionary` instance). For example, given a `Hello` instance named `helloObject`,
    the following expression uses key-value coding APIs to retrieve the value of the
    `greeting` property.


    ```

    [helloObject valueForKey:@"greeting"]

    ```


    Observe that the key provided is the name of the property, in this case `greeting`.
    Key-value coding APIs can also be used to set the value for the `greeting` property.


    ```

    [helloObject setValue:@"Hello" forKey:@"greeting"]

    ```


    OK, so this is all fine and good, but you may still be wondering, “What’s the
    advantage of using KVC to access properties versus the standard property accessor
    methods?” Well to begin with, key-value coding allows you to access a property
    using a string that can be varied at runtime, and thus provides a more dynamic,
    flexible approach for accessing and manipulating an object’s state. The following
    are several of the key benefits to key-value coding:


    *   Configuration-based property access. KVC enables your code to access properties
    using a parameter-driven, common API.

    *   Loose coupling. Use of KVC for property access reduces coupling between software
    components, thereby improving software maintainability.

    *   Simplifies code. KVC can reduce the amount of code that you have to write,
    particularly in scenarios where you need to access a specific property based on
    a variable. Instead of using conditional expressions to determine the correct
    property accessor method to invoke, you can employ one KVC expression using the
    variable as its parameter.


    Let’s say that you need to dynamically update the state of a model based on an
    input from the user. [Listing 18-2](#9781430250500_Ch18.xhtml#list2) provides
    an implementation of this logic using standard property accessors.


    [*Listing 18-2.*](#9781430250500_Ch18.xhtml#_list2)  Updating Model State Using
    Standard Property Accessors


    ```

    - (void)updateModel:(NSString *)value forState:(NSString *)state

    {

      if ([state isEqualToString:@"species"])

      {

        [self setSpecies:value];

      }

      else if ([state isEqualToString:@"genus"])

      {

        [self setGenus:value];

      }

      ...

    }

    ```


    As shown in [Listing 18-2](#9781430250500_Ch18.xhtml#list2), this method uses
    conditional expressions and standard property accessors to update the value of
    the correct property. Although functional, this implementation doesn’t scale well
    and is difficult to maintain because the code must be updated whenever the property
    names and/or number of properties changes. Contrast that with [Listing 18-3](#9781430250500_Ch18.xhtml#list3),
    which implements the same logic using key-value coding.


    [*Listing 18-3.*](#9781430250500_Ch18.xhtml#_list3)  Updating Model State Using
    Key-Value Coding


    ```

    - (void)updateModel:(NSString *)value forState:(NSString *)state

    {

      [self setValue:value forKey:state];

    }

    ```


    Comparing the two listings, it should be pretty obvious to you that the KVC-based
    implementation is a vast simplification over the earlier approach. As shown in
    [Listing 18-3](#9781430250500_Ch18.xhtml#list3), KVC can greatly reduce the amount
    of code that you have to write to implement this type of logic. Compared to [Listing
    18-2](#9781430250500_Ch18.xhtml#list2), it is also easier to both maintain and
    evolve because changing the properties of the model does not require any updates
    to the method (shown in [Listing 18-3](#9781430250500_Ch18.xhtml#list3)) that
    uses KVC.


    Keys and Key Paths


    Key-value coding uses keys and key paths for property access. A *key* is a string
    that identifies a specific property. A *key path* specifies a sequence of object
    properties to traverse. The KVC APIs support accessing both individual and multiple
    properties of an object. The properties can be object types, basic types, or C
    structs; basic types and structs are automatically wrapped to/from corresponding
    object types.


    Just as dot notation syntax enables you to traverse nested properties in an object
    graph, KVC provides this capability through key paths. As an example, imagine
    a `Person` class that declares a property named `name` of type `Name`, and the
    `Name` class declares a property named `firstName` of type `NSString` (see [Figure
    18-1](#9781430250500_Ch18.xhtml#Fig1)).


    ![9781430250500_Fig18-01.jpg](images/9781430250500_Fig18-01.jpg)


    [Figure 18-1](#9781430250500_Ch18.xhtml#_Fig1). Person object graph


    The object-oriented principle of composition is used here to create an object
    graph comprised of a `Person` object that has a `Name` instance and an `Address`
    instance. Given this object graph, for a `Person` instance named `person`, dot
    notation syntax could be used to retrieve the value of the `firstName` property,
    and then set the value of the `firstName` property as follows:


    ```

    person.name.firstName = @"Bob";

    ```


    The key-value coding mechanism includes an API that provides the same functionality
    (i.e., the `setValue:forKeyPath:` method). Its arguments include a key path that
    also uses dot notation.


    ```

    [person setValue:@"Bob" forKeyPath:@"name.firstName"];

    ```


    The `valueForKeyPath:` API would be used to retrieve a property value specified
    by a key path, for example


    ```

    NSString *name = [person valueForKeyPath:@"name.firstName"];

    ```'
  trans: "\n# 键值编码基础\n\n如前所述，键值编码是一种访问对象属性的机制。在本书的第 2 章中，你已经了解到属性封装了对象的内部状态。这种状态不能直接访问，而是通过属性的访问器方法（也称为\
    \ *getter* 和 *setter* 方法）来访问。编译器可以根据属性声明自动生成这些方法。这减少了需要编写的代码量，同时也提升了程序的一致性和可维护性。在以下代码片段中，名为\
    \ `Hello` 的类声明了一个名为 `greeting`、类型为 `NSString` 的属性。\n\n```\n@interface Hello :\
    \ NSObject\n@property NSString *greeting;\n...\n@end\n```\n\n这个属性可以通过标准的属性访问器或点语法来访问（回忆一下，编译器会将属性点语法表达式转换为对应的访问器方法调用）。给定一个名为\
    \ `helloObject` 的 `Hello` 实例，可以通过以下任一表达式获取 `greeting` 属性的值：\n\n```\n[helloObject\
    \ greeting]\nhelloObject.greeting\n```\n\n相反，可以通过以下任一表达式设置 `greeting` 属性的值：\n\n\
    ```\n[helloObject setGreeting:newValue]\nhelloObject.greeting = newValue\n```\n\
    \n回忆一下，如果与属性关联的对象尚未完全构造（即，在类的 `init` 或 `dealloc` 方法中访问变量），则也可以直接访问属性的后备实例变量。在代码清单\
    \ 18-1 中，`Hello` 类的 `init` 方法访问了 `greeting` 属性的后备实例变量。\n\n*代码清单 18-1.* 访问属性的后备实例变量\n\
    \n```\n@implementation Hello\n- (id)init\n{\n  if ((self = [super init]))\n  {\n\
    \    _greeting = @\"Hello\";\n...\n}\n```\n\n请注意，这些访问属性的机制都是编译时表达式，因此将调用代码与接收者对象紧密耦合。有了这些背景知识，现在你可以深入了解键值编码了。简而言之，它提供了一种用于访问属性的键值对机制，其中\
    \ `key` 是属性的名称，`value` 是属性的值。现在，你应该对这个机制已经很熟悉了，因为它与用于访问字典（例如 `NSDictionary` 实例）中条目的机制相同。例如，给定一个名为\
    \ `helloObject` 的 `Hello` 实例，以下表达式使用键值编码 API 来获取 `greeting` 属性的值。\n\n```\n[helloObject\
    \ valueForKey:@\"greeting\"]\n```\n\n注意，这里提供的键就是属性的名称，在本例中是 `greeting`。键值编码 API\
    \ 也可以用于设置 `greeting` 属性的值。\n\n```\n[helloObject setValue:@\"Hello\" forKey:@\"\
    greeting\"]\n```\n\n好吧，这看起来都挺好，但你或许仍有疑问：“使用 KVC 来访问属性，相比标准属性访问器方法有什么优势呢？” 首先，键值编码允许你使用一个可以在运行时变化的字符串来访问属性，因此提供了一种更动态、更灵活的方式来访问和操作对象的状态。以下是键值编码的几个主要优点：\n\
    \n*   基于配置的属性访问。KVC 让你的代码能够使用一个参数驱动的通用 API 来访问属性。\n*   松散耦合。使用 KVC 进行属性访问减少了软件组件之间的耦合，从而提高了软件的可维护性。\n\
    *   简化代码。KVC 可以减少你需要编写的代码量，尤其是在你需要根据一个变量来访问特定属性的场景中。与其使用条件表达式来确定调用哪个正确的属性访问器方法，不如使用一个将变量作为参数的\
    \ KVC 表达式。\n\n假设你需要根据用户的输入来动态更新模型的状态。代码清单 18-2 提供了使用标准属性访问器实现此逻辑的代码。\n\n*代码清单\
    \ 18-2.* 使用标准属性访问器更新模型状态\n\n```\n- (void)updateModel:(NSString *)value forState:(NSString\
    \ *)state\n{\n  if ([state isEqualToString:@\"species\"])\n  {\n    [self setSpecies:value];\n\
    \  }\n  else if ([state isEqualToString:@\"genus\"])\n  {\n    [self setGenus:value];\n\
    \  }\n  ...\n}\n```\n\n如代码清单 18-2 所示，此方法使用条件表达式和标准属性访问器来更新正确属性的值。虽然功能上可行，但这种实现方式扩展性不佳且难以维护，因为每当属性名称和/或属性数量发生变化时，都必须更新代码。与之对比的是代码清单\
    \ 18-3，它使用键值编码实现了相同的逻辑。\n\n*代码清单 18-3.* 使用键值编码更新模型状态\n\n```\n- (void)updateModel:(NSString\
    \ *)value forState:(NSString *)state\n{\n  [self setValue:value forKey:state];\n\
    }\n```\n\n比较这两个代码清单，你应该能很明显地看出，基于 KVC 的实现比之前的方案大大简化了。如代码清单 18-3 所示，KVC 可以极大地减少为实现此类逻辑所需编写的代码量。与代码清单\
    \ 18-2 相比，它也更容易维护和发展，因为更改模型的属性并不需要对使用 KVC 的方法（如代码清单 18-3 所示）进行任何更新。\n\n## 键和键路径\n\
    \n键值编码使用键和键路径进行属性访问。*键*是一个标识特定属性的字符串。*键路径*则指定了要遍历的对象属性序列。KVC API 支持访问对象的单个或多个属性。这些属性可以是对象类型、基本数据类型或\
    \ C 结构体；基本数据类型和结构体会被自动包装为对应的对象类型或从中解包。\n\n正如点语法允许你遍历对象图中的嵌套属性一样，KVC 通过键路径提供了这种能力。举个例子，想象一个\
    \ `Person` 类，它声明了一个名为 `name`、类型为 `Name` 的属性，而 `Name` 类声明了一个名为 `firstName`、类型为\
    \ `NSString` 的属性（参见图 18-1）。\n\n![9781430250500_Fig18-01.jpg](img/9781430250500_Fig18-01.jpg)\n\
    \n图 18-1。Person 对象图\n\n这里使用了面向对象的组合原则来创建一个对象图，该对象图包含一个拥有 `Name` 实例和 `Address`\
    \ 实例的 `Person` 对象。给定这个对象图，对于一个名为 `person` 的 `Person` 实例，可以使用点语法来获取 `firstName`\
    \ 属性的值，并如下设置 `firstName` 属性的值：\n\n```\nperson.name.firstName = @\"Bob\";\n```\n\
    \n键值编码机制包含一个提供相同功能的 API（即 `setValue:forKeyPath:` 方法）。它的参数包含一个同样使用点语法的键路径。\n\n\
    ```\n[person setValue:@\"Bob\" forKeyPath:@\"name.firstName\"];\n```\n\n`valueForKeyPath:`\
    \ API 用于获取由键路径指定的属性值，例如\n\n```\nNSString *name = [person valueForKeyPath:@\"name.firstName\"\
    ];\n```\n"
- fmt: "# Key-Value Coding\n\nAs indicated earlier, key-value coding includes APIs\
    \ for accessing multiple properties of an object. In the object graph depicted\
    \ in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1), a `Person` class declares\
    \ a `Name` property and an `Address` property. Key-value coding can be used to\
    \ retrieve the keys and corresponding values for an input collection of keys.\
    \ [Listing 18-4](#9781430250500_Ch18.xhtml#list4) uses the KVC `dictionaryWithValuesForKeys:`\
    \ method to retrieve the keys and values for the `name` and `address` properties\
    \ of a `Person` instance named `person`.\n\n[*Listing 18-4.*](#9781430250500_Ch18.xhtml#_list4)\
    \ Using KVC to Retrieve Multiple Property Values\n\n```\nNSArray *personKeys =\
    \ @[@\"name\", @\"address\"];\nNSDictionary *personValues = [person dictionaryWithValuesForKeys:personKeys];\n\
    ```\n\nConversely, [Listing 18-5](#9781430250500_Ch18.xhtml#list5) uses the KVC\
    \ `setValuesForKeysWithDictionary:` method to set values for the `name` and `address`\
    \ properties of a `Person` instance named `person`.\n\n[*Listing 18-5.*](#9781430250500_Ch18.xhtml#_list5)\
    \ Using KVC to Set Multiple Property Values\n\n```\nName *tom = [Name new];\n\
    Address *home = [Address new];\nNSDictionary *personProperties = @{@\"name\":tom,\
    \ @\"address\":home};\n[person setValuesForKeysWithDictionary:personProperties];\n\
    ```\n\nThese are just some of the features that key-value coding provides. In\
    \ the following paragraphs, you will examine this technology in more detail and\
    \ learn some of its more advanced features.\n\n## KVC Design and Implementation\n\
    \nThe design of key-value coding is based on the following two fundamental constructs:\n\
    \n* A mechanism that can be used to access the properties of an object indirectly\
    \ by name (or key), rather than through direct invocation of accessor methods.\n\
    * A mechanism for mapping keys to the appropriate property accessor methods and/or\
    \ property backing variables.\n\nThe `NSKeyValueCoding` informal protocol defines\
    \ the mechanism for accessing objects indirectly by name/key. This protocol declares\
    \ the key-value coding API, consisting of class and instance methods along with\
    \ constant values. The methods enable you to get and set property values, perform\
    \ property validation, and change the default behavior of the key-value coding\
    \ methods for getting property values. Earlier in this chapter, you used several\
    \ of these APIs (e.g., `valueForKey:`, `selectValue:forKey:`, etc.). `NSObject`\
    \ provides the default implementation of the `NSKeyValueCoding` protocol, and\
    \ thus any class that descends from `NSObject` has built-in support for key-value\
    \ coding.\n\n## Key-Value Coding APIs\n\nThe `NSKeyValueCoding` informal protocol\
    \ defines the standard key-value coding APIs. These methods enable you to get/set\
    \ property values, perform key-value coding based property validation, and configure\
    \ key-value coding operation. Depending upon the select method, its input parameters\
    \ are a key, key path, value, and (for the validation APIs) an error object pointer.\
    \ In the previous sections, you used several of the methods to get and set property\
    \ values; now I’ll provide an overview of a few other methods specified by this\
    \ protocol.\n\nThe `NSKeyValueCoding` `accessInstanceVariablesDirectly` class\
    \ method enables your class to control whether the key-value coding mechanism\
    \ should access a property’s backing variable directly, if no accessor method\
    \ (for the property) is found. The method returns a Boolean value. `YES` indicates\
    \ that the key-value coding methods should access the corresponding instance variable\
    \ directly, and `NO` indicates that they should not. The default (`NSObject`)\
    \ implementation returns `YES`; your class should override this method to control\
    \ this behavior.\n\nBecause key-value coding uses a key value (determined at runtime)\
    \ to access a property, it also provides APIs to handle scenarios where the input\
    \ key does not correspond to an object’s properties. The `NSKeyValueCoding` `valueForUndefinedKey:`\
    \ and `setValue:forUndefinedKey:` methods control how key-value coding responds\
    \ to undefined key scenarios. Specifically, one of these methods is invoked when\
    \ the `valueForKey:` or `setValue:forKey:` methods find no property corresponding\
    \ to the input key. The default implementation of the undefined key methods raises\
    \ an `NSUndefinedKeyException`, but subclasses can override these methods to return\
    \ a custom value for undefined keys. [Listing 18-6](#9781430250500_Ch18.xhtml#list6)\
    \ overrides the `valueForUndefinedKey:` method of the `Hello` class implementation\
    \ shown earlier (see [Listing 18-1](#9781430250500_Ch18.xhtml#list1)) to return\
    \ the value of the property named `greeting` if the input key is `\"hi\"`.\n\n\
    [*Listing 18-6.*](#9781430250500_Ch18.xhtml#_list6) Hello Class Implementation\
    \ of the `valueForUndefinedKey:` Method\n\n```\n@implementation Hello\n...\n-\
    \ (id)valueForUndefinedKey:(NSString *)key\n{\n  if ((nil != key) && ([@\"hi\"\
    \ isEqualToString:key]))\n  {\n    return self.greeting;\n  }\n  [NSException\
    \ raise:NSUndefinedKeyException\n              format:@\"Key %@ not defined\"\
    , key];\n  return nil;\n}\n...\n@end\n```\n\nThe protocol defines two methods\
    \ for validating a property value: `validateValue:forKey:error:` and `validateValue:forKeyPath:error:`.\
    \ You’ll examine these methods later in this chapter.\n\nFor collections, the\
    \ `NSKeyValueCoding` protocol includes methods that can return a mutable instance\
    \ of a collection (array or set) for a given key. The following code fragment\
    \ uses the `mutableArrayValueForKey:` method to return a mutable array from an\
    \ object named `order` for the key `\"items\"`.\n\n```\nNSMutableArray *items\
    \ = [order mutableArrayValueForKey:@\"items\"];\n```\n\nNote that these APIs return\
    \ mutable collection instances, even if the property is a read-only collection.\n\
    \n## Key-Value Search Patterns\n\nSo, when a KVC API is invoked, how does it get/set\
    \ property values, given that its input parameters are a key/key path (along with\
    \ a value for set methods)? KVC accomplishes this through use of a set of search\
    \ patterns that rely on property accessor method naming conventions.\n\nThese\
    \ search patterns attempt to get/set property values using their corresponding\
    \ accessor methods, only resorting to directly accessing the backing instance\
    \ variable if no matching accessor method is found. The `NSObject` default implementation\
    \ of KVC includes several search patterns to support the various KVC getter/setter\
    \ methods. The search pattern for the `setValue:forKey:` method is as follows:\n\
    \n1. KVC searches the target (i.e., receiver) class for an accessor method whose\
    \ name matches the pattern `set<Key>:`, where `<Key>` is the name of the property.\
    \ Hence, if your object invokes the `setValue:forKey:` method, providing a value\
    \ of `\"name\"` for the key, KVC would search the class for an accessor method\
    \ named `setName:`.\n2. If no accessor is found, and the receiver’s class method\
    \ `accessInstanceVariablesDirectly` returns `YES`, then the receiver class is\
    \ searched for an instance variable whose name matches the pattern `_<key>`, `_is<Key>`,\
    \ `<key>`, or `is<Key>`. In this case, KVC would search for an instance variable\
    \ named `_name`, `_isName`, `name`, or `isName`.\n3. If a matching accessor method\
    \ or instance variable is found, it is used to set the value. If necessary, the\
    \ value is wrapped.\n4. If no appropriate accessor or instance variable is found,\
    \ the receiver’s `setValue:forUndefinedKey:` method is invoked.\n\nThe search\
    \ patterns support various categories of properties (attributes, object types,\
    \ collections). As mentioned previously, your classes can also override the `valueForUndefinedKey:`\
    \ and `setValue:forUndefinedKey:` methods to handle cases where a property can’t\
    \ be found for a given key."
  raw: 'As indicated earlier, key-value coding includes APIs for accessing multiple
    properties of an object. In the object graph depicted in [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1),
    a `Person` class declares a `Name` property and an `Address` property. Key-value
    coding can be used to retrieve the keys and corresponding values for an input
    collection of keys. [Listing 18-4](#9781430250500_Ch18.xhtml#list4) uses the KVC
    `dictionaryWithValuesForKeys:` method to retrieve the keys and values for the
    `name` and `address` properties of a `Person` instance named `person`.


    [*Listing 18-4.*](#9781430250500_Ch18.xhtml#_list4)  Using KVC to Retrieve Multiple
    Property Values


    ```

    NSArray *personKeys = @[@"name", @"address"];

    NSDictionary *personValues = [person dictionaryWithValuesForKeys:personKeys];

    ```


    Conversely, [Listing 18-5](#9781430250500_Ch18.xhtml#list5) uses the KVC `setValuesForKeysWithDictionary:`
    method to set values for the `name` and `address` properties of a `Person` instance
    named `person`.


    [*Listing 18-5.*](#9781430250500_Ch18.xhtml#_list5)  Using KVC to Set Multiple
    Property Values


    ```

    Name *tom = [Name new];

    Address *home = [Address new];

    NSDictionary *personProperties = @{@"name":tom, @"address":home};

    [person setValuesForKeysWithDictionary:personProperties];

    ```


    These are just some of the features that key-value coding provides. In the following
    paragraphs, you will examine this technology in more detail and learn some of
    its more advanced features.


    KVC Design and Implementation


    The design of key-value coding is based on the following two fundamental constructs:


    *   A mechanism that can be used to access the properties of an object indirectly
    by name (or key), rather than through direct invocation of accessor methods.

    *   A mechanism for mapping keys to the appropriate property accessor methods
    and/or property backing variables.


    The `NSKeyValueCoding` informal protocol defines the mechanism for accessing objects
    indirectly by name/key. This protocol declares the key-value coding API, consisting
    of class and instance methods along with constant values. The methods enable you
    to get and set property values, perform property validation, and change the default
    behavior of the key-value coding methods for getting property values. Earlier
    in this chapter, you used several of these APIs (e.g., `valueForKey:`, `selectValue:forKey:`,
    etc.). `NSObject` provides the default implementation of the `NSKeyValueCoding`
    protocol, and thus any class that descends from `NSObject` has built-in support
    for key-value coding.


    Key-Value Coding APIs


    The `NSKeyValueCoding` informal protocol defines the standard key-value coding
    APIs. These methods enable you to get/set property values, perform key-value coding
    based property validation, and configure key-value coding operation. Depending
    upon the select method, its input parameters are a key, key path, value, and (for
    the validation APIs) an error object pointer. In the previous sections, you used
    several of the methods to get and set property values; now I’ll provide an overview
    of a few other methods specified by this protocol.


    The NSKeyValueCoding `accessInstanceVariablesDirectly` class method enables your
    class to control whether the key-value coding mechanism should access a property’s
    backing variable directly, if no accessor method (for the property) is found.
    The method returns a Boolean value. `YES` indicates that the key-value coding
    methods should access the corresponding instance variable directly, and `NO` indicates
    that they should not. The default (`NSObject`) implementation returns `YES`; your
    class should override this method to control this behavior.


    Because key-value coding uses a key value (determined at runtime) to access a
    property, it also provides APIs to handle scenarios where the input key does not
    correspond to an object’s properties. The NSKeyValueCoding `valueForUndefinedKey:`
    and `setValue:forUndefinedKey:` methods control how key-value coding responds
    to undefined key scenarios. Specifically, one of these methods is invoked when
    the `valueForKey:` or `setValue:forKey:` methods find no property corresponding
    to the input key. The default implementation of the undefined key methods raises
    an `NSUndefinedKeyException`, but subclasses can override these methods to return
    a custom value for undefined keys. [Listing 18-6](#9781430250500_Ch18.xhtml#list6)
    overrides the `valueForUndefinedKey:` method of the `Hello` class implementation
    shown earlier (see [Listing 18-1](#9781430250500_Ch18.xhtml#list1)) to return
    the value of the property named `greeting` if the input key is `"hi"`.


    [*Listing 18-6.*](#9781430250500_Ch18.xhtml#_list6)  Hello Class Implementation
    of the valueForUndefinedKey: Method


    ```

    @implementation Hello

    ...

    - (id)valueForUndefinedKey:(NSString *)key

    {

      if ((nil != key) && ([@"hi" isEqualToString:key]))

      {

        return self.greeting;

      }

      [NSException raise:NSUndefinedKeyException

                  format:@"Key %@ not defined", key];

      return nil;

    }

    ...

    @end

    ```


    The protocol defines two methods for validating a property value: `validateValue:forKey:error:`
    and `validateValue:forKeyPath:error:`. You’ll examine these methods later in this
    chapter.


    For collections, the `NSKeyValueCoding` protocol includes methods that can return
    a mutable instance of a collection (array or set) for a given key. The following
    code fragment uses the `mutableArrayValueForKey:` method to return a mutable array
    from an object named `order` for the key `"items"`.


    ```

    NSMutableArray *items = [order mutableArrayValueForKey:@"items"];

    ```


    Note that these APIs return mutable collection instances, even if the property
    is a read-only collection.


    Key-Value Search Patterns


    So, when a KVC API is invoked, how does it get/set property values, given that
    its input parameters are a key/key path (along with a value for set methods)?
    KVC accomplishes this through use of a set of search patterns that rely on property
    accessor method naming conventions.


    These search patterns attempt to get/set property values using their corresponding
    accessor methods, only resorting to directly accessing the backing instance variable
    if no matching accessor method is found. The `NSObject` default implementation
    of KVC includes several search patterns to support the various KVC getter/setter
    methods. The search pattern for the `setValue:forKey:` method is as follows:


    1.  KVC searches the target (i.e., receiver) class for an accessor method whose
    name matches the pattern `set<Key>:`, where `<Key>` is the name of the property.
    Hence, if your object invokes the `setValue:forKey:` method, providing a value
    of `"name"` for the key, KVC would search the class for an accessor method named
    `setName:`.

    2.  If no accessor is found, and the receiver’s class method `accessInstanceVariablesDirectly`
    returns `YES`, then the receiver class is searched for an instance variable whose
    name matches the pattern `_<key>`, `_is<Key>`, `<key>`, or is `<Key>`. In this
    case, KVC would search for an instance variable named `_name`, `_isName`, `name`,
    or `isName`.

    3.  If a matching accessor method or instance variable is found, it is used to
    set the value. If necessary, the value is wrapped.

    4.  If no appropriate accessor or instance variable is found, the receiver’s `setValue:forUndefinedKey:`
    method is invoked.


    The search patterns support various categories of properties (attributes, object
    types, collections). As mentioned previously, your classes can also override the
    `valueForUndefinedKey:` and `setValue:forUndefinedKey:` methods to handle cases
    where a property can’t be found for a given key.'
  trans: "\n# 键值编码\n\n如前所述，键值编码包含用于访问对象多个属性的 API。在图 18-1 所示的对象图中，`Person` 类声明了一个 `Name`\
    \ 属性和一个 `Address` 属性。可以使用键值编码来检索输入键集合对应的键和值。代码清单 18-4 使用 KVC 的 `dictionaryWithValuesForKeys:`\
    \ 方法检索名为 `person` 的 `Person` 实例的 `name` 和 `address` 属性的键和值。\n\n*代码清单 18-4.* 使用\
    \ KVC 检索多个属性值\n\n```\nNSArray *personKeys = @[@\"name\", @\"address\"];\nNSDictionary\
    \ *personValues = [person dictionaryWithValuesForKeys:personKeys];\n```\n\n相反，代码清单\
    \ 18-5 使用 KVC 的 `setValuesForKeysWithDictionary:` 方法为名为 `person` 的 `Person` 实例的\
    \ `name` 和 `address` 属性设置值。\n\n*代码清单 18-5.* 使用 KVC 设置多个属性值\n\n```\nName *tom =\
    \ [Name new];\nAddress *home = [Address new];\nNSDictionary *personProperties\
    \ = @{@\"name\":tom, @\"address\":home};\n[person setValuesForKeysWithDictionary:personProperties];\n\
    ```\n\n这些仅仅是键值编码提供的一部分功能。在接下来的段落中，你将更详细地研究这项技术，并学习它的一些更高级的特性。\n\n## KVC 的设计与实现\n\
    \n键值编码的设计基于以下两个基本结构：\n\n*   一种机制，可以通过名称（或键）间接访问对象的属性，而不是直接调用访问器方法。\n*   一种将键映射到相应的属性访问器方法和/或属性后备变量的机制。\n\
    \n`NSKeyValueCoding` 非正式协议定义了通过名称/键间接访问对象的机制。该协议声明了键值编码 API，包括类方法和实例方法以及常量值。这些方法使你能够获取和设置属性值、执行属性验证以及更改用于获取属性值的键值编码方法的默认行为。在本章前面，你使用了其中几个\
    \ API（例如 `valueForKey:`、`selectValue:forKey:` 等）。`NSObject` 提供了 `NSKeyValueCoding`\
    \ 协议的默认实现，因此任何继承自 `NSObject` 的类都内置了对键值编码的支持。\n\n## 键值编码 API\n\n`NSKeyValueCoding`\
    \ 非正式协议定义了标准的键值编码 API。这些方法使你能够获取/设置属性值、执行基于键值编码的属性验证以及配置键值编码操作。根据所选方法的不同，其输入参数可以是一个键、键路径、值，以及（对于验证\
    \ API 而言）一个错误对象指针。在前面的章节中，你使用了其中几种方法来获取和设置属性值；现在我将概述该协议指定的其他几种方法。\n\n`NSKeyValueCoding`\
    \ 的 `accessInstanceVariablesDirectly` 类方法使你的类能够控制：如果未找到（该属性的）访问器方法，键值编码机制是否应直接访问属性的后备变量。该方法返回一个布尔值。`YES`\
    \ 表示键值编码方法应直接访问对应的实例变量，而 `NO` 表示不应访问。默认的（`NSObject`）实现返回 `YES`；你的类应重写此方法以控制此行为。\n\
    \n由于键值编码使用一个（在运行时确定的）键值来访问属性，它还提供了 API 来处理输入键与对象属性不匹配的情况。`NSKeyValueCoding` 的\
    \ `valueForUndefinedKey:` 和 `setValue:forUndefinedKey:` 方法控制键值编码如何响应未定义键的情况。具体来说，当\
    \ `valueForKey:` 或 `setValue:forKey:` 方法未找到与输入键对应的属性时，会调用其中一种方法。未定义键方法的默认实现会引发\
    \ `NSUndefinedKeyException` 异常，但子类可以重写这些方法以返回自定义的值。代码清单 18-6 重写了前面显示的 `Hello`\
    \ 类实现的 `valueForUndefinedKey:` 方法（参见代码清单 18-1），以便在输入的键是 `\"hi\"` 时，返回名为 `greeting`\
    \ 的属性的值。\n\n*代码清单 18-6.* Hello 类中 `valueForUndefinedKey:` 方法的实现\n\n```\n@implementation\
    \ Hello\n...\n- (id)valueForUndefinedKey:(NSString *)key\n{\n  if ((nil != key)\
    \ && ([@\"hi\" isEqualToString:key]))\n  {\n    return self.greeting;\n  }\n \
    \ [NSException raise:NSUndefinedKeyException\n              format:@\"Key %@ not\
    \ defined\", key];\n  return nil;\n}\n...\n@end\n```\n\n该协议定义了两种验证属性值的方法：`validateValue:forKey:error:`\
    \ 和 `validateValue:forKeyPath:error:`。你将在本章后面部分考察这些方法。\n\n对于集合，`NSKeyValueCoding`\
    \ 协议包含一些方法，这些方法可以为给定的键返回集合（数组或集合）的可变实例。以下代码片段使用 `mutableArrayValueForKey:` 方法从名为\
    \ `order` 的对象中为键 `\"items\"` 返回一个可变数组。\n\n```\nNSMutableArray *items = [order\
    \ mutableArrayValueForKey:@\"items\"];\n```\n\n请注意，即使该属性是只读集合，这些 API 也会返回可变集合实例。\n\
    \n## 键值搜索模式\n\n那么，当调用某个 KVC API 时，鉴于其输入参数是一个键/键路径（对于设置方法还包括一个值），它究竟如何获取/设置属性值呢？KVC\
    \ 通过使用一组依赖于属性访问器方法命名约定的搜索模式来实现这一点。\n\n这些搜索模式会尝试使用相应的访问器方法来获取/设置属性值，只有在找不到匹配的访问器方法时，才会转而直接访问后备实例变量。`NSObject`\
    \ 对 KVC 的默认实现包含了多种搜索模式，以支持各种 KVC 的 getter/setter 方法。`setValue:forKey:` 方法的搜索模式如下：\n\
    \n1. KVC 在目标（即接收者）类中搜索名称与模式 `set<Key>:` 匹配的访问器方法，其中 `<Key>` 是属性的名称。因此，如果你的对象调用\
    \ `setValue:forKey:` 方法并为键提供值 `\"name\"`，KVC 将搜索该类中名为 `setName:` 的访问器方法。\n2. 如果未找到访问器，并且接收者的类方法\
    \ `accessInstanceVariablesDirectly` 返回 `YES`，那么将在接收者类中搜索名称与模式 `_<key>`、`_is<Key>`、`<key>`\
    \ 或 `is<Key>` 匹配的实例变量。在这种情况下，KVC 将搜索名为 `_name`、`_isName`、`name` 或 `isName` 的实例变量。\n\
    3. 如果找到匹配的访问器方法或实例变量，则用它来设置值。如有必要，该值会被包装（wrapped）。\n4. 如果未找到合适的访问器或实例变量，则会调用接收者的\
    \ `setValue:forUndefinedKey:` 方法。\n\n这些搜索模式支持不同类别的属性（属性值、对象类型、集合）。如前所述，你的类也可以重写\
    \ `valueForUndefinedKey:` 和 `setValue:forUndefinedKey:` 方法，以处理给定键找不到属性的情况。\n"
- fmt: "# Key-Value Coding\n\n**Note**: Key-value coding can be used to access three\
    \ different categories of properties: simple attributes, to-one relationships,\
    \ or to-many relationships. An *attribute* is a property that is a primitive (i.e.,\
    \ basic type), Boolean, string (`NSString`), or value object (`NSDate`, `NSNumber`,\
    \ `NSDecimalNumber`, `NSValue`). A property that conforms to a *to-one relationship*\
    \ is an object type and (potentially) has properties of its own. This includes\
    \ framework classes (e.g., Foundation Framework) and your own custom classes.\
    \ A property that conforms to a *to-many relationship* consists of a collection\
    \ of similar type objects. These are most commonly collection types (`NSArray`,\
    \ `NSSet`, etc.).\n\n## Property Accessor Naming Conventions\n\nAs you learned\
    \ in the last section, the default `NSObject` key-value coding implementation\
    \ relies on key-value compliant properties. Specifically, such properties must\
    \ comply with the standard Cocoa naming conventions for property accessor methods.\
    \ These can be summarized as follows:\n\n*   A getter method should use the `<key>`\
    \ accessor form, where the method and property name are identical. For a property\
    \ named `firstName`, the getter method should also be named `firstName`. This\
    \ is true for all data types except for Boolean properties, for which the getter\
    \ method should be prepended with the word `is` (e.g., `isFirstName` in the previous\
    \ example).\n*   The setter method for a property should use the `set<key>` form,\
    \ where the method name is the same as the property, prepended with the word `set`.\
    \ For a property named `firstName`, the setter method should be named `setFirstName:`.\n\
    \nThese conventions should be used for attribute and to-one relationship properties.\
    \ As an example, given a property named `person` of type `Type`, the getter and\
    \ setter accessor methods for the property should be named as follows:\n\n```\n\
    - (Type)person;\n- (void)setPerson:(Type)newValue;\n```\n\nIn the preceding example,\
    \ if the type of the property `person` is Boolean, the getter method could instead\
    \ be named as follows:\n\n```\n- (BOOL)isPerson;\n```\n\nAs another example, a\
    \ property of type `NSString *` named `address` would have accessors with the\
    \ following names:\n\n```\n- (NSString *)address\n- (void)setAddress:(NSString\
    \ *)\n```\n\nNote that if your properties are defined by autosynthesis (as explained\
    \ in [Chapter 2](#9781430250500_Ch02.xhtml)), the compiler automatically generates\
    \ accessor methods that follow this convention.\n\nKey-value coding depends on\
    \ these naming conventions; hence, your code must follow these in order for key-value\
    \ coding to work properly.\n\n## To-Many Property Accessor Naming Conventions\n\
    \nIn addition to the `<key>` and `set<key>` accessor forms, to-many relationship\
    \ properties (i.e., collections) should implement an additional set of accessor\
    \ methods. These additional methods can improve the performance of KVC mutable\
    \ collection APIs, enable you to model to-many relationships with classes beyond\
    \ `NSArray` or `NSSet` (i.e., your own custom classes), and enable your code to\
    \ use the KVC accessor methods to make modifications to collections.\n\nTo-many\
    \ relationship properties have several accessor patterns, depending upon the type\
    \ of collection. A class with properties that maintain an ordered, to-many relationship\
    \ (these are typically of type `NSArray` or `NSMutableArray`) should implement\
    \ the methods listed in [Table 18-1](#9781430250500_Ch18.xhtml#Tab1).\n\n[Table\
    \ 18-1](#9781430250500_Ch18.xhtml#_Tab1). Methods to Implement for Ordered, To-Many\
    \ Relationship Properties\n\n| Method | Ordered, To-Many Relationship | Mutable\
    \ Ordered, To-Many Relationship |\n| --- | --- | --- |\n| `countOf<Key>` | Required\
    \ | Required |\n| `objectIn<Key>AtIndex:` `(or <key>AtIndexes:)` | Required |\
    \ Required |\n| `get<Key>:range:` | Optional | Optional |\n| `insertObject:in<Key>AtIndex:`\
    \ `(or insert<Key>:atIndexes:)` |  | Required |\n| `removeObjectFrom<Key>AtIndex:`\
    \ `(or remove<Key>AtIndexes:)` |  | Required |\n| `replaceObjectIn<Key>AtIndex:withObject:`\
    \ `(or replaceKeyAtIndexes:with<Key>:)` |  | Optional |\n\nImplementing the optional\
    \ methods of [Table 18-1](#9781430250500_Ch18.xhtml#Tab1) can improve performance\
    \ when accessing collection elements. Recall that [Figure 18-1](#9781430250500_Ch18.xhtml#Fig1)\
    \ depicts the object graph for a `Person` class. Imagine a to-many property named\
    \ `people` (of type `NSArray *`). [Listing 18-7](#9781430250500_Ch18.xhtml#list7)\
    \ provides implementations of the `countOf<Key>` and `objectIn<Key>AtIndex:` methods\
    \ for this property.\n\n[*Listing 18-7.*](#9781430250500_Ch18.xhtml#_list7)  Example\
    \ Implementations of Accessors for an Ordered, To-Many Property\n\n```\n- (NSUInteger)countOfPeople\n\
    {\n  return [self.people count];\n}\n\n- (Person *)objectInPeopleAtIndex:(NSUInteger)index\n\
    {\n  return [self.people objectAtIndex:index];\n}\n```\n\nA class with properties\
    \ that maintain an unordered, to-many relationship (typically of type `NSSet`\
    \ or `NSMutableSet`) should implement the methods listed in [Table 18-2](#9781430250500_Ch18.xhtml#Tab2).\n\
    \n[Table 18-2](#9781430250500_Ch18.xhtml#_Tab2). Methods to Implement for Unordered,\
    \ To-many Relationship Properties\n\n| Method | Ordered, To-Many Relationship\
    \ | Mutable Ordered, To-Many Relationship |\n| --- | --- | --- |\n| `countOf<Key>`\
    \ | Required | Required |\n| `enumeratorOf<Key>` | Required | Required |\n| `memberOf<Key>:`\
    \ | Optional | Optional |\n| `add<Key>Object: (or add<Key>:)` |  | Required |\n\
    | `remove<Key>Object: (or remove<Key>:)` |  | Required |\n\nImagine that the to-many\
    \ property named `people` is of type `NSSet *` (i.e., an unordered, to-many relationship\
    \ property). [Listing 18-8](#9781430250500_Ch18.xhtml#list8) provides implementations\
    \ of the `enumeratorOf<Key>` and `memberOf<Key>` methods for this property.\n\n\
    [*Listing 18-8.*](#9781430250500_Ch18.xhtml#_list8)  Example Implementations of\
    \ Accessors for an Unordered, To-Many Property\n\n```\n- (NSEnumerator *)enumeratorOfPeople\n\
    {\n  return [self.people objectEnumerator];\n}\n\n- (Person *)memberOfPeople:(Person\
    \ *)obj\n{\n  return [self.people member:obj];\n}\n```\n\n## Key-Value Validation\n\
    \nKey-value coding also provides infrastructure for validating property values.\
    \ The KVC validation mechanism comprises a set of APIs and a standard convention\
    \ for custom property validation methods. The KVC validation methods can be called\
    \ directly, or indirectly by invoking the KVC `validateValue:forKey:error:` method.\n\
    \nKey-value validation specifies a convention for naming a property’s validation\
    \ method. The selector for a validation method is\n\n```\nvalidate<Key>:error:\n\
    ```\n\n`<Key>` is the name of the property. For example, given a property named\
