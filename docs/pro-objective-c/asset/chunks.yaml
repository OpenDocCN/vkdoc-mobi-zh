    properties indirectly, by name (i.e., key), rather than through accessor methods
    or backing instance variables.

    *   Key-value coding allows you to access a property using a string that can be
    varied at runtime, and thus provides a more dynamic, flexible approach for accessing
    and manipulating an object’s state. Its key benefits include loose coupling, configuration-based
    property access, and code simplification.

    *   Key-value coding uses keys and key paths for property access. A key is a string
    that identifies a specific property. A key path specifies a sequence of object
    properties (within an object graph) that are traversed to identify a specific
    property. The KVC APIs support accessing both individual and multiple properties
    of an object. The properties can be primitives, C structs, object types (including
    collections). Primitives and structs are automatically wrapped to/from corresponding
    object types.

    *   The `NSKeyValueCoding` informal protocol defines the mechanism for accessing
    objects indirectly by name/key. This protocol declares the key-value coding API,
    consisting of class and instance methods along with constant values. The methods
    enable you to get and set property values, perform property validation, and change
    the default behavior of the key-value coding methods for getting property values.

    *   Key-value coding utilizes a mechanism for mapping keys to the appropriate
    property accessor methods and/or property backing variables. This mechanism utilizes
    a set of standard search patterns that rely on property accessor method naming
    conventions.

    *   Key-value coding also includes infrastructure for validating property values.
    The KVC validation mechanism comprises a set of APIs and a standard convention
    for custom property validation methods. The KVC validation methods can be called
    directly or indirectly.

    *   The key-value coding collection operators allow actions to be performed on
    the items of a collection using key path dot notation.

    *   Key-value observing enables other objects to be notified of changes to the
    properties of other objects. It is essentially an implementation of the observer
    software design pattern, and is implemented in numerous software libraries and
    frameworks. In fact, it is a key component of the model-view-controller (MVC)
    design pattern, a central component of the Cocoa and Cocoa Touch frameworks. Key-value
    observing is built on key-value coding.

    *   Key-value observing provides numerous benefits, including decoupling of observer
    objects from the object being observed (i.e., the subject), framework-level support,
    and a full-featured set of APIs. It provides event notification, similar to the
    Foundation Framework notification APIs, but a different set of features. Hence,
    you should compare the two before deciding which to use in your programs.

    *   Key-value observing provides APIs that support both automatic and manual key-value
    property change notification. They enable an observer to perform logic both before
    and after a property value is changed. The APIs support attributes, to-one, and
    to-many relationship properties. Automatic property change notification is implemented
    by the default `NSObject` KVO implementation. Manual change notification provides
    more fine-grained control over the sending of change notifications, eliminates
    unnecessary notifications (e.g., for cases when the new property value is the
    same as its old value), and enables you to group notifications.


