- fmt: "# Cache\n\n在计算机编程中，缓存是一种存储数据的机制，以便未来对相同数据的请求可以更快地检索。它们通常用于存储重新创建代价高昂的对象。Foundation框架的`NSCache`类提供了一个内存系统缓存，用于临时存储重新创建代价高昂的对象。除了管理缓存值之外，该类还包括用于管理缓存大小、管理已丢弃对象以及管理缓存委托的方法。缓存委托符合`NSCacheDelegate`协议，并在对象即将被驱逐或从缓存中移除时接收消息。`NSCache`实例存储键值对，类似于`NSDictionary`（将在本章后面讨论）。其不同之处在于它提供了自动移除策略，从而管理内存利用率。以下代码片段创建了一个`NSCache`实例，设置了缓存可以容纳的对象数量，然后向缓存添加了一个对象。\n\
    \n```\nNSCache *cache = [[NSCache alloc] init];\n[cache setCountLimit:500];\n\
    [cache setObject:@\"Hello, World!\" forKey:@\"greeting\"];\n```\n\n# 集合\n\nFoundation框架的集合类管理对象的集合。大多数集合类都有不可变和可变两个版本。`NSArray`和`NSMutableArray`管理数组，即可以是任何类型的对象的有序集合；`NSArray`的元素不必是相同类型。`NSDictionary`和`NSMutableDictionary`用于键值对组。`NSSet`、`NSMutableSet`和`NSCountedSet`用于管理对象的无序集合。`NSEnumerator`和`NSDirectoryEnumerator`类枚举其他对象的集合，如数组和字典。`NSIndexSet`和`NSMutableIndexSet`管理*索引集*的集合（唯一无符号整数的集合，用于存储另一个数据结构的索引）。`NSHashTable`、`NSMapTable`和`NSPointerArray`是可变集合，在使用垃圾收集器时支持弱关系。\n\
    \n`NSHashTable`、`NSMapTable`和`NSPointerArray`类仅在Apple OS X平台上可用（即，这些类不适用于iOS平台）。\n\
    \n## NSArray\n\n`NSArray`和`NSMutableArray`管理不必是相同类型的对象的有序集合。`NSArray`是不可变的（初始化时分配给数组的对象不能被移除，尽管其内容可以更改）。`NSMutableArray`允许添加或删除集合中的对象。`NSArray`支持的操作包括数组创建和初始化、查询（获取有关数组的信息或检索其元素）、在数组中查找对象、向数组元素发送消息、比较数组以及对数组进行排序。许多`NSArray`和`NSMutableArray`操作在常数时间内执行（访问元素、在两端添加/删除、替换元素），而在`NSMutableArray`中间插入元素则需要线性时间。以下语句使用`NSArray`的`arrayWithObjects:`便捷构造器创建一个`NSArray`对象，赋值给变量`myArray`，并用`NSNumber`字面量初始化。\n\
    \n```\nNSArray *myArray = [NSArray arrayWithObjects:@1, @2, nil];\n```\n\n请注意，`arrayWithObjects:`方法需要参数为以逗号分隔的对象列表，并以`nil`结尾。下一条语句使用`NSArray`的`indexOfObject:`方法检索此`NSArray`对象的第一个元素。\n\
    \n```\nid num0 = [myArray objectAtIndex:0];\n```\n\n以下语句返回前一个`NSArray`对象中`NSNumber`对象（值为2）的索引。\n\
    \n```\nNSUInteger index = [myArray indexOfObject:@2];\n```\n\n`NSArray`还包括以下方法，用于将数组的内容持久化到属性列表，以及从属性列表初始化`NSArray`对象：\n\
    \n```\n- writeToFile:atomically:\n- writeToURL:atomically:\n- initWithContentsOfFile:\n\
    - initWithContentsOfURL:\n```\n\n当持久化数组时（通过`writeTo...`方法），其内容必须全部是属性列表对象（即`NSString`、`NSData`、`NSDate`、`NSNumber`、`NSArray`、`NSDictionary`对象）。\n\
    \n### NSArray 字面量\n\nObjective-C提供语言级支持来创建`NSArray`字面量。数组由方括号之间的逗号分隔的对象列表定义，并以`@`字符为前缀。与`NSArray`的`arrayWithObjects:`和`initWithObjects:`方法不同，用于定义`NSArray`字面量的对象列表不必以`nil`结尾。以下语句是等价的：\n\
    \n```\nNSArray *myArray = [NSArray arrayWithObjects:@1, @2, nil];\nNSArray *myArray\
    \ = @[@1, @2];\n```\n\n与`NSNumber`字面量一样，`NSArray`字面量不是编译时常量；它们在运行时求值。\n\n## NSPointerArray\n\
    \n`NSPointerArray`是一个可变集合，类似于`NSMutableArray`，可以持有任意指针和`NULL`值。它还允许你通过设置数组的计数来管理集合，这样如果集合中的元素数量小于计数，则集合会用`NULL`值填充；或者如果集合中的元素数量大于计数，则删除集合中高于计数值的元素。\n\
    \n## NSDictionary\n\n`NSDictionary`和`NSMutableDictionary`类管理键/值（对象）对的集合。在一个集合中，键的值是唯一的（即，它必须是采用`NSCopying`协议并实现`hash`和`isEqual:`方法的对象）。这些类支持的操作包括对象创建和初始化、查询、在集合中查找对象、过滤、比较以及对集合进行排序。排序选项包括使用选择器排序（使用`keySortedByValueUsingSelector:`方法）和使用block排序（使用`keySortedByValueUsingComparator:`方法）。对于具有良好哈希函数的键（例如，`NSString`），`NSDictionary`操作需要常数时间（从`NSDictionary`或`NSMutableDictionary`中访问、设置、移除元素）。[Listing\
    \ 10-5](#9781430250500_Ch10.xhtml#list5)中显示的代码片段创建并初始化了一个包含两个元素的`NSDictionary`对象。\n\
    \n**[Listing 10-5.](#9781430250500_Ch10.xhtml#_list5)** 创建并初始化一个NSDictionary对象\n\
    \n```\nNSArray *objects = @[@1, @2];\nNSArray *keys = @[@\"one\", @\"two\"];\n\
    NSDictionary *myDi = [NSDictionary dictionaryWithObjects:objects];\n         \
    \              withKeys:keys];\n```\n\n下一条语句从具有键`\"one\"`的前一个`NSDictionary`对象中检索值。\n\
    \n```\nid value = [myDi objectForKey:@\"one\"];\n```\n\n与`NSArray`一样，`NSDictionary`包含将字典内容持久化到属性列表以及从属性列表初始化`NSDictionary`对象的方法：\n\
    \n```\n- writeToFile:atomically:\n- writeToURL:atomically:\n- initWithContentsOfFile:\n\
    - initWithContentsOfURL:\n```\n\n当持久化字典时（通过`writeTo...`方法），其内容必须全部是属性列表对象（`NSString`、`NSData`、`NSDate`、`NSNumber`、`NSArray`和`NSDictionary`对象）。\n\
    \n### NSDictionary 字面量\n\nObjective-C提供语言级支持来创建`NSDictionary`字面量。字典由花括号之间的逗号分隔的键值对列表定义，并以`@`字符为前缀。在每个键值对中，冒号分隔键和值。以下语句是等价的：\n\
    \n```\nNSArray *objects = @[@1, @2];\nNSArray *keys = @[@\"one\", @\"two\"];\n\
    NSDictionary *myDi = [NSDictionary dictionaryWithObjects:objects];\n\nNSDictionary\
    \ *myDi = @{@\"one\":@1, @\"two\":@2};\n```\n\n与`NSNumber`字面量一样，`NSDictionary`字面量不是编译时常量；它们在运行时求值。\n\
