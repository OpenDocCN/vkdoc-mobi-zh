    ## URL 处理


    URL 处理类用于与 URL 交互，并使用标准 Internet 协议（`ftp`、`http`、`https`、本地文件）与资源通信。这些类提供以下功能：


    *   URL 加载

    *   缓存管理

    *   身份验证与凭据管理

    *   Cookie 管理

    *   协议支持


    这些类还根据用户的系统偏好支持代理服务器和 SOCKET Secure（`SOCKS`）网关。


    ### URL 加载


    `NSURL`对象用于管理 URL 及其所引用的资源。该类包含用于创建和初始化`NSURL`对象、查询 URL 以及访问 URL 组成部分（例如，主机、端口等）的方法。`NSURL`还提供了处理书签数据的方法。**书签**是对文件位置的持久引用。它是一个定位文件的有用工具，因为即使文件被移动或重命名，它也能用于重新创建指向该文件的
    URL。以下代码片段演示了如何使用`NSURL` API 创建`NSURL`对象并访问其组成部分。


    ```

    NSURL *url = [NSURL URLWithString:@"http://www.apress.com:80"];

    NSLog(@"URL: scheme %@, host %@, port %@", url.scheme, url.host, url.port);

    ```


    `NSURLRequest`和`NSMutableURLRequest`类用于表示 URL 加载请求。`NSURLRequest`独立于网络协议和 URL
    方案。该类包含创建和初始化 URL 请求以及检索请求属性的方法。`NSMutableURLRequest`是`NSURLRequest`的子类，提供了允许你更改
    URL 及其组成部分的方法。以下语句创建了一个可变 URL 请求，然后使用`setHTTPMethod:`方法设置 HTTP 请求方法值。


    ```

    NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:

                                [NSURL URLWithString:@"http://www.apress.com:80"]];

    [req setHTTPMethod:@"GET"];

    ```


    `NSURLResponse`和`NSHTTPURLResponse`类用于表示 URL 请求返回的响应。`NSURLConnection`对象由执行 URL
    请求同步加载的对象（`sendSynchronousRequest:returningResponse:error:`）或遵循`NSURLConnectionDataDelegate`协议的对象创建。`NSHTTPURLResponse`类是`NSURLResponse`的子类，提供了访问
    URL 请求返回的 HTTP 特定信息的方法。


    `NSURLConnection`和`NSURLDownload`类用于下载由 URL 标识的资源内容。`NSURLConnection`支持同步和异步资源加载、启动和停止连接，以及管理用于控制
    URL 连接各个方面的委托对象（即，缓存管理、身份验证与凭据、协议支持和 Cookie 管理）。对于异步加载，必须设置一个委托对象。该对象必须遵循`NSURLConnectionDelegate`协议，因此至少需要实现以下方法：


    *   `connection:didReceiveData:`（用于检索加载的数据）

    *   `connection:didFailWithError:`（用于处理连接错误）

    *   `connection:didFinishLoading:`（用于在连接完成数据加载后执行处理）


    [清单 11-13](#9781430250500_Ch11.xhtml#list13) 演示了如何使用各种 URL 加载 API 从 URL 同步加载数据。


    *[清单 11-13.](#9781430250500_Ch11.xhtml#_list13)* 使用`NSURLConnection`同步加载 URL 的内容


    ```

    NSURL *url = [NSURL URLWithString:@"http://www.apress.com/index.html"];

    NSURLRequest *request = [NSURLRequest requestWithURL:url];

    NSURLResponse *response;

    NSError *aerror;

    NSData *data = [NSURLConnection sendSynchronousRequest:request

                                         returningResponse:&response

                                                     error:&aerror];

    NSLog(@"Expected content length = %lld; loaded %lu bytes",

          [response expectedContentLength], [data length]);

    ```


    如[清单 11-13](#9781430250500_Ch11.xhtml#list13)所示，代码创建了一个`NSURL`实例，然后创建了对应的`NSURLRequest`。接着创建了一个连接，并使用`NSURLConnection`的`sendSynchronousRequest:returningResponse:error:`方法加载数据。结果以`NSData`对象的形式返回。


    `NSURLDownload`类用于将 URL 的内容异步下载到文件。它包含初始化下载（设置请求和委托）、设置目标路径、恢复部分下载以及取消加载请求的方法。该类还支持解码以
    MacBinary、BinHex 和 gzip 格式存储的文件。委托对象必须遵循`NSURLDownloadDelegate`协议，因此至少需要实现以下方法：


    *   `download:didFailWithError:`（用于处理连接错误）

    *   `downloadDidFinish:`（用于在连接完成数据加载后执行处理）


    `NSURLDownload`类仅适用于 OS X 平台（即，此类不适用于 iOS 平台）。


    ### 缓存管理


    缓存管理类（`NSURLCache`和`NSCachedURLResponse`）为 URL 请求的响应提供缓存内存。`NSURLCache`类提供 URL
    的通用缓存，而`NSCachedURLResponse`封装了 URL 响应（`NSURLResponse`对象）和从 URL 加载的数据（`NSData`对象）。`NSURLConnection`委托对象实现了`connection:willCacheResponse:`方法，提供了一个使用`NSURLCache`初始化的`NSCachedURLResponse`对象来管理缓存。其工作原理最好通过示例来说明；现在你将创建一个使用
    URL 加载类下载资源的程序。让我们开始吧！


