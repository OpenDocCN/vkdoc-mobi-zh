- fmt: "As with any message-passing expression, each selector name segment is followed\
    \ by a parameter. In a selector with one or more empty segments, the name segment\
    \ is not provided but the parameter is still required, hence the message `sumAddend1:25\
    \ :10` in the preceding example. You won’t normally see many method declarations\
    \ with empty argument names (thus, empty selector segments), because a typo in\
    \ an object message used to invoke such a method could easily lead to errors that\
    \ are hard to debug.\n\n## The SEL Type\n\nUp to this point, you have defined\
    \ a selector as a text string that is part of a message in a message-passing expression;\
    \ now, you’ll examine the selector type. A *selector type* (`SEL`) is a special\
    \ Objective-C type that represents a unique identifier that replaces a selector\
    \ value when the source code is compiled. All methods with the same selector value\
    \ have the same `SEL` identifier. The Objective-C runtime system ensures that\
    \ each selector identifier is unique. A variable of type `SEL` can be created\
    \ using the `@selector` keyword.\n\n```\nSEL myMethod = @selector(myMethod);\n\
    ```\n\nSo why would you create `SEL` variables? Well, the Objective-C runtime\
    \ system (via `NSObject`) includes many methods that utilize variables of type\
    \ `SEL` as parameters to dynamic methods. In addition to obtaining information\
    \ about objects and classes, `NSObject` includes several methods for invoking\
    \ a method on an object using a selector parameter. The following example uses\
    \ the `NSObject` instance method `performSelector:withObject:withObject:` to invoke\
    \ a method specified by the selector variable.\n\n```\n[myCalculator performSelector:@selector(sumAddend1::)\
    \ withObject:[NSNumber numberWithInteger:25]\n                         withObject:[NSNumber\
    \ numberWithInteger:10]];\n```\n\nThe `@selector` directive creates a selector\
    \ variable at compile time. You can also create a selector at runtime with the\
    \ Foundation Framework `NSSelectorFromString` function. In this case, the previous\
    \ example is updated as follows:\n\n```\n SEL selector = NSSelectorFromString(@\"\
    sumAddend1::\");\n [myCalculator performSelector:selector withObject:[NSNumber\
    \ numberWithInteger:25]\n                         withObject:[NSNumber numberWithInteger:10]];\n\
    ```\n\n## Method Signatures\n\nNow that you have examined message receivers, selectors,\
    \ and the `SEL` type, let’s look at method signatures and their role in object\
    \ messaging. A *method signature* defines the data type(s) for the input parameters\
    \ of a method along with its returned result (if any). Now you may be thinking:\
    \ OK, so that’s all well and good, but why is this important when sending a message\
    \ to an object? To understand that, let’s take a moment to discuss some of the\
    \ internals of how the runtime system implements object messaging.\n\n**Note**\
    \ In the next chapter, you are going to examine the details of the runtime system\
    \ and how its dynamic behaviors (such as object messaging) are implemented. In\
    \ this chapter, you focus on the runtime system architecture and not its implementation\
    \ details.\n\nThe compiler translates an object message of the form `[receiver\
    \ message]` into a (ANSI) C function call whose declaration includes the method\
    \ signature. Thus, in order to generate the correct code for object messaging,\
    \ the compiler needs to know both the selector value and the method signature.\
    \ Now the selector is easily extracted from the object message expression, but\
    \ how does the compiler determine the method signature? After all, the message\
    \ may include input parameters, but you don’t know how these types map to the\
    \ actual method to be invoked because the receiver (and corresponding method)\
    \ isn’t determined until runtime. Well, to determine the correct method signature,\
    \ the compiler makes a guess based on the methods it can see from the declarations\
    \ it has parsed so far. If it can’t find one, or there’s a mismatch between the\
    \ declarations it sees and the method that will actually be executed at runtime,\
    \ a method signature mismatch can occur, resulting in anything from compiler warnings\
    \ to runtime errors.\n\nTo demonstrate a scenario that could cause a method signature\
    \ mismatch, let’s say that your program uses three classes whose interfaces are\
    \ as shown in [Listing 7-4](#9781430250500_Ch07.xhtml#list4).\n\n[*Listing 7-4.*](#9781430250500_Ch07.xhtml#_list4)\
    \ Calculator Classes Methods\n\n```\n@interface Calculator1 : NSObject\n- (int)\
    \ sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n@end\n\n@interface Calculator2\
    \ : NSObject\n- (float) sumAddend1:(float)a1 addend2:(float)a2;\n@end\n\n@interface\
    \ Calculator3 : NSObject\n- (NSInteger) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n\
    @end\n```\n\nSo what happens when your code sends the message `[receiver sumAddend1:25\
    \ addend2:10]` where the receiver is of type `id`? Depending upon the interface(s)\
    \ your code imports and the runtime type of the receiver (using [Listing 7-4](#9781430250500_Ch07.xhtml#list4)\
    \ the receiver could be of type `Calculator1`, `Calculator2`, or `Calculator3`),\
    \ a method signature mismatch may occur. This condition can cause a variety of\
    \ errors, such as stack overflow, invalid method inputs, or an invalid returned\
    \ result.\n\nThis example illustrates the danger of method signature mismatch.\
    \ To avoid this scenario, it’s best to try to ensure that methods with different\
    \ signatures also have different names.\n\n## Using Object Messaging\n\nNow you’ll\
    \ create an example program to illustrate the use of selectors and the `SEL` type.\
    \ In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)\
    \ **Project ...** from the Xcode File menu. In the **New Project Assistant** pane,\
    \ create a command-line application (choose **Command Line Tool** from the OS\
    \ X Application selection) and click **Next**. In the **Project Options** window,\
    \ specify **Calculator** for the Product Name, choose **Foundation** for the Project\
    \ Type, select ARC memory management by checking the **Use Automatic Reference\
    \ Counting** check box, and then click **Next**.\n\nSpecify the location in your\
    \ file system where you want the project to be created (if necessary, select **New\
    \ Folder** and enter the name and location for the folder), uncheck the **Source\
    \ Control** check box, and then click the **Create** button.\n\nNext, you’ll create\
    \ a `Calculator` class. Add the class to the project. Select **New** ![image](images/arrow.jpg)\
    \ **File ...** from the Xcode File menu, select the **Objective-C** class template,\
    \ name the class **Calculator** (in the Subclass Of drop-down list, select **NSObject**),\
    \ select the **Calculator** folder for the files location and the **Calculator**\
    \ project as the target, and then click the **Create** button.\n\nYou’re done\
    \ creating the program files, now let’s implement the code. Select the **Calculator.h**\
    \ file in the navigator pane, and then add the code shown in [Listing 7-5](#9781430250500_Ch07.xhtml#list5).\n\
    \n[*Listing 7-5.*](#9781430250500_Ch07.xhtml#_list5) Calculator Class Interface\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface Calculator : NSObject\n\
    ```"
  raw: 'As with any message-passing expression, each selector name segment is followed
    by a parameter. In a selector with one or more empty segments, the name segment
    is not provided but the parameter is still required, hence the message `sumAddend1:25
    :10` in the preceding example. You won’t normally see many method declarations
    with empty argument names (thus, empty selector segments), because a typo in an
    object message used to invoke such a method could easily lead to errors that are
    hard to debug.


    The SEL Type


    Up to this point, you have defined a selector as a text string that is part of
    a message in a message-passing expression; now, you’ll examine the selector type.
    A *selector type* (`SEL`) is a special Objective-C type that represents a unique
    identifier that replaces a selector value when the source code is compiled. All
    methods with the same selector value have the same `SEL` identifier. The Objective-C
    runtime system ensures that each selector identifier is unique. A variable of
    type `SEL` can be created using the `@selector` keyword.


    ```

    SEL myMethod = @selector(myMethod);

    ```


    So why would you create `SEL` variables? Well, the Objective-C runtime system
    (via `NSObject`) includes many methods that utilize variables of type `SEL` as
    parameters to dynamic methods. In addition to obtaining information about objects
    and classes, `NSObject` includes several methods for invoking a method on an object
    using a selector parameter. The following example uses the `NSObject` instance
    method `performSelector:withObject:withObject:` to invoke a method specified by
    the selector variable.


    ```

    [myCalculator performSelector:@selector(sumAddend1::) withObject:[NSNumber numberWithInteger:25]

                             withObject:[NSNumber numberWithInteger:10]];

    ```


    The `@selector` directive creates a selector variable at compile time. You can
    also create a selector at runtime with the Foundation Framework `NSSelectorFromString`
    function. In this case, the previous example is updated as follows:


    ```

     SEL selector = NSSelectorFromString(@"sumAddend1::");

     [myCalculator performSelector:selector withObject:[NSNumber numberWithInteger:25]

                             withObject:[NSNumber numberWithInteger:10]];

    ```


    Method Signatures


    Now that you have examined message receivers, selectors, and the `SEL` type, let’s
    look at method signatures and their role in object messaging. A *method signature*
    defines the data type(s) for the input parameters of a method along with its returned
    result (if any). Now you may be thinking: OK, so that’s all well and good, but
    why is this important when sending a message to an object? To understand that,
    let’s take a moment to discuss some of the internals of how the runtime system
    implements object messaging.


    **Note**   In the next chapter, you are going to examine the details of the runtime
    system and how its dynamic behaviors (such as object messaging) are implemented.
    In this chapter, you focus on the runtime system architecture and not its implementation
    details.


    The compiler translates an object message of the form `[receiver message]` into
    a (ANSI) C function call whose declaration includes the method signature. Thus,
    in order to generate the correct code for object messaging, the compiler needs
    to know both the selector value and the method signature.  Now the selector is
    easily extracted from the object message expression, but how does the compiler
    determine the method signature? After all, the message may include input parameters,
    but you don’t know how these types map to the actual method to be invoked because
    the receiver (and corresponding method) isn’t determined until runtime. Well,
    to determine the correct method signature, the compiler makes a guess based on
    the methods it can see from the declarations it has parsed so far.  If it can’t
    find one, or there’s a mismatch between the declarations it sees and the method
    that will actually be executed at runtime, a method signature mismatch can occur,
    resulting in anything from compiler warnings to runtime errors.


    To demonstrate a scenario that could cause a method signature mismatch, let’s
    say that your program uses three classes whose interfaces are as shown in [Listing
    7-4](#9781430250500_Ch07.xhtml#list4).


    [*Listing 7-4.*](#9781430250500_Ch07.xhtml#_list4)  Calculator Classes Methods


    ```

    @interface Calculator1 : NSObject

    - (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;

    @end


    @interface Calculator2 : NSObject

    - (float) sumAddend1:(float)a1 addend2:(float)a2;

    @end


    @interface Calculator3 : NSObject

    - (NSInteger) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;

    @end

    ```


    So what happens when your code sends the message `[receiver sumAddend1:25 addend2:10]`
    where the receiver is of type `id`? Depending upon the interface(s) your code
    imports and the runtime type of the receiver (using [Listing 7-4](#9781430250500_Ch07.xhtml#list4)
    the receiver could be of type `Calculator1`, `Calculator2`, or `Calculator3`),
    a method signature mismatch may occur. This condition can cause a variety of errors,
    such as stack overflow, invalid method inputs, or an invalid returned result.


    This example illustrates the danger of method signature mismatch. To avoid this
    scenario, it’s best to try to ensure that methods with different signatures also
    have different names.


