    \ Apple 的 Objective-C 源代码，对预处理器语言的详细了解是非常宝贵的。总而言之，本章的要点如下：\n\n*   预处理器在编译的词法分析阶段使用，该阶段发生在解析之前。它根据一组预定义的规则，将输入字符序列（来自源文件）替换为其他字符序列。这些操作执行文本转换、符号转换和基于预处理器的语言转换。\n\
