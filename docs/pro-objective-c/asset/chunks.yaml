    \ declarations\n@end\n```\n\nAs shown in [Listing 2-23](#9781430250500_Ch02.xhtml#list23),\
    \ an extension differs from a category in that it can declare instance variables\
    \ and properties. The compiler will verify that the methods (and properties) declared\
    \ in an extension are implemented. A class extension is commonly placed in the\
    \ same file as the class implementation file and it is used to group and declare\
    \ additional required, private methods (e.g., not part of the publicly declared\
    \ API) for use solely within a class.\n\n## Roundup\n\nWhew. This has been quite\
    \ an introduction to Objective-C and developing classes! You have covered a lot\
    \ of ground in this chapter, so let’s take a moment to recap what you’ve learned:\n\
    \n*   An Objective-C class is comprised of an interface and an implementation.\n\
    \    *   The interface *declares* the class properties and methods.\n    *   The\
    \ implementation *defines* the class instance variables, properties, and methods.\n\
    *   An interface may employ *inheritance* to obtain the properties and methods\
    \ of subclasses in a class hierarchy.\n*   By convention, a class interface is\
    \ stored (on disk) in a header file (suffixed with `.h`) and its implementation\
    \ is stored in a file suffixed with `.m`.\n*   A protocol declares methods and\
    \ properties that can be implemented by any class. They are often used to provide\
    \ common behaviors in classes that are not hierarchically related.\n*   A category\
    \ enables the addition of new functionality to an existing class without subclassing\
    \ it. Typically, categories are used 1) to extend classes defined by others (even\
    \ if you don’t have access to the source code); 2) as an alternative to a subclass;\
    \ or 3) to distribute the implementation of a new class into multiple source files.\
    \ An extension can be considered an anonymous category; however, its declarations\
    \ must be implemented in the main implementation block of the class. Extensions\
    \ can also declare instance variables and properties.\n*   Xcode provides templates\
    \ for creating Objective-C classes, protocols, categories, and extensions, thereby\
    \ making it easy to get started developing your own classes.\n\nThis has been\
    \ a detailed primer on developing classes using Objective-C and Xcode, so this\
    \ is a good time to take a break and review what you’ve gone over. In the next\
    \ chapter, you’ll pick up where you left off by exploring the details of object\
    \ messaging using Objective-C.\n\n# Chapter 3: Objects and Messaging\n\nNow that\
    \ you have a good understanding of how to create classes using Objective-C, you\
    \ may be wondering, “How do I use these classes?” That’s the focus of this chapter;\
    \ specifically object creation, initialization, and invoking methods on objects\
    \ using Objective-C.\n\nAs you learned in [Chapter 2](#9781430250500_Ch02.xhtml),\
    \ an Objective-C class is defined by its instance variables, properties, and methods.\
    \ In addition, through OOP inheritance, a class also contains the state and behavior\
    \ (i.e., methods and instance variables) of its parent class/classes. At runtime,\
    \ an object-oriented program executes its logic by creating objects and invoking\
    \ the desired operations on these objects using messaging—an OOP mechanism for\
    \ invoking methods on objects and classes.\n\n### Creating Objects\n\nA class\
    \ instance (i.e., object) is created by allocating memory for it and initializing\
    \ it appropriately. Objects of the same kind are said to be members of the same\
    \ class. What this means is that they have the same methods and matching sets\
    \ of instance variables. Thus, when you create objects of the same type, you are\
    \ in effect creating a set of instance variables for the object—along with a set\
    \ of pointers to the methods defined for the class.\n\nEvery class lives in its\
    \ own namespace. The names assigned within a class definition don’t conflict with\
    \ names assigned anywhere outside it. This is true both of the instance variables\
    \ in an object’s data structure and of the object’s methods. Hence, the meaning\
    \ of a message must be understood relative to the particular object that receives\
    \ the message. The same message sent to two different objects can invoke two distinct\
    \ methods. This is a fundamental feature of OOP and simplifies a class interface,\
    \ because the same names (corresponding to desired operations) can be reused in\
    \ different classes.\n\nThe Foundation Framework provides functionality that simplifies\
    \ object creation. Specifically, the `NSObject` class includes methods that are\
    \ used to create class instances. The `NSObject alloc` class method returns a\
    \ new instance of the specified class type; its syntax is\n\n```objectivec\n+\
    \ (id) alloc\n```\n\nAn `id` is an Objective-C type used to hold a reference to\
    \ any Objective-C object, regardless of its class. The `alloc` method can be invoked\
    \ as\n\n```objectivec\nid varName = [ClassName alloc];\n```\n\nThis creates an\
    \ object of type `ClassName` and assigns it to a variable named `varName` of type\
    \ `id`. You could also create the object as follows:\n\n```objectivec\nClassName\
    \ *varName = [ClassName alloc];\n```\n\nThis would also create an object of type\
    \ `ClassName` and assign it to a variable named `varName`; however, in this case,\
    \ the variable is of type `ClassName *` (i.e., a pointer to a class of type `ClassName`).\
    \ Explicitly defining the type for the variable provides static type checking,\
    \ at the expense of flexibility. We’ll discuss this more in Part 2 of the book,\
    \ which explores the Objective-C runtime. In either case, the `alloc` method returns\
    \ objects that are an instance of the receiving class’s type, also known as a\
    \ *related result type*. This means that the object returned from sending the\
    \ `alloc` message will have the same type as that of the receiving class. Now\
    \ in [Chapter 2](#9781430250500_Ch02.xhtml), you developed an `Atom` class. You\
    \ can create an `Atom` object and assign it to a variable named `atom` using the\
    \ `alloc` method.\n\n```objectivec\nAtom *atom = [Atom alloc];\n```\n\nAs the\
    \ receiving class of the `alloc` message is `Atom`, the created object will be\
    \ of type `Atom`. Memory is allocated for the object and its instance variables\
    \ are set to default values (zero)."
