    The message parameter values are `burgerObject` (for keyword `addItem`) and `3.50`
    (for keyword `atPrice`). Under normal circumstances, a particular message can
    only be successfully invoked on a receiving object that has a method with the
    corresponding message name. In addition, Objective-C supports type polymorphism,
    whereby different receivers can have different implementations of the same method.
