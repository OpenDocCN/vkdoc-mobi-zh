- fmt: "# 线程（Threads）\n\n每个方法在接收者对象上指定一个选择器（selector），该方法将随一个线程被调用。此方法也被称为*线程入口点例程*（entry-point\
    \ routine）。该选择器消息会被加入线程运行循环（run loop）的队列中，并作为运行循环标准处理的一部分在该线程上执行。这些消息传递方法允许你指定线程是异步调用还是同步调用。同步调用会导致当前线程阻塞，直到方法执行完毕。由于这些方法定义在`NSObject`类中，因此它们适用于所有继承自`NSObject`的类（即大多数Foundation框架API和你将实现的大部分自定义类）。[清单17-3](#9781430250500_Ch17.xhtml#list3)展示了使用`performSelector:onThread:`方法在名为`secondaryThread`的线程上异步调用`downloadTask`方法，该方法定义在名为`ConcurrentProcessor`的自定义类中。\n\
    \n*清单17-3.*  `NSObject performSelector:onThread:withObject:waitUntilDone:`方法调用\n\
    \n```\nConcurrentProcessor *processor = [ConcurrentProcessor new];\n[processor\
    \ performSelector:@selector(downloadTask)\n                  onThread:secondaryThread\n\
    \                withObject:nil\n             waitUntilDone:NO];\n```\n\n如[清单17-3](#9781430250500_Ch17.xhtml#list3)所示，`waitUntilDone:`参数指定了异步/同步操作。在此示例中，输入值设置为`NO`，因此当前线程立即返回。\n\
    \n当你创建线程时，可以配置其运行时环境的部分内容（例如，栈大小、线程本地存储、线程优先级等）。通过实现具有以下功能的线程入口点例程来适当配置线程上下文也很重要（按需）：\n\
    \n*   **自动释放池（Autorelease Pool）**：应在入口点例程的开头创建自动释放池，并在例程结束时销毁。\n*   **异常处理器（Exception\
    \ Handler）**：如果应用程序捕获并处理异常，则应配置入口点例程以捕获可能发生的任何异常。[第14章](#9781430250500_Ch14.xhtml)讨论了Objective-C中异常处理的机制。\n\
    *   **运行循环（Run Loop）**：为了使线程能够动态处理到达的请求，可以在入口点例程中设置一个运行循环。[第11章](#9781430250500_Ch11.xhtml)介绍了Foundation框架中`NSRunLoop`类的使用。\n\
    \n[清单17-4](#9781430250500_Ch17.xhtml#list4)中的`ConcurrentProcessor downloadTask`方法展示了根据前述指南实现的入口点例程。\n\
    \n*清单17-4.*  `ConcurrentProcessor downloadTask`方法\n\n```\n@implementation ConcurrentProcessor\n\
    ...\n- (void)downloadTask\n{\n  @autoreleasepool\n  {\n    NSURL *url = [NSURL\
    \ URLWithString:@\"http://www.apress.com\"];\n    NSString *str = [NSString stringWithContentsOfURL:url\n\
    \                                             encoding:NSUTF8StringEncoding\n\
    \                                                error:nil];\n    NSLog(@\"URL\
    \ Contents:\\n%@\", str);\n    self.isLoaded = YES;\n  }\n}\n@end\n```\n\n`NSObject`的`performSelectorOnMainThread:`方法通常用于将值（状态、结果等）从次级线程对象返回给主（应用）线程对象。这实现了次级线程与主线程之间的通信。此API对于仅应在应用主线程中使用的对象（例如UIKit对象）尤为重要。\n\
    \n## 线程（Threads）\n\n如前文所述，线程是在单个进程上下文中执行的逻辑控制流。Apple OS X和iOS操作系统直接支持线程的创建、管理和执行。在应用层，Foundation框架提供了用于创建和管理线程的API，以及一组用于同步并发线程间共享数据访问的API。\n\
    \n## NSObject线程\n\n`NSObject`方法`performSelectorInBackground:withObject:`允许你隐式创建并启动一个新线程，用于在对象上执行某个方法。该线程立即作为次级后台线程启动，当前线程则立即返回。\n\
    \n[清单17-5](#9781430250500_Ch17.xhtml#list5)展示了使用`performSelectorInBackground:withObject:`方法在`ConcurrentProcessor`类的实例上异步调用`downloadTask`方法。\n\
    \n*清单17-5.*  `NSObject performSelectorInBackground:withObject:`方法调用\n\n```\nConcurrentProcessor\
    \ *processor = [ConcurrentProcessor new];\n[processor performSelectorInBackground:@selector(downloadTask)\n\
    \                            withObject:nil];\nwhile (!processor.isLoaded)\n \
