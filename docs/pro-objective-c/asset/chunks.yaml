    \ work the same way as instance methods, except that they are invoked on a class,\
    \ not an object. As a result, class methods do not have access to the instance\
    \ variables and methods defined for the class. They are commonly used to create\
    \ new instances of a class (i.e., as factory methods), or for accessing shared\
    \ information associated with a class.\n\nBy separating the message (the requested\
    \ behavior) from the receiver (the owner of a method that can respond to the request),\
    \ object messaging directly supports the OOP paradigm of encapsulation.\n\nObjective-C\
    \ augments its support for object messaging with language-level features that\
    \ enable you to determine at runtime the method to be invoked, and even change\
    \ the method implementation. You'll explore these features in Part 2 of this book;\
    \ but for now, let's learn how to handle scenarios where an object receives a\
    \ message it cannot process.\n\n## Message Forwarding\n\nObjective-C object messaging\
    \ finds and executes a method on an object based on the message it receives. The\
    \ object type can either be specified in the code and statically bound at compile\
    \ time (*static typing*) or be unspecified with its type resolved at runtime (*dynamic\
    \ typing*). In either case, at runtime, the receiving object interprets the message\
    \ to determine which method to invoke. This runtime resolution of method calls\
    \ makes it easy to change and/or extend programs dynamically, but also carries\
    \ with it a certain risk: it permits a program to send a message to an object\
    \ that may not have a corresponding method attached to it. Under the default scenario,\
    \ if this happens, a runtime exception is thrown. However, Objective-C provides\
    \ another option: through a mechanism called *message forwarding*, it is possible\
    \ to configure an object to perform user-defined processing when it receives a\
    \ message not mapped to its set of methods. Message forwarding enables an object\
