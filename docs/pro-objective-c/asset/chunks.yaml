  raw: 'The `NSNotificationCenter` and `NSDistributedNotificationCenter` classes provide
    the mechanisms for broadcasting notifications to interested observers. They include
    methods for getting the notification center instance, adding and removing notification
    observers, and posting notifications. `NSDistributedNotificationCenter` is a subclass
    of `NSNotificationCenter` that provides a mechanism for broadcasting notifications
    to other processes. The class method `defaultCenter` is used to retrieve the default
    notification center instance associated with an application, as shown in the following
    statement.


    ```

    [NSNotificationCenter defaultCenter];

    ```


    `NSNotificationCenter` provides several methods for posting notifications. The
    following statement uses the `postNotification:` method to post the notification
    created in [Listing 12-1](#9781430250500_Ch12.xhtml#list1).


    ```

    [[NSNotificationCenter defaultCenter] postNotification:notif];

    ```


    `NSNotificationCenter` also provides methods to create and post a notification
    with a single method. The following statement uses the `postNotificationName:object:`
    method to create and post a notification using the notification name created in
    [Listing 12-1](#9781430250500_Ch12.xhtml#list1).


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:nName

                                                        object:@"Salut!"];

    ```


    `NSNotificationCenter` includes several methods for managing notification observers.
    You can register an object to receive a notification using the `addObserver:selector:name:object:`
    method. This method takes parameters that specify the observer object to receive
    a notification, the message to send to the observer, the name of the notification
    for which to register the observer, and the sender from which the observer wants
    to receive notifications. [Listing 12-2](#9781430250500_Ch12.xhtml#list2) registers
    an object named `handler` (an instance of the `Greeter` class) to receive notifications
    from the variable named `nName` (see [Listing 12-1](#9781430250500_Ch12.xhtml#list1)),
    sending the message `handleGreeting:` to the observer.


    [*Listing 12-2.*](#9781430250500_Ch12.xhtml#_list2)  Registering a Notification
    Observer


    ```

    Greeter *handler = [Greeter new];

    [[NSNotificationCenter defaultCenter] addObserver:handler

                                            selector:@selector(handleGreeting:)

                                                name:nName

                                              object:nil];

    ```


    Classes that receive notification events must implement a notification handler
    method with the following signature.


    ```

    - (void) methodName :(NSNotification *)notification;

    ```


    `methodName` is the name of the method. In [Listing 12-2](#9781430250500_Ch12.xhtml#list2),
    the `Greeter` class implements a notification handler method named `handleGreeting:`.


    `NSNotificationCenter` also provides methods to remove an observer; the `removeObserver:`
    method unregisters an observer from notifications that it had previously registered
    for. The method `removeObserver:name:object:` is more fine-grained. It removes
    entries that match a specified observer, notification name, and sender. The following
    statement removes the notification with variable name `nName` for the observer
    named `handler`.


    ```

    [[NSNotificationCenter defaultCenter] removeObserver:handler

                                                    name:uName

                                                  object:nil];

    ```


    The `NSNotificationQueue` class provides a queue for notification centers, thereby
    enabling asynchronous posting and/or the coalescing of notifications. *Coalescing*
    is a process that enables you to filter (from a queue) notifications that are
    similar in some way to a notification that was queued earlier. The class includes
    methods to retrieve a notification queue instance, and add/remove notifications
    on the queue. The class method `defaultQueue` is used to retrieve the default
    notification queue instance for the current thread, as shown in the following
    statement.


    ```

    [NSNotificationQueue defaultQueue];

    ```


    The method `initWithNotificationCenter:` provides the capability to create a notification
    queue for a specified notification center. [Listing 12-3](#9781430250500_Ch12.xhtml#list3)
    retrieves the default notification center and then creates a notification queue
    associated with it.


    [*Listing 12-3.*](#9781430250500_Ch12.xhtml#_list3)  Creating a Notification Queue
    for a Specified Notification Center


    ```

    NSNotificationCenter *notifier = [NSNotificationCenter defaultCenter];

    NSNotificationQueue *queue = [[NSNotificationQueue alloc]

                                  initWithNotificationCenter:notifier];

    ```


    `NSNotificationQueue` includes two methods for posting notifications. The `enqueueNotification:postingStyle:coalesceMask:forModes:`
    method enables you to specify the posting style, coalescing option, and supported
    run modes for posting the notification. The coalescing options are constant values
    defined as follows:


    *   `NSNotificationNoCoalescing`: Do not coalesce notification, post all.

    *   `NSNotificationCoalescingOnName`: Coalesce notifications with the same name,
    such that only one is posted.

    *   `NSNotificationCoalescingOnSender`: Coalesce notifications with the same sender,
    such that only one is posted.


    The posting style defines the interaction mode (synchronous/asynchronous, when
    idle/as soon as possible) used to queue the notification. These options are specified
    as constant values, as follows:


    *   `NSPostASAP`: Asynchronously posts as soon as possible, when the current iteration
    of the corresponding run loop completes.

    *   `NSPostWhenIdle`: Asynchronously posts when the run loop is waiting for input
    source or timer events.

    *   `NSPostNow`: The notification queued is posted immediately (after coalescing),
    effectively providing synchronous behavior. This behavior does not require a run
    loop.


    [Listing 12-4](#9781430250500_Ch12.xhtml#list4) synchronously queues the notification
    assigned to the variable named `notif` (see [Listing 12-1](#9781430250500_Ch12.xhtml#list1)),
    coalescing notifications with the same name.


    [*Listing 12-4.*](#9781430250500_Ch12.xhtml#_list4)  Posting a Notification to
    a Queue with Coalescing


    ```

    [[NSNotificationQueue defaultQueue]

        enqueueNotification:notif

               postingStyle:NSPostNow

               coalesceMask:NSNotificationCoalescingOnName

                   forModes:nil];

    ```


    `NSNotificationQueue` also includes a method to remove notifications from the
    queue. The following statement uses the `dequeueNotificationsMatching:coalesceMask:`
    method to dequeue notifications assigned to the variable named `notif` with no
    coalescing.


    ```

    [[NSNotificationQueue defaultQueue]

         dequeueNotificationsMatching:notif

                         coalesceMask:NSNotificationNoCoalescing];

    ```


