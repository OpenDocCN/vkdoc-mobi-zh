    \ 3-10.*](#9781430250500_Ch03.xhtml#_list10) HydrogenHelper Implementation\n\n\
    ```\n#import \"HydrogenHelper.h\"\n\n@implementation HydrogenHelper\n\n- (NSString\
    \ *) factoid\n{\n  return @\"The lightest element and most abundant chemical substance.\"\
    ;\n}\n```\n\nAs you can see from [Listing 3-10](#9781430250500_Ch03.xhtml#list10),\
