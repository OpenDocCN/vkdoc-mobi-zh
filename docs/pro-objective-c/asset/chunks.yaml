    Appendix     A


    Language Elements


    [Appendix A](#9781430250500_AppA.xhtml) provides a concise summary of the basic
    elements of the Objective-C language. Its scope is the Objective-C language extensions
    to ANSI C. The fundamental elements of the C programming language are not covered
    here; they can be found in numerous other references.


    Variables


    The lexical rules for variable names in Objective-C are identical to those for
    ANSI C—a variable is defined with a letter or underscore, followed by any combination
    of letters, underscores, and the digits 0–9\. Uppercase and lowercase letters
    are distinct.


    Objective-C Reserved Words


    In a programming language, a *reserved word* is a symbol that has a special meaning
    in the language, and hence should not be used as a variable name. Objective-C
    adds a number of reserved words to those already defined for ANSI C; these are
    listed in [Table A-1](#9781430250500_AppA.xhtml#Tab1).


    Table A-1\. Objective-C Reserved Words Not Used for Variable Names


    ![table](images/TableA-1.jpg)


    Variable Scope


    The visibility and accessibility of a variable is dependent on its scope. A variable
    may exist within a statement block, a function, a method, an object instance (or
    related objects), throughout a file, or across multiple files. ANSI C defines
    four kinds of scope:


    *   *block*: A variable declared within a statement block has *block scope*. Variables
    declared within a block are only visible and accessible within this block.

    *   *file*: A variable that has *file scope*is visible and accessible only to
    code within the file where the variable is declared.

    *   *function*: A variable declared within a function/method has *function scope*.These
    variables are only visible and accessible within the associated function/method.

    *   *function prototype*: A variable declared within the list of parameters in
    a function/method prototype has *function prototype scope*. These variables are
    visible and accessible within the associated function/method.


    Objective-C adds a set of access modifier directives that enable you to provide
    fine-grained access control to instance variables.


    Access Modifiers


    Objective-C defines several compiler directives to control the scope of instance
    variables; that is, the visibility of variables throughout a program.


    *   `@private`: The instance variable is only accessible within the class that
    declares it and other instances of this class type.

    *   `@protected`: The instance variable is accessible within the class that declares
    it and the instance methods of any of its subclasses. This is the default scope
    if a protection level is not specified for an instance variable.

    *   `@public`: The instance variable is accessible from everywhere.

    *   `@package`: The instance variable is accessible from any other class instance
    or function, but outside of the package, it is treated as private. This scope
    can be useful for libraries or framework classes.


    These directives are referred to as *access modifiers*, and are used on instance
    variables declared within an instance variable declaration block. The class instance
    variable declaration of [Listing A-1](#9781430250500_AppA.xhtml#list1) declares
    a `counter` variable of type `int` that is accessible everywhere, a `temperature`
    variable of type `float` that is accessible within the declaring class and any
    subclasses, and a `description` variable of type `NSString*` that is accessible
    only within the declaring class.


    [*Listing A-1.*](#9781430250500_AppA.xhtml#_list1)  Instance Variable Declaration
    with Access Modifiers


    ```

    {

      @public int counter;

      @protected float temperature;

      @private NSString *description;

    }

    ```


