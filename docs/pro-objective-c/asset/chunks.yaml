- fmt: '# Foundation Framework Value Objects


    The Foundation Framework value object classes implement object-oriented wrappers
    for primitive data types, along with general-purpose system information, tools,
    and locale support. The `NSCalendar`, `NSDate`, `NSCalendarDate`, `NSDateComponents`,
    and `NSTimeZone` classes provide support for date and time programming and formatting.
    The `NSValue`, `NSNumber`, `NSDecimalNumber`, and `NSDecimalNumberHandler` classes
    provide object-oriented wrappers for primitive data types, which can then be manipulated
    and/or added to collection objects. The `NSData`, `NSMutableData`, and `NSPurgeableData`
    classes provide object-oriented wrappers for byte buffers. `NSValueTransformer`
    is used to transform values from one representation to another. `NSNull` is a
    singleton object used to represent null values in collection objects that don’t
    allow `nil` values. `NSLocale` provides support for locales, a collection of information
    used to adapt software for a specific region or language. `NSCache` provides an
    in-memory system cache for the temporary storage of objects that are expensive
    to re-create.


    ## NSValue


    The `NSValue` class is a container for a single data item. It can hold both C
    and Objective-C data types (including primitives) of constant length and is typically
    used to allow an item to be stored in a collection object (`NSArray`, `NSSet`,
    etc.), because these require their elements to be objects. The code fragment in
    [Listing 10-3](#9781430250500_Ch10.xhtml#list3) creates an `NSValue` instance
    from a value of type `int`.


    [*Listing 10-3.*](#9781430250500_Ch10.xhtml#_list3)Creating an `NSValue` Instance


    ```

    int ten = 10;

    int *tenPtr = &ten;

    NSValue *myInt = [NSValue value:&tenPtr withObjCType:@encode(int *)];

    ```


    Note that the type is specified using an `@encode` directive. This value can now
    be stored in a collection object. The following statement retrieves the `int`
    value of the `NSValue` object and assigns this value to the variable `result`.


    ```

    int result = *(int *)[myInt pointerValue];

    ```


    ## NSNumber


    The `NSNumber` class is a subclass of `NSValue` that functions as a container
    for primitive (scalar) types. It defines a set of methods for creating and accessing
    number objects as primitive types: `signed/unsigned char`, `int`, `short int`,
    `long int`, `long long int`, `NSInteger`, `float`, `double`, or `BOOL` types.
    `NSNumber` includes numerous class factory methods (whose names all begin with
    `numberWith...`) for creating and initializing an `NSNumber` with an input parameter
    of the specified primitive type. The following statement uses the `numberWithDouble:`
    method to create an `NSNumber` instance of type double and assign it to a variable
    named `degrees2Radians`.


    ```

    NSNumber *degrees2Radians = [NSNumber numberWithDouble:(3.1415/180.0)];

    ```


    `NSNumber` also includes initialization methods (whose names all begin with `initWith...`)
    to initialize an allocated `NSNumber` object with the input parameter value. The
    corresponding `NSNumber` `...Value` methods (one for each of the supported types)
    can be used to retrieve a primitive value from an `NSNumber` object, for example:


    ```

    double d2r = [degrees2Radians doubleValue];

    ```


    `NSNumber` also includes a `stringValue` method to get the string representation
    of an `NSNumber` instance.


    ## NSDecimalNumber


    `NSDecimalNumber` is a subclass of `NSNumber` that is used to perform decimal
    arithmetic. It includes methods for creating and initializing decimal numbers,
    and methods for performing standard arithmetic operations (addition, subtraction,
    multiplication, division, etc.). It is especially useful for performing these
    operations on numbers where rounding errors can be significant (for example, with
    currency). [Listing 10-4](#9781430250500_Ch10.xhtml#list4) adds two `NSDecimalNumber`
    objects and assigns the result to an `NSDecimalNumber` object named `sum`.


    [*Listing 10-4.*](#9781430250500_Ch10.xhtml#_list4)Adding Two Numbers Using `NSDecimalNumber`


    ```

    NSDecimalNumber *num1 = [NSDecimalNumber decimalNumberWithString:@"2.56"];

    NSDecimalNumber *num2 = [NSDecimalNumber decimalNumberWithString:@"7.78"];

    NSDecimalNumber *sum = [num1 decimalNumberByAdding:num2];

    ```


    The `NSDecimalNumber` methods that perform arithmetic operations include parameters
    that can be used to specify how calculation errors and rounding are handled.


    ## NSNumber Literals


    Objective-C provides language-level support for creating `NSNumber` literals.
    Any character, numeric, or Boolean literal that is prefixed with an `@` character
    evaluates to an `NSNumber` object initialized to that value. The following statements
    are equivalent:


    ```

    NSNumber *num = [NSNumber numberWithInt:17];

    NSNumber *num = @17;

    ```


    `NSNumber` literals are created from scalar values, not expressions. In addition,
    `NSNumber` literals are evaluated at runtime; they are not compile-time constants
    and thus cannot be used to initialize static variables. In essence, the literal
    `@17` is actually shorthand for the expression `[NSNumber numberWithInt:17]`,
    an object message that is evaluated at runtime. More information on `NSNumber`
    literals is provided in [Chapter 16](#9781430250500_Ch16.xhtml), which explores
    Objective-C literals in depth.


    ## Date and Time Support


    The `NSCalendar`, `NSDate`, `NSCalendarDate`, `NSDateComponents`, and `NSTimeZone`
    classes provide support for date and time programming and formatting. An `NSDate`
    instance represents an absolute timestamp. The following statement creates a date
    that represents the current time.


    ```

    NSDate *now = [[NSDate alloc] init];

    ```


    The following statements compare two dates and return an `NSComparisonResult`
    that indicates whether the input date is later, the same, or earlier than the
    receiver’s dates.


    ```

    NSTimeInterval secondsPerDay = 24 * 60 * 60;

    NSDate *tomorrow = [now dateByAddingTimeInterval:secondsPerDay];

    NSComparisonResult *result = [now compare:tomorrow];

    ```


    The `NSCalendar` class encapsulates calendar information used to organize periods
    of time. It provides an implementation for several different calendars, including
    the Buddhist, Gregorian, Hebrew, Islamic, and Japanese calendars. The following
    statement returns a calendar for the current user’s chosen locale.


    ```

    NSCalendar *currentCalendar = [NSCalendar currentCalendar];

    ```


    The following statement creates a Gregorian calendar.


    ```

    NSCalendar *gregorianCalendar = [[NSCalendar alloc]

                                    initWithCalendarIdentifier:NSGregorianCalendar];

    ```


    `NSCalendar` provides methods for retrieving the component elements of a date
    in a calendar, represented as `NSDateComponents` objects.


    The `NSDateComponents` class represents the component elements of a date/time.
    It is used to set/get these elements, and also specify a time interval. The following
    statements retrieve date components from a current calendar object with monthly
    calendar units.


    ```

    NSDate *date = [NSDate date];

    NSDateComponents *components = [currentCalendar components:NSMonthCalendarUnit

                                                        fromDate:date];

    ```


