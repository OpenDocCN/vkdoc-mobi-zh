    Diagnostics


    The preprocessor includes several directives that provide diagnostics for problems
    that occur during program compilation. The `#error` directive causes the preprocessor
    to generate an error message and fail compilation. The syntax for this directive
    is


    ```

    #error "ErrorMessage"

    ```


    The error message is surrounded in double-quotes. This directive is commonly used
    if a conditional compilation check fails; for example, the following code fragment


    ```

    #ifndef    INPUT_ARGS

    #error "No input arguments provided"

    #endif

    ```


    causes compilation to fail and generates an error message (“No input arguments
    provided”) if the macro `INPUT_ARGS` is not defined.


    The `#warning` directive causes the preprocessor to generate a compile-time warning
    message, but allows compilation to continue. The syntax for this directive is


    ```

    #warning "WarningMessage"

    ```


    The warning message is surrounded in double-quotes. The following code fragment


    ```

    #ifndef    OUTPUT_FILE

    #warning "Output filename not provided"

    #endif

    ```


    generates a warning message (“Output filename not provided”) if the macro `OUTPUT_ARGS`
    is not defined; compilation will continue.


    The `#line` directive is used to supply a line number for compiler messages. If
    an error happens during the compiling process, the compiler shows an error message
    with references to the name of the file where the error happened and a corresponding
    line number, thereby making it easier to find the code that generated the error.
    The syntax for the `#line` directive is


    ```

    #line LineNumber "FileName"

    ```


    `LineNumber` is the new line number that will be assigned to the next code line.
    The line numbers of successive lines will be increased one by one from this point
    on. The “`FileName`” (surrounded in double-quotes) is an optional parameter that
    enables you to redefine the file name that will be displayed. Xcode and the Objective-C
    compiler use of the `#line` directive are illustrated in the following code fragment:


    ```

    ...

    #line 10 "Elements.m"

    int ?numProtons;

    ```


    This code will generate an error that will be shown as error in file `"Elements.m"`
    at line 11.


    The Xcode IDE displays the line numbers of source files and automatically displays
    errors and warnings while you enter code and at compilation; hence, you rarely
    have need to use this directive in your source files.


    Pragma


    The *pragma* directive (`#pragma`) is used to specify additional options to the
    compiler, beyond that conveyed by the Objective-C language itself. These options
    are specific for the platform and the compiler being used. The syntax for the
    `#pragma` directive is


    ```

    #pragma PragmaOptions(s)

    ```


    The pragma options are a series of characters that correspond to a specific compiler
    instruction (and arguments, if any), and cause an implementation-defined action.
    If the compiler does not support a specific argument for a `#pragma` directive,
    it is ignored and no error is generated.


    The Apple Objective-C compiler supports numerous pragma options; the exact options
    available can be found in the reference documentation for the compiler.


    Xcode includes support for several `#pragma mark` directives. You would use these
    directives in implementation source files to categorize methods when viewing them
    within the IDE. Let’s look at an example to see how this works. The Xcode workspace
    window contains a *jump bar* at the top of the editor area; it is used to hierarchically
    view items in the workspace. If you click an item in the jump bar, it displays
    items at the same level within the hierarchy (as shown in [Figure 5-3](#9781430250500_Ch05.xhtml#Fig3)).


    ![9781430250500_Fig05-03.jpg](images/9781430250500_Fig05-03.jpg)


    [Figure 5-3](#9781430250500_Ch05.xhtml#_Fig3). Using the Xcode jump bar to display
    methods


    [Figure 5-3](#9781430250500_Ch05.xhtml#Fig3) shows that clicking a class implementation
    in the Xcode jump bar brings up a pop-up window that displays a list of the `Hydrogen`
    class implementation’s methods. Now this is where pragma mark directives enter
    the picture—they can be used to organize how these methods are displayed in the
    jump bar pop-up. You can create a divider visible in the jump bar pop-up using
    the directive


    ```

    #pragma mark -

    ```


    You create a label used to categorize one or more methods using the directive


    ```

    #pragma mark MarkName

    ```


    `MarkName` is the label for the methods that will be displayed in the pop-up.


    The following example includes pragma mark directives for the `Hydrogen` class
    implementation created in [Chapters 2](#9781430250500_Ch02.xhtml) and [3](#9781430250500_Ch03.xhtml).
    These updates (shown in **bold** in [Listing 5-8](#9781430250500_Ch05.xhtml#list8))
    categorize the class custom initialization methods.


    [*Listing 5-8.*](#9781430250500_Ch05.xhtml#_list8)  Example #pragma mark Directive
    Usage


    ```

    #pragma mark -

    #pragma mark Custom Initializers


    - (id) initWithNeutrons:(NSUInteger)neutrons

    {

      if ((self = [super init]))

      {

        // Initialization code here.

        _chemicalElement = @"Hydrogen";

        _atomicSymbol = @"H";

        _protons = 1;

        _neutrons = neutrons;


    // Create helper for message forwarding

        helper = [[HydrogenHelper alloc] init];

      }


    return self;

    }


    #pragma mark -

    ```


    If you now click the `Hydrogen` implementation in the Xcode jump bar (as shown
    in [Figure 5-4](#9781430250500_Ch05.xhtml#Fig4)), the pop-up display lists the
    method `initWithNeutrons:`, prefaced with a label of `Custom Initializers`, and
    surrounded by dividers.


    ![9781430250500_Fig05-04.jpg](images/9781430250500_Fig05-04.jpg)


    [Figure 5-4](#9781430250500_Ch05.xhtml#_Fig4). Using the #pragma mark directives


    Particularly for large projects and classes that contain a large number of methods,
    `#pragma mark` directives provide a mechanism that facilitates the categorization
    and organization of class methods and make the jump bar more efficient to use.


    Macros


    A preprocessor *macro* is a named code fragment. Wherever the name is used in
    the source code, the code fragment is substituted for it. Preprocessor macros
    can be used to define constant values or to provide function-like substitutions
    complete with input parameter values. Macros are defined with the `#define` preprocessor
    directive, and removed with the `#undef` directive. The syntax for an object-like
    macro that defines a constant value is


    ```

    #define MacroName [MacroValue]

    ```


    The optional macro value is placed after the name; the macro value may be an arithmetic
    expression composed of constant values. The syntax for a function-like macro is


    ```

    #define MacroName(MacroArguments) Code

    ```


    The macro name includes one or more arguments (separated by commas) surrounded
    by parentheses, and the code fragment substituted for it. An example function-like
    macro that adds two values is


    ```

    #define SQUARE(x)  ((x) * (x))

    ```


    All arguments to a macro are completely macro-expanded before they are substituted
    into the macro body. After substitution, the complete text is scanned again for
    macros to expand, including the arguments. The preprocessor does not understand
    Objective-C; it simply replaces occurrences of the macro name with the corresponding
    macro value or code. Also note that macros are not affected by Objective-C scope
    rules. Once defined, a macro exists and can be used in a file until it is undefined
    with the `#undef` directive.


    Now you may be wondering: why did I use all of those parentheses for defining
