    folder and the project target as the Elements project, and then click the **Create**
    button (see [Figure 2-3](#9781430250500_Ch02.xhtml#Fig3)).


    ![9781430250500_Fig02-03.jpg](images/9781430250500_Fig02-03.jpg)


    [Figure 2-3](#9781430250500_Ch02.xhtml#_Fig3). Class files folder and project
    target


    You have created a class using Xcode! In the Xcode project navigator pane, you
    will see that the `Atom` class is split into two files (`Atom.h` and `Atom.m`)
    that have been added to the project under the Elements folder. Next, you’ll develop
    the `Atom` class in these files.


    Coding the Atom Class Interface


    The interface for the `Atom` class is specified in the `Atom.h` header file, and
    the implementation in the `Atom.m` file. The names of these files reflect the
    Objective-C convention whereby header files are suffixed with `.h` and implementation
    files are suffixed with `.m`. Let’s examine the `Atom.h` interface file created
    by Xcode. In the project navigator pane, select **Atom.h** and view the Atom interface
    in the editor pane (see [Listing 2-1](#9781430250500_Ch02.xhtml#list1)).


    [*Listing 2-1.*](#9781430250500_Ch02.xhtml#_list1)  Atom Class Base Interface


    ```

    #import <Foundation/Foundation.h>


    @interface Atom : NSObject

    @end

    ```


    The `#import <Foundation/Foundation.h>` line is an Objective-C *preprocessor*
    directive to include the header file for the Foundation Framework in this (the
    `Atom`) header file. The preprocessor is used to transform Objective-C code prior
    to compilation (you’ll learn more about the preprocessor in [Chapter 5](#9781430250500_Ch05.xhtml)
    of this book). The Foundation Framework provides a base layer of APIs that can
    be used for any type of Objective-C program (Part 3 of this book explores the
    Foundation Framework APIs in depth). The remainder of the header file declares
    the interface for the `Atom` class.


    A class interface declaration begins with the `@interface` directive and the name
    of the class; it ends with the `@end` directive. The formal syntax for declaring
    a class interface is shown in [Listing 2-2](#9781430250500_Ch02.xhtml#list2).


    [*Listing 2-2.*](#9781430250500_Ch02.xhtml#_list2)  Class Interface Syntax


    ```

    @interface ClassName : SuperclassName

    // Property and method declarations

    @end

    ```


    So, you can see from [Listing 2-1](#9781430250500_Ch02.xhtml#list1) that the `Atom`
    class has a superclass named `NSObject`. A superclass establishes a common interface
    and implementation, which specialized subclasses can inherit, modify, and supplement.
    Hence, the `Atom` class *inherits* the functionality of the `NSObject` class.
    `NSObject` is the root (i.e., base) class of most Foundation Framework class hierarchies
    and it provides a basic interface to the Objective-C runtime. Thus, the vast majority
    of the classes you implement here will descend from the `NSObject` class hierarchy.
    Now let’s declare the custom properties and methods for the `Atom` class (i.e.,
    those that aren’t inherited from `NSObject`). In the editor pane, update the `Atom.h`
    file as shown in [Listing 2-3](#9781430250500_Ch02.xhtml#list3) (the code updates
    are shown in **bold**).


    [*Listing 2-3.*](#9781430250500_Ch02.xhtml#_list3)  Atom Interface


    ```

    @interface Atom : NSObject

    @property (readonly) NSUInteger protons;

    @property (readonly) NSUInteger neutrons;

    @property (readonly) NSUInteger electrons;

    @property (readonly) NSString *chemicalElement;


    - (NSUInteger) massNumber;

    @end

    ```


    This code adds several properties and an *instance* method to the class declaration.
    The property `chemicalElement` is of type `NSString *` (i.e., a pointer to a text
    string) and has a `readonly` attribute, meaning that you can retrieve its value
    but cannot set it. The properties `protons` *,* `neutrons`, and `electrons` are
    each of type `NSUInteger` (i.e., non-negative integer values) and are read-only.
    The instance method, named `massNumber`, returns a non-negative integer value.
    You’ll learn the specifics on declaring class properties and methods later in
    this chapter. In the meantime, let’s complete this example by coding the class
    implementation.


    Coding the Atom Class Implementation


    The implementation for the `Atom` class is provided in the `Atom.m` file. In the
    project navigator pane, select the **Atom.m** file and view the base Atom implementation
    in the editor pane, as shown in [Listing 2-4](#9781430250500_Ch02.xhtml#list4).


    [*Listing 2-4.*](#9781430250500_Ch02.xhtml#_list4)  Atom Class Base Implementation


    ```

    #import "Atom.h"


    @implementation Atom

    @end

    ```


    The `import` directive includes the contents of the `Atom.h` header file (i.e.,
    its preprocessor directives, interface declarations, and other included header
    files).  Now let’s define the custom properties and methods for the `Atom` class
    that were declared in the Atom interface. In the editor pane, update the `Atom.m`
    file as shown in [Listing 2-5](#9781430250500_Ch02.xhtml#list5) (the code updates
    are displayed in **bold**).


    [*Listing 2-5.*](#9781430250500_Ch02.xhtml#_list5)  Atom Class Implementation


    ```

    @implementation Atom


    - (id) init

    {

      if ((self = [super init]))

      {

        _chemicalElement = @"None";

      }


    return self;

    }


    - (NSUInteger) massNumber

    {

      return 0;

    }


    @end

    ```


    All methods declared in a class interface must be defined in its class implementation.
    Hence, the Atom implementation in [Listing 2-5](#9781430250500_Ch02.xhtml#list5)
    defines two methods: `init()` and `atomicMass()`. The `massNumber()` method is
    declared in the Atom interface, so the actual program logic for the method is
    defined here; it just returns the value 0 for the atomic mass number. The `init()`
    method is also defined here, but why? After all, this method isn’t declared in
    the Atom interface. Well, the `init()` method is declared in `NSObject`, which
    is a subclass (i.e., parent) of the `Atom` class. The `NSObject init()` method
    is used to initialize a new object immediately after memory has been allocated
    for it; hence if you have any custom initialization functionality to perform (set
    instance variables to known values, etc.), it should be performed here. In this
    implementation, the `init()` method initializes the instance variable backed by
    the `chemicalElement` property to the text string `None`.


    Once you finish making the updates to the `Atom` class implementation, you should
    test your class. First, go back to the `main()` method and edit it as shown in
    [Listing 2-6](#9781430250500_Ch02.xhtml#list6).


    [*Listing 2-6.*](#9781430250500_Ch02.xhtml#_list6)  Atom Project main() Method


    ```

    #import <Foundation/Foundation.h>

    #import "Atom.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        Atom *atom = [[Atom alloc] init];

        NSLog(@"Atom chemical element name: %@", atom.chemicalElement);

      }


    return 0;

    }

    ```'
  trans: "\n此时会显示一个窗口，用于为你的类选择选项，具体来说就是其名称及其子类的名称。如图 2-2 所示，在类名处输入 `Atom`，从子类下拉列表中选择\
    \ `NSObject`（或在列表中键入子类名称），然后单击 `Next`。\n\n![9781430250500_Fig02-02.jpg](img/9781430250500_Fig02-02.jpg)\n\
    \n图 2-2. 指定 Atom 类选项\n\n接下来，系统会提示你指定该类的项目目标以及在文件系统中保存类文件的位置。将位置保留为 Elements 文件夹，项目目标保留为\
    \ Elements 项目，然后单击 `Create` 按钮（参见 图 2-3）。\n\n![9781430250500_Fig02-03.jpg](img/9781430250500_Fig02-03.jpg)\n\
    \n图 2-3. 类文件文件夹和项目目标\n\n你已经使用 Xcode 创建了一个类！在 Xcode 的项目导航器窗格中，你会看到 `Atom` 类被分成了两个文件（`Atom.h`\
    \ 和 `Atom.m`），它们已被添加到 Elements 文件夹下的项目中。接下来，你将在此文件中开发 `Atom` 类。\n\n## 编写 Atom\
    \ 类接口\n\n`Atom` 类的接口在 `Atom.h` 头文件中指定，实现则在 `Atom.m` 文件中。这些文件的名称反映了 Objective-C\
    \ 的约定，即头文件以 `.h` 为后缀，实现文件以 `.m` 为后缀。我们来看一下 Xcode 创建的 `Atom.h` 接口文件。在项目导航器窗格中，选择\
    \ `Atom.h`，然后在编辑器窗格中查看 Atom 接口（参见 代码清单 2-1）。\n\n*代码清单 2-1.* Atom 类基接口\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Atom : NSObject\n@end\n```\n\n\
    `#import <Foundation/Foundation.h>` 这一行是一个 Objective-C *预处理器*指令，用于在此（`Atom`）头文件中包含\
    \ Foundation 框架的头文件。预处理器用于在编译前转换 Objective-C 代码（你将在本书的第 5 章中了解有关预处理器的更多信息）。Foundation\
    \ 框架提供了一套基础层 API，可用于任何类型的 Objective-C 程序（本书第 3 部分将深入探讨 Foundation 框架 API）。头文件的其余部分则声明了\
    \ `Atom` 类的接口。\n\n类接口声明以 `@interface` 指令和类名开头，以 `@end` 指令结束。声明类接口的正式语法如代码清单 2-2\
    \ 所示。\n\n*代码清单 2-2.* 类接口语法\n\n```\n@interface ClassName : SuperclassName\n// 属性和方法声明\n\
    @end\n```\n\n因此，从代码清单 2-1 可以看出，`Atom` 类有一个名为 `NSObject` 的超类。超类建立了一个公共接口和实现，专门的子类可以继承、修改和补充它。因此，`Atom`\
    \ 类*继承*了 `NSObject` 类的功能。`NSObject` 是大多数 Foundation 框架类层次结构的根（即基）类，并为 Objective-C\
    \ 运行时提供了基本接口。因此，你在此实现的大多数类都将继承自 `NSObject` 类层次结构。现在，让我们为 `Atom` 类声明自定义属性和方法（即那些不是从\
    \ `NSObject` 继承的）。在编辑器窗格中，按代码清单 2-3 所示更新 `Atom.h` 文件（代码更新部分以粗体显示）。\n\n*代码清单 2-3.*\
    \ Atom 接口\n\n```\n@interface Atom : NSObject\n@property (readonly) NSUInteger\
    \ protons;\n@property (readonly) NSUInteger neutrons;\n@property (readonly) NSUInteger\
    \ electrons;\n@property (readonly) NSString *chemicalElement;\n\n- (NSUInteger)\
    \ massNumber;\n@end\n```\n\n这段代码向类声明中添加了几个属性和一个*实例*方法。属性 `chemicalElement` 的类型是\
    \ `NSString *`（即指向文本字符串的指针），并具有 `readonly` 属性，这意味着你可以获取其值，但无法设置。属性 `protons`、`neutrons`\
    \ 和 `electrons` 的类型都是 `NSUInteger`（即非负整数值），并且是只读的。名为 `massNumber` 的实例方法返回一个非负整数值。你将在本章后面了解声明类属性和方法的具体细节。在此期间，让我们通过编写类实现来完成这个示例。\n\
    \n## 编写 Atom 类实现\n\n`Atom` 类的实现在 `Atom.m` 文件中提供。在项目导航器窗格中，选择 `Atom.m` 文件，然后在编辑器窗格中查看基本的\
    \ Atom 实现，如代码清单 2-4 所示。\n\n*代码清单 2-4.* Atom 类基实现\n\n```\n#import \"Atom.h\"\n\n\
    @implementation Atom\n@end\n```\n\n`import` 指令包含了 `Atom.h` 头文件的内容（即其预处理器指令、接口声明以及其他包含的头文件）。现在，让我们定义在\
    \ Atom 接口中声明的 `Atom` 类的自定义属性和方法。在编辑器窗格中，按代码清单 2-5 所示更新 `Atom.m` 文件（代码更新部分以粗体显示）。\n\
    \n*代码清单 2-5.* Atom 类实现\n\n```\n@implementation Atom\n\n- (id) init\n{\n  if ((self\
    \ = [super init]))\n  {\n    _chemicalElement = @\"None\";\n  }\n\nreturn self;\n\
    }\n\n- (NSUInteger) massNumber\n{\n  return 0;\n}\n\n@end\n```\n\n在类接口中声明的所有方法都必须在类实现中定义。因此，代码清单\
    \ 2-5 中的 Atom 实现定义了两个方法：`init()` 和 `atomicMass()`。`massNumber()` 方法是在 Atom 接口中声明的，因此该方法的具体程序逻辑在这里定义；它仅为原子质量数返回值\
    \ 0。这里也定义了 `init()` 方法，但这是为什么呢？毕竟，这个方法并未在 Atom 接口中声明。实际上，`init()` 方法是在 `NSObject`\
    \ 中声明的，而 `NSObject` 是 `Atom` 类的子类（即父类）。`NSObject init()` 方法用于在为新对象分配内存后立即对其进行初始化；因此，如果你需要执行任何自定义的初始化功能（将实例变量设置为已知值等），则应在此处进行。在此实现中，`init()`\
    \ 方法将由 `chemicalElement` 属性支持的实例变量初始化为文本字符串 `None`。\n\n完成对 `Atom` 类实现的更新后，你应该测试你的类。首先，回到\
    \ `main()` 方法，并按代码清单 2-6 所示进行编辑。\n\n*代码清单 2-6.* Atom 项目 main() 方法\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"Atom.h\"\n\nint main(int argc, const char\
    \ * argv[])\n{\n  @autoreleasepool\n  {\n    Atom *atom = [[Atom alloc] init];\n\
    \    NSLog(@\"Atom chemical element name: %@\", atom.chemicalElement);\n  }\n\n\
    return 0;\n}\n```\n"
- fmt: "在`main()`方法中，创建一个`Atom`对象，然后使用Foundation框架的`NSLog`函数将该对象的化学元素名称显示到输出窗格。通过从Xcode的File菜单中选择**Save**来保存项目的所有文件，然后点击工具栏中的**Run**按钮编译并运行程序。（你也可以直接编译和运行程序，它会自动保存对文件的任何更改。）输出窗格（参见[图2-4](#9781430250500_Ch02.xhtml#Fig4)）会显示消息“Atom\
    \ chemical element name: None”。\n\n![9781430250500_Fig02-04.jpg](images/9781430250500_Fig02-04.jpg)\n\
    \n[图2-4](#9781430250500_Ch02.xhtml#_Fig4) 测试`Atom`类\n\n很好。你已经成功实现并测试了你的第一个Objective-C类。通过这个入门介绍，你现在可以“深入内部”来深入学习类的知识了——那么，让我们开始吧！\n\
    \n## 实例变量\n\n实例变量（有时称为*ivars*）是为类声明的变量，它们在对应的类实例（即对象）的整个生命周期中存在并保持其值。实例变量使用的内存在对象首次创建时分配，并在对象被释放时释放。实例变量具有与对象对应的隐式作用域和命名空间。Objective-C提供了控制对实例变量直接访问的特性，以及获取/设置其值的便捷机制。\n\
    \n### 实例变量访问\n\n对对象实例变量的访问由其作用域决定。在对象内部，其实例变量可以从任何实例方法中直接访问。从外部类实例对对象实例变量的直接访问由变量的作用域决定。Objective-C提供了几个编译器指令，用于显式指定实例变量的作用域（即控制访问权限）：\n\
    \n*   `@private`：实例变量仅能在声明它的类及该类的其他实例内部访问。\n*   `@protected`：实例变量能在声明它的类及其任何子类的实例方法内部访问。如果未为实例变量指定保护级别，这是默认作用域。\n\
    *   `@public`：实例变量可以在任何地方访问。\n*   `@package`：实例变量可以从任何其他类实例或函数访问，但在包外部，它被视为`private`。此作用域对库或框架类很有用。\n\
    \n### 声明实例变量\n\n实例变量可以在类接口或实现中声明；然而，在类的公共接口中声明它们会违反OOP（面向对象编程）的关键原则之一——封装。因此，推荐的做法是在类实现中声明实例变量；具体来说，是在紧跟在类`@implementation`指令之后的语句块内。声明语法如[列表\
    \ 2-7](#9781430250500_Ch02.xhtml#list7)所示。\n\n[*列表 2-7.*](#9781430250500_Ch02.xhtml#_list7)\
    \ 实例变量声明语法\n\n```\n@implementation ClassName\n{\n  // Instance variable declarations\n\
    }\n...\n@end\n```\n\n如果使用了访问控制编译器指令，则在语句块中声明每个实例变量的语法会更新，如[列表 2-8](#9781430250500_Ch02.xhtml#list8)所示。\n\
    \n[*列表 2-8.*](#9781430250500_Ch02.xhtml#_list8) 带有访问控制指令的实例变量声明\n\n```\n{\n  protection_directive\
    \ ivar_declaration_list\n  protection_directive ivar_declaration_list\n  ...\n\
    }\n```\n\n一个使用访问控制编译器指令声明实例变量的示例类，如[列表 2-9](#9781430250500_Ch02.xhtml#list9)所示。\n\
    \n[*列表 2-9.*](#9781430250500_Ch02.xhtml#_list9) 带有实例变量声明的示例类\n\n```\n@implementation\
    \ MyTestClass\n{\n  @protected\n    int myInt1;\n    int myInt2;\n  @private\n\
    \    float myFloat;\n  @package\n    double myDouble;\n}\n...\n@end\n```\n\n这个类声明了两个受保护的变量`myInt1`和`myInt2`；一个私有变量`myFloat`；以及一个包保护变量`myDouble`。\n\
    \n### 访问实例变量\n\n实例变量直接绑定到对应的对象并存在于其上下文中。因此，对象的实例方法可以直接访问其实例变量。例如，如果[列表 2-9](#9781430250500_Ch02.xhtml#list9)中所示的`MyTestClass`类定义了一个实例方法`myTestMethod`，该方法可以直接访问实例变量`myInt1`（参见[列表\
    \ 2-10](#9781430250500_Ch02.xhtml#list10)）。\n\n[*列表 2-10.*](#9781430250500_Ch02.xhtml#_list10)\
    \ 实例变量访问声明\n\n```\n-(void) myTestMethod\n{\n  myInt1 = 1;\n  ...\n}\n```\n\n尽管实例变量提供了对对象状态的便捷、直接访问，但它们暴露了类的内部细节——这违反了OOP的封装原则。因此，只有在必要时才应声明实例变量，并且声明应放在类实现中，而不是公共接口中。公开暴露对象内部状态的首选方法是通过*声明属性*。下面我们来看看这些。\n\
    \n## 属性\n\n在许多编程语言中，访问对象内部状态的方法（通常称为*getter/setter*方法）必须手动编码。Objective-C提供了声明属性来自动化和简化此任务。属性与实例变量的不同之处在于，它不直接访问对象的内部状态，而是提供一种便捷的机制（即getter/setter方法）来访问这些数据，因此可能包含其他逻辑。Objective-C的*声明属性*使编译器能够根据你提供的规范自动生成这些方法。这减少了你需要编写和维护的代码量，并提高了程序的一致性和可靠性。\n\
    \n### 属性声明\n\n属性使用`@property`关键字声明，后跟一组可选的属性（用括号括起来）、属性类型及其名称。\n\n```\n@property\
    \ (attributes) type propertyName;\n```\n\n例如，你之前开发的`Atom`类（参见[列表 2-3](#9781430250500_Ch02.xhtml#list3)）声明了属性`chemicalElement`、`protons`、`neutrons`和`electrons`。属性可以在*类接口*、*类别接口*或*协议*中声明。该声明设置了与属性关联的getter/setter方法的签名，但不会生成实际的方法定义。\n\
    \n### 属性特性\n\n属性声明特性用于指定与属性相关的存储语义和其他行为。最常用的属性特性在[表 2-1](#9781430250500_Ch02.xhtml#Tab1)中进行了描述。\n\
    \n[表 2-1](#9781430250500_Ch02.xhtml#_Tab1) 属性特性"
  raw: 'In the `main()` method, create an `Atom` object and then use the Foundation
    Framework `NSLog` function to display the object’s chemical element name to the
    output pane. Save all the files of the project by selecting **Save** from the
    Xcode File menu, and then compile and run the program by clicking the **Run**
    button in the toolbar. (You can also simply compile and run the program, and it
    will automatically save any changes to its files). The output pane (see [Figure
    2-4](#9781430250500_Ch02.xhtml#Fig4)) displays the message “Atom chemical element
    name: None”.


    ![9781430250500_Fig02-04.jpg](images/9781430250500_Fig02-04.jpg)


    [Figure 2-4](#9781430250500_Ch02.xhtml#_Fig4). Testing the Atom class


    Great. You have just implemented and tested your first Objective-C class. With
    this introduction, you are now ready to “look under the hood” to learn about classes
    in depth—so let’s begin!


    Instance Variables


    Instance variables, sometimes referred to as *ivars*, are variables declared for
    a class that exist and hold their value throughout the life of a corresponding
    class instance (i.e., object). The memory used for instance variables is allocated
    when an object is first created, and freed when the object is deallocated. Instance
    variables have an implicit scope and namespace corresponding to the object. Objective-C
    provides features to control direct access to instance variables, as well as a
    convenient mechanism for getting/setting their values.


    Instance Variable Access


    Access to an object’s instance variables is a function of its scope. Within an
    object, its instance variables can be accessed directly from any of its instance
    methods. Direct access to an object’s instance variables from an external class
    instance is a function of the variable’s scope. Objective-C provides several compiler
    directives used to explicitly specify the scope of (i.e., control access to) instance
    variables:


    *   `@private`: The instance variable is only accessible within the class that
    declares it and other instances of this class type.

    *   `@protected`: The instance variable is accessible within the class that declares
    it and the instance methods of any of its subclasses. This is the default scope
    if a protection level is not specified for an instance variable.

    *   `@public`: The instance variable is accessible from everywhere.

    *   `@package`: The instance variable is accessible from any other class instance
    or function, but outside the package, it is treated as private. This scope can
    be useful for libraries or framework classes.


    Declaring Instance Variables


    Instance variables can be declared in a class interface or implementation; however,
    declaring them in the public interface of a class would violate one of the key
    tenets of OOP—encapsulation. Therefore, the recommended practice is to declare
    instance variables in the class implementation; specifically, within a statement
    block placed immediately after the class `@implementation` directive. The declaration
    syntax is shown in [Listing 2-7](#9781430250500_Ch02.xhtml#list7).


    [*Listing 2-7.*](#9781430250500_Ch02.xhtml#_list7)  Instance Variable Declaration
    Syntax


    ```

    @implementation ClassName

    {

      // Instance variable declarations

    }

    ...

    @end

    ```


    If the access control compiler directives are used, the syntax for declaring each
    instance variable within the statement block is updated as shown in [Listing 2-8](#9781430250500_Ch02.xhtml#list8).


    [*Listing 2-8.*](#9781430250500_Ch02.xhtml#_list8)  Instance Variable Declaration
    with Access Control Directives


    ```

    {

      protection_directive ivar_declaration_list

      protection_directive ivar_declaration_list

      ...

    }

    ```


    An example class that declares instance variables with access control compiler
    directives is shown in [Listing 2-9](#9781430250500_Ch02.xhtml#list9).


    [*Listing 2-9.*](#9781430250500_Ch02.xhtml#_list9)  Example Class with Instance
    Variable Declarations


    ```

    @implementation MyTestClass

    {

      @protected

        int myInt1;

        int myInt2;

      @private

        float myFloat;

      @package

        double myDouble;

    }

    ...

    @end

    ```


    This class declares two protected variables named `myInt1` and `myInt2`; a private
    variable named `myFloat`; and a package-protected variable named `myDouble`.


    Accessing Instance Variables


    Instance variables are directly bound to and exist within the context of the corresponding
    object. As a consequence, an object’s instance methods can directly access its
    instance variables. For example, if the class `MyTestClass` shown in [Listing
    2-9](#9781430250500_Ch02.xhtml#list9) defines an instance method `myTestMethod`,
    the method can directly access the instance variable `myInt1` (see [Listing 2-10](#9781430250500_Ch02.xhtml#list10)).


    [*Listing 2-10.*](#9781430250500_Ch02.xhtml#_list10)  Instance Variable Access
    Declarations


    ```

    -(void) myTestMethod

    {

      myInt1 = 1;

      ...

    }

    ```


    Although instance variables provide convenient, direct access to an object’s state,
    they expose the internals of a class—and this violates the OOP principle of encapsulation.
    Therefore, instance variables should only be declared when necessary, and the
    declaration should be in the class implementation, not the public interface. The
    preferred approach for publicly exposing the internal state of an object is through
    *declared properties.* Let’s look at those next.


    Properties


    In many programming languages, methods that access an object’s internal state—often
    referred to as *getter/setter* methods—must be manually coded. Objective-C provides
    declared properties to both automate and simplify this task. A property differs
    from an instance variable in that it doesn’t directly access an object’s internal
    state, but rather provides a convenient mechanism (i.e., getter/setter methods)
    for accessing this data, and thus may include other logic. Objective-C *declared
    properties* enable the compiler to generate these methods automatically according
    to your provided specification. This reduces the amount of code you have to write
    and maintain, and increases program consistency and reliability.


    Property Declaration


    A property is declared using the `@property` keyword followed by an optional set
    of attributes (enclosed within parentheses), the property type, and its name.


    ```

    @property (attributes) type propertyName;

    ```


    For example, the `Atom` class you developed earlier (see [Listing 2-3](#9781430250500_Ch02.xhtml#list3))
    declares the properties `chemicalElement` *,* `protons` *,* `neutrons`, and `electrons`.
    Properties can be declared in a *class interface*, a *category interface*, or
    a *protocol*. The declaration sets the signature for the getter/setter methods
    associated with a property, but does not generate the actual method definitions.


    Property Attributes


    Property declaration attributes are used to specify the storage semantics and
    other behaviors associated with a property. The most commonly-used property attributes
    are described in [Table 2-1](#9781430250500_Ch02.xhtml#Tab1).


    [Table 2-1](#9781430250500_Ch02.xhtml#_Tab1). Property Attributes'
