    URL Handling


    The URL handling classes are used for interacting with URLs and communicating
    with resources using standard Internet protocols (ftp, http, https, local files).
    The classes provide the following functionality:


    *   URL loading

    *   Cache management

    *   Authentication and credentials management

    *   Cookie management

    *   Protocol support


    These classes also support proxy servers and SOCKET Secure (SOCKS) gateways per
    the user’s system preferences.


    URL Loading


    `NSURL` objects are used to manage URLs and the resources they refer to. The class
    includes methods for creating and initializing `NSURL` objects, querying a URL,
    and accessing the components of a URL (e.g., host, port, etc.). `NSURL` also provides
    methods for working with bookmark data. A *bookmark* is a persistent reference
    to the location of a file. It is a valuable tool for locating files because it
    can be used to re-create a URL to a file, even if the file is moved or renamed.
    The following code fragment demonstrates the use of the NSURL APIs to create an
    `NSURL` object and access its components.


    ```

    NSURL *url = [NSURL URLWithString:@"http://www.apress.com:80"];

    NSLog(@"URL: scheme %@, host %@, port %@", url.scheme, url.host, url.port);

    ```


    The classes `NSURLRequest` and `NSMutableURLRequest` are used to represent a URL
    load request. `NSURLRequest` is independent of the network protocol and URL scheme.
    The class includes methods to create and initialize a URL request, and to retrieve
    request properties. `NSMutableURLRequest` is a subclass of `NSURLRequest` that
    provides methods that enable you to change a URL and its component parts. The
    following statement creates a mutable URL request, and then uses the `setHTTPMethod:`
    method to set the HTTP request method value.


    ```

    NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:

                                [NSURL URLWithString:@"http://www.apress.com:80"]];

    [req setHTTPMethod:@"GET"];

    ```


    `NSURLResponse` and `NSHTTPURLResponse` classes are used to represent the response
    returned by a URL request. An `NSURLConnection` object is created by either an
    object that performs a synchronous load of a URL request (`sendSynchronousRequest:returningResponse:error:`)
    or objects that conform to the `NSURLConnectionDataDelegate` protocol. The `NSHTTPURLResponse`
    class is a subclass of `NSURLResponse` that provides methods for accessing HTTP-specific
    information returned by a URL request.


    The `NSURLConnection` and `NSURLDownload` classes are used to download the contents
    of a resource identified by a URL. `NSURLConnection` supports synchronous and
    asynchronous resource loading, starting and stopping a connection, and managing
    a delegate object used to control various aspects of a URL connection (i.e., cache
    management, authentication and credentials, protocol support, and cookie management).
    For asynchronous loading, a delegate object must be set. This object must conform
    to the `NSURLConnectionDelegate` protocol and thus implement, at a minimum, the
    following methods:


    *   `connection:didReceiveData:` (to retrieve data loaded)

    *   `connection:didFailWithError:` (to handle connection errors

    *   `connection:didFinishLoading:` (to perform processing after a connection has
    finished loading data)


    [Listing 11-13](#9781430250500_Ch11.xhtml#list13) demonstrates use of various
    URL loading APIs to synchronously load the data from a URL.


    [*Listing 11-13.*](#9781430250500_Ch11.xhtml#_list13)  Using NSURLConnection to
    Synchronously Load the Contents of a URL


    ```

    NSURL *url = [NSURL URLWithString:@"http://www.apress.com/index.html"];

    NSURLRequest *request = [NSURLRequest requestWithURL:url];

    NSURLResponse *response;

    NSError *aerror;

    NSData *data = [NSURLConnection sendSynchronousRequest:request

                                         returningResponse:&response

                                                     error:&aerror];

    NSLog(@"Expected content length = %lld; loaded %lu bytes",

          [response expectedContentLength], [data length]);

    ```


    As shown in [Listing 11-13](#9781430250500_Ch11.xhtml#list13), the code creates
    an `NSURL` instance and then a corresponding `NSURLRequest`. It then creates a
    connection and loads the data using the NSURLConnection `sendSynchronousRequest:returningResponse:error:`
    method. The result is returned in an `NSData` object.


    The `NSURLDownload` class is used to asynchronously download the contents of a
    URL to a file. It includes methods to initialize a download (set request and delegate),
    set the destination path, resume a partial download, and cancel loading the request.
    The class also provides support for decoding files stored in the MacBinary, BinHex,
    and gzip formats. The delegate object must conform to the `NSURLDownloadDelegate`
    protocol and thus implement, at a minimum, the following methods:


    *   `download:didFailWithError:` (to handle connection errors)

    *   `downloadDidFinish:` (to perform processing after a connection has finished
    loading data)


    The `NSURLDownload` class is available for use on the OS X platform only (i.e.,
    this class is not available for the iOS platform).


    Cache Management


    The cache management classes (`NSURLCache` and `NSCachedURLResponse`) provide
    a cache memory for responses to URL requests. The `NSURLCache` class provides
    a general-purpose cache for URLs, whereas the `NSCachedURLResponse` encapsulates
    a URL response (`NSURLResponse` object) and the data loaded from the URL (an `NSData`
    object). An `NSURLConnection` delegate object implements the `connection:willCacheResponse:`
    method, providing a `NSCachedURLResponse` object initialized with an `NSURLCache`,
    to manage caching. How this works is best illustrated by an example; so now you’ll
    create a program that uses the URL loading classes to download a resource. Let’s
    begin!


    Downloading a Resource with the URL Loading APIs'
