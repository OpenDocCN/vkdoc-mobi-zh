    接下来，您将创建一个协议和一个符合该协议的类。从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg)
    File …**，选择 **Objective-C** 协议模板，将协议命名为 **Invoker**，选择 **AspectProxy** 文件夹作为文件位置，选择
    **AspectProxy** 项目作为目标，然后点击 **Create** 按钮。一个名为 `Invoker.h` 的头文件已被添加到 Xcode 导航器窗格中。在编辑器窗格中，更新
    `Greeter.h` 文件，如下面的列表 9-10 所示。


    *列表 9-10.*  Invoker 协议


    ```

    #import <Foundation/Foundation.h>


    @protocol Invoker <NSObject>


    // 必需方法（必须实现）

    @required

    - (void) preInvoke:(NSInvocation *)inv withTarget:(id) target;

    // 可选方法

    @optional

    - (void) postInvoke:(NSInvocation *)inv withTarget:(id) target;


    @end

    ```


    该协议声明了两个方法。`preInvoke:withTarget:` 是一个*必需*方法（任何符合此协议的类都必须实现它），它实现了在真实对象上调用方法之前立即执行的横切功能。名为
    `preInvoke:withTarget:` 的方法是一个*可选*方法，它实现了在真实对象上调用方法之后立即执行的横切功能。


    现在，您将实现一个符合此协议的类，以实现所需的横切功能。从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg)
    File …**，选择 **Objective-C** 类模板，将类命名为 **AuditingInvoker**（在 **Subclass of** 下拉列表中选择
    **NSObject**），选择 **AspectProxy** 文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create**
    按钮。在 Xcode 导航器窗格中，选择生成的头文件 **AspectProxy.h** 并更新接口，如下面的列表 9-11 所示。


    *列表 9-11.*  AuditingInvoker 接口


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AuditingInvoker : NSObject <Invoker>


    @end

    ```


    模板 `AuditingInvoker` 接口已更新为采用 `Invoker` 协议。现在选择 **AuditingInvoker.m** 文件并更新实现，如下面的列表
    9-12 所示。


    *列表 9-12.*  AuditingInvoker 实现


    ```

    #import "AuditingInvoker.h"


    @implementation AuditingInvoker


    - (void) preInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log before sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    - (void) postInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log after sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    @end

    ```


    `AuditingInvoker` 的实现定义了 `preInvoke:withTarget:` 和 `postInvoke:withTarget:` 方法，因此它符合
    `Invoker` 协议。这些方法仅将适当的消息记录到 Xcode 输出窗格。好了，既然您已经实现了横切功能，让我们来处理 `NSProxy` 子类。


    ## 编写代理类


    现在，您将创建代理类。它将继承 `NSProxy` 并实现消息转发方法 `forwardInvocation:` 和 `methodSignatureForSelector:`。从
    Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) File …**，选择 **Objective-C**
    类模板，将类命名为 **AspectProxy**（在 **Subclass of** 下拉列表中选择 **NSObject**），选择 **AspectProxy**
    文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create** 按钮。在 Xcode 导航器窗格中，选择生成的头文件
    **AspectProxy.h** 并更新接口，如下面的列表 9-13 所示。


    *列表 9-13.*  AspectProxy 接口


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AspectProxy : NSProxy


    @property (strong) id proxyTarget;

    @property (strong) id<Invoker> invoker;

    @property (readonly) NSMutableArray *selectors;


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker;

    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker;

    - (void)registerSelector:(SEL)selector;


    @end

    ```


    该接口添加了三个属性和三个方法。`proxyTarget` 属性是真实对象，消息通过 `NSProxy` 实例转发给它。`invoker` 属性是一个类的实例（该类符合
    `Invoker` 协议），它实现了所需的横切功能。`selectors` 属性是一个选择器集合，定义了将调用横切功能的消息。其中两个方法是 `AspectProxy`
    类实例的初始化方法，第三个方法 `registerSelector:` 用于向当前列表添加一个选择器。现在选择 **AspectProxy.m** 文件并更新实现，如下面的列表
    9-14 所示。


    *列表 9-14.*  AspectProxy 实现


    ```

    #import "AspectProxy.h"


    @implementation AspectProxy


    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker

    {

      _proxyTarget = object;

      _invoker = invoker;

      _selectors = [selectors mutableCopy];

      return self;

    }


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker

    {

      return [self initWithObject:object selectors:nil andInvoker:invoker];

    }


    - (NSMethodSignature *)methodSignatureForSelector:(SEL)sel

    {

      return [self.proxyTarget methodSignatureForSelector:sel];

    }


    - (void)forwardInvocation:(NSInvocation *)inv

    {

      // 在目标上调用方法之前执行功能

      if ([self.invoker respondsToSelector:@selector(preInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

        }

      }


    // 在目标上调用方法

      [inv invokeWithTarget:self.proxyTarget];


    // 在目标上调用方法之后执行功能

      if ([self.invoker respondsToSelector:@selector(postInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

        }

      }

    }


    - (void)registerSelector:(SEL)selector

    {

      NSValue* selValue = [NSValue valueWithPointer:selector];

      [self.selectors addObject:selValue];

    }


    @end

    ```

    '
- fmt: "# The initialization methods initialize an `AspectProxy` object instance accordingly.\
    \ Note that as `NSProxy` is a base class, there is no call to `[super init]` at\
    \ the beginning of these methods. The `registerSelector:` method adds another\
    \ selector to the collection, as mentioned earlier. The implementation of `methodSignatureForSelector:`\
    \ returns an `NSMethodSignature` instance for the method to be invoked on the\
    \ target object. The runtime system requires that this method be implemented when\
    \ performing normal forwarding. The implementation of `forwardInvocation:` invokes\
    \ the method on the target object and conditionally invokes the AOP functionality\
    \ if the selector for the method invoked on the target object matches one of the\
    \ selectors registered in the `AspectProxy` object. Whew. When you’ve had enough\
    \ time to digest this, let’s move on to the `main.m` file and test out your program!\n\
    \n## Testing the AspectProxy\n\nLet’s test the `AspectProxy`, but first let’s\
    \ add a target class to the proxy. You’ll use the `Calculator` class that you\
    \ implemented in [Chapter 7](#9781430250500_Ch07.xhtml). It declares the following\
    \ methods:\n\n```\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber\
    \ *)adder2;\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 :(NSNumber *)adder2;\n\
    ```\n\nAs you learned earlier in this chapter, Xcode provides a simple mechanism\
    \ for importing files into a project. Hold down the Ctrl key and (from the Xcode\
    \ project navigator pane) select the `AspectProxy` project. A drop-down window\
    \ displays a set of options. Select the **Add Files to “AspectProxy” …** option.\
    \ Navigate over to the `Calculator` project folder, select the `Calculator.h`\
    \ and `Calculator.m` files, and click the **Add** button to add them to your `AspectProxy`\
    \ project. OK, now with that done, let’s update the `main()` function to create\
    \ a calculator proxy and invoke its methods, causing the AOP `AuditingInvoker`\
    \ methods to be invoked as well. In the project navigator pane, select the `main.m`\
    \ file and update it as shown in [Listing 9-15](#9781430250500_Ch09.xhtml#list15).\n\
    \n[*Listing 9-15.*](#9781430250500_Ch09.xhtml#_list15)  AspectProxy `main()` Function\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"AspectProxy.h\"\n#import \"\
    AuditingInvoker.h\"\n#import \"Calculator.h\"\n\nint main(int argc, const char\
    \ * argv[])\n{\n  @autoreleasepool\n  {\n    // Create Calculator object\n   \
    \ id calculator = [[Calculator alloc] init];\n    NSNumber *addend1 = [NSNumber\
    \ numberWithInteger:-25];\n    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n\
    \    NSNumber *addend3 = [NSNumber numberWithInteger:15];\n\n// Create proxy for\
    \ object\n    NSValue* selValue1 = [NSValue valueWithPointer:@selector(sumAddend1:addend2:)];\n\
    \    NSArray *selValues = @[selValue1];\n    AuditingInvoker *invoker = [[AuditingInvoker\
    \ alloc] init];\n    id calculatorProxy = [[AspectProxy alloc] initWithObject:calculator\n\
    \                                                   selectors:selValues\n    \
    \                                              andInvoker:invoker];\n\n// Send\
    \ message to proxy with given selector\n    [calculatorProxy sumAddend1:addend1\
    \ addend2:addend2];\n\n// Now send message to proxy with different selector, no\
    \ special processing!\n    [calculatorProxy sumAddend1:addend2 :addend3];\n\n\
    // Register another selector for proxy and repeat message\n    [calculatorProxy\
    \ registerSelector:@selector(sumAddend1::)];\n    [calculatorProxy sumAddend1:addend1\
    \ :addend3];\n\n}\n  return 0;\n}\n```\n\nFirst, the code creates a `Calculator`\
    \ object and some data values. Next, it creates a proxy for the `Calculator` object,\
    \ initializing it with a selector for the `sumAddend1:addend2:` method and an\
    \ `AuditingInvoker` instance. Notice the following statement:\n\n```\nNSArray\
    \ *selValues = @[selValue1];\n```\n\nThe notation `@[]` is used to create an array\
    \ literal. In Part 4 of this book, you’ll examine Objective-C literals in depth.\
    \ The `sumAddend1:addend2:` message is sent to the proxy. This causes the proxy\
    \ to perform the AOP functionality of the `AuditingInvoker` instance in addition\
    \ to the method on the `Calculator` object. Next, the `sumAddend1::` message is\
    \ sent to the proxy; because this method is not yet registered on the proxy when\
    \ it is invoked, the AOP functionality is not performed. Finally, the `sumAddend1::`\
    \ selector is added to the proxy and the message is resent to the proxy; because\
    \ the selector is now registered, the AOP functionality is now performed. When\
    \ you compile and run the `AspectProxy` program, you should observe the messages\
    \ in the output pane shown in [Figure 9-14](#9781430250500_Ch09.xhtml#Fig14).\n\
    \n![9781430250500_Fig09-14.jpg](images/9781430250500_Fig09-14.jpg)\n\n[Figure\
    \ 9-14](#9781430250500_Ch09.xhtml#_Fig14). AspectProxy program output\n\nObserve\
    \ from the messages in the output pane that invoking the `sumAddend1:addend2:`\
    \ method on the calculator proxy results in the proxy calling the `preInvoke:`\
    \ method on the `AuditorInvoker` object, followed by the target method `sumAddend1:addend2:`\
    \ method on the real subject (`Calculator` object), and finally the `postInvoke:`\
    \ method on the `AuditorInvoker` object. Because the `sumAddend1:addend2:` method\
    \ was registered with the calculator proxy, this matches the expected behavior.\
    \ Next, the `sumAddend1::` method is invoked on the calculator proxy. Because\
    \ this method is not registered with the proxy, it only forwards this method call\
    \ to the `Calculator` object, and does not call the `AuditorInvoker` methods.\
    \ Finally, the `sumAddend1::` method is registered with the proxy and the method\
    \ is called again. This time, it calls the AOP methods on the `AuditorInvoker`\
    \ object and the `sumAddend1::` method on the real subject, as expected.\n\n##\
    \ Roundup\n\nIn this chapter, you implemented three programs that together use\
    \ numerous features of the Objective-C runtime system and its APIs. You also learned\
    \ how to create loadable bundles and import code into a project using Xcode. You\
    \ should now have a good understanding of the runtime system, its place in the\
    \ Objective-C platform, and how to use its features and low-level APIs in your\
    \ own programs. I recommend that you review these programs carefully, modify them\
    \ to try out other features/behaviors, and become very familiar with the concepts\
    \ demonstrated here. Now that you have these skills under you belt, why not take\
    \ a break and give yourself a chance to let this all soak in. In Part 3, you’ll\
    \ explore the Foundation Framework.\n\n# Chapter 10: Foundation Framework General\
    \ Purpose Classes\n\nThe Foundation Framework defines a base layer of APIs that\
    \ can be used for any type of Objective-C program. It includes root object classes,\
    \ classes for basic data types such as strings, wrapper classes for primitive\
    \ data types, and collection classes for storing and manipulating other objects,\
    \ as well as classes for system information, networking, and other functionality.\
    \ Mastering the Foundation Framework APIs is one of the keys to becoming a proficient\
    \ Objective-C programmer. Part 3 will help you get there as you examine these\
    \ APIs in depth.\n\nThe Foundation Framework evolved from the NeXTSTEP OpenStep\
    \ APIs, created in 1993. These APIs included application layer Objective-C libraries,\
    \ divided into the Foundation Kit and the Application Kit. They also established\
    \ the “NS” prefix-naming convention used for these APIs. When Apple acquired NeXT\
    \ Software in 1996, the Foundation Kit served as the basis for the existing Foundation\
    \ Framework.\n\nIn this chapter, you will explore Foundation Framework classes\
    \ that provide common, general-purpose functionality required by most Objective-C\
    \ programs. OK, let’s get started!\n\n## Root Classes"
