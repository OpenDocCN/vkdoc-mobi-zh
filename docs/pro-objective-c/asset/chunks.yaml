    ```


    In other words, an `id` is just a pointer to a C `struct` with the identifier
    `objc_object`. The runtime data structure for Objective-C block objects follows
    the same convention, thereby enabling them to also be properly managed by the
    runtime system.


    Viewing Runtime Data Structures


    Before you go any further with these concepts, let’s create an example that will
    allow you to see how Objective-C objects and classes map to the runtime data structures
    discussed earlier. In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)
    **Project …** from the Xcode File menu. In the **New Project Assistant** pane,
    create a command-line application (choose **Command Line Tool** from the Mac OS
    X Application selection) and click **Next**. In the **Project Options** window,
    specify **Runspector** for the Product Name, choose **Foundation** for the Project
    Type, select ARC memory management by checking the **Use Automatic Reference Counting**
    check box, and then click **Next**.


    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    Now let’s implement the code. Select the **main.m** file in the navigator pane,
    and then add the code shown in [Listing 8-3](#9781430250500_Ch08.xhtml#list3).


    [*Listing 8-3.*](#9781430250500_Ch08.xhtml#_list3)  Runspector main.m File


    ```

    #import <Foundation/Foundation.h>

    #import <objc/runtime.h>


    // Test class 1

    @interface TestClass1 : NSObject { @public int myInt; }

    @end

    @implementation TestClass1

    @end


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        // Create a few instances of one class and display its data

        TestClass1 *tc1A = [[TestClass1 alloc] init];

        tc1A->myInt = 0xa5a5a5a5;

        TestClass1 *tc1B = [[TestClass1 alloc] init];

        tc1B->myInt = 0xc3c3c3c3;

        long tc1Size = class_getInstanceSize([TestClass1 class]);

        NSData *obj1Data = [NSData dataWithBytes:(__bridge const void *)(tc1A)

                                         length:tc1Size];

        NSData *obj2Data = [NSData dataWithBytes:(__bridge const void *)(tc1B)

                                          length:tc1Size];

        NSLog(@"TestClass1 object tc1 contains %@", obj1Data);

        NSLog(@"TestClass1 object tc2 contains %@", obj2Data);

        NSLog(@"TestClass1 memory address = %p", [TestClass1 class]);

      }

      return 0;

    }

    ```


    OK, let’s review this code. At the beginning of the `main.m` file, observe the
    import statement


    ```

    #import <objc/runtime.h>

    ```


    This statement is required to include the runtime library APIs in the file. Immediately
    after the import statements, the code defines the class `TestClass1`. This simple
    class has no methods and a single public instance variable. In the `main()` function,
    two `TestClass1` objects are created and initialized, with the instance variable
    for each assigned a value. After the objects are created, the Foundation Framework
    `NSData` class is used to retrieve the data (in bytes) for each object. The Runtime
    Library function `class_getInstanceSize()` is used to retrieve the size (in bytes)
    of a class instance. Once the data is retrieved, it is displayed in the output
    pane using the Foundation Framework `NSLog` function. When you compile and run
    the program, you should observe output similar to that shown in [Figure 8-1](#9781430250500_Ch08.xhtml#Fig1).


    ![9781430250500_Fig08-01.jpg](images/9781430250500_Fig08-01.jpg)


    [Figure 8-1](#9781430250500_Ch08.xhtml#_Fig1). Runspector program, object inspection


    In the output pane, the `TestClass1` objects contain the data in [Listing 8-4](#9781430250500_Ch08.xhtml#list4).


    [*Listing 8-4.*](#9781430250500_Ch08.xhtml#_list4)  TestClass1 Output from Runspector
    Program


    ```

    TestClass1 object tc1 contains <78110000 01000000 a5a5a5a5 00000000>

    TestClass1 object tc2 contains <78110000 01000000 c3c3c3c3 00000000>

    TestClass1 memory address = 0x100001178

    ```


    Let’s analyze this data. It was shown in [Listing 8-2](#9781430250500_Ch08.xhtml#list2)
    that when the compiler parses an object, it generates an instance of an `objc_object`
    type whose contents consist of an `isa` pointer and the values of the object’s
    instance variables. So, looking at the output from the program (see [Listing 8-4](#9781430250500_Ch08.xhtml#list4)),
    the data for `TestClass1` object 1 (`tc1`) contains two items: an `isa` pointer
    (`78110000 01000000`) and the value assigned to its instance variable (`a5a5a5a5
    00000000`). Similarly, the data for `TestClass1` object 2 (`tc2`) contains an
    `isa` pointer (`78110000 01000000`) and the value assigned to its instance variable
    (`c3c3c3c3 00000000`). Notice that the first item in the object’s `objc_object`
    data structure is its `isa` pointer. Also notice that the `isa` pointer for both
    instances is the same. This is as expected since they are instances of the same
    class and hence should have the same pointer value. Now an `isa` pointer points
    to the address in memory of a class, as shown by the last line of [Listing 8-4](#9781430250500_Ch08.xhtml#list4).


    ```

    TestClass1 memory address = 0x100001178

