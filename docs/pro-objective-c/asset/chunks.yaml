- fmt: "`ARC bridged casts` 使得在使用 ARC 时能够利用免费桥接类型。这些转换操作以特殊的注解 `__bridge`、`__bridge_retained`\
    \ 和 `__bridge_transfer` 为前缀。\n\n*   `__bridge`注解用于在不转移所有权的情况下，将对象从 Core Foundation\
    \ 数据类型转换为`Foundation`对象（或反之）。换句话说，如果你动态创建一个 Foundation 框架对象，然后将其转换为 Core Foundation\
    \ 类型（通过免费桥接），`__bridge`注解会告知编译器该对象的生命周期仍由 ARC 管理。反之，如果你创建一个 Core Foundation 数据类型，然后将其转换为\
    \ Foundation 框架对象，`__bridge`注解会告知编译器该对象的生命周期必须通过编程方式管理（而非由 ARC 管理）。请注意，此注解会消除编译器错误，但不会转移所有权；因此，使用时需要小心，以避免内存泄漏或野指针。\n\
    *   `__bridge_retained`注解用于将 Foundation 框架对象转换为 Core Foundation 数据类型，并将所有权从 ARC\
    \ 系统转移出去。然后，你需要以编程方式管理桥接数据类型的生命周期。\n*   `__bridge_transfer`注解用于将 Core Foundation\
    \ 数据类型转换为`Foundation`对象，并将该对象的所有权转移给 ARC 系统。之后，ARC 会以编程方式管理桥接对象的生命周期。\n\n在转换操作中使用桥接转换注解的语法是：\n\
    \n```\n(annotation castType)variableName\n```\n\n这与常规转换操作的不同之处在于，注解被前置在转换类型之前。`ARC\
    \ bridged casts`不仅可用于免费桥接类型，还可用于 Objective-C 代码需要访问非 Objective-C 对象管理的内存的其他任何地方。`[Listing\
    \ 6-11](#9781430250500_Ch06.xhtml#list11)`用 ARC 桥接转换更新了之前的示例。\n\n`[*Listing 6-11.*](#9781430250500_Ch06.xhtml#_list11)\
    \  `  使用 ARC 桥接转换的免费桥接\n\n```\nCFStringRef cstr = CFStringCreateWithCString(NULL,\
    \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
    NSArray *data = [NSArray arrayWithObject:(__bridge_transfer NSString *)cstr];\n\
    ```\n\n注意，注解位于要转换的类型之前。此注解会将桥接对象的所有权转移给 ARC，后者现在将管理该对象的生命周期。好了，理论够了，现在让我们创建一些示例来演示\
    \ ARC 桥接转换的使用！\n\n## 使用 ARC 桥接转换\n\n现在，你将开发一个示例程序，应用你所学的关于免费桥接和 ARC 桥接转换的知识。在\
    \ Xcode 中，通过从 Xcode 的 File 菜单中选择 **New ![image](images/arrow.jpg) Project ...**\
    \ 来创建一个新项目。在 New Project Assistant 窗格中，创建一个命令行应用程序（从 Mac OS X Application 选择中选择\
    \ **Command Line Tool**）并点击 **Next**。在 Project Options 窗口中，为 Product Name 指定 **ARC\
    \ Toll Free Bridging**，为 Project Type 选择 **Foundation**，通过选中 **Use Automatic Reference\
    \ Counting** 复选框来选择 ARC 内存管理，然后点击 **Next**。\n\n在文件系统中指定你想要创建项目的位置（如果需要，选择 **New\
    \ Folder** 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后点击 **Create** 按钮。\n\n首先，你将创建一个免费桥接的\
    \ Core Foundation 数据类型。在导航器窗格中选择 **main.m** 文件，并创建一个`CFStringRef`，如`[Listing 6-12](#9781430250500_Ch06.xhtml#list12)`所示。\n\
    \n`[*Listing 6-12.*](#9781430250500_Ch06.xhtml#_list12)  `  一个`main()`函数免费桥接数据类型\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main(int argc, const char * argv[])\n\
    {\n  @autoreleasepool\n  {\n    CFStringRef cstr = CFStringCreateWithCString(NULL,\
    \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
    \  }\n  return 0;\n}\n```\n\n`CFStringRef`是一个 Core Foundation 数据类型，表示一个 Unicode\
    \ 字符串。它是一个免费桥接类型，可以转换为 Foundation 框架的`NSString`对象。为了演示免费桥接的使用，更新代码，如`[Listing\
    \ 6-13](#9781430250500_Ch06.xhtml#list13)`所示。\n\n`[*Listing 6-13.*](#9781430250500_Ch06.xhtml#_list13)\
    \  `  隐式免费桥接\n\n```\n#import <Foundation/Foundation.h>\n\nint main(int argc, const\
    \ char * argv[])\n{\n  @autoreleasepool\n  {\n    CFStringRef cstr = CFStringCreateWithCString(NULL,\
    \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
    \    NSArray *data = [NSArray arrayWithObject:cstr];\n    NSLog(@\"Array size\
    \ = %ld\", [data count]);\n    ...\n}\n```\n\n变量`cstr`的类型为`CFStringRef`，是 Objective-C\
    \ `NSArray`对象的一个参数。从免费桥接的角度来看，这完全没问题，但由于你使用 ARC 内存，代码将无法编译。它会显示一个错误，提示需要桥接转换（参见`[Figure\
