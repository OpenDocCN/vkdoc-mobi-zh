- fmt: "# Together, these phases perform lexical analysis, syntax analysis, code generation\
    \ and optimization, assembly, and linking operations to produce the output binaries.\n\
    \nDuring the *lexical analysis* phase, the source code is broken down into tokens.\
    \ Each *token* is a single element of the language; for example, a keyword, operator,\
    \ identifier, or symbol name within the context of its grammar.\n\nThe *syntax\
    \ analysis* (or parsing) phase checks the tokens for the correct syntax and verifies\
    \ that they form a valid expression. This task concludes with the creation of\
    \ a hierarchical parse tree or an abstract syntax tree (AST) from the tokens.\n\
    \nDuring *code generation and optimization*, the AST is used to generate code\
    \ in the output language, which may be a machine language or an intermediate language\
    \ representation (IR). The code is also optimized into a functionally equivalent\
    \ but faster and smaller form.\n\nThe *assembly* phase takes the generated code\
    \ and converts it into executable machine code for the target platform.\n\nFinally,\
    \ during the *linking* phase, one or more machine code outputs from the assembler\
    \ are combined into a single executable program.\n\nThe preprocessor is used during\
    \ the lexical analysis phase (as shown in [Figure 5-1](#9781430250500_Ch05.xhtml#Fig1))\
    \ prior to parsing. To understand its role in this phase, let’s review the operation\
    \ of the preprocessor in detail.\n\n## Operations\n\nThe preprocessor works by\
    \ substituting the input character sequences for other character sequences according\
    \ to a set of predefined rules. These operations, depicted in [Figure 5-2](#9781430250500_Ch05.xhtml#Fig2),\
    \ are performed in the following order:\n\n![9781430250500_Fig05-02.jpg](images/9781430250500_Fig05-02.jpg)\n\
    \n[Figure 5-2](#9781430250500_Ch05.xhtml#_Fig2). Preprocessing Objective-C source\
    \ files\n\n1. *Textual translation*: First, the preprocessor translates the input\
    \ source file by breaking it into lines, replacing trigraphs by their corresponding\
    \ single characters, merging continued lines into one long line, and replacing\
    \ comments with single spaces. A trigraph is a three-character sequence defined\
    \ by the C programming language to stand for single characters.\n2. *Token conversion*:\
    \ Next, the preprocessor converts the translated file into a sequence of tokens.\n\
    3. *Preprocessor language-based transformation*: Finally, if the token stream\
    \ contains any preprocessing language elements, they are transformed based on\
    \ these inputs.\n\nThe first two operations are performed automatically, and the\
    \ last is a function of the *preprocessor language* elements added to the source\
    \ files.\n\n## Preprocessor Language\n\nThat’s right, the preprocessor language\
    \ is a separate programming language that’s distinct from Objective-C. The source-file\
    \ transformations performed using the language are primarily source file inclusions,\
    \ conditional compilation, and macro expansions. Preprocessor language elements\
    \ operate on a source file prior to program compilation, and the preprocessor\
    \ has no knowledge of the Objective-C language itself.\n\nThe preprocessor language\
    \ defines directives to be executed and macros to be expanded. A preprocessor\
    \ *directive* is a command that is executed by the preprocessor, not the compiler.\
    \ A preprocessor *macro* is a named code fragment. Wherever the name is used in\
    \ the source code, the code fragment is substituted for it. The preprocessor language\
    \ also defines several operators and keywords.\n\n**Note**   It’s important to\
    \ understand the capabilities and limitations of the preprocessor language because\
    \ incorrect use can cause subtle compilation problems that are difficult to diagnose.\
    \ You should keep this in mind as you look at the language in detail.\n\n## Directives\n\
    \nPreprocessor directives are indicated in Objective-C source files with a unique\
    \ syntax that causes these lines to be treated by the preprocessor, not the compiler.\
    \ A preprocessor directive has the following form:\n\n```\n#directiveName directiveArguments\n\
    ```\n\nA directive begins with a hash sign (`#`), immediately followed by the\
    \ directive name, and then its corresponding arguments. The following line\n\n\
    ```\n#import \"Elements.h\"\n```\n\nis an example of a preprocessor directive;\
    \ each directive is terminated by a newline. To extend a directive through more\
    \ than one line, a backslash (`\\`) is placed at the end of the line to be continued\
    \ on another line. The following example\n\n```\n#define DegreesToRadians(x) \
    \ \\\n                 ((x) * 3.14159 / 180.0)\n```\n\nis a preprocessor directive\
    \ that extends across two lines, as indicated by the backslash at the end of the\
    \ first line of the directive.\n\nThe following is the complete set of preprocessor\
    \ directives and the functionality that they provide:\n\n* Header file inclusion\
    \ (`#include`, `#import`)\n* Conditional compilation (`#if`, `#elif`, `#else`,\
    \ `#endif`, `#ifdef`, `#ifndef`)\n* Diagnostics (`#error`, `#warning`, `#line`)\n\
    * Pragmas (`#pragma`)\n\n### Header File Inclusion\n\nThe preprocessor has two\
    \ directives (`#include` and `#import`) that enable header file inclusion; basically,\
    \ they tell the preprocessor to take the text of a file and insert it into the\
    \ current file. As such, they facilitate code reuse, because a source file can\
    \ use external class interfaces and macros without having to copy them directly.\n\
    \nThe syntax of the *include* directive has two forms:\n\n```\n#include \"HeaderFileName\"\
    \n```\n\nor\n\n```\n#include <HeaderFileName>\n```\n\n`HeaderFileName` is the\
    \ name of the header file to be inserted. The only difference between both expressions\
    \ is the locations (i.e., directories) where the compiler looks for the file:\n\
    \n* *Header file name between double quotes* (`\"HeaderFileName\"`). The compiler\
    \ first searches for the file in the same directory that includes the file containing\
    \ the directive. If the file is not found there, the compiler searches for the\
    \ file in the default directories, where it is configured to look for the system-standard\
    \ header files.\n* *Header file name between angle brackets* (`<HeaderFileName>`).\
    \ The compiler searches for the file in the default directories, where it is configured\
    \ to look for the standard header files.\n\nBy convention, standard header files\
    \ are usually included using the angle brackets because they are normally located\
    \ in the default directories, whereas other header files (such as those for your\
    \ Objective-C classes) are included using double quotes.\n\nThe *import* directive\
    \ (`#import`) also performs header file inclusion. Like the `#include` directive,\
    \ the included header file is enclosed in either double quotes or angle brackets.\
    \ This directive differs from `#include` in that it ensures a header file is only\
    \ included once in a source file, thereby preventing recursive includes. For example,\
    \ in the Elements program you implemented in [Chapters 2](#9781430250500_Ch02.xhtml)\
    \ and [3](#9781430250500_Ch03.xhtml), the `main.m` source file includes the `Hydrogen.h`\
    \ and `Atom+Nuclear.h` header files. Now each of these files includes the `Atom.h`\
