- fmt: "# Key-Value Coding and Key-Value Observing\n\n*   Key-value coding enables\
    \ your code to access and manipulate an object’s properties indirectly, by name\
    \ (i.e., key), rather than through accessor methods or backing instance variables.\n\
    *   Key-value coding allows you to access a property using a string that can be\
    \ varied at runtime, and thus provides a more dynamic, flexible approach for accessing\
    \ and manipulating an object’s state. Its key benefits include loose coupling,\
    \ configuration-based property access, and code simplification.\n*   Key-value\
    \ coding uses keys and key paths for property access. A key is a string that identifies\
    \ a specific property. A key path specifies a sequence of object properties (within\
    \ an object graph) that are traversed to identify a specific property. The KVC\
    \ APIs support accessing both individual and multiple properties of an object.\
    \ The properties can be primitives, C structs, object types (including collections).\
    \ Primitives and structs are automatically wrapped to/from corresponding object\
    \ types.\n*   The `NSKeyValueCoding` informal protocol defines the mechanism for\
    \ accessing objects indirectly by name/key. This protocol declares the key-value\
    \ coding API, consisting of class and instance methods along with constant values.\
    \ The methods enable you to get and set property values, perform property validation,\
    \ and change the default behavior of the key-value coding methods for getting\
    \ property values.\n*   Key-value coding utilizes a mechanism for mapping keys\
    \ to the appropriate property accessor methods and/or property backing variables.\
    \ This mechanism utilizes a set of standard search patterns that rely on property\
    \ accessor method naming conventions.\n*   Key-value coding also includes infrastructure\
    \ for validating property values. The KVC validation mechanism comprises a set\
    \ of APIs and a standard convention for custom property validation methods. The\
    \ KVC validation methods can be called directly or indirectly.\n*   The key-value\
    \ coding collection operators allow actions to be performed on the items of a\
    \ collection using key path dot notation.\n*   Key-value observing enables other\
    \ objects to be notified of changes to the properties of other objects. It is\
    \ essentially an implementation of the observer software design pattern, and is\
    \ implemented in numerous software libraries and frameworks. In fact, it is a\
    \ key component of the model-view-controller (MVC) design pattern, a central component\
    \ of the Cocoa and Cocoa Touch frameworks. Key-value observing is built on key-value\
    \ coding.\n*   Key-value observing provides numerous benefits, including decoupling\
    \ of observer objects from the object being observed (i.e., the subject), framework-level\
    \ support, and a full-featured set of APIs. It provides event notification, similar\
    \ to the Foundation Framework notification APIs, but a different set of features.\
    \ Hence, you should compare the two before deciding which to use in your programs.\n\
    *   Key-value observing provides APIs that support both automatic and manual key-value\
    \ property change notification. They enable an observer to perform logic both\
    \ before and after a property value is changed. The APIs support attributes, to-one,\
    \ and to-many relationship properties. Automatic property change notification\
    \ is implemented by the default `NSObject` KVO implementation. Manual change notification\
    \ provides more fine-grained control over the sending of change notifications,\
    \ eliminates unnecessary notifications (e.g., for cases when the new property\
    \ value is the same as its old value), and enables you to group notifications.\n\
    \nCongratulations, you should now be well on your way to mastering the Objective-C\
    \ language! Perhaps there’s some material that you want to review again, or maybe\
    \ you would just like to give your brain a well-deserved rest. Go right ahead,\
    \ but please take advantage of the numerous code listings and programs to thoroughly\
    \ explore the topics covered. The more you do this, the more skilled you will\
    \ become at Objective-C programming.\n\nThis is the final chapter of this book—but\
    \ guess what, you’re not done yet. The next stop is the appendices, where you’ll\
    \ explore a variety of additional topics that will further enhance your Objective-C\
    \ skills.\n\n## Appendix A — Language Elements\n\n[Appendix A](#9781430250500_AppA.xhtml)\
    \ provides a concise summary of the basic elements of the Objective-C language.\
    \ Its scope is the Objective-C language extensions to ANSI C. The fundamental\
    \ elements of the C programming language are not covered here; they can be found\
    \ in numerous other references.\n\n### Variables\n\nThe lexical rules for variable\
    \ names in Objective-C are identical to those for ANSI C—a variable is defined\
    \ with a letter or underscore, followed by any combination of letters, underscores,\
    \ and the digits 0–9. Uppercase and lowercase letters are distinct.\n\n### Objective-C\
    \ Reserved Words\n\nIn a programming language, a reserved word is a symbol that\
    \ has a special meaning in the language, and hence should not be used as a variable\
    \ name. Objective-C adds a number of reserved words to those already defined for\
    \ ANSI C; these are listed in [Table A-1](#9781430250500_AppA.xhtml#Tab1).\n\n\
    **Table A-1.** Objective-C Reserved Words Not Used for Variable Names\n\n![table](images/TableA-1.jpg)\n\
    \n### Variable Scope\n\nThe visibility and accessibility of a variable is dependent\
    \ on its scope. A variable may exist within a statement block, a function, a method,\
    \ an object instance (or related objects), throughout a file, or across multiple\
    \ files. ANSI C defines four kinds of scope:\n\n*   **block**: A variable declared\
    \ within a statement block has block scope. Variables declared within a block\
    \ are only visible and accessible within this block.\n*   **file**: A variable\
    \ that has file scope is visible and accessible only to code within the file where\
    \ the variable is declared.\n*   **function**: A variable declared within a function/method\
    \ has function scope. These variables are only visible and accessible within the\
    \ associated function/method.\n*   **function prototype**: A variable declared\
    \ within the list of parameters in a function/method prototype has function prototype\
    \ scope. These variables are visible and accessible within the associated function/method.\n\
    \nObjective-C adds a set of access modifier directives that enable you to provide\
    \ fine-grained access control to instance variables.\n\n### Access Modifiers\n\
    \nObjective-C defines several compiler directives to control the scope of instance\
    \ variables; that is, the visibility of variables throughout a program.\n\n* \
    \  `@private`: The instance variable is only accessible within the class that\
    \ declares it and other instances of this class type.\n*   `@protected`: The instance\
    \ variable is accessible within the class that declares it and the instance methods\
    \ of any of its subclasses. This is the default scope if a protection level is\
    \ not specified for an instance variable.\n*   `@public`: The instance variable\
    \ is accessible from everywhere.\n*   `@package`: The instance variable is accessible\
    \ from any other class instance or function, but outside of the package, it is\
    \ treated as private. This scope can be useful for libraries or framework classes.\n\
    \nThese directives are referred to as *access modifiers*, and are used on instance\
    \ variables declared within an instance variable declaration block. The class\
    \ instance variable declaration of [Listing A-1](#9781430250500_AppA.xhtml#list1)\
    \ declares a `counter` variable of type `int` that is accessible everywhere, a\
    \ `temperature` variable of type `float` that is accessible within the declaring\
    \ class and any subclasses, and a `description` variable of type `NSString*` that\
    \ is accessible only within the declaring class.\n\n**[Listing A-1.](#9781430250500_AppA.xhtml#_list1)\
    \ Instance Variable Declaration with Access Modifiers**\n\n```\n{\n  @public int\
    \ counter;\n  @protected float temperature;\n  @private NSString *description;\n\
    }\n```\n\n### Data Types"
