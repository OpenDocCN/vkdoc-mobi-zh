    ## Bundle 包\n\nFoundation 框架包含几个用于获取本地化字符串的函数宏。它们用于从程序的字符串文件中加载字符串。在开始研究这些宏之前，我们先花点时间讨论一下国际化和本地化。\n\
    \n国际化是设计应用程序的过程，使其能够服务于不同的语言和地区（即区域设置）而无需更改。*本地化*是将国际化应用程序适应本地市场的过程。本地化可以应用于应用程序的许多部分，包括其可见文本、图标和图形、视图以及数据。\n\
    \n### 本地化字符串\n"
- fmt: "本地化可见文本是本地化过程中的关键部分。需要在代码中进行本地化的字符串必须被提取、本地化，然后重新插入代码中，以便在指定的语言环境中正确显示。Apple\
    \ 提供了一个名为 `genstrings` 的工具，可用于简化文本本地化过程。`genstrings` 工具会搜索您的代码，查找本地化函数宏的使用，并利用这些信息为您的应用程序构建初始的\
    \ `strings` 文件（包含可本地化字符串的资源文件）。\n\n例如，如果您的源代码包含一条语句，利用本地化函数宏 `NSLocalizedString`\
    \ 返回字符串 `Yes` 的本地化版本，如下所示：\n\n```\nNSString *yes = NSLocalizedString(@\"Yes\"\
    , @\"Word for yes\");\n```\n\n`genstrings` 工具将解析此语句，并利用它来构建一个 `strings` 文件。`genstrings`\
    \ 工具可以解析带有 `.c` 或 `.m` 文件扩展名的 C 和 Objective-C 源代码文件。您还可以指定 `genstrings` 放置生成的\
    \ `strings` 文件的输出目录。在大多数情况下，您会希望指定包含您开发语言项目资源的目录。\n\n以下示例使用 `genstrings` 工具解析当前目录中的所有\
    \ Objective-C 源文件，并将生成的 `strings` 文件存储在 `en.lproj` 子目录中，该子目录必须已存在。\n\n```\ngenstrings\
    \ -o en.lproj *.m\n```\n\n第一次运行 `genstrings` 工具时，它会为您创建一组新的 `strings` 文件。对相同文件后续的执行将用您在源代码中找到的当前字符串条目替换这些\
    \ `strings` 文件的内容。\n\n## 本地化字符串函数\n\n一旦您在 `strings` 文件中有了本地化字符串，就可以使用 Foundation\
    \ 本地化字符串函数宏来为指定的语言环境检索合适的本地化字符串。Foundation 框架定义了四个用于获取本地化字符串的函数宏，如[表 13-2](#9781430250500_Ch13.xhtml#Tab2)\
    \ 所示。\n\n[表 13-2](#9781430250500_Ch13.xhtml#_Tab2). Foundation 本地化字符串函数\n\n| Foundation\
    \ 函数 | 描述 |\n| --- | --- |\n| `NSLocalizedString` | 从主应用程序包的默认字符串表中检索字符串的本地化版本。\
    \ |\n| `NSLocalizedStringFromTable` | 从主应用程序包的指定字符串表中检索字符串的本地化版本。 |\n| `NSLocalizedStringFromTableInBundle`\
    \ | 从指定应用程序包和字符串表中检索字符串的本地化版本。 |\n| `NSLocalizedStringWithDefaultValue` | 从指定应用程序包和字符串表中检索字符串的本地化版本，如果未找到键则使用默认值。\
    \ |\n\n这些本地化字符串函数依赖于一个 `NSBundle` 类实例。每个函数都调用一个 `NSBundle` 对象的 `localizedStringForKey:value:table:`\
    \ 方法，并将函数参数作为该方法的参数提供。\n\n因此，这些本地化函数既提供了可由 `genstrings` 工具解析以创建应用程序 `strings`\
    \ 文件的表达式，也用于检索字符串的本地化版本。它们还允许您为每个条目关联翻译注释。\n\n例如，如果您的程序在名为 `Localizable.strings`\
    \ 的文件中有一个字符串表，其中包含以下字符串：\n\n```\n\"Yes\" = \"Yes\"\n\"No\" = \"No\"\n```\n\n`NSLocalizedStringFromTable`\
    \ 函数将通过以下语句检索字符串 `Yes`：\n\n```\nNSString *yes = NSLocalizedStringFromTable(@\"\
    Yes\", @\"Localizable.strings\",\n                @\"Word for yes\");\n```\n\n\
    相反，如果用于法语语言环境的 `Localizable.strings` 文件包含以下值：\n\n```\n\"Yes\" = \"Oui\"\n\"No\"\
    \ = \"Non\"\n```\n\n那么前面的语句将检索到字符串 `Oui`。\n\n## 十进制数和字节顺序\n\nFoundation 框架包含用于执行十进制数运算的函数。支持的算术运算包括十进制算术、舍入、比较、复制、归一化和字符串表示。\n\
    \n这些函数将一个或多个 `NSDecimal` 数字作为参数，还可能包含其他参数。`NSDecimal` 是一种 Foundation 数据类型，用于描述十进制数。\n\
    \n`NSDecimalAdd`、`NSDecimalSubtract`、`NSDecimalMultiply` 和 `NSDecimalDivide` 在\
    \ `NSDecimal` 实例上执行相关的算术运算。`NSDecimalMultiplyByPowerOf10` 将一个数字乘以输入 10 的幂。每个函数都接受一个\
    \ `NSRoundingMode` Foundation 常量作为输入参数，该常量指定结果的舍入方式。可用的舍入模式包括：\n\n*   `NSRoundDown`：向下舍入返回值。\n\
    *   `NSRoundUp`：向上舍入返回值。\n*   `NSRoundPlain`：舍入到最接近的可能返回值。当值恰好在两个正数中间时，向上舍入。当值恰好在两个负数中间时，向下舍入。\n\
    *   `NSRoundBankers`：舍入到最接近的可能返回值。当值恰好在两个数中间时，返回最后一位为偶数的值。\n\n可以使用 `NSDecimalRound`\
    \ 函数显式执行舍入，或者对于 `NSDecimal` 算术函数，如果结果的小数位数超过了允许的最大有效数字位数（38），则会自动执行舍入。\n\n`NSDecimalPower`\
    \ 将一个数字提升到指定的幂。`NSDecimalNormalize` 和 `NSDecimalCompact` 都改变十进制数的表示形式。`NSDecimalCompact`\
    \ 格式化一个十进制数，使其占用最少的内存。所有 `NSDecimal` 函数都期望紧凑的十进制参数。`NSDecimalNormalize` 更新其两个十进制参数的格式，使它们具有相同的指数。`NSDecimalAdd`\
    \ 和 `NSDecimalSubtract` 会调用 `NSDecimalNormalize`。`NSDecimalRound` 根据输入的 `NSRoundingMode`\
    \ 常量舍入输入的十进制数。\n\n`NSDecimalCopy` 将一个十进制数的值复制到另一个 `NSDecimalNumber` 实例。`NSDecimalCompare`\
    \ 比较两个十进制数，将比较结果作为 `NSComparisonResult` 值（一个 Foundation 常量）返回，该值可以是以下值之一：\n\n\
    *   `NSOrderedDescending`：左操作数大于右操作数。\n*   `NSOrderedAscending`：左操作数小于右操作数。\n\
    *   `NSOrderedSame`：两个操作数相等。\n\n## 使用 NSDecimal 函数\n\n现在您将创建一个程序，演示 Foundation\
    \ 十进制算术函数的使用。在 Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New** → **Project...** 来创建一个新项目。在\
    \ **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，指定 **DecimalAddition**\
    \ 作为 **Product Name**，选择 **Foundation** 作为 **Project Type**，并通过选中 **Use Automatic\
    \ Reference Counting** 复选框来选择 ARC 内存管理。指定您希望在文件系统中创建项目的位置（如有必要，选择 **New Folder**\
    \ 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后单击 **Create** 按钮。\n\n好的，`DecimalAddition`\
    \ 项目已创建。现在选择 **main.m** 文件并更新 `main()` 函数，如[代码清单 13-5](#9781430250500_Ch13.xhtml#list5)\
    \ 所示。\n\n[*代码清单 13-5.*](#9781430250500_Ch13.xhtml#_list5) 使用 `NSDecimalAdd` 和\
    \ `NSDecimalRound` 函数执行十进制算术\n\n```\n#import <Foundation/Foundation.h>"
  raw: 'Localizing visible text is a key part of the localization process. Strings
    in code that require localization must be extracted, localized, and reinserted
    back in the code in order to display properly in the specified locale. Apple provides
    a tool, *genstrings*, which can be used to facilitate text localization. The genstrings
    tool searches your code for uses of the localization function macros and uses
    the information they contain to build the initial set of *strings* files (resource
    files that contain localizable strings) for your application. For example, if
    your source code contains a statement that utilizes the localization function
    macro `NSLocalizedString` to return a localized version of the string `Yes`, as
    follows:


    ```

    NSString *yes = NSLocalizedString(@"Yes", @"Word for yes");

    ```


    the genstrings tool will parse this statement and use it to build a strings file.
    The genstrings tool can parse C and Objective-C source code files with the `.c`
    or `.m` filename extensions. You can also specify the output directory where genstrings
    places the resulting strings files. In most cases, you would want to specify the
    directory containing the project resources for your development language.


    The following example uses the genstrings tool to parse all Objective-C source
    files in the current directory and store the resulting strings file in the `en.lproj`
    subdirectory, which must already exist.


    ```

    genstrings -o en.lproj *.m

    ```


    The first time you run the genstrings tool, it creates a set of new strings files
    for you. Subsequent executions on the sme file(s) replace the contents of those
    strings files with the current string entries found in your source code.


    Localized Strings Functions


    Once you have localized strings in a strings file, the Foundation localized string
    function macros can be used to retrieve the appropriate localized string for a
    specified locale. The Foundation Framework defines four function macros for getting
    localized strings, shown in [Table 13-2](#9781430250500_Ch13.xhtml#Tab2).


    [Table 13-2](#9781430250500_Ch13.xhtml#_Tab2). Foundation Localized String Functions


    | Foundation Function | Description |

    | --- | --- |

    | `NSLocalizedString` | Retrieves a localized version of a string on the main
    application bundle in the default strings table. |

    | `NSLocalizedStringFromTable` | Retrieves a localized version of a string on
    the main application bundle in the specified strings table. |

    | `NSLocalizedStringFromTableInBundle` | Retrieves a localized version of a string
    on the specified application bundle and strings table. |

    | `NSLocalizedStringWithDefaultValue` | Retrieves a localized version of a string
    on the specified application bundle and strings table, using the default value
    if the key is not found. |


    The localized string functions depend on an `NSBundle` class instance. Each function
    invokes an `NSBundle` object’s `localizedStringForKey:value:table:` method, providing
    the function arguments as parameters for the method.


    So, the localization functions both provide expressions that can be parsed by
    the genstrings tool to create an application’s strings file, and retrieve a localized
    version of a string. They also let you associate translation comments with each
    entry.


    For example, if your program has a strings table in a file named `Localizable.strings`
    that includes the following strings:


    ```

    "Yes" = "Yes"

    "No" = "No"

    ```


    the `NSLocalizedStringFromTable` function would retrieve the string `Yes` with
    the following statement.


    ```

    NSString *yes = NSLocalizedStringFromTable(@"Yes", @"Localizable.strings",

                    @"Word for yes");

    ```


    Conversely, if the `Localizable.strings` file for the French locale contained
    the values


    ```

    "Yes" = "Oui"

    "No" = "Non"

    ```


    Then the preceding statement would retrieve the string `Oui`.


    Decimal Numbers and Byte Ordering


    The Foundation Framework includes functions for performing decimal number operations.
    The arithmetic operations supported include decimal arithmetic, rounding, comparison,
    copy, normalizing, and string representations.


    The functions take one or more `NSDecimal` numbers as arguments, along with (potentially)
    other parameters. `NSDecimal` is a Foundation data type used to describe a decimal
    number.


    `NSDecimalAdd`, `NSDecimalSubtract`, `NSDecimalMultiply`, and `NSDecimalDivide`
    perform the associated arithmetic operations on `NSDecimal` instances. `NSDecimalMultiplyByPowerOf10`
    multiplies a number by an input power of 10\. Each takes as an input argument
    an `NSRoundingMode` Foundation constant that specifies how the result is rounded.
    The available rounding modes are:


    *   `NSRoundDown`: Rounds the returned value down.

    *   `NSRoundUp`: Rounds the returned value up.

    *   `NSRoundPlain`: Rounds to the closest possible return value. When the value
    is halfway between two positive numbers, it rounds up. When the value is halfway
    between two negative numbers, it rounds down.

    *   `NSRoundBankers`: Rounds to the closest possible return value. When the value
    is halfway between two numbers, it returns the value whose last digit is even.


    Rounding can be explicitly performed using the `NSDecimalRound` function, or automatically
    performed for the `NSDecimal` arithmetic functions if the result has more digits
    than the maximum number of significant digits allowed (38).


    `NSDecimalPower` raises a number to the specified power. `NSDecimalNormalize`
    and `NSDecimalCompact` both change the representation of a decimal number. `NSDecimalCompact`
    formats a decimal so that it takes up the minimum amount of memory. All of the
    `NSDecimal` functions expect compact decimal arguments. `NSDecimalNormalize` updates
    the format of its two decimal arguments such that they have the same exponent.
    `NSDecimalAdd` and `NSDecimalSubtract` invoke `NSDecimalNormalize`. `NSDecimalRound`
    rounds the input decimal according to the input `NSRoundingMode` constant.


    `NSDecimalCopy` copies the value of a decimal number to another `NSDecimalNumber`
    instance. `NSDecimalCompare` compares two decimal numbers, returning the result
    of the comparison as an `NSComparisonResult` value (a Foundation constant) that
    can have one of the following values:


    *   `NSOrderedDescending`: The left operand is greater than the right operand.

    *   `NSOrderedAscending`: The left operand is less than the right operand.

    *   `NSOrderedSame`: The two operands are equal.


    Using the NSDecimal Functions


