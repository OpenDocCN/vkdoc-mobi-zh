    \ 32 位十六进制值）、要获取/设置的所选寄存器字节，以及（可选的）要设置的寄存器（十六进制）字节值。\n\n在 Xcode 中，通过从 Xcode 文件菜单中选择\
    \ **New** ![image](img/arrow.jpg) **Project …** 来创建新项目。在 **New Project Assistant**\
    \ 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为产品名称指定 `RegEdit`，为项目类型选择 **Foundation**，并通过勾选\
    \ **Use Automatic Reference Counting** 复选框选择 ARC 内存管理。在文件系统中指定希望创建项目的位置（如有必要，选择\
    \ **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
    \n首先，你要创建一个头文件，其中定义了其他类中使用的几个常量。从 Xcode 文件菜单中选择 **New** ![image](img/arrow.jpg)\
    \ **File …**，选择 **Header File template**（来自 OS X C 和 C++ 选项），并将头文件命名为 `RegEditConstants`。选择\
    \ `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击 **Create** 按钮。接下来，在 Xcode 项目导航窗格中，选择生成的头文件\
    \ `RegEditConstants.h` 并更新接口，如列表 16-16 所示。\n\n*列表 16-16.*  RegEditConstants 接口\n\
    \n```\n#ifndef RegEdit_RegEditConstants_h\n#define RegEdit_RegEditConstants_h\n\
    \n#define kByteMultiplier  0xFF\n#define kRegisterSize (sizeof(uint32))\n\n#endif\n\
    ```\n\n列表 16-16 显示，包含保护可防止头文件的递归包含（如果文件通过 `#include` 指令导入，这是必需的）。该头文件定义了两个常量：`kByteMultiplier`\
    \ 用于执行寄存器位操作，`kRegisterSize` 定义了寄存器的宽度（以字节为单位）。接下来，你要创建一个用于解析程序命令行输入的类。从 Xcode\
    \ 文件菜单中选择 **New** ![image](img/arrow.jpg) **File …**，选择 **Objective-C** 类模板，并将该类命名为\
    \ `CLIParser`。将该类设为 `NSObject` 的子类，选择 `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击\
    \ **Create** 按钮。在 Xcode 项目导航窗格中，选择生成的头文件 `CLIParser.h` 并更新接口，如列表 16-17 所示。\n\n\
    *列表 16-17.*  CLIParser 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ CLIParser : NSObject\n\n- (id) initWithCount:(int)argc arguments:(const char\
    \ *[])argv;\n- (BOOL) parseWithRegister:(uint32 *)registerValue\n            \
    \    byteNumber:(NSInteger *)byteN\n                 doSetByte:(BOOL *)doSet\n\
    \                 byteValue:(unsigned int *)byteValue\n                     error:(NSError\
    \ **)anError;\n\n@end\n```\n\n`initWithCount:arguments:` 方法初始化一个 `CLIParser` 对象，将其状态设置为输入参数值。`parseWithRegister:byteNumber:doSetByte:`\
    \ 方法解析命令行输入，通过间接方式设置输入参数的值。该类的实际实现稍后将讨论，但现在让我们先创建真正的 `RegEdit` 类。从 Xcode 文件菜单中选择\
    \ **New** ![image](img/arrow.jpg) **File …**，选择 **Objective-C** 类模板，并将该类命名为 `RegEdit`。将该类设为\
    \ `NSObject` 的子类，选择 `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击 **Create** 按钮。接下来，在\
    \ Xcode 项目导航窗格中，选择生成的头文件 `RegEdit.h` 并更新接口，如列表 16-18 所示。\n\n*列表 16-18.*  RegEdit\
    \ 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface RegEdit : NSObject\n\
    \n@property (readonly) uint32 regSetting;\n\n- (id) initWithValue:(uint32)value;\n\
    - (id) objectAtIndexedSubscript:(NSInteger)index;\n- (void) setObject:(id)newValue\
    \ atIndexedSubscript:(NSInteger)index;\n\n@end\n```\n"
- fmt: "该接口首先声明了一个名为`regSetting`的只读属性，用于存储寄存器每个位的二进制值（1/0）。该属性的类型为`uint32`，这是C语言中无符号、恰好32位宽的标准整数类型；因此该寄存器为32位宽。`initWithValue:`方法使用所需的初始寄存器设置来初始化`RegEdit`实例。`objectAtIndexedSubscript:`和`setObject:atIndexedSubscript:`方法用于实现对`RegEdit`对象的自定义下标操作。\n\
    \n现在选择**RegEdit.m**文件并更新其实现，如[清单16-19](#9781430250500_Ch16.xhtml#list19)所示。\n\n\
    [*清单16-19*](#9781430250500_Ch16.xhtml#_list19) RegEdit实现\n\n```objectivec\n#import\
    \ \"RegEdit.h\"\n#import \"RegEditConstants.h\"\n\n@interface RegEdit()\n\n@property\
    \ (readwrite) uint32 regSetting;\n\n@end\n\n@implementation RegEdit\n\n- (id)\
    \ initWithValue:(uint32)value\n{\n  if ((self = [super init]))\n  {\n    _regSetting\
    \ = value;\n  }\n  return self;\n}\n\n- (id) objectAtIndexedSubscript:(NSInteger)index\n\
    {\n  NSUInteger byteNumber = index * 8;\n  if ((1 << byteNumber) > self.regSetting)\n\
    \  {\n    [NSException raise:NSRangeException\n                format:@\"Byte\
    \ selected (%ld) exceeds number value\", index];\n  }\n  unsigned int byteValue\
    \ =\n    (self.regSetting & (kByteMultiplier << byteNumber)) >> byteNumber;\n\
    \  return [NSNumber numberWithUnsignedInt:byteValue];\n}\n\n- (void) setObject:(id)newValue\
    \ atIndexedSubscript:(NSInteger)index\n{\n  if (newValue == nil)\n  {\n    [NSException\
    \ raise:NSInvalidArgumentException\n                format:@\"New value is nil\"\
    ];\n  }\n\nNSUInteger byteNumber = index * 8;\n  if ((1 << byteNumber) > self.regSetting)\n\
    \  {\n    [NSException raise:NSRangeException\n                format:@\"Byte\
    \ selected (%ld) exceeds number value\", index];\n  }\n  uint32 mask = ∼(kByteMultiplier\
    \ << byteNumber);\n  uint32 tmpValue = self.regSetting & mask;\n  unsigned char\
    \ newByte = [newValue unsignedCharValue];\n  self.regSetting = (newByte << byteNumber)\
    \ | tmpValue;\n}\n\n@end\n```\n\n文件开头的`RegEdit`类扩展使`regSetting`属性可写，从而允许该类实现中的其他方法更新其值。`RegEdit`实现首先定义了`initWithValue:`方法，该方法使用输入参数值初始化`regSetting`属性。接下来，实现定义了`objectAtIndexedSubscript:`方法，该方法从寄存器中检索一个字节的值，其中检索的字节由输入参数（`index`）指定。`RegEdit`寄存器模拟的是**小端序**机器；因此最低有效字节具有最低的内存地址（即字节0）。选定的寄存器字节作为封装在`NSNumber`实例中的无符号整数返回。该方法还包含检查输入参数值的逻辑，如果选定的字节超过寄存器值，则抛出异常。\n\
    \n```objectivec\nif ((2 << (byteNumber-1)) > self.regSetting)\n{\n  [NSException\
    \ raise:NSRangeException\n              format:@\"Byte selected (%ld) exceeds\
    \ number value\",\n   (unsigned long)index];\n}\n```\n\n`setObject:atIndexedSubscript:`方法的实现首先执行逻辑，验证选定的寄存器是否在范围内，并且输入值不为`nil`，如果任一条件不满足则抛出异常。然后，该方法将选定的寄存器字节的值设置为输入值。\n\
    \n```objectivec\nuint32 mask = ∼(kByteMultiplier << byteNumber);\nuint32 tmpValue\
    \ = self.regSetting & mask;\nunsigned char newByte = [newValue unsignedCharValue];\n\
    self.regSetting = (newByte << byteNumber) | tmpValue;\n```\n\n请注意，这两个自定义下标方法都执行位级操作，以在其单个位的级别上获取/设置寄存器的值。按位左移（`<<`）和右移（`>>`）运算符用于将数字中的每个位向左或向右移动指定的位数。按位取反运算符（`∼`）用于翻转数字的位。按位或运算符（`|`）对两个数字执行逐位的逻辑或运算，而按位与运算符（`&`）对两个数字执行逐位的逻辑与运算。\n\
    \n好了，以上总结了`RegEdit`类实现的关键细节。现在你将实现`CLIParser`类，选择`CLIParser.m`文件，并更新`CLIParser`类的实现，如[清单16-20](#9781430250500_Ch16.xhtml#list20)所示。\n\
    \n[*清单16-20*](#9781430250500_Ch16.xhtml#_list20) CLIParser实现\n\n```objectivec\n\
    #import \"CLIParser.h\"\n#import \"RegEditConstants.h\"\n\nNSString *HelpCommand\
    \ =\n@\"\\n  RegEdit -n [Hex initial register settings] -b [byte number] -v [hex\
    \ byte value]\";\nNSString *HelpDesc = @\"\\n\\nNAME\\n  RegEdit - Get/set selected\
    \ byte of a register.\";\nNSString *HelpSynopsis = @\"\\n\\nSYNOPSIS\";\nNSString\
    \ *HelpOptions = @\"\\n\\nOPTIONS\";\nNSString *HelpRegValue = @\"\\n  -n\\tThe\
    \ initial register settings.\";\nNSString *HelpRegByte = @\"\\n  -b\\tThe byte\
    \ to retrieve from the register.\";\nNSString *HelpByteValue = @\"\\n  -v\\tValue\
    \ to set for the selected register byte.\";\n\n@implementation CLIParser\n\n//\
    \ Private instance variables\n{\n  const char **argValues;\n  int argCount;\n\
    }\n\n- (id) initWithCount:(int)argc arguments:(const char *[])argv\n{\n  if ((self\
    \ = [super init]))\n  {\n    argValues = argv;\n    argCount = argc;\n  }\n  return\
    \ self;\n}\n\n- (BOOL) parseWithRegister:(uint32 *)registerValue\n           \
    \     byteNumber:(NSInteger *)byteN\n                 doSetByte:(BOOL *)doSet\n\
    \                 byteValue:(unsigned int *)byteValue\n                     error:(NSError\
    \ **)anError\n{\n  // Retrieve command line arguments using NSUserDefaults\n \
    \ NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n  NSString\
    \ *numberString = [defaults stringForKey:@\"n\"];\n  NSString *byteString = [defaults\
    \ stringForKey:@\"b\"];\n  NSString *valueString = [defaults stringForKey:@\"\
    v\"];\n\n// Display help message if register value or byte number not provided\n\
    \  if (!numberString || !byteString)\n  {\n    NSString *help = [NSString stringWithFormat:@\"\
    %@%@%@%@%@%@%@\",\n                      HelpDesc, HelpSynopsis, HelpCommand,\n\
    \                      HelpOptions, HelpRegValue, HelpRegByte,\n             \
    \         HelpByteValue];\n    printf(\"%s\\n\", [help UTF8String]);\n    return\
    \ NO;\n  }\n\n// Scan input register value\n  NSScanner *scanner = [NSScanner\
    \ scannerWithString:numberString];\n  if (!numberString ||\n      ([numberString\
    \ length] == 0) ||\n      ([numberString length] > kRegisterSize*2) ||\n     \
    \ ![scanner scanHexInt:registerValue])\n  {\n    // Create error and return NO\n\
    \    if (anError != NULL)\n    {\n      NSString *msg =\n      [NSString stringWithFormat:\n\
    \       @\"ERROR!, Register value must be from 1-%ld hexadecimal characters\"\
    ,\n       kRegisterSize*2];\n      NSString *description = NSLocalizedString(msg,\
    \ @\"\");\n      NSDictionary *info = @{NSLocalizedDescriptionKey:description};\n\
    \      int errorCode = 1;\n      *anError = [NSError errorWithDomain:@\"CustomErrorDomain\"\
    \n                                     code:errorCode\n                      \
    \           userInfo:info];\n    }\n    return NO;\n  }\n```"
  raw: 'The interface begins by declaring a read-only property named `regSetting`.
    It is used to store the binary value (1/0) of each bit of a register. The property
    is of type `uint32`, a standard C type for an unsigned, (exactly) 32-bit wide
    integer; hence the register is 32-bits wide. The `initWithValue:` method initializes
    a `RegEdit` instance with the desired initial register settings. The `objectAtIndexedSubscript:`
    and `setObject:atIndexedSubscript:` methods are used to implement custom subscripting
    of `RegEdit` objects.


    Now select the **RegEdit.m** file and update the implementation, as shown in [Listing
    16-19](#9781430250500_Ch16.xhtml#list19).


    [*Listing 16-19.*](#9781430250500_Ch16.xhtml#_list19)  RegEdit Implementation


    ```

    #import "RegEdit.h"

    #import "RegEditConstants.h"


    @interface RegEdit()


    @property (readwrite) uint32 regSetting;


    @end


    @implementation RegEdit


    - (id) initWithValue:(uint32)value

    {

      if ((self = [super init]))

      {

        _regSetting = value;

      }

      return self;

    }


    - (id) objectAtIndexedSubscript:(NSInteger)index

    {

      NSUInteger byteNumber = index * 8;

      if ((1 << byteNumber) > self.regSetting)

      {

        [NSException raise:NSRangeException

                    format:@"Byte selected (%ld) exceeds number value", index];

      }

      unsigned int byteValue =

        (self.regSetting & (kByteMultiplier << byteNumber)) >> byteNumber;

      return [NSNumber numberWithUnsignedInt:byteValue];

    }


    - (void) setObject:(id)newValue atIndexedSubscript:(NSInteger)index

    {

      if (newValue == nil)

      {

        [NSException raise:NSInvalidArgumentException

                    format:@"New value is nil"];

      }


    NSUInteger byteNumber = index * 8;

      if ((1 << byteNumber) > self.regSetting)

      {

        [NSException raise:NSRangeException

                    format:@"Byte selected (%ld) exceeds number value", index];

      }

      uint32 mask = ∼(kByteMultiplier << byteNumber);

      uint32 tmpValue = self.regSetting & mask;

      unsigned char newByte = [newValue unsignedCharValue];

      self.regSetting = (newByte << byteNumber) | tmpValue;

    }


    @end

    ```


    The `RegEdit` class extension at the beginning of the file makes the `regSetting`
    property writeable in order to enable its value to be updated by other methods
    within the class implementation. The `RegEdit` implementation begins by defining
    the `initWithValue:` method. This method initializes the `regSetting` property
    with the input parameter value. Next, the implementation defines the `objectAtIndexedSubscript:`
    method. This method retrieves the value of a byte from the register, where the
    byte retrieved is that specified by the input parameter (index). The RegEdit register
    represents a *little-endian* machine; hence the least significant byte has the
    lowest memory address (i.e., byte 0). The selected register byte is returned as
    an unsigned integer wrapped in an `NSNumber` instance. The method also includes
    logic that checks the input parameter value and raises an exception if the byte
    selected exceeds the register value.


    ```

    if ((2 << (byteNumber-1)) > self.regSetting)

    {

      [NSException raise:NSRangeException

                  format:@"Byte selected (%ld) exceeds number value",

       (unsigned long)index];

    }

    ```


    The `setObject:atIndexedSubscript:` method implementation begins by executing
    logic that verifies the selected register is within range and the input value
    is not `nil`, raising an exception if either condition is not true. The method
    then sets the value of the selected register byte to the input value.


    ```

    uint32 mask = ∼(kByteMultiplier << byteNumber);

    uint32 tmpValue = self.regSetting & mask;

    unsigned char newByte = [newValue unsignedCharValue];

    self.regSetting = (newByte << byteNumber) | tmpValue;

    ```


    Notice that both custom subscripting methods perform bit-level operations to get/set
    the register’s values at the level of its individual bits. The bitwise left-shift
    (`<<`) and right-shift (`>>`) operators are used to move each bit in a number
    the specified number of bits to the left or right. The bitwise complement operator
    (`∼`) is used to flip the bits of a number. The bitwise OR operator (`|`) performs
    a bit-by-bit, logical OR operation on two numbers, whereas the bitwise AND operator
    (`&`) performs a bit-by-bit, logical AND operation on two numbers.


    OK, that summarizes the key details of the `RegEdit` class implementation. Now
    you will implement the `CLIParser` class, select the `CLIParser.m` file, and update
    the `CLIParser` class implementation, as shown in [Listing 16-20](#9781430250500_Ch16.xhtml#list20).


    [*Listing 16-20.*](#9781430250500_Ch16.xhtml#_list20)  CLIParser Implementation


    ```

    #import "CLIParser.h"

    #import "RegEditConstants.h"


    NSString *HelpCommand =

    @"\n  RegEdit -n [Hex initial register settings] -b [byte number] -v [hex byte
    value]";

    NSString *HelpDesc = @"\n\nNAME\n  RegEdit - Get/set selected byte of a register.";

    NSString *HelpSynopsis = @"\n\nSYNOPSIS";

    NSString *HelpOptions = @"\n\nOPTIONS";

    NSString *HelpRegValue = @"\n  -n\tThe initial register settings.";

    NSString *HelpRegByte = @"\n  -b\tThe byte to retrieve from the register.";

    NSString *HelpByteValue = @"\n  -v\tValue to set for the selected register byte.";


    @implementation CLIParser


    // Private instance variables

    {

      const char **argValues;

      int argCount;

    }


    - (id) initWithCount:(int)argc arguments:(const char *[])argv

    {

      if ((self = [super init]))

      {

        argValues = argv;

        argCount = argc;

      }

      return self;

    }


    - (BOOL) parseWithRegister:(uint32 *)registerValue

                    byteNumber:(NSInteger *)byteN

                     doSetByte:(BOOL *)doSet

                     byteValue:(unsigned int *)byteValue

                         error:(NSError **)anError

    {

      // Retrieve command line arguments using NSUserDefaults

      NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];

      NSString *numberString = [defaults stringForKey:@"n"];

      NSString *byteString = [defaults stringForKey:@"b"];

      NSString *valueString = [defaults stringForKey:@"v"];


    // Display help message if register value or byte number not provided

      if (!numberString || !byteString)

      {

        NSString *help = [NSString stringWithFormat:@"%@%@%@%@%@%@%@",

                          HelpDesc, HelpSynopsis, HelpCommand,

                          HelpOptions, HelpRegValue, HelpRegByte,

                          HelpByteValue];

        printf("%s\n", [help UTF8String]);

        return NO;

      }


    // Scan input register value

      NSScanner *scanner = [NSScanner scannerWithString:numberString];

      if (!numberString ||

          ([numberString length] == 0) ||

          ([numberString length] > kRegisterSize*2) ||

          ![scanner scanHexInt:registerValue])

      {

        // Create error and return NO

        if (anError != NULL)

        {

          NSString *msg =

          [NSString stringWithFormat:

           @"ERROR!, Register value must be from 1-%ld hexadecimal characters",

           kRegisterSize*2];

          NSString *description = NSLocalizedString(msg, @"");

          NSDictionary *info = @{NSLocalizedDescriptionKey:description};

          int errorCode = 1;

          *anError = [NSError errorWithDomain:@"CustomErrorDomain"

                                         code:errorCode

                                     userInfo:info];

        }

        return NO;

      }'
