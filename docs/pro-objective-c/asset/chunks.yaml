              [coder2 valueForKeyPath:@"person.fullName"],

              [coder2 valueForKey:@"languages"]);


    [curly addObserver:coder1

                forKeyPath:@"fullName"

                   options:NSKeyValueObservingOptionNew

                   context:NULL];

        curly.lastName = @"Fine";

        [curly removeObserver:coder1 forKeyPath:@"fullName"];


    Coders *bestCoders = [Coders new];

        bestCoders.developers = [[NSSet alloc] initWithArray:@[coder1, coder2]];

        [bestCoders valueForKey:@"developers"];

        NSLog(@"Number of coders = %@", [bestCoders.developers

                                         valueForKeyPath:@"@count"]);

        NSError *error;

        NSString *emptyName = @"";

        BOOL valid = [curly validateValue:&emptyName forKey:@"lastName" error:&error];

        if (!valid)

        {

          NSLog(@"Error: %@", ([error userInfo])[NSLocalizedDescriptionKey]);

        }

      }

      return 0;

    }

    ```


    The function first creates a `Person` instance and then uses key-value coding
    to retrieve values for its properties. Next, a `Coder` instance is created, and
    its `person` and `languages` property are set. The key-value coding APIs are then
    used to retrieve the corresponding property values. Another `Coder` instance is
    then created and its property values are set accordingly. Key-value observing
    is then demonstrated, with a `Coder` instance registered to receive notifications
    when the `fullName` property of a `Person` instance is changed. A `Coders` instance
    (remember, the `Coders` class holds a collection of `Coder` instances) is then
    created and its `developers` property is assigned to the collection of `Coder`
    instances created previously. A collection operator is then used to return the
    total number of coders in the collection. Finally, key-value coding validation
    is demonstrated on the `lastName` property of a Person instance.


