- fmt: '# LLDB Architecture


    LLDB is designed with a plug-in-based architecture for portability and extensibility.
    This enables it to easily utilize different implementations for supported functionality
    and to incorporate new plug-ins with no impact on the existing codebase. The plug-in
    architecture is currently used for object file parsers (currently supports Mach-O
    and ELF files), object container parsers (Mach-O and BSD archives), debug symbol
    file parsers (DWARF and Mach-O symbol tables), symbol vendors, disassembly (LLVM
    and ARM/Thumb), and general debugger plug-ins for host and target-specific functions.


    ## Multithreaded Debugging


    Many programs have multiple threads, and debugging multithreaded applications
    can be difficult under even the best circumstances. LLDB is designed to support
    multithreaded debugging. It displays diagnostic information for each thread and
    provides a set of commands for operating on one or more threads within an application.


    ## LLDB Commands


    LLDB includes a comprehensive set of debugging commands that can be used with
    both Xcode and the command-line tool. The following are several of the commonly
    used LLDB debugger commands:


    *   `apropos`: Finds a list of debugger commands related to a particular word
    or subject.

    *   `breakpoint`: A set of commands that perform operations on breakpoints (set,
    clear, enable, disable, etc.). A breakpoint pauses execution of a target program,
    thereby enabling you to examine its current state. LLDB supports line breakpoints
    (set on a line of source code), symbolic breakpoints (set on a symbol [e.g., function/method
    name] in a program), and exception breakpoints (set when an exception is thrown
    or caught).

    *   `disassemble`: Disassemble bytes in a function, an address, and so forth.

    *   `expression`: Evaluates a C/C++/Objective-C expression in the current target
    using both user-defined variables and variables currently in scope.

    *   `frame`: A set of commands for operating on the current thread’s stack frame
    (info, select, variable).

    *   `help`: Shows a list of all debugger commands.

    *   `log`: A set of commands for operating on logs.

    *   `memory`: A set of commands that performs operations on memory (e.g., read
    from, write to).

    *   `process`: A set of commands for operating on a process (launch, kill, attach,
    detach, connect, etc.).

    *   `register`: A set of commands used to access thread registers (read, write,
    etc.).

    *   `thread`: A set of commands used to operate on one or more threads (single
    step, step over, continue, etc.). This enables you to control execution of a target
    program being debugged.

    *   `watchpoint`: A set of commands for operating on watchpoints (set, clear,
    enable, disable, etc.). A watchpoint is a form of conditional breakpoints set
    on a variable. It causes the target to stop execution whenever the value of the
    watched variable is changed.


    LLDB implements a structured command syntax that facilitates its use and provides
    a mechanism to construct aliases for commonly used commands. The command-line
    tool also supports command completion for source file names, symbol names, and
    so forth with the Tab key. The general syntax for LLDB CLI commands is as follows:


    ```

    <noun> <verb> [-options [option-value]] [argument [argument...]]

    ```


    Each command has a subcommand (i.e., the verb) along with its applicable options
    and arguments. [Listing C-1](#9781430250500_AppC.xhtml#list1) depicts an example
    of an LLDB debugging session of the application named `FirstProject` (recall that
    you developed this application in [Chapter 1](#9781430250500_Ch01.xhtml)) using
    the command-line tool.


    *Listing C-1.* Example LLDB Debug Session Using the Command-Line Tool:


    ```

    % xcrun lldb

    (lldb) target create FirstProject

    (lldb) breakpoint set --name main

    (lldb) process launch

    (lldb) thread step-over

    (lldb) breakpoint set --line 42

    (lldb) thread continue

    (lldb) expression (void)NSLog(@"Date = %@", dateTime)

    (lldb) quit

    ```


    As shown in [Listing C-1](#9781430250500_AppC.xhtml#list1), `xcrun` is an Xcode
    command that loads a binary contained within an Xcode bundle. This enables you
    to run LLDB from the command line. Next, the `target create` command loads the
    `FirstProject` application as a target for the debugger. The `breakpoint set`
    command sets a breakpoint at the `main` method. The `expression (void)NSLog(@"Date
    = %@", dateTime)` command evaluates an Objective-C expression that displays the
    current value for the `dateTime` object. The `quit` command ends the debugging
    session.


    ## Xcode LLDB Integration


    LLDB is the default debugger in Xcode, which augments the standard functionality
    of LLDB with a variety of features that can make you more efficient at debugging
    your code. [Figure C-2](#9781430250500_AppC.xhtml#Fig2) depicts an example debugging
    session in Xcode. In the following paragraphs, you will examine these features
    in more detail.


    ![9781430250500_AppC-02.jpg](images/9781430250500_AppC-02.jpg)


    *Figure C-2.* Xcode debugging with LLDB


    ### Debug Navigator


    The debug navigator (displayed by selecting **Navigators** ![image](images/arrow.jpg)
    **Show Debug Navigator** from the Xcode **View** menu) displays the call stacks
    of your application when paused at a breakpoint. The navigator groups the stack
    frames by threads or queues (depending upon the view selected). It also enables
    you to view the memory of variables. The debug navigator opens automatically whenever
    you pause a running application or it hits a breakpoint. [Figure C-3](#9781430250500_AppC.xhtml#Fig3)
    depicts the debug navigator pane.


    ![9781430250500_AppC-03.jpg](images/9781430250500_AppC-03.jpg)


    *Figure C-3.* Debug navigator pane


    ### Breakpoint Navigator


    The breakpoint navigator (displayed by selecting **Navigators** ![image](images/arrow.jpg)
    **Show Breakpoint Navigator** from the Xcode **View** menu) is used to edit, disable,
    and delete breakpoints in a project or workspace. You can add/delete a (line,
    exception, or symbolic) breakpoint, set breakpoint actions and options, specify
    the scope of a breakpoint, and share a breakpoint. [Figure C-4](#9781430250500_AppC.xhtml#Fig4)
    depicts the breakpoint navigator pane.


    ![9781430250500_AppC-04.jpg](images/9781430250500_AppC-04.jpg)


    *Figure C-4.* Breakpoint navigator pane


    ### Breakpoint Actions


    A breakpoint action defines an operation performed when a target program reaches
    a breakpoint. Xcode provides the following breakpoint actions.


    *   `Debugger command`: This action evaluates a debugger command. As you recall
    from earlier in this appendix, the debugger is able to execute C/C++/Objective-C
    expressions, making this a very powerful tool.

    *   `Log message command`: This command logs a message to the output console or
    speaks a message.

    *   `Shell command`: This command executes a shell command (`/usr/bin/ls`, etc.).

    *   `Sound command`: This command plays a sound.

    *   `AppleScript command`: This command evaluates AppleScript code.


    Breakpoint actions are configured when you edit a breakpoint. This can be done
    in the breakpoint navigator by Control-clicking the breakpoint, and then choosing
    **Edit Breakpoint...** from the shortcut menu (as shown in [Figure C-5](#9781430250500_AppC.xhtml#Fig5)).


    ![9781430250500_AppC-05.jpg](images/9781430250500_AppC-05.jpg)


    *Figure C-5.* Editing a breakpoint from the breakpoint navigator pane'
