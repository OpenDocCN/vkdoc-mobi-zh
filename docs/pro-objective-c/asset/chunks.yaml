- fmt: "# 并发编程中的锁与消息传递\n\n## 锁机制实现策略\n\n- **实现锁获取的全序关系**：确保锁按照固定顺序获取和释放。这种方法需要深入了解线程化代码，且对于第三方软件可能并不可行。\n\
    - **防止持有并等待条件**：一次性原子性地获取所有锁。这要求任何线程在获取锁之前，必须先获取全局“预防”锁。该方法消除了持有并等待场景的可能性，但可能降低并发性，并且同样需要深入了解线程化代码。\n\
    - **提供抢占机制**：使用提供`trylock`或类似机制的锁，在可用时获取锁，否则返回适当的结果。这种方法可能导致活锁，并且仍然需要深入了解代码如何使用锁。\n\
    - **提供等待超时**：使用提供超时功能的锁，从而防止对锁的无限期等待。\n\n## 消息传递\n\n在消息传递模型中，状态不被共享；相反，线程通过交换消息进行通信。这种方法使线程能够通过消息交换实现同步和传递信息。消息传递避免了互斥相关的问题，并且自然地映射到多核、多处理器系统。消息传递可用于执行同步和异步通信。在同步消息传递中，发送者和接收者直接链接；发送者和接收者在消息交换期间阻塞。异步消息传递利用队列进行消息传输，如图\
    \ 17-4 所示。\n\n![9781430250500_Fig17-04.jpg](images/9781430250500_Fig17-04.jpg)\n\
    \n**图 17-4** 使用队列的消息传递\n\n消息不直接在线程之间发送，而是通过消息队列进行交换。因此，发送者和接收者解耦，发送者在将消息发布到队列时不会阻塞。异步消息传递可用于实现并发编程。事实上，下一节将介绍多个实现这一功能的框架。\n\
    \n# 使用 Objective-C 进行并发编程\n\n现在你已经了解了并发编程的一些关键问题，可以开始探索在 Objective-C 中实现并发编程的可用机制。这涵盖了从语言特性到\
    \ API 和系统服务，包括以下内容：\n\n- **语言特性**：Objective-C 语言包含多个支持并发编程的语言特性。`@synchronized`指令用于在\
    \ Objective-C 代码中创建锁。对 Objective-C 属性的线程安全访问可以通过`atomic`属性限定符声明式地指定。\n- **消息传递**：Foundation\
    \ 框架的`NSObject`类包含多个向其他线程传递消息的方法。这些方法将消息排队到目标线程的运行循环中，并且可以同步或异步执行。\n- **线程**：Foundation\
    \ 框架提供了一套完整的 API，用于直接创建和管理线程。它还包含一组用于对多个线程共享的数据进行同步访问的 Foundation 框架 API。\n- **操作队列**：这些是基于\
    \ Objective-C 的消息传递机制，采用异步设计方法执行并发编程。\n- **调度队列**：这些是基于 C 语言的一组语言特性和运行时服务，用于异步和并发地执行任务。\n\
    \n## 语言特性\n\n`@synchronized`指令提供了一种在 Objective-C 代码中创建锁的简单机制，从而使并发线程能够同步对共享状态的访问。在代码中使用该指令的语法如列表\
    \ 17-1 所示。\n\n**列表 17-1** `@synchronized`指令的语法\n\n```\n@synchronized(uniqueObj)\n\
    {\n  // 临界区 - 受该指令保护的代码\n}\n```\n\n列表 17-1 显示，`@synchronized`指令后跟一个圆括号内的唯一标识符和一个由花括号包围的受保护代码块。唯一标识符是一个用于区分受保护块的对象。如果多个线程尝试使用相同的唯一标识符访问此临界区，其中一个线程将首先获取锁，其他线程将阻塞，直到第一个线程执行完临界区。\n\
    \n请注意，`@synchronized`块会隐式地向受保护代码添加一个异常处理程序。该处理程序在抛出异常时自动释放锁。因此，你必须启用 Objective-C\
    \ 异常处理才能使用此指令。\n\nObjective-C 语言还包含一个旨在为属性提供原子访问的特性。`atomic`属性限定符是一个 Objective-C\
    \ 语言特性，旨在为属性提供原子访问，即使其访问器方法从不同线程并发调用也是如此。*原子*意味着无论属性是否被并发访问，属性的访问器方法始终设置/获取一个完整（一致）的值。以下语句声明了一个名为`greeting`的原子、可读写属性。\n\
    \n```\n@property (atomic, readwrite) NSString *greeting;\n```\n\n默认情况下，Objective-C\
    \ 属性是原子的，因此上述属性声明中不需要使用`atomic`关键字。\n\n请注意，`atomic`属性限定符为属性提供了原子访问，但并非线程安全。列表\
    \ 17-2 展示了一个名为`Person`的类，其接口声明了名为`firstName`和`lastName`的原子属性。\n\n**列表 17-2** `Person`类的原子属性\n\
    \n```\n@interface Person : NSObject\n@property (readwrite) NSString *firstName;\n\
    @property (readwrite) NSString *lastName;\n@end\n```\n\n尽管如前所述，`firstName`和`lastName`属性是原子的，但`Person`对象*不是*线程安全的。因此，如果两个不同的线程访问同一个`Person`对象，对该对象内每个单独属性的访问将是原子的，但名字相对于姓氏可能是不一致的，具体取决于访问顺序和执行的（获取/设置）操作。例如，以下语句声明了一个`Person`属性。\n\
    \n```\n@property (readwrite) Person *person;\n```\n\n该属性本身由两个可以原子访问的属性（`firstName`和`lastName`）组成，但`person`属性本身并不是线程安全的。这是因为没有提供任何机制来共同同步对其组件（即`firstName`和`lastName`）的并发访问（它们可能被独立修改）。这可以通过`@synchronized`指令或同步原语（你很快将了解）来实现。\n\
    \n## 消息传递\n\nFoundation 框架的`NSObject`类包含一组方法，这些方法使用消息传递范式在线程上调用对象的方法。该线程可以是现有的辅助线程或应用程序的主线程。方法选择器包括：\n\
    \n- `performSelector:onThread:withObject:waitUntilDone:`\n- `performSelector:onThread:withObject:waitUntilDone:modes:`\n\
    - `performSelectorOnMainThread:withObject:waitUntilDone:`\n- `performSelectorOnMainThread:withObject:waitUntilDone:modes:`"
  raw: '*   *Implement a total ordering on lock acquisition*. Make sure that locks
    are acquired and released in a fixed order. This approach requires detailed knowledge
    of the threaded code, and may not even be feasible for third-party software.

    *   *Prevent hold and wait conditions*. Acquire all locks at once, atomically.
    This requires that any time any thread grabs a lock, it first acquires the global
    *prevention* lock. This approach eliminates the possibility of hold-and-wait scenarios,
    but potentially decreases concurrency and also requires detailed knowledge of
    the threaded code.

    *   *Provide preemption*. Use locks that provide a *trylock* or similar mechanism
    to grab a lock, if available, or return an appropriate result if not. This approach
    has the potential of causing livelock, and still requires detailed knowledge of
    how the code is using locks.

    *   *Provide timeouts on waits*. Use locks that provide a timeout feature, thereby
    preventing indefinite waits on a lock.


    Message Passing


    In the message passing, model state is not shared; instead, the threads communicate
    by exchanging messages. This approach enables threads to both synchronize and
    communicate information through message exchanges. Message passing avoids the
    issues surrounding mutual exclusion and it maps naturally to multiple core, multiple
    processor systems. Message passing can be used to perform both synchronous and
    asynchronous communication. With synchronous message passing, the sender and receiver
    are directly linked; the sender and receiver block while the message exchange
    is performed. Asynchronous message passing utilizes queues for message transfer,
    as shown in [Figure 17-4](#9781430250500_Ch17.xhtml#Fig4).


    ![9781430250500_Fig17-04.jpg](images/9781430250500_Fig17-04.jpg)


    [Figure 17-4](#9781430250500_Ch17.xhtml#_Fig4). Message passing using queues


    Messages are not sent directly between threads, but rather are exchanged through
    message queues. Hence, the sender and receiver are decoupled and the sender does
    not block when it posts a message to the queue. Asynchronous message passing can
    be used to implement concurrent programming. In fact, the next section will cover
    several frameworks that do just that.


    Concurrent Programming with Objective-C


    Now that you understand some of the key issues regarding concurrent programming,
    you can begin to explore the mechanisms available to implement concurrent programming
    in Objective-C. This ranges from language features to APIs and system services,
    and includes the following:


    *   *Language features*: The Objective-C language includes several language features
    to support concurrent programming. The `@synchronized` directive is used to create
    locks in Objective-C code. Thread-safe access to Objective-C properties can be
    specified declaratively using the `atomic` property qualifier.

    *   *Message passing*: The Foundation Framework `NSObject` class includes several
    methods that deliver messages to other threads. These methods queue the messages
    on the run loop of the target thread and can be performed synchronously or asynchronously.

    *   *Threads*: The Foundation Framework provides a complete set of APIs for directly
    creating and managing threads. It also includes a set of Foundation Framework
    APIs for performing synchronized access to data shared by multiple threads.

    *   *Operation queues*: These are Objective-C based message-passing mechanisms
    that utilize an asynchronous design approach to perform concurrent programming.

    *   *Dispatch queues*: These are a C-based set of language features and runtime
    services used to perform tasks asynchronously and concurrently.


    Language Features


    The `@synchronized` directive provides a simple mechanism for creating locks in
    Objective-C code, thereby enabling concurrent threads to synchronize access to
    shared state. The syntax for using this directive in your code is shown in [Listing
    17-1](#9781430250500_Ch17.xhtml#list1).


    [*Listing 17-1.*](#9781430250500_Ch17.xhtml#_list1)  Syntax for the @synchronized
    Directive


    ```

    @synchronized(uniqueObj)

    {

      // Critical section - code protected by the directive

    }

    ```


    [Listing 17-1](#9781430250500_Ch17.xhtml#list1) shows that the `@synchronized`
    directive is followed by a unique identifier in parentheses and a protected block
    of code surrounded by braces. The unique identifier is an object used to distinguish
    the protected block. If multiple threads attempt to access this critical section
    with the same unique identifier, one of the threads would acquire the lock first
    and the other(s) would block until the first thread finished executing the critical
    section.


    Note that the `@synchronized` block implicitly adds an exception handler to the
    protected code. This handler automatically releases the lock in the event that
    an exception is thrown. Hence, you must enable Objective-C exception handling
    in your code in order to use this directive.


    The Objective-C language also includes a feature that is intended to provide atomic
    access to properties. The atomic property qualifier is an Objective-C language
    feature that is designed to provide atomic access to a property, even when its
    accessor methods are called concurrently from different threads. *Atomic* means
    that a property’s accessor methods always set/get a complete (consistent) value,
    regardless of whether the property is being accessed concurrently. The following
    statement declares an atomic, read-write property named `greeting`.


    ```

    @property (atomic, readwrite) NSString *greeting;

    ```


    By default, an Objective-C property is atomic, hence the use of the `atomic` keyword
    in the preceding property declaration is not necessary.


    Note that the atomic property qualifier provides atomic access for a property,
    but not thread safety. [Listing 17-2](#9781430250500_Ch17.xhtml#list2) depicts
    a class named `Person` whose interface declares atomic properties named `firstName`
    and `lastName`.


    [*Listing 17-2.*](#9781430250500_Ch17.xhtml#_list2)  Person Class Atomic Properties


    ```

    @interface Person : NSObject

    @property (readwrite) NSString *firstName;

    @property (readwrite) NSString *lastName;

    @end

    ```


    Although the properties `firstName` and `lastName` are atomic, as specified earlier,
    a `Person` object is *not* thread-safe. Hence, if two different threads accessed
    the same `Person` object, access to each of the individual properties within the
    object would be atomic, but the names could be inconsistent relative to each other,
    depending upon the order of access and the (get/set) operations performed. For
    example, the following statement declares a `Person` property.


    ```

    @property (readwrite) Person *person;

    ```


    The property is itself composed of two properties (`firstName` and `lastName`)
    that can be accessed atomically, but the `person` property itself is not thread-safe.
    This is due to the fact that there is no mechanism provided to collectively synchronize
    concurrent access to its components (i.e., `firstName` and `lastName` could be
    modified independently). This can be accomplished using the `@synchronized` directive
    or a synchronization primitive, which you will learn about shortly.


    Message Passing


    The Foundation Framework `NSObject` class includes a collection of methods that
    use the message-passing paradigm to invoke a method on an object with a thread.
    The thread can be an existing secondary thread or the main application thread.
    The method selectors are


    *   `performSelector:onThread:withObject:waitUntilDone:`

    *   `performSelector:onThread:withObject:waitUntilDone:modes:`

    *   `performSelectorOnMainThread:withObject:waitUntilDone:`

    *   `performSelectorOnMainThread:withObject:waitUntilDone:modes:`'
  trans: "\n# 并发编程中的锁与消息传递\n\n## 锁机制实现策略\n\n-   **实现锁获取的全序关系**：确保锁按照固定顺序获取和释放。这种方法需要深入了解线程化代码，且对于第三方软件可能并不可行。\n\
    -   **防止持有并等待条件**：一次性原子性地获取所有锁。这要求任何线程在获取锁之前，必须先获取全局“预防”锁。该方法消除了持有并等待场景的可能性，但可能降低并发性，并且同样需要深入了解线程化代码。\n\
    -   **提供抢占机制**：使用提供 `trylock` 或类似机制的锁，在可用时获取锁，否则返回适当的结果。这种方法可能导致活锁，并且仍然需要深入了解代码如何使用锁。\n\
    -   **提供等待超时**：使用提供超时功能的锁，从而防止对锁的无限期等待。\n\n## 消息传递\n\n在消息传递模型中，状态不被共享；相反，线程通过交换消息进行通信。这种方法使线程能够通过消息交换实现同步和传递信息。消息传递避免了互斥相关的问题，并且自然地映射到多核、多处理器系统。消息传递可用于执行同步和异步通信。在同步消息传递中，发送者和接收者直接链接；发送者和接收者在消息交换期间阻塞。异步消息传递利用队列进行消息传输，如图\
    \ 17-4 所示。\n\n![9781430250500_Fig17-04.jpg](img/9781430250500_Fig17-04.jpg)\n\n\
