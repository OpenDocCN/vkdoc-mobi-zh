    Message Dispatch


    Messaging is a fundamental concept in OOP. It is the mechanism used to invoke
    a method on an object. The receiving object (i.e., receiver) of a message determines
    at runtime which of its instance methods to invoke. Instance methods have access
    to an object’s instance variables along with its instance methods. The Objective-C
    syntax for sending a message to (i.e., invoking a method on) an object is


    ```

    [receiver messageNameParams]

    ```


