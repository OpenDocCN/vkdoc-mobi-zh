    }\n\n// 属性声明\n// 方法声明\n@end\n```\n\n类扩展通常放在与类实现文件相同的文件中，用于组合和声明额外的、必需的私有方法（例如，不属于公开声明的`API`），仅供类内部使用。\n\
    \n## 附录 B\n\n## Xcode 揭秘！\n\n`Xcode`是一个用于开发、管理和维护在`Apple OS X`和`iOS`平台上运行的软件产品的综合性工具集。它包括一个`IDE`、编译器、调试器以及众多其他工具。`Xcode`还捆绑了`OS\
    \ X`和`iOS`软件开发工具包（`SDK`），其中包括`Cocoa`和`Cocoa Touch`框架。您一直在使用`Xcode`来开发和运行本书中提供的示例应用程序，因此到现在为止，您已经熟悉了它的几个基本功能。在本附录中，您将“看看引擎盖下面”，深入探索`Xcode`的一些关键特性。具体来说，您将检查构成`Xcode`基础的关键概念，并通过这样做，更熟悉它的一些关键工具。\n\
    \n## 基本概念\n\n从用户的角度来看，`Xcode`围绕几个基本概念组织：项目、工作区、目标、方案和动作。在接下来的几段中，您将了解更多关于这些概念以及它们在`Xcode`中如何使用的内容。\n\
    \n## 目标\n\n一个*目标*是`Xcode`中的基本概念。它由用于构建软件产品的一组指令组成。一个目标由关于如何构建产品的规则和设置组成，并定义了一组*构建阶段*，即用于执行实际软件构建的步骤序列。\n\
    \n每个目标接收一组输入（源文件、资源、构建指令等）并生成一个产品作为其输出。产品可以是一个应用程序、软件库等等。一个`Xcode`项目可以有多个目标，每个目标都可以有自己的一套用于构建软件产品的指令。\n\
    \n一个目标可以依赖于其他目标（例如，*依赖目标*）。当选中目标被构建时，`Xcode`会自动构建其依赖目标。`Xcode`提供了管理目标（创建、更新、删除、管理它们之间的依赖关系）和管理目标文件（添加、删除、设置头文件角色）的功能。\n\
    \n## 构建阶段\n\n构建阶段定义了构建产品的各个阶段。其中三个阶段——`Compile Sources`、`Link Binary With Libraries`和`Copy\
    \ Bundle Resources`——是必需的，其他阶段可以根据需要添加。由于构建阶段定义了目标将如何被构建，更改构建阶段会改变构建过程。\n\n##\
    \ 构建设置\n\n构建设置定义了在构建过程的各个阶段要做什么，从而提供了一种自定义该过程的方法。实际上有多个构建设置值列表，每个列表被称为一个*构建配置*。构建配置是一个命名的构建设置集合，用于以特定方式构建目标产品。它们提供了一种机制来构建同一目标的不同版本。您还可以创建构建配置文件。这些文件使您能够轻松地在目标、项目和开发人员之间共享一组构建设置定义。\n\
    \n## 构建配置\n\n项目构建配置用于构建软件产品。它包含构建设置定义。这些可以嵌入在`Xcode`项目文件中，或存储在单独的配置设置文件中。当您创建一个项目时，`Xcode`提供两个默认的嵌入式构建配置：*Debug*和*Release*，它们主要在是否包含调试信息以及构建的优化程度上有所不同。*Debug*配置通常在整个开发过程中使用，而*Release*配置用于后期测试阶段，当您想在设备上检查性能时。*Debug*配置的一些构建设置如*列表\
    \ B-1*所示。\n\n*列表 B-1.* 调试构建设置\n\n```\nONLY_ACTIVE_ARCH=YES\nCONFIGURATION_BUILD_DIR=build/Debug\n\
    COPY_PHASE_STRIP=NO\nGCC_OPTIMIZATION_LEVEL=0\nGCC_PREPROCESSOR_DEFINITIONS=DEBUG=1\n\
    ```\n\n配置设置文件是一个纯文本文件，每行指定一个构建设置定义。如果您要从现有的构建配置中创建一个新的构建配置，它必须仅基于您项目中的配置文件，而不能是外部文件。\n\
    \n## 构建规则\n\n构建规则提供了在逐个目标的基础上处理文件的指令。`Xcode`提供了一组默认的构建规则，您可以添加自己的自定义构建规则，以对特定文件类型执行自定义处理。\n\
    \n构建规则规定了特定类型的文件如何处理，以及在构建阶段使用哪个工具来处理文件。每个构建规则由一个条件和一个动作组成。条件通常指定一个文件类型，决定一个源文件是否与关联的动作一起被处理。\n"
- fmt: "Xcode provides default build rules that process a variety of file types, including\
    \ C-based files (such as Objective-C files) and assembly files. You can add custom\
    \ build rules to process other types of files to each target. These are added\
    \ in the Build Rules pane of the editor window, as shown in [Figure B-1](#9781430250500_AppB.xhtml#Fig1).\
    \ Build rules are processed in the order they appear in the Rules pane.\n\n![9781430250500_AppB-01.jpg](images/9781430250500_AppB-01.jpg)\n\
    \n[Figure B-1](#9781430250500_AppB.xhtml#_Fig1). The Build Rules editing pane\n\
    \n## Creating a Configuration Settings File\n\nIn this example, you will use Xcode\
    \ to create a plain-text build configuration settings file for a project.\n\n\
    1.  In Xcode, create a new project by selecting **New ![image](images/arrow.jpg)\
    \ Project …** from the Xcode File menu.\n2.  In the **New Project Assistant**\
    \ pane, create a command-line application.\n3.  In the **Project Options** window\
    \ specify **ConfigSettingsProject** for the Product Name, choose **Foundation**\
    \ for the Project Type, and select ARC memory management by selecting the **Use\
    \ Automatic Reference Counting** check box.\n4.  Specify the location in your\
    \ file system where you want the project to be created (if necessary select **New\
    \ Folder** and enter the name and location for the folder), uncheck the **Source\
    \ Control** check box, and then click the **Create** button.\n5.  Now you will\
    \ create the configuration settings file. Select **New ![image](images/arrow.jpg)\
    \ File …** from the Xcode File menu and select the **Configuration Settings File**\
    \ template from the **Other** option under OS X (as shown in [Figure B-2](#9781430250500_AppB.xhtml#Fig2)).\n\
    \n![9781430250500_AppB-02.jpg](images/9781430250500_AppB-02.jpg)\n\n[Figure B-2](#9781430250500_AppB.xhtml#_Fig2).\
    \ Selecting a configuration settings file\n\n6.  Name the file **Test**, select\
    \ the **ConfigSettingsProject** folder for the files location and the **ConfigSettingsProject**\
    \ project as the target, and then click the **Create** button.\n7.  This creates\
    \ an empty configuration settings file named `Test.xconfig`. Now update this file\
    \ to support code coverage during testing. This is accomplished by setting the\
    \ configuration flags to **Enable test coverage** and **Instrument program flow**.\n\
    \n```\n    GCC_GENERATE_TEST_COVERAGE_FILES=YES\n    GCC_INSTRUMENT_PROGRAM_FLOW_ARCS=YES\n\
    ```\n\n8.  In Xcode, select and update the `Test.xconfig` file, as shown in [Figure\
    \ B-3](#9781430250500_AppB.xhtml#Fig3).\n\n![9781430250500_AppB-03.jpg](images/9781430250500_AppB-03.jpg)\n\
    \n[Figure B-3](#9781430250500_AppB.xhtml#_Fig3). Edit the configuration settings\
    \ file to support code coverage\n\nNow you need to add the settings from the file\
    \ to the current build configuration for the project.\n\n1.  In the Xcode project\
    \ navigator, select the **ConfigSettingsProject**, and then the **ConfigSettingsProject**\
    \ in the Project Editor, and finally the **Info** tab in the Editor window. Note\
    \ that the **Debug** configuration (under **Configurations** in the Editor window)\
    \ has no configurations set.\n2.  Click the arrow next to Debug to display the\
    \ ConfigSettingsProject, and then under the configuration file drop-down list\
    \ select **Test** (as shown in [Figure B-4](#9781430250500_AppB.xhtml#Fig4)) to\
    \ update the Debug configuration settings with the values in the `Test.xconfig`\
    \ file.\n\n![9781430250500_AppB-04.jpg](images/9781430250500_AppB-04.jpg)\n\n\
    [Figure B-4](#9781430250500_AppB.xhtml#_Fig4). Assigning configuration file settings\
    \ to build configuration\n\nThe settings for the debug configuration have now\
    \ been updated. You can check this by viewing the updated build settings for test\
    \ coverage (see [Figure B-5](#9781430250500_AppB.xhtml#Fig5)).\n\n![9781430250500_AppB-05.jpg](images/9781430250500_AppB-05.jpg)\n\
    \n[Figure B-5](#9781430250500_AppB.xhtml#_Fig5). Updated test coverage build settings\n\
    \nThe Xcode Build Setting Reference provides a comprehensive reference for the\
    \ various build settings available for Xcode.\n\n## Projects\n\nAn Xcode project\
    \ is comprised of the artifacts for one or more software products, along with\
    \ the mechanisms used to build these products and perform actions on them. As\
    \ such, it contains not only all of the elements used to build a software product(s),\
    \ but also maintains the relationships between these elements. Each Xcode project\
    \ consists of the following items:\n\n*   *Project content*. The project content\
    \ includes source files, resources, property list settings files, a precompiled\
    \ header file, localization files, etc.).\n*   *Test content*. The test content\
    \ consists of automated test source files and any required test resources.\n*\
    \   *Xcode project file*. The Xcode project file is actually a subdirectory. It\
    \ contains various files and directories related to the project that it is a part\
    \ of. The project file artifacts provide the infrastructure required to build\
    \ a product and perform the selected actions on it. An Xcode project file is named\
    \ according to the convention `ProjectName.xcodeproj`, where `ProjectName` is\
    \ the name of the Xcode project. The files (and directories) within an Xcode project\
    \ file contain the following information:\n    *   References to project and test\
    \ content (source code, libraries and frameworks (both internal and external),\
    \ resource files, storyboard and nib files).\n    *   Group folders used to organize\
    \ source files.\n    *   Targets, where each target includes a reference to one\
    \ product build by the project, references to the source file(s) needed to build\
    \ that product, and the build configurations that can be used to build that product).\n\
    \    *   Project-level build configurations.\n    *   Executable environments.\n\
    \nAs an example, an Xcode project named `GreetingProject` would be comprised of\
    \ the following files and directories:\n\n*   A subdirectory named `GreetingProject`,\
    \ in which all of the project content files are stored.\n*   A subdirectory named\
    \ `GreetingProjectTests`, in which all of the test content files are stored.\n\
    *   An Xcode project file named `GreetingProject.xcodeproj`, which contains the\
    \ Xcode project file information listed earlier.\n\nAn Xcode project can be standalone\
    \ or included in a workspace. You will learn about workspaces later in this appendix.\n\
    \n## Executable Environment\n\nAn executable environment defines the configuration\
    \ used to run a software product from Xcode. The configuration specifies the executable\
    \ to launch when running/debugging the product, command-line arguments to be passed\
    \ to the executable (if any), along with any environment variables to be set when\
    \ running the program. The executable environment settings are edited via a project\
    \ *scheme*. You will learn about schemes a little later in this appendix.\n\n\
    ## Workspaces\n\nWorkspaces are the Xcode mechanism for supporting and organizing\
    \ multiple projects. A workspace groups projects and other related documents,\
    \ thereby facilitating multi-product development. You can share code between projects\
    \ without having to manually copy and paste project dependencies (e.g., libraries,\
    \ along with their corresponding public header files), yet still manage each project\
    \ individually. An Xcode workspace can discover implicit dependencies between\
    \ projects, and thus resolve these dependencies automatically during build. In\
    \ addition, workspaces also enable you to more easily create and use external\
    \ (i.e., third-party) software libraries.\n\nEach workspace is, in fact, an Xcode\
    \ document composed of metadata that can contain any number of Xcode projects,\
    \ plus any other files you want to include. In addition to organizing all the\
    \ files in each Xcode project, a workspace provides implicit and explicit relationships\
    \ among the included projects and their targets. The workspace document contains\
    \ pointers to the included projects and other files, but no other data. A project\
    \ can belong to more than one workspace."
