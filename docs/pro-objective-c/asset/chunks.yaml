- fmt: "# Class and Object Code Generation\n\nWhen the compiler parses Objective-C\
    \ code containing class definitions and objects, it generates corresponding runtime\
    \ data structures. An Objective-C class corresponds to a runtime library `Class`\
    \ data type. According to the Apple Runtime Reference, the `Class` data type is\
    \ a pointer to an opaque type with an identifier of `objc_class`.\n\n```\ntypedef\
    \ struct objc_class *Class;\n```\n\nAn *opaque data type* is a C `struct` type\
    \ that is incompletely defined in its interface. Opaque types provide a form of\
    \ data hiding, in that their variables can only be accessed through functions\
    \ designed specifically for them. Runtime library functions are used to access\
    \ the variables of the `Class` (i.e., `objc_class`) data type.\n\nJust as Objective-C\
    \ classes have a runtime data type, Objective-C objects also have a corresponding\
    \ runtime data type. When the compiler parses Objective-C code for objects, it\
    \ generates code that creates a runtime object type. This data type, defined in\
    \ [Listing 8-1](#9781430250500_Ch08.xhtml#list1), is a C `struct` with an identifier\
    \ of `objc_object`.\n\n[*Listing 8-1.*](#9781430250500_Ch08.xhtml#_list1) `objc_object`\
    \ Data Type\n\n```\nstruct objc_object\n{\n  Class isa;\n  /* ...variable length\
    \ data containing instance variable values...  */\n};\n```\n\nWhen you create\
    \ an object, memory is allocated for an `objc_object` type that consists of an\
    \ `isa` pointer directly followed by the data for the instance variables of the\
    \ object.\n\nNote that, as with the `Class` data type, the `objc_object` type\
    \ contains a variable named `isa` of type `Class`; in other words, a pointer to\
    \ a variable of type `objc_class`. In fact, the runtime data type for all Objective-C\
    \ objects and classes begin with an `isa` pointer. The runtime equivalent for\
    \ the Objective-C `id` type is a C `struct` defined as a pointer to an `objc_object`,\
    \ for example.\n\n[*Listing 8-2.*](#9781430250500_Ch08.xhtml#_list2) `id` Type\
    \ Definition\n\n```\ntypedef struct objc_object\n{\n  Class isa;\n} *id;\n```\n\
    \nIn other words, an `id` is just a pointer to a C `struct` with the identifier\
    \ `objc_object`. The runtime data structure for Objective-C block objects follows\
    \ the same convention, thereby enabling them to also be properly managed by the\
    \ runtime system.\n\n# Viewing Runtime Data Structures\n\nBefore you go any further\
    \ with these concepts, let’s create an example that will allow you to see how\
    \ Objective-C objects and classes map to the runtime data structures discussed\
    \ earlier. In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)\
    \ **Project …** from the Xcode File menu. In the **New Project Assistant** pane,\
    \ create a command-line application (choose **Command Line Tool** from the Mac\
    \ OS X Application selection) and click **Next**. In the **Project Options** window,\
    \ specify **Runspector** for the Product Name, choose **Foundation** for the Project\
    \ Type, select ARC memory management by checking the **Use Automatic Reference\
    \ Counting** check box, and then click **Next**.\n\nSpecify the location in your\
    \ file system where you want the project to be created (if necessary, select **New\
    \ Folder** and enter the name and location for the folder), uncheck the **Source\
    \ Control** check box, and then click the **Create** button.\n\nNow let’s implement\
    \ the code. Select the **main.m** file in the navigator pane, and then add the\
    \ code shown in [Listing 8-3](#9781430250500_Ch08.xhtml#list3).\n\n[*Listing 8-3.*](#9781430250500_Ch08.xhtml#_list3)\
    \ Runspector `main.m` File\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ <objc/runtime.h>\n\n// Test class 1\n@interface TestClass1 : NSObject { @public\
    \ int myInt; }\n@end\n@implementation TestClass1\n@end\n\nint main(int argc, const\
    \ char * argv[])\n{\n  @autoreleasepool\n  {\n    // Create a few instances of\
    \ one class and display its data\n    TestClass1 *tc1A = [[TestClass1 alloc] init];\n\
    \    tc1A->myInt = 0xa5a5a5a5;\n    TestClass1 *tc1B = [[TestClass1 alloc] init];\n\
    \    tc1B->myInt = 0xc3c3c3c3;\n    long tc1Size = class_getInstanceSize([TestClass1\
    \ class]);\n    NSData *obj1Data = [NSData dataWithBytes:(__bridge const void\
    \ *)(tc1A)\n                                     length:tc1Size];\n    NSData\
    \ *obj2Data = [NSData dataWithBytes:(__bridge const void *)(tc1B)\n          \
    \                            length:tc1Size];\n    NSLog(@\"TestClass1 object\
    \ tc1 contains %@\", obj1Data);\n    NSLog(@\"TestClass1 object tc2 contains %@\"\
    , obj2Data);\n    NSLog(@\"TestClass1 memory address = %p\", [TestClass1 class]);\n\
    \  }\n  return 0;\n}\n```\n\nOK, let’s review this code. At the beginning of the\
    \ `main.m` file, observe the import statement\n\n```\n#import <objc/runtime.h>\n\
    ```\n\nThis statement is required to include the runtime library APIs in the file.\
    \ Immediately after the import statements, the code defines the class `TestClass1`.\
    \ This simple class has no methods and a single public instance variable. In the\
    \ `main()` function, two `TestClass1` objects are created and initialized, with\
    \ the instance variable for each assigned a value. After the objects are created,\
    \ the Foundation Framework `NSData` class is used to retrieve the data (in bytes)\
    \ for each object. The Runtime Library function `class_getInstanceSize()` is used\
    \ to retrieve the size (in bytes) of a class instance. Once the data is retrieved,\
    \ it is displayed in the output pane using the Foundation Framework `NSLog` function.\
    \ When you compile and run the program, you should observe output similar to that\
    \ shown in [Figure 8-1](#9781430250500_Ch08.xhtml#Fig1).\n\n![9781430250500_Fig08-01.jpg](images/9781430250500_Fig08-01.jpg)\n\
    \n[Figure 8-1](#9781430250500_Ch08.xhtml#_Fig1). Runspector program, object inspection\n\
    \nIn the output pane, the `TestClass1` objects contain the data in [Listing 8-4](#9781430250500_Ch08.xhtml#list4).\n\
    \n[*Listing 8-4.*](#9781430250500_Ch08.xhtml#_list4) TestClass1 Output from Runspector\
    \ Program\n\n```\nTestClass1 object tc1 contains <78110000 01000000 a5a5a5a5 00000000>\n\
    TestClass1 object tc2 contains <78110000 01000000 c3c3c3c3 00000000>\nTestClass1\
    \ memory address = 0x100001178\n```\n\nLet’s analyze this data. It was shown in\
    \ [Listing 8-2](#9781430250500_Ch08.xhtml#list2) that when the compiler parses\
    \ an object, it generates an instance of an `objc_object` type whose contents\
    \ consist of an `isa` pointer and the values of the object’s instance variables.\
    \ So, looking at the output from the program (see [Listing 8-4](#9781430250500_Ch08.xhtml#list4)),\
    \ the data for `TestClass1` object 1 (`tc1`) contains two items: an `isa` pointer\
    \ (`78110000 01000000`) and the value assigned to its instance variable (`a5a5a5a5\
    \ 00000000`). Similarly, the data for `TestClass1` object 2 (`tc2`) contains an\
    \ `isa` pointer (`78110000 01000000`) and the value assigned to its instance variable\
    \ (`c3c3c3c3 00000000`). Notice that the first item in the object’s `objc_object`\
    \ data structure is its `isa` pointer. Also notice that the `isa` pointer for\
    \ both instances is the same. This is as expected since they are instances of\
    \ the same class and hence should have the same pointer value. Now an `isa` pointer\
    \ points to the address in memory of a class, as shown by the last line of [Listing\
    \ 8-4](#9781430250500_Ch08.xhtml#list4).\n\n```\nTestClass1 memory address = 0x100001178\n\
    ```"
