  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项，将给定的英文文本翻译成中文。



    # Foundation 框架值对象


    Foundation 框架的值对象类为原始数据类型、通用系统信息、工具和本地化支持提供了面向对象的封装。`NSCalendar`、`NSDate`、`NSCalendarDate`、`NSDateComponents`
    和 `NSTimeZone` 类为日期和时间的编程及格式化提供支持。`NSValue`、`NSNumber`、`NSDecimalNumber` 和 `NSDecimalNumberHandler`
    类为原始数据类型提供了面向对象的封装，这些对象随后可以被操作和/或添加到集合对象中。`NSData`、`NSMutableData` 和 `NSPurgeableData`
    类为字节缓冲区提供了面向对象的封装。`NSValueTransformer` 用于将值从一种表示形式转换为另一种。`NSNull` 是一个单例对象，用于在不允许
    `nil` 值的集合对象中表示空值。`NSLocale` 提供对本地化的支持，本地化是一组用于使软件适应特定地区或语言的信息集合。`NSCache` 提供了一个内存中的系统缓存，用于临时存储那些重新创建成本高昂的对象。


    ## NSValue


    `NSValue` 类是单个数据项的容器。它可以保存长度固定的 C 和 Objective-C 数据类型（包括原始类型），通常用于允许将某个数据项存储在集合对象（`NSArray`、`NSSet`
    等）中，因为这些集合要求其元素必须是对象。代码清单 10-3 中的代码片段从一个 `int` 类型的值创建了一个 `NSValue` 实例。


    *代码清单 10-3.*创建一个 `NSValue` 实例


    ```

    int ten = 10;

    int *tenPtr = &ten;

    NSValue *myInt = [NSValue value:&tenPtr withObjCType:@encode(int *)];

    ```


    请注意，类型是使用 `@encode` 指令指定的。这个值现在可以存储在一个集合对象中。以下语句检索 `NSValue` 对象的 `int` 值，并将此值赋给变量
    `result`。


    ```

    int result = *(int *)[myInt pointerValue];

    ```


    ## NSNumber


    `NSNumber` 类是 `NSValue` 的子类，充当原始（标量）类型的容器。它定义了一组方法，用于创建和访问作为原始类型的数字对象：`signed/unsigned
    char`、`int`、`short int`、`long int`、`long long int`、`NSInteger`、`float`、`double`
    或 `BOOL` 类型。`NSNumber` 包含许多类工厂方法（其名称均以 `numberWith...` 开头），用于使用指定原始类型的输入参数创建并初始化一个
    `NSNumber`。以下语句使用 `numberWithDouble:` 方法创建一个 `double` 类型的 `NSNumber` 实例，并将其赋值给一个名为
    `degrees2Radians` 的变量。


    ```

    NSNumber *degrees2Radians = [NSNumber numberWithDouble:(3.1415/180.0)];

    ```


    `NSNumber` 还包含初始化方法（其名称均以 `initWith...` 开头），用于使用输入参数的值初始化一个已分配的 `NSNumber` 对象。相应的
    `NSNumber` `...Value` 方法（每种支持的类型都有一个）可用于从 `NSNumber` 对象中检索原始值，例如：


    ```

    double d2r = [degrees2Radians doubleValue];

    ```


    `NSNumber` 还包含一个 `stringValue` 方法，用于获取 `NSNumber` 实例的字符串表示。


    ## NSDecimalNumber


    `NSDecimalNumber` 是 `NSNumber` 的一个子类，用于执行十进制算术运算。它包含用于创建和初始化十进制数字的方法，以及用于执行标准算术运算（加法、减法、乘法、除法等）的方法。它对于执行那些舍入误差可能很显著的数值运算（例如，货币计算）特别有用。代码清单
    10-4 将两个 `NSDecimalNumber` 对象相加，并将结果赋值给一个名为 `sum` 的 `NSDecimalNumber` 对象。


    *代码清单 10-4.*使用 `NSDecimalNumber` 将两个数字相加


    ```

    NSDecimalNumber *num1 = [NSDecimalNumber decimalNumberWithString:@"2.56"];

    NSDecimalNumber *num2 = [NSDecimalNumber decimalNumberWithString:@"7.78"];

    NSDecimalNumber *sum = [num1 decimalNumberByAdding:num2];

    ```


    `NSDecimalNumber` 中执行算术运算的方法包含一些参数，可用于指定如何处理计算错误和舍入。


    ## NSNumber 字面量


    Objective-C 提供了语言级别的支持来创建 `NSNumber` 字面量。任何以 `@` 字符为前缀的字符、数字或布尔字面量，都会生成一个初始化为该值的
    `NSNumber` 对象。以下语句是等效的：


    ```

    NSNumber *num = [NSNumber numberWithInt:17];

    NSNumber *num = @17;

    ```


    `NSNumber` 字面量由标量值创建，而非表达式。此外，`NSNumber` 字面量在运行时求值；它们不是编译时常量，因此不能用于初始化静态变量。本质上，字面量
    `@17` 实际上是表达式 `[NSNumber numberWithInt:17]` 的简写形式，这是一个在运行时求值的对象消息。有关 `NSNumber`
    字面量的更多信息，请参阅第 16 章，该章深入探讨了 Objective-C 字面量。


    ## 日期和时间支持


    `NSCalendar`、`NSDate`、`NSCalendarDate`、`NSDateComponents` 和 `NSTimeZone` 类为日期和时间的编程及格式化提供支持。一个
    `NSDate` 实例代表一个绝对时间戳。以下语句创建一个表示当前时间的日期。


    ```

    NSDate *now = [[NSDate alloc] init];

    ```


    以下语句比较两个日期，并返回一个 `NSComparisonResult`，指示输入日期是晚于、等于还是早于接收方的日期。


    ```

    NSTimeInterval secondsPerDay = 24 * 60 * 60;

    NSDate *tomorrow = [now dateByAddingTimeInterval:secondsPerDay];

    NSComparisonResult *result = [now compare:tomorrow];

    ```


    `NSCalendar` 类封装了用于组织时间段的日历信息。它为几种不同的日历提供了实现，包括佛教历、公历、希伯来历、伊斯兰历和日本历。以下语句返回当前用户所选本地化的日历。


    ```

    NSCalendar *currentCalendar = [NSCalendar currentCalendar];

    ```


    以下语句创建一个公历。


    ```

    NSCalendar *gregorianCalendar = [[NSCalendar alloc]

                                    initWithCalendarIdentifier:NSGregorianCalendar];

    ```


    `NSCalendar` 提供了用于检索日历中某个日期的组成元素的方法，这些元素以 `NSDateComponents` 对象表示。


    `NSDateComponents` 类代表日期/时间的组成元素。它用于设置/获取这些元素，并指定时间间隔。以下语句从当前日历对象中检索带有月日历单位的日期组件。


    ```

    NSDate *date = [NSDate date];

    NSDateComponents *components = [currentCalendar components:NSMonthCalendarUnit

                                                        fromDate:date];

    ```


    ## NSCache

