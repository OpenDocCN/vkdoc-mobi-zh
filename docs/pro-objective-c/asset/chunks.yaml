  raw: 'Together, these phases perform lexical analysis, syntax analysis, code generation
    and optimization, assembly, and linking operations to produce the output binaries.
    During the *lexical analysis* phase, the source code is broken down into tokens.
    Each *token* is a single element of the language; for example, a keyword, operator,
    identifier, or symbol name within the context of its grammar.


    The *syntax analysis* (or parsing) phase checks the tokens for the correct syntax
    and verifies that they form a valid expression. This task concludes with the creation
    of a hierarchical parse tree or an abstract syntax tree (AST) from the tokens.


    During *code generation and optimization*, the AST is used to generate code in
    the output language, which may be a machine language or an intermediate language
    representation (IR). The code is also optimized into a functionally equivalent
    but faster and smaller form.


    The *assembly* phase takes the generated code and converts it into executable
    machine code for the target platform.


    Finally, during the *linking* phase, one or more machine code outputs from the
    assembler are combined into a single executable program.


    The preprocessor is used during the lexical analysis phase (as shown in [Figure
    5-1](#9781430250500_Ch05.xhtml#Fig1)) prior to parsing. To understand its role
    in this phase, let’s review the operation of the preprocessor in detail.


    Operations


    The preprocessor works by substituting the input character sequences for other
    character sequences according to a set of predefined rules. These operations,
    depicted in [Figure 5-2](#9781430250500_Ch05.xhtml#Fig2), are performed in the
    following order:


    ![9781430250500_Fig05-02.jpg](images/9781430250500_Fig05-02.jpg)


    [Figure 5-2](#9781430250500_Ch05.xhtml#_Fig2). Preprocessing Objective-C source
    files


    1.  *Textual translation*: First, the preprocessor translates the input source
    file by breaking it into lines, replacing trigraphs by their corresponding single
    characters, merging continued lines into one long line, and replacing comments
    with single spaces. A trigraph is a three-character sequence defined by the C
    programming language to stand for single characters.

    2.  *Token conversion*: Next, the preprocessor converts the translated file into
    a sequence of tokens.

    3.  *Preprocessor language-based transformation*: Finally, if the token stream
    contains any preprocessing language elements, they are transformed based on these
    inputs.


    The first two operations are performed automatically, and the last is a function
    of the *preprocessor language* elements added to the source files.


    Preprocessor Language


    That’s right, the preprocessor language is a separate programming language that’s
    distinct from Objective-C. The source-file transformations performed using the
    language are primarily source file inclusions, conditional compilation, and macro
    expansions. Preprocessor language elements operate on a source file prior to program
    compilation, and the preprocessor has no knowledge of the Objective-C language
    itself.


    The preprocessor language defines directives to be executed and macros to be expanded.
    A preprocessor *directive* is a command that is executed by the preprocessor,
    not the compiler. A preprocessor *macro* is a named code fragment. Wherever the
    name is used in the source code, the code fragment is substituted for it. The
    preprocessor language also defines several operators and keywords.


    **Note**   It’s important to understand the capabilities and limitations of the
    preprocessor language because incorrect use can cause subtle compilation problems
    that are difficult to diagnose. You should keep this in mind as you look at the
    language in detail.


    Directives


    Preprocessor directives are indicated in Objective-C source files with a unique
    syntax that causes these lines to be treated by the preprocessor, not the compiler.
    A preprocessor directive has the following form:


    ```

    #directiveName directiveArguments

    ```


    A directive begins with a hash sign (`#`), immediately followed by the directive
    name, and then its corresponding arguments. The following line


    ```

    #import "Elements.h"

    ```


    is an example of a preprocessor directive; each directive is terminated by a newline.
    To extend a directive through more than one line, a backslash (`\`) is placed
    at the end of the line to be continued on another line. The following example


    ```

    #define DegreesToRadians(x)  \

                     ((x) * 3.14159 / 180.0)

    ```


    is a preprocessor directive that extends across two lines, as indicated by the
    backslash at the end of the first line of the directive.


    The following is the complete set of preprocessor directives and the functionality
    that they provide:


    *   Header file inclusion (`#include, #import`)

    *   Conditional compilation (`#if, #elif, #else, #endif, #ifdef, #ifndef`)

    *   Diagnostics (`#error, #warning, #line`)

    *   Pragmas (`#pragma`)


    Header File Inclusion


    The preprocessor has two directives (`#include` and `#import`) that enable header
    file inclusion; basically, they tell the preprocessor to take the text of a file
    and insert it into the current file. As such, they facilitate code reuse, because
    a source file can use external class interfaces and macros without having to copy
    them directly.


    The syntax of the *include* directive has two forms:


    ```

    #include "HeaderFileName"

    ```


    or


    ```

    #include <HeaderFileName>

    ```


    `HeaderFileName` is the name of the header file to be inserted. The only difference
    between both expressions is the locations (i.e., directories) where the compiler
    looks for the file:


    *   *Header file name between double quotes* (`"HeaderFileName"`). The compiler
    first searches for the file in the same directory that includes the file containing
    the directive. If the file is not found there, the compiler searches for the file
    in the default directories, where it is configured to look for the system-standard
    header files.

    *   *Header file name between angle brackets* (`<HeaderFileName>`). The compiler
    searches for the file in the default directories, where it is configured to look
    for the standard header files.


    By convention, standard header files are usually included using the angle brackets
    because they are normally located in the default directories, whereas other header
    files (such as those for your Objective-C classes) are included using double quotes.


    The *import* directive (`#import`) also performs header file inclusion. Like the
    `#include` directive, the included header file is enclosed in either double quotes
    or angle brackets. This directive differs from `#include` in that it ensures a
    header file is only included once in a source file, thereby preventing recursive
    includes. For example, in the Elements program you implemented in [Chapters 2](#9781430250500_Ch02.xhtml)
    and [3](#9781430250500_Ch03.xhtml), the `main.m` source file includes the `Hydrogen.h`
    and `Atom+Nuclear.h` header files. Now each of these files includes the `Atom.h`
    file, and hence you have a scenario that could result in duplicate includes of
    the `Atom` header file (in the `main.m` file). However, since `main.m` includes
    the `Hydrogen` and `Atom+Nuclear` header files using the `#import` directive (as
    shown in [Listing 5-1](#9781430250500_Ch05.xhtml#list1)), the `Atom` header file
    will only be included once (in the `main.m` source file).


    [*Listing 5-1.*](#9781430250500_Ch05.xhtml#_list1)  Using the #import Directive
    to Prevent Recursive Includes


    ```

    #import <Foundation/Foundation.h>

    #import "Atom.h"

    #import "Atom+Nuclear.h"

    #import "Atom+Helper.h"

    #import "Hydrogen.h"

    ```'
  trans: "\n# 这些阶段共同执行词法分析、语法分析、代码生成与优化、汇编及链接操作，最终生成输出二进制文件。\n\n在*词法分析*阶段，源代码被分解为词法单元（tokens）。每个*词法单元*是语言中的单一元素；例如，在其语法上下文中的关键字、运算符、标识符或符号名称。\n\
    \n*语法分析*（或称解析）阶段会检查词法单元是否符合正确的语法，并验证它们能否构成有效表达式。该任务最终会基于词法单元生成一个层次化的解析树或抽象语法树（AST）。\n\
    \n在*代码生成与优化*阶段，AST 被用于生成输出语言的代码，该输出语言可能是机器语言或中间语言表示（IR）。代码还会被优化为功能等价但运行速度更快、体积更小的形式。\n\
    \n*汇编*阶段将生成的代码转换为目标平台可执行的机器码。\n\n最后，在*链接*阶段，汇编器输出的一个或多个机器码文件被组合成单个可执行程序。\n\n预处理器在词法分析阶段（如图\
    \ 5-1 所示）且位于解析之前被使用。要理解其在该阶段的作用，让我们详细回顾预处理器的操作。\n\n## 操作\n\n预处理器的工作方式是：根据一组预定义规则，将输入的字符序列替换为其他字符序列。如图\
    \ 5-2 所示，这些操作按以下顺序执行：\n\n![9781430250500_Fig05-02.jpg](img/9781430250500_Fig05-02.jpg)\n\
    \n图 5-2. 预处理 Objective-C 源文件\n\n1. *文本转换*：首先，预处理器将输入的源文件分解为行，将三字符组替换为对应的单个字符，将续行合并为单行，并将注释替换为单个空格。三字符组是由\
    \ C 编程语言定义的三字符序列，用于表示单个字符。\n2. *词法单元转换*：接着，预处理器将转换后的文件转换为一系列词法单元。\n3. *基于预处理器语言的转换*：最后，如果词法单元流包含任何预处理语言元素，则根据这些输入对其进行转换。\n\
    \n前两个操作自动执行，最后一个操作则基于添加到源文件中的*预处理器语言*元素来执行。\n\n## 预处理器语言\n\n没错，预处理器语言是一种独立于 Objective-C\
    \ 的单独编程语言。使用该语言执行的源文件转换主要包括：源文件包含、条件编译和宏展开。预处理器语言元素在程序编译之前对源文件进行操作，并且预处理器本身不了解\
    \ Objective-C 语言。\n\n预处理器语言定义了待执行的指令和待展开的宏。预处理器*指令*是由预处理器（而非编译器）执行的命令。预处理器*宏*是一个命名的代码片段。凡是在源代码中使用该名称的位置，该代码片段都会被替换进去。预处理器语言还定义了几个运算符和关键字。\n\
    \n**注意**   理解预处理语言的能力和局限性至关重要，因为错误使用可能导致难以诊断的细微编译问题。在详细研究该语言时，请牢记这一点。\n\n## 指令\n\
    \n在 Objective-C 源文件中，预处理器指令通过一种独特的语法来标识，该语法使得这些行由预处理器而非编译器处理。预处理器指令具有以下形式：\n\n\
    ```\n#directiveName directiveArguments\n```\n\n指令以井号（`#`）开头，其后紧跟指令名称，再接着对应的参数。下面这行代码：\n\
    \n```\n#import \"Elements.h\"\n```\n\n是一个预处理指令的示例；每条指令以换行符结束。若要将指令扩展到多行，则在需要续行的行末放置反斜杠（`\\\
    `）。以下示例：\n\n```\n#define DegreesToRadians(x)  \\\n                 ((x) * 3.14159\
    \ / 180.0)\n```\n\n是一条跨两行的预处理器指令，第一行末尾的反斜杠表示续行。\n\n以下是完整的预处理器指令集及其提供的功能：\n\n*\
    \ 头文件包含（`#include`， `#import`）\n* 条件编译（`#if`， `#elif`， `#else`， `#endif`， `#ifdef`，\
    \ `#ifndef`）\n* 诊断（`#error`， `#warning`， `#line`）\n* 编译指令（`#pragma`）\n\n### 头文件包含\n\
    \n预处理器有两条指令（`#include` 和 `#import`）用于实现头文件包含；简而言之，它们告诉预处理器获取一个文件的文本内容并将其插入当前文件。因此，它们促进了代码复用，因为源文件可以使用外部类的接口和宏，而无需直接复制它们。\n\
    \n*包含*指令的语法有两种形式：\n\n```\n#include \"HeaderFileName\"\n```\n\n或\n\n```\n#include\
    \ <HeaderFileName>\n```\n\n`HeaderFileName` 是要插入的头文件名。这两种表达式的唯一区别在于编译器查找文件的位置（即目录）：\n\
    \n* *双引号内的头文件名*（`\"HeaderFileName\"`）。编译器首先在包含该指令的源文件所在目录中搜索文件。如果未找到，则在配置好的默认目录中搜索系统标准头文件。\n\
    * *尖括号内的头文件名*（`<HeaderFileName>`）。编译器在配置好的默认目录中搜索标准头文件。\n\n按照惯例，标准头文件通常使用尖括号包含，因为它们通常位于默认目录中；而其他头文件（如\
    \ Objective-C 类的头文件）则使用双引号包含。\n\n*导入*指令（`#import`）也执行头文件包含。与 `#include` 指令类似，被包含的头文件用双引号或尖括号括起来。该指令与\
    \ `#include` 的区别在于，它能确保一个头文件在源文件中仅被包含一次，从而防止递归包含。例如，在第 2 章和第 3 章中实现的 Elements\
    \ 程序中，`main.m` 源文件包含了 `Hydrogen.h` 和 `Atom+Nuclear.h` 头文件。而这两个文件各自都包含了 `Atom.h`\
    \ 文件，因此你可能面临 `Atom` 头文件被重复包含的情况（在 `main.m` 文件中）。然而，由于 `main.m` 文件使用 `#import`\
    \ 指令（如代码清单 5-1 所示）包含了 `Hydrogen` 和 `Atom+Nuclear` 头文件，因此 `Atom` 头文件将仅被包含一次（在 `main.m`\
    \ 源文件中）。\n\n*代码清单 5-1.*  使用 `#import` 指令防止递归包含\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Atom.h\"\n#import \"Atom+Nuclear.h\"\n#import \"Atom+Helper.h\"\n#import\
    \ \"Hydrogen.h\"\n```\n"
- fmt: 'Without the `#import` directive, it would be necessary to provide an include
    guard in a header file to prevent recursive inclusion. An *include guard* is a
    set of preprocessor statements that are used to prevent duplicate inclusion of
    a header file. It is typically constructed using the `#ifndef` conditional compilation
    expression and a `#define` directive. An example include guard for the `Atom.h`
    header file is shown in [Listing 5-2](#9781430250500_Ch05.xhtml#list2).


    [*Listing 5-2.*](#9781430250500_Ch05.xhtml#_list2)  Atom.h Header File Include
    Guard


    ```objc

    #ifndef  ATOM_H

    #define  ATOM_H

    @interface Atom : NSObject

    // Atom interface declarations

    ...

    @end

    #endif

    ```


    The `#import` directive is typically used to include Objective-C header files,
    thus there is generally no need to implement include guards in your Objective-C
    source files. Now let’s look at the conditional compilation directives.


    ## Conditional Compilation


    The *conditional compilation* directives (`#if`, `#elif`, `#else`, `#endif`, `#ifdef`,
    `#ifndef`) enable you to include or exclude part of the source text if a certain
    condition is met.


    The `#if` directive enables you to test the value of an expression and include/exclude
    a portion of the source text based on the result. The syntax for using this directive
    is shown in [Listing 5-3](#9781430250500_Ch05.xhtml#list3).


    [*Listing 5-3.*](#9781430250500_Ch05.xhtml#_list3)  Syntax for the #if Preprocessor
    Directive


    ```cpp

    #if ArithmeticExpression

    // conditional text (preprocessor or Objective-C source code)

    ...

    #endif

    ```


    An `#if` directive is used to test an arithmetic expression. As shown in [Listing
    5-3](#9781430250500_Ch05.xhtml#list3), it is paired with an `#endif` directive,
    which together enclose conditional text. The arithmetic expression is of integer
    type and may contain the following elements:


    * Integer and character constants.

    * Arithmetic operators, bitwise operations, shifts, comparisons, and logical operations
    (as defined in [Appendix A](#9781430250500_AppA.xhtml)).

    * Preprocessor macros. The macros are expanded before computation of the expression.

    * Uses of the *defined* operator, which is used to check whether a macro is defined.

    * Identifiers that are not macros, which are all assigned the value zero when
    being evaluated.


    The preprocessor evaluates the expression according to these rules. If the result
    of the evaluation is nonzero, the conditional text (typically source code but
    possibly also other preprocessor directives) is included for compilation or further
    preprocessing; otherwise, it is skipped. Look at the following example:


    ```cpp

    #if INPUT_ARGS <= 0

    #warning "No input arguments defined"

    #endif

    ```


    The preprocessor would process these lines as follows:


    1. Expand the identifier `INPUT_ARGS`. If identifier is a macro, it is replaced
    with its corresponding value; if it is not a macro or the macro has no value,
    the identifier is replaced with the value zero.

    2. Calculate the value of the expression. If the value is nonzero (i.e., the value
    of the `INPUT_ARGS` identifier is less than or equal to zero), the text between
    the `#if` directive statement and the `#endif` directive is included (i.e., not
    filtered by the preprocessor). In this case (due to the `#warning` message), it
    would ultimately cause the compiler to generate a warning message.


    This type of directive is often used to perform conditional compilation of platform-specific
    code for a designated target environment. For example, if you have Objective-C
    code that has customizations for several different compilers, these could be encapsulated
    using `#if` directives and the appropriate compiler-specific identifiers.


    The `#elif` directive stands for “else if”; it augments the `#if` directive by
    enabling you to check for two or more possible conditions. It is placed between
    the `#if` and `#endif` directives; the conditional text following the `#elif`
    directive is processed only if the original `#if` directive (and any preceding
    `#elif` directive(s)) failed. The syntax for the `#elif` directive is shown in
    [Listing 5-4](#9781430250500_Ch05.xhtml#list4).


    [*Listing 5-4.*](#9781430250500_Ch05.xhtml#_list4)  Syntax for the #elif Preprocessor
    Directive


    ```cpp

    #if ArithmeticExpression1

    // Conditional text 1

    ...

    #elif ArithmeticExpression2

    // Conditional text 2

    ...

    #elif ArithmeticExpressionN

    // Conditional text N

    ...

    #endif

    ```


    The preprocessor would process the text of [Listing 5-4](#9781430250500_Ch05.xhtml#list4)
    as follows: if `ArithmeticExpression1` succeeds then `Conditional text 1` is processed;
    else if `ArithmeticExpression2` succeeds then `Conditional text 2` is processed;
    else if `ArithmeticExpressionN` succeeds then `Conditional text N` is processed.
    If multiple conditional expressions within the group of `#if-#elif` would succeed,
    only the first will be processed.


    The `#else` directive augments the `#if` and `#elif` directives by providing a
    mechanism for conditional text to be executed if none of the associated `#if`
    and `#elif` expressions succeed. It is placed between the `#if`, `#elif` (if any
    `#elif` directives provided), and `#elif` directives, as the last directive immediately
    preceding the `#endif`. The syntax for the `#else` directive is shown in [Listing
    5-5](#9781430250500_Ch05.xhtml#list5).


    [*Listing 5-5.*](#9781430250500_Ch05.xhtml#_list5)  Syntax for the #else Preprocessor
    Directive


    ```cpp

    #if ArithmeticExpression1

    // Conditional text 1

    ...

    #elif ArithmeticExpression2

    // Conditional text 2

    ...

    #else

    // Else conditional text

    ...

    #endif

    ```


    The preprocessor would process the `Else conditional text` of [Listing 5-5](#9781430250500_Ch05.xhtml#list5)
    if none of the other conditional expressions succeed.


    At most, one `#else` directive can be placed between the `#if` and its corresponding
    `#endif` directive, and it must be the last directive before the `#endif`. Finally,
    also note that the `#if`, `#elif`, `#else`, and `#endif` directives can be nested;
    in this case, the `#endif` matches the closest preceding `#if` directive.


    The `#ifdef` directive enables conditional text to be processed only if the macro
    that is specified as its parameter has been defined, no matter what its value
    is. It is paired with an `#endif` directive, which is enclosed by the conditional
    text. The syntax for this directive is shown in [Listing 5-6](#9781430250500_Ch05.xhtml#list6).


    [*Listing 5-6.*](#9781430250500_Ch05.xhtml#_list6)  Syntax for the #ifdef Preprocessor
    Directive


    ```cpp

    #ifdef MacroName

    // Conditional text

    ...

    #endif

    ```


    The `#ifndef` directive functions as the complement to the `#ifdef` directive;
    it enables conditional text to be processed only if the macro that is specified
    as its parameter has not been defined. The syntax for this directive is shown
    in [Listing 5-7](#9781430250500_Ch05.xhtml#list7).


    [*Listing 5-7.*](#9781430250500_Ch05.xhtml#_list7)  Syntax for the #ifndef Preprocessor
    Directive


    ```cpp

    #ifndef MacroName

    // Conditional text

    ...

    #endif

    ```


    The behavior of the `#ifdef` and `#ifndef` directives can also be achieved by
    using the `defined` operator in an `#if` or `#elif` conditional expression.


    The `defined` operator is used to test whether a name is defined as a macro. It
    is equivalent to the `#ifdef` directive. The syntax for using the `defined` operator
    in a conditional expression is


    ```cpp

    #if defined MacroName

    ```


    or


    ```cpp

    #elif defined MacroName

    ```


    The macro name can be surrounded with parentheses, if desired. One of the reasons
    for using the `defined` operator (in lieu of the `#ifdef` directive) is when you
    need to test more than one macro in a single expression, as in the following example:'
