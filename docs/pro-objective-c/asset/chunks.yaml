    library. In the project navigator, select the **main.m** file for the HelloApp
    and make the updates shown in [Listing B-4](#9781430250500_AppB.xhtml#list4).


    [*Listing B-4.*](#9781430250500_AppB.xhtml#_list4)  HelloApp main() Function


    ```

    #import <Foundation/Foundation.h>

    #import "HelloLib/HelloLib.h"


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        HelloLib *hello = [HelloLib new];

        NSLog(@"%@", [hello greeting:@"Hello"]);

      }

      return 0;

    }

    ```


    The header file for the HelloLib static library is imported with the statement.


    ```

    #import "HelloLib/HelloLib.h"

    ```


    The `main()` function creates a `HelloLib` instance and invokes its `greeting:`
    method. When you compile and run the program, you should observe the messages
    in the output pane shown in [Figure B-12](#9781430250500_AppB.xhtml#Fig12).


    ![9781430250500_AppB-12.jpg](images/9781430250500_AppB-12.jpg)


    [Figure B-12](#9781430250500_AppB.xhtml#_Fig12). HelloApp program output


    Cool. This demonstrates how to incorporate static libraries into your projects
    using Xcode workspaces. The same techniques apply for other reusable software
    libraries (dynamic libraries, frameworks, bundles, etc.).


    Schemes


    An Xcode scheme groups one or more targets with a build configuration and an environment
    execution configuration, with respect to the purpose (i.e., action) for which
    you are building the product.


    You can have as many schemes as you want, but only one can be active at a time.
    You can specify whether a scheme should be stored in a project—in which case it’s
    available in every workspace that includes that project, or in the workspace—in
    which case it’s available only in that workspace. When you select an active scheme,
    you also select a run destination (that is, the architecture of the hardware for
    which the products are built).


    To edit a scheme, select **Edit Scheme…**from the Scheme toolbar menu in the Xcode
    workspace window, as shown in [Figure B-13](#9781430250500_AppB.xhtml#Fig13).


    ![9781430250500_AppB-13.jpg](images/9781430250500_AppB-13.jpg)


    [Figure B-13](#9781430250500_AppB.xhtml#_Fig13). Selecting Edit Scheme using the
    scheme toolbar menu


    The Scheme pop-up dialog allows you to specify many settings that affect product
    build and the actions performed on a product. As shown in [Figure B-14](#9781430250500_AppB.xhtml#Fig14),
    the left column lists actions that correspond to commands in the Product menu:
    Run, Test, Profile, Analyze, and Archive. The Build option allows you to select
    the targets to build for each of these actions.


    ![9781430250500_AppB-14.jpg](images/9781430250500_AppB-14.jpg)


    [Figure B-14](#9781430250500_AppB.xhtml#_Fig14). Scheme pop-up dialog


    As shown in [Figure B-14](#9781430250500_AppB.xhtml#Fig14), the tabs at the top
    of the scheme dialog vary according to the action performed on the product. They
    enable you to configure the build and the execution environment appropriately.


    Actions


    In Xcode, an action builds a target (thereby creating a product) and processes
    the product accordingly. Xcode defines the Build, Run, Test, Profile, Analyze,
    and Archive actions.


    *   The *Build action*builds one or more targets, creating the associated products.
    This step is performed automatically by all the other actions.

    *   The *Run action* builds and then runs the product in the debugger. This is
    the default action.

    *   The *Test action* builds and runs the unit test features of a project. If
    the project doesn’t include a unit-testing target, this action does nothing.

    *   The *Profile action*builds the product, launches the selected Instruments
    profiling and testing application, and then loads the product into it. Instruments
    can be used to perform a variety of profiling and testing activities on the product,
    including performance analysis, stress testing, memory usage, leak detection,
    and general troubleshooting.

    *   The *Analyze action* builds the product and then runs the static code analyzer
    on it.

    *   Finally, the *Archive action* builds and packages the product so that it is
    ready for distribution, adding it to the archive list in the Xcode Organizer.


    Roundup


    In this appendix, you learned about some of key features of Xcode and how they
    can be used to make you a more efficient and productive programmer. You now have
    a good understanding of Xcode projects, workspaces, targets, schemes, and actions,
    and how they can be used. Apple provides a complete set of reference documents
    that will be of great assistance for more complex software development scenarios
    and project configurations. The following lists several of these documents.


    *   Xcode User Guide

    *   Xcode Release Notes

    *   Xcode Build Setting Reference

    *   Instruments User Guide

    *   Instruments User Reference

    *   App Distribution Guide


    Appendix     C


    Using LLDB


    Software development can be a complex and (at times) error-prone process. As you
    have learned over the course of reading this book, the Objective-C platform provides
    a myriad of features to make you a more efficient, productive programmer. However,
    the bottom line is that the programs you write will have bugs; so the question
    is how do you mitigate them? Specifically, how do you detect bugs, validate program
    correctness, and analyze program control flow? Or perhaps of even greater importance,
    what is the process you use for debugging code? For example, do you analyze program
    state by inserting debugging statements in your source code? The Xcode debugger
    is the key tool for detecting runtime and logical errors in your software. In
    addition, it provides a variety of features that can also make you better at debugging.


    In this appendix, you will learn about debugging your programs in Xcode using
    the LLVM Debugger (LLDB). We’ll begin by briefly reviewing the LLVM compiler infrastructure,
    several of whose components are leveraged by LLDB. Next, you will explore the
    design of LLDB and review its key components. You will then learn how Xcode supports
    debugging with LLDB, and finally debug a few example programs with LLDB, thereby
    becoming familiar with some of its key features. By the end of this appendix,
    you should be convinced of the power and capability of LLDB, and will use it whenever
    you program with Xcode using Objective-C.


    LLVM Overview


    LLVM (originally an acronym for *Low Level Virtual Machine*) was conceived as
    a compiler framework for programs written in arbitrary languages. Currently, the
    LLVM project consists of a collection of modular, reusable components (libraries,
    toolsets, runtimes) used for program analysis and compilation (as shown in [Figure
    C-1](#9781430250500_AppC.xhtml#Fig1)).


    ![9781430250500_AppC-01.jpg](images/9781430250500_AppC-01.jpg)


    [Figure C-1](#9781430250500_AppC.xhtml#_Fig1). LLVM project components


    These components can be used as infrastructure to implement a variety of capabilities,
    such as compilers, optimizers, and debuggers. The following are brief definitions
    for several of the components under the LLVM project:'
