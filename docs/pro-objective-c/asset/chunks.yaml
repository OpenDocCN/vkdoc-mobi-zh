    Operations and Operation Queues


    In [Chapter 11](#9781430250500_Ch11.xhtml), you learned about operation objects,
    instances of the `NSOperation` class (and its subclasses) that encapsulate the
    code and data for a single task. As an operation object encapsulates a single
    unit of work, it is an ideal vehicle for implementing concurrent programming.
    The Foundation Framework includes the following three operation classes:


    *   `NSOperation`: The base (abstract) class for defining operation objects. For
    nonconcurrent tasks, a concrete subclass typically only needs to override the
    `main` method. For concurrent tasks, you must override at a minimum the methods
    `start`, `isConcurrent`, `isExecuting`, and `isFinished`.

    *   `NSBlockOperation`: A concrete subclass of `NSOperation` that is used to execute
    one or more block objects concurrently. An `NSBlockOperation` object is considered
    finished only when all of its block objects have finished execution.

    *   `NSInvocationOperation`: A concrete subclass of `NSOperation` that is used
    to create an operation object based on an object and selector that you specify.


    The following statement creates an `NSBlockOperation` instance named `greetingOp`.


    ```

    NSBlockOperation* greetingOp = [NSBlockOperation blockOperationWithBlock: ^{

      NSLog(@"Hello, World!");

    }];

    ```


    You can also add additional blocks to an `NSBlockOperation` instance using the
    `addExecutionBlock:` method. The following statement adds a block to the `NSBlockOperation`
    instance `greetingOp`.


    ```

    [greetingOp addExecutionBlock: ^{

      NSLog(@"Goodbye");

    }];

    ```


    An `NSInvocationOperation` can be created and initialized using either an `NSInvocation`
    object or a selector and receiver object. The following statement creates an `NSInvocationOperation`
    with the selector `hello` and a receiver object named `greetingObj`.


    ```

    NSInvocationOperation invokeOp = [[NSInvocationOperation alloc]

      initWithTarget:greetingObj selector:@selector(hello)];

    ```


    You can also implement custom operation classes. A custom operation class subclasses
    `NSOperation` and must implement, at a minimum, the `main` method to perform the
    desired task. Optionally, it can also provide the following functionality:


    *   Custom initialization methods

    *   Custom helper methods (invoked via the `main` method)

    *   Accessor methods for setting data values and accessing the results of the
    operation

    *   Methods that conform the class to the `NSCoding` protocol (to support archiving
    the object)


    Operation objects support a variety of features that facilitate concurrent programming,
    several of which are


    *   Establishing dependencies between operation objects, thereby enabling you
    to control their order of execution.

    *   Creating a completion block that is executed after an operation’s main task
    has finished.

    *   Retrieving an operation’s execution state.

    *   Prioritizing operations in an operation queue.

    *   Cancelling operations.


    An operation object is executed by invoking its `start` method. The default implementation
    of this method executes the operation’s task (implemented by its `main` method)
    synchronously. Hence, you may be wondering how operation objects support concurrent
    programming. Well, operation objects are typically executed by adding them to
    operation queues, which provide built-in support for executing operations concurrently.
    Specifically, operation queues provide threads for executing operations.


    An operation queue is a mechanism that provides the capability to execute operations
    concurrently. The Foundation Framework `NSOperationQueue` class is an Objective-C
    implementation of an operation queue. An operation can be added to an `NSOperationQueue`
    instance as a block object or an instance of a subclass of `NSOperation`. An operation
    queue manages the execution of operations. Thus it includes methods to manage
    operations in the queue, manage the number of running operations, suspend operations,
    and retrieve specific queues. [Listing 17-16](#9781430250500_Ch17.xhtml#list16)
    creates and initializes an `NSOperationQueue` instance and then uses its `addOperationWithBlock:`
    method to submit a block object to the queue.


    [*Listing 17-16.*](#9781430250500_Ch17.xhtml#_list16)  Adding a Block Object to
    an Operation Queue


    ```

    NSOperationQueue *queue = [NSOperationQueue new];

    [queue addOperationWithBlock: ^{

      NSLog(@"Hello, World!");

      }];

    [queue waitUntilAllOperationsAreFinished];

    ```


    Once an operation is added to a queue, it remains in the queue until it is explicitly
    cancelled or finishes executing its task. You can cancel an (`NSOperation`) object
    added to an operation queue by invoking its `cancel` method or by invoking the
    `cancelAllOperations` method on the queue.


    The execution order of operations within a queue is a function of the priority
    level of each operation and the interoperation object dependencies. The current
    implementation of `NSOperationQueue` uses Grand Central Dispatch to initiate execution
    of their operations. As a result, each operation in the queue is executed in a
    separate thread.


    Operation objects and operation queues provide an object-oriented mechanism for
    performing asynchronous, concurrent programming. They eliminate the need for low-level
    thread management, and simplify synchronization and coordination of execution
    for multiple interdependent tasks. Because they utilize system services that can
    scale dynamically in response to resource availability and utilization, they ensure
    that tasks are executed as quickly and as efficiently as possible.


    Executing Operation Objects Manually


    Although operation objects are typically executed using operation queues, it is
    possible to start an operation object manually (i.e., not add it to a queue).
    To do this, you must code the operation as a *concurrent operation* in order to
    have it execute it asynchronously. This is accomplished by performing the following
    steps:'
