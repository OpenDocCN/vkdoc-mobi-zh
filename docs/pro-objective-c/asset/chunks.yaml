  trans: "\n本声明要求将运行时库消息传递 API（例如`objc_msgSend()`）包含在文件中。紧随导入语句之后，代码定义了返回简单问候语的`greeting()`函数。该函数将用于动态添加到类中的方法实现。`main()`函数包含使用运行时\
    \ API 创建新类的逻辑：创建类对（类及其元类），为其添加一个指向先前定义的`greeting()`函数的方法，然后在运行时中注册该类对，从而使您能够创建该类的实例。请注意，方法签名是通过使用具有相同签名的`NSObject`描述方法获取的。接下来的几行代码创建该类的实例并向其发送消息，方法调用的输出将记录到输出面板。编译并运行程序时，您应看到类似图\
    \ 8-3 所示的输出。\n\n![9781430250500_Fig08-03.jpg](img/9781430250500_Fig08-03.jpg)\n\
    \n图 8-3. DynaClass 程序，动态类创建\n\n干得漂亮！您现在已完成运行时 API 及其用法的概述。请参阅 Apple 运行时参考以获取这些\
    \ API 的完整定义。现在让我们探讨运行时库的一些设计与实现细节。\n\n## 实现运行时对象消息传递\n\n运行时库提供了访问以下信息的函数（函数名称在括号中标识）：\n\
    \n*   对象的类定义（`objc_getClass`）\n*   类的超类（`class_getSuperclass`）\n*   对象的元类定义（`objc_getMetaClass`）\n\
    *   类的名称（`class_getName`）\n*   类的版本信息（`class_getVersion`）\n*   类的大小（以字节为单位）（`class_getInstanceSize`）\n\
    *   类的实例变量列表（`class_copyIvarList`）\n*   类的方法列表（`class_copyMethodList`）\n*   类的协议列表（`class_copyProtocolList`）\n\
    *   类的属性列表（`class_copyProperyList`）\n\n综上所述，运行时数据类型和函数为运行时库提供了实现各种 Objective-C\
    \ 特性所需的信息，例如对象消息传递（参见图 8-4）。\n\n![9781430250500_Fig08-04.jpg](img/9781430250500_Fig08-04.jpg)\n\
    \n图 8-4. 运行时系统消息传递操作\n\n当您向对象发送消息时，运行时通过利用类方法缓存及其 vtable 的自定义代码来查找类的实例方法。它会搜索整个类层次结构以查找对应方法，找到后跳转到方法实现。运行时库包含多种实现对象消息传递的设计机制。您将了解其中几种，从\
    \ vtable 开始。\n\n## 通过 vtable 进行方法查找\n\n运行时库定义了一个方法数据类型（`objc_method`），如代码清单 8-7\
    \ 所示。\n\n*代码清单 8-7.* 运行时库方法数据类型\n\n```\nstruct objc_method\n{\n  SEL method_name;\n\
    \  char * method_types;\n  IMP method_imp;\n};\ntypedef objc_method Method;\n\
    ```\n\n`method_name`是`SEL`类型的变量，用于描述方法名称；`method_types`描述方法参数的数据类型；`method_imp`是`IMP`类型的变量，提供方法被选中调用时所调用函数的地址（回想一下，Objective-C\
    \ 方法实际上是 C 函数，至少接受两个参数：`self`和`_cmd`）。由于方法调用在程序执行过程中可能发生数百万次，运行时系统需要一种快速高效的方法查找和调用机制。**vtable**（也称为**调度表**）是编程语言中常用的一种支持动态绑定的机制。Objective-C\
    \ 运行时库实现了一种自定义的 vtable 调度机制，旨在最大化性能和灵活性。**vtable**是一个`IMP`（Objective-C 方法实现）数组。每个运行时`Class`实例（`objc_class`）都包含一个指向\
    \ vtable 的指针。\n\n每个`Class`实例还包含一个指向最近使用过的方法的缓存指针。这为方法调用提供了性能优化。运行时库实现的方法查找逻辑如图\
    \ 8-5 所示。\n\n![9781430250500_Fig08-05.jpg](img/9781430250500_Fig08-05.jpg)\n\n\
    图 8-5. 运行时库方法查找\n\n在图 8-5 中，运行时库首先在缓存中搜索方法`IMP`（指向方法实现起始位置的指针）。如果未找到，则在 vtable\
    \ 中查找方法`IMP`，如果找到，则将`IMP`存储在缓存中以供将来查找。这种设计使运行时能够执行快速高效的方法查找。\n\n## 通过 dyld 共享缓存进行选择器唯一化\n\
    \nObjective-C 程序的启动开销与**选择器唯一化**所需的时间成正比。每个选择器名称在可执行程序中必须是唯一的，然而，您的自定义类和程序中的每个共享库都包含它们自己的选择器名称副本，其中许多可能是重复的（例如`alloc`、`init`等）。运行时需要为每个选择器名称选择一个唯一的规范`SEL`指针值，然后更新每个调用点和方法列表的元数据以使用该唯一值。此过程必须在应用程序启动时执行，并消耗系统资源（内存和程序启动时间）。为了提高此过程的效率，运行时通过使用\
    \ dyld 共享缓存执行选择器唯一化。**dyld**是一种定位和加载动态库的系统服务。它包含一个共享缓存，使这些库能够在进程间共享。**dyld 共享缓存**还包含一个选择器表，从而可以从缓存中访问共享库和自定义类的选择器。因此，运行时能够从\
    \ dyld 共享缓存中检索共享库的选择器，并且仅需更新应用自定义类的选择器。\n\n## 消息分发\n"
- fmt: "# Message Invocation Optimization\n\nMessage invocation is ubiquitous in an\
    \ Objective-C program. Just for application startup, `objc_msgSend()`, the runtime\
    \ library function that performs object messaging, is called millions of times.\
    \ Therefore, it is critical to optimize this code because even a slight change\
    \ in its performance has a significant impact on the overall application performance.\
    \ This method must look up the `IMP` corresponding to the message receiver and\
    \ selector, and then jump to the `IMP` to begin its execution. In the last few\
    \ sections, you learned how method caches and vtables are used to retrieve the\
    \ `IMP`. Once this is accomplished, the runtime then dispatches the method using\
    \ custom, optimized code written in assembly language. This code, referred to\
    \ sometimes as a *trampoline*, looks up the right code and then jumps directly\
    \ to it. This trampoline code works with any combination of parameters passed\
    \ to it because they are just passed along for the method `IMP` to read. To handle\
    \ the possible return value types, the runtime provides several different `objc_msgSend()`\
    \ implementations.\n\n# Accessing Class Instance Methods\n\nNow that you know\
    \ how the runtime library looks up (and invokes) instance methods, you may be\
    \ wondering how it does this for class methods (i.e., perform object messaging\
    \ for class methods). Well, every Objective-C class is also, in fact, an object,\
    \ hence it is capable of receiving messages, such as:\n\n```\n[NSObject alloc]\n\
    ```\n\nSo that explains how you can send messages to classes, but how does the\
    \ runtime find and invoke class methods? Well, the runtime library implements\
    \ this capability with *metaclasses*.\n\nA *metaclass* is a special type of class\
    \ object that stores information that enables the runtime to look up and invoke\
    \ the class methods of an Objective-C class. There’s a unique metaclass for every\
    \ Objective-C class because every class potentially has a unique list of class\
    \ methods. The runtime API provides functions for accessing metaclasses.\n\n`Class`\
    \ hierarchies are observed with metaclasses, as with regular classes. In the same\
    \ way that a class points to a superclass with its superclass pointer, a metaclass\
    \ points to the metaclass of a class’s superclass using its own superclass pointer\
    \ (refer back to [Figure 8-4](#9781430250500_Ch08.xhtml#Fig4)).\n\nThe base class’s\
    \ metaclass sets its superclass to the base class itself. The result of this inheritance\
    \ hierarchy is that all instances, classes, and metaclasses in the hierarchy inherit\
    \ from the hierarchy’s base class.\n\nThe `isa` variable for an object points\
    \ to a class that describes that instance, and can thus be used to access its\
    \ instance methods, ivars, and so forth. The `isa` variable for an Objective-C\
    \ class (object) points to a metaclass that describes the class (its class methods,\
    \ etc.).\n\nPutting this all together, the runtime performs messaging for both\
    \ instance and class methods, as follows:\n\n- When your source code sends a message\
    \ to an object, the runtime retrieves the appropriate instance method implementation\
    \ (via the corresponding class instance method vtable) and jumps to that method.\n\
    - When your source code sends a message to a class, the runtime retrieves the\
    \ appropriate class method implementation (via its metaclass class method vtable)\
    \ and jumps to that method.\n\nWhew, that was a mouthful! If necessary, take a\
    \ moment to go over these concepts, and when you’re ready, we’ll attempt to clarify\
    \ this with an example.\n\n# Examining Class Methods\n\nNow you’re going to code\
    \ an example to see how the runtime data structures utilize metaclasses and the\
    \ place of metaclasses in the overall class hierarchy. You’ll do this by updating\
    \ the Runspector program (developed earlier in this chapter) to retrieve metaclass\
    \ information. Start Xcode (if not already started) and open the Runspector project\
    \ by selecting **Open Recent** ![image](images/arrow.jpg) **Runspector.xcodeproj**\
    \ from the Xcode File menu. Select the **main.m** file in the navigator pane and\
    \ then add the code shown in [Listing 8-8](#9781430250500_Ch08.xhtml#list8).\n\
    \n[*Listing 8-8.*](#9781430250500_Ch08.xhtml#_list8) Runspector main() Function,\
    \ Metaclass Data\n\n```\n// Retrieve and display metaclass data\nid metaClass\
    \ = objc_getMetaClass(\"TestClass1\");\nlong mclzSize = class_getInstanceSize([metaClass\
    \ class]);\nNSData *mclzData = [NSData dataWithBytes:(__bridge const void *)(metaClass)\n\
    \                                  length:mclzSize];\nNSLog(@\"TestClass1 metaclass\
    \ contains %@\", mclzData);\nclass_isMetaClass(metaClass) ?\n  NSLog(@\"Class\
    \ %s is a metaclass\", class_getName(metaClass)) :\n  NSLog(@\"Class %s is not\
    \ a metaclass\", class_getName(metaClass));\n```\n\nThis code uses the runtime\
    \ function `objc_getMetaClass()` to retrieve the metaclass definition for the\
    \ named class, and then displays its associated data bytes. Next, the code uses\
    \ the runtime function `class_isMetaClass()` to test whether the object is a metaclass\
    \ and then logs a corresponding message to the console. You may be wondering about\
    \ the use of the bridged cast (`__bridge`). Well, the `NSData dataWithBytes:length:`\
    \ method takes as its first parameter a variable of type (`const void *`). You\
    \ may recall from [Chapter 4](#9781430250500_Ch04.xhtml) that ARC memory management\
    \ prohibits casts directly from Objective-C objects and (`void *`) types. A bridged\
    \ cast (discussed in [Chapter 6](#9781430250500_Ch06.xhtml)) enables the compiler\
    \ to manage these scenarios. In this case, because there will be no transfer of\
    \ ownership (i.e., the object assigned to the variable `metaClass` will still\
    \ be managed by ARC), the `__bridge` annotation is used. On compiling and running\
    \ the updated program, you should observe output similar to that shown in [Figure\
    \ 8-6](#9781430250500_Ch08.xhtml#Fig6).\n\n![9781430250500_Fig08-06.jpg](images/9781430250500_Fig08-06.jpg)\n\
    \n[Figure 8-6](#9781430250500_Ch08.xhtml#_Fig6). Runspector program, metaclass\
    \ inspection\n\nNote the metaclass information at the bottom of the output pane,\
    \ as shown in [Listing 8-9](#9781430250500_Ch08.xhtml#list9).\n\n[*Listing 8-9.*](#9781430250500_Ch08.xhtml#_list9)\
    \ Runspector Program Metaclass Information\n\n```\nTestClass1 metaclass contains\n\
    <6828a271 ff7f0000 6828a271 ff7f0000 d0821000 01000000 703d1000 01000000 60821000\
    \ 01000000>\nClass TestClass1 is a metaclass\n```\n\nThe metaclass data contains\
    \ the `isa` pointer, the superclass pointer, and additional information. The superclass\
    \ of `TestClass1` is `NSObject`. Because this class defines no custom class methods,\
    \ its `isa` pointer is also `NSObject`. Hence the metaclass `isa` pointer and\
    \ superclass pointer should be identical. This is confirmed with the results displayed\
    \ in [Listing 8-9](#9781430250500_Ch08.xhtml#list9) (the value for each is `6828a271\
    \ ff7f0000`).\n\nThis completes your review of the runtime library API and its\
    \ implementation. In the next section, you’ll look at the Objective-C APIs that\
    \ you can use for directly interacting with the runtime system.\n\n# Interacting\
    \ with the Runtime\n\nObjective-C programs interact with the runtime system to\
    \ implement the dynamic features of the language. In [Figure 8-7](#9781430250500_Ch08.xhtml#Fig7),\
    \ this interaction occurs at three levels:\n\n- Objective-C source code\n- Foundation\
    \ Framework `NSObject` methods\n- Runtime library API\n\n![9781430250500_Fig08-07.jpg](images/9781430250500_Fig08-07.jpg)\n\
    \n[Figure 8-7](#9781430250500_Ch08.xhtml#_Fig7). Interacting with the runtime\
    \ system"
  raw: 'Message invocation is ubiquitous in an Objective-C program. Just for application
    startup, `objc_msgSend()`, the runtime library function that performs object messaging,
    is called millions of times. Therefore, it is critical to optimize this code because
    even a slight change in its performance has a significant impact on the overall
    application performance. This method must look up the `IMP` corresponding to the
    message receiver and selector, and then jump to the `IMP` to begin its execution.
    In the last few sections, you learned how method caches and vtables are used to
    retrieve the `IMP`. Once this is accomplished, the runtime then dispatches the
    method using custom, optimized code written in assembly language. This code, referred
    to sometimes as a *trampoline*, looks up the right code and then jumps directly
    to it. This trampoline code works with any combination of parameters passed to
    it because they are just passed along for the method `IMP` to read. To handle
    the possible return value types, the runtime provides several different `objc_msgSend()`
    implementations.


    Accessing Class Instance Methods


    Now that you know how the runtime library looks up (and invokes) instance methods,
    you may be wondering how it does this for class methods (i.e., perform object
    messaging for class methods). Well, every Objective-C class is also, in fact,
    an object, hence it is capable of receiving messages, such as


    ```

    [NSObject alloc]

    ```


    So that explains how you can send messages to classes, but how does the runtime
    find and invoke class methods? Well, the runtime library implements this capability
    with metaclasses*.*


    A *metaclass*is a special type of class object that stores information that enables
    the runtime to look up and invoke the class methods of an Objective-C class. There’s
    a unique metaclass for every Objective-C class because every class potentially
    has a unique list of class methods. The runtime API provides functions for accessing
    metaclasses.


    `Class` hierarchies are observed with metaclasses, as with regular classes. In
    the same way that a class points to a superclass with its superclass pointer,
    a metaclass points to the metaclass of a class’s superclass using its own superclass
    pointer (refer back to [Figure 8-4](#9781430250500_Ch08.xhtml#Fig4)).


    The base class’s metaclass sets its superclass to the base class itself. The result
    of this inheritance hierarchy is that all instances, classes, and metaclasses
    in the hierarchy inherit from the hierarchy’s base class.


    The `isa` variable for an object points to a class that describes that instance,
    and can thus be used to access its instance methods, ivars, and so forth. The
    `isa` variable for an Objective-C class (object) points to a metaclass that describes
    the class (its class methods, etc.).


    Putting this all together, the runtime performs messaging for both instance and
    class methods, as follows:


    *   When your source code sends a message to an object, the runtime retrieves
    the appropriate instance method implementation (via the corresponding class instance
    method vtable) and jumps to that method.

    *   When your source code sends a message to a class, the runtime retrieves the
    appropriate class method implementation (via its metaclass class method vtable)
    and jumps to that method.


    Whew, that was a mouthful!! If necessary, take a moment to go over these concepts,
    and when you’re ready, we’ll attempt to clarify this with an example.


    Examining Class Methods


    Now you’re going to code an example to see how the runtime data structures utilize
    metaclasses and the place of metaclasses in the overall class hierarchy. You’ll
    do this by updating the Runspector program (developed earlier in this chapter)
    to retrieve metaclass information. Start Xcode (if not already started) and open
    the Runspector project by selecting **Open Recent** ![image](images/arrow.jpg)
    **Runspector.xcodeproj** from the Xcode File menu. Select the **main.m** file
    in the navigator pane and then add the code shown in [Listing 8-8](#9781430250500_Ch08.xhtml#list8).


    [*Listing 8-8.*](#9781430250500_Ch08.xhtml#_list8)  Runspector main() Function,
    Metaclass Data


    ```

    // Retrieve and display metaclass data

    id metaClass = objc_getMetaClass("TestClass1");

    long mclzSize = class_getInstanceSize([metaClass class]);

    NSData *mclzData = [NSData dataWithBytes:(__bridge const void *)(metaClass)

                                      length:mclzSize];

    NSLog(@"TestClass1 metaclass contains %@", mclzData);

    class_isMetaClass(metaClass) ?

      NSLog(@"Class %s is a metaclass", class_getName(metaClass)) :

      NSLog(@"Class %s is not a metaclass", class_getName(metaClass));

    ```


    This code uses the runtime function `objc_getMetaClass()` to retrieve the metaclass
    definition for the named class, and then displays its associated data bytes. Next,
    the code uses the runtime function `class_isMetaClass()` to test whether the object
    is a metaclass and then logs a corresponding message to the console. You may be
    wondering about the use of the bridged cast (`__bridge`). Well, the `NSData dataWithBytes:length:`
    method takes as its first parameter a variable of type (`const void *`). You may
    recall from [Chapter 4](#9781430250500_Ch04.xhtml) that ARC memory management
    prohibits casts directly from Objective-C objects and (`void *`) types. A bridged
    cast (discussed in [Chapter 6](#9781430250500_Ch06.xhtml)) enables the compiler
    to manage these scenarios. In this case, because there will be no transfer of
    ownership (i.e., the object assigned to the variable `metaClass` will still be
    managed by ARC), the `__bridge` annotation is used. On compiling and running the
    updated program, you should observe output similar to that shown in [Figure 8-6](#9781430250500_Ch08.xhtml#Fig6).


    ![9781430250500_Fig08-06.jpg](images/9781430250500_Fig08-06.jpg)


    [Figure 8-6](#9781430250500_Ch08.xhtml#_Fig6). Runspector program, metaclass inspection


    Note the metaclass information at the bottom of the output pane, as shown in [Listing
    8-9](#9781430250500_Ch08.xhtml#list9).


    [*Listing 8-9.*](#9781430250500_Ch08.xhtml#_list9)  Runspector Program Metaclass
    Information


    ```

    TestClass1 metaclass contains

    <6828a271 ff7f0000 6828a271 ff7f0000 d0821000 01000000 703d1000 01000000 60821000
    01000000>

    Class TestClass1 is a metaclass

    ```


    The metaclass data contains the `isa` pointer, the superclass pointer, and additional
    information. The superclass of `TestClass1` is `NSObject`. Because this class
    defines no custom class methods, its `isa` pointer is also `NSObject`. Hence the
    metaclass `isa` pointer and superclass pointer should be identical. This is confirmed
    with the results displayed in [Listing 8-9](#9781430250500_Ch08.xhtml#list9) (the
    value for each is `6828a271 ff7f0000`).


    This completes your review of the runtime library API and its implementation.
    In the next section, you’ll look at the Objective-C APIs that you can use for
    directly interacting with the runtime system.


    Interacting with the Runtime


    Objective-C programs interact with the runtime system to implement the dynamic
    features of the language. In [Figure 8-7](#9781430250500_Ch08.xhtml#Fig7), this
    interaction occurs at three levels:


    *   Objective-C source code

    *   Foundation Framework `NSObject` methods

    *   Runtime library API


    ![9781430250500_Fig08-07.jpg](images/9781430250500_Fig08-07.jpg)


    [Figure 8-7](#9781430250500_Ch08.xhtml#_Fig7). Interacting with the runtime system'
  trans: "\n# 消息调用优化\n\n消息调用在 Objective-C 程序中无处不在。仅应用程序启动时，执行对象消息传递的运行时库函数 `objc_msgSend()`\
    \ 就会被调用数百万次。因此，优化此代码至关重要，因为即使其性能的微小变化也会对整体应用程序性能产生重大影响。此方法必须查找与消息接收者和选择器对应的 `IMP`，然后跳转到该\
    \ `IMP` 以开始执行。在前几节中，您已经了解了如何使用方法缓存和虚函数表来检索 `IMP`。一旦完成此操作，运行时会使用汇编语言编写的自定义优化代码来调度方法。此代码有时称为\
    \ *trampoline*，它会查找正确的代码并直接跳转到该代码。此 trampoline 代码适用于传递给它的任何参数组合，因为这些参数只是传递给方法\
    \ `IMP` 以供读取。为了处理可能的返回值类型，运行时提供了几种不同的 `objc_msgSend()` 实现。\n\n# 访问类实例方法\n\n现在您已经了解了运行时库如何查找（和调用）实例方法，您可能想知道它是如何为类方法执行此操作的（即，为类方法执行对象消息传递）。实际上，每个\
    \ Objective-C 类本身也是一个对象，因此它能够接收消息，例如：\n\n```\n[NSObject alloc]\n```\n\n这就解释了如何向类发送消息，但运行时如何查找和调用类方法呢？实际上，运行时库通过*元类*实现了这种能力。\n\
    \n*元类*是一种特殊类型的类对象，它存储的信息使运行时能够查找和调用 Objective-C 类的类方法。每个 Objective-C 类都有一个唯一的元类，因为每个类可能都有一个唯一的类方法列表。运行时\
    \ API 提供了用于访问元类的函数。\n\n与常规类一样，元类也遵循 `Class` 层级结构。就像类通过其 superclass 指针指向父类一样，元类也通过其自身的\
    \ superclass 指针指向该类父类的元类（请参考图 8-4）。\n\n基类的元类将其 superclass 设置为基础类本身。这种继承层级结构的结果是，层级结构中的所有实例、类和元类都继承自该层级结构的基类。\n\
    \n对象的 `isa` 变量指向描述该实例的类，因此可用于访问其实例方法、实例变量等。Objective-C 类（对象）的 `isa` 变量指向描述该类（其类方法等）的元类。\n\
    \n综上所述，运行时对实例方法和类方法执行消息传递的方式如下：\n\n- 当您的源代码向对象发送消息时，运行时检索相应的实例方法实现（通过相应的类实例方法虚函数表）并跳转到该方法。\n\
    - 当您的源代码向类发送消息时，运行时检索相应的类方法实现（通过其元类类方法虚函数表）并跳转到该方法。\n\n呼，内容真多！如果需要，请花点时间回顾这些概念，等您准备好了，我们将通过一个示例来进一步阐明。\n\
    \n# 检查类方法\n\n现在您将编写一个示例，看看运行时数据结构如何利用元类以及元类在整个类层级结构中的位置。您将通过更新 Runspector 程序（本章前面开发的程序）来检索元类信息来实现这一点。启动\
    \ Xcode（如果尚未启动），并通过从 Xcode 文件菜单中选择 **Open Recent** ![image](img/arrow.jpg) **Runspector.xcodeproj**\
    \ 来打开 Runspector 项目。在导航器窗格中选择 **main.m** 文件，然后添加代码清单 8-8 中所示的代码。\n\n*代码清单 8-8.*\
    \ Runspector 的 main() 函数，元类数据\n\n```\n// 检索并显示元类数据\nid metaClass = objc_getMetaClass(\"\
    TestClass1\");\nlong mclzSize = class_getInstanceSize([metaClass class]);\nNSData\
    \ *mclzData = [NSData dataWithBytes:(__bridge const void *)(metaClass)\n     \
    \                             length:mclzSize];\nNSLog(@\"TestClass1 元类包含 %@\"\
    , mclzData);\nclass_isMetaClass(metaClass) ?\n  NSLog(@\"类 %s 是一个元类\", class_getName(metaClass))\
    \ :\n  NSLog(@\"类 %s 不是一个元类\", class_getName(metaClass));\n```\n\n这段代码使用运行时函数\
    \ `objc_getMetaClass()` 来检索指定类的元类定义，然后显示其关联的数据字节。接下来，代码使用运行时函数 `class_isMetaClass()`\
    \ 来测试该对象是否为元类，并将相应消息记录到控制台。您可能对桥接转换（`__bridge`）的使用感到疑惑。`NSData dataWithBytes:length:`\
    \ 方法将类型为 (`const void *`) 的变量作为其第一个参数。您可能还记得第 4 章中提到的，ARC 内存管理禁止直接从 Objective-C\
    \ 对象和 (`void *`) 类型进行转换。桥接转换（第 6 章中讨论过）使编译器能够管理这些场景。在这种情况下，由于不会发生所有权转移（即分配给变量\
    \ `metaClass` 的对象仍将由 ARC 管理），因此使用了 `__bridge` 注解。编译并运行更新后的程序后，您应该会观察到类似于图 8-6\
    \ 所示的输出。\n\n![9781430250500_Fig08-06.jpg](img/9781430250500_Fig08-06.jpg)\n\n\
    图 8-6. Runspector 程序，元类检查\n\n请注意输出窗格底部的元类信息，如代码清单 8-9 所示。\n\n*代码清单 8-9.* Runspector\
    \ 程序元类信息\n\n```\nTestClass1 元类包含\n<6828a271 ff7f0000 6828a271 ff7f0000 d0821000\
    \ 01000000 703d1000 01000000 60821000 01000000>\n类 TestClass1 是一个元类\n```\n\n元类数据包含\
    \ `isa` 指针、superclass 指针以及其他信息。`TestClass1` 的 superclass 是 `NSObject`。由于该类未定义自定义类方法，其\
    \ `isa` 指针也是 `NSObject`。因此，元类的 `isa` 指针和 superclass 指针应该是相同的。代码清单 8-9 显示的结果证实了这一点（每个值均为\
    \ `6828a271 ff7f0000`）。\n\n至此，您对运行时库 API 及其实现的回顾就完成了。在下一节中，您将了解可用于直接与运行时系统交互的\
    \ Objective-C API。\n\n# 与运行时交互\n\nObjective-C 程序与运行时系统交互以实现该语言的动态特性。在图 8-7 中，这种交互发生在三个层面：\n\
    \n- Objective-C 源代码\n- Foundation 框架的 `NSObject` 方法\n- 运行时库 API\n\n![9781430250500_Fig08-07.jpg](img/9781430250500_Fig08-07.jpg)\n\
    \n图 8-7. 与运行时系统交互\n"
- fmt: "# In the preceding sections\n\nIn the preceding sections, you discussed the\
    \ role of the compiler and the runtime library. Now you’ll spend time looking\
    \ at the runtime features of the Foundation Framework `NSObject` class.\n\n##\
    \ NSObject Runtime Methods\n\nAs discussed throughout this chapter, the Objective-C\
    \ language provides many dynamic programming capabilities. The runtime system\
    \ provides a set of APIs that enable you to directly interact with the runtime;\
    \ however, these are coded in C and thus mandate a procedural programming approach.\
    \ As an alternative, the Foundation Framework `NSObject` class provides a set\
    \ of methods that duplicate much of the functionality available from the runtime\
    \ APIs. As your custom classes (and nearly all of the Cocoa framework classes)\
    \ descend from `NSObject`, your code inherits these methods and thus can use them\
    \ directly. The functionality provided by the `NSObject` runtime methods includes:\n\
    \n*   Object introspection\n*   Message forwarding\n*   Dynamic method resolution\n\
    *   Dynamic loading\n\nNext, you’ll demonstrate this with an example that uses\
    \ `NSObject` runtime methods to perform object introspection.\n\n## Performing\
    \ Object Introspection\n\nYou are now going to create a program that dynamically\
    \ creates a class using the runtime APIs. In Xcode, create a new project by selecting\
    \ **New** ![image](images/arrow.jpg) **Project …** from the Xcode File menu. In\
    \ the **New Project Assistant** pane, create a command-line application (choose\
    \ **Command Line Tool** from the Mac OS X Application selection) and click **Next**.\
    \ In the **Project Options** window, specify **Introspector** for the Product\
    \ Name, choose **Foundation** for the Project Type, select ARC memory management\
    \ by checking the **Use Automatic Reference Counting** check box, and then click\
    \ **Next**.\n\nSpecify the location in your file system where you want the project\
    \ to be created (if necessary, select **New Folder** and enter the name and location\
    \ for the folder), uncheck the **Source Control** check box, and then click the\
    \ **Create** button.\n\nNow let’s implement the code. Select the **main.m** file\
    \ in the navigator pane, and then add the code shown in [Listing 8-10](#9781430250500_Ch08.xhtml#list10).\n\
    \n[*Listing 8-10.*](#9781430250500_Ch08.xhtml#_list10)  Introspector main.m File\n\
    \n```\n#import <Foundation/Foundation.h>\n\n// Test class 1\n@interface Greeter\
    \ : NSObject\n@property (readwrite, strong) NSString *salutation;\n- (NSString\
    \ *)greeting:(NSString *)recipient;\n@end\n@implementation Greeter\n- (NSString\
    \ *)greeting:(NSString *)recipient\n{\n  return [NSString stringWithFormat:@\"\
    %@, %@\", [self salutation], recipient];\n}\n@end\n\nint main(int argc, const\
    \ char * argv[])\n{\n  @autoreleasepool\n  {\n    Greeter *greeter = [[Greeter\
    \ alloc] init];\n    [greeter setSalutation:@\"Hello\"];\n\nif ([greeter respondsToSelector:@selector(greeting:)]\
    \ &&\n        [greeter conformsToProtocol:@protocol(NSObject)])\n    {\n     \
    \ id result = [greeter performSelector:@selector(greeting:) withObject:@\"Monster!\"\
    ];\n      NSLog(@\"%@\", result);\n    }\n  }\n  return 0;\n}\n```\n\nImmediately\
    \ after the `import` statement, the code defines the `Greeter` class. This class\
    \ defines a property and a method that returns a simple greeting. In the `main()`\
    \ function, you first create a `Greeter` instance and set the value of the property.\
    \ Next, you use the `NSObject` runtime methods to perform object introspection.\
    \ Specifically, you test the `NSObject respondsToSelector:` and `conformsToProtocol:`\
    \ methods. If the result returned from these two conditional expressions is `YES`,\
    \ the code sends a message to the `Greeter` instance using the `NSObject` runtime\
    \ method `performSelector:withObject:`. Finally, the result returned from this\
    \ method is logged to the output pane. When you compile and run the program, you\
    \ should observe output similar to that shown in [Figure 8-8](#9781430250500_Ch08.xhtml#Fig8).\n\
    \n![9781430250500_Fig08-08.jpg](images/9781430250500_Fig08-08.jpg)\n\n[Figure\
    \ 8-8](#9781430250500_Ch08.xhtml#_Fig8). Introspector program output\n\nThe complete\
    \ list of `NSObject` runtime methods is defined in the `NSObject` class reference\
    \ and the `NSObject` protocol reference. These are found in the Foundation Framework\
    \ Reference Guide.\n\n## Roundup\n\nIn this chapter, you examined in detail the\
    \ key components of the runtime system architecture. You should now have a good\
    \ understanding of how the runtime system implements the object-oriented and dynamic\
    \ features of the language. To recap, the following are the key takeaways:\n\n\
    *   The Objective-C runtime system has two main components: the compiler and the\
    \ runtime library. The compiler takes input Objective-C source code and generates\
    \ code that is executed by the runtime library. This library is linked (during\
    \ the linking phase) to all Objective-C programs. Together, they implement all\
    \ of the object-oriented and dynamic features of the language.\n*   The runtime\
    \ library APIs define a set of data types, functions, and constants. Many of these\
    \ data types and functions map to corresponding Objective-C language elements\
    \ (i.e., objects, classes, protocols, methods, instance variables, etc.). The\
    \ runtime library public API is expressed in C.\n*   The runtime library implementation\
    \ includes a variety of features and mechanisms to enhance application performance\
    \ and extensibility. Examples of these include the method cache, vtable, and use\
    \ of the dyld shared cache.\n*   The runtime library utilizes metaclasses to look\
    \ up and invoke class methods. A metaclass is a special type of class object that\
    \ stores information enabling the runtime to look up and invoke the class methods\
    \ of an Objective-C class.\n*   The Foundation Framework `NSObject` class provides\
    \ a set of methods for invoking runtime system functionality and behaviors. These\
    \ methods perform object introspection, dynamic method resolution, dynamic loading,\
    \ and message forwarding.\n\nThis completes your deep dive into the runtime system.\
    \ Please feel free to review what you have gone over in the last two chapters\
    \ and experiment with the example programs. Understanding the runtime system is\
    \ very important for becoming proficient at developing Objective-C programs.\n\
    \n# Chapter 9\n\n## Expert Section: Using the Runtime APIs\n\nIn [Chapters 7](#9781430250500_Ch07.xhtml)\
    \ and [8](#9781430250500_Ch08.xhtml), you learned about the dynamic features of\
    \ Objective-C and the design and architecture of the runtime system that implements\
    \ these features. In this Expert Section chapter, you are going to finish Part\
    \ 2 of this book with several example programs that will enable you to get more\
    \ hands-on experience with the runtime system features and its APIs. You’ll create\
    \ a dynamic proxy using the `NSInvocation` API, perform dynamic loading of your\
    \ own custom framework bundle using the `NSBundle` API, and create a program that\
    \ makes extensive use of the runtime library APIs. Believe me, after this chapter\
    \ is done, you’ll be well on your way to mastering the intricacies of the Objective-C\
    \ runtime system!\n\n### Extending a Program with Loadable Bundles\n\nObjective-C\
    \ provides numerous dynamic programming features. These features increase the\
    \ power and flexibility of the language, and enable you to modify a program during\
    \ execution. In [Chapter 7](#9781430250500_Ch07.xhtml), you discussed dynamic\
    \ loading and briefly described how the Foundation Framework `NSBundle` class\
    \ can be used to manage bundles. Now you are going to create a program that utilizes\
    \ these features to extend a running program using a loadable bundle.\n\n####\
    \ Approach\n\nFor this example, you’ll actually develop two projects. In one project,\
    \ you’ll code the program that uses a loadable bundle, and in the other project,\
    \ you’ll create the loadable bundle. You’ll proceed as follows:"
  raw: 'In the preceding sections, you discussed the role of the compiler and the
    runtime library. Now you’ll spend time looking at the runtime features of the
    Foundation Framework `NSObject` class.


    NSObject Runtime Methods


    As discussed throughout this chapter, the Objective-C language provides many dynamic
    programming capabilities. The runtime system provides a set of APIs that enable
    you to directly interact with the runtime; however, these are coded in C and thus
    mandate a procedural programming approach. As an alternative, the Foundation Framework
    `NSObject` class provides a set of methods that duplicate much of the functionality
    available from the runtime APIs. As your custom classes (and nearly all of the
    Cocoa framework classes) descend from `NSObject`, your code inherits these methods
    and thus can use them directly. The functionality provided by the `NSObject` runtime
    methods includes:


    *   Object introspection

    *   Message forwarding

    *   Dynamic method resolution

    *   Dynamic loading


    Next, you’ll demonstrate this with an example that uses `NSObject` runtime methods
    to perform object introspection.


    Performing Object Introspection


    You are now going to create a program that dynamically creates a class using the
    runtime APIs. In Xcode, create a new project by selecting **New** ![image](images/arrow.jpg)
    **Project …** from the Xcode File menu. In the **New Project Assistant** pane,
    create a command-line application (choose **Command Line Tool** from the Mac OS
    X Application selection) and click **Next**. In the **Project Options** window,
    specify **Introspector** for the Product Name, choose **Foundation** for the Project
    Type, select ARC memory management by checking the **Use Automatic Reference Counting**
    check box, and then click **Next**.


    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    Now let’s implement the code. Select the **main.m** file in the navigator pane,
    and then add the code shown in [Listing 8-10](#9781430250500_Ch08.xhtml#list10).


    [*Listing 8-10.*](#9781430250500_Ch08.xhtml#_list10)  Introspector main.m File


    ```

    #import <Foundation/Foundation.h>


    // Test class 1

    @interface Greeter : NSObject

    @property (readwrite, strong) NSString *salutation;

    - (NSString *)greeting:(NSString *)recipient;

    @end

    @implementation Greeter

    - (NSString *)greeting:(NSString *)recipient

    {

      return [NSString stringWithFormat:@"%@, %@", [self salutation], recipient];

    }

    @end


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        Greeter *greeter = [[Greeter alloc] init];

        [greeter setSalutation:@"Hello"];


    if ([greeter respondsToSelector:@selector(greeting:)] &&

            [greeter conformsToProtocol:@protocol(NSObject)])

        {

          id result = [greeter performSelector:@selector(greeting:) withObject:@"Monster!"];

          NSLog(@"%@", result);

        }

      }

      return 0;

    }

    ```


    Immediately after the import statement, the code defines the `Greeter` class.
    This class defines a property and a method that returns a simple greeting. In
    the `main()` function, you first create a `Greeter` instance and set the value
    of the property. Next, you use the `NSObject` runtime methods to perform object
    introspection. Specifically, you test the `NSObject respondsToSelector:` and `conformsToProtocol:`
    methods. If the result returned from these two conditional expressions is `YES`,
    the code sends a message to the `Greeter` instance using the `NSObject` runtime
    method `performSelector:withObject:`. Finally, the result returned from this method
    is logged to the output pane. When you compile and run the program, you should
    observe output similar to that shown in [Figure 8-8](#9781430250500_Ch08.xhtml#Fig8).


    ![9781430250500_Fig08-08.jpg](images/9781430250500_Fig08-08.jpg)


    [Figure 8-8](#9781430250500_Ch08.xhtml#_Fig8). Introspector program output


    The complete list of `NSObject` runtime methods is defined in the `NSObject` class
    reference and the `NSObject` protocol reference. These are found in the Foundation
    Framework Reference Guide.


    Roundup


    In this chapter, you examined in detail the key components of the runtime system
    architecture. You should now have a good understanding of how the runtime system
    implements the object-oriented and dynamic features of the language. To recap,
    the following are the key takeaways:


    *   The Objective-C runtime system has two main components: the compiler and the
    runtime library. The compiler takes input Objective-C source code and generates
    code that is executed by the runtime library. This library is linked (during the
    linking phase) to all Objective-C programs. Together, they implement all of the
    object-oriented and dynamic features of the language.

    *   The runtime library APIs define a set of data types, functions, and constants.
    Many of these data types and functions map to corresponding Objective-C language
    elements (i.e., objects, classes, protocols, methods, instance variables, etc.).
    The runtime library public API is expressed in C.

    *   The runtime library implementation includes a variety of features and mechanisms
    to enhance application performance and extensibility. Examples of these include
    the method cache, vtable, and use of the dyld shared cache.

    *   The runtime library utilizes metaclasses to look up and invoke class methods.
    A metaclass is a special type of class object that stores information enabling
    the runtime to look up and invoke the class methods of an Objective-C class.

    *   The Foundation Framework `NSObject` class provides a set of methods for invoking
    runtime system functionality and behaviors. These methods perform object introspection,
    dynamic method resolution, dynamic loading, and message forwarding.


    This completes your deep dive into the runtime system. Please feel free to review
    what you have gone over in the last two chapters and experiment with the example
    programs. Understanding the runtime system is very important for becoming proficient
    at developing Objective-C programs.


    Chapter     9


    Expert Section: Using the Runtime APIs


    In [Chapters 7](#9781430250500_Ch07.xhtml) and [8](#9781430250500_Ch08.xhtml),
    you learned about the dynamic features of Objective-C and the design and architecture
    of the runtime system that implements these features. In this Expert Section chapter,
    you are going to finish Part 2 of this book with several example programs that
    will enable you to get more hands-on experience with the runtime system features
    and its APIs. You’ll create a dynamic proxy using the `NSInvocation` API, perform
    dynamic loading of your own custom framework bundle using the `NSBundle` API,
    and create a program that makes extensive use of the runtime library APIs. Believe
    me, after this chapter is done, you’ll be well on your way to mastering the intricacies
    of the Objective-C runtime system!


    Extending a Program with Loadable Bundles


    Objective-C provides numerous dynamic programming features. These features increase
    the power and flexibility of the language, and enable you to modify a program
    during execution. In [Chapter 7](#9781430250500_Ch07.xhtml), you discussed dynamic
    loading and briefly described how the Foundation Framework `NSBundle` class can
    be used to manage bundles. Now you are going to create a program that utilizes
    these features to extend a running program using a loadable bundle.


    Approach


    For this example, you’ll actually develop two projects. In one project, you’ll
    code the program that uses a loadable bundle, and in the other project, you’ll
    create the loadable bundle. You’ll proceed as follows:'
  trans: "\n# 前文回顾\n\n在前文中，你讨论了编译器和运行时库的作用。现在，你将深入探讨 Foundation 框架中 `NSObject` 类的运行时特性。\n\
    \n## NSObject 运行时方法\n\n如本章所述，Objective-C 语言提供了许多动态编程能力。运行时系统提供了一套 API，使你能够直接与运行时进行交互；然而，这些\
