    \ . . .**（如图 C-10 所示）来添加一个异常断点。\n\n![9781430250500_AppC-10.jpg](img/9781430250500_AppC-10.jpg)\n\
    \n图 C-10. 添加异常断点\n\n在异常断点对话框中，有几个设置。对于**异常**，选择**全部**（设置所有异常），对于**中断**，选择**抛出时**（当异常被抛出时设置断点）。当你编译并运行程序时，你应该会看到程序在`main`函数中暂停在下面这行代码上：\n\
    \n```\nNSCAssert(([sum2 intValue] == 15),  @\"Invalid sum computed\");\n```\n\n\
    你可以看到这个断言失败了，导致异常被抛出。现在你将设置一些行断点来对程序进行故障排除。在 Xcode 中，通过点击源代码中对应行的行号区域来设置一个行断点。在项目导航器中，选择\
    \ **Calculator.m** 文件，并在包含以下语句的行设置一个断点：\n\n```\nreturn [NSNumber numberWithInteger:([adder1\
    \ integerValue] +\n                                    [adder2 integerValue])];\n\
    ```\n\n接下来，在 `main()` 函数中，在包含以下语句的行设置一个断点：\n\n```\nNSCAssert(([sum1 intValue]\
    \ == 25), @\"Invalid sum computed\");\n```\n\n现在编辑这个断点，添加一个断点动作，如图 C-11 所示。\n\n\
    ![9781430250500_AppC-11.jpg](img/9781430250500_AppC-11.jpg)\n\n图 C-11. 为计算器求和编辑断点动作\n\
    \n该断点动作执行一个调试器命令，记录存储在变量 `sum1` 中的值。\n\n```\nexpr (void)NSLog(@\"Sum 1 = %@\"\
    , sum1)\n```\n\n注意，在调试器命令表达式中必须指定返回类型。在这里，类型是 `void`，表示 `NSLog` 函数不返回值。还要注意，断点选项被设置为执行后自动继续。实际上，这使你可以显示程序变量的值，而无需在代码中编写\
    \ `NSLog` 语句，从而避免用调试语句混乱你的代码！当你编译并运行程序时，它会在为 `sumAddend1:addend2:` 方法设置的行断点处暂停执行，如图\
    \ C-12 所示。\n\n![9781430250500_AppC-12.jpg](img/9781430250500_AppC-12.jpg)\n\n\
    图 C-12. 在 `sumAddend1:addend2:` 方法的行断点处暂停执行\n\n在调试区域的内容窗格中，你可以看到变量 `adder1` 和\
    \ `adder2` 的值是符合预期的。现在你想验证这个方法的返回值。这可以通过“单步跳出”命令（位于调试栏中）来完成。该命令会执行当前执行点所在的方法/函数的剩余行，然后显示方法/函数调用之后的下一条语句。选择这个按钮两次。完成后，返回值会显示在内容窗格的显示区域（**返回值**），如图\
    \ C-13 所示。\n\n![9781430250500_AppC-13.jpg](img/9781430250500_AppC-13.jpg)\n\n\
    图 C-13. 使用调试器显示方法的返回值\n\n返回值为 25（如图 C-13 所示），这是正确的。接下来，在调试栏中选择**继续**（你可能需要点击该按钮两到三次）。根据你之前配置的断点动作调试器命令，输出控制台会记录\
    \ `Sum 1 = 25`。现在观察到你为 `sumAddend1:addend2:` 方法设置的行断点处，调试器再次暂停。这次，在调试区域的内容窗格中使用调试器的\
    \ `po` 命令来显示这两个参数的值：\n\n```\npo adder1\npo adder2\n```\n\n这些命令的输出显示在图 C-14 中。\n\
    \n![9781430250500_AppC-14.jpg](img/9781430250500_AppC-14.jpg)\n\n图 C-14. 使用 Xcode\
    \ 调试器命令显示变量的值\n\n这些值（10，–25）是符合预期的，所以选择**继续**来推进程序。接下来，调试器暂停在 `NSCAssert` 处。使用\
    \ `po` 命令，变量 `sum2` 显示值为 –15（如图 C-15 所示）。\n\n![9781430250500_AppC-15.jpg](img/9781430250500_AppC-15.jpg)\n\
    \n图 C-15. 使用 `po` 命令显示一个值\n\n这是期望的值，那为什么断言会失败呢？查看断言语句，你可以看到条件表达式期望的值是 15，但它应该是\
    \ –15！\n\n```\nNSCAssert(([sum2 intValue] == 15),  @\"Invalid sum computed\");\n\
    ```\n\n当你修正断言（将值改为 –15）并再次运行程序时，你会看到它成功运行了。尽管这是一个非常刻意构造的例子，但它说明了在 Xcode 中使用 LLDB\
    \ 进行调试的一些功能。苹果提供了各种关于在 Xcode 中使用 LLDB 调试的文档，并且 LLDB 网站是获取更多信息的重要参考资料。\n\n## 总结\n\
    \n在本附录中，你学习了使用 LLDB（Xcode 的默认调试器）进行调试。调试是软件开发中必不可少的一部分，因此掌握这项技能对于成为一个更高效、更有生产力的程序员至关重要。现在我希望你已经相信了\
    \ LLDB 的强大能力，并且你会花时间熟练地在你的所有 Objective-C 软件开发项目中使用它。\n\n现在你已经读完了这本书的最后一页。我希望在你开发更多\
    \ OS X 和 iOS 应用时，它（并将继续）对你有所帮助。如果你对本书或 Objective-C 有任何问题或评论，请随时通过 `ProObjectiveC@icloud.com`\
    \ 与我联系。感谢你参与这段奇妙的旅程，现在，就此搁笔！\n\n## 索引\n\n![images](img/square1.jpg)  A\n\n访问器方法\n\
