    \ 创建新类和元类。\n2. 为类添加方法和实例变量（如果有）。\n3. 注册新创建的类。\n\n该功能通过 代码清单 9-9 中的以下代码实现。\n\n\
    ```objc\n// 创建类对\nClass WidgetClass = objc_allocateClassPair([NSObject class],\
    \ \"Widget\", 0);\n\n// 为类添加方法\nconst char *types = \"v@:\";\nclass_addMethod(WidgetClass,\
    \ @selector(display), (IMP)display, types);\n\n// 为类添加实例变量\nconst char *height\
    \ = \"height\";\nclass_addIvar(WidgetClass, height, sizeof(id), rint(log2(sizeof(id))),\n\
    \              @encode(id));\n\n// 注册类\nobjc_registerClassPair(WidgetClass);\n\
    ```\n\n运行时 `class_addMethod` 函数接受以下参数：要添加方法的类、指定所添加方法名称的选择器、实现该方法的函数，以及一个描述参数类型和返回值类型的字符串——称为\
    \ *类型编码*。每种可能的类型都由一个类型代码表示；例如，字符“`v`”代表 `void`，“`@`”代表对象（无论是指向 Objective-C 类的指针还是\
    \ `id` 类型），“`:`”代表 `SEL` 类型。完整的类型编码列表在 Apple 的 Objective-C 运行时编程指南中指定。`class_addMethod`\
    \ 函数的 `types` 参数中的代码必须按定义的顺序排列：第一个代码是返回值类型，第二个代码是方法隐式 `self` 参数的类型（`id` 类型），第三个代码是方法隐式\
    \ `_cmd` 参数的类型（`SEL` 类型），其余代码是方法每个显式参数的类型。因此，对于 `display` 方法，对应的 `types` 数组的值是“`v@:`”。\n\
    \n## 创建类实例\n\n代码创建了动态添加的类的一个实例，设置了其实例变量的值，然后调用了实例方法。它还在输出面板中记录消息，以显示实例变量的值和方法的调用。\n\
    \n## 动态添加变量到类实例\n\nObjective-C 不提供向对象添加实例变量的能力；然而，运行时的一个特性——关联对象——可以用来有效地模拟此功能。*关联对象*\
    \ 是附加到类实例上的对象，通过一个键来引用。这可以用于多种场景；例如，与不允许实例变量的 Objective-C 类别一起使用。创建关联对象时，你需要指定关联映射的键、关联对象的内存管理策略及其值。代码清单\
    \ 9-9 中的以下代码演示了如何使用关联对象的运行时 API。\n\n```objc\n// 动态添加变量（关联对象）到 widget\nNSNumber\
    \ *width = [NSNumber numberWithInt:10];\nobjc_setAssociatedObject(widget, @\"\
    width\", width,\n                         OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n\
    \n// 检索变量的值并显示\nid result = objc_getAssociatedObject(widget, @\"width\");\nNSLog(@\"\
    Widget 实例宽度 = %@\", result);\n```\n\n运行时 API 包含一个枚举，列出了内存管理策略的可能值。在此策略中，`OBJC_ASSOCIATION_RETAIN_NONATOMIC`\
    \ 为关联对象分配了一个非原子的 `strong` 引用。这类似于创建具有 `nonatomic, strong` 属性的属性。当你编译并运行 RuntimeWidget\
    \ 程序时，你应该会在输出面板中看到如图 9-12 所示的消息。\n\n![9781430250500_Fig09-12.jpg](img/9781430250500_Fig09-12.jpg)\n\
    \n图 9-12。RuntimeWidget 程序输出\n\n此示例演示了如何使用运行时 API 动态创建类、类实例和关联对象。请参考 Apple 的 Objective-C\
    \ 运行时参考以获取运行时 API 的完整指南。\n\n## 创建动态代理\n\n最后一个程序演示了如何使用 Foundation 框架的 `NSInvocation`\
    \ 和 `NSProxy` 类进行动态消息转发。在 第 3 章 中，你学习了 Objective-C 提供了几种类型的消息转发选项：使用 `NSObject\
    \ forwardingTargetForSelector:` 方法的快速转发，以及使用 `NSObject forwardInvocation:` 方法的普通（完整）转发。\n\
    \n普通转发的一个好处是，它允许你对对象消息、其参数和返回值执行额外的处理。与 `NSProxy` 结合使用时，它为在 Objective-C 中实现 *面向切面编程*（AOP）提供了一种出色的机制。AOP\
    \ 是一种编程范式，旨在通过将 *横切* 功能（依赖或影响程序多个部分的功能）与程序的其他部分分离，来提高程序的模块化程度。`NSProxy` 是一个专门为代理设计的\
    \ Foundation 框架类。它充当实际类的接口。在这里，你创建 `NSProxy` 的一个子类，并实现 `forwardInvocation:` 方法，从而允许发送给实际（即主题）类的消息被装饰上所需的横切功能。图\
    \ 9-13 描绘了你在本程序中将要实现的组件及其相互关系的总体图。\n\n![9781430250500_Fig09-13.jpg](img/9781430250500_Fig09-13.jpg)\n\
    \n图 9-13。AspectProxy 类图\n\n别担心。你将一步一步来。让我们从 `Invoker` 协议开始。\n\n### 创建 Invoker\
    \ 协议"
- fmt: '在 Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New ![image](images/arrow.jpg) Project
    …** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options**
    窗口中，指定 **AspectProxy** 作为产品名称，选择 **Foundation** 作为项目类型，并通过勾选 **Use Automatic Reference
    Counting** 复选框来选定 ARC 内存管理。指定文件系统中要创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消勾选
    **Source Control** 复选框，然后点击 **Create** 按钮。


    接下来，您将创建一个协议和一个符合该协议的类。从 Xcode 的 **File** 菜单中选择 **New ![image](images/arrow.jpg)
    File …**，选择 **Objective-C** 协议模板，将协议命名为 **Invoker**，选择 **AspectProxy** 文件夹作为文件位置，选择
    **AspectProxy** 项目作为目标，然后点击 **Create** 按钮。一个名为 `Invoker.h` 的头文件已被添加到 Xcode 导航器窗格中。在编辑器窗格中，更新
    `Greeter.h` 文件，如下面的[列表 9-10](#9781430250500_Ch09.xhtml#list10) 所示。


    [*列表 9-10.*](#9781430250500_Ch09.xhtml#_list10)  Invoker 协议


    ```

    #import <Foundation/Foundation.h>


    @protocol Invoker <NSObject>


    // 必需方法（必须实现）

    @required

    - (void) preInvoke:(NSInvocation *)inv withTarget:(id) target;

    // 可选方法

    @optional

    - (void) postInvoke:(NSInvocation *)inv withTarget:(id) target;


    @end

    ```


    该协议声明了两个方法。`preInvoke:withTarget:` 是一个*必需*方法（任何符合此协议的类都必须实现它），它实现了在真实对象上调用方法之前立即执行的横切功能。名为
    `preInvoke:withTarget:` 的方法是一个*可选*方法，它实现了在真实对象上调用方法之后立即执行的横切功能。


    现在，您将实现一个符合此协议的类，以实现所需的横切功能。从 Xcode 的 **File** 菜单中选择 **New ![image](images/arrow.jpg)
    File …**，选择 **Objective-C** 类模板，将类命名为 **AuditingInvoker**（在 **Subclass of** 下拉列表中选择
    **NSObject**），选择 **AspectProxy** 文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create**
    按钮。在 Xcode 导航器窗格中，选择生成的头文件 **AspectProxy.h** 并更新接口，如下面的[列表 9-11](#9781430250500_Ch09.xhtml#list11)
    所示。


    [*列表 9-11.*](#9781430250500_Ch09.xhtml#_list11)  AuditingInvoker 接口


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AuditingInvoker : NSObject <Invoker>


    @end

    ```


    模板 `AuditingInvoker` 接口已更新为采用 `Invoker` 协议。现在选择 **AuditingInvoker.m** 文件并更新实现，如下面的[列表
    9-12](#9781430250500_Ch09.xhtml#list12) 所示。


    [*列表 9-12.*](#9781430250500_Ch09.xhtml#_list12)  AuditingInvoker 实现


    ```

    #import "AuditingInvoker.h"


    @implementation AuditingInvoker


    - (void) preInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log before sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    - (void) postInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log after sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    @end

    ```


    `AuditingInvoker` 的实现定义了 `preInvoke:withTarget:` 和 `postInvoke:withTarget:` 方法，因此它符合
    `Invoker` 协议。这些方法仅将适当的消息记录到 Xcode 输出窗格。好了，既然您已经实现了横切功能，让我们来处理 `NSProxy` 子类。


    ## 编写代理类


    现在，您将创建代理类。它将继承 `NSProxy` 并实现消息转发方法 `forwardInvocation:` 和 `methodSignatureForSelector:`。从
    Xcode 的 **File** 菜单中选择 **New ![image](images/arrow.jpg) File …**，选择 **Objective-C**
    类模板，将类命名为 **AspectProxy**（在 **Subclass of** 下拉列表中选择 **NSObject**），选择 **AspectProxy**
    文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create** 按钮。在 Xcode 导航器窗格中，选择生成的头文件
    **AspectProxy.h** 并更新接口，如下面的[列表 9-13](#9781430250500_Ch09.xhtml#list13) 所示。


    [*列表 9-13.*](#9781430250500_Ch09.xhtml#_list13)  AspectProxy 接口


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AspectProxy : NSProxy


    @property (strong) id proxyTarget;

    @property (strong) id<Invoker> invoker;

    @property (readonly) NSMutableArray *selectors;


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker;

    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker;

    - (void)registerSelector:(SEL)selector;


    @end

    ```


    该接口添加了三个属性和三个方法。`proxyTarget` 属性是真实对象，消息通过 `NSProxy` 实例转发给它。`invoker` 属性是一个类的实例（该类符合
    `Invoker` 协议），它实现了所需的横切功能。`selectors` 属性是一个选择器集合，定义了将调用横切功能的消息。其中两个方法是 `AspectProxy`
    类实例的初始化方法，第三个方法 `registerSelector:` 用于向当前列表添加一个选择器。现在选择 **AspectProxy.m** 文件并更新实现，如下面的[列表
    9-14](#9781430250500_Ch09.xhtml#list14) 所示。


    [*列表 9-14.*](#9781430250500_Ch09.xhtml#_list14)  AspectProxy 实现


    ```

    #import "AspectProxy.h"


    @implementation AspectProxy


    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker

    {

      _proxyTarget = object;

      _invoker = invoker;

      _selectors = [selectors mutableCopy];

      return self;

    }


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker

    {

      return [self initWithObject:object selectors:nil andInvoker:invoker];

    }


    - (NSMethodSignature *)methodSignatureForSelector:(SEL)sel

    {

      return [self.proxyTarget methodSignatureForSelector:sel];

    }


    - (void)forwardInvocation:(NSInvocation *)inv

    {

      // 在目标上调用方法之前执行功能

      if ([self.invoker respondsToSelector:@selector(preInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

        }

      }


    // 在目标上调用方法

      [inv invokeWithTarget:self.proxyTarget];


    // 在目标上调用方法之后执行功能

      if ([self.invoker respondsToSelector:@selector(postInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

        }

      }

    }


    - (void)registerSelector:(SEL)selector

    {

      NSValue* selValue = [NSValue valueWithPointer:selector];

      [self.selectors addObject:selValue];

    }


    @end

    ```'
  raw: 'In Xcode, create a new project by selecting **New ![image](images/arrow.jpg)
    Project …** from the Xcode File menu. In the **New Project Assistant** pane, create
    a command-line application. In the **Project Options** window, specify **AspectProxy**
    for the Product Name, choose **Foundation** for the Project Type, and select ARC
    memory management by checking the **Use Automatic Reference Counting** check box.
    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    Now you’re going to create a protocol and a class that conforms to the protocol.
    Select **New ![image](images/arrow.jpg) File …** from the Xcode File menu, select
    the **Objective-C** protocol template, name the protocol **Invoker**, select the
    **AspectProxy** folder for the files location and the **AspectProxy** project
    as the target, and then click the **Create** button. A header file named `Invoker.h`
    has been added to the Xcode navigator pane. In the editor pane, update the `Greeter.h`
    file, as shown in [Listing 9-10](#9781430250500_Ch09.xhtml#list10).


    [*Listing 9-10.*](#9781430250500_Ch09.xhtml#_list10)  Invoker Protocol


    ```

    #import <Foundation/Foundation.h>


    @protocol Invoker <NSObject>


    // Required methods (must be implemented)

    @required

    - (void) preInvoke:(NSInvocation *)inv withTarget:(id) target;

    // Optional methods

    @optional

    - (void) postInvoke:(NSInvocation *)inv withTarget:(id) target;


    @end

    ```


    This protocol declares two methods. `preInvoke:withTarget:` is a *required* method
    (it must be implemented by any class that conforms to this protocol) that implements
    cross-cutting functionality performed immediately prior to invoking the method
    on the real object. The method named `preInvoke:withTarget:` is an *optional*
    method that implements cross-cutting functionality performed immediately after
    invoking the method on the real object.


    Now you’ll implement a class that conforms to this protocol, implementing the
    desired cross-cutting functionality. Select **New ![image](images/arrow.jpg) File
    …** from the Xcode File menu, select the **Objective-C** class template, name
    the class **AuditingInvoker** (select **NSObject** in the **Subclass of** drop-down
    list), select the **AspectProxy** folder for the files location and the **AspectProxy**
    project as the target, and then click the **Create** button. In the Xcode navigator
    pane, select the resulting header file named **AspectProxy.h** and update the
    interface as shown in [Listing 9-11](#9781430250500_Ch09.xhtml#list11).


    [*Listing 9-11.*](#9781430250500_Ch09.xhtml#_list11)  AuditingInvoker Interface


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AuditingInvoker : NSObject <Invoker>


    @end

    ```


    The template AuditingInvoker interface has been updated to adopt the `Invoker`
    protocol. Now select the **AuditingInvoker.m** file and update the implementation
    as shown in [Listing 9-12](#9781430250500_Ch09.xhtml#list12).


    [*Listing 9-12.*](#9781430250500_Ch09.xhtml#_list12)  AuditingInvoker Implementation


    ```

    #import "AuditingInvoker.h"


    @implementation AuditingInvoker


    - (void) preInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log before sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    - (void) postInvoke:(NSInvocation *)inv withTarget:(id)target

    {

      NSLog(@"Creating audit log after sending message with selector %@ to %@ object",

            NSStringFromSelector([inv selector]), [target className]);

    }


    @end

    ```


    The `AuditingInvoker` implementation defines the `preInvoke:withTarget:` and the
    `postInvoke:withTarget:` methods, and thus it conforms to the `Invoker` protocol.
    The methods merely log appropriate messages to the Xcode output pane. OK, now
    that you’re done implementing the cross-cutting functionality, let’s tackle the
    `NSProxy` subclass.


    Coding the Proxy Class


    Now you’re going to create the proxy class. It will subclass `NSProxy` and implement
    the message forwarding methods `forwardInvocation:` and `methodSignatureForSelector:`.
    Select **New ![image](images/arrow.jpg) File …** from the Xcode File menu, select
    the **Objective-C** class template, name the class **AspectProxy** (select **NSObject**
    in the **Subclass of** drop-down list), select the **AspectProxy** folder for
    the files location and the **AspectProxy** project as the target, and then click
    the **Create** button. In the Xcode navigator pane, select the resulting header
    file named **AspectProxy.h** and update the interface as shown in [Listing 9-13](#9781430250500_Ch09.xhtml#list13).


    [*Listing 9-13.*](#9781430250500_Ch09.xhtml#_list13)  AspectProxy Interface


    ```

    #import <Foundation/Foundation.h>

    #import "Invoker.h"


    @interface AspectProxy : NSProxy


    @property (strong) id proxyTarget;

    @property (strong) id<Invoker> invoker;

    @property (readonly) NSMutableArray *selectors;


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker;

    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker;

    - (void)registerSelector:(SEL)selector;


    @end

    ```


    The interface adds three properties and three methods. The `proxyTarget` property
    is the real object to which messages are forwarded through the `NSProxy` instance.
    The `invoker` property is an instance of a class (which conforms to the `Invoker`
    protocol) that implements the cross-cutting functionality desired. The `selectors`
    property is a collection of selectors that define the messages on which the cross-cutting
    functionality will be invoked. Two of the methods are initialization methods for
    an `AspectProxy` class instance, and the third method, `registerSelector:`, is
    used to add a selector to the current list. Now select the **AspectProxy.m** file
    and update the implementation as shown in [Listing 9-14](#9781430250500_Ch09.xhtml#list14).


    [*Listing 9-14.*](#9781430250500_Ch09.xhtml#_list14)  AspectProxy Implementation


    ```

    #import "AspectProxy.h"


    @implementation AspectProxy


    - (id)initWithObject:(id)object selectors:(NSArray *)selectors

              andInvoker:(id<Invoker>)invoker

    {

      _proxyTarget = object;

      _invoker = invoker;

      _selectors = [selectors mutableCopy];

      return self;

    }


    - (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker

    {

      return [self initWithObject:object selectors:nil andInvoker:invoker];

    }


    - (NSMethodSignature *)methodSignatureForSelector:(SEL)sel

    {

      return [self.proxyTarget methodSignatureForSelector:sel];

    }


    - (void)forwardInvocation:(NSInvocation *)inv

    {

      // Perform functionality before invoking method on target

      if ([self.invoker respondsToSelector:@selector(preInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] preInvoke:inv withTarget:self.proxyTarget];

        }

      }


    // Invoke method on target

      [inv invokeWithTarget:self.proxyTarget];


    // Perform functionality after invoking method on target

      if ([self.invoker respondsToSelector:@selector(postInvoke:withTarget:)])

      {

        if (self.selectors != nil)

        {

          SEL methodSel = [inv selector];

          for (NSValue *selValue in self.selectors)

          {

            if (methodSel == [selValue pointerValue])

            {

              [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

              break;

            }

          }

        }

        else

        {

          [[self invoker] postInvoke:inv withTarget:self.proxyTarget];

        }

      }

    }


    - (void)registerSelector:(SEL)selector

    {

      NSValue* selValue = [NSValue valueWithPointer:selector];

      [self.selectors addObject:selValue];

    }


    @end

    ```'
