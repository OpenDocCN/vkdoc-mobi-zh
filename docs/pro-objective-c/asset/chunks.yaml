    \ \"AspectProxy.h\"\n#import \"AuditingInvoker.h\"\n#import \"Calculator.h\"\n\
    \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    //\
    \ 创建 Calculator 对象\n    id calculator = [[Calculator alloc] init];\n    NSNumber\
    \ *addend1 = [NSNumber numberWithInteger:-25];\n    NSNumber *addend2 = [NSNumber\
    \ numberWithInteger:10];\n    NSNumber *addend3 = [NSNumber numberWithInteger:15];\n\
    \n// 为对象创建代理\n    NSValue* selValue1 = [NSValue valueWithPointer:@selector(sumAddend1:addend2:)];\n\
    \    NSArray *selValues = @[selValue1];\n    AuditingInvoker *invoker = [[AuditingInvoker\
    \ alloc] init];\n    id calculatorProxy = [[AspectProxy alloc] initWithObject:calculator\n\
    \                                                   selectors:selValues\n    \
    \                                              andInvoker:invoker];\n\n// 使用给定选择器向代理发送消息\n\
    \    [calculatorProxy sumAddend1:addend1 addend2:addend2];\n\n// 现在使用不同的选择器向代理发送消息，不进行特殊处理！\n\
    \    [calculatorProxy sumAddend1:addend2 :addend3];\n\n// 为代理注册另一个选择器并重复发送消息\n\
    \    [calculatorProxy registerSelector:@selector(sumAddend1::)];\n    [calculatorProxy\
    \ sumAddend1:addend1 :addend3];\n\n}\n  return 0;\n}\n```\n\n首先，代码创建了一个`Calculator`对象和一些数据值。接着，它为`Calculator`对象创建了一个代理，并使用`sumAddend1:addend2:`方法的选择器和一个`AuditingInvoker`实例进行初始化。请注意以下语句：\n\
    \n```\nNSArray *selValues = @[selValue1];\n```\n\n符号`@[]`用于创建数组字面量。本书的第 4 部分将深入讲解\
    \ Objective-C 字面量。接着，`sumAddend1:addend2:`消息被发送到代理。这会使得代理在调用`Calculator`对象上的方法之外，还执行`AuditingInvoker`实例的\
    \ AOP 功能。接下来，`sumAddend1::`消息被发送到代理；由于该方法在调用时尚未在代理上注册，因此不会执行 AOP 功能。最后，`sumAddend1::`选择器被添加到代理中，并且消息被重新发送给代理；由于选择器现已注册，AOP\
    \ 功能得以执行。编译并运行`AspectProxy`程序时，你将在如图 9-14 所示的输出窗格中看到这些消息。\n\n![9781430250500_Fig09-14.jpg](img/9781430250500_Fig09-14.jpg)\n\
    \n图 9-14 AspectProxy 程序输出\n\n从输出窗格的消息中可以看出，在计算器代理上调用`sumAddend1:addend2:`方法会触发代理先调用`AuditorInvoker`对象的`preInvoke:`方法，接着调用真实主题（`Calculator`对象）上的目标方法`sumAddend1:addend2:`，最后调用`AuditorInvoker`对象的`postInvoke:`方法。由于`sumAddend1:addend2:`方法已在计算器代理上注册，这符合预期行为。接着，在计算器代理上调用了`sumAddend1::`方法。由于该方法未在代理上注册，代理仅将此方法调用转发给`Calculator`对象，而不会调用`AuditorInvoker`的方法。最后，`sumAddend1::`方法在代理上完成注册并被再次调用。这一次，它按预期调用了`AuditorInvoker`对象上的\
    \ AOP 方法以及真实主题上的`sumAddend1::`方法。\n\n## 小结\n\n在本章中，你实现了三个程序，这些程序共同使用了 Objective-C\
    \ 运行时系统及其 API 的众多特性。你还学习了如何创建可加载包以及如何使用 Xcode 将代码导入项目。现在你应该对运行时系统、它在 Objective-C\
    \ 平台中的地位，以及如何在你的程序中使用其特性和底层 API 有了很好的理解。我建议你仔细回顾这些程序，通过修改它们来尝试其他特性/行为，并充分熟悉这里演示的概念。既然你已经掌握了这些技能，不妨休息一下，给自己一个消化的机会。在第\
    \ 3 部分中，你将探索 Foundation 框架。\n\n# 第 10 章：Foundation 框架通用类\n\nFoundation 框架定义了可用于任何类型\
    \ Objective-C 程序的基础 API 层。它包括根对象类、用于字符串等基本数据类型的类、基本数据类型的包装类、用于存储和操作其他对象的集合类，以及用于系统信息、网络和其他功能的类。掌握\
    \ Foundation 框架 API 是成为熟练的 Objective-C 程序员的关键之一。第 3 部分将帮助你深入学习这些 API。\n\nFoundation\
    \ 框架源自 1993 年创建的 NeXTSTEP OpenStep API。这些 API 包括应用层 Objective-C 库，分为 Foundation\
    \ Kit 和 Application Kit。它们还确立了这些 API 使用的“NS”前缀命名约定。当苹果公司在 1996 年收购 NeXT Software\
    \ 时，Foundation Kit 成为了现有 Foundation 框架的基础。\n\n在本章中，你将探索 Foundation 框架中提供大多数 Objective-C\
    \ 程序所需通用功能的类。好了，让我们开始吧！\n\n## 根类\n"
- fmt: '# Root Classes


    一个根类或基类在类层次结构中定义了其下所有类共有的接口和行为。Foundation 框架提供了两个根类：`NSObject` 和 `NSProxy`。`NSObject`
    是大多数 Objective-C 类层次结构的根类，而 `NSProxy` 是一个用于实现代理对象的专用类。这两个根类都遵循 `NSObject` 协议，该协议声明了所有
    Objective-C 对象共有的方法。


    ## NSObject 协议


    `NSObject` 协议指定了任何 Objective-C 根类所需的基本 API。由于协议声明的方法和属性并不特定于某个类，这种设计便于定义多个根类（甚至用户自定义的根类）。`NSObject`
    协议声明的方法可以分为以下几类：


    *   标识类和代理

    *   标识和比较对象

    *   描述对象

    *   对象内省

    *   发送消息


    该协议还声明了一组用于手动内存管理的已废弃方法。由于 ARC 是首选的內存管理机制，这些方法不应再被使用。


    ## NSObject


    `NSObject` 类是大多数 Objective-C 层次结构的根类；实际上，Foundation 框架中几乎所有类都是 `NSObject` 的子类。它定义了一组提供以下功能的类方法和实例方法：


    *   基本对象行为

    *   （对象、类）创建和初始化

    *   动态（运行时系统）特性


    你在前面的章节中已经使用了许多 `NSObject` 方法，所以现在你可能对这个类提供的某些功能已经很熟悉了。接下来，你将学习一些本书尚未讨论的 `NSObject`
    方法。


    ### 基本行为


    `NSObject` 的 `description` 类方法返回一个表示该类内容的字符串。默认实现仅打印类的名称。例如，以下语句将在 Xcode 输出面板中显示字符串
    `NSArray`。


    ```

    NSLog(@"%@", [NSArray description]);

    ```


    `NSObject` 协议声明了一个 `description` 实例方法；默认实现（由 `NSObject` 类提供）会打印对象的名称及其在内存中的地址。`debugDescription`
    实例方法返回一个字符串，用于向调试器展示对象的内容；其默认实现与 `description` 实例方法相同。


    如果接收者和输入参数（对象）相等，`isEqual:` 方法返回布尔值 `YES`。两个相等的对象必须具有相同的哈希值。默认（`NSObject`）实现中，如果接收者和输入参数具有相同的内存地址，则返回
    `YES`。


    `hash` 方法返回一个 `NSUInteger` 类型的值，可用于哈希表结构中。如前所述，两个相等的对象必须具有相同的哈希值。如果哈希值用于确定对象在集合中的位置，则集合中对象通过
    `hash` 方法返回的值在其位于集合中期间不得更改。


    ### 发送消息


    `NSObject` 定义了一组用于向对象发送消息的 `performSelector:` 实例方法。每个方法都指定了一个选择器参数，用于标识要发送的消息。`performSelector:`
    方法等同于标准的 Objective-C 对象消息；例如，以下两条语句是等价的：


    ```

    [atom logInfo];

    [atom performSelector:@selector(logInfo)];

    ```


    `performSelector:` 方法与标准对象消息的不同之处在于，它允许你在运行时发送消息，因为可以传递一个变量选择器值作为参数。


    `NSObject` 协议中声明了 `performSelector:` 方法的几种变体。这些变体在消息指定的参数数量（0–2）上有所不同（`performSelector:`、`performSelector:withObject:`、`performSelector:withObject:withObject:`）。`NSObject`
    类还定义了多个 `performSelector:` 方法。这些方法在向对象发送消息时提供了额外的功能，具体包括：


    *   线程选择（当前线程、后台线程、用户指定线程）

    *   方法调用语义（同步、阻塞）

    *   事件处理模式

    *   方法调用延迟


    例如，`performSelector:withObject:afterDelay:` 方法在指定延迟后向对象发送消息。以下语句演示了如何使用此方法在延迟
    5 秒后向对象发送消息。


    ```

    [atom performSelector:@selector(logInfo) withObject:nil afterDelay:5.0];

    ```


    ### 创建和初始化


    现在，我们来学习几个用于类加载和初始化的 `NSObject` 方法。`initialize` 类方法用于在类加载后、首次使用前（即在该类或其任何继承类接收到第一条消息之前）对其进行初始化。此方法在程序执行期间最多对每个类调用一次；实际上，如果该类未被使用，则不会调用该方法。`initialize`
    方法是线程安全的，并且总是在发送给类本身之前，先发送给该类的所有超类。为了防止该方法被调用两次（由超类以及目标类调用），应使用验证调用者是否为目标类（而非超类）的逻辑来实现
    `initialize` 方法（如[代码清单 10-1](#9781430250500_Ch10.xhtml#list1) 所示）。


    [*代码清单 10-1.*](#9781430250500_Ch10.xhtml#_list1)  NSObject initialize 方法设计


    ```

    + (void)initialize

    {

      if (self == [MyClass class])

      {

        // 初始化逻辑

      }

    }

    ```


    [代码清单 10-1](#9781430250500_Ch10.xhtml#list1) 展示了条件测试确保了初始化逻辑仅在接收者的类是实现 `initialize`
    方法的类时才执行。


    如果实现了，`NSObject` 的 `load` 类方法也会在类加载后被调用一次。它与 `initialize` 方法在以下几个方面有所不同：


    *   `load` 方法在类加载后很快被调用，早于 `initialize` 方法。实际上，对于静态链接的类（即属于程序可执行文件一部分的类），`load`
    方法会在 `main()` 函数之前被调用。如果 `load` 方法实现在可加载包中的类里，它将在该包被动态加载时运行。使用 `load` 方法需要非常小心，因为它在应用程序启动的早期就被调用了。具体来说，当调用此方法时，程序的自动释放池（通常）尚不存在，其他类可能尚未加载，等等。

    *   `load` 方法可以同时为类和分类实现；实际上，一个类的每个分类都可以实现自己的 `load` 方法。`initialize` 方法绝不应在分类中被重写。

    *   `load` 方法（如果实现了）在类加载后被调用一次。`initialize` 方法（如果实现了）在类接收到第一条消息时被调用一次；如果该类未被使用，则不会调用该方法。


    `NSObject` 的 `new` 类方法分配一个新的对象实例然后初始化它。它在一个单独的方法中结合了 `alloc` 和 `init` 方法。以下两条对象创建和初始化语句是等价的。


    ```

    Atom *atom = [[Atom alloc] init];

    Atom *atom = [Atom new];

    ```


    `new` 方法调用类的默认 `init` 方法；它不会调用自定义的 `init` 方法。


