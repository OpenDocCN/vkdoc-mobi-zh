    \n`[Figure 6-6](#9781430250500_Ch06.xhtml#_Fig6).` 免费桥接编译错误\n\nXcode 弹出的消息建议你使用`__bridge`注解更新代码以进行桥接转换。如果你进行此更新，代码现在可以编译并运行。但是，存在一个潜在的问题。你能猜到是什么吗？好吧，如果你分析此程序（通过从\
    \ Xcode 的 Product 菜单中选择 **Analyze**），`cstr`变量中存储的对象存在潜在的内存泄漏（参见`[Figure 6-7](#9781430250500_Ch06.xhtml#Fig7)`）。\n\
    \n![9781430250500_Fig06-07.jpg](images/9781430250500_Fig06-07.jpg)\n\n`[Figure\
    \ 6-7](#9781430250500_Ch06.xhtml#_Fig7).` 桥接转换潜在内存泄漏\n\n出现此问题是因为`__bridge`注解不会转移免费桥接对象的所有权；因此，你的代码必须以编程方式管理`cstr`指向的对象的生命周期。因为你的代码创建了`CFStringRef`，所以它拥有这个动态创建的对象，并且可以向其发送\
    \ release 消息，例如：\n\n```\nCFRelease(cstr);\n```\n\n这将消除潜在的内存泄漏。然而，一个更好的解决方案（可以避免以编程方式管理该对象的生命周期）是使用`__bridge_transfer`注解。这会将对象的所有权转移给\
    \ ARC，然后 ARC 将自动管理该对象的生命周期。\n\n```\nNSArray *data = [NSArray arrayWithObject:(__bridge_transfer\
    \ NSString *)cstr];\n```\n\n如果你在此更改后再次分析程序，则不会检测到内存泄漏。很酷。现在让我们创建另一个示例。这个示例将 Foundation\
    \ 框架对象转换为 Core Foundation 数据类型。添加`[Listing 6-14](#9781430250500_Ch06.xhtml#list14)`中所示的代码。\n\
    \n`[*Listing 6-14.*](#9781430250500_Ch06.xhtml#_list14)  `  隐式免费桥接\n\n```\n//\
    \ Now cast a Foundation framework object to a Core Foundation type\nNSString *greeting\
    \ = [[NSString alloc] initWithFormat:@\"%@\",\n                      @\"Hello,\
    \ World!\"];\nCFStringRef cstr1 = (__bridge CFStringRef)(greeting);\nprintf(\"\
    String length = %ld\", CFStringGetLength(cstr1));\n```"
  raw: '*ARC bridged casts* enable the use of toll-free bridged types when using ARC.
    These casting operations are prefaced with the special annotations `__bridge`
    *,* `__bridge_retained` *,* and *__* `bridge_transfer`.


    *   `The __bridge` annotation casts an object from a Core Foundation data type
    to a `Foundation` object (or vice-versa) without transfer of ownership. In other
    words, if you dynamically create a Foundation Framework object, and then cast
    it to a Core Foundation type (via toll-free bridging), the `__bridge` annotation
    informs the compiler that the object’s life cycle is still managed by ARC. Conversely,
    if you create a Core Foundation data type and then cast it to a Foundation Framework
    object, the `__bridge` annotation informs the compiler that the object’s life
    cycle must still be managed programmatically (and is not managed by ARC). Note
    that this annotation removes the compiler error but doesn’t transfer ownership;
    thus, care is required when using it to avoid memory leaks or dangling pointers.

    *   The `__bridge_retained` annotation is used to cast a Foundation Framework
    object to a Core Foundation data type and transfer ownership *from* the ARC system.
    You are then responsible for programmatically managing the lifetime of the bridged
    data type.

    *   The `__bridge_transfer` annotation is used to cast a Core Foundation data
    type to a `Foundation` object and also transfer ownership of the object *to* the
    ARC system. ARC will then programmatically manage the lifetime of the bridged
    object.


    The syntax for using a bridged cast annotation in a cast operation is


    ```

    (annotation castType)variableName

    ```


    This differs from a regular cast operation in that the annotation is prepended
    to the cast type. The ARC bridged casts can be used not only for toll-free bridged
    types, but also anywhere your Objective-C code needs to use access memory not
    managed as Objective-C objects. [Listing 6-11](#9781430250500_Ch06.xhtml#list11)
    updates the previous example with an ARC bridged cast.


    [*Listing 6-11.*](#9781430250500_Ch06.xhtml#_list11)  Toll-Free Bridging with
    an ARC Bridged Cast


    ```

    CFStringRef cstr = CFStringCreateWithCString(NULL, "Hello, World!",

                                                     kCFStringEncodingASCII);

    NSArray *data = [NSArray arrayWithObject:(__bridge_transfer NSString *)cstr];

    ```


    Notice that the annotation precedes the type being cast to. This annotation transfers
    ownership of the bridged object to ARC, which will now manage the object’s life
    cycle. OK, enough theory, now let’s create some examples that demonstrate the
    use of ARC bridged casts!


    Using ARC Bridged Casts


    Now you’ll develop an example program that applies what you’ve learned about toll-free
    bridging and ARC bridged casts. In Xcode, create a new project by selecting **New
    ![image](images/arrow.jpg) Project ...** from the Xcode File menu. In the New
    Project Assistant pane, create a command-line application (choose **Command Line
    Tool** from the Mac OS X Application selection) and click **Next**. In the Project
    Options window, specify **ARC Toll Free Bridging** for the Product Name, choose
    **Foundation** for the Project Type, choose ARC memory management by selecting
    the **Use Automatic Reference Counting** check box, and then click **Next**.


    Specify the location in your file system where you want the project to be created
    (if necessary, select **New Folder** and enter the name and location for the folder),
    uncheck the **Source Control** check box, and then click the **Create** button.


    First, you’ll create a toll-free bridged Core Foundation data type. Select the
    **main.m** file in the navigator pane and create a `CFStringRef`, as shown in
    [Listing 6-12](#9781430250500_Ch06.xhtml#list12).


    [*Listing 6-12.*](#9781430250500_Ch06.xhtml#_list12)  A main( ) Function Toll-Free
    Bridged Data Type


    ```

    #import <Foundation/Foundation.h>


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        CFStringRef cstr = CFStringCreateWithCString(NULL, "Hello, World!",

                                                     kCFStringEncodingASCII);

      }

      return 0;

    }

    ```


    A `CFStringRef` is a Core Foundation data type that represents a unicode string
    of characters. It is a toll-free bridged type and it can be cast to a Foundation
    Framework `NSString` object. To demonstrate the use of toll-free bridging, update
    the code, as shown in [Listing 6-13](#9781430250500_Ch06.xhtml#list13).


    [*Listing 6-13.*](#9781430250500_Ch06.xhtml#_list13)  Implicit Toll-Free Bridging


    ```

    #import <Foundation/Foundation.h>


    int main(int argc, const char * argv[])

    {

      @autoreleasepool

      {

        CFStringRef cstr = CFStringCreateWithCString(NULL, "Hello, World!",

                                                     kCFStringEncodingASCII);

        NSArray *data = [NSArray arrayWithObject:cstr];

        NSLog(@"Array size = %ld", [data count]);

        ...

    }

    ```


    The variable `cstr`, of type `CFStringRef`, is a parameter for the Objective-C
    `NSArray` object. From a toll-free bridging perspective, this is all fine, but
    because you are using ARC memory, the code will not compile. It displays an error
    indicating that a bridged cast is required (see [Figure 6-6](#9781430250500_Ch06.xhtml#Fig6)).


    ![9781430250500_Fig06-06.jpg](images/9781430250500_Fig06-06.jpg)


    [Figure 6-6](#9781430250500_Ch06.xhtml#_Fig6). Toll-Free bridging compilation
    error


    The Xcode pop-up message recommends that you update the code with a bridged cast
    using the `__bridge` annotation. If you make this update, the code now compiles
    and runs. There is a potential problem, however. Can you guess what it is? Well,
    if you analyze this program (by selecting **Analyze** from the Xcode Product menu),
    there is a potential memory leak of the object stored in the `cstr` variable (see
    [Figure 6-7](#9781430250500_Ch06.xhtml#Fig7)).


    ![9781430250500_Fig06-07.jpg](images/9781430250500_Fig06-07.jpg)


    [Figure 6-7](#9781430250500_Ch06.xhtml#_Fig7). Bridged cast potential memory leak


    This problem occurs because the `__bridge` annotation doesn’t transfer ownership
    of the toll-free bridged object; thus, your code must programmatically manage
    the life cycle of the object pointed to by `cstr`. Because your code created the
    `CFStringRef`, it owns this dynamically created object and can send a release
    message to it, as in the following, for example:


    ```

    CFRelease(cstr);

    ```


    This will eliminate the potential memory leak. A better solution (which will avoid
    having to programmatically manage the life cycle of this object), however, is
    to use the `__bridge_transfer` annotation. This will transfer ownership of the
    object to ARC, which will then automatically manage the object’s life cycle.


    ```

    NSArray *data = [NSArray arrayWithObject:(__bridge_transfer NSString *)cstr];

    ```


    If you analyze the program again after making this change, no memory leaks are
    detected. Cool. Now let’s create another example. This one casts a Foundation
    Framework object to a Core Foundation data type. Add the code shown in [Listing
    6-14](#9781430250500_Ch06.xhtml#list14).


    [*Listing 6-14.*](#9781430250500_Ch06.xhtml#_list14)  Implicit Toll-Free Bridging


    ```

    // Now cast a Foundation framework object to a Core Foundation type

    NSString *greeting = [[NSString alloc] initWithFormat:@"%@",

                          @"Hello, World!"];

    CFStringRef cstr1 = (__bridge CFStringRef)(greeting);

    printf("String length = %ld", CFStringGetLength(cstr1));

    ```'
  trans: "\n`ARC bridged casts` 使得在使用 ARC 时能够利用免费桥接类型。这些转换操作以特殊的注解 `__bridge`、`__bridge_retained`\
    \ 和 `__bridge_transfer` 为前缀。\n\n*   `__bridge` 注解用于在不转移所有权的情况下，将对象从 Core Foundation\
    \ 数据类型转换为`Foundation`对象（或反之）。换句话说，如果你动态创建一个 Foundation 框架对象，然后将其转换为 Core Foundation\
    \ 类型（通过免费桥接），`__bridge` 注解会告知编译器该对象的生命周期仍由 ARC 管理。反之，如果你创建一个 Core Foundation 数据类型，然后将其转换为\
    \ Foundation 框架对象，`__bridge` 注解会告知编译器该对象的生命周期必须通过编程方式管理（而非由 ARC 管理）。请注意，此注解会消除编译器错误，但不会转移所有权；因此，使用时需要小心，以避免内存泄漏或野指针。\n\
    *   `__bridge_retained` 注解用于将 Foundation 框架对象转换为 Core Foundation 数据类型，并将所有权从 ARC\
    \ 系统转移出去。然后，你需要以编程方式管理桥接数据类型的生命周期。\n*   `__bridge_transfer` 注解用于将 Core Foundation\
    \ 数据类型转换为`Foundation`对象，并将该对象的所有权转移给 ARC 系统。之后，ARC 会以编程方式管理桥接对象的生命周期。\n\n在转换操作中使用桥接转换注解的语法是：\n\
    \n```\n(annotation castType)variableName\n```\n\n这与常规转换操作的不同之处在于，注解被前置在转换类型之前。`ARC\
    \ bridged casts` 不仅可用于免费桥接类型，还可用于 Objective-C 代码需要访问非 Objective-C 对象管理的内存的其他任何地方。`Listing\
    \ 6-11` 用 ARC 桥接转换更新了之前的示例。\n\n`*Listing 6-11.*  `  使用 ARC 桥接转换的免费桥接\n\n```\n\
    CFStringRef cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n      \
    \                                           kCFStringEncodingASCII);\nNSArray\
    \ *data = [NSArray arrayWithObject:(__bridge_transfer NSString *)cstr];\n```\n\
    \n注意，注解位于要转换的类型之前。此注解会将桥接对象的所有权转移给 ARC，后者现在将管理该对象的生命周期。好了，理论够了，现在让我们创建一些示例来演示\
    \ ARC 桥接转换的使用！\n\n## 使用 ARC 桥接转换\n\n现在，你将开发一个示例程序，应用你所学的关于免费桥接和 ARC 桥接转换的知识。在\
    \ Xcode 中，通过从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg) Project ...** 来创建一个新项目。在\
    \ New Project Assistant 窗格中，创建一个命令行应用程序（从 Mac OS X Application 选择中选择 **Command\
    \ Line Tool**）并点击 **Next**。在 Project Options 窗口中，为 Product Name 指定 **ARC Toll\
    \ Free Bridging**，为 Project Type 选择 **Foundation**，通过选中 **Use Automatic Reference\
    \ Counting** 复选框来选择 ARC 内存管理，然后点击 **Next**。\n\n在文件系统中指定你想要创建项目的位置（如果需要，选择 **New\
    \ Folder** 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后点击 **Create** 按钮。\n\n首先，你将创建一个免费桥接的\
    \ Core Foundation 数据类型。在导航器窗格中选择 **main.m** 文件，并创建一个`CFStringRef`，如`Listing 6-12`所示。\n\
    \n`*Listing 6-12.*  `  一个`main()`函数免费桥接数据类型\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    CFStringRef\
    \ cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n                \
    \                                 kCFStringEncodingASCII);\n  }\n  return 0;\n\
    }\n```\n\n`CFStringRef` 是一个 Core Foundation 数据类型，表示一个 Unicode 字符串。它是一个免费桥接类型，可以转换为\
    \ Foundation 框架的`NSString`对象。为了演示免费桥接的使用，更新代码，如`Listing 6-13`所示。\n\n`*Listing\
    \ 6-13.*  `  隐式免费桥接\n\n```\n#import <Foundation/Foundation.h>\n\nint main(int\
    \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    CFStringRef cstr\
    \ = CFStringCreateWithCString(NULL, \"Hello, World!\",\n                     \
    \                            kCFStringEncodingASCII);\n    NSArray *data = [NSArray\
    \ arrayWithObject:cstr];\n    NSLog(@\"Array size = %ld\", [data count]);\n  \
    \  ...\n}\n```\n\n变量`cstr`的类型为`CFStringRef`，是 Objective-C `NSArray`对象的一个参数。从免费桥接的角度来看，这完全没问题，但由于你使用\
    \ ARC 内存，代码将无法编译。它会显示一个错误，提示需要桥接转换（参见`Figure 6-6`）。\n\n![9781430250500_Fig06-06.jpg](img/9781430250500_Fig06-06.jpg)\n\
    \n`Figure 6-6.` 免费桥接编译错误\n\nXcode 弹出的消息建议你使用`__bridge`注解更新代码以进行桥接转换。如果你进行此更新，代码现在可以编译并运行。但是，存在一个潜在的问题。你能猜到是什么吗？好吧，如果你分析此程序（通过从\
    \ Xcode 的 Product 菜单中选择 **Analyze**），`cstr`变量中存储的对象存在潜在的内存泄漏（参见`Figure 6-7`）。\n\
    \n![9781430250500_Fig06-07.jpg](img/9781430250500_Fig06-07.jpg)\n\n`Figure 6-7.`\
    \ 桥接转换潜在内存泄漏\n\n出现此问题是因为`__bridge`注解不会转移免费桥接对象的所有权；因此，你的代码必须以编程方式管理`cstr`指向的对象的生命周期。因为你的代码创建了`CFStringRef`，所以它拥有这个动态创建的对象，并且可以向其发送\
    \ release 消息，例如：\n\n```\nCFRelease(cstr);\n```\n\n这将消除潜在的内存泄漏。然而，一个更好的解决方案（可以避免以编程方式管理该对象的生命周期）是使用`__bridge_transfer`注解。这会将对象的所有权转移给\
    \ ARC，然后 ARC 将自动管理该对象的生命周期。\n\n```\nNSArray *data = [NSArray arrayWithObject:(__bridge_transfer\
    \ NSString *)cstr];\n```\n\n如果你在此更改后再次分析程序，则不会检测到内存泄漏。很酷。现在让我们创建另一个示例。这个示例将 Foundation\
    \ 框架对象转换为 Core Foundation 数据类型。添加`Listing 6-14`中所示的代码。\n\n`*Listing 6-14.*  `\
    \  隐式免费桥接\n\n```\n// Now cast a Foundation framework object to a Core Foundation\
    \ type\nNSString *greeting = [[NSString alloc] initWithFormat:@\"%@\",\n     \
    \                 @\"Hello, World!\"];\nCFStringRef cstr1 = (__bridge CFStringRef)(greeting);\n\
    printf(\"String length = %ld\", CFStringGetLength(cstr1));\n```\n"
