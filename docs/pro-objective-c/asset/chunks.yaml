    | `NSParameterAssert` | Generates an assertion for the parameter of an Objective-C
    method. Its arguments are the conditional expression for a parameter. |

    | `NSCAssert` | Generates an assertion for an Objective-C function: if a given
    condition evaluates to `NO` (false). Its arguments include the conditional expression
    and a format string (with no format specifier) that describes the error. |

    | `NSCAssert1` | Similar to `NSCAssert`, its arguments include the conditional
    expression, a format string (with one format specifier), and an argument to be
    inserted into the format string. |

    | `NSCAssert2`, `NSCAssert3`, `NSCAssert4`, `NSCAssert5` | Similar to `NSCAssert`,
    its arguments include the conditional expression, a format string (with two, three,
    four, or five format specifiers), and two, three, four, or five arguments to be
    inserted into the format string. |

    | `NSCParameterAssert` | Generates an assertion for the parameter of an Objective-C
    function. Its arguments are the conditional expression for a parameter. |


    The following statement uses the `NSAssert` function to assert that the value
    of the variable named `age` is within the prescribed range.


    ```

    NSAssert((age > 0) && (age <=18), @"Variable age not within prescribed range");

    ```


    In the next statement, the same assertion is performed again, this time using
    the `NSAssert1` function to log the value of the variable if the assertion fails.


    ```

    NSAssert1((age > 0) && (age <=18),

      @"Value %d for age not within prescribed range", age);

    ```


    Assertions can be used to check parameters of private methods or functions. Parameter
    checking for public methods/functions is normally part of the corresponding published
    API; hence, these should be checked whether or not assertions are enabled. [Listing
    13-3](#9781430250500_Ch13.xhtml#list3) uses the `NSParameterAssert` function to
    assert that the parameters for the method `encodeArchive:toFile:` have valid values.


    [*Listing 13-3.*](#9781430250500_Ch13.xhtml#_list3)  Asserting Method Parameter
    Values Using NSParameterAssert


    ```

    - (BOOL) encodeArchive:(id)objectGraph toFile:(NSString *)file

    {

      NSParameterAssert(file != nil);

      NSParameterAssert([objectGraph conformsToProtocol:@protocol(NSCoding)]);

     ...

    }

    ```


    You can disable assertions in your code by defining the preprocessor macro; `NS_BLOCK_ASSERTIONS`,
    for example.


    ```

    #define NS_BLOCK_ASSERTIONS

    ```


    Logging


    The Foundation Framework includes two functions, `NSLog` and `NSLogv`, for logging
    output to the system log facility. In Xcode, error messages from these functions
    are displayed in the Xcode output pane. By now you have become familiar with the
    `NSLog` function through the example source code provided in this book, so here
    you’ll examine the `NSLogv` function.


    `NSLogv`, as with `NSLog`, logs an error message to the system log facility. It
    differs from `NSLog` in that it supports a variable argument list. The declaration
    for the `NSLog` function is


    ```

    void NSLogv(NSString *format, va_list args);

    ```


    The variable `format` is a format string, and the variable `args` is a data type
    used for providing a list of (variable) arguments to functions. So you may be
    wondering, when would you use `NSLogv`? If you have a method or function that
    takes a variable argument list, then `NSLogv` can be used to log messages with
    this list. For example, the variadic function `printArgs` declared as follows:


    ```

    void printArgs(int numArgs, ...);

    ```


    logs a number of function arguments to the system log facility, where the arguments
    are a variable list (specified by the **...** variable argument symbol) and the
    number of arguments from this list to be logged (specified by the `numArgs` function
    argument). Given this function declaration, [Listing 13-4](#9781430250500_Ch13.xhtml#list4)
    demonstrates how this function is implemented using the `NSLogv` function.


    [*Listing 13-4.*](#9781430250500_Ch13.xhtml#_list4)  Using NSLogv to Log a variadic
    Argument List


    ```

    void printArgs(int numArgs, ...)

    {

      va_list args;

      va_start(args, numArgs);

      va_end(args);

      NSMutableString *format = [[NSMutableString alloc] init];

      [format appendString:@"Arguments: "];

      for (int ii=0; ii<numArgs-1; ii++)

      {

        [format appendString:@"%@, "];

      }

      if (numArgs > 1)

      {

        [format appendString:@"%@"];

      }

      NSLogv(format, args);

    }

    ```


    If this function is invoked as follows:


    ```

    printArgs(3, @"Hello", @"Objective-C", @"World!");

    ```


    It logs to the console the following message:


    ```

    Arguments: Hello, Objective-C, World!

    ```


    Bundles


    The Foundation Framework includes several function macros for retrieving localized
    strings. They are used to load strings from a program’s strings files. Before
    you begin examining these macros, let’s take a moment to discuss internationalization
    and localization.


    Internationalization is the process of designing an application so that it can
    serve different languages and regions (i.e., locales) without being changed. *Localization*
    is the adaptation of an internationalized application to a local market. Localization
    can be applied to many parts of an application, including its visible text, icons
    and graphics, views, and data.


