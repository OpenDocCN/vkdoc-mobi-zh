    \ *)key\n{\n  NSSet *keyPaths = [super keyPathsForValuesAffectingValueForKey:key];\n\
    \  if ([key isEqualToString:@\"zip\"])\n  {\n    NSArray *affectingKeys = @[@\"\
    street\", @\"city\", @\"state\"];\n    keyPaths = [keyPaths setByAddingObjectsFromArray:affectingKeys];\n\
    \  }\n  return keyPaths;\n}\n```\n\n还可以通过实现遵循命名约定 `keyPathsForValuesAffecting<Key>`（其中\
    \ `<Key>` 是依赖于其他值的属性名称）的类方法，为 **to-one** 关系属性注册依赖键。此外还提供了类似的方法和技术，用于为 **to-many**\
    \ 关系属性注册依赖键。\n\n`observationInfo` 和 `setObservationInfo:` 方法允许你获取/设置关于所有已注册观察者的观察信息。\n\
    \n## KVO 设计与实现\n\n键值观察是通过 Objective-C 运行时的强大功能实现的。当你向对象注册观察者时，KVO 基础架构会动态创建原始对象类的一个新子类。然后它会调整对象的\
    \ `isa` 指针，使其指向该子类；因此发送给原始类的消息实际上会被发送给子类。你可能还记得第 8 章中提到，`isa` 指针指向对象的类，而这个类维护着一个调度表，其中包含该类实现的方法指针。这个新的子类实现了\
    \ KVO 基础架构。它会拦截发送给对象的消息，检查其中是否包含与特定模式（如 getter、setter 和集合访问方法）匹配的消息，然后向观察者发送通知等。这种动态替换\
    \ `isa` 指针所指向类别的技术称为 **isa-swizzling**。\n\n## 使用键值编程\n\n现在你将实现一个示例程序，该程序使用键值编程来执行各种任务。该程序演示了键值编码和键值观察在一个系统中的应用，其类图如图\
    \ 18-2 所示。\n\n![9781430250500_Fig18-02.jpg](img/9781430250500_Fig18-02.jpg)\n\n\
    图 18-2. Coders 类图\n\n在 Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg)\
    \ Project . . .** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project\
    \ Options** 窗口中，将 **Product Name** 指定为 **Coders**，将 **Project Type** 选择为 **Foundation**，并通过勾选\
    \ **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。在文件系统中指定希望创建项目的位置（如有必要，选择\
    \ **New Folder** 并输入文件夹名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
    \n你将在此创建几个声明了各种属性的类。从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) File\
    \ . . .**，选择 **Objective-C class** 模板，并将类命名为 **Person**。选择 **Coders** 文件夹作为文件位置，选择\
    \ **Coders** 项目作为目标，然后点击 **Create** 按钮。接下来，在 Xcode 的项目导航窗格中，选择 **Person.h** 文件并更新类接口，如列表\
    \ 18-17 所示。\n\n*列表 18-17.* Person 类接口\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \n@interface Person : NSObject\n\n@property (readonly) NSString *fullName;\n@property\
    \ NSString *firstName;\n@property NSString *lastName;\n\n- (id)initWithFirstName:(NSString\
    \ *)fname lastName:(NSString *)lname;\n\n@end\n```\n\n该接口声明了三个属性和一个初始化方法。一个 `Person`\
    \ 对象包含名字、姓氏和全名。`fullName` 属性是只读的，由 `firstName` 和 `lastName` 属性派生而来。接下来，使用 Xcode\
    \ 的项目导航窗格选择 **Person.m** 文件并编写实现代码，如列表 18-18 所示。\n\n*列表 18-18.* Person 类实现\n\n\
    ```objective-c\n#import \"Person.h\"\n#define CodersErrorDomain   @\"CodersErrorDomain\"\
    \n#define kInvalidValueError  1\n\n@implementation Person\n\n- (id)initWithFirstName:(NSString\
    \ *)fname lastName:(NSString *)lname\n{\n  if ((self = [super init]))\n  {\n \
    \   _firstName = fname;\n    _lastName = lname;\n  }\n  return self;\n}\n\n- (NSString\
    \ *)fullName\n{\n  return [NSString stringWithFormat:@\"%@ %@\", self.firstName,\
    \ self.lastName];\n}\n\n- (BOOL)validateLastName:(id *)value error:(NSError *\
    \ __autoreleasing *)error\n{\n  // 检查 nil 值\n  if (*value == nil)\n  {\n    if\
    \ (error != NULL)\n    {\n      NSDictionary *reason = @{NSLocalizedDescriptionKey:\n\
    \                               @\"Last name cannot be nil\"};\n      *error =\
    \ [NSError errorWithDomain:CodersErrorDomain\n                               \
    \    code:kInvalidValueError\n                               userInfo:reason];\n\
    \    }\n    return NO;\n  }\n  // 检查空值\n  NSUInteger length = [[(NSString *)*value\
    \ stringByTrimmingCharactersInSet:\n                       [NSCharacterSet whitespaceAndNewlineCharacterSet]]\
    \ length];\n  if (length == 0)\n  {\n    if (error != NULL)\n    {\n      NSDictionary\
    \ *reason = @{NSLocalizedDescriptionKey:\n                               @\"Last\
    \ name cannot be empty\"};\n      *error = [NSError errorWithDomain:CodersErrorDomain\n\
    \                                   code:kInvalidValueError\n                \
    \               userInfo:reason];\n    }\n    return NO;\n  }\n  return YES;\n\
    }\n\n+ (NSSet *)keyPathsForValuesAffectingValueForKey:(NSString *)key\n{\n  NSSet\
    \ *keyPaths = [super keyPathsForValuesAffectingValueForKey:key];\n  if ([key isEqualToString:@\"\
    fullName\"])\n  {\n    NSArray *affectingKeys = @[@\"firstName\", @\"lastName\"\
    ];\n    keyPaths = [keyPaths setByAddingObjectsFromArray:affectingKeys];\n  }\n\
    \  return keyPaths;\n}\n\n@end\n```\n\n`initWithFirstName:lastName:` 方法用于使用输入的名字和姓氏初始化一个\
    \ `Person` 实例。访问器方法 `fullName` 返回 `Person` 对象全名的派生值，即 `firstName` 和 `lastName`\
    \ 属性值的拼接。`validateLastName:error:` 方法用于对 `lastName` 属性执行 KVC 属性验证。如果输入的姓氏为 `nil`\
    \ 或空字符串，则返回 `NO` 和一个 `NSError` 对象；否则返回 `YES`。`keyPathsForValuesAffectingValueForKey:`\
    \ 方法用于注册依赖键。该方法利用依赖于 `firstName` 和 `lastName` 属性的 `fullName` 属性，来获取要添加到返回的键路径中的键。\n\
    \n接下来，你将实现 `Coder` 类。从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) File\
    \ . . .**，选择 **Objective-C class** 模板，并将类命名为 **Coder**。选择 **Coders** 文件夹作为文件位置，选择\
    \ **Coders** 项目作为目标，然后点击 **Create** 按钮。在 Xcode 的项目导航窗格中，选择 **Coder.h** 文件并更新类接口，如列表\
    \ 18-19 所示。\n\n*列表 18-19.* Coder 类接口\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \n@class Person;\n@interface Coder : NSObject\n\n@property Person *person;\n@property\
    \ NSMutableArray *languages;\n\n@end\n```"
- fmt: "该类别声明了两个属性：一个`Person`属性名为`person`，以及一个`NSMutableArray`属性名为`languages`。`languages`属性是一个数组，包含`Coder`使用的编程语言名称。请注意，使用`@class`指令来前置声明`Person`类，从而无需在此接口中导入其头文件。现在，使用Xcode项目导航器选择`Coder.m`文件并编写实现代码，如[列表18-20](#9781430250500_Ch18.xhtml#list20)所示。\n\
    \n[*列表18-20.*](#9781430250500_Ch18.xhtml#_list20)  Coder类实现\n\n```\n#import \"\
    Coder.h\"\n\n@implementation Coder\n\n- (NSUInteger)countOfLanguages\n{\n  return\
    \ [self.languages count];\n}\n\n- (NSString *)objectInLanguagesAtIndex:(NSUInteger)index\n\
    {\n  return [self.languages objectAtIndex:index];\n}\n\n- (void)insertObject:(NSString\
    \ *)object inLanguagesAtIndex:(NSUInteger)index\n{\n  [self.languages insertObject:object\
    \ atIndex:index];\n}\n\n- (void)removeObjectFromLanguagesAtIndex:(NSUInteger)index\n\
    {\n  [self.languages removeObjectAtIndex:index];\n}\n\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                      ofObject:(id)object\n                     \
    \   change:(NSDictionary *)change\n                       context:(void *)context\n\
    {\n  NSString *newValue = change[NSKeyValueChangeNewKey];\n  NSLog(@\"Value changed\
    \ for %@ object, key path: %@, new value: %@\",\n        [object className], keyPath,\
    \ newValue);\n}\n\n@end\n```\n\n`Coder`实现包含了针对`languages`属性有序、对多关系的KVO推荐方法。当输入键路径对应的`Coder`属性发生更改时，会执行`observeValueForKeyPath:ofObject:change:context:`方法。在此情况下，该方法仅打印对象和键路径的新值。\n\
    \n最后，你将实现`Coders`类。如图[18-2](#9781430250500_Ch18.xhtml#Fig2)所示，`Coders`类持有一个`Coder`实例的集合（一个`NSSet`）。从Xcode文件菜单中选择**New\
    \ ![image](images/arrow.jpg) File . . .**，选择Objective-C类模板，并将该类命名为`Coders`。选择`Coders`文件夹作为文件位置，选择`Coders`项目作为目标，然后点击**Create**按钮。接着，在Xcode项目导航器窗格中，选择`Coders.h`文件并更新类接口，如[列表18-21](#9781430250500_Ch18.xhtml#list21)所示。\n\
    \n[*列表18-21.*](#9781430250500_Ch18.xhtml#_list21)  Coders类接口\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@class Coder;\n@interface Coders : NSObject\n\n@property NSSet *developers;\n\
    \n@end\n```\n\n`Coders`接口声明了一个单独属性，一个名为`developers`的`NSSet`，其中包含`Coder`对象的集合。现在，使用Xcode项目导航器选择`Coders.m`文件并编写实现代码，如[列表18-22](#9781430250500_Ch18.xhtml#list22)所示。\n\
    \n[*列表18-22.*](#9781430250500_Ch18.xhtml#_list22)  Coders类实现\n\n```\n#import \"\
    Coders.h\"\n\n@implementation Coders\n\n- (NSUInteger)countOfDevelopers\n{\n \
    \ return [self.developers count];\n}\n\n- (NSEnumerator *)enumeratorOfDevelopers\n\
    {\n  return [self.developers objectEnumerator];\n}\n\n- (Coder *)memberOfDevelopers:(Coder\
    \ *)member object:(Coder *)anObject\n{\n  return [self.developers member:anObject];\n\
    }\n\n@end\n```\n\n`Coders`实现包含了针对`developers`属性无序、对多关系的KVO推荐方法。\n\n现在你已经完成了类的实现，让我们继续讨论`main()`函数。在Xcode项目导航器中，选择`main.m`文件并更新`main()`函数，如[列表18-23](#9781430250500_Ch18.xhtml#list23)所示。\n\
    \n[*列表18-23.*](#9781430250500_Ch18.xhtml#_list23)  Coders main() 函数\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"Person.h\"\n#import \"Coder.h\"\n#import\
    \ \"Coders.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    \  {\n    Person *curly = [[Person alloc] initWithFirstName:@\"Curly\" lastName:@\"\
    Howard\"];\n    NSLog(@\"Person first name: %@\", [curly valueForKey:@\"firstName\"\
    ]);\n    NSLog(@\"Person full name: %@\", [curly valueForKey:@\"fullName\"]);\n\
    \    NSArray *langs1 = @[@\"Objective-C\", @\"C\"];\n    Coder *coder1 = [Coder\
    \ new];\n    coder1.person = curly;\n    coder1.languages = [langs1 mutableCopy];\n\
    \    NSLog(@\"\\nCoder name: %@\\n\\t  languages: %@\",\n          [coder1 valueForKeyPath:@\"\
    person.fullName\"],\n          [coder1 valueForKey:@\"languages\"]);\n\n    Coder\
    \ *coder2 = [Coder new];\n    coder2.person = [[Person alloc] initWithFirstName:@\"\
    Larry\" lastName:@\"Fine\"];\n    coder2.languages = [@[@\"Objective-C\", @\"\
    C++\"] mutableCopy];\n    NSLog(@\"\\nCoder name: %@\\n\\t  languages: %@\",\n\
    \          [coder2 valueForKeyPath:@\"person.fullName\"],\n          [coder2 valueForKey:@\"\
    languages\"]);\n\n    [curly addObserver:coder1\n            forKeyPath:@\"fullName\"\
    \n               options:NSKeyValueObservingOptionNew\n               context:NULL];\n\
    \    curly.lastName = @\"Fine\";\n    [curly removeObserver:coder1 forKeyPath:@\"\
    fullName\"];\n\n    Coders *bestCoders = [Coders new];\n    bestCoders.developers\
    \ = [[NSSet alloc] initWithArray:@[coder1, coder2]];\n    [bestCoders valueForKey:@\"\
    developers\"];\n    NSLog(@\"Number of coders = %@\", [bestCoders.developers\n\
    \                                     valueForKeyPath:@\"@count\"]);\n    NSError\
    \ *error;\n    NSString *emptyName = @\"\";\n    BOOL valid = [curly validateValue:&emptyName\
    \ forKey:@\"lastName\" error:&error];\n    if (!valid)\n    {\n      NSLog(@\"\
    Error: %@\", ([error userInfo])[NSLocalizedDescriptionKey]);\n    }\n  }\n  return\
    \ 0;\n}\n```\n\n该函数首先创建一个`Person`实例，然后使用键值编码来检索其属性的值。接着，创建一个`Coder`实例，并设置其`person`和`languages`属性。随后使用键值编码API来检索相应的属性值。然后创建另一个`Coder`实例并相应地设置其属性值。接着演示键值观察，注册一个`Coder`实例以在`Person`实例的`fullName`属性更改时接收通知。然后创建一个`Coders`实例（请记住，`Coders`类持有一个`Coder`实例的集合），并将其`developers`属性赋值为先前创建的`Coder`实例的集合。接着使用集合运算符返回集合中程序员的总数。最后，在`Person`实例的`lastName`属性上演示键值编码验证。\n\
    \n当你编译并运行程序时，应在输出窗格中看到如图[18-3](#9781430250500_Ch18.xhtml#Fig3)所示的消息。\n\n![9781430250500_Fig18-03.jpg](images/9781430250500_Fig18-03.jpg)\n\
    \n[图18-3](#9781430250500_Ch18.xhtml#_Fig3). Coders程序输出\n\n太棒了！至此，你已经完成了对键值编程API和基础设施的深入检查。在使用Objective-C编程以及使用Apple的各种软件框架和服务时，理解键值编码和键值观察将对您极其有用。\n\
    \n总结\n\n在本章中，你学习了键值编程，这是Objective-C语言中一组强大的机制和API。键值编程是通用Objective-C编程以及Cocoa和Cocoa\
