- fmt: "# The Foundation Framework Archives and Serialization\n\nThe Foundation Framework\
    \ archives and serialization classes implement mechanisms for converting an object\
    \ (i.e., an object graph) into an architecture-independent byte buffer. This data\
    \ can then be written to a file or transmitted to another process, potentially\
    \ over a network. Later, the data can be converted back into objects, preserving\
    \ the associated object graph. In this way, these classes provide a lightweight\
    \ means of data persistence. The serialization process preserves the data and\
    \ the positions of objects in an object hierarchy, whereas the archiving process\
    \ is more general purpose—it preserves the data, data types, and the relations\
    \ between the objects in an object hierarchy.\n\n## Archiving\n\n`NSCoder` is\
    \ an abstract class that declares the interface used to both *marshal* and *unmarshall*\
    \ object graphs. The marshalling process converts an object’s information into\
    \ a series of bytes, and the unmarshalling process creates an object from a (previously\
    \ marshalled) series of bytes. `NSCoder` includes methods for encoding and decoding\
    \ data of various types, testing an `NSCoder` instance, and provides support for\
    \ secure coding. The Foundation Framework includes four concrete subclasses of\
    \ `NSCoder`: `NSArchiver`, `NSUnarchiver`, `NSKeyedArchiver`, and `NSKeyedUnarchiver`.\n\
    \n### Sequential Archives\n\n`NSArchiver` and `NSUnarchiver` are used to create\
    \ *sequential* archives, which means that the objects and values of a sequential\
    \ archive must be decoded in the same order that they were encoded. In addition,\
    \ when decoding a sequential archive, the entire object graph must be decoded.\
    \ `NSArchiver` is used to encode objects for writing to a file or some other use,\
    \ and `NSUnarchiver` is used to decode objects from an archive. `NSArchiver` includes\
    \ methods for initialization, archiving data, retrieving archived data, and substituting\
    \ classes or objects in an archive. `NSUnarchiver` includes methods for initialization,\
    \ decoding objects, substituting classes or objects, and management.\n\n### Keyed\
    \ Archives\n\nWhereas `NSArchiver` and `NSUnarchiver` are sequential archives,\
    \ `NSKeyedArchiver` and `NSKeyedUnarchiver` are keyed archives—each value in the\
    \ archive can be individually named/keyed. The key must be unique within the scope\
    \ of the object in which the value is being encoded/decoded. When decoding a keyed\
    \ archive, the values can be decoded out of sequence or not at all. Hence, keyed\
    \ archives provide better support for forward and backward compatibility and are\
    \ recommended over the sequential archiving classes. `NSKeyedArchiver` includes\
    \ methods for initialization, archiving data, encoding data and objects, and management.\
    \ `NSKeyedUnarchiver` includes methods for initialization, unarchiving data, decoding\
    \ objects, and management.\n\nThe code shown in [Listing 12-5](#9781430250500_Ch12.xhtml#list5)\
    \ uses the `NSKeyedArchiver` `archiveRootObject:` method to archive an `NSString`\
    \ instance named `greeting` to a file in the current directory named `greeting.archive`.\n\
    \n[*Listing 12-5.*](#9781430250500_Ch12.xhtml#_list5)  Archiving an Object with\
    \ `NSKeyedArchiver`\n\n```objc\nNSString *greeting = @\"Hello, World!\";\nNSString\
    \ *cwd = [[NSFileManager defaultManager] currentDirectoryPath];\nNSString *archivePath\
    \ = [cwd stringByAppendingString:@\"/greeting.archive\"];\nBOOL result = [NSKeyedArchiver\
    \ archiveRootObject:greeting toFile:archivePath];\n```\n\nThe next code fragment\
    \ uses the `NSKeyedUnarchiver` `unarchiveObjectWithFile:` method to decode an\
    \ `NSString` object named `greeting` from an archive stored in the file `archivePath`.\n\
    \n```objc\nNSString *greeting = [NSKeyedUnarchiver unarchiveObjectWithFile:archivePath];\n\
    ```\n\n## Encoding and Decoding Objects\n\nWhile the `NSKeyedArchiver` and `NSKeyedUnarchiver`\
    \ classes are responsible for the archiving process, a class must conform to the\
    \ `NSCoding` protocol to support enconding/decoding of class instances. This protocol\
    \ declares two methods, `encodeWithCoder:` and `initWithCoder:`, that encode/decode\
    \ an object’s state (e.g., its properties and instance variables). When a *coder\
    \ object* (i.e., an `NSKeyedArchiver` or `NSKeyedUnarchiver` instance) archives\
    \ an object, it instructs the object to encode its state by invoking its `encodeWithCoder:`\
    \ method. Hence, a class must implement the appropriate encode and decode method(s)\
    \ because these will be called by the selected coder object. [Listing 12-6](#9781430250500_Ch12.xhtml#list6)\
    \ depicts an implementation of a class named `MyType` that conforms to the `NSCoding`\
    \ protocol.\n\n[*Listing 12-6.*](#9781430250500_Ch12.xhtml#_list6)  Implementing\
    \ the `NSCoding` Protocol Methods\n\n```objc\n@interface MyType : NSObject <NSCoding>\n\
    \n@property NSString *type;\n\n@end\n\n@implementation MyType\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n  [coder encodeObject:self.type forKey:@\"TYPE_KEY\"];\n}\n\n- (id)initWithCoder:(NSCoder\
    \ *)coder\n{\n  if ((self = [super init]))\n  {\n    type = [coder decodeObjectForKey:@\"\
    TYPE_KEY\"];\n  }\n  return self;\n}\n\n@end\n```\n\n## Property List Serialization\n\
    \nProperty list serialization provides a means of converting a *property list*,\
    \ a structured collection of data organized as name-value pairs, to/from an architecture-independent\
    \ byte stream. The Foundation Framework `NSPropertyListSerialization` class provides\
    \ methods to serialize and deserialize property lists directly and validate a\
    \ property list. It also supports conversion of property lists to/from XML or\
