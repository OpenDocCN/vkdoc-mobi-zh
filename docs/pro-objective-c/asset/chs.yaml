  \ entry->item->name);\n\n// 现在将 OrderEntry 对象设为 nil，ARC 即可对其进行释放！\n    entry = nil;\n\
  \n// 创建另一个 OrderEntry 对象\n    OrderEntry *autoEntry = [[OrderEntry alloc] initWithId:@\"\
  A2\"];\n    NSLog(@\"New order, ID = %@, item: %@\", autoEntry->orderId,       \
  \   autoEntry->item->name);\n  }\n  return 0;\n}\n```\n\n`main()`函数通过创建`OrderEntry`对象演示了\
  \ ARC 内存管理。当对象不再使用时，它们会被 ARC 自动释放。该函数还展示了使用 ARC 开发的类会根据需要获取依赖对象的所有权，从而防止对象在仍被使用时被更改或释放。\n\
  \n现在保存、编译并运行 ARC Orders 程序，观察输出窗格中的消息（如图 4-7 所示）。\n\n![9781430250500_Fig04-07.jpg](img/9781430250500_Fig04-07.jpg)\n\
  \n\n\n# 图 4-7 测试 `ARC OrderEntry` 项目\n\n这些消息显示了初始化与释放动态创建对象时的调用序列。可以看到 ARC 内存管理正确执行，所有动态创建的对象在不使用时均被释放。你还可以通过选择\
  \ Xcode Product 菜单中的 **Analyze** 选项，对程序的内存管理进行初步检查。对比 MRR Orders 项目和 ARC Orders\
  \ 项目，可以发现后者显著减少了需要编写的代码量。随着项目规模与复杂度的增长，ARC 的优势会愈发明显。由于 ARC 可以按单个文件启用，且使用 ARC 编译的代码能与基于\
  \ MRR 构建的现有代码共存，因此没有理由不在你的项目中使用它。事实上，对于新的 Objective-C 项目，苹果推荐采用 ARC 作为内存管理机制。\n\n\
  ### 避免循环引用\n\nObjective-C 的引用计数模型通过获取对象的所有权（通过 `retain` 消息）并在不再需要该对象时释放所有权（通过 `release`\
  \ 消息）来实现。这一过程在 ARC 中被自动化，ARC 会自动在代码中插入所需的 `retain`/`release`/`autorelease` 消息。然而，在对象图中，如果两个对象之间存在循环引用，就会产生循环引用问题。例如，在前面的\
  \ ARC Orders 项目中，`OrderEntry` 对象拥有一个 `OrderItem` 实例变量，默认情况下这是一个强引用。现在，如果 `OrderItem`\
  \ 对象也拥有一个 `OrderItem` 实例变量，就会在这两个对象之间形成循环引用。如果这种情况发生，两个对象都将永远无法被释放，从而导致内存泄漏。实际上，`OrderEntry`\
  \ 对象必须等到 `OrderItem` 对象被释放后才能释放，而 `OrderItem` 对象也必须等到 `OrderEntry` 对象被释放后才能释放。解决此问题的方法是使用弱引用。弱引用是一种*非拥有关系*；也就是说，声明为弱引用的对象并不由声明对象所拥有，从而消除了循环引用。苹果在\
  \ Objective-C 中对对象图的约定是：父对象对其每个子对象保持强引用，而子对象（如有必要）对父对象保持弱引用。因此，在本例中，`OrderEntry`\
  \ 对象会对其 `OrderItem` 对象保持强引用，而 `OrderItem` 对象则对其父对象 `OrderEntry` 保持弱引用。弱引用将在 `OrderItem`\
  \ 类中声明（如列表 4-15 所示）。\n\n### 列表 4-15 声明弱引用\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface OrderItem : NSObject\n\n{\n@public NSString *name;\nOrderEntry *__weak\
  \ entry;\n}\n\n- (id) initWithName:(NSString *)itemName;\n\n@end\n```\n\n当 `entry`\
  \ 变量被销毁时，它会被设置为 `nil`，从而避免循环引用。\n\n## 总结\n\n本章详细介绍了 Objective-C 内存管理的细节，包括 Objective-C\
  \ 内存模型、Objective-C 程序中内存的分配与释放方式，以及如何使用 Objective-C 提供的两种内存管理方法。以下是关键要点：\n\n- 在运行时，Objective-C\
  \ 程序会创建对象（通过 `NSObject alloc` 方法），这些对象存储在称为“程序堆”的动态分配内存中。动态创建对象意味着需要进行内存管理，因为在堆上创建的对象永远不会超出作用域。不正确或缺乏内存管理的典型结果包括内存泄漏和野指针。\n\
  - Objective-C 内存管理使用引用计数来实现，这是一种通过对象的唯一引用计数来判断对象是否仍在使用的技术。如果一个对象的引用计数降至零，它就被认为不再被使用，其内存将由运行时系统释放。\n\
  - Apple 的 Objective-C 开发环境提供了两种内存管理机制：手动保留-释放（MRR）和自动引用计数（ARC）。\n- 使用 MRR 时，你通过编写代码显式管理对象的生命周期：对你创建/需要使用的对象获取所有权，并在不再需要这些对象时释放该所有权。\n\
  - ARC 采用了与 MRR 相同的引用计数模型，但利用编译器来管理对象的生命周期。在程序编译时，编译器分析源代码，确定动态创建对象的生命周期需求，然后在编译后的代码中自动插入必要的\
  \ retain 和 release 消息。\n- ARC 通过新的对象生命周期限定符得到了增强，这些限定符用于显式声明对象变量和属性的生命周期，并且还包括用于防止对象图中循环引用的功能（弱引用）。\n\
  - ARC 可以在整个项目中使用，也可以按单个文件启用，从而使使用 ARC 的代码能够与不符合 ARC 要求的现有代码协同工作。苹果还提供了一个用于将现有 Objective-C\
  \ 代码迁移到 ARC 的转换工具。对于所有新的 Objective-C 项目，ARC 是推荐的内存管理工具。\n\n内存管理对于 Objective-C 软件开发非常重要。它对应用程序的用户体验以及整个系统的运行都有重大影响。一个编写良好的\
  \ Objective-C 程序只会使用其所需的内存，不会发生内存泄漏，也不会尝试访问不再使用的对象。现在你已经了解了 Objective-C 内存模型以及应用程序内存管理所提供的方法：MRR\
  \ 和 ARC（苹果推荐的方法）。在下一章中，你将探讨 Objective-C 平台的另一个关键元素——预处理器。猜猜看？这意味着你还将学习一门新的编程语言！所以，何不休息一下，给自己一个应得的放松呢？当你准备好了，翻到下一页开始下一章。\n\
  \n# 第 5 章：预处理器\n\nObjective-C 编程语言包含一个预处理器，用于在编译之前翻译源文件。部分翻译是自动执行的，另一部分则基于你在源文件中包含的预处理器语言元素。如果你查看公开可用的\
  \ Objective-C 源代码，例如苹果的 Objective-C 源代码，你很可能会发现大量使用预处理器语言的情况。那么，你可能会好奇：预处理器的特性是什么？如何在程序中最佳地使用这种语言？这些正是本章的主题，让我们开始吧！\n\
  \n## 概述\n\n源代码编译的一般过程是：将输入的源文件转换成可在目标计算平台上执行的文件。Objective-C 编译器将此过程分为几个阶段，如图 5-1\
  \ 所示。\n\n![9781430250500_Fig05-01.jpg](img/9781430250500_Fig05-01.jpg)\n\n### 图\
  \ 5-1 编译 Objective-C 源文件\n\n\n\n# 这些阶段共同执行词法分析、语法分析、代码生成与优化、汇编及链接操作，最终生成输出二进制文件。\n\
  \n在*词法分析*阶段，源代码被分解为词法单元（tokens）。每个*词法单元*是语言中的单一元素；例如，在其语法上下文中的关键字、运算符、标识符或符号名称。\n\
  \n*语法分析*（或称解析）阶段会检查词法单元是否符合正确的语法，并验证它们能否构成有效表达式。该任务最终会基于词法单元生成一个层次化的解析树或抽象语法树（AST）。\n\
  \n在*代码生成与优化*阶段，AST 被用于生成输出语言的代码，该输出语言可能是机器语言或中间语言表示（IR）。代码还会被优化为功能等价但运行速度更快、体积更小的形式。\n\
  \n*汇编*阶段将生成的代码转换为目标平台可执行的机器码。\n\n最后，在*链接*阶段，汇编器输出的一个或多个机器码文件被组合成单个可执行程序。\n\n预处理器在词法分析阶段（如图\
  \ 5-1 所示）且位于解析之前被使用。要理解其在该阶段的作用，让我们详细回顾预处理器的操作。\n\n## 操作\n\n预处理器的工作方式是：根据一组预定义规则，将输入的字符序列替换为其他字符序列。如图\
  \ 5-2 所示，这些操作按以下顺序执行：\n\n![9781430250500_Fig05-02.jpg](img/9781430250500_Fig05-02.jpg)\n\
  \n图 5-2. 预处理 Objective-C 源文件\n\n1. *文本转换*：首先，预处理器将输入的源文件分解为行，将三字符组替换为对应的单个字符，将续行合并为单行，并将注释替换为单个空格。三字符组是由\
  \ C 编程语言定义的三字符序列，用于表示单个字符。\n2. *词法单元转换*：接着，预处理器将转换后的文件转换为一系列词法单元。\n3. *基于预处理器语言的转换*：最后，如果词法单元流包含任何预处理语言元素，则根据这些输入对其进行转换。\n\
  \n前两个操作自动执行，最后一个操作则基于添加到源文件中的*预处理器语言*元素来执行。\n\n## 预处理器语言\n\n没错，预处理器语言是一种独立于 Objective-C\
  \ 的单独编程语言。使用该语言执行的源文件转换主要包括：源文件包含、条件编译和宏展开。预处理器语言元素在程序编译之前对源文件进行操作，并且预处理器本身不了解 Objective-C\
  \ 语言。\n\n预处理器语言定义了待执行的指令和待展开的宏。预处理器*指令*是由预处理器（而非编译器）执行的命令。预处理器*宏*是一个命名的代码片段。凡是在源代码中使用该名称的位置，该代码片段都会被替换进去。预处理器语言还定义了几个运算符和关键字。\n\
  \n**注意**   理解预处理语言的能力和局限性至关重要，因为错误使用可能导致难以诊断的细微编译问题。在详细研究该语言时，请牢记这一点。\n\n## 指令\n\
  \n在 Objective-C 源文件中，预处理器指令通过一种独特的语法来标识，该语法使得这些行由预处理器而非编译器处理。预处理器指令具有以下形式：\n\n```\n\
  #directiveName directiveArguments\n```\n\n指令以井号（`#`）开头，其后紧跟指令名称，再接着对应的参数。下面这行代码：\n\
  \n```\n#import \"Elements.h\"\n```\n\n是一个预处理指令的示例；每条指令以换行符结束。若要将指令扩展到多行，则在需要续行的行末放置反斜杠（`\\\
  `）。以下示例：\n\n```\n#define DegreesToRadians(x)  \\\n                 ((x) * 3.14159\
  \ / 180.0)\n```\n\n是一条跨两行的预处理器指令，第一行末尾的反斜杠表示续行。\n\n以下是完整的预处理器指令集及其提供的功能：\n\n* 头文件包含（`#include`，\
  \ `#import`）\n* 条件编译（`#if`， `#elif`， `#else`， `#endif`， `#ifdef`， `#ifndef`）\n*\
  \ 诊断（`#error`， `#warning`， `#line`）\n* 编译指令（`#pragma`）\n\n### 头文件包含\n\n预处理器有两条指令（`#include`\
  \ 和 `#import`）用于实现头文件包含；简而言之，它们告诉预处理器获取一个文件的文本内容并将其插入当前文件。因此，它们促进了代码复用，因为源文件可以使用外部类的接口和宏，而无需直接复制它们。\n\
  \n*包含*指令的语法有两种形式：\n\n```\n#include \"HeaderFileName\"\n```\n\n或\n\n```\n#include\
  \ <HeaderFileName>\n```\n\n`HeaderFileName` 是要插入的头文件名。这两种表达式的唯一区别在于编译器查找文件的位置（即目录）：\n\
  \n* *双引号内的头文件名*（`\"HeaderFileName\"`）。编译器首先在包含该指令的源文件所在目录中搜索文件。如果未找到，则在配置好的默认目录中搜索系统标准头文件。\n\
  * *尖括号内的头文件名*（`<HeaderFileName>`）。编译器在配置好的默认目录中搜索标准头文件。\n\n按照惯例，标准头文件通常使用尖括号包含，因为它们通常位于默认目录中；而其他头文件（如\
  \ Objective-C 类的头文件）则使用双引号包含。\n\n*导入*指令（`#import`）也执行头文件包含。与 `#include` 指令类似，被包含的头文件用双引号或尖括号括起来。该指令与\
  \ `#include` 的区别在于，它能确保一个头文件在源文件中仅被包含一次，从而防止递归包含。例如，在第 2 章和第 3 章中实现的 Elements 程序中，`main.m`\
  \ 源文件包含了 `Hydrogen.h` 和 `Atom+Nuclear.h` 头文件。而这两个文件各自都包含了 `Atom.h` 文件，因此你可能面临 `Atom`\
  \ 头文件被重复包含的情况（在 `main.m` 文件中）。然而，由于 `main.m` 文件使用 `#import` 指令（如代码清单 5-1 所示）包含了\
  \ `Hydrogen` 和 `Atom+Nuclear` 头文件，因此 `Atom` 头文件将仅被包含一次（在 `main.m` 源文件中）。\n\n*代码清单\
  \ 5-1.*  使用 `#import` 指令防止递归包含\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ \"Atom.h\"\n#import \"Atom+Nuclear.h\"\n#import \"Atom+Helper.h\"\n#import \"\
  Hydrogen.h\"\n```\n\n\n\n如果没有`#import`指令，则必须在头文件中提供包含守卫来防止递归包含。*包含守卫*是一组预处理器语句，用于防止头文件被重复包含。它通常使用`#ifndef`条件编译表达式和`#define`指令构建。`Atom.h`头文件的包含守卫示例如代码清单\
  \ 5-2 所示。\n\n*代码清单 5-2.*  Atom.h 头文件包含守卫\n\n```objc\n#ifndef  ATOM_H\n#define  ATOM_H\n\
  @interface Atom : NSObject\n// Atom 接口声明\n...\n@end\n#endif\n```\n\n`#import`指令通常用于包含\
  \ Objective-C 头文件，因此在 Objective-C 源文件中通常无需实现包含守卫。现在让我们来看条件编译指令。\n\n## 条件编译\n\n*条件编译*指令（`#if`,\
  \ `#elif`, `#else`, `#endif`, `#ifdef`, `#ifndef`）允许你在满足特定条件时包含或排除部分源代码。\n\n`#if`指令允许你测试表达式的值，并根据结果包含/排除部分源代码。使用该指令的语法如代码清单\
  \ 5-3 所示。\n\n*代码清单 5-3.*  #if 预处理器指令语法\n\n```cpp\n#if ArithmeticExpression\n// 条件文本（预处理器或\
  \ Objective-C 源代码）\n...\n#endif\n```\n\n`#if`指令用于测试算术表达式。如代码清单 5-3 所示，它与`#endif`指令配对使用，两者之间包含条件文本。该算术表达式为整数类型，可包含以下元素：\n\
  \n* 整数常量和字符常量。\n* 算术运算符、位运算、移位运算、比较运算和逻辑运算（如附录 A 中所定义）。\n* 预处理器宏。宏在计算表达式之前展开。\n\
  * 对`defined`运算符的使用，该运算符用于检查宏是否已定义。\n* 非宏的标识符，在求值时都会被赋予零值。\n\n预处理器根据这些规则对表达式求值。如果求值结果非零，则条件文本（通常是源代码，但也可能是其他预处理器指令）会被包含以进行编译或进一步预处理；否则，将被跳过。请看以下示例：\n\
  \n```cpp\n#if INPUT_ARGS <= 0\n#warning \"No input arguments defined\"\n#endif\n\
  ```\n\n预处理器将按以下步骤处理这些代码行：\n\n1. 展开标识符`INPUT_ARGS`。如果该标识符是宏，则替换为其对应的值；如果不是宏或者宏没有值，则替换为零。\n\
  2. 计算表达式的结果。如果值非零（即`INPUT_ARGS`标识符的值小于或等于零），则`#if`指令语句和`#endif`指令之间的文本被包含（即不会被预处理器过滤）。在这种情况下（由于`#warning`消息），它将最终导致编译器生成一条警告消息。\n\
  \n此类指令常用于为指定的目标环境进行平台相关代码的条件编译。例如，如果你有针对多个不同编译器进行自定义的 Objective-C 代码，可以使用`#if`指令和适当的编译器特定标识符将其封装起来。\n\
  \n`#elif`指令代表“else if”；它增强了`#if`指令，允许你检查两个或更多可能条件。它位于`#if`和`#endif`指令之间；只有当原始的`#if`指令（以及任何前面的`#elif`指令）失败时，才会处理`#elif`指令后的条件文本。`#elif`指令的语法如代码清单\
  \ 5-4 所示。\n\n*代码清单 5-4.*  #elif 预处理器指令语法\n\n```cpp\n#if ArithmeticExpression1\n\
  // 条件文本 1\n...\n#elif ArithmeticExpression2\n// 条件文本 2\n...\n#elif ArithmeticExpressionN\n\
  // 条件文本 N\n...\n#endif\n```\n\n预处理器将按以下方式处理代码清单 5-4 中的文本：如果`ArithmeticExpression1`成功，则处理`条件文本\
  \ 1`；否则如果`ArithmeticExpression2`成功，则处理`条件文本 2`；否则如果`ArithmeticExpressionN`成功，则处理`条件文本\
  \ N`。如果`#if-#elif`组中有多个条件表达式能成功，则仅处理第一个。\n\n`#else`指令通过提供一种机制来增强`#if`和`#elif`指令：当所有相关的`#if`和`#elif`表达式都不成功时，执行条件文本。它位于`#if`、`#elif`（如果提供了任何`#elif`指令）和`#elif`指令之后，作为紧挨着`#endif`之前的最后一条指令。`#else`指令的语法如代码清单\
  \ 5-5 所示。\n\n*代码清单 5-5.*  #else 预处理器指令语法\n\n```cpp\n#if ArithmeticExpression1\n\
  // 条件文本 1\n...\n#elif ArithmeticExpression2\n// 条件文本 2\n...\n#else\n// 其他条件文本\n\
  ...\n#endif\n```\n\n如果其他所有条件表达式都不成功，预处理器将处理代码清单 5-5 中的`其他条件文本`。\n\n在`#if`及其对应的`#endif`指令之间，最多只能放置一个`#else`指令，并且它必须是`#endif`之前的最后一条指令。最后，还需注意`#if`、`#elif`、`#else`和`#endif`指令可以嵌套；在这种情况下，`#endif`与它前面最近的`#if`指令匹配。\n\
  \n`#ifdef`指令允许仅当指定为参数的那个宏已被定义时（无论其值是多少），才处理条件文本。它与`#endif`指令配对，条件文本包含在两者之间。该指令的语法如代码清单\
  \ 5-6 所示。\n\n*代码清单 5-6.*  #ifdef 预处理器指令语法\n\n```cpp\n#ifdef MacroName\n// 条件文本\n\
  ...\n#endif\n```\n\n`#ifndef`指令作为`#ifdef`指令的补充；它允许仅当指定为参数的那个宏未被定义时，才处理条件文本。该指令的语法如代码清单\
  \ 5-7 所示。\n\n*代码清单 5-7.*  #ifndef 预处理器指令语法\n\n```cpp\n#ifndef MacroName\n// 条件文本\n\
  ...\n#endif\n```\n\n`#ifdef`和`#ifndef`指令的行为也可以通过在使用`#if`或`#elif`的条件表达式中使用`defined`运算符来实现。\n\
  \n`defined`运算符用于测试某个名称是否被定义为一个宏。它等同于`#ifdef`指令。在条件表达式中使用`defined`运算符的语法是：\n\n```cpp\n\
  #if defined MacroName\n```\n\n或\n\n```cpp\n#elif defined MacroName\n```\n\n如果需要，宏名称可以用括号括起来。使用`defined`运算符（代替`#ifdef`指令）的原因之一是需要在单个表达式中测试多个宏，如下例所示：\n\
  \n\n\n```c\n#if defined (MacroName1) || defined (MacroName2)\n// insert source text\
  \ here\n#endif\n```\n\n## 诊断信息\n\n预处理器包含几个提供诊断信息的指令，用于处理程序编译期间出现的问题。`#error` 指令会使预处理器生成错误消息并导致编译失败。该指令的语法如下所示：\n\
  \n```\n#error \"错误消息\"\n```\n\n错误消息需要用双引号括起来。该指令通常在条件编译检查失败时使用；例如，如果未定义宏 `INPUT_ARGS`，则以下代码片段：\n\
  \n```c\n#ifndef    INPUT_ARGS\n#error \"没有提供输入参数\"\n#endif\n```\n\n会导致编译失败并生成一条错误消息（“没有提供输入参数”）。\n\
  \n`#warning` 指令会使预处理器生成编译期警告消息，但允许继续编译。该指令的语法如下所示：\n\n```\n#warning \"警告消息\"\n```\n\
  \n警告消息需要用双引号括起来。如果未定义宏 `OUTPUT_ARGS`，则以下代码片段：\n\n```c\n#ifndef    OUTPUT_FILE\n\
  #warning \"未提供输出文件名\"\n#endif\n```\n\n会生成一条警告消息（“未提供输出文件名”）；编译将继续进行。\n\n`#line`\
  \ 指令用于为编译器消息提供行号。如果在编译过程中发生错误，编译器会显示一条错误消息，其中包含发生错误的文件名和相应的行号引用，从而更容易找到产生错误的代码。`#line`\
  \ 指令的语法如下所示：\n\n```\n#line 行号 \"文件名\"\n```\n\n`行号` 是分配给下一行代码的新行号。从这一点开始，后续行的行号将逐一递增。`“文件名”`（用双引号括起来）是一个可选参数，可用于重新定义将要显示的文件名。Xcode\
  \ 和 Objective-C 编译器对 `#line` 指令的使用如下列代码片段所示：\n\n```objc\n...\n#line 10 \"Elements.m\"\
  \nint ?numProtons;\n```\n\n此代码将生成一个错误，该错误将显示为文件 `\"Elements.m\"` 第 11 行的错误。\n\n\
  Xcode IDE 会显示源文件的行号，并在您输入代码和编译时自动显示错误和警告；因此，您很少需要在源文件中使用此指令。\n\n## Pragma\n\n*pragma*\
  \ 指令（`#pragma`）用于向编译器指定超出 Objective-C 语言本身含义之外的额外选项。这些选项特定于所使用的平台和编译器。`#pragma`\
  \ 指令的语法如下所示：\n\n```\n#pragma Pragma 选项\n```\n\npragma 选项是一系列字符，对应于特定的编译器指令（以及参数，如果有的话），并会导致实现定义的行为。如果编译器不支持\
  \ `#pragma` 指令的某个特定参数，该指令将被忽略，并且不会生成错误。\n\nApple Objective-C 编译器支持许多 pragma 选项；可用的具体选项可在编译器的参考文档中找到。\n\
  \nXcode 支持几个 `#pragma mark` 指令。您可以在实现源文件中使用这些指令，以便在 IDE 中查看方法时对它们进行分类。让我们看一个例子来了解这是如何工作的。Xcode\
  \ 工作区窗口在编辑器区域的顶部包含一个*跳转栏*；它用于分层查看工作区中的项目。如果您单击跳转栏中的某个项目，它会显示层级中同一级别的项目（如图 5-3 所示）。\n\
  \n![9781430250500_Fig05-03.jpg](img/9781430250500_Fig05-03.jpg)\n\n图 5-3. 使用 Xcode\
  \ 跳转栏显示方法\n\n图 5-3 显示，在 Xcode 跳转栏中单击某个类实现会弹出一个窗口，显示 `Hydrogen` 类实现的方法列表。这就是 pragma\
  \ mark 指令发挥作用的地方——它们可用于组织这些方法在跳转栏弹出窗口中的显示方式。您可以使用以下指令在跳转栏弹出窗口中创建一个可见的分隔线：\n\n```\n\
  #pragma mark -\n```\n\n您可以使用以下指令创建一个标签，用于对一个或多个方法进行分类：\n\n```\n#pragma mark 标记名称\n\
  ```\n\n`标记名称` 是将在弹出窗口中显示的方法的标签。\n\n以下示例包含了为第 2 章和第 3 章中创建的 `Hydrogen` 类实现添加的 pragma\
  \ mark 指令。这些更新（在列表 5-8 中以**粗体**显示）对类的自定义初始化方法进行了分类。\n\n*列表 5-8.*  #pragma mark 指令使用示例\n\
  \n```objc\n#pragma mark -\n#pragma mark Custom Initializers\n\n- (id) initWithNeutrons:(NSUInteger)neutrons\n\
  {\n  if ((self = [super init]))\n  {\n    // 初始化代码在此处。\n    _chemicalElement = @\"\
  Hydrogen\";\n    _atomicSymbol = @\"H\";\n    _protons = 1;\n    _neutrons = neutrons;\n\
  \n// 为消息转发创建辅助对象\n    helper = [[HydrogenHelper alloc] init];\n  }\n\nreturn self;\n\
  }\n\n#pragma mark -\n```\n\n如果您现在单击 Xcode 跳转栏中的 `Hydrogen` 实现（如图 5-4 所示），弹出窗口会列出一个带有\
  \ `Custom Initializers` 标签并被分隔线包围的方法 `initWithNeutrons:`。\n\n![9781430250500_Fig05-04.jpg](img/9781430250500_Fig05-04.jpg)\n\
  \n图 5-4. 使用 #pragma mark 指令\n\n尤其对于包含大量方法的大型项目和类，`#pragma mark` 指令提供了一种机制，有助于对类方法进行分类和组织，并使跳转栏使用起来更高效。\n\
  \n## 宏\n\n预处理器*宏*是一个命名的代码片段。无论在源代码中何处使用了该名称，代码片段都会替换它。预处理器宏可用于定义常量值，或提供带有输入参数值的类函数替换。宏使用\
  \ `#define` 预处理器指令定义，并使用 `#undef` 指令移除。定义常量值的类对象宏的语法如下：\n\n```c\n#define 宏名称 [宏值]\n\
  ```\n\n可选的宏值放在名称之后；宏值可以是常量值组成的算术表达式。类函数宏的语法如下：\n\n```c\n#define 宏名称(宏参数) 代码\n```\n\
  \n宏名称包含一个或多个参数（用逗号分隔），用括号括起来，以及替换它的代码片段。一个将两个值相加的类函数宏示例如下：\n\n```c\n#define SQUARE(x)\
  \  ((x) * (x))\n```\n\n宏的所有参数在被替换到宏体之前都会完全进行宏展开。替换之后，整个文本会再次被扫描以查找要展开的宏，包括参数。预处理器不理解\
  \ Objective-C；它只是将宏名称的出现替换为相应的宏值或代码。还要注意，宏不受 Objective-C 作用域规则的影响。一旦定义，宏就会存在并可在文件中使用，直到使用\
  \ `#undef` 指令取消定义。\n\n现在您可能想知道：为什么我在定义 `SQUARE` 宏时使用了所有这些括号？这反映了宏的一个问题；因为它们只执行简单的替换，所以在定义宏时必须小心，以避免在展开时出现意外结果。例如，考虑如果前面列出的\
  \ `SQUARE` 宏被定义如下：\n\n```c\n#define SQUARE(x)  x * x\n```\n\n\n\n# 排版后的内容\n\n如果你在源代码中写入以下语句，会得到什么结果？\n\
  \n```\nint product = SQUARE(4 + 2);\n```\n\n猜猜看？结果不是 `36`！让我们看看宏究竟如何工作。记住，它只是简单地将宏替换为对应的代码；因此，该语句会宏展开为：\n\
  \n```\nint product = 4 + 2 * 4 + 2;\n```\n\n由于 Objective-C 的运算符优先级和结合性规则（列于附录 A），在上述语句中，`2\
  \ * 4` 的乘法会在加法之前执行；因此，该语句将返回值 `14`——这可能不是你期望的结果！为了避免这些由于宏展开导致的问题，你可以用括号将宏参数和宏本身包围起来，如下面\
  \ `ADD` 宏的初始定义所示：\n\n```\n#define SQUARE(x)  ((x) * (x))\n```\n\n事实上，函数式宏和对象式宏都应该使用括号。另一方面，用于执行计算而非返回值（例如执行一系列操作）的多行函数式宏，应该用花括号（`{\
  \ }`）包围。例如，下面的宏用花括号包围：\n\n```\n#define SWAP(a, b)  {a^=b; b^=a; a^=b;}\n```\n\n\
  函数式宏定义在替换序列中接受两个特殊运算符（`#` 和 `##`）。*字符串化*运算符（用 `#` 符号表示）用于将宏输入参数替换为对应的文本字符串（用双引号包围）。*连接*运算符（用\
  \ `##` 符号表示）用于连接两个符号（token），它们之间不留空格。\n\n**警告：不要过度使用宏！**\n\n宏，尤其是函数式宏，是一个强大的特性，但使用起来可能非常危险。由于预处理器的替换发生在源代码解析之前，很难定义在所有情况下都能正确展开的宏。将带有*副作用*的参数传递给函数式宏通常是存在问题的（即，改变一个或多个参数的值）。这可能导致其中一个或多个参数被多次求值（即副作用的重复），从而对它们的值产生意想不到的更改，这些更改很难诊断。\n\
  \n最后，严重依赖复杂宏的代码可能难以维护，因为它们的语法在许多情况下与 Objective-C 中使用的语法不同。\n\n## 总结\n\n这一章很有趣。你在一个章节里就学会了一门编程语言！好吧，也许没那么夸张，但你现在对\
  \ Objective-C 预处理器的工作原理以及预处理器语言如何在 Objective-C 源文件中使用有了很好的理解。特别是，如果你想理解许多公开可用的软件库和框架，或者想研究\
  \ Apple 的 Objective-C 源代码，对预处理器语言的详细了解是非常宝贵的。总而言之，本章的要点如下：\n\n*   预处理器在编译的词法分析阶段使用，该阶段发生在解析之前。它根据一组预定义的规则，将输入字符序列（来自源文件）替换为其他字符序列。这些操作执行文本转换、符号转换和基于预处理器的语言转换。\n\
  *   预处理器语言是一种与 Objective-C 不同的独立编程语言。使用该语言执行的源文件转换主要包括文件包含、条件编译和宏展开。\n*   预处理器语言定义了要执行的*指令*和要展开的*宏*。预处理器指令是由预处理器执行（而非编译器）的命令。预处理器宏是一个命名的代码片段。只要在源代码中使用了该名称，代码片段就会被替换进去。\n\
  *   预处理器指令执行头文件包含、条件处理、诊断和平台特定操作（`pragma`）。\n*   预处理器宏是一个命名的代码片段。只要在源文件中使用了该名称，代码片段就会被替换进去。预处理器宏定义常量值和/或提供带有输入参数值的函数式替换。\n\
  *   宏，尤其是函数式宏，是一个强大的特性，但可能非常危险。不当使用会导致嵌套错误、运算符优先级问题、副作用重复以及其他问题。此外，严重依赖复杂宏的代码可能难以维护，因为其语法通常与\
  \ Objective-C 中使用的语法不同。一般来说，你应该尽量减少在 Objective-C 代码中对宏的使用。\n\n# 第六章\n\n# 专家篇：使用\
  \ ARC\n\n信不信由你，你正在接近本书第一部分的结尾。到目前为止，一切顺利！第一部分以本章“专家篇”章节结束。*专家篇*章节旨在提供额外的细节，并对本书前面介绍的主题进行更深入的覆盖。在本章中，你将学习围绕\
  \ ARC 内存管理的一些更精细的细节。你将复习关于 ARC 内存管理和对象所有权的一些关键点，并学习如何在 ARC 中使用 Toll-Free Bridged\
  \ 对象。\n\n## ARC 与对象所有权\n\n回顾第 4 章，Objective-C 代码创建存储在动态分配内存（堆）中的对象。在堆上创建的对象永远不会超出作用域，因此需要应用程序内存管理来确保这些对象在不再使用时从内存中移除，并且程序不会错误地释放仍在使用的对象。Objective-C\
  \ 使用引用计数模型实现内存管理，通过对对象的唯一引用来判断对象是否仍在使用。ARC 通过在编译时插入代码来自动化此任务，根据引用计数模型，正确地平衡对象上的\
  \ `retain` 和 `release` 消息。ARC 禁止对对象生命周期进行编程控制。具体来说，你不能发送 `retain` 或 `release` 消息来控制对象的所有权权益。因此，理解\
  \ ARC 下关于对象所有权的规则非常重要。\n\n### 声称对象的所有权权益\n\n你的 Objective-C 代码对使用任何以 `alloc`、`new`、`copy`\
  \ 或 `mutableCopy` 开头的方法创建的任何对象拥有所有权权益。如清单 6-1 所示的 `main()` 函数使用 `alloc` 方法创建了一个\
  \ `Atom` 对象，因此声称对该对象拥有所有权权益。\n\n*清单 6-1.*  创建 Atom 对象\n\n```\nint main(int argc,\
  \ const char * argv[])\n{\n  @autoreleasepool\n  {\n    Atom *atom = [[Atom alloc]\
  \ init];\n    [atom logInfo];\n  }\n\nreturn 0;\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n你的代码也可以通过使用`copy`消息创建`block`对象，从而获得该对象的所有权。\n\n**注意**：*block* 是闭包的一种实现，是一种允许访问其正常作用域外部变量的函数。Block\
  \ 可以动态分配在堆上，并且与标准的 Objective-C 对象一样，由 ARC 管理。本书第 4 部分将深入介绍 block 的编程。\n\n## 释放对象的所有权\n\
  \n如前所述，ARC 禁止在对象上编程使用`release`、`autorelease`、`dealloc`或相关消息。当你的代码执行以下任一操作时，它放弃了对对象的所有权：1)\
  \ 变量重新赋值，2) `nil`赋值，或 3) 其所有者被释放。\n\n### 变量重新赋值\n\n如果一个指向动态创建对象的变量被更改为指向另一个对象，则该对象失去一个所有者。在编译时，ARC\
  \ 会插入代码向此对象发送`release`消息。此时，如果该对象没有其他所有者，它将被释放。Listing 6-2 演示了变量重新赋值的示例。\n\n*Listing\
  \ 6-2.*  对象所有权——变量重新赋值\n\n```\nAtom *myAtom = [[Atom alloc] initWithName:@\"Atom\
  \ 1\"];\n// 其他代码\n...\nmyAtom = [[Atom alloc] initWithName:@\"Atom 2\"];\n```\n\n\
  在 Listing 6-2 中，创建了一个`Atom`对象（我们称其为`Atom 1`）并赋值给`myAtom`变量；稍后在代码中，此变量被赋值为另一个`Atom`对象（我们称其为`Atom\
  \ 2`）。由于`myAtom`变量已重新赋值为`Atom 2`，`Atom 1`失去一个所有者，如果该对象没有其他所有者，它将被释放。\n\n### nil\
  \ 赋值\n\n如果一个当前指向动态创建对象的变量的值被设置为`nil`，则该对象失去一个所有者。Listing 6-3 演示了`nil`赋值的示例。\n\n\
  *Listing 6-3.*  对象所有权——nil 重新赋值\n\n```\nAtom *myAtom = [[Atom alloc] init];\n//\
  \ 其他代码\n...\nmyAtom = nil;\n```\n\n在 Listing 6-3 中，创建了一个`Atom`对象并赋值给`myAtom`变量；稍后在代码中，此变量被设置为`nil`。由于`myAtom`变量已设置为`nil`，该`Atom`对象失去一个所有者。同样，在将`myAtom`变量设置为`nil`的语句之后，ARC\
  \ 会插入代码向此对象发送`release`消息。\n\n### 所有者释放\n\n*所有者释放*。这听起来不太令人愉快，不是吗？实际上，这个术语指的是对象所有权，以及\
  \ ARC 如何透明地管理对象图和集合的对象生命周期。面向对象的程序由相互关联的对象网络组成。这些对象通过 OOP 继承和/或组合连接在一起，统称为*对象图*。在对象图中，对象通过组合原理包含对其他（子）对象的引用。如果一个（父）对象创建了另一个（子）对象，它就声称拥有该子对象的所有权。在第\
  \ 4 章中，你创建了一个程序，其中包含一个由`OrderEntry`类和两个依赖（子）类组成的对象图；其对象图如 Figure 6-1 所示。\n\n![9781430250500_Fig06-01.jpg](img/9781430250500_Fig06-01.jpg)\n\
  \nFigure 6-1. OrderEntry 对象图\n\n当创建并初始化一个`OrderEntry`对象时，其`init`方法也会创建其两个子类的实例；因此，`OrderEntry`对象声称拥有这些子对象中每一个的所有权。稍后，当释放一个`OrderEntry`对象时，ARC\
  \ 会自动向其每个子对象发送`release`消息。具体来说，在编译时，ARC 会创建代码，为`OrderEntry`对象插入一个`dealloc`方法（如果该方法尚不存在），为其拥有的每个子对象插入一条`release`消息，然后向`OrderEntry`对象的超类发送一条`dealloc`消息。因此，ARC\
  \ 会自动管理对象图的生命周期。\n\nApple 基础框架包含各种集合类，之所以这样命名，是因为它们用于保存其他对象的实例。当一个对象存储在一个集合类的实例中时，该集合类声称拥有该对象的所有权。相反，当释放一个集合类实例时，ARC\
  \ 会自动向集合中的每个对象发送一条`release`消息。\n\n## 创建多个订单条目\n\n为了说明 ARC 内存管理和所有者释放的用法，你将扩展在第 4\
  \ 章中创建的 Order Entry 项目，添加收集和存储多个订单条目的功能。你将使用一个集合类来存储这些条目，然后演示 ARC 如何对集合类及其存储的对象执行内存管理。\n\
  \n在 Xcode 中，通过从 Xcode 文件菜单中选择 **Open Recent ![image](img/arrow.jpg) ARC Orders.xcodeproj**\
  \ 来打开 ARC Orders 项目（如果尚未打开）。该项目的源代码由七个文件组成，这些文件实现了`OrderEntry`、`OrderItem`和`Address`类，以及`main`函数。让我们从对`OrderItem`类进行一些更新开始。在导航器窗格中选择\
  \ **OrderItem.h** 文件，然后更新 OrderItem 接口，如 Listing 6-4 所示。\n\n*Listing 6-4.*  ARC\
  \ OrderItem 类接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface OrderItem\
  \ : NSObject\n\n@property (readonly) NSString *name;\n\n- (id) initWithName:(NSString\
  \ *)itemName;\n\n@end\n```\n\n在 Listing 6-4 中，实例变量`name`已更改为只读属性。接下来，选择 **OrderItem.m**\
  \ 文件并更新`OrderItem`实现，如 Listing 6-5 所示。\n\n*Listing 6-5.*  ARC OrderItem 类实现\n\n\
  ```\n#import \"OrderItem.h\"\n\n@implementation OrderItem\n\n- (id) initWithName:(NSString\
  \ *)itemName\n{\n  if ((self = [super init]))\n  {\n    _name = itemName;\n    NSLog(@\"\
  Initializing OrderItem object %@\", _name);\n  }\n  return self;\n}\n\n- (void)dealloc\n\
  {\n  NSLog(@\"Deallocating OrderItem object %@\", self.name);\n}\n\n@end\n```\n\n\
  这段代码与原始实现非常相似；自定义初始化方法（`initWithName:`）已被修改，以初始化属性支持的实例变量。日志消息也略有更新，以显示`OrderItem`对象的名称。回顾第\
  \ 3 章，对于自动合成的属性，其实例变量的标准命名约定是属性名前加下划线。现在让我们更新`OrderEntry`类。在导航器窗格中选择 **OrderEntry.h**\
  \ 文件，然后更新 OrderEntry 接口，如 Listing 6-6 所示。\n\n*Listing 6-6.*  ARC OrderEntry 类接口\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"OrderItem.h\"\n#import \"Address.h\"\
  \n\n@interface OrderEntry : NSObject\n\n{\n  Address *shippingAddress;\n}\n\n@property\
  \ (readonly) NSString *orderId;\n@property (readonly) OrderItem *item;\n\n- (id)\
  \ initWithId:(NSString *)oid name:(NSString *)order;\n\n@end\n```\n\n\n\n`OrderEntry`接口现在有一个实例变量、两个只读属性和一个更新后的自定义初始化器（`initWithId:name:`）。这些属性是只读的，它们替换了第\
  \ 4 章原始接口中的两个实例变量。接下来，你将更新类的实现。在导航窗格中选择`OrderEntry.m`文件，并更新实现，如列表 6-7 所示。\n\n列表\
  \ 6-7. ARC OrderEntry 类实现\n\n```\n#import \"OrderEntry.h\"\n\n@implementation OrderEntry\n\
  \n- (id) initWithId:(NSString *)oid name:(NSString *)order;\n{\n  if ((self = [super\
  \ init]))\n  {\n    NSLog(@\"Initializing OrderEntry object\");\n    _orderId =\
  \ oid;\n    _item = [[OrderItem alloc] initWithName:order];\n    shippingAddress\
  \ = [[Address alloc] init];\n  }\n\nreturn self;\n}\n\n- (void)dealloc\n{\n  NSLog(@\"\
  Deallocating OrderEntry object with ID %@\",\n        self.orderId);\n}\n\n@end\n\
  ```\n\n自定义初始化器方法（`initWithId:name:`）已被修改，用于初始化两个由属性支持的实例变量。日志消息也略有更新，以使用属性`getter`方法显示`OrderEntry`\
  \ ID。\n\n现在你已经更新了类，让我们更新`main`函数，以创建一些订单条目并将它们存储在集合类中。在导航窗格中选择`main.m`文件，然后更新`main`函数，如列表\
  \ 6-8 所示。\n\n列表 6-8. ARC Orders `main()` 函数实现\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"OrderEntry.h\"\n\nint main(int argc, const char * argv[])\n{\n\n@autoreleasepool\n\
  \  {\n    // Create an OrderEntry object\n    OrderEntry *entry1 = [[OrderEntry\
  \ alloc] initWithId:@\"A-1\"\n                                                 \
  \  name:@\"2 Hot dogs\"];\n    NSLog(@\"Order 1, ID = %@, item: %@\", entry1.orderId,\
  \ entry1.item.name);\n\n// Create another OrderEntry object\n    OrderEntry *entry2\
  \ = [[OrderEntry alloc] initWithId:@\"A-2\"\n                                  \
  \                 name:@\"1 Cheeseburger\"];\n    NSLog(@\"Order 2, ID = %@, item:\
  \ %@\", entry2.orderId, entry2.item.name);\n\n// Add the order entries to a collection\n\
  \    NSArray *entries = [[NSArray alloc] initWithObjects:entry1, entry2, nil];\n\
  \    NSLog(@\"Number of order entries = %li\", [entries count]);\n\n// Set OrderEntry\
  \ object to nil, ARC sends a release message to the object!\n    NSLog(@\"Setting\
  \ entry2 variable to nil\");\n    entry2 = nil;\n\n// Set collection to nil, ARC\
  \ sends a release message to all objects\n    NSLog(@\"Setting entries collection\
  \ variable to nil\");\n    entries = nil;\n\n// Set OrderEntry object to nil, ARC\
  \ sends a release message to the object!\n    NSLog(@\"Setting entry1 variable to\
  \ nil\");\n    entry1 = nil;\n\n// Exit autoreleasepool block\n    NSLog(@\"Leaving\
  \ autoreleasepool block\");\n  }\n  return 0;\n}\n```\n\n对`main()`函数的更新内容较多，因此你将逐行进行复习。首先，代码创建了两个`OrderEntry`对象，每次都会在控制台记录一条消息，显示条目的\
  \ ID 和名称。接下来，代码创建并初始化了一个包含两个订单条目的`NSArray`对象。`NSArray`是 Foundation 框架中的一个类，用于管理对象的顺序集合（你将在本书的第\
  \ 3 部分学习`NSArray`和其他 Foundation 框架集合类）。正如你之前所了解的，当一个对象存储在集合类的实例中时，集合类会声称对该对象拥有所有权权益。因此，`NSArray`对象声称对每个订单条目拥有所有权权益。接下来，当前指向其中一个`OrderEntry`对象（`entry2`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。由于`NSArray`对象仍然“拥有”`entry2`对象，因此它不会被释放。接着，指向`NSArray`对象的变量被设置为`nil`，从而释放了对`entry2`对象以及它所声称拥有所有权的所有对象的所有权权益。最后，指向另一个`OrderEntry`对象（`entry1`）的变量被设置为`nil`，从而释放了对该对象的一个所有权权益。在离开自动释放池块之前，也会立即在控制台记录一条消息。\n\
  \n现在，保存、编译并运行更新后的 ARC Orders 程序，观察输出窗格中的消息（参见图 6-2）。\n\n![9781430250500_Fig06-02.jpg](img/9781430250500_Fig06-02.jpg)\n\
  \n图 6-2. 测试更新后的 ARC Order Entry 项目\n\n输出窗格中的消息（在图 6-3 中更详细地展示）显示了初始化并释放动态创建对象的调用序列。\n\
  \n![9781430250500_Fig06-03.jpg](img/9781430250500_Fig06-03.jpg)\n\n图 6-3. ARC 对象释放\n\
  \n在图 6-3 中，一系列消息显示了两个`OrderEntry`对象图的初始化过程，包括它们对应的依赖对象（`OrderItem`和`Address`）。接下来显示一条指示存储在`NSArray`集合类中订单条目数量的消息。然后，`entry2`变量（对应于一个`OrderEntry`对象）被设置为`nil`；然而，由于`NSArray`实例仍然对这个`OrderEntry`对象拥有所有权权益，因此它不会被释放。随后，`entries`变量（对应于`NSArray`实例）被设置为`nil`。这导致`NSArray`实例被释放，并向该集合中的每个对象发送一条`release`消息。此时，对应于`entry2`变量的`OrderEntry`对象不再有所有者，因此它及其依赖对象被释放。接下来，`entry1`变量被设置为`nil`，导致向其对应的`OrderEntry`对象发送一条`release`消息。由于此对象现在没有所有者，它及其依赖对象也被释放。输出窗格现在显示一条消息，指示代码正在离开自动释放池块。在此消息之后，每个`OrderEntry`对象对应的`OrderItem`对象被释放。\n\
  \n\n\nARC 内存管理已妥善管理了该对象图及集合类的生命周期。但若仔细查看输出面板的内容，你可能会注意到，`OrderItem`对象是在自动释放池结束时才被释放的（如图\
  \ 6-3 中的日志信息所示）。那么，为什么当对应的`OrderEntry`父对象被释放时，它们却没有被释放呢？答案在于 ARC 如何管理属性访问器的生命周期——具体到本案例中，是属性`get`方法。你的代码需要对所获取的（即非通过以`alloc`、`new`、`copy`或`mutableCopy`开头的方法编程创建）且可能长时间使用的任何对象声明所有权。由于\
  \ ARC 禁止你通过编程方式向对象发送`retain`消息，因此它必须能够检测到这些场景，并插入必要的代码来适当管理对象的生命周期。具体来说，如果通过属性`get`方法获取对象，ARC\
  \ 会检测到这一点，并自动插入代码，向该对象发送`retain`和`autorelease`消息，从而防止它过早地被释放。回顾清单 6-6，`OrderEntry`接口声明了一个类型为`OrderItem`的（只读）属性，名为`item`。在清单\
  \ 6-8 中，以下语句通过属性`get`方法（`entry1.item`）获取了`OrderItem`对象`item`：\n\n```\nNSLog(@\"\
  Order 1, ID = %@, item: %@\", entry1.orderId, entry1.item.name);\n```\n\n在编译时，ARC\
  \ 会自动插入向此`OrderItem`对象发送`retain`和`autorelease`消息的代码。稍后在代码中，使用以下语句获取了`OrderItem`对象（`entry2.item`）：\n\
  \n```\nNSLog(@\"Order 2, ID = %@, item: %@\", entry2.orderId, entry2.item.name);\n\
  ```\n\n总而言之，当通过属性 getter 获取对象时，ARC 会向该对象发送`retain`和`autorelease`消息以防其被释放。这解释了为什么`OrderItem`对象是在自动释放池块结束时被释放，而不是在其父对象（`OrderEntry`）被释放时释放。\n\
  \n现在，我们来注释掉上述两条日志语句，然后保存、编译并重新运行程序。由于不再通过属性`get`方法获取`OrderItem`对象，你应该会观察到`OrderItem`对象现在是在对应的`OrderEntry`对象被释放时释放，而不是在自动释放池块结束时释放（参见图\
  \ 6-4）。\n\n![9781430250500_Fig06-04.jpg](img/9781430250500_Fig06-04.jpg)\n\n图 6-4.\
  \ 运行更新后的 ARC Order Entry 项目\n\n此示例展示了使用 ARC 编译的代码如何通过编程释放对象的所有权，以及 ARC 如何管理对象图和集合的对象生命周期。随着你开发更庞大、更复杂的\
  \ Objective-C 应用程序，理解这些细节将变得非常宝贵。\n\n## 将 ARC 与 Apple 框架和服务结合使用\n\nApple 提供了大量软件库（即框架和服务），这些库提供了编写\
  \ OS X 和 iOS 平台软件所需的接口。一些最常用的应用程序开发库在图 6-5 中进行了展示。\n\n![9781430250500_Fig06-05.jpg](img/9781430250500_Fig06-05.jpg)\n\
  \n图 6-5. Apple 应用程序框架和服务\n\n其中一些库的应用程序编程接口（API）是用 Objective-C 编写的，因此可以直接在你的 Objective-C\
  \ 程序中使用。大多数其他库的 API 是用 ANSI C 编写的，因此也可以直接在你的 Objective-C 程序中使用。\n\n你可能还记得第 4 章中的内容，ARC\
  \ 为 Objective-C 对象和块对象提供了自动内存管理。基于 C API 的 Apple 软件库不与 ARC 集成。因此，在使用这些基于 C 的 API\
  \ 动态分配内存时，你需要负责通过编程方式进行内存管理。实际上，使用 ARC 时，禁止在 Objective-C 对象的指针和其他类型的指针（例如，属于 Apple\
  \ 基于 C 的 API 一部分的指针）之间执行标准转换。Apple 提供了几种机制（免费桥接和 ARC 桥接转换）来促进在 Objective-C 程序中使用基于\
  \ C 的 API。接下来你将了解这些内容。\n\n### Objective-C 免费桥接\n\n基于 C 的 Core Foundation 框架和基于 Objective-C\
  \ 的 Foundation 框架中的许多数据类型提供了互操作性。这种能力被称为*免费桥接*，它允许你将相同的数据类型用作 Core Foundation 函数调用的参数，或用作\
  \ Objective-C 消息的接收者。你可以将一种类型转换为另一种类型以消除编译器警告。一些更常用的免费桥接数据类型列于表 6-1 中；它包括 Core Foundation\
  \ 类型和对应的 Foundation 框架类型。\n\n表 6-1. 免费桥接数据类型\n\n| Core Foundation 类型 | Foundation\
  \ 类型 |\n| --- | --- |\n| `CFArrayRef` | `NSArray` |\n| `CFDataRef` | `NSData` |\n\
  | `CFDateRef` | `NSDate` |\n| `CFDictionaryRef` | `NSDictionary` |\n| `CFMutableArrayRef`\
  \ | `NSMutableArray` |\n| `CFMutableDataRef` | `NSMutableData` |\n| `CFMutableDictionaryRef`\
  \ | `NSMutableDictionary` |\n| `CFMutableSetRef` | `NSMutableSet` |\n| `CFMutableStringRef`\
  \ | `NSMutableString` |\n| `CFNumberRef` | `NSNumber` |\n| `CFReadStreamRef` | `NSInputStream`\
  \ |\n| `CFSetRef` | `NSSet` |\n| `CFStringRef` | `NSString` |\n| `CFWriteStreamRef`\
  \ | `NSOutputStream` |\n\n借助免费桥接，编译器会在 Core Foundation 和 Foundation 类型之间隐式转换。例如，在清单\
  \ 6-9 中，一个`CFStringRef`类型的变量被用作 Objective-C 方法的参数。\n\n*清单 6-9.* 免费桥接隐式转换\n\n```\n\
  CFStringRef cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n        \
  \                                         kCFStringEncodingASCII);\nNSArray *data\
  \ = [NSArray arrayWithObject:cstr];\n```\n\n`[NSArray arrayWithObject:]`类方法接受一个类型为`id`（即一个\
  \ Objective-C 对象指针）的参数，但传入的是`CFStringRef`。由于`CFStringRef`是一种免费桥接数据类型，`cstr`参数被隐式转换为`NSString`对象（参见表\
  \ 6-1）。为了消除编译器对隐式转换的警告，需要对参数进行显式转换，如清单 6-10 所示。\n\n*清单 6-10.* 免费桥接显式转换\n\n```\n\
  CFStringRef cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n        \
  \                                         kCFStringEncodingASCII);\nNSArray *data\
  \ = [NSArray arrayWithObject:(NSString *)cstr];\n```\n\n如前所述，Objective-C 编译器不会自动管理\
  \ Core Foundation 数据类型的生命周期。因此，要在使用 ARC 内存管理的 Objective-C 程序中使用 Core Foundation\
  \ 免费桥接类型，有必要指明与这些类型相关的所有权语义。实际上，清单 6-10 中的代码，照此编写，在使用 ARC 时是无法编译的！对于使用 ARC 内存管理的\
  \ Objective-C 程序，你必须标明免费桥接类型的生命周期是由 ARC 管理，还是由你通过编程方式管理。你可以通过使用 ARC 桥接转换来实现这一点。\n\
  \n### ARC 桥接转换\n\n\n\n`ARC bridged casts` 使得在使用 ARC 时能够利用免费桥接类型。这些转换操作以特殊的注解 `__bridge`、`__bridge_retained`\
  \ 和 `__bridge_transfer` 为前缀。\n\n*   `__bridge` 注解用于在不转移所有权的情况下，将对象从 Core Foundation\
  \ 数据类型转换为`Foundation`对象（或反之）。换句话说，如果你动态创建一个 Foundation 框架对象，然后将其转换为 Core Foundation\
  \ 类型（通过免费桥接），`__bridge` 注解会告知编译器该对象的生命周期仍由 ARC 管理。反之，如果你创建一个 Core Foundation 数据类型，然后将其转换为\
  \ Foundation 框架对象，`__bridge` 注解会告知编译器该对象的生命周期必须通过编程方式管理（而非由 ARC 管理）。请注意，此注解会消除编译器错误，但不会转移所有权；因此，使用时需要小心，以避免内存泄漏或野指针。\n\
  *   `__bridge_retained` 注解用于将 Foundation 框架对象转换为 Core Foundation 数据类型，并将所有权从 ARC\
  \ 系统转移出去。然后，你需要以编程方式管理桥接数据类型的生命周期。\n*   `__bridge_transfer` 注解用于将 Core Foundation\
  \ 数据类型转换为`Foundation`对象，并将该对象的所有权转移给 ARC 系统。之后，ARC 会以编程方式管理桥接对象的生命周期。\n\n在转换操作中使用桥接转换注解的语法是：\n\
  \n```\n(annotation castType)variableName\n```\n\n这与常规转换操作的不同之处在于，注解被前置在转换类型之前。`ARC\
  \ bridged casts` 不仅可用于免费桥接类型，还可用于 Objective-C 代码需要访问非 Objective-C 对象管理的内存的其他任何地方。`Listing\
  \ 6-11` 用 ARC 桥接转换更新了之前的示例。\n\n`*Listing 6-11.*  `  使用 ARC 桥接转换的免费桥接\n\n```\nCFStringRef\
  \ cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n                  \
  \                               kCFStringEncodingASCII);\nNSArray *data = [NSArray\
  \ arrayWithObject:(__bridge_transfer NSString *)cstr];\n```\n\n注意，注解位于要转换的类型之前。此注解会将桥接对象的所有权转移给\
  \ ARC，后者现在将管理该对象的生命周期。好了，理论够了，现在让我们创建一些示例来演示 ARC 桥接转换的使用！\n\n## 使用 ARC 桥接转换\n\n\
  现在，你将开发一个示例程序，应用你所学的关于免费桥接和 ARC 桥接转换的知识。在 Xcode 中，通过从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg)\
  \ Project ...** 来创建一个新项目。在 New Project Assistant 窗格中，创建一个命令行应用程序（从 Mac OS X Application\
  \ 选择中选择 **Command Line Tool**）并点击 **Next**。在 Project Options 窗口中，为 Product Name\
  \ 指定 **ARC Toll Free Bridging**，为 Project Type 选择 **Foundation**，通过选中 **Use Automatic\
  \ Reference Counting** 复选框来选择 ARC 内存管理，然后点击 **Next**。\n\n在文件系统中指定你想要创建项目的位置（如果需要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
  \n首先，你将创建一个免费桥接的 Core Foundation 数据类型。在导航器窗格中选择 **main.m** 文件，并创建一个`CFStringRef`，如`Listing\
  \ 6-12`所示。\n\n`*Listing 6-12.*  `  一个`main()`函数免费桥接数据类型\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    CFStringRef\
  \ cstr = CFStringCreateWithCString(NULL, \"Hello, World!\",\n                  \
  \                               kCFStringEncodingASCII);\n  }\n  return 0;\n}\n\
  ```\n\n`CFStringRef` 是一个 Core Foundation 数据类型，表示一个 Unicode 字符串。它是一个免费桥接类型，可以转换为\
  \ Foundation 框架的`NSString`对象。为了演示免费桥接的使用，更新代码，如`Listing 6-13`所示。\n\n`*Listing 6-13.*\
  \  `  隐式免费桥接\n\n```\n#import <Foundation/Foundation.h>\n\nint main(int argc, const\
  \ char * argv[])\n{\n  @autoreleasepool\n  {\n    CFStringRef cstr = CFStringCreateWithCString(NULL,\
  \ \"Hello, World!\",\n                                                 kCFStringEncodingASCII);\n\
  \    NSArray *data = [NSArray arrayWithObject:cstr];\n    NSLog(@\"Array size =\
  \ %ld\", [data count]);\n    ...\n}\n```\n\n变量`cstr`的类型为`CFStringRef`，是 Objective-C\
  \ `NSArray`对象的一个参数。从免费桥接的角度来看，这完全没问题，但由于你使用 ARC 内存，代码将无法编译。它会显示一个错误，提示需要桥接转换（参见`Figure\
  \ 6-6`）。\n\n![9781430250500_Fig06-06.jpg](img/9781430250500_Fig06-06.jpg)\n\n`Figure\
  \ 6-6.` 免费桥接编译错误\n\nXcode 弹出的消息建议你使用`__bridge`注解更新代码以进行桥接转换。如果你进行此更新，代码现在可以编译并运行。但是，存在一个潜在的问题。你能猜到是什么吗？好吧，如果你分析此程序（通过从\
  \ Xcode 的 Product 菜单中选择 **Analyze**），`cstr`变量中存储的对象存在潜在的内存泄漏（参见`Figure 6-7`）。\n\n\
  ![9781430250500_Fig06-07.jpg](img/9781430250500_Fig06-07.jpg)\n\n`Figure 6-7.` 桥接转换潜在内存泄漏\n\
  \n出现此问题是因为`__bridge`注解不会转移免费桥接对象的所有权；因此，你的代码必须以编程方式管理`cstr`指向的对象的生命周期。因为你的代码创建了`CFStringRef`，所以它拥有这个动态创建的对象，并且可以向其发送\
  \ release 消息，例如：\n\n```\nCFRelease(cstr);\n```\n\n这将消除潜在的内存泄漏。然而，一个更好的解决方案（可以避免以编程方式管理该对象的生命周期）是使用`__bridge_transfer`注解。这会将对象的所有权转移给\
  \ ARC，然后 ARC 将自动管理该对象的生命周期。\n\n```\nNSArray *data = [NSArray arrayWithObject:(__bridge_transfer\
  \ NSString *)cstr];\n```\n\n如果你在此更改后再次分析程序，则不会检测到内存泄漏。很酷。现在让我们创建另一个示例。这个示例将 Foundation\
  \ 框架对象转换为 Core Foundation 数据类型。添加`Listing 6-14`中所示的代码。\n\n`*Listing 6-14.*  `  隐式免费桥接\n\
  \n```\n// Now cast a Foundation framework object to a Core Foundation type\nNSString\
  \ *greeting = [[NSString alloc] initWithFormat:@\"%@\",\n                      @\"\
  Hello, World!\"];\nCFStringRef cstr1 = (__bridge CFStringRef)(greeting);\nprintf(\"\
  String length = %ld\", CFStringGetLength(cstr1));\n```\n\n\n\n这段代码创建了一个基础框架（Foundation\
  \ Framework）的 `NSString` 实例，并使用 `__bridge` 注解将其转换为 Core Foundation 的 `CFStringRef`。该代码可以编译并运行，但由于执行桥接转换时\
  \ ARC 会立即向 `NSString` 对象（存储在变量 `greeting` 中）发送一条 `release` 消息，因此存在潜在的悬垂指针问题。要解决这个问题，请将转换注解改为\
  \ `__bridge_retained`。这样可以将对象的所有权从 ARC 转移出来，从而阻止 ARC 向该对象发送 `release` 消息。现在，您必须以编程方式管理该对象（已转换为\
  \ `CFStringRef`）的生命周期。在 `printf` 语句之后添加一个 `CFRelease` 函数调用。\n\n```\nCFRelease(cstr1);\n\
  ```\n\n如果您现在分析该程序，将检测不到任何潜在的内存泄漏。当您编译并运行该程序时，将看到如图 6-8 所示的输出。\n\n![9781430250500_Fig06-08.jpg](img/9781430250500_Fig06-08.jpg)\n\
  \n图 6-8. 指向 Core Foundation 类型和 Foundation 框架对象的桥接转换\n\n太棒了！现在您已经很好地掌握了无桥接技术和 ARC\
  \ 桥接转换的使用。请随意尝试其他无桥接类型，以便在 ARC 下熟悉这项技术。\n\n## 总结\n\n本节专家章节探讨了围绕 ARC 内存管理的一些更精细的细节。由于\
  \ ARC 是所有新 Objective-C 项目推荐的内存管理方法，因此充分理解如何使用这项技术至关重要。在本章中，您专注于 ARC 对象所有权、`block`\
  \ 对象和无桥接技术的细节。回顾一下，以下是关键要点：\n\n- ARC 禁止在对象上使用 `release`、`autorelease`、`dealloc`\
  \ 或相关消息的编程方式。当您的代码执行以下任何操作时，即放弃对某个对象的所有权：1) 变量重新赋值，2) `nil` 赋值，或 3) 其所有者被释放。\n-\
  \ 当指向动态创建对象的变量被更改为指向另一个对象时，会发生变量重新赋值。此时，该对象失去一个所有者；在编译时，ARC 会插入代码以向此对象发送一条 `release`\
  \ 消息。\n- 当当前指向动态创建对象的变量的值被设置为 `nil` 时，会发生 `nil` 赋值。此时，该对象失去一个所有者。在编译时，ARC 会插入代码以向此对象发送一条\
  \ release 消息。\n- 所有者释放发生在集合类实例上。当一个集合类实例被释放时，ARC 会自动向集合中的每个对象发送一条 release 消息。\n\
  - Apple 包含众多软件库（即框架和服务），这些库提供了为 OS X 和 iOS 平台编写软件所需的接口。这些库的大多数 API 是用 ANSI C 编写的，因此这些库可以在您的\
  \ Objective-C 程序中使用。基于 C 语言 API 的 Apple 软件库不与 ARC 集成；因此，在使用这些基于 C 语言的 API 动态分配内存时，您的代码负责以编程方式执行内存管理。\n\
  - 使用 ARC 时，禁止在 Objective-C 对象的指针与其他类型（例如属于 Apple 基于 C 语言 API 的类型）的指针之间执行标准转换。Apple\
  \ 提供了多种机制（无桥接技术和 ARC 桥接转换）来促进在 Objective-C 程序中使用基于 C 语言的 API。\n- 无桥接技术适用于 Core Foundation\
  \ 和 Foundation 框架中的多种数据类型，使您的代码能够将相同的数据类型用作 Core Foundation 函数调用的参数或 Objective-C\
  \ 消息的接收者。您可以将一种类型转换为另一种类型以抑制编译器警告。在 ARC 内存管理下，您不能直接转换无桥接类型；它们必须前缀有特殊的 ARC 桥接转换注解。\n\
  - ARC 桥接转换使得在使用 ARC 时可以使用无桥接类型。这些转换操作以特殊注解 `__bridge`、`__bridge_retained` 和 `__bridge_transfer`\
  \ 开头。\n\n好了，第一部分真是一段相当长的旅程！您已经学习了 Objective-C 语言的许多基础知识。请花时间回顾一下您在过去的六章中学到的所有内容，因为扎实掌握这些材料是精通\
  \ Objective-C 编程的关键。接下来是第二部分，您将探索 Objective-C 运行时。当您准备好时，请翻页，让我们开始吧！\n\n# 第 7 章：运行时系统\n\
  \nObjective-C 拥有大量的*动态特性*，这些特性和行为是在运行时执行的，而不是在代码编译或链接时。这些特性由 Objective-C 运行时系统实现，并为该语言提供了许多强大和灵活性。它们可用于促进程序的实时开发和更新，无需重新编译和重新部署软件，并且随着时间的推移，对现有软件的影响极小或没有影响。\n\
  \n理解 Objective-C 运行时的工作原理将帮助您更深入地了解这门语言以及您的程序是如何运行的。在本章中，您将详细探讨该语言的动态特性，并演示如何在程序中使用它们。\n\
  \n## 动态特性\n\n\n\n# 排版后的内容\n\n在运行时，Objective-C 语言会执行许多常见行为——如类型确定和方法解析——这些行为在其他语言中（如果支持的话）通常是在程序编译或链接期间完成的。它还提供了\
  \ API，使您能够执行其他运行时操作，例如对象内省以及代码的动态创建和加载。这些特性是通过 Objective-C 运行时的架构和实现而实现的。在接下来的几个小节中，您将更详细地研究这些特性，并了解如何在您的程序中使用它们。\n\
  \n## 对象消息传递\n\n在面向对象编程术语中，*消息传递*是一种用于在对象之间发送和接收消息的通信方式。Objective-C 的消息传递（例如，对象消息传递）用于调用类和类实例（即对象）上的方法。图\
  \ 7-1 中的示例展示了向对象/类发送消息的语法。\n\n![9781430250500_Fig07-01.jpg](img/9781430250500_Fig07-01.jpg)\n\
  \n图 7-1. Objective-C 消息传递\n\n在图 7-1 所示的消息传递表达式中，*接收者*（adder）是消息的目标（即对象或类），而消息本身（`addend1:25\
  \ addend2:10`）由*选择器*以及任何相应的输入参数组成。\n\n对象消息传递是作为一种动态特性实现的——消息接收者的实际类型以及要在接收者上调用的相应方法是在运行时确定的（参见图\
  \ 7-2）。\n\n![9781430250500_Fig07-02.jpg](img/9781430250500_Fig07-02.jpg)\n\n图 7-2.\
  \ Objective-C 对象消息传递\n\n图 7-2 描述了 Objective-C 运行时如何通过动态类型和动态绑定来实现消息到方法调用的映射，您稍后将仔细研究这两者。对象消息传递凭借其动态编程特性提供了极大的灵活性。除了简化编程接口之外，这些能力还使得开发可在程序执行期间进行修改和/或更新的模块化应用程序成为可能。\n\
  \n由于 Objective-C 方法调用是在运行时解析的，因此动态绑定会带来一定的开销。Objective-C 运行时系统会缓存方法调用——将消息到方法的关联保存在内存中——以减少这种开销。\n\
  \n方法调用在运行时解析的另一个后果是，不能保证接收者能够响应消息。如果无法响应，则会引发运行时异常。Objective-C 语言提供了几个特性（例如，对象内省和消息转发），可用于缓解这种情况。\n\
  \n总结如下，以下是 Objective-C 对象消息传递的关键要素：\n\n*   *消息*：一个名称（选择器）和一组发送给对象/类的参数。\n*   *方法*：一个\
  \ Objective-C 类或实例方法，它具有特定的声明，包括名称、输入参数、返回值和方法签名（输入参数和返回值的数据类型）。\n*   *方法绑定*：接收发送给特定接收者的消息、查找并执行相应方法的过程。Objective-C\
  \ 运行时对消息到方法调用执行动态绑定。\n\n您可能对方法、接收者和消息已经相当熟悉了，因为您已在本书中反复讨论过这些术语，但选择器和方法签名呢？让我们在接下来的段落中探讨这些内容。\n\
  \n## 选择器\n\n在 Objective-C 对象消息传递中，*选择器*是一个引用方法的文本字符串，可以发送给一个对象或一个类。Objective-C 运行时使用选择器来为目标对象/类检索正确的方法实现。选择器表示为一个分段文本字符串，每个段落的末尾带有一个冒号，该冒号后跟一个参数：\n\
  \n```\nnameSegment1:nameSegment2:nameSegment3:\n```\n\n这个选择器有三个段落，每个段落后跟一个冒号，这表明相应的消息有三个输入参数。消息的参数数量与其选择器中的段落数量相对应。如果消息没有参数，则选择器有一个段落但不带冒号。代码清单\
  \ 7-1 展示了一些有效选择器的示例。\n\n*代码清单 7-1.*  有效的选择器示例\n\n```\ndescription\ndescription:\n\
  setValue:\nsumAddend1:addend2:\nsumAddend1::\n```\n\n在 Objective-C 源代码中，消息选择器直接映射到一个或多个类/实例方法声明。代码清单\
  \ 7-2 展示了一个包含单个实例方法声明的类接口。\n\n*代码清单 7-2.*  计算器类接口\n\n```\n@interface Calculator\
  \ : NSObject\n- (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n@end\n```\n\
  \n代码清单 7-2 中所示的`Calculator`类实例方法的选择器是`sumAddend1:addend2:`。如果一个`Calculator`对象被实例化并赋值给一个名为`myCalculator`的变量，则使用接收者对象（`myCalculator`）后跟带有所需输入参数的选择器来调用此实例方法，例如：\n\
  \n```\n[myCalculator sumAddend1:25 addend2:10];\n```\n\n好了，这一切都很好。这些示例展示了选择器在对象消息传递中的作用，但您可能仍然想知道这一切是如何运作的。您可能猜到了：Objective-C\
  \ 运行时！当您的源代码被编译时，编译器（运行时的一个组件）会创建支持接收者类/对象和消息选择器到方法实现的动态映射的数据结构和函数调用。当您的代码被执行时，运行时库（运行时的另一个组件）会利用这些信息来查找并调用相应的方法。在本章后面，您将详细了解\
  \ Objective-C 运行时的组件。\n\n## 空选择器段\n\n如果您在上一个小节中真正留意了，您可能会注意到代码清单 7-1 中的一个选择器看起来与其他选择器略有不同；那就是示例`sumAddend1::`。对于这个选择器，第一个名称段有一个文本字符串（`sumAddend1`），但第二个名称段却没有！实际上，具有多个参数的方法声明可以有空参数名称；因此，具有多个段的选择器可以包含*空选择器段*（即没有名称的段）。代码清单\
  \ 7-3 扩展了`Calculator`类接口，添加了一个包含空段的实例方法。\n\n*代码清单 7-3.*  带有空选择器段的实例方法\n\n```\n@interface\
  \ Calculator : NSObject\n- (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n\
  - (int) sumAddend1:(NSInteger)a1 :(NSInteger)a2;\n@end\n```\n\n可以使用以下表达式调用此实例方法：\n\
  \n```\n[myCalculator sumAddend1:25 :10]\n```\n\n\n\n与任何消息传递表达式一样，每个选择器名称段后面都跟着一个参数。在包含一个或多个空段的选择器中，名称段虽然不提供，但参数仍然必须存在，因此前面的示例中出现了消息\
  \ `sumAddend1:25 :10`。通常情况下，你不会看到很多带空参数名（即空选择器段）的方法声明，因为用于调用此类方法的对象消息中的一个拼写错误，很容易导致难以调试的错误。\n\
  \n## SEL 类型\n\n到目前为止，你将选择器定义为消息传递表达式中消息的一部分文本字符串；现在，你将深入了解选择器类型。*选择器类型*（`SEL`）是一种特殊的\
  \ Objective-C 类型，它表示一个唯一标识符，在源代码编译时会替换选择器的值。所有具有相同选择器值的方法都拥有相同的 `SEL` 标识符。Objective-C\
  \ 运行时系统确保每个选择器标识符都是唯一的。可以使用 `@selector` 关键字创建 `SEL` 类型的变量。\n\n```\nSEL myMethod\
  \ = @selector(myMethod);\n```\n\n那么，为什么要创建 `SEL` 变量呢？实际上，Objective-C 运行时系统（通过 `NSObject`）包含许多方法，这些方法将\
  \ `SEL` 类型的变量作为参数用于动态方法。除了获取对象和类的信息外，`NSObject` 还提供了几种方法，用于通过选择器参数调用对象上的方法。下面的示例使用了\
  \ `NSObject` 实例方法 `performSelector:withObject:withObject:` 来调用由选择器变量指定的方法。\n\n```\n\
  [myCalculator performSelector:@selector(sumAddend1::) withObject:[NSNumber numberWithInteger:25]\n\
  \                         withObject:[NSNumber numberWithInteger:10]];\n```\n\n\
  `@selector` 指令会在编译时创建一个选择器变量。你也可以在运行时使用 Foundation 框架中的 `NSSelectorFromString` 函数创建选择器。在这种情况下，前面的示例更新如下：\n\
  \n```\n SEL selector = NSSelectorFromString(@\"sumAddend1::\");\n [myCalculator\
  \ performSelector:selector withObject:[NSNumber numberWithInteger:25]\n        \
  \                 withObject:[NSNumber numberWithInteger:10]];\n```\n\n## 方法签名\n\
  \n现在你已经了解了消息接收者、选择器和 `SEL` 类型，接下来让我们看看方法签名及其在对象消息传递中的作用。*方法签名*定义了方法输入参数的数据类型及其返回结果（如果有）。你可能会想：好吧，这都挺好，但这对向对象发送消息有什么重要性呢？要理解这一点，我们花点时间讨论一下运行时系统实现对象消息传递的一些内部机制。\n\
  \n**注意** 在下一章中，你将深入研究运行时系统的细节，以及其动态行为（如对象消息传递）是如何实现的。在本章中，你将重点放在运行时系统架构上，而不是其实现细节上。\n\
  \n编译器将形式为 `[receiver message]` 的对象消息转换为一个（ANSI）C 函数调用，该调用的声明包含方法签名。因此，为了生成正确的对象消息传递代码，编译器需要知道选择器值和方法签名。选择器很容易从对象消息表达式中提取出来，但编译器如何确定方法签名呢？毕竟，消息可能包含输入参数，但除非在运行时确定接收者（以及相应的方法），否则你无法知道这些类型如何映射到实际要调用的方法。好吧，为了确定正确的方法签名，编译器会根据其迄今解析过的声明中能看到的方法进行猜测。如果找不到，或者它看到的声明与实际在运行时执行的方法之间存在不匹配，则可能发生方法签名不匹配，从而导致从编译器警告到运行时错误的各种问题。\n\
  \n为了演示可能导致方法签名不匹配的场景，假设你的程序使用了三个类，其接口如清单 7-4 所示。\n\n*清单 7-4.* 计算器类方法\n\n```\n@interface\
  \ Calculator1 : NSObject\n- (int) sumAddend1:(NSInteger)a1 addend2:(NSInteger)a2;\n\
  @end\n\n@interface Calculator2 : NSObject\n- (float) sumAddend1:(float)a1 addend2:(float)a2;\n\
  @end\n\n@interface Calculator3 : NSObject\n- (NSInteger) sumAddend1:(NSInteger)a1\
  \ addend2:(NSInteger)a2;\n@end\n```\n\n那么，当你的代码发送消息 `[receiver sumAddend1:25 addend2:10]`，而接收者的类型是\
  \ `id` 时，会发生什么？根据你的代码导入的接口以及接收者的运行时类型（使用清单 7-4，接收者可以是 `Calculator1`、`Calculator2`\
  \ 或 `Calculator3` 类型），可能会发生方法签名不匹配。这种情况会导致各种错误，例如堆栈溢出、无效的方法输入或无效的返回结果。\n\n这个例子说明了方法签名不匹配的危险性。为了避免这种情况，最好尽量确保具有不同签名的方法也具有不同的名称。\n\
  \n## 使用对象消息传递\n\n现在，你将创建一个示例程序来说明选择器和 `SEL` 类型的使用。在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建**\
  \ ![image](img/arrow.jpg) **项目...** 来创建一个新项目。在 **新建项目助手** 窗格中，创建一个命令行应用程序（从 OS X\
  \ 应用程序选择中选择 **命令行工具**），然后点击 **下一步**。在 **项目选项** 窗口中，将产品名称指定为 **Calculator**，将项目类型选择为\
  \ **Foundation**，通过勾选 **使用自动引用计数** 复选框选择 ARC 内存管理，然后点击 **下一步**。\n\n在文件系统中指定项目创建的位置（如果需要，选择\
  \ **新建文件夹** 并输入文件夹的名称和位置），取消勾选 **源代码控制** 复选框，然后点击 **创建** 按钮。\n\n接下来，你将创建一个 `Calculator`\
  \ 类。将类添加到项目中。从 Xcode 文件菜单中选择 **新建** ![image](img/arrow.jpg) **文件...**，选择 **Objective-C**\
  \ 类模板，将类命名为 **Calculator**（在“子类化自”下拉列表中，选择 **NSObject**），选择 **Calculator** 文件夹作为文件位置，选择\
  \ **Calculator** 项目作为目标，然后点击 **创建** 按钮。\n\n至此，你已经完成了程序文件的创建，现在开始实现代码。在导航器窗格中选择 **Calculator.h**\
  \ 文件，然后添加如清单 7-5 所示的代码。\n\n*清单 7-5.* Calculator 类接口\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Calculator : NSObject\n```\n\n\n```objc\n- (NSNumber *) sumAddend1:(NSNumber\
  \ *)adder1 addend2:(NSNumber *)adder2;\n- (NSNumber *) sumAddend1:(NSNumber *)adder1\
  \ :(NSNumber *)adder2;\n\n@end\n```\n\n`Calculator` 类添加了两个实例方法：`sumAddend1:addend2:`\
  \ 和 `sumAddend1::`。每个方法都接受两个类型为 `NSNumber *` 的输入参数，并返回一个 `NSNumber *` 类型的值。另请注意，第二个方法的第二个参数使用空参数名。现在选择\
  \ `Calculator.m` 文件并实现 `Calculator` 类，如代码清单 7-6 所示。\n\n*代码清单 7-6.* Calculator 类的实现\n\
  \n```objc\n#import \"Calculator.h\"\n\n@implementation Calculator\n\n- (NSNumber\
  \ *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2\n{\n  NSLog(@\"Invoking\
  \ method on %@ object with selector %@\", [self className],\n        NSStringFromSelector(_cmd));\n\
  \  return [NSNumber numberWithInteger:([adder1 integerValue] +\n               \
  \                       [adder2 integerValue])];\n}\n\n- (NSNumber *) sumAddend1:(NSNumber\
  \ *)adder1 :(NSNumber *)adder2\n{\n  NSLog(@\"Invoking method on %@ object with\
  \ selector %@\", [self className],\n        NSStringFromSelector(_cmd));\n  return\
  \ [NSNumber numberWithInteger:([adder1 integerValue] +\n                       \
  \               [adder2 integerValue])];\n}\n\n@end\n```\n\n每个方法都简单返回两个输入参数之和。这些方法还会在控制台记录（接收器）对象的类名和一个选择器文本字符串。此字符串通过使用\
  \ Foundation 函数 `NSStringFromSelector` 获得。\n\n```\nNSStringFromSelector(_cmd)\n\
  ```\n\n该函数的输入参数是一个 `SEL` 类型的变量。那么这个 `_cmd` 参数是什么，它从何而来？实际上，`_cmd` 是一个隐式参数（在每个 Objective-C\
  \ 方法的实现中可用，但未在其接口中声明），它保存了正在发送的消息的选择器。因此，表达式 `NSStringFromSelector(_cmd)` 会返回正在调用的方法的选择器文本字符串。\n\
  \n你已经实现了 `Calculator` 类，现在让我们实现 `main()` 函数。在导航窗格中选择 `main.m` 文件，然后更新 `main()` 函数，如代码清单\
  \ 7-7 所示。\n\n*代码清单 7-7.* Calculator 的 `main()` 函数实现\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import \"Calculator.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    Calculator *calc = [[Calculator alloc] init];\n    NSNumber *addend1 =\
  \ [NSNumber numberWithInteger:25];\n    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n\
  \    NSNumber *addend3 = [NSNumber numberWithInteger:15];\n    NSLog(@\"Sum of %@\
  \ + %@ = %@\", addend1, addend2,\n          [calc sumAddend1:addend1 addend2:addend2]);\n\
  \    NSLog(@\"Sum of %@ + %@ = %@\", addend1, addend3,\n          [calc sumAddend1:addend1\
  \ :addend3]);\n  }\n  return 0;\n}\n```\n\n`main()` 函数创建一个 `Calculator` 对象并使用它对两个数字进行加法运算，然后将结果记录到输出窗格。当你编译并运行程序时，输出应如图\
  \ 7-3 所示。\n\n![9781430250500_Fig07-03.jpg](img/9781430250500_Fig07-03.jpg)\n\n图\
  \ 7-3. Calculator 程序\n\n现在让我们添加代码，在对象上调用动态方法。你将使用 `NSObject` 的实例方法 `performSelector:withObject:withObject:`，它需要一个选择器输入参数。更新\
  \ `main()` 函数，如代码清单 7-8 所示。\n\n*代码清单 7-8.* 使用 `performSelector:` 方法的 `main()` 函数\n\
  \n```objc\n#import <Foundation/Foundation.h>\n#import \"Calculator.h\"\n\nint main(int\
  \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    Calculator *calc =\
  \ [[Calculator alloc] init];\n    NSNumber *addend1 = [NSNumber numberWithInteger:25];\n\
  \    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n    NSNumber *addend3\
  \ = [NSNumber numberWithInteger:15];\n\n    SEL selector1 = @selector(sumAddend1:addend2:);\n\
  \    id sum1 = [calc performSelector:selector1 withObject:addend1\n            \
  \   withObject:addend2];\n    NSLog(@\"Sum of %@ + %@ = %@\", addend1, addend2,\
  \ sum1);\n\n    SEL selector2 = NSSelectorFromString(@\"sumAddend1::\");\n    id\
  \ sum2 = [calc performSelector:selector2 withObject:addend1\n               withObject:addend3];\n\
  \    NSLog(@\"Sum of %@ + %@ = %@\", addend1, addend3, sum2);\n  }\n  return 0;\n\
  }\n```\n\n代码为每个实例方法创建一个选择器，然后使用 `NSObject performSelector:withObject:withObject:`\
  \ 方法计算两个数字的和。第一个选择器使用 `@selector` 指令创建，因此在编译时创建。第二个选择器在运行时使用 Foundation 函数 `NSSelectorFromString`\
  \ 创建。方法调用的结果被记录到输出窗格。好的，这看起来一切正常——但等一下，现在编译程序时，你会在 `main()` 函数中看到几个警告（参见图 7-4）。\n\
  \n![9781430250500_Fig07-04.jpg](img/9781430250500_Fig07-04.jpg)\n\n图 7-4. Calculator\
  \ 程序选择器警告\n\n此警告 *PerformSelector may cause a leak because its selector is unknown*（PerformSelector\
  \ 可能导致泄漏，因为其选择器未知）的产生原因是：如果找不到与选择器匹配的方法，该方法将抛出异常，可能导致内存泄漏。你可以通过向代码添加 pragma 指令来消除此警告（在代码清单\
  \ 7-9 中以粗体显示）。\n\n*代码清单 7-9.* 用于处理 `performSelector:` 警告的 Pragma 指令\n\n```objc\n\
  #pragma clang diagnostic push\n#pragma clang diagnostic ignored \"-Warc-performSelector-leaks\"\
  \n    SEL selector1 = @selector(sumAddend1:addend2:);\n    id sum1 = [calc performSelector:selector1\
  \ withObject:addend1\n               withObject:addend2];\n    NSLog(@\"Sum of %@\
  \ + %@ = %@\", addend1, addend2, sum1);\n\n    SEL selector2 = NSSelectorFromString(@\"\
  sumAddend1::\");\n    id sum2 = [calc performSelector:selector2 withObject:addend1\n\
  \               withObject:addend3];\n    NSLog(@\"Sum of %@ + %@ = %@\", addend1,\
  \ addend3, sum2);\n#pragma clang diagnostic pop\n```\n\npragma 指令 `clang diagnostic\
  \ ignored` 用于禁用特定的编译器警告。该指令的语法为：\n\n```\n#pragma clang diagnostic ignored \"DiagnosticName\"\
  \n```\n\n诊断名称用双引号括起来。在此例中，诊断 `-Warc-performSelector-leaks` 禁用了在调用 `performSelector:withObject:withObject:`\
  \ 方法时可能发生内存泄漏的编译器警告。`pragma clang diagnostic push` 和 `pragma clang diagnostic pop`\
  \ 指令用于保存和恢复当前的编译器诊断设置。这确保了编译器在编译源文件的其余部分时，会继续使用其常规编译选项。现在编译并运行程序时，你应该会看到预期的输出，且没有编译器警告（参见图\
  \ 7-5）。\n\n![9781430250500_Fig07-05.jpg](img/9781430250500_Fig07-05.jpg)\n\n图 7-5.\
  \ 使用 `performSelector` 的 Calculator 程序\n\n干得好。既然你已经详细了解了对象消息传递、选择器和方法签名，接下来让我们研究运行时的其他动态特性。\n\
  \n## 动态类型\n\n\n## 动态类型\n\n`动态类型`使得运行时能够在执行期间确定对象的类型，从而让运行时因素决定代码中应使用何种对象。当无法预先确定需要赋值给变量的对象类型时（例如向方法传递参数），这一特性尤为有用。Objective-C\
  \ 同时支持静态类型和动态类型。当变量被静态类型化时，其类型在变量声明时即被指定。例如，以下声明语句表明变量 `myAtom` 是一个指向 `Atom` 类型对象的指针。\n\
  \n```\nAtom *myAtom;\n```\n\n采用静态类型时，编译器可在编译时执行类型检查，从而在程序执行前检测类型错误。而采用动态类型时，类型检查则在运行时执行。Objective-C\
  \ 通过 `id` 数据类型为动态类型提供支持。`id` 类型是 Objective-C 特有的类型，它可以容纳指向任意类型 Objective-C 对象的指针，无论该对象属于哪个类。以下声明语句表明变量\
  \ `myAtom` 是一个指向 `id` 类型对象的指针。\n\n```\nid *myAtom;\n```\n\n因此，变量 `myAtom` 实际上可以指向\
  \ `Atom`、`Hydrogen` 等类型的对象——变量的实际类型在运行时决定。动态类型允许在运行时确定对象之间的关联关系，而不是强制将其编码在静态设计中。这使得编写一个能处理任意类对象的单一方法变得更加容易，而无需为应用程序中的每个类分别编写不同的方法。例如，以下实例方法声明使用了动态类型，从而使得单个输入参数可以是来自任意类的对象。\n\
  \n```\n- (NSInteger) computeValue:(id)parameter;\n```\n\n动态类型可用于简化类接口，因为无需为每种可能的输入参数类型创建不同的方法声明。动态类型还赋予了更大的灵活性，因为程序使用的类型可以在执行过程中演变，并且可以在无需重新编译或重新部署的情况下引入新类型。由于\
  \ Objective-C 同时支持静态类型和动态类型，你可以为方法声明提供不同层次的类型信息；例如，修改前面的方法声明以指定输入参数可以是符合 `NSDecimalNumberBehaviors`\
  \ 协议的任意类型的对象。\n\n```\n- (NSInteger) computeValue:(id<NSDecimalNumberBehaviors>)parameter;\n\
  ```\n\n接下来，修改方法声明以指定输入参数是一个指向 `NSNumber` 类型对象的指针。\n\n```\n- (NSInteger) computeValue:(NSNumber\
  \ *)parameter;\n```\n\n最后，进一步优化方法声明，指定输入参数是一个指向符合 `NSDecimalNumberBehaviors` 协议的\
  \ `NSNumber` 类型对象的指针。\n\n```\n- (NSInteger) computeValue:(NSNumber<NSDecimalNumberBehaviors>\
  \ *)parameter;\n```\n\nObjective-C 还提供了运行时对象自省（例如，询问一个动态类型化、匿名的对象其所属类）的 API，以部分弥补静态类型检查的缺失。自省使运行时能够验证对象的类型，从而确认其是否适用于特定操作。你将在本章后面学习对象自省的相关内容。\n\
  \n### 动态绑定\n\n`动态绑定`是在运行时（而非编译时）将消息映射到方法的过程。实际上，消息和接收消息的对象直到程序运行并发送消息时才能确定。由于相同的方法可能被多个（接收者）对象实现，因此实际调用的方法可以动态变化。动态绑定因此实现了面向对象编程的多态性。动态绑定允许新对象和代码与系统接口或添加到系统中，而不会影响现有代码，从而降低了对象间的耦合度。它还通过消除处理多选场景（通常使用\
  \ `switch` 语句实现）的条件逻辑需求，降低了程序复杂度。动态绑定意味着需要使用动态类型。在以下代码片段中，类型为 `id` 的变量 `atom` 被发送了\
  \ `logInfo` 消息。\n\n```\nid atom = [[Hydrogen alloc] initWithNeutrons:1];\n[atom\
  \ logInfo];\n```\n\n当这段代码执行时，运行时通过动态类型确定变量 `atom` 的实际类型，然后使用消息选择器（`logInfo`）将消息映射到接收者对象\
  \ `atom` 的对应实例方法实现。在此例中，变量 `atom` 解析为类型 `Hydrogen *`，因此运行时查找 `Hydrogen` 的实例方法 `logInfo`。如果未找到，则在其超类中查找对应的实例方法。运行时继续在类层次结构中搜索，直到找到该实例方法（参见图\
  \ 7-6）。\n\n![9781430250500_Fig07-06.jpg](img/9781430250500_Fig07-06.jpg)\n\n图 7-6。\
  \ Objective-C 动态绑定\n\n动态绑定是 Objective-C 的固有特性，无需任何特殊 API。动态绑定甚至允许发送的消息（消息*选择器*）是一个在运行时确定的变量。\n\
  \n### 动态方法解析\n\n`动态方法解析`使你能够动态提供方法的实现。Objective-C 包含 `@dynamic` 指令，用于告知编译器与属性相关联的方法将动态提供。Apple\
  \ Core Data 框架利用 `@dynamic` 指令为托管对象类生成高效的属性访问方法和关系访问方法。\n\n`NSObject` 类包含了 `resolveInstanceMethod:`\
  \ 和 `resolveClassMethod:` 方法，分别用于动态地为实例方法和类方法提供给定选择器的实现。你可以重写其中一个或两个方法，以动态实现实例/类方法。在下一节中，你将通过编写代码动态解析方法选择器的实现，学习如何使用这些方法。\n\
  \n### 动态提供方法实现\n\n现在，你将通过更新 Calculator 程序来动态提供方法的实现，以此演示动态方法解析。启动 Xcode（如果尚未启动），然后从\
  \ Xcode 的文件菜单中选择 **Open Recent** ![image](img/arrow.jpg) **Calculator.xcodeproj**\
  \ 打开 Calculator 项目。首先，更新 `Calculator` 类的实现。在导航器窗格中选择 `Calculator.m` 文件，然后通过重写 `resolveInstanceMethod:`\
  \ 类方法更新 `Calculator` 实现，如代码清单 7-10 所示。\n\n*代码清单 7-10.* Calculator 类动态方法\n\n```\n\
  #import <objc/runtime.h>\n...\n+ (BOOL) resolveInstanceMethod:(SEL)aSEL\n{\n  NSString\
  \ *method = NSStringFromSelector(aSEL);\n\nif ([method hasPrefix:@\"absoluteValue\"\
  ])\n  {\n    class_addMethod([self class], aSEL, (IMP)absoluteValue, \"@@:@\");\n\
  \    NSLog(@\"已动态添加实例方法 %@ 到类 %@\", method,\n          [self className]);\n    return\
  \ YES;\n  }\n  return [super resolveInstanceMethod:aSEL];\n}\n```\n\n\n\n在表 7-10\
  \ 中，运行时库的导入指令被添加到类实现中（`#import <objc/runtime.h>`）；这会将运行时系统 API 添加到你的代码中。在`resolveInstanceMethod:`类方法中，运行时\
  \ API`class_addMethod()`用于将函数作为实例方法动态添加到类中。该函数接收以下输入参数：要添加方法的类、新方法的`selector`、函数的地址，以及描述方法参数类型的一个字符数组。从表\
  \ 7-10 中可以看出，作为实例方法添加的函数被称为`absoluteValue`；它接收`id`作为输入参数，并返回`id`作为结果。现在，将`absoluteValue()`函数添加到`Calculator`类实现中。请添加表\
  \ 7-11 中所示的代码。\n\n*表 7-11.* `Calculator`类动态方法\n\n```\nid absoluteValue(id self,\
  \ SEL _cmd, id value)\n{\n  NSInteger intVal = [value integerValue];\n  if (intVal\
  \ < 0)\n  {\n    return [NSNumber numberWithInteger:(intVal * -1)];\n  }\n  return\
  \ value;\n}\n```\n\n注意，函数的输入参数包含隐式参数`self`和`_cmd`；`self`是接收方对象，`_cmd`是该方法的`selector`。\n\
  \n现在更新`main()`函数以测试动态方法解析。从导航面板中选择 **main.m** 文件，并更新函数，如表 7-12 所示。\n\n*表 7-12.*\
  \ 带有动态方法的`Calculator`类`main()`函数\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ \"Calculator.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    Calculator *calc = [[Calculator alloc] init];\n    NSNumber *addend1 =\
  \ [NSNumber numberWithInteger:-25];\n    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n\
  \    NSNumber *addend3 = [NSNumber numberWithInteger:15];\n\n#pragma clang diagnostic\
  \ push\n#pragma clang diagnostic ignored \"-Warc-performSelector-leaks\"\n    SEL\
  \ selector1 = @selector(sumAddend1:addend2:);\n    id sum1 = [calc performSelector:selector1\
  \ withObject:addend1\n               withObject:addend2];\n    NSLog(@\"Sum of %@\
  \ + %@ = %@\", addend1, addend2, sum1);\n\nSEL selector2 = NSSelectorFromString(@\"\
  sumAddend1::\");\n    id sum2 = [calc performSelector:selector2 withObject:addend1\n\
  \               withObject:addend3];\n    NSLog(@\"Sum of %@ + %@ = %@\", addend1,\
  \ addend3, sum2);\n\nSEL selector3 = NSSelectorFromString(@\"absoluteValue:\");\n\
  \    NSLog(@\"Invoking instance method %@ on object of class %@\",\n          NSStringFromSelector(selector3),\
  \ [calc className]);\n    id sum3 = [calc performSelector:selector3 withObject:sum2];\n\
  \    NSLog(@\"Absolute value of %@ = %@\", sum2, sum3);\n#pragma clang diagnostic\
  \ pop\n  }\n  return 0;\n}\n```\n\n该代码动态地创建了新方法的`selector`，然后使用该`selector`调用实例方法。动态解析会将方法添加到运行时并调用它，返回其结果。结果随后会显示在输出面板中。现在，保存、编译并运行更新后的`Calculator`程序，并观察输出面板中的消息（参见图\
  \ 7-7）。\n\n![9781430250500_Fig07-07.jpg](img/9781430250500_Fig07-07.jpg)\n\n图 7-7\
  \ Objective-C 动态方法解析\n\n正如你在输出面板中观察到的，当使用`selector` `absoluteValue:`的消息通过`performSelector:withObject:`方法被动态调用时，新方法`absoluteValue:`由\
  \ Objective-C 运行时添加到了`Calculator`类中。如本例所示，动态方法解析可用于在运行时向类添加方法。\n\n### 动态加载\n\n*动态加载*使得\
  \ Objective-C 程序能够在需要时加载可执行代码和资源，而不是在应用程序启动时加载所有程序组件。可执行代码（在加载前已链接）可以包含新类，这些新类会集成到程序的运行时映像中。这种程序代码和资源的*懒加载*通过对系统提出更低的内存需求，改善了整体性能。同时这也增强了程序的可扩展性，因为可以在不修改现有程序的情况下动态添加新软件。Apple\
  \ 提供了`bundle`机制来支持 iOS 和 OS X 平台上的软件动态加载。\n\n`bundle`是一种软件交付机制。它由一个具有标准化层级结构的目录组成，其中包含可执行代码以及该代码使用的资源。一个`bundle`可以包含可执行代码、图片、声音文件或任何其他类型的代码或资源。它还包括一个名为信息属性列表（`Info.plist`）的运行时配置文件。`bundle`定义了组织与软件相关的代码和资源的基本结构；它们有几种类型：\n\
  \n*   *应用程序`bundle`*：应用程序`bundle`管理与进程（例如，一个程序）相关的代码和资源。\n*   *框架`bundle`*：框架`bundle`管理动态共享库及其相关资源，例如头文件。应用程序可以链接一个或多个框架，例如`Foundation`框架。\n\
  *   *可加载`bundle`*：可加载`bundle`（也称为插件）是一种`bundle`类型，应用程序可以使用它动态加载自定义代码。\n\n`Foundation`框架的`NSBundle`类可用于管理`bundle`。一个`NSBundle`对象代表文件系统中一个对可在程序中使用的代码和资源进行分组的路径。表\
  \ 7-13 使用`NSBundle`对象动态加载应用程序信息属性列表的路径，该列表名为`Info.plist`。\n\n*表 7-13.* 动态加载属性列表文件\n\
  \n```\nNSBundle *bundle = [NSBundle mainBundle];\nNSString *bundlePath = [bundle\
  \ pathForResource:@\"Info\" ofType:@\"plist\"];\n```\n\n如前所述，`bundle`可用于动态加载可执行代码。表\
  \ 7-14 使用`NSBundle`对象动态加载一个框架`bundle`，然后创建该框架中一个类的实例。\n\n*表 7-14.* 动态加载框架对象\n\n\
  ```\nNSBundle *testBundle = [NSBundle bundleWithPath:@\"/Test.bundle\"];\nid tester\
  \ = [[[bundle classNamed:@\"Tester\"] alloc] init];\n```\n\n## 内省\n\n`Foundation`框架的`NSObject`\
  \ API 中包含许多用于执行对象内省的方法。这些方法会动态查询运行时，以获取以下类型的信息：\n\n*   方法相关信息\n*   测试对象的继承关系、行为及协议一致性\n\
  \n由于 Objective-C 将其许多行为推迟到运行时（而不是编译或链接时）处理，因此对象内省是一项关键能力，可以帮助你避免运行时错误，例如消息分发错误、对对象相等性的错误假设以及其他问题。\n\
  \n下面这条语句使用`NSObject isKindOfClass:`方法测试消息的接收者是否是`Calculator`类的实例，或是继承自`Calculator`类的任何类的实例。\n\
  \n```\nBOOL isCalculator = [myObject isKindOfClass: [Calculator class]];\n```\n\n\
  下一条语句检查一个对象是否能响应某个`selector`；也就是说，它是否实现或继承了能够响应指定消息的方法。\n\n```\nBOOL responds =\
  \ [myObject respondsToSelector:@selector(sumAddend1::)];\n```\n\n下一条语句检查一个对象是否符合给定的协议。\n\
  \n```\nBOOL conforms = [myObject conformsToProtocol:@protocol(MyProtocol)];\n```\n\
  \n\n\n以下语句用于获取某个选择器的方法签名。\n\n```\nNSMethodSignature *signature = [myObject methodSignatureForSelector:@selector(sumAddend1::)];\n\
  ```\n\n这只是用于执行对象内省的 `NSObject` 方法的一个示例。在本书的第 3 部分，你将更详细地了解 `NSObject` API。\n\n###\
  \ 小结\n\n在本章中，你详细研究了 Objective-C 运行时的特性，并回顾了运行时系统架构的关键组件。以下是关键要点总结：\n\n- Objective-C\
  \ 消息传递（例如，对象消息传递）用于在类和对象上调用方法。对象消息传递是一种动态特性——消息接收者的实际类型以及在接收者上调用的相应方法是在运行时确定的。\n\
  - 消息传递表达式由接收者（消息的目标对象/类）和消息本身组成。消息由选择器以及所有相应的输入参数组成。\n- 选择器表示为被分割成多个段的文本字符串，每个段末尾紧跟一个冒号，表示该段后跟有一个参数。具有多个段的选择器可以有空的选择器段（即没有名称的段）。\n\
  - 选择器类型 (`SEL`) 是一种特殊的 Objective-C 类型，它表示一个唯一标识符，在源代码编译时会替换选择器的值。可以使用 `@selector`\
  \ 关键字或 Foundation 框架函数 `NSSelectorFromString()` 创建 `SEL` 类型的变量。\n- 方法签名定义了方法输入参数的数据类型及其返回结果（如果有）。方法签名不匹配——当编译器无法确定对象消息的适当方法，或者其看到的声明与运行时实际执行的方法之间存在不匹配时——可能导致从编译器警告到运行时错误等各种问题。为避免这种情况，最好尽量确保具有不同签名的方法也具有不同的名称。\n\
  - 动态类型使运行时能在运行时确定对象的类型，从而允许运行时因素决定代码中应使用哪种类型的对象。Objective-C 通过 `id` 数据类型提供对动态类型的支持。\n\
  - 动态绑定是在运行时（而非编译时）将消息映射到方法的过程。动态绑定实现了面向对象编程的多态性，并允许在不影响现有代码的情况下与系统交互或向系统添加新对象和代码，从而降低对象之间的耦合度。\n\
  - 动态方法解析允许你动态提供方法的实现。Objective-C 包含 `@dynamic` 指令，该指令告知编译器与属性关联的方法将动态提供。`NSObject`\
  \ 类包含方法 `resolveInstanceMethod:` 和 `resolveClassMethod:`，分别用于为实例方法和类方法动态提供给定选择器的实现。\n\
  - 动态加载允许 Objective-C 程序在需要时加载可执行代码和资源，而无需在应用程序启动时加载所有程序组件。Apple 提供了 Bundle 机制来支持\
  \ iOS 和 OS X 平台上的软件动态加载。Foundation 框架的 `NSBundle` 类可用于管理 Bundle。`NSBundle` 对象代表文件系统中的一个位置，该位置对可在程序中使用的代码和资源进行分组。\n\
  - Foundation 框架的 `NSObject` API 包含许多用于执行对象内省的方法。这些 API 动态查询运行时以获取有关方法的信息。它们还执行对象继承、行为和一致性测试。\n\
  \n现在你已经了解了运行时系统的特性以及如何在程序中使用它们，接下来让我们检查运行时系统的架构和实现。准备好后，请翻到下一页开始学习！\n\n# 第 8 章：运行时架构\n\
  \n运行时系统是 Objective-C 平台的关键元素。它实现了语言的动态特性和面向对象能力。其结构使你能够在不了解运行时内部机制的情况下开发 Objective-C\
  \ 代码，同时也提供了公共 API，使你能够编写代码直接调用运行时服务。\n\n在上一章中，你回顾了 Objective-C 的动态特性；在本章中，你将探索运行时系统的架构和设计，以及它如何实现这些特性。你将识别运行时的主要组件，检查关键实现细节，然后查看你的代码如何在编译时和程序执行期间与运行时交互。到本章结束时，你将彻底理解运行时系统在\
  \ Objective-C 语言中的功能。\n\n## 运行时组件\n\nObjective-C 运行时系统有两个主要组件：编译器和运行时库。让我们用放大镜仔细检查它们，看看它们是如何用于实现运行时系统的。\n\
  \n### 编译器\n\n在第 5 章中，你简要回顾了 Objective-C 源代码编译的一般过程。如图 5-1 所示，编译过程接收输入的 Objective-C\
  \ 源文件，并经过多个阶段（包括词法分析、语法分析、代码生成与优化、汇编和链接操作），最终生成构成可执行程序的输出二进制文件。\n\n正如 C 标准库为 C 编程语言提供标准\
  \ API 和实现一样，运行时库为 Objective-C 的面向对象特性提供了标准 API 和实现。该库在链接阶段被链接到所有 Objective-C 程序。编译器的工作是接收输入的源代码，并生成使用运行时库的代码，以产生一个有效的、可执行的\
  \ Objective-C 程序。\n\nObjective-C 语言的面向对象元素和动态特性都由运行时系统实现。这包括以下内容：\n\n- 类元素（接口、实现、协议、类别、方法、属性、实例变量）\n\
  - 类实例（对象）\n- 对象消息传递（包括动态类型和绑定）\n- 动态方法解析\n- 动态加载\n- 对象内省\n\n总之，当编译器解析使用这些语言元素和特性的\
  \ Objective-C 源代码时，它会生成包含适当运行时库数据结构和函数调用的代码，以实现语言指定的行为。为了阐明这是如何工作的，让我们看几个示例，这些示例演示了编译器如何为\
  \ Objective-C 类和对象生成代码，以及它如何执行对象消息传递。\n\n### 对象消息传递代码生成\n\n当编译器解析对象消息（一个消息发送表达式），例如\n\
  \n```\n[receiver message]\n```\n\n比如，它会生成调用运行时库函数 `objc_msgSend()` 的代码。该函数接收消息的接收者和选择器，以及消息中传递的任何参数作为输入参数。因此，编译器将源代码中的每个消息传递表达式（即形式为\
  \ `[receiver message]`）转换为对运行时库消息传递函数 `objc_msgSend(...)` 的调用，并将所有提供的参数传递给该调用。每条消息都是动态解析的，这意味着消息接收者类型和要调用的实际方法实现是在运行时确定的。对于源代码中的每个类和对象，编译器会构建执行对象消息传递所需的数据结构。\n\
  \n\n\n### 类与对象的代码生成\n\n当编译器解析包含类定义和对象的 Objective-C 代码时，会生成对应的运行时数据结构。一个 Objective-C\
  \ 类对应一个运行时库中的 `Class` 数据类型。根据 Apple 运行时参考文档，`Class` 数据类型是指向一个标识符为 `objc_class` 的不透明类型的指针。\n\
  \n```\ntypedef struct objc_class *Class;\n```\n\n*不透明数据类型* 是指在其接口中定义不完整的 C 语言 `struct`\
  \ 类型。不透明类型提供了一种数据隐藏的形式，因为它们的变量只能通过专门为其设计的函数来访问。运行时库函数用于访问 `Class`（即 `objc_class`）数据类型的变量。\n\
  \n正如 Objective-C 类拥有运行时数据类型一样，Objective-C 对象也拥有对应的运行时数据类型。当编译器解析对象的 Objective-C\
  \ 代码时，会生成创建运行时对象类型的代码。在代码清单 8-1 中定义的这一数据类型，是一个标识符为 `objc_object` 的 C 语言 `struct`。\n\
  \n*代码清单 8-1.* `objc_object` 数据类型\n\n```\nstruct objc_object\n{\n  Class isa;\n \
  \ /* ...可变长度数据，包含实例变量的值...  */\n};\n```\n\n当你创建一个对象时，会为 `objc_object` 类型分配内存，该类型由一个\
  \ `isa` 指针以及紧随其后的对象实例变量数据组成。\n\n请注意，与 `Class` 数据类型类似，`objc_object` 类型包含一个名为 `isa`\
  \ 的 `Class` 类型变量；换句话说，就是一个指向 `objc_class` 类型变量的指针。实际上，所有 Objective-C 对象和类的运行时数据类型都以一个\
  \ `isa` 指针开头。例如，Objective-C 中 `id` 类型在运行时的等价物是一个定义为指向 `objc_object` 指针的 C 语言 `struct`。\n\
  \n*代码清单 8-2.* `id` 类型定义\n\n```\ntypedef struct objc_object\n{\n  Class isa;\n} *id;\n\
  ```\n\n换句话说，`id` 仅仅是一个指向标识符为 `objc_object` 的 C 语言 `struct` 的指针。Objective-C 块对象的运行时数据结构遵循同样的约定，从而使它们也能够被运行时系统正确管理。\n\
  \n### 查看运行时数据结构\n\n在进一步探讨这些概念之前，让我们创建一个示例，让你了解 Objective-C 对象和类如何映射到之前讨论的运行时数据结构。在\
  \ Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New** ![image](img/arrow.jpg) **Project …**\
  \ 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序（从 Mac OS X 应用程序选项中选择 **Command\
  \ Line Tool**），然后点击 **Next**。在 **Project Options** 窗口中，将产品名称指定为 **Runspector**，选择\
  \ **Foundation** 作为项目类型，通过勾选 **Use Automatic Reference Counting** 复选框选择 ARC 内存管理，然后点击\
  \ **Next**。\n\n在文件系统中指定你想要创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source\
  \ Control** 复选框，然后点击 **Create** 按钮。\n\n现在让我们来实现代码。在导航窗格中选择 **main.m** 文件，然后添加代码清单\
  \ 8-3 中所示的代码。\n\n*代码清单 8-3.* Runspector `main.m` 文件\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <objc/runtime.h>\n\n// 测试类 1\n@interface TestClass1 : NSObject { @public\
  \ int myInt; }\n@end\n@implementation TestClass1\n@end\n\nint main(int argc, const\
  \ char * argv[])\n{\n  @autoreleasepool\n  {\n    // 创建一个类的几个实例并显示其数据\n    TestClass1\
  \ *tc1A = [[TestClass1 alloc] init];\n    tc1A->myInt = 0xa5a5a5a5;\n    TestClass1\
  \ *tc1B = [[TestClass1 alloc] init];\n    tc1B->myInt = 0xc3c3c3c3;\n    long tc1Size\
  \ = class_getInstanceSize([TestClass1 class]);\n    NSData *obj1Data = [NSData dataWithBytes:(__bridge\
  \ const void *)(tc1A)\n                                     length:tc1Size];\n \
  \   NSData *obj2Data = [NSData dataWithBytes:(__bridge const void *)(tc1B)\n   \
  \                                   length:tc1Size];\n    NSLog(@\"TestClass1 对象\
  \ tc1 包含 %@\", obj1Data);\n    NSLog(@\"TestClass1 对象 tc2 包含 %@\", obj2Data);\n\
  \    NSLog(@\"TestClass1 内存地址 = %p\", [TestClass1 class]);\n  }\n  return 0;\n}\n\
  ```\n\n好的，我们来回顾一下这段代码。在 `main.m` 文件的开头，注意导入语句\n\n```\n#import <objc/runtime.h>\n\
  ```\n\n这条语句是为了在文件中包含运行时库的 API。在导入语句之后，代码定义了类 `TestClass1`。这个简单的类没有方法，只有一个公有的实例变量。在\
  \ `main()` 函数中，创建并初始化了两个 `TestClass1` 对象，并为每个对象的实例变量赋值。对象创建后，使用 Foundation 框架的 `NSData`\
  \ 类来获取每个对象的数据（以字节为单位）。运行时库函数 `class_getInstanceSize()` 用于获取类实例的大小（以字节为单位）。数据检索完成后，使用\
  \ Foundation 框架的 `NSLog` 函数将其显示在输出窗格中。当你编译并运行程序时，应该会看到类似于图 8-1 所示的输出。\n\n![9781430250500_Fig08-01.jpg](img/9781430250500_Fig08-01.jpg)\n\
  \n图 8-1. Runspector 程序，对象检查\n\n在输出窗格中，`TestClass1` 对象包含代码清单 8-4 中的数据。\n\n*代码清单 8-4.*\
  \ Runspector 程序输出的 TestClass1\n\n```\nTestClass1 对象 tc1 包含 <78110000 01000000 a5a5a5a5\
  \ 00000000>\nTestClass1 对象 tc2 包含 <78110000 01000000 c3c3c3c3 00000000>\nTestClass1\
  \ 内存地址 = 0x100001178\n```\n\n让我们来分析这些数据。在代码清单 8-2 中已经表明，当编译器解析一个对象时，会生成一个 `objc_object`\
  \ 类型的实例，其内容包含一个 `isa` 指针和该对象实例变量的值。因此，查看程序的输出（参见代码清单 8-4），`TestClass1` 对象 1 (`tc1`)\
  \ 的数据包含两个项目：一个 `isa` 指针（`78110000 01000000`）和分配给其实例变量的值（`a5a5a5a5 00000000`）。类似地，`TestClass1`\
  \ 对象 2 (`tc2`) 的数据包含一个 `isa` 指针（`78110000 01000000`）和分配给其实例变量的值（`c3c3c3c3 00000000`）。请注意，对象\
  \ `objc_object` 数据结构中的第一项就是它的 `isa` 指针。同时还要注意，两个实例的 `isa` 指针是相同的。这正如预期，因为它们是同一个类的实例，因此应具有相同的指针值。现在，一个\
  \ `isa` 指针指向一个类在内存中的地址，如代码清单 8-4 的最后一行所示。\n\n```\nTestClass1 内存地址 = 0x100001178\n\
  ```\n\n\n\n您可能在想：“这个内存地址与`isa`指针显示的值不一样！”实际上是一样的：运行此程序的 Mac Pro 计算机采用*小端序*，这意味着它反转了内存中存储的字节顺序。因此，`isa`指针显示的地址字节序（`0x78110000\
  \ 01`）与实际内存地址的字节序是相反的。好吧，希望这一切开始变得清晰了。我们继续深入。通过添加代码清单 8-5 中的代码来更新`main()`函数。\n\n\
  *代码清单 8-5.*  Runspector 程序`main()`函数，类数据类型\n\n```\n// Retrieve and display the data\
  \ for the TestClass1 class object\nid testClz = objc_getClass(\"TestClass1\");\n\
  long tcSize = class_getInstanceSize([testClz class]);\nNSData *tcData = [NSData\
  \ dataWithBytes:(__bridge const void *)(testClz)\n                             \
  \    length:tcSize];\nNSLog(@\"TestClass1 class contains %@\", tcData);\nNSLog(@\"\
  TestClass1 superclass memory address = %p\", [TestClass1 superclass]);\n```\n\n\
  在代码清单 8-5 中，你添加了代码来检索并显示`TestClass1`类对象的数据字节。运行时函数`objc_getClass()`用于获取`TestClass1`类，然后通过`NSData`实例和`NSLog`函数显示其数据。代码还显示了`TestClass1`超类的内存地址。当你编译并运行程序时，应该会看到类似图\
  \ 8-2 所示的输出。\n\n![9781430250500_Fig08-02.jpg](img/9781430250500_Fig08-02.jpg)\n\n\
  *图 8-2.*  Runspector 程序，对象和类检查\n\n输出窗格显示代码清单 8-6 中的结果。\n\n*代码清单 8-6.*  Runspector\
  \ 程序的 TestClass1 输出\n\n```\nTestClass1 object tc1 contains <88110000 01000000 a5a5a5a5\
  \ 00000000>\nTestClass1 object tc2 contains <88110000 01000000 c3c3c3c3 00000000>\n\
  TestClass1 memory address = 0x100001188\nTestClass class contains <60110000 01000000\
  \ 4028a271 ff7f0000>\nTestClass1 superclass memory address = 0x7fff71a22840\n```\n\
  \n`TestClass1`对象的数据与你之前观察到的一致——每个对象都包含一个`isa`指针以及赋值给其实例变量的值。`TestClass1`类对象的数据由一个`isa`指针（`60110000\
  \ 01000000`）和另一个值（`4028a271 ff7f0000`）组成。这个额外的值实际上是指向对象超类的指针。之前你了解到类的数据结构有一个`isa`指针（参考代码清单\
  \ 8-1），因此这个结果也与预期值一致。列出的超类内存地址确认了你在类对象数据中看到的内容。\n\n好了，你现在应该对编译器在 Objective-C 运行时中的角色有了很好的理解。你还实现了一个程序，使用了一些运行时\
  \ API 来检查编译器生成的数据结构。干得漂亮！现在让我们继续学习运行时库，并研究它的一些实现细节。\n\n## 运行时库\n\nApple 的 Objective-C\
  \ 运行时库实现了 Objective-C 语言的面向对象特性和动态属性。在大多数情况下，运行时库在后台运行，但它也包含一个公共 API，可以直接在你的代码中使用。\n\
  \n这个 API 是用 C 语言表达的，由一组函数、数据类型和语言常量组成。你在上一节中了解了一些关键的运行时数据类型（例如`objc_object`、`objc_class`），并使用了一些这些函数。总的来说，运行时库的数据类型可以分组如下：\n\
  \n*   类定义数据结构（`class`、`method`、`ivar`、`category`、`IMP`、`SEL`等）\n*   实例数据类型（`id`、`objc_object`、`objc_super`）\n\
  *   值（`BOOL`）\n\n函数属于以下类别：\n\n*   对象消息传递\n*   类函数\n*   实例函数\n*   协议函数\n*   方法函数\n\
  *   属性函数\n*   选择子函数\n\n运行时库还定义了多个布尔常量（`YES`、`NO`）和空值（`NULL`、`nil`、`Nil`）。\n\n运行时库的公共\
  \ API 在头文件`runtime.h`中声明。Apple 的运行时库可以在`http://opensource.apple.com`上查阅。它结合了多种设计元素和系统服务，以提供出色的性能和可扩展性，满足\
  \ Objective-C 语言随时间的演变。在本章后面，你将了解运行时库实现的元素。现在，让我们通过开发一个使用这些 API 的程序来获得一些实践经验。\n\n\
  ## 使用运行时库 API 创建类\n\n现在你将创建一个程序，使用运行时 API 动态创建类。在 Xcode 中，通过从 Xcode 文件菜单中选择**新建**\
  \ ![image](img/arrow.jpg) **项目…** 来创建一个新项目。在**新项目助手**窗格中，创建一个命令行应用程序（从 Mac OS X\
  \ 应用程序选择中选择**命令行工具**），然后点击**下一步**。在**项目选项**窗口中，指定产品名称为**DynaClass**，选择项目类型为**Foundation**，通过勾选**使用自动引用计数**复选框来选择\
  \ ARC 内存管理，然后点击**下一步**。\n\n在文件系统中指定你想要创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消勾选**源代码管理**复选框，然后点击**创建**按钮。\n\
  \n好了，现在让我们实现代码。在导航器窗格中选择**main.m**文件，然后添加代码清单 8-7 中显示的代码。\n\n*代码清单 8-7.*  DynaClass\
  \ 项目的 main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n#import <objc/runtime.h>\n\
  #import <objc/message.h>\n\nNSString *greeting(id self, SEL _cmd)\n{\n  return [NSString\
  \  stringWithFormat: @\"Hello, World!\"];\n}\n\nint main(int argc, const char *\
  \ argv[])\n{\n  @autoreleasepool\n  {\n    // Dynamically create a class\n    Class\
  \ dynaClass = objc_allocateClassPair([NSObject class], \"DynaClass\", 0);\n\n//\
  \ Dynamically add a method, use existing method (description) to retrieve signature\n\
  \    Method description = class_getInstanceMethod([NSObject class], @selector(description));\n\
  \    const char *types = method_getTypeEncoding(description);\n    class_addMethod(dynaClass,\
  \ @selector(greeting), (IMP)greeting, types);\n\n// Register the class\n    objc_registerClassPair(dynaClass);\n\
  \n// Now use the class - create an instance and send it a message\n    id dynaObj\
  \ = [[dynaClass alloc] init];\n    NSLog(@\"%@\", objc_msgSend(dynaObj, NSSelectorFromString(@\"\
  greeting\")));\n\n}\n  return 0;\n}\n```\n\n注意文件顶部的这个额外导入语句：\n\n```\n#import <objc/message.h>\n\
  ```\n\n\n\n本声明要求将运行时库消息传递 API（例如`objc_msgSend()`）包含在文件中。紧随导入语句之后，代码定义了返回简单问候语的`greeting()`函数。该函数将用于动态添加到类中的方法实现。`main()`函数包含使用运行时\
  \ API 创建新类的逻辑：创建类对（类及其元类），为其添加一个指向先前定义的`greeting()`函数的方法，然后在运行时中注册该类对，从而使您能够创建该类的实例。请注意，方法签名是通过使用具有相同签名的`NSObject`描述方法获取的。接下来的几行代码创建该类的实例并向其发送消息，方法调用的输出将记录到输出面板。编译并运行程序时，您应看到类似图\
  \ 8-3 所示的输出。\n\n![9781430250500_Fig08-03.jpg](img/9781430250500_Fig08-03.jpg)\n\n\
  图 8-3. DynaClass 程序，动态类创建\n\n干得漂亮！您现在已完成运行时 API 及其用法的概述。请参阅 Apple 运行时参考以获取这些 API\
  \ 的完整定义。现在让我们探讨运行时库的一些设计与实现细节。\n\n## 实现运行时对象消息传递\n\n运行时库提供了访问以下信息的函数（函数名称在括号中标识）：\n\
  \n*   对象的类定义（`objc_getClass`）\n*   类的超类（`class_getSuperclass`）\n*   对象的元类定义（`objc_getMetaClass`）\n\
  *   类的名称（`class_getName`）\n*   类的版本信息（`class_getVersion`）\n*   类的大小（以字节为单位）（`class_getInstanceSize`）\n\
  *   类的实例变量列表（`class_copyIvarList`）\n*   类的方法列表（`class_copyMethodList`）\n*   类的协议列表（`class_copyProtocolList`）\n\
  *   类的属性列表（`class_copyProperyList`）\n\n综上所述，运行时数据类型和函数为运行时库提供了实现各种 Objective-C 特性所需的信息，例如对象消息传递（参见图\
  \ 8-4）。\n\n![9781430250500_Fig08-04.jpg](img/9781430250500_Fig08-04.jpg)\n\n图 8-4.\
  \ 运行时系统消息传递操作\n\n当您向对象发送消息时，运行时通过利用类方法缓存及其 vtable 的自定义代码来查找类的实例方法。它会搜索整个类层次结构以查找对应方法，找到后跳转到方法实现。运行时库包含多种实现对象消息传递的设计机制。您将了解其中几种，从\
  \ vtable 开始。\n\n## 通过 vtable 进行方法查找\n\n运行时库定义了一个方法数据类型（`objc_method`），如代码清单 8-7\
  \ 所示。\n\n*代码清单 8-7.* 运行时库方法数据类型\n\n```\nstruct objc_method\n{\n  SEL method_name;\n\
  \  char * method_types;\n  IMP method_imp;\n};\ntypedef objc_method Method;\n```\n\
  \n`method_name`是`SEL`类型的变量，用于描述方法名称；`method_types`描述方法参数的数据类型；`method_imp`是`IMP`类型的变量，提供方法被选中调用时所调用函数的地址（回想一下，Objective-C\
  \ 方法实际上是 C 函数，至少接受两个参数：`self`和`_cmd`）。由于方法调用在程序执行过程中可能发生数百万次，运行时系统需要一种快速高效的方法查找和调用机制。**vtable**（也称为**调度表**）是编程语言中常用的一种支持动态绑定的机制。Objective-C\
  \ 运行时库实现了一种自定义的 vtable 调度机制，旨在最大化性能和灵活性。**vtable**是一个`IMP`（Objective-C 方法实现）数组。每个运行时`Class`实例（`objc_class`）都包含一个指向\
  \ vtable 的指针。\n\n每个`Class`实例还包含一个指向最近使用过的方法的缓存指针。这为方法调用提供了性能优化。运行时库实现的方法查找逻辑如图 8-5\
  \ 所示。\n\n![9781430250500_Fig08-05.jpg](img/9781430250500_Fig08-05.jpg)\n\n图 8-5.\
  \ 运行时库方法查找\n\n在图 8-5 中，运行时库首先在缓存中搜索方法`IMP`（指向方法实现起始位置的指针）。如果未找到，则在 vtable 中查找方法`IMP`，如果找到，则将`IMP`存储在缓存中以供将来查找。这种设计使运行时能够执行快速高效的方法查找。\n\
  \n## 通过 dyld 共享缓存进行选择器唯一化\n\nObjective-C 程序的启动开销与**选择器唯一化**所需的时间成正比。每个选择器名称在可执行程序中必须是唯一的，然而，您的自定义类和程序中的每个共享库都包含它们自己的选择器名称副本，其中许多可能是重复的（例如`alloc`、`init`等）。运行时需要为每个选择器名称选择一个唯一的规范`SEL`指针值，然后更新每个调用点和方法列表的元数据以使用该唯一值。此过程必须在应用程序启动时执行，并消耗系统资源（内存和程序启动时间）。为了提高此过程的效率，运行时通过使用\
  \ dyld 共享缓存执行选择器唯一化。**dyld**是一种定位和加载动态库的系统服务。它包含一个共享缓存，使这些库能够在进程间共享。**dyld 共享缓存**还包含一个选择器表，从而可以从缓存中访问共享库和自定义类的选择器。因此，运行时能够从\
  \ dyld 共享缓存中检索共享库的选择器，并且仅需更新应用自定义类的选择器。\n\n## 消息分发\n\n\n\n### 消息调用优化\n\n消息调用在 Objective-C\
  \ 程序中无处不在。仅应用程序启动时，执行对象消息传递的运行时库函数 `objc_msgSend()` 就会被调用数百万次。因此，优化此代码至关重要，因为即使其性能的微小变化也会对整体应用程序性能产生重大影响。此方法必须查找与消息接收者和选择器对应的\
  \ `IMP`，然后跳转到该 `IMP` 以开始执行。在前几节中，您已经了解了如何使用方法缓存和虚函数表来检索 `IMP`。一旦完成此操作，运行时会使用汇编语言编写的自定义优化代码来调度方法。此代码有时称为\
  \ *trampoline*，它会查找正确的代码并直接跳转到该代码。此 trampoline 代码适用于传递给它的任何参数组合，因为这些参数只是传递给方法 `IMP`\
  \ 以供读取。为了处理可能的返回值类型，运行时提供了几种不同的 `objc_msgSend()` 实现。\n\n### 访问类实例方法\n\n现在您已经了解了运行时库如何查找（和调用）实例方法，您可能想知道它是如何为类方法执行此操作的（即，为类方法执行对象消息传递）。实际上，每个\
  \ Objective-C 类本身也是一个对象，因此它能够接收消息，例如：\n\n```\n[NSObject alloc]\n```\n\n这就解释了如何向类发送消息，但运行时如何查找和调用类方法呢？实际上，运行时库通过*元类*实现了这种能力。\n\
  \n*元类*是一种特殊类型的类对象，它存储的信息使运行时能够查找和调用 Objective-C 类的类方法。每个 Objective-C 类都有一个唯一的元类，因为每个类可能都有一个唯一的类方法列表。运行时\
  \ API 提供了用于访问元类的函数。\n\n与常规类一样，元类也遵循 `Class` 层级结构。就像类通过其 superclass 指针指向父类一样，元类也通过其自身的\
  \ superclass 指针指向该类父类的元类（请参考图 8-4）。\n\n基类的元类将其 superclass 设置为基础类本身。这种继承层级结构的结果是，层级结构中的所有实例、类和元类都继承自该层级结构的基类。\n\
  \n对象的 `isa` 变量指向描述该实例的类，因此可用于访问其实例方法、实例变量等。Objective-C 类（对象）的 `isa` 变量指向描述该类（其类方法等）的元类。\n\
  \n综上所述，运行时对实例方法和类方法执行消息传递的方式如下：\n\n- 当您的源代码向对象发送消息时，运行时检索相应的实例方法实现（通过相应的类实例方法虚函数表）并跳转到该方法。\n\
  - 当您的源代码向类发送消息时，运行时检索相应的类方法实现（通过其元类类方法虚函数表）并跳转到该方法。\n\n呼，内容真多！如果需要，请花点时间回顾这些概念，等您准备好了，我们将通过一个示例来进一步阐明。\n\
  \n### 检查类方法\n\n现在您将编写一个示例，看看运行时数据结构如何利用元类以及元类在整个类层级结构中的位置。您将通过更新 Runspector 程序（本章前面开发的程序）来检索元类信息来实现这一点。启动\
  \ Xcode（如果尚未启动），并通过从 Xcode 文件菜单中选择 **Open Recent** ![image](img/arrow.jpg) **Runspector.xcodeproj**\
  \ 来打开 Runspector 项目。在导航器窗格中选择 **main.m** 文件，然后添加代码清单 8-8 中所示的代码。\n\n*代码清单 8-8.*\
  \ Runspector 的 main() 函数，元类数据\n\n```\n// 检索并显示元类数据\nid metaClass = objc_getMetaClass(\"\
  TestClass1\");\nlong mclzSize = class_getInstanceSize([metaClass class]);\nNSData\
  \ *mclzData = [NSData dataWithBytes:(__bridge const void *)(metaClass)\n       \
  \                           length:mclzSize];\nNSLog(@\"TestClass1 元类包含 %@\", mclzData);\n\
  class_isMetaClass(metaClass) ?\n  NSLog(@\"类 %s 是一个元类\", class_getName(metaClass))\
  \ :\n  NSLog(@\"类 %s 不是一个元类\", class_getName(metaClass));\n```\n\n这段代码使用运行时函数 `objc_getMetaClass()`\
  \ 来检索指定类的元类定义，然后显示其关联的数据字节。接下来，代码使用运行时函数 `class_isMetaClass()` 来测试该对象是否为元类，并将相应消息记录到控制台。您可能对桥接转换（`__bridge`）的使用感到疑惑。`NSData\
  \ dataWithBytes:length:` 方法将类型为 (`const void *`) 的变量作为其第一个参数。您可能还记得第 4 章中提到的，ARC\
  \ 内存管理禁止直接从 Objective-C 对象和 (`void *`) 类型进行转换。桥接转换（第 6 章中讨论过）使编译器能够管理这些场景。在这种情况下，由于不会发生所有权转移（即分配给变量\
  \ `metaClass` 的对象仍将由 ARC 管理），因此使用了 `__bridge` 注解。编译并运行更新后的程序后，您应该会观察到类似于图 8-6 所示的输出。\n\
  \n![9781430250500_Fig08-06.jpg](img/9781430250500_Fig08-06.jpg)\n\n图 8-6. Runspector\
  \ 程序，元类检查\n\n请注意输出窗格底部的元类信息，如代码清单 8-9 所示。\n\n*代码清单 8-9.* Runspector 程序元类信息\n\n```\n\
  TestClass1 元类包含\n<6828a271 ff7f0000 6828a271 ff7f0000 d0821000 01000000 703d1000\
  \ 01000000 60821000 01000000>\n类 TestClass1 是一个元类\n```\n\n元类数据包含 `isa` 指针、superclass\
  \ 指针以及其他信息。`TestClass1` 的 superclass 是 `NSObject`。由于该类未定义自定义类方法，其 `isa` 指针也是 `NSObject`。因此，元类的\
  \ `isa` 指针和 superclass 指针应该是相同的。代码清单 8-9 显示的结果证实了这一点（每个值均为 `6828a271 ff7f0000`）。\n\
  \n至此，您对运行时库 API 及其实现的回顾就完成了。在下一节中，您将了解可用于直接与运行时系统交互的 Objective-C API。\n\n### 与运行时交互\n\
  \nObjective-C 程序与运行时系统交互以实现该语言的动态特性。在图 8-7 中，这种交互发生在三个层面：\n\n- Objective-C 源代码\n\
  - Foundation 框架的 `NSObject` 方法\n- 运行时库 API\n\n![9781430250500_Fig08-07.jpg](img/9781430250500_Fig08-07.jpg)\n\
  \n图 8-7. 与运行时系统交互\n\n\n\n### 前文回顾\n\n在前文中，你讨论了编译器和运行时库的作用。现在，你将深入探讨 Foundation 框架中\
  \ `NSObject` 类的运行时特性。\n\n## NSObject 运行时方法\n\n如本章所述，Objective-C 语言提供了许多动态编程能力。运行时系统提供了一套\
  \ API，使你能够直接与运行时进行交互；然而，这些 API 是用 C 语言编写的，因此需要采用过程式编程方法。作为替代方案，Foundation 框架的 `NSObject`\
  \ 类提供了一组方法，这些方法复制了运行时 API 的大部分功能。由于你的自定义类（以及几乎所有 Cocoa 框架类）都继承自 `NSObject`，你的代码会继承这些方法，从而可以直接使用它们。`NSObject`\
  \ 运行时方法提供的功能包括：\n\n*   对象内省\n*   消息转发\n*   动态方法解析\n*   动态加载\n\n接下来，你将通过一个使用 `NSObject`\
  \ 运行时方法执行对象内省的示例来演示这一点。\n\n## 执行对象内省\n\n现在，你将创建一个程序，使用运行时 API 动态创建类。在 Xcode 中，通过从\
  \ Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg) **项目…** 来创建一个新项目。在“新建项目助手”窗格中，创建一个命令行应用程序（从\
  \ Mac OS X 应用程序选项中选择**命令行工具**），然后点击**下一步**。在“项目选项”窗口中，将产品名称指定为 **Introspector**，将项目类型选择为\
  \ **Foundation**，通过勾选**使用自动引用计数**复选框来选择 ARC 内存管理，然后点击**下一步**。\n\n在文件系统中指定项目要创建的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消勾选**源代码控制**复选框，然后点击**创建**按钮。\n\
  \n现在让我们来实现代码。在导航窗格中选择 **main.m** 文件，然后添加代码清单 8-10 中显示的代码。\n\n*代码清单 8-10.*  Introspector\
  \ main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n\n// 测试类 1\n@interface Greeter\
  \ : NSObject\n@property (readwrite, strong) NSString *salutation;\n- (NSString *)greeting:(NSString\
  \ *)recipient;\n@end\n@implementation Greeter\n- (NSString *)greeting:(NSString\
  \ *)recipient\n{\n  return [NSString stringWithFormat:@\"%@, %@\", [self salutation],\
  \ recipient];\n}\n@end\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    Greeter *greeter = [[Greeter alloc] init];\n    [greeter setSalutation:@\"\
  Hello\"];\n\nif ([greeter respondsToSelector:@selector(greeting:)] &&\n        [greeter\
  \ conformsToProtocol:@protocol(NSObject)])\n    {\n      id result = [greeter performSelector:@selector(greeting:)\
  \ withObject:@\"Monster!\"];\n      NSLog(@\"%@\", result);\n    }\n  }\n  return\
  \ 0;\n}\n```\n\n紧接在 `import` 语句之后，代码定义了 `Greeter` 类。这个类定义了一个属性以及一个返回简单问候语的方法。在 `main()`\
  \ 函数中，你首先创建了一个 `Greeter` 实例并设置了该属性的值。接着，你使用了 `NSObject` 运行时方法来执行对象内省。具体来说，你测试了 `NSObject`\
  \ 的 `respondsToSelector:` 和 `conformsToProtocol:` 方法。如果这两个条件表达式返回的结果都是 `YES`，则代码会使用\
  \ `NSObject` 运行时方法 `performSelector:withObject:` 向 `Greeter` 实例发送一条消息。最后，该方法返回的结果会被记录到输出窗格中。编译并运行程序后，你应该会看到类似于图\
  \ 8-8 所示的输出。\n\n![9781430250500_Fig08-08.jpg](img/9781430250500_Fig08-08.jpg)\n\n\
  图 8-8.  Introspector 程序输出\n\n`NSObject` 运行时方法的完整列表定义在 `NSObject` 类参考和 `NSObject`\
  \ 协议参考中。这些内容可以在 Foundation 框架参考指南中找到。\n\n## 总结\n\n在本章中，你详细研究了运行时系统架构的关键组成部分。现在，你应该对运行时系统如何实现该语言的面向对象和动态特性有了很好的理解。回顾一下，以下是关键要点：\n\
  \n*   Objective-C 运行时系统有两个主要组成部分：编译器和运行时库。编译器接收输入的 Objective-C 源代码，并生成由运行时库执行的代码。该库在链接阶段会链接到所有\
  \ Objective-C 程序。两者共同实现了该语言的所有面向对象和动态特性。\n*   运行时库 API 定义了一组数据类型、函数和常量。其中许多数据类型和函数对应着\
  \ Objective-C 语言元素（例如对象、类、协议、方法、实例变量等）。运行时库的公共 API 是用 C 语言表达的。\n*   运行时库的实现包含了多种特性和机制，用于增强应用程序的性能和可扩展性。例如方法缓存、虚函数表\
  \ (vtable) 以及 `dyld` 共享缓存的使用。\n*   运行时库利用元类来查找和调用类方法。元类是一种特殊类型的类对象，它存储了使运行时能够查找并调用\
  \ Objective-C 类的类方法所需的信息。\n*   Foundation 框架的 `NSObject` 类提供了一组用于调用运行时系统功能和行为的方法。这些方法执行对象内省、动态方法解析、动态加载和消息转发。\n\
  \n至此，你对运行时系统的深入探讨就完成了。请随时回顾你在最后两章中所学的内容，并尝试运行示例程序。理解运行时系统对于精通 Objective-C 程序开发非常重要。\n\
  \n# 第 9 章\n\n## 专家篇：使用运行时 API\n\n在第 7 章和第 8 章中，你学习了 Objective-C 的动态特性以及实现这些特性的运行时系统的设计和架构。在本专家篇章节中，你将通过几个示例程序来完成本书的第二部分，这将使你能够获得更多关于运行时系统特性及其\
  \ API 的实践经验。你将使用 `NSInvocation` API 创建一个动态代理，使用 `NSBundle` API 执行自定义框架 bundle 的动态加载，并创建一个广泛使用运行时库\
  \ API 的程序。相信我，完成本章之后，你将很好地掌握 Objective-C 运行时系统的复杂之处！\n\n### 使用可加载 Bundle 扩展程序\n\n\
  Objective-C 提供了许多动态编程特性。这些特性增强了语言的能力和灵活性，并使你能够在程序执行期间对其进行修改。在第 7 章中，你讨论了动态加载，并简要描述了如何使用\
  \ Foundation 框架的 `NSBundle` 类来管理 bundle。现在，你将创建一个程序，利用这些特性通过可加载 bundle 来扩展正在运行的程序。\n\
  \n## 方法\n\n对于这个示例，你实际上需要开发两个项目。在一个项目中，你将编写使用可加载 bundle 的程序；在另一个项目中，你将创建可加载的 bundle。具体步骤如下：\n\
