- "# 第 1 章 入门\n\n欢迎 Objective-C 的新朋友们！在本章中，你将了解该语言的介绍，然后通过编写一些代码直接上手。我们将从 Apple Objective-C\
  \ 开发环境概述开始，讨论 Objective-C 为何成为应用程序开发如此流行的语言。接着，你将开始使用 Apple 的集成开发环境（IDE）`Xcode`，并了解它如何使\
  \ Objective-C 编程既愉快又高效。\n\n## 引言\n\nObjective-C 是在 Apple `OS X`和`iOS`（`iPod`、`iPhone`、`iPad`）平台上开发应用程序的主要编程语言。近年来，这些平台已成为一些最流行的应用程序开发环境。这一成功的关键原因之一实际上归功于\
  \ Objective-C 语言的功能。\n\nApple 于 2007 年发布了 Objective-C 2.0 版本。它为语言增加了许多新特性，包括声明和合成属性、点表示法、快速枚举、异常支持、运行时性能改进以及\
  \ 64 位机器支持。\n\nObjective-C 语言持续演进，并获得了使 Objective-C 编程更强大且更具表现力的功能。近期语言的一些重要新增内容包括\
  \ Objective-C 对象的自动引用计数、改进了数据隐藏支持、改进了枚举的类型安全性，以及针对块对象、字面量和其他特性的新语言构造。\n\n## Apple\
  \ Objective-C 平台\n\nApple 的 Objective-C 开发环境由以下几个部分组成：\n\n*   Objective-C 编程语言\n\
  *   Objective-C 运行时环境\n*   软件库\n*   软件开发工具\n\n使用 Objective-C 进行面向对象软件开发是本书的主要主题。因此，本书第\
  \ 1 部分涵盖了编程语言及其对面向对象编程的支持方式。\n\nObjective-C 程序在 Objective-C 运行时环境中执行；它实现了语言的动态编程能力。本书第\
  \ 2 部分深入探讨了 Objective-C 运行时环境，并演示了如何使用其应用程序编程接口（API）。\n\n软件库包括一组框架、库和服务，它们提供通用功能以简化应用程序开发。该软件开箱即用，提供了在`OS\
  \ X`和`iOS`平台上开发应用程序所需的大部分功能。本书第 3 部分涵盖了基础框架，即用于任何类型 Objective-C 程序的基础 API。\n\n第\
  \ 4 部分重点介绍 Objective-C 的高级特性，这些特性在程序员开发更复杂的应用程序时尤为有用。\n\n软件开发工具支持源代码编辑与编译、用户界面开发、版本控制、项目管理、测试与调试以及其他功能。它们还简化了应用程序开发，并使开发者在开发、管理和维护\
  \ Objective-C 软件时更加高效。本书通篇提供了使用这些工具开发程序的指导。附录 B 提供了额外的提示和建议。\n\n## 为什么选择 Objective-C？\n\
  \n那么，与当今可用的许多其他编程语言相比，Objective-C 有哪些优势？毕竟，有不少语言都支持面向对象编程。它是 Apple `OS X`和`iOS`平台上开发应用程序的主要语言，这是其受欢迎的最大原因吗？嗯，Objective-C\
  \ 本身就是一个优秀的编程语言，具有多种使其在应用程序开发中极其强大、通用且易于使用的特性：\n\n\n\n## Objective-C 特性\n\n- **面向对象编程**：`Objective-C`编程语言提供了对面向对象编程（OOP）的完整支持，包括对象消息传递、封装、继承、多态和开放递归等能力。\n\
  - **对象消息传递**：对象消息传递使对象能够通过相互传递消息来进行协作。实际上，`Objective-C`代码（例如，一个类/对象方法或一个函数）向接收对象（*receiver*）发送一条消息，接收者使用该消息调用其对应的方法，如果需要则返回结果。如果接收者没有对应的方法，它可以通过其他方式处理该消息，例如将其转发给另一个对象、广播给其他对象、内省并应用自定义逻辑等。\n\
  - **动态运行时**：与许多其他支持 OOP 的语言相比，`Objective-C`非常动态。它将类型、消息和方法解析的大部分责任转移到了运行时，而不是编译时或链接时。这些能力可用于促进程序的实时开发和更新（无需重新编译和重新部署软件），以及长期演进（对现有软件影响极小或无影响）。\n\
  - **内存管理**：`Objective-C`提供了一种内存管理能力，即自动引用计数（`ARC`），它既简化了应用程序开发，又提高了应用程序性能。`ARC`是一种编译时技术，融合了传统自动内存管理机制（即垃圾回收器）的许多优点。然而，与传统技术相比，`ARC`提供了更好的性能（内存管理代码在编译时与程序代码交错），并且不会在程序执行中引入内存管理引起的暂停。\n\
  - **内省与反射**：`Objective-C`语言包含一些特性，使程序能够在运行时查询对象，提供信息（其类型、属性和支持的方法），并修改其结构和行为。这使得程序可以在其执行生命周期中被修改。\n\
  - **C 语言支持**：`Objective-C`主要是 C 语言的面向对象扩展。它是 C 的超集。这意味着可以使用 C 语言的原始能力，并且可以直接访问 C\
  \ 库。\n- **苹果技术**：苹果为`Objective-C`应用程序开发提供了丰富的软件库和工具。开发套件包含框架和库，这些框架和库提供了基础设施，使您能够专注于开发特定于应用程序的逻辑。苹果的集成开发环境`Xcode`提供了开发优秀`Objective-C`应用程序所需的所有工具。\n\
  \n这些只是`Objective-C`在开发者中持续受欢迎的众多原因中的一部分——我相信随着您继续阅读本书，您会发现更多原因。好了，说够了。现在让我们用`Xcode`来实际体验一下`Objective-C`，看看它到底能做什么！\n\
  \n## 开发一个简单的 Objective-C 程序\n\n掌握编程语言的最佳方法是通过实践来学习，所以现在您将开始编写一些代码！但首先，让我们下载并安装`Xcode`。\n\
  \n`Xcode`是一个完整的`Objective-C`软件开发集成开发环境（IDE），适用于 Mac。它与 iOS 和 OS X 完全集成，并包含编写和编译源代码、开发复杂用户界面、软件测试和调试、发布构建和版本管理、项目管理以及许多其他功能所需的所有工具。`Xcode`对所有苹果\
  \ iOS 和 Mac 开发者计划的成员免费提供。如果您不是任一计划的成员，也可以从 Mac App Store 免费下载。本书中的示例是使用当前版本`Xcode\
  \ 4.5`开发的。此版本的 IDE 可以在任何安装了 OS X Lion 或更高版本的 Intel Mac 计算机上运行。\n\n### 创建项目\n\n下载并安装`Xcode`后，启动该程序。将显示图\
