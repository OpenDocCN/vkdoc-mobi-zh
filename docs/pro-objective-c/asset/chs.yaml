  \ 4-6 所示的消息。\n\n![9781430250500_Fig04-06.jpg](img/9781430250500_Fig04-06.jpg)\n\n\
  图 4-6  分析 OrderEntry 项目的 MRR\n\n如图 4-6 所示，当动态分配的对象（本例中为`orderId`）的保留/释放消息不匹配时，会检测到潜在的内存泄漏。这表明“构建并分析”工具非常适合对程序内存管理进行初步检查。现在，继续从你的程序中移除注释标记——你已经证明它使用\
  \ MRR 正确地管理了内存。干得好！\n\n### 使用自动引用计数\n```\n\n\n## 使用 ARC 进行内存管理\n\n采用 MRR 内存管理方式时，你需要直接负责管理程序对象的生命周期。这样可以实现精细的内存使用控制，但代价是给程序员带来了沉重的负担。即使是你刚刚实现的简单示例，也需要非常谨慎（并使用合适的工具进行测试）来确保适时且正确地平衡\
  \ `retain` 和 `release` 操作。通常，手动引用计数是一项容易出错的任务，如果处理不当，可能导致程序内存泄漏和/或崩溃。实际上，这类基础设施最好交给工具处理，从而让程序员能够专注于程序旨在实现的实际业务逻辑。于是，自动引用计数（ARC）应运而生，它是一种自动执行此任务的内存管理增强技术，从而免除了程序员的这一责任。ARC\
  \ 采用与 MRR 相同的引用计数模型，但利用编译器来管理对象生命周期。具体来说，在程序编译时，编译器会分析源代码，确定动态创建的对象的生命周期需求，然后在编译后的代码中自动在必要时插入\
  \ `retain` 和 `release` 消息。ARC 还提供了其他好处：应用程序性能（可能）得到提升，并且消除了与内存管理相关的错误（例如，释放仍在使用的对象，保留不再使用的对象）。此外，与垃圾回收技术不同，ARC\
  \ 是确定性的（语句在编译时插入），并且不会因垃圾回收而引入程序执行暂停。\n\nARC 为 Objective-C 对象和 block 对象提供自动内存管理。它是新\
  \ Objective-C 项目中推荐的内存管理方法。如果某些情况下需要手动引用计数，ARC 可以在整个项目中使用，也可以在逐个文件的基础上使用。请注意，ARC\
  \ 不会自动处理对象存在循环引用的引用循环。Objective-C 提供了语言特性，用于在必要时声明对象的弱引用，以手动打破这些循环。你将在本章稍后部分了解这些内容。\n\
  \n### 使用 ARC 的规则和约定\n\n如前所述，与 MRR 方法相比，ARC 极大地简化了内存管理。因此，在 ARC 下针对对象内存管理存在不同的规则集。这些规则如下：\n\
  \n- 你不能发送`retain`、`retainCount`、`release`、`autorelease`或`dealloc`消息。ARC 禁止对对象生命周期进行程序化控制，并在编译期间自动在需要时插入这些消息。这包括`@selector(retain)`、`@selector(release)`及相关方法。如果你需要管理实例变量以外的资源，可以实现`dealloc`方法。ARC\
  \ 会在你的类中（如果未提供）自动创建一个`dealloc`方法来释放其拥有的对象，并在你的`dealloc`方法实现中调用`[super dealloc]`。\n\
  - 你不能在`id`和`(void *)`类型之间直接转换。ARC 只管理 Objective-C 对象和 block，因此编译器需要知道它正在处理的对象的类型。因为*指向\
  \ void 的指针*（`void *`）是一种泛型指针类型，可以转换为任何其他指针类型（甚至那些不是 Objective-C 指针类型的类型），所以这一限制是必要的。这种情况在\
  \ Foundation 框架对象和 Core Foundation 类型（Core Foundation 是一个提供 C 语言 API 的 Apple 软件库）之间进行转换时很常见。提供了一组\
  \ API 用于在 ARC 和非 ARC 环境之间进行变量的所有权转移。\n- 应使用自动释放池块来执行 ARC 管理的对象的自动释放。\n- 你不能调用 Foundation\
  \ 框架函数`NSAllocateObject`和`NSDeallocateObject`。这些函数提供了在特定内存区域中为对象分配和释放内存的能力。由于基于区域的内存不再被支持，因此不能使用这些函数。\n\
  - 你不能在 C 结构体（`struct`）中使用对象指针。ARC 不为动态分配的 C 结构体执行内存管理，因此编译器无法确定在哪里插入必要的`retain`和`release`消息。\n\
  - 你不能使用内存区域（`NSZone`）。如前所述，基于区域的内存不再被支持。\n- 为了与非 ARC 代码正确协作，你不能创建以“copy”开头的方法或声明属性（除非你明确选择不同的\
  \ getter）。\n- 默认情况下，ARC 不是异常安全的：它不会结束因异常而异常终止其作用域的`__strong`变量的生命周期，也不会执行在完整表达式抛出异常时本应在该表达式末尾发生的对象释放。可以使用编译器选项`-fobjc-arc-exceptions`来为\
  \ ARC 代码启用异常处理。当异常终止弱引用的作用域时，ARC 会结束这些弱引用的生命周期，除非在编译器中禁用了异常。\n\n### ARC 生命周期限定符\n\
  \n有一组特定于 ARC 的限定符，用于声明常规变量和属性的对象生命周期。以下是用于常规变量的限定符：\n\n- `__strong`：使用`alloc`/`init`创建的任何对象在其当前作用域的生命周期内被保留。这是常规变量的默认设置。“当前作用域”通常指声明该变量的花括号内（例如方法、`for`循环、`if`块等）。\n\
  - `__weak`：对象可以随时被销毁。这仅在对象在其他地方被强引用时才有用。当对象被销毁时，带有`__weak`的变量会被设置为`nil`。\n- `__unsafe_unretained`：这很像`__weak`，但在对象被释放时，指针不会被设置为`nil`。相反，指针会变成悬空指针（即，它不再指向任何有用的东西）。\n\
  - `__autoreleasing`：不要与在从方法返回对象前对其调用`autorelease`相混淆，这用于通过引用传递对象。\n\n使用 ARC 生命周期限定符为\
  \ Objective-C 对象声明变量时，正确的语法是：\n\n```\nClassName *qualifier varName;\n```\n\n\n\n\
  `ClassName`是类的名称/类型（如`OrderEntry`等），`qualifier`是 ARC 生命周期限定符（如前所述），`varName`是变量名称。如果未指定限定符，则默认为`__strong`。属性的\
  \ ARC 特定生命周期限定符如下：\n\n- `strong`：`strong`属性等同于`retain`属性（属性完整列表见附录 A）。\n- `weak`：`weak`属性类似于`assign`属性，区别在于如果受影响属性实例被释放，其实例变量将被设置为`nil`。\n\
  \n在 ARC 下，`strong`是对象类型属性的默认所有权属性。\n\n### 使用 ARC\n\n现在，你将开发一个使用 ARC 的示例程序。你将采用之前使用\
  \ MRR 内存管理的程序（`OrderEntry`），创建一个使用 ARC 内存管理的新版本。这将让你获得一些使用 ARC 编程的实践经验，并了解它如何简化应用程序的内存管理。你可能还记得，之前开发的`OrderEntry`程序包含三个类：一个用于记录产品订单的`OrderEntry`类，以及依赖类`OrderItem`和`Address`。\n\
  \n在 Xcode 中，通过从 Xcode 的“文件”菜单中选择**新建 ![image](img/arrow.jpg) 项目...**来创建一个新项目。在新建项目助手窗格中，创建一个命令行应用程序（从\
