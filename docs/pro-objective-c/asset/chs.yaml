  \n### 完成您的试运行\n\n您现在已经创建了一个名为 `Elements` 的 Xcode 项目。如果您查看项目窗口的导航器区域，顶部会看到一个由七个按钮组成的选择栏，其下方是主导航器区域。单击最左侧的按钮（文件夹图标）即可查看项目导航器视图。项目导航器显示项目或\
