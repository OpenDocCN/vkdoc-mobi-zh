- "# 第 2 章：使用类\n\n类是面向对象编程（OOP）的构建块。实际上，使用 OOP 创建的程序主要由一个相互作用的*类实例*（即对象）网络组成。Objective-C\
  \ 语言为 OOP 提供了全面支持，包括支持在设计时指定类和运行时创建类实例的语言特性，以及支持对象交互的多种机制。\n\n本章重点介绍 Objective-C\
  \ 用于开发类的关键元素和独特特性。它涵盖了 Objective-C 类结构、类设计与实现等关键领域，以及一些支持类开发和 OOP 的附加语言特性。本章还包含大量示例（以及您将开发的一个程序），以加深您对这些概念的理解。听起来很有趣，对吧？好的，那么让我们开始吧！\n\
  \n## 开发您的第一个类\n\n面向对象编程是一种强调创建和使用软件对象来编写程序的计算机编程风格。一个*软件对象*提供了对被建模事物/概念的特征或属性（其*状态*）的表示，以及对其所能执行操作（其*方法*）的定义。使用\
  \ Objective-C，您可以通过类*接口*和相应的*实现*来创建对象的规范或蓝图。在接口中，您指定类的结构（即其属性和方法）。在实现中，您指定存储类内部状态的变量，并通过定义其属性和方法来实现其逻辑。Objective-C\
  \ 语言还提供了几个用于开发类的附加特性，特别是*协议*和*类别*，您将在本章后面部分了解它们。现在，让我们从基础知识开始，向 `Elements` 项目添加一个类。\n\
  \n### 向项目添加一个类\n\n在 Xcode 中，选择导航器区域中的 **Elements** 文件夹，然后通过从 Xcode 的 File 菜单中选择\
  \ **New ![image](img/arrow.jpg) File . . .** 来创建一个新文件。将显示新建文件模板。接下来，在 OS X 下选择 **Cocoa**；这会显示\
  \ Objective-C 类元素的模板。选择 **Objective-C class 图标**来创建一个包含实现文件和头文件的 Objective-C 类，然后单击**下一步**按钮（如图\
  \ 2-1 所示）。\n\n![9781430250500_Fig02-01.jpg](img/9781430250500_Fig02-01.jpg)\n\n\
  图 2-1. 创建 Objective-C 类\n\n\n\n此时会显示一个窗口，用于为你的类选择选项，具体来说就是其名称及其子类的名称。如图 2-2 所示，在类名处输入\
  \ `Atom`，从子类下拉列表中选择 `NSObject`（或在列表中键入子类名称），然后单击 `Next`。\n\n![9781430250500_Fig02-02.jpg](img/9781430250500_Fig02-02.jpg)\n\
  \n图 2-2. 指定 Atom 类选项\n\n接下来，系统会提示你指定该类的项目目标以及在文件系统中保存类文件的位置。将位置保留为 Elements 文件夹，项目目标保留为\
  \ Elements 项目，然后单击 `Create` 按钮（参见 图 2-3）。\n\n![9781430250500_Fig02-03.jpg](img/9781430250500_Fig02-03.jpg)\n\
  \n图 2-3. 类文件文件夹和项目目标\n\n你已经使用 Xcode 创建了一个类！在 Xcode 的项目导航器窗格中，你会看到 `Atom` 类被分成了两个文件（`Atom.h`\
  \ 和 `Atom.m`），它们已被添加到 Elements 文件夹下的项目中。接下来，你将在此文件中开发 `Atom` 类。\n\n## 编写 Atom 类接口\n\
  \n`Atom` 类的接口在 `Atom.h` 头文件中指定，实现则在 `Atom.m` 文件中。这些文件的名称反映了 Objective-C 的约定，即头文件以\
  \ `.h` 为后缀，实现文件以 `.m` 为后缀。我们来看一下 Xcode 创建的 `Atom.h` 接口文件。在项目导航器窗格中，选择 `Atom.h`，然后在编辑器窗格中查看\
  \ Atom 接口（参见 代码清单 2-1）。\n\n*代码清单 2-1.* Atom 类基接口\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Atom : NSObject\n@end\n```\n\n`#import <Foundation/Foundation.h>` 这一行是一个\
  \ Objective-C *预处理器*指令，用于在此（`Atom`）头文件中包含 Foundation 框架的头文件。预处理器用于在编译前转换 Objective-C\
  \ 代码（你将在本书的第 5 章中了解有关预处理器的更多信息）。Foundation 框架提供了一套基础层 API，可用于任何类型的 Objective-C 程序（本书第\
  \ 3 部分将深入探讨 Foundation 框架 API）。头文件的其余部分则声明了 `Atom` 类的接口。\n\n类接口声明以 `@interface`\
  \ 指令和类名开头，以 `@end` 指令结束。声明类接口的正式语法如代码清单 2-2 所示。\n\n*代码清单 2-2.* 类接口语法\n\n```\n@interface\
  \ ClassName : SuperclassName\n// 属性和方法声明\n@end\n```\n\n因此，从代码清单 2-1 可以看出，`Atom`\
  \ 类有一个名为 `NSObject` 的超类。超类建立了一个公共接口和实现，专门的子类可以继承、修改和补充它。因此，`Atom` 类*继承*了 `NSObject`\
  \ 类的功能。`NSObject` 是大多数 Foundation 框架类层次结构的根（即基）类，并为 Objective-C 运行时提供了基本接口。因此，你在此实现的大多数类都将继承自\
  \ `NSObject` 类层次结构。现在，让我们为 `Atom` 类声明自定义属性和方法（即那些不是从 `NSObject` 继承的）。在编辑器窗格中，按代码清单\
  \ 2-3 所示更新 `Atom.h` 文件（代码更新部分以粗体显示）。\n\n*代码清单 2-3.* Atom 接口\n\n```\n@interface Atom\
  \ : NSObject\n@property (readonly) NSUInteger protons;\n@property (readonly) NSUInteger\
  \ neutrons;\n@property (readonly) NSUInteger electrons;\n@property (readonly) NSString\
  \ *chemicalElement;\n\n- (NSUInteger) massNumber;\n@end\n```\n\n这段代码向类声明中添加了几个属性和一个*实例*方法。属性\
  \ `chemicalElement` 的类型是 `NSString *`（即指向文本字符串的指针），并具有 `readonly` 属性，这意味着你可以获取其值，但无法设置。属性\
  \ `protons`、`neutrons` 和 `electrons` 的类型都是 `NSUInteger`（即非负整数值），并且是只读的。名为 `massNumber`\
  \ 的实例方法返回一个非负整数值。你将在本章后面了解声明类属性和方法的具体细节。在此期间，让我们通过编写类实现来完成这个示例。\n\n## 编写 Atom 类实现\n\
  \n`Atom` 类的实现在 `Atom.m` 文件中提供。在项目导航器窗格中，选择 `Atom.m` 文件，然后在编辑器窗格中查看基本的 Atom 实现，如代码清单\
  \ 2-4 所示。\n\n*代码清单 2-4.* Atom 类基实现\n\n```\n#import \"Atom.h\"\n\n@implementation\
  \ Atom\n@end\n```\n\n`import` 指令包含了 `Atom.h` 头文件的内容（即其预处理器指令、接口声明以及其他包含的头文件）。现在，让我们定义在\
  \ Atom 接口中声明的 `Atom` 类的自定义属性和方法。在编辑器窗格中，按代码清单 2-5 所示更新 `Atom.m` 文件（代码更新部分以粗体显示）。\n\
  \n*代码清单 2-5.* Atom 类实现\n\n```\n@implementation Atom\n\n- (id) init\n{\n  if ((self\
  \ = [super init]))\n  {\n    _chemicalElement = @\"None\";\n  }\n\nreturn self;\n\
  }\n\n- (NSUInteger) massNumber\n{\n  return 0;\n}\n\n@end\n```\n\n在类接口中声明的所有方法都必须在类实现中定义。因此，代码清单\
  \ 2-5 中的 Atom 实现定义了两个方法：`init()` 和 `atomicMass()`。`massNumber()` 方法是在 Atom 接口中声明的，因此该方法的具体程序逻辑在这里定义；它仅为原子质量数返回值\
  \ 0。这里也定义了 `init()` 方法，但这是为什么呢？毕竟，这个方法并未在 Atom 接口中声明。实际上，`init()` 方法是在 `NSObject`\
  \ 中声明的，而 `NSObject` 是 `Atom` 类的子类（即父类）。`NSObject init()` 方法用于在为新对象分配内存后立即对其进行初始化；因此，如果你需要执行任何自定义的初始化功能（将实例变量设置为已知值等），则应在此处进行。在此实现中，`init()`\
  \ 方法将由 `chemicalElement` 属性支持的实例变量初始化为文本字符串 `None`。\n\n完成对 `Atom` 类实现的更新后，你应该测试你的类。首先，回到\
  \ `main()` 方法，并按代码清单 2-6 所示进行编辑。\n\n*代码清单 2-6.* Atom 项目 main() 方法\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"Atom.h\"\n\nint main(int argc, const char\
  \ * argv[])\n{\n  @autoreleasepool\n  {\n    Atom *atom = [[Atom alloc] init];\n\
  \    NSLog(@\"Atom chemical element name: %@\", atom.chemicalElement);\n  }\n\n\
  return 0;\n}\n```\n\n\n  \n在`main()`方法中，创建一个`Atom`对象，然后使用 Foundation 框架的`NSLog`函数将该对象的化学元素名称显示到输出窗格。通过从\
  \ Xcode 的 File 菜单中选择**保存**来保存项目的所有文件，然后点击工具栏中的**运行**按钮编译并运行程序。（你也可以直接编译和运行程序，它会自动保存对文件的任何更改。）输出窗格（参见图\
  \ 2-4）会显示消息“Atom chemical element name: None”。\n\n![9781430250500_Fig02-04.jpg](img/9781430250500_Fig02-04.jpg)\n\
  \n图 2-4 测试`Atom`类\n\n很好。你已经成功实现并测试了你的第一个 Objective-C 类。通过这个入门介绍，你现在可以“深入内部”来深入学习类的知识了——那么，让我们开始吧！\n\
  \n### 实例变量\n\n实例变量（有时称为*ivars*）是为类声明的变量，它们在对应的类实例（即对象）的整个生命周期中存在并保持其值。实例变量使用的内存在对象首次创建时分配，并在对象被释放时释放。实例变量具有与对象对应的隐式作用域和命名空间。Objective-C\
  \ 提供了控制对实例变量直接访问的特性，以及获取/设置其值的便捷机制。\n\n### 实例变量访问\n\n对对象实例变量的访问由其作用域决定。在对象内部，其实例变量可以从任何实例方法中直接访问。从外部类实例对对象实例变量的直接访问由变量的作用域决定。Objective-C\
  \ 提供了几个编译器指令，用于显式指定实例变量的作用域（即控制访问权限）：\n\n*   `@private`：实例变量仅能在声明它的类及该类的其他实例内部访问。\n\
  *   `@protected`：实例变量能在声明它的类及其任何子类的实例方法内部访问。如果未为实例变量指定保护级别，这是默认作用域。\n*   `@public`：实例变量可以在任何地方访问。\n\
  *   `@package`：实例变量可以从任何其他类实例或函数访问，但在包外部，它被视为`private`。此作用域对库或框架类很有用。\n\n### 声明实例变量\n\
  \n实例变量可以在类接口或实现中声明；然而，在类的公共接口中声明它们会违反 OOP（面向对象编程）的关键原则之一——封装。因此，推荐的做法是在类实现中声明实例变量；具体来说，是在紧跟在类`@implementation`指令之后的语句块内。声明语法如列表\
  \ 2-7 所示。\n\n*列表 2-7.* 实例变量声明语法\n\n```\n@implementation ClassName\n{\n  // Instance\
  \ variable declarations\n}\n...\n@end\n```\n\n如果使用了访问控制编译器指令，则在语句块中声明每个实例变量的语法会更新，如列表\
  \ 2-8 所示。\n\n*列表 2-8.* 带有访问控制指令的实例变量声明\n\n```\n{\n  protection_directive ivar_declaration_list\n\
  \  protection_directive ivar_declaration_list\n  ...\n}\n```\n\n一个使用访问控制编译器指令声明实例变量的示例类，如列表\
  \ 2-9 所示。\n\n*列表 2-9.* 带有实例变量声明的示例类\n\n```\n@implementation MyTestClass\n{\n  @protected\n\
  \    int myInt1;\n    int myInt2;\n  @private\n    float myFloat;\n  @package\n\
  \    double myDouble;\n}\n...\n@end\n```\n\n这个类声明了两个受保护的变量`myInt1`和`myInt2`；一个私有变量`myFloat`；以及一个包保护变量`myDouble`。\n\
  \n### 访问实例变量\n\n实例变量直接绑定到对应的对象并存在于其上下文中。因此，对象的实例方法可以直接访问其实例变量。例如，如果列表 2-9 中所示的`MyTestClass`类定义了一个实例方法`myTestMethod`，该方法可以直接访问实例变量`myInt1`（参见列表\
  \ 2-10）。\n\n*列表 2-10.* 实例变量访问声明\n\n```\n-(void) myTestMethod\n{\n  myInt1 = 1;\n\
  \  ...\n}\n```\n\n尽管实例变量提供了对对象状态的便捷、直接访问，但它们暴露了类的内部细节——这违反了 OOP 的封装原则。因此，只有在必要时才应声明实例变量，并且声明应放在类实现中，而不是公共接口中。公开暴露对象内部状态的首选方法是通过*声明属性*。下面我们来看看这些。\n\
  \n### 属性\n\n在许多编程语言中，访问对象内部状态的方法（通常称为*getter/setter 方法*）必须手动编码。Objective-C 提供了声明属性来自动化和简化此任务。属性与实例变量的不同之处在于，它不直接访问对象的内部状态，而是提供一种便捷的机制（即\
  \ getter/setter 方法）来访问这些数据，因此可能包含其他逻辑。Objective-C 的*声明属性*使编译器能够根据你提供的规范自动生成这些方法。这减少了你需要编写和维护的代码量，并提高了程序的一致性和可靠性。\n\
  \n### 属性声明\n\n属性使用`@property`关键字声明，后跟一组可选的属性（用括号括起来）、属性类型及其名称。\n\n```\n@property\
  \ (attributes) type propertyName;\n```\n\n例如，你之前开发的`Atom`类（参见列表 2-3）声明了属性`chemicalElement`、`protons`、`neutrons`和`electrons`。属性可以在*类接口*、*类别接口*或*协议*中声明。该声明设置了与属性关联的\
  \ getter/setter 方法的签名，但不会生成实际的方法定义。\n\n### 属性特性\n\n属性声明特性用于指定与属性相关的存储语义和其他行为。最常用的属性特性在表\
  \ 2-1 中进行了描述。\n\n表 2-1 属性特性  \n\n\n\n| 类别 | 属性 | 描述 |\n| --- | --- | --- |\n| 原子性\
  \ | `nonatomic` | 访问器不是原子的，因此当多个线程同时访问时，可能会产生不同的结果。如果未指定，访问器是原子的；也就是说，它们的值总是被完整地设置/获取。\
  \ |\n| 设置器语义 | `assign` | 设置器方法对属性值执行简单的赋值，不使用 `copy` 或 `retain`。这是默认设置。 |\n|  |\
  \ `retain` | 赋值时，输入值将收到一条 `retain` 消息，而先前的值将收到一条 `release` 消息。 |\n|  | `copy` |\
  \ 赋值时，将设置新消息的一个副本，而先前的值将收到一条 `release` 消息。 |\n|  | `strong` | 此属性（在属性上应用 ARC 内存管理时使用）等同于\
  \ `retain` 属性。 |\n|  | `weak` | 此属性（在属性上应用 ARC 内存管理时使用）类似于 `assign` 属性，不同之处在于，如果受影响的属性被释放，其值会被设置为\
  \ `nil`。 |\n| 读/写 | `readwrite` | 该属性可读可写。必须同时实现 getter 和 setter 方法。这是默认设置。 |\n\
  |  | `read-only` | 该属性只可读取，不可写入。必须实现 getter 方法。 |\n| 方法名称 | `getter=getterName`\
  \ | 将 getter 重命名为指定的 `getterName`。 |\n|  | `setter=setterName` | 将 setter 重命名为指定的\
  \ `setterName`。 |\n\n### 属性定义\n\n属性定义在类的实现部分进行。在大多数情况下，属性由一个实例变量支持；因此，属性定义包括为该属性定义\
  \ getter 和 setter 方法、声明一个实例变量，以及在 getter/setter 方法中使用该变量。Objective-C 提供了几种定义属性的方法：显式定义、通过关键字合成以及自动合成。\n\
  \n### 显式定义\n\n对于这种属性定义方法，其方法在相应的类实现中被显式定义。例如，名为 `myIntProperty` 的属性的 setter 方法可以如代码清单\
  \ 2-11 所示进行定义。\n\n*代码清单 2-11.* 属性设置器方法定义\n\n```\n-(void) setMyIntProperty:(int)\
  \ value\n{\n  _myIntProperty = value;\n{\n```\n\n与属性对应的变量名称以下划线开头。此命名反映了 Objective-C\
  \ 中属性实例变量的标准命名约定，即变量名称为属性名称，并加上下划线前缀。\n\n### 通过关键字合成\n\n通过使用 `@synthesize` 关键字，编译器可以自动生成属性定义。属性在相应的类实现部分被合成。通过关键字合成属性的语法是\n\
  \n```\n@synthesize propertyName [= instanceVariableName];\n```\n\n如果未提供可选的 `instanceVariableName`\
  \ 赋值，编译器将遵循属性支持实例变量的标准命名约定自动生成实例变量名称。如果提供了 `instanceVariableName` 值，编译器将使用提供的名称创建实例变量。对于名为\
  \ `myIntProperty` 的属性，使用以下语句将自动生成 getter 和 setter 方法：\n\n```\n@synthesize myIntProperty;\n\
  ```\n\n编译器将创建一个名为 `_myIntProperty` 的相应实例变量。\n\n### 自动合成\n\n推荐的 Apple Objective-C\
  \ 编译器 Clang/LLVM（4.2 版本及以上）支持对已声明属性进行自动合成。这意味着编译器将自动合成那些既不是：1）通过关键字合成（例如，使用 `@synthesis`）；2）动态生成（通过\
  \ `@dynamic` 属性指令）；也不是 3）具有用户提供的 getter 和 setter 方法的已声明属性。因此，在使用此功能时，无需包含代码来合成已声明的属性。一个已声明的属性连同相应的实例变量会被编译器自动合成。之前实现的\
  \ `Atom` 类（参见代码清单 2-3）对其声明的属性使用了自动合成。\n\n### 动态生成\n\n属性的访问器方法可以在运行时被委托或动态创建。在这些情况下，可以使用\
  \ `@dynamic` 属性指令来防止编译器自动生成访问器方法。如果编译器找不到与名称跟在 `@dynamic` 属性后的属性相关联的访问器方法的实现，它不会生成警告。相反，开发者负责通过直接编写访问器方法实现、使用其他方式派生它们（例如动态代码加载或动态方法解析），或利用动态生成这些方法的软件库（例如\
  \ Apple Core Data 框架）来创建这些方法。\n\n### 属性支持的实例变量\n\n大多数属性由一个实例变量支持，因此这是属性隐藏对象内部状态的机制。除非另有说明，实例变量应与属性同名，但带有下划线前缀。在代码清单\
  \ 2-5 所示的 `Atom` 类实现中，`init` 方法访问 `chemicalElement` 属性的实例变量，该变量名为 `_chemicalElement`。\n\
  \n### 属性访问\n\nObjective-C 提供了两种访问属性的机制：访问器方法和点表示法。由编译器合成的访问器方法遵循标准命名约定：\n\n*   用于访问值的方法（*getter*\
  \ 方法）与属性同名。\n*   用于设置值的方法（*setter* 方法）以单词“set”开头，后接属性名，且属性名的首字母大写。\n\n使用这些约定，名为\
  \ `color` 的属性的 getter 方法将被命名为 `color`，其 setter 方法将被命名为 `setColor`。因此，对于一个名为 `myObject`\
  \ 的对象，其 getter 和 setter 访问器方法将如下调用：\n\n```\n[myObject color];\n[myObject setColor:value];\n\
  ```\n\nObjective-C 为访问器方法提供了一种简洁的替代方案：*点表示法*。用于获取和设置名为 `myObject` 的对象的属性的点表示法语法是：\n\
  \n```\nmyObject.propertyName;\nmyObject.propertyName = propertyValue;\n```\n\n第一条语句调用\
  \ getter 访问器方法来检索属性的值，第二条语句调用 setter 访问器方法将属性设置为 `propertyValue` 的值。\n\n通常，应使用上述两种机制来访问属性。但是，如果与属性关联的对象尚未（或可能尚未）完全构造，则不应使用这些机制，而应改用属性支持的实例变量。这意味着在类的\
  \ `init` 方法或 `dealloc` 方法中，应直接访问实例变量，如代码清单 2-5 中 `Atom` 类的 `_chemicalElement` 实例变量所示。\n\
  \n方法\n\n\n\n## 方法\n\n方法定义了类及其实例（对象）在运行时所展现的行为。它们直接与 Objective-C 类（类方法）或对象（实例方法）相关联。实例方法可以直接访问对象的实例变量。方法可以在类接口、协议和/或类别中声明。如此声明的方法需在相应的类实现中进行定义。\n\
  \n### 语法\n\n方法声明由方法类型、返回类型以及一个或多个提供名称、参数和参数类型信息的方法片段组成（请参见图 2-5）。\n\n![9781430250500_Fig02-05.jpg](img/9781430250500_Fig02-05.jpg)\n\
  \n图 2-5。方法声明语法\n\n*方法类型*标识符指定该方法是类方法还是实例方法。类方法使用 `+`（加号）声明，表示该方法具有*类范围*，意味着它在类级别运行，并且无法访问类的实例变量（除非它们作为参数传递给该方法）。实例方法使用\
  \ `–`（减号）声明，表示该方法具有*对象范围*。它在实例级别运行，并且可以直接访问对象及其父对象的实例变量（受限于实例变量的访问控制）。\n\n*返回类型*指示方法返回变量的类型（如果有）。返回类型位于方法类型之后的圆括号内。如果方法不返回任何内容，则返回类型声明为\
  \ `void`。图 2-5 声明了一个带有两个参数的类方法，参数名分别为 `np` 和 `nn`，每个参数都接受一个非负整数值，并返回一个类型为 `id` 的值，这是一种特殊的\
  \ Objective-C 类型，我将在下一章讨论。\n\n方法定义的语法与声明语法相同，但不是在末尾使用分号，而是后跟用花括号括起来的实现逻辑。`Atom`\
  \ 类声明了一个名为 `massNumber` 的实例方法；该方法的实现如代码清单 2-5 所示。\n\n### 调用方法\n\n在 Objective-C 中，一个对象（*发送者*）通过向另一个对象（*接收者*）发送消息来与之交互，从而使接收者调用特定的方法。在对象上调用方法的语法为：\n\
  \n```\n[接收者 方法片段名:参数值 ...];\n```\n\n消息由方括号包围。如果方法有多个片段，则其名称和参数值依次列出，每个之间用空格分隔。一个包含多个名称/参数值对的方法调用示例如下：\n\
  \n```\n[Atom withProtons:6 neutrons:6 electrons:6];\n```\n\n此方法调用包含三个片段，因此需要三个输入参数：质子数、中子数和电子数，均为整数。\n\
  \n### 协议\n\n您已经了解了 Objective-C 类的基本元素和结构，但该语言还提供了几个用于开发类的附加特性。在本节中，您将学习其中之一：协议。\n\
  \n*协议*声明了任何类都可以实现的方法和属性。类接口直接与特定类相关联，从而与类层次结构相关联。另一方面，协议不与任何特定类相关联，因此它可以用来捕获层次结构上不相关的类之间的相似性。协议为\
  \ Objective-C 提供了支持规范多重继承（即方法声明的多重继承）概念的能力。协议还可以用于定义对象可以发送的消息（通过指定符合协议的要求）。\n\n\
  ### 语法\n\n协议声明以 `@protocol` 指令开头，后跟协议名称。它以 `@end` 指令结束。协议可以包含*必需*和*可选*方法；可选方法不要求协议的实现方必须实现这些方法。使用\
  \ `@required` 和 `@optional` 指令（后跟方法名称）来适当地标记方法。如果未指定任一关键字，则默认为必需。协议声明的语法如代码清单 2-12\
  \ 所示。\n\n*代码清单 2-12.* 协议声明语法\n\n```\n@protocol 协议名\n// 属性声明\n@required\n// 方法声明\n\
  @optional\n// 方法声明\n@end\n```\n\n一个协议可以通过在尖括号内指定每个已声明协议的名称来合并其他协议；这被称为*采纳*一个协议。使用逗号分隔多个协议（请参见代码清单\
  \ 2-13）。\n\n*代码清单 2-13.* 合并其他协议\n\n```\n@protocol 协议名<协议名(列表)>\n// 方法声明\n@end\n\
  ```\n\n接口可以使用类似的语法采纳其他协议（请参见代码清单 2-14）。\n\n*代码清单 2-14.* 采纳协议的接口\n\n```\n@interface\
  \ 类名 : 父类 <协议名(列表)>\n// 方法声明\n@end\n```\n\n为了将理论付诸实践，您将向 `Atom` 项目添加一个协议，并使 `Atom`\
  \ 实现遵循（即实现）该协议的必需方法。从 Xcode 工作区窗口，在导航区域中选择 **Elements** 文件夹，然后创建一个新文件（通过从 Xcode\
  \ 文件菜单中选择 **新建 ![image](img/arrow.jpg) 文件...**），就像您之前所做的那样。将显示新文件模板。和之前一样，在 OS X\
  \ 下选择 **Cocoa**，但不要创建 Objective-C 类，而是选择 **Objective-C 协议图标**来创建一个遵循 `NSObject`\
  \ 协议的协议。接下来，单击 **下一步** 按钮（请参见图 2-6）。\n\n![9781430250500_Fig02-06.jpg](img/9781430250500_Fig02-06.jpg)\n\
  \n图 2-6。使用 Xcode 创建协议\n\n在指定新文件选项的下一个窗口中，输入 **Writer** 作为协议名称，然后单击 **下一步** 按钮。接下来，系统将提示您指定在文件系统中保存类文件的位置以及类的项目目标。将位置保留为\
  \ **Elements** 文件夹，选择 **Elements** 作为项目目标（如果尚未选中），然后单击 **创建** 按钮。一个名为 `Writer.h`\
  \ 的头文件已添加到 Xcode 项目导航窗格中。单击此文件以显示 Writer 协议（请参见代码清单 2-15）。\n\n*代码清单 2-15.* 协议模板文件\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@protocol Writer <NSObject>\n\n@end\n\
  ```\n\n在编辑窗格中，按代码清单 2-16 所示更新 `Writer.h` 文件（代码更新以**粗体**显示）。\n\n*代码清单 2-16.* 协议方法声明\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@protocol Writer <NSObject>\n\n- (void)write:(NSFileHandle\
  \ *)file;\n\n@end\n```\n\n此协议声明了一个名为 `write` 的方法，该方法接受一个指向 `NSFileHandle` 的引用作为参数，并且不返回任何内容。为了使\
  \ `Atom` 接口采纳此协议，在导航窗格中选择 `Atom.h` 文件，然后进行以**粗体**显示的更新（请参见代码清单 2-17）。\n\n*代码清单 2-17.*\
  \ 采纳协议\n\n```\n#import <Foundation/Foundation.h>\n#import \"Writer.h\"\n\n@interface\
  \ Atom : NSObject <Writer>\n```\n\n\n\n```objectivec\n@property (readonly) NSUInteger\
  \ protons;\n@property (readonly) NSUInteger neutrons;\n@property (readonly) NSUInteger\
  \ electrons;\n@property (readonly) NSString *chemicalElement;\n\n- (NSUInteger)\
  \ massNumber;\n\n@end\n```\n\n`Atom` 接口已有效扩展了来自 `Writer` 协议的方法。请选择 `Atom.m` 实现文件，并添加如列表\
  \ 2-18 所示的代码。\n\n*列表 2-18.* Atom 类实现\n\n```objectivec\n@implementation Atom\n...\n\
  \n- (void)write:(NSFileHandle *)file\n{\n  NSData *data = [self.chemicalElement\n\
  \                  dataUsingEncoding:NSUTF8StringEncoding];\n  [file writeData:data];\n\
  \  [file closeFile];\n}\n...\n@end\n```\n\n现在，`Atom` 类遵循 `Writer` 协议，向 `Atom` 对象发送\
  \ `write:` 消息时，会将化学元素名称写入文件。这是一个示例，说明如何使用协议在不同层级结构的类之间提供通用行为。\n\n## 类别\n\n类别允许在不创建子类的情况下，向现有类添加新功能。类别中的方法会成为该类类型的一部分（在程序范围内），并会被其所有子类继承。这意味着你可以向该类（或其子类）的任何实例发送消息，以调用类别中定义的方法。通常，类别用于：1)\
  \ 扩展由他人定义的类（即使你无法访问其源代码）；2) 作为子类的替代方案；3) 将新类的实现分散到多个源文件中（这有助于简化由多个程序员开发的大型类）。\n\n\
  类别接口声明以 `@interface` 关键字开头，后跟现有类的名称以及括号中的类别名称，再后面是它采用的协议（如果有）。声明以 `@end` 关键字结尾。在这些语句之间，提供方法声明。类别的声明语法如列表\
  \ 2-19 所示。\n\n*列表 2-19.* 类别声明语法\n\n```objectivec\n@interface ClassName (CategoryName)\n\
  // 方法声明\n@end\n```\n\n现在，我们通过添加一个类别来扩展 `Atom` 类。像之前一样，在 Xcode 工作区窗口中，选择导航器区域中的 **Elements**\
  \ 文件夹，然后创建一个新文件（从 Xcode 文件菜单中选择 **新建** ![image](img/arrow.jpg) **文件...**）。在 OS X\
  \ 下选择 **Cocoa**；不过这次选择 **Objective-C 类别图标**来创建包含实现文件和头文件的类别，然后点击 **下一步** 按钮。\n\n\
  在指定新文件选项的下一个窗口中，在类别名称中输入 **Nuclear**，从类别的下拉列表中选择 **Atom**，然后点击 **下一步** 按钮。接下来，系统会提示你指定在文件系统中保存类文件的位置以及类的项目目标。将位置保留为\
  \ Elements 文件夹，选择 **Elements** 作为项目目标（如果尚未选中），然后点击 **创建** 按钮。在 Xcode 项目导航窗格中，Elements\
  \ 文件夹下新增了两个文件：`Atom+Nuclear.h` 和 `Atom+Nuclear.m`。这些文件分别是类别接口和实现文件。在 `Atom+Nuclear.h`\
  \ 头文件中，更新类别接口，如列表 2-20 所示。\n\n*列表 2-20.* Nuclear 类别接口\n\n```objectivec\n#import\
  \ \"Atom.h\"\n\n@interface Atom (Nuclear)\n\n-(NSUInteger) atomicNumber;\n\n@end\n\
  ```\n\n此类别声明了一个名为 `atomicNumber` 的方法，该方法返回一个非负整数。选择 `Atom+Nuclear.m` 源文件，并更新类别实现，如列表\
  \ 2-21 所示。\n\n*列表 2-21.* Nuclear 类别实现\n\n```objectivec\n#import \"Atom.h\"\n#import\
  \ \"Atom+Nuclear.h\"\n```\n\n\n```objectivec\n@implementation Atom (Nuclear)\n\n\
  -(NSUInteger) atomicNumber\n{\n  return self.protons;\n}\n\n@end\n```\n\n至此，`Nuclear`\
  \ 分类的实现完成，从而为 `Atom` 类及其所有子类添加了 `atomicNumber` 方法。现在我们来测试这个类。在 `main.m` 文件中，按照 代码清单\
  \ 2-22 所示更新 `main()` 方法。\n\n*代码清单 2-22.*  测试 Nuclear 分类的代码\n\n```objectivec\n#import\
  \ <Foundation/Foundation.h>\n#import \"Atom.h\"\n#import \"Atom+Nuclear.h\"\n\n\
  int main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    Atom *atom\
  \ = [[Atom alloc] init];\n    NSLog(@\"Atomic number = %lu\", [atom atomicNumber]);\n\
  \  }\n\nreturn 0;\n}\n```\n\n保存项目的所有文件：从 Xcode 的 **文件（File）** 菜单中选择 **保存（Save）**，然后通过点击工具栏中的\
  \ **运行（Run）** 按钮来编译并运行项目。如图 2-7 所示的输出窗格会显示消息 \"Atom number = 0\"。\n\n![9781430250500_Fig02-07.jpg](img/9781430250500_Fig02-07.jpg)\n\
  \n图 2-7. 测试 Nuclear 分类\n\n就是这样。你已经为 `Atom` 类创建了一个分类，该分类添加了一个实例方法，用于返回 `Atom` 对象的原子序数。现在让我们看看扩展。\n\
  \n## 扩展（Extensions）\n\n*扩展* 被认为是一种匿名（即未命名）分类。在扩展中声明的方法*必须*在相应类的主 `@implementation`\
  \ 代码块中实现（它们不能在分类中实现）。类扩展的语法如代码清单 2-23 所示。\n\n*代码清单 2-23.*  扩展声明语法\n\n```objectivec\n\
  @interface ClassName ()\n{\n  // 实例变量声明\n}\n\n// 属性声明\n// 方法声明\n@end\n```\n\n如代码清单\
  \ 2-23 所示，扩展与分类的不同之处在于它可以声明实例变量和属性。编译器会验证扩展中声明的方法（和属性）是否已实现。类扩展通常与类实现文件放在同一个文件中，用于分组和声明额外必需的私有方法（例如，不属于公开声明的\
  \ API），仅供类内部使用。\n\n### 小结\n\n呼！这可真是对 Objective-C 和开发类的一次详尽介绍！你在本章中涵盖了大量内容，让我们花点时间回顾一下所学到的知识：\n\
  \n*   一个 Objective-C 类由接口和实现组成。\n    *   接口*声明*类的属性和方法。\n    *   实现*定义*类的实例变量、属性和方法。\n\
  *   接口可以使用*继承*来获取类层次结构中子类的属性和方法。\n*   按照惯例，类接口存储在（磁盘上的）头文件（后缀为 `.h`）中，而其实现则存储在后缀为\
  \ `.m` 的文件中。\n*   协议（Protocol）声明了任何类都可以实现的方法和属性。它们通常用于为没有层次关系的类提供通用行为。\n*   分类（Category）允许在不创建子类的情况下，为现有类添加新功能。通常，分类用于：1)\
  \ 扩展由其他人定义的类（即使你无法访问源代码）；2) 作为子类的替代方案；或者 3) 将新类的实现分布到多个源文件中。扩展可以被视为一种匿名分类；但其声明必须在类的主实现代码块中实现。扩展还可以声明实例变量和属性。\n\
  *   Xcode 提供了用于创建 Objective-C 类、协议、分类和扩展的模板，从而轻松开始开发你自己的类。\n\n这是关于使用 Objective-C\
  \ 和 Xcode 开发类的详细入门指南，所以现在是个好时机，休息一下并回顾你所学的内容。在下一章中，你将接着探索使用 Objective-C 进行对象消息传递的细节。\n\
  \n"
- "# 第 3 章：对象与消息传递\n\n既然你已经对如何使用 Objective-C 创建类有了很好的理解，你可能会想：“我该如何使用这些类呢？”这正是本章的重点；具体来说，就是使用\
  \ Objective-C 进行对象创建、初始化以及在对象上调用方法。\n\n正如你在第 2 章 中所学到的，Objective-C 类由其实例变量、属性和方法定义。此外，通过面向对象编程的继承，一个类还包含其父类的状态和行为（即方法和实例变量）。在运行时，面向对象程序通过创建对象，并使用消息传递——一种在对象和类上调用方法的面向对象编程机制——在这些对象上调用所需操作来执行其逻辑。\n\
  \n### 创建对象\n\n类实例（即对象）是通过为其分配内存并适当初始化来创建的。同一类别的对象被称为同一类的成员。这意味着它们拥有相同的方法和匹配的实例变量集合。因此，当你创建同一类型的对象时，实际上是在为对象创建一组实例变量——以及一组指向为该类定义的方法的指针。\n\
  \n每个类都存在于自己的命名空间中。在类定义内部赋值的名称，不会与在其外部任何地方赋值的名称发生冲突。无论是对象数据结构中的实例变量，还是对象的方法，都是如此。因此，一条消息的含义必须相对于接收该消息的特定对象来理解。发送给两个不同对象的同一条消息，可能会调用两种不同的方法。这是面向对象编程的一个基本特性，并简化了类的接口，因为相同的名称（对应于所需操作）可以在不同的类中重用。\n\
  \nFoundation 框架提供了简化对象创建的功能。具体来说，`NSObject` 类包含了用于创建类实例的方法。`NSObject` 的 `alloc`\
  \ 类方法返回指定类类型的新实例；其语法是：\n\n```objectivec\n+ (id) alloc\n```\n\n`id` 是一种 Objective-C\
  \ 类型，用于持有对任何 Objective-C 对象的引用，无论其属于哪个类。`alloc` 方法可以这样调用：\n\n```objectivec\nid varName\
  \ = [ClassName alloc];\n```\n\n这会创建一个 `ClassName` 类型的对象，并将其赋值给一个名为 `varName` 的 `id`\
  \ 类型变量。你也可以按如下方式创建对象：\n\n```objectivec\nClassName *varName = [ClassName alloc];\n\
  ```\n\n这同样会创建一个 `ClassName` 类型的对象并赋值给名为 `varName` 的变量；然而，在这种情况下，该变量的类型是 `ClassName\
  \ *`（即指向 `ClassName` 类的指针）。显式定义变量的类型提供了静态类型检查，但牺牲了灵活性。我们将在本书探讨 Objective-C 运行时的第二部分中进一步讨论这一点。在这两种情况下，`alloc`\
  \ 方法返回的对象都是接收类类型的实例，也称为*相关结果类型*。这意味着发送 `alloc` 消息所返回的对象将具有与接收类相同的类型。正如你在第 2 章 中开发的\
  \ `Atom` 类，你可以使用 `alloc` 方法创建一个 `Atom` 对象并将其赋值给名为 `atom` 的变量：\n\n```objectivec\n\
  Atom *atom = [Atom alloc];\n```\n\n由于 `alloc` 消息的接收类是 `Atom`，因此创建的对象将是 `Atom` 类型。系统会为该对象分配内存，并将其实例变量设置为默认值（零）。\n\
  \n好的，作为高级文档工程师和翻译员，我已仔细阅读您提供的注意事项和示例。下面是根据您的要求，对给定英文文本进行的精确翻译和格式化。\n\n\n好，没问题。作为高级文档工程师，我将遵循您的规则，对提供的文本进行排版。\n\
  \nOK，这很棒：**Objective-C**（以及 Foundation 框架）提供了创建对象所需的一切。但初始化呢？同样，**Objective-C**\
  \ 也提供了机制来初始化新创建的对象。接下来你将了解这些内容。\n\n## 对象初始化\n\n`alloc` 方法为对象分配存储空间，并将其实例变量设置为零，但它不会将对象的实例变量初始化为适当的值，也不会准备对象所需的任何其他必要对象或资源。因此，你的类应该实现一个方法来完善初始化过程。`NSObject`\
  \ 实现了一个 `init` 方法，它为对象初始化提供了基础，你的类至少应该重写此方法，以提供它们所需的任何自定义初始化行为。`NSObject init` 方法的语法是：\n\
  \n```\n- (id) init\n```\n\n注意，`init` 是一个实例方法，并且与 `alloc` 方法一样，它返回类型为 `id` 的对象，这些对象是相关结果类型。还记得你在第\
  \ 2 章中为 `Atom` 类编写的 `init` 方法吗？它显示在**清单 3-1** 中。\n\n*Listing 3-1.* Atom 类的 init\
  \ 方法\n\n```\n- (id) init\n{\n  if ((self = [super init]))\n  {\n    // Initialization\
  \ code here.\n    _chemicalElement = @\"None\";\n  }\n\nreturn self;\n}\n```\n\n\
  让我们详细分析这段代码，以便更好地理解 `init` 方法的职责。这一行代码将多个操作合并到一行中：\n\n```\nif ((self = [super init]))\n\
  ```\n\n方括号内的表达式 `[super init]` 使用其父类的 `init` 方法执行调用对象的初始化。由于这是 `init` 方法中的第一条语句，它保证了对象沿着其继承链一直到层次结构的根对象的一系列初始化（参见**图\
  \ 3-1**）。\n\n![9781430250500_Fig03-01.jpg](img/9781430250500_Fig03-01.jpg)\n\n**图\
  \ 3-1**. 通过 init 方法进行的对象初始化\n\n`init` 方法调用返回的结果被赋值给特殊的 Objective-C 参数 `self`。每个方法都有一个隐式的\
  \ `self` 参数（它不在方法声明中），它是指向接收消息的对象的指针。因此，赋值语句\n\n```\nself = [super init]\n```\n\n\
  调用父类的 `init` 方法，并将结果赋值给调用对象，从而保证（参见**图 3-1**）完成整个类层次结构中所需的所有初始化。\n\n回头看**清单 3-1**，你会发现这个赋值的结果被一个条件\
  \ `if` 语句（在圆括号内）包围（附录 A 提供了 Objective-C 条件语句的完整概述）。这产生了执行条件逻辑的效果。实际上，如果父类初始化成功（即表达式\
  \ `[super init]` 返回一个有效对象），则执行该对象的自定义初始化；否则，`init` 方法返回 `nil`。\n\n按照惯例，初始化方法的名称总是以\
  \ `init` 开头。没有输入参数的初始化方法就直接命名为 `init`。如果初始化方法需要一个或多个输入参数，则名称会相应延长以包含这些输入参数。一个带有一个输入参数的初始化方法声明的示例如下：\n\
  \n```\n-(id)initWithNeutrons:(NSUInteger) neutrons\n```\n\n由于对象分配与初始化是耦合的，这两个方法通常在一行代码中一起执行；例如：\n\
  \n```\nAtom *atom = [[Atom alloc] init];\n```\n\n## 扩展 Elements 项目\n\n现在，你将通过扩展\
  \ Elements 项目来实践你所学的关于对象分配和初始化的知识。在第 2 章中，你创建了一个 `Atom` 类。让我们继承这个类来创建不同类型的原子化学元素！\n\
  \n启动 Xcode 并通过从 Xcode 的“文件”菜单中选择“打开...”来重新打开 Elements 项目。在 Xcode 工作区窗口的导航区域中，选择\
  \ **Elements** 项目，然后通过从 Xcode 的“文件”菜单中选择“新建”![image](img/arrow.jpg)“文件...”来创建一个新文件。像创建\
  \ `Atom` 类时那样，创建一个带有实现文件和头文件的 Objective-C 类。接下来，在为你选择的类选项的窗口中，输入 **Hydrogen** 作为类名，从子类下拉列表中选择\
  \ **Atom**，然后点击 **Next**（参见**图 3-2**）。\n\n![9781430250500_Fig03-02.jpg](img/9781430250500_Fig03-02.jpg)\n\
  \n**图 3-2**. 指定 Hydrogen 类选项\n\n在下一个提示窗口中，将位置保留为 Elements 文件夹，项目目标保留为 Elements 项目，然后点击\
  \ **Create** 按钮来创建 `Hydrogen` 类。\n\n在 Xcode 导航窗格中，你会看到两个新文件（`Hydrogen.h` 和 `Hydrogen.m`）已被创建。稍后，你将为此类创建一个\
  \ `init` 方法，还将创建一个工厂方法，该方法将同时分配和初始化新的 `Hydrogen` 对象；但在那之前，你需要重构 `Atom` 类。\n\n##\
  \ 重构 Atom 类\n\n*重构*是指在不改变现有代码外部行为的情况下重组代码。在开发软件时，你会经常这样做，以改进其设计、促进新功能的添加等等。在此例中，你将重构\
  \ `Atom` 类，以便其子类可以在对象初始化期间访问和更新其实例变量。\n\n如第 2 章的**清单 2-3** 所示，`Atom` 类接口声明了一个名为\
  \ `chemicalElement` 的属性，该属性使用自动合成定义。当编译器自动合成属性时，它会创建一个作用域声明为*私有*的后备实例变量。私有实例变量不能被其子类直接访问，因此你需要重构该类以允许从其子类访问实例变量。你将在实例变量声明块中以\
  \ `protected` 作用域声明该变量。为了将使用自动合成生成的属性方法连接到实例变量，你需要根据标准的属性备用实例变量命名约定来命名它（例如，变量名将与属性名相同，前面加下划线）。\n\
  \n那么，让我们相应地更新 `Atom` 接口。你还要添加另一个只读属性（以及相应的实例变量）。在项目导航窗格中，选择 **Atom.h** 文件，然后在编辑器窗格中，按照**清单\
  \ 3-2** 所示更新 `Atom` 接口（代码更新以**粗体**显示）。\n\n*Listing 3-2.* 重构后的 Atom 接口（带有受保护变量）\n\
  \n```\n@interface Atom : NSObject\n\n// Property-backed instance variables, only\
  \ accessible in the class hierarchy\n{\n  @protected NSUInteger _protons;\n  @protected\
  \ NSUInteger _neutrons;\n  @protected NSUInteger _electrons;\n  @protected NSString\
  \ *_chemicalElement;\n  @protected NSString *_atomicSymbol;\n}\n\n@property (readonly)\
  \ NSUInteger protons;\n@property (readonly) NSUInteger neutrons;\n@property (readonly)\
  \ NSUInteger electrons;\n@property (readonly) NSString *chemicalElement;\n@property\
  \ (readonly) NSString *atomicSymbol;\n\n- (NSUInteger) massNumber;\n\n@end\n```\n\
  \n\n\n在清单 3-2 中，你现在声明了具有`protected`作用域的属性支持的实例变量，从而使子类能够直接访问（和更新）它们。你还添加了一个新属性，用于检索`Atom`对象的原子符号。\n\
  \n接下来，让我们更新`Atom`实现以反映这些更改。选择**Atom.m**文件，然后更新`massNumber`实例方法的`Atom`实现，如清单 3-3\
  \ 所示。\n\n***清单 3-3*** Atom 实现 `massNumber` 方法\n\n```\n- (NSUInteger) massNumber\n\
  {\n  return self.protons + self.neutrons;\n}\n```\n\n如你所见，原子的质量数计算为其拥有的质子数与中子数之和。好的，这就是你现在要对`Atom`类进行的所有重构。接下来让我们更新`Hydrogen`类。\n\
  \n### 创建 Hydrogen 初始化方法\n\n现在你将针对`Hydrogen`类创建一个新的`init`方法。它将使用输入的中子数初始化一个`Hydrogen`对象，并适当地设置化学元素名称和原子符号。选择**Hydrogen.h**文件。在编辑器窗格中，更新接口，如清单\
  \ 3-4 所示。\n\n***清单 3-4*** Hydrogen 接口\n\n```\n#import \"Atom.h\"\n\n@interface Hydrogen\
  \ : Atom\n\n- (id) initWithNeutrons:(NSUInteger)neutrons;\n\n@end\n```\n\n这个接口声明了一个`Hydrogen`的`init`方法，其中带有一个指定原子中子数的输入参数。接下来，选择实现文件（**Hydrogen.m**）并更新实现，如清单\
  \ 3-5 所示。\n\n***清单 3-5*** Hydrogen 实现\n\n```\n#import \"Hydrogen.h\"\n\n@implementation\
  \ Hydrogen\n\n- (id) initWithNeutrons:(NSUInteger)neutrons\n{\n  if ((self = [super\
  \ init]))\n  {\n    _chemicalElement = @\"Hydrogen\";\n    _atomicSymbol = @\"H\"\
  ;\n    _protons = 1;\n    _neutrons = neutrons;\n  }\n\nreturn self;\n}\n\n@end\n\
  ```\n\n`initWithNeutrons:`方法首先调用父类`Atom`的`init`方法，然后适当地设置其初始值。对于`Hydrogen`对象，这意味着设置化学元素名称（Hydrogen）、其原子符号（H）、质子数（根据定义，氢有一个质子）以及作为输入参数提供的中子数。\n\
  \n### 创建 Hydrogen 工厂方法\n\n类*工厂*方法是用于执行类创建和初始化的便捷方法。它们是类方法，通常遵循以下约定命名：\n\n```\n+\
  \ (id) className...\n```\n\n其中`className`是类的名称，并以小写字母开头。现在，你将为`Hydrogen`类实现一个工厂创建方法。在`Hydrogen`接口文件中，添加清单\
  \ 3-6 所示的方法。\n\n***清单 3-6*** 带有工厂创建方法的 Hydrogen 接口\n\n```\n#import \"Atom.h\"\n\n\
  @interface Hydrogen : Atom\n\n- (id) initWithNeutrons:(NSUInteger)neutrons;\n+ (id)\
  \ hydrogenWithNeutrons:(NSUInteger)neutrons;\n\n@end\n```\n\n一个名为`hydrogenWithNeutrons:`的类实例方法被添加到接口中。注意，工厂创建方法的名字与`init`方法类似，但它以类名作为前缀。此方法创建一个新的`Hydrogen`对象并使用输入参数进行初始化。打开`Hydrogen`实现文件并添加方法定义，如清单\
  \ 3-7 所示。\n\n***清单 3-7*** 带有工厂创建方法的 Hydrogen 实现\n\n```\n+ (id) hydrogenWithNeutrons:(NSUInteger)neutrons\n\
  {\n  return [[[self class] alloc] initWithNeutrons:neutrons];\n}\n```\n\n观察到该方法为`Hydrogen`对象分配内存，在这个新实例上调用`initWithNeutrons:`方法，然后返回新创建并初始化后的对象。还要注意使用了表达式`[self\
  \ class]`来获取当前类实例。使用这个表达式（而不是直接指定类），如果该类被继承且工厂方法被子类调用，则返回的实例将具有与子类相同的类型。现在让我们测试这个新类。选择**main.m**文件并更新`main()`函数，如清单\
  \ 3-8 所示。\n\n***清单 3-8*** 测试 Hydrogen 类\n\n```\nint main(int argc, const char *\
  \ argv[])\n{\n  @autoreleasepool\n  {\n    Atom *atom = [Hydrogen hydrogenWithNeutrons:0];\n\
  \    [atom logInfo];\n\nid atom1 = [[Hydrogen alloc] initWithNeutrons:1];\n    [atom1\
  \ logInfo];\n\nHydrogen *atom2 = [Hydrogen hydrogenWithNeutrons:2];\n    [atom2\
  \ logInfo];\n  }\n\nreturn 0;\n}\n```\n\n`main()`函数同时使用了`Hydrogen`的`init`方法和类工厂方法来创建和初始化`Hydrogen`对象，然后在\
  \ Xcode 输出窗口中显示对象信息。现在保存所有项目文件，然后编译并运行程序（通过点击工具栏中的**Run**按钮或从 Xcode 的 Product 菜单中选择**Run**）。输出窗格应显示如图\
  \ 3-3 所示的结果。\n\n![9781430250500_Fig03-03.jpg](img/9781430250500_Fig03-03.jpg)\n\n\
  ***图 3-3*** 测试 Hydrogen 类\n\n太棒了！你创建了一个具有自定义初始化和工厂方法的`Hydrogen`类，并对其进行了测试以验证其按预期工作。既然你已经熟悉了使用\
  \ Objective-C 进行对象创建和初始化，接下来让我们专注于对象消息传递。\n\n## 消息分发\n\n消息传递是面向对象编程中的一个基本概念。它是用于在对象上调用方法的机制。消息的接收对象（即接收者）在运行时确定要调用其哪个实例方法。实例方法可以访问对象的实例变量及其实例方法。用于向对象发送消息（即在对象上调用方法）的\
  \ Objective-C 语法是：\n\n```\n[receiver messageNameParams]\n```\n\n其中`receiver`是消息发送到的对象。`messageNameParams`信息标识了方法的实际名称和参数值（如果有）；并且括号将消息括起来。`messageNameParams`的语法是：\n\
  \n```\nkeyword1:value1 keyword2:value2 ... keywordN:valueN\n```\n\n冒号分隔每个方法签名关键字及其关联的参数值。它声明需要一个参数。如果方法没有参数，则省略冒号（并且该方法只有一个关键字）。以下面的消息为例：\n\
  \n```\n[orderObject addItem:burgerObject forPrice:3.50];\n```\n\n消息名称是`addItem:forPrice:`；消息的接收者是`orderObject`。消息参数值是`burgerObject`（对应关键字`addItem`）和`3.50`（对应关键字`atPrice`）。在正常情况下，只有当一个接收对象具有与消息名称相对应的方法时，才能成功地向该对象调用特定的消息。此外，Objective-C\
  \ 支持类型多态性，不同的接收者可以对同一方法有不同的实现。接收者的类型是在运行时确定的；因此，不同的接收者可以对同一消息做出不同的事情。总之，消息的结果不能仅通过消息或方法名称来计算；它还取决于接收消息的对象。\n\
  \n正如你在第 2 章中学到的，Objective-C 为一种替代语法（点符号）提供了语言级别的支持，该语法简化了属性访问器方法的调用。用于检索属性值的点语法是：\n\
  \n```\nobjectName.propertyName\n```\n\n\n\n`objectName` 是实例变量名，`propertyName` 是属性名。设置属性值的点语法如下：\n\
  \n```\nobjectName.propertyName = Value\n```\n\n点语法只是一种替代语法，并非直接访问属性支持的实例变量的机制。编译器会将这些语句转换为相应的属性访问器方法。\n\
  \nObjective-C 还提供了对*类方法*的语言级支持。这些方法是在类级别定义的，并直接在类上调用。调用类方法的语法为：\n\n```\n[className\
  \ messageNameParams]\n```\n\n类方法的工作方式与实例方法相同，区别在于它们是在类上调用的，而非对象。因此，类方法无法访问为该类定义的实例变量和方法。它们通常用于创建类的新实例（即作为工厂方法），或访问与类关联的共享信息。\n\
  \n通过将消息（请求的行为）与接收者（能够响应请求的方法的拥有者）分离，对象消息传递直接支持了面向对象编程的封装范式。\n\nObjective-C 通过语言级特性增强了对对象消息传递的支持，使你能够在运行时确定要调用的方法，甚至更改方法的实现。你将在本书第二部分探索这些特性；但现在，让我们先学习如何处理对象收到无法处理的消息的情况。\n\
  \n## 消息转发\n\nObjective-C 的对象消息传递根据对象接收到的消息，查找并执行该对象上的方法。对象类型可以在代码中指定并在编译时静态绑定（*静态类型*），也可以不指定类型而在运行时解析其类型（*动态类型*）。无论哪种情况，运行时接收消息的对象都会解释该消息以确定要调用哪个方法。这种方法调用的运行时解析使得程序可以轻松动态更改和/或扩展，但同时也带来一定风险：它允许程序向可能没有对应方法的对象发送消息。在默认情况下，如果发生这种情况，会抛出运行时异常。然而，Objective-C\
  \ 提供了另一种选择：通过一种称为*消息转发*的机制，可以配置对象在收到未映射到其方法集的消息时执行用户定义的处理。消息转发使对象能够对其收到的任何无法识别的消息执行多种逻辑，比如将其分发给能够响应该消息的不同接收者，将所有无法识别的消息发送到同一目标，或者简单地静默“吞掉”该消息（即既不执行处理，也不引发运行时错误）。\n\
  \n## 转发选项\n\nObjective-C 提供了两种消息转发选项供你使用。\n\n- *快速转发*：继承自 `NSObject` 的类可以通过重写 `NSObject`\
  \ 的 `forwardingTargetForSelector:` 方法来实现快速转发，将方法转发给另一个对象。这种技术使得你的对象和转发对象的实现看起来像是合并在一起。这模拟了类实现的多继承行为。如果你有一个目标类定义了你的对象可能消费的所有消息，这种方法会很有效。\n\
  - *正常（完整）转发*：继承自 `NSObject` 的类可以通过重写 `NSObject` 的 `forwardInvocation:` 方法来实现正常转发。这种技术使你的对象能够使用消息的完整内容（目标、方法名、参数）。\n\
  \n如果你有一个目标类定义了你的对象可能消费的所有消息，快速转发会很有效。如果你没有这样的目标类，或者希望在收到消息时执行其他处理（例如，仅记录并吞掉消息），则应使用完整转发。\n\
  \n## 为 Hydrogen 类添加快速转发\n\n为了让你了解如何使用消息转发，我们将为刚刚实现的 `Hydrogen` 类添加这一能力。我们将扩展该类以提供快速转发，然后创建一个辅助目标类，通过实现相应的方法来处理转发的消息。\n\
  \n### 消息转发辅助类\n\n首先，创建辅助类。在 Xcode 中，新建一个 Objective-C 类。将其命名为 `HydrogenHelper`，并将\
  \ Elements 项目设定为其目标。在 Xcode 导航窗格中，可以看到已创建了两个新文件（`HydrogenHelper.h` 和 `HydrogenHelper.m`）。选择\
  \ `HydrogenHelper.h` 文件，然后在编辑窗格中，按代码清单 3-9 所示更新其接口。\n\n*代码清单 3-9.* HydrogenHelper\
  \ 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface HydrogenHelper : NSObject\n\
  \n- (NSString *) factoid;\n\n@end\n```\n\n该接口声明了一个实例方法 `factoid`，该方法返回一个指向 `NSString`\
  \ 的指针（`NSString *`）。接下来，选择实现文件（`HydrogenHelper.m`），并按代码清单 3-10 所示定义 `factoid` 方法。\n\
  \n*代码清单 3-10.* HydrogenHelper 实现\n\n```\n#import \"HydrogenHelper.h\"\n\n@implementation\
  \ HydrogenHelper\n\n- (NSString *) factoid\n{\n  return @\"最轻的元素和含量最丰富的化学物质。\";\n\
  }\n```\n\n如代码清单 3-10 所示，`HydrogenHelper` 的 `factoid` 方法返回关于氢元素的一个简单事实。现在，你将更新 `Hydrogen`\
  \ 类以支持快速转发。在 Hydrogen 实现文件（`Hydrogen.m`）中，添加以下代码来重写 `forwardingTargetForSelector:`\
  \ 方法的默认实现，如代码清单 3-11 所示（更新部分以粗体显示）。\n\n*代码清单 3-11.* Hydrogen 类消息快速转发更新\n\n```\n\
  @implementation Hydrogen\n{\n@private HydrogenHelper *helper;\n}\n...\n- (id) initWithNeutrons:(NSUInteger)neutrons\n\
  {\n  if ((self = [super init]))\n  {\n    // 初始化代码在此处添加。\n    _chemicalElement =\
  \ @\"Hydrogen\";\n    _atomicSymbol = @\"H\";\n    _protons = 1;\n    _neutrons\
  \ = neutrons;\n\n// 创建用于消息转发的辅助对象\n    helper = [[HydrogenHelper alloc] init];\n\
  \  }\n\nreturn self;\n}\n\n- (id) forwardingTargetForSelector:(SEL)aSelector\n{\n\
  \  if ([helper respondsToSelector:aSelector])\n  {\n    return helper;\n  }\n  return\
  \ nil;\n}\n...\n@end\n```\n\n首先，`Hydrogen` 类增加了一个 `HydrogenHelper*` 类型的实例变量。接着在\
  \ `init` 方法中，创建并初始化了 `HydrogenHelper` 对象。这就是将用于消息转发的目标对象。最后，实现了 `forwardingTargetForSelector:`\
  \ 方法。该方法首先检查该消息是否是目标对象（`HydrogenHelper`）能够处理的消息。如果是，则返回该目标对象；否则返回 `nil`。回顾一下，`HydrogenHelper`\
  \ 类只有一个实例方法 `factoid`。因此，如果某个 `Hydrogen` 对象收到一个名为 `factoid` 的实例方法的消息，它将被重定向，将这条消息发送给它的\
  \ `HydrogenHelper` 对象（参见图 3-4）。\n\n![9781430250500_Fig03-04.jpg](img/9781430250500_Fig03-04.jpg)\n\
  \n图 3-4. 为 Hydrogen 类快速转发 factoid 方法\n\n\n\n太好了！你已经为`Hydrogen`类实现了快速转发。现在让我们使用快速转发来测试这个类。选择**main.m**文件并更新`main()`函数，如代码清单\
  \ 3-12 所示。\n\n*代码清单 3-12.* 测试氢类的快速转发\n\n```\nint main(int argc, const char * argv[])\n\
  {\n  @autoreleasepool\n  {\n    Atom *atom = [Hydrogen hydrogenWithNeutrons:0];\n\
  \    [atom logInfo];\n\n    id atom1 = [[Hydrogen alloc] initWithNeutrons:1];\n\
  \    [atom1 logInfo];\n\n    // 使用消息转发获取关于氢的一个事实\n    Hydrogen *atom2 = [Hydrogen\
  \ hydrogenWithNeutrons:2];\n    NSString *fact = [atom2 factoid];\n    [atom2 logInfo:fact];\n\
  \  }\n\n  return 0;\n}\n```\n\n在编辑器窗格的左侧，你可能会在`NSString *fact = [atom2 factoid]`这一行看到一个红色圆圈内的感叹号。如果你点击这个感叹号，将会看到一个错误信息（见图\
  \ 3-5）。\n\n![9781430250500_Fig03-05.jpg](img/9781430250500_Fig03-05.jpg)\n\n图 3-5\
  \ 氢类对象消息传递错误\n\n这个错误“No visible @interface for 'Hydrogen' declares the selector\
  \ 'factoid'”的发生是因为`Hydrogen`类在其接口中没有声明`factoid`实例方法。编译器需要知道程序可能发送的每条消息的完整方法签名——即使是那些被转发的消息。解决方案是在类接口或类别中声明该未知方法。在\
  \ Xcode 中，创建一个新的 Objective-C 类别，输入`Helper`作为名称，并在类别下拉列表中选择`Atom`。将 Elements 项目设为目标，并将\
  \ Elements 文件夹设为文件保存位置。在 Xcode 项目导航器窗格中，有两个新文件被添加到了 Elements 文件夹中：`Atom+Helper.h`和`Atom+Helper.m`。这些分别是类别接口和实现文件。由于你不需要实现，请在导航器窗格中选择`Atom+Helper.m`文件，然后从\
  \ Xcode 的 Edit 菜单中选择`Delete`来删除它。接下来，在`Atom+Helper.h`头文件中，按代码清单 3-13 所示更新类别接口。\n\
  \n*代码清单 3-13.* 原子辅助类别接口\n\n```\n#import \"Atom.h\"\n\n@interface Atom (Helper)\n\
  \n- (NSString *) factoid;\n\n@end\n```\n\n在代码清单 3-13 中，`factoid`方法已被添加到类别接口中。由于`Hydrogen`类是`Atom`类的子类，编译器现在会看到`factoid`方法，从而解决了错误。`main.m`文件应该在其导入列表中包含`Atom`辅助类别接口（见代码清单\
  \ 3-14）。\n\n*代码清单 3-14.* `main()`函数的导入语句\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Atom.h\"\n#import \"Atom+Nuclear.h\"\n#import \"Atom+Helper.h\"\n#import\
