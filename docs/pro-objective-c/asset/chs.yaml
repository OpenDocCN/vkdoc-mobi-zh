  \n图 4-5  测试 MRR OrderEntry 项目\n\n消息显示了初始化与释放动态创建对象的调用顺序。看起来所有的对象创建/保留和释放消息都正确平衡，你运行的测试也显示了正确的输出，所以一切就绪了，对吗？嗯，不一定。毕竟，你怎么能确定程序没有内存泄漏呢——它可以显示正确的输出但仍然存在未检测到的问题。那么，如何验证程序没有泄漏内存或存在其他未检测到的问题？Xcode\
